  | 1073874176 | 0x40020500 | PERF_AVERAGE_BULK |

  | 272696576 | 0x10410500 | PERF_COUNTER_BULK_COUNT |

  | 65792 | 0x00010100 | PERF_COUNTER_LARGE_RAWCOUNT |


  `PERF_LARGE_RAW_FRACTION` 计数器类型表示其对应的 `PERF_LARGE_RAW_BASE` 计数器值的一个分数，该值也在表 8-2
  中显示为 1073939712。对于我们的示例，`PERF_LARGE_RAW_BASE` 表示缓冲区缓存命中率基数，也在前面的动态管理视图样本输出中列出。然后我们可以使用以下公式：


  缓冲区缓存命中率 % = 100 * 缓冲区缓存命中率 / 缓冲区缓存命中率基数


  在我们的例子中，使用前面动态管理视图输出的值，我们有 100 * 1133 / 1175，即 96.43%。有关其他计数器的更多详细信息，请参阅提到的文章。


  ## 动态管理视图和函数


  我们在本书的其他章节中已经介绍了很多动态管理视图。本节将包括一些对性能故障排除至关重要的额外动态管理视图。你可以在 [`https://msdn.microsoft.com/en-us/library/ms188754.aspx`](https://msdn.microsoft.com/en-us/library/ms188754.aspx)
  找到所有已记录的动态管理视图和动态管理函数的完整列表。


  ### sys.dm_io_virtual_file_stats


  `sys.dm_io_virtual_file_stats` 动态管理函数为数据库中的每个数据和日志文件提供了丰富的 I/O 信息，不仅包括 I/O 活动数据，还包括等待延迟信息。返回的统计信息是自
  SQL Server 实例启动以来或数据库或数据文件从离线状态更改为联机状态以来累积的指标。此动态管理函数替代了旧的 `fn_virtualfilestats`
  函数。


  仅由此动态管理函数返回的 I/O 活动可能没有太大意义，因为它取决于 SQL Server 实例（或数据库或文件）已联机的天数，但当与同一实例上的其他文件进行比较时，它会很有帮助。一旦你发现某个数据库文件可能有过度的
  I/O 活动，你可能需要关联其他一些性能信息来采取措施。很多时候，你可以通过调整和优化查询（例如，提供正确的索引，查看改进执行计划，验证统计信息等）来缓解这些问题。在其他时候，根据你的结果，将数据库文件放置在不同的卷上也可能有所帮助，例如，将繁忙卷的
  I/O 分散到额外的卷上。尝试将 I/O 活动与 `sys.dm_db_index_usage_stats` 关联也可以提供有价值的信息。


  `sys.dm_io_virtual_file_stats` 动态管理函数有两个可选参数，数据库 ID 和 文件 ID，可以如下例所示使用：

  ```

  SELECT * FROM sys.dm_io_virtual_file_stats(DB_ID(''AdventureWorks2017''), NULL)

  ```

  不带参数调用此动态管理函数将列出所有数据库中的所有文件，如下例所示：

  ```

  SELECT DB_NAME(mf.database_id), physical_name, fs.*

  FROM sys.dm_io_virtual_file_stats(NULL, NULL) fs

  JOIN sys.master_files mf

  ON mf.database_id = fs.database_id

  AND mf.file_id = fs.file_id

  ```

  表 8-3 显示了一个部分样本输出。


  表 8-3


  样本输出


  | database_name | num_of_bytes_read | io_stall_read_ms | num_of_bytes_written |
  io_stall_write_ms |

  | --- | --- | --- | --- | --- |

  | tempdb | 18735104 | 5642 | 2605056 | 999 |

  | tempdb | 1015808 | 186 | 2162688 | 281 |

  | tempdb | 2260992 | 803 | 1507328 | 201 |

  | tempdb | 2121728 | 322 | 1613824 | 1388 |

  | tempdb | 2301952 | 420 | 1662976 | 714 |

  | AdventureWorks2017 | 275603456 | 147988 | 43155456 | 9587 |

  | AdventureWorks2017 | 185999360 | 12248 | 202964992 | 258568 |

  | AdventureWorksDW2017 | 113778688 | 35233 | 74670080 | 3129 |

  | AdventureWorksDW2017 | 1130496 | 2322 | 47136768 | 14632 |


  所有列都提供了重要的 I/O 信息。仅列出最关键的几个：

  *   `num_of_reads`：在数据库文件上执行的读取次数。

  *   `num_of_bytes_read`：在数据库文件上读取的总字节数。

  *   `io_stall_read_ms`：用户为在数据库文件上执行的读取而等待的总时间。以毫秒为单位。

  *   `num_of_writes`：在数据库文件上执行的写入次数。

  *   `num_of_bytes_written`：写入数据库文件的总字节数。

  *   `io_stall_write_ms`：用户为在数据库文件上完成的写入而等待的总时间。以毫秒为单位。

  *   `io_stall`：用户为在数据库文件上完成的 I/O 而等待的总时间。它基本上是 `io_stall_read_ms` 加上 `io_stall_write_ms`。以毫秒为单位。

  *   `size_on_disk_bytes`：磁盘上用于数据库文件的字节数。



  ### `sys.dm_os_volume_stats`


  `sys.dm_os_volume_stats` 这一 DMF（动态管理函数）根据提供的数据库 ID 和文件 ID，返回系统中有关卷的信息。与本书中的其他函数不同，此函数必须提供参数。返回的部分信息包括：卷挂载点、逻辑卷名、文件系统类型（如
  NTFS、FAT 或 RAW）、卷总大小（字节）、可用空间、卷是否支持操作系统压缩、备用数据流或稀疏文件，以及卷是否为只读和已压缩。


  以下是一个请求 `AdventureWorks` 中 `file_id` 为 1 的卷信息的示例：


  ```

  SELECT * FROM sys.dm_os_volume_stats (DB_ID(''AdventureWorks2017''), 1)

  ```


  **注意**


  挂载点是一种在不需要驱动器号的情况下将卷添加到文件系统的方法，可以在 NTFS 文件系统的目录中创建。挂载点随 Windows Server 2000 引入。


  ### `sys.dm_db_index_usage_stats`


  `sys.dm_db_index_usage_stats` 这一 DMV（动态管理视图）返回有关数据库中表和索引所执行操作的信息，包括用户查询和系统查询产生的查找、扫描、书签查找和更新的次数。它还报告这些操作最后一次执行的时间。此信息按索引和表（即聚集索引或堆）报告。用户活动指用户和应用程序提交的查询。系统查询是内部生成的查询，例如执行统计信息更新所需的操作。


  此 DMV 可与 `sys.dm_io_virtual_file_stats` DMV 结合使用，以深入分析数据库中哪些对象可能具有过高的 I/O 活动。但是，它的工作方式与
  `sys.dm_io_virtual_file_stats` 不同，因为它不显示字节或等待时间，而主要从查询处理的角度显示活动。请注意，此 DMV 返回整个实例的信息，因此你可能希望仅选择特定数据库的结果，如下面的代码所示：


  ```

  SELECT OBJECT_NAME(object_id), * FROM sys.dm_db_index_usage_stats

  WHERE database_id = DB_ID()

  ORDER BY object_id, index_id

  ```


  你可以选择将此 DMV 与 `sys.indexes` 联接以获取额外的索引详细信息。以下是一个基本查询示例：


  ```

  SELECT OBJECT_NAME(s.object_id) AS object_name, i.name, s.*

  FROM sys.dm_db_index_usage_stats s JOIN sys.indexes i

  ON s.object_id = i.object_id AND s.index_id = i.index_id

  WHERE database_id = DB_ID()

  ORDER BY object_id, index_id

  ```


  一个基本的样本输出如表 8-4 所示。


  表 8-4

  样本输出


  | 名称 | 索引 ID | 用户查找次数 | 用户扫描次数 | 用户书签查找次数 | 用户更新次数 |

  | --- | --- | --- | --- | --- | --- |

  | PK_ProductReview_ProductReviewID | 1 | 1 | 0 | 0 | 0 |

  | PK_Document_DocumentNode | 1 | 1 | 0 | 0 | 0 |

  | PK_SalesOrderDetail_SalesOrderID_SalesOrderDetailID | 1 | 0 | 46 | 14 | 0 |

  | IX_SalesOrderDetail_ProductID | 8 | 14 | 8 | 0 | 0 |

  | PK_SalesOrderHeader_SalesOrderID | 1 | 0 | 8 | 4 | 3 |


  ### `sys.dm_exec_query_stats`


  `sys.dm_exec_query_stats` 这一 DMV 返回 SQL Server 中缓存查询计划的查询性能信息。尽管此 DMV 中的信息非常有帮助，但我还强烈建议你启用查询存储（或者如果你使用的是较旧的
  SQL Server 版本，则启用数据收集器）以收集更高质量的查询性能数据。


  如第 6 章所述，查询存储为使用此 DMV 提供了一些额外的好处，包括以下几点：


  1.  使用 `sys.dm_exec_query_stats` DMV 仅提供当前位于计划缓存中的计划的视图。计划的当前版本是唯一存在的，并且即使此版本也可能随时从计划缓存中移除。查询存储持久保存每个查询的所有历史计划。

  2.  并非每个计划都会被缓存，因此也就不会通过 `sys.dm_exec_query_stats` DMV 暴露。所有计划和查询信息都由查询存储存储，即使是那些不完整的查询的计划。


  话虽如此，`sys.dm_exec_query_stats` DMV 仍然具有许多优点，因为它可以在没有任何性能影响的情况下进行查询。这相对于旧版本的 SQL
  Server 是一个巨大的改进，在旧版本中获取类似信息需要运行昂贵的 SQL Trace 会话以及复杂的方法来处理和聚合数据。


  该 DMV 跟踪性能信息，例如工作线程时间（CPU 时间）、物理读取、逻辑写入、逻辑读取、公共语言运行时 (CLR)、已用时间和返回的行数。对于这些指标中的每一个，都会返回总计、最后、最小值和最大值统计数据。本章前面关于性能计数器的部分包含一个典型示例，该示例使用
  `sys.dm_exec_query_stats` DMV 获取系统中按 CPU 排序的最昂贵查询，该示例可以轻松更新，以列出按其他可用指标（如逻辑读取或物理读取）排序的昂贵查询。从
  SQL Server 2016 开始，此 DMV 包含与并行度、保留内存授予量、理想内存授予量、保留并行线程数和已用并行线程数相关的附加性能信息。




  ### `sys.dm_db_index_physical_stats`


  此动态管理视图（DMV）可用于获取表和索引的碎片信息。碎片可能存在三种形式：页碎片、逻辑碎片和区碎片。当数据页未完全填满时，就会出现页碎片。另一方面，当对象的页在物理上未按顺序排列时，就会出现逻辑碎片和区碎片。逻辑碎片是指页未按索引的逻辑顺序在物理上排序。区碎片是一个类似的概念，指堆的区在物理上未按顺序排列。


  碎片可能仅在表和索引扫描操作时导致性能问题，例如执行预读操作时。主要由索引查找组成的工作负载不会受到碎片影响（至少逻辑或区碎片不会）。`sys.dm_db_index_physical_stats`
  中的两列 `avg_page_space_used_in_percent` 和 `avg_fragmentation_in_percent` 反映了表或索引的碎片级别。


  `avg_page_space_used_in_percent` 列指示数据页中已使用空间的平均百分比，这基本上表示了页的填充度。通常可以通过配置适当的填充因子值来控制页填充度，该值指定数据页应被数据填充的百分比，可以在从服务器到对象级别的不同层级进行配置。例如，填充因子为
  90 意味着页面填充了 90%，仅留下剩余的 10% 用于新行。最佳值取决于应用程序和数据库的使用情况。服务器默认配置的填充因子值为 0（顺便说一句，这与 100
  完全相同），意味着页面将被填满容量，并且在行通常添加到表末尾时（例如使用 `IDENTITY` 约束时）工作状态良好。此默认值对于磁盘空间使用也是最优的，因为页面已满，扫描也会很高效（意味着无需扫描部分空白页面执行额外的
  I/O 操作）。但对于随机插入数据操作，完全填满的页面可能并非最优，因为这将需要页面拆分，除了产生碎片外还会导致性能问题。


  对于需要随机插入数据操作的情况，小于 100% 的值可能是合适的。这可以通过根据应用程序特定的插入数据需求调整填充因子配置来实现。当 SQL Server 在页面中没有空间用于额外的行，或用于更新现有行而其新的较大尺寸不再适合该页面时，就会发生页面拆分。拆分操作基本上会创建一个新页面，将原始页面中大约一半的行移动到新页面。页面拆分是一项昂贵的操作，并会导致碎片，因为最终会产生两个大约只填满
  50% 的页面。应避免或最小化页面拆分，可以使用 `SQLServer:Access Methods` 性能计数器中的 Page Splits/sec 或 `page_split`
  扩展事件进行监控。如第 9 章所述，索引的一个性能建议是使用一个始终递增的值以最小化这些问题。


  `avg_fragmentation_in_percent` 列指的是索引的逻辑碎片百分比或堆的区碎片百分比。逻辑碎片指的是索引叶级页中未按顺序排列的页的百分比，即页未按索引的逻辑顺序在物理上排序。区碎片是堆的一个类似概念，指堆的区在物理上未按顺序排列。


  修复数据库中的页碎片需要调整填充因子配置级别（如果您的应用程序需要在现有页上插入行）。逻辑或区碎片可以通过重建或重新组织索引或表来修复。您通常只需要更新一次填充因子。另一方面，重建或重新组织索引或表可能需要定期执行，通常在数据库维护作业中进行。决定何时重建或重新组织索引取决于您的数据库，但通常一个安全的起点是当碎片率在
  10% 到 40% 之间时重新组织索引，当碎片率大于 40% 时重建索引。根据定义，堆不包含聚集索引，但您也可以通过在其上创建聚集索引然后删除它来对其碎片整理。在堆上创建聚集索引将以最优方式重新分布数据，不留任何碎片，之后删除它只会移除索引的元数据定义，数据保持不变。


  以下代码将通过查看 `avg_fragmentation_in_percent` 列中碎片大于 10% 的情况，返回当前数据库中可能需要碎片整理的索引：


  ```sql

  SELECT *

  FROM sys.dm_db_index_physical_stats (DB_ID(), NULL, NULL , NULL, ''LIMITED'')

  WHERE avg_fragmentation_in_percent > 10

  ```


  然后，您可以编写一个脚本，根据百分比选择运行 `ALTER INDEX REORGANIZE` 或 `ALTER INDEX REBUILD`，如下面的伪代码所示：


  ```sql

  IF avg_fragmentation_in_percent = 30.0

  SET @command = ''ALTER INDEX '' + ... + '' REBUILD''

  EXEC (@command)

  ```


  `sys.dm_db_index_physical_stats` 的文档位于 `https://msdn.microsoft.com/en-us/library/ms188917.aspx`，其中包含了执行此操作的基本代码，您可以根据特定需求进行调整。


  注意：我强烈建议使用 Ola Hallengren 的 SQL Server 维护解决方案来进行备份、完整性检查以及索引和统计信息维护。此维护解决方案是免费的，可以从
  `https://ola.hallengren.com/` 下载。


  ### `sys.dm_exec_query_optimizer_info`


