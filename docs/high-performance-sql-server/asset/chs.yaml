  ## tempdb 事件


  你可以通过检查分配环形缓冲区来分析 `tempdb` 数据库中的分配和解除分配信息，这可以使用未文档化的跟踪标志 1106 来启用。但请注意，启用它肯定会影响系统的性能，因此不要在生产或繁忙的系统上使用它。以下是一个工作原理示例。首先启用跟踪标志
  1106。


  ```

  DBCC TRACEON (1106, -1)

  ```


  然后你可以使用以下代码检查分配环形缓冲区：


  ```

  DECLARE @ts_now bigint;

  SELECT @ts_now=cpu_ticks/(cpu_ticks/ms_ticks)

  FROM sys.dm_os_sys_info;

  SELECT record_id,

  DATEADD(ms, -1 * (@ts_now - [timestamp]), GETDATE()) as event_time,

  CASE

  WHEN event = 0 THEN ''Allocation Cache Init''

  WHEN event = 1 THEN ''Allocation Cache Add Entry''

  WHEN event = 2 THEN ''Allocation Cache RMV Entry''

  WHEN event = 3 THEN ''Allocation Cache Reinit''

  WHEN event = 4 THEN ''Allocation Cache Free''

  WHEN event = 5 THEN ''Truncate Allocation Unit''

  WHEN event = 10 THEN ''PFS Alloc Page''

  WHEN event = 11 THEN ''PFS Dealloc Page''

  WHEN event = 20 THEN ''IAM Set Bit''

  WHEN event = 21 THEN ''IAM Clear Bit''

  WHEN event = 22 THEN ''GAM Set Bit''

  WHEN event = 23 THEN ''GAM Clear Bit''

  WHEN event = 24 THEN ''SGAM Set Bit''

  WHEN event = 25 THEN ''SGAM Clear Bit''

  WHEN event = 26 THEN ''SGAM Set Bit NX''

  WHEN event = 27 THEN ''SGAM Clear Bit NX''

  WHEN event = 28 THEN ''GAM Zap Extent''

  WHEN event = 40 THEN ''Format IAM Page''

  WHEN event = 41 THEN ''Format Page''

  WHEN event = 42 THEN ''Reassign IAM Page''

  WHEN event = 50 THEN ''Worktable Cache Add IAM''

  WHEN event = 51 THEN ''Worktable Cache Add Page''

  WHEN event = 52 THEN ''Worktable Cache RMV IAM''

  WHEN event = 53 THEN ''Worktable Cache RMV Page''

  WHEN event = 61 THEN ''IAM Cache Destroy''

  WHEN event = 62 THEN ''IAM Cache Add Page''

  WHEN event = 63 THEN ''IAM Cache Refresh Requested''

  ELSE ''Unknown Event''

  END as event_name,

  session_id as s_id,

  page_id,

  allocation_unit_id as au_id

  FROM

  (

  SELECT

  xml_record.value(''(./Record/@id)[1]'', ''int'') AS record_id,

  xml_record.value(''(./Record/SpaceMgr/Event)[1]'', ''int'') AS event,

  xml_record.value(''(./Record/SpaceMgr/SpId)[1]'', ''int'') AS session_id,

  xml_record.value(''(./Record/SpaceMgr/PageId)[1]'', ''varchar(100)'') AS page_id,

  xml_record.value(''(./Record/SpaceMgr/AuId)[1]'', ''varchar(100)'') AS allocation_unit_id,

  timestamp

  FROM

  (

  SELECT timestamp, convert(xml, record) as xml_record

  FROM sys.dm_os_ring_buffers

  WHERE ring_buffer_type = N''RING_BUFFER_SPACEMGR_TRACE''

  ) AS the_record

  ) AS ring_buffer_record

  -- WHERE session_id = 52

  ORDER BY record_id

  ```


  要测试它，请尝试创建一个临时表，例如使用以下代码。你可以尝试一次运行一行代码，然后运行前面的代码来检查分配环形缓冲区，看看每条语句创建了哪些事件。如果你从其他会话获得太多事件，可以取消注释
  `session_id` 部分并指定一个会话 ID 值，以便针对特定会话进行筛选：


  ```

  CREATE TABLE #temp (c1 int, c2 varchar(20), c3 datetime)

  INSERT INTO #temp VALUES (1, ''test'', GETDATE())

  DROP TABLE #temp

  ```


  你可能会看到类似下面的输出：


  | **record_id** | **event_name** | **s_id** | **page_id** | **au_id** |

  | --- | --- | --- | --- | --- |

  | 0 | PFS Alloc Page | 52 | 1:321 | 34:1 |

  | 1 | Format Page | 52 | 1:321 | 34:1 |

  | 2 | GAM Clear Bit | 52 | 1:336 | 34:4 |

  | 3 | PFS Alloc Page | 52 | 1:336 | 34:4 |

  | 4 | IAM Set Bit | 52 | 1:336 | 34:4 |

  | 5 | Allocation Cache Add Entry | 52 | 1:336 | 34:4 |

  | 6 | Format Page | 52 | 1:336 | 34:4 |


  在继续之前，别忘了禁用跟踪标志 1106：


  ```

  DBCC TRACEOFF (1106, -1)

  ```


  > 注意

  >

  > 详细探讨每个事件超出了本书的范围，但你可以将其用作故障排除和学习工具。



  之前的代码适用于 SQL Server 2012 及更高版本。对于早于 SQL Server 2012 的版本，您可以使用以下代码，因为当时环形缓冲区的名称是
  `RING_BUFFER_ALLOC_TRACE`，并且该脚本还需要一些其他小改动：


  ```sql

  DECLARE @ts_now bigint;

  SELECT @ts_now=cpu_ticks/(cpu_ticks/ms_ticks)

  FROM sys.dm_os_sys_info;

  SELECT record_id,

  DATEADD(ms, -1 * (@ts_now - [timestamp]), GETDATE()) as event_time,

  CASE

  WHEN event = 0 THEN ''分配缓存初始化''

  WHEN event = 1 THEN ''分配缓存添加条目''

  WHEN event = 2 THEN ''分配缓存移除条目''

  WHEN event = 3 THEN ''分配缓存重新初始化''

  WHEN event = 4 THEN ''分配缓存释放''

  WHEN event = 5 THEN ''截断分配单元''

  WHEN event = 10 THEN ''PFS 分配页''

  WHEN event = 11 THEN ''PFS 释放页''

  WHEN event = 20 THEN ''IAM 置位''

  WHEN event = 21 THEN ''IAM 清位''

  WHEN event = 22 THEN ''GAM 置位''

  WHEN event = 23 THEN ''GAM 清位''

  WHEN event = 24 THEN ''SGAM 置位''

  WHEN event = 25 THEN ''SGAM 清位''

  WHEN event = 26 THEN ''SGAM 置位 NX''

  WHEN event = 27 THEN ''SGAM 清位 NX''

  WHEN event = 28 THEN ''GAM 清除区''

  WHEN event = 40 THEN ''格式化 IAM 页''

  WHEN event = 41 THEN ''格式化页''

  WHEN event = 42 THEN ''重新分配 IAM 页''

  WHEN event = 50 THEN ''工作表缓存添加 IAM''

  WHEN event = 51 THEN ''工作表缓存添加页''

  WHEN event = 52 THEN ''工作表缓存移除 IAM''

  WHEN event = 53 THEN ''工作表缓存移除页''

  WHEN event = 61 THEN ''IAM 缓存销毁''

  WHEN event = 62 THEN ''IAM 缓存添加页''

  WHEN event = 63 THEN ''IAM 缓存请求刷新''

  ELSE ''未知事件''

  END as event_name,

  session_id as s_id,

  page_id,

  allocation_unit_id as au_id

  FROM

  (

  SELECT

  xml:record.value(''(./Record/@id)[1]'', ''int'') AS record_id,

  xml:record.value(''(./Record/ALLOC/Event)[1]'', ''int'') AS event,

  xml:record.value(''(./Record/ALLOC/SpId)[1]'', ''int'') AS session_id,

  xml:record.value(''(./Record/ALLOC/PageId)[1]'', ''varchar(100)'') AS page_id,

  xml:record.value(''(./Record/ALLOC/AuId)[1]'', ''varchar(100)'') AS allocation_unit_id,

  timestamp

  FROM

  (

  SELECT timestamp, convert(xml, record) as xml:record

  FROM sys.dm_os_ring_buffers

  WHERE ring_buffer_type = N''RING_BUFFER_ALLOC_TRACE''

  ) AS the_record

  ) AS ring_buffer_record

  -- WHERE session_id = 52

  ORDER BY record_id

  ```


  ## 使用扩展事件进行监控


  除了前面介绍的 DMV 和视图外，您还可以使用扩展事件来捕获和监控与分配页上的闩锁争用相关的事件。跟踪事件的一个明显好处是，您不必在问题发生的那一刻进行观察，因为信息可以收集起来供您稍后查看。以下事件可用：


  *   `latch_suspend_begin`：当执行任务必须挂起以等待闩锁以请求的模式变为可用时发生。

  *   `latch_suspend_end`：当执行任务在等待闩锁后恢复时发生。

  *   `latch_suspend_warning`：当等待闩锁超时时发生，可能导致性能问题。


  捕获这些事件时，您可以看到的一些有趣字段如下：


  *   `address`：闩锁所在的内存地址。

  *   `database_id`：闩锁保护的页的数据库 ID。

  *   `duration`：请求者为等待闩锁花费的微秒数（在 `latch_suspend_begin` 上不可用）。

  *   `file_id`：闩锁保护的页的文件 ID。

  *   `is_superlatch`：指示闩锁是否为超级闩锁。

  *   `mode`：闩锁请求的模式。

  *   `page_id`：闩锁保护的页的页 ID。


  例如，以下代码创建了一个与闩锁相关的扩展事件会话。请注意，我们筛选了 `database_id` 为 2 且 `page_id` 为 1 和 3 的情况。


  ```sql

  CREATE EVENT SESSION [test] ON SERVER

  ADD EVENT sqlserver.latch_suspend_begin (

  WHERE (database_id = 2 AND (page_id = 1 OR page_id =3))

  ),

  ADD EVENT sqlserver.latch_suspend_end (

  WHERE (database_id = 2 AND (page_id = 1 OR page_id =3))

  ),

  ADD EVENT sqlserver.latch_suspend_warning (

  WHERE (database_id = 2 AND (page_id = 1 OR page_id =3))

  )

  GO

  ```


  会话创建后，您可以通过运行以下代码来启动它：


  ```sql

  ALTER EVENT SESSION [test] ON SERVER

  STATE = START

  GO

  ```


  以下是一个捕获到的 `latch_suspend_end` 数据事件样本，显示了争用情况。您可以使用“实时监视数据”功能轻松查看事件（在 SQL Server
  Management Studio 中，查看“管理”文件夹 ➤ “扩展事件” ➤ “会话”，右键单击您的活动会话，然后选择“实时监视数据”）。


  | `address` | 513679079488 |

  | --- | --- |

  | `database_id` | 2 |

  | `duration` | 42990 |

  | `file_id` | 1 |

  | `is_superlatch` | False |

  | `mode` | UP |

  | `page_id` | 1 |


  最后，不要忘记关闭并删除会话以完成此练习：


  ```sql

  ALTER EVENT SESSION [test] ON SERVER

  STATE = STOP

  GO

  DROP EVENT SESSION [test] ON SERVER

  GO

  ```


  ## DDL 争用


  值得澄清的是，本节讨论的分配页争用有时被称为 DML 争用，因为它主要是由于对临时表的 `INSERT`、`UPDATE` 和 `DELETE` 操作引起的。这不同于，例如，DDL
  争用，后者也可能发生在 `tempdb` 中，但肯定比 DML 争用少见，并且涉及记录用户创建对象信息所需的系统目录上的争用。要查看 `tempdb` 中是否有
  DDL 争用，您可以使用前面描述的与 DML 争用相同的方法，但是，您可能看到的是属于系统目录表的页上的争用，而不是分配页上的争用。不幸的是，解决 DDL 争用需要最小化在
  `tempdb` 中创建和删除的用户对象数量。



  ## tempdb 溢出警告


  尽管 SQL Server 中的每个查询都需要一些内存来执行其工作，但某些查询操作（如哈希、排序和交换）可能需要显著更多的内存，具体取决于它们需要处理的数据量。这些内存用于存储待排序的行，或用于构建哈希连接和哈希聚合运算符所使用的哈希表。在某些情况下，并行查询计划（包含多个范围扫描）也可能需要内存授权。查询优化器通常能较好地估算所需内存量，如果内存可用，它将在执行时提供给运算符。


  然而，如第 1 章所述，当分配的内存不足，哈希、排序和并行或交换运算符被迫进行额外的数据处理或使用 `tempdb` 数据库（溢出到磁盘）时，可能会导致性能问题。这些问题通常源于基数估计不佳，查询优化器可能低估了查询所需的内存量。由于授予查询的内存可能少于所需，排序操作或哈希操作的生成输入可能无法容纳在可用内存中。一旦查询开始执行，即使没有足够的内存，它也必须继续运行。


  你可以使用 `sort_warning`、`hash_warning` 和 `exchange_spill` 扩展事件（或 `Sort Warning`、`Hash
  Warning` 和 `Exchange Spill` 跟踪事件类）来监控系统中可能发生的这些性能问题。从 SQL Server 2016 开始，你还可以使用第
  6 章介绍的“实时查询统计信息”功能，这也有助于实时查看这些性能问题，因为这些操作可能占据查询执行的很大一部分。


  除了性能问题外，由于访问磁盘比访问内存慢数倍，这些操作可能在 `tempdb` 上创建大量内部对象，从而导致磁盘空间问题。我曾在此类场景中见过问题查询向 `tempdb`
  写入数十或数百 GB 的数据。我们将在下一节更详细地讨论如何监控 `tempdb` 使用的磁盘空间量。


  由于此问题的主要原因是查询优化器低估了所需内存，因此修复它的最佳行动方案是确保统计信息存在且是最新的。根据具体问题，将给出额外的建议，如下三节所示。


  ### 排序警告


  排序警告由需要排序的查询产生，例如使用 `ORDER BY` 子句时。`sort_warning` 扩展事件提供了用于排查此问题的附加数据，包括实际排序行数、授予的内存量、使用的内存量，以及从工作表读取和写入的页数。你应该特别注意
  `sort_warning_type` 列，它显示是否需要单次额外遍历或多次遍历来获取排序输出。此警告类型信息也可通过使用 `EventSubClass` 列的
  `Sort Warning` 跟踪事件获得。该事件还包括 `query_operation_node_id` 列，你可以使用它来识别是哪个运算符导致了 `tempdb`
  溢出，或者也可以查看执行计划以查找排序运算符上的警告或 `SpillToTempDb` 属性。避免排序警告的一个典型解决方案是为查询添加适当的索引。更多关于索引的详细信息将在第
  9 章介绍。


  ### 哈希警告


  当哈希连接没有足够的内存来创建其哈希表时，会产生哈希警告。哈希连接的工作原理是在内存中创建一个称为生成输入的哈希表。连接的第二个输入（称为探测输入）将被读取并与哈希表进行比较，返回匹配的行。查询优化器将选择两个连接表中较小的一个作为生成输入，并且通常能正确估计其哈希表所需的内存量。如果估计不正确，查询处理器甚至可以在执行时反转这两个角色，选择新的较小输入作为生成输入。


  但是，当对此哈希表所需内存的估计不佳时，仍然可能出现性能问题。由于查询可能没有分配足够的内存，可能需要 SQL Server 在 `tempdb` 中使用一个工作文件。


  当生成输入无法容纳在可用内存中时，SQL Server 必须首先将其行分成多个分区，分别进行处理。如果其中任何分区仍然无法容纳在可用内存中，它们将被分成子分区，并再次分别处理。此拆分过程将持续进行，直到每个分区都能容纳在可用内存中，或者达到最大递归级别。最大递归级别在事件的
  `recursion_level` 列（或 SQL 跟踪中的 `IntegerData` 列）中显示，并对应于生成输入被子分区的次数。此整个过程称为哈希递归。


  当哈希递归达到最大递归级别时，查询处理器将尝试使用称为哈希中止的不同过程来处理剩余数据。SQL Server 将在执行期间使用 `hash_warning_type`
  事件列（或 `Hash Warning` 跟踪事件中的 `EventSubClass` 列）显示使用的是哈希递归还是哈希中止。


  与前面讨论的排序警告类似，`hash_warning` 扩展事件提供了额外的故障排除数据，例如包括实际唯一哈希行数、授予的内存量、使用的内存量，以及从工作表读取和写入的页数。


  要避免哈希警告问题，除了前面提到的关于统计信息的一般建议外，你可以尝试使用不同的连接类型。或者，如果你服务器上的内存有限，可以增加可用内存。使用不同的连接类型可能需要使用查询提示，并且应仔细测试以验证其是否确实提高了查询性能。


  ### 交换警告


  最后，交换警告比其他两种更少见，它发生在并行计划中的通信缓冲区被临时写入 `tempdb` 数据库时。如第 1 章所述，交换运算符负责通过同时使用多个处理器执行查询来实现
  SQL Server 中的并行。交换警告问题仅在你有多个有序范围扫描的情况下发生。在这种情况下，你可以尝试避免使用 `ORDER BY` 子句，尝试避免多个范围扫描，尝试使用索引提示以不同的方式访问表，甚至极端情况下避免并行计划，例如使用
  `MAXDOP` 查询提示。



  '
- "# 第三部分 监控\n\n## 监控磁盘空间\n\n虽然监控 `tempdb` 上的磁盘空间本身并不直接属于性能范畴，但看到意外的大量磁盘空间使用情况有时可能是性能问题或其他问题的征兆。`tempdb`\
  \ 中大多数与磁盘空间相关的问题是由版本控制引起的（当使用两种快照隔离中的任何一种时），或者由排序或哈希联接创建的内部对象引起，这已在上一节中介绍过。\n\n\
  你可以使用 `sys.dm_db_file_space_usage` 动态管理视图（DMV）来返回数据库中每个文件的空间使用情况信息。事实上，在较早版本的 SQL\
  \ Server 中，此 DMV 仅适用于 `tempdb`，但后来被扩展到包含每个数据库的信息，尽管内部对象和版本存储相关的列仍然仅适用于 `tempdb`。以下查询通常用于报告不同对象使用的空间：\n\
  \n```sql\nUSE tempdb\nGO\nSELECT\nSUM (user_object_reserved_page_count) * 1.0 /\
  \ 128 as user_object_mb,\nSUM (internal_object_reserved_page_count) * 1.0 / 128\
  \ as internal_objects_mb,\nSUM (version_store_reserved_page_count) * 1.0 / 128 \
  \ as version_store_mb,\nSUM (unallocated_extent_page_count) * 1.0 / 128 as free_space_mb,\n\
  SUM (mixed_extent_page_count) * 1.0 / 128 as mixed_extents_mb\nFROM sys.dm_db_file_space_usage\n\
  ```\n\n有时，你可能需要查找可能导致磁盘空间问题的特定进程。在这种情况下，你可以使用 `sys.dm_db_task_space_usage` DMV，它按任务返回页面分配和释放活动，并且仅适用于\
  \ `tempdb` 数据库。一个示例是以下查询，借鉴了本章摘要中提到的 `tempdb` 白皮书：\n\n```sql\nSELECT t1.session_id,\
  \ t1.request_id, t1.task_alloc,\nt1.task_dealloc, t2.sql_handle, t2.statement_start_offset,\n\
  t2.statement_end_offset, t2.plan_handle\nFROM (SELECT session_id, request_id,\n\
  SUM(internal_objects_alloc_page_count) AS task_alloc,\nSUM (internal_objects_dealloc_page_count)\
  \ AS task_dealloc\nFROM sys.dm_db_task_space_usage\nGROUP BY session_id, request_id)\
  \ AS t1,\nsys.dm_exec_requests AS t2\nWHERE t1.session_id = t2.session_id\nAND (t1.request_id\
  \ = t2.request_id)\nORDER BY t1.task_alloc DESC\n```\n\n## 总结\n\n`tempdb` 是一个特殊的系统数据库，它与\
  \ SQL Server 实例上的所有数据库和活动共享，用于保存临时对象或中间结果集。在本章中，我们从 SQL Server 性能角度介绍了 `tempdb`。向读者推荐的另一份资料是\
  \ Microsoft 白皮书《在 SQL Server 2005 中使用 tempdb》，尽管它涵盖的是较旧版本的 SQL Server，但仍包含大量相关且有用的信息。你可以在以下网址找到这份白皮书：[`https://technet.microsoft.com/en-us/library/cc966545.aspx`](https://technet.microsoft.com/en-us/library/cc966545.aspx)。\n\
  \n与 `tempdb` 相关的两个最常见的性能问题是分配页的闩锁争用，以及当某些查询处理器操作（如排序、哈希联接或使用范围扫描的交换）没有足够内存时发生的 `tempdb`\
  \ 溢出。SQL Server 2016 引入的新默认设置有助于避免或最小化 `tempdb` 争用问题，方法是在安装期间自动配置多个数据文件，并包含了以前版本需要显式配置跟踪标志\
  \ 1117 和 1118 的行为。\n\n此外，SQL Server 2019 引入的内存优化 tempdb 元数据是多年来最有前途的 tempdb 新功能。此功能旨在通过将\
  \ tempdb 系统表移动到无闩锁的非持久化内存优化表中来消除元数据争用。\n\n## 5. 分析等待统计信息\n\n当特定问题缺乏信息时，我用于故障排除性能问题的主要建议之一是运行\
  \ SQL 跟踪或扩展事件会话以找出最耗资源的查询。此方法通常会根据一个或多个指标（包括持续时间、CPU 使用率、逻辑读和物理读、写入、行数等）向我们显示最耗资源的查询。很多时候选择的指标是持续时间，即查询执行所需的时间。我们通常假设整个持续时间都是有效工作，当然这可以优化。在许多情况下，这种方法可以找到有问题的查询，调整它们就能解决性能问题。\n\
  \n然而，在这个持续时间指标中隐藏或不明显的是，查询执行有效工作花了多少时间，以及什么都不做（基本上是在等待其他事情发生）花了多少时间。了解这两个值很重要，因为两者都可以被优化或处理。例如，一个查询可能显示持续时间为\
  \ 30 秒——20 秒用于工作（例如扫描表），剩下的 10 秒用于等待系统资源或被阻塞。查询调优者通常会忽略等待部分，并且他们只能优化工作部分，因为大多数工具只显示那部分信息。例如，他们可以轻松地在执行计划中找到表扫描，而使用索引查找可能更合适。\n\
  \n同样正确的是，有时优化工作部分也可能间接优化等待部分，但并非总是如此。阻塞可能仍在发生，所以我们可能只解决了一半的问题。在其他一些情况下，等待可能主导持续时间，因此优化其他领域只会带来适度的性能改进。这些情况表明，为什么等待分析是性能故障排除的重要组成部分。总之，性能问题的发生是因为\
  \ SQL Server 要么执行了过多的工作，要么可能什么都没做，只是等待资源可用的时间太长。虽然一个查询长时间等待并不真正使用资源，但它对最终用户来说会显得很慢。\n\
  \n幸运的是，SQL Server 会跟踪数据库引擎中发生的每次等待，这些信息可以通过多种方式获得。虽然该信息在产品的所有版本中都可用，但本章展示的 DMV 和技术是在\
  \ SQL Server 2005 及更高版本中引入的。\n\n等待性能调优方法，也称为故障排除等待和队列，是一种广泛使用的调优方法，最初由 Tom Davidson\
  \ 的 Microsoft 白皮书《SQL Server 2005 Waits and Queues》引入，你仍然可以在 [`https://technet.microsoft.com/en-us/library/cc966413.aspx`](https://technet.microsoft.com/en-us/library/cc966413.aspx)\
  \ 找到。\n\n一旦我们知道 SQL Server 在等待什么，我们应该拥有解决问题所需的所有信息，对吗？不幸的是，事情并非那么简单。等待和队列性能方法通常需要一些经验和来自其他来源的额外分析，包括查看系统范围内的性能数据。等待在\
  \ SQL Server 中随时发生。事实上，即使有大量的等待通常也不意味着存在问题。在许多情况下，SQL Server 等待某些东西是完全正常的。一些特定的等待，通常称为良性等待，可以始终被忽略，因此将它们从我们的分析中过滤掉也很重要。\n\
  \n当我们获得等待信息时，我们通常只得到一个数字，因此挑战在于知道等待何时是异常或过度的。在大多数情况下，你必须将等待信息与你可以从 SQL Server 的各种来源（包括\
  \ DMV、性能计数器、SQL 跟踪、扩展事件等）获得的其他一些信息关联起来，然后解释和关联所得的数据。\n\n\n\n### 引言\n\n第 1 章介绍了 SQLOS\
  \ 并解释了 SQL Server 使用的是一个**非抢占式调度器**。在这种调度器中，任务会周期性地主动释放控制权，并且只要其**时间量子**允许，就会一直运行，直到它在某个同步对象上被挂起。我们还了解到，在少数情况下，当任务运行\
  \ SQL Server 域之外的代码时，它可以在抢占模式下运行。这两种情况都体现在图 5-1 中，该图展示了第 1 章已解释过的任务执行过程。在本章中，我们将扩展此主题，并解释该任务执行过程如何契合**等待与队列**性能方法论。\n\
  \n![../images/393702_2_En_5_Chapter/393702_2_En_5_Fig1_HTML.jpg](img/393702_2_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1**\n任务执行过程\n\n从用户的角度来看，一个请求似乎总是在运行。毕竟，当我们运行一个查询时，它看起来一直在执行。但是，如图 5-1 所示，一个请求有时在运行，有时在等待。当它运行时，它正在使用处理器时间执行有用的工作。当它被挂起时，它在等待某物——可能是一个资源，可能是一个同步对象——或者可能在等待分配工作。此时，任务被称为处于**等待者列表**中。当它**可运行**时，任务已准备好执行，但它首先必须等待分配给它的处理器时间片，这被称为处于**可运行队列**中。在可运行队列中等待处理器时间所花费的时间称为**信号等待时间**。当这些部分中的任何一个耗时过长，无论是运行还是等待，理解其原因都非常重要，因为在这两种情况下都可能存在改进的可能。SQL\
  \ Server 会跟踪关于请求为何等待、等待了多久以及在等待什么的所有信息。\n\n正如第 1 章所述，SQL Server 为每个逻辑处理器配备一个调度器，此外，还有一些用于内部任务的隐藏调度器，以及一个用于\
  \ DAC（专用管理员连接）的调度器。你可以通过查看`sys.dm_os_schedulers`动态管理视图（DMV）的`status`列来识别它们。该 DMV\
  \ 中一个有趣的列是`quantum_length_us`，它显示了调度器使用的时间量子，通常为 4 毫秒（或 4000 微秒）。另外，请记住图 5-1 只展示了一个调度器或逻辑处理器。在一个拥有八个逻辑处理器的系统上，相同的流程会发生八次，可能同时有八个任务在运行并使用\
  \ CPU，以及八个等待者列表和可运行队列。\n\n一个特殊情况（也在图 5-1 中标出）是从“运行”到“可运行”的转换。当一个任务用完了它的时间量子而无需等待任何资源时，就可能发生这种情况。SQL\
  \ Server 的代码被设计用于检测代码中可能发生这种情况的区域，并在时间量子达到极限（通常为四毫秒）时，通过编程使其自愿让出处理器时间。即使该任务是系统中唯一的用户任务，它也必须让出时间，这在活动系统中显然并不常见。即使在几乎空闲的系统上，也存在其他作为后台系统进程运行的进程。\n\
  \n从技术上讲，你可以使用`sys.dm_os_waiting_tasks` DMV 查看等待者列表。与稍后讨论的可运行队列不同，等待者列表没有任何特定的顺序，任务可以在任何时刻到达，并且由于它们等待的资源可能在任何时候变得可用，它们也可以随时停止等待并离开列表。一旦资源可用，任务将被发出信号，被放置到可运行队列的末尾。`sys.dm_os_waiting_tasks`\
  \ DMV 的`resource_description`列显示了任务正在等待的资源，该列可能包含大量可能的值，这些值在 [`https://msdn.microsoft.com/en-us/library/ms188743.aspx`](https://msdn.microsoft.com/en-us/library/ms188743.aspx)\
  \ 上有很好的文档说明。\n\n可运行队列通常作为一个先进先出（FIFO）列表工作，这意味着任务被放入此队列并按照它们到达的顺序得到服务。唯一的例外是当配置了资源调控器来改变此优先级时，但那是一种特殊配置，并不常见。`sys.dm_os_schedulers`\
  \ DMV 上的`runnable_tasks_count`列显示了特定调度器的可运行队列上的工作线程数。\n\n图 5-1 所示的任务执行过程将持续到查询执行完成，除了少数查询被取消、超时或因某些其他原因无法完成的情况。下一章将介绍的新功能**查询存储**，也允许你在需要对这些查询进行故障排除时跟踪它们。\n\
  \n任务执行状态（运行、可运行或挂起）可以通过`sys.dm_exec_requests`的`status`列显示，正如第 1 章所述，该视图返回有关 SQL\
  \ Server 中正在执行的每个请求的信息。SQL Server 中还有两种额外的任务执行状态：**后台**和**睡眠**。“后台”用于后台系统进程。“睡眠”可以用于任何连接（无论是用户进程还是系统进程），这些连接已完成工作，当前已连接但未积极工作或正等待工作。如前所述，等待信息可在多个\
  \ DMV 和其他来源中找到，并将在下一节详细说明。\n\n如前所述，等待在 SQL Server 中随时发生，你可以通过多种方式查看此信息，包括运行`sys.dm_exec_requests`\
  \ DMV。让我们构建一个简单的示例来向你展示如何获取此信息。打开一个 SQL Server Management Studio 会话并运行以下语句：\n\n\
  ```sql\nBEGIN TRANSACTION\nUPDATE Sales.SalesOrderDetail\nSET OrderQty = 5\nWHERE\
  \ SalesOrderDetailID = 121317\n```\n\n请注意，一个事务已启动但尚未提交或回滚。打开另一个会话并运行：\n\n```sql\n\
  SELECT * FROM Sales.SalesOrderDetail\nWHERE SalesOrderDetailID = 121317\n```\n\n\
  然后打开第三个会话并运行：\n\n```sql\nSELECT * FROM Sales.SalesOrderDetail\nORDER BY OrderQty\n\
  ```\n\n由于第一个会话在`Sales.SalesOrderDetail`表上持有一个未提交事务的锁，另外两个会话将被阻塞。在一个新的会话上运行：\n\n\
  ```sql\nSELECT * FROM sys.dm_exec_requests r JOIN sys.dm_exec_sessions s\nON r.session_id\
  \ = s.session_id\nWHERE s.is_user_process = 1\n```\n\n**注意**\n\n我们与`sys.dm_exec_sessions`进行连接的唯一原因是使用`is_user_process`列，该列指示会话是系统进程还是用户进程。我们不能再像在之前版本的\
  \ SQL Server 中那样仅仅依赖`session_id`值。\n\n你应该会看到类似以下内容（为适应页面进行了汇总）：\n\n| session_id\
  \ | status | Command | blocking_session_id | wait_type | last_wait_type | wait_resource\
  \ |\n| --- | --- | --- | --- | --- | --- | --- |\n| 59 | suspended | SELECT | 55\
  \ | LCK_M_S | LCK_M_S | KEY: 5:72057594057588736 (722affd45fb5) |\n| 64 | running\
  \ | SELECT | 0 | NULL | MEMORY_ALLOCATION_EXT |   |\n| 65 | suspended | SELECT |\
  \ 0 | CXPACKET | CXPACKET |   |\n\n\n\n## 会话阻塞场景分析\n\n会话 55 正在阻塞会话 59。（它也阻塞着 65，但此处未显示，稍后详述。）会话\
  \ 59 是第一个 `SELECT`，正在等待 `KEY` 资源。会话 65 是第二个 `SELECT`，正在等待 `CXPACKET`。会话 55 是未提交的事务，它甚至没有出现在\
  \ `sys.dm_exec_requests` 中，因为从技术上讲它当前没有执行任何操作。`UPDATE` 语句已完成，但事务仍未关闭。会话 59 和 65\
  \ 处于挂起状态并位于等待者列表中。即使在这个拥有四个处理器的系统中，也只有一个任务（64，即正在运行 DMV 的会话）在运行。\n\n在第一个会话上运行以下语句：\n\
  \n```\nROLLBACK TRANSACTION\n```\n\n> **注意**\n> 在使用 `sys.dm_exec_requests` DMV 分析等待时，一个主要限制是在分析并行查询时。此\
  \ DMV 每个会话只显示一条记录，因此它只显示父任务的信息，而不显示子任务的信息。本章稍后将提供一种解决并行查询问题的替代方案。\n\n事务回滚后可能发生多种情况；我将简要描述我捕获到的情况。实际上，这是一个非常简化的示例。在执行这些任务期间会发生更多等待，如下一节所示，如果需要详细的等待信息，SQL\
  \ Server 提供了捕获这些等待的方法。\n\n事务回滚后，会话 59 所需的 `KEY` 资源变为可用，因此会话 59 被唤醒并置于可运行队列中。最终，会话\
  \ 59 获得处理器时间并能够完成其工作。会话 59 有可能再次等待其他资源，但通过手动运行此 DMV 很难捕获这些等待。然而，如前所述，可以通过其他方法捕获。\n\
  \n会话 65 也得以继续。一旦它等待的资源可用，它就被置于可运行队列中，最终获得处理器时间并继续运行。由于这是一个更昂贵的查询，它很可能发生了更多等待，并可能多次被置于等待者列表和可运行队列中。我捕获到的是会话\
  \ 65 在 `ASYNC_NETWORK_IO` 上的等待者列表中。此查询请求的排序可能运行得足够快，以至于您可能看不到它，或者您可能会看到其他等待。可运行状态可能非常短暂，除非您查看更繁忙的系统，否则无法捕获它。\n\
  \n| session_id | status   | command | blocking_session_id | wait_type         |\
  \ last_wait_type    | wait_resource |\n| ---------- | -------- | ------- | -------------------\
  \ | ----------------- | ----------------- | ------------- |\n| 64         | running\
  \  | SELECT  | 0                   | NULL              | MEMORY_ALLOCATION_EXT |\
  \               |\n| 65         | suspended| SELECT  | 0                   | ASYNC_NETWORK_IO\
  \  | ASYNC_NETWORK_IO  |               |\n\n最后，如果再次运行 DMV，两个 `SELECT` 语句都将完成，因此您将不再看到\
  \ DMV 的任何输出，除了运行 DMV 的会话 64。\n\n这个简化场景总结在图 5-2 中，其中包括了另外两个会话（52 和 53），它们未在 DMV 中捕获，但为完整起见而显示，因为在仅包含少量事务的示例中捕获可运行任务很困难。\n\
  \n![任务执行过程示例](img/393702_2_En_5_Fig2_HTML.jpg)\n\n**图 5-2** 任务执行过程示例\n\n在图 5-2 中，spid\
  \ 64 最初正在执行，spid 52 位于可运行队列顶部。在 spid 64 完成（或因任何原因离开运行状态）后，spid 52 从可运行状态转为运行状态，而\
  \ spid 53 现在位于可运行队列顶部。由于 spid 59 等待的锁现已可用，它被唤醒并移动到可运行队列末尾。在短时间内，spid 65 仍位于等待者列表中，如图\
  \ 5-2 所示，但由于它间接等待与 59 相同的资源，它最终也将被移动到可运行队列。\n\n## 系统进程的等待\n\n您可能已经注意到我们过滤掉了系统进程。SQL\
  \ Server 还有一些专用线程，我们通常不应该担心它们的等待。例如，在检查等待类型和等待时间的同时，运行以下查询几次：\n\n```\nSELECT * FROM\
  \ sys.dm_exec_requests\nWHERE wait_type = 'REQUEST_FOR_DEADLOCK_SEARCH'\n```\n\n\
  死锁监视器通常在两次死锁检测事件之间等待 `REQUEST_FOR_DEADLOCK_SEARCH` 等待类型，最长可达五秒。`wait_time` 永远不会超过五秒（以毫秒计）。`command`\
  \ 列显示内部系统进程执行的任务类型，本例中是 `LOCK MONITOR`。还有其他几个具有类似等待的系统进程，如稍后的“计时器等待类型”部分所示。\n\n\
  尽管在 `sys.dm_exec_requests` 上显示的等待时间会被重置，但它实际上会被累积并可在 `sys.dm_os_wait_stats` 中获取。例如，以下查询\n\
  \n```\nSELECT * FROM sys.dm_os_wait_stats\nWHERE wait_type = 'REQUEST_FOR_DEADLOCK_SEARCH'\n\
  ```\n\n可能显示以下输出。\n\n| wait_type                  | waiting_tasks_count | wait_time_ms\
  \ | max_wait_time_ms | signal_wait_time_ms |\n| -------------------------- | -------------------\
  \ | ------------ | ---------------- | ------------------- |\n| REQUEST_FOR_DEADLOCK_SEARCH\
  \ | 20                  | 100118       | 5014             | 100118             \
  \ |\n\n此信息显示时间被重置了 20 次；换句话说，发生了 20 次独立的等待，最大等待时间为 5014 毫秒。由于该进程并非严格等待某个资源，信号等待时间与等待时间相同。\n\
  \n## 等待信息的收集\n\n尽管我们可以在 `sys.dm_exec_requests` 和 `sys.dm_os_waiting_tasks` 上看到与等待相关的信息，但这些\
  \ DMV 主要侧重于实时信息，或者在我们需要关于当前正在执行的特定进程的数据时非常有用。很多时候，我们希望累积统计等待信息或收集这些信息以供后续分析。主要有三种方法可以实现此目标：使用\
  \ `sys.dm_os_waits` DMV、SQL Server 扩展事件，以及 SQL Server 2016 引入的 `sys.dm_exec_session_wait_stats`\
  \ DMV。让我们逐一回顾，并了解在何种场景下每种方法可能是最佳选择。\n\n\n### sys.dm_os_wait_stats\n\n`sys.dm_os_wait_stats`\
  \ 动态管理视图一直是获取 SQL Server 实例等待信息的传统方式。即使该 DMV 是在 SQL Server 2005 中引入的，相同的信息在更早的版本中也可以通过使用已弃用且不再文档化的\
  \ DBCC `SQLPERF('waitstats')` 语句获取，该语句在当前版本中仍然有效。你可以通过运行以下语句直接获取等待信息，但通常我们希望进行额外的过滤和数据聚合，如下文所示：\n\
  \n```\nSELECT * FROM sys.dm_os_wait_stats\n```\n\n你也可以查询以下目录视图来列出可用的等待类型：\n\n```\n\
  SELECT * FROM sys.dm_xe_map_values WHERE name = 'wait_types'\n```\n\n`sys.dm_os_wait_stats`\
  \ DMV 显示自 SQL Server 实例上次启动或等待统计信息上次清除以来发生的所有等待。它列出了所有可用的等待类型，甚至包括那些尚未发生等待的类型，对于这些类型，等待时间和计数值将为\
  \ 0。SQL Server 2019 中该 DMV 显示 1080 个等待类型，其中大量是未文档化的。由于此 DMV 返回的是数值，你需要将其与其他信息结合使用，例如与基线比较、与不同时间点的快照比较，并可能进行额外分析以从中获取价值。例如，`wait_time_ms`\
  \ 的值 10808265 是好是坏？\n\n`sys.dm_os_wait_stats` 与 `sys.dm_exec_requests` 和 `sys.dm_os_waiting_tasks`\
  \ 的另一个区别在于，后两者显示的是仍在进行中的等待信息，而 `sys.dm_os_wait_stats` 仅在等待完成后才累积信息。例如，如果你多次刷新前面提到的使用\
  \ `sys.dm_exec_requests` 的查询，你会注意到 `CXPACKET` 和 `LCK_M_S` 的等待时间会随着进程被另一个会话阻塞而持续增加。一旦等待完成，等待统计信息将被记录到\
  \ `sys.dm_os_wait_stats` 中。\n\nSQL Server 文档传统上将等待分为三类：\n\n#### Resource\n\n任务正在等待一个不可用或正被其他任务（如\
  \ I/O、锁或闩锁）使用的资源。\n\n#### Queue\n\n任务正在等待分配工作。通常用于系统后台任务。\n\n#### External\n\n任务正在等待外部进程完成，例如链接服务器查询或扩展存储过程。\n\
  \n其他一些来源增加了其他类别，如 I/O（在我们的例子中属于 Resource 类别），或将锁和闩锁分离到它们自己的同步类别中。\n\n`sys.dm_os_wait_stats`\
  \ DMV 包含以下列：\n\n*   `wait_type`: 等待类型，大多数在 [`https://msdn.microsoft.com/en-us/library/ms179984.aspx`](https://msdn.microsoft.com/en-us/library/ms179984.aspx)\
  \ 上有文档。我将在本章后面介绍最重要的几种。\n*   `waiting_tasks_count`: 指定等待类型的等待次数。\n*   `wait_time_ms`:\
  \ 总等待时间（毫秒）。此时间包括下文描述的信号等待时间。\n*   `max_wait_time_ms`: 指定等待类型的最大等待时间（毫秒）。\n*   `signal_wait_time_ms`:\
  \ 信号等待时间（毫秒）。如前所述，这是任务在可运行队列中等待处理器时间的时间。\n\n有许多等待类型无需关注，在收集或聚合等待信息时将其过滤掉是典型做法。以下是一个此类查询的示例：\n\
  \n```\nSELECT\nwait_type,\nwait_time_ms,\nwait_time_ms * 100.0 / SUM(wait_time_ms)\
  \ OVER() AS percentage,\nsignal_wait_time_ms * 100.0 / wait_time_ms as signal_pct\n\
  FROM sys.dm_os_wait_stats\nWHERE wait_time_ms > 0\nAND wait_type NOT IN (\n'BROKER_DISPATCHER',\
  \ 'BROKER_EVENTHANDLER',\n'BROKER_RECEIVE_WAITFOR', 'BROKER_TASK_STOP',\n'BROKER_TO_FLUSH',\
  \ 'BROKER_TRANSMITTER',\n'CHECKPOINT_QUEUE', 'CHKPT',\n'CLR_AUTO_EVENT', 'CLR_MANUAL_EVENT',\n\
  'CLR_SEMAPHORE', 'DBMIRROR_DBM_EVENT',\n'DBMIRROR_DBM_MUTEX', 'DBMIRROR_EVENTS_QUEUE',\n\
  'DBMIRROR_WORKER_QUEUE', 'DBMIRRORING_CMD',\n'DIRTY_PAGE_POLL', 'DISPATCHER_QUEUE_SEMAPHORE',\n\
  'EXECSYNC', 'FSAGENT',\n'FT_IFTS_SCHEDULER_IDLE_WAIT', 'FT_IFTSHC_MUTEX',\n'HADR_CLUSAPI_CALL',\
  \ 'HADR_FILESTREAM_IOMGR_IOCOMPLETION',\n'HADR_LOGCAPTURE_WAIT', 'HADR_NOTIFICATION_DEQUEUE',\n\
  'HADR_TIMER_TASK', 'HADR_WORK_QUEUE',\n'KSOURCE_WAKEUP', 'LAZYWRITER_SLEEP',\n'LOGMGR_QUEUE',\
  \ 'ONDEMAND_TASK_QUEUE',\n'PWAIT_ALL_COMPONENTS_INITIALIZED', 'QDS_ASYNC_QUEUE',\n\
  'QDS_PERSIST_TASK_MAIN_LOOP_SLEEP', 'QDS_SHUTDOWN_QUEUE',\n'QDS_CLEANUP_STALE_QUERIES_TASK_MAIN_LOOP_SLEEP',\
  \ 'REQUEST_FOR_DEADLOCK_SEARCH',\n'RESOURCE_QUEUE', 'SERVER_IDLE_CHECK',\n'SLEEP_BPOOL_FLUSH',\
  \ 'SLEEP_BUFFERPOOL_HELPLW',\n'SLEEP_DBSTARTUP', 'SLEEP_DCOMSTARTUP',\n'SLEEP_MASTERDBREADY',\
  \ 'SLEEP_MASTERMDREADY',\n'SLEEP_MASTERUPGRADED', 'SLEEP_MSDBSTARTUP',\n'SLEEP_SYSTEMTASK',\
  \ 'SLEEP_TASK',\n'SLEEP_TEMPDBSTARTUP', 'SLEEP_WORKSPACE_ALLOCATEPAGE',\n'SNI_HTTP_ACCEPT',\
  \ 'SP_SERVER_DIAGNOSTICS_SLEEP',\n'SQLTRACE_BUFFER_FLUSH', 'SQLTRACE_INCREMENTAL_FLUSH_SLEEP',\n\
  'SQLTRACE_WAIT_ENTRIES', 'WAIT_FOR_RESULTS',\n'WAITFOR', 'WAITFOR_TASKSHUTDOWN',\n\
  'WAIT_XTP_HOST_WAIT', 'WAIT_XTP_OFFLINE_CKPT_NEW_LOG',\n'WAIT_XTP_CKPT_CLOSE', 'XE_DISPATCHER_JOIN',\n\
  'XE_DISPATCHER_WAIT', 'XE_TIMER_EVENT')\nORDER BY percentage DESC\n```\n\n收集等待信息的一个绝佳选择是启用\
  \ SQL Server 数据收集功能，该功能随 SQL Server 2008 引入。此功能不仅可以收集等待信息，还可以收集各种性能信息并将其持久化到数据库中。它还包括多个图表和报告来呈现收集的数据。图\
  \ 5-3 展示了一个部分数据收集报告的示例，其中等待统计信息按多个类别进行了聚合。有关启用和使用数据收集功能的更多详细信息，请参阅 SQL Server 文档。\n\
  \n![`../images/393702_2_En_5_Chapter/393702_2_En_5_Fig3_HTML.jpg`](img/393702_2_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3\n\n数据收集 SQL Server 等待报告\n\n最后，可以使用以下语句清除等待统计信息，尽管这可能并不总是可取的，因为这些历史信息可能被其他工具使用：\n\
  \n```\nDBCC SQLPERF('sys.dm_os_wait_stats', CLEAR)\n```\n\n当 SQL Server 重新启动时，等待显然也会被清除。可以使用\
  \ `sys.dm_os_performance_counters` DMV 上的“SQL Server 等待统计信息”对象获取有关等待的额外信息，例如：\n\n\
  ```\nSELECT * FROM sys.dm_os_performance_counters\nWHERE object_name = 'SQLServer:Wait\
  \ Statistics'\n```\n\n前面的查询适用于 SQL Server 默认实例。如果你有一个命名实例，则需要相应地替换实例名，使得 `object_name`\
  \ 的 SQLServer 前缀变为 `MSSQL$<instance>`。如果不确定如何指定实例名，可以尝试以下查询：\n\n```\nSELECT * FROM\
  \ sys.dm_os_performance_counters\nWHERE object_name like '%Wait Statistics%'\n```\n\
  \n`sys.dm_os_performance_counters` DMV 上可用的信息需要额外处理才能正确解释，如第 8 章所述。\n\n\n#### sys.dm_exec_session_wait_stats\n\
  \n`sys.dm_exec_session_wait_stats` 是在 SQL Server 2016 中引入的，它最终提供了一种长期以来需要的方法来查找每个会话的等待情况，而在此之前，这可能需要运行一个潜在的、开销很大的\
  \ SQL Server 扩展事件会话。该 DMV 中的列与 `sys.dm_os_wait_stats` 完全相同。与 `sys.dm_os_wait_stats`\
  \ 类似，但不同于 `sys.dm_exec_requests` 和 `sys.dm_os_waiting_tasks`，此 DMV 仅报告已完成的等待。例如，如果一个任务等待资源\
  \ 3000 毫秒，后两个 DMV 可能报告部分进度，比如 1500 或 2500 毫秒，但 `sys.dm_exec_session_wait_stats`\
  \ 只会在任务仍在等待时报告 0，或者在等待完成时报告 3000 毫秒。下一个示例将检查会话 52 的已完成等待。\n\n```sql\nSELECT * FROM\
  \ sys.dm_exec_session_wait_stats\nWHERE session_id = 52\n```\n\n#### 扩展事件\n\nSQL\
  \ Server 中有三个与等待相关的扩展事件：`wait_completed`、`wait_info` 和 `wait_info_external`。`wait_completed`\
  \ 和 `wait_info` 非常相似，并且共享大部分字段。它们都捕获系统中发生的等待，但 `wait_info` 会在等待开始时和等待结束时都捕获信息，这由字段\
  \ `opcode`（其值为 “Begin” 和 “End”）定义。`wait_completed` 只捕获已完成的等待。其他常见字段是 `duration`\
  \ 和 `signal_duration`（分别是持续时间和信号持续时间，以毫秒为单位），以及 `wait_resource` 和 `wait_type`（分别是等待所依据的资源和等待类型）。当发生调度器让出操作以及线程再次获得处理器时间时，也会产生\
  \ `wait_info`。`wait_info_external` 则是在 SQL Server 以抢占模式运行外部任务时产生。\n\n如前所述，等待在 SQL\
  \ Server 中无时无刻不在发生，即使是在未执行任何用户查询的空闲系统上也是如此。在捕获这些事件时应极其小心，因为它可能会生成大量数据。你应该只进行短时间的故障排除，或尽可能过滤掉等待。\n\
  \n让我们运行以下练习来查看其中一些等待。首先，为 `wait_info` 事件创建一个新的扩展事件会话。（确保根据你的测试环境使用正确的驱动器和文件夹。）你可能希望收集整个实例的等待，或指定筛选器以限制事件数量。在本例中，你希望查看特定查询的等待，因此一个好的筛选器可以是你的会话\
  \ ID。在你的会话中找到 `spid` 并在以下创建名为 `waits` 的扩展事件会话的语句中相应替换。\n\n```sql\nCREATE EVENT SESSION\
  \ waits ON SERVER\nADD EVENT sqlos.wait_info (\nWHERE (sqlserver.session_id = 58))\n\
  ADD TARGET package0.event_file\n(SET FILENAME = 'C:\\data\\waits.xel')\n```\n\n\
  然后启动会话，运行你想要分析的查询（在本例中是一个排序语句），然后关闭会话。\n\n```sql\nALTER EVENT SESSION waits ON SERVER\
  \ STATE = START\nGO\nUSE AdventureWorks2017\nGO\nSELECT * FROM Sales.SalesOrderDetail\n\
  ORDER BY OrderQty\nGO\nALTER EVENT SESSION waits ON SERVER STATE = STOP\n```\n\n\
  以下语句将显示捕获的数据。例如，我的测试系统只显示了几千个事件。\n\n```sql\nSELECT *, CAST(event_data AS XML) AS\
  \ 'event_data'\nFROM sys.fn_xe_file_target_read_file('C:\\data\\waits*.xel', NULL,\
  \ NULL, NULL)\n```\n\n仅作参考，我捕获的数据中某个事件的 `event_data` 列如下所示：\n\n```\n<event name=\"\
  wait_info\" package=\"sqlos\" timestamp=\"2023-10-27T10:00:00.000Z\">\n  <data name=\"\
  wait_type\">\n    <type name=\"wait_type\" package=\"package0\"/>\n    <value>CXPACKET</value>\n\
  \    <text>CXPACKET</text>\n  </data>\n  <data name=\"opcode\">\n    <type name=\"\
  wait_opcode\" package=\"sqlos\"/>\n    <value>1</value>\n    <text>End</text>\n\
  \  </data>\n  <data name=\"duration\">\n    <type name=\"uint64\" package=\"package0\"\
  />\n    <value>3000</value>\n  </data>\n  <data name=\"signal_duration\">\n    <type\
  \ name=\"uint64\" package=\"package0\"/>\n    <value>100</value>\n  </data>\n  <data\
  \ name=\"wait_resource\">\n    <type name=\"binary_data\" package=\"package0\"/>\n\
  \    <value>0x0000007128e19ec0</value>\n  </data>\n</event>\n```\n\n你可以看到前面提到的 `wait_info`\
  \ 事件的字段。在本例中，等待类型是 `CXPACKET`，`opcode` 是 `End`，并且捕获了一些 `duration`、`signal_duration`\
  \ 和 `wait_resource` 的值。\n\n让我们将数据保存到一个临时表中，以便更容易进行一些额外处理：\n\n```sql\nCREATE TABLE\
  \ #waits (\nevent_data XML)\nGO\nINSERT INTO #waits (event_data)\nSELECT CAST (event_data\
  \ AS XML) AS event_data\nFROM sys.fn_xe_file_target_read_file (\n'C:\\data\\waits*.xel',\
  \ NULL, NULL, NULL)\n```\n\n最后，运行以下查询以执行一些聚合：\n\n```sql\nSELECT\n    waits.wait_type,\n\
  \    COUNT (*) AS wait_count,\n    SUM (waits.duration) AS total_wait_time_ms,\n\
  \    SUM (waits.duration) - SUM (waits.signal_duration) AS total_resource_wait_time_ms,\n\
  \    SUM (waits.signal_duration) AS total_signal_wait_time_ms\nFROM\n    (SELECT\n\
  \        event_data.value ('(/event/@timestamp)[1]', 'DATETIME') AS datetime,\n\
  \        event_data.value ('(/event/data[@name=''wait_type'']/text)[1]', 'VARCHAR(100)')\
  \ AS wait_type,\n        event_data.value ('(/event/data[@name=''opcode'']/text)[1]',\
  \ 'VARCHAR(100)') AS opcode,\n        event_data.value ('(/event/data[@name=''duration'']/value)[1]',\
  \ 'BIGINT') AS duration,\n        event_data.value ('(/event/data[@name=''signal_duration'']/value)[1]',\
  \ 'BIGINT') AS signal_duration\n    FROM #waits\n    ) AS waits\nWHERE waits.opcode\
  \ = 'End'\nGROUP BY waits.wait_type\nORDER BY total_wait_time_ms DESC\n```\n\n我的测试摘要输出（仅包含顶部事件）如下所示。\n\
  \n| 等待类型 | 等待计数 | 总等待时间（毫秒） | 总资源等待时间（毫秒） | 总信号等待时间（毫秒） |\n| --- | --- | --- | ---\
  \ | --- |\n| CXPACKET | 5301 | 11662 | 11649 | 13 |\n| NETWORK_IO | 7057 | 482 |\
  \ 478 | 4 |\n| LATCH_EX | 23 | 19 | 9 | 10 |\n| LATCH_SH | 4 | 14 | 0 | 14 |\n\n\
  最后，关闭并删除扩展事件会话，并删除临时表。\n\n```sql\nDROP EVENT SESSION waits ON SERVER\nDROP TABLE\
  \ #waits\n```\n\n在这个练习中，我们按会话 ID 进行了筛选，但你也可以按其他字段进行筛选。下一节讨论 `system_health` 会话时展示了一个示例，其默认代码按等待类型和持续时间进行筛选。\n\
  \n\n#### system_health 扩展事件会话\n\n`system_health` 会话是一个扩展事件会话，用于自动收集可用于排查性能问题的系统数据。它在每个\
  \ SQL Server 安装中默认配置，会在实例启动时自动开始并持续运行。虽然可以关闭和删除 `system_health` 会话，但不建议这样做，因为它的运行不会产生明显的性能影响。\n\
  \n`system_health` 会话收集多个领域的信息（详情请参阅 [`https://msdn.microsoft.com/en-us/library/ff877955.aspx`](https://msdn.microsoft.com/en-us/library/ff877955.aspx)），同时也会捕获多种等待类型。以下代码是\
  \ SQL Server `system_health` 的部分定义，描述了它捕获的等待类型，并基于等待时长进行了过滤：\n\n```sql\nADD EVENT\
  \ sqlos.wait_info(\nACTION(package0.callstack,sqlserver.session_id,sqlserver.sql_text)\n\
  WHERE ([duration]>(15000) AND ([wait_type]>=N'LATCH_NL' AND ([wait_type]>=N'PAGELATCH_NL'\n\
  AND [wait_type]=N'PAGEIOLATCH_NL'\nAND [wait_type]=N'IO_COMPLETION' AND\n[wait_type]=N'FCB_REPLICA_WRITE'\
  \ AND wait_type\nAND wait_type AND ([wait_type]>=N'PREEMPTIVE_OS_GENERICOPS' AND\n\
  [wait_type]=N'PREEMPTIVE_OS_INITIALIZESECURITYCONTEXT' AND\n[wait_type]=N'PREEMPTIVE_OS_AUTHZGETINFORMATIONFROMCONTEXT'\
  \ AND\n[wait_type]=N'PREEMPTIVE_OS_CRYPTACQUIRECONTEXT' AND\n[wait_type]=N'PREEMPTIVE_OS_NETGROUPGETUSERS'\
  \ AND\n[wait_type]=N'PREEMPTIVE_OS_NETVALIDATEPASSWORDPOLICYFREE' AND\nwait_type\
  \ AND\n([wait_type]>=N'PREEMPTIVE_OS_SETNAMEDSECURITYINFO' AND\n[wait_type]=N'PREEMPTIVE_OS_RSFXDEVICEOPS'\
  \ AND\n[wait_type]=N'PREEMPTIVE_OS_DTCOPS' AND\n[wait_type]=N'PREEMPTIVE_OS_CLOSEHANDLE'\
  \ AND\n[wait_type]=N'PREEMPTIVE_OS_GETCOMPRESSEDFILESIZE' AND\n[wait_type]=N'PREEMPTIVE_OS_DISCONNECTNAMEDPIPE'AND\n\
  [wait_type]<=N'PREEMPTIVE_CLOSEBACKUPMEDIA' OR\n[wait_type]=N'PREEMPTIVE_OS_AUTHENTICATIONOPS'\
  \ OR\n[wait_type]=N'PREEMPTIVE_OS_FREECREDENTIALSHANDLE' OR\n[wait_type]=N'PREEMPTIVE_OS_AUTHORIZATIONOPS'\
  \ OR\n[wait_type]=N'PREEMPTIVE_COM_COCREATEINSTANCE' OR\n[wait_type]=N'PREEMPTIVE_OS_NETVALIDATEPASSWORDPOLICY'\
  \ OR\n[wait_type]=N'PREEMPTIVE_VSS_CREATESNAPSHOT'))))\n```\n\n此外，`system_health`\
  \ 事件会话使用了 `sp_server_diagnostics_component_result`，该过程本身会收集包括部分等待信息在内的各种诊断数据和健康信息。有关\
  \ `sp_server_diagnostics_component_result` 的更多信息，请参阅 [`https://msdn.microsoft.com/en-us/library/ff878233.aspx`](https://msdn.microsoft.com/en-us/library/ff878233.aspx)。`sp_server_diagnostics_component_result`\
  \ 定义如下：\n\n```sql\nADD EVENT sqlserver.sp_server_diagnostics_component_result(SET\
  \ collect_data=(1)\nWHERE ([sqlserver].[is_system]=(1) AND component))\n```\n\n\
  最后请记住，尽管 `system_health` 会话收集的信息会被捕获到文件和环形缓冲区两种目标中，但它可能只保留最近的事件，并且这些信息不会持久化存储，而是如下面所示进行循环利用。您可能需要执行一些额外步骤才能将这些信息持久化保存到磁盘。\n\
  \n```sql\nADD TARGET package0.event_file(SET filename=N'system_health.xel',max_file_size=(5),\
  \ max_rollover_files=(4)),\nADD TARGET package0.ring_buffer(SET max_events_limit=(5000),max_memory=(4096))\n\
  ```\n\n该定义显示，文件目标的 `max_file_size`（最大文件大小，单位为兆字节）为 5 MB，`max_rollover_files`（文件系统中保留的最大文件数）为\
  \ 4，因此最大可存储 20 MB 的信息。可以使用以下查询读取文件目标：\n\n```sql\nSELECT *, CAST(event_data AS XML)\n\
  FROM sys.fn_xe_file_target_read_file('system_health*.xel', NULL, NULL, NULL)\n```\n\
  \n同样地，`system_health` 会话使用的环形缓冲区目标设置了 `max_events_limit` 为 5000，这意味着它最多在环形缓冲区中保留\
  \ 5000 个事件，当达到此限制时，较旧的事件将被丢弃。它还定义了最大内存量为 4096 千字节。默认情况下，达到这些限制时，最旧的事件会被丢弃，但另一个配置选项\
  \ `occurrence_number` 允许您根据事件类型配置在被丢弃前所保留的事件数量。\n\n您可以使用以下查询作为起点，开始检查 `system_health`\
  \ 会话捕获的信息，特别是环形缓冲区目标：\n\n```sql\nSELECT CAST(t.target_data AS xml)\nFROM sys.dm_xe_session_targets\
  \ t\nJOIN sys.dm_xe_sessions s\nON s.address = t.event_session_address\nWHERE s.name\
  \ = 'system_health'\n```\n\n**注意**\n\n如果在尝试打开 XML 列时遇到意外的文件结尾解析错误，您可能需要增加 SQL Server\
  \ Management Studio 会话中从服务器检索的 XML 数据的字符数。为此，请使用 `工具` 菜单，选择 `选项` ➤ `查询结果` ➤ `SQL\
  \ Server` ➤ `结果到网格` ➤ `检索到的最大字符数`，并将 `XML 数据` 更改为 `无限制`（默认值为 2 MB）。\n\n与 `system_health`\
  \ 会话类似，SQL Server 在多个产品版本中都提供了默认跟踪。虽然它不捕获任何等待信息，但默认跟踪会持久化记录一些主要与 SQL Server 配置选项相关的活动和更改。随着\
  \ SQL 跟踪的推出，默认跟踪已被弃用。\n\n## 示例：分析 CXPACKET 等待\n\n由于等待类型众多（截至 SQL Server 2019 已超过一千种），分析即使是最常见的几种也需要一整本书的篇幅。本章后面将描述最常见的等待类型。在本节中，我将向你展示如何对最常见的等待之一\
  \ `CXPACKET` 进行故障排查。让我们创建一个能演示此类等待的问题。\n\n### 创建演示问题\n\n如果你运行以下查询，它很可能会使用排序操作符和平行计划，毫无问题地运行几秒钟：\n\
  \n```sql\nSELECT * FROM Sales.SalesOrderDetail\nORDER BY OrderQty\n```\n\n在我的拥有四个逻辑处理器的测试系统上，我能看到一个为聚簇索引扫描和排序操作使用四个线程的并行计划。不过，假设我们遇到了一个性能问题，并且看到了\
  \ `CXPACKET` 等待。让我们通过阻塞一行来模拟等待。在另一个会话中运行此语句：\n\n```sql\nBEGIN TRANSACTION\nUPDATE\
  \ Sales.SalesOrderDetail\nSET OrderQty = 5\nWHERE SalesOrderDetailID = 121317\n\
  ```\n\n请注意，`UPDATE` 语句已完成，但事务保持打开状态。（尚未发出 `COMMIT` 或 `ROLLBACK TRANSACTION` 语句。）\n\
  \n在不同的 Management Studio 会话中再次运行之前的 `SELECT` 语句。如果你使用新的 `实时查询统计信息` 功能，可以看到它正在使用并行计划，并且该进程在排序操作符上被阻塞，如图\
  \ 5-4 所示。即使聚簇索引扫描操作符已经处理了 121,199 行，在阻塞结束前，排序操作符将永远不会处理任何行。新的 `实时查询统计信息` 功能将在下一章中更详细地介绍。\n\
  \n![../images/393702_2_En_5_Chapter/393702_2_En_5_Fig4_HTML.jpg](img/393702_2_En_5_Fig4_HTML.jpg)\n\
  \n*图 5-4：被阻塞查询的实时查询统计信息*\n\n### 分析等待统计信息\n\n使用正在运行 `SELECT ORDER BY` 语句的查询的 `session_id`\
  \ 编号运行以下语句，在我的情况下是 52：\n\n```sql\nSELECT * FROM sys.dm_exec_requests WHERE session_id\
  \ = 52\n```\n\n这是我在测试系统上得到的结果：\n\n| session_id | request_id | 状态 | 命令 | blocking_session_id\
  \ | wait_type | wait_time | last_wait_type | wait_resource |\n| --- | --- | ---\
  \ | --- | --- | --- | --- | --- | --- |\n| 52 | 0 | suspended | SELECT | 0 | CXPACKET\
  \ | 219773 | CXPACKET |   |\n\n通常，人们在排查等待问题时，一旦看到 `CXPACKET` 等待类型，往往会认为是并行度问题，并执行一些错误的配置或查询更改，专注于禁用并行度。（顺便说一句，前面的输出中未显示，但在\
  \ SQL Server 2016 中引入的，你还可以看到 `DOP`（即并行度）和 `parallel_worker_count` 列，在我的情况下两者都显示为四。）\n\
  \n另一个问题是 `sys.dm_exec_requests` 并未显示问题的根源，需要一些其他工具。动态管理视图 `sys.dm_os_waiting_tasks`\
  \ 在这方面可能更有效。运行以下查询，记得将 `session_id` 更新为你正在执行的查询：\n\n```sql\nSELECT * FROM sys.dm_os_waiting_tasks\
  \ WHERE session_id = 52\n```\n\n现在我们得到了这些数据：\n\n| session_id | exec_context_id |\
  \ wait_duration_ms | wait_type | blocking_session_id | blocking_exec_context_id\
  \ | resource_description |\n| --- | --- | --- | --- | --- | --- | --- |\n| 52 |\
  \ 3 | 1256486 | LCK_M_S | 55 | NULL | pagelock fileid=1 pageid=28576 dbid=5 subresource=FULL\
  \ id=lockdbc49b0380 mode=IX associatedObjectId=72057594057588736 |\n| 52 | 4 | 1256486\
  \ | CXPACKET | 52 | NULL | exchangeEvent id=Portdbf1ce8300 WaitType=e_waitPortOpen\
  \ nodeId=2 |\n| 52 | 0 | 1256605 | CXPACKET | 52 | 1 | exchangeEvent id=Portdbf1ce8300\
  \ WaitType=e_waitPortOpen nodeId=2 |\n| 52 | 2 | 1255426 | CXPACKET | 52 | 4 | exchangeEvent\
  \ id=Portdbf1ce8300 WaitType=e_waitPortOpen nodeId=2 |\n| 52 | 1 | 1256486 | CXPACKET\
  \ | 52 | 3 | exchangeEvent id=Portdbf1ce8300 WaitType=e_waitPortOpen nodeId=2 |\n\
  \n我们可以看到主进程，即执行上下文 0，正被同一进程的上下文 ID 1 阻塞，而上下文 ID 1 又被上下文 ID 3 阻塞。它们都显示为 `CXPACKET`\
  \ 等待。然而，上下文 ID 3 正被一个不同的会话以 `LCK_M_S` 等待阻塞，该会话就是运行 `UPDATE` 语句的那个会话。这是一个很好的例子，说明表面上看似一种等待类型的问题，在现实中可能与另一种等待类型相关。换句话说，看起来像并行度问题的情况，实际上并非如此。输出中未显示，但你也可以通过查看\
  \ `waiting_task_address`（显示等待任务的地址）和 `blocking_task_address`（即当前持有该任务正在等待的资源的地址）来获取相同的信息并得出相同的结论。同时列出的还有\
  \ `resource_description`，它对理解所消耗的资源也非常有帮助。\n\n### 定位阻塞语句\n\n在运行 `UPDATE` 的会话上运行以下语句：\n\
  \n```sql\nROLLBACK TRANSACTION\n```\n\n阻塞将会结束，排序操作也将能够完成。\n\n最后，我们如何找到造成阻塞的语句？毕竟，该语句已经执行完毕，不会出现在一些典型的动态管理视图中。即使是旧的\
  \ `sysprocesses` 兼容目录视图，如果你查询它以查看特定会话 ID 当前正在做什么，也只会显示“AWAITING COMMAND”。有几个简单的解决方案是使用旧的\
  \ `DBCC INPUTBUFFER` 语句和新的 `sys.dm_exec_input_buffer` 动态管理函数。\n\n`DBCC INPUTBUFFER`\
  \ 显示 SQL Server 为指定会话 ID 执行的最后一条语句。使用方法示例如下：\n\n```sql\nDBCC INPUTBUFFER(55)\n```\n\
  \n在 SQL Server 2014 Service Pack 2 中引入的新 `sys.dm_exec_input_buffer` DMF（动态管理函数）可以接受与\
  \ `DBCC INPUTBUFFER` 相同的参数，如下所示：\n\n```sql\nSELECT * FROM sys.dm_exec_input_buffer(55,\
  \ NULL)\n```\n\n两者都将返回已执行的语句 `BEGIN TRANSACTION UPDATE Sales.SalesOrderDetail SET\
  \ OrderQty = 5 WHERE SalesOrderDetailID = 121317`，输出略有差异。\n\n这个例子展示了对 `CXPACKET`\
  \ 等待进行故障排查可能会揭示其他类型的等待问题，在这个案例中是 `LCK_M_S` 或阻塞，而它恰好是问题的根本原因。同时请记住，一般来说，排查等待问题还需要从其他来源获取额外的信息。在某些情况下，并行度可能确实是问题所在。大多数问题通常可以通过更新相关表的统计信息、创建适当的索引或使用其他传统的查询调优和优化技术来解决。\n\
  \n\n请求被拒绝，因其被视为高风险\n\n\n\n## CXPACKET\n\n这是并行处理等待。系统中出现此类等待并不一定意味着存在问题，或并行处理本身有问题。不幸的是，网上一些错误的观点与此相左，这给并行处理带来了不好的声誉。因此，许多人对此类等待的错误反应就是有时禁用并行处理。事实是，我们可能需要进行额外的研究来确认并行处理是否真的是问题所在。正如本章前面的例子所介绍的，要排查\
  \ `CXPACKET` 等待，我们应该从查看其他子并行线程上的等待开始。\n\n此外，从 SQL Server 2016 Service Pack 2 和 SQL\
  \ Server 2017 CU3 开始，`CXPACKET` 等待被分离为 `CXPACKET` 和 `CXCONSUMER` 等待，主要是将生产者线程和消费者线程的等待分开。因此，`CXPACKET`\
  \ 现在仅适用于与查询处理器交换操作符同步以及为消费者线程生成行相关的等待。消费者线程等待现在使用 `CXCONSUMER` 等待类型单独跟踪。\n\n## CXCONSUMER\n\
  \n如前所述，从 SQL Server 2016 Service Pack 2 和 SQL Server 2017 CU3 开始，`CXPACKET` 等待现在被分离为\
  \ `CXPACKET` 和 `CXCONSUMER` 等待。`CXCONSUMER` 是消费者线程等待生产者线程发送行，通常可以安全地忽略。\n\n## PAGELATCH_*\
  \ 和 PAGEIOLATCH_*\n\n闩锁及与闩锁相关的等待已在第 1 章介绍，本章前面也已讨论过。此外，与 `tempdb` 中分配页上的争用相关的闩锁等待将在第\
  \ 4 章详细讨论。\n\n## ASYNC_NETWORK_IO\n\n尽管此等待类型的名称可能暗示网络问题，但最常见的场景是客户端处理数据的问题。通常，建议是确保客户端处理数据的速度足够快，或验证客户端本身是否存在性能问题。网络连接问题不太常见，但也建议检查一下。\n\
  \n## SOS_SCHEDULER_YIELD\n\n正如第 1 章和本章开头所介绍的，SQL Server 使用非抢先式调度程序，因此当一个任务用完其时间片时，它被设计为自愿让出\
  \ CPU。该任务永远不会被挂起，而是直接从运行状态转到可运行状态，因为它不需要等待任何资源或其他任何东西。在可运行队列中的这种等待反映为 `SOS_SCHEDULER_YIELD`\
  \ 等待，通常并不意味着存在问题。由于在之前讨论的 DMV 中，`wait_time` 包含 `signal_wait_time`，对于等待 `SOS_SCHEDULER_YIELD`\
  \ 的任务，这两个值将相同或非常接近。\n\n这种等待类型也可能意味着自旋锁争用，但如前所述，这并不常见。\n\n## THREADPOOL\n\n如第 1 章所述，SQL\
  \ Server 中的工作线程是按需创建的，直到达到配置的“最大工作线程数”值。如果没有足够的工作线程用于查询执行，任务可能不得不等待，此时就会看到这种等待类型。这并不意味着必须增加“最大工作线程数”的值，因为通常建议使用默认值\
  \ 0。还应该调查其他一些等待或性能问题。显示这些等待的查询很可能应该进行优化，特别是当它们使用大量线程的并行计划时。\n\n“最大工作线程数”配置值没有考虑后台系统进程所需的工作线程，其默认值允许\
  \ SQL Server 自动配置最大工作线程数。更多详细信息，请参阅以下联机丛书条目：[`https://msdn.microsoft.com/en-us/library/ms190219.aspx`](https://msdn.microsoft.com/en-us/library/ms190219.aspx)。\n\
  \n## PREEMPTIVE_*\n\n`PREEMPTIVE_` 前缀包含大量等待（在 SQL Server 2019 中有 225 种），所有这些等待都发生在\
  \ SQLOS 调度程序切换到抢先模式以执行特定的外部操作时。在抢先模式下，您会看到任务状态为 `Running`，因为实际上它的执行超出了 SQLOS 的控制。\n\
  \n## OLEDB\n\n当任务正在等待来自 SQL Server Native Client OLE DB 提供程序的数据时，您会看到 `OLEDB` 等待。您应该检查这些来源（在许多情况下是链接服务器或\
  \ SSIS 包），看看是否有优化的可能性。执行 DMV 或 `DBCC CHECK` 命令也会显示 `OLEDB` 等待，因为它们在内部是作为特殊的 `OLEDB`\
  \ 调用来实现的。\n\n## IO_COMPLETION\n\n此等待类型发生于多种与读写操作相关的 I/O 等待，这些读写操作不涉及数据库页。此类 I/O\
  \ 操作的一些例子包括：在 `tempdb` 上读写排序或哈希工作文件；从事务日志中读写记录或任何其他信息（除了下面将解释的 `WRITELOG`）；以及将 eager\
  \ spool 读写到 `tempdb`。如前所述，数据页上的 I/O 等待显示为 `PAGEIOLATCH_` 等待。\n\n## WRITELOG\n\n\
  当线程正在等待 SQL Server 将日志块写入事务日志时，会发生 `WRITELOG` 等待，这主要是事务提交或检查点操作的结果。请记住，每个更新操作都需要一个事务，即使没有显式创建，例如使用\
  \ `BEGIN/COMMIT TRANSACTION` 语句。尽管网上的一些建议要求减少对数据库的更改量，但假设这已经优化，剩下的就是使用更快的 I/O 子系统，至少对于事务日志文件而言。此外，您还可以考虑实现延迟持久性，这是\
  \ SQL Server 2014 引入的一项功能。\n\n\n## 计时器等待类型\n\n通常由后台系统进程使用的几种等待类型，其等待时间长并不一定意味着存在问题。之前介绍\
  \ `REQUEST_FOR_DEADLOCK_SEARCH` 等待时，已涉及其中一种。让我们更新之前的查询，加入部分此类等待类型，以便查看哪些任务使用了它们：\n\
  \n```sql\nSELECT session_id, command, wait_type, wait_time FROM sys.dm_exec_requests\n\
  WHERE wait_type IN ('BAD_PAGE_PROCESS',\n'BROKER_EVENTHANDLER',\n'BROKER_TRANSMITTER',\n\
  'CHECKPOINT_QUEUE',\n'DBMIRROR_EVENTS_QUEUE',\n'DBMIRRORING_CMD',\n'KSOURCE_WAKEUP',\n\
  'LAZYWRITER_SLEEP',\n'LOGMGR_QUEUE',\n'ONDEMAND_TASK_QUEUE',\n'REQUEST_FOR_DEADLOCK_SEARCH',\n\
  'SQLTRACE_BUFFER_FLUSH',\n'WAITFOR')\n```\n\n在我的测试系统上获得以下输出：\n\n| session_id | Command\
  \ | wait_type | wait_time |\n| --- | --- | --- | --- |\n| 1 | LAZY WRITER | LAZYWRITER_SLEEP\
  \ | 938 |\n| 3 | LOG WRITER | LOGMGR_QUEUE | 79 |\n| 4 | SIGNAL HANDLER | KSOURCE_WAKEUP\
  \ | 445305651 |\n| 5 | LOCK MONITOR | REQUEST_FOR_DEADLOCK_SEARCH | 4736 |\n| 6\
  \ | BRKR TASK | BROKER_TRANSMITTER | 445366653 |\n| 12 | RESOURCE MONITOR | ONDEMAND_TASK_QUEUE\
  \ | 42312 |\n| 14 | CHECKPOINT | CHECKPOINT_QUEUE | 9784594 |\n| 25 | BRKR EVENT\
  \ HNDLR | BROKER_EVENTHANDLER | 445322210 |\n| 29 | BRKR TASK | BROKER_TRANSMITTER\
  \ | 445366652 |\n| 55 | WAITFOR | WAITFOR | 100651 |\n\n如你所见，特别是如果你多次运行查询监控其输出，有些等待时间极长，而其他等待的时间似乎会定期重置。\n\
  \n其中一些等待类型的等待时间会在特定秒数后重置为 0。例如，延迟写入器（lazy writer）会在 1 秒后重置，资源监视器任务（resource monitor\
  \ task）会在 60 秒后重置。这些后台任务中的一些拥有专用的工作线程，因此它们不会每次需要执行工作时都创建新任务，而是在工作间隔期间被挂起。在示例输出中，`WAITFOR`\
  \ 是由执行 `WAITFOR` 语句的用户查询显式执行的，因此会话 ID 55 并非后台进程。\n\n部分有趣的后台进程如下：\n\n1.  延迟写入器\n\
  2.  日志写入器\n3.  信号处理器\n4.  锁监视器\n5.  资源监视器\n6.  检查点\n\n你可以使用 `sys.dm_exec_requests`\
  \ 的 status 列来列出所有作为后台任务运行的会话，如下列查询所示：\n\n```sql\nSELECT session_id, command, wait_type,\
  \ wait_time, status FROM sys.dm_exec_requests\nWHERE status = 'background'\n```\n\
  \n## SQL Server 2019 的新特性\n\nSQL Server 2019 引入了两个与等待统计信息相关的变更。第一个是新的等待类型 `WAIT_ON_SYNC_STATISTICS_REFRESH`，它显示在同步统计信息刷新操作上累积的等待时间。此外，`sys.dm_exec_request`\
  \ DMV 的 command 列现在会在 `SELECT` 语句等待此类同步统计信息时显示 `SELECT (STATMAN)`。\n\n请记住，同步统计信息刷新操作是在查询优化过程中执行的常规优化统计信息更新，这显然不同于通过\
  \ `ALTER DATABASE` 语句的 `AUTO_UPDATE_STATISTICS_ASYNC` 选项手动配置的异步统计信息刷新操作。关于统计信息及统计信息维护的更多详细信息，请参阅第\
  \ 1 章和第 3 章。\n\n## 阻塞\n\n阻塞本身是一个很大的主题，即使不写一整本书，也值得用一章来阐述。由于深入探讨阻塞超出了本书范围，我将在本节介绍基础知识，并在末尾提供更多信息的参考。阻塞与锁等待相关，对其进行故障排除的最佳方法之一是使用\
  \ `sys.dm_tran_locks` 或 `sys.dm_os_waiting_tasks` DMV，它们会显示为 `LCK_` 等待类型。锁可以在 RID、键、页、区、表、元数据、数据库及其他级别获取。资源锁模式也有多种，包括共享（S）、更新（U）、排他（X）、意向、架构、大容量更新（BU）和键范围。\n\
  \n如此多的选择产生了大量的锁和锁等待类型（在当前所有支持的 SQL Server 版本中总共 63 种），由 `LCK` 前缀标识，例如之前示例中显示的 `LCK_M_S`、`LCK_M_U`、`LCK_M_X`\
  \ 等，以及根据资源不同而有多种不同的资源格式，所有这些都在 `sys.dm_os_waiting_tasks`（[`https://msdn.microsoft.com/en-us/library/ms188743.aspx`](https://msdn.microsoft.com/en-us/library/ms188743.aspx)）文档的锁资源所有者部分有记录。例如，页资源格式为：\n\
  \n```\npagelock fileid= pageid= dbid= subresource=\n```\n\n像往常一样，不要自动假定锁本身就是性能问题的根本原因，因为通过最小化事务大小和其他优化措施，有可能避免或最小化此类等待。我经常看到一个糟糕的建议是直接使用\
  \ `NOLOCK` 提示来避免锁。这并不意味着 `NOLOCK` 提示永远不应该使用。该提示的存在有其原因，但我看到它被滥用了。开发人员应该理解 `NOLOCK`\
  \ 的实际工作原理，以及它对于他们正在使用的业务事务是否有意义。还应考虑替代解决方案，例如实现快照隔离。\n\n阻塞进程阈值配置选项使用了前面提到的死锁监视器后台线程，并且可以使用\
  \ `sp_configure` 进行配置。默认配置为 0，表示不生成阻塞进程报告。下面是一个将阻塞进程阈值配置为五秒的示例：\n\n```sql\nsp_configure\
  \ 'blocked process threshold', 5\nRECONFIGURE\n```\n\n注意：你可以使用 \"blocked process\
  \ threshold\" 或 \"blocked process threshold(s)\"，或者从技术上讲，任何其他属于配置名称一部分的唯一字符串。这对于任何其他配置选项也是如此。\n\
  \n当两个或多个进程永久相互阻塞时，就会发生死锁。然而，你通常没有时间对这些等待做出反应。SQL Server 引擎会在五秒内检测到它们并终止涉及的其中一个进程。虽然由数据库引擎自动处理，但它们仍然是个问题，SQL\
  \ Server 提供了多种工具来对其进行故障排除。文档中还发布了几条关于如何处理它们的建议，包括保持事务简短以及以相同顺序访问对象。死锁由死锁监视器后台线程检测。\n\
  \n有关锁的更多信息，请参阅 [`https://technet.microsoft.com/en-us/library/ms190615(v=sql.105).aspx`](https://technet.microsoft.com/en-us/library/ms190615%28v=sql.105%29.aspx)\
  \ 上的“数据库引擎中的锁定”。\n\n### 内存 OLTP\n\n尽管内存 OLTP（有时以其原项目名称 Hekaton 为人所知）在第 7 章中有详细介绍，但在本节中，我将介绍其性能优势，特别是与锁和闩锁等待相关的方面。内存\
  \ OLTP 包含基于新硬件趋势的若干性能优势，例如：\n\n1.  表和索引针对纯内存使用进行了优化。\n2.  新的原生编译存储过程被编译为本机代码。\n\
  3.  无需锁和闩锁。\n\n基于依赖于版本控制的新乐观并发方法，这项新技术不使用锁和闩锁，从而消除了阻塞。然而，仍然需要处理事务冲突，在某些情况下，可能需要重新提交事务。值得注意的是，这个新的版本控制过程完全基于内存，与\
  \ SQL Server 2005 引入并用于快照隔离、MARS 或触发器等功能的 `tempdb` 版本控制技术不同。\n\n\n## 概要\n\n本章介绍了\
  \ **waits 性能分析方法**，该方法可用于解决性能问题，尤其是在其他传统方法无法准确定位性能瓶颈时。一种高级方法通常需要查看 SQL Server 实例上的其他性能信息，并进行关联分析，有时甚至需要关联客户端或其他与\
  \ SQL Server 交互的数据源的信息。此外，由于等待事件在 SQL Server 实例中持续发生，因此需要额外的知识和建立基准线，才能判断等待在何时真正构成了问题。\n\
  \n"
- "# 6. 查询存储\n\n你是否曾因某个查询意外地获得了不同的执行计划而遇到性能问题？你是否曾在 SQL Server 升级后发现计划回退，并想了解某个查询之前的执行计划是什么样的？**查询存储**（`Query\
  \ Store`）是 SQL Server 2016 引入的一项功能，可以帮助你排查和解决与执行计划变更相关的这些及其他性能问题。\n\n**查询存储**会自动捕获查询、执行计划和运行时统计信息的历史记录，使你能够发现查询计划的回退、识别开销大的查询，甚至强制查询处理器使用先前捕获的执行计划。此功能最初作为“云优先”功能在\
  \ Azure SQL Database 上发布，目前已在所有版本的 SQL Server 中提供。\n\n本章将**查询存储**作为收集和排查工具进行介绍，并展示如何通过强制使用现有执行计划来快速解决性能问题。然而，与使用查询提示类似，强制计划并非长久之计，可能仍需要传统的查询调优技术来解决查询性能问题。本章还会介绍**实时查询统计信息**（`Live\
  \ Query Statistics`），这是 SQL Server 2016 引入的另一项与查询性能相关的功能。\n\n## 查询为何变慢？\n\n要理解**查询存储**的好处，我先从查询排查过程说起。你可以使用**查询存储**或其他工具，查明性能问题是否因为一个或多个查询变慢导致，并识别出这些具体查询。一旦检测到性能问题源于某个查询变慢，下一步就是找出原因。显然，并非每个查询性能问题都与计划变更有关。一个原本运行良好的查询突然变慢可能有多种原因。有时可能与阻塞或等待其他系统资源有关，这已在第\
  \ 5 章讨论过。在许多情况下，原因是某些东西发生了变化，但挑战在于找出具体是什么变了。通常，我们没有关于系统资源使用情况、查询执行统计信息或性能历史的基线。事实上，我们常常连旧的计划是什么都不清楚。可能是数据、架构或查询参数等方面的变化导致查询处理器生成了一个新计划。也可能是，在数据量增加、工作负载加大或其他变化后，新计划虽然执行时间比以前长，但可能成为了适应新数据库状态的“好计划”。\n\
  \n## 计划变更\n\n由印度科学研究所开发的 **Picasso 数据库查询优化器可视化工具**（`Picasso Database Query Optimizer\
  \ Visualizer`）可用于展示查询计划为何变更，以及基于谓词的选择性，同一查询可能选择多少个不同的计划。**Picasso 数据库查询优化器可视化工具**的一个示例如图\
  \ 6-1 所示。\n\n![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig1_HTML.jpg](img/393702_2_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1 Picasso 数据库查询优化器可视化工具\n\n图中的每种颜色代表同一查询的一个不同计划，每个计划都是根据谓词的选择性选定的。有趣的是，当跨越图中的某个边界并选择了不同的计划时，大多数情况下，两个计划的成本和性能应该是相似的，因为选择性或估计行数只是略有变化。例如，当向表中添加了符合所用谓词条件的新行时，就可能发生这种情况。然而，在某些情况下，主要是由于查询优化器成本模型存在局限性，无法正确建模某些因素，导致新计划与先前的计划相比性能差异巨大，从而给应用程序及其用户带来问题。需要澄清的是，图中显示的计划是查询优化器根据所用参数的选择性为同一查询选定的最终计划，而不是优化器在考虑选择时众多备选方案中的一部分。你可以在\
  \ `http://dsl.cds.iisc.ac.in/projects/PICASSO` 找到关于 **Picasso 数据库查询优化器可视化工具**的更多信息。\n\
  \n计划的另一个众所周知的问题是，由于 SQL Server 累积更新（CU）、服务包或版本升级后的变更导致的性能回退。提到查询优化器内部的变更，一个主要担忧就是计划回退，这被认为是查询优化器改进的一大障碍。回退是指对查询优化器应用修复后引入的问题，有时被称为经典的“两个或多个错误抵消成正确”。例如，当两个错误的估计值——一个高估了某个值，另一个低估了它——相互抵消，幸运地给出了一个良好的估计，从而整体上产生了一个良好的执行计划时，就可能发生这种情况。在查询优化器改进后，只修正其中一个值可能导致错误的估计，从而对计划选择产生负面影响，引发性能回退。\n\
  \n## 查询存储如何提供帮助\n\n通过收集查询和计划信息、收集运行时统计信息，并允许你强制使用现有的查询计划，**查询存储**在以下场景中非常有用：\n\n\
  1.  计划回退\n2.  SQL Server 升级\n3.  应用程序/硬件变更\n4.  识别开销大的查询\n5.  识别即席工作负载\n\n### 计划回退\n\
  \n在早期版本的 SQL Server 中，没有简便的方法来判断是否发生了计划回退，因为只能看到特定计划的当前版本。**查询存储**通过将查询计划的历史存储在系统中，并捕获每个计划随时间推移的性能表现，使你能够识别出那些随时间推移变慢的查询。“回退查询”报告可用于识别那些执行指标最近出现回退、可能正在数据库中引发性能问题的查询。\n\
  \n\n\n### SQL Server 升级\n\n你可以使用查询存储（Query Store）和数据库兼容级别（`COMPATIBILITY_LEVEL`）设置来最小化\
  \ SQL Server 升级的风险。兼容级别会将某些数据库行为设置为与指定版本的 SQL Server 兼容。例如，你可以升级到 SQL Server 2019，同时将\
  \ `COMPATIBILITY_LEVEL` 设置保持为 140（对应 SQL Server 2017），这样你就可以使用前一个版本的查询处理器。通过启用查询存储，你可以收集查询和性能数据以创建基线，之后再将\
  \ `COMPATIBILITY_LEVEL` 设置更改为 150（对应 SQL Server 2019）来使用最新版本的查询处理器。如果发现执行计划回归，你将能够使用查询存储在不同层级缓解问题，包括强制特定执行计划、调整查询或更改回原始的\
  \ `COMPATIBILITY_LEVEL` 设置。此方案也可用于 SQL Server 累积更新（CU）或服务包，尽管在这种情况下数据库兼容级别保持不变。\n\
  \n> 注意：如第 3 章所述，跟踪标志 4199 也可用于控制在你升级到 SQL Server 2019 并使用数据库 `COMPATIBILITY_LEVEL`\
  \ 150 后是否启用查询优化器修复。此外，如第 1 章所述，从 SQL Server 2017 开始，不再使用服务包，新的服务模型基于累积更新。\n\n###\
  \ 应用程序/硬件变更\n\n与前面提到的 SQL Server 升级概念类似，你可以使用查询存储来测试系统中的重大变更，包括数据库、应用程序或硬件变更。同样，你可以收集查询和计划数据来创建基线，实施所需的变更，然后使用查询存储来分析工作负载并识别任何性能回归。\n\
  \n### 识别开销大的查询\n\n虽然在之前版本的 SQL Server 中，你可以使用 DMV 或其他一些可用的性能数据语句来识别开销大的查询，但这些方法通常有一些限制。过去使用的其他技术可能需要捕获开销大的跟踪并进行复杂的分析才能获得类似的信息。正如我稍后将解释的，查询存储消除了一些此类限制，使你能够根据特定的执行指标快速识别数据库中开销最大的查询。要访问此信息，请在\
  \ SQL Server Management Studio 的查询存储文件夹中使用“消耗资源最多的查询”报告。选择一个你感兴趣的执行指标，以识别在提供的时间区间内对数据库资源消耗影响最大的查询。\n\
  \n> 注意：请记住，即使你在系统中找到了开销大的查询，你仍然可能需要应用标准的查询调整技术来改进其性能。查询调整超出了本书的范围。一个很好的参考资料是作者之前的书\
  \ *Microsoft SQL Server 2014 Query Tuning & Optimization*。\n\n### 识别临时工作负载\n\n你可以使用查询存储来识别临时工作负载，其特征通常是大量不同的查询很少执行，通常只执行一次。临时工作负载在查询优化上花费了系统资源的很大一部分，并在计划缓存中使用大量内存。识别临时工作负载将在本章后面介绍。\n\
  \n### 架构\n\n查询存储直接与查询处理器交互。如图 6-2 所示，每次 SQL Server 编译或执行查询时，都会向查询存储发送一条消息。\n\n![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig2_HTML.jpg](img/393702_2_En_6_Fig2_HTML.jpg)\n\
  *图 6-2 查询存储工作流概览*\n\n图 6-3 也显示了更详细的查询编译和执行流程。\n\n![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig3_HTML.jpg](img/393702_2_En_6_Fig3_HTML.jpg)\n\
  *图 6-3 查询编译与执行*\n\n查询编译和执行流程如下：\n\n1.  当查询提交给 SQL Server 执行时，SQL Server 会尝试在计划缓存中查找现有的执行计划。\n\
  2.  如果未找到计划，它将继续运行查询编译和优化过程。生成执行计划后，它会将查询文本和查询计划发送到查询存储。\n3.  如果查询被配置为使用查询存储中的现有计划，查询处理器将尝试使用强制计划中提供的信息创建计划。\n\
  4.  在前面列出的三种场景（在缓存中找到计划、新优化或强制计划）中的任何一种之后，查询处理器将检查是否需要重新编译。\n5.  如果在重新编译过程中创建了新计划，查询处理器会再次将查询文本和新的查询计划发送到查询存储。同一查询的所有查询计划都将保留在查询存储中，最多保留由\
  \ `MAX_PLANS_PER_QUERY` 配置选项定义的数量。\n6.  一旦计划被选择并执行，查询处理器将运行时执行统计信息发送到查询存储。\n\n优化和执行信息首先保存在内存中，稍后根据查询存储配置持久化到磁盘。数据根据\
  \ `INTERVAL_LENGTH_MINUTES` 参数（默认为一小时）进行聚合，并根据 `DATA_FLUSH_INTERVAL_SECONDS` 参数刷新到磁盘。如果系统存在内存压力，数据也可能更早刷新到磁盘。无论如何，当你运行\
  \ `sys.query_store_runtime_stats` 目录视图时，你将能够访问内存和磁盘中的所有数据，因为它被设计为从两个来源检索数据。\n\n\
  查询文本的定义从语句的第一个标记的第一个字符开始，到最后一个标记的最后一个字符结束。其内部的空格和注释会被计算在内，但如果它们位于之前或之后，则不被视为查询文本的一部分。查询还必须位于同一对象上才会被视为相同查询。如果相同的查询用于两个不同的存储过程，它将被视为不同的查询，并且对象的\
  \ `object_id` 会保存在查询存储目录视图中。建议你在维护对象时使用 `ALTER` 语句而不是 `DROP` 和 `CREATE` 语句，以保持相同的\
  \ `object_id` 值（除了保留权限等其他好处）。\n\n> 注意：如果你仍然需要使用 `DROP` 和 `CREATE` 语句，SQL Server\
  \ 2016 还引入了新的 `DROP IF EXISTS` 语法，允许你仅在对象已存在时才条件性地删除它。有关存储过程的示例，请参阅 SQL Server 文档\
  \ [`https://msdn.microsoft.com/en-us/library/ms174969.aspx`](https://msdn.microsoft.com/en-us/library/ms174969.aspx)。\n\
  > \n> ```\n> DROP IF EXISTS\n> ```\n\n\n\n### 启用、清空与禁用查询存储\n\n查询存储默认处于禁用状态。要在当前数据库上启用它，可以使用\
  \ `ALTER DATABASE CURRENT SET QUERY_STORE = ON` 语句。查询存储一旦启用，便会开始收集查询计划与性能数据，你可以通过查询存储目录视图来分析这些数据。信息在编译和执行后立即可用。\n\
  \n你可以主动分析收集到的信息，以了解应用程序中查询性能的变化；也可以在遇到性能问题时，进行事后分析。查看存储的不同指标后（这些指标与 `sys.dm_exec_query_stats`\
  \ 动态管理视图中存储的指标非常相似），你就可以决定针对特定指标进行优化，例如查询持续时间、CPU 时间、逻辑 IO 读取、逻辑 IO 写入、物理读取等。一旦识别出问题，你可以使用传统的查询调优技术来尝试解决，或者使用查询存储来强制使用之前的某个计划。该计划必须已被查询存储捕获才能被强制使用，这显然意味着它是一个有效的计划（或至少在收集时是有效的——稍后会详细说明），并且它之前是由查询优化器生成的。要强制计划，你需要同时知道\
  \ `plan_id` 和 `query_id`，这可以在 `sys.query_store_plan` 目录视图中找到。从技术上讲，你也可以不使用查询存储，而是通过计划指南来强制计划，但这会更复杂，并且你首先仍需要手动收集和找到所需的计划。\n\
  \n即使查询存储处于禁用状态，你也可以通过运行以下语句来查询其当前配置值：\n\n```sql\nSELECT * FROM sys.database_query_store_options\n\
  ```\n\n这将返回以下数据：\n\n| `desired_state` | 0 |\n| --- | --- |\n| `desired_state_desc`\
  \ | OFF |\n| `actual_state` | 0 |\n| `actual_state_desc` | OFF |\n| `readonly_reason`\
  \ | 0 |\n| `current_storage_size_mb` | 0 |\n| `flush_interval_seconds` | 900 |\n\
  | `interval_length_minutes` | 60 |\n| `max_storage_size_mb` | 100 |\n| `stale_query_threshold_days`\
  \ | 30 |\n| `max_plans_per_query` | 200 |\n| `query_capture_mode` | 1 |\n| `query_capture_mode_desc`\
  \ | ALL |\n| `size_based_cleanup_mode` | 1 |\n| `size_based_cleanup_mode_desc` |\
  \ AUTO |\n\n要在 AdventureWorks2017 数据库上启用查询存储，请使用以下语句：\n\n```sql\nALTER DATABASE\
  \ AdventureWorks2017 SET QUERY_STORE = ON\n```\n\n注意\n\n初始还原 AdventureWorks2017\
  \ 数据库时，查询存储可能已经处于启用状态。\n\n启用查询存储后，只有状态会发生改变。所有其他默认值将保持不变。你也可以在启用查询存储时更改一个或多个配置值，如下文所示。如果再次显示\
  \ `sys.database_query_store_options` 目录视图，你会看到 `desired_state` 和 `actual_state`\
  \ 列现在的值都是 2，并且 `desired_state_desc` 和 `actual_state_desc` 已切换为 `READ_WRITE`。这两个状态用于区分用户显式设置的期望操作模式与实际或真实状态。当这两个值不同时，最常见的情况是请求了\
  \ `READ_WRITE` 模式，但查询存储由于磁盘空间不足而自动切换到了 `READ_ONLY` 模式。\n\n或者，你也可以使用 SQL Server Management\
  \ Studio 执行相同的操作。右键单击你的数据库并选择“属性”。然后选择“查询存储”页。在“常规”的“操作模式（请求）”中，选择“读写”。请记住，使用 SQL\
  \ Server Management Studio 时，会默认填充多个值，但你可以更改其中任何值，完成后单击“确定”。查询存储页面如图 6-4 所示。\n\n\
  ![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig4_HTML.jpg](img/393702_2_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4. 查询存储配置\n\n默认情况下，以下语句和值将被发送到 SQL Server：\n\n```sql\nALTER DATABASE AdventureWorks2017\
  \ SET QUERY_STORE = ON\nGO\nALTER DATABASE AdventureWorks2017 SET QUERY_STORE (OPERATION_MODE\
  \ = READ_WRITE, CLEANUP_POLICY = (STALE_QUERY_THRESHOLD_DAYS = 367), DATA_FLUSH_INTERVAL_SECONDS\
  \ = 900, INTERVAL_LENGTH_MINUTES = 60, MAX_STORAGE_SIZE_MB = 100, QUERY_CAPTURE_MODE\
  \ = ALL, SIZE_BASED_CLEANUP_MODE = OFF)\nGO\n```\n\n注意\n\n你总是可以通过使用 SQL Trace 或\
  \ Extended Events 来捕获 SQL Server Management Studio 或其他工具发送的语句。你甚至可以捕获 Profiler 和\
  \ Extended Events GUI 本身发送的语句！\n\n查询存储的默认选项对于快速入门来说是合适的，但你应该根据你的工作负荷和性能故障排除需求来更新其中一些选项。初次配置后，你可以监控查询存储随时间推移的表现，并相应地调整其配置。如你所见，`MAX_STORAGE_SIZE_MB`\
  \ 仅为 100 MB，因此这可能是你首先想要更改或最初就配置为更高值（根据你的需要）的设置。`MAX_STORAGE_SIZE_MB` 是在数据库内为查询存储分配的磁盘空间。如果你不确定，可以至少从\
  \ 1024 MB 或更大的值开始，但需要相应地监控磁盘空间使用情况，因为数据收集将取决于你系统的工作负荷和活动。不幸的是，如果分配的空间已满，查询存储将直接停止收集新数据，不会发出通知，并会静默切换到\
  \ `READ_ONLY` 状态，这意味着它将不再收集有关你查询的任何额外信息。你可以使用以下查询监控此状态：\n\n```sql\nSELECT actual_state_desc,\
  \ desired_state_desc, current_storage_size_mb,\nmax_storage_size_mb, readonly_reason\n\
  FROM sys.database_query_store_options\n```\n\n在我的测试中，我曾短暂地超过了为配置大小分配的空间而没有出现问题，因为看起来空间使用情况并未进行实时验证。它只是在一段时间后才进入\
  \ `READ_ONLY` 状态，如下列配置值所示：\n\n| `actual_state_desc` | `READ_ONLY` |\n| --- | ---\
  \ |\n| `desired_state_desc` | `READ_WRITE` |\n| `current_storage_size_mb` | 4 |\n\
  | `max_storage_size_mb` | 1 |\n| `readonly_reason` | 65536 |\n\n目前，目录视图不显示 `readonly_reason`\
  \ 的描述，但文档显示 65536 表示查询存储已达到 `MAX_STORAGE_SIZE_MB` 选项设置的大小限制。文档错误地指出，在扩展 `MAX_STORAGE_SIZE_MB`\
  \ 值后，你需要将状态更改回 `READ_WRITE`，但我的测试表明无需这样做。扩展 `MAX_STORAGE_SIZE_MB` 将自动使查询存储返回到 `READ_WRITE`\
  \ 状态：\n\n```sql\nALTER DATABASE AdventureWorks2017 SET QUERY_STORE (MAX_STORAGE_SIZE_MB\
  \ = 2048)\n```\n\n请记住，虽然你可以更改查询存储的大小，但其内部表始终存储在数据库的主文件组中，目前无法更改。或者，你可以激活查询捕获和清理策略来控制磁盘空间的使用，如下文所述。\n\
  \n如前面 SQL Server Management Studio 生成的代码所示，你可以使用以下语法一次更改多个属性，并用逗号分隔：\n\n```sql\n\
  ALTER DATABASE database_name SET QUERY_STORE ( [,... n])\n```\n\n如果你需要清空查询存储数据，可以单击查询存储页面上的“清除查询数据”按钮，如前文图\
  \ 6-4 所示。这将发送以下语句，你也可以直接键入该语句以获得相同的结果：\n\n```sql\nALTER DATABASE AdventureWorks2017\
  \ SET QUERY_STORE CLEAR ALL\n```\n\n\n\n要再次禁用查询存储，您可以使用 SQL Server Management Studio\
  \ 并在“操作模式（请求）”中选择“关闭”，或者使用以下语句：\n\n```sql\nALTER DATABASE AdventureWorks2017 SET\
  \ QUERY_STORE = OFF\n```\n\n除了 `MAX_STORAGE_SIZE_MB` 外，查询存储中还可以配置以下选项：\n\n1.  `OPERATION_MODE`：更新查询存储的操作模式，可为\
  \ `OFF`、`READ_ONLY` 和 `READ_WRITE`。如前所述，查询存储的状态可以通过目录视图 `sys.database_query_store_options`\
  \ 中的 `desired_state_desc` 和 `actual_state_desc` 查看。查询存储禁用时为 `OFF`，启用时为 `READ_ONLY`\
  \ 和 `READ_WRITE`。查询存储启用后，通常处于 `READ_WRITE` 状态。如前文所述，如果存在磁盘空间问题，或者您手动更改操作模式，查询存储可能会自动进入\
  \ `READ_ONLY` 状态。\n\n2.  `MAX_PLANS_PER_QUERY`：指示为每个查询维护的最大计划数，默认值为 200。查询存储使您能够探索特定查询在生产工作负载中可能创建了多少个不同的执行计划，这在以前是不可能的，除非使用像\
  \ Picasso Database Query Optimizer Visualizer 这样的第三方工具。\n\n3.  `INTERVAL_LENGTH_MINUTES`：定义将运行时执行统计信息数据聚合到查询存储中的时间间隔，默认值为\
  \ 60 分钟。存储每一次查询执行是不现实的，因为有些查询可能在短时间内执行数千或数百万次。查询存储将按指定的时间间隔为每个查询存储一行，其中包含聚合的运行时统计信息。例如，如果一个查询在一小时内执行了\
  \ 2000 次，目录视图 `sys.query_store_runtime_stats` 中的间隔将显示 2000 次 `count_executions`，但所有这些执行的性能数据将被聚合。使用较小的值在需要更精细粒度时可能有用，但也会占用更多磁盘空间。\n\
  \n4.  `CLEANUP_POLICY`：定义查询存储的数据保留策略。目前，唯一可能的值是 `STALE_QUERY_THRESHOLD_DAYS`，它指定查询信息在查询存储中保留的天数。如本节开头\
  \ `ALTER DATABASE` 语句所示，其默认值为 367 天。此配置值也会影响查询存储所需的磁盘空间，对于某些工作负载而言 367 天可能过高，因此您可能需要将其配置为较低的值。\n\
  \n5.  `DATA_FLUSH_INTERVAL_SECONDS`：定义将写入查询存储的数据持久化到磁盘的频率。其默认值为 900 秒或 15 分钟。如架构部分所示，查询存储收集的数据是立即可用的，但出于性能考虑，它们只是异步写入磁盘。\n\
  \n最后，查询存储还具有用于定义查询捕获和清理策略的配置选项。定义查询捕获策略可以通过 `QUERY_CAPTURE_MODE` 完成，其值为 `ALL`、`AUTO`\
  \ 和 `NONE`，描述如下：\n\n1.  `ALL`：定义捕获所有查询。这是默认值。\n\n2.  `AUTO`：指示仅根据执行次数和资源消耗捕获相关查询。使用此选项时，编译和执行时间短且执行频率低的查询不会被收集。频率、编译和执行时间的阈值是内部确定的，无法手动配置。\n\
  \n3.  `NONE`：请求查询存储停止捕获新查询。使用此配置选项时，查询存储将仅收集已捕获查询的编译和运行时统计信息。应谨慎使用此配置，因为会错过新查询的重要信息。\n\
  \n清理策略使用 `SIZE_BASED_CLEANUP_MODE` 配置选项定义，其值为 `OFF`（默认值）和 `AUTO`。`OFF` 表示策略已禁用，不会自动删除数据。如果定义了\
  \ `AUTO` 值，当磁盘大小达到 `MAX_STORAGE_SIZE` 中定义值的 90% 时，策略将自动激活。清理策略首先删除最不常用和最旧的查询，并在达到\
  \ `MAX_STORAGE_SIZE` 定义的磁盘空间约 80% 时停止。\n\n\n## 使用查询存储\n\n在上一节中，我们了解了如何启用和配置查询存储。现在，让我们通过运行一些查询来实际操作一下。在我们的示例中，我们可以在数据收集后立即进行检查。然而，在生产环境中，你可能希望等待一段时间，直到收集到具有代表性的工作负载，这取决于你的应用程序，可能需要例如一整天或一周的时间。让我们用我在\
  \ `AdventureWorks2017` 数据库上最喜欢的一个查询来测试它，这个查询的优势在于它极其简单，并且在这种情况下可以展示参数敏感问题。创建以下存储过程：\n\
  \n```sql\nCREATE PROCEDURE test (@pid int)\nAS\nSELECT * FROM Sales.SalesOrderDetail\n\
  WHERE ProductID = @pid\n```\n\n> **Note**\n>\n> 请记住，这是一个简化的练习，旨在展示查询存储的工作原理。你当然可以使用其他技术来解决参数敏感查询的问题，但在像\
  \ `AdventureWorks2017` 这样的小型数据库中模拟计划回归会付出更多的努力。而且，是的，查询存储也可以用来查找参数敏感查询（或更常称为与参数探测相关的问题）。\n\
  \n根据提供给过程的参数值，可能会创建两种可能的执行计划。这相当于图 6-1 中的毕加索图，仅显示两种颜色。使用 `ProductID` `898` 执行存储过程将创建一个包含索引查找和键查找运算符的计划，而使用值\
  \ `870` 则会选择表扫描。在这两种情况下，创建的计划都将适合所提供的参数。尝试任何其他可能的值仍将创建这两种计划之一，前提是需要并执行了新的优化。但作为一个参数敏感的查询或过程，当重用一个可能不适合所提供参数的现有计划时，可能会出现性能问题。\n\
  \n例如，对 `ProductID` `898` 运行使用表扫描计划的过程可能会导致一些性能问题，因为必须扫描整个表才能返回仅 9 行数据。但最高的性能问题将发生在使用索引查找/键查找计划的\
  \ `ProductID` `870` 上，因为它执行了 14,000 次逻辑读取，而整个表扫描只需 1200 次读取。性能问题的原因在于索引查找/键查找组合非常昂贵，只有在返回少量行时才是一个好的解决方案。让我们创建这个场景，看看查询存储是否能检测到该性能问题。首先，运行\
  \ `SET STATISTICS IO ON` 以启用 SQL Server 显示有关查询产生的磁盘活动量的信息，并运行 `ALTER DATABASE SET\
  \ QUERY_STORE CLEAR ALL` 来清除查询存储当前存储的任何信息。运行以下语句：\n\n```sql\nSET STATISTICS IO ON\n\
  GO\nALTER DATABASE AdventureWorks2017 SET QUERY_STORE CLEAR ALL\n```\n\n运行第一个查询以创建表扫描计划。你可以选择在\
  \ SQL Server Management Studio 中通过选择“包含实际执行计划”来可视化该计划。\n\n```sql\nEXEC test @pid\
  \ = 870\n```\n\n运行前面的语句将显示 1248 次逻辑读取，你可以在“消息”选项卡上看到（根据几个因素，这个值可能会有微小差异）。如果你随后尝试以下查询，它将重用表扫描计划，因此将具有相同的逻辑读取次数（假设该计划尚未从计划缓存中删除）：\n\
  \n```sql\nEXEC test @pid = 898\n```\n\n事实上，任何参数都将使用相同的计划，并且性能也将相同。至少在这种情况下，性能是稳定和一致的，尽管对于最后一种情况（必须扫描整个表才能返回仅\
  \ 9 行）来说，可能不是一个完美的解决方案。\n\n但是，使用索引查找和键查找运算符的计划会出现更大的性能差异。我们假设当前计划已从计划缓存中清除，并且下一次执行使用\
  \ `ProductID` `898`，从而创建一个新的优化和一个新计划。为了模拟这一点，我们将使用 `DBCC FREEPROCCACHE` 语句，虽然这不是实现此目的的最佳方法，但它是一种简单的方法，以便我们专注于主要观点。运行以下查询：\n\
  \n```sql\nDBCC FREEPROCCACHE\nGO\nEXEC test @pid = 898\nGO\nEXEC test @pid = 870\n\
  ```\n\n> **Note**\n>\n> `DBCC FREEPROCCACHE` 将从整个计划缓存中删除所有计划，因此请小心，不要在生产环境中运行此类语句。\n\
  \n这些执行的逻辑读取次数分别为 29（获取 9 行）和 14,077（获取 4688 行）。14,077 是一个巨大的数字，对于之前显示仅需 1266 次逻辑读取即可执行表扫描操作的表来说。这一次，执行时间不稳定，它将取决于提供的参数，更准确地说，取决于所需的索引查找/键查找次数。换句话说，使用表扫描的计划将始终具有相同的性能，具体取决于表中的页数。但使用索引查找/键查找的计划将取决于读取的行数，因此其开销可以从非常小到非常大。\n\
  \n确保你已执行前面的查询，我们现在可以运行此查询来显示查询存储收集的一些信息：\n\n```sql\nSELECT rs.avg_logical_io_reads,\
  \ qt.query_sql_text,\nq.query_id, qt.query_text_id, p.plan_id, rs.runtime_stats_id,\n\
  rsi.start_time, rsi.end_time, rs.avg_rowcount, rs.count_executions\nFROM sys.query_store_query_text\
  \ AS qt\nJOIN sys.query_store_query AS q\nON qt.query_text_id = q.query_text_id\n\
  JOIN sys.query_store_plan AS p\nON q.query_id = p.query_id\nJOIN sys.query_store_runtime_stats\
  \ AS rs\nON p.plan_id = rs.plan_id\nJOIN sys.query_store_runtime_stats_interval\
  \ AS rsi\nON rsi.runtime_stats_interval_id = rs.runtime_stats_interval_id\n```\n\
  \n我们得到以下输出；仅显示所需的行：\n\n| `平均逻辑 IO 读取次数` | `1249` | `7054` |\n| --- | --- | --- |\n\
  | `查询 SQL 文本` | (@pid int)SELECT * FROM | (@pid int)SELECT * FROM |\n| `查询 ID` |\
  \ 1 | 1 |\n| `查询文本 ID` | 1 | 1 |\n| `计划 ID` | 1 | 2 |\n| `运行时统计信息 ID` | 1 | 2 |\n\
  | `平均行数` | 2348.5 | 2348.5 |\n| `执行次数` | 2 | 2 |\n\n这表明，对于 `计划 ID` 1（表扫描计划），平均逻辑\
  \ IO 读取次数为 1249，因为整个表有 1249 页。对于 `计划 ID` 2（包含索引查找和键查找运算符的计划），平均值为 7054，这大约是 29 加上\
  \ 14,077 除以 2，因为有两次执行。\n\nSQL Server Management Studio 也可以向你显示此信息和其他查询存储信息。在数据库下的查询存储文件夹中，右键单击“性能回归查询”，然后选择“查看性能回归查询”。该报表将让你选择\
  \ CPU 时间 (us)、持续时间 (us)、逻辑读取、逻辑写入、内存消耗 (KB) 和物理读取。单击“以网格格式查看性能回归查询及其详细信息”。图 6-5\
  \ 显示了按逻辑读取排序的报表。\n\n![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig5_HTML.jpg](img/393702_2_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5：按逻辑读取排序的前 25 个性能回归查询\n\n单击我们感兴趣的查询。（即使你遵循了相同的步骤，你也可能有不同的 `查询 ID`。）在右上角窗格中，你会看到一个类似于图\
  \ 6-6 的屏幕，其中显示了两个计划，由两个小圆圈表示。单击一个圆圈将显示每个计划的运行时信息，图形化计划将显示在底部窗格中（图 6-6 中未显示）。\n\n\
  > **Note**\n\n\n查询存储的早期版本以**页**为单位显示逻辑读取量。最新版本则以 KB 为单位显示相同的信息。例如，您可能会看到平均逻辑读取为\
  \ 7054，或平均逻辑读取（KB）为 56,432。正如我们在第 1 章所学，一个数据页大小为 8 KB。\n\n![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig6_HTML.jpg](img/393702_2_En_6_Fig6_HTML.jpg)\n\
  \n### 图 6-6：查询窗格的计划摘要\n\n此时，您可以研究为什么这两个计划的性能差异如此之大，并尝试应用任何传统的查询优化技术。查询存储提供了一个解决方案，并且该方案无需任何查询调优工作即可立即使用，那就是强制使用任何可用的执行计划——假设您希望该特定查询的每次执行都使用该计划。\n\
  \n那么，下一步该做什么？虽然对于此示例而言，这并非完美的解决方案（这就是为什么参数敏感的查询难以修复，并且通常需要其他方法），但假设我们想要一致的性能，并决定使用包含表扫描的计划。让我们通过在\"\
  查询计划摘要\"窗格中选择该计划，并在底部窗格显示计划时单击\"强制计划\"来强制执行该计划。计划摘要还为您提供了强制计划的选项。只有当计划保存在查询存储中时，您才能强制它。在系统要求确认时回答\"\
  是\"。如果您在跟踪中捕获该查询，您会看到发送了类似的语句：\n\n```\nEXEC sys.sp_query_store_force_plan @query_id\
  \ = 1, @plan_id = 1\n```\n\n您可以使用 `sp_query_store_force_plan` 来为特定查询强制执行特定计划。每当\
  \ SQL Server 遇到此查询时，如果计划缓存中没有可用的此类计划，它就会尝试强制执行提供的计划。如果强制计划失败，则会触发 `plan_guide_unsuccessful`\
  \ 扩展事件（或 Plan Guide Unsuccessful 跟踪事件），并指示查询优化器以正常方式优化查询。强制的计划会保存在计划缓存中，并根据需要重用。值得注意的是，此查询的计划只有在指定的存储过程内执行时才会被强制。如果相同的查询在不同的存储过程或即席查询中执行，则此操作将不适用。\n\
  \n此时，即使您清除计划缓存并使用值 898 运行查询，您也将始终获得包含表扫描的计划。尽管执行计划中的 `Use Plan` 属性将为 true，但这并不表示这是一个强制计划。目前，了解此信息的唯一方法是查看\
  \ `sys.query_store_plan` 目录视图中的 `is_forced_plan` 列。\n\nSQL Server Management Studio\
  \ 还在同一图形界面上提供了取消强制计划的选项。执行该操作将向 SQL Server 发送类似的语句：\n\n```\nEXEC sys.sp_query_store_unforce_plan\
  \ @query_id = 1, @plan_id = 1\n```\n\n强制计划在后台使用计划指南。当计划被强制时，SQL Server 会隐式地添加一个\
  \ `USE PLAN` 提示，其中包含与该语句关联的 XML 计划片段，因此您不再需要单独使用计划指南。此外，请注意，当单独使用计划指南时，查询优化器不保证会生成完全请求的强制计划，而至少是与其类似的计划。另外，您应该意识到，在某些情况下强制计划可能不起作用，一个典型的例子是当架构发生更改时。因此，如果某个计划使用了索引但该索引已不复存在，则无法重用和强制该计划。在这种情况下，SQL\
  \ Server 将执行正常的优化，并会在 `sys.query_store_plan` 目录视图中记录强制计划操作失败的事实。计划强制失败将在本章后面解释。有关可使用查询存储和\
  \ `USE PLAN` 强制的查询计划元素的更多详细信息，请参阅 [`https://technet.microsoft.com/en-us/library/ms186954`](https://technet.microsoft.com/en-us/library/ms186954)`(v=sql.105).aspx`。\n\
  \n清除或禁用查询存储也将禁用任何强制的查询计划。一旦清除了计划，就无法再强制它，因为该计划已从查询存储数据库中永久删除。但是，如果在某个计划配置为强制时禁用了查询存储，那么一旦查询存储再次启用，该计划将被重新强制（假设该计划未被其他方式删除）。在我们的示例中，取消强制先前的计划，并使用\
  \ ProductID 898 再次运行该过程，将执行正常的查询优化，创建包含索引查找/键查找组合的原始计划，并且执行计划中将不再出现 `Use Plan` 属性。\n\
  \n最后，强制计划不应被视为长期解决方案，因为与使用查询提示类似，数据库数据和架构可能会发生变化，而强制的计划可能不再是最优的。因此，仍然需要使用传统的查询调优技术来修复有问题的查询。\n\
  \n\n## 性能故障排除\n\n正如前一节所述，你可以分析查询存储收集的信息，无论是主动分析以了解应用程序中的查询性能变化，还是被动分析以应对性能问题。查询存储可用于找出资源消耗高的查询，其方式与我们过去使用\
  \ `sys.dm_exec_query_stats` 动态管理视图的方式大致相同。相比于使用此动态管理视图，查询存储提供了一些额外优势，包括：\n\n1. \
  \ 使用 `sys.dm_exec_query_stats` 动态管理视图只能查看当前位于计划缓存中的计划。每个计划只存在当前版本，而且即使是这个版本也可能随时从计划缓存中被清除。查询存储则会持久化保存每个查询所有历史版本的计划。\n\
  \n2.  并非所有计划都会被缓存，因此也不会通过 `sys.dm_exec_query_stats` 动态管理视图暴露出来。而查询存储会存储所有的计划，甚至是未完成的查询计划，后文将对此进行说明。\n\
  \n要显示数据库中资源消耗最高的查询，你可以使用 `SQL Server Management Studio` 中的“前几大资源消耗查询”报告。该报告允许你选择不同的指标，包括\
  \ CPU 时间、持续时间、执行次数、逻辑读取、逻辑写入、内存消耗和物理读取。图 6-7 展示了以 CPU 时间为指标的示例。\n\n![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig7_HTML.jpg](img/393702_2_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7：前 25 大资源消耗查询报告\n\n为了获得更大的灵活性，你可以结合使用 `sys.query_store_runtime_stats` 运行时统计信息视图以及其他查询存储目录视图，编写自己的查询。\n\
  \n我最喜欢的一种技巧是：在 `SQL Server Management Studio` 中运行跟踪或扩展事件会话，运行“前几大资源消耗查询”报告并选择我需要的指标，然后查看提交给引擎的是哪个查询。例如，在运行图\
  \ 6-7 所示的以 CPU 时间为指标的报告时，我看到提交了以下查询（此处已稍作编辑，包括移除了一个筛选特定时间段以获取最近一小时内最耗资源查询的过滤器）：\n\
  \n```sql\nSELECT TOP 25\np.query_id query_id,\nqt.query_sql_text query_text,\nCONVERT(float,\
  \ SUM(rs.avg_cpu_time * rs.count_executions)) total_cpu_time,\nSUM(rs.count_executions)\
  \ count_executions,\nCOUNT(DISTINCT p.plan_id) num_plans\nFROM sys.query_store_runtime_stats\
  \ rs\nJOIN sys.query_store_plan p ON p.plan_id = rs.plan_id\nJOIN sys.query_store_query\
  \ q ON q.query_id = p.query_id\nJOIN sys.query_store_query_text qt ON q.query_text_id\
  \ = qt.query_text_id\nGROUP BY p.query_id, qt.query_sql_text\nORDER BY total_cpu_time\
  \ DESC\n```\n\n如前所述，你可以使用查询存储来识别数据库中的即席工作负载。由于即席工作负载可能包含大量不同的查询，它们通常会在查询优化上消耗相当大比例的系统资源，并在计划缓存中占用大量内存。要识别即席工作负载，你可以使用前面介绍的“前几大资源消耗查询”报告，并选择“执行次数”作为报告指标。图表或报告中出现大量执行次数为\
  \ 1 的查询，可能就表明存在即席工作负载。你可能还需要查看超过默认 25 个查询的更多查询，并设置一个更大的数值。为此，请选择“配置”（位于屏幕右上角区域），然后点击“返回”，并在“前几大查询”部分指定一个新值。报告显示后，你也可以点击“执行次数”列，以便从执行次数值为\
  \ 1 的查询开始查看，如前图 6-7 所示。\n\n如果你有大量即席查询，你可能需要启用“即席工作负载优化”配置选项，SQL Server 可以利用此选项来提高计划缓存的效率。启用此配置后，SQL\
  \ Server 通过仅在计划缓存中存储一个小型的已编译计划存根，而非为仅执行一次的查询存储完整的已编译执行计划，从而最小化计划缓存的内存使用量。有关“即席工作负载优化”配置选项的更多详细信息，请参阅第\
  \ 3 章。\n\n另一种重用计划的替代方案是在数据库级别强制实施参数化，尽管此方法更为激进。当多个相似的即席查询可以从使用相同的执行计划中受益时，此配置可能很有用。强制使用相同的计划可能并非总是好的解决方案，因此这是一个需要仔细和全面测试的选择。可以通过使用\
  \ `ALTER DATABASE SET PARAMETERIZATION FORCED` 语句来实现数据库级别的强制参数化。\n\n\n## 未完成的查询\n\
  \n查询存储一个非常有趣的功能是，你可以查看一条查询的最终状态。这对于查找那些未能成功完成的查询信息尤其有用。在 SQL Server 中，使用其他现有方法要实现这一点曾经非常困难。你可以通过查看\
  \ `sys.query_store_runtime_stats` 目录视图的 `execution_type` 和 `execution_type_desc`\
  \ 列来找到这些信息。根据文档，`execution_type` 列的可能值如下：\n\n*   0：常规执行（成功完成）\n*   3：客户端发起中止的执行\n\
  *   4：异常中止的执行\n\n你的大多数查询将返回值 0，表示它们已成功执行。因此，让我们运行一个示例，看看当查询未成功执行时是如何工作的。首先清空查询存储，以便更容易管理我们查询中的可用结果：\n\
  \n```sql\nALTER DATABASE AdventureWorks2017 SET QUERY_STORE CLEAR ALL\n```\n\n运行以下查询（请注意，如果任其执行，此查询将运行很长时间）：\n\
  \n```sql\nSELECT * FROM Sales.SalesOrderDetail s1 CROSS JOIN Sales.SalesOrderDetail\
  \ s2\n```\n\n让查询运行大约五秒，然后取消它。现在运行以下查询：\n\n```sql\nSELECT COUNT(*) FROM Sales.SalesOrderDetail\
  \ s1 CROSS JOIN Sales.SalesOrderDetail s2\n```\n\n与之前被取消的执行不同，此查询应很快完成，并报出一条关于算术溢出错误（将表达式转换为数据类型\
  \ int 时发生）的错误消息。\n\n最后，运行以下查询，它应在不到一秒内成功完成：\n\n```sql\nSELECT COUNT_BIG(*) FROM\
  \ Sales.SalesOrderDetail s1 CROSS JOIN Sales.SalesOrderDetail s2\n```\n\n现在，让我们通过运行以下查询来检查执行类型值：\n\
  \n```sql\nSELECT rs.avg_logical_io_reads, qt.query_sql_text,\nq.query_id, execution_type_desc,\
  \ qt.query_text_id, p.plan_id, rs.runtime_stats_id,\nrsi.start_time, rsi.end_time,\
  \ rs.avg_rowcount, rs.count_executions\nFROM sys.query_store_query_text AS qt\n\
  JOIN sys.query_store_query AS q\nON qt.query_text_id = q.query_text_id\nJOIN sys.query_store_plan\
  \ AS p\nON q.query_id = p.query_id\nJOIN sys.query_store_runtime_stats AS rs\nON\
  \ p.plan_id = rs.plan_id\nJOIN sys.query_store_runtime_stats_interval AS rsi\nON\
  \ rsi.runtime_stats_interval_id = rs.runtime_stats_interval_id\n```\n\n输出应包含以下数据：\n\
  \n| `avg_logical_io_reads` | `query_sql_text` | `execution_type_desc` |\n| --- |\
  \ --- | --- |\n| `942` | select count(*) from sales.SalesOrderDetail s1 cross join\
  \ sales.SalesOrderDetail s2 | Exception |\n| `343572` | select * from sales.SalesOrderDetail\
  \ s1 cross join sales.SalesOrderDetail s2 | Aborted |\n| `942` | select count_big(*)\
  \ from sales.SalesOrderDetail s1 cross join sales.SalesOrderDetail s2 | Regular\
  \ |\n\n如你所见，查询存储能够追踪所有先前的查询，并为我们提供查询状态或查询执行类型，以及运行时和性能信息。这在查询失败并需要查看诸如资源使用情况、持续时间等额外信息的场景中非常有帮助。请记住，查询必须是有效的，且必须已生成执行计划并开始执行，才能在其失败或取消后被追踪。如果查询编译失败，则没有任何信息可追踪。例如，如果查询尝试使用一个不存在的表，则不会生成计划，也不会有查询执行发生。比如，如果你运行：\n\
  \n```sql\nSELECT * FROM authors\n```\n\n你将收到“对象名 'authors' 无效”的错误，并且根本没有进行优化或执行，因此查询存储也不会捕获任何信息。\n\
  \n追踪未成功完成的查询时，一个常见的问题与 `.NET` 应用程序的默认查询超时设置有关，该设置为 30 秒。你可以使用以下代码测试一个 `.NET` 应用程序的默认超时。由于默认的\
  \ `.NET` 超时未被更改，并且代码中执行的查询肯定会运行超过 30 秒，你将得到如前所述的 Exception 类型的查询执行结果：\n\n```csharp\n\
  using System;\nusing System.Data.SqlClient;\npublic class Test {\npublic static\
  \ void Main() {\nstring connectionString = \"Data Source=(local);Initial Catalog=AdventureWorks2017;Integrated\
  \ Security=SSPI\";\nstring queryString = \"SELECT * FROM Sales.SalesOrderDetail\
  \ s1 CROSS JOIN Sales.SalesOrderDetail s2\";\nusing (SqlConnection connection =\
  \ new SqlConnection(connectionString)) {\nconnection.Open();\nSqlCommand command\
  \ = new SqlCommand(queryString, connection);\ntry {\ncommand.ExecuteNonQuery();\n\
  }\ncatch (SqlException e) {\nConsole.WriteLine(\"Got expected SqlException due to\
  \ command timeout \");\nConsole.WriteLine(e);\n}\n}\n}\n}\n```\n\n**注意**\n\n测试此示例无需安装\
  \ Visual Studio，只需安装 Microsoft `.NET` 框架即可。如果你也安装了 SQL Server，那么它应该已经安装。典型安装会在 `C:\\\
  Windows\\Microsoft.NET` 文件夹下有一个或多个版本的 Microsoft `.NET` 框架，你可以在那里找到 Microsoft Visual\
  \ C# 编译器或 `csc.exe`。如果你没有使用默认的 SQL Server 实例或没有使用 Windows 身份验证，则可能需要更新提供的代码。\n\n\
  编译代码的一个简单方法是运行以下命令，假设代码保存在名为 test.cs 的文件中：\n\n```shell\n\"C:\\Windows\\Microsoft.NET\\\
  Framework64\\v4.0.30319\\csc.exe\" test.cs\nMicrosoft (R) Visual C# Compiler version\
  \ 4.8.3752.0\nfor C# 5\nCopyright (C) Microsoft Corporation. All rights reserved.\n\
  ```\n\n运行创建的可执行文件 test.exe 将产生预期的错误：\n\n```shell\nGot expected SqlException due\
  \ to command timeout\nSystem.Data.SqlClient.SqlException (0x80131904): Execution\
  \ Timeout Expired.  The timeout period elapsed prior to completion of the operation\
  \ or the server is not responding. ---> System.ComponentModel.Win32Exception (0x80004005):\
  \ The wait operation timed out\n```\n\n既然我已经提到查询存储会追踪在配置的数据库中执行的所有查询，你可能会问，它是否也会捕获使用了\
  \ `RECOMPILE` 提示的查询、维护语句或跨数据库查询。让我用以下例子来回答。在测试数据库上创建一个小表，为运行跨数据库查询做准备：\n\n```sql\n\
  USE Test\nCREATE TABLE Orders (SalesOrderID int)\nINSERT INTO Orders VALUES (43659)\n\
  ```\n\n回到 AdventureWorks2017。再次清空查询存储，以便更容易查看存储在目录视图中的查询：\n\n```sql\nUSE AdventureWorks2017\n\
  GO\nALTER DATABASE AdventureWorks2017 SET QUERY_STORE CLEAR ALL\n```\n\n运行以下语句，确保将备份目标更新为有效路径：\n\
  \n```sql\nALTER INDEX IX_SalesOrderDetail_ProductID ON Sales.SalesOrderDetail REBUILD\n\
  GO\nDBCC CHECKDB\nGO\nSELECT * FROM Sales.SalesOrderDetail\nWHERE ProductID = 898\n\
  OPTION (RECOMPILE)\nGO\nBACKUP DATABASE AdventureWorks2017 TO  DISK = 'c:\\data\\\
  delete_me.bak'\nGO\nSELECT * FROM Sales.SalesOrderDetail a JOIN Test.dbo.Orders\
  \ b\nON a.SalesOrderID = b.SalesOrderID\n```\n\n使用之前的查询来检查哪些查询被查询存储捕获了。除了 `DBCC\
  \ CHECKDB` 和 `BACKUP DATABASE` 语句外，其余所有查询都被捕获了。\n\n\n\n## 强制失败\n\n如前所述，强制执行计划应是在研究和实施长期解决方案期间的一种临时措施。与使用查询提示的情况类似，强制计划也应受到监控，因为在数据库发生变更后，其性能可能会下降。此外，SQL\
  \ Server 也可能无法强制执行指定的计划。查询存储通过 `sys.query_store_plan` 目录视图的 `last_force_failure_reason`\
  \ 和 `last_force_failure_reason_desc` 列提供有关强制计划失败的信息。这些列的文档记录值如下：\n\n*   8637: `ONLINE_INDEX_BUILD`：当目标表有一个正在联机构建的索引时，查询尝试修改数据。\n\
  *   8683: `INVALID_STARJOIN`：计划包含无效的星型连接规范。\n*   8684: `TIME_OUT`：优化器在搜索强制计划指定的计划时，超出了允许的操作数。\n\
  *   8689: `NO_DB`：计划中指定的某个数据库不存在。\n*   8690: `HINT_CONFLICT`：由于计划与查询提示冲突，查询无法编译。\n\
  *   8694: `DQ_NO_FORCING_SUPPORTED`：由于计划与分布式查询或全文检索操作的使用冲突，无法执行查询。\n*   8698: `NO_PLAN`：查询处理器无法生成查询计划，因为无法验证强制计划对查询是否合法。\n\
  *   8712: `NO_INDEX`：计划中指定的索引不再存在。\n*   8713: `VIEW_COMPILE_FAILED`：由于计划中引用的索引视图存在问题，无法强制查询计划。\n\
  *   <其他值>: `GENERAL_FAILURE`：一般性强制错误（未涵盖在上述原因中）。\n\n一个展示此功能的简单示例是，禁用强制计划中正在使用的一个现有索引。首先，清空查询存储和计划缓存：\n\
  \n```sql\nALTER DATABASE AdventureWorks2017 SET QUERY_STORE CLEAR ALL\nGO\nDBCC\
  \ FREEPROCCACHE\n```\n\n通过运行以下代码创建强制执行的计划（假定该存储过程已如之前所示创建）：\n\n```sql\nEXEC test\
  \ @pid = 898\n```\n\n仅为此练习的目的，假定你可能至少有另一个计划，并且希望强制使用带有索引查找操作符的那个计划。运行以下查询以获取其 `plan_id`：\n\
  \n```sql\nSELECT plan_id, q.query_id, query_sql_text FROM sys.query_store_plan p\n\
  JOIN sys.query_store_query AS q\nON p.query_id = q.query_id\nJOIN sys.query_store_query_text\
  \ qt\nON q.query_text_id = qt.query_text_id\nWHERE query_sql_text LIKE '%SELECT\
  \ * FROM Sales.SalesOrderDetail%'\n```\n\n检查结果，找到查询文本 `“(@pid int)SELECT * FROM\
  \ Sales.SalesOrderDetail WHERE ProductID = @pid”`。获取 `query_id` 和 `plan_id` 值。在我的例子中，`query_id`\
  \ 是 1，`plan_id` 是 1。运行以下命令以强制所需的计划：\n\n```sql\nEXEC sys.sp_query_store_force_plan\
  \ @query_id = 1, @plan_id = 1\n```\n\n你也可以选择如前所述在 SQL Server Management Studio 中执行此过程。验证查询是否运行，是否使用了带有索引查找的计划，并且执行计划中的\
  \ `Use Plan` 属性是否设置为 true。最后，禁用该索引：\n\n```sql\nALTER INDEX IX_SalesOrderDetail_ProductID\
  \ ON Sales.SalesOrderDetail DISABLE\n```\n\n如果你再次运行查询，强制计划将会失败，因为该计划所使用的索引不再可用。你将得到一个正常的查询优化和一个使用表扫描的计划。以下查询（首先将\
  \ `plan_id` 更新为你之前使用的值）\n\n```sql\nSELECT * FROM sys.query_store_plan\nWHERE plan_id\
  \ = 1\n```\n\n将返回 `force_failure_count` 为 1，这是强制此计划失败的次数。请记住，此值显示的是优化尝试次数，而非查询执行次数。结果还显示\
  \ `last_force_failure_reason` 为 8712，`last_force_failure_reason_desc` 为 `NO_INDEX`，这与本节开头的文档记录一致。但是，如果你启用或重建索引，计划将继续被强制执行。运行以下语句：\n\
  \n```sql\nALTER INDEX IX_SalesOrderDetail_ProductID ON Sales.SalesOrderDetail REBUILD\n\
  ```\n\n查询处理器将再次使用该强制计划，并且 `sys.query_store_plan` 目录中的 `force_failure_count`、`last_force_failure_reason`\
  \ 和 `last_force_failure_reason_desc` 的值将分别重置为 0、0 和 NONE。\n\n## 等待统计\n\n如前一章所述，从\
  \ SQL Server 2016 开始，可以通过使用 `sys.dm_exec_session_wait_stats` DMV 在会话或查询级别跟踪等待统计信息。显然，我指的是数据库引擎级别。尽管查询存储在同一版本中发布，但在\
  \ SQL Server 2017 中才实现了在查询存储中收集等待信息的功能。毫无疑问，此功能是查询存储自最初发布以来最重要的改进。\n\n等待统计在查询存储中默认是启用的。例如，你可以创建一个新数据库，并在不启用查询存储的情况下，查看\
  \ `sys.database_query_store_options` 以确认 `wait_stats_capture_on` 已启用。因此，如果你启用了查询存储，等待统计功能将随之自动启用。\n\
  \n你也可以通过运行以下语句显式启用等待统计：\n\n```sql\nALTER DATABASE AdventureWorks2017 SET QUERY_STORE\
  \ (WAIT_STATS_CAPTURE_MODE = ON)\n```\n\n类似地，你可以使用 `WAIT_STATS_CAPTURE_MODE = OFF`\
  \ 的相同语句来禁用该功能。\n\n查询存储中的等待类型被分组到等待类别中，其方式类似于第 5 章图 5-3 所示的数据收集功能。让我们尝试一个快速练习，看看此功能如何工作。在确保等待统计功能已启用后，尝试运行一些开销较大的查询。一个简单的例子是运行以下\
  \ SELECT 语句各十次：\n\n```sql\nSELECT * FROM Person.Person\nGO 10\nSELECT * FROM Sales.SalesOrderDetail\n\
  GO 10\n```\n\n查询完成后，你可以立即访问等待信息。为此，你可以使用 SQL Server Management Studio 并从查询存储文件夹运行“查询等待统计信息”报告。你可能会看到一个类似于我在图\
  \ 6-8 中展示的报告。该图基于“等待类别”指标，但你可以将其更改为其他选择，如平均等待时间、最小等待时间、最大等待时间、等待时间标准差、总等待时间或执行计数。我的示例显示了我们的两个查询，称为查询\
  \ ID 1 和 2，包括它们的等待信息。\n\n![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig8_HTML.jpg](img/393702_2_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8 查询存储等待统计信息\n\n单击任何等待类别将带我们进入第二个屏幕，在那里我们可以看到每个查询的等待信息，包括任何可用的执行计划，如图 6-9\
  \ 所见。\n\n![../images/393702_2_En_6_Chapter/393702_2_En_6_Fig9_HTML.jpg](img/393702_2_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9 查询等待统计信息\n\n最后，如前所述，等待被分组到类别中，而不是列出像 `CXPACKET` 或 `ASYNC_NETWORK_IO` 这样的特定等待。例如，所有\
  \ `LCK_M_%` 等待被分组到“锁”类别，所有 `LATCH_%` 分组到“闩锁”类别，`PAGELATCH_%` 分组到“缓冲区闩锁”，`PAGEIOLATCH_%`\
  \ 分组到“缓冲区 I/O”，`CXPACKET` 和其他一些分组到“并行”，`ASYNC_NETWORK_IO` 和其他一些分组到“网络 I/O”，而 `SOS_SCHEDULER_YIELD`\
  \ 单独列为“CPU”，这仅列举了我们通常看到的最常见的一些。你可以通过查看文档中的 `sys.query_store_wait_stats` 来查看完整列表。你也可以在第\
  \ 5 章中看到有关等待的更多详细信息。\n\n\n\n## 目录视图\n\n最后，尽管我们已经使用过一些查询存储目录视图，但让我们在本节中回顾所有这些视图。如前所述，收集的数据持久化在磁盘上，并存储在启用了查询存储的用户数据库中。查询存储目录视图如图\
  \ 6-10 所示，包含以下视图。\n\n| 视图名称 | 描述 |\n| --- | --- |\n| `sys.query_store_query_text`\
  \ | 查询文本信息 |\n| `sys.query_store_query` | 查询信息，包括查询哈希、参数化、编译和优化信息 |\n| `sys.query_store_plan`\
  \ | 执行计划，包括历史记录 |\n| `sys.query_store_runtime_stats` | 查询运行时统计信息。查询存储对每个已执行计划按时间间隔存储聚合统计信息。该间隔由配置选项\
  \ `INTERVAL_LENGTH_MINUTES` 定义 |\n| `sys.query_store_runtime_stats_interval` | 间隔的开始和结束时间\
  \ |\n| `sys.query_context_settings` | 查询上下文设置信息 |\n\n![查询存储目录视图](img/393702_2_En_6_Fig10_HTML.jpg)\n\
  \n**图 6-10** 查询存储目录视图\n\n仅当查询执行结束时（包括如前面所示查询被取消或中断的情况）才会捕获收集的数据。`sys.query_store_query`\
  \ 目录视图的 `query_hash` 列是基于逻辑查询树的单个查询的 MD5 哈希值，它也包括优化器提示。此外，如前所述，如果相同的查询用于即席查询或存储过程中，或用于不同的存储过程中，则将被视为不同的查询。\n\
  \n具有不同上下文设置（即使用影响执行计划的不同 SET 选项）的查询被视为不同的查询。影响执行计划的 SET 选项会影响执行计划的选择，因为它们会影响优化过程中常量表达式计算的结果等。影响执行计划的\
  \ SET 选项如下：\n\n- `ANSI_NULL_DFLT_OFF`\n- `ANSI_NULL_DFLT_ON`\n- `ANSI_NULLS`\n-\
  \ `ANSI_PADDING`\n- `ANSI_WARNINGS`\n- `ARITHABORT`\n- `CONCAT_NULL_YIELDS_NULL`\n\
  - `DATEFIRST`\n- `DATEFORMAT`\n- `FORCEPLAN`\n- `LANGUAGE`\n- `NO_BROWSETABLE`\n\
  - `NUMERIC_ROUNDABORT`\n- `QUOTED_IDENTIFIER`\n\n您可以通过阅读 Microsoft 白皮书 “Plan Caching\
  \ in SQL Server 2008” 在 [`msdn.microsoft.com/en-us/library/ee343986(v=sql.100).aspx`](https://msdn.microsoft.com/en-us/library/ee343986(v=sql.100).aspx)\
  \ 找到有关影响执行计划的 SET 选项的更多信息。\n\n最后，除了前面介绍的 `sp_query_store_force_plan` 和 `sp_query_store_unforce_plan`\
  \ 之外，查询存储还提供了以下存储过程：\n\n- `sp_query_store_remove_query`: 从查询存储中删除一个查询及其所有关联的计划和运行时统计信息。\n\
  - `sp_query_store_remove_plan`: 从查询存储中删除特定计划。\n- `sp_query_store_reset_exec_stats`:\
  \ 从查询存储中清除特定查询计划的运行时统计信息。\n- `sp_query_store_flush_db`: 将查询存储在内存中的部分数据刷新到磁盘。\n\n\
  ## 实时查询统计信息\n\n实时查询统计信息是 SQL Server 2016 引入的另一个查询故障排除功能，您可以在查询仍在执行时使用它来查看实时查询计划。使用此功能（正如稍后解释的，它也可用于\
  \ SQL Server 2014），您可以实时查看查询计划信息，而无需等待查询完成。实时查询统计信息对于确定查询的哪一部分可能运行缓慢，以及对那些要么永不完成、要么运行数小时后失败、要么需要很长时间才能完成的查询进行故障排除非常有用。通常，长时间执行查询面临的一个挑战是缺乏运行时执行统计信息（如\
  \ `sys.dm_exec_query_stats` DMV 或 `SET STATISTICS IO` 和 `SET STATISTICS TIME` 语句提供的信息）或实际执行计划。通常，仅使用估计执行计划不足以解决查询问题。例如，由于它只提供估计信息，因此无法用于检测基数估计问题。\n\
  \n实时查询统计信息使用通过 `sys.dm_exec_query_profiles` DMV 可用的信息。由于此 DMV 是在 SQL Server 2014\
  \ 中引入的，因此只要您使用 SQL Server 2016 Management Studio 或更高版本，实时查询统计信息也可以用于 SQL Server\
  \ 2014，因为该功能是在此工具中实现的。请记住，此功能使用大量系统资源，因此应仅在故障排除场景中使用。在 SQL Server Management Studio\
  \ 中有几种启用此功能的方法，包括在 SQL 编辑器工具栏上选择“包括实时查询统计信息”，或在“工具”菜单或“活动监视器”上使用类似选项。要测试实时查询统计信息如何工作，请使用前面三种方法中的任何一种启用该功能，然后针对\
  \ AdventureWorks2017 数据库运行以下查询。\n\n![实时查询统计信息执行](img/393702_2_En_6_Fig11_HTML.jpg)\n\
  \n**图 6-11** 实时查询统计信息执行\n\n```sql\nSELECT * FROM Sales.SalesOrderDetail s1 CROSS\
  \ JOIN Sales.SalesOrderDetail s2\n```\n\n这应该显示一个类似于图 6-11 中的计划，其中实时查询统计信息同时显示整体查询进度以及查询计划操作符的进度和已用时间，并且信息会在查询执行时实时更新。在撰写本文时，Hekaton\
  \ 内存中编译存储过程不受实时查询统计信息功能支持。\n\n目前，实时查询统计信息揭示的信息不如 DMV 多，因此您可能还想查询 DMV。为了更好地理解通过实时查询统计信息可用的信息，我们可以检查\
  \ DMV 提供的数据。DMV 返回丰富的性能信息列表，包括行数、倒带次数、重新绑定次数、已用时间、CPU 时间、表或索引扫描次数、逻辑读取次数、物理读取次数、预读次数、LOB\
  \ 逻辑读取次数、LOB 物理读取次数和 LOB 预读次数等。（请参阅文档获取完整列表。）这些计数器是每个操作符、每个线程的。\n\n为了使用 `sys.dm_exec_query_profiles`\
  \ DMV，您首先需要启用运行时执行计划统计信息收集，可以使用 `SET STATISTICS PROFILE ON` 或 `SET STATISTICS XML\
  \ ON` 语句，在您将要运行的、作为实时统计信息焦点的查询所在的同一会话中启用。作为一个例子，请按照以下练习操作。打开一个您计划运行查询以获取信息的会话，并获取其会话\
  \ ID。（您可以查看 SQL Server Management Studio 编辑器或运行类似 `SELECT @@SPID` 的语句。）运行以下语句：\n\
  \n```sql\nSET STATISTICS PROFILE ON\n```\n\n现在运行\n\n```sql\nSELECT * FROM Sales.SalesOrderDetail\
  \ s1 CROSS JOIN Sales.SalesOrderDetail s2\n```\n\n\n\n打开第二个会话并运行以下代码，将会话 ID 替换为你在上一步中获取的信息：\n\
  \n```\nSELECT * FROM sys.dm_exec_query_profiles\nWHERE session_id = 55\n```\n\n\
  你将为每个当前正在执行的操作符获得一行数据，并且如果你执行几次，应该能看到一些计数器（如 `row_count`、`cpu_time_ms` 或 `logical_read_count`）随着查询的执行而更新其信息。要结束练习，不要忘记取消第一个查询，因为它会运行很长时间并消耗大量资源。\n\
  \n最后，SQL Server Management Studio 还包含一个计划比较工具，可用于比较执行计划以进行故障排除。此工具在查询调优场景中非常有用，例如测试查询的更改或查询所使用对象（如索引）的更改。有关此工具的更多信息，请参阅\
  \ [`http://blogs.msdn.com/b/sql_server_team/archive/2015/10/12/comparison-tool-released-with-latest-ssms.aspx`](http://blogs.msdn.com/b/sql_server_team/archive/2015/10/12/comparison-tool-released-with-latest-ssms.aspx)。\n\
  \n## 总结\n\n查询存储和实时查询统计是 SQL Server 2016 引入的两个最重要的数据库引擎功能，旨在帮助你进行查询性能故障排除。查询存储通过收集优化和执行运行时统计信息，允许你排除查询性能故障，帮助你精确定位可能已出现性能回退的查询。其数据也可用于查找可作为额外查询调优候选的昂贵查询。最后，查询存储可用于强制查询使用特定计划，这在发现计划回退时非常有用。\n\
  \n虽然查询存储处理的是已完成查询的数据，但实时查询统计可用于在查询仍在运行时对其进行故障排除，这对于那些要么永远无法完成、要么运行数小时后失败、要么需要数小时才能完成的查询非常有用。\n\
  \n"
- "# 第四部分 性能调优与故障排除\n\n## 7. SQL Server 内存中技术\n\n本章涵盖内存中数据库以及一些其他新技术和范式，这些技术从根本上脱离了传统基于磁盘的行存储架构和查询处理算法，而大多数关系数据库几十年来一直使用这些传统技术。当前的关系数据库架构可追溯到\
  \ 20 世纪 70 年代末，当时硬件与今天完全不同，数据库太大无法全部装入内存，并被假定保存在磁盘上。除了更快的处理器和不断下降的内存成本外，当前硬件的内存容量已大幅增加，以至于现在大多数事务数据库可以完全放入内存中。\n\
  \n微软首先在分析和数仓领域引入了内存中数据库技术。这项基于列的存储引擎技术最初作为 Excel 的 PowerPivot 插件的一部分提供，后来包含在 Analysis\
  \ Services 产品中。它最终以列存储索引的形式进入了 SQL Server 关系引擎，并在 SQL Server 2012 中首次引入，经过几个版本的发展，如今已有了非常重要的增强。尽管这项技术是基于列的存储，但值得注意的是，它也是一项内存优化技术，事实上，它有时被称为内存中列存储。通过列存储索引，SQL\
  \ Server 引入了另一种新范式——批处理执行模式，与 SQL Server 所有版本中一直使用的传统基于行的执行相比，这是一种查询处理改进。\n\n内存中技术首次亮相于事务处理领域是在\
  \ 2014 年推出 SQL Server 2014 时，其内存中 OLTP（在线事务处理）功能，因其项目名称而在 2012 年底宣布时被广泛称为 Hekaton。内存中\
  \ OLTP 还引入了一种新型存储过程，称为本机编译存储过程，它被编译为机器本机代码，并以进程内 DLL（动态链接库）的形式加载到内存中。与列存储索引的初期类似，Hekaton\
  \ 在其初始版本中存在相当大的限制。幸运的是，随着产品新版本的发布，它已得到极大改进，允许更多应用程序迁移到它上面。\n\nSQL Server 2012 为分析和数据仓库工作负载引入了列存储索引，SQL\
  \ Server 2014 为事务数据库引入了内存中 OLTP，而 SQL Server 2016 版本则结合了这两项技术，通过允许你在操作表上创建列存储索引来提供实时分析。这些列存储索引现在是可更新的，并且可以如前所述在操作表上创建，这些表既可以是常规的基于磁盘的表，也可以是内存优化的\
  \ Hekaton 表。\n\n尽管本章包含的代码可能比本书其余章节更多，但主要重点是展示新的内存中功能、它们的特性和性能优势。它并非编程指南，因此实现某个功能可能需要查阅\
  \ SQL Server 文档。\n\n由于本章涵盖新技术和新范式，它也使用了与本书其他部分不同的术语。它使用术语“基于磁盘的表”来指代传统表，以区别于新的内存优化表。本机编译存储过程也与传统存储过程形成对比。此外，它使用术语“行存储”来指代传统的行存储，以区别于新的基于列的技术（或列存储）。\n\
  \n\n### 内存 OLTP\n\n在论文《OLTP Through the Looking Glass, and What We Found There》中，Michael\
  \ Stonebraker 等人使用一个开源数据库进行研究，展示了现代数据库系统中查询执行时间的分布情况。他们的结果表明，对于该特定的数据库系统，查询执行时间主要由缓冲区管理器、锁存、锁定和日志记录等组件主导，分别占执行时间的\
  \ 34.6%、14.2%、16.3% 和 11.9%。这四个领域大约占执行时间的 77%。\n\n**注意**  \n《OLTP Through the Looking\
  \ Glass, and What We Found There》这篇论文是推荐阅读材料。你可以在线找到它：[`http://nms.csail.mit.edu/~stavros/pubs/OLTP_sigmod08.pdf`](http://nms.csail.mit.edu/%7Estavros/pubs/OLTP_sigmod08.pdf)。\n\
  \nSQL Server 性能工程团队进行了一项类似的分析，展示了在 SQL Server OLTP 系统中时间占查询执行总时间的百分比分布。他们的分析结果同样有趣，表明通信栈占用了总查询执行时间的\
  \ 10%。I/O 和线程管理又占了 10%，而存储引擎（包括访问方法、事务、锁和日志管理器）使用了 45%。最后，查询处理器占用了总执行时间的 35%。理解\
  \ OLTP 系统中的时间分布是他们研究的关键部分，这使他们能够专注于数据库系统中那些有更多优化机会的组件。\n\nHekaton 是一个为 OLTP 工作负载设计的内存优化引擎，它受益于当前硬件，并旨在最小化在之前列出的一些组件上花费的查询执行时间。内存\
  \ OLTP 通过以下特性实现更好的性能：\n\n*   **内存优化引擎**：数据始终位于内存中，并且 Hekaton 引擎的数据结构和算法针对内存访问进行了优化。新结构包括内存优化的非聚集索引和哈希索引。\n\
  *   **多版本并发控制和乐观并发**：消除了锁和锁存器，因此不再有对锁存器和自旋锁的争用、用户等待锁或阻塞。与 SQL Server 2005 中引入的快照隔离级别类似，Hekaton\
  \ 引擎使用版本控制，尽管其版本存储在内存中而非 `tempdb` 数据库中。\n*   **本机代码**：查询优化器仍用于生成执行计划，但此计划还会被翻译成\
  \ C 代码，编译成 DLL，并加载到内存中。本机代码比传统的解释式查询计划执行得更快。\n\nHekaton 随 SQL Server 2014 发布，并且与列存储索引类似，它最初存在相当多的限制。主要限制是表创建后无法以任何方式更改。无法添加或删除列或索引，也无法更改其任何属性。从\
  \ SQL Server 2016 开始，可以对内存优化表使用 `ALTER TABLE` 来更改大多数表属性。但与传统的基于磁盘的表类似，你仍然希望从一开始就以最佳方式设计内存优化表，因为在生产后进行更改可能需要维护窗口，并可能导致数据库停机。\n\
  \n内存优化的数据结构目前包括表和表变量，而本机编译的模块包括存储过程、触发器以及标量和表值用户定义函数。这些内存优化的数据结构是使用新的 `MEMORY_OPTIMIZED`\
  \ 和 `NATIVE_COMPILATION` 子句定义的。与传统的数据库引擎存储结构不同，内存优化的数据不存储在数据页中。行始终在内存中，表至少需要一个索引。在\
  \ Hekaton 中，表必须完全适合内存，并且其所有数据始终在内存中。但是，你不必将整个数据库移到内存中，可以选择要迁移数据库中的哪些表。你还可以选择哪些存储过程要迁移到本机编译形式。\n\
  \n尽管列存储索引和 Hekaton 都是内存技术，但 Hekaton 的三个性能优势都不直接适用于列存储索引，因为它们用于不同的工作负载并且具有不同的架构。列存储索引中仍然持有锁和锁存器，它们也不实现本机编译代码。列存储索引的性能优势更多地与其基于列的存储、高压缩率和批处理执行算法有关。列存储索引将在下一节中介绍。\n\
  \n**注意**  \n尽管列存储索引和 Hekaton 都是内存技术，但只有后者要求表完全适合内存。列存储索引通常用于非常大的表，不要求完全适合内存。\n\n\
  有趣的是，在 SQL Server 2012 发布后几天，微软技术院士 David Campbell 在他的论文《The Coming In-Memory Database\
  \ Tipping Point》中暗示了将为事务工作负载推出新的内存引擎，这也是一篇推荐阅读材料。你可以在以下网址找到它：[`https://blogs.technet.microsoft.com/dataplatforminsider/2012/04/09/the-coming-in-memory-database-tipping-point`](https://blogs.technet.microsoft.com/dataplatforminsider/2012/04/09/the-coming-in-memory-database-tipping-point)。同年晚些时候在西雅图的一次会议上，Hekaton\
  \ 被正式宣布。\n\n#### 初始版本后的增强功能\n\n从 SQL Server 2016 开始，内存 OLTP 现在能够使用 `ALTER TABLE`\
  \ 和 `ALTER PROCEDURE` 语句来更改表和本机过程。\n\nHekaton 的原始版本在内存方面还有一个严重限制，即数据库中所有表的总内存大小不应超过\
  \ 256 GB。随着 SQL Server 2016 的发布，此限制最初扩展到 2 TB，并且不是一个严格的硬性限制，而是一个支持限制。在 SQL Server\
  \ 2016 RTM 发布几周后，微软宣布正在取消此类限制，并支持操作系统可用的任意内存量。\n\n现在表扫描操作可以并行执行。虽然对于纯 OLTP 工作负载来说这不是一个大要求，但它现在可以使操作分析查询受益，如本章后面所述。\n\
  \n查询优化器使用的统计信息现在会自动更新，就像基于磁盘的表一样。你现在也可以在手动更新统计信息时指定采样方法，因为在 SQL Server 2014 中，`FULLSCAN`\
  \ 是唯一可用的选择。然而，更新后的统计信息不会像传统存储过程那样立即使本机编译模块受益。也就是说，无论是手动还是自动更新统计信息，都不会触发本机编译模块的新优化。你将必须手动重新编译它们，例如，使用\
  \ `sp_recompile` 系统存储过程。\n\n最后，从 SQL Server 2017 开始，Hekaton 移除了每个表或表类型最多八个索引的原始限制。虽然你现在可以定义任意数量的索引，但适用于基于磁盘的表的相同建议仍然适用，你应该只定义真正需要的索引。\n\
  \n#### 内存优化表\n\n让我们开始探索这项技术。首先，我们需要创建一个启用了 Hekaton 的数据库。为此，我们需要使用 `CONTAINS MEMORY_OPTIMIZED_DATA`\
  \ 子句创建一个文件组，如下列代码所示。你可以选择将此类文件组添加到现有数据库中，但每个数据库只允许一个这样的文件组。请确保你的系统拥有必要的驱动器和文件夹，或者根据实际情况进行调整。\n\
  \n创建数据库：\n\n```sql\nCREATE DATABASE Test\nON PRIMARY (NAME = Test_data,\nFILENAME\
  \ = 'C:\\DATA\\Test_data.mdf', SIZE=500MB),\nFILEGROUP Test_fg CONTAINS MEMORY_OPTIMIZED_DATA\n\
  (NAME = Test_fg, FILENAME = 'C:\\DATA\\Test_fg')\nLOG ON (NAME = Test_log, Filename='C:\\\
  DATA\\Test_log.ldf', SIZE=500MB)\n```\n\n在下一个例子中，我将尝试创建一个与 `AdventureWorks` 中完全相同的表，作为一个快速练习，以理解将基于磁盘的表迁移到内存\
  \ OLTP 时需要进行的一些更改。为此，我将使用 SQL Server Management Studio 中的脚本功能（例如，右键单击表并选择“将表脚本化为”->“CREATE\
  \ 到”->“新建查询编辑窗口”）。\n\n> **注意**\n>\n> 本章中所有的 Hekaton 示例都将使用我们刚刚创建的 `Test` 数据库。\n\n\
  这是一个可以成功创建为基于磁盘表的最小版本（仅移除了三个需要用户定义数据类型的列，这在 Hekaton 中不支持）。我添加了 `WITH (MEMORY_OPTIMIZED=ON)`\
  \ 子句，以便你可以在自己的系统上进行测试。\n\n```sql\nCREATE TABLE dbo.SalesOrderHeader(\nSalesOrderID\
  \ int IDENTITY(1,1) NOT FOR REPLICATION NOT NULL,\nRevisionNumber tinyint NOT NULL,\n\
  OrderDate datetime NOT NULL,\nDueDate datetime NOT NULL,\nShipDate datetime NULL,\n\
  Status tinyint NOT NULL,\nSalesOrderNumber  AS (isnull(N'SO'+CONVERT(nvarchar(23),SalesOrderID),N'***\
  \ ERROR ***')),\nCustomerID int NOT NULL,\nSalesPersonID int NULL,\nTerritoryID\
  \ int NULL,\nBillToAddressID int NOT NULL,\nShipToAddressID int NOT NULL,\nShipMethodID\
  \ int NOT NULL,\nCreditCardID int NULL,\nCreditCardApprovalCode varchar(15) NULL,\n\
  CurrencyRateID int NULL,\nSubTotal money NOT NULL,\nTaxAmt money NOT NULL,\nFreight\
  \ money NOT NULL,\nTotalDue  AS (isnull((SubTotal+TaxAmt)+Freight,(0))),\nComment\
  \ nvarchar(128) NULL,\nrowguid uniqueidentifier ROWGUIDCOL  NOT NULL,\nModifiedDate\
  \ datetime NOT NULL,\nCONSTRAINT PK_SalesOrderHeader_SalesOrderID PRIMARY KEY CLUSTERED\
  \ (\nSalesOrderID ASC\n)\n) WITH (MEMORY_OPTIMIZED = ON)\n```\n\n尝试运行 `CREATE TABLE`\
  \ 语句会返回以下部分错误消息或建议：\n\n1.  聚集索引（主键的默认索引）在内存优化表中不受支持。请指定一个 `NONCLUSTERED` 索引。\n2.\
  \  计算列在内存优化表中不受支持（从 SQL Server 2017 开始支持计算列）。\n3.  `ROWGUIDCOL` 功能在内存优化表中不受支持。\n\
  \n最后，接下来是一个可以正常工作的版本，使用了 dbo 架构：\n\n```sql\nCREATE TABLE dbo.SalesOrderHeader(\n\
  SalesOrderID int PRIMARY KEY NONCLUSTERED NOT NULL,\nRevisionNumber tinyint NOT\
  \ NULL,\nOrderDate datetime NOT NULL,\nDueDate datetime NOT NULL,\nShipDate datetime\
  \ NULL,\nStatus tinyint NOT NULL,\nCustomerID int NOT NULL,\nSalesPersonID int NULL,\n\
  TerritoryID int NULL,\nBillToAddressID int NOT NULL,\nShipToAddressID int NOT NULL,\n\
  ShipMethodID int NOT NULL,\nCreditCardID int NULL,\nCreditCardApprovalCode varchar(15)\
  \ NULL,\nCurrencyRateID int NULL,\nSubTotal money NOT NULL,\nTaxAmt money NOT NULL,\n\
  Freight money NOT NULL,\nComment nvarchar(128) NULL,\nModifiedDate datetime NOT\
  \ NULL\n) WITH (MEMORY_OPTIMIZED = ON)\n```\n\n幸运的是，SQL Server 提供了一种更好的方法来帮助你在将表迁移到内存\
  \ OLTP 时查找和评估不兼容性。一个名为“表内存优化顾问”（在新版本中简称为“内存优化顾问”）的工具可以帮助你将基于磁盘的表迁移到内存优化表。要运行此工具，请在\
  \ `AdventureWorks2017` 数据库中右键单击 `Sales.SalesOrderHeader` 表，然后选择“内存优化顾问”。运行迁移验证部分将显示如图\
  \ 7-1 所示的屏幕，该屏幕指示无法继续进行迁移，并提供了附加信息和建议。\n\n![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig1_HTML.jpg](img/393702_2_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1\n\n表内存优化顾问\n\nSQL Server 为存储过程和其他代码提供了一个类似的工具，称为“存储过程本机编译顾问”（或简称“本机编译顾问”），你可以通过右键单击要检查的代码对象来找到它。SQL\
  \ Server 2016 及更高版本还包含了“事务性能分析概述”报告，该报告可以帮助你决定首先将哪些表和代码迁移到 Hekaton。要运行此报告，请右键单击你的数据库，选择“报告”，然后选择“标准报告”。SQL\
  \ Server 2014 提供了类似的报告，但你必须使用“数据收集器”工具来启用和配置它们。\n\n#### 索引\n\n在我们之前创建表的例子中可能不太明显，但每个表都至少需要一个索引。（在\
  \ SQL Server 2014 和 2016 版本中，最多可以定义八个。如果尝试创建超过此最大数量的索引，将返回错误 1910。）Hekaton 引入了两种新的索引类型：内存优化非聚集索引和哈希索引，但它们的用途截然不同。索引会自动更新，且仅存在于内存中；它们永远不会持久化到磁盘上，并且实际上每次\
  \ SQL Server 启动时都会重建。\n\n**注意**\n内存优化非聚集索引最初（并且有时仍然）被称为范围索引，但后来被重命名为非聚集索引。这种命名约定有时会令人困惑，因为现在我们有用于传统表的非聚集索引、用于列存储索引的非聚集索引以及用于内存优化表的非聚集索引。\n\
  \n哈希索引的设计旨在通过比任何其他 SQL Server 索引更快地找到单行来提供最佳性能。哈希索引使用了一些对 SQL Server 用户来说是新的概念，并且要求我们通过指定桶大小来配置其初始大小。桶基本上是行的虚拟容器，内置的哈希函数用于将值映射到这些桶中。例如，图\
  \ 7-2 显示了在 `City` 列上创建的具有八个桶的哈希索引。使用此哈希索引查找行 `San Francisco` 将使用返回桶 2 的哈希函数，然后 Hekaton\
  \ 引擎将在该处找到该行。\n\n![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig2_HTML.jpg](img/393702_2_En_7_Fig2_HTML.jpg)\n\
  *图 7-2：显示哈希冲突的哈希索引*\n\n然而，使用哈希索引时也可能发生冲突。如果您尝试查找行 `Prague`，哈希函数将正确返回桶 5。但是，由于存在不止一行，引擎将不得不搜索链表以找到请求的行。虽然行数较少不是问题，但当每个桶中的行数很多时，可能会出现性能问题。哈希函数总是能高效地找到正确的桶，但遍历长链表可能是一个性能问题。我们可以通过查看动态管理视图\
  \ `sys.dm_db_xtp_hash_index_stats` 的 `avg_chain_length` 列来监控此类信息，该列记录了索引中所有哈希桶的平均行数。\n\
  \n不幸的是，桶计数不能动态更改，在 SQL Server 2014 中，这需要使用新的 `BUCKET_COUNT` 配置创建一个新表。SQL Server\
  \ 2016 及更高版本现在允许使用 `ALTER TABLE` 语句来更改桶大小，但这仍然是对表结构的重大更改，并且是一个阻塞操作，您可能只希望在维护窗口期间执行，因为它很可能需要应用程序中断。由于此限制，估算和规划最佳的桶数量值极为重要。因为当每个桶中的行数较少时可以获得最佳性能，所以主要建议是将\
  \ `BUCKET_COUNT` 值配置为与索引中的唯一行数相同或是其两倍。\n\n让我用一个小型化的 `SalesOrderHeader` 为例向您展示一些例子。创建哈希索引需要\
  \ `NONCLUSTERED HASH` 关键字以及 `BUCKET_COUNT` 定义：\n\n```sql\nCREATE TABLE dbo.SalesOrderHeader(\n\
  \    SalesOrderID int PRIMARY KEY NONCLUSTERED HASH WITH\n        (BUCKET_COUNT\
  \ = 10000),\n    OrderDate datetime NOT NULL,\n    ShipDate datetime NULL,\n   \
  \ Status tinyint NOT NULL,\n    CustomerID int NOT NULL,\n) WITH (MEMORY_OPTIMIZED\
  \ = ON)\n```\n\n表填充数据后，您可以使用 `sys.dm_db_xtp_hash_index_stats` 分析桶的使用情况：\n\n```sql\n\
  SELECT OBJECT_NAME(object_id), * FROM sys.dm_db_xtp_hash_index_stats\n```\n\n`total_bucket_count`\
  \ 列将显示索引中哈希桶的总数，该数字被向上取整到下一个 2 的幂。在请求 10,000 个桶的示例中，索引将创建为 16,384 个桶。\n\n非聚集索引是内存优化的\
  \ B 树索引，更类似于我们习惯的磁盘表上的非聚集索引。它们只需要 `NONCLUSTERED` 关键字。\n\n```sql\nCREATE TABLE dbo.SalesOrderHeader(\n\
  \    SalesOrderID int PRIMARY KEY NONCLUSTERED,\n    OrderDate datetime NOT NULL,\n\
  \    ShipDate datetime NULL,\n    Status tinyint NOT NULL,\n    CustomerID int NOT\
  \ NULL,\n) WITH (MEMORY_OPTIMIZED = ON)\n```\n\n**注意**\n虽然是一篇计算机科学水平较高的论文，但您可以在\
  \ Justin Levandoski 等人撰写的论文 “The Bw-Tree: A B-Tree for New Hardware Platforms” 中了解更多关于新范围索引的信息，您可以在线找到：\
  \ [`www.microsoft.com/en-us/research/publication/the-bw-tree-a-b-tree-for-new-hardware`](http://www.microsoft.com/en-us/research/publication/the-bw-tree-a-b-tree-for-new-hardware)。\n\
  \n总而言之，哈希索引为使用等值谓词搜索行提供了最佳性能（再次假设 `BUCKET_COUNT` 已正确配置和维护）。哈希索引不能用于使用非等值谓词或利用哈希索引的顺序来查找行。如果没有找到更好的索引，之前的操作将需要进行哈希索引扫描。内存优化非聚集索引的行为与基于磁盘的非聚集索引非常相似。您可以执行所有典型操作，包括使用等值和非等值谓词搜索行、利用索引顺序、范围谓词，尽管如前所述，哈希索引在等值搜索方面更优。\n\
  \n\n#### 原生编译模块\n\n如前所述，在 SQL Server 2016 及更高版本中，有三种类型的原生编译模块，包括存储过程、标量和表值用户定义函数以及触发器。最初在\
  \ SQL Server 2014 中引入 Hekaton（内存优化技术）时，仅支持存储过程。我们在此回顾所有这些模块。以下代码是一个原生编译存储过程的基本定义：\n\
  \n```\nCREATE PROCEDURE test\nWITH NATIVE_COMPILATION, SCHEMABINDING,\nEXECUTE AS\
  \ OWNER\nAS\nBEGIN ATOMIC WITH (\nTRANSACTION ISOLATION LEVEL = SNAPSHOT,\nLANGUAGE\
  \ = 'us_english')\nSELECT SalesOrderID, OrderDate, CustomerID\nFROM dbo.SalesOrderHeader\n\
  END\n```\n\n其执行示例如下：\n\n```\nEXEC test\n```\n\n用户定义函数有时会被提及可能引发性能问题。原生编译的用户定义函数性能更佳，但仍应仅在适当的情况下使用。接下来是最基本的标量用户定义函数，用以展示所需的语法：\n\
  \n```\nCREATE FUNCTION test_function()\nRETURNS int\nWITH NATIVE_COMPILATION, SCHEMABINDING\n\
  AS BEGIN ATOMIC WITH (TRANSACTION ISOLATION LEVEL = SNAPSHOT, LANGUAGE = 'English')\n\
  RETURN 1\nEND\n```\n\n您可以使用以下语句调用它：\n\n```\nSELECT dbo.test_function()\n```\n\n\
  以下是一个表值用户定义函数的示例：\n\n```\nCREATE FUNCTION dbo.test_tvf()\nRETURNS TABLE\nWITH NATIVE_COMPILATION,\
  \ SCHEMABINDING\nAS\nRETURN SELECT SalesOrderID, OrderDate, Status FROM dbo.SalesOrderHeader\n\
  ```\n\n您可以使用以下语句调用它：\n\n```\nSELECT * FROM dbo.test_tvf()\n```\n\n类似地，以下是您用于创建触发器的代码。原生编译触发器仅可用于内存优化表，并且这些是内存优化表上唯一允许的触发器类型。\n\
  \n```\nCREATE TRIGGER Insert_SalesOrderHeader\nON dbo.SalesOrderHeader\nWITH NATIVE_COMPILATION,\
  \ SCHEMABINDING\nFOR INSERT, UPDATE, DELETE\nAS BEGIN ATOMIC WITH (TRANSACTION ISOLATION\
  \ LEVEL = SNAPSHOT, LANGUAGE = 'us_english')\n-- trigger code\nEND\n```\n\n为了避免对原生编译模块进行不必要的运行时检查（这些检查必须在执行时进行），某些选项必须在编译时定义。任何原生编译模块所需的选项如下：\n\
  \n*   `SCHEMABINDING`: 将原生编译模块绑定到底层表或表的架构。\n*   `EXECUTE AS`: 指定执行原生编译模块的安全上下文。\n\
  *   `ATOMIC`: 指示整个块作为原子块执行，整个块要么全部提交，要么全部回滚。属于 ANSI SQL 标准的一部分。\n*   `TRANSACTION\
  \ ISOLATION LEVEL`: 定义事务隔离级别，但只有以下三种选择可用：`SNAPSHOT`、`REPEATABLE READ` 和 `SERIALIZABLE`。与传统的\
  \ SQL Server 代码不同，原生编译模块没有默认的事务隔离级别，因此必须指定此选项。\n*   `LANGUAGE`: 指定代码的语言环境。\n\n另外两个选项虽然不是必需的，但它们是\
  \ `DATEFIRST` 和 `DATEFORMAT`，分别用于指定一周的第一天和日期格式。如果未指定，则从 `LANGUAGE` 选项中推断。\n\n####\
  \ 修改表和原生编译模块\n\n现在可以使用 `ALTER TABLE` 来更改表的大多数属性，包括添加和删除列、添加和删除索引，或更改哈希索引的 `BUCKET_COUNT`\
  \ 值。对于内存优化表，不允许使用 `CREATE INDEX` 和 `DROP INDEX`；必须改用 `ALTER TABLE`。让我们看几个示例，假设初始表如下：\n\
  \n1.  添加列。以下代码添加了三列（顺便提一下，这三列最初从基于磁盘的表中删除，因为它们基于用户定义数据类型）：\n\n```\nCREATE TABLE\
  \ dbo.SalesOrderHeader(\nSalesOrderID int PRIMARY KEY NONCLUSTERED NOT NULL,\nRevisionNumber\
  \ tinyint NOT NULL,\nOrderDate datetime NOT NULL,\nDueDate datetime NOT NULL,\n\
  ShipDate datetime NULL,\nStatus tinyint NOT NULL,\nCustomerID int NOT NULL,\nSalesPersonID\
  \ int NULL,\nTerritoryID int NULL,\nBillToAddressID int NOT NULL,\nShipToAddressID\
  \ int NOT NULL,\nShipMethodID int NOT NULL,\nCreditCardID int NULL,\nCreditCardApprovalCode\
  \ varchar(15) NULL,\nCurrencyRateID int NULL,\nSubTotal money NOT NULL,\nTaxAmt\
  \ money NOT NULL,\nFreight money NOT NULL,\nComment nvarchar(128) NULL,\nModifiedDate\
  \ datetime NOT NULL\n) WITH (MEMORY_OPTIMIZED = ON)\n```\n\n2.  添加索引。以下代码添加了一个非聚集索引和一个哈希索引：\n\
  \n```\nALTER TABLE dbo.SalesOrderHeader\nADD OnlineOrderFlag bit NOT NULL,\nPurchaseOrderNumber\
  \ nvarchar(25) NULL,\nAccountNumber nvarchar(25) NULL\n```\n\n3.  更改索引的桶数。以下代码重建一个索引并将桶数更改为\
  \ 100,000：\n\n```\nALTER TABLE dbo.SalesOrderHeader\nADD INDEX IX_ModifiedDate (ModifiedDate),\n\
  INDEX IX_CustomerID HASH (CustomerID) WITH (BUCKET_COUNT = 10000)\n```\n\n4.  删除列或索引。以下代码删除了先前添加的三列：\n\
  \n```\nALTER TABLE dbo.SalesOrderHeader\nALTER INDEX IX_CustomerID\nREBUILD WITH\
  \ (BUCKET_COUNT = 100000)\n```\n\n```\nALTER TABLE dbo.SalesOrderHeader\nDROP COLUMN\
  \ OnlineOrderFlag, PurchaseOrderNumber, AccountNumber\n```\n\n对表进行更改可能会干扰原生编译模块的\
  \ `SCHEMABINDING` 属性。假设您有以下使用 `SalesOrderHeader` 表中若干列的原生编译存储过程：\n\n```\nCREATE\
  \ PROCEDURE dbo.test\nWITH NATIVE_COMPILATION, SCHEMABINDING, EXECUTE AS owner\n\
  AS\nBEGIN ATOMIC\nWITH (TRANSACTION ISOLATION LEVEL = SNAPSHOT, LANGUAGE = 'us_english')\n\
  SELECT SubTotal, ModifiedDate FROM dbo.SalesOrderHeader\nEND\n```\n\n尝试从表中删除该过程引用的某一列\n\
  \n```\nALTER TABLE  dbo.SalesOrderHeader\nDROP COLUMN SubTotal\n```\n\n将返回以下错误：\n\
  \n```\nMsg 5074, Level 16, State 1, Line 1\nThe object 'test' is dependent on column\
  \ 'SubTotal'.\nMsg 4922, Level 16, State 9, Line 1\nALTER TABLE DROP COLUMN SubTotal\
  \ failed because one or more objects access this column.\n```\n\n但是，您可以删除任何未被此过程或其他架构绑定对象引用的列：\n\
  \n```\nALTER TABLE dbo.SalesOrderHeader\nDROP COLUMN TaxAmt\n```\n\n幸运的是，在这种情况下不允许使用星号\
  \ (*) 来选择表中的所有列。尝试这样做会得到错误 1054，提示在架构绑定对象中不允许使用此类语法。\n\nSQL Server 2016 的新功能是，您还可以更改原生编译存储过程。其他原生编译对象（如触发器以及标量和表值用户定义函数）也可以被更改。例如，以下代码更改了先前创建的存储过程，从\
  \ `SELECT` 列表中移除一列并更改了隔离级别：\n\n```\nALTER PROCEDURE dbo.test\nWITH NATIVE_COMPILATION,\
  \ SCHEMABINDING, EXECUTE AS owner\nAS\nBEGIN ATOMIC\nWITH (TRANSACTION ISOLATION\
  \ LEVEL = REPEATABLE READ, LANGUAGE = 'us_english')\nSELECT SubTotal FROM dbo.SalesOrderHeader\n\
  END\n```\n\n\n\n#### 本地编译\n\n本地编译适用于创建内存优化表和本机编译模块。在这两种情况下，系统会生成 C 代码，进行编译和链接，最终创建一个\
  \ DLL，并将其加载到与 SQL Server 可执行文件进程内的内存中以提升性能。你可以通过查询 `sys.dm_os_loaded_modules` DMV\
  \ 来查看当前系统中已加载的 DLL 列表，如下所示，在我的测试系统中，它列出了几个指向 `C:\\Program Files\\Microsoft SQL Server\\\
  MSSQL15.MSSQLSERVER\\MSSQL\\DATA\\xtp\\` 文件夹的文件。\n\n```sql\nSELECT * FROM sys.dm_os_loaded_modules\n\
  WHERE description = 'XTP Native DLL'\n```\n\n数据库社区有时会关注创建文件的安全访问权限问题。总之，我要告诉你不必为此担心。当\
  \ DLL 文件创建时，它会被自动加载到内存中，无需备份这些创建的文件或对它们进行任何维护。这些文件不再被需要。每次 SQL Server 启动时，它都会为内存优化表创建新的\
  \ DLL。本机编译模块仅在首次执行时进行编译。从技术上讲，创建的 DLL 文件具有与数据文件相同的安全访问权限。进入前面列出的 `xtp` 文件夹后，你会发现以配置数据库的数据库\
  \ ID 命名的附加文件夹，其中包含具有以下扩展名的文件（每个内存优化表和本机编译模块都会创建一组这样的文件）：\n\n| 扩展名 | 描述 |\n| ---\
  \ | --- |\n| `.c` | C 语言源代码 |\n| `.dll` | 动态链接库文件 |\n| `.obj` | C 编译器生成的目标文件 |\n\
  | `.out` | C 编译器生成的日志文件（包含编译器使用的参数） |\n| `.pdb` | C 编译器生成的符号文件 |\n| `.xml` | MAT（混合抽象树）文件\
  \ |\n\n注意\n\n内存 OLTP 功能最初被称为极端事务处理，XTP 这个缩写在 SQL Server 的许多地方仍然保留。\n\n在我的系统中，C 编译器和\
  \ Microsoft 链接器分别位于 `C:\\Program Files\\Microsoft SQL Server\\MSSQL15.MSSQLSERVER\\\
  MSSQL\\Binn\\Xtp\\VC\\bin` 目录下的 `cl.exe` 和 `link.exe`。下面是一个用于说明目的的小型 C 代码片段。（生成的代码并非供人类阅读。）\n\
  \n```c\n#include \"hkenggen.h\"\n#include \"hkrtgen.h\"\n#include \"hkgenlib.h\"\
  \n#define ENABLE_INTSAFE_SIGNED_FUNCTIONS\n#include \"intsafe.h\"\n#define HOTPATCH_BUFFER_SIZE\
  \ 256\ntypedef struct _PATCH_BUFFER {\nunsigned short PointerIndex;\nunsigned short\
  \ Fill1;\nunsigned short BufferSize;\nunsigned short Fill2;\nunsigned __int64 Buffer[(HOTPATCH_BUFFER_SIZE\
  \ - 8) / sizeof(__int64)];\n} PATCH_BUFFER;\nPATCH_BUFFER HotPatchBuffer = {0, 0,\
  \ HOTPATCH_BUFFER_SIZE, 0};\nint memcmp(const void*, const void*, size_t);\nvoid\
  \ *memset(void*, int, size_t);\n#pragma deprecated (memcpy)\n#define offsetof(s,f)\
  \   ((size_t)&(((s*)0)->f))\nstruct NullBitsStruct_322100188\n{\nunsigned char hkc_isnull_3:1;\n\
  };\n```\n\n注意\n\n有关 Hekaton 编译器架构的更多详情，你可以阅读 Cristian Diaconu 等人撰写的论文“Hekaton: SQL\
  \ Server’s Memory-Optimized OLTP Engine”，你可以在网上找到它：[`www.microsoft.com/en-us/research/publication/hekaton-sql-servers-memory-optimized-oltp-engine`](http://www.microsoft.com/en-us/research/publication/hekaton-sql-servers-memory-optimized-oltp-engine)。\n\
  \n#### 内存优化表变量\n\n从 SQL Server 2016 开始，你现在可以使用内存优化表变量来替代传统的表变量或临时表。内存优化表变量比它们在 `tempdb`\
  \ 中的对应物性能高出数倍，其优点之一是它们始终位于内存中，并且不使用 `tempdb`。因此，它们不受限于 `tempdb` 的 I/O 访问或争用分配等限制。\n\
  \n注意\n\nSQL Server 2019 的新功能是，你现在可以配置 tempdb 使用基于内存 OLTP 技术的内存优化元数据。通过启用此 tempdb\
  \ 配置，元数据现在可以移入无锁、非持久的内存优化表中，从而在技术上消除了元数据争用。你可以在第[4]章（我们讨论 tempdb 故障排除和配置的地方）找到更多细节。\n\
  \n让我们看一个例子。以下代码创建了一个常规临时表及其等效的内存优化表变量。请注意，创建内存优化表变量需要两个步骤。首先，我们必须使用 `MEMORY_OPTIMIZED\
  \ = ON` 子句创建一个类型，该类型像任何其他内存优化表一样需要一个索引。然后我们必须使用该类型声明一个内存优化表变量。\n\n```sql\nCREATE\
  \ TABLE #temp (\nCustomerID int,\nName varchar(40)\n)\nGO\nCREATE TYPE test\nAS\
  \ TABLE (\nCustomerID int INDEX IX_CustomerID,\nName varchar(40)\n)\nWITH (MEMORY_OPTIMIZED\
  \ = ON)\nGO\nDECLARE @mytest test\nSELECT * FROM @mytest\nSELECT * FROM #temp\n\
  ```\n\n你可能使用具有 `SCHEMA_ONLY` 持久性的内存优化表获得类似行为，但主要区别在于，表架构在 SQL Server 重启或数据库因其他方法离线后，仍然是数据库的一部分。具有\
  \ `SCHEMA_ONLY` 持久性的表在其他一些业务场景中也很有用，例如 Web 应用程序的会话状态以及用于 ETL（提取、转换和加载）目的的临时暂存表。\n\
  \n#### 当前限制\n\n尽管 SQL Server 2019 是 Hekaton 的第四个版本，但在决定开始使用此功能进行项目开发之前，你仍然需要了解一些限制。你可以在“Transact-SQL\
  \ Constructs Not Supported by In-Memory OLTP”（[`https://msdn.microsoft.com/en-us/library/dn246937.aspx`](https://msdn.microsoft.com/en-us/library/dn246937.aspx)）和“Unsupported\
  \ SQL Server Features for In-Memory OLTP”（[`https://msdn.microsoft.com/en-us/library/dn133181.aspx`](https://msdn.microsoft.com/en-us/library/dn133181.aspx)）中找到此类信息。\n\
  \n两份文档都提供了指向先前 SQL Server 版本的链接，但强烈建议你在较新版本上实现新的 Hekaton 项目。\n\n\n\n### 列存储索引\n\n\
  尽管基于列的存储技术研究可以追溯到 20 世纪 70 年代，但其在数据库引擎上的首次实现直到 90 年代才出现，晚了 20 年。列存储为数据仓库数据库提供了性能优势，因为星型连接查询通常只需要事实表中的少数几列。虽然在\
  \ SQL Server 中它也是一种内存中技术，但与`Hekaton`不同，`列存储索引`通常用于非常大的表，并不要求完全装入内存。图 7-3 比较了基于行的存储和基于列的存储，从中我们可以看到，数据库页不是承载一行中的所有列，而是只包含来自一个特定列的数据。\n\
  \n![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig3_HTML.jpg](img/393702_2_En_7_Fig3_HTML.jpg)\n\
  **图 7-3** 行存储与列存储对比\n\n**注意**\n关于此主题的一篇开创性论文和重要参考资料是 Mike Stonebraker 等人的《C-store：一个面向列的\
  \ DBMS》，你可以在 [`https://web.stanford.edu/class/cs245/readings/c-store.pdf`](https://web.stanford.edu/class/cs245/readings/c-store.pdf)\
  \ 在线找到。\n\n`列存储索引`技术首次引入于 SQL Server 2012 版本，最初是作为一种只读的非聚集`列存储索引`，可以创建在`堆`或`聚集索引`上。由于这是一种只读结构，它只对数据仓库有意义，而不适用于操作系统（但正如我们很快将看到的，在\
  \ SQL Server 的后续版本中，`列存储索引`也可以创建在操作系统上）。\n\n当时通常有三种方法来更新只读的`列存储索引`数据，包括使用分区和分区切换、简单地重新创建索引，或使用`UNION\
  \ ALL`将只读`列存储索引`和常规可更新表的数据组合起来。在后续版本中，这些变通方法不再需要。在查询处理方面，`列存储索引`技术还引入了`批处理模式`，这是一种基于向量或向量化的执行方法，旨在通过一次处理多行而不是使用传统的一次处理一行的操作符来提高查询性能。\n\
  \n该功能的下一代版本包含了创建可更新的`聚集列存储索引`的选项。在这种情况下，`列存储索引`成为表或主要存储。换句话说，`列存储存储`现在可以取代整个`行存储`结构。这在\
  \ SQL Server 2014 中引入，并且如果表中没有其他`列存储索引`，只读非聚集`列存储索引`的选项仍然可用。请记住，作为非聚集索引，它必须从基表复制所需的列，因此需要额外的存储空间。但它也可以受益于高压缩率，使得这额外所需的存储空间平均只有\
  \ 10%。在`聚集列存储索引`上不支持其他索引，即使是`行存储`索引也不行，并且内存优化表不支持`列存储索引`。\n\n从 SQL Server 2016 开始，现在可以创建可更新的非聚集`列存储索引`，它可以创建在`堆`或`聚集索引`上（以前只可能创建只读版本）。这种可更新的非聚集`列存储索引`可以创建在\
  \ OLTP 表上，这有助于实时分析查询（本章稍后将介绍），并且也可以支持筛选条件。可更新的`列存储索引`也可以创建在 OLTP 内存优化表上，尽管必须包含所有列，并且不允许筛选条件。在某些性能场景下，可以使用`压缩延迟`来提供帮助。\n\
  \n值得一提的是，在 SQL Server 2014 中的默认行为——拥有一个只读非聚集`列存储索引`——在产品的后续版本中不再可能，尽管如果需要，你可以使用只读文件组来模拟其行为。最后，现在可以在`聚集列存储索引`上创建基于`行存储`的非聚集索引。\n\
  \n总之，`列存储索引`最初有一些限制，使得 SQL Server 2016 成为改进此技术功能的第三个版本。如果出于任何原因，你仍在使用之前的版本，可以使用以下文档来确定特定版本可用哪些功能：[`https://msdn.microsoft.com/en-us/library/dn934994.aspx`](https://msdn.microsoft.com/en-us/library/dn934994.aspx)。\n\
  \n`列存储索引`包括多项性能优势，例如：\n\n*   **列存储**：由于数据仓库星型连接查询通常只从事实表中选择少数几列，因此只读取所需列的页面可以带来巨大的\
  \ I/O 节省。完全不需要读取查询不需要的列所在的页面。\n*   **压缩**：由于同一列的数据存储在相同的页面中，相似数据是连续存放的，这意味着高压缩率，再次节省了\
  \ I/O 资源。\n*   **批处理模式**：`列存储索引`技术使用基于向量或向量化的执行模型，其引擎一次处理多行（通常最多 900 行）。这种处理在查询操作级别完成，并且每个版本包含的操作越来越多。这与传统的查询执行模型形成对比，后者一次只处理一行，并且用于所有版本的\
  \ SQL Server。有关每个 SQL Server 版本支持`批处理模式`的操作列表，请参阅 [`https://msdn.microsoft.com/en-us/library/dn935005.aspx`](https://msdn.microsoft.com/en-us/library/dn935005.aspx)。\n\
  *   **段消除**：如前所述，同一列的数据存储在相同的页面中，多个页面被分组为一个段。类似于分区消除的概念，可以根据查询中用作筛选器的值来消除某些段。\n\
  *   **聚合下推**：从 SQL Server 2016 开始，聚合操作被下推并预先在存储引擎中计算。聚合可以被下推到扫描操作，从而将查询性能提升几个数量级。\n\
  \n\n\n#### 示例\n\n##### 创建非聚集列存储索引\n\n第一个示例展示了如何创建非聚集列存储索引，该操作适用于自 SQL Server 2012\
  \ 以来的所有产品版本。作为一个非聚集索引，它假设表已存在，因此我将在 `AdventureWorksDW2017` 中先创建一个表。\n\n> 注意\n>\n\
  > 如第 1 章所述，你可以从 [`https://docs.microsoft.com/en-us/sql/samples/adventureworks-install-configure`](https://docs.microsoft.com/en-us/sql/samples/adventureworks-install-configure)\
  \ 下载 `AdventureWorksDW2017`。\n\n```sql\nUSE AdventureWorksDW2017\nGO\nCREATE TABLE\
  \ dbo.FactResellerSalesNew(\nProductKey int NOT NULL,\nOrderDateKey int NOT NULL,\n\
  DueDateKey int NOT NULL,\nShipDateKey int NOT NULL,\nResellerKey int NOT NULL,\n\
  EmployeeKey int NOT NULL,\nPromotionKey int NOT NULL,\nCurrencyKey int NOT NULL,\n\
  SalesTerritoryKey int NOT NULL,\nSalesOrderNumber nvarchar(20) NOT NULL,\nSalesOrderLineNumber\
  \ tinyint NOT NULL,\nRevisionNumber tinyint NULL,\nOrderQuantity smallint NULL,\n\
  UnitPrice money NULL,\nExtendedAmount money NULL,\nUnitPriceDiscountPct float NULL,\n\
  DiscountAmount float NULL,\nProductStandardCost money NULL,\nTotalProductCost money\
  \ NULL,\nSalesAmount money NULL,\nTaxAmt money NULL,\nFreight money NULL,\nCarrierTrackingNumber\
  \ nvarchar(25) NULL,\nCustomerPONumber nvarchar(25) NULL,\nOrderDate datetime NULL,\n\
  DueDate datetime NULL,\nShipDate datetime NULL,\nCONSTRAINT PK_SalesOrderNumber_SalesOrderLineNumber\
  \ PRIMARY KEY CLUSTERED (\nSalesOrderNumber ASC,\nSalesOrderLineNumber ASC)\n)\n\
  ```\n\n我们现在可以通过选择表列的子集来创建非聚集列存储索引：\n\n```sql\nCREATE NONCLUSTERED COLUMNSTORE INDEX\
  \ ncsi_FactResellerSalesNew ON dbo.FactResellerSalesNew (\nSalesOrderNumber, SalesOrderLineNumber,\
  \ ProductKey, OrderDateKey, DueDateKey, ShipDateKey,\nResellerKey, EmployeeKey,\
  \ PromotionKey, CurrencyKey, SalesTerritoryKey, RevisionNumber,\nOrderQuantity,\
  \ UnitPrice, ExtendedAmount, UnitPriceDiscountPct, DiscountAmount, ProductStandardCost,\n\
  TotalProductCost, SalesAmount, TaxAmt, Freight, CarrierTrackingNumber, CustomerPONumber,\n\
  OrderDate, DueDate, ShipDate)\n```\n\n如前所述，从 SQL Server 2016 开始，非聚集列存储索引现在是可更新的，因此我们可以在索引创建后加载数据。（如果你在早期版本的\
  \ SQL Server 中测试此代码，其中列存储索引可能是只读的，你可能需要先加载数据。）\n\n```sql\nINSERT INTO dbo.FactResellerSalesNew\
  \ SELECT * FROM dbo.FactResellerSales\n```\n\n##### 星型连接查询示例\n\n接下来是一个利用该索引并以批处理执行模式运行的星型连接查询示例，如图\
  \ 7-4 中的执行计划所示。\n\n![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig4_HTML.jpg](img/393702_2_En_7_Fig4_HTML.jpg)\n\
  \n*图 7-4 事实表上的列存储索引*\n\n```sql\nSELECT ProductKey, SUM(SalesAmount) FROM dbo.FactResellerSalesNew\n\
  GROUP BY ProductKey\n```\n\n##### 尝试创建聚集列存储索引\n\n接下来，尝试创建聚集列存储索引：\n\n```sql\nCREATE\
  \ CLUSTERED COLUMNSTORE INDEX csi_FactResellerSalesNew ON dbo.FactResellerSalesNew\n\
  ```\n\n这不会成功有两个主要原因。直接原因是我们的表已经有一个聚集索引，显然每个表只允许一个。即使你删除聚集索引，或使用 `CREATE CLUSTERED\
  \ COLUMNSTORE INDEX WITH (DROP_EXISTING = ON)`，下一个限制是每个表只允许一个列存储索引，SQL Server 将报错\
  \ 35339。\n\n##### 清理操作\n\n接下来，通过删除索引进行清理：\n\n```sql\nDROP INDEX dbo.FactResellerSalesNew.ncsi_FactResellerSalesNew\n\
  ```\n\n显然，如果你也要删除表，则不需要删除索引，如下所示：\n\n```sql\nDROP TABLE FactResellerSalesNew\n```\n\
  \n##### 创建无聚集索引的表并创建聚集列存储索引\n\n对于下一个练习，创建一个没有聚集索引的表版本：\n\n```sql\nUSE AdventureWorksDW2017\n\
  GO\nCREATE TABLE dbo.FactResellerSalesNew(\nProductKey int NOT NULL,\nOrderDateKey\
  \ int NOT NULL,\nDueDateKey int NOT NULL,\nShipDateKey int NOT NULL,\nResellerKey\
  \ int NOT NULL,\nEmployeeKey int NOT NULL,\nPromotionKey int NOT NULL,\nCurrencyKey\
  \ int NOT NULL,\nSalesTerritoryKey int NOT NULL,\nSalesOrderNumber nvarchar(20)\
  \ NOT NULL,\nSalesOrderLineNumber tinyint NOT NULL,\nRevisionNumber tinyint NULL,\n\
  OrderQuantity smallint NULL,\nUnitPrice money NULL,\nExtendedAmount money NULL,\n\
  UnitPriceDiscountPct float NULL,\nDiscountAmount float NULL,\nProductStandardCost\
  \ money NULL,\nTotalProductCost money NULL,\nSalesAmount money NULL,\nTaxAmt money\
  \ NULL,\nFreight money NULL,\nCarrierTrackingNumber nvarchar(25) NULL,\nCustomerPONumber\
  \ nvarchar(25) NULL,\nOrderDate datetime NULL,\nDueDate datetime NULL,\nShipDate\
  \ datetime NULL)\n```\n\n现在你可以创建聚集列存储索引，这基本上会将整个表存储从行存储转换为列存储。这可以从堆（如本例）或基于行的聚集索引（如后所示）转换而来。\n\
  \n```sql\nCREATE CLUSTERED COLUMNSTORE INDEX csi_FactResellerSalesNew ON dbo.FactResellerSalesNew\n\
  ```\n\n你可以如前所述加载数据，因为自 SQL Server 2014 引入以来，聚集列存储索引始终是可更新的。类似地，此时尝试创建非聚集列存储索引将返回错误\
  \ 35339。\n\n##### 直接创建为聚集列存储的表\n\n你也可以直接将表创建为聚集列存储。这是一个仅使用上一个表中几列的示例：\n\n```sql\n\
  DROP TABLE dbo.FactResellerSalesNew\nGO\nCREATE TABLE dbo.FactResellerSalesNew (\n\
  ProductKey int NOT NULL,\nOrderDateKey int NOT NULL,\nDueDateKey int NOT NULL,\n\
  ShipDateKey int NOT NULL,\nResellerKey int NOT NULL,\nEmployeeKey int NOT NULL,\n\
  PromotionKey int NOT NULL,\nCurrencyKey int NOT NULL,\nSalesTerritoryKey int NOT\
  \ NULL,\nINDEX csi_FactResellerSalesNew CLUSTERED COLUMNSTORE)\n```\n\n##### 在聚集列存储上创建非聚集行存储索引\n\
  \n我们之前看到不能在聚集列存储上创建非聚集列存储（实际上，不能创建超过一个任何类型的聚集索引），但我们可以创建行存储非聚集索引。示例如下：\n\n```sql\n\
  CREATE INDEX IX_ProductKey ON dbo.FactResellerSalesNew(ProductKey)\n```\n\n#####\
  \ 使用 `DROP_EXISTING` 子句转换索引类型\n\n假设一个表是行存储聚集索引，你可以使用 `DROP_EXISTING` 子句将其转换为列存储聚集索引。运行以下语句创建一个行存储：\n\
  \n```sql\nDROP TABLE dbo.FactResellerSalesNew\nGO\nCREATE TABLE dbo.FactResellerSalesNew\
  \ (\nProductKey int NOT NULL,\nOrderDateKey int NOT NULL,\nDueDateKey int NOT NULL,\n\
  ShipDateKey int NOT NULL,\nResellerKey int NOT NULL,\nEmployeeKey int NOT NULL,\n\
  PromotionKey int NOT NULL,\nCurrencyKey int NOT NULL,\nSalesTerritoryKey int NOT\
  \ NULL)\n```\n\n如果你运行以下查询，`type_desc` 列将返回 `HEAP` 作为索引类型的描述：\n\n```sql\nSELECT *\
  \ FROM sys.indexes\nWHERE object_id = OBJECT_ID('dbo.FactResellerSalesNew')\n```\n\
  \n运行以下代码创建基于行的聚集索引：\n\n```sql\nCREATE CLUSTERED INDEX IX_ProductKey ON dbo.FactResellerSalesNew\
  \ (ProductKey)\n```\n\n这次，`type_desc` 将是 `CLUSTERED`，但仍然是基于行存储的。通过运行以下语句，存储将从聚集行存储更改为聚集列存储。`sys.indexes`\
  \ 上的 `type_desc` 将返回 `CLUSTERED COLUMNSTORE`。\n\n```sql\nCREATE CLUSTERED COLUMNSTORE\
  \ INDEX IX_ProductKey ON dbo.FactResellerSalesNew\nWITH (DROP_EXISTING = ON)\n```\n\
  \n##### 将列存储转换回行存储\n\n你也可以将列存储转换回行存储，可以是堆或聚集索引。删除列存储将创建一个堆，如以下示例所示。接续前面的示例，删除索引将使\
  \ `type_desc` 恢复为 `HEAP`：\n\n```sql\nDROP INDEX dbo.FactResellerSalesNew.IX_ProductKey\n\
  ```\n\n或者，不删除索引，你可以运行下一段代码；`type_desc` 将变回基于行的聚集索引：\n\n```sql\nCREATE CLUSTERED\
  \ INDEX IX_ProductKey ON dbo.FactResellerSalesNew(ProductKey)\nWITH (DROP_EXISTING\
  \ = ON)\n```\n\n\n### 列存储索引中的碎片\n\n最后，列存储索引也可能像常规的 B 树索引一样产生碎片。你可以使用 `dm_db_column_store_row_group_physical_stats`\
  \ DMV 来找出碎片级别：\n\n```sql\nSELECT OBJECT_NAME(object_id),\n100 * (ISNULL(deleted_rows,0))\
  \ / total_rows AS fragmentation, *\nFROM sys.dm_db_column_store_row_group_physical_stats\n\
  ```\n\n当碎片级别达到 20% 或更高时，你可以考虑进行碎片整理。与基于磁盘的索引类似，你可以使用 `ALTER INDEX REORGANIZE` 和\
  \ `ALTER INDEX REBUILD` 语句。`ALTER INDEX REORGANIZE` 的基本示例如下：\n\n```sql\nALTER INDEX\
  \ csi_FactResellerSalesNew ON dbo.FactResellerSalesNew REORGANIZE\n```\n\n类似地，`ALTER\
  \ INDEX REBUILD` 的基本语法如下所示：\n\n```sql\nALTER INDEX csi_FactResellerSalesNew ON dbo.FactResellerSalesNew\
  \ REBUILD\n```\n\n列存储索引中的碎片处理方式与行存储不同，其技术细节超出了本书的范围。要了解入门方法，请查看《列存储索引碎片整理》一文，链接位于\
  \ [`https://msdn.microsoft.com/en-us/library/dn935013.aspx`](https://msdn.microsoft.com/en-us/library/dn935013.aspx)。\n\
  \n## 操作分析\n\n如前所述，从 SQL Server 2016 开始，通过在 OLTP 表上实现可更新的列存储索引，你现在能够在 OLTP 系统上直接运行实时分析查询。非聚集列存储索引并非新特性，但在之前的\
  \ SQL Server 版本中它们是只读结构，现在可以在基于磁盘的 OLTP 表上实现。也可以在内存优化表上创建聚集列存储索引，以提供操作分析功能。\n\n\
  为了更好地理解在事务系统上进行实时分析查询的好处，让我们快速回顾一下传统的数据仓库或分析架构，如图 7-5 所示。在此架构中，我们通常将 OLTP 和数据仓库/分析工作负载分离在两个不同的服务器上，并使用\
  \ ETL 作业将数据从一个或多个位置移动到数据仓库中。\n\n![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig5_HTML.jpg](img/393702_2_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5：传统数据仓库/分析架构\n\nSQL Server 操作分析可用于需要实时数据的场景，通过直接在 OLTP 环境中运行查询实现。简化的架构如图\
  \ 7-6 所示。\n\n![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig6_HTML.jpg](img/393702_2_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6：SQL Server 操作分析\n\n该架构具有以下优点：\n\n*   **无数据延迟：** 操作分析是实时的。事务一旦提交，其数据即可被分析查询获取。然而，典型的数据仓库需要定期运行\
  \ ETL 作业，例如每天一次。在这种情况下，数据仓库中的数据可能滞后一天。某些分析需求可能需要实时或接近实时的数据。\n*   **无需 ETL：** 你直接从\
  \ OLTP 数据库访问事务数据。\n*   **成本：** 不需要额外的服务器基础设施或许可证费用。当然，这假设你的服务器性能和可用资源能够同时支持事务和分析工作负载。\n\
  *   **无需更改 OLTP 应用程序。** 当然，如果你的分析查询已经存在，则需要对其进行更改。\n\n显然，虽然在 OLTP 工作负载上保持最佳性能至关重要，但在添加额外的列存储索引和分析工作负载后，你可能会对性能有所担忧。这种新架构的缺点如下：\n\
  \n*   **无额外数据源：** 由于列存储索引是在事务数据库上创建的，实时查询仅针对单一数据源。你可以访问 OLTP 数据库的实时数据，并可能访问同一实例甚至另一个实例上其他\
  \ SQL Server 数据库的数据。典型的数据仓库则集成了来自多个来源的数据，包括其他关系型或非关系型数据源。\n*   **分析查询在星型模式上更快：**\
  \ 数据仓库通常实现星型模式。OLTP 模式中的数据规范化程度更高，通常使用第三范式 (3NF) 以最小化数据重复并确保引用完整性。然而，列存储索引比直接访问\
  \ OLTP 规范化表提供更好的性能。\n*   **性能考虑：** 虽然创建和维护额外的非聚集索引可能不是性能问题，但在对同一数据库运行新的分析查询时必须考虑一些因素。你的服务器应该能够支持这个新的工作负载。下文展示了一些性能建议。\n\
  *   **无多维数据集或其他预聚合数据：** 更复杂的聚合或分析查询可能仍需要传统的数据仓库方法。\n\n如前所述，在同一数据库上同时运行操作和分析工作负载时，提高性能的一些建议包括：\n\
  \n*   **使用 Always On 可用性组在辅助副本上运行查询：** 你可以将分析工作负载卸载到 Always On 可用性组的辅助副本上。列存储索引仍需要在主副本上更新，但分析查询在辅助副本上执行，对主副本的性能干扰最小。\n\
  *   **使用列存储筛选索引：** 当事务和分析工作负载访问最新或“热点”数据存在争用时，可以使用此解决方案。由于每个插入、删除和更新操作都需要反映在列存储索引中，你可以考虑避开那些频繁更新的行。这可以通过从列存储索引中过滤掉这些行来实现。分析查询仍然可以通过对大多数数据使用列存储索引，对最新数据使用事务表来访问所有数据。这个过程是透明的，由查询优化器决定如何实现。本章稍后将展示一个如何实现的例子。\n\
  *   **使用压缩延迟：** 在定义筛选索引不容易或不实际的情况下，另一个选择是延迟列存储索引的压缩。如前所述，行会在此类索引上被压缩，但由于与筛选索引相同的原因，有时“热点”数据可能变化频繁。如果行过早压缩，随着数据不断更新，它们可能需要多次重新压缩。`COMPRESSION_DELAY`\
  \ 选项可用于帮助解决此压缩开销。有关此选项的更多详细信息，请参阅 [`https://msdn.microsoft.com/en-us/library/dn817827.aspx`](https://msdn.microsoft.com/en-us/library/dn817827.aspx)。\n\
  \n现在，让我们看一下基于磁盘的表和内存优化表的使用示例。\n\n\n### 使用基于磁盘的表\n\n由于我们希望在 OLTP 数据库上运行这些示例，我们现在将切换回\
  \ `AdventureWorks2017` 数据库。让我们在 `SalesOrderHeader` 表上创建一个非聚集列存储索引：\n```sql\nCREATE\
  \ NONCLUSTERED COLUMNSTORE INDEX SalesOrderHeader_ncci ON Sales.SalesOrderHeader\
  \ (\nSalesOrderID, RevisionNumber, OrderDate, DueDate, ShipDate, Status,\nOnlineOrderFlag,\
  \ PurchaseOrderNumber, AccountNumber, CustomerID, SalesPersonID,\nTerritoryID, BillToAddressID,\
  \ ShipToAddressID, ShipMethodID, CreditCardID,\nCreditCardApprovalCode, CurrencyRateID,\
  \ SubTotal, TaxAmt, Freight, Comment,\nModifiedDate)\n```\n\n创建这样的索引就足以让我们开始运行分析查询了。例如，以下查询将使用非聚集列存储索引，如图\
  \ 7-7 中的执行计划所示，其中扫描操作以批处理执行模式运行：\n\n![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig7_HTML.jpg](img/393702_2_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7：在 OLTP 表上的非聚集列存储索引\n\n```sql\nSELECT MAX(TotalDue)\nFROM Sales.SalesOrderHeader\n\
  ```\n\n当然，是否使用列存储索引或其他任何数据结构，是由查询优化器决定的。如果你查看上一个查询的成本，它将显示 0.017469 个成本单位。运行下一个查询，要求查询优化器不使用此类索引，则估计成本为\
  \ 0.569733，这显然更昂贵。你也可以尝试在不使用提示的情况下直接删除索引，以获得相同的行为和成本。\n```sql\nSELECT MAX(TotalDue)\n\
  FROM Sales.SalesOrderHeader\nOPTION (IGNORE_NONCLUSTERED_COLUMNSTORE_INDEX)\n```\n\
  \n注意：`IGNORE_NONCLUSTERED_COLUMNSTORE_INDEX` 提示要求查询优化器在查询中忽略任何非聚集列存储索引。在 `SQL Server`\
  \ 由于某些原因未能为你提供良好的执行计划时，你可以使用它。\n\n现在，我将展示一个使用筛选的非聚集列存储索引可能很有用的练习，但我们需要先删除当前的索引。尝试创建第二个非聚集列存储索引是不支持的，并会导致错误消息\
  \ 35339。\n```sql\nDROP INDEX Sales.SalesOrderHeader.SalesOrderHeader_ncci\n```\n\
  \n让我们假设“热门”数据的状态为 1。（出于某种原因，`AdventureWorks2017` 中没有实现这一点，整个表的值都是 5。）让我们更新几行具有最近发货日期的记录：\n\
  ```sql\nUPDATE Sales.SalesOrderHeader\nSET Status = 1\nWHERE ShipDate = '2014-07-07\
  \ 00:00:00.000'\n```\n\n运行以下语句以创建一个筛选的非聚集列存储索引，包含所有状态为 5 的行，这是表中的大部分行：\n```sql\n\
  CREATE NONCLUSTERED COLUMNSTORE INDEX SalesOrderHeader_ncci ON Sales.SalesOrderHeader\
  \ (\nSalesOrderID, RevisionNumber, OrderDate, DueDate, ShipDate, Status,\nOnlineOrderFlag,\
  \ PurchaseOrderNumber, AccountNumber, CustomerID, SalesPersonID, TerritoryID, BillToAddressID,\
  \ ShipToAddressID, ShipMethodID, CreditCardID, CreditCardApprovalCode, CurrencyRateID,\
  \ SubTotal, TaxAmt, Freight, Comment, CreditCardApprovalCode, CurrencyRateID, SubTotal,\
  \ TaxAmt, Freight, Comment, ModifiedDate)\nWHERE Status = 5\n```\n\n即使查询处理器可以从中受益并访问状态为\
  \ 5 的所有数据，尝试运行先前的分析查询也不会选择列存储索引。原因很简单：没有廉价的方法来访问剩余的少数状态为 1 的行，而不对基表进行表扫描。因此，查询无论如何都在进行常规的表扫描。为了提供帮助，建议在\
  \ `Status` 列上创建一个基于行的聚集或非聚集索引。让我们尝试第二种选择：\n```sql\nCREATE INDEX IX_Status ON Sales.SalesOrderHeader(Status)\n\
  ```\n\n一旦创建了这个行存储索引，运行先前的分析查询将使用非聚集列存储索引来处理大部分数据，并使用行存储非聚集索引来处理剩余的所需行，如图 7-8 中的部分执行计划所示。\n\
  \n![../images/393702_2_En_7_Chapter/393702_2_En_7_Fig8_HTML.jpg](img/393702_2_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8：使用筛选列存储索引的查询\n\n像下面这样更复杂的分析查询将产生类似于图 7-8 的计划，对大部分数据使用列存储索引，加上使用行存储索引导航到额外的行：\n\
  ```sql\nSELECT SalesPersonID, SUM(TotalDue), AVG(TotalDue)\nFROM Sales.SalesOrderHeader\n\
  WHERE TerritoryID > 3\nGROUP BY SalesPersonID\n```\n\n最后，为了清理，删除本练习中创建的两个索引，并将 `Status`\
  \ 列设置回其原始值：\n```sql\nDROP INDEX Sales.SalesOrderHeader.IX_Status\nDROP INDEX Sales.SalesOrderHeader.SalesOrderHeader_ncci\n\
  UPDATE Sales.SalesOrderHeader\nSET Status = 5\nWHERE ShipDate = '2014-07-07 00:00:00.000'\n\
  ```\n\n\n### 使用内存优化表\n\n我们刚刚看到了如何在基于磁盘的 OLTP 表上创建非聚集列存储索引。如果我们想在内存优化表上执行相同的操作，则存在一些重要的区别。首先，我们不能使用非聚集列存储索引；只允许创建聚集列存储索引。此外，根据内存优化表的要求，整个索引必须放入内存中。\n\
  \n然而，这并不意味着需要双倍的内存，因为列存储索引通常具有很高的压缩级别。来自微软的数据显示平均压缩率可达十倍，因此额外的列存储索引所需的内存仅比内存优化表本身多出约\
  \ 10%。\n\n让我们创建这个表。请注意，列存储索引是在创建表时定义的。也可以在现有的内存优化表上创建索引，后面将展示如何操作的示例。\n\n```\nCREATE\
  \ TABLE SalesOrderHeader (\nSalesOrderID int PRIMARY KEY NONCLUSTERED NOT NULL,\n\
  RevisionNumber tinyint NOT NULL,\nOrderDate datetime NOT NULL,\nDueDate datetime\
  \ NOT NULL,\nShipDate datetime NULL,\nStatus tinyint NOT NULL,\nCustomerID int NOT\
  \ NULL,\nSalesPersonID int NULL,\nTerritoryID int NULL,\nBillToAddressID int NOT\
  \ NULL,\nShipToAddressID int NOT NULL,\nShipMethodID int NOT NULL,\nCreditCardID\
  \ int NULL,\nCreditCardApprovalCode varchar(15) NULL,\nCurrencyRateID int NULL,\n\
  SubTotal money NOT NULL,\nTaxAmt money NOT NULL,\nFreight money NOT NULL,\nComment\
  \ nvarchar(128) NULL,\nModifiedDate datetime NOT NULL,\nINDEX SalesOrderHeader_cci\
  \ CLUSTERED COLUMNSTORE)\nWITH (MEMORY_OPTIMIZED = ON)\n```\n\n为了运行一些基本的分析查询，我们需要填充一些数据。尝试直接从\
  \ `AdventureWorks2017` 复制数据会返回以下错误，所以我们分两步进行，使用一个临时表：\n\n```\nMsg 41317, Level 16,\
  \ State 5, Line 1\n访问内存优化表或原生编译模块的用户事务不能访问超过一个用户数据库或 model 和 msdb 数据库，也不能写入 master。\n\
  ```\n\n运行以下语句将数据复制到临时表：\n\n```\nSELECT\nSalesOrderID,\nRevisionNumber,\nOrderDate,\n\
  DueDate,\nShipDate,\nStatus,\nCustomerID,\nSalesPersonID,\nTerritoryID,\nBillToAddressID,\n\
  ShipToAddressID,\nShipMethodID,\nCreditCardID,\nCreditCardApprovalCode,\nCurrencyRateID,\n\
  SubTotal,\nTaxAmt,\nFreight,\nComment,\nModifiedDate\nINTO #temp\nFROM AdventureWorks2017.Sales.SalesOrderHeader\n\
  ```\n\n最后，将数据插入内存优化表：\n\n```\nINSERT INTO dbo.SalesOrderHeader (\nSalesOrderID,\n\
  RevisionNumber,\nOrderDate,\nDueDate,\nShipDate,\nStatus,\nCustomerID,\nSalesPersonID,\n\
  TerritoryID,\nBillToAddressID,\nShipToAddressID,\nShipMethodID,\nCreditCardID,\n\
  CreditCardApprovalCode,\nCurrencyRateID,\nSubTotal,\nTaxAmt,\nFreight,\nComment,\n\
  ModifiedDate)\nSELECT * FROM #temp\n```\n\n成功填充表后，您可以运行一些类似于上一节中的分析查询，这两种情况都将受益于之前创建的列存储索引：\n\
  \n```\nSELECT MAX(SubTotal)\nFROM dbo.SalesOrderHeader\nSELECT SalesPersonID, SUM(SubTotal),\
  \ AVG(SubTotal)\nFROM dbo.SalesOrderHeader\nWHERE TerritoryID > 3\nGROUP BY SalesPersonID\n\
  ```\n\n您也可以向现有的内存优化表添加列存储索引。例如，假设该表已存在，请遵循以下代码：\n\n```\nCREATE TABLE SalesOrderHeader\
  \ (\nSalesOrderID int PRIMARY KEY NONCLUSTERED NOT NULL,\nRevisionNumber tinyint\
  \ NOT NULL,\nOrderDate datetime NOT NULL,\nDueDate datetime NOT NULL,\nShipDate\
  \ datetime NULL,\nStatus tinyint NOT NULL,\nCustomerID int NOT NULL,\nSalesPersonID\
  \ int NULL,\nTerritoryID int NULL,\nBillToAddressID int NOT NULL,\nShipToAddressID\
  \ int NOT NULL,\nShipMethodID int NOT NULL,\nCreditCardID int NULL,\nCreditCardApprovalCode\
  \ varchar(15) NULL,\nCurrencyRateID int NULL,\nSubTotal money NOT NULL,\nTaxAmt\
  \ money NOT NULL,\nFreight money NOT NULL,\nComment nvarchar(128) NULL,\nModifiedDate\
  \ datetime NOT NULL)\nWITH (MEMORY_OPTIMIZED = ON)\n```\n\n您只需要添加以下语句即可获得与之前相同的结果：\n\
  \n```\nALTER TABLE SalesOrderHeader ADD INDEX SalesOrderHeader_cci CLUSTERED COLUMNSTORE\n\
  ```\n\n当前的一个限制是，您需要将内存中表的所有列都包含在列存储索引中。内存优化表不支持非聚集列存储索引。尝试使用 `ALTER TABLE ADD INDEX`\
  \ 语句添加此类索引将返回以下错误消息：\n\n```\nMsg 10794, Level 16, State 76, Line 1\nThe feature\
  \ 'NONCLUSTERED COLUMNSTORE' is not supported with memory optimized tables.\n```\n\
  \n## 总结\n\n本章涵盖了 SQL Server 的内存技术。尽管主要目的是介绍针对内存优化的数据库，但也引入了一些相关的趋势和范式，包括原生编译模块、列式数据库和批处理。这些新趋势分别是对解释执行、基于行的存储和逐行查询执行等传统技术的补充或竞争。列存储索引和内存\
  \ OLTP 在最初发布时都存在严重的限制，但在后续版本中得到了改进。\n\n我们介绍了内存 OLTP 和列存储索引，这两个功能最初发布时存在一些限制，但经过几个\
  \ SQL Server 版本的迭代已得到改进。本章最后介绍了操作型分析，现在可以在基于磁盘或内存优化的事务表上创建列存储索引，以允许执行实时分析查询。\n\n\
  我们期望本章介绍的技术和范式能代表 SQL Server 乃至整个关系数据库技术的未来。\n\n\n"
- '# 8. 性能故障排除


  本章讨论在排查 SQL Server 性能问题时需要寻找哪些信息，既包括检查实时数据，也包括为后续分析收集信息。SQL Server 中的性能信息通过多种方式暴露，通常需要使用不同的工具来查看或收集这些数据。其中一种新颖且极具前景的工具
  `查询存储` 已在第 6 章中详细阐述。我确信 `查询存储` 将成为 SQL Server 2016 及以上版本查询性能故障排除的主要工具。除了查询性能，还有许多性能领域并不属于查询故障排除的范畴。


  **主动收集信息**对于高性能系统至关重要。你不能仅仅依赖在接到性能问题排查请求后才去获取当前可用信息。当你连接到 SQL Server 实例进行研究时，所需的信息可能已经消失了。然而，收集到的数据可以直接、快速地显示问题所在。此外，你可能需要一个基准，甚至可能还需要性能趋势，以了解系统如何运行，并主动发现情况何时开始偏离理想或预期的行为，无论是由于意外问题还是工作负载增加所致。


  本章涵盖了多种性能信息，包括性能计数器、通过 `DMV`（动态管理视图）或 `DMF`（动态管理函数）等对象提供的信息以及 SQL Server 事件，目前包括扩展事件和目前已弃用的
  `SQL Trace`（更广为人知的是其客户端工具 `SQL Profiler`）。这些性能信息由 SQL Server 提供，在某些情况下也由 Windows
  Server 甚至其他 Windows 应用程序、服务或驱动程序提供。话虽如此，性能计数器、事件或管理对象的数量非常庞大，并且随着每个版本甚至服务包的发布都会引入越来越多，因此这里仅描述最重要或最有用的那些。本书其他章节中也使用并描述了更多此类信息。如果你需要查看完整列表或更多详情，我也会提供文档链接。


  注意

  本章不教授如何使用这些工具，因为假定读者已具备使用这些工具的基本知识和经验。`查询存储` 是个例外，因为它是一个新工具，但已在第 6 章中详细涵盖。


  最后，在许多情况下，为某些性能计数器或其他性能信息提供“神奇值”历来是个问题，有时关于这些值的糟糕建议来自互联网。还有一种情况是，其中一些值在过去曾经是好的建议，但现在已不再那么有意义。一个经典的例子是
  `页面预期寿命 (PLE)` 著名的值 300，它已不再是一个好的建议（如果它曾经是的话）。因此，在大多数情况下，建议不是去寻找某个特定的“神奇值”，而是与基准进行比较。


  ## 性能计数器


  性能计数器是提供信息以监控系统活动的对象。尽管 Windows 自身提供这些计数器，但它们显示的信息不仅关于操作系统，也关于一些其他 Windows 应用程序、服务和驱动程序。作为
  Windows 应用程序，SQL Server 提供了丰富的性能计数器数量，但在排查 SQL Server 问题时，通常也需要来自操作系统以及一些其他 Windows
  服务或驱动程序的性能计数器。


  与第 5 章中介绍的等待信息类似，性能计数器提供的值有时可能难以解释，可能需要经验或系统基准进行比较。如前所述，网上也有一些糟糕建议的情况，其中推荐的值可能对你的系统并不完全合适，或者即使在过去曾是有效的建议，现在可能也不再是一个好的值。


  性能计数器使用三个基本术语：`对象`、`计数器` 和 `实例`。SQL Server 性能对象的格式为 `SQLServer:<对象名称>`，并且可能包含多个计数器。例如，`SQLServer:Databases`
  对象包含诸如 `数据文件大小 (KB)` 或 `日志增长` 等计数器，这两者将在后面解释。某些对象可能有多个实例。沿用此例，对于 `SQLServer:Databases`，这里的实例由服务器上可用的系统和用户数据库表示。你可以从一个、部分或所有实例的组合中获取性能信息。SQL
  Server 性能计数器名称会根据你使用的是默认实例还是命名实例而略有变化。例如，`SQLServer:Databases` 在默认 SQL Server 实例上定义了一个计数器，但在命名实例上将被称为
  `MSSQL$<实例名称>:Databases`。


  注意

  性能计数器实例和 SQL Server 实例都使用术语“实例”，但它们并非相关概念。


  存在大量的 SQL Server 性能计数器，其中大部分以 `SQLServer` 开头，还有一些以 `SQLAgent` 开头。除了这两组之外，还有几个用于
  SQL Server 内存 OLTP 的对象，称为 `SQL Server <版本> XTP`，例如 `SQL Server 2017 XTP 存储` 或 `SQL
  Server 2017 XTP 事务`。你可以在 [`https://technet.microsoft.com/en-us/library/ms190382.aspx`](https://technet.microsoft.com/en-us/library/ms190382.aspx)
  获取 SQL Server 性能计数器的完整列表和详细信息，在 [`https://technet.microsoft.com/en-us/library/dn511015.aspx`](https://technet.microsoft.com/en-us/library/dn511015.aspx)
  获取 SQL Server 内存 OLTP 性能计数器的详细信息。


  SQL Server 还提供了 `sys.dm_os_performance_counters` `DMV`，虽然可以轻松查询，但不幸的是它只涵盖 SQL Server
  计数器，因此你仍然需要从外部寻找你可能需要的其余 Windows 计数器。此外，`sys.dm_os_performance_counters` 需要对其数据进行额外处理，我们将在后面讨论。



  ### 性能监控与计数器


  尽管收集性能计数器数据通常不会影响系统性能，但应注意不要收集过多计数器或设置过短的更新间隔。用于显示和收集性能计数器的主要工具是 **Windows 性能监视器**，尽管还有其他一些相关流行工具，例如
  **PAL（日志性能分析）** 工具。PAL 用于分析性能计数器数据，可以在 `https://pal.codeplex.com` 找到。**SQL Server
  2008** 引入时，曾可以选择使用性能监视器和分析器来关联性能计数器和 **SQL 跟踪**事件的信息。如今，随着分析器和 **SQL 跟踪**被弃用，目前尚不清楚未来是否会有替代工具来用扩展事件完成相同的工作。


  最后，**数据收集器**（一个随 **SQL Server 2008** 引入的工具，在某些文档中称为 **MDW**（管理数据仓库））可用于收集最重要的性能计数器以及其他一些信息。启用此工具的一个直接好处是，您无需决定收集哪些性能计数器。数据收集器将根据
  **Microsoft 技术支持**的故障排除场景配置最有用的计数器。不过，您可以通过包含额外的性能计数器来微调此列表。移除性能计数器也是可能的，但很少需要。


  在下一节中，我将介绍一些最有用的性能计数器，但如前所述，还有很多其他计数器，您可以参考前面列出的文档以获取完整列表或其他详细信息。


  #### 比较批处理与事务


  测量每秒批处理请求数和每秒事务数是衡量 **SQL Server** 实例吞吐量的主要指标。它显示了您的实例当前执行的工作量。请记住，对于工作负载繁重的服务器，这些计数器可能显示的是实例的最大容量，但如果服务器不够繁忙，则只意味着它能够处理客户端应用程序发送的所有请求，并且可以在需要时处理更多请求。另一方面，特别是当您遇到性能问题时，等待分析可能表明应用程序发送的请求超出了
  **SQL Server** 实例的处理能力，而等待信息可能指明了限制所在。


  例如，如果一个 **SQL Server** 实例显示每秒 10,000 个批处理请求，这可能意味着它要么是实例能够处理的最大值，要么是应用程序提交的最大值。如果被请求，此实例有可能处理每秒
  12,000 个批处理请求。


  此外，相同的每秒批处理请求数在不同 **SQL Server** 实例之间可能并不意味着完全相同的吞吐量，因为它们的工作负载可能不同。例如，一个实例可能运行纯粹的
  **OLTP** 事务，而另一个可能是带有某些批处理的 **OLTP** 系统，还有一个可能是处理更昂贵查询的报表或分析系统。我尚未见过纯粹的 **OLTP**
  生产系统（如果它真的存在的话）。


  这些计数器的定义很简单：


  *   `SQLServer:Databases Transactions/sec`: 每秒事务数

  *   `SQLServer:SQL Statistics Batch Requests/sec`: 每秒接收到的批处理请求数

  *   `SQLServer:Transactions`: 活动事务总数


  为了更好地可视化和比较每秒批处理请求数与每秒事务数，让我们看以下练习。首先，创建一个表：

  ```sql

  CREATE TABLE t1 (id int IDENTITY(1,1), name varchar(20))

  ```


  运行以下包含十个隐式事务的批处理。为了有足够时间可视化服务器活动，我们使用 `GO` 命令运行该批处理 10,000 次。请根据您的测试系统随意调整。

  ```sql

  BEGIN

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  INSERT INTO t1 VALUES (''Hello'')

  END

  GO 10000

  ```


  图 8-1 显示了我在执行过程中在性能监视器上截取的一个快照。请注意，每秒事务数大约是每秒批处理请求数的十倍，正如预期的那样。


