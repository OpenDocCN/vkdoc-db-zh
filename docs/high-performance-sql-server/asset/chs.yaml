  ## 本章小结


  本章介绍了 SQL Server 如何使用索引，以及为什么它们对于数据库应用程序的性能至关重要。索引对于 OLTP（联机事务处理）工作负载至关重要，因为它们允许你在可能很大的表中快速找到一行或少数几行。虽然使用此类索引通过代价较高的随机
  I/O 提升了查找性能，但其使用范围仅限于少量行。索引还能提供一些其他好处，例如，无需执行代价高昂的排序操作即可提供有序数据，或通过覆盖查询提供所有需要的列，从而无需使用基表，减少了所需的数据库页数和逻辑读取次数。


  本章还着重介绍了使用 SQL Server 工具来辅助创建索引，例如 `缺失索引` 功能以及更强大的 `数据库引擎优化顾问`。最后，也解释了索引的维护注意事项。索引虽有用，并不意味着你应该拥有大量索引，因为数据库引擎和用户维护操作都需要来保持索引的更新和碎片整理。


  '
- '# 10. 智能查询处理


  本章概述了智能查询处理，这是一组旨在提升查询性能的功能集。智能查询处理随 SQL Server 2017 引入，最初包含三个功能，均归属于 `自适应查询处理`
  之下。然而，`智能查询处理` 这一术语直到 SQL Server 2019 发布才被使用，该版本包含了另外五个功能。作为介绍性章节，我并未详尽涵盖所有这些功能，因此你可以参考
  SQL Server 文档以获取更多细节。


  智能查询处理功能可在无需更改应用程序或付出额外努力的情况下提供性能增强。这些功能默认启用，只需使用其引入时的 SQL Server 版本对应的数据库兼容级别或更高版本即可。图
  10-1（取自 SQL Server 文档）展示了当前所有的智能查询处理功能。


  ![../images/393702_2_En_10_Chapter/393702_2_En_10_Fig1_HTML.jpg](img/393702_2_En_10_Fig1_HTML.jpg)


  图 10-1：智能查询处理功能


  如图 10-1 所示，智能查询处理也可以按功能族进行分组。例如，`自适应查询处理` 功能族包括诸如 `自适应联接`、`交错执行` 和 `内存授予反馈` 等功能。`近似查询处理`
  目前仅包含一个功能，即 `近似 COUNT DISTINCT`。计划在未来的 SQL Server 版本中包含更多智能查询处理功能。


  `自适应查询处理` 包含新一代的查询处理功能，使查询优化器能够在运行时对执行计划和优化器统计信息进行调整。这使得查询优化器能够发现可带来更好查询性能的新信息。`自适应查询处理`
  对传统的查询优化过程提供了一些改进。在正常的查询优化过程中，如果错误的基数估计导致了次优的执行计划，则不允许对该计划进行任何额外的更改或优化，无论如何都会使用该计划执行查询。


  图 10-1 还显示了每项功能首次引入的版本。这意味着 SQL Server 2017 仅包含蓝色部分的功能，而 SQL Server 2019 则包含所列出的所有功能。要启用其中任何一项功能，你需要使用如图
  10-1 所示的、该功能发布时的版本对应的兼容级别或更高版本。例如，对于 SQL Server 2017，可以是兼容级别 `140`，对于 SQL Server
  2019，则是兼容级别 `150`。下面是一个如何为数据库设置兼容级别的示例：


  ```sql

  ALTER DATABASE AdventureWorks2017 SET COMPATIBILITY_LEVEL = 150

  ```



