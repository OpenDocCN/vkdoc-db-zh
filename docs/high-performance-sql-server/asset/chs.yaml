  ## 未文档化规则探索方法


  我们有另一种未文档化的方法来操作这些规则，这可以帮助我们更好地理解它们的工作原理。但请注意，这些是未文档化的语句，因此**绝不应该**在生产环境中使用。我甚至不建议在任何其他共享环境中使用它们，即使该环境是非生产环境。但您可以在个人的
  SQL Server 安装中用于学习或故障排除目的。


  ### 会话级别禁用规则


  我们可以使用未文档化的`DBCC RULEOFF`语句，仅为当前会话禁用`GbAggBeforeJoin`规则。禁用意味着查询优化器将完全无法使用它。


  ```

  DBCC RULEOFF(''GbAggBeforeJoin'')

  ```


  再次运行我们之前的查询，现在将显示如图 1-10 所示的执行计划。


  ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig10_HTML.jpg](img/393702_2_En_1_Fig10_HTML.jpg)


  图 1-10：禁用 GbAggBeforeJoin 规则后的执行计划


  在这个计划中，我们可以看到 `GbAggBeforeJoin` 优化已被禁用，找到的最佳计划显示聚合现在位于连接之后。如果您想知道为什么选择一个计划而不是另一个，您可能需要检查计划的成本。原始计划的成本是
  0.309581，而没有 `GbAggBeforeJoin` 优化的计划成本是 0.336582，所以显然原始计划是赢家。成本方面，数值越低显然越好。尽管这些数字可能没有显示出很大的差异，但请记住，这些是非常小的表，在真实的生产数据库上差异会更大。


  我们还可以尝试使用之前展示的其他优化或规则。例如，我们看到最终计划使用了合并连接。想知道如果没有合并连接，查询优化器会怎么做吗？运行以下命令来禁用“连接转换为合并连接”规则：


  ```

  DBCC RULEOFF(''JNtoSM'')

  ```


  运行相同的查询现在将生成如图 1-11 所示的计划。


  ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig11_HTML.jpg](img/393702_2_En_1_Fig11_HTML.jpg)


  图 1-11：没有“连接转换为合并连接”优化后的执行计划


  最后，我之前提到过，查询优化器为优化聚合实现了两种物理算法：哈希聚合和流聚合。目前，图 1-11 中的计划使用的是哈希聚合。让我们也禁用哈希聚合。


  ```

  DBCC RULEOFF(''GbAggToHS'')

  ```


  新的计划如图 1-12 所示。此时，您不会感到惊讶，因为它现在使用的是流聚合，而不是哈希聚合。


  ![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig12_HTML.jpg](img/393702_2_En_1_Fig12_HTML.jpg)


  图 1-12：禁用哈希聚合后的执行计划


  您想知道如果也禁用流聚合会发生什么吗？尝试以下未文档化的语句，然后再次运行原始的 AdventureWorks 查询：


  ```

  DBCC RULEOFF(''GbAggToStrm'')

  ```


  这一次，根本无法生成计划，您将收到以下错误消息：


  ```

  Msg 8624, Level 16, State 1, Line 60

  Internal Query Processor Error: The query processor could not produce a query plan.
  For more information, contact Customer Support Services.

  ```


  ### 重新启用规则与查看状态


  最后，在结束这个练习之前，您应该重新启用被禁用的规则或者关闭会话。`RULEOFF` 和 `RULEON` 语句在会话级别操作。如果您继续在同一个会话中工作，可能会遇到非常奇怪的行为，因为您实际上已经改变了查询优化器的行为。您可能还记得禁用了哪些规则，或者您可以利用未文档化的语句
  `DBCC SHOWOFFRULES` 来显示这个列表。运行以下命令：


  ```

  DBCC TRACEON(3604)

  DBCC SHOWOFFRULES

  ```


  您将看到类似以下的输出：


  ```

  DBCC execution completed. If DBCC printed error messages, contact your system administrator.

  Rules that are off globally:

  JNtoSM

  GbAggToStrm

  GbAggToHS

  GbAggBeforeJoin

  DBCC execution completed. If DBCC printed error messages, contact your system administrator.

  ```


  同样，您可以使用未文档化的语句 `DBCC SHOWONRULES` 来列出所有仍然启用的规则，在我们的例子中，这将是查询优化器可用的剩余 416 条规则。要启用被禁用的规则，请运行未文档化的语句
  `DBCC RULEON`，如下所示：


  ```

  DBCC RULEON(''JNtoSM'')

  DBCC RULEON(''GbAggBeforeJoin'')

  DBCC RULEON(''GbAggToStrm'')

  DBCC RULEON(''GbAggToHS'')

  ```


  启用列出的转换规则后，您可以再次运行查询并验证一切是否恢复正常。您也可以运行 `DBCC SHOWOFFRULES` 来验证是否没有列出任何禁用的规则。


  ## 查询级别禁用规则


  有一种替代方法，也是未文档化的，可以在查询级别禁用规则。尝试以下使用未文档化提示 `QUERYRULEOFF` 的查询，这将仅为该特定查询执行禁用 `GbAggBeforeJoin`
  规则：


  ```

  SELECT c.CustomerID, COUNT(*)

  FROM Sales.Customer c JOIN Sales.SalesOrderHeader o

  ON c.CustomerID = o.CustomerID

  GROUP BY c.CustomerID

  OPTION (RECOMPILE, QUERYRULEOFF GbAggBeforeJoin)

  ```


  如果您指定一个用逗号分隔的列表，可以包含多个规则，如下例所示：


  ```

  SELECT c.CustomerID, COUNT(*)

  FROM Sales.Customer c JOIN Sales.SalesOrderHeader o

  ON c.CustomerID = o.CustomerID

  GROUP BY c.CustomerID

  OPTION (RECOMPILE, QUERYRULEOFF GbAggBeforeJoin, QUERYRULEOFF GbAggToHS)

  ```


  运行最后一个例子：


  ```

  SELECT c.CustomerID, COUNT(*)

  FROM Sales.Customer c JOIN Sales.SalesOrderHeader o

  ON c.CustomerID = o.CustomerID

  GROUP BY c.CustomerID

  OPTION (RECOMPILE, QUERYRULEOFF GbAggToStrm, QUERYRULEOFF GbAggToHS)

  ```


  正如前面解释的，以下查询也不会创建计划，因为我们再次为流聚合和哈希聚合都禁用了规则。但这次您将收到不同的错误消息，因为查询优化器检测到您正在使用提示。




  '
- '# 使用提示的注意事项


  ```

  Msg 8622, Level 16, State 1, Line 119

  Query processor could not produce a query plan because of the hints defined in this
  query. Resubmit the query without specifying any hints and without using SET FORCEPLAN.

  ```


  在这个例子中，有趣且具有讽刺意味的是，查询优化器抱怨了一个提示。这些跟踪标志是未公开的，并且如前所述，出于任何原因都不应在生产环境中使用。具有讽刺意味的是，有一个文档记录且支持的方法可以以类似的方式改变优化器行为：使用提示。这是提示只应在没有其他解决方案可用的极端情况下使用的原因之一。如果你想通过一个提示获得与我们之前文本类似的行为，这是有文档记录且完全允许的，你可以使用以下查询：


  ```

  SELECT c.CustomerID, COUNT(*)

  FROM Sales.Customer c JOIN Sales.SalesOrderHeader o

  ON c.CustomerID = o.CustomerID

  GROUP BY c.CustomerID

  OPTION (FORCE ORDER)

  ```


  你将得到与使用未公开且不受支持的查询版本禁用 `GbAggBeforeJoin` 相同的计划，如下所示：


  ```

  SELECT c.CustomerID, COUNT(*)

  FROM Sales.Customer c JOIN Sales.SalesOrderHeader o

  ON c.CustomerID = o.CustomerID

  GROUP BY c.CustomerID

  OPTION (RECOMPILE, QUERYRULEOFF GbAggBeforeJoin)

  ```


  使用提示可能具有相同或非常相似的行为，但这次它是被允许且有文档记录的；但是，除非你有非常好的理由，否则不建议这样做。顺便说一下，`FORCE ORDER` 提示指定了在查询优化期间保留由查询语法指示的连接顺序和聚合位置。


  ### 备忘录


  如前所述，备忘录是用于存储查询优化器生成和分析的备选方案的内存结构。每个优化过程都会创建一个新的备忘录结构，并且它只在优化过程中保留。最初，在解析和绑定期间创建的原始逻辑树将存储在备忘录中。随着优化过程中应用转换规则，新的逻辑和物理操作将存储在这里。


  正如预期的那样，备忘录将存储在应用转换规则时创建的所有逻辑和物理操作，如之前所讨论的。成本估算组件将估算存储在此处的物理操作的成本。无需估算逻辑操作的成本。


  你可以使用未公开的跟踪标志 `8608` 来显示初始备忘录结构，以及跟踪标志 `8615` 来显示其最终结构，从而可能看到备忘录结构的内容。让我们仅仅为了学术目的尝试一个快速示例。让我们处理以下查询：


  ```

  DBCC TRACEON(3604)

  SELECT ProductID, ListPrice FROM Production.Product

  WHERE ListPrice > 90

  OPTION (RECOMPILE, QUERYTRACEON 8606)

  ```


  通过使用未公开的跟踪标志 `8606`，我们可以看到我们有以下最终逻辑树（这是我们之前展示的树表示，我们还没有检查备忘录结构）：


  ```

  LogOp_Select

  LogOp_Get TBL: Production.Product Production.Product TableID=482100758 TableReferenceID=0
  IsRow: COL: IsBaseRow1000

  ScaOp_Comp x_cmpGt

  ScaOp_Identifier QCOL: [AdventureWorks2017].[Production].[Product].ListPrice

  ScaOp_Const TI(money,ML=8) XVAR(money,Not Owned,Value=(10000units)=(900000))

  ```


  同样地，我们可以使用未公开的跟踪标志 `8608` 查看这些初始操作符中的每一个是如何存储在备忘录中的。运行以下查询：


  ```

  DBCC TRACEON(3604)

  SELECT ProductID, ListPrice FROM Production.Product

  WHERE ListPrice > 90

  OPTION (RECOMPILE, QUERYTRACEON 8608)

  ```


  你将得到以下输出，它显示了来自原始逻辑树的每个操作，例如 `LogOp_Select` 或 `LogOp_Get`，现在都存储在备忘录结构中：


  ```

  DBCC execution completed. If DBCC printed error messages, contact your system administrator.

  --- Initial Memo Structure ---

  Root Group 4: Card=216 (Max=10000, Min=0)

  0 LogOp_Select 3 2 (Distance = 0)

  Group 3: Card=504 (Max=10000, Min=0)

  0 LogOp_Get (Distance = 0)

  Group 2:

  0 ScaOp_Comp  0 1 (Distance = 0)

  Group 1:

  0 ScaOp_Const  (Distance = 0)

  Group 0:

  0 ScaOp_Identifier  (Distance = 0)

  ```


  你也可以在自行承担风险的情况下，使用未公开的跟踪标志 `8615` 尝试相同的查询以显示最终的备忘录结构。


  ### 完全优化


  我们刚刚回顾了转换规则如何工作。现在让我们定义完整的优化过程是如何工作的。如前所述，查询优化使用转换规则来生成替代的等效计划和操作，并使用启发式方法来清除或限制考虑的计划数量。还需要一个成本估算组件来选择最佳计划。记住，在我们之前的例子中，一个简单的优化，比如在连接之前移动分组聚合，就将计划的成本从
  `0.336582` 改变为了 `0.309581`（稍后会详细介绍成本估算和这个成本值的含义）。


  我们还看到，`sys.dm_exec_query_transformation_stats` DMV 列出了查询优化器可能使用的所有转换规则。显然，查询优化器不会为每个查询运行所有转换；它会根据查询特性运行所需的转换。它将对执行连接的查询应用与连接相关的转换，仅在查询使用聚合时才应用关于聚合的转换规则，依此类推。对于我们之前的示例，永远不会需要应用星型连接查询、列存储索引或窗口函数的规则，因为查询根本没有使用它们。


  更进一步，它也不会同时执行所有适用的规则。并非所有的转换规则都在同一时间应用，相反，查询优化过程最多分为三个步骤或阶段执行，并且不需要全部执行。这意味着查询处理器可以在第一阶段找到一个好的执行计划并完成优化过程。如果在第一阶段没有找到好的计划，它将进入第二阶段，再次尝试找到优化器认为好的执行计划。如果仍然没有找到计划，则还会有第三阶段，此时将返回找到的最佳计划。这些阶段如下所示：


  *   **Search 0** 或 **事务处理阶段**：此阶段将尝试尽快找到一个计划，而不尝试复杂的转换。此阶段对于通常出现在事务处理系统中的小型查询是最佳的，并且用于至少有三个表的查询。

  *   **Search 1** 或 **快速计划**：`Search 1` 使用额外的转换规则、有限的连接重新排序，更适用于复杂查询。

  *   **Search 2** 或 **完全优化**：`Search 2` 用于从复杂到非常复杂的查询。在此阶段会考虑更大一组的潜在转换规则、并行操作符和其他高级优化策略。


  有几种方法，一些是有文档记录的，一些是没有的，可以查看在特定查询优化期间执行了哪些阶段。让我们从有文档记录的方法开始，或者更确切地说是部分有文档记录的，即使用
  `sys.dm_exec_query_optimizer_info` DMV。


