  ### sys.dm_os_windows_info


  当 SQL Server 在此操作系统中运行时，`sys.dm_os_windows_info` 提供 Windows 信息。此 DMV 返回 Microsoft
  Windows 信息，如操作系统版本、服务包级别、库存单位 (SKU) 和 Windows 区域设置标识符 (LCID)。要在 Linux 系统上访问类似信息，可以使用
