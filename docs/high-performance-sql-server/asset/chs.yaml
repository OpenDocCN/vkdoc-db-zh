  \n\n\n### 成本估算\n\n如前所述，查询优化器生成的执行计划的质量，直接等同于其所产生等效计划的质量以及这些计划成本估算的准确性。这意味着，即使查询优化器能够为某个查询生成一个完美的执行计划（并将其存储在\
  \ memo 中），一个不正确的成本估算也可能导致查询优化器选择另一个效率较低的计划。\n\n查询优化器使用的成本估算公式考虑了 I/O、CPU 和内存等资源的消耗，得出的数值对许多人来说可能像是个谜。例如，你可能会惊讶地发现，成本估算并不考虑你的查询是否需要从磁盘读取数据，或者数据是否已经在内存中。它也不考虑你使用的是非常老旧的磁盘驱动器还是最快的\
  \ SSD 卷。但是，尽管没有考虑这些因素，成本估算在选择一个足够好的执行计划这一目的上，效果非常出色。\n\n最后，如果你曾好奇像 `2.65143` 这样的成本数字是如何计算出来的，我将在这里做一个基本介绍，至少让你了解其工作原理的基本概念。成本估算是为每个运算符单独执行的，而计划的总成本则是该计划中所有运算符成本的总和。每个运算符的成本取决于其算法以及该运算符预计返回的行数。某些运算符，如排序和哈希连接，还会考虑系统中的可用内存。\n\
  \n正如你在每个执行计划中看到的那样，每个运算符都包含与之关联的成本。一些运算符可能同时包含 CPU 成本和 I/O 成本。另一些可能只有 CPU 成本。通常，位于执行计划数据流起始位置的运算符（即在计划形状中从右侧开始）会具有\
  \ I/O 成本。一些例子包括表扫描、聚集索引扫描或索引查找。示例参见图 1-13。再次强调，注意这是估算成本。尽管计划会显示某些属性（如行数）的估计值和实际值，但并不存在所谓的实际\
  \ CPU 成本或实际 I/O 成本（不过有多种工具可以找出查询的真实性能信息；其中许多工具，如查询存储，本书均有介绍）。\n\n![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig13_HTML.jpg](img/393702_2_En_1_Fig13_HTML.jpg)\n\
  \n**图 1-13**\n显示 CPU 和 I/O 成本的运算符\n\n注意：我说数据在执行计划中从右向左流动。根据定义，执行方向是相反的，即从左到右，这意味着顶级运算符会向其右侧的运算符请求行数据。\n\
  \n现在让我为你展示一个针对以下查询的成本估算示例：\n\n```sql\nSELECT * FROM Sales.SalesOrderDetail\nWHERE\
  \ LineTotal = 35\n```\n\n运行该查询，获取计划，并显示聚集索引扫描运算符的属性。在这个聚集索引扫描的具体例子中，我注意到第一条记录的 CPU\
  \ 成本是 `0.0001581`，其后每增加一条记录的 CPU 成本是 `0.0000011`。由于我们估计有 `121,317` 条记录，我们可以计算总 CPU\
  \ 成本为 `0.0001581 + 0.0000011 * (121317 – 1)`，得出 `0.133606`，这就是图 1-13 中显示的估算 CPU\
  \ 成本值。\n\n同样地，我注意到第一个数据库页的最小 I/O 成本是 `0.003125`，其后每增加一个页，成本递增 `0.00074074`。由于聚集索引扫描运算符会扫描整个表，我可以使用以下查询来查找数据库页的数量，此查询在此情况下返回\
  \ `1239`：\n\n```sql\nSELECT in_row_data_page_count, row_count\nFROM sys.dm_db_partition_stats\n\
  WHERE object_id = object_id('Sales.SalesOrderDetail')\nAND index_id = 1\n```\n\n\
  因为该运算符扫描的是拥有 `1239` 个页的整个表，我现在可以估算 I/O 成本了，即 `0.003125 + 0.00074074 * (1239 – 1)`，总计\
  \ `0.92016112`，或四舍五入后为 `0.920162`，如图 1-13 所示。\n\n因此，该运算符的总成本是 CPU 成本 `0.133606`\
  \ 和 I/O 成本 `0.920162` 之和，总计为 `1.05377`，如图 1-13 所示。按照相同的过程，整个计划的成本是计划中所有运算符成本的总和。在这个例子中，我们加上两个计算标量运算符的成本\
  \ `0.01213`，最后加上一个筛选运算符的成本 `0.05823`，总计为 `1.13626`，这就是图 1-14 执行计划中显示的成本（再次说明，有时这些数字会被四舍五入）。\n\
  \n![../images/393702_2_En_1_Chapter/393702_2_En_1_Fig14_HTML.jpg](img/393702_2_En_1_Fig14_HTML.jpg)\n\
  \n**图 1-14**\n显示总成本的计划\n\n最后，请记住这只是一个成本模型；虽然它对于选择一个足够好的执行计划来说效果很好，但这并不意味着它是实际执行时的真实成本。我听过很多人试图用这些成本来比较一个计划与另一个计划的性能效率。这是一个巨大的错误。正如我之前所说，有多种工具可以查看查询的真实性能信息。\n\
  \n关于 SQL Server 成本估算历史的一个有趣轶事，与成本值的原始含义有关。最初，这个数字意味着在特定硬件配置上查询执行所需的秒数。因此，`1.25`\
  \ 的成本意味着查询需要 `1.25` 秒来执行。显然，执行时间取决于硬件，所以这些成本是在微软一位名叫 Nick（尼克）的员工的电脑上测量的，他是查询处理团队的一员。这发生在\
  \ SQL Server 7 时代，也就是当前的查询优化器被编写的时候。如今，这些数值不应再与秒数或其他任何度量单位关联起来，它们只是被称为成本单位。\n\n\n\
