  ## 19-3. 确定剩余 SQL 工作量


  ### 问题


  一个 SQL 查询已经运行了很长时间，你想知道是否有办法判断它还需要多久才能完成。


  ### 解决方案


  使用`V$SESSION_LONGOPS`视图来近似估算查询剩余的运行时间。要在 SQL*Plus 中查看输出，你需要使用`SET`和`COLUMN`命令来格式化输出。运行以下查询以获取当前正在运行的
  SQL 语句进度的估计值：


  ```sql

  SET LINESIZE 141 TRIMSPOOL ON PAGES 66

  COL username FORMAT A8 HEAD "User|Name"

  ```



