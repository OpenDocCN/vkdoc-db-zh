  ## 查询叶节点并显示完整路径\n\n最后，你可能只想看到叶节点（非经理的员工），但在报告的同一行中同时包含该叶节点之上的完整树形结构。为此，你可以使用解决方案中的方法，并添加在方案\
  \ 13-3 中介绍的 `SYS_CONNECT_BY_PATH` 函数。\n\n```sql\nselect\n  last_name || ', ' ||\
  \ first_name full_name, level lvl,\n  sys_connect_by_path(lower(last_name)||'.'||lower(first_name),'/')\
  \ mgmt_path\nfrom employees\nwhere connect_by_isleaf = 1\nstart with manager_id\
  \ is null\nconnect by prior employee_id = manager_id\n;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
