- "# 第 19 章 SQL 监控与调优\n\n##### 19-4. 识别资源密集型 SQL 语句\n\n### 问题\n您希望识别哪些 SQL 语句消耗了最多的资源。\n\
  \n### 解决方案\n使用以下查询，基于 CPU 时间识别出最消耗资源的前十个查询：\n\n```sql\nselect * from(\n    select\n\
  \        sql_text\n        ,buffer_gets\n        ,disk_reads\n        ,sorts\n \
  \       ,cpu_time/1000000 cpu_sec\n        ,executions\n        ,rows_processed\n\
  \    from v$sqlstats\n    order by cpu_time DESC)\nwhere rownum < 11;\n```\n\n这里使用了一个内联视图，先检索所有记录，并按\
  \ `CPU_TIME` 降序对输出进行排序。然后外层查询使用 `ROWNUM` 伪列将结果集限制为前 10 行。\n\n这个查询可以轻松修改为按 `CPU_TIME`\
  \ 以外的列排序。例如，如果您想按 `BUFFER_GETS` 报告资源使用情况，只需将 `ORDER BY` 子句改为使用 `BUFFER_GETS` 而不是\
  \ `CPU_TIME`。`CPU_TIME` 列以微秒计算；要将其转换为秒，需除以 1000000。\n\n### 工作原理\n`V$SQLSTATS` 视图显示最近执行过的\
  \ SQL 语句的性能统计信息。您也可以使用 `V$SQL` 和 `V$SQLAREA` 来报告 SQL 资源使用情况。`V$SQLSTATS` 速度更快，并且信息保留时间更长，但它只包含了\
  \ `V$SQL` 和 `V$SQLAREA` 中列的子集。因此，在某些情况下您可能需要查询 `V$SQL` 或 `V$SQLAREA`。例如，如果您想显示首次解析查询的用户等信息，可以使用\
  \ `V$SQLAREA` 的 `PARSING_USER_ID` 列：\n\n```sql\nselect * from(\n    select\n   \
  \     b.sql_text\n        ,a.username\n        ,b.buffer_gets\n        ,b.disk_reads\n\
  \        ,b.sorts\n        ,b.cpu_time/1000000 cpu_sec\n    from v$sqlarea b\n \
  \       ,dba_users a\n    where b.parsing_user_id = a.user_id\n    order by b.cpu_time\
  \ DESC)\nwhere rownum < 11;\n```\n\n##### 19-5. 使用 Oracle 性能报告识别资源密集型 SQL\n\n###\
  \ 问题\n您希望使用 Oracle 的性能调优报告之一来识别资源密集型查询。\n\n### 解决方案\n如果您注意到数据库性能在某一天变慢或几个小时内运行迟缓，您应在发现问题的时段运行以下报告之一：\n\
  \n*   自动工作量存储库（`AWR`）\n*   自动数据库诊断监视器（`ADDM`）\n*   活动会话历史（`ASH`）\n*   Statspack\n\
  \n接下来的几个小节将分别描述这些报告。\n\n**注意** 截至本书撰写时，您需要从 Oracle 公司购买额外许可证才能使用 `AWR`、`ADDM` 和\
  \ `ASH` 工具。如果您没有许可证，可以使用免费的 Statspack 工具。\n\n### 使用 AWR\n要监控长时间运行的操作，您可以查询 `V$SESSION_LONGOPS`\
  \ 视图。以下示例展示了针对该视图的查询，并使用了 `SQL*Plus` 格式化命令以生成可读的报告。\n\n```sql\nCOL opname FORMAT\
  \ A16 HEAD \"Operation|Type\"\nCOL sql_text FORMAT A33 HEAD \"SQL|Text\" TRUNC\n\
  COL start_time FORMAT A15 HEAD \"Start|Time\"\nCOL how_long FORMAT 99,990 HEAD \"\
  Time|Run\"\nCOL secs_left FORMAT 99,990 HEAD \"Appr.|Secs Left\"\nCOL sofar FORMAT\
  \ 9,999,990 HEAD \"Work|Done\"\nCOL totalwork FORMAT 9,999,990 HEAD \"Total|Work\"\
  \nCOL percent FORMAT 999.90 HEAD \"%|Done\"\n\nselect\n    a.username\n    ,a.opname\n\
  \    ,b.sql_text\n    ,to_char(a.start_time,'DD-MON-YY HH24:MI') start_time\n  \
  \  ,a.elapsed_seconds how_long\n    ,a.time_remaining secs_left\n    ,a.sofar\n\
  \    ,a.totalwork\n    ,round(a.sofar/a.totalwork*100,2) percent\nfrom v$session_longops\
  \ a\n    ,v$sql b\nwhere a.sql_address = b.address\nand a.sql_hash_value = b.hash_value\n\
  and a.sofar <> a.totalwork\nand a.totalwork != 0;\n```\n\n#### 工作原理\n`V$SESSION_LONGOPS`\
  \ 视图显示运行时间超过六秒的各种数据库操作的状态。要使用 `V$SESSION_LONGOPS`，您必须使用基于成本的优化器，并满足以下条件：\n\n*  \
  \ `TIMED_STATISTICS` 初始化参数设置为 `TRUE`\n*   为查询中的对象生成了统计信息\n\n`V$SESSION_LONGOPS`\
  \ 视图能让您大致了解当前正在运行的查询还需要多长时间完成。根据我们的经验，结果并非 100%准确，因此请在其报告的时间基础上预留一些弹性时间。\n\n\n"
- "# Oracle 数据库性能监控与 SQL 调优\n\n## 使用 AWR 报告\nAWR 报告适用于查看整个系统性能并识别消耗资源最多的 SQL 查询。运行以下脚本生成\
  \ AWR 报告：\n```\nSQL> @?/rdbms/admin/awrrpt\n```\n\n从 AWR 输出中，在报告的“SQL ordered by\
  \ Elapsed Time”或“SQL ordered by CPU Time”部分识别消耗资源最多的语句。以下是部分样本输出：\n\n### SQL ordered\
  \ by CPU Time 样本输出\n```\nDB/Inst: DWREP/DWREP  Snaps: 11384-11407\n-> Resources\
  \ reported for PL/SQL code includes the resources used by all SQL\n   statements\
  \ called by the code.\n-> % Total DB Time is the Elapsed Time of the SQL statement\
  \ divided into the\n   Total Database Time multiplied by 100\n                 \
  \                                                         \n    CPU    Elapsed \
  \     CPU per    % Total                                    \nTime (s) Time (s)\
  \   Executions  Exec (s)  DB Time SQL Id                   \n---------- ----------\
  \ ------------ ---------- ------- -------------          \n     4,809     13,731\
  \           10    480.86     6.2 8wx77jyhdr31c          \n```\n\n**[IT 电子书库](http://www.it-ebooks.info/)**\n\
  \n### 示例 SQL 查询\n```sql\nModule: JDBC Thin Client\nSELECT D.DERIVED_COMPANY\n  \
  \    ,CB.CLUSTER_BUCKET_ID\n      ,CB.CB_NAME\n      ,CB.SOA_ID\n      ,COUNT(*)\
  \ TOTAL\n      ,NVL(SUM(CASE WHEN F.D_DATE_ID > TO_NUMBER(TO_CHAR(SYSDATE-30,'YYYYMMDD'))\
  \ THEN 1 END), 0) RECENT\n      ,NVL(D.BLACKLIST_FLG,0) BLACKLIST_FLG\n  FROM F_DOWNLOADS\
  \ F\n      ,D_DOMAINS D\n      ,D_PRODUCTS P\n      ,PID_DF_ASSOC PDA\n      ,(\
  \ SELECT * FROM ( SELECT CLUSTER_\n```\n\n从 Oracle 数据库 10*g*开始，Oracle 会每小时自动对数据库进行一次快照，并填充存储统计信息的底层\
  \ AWR 表。默认情况下，统计信息会保留七天。\n\n您还可以通过运行`awrsqrpt.sql`报告来为特定的 SQL 语句生成 AWR 报告。运行以下脚本时，系统将提示您输入感兴趣的查询的`SQL_ID`：\n\
  ```\nSQL> @?/rdbms/admin/awrsqrpt.sql\n```\n\n## 使用 ADDM\nADDM 报告提供了关于哪些 SQL 语句是调优候选者的有用建议。使用以下\
  \ SQL 脚本生成 ADDM 报告：\n```\nSQL> @?/rdbms/admin/addmrpt\n```\n\n查找报告中标有“SQL statements\
  \ consuming significant database time.”的部分。\n\n### ADDM 报告样本输出\n```\nFINDING 2:\
  \ 29% impact (65043 seconds)\n------------------------------\n  SQL statements consuming\
  \ significant database time were found.\n\n  RECOMMENDATION 1: SQL Tuning, 6.7%\
  \ benefit (14843 seconds)\n  ----------------------------------------------------------\n\
  \     ACTION: Investigate the SQL statement with SQL_ID \"46cc3t7ym5sx0\"\n    \
  \    for possible performance improvements.\n     RELEVANT OBJECT: SQL statement\
  \ with SQL_ID 46cc3t7ym5sx0 and\n        PLAN_HASH 1234997150\n     MERGE INTO d_files\
  \ a\n     USING\n      ( SELECT\n```\n\nADDM 报告分析 AWR 表中的数据，以识别潜在的瓶颈和高资源消耗的 SQL\
  \ 查询。\n\n## 使用 ASH\nASH 报告使您能够关注最近运行过且可能只执行了短暂时间的短生命周期 SQL 语句。使用以下脚本生成 ASH 报告：\n\
  ```\nSQL> @?/rdbms/admin/ashrpt\n```\n\n在输出中搜索标有“Top SQL”的部分。以下是部分样本输出：\n\n### ASH\
  \ 报告样本输出\n```\nSQL ID        Planhash            Sampled # of Executions    % Activity\n\
  ----------------------- -------------------- -------------------- --------------\n\
  Event                          % Event Top Row Source              % RwSrc\n------------------------------\
  \ ------- --------------------------------- -------\n4k8runghhh31d             \
  \    3219321046               12      51.61\nCPU + Wait for CPU             51.61\
  \ HASH JOIN                    12.26\nselect countryimp0_.COUNTRY_ID as COUNTRY_ID,\
  \ countryimp0_.COUNTRY_NAME\n```\n\n前面的输出表明该查询正在等待 CPU 资源。在这种情况下，实际问题可能是另一个消耗 CPU\
  \ 资源的查询。\n\nASH 报告何时比 AWR 或 ADDM 报告更有用？AWR 和 ADDM 输出显示的是总数据库时间方面的顶级消耗 SQL。如果 SQL\
  \ 性能问题是短暂且生命周期短的，它可能不会出现在 AWR 和 ADDM 报告中。在这些情况下，ASH 报告更有用。\n\n> **注意：** 您也可以从 Enterprise\
  \ Manager 运行 AWR、ADDM 和 ASH 报告，您可能会觉得这比从 SQL*Plus 手动运行脚本更直观。\n\n## 使用 Statspack\n\
  \n\n\n"
- '# SQL 监控与调优


  如果您没有使用 `AWR`、`ADSM` 和 `ASH` 报告的许可，免费的 `Statspack` 工具可以帮助您识别性能不佳的 SQL 语句。以 `SYS`
  用户身份运行以下脚本来安装 `Statspack`：


  ```

  SQL> @?/rdbms/admin/spcreate.sql

  ```


  此脚本创建拥有 `Statspack` 仓库的 `PERFSTAT` 用户。要启用自动收集 `Statspack` 统计信息，请运行此脚本：


  ```

  SQL> @?/rdbms/admin/spauto.sql

  ```


  收集到一些快照后，您可以以 `PERFSTAT` 用户身份运行以下脚本来创建 `Statspack` 报告：


  ```

  SQL> @?/rdbms/admin/spreport.sql

  ```


  报告创建后，查找标有“SQL ordered by CPU”的部分。以下是一些示例输出：


  ```

  SQL ordered by CPU DB/Inst: DW11/DW11 Snaps: 11-14

  -> Total DB CPU (s): 107

  -> Captured SQL accounts for 246.0% of Total DB CPU

  -> SQL reported below exceeded 1.0% of Total DB CPU


  CPU CPU per Elapsd Old Time (s) Executions Exec (s) %Total Time (s) Buffer Gets
  Hash Value

  ---------- ----------- ---------- ------ ---------- --------------- ----------

  254.95 4 63.74 238.1 249.74 12,811 2873951798

  Module: SQL*Plus

  select count(*) from dba_indexes, dba_tables

  ```


  **提示** 查看 `ORACLE_HOME/rdbms/admin/spdoc.txt` 文件获取 `Statspack` 文档。


  ## 工作原理


  Oracle 维护着大量的动态性能视图，用于跟踪和累积数据库性能指标。例如，如果您运行以下查询，您会注意到对于 Oracle Database 11g，有超过
  400 个动态性能视图：


  ```

  select count(*) from dictionary where table_name like ''V$%'';

  ```


  Oracle 性能工具依赖于从这些内部性能视图定期获取的快照。关于性能统计最有用的两个视图是 `V$SYSSTAT` 和 `V$SESSTAT` 视图。`V$SYSSTAT`
  视图包含超过 400 种数据库统计信息。`V$SYSSTAT` 视图包含整个数据库的信息，而 `V$SESSTAT` 视图包含各个会话的统计信息。


  `V$SYSSTAT` 和 `V$SESSTAT` 视图中的少数几个值包含资源的当前使用量。这些值是：

  - `opened cursors current`

  - `logons current`

  - `session cursor cache current`

  - `workarea memory allocated`


  其余的值是累积的。`V$SYSSTAT` 中的值是自实例启动以来整个数据库的累积值。`V$SESSTAT` 中的值是自会话启动以来每个会话的累积值。一些更重要的与性能相关的累积值是：

  - `CPU used`

  - `consistent gets`

  - `physical reads`

  - `physical writes`


  对于累积统计，衡量周期性使用情况的方法是在起始点记录一个统计值，然后在稍后时间点记录该值并捕获差值。这是 Oracle 性能工具（如 `AWR` 和 `Statspack`）所采用的方法。Oracle
  会定期获取动态等待接口视图的快照，并将它们存储在仓库中。


  您可以在 `AWR` 视图 `DBA_HIST_SQLSTAT` 中访问关于消耗资源最多的 SQL 语句的统计信息。还有另一个相关的视图 `DBA_HIST_SNAPSHOT`，它显示每个
  `AWR` 快照的记录。类似地，`Statspack` 的历史性能统计数据存储在 `STATS$SQL_SUMMARY` 表中，而 `STATS$SNAPSHOT`
  表包含每个 `Statspack` 快照的记录。


  ##### 19-6. 使用操作系统识别资源密集型查询


  ### 问题


  您在一台服务器上运行着多个 Oracle、MySQL 和 PostgreSQL 数据库。服务器的性能似乎很迟缓。您想确定哪个操作系统会话消耗的资源最多，并判断该会话是否与某个数据库相关，并最终定位到具体的
  SQL 查询。


  ### 解决方案


  首先，使用操作系统实用程序来识别消耗资源最多的进程。此示例使用 Linux/Unix 的 `ps` 实用程序来识别消耗 CPU 最多的操作系统会话：


  ```

  $ ps -e -o pcpu,pid,user,tty,args | sort -n -k 1 -r | head

  ```


  以下是一些示例输出：


  ```

  7.8 14028 oracle ? oracleDW11 (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))

  0.1 17012 oracle ? ora_j003_SCDEV

  0.1 17010 oracle ? ora_j002_SCDEV

  ```


  从输出中看，操作系统会话 `14028` 消耗了最多的 CPU 资源，为 7.8%。在此示例中，`14028` 进程与 `DW11` 数据库相关。接下来，登录到相应的数据库，并使用以下
  SQL 语句来确定与操作系统进程 `14028` 关联的是什么类型的程序：


  ```

  select

  ''USERNAME : '' || s.username|| chr(10) ||

  ''OSUSER : '' || s.osuser || chr(10) ||

  ''PROGRAM : '' || s.program || chr(10) ||

  ''SPID : '' || p.spid || chr(10) ||

  ''SID : '' || s.sid || chr(10) ||

  ''SERIAL# : '' || s.serial# || chr(10) ||

  ''MACHINE : '' || s.machine || chr(10) ||

  ''TERMINAL : '' || s.terminal

  from v$session s,

  v$process p

  where s.paddr = p.addr

  and p.spid = ''&PID_FROM_OS'';

  ```


  这是本示例的输出：


  ```

  ''USERNAME:''||S.USERNAME||CHR(10)||''OSUSER:''||S.OSUSER||CHR(10)||''PROGRAM:''

  USERNAME : INV_MGMT

  OSUSER : oracle

  PROGRAM : sqlplus@rmougprd.rmoug.org (TNS V1-V3)

  SPID : 14028

  SID : 198

  SERIAL# : 57

  MACHINE : rmougprd.rmoug.org

  TERMINAL :

  ```


  在此输出中，`PROGRAM` 值为 `sqlplus@rmougprd.rmoug.org`。这表明一个 `SQL*Plus` 会话是在 `rmougprd.rmoug.org`
  服务器上消耗过多资源的程序。


  接下来运行以下查询，以显示与操作系统进程 ID（本示例中 `SPID` 为 `14028`）关联的 SQL 语句：


  ```

  select

  ''USERNAME : '' || s.username || chr(10) ||

  ''OSUSER : '' || s.osuser || chr(10) ||

  ''PROGRAM : '' || s.program || chr(10) ||

  ''SPID : '' || p.spid || chr(10) ||

  ''SID : '' || s.sid || chr(10) ||

  ''SERIAL# : '' || s.serial# || chr(10) ||

  ''MACHINE : '' || s.machine || chr(10) ||

  ''TERMINAL : '' || s.terminal || chr(10) ||

  ''SQL TEXT : '' || q.sql_text

  from v$session s

  ,v$process p

  ,v$sql q

  where s.paddr = p.addr

  and p.spid = ''&PID_FROM_OS''

  and s.sql_id = q.sql_id;

  ```


  结果显示消耗资源的 SQL 语句，作为 `SQL TEXT` 列的一部分输出：


  ```

  ''USERNAME:''||S.USERNAME||CHR(10)||''OSUSER:''||S.OSUSER||CHR(10)||''PROGRAM:''

  USERNAME : INV_MGMT

  OSUSER : oracle

  PROGRAM : sqlplus@rmougprd.rmoug.org (TNS V1-V3)

  SPID : 14028

  SID : 198

  SERIAL# : 57

  MACHINE : rmougprd.rmoug.org

  TERMINAL :

  SQL TEXT : select count(*) ,object_name from dba_objects,dba_segments 470

  ```


  ### 工作原理


  当您在一台服务器上运行多个数据库并遇到服务器性能问题时，有时很难精确定位是哪个数据库及其关联进程导致了问题。在这种情况下，您必须使用操作系统工具来识别系统上消耗资源最多的会话。


  在 Linux 或 Unix 环境中，您可以使用 `ps`、`top` 或 `vmstat` 等实用程序来识别消耗资源最多的操作系统进程。`ps` 实用程序很方便，因为它可以让您识别消耗最多
  CPU 或内存的进程。在解决方案部分，我们使用了 `ps` 命令来识别 CPU 密集型查询。这里我们用它来识别 Oracle 内存使用最多的进程：


  ```

  $ ps -e -o pmem,pid,user,tty,args | grep -i oracle | sort -n -k 1 -r | head

  ```


  一旦您识别出一个与数据库相关的、消耗资源最多的进程，您就可以基于服务器进程 ID 查询数据字典视图，以识别数据库进程正在执行什么。


  `OS Watcher`



