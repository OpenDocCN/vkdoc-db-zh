- "# 第一章\n\n■ ■ ■\n\n## 基础知识\n\n本章提供了许多基础的“配方”，帮助你开始——或重温旧日记忆——掌握 SQL 语句的核心构建块。我们将为你展示从\
  \ Oracle 数据库表中选择、更改和删除数据的配方，以及执行此类工作时通常需要包含的一些常用选项。\n\n对于那些已扎实掌握 SQL 的读者，可以随意以**自选**的方式深入阅读本章。我们在这个早期阶段包含了一两个巧妙的配方，以确保你能从第一章开始就从《Oracle\
  \ SQL 配方》中获得最大收益。继续使用菜单的比喻，你可以按任何顺序享用本书中的配方，并跨章节混合搭配代码片段和技术，从而衍生出你自己的配方。\n\n■ **注意**\
  \ 我们将快速讲解基础知识，并省略诸如语法图示和讨论每个配方选项的每一种排列组合等细节。如果你看到立即无法理解的命令和技术，请不要烦恼。在 Oracle 测试实例中亲自尝试它们，以获得直观感受，并且请记住，像《Begining\
  \ Oracle SQL》（de Haan, Fink, Jørgensen, Morton）和《Beginning SQL Queries》（Churcher）这样的配套书籍有助于学习\
  \ SQL 本身。\n\n\n\n##### 1-1. 从表中检索数据\n\n## 问题\n\n你想要从一个表中检索特定的行和列数据。\n\n## 解决方案\n\
  \n执行一条包含 `WHERE` 子句的 `SELECT` 语句。下面是一个简单的 `SELECT` 语句示例，它针对数据库表中符合定义条件的行，查询特定的列值：\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 1 章 ■ 基础知识**\n\n```sql\n\
  select employee_id, first_name, last_name, hire_date, salary\nfrom hr.employees\n\
  where department_id = 50\nand salary < 7500;\n```\n\n当在加载了示例 `HR` 模式的 Oracle 11g\
  \ 数据库上运行时，该 `SELECT` 语句返回 45 行。以下是你会看到的前 10 行。\n\n```\nEMPLOYEE_ID FIRST_NAME LAST_NAME\
  \ HIRE_DATE SALARY\n----------- ---------- --------- --------- ------\n        198\
  \ Donald     OConnell  21-JUN-99   2600\n        199 Douglas    Grant     13-JAN-00\
  \   2600\n        123 Shanta     Vollman   10-OCT-97   6500\n        124 Kevin \
  \     Mourgos   16-NOV-99   5800\n        125 Julia      Nayer     16-JUL-97   3200\n\
  \        126 Irene      Mikkilineni 28-SEP-98   2700\n        127 James      Landry\
  \    14-JAN-99   2400\n        128 Steven     Markle    08-MAR-00   2200\n     \
  \   129 Laura      Bissot    20-AUG-97   3300\n        130 Mozhe      Atkinson \
  \ 30-OCT-97   2800\n...\n```\n\n## 工作原理\n\n该 `SELECT` 语句的格式旨在帮助你理解（或复习）构成一个可工作查询的基本元素。查询的第一行明确说明了我们希望包含在结果中的五个列。\n\
  \n```sql\nselect employee_id, first_name, last_name, hire_date, salary\n```\n\n\
  下一行是 `FROM` 子句，指定了要引用的表（或多表）以提取我们希望看到的列：\n\n```sql\nfrom hr.employees\n```\n\n在这个例子中，我们使用了双部分对象命名法，同时指定了表名\
  \ `EMPLOYEES` 以及 `employees` 所属的模式 `HR`。这样可以区分 `HR` 模式中的 `EMPLOYEES` 表与任何其他模式中可能存在的其他\
  \ `employees` 表，更重要的是，可以避免在未指定模式时，默认隐式选择用户自身模式或当前设置模式中的表。\n\n接下来我们列出 `WHERE` 子句，其中包含两个必须满足才能将行包含在我们结果中的条件。\n\
  \n```sql\nwhere department_id = 50\nand salary < 7500\n```\n\n`EMPLOYEES` 表中的行必须同时满足这两个测试才能包含在我们的结果中。只满足一个条件而不满足另一个，将无法满足我们的查询，因为我们使用了\
  \ `AND` 布尔运算符来组合条件。用非技术术语来说，这意味着一名员工必须列在 ID 为 `50` 的部门中，并且工资低于 `7500`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 1 章 ■ 基础知识**\n\n其他布尔运算符是 `OR` 和 `NOT`，它们遵循正常的布尔优先级规则，并且可以使用括号来明确修改逻辑。我们可以修改第一个例子来展示这些运算符的组合使用：\n\
  \n```sql\nselect employee_id, first_name, last_name, hire_date, salary\nfrom hr.employees\n\
  where department_id = 50\nand (salary < 2500 or salary > 7500);\n```\n\n此查询寻求与第一个查询相同的列，但这次关注的是部门\
  \ `50` 中工资低于 `2500` 或高于 `7500` 的成员。\n\n```\nEMPLOYEE_ID FIRST_NAME LAST_NAME HIRE_DATE\
  \ SALARY\n----------- ---------- --------- --------- ------\n        120 Matthew\
  \    Weiss     18/JUL/96   8000\n        121 Adam       Fripp     10/APR/97   8200\n\
  \        122 Payam      Kaufling  01/MAY/95   7900\n        127 James      Landry\
  \    14/JAN/99   2400\n        128 Steven     Markle    08/MAR/00   2200\n     \
  \   132 TJ         Olson     10/APR/99   2100\n        135 Ki         Gee      \
  \ 12/DEC/99   2400\n        136 Hazel      Philtanker 06/FEB/00   2200\n```\n\n\
  在示例 `HR` 模式中，只有 8 行匹配这些条件。\n\n##### 1-2. 从表中选择所有列\n\n## 问题\n\n你想要从表中检索所有列，但不想花时间键入所有列名作为\
  \ `SELECT` 语句的一部分。\n\n## 解决方案\n\n使用星号 (`*`) 占位符来表示表的所有列。例如：\n\n```sql\nselect *\n\
  from hr.employees\nwhere department_id = 50\nand salary < 7500;\n```\n\n我们的结果显示了换行且仅列出了部分数据以节省空间，但你可以看到星号对所选列的效果：\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 1 章 ■ 基础知识**\n\n\n\n"
- "# SQL 基础操作示例\n\n## 数据查询结果示例\n\n```\nEMPLOYEE_ID FIRST_NAME LAST_NAME EMAIL PHONE_NUMBER\
  \ HIRE_DATE JOB_ID SALARY\nCOMMISSION_PCT MANAGER_ID DEPARTMENT_ID\n-----------\
  \ ---------- --------- -------- ------------ ---------- --------- ------\n--------------\
  \ ---------- -------------\n198 Donald OConnell DOCONNEL 650.507.9833 21-JUN-99\
  \ SH_CLERK 2600\n124 50\n199 Douglas Grant DGRANT 650.507.9844 13-JAN-00 SH_CLERK\
  \ 2600\n124 50\n123 Shanta Vollman SVOLLMAN 650.123.4234 10-OCT-97 ST_MAN 6500\n\
  100 50\n```\n\n## 如何工作\n\n在 SQL 中，`*` 是一个表示表中所有列名的快捷方式。当 Oracle 的解析器在查询中看到 `SELECT\
  \ *` 时，解析器会将 `*` 替换为所有可能的列名列表（标记为隐藏的列除外）。使用 `SELECT *` 是构建临时查询的快速方法，因为您无需查找并输入所有正确的列名。\n\
  \n在您忍不住对所有查询使用星号之前，重要的是要记住，良好的设计通常意味着只显式命名您感兴趣的那些列。这会带来更好的性能，因为 Oracle 否则必须读取系统目录来确定要包含在查询中的字段。指定显式列还可以保护您免受未来可能添加列到表中的问题。如果您编写的代码期望使用星号带来的隐式顺序，当该顺序意外更改时（例如以不同方式删除并重新创建表，或向表中添加新列），您可能会遇到令人不快的意外。\n\
  \n在大多数情况下，星号最好保留用于交互式查询和临时分析。\n\n##### 1-3. 对结果进行排序\n\n### 问题\n\n用户希望以特定方式查看查询排序后的数据。例如，他们希望看到员工按姓氏字母顺序排序，然后是名字。\n\
  \n### 解决方案\n\nOracle 使用标准的 `ORDER BY` 子句来允许您对查询结果进行排序。\n\n```sql\nselect employee_id,\
  \ first_name, last_name, hire_date, salary\nfrom hr.employees\nwhere salary > 5000\n\
  order by last_name, first_name;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 第 1 章 ■ 基础知识\n\n结果如下。\n\n```\nEMPLOYEE_ID FIRST_NAME LAST_NAME HIRE_DATE SALARY\n\
  ----------- ---------- --------- --------- ------\n174 Ellen Abel 11/MAY/96 11000\n\
  166 Sundar Ande 24/MAR/00 6400\n204 Hermann Baer 07/JUN/94 10000\n167 Amit Banda\
  \ 21/APR/00 6200\n172 Elizabeth Bates 24/MAR/99 7300\n151 David Bernstein 24/MAR/97\
  \ 9500\n169 Harrison Bloom 23/MAR/98 10000\n148 Gerald Cambrault 15/OCT/99 11000\n\
  154 Nanette Cambrault 09/DEC/98 7500\n110 John Chen 28/SEP/97 8200\n…\n```\n\n###\
  \ 如何工作\n\n此解决方案中的 `ORDER BY` 子句指示 Oracle 按 `LAST_NAME` 列排序，当 `LAST_NAME` 值匹配时，再按\
  \ `FIRST_NAME` 列排序。除非另有指示，Oracle 隐式使用升序排序，因此数字从零到九排序，字母从 A 到 Z 排序，依此类推。您可以使用 `ASC`\
  \ 和 `DESC` 选项显式控制升序和降序排序方向。\n\n这是一个例子：\n\n```sql\nselect employee_id, first_name,\
  \ last_name, hire_date, salary\nfrom hr.employees\nwhere salary > 5000\norder by\
  \ salary desc;\n```\n\n我们对薪水进行的显式降序排序结果如下：\n\n```\nEMPLOYEE_ID FIRST_NAME LAST_NAME\
  \ HIRE_DATE SALARY\n----------- ---------- --------- --------- ------\n100 Steven\
  \ King 17-JUN-87 24000\n102 Lex De Haan 13-JAN-93 17000\n101 Neena Kochhar 21-SEP-89\
  \ 17000\n145 John Russell 01-OCT-96 14000\n146 Karen Partners 05-JAN-97 13500\n\
  …\n```\n\n##### 1-4. 向表中添加行\n\n### 问题\n\n您需要向表中添加新的数据行。例如，一位新员工加入公司，需要将他的数据添加到 `HR.EMPLOYEES`\
  \ 表中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 第 1 章 ■ 基础知识\n\n\
  ### 解决方案\n\n使用 `INSERT` 语句向表中添加新行。要向表添加新行，请为所有必填列提供值，以及任何可选列的值。这是一条添加新员工的语句：\n\n\
  ```sql\ninsert into hr.employees\n(employee_id, first_name, last_name, email, phone_number,\
  \ hire_date, job_id, salary, commission_pct, manager_id, department_id)\nvalues\n\
  (207, 'John ', 'Doe ', 'JDOE ', '650.555.8877 ', '25-MAR-2009 ', 'SA_REP ', 3500,\
  \ 0.25, 145, 80);\n```\n\n### 如何工作\n\n`INSERT` 语句将值列表与列列表关联起来。它基于该关联创建一行，并将该行插入到目标表中。\n\
  \nOracle 将检查 `NULL` 约束以及主键、外键和其他已定义约束，以确保插入数据的完整性。有关确定表上约束状态以及它们可能如何影响插入新数据的配方，请参见第\
  \ 10 章。\n\n您可以通过检查表的描述来检查哪些字段是必填的（定义为 `NOT NULL`）。您可以从 SQL Developer 或 SQL*Plus\
  \ 中发出 `DESCRIBE` 命令（可以缩写为 `DESC`）来实现。例如：\n\n```sql\ndesc hr.employees;\n```\n\n\
  ```\nName Null Type\n------------------------------ -------- ------------\nEMPLOYEE_ID\
  \ NOT NULL NUMBER(6)\nFIRST_NAME VARCHAR2(20)\nLAST_NAME NOT NULL VARCHAR2(25)\n\
  EMAIL NOT NULL VARCHAR2(25)\nPHONE_NUMBER VARCHAR2(20)\nHIRE_DATE NOT NULL DATE\n\
  JOB_ID NOT NULL VARCHAR2(10)\nSALARY NUMBER(8,2)\nCOMMISSION_PCT NUMBER(2,2)\nMANAGER_ID\
  \ NUMBER(6)\nDEPARTMENT_ID NUMBER(4)\n11 rows selected\n```\n\n您可以通过不枚举列名列表，并为当前表定义中的*每一列*按正确顺序提供数据来编写更短的\
  \ `INSERT` 语句。这是一个例子：\n\n```sql\ninsert into hr.employees\nvalues\n(208, 'Jane ',\
  \ 'Doe ', 'JADOE ', '650.555.8866 ', '25-MAR-2009 ', 'SA_REP ', 3500, 0.25, 145,\
  \ 80)\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 第 1 章 ■ 基础知识\n\
  \n**注意** 省略列名列表很少（如果有的话）是一个好主意——这是出于一些相当严重的原因。您不知道未来可能会对表进行哪些更改，并且通过假设隐式列顺序，您会使您的\
  \ SQL 对未来的架构更改变得脆弱。也许可以说明可能出现问题的最佳例子是静默逻辑损坏。如果有人以不同的列顺序重建基础表，但您的 `INSERT` 语句通过了数据类型和其他检查，您可能会发现自己将数据静默地插入到了错误的列中，带来灾难性的后果。我们强烈建议始终在\
  \ `INSERT` 语句中枚举列。\n\n##### 1-5. 将行从一个表复制到另一个表\n\n### 问题\n\n您想将信息从一个表复制到另一个表。\n\n\
  ### 解决方案\n\n使用带有 `SELECT` 选项的 `INSERT` 语句将数据从一个表复制到另一个表。假设您有一个候选职位申请表，其中许多详细信息与\
  \ `HR.EMPLOYEES` 表相同。这个 `INSERT` 语句将基于对 `CANDIDATES` 表的 `SELECT` 语句插入到 `HR.EMPLOYEES`\
  \ 表中。\n\n```sql\ninsert into hr.employees\n(employee_id, first_name, last_name,\
  \ email, phone_number, hire_date, job_id, salary, commission_pct, manager_id, department_id)\n\
  select 210, first_name, last_name, email, phone_number, sysdate, 'IT_PROG', 3500,\
  \ NULL, 103, 60\nfrom hr.candidates\nwhere first_name = 'Susan'\nand last_name =\
  \ 'Jones';\n```\n\n### 如何工作\n\n此配方将要插入到 `HR.EMPLOYEES` 表中的值播种为对 `CANDIDATES` 表进行\
  \ `SELECT` 的结果。`SELECT` 语句可以单独运行以查看传递给 `INSERT` 语句的数据。\n\n```sql\nselect 210, first_name,\
  \ last_name, email, phone_number, sysdate, job_id, 3500, NULL,\n'IT_PROG', 103\n\
  from hr.candidates\nwhere first_name = 'Susan'\nand last_name = 'Jones';\n```\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 第 1 章 ■ 基础知识\n\n```\n210\
  \ FIRST_NAME LAST_NAME EMAIL PHONE_NUMBER SYSDATE 'IT_PRO 3500 N 103 60\n--- ----------\
  \ --------- ------ ------------ ------- ---- - --- --\n210 Susan Jones SJONES 650.555.9876\
  \ 30-MAR-09 IT_PROG 3500 103 60\n```\n\n\n\n##### 1-6. 批量将数据从一个表复制到另一个表\n\n### 问题\n\
  \n你需要将多行数据从一个表复制到另一个表。\n\n### 解决方案\n\n`INSERT INTO … SELECT …` 方法能够插入多行数据。关键在于 `SELECT`\
  \ 语句中使用所需的条件来返回你希望插入的行。我们可以修改之前的方案来处理多行。以下是一个多行 `INSERT` 的实际示例。\n\n```sql\nselect\
  \ candidate_id, first_name, last_name, email, phone_number, sysdate, job_id, 3500,\
  \ NULL, 'IT_PROG', 103\nfrom hr.candidates;\n```\n\n此方案依赖于与前一个方案中相同的 `HR.CANDIDATES`\
  \ 表的存在。如果你在本地练习，请确保先创建此表。\n\n### 工作原理\n\n此方案同样从 `HR.CANDIDATES` 表中选取要插入的值。由于 `SELECT`\
  \ 语句部分没有 `WHERE` 子句，`CANDIDATES` 表中的所有行都将被选中，因此这些行对应的记录都将被插入到 `HR.EMPLOYEES` 表中。\n\
  \n##### 1-7. 修改行中的值\n\n### 问题\n\n你想更改表中一个或多个行的部分数据。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第一章 ■ 基础知识\n\n### 解决方案\n\n顾名思义，`UPDATE` 语句就是用来更改数据的。针对此问题，假设我们想将部门 50 所有员工的薪资提高百分之五。下面的\
  \ `UPDATE` 语句实现了此更改：\n\n```sql\nupdate hr.employees\nset salary = salary * 1.05\n\
  where department_id = 50;\n```\n\n### 工作原理\n\n`UPDATE` 语句的基本设计以 `UPDATE` 子句本身开始\
  \ `update hr.employees`。这告诉 Oracle 要更新哪个表的行。接着，`SET` 子句指定了要更改的列以及如何更新它们——可以通过字面值、计算、函数结果、子查询或其他方法。\n\
  \n`set salary = salary * 1.05`\n\n在此例中，我们使用了一个自引用计算。新的 `SALARY` 值将是当前值的 1.05 倍，相对于每一行（也就是说，Oracle\
  \ 将为受影响的每一行执行此计算）。\n\n最后，`WHERE` 子句的作用是提供你已经从 `SELECT` 语句中熟悉的常规过滤谓词。只有那些 `DEPARTMENT_ID`\
  \ 为 50 的行会受到影响。\n\n##### 1-8. 用单条语句更新多个字段\n\n### 问题\n\n你想更改表中一个或多个行的多个列。\n\n###\
  \ 解决方案\n\n`update` 语句设计为可以在一条语句中更新任意多行。这意味着你可以在一条 `UPDATE` 语句中使用多个 `column = value`\
  \ 子句来更改任意多的字段。例如，要更改员工 James Marlow（`EMPLOYEE_ID` 为 131）的电话号码、职位和薪资，我们可以使用一条 `UPDATE`\
  \ 语句。\n\n```sql\nupdate hr.employees\nset job_id = 'ST_MAN',\n    phone_number =\
  \ '650.124.9876',\n    salary = salary * 1.5\nwhere employee_id = 131;\n```\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第一章 ■ 基础知识\n\n### 工作原理\n\nOracle\
  \ 正常评估 `UPDATE` 语句的谓词。在此例中，它定位 `EMPLOYEE_ID` 为 131 的行。然后根据给定的 `SET` 标准更改每个字段。它在对行的单次处理中完成此操作。\n\
  \nOracle 还支持在括号中对要更新的列和值进行分组，方式与其他数据库类似，但有一个不同之处。\n\n```sql\nupdate hr.employees\n\
  set (job_id,Phone_number,Salary)\n    = (select 'ST_MAN','650.124.9876',salary *\
  \ 1.5 from dual)\nwhere employee_id = 131;\n```\n\n`注意` 如果子查询没有返回数据，set 子句中指定的值将被设置为\
  \ null。\n\n\n\n##### 1-9. 从表中移除不需要的行\n\n## 问题\n一名员工已入职另一家公司，你需要将其详细信息从 `HR.EMPLOYEE`\
  \ 表中移除。\n\n## 解决方案\n假设 James Landry，其 `EMPLOYEE_ID` 为 127，已入职另一家公司。你可以使用 `DELETE`\
  \ 语句来移除 James 的详细信息。\n\n```sql\ndelete\nfrom hr.employees\nwhere employee_id = 127;\n\
  ```\n\n## 工作原理\n本方法演示了基本的 `DELETE` 语句，在 `FROM` 子句中目标表为 `HR.EMPLOYEES`。`WHERE` 子句提供了用于仅影响符合指定条件行的谓词。\n\
  \n可以构建没有 `WHERE` 子句的 `DELETE` 语句，这实际上会匹配表中的所有行。在这种情况下，表中的所有行都将被删除。\n\n```sql\ndelete\n\
  from hr.employees;\n```\n\n**注意**：如果你确实运行了上述任一 `DELETE` 语句，并且希望在后续方法中继续使用 `HR.EMPLOYEES`\
  \ 数据，请不要忘记回滚。\n\n##### 1-10. 从表中移除所有行\n\n## 问题\n你希望移除给定表的所有数据。\n\n## 解决方案\n使用 `DELETE`\
  \ 语句删除表中的所有行，允许 Oracle 完整记录该操作，这样如果你意外执行了此语句，可以进行回滚。但同样的记录操作及其所需时间，意味着使用 `DELETE`\
  \ 语句有时对于期望的结果来说太慢了。\n\nOracle 提供了一种补充技术来移除表中的所有数据，称为 `TRUNCATE`。要截断 `HR.EMPLOYEES`\
  \ 表，我们使用以下 SQL 语句：\n\n```sql\ntruncate table hr.employees;\n```\n\n## 工作原理\n执行 `TRUNCATE`\
  \ 语句时不使用 `WHERE` 子句谓词或其他修饰符。该语句被视为 DDL（数据定义语言）SQL，这对事务有其他影响，例如隐式提交其他未完成的事务。有关事务控制和监控方法的更多详情，请参阅第\
  \ 9 章。\n\n使用 `TRUNCATE` 命令还会重置表的高水位线，这意味着当 Oracle 执行优化器计算（包括判断表中已用容量的影响）时，它会将该表视为从未有数据占用过任何空间。\n\
  \n##### 1-11. 从另一个查询的结果中选择\n\n## 问题\n你需要将查询的结果视作表的内容。你不希望存储中间结果，因为每次运行查询时都需要重新生成它们。\n\
  \n## 解决方案\nOracle 的内联视图功能允许将查询包含在语句的 `FROM` 子句中，并使用表别名来引用结果。\n\n```sql\nselect d.department_name\n\
  from\n(select department_id, department_name\nfrom hr.departments\nwhere location_id\
  \ != 1700) d;\n```\n\n结果将如下所示。\n\n```\nDEPARTMENT_NAME\n---------------\nMarketing\n\
  Human Resources\nShipping\nIT\nPublic Relations\nSales\n\n6 rows selected.\n```\n\
  \n## 工作原理\n本方法将针对 `HR.DEPARTMENTS` 表的 `SELECT` 语句的结果视为一个内联视图，并为其命名为 “d”。虽然在这种情况下提供别名是可选的，但它使得\
  \ SQL 更具可读性、可测试性，并且更符合标准。然后，你几乎可以像引用普通语句一样引用该语句的结果。以下是内联视图的 `SELECT` 语句的结果。\n\n\
  ```\nDEPARTMENT_ID DEPARTMENT_NAME\n------------- -----------------\n20 Marketing\n\
  40 Human Resources\n50 Shipping\n60 IT\n70 Public Relations\n80 Sales\n\n6 rows\
  \ selected.\n```\n\n该内联视图现在的作用就像你有一个表 `D`，其结构定义如下。\n\n```\nName                \
  \                      Null?    Type\n-----------------------------------------\
  \ -------- ----------------------------\nDEPARTMENT_ID                         \
  \    NOT NULL NUMBER(4)\nDEPARTMENT_NAME                           NOT NULL VARCHAR2(30)\n\
  ```\n\n\n\n\n##### 1-12. 基于查询设置 Where 条件\n\n`DEPARTMENT_ID` NOT NULL NUMBER(4)\n\
  `DEPARTMENT_NAME` NOT NULL VARCHAR2(30)\n\n这些是基础表 `HR.DEPARTMENTS` 的定义，我们的内联视图隐式地继承了这些定义。外部的\
  \ `SELECT` 语句查询结果集，就好像有一个真实的表 `d`，并且你是针对它编写了这条语句。\n\n```\nselect department_name\n\
  from d;\n```\n\n### 问题\n\n你需要从表中查询数据，但其中一个查询条件依赖于另一张表在查询运行时的数据——并且你想避免硬编码条件。具体来说，你希望找出所有在北美设有办公室的部门，以便用于报告。\n\
  \n### 解决方案\n\n在 HR 模式中，`DEPARTMENTS` 表列出了部门，`LOCATIONS` 表列出了地点。\n\n```\nselect department_name\n\
  from hr.departments\nwhere location_id in\n  (select location_id\n   from hr.locations\n\
  \   where country_id = 'US'\n      or country_id = 'CA');\n```\n\n我们的结果如下：\n\nDEPARTMENT_NAME\n\
  ---------------\nIT 部\n运输部\n行政部\n采购部\n执行部\n…\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  第一章 ■ 基础知识\n\n### 原理\n\n我们的 `in` 谓词右侧读取子 `SELECT` 的结果，提供值用于与 `HR.DEPARTMENTS` 表的\
  \ `LOCATION_ID` 值进行比较。运行子 `SELECT` 查询本身就可以看到生成了哪些值。\n\n```\nselect location_id\n\
  from hr.locations\nwhere country_id = 'US'\n   or country_id = 'CA';\n```\n\n结果如下：\n\
  \nLOCATION_ID\n-----------\n1400\n1500\n1600\n1700\n1800\n1900\n已选择 6 行。\n\n外部的\
  \ `SELECT` 将 `LOCATION_ID` 值与这个动态查询出的列表进行比较。这与运行以下静态查询类似。\n\n```\nselect department_name\n\
  from hr.departments\nwhere location_id in (1400,1500,1600,1700,1800,1900);\n```\n\
  \n此方法的关键优势在于，如果我们开设新办公室并更改了北美所有的 `LOCATION_ID`，我们无需重写查询：子查询将动态输出必要的新值。\n\n#####\
  \ 1-13. 查找和消除查询中的 NULL 值\n\n### 问题\n\n你需要报告有多少员工的薪酬中包含佣金百分比，以及有多少员工只领取固定工资。你通过 `HR.EMPLOYEES`\
  \ 表的 `COMMISSION_PCT` 字段来追踪这个信息。\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  第一章 ■ 基础知识\n\n### 解决方案\n\n`HR.EMPLOYEE` 表的结构允许 `COMMISSION_PCT` 为 `NULL`。可以使用两个查询来查找佣金百分比为\
  \ `NULL` 的员工和非 `NULL` 的员工。\n\n首先，这是查找佣金百分比为 `NULL` 的员工的查询：\n\n```\nselect first_name,\
  \ last_name\nfrom hr.employees\nwhere commission_pct is null;\n```\n\nFIRST_NAME\
  \           LAST_NAME\n-------------------- -------------------------\nDonald  \
  \             OConnell\nDouglas              Grant\nJennifer             Whalen\n\
  Michael              Hartstein\nPat                  Fay\n…\n已选择 72 行。\n\n现在，这是查找持有非\
  \ `NULL` 佣金百分比的员工的查询：\n\n```\nselect first_name, last_name\nfrom hr.employees\n\
  where commission_pct is not null;\n```\n\nFIRST_NAME           LAST_NAME\n--------------------\
  \ -------------------------\nJohn                 Russell\nKaren               \
  \ Partners\nAlberto              Errazuriz\nGerald               Cambrault\nEleni\
  \                Zlotkey\n…\n已选择 35 行。\n\n### 原理\n\n我们的第一个 `SELECT` 语句使用 `COMMISSION_PCT\
  \ IS NULL` 子句来测试 `NULL` 条目。这只有两种结果：要么该列条目为 `NULL`，即没有值，满足测试条件；要么它有某个值。\n\n第二个语句使用\
  \ `COMMISSION_PCT IS NOT NULL` 子句，这将找到任何 `COMMISSION_PCT` 有实际值的员工。\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  第一章 ■ 基础知识\n\n#### Oracle 对空字符串的非标准处理\n\nOracle 偏离了 SQL 标准，它将空字符串（或零长度字符串）隐式地视为\
  \ `NULL` 的替代符。这是出于一系列历史和实用原因，但这一点很重要，需要牢记。几乎所有其他 SQL 实现都将空字符串视为一个独立、已知的值。\n\n\n\n\
  有编程背景的读者会发现，零长度字符串的概念与此类似——字符串内存中只有字符串终止符（`\\0`）作为其唯一组成部分。相比之下，未实例化的字符串则没有已知状态……甚至连终止符都没有。你不会将零长度字符串和未实例化字符串互换使用，但这与\
  \ Oracle 处理 `NULL` 的方式类似。\n\n## `NULL` 没有等价物\n\n在 SQL 中使用 `NULL` 的日常操作（或常规工作）常会让人困惑。SQL\
  \ 表达式是三值逻辑，意味着每个表达式可以是 `true`、`false` 或 `NULL`。正如你已看到的，这会影响所有类型的比较、运算符和逻辑判断。但这种逻辑的一个细微之处常被遗忘，因此我们在此明确重申：`NULL`\
  \ 没有等价物。没有任何值与 `NULL` 相同，*甚至其他的 `NULL` 值也不例外*。如果你运行以下查询，能猜到结果吗？\n\n```sql\nselect\
  \ first_name, last_name\nfrom hr.employees\nwhere commission_pct = NULL;\n```\n\n\
  答案是不会选出任何行。尽管你从本示例中上面的 `SELECT` 语句已看到有 72 名员工的 `COMMISSION_PCT` 为 `NULL`，但没有任何 `NULL`\
  \ 值等于另一个 `NULL`，因此 `COMMISSION_PCT = NULL` 这个条件永远不会匹配，你也就永远无法从此查询中看到结果。\n\n务必使用\
  \ `IS NULL` 和 `IS NOT NULL` 来查找或排除 `NULL` 值。\n\n##### 1-14. 按照人的预期进行排序\n\n### 问题\n\
  \n你的文本数据以大小写和句子形式混合存储。你需要以通常人们自然的方式，按不区分大小写的字母顺序对这些数据进行排序。\n\n### 解决方案\n\n为了向 `HR.EMPLOYEES`\
  \ 表中引入一些混合大小写的数据，让我们运行以下 `UPDATE` 语句，将 William Smith 的姓氏改为大写。\n\n```sql\nupdate\
  \ hr.employees\nset last_name = 'SMITH'\nwhere employee_id = 171;\n```\n\n这条 `select`\
  \ 语句展示了 Oracle 对员工姓氏的默认排序。\n\n```sql\nselect last_name\nfrom hr.employees\norder\
  \ by last_name;\n```\n\n```\nLAST_NAME\n…\nRogers\nRussell\nSMITH\nSarchand\nSciarra\n\
  Seo\nSewall\nSmith\nStiles\nSullivan\n…\n```\n\n敏锐的读者可能已经预料到这个结果。默认情况下，Oracle 使用二进制排序顺序。这意味着在这个简单示例中，文本是根据所用代码页（`US7ASCII`、`WEISO8859P1`\
  \ 等）中的数值等价项进行排序的。在这些代码页中，大小写字母具有不同的值，大写字母排在前面。这就是为什么大写的 `SMITH` 排在所有以大写 `S` 开头的其他姓名之前。\n\
  \n大多数人期望看到的是两个“Smith”值排在一起，而不区分大小写。下面的 `NLS` 指令可以实现这一结果。\n\n```sql\nalter session\
  \ set NLS_SORT='BINARY_CI';\n\nselect last_name\nfrom hr.employees\norder by last_name;\n\
  ```\n\n```\nLAST_NAME\n…\nRogers\nRussell\nSarchand\nSciarra\nSeo\nSewall\nSmith\n\
  SMITH\nStiles\nSullivan\n…\n```\n\n### 工作原理\n\nOracle 支持区分大小写和不区分大小写的排序顺序。默认情况下，你处于名为\
  \ `BINARY` 的区分大小写排序环境中。对于每一种这样的排序顺序，都存在一个使用后缀 `_CI` 的等效不区分大小写顺序。我们改用 `BINARY_CI`\
  \ 排序顺序，并重新运行查询，以看到普通用户预期的结果顺序。\n\n顾名思义，`NLS_SORT` 选项仅影响排序。它并不影响大小写敏感性的其他方面。使用 `NLS_SORT='BINARY_CI'`\
  \ 时，尝试以不区分大小写的方式比较数据仍然会表现出 Oracle 的默认行为。\n\n```sql\nselect first_name, last_name\n\
  from hr.employees\nwhere last_name like 's%';\n```\n\n```\nno rows selected\n```\n\
  \n别担心。Oracle 提供了一个类似的选项，可以实现这种不区分大小写的比较。\n\n**提示** 更传统的方法可以在不更改任何 `NLS` 参数的情况下解决此问题。你可以使用\
  \ Oracle 的 `UPPER` 和 `LOWER` 函数将列名、字面量或两者都转换为大写或小写来进行比较。\n\n\n\n这有一个缺点，即阻止了优化器使用标准索引，但你也可以创建基于函数的索引来弥补这一点。\n\
  \n##### 1-15. 启用其他排序和比较选项\n\n### 问题\n\n你需要对以各种大写、小写和句首大写形式存储的文本数据执行不区分大小写的比较和其他排序操作。\n\
  \n### 解决方案\n\n通过激活 Oracle 的语言比较逻辑，你可以使用相同的语句来检索人类期望看到的数据，而无需承担人为区分大小写的负担。\n\n```sql\n\
  alter session set NLS_COMP='LINGUISTIC';\n\nselect first_name, last_name\nfrom hr.employees\n\
  where last_name = 'smith';\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 1 章 ■ 基础知识\n\n```\nFIRST_NAME                   LAST_NAME\n--------------------\
  \ -------------------------\nWilliam              SMITH\nLindsey              Smith\n\
  ```\n\n本方法依赖于与之前方法中使用的相同的大小写转换语句。请务必在测试本方法实际效果之前运行那些语句。\n\n### 工作原理\n\n在设计应用程序时，历史上处理\
  \ Oracle 正常区分大小写的文本处理方式有两种方法。一种方法是设计应用程序逻辑以确保数据以一致的方式存储，例如我们在多个方法中使用的 `HR.EMPLOYEES`\
  \ 表中看到的首字母大写数据。另一种方法允许数据按用户喜好存储，但使用数据库和应用程序逻辑在用户不期望看到的地方隐藏任何大小写差异。\n\n过去这需要付出很大努力，但现在你可以以极少的功夫实现它。以下语句将检索不到任何行，因为在\
  \ `HR.EMPLOYEES` 表中输入的 `LAST_NAME` 都没有以小写形式记录。\n\n```sql\nSelect first_name, last_name\n\
  From hr.employees\nWhere last_name = 'smith';\n```\n```\nno rows selected\n```\n\
  \n但我们的方法设法返回了正确的数据，因为它更改了会话设置，指示 Oracle 以语言方式进行比较。`Smith` 的两种变体都不是以我们查询中指定的小写形式存储的，但\
  \ `NLS_COMP` 参数控制着 Oracle 中的比较和其他行为，将其设置为 `LINGUISTIC` 会触发典型的用户认为是正常的比较行为。\n\n#####\
  \ 1-16. 基于存在性条件插入或更新\n\n### 问题\n\n你希望向一个表中插入行，其键标识符可能已经存在。如果标识符不存在，则应创建新行。如果标识符已存在，则应使用新数据更新该行的其他列，而不是创建新行。\n\
  \n### 解决方案\n\n`MERGE` 语句提供了将新数据插入表中的能力，如果提议的新主键在表中尚不存在，则会插入一个新创建的行。如果主键与表中的现有行匹配，则该语句将使用与该键匹配的附加详细信息来更新该行。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 1 章 ■ 基础知识\n\n在我们的示例中，我们假设要将\
  \ `HR.COUNTRIES` 表加载从 `NEW_COUNTRIES` 表来源的经修订的国家详情。\n\n```sql\nmerge into hr.countries\
  \ c\nusing\n  (select country_id, country_name\n   from hr.new_countries) nc\non\
  \ (c.country_id = nc.country_id)\nwhen matched then\n  update set c.country_name\
  \ = nc.country_name\nwhen not matched then\n  insert (c.country_id, c.country_name)\n\
  \  values (nc.country_id, nc.country_name);\n```\n\n### 工作原理\n\n与简单地将源数据从 `HR.NEW_COUNTRIES`\
  \ 表直接插入目标 `HR.COUNTRIES` 表——并可能因主键重复错误而失败——不同，`MERGE` 语句根据 `ON` 子句设置逻辑分支来处理匹配和不匹配的行。\n\
  \n通常，`ON` 子句指定如何在源和目标之间匹配主键或唯一键数据。在本方法中，这就是匹配 `COUNTRY_ID` 值，如下所示。\n```\non (c.country_id\
  \ = nc.country_id)\n```\n其后是两个额外的子句，`WHEN MATCHED THEN` 子句用于匹配 `ON` 条件的值\n\n\n\n\
  `WHEN NOT MATCHED THEN` 子句，用于处理需要被视为待插入新数据的不匹配新行。\n\n匹配和不匹配子句还可以包含进一步的筛选条件，甚至包含满足时导致行被删除的条件。\n\
  \n```sql\nmerge into hr.countries c\nusing\n    (select country_id, country_name,\
  \ region_id\n     from hr.new_countries) nc\non (c.country_id = nc.country_id)\n\
  when matched then\n    update set c.country_name = nc.country_name,\n          \
  \     c.region_id    = nc.region_id\n    delete where nc.region_id = 4\nwhen not\
  \ matched then\n    insert (c.country_id, c.country_name, c.region_id)\n    values\
  \ (nc.country_id, nc.country_name, nc.region_id)\n    where (nc.region_id != 4);\n\
  ```\n\n在这个修改后的配方中，匹配的行将会更新其 `COUNTRY_NAME`，除非新数据的 `REGION_ID` 等于 `4`，在这种情况下，`HR.COUNTRIES`\
  \ 中的相应行最终将被删除。\n\n不匹配的行将被插入到 `HR.EMPLOYEES` 表中，除非它们的 `REGION_ID` 是 `4`，在这种情况下它们将被忽略。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- '# 第 2 章 ■ 数据汇总与聚合


  在本章中，我们将介绍一些在更高层次上处理数据的配方，其中分组、汇总和全局概览非常重要。我们将探讨的许多配方涵盖了常见或棘手的报告场景，这类场景常见于商业或专业环境中。大多数机构都需要关于“谁在何时向谁销售了什么”、“特定时间段内发生了多少人、销售额或活动”、“跨区域或客户群的趋势”等方面的报告。


  许多人都熟悉 Oracle 提供的一些用于执行汇总和聚合的基本方法。但开发人员和 DBA 通常会尝试在他们的应用程序中执行更复杂的计算——结果把自己搞得一团糟。如果你在自己的工作中看到以下任何组合：在代码中复制数据库功能、不必要地移动临时数据和结果，以及类似低效的任务，你就能发现这个问题。


  Oracle 在这方面功能正呈爆炸式增长，尤其是在过去几个主要版本中引入了在线分析处理（`OLAP`）功能之后。在探索了这些用于汇总和聚合数据的配方后，你会发现
  Oracle 是你手中满足大量报告和其他需求的头号工具。


  ##### 2-1. 汇总列中的值


  **问题**


  你需要以某种方式汇总某一列的数据。例如，你被要求报告每位员工的平均薪资、薪资预算总额、员工人数、最高和最低收入者等信息。


  **解决方案**


  你不需要单独计算总和和计数员工人数来确定平均薪资。`AVG` 函数可以为你计算平均薪资，如下一条 `SELECT` 语句所示。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ```sql

  select avg(salary)

  from hr.employees;


  AVG(SALARY)

  -----------

  6473.36449

  ```


  请注意，我们的配方中没有 `WHERE` 子句，这意味着计算总体平均值时评估了 `HR.EMPLOYEES` 表中的所有行。


  像 `AVG` 这样的函数被称为 **聚合函数**，你有许多这样的函数可供使用。例如，要计算已支付的总薪资，请使用 `SUM` 函数，如下所示：


  ```sql

  select sum(salary)

  from hr.employees;


  SUM(SALARY)

  -----------

  666666

  ```


  要统计领取薪资的人数，你可以简单地使用 `COUNT` 函数统计表中的行数。


  ```sql

  Select count(salary)

  From hr.employees;


  COUNT(SALARY)

  -------------

  107

  ```


  最大值和最小值可以使用 `MAX` 和 `MIN` 函数计算。到现在你可能在想 Oracle 为统计函数使用了非常简单的缩写名称，大体上你是对的。`MAX` 和
  `MIN` 函数如下所示。


  ```sql

  select min(salary), max(salary)

  from hr.employees;


  MIN(SALARY) MAX(SALARY)

  ----------- -----------

  2100        24000

  ```


  **工作原理**


  Oracle 有大量内置的统计和分析函数来执行常见的汇总任务，例如计算平均值、总和以及最小值和最大值。你不需要手动执行中间计算，尽管如果你想验证 Oracle
  的计算过程也可以这样做。


  下面的语句将 Oracle 对薪资的平均值计算结果与我们自己用总额除以员工人数的结果进行了比较。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ```sql

  select avg(salary), sum(salary)/count(salary)

  from hr.employees;


  AVG(SALARY) SUM(SALARY)/COUNT(SALARY)

  ----------- -------------------------

  6473.36449  6473.36449

  ```


  很高兴知道 Oracle 的计算是正确的。为了完整了解 Oracle 的聚合功能，我们需要考虑当数据包含 `NULL` 值时会发生什么。我们当前的配方聚合了员工的薪资，恰好每位员工都有薪资。但只有销售人员因其销售努力而获得佣金，这在
  `HR.EMPLOYEES` 表中体现为 `COMMISSION_PCT` 列有值。非销售人员没有佣金，在 `COMMISSION_PCT` 中体现为 `NULL`
  值。那么，当我们尝试对 `COMMISSION_PCT` 值进行平均或计数时会发生什么？下一条 `SQL` 语句展示了这两种聚合的结果。


  ```sql

  select count(commission_pct), avg(commission_pct)

  from hr.employees;


  COUNT(COMMISSION_PCT) AVG(COMMISSION_PCT)

  --------------------- -------------------

  38                    .225

  ```


  尽管我们看到了 107 位有薪资的员工，但 `COUNT` 函数忽略了所有 `COMMISSION_PCT` 为 `NULL` 的值，只统计了 38 位有佣金的员工。同样，在计算员工佣金的平均值时，Oracle
  也只考虑了那些有实际值的行，忽略了 `NULL` 条目。


  只有两种特殊情况，Oracle 会在聚合函数中考虑 `NULL` 值。第一种是 `GROUPING` 函数，用于测试包含 `NULL` 值的分析函数的结果是直接来自基础表中的行，还是来自分析计算的最终聚合“`NULL`
  集”。第二种特殊情况是 `COUNT(*)` 函数。因为星号意味着表中的所有列，Oracle 处理行计数时不依赖于任何实际数据值，在这种情况下将 `NULL`
  和正常值同等对待。


  为了说明这一点，下一条 `SQL` 语句并排显示了 `COUNT(*)` 和 `COUNT(COMMISSION_PCT)` 的区别。


  ```sql

  select count(*), count(commission_pct)

  from hr.employees;


  COUNT(*) COUNT(COMMISSION_PCT)

  -------- ---------------------

  107      38

  ```


  我们使用 `COUNT(*)` 统计了表中的所有行，而 `COUNT(COMMISSION_PCT)` 只统计了 `COMMISSION_PCT` 不为 `NULL`
  的值。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ##### 2-2. 为不同分组汇总数据


  **问题**


  你想汇总某一列的数据，但你不想对表中的所有行进行汇总。


  你想将行分成若干组，然后分别为每组汇总该列。例如，你需要知道每个部门的平均薪资。


  **解决方案**


  使用 `SQL` 的 `GROUP BY` 功能将共同的数据子集分组在一起，以便应用 `COUNT`、`MIN`、`MAX`、`SUM` 和 `AVG` 等函数。这条
  `SQL` 语句展示了如何使用 `GROUP BY` 对数据的子组应用聚合函数。


  ```sql

  select department_id, avg(salary)

  from hr.employees

  group by department_id;

  ```


  以下是按 `DEPARTMENT_ID` 显示平均值的结果。


  ```

  DEPARTMENT_ID AVG(SALARY)

  ------------- -----------

  100           8600

  30            4150

  20            9500

  70            10000

  90            19333.3333

  110           10150

  50            3503.33333

  40            6500

  80            8955.88235

  10            4400

  60            5760


  12 rows selected.

  ```


  请注意，结果的第三行显示 `DEPARTMENT_ID` 为 null。


  **工作原理**



  '
- "# 第 2 章 ■ 数据汇总与聚合\n\n`GROUP BY`子句决定了目标表的行应归入哪些组，以供后续的聚合函数使用。出于性能考虑，Oracle 会隐式地对数据进行排序以符合所需的分组。通常，从`SELECT`语句的第一行就能推断出`GROUP\
  \ BY`子句中需要的列。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n```sql\nselect\
  \ department_id, avg(salary)\n```\n\n我们告诉 Oracle 希望将个人的薪资数据聚合成平均值，但我们还没有说明如何处理每行中单独的`DEPARTMENT_ID`值。我们是否应该显示每个`DEPARTMENT_ID`条目（包括重复项），并对每个条目显示平均值？显然，这会导致输出重复且浪费——同时也会让你疑惑是否还有更复杂的东西需要理解。通过在`GROUP\
  \ BY`子句中使用“未聚合”的字段，我们指示 Oracle 如何根据其计算出的聚合值来折叠或分组单个行值。\n\n```sql\ngroup by department_id\n\
  ```\n\n这意味着我们`SELECT`语句中的所有值要么是聚合值，要么被`GROUP BY`子句所覆盖。编写语法正确的`GROUP BY`语句的关键在于始终记住：值要么被分组，要么被聚合——不允许有“漏网之鱼”。在一个按多个值分组的查询中，你可以清楚地看到这一点。\n\
  \n##### 2-3. 按多个字段分组数据\n\n### 问题\n\n你需要同时按多个值分组报告数据。例如，人力资源部门可能需要按`DEPARTMENT_ID`和`JOB_ID`报告最低、平均和最高`SALARY`。\n\
  \n### 解决方案\n\nOracle 的`GROUP BY`功能可以扩展到任意数量的列和表达式，因此我们可以扩展之前的方案以满足新的分组需求。我们知道需要聚合什么：`SALARY`值以三种不同的方式聚合。剩下的`DEPARTMENT_ID`和`JOB_ID`则用于分组。我们还希望结果排序，以便能在同一部门内查看不同的`JOB_ID`值及其上下文，并按薪资从高到低排列。接下来的\
  \ SQL 语句通过向`GROUP BY`和`ORDER BY`子句添加必要的条件实现了这一点。\n\n```sql\nSelect department_id,\
  \ job_id, min(salary), avg(salary), max(salary)\nFrom hr.employees\nGroup by department_id,\
  \ job_id\nOrder by department_id, max(salary) desc;\n```\n\n```text\nDEPARTMENT_ID\
  \ JOB_ID MIN(SALARY) AVG(SALARY) MAX(SALARY)\n------------- ---------- -----------\
  \ ----------- -----------\n           10 AD_ASST        4400        4400       \
  \ 4400\n           20 MK_MAN        13000       13000       13000\n           20\
  \ MK_REP         6000        6000        6000\n           30 PU_MAN        11000\
  \       11000       11000\n           30 PU_CLERK       2500        2780       \
  \ 3100\n...\n20 rows selected.\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 工作原理\n\n当按聚合函数或其他函数排序时，你可以利用 Oracle 对排序列的简写表示法。因此，你可以编写语句按数据的基于列的位置排序，而不必写出聚合表达式繁琐的完整文本。\n\
  \n```sql\nSelect department_id, job_id, min(salary), avg(salary), max(salary)\n\
  From hr.employees\nGroup by department_id, job_id\nOrder by 1, 5 desc;\n```\n\n\
  在处理分组结果时，你可以在排序中混合使用列名、聚合表达式、数字位置，甚至是`SELECT`子句中的列别名，如下一个 SQL 语句所示。\n\n```sql\n\
  Select department_id, job_id, min(salary), avg(salary), max(salary) Max_Sal\nFrom\
  \ hr.employees\nGroup by department_id, job_id\nOrder by 1, job_id, Max_Sal desc;\n\
  ```\n\n灵活性是这里的关键，随着你创建和使用更复杂的排序与分组表达式，你会发现别名和序数表示法很有帮助。然而，为了可读性，你应该尽量保持一致。\n\n#####\
  \ 2-4. 在聚合数据集中忽略分组\n\n### 问题\n\n你希望根据聚合函数或分组操作的结果忽略某些数据组。实际上，你真正需要的是在`GROUP BY`子句之后再运行一个`WHERE`子句，用于在组级别或聚合级别提供筛选条件。\n\
  \n### 解决方案\n\nSQL 提供了`HAVING`子句来对分组数据应用条件。对于我们的方案，我们解决了在`HR.EMPLOYEES`表中，找出每个部门中从事相同工作的人员的最低、平均和最高薪资的问题。重要的是，我们只想看到那些在给定部门中有超过一人从事相同工作的聚合值。接下来的\
  \ SQL 语句在`HAVING`子句中使用一个表达式来解决我们的问题。\n\n```sql\nselect department_id, job_id, min(salary),\
  \ avg(salary), max(salary), count(*)\nfrom hr.employees\ngroup by department_id,\
  \ job_id\nhaving count(*) > 1;\n```\n\n我们的方案产生如下汇总结果。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n```text\nDEPARTMENT_ID JOB_ID MIN(SALARY) AVG(SALARY) MAX(SALARY) COUNT(*)\n-------------\
  \ ---------- ----------- ----------- ----------- ----------\n           90 AD_VP\
  \        17000       17000       17000          2\n           50 ST_CLERK      2100\
  \        2800        3600         19\n           80 SA_REP        6100  8396.55172\
  \       11500         29\n           50 ST_MAN        3750  6691.66667        8200\
  \          6\n           80 SA_MAN       10500       12200       14000         \
  \ 5\n           50 SH_CLERK      2500        3215        4200         20\n     \
  \      60 IT_PROG       4200        5760        9000          5\n           30 PU_CLERK\
  \      2500        2780        3100          5\n          100 FI_ACCOUNT    6900\
  \        7920        9000          5\n9 rows selected.\n```\n\n### 工作原理\n\n你可以立即看到，我们只有九组员工的结果。与之前方案返回的\
  \ 20 组相比，显然`HAVING`子句起了作用——但它做了什么呢？\n\n`HAVING`子句是在所有分组和聚合操作完成后进行评估的。Oracle 内部会先生成如下结果：\n\
  \n```text\nDEPARTMENT_ID JOB_ID MIN(SALARY) AVG(SALARY) MAX(SALARY) COUNT(*)\n-------------\
  \ ---------- ----------- ----------- ----------- ----------\n          110 AC_ACCOUNT\
  \    8300        8300        8300          1\n           90 AD_VP        17000 \
  \      17000       17000          2\n           50 ST_CLERK      2100        2800\
  \        3600         19\n           80 SA_REP        6100  8396.55172       11500\
  \         29\n          110 AC_MGR       12000       12000       12000         \
  \ 1\n...\n```\n\n这实际上就是我们没有`HAVING`子句的方案结果。然后，Oracle 应用`HAVING`条件 `having count(*)\
  \ > 1`\n\n之前结果中加粗的行的计数为 1（在相应的`DEPARTMENT_ID`中只有一名该`JOB_ID`的员工），这意味着它们未能满足`HAVING`子句的标准，因此被排除在最终结果之外，从而得到了我们上面看到的解决方案。\n\
  \n`HAVING`子句的条件可以任意复杂，因此你可以使用多种不同类型的条件。\n\n```sql\nselect department_id, job_id,\
  \ min(salary), avg(salary), max(salary), count(*)\nfrom hr.employees\ngroup by department_id,\
  \ job_id\nhaving count(*) > 1\n   and min(salary) between 2500 and 17000\n   and\
  \ avg(salary) != 5000\n   and max(salary)/min(salary) < 2\n;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n```text\nDEPARTMENT_ID JOB_ID MIN(SALARY) AVG(SALARY) MAX(SALARY) COUNT(*)\n-------------\
  \ ---------- ----------- ----------- ----------- ----------\n           90 AD_VP\
  \        17000       17000       17000          2\n           80 SA_REP        6100\
  \  8396.55172       11500         29\n           80 SA_MAN       10500       12200\
  \       14000          5\n           50 SH_CLERK      2500        3215        4200\
  \         20\n           30 PU_CLERK      2500        2780        3100         \
  \ 5\n          100 FI_ACCOUNT    6900        7920        9000          5\n6 rows\
  \ selected.\n```\n\n##### 2-5. 在多个层级聚合数据\n\n### 问题\n\n你想要为报表计算总计、平均值和其他聚合数据，以及各种维度的子汇总。你希望用尽可能少的语句实现这一点，最好只用一条，而不是必须执行单独的语句来获取沿途每个中间子汇总。\n\
  \n### 解决方案\n\n\n\n在 Oracle 中，你可以使用 `CUBE`、`ROLLUP` 和分组集功能来计算小计或其他中间聚合值。对于这个示例，我们假设一些现实需求。我们希望按\
  \ `department_id` 和 `job_id` 查找平均薪资和总薪资，并在部门级别显示有意义的更高级别平均值和小计（无论工作类别如何），以及整个组织的总计和公司范围内的平均值。\n\
  \n```sql\nselect department_id, job_id, avg(salary), sum(salary)\nfrom hr.employees\n\
  group by rollup (department_id, job_id);\n```\n\n我们的结果（显示部分输出）包括按 `DEPARTMENT_ID`\
  \ 和 `JOB_ID` 的总和与平均值、按 `DEPARTMENT_ID` 的汇总聚合值，以及所有数据的总计。\n\n```\nDEPARTMENT_ID JOB_ID\
  \ AVG(SALARY) SUM(SALARY)\n------------- ---------- ----------- -----------\n...\n\
  80 SA_MAN 12200 61000\n80 SA_REP 8396.55172 243500\n80 8955.88235 304500\n90 AD_VP\
  \ 17000 34000\n90 AD_PRES 24000 24000\n90 19333.3333 58000\n100 FI_MGR 12000 12000\n\
  100 FI_ACCOUNT 7920 39600\n100 8600 51600\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  第二章 ■ 数据汇总与聚合\n110 AC_MGR 12000 12000\n110 AC_ACCOUNT 8300 8300\n110 10150 20300\n\
  6473.36449 692650\n已选择 33 行。\n```\n\n### 工作原理\n\n`ROLLUP` 函数执行多级分组，采用一种从右至左的方式，通过中间级别向上汇总到任何总计或求和。在我们的示例中，这意味着在按\
  \ `DEPARTMENT_ID` 和 `JOB_ID` 执行正常分组后，`ROLLUP` 函数会汇总所有 `JOB_ID` 值，以便我们查看特定部门内所有工作的\
  \ `DEPARTMENT_ID` 级别的平均值和总和。\n\n然后，`ROLLUP` 汇总到我们示例中的下一个（也是最高）级别，汇总所有部门，实际上提供了组织范围内的汇总。你可以在输出中看到汇总后的行。\n\
  \n执行此汇总相当于运行三个独立的语句，例如下面的三个，并使用 `UNION` 或应用程序级别的代码将结果拼凑在一起。\n\n```sql\nselect department_id,\
  \ job_id, avg(salary), sum(salary)\nfrom hr.employees\ngroup by department_id, job_id;\n\
  ```\n\n```sql\nselect department_id, avg(salary), sum(salary)\nfrom hr.employees\n\
  group by department_id;\n```\n\n```sql\nselect avg(salary), sum(salary)\nfrom hr.employees;\n\
  ```\n\n当然，在这样做时，你需要自己负责在输出的直观位置插入小计。你可以尝试编写一个三向的 `UNION` 子查询，并使用外部 `SELECT` 来排序。如果这听起来越来越复杂，那么值得庆幸的是，`ROLLUP`\
  \ 命令及其关联命令 `CUBE` 已经取代了执行此类笨拙计算的需要。\n\n细心的观察者会注意到，由于 `ROLLUP` 是从右至左处理给定的列，我们看不到按职位汇总部门的值。我们可以使用此版本的示例来实现这一点。\n\
  \n```sql\nselect department_id, job_id, avg(salary), sum(salary)\nfrom hr.employees\n\
  group by rollup (job_id, department_id);\n```\n\n这样做，我们得到了所需的 `DEPARTMENT_ID` 中间汇总，但失去了\
  \ `JOB_ID` 中间汇总，只看到 `JOB_ID` 在最终级别汇总。要在所有维度上进行汇总，请将示例改为使用 `CUBE` 函数。\n\n```sql\n\
  select department_id, job_id, min(salary), avg(salary), max(salary)\nfrom hr.employees\n\
  group by cube (department_id, job_id);\n```\n\n结果显示了每个级别的汇总，部分结果如下所示。\n\n```\nDEPARTMENT_ID\
  \ JOB_ID MIN(SALARY) AVG(SALARY) MAX(SALARY)\n------------- ---------- -----------\
  \ ----------- -----------\n7000 7000 7000\n2100 6392.27273 24000\nAD_VP 17000 17000\
  \ 17000\nAC_MGR 12000 12000 12000\nFI_MGR 12000 12000 12000\n...\n10 4400 4400 4400\n\
  10 AD_ASST 4400 4400 4400\n20 6000 9500 13000\n20 MK_MAN 13000 13000 13000\n20 MK_REP\
  \ 6000 6000 6000\n...\n```\n\n\n\n"
- "# 第 2 章 ■ 数据汇总与聚合\n\nROLLUP 和 CUBE 函数的强大之处在于，它们可以扩展到查询所需的任意多“维度”。诚然，“立方体”（cube）一词意在暗示在三维空间中查看中间聚合的思想，但您的数据通常可能拥有超过三维的维度。扩展我们的食谱，我们可以通过部门、职位、经理和入职年份来“立方体化”平均工资的计算。\n\
  \n```sql\nSELECT department_id, job_id, manager_id,\n       extract(year from hire_date)\
  \ as \"START_YEAR\", avg(salary)\nFROM   hr.employees\nGROUP  BY cube (department_id,\
  \ job_id, manager_id, extract(year from hire_date));\n```\n此食谱的结果是对四个维度平均工资的考察！\n\
  \n##### 2-6. 在其他查询中使用聚合结果\n\n### 问题\n\n您希望将涉及聚合和分组的复杂查询的输出，用作另一个查询的源数据。\n\n### 解决方案\n\
  \nOracle 允许任何查询用作子查询或内联视图，包括那些包含聚合和分组函数的查询。这在您希望指定组级条件，并与其他表或查询的数据进行比较，且没有现成视图可用时特别有用。\n\
  \n对于我们的食谱，我们将使用一个包含按部门、职位和起始年份进行 rollup 的平均工资计算，如下面的 `SELECT` 语句所示。\n\n```sql\n\
  select * from (\n  select department_id as \"dept\", job_id as \"job\",\n      \
  \   to_char(hire_date,'YYYY') as \"Start_Year\", avg(salary) as \"avsal\"\n  from\
  \   hr.employees\n  group  by rollup (department_id, job_id, to_char(hire_date,'YYYY')))\n\
  salcalc where salcalc.start_year > '1990'\nor salcalc.start_year is null\norder\
  \ by 1,2,3,4;\n```\n\n我们的食谱产生以下（节选的）输出：\n\ndept job Start_Year avsal\n----------\
  \ ---------- ----- ----------\n10 AD_ASST     4400\n10                  4400\n20\
  \ MK_MAN 1996 13000\n20 MK_MAN      13000\n20 MK_REP 1997 6000\n20 MK_REP      \
  \ 6000\n…\n              6473.36449\n79 rows selected.\n\n### 工作原理\n\n我们的食谱使用子查询的聚合和分组结果作为内联视图，然后我们从中选择并应用进一步的条件。在这种情况下，我们可以通过使用更复杂的\
  \ `HAVING` 子句来避免子查询方法，如下所示。\n\n```sql\nhaving to_char(hire_date,'YYYY') > '1990'\n\
  or to_char(hire_date,'YYYY') is null\n```\n\n在这里避免子查询之所以可行，仅仅是因为我们将聚合与字面值进行比较。如果我们想查找那些在某个职位上有人曾担任过的部门中，该职位的平均值，我们就需要引用\
  \ `HR.JOBHISTORY` 表。根据业务需求，我们可能幸运地能够在一个语句中构建连接、聚合、分组和 `HAVING` 条件。通过将聚合和分组查询的结果视为另一个查询的输入，我们获得了更好的可读性，并且能够编码比\
  \ `HAVING` 子句所允许的更复杂的逻辑。\n\n##### 2-7. 统计组和集合中的成员\n\n### 问题\n\n您需要统计一个组的成员、组的组以及其他基于集合的集合。同时，您需要根据其他数据动态地包含或排除单个成员和组。例如，您想根据员工在公司内获得的晋升次数，统计他们在组织任职期间担任过多少个不同的职位。\n\
  \n### 解决方案\n\nOracle 的 `COUNT` 功能可用于统计物化结果以及表中的实际行。下一个 `SELECT` 语句使用一个子查询来统计跨表持有的职位实例，然后汇总这些计数。实际上，这是对查询结果数据的计数的计数，而不是任何直接存储在\
  \ Oracle 中的内容。\n\n```sql\nselect jh.JobsHeld, count(*) as StaffCount\nfrom\n  (select\
  \ u.employee_id, count(*) as JobsHeld\n   from\n     (select employee_id from hr.employees\n\
  \      union all\n      select employee_id from hr.job_history) u\n   group by u.employee_id)\
  \ jh\ngroup by jh.JobsHeld;\n```\n\n从该 `SELECT` 语句中，我们得到以下简明的摘要。\n\nJOBSHELD STAFFCOUNT\n\
  ---------- ----------\n\n\n\n---------- ----------\n\n1 99\n\n2 5\n\n3 3\n\n大多数员工只有一份工作，有五人担任过两个职位，有三人每人担任过三个职位。\n\
  \n## 工作原理\n\n我们这个方案的关键在于`COUNT`函数的灵活性，它的用途远不止于物理上计算表中的行数。你可以统计任何能在`结果集`中表示的事物。\n\
  \n这意味着你可以统计衍生数据、推断数据以及瞬时计算和判断的结果。\n\n我们的方案使用了嵌套子查询并在两个层级上进行计数，最好从内向外逐步理解。\n\n我们知道员工当前的职位记录在`HR.EMPLOYEES`表中，而在该组织内的每一个先前职位实例则记录在`HR.JOB_HISTORY`表中。我们不能简单地计算`HR.JOB_HISTORY`中的条目数然后为员工的当前职位加一，因为从未换过工作的员工在`HR.JOB_HISTORY`中没有记录。\n\
  \n因此，我们对`HR.EMPLOYEES`和`HR.JOB_HISTORY`中的`EMPLOYEE_ID`值执行`UNION ALL`操作，构建一个基础结果集，该结果集为员工担任过的每一个职位重复一次`EMPLOYEE_ID`。以下仅展示了内部`UNION\
  \ ALL`语句的部分结果，以帮助你理解逻辑。\n\n`EMPLOYEE_ID`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 2 章 ■ 数据汇总与聚合**\n\n…\n\n### Union 与 Union All\n\n记住`UNION`和`UNION ALL`的区别很有用。`UNION`会移除结果集中的重复条目（并在去重过程中对数据进行排序），而`UNION\
  \ ALL`则保留所有源集中的所有值，包括重复值。在我们的方案中，如果使用`UNION`，会导致每个员工只统计一份工作，无论他们实际有过多少次晋升或换工作。\n\
  \n你会高兴地知道，`UNION`操作符是本书其他章节中许多方案的有用成分。\n\n下一个子查询对最内层子查询派生的值进行聚合和分组，统计每个`EMPLOYEE_ID`出现的次数，以确定每个人担任过多少份工作。这是我们第一次将`COUNT`函数应用于另一个查询的结果，而不是表中的原始数据。\n\
  \n此子查询的部分输出如下所示。\n\n`EMPLOYEE_ID JOBSHELD`\n\n`----------- ----------`\n\n`100 1`\n\
  \n`101 3`\n\n`102 2`\n\n`103 1`\n\n`104 1`\n\n…\n\n我们最外层的查询也执行了直接的聚合和分组，再次对子查询的结果使用了`COUNT`函数——而该子查询本身就在对衍生数据进行计数。\n\
  \n##### 2-8. 查找表中的重复值和唯一值\n\n### 问题\n\n你需要测试某个给定的数据值在表中是否唯一——即它只出现一次。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 2 章 ■ 数据汇总与聚合**\n\n### 解决方案\n\nOracle 支持标准`SELECT`语句的`HAVING`子句和`COUNT`函数，两者结合可以识别表或结果集中的单个数据实例。以下`SELECT`语句解决了在`HR.EMPLOYEES`表中查找姓氏\
  \ Fay 是否唯一的问题。\n\n```sql\nselect last_name, count(*)\nfrom hr.employees\nwhere last_name\
  \ = 'Fay'\ngroup by last_name\nhaving count(*) = 1;\n```\n\n使用此方案，我们得到以下结果：\n\n\
  `LAST_NAME COUNT(*)`\n\n`------------------------- ----------`\n\n`Fay 1`\n\n因为`LAST_NAME`值为`Fay`的恰好只有一个，所以我们得到的计数是\
  \ 1，因此能看到结果。\n\n### 工作原理\n\n只有唯一的数据组合才会分组后计数为 1。例如，我们可以测试姓氏 King 是否唯一：\n\n```sql\n\
  select last_name, count(*)\nfrom hr.employees\nwhere last_name = 'King'\ngroup by\
  \ last_name\nhaving count(*) = 1;\n```\n\n此语句不返回任何结果，这意味着姓氏为`King`的人数不是 1；而是 0、2\
  \ 或其他数字。该语句首先确定哪些行的`LAST_NAME`值为`King`。然后按`LAST_NAME`分组并统计遇到的匹配次数。最后，`HAVING`子句测试`LAST_NAME`为`King`的行数是否等于\
  \ 1。只有满足条件的结果才会被返回，因此，只有当你看到结果时，该姓氏才是唯一的。\n\n如果我们移除`HAVING`子句，如下面的`SELECT`语句，我们就能看到`HR.EMPLOYEES`表中有多少个\
  \ King。\n\n```sql\nselect last_name, count(*)\nfrom hr.employees\nwhere last_name\
  \ = 'King'\ngroup by last_name;\n```\n\n`LAST_NAME COUNT(*)`\n\n`-------------------------\
  \ ----------`\n\n`King 2`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  **第 2 章 ■ 数据汇总与聚合**\n\n有两个人的姓氏是`King`，因此它不唯一，也就没有出现在我们之前唯一性的测试中。\n\n同样的技术可以扩展到测试列的唯一组合。我们可以扩展方案来测试某人的完整姓名（基于`FIRST_NAME`和`LAST_NAME`的组合）是否唯一。这个`SELECT`语句在条件中包含了两个列，用于测试\
  \ Lindsey Smith 在`HR.EMPLOYEES`表中是否是一个唯一的全名。\n\n```sql\nselect first_name, last_name,\
  \ count(*)\nfrom hr.employees\nwhere first_name = 'Lindsey'\nand last_name = 'Smith'\n\
  group by first_name, last_name\nhaving count(*) = 1;\n```\n\n`FIRST_NAME LAST_NAME\
  \ COUNT(*)`\n\n`-------------------- ------------------------- ----------`\n\n`Lindsey\
  \ Smith 1`\n\n你可以编写类似的方案，使用字符串拼接、自连接以及许多其他方法。\n\n##### 2-9. 计算总计和小计\n\n### 问题\n\n\
  你需要在各种环境中计算总计和小计，使用 SQL 的最基本功能。例如，你需要计算每个部门的人数以及总人数，并且希望这种方式能在各种版本的 Oracle 中无需更改即可运行。\n\
  \n### 解决方案\n\n在那些你认为无法使用`ROLLUP`和`CUBE`等分析函数，或者受到许可或其他因素限制的情况下，你可以在单独的 SQL 语句中使用传统的聚合和分组技术，并用`UNION`组合结果，将所有逻辑合并到一个语句中。这个`SELECT`语句在一个查询中计算各部门的员工数，在另一个查询中计算所有员工的总数。\n\
  \n```sql\nselect nvl(to_char(department_id),'-') as \"DEPT.\", count(*) as \"EMP_COUNT\"\
  \nfrom hr.employees\ngroup by department_id\nunion\nselect 'All Depts.', count(*)\n\
  from hr.employees;\n```\n\n方案的结果如下所示，为节省空间对输出进行了删节。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 2 章 ■ 数据汇总与聚合**\n\n`DEPT. EMP_COUNT`\n\n`----------- ----------`\n\n`10 1`\n\
  \n`100 6`\n\n`110 2`\n\n…\n\n`90 3`\n\n`All Depts. 107`\n\n`13 rows selected.`\n\
  \n### 工作原理\n\n此方案使用单独的查询来计算不同层级的不同聚合值，并使用`UNION`将结果组合成报告式的输出。实际上，生成了两组不同的结果。首先，使用以下`SELECT`语句完成按部门统计员工数。\n\
  \n```sql\nselect nvl(to_char(department_id),'-') as \"DEPT.\", count(*) as \"EMP_COUNT\"\
  \nfrom hr.employees\ngroup by department_id;\n```\n\n注意这里使用了`TO_CHAR`函数将整数`DEPARTMENT_ID`值转换为字符等效值。这是为了确保最终的`UNION`操作不会受到隐式转换开销甚至转换错误的困扰。在本方案中，我们知道希望将字面短语`\"\
  All Depts.\"`与总员工数结合使用，并让它与`DEPARTMENT_ID`值显示在同一列中。\n\n如果不进行转换，这会导致尝试从一个定义为整数的列和一个字面字符串形成联合。如果我们不进行转换，将会收到此错误。\n\
  \n`ORA-01790: expression must have same datatype as corresponding expression`\n\n\
  显然这不是一个有用的结果。在处理必须处理`NULL`值的联合时，你经常会看到这个错误。\n\n\n\n我们还需要`TO_CHAR`转换与`NVL`空值测试函数协同工作，以将`DEPARTMENT_ID`为空的员工映射为“-”来表示无部门。这纯粹是出于美观原因，但你可以看到它如何为阅读你配方结果的人提供清晰度。这样，他们就不必猜测空白的或空的`DEPARTMENT_ID`意味着什么。\n\
  \n`UNION`中的第二个查询仅计算`HR.EMPLOYEES`表中的员工总数，并利用 Oracle 提供的灵活的字面量处理机制，将总数与值“所有部门”隐式分组。\n\
  \n```sql\nselect '所有部门', count(*)\nfrom hr.employees\n```\n\n然后，`UNION`子句简单地将两个结果拼接在一起，生成你看到的输出。这等同于使用本章前面《在多个层级聚合数据》配方中介绍的`ROLLUP`子句。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- "# 第 2 章 ■ 汇总与聚合数据\n\n##### 2-10. 构建你自己的聚合函数\n\n### 问题\n\n你需要实现一个自定义聚合，以与 Oracle\
  \ 现有的聚合函数和分组机制协同工作。你特别想要将多行中的字符串聚合到一行，使得每行的文本一个接一个地连接起来。你见过其他数据库支持此功能，但找不到 Oracle\
  \ 的等效函数。\n\n### 解决方案\n\nOracle 提供了一个框架，用于编写你自己的聚合函数，无论是提供 Oracle 中原本没有的聚合，还是为常见的聚合函数开发具有不同行为的你自己的定制版本。我们的配方创建了一个新的聚合函数`STRING_TO_LIST`，以及基于\
  \ Oracle 自定义聚合模板的支持类型定义和类型体。\n\n以下类型定义定义了 Oracle 对自定义聚合类型要求的四个必需函数。\n\n```sql\n\
  create or replace type t_list_of_strings as object (\n  string_list varchar2(4000),\n\
  \  static function odciaggregateinitialize\n    (agg_context in out t_list_of_strings)\n\
  \    return number,\n  member function odciaggregateiterate\n    (self in out t_list_of_strings,\n\
  \     next_string_to_add in varchar2 )\n    return number,\n  member function odciaggregatemerge\n\
  \    (self in out t_list_of_strings,\n     para_context in t_list_of_strings)\n\
  \    return number,\n  member function odciaggregateterminate\n    (self in t_list_of_strings,\n\
  \     final_list_to_return out varchar2,\n     flags in number)\n    return number\n\
  );\n/\n```\n\n我们将`STRING_LIST`参数限制在 4000，尽管 PL/SQL 支持高达 32000，以确保我们不传递 Oracle 纯\
  \ SQL 所支持的阈值。这四个必需函数中的每一个都实现了将一组字符串聚合成一个列表的各个阶段。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- "# 第 2 章 ■ 汇总与聚合数据\n\n```sql\ncreate or replace type body t_list_of_strings is\n\
  \  static function odciaggregateinitialize\n    (agg_context in out t_list_of_strings)\n\
  \    return number is\n  begin\n    agg_context := t_list_of_strings(null);\n  \
  \  return odciconst.success;\n  end;\n\n  member function odciaggregateiterate\n\
  \    (self in out t_list_of_strings,\n     next_string_to_add in varchar2 )\n  \
  \  return number is\n  begin\n    self.string_list := self.string_list || ' , '\
  \ || next_string_to_add;\n    return odciconst.success;\n  end;\n\n  member function\
  \ odciaggregatemerge\n    (self in out t_list_of_strings,\n     para_context in\
  \ t_list_of_strings)\n    return number is\n  begin\n    self.string_list := self.string_list\
  \ || ' , ' || para_context.string_list;\n    return odciconst.success;\n  end;\n\
  \n  member function odciaggregateterminate\n    (self in t_list_of_strings,\n  \
  \   final_list_to_return out varchar2,\n     flags in number)\n    return number\
  \ is\n  begin\n    final_list_to_return := ltrim(rtrim(self.string_list, ' , '),\
  \ ' , ');\n    return odciconst.success;\n  end;\nend;\n/\n```\n\n有了类型和类型体，我们构建将在实际\
  \ SQL 语句中使用的函数来生成自定义聚合数据。\n\n```sql\ncreate or replace function string_to_list\n\
  \  (input_string varchar2)\n  return varchar2\n  parallel_enable\n  aggregate using\
  \ t_list_of_strings;\n/\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- "# 第 2 章 ■ 汇总与聚合数据\n\n我们现在可以使用我们的自定义聚合函数，从查询中生成的任何字符串集合或子集来构建列表。在此配方中，我们希望返回分配给特定经理的所有员工的姓氏。\n\
  \n```sql\nselect manager_id, string_to_list (last_name) as employee_list\nfrom hr.employees\n\
  group by manager_id;\n```\n\n我们的新自定义聚合函数奏效了，生成了类似列表输出的姓氏以及经理的 ID。\n\n```\nMANAGER_ID\
  \ EMPLOYEE_LIST\n---------- ------------------------------------------------------------\n\
  \       100 Hartstein , Kochhar , De Haan , Fripp , Kaufling , Weiss ...\n     \
  \  101 Whalen , Greenberg , Higgins , Baer , Mavris\n       102 Hunold\n       103\
  \ Ernst , Pataballa , Lorentz , Austin\n       108 Faviet , Chen , Sciarra , Urman\
  \ , Popp\n...\n```\n\n### 工作原理\n\n不要被跳转到 PL/SQL，或者配方的长度吓到。事实上，上面的大部分代码是 Oracle 提供的样板模板，旨在帮助快速轻松地构建自定义聚合。\n\
  \n这个配方构建了创建自定义聚合所必需的三个组件，然后在 SQL 语句中使用它，按经理列出员工姓氏。首先，它定义了一个自定义类型，其中定义了 Oracle 对自定义聚合要求的四个规定函数。它们是：\n\
  \n`ODCIAggregateInitialize`：此函数在处理最开始时被调用，并设置聚合类型的新实例——在我们的例子中是`T_LIST_OF_STRINGS`。这个新实例初始化了其成员变量（如果有），并为主聚合阶段做好准备。\n\
  \n`ODCIAggregateIterate`：此函数包含了自定义聚合的核心功能。此函数中的逻辑将为驱动查询中传递的每个数据值调用。在我们的例子中，这是获取每个字符串值并将其附加到现有字符串列表的逻辑。\n\
  \n`ODCIAggregateMerge`：这是一个半可选函数，用于控制 Oracle 的行为，如果 Oracle 决定并行执行聚合，使用多个并行从属进程处理部分数据。虽然你不必启用并行选项（见下文），但你仍然需要包含这个函数。在我们的例子中，如果我们的列表创建被拆分成并行任务，我们只需要在并行过程结束时连接子列表。\n\
  \n`ODCIAggregateTerminate`：这是最后一个函数，用于将结果返回给调用的 SQL 函数。在我们的例子中，它返回在迭代和并行合并阶段构建的全局变量`STRING_LIST`。\n\
  \n我们现在已经构建了聚合的机制。配方的下一部分构建了你可以调用以在数据上实际运行你强大的新聚合功能的函数。我们创建了一个具有许多你期望的常规特性的函数：\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- "# 第 2 章 ■ 汇总与聚合数据\n\n```sql\ncreate or replace function string_to_list\n  (input_string\
  \ varchar2)\n  return varchar2\n  parallel_enable\n  aggregate using t_list_of_strings;\n\
  /\n```\n\n该函数获得一个名称`STRING_TO_LIST`，它接受一个`VARCHAR2`字符串作为输入，并返回一个作为输出。到目前为止，非常普通。接下来的两行是我们配方聚合行为的关键。\n\
  \n`PARALLEL_ENABLE`子句是完全可选的，它指示 Oracle，如果优化器决定走那条路径，那么底层聚合逻辑可以安全地并行执行。根据你的`ODCIAGGREGATEITERATE`函数中的逻辑，你可能有必须按特定顺序执行的特定操作，因此希望避免并行。启用并行处理也意味着在`ODCIAGGREGATEMERGE`成员函数中具备处理合并结果子集的逻辑。\n\
  \n\n`AGGREGATE USING T_LIST_OF_STRINGS` 子句是所有魔法发生的地方。这一行指令表明该函数本质上是聚合函数，并且应使用输入参数实例化一个\
  \ `T_LIST_OF_STRINGS` 类型的对象，从而启动实际的聚合工作。\n\n■ 注意 Oracle 仅支持创建恰好接受一个输入参数并恰好返回一个输出参数的自定义聚合函数。这就是为什么在我们的示例中，你没有看到任何显式指令将\
  \ `INPUT_STRING` 参数传递给实例化的 `T_LIST_OF_STRINGS` 类型，也没有看到将 `T_LIST_OF_STRINGS.ODCIAGGREGATETERMINATE`\
  \ 成员函数的返回值映射回 `STRING_TO_LIST` 函数返回值的指令。当 Oracle 看到聚合子句时，这些是它唯一能做的事情，因此当你使用聚合功能时，它们都是隐式完成的。\n\
  \n此后，新的 `STRING_TO_LIST` 函数的调用和使用方式就与其他聚合函数（如 `AVG`、`MAX`、`MIN` 等）非常相似。\n\n#####\
  \ 2-11. 访问后续或先前行中的值\n\n### 问题\n\n你想查询数据以产生有序的结果，但你希望在结果集中包含基于前后行的计算。例如，你想根据在时间上较早和较晚发生的事件，对事件式数据进行计算。\n\
  \n### 解决方案\n\nOracle 支持 `LAG` 和 `LEAD` 分析函数，利用前置/后置逻辑来访问表或表达式中的多行数据——并且你不需要诉诸于将源数据与自身进行连接\
  \ 42\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 2 章 ■ 数据汇总与聚合\n\n\
  我们的示例假设你正试图解决一个业务问题：可视化员工随时间变化的雇佣趋势。`LAG` 函数可用于查看哪位员工的雇佣紧随另一位之后，也可用于计算雇佣之间的时间间隔。\n\
  \n```\nselect first_name, last_name, hire_date,\nlag(hire_date, 1, '01-JUN-1987')\
  \ over (order by hire_date) as Prev_Hire_Date,\nhire_date - lag(hire_date, 1, '01-JUN-1987')\
  \ over (order by hire_date) as Days_Between_Hires\nfrom hr.employees\norder by hire_date;\n\
  ```\n\n我们的查询返回了 107 行数据，按员工被雇佣的顺序（虽然不一定保留用于显示或其他目的的隐式排序）连接员工，并显示了每位员工加入组织之间的时间差。\n\
  \nFIRST_NAME LAST_NAME HIRE_DATE PREV_HIRE DAYS_BETWEEN\n----------- ----------\
  \ --------- --------- ------------\nSteven King 17-JUN-87 01-JUN-87 16\nJennifer\
  \ Whalen 17-SEP-87 17-JUN-87 92\nNeena Kochhar 21-SEP-89 17-SEP-87 735\nAlexander\
  \ Hunold 03-JAN-90 21-SEP-89 104\nBruce Ernst 21-MAY-91 03-JAN-90 503\n...\nDavid\
  \ Lee 23-FEB-00 06-FEB-00 17\nSteven Markle 08-MAR-00 23-FEB-00 14\nSundar Ande\
  \ 24-MAR-00 08-MAR-00 16\nAmit Banda 21-APR-00 24-MAR-00 28\nSundita Kumar 21-APR-00\
  \ 21-APR-00 0\n\n已选择 107 行。\n\n你可以自己计算天数差，以确认 `LAG` 函数和差值算术运算确实如所述那样工作。例如，1990 年\
  \ 1 月 3 日和 1991 年 5 月 21 日之间确实有 503 天。\n\n### 工作原理\n\n`LAG` 和 `LEAD` 函数与大多数其他分析和窗口函数类似，它们在查询的非分析基础部分完成后才开始操作。Oracle\
  \ 对中间结果集执行第二次遍历以应用任何分析谓词。实际上，非分析组件会首先被评估，就像已经运行了这个查询一样：\n\n```\nselect first_name,\
  \ last_name, hire_date\n-- 用于 Prev_Hire_Date 的占位符,\n-- 用于 Days_Between_Hires 的占位符\n\
  from hr.employees;\n```\n\n此时的结果（如果你能看到的话）将如下所示： 43\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 2 章 ■ 数据汇总与聚合\n\n\n## 第 2 章 ■ 数据汇总与聚合\n\nNeena Kochhar 21-SEP-89（待定）\n\nAlexander\
  \ Hunold 03-JAN-90（待定）\n\nBruce Ernst 21-MAY-91（待定）\n\n...\n\n随后处理分析函数，提供您所看到的结果。我们的方案使用\
  \ `LAG` 函数来比较当前行结果与前一行的结果。理解 `LAG` 的最佳方式是了解其通用格式，其形式如下：\n\n`lag (列或表达式, 前移位数, 首行默认值)`\n\
  \n`列或表达式` 基本不言自明，因为这是您希望 `LAG` 操作的表数据或计算结果。`前移位数` 部分表示 `LAG` 应参照的、相对于当前行的前几行。在我们的例子中，值\
  \ '1' 表示当前行的前一行。`LAG` 的默认值指定当没有“第零行”时，应使用什么值作为首行的参考值。我们选择了一个任意的日期 01-JUN-1987 作为组织成立的假想日期。您可以在此处使用任何日期、日期计算或返回日期的函数。\n\
  \n如果您未指定首行的参考值，Oracle 将提供一个 `NULL` 值。\n\n接着，`OVER` 分析子句规定了应用分析函数时数据的排序方式，以及将数据分割为窗口或子集的任何分区（本方案中未展示）。细心的读者会意识到，这意味着我们的方案本可以包含一个通用的\
  \ `ORDER BY` 子句，该子句可以按照与 `LAG` 函数所使用的 `HIRE_DATE` 排序不同的顺序对数据进行排序呈现。这为您处理通用排序以及同一语句中不同的分析滞后和超前需求提供了最大的灵活性。我们将在本章后面展示一个这样的示例。请记住，您绝不应依赖分析函数使用的隐式排序。这种方式未来可能而且将会改变，因此强烈建议您在任何明确需要排序的地方始终包含\
  \ `ORDER BY` 子句。\n\n### LEAD 函数\n\n`LEAD` 函数的工作方式与 `LAG` 几乎完全相同，但它跟踪的是后续行而非前序行。我们可以改写我们的方案，以显示员工的雇佣信息以及下一位员工的\
  \ `HIRE_DATE`，并计算他们雇佣日期之间类似的经过时间窗口，如下 `SELECT` 语句所示：\n\n```\nselect first_name,\
  \ last_name, hire_date,\n       lead(hire_date, 1, sysdate) over (order by hire_date)\
  \ as Next_Hire_Date,\n       lead(hire_date, 1, sysdate) over (order by hire_date)\
  \ - hire_date\n           as Days_Between_Hires\n  from hr.employees;\n```\n\n既然您已经看过\
  \ `LAG` 示例，现在日期的排列模式就非常直观了。使用 `LEAD` 时，关键区别在于第三个参数中默认值的效果。\n\nFIRST_NAME LAST_NAME\
  \ HIRE_DATE NEXT_HIRE DAYS_BETWEEN\n----------- ---------- --------- --------- ------------\n\
  Steven King 17-JUN-87 17-SEP-87 92\nJennifer Whalen 17-SEP-87 21-SEP-89 735\nNeena\
  \ Kochhar 21-SEP-89 03-JAN-90 104\nAlexander Hunold 03-JAN-90 21-MAY-91 503\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\nBruce Ernst 21-MAY-91 13-JAN-93\
  \ 603\n...\nDavid Lee 23-FEB-00 08-MAR-00 14\nSteven Markle 08-MAR-00 24-MAR-00\
  \ 16\nSundar Ande 24-MAR-00 21-APR-00 28\nAmit Banda 21-APR-00 21-APR-00 0\nSundita\
  \ Kumar 21-APR-00 21-APR-09 3287.98\n\n共选择 107 行。\n\n与 `LAG`（其默认值为首行比较提供一个假想起点）相反，`LEAD`\
  \ 使用默认值为前向链中的最后一行提供一个假想终点。在此方案中，我们比较的是员工雇佣之间经过了多少天。对我们来说，使用 `SYSDATE` 函数将最后雇佣的员工（在本例中是\
  \ Sundita Kumar）与当前日期进行比较是有意义的。这是一个快速简便的收尾，用于计算自雇佣最后一名员工以来经过的天数。\n\n##### 2-12.\
  \ 为查询结果中的行分配排名值\n\n问题\n\n\n\n#### 第 2 章：数据汇总与聚合\n\n查询结果需要分配一个序号来表示它们在结果中的位置。你肯定不希望手动插入并跟踪源数据中的这些序号。\n\
  \n## 解决方案\n\nOracle 提供了 `RANK` 分析函数，用于为结果集中的行生成排名编号。`RANK` 作为一个常规的 OLAP 风格函数应用于某列或派生表达式。本方案中，我们将假设业务需求是按薪资从高到低对员工进行排名。\n\
  \n以下 `SELECT` 语句使用 `rank` 函数来分配这些排名值。\n\n```sql\nselect employee_id, salary, rank()\
  \ over (order by salary desc) as Salary_Rank from hr.employees;\n```\n\n我们的查询生成了结果，从月薪最高的\
  \ 24000 开始，一直到第 107 位月薪 2100 的员工，如下面的节选结果所示。\n\n| EMPLOYEE_ID | SALARY | SALARY_RANK\
  \ |\n|-------------|--------|-------------|\n| 100         | 24000  | 1        \
  \   |\n| 101         | 17000  | 2           |\n| 102         | 17000  | 2      \
  \     |\n| 145         | 14000  | 4           |\n| 146         | 13500  | 5    \
  \       |\n| 201         | 13000  | 6           |\n| 205         | 12000  | 7  \
  \         |\n| 108         | 12000  | 7           |\n| 147         | 12000  | 7\
  \           |\n| ...         | ...    | ...         |\n| 132         | 2100   |\
  \ 107         |\n\n共选择了 107 行。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 工作原理\n\n`RANK` 的行为类似于任何其他分析函数，在非分析处理完成后，对结果集进行第二次遍历操作。在本方案中，选取了 `EMPLOYEE_ID`\
  \ 和 `SALARY` 值（没有 `WHERE` 谓词来过滤表数据，因此我们得到了组织内的每位员工）。然后分析阶段按薪资降序对结果进行排序，并从 1 开始计算结果的排名值。\n\
  \n请注意 `RANK` 函数如何处理相等的值。两名薪资为 17000 的员工被赋予相同的排名 2。下一位薪资为 14000 的员工，排名是 4。这被称为**稀疏排名（sparse\
  \ ranking）**，其中并列值会“占用”名次位置。实际上，这意味着我们并列第二名的员工占用了第二和第三名的位置，下一个可用的排名就是 4。\n\n你可以使用稀疏排名的替代方案，称为**密集排名（dense\
  \ ranking）**。Oracle 通过 `DENSE_RANK` 分析函数支持这一点。观察一下当我们在本方案中切换到密集排名时发生的情况。\n\n```sql\n\
  select employee_id, salary, dense_rank() over (order by salary desc)\nas Salary_Rank\n\
  from hr.employees;\n```\n\n现在我们看到了“缺失”的连续排名值。\n\n| EMPLOYEE_ID | SALARY | SALARY_RANK\
  \ |\n|-------------|--------|-------------|\n| 100         | 24000  | 1        \
  \   |\n| 101         | 17000  | 2           |\n| 102         | 17000  | 2      \
  \     |\n| 145         | 14000  | 3           |\n| 146         | 13500  | 4    \
  \       |\n| 201         | 13000  | 5           |\n| 205         | 12000  | 6  \
  \         |\n| 108         | 12000  | 6           |\n| 147         | 12000  | 6\
  \           |\n| 168         | 11500  | 7           |\n| ...         | ...    |\
  \ ...         |\n| 132         | 2100   | 58          |\n\n共选择了 107 行。\n\n不同排名类型的经典使用场景是在体育比赛中。足球和其他运动在追踪球队在积分榜上的胜/负进展时通常使用稀疏排名。另一方面，奥运会等赛事在游泳等项目中出现并列情况时，倾向于使用密集排名。他们希望确保总是有金牌、银牌和铜牌获得者，即使出现并列情况需要颁发更多奖牌。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 注意\n\n作者们一直希望，有一天写 SQL\
  \ 语句能成为奥运会项目。我们一定会采用密集排名方法，以最大化我们获得奖牌的机会。\n\n我们的方案使用了一个跨越所有员工的简单排名来确定薪资顺序。`RANK`\
  \ 和 `DENSE_RANK` 都支持常规的分析扩展，允许我们对源数据进行分区，以便为每个数据子集生成排名。延续我们方案的主题，这意味着我们可以为每个部门内的薪资收入者从高到低分配一个排名。将分区引入查询如下所示：\n\
  \n```sql\nSelect department_id, employee_id, salary, rank() over\n(partition by\
  \ department_id order by salary desc) as Salary_Rank\nFrom hr.employees\n;\n```\n\
  \n我们的结果现在显示了按部门划分的员工薪资排名。\n\n| DEPARTMENT_ID | EMPLOYEE_ID | SALARY | SALARY_RANK\
  \ |\n|---------------|-------------|--------|-------------|\n\n\n\n"
- "# 第二章：汇总与聚合数据\n\n##### 2-13. 在组内查找第一个和最后一个值\n\n### 问题\n\n你想为一个组计算并显示聚合信息（如最小值和最大值），同时显示该组每个成员的详细信息。你希望避免重复显示聚合值和详细信息的工作。\n\
  \n### 解决方案\n\nOracle 提供了分析函数 `FIRST` 和 `LAST` 来计算任何有序序列中的起始值和结束值。重要的是，与 `MIN` 和\
  \ `MAX` 这类显式的聚合函数不同，这些分析函数的使用**不依赖**于分组（`GROUP BY`）。\n\n对于我们的示例，我们假设一个具体问题：显示员工的薪资，同时显示其所在部门同事的最低和最高薪资。以下\
  \ `SELECT` 语句可以完成这项工作。\n\n```sql\nselect department_id, first_name, last_name,\n\
  \       min(salary)\n         over (partition by department_id) \"MinSal\",\n  \
  \     salary,\n       max(salary)\n         over (partition by department_id) \"\
  MaxSal\"\nfrom   hr.employees\norder  by department_id, salary;\n```\n\n这段代码输出所有员工，并显示他们的薪资，该薪资介于其部门内的最低和最高薪资之间，如下方的示例输出所示。\n\
  \n```\nDEPARTMENT_ID FIRST_NAME LAST_NAME   MinSal  SALARY    MaxSal\n-------------\
  \ ---------- ---------- ------- ------- ----------\n           10 Jennifer   Whalen\
  \        4400    4400       4400\n           20 Pat        Fay           6000  \
  \  6000      13000\n           20 Michael    Hartstein     6000   13000      13000\n\
  \           30 Karen      Colmenares    2500    2500      11000\n           30 Guy\
  \        Himuro        2500    2600      11000\n           30 Sigal      Tobias\
  \        2500    2800      11000\n           30 Shelli     Baida         2500  \
  \  2900      11000\n           30 Alexander  Khoo          2500    3100      11000\n\
  \           30 Den        Raphaely      2500   11000      11000\n           40 Susan\
  \      Mavris        6500    6500       6500\n…\n107 rows selected.\n```\n\n###\
  \ 工作原理\n\n`FIRST` 和 `LAST` 分析函数的关键在于，它们允许你根据一组条件进行分组和排序，同时在查询的主体中自由地按不同方式排序，并可选择性地根据其他因素进行或不进行分组。\n\
  \n`OLAP` 窗口通过 `OVER` 子句 `over (partition by department_id) \"MinSal\"` 在每个部门上进行分区。\n\
  \n##### 2-14. 在移动窗口上执行聚合\n\n### 问题\n\n你需要基于相同的数据提供静态和移动的摘要或聚合。例如，在销售报告的一部分中，你需要提供销售订单金额的月度汇总，以及用于比较的三个月的移动平均销售额。\n\
  \n### 解决方案\n\nOracle 作为其分析函数集的一部分，提供了移动或滚动窗口函数。这使你能够引用结果集中的任意数量的前置行、当前行以及任意数量的后置行。我们最初的示例使用当前行和前三行来计算订单金额的滚动平均值。\n\
  \n```sql\nselect to_char(order_date, 'MM') as OrderMonth,\n       sum(order_total)\
  \ as MonthTotal,\n       avg(sum(order_total))\n         over\n           (order\
  \ by to_char(order_date, 'MM') rows between 3 preceding and current row) as RollingQtrAverage\n\
  from   oe.orders\nwhere  order_date between '01-JAN-1999' and '31-DEC-1999'\ngroup\
  \  by to_char(order_date, 'MM')\norder  by 1;\n```\n\n我们在结果中看到了月份、相关合计以及计算出的三个月滚动平均值。\n\
  \n```\nOR MONTHTOTAL ROLLINGQTRAVERAGE\n-- ---------- -----------------\n02    \
  \  120281.6         120281.6\n03      200024.1         160152.85\n04        1636\
  \         107313.9\n05      165838.2         121944.975\n06      350019.9      \
  \   179379.55\n07      280857.1         199587.8\n08      152554.3         237317.375\n\
  09      460216.1         310911.85\n10       59123.6         238187.775\n11    \
  \  415875.4         271942.35\n12       338672         318471.775\n11 rows selected.\n\
  ```\n\n你可能注意到一月（`OrderMonth` 01）缺失了。这不是此方法的特性，而是因为 `OE.ORDERS` 表在 1999 年没有记录该月的订单。\n\
  \n### 工作原理\n\n我们的滚动平均值 `SELECT` 语句首先选择了一些直接的数值。使用带有 `MM` 格式字符串的 `TO_CHAR()` 函数从\
  \ `ORDER_DATE` 字段中提取月份数字。我们选择月份数字而非名称，是为了让输出按预期的顺序排序。\n\n接下来是对 `ORDER_TOTAL` 字段使用传统的\
  \ `SUM` 函数进行常规聚合。这部分很简单。然后我们引入了 `OLAP AVG` 函数，这是滚动平均值计算的核心。该语句部分如下所示：\n\n```sql\n\
  avg(sum(order_total)) over (order by to_char(order_date, 'MM')\n     rows between\
  \ 3 preceding and current row) as RollingQtrAverage\n```\n\n所有这些文本都是为了生成结果列 `ROLLINGQTRAVERAGE`。分解各部分将说明每一部分如何为解决方案做出贡献。前导函数\
  \ `AVG(SUM(ORDER_TOTAL))` 表明我们将对 `ORDER_TOTAL` 值求和然后取平均。这在某种程度上是正确的，但 Oracle 计算的不是普通的平均值或总和。这些是\
  \ `OLAP AVG` 和 `SUM` 函数，因此它们的范围由 `OVER` 子句管理。\n\n`OVER` 子句首先指示 Oracle 基于格式化后的 `ORDER_DATE`\
  \ 字段的顺序执行计算——这就是 `ORDER BY TO_CHAR(ORDER_DATE, 'MM')` 所实现的——实际上按 02 到 12 的值排序计算（记住，数据库中没有\
  \ 1999 年 1 月的数据）。最后，也是最重要的，`ROWS` 元素告诉 Oracle 应该在其上计算核心 `OLAP` 聚合函数的行窗口大小。在我们的案例中，这意味着应该对多少个月的\
  \ `ORDER_TOTAL` 值进行求和然后平均。我们的示例指示 Oracle 使用从倒数第三行到当前行的结果。这是对三个月滚动平均值的一种解释，尽管从技术上讲，它实际上生成的是四个月的平均值。如果你想要的是真正的三个月平均值——即前两个月加上当前月——你应该将\
  \ `ROWS BETWEEN` 元素改为：\n\n```sql\nrows between 2 preceding and current row\n```\n\
  \n这引出了一个有趣的点。此示例假设你想基于历史数据计算滚动平均值。但一些业务需求要求一个滚动窗口来跟踪基于某个时间点之前**和**之后的数据的趋势。例如，我们可能想使用三个月窗口，但基于前一个月、当前月和后一个月的数据。示例的下一个版本正好展示了窗口函数的这个能力，关键更改已加粗显示。\n\
  \n```sql\nselect to_char(order_date, 'MM') as OrderMonth,\n       sum(order_total)\
  \ as MonthTotal,\n       avg(sum(order_total))\n         over\n           (order\
  \ by to_char(order_date, 'MM')\n            rows between 1 preceding and 1 following)\
  \ as AvgTrend\nfrom   oe.orders\nwhere  order_date between '01-JAN-1999' and '31-DEC-1999'\n\
  group  by to_char(order_date, 'MM')\norder  by 1\n/\n```\n\n我们的输出正如预期那样发生了变化，因为月度的\
  \ `ORDER_TOTAL` 值现在为了计算而被以不同的方式分组。\n\n```\nOR MONTHTOTAL  AVGTREND\n-- ----------\
  \ ----------\n02      120281.6 160152.85\n03      200024.1 107313.9\n04        1636\
  \  122499.433\n05      165838.2 172498.033\n06      350019.9 265571.733\n07    \
  \  280857.1 261143.767\n08      152554.3 297875.833\n09      460216.1 223964.667\n\
  10       59123.6 311738.367\n11      415875.4 271223.667\n12       338672  377273.7\n\
  11 rows selected.\n```\n\n\n##### 2-15. 基于列子集删除重复行\n\n### 问题\n\n需要根据表中仅在部分列上存在的重复值，对数据进行清洗。\n\
  \n### 解决方案\n\n历史上，针对此问题有使用 `ROWNUM` 特性的 Oracle 专有解决方案。然而，如果你有多个重复组并且希望一次操作中删除多余数据，这种方法可能会变得笨拙和复杂。作为替代方案，你可以使用\
  \ Oracle 的 `ROW_NUMBER` OLAP 函数结合 `DELETE` 语句，以高效地在一次操作中删除所有重复项。\n\n为了演示我们的方法，我们将首先引入几名新员工，他们的\
  \ `FIRST_NAME` 和 `LAST_NAME` 与一些现有员工相同。这些 `INSERT` 语句创建了有问题的重复数据。\n\n```sql\ninsert\
  \ into hr.employees\n(employee_id, first_name, last_name, email, phone_number, hire_date,\
  \ job_id, salary, commission_pct, manager_id, department_id)\nValues\n(210, 'Janette',\
  \ 'King', 'JKING2', '650.555.8880', '25-MAR-2009', 'SA_REP', 3500, 0.25, 145, 80);\n\
  \nInsert into hr.employees\n(employee_id, first_name, last_name, email, phone_number,\
  \ hire_date, job_id, salary, commission_pct, manager_id, department_id)\nValues\n\
  (211, 'Patrick', 'Sully', 'PSULLY2', '650.555.8881', '25-MAR-2009', 'SA_REP', 3500,\
  \ 0.25, 145, 80);\n\nInsert into hr.employees\n(employee_id, first_name, last_name,\
  \ email, phone_number, hire_date, job_id, salary, commission_pct, manager_id, department_id)\n\
  Values\n(212, 'Allen', 'McEwen', 'AMCEWEN2', '650.555.8882', '25-MAR-2009', 'SA_REP',\
  \ 3500, 0.25, 145, 80);\n\ncommit;\n```\n\n为了证明我们确实存在重复项，一个快速的 `SELECT` 查询显示了有问题的行。\n\
  \n```sql\nselect employee_id, first_name, last_name\nfrom hr.employees\nwhere first_name\
  \ in ('Janette','Patrick','Allan')\n  and last_name in ('King','Sully','McEwen')\n\
  order by first_name, last_name;\n```\n\n```\nEMPLOYEE_ID FIRST_NAME LAST_NAME\n\
  ----------- ----------- ----------\n        158 Allan      McEwen\n        212 Allan\
  \      McEwen\n        210 Janette    King\n        156 Janette    King\n      \
  \  211 Patrick    Sully\n        157 Patrick    Sully\n```\n\n如果你在人力资源部门工作，或者你就是这些人中的一员，你可能会担心不可预测的后果，并希望看到重复项被移除。现在问题数据已经存在，我们可以引入\
  \ SQL 来删除“多余”的 Janette King、Patrick Sully 和 Allen McEwen。\n\n```sql\ndelete from\
  \ hr.employees\nwhere rowid in\n  (select rowid\n    from\n      (select first_name,\
  \ last_name, rowid,\n              row_number() over\n                (partition\
  \ by first_name, last_name order by employee_id)\n                staff_row\n  \
  \      from hr.employees)\n    where staff_row > 1);\n```\n\n运行后，这段代码确实声称删除了三行，大概就是我们的重复项。为了验证，我们可以重复之前的快速查询，查看哪些行匹配这三个名字。我们看到如下结果集。\n\
  \n```\nEMPLOYEE_ID FIRST_NAME LAST_NAME\n----------- ----------- -------------------------\n\
  \        158 Allan      McEwen\n        156 Janette    King\n        157 Patrick\
  \    Sully\n```\n\n我们的 `DELETE` 操作成功了，它仅基于部分列子集找到了重复项。\n\n### 工作原理\n\n我们的方法同时使用了\
  \ `ROW_NUMBER` OLAP 函数和 Oracle 内部的 `ROWID` 值（用于唯一标识表中的行）。查询以你预想中的 `DELETE` 语法开始。\n\
  \n```sql\ndelete from hr.employees\nwhere rowid in\n  (… 嵌套子查询在这里 …)\n```\n\n\n\
  正如您所料，我们要求 Oracle 删除`HR.EMPLOYEES`表中那些`ROWID`值与我们检测到的重复项匹配的行，检测标准基于对部分列的评估。在我们的案例中，我们使用子查询根据`FIRST_NAME`和`LAST_NAME`来精确识别重复项。\n\
  \n要理解嵌套子查询的工作原理，最简单的方法是从最内层的子查询开始，它看起来像这样。\n\n```sql\nselect first_name, last_name,\
  \ rowid,\nrow_number() over\n(partition by first_name, last_name order by employee_id)\n\
  staff_row\nfrom hr.employees\n```\n\n我们有意将`FIRST_NAME`和`LAST_NAME`列添加到这个最内层的子查询中，以便在梳理其逻辑时使这个方案更易于理解。严格来说，这些列对于逻辑来说是多余的，最内层的子查询完全可以不包含它们而达到相同效果。如果我们只执行这个最内层的查询（为清晰起见选择了额外的列），我们会看到以下结果。\n\
  \n```\nFIRST_NAME    LAST_NAME       ROWID              STAFF_ROW\n----------- \
  \  ------------    ------------------ ----------\n...\nAlexander     Khoo      \
  \      AAARAgAAFAAAABYAAP          1\nJanette       King            AAARAgAAFAAAABXAAD\
  \          1\nJanette       King            AAARAgAAFAAAABYAA4          2\nSteven\
  \        King            AAARAgAAFAAAABYAAA          1\n...\nSamuel        McCain\
  \          AAARAgAAFAAAABYABe          1\nAllan         McEwen          AAARAgAAFAAAABXAAF\
  \          1\nAllan         McEwen          AAARAgAAFAAAABYAA6          2\nIrene\
  \         Mikkilineni     AAARAgAAFAAAABYAAa          1\n...\n...\nMartha      \
  \  Sullivan        AAARAgAAFAAAABYABS          1\nPatrick       Sully          \
  \ AAARAgAAFAAAABXAAE          1\nPatrick       Sully           AAARAgAAFAAAABYAA5\
  \          2\nJonathon      Taylor          AAARAgAAFAAAABYABM          1\n...\n\
  ```\n\n`110 rows selected.`\n\n`HR.EMPLOYEES`表中的全部 110 名员工的`FIRST_NAME`、`LAST_NAME`和`ROWID`都被返回。`ROW_NUMBER()`函数随后根据`PARTITION\
  \ BY`指令，在由`FIRST_NAME`和`LAST_NAME`驱动的集合上进行计算。这意味着，对于每一个唯一的`FIRST_NAME`和`LAST_NAME`组合，`ROW_NUMBER`都会开始一个行计数，我们将其别名为`STAFF_ROW`。当观察到一个新的`FIRST_NAME`和`LAST_NAME`组合时，`STAFF_ROW`计数器会重置为\
  \ 1。\n\n这样，第一个 Janette King 的`STAFF_ROW`值为 1，第二个 Janette King 条目的`STAFF_ROW`值为 2，如果有第三个和第四个这样的重复名字，它们将分别具有\
  \ 3 和 4 的`STAFF_ROW`值。在为同名的员工编号后，我们进入下一个外层的子查询，它查询上面的结果。\n\n```sql\nselect rowid\n\
  from\n(select rowid,\nrow_number() over\n(partition by first_name, last_name order\
  \ by first_name, last_name)\nstaff_row\nfrom hr.employees)\nwhere staff_row > 1\n\
  ```\n\n这个外层查询看起来很简单，因为它确实很简单！我们只是从内层查询的结果中`SELECT`出那些计算出的`STAFF_ROW`值大于 1 的`ROWID`值。这意味着我们只选择第二个\
  \ Janette King、Allan McEwen 和 Patrick Sully 的`ROWID`值，就像这样。\n\n```\nROWID\nAAARAgAAFAAAABYAA4\n\
  AAARAgAAFAAAABYAA6\nAAARAgAAFAAAABYAA5\n```\n\n有了这些`ROWID`值，`DELETE`语句就能准确知道哪些行是重复的，而这仅仅基于对`FIRST_NAME`和`LAST_NAME`的比较和计数。\n\
  \n这个方案的精妙之处在于，其基本结构可以很容易地转换为基于任意此类列子集的重复项来删除数据。格式保持不变，只需要更改表名和几个列名。可以将其视为适用于所有此类情况的伪\
  \ SQL 模板。\n\n```sql\ndelete from <your_table_here>\nwhere rowid in\n(select rowid\n\
  from\n(select rowid,\nrow_number() over\n(partition by <first_duplicate_column>,\
  \ <second_duplicate_column>, <etc.> order by <desired ordering column> )\nduplicate_row_count\n\
  from <your_table_here> )\nwhere duplicate_row_count > 1)\n/\n```\n\n只需将占位符`<your_table_here>`替换为你的表名，并将用于确定重复项的列替换到相应的列占位符中，就大功告成了！\n\
  \n### 2-16\\. 查找表中的序列缺口\n\n**问题**\n\n您想查找数据中数字序列或日期时间序列的所有缺口。这些缺口可能出现在记录某个操作发生的日期中，或者其他具有逻辑连续性的数据中。\n\
  \n**解决方案**\n\nOracle 的`LAG`和`LEAD` OLAP 函数允许您将当前结果行与前一行或后一行进行比较。\n\n`LAG`的通用格式如下：\n\
  \n`LAG(列或表达式, 前置行偏移量, 第一行的默认值)`\n\n`列或表达式`是要与滞后（前置）值进行比较的值。`前置行偏移量`表示`LAG`应该针对当前行之前的第几行。我们在下面的代码中使用'1'来表示当前行的前一行。`第一行的默认值`指定了作为第一行的前导值，因为表中没有第\
  \ 0 行。我们指示 Oracle 使用 0 作为锚点默认值，以处理我们查找一个月第一天之前日期的情况。\n\n`WITH`查询别名方法几乎可以在所有使用子查询的情况下使用，将子查询细节提前到主查询之前。这有助于提高可读性，并方便日后需要时进行代码重构。\n\
  \n这个方案用于查找 1999 年 11 月订单序列中的日期缺口：\n\n```sql\nwith salesdays as\n(select extract(day\
  \ from order_date) next_sale,\nlag(extract(day from order_date),1,0)\nover (order\
  \ by extract(day from order_date)) prev_sale\nfrom oe.orders\nwhere order_date between\
  \ '01-NOV-1999' and '30-NOV-1999')\nselect prev_sale, next_sale\nfrom salesdays\n\
  where next_sale - prev_sale > 1\norder by prev_sale;\n```\n\n我们的查询揭示了 1999 年 11\
  \ 月订单之间的日期缺口。\n\n```\nPREV_SALE   NEXT_SALE\n----------  ----------\n1         \
  \ 10\n10          14\n15          19\n20          22\n```\n\n结果显示，在月初第一天记录了一个订单后，直到\
  \ 10 号才有后续订单。然后出现了为期四天的缺口直到 14 号，依此类推。精明的销售经理很可能会利用这些数据来询问销售团队在这些缺口日做了什么，以及为什么没有订单进来！\n\
  \n**工作原理**\n\n查询首先使用`WITH`子句以一种\"先别名后引用\"的方式为一个子查询命名。然后，这个子查询通过一个别名（本例中为`SALESDAYS`）被引用。\n\
  \n`SALESDAYS`子查询计算两个字段。首先，它使用`EXTRACT`函数从`ORDER_DATE`日期字段中返回数字形式的日值，并将此数据标记为`NEXT_SALE`。然后，`lag`\
  \ OLAP 函数用于计算结果中前一行`ORDER_DATE`在当月的日期数字（同样使用`EXTRACT`方法），这成为`PREV_SALE`结果值。当您将子查询\
  \ select 语句的输出可视化时，这一点会更清楚：\n\n```sql\nselect extract(day from order_date) next_sale,\n\
  lag(extract(day from order_date),1,0)\nover (order by extract(day from order_date))\
  \ prev_sale\nfrom oe.orders\nwhere order_date between '01-NOV-1999' and '30-NOV-1999'\n\
  ```\n\n如果独立执行，结果将如下所示。\n\n```\nNEXT_SALE   PREV_SALE\n----------  ----------\n1\
  \           0\n10          1\n10          10\n10          10\n14          10\n14\
  \          14\n15          14\n19          15\n…\n```\n\n从滞后中的锚点值 0 开始，我们看到一笔销售的当月日期作为`NEXT_SALE`，而上一笔销售的日期作为`PREV_SALE`。您可能已经能直观地发现缺口，但让\
  \ Oracle 为您完成这项工作要容易得多。这就是我们外层查询执行其非常简单的算术运算的地方。\n\n驱动`SALESDAYS`子查询的查询基于以下条件从结果中选择`PREV_SALE`和`NEXT_SALE`值：\n\
  \n```sql\nwhere next_sale - prev_sale > 1\n```\n\n\n\n我们知道，如果销售额之间的间隔超过一天，那么这些销售日就不是连续的。最后，我们通过按`PREV_SALE`列对结果进行排序来结束，这样我们就能得到一个从月初到月末的自然顺序。\n\
  \n我们的查询也可以按照传统方式编写，将子查询放在`FROM`子句中，如下所示。\n\n```sql\nselect prev_sale, next_sale\n\
  from (select extract(day from order_date) next_sale,\n      lag(extract(day from\
  \ order_date),1,0)\n      over (order by extract(day from order_date)) prev_sale\n\
  \      from oe.orders\n      where order_date between '01-NOV-1999' and '30-NOV-1999')\n\
  where next_sale - prev_sale > 1\norder by prev_sale\n/\n```\n\n所采取的方法主要是一个风格和可读性的问题。在那些能极大提高\
  \ SQL 语句可读性的情况下，我们更倾向于使用`WITH`方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n`第三章`\n\n■ ■ ■\n\n`多表查询`\n\
  \n从 Oracle 表中查询数据可能是作为开发人员或数据分析师，甚至可能是作为 DBA（尽管对于 ETL（提取、转换和加载）工具专家来说可能不是）将执行的最常见任务。通常，您可能只查询一个表的一小部分行，但迟早您必须将多个表连接在一起。这就是关系数据库的魅力所在，因为访问数据的路径不是固定的：您可以连接具有公共列的表，甚至可以连接没有公共列的表（但您需要自担风险！）。\n\
  \n在本章中，我们将介绍连接两个或更多表并根据所需行在两个表中是否存在（等值连接）、可能仅存在于一个表或另一个表中的行（左外连接或右外连接）或连接两个表并包括两个表中的所有行并在可能时匹配（全外连接）来检索结果的解决方案。\n\
  \n但是等等，还有更多！Oracle（以及 SQL 语言标准）包含许多构造，帮助您根据另一个表中具有与查询中选定行相同列值的相同行的存在，从表中检索行。这些构造包括`INTERSECT`、`UNION`、`UNION\
  \ ALL`和`MINUS`操作符。在某些情况下，使用这些操作符的查询结果可以通过标准的表连接语法获得，但如果您处理的列不止几个，查询就会变得笨拙、难以阅读和维护。\n\
  \n您可能还需要根据另一个表中的匹配或不匹配值来更新一个表中的行，因此我们还将提供一些关于使用`IN`/`EXISTS` SQL 构造进行关联查询和关联更新的方法。\n\
  \n当然，关于表操作的讨论如果不深入查询世界的“野孩子”——笛卡尔连接，就不算完整。有些情况下，您希望在没有连接条件的情况下连接两个或多个表，我们将为您提供针对该场景的解决方案。\n\
  \n本章中的大多数示例都基于在安装 Oracle 数据库时指定“Include Sample Schemas”时创建的`EXAMPLE`表空间中的模式。要理解本章中的解决方案，不需要这些示例模式，但它们为您提供了在预填充的表集上试用解决方案的机会，甚至可以进一步深入研究表连接的复杂性。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n`第三章 ■ 多表查询`\n\n##### 3-1.\
  \ 连接两个或多个表中的对应行\n\n**问题**\n\n您希望返回两个或多个表中具有一个或多个公共列的行。例如，您可能希望根据公共列（但不是所有公共列）连接`EMPLOYEES`和`DEPARTMENTS`表，并返回员工及其部门名称的列表。\n\
  \n**解决方案**\n\n如果您使用的是 Oracle 数据库 9*i*或更高版本，可以使用带`USING`子句的 ANSI SQL 99 连接语法。例如，Oracle\
  \ 示例模式中的`EMPLOYEES`和`DEPARTMENTS`表具有公共的`DEPARTMENT_ID`列，因此查询如下所示：\n\n```sql\nselect\
  \ employee_id, last_name, first_name, department_id, department_name\nfrom employees\n\
  join departments using(department_id)\n;\n```\n\n```\nEMPLOYEE_ID LAST_NAME    \
  \             FIRST_NAME           DEPARTMENT_ID DEPARTMENT_NAME\n------------ -------------------------\
  \ -------------------- ------------------ --------------------\n         200 Whalen\
  \                    Jennifer                       10 Administration\n        \
  \ 201 Hartstein                 Michael                        20 Marketing\n  \
  \       202 Fay                       Pat                            20 Marketing\n\
  \         114 Raphaely                  Den                            30 Purchasing\n\
  \         115 Khoo                      Alexander                      30 Purchasing\n\
  . . .\n         113 Popp                      Luis                          100\
  \ Finance\n         205 Higgins                   Shelley                      \
  \ 110 Accounting\n         206 Gietz                     William               \
