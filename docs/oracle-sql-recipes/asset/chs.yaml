- "# 第三章：多表查询\n\n##### 3-2. 垂直堆叠查询结果\n\n### 问题\n你希望将两个 `SELECT` 语句的结果合并为一个结果集。\n\n\
  ### 解决方案\n使用 `UNION` 操作符。`UNION` 将两个或多个查询的结果合并，并会去除整个结果集中的重复行。在 Oracle 的神话公司中，`EMPLOYEES_ACT`\
  \ 表中的员工需要与最近一次公司收购而来的员工合并。新近收购公司的员工表 `EMPLOYEES_NEW` 与现有的 `EMPLOYEES_ACT` 表格式完全相同，因此使用\
  \ `UNION` 将两个表合并为一个结果集应该很容易，如下所示：\n\n```sql\nselect employee_id, first_name, last_name\
  \ from employees_act;\n```\n\n```\nEMPLOYEE_ID FIRST_NAME LAST_NAME\n----------------------\
  \ -------------------- -------------------------\n102 Lex De Haan\n105 David Austin\n\
  112 Jose Manuel Urman\n118 Guy Himuro\n119 Karen Colmenares\n205 Shelley Higgins\n\
  6 rows selected\n```\n\n```sql\nselect employee_id, first_name, last_name from employees_new;\n\
  ```\n\n```\nEMPLOYEE_ID FIRST_NAME LAST_NAME\n---------------------- --------------------\
  \ -------------------------\n101 Neena Kochhar\n105 David Austin\n112 Jose Manuel\
  \ Urman\n171 William Smith\n201 Michael Hartstein\n5 rows selected\n```\n\n```sql\n\
  select employee_id, first_name, last_name from employees_act\nunion\nselect employee_id,\
  \ first_name, last_name from employees_new\norder by employee_id;\n```\n\n```\n\
  EMPLOYEE_ID FIRST_NAME LAST_NAME\n---------------------- -------------------- -------------------------\n\
  101 Neena Kochhar\n102 Lex De Haan\n105 David Austin\n112 Jose Manuel Urman\n118\
  \ Guy Himuro\n119 Karen Colmenares\n171 William Smith\n201 Michael Hartstein\n205\
  \ Shelley Higgins\n9 rows selected\n```\n\n使用 `UNION` 会删除重复的行。你可以在查询末尾使用一个 `ORDER\
  \ BY` 来对结果排序。在这个例子中，两张员工表有两行数据是相同的（有些人需要打两三份工才能维持生计！），因此 `UNION` 查询返回九行，而不是十一行。\n\
  \n### 工作原理\n请注意，为了让 `UNION` 操作符去除重复行，给定行中的所有列必须与一个或多个其他行中的相同列相等。当 Oracle 处理 `UNION`\
  \ 时，它必须执行排序/合并操作以确定哪些行是重复的。因此，你的执行时间可能会比单独运行每个 `SELECT` 语句要长。如果你知道每个 `SELECT` 语句内部及语句之间都没有重复项，你可以使用\
  \ `UNION ALL` 来合并结果，而无需检查重复项。\n\n如果存在重复项，不会导致错误；你只是会在结果集中得到重复的行。\n\n##### 3-3. 编写可选连接\n\
  \n### 问题\n你正在通过一个或多个公共列连接两个表，但你希望确保返回第一个表中的所有行，无论第二个表中是否有匹配行。例如，你正在连接员工表和部门表，但有些员工没有分配部门。\n\
  \n### 解决方案\n使用外连接。在 Oracle 的示例数据库中，`HR` 用户维护着 `EMPLOYEES` 和 `DEPARTMENTS` 表；为员工分配部门是可选的。`EMPLOYEES`\
  \ 表中有 107 名员工。然而，在 `EMPLOYEES` 和 `DEPARTMENTS` 之间使用标准连接只返回 106 行，因为有一名员工没有被分配部门。为了返回\
  \ `EMPLOYEES` 表中的所有行，你可以使用 `LEFT OUTER JOIN`，它会包含 `EMPLOYEES` 表中的所有行以及 `DEPARTMENTS`\
  \ 表中的匹配行（如果有的话）：\n\n```sql\nselect employee_id, last_name, first_name, department_id,\
  \ department_name\nfrom employees\nleft outer join departments using(department_id);\n\
  ```\n\n```\nEMPLOYEE_ID LAST_NAME FIRST_NAME DEPARTMENT_ID DEPARTMENT_NAME\n------------\
  \ --------------- --------------- ----------------- -------------------\n200 Whalen\
  \ Jennifer 10 Administration\n202 Fay Pat 20 Marketing\n201 Hartstein Michael 20\
  \ Marketing\n119 Colmenares Karen 30 Purchasing\n. . .\n206 Gietz William 110 Accounting\n\
  205 Higgins Shelley 110 Accounting\n178 Grant Kimberely\n107 rows selected\n```\n\
  \n现在结果集中有 107 行，而不是 106 行；`Kimberely Grant` 被包含在内，即使她目前没有被分配部门。\n\n### 工作原理\n当使用\
  \ `LEFT OUTER JOIN` 连接两个表时，如你所料，查询会返回 `LEFT OUTER JOIN` 子句左侧表中的所有行。`LEFT OUTER JOIN`\
  \ 子句右侧表中的行会在可能时进行匹配。如果没有匹配，右侧表中的列在结果中将包含 `NULL` 值。\n\n如你所料，也有一个 `RIGHT OUTER JOIN`（在两种情况下，`OUTER`\
  \ 关键字都是可选的）。你可以将解决方案重写如下：\n\n```sql\nselect employee_id, last_name, first_name,\
  \ department_id, department_name\nfrom departments\nright outer join employees using(department_id);\n\
  ```\n\n结果是相同的，使用哪种格式取决于可读性和风格。\n\n该查询也可以使用 `ON` 子句来编写，就像等值连接（内连接）一样。对于 Oracle 9*i*\
  \ 之前的版本，你必须使用 Oracle 有点晦涩且专有的外连接语法，在缺少行的那一侧加上 `(+)` 字符，如下例所示：\n\n```sql\nselect\
  \ employee_id, last_name, first_name, e.department_id, department_name\nfrom employees\
  \ e, departments d\nwhere e.department_id = d.department_id (+);\n```\n\n不用说，如果你可以使用\
  \ ANSI SQL-99 语法，为了清晰和易于维护，请务必使用它。\n\n##### 3-4. 使连接在两个方向上都成为可选\n\n### 问题\n你查询中的所有表都至少有几行与其他表中的行不匹配，但你仍然希望返回所有表中的所有行，并在结果中显示不匹配项。例如，你想通过包含来自两张表的不匹配项来减少报告数量，而不是为每种情况都制作一份报告。\n\
  \n### 解决方案\n\n\n\n使用 `FULL OUTER JOIN`。正如您所预料的那样，两个或多个表之间的全外连接将返回查询中每个表的所有行，并在可能的情况下进行匹配。您可以对\
  \ `EMPLOYEES` 和 `DEPARTMENTS` 表使用 `FULL OUTER JOIN`，如下所示：\n\n## 第 3 章 ■ 从多表查询\n\n\
  ```sql\nselect employee_id, last_name, first_name, department_id, department_name\n\
  from employees\nfull outer join departments\nusing(department_id)\n;\n```\n\n```\n\
  EMPLOYEE_ID LAST_NAME FIRST_NAME DEPARTMENT_ID DEPARTMENT_NAME\n------------ -----------------\
  \ ------------- ---------------- --------------------\n100 King Steven 90 Executive\n\
  101 Kochhar Neena 90 Executive\n102 De Haan Lex 90 Executive\n. . .\n177 Livingston\
  \ Jack 80 Sales\n178 Grant Kimberely\n179 Johnson Charles 80 Sales\n. . .\n206 Gietz\
  \ William 110 Accounting\n180 Construction\n190 Contracting\n230 IT Helpdesk\n123\
  \ rows selected\n```\n\n`注意`：在使用 `FULL`、`LEFT` 或 `RIGHT` 连接时，`OUTER` 关键字是可选的。它确实能为您的查询增加文档价值，清楚地表明来自一个或两个表的不匹配行将包含在结果中。\n\
  \n使用 `FULL OUTER JOIN` 是快速查看两个表之间不匹配情况的好方法。在上面的输出中，您可以看到一个没有部门的员工，以及几个没有员工的部门。\n\
  \n### 工作原理\n\n在 Oracle9i 之前，实现全外连接有点不雅观：您必须使用 Oracle 专有语法，对两个外连接（左外连接和右外连接）执行 `UNION`，如下所示：\n\
  \n```sql\nselect employee_id, last_name, first_name, e.department_id, department_name\n\
  from employees e, departments d\nwhere e.department_id = d.department_id (+)\nunion\n\
  select employee_id, last_name, first_name, e.department_id, department_name\nfrom\
  \ employees e, departments d\nwhere e.department_id (+) = d.department_id\n;\n```\n\
  \n运行两个独立的查询，然后去重，比使用 `FULL OUTER JOIN` 语法执行时间更长，因为后者只需要对每个表进行一次扫描。\n\n您可以调整 `FULL\
  \ OUTER JOIN` 以仅生成不匹配的记录，如下所示：\n\n```sql\nselect employee_id, last_name, first_name,\
  \ department_id, department_name\nfrom employees\nfull outer join departments\n\
  using(department_id)\nwhere employee_id is null or department_name is null\n;\n\
  ```\n\n##### 3-5. 根据其他表中的数据删除行\n\n### 问题\n\n您想从一个表中删除行，前提是这些行在第二个表中存在对应行。例如，您想从\
  \ `EMPLOYEES_RETIRED` 表中删除任何在 `EMPLOYEES` 表中存在的员工对应的行。\n\n### 解决方案\n\n使用带有子查询的 `IN`\
  \ 或 `EXISTS` 子句。您有一个名为 `EMPLOYEES_RETIRED` 的表，它应该只包含——您猜对了——退休员工。然而，`EMPLOYEES_RETIRED`\
  \ 表错误地包含了一些在职员工，因此您想从 `EMPLOYEES_RETIRED` 表中移除这些在职员工。您可以这样做：\n\n```sql\ndelete from\
  \ employees_retired\nwhere employee_id\nin (select employee_id from employees)\n\
  ;\n```\n\n### 工作原理\n\n当使用 `SELECT` 时，您可以相对奢侈地使用连接条件来返回结果。但在删除行时，除非连接条件在子查询中，或者您使用内联视图，否则无法执行显式连接，如下所示：\n\
  \n```sql\ndelete (\n  select employee_id\n  from employees_retired join employees\
  \ using(employee_id)\n);\n```\n\nSQL 标准将视图视为与表类似，不仅可以对视图运行 `SELECT` 语句，还可以在特定情况下进行\
  \ `INSERT`、`UPDATE` 和 `DELETE`。如果满足这些情况（例如，您有一个键保留表，没有聚合等），`DELETE` 将只删除 `FROM`\
  \ 子句中的第一个表。请注意：如果您的 `DELETE` 语句如下所示，您将无法得到预期的结果：\n\n```sql\ndelete (\n  select employee_id\n\
  \  from employees join employees_retired using(employee_id)\n);\n```\n\n\n\n相应的行将从\
  \ `EMPLOYEES` 表中删除，而这并非期望的结果！\n\n解决此问题的另一种潜在方法是使用 `EXISTS` 子句来确定要删除的行：\n```sql\n\
  delete from employees_retired er\nwhere exists (\n    select 1 from employees e\n\
  \    where er.employee_id = e.employee_id\n);\n```\n这种方法不如第一种解决方案优雅，但可能效率更高。它看起来有些刻意为之，事实也的确如此，因为\
  \ Oracle 在任何地方都不会使用该查询的结果。它仅使用子查询来验证是否存在匹配项，然后删除相应的行。你可以使用 “1”、“X” 甚至 `NULL`；在内部，Oracle\
  \ 会将结果转换为零并且不使用它。\n\n你使用 `IN` 还是 `EXISTS` 取决于驱动表（在 `SELECT`、`UPDATE` 或 `DELETE`\
  \ 中引用的外部表）的大小以及子查询结果集的大小。如果子查询的结果集很小或是一个常量列表，那么使用 `IN` 很可能更好。然而，使用 `EXISTS` 可能运行效率更高，因为隐式的\
  \ `JOIN` 可以利用索引。归根结底，这要视情况而定。查看每种方法（`IN` 与 `EXISTS`）的执行计划，如果每次运行查询时相关的行数保持稳定，那么你可以使用速度更快的那个方法。\n\
  \n##### 3-6. 跨表查找匹配数据\n\n### 问题\n你想要在两个或多个表或查询之间找出共有的行。\n\n### 解决方案\n使用 `INTERSECT`\
  \ 操作符。当你使用 `INTERSECT` 时，结果行集仅包含两个表或查询共有的行：\n```sql\nselect count(*) from employees_act;\n\
  COUNT(*)\nselect count(*) from employees_new;\nCOUNT(*)\nselect * from employees_act\n\
  intersect\nselect * from employees_new;\nEMPLOYEE_ID FIRST_NAME LAST_NAME\n----------------------\
  \ -------------------- -------------------------\n105        David      Austin\n\
  112        Jose Manuel Urman\n2 rows selected\n```\n\n### 工作原理\n`INTERSECT` 操作符与\
  \ `UNION`、`UNION ALL` 和 `MINUS` 一起，用于连接两个或多个查询。截至 Oracle Database 11g，这些操作符具有相同的优先级，除非你用括号覆盖它们，否则它们按从左到右的顺序求值。或者更直观地说，因为你通常不会在一行中写两个查询，所以是按从上到下的顺序求值！\n\
  \n**提示** 未来的 ANSI SQL 标准赋予 `INTERSECT` 操作符比其他操作符更高的优先级。因此，为了让你的 SQL 代码“万无一失”，在将\
  \ `INTERSECT` 与其他集合操作符一起使用的地方，请使用括号显式指定求值顺序。\n\n为了更好地理解 `INTERSECT` 的工作原理，图 3-1\
  \ 展示了在两个查询上执行 `INTERSECT` 操作的韦恩图表示。\n\n**图 3-1.** Oracle `INTERSECT` 操作\n\n最后，要使\
  \ `INTERSECT` 操作返回预期的结果，`INTERSECT` 操作中每个查询的对应列的数据类型应属于同一类别：数字、字符或日期/时间。例如，一个 `NUMBER`\
  \ 列和一个 `BINARY_DOUBLE` 列，如果 `NUMBER` 列值转换为 `BINARY_DOUBLE` 后产生相同的结果，则可以正确比较。因此，包含值\
  \ 250 的 `NUMBER(3)` 列将与值为 `2.5E2` 的 `BINARY_DOUBLE` 完全匹配。\n\n使用集合操作符是少数几种情况之一，即一列中的\
  \ `NULL` 值被认为等于另一列中包含的 `NULL`。因此，运行此查询会返回一行：\n```sql\nselect 'X' C1, NULL C2 from\
  \ DUAL\nintersect\nselect 'X' C1, NULL C2 from DUAL;\n```\n\n##### 3-7. 基于聚合值进行连接\n\
  \n### 问题\n你想要将单个行中的值与从同一表计算出的聚合值进行比较；你还想要过滤用于聚合的行。例如：你想要找出所有薪资比公司平均薪资低 20% 的员工，但执行部门的员工除外。\n\
  \n### 解决方案\n\n\n\n## 第 3 章 ■ 从多表查询\n\n使用带有聚合函数的子查询，并将员工工资与聚合结果中检索到的平均工资进行比较。例如，此查询使用子查询计算部门\
  \ 90 以外员工的平均工资，并将每位员工的工资与该子查询结果的 80%进行比较：\n\n```sql\nselect employee_id, last_name,\
  \ first_name, salary\nfrom employees\nwhere salary < 0.8 * (\n    select avg(salary)\n\
  \    from employees\n    where department_id != 90\n);\n```\n\nEMPLOYEE_ID LAST_NAME\
  \ FIRST_NAME SALARY\n----------------- ------------------- --------------------\
  \ ----------------\n105 Austin David 4800\n106 Pataballa Valli 4800\n107 Lorentz\
  \ Diana 4200\n115 Khoo Alexander 3100\n. . .\n198 OConnell Donald 2600\n199 Grant\
  \ Douglas 2600\n200 Whalen Jennifer 4400\n49 rows selected\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 工作原理\n\n上述解决方案在子查询中返回一行。Oracle 优化器计算一次平均工资，乘以`0.8`，然后将其与`EMPLOYEE`表中除部门`90`（高管组）以外的所有其他员工的工资进行比较。\n\
  \n如果你的子查询返回多行，主查询将返回错误，因为你使用的是`<`运算符；像`<`、`>`、`=`、`>=`、`<=`和`!=`这样的运算符会将列或表达式的值与另一个单一值进行比较。要将主查询中的值与子查询中的一个或多个值列表进行比较，可以在`WHERE`子句中使用`ANY`或`SOM`E\
  \ 运算符（它们是等价的）。例如，如果你想返回工资与高管部门中任何员工匹配的所有员工，可以这样做：\n\n```sql\nselect employee_id,\
  \ last_name, first_name, salary\nfrom employees\nwhere salary = any (\n    select\
  \ salary\n    from employees\n    where department_id = 90\n);\n```\n\n你也可以在使用聚合函数的查询的`HAVING`子句中使用子查询。在这个例子中，你可以检索所有平均工资高于\
  \ IT 部门平均工资的部门及其平均工资：\n\n```sql\nselect department_id, avg(salary) avg_salary\n\
  from employees\ngroup by department_id\nhaving avg(salary) > (\n    select avg(salary)\n\
  \    from employees\n    where department_id = 60\n);\n```\n\n##### 3-8. 查找缺失行\n\
  \n## 问题\n\n你有两个表，必须找出第一个表中存在但第二个表中不存在的行。你想比较每个表中的所有行，而不仅仅是列的子集。\n\n## 解决方案\n\n使用`MINUS`集合运算符。`MINUS`运算符将返回存在于第一个查询但不存在于第二个查询中的所有行。`EMPLOYEES_BONUS`表包含过去获得过奖金的员工，你需要找出`EMPLOYEES`表中尚未获得奖金的员工。使用`MINUS`运算符如下，比较两个表中的三个选定列：\n\
  \n```sql\nselect employee_id, last_name, first_name\nfrom employees\nminus\nselect\
  \ employee_id, last_name, first_name\nfrom employees_bonus;\n```\n\nEMPLOYEE_ID\
  \ LAST_NAME FIRST_NAME\n---------------------- ------------------------- --------------------\n\
  100 King Steven\n109 Faviet Daniel\n110 Chen John\n120 Weiss Matthew\n140 Patel\
  \ Joshua\n5 rows selected\n\n## 工作原理\n\n请注意，与`INTERSECT`和`UNION`运算符不同，`MINUS`集合运算符是不可交换的：操作数（查询）的顺序很重要！改变解决方案中查询的顺序会产生截然不同的结果。\n\
  \n如果你想记录整个行的变化，可以改用此查询：\n\n```sql\nselect * from employees\nminus\nselect * from\
  \ employees_bonus;\n```\n\n维恩图可能有助于展示`MINUS`运算符的工作方式。图 3-2 显示了 Query1 MINUS Query2\
  \ 的结果。Query1 和 Query2 之间重叠的任何行，以及 Query2 中不与 Query1 重叠的任何行，都会从结果集中移除。换句话说，只返回 Query1\
  \ 中的行，但会剔除 Query1 中存在于 Query2 中的行。\n\n***图 3-2.** Oracle MINUS 操作*\n\n![Image 16](img/index-101_1.png)\n\
  \nQuery2 中存在但 Query1 中不存在的行，可以通过反转查询中操作数的顺序来识别：\n\n```sql\nselect * from employees_bonus\n\
  minus\nselect * from employees;\n```\n\n如果 Query2 是 Query1 的真子集会怎样？换句话说，Query2 中的所有行都已经存在于\
  \ Query1 中？查询仍然按预期工作；`MINUS`只会移除 Query1 中与 Query2 共有的行，并且永远不会返回任何不在 Query1 中的 Query2\
  \ 行。图 3-3 展示了 Query2 是 Query1 的真子集时的维恩图。\n\n***图 3-3.** 包含真子集的 Oracle MINUS 操作*\n\
  \n你可能会问，为什么外连接或`IN`/`EXISTS`查询可能解决大多数类似问题。对于具有单一主键的表集合，使用连接可能效率更高。然而，对于返回大量列的查询结果，或者即使主键匹配也要比较整行数据时，`MINUS`是更合适的运算符。\n\
  \n##### 3-9. 查找两个表共有的行中不存在的行\n\n## 问题\n\n你想找出来自两个查询或表的行，而这些行是这两个查询或表所**不**共有的。\n\
  \n分析人员已经为你提供了用于检索所需数据的维恩图和集合表示法，因此你必须使用 Oracle 集合运算符的组合来检索期望的结果。\n\n## 解决方案\n\n\
  在复合查询中结合使用聚合函数和`UNION ALL`运算符，并用括号括起来以确保清晰和正确。例如，你想找出在`EMPLOYEES_ACT`表中但不在`EMPLOYEES_NEW`表中的员工列表，反之亦然。执行以下查询以显示每个表的内容，并使用\
  \ Oracle 集合运算符查找每个表中的唯一行：\n\n```sql\nselect employee_id, first_name, last_name\n\
  from employees_act\norder by employee_id;\n```\n\nEMPLOYEE_ID FIRST_NAME LAST_NAME\n\
  ---------------------- -------------------- -------------------------\n102 Lex De\
  \ Haan\n105 David Austin\n112 Jose Manuel Urman\n118 Guy Himuro\n119 Karen Colmenares\n\
  205 Shelley Higgins\n6 rows selected\n\n```sql\nselect employee_id, first_name,\
  \ last_name\nfrom employees_new\norder by employee_id;\n```\n\nEMPLOYEE_ID FIRST_NAME\
  \ LAST_NAME\n---------------------- -------------------- -------------------------\n\
  101 Neena Kochhar\n105 David Austin\n112 Jose Manuel Urman\n171 William Smith\n\
  201 Michael Hartstein\n5 rows selected\n\n```sql\nselect employee_id, first_name,\
  \ last_name,\n       count(act_emp_src) act_emp_row_count,\n       count(new_emp_src)\
  \ new_emp_row_count\nfrom\n(\n    select ea.*, 1 act_emp_src, to_number(NULL) new_emp_src\n\
  \    from employees_act ea\n    union all\n    select en.*, to_number(NULL) act_emp_src,\
  \ 1 new_emp_src\n    from employees_new en\n)\ngroup by employee_id, first_name,\
  \ last_name\nhaving count(act_emp_src) != count(new_emp_src);\n```\n\n![Image 17](img/index-103_1.png)\n\
  \nEMPLOYEE_ID FIRST_NAME LAST_NAME ACT_EMP_ROW_COUNT NEW_EMP_ROW_COUNT\n-----------\
  \ ----------- --------------- ----------------- -----------------\n101 Neena Kochhar\
  \ 0 1\n205 Shelley Higgins 1 0\n102 Lex De Haan 1 0\n171 William Smith 0 1\n201\
  \ Michael Hartstein 0 1\n118 Guy Himuro 1 0\n119 Karen Colmenares 1 0\n7 rows selected\n\
  \n## 工作原理\n\n要获得正确的结果，你必须首先在子查询中使用`UNION ALL`组合两个结果集，并分配一个“标签”列来指示行来自哪个表——第一个表或第二个表。这里我们使用“1”，但使用“2”或“X”也可以。\n\
  \n\n\n"
- "# 第 3 章 ■ 从多表查询\n\n`GROUP BY`和`HAVING`子句用于挑选出共同的行。如果某给定行在两个表中各出现一次或数次，则该行的计数将相同，从而会被`HAVING`子句中的条件排除。如果计数不同，该行将随其在一个表中出现而另一个表中未出现的次数（反之亦然）一同显示在结果中。由于我们在此查询中包含了主键，因此您在每个表中最多只会看到一个非共同行。\n\
  \n图 3-4 展示了结果集的维恩图。\n\n**图 3-4.** 用于查找组件查询之间唯一行的 Oracle 集合操作\n\n使用标准集合表示法，您所寻找的结果可更简洁地表达为：\n\
  \n`NOT (Query1 INTERSECT Query2)`\n\n虽然 Oracle 语法确实有`NOT`和`INTERSECT`，但 Oracle 集合运算符不支持使用`NOT`。因此，您必须按照解决方案中所示，使用`UNION\
  \ ALL`和`GROUP BY`来编写查询，以提供图 3-4 所标识的结果。即使 Oracle 支持在集合运算符中使用`NOT`，您仍需使用提供的解决方案来确定每个非共同行在每个组件查询中存在多少个。\n\
  \n##### 3-10. 生成测试数据\n\n### 问题\n\n您希望组合两个或多个没有共同列的表，以生成测试数据或作为来自两个或多个表的所有可能值组合的模板。\n\
  \n例如，您正在编写一个嵌入式 Oracle 数据库应用程序，以帮助在下一场 21 点游戏中计牌，并且您希望以最少的努力生成 52 张牌组的模板表。\n\n###\
  \ 解决方案\n\n在四种花色（红桃、梅花、方块和黑桃）的集合与 13 个点数（A、2-10、J、Q、K）之间使用`CROSS JOIN`结构。例如：\n\n\
  ```sql\ncreate table card_deck\n(suit_rank varchar2(5),\n card_count number)\n;\n\
  \ninsert into card_deck\nselect rank || '-' || suit, 0 from\n(select 'A' rank from\
  \ dual\n union all\n select '2' from dual\n union all\n select '3' from dual\n union\
  \ all\n select '4' from dual\n union all\n select '5' from dual\n union all\n select\
  \ '6' from dual\n union all\n select '7' from dual\n union all\n select '8' from\
  \ dual\n union all\n select '9' from dual\n union all\n select '10' from dual\n\
  \ union all\n select 'J' from dual\n union all\n select 'Q' from dual\n union all\n\
  \ select 'K' from dual)\ncross join\n(select 'S' suit from dual\n union all\n select\
  \ 'H' from dual\n union all\n select 'D' from dual\n union all\n select 'C' from\
  \ dual)\n;\n\nselect suit_rank from card_deck;\n\nSUIT_RANK\n---------\nA-S\n2-S\n\
  3-S\n4-S\n5-S\n6-S\n. . .\n10-C\nJ-C\nQ-C\nK-C\n\n52 rows selected\n```\n\n### `DUAL`\
  \ 表\n\n`DUAL` 表在许多情况下都很方便。它在过去 20 年的每个 Oracle 版本中都可用，包含一行一列。当您不需要从任何特定表中检索数据而只想返回一个值时，它非常有用。您也可以使用\
  \ `DUAL` 表通过内置函数执行临时计算，如本例所示：\n\n```sql\nselect sqrt(144) from dual;\n\nSQRT(144)\n\
  ---------\n        12\n```\n\n如果您已经将花色和点数存储在两个现有表中，这条 SQL 语句同样有效。在这种情况下，您会引用这两个表，而不是编写那些涉及对`DUAL`表进行`UNION`操作的长子查询。例如：\n\
  \n```sql\nselect rank || '-' || suit, 0 from\n  card_ranks\ncross join\n  card_suits\n\
  ;\n```\n\n### 工作原理\n\n使用`CROSS JOIN`（也称为笛卡尔积）很少是故意的。如果您没有在两个表之间指定连接条件，则结果中的行数将是每个表中行数的乘积。这通常不是期望的结果！作为一个通用规则，对于包含*n*个表的查询，您需要至少指定*n-1*个连接条件以避免笛卡尔积。\n\
  \n\n\n如果你的纸牌游戏通常会在牌组中使用一到两张王牌，你可以像这样轻松地将它们附加到末尾：\n```sql\nselect rank || '-' ||\
  \ suit, 0 from\n(select 'A' rank from dual\n union all\n select '2' from dual\n\
  \ . . .\n select 'C' from dual)\nunion (select 'J1', 0 from dual)\nunion (select\
  \ 'J2', 0 from dual)\n;\n```\n使用 Oracle9 *i* 之前的语法（Oracle 专有语法），你可以重写原始查询如下：\n```sql\n\
  select rank || '-' || suit, 0 from\ncard_ranks, card_suits\n;\n```\n使用 Oracle 专有语法进行多表连接且没有\
  \ `WHERE` 子句虽然看似奇怪，但它确实能产生你想要的结果！\n\n##### 3-11. 基于其他表中的数据更新行\n\n#### 问题\n你希望根据同一张表或另一张表中的单个值或聚合值，来更新表中的部分或所有行。用于更新查询的值依赖于被更新表中的列值。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第三章 ■ 从多张表中查询\n\n#### 解决方案\n\
  使用关联更新将子查询中的值与 `UPDATE` 子句中的主表链接起来。在下面的示例中，你希望将所有员工的薪资更新为其部门平均薪资的 110%：\n```sql\n\
  update employees e\nset salary = (select avg(salary)*1.10\n              from employees\
  \ se\n              where se.department_id = e.department_id)\n;\n```\n```\n107\
  \ 行已更新\n```\n\n#### 工作原理\n对于 `EMPLOYEES` 表中的每一行，当前薪资都会被更新为该部门平均薪资的 110%。由于该子查询包含聚合但没有\
  \ `GROUP BY`，它将始终返回一行。请注意，此查询展示了 Oracle 的读一致性特性正在生效：Oracle 在更新同一 `UPDATE` 语句中每位员工的薪资时，会保留每位员工的原始薪资值来计算平均值。\n\
  \n关联更新与关联子查询（本章其他地方会讨论）非常相似：你将查询主体部分的一个或多个列与子查询中的相应列链接起来。执行关联更新时，请特别注意更新了多少行；错误地编写子查询常常会用\
  \ `NULL` 或错误值更新表中的大多数值！\n\n事实上，如果某位员工没有被分配部门，提供的解决方案将会失败。在这种情况下，关联子查询将返回 `NULL`，因为\
  \ `NULL` 部门值永远不会匹配任何其他也是 `NULL` 的部门值，因此该员工的 `SALARY` 将被设为 `NULL`。要解决此问题，请在 `WHERE`\
  \ 子句中添加一个过滤器：\n```sql\nupdate employees e\nset salary = (select avg(salary)*1.10\n\
  \              from employees se\n              where se.department_id = e.department_id)\n\
  where department_id is not null\n;\n```\n```\n106 行已更新\n```\n所有没有分配部门的员工将保留其现有薪资。另一种实现相同效果的方法是在\
  \ `SET` 子句中使用 `NVL` 函数来检查 `NULL` 值：\n```sql\nupdate employees e\nset salary = nvl((select\
  \ avg(salary)*1.10\n                  from employees se\n                  where\
  \ se.department_id = e.department_id),salary)\n;\n```\n```\n107 行已更新\n```\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第三章 ■ 从多张表中查询\n从 I/O 角度或重做日志文件使用情况来看，此选项可能不太理想，因为无论行是否有关联部门，所有行都将被更新。\n\n#####\
  \ 3-12. 在连接条件中操作和比较 NULL\n\n#### 问题\n你希望将连接列中的 `NULL` 值映射到一个默认值，该值将与被连接表中的一行匹配，从而避免使用外连接。\n\
  \n#### 解决方案\n使用 `NVL` 函数将要连接到其父表的表的外键列中的 `NULL` 值进行转换。在此示例中，为每个部门安排了节日聚会，但有几位员工没有分配部门。这是其中一位：\n\
  ```sql\nselect employee_id, first_name, last_name, department_id\nfrom employees\n\
  where employee_id = 178\n;\n```\n```\nEMPLOYEE_ID FIRST_NAME              LAST_NAME\
  \                 DEPARTMENT_ID\n------------- --------------- --------------- -----------------\n\
  \        178 Kimberely              Grant\n已选择 1 行\n```\n为确保每位员工都将参加节日聚会，在查询中将 `EMPLOYEES`\
  \ 表中所有为 `NULL` 的部门代码转换为部门 110（会计部），如下所示：\n```sql\nselect employee_id, first_name,\
  \ last_name, d.department_id, department_name\nfrom employees e\njoin departments\
  \ d\non nvl(e.department_id,110) = d.department_id\n;\n```\n```\nEMPLOYEE_ID FIRST_NAME\
  \              LAST_NAME                 DEPARTMENT_ID DEPARTMENT_NAME\n-------------\
  \ --------------- --------------- ----------------- ------------------\n       \
  \ 200 Jennifer                Whalen                              10 Administration\n\
  \        201 Michael                 Hartstein                           20 Marketing\n\
  \        202 Pat                     Fay                                 20 Marketing\n\
  \        114 Den                     Raphaely                            30 Purchasing\n\
  \        115 Alexander               Khoo                                30 Purchasing\n\
  . . .\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第三章 ■ 从多张表中查询\n  \
  \      113 Luis                    Popp                               100 Finance\n\
  \        178 Kimberely              Grant                              110 Accounting\n\
  \        205 Shelley                 Higgins                            110 Accounting\n\
  \        206 William                 Gietz                              110 Accounting\n\
  已选择 107 行\n```\n\n#### 工作原理\n在连接条件中将包含 `NULL` 的列映射到非 `NULL` 值以避免使用 `OUTER JOIN`，可能仍然存在性能问题，因为在连接期间将不会使用\
  \ `EMPLOYEES.DEPARTMENT_ID` 上的索引（主要是因为 `NULL` 列不会被索引）。你可以通过使用基于函数的索引来解决这个新问题。FBI\
  \ 在表达式上创建索引，如果该表达式出现在连接条件或 `WHERE` 子句中，优化器可能会使用该索引。以下是如何在 `DEPARTMENT_ID` 列上创建 FBI：\n\
  ```sql\ncreate index employees_dept_fbi on employees(nvl(department_id,110));\n\
  ```\n■ **提示** 从 Oracle Database 11 *g* 开始，你现在可以使用*虚拟列*作为 FBI 的替代方案。虚拟列源自常量、函数以及同一表中的列。你可以在虚拟列上定义索引，优化器将在任何查询中使用这些索引，就像使用常规列索引一样。\n\
  \n最终，处理连接条件中的 `NULL` 的关键在于了解你的数据。如果可能，避免在可能包含 `NULL` 的列上进行连接，或者确保你将用于连接的每个列在填充时都有默认值。如果该列必须包含\
  \ `NULL`，请在连接前使用 `NVL`、`NVL2` 和 `COALESCE` 等函数将 `NULL` 转换掉；你可以创建基于函数的索引来抵消在表达式上连接的任何性能问题。如果无法做到这一点，请了解你的数据库列中\
  \ `NULL` 的业务规则含义：它们是表示零、未知还是不适用？你的 SQL 代码必须反映可以包含 `NULL` 的列的业务定义。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- "# 第四章\n## 创建和派生数据\n将数据存储在数据库中只是故事的一半。另一半是以用户能够理解的方式使这些数据可用。当你从数据库中提取数据时，无论是在报表格式中，还是在数据维护页面上一次提取一行，每行中的值通常由于多种原因而不适合直接显示。通常，你的数据为了性能和维护原因而高度规范化——将名称的各个部分存储在不同的列中，或者使用数字代码集来引用另一张表中的完整文本描述。其他与规范化相关的场景包括将数量或价格存储在多行或同一行的多个列中，以及不在表中存储总和或其他转换结果。\n\
  \n由于数据库高度规范化，你通常必须执行一些转换，通过即时创建新值，使最终用户能够轻松解读报表结果。你可能希望对单列、单行中的多个列，或者对一个或多个表中的多行中的一个或多个列执行转换。本章包含涵盖所有这些场景的解决方案。\n\
  \n\n##### 4-1. 派生新列\n\n## 问题\n\n你不想在数据库表中存储冗余数据，但希望能够为行中的列创建总计、派生值或替代格式。\n\n## 解决方案\n\
  \n在 `SELECT` 语句中，对表中的一个或多个列应用 Oracle 内置函数或创建表达式，从而在查询结果中创建一个虚拟列。例如，假设你想要汇总员工的总薪酬，将工资和佣金结合起来。\n\
  \n在 Oracle 默认安装中包含的 OE 用户示例表中，`ORDER_ITEMS` 表包含 `UNIT_PRICE` 和 `QUANTITY` 列，如下所示：\n\
  \n```\nselect * from order_items;\n\nORDER_ID LINE_ITEM_ID PRODUCT_ID UNIT_PRICE\
  \ QUANTITY\n--------- ------------ ---------- ---------- --------\n2423     7  \
  \          3290       65         33\n2426     5            3252       25       \
  \  29\n2427     7            2522       40         22\n2428     11           3173\
  \       86         28\n2429     10           3165       36         67\n. . .\n2418\
  \     6            3150       17         37\n2419     9            3167       54\
  \         81\n2420     10           3171       132        47\n2421     9       \
  \     3155       43         185\n2422     9            3167       54         39\n\
  \n665 rows selected\n```\n\n要在查询结果中提供行项目总计，请添加一个将单价乘以数量的表达式，如下所示：\n\n```\nselect\
  \ order_id, line_item_id, product_id,\n       unit_price, quantity, unit_price*quantity\
  \ line_total_price\nfrom order_items;\n\nORDER_ID LINE_ITEM_ID PRODUCT_ID UNIT_PRICE\
  \ QUANTITY LINE_TOTAL_PRICE\n--------- ------------ ---------- ---------- --------\
  \ ----------------\n2423     7            3290       65         33       2145\n\
  2426     5            3252       25         29       725\n2427     7           \
  \ 2522       40         22       880\n2428     11           3173       86      \
  \   28       2408\n2429     10           3165       36         67       2412\n.\
  \ . .\n2418     6            3150       17         37       629\n2419     9    \
  \        3167       54         81       4374\n2420     10           3171       132\
  \        47       6204\n2421     9            3155       43         185      7955\n\
  2422     9            3167       54         39       2106\n\n665 rows selected\n\
  ```\n\n## 工作原理\n\n在 `SELECT` 语句（或任何 DML 语句，如 `INSERT`、`UPDATE` 或 `DELETE`）中，你可以在语句中任何列上引用任何\
  \ Oracle 内置函数（或你自己的函数）。你也可以包含聚合函数，如 `SUM()` 和 `AVG()`，只要你在 `GROUP BY` 子句中包含非聚合列。\n\
  \n你还可以在 `SELECT` 语句中嵌套函数。`LINE_TOTAL_PRICE` 列包含了期望的结果，但未格式化得适合向客服代表或客户显示。为了提高输出的可读性，向查询中已有的计算添加\
  \ `TO_CHAR` 函数，如下所示：\n\n```\nselect order_id, line_item_id, product_id,\n      \
  \ unit_price, quantity,\n       to_char(unit_price*quantity,'$9,999,999.99') line_total_price\n\
  from order_items;\n\nORDER_ID LINE_ITEM_ID PRODUCT_ID UNIT_PRICE QUANTITY LINE_TOTAL_PRICE\n\
  --------- ------------ ---------- ---------- -------- ----------------\n2423   \
  \  7            3290       65         33       $2,145.00\n2426     5           \
  \ 3252       25         29       $725.00\n2427     7            2522       40  \
  \       22       $880.00\n2428     11           3173       86         28       $2,408.00\n\
  2429     10           3165       36         67       $2,412.00\n. . .\n2418    \
  \ 6            3150       17         37       $629.00\n2419     9            3167\
  \       54         81       $4,374.00\n2420     10           3171       132    \
  \    47       $6,204.00\n2421     9            3155       43         185      $7,955.00\n\
  2422     9            3167       54         39       $2,106.00\n\n665 rows selected\n\
  ```\n\n`TO_CHAR` 函数也可用于将日期或时间戳列转换为更易读或非默认的格式；你甚至可以使用 `TO_CHAR` 将国家字符集（`NCHAR`、`NVARCHAR2`、`NCLOB`）和\
  \ `CLOB` 的数据类型转换为数据库字符集，返回一个 `VARCHAR2`。\n\n如果你的用户需要经常运行此查询，可以考虑创建一个数据库视图（`view`），这将使你的分析师和其他最终用户更容易访问数据。新视图将看起来像另一个表，比原始表多一列。使用\
  \ `CREATE VIEW` 语句在 `ORDER_ITEMS` 表上创建一个包含派生列的视图：\n\n```\ncreate view order_items_subtotal_vw\
  \ as\nselect order_id, line_item_id, product_id,\n       unit_price, quantity,\n\
  \       to_char(unit_price*quantity,'$9,999,999.99') line_total_price\nfrom order_items\n\
  ;\n```\n\n要从视图中访问表的列和派生列，请使用以下语法：\n\n```\nselect order_id, line_item_id, product_id,\n\
  \       unit_price, quantity, line_total_price\nfrom order_items_subtotal_vw;\n\
  ```\n\n下次你需要访问派生的 `LINE_TOTAL_PRICE` 列时，就不再需要记住计算过程或将总价格转换为货币格式的函数了！\n\n在这种场景下使用数据库视图很有用，但它向数据字典添加了另一个对象，因此如果基表发生变化（例如当你修改或删除\
  \ `UNIT_PRICE` 或 `QUANTITY` 列时），就会创建另一个维护点。如果你使用的是 Oracle Database 11*g* 或更高版本，可以使用一个称为**虚拟列**（`virtual\
  \ columns`）的功能，它本质上是在表定义本身内为派生列创建元数据。你可以在创建表时创建虚拟列，也可以像添加任何其他列一样稍后添加它。虚拟列定义本身不占用表中的空间；当你访问包含虚拟列的表时，它会动态计算。要向\
  \ `ORDER_ITEMS` 添加虚拟列 `LINE_TOTAL_PRICE`，请使用以下语法：\n\n```\nalter table order_items\n\
  add (line_total_price as (to_char(unit_price*quantity,'$9,999,999.99')));\n```\n\
  \n虚拟列看起来与表中的任何真实列一样，是一个常规列：\n\n```\ndescribe order_items;\n\nName              \
  \                        Null?    Type\n-----------------------------------------\
  \ -------- -----------------\nORDER_ID                                  NOT NULL\
  \ NUMBER(12)\nLINE_ITEM_ID                              NOT NULL NUMBER(3)\nPRODUCT_ID\
  \                                NOT NULL NUMBER(6)\nUNIT_PRICE                \
  \                         NUMBER(8,2)\nQUANTITY                                \
  \           NUMBER(8)\nLINE_TOTAL_PRICE                                   VARCHAR2(14)\n\
  \n6 rows selected\n```\n\n虚拟列的数据类型由虚拟列定义中计算结果的隐式决定；`LINE_TOTAL_PRICE` 虚拟列中的表达式结果是一个最大宽度为\
  \ 14 的字符串，因此虚拟列的数据类型是 `VARCHAR2(14)`。\n\n> **提示** 要查明某列是否是虚拟列，可以查询 `*_TAB_COLS`\
  \ 数据字典视图的 `VIRTUAL_COLUMN` 列。\n\n使用虚拟列有许多优点，例如无需像上一个示例那样在表上创建视图。此外，你可以在虚拟列上创建索引并收集统计信息。以下是在前一个示例的虚拟列上创建索引的示例：\n\
  \n```\ncreate index ie1_order_items on order_items(line_total_price);\n```\n\n>\
  \ **注意** 对于不支持虚拟列的 Oracle 版本（Oracle Database 11*g* 之前），你可以通过在虚拟列使用的表达式上创建基于函数的索引来部分模拟虚拟列的索引功能。\n\
  \n\n"
- "# 第四章 创建与派生数据\n\n关于虚拟列存在一些限制，其中一部分显而易见，另一部分则不那么明显。如果你的虚拟列包含内置函数或用户自定义函数，那么被引用的函数必须声明为\
  \ `DETERMINISTIC`（确定性）；换句话说，对于同一组输入值（例如，行中的其他列），该函数必须返回相同的结果。因此，你不能在虚拟列中使用诸如 `SYSDATE`\
  \ 或 `SYSTIMESTAMP` 之类的函数，因为只要检索该行，它们几乎总是会返回不同的结果（除非是在同一秒内针对 `SYSDATE`，或同一百万分之一秒内针对\
  \ `SYSTIMESTAMP` 进行检索！）。如果你将一个非确定性的用户函数声明为 `DETERMINISTIC` 并在虚拟列中引用它，那就是自找麻烦；包含该虚拟列的查询结果很可能不正确，或者会根据查询执行的时间、执行者等因素而产生不同结果。\n\
  \n虚拟列的其他限制则不那么明显。一个虚拟列不能引用同一表中的另一个虚拟列（尽管你当然可以将一个虚拟列的定义包含在第二个虚拟列的定义中）。此外，虚拟列只能引用同一表内的列。总的来说，虚拟列在一定程度上减少了你可能需要在数据库视图中维护的元数据量，从而增强了数据库的易用性。\n\
  \n##### 4-2. 返回不存在的行\n\n### 问题\n\n用于表主键的序列号存在间隔，你希望找出中间缺失的序列号。\n\n### 解决方案\n\n尽管主键通常是（并且最好是）对最终用户不可见的，但有时你可能希望重用序列号，前提是必须将序列号的位数保持在尽可能低的水平，以满足下游系统或流程的需求。例如，公司棒球队使用\
  \ `EMPLOYEE_ID`（员工 ID）列中的数字作为队服背后的号码。经理希望尽可能重复使用旧队服号码，因为队服背后的号码限制为三位数。\n\n要找出被跳过或当前未使用的员工编号，你可以使用一个包含两个嵌套子查询的查询，如下所示：\n\
  \n```sql\nwith all_used_emp_ids as\n(select level poss_emp_id from (select max(employee_id)\
  \ max_emp_num\nfrom employees)\nconnect by level <= max_emp_num)\nselect poss_emp_id\n\
  from all_used_emp_ids\nwhere poss_emp_id not in (select employee_id from employees)\n\
  order by poss_emp_id\n;\n```\n\n```\nPOSS_EMP_ID\n. . .\n101 rows selected\n```\n\
  \n该查询检索 `EMPLOYEES` 表中当前最高员工编号之下所有未使用的员工编号。\n\n### 工作原理\n\n该解决方案使用子查询因子化和两个显式子查询来找出缺失的员工编号列表。`WITH`\
  \ 子句中的查询创建了一个从 1 到 `EMPLOYEES` 表中最高员工编号值的连续数字序列（无间隔）。子查询的高亮部分负责检索最高编号：\n\n```sql\n\
  (select level poss_emp_id from (select max(employee_id) max_emp_num\nfrom employees)\n\
  connect by level <= max_emp_num)\n```\n\n`WITH` 子句中查询的其余部分生成了这个无间隔的数字序列。它利用了 Oracle\
  \ 层次查询特性（`CONNECT BY` 子句和 `LEVEL` 伪列）的一个微妙特性来生成序列中的每个数字。有关需要遍历层次数据的其他有用示例，请参见第 13\
  \ 章。\n\n以下是 `SELECT` 查询的主要部分：\n\n```sql\nselect poss_emp_id\nfrom all_used_emp_ids\n\
  where poss_emp_id not in (select employee_id from employees)\n```\n\n它从无间隔序列中检索所有可能的员工编号，这些编号尚未存在于\
  \ `EMPLOYEES` 表中。最终的结果集按 `POSS_EMP_ID` 排序，以便轻松地将最低的可用号码分配给下一个员工。如果你想始终排除一位数或两位数的编号，可以向\
  \ `WHERE` 子句中添加另一个谓词，如下所示：\n\n```sql\nwith all_used_emp_ids as\n(select level poss_emp_id\
  \ from (select max(employee_id) max_emp_num\nfrom employees)\nconnect by level <=\
  \ max_emp_num)\nselect poss_emp_id\nfrom all_used_emp_ids\nwhere poss_emp_id not\
  \ in (select employee_id from employees)\nand poss_emp_id > 99\norder by poss_emp_id\n\
  ;\n```\n\n```\nPOSS_EMP_ID\n2 rows selected\n```\n\n在修改后的查询结果中，在当前使用的最高员工编号之下，唯一可以重复使用的三位数编号是\
  \ 179 和 183。\n\n##### 4-3. 将行转换为列\n\n### 问题\n\n你的事务数据存储在高度规范化的数据库结构中，你希望为业务分析师轻松创建交叉表风格的报告，在单一行中以多列形式返回总计值或其他聚合结果。\n\
  \n### 解决方案\n\n在 `SELECT` 语句中使用 `PIVOT` 关键字，将多个行中的值（来自一列或多列）聚合并展开到查询输出中的多列。例如，在 Oracle\
  \ 订单录入示例模式 `OE` 中，你希望从所有订单中挑选五种关键产品，并找出哪些客户购买了这些产品，以及购买了多少。\n\n`ORDERS` 表和 `ORDER_ITEMS`\
  \ 表定义如下：\n\n```\ndescribe orders;\n\nName                                      Null\
  \      Type\n----------------------------------------- -------- --------------------------------\n\
  ORDER_ID                                  NOT NULL NUMBER(12)\nORDER_DATE      \
  \                          NOT NULL TIMESTAMP(6) WITH LOCAL TIME ZONE\nORDER_MODE\
  \                                         VARCHAR2(8)\nCUSTOMER_ID             \
  \                 NOT NULL NUMBER(6)\nORDER_STATUS                             \
  \         NUMBER(2)\nORDER_TOTAL                                       NUMBER(8,2)\n\
  SALES_REP_ID                                      NUMBER(6)\nPROMOTION_ID      \
  \                                NUMBER(6)\n\n8 rows selected\n```\n\n```\ndescribe\
  \ order_items;\n\nName                                      Null      Type\n-----------------------------------------\
  \ -------- --------------------------------\nORDER_ID                          \
  \        NOT NULL NUMBER(12)\nLINE_ITEM_ID                              NOT NULL\
  \ NUMBER(3)\nPRODUCT_ID                                NOT NULL NUMBER(6)\nUNIT_PRICE\
  \                                         NUMBER(8,2)\nQUANTITY                \
  \                           NUMBER(8)\nLINE_TOTAL_PRICE                        \
  \           VARCHAR2(14)\n\n6 rows selected\n```\n\n以下是按客户检索前五种产品数量总计的透视查询：\n\n\
  ```sql\nwith order_item_query as\n(select customer_id, product_id, quantity\nfrom\
  \ orders join order_items using(order_id))\nselect * from order_item_query\npivot\
  \ (\nsum(quantity) as sum_qty\nfor (product_id) in (3170 as P3170,\n           \
  \          3176 as P3176,\n                     3182 as P3182,\n               \
  \      3163 as P3163,\n                     3165 as P3165)\n)\norder by customer_id\n\
  ;\n```\n\n```\nCUSTOMER_ID P3170_SUM_QTY P3176_SUM_QTY P3182_SUM_QTY P3163_SUM_QTY\
  \ P3165_SUM_QTY\n----------- ------------- ------------- ------------- -------------\
  \ -------------\n        101           208\n        104            70          \
  \  72            77            61            64\n        106            62     \
  \       55\n        107            76\n        108            45            31\n\
  \        109           115           112\n        116            48            24\
  \             5            10\n        117            63            67\n       \
  \ 118            42\n        119            36            30\n. . .\n        170\
  \            92\n\n47 rows selected\n```\n\n从这个查询的结果中，你可以很容易地看出客户编号 104 是 `PIVOT`\
  \ 子句中指定的所有产品的最大买家。\n\n### 工作原理\n\n`PIVOT` 运算符，顾名思义，将行旋转为列。在解决方案中，你会注意到一些熟悉的结构，以及一些不那么熟悉的。首先，解决方案使用了\
  \ `WITH` 子句（子查询因子化）将基础查询与查询的其余部分更清晰地分离开；以下是解决方案中使用的 `WITH` 子句：\n\n```sql\nwith order_item_query\
  \ as\n(select customer_id, product_id, quantity\nfrom orders join order_items using(order_id))\n\
  ```\n\n使用 `WITH` 子句还是内联视图是风格问题。无论哪种情况，请确保只包含你将用于分组、聚合的列，或者在 `PIVOT` 子句中使用的列。\n\n\
  \n\n## 第四章 ■ 创建与推导数据\n\n##### 4-4. 在多个列上进行透视\n\n否则，如果你的查询中有多余的列，你的结果将会比预期多出许多行！这非常类似于在带有聚合的常规\
  \ `SELECT` 语句中的 `GROUP BY` 子句添加额外的列，通常会增加结果中的行数。\n\n`PIVOT` 子句本身会在查询结果中生成额外的列。以下是解决方案中\
  \ `PIVOT` 子句的第一部分：\n\n`sum(quantity) as sum_qty`\n\n你指定一个或多个希望出现在新列中的聚合，并为 Oracle\
  \ 将用于每个新列分配一个标签后缀。（我们将在本节后面展示如何在多个列上进行透视或聚合多个列。）在本例中，所有派生列都将以 `SUM_QTY` 结尾。\n\n\
  `FOR` 子句中的列会筛选用于聚合结果的行。`FOR` 子句中列的每个值，或每个指定的两列或多列组合，都将在结果中产生一个额外的派生列。解决方案中的 `FOR`\
  \ 子句如下：`for (product_id) in (3170 as P3170, 3176 as P3176, 3182 as P3182, 3163 as\
  \ P3163, 3165 as P3165)`\n\n该查询将仅使用 `PRODUCT_ID` 在列表中的行，因此其作用类似于 `WHERE` 子句，在聚合之前筛选结果。每个透视值后指定的文本字符串用作新列名的前缀，如解决方案查询的结果所示。\n\
  \n最后，`ORDER BY` 子句的作用与在任何其他查询中的作用相同——按指定的列对最终结果集进行排序。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n#### 问题\n\n你已经实现了前一个方案中展示的解决方案。现在你希望不仅根据产品的总数量进行透视，还根据购买的总美元价值进行透视。\n\n#### 解决方案\n\
  \n以下查询扩展了前一个方案的解决方案，为每个产品编号添加了一个总金额列：\n\n```sql\nwith order_item_query as\n(select\
  \ customer_id, product_id, quantity, unit_price\n from orders join order_items using(order_id))\n\
  select * from order_item_query\npivot (\n sum(quantity) as sum_qty,\n sum(quantity*unit_price)\
  \ as sum_prc\n for (product_id) in (3170 as P3170,\n                      3176 as\
  \ P3176,\n                      3182 as P3182,\n                      3163 as P3163,\n\
  \                      3165 as P3165)\n )\norder by customer_id\n;\n```\n\n```\n\
  CUSTOMER_ID P3170_SUM_QTY P3170_SUM_PRC P3176_SUM_QTY P3176_SUM_PRC . . .\n-----------\
  \ ------------- ------------- ------------- ------------- ---------\n        104\
  \            70         10164            72         8157.6\n        106        \
  \    62         7024.6\n        116            48         6969.6            24 \
  \        2719.2\n        118            42         6098.4\n        119         \
  \   36         5227.2\n. . .\n```\n\n这份报告进一步强化了原始方案的发现：客户编号 `104` 在支付总金额方面也是一个大买家。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n#### 工作原理\n\n一旦掌握了 `PIVOT`\
  \ 子句的基础，更进一步操作就很容易了。只需根据需要向你的 `PIVOT` 子句添加任意多个额外的聚合。不过要记住，添加第二个聚合会使派生列的数量翻倍，添加第三个则使其变为三倍，依此类推。\n\
  \n让我们进一步扩展这个解决方案，再添加一个透视列。在 `ORDERS` 表中，如果销售是通过电话进行的，`ORDER_MODE` 列包含字符串 `direct`；如果订单是在公司互联网站点下达的，则包含\
  \ `ONLINE`。要在 `ORDER_MODE` 上进行透视，只需将该列添加到 `FOR` 子句中，并在 `FOR` 列表中指定成对的值而不是单个值，如下所示：\n\
  \n```sql\nwith order_item_query as\n(select customer_id, product_id, quantity, unit_price,\
  \ order_mode\n from orders join order_items using(order_id))\nselect * from order_item_query\n\
  pivot (\n sum(quantity) as sum_qty,\n sum(quantity*unit_price) as sum_prc\n for\
  \ (product_id, order_mode) in ((3170, 'direct' ) as P3170_DIR,\n               \
  \                   (3170, 'online' ) as P3170_ONL,\n                          \
  \        (3176, 'direct' ) as P3176_DIR,\n                                  (3176,\
  \ 'online' ) as P3176_ONL,\n                                  (3182, 'direct' )\
  \ as P3182_DIR,\n                                  (3182, 'online' ) as P3182_ONL,\n\
  ```\n\n\n\n```\n(3163, 'direct' ) as P3163_DIR,\n(3163, 'online' ) as P3163_ONL,\n\
  (3165, 'direct' ) as P3165_DIR,\n(3165, 'online' ) as P3165_ONL)\n)\norder by customer_id\n\
  ;\n\nCUSTOMER_ID P3170_DIR_SUM_QTY P3170_DIR_SUM_PRC P3170_ONL_SUM_QTY P3170_ONL_SUM_PRC\n\
  ----------- ----------------- ----------------- ----------------- -----------------\n\
  104 70 10164\n116 24 3484.8 24 3484.8\n118 42 6098.4\n. . .\n```\n\n输出在水平方向上已被截断以方便阅读。对于产品编号、订单模式及两个聚合值的每一种组合，都有一列。查看按\
  \ 93\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- '# 第 4 章 创建与衍生数据


