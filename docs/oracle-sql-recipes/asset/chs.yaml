  ## 专题\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第十一章\n\n■ ■ ■\n\n\
  ## 常见的报表问题\n\n作为 SQL 开发人员、DBA 或高级用户，你有时必须编写报表，以与同事、管理层、客户或其他公司分享。如果你幸运的话，你可以安静地专注于报表的逻辑和呈现。然而，不幸的是，你几乎肯定会遇到“站在背后指手画脚”的报表批评者。你知道那种人：他们站在你身后，对着屏幕指指点点，提供“有帮助的”建议，比如“那应该转换成电子表格。”或者“你能让它看起来像旧报表那样吗？那样更容易阅读。”\n\
  \n许多这类需求都有通用的解决方案，可以将完全正常的报表数据进行旋转、压缩、替换和以其他方式转换，使其更符合目标受众的熟悉习惯或需求。本章涵盖了许多常见的报表样式，并提供了一些通用和不太常见的解决方案，以帮助你满足当前需求，同时为你提供思路，以应对我们尚未想到但你的老板肯定已经想到的未来报表场景。\n\
  \n##### 11-1. 避免在报表中重复行\n\n**问题**\n\n你想模仿 SQL*Plus 的 `BREAK` 功能，以抑制数据行中几乎相同的前导数据。\n\
  \n例如，在一个多列报表中，只有最后一列在行与行之间不同，你想将重复的前导列置空，只显示不同列的数据。\n\n**解决方案**\n\nOracle 的 `SQL*Plus`\
  \ 工具支持 `BREAK` 功能已有数十年，许多基础的文本报表依赖于这种简单但有效的格式化方法。不幸的是，`BREAK` 命令并非 SQL 原生，因此无法在\
  \ `SQL*Plus` 之外用于实现相同的结果。使用 Oracle 的 `ROW_NUMBER` 分析函数和 `CASE` 表达式，你可以在任何 SQL 接口中模仿\
  \ `BREAK` 的行为。\n\n对于那些不熟悉 `SQL*Plus BREAK` 功能的人，接下来的命令演示了它如何在一个简单的 `SELECT` 语句输出中“隐藏”相同的\
  \ `job` 标识符和经理标识符。只显示了部分结果，但你可以清楚地看到效果。\n\n```\nbreak on job_id on manager_id\n\
  ```\n\n```\nselect job_id, manager_id, employee_id\nfrom hr.employees\norder by\
  \ job_id, manager_id, employee_id;\n```\n\n```\nJOB_ID         MANAGER_ID EMPLOYEE_ID\n\
  -------------- ---------- -----------\n...\nAD_VP                 100         101\n\
  FI_ACCOUNT            108         109\nFI_MGR                101         108\nHR_REP\
  \                101         203\nIT_PROG               102         103\n      \
  \                                103\n                                      104\n\
  ...\n```\n\n我们可以使用 Oracle 的 `CASE` 表达式和 `ROW_NUMBER` 分析函数，在任何 SQL 查询接口或编程 API 中模仿\
  \ `BREAK` 功能。下一个 SQL 语句展示了这两个特性的实际应用，以及从任何接口生成的相同结果。\n\n```\nselect\ncase when job_ctr\
  \ = 1 then job_id else null end \"JOB_ID\",\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n\n\n# 第 11 章 ■ 常见报告问题\n\n## 11-1. 消除列报告中的重复值\n\n```sql\ncase when jobman_ctr =\
  \ 1 then manager_id else null end \"MANAGER_ID\", employee_id\nfrom (\n  select\
  \ job_id,\n         row_number() over (partition by job_id order by job_id) as job_ctr,\n\
  \         manager_id,\n         row_number() over (partition by job_id, manager_id\
  \ order by job_id, manager_id) as jobman_ctr,\n         employee_id\n  from hr.employees\n\
  );\n```\n正如我们承诺的，我们的结果与 SQL*Plus 方法非常相似，值得庆幸的是节省了墨水，因为没有打印重复数据。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n```text\nJOB_ID          MANAGER_ID    EMPLOYEE_ID\n----------      ----------\
  \    ------------\n...\nAD_VP           100           101\nFI_ACCOUNT      108 \
  \          109\nFI_MGR          101           108\nHR_REP          101         \
  \  203\nIT_PROG         102           103\n                103           104\n...\n\
  ```\n\n### 工作原理\n我们的方法分为两部分。内部查询选择我们感兴趣的数据列，在本例中是 `JOB_ID`、`MANAGER_ID` 和 `EMPLOYEE_ID`。它还添加了两个使用\
  \ `ROW_NUMBER` 分析函数计算的额外列，这些列在最终输出中不会看到。这两列是 `JOB_CTR` 和 `JOBMAN_CTR` 的值，用于根据我们明确希望先显示\
  \ `JOB_ID`、其次显示 `MANAGER_ID` 的意图来对结果行进行编号。我们为 `JOB_CTR` 设置的分区和排序选项会在每次 `JOB_ID`\
  \ 变化时重新开始编号。对于 `JOBMAN_CTR`，我们在每个 `JOB_ID` 内，每次 `MANAGER_ID` 变化时重新开始编号。\n\n要理解我们如何在外层\
  \ `SELECT` 中使用这些数据，让我们单独看看子查询的结果。下一个 SQL 语句是作为独立 `SELECT` 语句执行的子查询，后面是部分结果。\n\n\
  ```sql\nselect job_id,\n       row_number() over (partition by job_id order by job_id)\
  \ as job_ctr,\n       manager_id,\n       row_number() over (partition by job_id,\
  \ manager_id order by job_id, manager_id) as jobman_ctr,\n       employee_id\nfrom\
  \ hr.employees;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n```text\n\
  JOB_ID       JOB_CTR    MANAGER_ID    JOBMAN_CTR    EMPLOYEE_ID\n----------   --------\
  \   ----------    ----------    -----------\n...\nAD_VP        1          100  \
  \         1             101\nAD_VP        2          100           2           \
  \  102\nFI_ACCOUNT   1          108           1             109\nFI_ACCOUNT   2\
  \          108           2             110\nFI_ACCOUNT   3          108        \
  \   3             111\nFI_ACCOUNT   4          108           4             112\n\
  FI_ACCOUNT   5          108           5             113\nFI_MGR       1        \
  \  101           1             108\nHR_REP       1          101           1    \
  \         203\nIT_PROG      1          102           1             103\nIT_PROG\
  \      2          103           1             104\n...\n```\n理解我们外层 `SELECT` 的关键在于各自\
  \ `CASE` 语句对计数器执行的测试。我们已在上面的输出中用粗体强调了感兴趣的值。\n\n我们的外层 `SELECT` 语句旨在测试计数器值等于一的时候，因为这标志着相关的\
  \ `JOB_ID` 或 `MANAGER_ID` 值发生了变化。任何其他值都表明我们正在检查的行与前一行具有相同的 `JOB_ID` 或 `MANAGER_ID`。我们知道已经打印了相关值，因此可以用一个通常不会显示的\
  \ `NULL` 来替代。所以在我们的部分结果中，有一个 `JOB_ID` 为 `AD_VP` 和 `MANAGER_ID` 为 `100`，`ROW_NUMBER`\
  \ 技术将它们计为该组合中这些值的第一个实例。我们方法的 `CASE` 语句检测到这些值因此应该被打印出来。下一行具有相同的 `JOB_ID` 和 `MANAGER_ID`，并且每个的计数器值都是\
  \ 2。我们的 `CASE` 表达式计算结果为 `NULL`，因此最终结果抑制了这些值，只打印 `EMPLOYEE_ID`。\n\n您可以将此技术扩展到任意多个列。只需要将所需的结果列与由\
  \ `ROW_NUMBER` 技术确定的计数器配对，并在外部 `SELECT` 块中构造一个模式相同的 `CASE` 语句即可。\n\n##### 11-2.\
  \ 参数化 SQL 报告\n\n### 问题\n您有各种想要提供给用户用于报告目的的 SQL 语句，并且希望允许他们为各种谓词和条件指定值。例如，您已经使用了\
  \ SQL*Plus 的参数功能，并且需要在其他查询工具中获得类似支持。\n\n### 解决方案\n当通过 Java 或 C# 等编程语言编写报告 SQL 时，向\
  \ SQL 语句添加参数相当直接。然而，当处理“原生” SQL 和查询工具时，您就没有对象模型和定义良好的方法来让用户简单地为查询中的参数提供值的便利了。这个方法不仅仅是一个\
  \ SQL 配方，更是一个 SQL 使用配方。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ![Image 30](img/index-295_1.png)\n\n您以前可能在 SQL*Plus 中使用过与号（&）和双与号（&&）标记技术来在 SQL\
  \ 语句中放置可替换参数。我们的方法表明，这种技术实际上几乎在 Oracle 的所有查询工具接口中都得到支持，例如 SQL Developer、SQL Worksheet\
  \ 和 APEX SQL Command 工具。更妙的是，甚至一些第三方工具如 TOAD 也支持相同的语法。\n\n我们将通过使用以下 SQL 语句查询薪资超过特定值的所有员工来展示我们的方法。我们将使用一个参数来表示阈值薪资，由用户在运行时提供。\n\
  \n```sql\nselect employee_id, last_name, salary\nfrom hr.employees\nwhere salary\
  \ > &threshold_salary\n```\n通过 SQL*Plus 执行此查询会给出熟悉的 `THRESHOLD_SALARY` 值提示：\n`Enter\
  \ value for threshold_salary: 15000`\n\n我们输入了值 15000。我们的参数被替换，并显示结果。\n\n```text\n\
  old 3: where salary > &threshold_salary\nnew 3: where salary > 15000\n\nEMPLOYEE_ID\
  \ LAST_NAME                 SALARY\n----------- ------------------------- ------\n\
  100        King                      24000\n101        Kochhar                 \
  \  17000\n102        De Haan                   17000\n```\n但是看看当我们通过 SQL Developer\
  \ 发出相同的 SQL 时会发生什么。它理解 Oracle 在查询工具中表示参数（或替换变量）的符号，并在一个直观的对话框中提示您输入参数，如图 11-1 所示。\n\
  \n**图 11-1.** SQL Developer 提示输入 SQL 参数。\n\n正如您所料，再次输入值 15000，SQL Developer 执行相同的替换。图\
  \ 11-2 显示 SQL Developer 返回了相同的结果，如您所愿。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 31](img/index-296_1.png)\n\n**图 11-2.** SQL Developer 接受并正确使用 Oracle 风格的\
  \ SQL 参数。\n\n### 工作原理\n在 SQL*Plus 开发的早期，就添加了对与号样式替换变量的支持，以允许用户将参数值传递给他们的查询。Oracle\
  \ 确保相同的技术可用于其大多数（如果不是全部）后续查询工具，其他公司的产品也纷纷效仿，最著名的是 TOAD。\n\n单与号和双与号样式的参数都可以在所有这些工具中使用。对于那些不熟悉两者区别的人来说，单与号参数是临时替换变量，在一个\
  \ SQL 语句中获取并使用一次值。如果您使用单与号替换变量重新执行该语句，您将被再次要求提供一个值。双与号参数创建一个永久替换变量。您提供的第一个值将在您的会话期间持续作为替换值。\n\
  \nSQL*Plus 风格的替换变量与应用程序代码中预处理语句的绑定变量之间存在重要区别。我们的方法，以及您编写的任何使用替换变量的其他 SQL，都是通过使用客户端字符串替换技术工作的。在将语句传递给\
  \ Oracle 数据库之前，SQL*Plus、SQL Developer 或您选择的工具会找到 SQL 中的替换变量。查询工具本身会提示输入要替换的值，并使用字符串函数将变量标记替换为您提供的值。只有这样，SQL\n\
  \n\n\n## 替换变量与绑定变量\n\n`语句`被发送至 Oracle 进行解析和执行。这意味着数据库永远不会知晓替换变量的存在，也不会知道在该语句接收之前所经历的字符串操作。\n\
  \n预处理语句中的绑定变量处理方式则截然不同。在任何使用绑定变量的高级语言中（例如`PL/SQL`、`Java`或`C#`），你传递给 Oracle 进行准备和执行的`SQL`语句都包含其绑定变量标记。Oracle\
  \ 知晓该语句存在绑定变量，并会据此优化查询的执行计划。当你为带有绑定变量的预处理语句提供数值时，这些值会被发送至 Oracle，由 Oracle 负责处理正确替换绑定变量并执行所得语句的底层机制。对于绑定变量，Oracle\
  \ 完全知晓其存在，并在数据库层面深入参与其使用。\n\n##### 11-3. 在分组结果中返回详细列\n\n### 问题\n\n在对多种数据进行聚合操作时，你需要在同一行中包含不参与分组的其他结果列，同时不改变聚合的粒度。例如，你需要聚合各部门中任期最长和最短的员工数据，同时希望包含这些员工的更多详细信息列，而无需将它们包含在`GROUP\
  \ BY`子句中。\n\n### 解决方案\n\n使用 Oracle 中与`MAX`和`MIN`等函数等效的分析函数，结合嵌套的`SELECT`语句，可以在不影响聚合粒度的情况下，为聚合行添加额外的详细信息。\n\
  \n我们的方法使用每个部门内员工的`HIRE_DATE`，以及诸如员工姓名和员工标识符等有用信息。接下来的`SQL`代码块展示了针对我们具体问题的解决方案，但可以应用于每一个类似的请求，以返回与聚合数据结合的额外详细数据。\n\
  \n```sql\nselect department_id, employee_id, first_name, last_name,\ncase\nwhen\
  \ hire_date = first_hire and hire_date = last_hire\nthen '任期最短和最长'\nwhen hire_date\
  \ = first_hire then '任期最长'\nwhen hire_date = last_hire then '任期最短'\nend Department_Tenure\n\
  from (\nselect department_id, employee_id, first_name, last_name, hire_date,\nmax(hire_date)\
  \ over(partition by department_id) first_hire,\nmin(hire_date) over(partition by\
  \ department_id) last_hire\nfrom hr.employees\n) Hire_Dates\nwhere hire_date in\
  \ (first_hire, last_hire)\norder by department_id, department_tenure;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n结果展示了聚合操作按预期工作，正确识别出任期最短和最长的员工，并连同这些员工的额外详细信息一起返回。\n\n```\nDEPARTMENT_ID EMPLOYEE_ID\
  \ FIRST_NAME LAST_NAME DEPARTMENT_TENURE\n------------- ----------- -----------\
  \ --------- ----------------------------\n10 200 Jennifer Whalen 任期最短和最长\n20 202\
  \ Pat Fay 任期最长\n20 201 Michael Hartstein 任期最短\n30 119 Karen Colmenares 任期最长\n30\
  \ 114 Den Raphaely 任期最短\n40 203 Susan Mavris 任期最短和最长\n50 128 Steven Markle 任期最长\n\
  50 122 Payam Kaufling 任期最短\n...\n```\n\n### 工作原理\n\n如果我们尝试使用普通的`SELECT`语句来查找`MIN`和`MAX`，我们的`SELECT`语句将如下一个`SQL`代码块所示。\n\
  \n```sql\nselect department_id, employee_id, first_name, last_name,\nmin(hire_date),\
  \ max(hire_date)\nfrom hr.employees\ngroup by department_id, employee_id, first_name,\
  \ last_name;\n```\n\n我们得到的结果完全无用，因为我们被迫按非聚合列（如`FIRST_NAME`和`EMPLOYEE_ID`）进行分组，而其中一些列的值是唯一的！\n\
  \n```\nDEPARTMENT_ID EMPLOYEE_ID FIRST_NAME LAST_NAME MIN(HIRE_DATE) MAX(HIRE_DATE)\n\
  ------------- ----------- ---------- --------- -------------- --------------\n20\
  \ 201 Michael Hartstein 17-FEB-96 7-FEB-96\n20 202 Pat Fay 17-AUG-97 17-AUG-97\n\
  60 103 Alexander Hunold 03-JAN-90 03-JAN-90\n60 107 Diana Lorentz 07-FEB-99 07-FEB-99\n\
  ```\n\n\n\n# 第 11 章 ■ 常见的报告问题\n\n100 113 Luis Popp 1999-12-07 1999-12-07\n\n...\n\
  \n我们没有用于聚合的分组，所有员工都作为详细行返回，他们自己的 `HIRE_DATE` 同时作为最早和最晚的值——这输出相当无意义，即使它在技术上是准确的。\n\
  \n如果我们省略 `GROUP BY` 子句中希望作为详情包含的列，Oracle 完全有理由报错，如下面的 SQL 代码块所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n```sql\nselect department_id, employee_id, first_name, last_name,\nmin(hire_date),\
  \ max(hire_date)\nfrom hr.employees\ngroup by department_id;\n```\n\n```sql\nselect\
  \ department_id, employee_id, first_name, last_name,\n*\nERROR at line 1:\nORA-00979:\
  \ not a GROUP BY expression\n```\n\n通过在内联视图中使用 `MIN` 和 `MAX` 的分析函数版本，我们的方法解决了这个问题。这个方法通过“预期”许多行会被外部\
  \ `SELECT` 语句丢弃来工作，并确保内联视图中的每一行都有必要的详情。我们方法中的内联视图生成的结果（为节省空间而截断）如下所示。\n\n```\nDEPARTMENT_ID\
  \ EMPLOYEE_ID FIRST_NAME LAST_NAME HIRE_DATE FIRST_HIRE LAST_HIRE\n-------------\
  \ ----------- ---------- --------- ---------- --------- ---------\n10 200 Jennifer\
  \ Whalen 17-SEP-87 17-SEP-87 17-SEP-87\n20 201 Michael Hartstein 17-FEB-96 17-AUG-97\
  \ 17-FEB-96\n20 202 Pat Fay 17-AUG-97 17-AUG-97 17-FEB-96\n30 114 Den Raphaely 07-DEC-94\
  \ 10-AUG-99 07-DEC-94\n30 119 Karen Colmenares 10-AUG-99 10-AUG-99 07-DEC-94\n30\
  \ 115 Alexander Khoo 18-MAY-95 10-AUG-99 07-DEC-94\n30 116 Shelli Baida 24-DEC-97\
  \ 10-AUG-99 07-DEC-94\n30 117 Sigal Tobias 24-JUL-97 10-AUG-99 07-DEC-94\n30 118\
  \ Guy Himuro 15-NOV-98 10-AUG-99 07-DEC-94\n...\n```\n\n分析函数 `MIN` 和 `MAX` 有效地记录了每个部门中最早和最晚入职员工的雇佣日期，关联到每一位员工——即使他们自己既不是最早也不是最晚入职的员工。起初，这看起来有些奇怪，但这就是外部\
  \ `SELECT` 语句发挥作用的地方。我们的主 `SELECT` 使用了以下 `WHERE` 子句。\n\n```sql\nwhere hire_date\
  \ in (first_hire, last_hire)\n```\n\n这有效地丢弃了所有行，只保留员工的 `HIRE_DATE` 与计算出的 `FIRST_HIRE`\
  \ 或 `LAST_HIRE` 日期相匹配的行。然后，我们的 `CASE` 语句简单地评估剩余行的 `HIRE_DATE` 是否与 `FIRST_HIRE` 或\
  \ `LAST_HIRE` 匹配，并为我们的报告输出一个有意义的字符串。\n\n##### 11-4. 将结果排序到等大小的分组中\n\n### 问题\n\n\
  你需要为报告将数据分组到等大小的分组中。例如，你想根据客户的订单价值将他们按四分位数排序，以便识别出你的大客户。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 解决方案\n\n使用 Oracle 的两种分组式分析函数来执行简单的分组排序。`NTILE` 提供等高度（等高）分组排序，而 `WIDTH_BUCKET`\
  \ 提供等宽度、直方图式的分组排序。\n\n为了根据消费情况找出客户的四分位数，我们将使用 `NTILE` 函数。\n\n这将为我们提供等大小的四分位数进行分析。下面的\
  \ SQL 检查按客户统计的订单总额，返回我们所需的四分位数。\n\n```sql\nselect customer_id, order_total,\nntile(4)\
  \ over (order by order_total desc) as order_quartile\nfrom oe.orders;\n```\n\n简略的结果让你对四分位数的分布情况有所了解。\n\
  \n```\nCUSTOMER_ID ORDER_TOTAL ORDER_QUARTILE\n----------- ----------- --------------\n\
  147 295892 1\n150 282694.3 1\n149 268651.8 1\n...\n168 45175 2\n102 42283.2 2\n\
  ...\n169 15760.5 3\n116 14685.8 3\n...\n103 78 4\n167 48 4\n```\n\n在许多公司中，一种常见的销售技巧是让客户代表针对最高的四分位数，确保这些客户获得特殊待遇和支持，以使大订单持续流入。根据\
  \ 48 美元的订单，客户 167 不太可能得到这种关注。\n\n### 工作原理\n\n`NTILE` 函数的一般形式是指定用于分组的分组数量，以及用于排序以确定分组的数据。用伪\
  \ SQL 表示，其一般形式如下：\n\n```\nNTILE(<分组数量>) over (<用于确定分组的分区和排序>)\n```\n\n在我们的方法中，我们指示\
  \ Oracle 使用 `NTILE(4)` 创建四个分组，这样我们可以创建四个组以满足四分位数的通常含义。`OVER (ORDER BY ORDER_TOTAL\
  \ DESC)` 子句指示 Oracle 按 `ORDER_TOTAL` 降序排序数据，以便为每一行分配到相关的分组/四分位数。无论数据如何排序，排在第一位的将被分配到第一个分组，因此在分析函数中选择升序或降序排序控制了高值或低值被认为是位于第一个还是最后一个分组。\n\
  \n请记住，这个排序并不决定数据最终显示的顺序。它只控制 `NTILE` 函数的分组分配。示例结果看起来按分组整齐排序，但这只是巧合。如果你的数据量很大，或者\
  \ Oracle 使用并行查询执行，你可能会发现结果以不同的顺序返回。当然，分组分配仍然是正确的。\n\n要控制呈现的顺序，请使用常规的 `ORDER BY`\
  \ 子句，如下面的 SQL 所示。\n\n```sql\nselect customer_id, order_total,\nntile(4) over (order\
  \ by order_total desc) as order_quartile\nfrom oe.orders\norder by 2 desc, 3;\n\
  ```\n\n这种排序确保你总是在结果中首先看到最高价值的订单，即那些位于第一个四分位数的订单。\n\n你可以通过将基础查询包装在一个带有 `COUNT` 函数的简单外部\
  \ `SELECT` 中，来验证 `NTILE` 是否产生了等大小的分组。下面的 SQL 显示了客户订单数据如何在分组之间平衡。\n\n```sql\nselect\
  \ order_quartile, count(*) as bucket_count\nfrom (\nselect customer_id, order_total,\n\
  ntile(4) over (order by order_total desc) as order_quartile\nfrom oe.orders )\n\
  group by order_quartile\norder by order_quartile;\n```\n\n```\nORDER_QUARTILE BUCKET_COUNT\n\
  -------------- ------------\n1 27\n2 26\n3 26\n4 26\n```\n\n你可以看到 Oracle 如何处理订单数量不能完美整除到我们四个分组中的事实，并因此近似实现了完美的平衡。\n\
  \n##### 11-5. 创建报告直方图\n\n### 问题\n\n你想将客户销售数据分组到直方图可视化中进行报告。例如，你想报告有多少客户根据其总订单额（以\
  \ 50,000 美元为倍数）落入不同的组。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n###\
  \ 解决方案\n\nOracle 的 `WIDTH_BUCKET` 分析函数根据指定的分组要求在你的数据上生成直方图。将 `WIDTH_BUCKET` 与常规的\
  \ `SUM` 函数结合使用，可以让你将直方图结果构建成有意义的报告。下面的 SQL 显示了基于客户销售额以 50,000 美元为分组的直方图数字。\n\n```sql\n\
  select count(*) Customer_Count, total_spend_histogram * 50000 Spend_Bucket from\n\
  (select customer_id, sum(order_total),\nwidth_bucket(sum(order_total),0,500000,10)\
  \ as total_spend_histogram\nfrom oe.orders\ngroup by customer_id)\ngroup by total_spend_histogram\
  \ * 50000\norder by 2;\n```\n\n销售由许多小客户主导，少数大客户的业务量接近五十万美元。\n\n```\nCUSTOMER_COUNT\
  \ SPEND_BRACKET\n-------------- -------------\n27 50000\n7 100000\n3 150000\n5 200000\n\
  1 250000\n2 300000\n1 400000\n1 450000\n8 rows selected.\n```\n\n### 工作原理\n\n`WIDTH_BUCKET`\
  \ 函数根据提供给函数的上限和下限，将源数据拆分为若干个分组。`WIDTH_BUCKET` 的一般结构如下所示：\n\n```\nWIDTH_BUCKET\n\
  ```\n\n\n\n# 第 11 章 ■ 常见报表问题\n\n##### 11-6. 按相对排名过滤结果\n\n### 问题\n\n您希望过滤查询结果，以找到在排序结果中处于任意位置的行。例如，您希望模拟其他数据库的\
  \ top N 或第 n 个结果的查询功能。\n\n### 解决方案\n\n从 Oracle 11g Release 2 开始，Oracle 引入了新的获取第\
  \ n 个结果的功能。在 11g Release 2 被广泛部署之前，您应该使用现有的分析函数 `ROW_NUMBER` 来确定任何分组中的第 n 个结果，或\
  \ top N 结果。\n\n对于我们的方案，我们希望找出业务部门中每个部门薪资第三高的员工。接下来的 SQL 语句在嵌套子查询中使用 `ROW_NUMBER`，使我们能够快速找到每个区域薪资第三高的获得者。\n\
  \n```sql\nselect department_id, last_name, salary as third_salary\nfrom (\n  select\
  \ department_id, last_name, salary,\n    row_number()\n    over (partition by department_id\
  \ order by salary desc) sal_position\n  from hr.employees )\nsal_by_dept\nwhere\
  \ sal_by_dept.sal_position = 3;\n```\n\n```\nDEPARTMENT_ID LAST_NAME THIRD_SALARY\n\
  ------------- --------- -------------\n30 Baida 2900\n50 Kaufling 7900\n60 Austin\
  \ 4800\n80 Errazuriz 12000\n90 De Haan 17000\n100 Chen 8200\n```\n\n每个部门薪资第三高的员工及其相应薪资都被列出。\n\
  \n### 工作原理\n\n我们的方案使用了 Oracle 普遍存在的分析函数 `ROW_NUMBER` 来帮助识别哪些行应作为组内的第 n 项返回。基于 `ROW_NUMBER`\
  \ 的查询结果随后被用作外部查询中的一个内联视图。外部查询通过 `WHERE` 子句来定位目标行。\n\n从内联视图开始，关键组件是 `ROW_NUMBER`\
  \ 函数的 `OVER` 子句。\n\n```sql\nrow_number()\nover (partition by department_id order\
  \ by salary desc) sal_position\n```\n\n在这里，我们指示 Oracle 按 `DEPARTMENT_ID` 将源数据划分为子组。在这些组内，我们按薪资值降序对数据进行排序，然后就可以应用\
  \ `ROW_NUMBER` 值。我们给生成的行号命名为 `SAL_POSITION`。以下是该内联视图产生的（部分）中间工作数据：\n\n```\nDEPARTMENT_ID\
  \ LAST_NAME SALARY SAL_POSITION\n------------- --------- ------- ------------\n\
  ...\n30 Raphaely 11000 1\n30 Khoo 3100 2\n`30` `Baida` `2900` `3`\n30 Tobias 2800\
  \ 4\n...\n50 Fripp 8200 1\n50 Weiss 8000 2\n`50` `Kaufling` `7900` `3`\n50 Vollman\
  \ 6500 4\n...\n```\n\n您可以看到，突出显示的行在其各自部门中拥有第三高的薪资，并被赋予了 `SAL_POSITION` 编号 3，该编号源自我们的\
  \ `ROW_NUMBER` 表达式。\n\n---\n\n(`expression or column`, `lower bound`, `upper bound`,\
  \ `number of buckets`) 从我们方案中的内联视图子查询向外进行，我们首先要求 Oracle 使用 `WIDTH_BUCKET` 根据客户的\
  \ `SUM` 或 `ORDER_TOTAL` 值，在 0 和 500000 的边界之间将我们的数据分成 10 个存储桶。如果我们单独运行内部的 `SELECT`\
  \ 语句，将会收集到以下结果：\n\n```sql\nselect customer_id, sum(order_total),\n  width_bucket(sum(order_total),0,500000,10)\
  \ as total_spend_histogram\nfrom oe.orders\ngroup by customer_id\n```\n\n```\nCUSTOMER_ID\
  \ SUM(ORDER_TOTAL) TOTAL_SPEND_HISTOGRAM\n----------- ---------------- ---------------------\n\
  101 190395.1 4\n102 69211.4 2\n103 20591.4 1\n104 146605.5 3\n105 61376.5 2\n...\n\
  ```\n\n内联视图的结果易于解释。客户 101 在所有订单中的总花费为 190395.10 美元。这使其位于第 4 个存储桶中，该桶包含 150001 到\
  \ 200000 美元之间的值。下一个客户 102 在第 2 个存储桶中，依此类推。\n\n我们在外部 SQL 中使用内联视图的结果，来计算每个存储桶中的客户数量。作为最后的修饰，我们将客户组的直方图存储桶乘以值\
  \ 50000，以按照我们方案问题最初要求的那样，以 50000 的倍数报告直方图。\n\n\n# 第 11 章 ■ 常见的报表问题\n\n从这一点来看，外部查询的操作就清晰了。我们有一个简单的`SELECT`语句，用于从内联视图中选择我们需要的列，以及一个`WHERE`子句，用于查找`SAL_POSITION`等于\
  \ 3 的记录。这个技术是灵活的，因为你只需要改变最后的`WHERE`子句，使用不同的值，就能找到不同的第 n 个值。以下是此方法的通用形式。\n\n```\n\
  select <从内联视图中选择所需的行>\nfrom (\n  select <所需的行>,\n         row_number()\n       \
  \    over (\n             partition by <分区列>\n             order by <用于确定第 n 个值的列>\n\
  \           ) <你的列别名>\n  from <目标表>\n) <内联视图别名>\nwhere <内联视图别名>.<你的列别名> = <第 n 个位置>;\n\
  ```\n\n你可能希望调整的一个方面是排名的确定方式。你可以用`RANK`或`DENSE_RANK`分析函数替代`ROW_NUMBER`，以控制并列或缺失值如何影响你的第\
  \ n 个结果的确定。\n\n##### 11-7. 在数据集上比较假设\n\n### 问题\n\n你有两组或多组类似的数据，需要在集合层面进行比较。具体来说，你想使用一种公认的假设比较方法，处理存储在\
  \ Oracle 中的数据——而无需将数据迁移到其他工具或系统——例如，比较两个州居民的相似购买历史。\n\n### 解决方案\n\nOracle 提供了许多公认的假设检验统计函数，包括用于\
  \ F 检验、T 检验、方差分析（ANOVA）等诸多函数。许多读者可能想知道这些函数到底有什么用，更重要的是，为什么它们可能对比较数据集有用。\n\n统计学学生会知道，像\
  \ T 检验这样的检验有助于建立线性回归模型，并推断两组之间的统计均值和方差的差异。通俗地说，T 检验可以帮助你做出决策，例如，判断你是通过在线渠道还是直接零售店能卖出更多商品，或者了解某个特定收入群体是否影响了你的销售额。T\
  \ 检验告诉你两组之间的差异是真实存在的，还是由抽样或测量误差造成的假象。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n`啤酒与统计确实相配`\n\nT 检验是由爱尔兰健力士啤酒厂的员工发明的，该厂的老板坚信运用统计学可以酿造出更好的啤酒。这包括检查从更优质的啤酒花或大麦可能对啤酒产生什么影响，一直到确定雇佣牛津和剑桥大学的顶尖人才是否会让啤酒厂受益更多。\n\
  \n在其发明之时，T 检验被认为是健力士啤酒最好的商业秘密之一，但幸运的是，时间的推移意味着你可以在商业数据管理任务以及任何你可能喜欢的啤酒饮用中受益于它。\n\
  \n对于我们的方法，我们将尝试确定美国新泽西州和纽约州的居民在相同收入水平上是否具有统计显著性的购买历史。\n\n接下来的`SQL`语句调用了 T 检验的几种不同形式来评估这两组的销售历史数据。\n\
  \n```\nselect substr(cust_income_level, 1, 22) income_level,\n       avg(case when\
  \ cust_state_province = 'NJ' then amount_sold else null end) NJ_sales,\n       avg(case\
  \ when cust_state_province = 'NY' then amount_sold else null end) NY_sales,\n  \
  \     stats_t_test_indepu(cust_state_province, amount_sold, 'STATISTIC', 'NY') T_observed,\n\
  \       stats_t_test_indepu(cust_state_province, amount_sold) two_sided_p_value\n\
  from sh.customers c, sh.sales s\nwhere c.cust_id = s.cust_id\n  and c.cust_state_province\
  \ in ('NY','NJ')\ngroup by rollup(cust_income_level)\norder by income_level, NJ_sales,\
  \ NY_sales, t_observed;\n```\n\n结果起初看起来有点深奥，但对训练有素的人来说，它们表明我们的新泽西州和纽约州居民样本在统计上并不相关，即使在他们收入相似的情况下也是如此。\n\
  \n\n# 第 11 章 ■ 常见报告问题\n\n## 工作原理\n\n我们配方的机制可分为两个部分。第一部分，使用`CASE`表达式以及分组和排序子句来选择薪资等级和平均购买额，这是典型的\
  \ SQL。第二部分是 T 检验技术的核心，来自于两次调用`STATS_T_TEST_INDEPU`函数。\n\n虽然 T 检验的统计定义通常相当复杂，但 Oracle\
  \ 执行的计算可以用通俗的语言来解释。本质上，`STATS_T_TEST_INDEPU`函数检验的是两个我们知道数量不等，并且我们预期其均值存在显著差异的组，*同时*这两个组的方差也不同。\n\
  \n考虑到这些注意事项，我们的检验试图确定两个样本集是否相关，如果是，相关程度如何。用通俗的话说，我们正试图确定新泽西州和纽约州居民的购买习惯是否相似，尽管两个州的购买者数量不同、收入等级不同、购买的产品价值也不同。\n\
  \n我们得出的观测 T 值和双侧检验 P 值在每个收入等级之间差异显著。对于训练有素的统计学家来说，这表明对于我们的许多收入组来说，我们在基础数据中看到的购买行为差异可能是由于抽样误差或所比较的两个收入等级的样本量较小造成的。例如，`190,000\
  \ - 249,999`收入等级的 T 值为`6.66684928`，表明存在显著的抽样问题。查看基础数据，这几乎可以肯定是因为在这个收入等级中，只有一位新泽西州居民进行了一次购买。我们可以有把握地说，该组在统计上与纽约州同一收入等级不具有可比性，或者无关。\n\
  \n| 收入等级                 | 新泽西州销售额 | 纽约州销售额 | 观测 T 值   | 双侧 P 值      |\n|--------------------------|----------------|--------------|-----------|--------------|\n\
  | A: 30,000 以下            | 355.49         |              |           |        \
  \      |\n| B: 30,000 - 49,999       | 69.5092135     | 76.8800909   | .823635357|\
  \ .410381645   |\n| C: 50,000 - 69,999       | 117.665082     | 178.304286   | 2.07992326|\
  \ .038877289   |\n| D: 70,000 - 89,999       | 87.3445326     | 88.2114295   | .107196057|\
  \ .914642507   |\n| E: 90,000 - 109,999      | 117.349201     | 74.2791951   | -3.9997919|\
  \ .000067875   |\n| F: 110,000 - 129,999     | 83.0574793     | 107.932624   | 2.10680901|\
  \ .035346513   |\n| G: 130,000 - 149,999     | 113.41765      | 107.76663    | -.67993691|\
  \ .496585995   |\n| H: 150,000 - 169,999     | 87.9378656     | 75.5795925   | -1.0492257|\
  \ .294347158   |\n| I: 170,000 - 189,999     | 61.99          | 106.499274   | .980448064|\
  \ .422460165   |\n| J: 190,000 - 249,999     | 17.99          | 104.578557   | 6.66684928|\
  \ .008117071   |\n| K: 250,000 - 299,999     | 87.341512      | 8.7281255    | -2.1514597|\
  \ .032154957   |\n| L: 300,000 及以上         | 64.43125       | 126.332644   | 2.79656692|\
  \ .005747719   |\n|                          | 98.6444766     | 95.11524     | -.93404774|\
  \ .350301558   |\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 11-11.\
  \ 用文本图形化表示数据分布\n\n### 问题\n\n你想在基本的 SQL 报告中包含简单的图表或直方图。你不想将数据导出到制图或 GUI 工具，而是希望使用\
  \ SQL 语句和字符串操作在原生 SQL 中创建 ASCII 艺术风格的图形。\n\n### 解决方案\n\n在报告中打印 ASCII 风格图形的需求不一定常见，所以当它出现时，解决方案需要一点横向思维。呈现事物规模的最佳方法之一是使用条形图，在\
  \ Oracle 中，我们可以使用`RPAD`函数将一串相同的字符打印到指定长度，以模拟条形图的外观。\n\n接下来的 SQL 语句使用`RPAD`和简单的计算来打印一个员工工资对比的条形图，该图表由`X`字符组成，以象征特定员工工资的规模。\n\
  \n```sql\nselect employee_id, last_name, rpad('X',floor(salary/1000), 'X') salary_graph\
  \ from hr.employees\norder by salary desc;\n```\n\n结果正好产生我们想要的简单图表。如果有帮助，可以尝试将本书侧过来，使你的图表从底部的\
  \ X 轴“升起”，而不是从侧面。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\n\n# 第十一章\
  \ ■ 常见的报告问题\n\n```\nEMPLOYEE_ID LAST_NAME SALARY_GRAPH\n----------- --------- -------------------------\n\
  100         King      XXXXXXXXXXXXXXXXXXXXXXXX\n101         Kochhar   XXXXXXXXXXXXXXXXX\n\
  102         De Haan   XXXXXXXXXXXXXXXXX\n145         Russell   XXXXXXXXXXXXXX\n\
  146         Partners  XXXXXXXXXXXXX\n201         Hartstein XXXXXXXXXXXXX\n205  \
  \       Higgins   XXXXXXXXXXXX\n108         Greenberg XXXXXXXXXXXX\n147        \
  \ Errazuriz XXXXXXXXXXXX\n168         Ozer      XXXXXXXXXXX\n148         Cambrault\
  \ XXXXXXXXXXX\n...\n```\n\n为了节省空间，我们将结果截断在了十行，但请亲自尝试这个方法，看看具有长尾的 ASCII 图表是什么样子。此技术的其他有用实现方式包括可视化重叠的时间窗口，例如项目任务或资源分配。\n\
  \n## 工作原理\n\n我们这个方法实现图表展示的关键是 `RPAD` 函数，它只是简单地按照指示的次数重复同一个字符——本例中是 `X` 字符。为了创建一个与员工工资成比例的图表，我们只需向\
  \ `RPAD` 传递工资值。在我们的方法中，我们将工资除以 1000 后向下取整，这样可以提供相对大小相同的图表，而无需为薪水最高的员工生成 24000 个\
  \ `X`。\n\n在这个方法中，这意味着工资在 8000 到 9000 之间的人将打印八个 `X`，而工资在 9000 到 10000 之间的人将打印十个 `X`，依此类推。\n\
  \n这个方法有一个特殊之处。`RPAD` 函数遵循 Oracle 的 `NULL` 处理规则，因此我们不能从一个空字符串（Oracle 视为 `NULL`）开始并向其添加\
  \ `X`。在实践中，这意味着 `RPAD` 风格的图表必须至少有一个字符。如果这种低级别的准确性对您很重要，请将 `RPAD` 函数包装在 `CASE` 表达式中，以便为那些应该用无字符表示的行替换一个真正的\
  \ `NULL` 值。\n\n##### 11-9. 直接从数据库生成网页报告\n\n### 问题\n\n您希望直接从数据库生成图形化的网页报告，而无需使用额外的报告应用程序来生成\
  \ HTML。例如，您希望获得所有员工相对工资的图形化描绘。\n\n### 解决方案\n\n虽然您可能不认为 Oracle 是网站的 GUI 设计器，但使用像\
  \ `ROUND`、`TO_CHAR`、`||` 字符串连接和字面字符串这样的简单函数，可以生成构成 HTML 页面或报告的所有文本元素。\n\n下一个 SQL\
  \ 语句构建了所有必需的 HTML，以比较图表的形式展示员工工资。\n\n```sql\nselect\n  case rownum\n    when 1 then\n\
  \      '<html>' || chr(10) ||\n      '<head>' || chr(10) ||\n      '<style type=\"\
  text/css\">' || chr(10) ||\n      ' body {background-color: Lavender;}' || chr(10)\
  \ ||\n      ' table.outer {width: 80%; border: Black solid 1px;}' || chr(10) ||\n\
  \      ' table.inner {width: 100%; border: none;}' || chr(10) ||\n      ' th {background-color:\
  \ LightSteelBlue; color: WhiteSmoke;}' || chr(10) ||\n      ' .bar {background-color:\
  \ LightSlateGray;}' || chr(10) ||\n      ' .empty {background-color: Lavender;}'\
  \ || chr(10) ||\n      ' .left {text-align: left; padding-left: 5px;}' || chr(10)\
  \ ||\n      ' .right {text-align: right; padding-right: 5px;}' || chr(10) ||\n \
  \     '</style>' || chr(10) ||\n      '</head>' || chr(10) ||\n      '<body>' ||\
  \ chr(10) ||\n      '<center>' || chr(10) ||\n      '<table class=\"outer\">' ||\
  \ chr(10) ||\n      '<tr>' || chr(10) ||\n      '<th width=\"15%\">Employee ID</th>'\
  \ || chr(10) ||\n      '<th width=\"20%\">Last Name</th>' || chr(10) ||\n      '<th>Salary\
  \ Graph</th>' || chr(10) || '</tr>'\n    else ''\n  end ||\n  '<tr><td class=\"\
  right\">' || to_char(employee_id) || '</td>' || chr(10) ||\n  '<td class=\"left\"\
  >' || last_name || '</td>' || chr(10) ||\n  '<td class=\"left\">' ||\n    '<table\
  \ class=\"inner\">' || chr(10) ||\n    '<tr><td class=\"bar\" width=\"' ||\n   \
  \   to_char(round(100 * salary / maxsalary)) ||\n      '%\">' || chr(38) || 'nbsp;</td>'\
  \ || chr(10) ||\n    '<td class=\"empty\" width=\"' ||\n      to_char(100 - round(100\
  \ * salary / maxsalary)) ||\n      '%\">' || chr(38) || 'nbsp;</td></tr>' || chr(10)\
  \ ||\n    '</table></td></tr>' || chr(10) ||\n  case rownum\n```\n\n\n# 第 11 章 ■\
  \ 常见报表问题\n\n## 工作原理\n\n不要被用于生成我们 HTML 的 SQL 语句的长度吓倒。我们可以将该语句分解为四个部分，使其易于理解，之后你就会明白创建更复杂的\
  \ HTML 输出是多么简单。\n\n从本方法末尾的内联视图开始，我们查询基础员工薪资数据，以获取几个有助于构建 HTML 的值。我们内联视图的 SQL 如下所示，后面是单独运行时的输出。\n\
  \n```sql\nselect employee_id, last_name, salary,\ncount(*) over () as row_count,\n\
  max(salary) over () as maxsalary\nfrom hr.employees\norder by salary desc\n```\n\
  \n```\nEMPLOYEE_ID LAST_NAME SALARY ROW_COUNT MAXSALARY\n----------- --------- ------\
  \ --------- ---------\n100 King 24000 110 24000\n101 Kochhar 17000 110 24000\n102\
  \ De Haan 17000 110 24000\n145 Russell 14010 110 24000\n146 Partners 13510 110 24000\n\
  ...\n```\n\n我们选择员工的 ID、姓氏和`薪资`，并将其与分析函数结合，以返回结果集中的总行数以及最高薪资。\n\n我们开始在 SQL 的前面部分使用其中一些值。我们的方法通过连接字面量来构建报告的完整\
  \ HTML 页头和页脚。它通过评估外部`SELECT`语句的`ROWNUM`来确定将页头和页脚注入结果的正确位置。控制这部分的方法的简略片段如下所示。\n\n\
  ```sql\nselect\ncase rownum\nwhen 1 then\n<许多连接以形成 HTML 页头的字面量字符串>\nelse ''\nend\
  \ ||\n...\ncase rownum\nwhen row_count then\n<连接以形成 HTML 页脚的字面量字符串>\nelse ''\nend\n\
  ...\n```\n\n当处理第一行结果（`ROWNUM`为 1）时，对于 HTML 报告的正文，我们的方法会添加所有必要的 HTML 页头。当遇到`ROWNUM`等于内联视图中计算出的`ROW_COUNT`的那一行时，它知道已经遇到了结果的最后一行。此时，它会追加\
  \ HTML 页脚。\n\n我们方法的剩余部分是构建带有彩色条以表示比较薪资水平的表格行的部分。`SELECT`语句的这部分如下所示。\n\n```sql\n\
  ...\n'<tr><td class=\"right\">' || to_char(employee_id) || '</td>' || chr(10) ||\n\
  '<td class=\"left\">' || last_name || '</td>' || chr(10) ||\n'<td class=\"left\"\
  >' ||\n'<table class=\"inner\">' || chr(10) ||\n'<tr> <td class=\"bar\" width=\"\
  ' ||\nto_char(round(100 * salary / maxsalary)) ||\n'%\">' || chr(38) || 'nbsp;</td>'\
  \ || chr(10) ||\n```\n\n生成的文本是产生网页所需的完整 HTML 页面。一个简短的示例如下文本块所示：\n\n```html\n<html>\n\
  <head>\n<style type=\"text/css\">\nbody {background-color: Lavender;}\ntable.outer\
  \ {width: 80%; border: Black solid 1px;}\ntable.inner {width: 100%; border: none;}\n\
  th {background-color: LightSteelBlue; color: WhiteSmoke;}\n.bar {background-color:\
  \ LightSlateGray;}\n.empty {background-color: Lavender;}\n.left {text-align: left;\
  \ padding-left: 5px;}\n.right {text-align: right; padding-right: 5px;}\n</style>\n\
  </head>\n<body>\n<center>\n<table class=\"outer\">\n<tr>\n<th width=\"15%\">员工 ID</th>\n\
  <th width=\"20%\">姓氏</th>\n<th>薪资图表</th>\n</tr><tr><td class=\"right\">100</td>\n\
  <td class=\"left\">King</td>\n<td class=\"left\"><table class=\"inner\">\n<tr><td\
  \ class=\"bar\" width=\"100%\">&nbsp;</td>\n<td class=\"empty\" width=\"0%\">&nbsp;</td></tr>\n\
  </table></td></tr>\n...\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 32](img/index-311_1.png)\n\n当然，阅读原始 HTML 并不能完全给你图形化的冲击力，因此，将结果假脱机到文件并在浏览器中查看的效果如图\
  \ 11-3 所示。\n\n`图 11-3.` 在浏览器中显示的薪资 HTML 报告输出\n\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n# 第 11 章 ■ 常见报表问题\n\n```sql\n'<td class=\"empty\" width=\"' ||\nto_char(100 -\
  \ round(100 * salary / maxsalary)) ||\n'%\">' || chr(38) || 'nbsp;</td></tr>' ||\
  \ chr(10) ||\n'</table></td></tr>' || chr(10) ||\n...\n```\n\nHTML 报表的主体是一个表格生成的，其中每一行本身也是一个表格。这些独立的行具有由两个表格单元格构成的表格结构。以粗体显示的代码是计算的核心。首先，左侧的表格单元格宽度被设定为与员工工资占最高工资的比例成正比。因此，对于工资为\
  \ 24000（即最高工资）的员工 King，这个表格单元格的宽度占外部表格宽度的 100%。该员工的右侧单元格宽度则计算为 100 减去为第一个单元格计算出的百分比。对于\
  \ King 来说，这意味着右侧单元格宽度为零。HTML 头部包含样式表信息，将左侧单元格颜色设为蓝色，而右侧单元格颜色则与背景色匹配，使其看起来是透明的。\n\
  \n随着我们在内联视图中浏览的员工其`SALARY`金额占最高工资的比例越来越小，左侧表格单元格的尺寸会按比例缩小，而右侧表格单元格的尺寸则会按比例增长。这就能呈现出表示比例工资的、尺寸正确的图形条效果。\n\
  \n■ **注意** 我们要感谢我们出色的技术编辑 Stéphane Faroult，感谢他为本配方提供的想法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 12 章\n\n■ ■ ■\n\n# 清洗数据\n\
  \n有时，你会发现自己在从某些数据源提取信息并将其导入关系数据库的环境中工作。信息的来源可能是电子表格、CSV 文件、其他数据库等等。例如，在数据仓库环境中，从几个不同的数据库源获取数据并将其导入到一个集中的报表数据库是很常见的做法。\n\
  \n当将数据从一个源移动到另一个目标时，如果源数据类型与目标数据类型不同，有时会出现转换问题。在这些情况下，你必须检查源数据，以确保它可以加载到目标数据库中。例如，你可能有一个需要导入到\
  \ Oracle 数据库中 `TIMESTAMP` 数据类型字段的字符串。或者，你可能正在从一个没有为表定义主键的系统迁移数据，那么在加载到目标数据库之前，你需要检测出任何重复的行。\n\
  \n在某些环境中，你可能有一个自动化的 ETL（提取、转换和加载）过程来执行数据清洗。然而，即使你使用的是功能丰富的 ETL 工具，你仍然会遇到需要快速使用 SQL\
  \ 来对数据问题进行故障排除的情况。如果 ETL 过程中断或产生不一致的结果，你将不得不使用 SQL 来验证数据。\n\n在传输数据时，你会发现需要使用 SQL\
  \ 来确保数据符合目标数据库的业务规则。这类活动被广泛地称为 *数据清洗*（或数据清理）。本章展示了开发人员和 DBA 在将数据从一个数据源移动到另一个数据源时常用的\
  \ SQL 技术。\n\n##### 12-1. 检测重复行\n\n### 问题\n\n你正尝试向一个表添加主键约束：\n\n```sql\nalter table\
  \ d_prods add constraint d_prods_pk primary key(d_prod_id);\n```\n\n287\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n# 第 12 章 ■ 清洗数据\n\n然后你收到了这条错误消息：\n\n```\nORA-02437: cannot validate (STAR1.D_PRODS_PK)\
  \ - primary key violated\n```\n\n你需要找出哪些行是重复的。\n\n### 解决方案\n\n使用带有 `GROUP BY` 和\
  \ `HAVING COUNT` 子句的 `SELECT` 语句。下面的代码清单根据 `PARTY_ID` 列中的值显示了 `PARTIES` 表中的重复行：\n\
  \n```sql\nselect\ncount(*)\n```\n\n\n\n# 第 12 章 ■ 数据清洗\n\n##### 12-2. 删除重复行\n\n\
  ### 问题\n你想要从表中删除重复的行。\n\n### 解决方案\n使用关联子查询从表中删除重复行。以下示例从 `PARTIES` 表中删除 `PARTY_ID`\
  \ 列上存在重复值的重复行：\n\n```\ndelete from parties a\nwhere a.rowid <\n    (select max(b.rowid)\n\
  \       from parties b\n      where a.party_id = b.party_id);\n```\n\n在执行这样的删除语句之前，你应该先运行一个类似于配方\
  \ 12-1 的查询，以确定将有多少数据会被删除。\n\n### 工作原理\n数据库中的每一行都有一个唯一的 `ROWID`。解决方案部分中的 `DELETE`\
  \ 语句将任意删除所有具有相同 `PARTY_ID` 的行，只保留 `ROWID` 最高的那一行。\n\n如果你的唯一标识符由多个列组成，请在关联子查询的 `WHERE`\
  \ 子句中使用所有这些列。例如，如果你的逻辑主键由 `FIRST_NAME` 和 `LAST_NAME` 组成，请执行以下 SQL 语句来删除重复项：\n\n\
  ```\ndelete from parties a\nwhere a.rowid <\n    (select max(b.rowid)\n       from\
  \ parties b\n      where a.first_name = b.first_name\n        and a.last_name =\
  \ b.last_name);\n```\n\n接下来列出的是本配方解决方案部分中 SQL 的一个轻微变体：\n\n```\ndelete from parties\n\
  \ where rowid not in\n    (select max(rowid)\n       from parties\n      group by\
  \ party_id);\n```\n\n使用此查询还是前一个查询，取决于 SQL 编码偏好。如果你为每个查询生成执行计划，你会注意到两者在成本上差异不大。\n\
  \n## 12-3. 判断数据是否可以作为数值加载\n\n### 问题\n你有一个在旧系统中被定义为字符串的字段，但在新数据库中将迁移到数值型字段。你已经将数据加载到一个临时的暂存表中，并且想要确定是否有任何字符数据无法干净地转换为数值数据类型。\n\
  \n### 解决方案\n你需要创建一个小的 PL/SQL 函数：\n\n```\ncreate or replace function isnum(v_in varchar2)\n\
  return varchar is\n  val_err exception;\n  pragma exception_init(val_err, -6502);\
  \ -- 字符到数字转换错误\n  scrub_num number;\nbegin\n  scrub_num := to_number(v_in);\n  return\
  \ 'Y';\nexception\n  when val_err then\n    return 'N';\nend;\n/\n```\n\n如果传入 `ISNUM`\
  \ 函数的值是一个数字，则返回 `Y`。如果该值无法转换为数字，则返回 `N`。\n\n### 工作原理\n你可以使用 `ISNUM` 函数来检测列中的数据是否为数值。该函数为\
  \ `ORA-06502` 字符到数字转换错误定义了一个 PL/SQL 预编译异常。当遇到此错误时，异常处理程序会捕获它并返回 `N`。\n\n你可以使用此函数来判断一个字符是否能转换为数字。例如，假设你有一个名为\
  \ `STAGE` 的表，其中包含一个名为 `HOLD_COL` 的列，其值如下：\n\n```\nHOLD_COL\n------------------------------\n\
  1\nc\n3\n$\n```\n\n\n\n# 数据清洗技术笔记\n\n## 1032.22\n\n**32423432234234432x**\n\n以下查询使用\
  \ `ISNUM` 函数来判断表中是否存在非数值数据：\n\n`select hold_col from stage where isnum(hold_col)='N';`\n\
  \n预期输出如下：\n\n`HOLD_COL`\n`------------------------------`\n`c`\n`$`\n`32423432234234432x`\n\
  \n## 12-4. 判断数据是否能作为日期加载\n\n### 问题\n旧系统中定义为字符串的字段，在新数据库中将迁移到日期数据类型。数据已加载到临时暂存表中，需要确定是否有字符数据无法干净地转换为日期数据类型。\n\
  \n### 解决方案\n需要创建一个小型 PL/SQL 函数：\n\n```\ncreate or replace function isdate(p_in varchar2,\
  \ f_in varchar2)\nreturn varchar is\n  scrub_dt date;\nbegin\n  scrub_dt := to_date(p_in,\
  \ f_in);\n  return 'Y';\nexception when others then\n  return 'N';\nend;\n/\n```\n\
  \n`ISDATE` 函数接受两个值：字符数据和日期格式掩码。如果传入函数的值是有效日期，则返回 `Y`。如果无法转换为日期，则返回 `N`。\n\n### 工作原理\n\
  `ISDATE` 函数可用于检测列中的字符数据是否有效。例如，假设有一个名为 `STAGE` 的表，其中包含一个名为 `HOLD_COL` 的列，其值如下：\n\
  \n`HOLD_COL`\n`------------------------------`\n`20090130`\n`20090132`\n`20090229`\n\
  `20091430`\n`20090330`\n\n以下查询使用 `ISDATE` 函数判断是否有字符数据不符合 `YYYYMMDD` 日期格式：\n\n`select\
  \ hold_col`\n`from stage`\n`where isdate(hold_col,'YYYYMMDD') = 'N';`\n\n无法映射到有效日期的值如下：\n\
  \n`HOLD_COL`\n`------------------------------`\n`20090132`\n`20090229`\n`20091430`\n\
  \n## 12-5. 执行大小写不敏感查询\n\n### 问题\n已加载大量大小写混合的数据。希望查询时如同数据全是小写（或全是大写）。\n\n### 解决方案\n\
  如果使用的是 Oracle Database 10 *g* 或更高版本，可以使用 `ALTER SESSION` 语句来启用大小写不敏感的 `>`、`<` 和\
  \ `=` 比较运算符。要启用大小写不敏感搜索，需修改 `NLS_SORT` 和 `NLS_COMP` 参数：\n\n`alter session set nls_sort=binary_ci;`\n\
  `alter session set nls_comp=linguistic;`\n\n这些设置允许进行大小写不敏感的搜索。可以运行以下查询来选择所有 `john`\
  \ 值（不区分大小写）：\n\n`select * from parties where first_name = 'john';`\n\n`FIRST_NAME`\n\
  `------------------------------`\n`John`\n`JOHN`\n`john`\n\n### 工作原理\n在 Oracle Database\
  \ 10 *g* 之前，必须使用 `UPPER` 或 `LOWER` SQL 函数来执行大小写不敏感的搜索，例如：\n\n`select * from parties\
  \ where upper(first_name) = 'JOHN';`\n\n■ **提示**：Oracle 不会访问对列应用了 SQL 函数的索引。为了解决这个问题，可以创建基于函数的索引。\n\
  \n其他确保搜索中不受大小写影响的常用技术包括：\n\n- 使用触发器强制字符串以全大写或全小写插入。\n- 在表中添加一列，用于存储该字符串的全大写或全小写版本。\n\
  \n在 Oracle Database 10 *g* 或更高版本中，将 `NLS_SORT` 设置为 `BINARY_CI` 并将 `NLS_COMP` 设置为\
  \ `LINGUISTIC` 的组合会指示 SQL 在比较操作时忽略大小写。`NLS_SORT` 参数确定字符数据的排序类型。`NLS_SORT` 设置为 `BINARY_CI`\
  \ 表示排序行为不区分大小写。`NLS_COMP` 参数影响 SQL 操作的行为。将 `NLS_COMP` 设置为 `LINGUISTIC` 会指示 SQL 执行值的语言学比较。\n\
  \n\n\n# 二进制排序与语言排序\n\n对字符数据进行排序时，排序通常基于字符编码方案的数值。这被称为二进制排序。二进制排序在处理英文字母时效果良好，因为\
  \ ASCII 和 EBCDIC 字符编码方案为英文字母定义了升序的数值。\n\n例如，字符 `A` 的 ASCII 十进制值为 65；字符 `B` 的十进制值为\
  \ 66，依此类推。\n\n然而，当存在非英语语言的字符时，排序可能会产生不理想的结果。在这种情况下，基于所使用语言的语言排序顺序更为合适。例如，要指定法语语言排序：\n\
  \n```sql\nalter session set nls_sort = French;\n```\n\n你可以通过在 SQL 语句中直接使用 `NLSSORT`\
  \ 函数来覆盖会话设置：\n\n```sql\nselect first_name from parties\norder by nlssort(first_name,'nls_sort\
  \ = French');\n```\n\n## 12-6. 数据混淆\n\n### 问题\n\n你的数据库正在接受审计，但它包含姓名和社会保障号码等应保持私密的信息。你需要以一种无法直接读取该数据的形式向审计员展示，但审计员仍然能够察觉数据中的模式。如果审计过程发现欺诈行为，则可以根据具体情况提供真实的姓名和社会保障号码。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 12 章 ■ 数据清洗\n\n### 解决方案\n\
  \n使用内置的 SQL 函数 `TRANSLATE` 将每个字符值转换为另一个不同的值。这里是一个简单的例子：\n\n```sql\nselect translate('ORACLE',\n\
  \                 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',\n                 'ZYXWVUTSRQPONMLKJIHGFEDCBA')\n\
  from dual;\n```\n\n输出如下：\n\n```\nTRANSL\n------\nLIZXOV\n```\n\n要将混淆后的值转回其原始值，再次使用\
  \ `TRANSLATE` 函数：\n\n```sql\nselect translate('LIZXOV',\n                 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',\n\
  \                 'ZYXWVUTSRQPONMLKJIHGFEDCBA')\nfrom dual;\n```\n\n如果你需要混淆大量数据，将\
  \ `TRANSLATE` 函数放在 PL/SQL 包中并使用该包来混淆数据会更高效。这里是一个简单的例子：\n\n```sql\ncreate or replace\
  \ package obfus is\n  function obf(clear_string varchar2) return varchar2;\n  function\
  \ unobf(obs_string varchar2) return varchar2;\nend obfus;\n/\n--\ncreate or replace\
  \ package body obfus is\n  fromstr varchar2(62) := '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'\
  \ ||\n                          'abcdefghijklmnopqrstuvwxyz';\n  tostr   varchar2(62)\
  \ := 'defghijklmnopqrstuvwxyzabc3456789012' ||\n                          'KLMNOPQRSTUVWXYZABCDEFGHIJ';\n\
  --\n  function obf(clear_string varchar2) return varchar2 is\n  begin\n    return\
  \ translate(clear_string, fromstr, tostr);\n  end obf;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 12 章 ■ 数据清洗\n\n```sql\n--\n  function unobf(obs_string varchar2) return varchar2\
  \ is\n  begin\n    return translate(obs_string, tostr, fromstr);\n  end unobf;\n\
  end obfus;\n/\n```\n\n现在，可以通过调用 `OBF` 函数来混淆表中的列：\n\n```sql\nupdate emp set emp_name\
  \ = obfus.obf(emp_name),\n               ssn      = obfus.obf(ssn);\n```\n\n可以使用\
  \ `UNOBF` 函数将列值设置回其原始值：\n\n```sql\nupdate emp set emp_name = obfus.unobf(emp_name),\n\
  \               ssn      = obfus.unobf(ssn);\n```\n\n> **注意** 这种用字母表中固定位置之后的另一个字符来替代单个字母字符的过程，在密码学中被称为*凯撒密码*。例如，单字符移位意味着\
  \ `A` 由 `B` 表示，`B` 由 `C` 表示，依此类推。该方法得名于罗马皇帝尤利乌斯·凯撒，他使用这种加密技术与他的将军们通信。\n\n在某些情况下，你可能需要对数据进行混淆。混淆是将数据改动到足以让真实值无法通过简单查看数据就被识别出来的程度。混淆*并非*一种使数据不可读的安全方式，也不是加密的替代品。\n\
  \n\n\n加密是一种安全的方法，可以使数据不可读且难以解密。如果你需要加密数据，请使用 `DBMS_CRYPTO` 包或 `Oracle Advanced Security`\
  \ 选项中提供的加密功能。\n\n当你需要使数据不可读但仍保留一般字符模式时，混淆可能更合适。在这些情况下，加密效果不佳，因为它会将数据转换为超出正常 ASCII\
  \ 字符范围的值。\n\n## 工作原理\n\n`TRANSLATE` 函数执行逐字符替换，一次替换一个字符。它接受三个输入参数：要翻译的字符串、源字符和目标字符。\n\
  \n`TRANSLATE` 函数非常适合数据混淆。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  # 第 12 章 ■ 数据清理\n\n有时 `TRANSLATE` 函数会与 `REPLACE` 函数混淆，但 `REPLACE` 函数是用一个字符串替换另一个字符串，而\
  \ `TRANSLATE` 函数则是交换一个字符与另一个字符。以下是一个使用 `REPLACE` 的简单示例：\n\n```sql\nselect replace('scrappple','ppp','bb')\n\
  from dual;\n```\n\n输出显示 `ppp` 字符串已被 `bb` 字符串替换：\n\n```\nREPLACE\n--------\nscrabble\n\
  ```\n\n##### 12-7. 删除所有索引\n\n### 问题\n\n你正在向表中插入大量数据，并希望尽可能快地加载数据。出于性能考虑，你希望在插入数据之前删除表上的索引。\n\
  \n### 解决方案\n\n为表删除所有索引的最简单方法是使用 SQL 生成所需的 SQL。以下示例生成为 `F_SALES` 表删除所有索引所需的 SQL：\n\
  \n```sql\nselect 'drop index ' || index_name || ';'\nfrom user_indexes where table_name='F_SALES';\n\
  ```\n\n以下是一些示例输出：\n\n```\n'DROPINDEX'||INDEX_NAME||';'\n------------------------------------------\n\
  drop index F_SALES_FK1;\ndrop index F_SALES_FK2;\ndrop index F_SALES_FK3;\ndrop\
  \ index F_SALES_FK4;\ndrop index F_SALES_FK5;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n# 第 12 章 ■ 数据清理\n\n### 工作原理\n\n在加载大型数据仓库表时，有时在加载前删除表的索引，然后在数据加载完成后重新创建它们，效率会更高。这对于与星型模式事实表关联的位图索引尤其如此。\n\
  \n在删除任何索引之前，请确保你有重新创建索引所需的 DDL。你不想让自己陷入删除了索引却不知道如何重新创建它们的境地。理想情况下，你拥有用于创建索引的原始 DDL\
  \ 脚本。如果没有，请使用 `DBMS_METADATA` 包来生成索引创建 DDL，如下所示：\n\n```sql\nselect dbms_metadata.get_ddl('INDEX',\
  \ index_name)\nfrom user_indexes\nwhere table_name = upper('&table_name');\n```\n\
  \n如果你从 `SQL*Plus` 运行前面的 SQL，请务必将 `LONG` 变量设置为一个较大的值，以便能够查看所有文本。\n\n删除和重新创建索引的另一种方法是将它们标记为不可用，然后重建它们。以下是一个生成用于将表的所有索引更改为不可用状态所需\
  \ SQL 的脚本：\n\n```sql\nselect 'alter index ' || index_name || ' unusable;'\nfrom\
  \ user_indexes where table_name=upper('&table_name');\n```\n\n以下是一个生成用于重建表的所有索引所需\
  \ SQL 的脚本：\n\n```sql\nselect 'alter index ' || index_name || ' rebuild;'\nfrom user_indexes\
  \ where table_name=upper('&table_name');\n```\n\n如果你想在脚本中捕获解决方案部分中的 SQL 语句输出，请使用\
  \ `SQL*Plus` 的 `SET` 命令关闭一些默认的反馈设置，如下列代码所示：\n\n```sql\nset verify off feedback off\
  \ pagesize 0\nspool drop_ind.sql\nselect 'drop index ' || index_name || ';'\nfrom\
  \ user_indexes where table_name='F_SALES';\nspool off;\n```\n\n`VERIFY` 参数会关闭包含替换变量的行的前后图像。\n\
  \n\n\n`FEEDBACK` 参数控制显示受 SQL 语句影响的行数。当 `PAGESIZE` 参数设置为 `0` 时，将抑制标题和分页符。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n# 第 12 章 ■ 数据清理\n\n关闭各种显示设置后，脚本使用 `SPOOL` 命令将输出发送到文件。现在，您可以按如下方式运行捕获的输出文件中包含的删除命令：`SQL>\
  \ @drop_ind.sql`\n\n##### 12-8. 禁用约束\n\n### 问题\n您试图截断一个表，但收到以下错误消息：`ORA-02266: unique/primary\
  \ keys in table referenced by enabled foreign keys`。进一步调查后，您发现 Oracle 不允许在父表（其主键被子表中的启用外键引用）上执行截断操作。您需要在继续截断操作之前禁用外键约束。\n\
  \n### 解决方案\n如果您需要截断父表，必须首先禁用所有引用该父表主键的已启用外键约束。运行此查询以确定需要禁用的约束名称：\n\n```sql\nselect\n\
  \  b.table_name primary_key_table\n ,a.table_name fk_child_table\n ,a.constraint_name\
  \ fk_child_table_constraint\nfrom dba_constraints a\n    ,dba_constraints b\nwhere\
  \ a.r_constraint_name = b.constraint_name\n  and a.r_owner = b.owner\n  and a.constraint_type\
  \ = 'R'\n  and b.owner = upper('&table_owner')\n  and b.table_name = upper('&table_name');\n\
  ```\n\n在此示例中，只有一个外键依赖项：\n\n```\nPRIMARY_KEY_TABLE FK_CHILD_TABLE        FK_CHILD_TABLE_CONST\n\
  -------------------- -------------------- --------------------\nD_DATES        \
  \      F_SALES              F_SALES_FK1\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n# 第 12 章 ■ 数据清理\n\n使用 `ALTER TABLE` 语句禁用表上的约束。在本例中，只有一个外键需要禁用：\n\n`alter table\
  \ f_sales disable constraint f_sales_fk1;`\n\n现在可以截断父表了：\n\n`truncate table d_dates;`\n\
  \n截断操作完成后，不要忘记重新启用外键约束，如下所示：\n\n`alter table f_sales enable constraint f_sales_fk1;`\n\
  \n在多用户系统中，有可能在外部键约束被禁用期间，另一个会话已向子表插入数据。如果发生这种情况，当您尝试重新启用外键时，会看到以下错误：\n\n`ORA-02298:\
  \ cannot validate (<owner>.<constraint>) - parent keys not found`。在这种情况下，您可以使用 `ENABLE\
  \ NOVALIDATE` 子句。这指示 Oracle 不验证任何现有行，但验证在约束重新启用后添加的行：`alter table f_sales enable\
  \ novalidate constraint f_sales_fk1;`\n\n要清理违反约束的行，首先确保在您的模式中已创建 `EXCEPTIONS` 表。如果没有\
  \ `EXCEPTIONS` 表，请使用此脚本创建一个：`SQL> @?/rdbms/admin/utlexcpt.sql`\n\n接下来，使用 `EXCEPTIONS\
  \ INTO` 子句将违反约束的行填充到 `EXCEPTIONS` 表中：\n\n```sql\nalter table f_sales modify constraint\
  \ f_sales_fk1 validate\nexceptions into exceptions;\n```\n\n只要存在违反约束的行，此语句仍将抛出 `ORA-02298`\
  \ 错误。该语句还会将任何有问题的行的记录插入到 `EXCEPTIONS` 表中。现在，您可以使用 `EXCEPTIONS` 表的 `ROW_ID` 列来删除任何违反约束的记录。\n\
  \n这里我们看到需要从 `F_SALES` 表中删除一行：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n# 第 12 章 ■ 数据清理\n\n```sql\nselect * from exceptions;\n```\n\n```\nROW_ID     \
  \       OWNER        TABLE_NAME    CONSTRAINT\n----------------- ------------ -------------\
  \ ---------------\nAAAFVmAAFAAAAihAAA INV_MMGT    F_SALES       F_SALES_FK1\n```\n\
  \n要删除有问题的记录，请发出 `DELETE` 语句：\n\n`delete from f_sales where rowid = 'AAAFVmAAFAAAAihAAA';`\n\
  \n\n# 工作原理\n\nOracle 的一个便利特性是，你可以禁用和启用约束，而无需删除并重新创建它们。这意味着你无需手头准备重新创建已删除约束所需的 DDL\
  \ 语句。\n\n如果一个表定义了主键，并且该主键被子表中一个已启用的外键约束引用，你就不能 `TRUNCATE` 该表——即使子表中没有任何行。Oracle\
  \ 会阻止你这样做，因为在多用户系统中，在你截断子表之后和随后截断父表之前的间隙，另一个会话有可能向子表中插入行。\n\n在这种情况下，Oracle 谨慎地不允许你截断父表。\n\
  \n同时请记住，`TRUNCATE` 是一个 DDL 命令，它执行后会自动提交当前事务。因此，你无法回滚 `TRUNCATE` 操作，也无法将两个独立表的 `TRUNCATE`\
  \ 操作作为单个事务处理。请将 `TRUNCATE` 的行为与 `DELETE` 进行比较。\n\nOracle 确实允许你在约束（引用子表的约束）启用的情况下，使用\
  \ `DELETE` 语句从父表中删除行。这是因为 `DELETE` 会生成撤销数据、具有读一致性，并且可以被回滚。\n\n你可以使用 `DISABLE` 子句的\
  \ `CASCADE` 选项来禁用主键和所有依赖的外键约束。例如，下面这行代码禁用了与 `D_DATES_PK` 主键约束相关的所有外键约束：\n\n```sql\n\
  alter table d_dates disable constraint d_dates_pk cascade;\n```\n\n前面的语句不会级联通过所有依赖层级。它只会禁用直接依赖于\
  \ `D_DATES_PK` 的外键约束。另外请记住，没有 `ENABLE...CASCADE` 语句。要重新启用约束，你必须查询数据字典来确定哪些约束已被禁用，然后逐个重新启用它们。\n\
  \n有时在加载数据时，你会遇到这种情况：在加载数据前（例如从模式级别导入）禁用所有外键会很方便。在这些情况下，`imp` 工具只是按字母顺序导入表，并不确保子表在父表之前导入。此外，你可能希望并行运行多个导入作业以利用并行硬件。在这种场景下，你可以禁用外键，执行导入，然后重新启用外键。下面是一个使用\
  \ SQL 生成 SQL 来禁用某个用户所有外键约束的脚本：\n\n```sql\nset lines 132 trimsp on head off feed\
  \ off verify off echo off pagesize 0\nspo dis_dyn.sql\nselect 'alter table ' ||\
  \ a.table_name\n|| ' disable constraint ' || a.constraint_name || ';'\nfrom dba_constraints\
  \ a\n,dba_constraints b\nwhere a.r_constraint_name = b.constraint_name\nand a.r_owner\
  \ = b.owner\nand a.constraint_type = 'R'\nand b.owner = upper('&table_owner');\n\
  spo off;\n```\n\n这个脚本生成一个名为 `dis_dyn.sql` 的文件，该文件禁用了某个用户的所有外键约束。接下来列出的是一个类似的脚本，用于生成一个包含重新启用某个用户外键约束命令的文件：\n\
  \n```sql\nset lines 132 trimsp on head off feed off verify off echo off pagesize\
  \ 0\nspo enable_dyn.sql\nselect 'alter table ' || a.table_name\n|| ' enable constraint\
  \ ' || a.constraint_name || ';'\nfrom dba_constraints a\n,dba_constraints b\nwhere\
  \ a.r_constraint_name = b.constraint_name\nand a.r_owner = b.owner\nand a.constraint_type\
  \ = 'R'\nand b.owner = upper('&table_owner');\nspo off;\n```\n\n启用约束时，默认情况下 Oracle\
  \ 会检查数据是否违反约束定义。如果你相当确定数据完整性良好，并且不想因为重新验证约束而产生性能开销，那么在重新启用约束时可以使用 `NOVALIDATE` 子句。下面是一个例子：\n\
  \n```sql\nselect 'alter table ' || a.table_name\n|| ' modify constraint ' || a.constraint_name\
  \ || ' enable novalidate;'\nfrom dba_constraints a\n,dba_constraints b\nwhere a.r_constraint_name\
  \ = b.constraint_name\nand a.r_owner = b.owner\nand a.constraint_type = 'R'\nand\
  \ b.owner = upper('&table_owner');\n```\n\n`NOVALIDATE` 子句指示 Oracle 不验证正在启用的约束，但它会强制执行任何新的\
  \ DML 活动都必须遵守约束定义。\n\n你可能还会遇到需要禁用主键或唯一键约束的情况。例如，你可能想执行大规模数据加载，并且出于性能原因，你想禁用主键和唯一键约束。你不想为插入的每一行都进行检查而产生开销。\n\
  \n用于禁用外键的通用技术同样适用于禁用主键或唯一键。运行此查询以显示某个用户的主键和唯一键约束：\n\n```sql\nselect\na.table_name\n\
  ,a.constraint_name\n,a.constraint_type\nfrom dba_constraints a\nwhere a.owner =\
  \ upper('&table_owner')\nand a.constraint_type in ('P','U')\norder by a.table_name;\n\
  ```\n\n以下是一些示例输出：\n\n```\nTABLE_NAME                     CONSTRAINT_NAME       \
  \         C\n------------------------------ ------------------------------ -\nDEPT\
  \                           SYS_C006507                    P\nD_DATES          \
  \              D_DATES_UK1                    U\nD_DATES                       \
  \ D_DATES_PK                     P\n```\n\n一旦确定了表名和约束名，就使用 `ALTER TABLE` 语句来禁用约束：\n\
  \n```sql\nalter table d_dates disable constraint d_dates_pk;\n```\n\nOracle 不允许你禁用被外键引用的主键或唯一键约束。你必须先禁用外键约束。\n\
  \n此外，如果你确信数据不需要验证，请考虑使用 `NOVALIDATE` 子句：\n\n```sql\nalter table d_dates modify constraint\
  \ d_dates_pk enable novalidate;\n```\n\n这将指示 Oracle 在启用约束时不验证数据，但会对约束启用后修改的任何数据进行验证。\n\
  \n## 禁用触发器\n\n### 问题\n\n你正准备加载大量数据。在向表中插入数据时，你不想让触发器影响性能。此外，你想按原样加载源数据；你不希望触发器在数据加载时执行并修改数据。你想在执行数据加载前禁用触发器。\n\
  \n### 解决方案\n\n你可以禁用单个触发器或表上的所有触发器。你可以通过查询 `DBA/ALL/USER_TRIGGERS` 视图来查看表的触发器。例如：\n\
  \n```sql\nselect trigger_name, status\nfrom user_triggers where table_name='CLUSTER_BUCKETS';\n\
  ```\n\n输出如下：\n\n```\nTRIGGER_NAME                  STATUS\n------------------------------\
  \ --------\nCLUSTER_BUCKETS_BU_TR1        ENABLED\n```\n\n现在使用 `ALTER TRIGGER` 语句来禁用触发器：\n\
  \n```sql\nalter trigger CLUSTER_BUCKETS_BU_TR1 disable;\n```\n\n如果你想禁用表上的所有触发器，请使用\
  \ `ALTER TABLE...DISABLE ALL TRIGGERS` 语句：\n\n```sql\nalter table cluster_buckets\
  \ disable all triggers;\n```\n\n将数据加载到表中后，你可以按如下方式重新启用所有触发器：\n\n```sql\nalter table\
  \ cluster_buckets enable all triggers;\n```\n\n\n# 第 12 章 ■ 数据清洗\n\n当你需要向表中进行大规模数据加载时，出于性能考虑，有时需要禁用表上的所有触发器。如果数据加载操作涉及多个表，你可以使用\
  \ SQL 生成 SQL 来为某个用户的所有表禁用触发器：\n\n```\nselect 'alter table ' || table_name || ' disable\
  \ all triggers;'\nfrom user_tables;\n```\n\n完成数据加载后，你需要重新启用触发器。以下是用于生成 SQL 以重新启用某个用户所有表触发器的\
  \ SQL：\n\n```\nselect 'alter table ' || table_name || ' enable all triggers;'\n\
  from user_tables;\n```\n\n当你重新启用触发器时，触发器不会运行。触发器的状态只是从 `DISABLED` 更改为 `ENABLED`。一旦触发器被启用，对于任何后续的、会导致触发器执行的\
  \ SQL 语句，它都将执行。因此，你需要通过 SQL 查询来验证数据，以确定在触发器被禁用期间加载的数据是否有违反任何关键业务规则的情况。\n\n#####\
  \ 12-10. 从表中删除数据\n\n### 问题\n\n你想高效地清空一个大表中的所有数据。\n\n### 解决方案\n\n使用 `TRUNCATE` 命令来删除表中的数据。此示例删除\
  \ `F_SALES` 表中的所有数据：\n\n```\ntruncate table f_sales;\n```\n\n```\n表已截断。\n```\n\n\
  默认情况下，Oracle 会释放表所使用的所有空间，除了由 `MINEXTENTS` 表存储参数定义的空间。如果你不希望 `TRUNCATE` 语句释放区，请使用\
  \ `REUSE STORAGE` 参数：\n\n```\ntruncate table f_sales reuse storage;\n```\n\n###\
  \ 工作原理\n\nOracle 将表的高水位线定义为段中已用空间和未用空间之间的边界。当你创建一个表时，Oracle 会根据 `MINEXTENTS` 表存储参数为表分配一定数量的区。每个区包含若干个数据块。在向表插入数据之前，所有数据块都未被使用，高水位线为零。\n\
  \n`TRUNCATE` 语句将表的高水位线重置为零。当你使用 `DELETE` 语句删除表中的数据时，高水位线不会改变。使用 `TRUNCATE` 语句并重置高水位线的一个优点是，全表扫描将只搜索高水位线以下的数据块。这可能对性能产生显著影响。\n\
  \n**注意：** 你可以通过 `DBMS_SPACE` 包来确定高水位线以下数据块的空间使用情况。\n\n#### 高水位线与性能\n\nOracle 在执行查询时有时需要扫描表的每个数据块（高水位线以下）。这被称为全表扫描。如果表中已有大量数据被删除，即使是一个空表，全表扫描也可能需要很长时间才能完成。\n\
  \n你可以运行这个简单的测试来检测此问题：\n\n1.  `SQL> set autotrace trace statistics`\n2.  运行执行全表扫描的查询\n\
  3.  比较处理的行数与逻辑 I/O 次数\n\n如果处理的行数很少但逻辑 I/O 次数很高，那么高水位线以下的空闲数据块数量可能存在问题。要重新调整高水位线，你必须为该表启用行移动，然后使用\
  \ `ALTER TABLE...SHRINK SPACE` 语句。\n\n`TRUNCATE` 语句是一条 DDL 语句。这意味着 Oracle 在它运行后会自动提交该语句（以及当前事务），因此无法回滚\
  \ `TRUNCATE` 语句。\n\n如果你需要能够在删除数据时回滚，你应该使用 `DELETE` 语句。然而，`DELETE` 语句的缺点是它会生成大量的\
  \ undo 和 redo 信息。\n\n因此，对于大型表，`TRUNCATE` 语句通常是删除数据最有效的方式。\n\n\n\n我们应当注意，从表中删除数据的另一种方法是删除并重新创建表。\n\
  \n然而，这意味着您还必须重新创建属于该表的任何索引、约束、授权或触发器。此外，当您删除表时，该表将暂时不可用，直到您重新创建它并重新发放任何所需的授权。通常，删除并重新创建表仅在开发或测试环境中可以接受。\n\
  \n##### 12-11. 显示模式差异\n\n**问题**\n\n您拥有测试和生产数据库。您想确定测试数据库模式与生产数据库模式之间是否存在任何对象差异。您无法访问昂贵的图形工具来显示模式之间的差异。您想知道可以使用哪些\
  \ SQL 技术来显示两个模式之间的对象差异。\n\n**解决方案**\n\n显示两个模式之间差异的基本技术如下：\n\n1.  如果模式位于两个不同的数据库中，请创建数据库链接以指向这两个不同的环境。\n\
  2.  使用 `MINUS` 集合运算符查询数据字典视图以显示差异。\n\n以下示例演示了如何显示模式差异。在此示例中，我们连接到一个中央数据库，该数据库可以通过\
  \ Oracle Net 访问两个远程数据库。我们想查看这两个远程数据库中的模式差异。首先，我们创建指向两个不同环境的数据库链接。此示例使用 SQL*Plus\
  \ 变量来定义用于创建数据库链接的两个不同模式和密码：\n\n```sql\ndefine user1=ccim_dev\ndefine user1_pwd=ccim_pwd\n\
  define user2=ccim_prod\ndefine user2_pwd=abc123\ndefine conn1=@db1\ndefine conn2=@db2\n\
  \ncreate database link db1 connect to &&user1 identified by &&user1_pwd using 'sb-db5:1521/sb6';\n\
  create database link db2 connect to &&user2 identified by &&user2_pwd using 'db-prod1:1521/scaprd';\n\
  ```\n\n创建数据库链接后，运行 SQL 语句以从数据字典视图显示元数据差异。接下来的两条语句使用 `MINUS` 集合运算符来确定表名是否存在任何差异：\n\
  \n```sql\nprompt ...Tables in db1 NOT IN db2\nselect table_name\nfrom user_tables&&conn1\n\
  minus\nselect table_name\nfrom user_tables&&conn2;\n\nprompt ...Tables in db2 NOT\
  \ IN db1\nselect table_name\nfrom user_tables&&conn2\nminus\nselect table_name\n\
  from user_tables&&conn1;\n```\n\n如果您想将本地模式与远程模式进行比较，则只需要一个数据库链接。在这种情况下，您还需要将一个连接变量定义为空，例如：`define\
  \ conn2=''`\n\n现在，您可以作为本地用户连接到您的数据库，并将远程模式与本地模式进行比较。\n\n如果您想比较同一数据库中两个模式中的对象，则必须修改脚本以包含\
  \ `OWNER` 并使用 `DBA` 或 `ALL` 数据字典视图（而不是 `USER`）。\n\n### 工作原理\n\n在本方法的解决方案部分，我们展示了一个简单的示例，说明如何使用数据字典来确定两个模式在表名方面是否存在任何差异。它通过使用\
  \ `MINUS` 集合运算符来显示存在于第一个模式但不存在于第二个模式的数据字典行来比较模式。然后运行另一个类似的查询，但这次它检查存在于第二个模式但不存在于第一个模式的行。\n\
  \n以下是一个更完整的比较两个模式对象的示例。此脚本比较多个不同的数据字典视图以查找元数据差异：\n\n```sql\nspo diff.txt\n\nprompt\
  \ Default or temp tablespace in db1 NOT IN db2\nselect default_tablespace, temporary_tablespace\n\
  from user_users&&conn1\nminus\nselect default_tablespace, temporary_tablespace\n\
  from user_users&&conn2;\n\nprompt Default or temp tablespace in db2 NOT IN db1\n\
  select default_tablespace, temporary_tablespace\nfrom user_users&&conn2\nminus\n\
  select default_tablespace, temporary_tablespace\nfrom user_users&&conn1;\n\nprompt\
  \ Tablespace quotas in db1 NOT IN db2\nselect tablespace_name, max_bytes\nfrom user_ts_quotas&&conn1\n\
  minus\nselect tablespace_name, max_bytes\nfrom user_ts_quotas&&conn2;\n\nprompt\
  \ Tablespace quotas in db2 NOT IN db1\nselect tablespace_name, max_bytes\nfrom user_ts_quotas&&conn2\n\
  minus\nselect tablespace_name, max_bytes\nfrom user_ts_quotas&&conn1;\n\nprompt\
  \ Objects in db1 NOT IN db2\nselect object_name, object_type\nfrom user_objects&&conn1\n\
  minus\nselect object_name, object_type\nfrom user_objects&&conn2 order by 2;\n\n\
  prompt Objects in db2 NOT IN db1\nselect object_name, object_type\nfrom user_objects&&conn2\n\
  minus\nselect object_name, object_type\nfrom user_objects&&conn1 order by 2;\n\n\
  prompt Tables in db1 NOT IN db2\nselect table_name\nfrom user_tables&&conn1\nminus\n\
  select table_name\nfrom user_tables&&conn2;\n\nprompt Tables in db2 NOT IN db1\n\
  select table_name\nfrom user_tables&&conn2\nminus\nselect table_name\nfrom user_tables&&conn1;\n\
  \nprompt Indexes in db2 NOT IN db1\nselect table_name, index_name, index_type, uniqueness\n\
  from user_indexes&&conn2\nminus\nselect table_name, index_name, index_type, uniqueness\n\
  from user_indexes&&conn1 order by 1, 2;\n\nprompt Table columns db1 NOT IN db2\n\
  select table_name, column_name\nfrom user_tab_columns&&conn1\nminus\nselect table_name,\
  \ column_name\nfrom user_tab_columns&&conn2 order by 1,2;\n\nprompt Table columns\
  \ in db2 NOT IN db1\nselect table_name, column_name\nfrom user_tab_columns&&conn2\n\
  minus\nselect table_name, column_name\nfrom user_tab_columns&&conn1 order by 1,2;\n\
  \nspo off;\n```\n\n前面的脚本只是您如何使用数据字典视图来报告模式之间元数据差异的示例。我们并未将所有可能的检查类型都包含在脚本中。\n\n\
  相反，我们在此包含了足够的内容，为您提供一个示例，说明如何查找开发人员和 DBA 寻找的最常见类型的差异。我们已在 Apress 网站 (http://www.apress.com)\
  \ 的源代码部分包含了此脚本的完整版本。\n\n如果您可以访问诸如 Enterprise Manager Change Management Pack 之类的工具，您也可以使用它来显示两个模式之间的差异。快速的\
  \ Google 搜索将显示数十种可用于比较模式的工具。本方法的目的不是与这些工具竞争，而是表明您可以快速创建一组 SQL 语句来显示模式差异。这些语句可以根据您的环境需要轻松地进行扩充和增强。\n\
  \n# 第 13 章\n\n## 树形结构数据\n\n树形结构——分层数据——无处不在。除了您后院或附近公园里可能有一棵有树干和树枝的真树之外，您还可能参加一个篮球锦标赛，其对阵图是基于时间的树形结构版本，最终只有一支队伍在锦标赛结束时位于根节点。在您的工作中，管理结构本质上是一个树形结构，老板或所有者在顶部，经过一层或多层管理才到达位于树底部的时薪员工。\n\
  \n\n# 第 13 章 ■ 树形结构数据\n\n整个数据库管理系统都围绕层次数据构建。IBM 公司最受欢迎的产品之一，信息管理系统（IMS），出现在 20 世纪\
  \ 60 年代末，并为层次数据和事务速度进行了优化。尽管它仍然是 IBM 最畅销的产品之一，但其实现方式使得在不进行额外编码的情况下，难以以多种方式访问数据。XML\
  \ 是一种相对较新的表示树形结构数据的方式，它提供了标准化的数据交换，但如果你尝试以替代顺序遍历 XML 文档，则会很有挑战性。在 20 世纪 70 年代末，Oracle\
  \ 及其关系数据库架构开始解决层次模型的不灵活性，并提供对使用内置功能对一个或多个表进行层次遍历的支持。\n\n图 13-1 显示了两个层次树；它们可能在不同的表中，也可能在同一个表中。\n\
  \n![](img/image1.png)\n\n**图 13-1.** *来自单个数据库表的两个树中的层次（树形结构）数据*\n\n如你将在本章的一个示例中看到的，Oracle\
  \ 可以在同一张表中处理多棵树而没有任何问题。树中每个节点的键通常是主键或候选键。一个给定的节点可以有零个、一个或多个子节点；一个给定的子节点只能有一个父节点。在遍历树时，经常使用*级别*的概念；它指定了一个节点距离树的根节点有多远，其中级别\
  \ 1 是根节点所在的级别。根据它们在层次结构中的位置，每个级别的一行可以是两种类型之一。以下是我们将在本章中使用的定义：\n\n`Root`: 层次结构中最高的行\n\
  \n`Child`: 任何非根行\n\n`Parent`: 任何拥有子行的行\n\n`Leaf`: 没有任何子行的行\n\n在图 13-1 中，节点 1 和 3\
  \ 是根节点，19 和 27（以及每棵树底部的许多其他节点）是叶节点，除叶节点外的所有节点都是父节点。除根节点外的所有节点都是子节点。一个节点不能同时拥有四种角色中的三种或全部四种，而只有一行的表是唯一一种节点可以同时是根节点和叶节点的情况。\n\
  \n在本章中，我们将介绍访问单个表或跨多个表的层次数据的大部分方法。在层次查询中你会看到的关键子句是`CONNECT BY`和`START WITH`。`CONNECT\
  \ BY`子句指定了你希望如何将行与其前驱和后继链接起来；正如你将看到的示例，这个子句也可能包含其他过滤器。通常，你的查询中也会有一个`START WITH`子句，但这不是必需的。你使用`START\
  \ WITH`来指定你希望从层次结构中的哪个位置开始检索行。如果你的表中有多个层次结构，如图 13-1 中的例子，这将特别有用。你也可以使用`START WITH`来排除层次结构的顶层节点。\n\
  \n在许多情况下，你的层次数据可能不一致。例如，你的数据库可能无意中表明员工 Smith 向 King 汇报，员工 Jones 向 Smith 汇报，而员工 King\
  \ 向 Jones 汇报。这显然不是一个有效的业务条件，Oracle 会自动检测这些情况并返回错误消息；或者，你可以使用`NOCYCLE`与`CONNECT_BY_ISCYCLE`一起使用，以轻松识别那些后继同时也是层次结构中某处前驱的行。\n\
  \n其他伪列使你的层次查询对报表更有用。`LEVEL`伪列返回当前行的树深度。在图 13-1 中，节点 1 和 3 将返回`LEVEL`值 1，节点 5 和 15\
  \ 将返回`LEVEL`值 2，依此类推。用`CONNECT_BY_ROOT`限定的列返回该列在层次结构顶部的值，与查询结果中当前行的级别编号无关。\n\n有时你想看到“大局”，你可以使用`SYS_CONNECT_BY_PATH`函数来构建一个字符串，其中包含从树根到当前节点的列值。伪列`CONNECT_BY_ISLEAF`指示该行是否是叶节点，换句话说，是否是层次结构中分支底部的节点。\n\
  \n你可能会发现需要对层次查询的结果进行排序。然而，标准的`ORDER BY`不会产生预期的结果，因为排序是跨所有行的，而不是在层次结构的每个级别内进行的。在层次结构中，你将使用`ORDER\
  \ SIBLINGS BY`子句来在其父行内对列的子集进行排序。\n\n本章的示例将涵盖所有这些子句的变体，至少为你提供一个模板，用于创建你的应用程序所需的任何类型的层次查询。虽然你可以在\
  \ Java 或 C++等过程语言中模拟大部分（如果不是全部）这些功能，但使用 Oracle 内置层次查询功能的易用性、清晰性和效率使其成为一个轻松的选择。\n\
  \n## 13-1. 从顶部到底部遍历层次数据\n\n### 问题\n\n你需要从包含层次数据的表中生成报表，从上到下遍历层次结构，并清晰地标识层次结构中每行的级别。\n\
  \n### 解决方案\n\n使用`CONNECT BY`子句指定层次查询，使用`PRIOR`操作符定义父节点之间的链接条件，并结合`LEVEL`伪列和`LPAD`在报表中提供视觉辅助。在以下示例中，管理团队希望获得一份显示公司管理结构的报告，清晰地显示每个高级经理下的下属：\n\
  \n```sql\nselect employee_id, level,\nlpad(' ',(level-1)*3) || last_name || ', '\
  \ || first_name full_name\nfrom employees\nstart with manager_id is null\nconnect\
  \ by manager_id = prior employee_id\n;\n```\n\n```\nEMPLOYEE_ID LEVEL FULL_NAME\n\
  ---------------------- ------------------- -----------------------------\n100  \
  \     1     King, Steven\n101       2     Kochhar, Neena\n108       3     Greenberg,\
  \ Nancy\n109       4     Faviet, Daniel\n110       4     Chen, John\n111       4\
  \     Sciarra, Ismael\n112       4     Urman, Jose Manuel\n113       4     Popp,\
  \ Luis\n200       3     Whalen, Jennifer\n203       3     Mavris, Susan\n204   \
  \    3     Baer, Hermann\n205       3     Higgins, Shelley\n206       4     Gietz,\
  \ William\n102       2     De Haan, Lex\n103       3     Hunold, Alexander\n104\
  \       4     Ernst, Bruce\n105       4     Austin, David\n106       4     Pataballa,\
  \ Valli\n107       4     Lorentz, Diana\n...\n201       2     Hartstein, Michael\n\
  202       3     Fay, Pat\n107 rows selected\n```\n\n该查询根据员工在公司管理结构中的位置按比例缩进结果。\n\
  \n### 工作原理\n\n你在解决方案中看到的 SQL 关键字和子句是你在大多数层次查询中都会看到的：`LEVEL`伪列用于指示当前行（节点）距离根节点有多远，`START\
  \ WITH`子句用于指示从何处开始树导航，`CONNECT BY`用于指定父节点和子节点如何连接。此外，你几乎总是使用一元操作符`PRIOR`来指定父行中与子行（当前行）的链接列具有相同值的列。\n\
  \n`START WITH`子句表示我们希望从`MANAGER_ID`为 NULL 的行开始导航。\n\n# 第 13 章 ■ 树形结构数据\n\n某个员工的\
  \ `MANAGER_ID` 是 `NULL`，换句话说，就是公司的所有者或总裁，他不再向公司中的任何人汇报。如果公司有两个所有者（两人的 `MANAGER_ID`\
  \ 均为 `NULL`），查询仍然有效：在返回完一棵树的员工后，查询会返回表中另一个层次结构的所有下属（子）行。此场景由图 13-1 中的层次结构表示，其中节点\
  \ 1 和 3 是两位公司所有者。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n如果我们知道员工编号永不改变，我们也可以使用这个\
  \ `START WITH` 子句：\n\n```sql\nstart with employee_id = 100\n```\n\n此外，如果表中有两个层次结构，并且公司的共同所有者的\
  \ `EMPLOYEE_ID` = 250，那么 `START WITH` 子句将如下所示：\n\n```sql\nstart with employee_id\
  \ in (100,250)\n```\n\n此解决方案添加了一个可视化元素以及一些额外的格式，以使查询结果更具可读性。`LPAD` 函数根据当前行在层次结构中的深度（由\
  \ `LEVEL` 伪列定义），在每个全名前添加相应数量的空格字符。\n\n从底向上遍历树结构与在 `CONNECT BY` 子句中切换连接列一样简单直观。如果你想以相反的顺序（从底向上）查看层次结构，从\
  \ Diana Lorentz（员工编号 107）开始，你的 `SELECT` 语句将如下所示：\n\n```sql\nselect employee_id,\
  \ level,\nlpad(' ',(level-1)*3) || last_name || ', ' || first_name full_name\nfrom\
  \ employees\nstart with employee_id = 107\nconnect by employee_id = prior manager_id\n\
  ;\n```\n\n```\nEMPLOYEE_ID LEVEL FULL_NAME\n---------------------- ----------------------\
  \ ----------------------------\n        107       1 Lorentz, Diana\n        103\
  \       2 Hunold, Alexander\n        102       3 De Haan, Lex\n        100     \
  \  4 King, Steven\n4 rows selected\n```\n\n如果你省略 `START WITH` 子句，你将得到所有员工及其经理，以及他们经理的经理，以此类推，直到回到\
  \ King（至少在这家公司；King 是整个层次结构顶端所有人的经理）。以下是省略 `START WITH` 子句的查询返回的几行数据：\n\n```sql\n\
  select employee_id, level,\nlpad(' ',(level-1)*3) || last_name || ', ' || first_name\
  \ full_name\nfrom employees\nconnect by employee_id = prior manager_id\n;\n```\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n```\nEMPLOYEE_ID LEVEL FULL_NAME\n\
  ---------------------- ---------------------- --------------------------------------\n\
  \        100       1 King, Steven\n        101       1 Kochhar, Neena\n        100\
  \       2 King, Steven\n        102       1 De Haan, Lex\n        100       2 King,\
  \ Steven\n        103       1 Hunold, Alexander\n        102       2 De Haan, Lex\n\
  \        100       3 King, Steven\n        104       1 Ernst, Bruce\n        103\
  \       2 Hunold, Alexander\n        102       3 De Haan, Lex\n        100     \
  \  4 King, Steven\n...\n```\n\n此查询的输出将 King 作为没有上级的员工包含在内，此外，对于其他每一位员工，他也会出现在其所属层次结构分支的末端。\n\
  \n##### 13-2. 在层次级别内对节点排序\n\n### 问题\n\n你希望对层次结构中位于同一父行下、同一级别的行进行排序。\n\n### 解决方法\n\
  \n在 `ORDER BY` 子句中使用 `SIBLINGS` 关键字。如果你想按姓氏对每个经理下的员工进行排序，标准的 `ORDER BY` 子句将不起作用，因为它会独立于树形层次结构中的级别对姓氏进行排序。相反，你必须使用\
  \ `ORDER SIBLINGS BY` 子句，如下例所示：\n\n```sql\nselect employee_id, level,\nlpad(' ',(level-1)*3)\
  \ || last_name || ', ' || first_name full_name\nfrom employees\nstart with manager_id\
  \ is null\nconnect by manager_id = prior employee_id\norder `siblings` by last_name,\
  \ first_name\n;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n```\n\
  EMPLOYEE_ID LEVEL FULL_NAME\n---------------------- ---------------------- ---------------------------------\n\
  \        100       1 King, Steven\n        148       2 Cambrault, Gerald\n     \
  \   172       3 Bates, Elizabeth\n        169       3 Bloom, Harrison\n        170\
  \       3 Fox, Tayler\n        173       3 Kumar, Sundita\n        168       3 Ozer,\
  \ Lisa\n        171       3 Smith, William\n        102       2 De Haan, Lex\n \
  \       103       3 Hunold, Alexander\n        105       4 Austin, David\n     \
  \   104       4 Ernst, Bruce\n```\n\n# 第 13 章 ■ 树形数据\n\n##### 13-3. 从层次表生成路径名\n\n\
  ### 问题\n\nLinux 系统管理员正在文件系统中创建与公司管理结构相匹配的目录结构，她希望数据库管理员能通过利用 Oracle 的层次特性来帮助她节省首次创建目录结构的时间。\n\
  \n### 解决方案\n\n对`EMPLOYEES`表使用层次查询，并在其中应用`SYS_CONNECT_BY_PATH`函数。以下是一个示例：\n\n```sql\n\
  select\n'/u01/empl' ||\nSYS_CONNECT_BY_PATH(last_name, '/') ||\n'/' ||\nSUBSTR(first_name,\
  \ 1, 1) ||\nLOWER(SUBSTR(first_name, 2)) ||\n'.' ||\nLOWER(job_id) ||\n'@' ||\n\
  department_id ||\n'.dir' as path_name\nfrom employees\nstart with manager_id is\
  \ null\nconnect by manager_id = prior employee_id\norder siblings by last_name,\
  \ first_name\n;\n```\n\n排序在每个层级进行。在 King 之下，直接下属按字母顺序排列在第二级：Cambrault、De Haan 和\
  \ Errazuriz。在第三级的 Cambrault 之下，其直接下属同样按字母顺序排序。\n\n树的“修剪”操作很简单。假设管理层不希望在此报告中看到 Gerald\
  \ Cambrault 及其下属。这意味着我们要从树中修剪掉整个分支。为此，必须在`CONNECT BY`子句中作为一个附加条件过滤掉要移除分支的顶端，如下所示：\n\
  \n```sql\nselect employee_id, level,\nlpad(' ',(level-1)*3) || last_name || ', '\
  \ || first_name full_name\nfrom employees\nstart with manager_id is null\nconnect\
  \ by manager_id = prior employee_id\n  and not (last_name = 'Cambrault' and first_name\
  \ = 'Gerald')\norder siblings by last_name, first_name\n;\n```\n\n```text\nEMPLOYEE_ID\
  \ LEVEL FULL_NAME\n---------------------- ---------------------- ---------------------------------\n\
