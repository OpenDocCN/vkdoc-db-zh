  ## 前言


  欢迎阅读《Oracle SQL 食谱》。您手中这本书包含了针对编写针对 Oracle 数据库运行的 SQL 时遇到的常见问题的现成解决方案。我们为那些时间紧迫、需要解决特定问题然后继续工作的人编写了本书。每个食谱都针对一个特定问题，并提供了针对该问题的可靠、可行的解决方案。对于感兴趣的人，每个食谱还提供了对解决方案的扩展讨论，有时还包括替代解决方案。


  我们将这些食谱精心设计，旨在将您提升到美食大厨的高度——至少在 Oracle SQL 方面是如此。尽管我们将食谱按逻辑章节划分，涵盖了数据类型或报表生成等主题，但您可以随意按任何顺序、以任何组合方式采样和使用这些食谱。


  本书面向的读者



  '
- '# 本书适合人群


  本书适用于所有使用 Oracle SQL 的人员，无论是数据库管理员、开发人员、报表编写者，甚至是最终用户。无论您当前编写和使用 SQL 的技能水平如何，《Oracle
  SQL Recipes》中都有一些适合您的解决方案。本书并非旨在教您 SQL，也不是作为 Oracle SQL 参考手册的替代品。相反，您将看到的是针对实际问题的优雅且有时很巧妙的解决方案，而这些方案通常不会在语言手册中介绍。


  '
- '# 本书结构


  我们将本书分为五个部分，每个部分涵盖为 Oracle 数据库编写 SQL 的一个广泛方面。


  **第 1 部分** 讲述 Oracle SQL 的基础知识以及 SQL 各个方面的基础内容。


  **第 2 部分** 介绍 Oracle 数据类型的复杂性，以及管理和操作不同形式数据的解决方案。


  **第 3 部分** 讨论如何将 Oracle 作为开发环境使用，并介绍了帮助开发人员和数据库管理员解决复杂 SQL 任务的解决方案。


  **第 4 部分** 是一个特殊主题的纲要，范围从 XML 到直接从数据库生成动态报表网页。


  **第 5 部分** 面向数据库管理员，展示了如何应用 SQL 解决管理员日常面临的许多问题和任务。


  xxiii


