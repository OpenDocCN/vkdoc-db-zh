  /u01/empl/king.steven/hartstein.michael\n/u01/empl/king.steven/hartstein.michael/fay.pat\n\
  107 rows selected\n\n系统管理员在每行开头添加 `mkdir` 命令，这个过程是自动化的，至少对于创建初始目录结构而言是如此。\n\n##\
  \ 工作原理\n\n本示例中的问题和解决方案看起来有点刻意，但这只是因为我们希望使用任何 Oracle 安装中都提供的 `HR.EMPLOYEES` 表。此外，一些员工的姓氏和名字中包含空格，这会在系统管理员尝试创建目录时引起\
  \ Linux 的抱怨。要解决这个问题，只需添加一个对 `TRANSLATE` 函数的调用以删除所有出现的空格字符。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 第 13 章 ■ 树形结构数据\n\n本解决方案使用了许多层次查询特性，就像前一个示例一样。在 `employees` 表中，`MANAGER_ID`\
  \ 列是员工经理所在行的外键。因此，这是 `SELECT` 语句这部分的要求：\n```sql\nconnect by prior employee_id =\
  \ manager_id\n```\n`CONNECT BY` 子句引入了链接根节点、父节点和子节点行的条件。在此示例中，`CONNECT BY` 子句将当前行中的\
  \ `MANAGER_ID` 连接到父行中的 `EMPLOYEE_ID`。您可以重写该子句如下，产生相同的结果：`connect by manager_id =\
  \ prior employee_id`\n\n您通常只使用一个 `PRIOR` 操作符，但如果链接条件跨越多个列，则可以在 `CONNECT BY` 子句中使用多个\
  \ `PRIOR` 操作符。您也可以像本章第一个示例中所做的那样，使用过滤条件来限制结果集中的行。\n\n您很少会省略 `PRIOR` 操作符，因为这是 Oracle\
  \ 链接父行和子行的方式。在某些情况下，您可以省略 `PRIOR` 操作符而只保留一个过滤条件，正如您将在本章后面的一个示例中看到的那样。\n\n该查询使用 `START\
  \ WITH` 来指示层次结构中的起始点。如果某个员工没有经理（通常是老板或所有者），则 `MANAGER_ID` 列为 `NULL`，因此 `START WITH\
  \ MANAGER_ID IS NULL` 给了我们想要的结果。但是，您也可以根据表中任何其他列的值从层次结构中的任何位置开始。在此示例中，您只想显示 Neena\
  \ Kochhar 及其下属员工的层次结构：\n```sql\nselect\nsys_connect_by_path(lower(last_name)||'.'||lower(first_name),'/')\
  \ mgmt_path from employees\nstart with last_name = 'Kochhar'\nconnect by prior employee_id\
  \ = manager_id\n;\n\nMGMT_PATH\n/kochhar.neena\n/kochhar.neena/greenberg.nancy\n\
  /kochhar.neena/greenberg.nancy/faviet.daniel\n/kochhar.neena/greenberg.nancy/chen.john\n\
  /kochhar.neena/greenberg.nancy/sciarra.ismael\n/kochhar.neena/greenberg.nancy/urman.jose\
  \ manuel\n/kochhar.neena/greenberg.nancy/popp.luis\n/kochhar.neena/whalen.jennifer\n\
  /kochhar.neena/mavris.susan\n```\n\n\n\n# 第 13 章 ■ 树形结构数据\n\n/kochhar.neena/baer.hermann\n\
  \n/kochhar.neena/higgins.shelley\n\n/kochhar.neena/higgins.shelley/gietz.william\n\
  \n已选择 12 行\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n最后，解决方案使用 `SYS_CONNECT_BY_PATH`\
  \ 函数来为我们提供从根节点（由 `START WITH` 子句指定）到表中当前行的子节点或叶节点的完整路径。它有两个参数：你希望出现在层次结果中的列，以及层次结构中节点之间使用的分隔符。要重写解决方案查询以适用于\
  \ Windows 操作系统，你只需要更改结果每一行的前缀和分隔符字符：\n\n```sql\nselect\n    'D:\\EMPL' ||\n    sys_connect_by_path(lower(last_name)||'_'||first_name,'\\\
  ') mgmt_path\nfrom employees\nstart with manager_id is null\nconnect by prior employee_id\
  \ = manager_id\n;\n```\n\n```\nMGMT_PATH\n------------------------------------------------------------\n\
  D:\\EMPL\\king_steven\nD:\\EMPL\\king_steven\\kochhar_neena\nD:\\EMPL\\king_steven\\\
  kochhar_neena\\greenberg_nancy\nD:\\EMPL\\king_steven\\kochhar_neena\\greenberg_nancy\\\
  faviet_daniel\nD:\\EMPL\\king_steven\\kochhar_neena\\greenberg_nancy\\chen_john\n\
  D:\\EMPL\\king_steven\\kochhar_neena\\greenberg_nancy\\sciarra_ismael\n...\nD:\\\
  EMPL\\king_steven\\zlotkey_eleni\\johnson_charles\nD:\\EMPL\\king_steven\\hartstein_michael\n\
  D:\\EMPL\\king_steven\\hartstein_michael\\fay_pat\n已选择 107 行\n```\n\n## 13-4. 识别层次表中的叶节点数据\n\
  \n### 问题\n\n管理团队想要一份区分经理和非经理的报告，这意味着你需要区分层次表中的叶节点与根节点和分支节点。\n\n### 解决方案\n\n使用 `CONNECT_BY_ISLEAF`\
  \ 伪列来识别不是任何其他行父节点的行——换句话说，就是识别叶节点。下面是一个展示如何执行此操作的示例：\n\n```sql\nselect\n    lpad('\
  \ ',(level-1)*3) || last_name || ', ' || first_name full_name,\n    level, connect_by_isleaf\
  \ is_leaf\nfrom employees\nstart with manager_id is null\nconnect by prior employee_id\
  \ = manager_id\n;\n```\n\n```\nFULL_NAME                                 LEVEL \
  \   IS_LEAF\n----------------------------------- ---------- ---------\nKing, Steven\
  \                                  1          0\nKochhar, Neena                \
  \                2          0\nGreenberg, Nancy                              3 \
  \         0\nFaviet, Daniel                                4          1\nChen, John\
  \                                    4          1\nSciarra, Ismael             \
  \                  4          1\nUrman, Jose Manuel                            4\
  \          1\nPopp, Luis                                    4          1\nWhalen,\
  \ Jennifer                              3          1\nMavris, Susan            \
  \                     3          1\nBaer, Hermann                              \
  \   3          1\nHiggins, Shelley                              3          0\nGietz,\
  \ William                                4          1\nDe Haan, Lex            \
  \                      2          0\nHunold, Alexander                         \
  \    3          0\nErnst, Bruce                                  4          1\n\
  Austin, David                                 4          1\nPataballa, Valli   \
  \                           4          1\nLorentz, Diana                       \
  \         4          1\n...\nHartstein, Michael                            2   \
  \       0\nFay, Pat                                      3          1\n已选择 107 行\n\
  ```\n\n为了清晰起见，此解决方案包含了 `CONNECT_BY_ISLEAF` 列的值。要过滤掉非叶节点，可以使用 `WHERE` 子句来保留 `CONNECT_BY_ISLEAF\
  \ = 1` 的行。\n\n识别根节点很简单：如果一个节点的父键为 `NULL`，则它是根节点。注意，一个没有兄弟节点的根节点同时也是一个叶节点！\n\n###\
  \ 工作原理\n\n当你想要查看树中每个分支底部的行时，`CONNECT_BY_ISLEAF` 伪列非常方便。如果你想要查看树顶部的行，可以选择 `LEVEL\
  \ = 1` 的行。\n\n正如你所料，如果你只想查看树的分支（不是根也不是叶），你可以选择任何不在第 1 层且不是叶节点的行。例如：\n\n```sql\n\
  select\n    lpad(' ',(level-1)*3) || last_name || ', ' || first_name full_name,\n\
  \    level, connect_by_isleaf is_leaf\nfrom employees\nwhere level > 1 and connect_by_isleaf\
  \ = 0\nstart with manager_id is null\nconnect by prior employee_id = manager_id\n\
  ;\n```\n\n```\nFULL_NAME                                 LEVEL    IS_LEAF\n-----------------------------------\
