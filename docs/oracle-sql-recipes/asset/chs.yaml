  \n**工作原理**\n\nOracle 数据库默认安装时提供的示例模式为尝试一些 Oracle 功能提供了一个良好的起点。Oracle 数据库附带了几个示例模式，如`HR`、`OE`和`BI`，不仅展示了数据库模式之间的关系，还展示了一些不同的功能，如索引组织表（IOT）、基于函数的索引、物化视图、大对象（`BLOB`和`CLOB`）以及\
