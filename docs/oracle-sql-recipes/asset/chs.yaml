  \n## 查询叶节点并仅显示顶级经理\n\n如果你只想看到每个叶节点所在层级顶端经理的名字，而不是所有中间层级的经理，可以使用 `CONNECT_BY_ROOT`\
  \ 来返回层级顶端的行，如下例所示：\n\n```sql\nselect\n  last_name || ', ' || first_name full_name,\
