  \n虽然这种方法有效，并且从执行计划的角度来看效率很高，但旧语法可能难以阅读，因为您将表连接条件与任何过滤条件混合在一起。它还迫使您在`SELECT`子句中为连接列指定限定符。\n\
  \n另一种 ANSI SQL 99 连接表的方法使用`ON`子句，如下所示：\n\n```sql\nselect employee_id, last_name,\
