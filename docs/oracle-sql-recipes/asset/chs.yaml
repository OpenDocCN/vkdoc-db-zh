- "# 第 18 章 ■ 对象管理\n\n##### 18-13. 在表中强制唯一行\n\n### 问题\n\n您需要确保输入数据库的数据符合特定的业务规则。例如，您需要确保不会在相同部门编号下误添加一个新部门。您希望使用\
  \ `PRIMARY KEY`（主键）约束来强制实现唯一性。\n\n### 解决方案\n\n在实施数据库时，您创建的大多数表都需要一个 `PRIMARY KEY`\
  \ 约束，以保证表中的每条记录都能被唯一标识。有多种技术可以为表添加主键约束。第一个示例在定义列的同时内联创建主键：\n\n```sql\ncreate table\
  \ dept(\n    dept_id number primary key,\n    dept_desc varchar2(30)\n);\n```\n\n\
  如果您从 `USER_CONSTRAINTS` 中查询 `CONSTRAINT_NAME`，您会注意到 Oracle 为该约束生成了一个晦涩的名称（类似 `SYS_C003682`）。使用以下语法可以显式地为主键约束命名：\n\
  \n```sql\ncreate table dept(\n    dept_id number constraint dept_pk primary key\
  \ using index tablespace users,\n    dept_desc varchar2(30)\n);\n```\n\n**注意** 当您创建主键约束时，Oracle\
  \ 还会创建一个与约束同名的唯一索引。\n\n您也可以在列定义之后指定主键约束定义。这样做的好处是您可以在多个列上定义约束。下一个示例在创建表时创建主键，但不是内联于列定义：\n\
  \n```sql\ncreate table dept(\n    dept_id number,\n    dept_desc varchar2(30),\n\
  \    constraint dept_pk primary key (dept_id)\n    using index tablespace prod_index\n\
  );\n```\n\n如果表已经创建，而您想添加主键约束，请使用 `ALTER TABLE` 语句。此示例在 `DEPT` 表的 `DEPT_ID` 列上放置一个主键约束：\n\
  \n```sql\nalter table dept add constraint dept_pk primary key (dept_id)\nusing index\
  \ tablespace users;\n```\n\n当启用主键约束时，Oracle 会自动创建一个与主键约束关联的唯一索引。一些 DBA 更喜欢先在主键列上创建一个非唯一索引，然后再定义主键约束：\n\
  \n```sql\ncreate index dept_pk on dept(dept_id);\n\nalter table dept add constraint\
  \ dept_pk primary key (dept_id);\n```\n\n这种方法的优势在于，您可以独立于索引删除或禁用主键约束。在处理大型数据集时，您可能需要这种灵活性。如果您在创建主键约束之前没有创建索引，那么每当您删除或禁用主键约束时，索引也会被自动删除。\n\
  \n对于使用哪种方法创建主键感到困惑？所有方法都是有效的，各有优点。下表总结了主键和唯一键约束的创建方法。\n\n```text\n**表 18-1. 主键和唯一键约束创建方法**\n\
  \n**约束创建方法** | **优点** | **缺点**\n--- | --- | ---\n内联，无名称 | 非常简单 | Oracle 生成的名称使故障排查更难；对存储属性的控制较少；仅应用于单列\n\
  内联，有名称 | 简单；用户定义的名称使故障排查更容易 | 比内联无名称需要更多考虑\n内联，有名称和表空间 | 完全控制约束和索引的命名及存储 | 语法更复杂\n\
  ```\n\n注意 `SELECT` 语句中带有两个点的 `&&MASTER_USER` 变量。在 & 符号变量末尾的单个点指示 `SQL*Plus` 将单个点后的任何内容连接到该\
  \ & 符号变量。因此，当您将两个点放在一起时，就告诉 `SQL*Plus` 将一个单点连接到 & 符号变量包含的字符串。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n\n"
- "# 第 18 章 ■ 对象管理\n\n## 约束定义方法比较\n\n- 用户定义的名称和表空间；较不简单；定义使故障排除更容易。\n- 在列定义之后（行外）：可以对多个列进行操作。\n\
  - `ALTER TABLE 仅添加约束`：索引和约束分离；更复杂。\n- 在单独的语句（和文件）中管理约束与表创建脚本；可以对多个列进行操作。\n- `CREATE\
  \ INDEX`，`ALTER TABLE add constraint`：最复杂，维护更多，组件更多；因此您可以删除/禁用约束而不影响索引；可以对多个列进行操作。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 工作原理\n\n主键约束用于确保表中的每条记录都可以被唯一标识。一种常见的表设计技术是创建一个无意义的数字列来包含唯一生成的系统序列号（也称为代理键）。在代理键列上放置主键约束以确保其唯一性。\n\
  \n除了主键约束，我们还建议您在业务用户用于唯一标识记录的列（也称为逻辑键）上放置唯一键约束。同时使用代理键和逻辑键：\n- 允许您在单个数字列上高效地连接父子表；\n\
  - 允许更新逻辑键列而无需更改代理键。\n\n唯一键保证表中所定义列的唯一性。主键和唯一约束之间存在一些细微差别。每个表只能定义一个主键，但可以有多个唯一键。主键不允许其任何列包含空值，而唯一键允许空值。\n\
  \n与主键约束一样，创建唯一列约束有几种方法。此方法将 `UNIQUE` 关键字与列行内定义一起使用：\n```sql\ncreate table dept(dept_id\
  \ number, dept_desc varchar2(30) unique);\n```\n\n如果想显式命名约束，请使用 `CONSTRAINT` 关键字：\n\
  ```sql\ncreate table dept(dept_id number,\n    dept_desc varchar2(30) constraint\
  \ dept_desc_uk1 unique);\n```\n\n您还可以在行内添加表空间信息，用于为唯一约束自动创建的关联唯一索引：\n```sql\ncreate\
  \ table dept(dept_id number,\n    dept_desc varchar2(30) constraint dept_desc_uk1\n\
  \    unique using index tablespace prod_index);\n```\n\n**注意：**当您创建唯一键约束时，Oracle\
  \ 还会创建一个与该约束同名的唯一索引。\n\n与主键一样，唯一约束可以在列定义之外指定：\n```sql\ncreate table dept(dept_id\
  \ number,\n    dept_desc varchar2(30),\n    constraint dept_desc_uk1 unique (dept_desc)\
  \ using index tablespace prod_index);\n```\n\n您也可以通过修改表来添加唯一约束：\n```sql\nalter table\
  \ dept add constraint dept_desc_uk1 unique (dept_desc);\n```\n\n并且您可以在定义唯一键约束之前，在感兴趣的列上创建索引：\n\
  ```sql\ncreate index dept_desc_uk1 on dept(dept_desc);\n\nalter table dept add constraint\
  \ dept_desc_uk1 unique(dept_desc);\n```\n\n当处理大型数据集并且您希望能够在不删除关联索引的情况下禁用或删除唯一约束时，这可能很有帮助。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n##### 18-14. 确保查找值存在\n\n###\
  \ 问题\n\n您有一条业务规则，规定一列的值必须始终在有效的值列表中。例如，在 `EMP` 表中输入的任何 `DEPT_ID` 都必须始终存在于主表 `DEPT`\
  \ 中。\n\n### 解决方案\n\n创建一个外键约束，以确保输入到外键列的值作为唯一键或主键值存在于父表中。创建外键约束有几种方法。以下在 `EMP` 表的\
  \ `DEPT_ID` 列上创建了一个外键约束：\n```sql\ncreate table emp(\n    emp_id number,\n    name\
  \ varchar2(30),\n    dept_id constraint emp_dept_fk references dept(dept_id));\n\
  ```\n\n请注意，`DEPT_ID` 的数据类型没有显式定义。它从被引用的 `DEPT` 表的 `DEPT_ID` 列派生数据类型。在定义列时，您也可以显式指定数据类型（无论是否定义外键）：\n\
  ```sql\ncreate table emp(\n    emp_id number,\n    name varchar2(30),\n    dept_id\
  \ number constraint emp_dept_fk references dept(dept_id));\n```\n\n外键定义也可以在 `CREATE\
  \ TABLE` 语句中的列定义之外指定：\n```sql\ncreate table emp(\n    emp_id number,\n    name varchar2(30),\n\
  \    dept_id number,\n    constraint emp_dept_fk foreign key (dept_id) references\
  \ dept(dept_id)\n);\n```\n\n您还可以通过修改现有表来添加外键约束：\n```sql\nalter table emp add constraint\
  \ emp_dept_fk foreign key (dept_id)\n    references dept(dept_id);\n```\n\n**注意：**与主键和唯一键约束不同，Oracle\
  \ 不会自动为外键列添加索引。您必须在外键列上显式创建索引。\n\n### 工作原理\n\n外键约束用于确保列值包含在定义的值列表中。使用数据库约束是强制执行数据在插入或更新被允许之前必须是预定义值的一种有效方式。约束的优点在于，一旦启用，就无法输入违反给定约束的数据。\n\
  \n外键约束是一种将有效值列表存储在表中的技术。此技术适用于以下场景：\n- 值列表中的条目很多\n- 需要存储有关查找值的其他信息\n- 容易通过 SQL 选择、插入、更新或删除查找值\n\
  \n例如，您可能有一个 `STATES` 查找表，其中包含 `STATE_CODE`、`STATE_NAME`、`STATE_DESC` 和 `REGION`\
  \ 等列。您的业务规则可能是您有一个 `ADDRESSES` 表，其中包含一个 `STATE_CODE` 列，在此列中输入的任何值都必须存在于 `STATES`\
  \ 表中。对于此场景，使用带有外键约束的单独表非常有效。\n\n如果您要检查的条件是一个不常更改的小列表，请考虑使用检查约束而不是外键约束（有关详细信息，请参阅配方\
  \ 18-15）。例如，如果您有一个列将始终定义为仅包含 `0` 或 `1`，则检查约束是一个高效的解决方案。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 18-15. 检查数据是否满足条件\n\n### 问题\n\n您有一条业务规则，规定一列必须包含 `0` 或 `1` 的值。您希望确保该业务规则不会被违反。\n\
  \n### 解决方案\n\n使用检查完整性约束为列定义 SQL 检查。创建检查约束有几种方法。例如，您可以在创建表时定义检查约束。以下定义了 `ST_FLG`\
  \ 列必须为 `0` 或 `1`：\n```sql\ncreate table emp(\n    emp_id number,\n    emp_name varchar2(30),\n\
  \    st_flg number(1) CHECK (st_flg in (0,1))\n);\n```\n\n一个稍好一点的方法是给检查约束一个名称：\n\
  ```sql\ncreate table emp(\n    emp_id number,\n    emp_name varchar2(30),\n    st_flg\
  \ number(1) constraint st_flg_chk CHECK (st_flg in (0,1))\n);\n```\n\n一个更具描述性的命名约束的方法是在约束名称中嵌入实际描述被违反条件的信息。例如：\n\
  ```sql\nCREATE table emp(\n    emp_id number,\n    emp_name varchar2(30),\n    st_flg\
  \ number(1) constraint \"st_flg must be 0 or 1\" check (st_flg in (0,1))\n);\n```\n\
  \n您还可以修改现有列以包含约束。该列不得包含任何违反正在启用的约束的值：\n```sql\nalter table emp add constraint \"\
  st_flg must be 0 or 1\" check (st_flg in (0,1));\n```\n\n### 工作原理\n\n\n"
- "# 第 18 章 ■ 对象管理\n\n检查约束在处理查找表时表现良好，特别是当您有一个包含少量相对静态值的短列表时，例如某列只能取`Y`或`N`值。在这种情况下，值列表很可能不会改变，并且除了`Y`或`N`之外没有其他信息需要存储，因此检查约束是合适的解决方案。\n\
  \n如果您有一个需要定期更新的长值列表，那么使用表和外键约束会是更好的解决方案（详见方案 18-14）。如果您有必须验证的复杂业务逻辑，那么应用程序代码会更合适。对于必须始终强制执行且可以用简单\
  \ SQL 表达式编写的业务规则，检查约束很有效。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  例如，如果您有一个业务规则要确保金额始终大于零，您可以使用检查约束：\n\n```sql\nalter table sales add constraint \"\
  sales_amt must be > 0\" check(sales_amt > 0);\n```\n\n检查约束必须对插入或更新的行计算为真或未知（空值）结果。您不能在检查约束中使用子查询或序列。同时，也不能引用`UID`、`USER`、`SYSDATE`或`USERENV`等\
  \ SQL 函数，或者`LEVEL`、`ROWNUM`等伪列。\n\n另一个常见的检查条件是判断列是否为空，为此应使用`NOT NULL`约束。`NOT NULL`约束可以通过多种方式定义。最简单的技术如下所示：\n\
  \n```sql\ncreate table emp(\n    emp_id number,\n    emp_name varchar2(30) not null\n\
  );\n```\n\n一个稍好的方法是给`NOT NULL`约束起一个您认为有意义的名字：\n\n```sql\ncreate table emp(\n   \
  \ emp_id number,\n    emp_name varchar2(30) constraint emp_name_nn not null\n);\n\
  ```\n\n如果您需要修改现有表的列，可以使用`ALTER TABLE`命令。要使以下命令生效，被定义为`NOT NULL`的列中必须不能有任何`NULL`值。\n\
  \n```sql\nalter table emp modify(emp_name not null);\n```\n\n如果当前被定义为`NOT NULL`的列中存在`NULL`值，那么要么先将该列更新为非空值，要么为该列指定一个默认值：\n\
  \n```sql\nalter table emp modify(emp_name default 'not available');\n```\n\n## 18-16.\
  \ 在数据库之间建立连接\n\n### 问题\n\n您希望在连接到本地数据库的同时，对远程数据库中的表运行 SQL 语句。\n\n### 解决方案\n\n使用数据库链接在两个数据库之间建立连接。您必须使用一种命名方法来解析远程数据库的位置。两种常用于解析远程数据库位置的方法是：\n\
  \n-   简单连接命名\n-   本地命名\n\n`简单连接命名`方法将远程数据库的位置直接嵌入到数据库链接中。在此示例中，远程主机是`OSS.EAST`，远程监听器的端口号是`1521`，远程实例名称是`BRDSTN`：\n\
  \n```sql\ncreate database link mss connect to e123 identified by e123\nusing 'oss.east:1521/BRDSTN';\n\
  ```\n\n`CONNECT TO`和`IDENTIFIED BY`子句分别标识远程用户和密码。远程用户账户不必是远程对象的所有者，它可以是一个具有访问远程对象权限的普通账户。\n\
  \n`本地命名`方法通过`tnsnames.ora`文件中的条目解析远程服务。该文件需要位于 Oracle 客户端库在尝试连接到远程数据库时会查找的目录中，例如由操作系统变量`TNS_ADMIN`指定的目录。在此示例中，TNS（透明网络底层，Oracle\
  \ 的网络架构）信息首先被放置在`tnsnames.ora`文件中：\n\n```\nmss =\n  (DESCRIPTION =\n    (ADDRESS\
  \ = (PROTOCOL=TCP) (HOST=oss.east)(PORT=1521))\n    (CONNECT_DATA=(SERVICE_NAME=BRDSTN)(SERVER=DEDICATED)))\n\
  ```\n\n\n#### 第 18 章：对象管理\n\n## 创建数据库链接\n\n现在可以通过引用 `tnsnames.ora` 文件中的 TNS 信息来创建数据库链接：\n\
  \n```sql\ncreate database link mss connect to E123 identified by E123 using 'MSS';\n\
  ```\n\n要删除数据库链接，请使用 `DROP DATABASE LINK` 命令：\n\n```sql\ndrop database link mss;\n\
  ```\n\n> **注意：** 还有另外两种远程数据库名称解析方法——`目录命名`（LDAP）和`外部命名`。有关如何实施此操作的详细信息，请参阅 *Oracle\
  \ 数据库网络服务管理员指南*，该文档可在 `http://www.oracle.com/technology` 获取。\n\n## 工作原理\n\n数据库链接只不过是到另一个数据库的命名连接。它使您能够访问存在于不同数据库中的对象。换句话说，数据库链接允许您对存在于远程数据库中的表和视图执行\
  \ `插入`、`更新`、`删除` 和 `选择` 语句。另一个数据库不必是 Oracle 数据库。但是，您必须使用 Oracle 异构服务来访问非 Oracle\
  \ 数据库。\n\n创建数据库链接后，您可以使用语法 `<远程对象>@<数据库链接>` 来引用远程表和视图。此示例从远程视图 `INVENTORY_V` 中选择计数：\n\
  \n```sql\nselect count(*) from inventory_v@mss;\n```\n\n您还可以在本地视图、同义词或物化视图中引用数据库链接，以在远程对象和本地对象之间提供一个透明层。此示例创建一个指向远程\
  \ `INVENTORY_V` 视图的本地同义词：\n\n```sql\ncreate synonym inventory_v for inventory_v@mss;\n\
  ```\n\n以下查询将显示有关用户数据库链接的信息：\n\n```sql\nselect db_link,username,password,host from\
  \ user_db_links;\n```\n\n要查看数据库中所有数据库链接的信息，请查询 `DBA_DB_LINKS` 视图。使用 `ALL_DB_LINKS`\
  \ 查看您的账户有权访问的所有数据库链接。查询 `USER_DB_LINKS` 以显示由您的账户拥有的数据库链接。\n\n您还可以创建一个可供数据库中所有用户访问的公共数据库链接。要创建公共链接，请使用\
  \ `PUBLIC` 子句：\n\n```sql\ncreate public database link mss connect to e123 identified\
  \ by e123 using 'oss.east:1521/BRDSTN';\n```\n\n##### 18-17. 创建自增值\n\n### 问题\n\n\
  您希望能够自动递增一个值，用于填充表中的主键。\n\n### 解决方案\n\n创建一个序列，然后在 `插入` 语句中引用它。以下示例使用一个序列来填充父表的主键值，然后使用同一个序列在子表中填充相应的外键值：\n\
  \n```sql\ncreate sequence inv_seq;\n```\n\n现在在 `插入` 语句中使用该序列。首次访问序列时，请使用 `NEXTVAL`\
  \ 伪列：\n\n```sql\ninsert into inv(inv_id, inv_desc) values (inv_seq.nextval, 'Book');\n\
  ```\n\n如果想重用同一个序列值，可以通过 `CURRVAL` 伪列引用它。\n\n接下来，向子表中插入一条记录，该记录的外键列使用与其父主键值相同的值：\n\
  \n```sql\ninsert into inv_lines(inv_line_id,inv_id,inv_item_desc) values (1, inv_seq.currval,\
  \ 'Tome1');\ninsert into inv_lines(inv_line_id,inv_id,inv_item_desc) values (2,\
  \ inv_seq.currval, 'Tome2');\n```\n\n### 工作原理\n\n`序列` 是一种数据库对象，用户可以访问它来选择唯一的整数。序列通常用于生成整数以填充主键和外键列。通过\
  \ `选择`、`插入` 或 `更新` 语句访问序列时，序列会递增。Oracle 保证选择的序列号将是唯一的。没有两个会话可以选择相同的序列号。\n\n如果未为序列指定起始编号和最大编号，默认情况下起始编号为\
  \ 1，增量为 1，最大值为 `10²⁷`。此示例指定起始值为 1000，最大值为 1000000：\n\n\n"
- '# 序列管理


  `create sequence inv2 start with 10000 maxvalue 1000000;`


  要删除序列，请使用 `DROP SEQUENCE` 语句：


  ```sql

  drop sequence inv;

  ```


  如果您拥有 `DBA` 权限，可以查询 `DBA_SEQUENCES` 视图以显示数据库中所有序列的信息。要查看您自己模式拥有的序列，请查询 `USER_SEQUENCES`
  视图：


  ```sql

  select sequence_name, min_value, max_value, increment_by from user_sequences;

  ```


  ## 重置序列号


  要重置序列号，您可以删除并以期望的起点重新创建该序列。以下代码删除并重新创建一个序列，使其从数字 1 开始：


  ```sql

  drop sequence cia_seq;

  create sequence cia_seq start with 1;

  ```


  之前这种重置序列号的方法存在一个问题：如果有其他模式访问该序列，它们将需要被重新授予对该序列的 `select` 权限。这是因为当您删除一个对象时，与该对象相关的所有权限授予也会被删除。


  除了删除并重建序列之外，另一种方法是先将序列的 `INCREMENT BY` 修改为比您想要重置的值小 1 的整数，然后再将序列的 `INCREMENT BY`
  修改回 1。这有效地重置了序列，而无需删除并重建，也消除了重新授予 `select` 权限的需要。以下几行 SQL 代码展示了此技术：


  ```sql

  UNDEFINE seq_name

  UNDEFINE reset_to

  PROMPT "sequence name"

  ACCEPT ''&&seq_name''

  PROMPT "reset to value"

  ACCEPT &&reset_to

  COL seq_id NEW_VALUE hold_seq_id

  COL min_id NEW_VALUE hold_min_id

  --

  SELECT &&reset_to - &&seq_name..nextval - 1 seq_id

  FROM dual;

  --

  SELECT &&hold_seq_id - 1 min_id

  FROM dual;

  --

  ALTER SEQUENCE &&seq_name INCREMENT BY &hold_seq_id MINVALUE &hold_min_id;

  --

  SELECT &&seq_name..nextval FROM dual;

  --

  ALTER SEQUENCE &&seq_name INCREMENT BY 1;

  ```


  为确保序列已设置为您的期望值，请从中选择 `NEXTVAL`：


  ```sql

  select &&seq_name..nextval from dual;

  ```


