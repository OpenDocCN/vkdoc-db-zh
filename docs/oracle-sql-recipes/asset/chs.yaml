- '# SQL 监控与调优


  SQL 是用于从数据库创建、检索、更新和删除（CRUD）数据的语言。如果您的 SQL 语句执行缓慢，整个系统都会受到影响。无论您是开发人员还是 DBA，有效地调优
  SQL 都是一项关键的工作要求。在对性能问题进行故障排除时，您必须知道如何识别和调整资源密集型的查询。


  一个优秀的开发人员必须熟悉查询调优技术。理想情况下，开发人员应在查询部署到生产环境之前主动评估其潜在的性能问题。实际上，糟糕的 SQL 往往会因为测试不充分，或者测试环境无法准确反映生产环境（在硬件、数据量、机器负载等方面）而进入生产环境。在部署了低效
  SQL 的场景中，开发人员必须熟悉用于识别和修复性能不佳查询的响应式技术。


  DBA（想要保住工作的人）也必须擅长识别那些霸占资源的 SQL 查询。当数据库代码执行性能不佳时，DBA 通常是第一个被寻求帮助的人。


  DBA 还应该能够帮助开发人员生成查询执行计划，并为性能不佳的 SQL 查询实施解决方案。


  大多数应用程序性能问题都可归因于代码对数据库的访问效率低下。这可能表现为 SQL、PL/SQL、JDBC 等形式。本章重点介绍用于识别和调优资源密集型 SQL
  语句的技术。如果您是 SQL 新手，本章将为关键的调优技能奠定基础。如果您已经熟悉 SQL，本章将介绍 Oracle 中与 SQL 调优相关的新功能。我们从基本任务开始，例如监控和识别资源密集型
  SQL 语句，然后逐步深入到生成和解释 SQL 执行计划等主题。



  '
- "# 执行计划\n\n## 19-1. 实时监控 SQL 执行统计信息\n\n### 问题\n\n你希望实时识别消耗资源最多的 SQL 语句。\n\n### 解决方案\n\
  \n如果你的数据库是 Oracle Database 11g，你可以使用以下查询，从`V$SQL_MONITOR`中进行选择，以监控 SQL 查询的近实时资源消耗情况：\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 19 章 ■ SQL 监控与调优\n\n```sql\n\
  select * from (\nselect\n    a.sid session_id\n    ,a.sql_id\n    ,a.status\n  \
  \  ,a.cpu_time/1000000 cpu_sec\n    ,a.buffer_gets\n    ,a.disk_reads\n    ,b.sql_text\
  \ sql_text\nfrom v$sql_monitor a\n    ,v$sql b\nwhere a.sql_id = b.sql_id\norder\
  \ by a.cpu_time desc)\nwhere rownum <=20;\n```\n\n该查询的输出结果不容易在一页内完整显示。以下是输出的一个子集：\n\
  \n```\nSESSION_ID SQL_ID        STATUS    CPU_SEC BUFFER_GETS DISK_READS SQL_TEXT\n\
  ---------- ------------- --------- -------- ----------- ---------- ------------\n\
  \       194 4k8runghhh31d DONE      7        8.66        0          select count(*)\n\
  \       191 9tjq6dfrwgzfr EXECUTING 45.57    1944        7          select output\
  \ f\n```\n\n在该查询中，使用了一个内联视图首先检索所有记录，并按`CPU_TIME`降序排列。然后，外部查询使用`ROWNUM`伪列将结果集限制为前二十行。你可以修改前面的查询，按你选择的统计信息排序。也可以修改它，只显示当前正在执行的查询。例如，下面的\
  \ SQL 语句按磁盘读取次数排序监控正在执行的查询：\n\n```sql\nselect * from (\nselect\n    a.sid session_id\n\
  \    ,a.sql_id\n    ,a.status\n    ,a.cpu_time/1000000 cpu_sec\n    ,a.buffer_gets\n\
  \    ,a.disk_reads\n    ,substr(b.sql_text,1,15) sql_text\nfrom v$sql_monitor a\n\
  \    ,v$sql b\nwhere a.sql_id = b.sql_id\n    and a.status='EXECUTING'\norder by\
  \ a.disk_reads desc)\nwhere rownum <=20;\n```\n\n`注意` 如果你使用的是 Oracle Database 10g\
  \ 或更早版本，请参阅配方 19-4 以显示消耗资源的查询。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 19 章 ■ SQL 监控与调优\n\n### 工作原理\n\n`V$SQL_MONITOR`中的统计信息每秒更新一次，因此你可以查看资源消耗的实时变化情况。默认情况下，如果\
  \ SQL 语句并行运行或消耗超过 5 秒的 CPU 或 I/O 时间，就会收集这些统计信息。\n\n`V$SQL_MONITOR`视图包含`V$SQL`、`V$SQLAREA`和`V$SQLSTATS`视图中统计信息的一个子集。`V$SQL_MONITOR`视图显示每次执行资源密集型\
  \ SQL 语句的实时统计信息，而`V$SQL`、`V$SQLAREA`和`V$SQLSTATS`则包含 SQL 语句多次执行的累计统计信息集。\n\n一旦 SQL\
  \ 语句执行结束，其运行时统计信息不会立即从`V$SQL_MONITOR`中清除。根据数据库的活动情况，这些统计信息可能会保留一段时间。如果你的数据库非常活跃，统计信息可能在查询完成后不久就被清除。\n\
  \n`提示` 你可以通过组合以下列来唯一标识`V$SQL_MONITOR`中 SQL 语句的一次执行：`SQL_ID`、`SQL_EXEC_START`、`SQL_EXEC_ID`。\n\
  \n## 19-2. 显示查询在执行计划中的进度\n\n### 问题\n\n你想确切查看 Oracle 在 SQL 执行计划中的哪个步骤花费了时间。你使用的是\
  \ Oracle Database 11g。\n\n### 解决方案\n\n如果你使用的是 Oracle Database 11g，你可以在 SQL 查询运行时，观察其执行计划的进度。`V$SQL_PLAN_MONITOR`视图包含\
  \ SQL 语句执行计划中每个步骤的一行记录。\n\n此查询将在查询运行时显示执行计划中每个步骤使用的行数和内存量。你需要使用一些 SQL*Plus 格式化命令来使输出可读：\n\
  \n```sql\nCOL SID FORMAT 99999\nCOL status FORMAT A15\nCOL start_time FORMAT A12\n\
  COL plan_line_id FORMAT 99999 HEAD \"Plan ID\"\nCOL plan_options FORMAT A16\nCOL\
  \ mem_bytes FORMAT 99999999\nCOL temp_bytes FORMAT 99999999\nSET LINESIZE 132 PAGESI\
  \ 100 TRIMSP ON\nBREAK ON sid on status on start_time NODUP SKIP 1\n--\n```\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 19 章 ■ SQL 监控与调优\n\n```sql\n\
  select\n```\n\n\n"
- '# 第 19 章 ■ SQL 监控与调优


  ```sql

  a.sid

  ,a.status

  ,to_char(a.sql_exec_start,''yymmdd hh24:mi'') start_time

  ,a.plan_line_id

  ,a.plan_operation

  ,a.plan_options

  ,a.output_rows

  ,a.workarea_mem mem_bytes

  ,a.workarea_tempseg temp_bytes

  from v$sql_plan_monitor a

  ,v$sql_monitor b

  where a.status NOT LIKE ''%DONE%''

  and a.key = b.key

  order by a.sid, a.sql_exec_start, a.plan_line_id;

  ```


  以下是部分输出列表（为适应页面显示，内存列已被移除）：


  ```

  SID STATUS START_TIME Plan ID PLAN_OPERATION PLAN_OPTIONS OUTPUT_ROWS

  ------ --------- ------------ ------- ---------------- ------------- -----------

  184 EXECUTING 090326 17:31 0 SELECT STATEMENT 0

  1 SORT ORDER BY 0

  2 HASH GROUP BY 0

  3 HASH JOIN 693940

  4 TABLE ACCESS FULL 7

  5 TABLE ACCESS FULL 693940

  ```


  你现在可以观察 Oracle 逐步执行执行计划中的每一行，并更新相应的行数、内存使用字节数和临时空间使用字节数。


  ### 工作原理


  在调优 SQL 查询时，你可能想知道执行计划中的哪些步骤消耗了最多的资源。`V$SQL_PLAN_MONITOR`视图提供了使用资源最多的步骤的信息。该视图中的统计信息每秒更新一次。


  你还可以使用`DBMS_SQLTUNE`包的`REPORT_SQL_MONITOR`函数，生成关于执行计划中查询进度的实时文本、HTML 或 XML 格式报告。


  ■ 注意 截至本书撰写时，使用`DBMS_SQLTUNE`包需要额外许可，它是 Oracle 调优包的一部分。


  下一个示例演示了如何生成这样的报告。如果你在 SQL*Plus 中运行此命令，请确保使用`SET`命令将变量设置为合适的值，以便查看结果：


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ```sql

  SQL> SET LINES 3000 PAGES 0 LONG 1000000 TRIMSPOOL ON

  ```


  如果你没有向`REPORT_SQL_MONITOR`传递任何参数，Oracle 默认会报告最后监控的查询：


  ```sql

  select dbms_sqltune.report_sql_monitor from dual;

  ```


  这是输出的一小部分：


  ```

  Global Information

  Status : DONE (ALL ROWS)

  Instance ID : 1

  Session ID : 185

  SQL ID : 1nzw6bfkm0pry

  SQL Execution ID : 16777218

  Plan Hash Value : 2855621993

  Execution Started : 07/17/2009 15:35:31

  First Refresh Time : 07/17/2009 15:35:37

  Last Refresh Time : 07/17/2009 15:37:21

  | Elapsed | Cpu | IO | Fetch | Buffer | Reads | Writes |

  | Time(s) | Time(s) | Waits(s) | Calls | Gets | | |

  | 100 | 13 | 86 | 275 | 22827 | 24866 | 6231 |

  ```


  你也可以指示`REPORT_SQL_MONITOR`报告特定的会话 ID 或 SQL ID。此示例报告会话 ID 为 185 的正在被监控的 SQL：


  ```sql

  select dbms_sqltune.report_sql_monitor(session_id=>185) from dual;

  ```


  默认情况下，`REPORT_SQL_MONITOR`生成文本报告。如果你愿意，可以创建 HTML 或 XML 格式的报告。此示例生成 HTML 报告，使用 SQL*Plus
  的`SPOOL`命令将输出捕获到一个文件：


  ```sql

  SET LINES 3000 PAGES 0 LONG 1000000 TRIMSPOOL ON

  SPOOL out.html

