- "# 第 19 章 SQL 监控与调优\n\n### 表 19-3 最常见的访问路径\n\n| 访问路径 | 描述 |\n|----------|------|\n\
  | 全表扫描 | 读取表中的所有行，当需要读取表的大部分行时，这种方式效率较高。当只需要读取表的一小部分数据时，可以创建索引来避免全表扫描。 |\n| ROWID\
  \ 扫描 | 通过`ROWID`定位一行。`ROWID`包含该行在数据文件和块中的物理位置，当检索的行数相对较少时效率高，当读取表的大部分数据时效率较低。 |\n\
  | 索引扫描 | 索引包含键值和一个`ROWID`。如果查询只需要索引键值中包含的信息，`Oracle`直接返回这些值；否则，它会使用`ROWID`从表行中检索额外的数据。\
  \ |\n\n`连接方法`是优化器用于从多个表中检索数据的技术。连接语句源于在`WHERE`子句中连接的表。表 19-4 概述了各种连接方法。优化器必须为每个连接语句计算以下内容：\n\
  \n- 返回连接中每个表的行所使用的访问路径\n- 连接方法\n- 当连接涉及两个以上表时的连接顺序\n\n### 表 19-4 连接方法\n\n| 连接方法\
  \ | 描述 |\n|----------|------|\n| 嵌套循环 | 当连接少量数据子集，并且对连接中第二个表（内表）有唯一索引或高度选择性的索引访问时非常有用。\
  \ |\n| 哈希连接 | 对于连接大型数据集效率高。在内存中基于较小表或结果集的连接键构建一个哈希表。扫描较大的表，并使用哈希表来检索行。 |\n```\n\n\
  # 第 19 章 SQL 监控与调优\n\n## 排序合并连接\n将来自两个独立表或结果集的行进行连接。当行已排序时，排序合并连接效率较高。哈希连接通常比排序合并连接更高效。\n\
  \n## 笛卡尔连接\n在没有连接条件时使用。\n\n## 外连接\n返回其中一个表中不满足连接条件的行。\n\n执行计划（有时也称为解释计划）是 DBA 和开发人员用于改进\
  \ SQL 查询性能的便捷工具。如果你刚开始使用执行计划，请遵循以下启发式方法入门：\n\n-   确定查询需要运行的快慢程度。\n-   确保已生成准确的统计信息（详情参见配方\
  \ 19-13）。\n-   确定 `WHERE` 子句中使用的列是否存在索引（查看表上创建的索引方法参见配方 10-5）。\n-   关注执行计划中代价最高的步骤，并确定对操作所涉及的列创建索引是否可能降低代价（创建索引的详情参见配方\
  \ 18-7）。\n-   查询大表时，确定并行提示（hint）是否可能有所帮助。\n-   确定查询（或其部分）是否可以重写以获得更好的性能。\n\n执行计划的结果有时可能反直觉，因为优化器会判断使用索引代价过高。或者优化器可能判定全表扫描比使用索引更高效。\n\
  \n在开发查询时，有时分阶段编写并分析每个阶段后的执行计划是有用的。例如，你可能有一个连接五个表并在 `WHERE` 子句中有多个条件的查询。不要等到开发完整个查询才生成解释计划。\n\
  \n相反，在迭代地向 `WHERE` 子句添加表和条件时生成执行计划。\n\n如果你在开启统计信息的情况下生成解释计划（通过 `SET AUTOTRACE ON\
  \ STATISTICS`），你还会看到类似这样的输出：\n\n```\nStatistics\n----------------------------------------------------------\n\
  \t276  recursive calls\n\t  0  db block gets\n\t 51  consistent gets\n\t  7  physical\
  \ reads\n\t  0  redo size\n\t583  bytes sent via SQL*Net to client\n\t524  bytes\
  \ received via SQL*Net from client\n\t  2  SQL*Net roundtrips to/from client\n\t\
  \  4  sorts (memory)\n\t  0  sorts (disk)\n\t  3  rows processed\n```\n\n这些统计信息在表\
  \ 19-5 中描述。一般来说，查询调优的目标之一是尝试减少查询所需的 `一致性读取` 次数。\n\n### 表 19-5. 执行计划统计信息\n\n| 统计项\
  \ | 描述 |\n| :--- | :--- |\n| `recursive calls` | Oracle 执行的初步工作，例如检查语法、语义、权限、查找数据字典信息等。\
  \ |\n| `db block gets` | Oracle 需要数据块当前版本的次数。 |\n| `consistent gets` | 读取数据块一致性版本的次数。一致性版本是\
  \ SQL 语句启动时的数据块状态。逻辑读取等于 `db block gets` 加上 `consistent gets`。 |\n| `physical reads`\
  \ | 因内存中未找到数据块而从磁盘读取的块数。 |\n| `redo size` | Oracle 为 SQL 操作写入重做流的信息量。 |\n| `bytes\
  \ sent via SQL*Net to client` | 发送到客户端工具的字节数。 |\n| `bytes received via SQL*Net from\
  \ client` | 从客户端工具接收的字节数。 |\n| `SQL*Net roundtrips to/from client` | 向客户端发送和从客户端接收数据的次数。\
  \ |\n| `sorts (memory)` | 在内存中执行的排序操作次数。 |\n| `sorts (disk)` | 在磁盘上执行的排序操作次数。 |\n\
  | `rows processed` | 查询返回的总行数。 |\n\n##### 19-11. 获取 SQL 调优建议\n\n### 问题\n你希望获得关于如何改进问题查询性能的建议。\n\
  \n### 解决方案\n使用 `SQL 调优顾问` 来显示关于如何提高查询性能的建议。\n\n\n#### 第 19 章：SQL 监控与调优\n\n**注意**\
  \ 截至本书撰写时，SQL 调优顾问属于 Oracle 数据库调优包，需要额外付费许可。\n\n请按以下步骤从调优顾问获取调优建议：\n\n1.  以特权用户连接，并向将执行调优分析的模式授予以下权限：\n\
  \n   ```sql\n   GRANT ADMINISTER SQL TUNING SET TO &&tune_user;\n   GRANT ADVISOR\
  \ TO &&tune_user;\n   GRANT CREATE ANY SQL PROFILE TO &&tune_user;\n   GRANT ALTER\
  \ ANY SQL PROFILE TO &&tune_user;\n   GRANT DROP ANY SQL PROFILE TO &&tune_user;\n\
  \   ```\n\n   如果您使用的是 Oracle Database 11g，前面的 `GRANT ... ANY SQL PROFILE` 语句可以替换为：\n\
  \n   ```sql\n   GRANT ADMINISTER SQL MANAGEMENT OBJECT TO &&tune_user;\n   ```\n\
  \n2.  使用 `DBMS_SQLTUNE` 包创建调优任务。修改以下代码以匹配您要尝试调优的查询以及您的用户名：\n\n   ```sql\n   DECLARE\n\
  \     tune_task_name VARCHAR2(30);\n     tune_sql CLOB;\n   BEGIN\n     tune_sql\
  \ := 'select a.emp_name, b.dept_name from emp a, dept b';\n     tune_task_name :=\
  \ DBMS_SQLTUNE.CREATE_TUNING_TASK(\n       sql_text => tune_sql,\n       user_name\
  \ => 'STAR_APR',\n       scope => 'COMPREHENSIVE',\n       time_limit => 1800,\n\
  \       task_name => 'tune1',\n       description => 'Basic tuning example'\n  \
  \   );\n   END;\n   /\n   ```\n\n3.  通过查询 `USER_ADVISOR_LOG` 视图来验证您的调优任务是否存在：\n\n\
  \   ```sql\n   SQL> SELECT task_name FROM user_advisor_log WHERE task_name LIKE\
  \ 'tune1';\n   ```\n\n4.  运行调优任务：\n\n   ```sql\n   SQL> EXEC DBMS_SQLTUNE.EXECUTE_TUNING_TASK(task_name=>'tune1');\n\
  \   ```\n\n5.  显示 SQL 调优顾问报告。运行以下 SQL 语句显示输出：\n\n   ```sql\n   SET LONG 10000\n\
  \   SET LONGCHUNKSIZE 10000\n   SET LINESIZE 132\n   SET PAGESIZE 200\n   --\n \
  \  SELECT DBMS_SQLTUNE.REPORT_TUNING_TASK('tune1') FROM dual;\n   ```\n\n   以下是输出的片段：\n\
  \n   3- 重构 SQL 发现（参见解释计划部分中的计划 1）\n\n   在执行计划的行 ID 1 处发现了一个昂贵的笛卡尔积操作。\n\n   **建议**\n\
  \n   -   考虑从此语句中移除未关联的表或视图，或者添加一个引用它的连接条件。\n\n   **原理**\n\n   应尽可能避免笛卡尔积，因为它是一种昂贵的操作，并且可能产生大量数据。\n\
  \n   从前面的输出可以看出，SQL 调优顾问报告正确地建议重写查询，以避免使用笛卡尔连接。\n\n**工作原理**\n\nSQL 调优顾问有助于自动完成调优性能不佳的查询的任务。该工具相当易于使用，其调优输出报告提供了关于如何调优查询的详细建议。\n\
  \n如果您需要删除调优任务，可以使用 `DBMS_SQLTUNE` 包，如下所示：\n\n```sql\nSQL> EXEC DBMS_SQLTUNE.DROP_TUNING_TASK(task_name=>'tune1');\n\
  ```\n\n**注意** SQL 调优顾问在 Oracle Enterprise Manager 中也可用。如果您有 Enterprise Manager 的访问权限，可能会发现使用图形界面更容易。\n\
  \n##### 19-12. 对查询强制使用自己的执行计划\n\n### 问题\n\n您怀疑优化器没有使用可用的索引。您希望强制优化器使用该索引，并查看查询的成本是否降低。\n\
  \n### 解决方案\n\n提示（hint）的语法是将注释 `/*+ <hint> */` 紧跟在 `SELECT` 关键字之后。以下代码使用 `INDEX`\
  \ 提示来指示优化器在 `EMP` 表上使用 `EMP_IDX1` 索引：\n\n```sql\nSELECT /*+ INDEX (emp emp_idx1)\
  \ */\n  ename\nFROM emp\nWHERE ename='Chaya';\n```\n\n如果使用表别名，请确保在提示中引用的是别名，而不是表名。使用别名时，如果在提示中使用表名，该提示将被忽略。以下示例在全表扫描提示中引用了表别名：\n\
  \n```sql\nSELECT /*+ FULL(a) */ ename\nFROM emp a\nWHERE ename='Heera';\n```\n\n\
  \n# SQL 提示\n\n## 重要注意事项\n\n如果你拼错了提示（hint）的名称，或者在表别名或索引名称中打错了字，Oracle 将忽略该提示。你可以通过设置\
  \ `AUTOTRACE ON` 并查看执行计划来验证提示是否被使用。\n\n请记住，在某些情况下 Oracle 会忽略提示。Oracle 可能判定提示指令在给定场景下不可行，因此拒绝你的建议。\n\
  \n## 工作原理\n\nSQL 提示允许你在执行计划中覆盖优化器的选择。有时，因为你知道一些优化器不了解的环境信息（就像相机上的运动或风景设置），查询性能问题可以得到改善。\n\
  \n例如，假设你有一个数据仓库数据库使用系统范围的 `ALL_ROWS` 设置，但你也想针对该数据库运行一个 OLTP 报表查询，该查询使用 `FIRST_ROWS`\
  \ 设置会更高效。在这种情况下，你可以提示优化器使用 `FIRST_ROWS` 而不是 `ALL_ROWS`。\n\n## 使用建议\n\n我们建议你谨慎使用提示。在使用提示之前，首先尝试找出优化器为何没有选择高效的执行计划。研究是否可以重写查询，或者添加索引或生成新的统计信息是否有帮助。依赖提示来获得良好的性能既耗时，也可能在升级到较新版本的数据库时导致问题。\n\
  \n## 提示分类\n\n在最新版本的 Oracle 中，有超过 200 种不同的提示。描述每一个提示超出了本教程的范围。**表 19-6** 描述了提示的主要类别。\n\
  \n**提示** 从 Oracle Database 11*g* 开始，你可以查询 `V$SQL_HINT` 来获取有关提示的信息。\n\n*表 19-6. SQL\
  \ 提示分类*\n\n| 提示类别 | 描述 | 提示示例 |\n| :--- | :--- | :--- |\n| **优化器目标** | 优化吞吐量或响应速度。\
  \ | `ALL_ROWS`, `FIRST_ROWS` |\n| **访问路径** | 检索数据的路径。 | `INDEX`, `NO_INDEX`, `FULL`\
  \ |\n| **查询转换** | 以不同方式执行查询。 | `STAR_TRANSFORMATION`, `MERGE`, `FACT`, `REWRITE`\
  \ |\n| **连接顺序** | 更改要连接的表的顺序。 | `ORDERED`, `LEADING` |\n| **并行操作** | 并行执行。 | `PARALLEL`,\
  \ `PARALLEL_INDEX`, `NOPARALLEL` |\n| **连接操作** | 如何连接表。 | `USE_NL`, `USE_MERGE`,\
  \ `USE_HASH` |\n| **杂项** | 不属于特定类别但有时有用的提示。 | `APPEND`, `CACHE`, `DRIVING_SITE`\
  \ |\n\n##### 19-13. 查看优化器统计信息\n\n## 问题\n\n你遇到了性能问题。你想确定被查询的表是否存在统计信息。\n\n## 解决方案\n\
  \n检查统计信息是否准确的一个快速简便的方法是比较 `USER_TABLES` 中的 `NUM_ROWS` 列与表的实际行数。以下脚本将提示你输入表名：\n```sql\n\
  select a.num_rows/b.actual_rows\nfrom user_tables a\n,(select count(*) actual_rows\
  \ from &&table_name) b\nwhere a.table_name=upper('&&table_name');\n```\n\n下一个脚本使用\
  \ SQL 为某个用户的所有表生成前面的 SQL。该脚本使用 SQL*Plus 格式化命令来关闭标题和分页：\n```sql\nset head off pages\
  \ 0 lines 132 trimspool on\nspo show_stale.sql\nselect\n'select ' || '''' || table_name\
  \ || ': ' || '''' || '||' || chr(10) ||\n' round(decode(b.actual_rows,0,0,a.num_rows/b.actual_rows),2)\
  \ ' || chr(10) ||\n'from user_tables a ' ||\n',(select count(*) actual_rows from\
  \ ' || table_name || ') b' || chr(10) ||\n'where a.table_name=(' || '''' || table_name\
  \ || '''' || ');'\nfrom user_tables;\nspo off;\n```\n\n此脚本会生成一个名为 `show_stale.sql`\
  \ 的文件，你可以执行该文件以显示表统计信息的陈旧程度。\n\n## 工作原理\n\n解决方案部分中的脚本使用了收集统计信息时填充的 `NUM_ROWS` 列。如果\
  \ `NUM_ROWS` 与实际行数的百分比差异超过 10%，则统计信息可能已经陈旧。\n\n\n# SQL 监控与调优：统计信息\n\n## 查看统计信息生成时间\n\
  \n判断统计信息是否为近期生成，有几种其他技巧。例如，你可以检查 `USER_TABLES` 和 `USER_INDEXES` 视图的 `LAST_ANALYZED`\
  \ 列，以确定你的表和索引最后一次被分析的时间。以下查询显示了当前模式下各表最后一次被分析的时间：\n\n```sql\nselect table_name,\
  \ last_analyzed, monitoring\nfrom user_tables\norder by last_analyzed;\n```\n\n\
  以下查询则报告了当前模式下各索引最后一次被分析的时间：\n\n```sql\nselect index_name, last_analyzed\nfrom user_indexes\n\
  order by last_analyzed;\n```\n\n孤立地查看表和索引最后一次生成统计信息的时间可能有些误导。`LAST_ANALYZED` 列确实能告诉你统计信息是否曾经生成过，但也就仅此而已。仅凭\
  \ `LAST_ANALYZED` 时间不足以确定统计信息是否需要重新生成。\n\n要获取关于表统计信息的更详细信息，请使用 `USER_TAB_STATISTICS`\
  \ 视图。此视图包含为表生成的众多优化器统计信息。例如，该视图有一个 `STALE_STATS` 列，用于指示 Oracle 是否认为统计信息已过时。\n\n\
  以下查询显示了诸如 `SAMPLE_SIZE` 和 `STALE_STATS` 等统计信息：\n\n```sql\nselect table_name, partition_name,\
  \ last_analyzed, num_rows, sample_size, stale_stats\nfrom user_tab_statistics\n\
  order by last_analyzed;\n```\n\n与表统计信息类似，你也可以通过查询 `USER_IND_STATISTICS` 视图来查看索引统计信息：\n\
  \n```sql\nselect index_name, partition_name, last_analyzed, num_rows, sample_size,\
  \ stale_stats\nfrom user_ind_statistics\norder by last_analyzed;\n```\n\n如果你想确定自上次生成统计信息以来，发生了多少\
  \ `INSERT`、`UPDATE`、`DELETE` 和 `TRUNCATE` 活动，请查询 `USER_TAB_MODIFICATIONS` 视图。例如，你可能会遇到这样一种情况：一个表在插入大量新记录之前被截断。你可以运行如下查询来验证此类活动是否自上次生成统计信息以来发生过：\n\
  \n```sql\nselect table_name, partition_name, inserts, updates, deletes, truncated,\
  \ timestamp\nfrom user_tab_modifications\norder by table_name;\n```\n\n如果你检测到表中的数据发生了显著变化，你应该考虑手动生成统计信息（详情请参阅配方\
  \ 19-14）。\n\n> **注意**：`USER_TAB_MODIFICATIONS` 视图并非实时更新。Oracle 会定期将内存中的结果刷新到此表。要强制\
  \ Oracle 将这些统计信息从内存中刷新，请运行 `DBMS_STATS.FLUSH_DATABASE_MONITORING_INFO` 过程。\n\n##\
  \ 生成统计信息\n\n**问题**\n你刚刚向一个表中加载了大量新数据。现在遇到了性能问题，你想为刚刚加载的表生成统计信息。\n\n**解决方案**\n使用\
  \ `DBMS_STATS` 包来生成新的统计信息。在下面这段代码中，为 `STAR1` 模式生成了统计信息。\n\n```sql\nSQL> exec dbms_stats.gather_schema_stats(ownname\
  \ => 'STAR1', -\nestimate_percent => DBMS_STATS.AUTO_SAMPLE_SIZE, -\ndegree => DBMS_STATS.AUTO_DEGREE,\
  \ -\ncascade => true);\n```\n\n`ESTIMATE_PERCENT` 参数设置为 `AUTO_SAMPLE_SIZE`。这指示 Oracle\
  \ 确定最佳的样本大小。\n\n`DEGREE` 参数设置为 `AUTO_DEGREE`。这允许 Oracle 根据硬件和初始化参数选择最佳的并行度。\n\n\
  `CASCADE` 值为 `TRUE` 指示 Oracle 同时收集索引统计信息（针对任何被分析的表）。\n\n> **注意**：你也可以使用 `ANALYZE`\
  \ 语句配合 `COMPUTE` 或 `ESTIMATE` 子句来生成统计信息。\n> 然而，Oracle 强烈建议**不要**使用 `ANALYZE` 语句来生成对象统计信息。相反，你应该使用\
  \ `DBMS_STATS` 包。\n\n**工作原理**\n\n\n\n# 第 20 章 数据库故障排除\n\n数据库故障排除是一个泛称，适用于广泛的主题范围，例如解决存储问题、调查性能迟缓或监控数据库对象。SQL\
  \ 通常是你用来初步了解数据库中可能出现问题的第一个工具。因此，你必须熟悉用于提取和分析数据库信息的 SQL 技术。\n\n本章中的方法主要面向数据库管理员（DBA）。然而，如果你是一名开发人员，其中许多主题也会间接影响你与数据库高效协作的能力。了解本章所述问题的解决方案将使你对\
  \ Oracle 架构有更深入的理解，并为你提供信息，以便与那位脾气不好、守着自己一亩三分地的老旧数据库管理员一起排查应用程序问题。\n\n当然，DBA 需要成为识别其数据库内问题领域的专家。对于任何连接性、性能或可用性问题，DBA\
  \ 都是团队中寻求帮助的关键成员。一名优秀的 DBA 必须精通 SQL，尤其是在故障排除方面。\n\n要涵盖所有可用于排查数据库问题的 SQL 语句类型是不可能的。相反，我们提供一些处理常见数据库痛点的\
  \ SQL 见解。我们将首先展示如何识别潜在问题，然后探讨如何处理存储问题和数据库审计。\n\n调用 `DBMS_STATS` 有多种方法。例如，如果你只想为一个表生成统计信息，请使用\
  \ `GATHER_TABLE_STATS` 过程。此示例为 `D_DOMAINS` 表收集统计信息：\n\n```sql\nSQL> exec dbms_stats.gather_table_stats(ownname=>'STAR2',tabname=>'D_DOMAINS',-\n\
  > cascade=>true, estimate_percent=>20, degree=4);\n```\n\n从 Oracle Database 10g\
  \ 开始，有一个默认的 `DBMS_SCHEDULER` 作业每天运行一次，自动分析你的数据库对象。要查看此作业上次运行的时间，请执行以下查询：\n\n```sql\n\
  select\nowner\n,job_name\n,last_start_date\nfrom dba_scheduler_jobs\nwhere job_name\
  \ IN\n('GATHER_STATS_JOB', -- 10g\n'BSLN_MAINTAIN_STATS_JOB' -- 11g\n);\n```\n\n\
  对于许多数据库，这种自动统计信息收集作业是足够的。然而，在 SQL 查询所基于的表中，如果有很大比例的数据被修改后，你可能会遇到性能不佳的情况。在表数据发生显著变化的情况下，你可能需要如本方法解决方案部分所示，手动生成统计信息。\n\
  \n当你运行一个查询时，如果某个表没有生成统计信息，Oracle 默认会动态尝试估算优化器统计信息。要使动态采样生效，必须设置 `OPTIMIZER_DYNAMIC_SAMPLING`\
  \ 初始化参数。在 Oracle Database 10g 及更高版本中，此参数的默认值为 2。如果你启用了 `AUTOTRACE`，Oracle 会如下标示\
  \ SQL 语句使用了动态采样：\n\n注意\n- 此语句使用了动态采样\n\n##### 20-1. 确定数据库问题的原因\n\n### 问题\n\n用户报告称，使用数据库的应用程序行为异常。你的经理要求你检查数据库是否出了什么问题。\n\
  \n### 解决方案\n\n在诊断数据库问题时，你必须有一个策略来确定从何处查找问题。例如，如果用户报告了特定的数据库错误，或者警报日志中有详细的消息，那么显然应该从调查这些报告的问题开始。\n\
  \n如果没有明确的起点，你可以运行自动工作量仓库（AWR）报告（需要许可）或 Statspack 报告；有关如何运行这些报告的更多详细信息，请参见第 19 章。如果你没有这些工具可用，可以直接查询数据字典以确定数据库是否承受压力以及问题的根本原因是什么。\n\
  \n下一个查询使用 `V$SYSSTAT` 视图来确定数据库处理用户请求所花费的时间和 CPU 时间，从而推断出数据库等待时间（通过减法）。这与可用时间有关，可用时间是挂钟时间乘以\
  \ CPU 数量。此查询的目的是确定你的数据库是否花费了过多时间等待资源（这是系统过载的迹象）：\n\n```sql\nselect\nround(100*CPU_sec/available_time,2)\
  \ \"ORACLE CPU TIME AS % AVAIL.\"\n,round(100*(DB_sec - CPU_sec)/available_time,2)\
  \ \"NON-IDLE WAITS AS % AVAIL.\"\n,case\nsign(available_time - DB_sec)\nwhen 1 then\
  \ round(100*(available_time - DB_sec) / available_time, 2)\nelse 0\nend \"ORACLE\
  \ IDLE AS % AVAIL.\"\nfrom\n(\nselect\n(sysdate - i.startup_time) * 86400 * c.cpus\
  \ available_time\n,t.DB_sec\n,t.CPU_sec\nfrom v$instance i\n,(select value cpus\n\
  from v$parameter\nwhere name = 'cpu_count') c\n,(select\nsum(case name\nwhen 'DB\
  \ time' then round(value/100)\nelse 0\nend) DB_sec\n,sum(case name\nwhen 'DB time'\
  \ then 0\nelse round(value/100)\nend) CPU_sec\nfrom v$sysstat\nwhere name in ('DB\
  \ time', 'CPU used by this session')) t\nwhere i.instance_number = userenv('INSTANCE')\n\
  );\n```\n\n以下是一些输出：\n\n```\nORACLE CPU TIME AS % AVAIL. NON-IDLE WAITS AS % AVAIL.\
  \ ORACLE IDLE AS % AVAIL.\n--------------------------- --------------------------\
  \ -----------------------\n31.97                       129.59                  \
  \   0\n```\n\n如非空闲等待所示，该数据库显然处于高负载状态。既然我们知道了存在与资源等待相关的问题，下一个问题就是具体确定等待发生在哪里。以下查询详细说明了\
  \ Oracle 的等待时间分布。该查询使用了一些标准的 SQL*Plus 格式化命令，以使输出更易读：\n\n```sql\ncol wait_class format\
  \ A15\ncol event format A35 trunc\ncol \"CLASS AS % OF WHOLE\" format 990.00 HEAD\
  \ \"CLASS AS|% OF WHOLE\"\ncol \"EVENT AS % OF CLASS\" like \"CLASS AS % OF WHOLE\"\
  \ HEAD \"EVENT AS|% OF CLASS\"\ncol \"EVENT AS % OF WHOLE\" like \"CLASS AS % OF\
  \ WHOLE\" HEAD \"EVENT AS|% OF WHOLE\"\nset pagesize 30\nbreak on wait_class on\
  \ \"CLASS AS % OF WHOLE\"\n--\n\nselect\nwait_class,\nround(100 * time_class / total_waits,\
  \ 2) \"CLASS AS % OF WHOLE\", event,\nround(100 * time_waited / time_class, 2) \"\
  EVENT AS % OF CLASS\", round(100 * time_waited / total_waits, 2) \"EVENT AS % OF\
  \ WHOLE\"\nfrom\n(select\nwait_class\n,event\n,time_waited\n,sum(time_waited) over\
  \ (partition by wait_class) time_class\n,rank() over (partition by wait_class order\
  \ by time_waited desc) rank_within_class\n,sum(time_waited) over () total_waits\n\
  from v$system_event\nwhere wait_class <> 'Idle')\nwhere rank_within_class <= 3\n\
  order by time_class desc, rank_within_class;\n```\n\n以下是输出片段：\n\n```\n         \
  \          CLASS AS     EVENT AS     EVENT AS\nWAIT_CLASS         % OF WHOLE   %\
  \ OF CLASS   % OF WHOLE\n------------ --------------- ------------ ------------\n\
  System I/O           15.50        60.14         9.32\n                         \
  \       log file parallel write\n                                db file parallel\
  \ write    18.59         2.88\n                                control file parallel\
  \ write 17.80      2.76\n\nCommit               14.34       100.00        14.34\n\
  \                                log file sync\n\nUser I/O             12.40   \
  \     59.47         7.37\n                                db file scattered read\n\
  \                                db file sequential read   26.11         3.24\n\
  \                                direct path read           5.99         0.74\n\
  ```\n\n从报告的 System I/O 部分来看，`log file parallel write` 事件可能表明在线重做日志文件中存在争用。同样，从 User\
  \ I/O 部分来看，`db file scattered read` 等待事件可能表明 SQL 查询正在执行过多的全表扫描。如果你认为问题是 SQL 性能问题，请参见第\
  \ 19 章了解如何隔离性能不佳的 SQL。\n\n\n\n# 第 20 章 数据库故障排除\n\n## 常见等待事件\n\n表 20-1 列出了一些影响性能的常见等待事件。这绝非详尽无遗的列表，它只是众多等待事件类型中的一部分，包含描述和可能的应对措施。目前存在超过\
  \ 900 种不同类型的等待事件（具体数量取决于您使用的 Oracle 版本）。有关所有等待事件的完整列表和描述，请参阅 Oracle 的《数据库参考指南》，网址为`otn.oracle.com`。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n表 20-1. 常见数据库等待事件\n| 等待事件\
  \ | 描述 | 进一步检查 |\n| :--- | :--- | :--- |\n| `db file scattered read` | 为多个块执行 I/O\
  \ 的实际时间（通常由全表扫描引起）。 | I/O 过多，SQL 执行不佳；参见第 19 章进行 SQL 调优。 |\n| `db file sequential\
  \ read` | 为单个块执行 I/O 的实际时间（通常与索引扫描相关）。 | I/O 过多，SQL 执行不佳；参见第 19 章进行 SQL 调优。 |\n\
  | `free buffer waits` | 在检查缓存寻找空闲缓冲区后未找到空闲缓冲区，或等待脏缓冲区被写入磁盘时的等待时间。 | 表示缓存中空闲缓冲区不足；检查缓冲区缓存统计信息，看缓存是否过小或过大。\
  \ |\n| `buffer busy waits` | 等待缓冲区变为可用的等待时间。 | 检查`V$SESSION`以确定块争用的类型。 |\n| `db\
  \ file parallel write` | 数据库写入器等待 I/O 完成的时间。 | 磁盘 I/O 争用。 |\n| `log file parallel\
  \ write` | 将重做信息从日志缓冲区写入磁盘的 I/O 完成时间。 | 减少在线重做日志的 I/O 争用；将日志移到专用磁盘或更快的磁盘。 |\n| `log\
  \ file sync` | 用户提交时刷新重做信息的时间。 | 减少在线重做日志的 I/O 争用；将日志移到专用磁盘或更快的磁盘。 |\n| `log file\
  \ switch (archiving needed)` | 因为日志写入器将切换到未归档的重做日志而等待日志切换。 | 归档目标可能空间不足或归档无法足够快地读取重做日志。\
  \ |\n| `log file switch (checkpoint incomplete)` | 因为日志的检查点未完成而等待日志切换。 | 可能重做日志过少或过小（参见配方\
  \ 20-3）。 |\n| `control file parallel write` | 完成写入所有控制文件的时间。 | 控制文件中的 I/O 争用。 |\n\
  | `SQL*Net more data to client` | 服务器向客户端发送数据以完成传输的时间。 | 可能存在网络或中间层瓶颈。 |\n| `SQL*Net\
  \ more data from client` | 服务器等待客户端发送更多数据。 | 可能存在网络或中间层瓶颈。 |\n| `SQL*Net message\
  \ to/from client` | 用户客户端和服务器之间的通信时间。 | 可能存在网络或中间层瓶颈。 |\n| `enq: TX - row lock contention`\
  \ | 内部事务锁。 | 潜在的锁问题，查询`V$LOCK`。 |\n| `enq: TM - contention` | 内部 DML 锁。 | 潜在的锁问题，查询`V$LOCK`。\
  \ |\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 工作原理\n\n有时开发人员和数据库管理员（DBA）采用老式的“战舰”方法进行数据库故障排除。他们以一种碰运气的方式，随机地向数据库发送可能有助于揭示问题的查询。然而，这是一种低效的排错方式。相反，我们建议您采用更有针对性的故障排除方法。首先运行一个工具（如\
  \ AWR）或本配方解决方案部分提供的查询，以指向真正的问题所在。\n\n解决方案部分的查询使用了 Oracle 的动态性能视图`V$SYSSTAT`和`V$SYSTEM_EVENT`来帮助定位数据库问题的可能来源。表\
  \ 20-2 列出了常用于排除数据库问题的视图描述。\n\n我们意识到，从`V$SYSSTAT`和`V$SYSTEM_EVENT`等视图中选择数据有其固有的局限性，因为这些视图报告的是自实例启动以来收集的平均值。如果可能，查询\
  \ AWR 或 Statspack 历史视图会更好。然而，尽管存在这些已知的局限性，解决方案部分的查询仍将为您提供一个开始数据库故障排除的起点。关键是，您应该从一套能够引导您努力方向的工具开始分析。\n\
  \n表 20-2. 常用的 Oracle 动态性能视图\n| 视图 | 描述 |\n| :--- | :--- |\n| `V$SYSSTAT` | 系统级别的累积工作负载统计信息。\
  \ |\n| `V$SESSTAT` | 会话级别的累积工作负载统计信息。 |\n| `V$SEGSTAT` | 段级别的累积工作负载统计信息。 |\n| `V$EVENT_NAME`\
  \ | 所有等待事件及其关联的类。 |\n| `V$SYSTEM_EVENT` | 所有会话因某个事件而等待的总次数。 |\n| `V$SESSION_EVENT`\
  \ | 单个会话因某个事件而等待的总次数。 |\n| `V$SESSION_WAIT` | 当前正在等待或最近完成等待的会话的事件。 |\n\n##### 20-2.\
  \ 显示打开的游标\n\n### 问题\n\n一个访问数据库的应用程序抛出以下错误：`ORA-01000: maximum open cursors exceeded`\n\
  \n您希望查询数据字典以确定每个会话打开的游标数量。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 解决方案\n\n以下查询将显示每个会话当前打开的游标：\n```sql\nselect\n    a.value\n    ,c.username\n\
  \    ,c.machine\n    ,c.sid\n    ,c.serial#\nfrom v$sesstat a\n    ,v$statname b\n\
  \    ,v$session c\nwhere a.statistic# = b.statistic#\nand c.sid = a.sid\nand b.name\
  \ = 'opened cursors current'\nand a.value != 0\nand c.username IS NOT NULL\norder\
  \ by 1,2;\n```\n\n我们建议您查询`V$SESSION`而不是`V$OPEN_CURSOR`来确定打开的游标数量。`V$SESSION`提供了当前打开游标数量的更准确数字。\n\
  \n### 工作原理\n\n`OPEN_CURSORS`初始化参数决定了一个会话可以打开的游标数量上限。这个设置是针对每个会话的。默认值`50`对于任何应用程序来说通常都太低了。通常将`OPEN_CURSORS`设置为`1000`这样的值。\n\
  \n但是，如果单个会话有超过`1000`个打开的游标，那么代码中很可能存在未关闭游标的情况。当达到此限制时，应该有人检查应用程序代码，以确定是否有游标未被关闭。\n\
  \n如果您工作的环境有数千个到数据库的连接，您可能只想查看消耗游标最多的前几个会话。以下查询使用了一个内联视图和伪列`ROWNUM`来显示前二十个值：\n```sql\n\
  select * from (\n    select\n        a.value\n        ,c.username\n        ,c.machine\n\
  \        ,c.sid\n        ,c.serial#\n    from v$sesstat a\n        ,v$statname b\n\
  \        ,v$session c\n    where a.statistic# = b.statistic#\n    and c.sid = a.sid\n\
  \    and b.name = 'opened cursors current'\n    and a.value != 0\n    and c.username\
  \ IS NOT NULL\n    order by 1 desc,2\n)\nwhere rownum < 21;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 20-3. 判断在线重做日志大小是否合适\n\n### 问题\n\n您注意到存在异常多的`log file switch (checkpoint incomplete)`等待事件（描述参见表\
  \ 20-1）。您希望验证生产数据库中重做日志切换的频率。\n\n### 解决方案\n\n`V$LOG_HISTORY`包含有关在线重做日志的历史信息。执行此查询以查看每小时的日志切换次数：\n\
  ```sql\nselect count(*)\n    ,to_char(first_time,'YYYY:MM:DD:HH24')\nfrom v$log_history\n\
  group by to_char(first_time,'YYYY:MM:DD:HH24')\norder by 2;\n```\n\n以下是输出的一个片段：\n\
  ```\nCOUNT(*) TO_CHAR(FIRST\n---------- -------------\n        15 2009:07:20:00\n\
  \        31 2009:07:20:01\n        47 2009:07:20:02\n        14 2009:07:20:03\n\
  \         3 2009:07:20:04\n         1 2009:07:20:05\n```\n\n从前面的输出中，您可以看到在 7 月 20\
  \ 日，大约从午夜到凌晨 3:00，产生了大量的重做数据。这可能是由于夜间批处理作业，或者是由于位于世界另一端的用户在运行数据库应用程序（您的夜晚是他们的白天）所致。\n\
  \n### 工作原理\n\n\n\n# `V$LOG_HISTORY` 视图的数据源自控制文件。每当发生日志切换时，此视图中就会记录一条详细记录，包含诸如切换时间和系统变更号（`SCN`）等信息。\n\
  \n一条通用的经验法则是，你应该将在线重做日志文件的大小设置为大约每小时切换两到三次。你不希望它们切换得过于频繁，因为日志切换会产生开销。Oracle 在日志切换过程中会启动一个检查点。在检查点期间，数据库写入器后台进程会将所有已修改的（脏）块写入磁盘，这是资源密集型操作。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 20 章 ■ 数据库故障排除\n\n另一方面，你也不希望在线重做日志文件从不切换，因为当前在线重做日志中可能包含你在恢复事件中需要用到的事务。如果你遭遇灾难，导致当前在线重做日志发生介质故障，你可能会丢失那些尚未归档的事务。\n\
  \n**提示** 使用 `ARCHIVE_LAG_TARGET` 初始化参数来设置日志切换之间的最长时间（以秒为单位）。该参数的典型设置是 1800 秒（30\
  \ 分钟）。值为 0（默认值）则禁用此功能。此参数常用于 Oracle Data Guard 环境，以在指定时间过后强制进行日志切换。\n\n你还可以查询 `V$INSTANCE_RECOVERY`\
  \ 视图中的 `OPTIMAL_LOGFILE_SIZE` 列，以确定你的在线重做日志文件大小是否设置正确：\n\n```sql\nselect optimal_logfile_size\
  \ from v$instance_recovery;\n```\n\n以下是一些示例输出：\n\n```\nOPTIMAL_LOGFILE_SIZE\n--------------------\n\
  \                 512\n```\n\n此查询报告被认为是最优的重做日志文件大小（以兆字节为单位），其基于 `FAST_START_MTTR_TARGET`\
  \ 初始化参数设置。Oracle 建议你将所有在线重做日志配置为至少达到 `OPTIMAL_LOGFILE_SIZE` 的值。然而，在确定在线重做日志大小时，你必须考虑你的环境信息（例如切换频率）。\n\
  \n你可以通过执行以下查询来查看当前在线重做日志文件的大小：\n\n```sql\nselect a.group#,\n       a.member,\n \
  \      b.status,\n       b.bytes/1024/1024 meg_bytes\nfrom v$logfile a,\n     v$log\
  \ b\nwhere a.group# = b.group#\norder by a.group#;\n```\n\n以下是一些示例输出：\n\n```\nGROUP#\
  \ MEMBER                          STATUS              MEG_BYTES\n--------- ------------------------------\
  \ -------------------- ----------\n1 /oralogs01/DWREP/redo01a.log       INACTIVE\
  \                   256\n1 /oralogs02/DWREP/redo01b.log       INACTIVE         \
  \          256\n2 /oralogs01/DWREP/redo02a.log       CURRENT                   \
  \ 256\n2 /oralogs02/DWREP/redo02b.log       CURRENT                    256\n3 /oralogs01/DWREP/redo03a.log\
  \       INACTIVE                   256\n3 /oralogs02/DWREP/redo03b.log       INACTIVE\
  \                   256\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 20 章 ■ 数据库故障排除\n\n##### 20-4. 确定撤销表空间大小是否合适\n\n**问题**\n\n你有一个运行时间很长的 SQL\
  \ 语句，正在抛出 `ORA-01555` “快照过旧” 错误。你想要确定你的撤销表空间大小设置是否正确。\n\n**解决方案**\n\n运行以下查询，以识别撤销表空间在过去一天内发生的潜在问题：\n\
  \n```sql\nselect\n  to_char(begin_time,'MM-DD-YYYY HH24:MI') begin_time,\n  ssolderrcnt\
  \ ORA_01555_cnt,\n  nospaceerrcnt no_space_cnt,\n  txncount max_num_txns,\n  maxquerylen\
  \ max_query_len,\n  expiredblks blck_in_expired\nfrom v$undostat\nwhere begin_time\
  \ > sysdate - 1\norder by begin_time;\n```\n\n以下是一些示例输出。部分输出已省略以适应页面：\n\n```\nBEGIN_TIME\
  \         ORA_01555_CNT  NO_SPACE_CNT MAX_NUM_TXNS MAX_QUERY_LEN\n------------------\
  \ -------------  ------------ ------------ -------------\n07-20-2009 18:10     \
  \         0              0          249             0\n07-20-2009 18:20        \
  \      0              0          290             0\n07-20-2009 18:30           \
  \   0              0          244             0\n07-20-2009 18:40              0\
  \              0          179             0\n```\n\n`ORA_01555_CNT` 列指示你的数据库遇到 `ORA-01555`\
  \ “快照过旧” 错误的次数。如果此列报告非零值，你需要执行以下一项或多项操作：\n\n-   确保代码中没有在游标循环内包含 `COMMIT` 语句。\n-\
  \   优化抛出错误的 SQL 语句，使其运行得更快。\n-   确保你拥有良好的统计信息（以便你的 SQL 高效运行）。\n-   增加 `UNDO_RETENTION`\
  \ 初始化参数的值。\n\n`NO_SPACE_CNT` 列显示了在撤销表空间中请求空间但未找到可用空间的次数。如果 `NO_SPACE_CNT` 报告非零值，你可能需要为你的撤销表空间添加更多空间。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 20 章 ■ 数据库故障排除\n\n**工作原理**\n\
  \n`V$UNDOSTAT` 视图中最多存储四天的信息。统计信息每十分钟收集一次，表中最多有 576 行。如果你在最近四天内停止并启动过数据库，此视图将仅包含自上次启动数据库以来的信息。\n\
  \n另一种获取撤销表空间大小调整建议的方法是使用 Oracle Undo Advisor，你可以通过 `SELECT` 语句查询 PL/SQL `DBMS_UNDO_ADV`\
  \ 包来调用它。以下查询显示了在撤销保留设置为 900 秒的情况下，当前的撤销大小和建议大小：\n\n```sql\nselect\n  sum(bytes)/1024/1024\
  \ cur_mb_size,\n  dbms_undo_adv.required_undo_size(900) req_mb_size\nfrom dba_data_files\n\
  where tablespace_name LIKE 'UNDO%';\n```\n\n以下是一些示例输出：\n\n```\nCUR_MB_SIZE REQ_MB_SIZE\n\
  ----------- -----------\n      36864       20897\n```\n\n输出显示，撤销表空间当前分配了 36.8 GB。在之前的查询中，我们使用\
  \ 900 秒作为在撤销表空间中保留信息的时间。Oracle Undo Advisor 估计，为了保留撤销信息 900 秒，撤销表空间应为 20.8 GB。在此示例中，撤销表空间的大小是足够的。如果大小不足，你将需要向现有数据文件添加空间，或者向撤销表空间添加一个数据文件。\n\
  \n下面是一个稍微复杂一点的使用 Oracle Undo Advisor 来查找撤销表空间所需大小的示例。此示例使用 PL/SQL 来显示有关潜在问题的信息和修复问题的建议。\n\
  \n```sql\nSET SERVEROUT ON SIZE 1000000\nDECLARE\n  pro VARCHAR2(200);\n  rec VARCHAR2(200);\n\
  \  rtn VARCHAR2(200);\n  ret NUMBER;\n  utb NUMBER;\n  retval NUMBER;\nBEGIN\n \
  \ DBMS_OUTPUT.PUT_LINE(DBMS_UNDO_ADV.UNDO_ADVISOR(1));\n  DBMS_OUTPUT.PUT_LINE('Required\
  \ Undo Size (megabytes): ' ||\n    DBMS_UNDO_ADV.REQUIRED_UNDO_SIZE (900));\n  retval\
  \ := DBMS_UNDO_ADV.UNDO_HEALTH(pro, rec, rtn, ret, utb);\n  DBMS_OUTPUT.PUT_LINE('Problem:\
  \ ' || pro);\n  DBMS_OUTPUT.PUT_LINE('Advice: ' || rec);\n  DBMS_OUTPUT.PUT_LINE('Rational:\
  \ ' || rtn);\n  DBMS_OUTPUT.PUT_LINE('Retention: ' || TO_CHAR(ret));\n  DBMS_OUTPUT.PUT_LINE('UTBSize:\
  \ ' || TO_CHAR(utb));\nEND;\n/\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 20 章 ■ 数据库故障排除\n\n如果没有发现问题，则保留大小将返回 0。以下是一些示例输出：\n\n```\nFinding 1: 撤销表空间正常。\n\
  \nRequired Undo Size (megabytes): 20897\n\nProblem: 未发现问题\n\nAdvice:\nRational:\n\
  Retention: 0\nUTBSize: 0\n```\n\n##### 20-5. 确定临时表空间大小是否正确\n\n**问题**\n\n你尝试创建一个索引，Oracle\
  \ 抛出此错误：\n\n```\nORA-01652: 无法通过 128 (在表空间 TEMP 中) 扩展 temp 段\n```\n\n你想要确定你的临时表空间大小是否设置正确。\n\
  \n**解决方案**\n\n如果你使用的是 Oracle Database 11g 或更高版本，请运行以下查询以显示临时表空间中已分配和空闲的空间：\n\n```sql\n\
  select\n  tablespace_name,\n  tablespace_size/1024/1024 mb_size,\n  allocated_space/1024/1024\
  \ mb_alloc,\n  free_space/1024/1024 mb_free\nfrom dba_temp_free_space;\n```\n\n\
  以下是一些示例输出：\n\n```\nTABLESPACE_NAME                MB_SIZE    MB_ALLOC     MB_FREE\n\
  --------------- ---------- ---------- ----------\nTEMP                         \
  \     200        200        170\n```\n\n\n\n如果 `FREE_SPACE` (`MB_FREE`) 值下降到接近零，说明你的数据库中有某些\
  \ SQL 操作正在消耗大部分可用空间。`FREE_SPACE` (`MB_FREE`) 列显示的是总可用空闲空间，包括当前已分配且可重复使用的空间。\n\n\
  ## 数据库故障排除\n\n如果你使用的是 Oracle Database 10g 数据库，可以运行此查询来查看临时表空间中已使用的空间：\n\n```sql\n\
  select tablespace_name, sum(bytes_used)/1024/1024 mb_used\nfrom v$temp_extent_pool\n\
  group by tablespace_name;\n```\n\n以下是一些示例输出：\n\n```\nTABLESPACE_NAME   MB_USED\n\
  --------------- ----------\nTEMP                      120\n```\n\n如果已使用量接近当前分配的总量，你可能需要为临时表空间数据文件分配更多空间。运行以下查询以查看临时数据文件名称和分配大小：\n\
  \n```sql\nselect name, bytes/1024/1024 mb_alloc from v$tempfile;\n```\n\n以下是一些典型输出：\n\
  \n```\nNAME                          MB_ALLOC\n------------------------------ ----------\n\
  /ora02/DWREP/temp01.dbf            12000\n/ora03/DWREP/temp03.dbf            10240\n\
  /ora01/DWREP/temp02.dbf             2048\n```\n\n### 工作原理\n\n当进程已消耗完可用内存并需要更多空间时，临时表空间会被用作磁盘上的排序区域。需要排序区域的操作包括：\n\
  \n- 索引创建\n- SQL 排序操作\n- 临时表和临时索引\n- 临时 LOB\n- 临时 B 树\n\n没有确切的公式来确定你的临时表空间大小是否合适。这取决于查询的数量和类型、索引构建操作、并行操作以及你的内存排序空间（程序全局区）的大小。你必须在数据库有负载时，使用解决方案部分中的某个查询来监控你的临时表空间，以确定其使用模式。\n\
  \n如果 Oracle 抛出 `ORA-01652` 错误，这表明你的临时表空间太小。然而，如果因为一次性事件（如大型索引构建）导致空间耗尽，Oracle 也可能抛出此错误。你必须判断是一次性的索引构建还是消耗大量临时表空间排序空间的查询，值得为此增加空间。\n\
  \n如果你确定需要增加空间，可以调整现有数据文件的大小，也可以添加一个新的数据文件。要调整临时表空间数据文件的大小，请使用 `ALTER DATABASE TEMPFILE...RESIZE`\
  \ 语句。以下语句将一个临时数据文件的大小调整为 12 GB：\n\n```sql\nalter database tempfile '/ora03/DWREP/temp03.dbf'\
  \ resize 12g;\n```\n\n你可以按如下方式向临时表空间添加一个数据文件：\n\n```sql\nalter tablespace temp add\
  \ tempfile '/ora04/DWREP/temp04.dbf' size 2g;\n```\n\n## 显示表空间使用率\n\n### 问题\n\n\
  你遇到了 `ORA-01653` “无法扩展表” 错误。你想查明每个表空间还剩多少空闲空间。\n\n### 解决方案\n\n运行以下脚本以查看数据库中的空闲字节数和已分配字节数：\n\
  \n```sql\nselect\n    a.tablespace_name\n    ,(f.bytes/a.bytes)*100 pct_free\n \
  \   ,f.bytes/1024/1024 mb_free\n    ,a.bytes/1024/1024 mb_allocated\nfrom\n    (select\
  \ nvl(sum(bytes),0) bytes, x.tablespace_name\n    from dba_free_space y, dba_tablespaces\
  \ x\n    where x.tablespace_name = y.tablespace_name(+)\n    and x.contents != 'TEMPORARY'\
  \ and x.status != 'READ ONLY'\n    and x.tablespace_name not like 'UNDO%'\n    group\
  \ by x.tablespace_name) f,\n    (select sum(bytes) bytes, tablespace_name\n    from\
  \ dba_data_files\n    group by tablespace_name) a\nwhere a.tablespace_name = f.tablespace_name\n\
  order by 1;\n```\n\n以下是一些示例输出：\n\n```\nTABLESPACE_NAME     PCT_FREE    MB_FREE MB_ALLOCATED\n\
  --------------- ------------- ---------- ------------\nDOWN_TBSP_9        79.1992188\
  \       8110        10240\nDTS_STAGE_DATA           84.3        843         1000\n\
  DTS_STAGE_INDEX          96.7        967         1000\nINST_TBSP_1             \
  \ 96.8        484          500\n```\n\n### 工作原理\n\n\n\n# 监控表空间的剩余空间\n\n监控表空间的剩余空间是数据库管理员的一项基本活动。您可以使用表空间数据文件的\
  \ AUTOEXTEND 功能，该功能允许数据文件根据需要增长空间。一些 DBA 不愿意使用 AUTOEXTEND 功能，因为担心某个包含大量事务的失控进程会导致数据文件填满现有的磁盘空间。如果您没有为数据文件启用\
  \ AUTOEXTEND，则需要使用类似本解决方案中提供的脚本来监控表空间。\n\n有时在对数据库执行物理文件维护时，列出与数据库关联的所有文件很有用。在这些情况下，您需要一个能显示数据文件、控制文件和在线重做日志文件的脚本。这在生产支持场景中尤其重要，例如当某个表空间即将写满，而您希望向与该表空间关联的众多数据文件之一添加空间时。\n\
  \n下一个脚本允许您快速识别即将写满的表空间以及哪些数据文件是扩展空间的候选对象。这里我们使用了许多 SQL*Plus 格式化命令以使输出易于阅读：\n\n```sql\n\
  REM *****************************************************\nREM * File : freesp.sql\n\
  REM *****************************************************\n\nSET PAGESIZE 100 LINES\
  \ 132 ECHO OFF VERIFY OFF FEEDB OFF SPACE 1 TRIMSP ON\n\nCOMPUTE SUM OF a_byt t_byt\
  \ f_byt ON REPORT\n\nBREAK ON REPORT ON tablespace_name ON pf\n\nCOL tablespace_name\
  \ FOR A17 TRU HEAD 'Tablespace|Name'\nCOL file_name FOR A40 TRU HEAD 'Filename'\n\
  COL a_byt FOR 9,990.999 HEAD 'Allocated|GB'\nCOL t_byt FOR 9,990.999 HEAD 'Current|Used\
  \ GB'\nCOL f_byt FOR 9,990.999 HEAD 'Current|Free GB'\nCOL pct_free FOR 990.0 HEAD\
  \ 'File %|Free'\nCOL pf FOR 990.0 HEAD 'Tbsp %|Free'\nCOL seq NOPRINT\n\nDEFINE\
  \ b_div=1073741824\n--\n\nCOL db_name NEW_VALUE h_db_name NOPRINT\nCOL db_date NEW_VALUE\
  \ h_db_date NOPRINT\n\nSELECT name db_name, TO_CHAR(sysdate,'YYYY_MM_DD') db_date\
  \ FROM v$database;\n--\n\nSPO &&h_db_name._&&h_db_date..lis\n\nPROMPT Database:\
  \ &&h_db_name, Date: &&h_db_date\n--\n\nSELECT 1 seq, b.tablespace_name, nvl(x.fs,0)/y.ap*100\
  \ pf, b.file_name file_name, b.bytes/&&b_div a_byt, NVL((b.bytes-SUM(f.bytes))/&&b_div,b.bytes/&&b_div)\
  \ t_byt, NVL(SUM(f.bytes)/&&b_div,0) f_byt, NVL(SUM(f.bytes)/b.bytes*100,0) pct_free\
  \ FROM dba_free_space f, dba_data_files b\n,(SELECT y.tablespace_name, SUM(y.bytes)\
  \ fs\n  FROM dba_free_space y GROUP BY y.tablespace_name) x\n,(SELECT x.tablespace_name,\
  \ SUM(x.bytes) ap\n  FROM dba_data_files x GROUP BY x.tablespace_name) y\nWHERE\
  \ f.file_id(+) = b.file_id\nAND x.tablespace_name(+) = y.tablespace_name\nand y.tablespace_name\
  \ = b.tablespace_name\nAND f.tablespace_name(+) = b.tablespace_name\nGROUP BY b.tablespace_name,\
  \ nvl(x.fs,0)/y.ap*100, b.file_name, b.bytes\nUNION\nSELECT 2 seq, tablespace_name,\
  \ j.bf/k.bb*100 pf, b.name file_name, b.bytes/&&b_div a_byt, a.bytes_used/&&b_div\
  \ t_byt, a.bytes_free/&&b_div f_byt, a.bytes_free/b.bytes*100 pct_free\nFROM v$temp_space_header\
  \ a, v$tempfile b\n,(SELECT SUM(bytes_free) bf FROM v$temp_space_header) j\n,(SELECT\
  \ SUM(bytes) bb FROM v$tempfile) k\nWHERE a.file_id = b.file#\nORDER BY 1,2,4,3;\n\
  --\n\nCOLUMN name FORMAT A60 HEAD 'Control Files'\n\nSELECT name FROM v$controlfile;\n\
  --\n\nCOL member FORMAT A50 HEAD 'Redo log files'\nCOL status FORMAT A9 HEAD 'Status'\n\
  COL archived FORMAT A10 HEAD 'Archived'\n--\n\nSELECT\na.group#, a.member, b.status,\n\
  b.archived, SUM(b.bytes)/1024/1024 mb\nFROM v$logfile a, v$log b\nWHERE a.group#\
  \ = b.group#\nGROUP BY a.group#, a.member, b.status, b.archived\nORDER BY 1, 2;\n\
  --\n\nSPO OFF;\n```\n\n该脚本将输出假脱机到一个文件中，文件名嵌入了数据库名称和日期。\n\n例如，如果您在 2009 年 7 月 22\
  \ 日为名为 `DW11` 的数据库运行该脚本，输出文件将被命名为 `DW11_2009_07_22.lis`。该脚本还使用了一个 `B_DIV` 参数，将所有字节列除以值\
  \ `1073741824`，这使得输出以千兆字节为单位显示。\n\n\n\n##### 20-7. 显示对象大小\n\n## 问题\n\n你希望主动运行一个报告，显示数据库中哪些表和索引占用了最多的空间。\n\
  \n## 解决方案\n\n以下是一个典型的脚本，用于显示数据库中占用空间最大的对象（表和索引）：\n\n```sql\nselect * from\n(\n \
  \ select\n    segment_name\n    ,partition_name\n    ,segment_type\n    ,owner\n\
  \    ,bytes/1024/1024 mb\n  from dba_segments\n  order by bytes desc)\nwhere rownum\
  \ <=20;\n```\n\n以下是一些示例输出：\n\n```\nSEGMENT_NAME        PARTITION_NAME  SEGMENT_TYPE\
  \       OWNER           MB\n------------------- --------------- ------------------\
  \ --------------- ----------\n_SYSSMU1$           TYPE2           UNDO         \
  \      SYS             18481.4375\nCIA_DOWNLOADS                       TABLE   \
  \           CIA             7868\nREG_QUEUE_REP                        TABLE   \
  \           REP_MV          6874\nF_DOWNLOADS        DOWN_P_7        TABLE PARTITION\
  \     STAR2           3180\nF_DOWNLOADS_IDX1                    INDEX          \
  \    CIA_STAR        2927\n```\n\n## 工作原理\n\n有时在排查磁盘空间问题时，查看哪些对象（表和索引）消耗了最多的存储空间是很有用的。解决方案部分中的脚本使用一个内联视图，先选择数据库中的所有段，并按\
  \ `BYTES` 列降序排序。外部查询然后将输出限制为数据库中占用空间最大的前二十个对象。\n\n如果你有兴趣查看哪些对象在哪些数据文件中占用空间，你需要查询\
  \ `DBA_DATA_FILES` 视图。下面列出了一个脚本，它会提示你输入所有者，然后显示表以及相关数据文件中消耗的空间：\n\n```sql\nselect\n\
  \  a.table_name\n  ,b.tablespace_name\n  ,b.partition_name\n  ,c.file_name\n  ,sum(b.bytes)/1024/1024\
  \ mb\nfrom dba_tables a\n  ,dba_extents b\n  ,dba_data_files c\nwhere a.owner =\
  \ upper('&owner')\n  and a.owner = b.owner\n  and a.table_name = b.segment_name\n\
  \  and b.file_id = c.file_id\ngroup by\n  a.table_name\n  ,b.tablespace_name\n \
  \ ,b.partition_name\n  ,c.file_name\norder by a.table_name, b.tablespace_name;\n\
  ```\n\n##### 20-8. 监控索引使用情况\n\n## 问题\n\n你希望移除数据库中未被使用的任何索引。你需要一个关于索引是否正在被使用的简单“是”或“否”的答案。\n\
  \n## 解决方案\n\n使用 `ALTER INDEX...MONITORING USAGE` 语句来启用基本的索引监控。以下示例在名为 `F_DOWN_DOM_FK9`\
  \ 的索引上启用索引监控：\n\n```sql\nalter index F_DOWN_DOM_FK9 monitoring usage;\n```\n\n从此时起，第一次访问该索引时，Oracle\
  \ 会记录这一点，并可以通过 `V$OBJECT_USAGE` 视图查看。要报告哪些被监控的索引曾被使用过，运行此查询：\n\n```sql\nselect *\
  \ from v$object_usage;\n```\n\n很可能你不会只监控一个索引。相反，你可能希望监控某个用户的所有索引。在这种情况下，使用 SQL 生成\
  \ SQL 来创建一个你可以运行的脚本，以打开对所有索引的监控。下面就是一个这样的脚本：\n\n```sql\nselect 'alter index ' ||\
  \ index_name || ' monitoring usage;'\nfrom user_indexes;\n```\n\n## 工作原理\n\n`V$OBJECT_USAGE`\
  \ 视图只显示当前连接用户的信息。如果你检查 `DBA_VIEWS` 的 `TEXT` 列，会注意到以下一行：\n\n`where io.owner# = userenv('SCHEMAID')`\n\
  \n如果你以 DBA 账户登录，并想查看所有已启用监控的索引的状态（无论用户是谁），请执行此查询：\n\n```sql\nselect io.name, t.name,\n\
  \       decode(bitand(i.flags, 65536), 0, 'NO', 'YES'),\n       decode(bitand(ou.flags,\
  \ 1), 0, 'NO', 'YES'),\n       ou.start_monitoring,\n       ou.end_monitoring\n\
  from sys.obj$ io, sys.obj$ t, sys.ind$ i, sys.object_usage ou\nwhere i.obj# = ou.obj#\n\
  \  and io.obj# = ou.obj#\n  and t.obj# = i.bo#;\n```\n\n##### 20-9. 审计对象使用情况\n\n\
  ## 问题\n\n你想知道数据库中哪些表实际正在被使用。\n\n## 解决方案\n\n使用数据库审计来确定对象是否正被 `SELECT`、`INSERT`、`UPDATE`\
  \ 和 `DELETE` 语句访问。按照以下步骤启用和使用数据库审计：\n\n1.\n\n\n\n## 启用审计\n\n通过将 `AUDIT_TRAIL` 初始化参数设置为有效值（例如\
  \ `DB`）来在数据库上启用审计。如果您使用的是 SPFILE，则使用 `ALTER SYSTEM` 语句设置 `AUDIT_TRAIL` 参数：\n```sql\n\
  SQL> alter system set audit_trail=db scope=spfile;\n```\n如果您使用的是 `init.ora` 文件，请用文本编辑器打开它并将其值设置为\
  \ `DB`（有关 `AUDIT_TRAIL` 参数有效值的描述，请参见表 20-3）：\n```\nAUDIT_TRAIL=DB\n```\n\n**表 20-3.\
  \ `AUDIT_TRAIL` 的有效设置**\n\n| 设置 | 含义 |\n| --- | --- |\n| `DB` | 启用审计并将 `SYS.AUD$`\
  \ 表设置为审计存储库。 |\n| `DB, EXTENDED` | 启用审计并将 `SYS.AUD$` 表设置为审计存储库，同时包含 `SQLTEXT` 和\
  \ `SQLBIND` 列。 |\n| `OS` | 启用审计并指定操作系统文件将存储审计信息。 |\n| `XML` | 启用审计并将审计记录以 XML 格式写入操作系统文件。\
  \ |\n| `XML, EXTENDED` | 启用审计并将审计记录以 XML 格式写入操作系统文件，包括 `SqlText` 和 `SqlBind` 的值。\
  \ |\n| `NONE` | 禁用数据库审计。 |\n\n2.  接下来，停止并启动您的数据库。\n```sql\nSQL> shutdown immediate;\n\
  \nSQL> startup;\n\nSQL> show parameter audit_trail;\n```\n```\nNAME            \
  \                     TYPE        VALUE\n------------------------------------ -----------\
  \ ------------------------------\naudit_trail                          string  \
  \    DB\n```\n3.  现在，您可以按对象、权限或语句启用审计。例如，以下语句对 `INV_MGMT` 用户拥有的 `EMP` 表上的所有 DML\
  \ 访问启用审计：\n```sql\nSQL> audit select, insert, update, delete on inv_mgmt.emp;\n\
  ```\n4.  从此时起，对 `INV_MGMT.EMP` 表的任何 DML 访问都将被记录在 `SYS.AUD$` 表中。您可以使用类似以下的查询来报告对表的\
  \ DML 访问：\n```sql\nselect\n  username\n  ,obj_name\n  ,timestamp\n  ,substr(ses_actions,4,1)\
  \ del\n  ,substr(ses_actions,7,1) ins\n  ,substr(ses_actions,10,1) sel\n  ,substr(ses_actions,11,1)\
  \ upd\nfrom dba_audit_object;\n```\n要关闭对某个对象的审计，请使用 `NOAUDIT` 语句：\n```sql\nSQL>\
  \ noaudit select, insert, update, delete on inv_mgmt.inv;\n```\n您应定期清理 `AUD$` 表，以免其在\
  \ `SYSTEM` 表空间中占用过多空间。如果您需要保存 `AUD$` 数据，可以先导出该表，然后使用 `TRUNCATE` 命令删除记录。\n\n> **提示：**\
  \ 如果您想将 `AUD$` 表移动到非 `SYSTEM` 表空间，请参阅 My Oracle Support (MetaLink) 笔记 72460.1 以获取说明。\n\
  \n## 工作原理\n\nOracle 审计是一项强大的功能，允许您确定针对表正在执行何种类型的 SQL 活动。例如，您可能希望确定哪些表正在被使用或未被使用。如果一个表未被使用，您可能希望重命名然后删除该表。审计允许您捕获用于访问表的\
  \ SQL 语句类型。\n\n在解决方案的第 4 步中，我们使用 `SUBSTR` 函数来引用 `DBA_AUDIT_OBJECT` 视图的 `SES_ACTIONS`\
  \ 列。该列包含一个 16 个字符的字符串，其中每个字符表示某个特定操作已发生。这 16 个字符按以下顺序代表以下操作：`ALTER`、`AUDIT`、`COMMENT`、`DELETE`、`GRANT`、`INDEX`、`INSERT`、`LOCK`、`RENAME`、`SELECT`、`UPDATE`、`REFERENCES`\
  \ 和 `EXECUTE`。\n\n位置 14、15 和 16 由 Oracle 保留以供将来使用。字符 `S` 表示成功，`F` 表示失败，`B` 表示成功和失败。\n\
  \n一旦您确定了未使用的表，您可以简单地重命名这些表，看看这是否会破坏应用程序或是否有任何用户投诉。如果没有投诉，那么一段时间后您可以考虑删除这些表。在删除任何您以后可能需要恢复的表之前，请确保使用\
  \ `RMAN` 和 Data Pump 对数据库进行了良好的备份。\n\n\n\n##### 20-10. 细粒度审计\n\n## 问题\n\n你拥有一些关于员工薪水的敏感数据。你希望审计对表中特定列的任何类型访问。你需要比标准审计更细粒度的审计。\n\
  \n## 解决方案\n\n使用 Oracle 细粒度审计（FGA）来监控任何用户从特定列的选择。按照以下步骤实现 FGA：\n\n**注意** 细粒度审计功能需要\
  \ Oracle 企业版。\n\n1.  使用 `DBMS_FGA` 包创建一个策略。此示例为 `INV` 方案中的 `EMP` 表创建一个策略，指定任何针对\
  \ `SALARY` 列的 `INSERT`、`UPDATE`、`DELETE` 或 `SELECT` 语句都将被记录到审计跟踪中：\n\n```\nbegin\n\
  \    dbms_fga.add_policy (\n        object_schema   => 'INV',\n        object_name\
  \     => 'EMP',\n        audit_column    => 'SALARY',\n        policy_name     =>\
  \ 'S1_AUDIT',\n        statement_types => 'INSERT, UPDATE, DELETE, SELECT',\n  \
  \      audit_trail     => DBMS_FGA.DB_EXTENDED\n    );\nend;\n/\n```\n\n2.  通过查询\
  \ `DBA_AUDIT_POLICIES` 视图来验证策略是否存在：\n\n```\nselect object_schema\n      ,object_name\n\
  \      ,policy_name\n      ,sel, ins, upd, del, policy_column\nfrom dba_audit_policies;\n\
  ```\n\n此示例的输出如下：\n\n```\nOBJECT_SCHEMA OBJECT_NAME POLICY_NAME SEL INS UPD DEL POLICY_COL\n\
  -------------- -------------- -------------- ----- ----- ----- ----- ----------\n\
  INV            EMP           S1_AUDIT       YES  YES  YES  YES  SALARY\n```\n\n\
  3.  要查看 FGA 审计跟踪中记录的 SQL 语句，请从 `DBA_FGA_AUDIT_TRAIL` 视图中选择：\n\n```\nselect\n   \
  \ db_user\n   ,to_char(timestamp,'dd-mon-yy hh24:mi:ss') ts\n   ,sql_text\nfrom\
  \ dba_fga_audit_trail\norder by timestamp;\n```\n\n**注意** `DBA_FGA_AUDIT_TRAIL`\
  \ 视图基于 `FGA_LOG$` 表。\n\n以下是一些示例输出：\n\n```\nDB_USER    TS                   SQL_TEXT\n\
  ---------- -------------------- --------------------------\nINV        21-jul-09\
  \ 21:47:07   select * from emp\nSYSTEM     21-jul-09 21:58:36   select salary from\
  \ inv.emp\n```\n\n如果需要禁用策略，请使用 `DISABLE_POLICY` 过程：\n\n```\nSQL> exec dbms_fga.disable_policy('INV','EMP','S1_AUDIT');\n\
  ```\n\n要删除策略，请使用 `DROP_POLICY` 过程：\n\n```\nSQL> exec dbms_fga.drop_policy('INV','EMP','S1_AUDIT');\n\
  ```\n\n作为 `SYS` 方案，你可以按如下方式清除细粒度审计审计表中的记录：\n\n```\ntruncate table fga_log$;\n```\n\
  \n## 工作原理\n\n细粒度审计允许你在比简单的 `INSERT`、`UPDATE`、`DELETE` 和 `SELECT` 操作更细的粒度级别上审计 SQL。FGA\
  \ 审计允许你审计在列级别发生的 SQL 活动。FGA 审计还允许你对操作执行布尔检查，例如“如果选定的值在某个范围内，则审计该活动”。\n\n你通过使用 FGA\
  \ 策略来管理细粒度审计。`DBMS_FGA` 包允许你添加、禁用、启用和删除 FGA 策略。你需要 `DBMS_FGA` 包上的执行权限来管理审计策略。\n\n\
  **提示** 有关细粒度审计的更多详细信息，请参阅 Oracle 的《安全指南》，可从 otn.oracle.com 网站获取。\n\n## 提示\n\n如果你只需要知道是否正在对表进行插入、更新或删除，可以使用\
