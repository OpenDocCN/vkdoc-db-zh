  \n## 从第二层开始查询\n\n为了举一个更有趣的例子，让我们基于前一个查询，从层级的第二级开始，显示不管理任何人的员工，以及直接向 King 汇报的中间经理。`SELECT`\
  \ 语句如下：\n\n```sql\nselect\n  last_name || ', ' || first_name full_name, level lvl,\n\
  \  connect_by_root last_name top_last_name,\n  connect_by_root first_name top_first_name\n\
  from employees\nwhere connect_by_isleaf = 1\nstart with manager_id = 100\nconnect\
  \ by prior employee_id = manager_id\n;\n```\n\n```\nFULL_NAME                LVL\
  \ TOP_LAST_NAME   TOP_FIRST_NAME\n-----------------------   ---- --------------\
  \ --------------\nFaviet, Daniel           3    Kochhar         Neena\nChen, John\
  \               3    Kochhar         Neena\nSciarra, Ismael          3    Kochhar\
  \         Neena\nUrman, Jose Manuel       3    Kochhar         Neena\nPopp, Luis\
  \               3    Kochhar         Neena\nWhalen, Jennifer         2    Kochhar\
  \         Neena\nMavris, Susan            2    Kochhar         Neena\nBaer, Hermann\
  \            2    Kochhar         Neena\nGietz, William           3    Kochhar \
  \        Neena\nErnst, Bruce             3    De Haan         Lex\nAustin, David\
  \            3    De Haan         Lex\nPataballa, Valli         3    De Haan   \
  \      Lex\nLorentz, Diana           3    De Haan         Lex\nKhoo, Alexander \
  \         2    Raphaely        Den\n...\nAbel, Ellen              2    Zlotkey \
  \        Eleni\nHutton, Alyssa           2    Zlotkey         Eleni\nTaylor, Jonathon\
  \         2    Zlotkey         Eleni\nLivingston, Jack         2    Zlotkey    \
  \     Eleni\nGrant, Kimberely         2    Zlotkey         Eleni\nJohnson, Charles\
  \         2    Zlotkey         Eleni\nFay, Pat                 2    Hartstein  \
  \     Michael\n\n89 rows selected\n```\n\n`LVL` 列现在显示了他们与向 King 汇报的员工之间的管理层级数加一。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\n\n##### 13-5. 检测层次数据中的循环\n\
  \n## 问题\n\n对一个层次表进行了更新，现在针对该表运行的任何层次查询都会产生此错误消息：\n\nSQL 错误：ORA-01436：用户数据中存在 CONNECT\
  \ BY 循环\n\n你需要找出被错误更新、导致此错误消息的行。\n\n## 解决方案\n\n在 `CONNECT BY` 子句中使用 `CONNECT_BY_ISCYCLE`\
  \ 伪列和 `NOCYCLE` 关键字，以强制 Oracle 运行查询但停止返回在层次结构中导致循环的行。例如：\n\n```sql\nselect employee_id,\
  \ manager_id, level lvl,\nconnect_by_iscycle is_cycle,\nlpad(' ',(level-1)*3) ||\
  \ last_name || ', ' || first_name full_name\nfrom employees\nstart with last_name\
  \ = 'Kochhar'\nconnect by nocycle manager_id = prior employee_id\n;\n```\n\nEMPLOYEE_ID\
  \ MANAGER_ID LVL IS_CYCLE FULL_NAME\n------------ ------------ --- -------- -----------------------\n\
  101 113 1 0 Kochhar, Neena\n108 101 2 0 Greenberg, Nancy\n109 108 3 0 Faviet, Daniel\n\
  110 108 3 0 Chen, John\n111 108 3 0 Sciarra, Ismael\n112 108 3 0 Urman, Jose Manuel\n\
  113 108 3 1 Popp, Luis\n200 101 2 0 Whalen, Jennifer\n203 101 2 0 Mavris, Susan\n\
  204 101 2 0 Baer, Hermann\n205 101 2 0 Higgins, Shelley\n206 205 3 0 Gietz, William\n\
  \n12 行已选择\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 ■ 树形结构数据\n\
  \n由 Kochhar 领导的部门中的员工层次结构被错误地修改，`IS_CYCLE = 1` 的行标识了导致数据循环的行。该部门的经理 Kochhar 现在有一个\
  \ `EMPLOYEE_ID = 113` (Popp) 的经理，其管理结构沿着树向上回溯至 Kochhar。必须将 Kochhar 的 `MANAGER_ID`\
  \ 更改为另一个不在其管理层次结构中的下属员工。\n\n## 工作原理\n\n任何维护层次结构表或表集合的应用程序都不应允许产生循环的编辑。然而，错误仍然会发生，例如绕过应用程序逻辑对表进行手动编辑。检测循环源是一个两步过程：首先，识别导致循环的行。然而，如本场景所示，该行可能不是被错误更新的行。第二步是获取该行信息（通常是主键）并查找可能错误引用了被标记行的其他行。对于像上面示例这样的小结果集，可能很容易发现循环，但对于返回数百或数千行的查询，你将不得不使用如下查询：\n\
  \n```sql\nselect employee_id, manager_id, last_name, first_name\nfrom employees\n\
  where manager_id in\n(\n    select employee_id\n    from employees\n    where connect_by_iscycle\
  \ = 1\n    start with last_name = 'Kochhar'\n    connect by nocycle manager_id =\
  \ prior employee_id\n);\n```\n\n修复问题需要使用之前的查询识别导致循环的行的正确父节点，然后更新连接这些行的列：\n\n```sql\n\
  update employees\nset manager_id = 100\nwhere employee_id = 101\n;\n```\n\n员工 Kochhar\
  \ 现在已被更新为具有正确经理（King）的原始值，该经理不是她的直接或间接下属！\n\n# 13-6. 生成固定数量的序列主键\n\n## 问题\n\n你想要生成一个包含\
  \ 1000 个数字的序列表作为虚拟表，以便后续填充新表。然而，使用序列无法实现，除非你使用 PL/SQL 或其他编程语言创建表。你可以使用现有表，但其行数可能太少或太多，无法满足你的需求。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 ■ 树形结构数据\n\n## 解决方案\n\
  \n你可以利用 Oracle `CONNECT BY` 层次特性的一个鲜为人知（直到现在）的副作用，即不指定 `START WITH` 或 `CONNECT BY`\
  \ 子句。以下是生成 1000 行序列的方法：\n\n```sql\nselect level new_pk from dual connect by level\
  \ <= 1000;\n```\n\nNEW_PK\n...\n已选择 1000 行\n\n\n\n# 第 13 章 ■ 树状结构数据\n\n## 工作原理\n\
  \n表面上看，很难理解这个查询是如何工作的；如果你不常使用 `CONNECT BY` 和 `START WITH`，可能会觉得更难懂。让我们分解一下，并回顾 `CONNECT\
  \ BY` 的工作原理，从 `SELECT` 语句的高亮部分开始：\n\n```\nselect level new_pk from dual connect\
  \ by level <= 1000;\n```\n\n`LEVEL` 返回的值将作为我们的主键，我们为结果列分配了一个新名称。记住，`LEVEL` 是一个伪列，仅在层次查询中可用。到目前为止，这相当直接。但我们如何让\
  \ `LEVEL` 递增到 1000 或其他用户定义的值呢？让我们看看语句的下一部分：\n\n```\nselect level new_pk from dual\
  \ connect by level <= 1000;\n```\n\n同样，我们没有偏离已知领域太远。`DUAL` 表将始终只有一行和一列，列名为 `DUMMY`，其值为\
  \ `X`。如果这个表消失，或者拥有多于一行，那么毫不夸张地说，几乎所有 Oracle 数据库应用程序都会在短时间内灾难性地失败。但是，我们如何从仅有一行中获取\
  \ 1000 行呢？让我们看看语句的下一部分：`select level new_pk from dual connect by level <= 1000;`\n\
  \n当你使用 `CONNECT BY` 时，Oracle 会遍历表中定义的树结构，`LEVEL` 列表示你在层次结构中向下深入了多少层。但是，`DUAL` 只有一行，所以我们的树只有一层，对吗？并不完全是。记住，`CONNECT\
  \ BY` 子句通常包含一元运算符 `PRIOR`，以告诉 Oracle 如何遍历树并将前一行连接到当前行。由于这里没有 `START WITH` 子句或 `PRIOR`\
  \ 运算符，这个 `SELECT` 语句的评估过程如下：\n\n1.  Oracle 找到层次结构的根行。由于没有 `START WITH` 子句，Oracle\
  \ 从结果集中唯一的行开始，它处于 `LEVEL = 1`。\n2.  检索下一个子行；由于除了 `LEVEL <= 1000` 之外没有其他 `CONNECT\
  \ BY` 条件，Oracle 将前一行连接到自身作为下一个子行返回，并增加 `LEVEL` 的值。\n3.  Oracle 评估 `CONNECT BY` 条件，查看是否已完成行检索；如果没有，Oracle\
  \ 继续执行步骤 2 以返回更多子行。\n4.  满足 `CONNECT BY` 条件后，查询完成结果返回。\n\n最后，我们有语句的最后一部分，高亮显示如下：\n\
  \n```\nselect level new_pk from dual connect by level <= 1000;\n```\n\n我们必须以某种方式限制结果，指定\
  \ `LEVEL <= 1000` 告诉 Oracle 在达到 1000 时停止。如果我们没有这个过滤器，查询将无限期运行，直到你取消语句或关闭数据库为止。你不能指定没有过滤器或层次连接条件的\
  \ `CONNECT BY`；因此，如果你铁了心要运行一个永远不会结束的查询，你必须写类似这样的东西：\n\n```\nselect level new_pk\
  \ from dual connect by 1=1;\n```\n\n你还可以通过在 `SELECT` 语句中嵌入一些过程式 SQL 代码来进一步增强该语句。在这个变体中，你希望创建一个具有唯一主键的表，以及第二列，当主键是奇数时该列值为\
  \ `ODD`，当主键是偶数时该列值为 `EVEN`：\n\n```\nselect level new_pk,\n\ncase\n\nwhen mod(level,2)\
  \ = 1 then 'ODD'\n\nelse 'EVEN'\n\nend odd_or_even\n\nfrom dual connect by level\
  \ <= 1000;\n```\n\n```\nNEW_PK ODD_OR_EVEN\n---------------------- -----------\n\
  1 奇数\n2 偶数\n3 奇数\n4 偶数\n5 奇数\n6 偶数\n7 奇数\n8 偶数\n...\n995 奇数\n996 偶数\n997 奇数\n998\
  \ 偶数\n999 奇数\n1000 偶数\n已选择 1000 行\n```\n\n你可以使用这个 `SELECT` 语句作为 `CTAS`（Create Table\
  \ As Select）操作的基础，并添加一些额外的列，正如你将在下一节中看到的。\n\n\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n# 第 14 章\n\n■ ■ ■\n\n# 处理 XML 数据\n\n回溯到互联网泡沫那平静美好的岁月，似乎人类已知的每一个问题都能通过应用一种技术来解决——XML\
  \ 就是答案！快进十年，XML 已成为信息技术日常生活的一部分。无论是作为 Web 服务 SOAP 协议的一部分，还是作为 BPEL（Web 服务的业务流程执行语言）工作流的基础，抑或是作为通用的数据交换机制，XML\
  \ 正越来越多地进入数据库的世界。\n\nOracle 从 Oracle 9*i*开始增加对 XML 的支持，并不断增强其能力，使得 11*g* Release\
  \ 2 中的 XML 成为一等公民，其“比喻性的袖子”里藏着丰富的技巧。这里介绍的方法混合了入门示例和更复杂的任务，既适合初学者，也适合有 Oracle 中 XML\
  \ 使用经验的老手。\n\n##### 14-1. 将 SQL 转换为 XML\n\n### 问题\n\n你需要将数据库中传统形式存储的数据转换为 XML。例如，你需要从员工数据中动态创建\
  \ XML，以便将员工记录发送给第三方。\n\n### 解决方案\n\nOracle 提供了许多不同的函数用于将数据转换为 XML 格式。函数数量如此之多，源于\
  \ XML 在数据库中的演变历程，从 Oracle 9*i*的早期包含，到今天 Oracle 中惊人的灵活性。Oracle 提供的一些用于将关系数据转换为 XML\
  \ 的主要函数是`SYS_XMLGEN`、`DBMS_XMLGEN`和`XMLELEMENT`。每个函数都可以解决这个特定问题，但各自有其特点。\n\n我们选择使用`SYS_XMLGEN`来动态转换一行数据。我们采用一个用户定义类型作为辅助类型，将目标数据从关系形式映射到对象关系形式，以便可以直接传递给`SYS_XMLGEN`。`SYS_XMLGEN`函数基于一行或类似行的表达式返回一块\
  \ XML。它可以接受字面值、单列或用户定义类型作为输入参数。我们创建如下所示的`EMPLOYEE_MAP_TYPE`，将`HR.EMPLOYEES`表中的关系数据映射到一个可直接供`SYS_XMLGEN`使用的用户定义类型。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 14 章 ■ 处理 XML 数据\n\n```sql\n\
  create or replace type employee_map_type as object (\n  employee_id    number(6),\n\
  \  first_name     varchar2(20),\n  last_name      varchar2(25),\n  email       \
  \   varchar2(25),\n  phone_number   varchar2(20),\n  hire_date      date,\n  job_id\
  \         varchar2(10),\n  salary         number(8,2),\n  commission_pct number(2,2),\n\
  \  manager_id     number(6),\n  department_id  number(4)\n);\n/\n```\n\n我们现在使用`EMPLOYEE_MAP_TYPE`类型作为催化剂，将关系存储的数据送入\
  \ XML 处理和输出。接下来的过程返回一个格式正确、表示给定员工详细信息的 XML 文档。\n\n```sql\ncreate or replace procedure\
  \ employee_xml (emp_id IN number)\nas\n  xml_employee xmltype;\nbegin\n  select\n\
  \    sys_xmlgen\n      (employee_map_type\n        (e.employee_id,\n         e.first_name,\n\
  \         e.last_name,\n         e.email,\n         e.phone_number,\n         e.hire_date,\n\
  \         e.job_id,\n         e.salary,\n         e.commission_pct,\n         e.manager_id,\n\
  \         e.department_id)\n      ) into xml_employee\n  from hr.employees e\n \
  \ where e.employee_id = emp_id;\n\n  dbms_output.put_line(xml_employee.getclobval());\n\
  end;\n/\n```\n\n现在我们可以调用`EMPLOYEE_XML`过程来获取 XML 形式的员工数据。\n\n```sql\ncall employee_xml(150);\n\
  ```\n\n输出结果：\n\n```xml\n<?xml version=\"1.0\"?>\n<ROW>\n  <EMPLOYEE_ID>150</EMPLOYEE_ID>\n\
  \  <FIRST_NAME>Peter</FIRST_NAME>\n  <LAST_NAME>Tucker</LAST_NAME>\n  <EMAIL>PTUCKER</EMAIL>\n\
  \  <PHONE_NUMBER>011.44.1344.129268</PHONE_NUMBER>\n  <HIRE_DATE>30-JAN-97</HIRE_DATE>\n\
  \  <JOB_ID>SA_REP</JOB_ID>\n  <SALARY>10000</SALARY>\n  <COMMISSION_PCT>.3</COMMISSION_PCT>\n\
  \  <MANAGER_ID>145</MANAGER_ID>\n  <DEPARTMENT_ID>80</DEPARTMENT_ID>\n</ROW>\n```\n\
  \n调用完成。\n\n### 工作原理\n\n我们的方法分两部分来构建可重用的组件，将员工数据转换为 XML。`SYS_XMLGEN`函数的一个限制是它不能接受多列或表格结果作为输入——例如`SELECT\
  \ * …`语句的结果。虽然`DBMS_XMLGEN`过程可以做到这一点，但使用该方法的额外复杂性很高，我们希望避免。我们利用`SYS_XMLGEN`能够操作任意复杂度的用户定义类型的能力。我们的`EMPLOYEE_MAP_TYPE`模拟了`HR.EMPLOYEES`表的列名和数据类型。\n\
  \n我们通过声明一个变量`XML_EMPLOYEE`来保存生成的员工数据的 XML 版本，从而创建了`EMPLOYEE_XML`过程。\n\n到目前为止，我们的过程非常直接。下一步调用`SYS_XMLGEN`：\n\
  \n```sql\nselect\n  sys_xmlgen\n    (employee_map_type\n      (e.employee_id,\n\
  \       e.first_name,\n       e.last_name,\n       e.email,\n       e.phone_number,\n\
  \       e.hire_date,\n       e.job_id,\n       e.salary,\n       e.commission_pct,\n\
  \       e.manager_id,\n       e.department_id)\n    ) into xml_employee\nfrom hr.employees\
  \ e\nwhere e.employee_id = emp_id;\n```\n\n在这里，我们使用`EMPLOYEE_MAP_TYPE`将`SELECT`语句的结果动态转换为我们自定义的用户定义数据类型。此时，我们有了一个`SYS_XMLGEN`可以接受的参数。`SYS_XMLGEN`调用的结果然后通过`INTO`子句被定向到`XML_EMPLOYEE`变量。\n\
  \n此时，`XML_EMPLOYEE`变量保存着我们想要的 XML 格式数据。为了让普通用户看到 XML，我们需要一个技巧，该技巧依赖于 Oracle 中 XML\
  \ 的底层存储模型。在底层，XML 可以以多种方式存储和管理。最常见的是作为`CLOB`，我们可以利用这一点来调用`CLOB`方法以检索 XML。过程的最后一行在我们的`XML_EMPOYEE`变量上调用`GETCLOBVAL`函数，并将结果传递给`DBMS_OUTPUT.PUT_LINE`以便在屏幕上打印（如果你在\
  \ SQL*Plus 中运行，别忘了执行`SET SERVEROUTPUT ON`）。\n\n## XMLTYPE 存储的多种形式\n\nOracle 为`XMLTYPE`数据提供了四种不同的存储机制。这些不同的方法源于\
  \ XML 的本质——通常是具有明确定义结构的大块文本。正是这种大尺寸与隐藏在其中的模式或结构之间的张力，导致了存储效率与索引、吞吐量与事务处理能力之间的权衡。\n\
  \n`XMLTYPE`数据类型的四种存储方法是：\n\n- **对象关系型：** XML 数据被分解为自动创建的对象关系行，非常适合基于元素的访问、更新和处理。对象关系存储每次作为单一对象访问时，都需要处理开销来重组完整的\
  \ XML 文档。\n- **CLOB：** 使用字符大对象方法存储 XML，可以轻松处理整个 XML 文档，保留格式、空格等。更新 XML 中的单个元素或在元素级别进行索引时，会引入额外的开销。\n\
  - **混合型：** 对象关系存储和`CLOB`存储之间的折中方案，混合型试图为以文档为中心的`CLOB`存储增加元素级别的性能增强。\n- **二进制 XML：**\
  \ Oracle 中最新的 XML 存储形式，这种方法以“后解析”格式存储 XML 文档，XML 结构的检查已经完成。底层存储使用压缩的二进制形式，增加了空间效率，同时提升了处理效率。\n\
  \n基于 Oracle 的旧应用程序和设计通常会在对象关系存储和`CLOB`存储之间做选择，具体取决于系统是以元素/处理为中心还是以文档/吞吐量为中心。任何基于\
  \ Oracle 的新开发都应倾向于新的`二进制 XML`存储机制——尽管对于强调极高吞吐量或重度元素级操作的极端情况，应该使用`CLOB`或对象关系存储选项进行基准测试。\n\
  \n\n\n# 第 14 章 ■ 处理 XML 数据\n\n##### 14-2. 以原生形式存储 XML\n\n### 问题\n\n您需要将原生 XML 数据存储到数据库的关系表中。XML\
  \ 需要作为接收到的完整 XML 文档存储。\n\n### 解决方案\n\nOracle 通过支持多种不同形式（从原生 XMLTYPE 表到各种函数）使得原生\
  \ XML 存储变得简单。关键在于找到工作量最小的方法。对于无需修改的 XML 数据，或可通过 XSLT 提取部分 XML 的情况，使用直接的 `XMLTYPE`\
  \ 数据类型转换是最简便的方法。\n\n在常规操作中，您不一定需要显示 XML，因此可以用为过程声明的额外 `OUT` 参数赋值来替代 `DBMS_OUTPUT`\
  \ 调用。我们解决方案的结构将变为以下通用形式。\n\n```sql\ncreate or replace procedure employee_xml\n(emp_id\
  \ IN number, xml_employee OUT xmltype)\nas\n-- 无需将 xml_employee 指定为局部变量\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n-- 此处为现有解决方案的过程逻辑\n-- 不调用 dbms_output.put_line\nend;\n/\n```\n\n此解决方案变体要求调用的应用程序能够理解返回的\
  \ `XMLTYPE` 类型变量。\n\n**提示** 我们的解决方案每次调用过程时都使用 `EMPLOYEE_MAP_TYPE` 执行到 XML 的动态转换。您可以通过使用一个物化列来保存\
  \ `EMPLOYEE` 数据（以用户定义类型的形式备用），从而提高此方法的速度并降低过程的复杂性。这会增加 `INSERT` 和 `UPDATE` 时的开销，但能加速通过此过程的检索。\n\
  \n我们的解决方案使用 `XMLTYPE` 将新的仓库定义存储在 `OE.WAREHOUSES` 表中。这使我们能够将 XML 直接存储在 Oracle 中，实际上使\
  \ XML 的内部结构对于添加到数据库的目的而言变得不透明。Oracle 的众多 XML 函数支持在插入时无需额外工作即可使用和管理 XML 中的元素、标签和值。表结构非常简单，如下所示。\n\
  \n```sql\nName                                      Null?    Type\n-----------------------------------------\
  \ -------- ------------------\nWAREHOUSE_ID                              NOT NULL\
  \ NUMBER(3)\nWAREHOUSE_SPEC                                     SYS.XMLTYPE\nWAREHOUSE_NAME\
  \                                     VARCHAR2(35)\nLOCATION_ID                \
  \                        NUMBER(4)\nWH_GEO_LOCATION                            \
  \        MDSYS.SDO_GEOMETRY\n```\n\n我们可以使用以下包含 `XMLTYPE` 转换的 `INSERT` 语句，插入一个位于伦敦、拥有\
  \ 15000 平方英尺建筑面积及其他详细信息的新仓库。\n\n```sql\ninsert into oe.warehouses\n(warehouse_id,\
  \ warehouse_spec, warehouse_name, location_id)\nvalues\n(10,\nxmltype('\n<?xml version=\"\
  1.0\"?>\n<Warehouse>\n<Building>Owned</Building>\n<Area>15000</Area>\n<Docks>1</Docks>\n\
  <DockType>Side load</DockType>\n<WaterAccess>Y</WaterAccess>\n<RailAccess>Y</RailAccess>\n\
  <Parking>Street</Parking>\n<VClearance>10 ft</VClearance>\n</Warehouse>'),\n'London',\n\
  2300);\n```\n\n请注意，对 `XMLTYPE` 的调用已进行格式化以便于页面阅读。在实际使用中，如果元素之间包含回车符、换行符和空格，转换到 `XMLTYPE`\
  \ 将引发 `ORA-31011: XML parsing failed` 错误。在随 *Oracle SQL Recipes* 提供的代码示例中，您将看到 `INSERT`\
  \ 语句的 `XMLTYPE` 调用被格式化在一行上。\n\n```sql\ninsert into oe.warehouses\n…\nxmltype('<?xml\
  \ version=\"1.0\"?><Warehouse><Building>Owned</Building>…'),\n…\n```\n\n### 工作原理\n\
  \n我们的解决方案利用了 Oracle 能够将 XML 作为另一种数据类型处理的能力。我们使用 `XMLTYPE` 调用将提供的文本转换为 `XMLTYPE`\
  \ 数据类型。在底层，`XMLTYPE` 支持 `CLOB` 语义，因为它在内部存储为 `CLOB`。这意味着我们可以使用相同的转换方法，向 `XMLTYPE`\
  \ 传递一个最大可达 4GB 的字符串。我们决定缩短示例以节省篇幅！\n\n正如转换到其他数据类型会对精度、长度等强制执行规则一样，转换到 `XMLTYPE`\
  \ ...\n\n\n## 验证 XML 数据\n\nOracle 为 XML 数据强制实施一些特定规则。如果你的列或表是使用 XML 模式定义的，那么该模式将用于验证数据，确保必需的元素存在并且整体结构符合模式。这被称为有效性测试。如果没有使用模式，如我们的\
  \ `OE.WAREHOUSES` 表，XML 数据结构的另一个完整性检查仍然会被强制执行：也就是“格式良好”测试。在此测试中，Oracle 确保提供的 XML\
  \ 具有匹配的开始和结束标签，并且元素嵌套正确。\n\n如果你试图存储格式错误的 XML 数据，就可以看到格式良好测试的实际效果。下面的代码故意破坏了我们仓库的\
  \ XML 格式，省略了结束的 `</Warehouse>` 元素标签。\n\n```sql\n-- intentionally invalid SQL\ninsert\
  \ into oe.warehouses\n(warehouse_id, warehouse_spec, warehouse_name, location_id)\n\
  values\n(10,\nxmltype('<?xml version=\"1.0\"?><Warehouse><Building>Owned</Building>'),\n\
  'London',\n2300);\n```\n\n```\nxmltype('<?xml version=\"1.0\"?><Warehouse><Building>Owned</Building>'),\n\
  *\nERROR at line 5:\nORA-31011: XML parsing failed\nORA-19202: Error occurred in\
  \ XML processing\nLPX-00007: unexpected end-of-file encountered\nORA-06512: at \"\
  SYS.XMLTYPE\", line 310\nORA-06512: at line 1\n```\n\n注意那个加粗的晦涩错误消息。意外的文件结束是 Oracle\
  \ 告诉你它到达了数据末尾却没有找到预期的结束元素标签的方式。这不是世界上最好的错误消息，但现在你知道该找什么了。\n\n## 14-3\\. 为关系型使用拆分\
  \ XML\n\n### 问题\n\n你需要从 XML 文档中提取单个元素值用于其他计算。例如，你需要从 XML 文档中提取文本和数值，用于计算和详细报告仓库的空间信息。\n\
  \n### 解决方案\n\nOracle 提供了 `XMLTABLE` 函数，可以使用 XQuery 和列映射到传统 Oracle 数据类型来操作 XML 文档。通过\
  \ `XMLTABLE`，我们可以以关系的方式识别和使用 XML 文档中的数据元素。\n\n我们的下一个示例使用 `XMLTABLE` 来识别 `OE.WAREHOUSES`\
  \ 表中仓库的许多细节，包括建筑类型、仓库的 floor space area、码头访问权限等。\n\n```sql\nselect\n  shredded_warehouses.\"\
  Building\",\n  shredded_warehouses.\"FloorArea\",\n  shredded_warehouses.\"#Docks\"\
  ,\n  shredded_warehouses.\"DockType\",\n  shredded_warehouses.\"WaterAccess\",\n\
  \  shredded_warehouses.\"RailAccess\",\n  shredded_warehouses.\"Parking\",\n  shredded_warehouses.\"\
  VertClearance\"\nfrom oe.warehouses,\n  xmltable\n    ('/Warehouse'\n      passing\
  \ warehouses.warehouse_spec\n      columns\n        \"Building\" varchar2(8) path\
  \ '/Warehouse/Building',\n        \"FloorArea\" number path '/Warehouse/Area',\n\
  \        \"#Docks\" number path '/Warehouse/Docks',\n        \"DockType\" varchar2(10)\
  \ path '/Warehouse/DockType',\n        \"WaterAccess\" varchar2(8) path '/Warehouse/WaterAccess',\n\
  \        \"RailAccess\" varchar2(7) path '/Warehouse/RailAccess',\n        \"Parking\"\
  \ varchar2(7) path '/Warehouse/Parking',\n        \"VertClearance\" varchar(9) path\
  \ '/Warehouse/VClearance'\n    ) shredded_warehouses;\n```\n\n```\nBuilding  FloorArea\
  \  #Docks  DockType     WaterAcc  RailAcc  Parking  VertClear\n--------  ---------\
  \  ------  -----------  --------  -------  -------  ----------\nOwned     25000\
  \      2       Rear load    Y         N        Street   10 ft\nRented    50000 \
  \     1       Side load    Y         N        Lot      12 ft\nRented    85700  \
  \    N       N            N         N        Street   11.5 ft\nOwned     103000\
  \     3       Side load    N         Y        Lot      15 ft\n```\n\n将数据拆分成表格形式后，我们就可以在普通查询、函数、PL/SQL\
  \ 过程等中使用它了。\n\n### 工作原理\n\n我们示例的关键是使用 `XMLTABLE` 函数来完成从 XML 中提取元素值的繁重工作。查看原始 XML\
  \ 数据，我们正在寻找存储在 `WAREHOUSE_SPEC` 列中的给定 XML 文档中加粗的值。\n\n```xml\n<?xml version=\"1.0\"\
  ?>\n<Warehouse>\n  <Building> Owned</Building>\n  <Area> 25000</Area>\n  <Docks>\
  \ 2</Docks>\n  <DockType> Rear load</DockType>\n  <WaterAccess> Y</WaterAccess>\n\
  \  <RailAccess> N</RailAccess>\n  <Parking> Street</Parking>\n  <VClearance> 10\
  \ ft</VClearance>\n</Warehouse>\n```\n\n`XMLTABLE` 函数接受一个或多个 XQuery 表达式，应用于 `XMLTYPE`\
  \ 数据的引用列或表达式。`XMLTABLE` 的一般形式如下所示。\n\n```sql\nxmltable(\n  <XQuery to apply>,\n\
  \  <Source XMLTYPE column or expression>,\n  <Column definition optionally mapped\
  \ with XQuery path expression>\n)\n```\n\n我们没有太多空闲章节来讨论文档对象模型以及 XQuery 与 SQL 的区别，但你可以将每列的可选\
  \ `PATH` 表达式视为指示 `XMLTABLE` 函数如何在找到指定的基本元素（在我们的例子中是 `'/Warehouse'`）时遍历 XML 树结构。\n\
  \n我们的示例指示 Oracle 遍历 `OE.WAREHOUSES` 的 `WAREHOUSE_SPEC` 列，寻找 `<Warehouse>` 元素。接下来，我们在\
  \ `columns` 子句中使用 XPath 表达式 `'/Warehouse/Building'` 来查找嵌套在 `<Warehouse>` 元素下的名为\
  \ `<Building>`` 的子元素。标签内的值被转换为 `VARCHAR2(8)` 类型，并命名为 `\"Building\"`。然后对指定的任何其他列重复此过程，从而构建出\
  \ XML 的拆分版本。\n\n`XMLTABLE` 函数的结果在我们的示例中被视为一个内联视图，我们为表达式起了一个别名 `SHREDDED_WAREHOUSES`。然后我们在\
  \ `SELECT` 列表中使用这个别名，就像使用任何其他内联视图的结果一样。我们同样可以在任何类型的查询、函数或 PL/SQL 块中引用来自 `XMLTABLE`\
  \ 的 `SHREDDED_WAREHOUSES` 结果。\n\n## 14-4\\. 从 XML 文档中提取关键 XML 元素\n\n### 问题\n\n你需要在其他处理中提取\
  \ XML 的子部分，包括元素名称、属性和值。例如，你需要从仓库 XML 文档中提取一部分 XML 传递给 XSLT 进程。\n\n### 解决方案\n\nOracle\
  \ 的 `EXTRACT` 函数支持 `XMLTYPE` 数据类型，并提供通过将结果作为 `XMLTYPE` 值返回来保留 XML 元素名称和属性结构的能力。\n\
  \n我们的示例使用 `EXTRACT` 函数从 `OE.WAREHOUSES` 表中的仓库中选择 `<VClearance>` 元素及其属性和数据。下一个 SQL\
  \ 显示了与该函数一起使用的 XPath 表达式，用于查找我们想要的 XML 子部分。\n\n```sql\nselect\n  extract(warehouse_spec,\
  \ 'Warehouse/VClearance') as VClearance_XML\nfrom oe.warehouses;\n```\n\n```\nVCLEARANCE_XML\n\
  ------------------------------------------------------\n<VClearance>10 ft</VClearance>\n\
  <VClearance>12 ft</VClearance>\n<VClearance>11.5 ft</VClearance>\n<VClearance>15\
  \ ft</VClearance>\n…\n```\n\n每个返回的值是匹配在 `<Warehouse>` 元素下找到的 `<VClearance>` 元素的\
  \ XML 子树。\n\n### 工作原理\n\n`EXTRACT` 函数使用 XPath 表达式来遍历文档对象模型。它旨在从源 XML 文档中返回格式良好的\
  \ XML 片段。当 `EXTRACT` 函数找到与 XPath 查询中表达的最低级别匹配的元素时，它会返回从该元素开始的 XML 文档部分，同时保留所有元素名称、属性和值。在我们的示例中，这意味着当\
  \ `EXTRACT` 遇到 `<VClearance>` 元素时，它开始从该元素及其嵌套的所有子元素返回 XML。\n\n\n## 14-5\\. 生成复杂的\
  \ XML 文档\n\n### 问题\n\n你需要将数据库中的各种传统数据转换为 XML 格式。你特别希望创建一个比简单的表到 XML 转换更复杂的 XML 文档，例如，将某些关系值作为属性处理，并对来自员工数据样本的值进行不同级别的嵌套。\n\
  \n### 解决方案\n\nOracle 提供了大量令人眼花缭乱的函数和过程，用于从常规数据生成 XML。对于我们陈述的问题，我们将假设我们希望将员工的 `EMPLOYEE_ID`\
  \ 用作根元素的 XML 属性，而不是其自身的元素。我们还希望提供关于薪资的更多细节，将支付周期指定为一个属性，并添加货币细节。像 `DBMS_XMLGEN`\
  \ 或 `SYS_XMLGEN` 这样的工具需要笨拙的干预才能提供这种级别的 XML 特定数据调整。\n\n在处理需要精心制作 XML 结果的需求时，较低级别的函数\
  \ `XMLROOT`、`XMLELEMENT` 和 `XMLATTRIBUTE` 提供了对所需 XML 结构的细粒度控制。接下来的语句使用这些函数来生成我们配方所要求的精巧\
  \ XML。\n\n```sql\nselect XMLRoot(\n    XMLElement(\"Employee\",\n        XMLAttributes(employee_id\
  \ as \"Employee_ID\"),\n        XMLElement(\"FirstName\", first_name),\n       \
  \ XMLElement(\"LastName\", last_name),\n        XMLElement(\"Salary\",\n       \
  \     XMLAttributes('Monthly' as \"Period\"),\n            XMLElement(\"Amount\"\
  , salary),\n            XMLElement(\"Currency\", 'USD'))\n    ),\n    VERSION '1.0')\
  \ Employee_XML\nfrom hr.employees\nwhere employee_id = 205;\n```\n\n结果产生了我们所需的数据，格式是一个格式良好的\
  \ XML 文档，包含正确的 XML 头。\n\n```xml\n<?xml version=\"1.0\"?>\n<Employee Employee_ID=\"\
  205\">\n  <FirstName>Shelley</FirstName>\n  <LastName>Higgins</LastName>\n  <Salary\
  \ Period=\"Monthly\">\n    <Amount>12000</Amount>\n    <Currency>USD</Currency>\n\
  \  </Salary>\n</Employee>\n```\n\n### 工作原理\n\n我们的配方使用了 `XMLROOT`、`XMLELEMENT` 和\
  \ `XMLATTRIBUTES` 函数来构建表示员工数据所需的 XML 结构。\n\n使用 `XMLROOT` 提供了必要的 XML 头，将我们的结果从 XML\
  \ 片段转变为一个完整的 XML 文档。`XMLROOT` 生成如下所示的头行。\n\n```xml\n<?xml version=\"1.0\"?>\n```\n\
  \n对大多数人来说，这只是一个语义上的区别，但当测试 XML 是否为一个完整的 XML 文档的有效性时，正确的头部元素是必需的。\n\n你可以将 `XMLELEMENT`\
  \ 视为 XML 版本的 `PUT_LINE` 和连接命令 `||`。调用 `XMLELEMENT` 会输出源列或表达式以及提供的元素名称，以形成结果的 XML\
  \ 构建块。使用 `XMLELEMENT` 的技巧在于记住两个能力。你可以根据需要将任意多个对 `XMLELEMENT` 的调用串联起来（就像你可以连接任意数量的字符串一样），并且它所操作的表达式本身可以是另一个对\
  \ `XMLELEMENT` 的调用。这种调用的嵌套会在输出中产生等效的嵌套元素。你可以在配方中的这个代码片段中看到这一点。\n\n```sql\n…\nXMLElement(\"\
  Salary\",\n    XMLAttributes('Monthly' as \"Period\"),\n    XMLELEMENT(\"Amount\"\
  , salary),\n    XMLELEMENT(\"Currency\", 'USD')\n…\n```\n\n在这里，我们指示 Oracle，`<Salary>`\
  \ 元素由一个对 `XMLATTRIBUTES` 的调用和两个对 `XMLELEMENT` 的调用组成。虽然这比调用 `DBMS_XMLGEN` 或 `SYS_XMLGEN`\
  \ 更为繁琐，但关键在于能够用简单的命令控制结构。这些系统包都不提供超越简单的、单层 XML 的结构化结果的能力。这就是 `XMLELEMENT` 提供所需功能的地方。\n\
  \n我们对 `XMLATTRIBUTES` 的调用指示 Oracle 将给定的列或表达式作为父级 `XMLELEMENT` 调用所创建元素的属性。例如，在刚刚显示的代码片段中，我们使用\
  \ `XMLATTRIBUTES` 为 `<Salary>` 元素创建一个 `Period` 属性，并给该属性赋值 `Monthly`。在 XML 数据管理中一个非常常见的技术是，将名义上的主键值或值作为属性包含在实体的根元素或父元素中，而不是将它们作为子元素单独放置。你可以看到我们对来自\
  \ `HR.EMPLOYEES` 表的 `EMPLOYEE_ID` 值来源采用了这种方法。我们使用如下所示的调用使其成为 `<Employee>` 元素的一个属性。\n\
  \n```sql\nXMLAttributes(employee_id as \"Employee_ID\")\n```\n\n## 14-6\\. 验证 XML\
  \ 模式\n\n### 问题\n\n你希望对存储在数据库中的 XML 数据强制执行 XML 模式有效性。仓库规范当前存储时未经有效模式检查，你希望对照适当的模式检查这些数据，以确保其结构和内容符合模式的规定。\n\
  \n### 解决方案\n\nOracle 提供了 `DBMS_XMLSCHEMA.REGISTERSCHEMA` 函数来在 Oracle 数据库内定义 XML\
  \ 模式。我们已经创建了必要的 XML 模式并将其托管在本地 Web 服务器上。如下所示，我们在 `REGISTERSCHEMA` 调用中嵌入对此模式的引用，以使\
  \ Oracle 能够找到并注册该模式。\n\n```sql\nbegin\n    dbms_xmlschema.registerschema(\n    \
  \    schemaurl=>'http://localhost/transfer/warehouse_schema.xsd',\n        schemadoc=>\n\
  '<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<xs:schema\n    targetNamespace=\"\
  http://tempuri.org/XMLSchema.xsd\"\n    elementFormDefault=\"qualified\"\n    >\n\
  \  <xs:element name=\"warehouse_spec\">\n    <xs:complexType>\n      <xs:sequence>\n\
  \        <xs:element name=\"Building\" type=\"xs:string\" minOccurs=\"1\"\n    \
  \                xdb:SQLName=\"BUILDING\" />\n        <xs:element name=\"Area\"\
  \ type=\"xs:unsignedInt\" minOccurs=\"1\"\n                    xdb:SQLName=\"AREA\"\
  \ />\n        <xs:element name=\"Docks\" type=\"xs:unsignedInt\" minOccurs=\"1\"\
  \n                    xdb:SQLName=\"DOCKS\" />\n        <xs:element name=\"DockType\"\
  \ type=\"xs:string\" minOccurs=\"1\"\n                    xdb:SQLName=\"DOCKTYPE\"\
  \ />\n        <xs:element name=\"WaterAccess\" type=\"xs:boolean\" minOccurs=\"\
  1\"\n                    xdb:SQLName=\"WATERACCESS\" />\n        <xs:element name=\"\
  RailAccess\" type=\"xs:boolean\" minOccurs=\"0\"\n                    xdb:SQLName=\"\
  RAILACCESS\" />\n        <xs:element name=\"Parking\" type=\"xs:string\" minOccurs=\"\
  0\"\n                    xdb:SQLName=\"PARKING\" />\n        <xs:element name=\"\
  VClearance\" type=\"xs:string\" minOccurs=\"0\"\n                    xdb:SQLName=\"\
  VCLEARANCE\" />\n      </xs:sequence>\n    </xs:complexType>\n  </xs:element>\n\
  </xs:schema>');\nend;\n/\n\n\n#### 第 14 章：处理 XML 数据\n\n通过我们的模式，并由 `DBMS_XMLSCHEMA.REGISTERSCHEMA`\
  \ 隐式解析其正确性和完整性，我们现在可以使用它来检查数据库中对应的 `XMLTYPE` 列，以查看存在的 XML 是否符合该模式。用 XML 术语来说，此测试确定了\
  \ XML 的有效性。\n\n```sql\nselect w.warehouse_id,\ncase\nwhen\n  w.warehouse_spec.isSchemaValid\n\
  \  ('http://localhost/transfer/warehouse_schema.xsd',\n   'warehouse_spec') = 1\
  \ then 'Valid'\nwhen\n  w.warehouse_spec.isSchemaValid\n  ('http://localhost/transfer/warehouse_schema.xsd',\n\
  \   'warehouse_spec') is null then 'Undefined'\nelse 'Invalid'\nend XML_Validity\n\
  from oe.warehouses w;\n```\n\n我们的结果提供了每个 `WAREHOUSE_SPEC` XML 文档相对于 XML 模式有效性的人类可读摘要。\n\
  \n```\nWAREHOUSE_ID XML_VALIDITY\n------------ ------------\n           1 Valid\n\
  \           2 Valid\n           3 Valid\n           4 Valid\n       5 Undefined\n\
  \       6 Undefined\n       7 Undefined\n       8 Undefined\n       9 Undefined\n\
  ```\n\n## 工作原理\n\n我们的方法首先使用 `DBMS_XMLSCHEMA` 包，通过 `REGISTERSCHEMA` 函数来处理 XML 模式。此注册为我们提供了两个功能。首先，它允许\
  \ Oracle 识别其可以从中获取模式的外部位置。这使得模式的未来用户无需自己跟踪模式的位置。其次，也是最重要的，`REGISTERSCHEMA` 会解析模式以检查语法上的正确性和完整性。XML\
  \ 模式本身也是 XML 文档，因此可以测试它们是否格式良好，以确保元素被正确嵌套、关闭等，并可以对照 W3C 的 XML 模式标准测试它们自身的有效性。\n\n\
  `REGISTERSCHEMA` 函数可以从多种位置获取 XML 模式，例如我们方法中作为 `VARCHAR` 提供的文本，以及从 `BFILE` 或 `URI`\
  \ 引用。我们已将该模式包含在网站 *Oracle SQL Recipes*，www.oraclesqlrecipes.com 上，因此您在自行探索此方法时无需重新输入文本。\n\
  \n详细描述 XML 模式的语法和设计选择可能需要一整本书。然而，我们的模式中有几个值得注意的方面有助于 Oracle XML 管理。首先是包含了 Oracle\
  \ 用于数据库相关 XML 的命名空间。模式头中的 `xmlns:ora=\"http://xmlns.oracle.com/oxml\"` 条目允许我们使用\
  \ Oracle 特定的数据类型作为类型属性。它还允许我们添加 `SQLName` 映射，以帮助 Oracle 执行子元素索引和其他管理任务。\n\n我们的模式经过验证并在\
  \ Oracle 中注册后，我们知道它可以安全地用作对 XML 数据的有效性测试（甚至可以用作检查约束）。我们的 `OE.WAREHOUSES` 表在 `WAREHOUSE_SPEC`\
  \ 列中以 XML 形式保存仓库的描述，并且该模式是为该仓库数据设计的。任何 `XMLTYPE` 数据都包含用于执行各种 XML 处理的成员函数，我们使用 `ISSCHEMAVALID`\
  \ 函数根据 XML 模式测试 `WAREHOUSE_SPEC` 数据。`ISSCHEMAVALID` 对有效数据返回 1，对无效数据返回 0，对未找到数据的情况返回\
  \ `NULL`。我们没有将这种简写形式直接呈现给用户，而是将 `ISSCHEMAVALID` 的调用包装在 `CASE` 块中，以便为三种可能的结果返回人类可读的值\
  \ `Valid`、`Invalid` 和 `Undefined`。\n\n##### 14-7. 就地更改 XML\n\n### 问题\n\n您需要修改存储在\
  \ `XMLTYPE` 列中的数据，而不影响每个 XML 条目中的其他元素。例如，您需要将描述仓库占地面积的 XML 数据从英制单位更改为公制单位。\n\n###\
  \ 解决方案\n\n使用 Oracle 的 `UPDATEXML` 函数来更新 `XMLTYPE` 数据类型或 XML 文档的任何部分。由于我们更新的源数据位于\
  \ `WAREHOUSE_SPEC` 列（类型为 `XMLTYPE`）中，因此我们还使用 `EXTRACTVALUE` 函数来查找我们希望更新的目标 `<Area>`\
  \ 元素，以便我们可以在一个语句中完成整个方法。接下来的 SQL 显示了 `UPDATEXML` 和 `EXTRACTVALUE` 如何协同工作，将 `<Area>`\
  \ 元素从英制单位更改为公制单位。\n\n```sql\nupdate oe.warehouses\nset warehouse_spec =\n  updatexml(\n\
  \    warehouse_spec,\n    '/Warehouse/Area/text()',\n    extractvalue(\n      warehouse_spec,\n\
  \      'Warehouse/Area')*0.09290304\n  );\n```\n\n我们可以使用接下来开发的 SQL 来查看新计算的占地面积值。\n\
  \n```sql\nselect\n  extractvalue(warehouse_spec, 'Warehouse/Area')\nfrom oe.warehouses;\n\
  ```\n\n```\nEXTRACTVALUE(WAREHOUSE_SPEC,'WAREHOUSE/AREA')\n--------------------------------------------\n\
  \                               2322.576\n                               4645.152\n\
  \                             7961.790528\n                              9569.01312\n\
  ...\n```\n\n> **注意：** 1 平方英尺正好等于 0.09290304 平方米，这得益于现代英制英寸被定义为恰好 2.54 厘米。\n\n###\
  \ 工作原理\n\n我们的方法使用两个 XML 函数一起执行仓库占地面积从平方英尺到平方米的明显就地更新。更新语句的整体结构对于任何熟悉 SQL 的人来说都很熟悉。\n\
  \n```sql\nupdate oe.warehouses\nset warehouse_spec = <calculation of new space>;\n\
  ```\n\n正是新空间的计算需要两个 XML 函数 `UPDATEXML` 和 `EXTRACTVALUE`。`UPDATEXML` 的调用采用以下通用形式。\n\
  \n```sql\nupdatexml(<XMLTYPE column>, <XPath Expression>, <New Value>)\n```\n\n\
  对于我们的方法，我们以 `WAREHOUSE_SPEC` 列为目标，并使用 `XPath` 表达式 `/Warehouse/Area/text()` 来定位 `<Area>`\
  \ 元素的值。如果我们省略 `XPath` 表达式中的 `/text()` 部分，我们将告诉 `UPDATEXML` 同时更改值和元素标签以及 `<Area>`\
  \ 的任何属性。\n\n为了计算 `UPDATEXML` 的新值，我们使用 `EXTRACTVALUE` 来提取每一行当前的 `<Area>` 元素值。`EXTRACTVALUE`\
  \ 显式地从 `XPath` 表达式返回值，因此我们不需要在 `XPath` 路径中包含对 `/text()` 的调用。对于返回的每个值，我们乘以 0.09290304，将平方英尺的值转换为平方米的值。这为我们提供了\
  \ `UPDATEXML` 用来更改 `<Area>` 元素值的最终值。\n\n### 当更新不仅仅是更新时\n\n我们对 `UPDATEXML` 的描述表明\
  \ `<Area>` 元素的就地更新只是表面上的。我们并不是想暗示更新没有发生：它确实发生了。然而，值得注意的是，Oracle 中的 `XMLTYPE` 数据可以作为\
  \ `CLOB` 数据之一存储在内部。与 `CLOB` 数据一样，您无法更新部分值。相反，在更新时，您需要用新构建的数据形式替换现有数据。因此，在我们的示例中，完整的\
  \ `WAREHOUSE_SPEC` `XMLTYPE` 值连同新的 `<Area>` 值一起被重写回 Oracle。这意味着即使对大型 XML 块进行小幅更新，也可能对性能和日志记录产生影响。\n\
  \n#### 第 15 章：分区\n\n如果您处理大型表和索引，当行数增长到数亿时，您在某些时候会遇到性能下降的问题。即使针对适当索引的表执行的高效编写的 SQL，随着表和索引大小增长到千兆字节、兆字节甚至更高，最终也会变慢。对于这种情况，您必须制定一种策略，使您的数据库能够随着数据量的增长而扩展。\n\
  \nOracle 提供了两个关键的可扩展性特性：并行处理和分区——这些机制即使在数据库规模巨大时也能实现良好的性能。并行处理允许 Oracle 启动多个执行线程以利用多个硬件资源。分区允许表或索引的子集被独立管理。本章的重点是分区策略。\n\
  \n\n分区允许您创建由独立物理段组成的逻辑表或索引。表或索引的每个分区都具有相同的逻辑结构（如列定义），但可以物理存储在独立的容器中。换言之，您可以将每个分区存储在其专属的表空间及相关数据文件中。这使您能够将一个大型逻辑对象作为一组更小、更易于维护的物理片段进行管理。\n\
  \n本章将使用与分区相关的多种术语。表 15-1 描述了使用本章示例时需要熟悉的专业术语含义。\n\n**表 15-1.** Oracle 分区术语\n\n|\
  \ 术语 | 含义 |\n| :--- | :--- |\n| 分区 | 将单个逻辑表或索引透明地实现为多个独立、更小的物理段。 |\n| 分区键 | 决定行存储于哪个分区的一列或多列。\
  \ |\n| 分区边界 | 分区之间的分界线。 |\n| 单级分区 | 使用单一方法进行分区。 |\n| 复合分区 | 组合多种方法进行分区。 |\n| 子分区\
  \ | 分区内的次级分区。 |\n| 独立分区 | 能够单独访问分区以执行维护操作，且不影响其他分区的可用性。 |\n| 分区修剪 | 消除不必要的分区。Oracle\
  \ 会检测 SQL 语句需要访问的分区，并移除（修剪）所有无需访问的分区。 |\n| 分区连接 | 当两个表按相同键分区并进行连接时，Oracle 可将连接操作拆分为在分区之间执行的多个小型连接，从而提升性能。\
  \ |\n| 本地索引 | 使用与其表相同的分区键。 |\n| 全局索引 | 不使用与其表相同的分区策略。 |\n\n如果您主要处理小型 OLTP 数据库，可能无需构建分区表和索引。但如果您维护大型\
  \ OLTP 数据库或数据仓库环境，使用分区技术很可能带来显著收益。分区是设计和构建可扩展数据库系统的关键技术。\n\n本章面向处理大型数据库的开发人员和 DBA。Oracle\
  \ 提供了一套强大的方法，可将表和索引拆分为更小的子集。例如，您可以按日期范围（如按月或按年）划分表数据。表 15-2 概述了多种可用的分区策略。\n\n**表\
  \ 15-2.** 分区策略\n\n| 分区类型 | 描述 |\n| :--- | :--- |\n| 范围分区 | 允许基于日期、数字或字符的范围进行分区。\
  \ |\n| 列表分区 | 当分区值可明确归类为特定列表（如州/省或区域代码）时非常适用。 |\n| 哈希分区 | 在无明显分区键时，可实现行的均匀分布。 |\n\
  | 复合分区 | 允许组合使用其他分区策略。 |\n| 间隔分区 | 扩展范围分区功能，当新分区键值超出当前最大范围时自动创建新分区。 |\n| 引用分区 |\
  \ 适用于基于父表列对子表进行分区。 |\n| 虚拟分区 | 允许基于虚拟列进行分区。 |\n| 系统分区 | 由插入数据的应用程序决定应使用的分区。 |\n\n\
  本章前几节将介绍 Oracle 提供的各类分区策略，后续章节则深入探讨多种分区维护操作。\n\n## 15-1. 判断表是否需要分区\n\n**问题**\n\n\
  您有一个大型表，不确定是否应对其进行分区。\n\n**解决方案**\n\n以下是判断表是否需要分区的经验准则：\n- 表大小超过 2GB\n- 表行数超过 1000\
  \ 万，且随着数据增长 SQL 操作速度持续下降\n\n\n\n- 如果你预知表将会变得很大，最好在创建表时就将其设置为分区表，而不是等到表增长导致性能下降时再重新构建为分区表\n\
  \n- 行的划分方式应便于并行操作，例如加载、归档、检索或备份与恢复\n\n一条通用规则是：任何超过 2 GB 的表都是潜在的候选分区表。\n\n运行此查询以显示数据库中占用空间最大的前几个对象：\n\
  \n```sql\nselect * from (\nselect owner, segment_name, segment_type, sum(extents)\
  \ num_ext, sum(bytes) tot from dba_segments\ngroup by owner, segment_name, segment_type\
  \ order by sum(extents) desc) where rownum < 10;\n```\n\n以下是该查询的部分输出结果：\n\n```\n\
  OWNER SEGMENT_NAME SEGMENT_TYPE NUM_EXT TOT\n--------------- ---------------------\
  \ --------------- ---------- ----------\nREP_MV REG_QUEUE_REP TABLE 6273 6577717248\n\
  CIA_STAR F_DOWNLOADS_IDX1 INDEX 2927 3069181952\nREP_MV CWP_USER_PROFILE TABLE 2332\
  \ 2445279232\n```\n\n输出显示该数据库中存在可能受益于分区的大型表。\n\n除了查看对象大小之外，如果你能将数据划分得有利于操作，例如加载数据、查询、备份、归档和删除，那么你应该考虑使用分区。例如，如果你处理一个大型表，其中包含的数据经常通过特定的时间范围（如天、周、月或年）来访问，那么考虑分区是合理的。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n#### 第 15 章：分区\n\n## 工作原理\n\
  \n表尺寸大，加上充分的业务理由，意味着你应该考虑分区。请记住，对表进行分区会有更多的设置和维护工作。然而，在初始设置时进行分区，要比等到表增长到难以管理的大小后再尝试转换容易得多。\n\
  \n`注意` 目前，分区是一项需要额外付费的选项，仅在 Oracle 企业版中可用。你必须根据业务需求自行决定分区是否值得付出这个成本。\n\n##### 15-2.\
  \ 按范围分区\n\n### 问题\n\n你工作在一个采用星型模式的数据仓库环境中。你有一个事实表，其中包含一个表示日期的数字列。例如，值 `20100101`\
  \ 代表 2010 年 1 月 1 日。\n\n你想基于这个数字列对事实表进行分区。\n\n### 解决方案\n\n使用 `PARTITION BY RANGE`\
  \ 子句按范围对表进行分区。以下示例根据数字范围创建了三个分区：\n\n```sql\ncreate table f_regs\n(reg_count number\n\
  ,d_date_id number\n)\npartition by range (d_date_id)(\npartition p_2009 values less\
  \ than (20100101),\npartition p_2010 values less than (20110101),\npartition p_max\
  \ values less than (maxvalue)\n);\n```\n\n你可以通过运行以下查询查看有关分区表的信息：\n\n```sql\nselect\
  \ table_name,partitioning_type,def_tablespace_name from user_part_tables;\n```\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n#### 第 15 章：分区\n\n以下是部分输出结果：\n\
  \n```\nTABLE_NAME PARTITION DEF_TABLESPACE_NAME\n-------------------- ---------\
  \ -------------------------\nF_REGS RANGE USERS\n```\n\n要查看表内分区的信息，可以执行如下查询：\n\n\
  ```sql\nselect table_name, partition_name, high_value from user_tab_partitions;\n\
  ```\n\n以下是一些示例输出：\n\n```\nTABLE_NAME PARTITION_NAME HIGH_VALUE\n--------------------\
  \ ------------------------------ ---------------\nF_REGS P_2009 20100101\nF_REGS\
  \ P_2010 20110101\nF_REGS P_MAX MAXVALUE\n```\n\n### 工作原理\n\n`PARTITION BY RANGE`\
  \ 子句使用一个分区列（也称为分区键）来确定一行将被插入到哪个分区。在本方案中，`D_DATE_ID` 列是分区列。\n\n`VALUES LESS THAN`\
  \ 子句创建了分区界限，定义了行将被插入到哪个分区。例如，分区键值为 `20100202` 的行将被插入到 `P_2010` 分区（`P_2010` 分区的高值定义为\
  \ `20110101`）。\n\n\n\n"
- "# 第 15 章 分区\n\n## MAXVALUE 参数与智能代理键\n\n`MAXVALUE` 参数用于创建一个分区，以存储不符合其他已定义分区范围的行。您不必指定\
  \ `MAXVALUE`。但是，如果您尝试插入一个不符合现有分区范围的值，系统将抛出错误。\n\n您可能已经注意到，在 `F_REGS` 表中，我们将 `D_DATE_ID`\
  \ 列用作数字数据类型，而非日期数据类型。`D_DATE_ID` 是一个从 `D_DATES` 维度表指向 `F_REGS` 事实表的外键。数据仓库环境中采用的一种技术是在\
  \ `D_DATES` 维度的主键上使用**智能代理键**。对于日期使用智能键的主要原因在于物理数据库设计，特别是当您希望基于日期字段进行范围分区时。这允许您在外键数字（看起来像一个日期）上进行分区。\n\
  \n##### 15-3. 按列表分区\n\n### 问题\n\n您希望根据列表中的值（例如州代码列表）对表进行分区。\n\n### 解决方案\n\n使用 `CREATE\
  \ TABLE` 语句的 `PARTITION BY LIST` 子句。此示例按 `STATE_CODE` 列进行分区：\n\n```sql\ncreate table\
  \ f_sales\n(\n reg_sales number\n,d_date_id number\n,state_code varchar2(20)\n)\n\
  partition by list (state_code)\n(\n partition reg_west values ('AZ','CA','CO','MT','OR','ID','UT','NV')\n\
  ,partition reg_mid values ('IA','KS','MI','MN','MO','NE','OH','ND')\n,partition\
  \ reg_rest values (default)\n);\n```\n\n### 工作原理\n\n列表分区表的分区键只能是一列。使用 `DEFAULT`\
  \ 列表来指定一个分区，用于存储其值不匹配列表中任何值的行。运行此 SQL 语句可查看每个分区的列表值：\n\n```sql\nselect table_name,\
  \ partition_name, high_value\nfrom user_tab_partitions\norder by 1;\n```\n\n`HIGH_VALUE`\
  \ 列将显示为每个分区定义的列表值。此列的数据类型为 `LONG`。如果您使用 `SQL*Plus`，可能需要将 `LONG` 变量的值设置得比默认值（80 字节）更高，以显示该列的全部内容：\n\
  \n```sql\nSQL> set long 1000\n```\n\n##### 15-4. 按哈希分区\n\n### 问题\n\n您有一个表，其中没有包含明显的列可以进行范围或列表分区。您希望根据表中的一个\
  \ ID 列将数据均匀地分散到各个分区中。\n\n### 解决方案\n\n使用 `CREATE TABLE` 语句的 `PARTITION BY HASH` 子句。此示例创建一个表，该表被划分为三个分区，每个分区位于自己的表空间中。\n\
  \n```sql\ncreate table browns(\n brown_id number\n,bear_name varchar2(30))\npartition\
  \ by hash(brown_id)\npartitions 3\nstore in(tbsp1, tbsp2, tbsp3);\n```\n\n当然，您需要修改表空间名称等细节以匹配您环境中的名称。或者，您可以省略\
  \ `STORE IN` 子句，Oracle 会将所有分区放置在您的默认表空间中。如果您想同时为表空间和分区命名，可以按如下方式指定：\n\n```sql\n\
  create table browns(\n brown_id number\n,bear_name varchar2(30))\npartition by hash(brown_id)\n\
  (\n partition p1 tablespace tbsp1\n,partition p2 tablespace tbsp2\n,partition p3\
  \ tablespace tbsp3\n);\n```\n\n### 工作原理\n\n哈希分区根据一种算法将行映射到分区，该算法会将数据均匀地分散到所有分区中。您无法控制哈希算法或\
  \ Oracle 分布数据的方式。\n\n您指定所需的分区数量，Oracle 会根据哈希键列将数据均匀划分。\n\n哈希分区具有一些有趣的性能影响。所有哈希键值相同的行将被插入到同一个分区中。这意味着插入操作特别高效，因为哈希算法确保了数据在各分区之间的均匀分布。此外，如果您通常针对特定的键值进行选择，Oracle\
  \ 只需访问一个分区即可检索这些行。\n\n[电子书下载](http://www.it-ebooks.info/)\n\n\n\n但是，如果按值范围进行搜索，Oracle\
  \ 很可能需要扫描每个分区来确定要检索的行。因此，范围搜索在哈希分区表中可能表现不佳。\n\n##### 15-5. 以多种方式对表进行分区\n\n### 问题\n\
  \n你有一个表，想按数字范围对其进行分区，但你还希望按区域列表对每个分区进行进一步细分。\n\n### 解决方案\n\n使用组合分区来指示 Oracle 以多种方式对表进行分区。以下示例首先按数字范围对表进行分区，然后通过列表分区进一步分发数据：\n\
  \n```sql\ncreate table f_sales(\n  sales_amnt number\n ,reg_code varchar2(3)\n ,d_date_id\
  \ number\n)\npartition by range(d_date_id)\nsubpartition by list(reg_code)\n(partition\
  \ p2010 values less than (20100101)\n (subpartition p1_north values ('ID','OR')\n\
  \  ,subpartition p1_south values ('AZ','NM')\n ),\n partition p2011 values less\
  \ than (20110101)\n (subpartition p2_north values ('ID','OR')\n  ,subpartition p2_south\
  \ values ('AZ','NM')\n )\n);\n```\n\n你可以通过运行以下查询来查看子分区信息：\n\n```sql\nselect table_name,\
  \ partitioning_type, subpartitioning_type\nfrom user_part_tables;\n```\n\n以下是一些示例输出：\n\
  \n```\nTABLE_NAME           PARTITIONING_TYPE    SUBPARTITIONING_TYPE\n--------------------\
  \ -------------------- ---------------------\nF_SALES              RANGE       \
  \         LIST\n```\n\n运行下一个查询以查看有关子分区的信息：\n\n```sql\nselect table_name, partition_name,\
  \ subpartition_name\nfrom user_tab_subpartitions;\n```\n\n以下是部分输出内容：\n\n```\nTABLE_NAME\
  \           PARTITION_NAME       SUBPARTITION_NAME\n-------------------- --------------------\
  \ --------------------\nF_SALES              P2010                P1_SOUTH\nF_SALES\
  \              P2010                P1_NORTH\nF_SALES              P2011       \
  \         P2_SOUTH\nF_SALES              P2011                P2_NORTH\n```\n\n\
  第 15 章 ■ 分区\n\n### 工作原理\n\nOracle 允许你组合两种分区策略，如下所示：\n\n- 范围-范围分区\n- 范围-哈希分区\n- 范围-列表分区\n\
  - 列表-范围分区\n- 列表-哈希分区\n- 列表-列表分区\n\n组合分区在数据划分方式上提供了极大的灵活性。你可以使用这些方法来进一步细化数据的分布和维护方式。\n\
  \n##### 15-6. 按需创建分区\n\n### 问题\n\n你有一个范围分区表，并希望当插入的值高于为最高范围定义的最高值时，Oracle 能够自动添加一个分区。\n\
  \n### 解决方案\n\n如果你使用的是 Oracle Database `11g` 或更高版本，可以使用 `CREATE TABLE` 语句的 `INTERVAL`\
  \ 子句来指示 Oracle 自动向范围分区表的高端添加分区。\n\n此示例创建了一个表，该表最初有一个分区，其高值范围为 2010 年 1 月 1 日。\n\n\
  ```sql\ncreate table f_sales(\n  sales_amt number\n ,d_date date\n)\npartition by\
  \ range (d_date)\ninterval(numtoyminterval(1, 'YEAR'))\n(partition p1 values less\
  \ than (to_date('01-jan-2010','dd-mon-yyyy')));\n```\n\n此示例中的间隔为 1 年，由 `INTERVAL(NUMTOYMINTERVAL(1,\
  \ 'YEAR'))` 子句定义。\n\n如果向表中插入的记录的 `D_DATE` 值大于或等于 2010 年 1 月 1 日，Oracle 将自动在表的高端添加一个新分区。你可以通过运行此\
  \ SQL 语句来检查分区的详细信息：\n\n```sql\nselect table_name, partition_name, partition_position,\
  \ high_value\nfrom user_tab_partitions order by table_name, partition_name;\n```\n\
  \n以下是一些示例输出（`HIGH_VALUE` 列已被截短以便输出适应页面）：\n\n```\nTABLE_NAME           PARTITION_NAME\
  \       PARTITION_POSITION   HIGH_VALUE\n----------           ------------     \
  \    -------------------- ----------\nF_SALES              P1                  \
  \ 1                    TO_DATE(' 2010-01-01 00:00:00',...\n```\n\n现在，我们插入一些高于最高分区高值的数据：\n\
  \n```sql\ninsert into f_sales values(1,sysdate+1000);\n```\n\n这是现在从 `USER_TAB_PARTITIONS`\
  \ 选择后显示的输出：\n\n```\nTABLE_NAME           PARTITION_NAME       PARTITION_POSITION\
  \   HIGH_VALUE\n----------           ------------         -------------------- ----------\n\
  ```\n\n\n\n"
- "# 第 15 章 ■ 分区\n\n## 15-7. 基于引用约束进行分区\n\n### 问题描述\n\n你有一个父表 `ORDERS` 和一个子表 `ORDER_ITEMS`，它们通过\
  \ `ORDER_ID` 列上的主键和外键约束相关联。父表 `ORDERS` 在 `ORDER_DATE` 列上进行了分区。尽管子表 `ORDER_ITEMS`\
  \ 不包含 `ORDER_DATE` 列，但你是否可以将其分区，使其记录以与父表 `ORDERS` 相同的方式分布？\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 解决方案\n\n如果你使用的是 Oracle Database 11 *g* 或更高版本，可以使用 `PARTITION BY REFERENCE`\
  \ 子句来指定子表应与其父表以相同的方式进行分区。以下示例创建了一个在 `ORDER_ID` 上有主键约束、在 `ORDER_DATE` 上有范围分区的父表：\n\
  \n```sql\ncreate table orders(\n    order_id number\n    ,order_date date\n    ,constraint\
  \ order_pk primary key(order_id)\n)\npartition by range(order_date)\n(\n    partition\
  \ p10 values less than (to_date('01-jan-2010','dd-mon-yyyy'))\n    ,partition p11\
  \ values less than (to_date('01-jan-2011','dd-mon-yyyy'))\n    ,partition pmax values\
  \ less than (maxvalue)\n);\n```\n\n接着创建子表 `ORDER_ITEMS`。它通过将外键约束命名为引用对象来进行分区：\n\n\
  ```sql\ncreate table order_items(\n    line_id number\n    ,order_id number not\
  \ null\n    ,sku number\n    ,quantity number\n    ,constraint order_items_pk primary\
  \ key(line_id, order_id)\n    ,constraint order_items_fk1 foreign key (order_id)\
  \ references orders\n)\npartition by reference (order_items_fk1);\n```\n\n请注意，外键列\
  \ `ORDER_ID` 必须定义为 `NOT NULL`。外键列必须被启用并强制执行。\n\n### 工作原理\n\n从 Oracle Database 11\
  \ *g* 开始，你可以通过引用进行分区。这允许子表继承其父表的分区策略。任何父表的分区维护操作也会应用于子记录表。\n\n在引入引用分区功能之前，你必须在子表中物理复制并维护父表列，这不仅需要更多的磁盘空间，而且在维护分区时也容易出错。\n\
  \n在创建引用分区的子表时，如果你没有显式命名子表分区，默认情况下，Oracle 将使用与父表相同的分区名称为子表创建分区。以下示例显式命名了子表的引用分区：\n\
  \n```sql\ncreate table order_items(\n    line_id number\n    ,order_id number not\
  \ null\n    ,sku number\n    ,quantity number\n    ,constraint order_items_pk primary\
  \ key(line_id, order_id)\n    ,constraint order_items_fk1 foreign key (order_id)\
  \ references orders\n)\npartition by reference (order_items_fk1)\n(\n    partition\
  \ c10\n    ,partition c11\n    ,partition cmax\n);\n```\n\n你不能指定引用表的分区范围。除非你为子分区指定表空间，否则引用表的分区将在与父分区相同的表空间中创建。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n---\n\n**注意**  \n在间隔分区中，你只能从表中指定单个键列，并且该列必须是\
  \ `DATE` 或 `NUMBER` 数据类型。\n\n---\n\n### 间隔分区（Interval Partitioning）\n\n分区示例数据：\n\
  ```text\nF_SALES P1 1 TO_DATE(' 2010-01-01 00:00:00',...\nF_SALES SYS_P93 2 TO_DATE('\
  \ 2013-01-01 00:00:00',...\n```\n自动创建了一个名为 `SYS_P93` 的分区，其上限值为 `2013-01-01`。\n\n\
  ### 工作原理（间隔分区）\n\n从 Oracle Database 11 *g* 开始，你可以指示 Oracle 自动向范围分区表添加分区。间隔分区指示 Oracle\
  \ 在插入的数据超出范围分区表的最大界限时动态创建一个新分区。新添加的分区基于你指定的间隔。\n\n## 15-8. 在虚拟列上进行分区\n\n### 问题描述\n\
  \n你已在表中定义了一个虚拟列。你想基于该虚拟列对表进行分区。\n\n### 解决方案\n\n\n\n"
- '# 第 15 章 ■ 分区技术


  ## 15-9\. 应用程序控制的分区


  ### 问题


  在一种罕见的情况下，你可能希望向表中插入记录的应用程序能够显式地控制数据插入到哪个分区。


  ### 解决方案


  如果你使用的是 Oracle Database 11g 或更高版本，可以使用 `PARTITION BY SYSTEM` 子句，允许 `INSERT` 语句指定要插入数据的分区。下面的示例创建了一个包含三个分区的系统分区表：


  ```sql

  create table apps

  (app_id number

  ,app_amnt number)

  partition by system

  (partition p1

  ,partition p2

  ,partition p3);

  ```


  向此表插入数据时，必须指定一个分区。以下代码将一条记录插入分区 `P1`：


  ```sql

  insert into apps partition(p1) values(1,100);

  ```


  当执行更新或删除操作时，如果没有指定分区，Oracle 将扫描系统分区表的所有分区以查找相关行。因此，为了避免性能低下，在更新和删除时你应该指定一个分区。


  ### 工作原理


  自 Oracle Database 11g 起，你可以创建系统分区。系统分区表适用于需要显式控制记录插入到哪个分区的*特殊情况*。这允许你的应用程序代码来管理记录在分区间的分布。我们建议，只有在无法使用
  Oracle 的其他分区机制来满足你的业务需求时，才使用此功能。


  ## 15-10\. 使用表空间配置分区


  ### 问题


  你想将表的每个分区放置在各自的表空间中。这将便于执行诸如独立备份和恢复各个分区的操作。


  ### 解决方案


  如果在创建分区表或索引时没有指定表空间，分区将在你的默认表空间中创建。如果你希望将每个分区放在自己的表空间中，请使用 `TABLESPACE` 子句。当然，在
  `CREATE TABLE` 语句中引用表空间之前，你必须预先创建它们：


  ```sql

  create table f_regs

  (reg_count number

  ,d_date_id number

  )

  partition by range (d_date_id)(

  partition p_2009 values less than (20100101)

  tablespace p_2009_tbsp,

  partition p_2010 values less than (20110101)

  tablespace p_2010_tbsp,

  partition p_max values less than (maxvalue)

  tablespace p_max_tbsp

  );

  ```




  '
- '# 第十五章 ■ 分区


  你还可以指定任何其他存储设置。下一个示例显式设置了 `PCTFREE`、`PCTUSED` 和 `NOLOGGING` 子句：


  ```sql

  create table f_regs

  (reg_count number

  ,d_date_id number

  )

  partition by range (d_date_id)(

  partition p_2009 values less than (20100101)

  tablespace p_2009_tbsp pctfree 5 pctused 90 nologging,

  partition p_2010 values less than (20110101)

  tablespace p_2010_tbsp pctfree 5 pctused 90 nologging,

  partition p_max values less than (maxvalue)

  tablespace p_max_tbsp pctfree 5 pctused 90 nologging

  );

  ```


  ## 工作原理


  将分区放置在独立表空间的一个优点是，你可以独立地备份和恢复分区。如果某个分区未被修改，你可以将其表空间更改为只读，并指示像 `Oracle Recovery Manager`
  (`RMAN`) 这样的实用程序跳过备份此类表空间，从而提高备份性能。还有其他优点。在各自的表空间中创建每个分区有助于将数据从 `OLTP` 数据库移动到 `DSS`（决策支持系统）数据库，并且它允许将特定的表空间及相应的数据文件放置在独立的存储设备上，以提高可扩展性和性能。


  如果你已经创建了一个表，并希望将其分区移动到特定的表空间，请使用 `ALTER TABLE...MOVE PARTITION` 语句将表分区重新定位到不同的表空间。此示例将
  `P_2009` 分区移动到 `INV_MGMT_DATA` 表空间：


  ```sql

  alter table f_sales move partition p_2009 tablespace inv_mgmt_data;

  ```


  当你将表分区移动到不同的表空间时，索引将失效。因此，你必须重建与已移动表分区关联的任何本地索引。


  重建索引时，你可以将其保留在原处，也可以将其移动到不同的表空间。此示例重建 `D_DATE_ID_FK1` 索引的 `P_2009` 分区，并将其移动到 `INV_MGMT_INDEX`
  表空间：


  ```sql

  alter index d_date_id_fk1 rebuild partition p_2009 tablespace inv_mgmt_index;

  ```


  当你将表分区移动到不同的表空间时，会导致表分区中每条记录的 `ROWID` 发生变化。由于常规索引在其结构中存储了表 `ROWID`，如果表分区移动，索引分区将失效。在这种情况下，你必须重建索引。


  重建索引分区时，你可以选择将其移动到不同的表空间。


  ## 15-11\. 自动移动更新后的行


  ### 问题


  你尝试将分区键更新为一个会导致该行属于不同分区的值：


  ```sql

  update f_regs set d_date_id = 20100901 where d_date_id = 20090201;

  ```


  你收到以下错误：


  `ORA-14402: updating partition key column would cause a partition change`


  你想知道是否有办法修改表，使得当分区键的更改需要将行移动到不同的分区时，Oracle 会直接移动该行。


  ### 解决方案


  使用 `ALTER TABLE` 语句的 `ENABLE ROW MOVEMENT` 子句，以允许更新分区键（该更新会改变一个值所属的分区）。在此示例中，首先修改
  `F_REGS` 表以启用行移动：


  ```sql

  alter table f_regs enable row movement;

  ```


  现在你应该能够将分区键更新为一个将行移动到不同段的值。你可以通过查询 `USER_TABLES` 视图的 `ROW_MOVEMENT` 列来验证行移动是否已启用：


  ```sql

  select row_movement from user_tables where table_name=''F_REGS'';

  ```


  你应该看到值为 `ENABLED`：


  `ROW_MOVE`

  `---------`

  `ENABLED`


  ### 工作原理


  在你能够将分区键更新为一个需要将行移动到不同分区的值之前，你需要启用行移动。这允许 Oracle 在物理上将行移动到不同的数据块。


  要禁用行移动，请使用 `DISABLE ROW MOVEMENT` 子句：



  '
- "# 第 15 章 ■ 分区\n\n##### 15-12. 对现有表进行分区\n\n### 问题\n\n你有一个表已经变得很大，且当前未分区。你想知道是否可以对它进行分区。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 解决方案\n\n有几种方法可以将非分区表转换为分区表。本解决方案展示一种简单的方法，步骤如下：\n\
  \n1.  使用 `CREATE TABLE <新表名>...AS SELECT * FROM <旧表名>` 从旧表创建一个新的分区表。\n2.  删除或重命名旧表。\n\
  3.  将步骤 1 中创建的表重命名为被删除的旧表名。\n\n在此示例中，我们首先使用 `CREATE TABLE` 语句从旧的、名为 `F_REGS` 的非分区表创建一个名为\
  \ `F_REGS_NEW` 的新分区表：\n\n```sql\ncreate table f_regs_new\npartition by range (d_date_id)\n\
  (partition p2008 values less than(20090101),\npartition p2009 values less than(20100101),\n\
  partition pmax values less than(maxvalue)\n)\nnologging\nas select * from f_regs;\n\
  ```\n\n现在，你可以删除（或重命名）旧的非分区表，并将新的分区表重命名为旧表名：\n\n```sql\ndrop table f_regs purge;\n\
  rename f_regs_new to f_regs;\n```\n\n最后，为新表重建所有约束、授权、索引和统计信息。你现在应该拥有一个替换了旧的非分区表的新分区表。\n\
  \n如果原始表包含许多约束、授权和索引，对于最后一步，你可能希望使用 Data Pump `EXPDP` 或 `EXP` 导出不含数据的原始表，然后在创建新表后，使用\
  \ Data Pump `IMPDP` 或 `IMP` 在新表上创建约束、授权、索引和统计信息。\n\n### 工作原理\n\n将表从非分区转换为分区可能是一个耗时的过程。在解决方案部分，我们展示了一种简单的表转换方法。表\
  \ 15-3 列出了从非分区表创建分区表的各种技术的优缺点。毫无疑问，你需要仔细规划并测试你的转换过程。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**表 15-3. 转换非分区表的方法**\n\n| **转换方法** | **优点** | **缺点** |\n| :--- | :--- | :---\
  \ |\n| `CREATE <新分区表> AS SELECT * FROM <旧表>` | 简单，可使用 `NOLOGGING` 和 `PARALLEL` 选项。直接路径加载。\
  \ | 需要同时容纳新旧表的空间。 |\n| `INSERT /*+ APPEND */ INTO <新分区表> SELECT * FROM <旧表>` | 快速、简单。直接路径加载。\
  \ | 需要同时容纳新旧表的空间。 |\n| Data Pump `EXPDP` 旧表，`IMPDP` 新表（或对于旧版 Oracle 使用 `EXP` 和 `IMP`）\
  \ | 快速，所需空间较少。处理了授权、权限等。可按分区通过过滤条件进行加载。 | 因为需要使用工具而更复杂。 |\n| 创建分区表 `<新分区表>`，与旧表\
  \ `<旧表>` 交换分区 | 潜在停机时间更少。 | 步骤多，复杂。 |\n| 使用 `DBMS_REDEFINITION` 包（较新版本的 Oracle）\
  \ | 在线转换现有表。 | 步骤多，复杂。 |\n| 创建 CSV 文件或外部表，使用 SQL*Loader 加载 `<新分区表>` | 可按分区进行加载。\
  \ | 步骤多，复杂。 |\n\n##### 15-13. 向分区表添加分区\n\n### 问题\n\n你有一个已经分区的表，但你想向该表添加另一个分区。\n\n\
  ### 解决方案\n\n解决方案取决于你实现的分区类型。对于范围分区表，如果表的最高界限未定义 `MAXVALUE`，你可以使用 `ALTER TABLE...ADD\
  \ PARTITION` 语句向表的高端添加分区。此示例向范围分区表的高端添加一个分区：\n\n```sql\nalter table f_regs add partition\
  \ p2011 values less than (20120101)\npctfree 5 pctused 95 tablespace p_tbsp;\n```\n\
  \n如果你有一个高范围以 `MAXVALUE` 限定的范围分区表，则无法添加分区。在这种情况下，你必须拆分一个现有分区（详见配方 15-16）。\n\n对于哈希分区表，使用\
  \ `ADD PARTITION` 子句添加分区，如下所示：\n\n```sql\nalter table browns add partition new_part\
  \ tablespace p_tbsp update indexes;\n```\n\n如果你未指定 `UPDATE INDEXES` 子句，哈希分区表上新分区的任何全局索引和本地索引都需要重建。\n\
  \n对于列表分区表，只有在未定义 `DEFAULT` 分区的情况下，你才能添加新分区。下一个示例向列表分区表添加一个分区：\n\n```sql\nalter table\
  \ f_sales add partition reg_east values('GA');\n```\n\n### 工作原理\n\n向表添加分区后，务必检查索引以确保它们都仍处于可用状态\
  \ (`USABLE`)：\n\n```sql\nselect index_name, partition_name, status from user_ind_partitions;\n\
  ```\n\n考虑在执行维护操作时使用 `ALTER TABLE` 语句的 `UPDATE INDEXES` 子句来自动重建索引。在某些情况下，你可能无法使用\
  \ `UPDATE INDEXES` 子句，而将不得不重建任何不可用的索引。我们强烈建议你始终在非生产数据库中测试维护操作，以确定任何不可预见的副作用。\n\n\
  ##### 15-14. 将分区与现有表交换\n\n### 问题\n\n你已经将数据加载到一个临时表（staging table）中。现在你想将该表作为分区表的一个分区。\n\
  \n### 解决方案\n\n使用分区交换功能将独立表与表分区交换。一个简单的示例将说明该过程。假设你创建了一个范围分区表，如下所示：\n\n```sql\ncreate\
  \ table f_sales\n(sales_amt number, d_date_id number)\npartition by range (d_date_id)\n\
  (partition p_2007 values less than (20080101),\npartition p_2008 values less than\
  \ (20090101),\npartition p_2009 values less than (20100101)\n);\n```\n\n并且，在 `D_DATE_ID`\
  \ 列上创建了一个位图索引：\n\n```sql\ncreate bitmap index d_date_id_fk1 on\nf_sales(d_date_id)\
  \ local;\n```\n\n现在向表中添加一个新分区以存储新数据：\n\n```sql\nalter table f_sales add partition\
  \ p_2010\nvalues less than(20110101);\n```\n\n接下来，创建一个临时表并插入属于新添加分区值范围的数据：\n\n```sql\n\
  create table workpart(sales_amt number, d_date_id number);\ninsert into workpart\
  \ values(100,20100101);\ninsert into workpart values(120,20100102);\n```\n\n在 `WORKPART`\
  \ 表上创建一个与 `F_SALES` 上的位图索引结构匹配的位图索引：\n\n```sql\ncreate bitmap index d_date_id_fk2\
  \ on workpart(d_date_id);\n```\n\n现在交换 `WORKPART` 表与 `P_2010` 分区：\n\n```sql\nalter\
  \ table f_sales exchange partition p_2010\nwith table workpart including indexes\
  \ without validation;\n```\n\n快速查询 `F_SALES` 表可验证分区已成功交换：\n\n```sql\nselect * from\
  \ f_sales partition(p_2010);\n```\n\n输出如下：\n\n```\nSALES_AMT D_DATE_ID\n----------\
  \ ----------\n       100 20100101\n       120 20100102\n```\n\n此查询将显示所有索引仍可用：\n\n\
  ```sql\nselect index_name, partition_name, status from user_ind_partitions;\n```\n\
  \n你还可以验证是否为新区创建了本地索引段：\n\n```sql\nselect segment_name,segment_type,partition_name\n\
  from user_segments\nwhere segment_name IN('F_SALES','D_DATE_ID_FK1');\n```\n\n输出如下：\n\
  \n```\nSEGMENT_NAME       SEGMENT_TYPE       PARTITION_NAME\n--------------------\
  \ -------------------- --------------------\nD_DATE_ID_FK1       INDEX PARTITION\
  \    P_2007\nD_DATE_ID_FK1       INDEX PARTITION    P_2008\nD_DATE_ID_FK1      \
  \ INDEX PARTITION    P_2009\nD_DATE_ID_FK1       INDEX PARTITION    P_2010\nF_SALES\
  \             TABLE PARTITION    P_2007\nF_SALES             TABLE PARTITION   \
  \ P_2008\nF_SALES             TABLE PARTITION    P_2009\nF_SALES             TABLE\
  \ PARTITION    P_2010\n```\n\n### 工作原理\n\n\n"
- "# 第 15 章 ■ 分区\n\n## 15-14. 交换分区\n\n交换分区是一项强大的功能。它允许你将现有表的分区提取出来，使其成为一个独立的表；同时，也能将一个独立的表并入成为分区表的一部分。当你交换一个分区时，Oracle\
  \ 只是简单地更新数据字典中的条目来执行交换操作。\n\n当你使用 `WITHOUT VALIDATION` 子句来交换分区时，你是在指示 Oracle 不验证传入的分区（或子分区）中的行是否是所定义范围的有效条目。\n\
  \n这样做的好处是使得交换操作非常快速，因为 Oracle 只是通过更新数据字典中的指针来执行交换操作。如果你使用了 `WITHOUT VALIDATION`，你需要确保你的数据是准确的。\n\
  \n如果你为分区表定义了主键，那么被交换的表也必须定义有相同的主键结构。如果存在主键，`WITHOUT VALIDATION` 子句不会阻止 Oracle 强制执行唯一性约束。\n\
  \n##### 15-15. 重命名分区\n\n### 问题\n\n你想要重命名一个分区，使其符合你的命名标准。\n\n### 解决方案\n\n你可以重命名表分区和索引分区。此示例使用\
  \ `ALTER TABLE` 语句来重命名一个表分区：\n\n```sql\nalter table f_regs rename partition reg_p_1\
  \ to reg_part_1;\n```\n\n下一行代码使用 `ALTER INDEX` 语句来重命名一个索引分区：\n\n```sql\nalter index\
  \ f_reg_dates_fk1 rename partition reg_p_1 to reg_part_1;\n```\n\n### 工作原理\n\n有时需要重命名一个表分区或索引分区。例如，你可能想在删除一个分区之前先重命名它。此外，你可能希望重命名对象以使它们符合标准。在这些场景中，使用相应的\
  \ `ALTER TABLE` 或 `ALTER INDEX` 语句即可完成。你可以查询数据字典来验证有关已重命名对象的信息。此查询显示分区表的名称：\n\n\
  ```sql\nselect table_name,partition_name,tablespace_name from user_tab_partitions;\n\
  ```\n\n类似地，此查询显示分区索引的信息：\n\n```sql\nselect index_name,partition_name,status,high_value,tablespace_name\n\
  from user_ind_partitions;\n```\n\n##### 15-16. 拆分分区\n\n### 问题\n\n你已识别出一个包含过多行的分区。你想将该分区拆分成两个分区。\n\
  \n### 解决方案\n\n使用 `ALTER TABLE...SPLIT PARTITION` 语句来拆分一个现有分区。以下示例拆分了一个范围分区表中的分区：\n\
  \n```sql\nalter table f_regs split partition p2010 at (20100601)\ninto (partition\
  \ p2010_a, partition p2010) update indexes;\n```\n\n如果你没有指定 `UPDATE INDEXES`，你将需要重建与被拆分分区相关联的所有局部索引以及任何全局索引。你可以使用以下\
  \ SQL 验证索引的状态：\n\n```sql\nselect index_name, partition_name, status from user_ind_partitions;\n\
  ```\n\n下一个示例拆分一个列表分区。首先显示 `CREATE TABLE` 语句，以便你能看到列表分区最初是如何定义的：\n\n```sql\ncreate\
  \ table f_sales\n(reg_sales number\n,d_date_id number\n,state_code varchar2(20)\n\
  )\npartition by list (state_code)\n( partition reg_west values ('AZ','CA','CO','MT','OR','ID','UT','NV')\n\
  ,partition reg_mid values ('IA','KS','MI','MN','MO','NE','OH','ND')\n,partition\
  \ reg_rest values (default)\n);\n```\n\n接下来，拆分 `REG_MID` 分区：\n\n```sql\nalter table\
  \ f_sales split partition reg_mid values ('IA','KS','MI','MN') into (partition reg_mid_a,\n\
  partition reg_mid_b);\n```\n\n`REG_MID_A` 分区现在包含值 `IA`、`KS`、`MI` 和 `MN`，而 `REG_MID_B`\
  \ 则被分配了剩余的 `MO`、`NE`、`OH` 和 `ND` 值。\n\n### 工作原理\n\n拆分分区操作允许你从一个单独的分区创建出两个新的分区。每个新分区都有自己的段、物理属性和区。与原始分区关联的段会被删除。\n\
  \n\n\n##### 15-17. 合并分区\n\n## 问题\n\n你有两个分区，其中包含的数据不足以证明值得为它们保留单独的分区。你想将这两个分区合并为一个。\n\
  \n## 解决方案\n\n使用 `ALTER TABLE...MERGE PARTITIONS` 语句来合并分区。此示例将 `REG_P_1` 分区合并到 `REG_P_2`\
  \ 分区中：\n\n```sql\nalter table f_regs merge partitions reg_p_1, reg_p_2 into partition\
  \ reg_p_2;\n```\n\n在此示例中，分区是按日期范围组织的。合并后的分区将被定义为接受两个被合并分区中范围最高的行。任何本地索引也会被合并到新的单个分区中。\n\
  \n请注意，合并分区会使与被合并分区关联的任何本地索引失效。此外，表中存在的任何全局索引的所有分区都将被标记为不可用。你可以通过查询数据字典来验证分区索引的状态：\n\
  \n```sql\nselect index_name, partition_name, tablespace_name, high_value, status\n\
  from user_ind_partitions\norder by 1,2;\n```\n\n以下是一些示例输出，展示了分区合并后全局索引和本地索引的样子：\n\
  \n```\nINDEX_NAME       PARTITION_NAME   TABLESPACE_NAME  HIGH_VALUE   STATUS\n\
  ---------------- ---------------- ---------------- ------------ ----------\nF_GLO_IDX1\
  \       SYS_P680         IDX1                          UNUSABLE\nF_GLO_IDX1    \
  \   SYS_P681         IDX1                          UNUSABLE\nF_GLO_IDX1       SYS_P682\
  \         IDX1                          UNUSABLE\nF_LOC_FK1        REG_P_2     \
  \     USERS            20110101     UNUSABLE\nF_LOC_FK1        REG_P_3         \
  \ TBSP3            20120101     USABLE\n```\n\n合并分区时，你可以使用 `ALTER TABLE` 语句的 `UPDATE\
  \ INDEXES` 子句来指示 Oracle 自动重建任何关联的索引：\n\n```sql\nalter table f_regs merge partitions\
  \ reg_p_1, reg_p_2 into partition reg_p_2\ntablespace tbsp2\nupdate indexes;\n```\n\
  \n请记住，当你使用 `UPDATE INDEXES` 子句时，合并操作将花费更长时间。如果你想最小化合并操作时间，请不要使用此子句。相反，手动重建与合并分区关联的本地索引：\n\
  \n```sql\nalter table f_regs modify partition reg_p_2 rebuild unusable local indexes;\n\
  ```\n\n你可以使用 `ALTER INDEX...REBUILD PARTITION` 语句来重建全局索引的每个分区：\n\n```sql\nalter\
  \ index f_glo_idx1 rebuild partition sys_p680;\nalter index f_glo_idx1 rebuild partition\
  \ sys_p681;\nalter index f_glo_idx1 rebuild partition sys_p682;\n```\n\n## 原理说明\n\
  \n你可以使用 `ALTER TABLE...MERGE PARTITIONS` 语句来合并两个或多个分区。你合并到的目标分区名称可以是你要合并的其中一个分区的名称，也可以是一个全新的名称。\n\
  \n合并分区时，请确保重建与被合并分区关联的任何索引。你可以重建或重新创建任何失效的索引。重建索引可能是最简单的方法，因为你不需要重新创建索引所需的 DDL。\n\
  \n在合并两个（或更多）分区之前，请确保合并后的分区在其表空间中有足够的空间来容纳所有合并后的行。如果没有足够的空间，你将收到表空间无法扩展到必要大小的错误。\n\
  \n##### 15-18. 删除分区\n\n## 问题\n\n你有一些过时的数据。它包含在一个分区内，而你想删除该分区。\n\n## 解决方案\n\n首先确定要删除的分区的名称。运行以下查询以列出当前连接用户特定表的分区：\n\
  \n```sql\nselect segment_name, segment_type, partition_name\nfrom user_segments\n\
  where segment_name = upper('&table_name');\n```\n\n接下来，使用 `ALTER TABLE...DROP PARTITION`\
  \ 语句从表中删除一个分区。此示例从 `F_SALES` 表中删除 `P_2008` 分区：\n\n```sql\nalter table f_sales drop\
  \ partition p_2008;\n```\n\n你应该会看到以下消息：\n\n`Table altered.`\n\n如果要删除子分区，请使用 `DROP\
  \ SUBPARTITION` 子句：\n\n```sql\nalter table f_sales drop subpartition p2_south;\n\
  ```\n\n\n\n你可以查询 `USER_TAB_SUBPARTITIONS` 来确认子分区是否已被删除。\n\n### 注意\nOracle 不允许你删除复合分区表中的所有子分区。每个分区必须至少保留一个子分区。\n\
  \n### 工作原理\n当你删除一个分区时，没有恢复删除的操作。因此，在删除分区前，请确保你处于正确的环境并且确实需要删除它。如果你需要保留待删除分区中的数据，可以将该分区合并到另一个分区，而不是直接删除它。\n\
  \n你不能从哈希分区表中删除分区。对于哈希分区表，你必须合并分区来移除一个。同样，你不能显式地从引用分区表中删除分区。当父表的分区被删除时，它也会从相应的子引用分区表中删除。\n\
  \n## 15-19. 从分区中删除行\n### 问题\n你想高效地删除一个分区中的所有记录。\n\n### 解决方案\n首先，确定你想要删除记录的分区的名称。\n\
  \n```sql\nselect segment_name, segment_type, partition_name\nfrom user_segments\n\
  where partition_name is not null;\n```\n\n使用 `ALTER TABLE...TRUNCATE PARTITION`\
  \ 语句来删除分区中的所有记录。此示例截断了 `F_SALES` 表的 `P_2008` 分区：\n\n```sql\nalter table f_sales\
  \ truncate partition p_2008;\n```\n\n你应该会看到以下消息：\n\n```\nTable truncated.\n```\n\
  \n在此场景下，该消息并不意味着整个表被截断了。它只是确认指定的分区已被截断。\n\n### 工作原理\n截断分区是快速删除大量数据的一种高效方法。然而，当你截断一个分区时，没有回滚机制。截断操作会从分区中永久删除数据。\n\
  \n如果你需要能够回滚事务的选项，请使用 `DELETE` 语句：\n```sql\ndelete from f_sales partition(p2008);\n\
  ```\n\n这种方法的缺点是，如果你有数百万条记录，`DELETE` 操作可能会运行很长时间。此外，对于大量记录，`DELETE` 会生成大量的回滚信息。这可能会给竞争资源的其他\
  \ SQL 语句带来性能问题。\n\n##### 15-20. 为分区生成统计信息\n### 问题\n你刚刚将数据加载到单个分区中，需要生成统计信息以反映新插入的数据。\n\
  \n### 解决方案\n使用 `EXECUTE` 语句运行 `DBMS_STATS` 包来为特定分区生成统计信息。\n\n在此示例中，所有者是 `STAR`，表是\
  \ `F_SALES`，正在分析的分区是 `P_2009`：\n```sql\nexec dbms_stats.gather_table_stats(ownname=>'STAR',-\n\
  \                                   tabname=>'F_SALES',-\n                     \
  \              partname=>'P_2009');\n```\n\n如果你正在处理一个大型分区，你可能需要指定百分比抽样大小、并行度，并为任何索引也生成统计信息：\n\
  ```sql\nexec dbms_stats.gather_table_stats(ownname=>'STAR',-\n                 \
  \                  tabname=>'F_SALES',-\n                                   partname=>'P_2009',-\n\
  \                                   estimate_percent=>dbms_stats.auto_sample_size,-\n\
  \                                   degree=>dbms_stats.auto_degree,-\n         \
  \                          cascade=>true);\n```\n\n### 工作原理\n对于分区表，你可以在单个分区或整个表上生成统计信息。我们建议每当分区内有大量数据发生变化时，就生成新的统计信息。你需要足够了解你的表和数据，以确定是否需要生成新的统计信息。\n\
  \n##### 15-21. 创建映射到分区的索引（本地索引）\n### 问题\n你发现查询分区表时经常在 `WHERE` 子句中使用分区键。你想提高查询的性能。\n\
  \n### 解决方案\n以下是创建简单分区表的 SQL：\n```sql\ncreate table f_regs(\n   reg_count number\n\
  \  ,d_date_id number\n)\npartition by range(d_date_id)\n   (partition p2009 values\
  \ less than (20100101) tablespace tbsp1\n   ,partition p2010 values less than (20110101)\
  \ tablespace tbsp2\n);\n```\n\n接下来，使用 `CREATE INDEX` 语句的 `LOCAL` 子句在分区表上创建本地索引：此示例在\
  \ `F_REGS` 表的 `D_DATE_ID` 列上创建了一个本地索引：\n```sql\ncreate index f_regs_dates_fk1 on\
  \ f_regs(d_date_id) local;\n```\n\n运行以下查询以查看有关分区索引的信息：\n```sql\nselect index_name,\
  \ table_name, partitioning_type\nfrom user_part_indexes;\n```\n以下是一些示例输出：\n\n```\n\
  INDEX_NAME                     TABLE_NAME           PARTITI\n------------------------------\
  \ -------------------- -------\nF_REGS_DATES_FK1               F_REGS          \
  \     RANGE\n```\n\n现在查询 `USER_IND_PARTITIONS` 表以查看有关本地分区索引的信息：\n```sql\nselect\
  \ index_name, partition_name, tablespace_name\nfrom user_ind_partitions;\n```\n\
  注意，已为表的每个分区创建了一个索引分区，并且索引是在与表分区相同的表空间中创建的：\n\n```\nINDEX_NAME           PARTITION_NAME\
  \       TABLESPACE_NAME\n-------------------- -------------------- --------------------\n\
  F_REGS_DATES_FK1     P2009                TBSP1\nF_REGS_DATES_FK1     P2010    \
  \            TBSP2\n```\n\n如果你想让本地索引分区创建在与表分区不同的表空间（或多个表空间）中，请在创建索引时指定这些表空间：\n```sql\n\
  create index f_regs_dates_fk1 on f_regs(d_date_id) local\n   (partition p2009 tablespace\
  \ idx1\n   ,partition p2010 tablespace idx2);\n```\n如果在构建本地分区索引时指定分区信息，则分区数必须与构建索引的表上的分区数相匹配。\n\
  \n### 工作原理\n本地分区索引的分区方式与其所基于的分区表的分区方式完全相同。每个表分区将有一个对应的索引，该索引仅包含该表分区的 `ROWID` 值和索引键值。换句话说，本地分区索引中的\
  \ `ROWID` 只指向其对应表分区中的行。\n\nOracle 保持本地索引分区与表分区同步。你不能显式地从本地索引中添加或删除分区。当你添加或删除表分区时，Oracle\
  \ 会自动为本地索引执行相应的工作。Oracle 管理本地索引分区，无论本地索引是如何分配到表空间的。\n\n本地索引在数据仓库和决策支持系统中很常见。如果你经常使用分区列进行查询，本地索引是合适的。这使得\
  \ Oracle 可以使用适当的索引和表分区来快速检索数据。\n\n有两种类型的本地索引：本地*前缀*索引和本地*非前缀*索引。本地前缀索引是指索引的最左列与表分区键匹配的索引。解决方案部分中的示例是一个本地前缀索引，因为其最左列\
  \ (`D_DATE_ID`) 也是表的分区键。\n\n非前缀本地索引是指其最左列与用于对相应表进行分区的分区键不匹配的索引。例如，这是一个本地非前缀索引：\n\
  ```sql\ncreate index f_regs_idx1 on f_regs(reg_count) local;\n```\n该索引按 `REG_COUNT`\
  \ 列分区，这不是表的分区键，因此是非前缀索引。你可以通过查询 `USER_PART_INDEXES` 中的 `ALIGNMENT` 列来验证索引是否被视为前缀索引：\n\
  ```sql\nselect index_name,table_name,alignment,locality\nfrom user_part_indexes;\n\
  ```\n以下是一些示例输出：\n\n```\nINDEX_NAME           TABLE_NAME           ALIGNMENT    \
  \ LOCALITY\n-------------------- -------------------- ------------ ----------\n\
  F_REGS_DATES_FK1     F_REGS               PREFIXED      LOCAL\nF_REGS_IDX1     \
  \     F_REGS               NON_PREFIXED  LOCAL\n```\n\n#### 第 15 章：分区\n\n你可能会问，为什么还要区分前缀索引和非前缀索引？本地的非前缀索引意味着索引定义中没有将分区键作为前导列。这可能会带来性能问题，因为使用非前缀索引进行范围扫描可能需要搜索每一个索引分区。如果分区数量很多，这可能导致性能低下。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n你可以通过将分区键列包含在索引定义的前导列中，将所有本地索引创建为前缀索引。例如，我们可以将\
  \ `F_REGS_IDX1` 索引创建为前缀索引，如下所示：\n```\ncreate index f_regs_idx2 on f_regs(d_date_id,reg_count)\
  \ local;\n```\n\n前缀索引一定比非前缀索引更好吗？这取决于你如何查询表。你需要为你使用的查询生成执行计划（explain plans），并检查前缀索引是否比非前缀索引能更好地利用分区裁剪（partition\
  \ pruning，即消除需要搜索的分区）。\n\n另外请记住，多列的前缀本地索引会比非前缀本地索引消耗更多的空间和资源。\n\n##### 15-22. 创建具有自身分区方案的索引（全局索引）\n\
  \n### 问题\n\n你通过一个非分区键列来查询分区表。你希望通过在该列上创建索引来提高性能。\n\n### 解决方案\n\n你可以创建一个基于范围分区的全局索引或基于哈希分区的全局索引。使用关键字\
  \ `GLOBAL` 来指定索引将采用与其对应表不同的分区策略来构建。在创建基于范围分区的全局索引时，必须始终指定 `MAXVALUE`。以下示例创建了一个基于范围的全局索引：\n\
  ```\ncreate index f_sales_gidx1 on f_sales(sales_id)\nglobal partition by range(sales_id)\n\
  (partition pg1 values less than (100)\n,partition pg2 values less than (200)\n,partition\
  \ pg3 values less than (maxvalue));\n```\n\n另一种类型的全局分区索引是基于哈希的。此示例创建了一个基于哈希分区的全局索引：\n\
  ```\ncreate index f_count_idx1 on f_regs(reg_count)\nglobal partition by hash(reg_count)\
  \ partitions 3;\n```\n\n### 工作原理\n\n与其基础表分区方式不同的索引被称为**全局索引**。全局索引中的一条记录可以指向其基础表的任何分区。全局索引可以在任何类型的分区表上创建。全局索引本身可以是基于范围或基于哈希进行分区的。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n通常，全局索引比本地索引更难维护。我们建议你尽量避免使用全局索引，并尽可能使用本地索引。全局索引没有自动维护机制（而本地索引有）。对于全局索引，你需要负责添加和删除索引分区。此外，对基础分区表的许多维护操作通常要求重建全局索引分区。以下对堆组织表的操作将使全局索引失效：\n\
  \n*   `ADD`（`HASH`）\n*   `COALESCE`（`HASH`）\n*   `DROP`\n*   `EXCHANGE`\n*   `MERGE`\n\
  *   `MOVE`\n*   `SPLIT`\n*   `TRUNCATE`\n\n在执行维护操作时，请考虑使用 `UPDATE INDEXES` 子句。这将使全局索引在操作期间保持可用，并消除了重建的需要。使用\
  \ `UPDATE INDEXES` 的缺点是，由于在操作过程中需要维护索引，维护操作将花费更长时间。\n\n全局索引对于通过索引检索少量行的查询很有用。在这些情况下，Oracle\
  \ 可以消除（裁剪）任何不必要的索引分区并高效地检索数据。例如，全局范围分区索引在需要高效访问单个记录的 OLTP 环境中非常有用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- '# 第 16 章


  ■ ■ ■


  大对象（LOBs）


  '
- "# 第 16 章 ■ 大对象（LOB）\n\n大对象，通常被称为 LOB，似乎是硬盘驱动器制造商的业务支柱。\n\n无论是图像、文字处理文档、视频片段、整部电影还是\
  \ XML 文档，大型对象经常出现在网站上，供*希望立即获取*的客户下载。\n\n将这些类型的对象存储在磁盘上只是故事的一半——它们还需要易于管理、组织和检索。大对象不仅需要能够轻松快速地访问，还需要进行备份，并与其关联的元数据保持一致。换句话说，具有高度冗余、可用性和可恢复性的\
  \ Oracle 数据库成为了存储大对象的理想平台。\n\n大对象有多种不同类型。字符大对象（CLOB）包含各种可能超过 4000 字符（`VARCHAR2`列的最大大小）的基于文本的对象。\n\
  \nCLOB 包括文字处理文档、XML 文档、日志文件等，这些通常更方便地作为数据库行中的单个列进行访问。\n\n相比之下，二进制大对象（BLOB）与特定的区域设置或字符集无关，代表的是通常需要某种查看器才能阅读的二进制信息。图像和视频片段是最常见的\
  \ BLOB 形式。解码 BLOB 内容的任务通常由中间件或客户端应用程序执行。BLOB 的类型（如 JPEG 或 MPEG）可以存储在 BLOB 本身内部，也可以作为\
  \ BLOB 所在行的另一列存储。\n\n对于那些将大对象存储在数据库中不可行的应用程序，可以使用 BFILE。`BFILE`是一种数据类型，其元数据存储在数据库中，但实际内容存储在数据库外部的操作系统文件中。本质上，`BFILE`对象是指向操作系统文件的指针。\n\
  \n在本章中，我们将介绍一些涉及 CLOB、BLOB 和 BFILE 对象的任务。我们将展示如何将大对象加载到数据库中。我们将展示如何使用`SQL*Loader`执行批量加载。当然，我们还将展示如何查询大对象数据，以及如何使用\
  \ HTTP 协议检索大对象。\n\n当没有其他便捷方式（例如从磁盘文件系统或通过其他文件传输协议如 FTP）加载大对象时，通过 HTTP 进行检索非常方便。\n\
  \n##### 16-1. 将大型文档加载到 CLOB 列\n\n### 问题\n\n您希望在数据库中管理大型文本文件。您的文件位于文件系统（本地文件系统、Windows\
  \ 网络共享或 NFS 挂载目录）的某个目录中，并且需要将它们加载到数据库表中，该表包含每个文件的其他属性。\n\n### 解决方案\n\n创建一个目录对象、一个序列和一个表来保存您的\
  \ CLOB 文档，如下所示：\n```\ncreate directory lob_src as '/Download/Docs2Load';\n\ncreate\
  \ sequence doc_seq;\n\ncreate table txt_docs\n(\n  doc_num number,\n  doc_nm varchar2(100),\n\
  \  doc_clb clob,\n  ins_ts timestamp\n);\n```\n\n接下来，创建一个匿名 PL/SQL 块（或存储过程），以创建对文件系统中文件的引用（LOB\
  \ 指针），插入一行包含空 CLOB 列的数据到数据库中，然后使用内置的 PL/SQL 过程填充刚插入行中的 CLOB 列。应如下所示：\n```\ndeclare\n\
  \  src_clb bfile;        /* 指向文件系统上的源 CLOB */\n  dst_clb clob;         /* 表中的目标\
  \ CLOB */\n  src_doc_nm varchar2(100) := 'Baseball Roster.doc';\n  src_offset integer\
  \ := 1;   /* 在源 CLOB 中的起始位置 */\n  dst_offset integer := 1;   /* 在目标 CLOB 中的起始位置\
  \ */\n  lang_ctx integer := dbms_lob.default_lang_ctx;\n  warning_msg number;  \
  \ /* 如果找到不可转换的字符，则返回警告值 */\nbegin\n  src_clb := bfilename('LOB_SRC',src_doc_nm);\
  \ -- 将指针分配给 Oracle 目录内的文件\n  insert into txt_docs (doc_num, doc_nm, doc_clb, ins_ts)\n\
  \    values(doc_seq.nextval, src_doc_nm, empty_clob(), systimestamp)\n    returning\
  \ doc_clb into dst_clb; -- 首先创建 LOB 占位列\n  dbms_lob.open(src_clb, dbms_lob.lob_readonly);\n\
  \n  dbms_lob.loadclobfromfile\n  (\n    dest_lob     => dst_clb,\n    src_bfile\
  \    => src_clb,\n    amount       => dbms_lob.lobmaxsize,\n    dest_offset  =>\
  \ dst_offset,\n    src_offset   => src_offset,\n    bfile_csid   => dbms_lob.default_csid,\n\
  \    lang_context => lang_ctx,\n    warning      => warning_msg\n  );\n\n  dbms_lob.close(src_clb);\n\
  \n  commit;\n\n  dbms_output.put_line('已将 CLOB 写入表：' || src_doc_nm);\nend;\n```\n\
  \n该过程创建了一个指向文件系统上 CLOB 的指针`SRC_CLB`，初始化了包含 CLOB 的数据库行，并在 PL/SQL 变量`DST_CLB`中返回了一个指向新插入行中空\
  \ CLOB 列的指针。`DBMS_LOB.LOADCLOBFROMFILE`使用变量`SRC_CLB`访问文件系统中的 LOB，使用变量`DST_CLB`访问表中的\
  \ CLOB 列，并将文档从文件系统复制到 CLOB 列。最后，提交更改。\n\n### 工作原理\n\n各种文档和图像位于文件系统目录中，该目录包含以下文件：\n\
  ```\n[oracle@dw ~]$ ls -l /Download/Docs2Load\ntotal 718\n-rwxr-xr-x 1 root root\
  \  80896 Mar 15 22:59 Baseball Roster.txt\n-rwxr-xr-x 1 root root  47104 Jan 25\
  \ 17:40 Display Table.php\n-rwxr-xr-x 1 root root  78336 Apr 11 23:20 My Antiques.docx\n\
  -rwxr-xr-x 1 root root 451638 May 30 22:08 Screen Capture.bmp\n-rwxr-xr-x 1 root\
  \ root  76800 Feb 16 23:02 Water Table Analysis.doc\n[oracle@dw ~]$\n```\n\n在解决方案中，我们创建了一个\
  \ Oracle 目录对象`LOB_SRC`来引用操作系统文件目录。Oracle*目录对象*是物理文件目录的逻辑抽象。它有许多好处和用途；在此示例中，我们使用它从\
  \ PL/SQL 块访问大对象。从 DBA 的角度来看，它具有透明性和安全性的优势。DBA 可以更改目录对象引用的文件系统，而无需更改任何 SQL 或 PL/SQL\
  \ 代码，因为目录对象名称保持不变。此外，DBA 可以向一个或多个用户授予目录对象的权限，从而控制谁可以读取或写入文件系统目录中的对象。\n\n在`SRC_DOC_NM`变量中指定文件名并运行匿名块后，输出如下：\n\
  ```\n已将 CLOB 写入表：Baseball Roster.txt\n```\n\n现在您可以对表运行以下`SELECT`语句，看到 CLOB 已被加载：\n\
  ```\nSQL> select doc_num, doc_nm, ins_ts, length(doc_clb) from txt_docs;\n\nDOC_NUM\
  \ DOC_NM                     INS_TS                       LENGTH(DOC_CLB)\n------------\
  \ ---------------------- ----------------------------- ------------------\n    \
  \     1 Baseball Roster.txt     07-JUN-09 07.52.41.229794 PM            80896\n\
  ```\n\n当您逐步进行时，PL/SQL 块中的步骤非常直接：\n1. 使用`BFILENAME`函数创建指向磁盘上 CLOB 的指针。\n2. 在数据库表中创建新行，并使用`EMPTY_CLOB`初始化\
  \ CLOB 列。\n3. 使用`DBMS_LOB.OPEN`打开磁盘上的 CLOB。\n4. 使用`DBMS_LOB.LOADCLOBFROMFILE`将 CLOB\
  \ 从磁盘复制到表中。\n5. 使用`DBMS_LOB.CLOSE`关闭源 CLOB。\n6. 提交事务。\n\n解决方案中展示了`DBMS_LOB.LOADCLOBFROMFILE`的大多数默认值。例如，您通常希望从源到目标从头开始复制（`SRC_OFFSET`和`DST_OFFSET`），使用默认语言上下文（`DBMS_LOB.DEFAULT_LANG_CTX`），并将整个\
  \ CLOB 复制到数据库列中（`DBMS_LOB.LOBMAXSIZE`）。\n\n**注意** `DBMS_LOB.LOADCLOBFROMFILE`的替代方法是`DBMS_LOB.LOADFROMFILE`。它的参数较少，使用起来更简单；但是，它不支持多字节字符集。\n\
  \n\n"
- "# 第 16 章 ■ 大型对象\n\n##### 16-2. 将图像数据加载到 BLOB 列\n\n### 问题\n\n你有各种 JPG、PNG、GIF 和\
  \ BMP 图像文件需要在数据库中进行管理和备份，并且需要一种方法来执行初始加载到数据库中。\n\n### 解决方案\n\n加载二进制大对象比加载基于文本的大对象稍微简单一些。你不必担心字符集转换——或者根本无需关心字符集；一图胜千言，数据库中的一个图像文件意味着你不需要存储包含那一千个单词的等效文本文档！\n\
  \n为你的图像表的唯一标识符创建一个序列，以及表本身：\n\n```sql\ncreate sequence img_seq;\n\ncreate table\
  \ image\n(\n  img_num number,\n  img_nm varchar2(100),\n  img_blb blob,\n  ins_ts\
  \ timestamp\n);\n```\n\n接下来，运行一个匿名块，将图像`SCREEN CAPTURE.BMP`加载到你的数据库表中：\n\n```sql\n\
  declare\n  src_blb bfile; /* point to source BLOB on file system */\n  dst_blb blob;\
  \  /* destination BLOB in table */\n  src_img_nm varchar2(100) := 'Screen Capture.bmp';\n\
  \  src_offset integer := 1; /* where to start in the source BLOB */\n  dst_offset\
  \ integer := 1; /* where to start in the target BLOB */\nbegin\n  src_blb := bfilename('LOB_SRC',src_img_nm);\n\
  \  insert into image (img_num, img_nm, img_blb, ins_ts)\n    values(img_seq.nextval,\
  \ src_img_nm, empty_blob(), systimestamp)\n    returning img_blb into dst_blb;\n\
  \  dbms_lob.open(src_blb, dbms_lob.lob_readonly);\n  dbms_lob.loadblobfromfile\n\
  \  (\n    dest_lob => dst_blb,\n    src_bfile => src_blb,\n    amount => dbms_lob.lobmaxsize,\n\
  \    dest_offset => dst_offset,\n    src_offset => src_offset\n  );\n  dbms_lob.close(src_blb);\n\
  \  commit;\n  dbms_output.put_line('Wrote BLOB to table: ' || src_img_nm);\nend;\n\
  ```\n\n### 工作原理\n\n将二进制对象加载到`BLOB`列中，与将文本文件加载到`CLOB`列中非常相似。\n\n然而，与文本文档不同，你很少会遇到只将图像文件的一部分复制到`BLOB`列的情况。这是由于大多数图像文件的结构特性决定的。你要么加载整个图像，要么完全不加载。\n\
  \n查询表`IMAGE`，你可以看到刚刚加载的图像文件的元数据：\n\n```sql\nselect img_num, img_nm, ins_ts, length(img_blb)\
  \ from image;\n```\n\n```\nIMG_NUM IMG_NM                  INS_TS              \
  \          LENGTH(IMG_BLB)\n------- ----------------------- -----------------------------\
  \ ---------------\n      1 Screen Capture.bmp     07-JUN-09 10.25.02.984755 PM \
  \          451638\n```\n\n为了进一步自动化这个过程（假设你处理的仍然是相对较少的对象），你可以创建一个存储过程来代替使用匿名过程。你的参数至少应包含要加载的文件名。以下是这样一个过程的示例：\n\
  \n```sql\ncreate or replace procedure load_blob ( src_img_nm in varchar2 )\nis\n\
  \  src_blb bfile; /* point to source BLOB on file system */\n  dst_blb blob;  /*\
  \ destination BLOB in table */\n  src_offset integer := 1; /* where to start in\
  \ the source BLOB */\n  dst_offset integer := 1; /* where to start in the target\
  \ BLOB */\nbegin\n  ... /* same code as in the anonymous block version */\nend;\n\
  ```\n\n从另一个存储过程的循环或匿名块中调用该过程很容易。例如：\n\n```sql\nbegin\n  load_blob('Screen Capture.bmp');\n\
  end;\n```\n\n你也可以考虑对目录对象进行参数化，并为图像文件的描述创建一个新列并进行参数化。通常，文件名本身并不是图像内容的很好描述！\n\n> **注意**\
  \ 本方案使用了与本章开头`CLOB`示例相同的目录对象。正如你可能推断的那样，如果你不必担心字符转换，你可以将所有对象，无论是`CLOB`还是`BLOB`，都视为二进制对象来处理。\n\
  \n## 16-3. 使用 SQL*Loader 批量加载大型对象\n\n### 问题\n\n你想从本地文件系统加载数千个二进制对象，并希望尽量减少手动干预以及加载对象所需的时间。\n\
  \n### 解决方案\n\n之前的解决方案使用了 Oracle 目录对象和 PL/SQL 过程。如果二进制文件可以从 Oracle 客户端访问，你可以使用`SQL*Loader`轻松地加载`BLOB`。以下是一个名为`load_lobs.ctl`的`SQL*Loader`控制文件：\n\
  \n```\nload data\ninfile load_lobs.list\nappend into table image\nfields terminated\
  \ by ','\ntrailing nullcols\n(\n  img_num char,\n  img_nm char(100),\n  img_file_nm\
  \ filler char(100),\n  img_blb lobfile(img_file_nm) terminated by EOF,\n  ins_ts\
  \ \"systimestamp\"\n)\n```\n\n这是所引用的数据文件`load_lobs.list`，包含了`BLOB`的位置：\n\n```\n\
  101,Water Table Analysis,E:\\Download\\Docs2Load\\Water Table Analysis.doc\n102,My\
  \ Antiques,My Antiques.docx\n103,Screen Capture for Book,Screen Capture.bmp\n```\n\
  \n你的`SQL*Loader`命令行将类似于这样：\n\n```\nsqlldr userid=rjb/rjb@recipes control=load_lobs.ctl\n\
  ```\n\n### 工作原理\n\n对`LOB`使用`SQL*Loader`与对传统数据类型使用`SQL*Loader`非常相似，区别在于`SQL*Loader`的`INFILE`包含一个指向文件系统中`LOB`位置的指针。\n\
  \n你像在典型的`SQL*Loader`作业中一样指定其他表列。然而，对于`BLOB`数据，你需要指定两列：`BLOB`的位置和表中将容纳该`BLOB`的列。在解决方案中，`IMG_FILE_NM`列被标记为`FILLER`，这意味着`IMG_FILE_NM`不是一个真实的列，而是在稍后加载`BLOB`数据时会被引用。包含`BLOB`列的`SQL*Loader`行如下：\n\
  \n```\nimg_blb lobfile(img_file_nm) terminated by EOF,\n```\n\n`LOBFILE`子句引用了包含文件系统中`BLOB`位置的`SQL*Loader`列。注意在例子中，你可以提供一个绝对文件位置（`E:\\\
  Download\\Docs2Load\\Water Table Analysis.doc`）或一个相对于你运行`SQL*Loader`的目录的文件名。\n\n\
  最后，子句`TERMINATED BY EOF`告诉`SQL*Loader`在文件结尾处停止读取`BLOB`。在其他场景中，你可能只想读取`CLOB`或`BLOB`的一部分，直到特定的分隔符，你可以用`TERMINATED\
  \ BY`子句中的一个常量以及一个可选的最大大小来指定，如下例所示：\n\n```\nparagraph_clb lobfile(chapter_file_nm)\
  \ char(2000) terminated by '[PARA]'\n```\n\n从解决方案中的`BLOB`被加载到`IMAGE`表后，表的内容如下所示：\n\
  \n```sql\nselect img_num, img_nm, ins_ts, length(img_blb) from image;\n```\n\n```\n\
  IMG_NUM IMG_NM                  INS_TS                        LENGTH(IMG_BLB)\n\
  ------- ----------------------- ----------------------------- ---------------\n\
  \    101 Water Table Analysis    11-JUN-09 10.49.44.154432000 PM        76800\n\
  \    102 My Antiques            11-JUN-09 10.49.44.154432000 PM        78336\n \
  \   103 Screen Capture for Book 11-JUN-09 10.49.44.154432000 PM       451638\n3\
  \ rows selected\n```\n\n正如你可能预期的那样，你可以在同一个`SQL*Loader`作业中加载多个`BLOB`和`CLOB`列，只需要确保你的`LOBFILE`定位器被定义为`FILLER`列（如果它们不是表中实际列的值）。\n\
  \n这种方法非常有效，即使客户端与数据库实例位于不同的平台上也是如此。在提供的解决方案中，客户端和`BLOB`对象位于 Microsoft Windows 平台上（MS-Word\
  \ 的`DOC`和`DOCX`文件本质上是二进制文件），而包含带有`BLOB`列的表的数据库则位于 Linux 平台上。请记住，当我们使用`BLOB`大型对象类型时，我们不必担心平台字符集转换问题。\n\
  \n\n\n"
- "# 第 16 章 ■ 大对象\n\n是使用 `SQL*Loader` 还是使用带目录对象的 PL/SQL 来加载你的 `BLOB` 和 `CLOB`，这取决于多种因素。如果你不需要任何过程逻辑来加载数据，并且你的开发人员更熟悉\
  \ `SQL*Loader`，那么这可能是最佳选择。如果要加载的数据无法通过 Oracle 目录对象访问，或者数据并不总是位于相同的文件系统位置，`SQL*Loader`\
  \ 也是一个不错的选择。另一方面，如果 `LOB` 与 Oracle 数据库位于同一服务器上，并且所有目录对象都已就绪，那么使用 PL/SQL 调用来加载 `LOB`\
  \ 比在客户端工作站上使用 `SQL*Loader` 更高效，因为后者必须先将数据从源位置复制到客户端位置，然后再复制回数据库服务器。\n\n##### 16-4.\
  \ 使用 HTTP 访问大对象\n\n### 问题\n\n你需要将 `LOB` 从远程服务器加载到你的数据库，但唯一可用于传输数据的协议是 HTTP（端口 80）。\n\
  \n图 16-1 显示了所需的数据、其目的地，以及将数据从源移动到目标的障碍。\n`图 16-1. 在有防火墙限制的情况下在服务器间传输 LOB`\n\n包含图像文件服务器的网络上的防火墙限制，阻止了从数据库服务器对图像服务器的任何直接访问，只能通过端口\
  \ 80 访问源系统上用于提供图像的 Web 服务器前端。换句话说，从图像服务器获取图像的唯一方式是通过 HTTP。\n\n### 解决方案\n\nApress.com\
  \ 的图像必须迁移到另一个数据库服务器；这些服务器相隔数千英里，并且除了 HTTP（端口 80）协议外，服务器之间没有网络访问。你没有时间执行导出/导入到 DVD\
  \ 或磁带，并将 DVD 或磁带运送到本地数据库服务器的物理位置。但是，你确实有一个本地数据库表，其中包含要传输的 URL 列表。\n\n为了促进这种传输，请使用\
  \ Oracle PL/SQL 包 `UTL_HTTP` 和 `DBMS_LOB`，通过 HTTP 协议在网络上传输文件。在此解决方案中，表 `IMG_LIST`\
  \ 包含保存图像的 URL 列表，表 `WEB_IMG` 包含每个图像的元数据以及图像本身。\n\n以下是使用 HTTP 访问远程对象并将其复制到本地数据库表的\
  \ `LOB` 列中的代码：\n\n```sql\n-- create image table with list of URLs\n-- and retrieve\
  \ those images via HTTP\ndeclare\n    cursor img_list is -- image URLs to retrieve\n\
  \        select img_url from img_list;\n    r_img_list img_list%rowtype;\n    lBlob\
  \ blob; -- locator for current image\n    l_http_request utl_http.req;\n    l_http_response\
  \ utl_http.resp;\n    l_raw raw(32767); -- blob buffer\nbegin\n    dbms_output.put_line('***\
  \ Begin image load.');\n    open img_list;\n    loop\n        fetch img_list into\
  \ r_img_list;\n        exit when img_list%notfound;\n        -- initialize image\
  \ table row with empty blob\n        insert into web_img(img_num, img_url, img_blb,\
  \ ins_ts)\n        values(web_img_seq.nextval, r_img_list.img_url, empty_blob(),\
  \ systimestamp)\n        returning img_blb into lBlob; -- save pointer for local\
  \ use\n        dbms_output.put_line('Attempt retrieval of: ' || r_img_list.img_url);\n\
  \        -- attempt to retrieve image via HTTP\n        l_http_request := utl_http.begin_request(r_img_list.img_url);\
  \ -- request\n        l_http_response := utl_http.get_response(l_http_request);\
  \ -- response back\n        dbms_output.put_line(' HTTP stat code: ' || l_http_response.status_code);\n\
  \        dbms_output.put_line(' HTTP resp reason phrase: ' || l_http_response.reason_phrase);\n\
  \        if l_http_response.status_code = 200 then /* image file found */\n    \
  \        dbms_lob.open(lBlob, dbms_lob.lob_readwrite);\n            begin\n    \
  \            loop\n                    utl_http.read_raw(l_http_response, l_raw,\
  \ 32767);\n                    dbms_lob.writeappend(lBlob, utl_raw.length(l_raw),\
  \ l_raw);\n                end loop;\n            exception\n                when\
  \ utl_http.end_of_body then\n                    utl_http.end_response(l_http_response);\n\
  ```\n\n\n\n"
- "# 第十六章 ■ 大型对象 (LOBs)\n\n## 工作原理\n\n此匿名过程逐行读取 URL 表中的记录，尝试获取每个 URL 的内容，并将一行数据写入新表。为每个\
  \ URL 的成功或失败状态都进行了记录。\n\n该解决方案使用此 URL 列表，它们存储在 `IMG_LIST` 表中：\n`select img_url from\
  \ img_list;`\n\n```\nIMG_URL\nhttp://apress.com/img/masthead_logo.gif\nhttp://apress.com/img/dealofdaysanstimer_v2.gif\n\
  http://apress.com/img/AlphaProgram_140.gif\nhttp://apress.com/img/mini_toe_logo.gif\n\
  http://apress.com/img/banner/1515banner.gif\n已选择 5 行\n```\n\n以下是用于创建图像列表、目标图像表以及该图像表的序列生成器的\
  \ SQL：\n\n`create table img_list ( img_url varchar2(255) );`\n\n`create table web_img\
  \ ( img_num number, img_url varchar2(255), img_blb blob, ins_ts timestamp );`\n\n\
  `create sequence web_img_seq;`\n\n游标 `IMG_LIST` 检索每个 URL。对于每个 URL，该过程使用两个内置的 PL/SQL\
  \ 包：`DBMS_LOB` 和 `UTL_HTTP`。本章之前的解决方案使用 `DBMS_LOB.LOADBLOBFROMFILE` 将二进制对象从文件系统复制到数据库表中的\
  \ `BLOB` 列。与此相反，我们在此使用 `DBMS_LOB.WRITEAPPEND`，在通过调用 `UTL_HTTP.READ_RAW` 接收到每个 32KB\
  \ 的数据块后，以 32KB 的块为单位写入图像内容。\n\nPL/SQL 包 `UTL_HTTP` 如其名所示：向网站发送 HTTP 请求并接收 HTTP 响应。对于每个\
  \ URL，该过程执行以下步骤：\n\n1.  使用 `UTL_HTTP.BEGIN_REQUEST` 请求 URL。\n2.  使用 `UTL_HTTP.GET_RESPONSE`\
  \ 接收来自网站的响应。\n3.  如果响应代码为 200（找到 URL），则打开表中的 `BLOB`，否则处理下一个 URL 并返回步骤 1。\n4.  在一个本地\
  \ PL/SQL 块中，使用 `UTL_HTTP.READ_RAW` 以 32K 为块读取 URL 的内容，直到到达 URL 末尾，并使用 `DBMS_LOB.WRITE_APPEND`\
  \ 将每个 32K 块追加到目标 `BLOB` 的末尾。\n5.  关闭目标 `BLOB`。\n6.  获取下一个 URL 进行步骤 1；如果没有更多 URL，则进行步骤\
  \ 7。\n7.  关闭游标，提交所有事务。\n\n运行此过程的日志表明其中一个 URL 不存在：\n\n```\n*** 开始加载图像。\n尝试获取: http://apress.com/img/masthead_logo.gif\n\
  HTTP 状态码: 200\nHTTP 响应原因短语: OK\n图像 URL 已加载: 16 http://apress.com/img/masthead_logo.gif\n\
  尝试获取: http://apress.com/img/dealofdaysanstimer_v2.gif\nHTTP 状态码: 200\nHTTP 响应原因短语:\
  \ OK\n图像 URL 已加载: 17 http://apress.com/img/dealofdaysanstimer_v2.gif\n尝试获取: http://apress.com/img/AlphaProgram_140.gif\n\
  HTTP 状态码: 200\nHTTP 响应原因短语: OK\n图像 URL 已加载: 18 http://apress.com/img/AlphaProgram_140.gif\n\
  尝试获取: http://apress.com/img/mini_toe_logo.gif\nHTTP 状态码: 404\nHTTP 响应原因短语: Not Found\n\
  此 URL 无图像\n尝试获取: http://apress.com/img/banner/1515banner.gif\nHTTP 状态码: 200\nHTTP\
  \ 响应原因短语: OK\n图像 URL 已加载: 20 http://apress.com/img/banner/1515banner.gif\n*** 图像导入完成。\n\
  ```\n\n毫无疑问，您在使用喜欢的 Web 浏览器时，曾多次收到过 404 错误。\n\n运行该过程后，`WEB_IMG` 表的内容如下：\n\n`select\
  \ img_num, img_url, length(img_blb) from web_img order by img_num;`\n\n\n\n## 16-5\\\
  . 使外部大对象（BFILEs）对数据库可用\n\n**问题**\n\n你想在 Oracle 表中管理你的图像和其他二进制文件，但最终用户应用程序需要从文件系统访问这些文件，并且数据库表空间中没有足够的磁盘空间来将这些图像存储为\
  \ BLOB。\n\n**解决方案**\n\n你可以在 Oracle 表中使用 BFILE 指针来引用文件系统上的二进制对象。此外，你可以使用 `DBMS_LOB`\
  \ 和 `UTL_FILE` 包来读取和管理这些对象。\n\n创建一个表来保存图像元数据，并使用一个序列为该表提供主键：\n```sql\ncreate table\
  \ web_img2\n(\n  img_num number primary key,\n  img_url varchar2(255),\n  img_blb\
  \ bfile,\n  ins_ts timestamp,\n  constraint ak1_web_img2 unique(img_url)\n);\n\n\
  create sequence web_img2_seq;\n```\n\n这里有一个过程，它接受一个 Oracle 目录名称和该目录中的一个文件，如果文件存在，则将其元数据加载到\
  \ `WEB_IMG2` 表中：\n```sql\ncreate or replace procedure load_bfile ( dir_name varchar2,\
  \ src_img_nm in varchar2 ) is\n  src_blb bfile; /* 指向文件系统上的源 BLOB */\n  file_exists\
  \ boolean; /* UTL_FILE.FGETATTR 的返回值 */\n  file_len number;\n  blksize binary_integer;\n\
  begin\n  src_blb := bfilename(dir_name, src_img_nm);\n  insert into web_img2 (img_num,\
  \ img_nm, img_blb, ins_ts)\n  values(web_img2_seq.nextval, src_img_nm, src_blb,\
  \ systimestamp);\n  -- 检查文件此刻是否存在\n  utl_file.fgetattr(dir_name, src_img_nm, file_exists,\
  \ file_len, blksize);\n  if file_exists then\n    commit;\n    dbms_output.put_line('Wrote\
  \ BFILE pointer to table: ' || src_img_nm);\n  else\n    rollback;\n    dbms_output.put_line('BLOB\
  \ ' || src_img_nm\n                         || ' in directory '\n              \
  \           || dir_name\n                         || ' does not exist.');\n  end\
  \ if;\nend;\n```\n\n**工作原理**\n\n这个解决方案与本章前面一个将对象存储在数据库中的配方非常相似；在这个解决方案中，我们仍然将元数据存储在\
  \ `WEB_IMG2` 表中，但不是 BLOB 本身。相反，我们在操作系统文件系统中存储一个指向文件的指针。这确实方便了与需要在 Oracle 之外访问文件的其他应用程序共享文件，但它可能导致引用完整性（RI）问题。通常，在引用完整性中，一个数据库表引用另一个数据库表中的行，DBMS\
  \ 约束阻止删除被引用的行。然而，这里表引用的是文件系统中的文件。如果另一个应用程序或管理员删除或移动了文件，数据库表中的 BFILE 指针仍然存在，但它已无效。因此，你可以使用\
  \ `UTL_FILE.FGETATTR` 来检查操作系统目录中是否存在 BFILE。\n\n使用存在的文件运行此过程如下所示：\n```sql\nbegin\n\
  \  load_bfile('LOB_SRC','Screen Capture.bmp');\nend;\n```\n输出：\n```\nWrote BFILE\
  \ pointer to table: Screen Capture.bmp\n```\n\n相反，尝试存储一个不存在的文件会产生以下输出：\n```sql\n\
  begin\n  load_bfile('LOB_SRC','Cake Boss.bmp');\nend;\n```\n输出：\n```\nBLOB Cake\
  \ Boss.bmp in directory LOB_SRC does not exist.\n```\n\n当你查询该表时，它会返回以下结果：\n```sql\n\
  select * from web_img2;\n```\n```\nIMG_NUM IMG_NM                 IMG_BLB INS_TS\n\
  ------- ------------------- ------- --------------------------------\n1       Screen\
  \ Capture.bmp   (BFILE) 13-JUN-09 10.43.16.737554000 PM\n```\n\n你可能想知道如何解码 `IMG_BLB`\
  \ 列中引用的 BFILE 内容。`DBMS_LOB.FILEGETNAME` 过程也可以帮助你。这里是一个返回 Oracle 目录名称和目录内文件名的函数：\n\
  ```sql\ncreate or replace function get_bfile_attrs (bfile_obj in bfile)\nreturn\
  \ varchar2 is\n  dir_alias varchar2(30);\n  file_name varchar2(100);\nbegin\n  dbms_lob.filegetname(bfile_obj,\
  \ dir_alias, file_name);\n  return('BFILE: Directory=' || dir_alias || ' File='\
  \ || file_name);\nend;\n```\n```sql\nselect img_num, img_nm, get_bfile_attrs(img_blb)\
  \ from web_img2;\n```\n```\nIMG_NUM IMG_NM                 GET_BFILE_ATTRS(IMG_BLB)\n\
  ------- -------------------- --------------------------------------------------\n\
  1       Screen Capture.bmp   BFILE: Directory=LOB_SRC File=Screen Capture.bmp\n\
  ```\n你可以使用 `DBMS_LOB` 包将文件系统上的图像或 Word 文档复制到表中的 BLOB 或 CLOB 列；请参阅本章前面的配方。\n\n##\
  \ 16-6\\. 删除或更新数据库表中的 LOB\n\n**问题**\n\n数据库表中的几个 LOB 要么已过时，要么需要替换。\n\n**解决方案**\n\n\
  要删除 LOB，你可以将 LOB 列的内容设置为 `EMPTY_CLOB()` 或 `EMPTY_BLOB()`，如本例所示：\n```sql\nupdate\
  \ web_img\nset img_blb = empty_blob()\nwhere img_num = 19;\n```\n\n虽然你也可以将列 `IMG_BLB`\
  \ 设置为 `NULL`，但必须在重新插入 LOB 到该列之前将其设置为 `EMPTY_CLOB()` 或 `EMPTY_BLOB()`。允许 LOB 列具有\
  \ `NULL` 值使其与可以具有 `NULL` 的其他列的使用保持一致：你可以将值未知的 LOB 列与具有零长度空 LOB 的 LOB 区分开来。\n\n更新\
  \ LOB 列的值与更新空 LOB 列相同——检索 LOB 列的指针并使用 `DBMS_LOB` 来填充该列。如果你知道 LOB 的哪一部分需要替换，可以使用\
  \ `DBMS_LOB.COPY` 的其他参数。以下是 `DBMS_LOB.COPY` 的参数：\n```\nDBMS_LOB.COPY\n(\n  dest_lob\
  \    IN OUT NOCOPY BLOB, -- 要更新的 BLOB\n  src_lob     IN BLOB,           -- 包含新内容的\
  \ BLOB\n  amount      IN INTEGER,        -- 要复制的字节数\n  dest_offset IN INTEGER :=\
  \ 1,   -- 在目标中的起始位置\n  src_offset  IN INTEGER := 1    -- 在源中的起始位置\n);\n```\n正如你可能期望的那样，Oracle\
  \ 为在源 LOB 和目标 LOB 中的起始位置提供了合理的默认值。\n\n以下是如何将新 LOB 的第 10 个字节开始的 5000 个字节复制到现有 LOB\
  \ 的第 125 个字节：\n```sql\ndbms_lob.copy (existing_blb, new_blb, 5000, 125, 10);\n```\n\
  \n更新 CLOB 使用相同的过程（它被重载了，就像许多其他 Oracle PL/SQL 过程一样），只是 `DEST_LOB` 和 `SRC_LOB` 是 `CLOB`\
  \ 类型，并将从源字符集转换为目标字符集。\n\n**工作原理**\n\n由于其潜在的大小，大对象列（BLOB 和 CLOB）在 `SELECT` 和 `DDL`\
  \ 语句中有几个限制，包括以下内容：\n\n- LOB 不能用于 `SELECT DISTINCT`、`ORDER BY` 或 `GROUP BY` 子句中\n\
  - 你不能使用 LOB 列作为 `JOIN` 列\n- LOB 列不允许在 `UNION`、`INTERSECTION` 和 `MINUS` 中\n- LOB\
  \ 列不能有位图索引、唯一索引或 B 树索引——只能有基于函数的索引或域索引\n- LOB 列不能是主键\n\n\n\n"
- '# 第 5 部分


  ## 管理


  #### 第 17 章：数据库管理


  *数据库管理* 指的是数据库管理员（DBA）为确保数据库管理系统的可用性、可扩展性、易用性和可维护性而执行的各种任务。关于这个主题已有整本的著作。本章并不会涵盖
  DBA 可能用到的所有 SQL 方面。相反，它的目标是向您展示如何使用 SQL 来执行常见的数据库管理员任务。


  本章涉及的许多任务也可以使用像 Enterprise Manager 这样的图形化工具来执行。图形化工具非常适合快速执行基本的数据库管理任务，特别是当您对直接运行
  SQL 命令不太熟悉时。对于大多数场景来说，它们是够用的。


  然而，您最终会遇到需要实现某个 SQL 功能，而该功能恰恰无法通过图形化工具工作的情况。例如，您可能需要使用图形化工具中尚未提供的新特性或特殊命令语法。或者您可能想编写一个稍复杂的、必须以批处理模式运行的脚本。在这种情况下，您就需要具备执行该操作所需的
  SQL 脚本编写技能。


  ### 五命令法则


  我们中的一位曾效力于一家公司，当时刚招聘了一位初级 DBA。当轮到这位初级 DBA 值班时，这位年轻人担心自己是否具备在生产环境中执行数据库管理任务的知识。一位资深
  DBA 将这位初级 DBA 叫到一边，解释说实际上只需要知道五条 SQL 命令就可以成为一名 DBA：


  * `STARTUP`

  * `SHUTDOWN`

  * `RECOVER`

  * `ALTER DATABASE`

  * `ALTER SYSTEM`


  这位资深 DBA 说 DBA 只需要少数几条 SQL 命令，是有点开玩笑的。当然，DBA 还需要知道如何备份和恢复数据库——以及其他任务。


  尽管如此，五命令法则还是有些道理的。关键在于要打好 Oracle 数据库架构的坚实基础，以及掌握使用 SQL 与数据库交互的方法。当出现严重问题时，SQL 是
  DBA 用来排查和修复问题的工具。您必须熟悉 DBA 使用的基本命令，以及如何为超出基本 SQL 命令范围的场景查找相应命令。


  ##### 17-1. 创建数据库


  #### 问题


  您刚刚安装好了 Oracle 二进制文件。您想要创建一个数据库。


  #### 解决方案


  在运行 `CREATE DATABASE` 命令之前，您必须连接到 SQL*Plus 并以 `NOMOUNT` 模式启动数据库：


  ```

  $ sqlplus / as sysdba

  SQL> startup nomount;

  ```


  下面是一个典型的 Oracle `CREATE DATABASE` 语句：


  ```

  create database invrep controlfile reuse

  maxlogfiles 16

  maxlogmembers 4

  maxdatafiles 1024

  maxinstances 1

  maxloghistory 680

  character set "UTF8"

  logfile group 1

  (''/ora01/oradata/INVREP/redo01a.log'',

  ''/ora01/oradata/INVREP/redo01b.log'') size 200m reuse,

  group 2

  (''/ora01/oradata/INVREP/redo02a.log'',

  ''/ora01/oradata/INVREP/redo02b.log'' ) size 200m reuse,

  group 3

  (''/ora01/oradata/INVREP/redo03a.log'',

  ''/ora01/oradata/INVREP/redo03b.log'' ) size 200m reuse

  datafile

  ''/ora01/oradata/INVREP/system01.dbf''

  size 500m

  reuse

  undo tablespace undotbs1 datafile

  ```


  考虑到所需的开销，例如让 LOB 列成为主键，这些限制中的大多数似乎是合理的。然而，在其他操作中，您可以像对待任何其他数据库列一样对待它们，例如在同一张表或另一张表中将一个
  LOB 列更新为另一个 LOB 列，或者使用 `EMPTY_CLOB()` 将 LOB 列设置为 `NULL` 或空值。


  LOB 在事务中也可以回滚，尽管 LOB 的旧版本存储在 LOB 段中，而不是撤销表空间中。




  '
- '# 第十七章 ■ 数据库管理


  ## 创建数据库


  ### 初始化文件


  在 Linux/Unix 系统中，初始化文件（文本文件 `init.ora` 或二进制文件 `spfile`）默认位于 `ORACLE_HOME/dbs` 目录。在
  Windows 系统中，默认目录是 `ORACLE_HOME\database`。


  启动实例时，Oracle 会首先在默认位置查找名为 `spfile<ORACLE_SID>.ora` 的二进制初始化文件。如果没有二进制 `spfile`，则会查找名为
  `init<ORACLE_SID>.ora` 的文本文件。如果在默认位置找不到初始化文件，Oracle 将报错。你可以通过 `STARTUP` 命令的 `PFILE`
  子句明确指定使用哪个目录和文本初始化文件，以覆盖默认设置。


  以下是一个典型的 Oracle Database 11g `init.ora` 文本文件内容：


  ```text

  db_name=INVREP

  db_block_size=8192

  compatible=11.1.0

  memory_target=800M

  memory_max_target=800M

  processes=200

  control_files=(/ora01/oradata/INVREP/control01.ctl,

  /ora02/oradata/INVREP/control02.ctl)

  diagnostic_dest=/orahome/oracle

  job_queue_processes=10

  open_cursors=300

  fast_start_mttr_target=500

  undo_management=AUTO

  undo_tablespace=UNDOTBS1

  remote_login_passwordfile=EXCLUSIVE

  ```


  以下是一个典型的 Oracle Database 10g `init.ora` 文本文件内容：


  ```text

  db_name=INVREP

  db_block_size=8192

  pga_aggregate_target=400M

  workarea_size_policy=AUTO

  sga_max_size=500M

  sga_target=500M

  processes=400

  control_files=(/ora01/oradata/INVREP/control01.ctl,

  /ora01/oradata/INVREP/control02.ctl)

  job_queue_processes=10

  open_cursors=300

  fast_start_mttr_target=500

  background_dump_dest=/orahome/oracle/admin/INVREP/bdump

  user_dump_dest=/orahome/oracle/admin/INVREP/udump

  core_dump_dest=/orahome/oracle/admin/INVREP/cdump

  undo_management=AUTO

  undo_tablespace=UNDOTBS1

  remote_login_passwordfile=EXCLUSIVE

  ```


  ### 数据字典脚本


  数据库成功创建后，你可以运行 Oracle 提供的两个脚本来实例化数据字典。必须以 `SYS` 模式运行这些脚本：


  ```sql

  SQL> show user

  USER is "SYS"

  SQL> @?/rdbms/admin/catalog

  SQL> @?/rdbms/admin/catproc

  ```


  接下来，以 `SYSTEM` 模式创建产品用户配置表：


  ```sql

  SQL> connect system/manager

  SQL> @?/sqlplus/admin/pupbld

  ```


  这些表允许 SQL*Plus 基于用户禁用特定命令。如果未运行 `pupbld.sql` 脚本，所有非 `SYS` 用户在登录 SQL*Plus 时将看到以下警告：

  `Error accessing PRODUCT_USER_PROFILE`

  `Warning: Product user profile information not loaded!`

  `You may need to run PUPBLD.SQL as SYSTEM`


  ##### 17-2. 删除数据库


  ### 问题


  你想删除一个数据库，并移除与其关联的所有数据文件、控制文件和联机重做日志。


  ### 解决方案


  确保你在正确的服务器上，并连接到正确的数据库。在 Linux/Unix 系统上，从操作系统提示符执行以下命令：


  ```bash

  $ uname -a

  ```


  然后连接到 SQL*Plus，并确认你连接的是确实要删除的数据库：


  ```sql

  select name from v$database;

  ```


  确认无误后，从具有 `SYSDBA` 权限的账户执行以下 SQL 命令：


  ```sql

  shutdown immediate;

  startup mount exclusive restrict;

  drop database;

  ```




  ■ **注意** 显然，在删除数据库时您必须格外小心。执行删除数据库操作时系统*不会*给予提示，而且截至本文撰写时，尚不存在 `UNDROP ACCIDENTALLY
  DROPPED DATABASE`（撤消意外删除的数据库）命令。


  ### 工作原理


  删除数据库时请*极其*谨慎，因为此操作将移除数据文件、控制文件和在线重做日志文件。


  `DROP DATABASE` 命令在您需要移除某个数据库时非常有用。这可以是一个测试数据库或一个不再使用的旧数据库。


  `DROP DATABASE` 命令不会移除旧的归档重做日志文件。您需要使用操作系统命令（例如 Linux/Unix 中的 `rm` 或 Windows 命令提示符下的
  `DEL`）手动删除这些文件。您也可以指示 `RMAN` 来删除归档重做日志文件。


  ##### 17-3. 验证连接信息


  ### 问题


  您正在运行多个 `DDL` 脚本以进行应用程序升级。在执行命令之前，您希望确保已连接到正确的数据库环境。


  ### 解决方案


  验证环境的最简单方法是连接到数据库并查询 `V$DATABASE` 视图：


  ```

  select name from v$database;

  ```


  您也可以运行 `SHOW USER` 命令来快速验证您连接到数据库时所使用的模式：


  ```

  SQL> show user;

  ```


  如果您希望 `SQL` 提示符显示用户和实例信息，可以通过以下命令进行设置：


  ```

  SQL> set sqlprompt ''&_user.@&_connect_identifier.> ''

  ```


  以下是您的 `SQL` 命令提示符可能的外观示例：


  ```

  SYS@RMDB11>

  ```


  如果您希望在以不同用户连接到数据库时提示符发生变化，请将上述代码行添加到您的 `glogin.sql` 文件或 `login.sql` 文件中。`glogin.sql`
  文件通常位于 `ORACLE_HOME/sqlplus/admin` 目录下，并且会在任何用户连接到 `SQL*Plus` 时运行。


  如果您只希望在连接到数据库时显示更改，请在您启动 `SQL*Plus` 的目录中创建一个 `login.sql` 文件，或者确保 `login.sql` 文件位于您的
  `SQLPATH` 操作系统环境变量所包含的目录中。


  ### 工作原理


  确保正确连接至少涉及两个方面。首先，您必须确定已连接到正确的数据库。其次，您必须确保在该数据库内连接到了适当的用户。解决方案展示了如何验证数据库和用户。验证这些信息后，您就可以放心地运行您的
  `DDL` 脚本了。


  有时在将代码部署到不同的开发、测试和生产环境时，能收到关于是否处于正确环境的提示会非常方便。实现此功能的技术需要两个文件：`answer_yes.sql` 和
  `answer_no.sql`。以下是 `answer_yes.sql` 的内容：


  ```

  -- answer_yes.sql


  PROMPT


  PROMPT Continuing...

  ```


  而这是 `answer_no.sql`：


  ```

  -- answer_no.sql


  PROMPT


  PROMPT Quitting and Discarding changes...


  ROLLBACK;


  EXIT;

  ```


  现在，您可以将以下代码放入部署脚本的开头部分，它会提示您是否处于正确的环境以及是否要继续：


  ```

  WHENEVER SQLERROR EXIT FAILURE ROLLBACK;


  WHENEVER OSERROR EXIT FAILURE ROLLBACK;


  SELECT name FROM v$database;


  SHOW user;


  SET ECHO OFF;


  PROMPT


  ACCEPT answer PROMPT ''Correct environment? Enter yes to continue: ''


  @@answer_&answer..sql

  ```


  如果您输入 `yes`，则 `answer_yes.sql` 脚本将运行，您将继续运行您调用的任何其他脚本。如果您输入 `no`，则 `answer_no.sql`
  脚本将运行，您将退出 `SQL*Plus` 并最终返回到 `OS` 提示符。如果您直接按 `Enter` 键而不输入任何内容，您也会退出并返回到 `OS` 提示符。


  ##### 17-4. 创建表空间


  ### 问题


  您想要创建一个表空间。


  ### 解决方案


  使用 `CREATE TABLESPACE` 语句来创建表空间。此示例展示了创建表空间时常用的选项：



  '
- '# 第 17 章 ■ 数据库管理


  ## 工作原理


  我们建议您在创建所有表空间时，都使用 `EXTENT MANAGEMENT LOCAL` 来指定每个表空间在本地管理其区。本地管理的表空间在数据文件中使用位图映像，以高效地确定一个区是否被使用。对于本地管理的表空间，存储参数
  `NEXT`、`PCTINCREASE`、`MINEXTENTS`、`MAXEXTENTS` 和 `DEFAULT STORAGE` 对区选项无效。


  在创建表空间时，您还应使用 `UNIFORM SIZE`，它告诉 Oracle 使每个区的大小相同（当对象，如表和索引，需要空间时）。


  `SEGMENT SPACE MANAGEMENT AUTO` 子句指示 Oracle 管理块内的空间。使用此子句时，无需指定诸如 `PCTUSED`、`FREELISTS`
  和 `FREELIST GROUPS` 之类的参数。


  如果您创建具有 `AUTOEXTEND` 功能的表空间，我们还建议您指定一个 `MAXSIZE`，这样失控的 SQL 进程就不会无意中填满表空间，进而填满挂载点。以下是一个创建自动扩展表空间并限制其最大大小的示例：


  ```

  create tablespace users

  datafile ''/ora01/oradata/INVREP/users_01.dbf''

  size 100m

  autoextend on maxsize 1000m

  extent management local

  uniform size 128k

  segment space management auto;

  ```


  在不同的环境中使用 `CREATE TABLESPACE` 脚本时，能够对脚本的部分进行参数化是很有用的。例如，在开发中，您可能将数据文件大小设为 100MB，而在生产环境中，数据文件可能为
  5,000MB。使用 `&` 变量可以使 `CREATE` 脚本更易于移植。下一个列表在脚本顶部定义了 `&` 变量，这些变量决定了为表空间创建的数据文件的大小：


  ```

  define tbsp_large=1000M

  define tbsp_med=500M

  --

  create tablespace exp_data

  datafile ''/ora01/oradata/INVREP/exp_data01.dbf''

  size &&tbsp_large

  autoextend on maxsize 1000m

  extent management local

  uniform size 128k

  segment space management auto;

  --

  create tablespace reg_data

  datafile ''/ora01/oradata/INVREP/reg_data01.dbf''

  size &&tbsp_med

  autoextend on maxsize 1000m

  extent management local

  uniform size 128k

  segment space management auto;

  ```


  使用 `&` 变量允许您修改脚本一次，并在整个脚本中重用这些变量。


  您还可以从 SQL*Plus 命令行将值传递给 `&` 变量到 `CREATE TABLESPACE` 脚本中。为此，首先在脚本顶部定义 `&` 变量以接受传入的值：


  ```

  define tbsp_large=&1

  define tbsp_med=&2

  -- 脚本的其余部分在此处...

  ```


  现在您可以从 SQL*Plus 命令行向脚本传递变量。以下示例执行一个名为 `cretbsp.sql` 的脚本并传递两个值，这些值将分别将 `&` 变量设置为
  `1000m` 和 `500m`：


  ```

  SQL> @cretbsp 1000m 500m

  ```


  ##### 17-5. 删除表空间


  **问题**


  您想要删除一个表空间。


  **解决方案**


  如果需要删除表空间，请使用 `DROP TABLESPACE` 语句。我们建议您在删除表空间之前先将其脱机。将表空间脱机可确保没有 SQL 语句正在操作该表空间中的对象。


  此示例首先将 `INV_DATA` 表空间脱机，然后使用 `INCLUDING CONTENTS AND DATAFILES` 子句将其删除：


  ```

  alter tablespace inv_data offline;

  drop tablespace inv_data including contents and datafiles;

  ```


  **■ 注意** 无论表空间是在线还是脱机，您都可以删除它。`SYSTEM` 表空间是个例外，它无法被删除。


  **工作原理**


  使用 `INCLUDING CONTENTS AND DATAFILES` 删除表空间将永久删除该表空间及其任何数据文件。在删除表空间之前，请确保该表空间不包含您想要保留的任何数据。


  如果要删除的表空间包含一个具有主键的表，而该主键被另一个不同表空间中的表的外键约束引用，您将无法删除该表空间。您可以选择删除约束，或者使用 `DROP TABLESPACE`
  语句的 `CASCADE CONSTRAINTS` 子句：


  ```

  drop tablespace inv_data including contents and datafiles cascade constraints;

  ```


  此语句将删除被删除表空间之外的、引用被删除表空间内表的所有参照完整性约束。


  ##### 17-6. 调整表空间大小


  **问题**


  当尝试向表中插入数据时，出现此错误：`ORA-01653: unable to extend table INVENTORY by 128 in tablespace
  INV_IDX`


  您确定需要向与该表关联的表空间添加更多空间。


  **解决方案**


  调整表空间大小有两种常用技术：

  * 增加（或减少）现有数据文件的大小

  * 添加一个额外的数据文件


  在调整数据文件大小之前，您应首先使用类似于以下的查询验证其当前位置和大小：


  ```

  select name, bytes from v$datafile;

  ```


  确定要调整大小的数据文件后，使用 `ALTER DATABASE DATAFILE ... RESIZE` 命令增加其大小。此示例将数据文件大小调整为 1GB：


  ```

  alter database datafile ''/ora01/oradata/INVREP/reg_data01.dbf'' resize 1g;

  ```


  要向现有表空间添加数据文件，请使用 `ALTER TABLESPACE ... ADD DATAFILE` 语句：


  ```

  alter tablespace reg_data add datafile ''/ora01/oradata/INVREP/reg_data02.dbf''
  size 100m;

  ```


  **工作原理**


  在管理具有高事务负载的数据库时，调整数据文件大小可能是一项日常任务。增加现有数据文件的大小允许您在不添加更多数据文件的情况下向表空间添加空间。如果包含现有数据文件的存储设备上没有足够的磁盘空间，您可以将一个数据文件添加到现有表空间的不同位置。


  您还可以修改现有数据文件以打开或关闭 `AUTOEXTEND`。下一个示例修改一个数据文件以启用 `AUTOEXTEND`，最大大小为 `1000MB`：


  ```

  alter database datafile ''/ora01/oradata/INVREP/reg_data02.dbf''

  autoextend on maxsize 1000m;

  ```


  许多 DBA 不愿意启用 `AUTOEXTEND`，因为他们担心如果错误的 SQL `INSERT` 语句执行多次，存储设备可能会被填满。DBA 会选择实现监控脚本，在表空间即将变满时提醒他们，而不是启用
  `AUTOEXTEND`。


  如果您想向临时表空间添加空间，首先查询 `V$TEMPFILE` 视图以验证临时数据文件的当前位置和大小：


  ```

  select name, bytes from v$tempfile;

  ```


  接下来使用 `ALTER DATABASE` 语句的 `TEMPFILE` 选项：


  ```

  alter database tempfile ''/ora01/oradata/INVREP/temp01.dbf'' resize 500m;

  ```


  您也可以通过 `ALTER TABLESPACE` 语句向临时表空间添加文件：


  ```

  alter tablespace temp add tempfile ''/ora01/oradata/INVREP/temp02.dbf'' size 5000m;

  ```


  ##### 17-7. 限制每个会话的数据库资源


  **问题**


  您希望限制用户在您的数据库中可以消耗的资源量。


  **解决方案**


  首先，您需要确保数据库的 `RESOURCE_LIMIT` 初始化参数设置为 `TRUE`。您可以在初始化文件（`init.ora` 或 `spfile`）中完成此操作，也可以使用
  `ALTER SYSTEM` 命令。



  '
- '# 第 17 章 ■ 数据库管理


  执行以下 SQL 语句查看数据库中`RESOURCE_LIMIT`的当前设置：

  ```sql

  select name, value from v$parameter where name=''resource_limit'';

  ```


  使用`CREATE PROFILE`命令创建资源限制配置文件，然后可将该配置文件分配给任意现有数据库用户。以下 SQL 语句创建了一个限制资源的配置文件（例如限制单个会话可消耗的
  CPU 量）：

  ```sql

  create profile user_profile_limit

  limit

  sessions_per_user 20

  cpu_per_session 240000

  logical_reads_per_session 1000000

  connect_time 480

  idle_time 120;

  ```


  创建配置文件后，可将其分配给用户。在以下示例中，用户`HEERA`被分配了`USER_PROFILE_LIMIT`：

  ```sql

  alter user heera profile user_profile_limit;

  ```


  ■ **注意** Oracle 建议您使用数据库资源管理器来管理数据库资源限制。但我们发现通过 SQL 实现的数据库配置文件是一种有效且简便的资源限制机制。


  ## 工作原理


  Oracle 数据库配置文件主要用于两大目的：


  *   设置资源限制

  *   强制执行密码安全策略


  创建用户时若未指定配置文件，系统将自动为新建用户分配`DEFAULT`配置文件。可通过`ALTER PROFILE`语句修改配置文件。以下示例将`DEFAULT`配置文件的`CPU_PER_SESSION`限制修改为
  240000（单位：百分之一秒）：

  ```sql

  alter profile default limit cpu_per_session 240000;

  ```


  这将使用`DEFAULT`配置文件的用户 CPU 使用时间限制为 2400 秒。配置文件中可设置多种限制参数，表 17-1 描述了可通过配置文件限制的数据库资源设置。


  **表 17-1. 数据库资源配置文件设置**


  | 配置文件资源 | 含义 |

  | :--- | :--- |

  | `COMPOSITE_LIMIT` | 基于加权和算法的综合限制，涉及资源包括：`CPU_PER_SESSION`、`CONNECT_TIME`、`LOGICAL_READS_PER_SESSION`和`PRIVATE_SGA`。
  |

  | `CONNECT_TIME` | 连接时长（分钟）。 |

  | `CPU_PER_CALL` | 每次调用的 CPU 时间限制（百分之一秒）。 |

  | `CPU_PER_SESSION` | 每个会话的 CPU 时间限制（百分之一秒）。 |

  | `IDLE_TIME` | 空闲时间（分钟）。 |

  | `LOGICAL_READS_PER_CALL` | 每次调用读取的数据块数。 |

  | `LOGICAL_READS_PER_SESSION` | 每个会话读取的数据块数。 |

  | `PRIVATE_SGA` | 在共享池中消耗的空间量。 |

  | `SESSIONS_PER_USER` | 并发会话数量。 |


  在`CREATE USER`语句中，可指定除`DEFAULT`外的配置文件：

  ```sql

  create user heera identified by foo profile user_profile_limit;

  ```


  配置文件也用于强制执行密码安全策略（密码配置文件设置说明参见表 17-2）。例如，若希望修改`DEFAULT`配置文件，设置密码最长使用天数上限，以下代码将`DEFAULT`配置文件的`PASSWORD_LIFE_TIME`设为
  300 天：

  ```sql

  alter profile default limit password_life_time 300;

  ```


  **表 17-2. 密码安全设置**


  | 密码设置 | 描述 | 11g 默认值 | 10g 默认值 |

  | :--- | :--- | :--- | :--- |

  | `FAILED_LOGIN_ATTEMPTS` | 锁定模式前允许的失败登录尝试次数。 | 10 次 | 10 次 |

  | `PASSWORD_GRACE_TIME` | 密码过期后所有者仍可使用旧密码登录的天数。 | 7 天 | 无限制 |

  | `PASSWORD_LIFE_TIME` | 密码有效天数。 | 180 天 | 无限制 |

  | `PASSWORD_LOCK_TIME` | 达到`FAILED_LOGIN_ATTEMPTS`限制后账户锁定的天数。 | 1 天 | 无限制 |

  | `PASSWORD_REUSE_MAX` | 密码可重用前需要更换的次数。 | 无限制 | 无限制 |

  | `PASSWORD_REUSE_TIME` | 密码可重用前必须经过的天数。 | 无限制 | 无限制 |

  | `PASSWORD_VERIFY_FUNCTION` | 用于验证密码的数据库函数。 | 空 | 空 |




  '
- '# 第 17 章 ■ 数据库管理


  ##### 17-8. 关联一组权限


  ### 问题


  你想将权限分组，以便通过一次操作将它们分配给一个模式。


  ### 解决方案


  首先，以一个具有 `CREATE ROLE` 系统权限的用户身份连接到数据库。接下来创建一个角色，并将你希望分组在一起的系统或对象权限分配给它。此示例使用 `CREATE
  ROLE` 命令创建 `JR_DBA` 角色：


  ```sql

  create role jr_dba;

  ```


  接下来的几行 SQL 将系统权限授予新创建的角色：


  ```sql

  grant select any table to jr_dba;

  grant create any table to jr_dba;

  grant create any view to jr_dba;

  grant create synonym to jr_dba;

  grant create database link to jr_dba;

  ```


  然后，将该角色授予你希望拥有这些权限的任何模式：


  ```sql

  grant jr_dba to lellison;

  grant jr_dba to cphillips;

  ```


  现在，模式 `LELLISON` 和 `CPHILLIPS` 就可以执行诸如创建同义词、视图等任务。作为 DBA 模式，要查看分配了角色的模式，可以查询 `DBA_ROLES_PRIVS`
  视图：


  ```sql

  select grantee, granted_role from dba_role_privs order by 1;

  ```


  要查看授予当前连接用户的角色，可以从 `USER_ROLE_PRIVS` 视图查询：


  ```sql

  select * from user_role_privs;

  ```


  要从角色撤销权限，使用 `REVOKE` 命令：


  ```sql

  revoke create database link from jr_dba;

  ```


  同样，使用 `REVOKE` 命令从模式中移除角色：


  ```sql

  revoke jr_dba from lellison;

  ```


  > **注意**

  >

  > 与其他数据库对象不同，角色没有所有者。角色由分配给它的权限定义。


  ### 工作原理


  数据库*角色*是一组系统或对象权限的逻辑分组，可以分配给模式或其他角色。角色帮助你管理数据库安全性的各个方面。它们还提供了一个中心对象，权限可以分配给它；该角色随后可以被分配给多个用户。


  角色的典型用法是当你需要授予多个用户对另一个用户的表的只读访问权限时。要实现这一点，首先创建一个名为 `SELECT_APP` 的角色：


  ```sql

  create role select_app;

  ```


  接下来，为需要只读访问的每个表授予 `SELECT` TABLE 访问权限。以下代码动态创建一个脚本，为模式中的每个表向指定角色授予 `SELECT` 访问权限：


  ```sql

  CONN &user_name/&password

  DEFINE sel_user=SELECT_APP

  SET LINES 132 PAGES 0 ECHO OFF FEEDBACK OFF VERIFY OFF HEAD OFF TERM OFF TRIMS ON

  SPO gen_grants_dyn.sql

  --

  SELECT ''grant select on '' || table_name || '' to &&sel_user ;''

  FROM user_tables;

  --

  SPO OFF;

  SET ECHO ON FEEDBACK ON VERIFY ON HEAD ON TERM ON;

  --

  @@gen_grants_dyn

  ```


  现在，你可以将 `SELECT_APP` 角色分配给任何需要对拥有表的模式内的表进行只读访问的用户。


  ### PL/SQL 与角色


  如果你使用 PL/SQL，有时在尝试编译过程或函数时会遇到此错误：


  `PL/SQL: ORA-00942: table or view does not exist`


  令你困惑的是，你可以描述该表：


  `SQL> desc app_table;`


  那么为什么 PL/SQL 似乎无法识别该表呢？这是因为 PL/SQL 要求包、过程或函数的所有者必须被显式授予对代码中引用的任何对象的权限。PL/SQL 代码的所有者不能通过角色获得这些授权。


  尝试以 PL/SQL 代码所有者的身份执行：


  `SQL> set role none;`


  现在尝试运行访问该问题表的 SQL 语句：


  `SQL> select count(*) from app_table;`


  如果你不再能访问该表，那么你就是通过角色获得了访问权限。要解决此问题，请显式向 PL/SQL 代码的所有者授予对任何表的访问权限（以表所有者的身份）：


  `SQL> connect owner/pass`

  `SQL> grant select on app_table to proc_owner;`


  现在，你应该能够以 PL/SQL 代码所有者的身份连接并成功编译你的代码。


  ##### 17-9. 创建用户


  ### 问题


  你需要创建一个新用户。


  ### 解决方案


  使用 `CREATE USER` 语句创建用户。此示例创建一个名为 `HEERA` 的用户，密码为 `CHAYA`，并分配默认临时表空间为 `TEMP`，默认表空间为
  `USERS`：


  ```sql

  create user heera identified by chaya

  default tablespace users

  temporary tablespace temp;

  ```


  这会创建一个基本的模式，该模式在数据库中没有任何执行操作的权限。要使该模式有用，必须至少授予其 `CREATE SESSION` 系统权限：


  ```sql

  grant create session to heera;

  ```


  如果新模式需要能够创建表，则需要授予额外的权限，如 `CREATE TABLE`。


  ```sql

  grant create table to heera;

  ```


  新模式还需要在其需要创建对象的任何表空间上授予配额权限：


  ```sql

  alter user heera quota unlimited on users;

  ```


  > **注意**

  >

  > DBA 使用的一个常见技术是将预定义的 `CONNECT` 和 `RESOURCE` 角色授予新创建的模式。这些角色包含诸如 `CREATE SESSION`
  和 `CREATE TABLE`（以及其他一些，因版本而异）之类的系统权限。我们不建议这样做，因为 Oracle 已声明这些角色在未来版本中可能不再可用。


  ### 工作原理


  用户是一个数据库账户，它是允许你登录数据库的机制。你必须具有 `CREATE USER` 系统权限才能创建用户。创建用户时，你建立了初始的安全性和存储属性。这些用户属性可以使用
  `ALTER USER` 语句进行修改。


  你可以通过从 `DBA_USERS` 视图中选择来查看用户信息：


  ```sql

  select username, default_tablespace, temporary_tablespace from dba_users;

  ```


  以下是一些示例输出：


  ```

  USERNAME               DEFAULT_TABLESPACE       TEMPORARY_TABLESPACE

  ---------------------- ------------------------ ------------------------------

  C2R                    USERS                    TEMP

  REP_MV_SEL             USERS                    TEMP

  STAR_SEL               USERS                    TEMP

  SYS                    SYSTEM                   TEMP

  ```


  你所有的用户都应被分配一个已创建为*临时*类型的临时表空间。如果用户的临时表空间是 `SYSTEM`，那么他们所需的任何临时磁盘存储的排序区都将在 `SYSTEM`
  表空间中获取区间。这可能导致 `SYSTEM` 表空间暂时被填满。除了 `SYS` 用户外，你的任何用户都不应将默认表空间设置为 `SYSTEM`。你不希望除
  `SYS` 外的任何用户在 `SYSTEM` 表空间中创建对象。`SYSTEM` 表空间应保留给 `SYS` 用户的对象。


  ##### 17-10. 删除用户


  ### 问题


  你想删除一个用户。


  ### 解决方案


  使用 `DROP USER` 语句删除数据库账户。下一个示例删除用户 `HEERA`：


  ```sql

  drop user heera;

  ```


  如果该用户拥有任何数据库对象，此命令将不起作用。使用 `CASCADE` 子句删除用户并删除其对象：


  ```sql

  drop user heera cascade;

  ```


  > **注意**

  >

  > 如果被删除的用户拥有大量数据库对象，`DROP USER` 语句可能需要异常长的时间才能执行。在这种情况下，你可能需要考虑在删除用户之前先删除该用户的对象。


  ### 工作原理




  当你删除一个用户时，该用户拥有的所有表也将被删除。此外，所有索引、触发器和参照完整性约束都将被移除。如果其他模式中存在依赖于被删除的主键和唯一键约束的参照完整性约束，这些参照约束也将在其他模式中被删除。Oracle
  将使依赖于被删除用户对象的视图、同义词、过程、函数或包失效，但不会删除它们。


  有时你可能会遇到想要删除一个用户，但不确定是否有人在使用它的情况。在这些场景下，更安全的方法是先锁定该用户，看看谁会有反应：

  ```sql

  alter user heera account lock;

  ```

  任何尝试连接到该用户的用户或应用程序现在都将收到此错误：`ORA-28000: the account is locked`


  要查看数据库中的用户和锁定日期，请执行此查询：

  ```sql

  select username, lock_date from dba_users;

  ```

  要解锁账户，请执行此命令：

  ```sql

  alter user heera account unlock;

  ```

  锁定用户是保护数据库安全和发现哪些用户正在被使用的非常便捷的技术。


  ##### 17-11. 修改密码


  ### 问题

  你想修改一个用户的密码。


  ### 解决方案

  使用 `ALTER USER` 命令来修改现有用户的密码。此示例将 `HEERA` 用户的密码更改为 `foobar`：

  ```sql

  alter user heera identified by foobar;

  ```

  只有当你的用户被授予了 `ALTER USER` 权限时，你才能更改其他账户的密码。此权限被授予 `DBA` 角色。


  ### 工作原理

  更改用户密码后，该用户后续连接数据库时必须使用 `ALTER USER` 语句更改后的密码。


  在 Oracle Database 11g 或更高版本中，修改密码时默认区分大小写。有关如何禁用密码大小写敏感性的详细信息，请参阅配方 17-12。如果你使用的是
  Oracle Database 10g 或更低版本，密码不区分大小写。


  ### SQL*Plus PASSWORD 命令

  你可以使用 `SQL*Plus` 的 `PASSWORD` 命令更改用户密码。（与所有 `SQL*Plus` 命令一样，它可以缩写。）系统将提示你输入新密码：

  ```

  SQL> passw heera

  Changing password for heera

  New password:

  Retype new password:

  Password changed

  ```

  此方法的优点是可以在屏幕上不显示新密码的情况下更改用户密码。


  ##### 17-12. 强制密码复杂性


  ### 问题

  你想确保你的数据库用户创建的密码不会被黑客轻易猜到。


  ### 解决方案

  以 `SYS` 模式身份运行以下脚本：

  ```

  SQL> @?/rdbms/admin/utlpwdmg

  Function created.

  Profile altered.

  Function created.

  ```

  对于 Oracle Database 11g，将 `DEFAULT` 配置文件的 `PASSWORD_VERIFY_FUNCTION` 设置为 `verify_function_11G`：

  ```sql

  alter profile default limit PASSWORD_VERIFY_FUNCTION verify_function_11G;

  ```

  对于 Oracle Database 10g，将 `DEFAULT` 配置文件的 `PASSWORD_VERIFY_FUNCTION` 设置为 `VERIFY_Function`：

  ```sql

  alter profile default limit PASSWORD_VERIFY_FUNCTION verify_function;

  ```

  如果出于任何原因需要退出新的安全设置，运行此语句以禁用密码函数：

  ```sql

  alter profile default limit PASSWORD_VERIFY_FUNCTION null;

  ```


  ### 工作原理

  启用后，密码验证函数可确保用户正确创建或修改其密码。`utlpwdmg.sql` 脚本创建一个函数来检查密码，确保其满足基本安全标准，如最短密码长度、密码不能与用户名相同，等等。在
  Oracle Database 11g 中，密码安全 PL/SQL 函数名为 `VERIFY_FUNCTION_11G`。


  一旦这个 PL/SQL 函数在 `SYS` 模式中创建，就可以将其分配给配置文件的 `PASSWORD_VERIFY_FUNCTION` 参数。




  '
- "# 第 18 章 对象管理\n\n本章重点介绍用于管理数据库对象的 SQL 技术，包括表、索引、视图和同义词等对象类型。用于创建和修改对象的 SQL 语句通常被称为数据定义语言（DDL）语句。管理\
  \ DDL 是数据库管理员日常工作的一部分。DBA 经常生成和修改 DDL 脚本来构建开发、测试、预生产和生产数据库。因此，DBA 需要特别擅长编写 DDL。\n\
  \n有些人会争辩说，只有数据库管理员才应该维护和管理 DDL，开发人员不应该插手模式管理。然而，现实情况是，开发人员常常发现自己身处需要编写和维护 DDL 的环境中。例如，你可能在一个没有\
  \ DBA 的团队工作，或者你已经创建了自己的个人数据库用于开发和测试。在这些情况下，开发人员需要执行数据库管理任务，因此必须熟悉编写 DDL 语句。\n\n\
  本章不会涵盖所有可用的对象操作语句。相反，它重点介绍最常遇到的用户对象及其管理方法。我们将首先看基本的表创建和修改语句，然后逐步介绍其他典型的对象维护任务。\n\
  \n##### 18-1. 创建表\n\n### 问题\n\n你想执行创建表的基本任务。\n\n### 解决方案\n\n毫无疑问，你使用`CREATE TABLE`命令来完成此任务。以下是一个简单的例子：\n\
  ```\ncreate table d_sources(\n    d_source_id number not null,\n    source_type\
  \ varchar2(32),\n    create_dtt date default sysdate not null,\n    update_dtt timestamp(5)\n\
  );\n```\n\n这段代码只创建了基本列定义的表，如果你赶时间，这通常就足够了。如果不指定任何表空间信息，表将在分配给你用户账户的默认表空间中创建。\n\n\
  查询`USER_TABLES`以查看当前连接账户内的表的元数据。从`ALL_TABLES`中选择以显示你的账户已被授予访问权限的表的信息。使用`DBA_TABLES`视图显示数据库中所有表的信息。\n\
  \n> **注意** 为什么使用`VARCHAR2`数据类型而不是`VARCHAR`数据类型？Oracle 是这么说的。尽管`VARCHAR`目前与`VARCHAR2`同义，但文档指出未来`VARCHAR`将被重新定义为单独的数据类型。\n\
  \n### 工作原理\n\nOracle 表是一个灵活且功能丰富的数据存储容器。如果你在 Oracle 文档中查找`CREATE TABLE`命令，你会发现大约七十页的细节。当你真正需要的只是一些好的例子时，翻阅冗长的文档可能令人生畏。\n\
  \n以下代码展示了创建表时最常用的功能。例如，这个 DDL 定义了主键、外键和表空间信息：\n```\ncreate table computer_systems(\n\
  \    computer_system_id number(38, 0) not null,\n    agent_uuid varchar2(256),\n\
  \    operating_system_id number(19, 0) not null,\n    hardware_model varchar2(50),\n\
  \    create_dtt date default sysdate not null,\n    update_dtt date,\n    constraint\
  \ computer_systems_pk primary key (computer_system_id)\n        using index tablespace\
  \ inv_mgmt_index\n) tablespace inv_mgmt_data;\n\n--\n\ncomment on column computer_systems.computer_system_id\
  \ is\n    'Surrogate key generated via an Oracle sequence.';\n\n--\n\ncreate unique\
  \ index computer_system_uk1 on computer_systems(agent_uuid)\n    tablespace inv_mgmt_index;\n\
  \n--\n\nalter table computer_systems add constraint computer_systems_fk1\n    foreign\
  \ key (operating_system_id)\n    references operating_systems(operating_system_id);\n\
  ```\n\n在表和索引创建语句中，请注意我们没有指定任何表物理空间属性。我们只为表和索引指定了表空间。如果没有指定表级空间属性，表将从表空间继承其空间属性。这简化了表的管理和维护。\n\
  \n让表从表空间继承其物理空间属性是一个好主意。如果你有需要不同物理空间属性的表，你可以创建单独的表空间来容纳具有不同需求的表。例如，你可以创建一个`DATA_LARGE`表空间，其扩展大小为\
  \ 16M，以及一个`DATA_SMALL`表空间，其扩展大小为 128K。（关于扩展和其他逻辑结构的讨论见第 10 章，创建表空间的示例见配方 17-4。）\n\
  \n##### 18-2. 临时存储数据\n\n### 问题\n\n你想临时存储查询结果，以便会话稍后使用。\n\n### 解决方案\n\n使用`CREATE\
  \ GLOBAL TEMPORARY TABLE`语句创建一个仅临时存储数据的表。\n\n你可以指定临时表是保留数据直至会话结束还是直至事务提交。使用`ON COMMIT\
  \ PRESERVE ROWS`指定数据应在用户会话结束时删除。在此例中，行将被保留，直到用户显式删除数据或用户终止会话：\n```\ncreate global\
  \ temporary table today_regs\n    on commit preserve rows\n    as select * from\
  \ f_registrations\n    where create_dtt > sysdate - 1;\n```\n\n指定`ON COMMIT DELETE\
  \ ROWS`表示数据应在事务结束时删除。\n\n以下示例创建了一个名为`TEMP_OUTPUT`的临时表，并指定记录应在每个提交的事务结束时删除：\n```\n\
  create global temporary table temp_output(temp_row varchar2(30))\n    on commit\
  \ delete rows;\n```\n\n> **注意** 如果你没有为全局临时表指定提交方法，则默认是`ON COMMIT DELETE ROWS`。\n\
  \n你可以创建一个临时表并授予其他用户访问它的权限。但是，一个会话只能查看它自己插入到表中的数据。换句话说，如果两个会话使用同一个临时表，一个会话无法选择另一个会话插入到临时表中的任何数据。\n\
  \n### 工作原理\n\n全局临时表对于需要在表结构中短暂存储数据的应用程序非常有用。\n\n\n"
- '# 全局临时表


  全局临时表存储仅存在于会话或事务期间的会话私有数据。一旦创建了临时表，它就会一直存在，直到你将其删除为止。换句话说，临时表的定义是永久的；只是其中的数据是短暂的。


  你可以通过查询 `DBA/ALL/USER_TABLES` 的 `TEMPORARY` 列来查看一个表是否是临时表：

  ```sql

  select table_name, temporary from user_tables;

  ```

  临时表在 `TEMPORARY` 列中标记为 `Y`。普通表在 `TEMPORARY` 列中标记为 `N`。


  当你在临时表中创建记录时，空间是在你的默认临时表空间中分配的。你可以通过运行以下 SQL 语句来验证这一点：

  ```sql

  select username, contents, segtype from v$sort_usage;

  ```

  如果你正在处理大量行，并且在选择性地检索行时需要更好的性能，你可能需要考虑在临时表的相应列上创建索引：

  ```sql

  create index temp_index on temp_output(temp_row);

  ```

  使用 `DROP TABLE` 命令来删除临时表：

  ```sql

  drop table temp_output;

  ```


  ## 临时表与重做


  对全局临时表的数据块所做的更改不会生成重做数据。但是，针对临时表的事务会生成回滚数据。由于回滚数据会产生重做，因此与临时表的事务相关联会有一些重做数据。你可以通过启用统计跟踪（更多详情请参见技巧
  19-7）并在向临时表插入记录时查看重做大小来验证这一点：

  ```sql

  SQL> set autotrace on

  ```

  接下来向临时表中插入几条记录：

  ```sql

  insert into temp_output values(1);

  insert into temp_output values(1);

  ```

  以下是部分输出片段（仅显示重做大小）：`140 redo size`


  临时表的重做负载小于普通表，因为生成的重做仅与临时表事务的回滚数据相关。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- "# 第 18 章 ■ 对象管理\n\n##### 18-3. 移动表\n\n### 问题\n你需要将一个表移动到不同的表空间。\n\n### 解决方案\n使用\
  \ `ALTER TABLE MOVE` 语句将表从一个表空间移动到另一个表空间。此示例将 `PARTIES` 表移动到 `MTS` 表空间。\n```sql\n\
  alter table parties move tablespace mts;\n```\n你可以通过查询 `USER_TABLES` 来验证表是否已移动：\n\
  ```sql\nselect table_name, tablespace_name from user_tables where table_name='PARTIES';\n\
  ```\n```\nTABLE_NAME           TABLESPACE_NAME\n-------------------- --------------------\n\
  PARTIES              MTS\n```\n\n### 工作原理\n有时你需要将表从一个表空间移动到另一个表空间。可能存在管理问题，或者表的使用方式与最初预期不同，出于组织上的考虑，将表放在不同的表空间更合理。\n\
  \n当你移动一个表时，它的所有索引都会变得不可用。这是因为表的索引结构中包含 `ROWID`。表的 `ROWID` 包含有关物理位置的信息。由于当表从一个表空间移动到另一个表空间时，表的\
  \ `ROWID` 会发生变化（因为表行现在物理上位于不同的数据文件中），表上的任何索引都包含不正确的信息。要重建索引，请使用 `ALTER INDEX ...\
  \ REBUILD` 命令。\n\n#### Oracle Rowid\n每个表中的每一行都有一个地址。行的地址由以下组合确定：\n* 数据文件号\n* 块号\n\
  * 行在块内的位置\n* 对象号\n\n可以通过查询 `ROWID` 伪列来显示表中某一行的地址。例如：\n```sql\nselect rowid, emp_id\
  \ from emp;\n```\n这是一些示例输出：\n```\nROWID              EMP_ID\n------------------\
  \ ----------\nAAAFWXAAFAAAAlWAAA 1\n```\n`ROWID` 伪列值并非物理存储在数据库中。Oracle 在你查询时计算其值。`ROWID`\
  \ 内容显示为 base 64 值，可包含字符 `A-Z`、`a-z`、`0-9`、`+` 和 `/`。你可以通过 `DBMS_ROWID` 包将 `ROWID`\
  \ 值转换为有意义的信息。\n\n例如，要显示行存储所在的相对文件号，请执行以下语句：\n```sql\nselect dbms_rowid.rowid_relative_fno(rowid),\
  \ emp_id from emp;\n```\n这是一些示例输出：\n```\nDBMS_ROWID.ROWID_RELATIVE_FNO(ROWID) EMP_ID\n\
  ------------------------------------ ----------\n5                             \
  \       1\n```\n`ROWID` 值可用于 SQL 语句的 `SELECT` 和 `WHERE` 子句中。在大多数情况下，`ROWID` 唯一标识一行。但是，不同表中的行可能存储在同一个簇中，因此可能包含具有相同\
  \ `ROWID` 的行。\n\n##### 18-4. 重命名对象\n\n### 问题\n你的模式中有一个过时的表。在删除该表之前，你想先重命名它，看看是否有人会抱怨无法再访问它。\n\
  \n### 解决方案\n使用 `ALTER TABLE ... RENAME` 语句重命名表。此示例将表从 `PRODUCTS` 重命名为 `PRODUCTS_OLD`：\n\
  ```sql\nalter table products rename to products_old;\n```\n在你确定该表不再被使用后，可以将其删除：\n\
  ```sql\ndrop table products_old;\n```\n> **注意** 有关删除表的完整详细信息，请参见技巧 18-5。\n\n###\
  \ 工作原理\n在 Oracle 中，你可以重命名许多不同的对象，例如：\n* 表\n* 列\n* 索引\n* 约束\n* 触发器\n\n在删除表之前重命名它是一种常见做法，因为它为你提供了一种快速恢复的方法，以防该表仍在被使用。重命名对象的另一个好理由是确保它符合你的数据库命名标准。\n\
  \n以下是一些简短的示例，展示了如何重命名其他对象类型。以下代码将 `PRODUCTS` 表的列之一从 `PRODUCT_ID` 重命名为 `PRODUCT_NO`：\n\
  ```sql\nalter table products rename column product_id to product_no;\n```\n下一行将索引从\
  \ `PRODID` 重命名为 `PROD_IDX1`：\n```sql\nalter index prodid rename to prod_idx1;\n\
  ```\n同样地，你可以重命名约束。下一行代码将约束从 `MAST_CON` 重命名为 `MAST_FK1`：\n```sql\nalter table details\
  \ rename constraint mast_con to mast_fk1;\n```\n下一个示例将触发器从 `F_SHIPMENTS_BU_TR1`\
  \ 重命名为 `F_AU_TR2`：\n```sql\nalter trigger f_shipments_bu_tr1 rename to f_au_tr2;\n\
  ```\n请注意，在同一个模式中创建两个同名的对象是可能的。例如，你可以在同一个模式中创建一个表和一个索引，并赋予它们相同的名称。但是，你不能在同一个模式中创建一个表和一个视图并赋予它们相同的名称。\n\
  \n要理解哪些对象可以在模式内以相同名称创建（或哪些不能），你必须理解命名空间的概念。*命名空间* 是模式内对象的分组，其中不能有两个对象具有相同的名称。模式内不同分组（即不同命名空间）中的对象可以具有相同的名称。\n\
  \n以下对象在模式内共享相同的命名空间：\n* 表\n* 视图\n* 物化视图\n* 私有同义词\n* 序列\n* 存储过程\n* 函数\n* 包\n* 用户定义类型\n\
  \n以下每个对象在模式内都有自己的命名空间：\n* 索引\n* 约束\n* 触发器\n* 簇\n* 私有数据库链接\n* 维度\n\n因此，创建一个与函数或过程同名的触发器是可能的。然而，表和视图位于同一个命名空间中，因此不能同名。每个模式对于其拥有的对象都有自己的命名空间。因此，两个不同的模式可以创建同名的表。\n\
  \n这些对象在数据库中各自拥有自己的命名空间：\n* 角色\n* 公共同义词\n* 公共数据库链接\n* 表空间\n* 配置文件\n* 初始化文件 (`spfile`\
  \ 和 `init.ora`)\n\n\n因为之前对象的命名空间不包含在模式内，所以这些对象必须在整个数据库中具有唯一的名称。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 18 章 ■ 对象管理\n\n##### 18-5. 删除表\n\n#### 问题\n\n你想从用户中移除一个对象，例如表。\n\n#### 解决方案\n\
  \n使用 `DROP TABLE` 语句来删除表。此示例删除了一个名为 `INVENTORY` 的表：\n```sql\ndrop table inventory;\n\
  ```\n你应该会看到以下确认信息：\n```sql\nTable dropped.\n```\n如果你尝试删除一个其主键或唯一键被子表中的外键引用的表，你会看到类似这样的错误：\n\
  ```sql\nORA-02449: unique/primary keys in table referenced by foreign keys\n```\n\
  你需要么删除被引用的外键约束，要么在删除父表时使用 `CASCADE CONSTRAINTS` 选项：\n```sql\ndrop table inventory\
  \ cascade constraints;\n```\n\n#### 工作原理\n\n你必须是表的所有者或拥有 `DROP ANY TABLE` 系统权限才能删除表。如果你有\
  \ `DROP ANY TABLE` 权限，你可以在表名前加上模式名来删除不同模式中的表：\n```sql\ndrop table inv_mgmt.inventory;\n\
  ```\n如果表名前没有用户名，Oracle 会假定你要删除当前用户中的表。\n\n如果你正在使用 `RECYCLEBIN` 功能，`DROP TABLE` 会在逻辑上将表标记为已删除并重命名它。重命名后的表被放入一个称为\
  \ `RECYCLEBIN` 的逻辑容器中。该表会保留在你的 `RECYCLEBIN` 中，直到你手动移除它或 Oracle 需要空间给其他对象。这意味着，与被删除表相关的空间直到你清空\
  \ `RECYCLEBIN` 后才会被释放。如果你想清空 `RECYCLEBIN` 的全部内容，请使用 `PURGE RECYCLEBIN` 语句：\n```sql\n\
  SQL> purge recyclebin;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n如果你想绕过 `RECYCLEBIN` 功能并永久删除一个表，请使用 `DROP TABLE` 语句的 `PURGE` 选项：\n```sql\ndrop\
  \ table inventory purge;\n```\n如果你使用 `PURGE` 选项，表将被永久删除。你将无法使用 `FLASHBACK TABLE`\
  \ 语句（详情参见配方 18-6）来恢复该表。该表使用的所有空间都会被释放，所有相关的索引和触发器也会被删除。\n\n##### 18-6. 撤消删除表\n\n\
  #### 问题\n\n你不小心删除了一个表，并希望恢复它。\n\n#### 解决方案\n\n首先确认你想要恢复的表是否在回收站中：\n```sql\nSQL>\
  \ show recyclebin;\n```\n```\nORIGINAL NAME RECYCLEBIN NAME OBJECT TYPE DROP TIME\n\
  ---------------- ------------------------------ ------------ -------------------\n\
  PURCHASES BIN$YzqK0hN3Fh/gQHdAPLFgMA==$0 TABLE 2009-02-18:17:23:15\n```\n接下来，使用\
  \ `FLASHBACK TABLE...TO BEFORE DROP` 语句来恢复被删除的表：\n```sql\nflashback table purchases\
  \ to before drop;\n```\n> **注意** 你不能对在 `SYSTEM` 表空间中创建的表执行 `FLASHBACK TABLE...TO\
  \ BEFORE DROP`。\n\n#### 工作原理\n\n在 Oracle 数据库 10*g* 及更高版本中，当发出 `DROP TABLE` 语句时，表实际上被重命名（重命名为以\
  \ `BIN$` 开头的名称）并放入回收站。回收站是一种机制，允许你查看与被删除对象相关联的一些元数据。你可以通过查询 `DBA_SEGMENTS` 来查看有关重命名对象的完整元数据：\n\
  ```sql\nselect segment_name, segment_type, tablespace_name\nfrom dba_segments\n\
  where segment_name like 'BIN%';\n```\n```\nSEGMENT_NAME SEGMENT_TYPE TABLESPACE_NAME\n\
  ------------------------------ ------------------ ---------------\nBIN$YzqK0hN4Fh/gQHdAPLFgMA==$0\
  \ TABLE MTS\n```\n`FLASHBACK TABLE` 语句只是简单地将表重命名回其原始名称。默认情况下，在 Oracle 数据库 10*g*\
  \ 及更高版本中，`RECYCLEBIN` 功能是启用的。你可以通过将 `RECYCLEBIN` 初始化参数设置为 `OFF` 来更改默认设置。\n\n我们建议你不要禁用\
  \ `RECYCLEBIN` 功能。保持此功能启用并清空 `RECYCLEBIN` 以移除你想要永久删除的对象更安全。如果你想永久删除一个表，请使用 `DROP\
  \ TABLE` 语句的 `PURGE` 选项。\n\n##### 18-7. 创建索引\n\n#### 问题\n\n你遇到了性能问题。你已经识别出一个用作搜索条件的高选择性列。你想在表上添加一个索引。\n\
  \n#### 解决方案\n\nOracle 中的默认索引类型是 B 树（平衡树）索引。要在现有表上创建 B 树索引，请使用 `CREATE INDEX` 语句。此示例在\
  \ `D_SOURCES` 表上创建了一个索引，指定 `D_SOURCE_ID` 作为列：\n```sql\ncreate index d_sources_idx1\
  \ on d_sources(d_source_id);\n```\n默认情况下，Oracle 会尝试在你的默认表空间中创建索引。使用以下语法指示 Oracle\
  \ 在特定表空间中构建索引：\n```sql\ncreate index d_sources_idx1 on d_sources(d_source_id) tablespace\
  \ dim_index;\n```\n如果你没有为索引指定任何物理存储属性，索引将从表空间继承其属性。这通常是管理索引存储的一种可接受的方法。\n\n要查看索引元数据信息，请查询\
  \ `DBA_INDEXES`、`USER_INDEXES` 或 `ALL_INDEXES` 数据字典视图。例如，此查询显示当前连接用户的所有索引信息：\n```sql\n\
  select\n  table_name\n  ,index_name\n  ,index_type\n  ,tablespace_name\n  ,status\n\
  from user_indexes\norder by table_name;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n#### 是否重建索引\n\n在过去（大约版本 7 左右），为了性能，DBA 们会定期地重建索引。几乎每个 DBA 都有一个类似于下面列出的脚本，该脚本使用\
  \ SQL 为模式生成重建索引所需的 SQL：\n```sql\nSPO ind_build_dyn.sql\nSET HEAD OFF PAGESIZE 0\
  \ FEEDBACK OFF;\nSELECT 'ALTER INDEX ' || index_name || ' REBUILD;'\nFROM user_indexes;\n\
  SPO OFF;\nSET FEEDBACK ON;\n```\n然而，对于较新版本的 Oracle，重建索引是否能带来任何形式的性能提升是值得商榷的。更多详情请参考\
  \ Oracle 的 My Oracle Support（以前称为 MetaLink）网站。特别是，文档 ID 555284.1 包含一个脚本，用于检测索引是否可能需要重建。\n\
  \n#### 工作原理\n\n索引是一个可选的数据库对象，主要用于提高性能。Oracle 中的索引工作原理很像书末尾的索引，它将页码与感兴趣的信息关联起来。在书中查找信息时，通常先查看索引，然后转到感兴趣的页面要快得多。如果没有索引，你将不得不扫描书的每一页来查找信息。\n\
  \n索引是与表分开的对象，可以独立于表创建和删除。就像表一样，索引需要存储空间。此外，索引会带来一些开销，因为 Oracle 必须在关联表中插入、更新或删除数据时维护索引。因此，只有在你确定索引能提高性能时才应添加索引。有关提高\
  \ SQL 查询性能的详细信息，请参见第 19 章。\n\n索引定义与表和列相关联。索引结构存储了行的 `ROWID` 和构建索引所基于的列数据的映射。`ROWID`\
  \ 通常唯一标识数据库中的一行。`ROWID` 包含物理定位一行的信息（数据文件、块和行在块中的位置）。\n\n\n\n默认情况下，当你在 Oracle 中创建索引时，其类型将是平衡的\
  \ B-tree 结构。图 18-1 展示了一个在名字列上创建的 B-tree 索引的平衡树状结构。当 Oracle 访问该索引时，它从称为`root block`的顶部节点开始。它使用此块来确定接下来要读取哪个二级块。二级块指向多个叶节点，这些叶节点包含一个`ROWID`和名字值。在此结构中，需要三次\
  \ I/O 操作才能找到`ROWID`。一旦确定了`ROWID`，Oracle 将使用它来读取包含该`ROWID`的表块。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![Image 33](img/index-465_1.png)\n\n![Image 34](img/index-465_2.png)\n\n![Image\
  \ 35](img/index-465_3.png)\n\n![Image 36](img/index-465_4.png)\n\n![Image 37](img/index-465_5.png)\n\
  \n![Image 38](img/index-465_6.png)\n\n![Image 39](img/index-465_7.png)\n\n![Image\
  \ 40](img/index-465_8.png)\n\n![Image 41](img/index-465_9.png)\n\n![Image 42](img/index-465_10.png)\n\
  \n![Image 43](img/index-465_11.png)\n\n"
- '# 第 18 章 ■ 对象管理


  *图 18-1. 平衡的 B-tree 索引结构*


  ## 为表和索引使用独立的表空间


  数据库管理员们对于将表和索引分离到不同表空间中的优劣存在争论。如果你有从头开始设置存储系统的条件，并且能够设置拥有独立磁盘和控制器组的挂载点，那么通过指定表建立在基于一个挂载点上数据文件的表空间中，而索引建立在基于另一个独立挂载点上数据文件的表空间中，你可能会看到一些
  I/O 性能上的好处。


  然而，如今常见的实际情况是，你的存储管理员只会给你存储区域网络（SAN）中的一大块存储空间，并且无法保证数据和索引会物理地存储在不同的磁盘（和控制器）上。尽管如此，将索引表空间与表表空间分离仍然有一些合理的理由：


  • 你可能希望为表和索引实现不同的物理存储特性（例如区大小），并且你更倾向于让表和索引从表空间继承其存储属性。


  • 你倾向于拥有能够分别备份、恢复和还原表表空间和索引表空间的选项。


  • 在运行维护报告时，你发现当报告按表空间分段时，管理表和索引更为容易。


  如果这些原因中任何一个对你的环境有效，那么值得付出额外的努力来为表和索引使用不同的表空间。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 18 章 ■ 对象管理


  ##### 18-8. 创建基于函数的索引


  ### 问题


  你正在运行这条 SQL 查询：


  ```

  select emp_name from emp where UPPER(emp_name) = ''DAVE'';

  ```


  你已经在 `EMP_NAME` 列上创建了一个普通的 B-tree 索引，但你注意到，当你对 `EMP_NAME` 列应用 `UPPER` 函数时，Oracle
  并未使用该索引。你想知道是否可以创建一个 Oracle 会使用的索引。


  ### 解决方案


  创建一个基于函数的索引，以提高在 `WHERE` 子句中使用了 SQL 函数的查询的性能。此示例在 `UPPER(EMP_NAME)` 上创建了一个基于函数的索引：


  ```

  create index user_upper_idx on emp(upper(emp_name));

  ```


  为什么要使用基于函数的索引？因为这是 Oracle 在此场景下唯一会使用的索引类型。如果你在 `WHERE` 子句中对列应用 SQL 函数，Oracle 将忽略该列上的常规索引。


  ### 工作原理


  基于函数的索引允许在 SQL 查询的 `WHERE` 子句中对函数引用的列进行索引查找。基于函数的索引可以像前面的示例那样简单，也可以基于存储在 PL/SQL
  函数中的复杂逻辑。


  任何用户创建的 SQL 函数在用于基于函数的索引之前，必须声明为 `deterministic`（确定性）。确定性意味着对于一组给定的输入，函数总是返回相同的结果。当你创建一个希望用于基于函数的索引的用户定义函数时，必须使用关键字
  `DETERMINISTIC`。


  从 `DBA/ALL/USER_IND_EXPRESSIONS` 视图中选择，以显示与基于函数的索引相关的 SQL：


  ```

  select index_name, column_expression from user_ind_expressions;

  ```


  如果你正在从 SQL*Plus 运行此 SQL，请不要忘记使用 `SET LONG` 命令，以便显示 `COLUMN_EXPRESSION` 列的完整内容。例如：


  ```

  SQL> set long 500

  ```


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 18 章 ■ 对象管理


  ##### 18-9. 创建位图索引


  ### 问题


  你已经在数据仓库中构建了一个星型模式。你希望确保连接事实表和维度表的 SQL 查询能高效地返回数据。


  ### 解决方案


  在用于连接事实表和维度表的列上创建位图索引。位图索引通过使用 `CREATE INDEX` 语句的关键字 `BITMAP` 来创建。此示例在 `F_DOWNLOADS`
  表的 `D_DATE_ID` 列上创建了一个位图索引：


  ```

  create bitmap index f_down_date_fk1 on f_downloads(d_date_id);

  ```


  如果你的事实表是分区的，你必须将位图索引创建为本地分区索引。通过指定 `LOCAL` 关键字来实现：


  ```

  create bitmap index f_down_date_fk1 on f_downloads(d_date_id) local;

  ```


  ### 工作原理


  位图索引在数据仓库环境中被广泛使用，通常用于事实表的外键列。位图索引不太适合具有多会话 DML 活动的 OLTP 环境。这是因为对于位图索引列，位图索引的内部结构通常要求在更新时锁定许多行。因此，如果有多个会话执行
  `UPDATES`、`INSERTS` 和 `DELETES`，你将遇到锁和死锁问题。


  数据仓库环境中的位图索引通常根据需要删除并重新创建。


  通常，在加载大量数据之前，会删除位图索引，然后在表填充后重新创建。为了提高创建位图索引的性能，你可以通过 `NOLOGGING` 选项关闭重做日志的生成：


  ```

  create bitmap index f_down_date_fk1 on f_downloads(d_date_id) local nologging;

  ```


  由于索引可以轻松重建，因此通常没有理由为 `CREATE INDEX` 操作生成重做日志。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- "# 第 18 章 ■ 对象管理\n\n##### 18-10. 创建索引组织表\n\n### 问题\n\n你有一个主要通过基于主键或主键值范围的查询来访问表数据的应用程序。你希望高效地查询此表。\n\
  \n### 解决方案\n\n当表数据通常通过主键查询访问时，索引组织表（IOT）是高效的对象。使用 `ORGANIZATION INDEX` 子句来创建索引组织表：\n\
  \n```\ncreate table prod_sku\n(prod_sku_id number,\n sku varchar2(256),\n create_dtt\
  \ timestamp(5),\n constraint prod_sku_pk primary key(prod_sku_id)\n )\norganization\
  \ index\nincluding sku\npctthreshold 30\ntablespace inv_mgmt_data\noverflow\ntablespace\
  \ mts;\n```\n\n### 工作原理\n\n索引组织表将表行的全部内容存储在 B-tree 索引结构中。索引组织表为那些在主键上进行精确匹配和/或范围搜索的查询提供了快速访问。\n\
  \n`INCLUDING` 子句指定了哪些列开始存储在溢出数据段中。在前面的示例中，`SKU` 和 `CREATE_DTT` 列存储在溢出段中。\n\n`PCTTHRESHOLD`\
  \ 指定了为索引组织表行在索引块中保留的空间百分比。此值可以是 1 到 50，如果未指定值，则默认为 50。索引块中必须有足够的空间来存储主键。\n\n`OVERFLOW`\
  \ 子句详细说明了应使用哪个表空间来存储溢出数据段。\n\n\n\n你会注意到，在创建索引组织表（IOT）时，所使用的表名会在 `DBA/ALL/USER_TABLES`\
  \ 中有一条记录。此外，在 `DBA/ALL/USER_INDEXES` 中也会有一条记录，其名称是指定的主键约束名。对于索引组织表，`INDEX_TYPE`\
  \ 列的值将为 `IOT - TOP`：\n\n```sql\nselect index_name,table_name,index_type from user_indexes;\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 18 章 ■ 对象管理\n\n\
  以下是输出示例：\n\n```text\nINDEX_NAME TABLE_NAME INDEX_TYPE\n\n-------------------- --------------------\
  \ ---------------------------\n\nPROD_SKU_PK PROD_SKU IOT - TOP\n```\n\n##### 18-11.\
  \ 创建视图\n\n#### 问题\n你想要存储一个经常运行的 SQL 查询。\n\n#### 解决方案\n使用 `CREATE VIEW` 命令来创建视图。以下代码创建一个视图（如果视图已存在，则替换它），该视图从\
  \ `SALES` 表中选择一部分列和行：\n\n```sql\ncreate or replace view sales_rockies as\n\nselect\
  \ sales_id, amnt, state\n\nfrom sales\n\nwhere state in ('CO','UT','WY','ID','AZ');\n\
  ```\n\n现在，你可以像对待表一样对待 `SALES_ROCKIES` 视图。只从一个表中选择的视图称为简单视图。拥有该视图访问权限的模式可以执行其拥有对象权限的任何\
  \ `SELECT`、`INSERT`、`UPDATE` 或 `DELETE` 操作，并且 DML 操作会导致底层表数据被更改。\n\n如果你想只允许更改视图范围内的底层表数据，则指定\
  \ `WITH CHECK OPTION`：\n\n```sql\ncreate or replace view sales_rockies as\n\nselect\
  \ sales_id, amnt, state\n\nfrom sales\n\nwhere state in ('CO','UT','WY','ID','AZ')\n\
  \nwith check option;\n```\n\n使用 `WITH CHECK OPTION` 意味着你只能插入或更新那些会被视图查询返回的行。例如，以下更新语句会成功，因为我们没有以会导致其不被视图返回的方式更改底层数据：\n\
  \n```sql\nupdate sales_rockies set state='CO' where sales_id=160;\n```\n\n然而，接下来的这个更新语句将失败，因为它试图将\
  \ `STATE` 列更新为一个无法通过视图选取的值：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 18 章 ■ 对象管理\n\n```sql\nupdate sales_rockies set state='CA' where sales_id=160;\n\
  ```\n\n如果你不希望用户能够对视图执行 `INSERT`、`UPDATE` 或 `DELETE` 操作，那么就不要授予该用户对底层表的那些对象权限。如果你不希望拥有底层表（或拥有修改表数据权限）的账户能够通过视图更改底层表数据，请使用\
  \ `WITH READ ONLY` 子句创建视图：\n\n```sql\ncreate or replace view sales_rockies as\n\n\
  select sales_id, amnt, state\n\nfrom sales\n\nwhere state in ('CO','UT','WY','ID','AZ')\n\
  \nwith read only;\n```\n\n如果你需要修改视图所基于的 SQL 查询，那么可以先删除再重新创建它，或者像前面的例子那样使用 `CREATE\
  \ OR REPLACE` 语法。`CREATE OR REPLACE` 方法的优点是，你无需为先前已授予权限的用户重新建立对视图的访问权限。如果你删除并重新创建视图，则需要向先前被授予对该已删除和重建对象访问权限的任何用户或角色重新授予权限。\n\
  \n`注意` 有一个 `ALTER VIEW` 命令用于修改视图的约束属性。你也可以使用 `ALTER VIEW` 命令来重新编译视图。\n\n#### 工作原理\n\
  你可以将视图视为存储在数据库中的 SQL 语句。当你从视图中查询时，Oracle 会在数据字典中查找视图定义，执行视图所基于的查询，并返回结果。换句话说，视图是建立在其他表和/或视图之上的逻辑表。视图用于：\n\
  -   创建一种高效的存储 SQL 查询以供重用的方法。\n-   在应用程序和物理表之间提供一个接口层。\n-   向应用程序隐藏 SQL 查询的复杂性。\n\
  -   仅向用户报告列和/或行的子集。\n\n\n\n"
- '# 第 18 章 ■ 对象管理


  ##### 18-12. 为对象创建别名


  ### 问题


  你已被授予访问其他用户表的权限。你想知道是否有一种方法可以为这些表创建一个指针，这样每次访问表时就不必在表名前加上模式名。


  ### 解决方案


  使用 `CREATE SYNONYM` 命令为其他数据库对象创建别名。以下示例为属于 `INV_MGMT` 用户的名为 `INV` 的表创建了一个同义词：


  ```sql

  create or replace synonym inv for inv_mgmt.inv;

  ```


  一旦创建了 `INV` 同义词，你就可以直接操作 `INV_MGMT.INV` 表。如果已授予对 `INV_MGMT.INV` 表的 `select` 访问权限，你现在就可以通过引用同义词
  `INV` 进行选择。例如：


  ```sql

  select * from inv;

  ```


  创建同义词并不会创建访问对象的权限。此类权限必须单独授予，通常在创建同义词之前完成。


  ### 工作原理


  创建一个指向其他对象的同义词，消除了指定对象所属模式或名称的需要。这让你能在对象和用户之间创建一个抽象层，通常称为对象透明性。同义词允许你将对象与访问对象的用户分开进行透明管理。


  例如，你可以使用同义词在一个数据库内设置多个应用环境。每个环境都有自己的同义词，指向不同用户的对象，允许你在同一个数据库内对几个完全不同的模式运行完全相同的代码。你可能需要这样做，因为你无法负担为开发、测试、质量保证、生产等分别构建独立的服务器或数据库。


  你可以为以下类型的数据库对象创建同义词：

  - 表

  - 视图或对象视图

  - 其他同义词

  - 通过数据库链接的远程对象

  - PL/SQL 包、过程和函数

  - 物化视图

  - 序列

  - Java 类模式对象

  - 用户定义的对象类型


  你还可以将同义词定义为 `public`，这意味着数据库中的任何用户都可以访问该同义词。有时，懒惰（或缺乏经验的）数据库管理员会这样做：


  ```sql

  grant all on books to public;


  create public synonym books for inv_mgmt.books;

  ```


  现在，任何能连接到数据库的用户都可以对存在于 `INV_MGMT` 模式中的 `BOOKS` 表执行任何 `INSERT`、`UPDATE`、`DELETE`
  或 `SELECT` 操作。DBA 可能会倾向于这样做，这样他们就不必为每个需要访问的模式单独设置授权和同义词。


  这几乎总是一个坏主意。使用 `public` 同义词存在几个问题：

  - 如果你没有意识到全局定义（`public`）的同义词，故障排除可能会很困难。

  - 共享一个数据库的应用程序，如果多个应用程序使用在数据库内不唯一的 `public` 同义词，可能会发生对象名冲突。

  - 安全性应按需管理，而不是批发式地授予。


  有时，为需要私有同义词的模式动态生成所有表或视图的同义词很有用。以下脚本使用 SQL*Plus 命令来格式化并捕获一个 SQL 脚本的输出，该脚本为模式内的所有表生成同义词：


  ```sql

  CONNECT &&master_user/&&master_pwd.@&&tns_alias

  --

  SET LINESIZE 132 PAGESIZE 0 ECHO OFF FEEDBACK OFF VERIFY OFF HEAD OFF TERM OFF TRIMSPOOL
  ON

  --

  SPO gen_syns_dyn.sql

  --

  select ''create synonym '' || table_name || '' for '' || ''&&master_user..'' ||

  table_name || '';''

  from user_tables;

  --

  SPO OFF;

  --

  ```


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ### 只要用户对视图拥有 `select` 访问权限，他们就可以执行以下 SQL 语句来显示该视图所基于的 SQL：


  ```sql

  select text from all_views where view_name like upper(''&view_name'');

  ```


  如果你从 SQL*Plus 运行此 SQL，请使用 `SET LONG` 命令以显示整个视图。例如：


  ```

  SQL> set long 5000

  ```




