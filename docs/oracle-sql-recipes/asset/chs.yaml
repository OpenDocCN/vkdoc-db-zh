  \ Cambrault 个人，但仍保留其下属员工，则过滤条件应放在`WHERE`子句中，如下所示：\n\n```sql\nselect employee_id,\
  \ level,\nlpad(' ',(level-1)*3) || last_name || ', ' || first_name full_name\nfrom\
  \ employees\nwhere not (last_name = 'Cambrault' and first_name = 'Gerald')\nstart\
