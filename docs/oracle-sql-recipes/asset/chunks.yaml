    **The Dual Table**


    The DUAL table comes in handy in many situations. It is available in every version
    of Oracle from the last 20


    years, and contains one row and one column. It is handy when you want to return
    a row when you don’t have to retrieve data from any particular table—you just
    want to return a value. You would also use the DUAL table to perform an ad-hoc
    calculation using a built-in function, as in this example: select sqrt(144) from
