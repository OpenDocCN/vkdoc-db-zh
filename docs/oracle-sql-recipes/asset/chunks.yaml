    # 第一章


    ■ ■ ■


    ## 基础知识


    本章提供了许多基础的“配方”，帮助你开始——或重温旧日记忆——掌握 SQL 语句的核心构建块。我们将为你展示从 Oracle 数据库表中选择、更改和删除数据的配方，以及执行此类工作时通常需要包含的一些常用选项。


    对于那些已扎实掌握 SQL 的读者，可以随意以**自选**的方式深入阅读本章。我们在这个早期阶段包含了一两个巧妙的配方，以确保你能从第一章开始就从《Oracle
    SQL 配方》中获得最大收益。继续使用菜单的比喻，你可以按任何顺序享用本书中的配方，并跨章节混合搭配代码片段和技术，从而衍生出你自己的配方。


    ■ **注意** 我们将快速讲解基础知识，并省略诸如语法图示和讨论每个配方选项的每一种排列组合等细节。如果你看到立即无法理解的命令和技术，请不要烦恼。在 Oracle
    测试实例中亲自尝试它们，以获得直观感受，并且请记住，像《Begining Oracle SQL》（de Haan, Fink, Jørgensen, Morton）和《Beginning
    SQL Queries》（Churcher）这样的配套书籍有助于学习 SQL 本身。

