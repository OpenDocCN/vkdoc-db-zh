    # 第 6 章 ■ 处理日期和时间值


    ## 工作原理


    我们的方法通过创建一个名为 `DAY_SOURCE` 的内联视图来实现，该视图包含了 1998 年 6 月的每一天，并以此作为外部表与 `SH.PROMOTIONS`
    表进行 `LEFT OUTER JOIN`（左外连接）。


    我们可以从内到外来审视这个方法，以便更好地理解。内部的 `SELECT` 语句使用 `DUAL` 表和 `CONNECT BY LEVEL` 来创建一个非常简单的虚拟表。如果我们单独运行内部的
    `SELECT` 语句，如下所示，你会立刻明白这个结构是多么简单。


    ```

    select to_date(''01-JUN-98'') + rownum - 1 as Day_Row

    from dual

    connect by level <= 30

    ```


    `SELECT` 子句乍看可能有些复杂，但实际上相当简单。我们使用 `TO_DATE` 函数将字符串 `''01-JUN-98''` 转换为有效的 Oracle
    `DATE` 数据类型。然后，我们执行简单的日期运算，将伪列 `ROWNUM` 的值加到日期上，再减去一。我们的方法这样做是为了确保生成的第一个日期不是当月的第二天。我们本可以使用
    `TO_DATE(''31-MAY-98'') + ROWNUM`，但在日期中包含“五月（May）”的函数，粗略一看并不能立刻让人联想到是在生成六月的日期。随着
    `CONNECT BY LEVEL` 为每一行执行其工作，我们构建出了一个完整的日期视图，其缩略形式如下所示。


    ```

    DAY_ROW

    01-JUN-98

    02-JUN-98

    03-JUN-98

    …

    29-JUN-98

    30-JUN-98

    ```


    这个包含给定月份所有日期的内联视图，被用来解决我们的真实数据因某些天没有活动而导致缺失多种日期的问题。报告促销活动开始的传统方法是对条目进行 `COUNT`（计数）并按日期
    `GROUP BY`（分组），如下一条 SQL 语句所示。


    ```

    select promo_begin_date, count(*)

    from sh.promotions

    where promo_begin_date between ''01-JUN-98'' and ''30-JUN-98''

    group by promo_begin_date

    order by promo_begin_date;

    ```


    我们的结果看起来不错，但我们看不到 6 月 4 日、5 日、7 日以及其他日期的值。


    ```

    PROMO_BEGIN_DATE COUNT(*)

    ---------------- ----------

    01-JUN-98 3

    02-JUN-98 6

    03-JUN-98 7

    06-JUN-98 1

    11-JUN-98 6

    ```


    此时，我们方法中 `LEFT OUTER JOIN` 的用意就显而易见了。我们将包含所有相关日期的内联视图与 `SH.PROMOTIONS` 表中存在的日期连接起来。然后我们
    `COUNT`（计数）每个 `PROMO_BEGIN_DATE`（促销开始日期）的出现次数，这会在给定日期有促销开始时返回正确的数量，而在没有促销发生时返回零。


