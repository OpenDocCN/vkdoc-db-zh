    ## 7-4. Searching for a Pattern


    ### Problem


    Some of the strings you want to search can’t be searched using constants; your
    search criteria include anchoring your search at the beginning or end of a line,
    ignoring whitespace characters, matching an exact number of appearances of a character
    or string, or specifying a range of characters in a character list.


    ### Solution


    Although `INSTR` may satisfy some of the requirements in the problem statement,
    `REGEXP_INSTR` provides the most flexibility for your string searches. In this
    example, you want to find all employees in the `EMPLOYEES` table whose last name
    satisfies these criteria:


    - Begins with the characters A, B, C, or D

    - Contains at least two non-consecutive lowercase “a” characters

    - Can contain embedded spaces

    - Ends in the “t” character


    Here is a list of the first 25 names, alphabetically, in the `EMPLOYEES` table:


    ```sql

    select employee_id, last_name, first_name

    from employees

    order by last_name;

    ```


    EMPLOYEE_ID LAST_NAME FIRST_NAME

    ---------------------- ------------------------- --------------------

    174 Abel Ellen

    166 Ande Sundar

    130 Atkinson Mozhe

    105 Austin David

    204 Baer Hermann

    116 Baida Shelli

    167 Banda Amit

    172 Bates Elizabeth

    192 Bell Sarah

    151 Bernstein David

    129 Bissot Laura

    169 Bloom Harrison

    185 Bull Alexis

    187 Cabrio Anthony

    154 Cambrault Nanette

    148 Cambrault Gerald

    110 Chen John

    188 Chung Kelly

    119 Colmenares Karen

    142 Davies Curtis

    102 De Haan Lex

    186 Dellinger Julia

    189 Dilly Jennifer

    160 Doran Louise

    104 Ernst Bruce

    147 Errazuriz Alberto

    . . .


    To satisfy the requirements of the solution, you can use this query:


    ```sql

    select employee_id, last_name, first_name

    from employees

    where regexp_instr(last_name,''^[A-D][[:alpha:] ]*a[^a]+a[[:alpha:] ]*t$'') >
    0

    order by last_name, first_name

    ;

    ```


    EMPLOYEE_ID LAST_NAME FIRST_NAME

    ------------------ ----------------- ------------------

    148 Cambrault Gerald

    154 Cambrault Nanette

    2 rows selected


    Although `REGEXP_INSTR` can perform all tasks that `INSTR` can, you can still
    use `INSTR` if your search does not require pattern matching and you want to make
    your code more readable. `INSTR` will also perform a slight bit more efficiently
    than `REGEXP_INSTR`, but the performance benefits should be considered only in
    the most computation-intensive applications where string manipulation is the primary
    function of the application.


    ### How It Works


    Understanding regular expressions may seem daunting at first, until you break
    the regular expressions down into their individual components. Regular expressions
    (also known as *patterns*) are the mainstay of the Unix or Linux command line
    when you use the `egrep` command or write a `PERL` script. They consist of two
    types of characters: regular characters and special *metacharacters*. One or more
    regular characters match those same characters in the strings to be searched.
    For example, `cat` matches the string `cat` or `caterer` or `scat`. Extra characters
    in the target string don’t really matter. As long as the target string (such as
    “caterer”) contains the pattern (for example, “cat”), the result will be a match.


    The most common regular expressions you will see include the metacharacters in
    Table 7-1. For example, `ca?t` matches `cat` or `cart`, `cat|dog` matches either
    `cat` or `dog` in the string, and `d[oi]g` matches `dog` or `dig`.


    **Table 7-1.** Regular Expression Metacharacters


    | Metacharacter Operator | Name | Description |

    |------------------------|------|-------------|

    | . (Dot)                | Any Character | |'
