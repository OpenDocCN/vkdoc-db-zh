- fmt: '# CHAPTER 17 ■ DATABASE ADMINISTRATION


    ## How It Works


    我们建议您在创建所有表空间时都使用 `EXTENT MANAGEMENT LOCAL` 来指定每个表空间在本地管理其区。本地管理的表空间在数据文件中使用位图映像来高效地确定一个区是否被使用。对于本地管理的表空间，存储参数
    `NEXT`、`PCTINCREASE`、`MINEXTENTS`、`MAXEXTENTS` 和 `DEFAULT STORAGE` 对区选项无效。


    在创建表空间时，您还应使用 `UNIFORM SIZE`，它告诉 Oracle 使每个区大小相同（当对象（如表和索引）需要空间时）。


    `SEGMENT SPACE MANAGEMENT AUTO` 子句指示 Oracle 管理块内的空间。使用此子句时，无需指定诸如 `PCTUSED`、`FREELISTS`
    和 `FREELIST GROUPS` 之类的参数。


    如果您创建具有 `AUTOEXTEND` 功能的表空间，我们还建议您指定一个 `MAXSIZE`，这样失控的 SQL 进程就不会无意中填满表空间，进而填满挂载点。以下是一个创建自动扩展表空间并限制其最大大小的示例：


    ```

    create tablespace users

    datafile ''/ora01/oradata/INVREP/users_01.dbf''

    size 100m

    autoextend on maxsize 1000m

    extent management local

    uniform size 128k

    segment space management auto;

    ```


    在不同的环境中使用 `CREATE TABLESPACE` 脚本时，能够对脚本的部分进行参数化是很有用的。例如，在开发中，您可能将数据文件大小设为 100MB，而在生产环境中，数据文件可能为
    5,000MB。使用 `&` 变量可以使 `CREATE` 脚本更易于移植。下一个列表在脚本顶部定义了 `&` 变量，这些变量决定了为表空间创建的数据文件的大小：


    ```

    define tbsp_large=1000M

    define tbsp_med=500M

    --

    create tablespace exp_data

    datafile ''/ora01/oradata/INVREP/exp_data01.dbf''

    size &&tbsp_large

    autoextend on maxsize 1000m

    extent management local

    uniform size 128k

    segment space management auto;

    --

    create tablespace reg_data

    datafile ''/ora01/oradata/INVREP/reg_data01.dbf''

    size &&tbsp_med

    autoextend on maxsize 1000m

    extent management local

    uniform size 128k

    segment space management auto;

    ```


    使用 `&` 变量允许您修改脚本一次，并在整个脚本中重用这些变量。


    您还可以从 SQL*Plus 命令行将值传递给 `&` 变量到 `CREATE TABLESPACE` 脚本中。为此，首先在脚本顶部定义 `&` 变量以接受传入的值：


    ```

    define tbsp_large=&1

    define tbsp_med=&2

    -- the rest of the script goes here...

    ```


    现在您可以从 SQL*Plus 命令行向脚本传递变量。以下示例执行一个名为 `cretbsp.sql` 的脚本并传递两个值，这些值将分别将 `&` 变量设置为
    `1000m` 和 `500m`：


    ```

    SQL> @cretbsp 1000m 500m

    ```


    ### 17-5\. Dropping a Tablespace


    **Problem**


    您想要删除一个表空间。


    **Solution**


    如果需要删除表空间，请使用 `DROP TABLESPACE` 语句。我们建议您在删除表空间之前先将其脱机。将表空间脱机可确保没有 SQL 语句正在操作该表空间中的对象。


    此示例首先将 `INV_DATA` 表空间脱机，然后使用 `INCLUDING CONTENTS AND DATAFILES` 子句将其删除：


    ```

    alter tablespace inv_data offline;

    drop tablespace inv_data including contents and datafiles;

    ```


    **■ Note** 无论表空间是在线还是脱机，您都可以删除它。`SYSTEM` 表空间是个例外，它无法被删除。


    **How It Works**


    使用 `INCLUDING CONTENTS AND DATAFILES` 删除表空间将永久删除该表空间及其任何数据文件。在删除表空间之前，请确保该表空间不包含您想要保留的任何数据。


    如果要删除的表空间包含一个具有主键的表，而该主键被另一个不同表空间中的表的外键约束引用，您将无法删除该表空间。您可以选择删除约束，或者使用 `DROP TABLESPACE`
    语句的 `CASCADE CONSTRAINTS` 子句：


    ```

    drop tablespace inv_data including contents and datafiles cascade constraints;

    ```


    此语句将删除被删除表空间之外的、引用被删除表空间内表的所有参照完整性约束。


    ### 17-6\. Adjusting Tablespace Size


    **Problem**


    当尝试向表中插入数据时，出现此错误：`ORA-01653: unable to extend table INVENTORY by 128 in tablespace
    INV_IDX`


    您确定需要向与该表关联的表空间添加更多空间。


    **Solution**


    调整表空间大小有两种常用技术：

    * 增加（或减少）现有数据文件的大小

    * 添加一个额外的数据文件


    在调整数据文件大小之前，您应首先使用类似于以下的查询验证其当前位置和大小：


    ```

    select name, bytes from v$datafile;

    ```


    确定要调整大小的数据文件后，使用 `ALTER DATABASE DATAFILE ... RESIZE` 命令增加其大小。此示例将数据文件大小调整为 1GB：


    ```

    alter database datafile ''/ora01/oradata/INVREP/reg_data01.dbf'' resize 1g;

    ```


    要向现有表空间添加数据文件，请使用 `ALTER TABLESPACE ... ADD DATAFILE` 语句：


    ```

    alter tablespace reg_data add datafile ''/ora01/oradata/INVREP/reg_data02.dbf''
    size 100m;

    ```


    **How It Works**


    在管理具有高事务负载的数据库时，调整数据文件大小可能是一项日常任务。增加现有数据文件的大小允许您在不添加更多数据文件的情况下向表空间添加空间。如果包含现有数据文件的存储设备上没有足够的磁盘空间，您可以将一个数据文件添加到现有表空间的不同位置。


    您还可以修改现有数据文件以打开或关闭 `AUTOEXTEND`。下一个示例修改一个数据文件以启用 `AUTOEXTEND`，最大大小为 `1000MB`：


    ```

    alter database datafile ''/ora01/oradata/INVREP/reg_data02.dbf''

    autoextend on maxsize 1000m;

    ```


    许多 DBA 不愿意启用 `AUTOEXTEND`，因为他们担心如果错误的 SQL `INSERT` 语句执行多次，存储设备可能会被填满。DBA 会选择实现监控脚本，在表空间即将变满时提醒他们，而不是启用
    `AUTOEXTEND`。


    如果您想向临时表空间添加空间，首先查询 `V$TEMPFILE` 视图以验证临时数据文件的当前位置和大小：


    ```

    select name, bytes from v$tempfile;

    ```


    接下来使用 `ALTER DATABASE` 语句的 `TEMPFILE` 选项：


    ```

    alter database tempfile ''/ora01/oradata/INVREP/temp01.dbf'' resize 500m;

    ```


    您也可以通过 `ALTER TABLESPACE` 语句向临时表空间添加文件：


    ```

    alter tablespace temp add tempfile ''/ora01/oradata/INVREP/temp02.dbf'' size 5000m;

    ```


    ### 17-7\. Limiting Database Resources per Session


    **Problem**


    您希望限制用户在您的数据库中可以消耗的资源量。


    **Solution**


    首先，您需要确保数据库的 `RESOURCE_LIMIT` 初始化参数设置为 `TRUE`。您可以在初始化文件（`init.ora` 或 `spfile`）中完成此操作，也可以使用
    `ALTER SYSTEM` 命令。'
  raw: 'create tablespace inv_data


    datafile ''/ora02/RMDB11/invdata01.dbf''


    size 100m


    extent management local


    uniform size 256k


    segment space management auto;


    This statement creates a file named invdata01.dbf in the /ora02/RMDB11 directory
    that is 100


    megabytes in size. You’ll see this message if the CREATE TABLESPACE statement
    runs correctly: Tablespace created.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 17 ■ DATABASE ADMINISTRATION


    How It Works


    We recommend you create all tablespaces with EXTENT MANAGEMENT LOCAL to specify
    that each tablespace manage its extents locally. A locally managed tablespace
    uses a bitmap image within the datafile to efficiently determine if an extent
    is in use or not. The storage parameters NEXT, PCTINCREASE, MINEXTENTS, MAXEXTENTS,
    and DEFAULT STORAGE are not valid for extent options in locally managed tablespaces.


    You should also use a UNIFORM SIZE when creating a tablespace, which tells Oracle
    to make each extent the same size (as space is needed by objects such as tables
    and indexes).


    The SEGMENT SPACE MANAGEMENT AUTO clause instructs Oracle to manage the space
    within the block.


    When you use this clause there is no need to specify parameters such as PCTUSED,
    FREELISTS, and FREELIST GROUPS.


    If you create a tablespace with the AUTOEXTEND feature, we recommend that you
    also specify a MAXSIZE so that a runaway SQL process doesn’t inadvertently fill
    up a tablespace that in turn fills up a mount point. Here’s an example of creating
    an autoextending tablespace with a cap on its maximum size:


    create tablespace users


    datafile ''/ora01/oradata/INVREP/users_01.dbf''


    size 100m


    autoextend on maxsize 1000m


    extent management local


    uniform size 128k


    segment space management auto;


    When using CREATE TABLESPACE scripts in different environments, it’s useful to
    be able to parameterize portions of the script. For example, in development, you
    may size the datafiles at 100MB, whereas in production the datafiles may be 5,000MB.
    Use ampersand variables to make CREATE scripts more portable. The next listing
    defines ampersand variables at the top of the script, and those variables determine
    the sizes of datafiles created for the tablespaces:


    define tbsp_large=1000M


    define tbsp_med=500M


    --


    create tablespace exp_data


    datafile ''/ora01/oradata/INVREP/exp_data01.dbf''


    size &&tbsp_large


    autoextend on maxsize 1000m


    extent management local


    uniform size 128k


    segment space management auto;


    --


    create tablespace reg_data


    datafile ''/ora01/oradata/INVREP/reg_data01.dbf''


    size &&tbsp_med


    autoextend on maxsize 1000m


    extent management local


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 17 ■ DATABASE ADMINISTRATION


    uniform size 128k


    segment space management auto;


    Using ampersand variables allows you to modify the script once and have the variables
    reused throughout the script.


    You can also pass the values to the ampersand variables into the CREATE TABLESPACE
    script from the SQL*Plus command line. To accomplish this, first define at the
    top of the script the ampersand variables to accept the values being passed in:


    define tbsp_large=&1


    define tbsp_med=&2


    -- the rest of the script goes here...


    Now you can pass in variables to the script from the SQL*Plus command line. The
    following example executes a script named cretbsp.sql and passes in two values
    that will set the ampersand variables to 1000m and 500m respectively:


    SQL> @cretbsp 1000m 500m


    17-5\. Dropping a Tablespace


    Problem


    You want to drop a tablespace.


    Solution


    If you need to drop a tablespace, use the DROP TABLESPACE statement. We recommend
    that you first take the tablespace offline before you drop it. Taking a tablespace
    offline ensures that no SQL statements are operating against objects in that tablespace.


    This example first takes the INV_DATA tablespace offline and then drops it using
    the INCLUDING


    CONTENTS AND DATAFILES clause:


    alter tablespace inv_data offline;


    drop tablespace inv_data including contents and datafiles;


    ■ **Note** You can drop a tablespace whether it is online or offline. The exception
    to this is the SYSTEM tablespace, which cannot be dropped.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 17 ■ DATABASE ADMINISTRATION


    How It Works


    Dropping a tablespace using INCLUDING CONTENTS AND DATAFILES will permanently
    remove a tablespace and any of its datafiles. Make certain the tablespace doesn’t
    contain any data you want to keep before you drop it.


    If the tablespace to be dropped contains a table with a primary key that is referenced
    by a foreign key constraint from a table in a different tablespace, you will not
    be able to drop the tablespace. You can either drop the constraint or use the
    CASCADE CONSTRAINTS clause of the DROP TABLESPACE statement: drop tablespace inv_data
    including contents and datafiles cascade constraints; This statement will drop
    any referential integrity constraints from tables outside of the tablespace being
    dropped that reference tables within the dropped tablespace.


    17-6\. Adjusting Tablespace Size


    Problem


    You’re getting this error when attempting to insert data into a table: ORA-01653:
    unable to extend table INVENTORY by 128 in tablespace INV_IDX


    You determine that you need to add more space to the tablespace associated with
    the table.


    Solution


    There are two common techniques for resizing a tablespace:


    • Increasing (or decreasing) the size of an existing datafile


    • Adding an additional datafile


    Before you resize a datafile, you should first verify its current size and location
    using a query similar to this:


    select name, bytes from v$datafile;


    Once you determine which datafile you want to resize, use the ALTER DATABASE DATAFILE
    ... RESIZE


    command to increase its size. This example resizes the datafile to one gigabyte:
    alter database datafile ''/ora01/oradata/INVREP/reg_data01.dbf'' resize 1g; To
    add a datafile to an existing tablespace, use the ALTER TABLESPACE ... ADD DATAFILE
    statement: alter tablespace reg_data add datafile


    ''/ora01/oradata/INVREP/reg_data02.dbf'' size 100m;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 17 ■ DATABASE ADMINISTRATION


    How It Works


    Resizing datafiles can be a daily task when managing databases with heavy transaction
    loads. Increasing the size of an existing datafile allows you to add space to
    a tablespace without adding more datafiles. If there isn’t enough disk space left
    on the storage device that contains an existing datafile, you can add a datafile
    in a different location to an existing tablespace.


    You can also modify an existing datafile to turn AUTOEXTEND on and off. This next
    example modifies a datafile to AUTOEXTEND with a maximum size of 1000MB:


    alter database datafile ''/ora01/oradata/INVREP/reg_data02.dbf''


    autoextend on maxsize 1000m;


    Many DBAs are uncomfortable enabling AUTOEXTEND because they worry that a storage
    device could fill up if an erroneous SQL INSERT statement executes a large number
    of times. Instead of enabling AUTOEXTEND, DBAs will implement monitoring scripts
    that alert them when a tablespace is becoming full.


    If you want to add space to a temporary tablespace, first query the V$TEMPFILE
    view to verify the current size and location of temporary datafiles:


    select name, bytes from v$tempfile;


    Next use the TEMPFILE option of the ALTER DATABASE statement:


    alter database tempfile ''/ora01/oradata/INVREP/temp01.dbf'' resize 500m; You
    can also add a file to a temporary tablespace via the ALTER TABLESPACE statement:
    alter tablespace temp add tempfile ''/ora01/oradata/INVREP/temp02.dbf'' size 5000m;
    17-7\. Limiting Database Resources per Session


    Problem


    You want to limit the amount of resources a user can consume in your database.


    Solution


    First you need to ensure that the RESOURCE_LIMIT initialization parameter is set
    to TRUE for your database.


    You can do this either in the initialization file (init.ora or spfile) or use
    the ALTER SYSTEM command.'
  trans: '# 第 17 章 ■ 数据库管理


    ## 工作原理


    我们建议您在创建所有表空间时，都使用 `EXTENT MANAGEMENT LOCAL` 来指定每个表空间在本地管理其区。本地管理的表空间在数据文件中使用位图映像，以高效地确定一个区是否被使用。对于本地管理的表空间，存储参数
    `NEXT`、`PCTINCREASE`、`MINEXTENTS`、`MAXEXTENTS` 和 `DEFAULT STORAGE` 对区选项无效。


    在创建表空间时，您还应使用 `UNIFORM SIZE`，它告诉 Oracle 使每个区的大小相同（当对象，如表和索引，需要空间时）。


    `SEGMENT SPACE MANAGEMENT AUTO` 子句指示 Oracle 管理块内的空间。使用此子句时，无需指定诸如 `PCTUSED`、`FREELISTS`
    和 `FREELIST GROUPS` 之类的参数。


    如果您创建具有 `AUTOEXTEND` 功能的表空间，我们还建议您指定一个 `MAXSIZE`，这样失控的 SQL 进程就不会无意中填满表空间，进而填满挂载点。以下是一个创建自动扩展表空间并限制其最大大小的示例：


    ```

    create tablespace users

    datafile ''/ora01/oradata/INVREP/users_01.dbf''

    size 100m

    autoextend on maxsize 1000m

    extent management local

    uniform size 128k

    segment space management auto;

    ```


    在不同的环境中使用 `CREATE TABLESPACE` 脚本时，能够对脚本的部分进行参数化是很有用的。例如，在开发中，您可能将数据文件大小设为 100MB，而在生产环境中，数据文件可能为
    5,000MB。使用 `&` 变量可以使 `CREATE` 脚本更易于移植。下一个列表在脚本顶部定义了 `&` 变量，这些变量决定了为表空间创建的数据文件的大小：


    ```

    define tbsp_large=1000M

    define tbsp_med=500M

    --

    create tablespace exp_data

    datafile ''/ora01/oradata/INVREP/exp_data01.dbf''

    size &&tbsp_large

    autoextend on maxsize 1000m

    extent management local

    uniform size 128k

    segment space management auto;

    --

    create tablespace reg_data

    datafile ''/ora01/oradata/INVREP/reg_data01.dbf''

    size &&tbsp_med

    autoextend on maxsize 1000m

    extent management local

    uniform size 128k

    segment space management auto;

    ```


    使用 `&` 变量允许您修改脚本一次，并在整个脚本中重用这些变量。


    您还可以从 SQL*Plus 命令行将值传递给 `&` 变量到 `CREATE TABLESPACE` 脚本中。为此，首先在脚本顶部定义 `&` 变量以接受传入的值：


    ```

    define tbsp_large=&1

    define tbsp_med=&2

    -- 脚本的其余部分在此处...

    ```


    现在您可以从 SQL*Plus 命令行向脚本传递变量。以下示例执行一个名为 `cretbsp.sql` 的脚本并传递两个值，这些值将分别将 `&` 变量设置为
    `1000m` 和 `500m`：


    ```

    SQL> @cretbsp 1000m 500m

    ```


    ### 17-5. 删除表空间


    **问题**


    您想要删除一个表空间。


    **解决方案**


    如果需要删除表空间，请使用 `DROP TABLESPACE` 语句。我们建议您在删除表空间之前先将其脱机。将表空间脱机可确保没有 SQL 语句正在操作该表空间中的对象。


    此示例首先将 `INV_DATA` 表空间脱机，然后使用 `INCLUDING CONTENTS AND DATAFILES` 子句将其删除：


    ```

    alter tablespace inv_data offline;

    drop tablespace inv_data including contents and datafiles;

    ```


    **■ 注意** 无论表空间是在线还是脱机，您都可以删除它。`SYSTEM` 表空间是个例外，它无法被删除。


    **工作原理**


    使用 `INCLUDING CONTENTS AND DATAFILES` 删除表空间将永久删除该表空间及其任何数据文件。在删除表空间之前，请确保该表空间不包含您想要保留的任何数据。


    如果要删除的表空间包含一个具有主键的表，而该主键被另一个不同表空间中的表的外键约束引用，您将无法删除该表空间。您可以选择删除约束，或者使用 `DROP TABLESPACE`
    语句的 `CASCADE CONSTRAINTS` 子句：


    ```

    drop tablespace inv_data including contents and datafiles cascade constraints;

    ```


    此语句将删除被删除表空间之外的、引用被删除表空间内表的所有参照完整性约束。


    ### 17-6. 调整表空间大小


    **问题**


    当尝试向表中插入数据时，出现此错误：`ORA-01653: unable to extend table INVENTORY by 128 in tablespace
    INV_IDX`


    您确定需要向与该表关联的表空间添加更多空间。


    **解决方案**


    调整表空间大小有两种常用技术：

    * 增加（或减少）现有数据文件的大小

    * 添加一个额外的数据文件


    在调整数据文件大小之前，您应首先使用类似于以下的查询验证其当前位置和大小：


    ```

    select name, bytes from v$datafile;

    ```


    确定要调整大小的数据文件后，使用 `ALTER DATABASE DATAFILE ... RESIZE` 命令增加其大小。此示例将数据文件大小调整为 1GB：


    ```

    alter database datafile ''/ora01/oradata/INVREP/reg_data01.dbf'' resize 1g;

    ```


    要向现有表空间添加数据文件，请使用 `ALTER TABLESPACE ... ADD DATAFILE` 语句：


    ```

    alter tablespace reg_data add datafile ''/ora01/oradata/INVREP/reg_data02.dbf''
    size 100m;

    ```


    **工作原理**


    在管理具有高事务负载的数据库时，调整数据文件大小可能是一项日常任务。增加现有数据文件的大小允许您在不添加更多数据文件的情况下向表空间添加空间。如果包含现有数据文件的存储设备上没有足够的磁盘空间，您可以将一个数据文件添加到现有表空间的不同位置。


    您还可以修改现有数据文件以打开或关闭 `AUTOEXTEND`。下一个示例修改一个数据文件以启用 `AUTOEXTEND`，最大大小为 `1000MB`：


    ```

    alter database datafile ''/ora01/oradata/INVREP/reg_data02.dbf''

    autoextend on maxsize 1000m;

    ```


    许多 DBA 不愿意启用 `AUTOEXTEND`，因为他们担心如果错误的 SQL `INSERT` 语句执行多次，存储设备可能会被填满。DBA 会选择实现监控脚本，在表空间即将变满时提醒他们，而不是启用
    `AUTOEXTEND`。


    如果您想向临时表空间添加空间，首先查询 `V$TEMPFILE` 视图以验证临时数据文件的当前位置和大小：


    ```

    select name, bytes from v$tempfile;

    ```


    接下来使用 `ALTER DATABASE` 语句的 `TEMPFILE` 选项：


    ```

    alter database tempfile ''/ora01/oradata/INVREP/temp01.dbf'' resize 500m;

    ```


    您也可以通过 `ALTER TABLESPACE` 语句向临时表空间添加文件：


    ```

    alter tablespace temp add tempfile ''/ora01/oradata/INVREP/temp02.dbf'' size 5000m;

    ```


    ### 17-7. 限制每个会话的数据库资源


    **问题**


    您希望限制用户在您的数据库中可以消耗的资源量。


    **解决方案**


    首先，您需要确保数据库的 `RESOURCE_LIMIT` 初始化参数设置为 `TRUE`。您可以在初始化文件（`init.ora` 或 `spfile`）中完成此操作，也可以使用
    `ALTER SYSTEM` 命令。'
- fmt: '# CHAPTER 17 ■ DATABASE ADMINISTRATION


    Issue the following SQL statement to view the current setting of `RESOURCE_LIMIT`
    in your database:

    ```sql

    select name, value from v$parameter where name=''resource_limit'';

    ```


    Use the `CREATE PROFILE` command to create a resource-limiting profile. You can
    then assign that profile to any existing database users. The following SQL statement
    creates a profile that limits resources, such as the amount of CPU an individual
    session can consume:

    ```sql

    create profile user_profile_limit

    limit

    sessions_per_user 20

    cpu_per_session 240000

    logical_reads_per_session 1000000

    connect_time 480

    idle_time 120;

    ```


    After a profile has been created, you can assign it to a user. In the next example,
    user `HEERA` is assigned the `USER_PROFILE_LIMIT`:

    ```sql

    alter user heera profile user_profile_limit;

    ```


    ■ `Note` Oracle recommends you use Database Resource Manager to manage database
    resource limits. However, we find database profiles (implemented via SQL) to be
    an effective and easy mechanism for limiting resources.


    ## How It Works


    Oracle database profiles are used for two main reasons:


    *   Setting resource limits

    *   Enforcing password security settings


    When creating a user, if no profile is specified, the `DEFAULT` profile is assigned
    to the newly created user. You can modify a profile with the `ALTER PROFILE` statement.
    The next example modifies the `DEFAULT` profile to limit the `CPU_PER_SESSION`
    to 240000 (in hundredths of seconds):

    ```sql

    alter profile default limit cpu_per_session 240000;

    ```


    This limits any user with the `DEFAULT` profile to 2400 seconds of CPU use. There
    are various limits you can set in a profile. Table 17-1 describes the database
    resource settings that can be limited via a profile.


    **Table 17-1. Database Resource Profile Settings**


    | Profile resource | Meaning |

    | :--- | :--- |

    | `COMPOSITE_LIMIT` | Limit based on weighted sum algorithm for these resources:
    `CPU_PER_SESSION`, `CONNECT_TIME`, `LOGICAL_READS_PER_SESSION`, and `PRIVATE_SGA`.
    |

    | `CONNECT_TIME` | Connect time in minutes. |

    | `CPU_PER_CALL` | CPU time limit per call in hundredths of seconds. |

    | `CPU_PER_SESSION` | CPU time limit per session in hundredths of seconds. |

    | `IDLE_TIME` | Idle time in minutes. |

    | `LOGICAL_READS_PER_CALL` | Blocks read per call. |

    | `LOGICAL_READS_PER_SESSION` | Blocks read per session. |

    | `PRIVATE_SGA` | Amount of space consumed in shared pool. |

    | `SESSIONS_PER_USER` | Number of concurrent sessions. |


    As part of the `CREATE USER` statement, you can specify a profile other than `DEFAULT`:

    ```sql

    create user heera identified by foo profile user_profile_limit;

    ```


    A profile is also used to enforce password security settings (see Table 17-2 for
    descriptions of password profile settings). For example, say you wanted to alter
    the `DEFAULT` profile so that there was a cap on the maximum number of days a
    password can be used. This next line of code sets the `PASSWORD_LIFE_TIME` of
    the `DEFAULT` profile to 300 days:

    ```sql

    alter profile default limit password_life_time 300;

    ```


    **Table 17-2. Password Security Settings**


    | Password Setting | Description | 11g default | 10g default |

    | :--- | :--- | :--- | :--- |

    | `FAILED_LOGIN_ATTEMPTS` | Number of failed login attempts before schema is locked.
    | 10 attempts | 10 attempts |

    | `PASSWORD_GRACE_TIME` | Number of days after a password expires that owner can
    login with old password. | 7 days | Unlimited |

    | `PASSWORD_LIFE_TIME` | Number of days password is valid. | 180 days | Unlimited
    |

    | `PASSWORD_LOCK_TIME` | Number of days account is locked after `FAILED_LOGIN_ATTEMPTS`
    has been reached. | 1 day | Unlimited |

    | `PASSWORD_REUSE_MAX` | Number of days before a password can be reused. | Unlimited
    | Unlimited |

    | `PASSWORD_REUSE_TIME` | Number of times a password must change before a password
    can be reused. | Unlimited | Unlimited |

    | `PASSWORD_VERIFY_FUNCTION` | Database function used to verify the password.
    | Null | Null |'
