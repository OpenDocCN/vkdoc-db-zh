    最后，为了报告目的，在`SELECT`语句中反转映射非常直接：我们可以使用`CASE`或`DECODE`，并将文本和数值反转。以下是一个示例：


    ```sql

    select order_id, customer_id, order_mode_num,

    case order_mode_num

    when 1 then ''Direct, non-employee''

    when 2 then ''Online''

    when 3 then ''WalMart''

    when 4 then ''Amazon''

    when 5 then ''Direct, employee''

    else ''unknown''

    end order_mode_text

    from orders

    where order_id in (2458,2397,2355,2356)

    ;

    ```


    ORDER_ID CUSTOMER_ID ORDER_MODE_NUM ORDER_MODE_TEXT

    -------------- --------------- ----------------- --------------------

    2355 104 2 Online

    2356 105 2 Online

    2397 102 1 Direct, non-employee

    2458 101 5 Direct, employee


    4 rows selected


    较旧的`DECODE`语句是 Oracle 函数中最基础的、用于将一组值转换为另一组值的函数；你可以将数字代码转换为人类可读的文本值，反之亦然，正如我们在前面的解决方案中所做的那样。`DECODE`自
    Oracle 最早的版本起就已可用。`DECODE`具有可变数量的参数，但这些参数可分为三组：


    *   要转换的列或表达式

    *   一个或多个值对；第一个值是现有值，第二个是转换后的值

    *   如果要转换的列或表达式与任何指定对的第一个值都不匹配时的单个默认值


    以下是使用`DECODE`的`UPDATE`语句：


    ```sql

    update orders

    set order_mode_num =

    decode(order_mode,

    ''direct'',1,

    ''online'',2,

    ''walmart'',3,

    ''amazon'',4,

    0)

    ;

    ```


    105 rows updated


    `DECODE`转换`ORDER_MODE`列的方式与`CASE`相同。如果列中的值与任何常量对的第一个值都不匹配，`DECODE`将返回 0。


    ### 生成随机数据


    **问题**


    你需要生成随机数来模拟那些不遵循可辨识模式的真实世界事件。


    **解决方案**


    使用 Oracle 内置的 PL/SQL 包`DBMS_RANDOM`。`RANDOM`函数返回一个范围在`[-2³¹, 2³¹)`内的整数（可以返回`-2³¹`，但不会返回`2³¹`），而`VALUE`函数返回一个范围在`[0,1)`内、精度为
    38 位的小数。


    例如，商品销售部门希望每天对目录商品的价格进行低于标价的折扣，以刺激那些认为折扣至少低于标价 10%就是便宜的顾客的销售。然而，商品销售分析师希望将折扣在
    10%到 20%之间随机变化。要做到这一点，首先在`PRODUCT_INFORMATION`表中创建一个`DAILY_PRICE`列，如下所示：


    ```sql

    alter table product_information add (daily_price number);

    ```


    接下来，使用`DBMS_RANDOM.VALUE`函数将`DAILY_PRICE`调整为标价的 10%到 20%折扣之间的值：


    ```sql

    update product_information

    set daily_price =

    round(list_price*(0.9-(dbms_random.value*0.1)))

    ;

    ```


    288 rows updated.


    以下是查询计算出的每日价格的 SQL：


    ```sql

    select product_id, list_price, daily_price

    from product_information

    ;

    ```


    PRODUCT_ID LIST_PRICE DAILY_PRICE

    ---------------------- ---------------------- ----------------------

    1772 456 380

    2414 454 379

    2415 359 293

    2395 123 99

    1755 121 104

    2406 223 200

    2404 221 182

    . . .


    第二次运行`UPDATE`语句将再次随机调整价格，每个产品的折扣不同，但仍然在标价的 10%到 20%折扣范围内：


    ```sql

    update product_information

    set daily_price =

    round(list_price*(0.9-(dbms_random.value*0.1)))

    ;


    select product_id, list_price, daily_price

    from product_information

    ;

    ```


