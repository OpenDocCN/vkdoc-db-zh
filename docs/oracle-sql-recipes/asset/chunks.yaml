    ## 8-6\. Generating Consecutive Numbers


    ### Problem


    You need to generate numbers in a consecutive fashion, according to a set of business
    rules. For example, you have decided to use surrogate or synthetic keys for your
    primary key data, and need a way to reliably generate unique incrementing or decrementing
    values.


    ### Solution


    Oracle provides the sequence as a dedicated object to enable number generation,
    freeing you from the need to craft your own arithmetic, number tracking, and contention-management
    arrangements. Here’s the basic sequence-creation SQL:


    ```

    create sequence hr.employee_num;

    ```


    To use the sequence, include a reference to the pseudocolumns `CURRVAL` and `NEXTVAL`
    wherever you require a new consecutive number. The following statement simply
    returns the next sequence value available.


    ```

    select hr.employee_num.nextval

    from dual;

    ```


    The same pseudocolumn naming can be used in `INSERT`, `UPDATE`, and other statements.
    The following code automatically generates a key for a hypothetical `NEW_EMPLOYEE`
    table.


    ```

    insert into hr.new_employee

    (employee_pk, last_name, first_name)

    values

    (hr.employee_num.nextval, ''Green'', ''Sally'');

    ```


    The `CURRVAL` pseudocolumn can be similarly referenced. The next statement retrieves
    the last value provided by the sequence.


    ```

    select hr.employee_num.currval from dual;

    ```


    **Tip** `CURRVAL` always gives you the current value of the sequence used in your
    session, which means that awkward programming that selects the `NEXTVAL` and concatenates
    it into a string (or uses `INTO` to store the value into a temporary variable)
    is totally unnecessary. You can rely on `CURRVAL` to provide a consistent current
    value in your session for a given sequence. This will make your code much cleaner,
    more reliable, and easier to test.


    ### How It Works


    A sequence in Oracle tracks and distributes integers according to a few rules.
    First and foremost, a sequence guarantees that each new person or application
    that requests a number receives a unique number, normally the next logical number
    according to the sequence’s rules.


    Our recipe creates a new sequence named `HR.EMPLOYEE_NUM`, with no visible additional
    criteria. We then immediately used the sequence to return the first available
    number by issuing the next SQL command.


    ```

    select hr.employee_num.nextval

    from dual;

    ```


    We received the number `1`, then moved on to test an insert that (apparently)
    received the number `2`.


    Under the hood, Oracle picked up numerous defaults to control the numbers it generated.


    The most noticeable default is Oracle’s choice for starting the sequence at the
    number `1`. Our first call to the `NEXTVAL` pseudocolumn returned this to confirm
    `1` as the default initial value. Oracle defaults to incrementing subsequent calls
    to our sequence by `1` as well. Our mock insert grabbed the number `2`, and subsequent
    calls would return `3`, then `4`, and so on.


    Some of the not-so-obvious defaults are still important to know about. Oracle
    created the sequence with no upper (or lower) limit to the numbers generated.
    This implicitly means we can create numbers based on our `HR.EMPLOYEE_NUM` sequence
    up to the largest supported `NUMBER` value: a `1` followed by 38 digits! Oracle
    also used the `NOCYCLE` default, to indicate that when we hit this upper threshold,
    we won’t “wrap around” and start issuing numbers from one again.


    The final two implicit defaults cause Oracle to cache `20` values, and not force
    strict first-come, first-served ordering on those who call `NEXTVAL`. Both of
    these defaults improve performance under heavy concurrent load. Oracle accomplishes
    this by recording the next uncached value in the `SYS.SEQ$` table, and by not
    logging individual sequence selection. For our recipe, `20` values are cached
    in memory, and Oracle notes in `SYS.SEQ$` that the `HR.EMPLOYEE_NUM` sequence
    will be at the value `21` when the current cached values are exhausted. In this
    way, Oracle avoids contention on both an underlying table and the redo log when
    dealing with cached sequence values.


    ## 8-7\. Generating Numbers to a Formula or Pattern


    ### Problem


    You need to generate numbers that increase according to a given algorithm. For
    example, you want to feed odd numbers into one process and even numbers into another
    process, so that they can be used for job or task selection and control. You want
    strict control over the order in which numbers are submitted for job processing.


    ### Solution


    Sequences in Oracle can be defined with several qualifiers and options to meet
    more complex generation requirements. The next SQL statement creates a sequence
    for generating odd numbers, and controls the order and reliability of generation
    to the best of Oracle’s ability.


    ```

    create sequence odd_number_generator

    start with 3

    increment by 2

    maxvalue 999999

    nocycle

    nocache

    order;

    ```


    Using this sequence, our recipe can produce odd numbers for feeding to one of
    our job control processes, using the `NEXTVAL` pseudocolumn. The next three SQL
    statements show our sequence in action.


    ```

    select odd_number_generator.nextval from dual;

    ```


    ```

    select odd_number_generator.nextval from dual;

    ```


    ```

    select odd_number_generator.nextval from dual;

    ```


    We can then create a second sequence with a slightly different starting position,
    to feed only even numbers to our other job control process.


    ```

    create sequence even_number_generator

    start with 2

    increment by 2

    maxvalue 999999

    nocycle

    nocache

    order;

    ```


    This gives us some simple load balancing without needing external software or
    monitoring.


    ### How It Works


    Our recipe uses many of the optional features of sequences in Oracle, in order
    to meet our simple job-control and load-balancing requirements. We named our first
    sequence `ODD_NUMBER_GENERATOR`, which is nice and descriptive. Then we used sequence
    options to control many aspects of the sequence’s behavior.


    The first option, `START WITH 3`, indicates the starting value generated and returned
    by the sequence. You’ll note the first invocation of `ODD_NUMBER_GENERATOR.NEXTVAL`
    returned `3`.


    The second option, `INCREMENT BY 2`, instructs Oracle to add two to the sequence
    every time it is referenced, so that the next value would be `5`, and the one
    following that would be `7`, as shown by the second and third calls to `ODD_NUMBER_GENERATOR.NEXTVAL`.'
