    scale as defined in our CREATE TABLE statement.


    select * from oe.coupons;


    COUPON_CODE CUSTOMER_ID COUPON_VALUE RESTRICTIONS


    ----------- ----------- ------------ ------------------------------------------


    1 150 29.95 No restrictions


    How It Works


    The best way to think about the format of NUMBER, NUMERIC, and DECIMAL data types
    is in the general form number(p,s)


    In this expression, *number* is the name of the data type; you may use numeric
    or decimal, but know that these are implicitly mapped to the NUMBER data type
    for storage. The value *p* is the precision, which states the total number of
    digits of precision the number may have, *including* the fractional (scale) part
    of the number. The value *s*, scale, indicates how many of the total precision
    digits are dedicated to the fractional part of the number,that is, the portion
    to the right of the decimal point.


    In our OE.COUPONS table, you can deduce that COUPON_CODE may be up to 9 digits,
    with no decimal places as the scale value is zero. Similarly, CUSTOMER_ID, the
    foreign key of the OE.CUSTOMERS table, uses a NUMBER of up to six digits with
    no allowance for decimal places.


    The COUPON_VALUE field introduces a common specification you’ll see for currency
    in dollar-denominated and similar systems. Its precision is five, meaning a total
    of five digits can be used for the whole and fractional part of the value of a
    coupon. The scale is two, constraining the COUPON_VALUE to using two of its five
    digits for decimal places. By implication, this only leaves three digits for whole
    dollars. You can test this yourself with the next INSERT statement, which attempts
    to create a coupon with a value beyond the constraints of our COUPON_VALUE column.


    insert into oe.coupons values


    (2, 155, 1000, ''Requires CEO approval'');


    Attempting this INSERT returns an error highlighting the restrictions on COUPON_VALUE.


    ERROR at line 2:


    ORA-01438: value larger than specified precision allowed for this column Note
    that the error presented specifies it’s the precision of the COUPON_VALUE field
    that prevents the value 1000 being used. Because the column is specified as COUPON_VALUE
    NUMBER(5,2) NOT NULL, Oracle implicitly can only store three digits of precision,
    meaning values up to 999, but not 1000, which requires four digits. It’s tempting
    to think that the same style of constraint applies to the scale, should you exceed
    the specified number of two scale digits. The next INSERT statement attempts to
    insert a new coupon with a scale specified far more specifically than our table
    definition allows.


    insert into oe.coupons values


    (3, 160, 0.9950, ''We will see if anyone can spend half a cent!'');


    1 row created.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


