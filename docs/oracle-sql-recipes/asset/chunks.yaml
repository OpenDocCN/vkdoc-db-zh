    of the SELECT statement:


    **select level new_pk** from dual connect by level <= 1000;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13 ■ TREE-STRUCTURED DATA


    The value returned for LEVEL will be our primary key, and we’re assigning a new
    name to the resulting column. Remember that LEVEL is a pseudo-column, and is only
    available in hierarchical queries. So far, this is fairly straightforward. But
    how do we get LEVEL to increment to 1000 or some other user-defined value? Let’s
    look at the next part of the statement:


    select level new_pk **from dual** connect by level <= 1000;


    Again, we’re not straying too far from known territory. The table DUAL will always
    have only one row and one column, DUMMY, whose value is X. If this table were
    to disappear, or have more than one row, then it is no exaggeration to say that
    virtually all Oracle database applications would spectacularly fail in short order.
    But how can we get 1000 rows from only one? Let’s look at the next part of the
    statement: select level new_pk from dual **connect by** level <= 1000;


    When you use CONNECT BY, Oracle traverses the tree structure defined in your table,
    and the column LEVEL indicates how far down the tree you are in the hierarchical
    structure. But again, DUAL only has one row, so we only have a tree with one level,
    right? Not exactly. Remember that the CONNECT BY clause usually contains the unary
    operator PRIOR to tell Oracle how to traverse the tree and connect previous rows
    to the current row. Since there is no START WITH clause or PRIOR operators, this
    SELECT statement is evaluated as follows:


    1.


    Oracle finds the root row for the hierarchy. Since there is no START WITH clause,
    Oracle starts with the only row in the result set, and it is at LEVEL = 1.


    2.


    The next child row is retrieved; since there is no CONNECT BY criterion other
    than LEVEL <= 1000, Oracle returns the previous row connected to itself as the
    next child row, incrementing the value of LEVEL.


    3.


    Oracle evaluates the CONNECT BY criteria to see if we’re done retrieving rows,
    and if not, Oracle continues at step 2 to return additional child rows.


    4\. After


    the


    CONNECT BY criteria are satisfied, the query is done returning results.


    Finally, we have the last part of the statement, highlighted below:


    select level new_pk from dual connect by **level <= 1000**;


    We have to limit the results somehow, and specifying LEVEL <= 1000 tells Oracle
    to stop at 1000\. If we didn’t have this filter, the query would run indefinitely,
    and would not stop until you cancelled the statement or shut down the database.
    You cannot specify CONNECT BY without a filter or hierarchical join condition;
    thus, if you were bound and determined to run a query that would never finish,
    you would have to write something like to this:


    select level new_pk from dual connect by 1=1;


    You can enhance the statement even more by slipping some procedural SQL code into
    the SELECT


    statement. In this variation, you want to create a table with a unique primary
    key, as well as a second column that has a value of ODD when the primary key is
    an odd number and a value of EVEN when the primary key is an even number:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13 ■ TREE-STRUCTURED DATA


    select level new_pk,


    case


    when mod(level,2) = 1 then ''ODD''


    else ''EVEN''


    end odd_or_even


    from dual connect by level <= 1000;


    NEW_PK ODD_OR_EVEN


    ---------------------- -----------


    1 ODD


    2 EVEN


    3 ODD


    4 EVEN


    5 ODD


    6 EVEN


    7 ODD


    8 EVEN


    ...


    995 ODD


    996 EVEN


    997 ODD


    998 EVEN


    999 ODD


    1000 EVEN


    1000 rows selected


    [www.it-ebooks.info](http://www.it-ebooks.info/)'
