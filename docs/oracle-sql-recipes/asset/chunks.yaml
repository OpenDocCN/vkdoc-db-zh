  trans: "\n## 14-5\\. 生成复杂的 XML 文档\n\n### 问题\n\n你需要将数据库中的各种传统数据转换为 XML 格式。你特别希望创建一个比简单的表到\
    \ XML 转换更复杂的 XML 文档，例如，将某些关系值作为属性处理，并对来自员工数据样本的值进行不同级别的嵌套。\n\n### 解决方案\n\nOracle\
    \ 提供了大量令人眼花缭乱的函数和过程，用于从常规数据生成 XML。对于我们陈述的问题，我们将假设我们希望将员工的 `EMPLOYEE_ID` 用作根元素的\
    \ XML 属性，而不是其自身的元素。我们还希望提供关于薪资的更多细节，将支付周期指定为一个属性，并添加货币细节。像 `DBMS_XMLGEN` 或 `SYS_XMLGEN`\
    \ 这样的工具需要笨拙的干预才能提供这种级别的 XML 特定数据调整。\n\n在处理需要精心制作 XML 结果的需求时，较低级别的函数 `XMLROOT`、`XMLELEMENT`\
    \ 和 `XMLATTRIBUTE` 提供了对所需 XML 结构的细粒度控制。接下来的语句使用这些函数来生成我们配方所要求的精巧 XML。\n\n```sql\n\
    select XMLRoot(\n    XMLElement(\"Employee\",\n        XMLAttributes(employee_id\
    \ as \"Employee_ID\"),\n        XMLElement(\"FirstName\", first_name),\n     \
    \   XMLElement(\"LastName\", last_name),\n        XMLElement(\"Salary\",\n   \
    \         XMLAttributes('Monthly' as \"Period\"),\n            XMLElement(\"Amount\"\
    , salary),\n            XMLElement(\"Currency\", 'USD'))\n    ),\n    VERSION\
    \ '1.0') Employee_XML\nfrom hr.employees\nwhere employee_id = 205;\n```\n\n结果产生了我们所需的数据，格式是一个格式良好的\
    \ XML 文档，包含正确的 XML 头。\n\n```xml\n<?xml version=\"1.0\"?>\n<Employee Employee_ID=\"\
    205\">\n  <FirstName>Shelley</FirstName>\n  <LastName>Higgins</LastName>\n  <Salary\
    \ Period=\"Monthly\">\n    <Amount>12000</Amount>\n    <Currency>USD</Currency>\n\
    \  </Salary>\n</Employee>\n```\n\n### 工作原理\n\n我们的配方使用了 `XMLROOT`、`XMLELEMENT`\
    \ 和 `XMLATTRIBUTES` 函数来构建表示员工数据所需的 XML 结构。\n\n使用 `XMLROOT` 提供了必要的 XML 头，将我们的结果从\
    \ XML 片段转变为一个完整的 XML 文档。`XMLROOT` 生成如下所示的头行。\n\n```xml\n<?xml version=\"1.0\"\
    ?>\n```\n\n对大多数人来说，这只是一个语义上的区别，但当测试 XML 是否为一个完整的 XML 文档的有效性时，正确的头部元素是必需的。\n\n\
    你可以将 `XMLELEMENT` 视为 XML 版本的 `PUT_LINE` 和连接命令 `||`。调用 `XMLELEMENT` 会输出源列或表达式以及提供的元素名称，以形成结果的\
    \ XML 构建块。使用 `XMLELEMENT` 的技巧在于记住两个能力。你可以根据需要将任意多个对 `XMLELEMENT` 的调用串联起来（就像你可以连接任意数量的字符串一样），并且它所操作的表达式本身可以是另一个对\
    \ `XMLELEMENT` 的调用。这种调用的嵌套会在输出中产生等效的嵌套元素。你可以在配方中的这个代码片段中看到这一点。\n\n```sql\n…\n\
    XMLElement(\"Salary\",\n    XMLAttributes('Monthly' as \"Period\"),\n    XMLELEMENT(\"\
    Amount\", salary),\n    XMLELEMENT(\"Currency\", 'USD')\n…\n```\n\n在这里，我们指示 Oracle，`<Salary>`\
    \ 元素由一个对 `XMLATTRIBUTES` 的调用和两个对 `XMLELEMENT` 的调用组成。虽然这比调用 `DBMS_XMLGEN` 或 `SYS_XMLGEN`\
    \ 更为繁琐，但关键在于能够用简单的命令控制结构。这些系统包都不提供超越简单的、单层 XML 的结构化结果的能力。这就是 `XMLELEMENT` 提供所需功能的地方。\n\
    \n我们对 `XMLATTRIBUTES` 的调用指示 Oracle 将给定的列或表达式作为父级 `XMLELEMENT` 调用所创建元素的属性。例如，在刚刚显示的代码片段中，我们使用\
    \ `XMLATTRIBUTES` 为 `<Salary>` 元素创建一个 `Period` 属性，并给该属性赋值 `Monthly`。在 XML 数据管理中一个非常常见的技术是，将名义上的主键值或值作为属性包含在实体的根元素或父元素中，而不是将它们作为子元素单独放置。你可以看到我们对来自\
    \ `HR.EMPLOYEES` 表的 `EMPLOYEE_ID` 值来源采用了这种方法。我们使用如下所示的调用使其成为 `<Employee>` 元素的一个属性。\n\
    \n```sql\nXMLAttributes(employee_id as \"Employee_ID\")\n```\n\n## 14-6\\. 验证\
    \ XML 模式\n\n### 问题\n\n你希望对存储在数据库中的 XML 数据强制执行 XML 模式有效性。仓库规范当前存储时未经有效模式检查，你希望对照适当的模式检查这些数据，以确保其结构和内容符合模式的规定。\n\
    \n### 解决方案\n\nOracle 提供了 `DBMS_XMLSCHEMA.REGISTERSCHEMA` 函数来在 Oracle 数据库内定义 XML\
    \ 模式。我们已经创建了必要的 XML 模式并将其托管在本地 Web 服务器上。如下所示，我们在 `REGISTERSCHEMA` 调用中嵌入对此模式的引用，以使\
    \ Oracle 能够找到并注册该模式。\n\n```sql\nbegin\n    dbms_xmlschema.registerschema(\n  \
    \      schemaurl=>'http://localhost/transfer/warehouse_schema.xsd',\n        schemadoc=>\n\
    '<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<xs:schema\n    targetNamespace=\"\
    http://tempuri.org/XMLSchema.xsd\"\n    elementFormDefault=\"qualified\"\n   \
    \ >\n  <xs:element name=\"warehouse_spec\">\n    <xs:complexType>\n      <xs:sequence>\n\
    \        <xs:element name=\"Building\" type=\"xs:string\" minOccurs=\"1\"\n  \
    \                  xdb:SQLName=\"BUILDING\" />\n        <xs:element name=\"Area\"\
    \ type=\"xs:unsignedInt\" minOccurs=\"1\"\n                    xdb:SQLName=\"\
    AREA\" />\n        <xs:element name=\"Docks\" type=\"xs:unsignedInt\" minOccurs=\"\
    1\"\n                    xdb:SQLName=\"DOCKS\" />\n        <xs:element name=\"\
    DockType\" type=\"xs:string\" minOccurs=\"1\"\n                    xdb:SQLName=\"\
    DOCKTYPE\" />\n        <xs:element name=\"WaterAccess\" type=\"xs:boolean\" minOccurs=\"\
    1\"\n                    xdb:SQLName=\"WATERACCESS\" />\n        <xs:element name=\"\
    RailAccess\" type=\"xs:boolean\" minOccurs=\"0\"\n                    xdb:SQLName=\"\
    RAILACCESS\" />\n        <xs:element name=\"Parking\" type=\"xs:string\" minOccurs=\"\
    0\"\n                    xdb:SQLName=\"PARKING\" />\n        <xs:element name=\"\
    VClearance\" type=\"xs:string\" minOccurs=\"0\"\n                    xdb:SQLName=\"\
    VCLEARANCE\" />\n      </xs:sequence>\n    </xs:complexType>\n  </xs:element>\n\
    </xs:schema>');\nend;\n/\n"
- fmt: "# Chapter 14: Working with XML Data\n\nWith our schema in place and implicitly\
    \ parsed for correctness and completeness by `DBMS_XMLSCHEMA.REGISTERSCHEMA`,\
    \ we can now use it to examine a corresponding `XMLTYPE` column in the database\
    \ to see if the XML present conforms to the schema. In XML parlance, this test\
    \ determines the validity of the XML.\n\n```sql\nselect w.warehouse_id,\ncase\n\
    when\n  w.warehouse_spec.isSchemaValid\n  ('http://localhost/transfer/warehouse_schema.xsd',\n\
    \   'warehouse_spec') = 1 then 'Valid'\nwhen\n  w.warehouse_spec.isSchemaValid\n\
    \  ('http://localhost/transfer/warehouse_schema.xsd',\n   'warehouse_spec') is\
    \ null then 'Undefined'\nelse 'Invalid'\nend XML_Validity\nfrom oe.warehouses\
    \ w;\n```\n\nOur results provide a human-readable summary of the validity of each\
    \ `WAREHOUSE_SPEC` XML document against the XML schema.\n\n```\nWAREHOUSE_ID XML_VALIDITY\n\
    ------------ ------------\n           1 Valid\n           2 Valid\n          \
    \ 3 Valid\n           4 Valid\n       5 Undefined\n       6 Undefined\n      \
    \ 7 Undefined\n       8 Undefined\n       9 Undefined\n```\n\n## How It Works\n\
    \nOur recipe starts by using the `DBMS_XMLSCHEMA` package to process an XML schema\
    \ using the `REGISTERSCHEMA` function. This registration provides two features\
    \ for us. First, it allows Oracle to identify the external location or locations\
    \ from which it can source the schema. This frees future users of the schema from\
    \ needing to track the schema’s location themselves. Second and most important,\
    \ `REGISTERSCHEMA` parses the schema for syntactical correctness and completeness.\
    \ XML schemas are themselves XML documents, so it’s possible to test whether they\
    \ are well-formed to ensure elements are properly nested, closed, and so forth,\
    \ and to test them for validity themselves against the W3C standard for XML schemata.\n\
    \nThe `REGISTERSCHEMA` function can take the XML schema from a variety of locations,\
    \ such as the text presented as a `VARCHAR` in our recipe, as well as from a `BFILE`\
    \ or `URI` reference. We’ve included the schema on the website for *Oracle SQL\
    \ Recipes*, www.oraclesqlrecipes.com, so you don’t have to retype the text when\
    \ exploring this recipe on your own.\n\nDetailing the syntax and design choices\
    \ of XML schemas could take a whole book. However, there are several noteworthy\
    \ aspects of our schema that help with Oracle XML management. The first is the\
    \ inclusion of Oracle’s namespace for database-related XML. The `xmlns:ora=\"\
    http://xmlns.oracle.com/oxml\"` entry in our schema header allows us to use Oracle-specific\
    \ datatypes as type attributes. It also allows us to add a `SQLName` mapping to\
    \ assist Oracle to perform sub-element indexing and other administrative tasks.\n\
    \nWith our schema validated and registered with Oracle, we know it’s safe to use\
    \ as a validity test (and even as a check constraint) against XML data. Our `OE.WAREHOUSES`\
    \ table holds descriptions for warehouses in XML form in the `WAREHOUSE_SPEC`\
    \ column, and this schema is designed for that warehouse data. Any `XMLTYPE` data\
    \ incorporates member functions to perform a variety of XML processing, and we\
    \ used the `ISSCHEMAVALID` function to test the `WAREHOUSE_SPEC` data against\
    \ the XML schema. `ISSCHEMAVALID` returns 1 for valid data, 0 for invalid data,\
    \ and `NULL` where no data is found. Instead of presenting this shorthand to the\
    \ user, we’ve wrapped the call to `ISSCHEMAVALID` in a `CASE` block, to return\
    \ the human-readable values of `Valid`, `Invalid` and `Undefined` for the three\
    \ possible results.\n\n## 14-7. Changing XML in Place\n\n### Problem\n\nYou need\
    \ to alter data stored in an `XMLTYPE` column without affecting other elements\
    \ in each XML entry. For instance, you need to change XML data describing warehouse\
    \ floor area from imperial to metric measures.\n\n### Solution\n\nUse Oracle’s\
    \ `UPDATEXML` function to perform updates to any part of an `XMLTYPE` datatype\
    \ or XML document. Because our source data for the update is within the `WAREHOUSE_SPEC`\
    \ column, of type `XMLTYPE`, we also use the `EXTRACTVALUE` function to find the\
    \ target `<Area>` element we wish to update, so that we can perform the complete\
    \ recipe in one statement. The next SQL shows `UPDATEXML` and `EXTRACTVALUE` working\
    \ in unison to change the `<Area>` element from imperial to metric.\n\n```sql\n\
    update oe.warehouses\nset warehouse_spec =\n  updatexml(\n    warehouse_spec,\n\
    \    '/Warehouse/Area/text()',\n    extractvalue(\n      warehouse_spec,\n   \
    \   'Warehouse/Area')*0.09290304\n  );\n```\n\nWe can use the next SQL we developed\
    \ to view the newly calculated floor area values.\n\n```sql\nselect\n  extractvalue(warehouse_spec,\
    \ 'Warehouse/Area')\nfrom oe.warehouses;\n```\n\n```\nEXTRACTVALUE(WAREHOUSE_SPEC,'WAREHOUSE/AREA')\n\
    --------------------------------------------\n                               2322.576\n\
    \                               4645.152\n                             7961.790528\n\
    \                              9569.01312\n...\n```\n\n> **Note:** 1 square foot\
    \ equals exactly 0.09290304 square meters, thanks to the modern imperial inch\
    \ being defined as exactly 2.54 centimeters.\n\n### How It Works\n\nOur recipe\
    \ uses two XML functions together to perform the apparent in-place update of the\
    \ warehouse floor area from square feet to square meters. The overall structure\
    \ of the update statement is familiar to anyone conversant in SQL.\n\n```sql\n\
    update oe.warehouses\nset warehouse_spec = <calculation of new space>;\n```\n\n\
    It’s the calculation of new space that requires the two XML functions, `UPDATEXML`\
    \ and `EXTRACTVALUE`. A call to `UPDATEXML` takes this general form.\n\n```sql\n\
    updatexml(<XMLTYPE column>, <XPath Expression>, <New Value>)\n```\n\nFor our recipe,\
    \ we target the `WAREHOUSE_SPEC` column, and use the `XPath` expression `/Warehouse/Area/text()`\
    \ to target the value of the `<Area>` element. If we omitted the `/text()` portion\
    \ of the `XPath` expression, we’d be telling `UPDATEXML` to change both the value\
    \ and the element tags plus any attributes for `<Area>`.\n\nTo calculate the new\
    \ value for `UPDATEXML`, we use `EXTRACTVALUE` to extract the current `<Area>`\
    \ element values for each row. `EXTRACTVALUE` explicitly returns the value from\
    \ an `XPath` expression, so we don’t need to include the call to `/text()` in\
    \ our `XPath` path. With each value returned, we multiply by 0.09290304 to convert\
    \ the value in square feet to a value in square meters. This gives us the final\
    \ value to be used by `UPDATEXML` to change the `<Area>` element’s value.\n\n\
    ### When an Update is more than an Update\n\nOur description of `UPDATEXML` suggests\
    \ the in-place update of the `<Area>` element is only apparent. We weren’t trying\
    \ to suggest the update doesn’t happen: it certainly does. However, it’s important\
    \ to note that `XMLTYPE` data in Oracle can be stored internally as `CLOB` data\
    \ as one of the storage options. Just as with `CLOB` data, you cannot update part\
    \ of the value. Rather, when updating, you replace the existing data with a newly\
    \ constructed form of the data. So in our example, the complete `WAREHOUSE_SPEC`\
    \ `XMLTYPE` value is rewritten to Oracle with the new `<Area>` values. This means\
    \ that even a small update to a large block of XML can have performance and logging\
    \ implications.\n\n# Chapter 15: Partitioning\n\nIf you work with large tables\
    \ and indexes, at some point you’ll experience some performance degradation as\
    \ the row counts grow into the hundreds of millions. Even efficiently written\
    \ SQL executing against appropriately indexed tables will eventually slow down\
    \ as table and index sizes grow into the gigabytes, terabytes, or even higher.\
    \ For such situations you’ll have to devise a strategy that allows your database\
    \ to scale with increasing data volumes.\n\nOracle provides two key scalability\
    \ features: parallelism and partitioning—mechanisms that enable good performance\
    \ even with massively large databases. Parallelism allows Oracle to start more\
    \ than one thread of execution to take advantage of multiple hardware resources.\
    \ Partitioning allows subsets of a table or index to be managed independently.\
    \ The focus of this chapter is on partitioning strategies."
