    # 第 4 章 创建与衍生数据


    请注意，您需要在`IN`子句中包含`DISTINCT`关键字，以确保透视列上的值是唯一的。否则，透视操作将返回错误。


    ## 4-5. 将列转换为行


    ### 问题


    您有一个包含多个列的表，这些列中的数据来自同一个域，您希望将这些列转换为具有更规范化设计的表的行。


    ### 解决方案


    在`FROM`子句之后使用`UNPIVOT`操作符将列转换为行。


    在下面的示例中，一个 Web 表单允许注册账户用户为最多三位朋友报名参加免费度假。正如您所料，直销部门也想将这些电子邮件地址用于其他促销活动。该表的格式（由数据库设计技能有限的分析师设计！）如下：


    ```

    create table email_signup

    (user_account varchar2(100),

    signup_date date,

    user_email varchar2(100),

    friend1_email varchar2(100),

    friend2_email varchar2(100),

    friend3_email varchar2(100))

    ;

    ```


    表中前两行的注册数据如下所示：`USER_ACCOUNT` `SIGNUP_DATE` `USER_EMAIL` `FRIEND1_EMAIL` `FRIEND2_EMAIL`
    `FRIEND3_EMAIL`

    ```

    '
- fmt: "## 使用 UNPIVOT 语法转换数据行\n\n```\n------------ ----------- ------------- --------------\
    \ -------------- --------------\nrjbryla      21-AUG-09   rjbryla@      rjbdba@\
    \        pensivepenman@ unclebob@\n             example.com example.com   example.com\
    \    example.com\njohndoe      22-AUG-09   janedoe@      dog@\n             example.com\
    \ example.com\n\n2 rows selected\n```\n\n不幸的是，直销应用程序需要更规范化的电子邮件地址列表格式，如下所示：\n\
    ```\nREQUEST_ACCOUNT | REQUEST_DATE | EMAIL_ADDRESS\n```\n\n要生成直销部门所需格式的电子邮件列表，您可以使用\
    \ `UNPIVOT` 命令，如下所示：\n```sql\nselect user_account, signup_date, src_col_name,\
    \ friend_email\nfrom email_signup\nunpivot (\n    (friend_email) for src_col_name\n\
    \    in (user_email, friend1_email, friend2_email, friend3_email)\n)\n;\n```\n\
    ```\nUSER_ACCOUNT  SIGNUP_DATE  SRC_COL_NAME    FRIEND_EMAIL\n------------  -----------\
    \  --------------  -------------------------\nrjbryla       21-AUG-09    USER_EMAIL\
    \      rjbryla@example.com\nrjbryla       21-AUG-09    FRIEND1_EMAIL   rjbdba@example.com\n\
    rjbryla       21-AUG-09    FRIEND2_EMAIL   pensivepenman@example.com\nrjbryla\
    \       21-AUG-09    FRIEND3_EMAIL   unclebob@example.com\njohndoe       22-AUG-09\
    \    USER_EMAIL      janedoe@example.com\njohndoe       22-AUG-09    FRIEND2_EMAIL\
    \   dog@example.com\n\n6 rows selected.\n```\n\n### 工作原理\n\n与 `PIVOT` 运算符相反，`UNPIVOT`\
    \ 运算符将列转换为多行，尽管在没有原始数据的情况下，您无法逆向工程任何聚合列总计——而如果您拥有原始数据，您就不需要 `UNPIVOT`！`UNPIVOT`\
    \ 有许多用途，例如将非规范化表或电子表格中的数据转换为每个列或列集的单独行。\n\n直销部门不需要 `SRC_COL_NAME` 列，但当您想查明电子邮件地址来自哪个源列时，它会派上用场。您也可以使用\
    \ `UNPIVOT` 来创建多个目标列；例如，网络表单可能除了每个朋友的电子邮件地址外，还包括一个朋友姓名的字段：\n```sql\nselect user_account,\
    \ signup_date, src_col_names, friend_email, friend_name\nfrom email_signup\nunpivot\
    \ (\n    (friend_email, friend_name) for src_col_names\n    in ((user_email, user_name),\n\
    \        (friend1_email, friend1_name),\n        (friend2_email, friend2_name),\n\
    \        (friend3_email, friend3_name))\n)\n;\n```\n\n### 在 Oracle 引入 PIVOT 和\
    \ UNPIVOT 之前\n\n在 Oracle Database 11 *g* 之前，您的选择有些有限且痛苦，因为 `PIVOT` 和 `UNPIVOT`\
    \ 子句不存在！要执行 `PIVOT` 查询，您必须使用一系列 `DECODE` 语句，或者非常复杂地使用 `MODEL` 分析子句。\n\n在 Oracle\
    \ Database 11 *g* 之前执行 `UNPIVOT` 操作几乎同样痛苦。以下是一个针对前面部分中的电子邮件地址列表处理表在 Oracle Database\
    \ 11 *g* 之前的 `UNPIVOT` 操作：\n```sql\nselect user_account, signup_date,\n      \
    \ 'USER_EMAIL' as src_col_name, user_email as friend_email\nfrom email_signup\n\
    where user_email is not null\nunion\nselect user_account, signup_date, 'FRIEND1_EMAIL',\
    \ friend1_email\nfrom email_signup\nwhere friend1_email is not null\nunion\nselect\
    \ user_account, signup_date, 'FRIEND2_EMAIL', friend2_email\nfrom email_signup\n\
    where friend2_email is not null\nunion\nselect user_account, signup_date, 'FRIEND3_EMAIL',\
    \ friend3_email\nfrom email_signup\nwhere friend3_email is not null\n;\n```\n\n\
    由于需要通过一系列 `UNION` 语句以及对同一张表的多次扫描进行排序和合并，此查询的维护成本要高得多，执行时间也长得多。\n\n### 4-6. 为提高可读性拼接数据\n\
    \n问题\n\n出于报告和可读性目的，您希望将多个列合并为单个输出列，消除多余的空格并在必要时添加标点符号。\n\n解决方案"
