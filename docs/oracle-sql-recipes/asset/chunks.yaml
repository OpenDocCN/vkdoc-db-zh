    How It Works


    In the solution we use the SUBSTR function twice: once with an explicit length
    and the second time with only the starting position. As a result, the second SUBSTR
    will start extracting at the third position in the string and return the remaining
    portion of the string regardless of length.


    The SUBSTR function is even more useful in conjunction with other functions, such
    as INSTR. In the solution for this recipe, you assume that the underscore character
    is always the third character in the JOB_ID column. If future assignments of the
    JOB_ID value include a department code that is three characters instead of two,
    the solution will not return the desired results.


    To allow for a department code of any length, you can use the INSTR function to
    search for the underscore and use the results to determine where in the source
    string the job code starts, as well as how long the department code is. Here is
    the revised solution for future expansion of the department code: select employee_id,
    last_name, job_id,


    substr(job_id,1,instr(job_id,''_'')-1) dept_code,


    substr(job_id,instr(job_id,''_'')+1) job_code


    from employees


    ;


    EMPLOYEE_ID LAST_NAME JOB_ID DEPT_CODE JOB_CODE


    ---------------------- ------------------------- ---------- --------- --------


    100 King AD_PRES AD PRES


    101 Kochhar AD_VP AD VP


    102 De Haan AD_VP AD VP


    103 Hunold IT_PROG IT PROG


    104 Ernst IT_PROG IT PROG


    . . .


    204 Baer PR_REP PR REP


    205 Higgins AC_MGR AC MGR


    206 Gietz AC_ACCOUNT AC ACCOUNT


    107 rows selected


    Not surprisingly, this query returns the same results as the original solution,
    but it helps to future-proof the query in case changes are made to the format
    of the column. The first SUBSTR stops extracting right before the first underscore
    character in the string, and the second SUBSTR starts extracting the remainder
    of the string right after the first underscore.


    This solution is fairly robust. If there is no underscore in the source string,
    the first SUBSTR returns NULL and the second SUBSTR returns the entire string.
    The assumption therefore is that any JOB_ID


    without an underscore does not include a department code.


    In another recipe, you will see how REGEXP_SUBSTR expands the functionality of
    SUBSTR by allowing you to specify a pattern instead of a starting position to
    extract the desired string. In other words, you can extract a substring of the
    source string that matches the pattern without knowing where in the source string
    the desired substring begins.


