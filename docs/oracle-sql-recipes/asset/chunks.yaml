  trans: "# 第五章 ■ 常见查询模式\n\n145 Russell .4 14000 `19600`\n146 Partners .3 13500 `17550`\n\
    101 Kochhar `17000`\n102 De Haan `17000`\n...\n\n粗体显示的数值展示了 Oracle 在通过 `ORDER\
    \ BY` 子句中的 `CASE` 表达式评估数据时用于排序的计算结果。`CASE` 表达式的一般形式可以简单表示如下。\n\n```\ncase\nwhen\
    \ <表达式、列等> then <表达式、列、字面量等>\nwhen <表达式、列等> then <表达式、列、字面量等>\n…\nelse <未匹配情况的默认表达式>\n\
    end\n```\n\n我们不会无谓地重复 Oracle 手册中已有详尽说明的内容。简而言之，`CASE` 表达式会评估第一个 `WHEN` 子句是否匹配，如果满足条件，则执行\
    \ `THEN` 表达式。如果第一个 `WHEN` 子句不满足，则尝试第二个 `WHEN` 子句，依此类推。如果未找到匹配项，则评估 `ELSE` 默认表达式。\n\
    \n## 5-7. 解决子查询返回意外多个值时的问题和错误\n\n### 问题\n\n在处理子查询的数据时，需要处理一些模糊情况：有时子查询会返回单个（标量）值，而有时会返回多个值。\n\
    \n### 解决方案\n\nOracle 支持三种表达式，允许基于单列结果对子查询进行比较。运算符 `ANY`、`SOME` 和 `ALL` 允许将子查询中的一个或多个单列值与外部\
    \ `SELECT` 中的数据进行比较。使用这些运算符可以处理那些希望在编码 SQL 时能够灵活处理不同大小集合比较的情况。\n\n我们的方案侧重于使用这些表达式来解决一个具体的业务问题。订单录入系统在\
    \ `OE.PRODUCT_INFORMATION` 表中跟踪产品信息，包括 `LIST_PRICE`（标价）值。\n\n然而，我们知道经常会提供折扣，因此希望大致了解哪些商品从未以全价销售过。为此，我们可以针对每次销售与标价进行精确的相关子查询。在此之前，可以通过一个非常快速的近似查询来查看是否存在任何\
    \ `LIST_PRICE` 值高于任何已知的商品销售价格（由 `OE.ORDER_ITEMS` 表的 `UNIT_PRICE` 列指示）。我们的 `SELECT`\
    \ 语句形式如下。\n\n```\nselect product_id, product_name\nfrom oe.product_information\n\
    where list_price > ALL\n(select unit_price\nfrom oe.order_items);\n```\n\n从这个查询中，我们看到三个结果：\n\
    \n```\nPRODUCT_ID PRODUCT_NAME\n---------- ------------------------\n2351 Desk\
    \ - W/48/R\n3003 Laptop 128/12/56/v90/110\n2779 Desk - OS/O/F\n```\n\n这些结果意味着至少有三种商品——两张桌子和一台笔记本电脑——从未以全价销售过。\n\
    \n### 工作原理\n\n我们的示例中使用了 `ALL` 表达式，它允许 Oracle 将每一次销售的 `UNIT_PRICE` 值进行比较，以查看是否有任何已知的销售价格大于某个商品的\
    \ `LIST_PRICE`。为了分解使这种方法有用的步骤，我们可以先看一下子查询。\n\n```\nselect unit_price\nfrom oe.order_items\n\
    ```\n\n这是一个非常简单的语句，返回一个单列结果集，包含零个或多个项目，下面以缩写形式展示。\n\n```\nUNIT_PRICE\n-----------\n\
    482.9\n…\n665 rows selected.\n```\n\n基于这些结果，我们的外部 `SELECT` 语句将 `OE.PRODUCTION_INFORMATION`\
    \ 表中的每个 `LIST_PRICE` 与列表中的每个项目进行比较，因为我们使用了 `ALL` 表达式。如果 `LIST_PRICE` 大于所有返回的值，则表达式解析为\
    \ true，该产品将被包含在结果中。即使有一个返回的 `UNIT_PRICE` 值超过了某个商品的 `LIST_PRICE`，该表达式也为 false，该行将被从进一步考虑中丢弃。\n\
    \n如果你回顾这个逻辑，会意识到这并不是对每个未以全价销售的商品的精确计算。相反，这只是一个快速的近似值，尽管它很好地展示了 `ALL` 技术的用法。\n\n\
    替代方案 `SOME` 和 `ANY`（它们实际上是同义词）仅需要子查询中有一个项目满足 `SOME`/`ANY` 条件即可解析 true/false 判定。Oracle\
    \ 会欣然接受多个项目匹配 `SOME`/`ANY` 标准，但只需要确定一个值即可评估子查询。\n\n## 5-8. 在不同进制之间转换数字\n\n###\
    \ 问题\n\n你需要找到一种通用方法，将 IP 地址和 MAC 地址等数字的十进制表示形式转换为十六进制、八进制、二进制和其他不常见的数字进制。\n\n\
    ### 解决方案\n\nOracle 附带了少量进制转换功能，其中最著名的是 `TO_CHAR` 函数能够将十进制转换为十六进制。我们可以使用下面的 `SELECT`\
    \ 语句将任意值（例如 `19452`）转换为十六进制：\n\n```\nselect to_char(19452,'xxxxx')-oi-0ij\nfrom\
    \ dual;\n```\n\n我们的输出显示了正确计算出的值 `4BFC`。请自行运行该查询以确认 Oracle 十六进制转换的准确性。虽然这对特定情况很有用，但我们通常希望将十进制转换为二进制、八进制和其他不常用的进制。\n\
    \n■ `提示` 你可能会问，还有什么其他进制可能被使用？其中一位作者曾经参与过一个软件项目，该项目将所有数字存储在 36 进制中，使用数字 0 到 9 以及字母\
    \ A 到 Z，以应对某些只能存储字符串的硬件产品的限制。你可能会在最意想不到的时候发现自己需要转换到不常见进制！\n\n其他进制转换并非 Oracle 开箱即用的原生功能，因此我们将创建自己的通用十进制转换函数，该函数可以接受一个给定的数字并将其转换为从\
    \ 2 到 36 的任何进制！我们将使用 Oracle 附带的基本算术运算来构建我们的 `REBASE_NUMBER` 函数，如下所示。\n\n```\n\
    create or replace function rebase_number\n  (starting_value in integer, new_base\
    \ in number)\n  return varchar2\nis\n  rebased_value varchar2(4000) default NULL;\n\
    \  working_remainder integer default starting_value;\n  char_string varchar2(36)\
    \ default '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';\n  sign varchar2(1) default\
    \ '';\nbegin\n  if (starting_value < 0) then\n    sign := '-';\n    working_remainder\
    \ := abs(working_remainder);\n  end if;\n  loop\n    rebased_value := substr(char_string,\
    \ mod(working_remainder,new_base)+1, 1)\n                     || rebased_value;\n\
    \    working_remainder := trunc(working_remainder/new_base);\n    exit when (working_remainder\
    \ = 0);\n  end loop;\n  rebased_value := sign || rebased_value;\n  return rebased_value;\n\
    end rebase_number;\n/\n```\n\n现在 `REBASE_NUMBER` 函数已可用，我们可以对我们最初的测试数字 `19452`\
    \ 执行各种进制的转换。第一个示例展示了到十六进制的转换，以证明我们得到了与 Oracle 相同的结果。\n\n```\nselect rebase_number(19452,16)\
    \ as DEC_TO_HEX\nfrom dual;\n```\n\n我们成功计算出了正确结果。\n\n```\nDEC_TO_HEX\n----------\n\
    4BFC\n```\n\n将相同的数字转换为八进制同样成功。\n\n```\nselect rebase_number(19452,8) as DEC_TO_OCTAL\n\
    from dual;\n```\n\n```\nDEC_TO_OCTAL\n------------\n45374\n```\n\n最后一个转换为二进制的例子同样产生了正确的结果。\n\
    \n```\nselect rebase_number(19452,2) as DEC_TO_BINARY\nfrom dual;\n```\n\n```\n\
    DEC_TO_BINARY\n-------------\n100101111111100\n```\n\n### 工作原理\n\n我们的函数模拟了经典的离散数学，用于执行任何数字在两个进制之间的转换。基本算法形式如下：对于原始数字中的每个有效数字（千位、百位等）\n\
    \n• `使用新进制对该部分数字执行模除法。`\n• `将结果的整数部分作为转换后数字中的新“数字”。`\n• `取余数，并重复此过程，直到余数小于新进制。`\n\
    • `返回新的数字和最后的余数作为转换后的数字。`"
- fmt: "There are two not-so-obvious aspects of our implementation of this logic that\
    \ warrant further explanation. The first involves dealing with negative numbers.\
    \ Our function sets up various local variables, some of which we’ll discuss shortly,\
    \ the last of which is called `SIGN`. We set this to an empty string, which implicitly\
    \ means a positive outcome reported to the caller unless we detect that a negative\
    \ number is passed to the function for conversion. In the first part of the logic\
    \ body of our function, we test for the sign of the `STARTING_VALUE` and change\
    \ the `SIGN` value to `'-'` for any negative values detected.\n\n```sql\nif (starting_value\
    \ < 0) then\n    sign := '-';\n    working_remainder := abs(working_remainder);\n\
    end if;\n```\n\nDetecting negative numbers and switching the `WORKING_NUMBER`\
    \ to positive using the `ABS` function isn’t part of normal decimal-to-hexadecimal\
    \ conversion. In fact, we don’t use it in our arithmetic either!\n\nIt exists\
    \ purely to help with the second non-obvious aspect of our implementation, a trick\
    \ we utilize in our function that we’ll cover in a moment. At the end of our function,\
    \ we reinstate the `SIGN` as it should be, so that the user doesn’t notice this\
    \ data massaging happening.\n\n```sql\nrebased_value := sign || rebased_value;\n\
    ```\n\nSo why the two-step with the number’s sign in the first place? It’s because\
    \ we use a trick to “look up” the conversion of a decimal digit (or digits) into\
    \ its new base by finding how the whole part of our modulo division maps to a\
    \ position in a string. In this case, the string is the unusual local variable\
    \ you see at the start of the function, `CHAR_STRING`.\n\n```sql\nchar_string\
    \ varchar2(36) default '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';\n```\n\nYou may\
    \ have thought, why are the authors practicing their typing in this book? But\
    \ we’re not! The trick is to use the `SUBSTR` function to walk this string to\
    \ find the matching value for our conversion. Here’s how it works at its basic\
    \ level. We take a source number, like 13, and the desired base, like 16, and\
    \ plug it into our `SUBSTR` call, as shown in the next fragment.\n\n```sql\nsubstr(char_string,\
    \ mod(13 /* our remainder */, 16 /* our new base */)+1, 1)\n```\n\nPerforming\
    \ the arithmetic is easy. 13 modulo 16 gives 0 with a remainder of 13. We add\
    \ one to this value, because our string is zero-based, so we need to account for\
    \ the “zeroth” position, giving us a value of 14. We then take the substring of\
    \ the `CHAR_STRING` starting at this position (14), for 1 character. The 14th\
    \ character in the string is D. Voilà: we have converted the decimal number 13\
    \ to its hexadecimal equivalent, D. From there, it’s just a case of repeating\
    \ the process for successive modulo division results.\n\nThe reverse logic can\
    \ also be incorporated into a function, so values in any base can be converted\
    \ to decimal. We can also wrap these functions in a helper function that would\
    \ allow the conversion from any arbitrary base to any other arbitrary base. These\
    \ functions are available at `www.oraclesqlrecipes.com`.\n\n5-9. Searching for\
    \ a String Without Knowing the Column or Table\n\n**Problem**\n\nYou need to find\
    \ where in the database a particular text value is stored, but don’t have access\
    \ to the application code or logic that would let you determine this from seeing\
    \ the data via the application. You have only the Oracle catalog tables and SQL\
    \ to find what you seek.\n\n**Solution**\n\nNo database currently available includes\
    \ an omniscient “search everywhere for what I’m seeking” operator. However, using\
    \ the basic building blocks of Oracle’s string-searching `LIKE` operator, and\
    \ the ability to output one `SELECT` statement as the result of another, we can\
    \ execute a series of steps that will automatically track down the schema, table,\
    \ and column holding the text data we seek.\n\nTo give our recipe a concrete flavor,\
    \ we’ll assume that we’re looking for the text “Greene” somewhere in the database,\
    \ but we don’t know—and can’t find any documentation that would tell us—if this\
    \ text is a person’s name, a supplier or client company name, part of a product\
    \ name, or part of some other text.\n\nOur solution works in two parts. The first\
    \ `SELECT` statement, shown next, produces as results individual `SELECT` queries\
    \ to search all columns of all tables in all schemata for our unidentified text,\
    \ Greene.\n\n```sql\nSelect\n    'select ''' || owner || ''','\n    || '''' ||\
    \ table_name || ''','\n    || '''' || column_name || ''','\n    || column_name\
    \ ||\n    ' from ' ||\n    owner ||\n    '.' ||\n    table_name ||\n    ' where\
    \ ' ||\n    column_name ||\n    ' like ''%Greene%'';' as Child_Select_Statements\n\
    from all_tab_columns\nwhere owner in ('BI', 'HR', 'IX', 'OE', 'PM', 'SH')\nand\
    \ data_type in ('VARCHAR2','CHAR','NVARCHAR2','NCHAR')\nand data_length >= length('Greene');\n\
    ```\n\nIn our example, the output of this command is a list of 271 `SELECT` statements,\
    \ one for each text-like column in each of the tables in Oracle’s sample schemata.\
    \ A subset is shown here, with formatting to make the output readable on this\
    \ printed page.\n\n```\nCHILD_SELECT_STATEMENTS\n…\nselect 'HR','COUNTRIES','COUNTRY_NAME',\
    \ COUNTRY_NAME\nfrom HR.COUNTRIES\nwhere COUNTRY_NAME like '%Greene%';\n\nselect\
    \ 'HR','DEPARTMENTS','DEPARTMENT_NAME', DEPARTMENT_NAME\nfrom HR.DEPARTMENTS\n\
    where DEPARTMENT_NAME like '%Greene%';\n\nselect 'HR','EMPLOYEES','FIRST_NAME',\
    \ FIRST_NAME\nfrom HR.EMPLOYEES\nwhere FIRST_NAME like '%Greene%';\n\nselect 'HR','EMPLOYEES','LAST_NAME',\
    \ LAST_NAME\nfrom HR.EMPLOYEES\nwhere LAST_NAME like '%Greene%';\n\nselect 'HR','EMPLOYEES','EMAIL',\
    \ EMAIL\nfrom HR.EMPLOYEES\nwhere EMAIL like '%Greene%';\n…\n```\n\nAs you’re\
    \ looking at these output statements, first stop and think if there are performance\
    \ implications to running statements across many (if not all) of your tables.\
    \ If your database is multi-terabyte in size, it might be worth some planning\
    \ to execute these when you won’t affect performance.\n\nOnce you’re happy with\
    \ the logistics of when it’s best to use them, run them against the database.\
    \ They will elicit the schema, table, and column name, plus the column data, where\
    \ the sought-after text resides. A portion of the results are shown next.\n\n\
    ```\nselect 'HR','EMPLOYEES','FIRST_NAME', FIRST_NAME\nfrom HR.EMPLOYEES\nwhere\
    \ FIRST_NAME like '%Greene%';\nno rows selected\n\nselect 'HR','EMPLOYEES','LAST_NAME',\
    \ LAST_NAME\nfrom HR.EMPLOYEES\nwhere LAST_NAME like '%Greene%';\n'H 'EMPLOYEE\
    \ 'LAST_NAM LAST_NAME\n-- --------- --------- -------------------------\nHR EMPLOYEES\
    \ LAST_NAME Greene\n\nselect 'HR','EMPLOYEES','EMAIL', EMAIL\nfrom HR.EMPLOYEES\n\
    where EMAIL like '%Greene%';\nno rows selected\n```\n\nWith the completion of\
    \ the second set of statements, we’ve found the text “Greene” in the `LAST_NAME`\
    \ column of the `HR.EMPLOYEES` table.\n\n**How It Works**\n\nThis solution takes\
    \ a two-pass approach to the problem. When you run the first query, it searches\
    \ for all the columns in the `ALL_TAB_COLUMNS` system view to find the schema\
    \ names, table names, and column names for columns that have a textual data type,\
    \ such as `VARCHAR2` or `CHAR`. It’s a little hard to see the logic through all\
    \ the literal formatting and string concatenation, so it’s best thought of using\
    \ this general structure.\n\n```sql\nselect\n    <escaped column, table and schema\
    \ names for later presentation>,\n    <actual column name for later querying>,\n\
    \    <escaped from clause for later querying >\n    <escaped where clause for\
    \ later querying >\nfrom all_tab_columns\nwhere owner in (<list of schemata in\
    \ which we’re interested>)\nand data_type in ('VARCHAR2','CHAR','NVARCHAR2','NCHAR')\n\
    and data_length >= <length of text sought>;\n```\n\nFor each table with at least\
    \ one relevant textual data type, this query will emit a result that takes the\
    \ form of a `SELECT` statement that generally looks like this:\n\n```sql\nselect\n\
    \    <literal schema name>,\n    <literal table name>,\n    <literal column name>,\n\
    \    <column_name>\nfrom <schema.table>\nwhere <column_name> like '%<text sought>%';\n\
    ```"
