    **C H A P T E R 3**


    ■ ■ ■


    **Querying from Multiple Tables**


    Querying data from Oracle tables is probably the most common task you will perform
    as a developer or data analyst, and maybe even as a DBA—though probably not as
    the ETL (Extraction, Transformation, and Loading) tool expert. Quite often, you
    may query only one table for a small subset of rows, but sooner or later you will
    have to join multiple tables together. That’s the beauty of a relational database,
    where the access paths to the data are not fixed: you can join tables that have
    common columns, or even tables that do not have common columns (at your own peril!).


    In this chapter we’ll cover solutions for joining two or more tables and retrieving
    the results based on the existence of desired rows in both tables (equi-join),
    rows that may exist only in one table or the other (left or right outer joins),
    or joining two tables together and including all rows from both tables, matching
    where possible (full outer joins).


    But wait, there’s more! Oracle (and the SQL language standard) contains a number
    of constructs that help you retrieve rows from tables based on the existence of
    the same rows in another table with the same column values for the selected rows
    in a query. These constructs include the INTERSECT, UNION, UNION ALL, and MINUS
    operators. The results from queries using these operators can in some cases be
    obtained using the standard table-join syntax, but if you’re working with more
    than just a couple of columns, the query becomes unwieldy, hard to read, and hard
    to maintain.


    You may also need to update rows in one table based on matching or non-matching
    values in another table, so we’ll provide a couple of recipes on correlated queries
    and correlated updates using the IN/EXISTS SQL constructs as well.


    Of course, no discussion of table manipulation would be complete without delving
    into the unruly child of the query world, the Cartesian join. There are cases
    where you want to join two or more tables without a join condition, and we’ll
    give you a recipe for that scenario.


    Most of the examples in this chapter are based on the schemas in the EXAMPLE tablespace
    created during an Oracle Database installation when you specify “Include Sample
    Schemas.” Those sample schemas aren’t required to understand the solutions in
    this chapter, but they give you the opportunity to try out the solutions on a
    pre-populated set of tables and even delve further into the intricacies of table
    joins.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ QUERYING FROM MULTIPLE TABLES


    3-1\. Joining Corresponding Rows from Two or More Tables


    Problem


    You want to return rows from two or more tables that have one or more columns
    in common. For example, you may want to join the EMPLOYEES and the DEPARTMENTS
    table on a common column, but not all common columns, and return a list of employees
    and their department names.


    Solution


    If you are using Oracle Database 9 *i* or later, you can use the ANSI SQL 99 join
    syntax with the USING


    clause. For example, the EMPLOYEES and DEPARTMENTS table in the Oracle sample
    schemas have the DEPARTMENT_ID column in common, so the query looks like this:


    select employee_id, last_name, first_name, department_id, department_name from
    employees


    join departments using(department_id)


    ;


    EMPLOYEE_ID LAST_NAME FIRST_NAME DEPARTMENT_ID DEPARTMENT_NAME


    ------------ -------------- -------------- ------------------ --------------------


    200 Whalen Jennifer 10 Administration 201 Hartstein Michael 20 Marketing 202 Fay
    Pat 20 Marketing 114 Raphaely Den 30 Purchasing 115 Khoo Alexander 30 Purchasing


    . . .


    113 Popp Luis 100 Finance 205 Higgins Shelley 110 Accounting 206 Gietz William
    110 Accounting 106 rows selected


    The query retrieves most of the results from the EMPLOYEES table, and the DEPARTMENT_NAME
    column from the DEPARTMENTS table.


    How It Works


    The sample schemas supplied with a default installation of Oracle Database 11
    *g* provide a good starting point for trying out some Oracle features. Oracle
    Database comes with several sample schemas such as HR, OE, and BI to show not
    only the relationships between database schemas, but also to show some of the
    varied features such as index-organized tables (IOTs), function-based indexes,
    materialized views, large objects (BLOBs and CLOBs), and XML objects.


    Here is the structure of the EMPLOYEES and DEPARTMENTS tables:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ QUERYING FROM MULTIPLE TABLES


    describe employees


    Name Null Type


    ------------------------------ -------- -----------------


    EMPLOYEE_ID NOT NULL NUMBER(6)


    FIRST_NAME VARCHAR2(20)


    LAST_NAME NOT NULL VARCHAR2(25)


    EMAIL NOT NULL VARCHAR2(25)


    PHONE_NUMBER VARCHAR2(20)


    HIRE_DATE NOT NULL DATE


    JOB_ID NOT NULL VARCHAR2(10)


    SALARY NUMBER(8,2)


    COMMISSION_PCT NUMBER(2,2)


    MANAGER_ID NUMBER(6)


    DEPARTMENT_ID NUMBER(4)


    11 rows selected


    describe departments


    Name Null Type


    ------------------------------ -------- -----------------


    DEPARTMENT_ID NOT NULL NUMBER(4)


    DEPARTMENT_NAME NOT NULL VARCHAR2(30)


    MANAGER_ID NUMBER(6)


    LOCATION_ID NUMBER(4)


    4 rows selected


    There are three other basic ways to join these two tables on the DEPARTMENT_ID
    column. One of them is pre-ANSI SQL 99, one is more suitable when the column names
    in the joined tables are not identical, and one is outright dangerous, as you
    will see.


    Using the “old style” join syntax, you include the join condition in the WHERE
    clause, like this: select employee_id, last_name, first_name, e.department_id,
    department_name from employees e, departments d


    where e.department_id = d.department_id


    ;


    While this approach works and is as efficient from an execution plan point of
    view, the older syntax can be hard to read, as you are mixing the table-join conditions
    with any filter conditions. It also forces you to specify a qualifier for the
    join columns in the SELECT clause.


    Another ANSI SQL 99 method for joining tables uses the ON clause as follows: select
    employee_id, last_name, first_name, e.department_id, department_name from employees
    e


    join departments d


    on e.department_id = d.department_id


    ;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ QUERYING FROM MULTIPLE TABLES


    ■ **Note** You can also use the INNER JOIN keywords instead of just JOIN in a
    multi-table query if you want to be more verbose or want to make it very clear
    that the query is an equi-join instead of an outer join or Cartesian product.


    The ON clause is less readable (and usually requires more typing!) compared to
    the USING clause when the joined columns have the same name. It has the same downside
    as using the pre-ANSI SQL 99


    syntax in that you must qualify the join columns or any other columns with the
    same name with an alias.


    Finally, you can make the syntax for the EMPLOYEE/DEPARTMENTS query even simpler
    by using the NATURAL JOIN clause instead of the JOIN . . . USING clause, as in
    this example: select employee_id, last_name, first_name, department_id, department_name
    from employees natural join departments


