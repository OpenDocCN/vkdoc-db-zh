- fmt: '我们应该注意，从表中删除数据的另一种方法是删除并重新创建表。


    然而，这意味着您还必须重新创建属于该表的任何索引、约束、授权或触发器。此外，当您删除表时，该表将暂时不可用，直到您重新创建它并重新发放任何所需的授权。通常，删除并重新创建表仅在开发或测试环境中可以接受。


    ## 12-11. 显示模式差异


    **问题**


    您有测试和生产数据库。您想确定测试数据库模式与生产数据库模式之间是否存在任何对象差异。您无法访问昂贵的图形工具来显示模式之间的差异。您想知道可以使用哪些 SQL
    技术来显示两个模式之间的对象差异。


    **解决方案**


    显示两个模式之间差异的基本技术如下：


    1.  如果模式位于两个不同的数据库中，请创建数据库链接以指向这两个不同的环境。

    2.  使用 `MINUS` 集合运算符查询数据字典视图以显示差异。


    以下示例演示了如何显示模式差异。在此示例中，我们连接到一个中央数据库，该数据库可以通过 Oracle Net 访问两个远程数据库。我们想查看这两个远程数据库中的模式差异。首先，我们创建指向两个不同环境的数据库链接。此示例使用
    SQL*Plus 变量来定义用于创建数据库链接的两个不同模式和密码：


    ```sql

    define user1=ccim_dev

    define user1_pwd=ccim_pwd

    define user2=ccim_prod

    define user2_pwd=abc123

    define conn1=@db1

    define conn2=@db2


    create database link db1 connect to &&user1 identified by &&user1_pwd using ''sb-db5:1521/sb6'';

    create database link db2 connect to &&user2 identified by &&user2_pwd using ''db-prod1:1521/scaprd'';

    ```


    创建数据库链接后，运行 SQL 语句以从数据字典视图显示元数据差异。接下来的两条语句使用 `MINUS` 集合运算符来确定表名是否存在任何差异：


    ```sql

    prompt ...Tables in db1 NOT IN db2

    select table_name

    from user_tables&&conn1

    minus

    select table_name

    from user_tables&&conn2;


    prompt ...Tables in db2 NOT IN db1

    select table_name

    from user_tables&&conn2

    minus

    select table_name

    from user_tables&&conn1;

    ```


    如果您想将本地模式与远程模式进行比较，则只需要一个数据库链接。在这种情况下，您还需要将一个连接变量定义为空，例如：`define conn2=''''`


    现在，您可以作为本地用户连接到您的数据库，并将远程模式与本地模式进行比较。


    如果您想比较同一数据库中两个模式中的对象，则必须修改脚本以包含 `OWNER` 并使用 `DBA` 或 `ALL` 数据字典视图（而不是 `USER`）。


    ### 工作原理


    在本方法的解决方案部分，我们展示了一个简单的示例，说明如何使用数据字典来确定两个模式在表名方面是否存在任何差异。它通过使用 `MINUS` 集合运算符来显示存在于第一个模式但不存在于第二个模式的数据字典行来比较模式。然后运行另一个类似的查询，但这次它检查存在于第二个模式但不存在于第一个模式的行。


    以下是一个更完整的比较两个模式对象的示例。此脚本比较多个不同的数据字典视图以查找元数据差异：


    ```sql

    spo diff.txt


    prompt Default or temp tablespace in db1 NOT IN db2

    select default_tablespace, temporary_tablespace

    from user_users&&conn1

    minus

    select default_tablespace, temporary_tablespace

    from user_users&&conn2;


    prompt Default or temp tablespace in db2 NOT IN db1

    select default_tablespace, temporary_tablespace

    from user_users&&conn2

    minus

    select default_tablespace, temporary_tablespace

    from user_users&&conn1;


    prompt Tablespace quotas in db1 NOT IN db2

    select tablespace_name, max_bytes

    from user_ts_quotas&&conn1

    minus

    select tablespace_name, max_bytes

    from user_ts_quotas&&conn2;


    prompt Tablespace quotas in db2 NOT IN db1

    select tablespace_name, max_bytes

    from user_ts_quotas&&conn2

    minus

    select tablespace_name, max_bytes

    from user_ts_quotas&&conn1;


    prompt Objects in db1 NOT IN db2

    select object_name, object_type

    from user_objects&&conn1

    minus

    select object_name, object_type

    from user_objects&&conn2 order by 2;


    prompt Objects in db2 NOT IN db1

    select object_name, object_type

    from user_objects&&conn2

    minus

    select object_name, object_type

    from user_objects&&conn1 order by 2;


    prompt Tables in db1 NOT IN db2

    select table_name

    from user_tables&&conn1

    minus

    select table_name

    from user_tables&&conn2;


    prompt Tables in db2 NOT IN db1

    select table_name

    from user_tables&&conn2

    minus

    select table_name

    from user_tables&&conn1;


    prompt Indexes in db2 NOT IN db1

    select table_name, index_name, index_type, uniqueness

    from user_indexes&&conn2

    minus

    select table_name, index_name, index_type, uniqueness

    from user_indexes&&conn1 order by 1, 2;


    prompt Table columns db1 NOT IN db2

    select table_name, column_name

    from user_tab_columns&&conn1

    minus

    select table_name, column_name

    from user_tab_columns&&conn2 order by 1,2;


    prompt Table columns in db2 NOT IN db1

    select table_name, column_name

    from user_tab_columns&&conn2

    minus

    select table_name, column_name

    from user_tab_columns&&conn1 order by 1,2;


    spo off;

    ```


    前面的脚本只是您如何使用数据字典视图来报告模式之间元数据差异的示例。我们并未将所有可能的检查类型都包含在脚本中。


    相反，我们在此包含了足够的内容，为您提供一个示例，说明如何查找开发人员和 DBA 寻找的最常见类型的差异。我们已在 Apress 网站 (http://www.apress.com)
    的源代码部分包含了此脚本的完整版本。


    如果您可以访问诸如 Enterprise Manager Change Management Pack 之类的工具，您也可以使用它来显示两个模式之间的差异。快速的
    Google 搜索将显示数十种可用于比较模式的工具。本方法的目的不是与这些工具竞争，而是表明您可以快速创建一组 SQL 语句来显示模式差异。这些语句可以根据您的环境需要轻松地进行扩充和增强。


    # 第 13 章


    ## 树形结构数据


    树形结构——分层数据——无处不在。除了您后院或附近公园里可能有一棵有树干和树枝的真树之外，您还可能参加一个篮球锦标赛，其对阵图是基于时间的树形结构版本，最终只有一支队伍在锦标赛结束时位于根节点。在您的工作中，管理结构本质上是一个树形结构，老板或所有者在顶部，经过一层或多层管理才到达位于树底部的时薪员工。'
  raw: 'We should note that another way to remove data from a table is to drop and
    recreate the table.


    However, this means you also have to recreate any indexes, constraints, grants,
    or triggers that belong to the table. Additionally, when you drop a table, it
    will be temporarily unavailable until you recreate it and reissue any required
    grants. Usually dropping and recreating a table is acceptable only in a development
    or test environment.


    12-11\. Showing Differences in Schemas


    Problem


    You have test and production databases. You want to determine if there are any
    object differences between the test database schema and the production database
    schema. You don’t have access to an expensive graphical tool that can show differences
    between schemas. You wonder what SQL techniques you can use to show the object
    differences between two schemas.


    Solution


    A basic technique for showing the differences between two schemas is as follows:
    1.


    If the schemas are in two different databases, create database links to point
    at the two different environments.


    2\. Use


    the


    MINUS set operator to query the data dictionary views to display differences.


    Here is an example that demonstrates how to display schema differences. In this
    example, we are connected to a central database that has Oracle Net access to
    two remote databases. We want to view the differences in schemas in the two remote
    databases. First we create database links that point to the two different environments.
    This example uses SQL plus variables to define the two different schemas and passwords
    used to create the database links:


