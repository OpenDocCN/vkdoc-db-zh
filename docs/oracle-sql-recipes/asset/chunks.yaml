    Note that the procedure in its current form will write a row into the WEB_IMG
    table whether or not it is found. For missing URLs, the BLOB is empty, thus its
    length is zero.


    After reviewing this solution, you may notice some of the similarities between
    this anonymous procedure and your favorite web browser: it sends a URL request;
    if the page or item exists, it returns the page or item to the browser and displays
    it. In other words, with a GUI front end, you could use PL/SQL with the UTL_HTTP
    package to create an Oracle-flavored server-based web browser, impractical as
    that might be.


    16-5\. Making External Large Objects (BFILEs) Available to the


    Database


    Problem


    You want to manage your images and other binary files in an Oracle table, but
    the end-user application needs to access the files from the file system, and there
    is not enough disk space in the database’s tablespaces to hold the images as BLOBs.


    Solution


    You can use BFILE pointers in Oracle tables to reference binary objects on the
    file system. In addition, you can read and manage the objects using the DBMS_LOB
    and UTL_FILE packages.


    Create a table to hold the image metadata, along with a sequence to supply the
    table’s primary key: create table web_img2


    (


    img_num number primary key,


    img_url varchar2(255),


    img_blb bfile,


    ins_ts timestamp,


    constraint ak1_web_img2 unique(img_url)


    );


    create sequence web_img2_seq;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ LOBS


    Here is a procedure that accepts an Oracle directory name and a file within that
    directory and loads the file’s metadata into the table WEB_IMG2 if the file exists:


    create or replace procedure load_bfile ( dir_name varchar2, src_img_nm in varchar2
    ) is


    src_blb bfile; /* point to source BLOB on file system */


    file_exists boolean; /* return value from UTL_FILE.FGETATTR */


    file_len number;


    blksize binary_integer;


    begin


    src_blb := bfilename(dir_name, src_img_nm);


    insert into web_img2 (img_num, img_nm, img_blb, ins_ts)


    values(web_img2_seq.nextval, src_img_nm, src_blb, systimestamp);


    -- check to see if file is there at this moment


    utl_file.fgetattr(dir_name, src_img_nm, file_exists, file_len, blksize); if file_exists
    then


    commit;


    dbms_output.put_line(''Wrote BFILE pointer to table: '' || src_img_nm); else


    rollback;


    dbms_output.put_line(''BLOB '' || src_img_nm


    || '' in directory ''


    || dir_name


    || '' does not exist.'');


    end if;


    end;


    How It Works


    The solution is very similar to a recipe earlier in this chapter where we store
    the object in the database; in this solution, we still store the metadata in the
    table WEB_IMG2, but not the BLOB itself. Instead, we store a pointer to the file
    in the operating system file system. This does facilitate sharing the file with
    other applications that need to access the file outside of Oracle, but it can
    cause problems with referential integrity (RI). Usually with referential integrity,
    a database table references rows in another database table, and DBMS constraints
    prevent the deletion of a row that is referenced. Here, however, the table references
    files in a file system. If another application or an administrator deletes or
    moves the file, the BFILE pointer in the database table is still there, but it’s
    invalid. Thus, you can use UTL_FILE.FGETATTR to check for existence of a BFILE
    in the operating system directory.


    Running this procedure with a file that exists looks like this:


    begin


    load_bfile(''LOB_SRC'',''Screen Capture.bmp'');


    end;


    Wrote BFILE pointer to table: Screen Capture.bmp


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ LOBS


    In contrast, trying to store a file that does not exist produces the following
    output: begin


    load_bfile(''LOB_SRC'',''Cake Boss.bmp'');


    end;


    BLOB Cake Boss.bmp in directory LOB_SRC does not exist.


    When you query the table, it returns these results:


    select * from web_img2;


    IMG_NUM IMG_NM IMG_BLB INS_TS


    ------- ------------------- ------- --------------------------------


    1 Screen Capture.bmp (BFILE) 13-JUN-09 10.43.16.737554000 PM


    You may be wondering how to decode the BFILE contents referenced in the IMG_BLB
    column. The procedure DBMS_LOB.FILEGETNAME can help you with that, too. Here is
    a function that returns the Oracle directory name and file name within the directory:


    create or replace function get_bfile_attrs (bfile_obj in bfile)


    return varchar2 is


    dir_alias varchar2(30);


    file_name varchar2(100);


    begin


    dbms_lob.filegetname(bfile_obj, dir_alias, file_name);


    return(''BFILE: Directory='' || dir_alias || '' File='' || file_name);


    end;


    select img_num, img_nm, get_bfile_attrs(img_blb) from web_img2;


    IMG_NUM IMG_NM GET_BFILE_ATTRS(IMG_BLB)


    ------- -------------------- --------------------------------------------------


    1 Screen Capture.bmp BFILE: Directory=LOB_SRC File=Screen Capture.bmp You can
    use the DBMS_LOB package to copy an image or a Word document on a file system
    to a BLOB


    or CLOB column in a table; see the recipes earlier in this chapter.


    16-6\. Deleting or Updating LOBs in a Database Table


    Problem


    Several LOBs in your database tables are either obsolete or need to be replaced.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ LOBS


    Solution


    To delete a LOB, you can set the contents of a LOB column to either EMPTY_CLOB()
    or EMPTY_BLOB(), as in this example:


    update web_img


    set img_blb = empty_blob()


    where img_num = 19


    ;


    Although you can alternatively set the column IMG_BLB to NULL, you will have to
    set it to EMPTY_CLOB() or EMPTY_BLOB() before reinserting a LOB into that column.
    Allowing a LOB column to have NULLs keeps it consistent with use of other columns
    that can have NULLs: you can differentiate a LOB column that has an unknown value
    from a LOB column that has an empty LOB of zero length.


    Updating the value of a LOB column is identical to updating an empty LOB column—retrieve
    the pointer to the LOB column and use DBMS_LOB to populate the column. If you
    know which part of the LOB needs to be replaced, you can use other parameters
    of DBMS_LOB.COPY. Here are the parameters for DBMS_LOB.COPY: DBMS_LOB.COPY


    (


    dest_lob IN OUT NOCOPY BLOB, -- BLOB to be updated


    src_lob IN BLOB, -- BLOB containing new content


    amount IN INTEGER, -- number of bytes to copy


    dest_offset IN INTEGER := 1, -- where to start in the destination src_offset IN
    INTEGER := 1 -- where to start in the source


    );


    As you might expect, Oracle provides reasonable defaults for where to start in
    the source and target LOBs.


    Here is how you would copy 5000 bytes from the 10th byte of a new LOB to the 125th
    byte of the existing LOB: dbms_lob.copy (existing_blb, new_blb, 5000, 125, 10);


    Updating a CLOB uses the same procedure (it is overloaded, as are many other Oracle
    PL/SQL


    procedures), except that DEST_LOB and SRC_LOB are of type CLOB and will be converted
    from the source character set to the destination character set.


    How It Works


    Because of their potential size, large object columns (BLOBs and CLOBs) have several
    restrictions in SELECT and DDL statements, including the following:


    • LOBs cannot be used in a SELECT DISTINCT, ORDER BY, or GROUP BY clauses


    • You cannot use LOB columns as a JOIN column


    • LOB columns are not allowed in UNION, INTERSECTION, and MINUS


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ LOBS


    • A LOB column cannot have a bitmap index, unique index, or a B-tree index—only
    function-based or domain indexes


    • A LOB column cannot be a primary key'
