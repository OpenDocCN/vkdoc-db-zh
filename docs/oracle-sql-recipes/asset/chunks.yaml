    ## 4-5. Changing Columns into Rows


    ### Problem


    You have a table with multiple columns containing data from the same domain, and
    you want to convert these columns into rows of a table with a more normalized
    design.


    ### Solution


    Use the `UNPIVOT` operator after the `FROM` clause to convert columns into rows.


    In the following example, a web form allows a registered account user to sign
    up for a free vacation holiday with up to three friends. As you might expect,
    the direct marketing department wants to use the e-mail addresses for other promotions
    as well. The format of the table (designed by analysts with minimal database design
    skills!) is as follows:


    ```

    create table email_signup

    (user_account varchar2(100),

    signup_date date,

    user_email varchar2(100),

    friend1_email varchar2(100),

    friend2_email varchar2(100),

    friend3_email varchar2(100))

    ;

    ```


    The registration data in the first two rows of the table looks like this: `USER_ACCOUNT`
    `SIGNUP_DATE` `USER_EMAIL` `FRIEND1_EMAIL` `FRIEND2_EMAIL` `FRIEND3_EMAIL`

