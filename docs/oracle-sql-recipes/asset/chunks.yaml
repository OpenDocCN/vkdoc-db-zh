    \ in the control file. |\n| `DBA/ALL/USER_USERS` | User account information. |\n\
    | `DBA/USER_TABLESPACES` | Describes tablespaces. |\n| `DBA_DATA_FILES` | Describes\
    \ database datafiles. |\n| `DBA/USER_FREE_SPACE` | Free extents in tablespaces.\
    \ |\n| `V$DATAFILE` | Datafile information from the control file. |\n| `DBA/ALL/USER_TABLES`\
    \ | Describes table attributes. |\n| `DBA/ALL/USER_INDEXES` | Describes index\
    \ attributes. |\n| `DBA/USER_SEGMENTS` | Storage data for segments. |\n| `DBA/ALL/USER_PART_TABLES`\
    \ | Partitioned table data. |\n| `DBA/ALL/USER_PART_INDEXES` | Partitioned index\
    \ data. |\n| `DBA/ALL/USER_TAB_PARTITIONS` | Storage information for partitioned\
    \ tables. |\n| `DBA/ALL/USER_IND_PARTITIONS` | Storage information for partitioned\
    \ indexes. |\n| `DBA/USER_EXTENTS` | Extent information of each segment. |\n|\
    \ `V$CONTROLFILE` | Names and size of control files. |\n| `V$LOG` | Online redo\
    \ log file information in the control file. |\n| `V$LOG_HISTORY` | Online redo\
    \ log file history information in control file. |\n| `V$ARCHIVED_LOG` | Archive\
    \ log file information in the control file. |\n\n## 10-4. Displaying Table Row\
    \ Counts\n\n### Problem\n\nYou want to run a report that shows the row counts\
    \ of tables within a schema.\n\n### Solution\n\nRun the following SQL code as\
    \ a DBA-privileged schema. Notice that this script contains SQL*Plus-specific\
    \ commands such as `UNDEFINE` and `SPOOL`. The script will prompt you each time\
    \ for a username: `UNDEFINE user`\n\n```sql\nSPOOL tabcount_&&user..sql\nSET LINESIZE\
    \ 132 PAGESIZE 0 TRIMSPO OFF VERIFY OFF FEED OFF TERM OFF\nSELECT\n'SELECT RPAD('\
    \ || '''' || table_name || '''' ||',30)'\n|| ',' || ' COUNT(*) FROM &&user..'\
    \ || table_name || ';'\nFROM dba_tables\nWHERE owner = UPPER('&&user')\nORDER\
    \ BY 1;\nSPO OFF;\nSET TERM ON\n@@tabcount_&&user..sql\nSET VERIFY ON FEED ON\n\
    ```\n\nThis code will generate a file named `tabcount_<user>.sql` that contains\
    \ the SQL statements that select row counts from all tables within the specified\
    \ schema.\n\n### How It Works\n\nDevelopers and DBAs often use SQL to generate\
    \ SQL statements. This is a useful technique when you need to apply the same SQL\
    \ process (repetitively) to many different objects, such as all tables within\
    \ a schema. The code in the solution section assumes you have access to the `DBA_TABLES`\
    \ view. If you don’t have access to DBA-level views, you can query the `USER_TABLES`\
    \ view. For example:\n\n```sql\nSPO tabcount.sql\nSET LINESIZE 132 PAGESIZE 0\
    \ TRIMSPO OFF VERIFY OFF FEED OFF TERM OFF\nSELECT\n'SELECT RPAD(' || '''' ||\
    \ table_name || '''' ||',30)'\n|| ',' || ' COUNT(*) FROM ' || table_name || ';'\n\
    FROM user_tables\nORDER BY 1;\nSPO OFF;\nSET TERM ON\n@@tabcount.sql\nSET VERIFY\
    \ ON FEED ON\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nIf you\
    \ have accurate statistics, you can query the `NUM_ROWS` column of the `DBA/ALL/USER_TABLES`\
    \ view. This column will normally have a close row count if statistics are generated\
    \ on a regular basis. This query selects `NUM_ROWS` from the `USER_TABLES` view:\n\
    \n```sql\nselect table_name, num_rows from user_tables;\n```\n\nIf you have partitioned\
    \ tables and want to show row counts by partition, use the next few lines of SQL\
    \ and PL/SQL code:\n\n```sql\nUNDEFINE user\nSET SERVEROUT ON SIZE 1000000 VERIFY\
    \ OFF\nSPO part_count_&&user..txt\nDECLARE\n    counter NUMBER;\n    sql_stmt\
    \ VARCHAR2(1000);\n    CURSOR c1 IS\n        SELECT table_name, partition_name\n\
    \        FROM dba_tab_partitions\n        WHERE table_owner = UPPER('&&user');\n\
    BEGIN\n    FOR r1 IN c1 LOOP\n        sql_stmt := 'SELECT COUNT(*) FROM &&user..'\
    \ || r1.table_name\n            ||' PARTITION ( '||r1.partition_name ||' )';\n\
    \        EXECUTE IMMEDIATE sql_stmt INTO counter;\n        DBMS_OUTPUT.PUT_LINE(RPAD(r1.table_name\n\
    \            ||'('||r1.partition_name||')',30) ||' '||TO_CHAR(counter));\n   \
    \ END LOOP;\nEND;\n/\nSPO OFF\n```\n\n## 10-5. Displaying Indexes for a Table\n\
    \n### Problem\n\nYou’re experiencing some performance problems with a SQL query.\
    \ You wonder if a table has any indexes.\n\n### Solution\n\nFirst ensure that\
    \ the object you’re dealing with is a table (and not a synonym or a view). Run\
    \ the following query to check whether an object is a table:\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n```sql\nselect\n    object_name\n    ,object_type\nfrom user_objects\nwhere\
    \ object_name=upper('&object_name');\n```\n\nThe prior query will prompt you for\
    \ a SQL*Plus ampersand variable (`OBJECT_NAME`). If you’re not using SQL*Plus,\
    \ you may have to modify the query to explicitly query for a particular object.\n\
    \nOnce you have verified that the object is a table, now query the `USER_INDEXES`\
    \ view to display indexes for a particular table in your user:\n\n```sql\nselect\n\
    \    a.index_name, a.column_name, b.status, b.index_type, a.column_position\n\
    from user_ind_columns a\n    ,user_indexes b\nwhere a.table_name = upper('&table_name')\n\
    and a.index_name = b.index_name\norder by a.index_name, a.column_position;\n```\n\
    \nThe prior query will prompt you for a SQL*Plus ampersand variable (`TABLE_NAME`).\
    \ If you’re not using SQL*Plus, you may have to modify the query to explicitly\
    \ query for a specific table. The indexes and the corresponding columns will be\
    \ displayed for the table you enter.\n\n### How It Works\n\nWhen dealing with\
    \ performance issues, one of the first items to check is which columns are indexed\
    \ on a table. The `USER_INDEXES` view contains the index name information and\
    \ the `USER_IND_COLUMNS` view contains the columns that are indexed. If the index\
    \ is built on more than one column, the `COLUMN_POSITION` column will provide\
    \ the order in which the columns appear in the index.\n\nIf you use function-based\
    \ indexes, sometimes it’s handy to display the expression used to create those\
    \ indexes. The function expression is contained in the `COLUMN_EXPRESSION` column\
    \ of the `DBA/ALL/USER_IND_EXPRESSIONS` view. The following script displays that\
    \ expression, along with the index and table names:\n\n```sql\nSELECT table_name,\
    \ index_name, column_expression\nFROM user_ind_expressions\nORDER BY table_name;\n\
    ```\n\n## 10-6. Showing Foreign Key Columns Not Indexed\n\n### Problem\n\nYou\
    \ have a standard for your database that all foreign key columns must have indexes\
    \ created for them. You want to verify that all foreign key columns are indexed.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### Solution\n\nThe following\
    \ query will indicate for a schema which table columns have foreign key constraints\
    \ defined for them but do not have a corresponding index:\n\n```sql\nselect\n\
    \    a.constraint_name cons_name\n    ,a.table_name tab_name\n    ,b.column_name\
    \ cons_column\n    ,nvl(c.column_name,'***No Index***') ind_column\nfrom user_constraints\
    \ a\njoin\n    user_cons_columns b on a.constraint_name = b.constraint_name\n\
    left outer join\n    user_ind_columns c on b.column_name = c.column_name\n   \
    \ and b.table_name = c.table_name\nwhere constraint_type = 'R'\norder by 2,1;\n\
    ```\n\nAny column that has a foreign key constraint but no corresponding index\
    \ will be noted in the last column of the output with the text `***No Index***`.\
    \ Here is some sample output:\n\n```text\nCONS_NAME           TAB_NAME       \
    \     CONS_COLUMN          IND_COLUMN\n-------------------- --------------------\
    \ -------------------- ----------------\nFK_DEPOSITS         DEPOSITS        \
    \    BATCH_NO             ***No Index***\n```\n\n### How It Works"
