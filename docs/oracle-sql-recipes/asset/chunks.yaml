    We’ve cut the results at ten lines to save space, but try this recipe for yourself
    to see what an ASCII graph with a long tail looks like. Other useful implementations
    of this technique include visualizing overlapping time windows, for instance in
    project tasks or resource allocation.


    How It Works


    The key to our recipe’s graphical gymnastics is the RPAD function, which simply
    reproduces the same character—in this case the X character—as many times as instructed.
    To create a graph that is proportional to an employee’s salary, we simply pass
    RPAD the salary value. In our recipe, we’ve taken the floor of the salary when
    divided by 1000, as this provides a graph of the same relative size, without requiring
    24000 Xs for the highest-paid employee.


    In this recipe, this means someone with a salary between 8000 and 9000 will have
    eight X’s printed, while someone with a salary between 9000 and 10000 will have
    ten Xs, and so on.


    There is one quirk to this recipe. The RPAD function obeys Oracle’s NULL handling
    rules, so we can’t start with an empty string (which Oracle considers NULL) and
    add Xs to that. In practice, this means an RPAD-style graph must have at least
    one character. If accuracy at this low level is important to you, wrap the RPAD
    function in a CASE expression to substitute a true NULL value for those rows that
    should be represented with no characters.


    11-9\. Producing Web-Page Reports Directly from the Database


    Problem


    You’d like to produce graphical web-page reports directly from the database, without
    having to use an additional reporting application to generate HTML. For instance,
    you’d like a graphical depiction of relative salary across all employees.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 11 ■ COMMON REPORTING PROBLEMS


    Solution


    While you may not think of Oracle as a GUI designer for web sites, using simple
    functions like ROUND, TO_CHAR, || string concatenation, and literal strings can
    produce all of the textual elements that make up a HTML page or report.


    The next SQL statement builds all of the HTML required to represent employee salary
    in a comparative graph.


    select


    case rownum


    when 1 then


    ''<html>'' || chr(10) ||


    ''<head>'' || chr(10) ||


    ''<style type="text/css">'' || chr(10) ||


    '' body {background-color: Lavender;}'' || chr(10) ||


    '' table.outer {width: 80%; border: Black solid 1px;}'' || chr(10) ||


    '' table.inner {width: 100%; border: none;}'' || chr(10) ||


    '' th {background-color: LightSteelBlue; color: WhiteSmoke;}'' || chr(10) ||


    '' .bar {background-color: LightSlateGray;}'' || chr(10) ||


    '' .empty {background-color: Lavender;}'' || chr(10) ||


    '' .left {text-align: left; padding-left: 5px;}'' || chr(10) ||


    '' .right {text-align: right; padding-right: 5px;}'' || chr(10) ||


    ''</style>'' || chr(10) ||


    ''</head>'' || chr(10) ||


    ''<body>'' || chr(10) ||


    ''<center>'' || chr(10) ||


    ''<table class="outer">'' || chr(10) ||


    ''<tr>'' || chr(10) ||


    ''<th width="15%">Employee ID</th>'' || chr(10) ||


    ''<th width="20%">Last Name</th>'' || chr(10) ||


    ''<th>Salary Graph</th>'' || chr(10) || ''</tr>''


    else ''''


