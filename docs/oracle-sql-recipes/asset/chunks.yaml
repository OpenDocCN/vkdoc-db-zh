  trans: '

    # 第 15 章 ■ 分区


    ## 15-14. 交换分区


    交换分区是一项强大的功能。它允许你将现有表的分区提取出来，使其成为一个独立的表；同时，也能将一个独立的表并入成为分区表的一部分。当你交换一个分区时，Oracle
    只是简单地更新数据字典中的条目来执行交换操作。


    当你使用 `WITHOUT VALIDATION` 子句来交换分区时，你是在指示 Oracle 不验证传入的分区（或子分区）中的行是否是所定义范围的有效条目。


    这样做的好处是使得交换操作非常快速，因为 Oracle 只是通过更新数据字典中的指针来执行交换操作。如果你使用了 `WITHOUT VALIDATION`，你需要确保你的数据是准确的。


    如果你为分区表定义了主键，那么被交换的表也必须定义有相同的主键结构。如果存在主键，`WITHOUT VALIDATION` 子句不会阻止 Oracle 强制执行唯一性约束。


    ## 15-15. 重命名分区


    ### 问题


    你想要重命名一个分区，使其符合你的命名标准。


    ### 解决方案


    你可以重命名表分区和索引分区。此示例使用 `ALTER TABLE` 语句来重命名一个表分区：


    ```sql

    alter table f_regs rename partition reg_p_1 to reg_part_1;

    ```


    下一行代码使用 `ALTER INDEX` 语句来重命名一个索引分区：


    ```sql

    alter index f_reg_dates_fk1 rename partition reg_p_1 to reg_part_1;

    ```


    ### 工作原理


    有时需要重命名一个表分区或索引分区。例如，你可能想在删除一个分区之前先重命名它。此外，你可能希望重命名对象以使它们符合标准。在这些场景中，使用相应的 `ALTER
    TABLE` 或 `ALTER INDEX` 语句即可完成。你可以查询数据字典来验证有关已重命名对象的信息。此查询显示分区表的名称：


    ```sql

    select table_name,partition_name,tablespace_name from user_tab_partitions;

    ```


    类似地，此查询显示分区索引的信息：


    ```sql

    select index_name,partition_name,status,high_value,tablespace_name

    from user_ind_partitions;

    ```


    ## 15-16. 拆分分区


    ### 问题


    你已识别出一个包含过多行的分区。你想将该分区拆分成两个分区。


    ### 解决方案


    使用 `ALTER TABLE...SPLIT PARTITION` 语句来拆分一个现有分区。以下示例拆分了一个范围分区表中的分区：


    ```sql

    alter table f_regs split partition p2010 at (20100601)

    into (partition p2010_a, partition p2010) update indexes;

    ```


    如果你没有指定 `UPDATE INDEXES`，你将需要重建与被拆分分区相关联的所有局部索引以及任何全局索引。你可以使用以下 SQL 验证索引的状态：


    ```sql

    select index_name, partition_name, status from user_ind_partitions;

    ```


    下一个示例拆分一个列表分区。首先显示 `CREATE TABLE` 语句，以便你能看到列表分区最初是如何定义的：


    ```sql

    create table f_sales

    (reg_sales number

    ,d_date_id number

    ,state_code varchar2(20)

    )

    partition by list (state_code)

    ( partition reg_west values (''AZ'',''CA'',''CO'',''MT'',''OR'',''ID'',''UT'',''NV'')

    ,partition reg_mid values (''IA'',''KS'',''MI'',''MN'',''MO'',''NE'',''OH'',''ND'')

    ,partition reg_rest values (default)

    );

    ```


    接下来，拆分 `REG_MID` 分区：


    ```sql

    alter table f_sales split partition reg_mid values (''IA'',''KS'',''MI'',''MN'')
    into (partition reg_mid_a,

    partition reg_mid_b);

    ```


    `REG_MID_A` 分区现在包含值 `IA`、`KS`、`MI` 和 `MN`，而 `REG_MID_B` 则被分配了剩余的 `MO`、`NE`、`OH`
    和 `ND` 值。


    ### 工作原理


    拆分分区操作允许你从一个单独的分区创建出两个新的分区。每个新分区都有自己的段、物理属性和区。与原始分区关联的段会被删除。

    '
- fmt: '# 15-17. Merging Partitions


    ## Problem


    You have two partitions that don’t contain enough data to warrant separate partitions.
    You want to combine the two partitions into one.


    ## Solution


    Use the `ALTER TABLE...MERGE PARTITIONS` statement to combine partitions. This
    example merges the `REG_P_1` partition into the `REG_P_2` partition:


    ```sql

    alter table f_regs merge partitions reg_p_1, reg_p_2 into partition reg_p_2;

    ```


    In this example, the partitions were organized by a range of dates. The merged
    partition will be defined to accept rows with the highest range of the two merged
    partitions. Any local indexes are also merged into the new single partition.


    Be aware that merging partitions will invalidate any local indexes associated
    with the merged partitions. Additionally, all partitions of any global indexes
    that exist on the table will be marked as unusable. You can verify the status
    of the partitioned indexes by querying the data dictionary:


    ```sql

    select index_name, partition_name, tablespace_name, high_value, status

    from user_ind_partitions

    order by 1,2;

    ```


    Here is some sample output showing what a global index and a local index look
    like after a partition merge:


    ```

    INDEX_NAME       PARTITION_NAME   TABLESPACE_NAME  HIGH_VALUE   STATUS

    ---------------- ---------------- ---------------- ------------ ----------

    F_GLO_IDX1       SYS_P680         IDX1                          UNUSABLE

    F_GLO_IDX1       SYS_P681         IDX1                          UNUSABLE

    F_GLO_IDX1       SYS_P682         IDX1                          UNUSABLE

    F_LOC_FK1        REG_P_2          USERS            20110101     UNUSABLE

    F_LOC_FK1        REG_P_3          TBSP3            20120101     USABLE

    ```


    When merging partitions, you can use the `UPDATE INDEXES` clause of the `ALTER
    TABLE` statement to instruct Oracle to automatically rebuild any associated indexes:


    ```sql

    alter table f_regs merge partitions reg_p_1, reg_p_2 into partition reg_p_2

    tablespace tbsp2

    update indexes;

    ```


    Keep in mind that the merge operation will take longer when you use the `UPDATE
    INDEXES` clause. If you want to minimize the merge operation time, don’t use this
    clause. Instead, manually rebuild local indexes associated with a merged partition:


    ```sql

    alter table f_regs modify partition reg_p_2 rebuild unusable local indexes;

    ```


    You can rebuild each partition of a global index with the `ALTER INDEX...REBUILD
    PARTITION` statement:


    ```sql

    alter index f_glo_idx1 rebuild partition sys_p680;

    alter index f_glo_idx1 rebuild partition sys_p681;

    alter index f_glo_idx1 rebuild partition sys_p682;

    ```


    ## How It Works


    You can merge two or more partitions with the `ALTER TABLE...MERGE PARTITIONS`
    statement. The partition name you are merging into can be the name of one of the
    partitions you are merging or it can be a completely new name.


    When merging partitions, make sure you rebuild any indexes associated with the
    merged partitions. You can either rebuild or re-create any invalidated indexes.
    Rebuilding the indexes is probably the easiest method because you don’t need the
    DDL required to re-create the index.


    Before you merge two (or more partitions), make certain that the merged partition
    has enough space in its tablespace to accommodate all of the merged rows. If there
    isn’t enough space, you’ll receive an error that the tablespace was unable to
    extend to the necessary size.


    # 15-18. Dropping a Partition


    ## Problem


    You have some data that is obsolete. It is contained within a partition and you
    want to drop the partition.


    ## Solution


    First identify the name of the partition you want to drop. Run the following query
    to list partitions for a particular table for the currently connected user:


    ```sql

    select segment_name, segment_type, partition_name

    from user_segments

    where segment_name = upper(''&table_name'');

    ```


    Next use the `ALTER TABLE...DROP PARTITION` statement to remove a partition from
    a table. This example drops the `P_2008` partition from the `F_SALES` table:


    ```sql

    alter table f_sales drop partition p_2008;

    ```


    You should see the following message:


    `Table altered.`


    If you want to drop a subpartition, use the `DROP SUBPARTITION` clause:


    ```sql

    alter table f_sales drop subpartition p2_south;

    ```'
