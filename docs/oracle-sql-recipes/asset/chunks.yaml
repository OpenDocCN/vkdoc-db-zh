    How It Works


    The solution uses REGEXP_REPLACE and REGEXP_INSTR to perform the task. To further
    simplify the task, you could simplify the UPDATE statement to this:


    update locations


    set street_address =


    regexp_replace(street_address,''\s(road|rd|roade)$'','' RD'',1,0,''i'')


    ;


    However, there is a significant downside to this UPDATE statement. Regardless
    of whether there is a match, *every* row will have its STREET_ADDRESS column updated.
    This will introduce unnecessary row locking on the table, as well as excessive
    use of the redo log files where it is not necessary. Unless you expect to update
    all rows in the table, use the WHERE clause. The slight additional CPU cost of
    running both REGEXP_REPLACE and REGEXP_INSTR for rows that match the WHERE clause
    is a much better alternative than reducing table availability or unnecessarily
    using redo and undo space.


    You can specify that REGEXP_REPLACE start in a specific position within the target
    string, match only the nth occurrence, or change matching behavior such as case
    sensitivity; the solution mapped all variations of “road” using case-insensitivity.
    These capabilities are common among all of the Oracle REGEXP_ functions. Here
    is the list of parameters for REGEXP_REPLACE:


    • **source_string**: the column or string to be updated.'
  trans: "\n# 第 7 章 ■ 字符串\n\n## 7-7. 替换字符串中的文本\n\n### 问题\n\n你需要通过将字符串末尾所有“Road”的变体都转换为字符串“RD”，来执行基本的地址标准化。\n\
    \n### 解决方案\n\n要使用正则表达式更新多个数据库列中的子字符串，你可以使用 `REPLACE` 函数；然而，对于某些子字符串替换，`REPLACE`\
    \ 可能不适用或不切实际，例如在那些使用 `REPLACE` 会变得繁琐、容易出错，甚至不使用编程语言就无法完成的场景中。因此，你可以使用内置的 `REGEXP_REPLACE`\
    \ 函数来扩展 `REPLACE` 的功能，允许指定一个正则表达式而非常量作为要替换的字符串。此示例执行基本的地址标准化，将字符串末尾所有“Road”的变体都转换为“RD”：\n\
    \n```sql\nupdate locations\nset street_address =\n    regexp_replace(street_address,'\\\
    s(road|rd|roade)$',' RD',1,0,'i')\nwhere regexp_instr(street_address,'\\s(road|rd|roade)$',1,1,0,'i')\
    \ > 0\n;\n```\n\n```\n3 rows updated\n```\n\n如果你在执行更新后查询该表，可以看到已转换的街道地址（包括那些地址中已包含“RD”的街道地址）：\n\
    \n```sql\nselect location_id, street_address\nfrom locations\nwhere instr(street_address,'RD')\
    \ > 0\n;\n```\n\n```\nLOCATION_ID STREET_ADDRESS\n---------------------- ----------------------------------------\n\
    1400 2014 Jabberwocky RD\n1700 2004 Charade RD\n2600 9702 Chester RD\n3 rows selected\n\
    ```\n\n`REGEXP_REPLACE` 从字符串的第一个字符开始搜索，并替换模式中任何字符串的所有出现位置。`REGEXP_REPLACE` 在执行替换时会忽略大小写。\n\
    \n注意，你必须在正则表达式中包含空白字符 `\\s`，以确保不会匹配像“Oxford”或“Broad”这样的单词，或者任何在街道地址末尾以正则表达式中选项之一结尾的单词。\n\
    \n### 工作原理\n\n该解决方案使用 `REGEXP_REPLACE` 和 `REGEXP_INSTR` 来完成任务。为了进一步简化任务，你可以将 `UPDATE`\
    \ 语句简化为：\n\n```sql\nupdate locations\nset street_address =\n    regexp_replace(street_address,'\\\
    s(road|rd|roade)$',' RD',1,0,'i')\n;\n```\n\n然而，这个 `UPDATE` 语句有一个显著的缺点。无论是否匹配，*每一行*的\
    \ `STREET_ADDRESS` 列都会被更新。这将导致不必要的表行锁，以及在不必要时过度使用重做日志文件。除非你预期要更新表中的所有行，否则请使用 `WHERE`\
    \ 子句。对于满足 `WHERE` 子句的行，运行 `REGEXP_REPLACE` 和 `REGEXP_INSTR` 所带来的轻微额外 CPU 开销，是比降低表可用性或不必要地使用重做和回滚空间好得多的替代方案。\n\
    \n你可以指定 `REGEXP_REPLACE` 从目标字符串中的特定位置开始搜索，只匹配第 n 次出现，或改变匹配行为（如区分大小写）；该解决方案使用不区分大小写的方式映射了“road”的所有变体。这些功能在所有\
    \ Oracle `REGEXP_` 函数中都很常见。以下是 `REGEXP_REPLACE` 的参数列表：\n\n*   `source_string`：要被更新的列或字符串。\n\
    \n### 关于 REGEXP_COUNT 的附加说明\n\n`REGEXP_COUNT` 包含两个你在其他查找模式的 Oracle 函数中也会看到的额外参数：一个用于更改目标字符串中搜索的起始位置，另一个用于更改匹配行为。例如，你可能希望搜索从目标字符串的第五个位置开始，并执行不区分大小写的匹配：\n\
    \n```sql\nselect location_id, street_address, city\nfrom locations\nwhere regexp_count(street_address,'east\
    \ [0-9]*',5,'i') > 0\n;\n```\n\n无论你从目标字符串的哪个位置开始搜索，`REGEXP_COUNT` 都会从上一次匹配结束后的第一个字符开始查找后续匹配。\n"
- fmt: "### 正则表达式替换参数\n\n`pattern`: 用于在 `source_string` 中搜索要被替换一次或多次的模式的正则表达式。\n\n\
    `replacement_string`: 替换由 `pattern` 匹配到的子字符串的字符串。\n\n`position`: 在目标字符串中开始搜索的位置（默认值为\
    \ 1）。\n\n`occurrence`: 要在目标字符串中查找的模式的第几次出现（默认为第一次出现）。\n\n`match_parameter`: 改默的认匹配行为。\n\
    \n`pattern` 之后的所有参数都是可选的，但是如果你使用了诸如 `match_parameter` 的参数，则必须指定中间参数的值。`match_parameter`\
    \ 的选项与 `REGEXP_INSTR` 和 `REGEXP_COUNT` 相同。\n\n例如，你可能只想更改正则表达式中模式的第二次出现，而不管它在字符串中的位置如何（之前的方案将搜索锚定到字符串末尾的出现）。`UPDATE`\
    \ 语句看起来会像这样：\n\n```sql\nupdate locations\nset street_address =\nregexp_replace(street_address,'\\\
    s(road|rd|roade)',' RD',1, 2,'i')\nwhere regexp_instr(street_address,'\\s(road|rd|roade)',1,2,1,'i')\
    \ > 0;\n```\n\n将这个解决方案再推进一步，如果你想对正则表达式的 *最后一次* 出现进行替换呢？使用 `REGEXP_COUNT`（参见本章前面关于\
    \ `REGEXP_COUNT` 的方案）找到出现次数，然后使用该函数的结果来替换最后一次出现。在这个变体中，你想将 “S” 替换为所有 “South” 或\
    \ “So” 的出现，除了在字符串的开头或结尾：\n\n```sql\nupdate locations\nset street_address =\nregexp_replace(street_address,'\\\
    s(south|so)\\s',' S',1,\nregexp_count(street_address,'\\s(south|so)\\s',1,'i'),'i')\n\
    where regexp_count(street_address,'\\s(south|so)\\s',1,'i') > 0;\n```\n\n这个 `UPDATE`\
    \ 语句只更新那些至少出现一次模式的行，但在 `WHERE` 子句中使用 `REGEXP_COUNT` 来确定出现的次数，而不是使用 `REGEXP_INSTR`。\n\
    \n### 7-8. 加速字符串搜索\n\n**问题**\n\n你需要频繁地在 `VARCHAR2` 列的一部分上搜索一个大表。你要搜索的字符串要么是一个子字符串，要么是使用另一个返回字符串结果的\
    \ Oracle 函数对列进行转换后的结果。\n\n**解决方案**\n\n当你运行一个 `WHERE` 子句包含返回 `VARCHAR2` 值的 Oracle\
    \ 字符串函数的 `SELECT` 查询时，即使在该字符串函数引用的列上存在索引，Oracle 也会执行全表扫描。为了使 Oracle 能够使用索引，请使用与\
    \ `WHERE` 子句中相同的表达式来创建一个基于函数的索引（FBI）。\n\n以下 `CREATE INDEX` 语句在 `CITY` 列上创建了一个\
    \ FBI，如果 `CITY` 列中至少有两个空白字符，则该索引计算结果为非零值：\n\n```sql\ncreate index ie1_locations\
    \ on locations(regexp_instr(city,'\\s\\S+\\s'));\n```\n```\ncreate index succeeded.\n\
    ```\n\n为了让 Oracle（可能）利用该索引，你在 `WHERE` 子句中的过滤条件需要引用用于创建索引的表达式，如下例所示：\n\n```sql\n\
    select location_id, street_address, city, state_province\nfrom locations\nwhere\
    \ regexp_instr(city,'\\s\\S+\\s') > 0;\n```\n```\nLOCATION_ID STREET_ADDRESS \
    \                CITY                          STATE_PROVINCE\n----------- ------------------------------\
    \ ----------------------------- --------------\n1500        2011 Interiors Blvd\
    \            South San Francisco           California\n1 rows selected\n```\n\n\
    Oracle 可能仍然不使用基于函数的索引，这取决于表的大小和其他因素，但对于返回非常少量行的查询，FBI 通常会触发范围扫描而不是全表扫描。无论 `WHERE`\
    \ 子句中的列上是否存在 FBI，你的 `SELECT` 语句的语法都是相同的。\n\n**工作原理**\n\n基于函数的索引是建立在表达式上的索引，它不仅适用于\
    \ `VARCHAR2`，也适用于 `NUMBER` 和 `DATE` 等数据类型。决定创建 FBI 与决定创建 B 树、位图甚至索引组织表（IOT）非常相似：`SELECT`\
    \ 语句的性能提升是否能抵消索引所需的额外磁盘空间成本，以及在 `INSERT`、`DELETE`、`UPDATE` 和 `MERGE` 等 DML 语句期间维护索引的开销。如果你的环境中\
    \ `SELECT` 语句的数量和频率远远超过 DML 语句（如数据仓库或其他类型的报表应用程序），那么创建另一个索引可能是合理的。\n\n该解决方案包含了一个基于\
    \ `REGEXP_INSTR` 函数的 FBI，但函数定义可以简单到将数据库列转换为大写，如下例所示：\n\n```sql\ncreate index ie1_employees\
    \ on employees(upper(last_name));\n```\n```\ncreate index succeeded.\n```\n\n\
    对于员工姓氏的搜索，在 `WHERE` 子句中使用 `upper(last_name)` 将允许 Oracle 利用 FBI。\n\n你也可以在 `CREATE\
    \ INDEX` 语句的参数中对 `NUMBER` 列使用数字运算符来创建 FBI，以便在 `WHERE` 子句中出现该计算时利用索引。如果你的 `EMP_SAL_HIST`\
    \ 表如下所示：\n\n```\nName                                      Null     Type\n-----------------------------------------\
    \ -------- -----------------\nEMPLOYEE_ID                               NOT NULL\
    \ NUMBER\nFISCAL_YEAR                               NOT NULL NUMBER(4)\nSALARY\
    \                                    NOT NULL NUMBER\nBONUS                  \
    \                            NUMBER\n```\n\n你可以使用以下语句创建一个可以加速搜索总薪酬的 FBI：\n\n```sql\n\
    create index ie1_emp_sal_hist on emp_sal_hist(salary + nvl(bonus,0));\n```\n```\n\
    create index succeeded.\n```\n\n因此，如果你使用以下 `SELECT` 语句搜索 2008 年总薪酬大于等于 $200,000.00，Oracle\
    \ 优化器很可能会使用 FBI：\n\n```sql\nselect employee_id\nfrom emp_sal_hist\nwhere fiscal_year\
    \ = 2008\nand salary+nvl(bonus,0) >= 200000;\n```\n\n然而，下面的语句将不会使用索引，因为 `WHERE`\
    \ 子句中的表达式与用于创建 FBI 的表达式不完全匹配，即使 `WHERE` 子句指定了完全相同的过滤条件：\n\n```sql\nselect employee_id\n\
    from emp_sal_hist\nwhere fiscal_year = 2008\nand salary+decode(bonus,null,0,bonus)\
    \ >= 200000;\n```\n\n此外，前面的 `SELECT` 语句也很可能会产生不理想的结果，因为对于 `BONUS` 列为 `NULL` 的任何员工，`WHERE`\
    \ 子句中的表达式将返回 `NULL` 结果。\n\n创建和使用 FBI 有一些限制。例如，FBI 不能包含带有聚合函数的表达式。此外，为了让 Oracle\
    \ 使用 FBI，包含 FBI 的表或索引必须经过分析以收集 FBI 中计算结果的统计信息。最后，任何 FBI 必须返回确定性的值。换句话说，该函数对于相同的输入值必须返回相同的值。一个违反此限制的好例子是依赖于当前日期的函数。因此，尝试创建此索引会失败：\n\
    \n```sql\ncreate index ie2_employees on employees(sysdate-hire_date);\n```\n```\n\
    Error starting at line 1 in command:\ncreate index ie2_employees on employees(sysdate-hire_date)\n\
    Error at Command Line:1 Column:40\nError report:\nSQL Error: ORA-01743: only pure\
    \ functions can be indexed\n01743. 00000 - \"only pure functions can be indexed\"\
    \n*Cause:    The indexed function uses SYSDATE or the user environment.\n*Action:\
    \   PL/SQL functions must be pure (RNDS, RNPS, WNDS, WNPS). SQL\n           expressions\
    \ must not use SYSDATE, USER, USERENV(), or anything\n           else dependent\
    \ on the session state. NLS-dependent functions\n           are OK.\n```"
  raw: '• **pattern**: the regular expression used to search for the pattern to be
    replaced one or more times within the source_string.


    • **replacement_string**: the string substituted for each occurrence of the substring
    matched by the pattern.


    • **position**: where to begin the search in the target string (default 1).


    • **occurrence**: which occurrence of the pattern to find in the target string
    (defaults to first occurrence).


    • **match_parameter**: change the default matching behavior.


    All parameters after **pattern** are optional, but you must specify values for
    the intermediate parameters if you use parameters such as match_parameter, for
    example. The options for match_parameter are the same as for REGEXP_INSTR and
    REGEXP_COUNT.


    For example, you may only want to change the second occurrence of the pattern
    in the regular expression, regardless of its position within the string (the recipe
    solution anchored the search to the occurrence at the end of the string). The
    UPDATE statement would instead look like this: update locations


    set street_address =


    regexp_replace(street_address,''\s(road|rd|roade)'','' RD'',1, **2**,''i'') where
    regexp_instr(street_address,''\s(road|rd|roade)'',1, **2**,1,''i'') > 0


    ;


    Taking this solution one step further, what if you want to perform a substitution
    for the *last* occurrence of the regular expression? Use REGEXP_COUNT (see the
    recipe for REGEXP_COUNT earlier in this chapter) to find the number of occurrences,
    then use the result of that function to substitute the last 183


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 7 ■ STRINGS


    occurrence. In this variation, you want to substitute “S” for all occurrences
    of “South” or “So” anywhere except the beginning or end of the string:


    update locations


    set street_address =


    regexp_replace(street_address,''\s(south|so)\s'','' S'',1,


    **regexp_count(street_address,''\s(south|so)\s'',1,''i'')**,''i'')


    where **regexp_count(street_address,''\s(south|so)\s'',1,''i'')** > 0


    ;


    This UPDATE statement only updates rows that have at least one occurrence of the
    pattern, but uses REGEXP_COUNT in the WHERE clause to determine the number of
    occurrences instead of using REGEXP_INSTR.


    7-8\. Speeding Up String Searches


    Problem


    You need to frequently search a large table on a part of a VARCHAR2 column. The
    string you are searching for is either a substring or a transformation of a column
    using another Oracle function that returns a string result.


    Solution


    When you run a SELECT query with a WHERE clause that contains an Oracle string
    function returning a VARCHAR2 value, Oracle will perform a full table scan even
    if there is an index on the column referenced by the string function. To enable
    Oracle to use an index, create a function-based index (FBI) using the same expression
    in the WHERE clause as in the CREATE INDEX statement.


    The following CREATE INDEX statement creates an FBI on the CITY column that evaluates
    to a non-zero value if there are at least two whitespace characters in the CITY
    column: create index ie1_locations on locations(regexp_instr(city,''\s\S+\s''));
    create index succeeded.


    For Oracle to (possibly) utilize the index, your filter criteria in the WHERE
    clause needs to reference the expression used to create the index, as in this
    example:


    select location_id, street_address, city, state_province


    from locations


    where regexp_instr(city,''\s\S+\s'') > 0


    ;


    LOCATION_ID STREET_ADDRESS CITY STATE_PROVINCE


    ------------ ---------------------- ------------------------- ------------------


    1500 2011 Interiors Blvd South San Francisco California 1 rows selected


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 7 ■ STRINGS


    Oracle may still not use the function-based index, depending on the size of the
    table and other factors, but for queries that will return a very small number
    of rows, an FBI will often trigger a range scan instead of a full table scan.
    The syntax for your SELECT statement is the same whether or not an FBI exists
    on the columns in the WHERE clause.


    How It Works


    A function-based index is an index built on an expression and it is applicable
    to data types other than VARCHAR2, including NUMBER and DATE data types. The decision
    to create an FBI is much the same as the decision to create a b-tree, bitmap,
    or even an index-organized table (IOT): will the performance improvements for
    SELECT statements offset the cost of additional disk space for the index as well
    as the overhead for maintaining the index during DML statements such as INSERT,
    DELETE, UPDATE, and MERGE. If the number and frequency of SELECT statements outnumber
    DML statements in your environment by a wide margin (as in a data warehouse or
    other types of reporting application), creating another index might be justified.


    The solution includes an FBI based on the REGEXP_INSTR function, but the function
    definition can be as simple as converting the database column to uppercase, as
    in this example: create index ie1_employees on employees(upper(last_name));


    create index succeeded.


    For searches on employee last names, using upper(last_name) in the WHERE clause
    will allow Oracle to leverage the FBI.


    You can also use numeric operators on NUMBER columns in the arguments to the CREATE
    INDEX


    statement for an FBI to leverage an index if the calculation appears in the WHERE
    clause. If your EMP_SAL_HIST table looks like this:


    Name Null Type


    ------------------------------ -------- -----------------


    EMPLOYEE_ID NOT NULL NUMBER


    FISCAL_YEAR NOT NULL NUMBER(4)


    SALARY NOT NULL NUMBER


    BONUS NUMBER


    You can create an FBI that can speed up searches on total compensation with this
    statement: create index ie1_emp_sal_hist on emp_sal_hist(salary + nvl(bonus,0));
    create index succeeded.


    Thus, if you search for total compensation in 2008 of $200,000.00 or more using
    this SELECT


    statement, the Oracle optimizer will likely use the FBI:


    select employee_id


    from emp_sal_hist


    where fiscal_year = 2008


    and salary+nvl(bonus,0) >= 200000


    ;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 7 ■ STRINGS


    However, the following statement will not use the index, since the expression
    in the WHERE clause does not exactly match the expression used to create the FBI,
    even though the WHERE clause specifies the exact same filtering condition:


    select employee_id


    from emp_sal_hist


    where fiscal_year = 2008


    and salary+decode(bonus,null,0,bonus) >= 200000


    ;


    In addition, the preceding SELECT statement will also most likely produce undesirable
    results, since the expression in the WHERE clause will return a NULL result for
    any employees having a NULL value in the BONUS column.


    There are a few restrictions on creating and using FBIs. For example, an FBI can’t
    contain an expression with aggregate functions. In addition, for Oracle to use
    the FBI, the table or index containing the FBI must be analyzed to gather statistics
    on the result of the calculations in the FBI. Finally, any FBI must return a deterministic
    value. In other words, the function must return the same value given the same
    input values. A good example of this restriction is a function that fails this
    restriction: a function that is dependent on the current date. Therefore, trying
    to create this index fails: create index ie2_employees on employees(sysdate-hire_date);


    Error starting at line 1 in command:


    create index ie2_employees on employees(sysdate-hire_date)


    Error at Command Line:1 Column:40


    Error report:


    SQL Error: ORA-01743: only pure functions can be indexed


    01743\. 00000 - "only pure functions can be indexed"


    *Cause: The indexed function uses SYSDATE or the user environment.


    *Action: PL/SQL functions must be pure (RNDS, RNPS, WNDS, WNPS). SQL


    expressions must not use SYSDATE, USER, USERENV(), or anything


    else dependent on the session state. NLS-dependent functions


    are OK.'
  trans: "### 正则表达式替换参数\n\n`pattern`: 一个正则表达式，用于在 `source_string` 中搜索要被替换一次或多次的模式。\n\
    \n`replacement_string`: 用于替换由 `pattern` 匹配到的子字符串的字符串。\n\n`position`: 在目标字符串中开始搜索的位置（默认值为\
    \ 1）。\n\n`occurrence`: 要在目标字符串中查找的模式的第几次出现（默认为第一次出现）。\n\n`match_parameter`: 改变默认的匹配行为。\n\
    \n`pattern` 之后的所有参数都是可选的，但是如果你使用了诸如 `match_parameter` 的参数，则必须指定中间参数的值。`match_parameter`\
    \ 的选项与 `REGEXP_INSTR` 和 `REGEXP_COUNT` 相同。\n\n例如，你可能只想更改正则表达式中模式的第二次出现，而不管它在字符串中的位置如何（之前的方案将搜索锚定到字符串末尾的出现）。`UPDATE`\
    \ 语句看起来会像这样：\n\n```sql\nupdate locations\nset street_address =\nregexp_replace(street_address,'\\\
    s(road|rd|roade)',' RD',1, 2,'i')\nwhere regexp_instr(street_address,'\\s(road|rd|roade)',1,2,1,'i')\
    \ > 0;\n```\n\n将这个解决方案再推进一步，如果你想对正则表达式的 *最后一次* 出现进行替换呢？使用 `REGEXP_COUNT`（参见本章前面关于\
    \ `REGEXP_COUNT` 的方案）找到出现次数，然后使用该函数的结果来替换最后一次出现。在这个变体中，你想将 “S” 替换为所有 “South” 或\
    \ “So” 的出现，除了在字符串的开头或结尾：\n\n```sql\nupdate locations\nset street_address =\nregexp_replace(street_address,'\\\
    s(south|so)\\s',' S',1,\nregexp_count(street_address,'\\s(south|so)\\s',1,'i'),'i')\n\
    where regexp_count(street_address,'\\s(south|so)\\s',1,'i') > 0;\n```\n\n这个 `UPDATE`\
    \ 语句只更新那些至少出现一次模式的行，但在 `WHERE` 子句中使用 `REGEXP_COUNT` 来确定出现的次数，而不是使用 `REGEXP_INSTR`。\n\
    \n### 7-8. 加速字符串搜索\n\n**问题**\n\n你需要频繁地在 `VARCHAR2` 列的一部分上搜索一个大表。你要搜索的字符串要么是一个子字符串，要么是使用另一个返回字符串结果的\
    \ Oracle 函数对列进行转换后的结果。\n\n**解决方案**\n\n当你运行一个 `WHERE` 子句包含返回 `VARCHAR2` 值的 Oracle\
    \ 字符串函数的 `SELECT` 查询时，即使在该字符串函数引用的列上存在索引，Oracle 也会执行全表扫描。为了使 Oracle 能够使用索引，请使用与\
    \ `WHERE` 子句中相同的表达式来创建一个基于函数的索引（FBI）。\n\n以下 `CREATE INDEX` 语句在 `CITY` 列上创建了一个\
    \ FBI，如果 `CITY` 列中至少有两个空白字符，则该索引计算结果为非零值：\n\n```sql\ncreate index ie1_locations\
    \ on locations(regexp_instr(city,'\\s\\S+\\s'));\n```\n```\ncreate index succeeded.\n\
    ```\n\n为了让 Oracle（可能）利用该索引，你在 `WHERE` 子句中的过滤条件需要引用用于创建索引的表达式，如下例所示：\n\n```sql\n\
    select location_id, street_address, city, state_province\nfrom locations\nwhere\
    \ regexp_instr(city,'\\s\\S+\\s') > 0;\n```\n```\nLOCATION_ID STREET_ADDRESS \
    \                CITY                          STATE_PROVINCE\n----------- ------------------------------\
    \ ----------------------------- --------------\n1500        2011 Interiors Blvd\
    \            South San Francisco           California\n1 rows selected\n```\n\n\
    Oracle 可能仍然不使用基于函数的索引，这取决于表的大小和其他因素，但对于返回非常少量行的查询，FBI 通常会触发范围扫描而不是全表扫描。无论 `WHERE`\
    \ 子句中的列上是否存在 FBI，你的 `SELECT` 语句的语法都是相同的。\n\n**工作原理**\n\n基于函数的索引是建立在表达式上的索引，它不仅适用于\
    \ `VARCHAR2`，也适用于 `NUMBER` 和 `DATE` 等数据类型。决定创建 FBI 与决定创建 B 树、位图甚至索引组织表（IOT）非常相似：`SELECT`\
    \ 语句的性能提升是否能抵消索引所需的额外磁盘空间成本，以及在 `INSERT`、`DELETE`、`UPDATE` 和 `MERGE` 等 DML 语句期间维护索引的开销。如果你的环境中\
    \ `SELECT` 语句的数量和频率远远超过 DML 语句（如数据仓库或其他类型的报表应用程序），那么创建另一个索引可能是合理的。\n\n该解决方案包含了一个基于\
    \ `REGEXP_INSTR` 函数的 FBI，但函数定义可以简单到将数据库列转换为大写，如下例所示：\n\n```sql\ncreate index ie1_employees\
    \ on employees(upper(last_name));\n```\n```\ncreate index succeeded.\n```\n\n\
    对于员工姓氏的搜索，在 `WHERE` 子句中使用 `upper(last_name)` 将允许 Oracle 利用 FBI。\n\n你也可以在 `CREATE\
    \ INDEX` 语句的参数中对 `NUMBER` 列使用数字运算符来创建 FBI，以便在 `WHERE` 子句中出现该计算时利用索引。如果你的 `EMP_SAL_HIST`\
    \ 表如下所示：\n\n```\nName                                      Null     Type\n-----------------------------------------\
    \ -------- -----------------\nEMPLOYEE_ID                               NOT NULL\
    \ NUMBER\nFISCAL_YEAR                               NOT NULL NUMBER(4)\nSALARY\
    \                                    NOT NULL NUMBER\nBONUS                  \
    \                            NUMBER\n```\n\n你可以使用以下语句创建一个可以加速搜索总薪酬的 FBI：\n\n```sql\n\
    create index ie1_emp_sal_hist on emp_sal_hist(salary + nvl(bonus,0));\n```\n```\n\
    create index succeeded.\n```\n\n因此，如果你使用以下 `SELECT` 语句搜索 2008 年总薪酬大于等于 $200,000.00，Oracle\
    \ 优化器很可能会使用 FBI：\n\n```sql\nselect employee_id\nfrom emp_sal_hist\nwhere fiscal_year\
    \ = 2008\nand salary+nvl(bonus,0) >= 200000;\n```\n\n然而，下面的语句将不会使用索引，因为 `WHERE`\
    \ 子句中的表达式与用于创建 FBI 的表达式不完全匹配，即使 `WHERE` 子句指定了完全相同的过滤条件：\n\n```sql\nselect employee_id\n\
    from emp_sal_hist\nwhere fiscal_year = 2008\nand salary+decode(bonus,null,0,bonus)\
    \ >= 200000;\n```\n\n此外，前面的 `SELECT` 语句也很可能会产生不理想的结果，因为对于 `BONUS` 列为 `NULL` 的任何员工，`WHERE`\
    \ 子句中的表达式将返回 `NULL` 结果。\n\n创建和使用 FBI 有一些限制。例如，FBI 不能包含带有聚合函数的表达式。此外，为了让 Oracle\
    \ 使用 FBI，包含 FBI 的表或索引必须经过分析以收集 FBI 中计算结果的统计信息。最后，任何 FBI 必须返回确定性的值。换句话说，该函数对于相同的输入值必须返回相同的值。一个违反此限制的好例子是依赖于当前日期的函数。因此，尝试创建此索引会失败：\n\
    \n```sql\ncreate index ie2_employees on employees(sysdate-hire_date);\n```\n```\n\
    Error starting at line 1 in command:\ncreate index ie2_employees on employees(sysdate-hire_date)\n\
    Error at Command Line:1 Column:40\nError report:\nSQL Error: ORA-01743: only pure\
    \ functions can be indexed\n01743. 00000 - \"only pure functions can be indexed\"\
    \n*Cause:    The indexed function uses SYSDATE or the user environment.\n*Action:\
    \   PL/SQL functions must be pure (RNDS, RNPS, WNDS, WNPS). SQL\n           expressions\
    \ must not use SYSDATE, USER, USERENV(), or anything\n           else dependent\
    \ on the session state. NLS-dependent functions\n           are OK.\n```"
- fmt: "# Chapter 8: Working with Numbers\n\nWhen is a number not a number? When it’s\
    \ a string, of course. Throughout the history of databases, developers and DBAs\
    \ have had to grapple with numeric data that is presented as a string, and with\
    \ the need to convert digits in a text to a number data type. Beyond data type\
    \ issues, numbers also present interesting problems of precision and size. Contemporary\
    \ computers are fantastic at dealing with numbers on both a vast or miniscule\
    \ scale, but at some point you’ll likely need to deal with data infinitely larger\
    \ or smaller than you expected. Perhaps one of the most subtle issues when working\
    \ with numbers is the tension between humans counting in base 10, and computers\
    \ using binary.\n\nThis chapter introduces a host of recipes to deal with manipulating\
    \ numeric data, conversion between data types, precision and scale, and strange\
    \ corner cases that crop up thanks to the nature of relational databases. So,\
    \ let’s get started. Pick a number between 1 and 10.\n\n## 8-1. Converting Between\
    \ String and Numeric Data Types\n\n### Problem\nUsers are providing you data in\
    \ the `char` or `varchar2` data type that you subsequently need to convert to\
    \ `number`, `integer`, or other numeric type.\n\n### Solution\nOracle provides\
    \ the handy `TO_NUMBER` function to convert a wide variety of textual data to\
    \ valid numeric form. This function includes not just the ability to convert digits\
    \ in a textual string to their equivalent number, but also lets you deal with\
    \ decimal markers, separators, grouping characters, currency symbols, and more.\n\
    \nFor our recipe, we’ll assume that employees in our `HR.EMPLOYEES` table have\
    \ been granted a 100.00 per month salary increase. However, the system flagging\
    \ the increase is using text for the `100.00`, rather than a number. The next\
    \ SQL statement uses the `TO_NUMBER` function to correctly interpret that character\
    \ string and converts it to a numeric type that Oracle can use to perform addition\
    \ on the underlying `SALARY` column, which is of data type `NUMBER`.\n\n```sql\n\
    update hr.employees\nset salary = salary + to_number('100.00');\ncommit;\n```\n\
    \n### How It Works\nThis `TO_NUMBER` recipe is very straightforward in showing\
    \ the syntax of the function. We pass the string or expression we want converted\
    \ to the `TO_NUMBER` function and the function parses the text, attempting to\
    \ interpret a valid number from it.\n\nWe used the `TO_NUMBER` function in an\
    \ `UPDATE` statement. To see that it really produced the number `100` and added\
    \ that to the employee salaries, you can run a `SELECT` statement that shows the\
    \ existing and new salaries side by side, as shown in the next SQL block.\n\n\
    ```sql\nselect salary \"Existing salary\", salary + to_number('100.00') \"New\
    \ Salary\"\nfrom hr.employees;\n```\n```\nExisting salary New Salary\n---------------\
    \ ----------\n           2600       2700\n           2600       2700\n       \
    \    4400       4500\n          13000      13100\n           6000       6100\n\
    ```\n\nSo far, we’ve displayed the basic form of the `TO_NUMBER` function. There\
    \ are also two optional parameters that may be passed to the `TO_NUMBER` function,\
    \ giving three different forms of the function overall.\n\n1.  `TO_NUMBER(<expression\
    \ or literal string>)`: Convert the expression or literal string to an Oracle\
    \ number using implicit parsing, matching, and conversion rules.\n2.  `TO_NUMBER(<expression\
    \ or literal string>, <format mask>)`: Convert the expression using the provided\
    \ format mask to match digits, thousands separators, and decimal points.\n3. \
    \ `TO_NUMBER(<expression or literal string>, <format mask>, <'NLS parameters'>)`:\
    \ Use the format mask and explicit localization `NLS` parameters to force a match,\
    \ especially where foreign currency symbols and different punctuation forms are\
    \ used.\n\nWhere the `NLS` parameters and format mask are not specified, `TO_NUMBER`\
    \ refers to settings such as `NLS_NUMERIC_CHARACTERS` and `NLS_CURRENCY` to determine\
    \ implicit values for use. See section 8-5 for recipes that illustrate the format\
    \ mask and `NLS` parameters in action.\n\n## 8-2. Converting Between Numeric Data\
    \ Types\n\n### Problem\nYou need to convert numeric data between two Oracle data\
    \ types. For instance, you have data stored as `NUMBER` and need to convert it\
    \ to `BINARY_DOUBLE` while controlling any loss of accuracy.\n\n### Solution\n\
    Oracle provides explicit functions to accommodate conversion between numeric data\
    \ types. While you can often rely on implicit conversion, it can be important\
    \ to take control of the conversion process explicitly, to handle issues such\
    \ as rounding, loss of precision, scale differences, and more.\n\nTo illustrate\
    \ these functions, our recipe uses the `TO_BINARY_DOUBLE` function in the next\
    \ SQL statement to convert the product of employee salaries and commissions.\n\
    \n```sql\nselect to_binary_double(salary*commission_pct)\nfrom hr.employees\n\
    where job_id = 'SA_REP';\n```\n```\nTO_BINARY_DOUBLE(SALARY*COMMISSION_PCT)\n\
    ---------------------------------------\n8.75E+002\n8.75E+002\n8.75E+002\n3.0E+003\n\
    2.375E+003\n...\n```\n\n### How It Works\nThere are many reasons for needing this\
    \ exact kind of conversion, such as exchanging data with a finance system that\
    \ requires numeric data in binary form (and with binary precision).\n\nThe `TO_BINARY_DOUBLE`\
    \ function, like its peer functions that deal with other numeric types, takes\
    \ a numeric value or expression and performs the necessary conversion to the `BINARY_DOUBLE`\
    \ data type.\n\nImportantly, this conversion in particular deals with converting\
    \ data stored with decimal precision (used with the `NUMBER` data type) to binary\
    \ precision. As such, there is a chance for minor rounding errors or loss to creep\
    \ in because certain decimal fractions cannot be precisely represented in binary\
    \ form.\n\nOther related numeric conversion functions are `TO_NUMBER` and `TO_BINARY_FLOAT`.\n\
    \n## Binary vs Decimal Precision\nWhen storing any number in Oracle, regardless\
    \ of type, there are issues related to how much space it takes to store your number,\
    \ and even whether it can be represented accurately at all. In essence, a number\
    \ with binary precision is stored as the sum of various powers of two. For instance,\
    \ `0.5` would be stored as `2^-1`, and `0.75` would be stored as `2^-1 + 2^-2`.\
    \ With decimal precision, the same values would be stored as `5 × 10^-1`, or `7\
    \ × 10^-1 + 5 × 10^-2`. The result would be the same number, but the method of\
    \ storage differs.\n\nThis becomes important as the numbers become harder to represent\
    \ as powers of 2 or powers of 10.\n\nOracle can literally run out of storage to\
    \ represent a number accurately within a given datatype. We can illustrate this\
    \ with a table declared as follows:\n\n```sql\ncreate table numbersize (\n   \
    \ base2number binary_double,\n    base10number number);\n```\n\nInserting the\
    \ same number is easy.\n\n```sql\nInsert into numbersize values (1/3, 1/3);\n\
    ```\n\nWith the value one-third stored in each column, we can use the `VSIZE`\
    \ function to show it was much more complicated to store this with decimal precision,\
    \ taking nearly three times the space.\n\n```sql\nselect\n    vsize(base2number)\
    \ size_of_binary_double,\n    vsize(base10number) size_of_number\nfrom numbersize;\n\
    ```\n```\nSIZE_OF_BINARY_DOUBLE SIZE_OF_NUMBER\n--------------------- --------------\n\
    \                    8             21\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)"
  raw: 'If you use a built-in or user-written function in an FBI, the function (or
    the package specification containing the function) must be declared as DETERMINISTIC.
    This does not ensure that the function returns the same value every time, but
    it provides another reminder that your index will not find the correct rows in
    the table if the function does not return the same values for a given set of input
    values every time. In other words, when you declare a function as DETERMINISTIC,
    make sure it *is* deterministic!


    Similarly, if you change the logic in a function and recompile it, you must drop
    and recreate any indexes or materialized views that depend on the function, since
    the index entries or materialized view rows are pre-computed based on the previous
    version of the function.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 8**


    ■ ■ ■


    **Working with Numbers**


    When is a number not a number? When it’s a string, of course. Throughout the history
    of databases, developers and DBAs have had to grapple with numeric data that is
    presented as a string, and with the need to convert digits in text to a number
    data type. Beyond data type issues, numbers also present interesting problems
    of precision and size. Contemporary computers are fantastic at dealing with numbers
    on both a vast or miniscule scale, but at some point you’ll likely need to deal
    with data infinitely larger or smaller than you expected. Perhaps one of the most
    subtle issues when working with numbers is the tension between humans counting
    in base 10, and computers using binary.


    This chapter introduces a host of recipes to deal with manipulating numeric data,
    conversion between data types, precision and scale, and strange corner cases that
    crop up thanks to the nature of relational databases. So, let’s get started. Pick
    a number between 1 and 10.


    8-1\. Converting Between String and Numeric Data Types


    Problem


    Users are providing you data in the char or varchar2 data type that you subsequently
    need to convert to number, integer, or other numeric type.


    Solution


    Oracle provides the handy TO_NUMBER function to convert a wide variety of textual
    data to valid numeric form. This function includes not just the ability to convert
    digits in a textual string to their equivalent number, but also lets you deal
    with decimal markers, separators, grouping characters, currency symbols, and more.


    For our recipe, we’ll assume that employees in our HR.EMPLOYEES table have been
    granted a 100.00


    per month salary increase. However, the system flagging the increase is using
    text for the 100.00, rather than a number. The next SQL statement uses the TO_NUMBER
    function to correctly interpret that character string and converts it to a numeric
    type that Oracle can use to perform addition on the underlying SALARY column,
    which is of data type NUMBER.


    update hr.employees


    set salary = salary + to_number(''100.00'');


    commit;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8 ■ WORKING WITH NUMBERS


    How It Works


    This TO_NUMBER recipe is very straightforward in showing the syntax of the function.
    We pass the string or expression we want converted to the TO_NUMBER function and
    the function parses the text, attempting to interpret a valid number from it.


    We used the TO_NUMBER function in an UPDATE statement. To see that it really produced
    the number 100 and added that to the employee salaries, you can run a SELECT statement
    that shows the existing and new salaries side by side, as shown in the next SQL
    block.


    select salary "Existing salary", salary + to_number(''100.00'') "New Salary"


    from hr.employees;


    Existing salary New Salary


    --------------- ----------


    2600 2700


    2600 2700


    4400 4500


    13000 13100


    6000 6100


    So far, we’ve displayed the basic form of the TO_NUMBER function. There are also
    two optional parameters that may be passed to the TO_NUMBER function, giving three
    different forms of the function overall.


    TO_NUMBER(<expression or literal string>): Convert the expression or literal string
    to an Oracle number using implicit parsing, matching, and conversion rules.


    TO_NUMBER(<expression or literal string>, <format mask>): Convert the expression
    using the provided format mask to match digits, thousands separators, and decimal
    points.


    TO_NUMBER(<expression or literal string>, <format mask>, <''NLS parameters''>):
    Use the format mask and explicit localization NLS parameters to force a match,
    especially where foreign currency symbols and different punctuation forms are
    used.


    Where the NLS parameters and format mask are not specified, TO_NUMBER refers to
    settings such as NLS_NUMERIC_CHARACTERS and NLS_CURRENCY to determine implicit
    values for use. See section 8-5 for recipes that illustrate the format mask and
    NLS parameters in action.


    8-2\. Converting Between Numeric Data Types


    Problem


    You need to convert numeric data between two Oracle data types. For instance,
    you have data stored as NUMBER and need to convert it to BINARY_DOUBLE while controlling
    any loss of accuracy.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8 ■ WORKING WITH NUMBERS


    Solution


    Oracle provides explicit functions to accommodate conversion between numeric data
    types. While you can often rely on implicit conversion, it can be important to
    take control of the conversion process explicitly, to handle issues such as rounding,
    loss of precision, scale differences, and more.


    To illustrate these functions, our recipe uses the TO_BINARY_DOUBLE function in
    the next SQL


    statement to convert the product of employee salaries and commissions.


    select to_binary_double(salary*commission_pct)


    from hr.employees


    where job_id = ''SA_REP'';


    TO_BINARY_DOUBLE(SALARY*COMMISSION_PCT)


    8.75E+002


    8.75E+002


    8.75E+002


    3.0E+003


    2.375E+003


    ...


    How It Works


    There are many reasons for needing this exact kind of conversion, such as exchanging
    data with a finance system that requires numeric data in binary form (and with
    binary precision).


    The TO_BINARY_DOUBLE function, like its peer functions that deal with other numeric
    types, takes a numeric value or expression and performs the necessary conversion
    to the BINARY_DOUBLE data type.


    Importantly, this conversion in particular deals with converting data stored with
    decimal precision (used with the NUMBER data type) to binary precision. As such,
    there is a chance for minor rounding errors or loss to creep in because certain
    decimal fractions cannot be precisely represented in binary form.


    Other related numeric conversion functions are TO_NUMBER and TO_BINARY_FLOAT.


    **Binary vs Decimal Precision**


    When storing any number in Oracle, regardless of type, there are issues related
    to how much space it takes to store your number, and even whether it can be represented
    accurately at all. In essence, a number with binary precision is stored as the
    sum of various powers of two. For instance, 0.5 would be stored as 2-1, and 0.75
    would be stores as 2-1 + 2-2\. With decimal precision, the same values would be
    stored as 5 × 10-1, or 7 × 10-1 + 5 × 10-2\. The result would be the same number,
    but the method of storage differs.


    This becomes important as the numbers become harder to represent as powers of
    2 or powers of 10.


    Oracle can literally run out of storage to represent a number accurately within
    a given datatype. We can illustrate this with a table declared as follows:


    create table numbersize (


    base2number binary_double,


    base10number number);


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8 ■ WORKING WITH NUMBERS


    Inserting the same number is easy.


    Insert into numbersize values (1/3, 1/3);


    With the value one-third stored in each column, we can use the VSIZE function
    to show it was much more complicated to store this with decimal precision, taking
    nearly three times the space.


    select


    vsize(base2number) size_of_binary_double,


    vsize(base10number) size_of_number


    from numbersize;


    SIZE_OF_BINARY_DOUBLE SIZE_OF_NUMBER


    --------------------- --------------


    8 21'
  trans: "# 第 8 章：数字处理\n\n数字何时不是数字？当然是当它是一串字符时。纵观数据库的历史，开发人员和数据库管理员一直需要处理以字符串形式呈现的数字数据，以及将文本中的数字转换为数字数据类型的需求。除了数据类型问题，数字还带来了精度和规模方面的有趣问题。当代计算机在处理极大或极小的数字方面非常出色，但在某些时候，你很可能需要处理比预期大得多或小得多的数据。处理数字时，最微妙的问题之一或许是人类使用十进制计数与计算机使用二进制之间的张力。\n\
    \n本章介绍了一系列处理操作数字数据、转换数据类型、处理精度与比例，以及关系型数据库特性引发的奇怪边界情况的实用方法。那么，让我们开始吧。请在 1 到 10\
    \ 之间选一个数字。\n\n## 8-1. 在字符串与数字数据类型之间转换\n\n### 问题\n用户向你提供`char`或`varchar2`数据类型的数据，而你随后需要将其转换为`number`、`integer`或其他数字类型。\n\
    \n### 解决方案\nOracle 提供了方便的`TO_NUMBER`函数，可将各种文本数据转换为有效的数字形式。该函数不仅能够将文本字符串中的数字转换为其等价的数字，还能处理小数标记、分隔符、分组字符、货币符号等。\n\
    \n在我们的示例中，我们假设`HR.EMPLOYEES`表中的员工每月获得了 100.00 的加薪。然而，系统使用文本`'100.00'`来标记这次加薪，而不是使用数字。下面的\
    \ SQL 语句使用`TO_NUMBER`函数来正确解释该字符串，并将其转换为 Oracle 可用于对底层`NUMBER`数据类型的`SALARY`列执行加法的数字类型。\n\
    \n```sql\nupdate hr.employees\nset salary = salary + to_number('100.00');\ncommit;\n\
    ```\n\n### 工作原理\n这个`TO_NUMBER`示例非常直接地展示了该函数的语法。我们将想要转换的字符串或表达式传递给`TO_NUMBER`函数，函数会解析文本，尝试从中解释出一个有效的数字。\n\
    \n我们在`UPDATE`语句中使用了`TO_NUMBER`函数。为了确认它确实生成了数字`100`并将其加到了员工工资上，你可以运行一个`SELECT`语句并列显示现有工资和新工资，如下一个\
    \ SQL 代码块所示。\n\n```sql\nselect salary \"Existing salary\", salary + to_number('100.00')\
    \ \"New Salary\"\nfrom hr.employees;\n```\n```\nExisting salary New Salary\n---------------\
    \ ----------\n           2600       2700\n           2600       2700\n       \
    \    4400       4500\n          13000      13100\n           6000       6100\n\
    ```\n\n到目前为止，我们已经展示了`TO_NUMBER`函数的基本形式。还可以向`TO_NUMBER`函数传递两个可选参数，总共有三种不同的函数形式。\n\
    \n1.  `TO_NUMBER(<表达式或字面字符串>)`：使用隐式解析、匹配和转换规则将表达式或字面字符串转换为 Oracle 数字。\n2.  `TO_NUMBER(<表达式或字面字符串>,\
    \ <格式掩码>)`：使用提供的格式掩码转换表达式，以匹配数字、千位分隔符和小数点。\n3.  `TO_NUMBER(<表达式或字面字符串>, <格式掩码>,\
    \ <'NLS 参数'>)`：使用格式掩码和显式的本地化`NLS`参数来强制匹配，尤其是在使用外来货币符号和不同标点形式的情况下。\n\n如果未指定`NLS`参数和格式掩码，`TO_NUMBER`会参考诸如`NLS_NUMERIC_CHARACTERS`和`NLS_CURRENCY`之类的设置来确定要使用的隐式值。有关格式掩码和`NLS`参数实际应用的示例，请参见第\
    \ 8-5 节。\n\n## 8-2. 在数字数据类型之间转换\n\n### 问题\n你需要在两个 Oracle 数据类型之间转换数字数据。例如，你有数据存储为`NUMBER`，需要将其转换为`BINARY_DOUBLE`，同时控制精度的损失。\n\
    \n### 解决方案\nOracle 提供了显式函数以支持数字数据类型之间的转换。虽然通常可以依赖隐式转换，但显式控制转换过程可能很重要，以便处理舍入、精度损失、比例差异等问题。\n\
    \n为了说明这些函数，我们的示例在下一个 SQL 语句中使用`TO_BINARY_DOUBLE`函数来转换员工工资和佣金比例的乘积。\n\n```sql\n\
    select to_binary_double(salary*commission_pct)\nfrom hr.employees\nwhere job_id\
    \ = 'SA_REP';\n```\n```\nTO_BINARY_DOUBLE(SALARY*COMMISSION_PCT)\n---------------------------------------\n\
    8.75E+002\n8.75E+002\n8.75E+002\n3.0E+003\n2.375E+003\n...\n```\n\n### 工作原理\n\
    需要进行此类精确转换的原因有很多，例如与需要二进制形式数字数据（并具有二进制精度）的金融系统交换数据。\n\n`TO_BINARY_DOUBLE`函数与处理其他数字类型的同类函数一样，接受一个数值或表达式，并执行必要的转换以得到`BINARY_DOUBLE`数据类型。\n\
    \n重要的是，这种特定的转换处理的是将存储为十进制精度（用于`NUMBER`数据类型）的数据转换为二进制精度。因此，可能会出现微小的舍入误差或损失，因为某些十进制分数无法在二进制形式中精确表示。\n\
    \n其他相关的数字转换函数是`TO_NUMBER`和`TO_BINARY_FLOAT`。\n\n## 二进制精度 vs 十进制精度\n在 Oracle 中存储任何数字时，无论其类型如何，都存在与存储该数字所需空间相关的问题，甚至存在它能否被准确表示的问题。本质上，具有二进制精度的数字存储为各种\
    \ 2 的幂的和。例如，`0.5`将存储为`2^-1`，而`0.75`将存储为`2^-1 + 2^-2`。使用十进制精度时，相同的值将存储为`5 × 10^-1`或`7\
    \ × 10^-1 + 5 × 10^-2`。结果将是相同的数字，但存储方法不同。\n\n当数字变得难以表示为 2 的幂或 10 的幂时，这一点就变得很重要。\n\
    \nOracle 实际上可能会耗尽存储空间，无法在给定的数据类型内准确表示一个数字。我们可以通过如下声明的表示例来说明这一点：\n\n```sql\ncreate\
    \ table numbersize (\n    base2number binary_double,\n    base10number number);\n\
    ```\n\n插入相同的数字很容易。\n\n```sql\nInsert into numbersize values (1/3, 1/3);\n```\n\
    \n将三分之一的值存储在每一列中后，我们可以使用`VSIZE`函数来显示，使用十进制精度存储要复杂得多，几乎需要三倍的空间。\n\n```sql\nselect\n\
    \    vsize(base2number) size_of_binary_double,\n    vsize(base10number) size_of_number\n\
    from numbersize;\n```\n```\nSIZE_OF_BINARY_DOUBLE SIZE_OF_NUMBER\n---------------------\
    \ --------------\n                    8             21\n```\n\n[IT 电子书网](http://www.it-ebooks.info/)"
- fmt: "With a little exploration, you’ll quickly find values that can’t be stored\
    \ precisely with one data type or the other.\n\n## 8-3. Choosing Data Type Precision\
    \ and Scale\n\n### Problem\nYou want to store currency information for prices,\
    \ order amounts, and sales discounts in an online shopping application. You need\
    \ to track dollars and cents (or other currencies) accurately.\n\n### Solution\n\
    Almost all of Oracle’s `NUMBER`-style data types could be used to store prices\
    \ and sale amounts. To best illustrate the use of precision and scale, we’ll use\
    \ the `NUMBER` data type itself.\n\nOur recipe will focus on a new table for our\
    \ order entry system in the `OE` schema. Let’s create a table to track coupons\
    \ for customer discounts.\n```sql\ncreate table oe.coupons (\n  coupon_code  number(9,0)\
    \  not null,\n  customer_id  number(6,0)  not null,\n  coupon_value number(5,2)\
    \  not null,\n  restrictions varchar2(100)\n);\n```\nWe can now store precise\
    \ coupon discount amounts using the new `OE.COUPONS` table. The next `INSERT`\
    \ statement illustrates adding new data to the table.\n```sql\ninsert into oe.coupons\
    \ values\n(1, 150, 29.95, 'No restrictions');\ncommit;\n```\nQuerying the table\
    \ shows each of our `NUMBER` values stored with the precision and scale as defined\
    \ in our `CREATE TABLE` statement.\n```sql\nselect * from oe.coupons;\n```\n```\n\
    COUPON_CODE CUSTOMER_ID COUPON_VALUE RESTRICTIONS\n----------- ----------- ------------\
    \ ------------------------------------------\n          1         150        29.95\
    \ No restrictions\n```\n\n### How It Works\nThe best way to think about the format\
    \ of `NUMBER`, `NUMERIC`, and `DECIMAL` data types is in the general form `number(p,s)`.\n\
    \nIn this expression, `number` is the name of the data type; you may use `numeric`\
    \ or `decimal`, but know that these are implicitly mapped to the `NUMBER` data\
    \ type for storage. The value `p` is the precision, which states the total number\
    \ of digits of precision the number may have, *including* the fractional (scale)\
    \ part of the number. The value `s`, scale, indicates how many of the total precision\
    \ digits are dedicated to the fractional part of the number, that is, the portion\
    \ to the right of the decimal point.\n\nIn our `OE.COUPONS` table, you can deduce\
    \ that `COUPON_CODE` may be up to 9 digits, with no decimal places as the scale\
    \ value is zero. Similarly, `CUSTOMER_ID`, the foreign key of the `OE.CUSTOMERS`\
    \ table, uses a `NUMBER` of up to six digits with no allowance for decimal places.\n\
    \nThe `COUPON_VALUE` field introduces a common specification you’ll see for currency\
    \ in dollar-denominated and similar systems. Its precision is five, meaning a\
    \ total of five digits can be used for the whole and fractional part of the value\
    \ of a coupon. The scale is two, constraining the `COUPON_VALUE` to using two\
    \ of its five digits for decimal places. By implication, this only leaves three\
    \ digits for whole dollars. You can test this yourself with the next `INSERT`\
    \ statement, which attempts to create a coupon with a value beyond the constraints\
    \ of our `COUPON_VALUE` column.\n```sql\ninsert into oe.coupons values\n(2, 155,\
    \ 1000, 'Requires CEO approval');\n```\nAttempting this `INSERT` returns an error\
    \ highlighting the restrictions on `COUPON_VALUE`.\n```\nERROR at line 2:\nORA-01438:\
    \ value larger than specified precision allowed for this column\n```\nNote that\
    \ the error presented specifies it’s the precision of the `COUPON_VALUE` field\
    \ that prevents the value `1000` being used. Because the column is specified as\
    \ `COUPON_VALUE NUMBER(5,2) NOT NULL`, Oracle implicitly can only store three\
    \ digits of precision, meaning values up to `999`, but not `1000`, which requires\
    \ four digits. It’s tempting to think that the same style of constraint applies\
    \ to the scale, should you exceed the specified number of two scale digits. The\
    \ next `INSERT` statement attempts to insert a new coupon with a scale specified\
    \ far more specifically than our table definition allows.\n```sql\ninsert into\
    \ oe.coupons values\n(3, 160, 0.9950, 'We will see if anyone can spend half a\
    \ cent!');\n```\n`1 row created.`\n\nCHAPTER 8 ■ WORKING WITH NUMBERS"
