    The preceding exercise was a simple example of how adding an index improved the
    performance of one query. Be aware that adding an index that speeds up one query
    can potentially have adverse effects on other aspects of the application. An index
    will minimally add the overhead of additional disk space and processing to maintain
    the index when the table is inserted, updated, or deleted from. You should add
    the index in a test environment and verify that it improves performance without
    unintended side effects. Additional considerations would be the type of index
    (`B-tree`, `bitmap`, and so on), storage characteristics, and the index’s tablespace.


    **Note** The `cost` of each row is the optimizer’s weighted estimate of how expensive
    each step is in terms of system resources such as `CPU`, `I/O`, and `memory`.
    The `cost` doesn’t have a unit of measurement per se; rather it’s a number that
    the optimizer uses to compare execution plans and steps. In general, the lower
    the `cost` the better the expected performance of the operation and query.


    ## How It Works


    When interpreting each step of the execution plan, each `ID` in the plan is associated
    with an operation.


    The two types of operations that have the biggest impact on performance are:


    - Access Path

    - Join Method


    The `access path` describes how data is retrieved from the database. Table 19-3
    describes the most common execution plan access paths. In general, when a small
    subset of a table’s data is to be retrieved, an index access path should be used.
    When a large portion of a table’s data is returned, a full table scan may be more
    appropriate.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 19 SQL MONITORING AND TUNING


    ### Table 19-3 Most Common Access Paths


    | Access Path | Description |

    |-------------|-------------|

    | Full table scan | All rows from a table are read, which is efficient when large
    portions of a table’s rows need to be read. When only small portions of the table
    need to be read, an index may be created to eliminate full table scans. |

    | Rowid scan | Locates a row by `ROWID`. The `ROWID` contains the physical location
    of the row within a datafile and a block, efficient when a relatively small number
    of rows are retrieved, less efficient when large portion of a table is read. |

    | Index scan | An index contains key values and a `ROWID`. If the query only needs
    information contained in the index key values, `Oracle` returns those values,
    otherwise it uses the `ROWID` to retrieve additional data from the table row.
    |


    `Join methods` are techniques the optimizer uses to retrieve data from multiple
    tables. Join statements result from tables joined in the `WHERE` clause. Table
    19-4 provides an overview of the various join methods. The optimizer must compute
    the following for each join statement:


    - Access path for returning rows for each table in the join

    - Join method

    - Join order when more than two tables are involved in the join


    ### Table 19-4 Join Methods


    | Join Method | Description |

    |-------------|-------------|

    | Nested loop | Useful when joining small subsets of data and there is a unique
    index or highly selective indexed access to the second table (inner) in the join.
    |

    | Hash join | Efficient for joining large sets of data. A hash table is built
    in memory on the join key of the smaller table or result set. The larger table
    is scanned and uses the hash table to retrieve rows. |

