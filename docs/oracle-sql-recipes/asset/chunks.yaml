    plan.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    Recommendation


    - Consider removing the disconnected table or view from this statement or add
    a join condition which refers to it.


    Rationale


    A cartesian product should be avoided whenever possible because it is an expensive
    operation and might produce a large amount of data.


    As you can see from the previous output, the SQL Tuning Advisor report correctly
    recommends rewriting the query so that it doesn’t use a cartesian join.


    How It Works


    The SQL Tuning Advisor helps automate the task of tuning poorly performing queries.
    The tool is fairly easy to use and the tuning output report provides detailed
    suggestions on how to tune a query.


    If you need to drop a tuning task, use the DBMS_SQLTUNE package as follows: SQL>
    EXEC DBMS_SQLTUNE.DROP_TUNING_TASK(task_name=>''tune1'');


    ■ **Note** The SQL Tuning Advisor is also available in Oracle Enterprise Manager.
    If you have access to Enterprise Manager, you may find it easier to use the graphical
    interface.


    19-12\. Forcing Your Own Execution Plan on a Query


    Problem


    You suspect that the optimizer isn’t using an index that is available. You want
    to force the optimizer to use the index and see if the cost of the query is reduced.


    Solution


    The syntax for a hint is to place the following comment /*+ <hint> */ immediately
    after the SELECT


    keyword. The following code uses the INDEX hint to instruct the optimizer to use
    the EMP_IDX1 index on the EMP table:


    SELECT /*+ INDEX (emp emp_idx1) */


    ename


    FROM emp


    WHERE ename=''Chaya'';


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    If you use table aliases, ensure that the alias is referenced in the hint, not
    the table name. When using aliases, the hint will be ignored if you use the table
    name within the hint. The following example references the table alias within
    the full table scan hint:


    SELECT /*+ FULL(a) */ ename


    FROM emp a


    WHERE ename=''Heera'';'
  trans: "\n# 第 19 章：SQL 监控与调优\n\n**注意** 截至本书撰写时，SQL 调优顾问属于 Oracle 数据库调优包，需要额外付费许可。\n\
    \n请按以下步骤从调优顾问获取调优建议：\n\n1.  以特权用户连接，并向将执行调优分析的模式授予以下权限：\n\n   ```sql\n   GRANT\
    \ ADMINISTER SQL TUNING SET TO &&tune_user;\n   GRANT ADVISOR TO &&tune_user;\n\
    \   GRANT CREATE ANY SQL PROFILE TO &&tune_user;\n   GRANT ALTER ANY SQL PROFILE\
    \ TO &&tune_user;\n   GRANT DROP ANY SQL PROFILE TO &&tune_user;\n   ```\n\n \
    \  如果您使用的是 Oracle Database 11g，前面的 `GRANT ... ANY SQL PROFILE` 语句可以替换为：\n\n  \
    \ ```sql\n   GRANT ADMINISTER SQL MANAGEMENT OBJECT TO &&tune_user;\n   ```\n\n\
    2.  使用 `DBMS_SQLTUNE` 包创建调优任务。修改以下代码以匹配您要尝试调优的查询以及您的用户名：\n\n   ```sql\n   DECLARE\n\
    \     tune_task_name VARCHAR2(30);\n     tune_sql CLOB;\n   BEGIN\n     tune_sql\
    \ := 'select a.emp_name, b.dept_name from emp a, dept b';\n     tune_task_name\
    \ := DBMS_SQLTUNE.CREATE_TUNING_TASK(\n       sql_text => tune_sql,\n       user_name\
    \ => 'STAR_APR',\n       scope => 'COMPREHENSIVE',\n       time_limit => 1800,\n\
    \       task_name => 'tune1',\n       description => 'Basic tuning example'\n\
    \     );\n   END;\n   /\n   ```\n\n3.  通过查询 `USER_ADVISOR_LOG` 视图来验证您的调优任务是否存在：\n\
    \n   ```sql\n   SQL> SELECT task_name FROM user_advisor_log WHERE task_name LIKE\
    \ 'tune1';\n   ```\n\n4.  运行调优任务：\n\n   ```sql\n   SQL> EXEC DBMS_SQLTUNE.EXECUTE_TUNING_TASK(task_name=>'tune1');\n\
    \   ```\n\n5.  显示 SQL 调优顾问报告。运行以下 SQL 语句显示输出：\n\n   ```sql\n   SET LONG 10000\n\
    \   SET LONGCHUNKSIZE 10000\n   SET LINESIZE 132\n   SET PAGESIZE 200\n   --\n\
    \   SELECT DBMS_SQLTUNE.REPORT_TUNING_TASK('tune1') FROM dual;\n   ```\n\n   以下是输出的片段：\n\
    \n   3- 重构 SQL 发现（参见解释计划部分中的计划 1）\n\n   在执行计划的行 ID 1 处发现了一个昂贵的笛卡尔积操作。\n\n   **建议**\n\
    \n   -   考虑从此语句中移除未关联的表或视图，或者添加一个引用它的连接条件。\n\n   **原理**\n\n   应尽可能避免笛卡尔积，因为它是一种昂贵的操作，并且可能产生大量数据。\n\
    \n   从前面的输出可以看出，SQL 调优顾问报告正确地建议重写查询，以避免使用笛卡尔连接。\n\n**工作原理**\n\nSQL 调优顾问有助于自动完成调优性能不佳的查询的任务。该工具相当易于使用，其调优输出报告提供了关于如何调优查询的详细建议。\n\
    \n如果您需要删除调优任务，可以使用 `DBMS_SQLTUNE` 包，如下所示：\n\n```sql\nSQL> EXEC DBMS_SQLTUNE.DROP_TUNING_TASK(task_name=>'tune1');\n\
    ```\n\n**注意** SQL 调优顾问在 Oracle Enterprise Manager 中也可用。如果您有 Enterprise Manager\
    \ 的访问权限，可能会发现使用图形界面更容易。\n\n## 19-12. 对查询强制使用自己的执行计划\n\n### 问题\n\n您怀疑优化器没有使用可用的索引。您希望强制优化器使用该索引，并查看查询的成本是否降低。\n\
    \n### 解决方案\n\n提示（hint）的语法是将注释 `/*+ <hint> */` 紧跟在 `SELECT` 关键字之后。以下代码使用 `INDEX`\
    \ 提示来指示优化器在 `EMP` 表上使用 `EMP_IDX1` 索引：\n\n```sql\nSELECT /*+ INDEX (emp emp_idx1)\
    \ */\n  ename\nFROM emp\nWHERE ename='Chaya';\n```\n\n如果使用表别名，请确保在提示中引用的是别名，而不是表名。使用别名时，如果在提示中使用表名，该提示将被忽略。以下示例在全表扫描提示中引用了表别名：\n\
    \n```sql\nSELECT /*+ FULL(a) */ ename\nFROM emp a\nWHERE ename='Heera';\n```\n"
- fmt: '# SQL Hints


    ## 重要注意事项


    如果你拼错了提示（hint）的名称，或者在表别名或索引名称中打错了字，Oracle 将忽略该提示。你可以通过设置 `AUTOTRACE ON` 并查看执行计划来验证提示是否被使用。


    请记住，在某些情况下 Oracle 会忽略提示。Oracle 可能判定提示指令在给定场景下不可行，因此拒绝你的建议。


    ## 工作原理


    SQL 提示允许你在执行计划中覆盖优化器的选择。有时，因为你知道一些优化器不了解的环境信息（就像相机上的运动或风景设置），查询性能问题可以得到改善。


    例如，假设你有一个数据仓库数据库使用系统范围的 `ALL_ROWS` 设置，但你也想针对该数据库运行一个 OLTP 报表查询，该查询使用 `FIRST_ROWS`
    设置会更高效。在这种情况下，你可以提示优化器使用 `FIRST_ROWS` 而不是 `ALL_ROWS`。


    ## 使用建议


    我们建议你谨慎使用提示。在使用提示之前，首先尝试找出优化器为何没有选择高效的执行计划。研究是否可以重写查询，或者添加索引或生成新的统计信息是否有帮助。依赖提示来获得良好的性能既耗时，也可能在升级到较新版本的数据库时导致问题。


    ## 提示分类


    在最新版本的 Oracle 中，有超过 200 种不同的提示。描述每一个提示超出了本教程的范围。**表 19-6** 描述了提示的主要类别。


    **提示** 从 Oracle Database 11*g* 开始，你可以查询 `V$SQL_HINT` 来获取有关提示的信息。


    *表 19-6. SQL 提示分类*


    | 提示类别 | 描述 | 提示示例 |

    | :--- | :--- | :--- |

    | **优化器目标** | 优化吞吐量或响应速度。 | `ALL_ROWS`, `FIRST_ROWS` |

    | **访问路径** | 检索数据的路径。 | `INDEX`, `NO_INDEX`, `FULL` |

    | **查询转换** | 以不同方式执行查询。 | `STAR_TRANSFORMATION`, `MERGE`, `FACT`, `REWRITE` |

    | **连接顺序** | 更改要连接的表的顺序。 | `ORDERED`, `LEADING` |

    | **并行操作** | 并行执行。 | `PARALLEL`, `PARALLEL_INDEX`, `NOPARALLEL` |

    | **连接操作** | 如何连接表。 | `USE_NL`, `USE_MERGE`, `USE_HASH` |

    | **杂项** | 不属于特定类别但有时有用的提示。 | `APPEND`, `CACHE`, `DRIVING_SITE` |


    # 19-13. 查看优化器统计信息


    ## 问题


    你遇到了性能问题。你想确定被查询的表是否存在统计信息。


    ## 解决方案


    检查统计信息是否准确的一个快速简便的方法是比较 `USER_TABLES` 中的 `NUM_ROWS` 列与表的实际行数。以下脚本将提示你输入表名：

    ```sql

    select a.num_rows/b.actual_rows

    from user_tables a

    ,(select count(*) actual_rows from &&table_name) b

    where a.table_name=upper(''&&table_name'');

    ```


    下一个脚本使用 SQL 为某个用户的所有表生成前面的 SQL。该脚本使用 SQL*Plus 格式化命令来关闭标题和分页：

    ```sql

    set head off pages 0 lines 132 trimspool on

    spo show_stale.sql

    select

    ''select '' || '''''''' || table_name || '': '' || '''''''' || ''||'' || chr(10)
    ||

    '' round(decode(b.actual_rows,0,0,a.num_rows/b.actual_rows),2) '' || chr(10) ||

    ''from user_tables a '' ||

    '',(select count(*) actual_rows from '' || table_name || '') b'' || chr(10) ||

    ''where a.table_name=('' || '''''''' || table_name || '''''''' || '');''

    from user_tables;

    spo off;

    ```


    此脚本会生成一个名为 `show_stale.sql` 的文件，你可以执行该文件以显示表统计信息的陈旧程度。


    ## 工作原理


    解决方案部分中的脚本使用了收集统计信息时填充的 `NUM_ROWS` 列。如果 `NUM_ROWS` 与实际行数的百分比差异超过 10%，则统计信息可能已经陈旧。'
  raw: 'If you misspell the name of a hint or make a typo in a table alias or index
    name, Oracle will ignore the hint. You can verify that a hint is being used by
    setting AUTOTRACE ON and viewing the execution plan.


    Keep in mind that in some situations Oracle will ignore a hint. Oracle may determine
    that the hint directive is not feasible for a given scenario and thus reject your
    suggestion.


    How It Works


    SQL hints allow you to override the optimizer’s choices in an execution plan.
    Sometimes query performance issues can be improved because you know something
    about your environment that the optimizer isn’t aware of (much like the sport
    or landscape settings on your camera).


    For example, suppose you have a data warehouse database that is using the system-wide
    setting of ALL_ROWS, but you also want to run an OLTP reporting query against
    the database that will execute more efficiently with the FIRST_ROWS setting. In
    this situation, you can hint the optimizer to use FIRST_ROWS


    instead of ALL_ROWS.


    We recommend that you use hints sparingly. Before using a hint, first try to figure
    out why the optimizer isn’t choosing an efficient execution plan. Investigate
    if the query can be rewritten or if adding an index or generating fresh statistics
    will help. Relying on hints for good performance is time-consuming and could cause
    you issues when upgrading to newer versions of the database.


    In the most recent versions of Oracle, there are well over 200 different hints.
    It’s beyond the scope of this recipe to describe every hint. Table 19-6 describes
    the major categories of hints.


    ■ **Tip** Starting with Oracle Database 11 *g,* you can query V$SQL_HINT for information
    about hints.


    ***Table 19-6** .SQL Hint Categories*


    **Category of Hint**


    **Description**


    **Hint Examples**


    Optimizer goal


    Optimizes throughput or


    ALL_ROWS, FIRST_ROWS


    responsiveness.


    Access paths


    Path to retrieve data.


    INDEX, NO_INDEX, FULL


    Query transformations


    Execute query in a different


    STAR_TRANSFORMATION, MERGE, FACT, REWRITE


    manner.


    Join Orders


    Alter the order of the tables to be


    ORDERED, LEADING


    joined.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    ***Table 19-6** .SQL Hint Categories (continued)*


    **Category of Hint**


    **Description**


    **Hint Examples**


    Parallel operations


    Execute in parallel.


    PARALLEL, PARALLEL_INDEX, NOPARALLEL


    Join operations


    How to join tables.


    USE_NL, USE_MERGE, USE_HASH


    Miscellaneous


    Sometimes useful hints that


    APPEND, CACHE, DRIVING_SITE


    don’t fit in a specific category.


    19-13\. Viewing Optimizer Statistics


    Problem


    You’re experiencing performance issues. You want to determine if statistics exist
    for the tables being queried.


    Solution


    A quick and easy way to check if statistics are accurate is to compare the NUM_ROWS
    column in USER_TABLES


    with the actual row count of a table. The following script will prompt you for
    a table name: select a.num_rows/b.actual_rows


    from user_tables a


    ,(select count(*) actual_rows from &&table_name) b


    where a.table_name=upper(''&&table_name'');


    The next script uses SQL to generate the prior SQL for all tables for a user.
    The script uses SQL*Plus formatting commands to turn off headings and page breaks:


    set head off pages 0 lines 132 trimspool on


    spo show_stale.sql


    select


    ''select '' || '''''''' || table_name || '': '' || '''''''' || ''||'' || chr(10)
    ||


    '' round(decode(b.actual_rows,0,0,a.num_rows/b.actual_rows),2) '' || chr(10) ||


    ''from user_tables a '' ||


    '',(select count(*) actual_rows from '' || table_name || '') b'' || chr(10) ||


    ''where a.table_name=('' || '''''''' || table_name || '''''''' || '');''


    from user_tables;


    spo off;


    This script produces a file named show_stale.sql that you can execute to display
    the staleness of table statistics.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    How It Works


    The scripts in the solution section use the NUM_ROWS column that is populated
    when statistics are gathered. If the percentage of NUM_ROWS to actual rows is
    more than 10% different from the actual rows, the statistics are probably stale.'
  trans: '# SQL 提示


    ## 重要注意事项


    如果你拼错了提示（hint）的名称，或者在表别名或索引名称中打错了字，Oracle 将忽略该提示。你可以通过设置 `AUTOTRACE ON` 并查看执行计划来验证提示是否被使用。


    请记住，在某些情况下 Oracle 会忽略提示。Oracle 可能判定提示指令在给定场景下不可行，因此拒绝你的建议。


    ## 工作原理


    SQL 提示允许你在执行计划中覆盖优化器的选择。有时，因为你知道一些优化器不了解的环境信息（就像相机上的运动或风景设置），查询性能问题可以得到改善。


    例如，假设你有一个数据仓库数据库使用系统范围的 `ALL_ROWS` 设置，但你也想针对该数据库运行一个 OLTP 报表查询，该查询使用 `FIRST_ROWS`
    设置会更高效。在这种情况下，你可以提示优化器使用 `FIRST_ROWS` 而不是 `ALL_ROWS`。


    ## 使用建议


    我们建议你谨慎使用提示。在使用提示之前，首先尝试找出优化器为何没有选择高效的执行计划。研究是否可以重写查询，或者添加索引或生成新的统计信息是否有帮助。依赖提示来获得良好的性能既耗时，也可能在升级到较新版本的数据库时导致问题。


    ## 提示分类


    在最新版本的 Oracle 中，有超过 200 种不同的提示。描述每一个提示超出了本教程的范围。**表 19-6** 描述了提示的主要类别。


    **提示** 从 Oracle Database 11*g* 开始，你可以查询 `V$SQL_HINT` 来获取有关提示的信息。


    *表 19-6. SQL 提示分类*


    | 提示类别 | 描述 | 提示示例 |

    | :--- | :--- | :--- |

    | **优化器目标** | 优化吞吐量或响应速度。 | `ALL_ROWS`, `FIRST_ROWS` |

    | **访问路径** | 检索数据的路径。 | `INDEX`, `NO_INDEX`, `FULL` |

    | **查询转换** | 以不同方式执行查询。 | `STAR_TRANSFORMATION`, `MERGE`, `FACT`, `REWRITE` |

    | **连接顺序** | 更改要连接的表的顺序。 | `ORDERED`, `LEADING` |

    | **并行操作** | 并行执行。 | `PARALLEL`, `PARALLEL_INDEX`, `NOPARALLEL` |

    | **连接操作** | 如何连接表。 | `USE_NL`, `USE_MERGE`, `USE_HASH` |

    | **杂项** | 不属于特定类别但有时有用的提示。 | `APPEND`, `CACHE`, `DRIVING_SITE` |


    # 19-13. 查看优化器统计信息


    ## 问题


    你遇到了性能问题。你想确定被查询的表是否存在统计信息。


    ## 解决方案


    检查统计信息是否准确的一个快速简便的方法是比较 `USER_TABLES` 中的 `NUM_ROWS` 列与表的实际行数。以下脚本将提示你输入表名：

    ```sql

    select a.num_rows/b.actual_rows

    from user_tables a

    ,(select count(*) actual_rows from &&table_name) b

    where a.table_name=upper(''&&table_name'');

    ```


    下一个脚本使用 SQL 为某个用户的所有表生成前面的 SQL。该脚本使用 SQL*Plus 格式化命令来关闭标题和分页：

    ```sql

    set head off pages 0 lines 132 trimspool on

    spo show_stale.sql

    select

    ''select '' || '''''''' || table_name || '': '' || '''''''' || ''||'' || chr(10)
    ||

    '' round(decode(b.actual_rows,0,0,a.num_rows/b.actual_rows),2) '' || chr(10) ||

    ''from user_tables a '' ||

    '',(select count(*) actual_rows from '' || table_name || '') b'' || chr(10) ||

    ''where a.table_name=('' || '''''''' || table_name || '''''''' || '');''

    from user_tables;

    spo off;

    ```


    此脚本会生成一个名为 `show_stale.sql` 的文件，你可以执行该文件以显示表统计信息的陈旧程度。


    ## 工作原理


    解决方案部分中的脚本使用了收集统计信息时填充的 `NUM_ROWS` 列。如果 `NUM_ROWS` 与实际行数的百分比差异超过 10%，则统计信息可能已经陈旧。'
- fmt: '# SQL监控与调优：统计信息


    ## 查看统计信息生成时间


    判断统计信息是否为近期生成，有几种其他技巧。例如，你可以检查 `USER_TABLES` 和 `USER_INDEXES` 视图的 `LAST_ANALYZED`
    列，以确定你的表和索引最后一次被分析的时间。以下查询显示了当前模式下各表最后一次被分析的时间：


    ```sql

    select table_name, last_analyzed, monitoring

    from user_tables

    order by last_analyzed;

    ```


    以下查询则报告了当前模式下各索引最后一次被分析的时间：


    ```sql

    select index_name, last_analyzed

    from user_indexes

    order by last_analyzed;

    ```


    孤立地查看表和索引最后一次生成统计信息的时间可能有些误导。`LAST_ANALYZED` 列确实能告诉你统计信息是否曾经生成过，但也就仅此而已。仅凭 `LAST_ANALYZED`
    时间不足以确定统计信息是否需要重新生成。


    要获取关于表统计信息的更详细信息，请使用 `USER_TAB_STATISTICS` 视图。此视图包含为表生成的众多优化器统计信息。例如，该视图有一个 `STALE_STATS`
    列，用于指示 Oracle 是否认为统计信息已过时。


    以下查询显示了诸如 `SAMPLE_SIZE` 和 `STALE_STATS` 等统计信息：


    ```sql

    select table_name, partition_name, last_analyzed, num_rows, sample_size, stale_stats

    from user_tab_statistics

    order by last_analyzed;

    ```


    与表统计信息类似，你也可以通过查询 `USER_IND_STATISTICS` 视图来查看索引统计信息：


    ```sql

    select index_name, partition_name, last_analyzed, num_rows, sample_size, stale_stats

    from user_ind_statistics

    order by last_analyzed;

    ```


    如果你想确定自上次生成统计信息以来，发生了多少 `INSERT`、`UPDATE`、`DELETE` 和 `TRUNCATE` 活动，请查询 `USER_TAB_MODIFICATIONS`
    视图。例如，你可能会遇到这样一种情况：一个表在插入大量新记录之前被截断。你可以运行如下查询来验证此类活动是否自上次生成统计信息以来发生过：


    ```sql

    select table_name, partition_name, inserts, updates, deletes, truncated, timestamp

    from user_tab_modifications

    order by table_name;

    ```


    如果你检测到表中的数据发生了显著变化，你应该考虑手动生成统计信息（详情请参阅配方 19-14）。


    > **注意**：`USER_TAB_MODIFICATIONS` 视图并非实时更新。Oracle 会定期将内存中的结果刷新到此表。要强制 Oracle 将这些统计信息从内存中刷新，请运行
    `DBMS_STATS.FLUSH_DATABASE_MONITORING_INFO` 过程。


    ## 生成统计信息


    **问题**

    你刚刚向一个表中加载了大量新数据。现在遇到了性能问题，你想为刚刚加载的表生成统计信息。


    **解决方案**

    使用 `DBMS_STATS` 包来生成新的统计信息。在下面这段代码中，为 `STAR1` 模式生成了统计信息。


    ```sql

    SQL> exec dbms_stats.gather_schema_stats(ownname => ''STAR1'', -

    estimate_percent => DBMS_STATS.AUTO_SAMPLE_SIZE, -

    degree => DBMS_STATS.AUTO_DEGREE, -

    cascade => true);

    ```


    `ESTIMATE_PERCENT` 参数设置为 `AUTO_SAMPLE_SIZE`。这指示 Oracle 确定最佳的样本大小。


    `DEGREE` 参数设置为 `AUTO_DEGREE`。这允许 Oracle 根据硬件和初始化参数选择最佳的并行度。


    `CASCADE` 值为 `TRUE` 指示 Oracle 同时收集索引统计信息（针对任何被分析的表）。


    > **注意**：你也可以使用 `ANALYZE` 语句配合 `COMPUTE` 或 `ESTIMATE` 子句来生成统计信息。

    > 然而，Oracle 强烈建议**不要**使用 `ANALYZE` 语句来生成对象统计信息。相反，你应该使用 `DBMS_STATS` 包。


    **工作原理**'
  raw: 'There are a few other techniques for determining if statistics have been recently
    generated. For example, you can check the LAST_ANALYZED column of the USER_TABLES
    and USER_INDEXES views to determine the last time your tables and indexes were
    analyzed. This following query displays the last time tables were analyzed for
    the current schema:


    select


    table_name


    ,last_analyzed


    ,monitoring


    from user_tables


    order by last_analyzed;


    This next query reports the last time indexes were analyzed for the current schema:
    select


    index_name


    ,last_analyzed


    from user_indexes


    order by last_analyzed;


    Viewing the last time statistics were generated for tables and indexes in a vacuum
    can be somewhat misleading. The LAST_ANALYZED column does tell you if statistics
    have ever been generated, but that’s about it. The LAST_ANALYZED time doesn’t
    provide enough information to determine whether the statistics might need to be
    re-generated.


    For more detailed information about table statistics use the USER_TAB_STATISTICS
    view. This view contains information about the many optimizer statistics that
    are generated for tables. For example, this view has a STALE_STATS column that
    is an indicator of whether or not Oracle thinks the statistics are stale.


    The following query displays statistics such as SAMPLE_SIZE and STALE_STATS: select


    table_name


    ,partition_name


    ,last_analyzed


    ,num_rows


    ,sample_size


    ,stale_stats


    from user_tab_statistics


    order by last_analyzed;


    Similar to the table statistics, you can also view index statistics by querying
    the USER_IND_STATISTICS


    view:


    select


    index_name


    ,partition_name


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    ,last_analyzed


    ,num_rows


    ,sample_size


    ,stale_stats


    from user_ind_statistics


    order by last_analyzed;


    If you want to determine how much INSERT, UPDATE, DELETE, and TRUNCATE activity
    has occurred since the last time statistics were generated, query the USER_TAB_MODIFICATIONS
    view. For example, you may have a situation in which a table is truncated before
    a large load of new records are inserted. You can run a query like the following
    to verify that that type of activity has occurred since the last time statistics
    were generated:


    select


    table_name


    ,partition_name


    ,inserts


    ,updates


    ,deletes


    ,truncated


    ,timestamp


    from user_tab_modifications


    order by table_name;


    If you detect that there have been significant changes to the data in a table,
    you should consider generating the statistics manually (see recipe 19-14 for details).


    ■ **Note** The USER_TAB_MODIFICATIONS view isn’t updated instantaneously. Oracle
    will periodically flush results to this table from memory. To force Oracle to
    flush these statistics from memory, run the DBMS_STATS.FLUSH_DATABASE_MONITORING_INFO
    procedure.


    19-14\. Generating Statistics


    Problem


    You just finished loading a large amount of new data into a table. You’re now
    experiencing performance problems and you want to generate statistics for the
    table that was just loaded.


    Solution


    Use the DBMS_STATS package to generate fresh statistics. In this next bit of code,
    statistics are generated for the STAR1 schema.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    SQL> exec dbms_stats.gather_schema_stats(ownname => ''STAR1'',-


    estimate_percent => DBMS_STATS.AUTO_SAMPLE_SIZE,-


    degree => DBMS_STATS.AUTO_DEGREE,-


    cascade => true);


    The ESTIMATE_PERCENT parameter is set to AUTO_SAMPLE_SIZE. This instructs Oracle
    to determine the optimal sample size.


    The DEGREE parameter is set to AUTO_DEGREE. This allows Oracle to choose the optimal
    parallel degree depending on the hardware and initialization parameters.


    The CASCADE value of TRUE instructs Oracle to additionally gather index statistics
    (for any table being analyzed).


    ■ **Note** You can also generate statistics with the ANALYZE statement using the
    COMPUTE or ESTIMATE clauses.


    However, Oracle highly recommends *not* using the ANALYZE statement for generating
    object statistics. Instead you should use the DBMS_STATS package.


    How It Works'
