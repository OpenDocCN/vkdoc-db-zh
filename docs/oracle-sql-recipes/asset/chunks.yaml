    key constraint on the column(s) a business user would use to uniquely identify
    a record (also called a logical key). Using both a surrogate key and logical key


    • lets you efficiently join parent and child tables on a single numeric column;


    • allows updates to logical key columns without changing the surrogate key.


    A unique key guarantees uniqueness on the defined columns within a table. There
    are some subtle differences between primary key and unique constraints. You can
    define only one primary key per table but there can be several unique keys. A
    primary key does not allow a null value in any of its columns whereas a unique
    key allows null values.


