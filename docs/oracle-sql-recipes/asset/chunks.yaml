  trans: "\n# 第 20 章 数据库故障排除\n\n数据库故障排除是一个泛称，适用于广泛的主题范围，例如解决存储问题、调查性能迟缓或监控数据库对象。SQL\
    \ 通常是你用来初步了解数据库中可能出现问题的第一个工具。因此，你必须熟悉用于提取和分析数据库信息的 SQL 技术。\n\n本章中的方法主要面向数据库管理员（DBA）。然而，如果你是一名开发人员，其中许多主题也会间接影响你与数据库高效协作的能力。了解本章所述问题的解决方案将使你对\
    \ Oracle 架构有更深入的理解，并为你提供信息，以便与那位脾气不好、守着自己一亩三分地的老旧数据库管理员一起排查应用程序问题。\n\n当然，DBA 需要成为识别其数据库内问题领域的专家。对于任何连接性、性能或可用性问题，DBA\
    \ 都是团队中寻求帮助的关键成员。一名优秀的 DBA 必须精通 SQL，尤其是在故障排除方面。\n\n要涵盖所有可用于排查数据库问题的 SQL 语句类型是不可能的。相反，我们提供一些处理常见数据库痛点的\
    \ SQL 见解。我们将首先展示如何识别潜在问题，然后探讨如何处理存储问题和数据库审计。\n\n调用 `DBMS_STATS` 有多种方法。例如，如果你只想为一个表生成统计信息，请使用\
    \ `GATHER_TABLE_STATS` 过程。此示例为 `D_DOMAINS` 表收集统计信息：\n\n```sql\nSQL> exec dbms_stats.gather_table_stats(ownname=>'STAR2',tabname=>'D_DOMAINS',-\n\
    > cascade=>true, estimate_percent=>20, degree=4);\n```\n\n从 Oracle Database 10g\
    \ 开始，有一个默认的 `DBMS_SCHEDULER` 作业每天运行一次，自动分析你的数据库对象。要查看此作业上次运行的时间，请执行以下查询：\n\n```sql\n\
    select\nowner\n,job_name\n,last_start_date\nfrom dba_scheduler_jobs\nwhere job_name\
    \ IN\n('GATHER_STATS_JOB', -- 10g\n'BSLN_MAINTAIN_STATS_JOB' -- 11g\n);\n```\n\
    \n对于许多数据库，这种自动统计信息收集作业是足够的。然而，在 SQL 查询所基于的表中，如果有很大比例的数据被修改后，你可能会遇到性能不佳的情况。在表数据发生显著变化的情况下，你可能需要如本方法解决方案部分所示，手动生成统计信息。\n\
    \n当你运行一个查询时，如果某个表没有生成统计信息，Oracle 默认会动态尝试估算优化器统计信息。要使动态采样生效，必须设置 `OPTIMIZER_DYNAMIC_SAMPLING`\
    \ 初始化参数。在 Oracle Database 10g 及更高版本中，此参数的默认值为 2。如果你启用了 `AUTOTRACE`，Oracle 会如下标示\
    \ SQL 语句使用了动态采样：\n\n注意\n- 此语句使用了动态采样\n\n## 20-1. 确定数据库问题的原因\n\n### 问题\n\n用户报告称，使用数据库的应用程序行为异常。你的经理要求你检查数据库是否出了什么问题。\n\
    \n### 解决方案\n\n在诊断数据库问题时，你必须有一个策略来确定从何处查找问题。例如，如果用户报告了特定的数据库错误，或者警报日志中有详细的消息，那么显然应该从调查这些报告的问题开始。\n\
    \n如果没有明确的起点，你可以运行自动工作量仓库（AWR）报告（需要许可）或 Statspack 报告；有关如何运行这些报告的更多详细信息，请参见第 19\
    \ 章。如果你没有这些工具可用，可以直接查询数据字典以确定数据库是否承受压力以及问题的根本原因是什么。\n\n下一个查询使用 `V$SYSSTAT` 视图来确定数据库处理用户请求所花费的时间和\
    \ CPU 时间，从而推断出数据库等待时间（通过减法）。这与可用时间有关，可用时间是挂钟时间乘以 CPU 数量。此查询的目的是确定你的数据库是否花费了过多时间等待资源（这是系统过载的迹象）：\n\
    \n```sql\nselect\nround(100*CPU_sec/available_time,2) \"ORACLE CPU TIME AS % AVAIL.\"\
    \n,round(100*(DB_sec - CPU_sec)/available_time,2) \"NON-IDLE WAITS AS % AVAIL.\"\
    \n,case\nsign(available_time - DB_sec)\nwhen 1 then round(100*(available_time\
    \ - DB_sec) / available_time, 2)\nelse 0\nend \"ORACLE IDLE AS % AVAIL.\"\nfrom\n\
    (\nselect\n(sysdate - i.startup_time) * 86400 * c.cpus available_time\n,t.DB_sec\n\
    ,t.CPU_sec\nfrom v$instance i\n,(select value cpus\nfrom v$parameter\nwhere name\
    \ = 'cpu_count') c\n,(select\nsum(case name\nwhen 'DB time' then round(value/100)\n\
    else 0\nend) DB_sec\n,sum(case name\nwhen 'DB time' then 0\nelse round(value/100)\n\
    end) CPU_sec\nfrom v$sysstat\nwhere name in ('DB time', 'CPU used by this session'))\
    \ t\nwhere i.instance_number = userenv('INSTANCE')\n);\n```\n\n以下是一些输出：\n\n```\n\
    ORACLE CPU TIME AS % AVAIL. NON-IDLE WAITS AS % AVAIL. ORACLE IDLE AS % AVAIL.\n\
    --------------------------- -------------------------- -----------------------\n\
    31.97                       129.59                     0\n```\n\n如非空闲等待所示，该数据库显然处于高负载状态。既然我们知道了存在与资源等待相关的问题，下一个问题就是具体确定等待发生在哪里。以下查询详细说明了\
    \ Oracle 的等待时间分布。该查询使用了一些标准的 SQL*Plus 格式化命令，以使输出更易读：\n\n```sql\ncol wait_class\
    \ format A15\ncol event format A35 trunc\ncol \"CLASS AS % OF WHOLE\" format 990.00\
    \ HEAD \"CLASS AS|% OF WHOLE\"\ncol \"EVENT AS % OF CLASS\" like \"CLASS AS %\
    \ OF WHOLE\" HEAD \"EVENT AS|% OF CLASS\"\ncol \"EVENT AS % OF WHOLE\" like \"\
    CLASS AS % OF WHOLE\" HEAD \"EVENT AS|% OF WHOLE\"\nset pagesize 30\nbreak on\
    \ wait_class on \"CLASS AS % OF WHOLE\"\n--\n\nselect\nwait_class,\nround(100\
    \ * time_class / total_waits, 2) \"CLASS AS % OF WHOLE\", event,\nround(100 *\
    \ time_waited / time_class, 2) \"EVENT AS % OF CLASS\", round(100 * time_waited\
    \ / total_waits, 2) \"EVENT AS % OF WHOLE\"\nfrom\n(select\nwait_class\n,event\n\
    ,time_waited\n,sum(time_waited) over (partition by wait_class) time_class\n,rank()\
    \ over (partition by wait_class order by time_waited desc) rank_within_class\n\
    ,sum(time_waited) over () total_waits\nfrom v$system_event\nwhere wait_class <>\
    \ 'Idle')\nwhere rank_within_class <= 3\norder by time_class desc, rank_within_class;\n\
    ```\n\n以下是输出片段：\n\n```\n                   CLASS AS     EVENT AS     EVENT AS\n\
    WAIT_CLASS         % OF WHOLE   % OF CLASS   % OF WHOLE\n------------ ---------------\
    \ ------------ ------------\nSystem I/O           15.50        60.14         9.32\n\
    \                                log file parallel write\n                   \
    \             db file parallel write    18.59         2.88\n                 \
    \               control file parallel write 17.80      2.76\n\nCommit        \
    \       14.34       100.00        14.34\n                                log file\
    \ sync\n\nUser I/O             12.40        59.47         7.37\n             \
    \                   db file scattered read\n                                db\
    \ file sequential read   26.11         3.24\n                                direct\
    \ path read           5.99         0.74\n```\n\n从报告的 System I/O 部分来看，`log file\
    \ parallel write` 事件可能表明在线重做日志文件中存在争用。同样，从 User I/O 部分来看，`db file scattered read`\
    \ 等待事件可能表明 SQL 查询正在执行过多的全表扫描。如果你认为问题是 SQL 性能问题，请参见第 19 章了解如何隔离性能不佳的 SQL。\n"
- fmt: "# 第20章 数据库故障排除\n\n## 常见等待事件\n\n表20-1列出了一些影响性能的常见等待事件。这绝非详尽无遗的列表，它只是众多等待事件类型中的一部分，包含描述和可能的应对措施。目前存在超过900种不同类型的等待事件（具体数量取决于您使用的Oracle版本）。有关所有等待事件的完整列表和描述，请参阅Oracle的《数据库参考指南》，网址为`otn.oracle.com`。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n表 20-1. 常见数据库等待事件\n| 等待事件\
    \ | 描述 | 进一步检查 |\n| :--- | :--- | :--- |\n| `db file scattered read` | 为多个块执行I/O的实际时间（通常由全表扫描引起）。\
    \ | I/O过多，SQL执行不佳；参见第19章进行SQL调优。 |\n| `db file sequential read` | 为单个块执行I/O的实际时间（通常与索引扫描相关）。\
    \ | I/O过多，SQL执行不佳；参见第19章进行SQL调优。 |\n| `free buffer waits` | 在检查缓存寻找空闲缓冲区后未找到空闲缓冲区，或等待脏缓冲区被写入磁盘时的等待时间。\
    \ | 表示缓存中空闲缓冲区不足；检查缓冲区缓存统计信息，看缓存是否过小或过大。 |\n| `buffer busy waits` | 等待缓冲区变为可用的等待时间。\
    \ | 检查`V$SESSION`以确定块争用的类型。 |\n| `db file parallel write` | 数据库写入器等待I/O完成的时间。\
    \ | 磁盘I/O争用。 |\n| `log file parallel write` | 将重做信息从日志缓冲区写入磁盘的I/O完成时间。 | 减少在线重做日志的I/O争用；将日志移到专用磁盘或更快的磁盘。\
    \ |\n| `log file sync` | 用户提交时刷新重做信息的时间。 | 减少在线重做日志的I/O争用；将日志移到专用磁盘或更快的磁盘。 |\n\
    | `log file switch (archiving needed)` | 因为日志写入器将切换到未归档的重做日志而等待日志切换。 | 归档目标可能空间不足或归档无法足够快地读取重做日志。\
    \ |\n| `log file switch (checkpoint incomplete)` | 因为日志的检查点未完成而等待日志切换。 | 可能重做日志过少或过小（参见配方20-3）。\
    \ |\n| `control file parallel write` | 完成写入所有控制文件的时间。 | 控制文件中的I/O争用。 |\n| `SQL*Net\
    \ more data to client` | 服务器向客户端发送数据以完成传输的时间。 | 可能存在网络或中间层瓶颈。 |\n| `SQL*Net more\
    \ data from client` | 服务器等待客户端发送更多数据。 | 可能存在网络或中间层瓶颈。 |\n| `SQL*Net message to/from\
    \ client` | 用户客户端和服务器之间的通信时间。 | 可能存在网络或中间层瓶颈。 |\n| `enq: TX - row lock contention`\
    \ | 内部事务锁。 | 潜在的锁问题，查询`V$LOCK`。 |\n| `enq: TM - contention` | 内部DML锁。 | 潜在的锁问题，查询`V$LOCK`。\
    \ |\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 工作原理\n\n有时开发人员和数据库管理员（DBA）采用老式的“战舰”方法进行数据库故障排除。他们以一种碰运气的方式，随机地向数据库发送可能有助于揭示问题的查询。然而，这是一种低效的排错方式。相反，我们建议您采用更有针对性的故障排除方法。首先运行一个工具（如AWR）或本配方解决方案部分提供的查询，以指向真正的问题所在。\n\
    \n解决方案部分的查询使用了Oracle的动态性能视图`V$SYSSTAT`和`V$SYSTEM_EVENT`来帮助定位数据库问题的可能来源。表20-2列出了常用于排除数据库问题的视图描述。\n\
    \n我们意识到，从`V$SYSSTAT`和`V$SYSTEM_EVENT`等视图中选择数据有其固有的局限性，因为这些视图报告的是自实例启动以来收集的平均值。如果可能，查询AWR或Statspack历史视图会更好。然而，尽管存在这些已知的局限性，解决方案部分的查询仍将为您提供一个开始数据库故障排除的起点。关键是，您应该从一套能够引导您努力方向的工具开始分析。\n\
    \n表 20-2. 常用的Oracle动态性能视图\n| 视图 | 描述 |\n| :--- | :--- |\n| `V$SYSSTAT` | 系统级别的累积工作负载统计信息。\
    \ |\n| `V$SESSTAT` | 会话级别的累积工作负载统计信息。 |\n| `V$SEGSTAT` | 段级别的累积工作负载统计信息。 |\n|\
    \ `V$EVENT_NAME` | 所有等待事件及其关联的类。 |\n| `V$SYSTEM_EVENT` | 所有会话因某个事件而等待的总次数。 |\n\
    | `V$SESSION_EVENT` | 单个会话因某个事件而等待的总次数。 |\n| `V$SESSION_WAIT` | 当前正在等待或最近完成等待的会话的事件。\
    \ |\n\n## 20-2. 显示打开的游标\n\n### 问题\n\n一个访问数据库的应用程序抛出以下错误：`ORA-01000: maximum open\
    \ cursors exceeded`\n\n您希望查询数据字典以确定每个会话打开的游标数量。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 解决方案\n\n以下查询将显示每个会话当前打开的游标：\n```sql\nselect\n    a.value\n    ,c.username\n\
    \    ,c.machine\n    ,c.sid\n    ,c.serial#\nfrom v$sesstat a\n    ,v$statname\
    \ b\n    ,v$session c\nwhere a.statistic# = b.statistic#\nand c.sid = a.sid\n\
    and b.name = 'opened cursors current'\nand a.value != 0\nand c.username IS NOT\
    \ NULL\norder by 1,2;\n```\n\n我们建议您查询`V$SESSION`而不是`V$OPEN_CURSOR`来确定打开的游标数量。`V$SESSION`提供了当前打开游标数量的更准确数字。\n\
    \n### 工作原理\n\n`OPEN_CURSORS`初始化参数决定了一个会话可以打开的游标数量上限。这个设置是针对每个会话的。默认值`50`对于任何应用程序来说通常都太低了。通常将`OPEN_CURSORS`设置为`1000`这样的值。\n\
    \n但是，如果单个会话有超过`1000`个打开的游标，那么代码中很可能存在未关闭游标的情况。当达到此限制时，应该有人检查应用程序代码，以确定是否有游标未被关闭。\n\
    \n如果您工作的环境有数千个到数据库的连接，您可能只想查看消耗游标最多的前几个会话。以下查询使用了一个内联视图和伪列`ROWNUM`来显示前二十个值：\n\
    ```sql\nselect * from (\n    select\n        a.value\n        ,c.username\n  \
    \      ,c.machine\n        ,c.sid\n        ,c.serial#\n    from v$sesstat a\n\
    \        ,v$statname b\n        ,v$session c\n    where a.statistic# = b.statistic#\n\
    \    and c.sid = a.sid\n    and b.name = 'opened cursors current'\n    and a.value\
    \ != 0\n    and c.username IS NOT NULL\n    order by 1 desc,2\n)\nwhere rownum\
    \ < 21;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 20-3. 判断在线重做日志大小是否合适\n\
    \n### 问题\n\n您注意到存在异常多的`log file switch (checkpoint incomplete)`等待事件（描述参见表20-1）。您希望验证生产数据库中重做日志切换的频率。\n\
    \n### 解决方案\n\n`V$LOG_HISTORY`包含有关在线重做日志的历史信息。执行此查询以查看每小时的日志切换次数：\n```sql\nselect\
    \ count(*)\n    ,to_char(first_time,'YYYY:MM:DD:HH24')\nfrom v$log_history\ngroup\
    \ by to_char(first_time,'YYYY:MM:DD:HH24')\norder by 2;\n```\n\n以下是输出的一个片段：\n\
    ```\nCOUNT(*) TO_CHAR(FIRST\n---------- -------------\n        15 2009:07:20:00\n\
    \        31 2009:07:20:01\n        47 2009:07:20:02\n        14 2009:07:20:03\n\
    \         3 2009:07:20:04\n         1 2009:07:20:05\n```\n\n从前面的输出中，您可以看到在7月20日，大约从午夜到凌晨3:00，产生了大量的重做数据。这可能是由于夜间批处理作业，或者是由于位于世界另一端的用户在运行数据库应用程序（您的夜晚是他们的白天）所致。\n\
    \n### 工作原理"
