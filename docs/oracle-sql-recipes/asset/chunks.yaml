    but it’s crucial to remember the nature of NULL values when using either EXISTS
    or NOT EXISTS. NULL values are not equivalent to any other value, including other
    NULL values. This means that a NULL in the outer part of a correlated query will
    never satisfy the correlation criterion for the inner table, view, or expression.
