    # 第 10 章 ■ 数据字典


    ## 10-7\. 显示约束


    ### 问题

    你想显示与表相关联的约束。


    ### 解决方案

    查询 `DBA_CONSTRAINTS` 视图，以显示指定所有者和表名的约束信息。下面的脚本将提示你输入两个 SQL\*Plus 的 `&` 变量（`OWNER`
    和 `TABLE_NAME`）。如果你不使用 SQL\*Plus，可能需要在运行脚本前修改脚本中的相应值：


    ```sql

    select

    (case constraint_type

    when ''P'' then ''Primary Key''

    when ''R'' then ''Foreign Key''

    when ''C'' then ''Check''

    when ''U'' then ''Unique''

    when ''O'' then ''Read Only View''

    when ''V'' then ''Check view''

    when ''H'' then ''Hash expression''

    when ''F'' then ''REF column''

    when ''S'' then ''Supplemental logging''

    end) cons_type

    ,constraint_name cons_name

    ,search_condition check_cons

    ,status

    from dba_constraints

    where owner like upper(''&owner'')

    and table_name like upper(''&table_name'')

    order by cons_type;

    ```


    以下是一些示例输出：


    ```

    CONS_TYPE        CONS_NAME          CHECK_CONS                   STATUS

    ---------------- -------------------- ----------------------------- --------

    Check            SYS_C0030642       "DOWNLOAD_COUNT" IS NOT NULL  ENABLED

    Check            SYS_C0030643       "CREATE_DTT" IS NOT NULL      ENABLED

    Foreign Key      F_DOWN_SKUS_FK1                                 ENABLED

    Foreign Key      F_DOWN_PRODS_FK1                                ENABLED

    Foreign Key      F_DOWN_PROD_DESC_FK1                            ENABLED

    Foreign Key      F_DOWN_LOCS_FK1                                 ENABLED

    ```


    从输出中可以看到，此表有两个启用的检查约束和四个外键约束。`DBA_CONSTRAINTS` 的 `SEARCH_CONDITION` 列包含了 CHECK
    类型约束的搜索条件文本。


    ### 工作原理

    `DBA`/`ALL`/`USER_CONSTRAINTS` 视图记录了数据库中为表定义的约束。


    完整性约束允许你定义关于数据的规则，这些规则会在数据被成功添加或修改之前由数据库引擎进行验证。这确保了你的数据具有高质量。


    `DBA`/`ALL`/`USER_CONSTRAINTS` 视图的 `CONSTRAINT_TYPE` 列是一个单字符代码。目前共有九种不同类型的约束。表
    10-2 描述了可用的完整性约束。


    **表 10-2.** 完整性约束

    | 约束代码 | 含义 |

    | :--- | :--- |

    | C | 检查条件 |

    | P | 主键 |

    | U | 唯一键 |

    | R | 参照完整性（外键） |

    | V | 在视图上使用 CHECK 选项 |

    | O | 在视图上使用 READ ONLY |

    | H | 哈希表达式 |

    | F | 带有 REF 列的约束 |

    | S | 补充日志记录 |


    **注意：** `H`、`F` 和 `S` 这些检查约束类型仅在 Oracle Database 11 *g* 或更高版本中可用。


    ## 10-8\. 显示主键和外键关系


    ### 问题

    解决方案部分的查询联接了三个视图。`USER_CONSTRAINTS` 视图包含用户模式中所有约束的定义。它与 `USER_CONS_COLUMNS` 视图联接，后者包含用户可访问的、用于约束的列的信息。在
    `USER_CONS_COLUMNS` 和 `USER_IND_COLUMNS` 之间放置了一个 `LEFT OUTER JOIN` 子句，因为可能存在联接左侧视图有行而右侧没有对应行的情况。然后，我们应用条件，即此查询报告的任何约束都是
    `R` 类型（参照或外键约束）。


    下面的代码清单展示了使用旧式 Oracle 语法进行外联接查询的写法。外联接通过 `(+)` 字符指定。


    ```sql

    select

    a.constraint_name cons_name

    ,a.table_name tab_name

    ,b.column_name cons_column

    ,nvl(c.column_name,''***No Index***'') ind_column

    from user_constraints a

    ,user_cons_columns b

    ,user_ind_columns c

    where constraint_type = ''R''

    and a.constraint_name = b.constraint_name

    and b.column_name = c.column_name(+)

    and b.table_name = c.table_name(+)

    order by 2,1;

    ```

