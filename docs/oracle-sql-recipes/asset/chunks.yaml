    F_SALES P2011 P2_NORTH


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ PARTITIONING


    How It Works


    Oracle allows you to combine two partitioning strategies, as follows:


    • Range-Range Partitioning


    • Range-Hash Partitioning


    • Range-List Partitioning


    • List-Range Partitioning


    • List-Hash Partitioning


    • List-List Partitioning


    Composite partitioning gives you a great deal of flexibility in the way you divvy
    up your data. You can use these methods to further refine how data is distributed
    and maintained.


    15-6\. Creating Partitions on Demand


    Problem


    You have a range-partitioned table and want Oracle to automatically add a partition
    when values are inserted above the highest value defined for the highest range.


    Solution


    If you are using Oracle Database 11 *g* or higher, you can use the INTERVAL clause
    of the CREATE TABLE


    statement to instruct Oracle to automatically add a partition to the high end
    of a range-partitioned table.


    This example creates a table that initially has one partition with a high-value
    range of 01-JAN-2010.


    create table f_sales(


    sales_amt number


    ,d_date date


    )


    partition by range (d_date)


    interval(numtoyminterval(1, ''YEAR''))


    (partition p1 values less than (to_date(''01-jan-2010'',''dd-mon-yyyy''))); The
    interval in this example is 1 year, defined by the INTERVAL(NUMTOYMINTERVAL(1,
    ''YEAR'')) clause.


    If a record is inserted into the table with a D_DATE value greater than or equal
    to 01-JAN-2010, Oracle will automatically add a new partition to the high end
    of the table. You can check the details of the partition by running this SQL statement:


    select table_name, partition_name, partition_position, high_value


    from user_tab_partitions order by table_name, partition_name;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ PARTITIONING


    Here is some sample output (the HIGH_VALUE column has been cut short so the output
    fits on the page):


    TABLE_NAME PARTITION_NA PARTITION_POSITION HIGH_VALUE


    ---------- ------------ ------------------ ----------------------------------------


    F_SALES P1 1 TO_DATE('' 2010-01-01 00:00:00'',...


    Now we insert some data above the high value for the highest partition: insert
    into f_sales values(1,sysdate+1000);


    Here’s what the output from selecting from USER_TAB_PARTITIONS now shows: TABLE_NAME
    PARTITION_NA PARTITION_POSITION HIGH_VALUE'
  trans: "\n但是，如果按值范围进行搜索，Oracle 很可能需要扫描每个分区来确定要检索的行。因此，范围搜索在哈希分区表中可能表现不佳。\n\n## 15-5.\
    \ 以多种方式对表进行分区\n\n### 问题\n\n你有一个表，想按数字范围对其进行分区，但你还希望按区域列表对每个分区进行进一步细分。\n\n### 解决方案\n\
    \n使用组合分区来指示 Oracle 以多种方式对表进行分区。以下示例首先按数字范围对表进行分区，然后通过列表分区进一步分发数据：\n\n```sql\n\
    create table f_sales(\n  sales_amnt number\n ,reg_code varchar2(3)\n ,d_date_id\
    \ number\n)\npartition by range(d_date_id)\nsubpartition by list(reg_code)\n(partition\
    \ p2010 values less than (20100101)\n (subpartition p1_north values ('ID','OR')\n\
    \  ,subpartition p1_south values ('AZ','NM')\n ),\n partition p2011 values less\
    \ than (20110101)\n (subpartition p2_north values ('ID','OR')\n  ,subpartition\
    \ p2_south values ('AZ','NM')\n )\n);\n```\n\n你可以通过运行以下查询来查看子分区信息：\n\n```sql\n\
    select table_name, partitioning_type, subpartitioning_type\nfrom user_part_tables;\n\
    ```\n\n以下是一些示例输出：\n\n```\nTABLE_NAME           PARTITIONING_TYPE    SUBPARTITIONING_TYPE\n\
    -------------------- -------------------- ---------------------\nF_SALES     \
    \         RANGE                LIST\n```\n\n运行下一个查询以查看有关子分区的信息：\n\n```sql\nselect\
    \ table_name, partition_name, subpartition_name\nfrom user_tab_subpartitions;\n\
    ```\n\n以下是部分输出内容：\n\n```\nTABLE_NAME           PARTITION_NAME       SUBPARTITION_NAME\n\
    -------------------- -------------------- --------------------\nF_SALES      \
    \        P2010                P1_SOUTH\nF_SALES              P2010           \
    \     P1_NORTH\nF_SALES              P2011                P2_SOUTH\nF_SALES  \
    \            P2011                P2_NORTH\n```\n\n第 15 章 ■ 分区\n\n### 工作原理\n\n\
    Oracle 允许你组合两种分区策略，如下所示：\n\n- 范围-范围分区\n- 范围-哈希分区\n- 范围-列表分区\n- 列表-范围分区\n- 列表-哈希分区\n\
    - 列表-列表分区\n\n组合分区在数据划分方式上提供了极大的灵活性。你可以使用这些方法来进一步细化数据的分布和维护方式。\n\n## 15-6. 按需创建分区\n\
    \n### 问题\n\n你有一个范围分区表，并希望当插入的值高于为最高范围定义的最高值时，Oracle 能够自动添加一个分区。\n\n### 解决方案\n\n\
    如果你使用的是 Oracle Database `11g` 或更高版本，可以使用 `CREATE TABLE` 语句的 `INTERVAL` 子句来指示 Oracle\
    \ 自动向范围分区表的高端添加分区。\n\n此示例创建了一个表，该表最初有一个分区，其高值范围为 2010 年 1 月 1 日。\n\n```sql\ncreate\
    \ table f_sales(\n  sales_amt number\n ,d_date date\n)\npartition by range (d_date)\n\
    interval(numtoyminterval(1, 'YEAR'))\n(partition p1 values less than (to_date('01-jan-2010','dd-mon-yyyy')));\n\
    ```\n\n此示例中的间隔为 1 年，由 `INTERVAL(NUMTOYMINTERVAL(1, 'YEAR'))` 子句定义。\n\n如果向表中插入的记录的\
    \ `D_DATE` 值大于或等于 2010 年 1 月 1 日，Oracle 将自动在表的高端添加一个新分区。你可以通过运行此 SQL 语句来检查分区的详细信息：\n\
    \n```sql\nselect table_name, partition_name, partition_position, high_value\n\
    from user_tab_partitions order by table_name, partition_name;\n```\n\n以下是一些示例输出（`HIGH_VALUE`\
    \ 列已被截短以便输出适应页面）：\n\n```\nTABLE_NAME           PARTITION_NAME       PARTITION_POSITION\
    \   HIGH_VALUE\n----------           ------------         --------------------\
    \ ----------\nF_SALES              P1                   1                    TO_DATE('\
    \ 2010-01-01 00:00:00',...\n```\n\n现在，我们插入一些高于最高分区高值的数据：\n\n```sql\ninsert into\
    \ f_sales values(1,sysdate+1000);\n```\n\n这是现在从 `USER_TAB_PARTITIONS` 选择后显示的输出：\n\
    \n```\nTABLE_NAME           PARTITION_NAME       PARTITION_POSITION   HIGH_VALUE\n\
    ----------           ------------         -------------------- ----------\n```\n"
- fmt: "# CHAPTER 15 ■ PARTITIONING\n\n## 15-7\\. Partitioning by Referential Constraints\n\
    \n### Problem\n\n你有一个父表 `ORDERS` 和一个子表 `ORDER_ITEMS`，它们通过 `ORDER_ID` 列上的主键和外键约束相关联。父表\
    \ `ORDERS` 在 `ORDER_DATE` 列上进行了分区。尽管子表 `ORDER_ITEMS` 不包含 `ORDER_DATE` 列，但你是否可以将其分区，使其记录以与父表\
    \ `ORDERS` 相同的方式分布？\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n###\
    \ Solution\n\n如果你使用的是 Oracle Database 11 *g* 或更高版本，可以使用 `PARTITION BY REFERENCE`\
    \ 子句来指定子表应与其父表以相同的方式进行分区。以下示例创建了一个在 `ORDER_ID` 上有主键约束、在 `ORDER_DATE` 上有范围分区的父表：\n\
    \n```sql\ncreate table orders(\n    order_id number\n    ,order_date date\n  \
    \  ,constraint order_pk primary key(order_id)\n)\npartition by range(order_date)\n\
    (\n    partition p10 values less than (to_date('01-jan-2010','dd-mon-yyyy'))\n\
    \    ,partition p11 values less than (to_date('01-jan-2011','dd-mon-yyyy'))\n\
    \    ,partition pmax values less than (maxvalue)\n);\n```\n\n接着创建子表 `ORDER_ITEMS`。它通过将外键约束命名为引用对象来进行分区：\n\
    \n```sql\ncreate table order_items(\n    line_id number\n    ,order_id number\
    \ not null\n    ,sku number\n    ,quantity number\n    ,constraint order_items_pk\
    \ primary key(line_id, order_id)\n    ,constraint order_items_fk1 foreign key\
    \ (order_id) references orders\n)\npartition by reference (order_items_fk1);\n\
    ```\n\n请注意，外键列 `ORDER_ID` 必须定义为 `NOT NULL`。外键列必须被启用并强制执行。\n\n### How It Works\n\
    \n从 Oracle Database 11 *g* 开始，你可以通过引用进行分区。这允许子表继承其父表的分区策略。任何父表的分区维护操作也会应用于子记录表。\n\
    \n在引入引用分区功能之前，你必须在子表中物理复制并维护父表列，这不仅需要更多的磁盘空间，而且在维护分区时也容易出错。\n\n在创建引用分区的子表时，如果你没有显式命名子表分区，默认情况下，Oracle\
    \ 将使用与父表相同的分区名称为子表创建分区。以下示例显式命名了子表的引用分区：\n\n```sql\ncreate table order_items(\n\
    \    line_id number\n    ,order_id number not null\n    ,sku number\n    ,quantity\
    \ number\n    ,constraint order_items_pk primary key(line_id, order_id)\n    ,constraint\
    \ order_items_fk1 foreign key (order_id) references orders\n)\npartition by reference\
    \ (order_items_fk1)\n(\n    partition c10\n    ,partition c11\n    ,partition\
    \ cmax\n);\n```\n\n你不能指定引用表的分区范围。除非你为子分区指定表空间，否则引用表的分区将在与父分区相同的表空间中创建。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n---\n\n**Note**  \n在间隔分区中，你只能从表中指定单个键列，并且该列必须是 `DATE` 或 `NUMBER` 数据类型。\n\n---\n\
