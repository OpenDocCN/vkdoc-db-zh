    # 第三章：多表查询


    ## 3-2. 垂直堆叠查询结果


    ### 问题

    你希望将两个 `SELECT` 语句的结果合并为一个结果集。


    ### 解决方案

    使用 `UNION` 操作符。`UNION` 将两个或多个查询的结果合并，并会去除整个结果集中的重复行。在 Oracle 的神话公司中，`EMPLOYEES_ACT`
    表中的员工需要与最近一次公司收购而来的员工合并。新近收购公司的员工表 `EMPLOYEES_NEW` 与现有的 `EMPLOYEES_ACT` 表格式完全相同，因此使用
    `UNION` 将两个表合并为一个结果集应该很容易，如下所示：


    ```sql

    select employee_id, first_name, last_name from employees_act;

    ```


    ```

    EMPLOYEE_ID FIRST_NAME LAST_NAME

    ---------------------- -------------------- -------------------------

    102 Lex De Haan

    105 David Austin

    112 Jose Manuel Urman

    118 Guy Himuro

    119 Karen Colmenares

    205 Shelley Higgins

    6 rows selected

    ```


    ```sql

    select employee_id, first_name, last_name from employees_new;

    ```


    ```

    EMPLOYEE_ID FIRST_NAME LAST_NAME

    ---------------------- -------------------- -------------------------

    101 Neena Kochhar

    105 David Austin

    112 Jose Manuel Urman

    171 William Smith

    201 Michael Hartstein

    5 rows selected

    ```


    ```sql

    select employee_id, first_name, last_name from employees_act

    union

    select employee_id, first_name, last_name from employees_new

    order by employee_id;

    ```


    ```

    EMPLOYEE_ID FIRST_NAME LAST_NAME

    ---------------------- -------------------- -------------------------

    101 Neena Kochhar

    102 Lex De Haan

    105 David Austin

    112 Jose Manuel Urman

    118 Guy Himuro

    119 Karen Colmenares

    171 William Smith

    201 Michael Hartstein

    205 Shelley Higgins

    9 rows selected

    ```


    使用 `UNION` 会删除重复的行。你可以在查询末尾使用一个 `ORDER BY` 来对结果排序。在这个例子中，两张员工表有两行数据是相同的（有些人需要打两三份工才能维持生计！），因此
    `UNION` 查询返回九行，而不是十一行。


    ### 工作原理

    请注意，为了让 `UNION` 操作符去除重复行，给定行中的所有列必须与一个或多个其他行中的相同列相等。当 Oracle 处理 `UNION` 时，它必须执行排序/合并操作以确定哪些行是重复的。因此，你的执行时间可能会比单独运行每个
    `SELECT` 语句要长。如果你知道每个 `SELECT` 语句内部及语句之间都没有重复项，你可以使用 `UNION ALL` 来合并结果，而无需检查重复项。


    如果存在重复项，不会导致错误；你只是会在结果集中得到重复的行。


    ## 3-3. 编写可选连接


    ### 问题

    你正在通过一个或多个公共列连接两个表，但你希望确保返回第一个表中的所有行，无论第二个表中是否有匹配行。例如，你正在连接员工表和部门表，但有些员工没有分配部门。


    ### 解决方案

    使用外连接。在 Oracle 的示例数据库中，`HR` 用户维护着 `EMPLOYEES` 和 `DEPARTMENTS` 表；为员工分配部门是可选的。`EMPLOYEES`
    表中有 107 名员工。然而，在 `EMPLOYEES` 和 `DEPARTMENTS` 之间使用标准连接只返回 106 行，因为有一名员工没有被分配部门。为了返回
    `EMPLOYEES` 表中的所有行，你可以使用 `LEFT OUTER JOIN`，它会包含 `EMPLOYEES` 表中的所有行以及 `DEPARTMENTS`
    表中的匹配行（如果有的话）：


    ```sql

    select employee_id, last_name, first_name, department_id, department_name

    from employees

    left outer join departments using(department_id);

    ```


    ```

    EMPLOYEE_ID LAST_NAME FIRST_NAME DEPARTMENT_ID DEPARTMENT_NAME

    ------------ --------------- --------------- ----------------- -------------------

    200 Whalen Jennifer 10 Administration

    202 Fay Pat 20 Marketing

    201 Hartstein Michael 20 Marketing

    119 Colmenares Karen 30 Purchasing

    . . .

    206 Gietz William 110 Accounting

    205 Higgins Shelley 110 Accounting

    178 Grant Kimberely

    107 rows selected

    ```


    现在结果集中有 107 行，而不是 106 行；`Kimberely Grant` 被包含在内，即使她目前没有被分配部门。


    ### 工作原理

    当使用 `LEFT OUTER JOIN` 连接两个表时，如你所料，查询会返回 `LEFT OUTER JOIN` 子句左侧表中的所有行。`LEFT OUTER
    JOIN` 子句右侧表中的行会在可能时进行匹配。如果没有匹配，右侧表中的列在结果中将包含 `NULL` 值。


    如你所料，也有一个 `RIGHT OUTER JOIN`（在两种情况下，`OUTER` 关键字都是可选的）。你可以将解决方案重写如下：


    ```sql

    select employee_id, last_name, first_name, department_id, department_name

    from departments

    right outer join employees using(department_id);

    ```


    结果是相同的，使用哪种格式取决于可读性和风格。


    该查询也可以使用 `ON` 子句来编写，就像等值连接（内连接）一样。对于 Oracle 9*i* 之前的版本，你必须使用 Oracle 有点晦涩且专有的外连接语法，在缺少行的那一侧加上
    `(+)` 字符，如下例所示：


    ```sql

    select employee_id, last_name, first_name, e.department_id, department_name

    from employees e, departments d

    where e.department_id = d.department_id (+);

    ```


    不用说，如果你可以使用 ANSI SQL-99 语法，为了清晰和易于维护，请务必使用它。


    ## 3-4. 使连接在两个方向上都成为可选


    ### 问题

    你查询中的所有表都至少有几行与其他表中的行不匹配，但你仍然希望返回所有表中的所有行，并在结果中显示不匹配项。例如，你想通过包含来自两张表的不匹配项来减少报告数量，而不是为每种情况都制作一份报告。


    ### 解决方案

    '
- fmt: "Use `FULL OUTER JOIN`. As you might expect, a full outer join between two\
    \ or more tables will return all rows in each table of the query and match where\
    \ possible. You can use `FULL OUTER JOIN` with the `EMPLOYEES` and `DEPARTMENTS`\
    \ table as follows:\n\n## CHAPTER 3 ■ QUERYING FROM MULTIPLE TABLES\n\n```sql\n\
    select employee_id, last_name, first_name, department_id, department_name\nfrom\
    \ employees\nfull outer join departments\nusing(department_id)\n;\n```\n\n```\n\
    EMPLOYEE_ID LAST_NAME FIRST_NAME DEPARTMENT_ID DEPARTMENT_NAME\n------------ -----------------\
    \ ------------- ---------------- --------------------\n100 King Steven 90 Executive\n\
    101 Kochhar Neena 90 Executive\n102 De Haan Lex 90 Executive\n. . .\n177 Livingston\
    \ Jack 80 Sales\n178 Grant Kimberely\n179 Johnson Charles 80 Sales\n. . .\n206\
    \ Gietz William 110 Accounting\n180 Construction\n190 Contracting\n230 IT Helpdesk\n\
    123 rows selected\n```\n\n`Note`: The `OUTER` keyword is optional when using a\
    \ `FULL`, `LEFT`, or `RIGHT` join. It does add documentation value to your query,\
    \ making it clear that mismatched rows from one or both tables will be in the\
    \ results.\n\nUsing `FULL OUTER JOIN` is a good way to view, at a glance, mismatches\
    \ between two tables. In the preceding output, you can see an employee without\
    \ a department as well as several departments that have no employees.\n\n### How\
    \ It Works\n\nTrying to accomplish a full outer join before Oracle9i was a bit\
    \ inelegant: you had to perform a `UNION` of two outer joins (a left and a right\
    \ outer join) using the proprietary Oracle syntax as follows:\n\n```sql\nselect\
    \ employee_id, last_name, first_name, e.department_id, department_name\nfrom employees\
    \ e, departments d\nwhere e.department_id = d.department_id (+)\nunion\nselect\
    \ employee_id, last_name, first_name, e.department_id, department_name\nfrom employees\
    \ e, departments d\nwhere e.department_id (+) = d.department_id\n;\n```\n\nRunning\
    \ two separate queries, then removing duplicates, takes more time to execute than\
    \ using the `FULL OUTER JOIN` syntax, where only one pass on each table is required.\n\
    \nYou can tweak the `FULL OUTER JOIN` to produce only the mismatched records as\
    \ follows:\n\n```sql\nselect employee_id, last_name, first_name, department_id,\
    \ department_name\nfrom employees\nfull outer join departments\nusing(department_id)\n\
    where employee_id is null or department_name is null\n;\n```\n\n## 3-5\\. Removing\
    \ Rows Based on Data in Other Tables\n\n### Problem\n\nYou want to delete rows\
    \ from a table if corresponding rows exist in a second table. For example, you\
    \ want to delete rows from the `EMPLOYEES_RETIRED` table for any employees that\
    \ exist in the `EMPLOYEES` table.\n\n### Solution\n\nUse the `IN` or `EXISTS`\
    \ clause with a subquery. You have a table called `EMPLOYEES_RETIRED` that should\
    \ contain only—you guessed it—retired employees. However, the `EMPLOYEES_RETIRED`\
    \ table erroneously includes some active employees, so you want to remove any\
    \ active employees from the `EMPLOYEES_RETIRED` table. Here’s how you can do that:\n\
    \n```sql\ndelete from employees_retired\nwhere employee_id\nin (select employee_id\
    \ from employees)\n;\n```\n\n### How It Works\n\nWhen you use `SELECT`, you have\
    \ the relative luxury of using a join condition to return results. When deleting\
    \ rows, you can’t perform an explicit join unless the join conditions are in a\
    \ subquery or you use an inline view as follows:\n\n```sql\ndelete (\n  select\
    \ employee_id\n  from employees_retired join employees using(employee_id)\n);\n\
    ```\n\nThe SQL standard treats views much like tables, in that you can not only\
    \ run a `SELECT` statement against a view, but also `INSERT`, `UPDATE` and `DELETE`\
    \ under certain circumstances. If these circumstances are met (for example, you\
    \ have a key-preserved table, no aggregates, and so forth), `DELETE` will delete\
    \ only from the first table in the `FROM` clause. Be careful: if your `DELETE`\
    \ looks like the following, you will not get the intended results:\n\n```sql\n\
    delete (\n  select employee_id\n  from employees join employees_retired using(employee_id)\n\
    );\n```"
