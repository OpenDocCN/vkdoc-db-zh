- fmt: '# SQL Monitoring and Tuning


    If you don’t have a license to use the `AWR`, `ADDM`, and `ASH` reports, the free
    `Statspack` utility can help you identify poorly performing SQL statements. Run
    the following script as `SYS` to install `Statspack`:


    ```

    SQL> @?/rdbms/admin/spcreate.sql

    ```


    This script creates a `PERFSTAT` user that owns the `Statspack` repository. To
    enable the automatic gathering of `Statspack` statistics, run this script:


    ```

    SQL> @?/rdbms/admin/spauto.sql

    ```


    After some snapshots have been gathered, you can run the following script as the
    `PERFSTAT` user to create a `Statspack` report:


    ```

    SQL> @?/rdbms/admin/spreport.sql

    ```


    Once the report is created, search for the section labeled “SQL ordered by CPU.”
    Here is some sample output:


    ```

    SQL ordered by CPU DB/Inst: DW11/DW11 Snaps: 11-14

    -> Total DB CPU (s): 107

    -> Captured SQL accounts for 246.0% of Total DB CPU

    -> SQL reported below exceeded 1.0% of Total DB CPU


    CPU CPU per Elapsd Old Time (s) Executions Exec (s) %Total Time (s) Buffer Gets
    Hash Value

    ---------- ----------- ---------- ------ ---------- --------------- ----------

    254.95 4 63.74 238.1 249.74 12,811 2873951798

    Module: SQL*Plus

    select count(*) from dba_indexes, dba_tables

    ```


    **Tip** View the `ORACLE_HOME/rdbms/admin/spdoc.txt` file for `Statspack` documentation.


    ## How It Works


    Oracle maintains a massive collection of dynamic performance views that track
    and accumulate metrics of database performance. For example, if you run the following
    query, you’ll notice that for Oracle Database 11g, there are over 400 dynamic
    performance views:


    ```

    select count(*) from dictionary where table_name like ''V$%'';

    ```


    The Oracle performance utilities rely on periodic snapshots gathered from these
    internal performance views. Two of the most useful views with regard to performance
    statistics are the `V$SYSSTAT` and `V$SESSTAT` views. The `V$SYSSTAT` view contains
    over 400 types of database statistics. This `V$SYSSTAT` view contains information
    about the entire database, whereas the `V$SESSTAT` view contains statistics for
    individual sessions.


    A few of the values in the `V$SYSSTAT` and `V$SESSTAT` views contain the current
    usage of the resource. These values are:

    - `opened cursors current`

    - `logons current`

    - `session cursor cache current`

    - `workarea memory allocated`


    The rest of the values are cumulative. The values in `V$SYSSTAT` are cumulative
    for the entire database from the time the instance was started. The values in
    `V$SESSTAT` are cumulative per session from the time the session was started.
    Some of the more important performance-related cumulative values are:

    - `CPU used`

    - `consistent gets`

    - `physical reads`

    - `physical writes`


    For the cumulative statistics, the way to measure periodic usage is to note the
    value of a statistic at a starting point, and then note the value at a later point
    in time and capture the delta. This is the approach used by the Oracle performance
    utilities such as `AWR` and `Statspack`. Periodically Oracle will take a snapshot
    of the dynamic wait interface views and store them in a repository.


    You can access statistics regarding top-resource consuming SQL statements in the
    `DBA_HIST_SQLSTAT` `AWR` view. There is another related view, `DBA_HIST_SNAPSHOT`,
    which shows a record for each `AWR` snapshot. Similarly, the `Statspack` historical
    performance statistical data is stored in the `STATS$SQL_SUMMARY` table and the
    `STATS$SNAPSHOT` table contains a record for each `Statspack` snapshot.


    ## 19-6. Using the Operating System to Identify Resource-Intensive Queries


    ### Problem


    You have multiple Oracle, MySQL, and PostgreSQL databases running on a single
    server. The performance of the box seems sluggish. You want to pinpoint which
    operating system session is consuming the most resources and determine if that
    session is associated with a database and ultimately a specific SQL query.


    ### Solution


    First, use an operating system utility to identify the process consuming the most
    resources. This example uses the Linux/Unix `ps` utility to identify the operating
    system sessions consuming the most CPU:


    ```

    $ ps -e -o pcpu,pid,user,tty,args | sort -n -k 1 -r | head

    ```


    Here is some sample output:


    ```

    7.8 14028 oracle ? oracleDW11 (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))

    0.1 17012 oracle ? ora_j003_SCDEV

    0.1 17010 oracle ? ora_j002_SCDEV

    ```


    From the output, the operating system session of `14028` is consuming the most
    CPU resources at 7.8 percent. In this example, the `14028` process is associated
    with the `DW11` database. Next, log onto the appropriate database and use the
    following SQL statement to determine what type of program is associated with the
    operating system process of `14028`:


    ```

    select

    ''USERNAME : '' || s.username|| chr(10) ||

    ''OSUSER : '' || s.osuser || chr(10) ||

    ''PROGRAM : '' || s.program || chr(10) ||

    ''SPID : '' || p.spid || chr(10) ||

    ''SID : '' || s.sid || chr(10) ||

    ''SERIAL# : '' || s.serial# || chr(10) ||

    ''MACHINE : '' || s.machine || chr(10) ||

    ''TERMINAL : '' || s.terminal

    from v$session s,

    v$process p

    where s.paddr = p.addr

    and p.spid = ''&PID_FROM_OS'';

    ```


    Here is the output for this example:


    ```

    ''USERNAME:''||S.USERNAME||CHR(10)||''OSUSER:''||S.OSUSER||CHR(10)||''PROGRAM:''

    USERNAME : INV_MGMT

    OSUSER : oracle

    PROGRAM : sqlplus@rmougprd.rmoug.org (TNS V1-V3)

    SPID : 14028

    SID : 198

    SERIAL# : 57

    MACHINE : rmougprd.rmoug.org

    TERMINAL :

    ```


    In this output, the `PROGRAM` value is `sqlplus@rmougprd.rmoug.org`. This indicates
    that a `SQL*Plus` session is the program consuming the inordinate amount of resources
    on the `rmougprd.rmoug.org` server.


    Next run the following query to display the SQL statement associated with the
    operating system process ID (in this example, the `SPID` is `14028`):


    ```

    select

    ''USERNAME : '' || s.username || chr(10) ||

    ''OSUSER : '' || s.osuser || chr(10) ||

    ''PROGRAM : '' || s.program || chr(10) ||

    ''SPID : '' || p.spid || chr(10) ||

    ''SID : '' || s.sid || chr(10) ||

    ''SERIAL# : '' || s.serial# || chr(10) ||

    ''MACHINE : '' || s.machine || chr(10) ||

    ''TERMINAL : '' || s.terminal || chr(10) ||

    ''SQL TEXT : '' || q.sql_text

    from v$session s

    ,v$process p

    ,v$sql q

    where s.paddr = p.addr

    and p.spid = ''&PID_FROM_OS''

    and s.sql_id = q.sql_id;

    ```


    The result shows the resource-consuming SQL as part of the output in the `SQL
    TEXT` column:


    ```

    ''USERNAME:''||S.USERNAME||CHR(10)||''OSUSER:''||S.OSUSER||CHR(10)||''PROGRAM:''

    USERNAME : INV_MGMT

    OSUSER : oracle

    PROGRAM : sqlplus@rmougprd.rmoug.org (TNS V1-V3)

    SPID : 14028

    SID : 198

    SERIAL# : 57

    MACHINE : rmougprd.rmoug.org

    TERMINAL :

    SQL TEXT : select count(*) ,object_name from dba_objects,dba_segments 470

    ```


    ### How It Works


    When you run multiple databases on one server and are experiencing server performance
    issues, it can sometimes be difficult to pinpoint which database and associated
    process are causing the problems. In these situations you have to use an operating
    system tool to identify the top-consuming sessions on the system.


    In a Linux or Unix environment, you can use utilities such as `ps`, `top`, or
    `vmstat` to identify top-consuming operating system processes. The `ps` utility
    is handy because it lets you identify processes consuming the most CPU or memory.
    In the solution section, we used the `ps` command to identify the most CPU-intensive
    queries. Here we use it to identify the top Oracle memory-using processes:


    ```

    $ ps -e -o pmem,pid,user,tty,args | grep -i oracle | sort -n -k 1 -r | head

    ```


    Once you have identified a top-consuming process associated with a database, you
    can query the data dictionary views based on the server process ID to identify
    what the database process is executing.


