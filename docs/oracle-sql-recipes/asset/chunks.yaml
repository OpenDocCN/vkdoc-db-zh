    ***Figure 5-3.** The second select for update blocked, waiting for session 1*


    The highlighted row shows the second session in a `WAIT` state, blocked from taking
    any action until the first session commits or rolls back its work. As soon as
    we perform our update and commit the results from session 1, our blocking condition
    clears and the second session takes the exclusive row-level transaction lock it
    wanted, and can in turn perform its desired update. Figure 5-4 shows the cleared
    `WAIT` state and the second session now holding the lock.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 21](index-165_1.png)


    ***Figure 5-4.** Cleared from the wait state, the second select for update now
    holds an exclusive lock*


    In this way, you can take explicit pessimistic control of locking in Oracle in
    those specific circumstances where you can’t avoid it.


    > **Caution:** While this approach might keep your boss happy, you might want
    to gently educate him or her over time to the great technology in Oracle, especially
    the non-blocking capabilities where readers don’t block writers and everyone gets
    a consistent view of the data. They may not want to hear it the first time, but
    keep dropping it into conversations using the phrase, “You were so clever to buy
    a database that can do this, Boss.” That way, their ego starts to work for you
    rather than against you, and you can avoid these pessimistic locking techniques
    as much as possible.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 5-12\. Synchronizing the Contents of Two Tables


    ### Problem


    You manage a system that keeps two or more tables with identical structures, but
    each table only stores some of the other’s rows. You need to synchronize these
    tables so they each contain the full set of rows.


    ### Solution


    Table synchronization is a problem with countless potential solutions. All of
    Oracle’s fundamental SQL capabilities can be used to compare, insert, or delete
    rows. For our recipe, we’ll attempt to use one of the more elegant approaches
    to synchronization, often overlooked in the rush to tackle the problem in a procedural
    fashion.


    Rather than code elaborate loops, tests, and more in SQL or PL/SQL, Oracle’s `MINUS`
    union operator can be used to determine the difference in two sets of data in
    a set-wise fashion.


    To illustrate our recipe, we’ll imagine that our company has two subsidiaries,
    each of which is tracking a subset of employees in tables with the same structure
    as the `HR.EMPLOYEES` table. We create these tables, `EMPA` and `EMPB`, with the
    next `CREATE TABLE` statements.


    ```sql

    create table hr.empa

    as

    select *

    from hr.employees

    where employee_id < 175;


    create table hr.empb

    as

    select *

    from hr.employees

    where employee_id > 125;

    ```


    The `EMPLOYEE_ID` cutoff chosen is arbitrary and was selected only to ensure there
    were not only some duplicates in the two tables, but also some rows unique to
    each table. We can quickly prove that our tables have different data with the
    next two SQL statements.


    ```sql

    select min(employee_id), max(employee_id), count(*)

    from hr.empa;


    MIN(EMPLOYEE_ID) MAX(EMPLOYEE_ID) COUNT(*)

    ---------------- ---------------- ----------

    100              174              75


    select min(employee_id), max(employee_id), count(*)

    from hr.empb;


    MIN(EMPLOYEE_ID) MAX(EMPLOYEE_ID) COUNT(*)

    ---------------- ---------------- ----------

    126              212              84

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    So we’ve established our subsidiary tables and can see they have overlapping,
    but in places different, data. Our solution uses the `MINUS` operation to bring
    the tables in to synchronization in the next two statements.


    ```sql

    insert into hr.empa

    select *

    from hr.empb

    minus

    select *

    from hr.empa;


    insert into hr.empb

    select *

    from hr.empa

    minus

    select *

    from hr.empb;

    ```


    With our synchronization performed, a quick check shows we seem to now have identical
    sets of data.


    ```sql

    select min(employee_id), max(employee_id), count(*)

    from hr.empa;


    MIN(EMPLOYEE_ID) MAX(EMPLOYEE_ID) COUNT(*)

    ---------------- ---------------- ----------

    ```'
