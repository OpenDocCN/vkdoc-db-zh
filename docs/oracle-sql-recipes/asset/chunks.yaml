    # 第 19 章 SQL 监控与调优


    | ID | 操作 | 名称 | 行数 | 字节数 | 成本(%CPU) |

    |----|------|------|------|--------|------------|

    | 0 | SELECT STATEMENT | | 39 | 1716 | 55 (0) |

    | 1 | NESTED LOOPS | | | | |

    | 2 | NESTED LOOPS | | 39 | 1716 | 55 (0) |

