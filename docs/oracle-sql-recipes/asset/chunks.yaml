    Now, as the SYSTEM schema, create the product user profile tables:


    SQL> connect system/manager


    SQL> @?/sqlplus/admin/pupbld


    These tables allow SQL*Plus to disable commands on a user-by-user basis. If the
    pupbld.sql script is not run, then all non-sys users will see the following warning
    when logging into SQL*Plus: Error accessing PRODUCT_USER_PROFILE


    Warning: Product user profile information not loaded!


    You may need to run PUPBLD.SQL as SYSTEM


    How It Works


    Before you can run the CREATE DATABASE statement, you must start the background
    processes and allocate memory via the STARTUP NOMOUNT statement. The CREATE DATABASE
    statement is dependent on an initialization file that defines the location(s)
    for the control file and memory configuration.


    On Linux/Unix systems, the initialization file (either a text init.ora or binary
    spfile) is by default located in the ORACLE_HOME/dbs directory. On Windows, the
    default directory is ORACLE_HOME\database.


    When starting your instance, Oracle will look in the default location for a binary
    initialization file named spfile<ORACLE_SID>.ora. If there is no binary spfile,
    Oracle will look for a text file with the name of init<ORACLE_SID>.ora. Oracle
    will throw an error if it can’t find an initialization file in the default location.
    You can explicitly tell Oracle which directory and file to use by specifying the
    PFILE clause of the STARTUP command, which allows you to specify a non-default
    directory and name of a text initialization file.


    Here is a typical Oracle Database 11 *g* init.ora text file:


    db_name=INVREP


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 17 ■ DATABASE ADMINISTRATION


    db_block_size=8192


    compatible=11.1.0


    memory_target=800M


    memory_max_target=800M


    processes=200


    control_files=(/ora01/oradata/INVREP/control01.ctl,


    /ora02/oradata/INVREP/control02.ctl)


    diagnostic_dest=/orahome/oracle


