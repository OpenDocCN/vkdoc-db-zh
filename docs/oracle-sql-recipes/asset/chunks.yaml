    How It Works


    Oracle defines the high-water mark of a table as the boundary between used and
    unused space in a segment. When you create a table, Oracle will allocate a number
    of extents to the table defined by the MINEXTENTS table storage parameter. Each
    extent contains a number of blocks. Before data is inserted into the table, none
    of the blocks have been used and the high-water mark is zero.


    The TRUNCATE statement sets the high-water mark of a table back to zero. When
    you use a DELETE


    statement to remove data from a table, the high-water mark does not change. One
    advantage to using a TRUNCATE statement and resetting the high-water mark is that
    full table scans will only search for rows in blocks below the high-water mark.
    This can have significant performance implications.


    ■ **Note** You can determine the space usage of blocks beneath the high-water
    mark via the DBMS_SPACE


    package.


    **High-water Mark and Performance**


    Oracle sometimes needs to scan every block of a table (under the high-water mark)
    when performing a query. This is known as a full table scan. If there has been
    a significant amount of data deleted from a table, a full table scan can take
    a long time to complete, even for an empty table.


    You can run this simple test to detect this issue:


    1\. SQL> set autotrace trace statistics


    2\. Run the query that performs the full table scan


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ CLEANSING DATA


    3\. Compare the number of rows processed to the number of logical I/Os If the
    number of rows processed is low yet the number of logical I/Os is high, you may
    have an issue with the number of free blocks below the high- water mark. To readjust
    the high-water mark you must enable row movement for the table and then use the
    ALTER TABLE...SHRINK SPACE statement.


    The TRUNCATE statement is a DDL statement. This means that Oracle automatically
    commits the statement (and the current transaction) after it runs, so there is
    no way to roll back a TRUNCATE statement.


    If you need to be able to roll back when removing data, you should use the DELETE
    statement. However, the DELETE statement has the disadvantage that it generates
    a great deal of undo and redo information.


    For large tables, therefore, a TRUNCATE statement is usually the most efficient
    way to remove data.'
