    \ 将如何从数据库物理检索行，或处理在先前步骤中已检索到的行。以下是一些确定格式化执行计划（例如 AUTOTRACE 的输出）中步骤运行顺序的指导原则：\n\
    \n*   如果两个步骤处于相同的缩进级别，则最上面的步骤最先执行。\n*   对于给定步骤，缩进最深的子步骤最先执行。\n*   当操作完成时，它会将其结果传递给上一层级。\n\
