- fmt: "# CHAPTER 19 ■ SQL MONITORING AND TUNING\n\n## 19-7\\. Displaying an Execution\
    \ Plan Using AUTOTRACE\n\n### Problem\n\nYou’re experiencing performance problems\
    \ when executing a SQL statement and you want to see how the optimizer is planning\
    \ to retrieve data to build the query result set.\n\n### Solution\n\nOne easy\
    \ way to generate an execution plan is to use the `AUTOTRACE` utility. Before\
    \ you generate an explain plan, you must first make `AUTOTRACE` available in your\
    \ database.\n\n### Setting up `AUTOTRACE`\n\nFollow these steps to set up the\
    \ `AUTOTRACE` facility to display an explain plan.\n\n1.  Ensure that the `PLAN_TABLE`\
    \ table exists. To see if your schema has a `PLAN_TABLE`, try to describe it:\n\
    \    ```\n    SQL> desc plan_table;\n    ```\n    If the `PLAN_TABLE` doesn’t\
    \ exist, you need to create one. Run this script to create the `PLAN_TABLE` in\
    \ your schema:\n    ```\n    SQL> @?/rdbms/admin/utlxplan\n    ```\n\n2.  Your\
    \ schema also needs access to the `PLUSTRACE` role. You can verify access to the\
    \ `PLUSTRACE` role using the following:\n    ```\n    select username, granted_role\
    \ from user_role_privs\n    where granted_role='PLUSTRACE';\n    ```\n    If you\
    \ don’t have access to the `PLUSTRACE` role, run steps 3 and 4 as the `SYS` schema.\n\
    \n3.  Connect as `SYS` and run the `plustrce.sql` script:\n    ```\n    SQL> conn\
    \ / as sysdba\n    SQL> @?/sqlplus/admin/plustrce\n    ```\n\n4.  Grant the `PLUSTRACE`\
    \ role to developers (or to a specific role) who want to use the `AUTOTRACE` facility:\n\
    \    ```\n    SQL> grant plustrace to star1;\n    ```\n\n### Generating an Execution\
    \ Plan\n\nHere’s the simplest way to use the `AUTOTRACE` facility:\n```\nSQL>\
    \ set autotrace on;\n```\nNow any SQL you run will generate an explain plan.\n\
    ```\nselect emp_name from emp;\n```\nHere is a partial listing of the output:\n\
    ```\n| Id | Operation         | Name | Rows | Bytes | Cost (%CPU)| Time     |\n\
    |----|-------------------|------|------|-------|------------|----------|\n|  0\
    \ | SELECT STATEMENT  |      |    1 |    17 |      5 (0)| 00:00:01 |\n|  1 | TABLE\
    \ ACCESS FULL | EMP  |    1 |    17 |      5 (0)| 00:00:01 |\n```\nNote:\n- dynamic\
    \ sampling used for this statement\n\nStatistics:\n```\n28  recursive calls\n\
    0   db block gets\n33  consistent gets\n```\nTo turn off `AUTOTRACE` use the `OFF`\
    \ option:\n```\nSQL> set autotrace off;\n```\n\nNote: An execution plan is also\
    \ commonly referred to as an explain plan. This is because you can use the SQL\
    \ `EXPLAIN PLAN` statement to generate an execution plan.\n\n### How It Works\n\
    \nThe `AUTOTRACE` facility can be invoked in several modes. For example, if you\
    \ only want to generate statistics (and not generate a result set), use `AUTOTRACE`\
    \ in this mode:\n```\nSQL> set autotrace trace explain\n```\nTo view all `AUTOTRACE`\
    \ options, type in this statement:\n```\nSQL> set autotrace help\n```\nActually,\
    \ the previous statement displays help because the `HELP` option doesn’t exist,\
    \ and `AUTOTRACE` will automatically display the usage when an incorrect option\
    \ has been entered. Table 19-1 explains the different modes in which `AUTOTRACE`\
    \ can be invoked.\n\n**Table 19-1. AUTOTRACE Options**\n\n| Option(s) | Result\
    \ |\n|-----------|--------|\n| `SET AUTOTRACE ON` | Query output, explain plan,\
    \ statistics |\n| `SET AUTOTRACE OFF` | Turns `AUTOTRACE` off |\n| `SET AUTOTRACE\
    \ ON EXPLAIN` | Query output, explain plan, no statistics |\n| `SET AUTOTRACE\
    \ ON EXPLAIN STAT` | Query output, explain plan, statistics |\n| `SET AUTOTRACE\
    \ ON STAT` | Query output, statistics, no explain plan |\n| `SET AUTOTRACE TRACE`\
    \ | Explain plan, statistics, result generated but not displayed |"
  raw: 'Oracle provides a collection of Linux/Unix scripts that gather and store metrics
    for CPU, memory, disk, and network usage. The OS Watcher tool suite automates
    the gathering of statistics using tools such as top, vmstat, iostat, mpstat, netstat,
    and traceroute.


    You can obtain OS Watcher from Oracle’s My Oracle Support (MetaLink) website.
    Search for document ID


    301137.1 or for the document titled “OS Watcher User Guide”. Navigate to the Contents
    page and search for the Download link.


    This utility also has an optional graphical component for visually displaying
    performance metrics. The OS


    Watcher utility is currently supported on the following platforms: Linux, Solaris,
    AIX, Tru64, and HP-UX.


    19-7\. Displaying an Execution Plan Using AUTOTRACE


    Problem


    You’re experiencing performance problems when executing a SQL statement and you
    want to see how the optimizer is planning to retrieve data to build the query
    result set.


    Solution


    One easy way to generate an execution plan is to use the AUTOTRACE utility. Before
    you generate an explain plan, you must first make AUTOTRACE available in your
    database.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    Setting up AUTOTRACE


    Follow these steps to set up the AUTOTRACE facility to display an explain plan.


    1.


    Ensure that the PLAN_TABLE table exists. To see if your schema has a


    PLAN_TABLE, try to describe it:


    SQL> desc plan_table;


    If the PLAN_TABLE doesn’t exist, you need to create one. Run this script to create
    the PLAN_TABLE in your schema:


    SQL> @?/rdbms/admin/utlxplan


    2.


    Your schema also needs access to the PLUSTRACE role. You can verify access to
    the PLUSTRACE role using the following:


    select username,granted_role from user_role_privs


    where granted_role=''PLUSTRACE'';


    If you don’t have access to the PLUSTRACE role, run steps 3 and 4 as the SYS schema:
    3\. Connect


    as


    SYS and run the plustrce.sql script:


    SQL> conn / as sysdba


    SQL> @?/sqlplus/admin/plustrce


    4\. Grant


    the


    PLUSTRACE role to developers (or to a specific role) who want to use


    the AUTOTRACE facility:


    SQL> grant plustrace to star1;


    Generating an Execution Plan


    Here’s the simplest way to use the AUTOTRACE facility:


    SQL> set autotrace on;


    Now any SQL you run will generate an explain plan.


    select emp_name from emp;


    Here is a partial listing of the output:


    | Id | Operation | Name | Rows | Bytes | Cost (%CPU)| Time |


    | 0 | SELECT STATEMENT | | 1 | 17 | 5 (0)| 00:00:01 |


    | 1 | TABLE ACCESS FULL| EMP | 1 | 17 | 5 (0)| 00:00:01 |


    Note


    - dynamic sampling used for this statement


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    Statistics


    28 recursive calls


    0 db block gets


    33 consistent gets


    To turn off AUTOTRACE use the OFF option:


    SQL> set autotrace off;


    ■ **Note** An execution pan is also commonly referred to as an explain plan. This
    is because you can use the SQL


    EXPLAIN PLAN statement to generate an execution plan.


    How It Works


    The AUTOTRACE facility can be invoked in several modes. For example, if you only
    want to generate statistics (and not generate a result set), use AUTOTRACE in
    this mode: SQL> set autotrace trace explain


    To view all AUTOTRACE options, type in this statement:


    SQL> set autotrace help


    Usage: SET AUTOT[RACE] {OFF | ON | TRACE[ONLY]} [EXP[LAIN]] [STAT[ISTICS]]


    Actually, the previous statement displays help because the HELP option doesn’t
    exist, and AUTOTRACE


    will automatically display the usage when an incorrect option has been entered.
    Table 19-1 explains the different modes in which AUTOTRACE can be invoked.


    ***Table 19-1.** AUTOTRACE Options*


    **Option(s) Result**


    SET AUTOTRACE ON


    Query output, explain plan, statistics


    SET AUTOTRACE OFF


    Turns AUTOTRACE off


    SET AUTOTRACE ON EXPLAIN


    Query output, explain plan, no statistics


    SET AUTOTRACE ON EXPLAIN STAT


    Query output, explain plan, statistics


    SET AUTOTRACE ON STAT


    Query output, statistics, no explain plan


    SET AUTOTRACE TRACE


    Explain plan, statistics, result generated but not displayed


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING'
  trans: "# 第 19 章 ■ SQL 监控与调优\n\n## 19-7. 使用 AUTOTRACE 显示执行计划\n\n### 问题\n\n在执行 SQL\
    \ 语句时遇到了性能问题，你希望查看优化器计划如何检索数据以构建查询结果集。\n\n### 解决方案\n\n生成执行计划的一个简便方法是使用 `AUTOTRACE`\
    \ 实用程序。在生成解释计划之前，必须先确保 `AUTOTRACE` 在你的数据库中可用。\n\n### 设置 `AUTOTRACE`\n\n按照以下步骤设置\
    \ `AUTOTRACE` 工具以显示解释计划。\n\n1.  确保 `PLAN_TABLE` 表存在。要查看你的模式中是否有 `PLAN_TABLE`，尝试描述它：\n\
    \    ```\n    SQL> desc plan_table;\n    ```\n    如果 `PLAN_TABLE` 不存在，你需要创建一个。运行此脚本在你的模式中创建\
    \ `PLAN_TABLE`：\n    ```\n    SQL> @?/rdbms/admin/utlxplan\n    ```\n\n2.  你的模式还需要访问\
    \ `PLUSTRACE` 角色。你可以使用以下语句验证对 `PLUSTRACE` 角色的访问权限：\n    ```\n    select username,\
    \ granted_role from user_role_privs\n    where granted_role='PLUSTRACE';\n   \
    \ ```\n    如果你没有访问 `PLUSTRACE` 角色的权限，请以 `SYS` 模式身份执行步骤 3 和 4。\n\n3.  以 `SYS` 身份连接并运行\
    \ `plustrce.sql` 脚本：\n    ```\n    SQL> conn / as sysdba\n    SQL> @?/sqlplus/admin/plustrce\n\
    \    ```\n\n4.  将 `PLUSTRACE` 角色授予希望使用 `AUTOTRACE` 工具的开发人员（或特定角色）：\n    ```\n\
    \    SQL> grant plustrace to star1;\n    ```\n\n### 生成执行计划\n\n以下是使用 `AUTOTRACE`\
    \ 工具的最简单方法：\n```\nSQL> set autotrace on;\n```\n现在，你运行的任何 SQL 都会生成一个解释计划。\n```\n\
    select emp_name from emp;\n```\n这是输出的部分列表：\n```\n| Id | Operation         | Name\
    \ | Rows | Bytes | Cost (%CPU)| Time     |\n|----|-------------------|------|------|-------|------------|----------|\n\
    |  0 | SELECT STATEMENT  |      |    1 |    17 |      5 (0)| 00:00:01 |\n|  1\
    \ | TABLE ACCESS FULL | EMP  |    1 |    17 |      5 (0)| 00:00:01 |\n```\n注意：\n\
    - 此语句使用了动态采样\n\n统计信息：\n```\n28  recursive calls\n0   db block gets\n33  consistent\
    \ gets\n```\n要关闭 `AUTOTRACE`，请使用 `OFF` 选项：\n```\nSQL> set autotrace off;\n```\n\
    \n注意：执行计划通常也被称为解释计划。这是因为你可以使用 SQL 的 `EXPLAIN PLAN` 语句来生成执行计划。\n\n### 工作原理\n\n\
    `AUTOTRACE` 工具可以以多种模式调用。例如，如果你只想生成统计信息（而不生成结果集），请使用此模式：\n```\nSQL> set autotrace\
    \ trace explain\n```\n要查看所有 `AUTOTRACE` 选项，请输入此语句：\n```\nSQL> set autotrace help\n\
    ```\n实际上，前一条语句显示了帮助，因为 `HELP` 选项不存在，并且当输入了不正确的选项时，`AUTOTRACE` 会自动显示用法信息。表 19-1\
    \ 解释了可以调用 `AUTOTRACE` 的不同模式。\n\n**表 19-1. AUTOTRACE 选项**\n\n| 选项 | 结果 |\n|-----------|--------|\n\
    | `SET AUTOTRACE ON` | 查询输出、解释计划、统计信息 |\n| `SET AUTOTRACE OFF` | 关闭 `AUTOTRACE`\
    \ |\n| `SET AUTOTRACE ON EXPLAIN` | 查询输出、解释计划、无统计信息 |\n| `SET AUTOTRACE ON EXPLAIN\
    \ STAT` | 查询输出、解释计划、统计信息 |\n| `SET AUTOTRACE ON STAT` | 查询输出、统计信息、无解释计划 |\n| `SET\
    \ AUTOTRACE TRACE` | 解释计划、统计信息，生成但不显示结果 |"
- fmt: "# Table 19-1. AUTOTRACE Options (continued)\n\n## Option(s) Result\n\n`SET\
    \ AUTOTRACE TRACE EXPLAIN`\n\nExplain plan only, no result set generated.\n\n\
    `SET AUTOTRACE TRACE STAT`\n\nStatistics only, result set generated but not displayed.\n\
    \n## 19-8. Generating an Execution Plan Using DBMS_XPLAN\n\n### Problem\nYou want\
    \ a handy way to view an execution plan.\n\n### Solution\nA useful way for viewing\
    \ statistics is to use the `DBMS_XPLAN` package. Before you use this technique,\
    \ ensure that a `PLAN_TABLE` is available:\n\n```sql\nSQL> desc plan_table\n```\n\
    \nIf the `PLAN_TABLE` doesn’t exist, you’ll need to create one. Run this query\
    \ to create the `PLAN_TABLE` in your schema:\n\n```sql\nSQL> @?/rdbms/admin/utlxplan\n\
    ```\n\nNow create an entry in the `PLAN_TABLE` for the SQL statement you want\
    \ explained. Use the `EXPLAIN PLAN FOR` statement to do this:\n\n```sql\nexplain\
    \ plan for select emp_id from emp;\n```\n\nNext, display the explain plan by calling\
    \ the `DBMS_XPLAN` package via a `SELECT` statement:\n\n```sql\nselect * from\
    \ table(dbms_xplan.display);\n```\n\nHere is partial listing of the output:\n\n\
    ```\nPlan hash value: 610802841\n\n| Id | Operation | Name | Rows | Bytes | Cost\
    \ (%CPU)| Time |\n| 0 | SELECT STATEMENT | | 3 | 27 | 3 (0)| 00:00:01|\n| 1 |\
    \ PARTITION RANGE ALL| | 3 | 27 | 3 (0)| 00:00:01|\n| 2 | TABLE ACCESS FULL |\
    \ EMP | 3 | 27 | 3 (0)| 00:00:01|\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nCHAPTER 19 ■ SQL MONITORING AND TUNING\n\nFor ease of use, you can create a\
    \ view that selects from the `DBMS_XPLAN.DISPLAY` function:\n\n```sql\ncreate\
    \ view pt as select * from table(dbms_xplan.display);\n```\n\nYou can now select\
    \ from the `PT` view:\n\n```sql\nselect * from pt;\n```\n\n### How It Works\n\
    `DBMS_XPLAN` is a useful tool for displaying the explain plan in several different\
    \ formats. There are a number of helpful functions included with `DBMS_XPLAN`\
    \ package (see Table 19-2 for details). For example, if a particular query shows\
    \ up in the top CPU-consuming SQL statements section of your AWR report, you can\
    \ run an explain plan for that query via the `DISPLAY_AWR` function:\n\n```sql\n\
    select * from table(dbms_xplan.display_awr('413xuwws268a3'));\n```\n\n# Table\
    \ 19-2. Functions Available in DBMS_XPLAN\n\n## Procedure Purpose\n\n`DISPLAY`\n\
    Displays execution plan for `PLAN_TABLE` contents.\n\n`DISPLAY_AWR`\nDisplays\
    \ execution plan for a SQL statement stored in AWR repository.\n\n`DISPLAY_CURSOR`\n\
    Displays execution for a cursor.\n\n`DISPLAY_SQL_PLAN_BASELINE`\nDisplays execution\
    \ plan for SQL identified by SQL handle.\n\n`DISPLAY_SQLSET`\nDisplays execution\
    \ plan for SQL contained in SQL tuning set.\n\n`DBMS_XPLAN` is also handy for\
    \ displaying the contents of `V$SQL_PLAN` for a query using `DISPLAY_CURSOR`.\n\
    \nFor example, to display the explain plan for the current query, first run the\
    \ query:\n\n```sql\nselect * from parties where party_id = 1;\n```\n\nNow generate\
    \ the explain plan for the most recently executed query in the session:\n\n```sql\n\
    select * from table(dbms_xplan.display_cursor(null, null));\n```\n\nHere is a\
    \ partial listing of the output (truncated in order to fit on the page):\n\n```\n\
    | Id | Operation | Name | Rows | Bytes | Cost (%CPU)| Time |\n| 0 | SELECT STATEMENT\
    \ | | | | 1 (100)| |\n| 1 | TABLE ACCESS BY | PARTIES | 1 | 47 | 1 (0)| 00:00:01\
    \ |\n|* 2 | INDEX UNIQUE SC| SYS_C0047742 | 1 | | 1 (0)| 00:00:01 |\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nCHAPTER 19 ■ SQL MONITORING AND TUNING\n\n## 19-9. Tracing All SQL Statements\
    \ for a Session\n\n### Problem\nA user running an application that calls hundreds\
    \ of SQL statements is having performance issues. You want to determine specifically\
    \ which statements are consuming the most resources.\n\n### Solution\nYou can\
    \ instruct Oracle to capture resources consumed and execution plans for all SQL\
    \ statements run by a session. One technique for enabling SQL tracing is to use\
    \ the `DBMS_SESSION` package. You’ll need the `ALTER SESSION` privilege granted\
    \ to your schema before you can execute this:\n\n```sql\nSQL> exec dbms_session.set_sql_trace(sql_trace=>true);\n\
    ```\n\n**Note:** The `TIMED_STATISTICS` initialization parameter must be set to\
    \ `TRUE` (the default setting) before you can generate SQL trace statistics.\n\
    \nNow any SQL you run will be traced. For demonstration purposes, we’ll trace\
    \ the following SQL statement:\n\n```sql\nselect 'my_trace' from dual;\n```\n\n\
    To turn off SQL tracing for a session, you can either log out of SQL*Plus or use\
    \ `DBMS_SESSION` to disable tracing:\n\n```sql\nSQL> exec dbms_session.set_sql_trace(sql_trace=>false);\n\
    ```\n\nNow inspect the value of your `USER_DUMP_DEST` initialization parameter:\n\
    \n```sql\nSQL> show parameter user_dump_dest\n\nNAME TYPE VALUE\n--------------------------\
    \ ----------- --------------------------------------\nuser_dump_dest string /oracle/diag/rdbms/rmdb11/RMDB11/trace\n\
    ```\n\nFrom the operating system, navigate to the user dump destination directory:\n\
    \n```bash\n$ cd /oracle/diag/rdbms/rmdb11/RMDB11/trace\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nCHAPTER 19 ■ SQL MONITORING AND TUNING\n\n**Tip:** You can assign your trace\
    \ file an easily identifiable name by setting the `TRACEFILE_IDENTIFIER` initialization\
    \ parameter before you enable tracing. For example, `ALTER SESSION SET TRACEFILE_IDENTIFIER=FOO`\
    \ will produce a trace file with the name of `<SID>_ora_<PID>_FOO.trc`.\n\nThere\
    \ may be hundreds of trace files in your user dump destination directory. Look\
    \ for the most recent files. In this example, we know that our trace file will\
    \ contain the string of `my_trace` within it (from running the SQL above). In\
    \ a Unix environment, you can search for that string with the `grep` command:\n\
    \n```bash\n$ grep -i my_trace *.trc\n\nRMDB11_ora_21846.trc: select 'my_trace'\
    \ from dual\n```\n\nOracle provides the `tkprof` command line utility to translate\
    \ the contents of a trace file into human-readable format. This utility is located\
    \ in the `ORACLE_HOME/bin` directory (along with all other standard Oracle utilities\
    \ like `sqlplus`, `expdp`, and so on). Provide `tkprof` with the username and\
    \ password of the schema you used to generate the trace file (in this example\
    \ it’s `heera/foo`):\n\n```bash\n$ tkprof RMDB11_ora_21846.trc readable.txt explain=heera/foo\
    \ sys=no\n```\n\n**Tip:** Run `tkprof` from the command line without any parameters\
    \ to view all options for this utility. By default, SQL statements are reported\
    \ in the order in which they were run. You can alter the sort order using the\
    \ `SORT` parameter to order the output by CPU, disk reads, elapsed time, and so\
    \ on.\n\nNow inspect the `readable.txt` file with a text editor. Here is some\
    \ sample output from the text file:\n\n```\ncall     count       cpu    elapsed\
    \       disk      query    current        rows\n------- ------  -------- ----------\
    \ ---------- ---------- ----------  ----------\nParse        1      0.01     \
    \  0.01          0          0          0           0\nExecute      1      0.00\
    \       0.00          0          0          0           0\nFetch        2    \
    \  0.00       0.00          2          3          0           1\n------- ------\
    \  -------- ---------- ---------- ---------- ----------  ----------\ntotal   \
    \     4      0.01       0.01          2          3          0           1\n\n\
    Misses in library cache during parse: 1\nOptimizer mode: ALL_ROWS\nParsing user\
    \ id: 28 (HEERA)\n\nRows     Row Source Operation\n-------  ---------------------------------------------------\n\
    \      1  SORT AGGREGATE (cr=3 pr=2 pw=2 time=0 us)\n    103   TABLE ACCESS FULL\
    \ EMP (cr=3 pr=2 pw=2 time=4 us cost=2 size=0 card=103)\n```\n\n```\nRows    \
    \ Execution Plan\n-------  ---------------------------------------------------\n\
    \      0  SELECT STATEMENT   MODE: ALL_ROWS\n      1   SORT (AGGREGATE)\n    103\
    \    TABLE ACCESS   MODE: ANALYZED (FULL) OF 'EMP' (TABLE)\n```\n\nThe `tkprof`\
    \ output gives detailed information on the resources consumed by each SQL statement\
    \ issued while tracing was enabled. Use this utility to identify which SQL statements\
    \ are potential bottlenecks and tune them accordingly.\n\n**Tip:** By default,\
    \ the permissions on trace files only permit the Oracle software operating system\
    \ owner to view the files. To enable public read permissions on the trace files,\
    \ set the initialization parameter `_TRACE_FILES_PUBLIC` to `TRUE`. However, you\
    \ should do this only on test or development systems where developers need access\
    \ to trace files for tuning purposes.\n\n### How It Works"
