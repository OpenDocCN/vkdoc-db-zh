    ## 7-4. 搜索模式


    ### 问题


    你想搜索的部分字符串无法使用常量进行搜索；你的搜索条件包括将搜索锚定在行首或行尾、忽略空白字符、匹配字符或字符串出现的精确次数，或在字符列表中指定字符范围。


