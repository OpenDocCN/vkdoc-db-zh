    • Determine if the query (or parts of it) can be rewritten for better performance.


    The results of an execution plan can sometimes be non-intuitive because the optimizer
    will determine that using an index is too costly. Or the optimizer might determine
    that a full table scan is more efficient than using an index.


    When developing queries, it’s sometimes useful to write in stages and analyze
    the execution plan after each stage. For example, you may have a query that joins
    five tables and has several conditions in the WHERE clause. Don’t wait until you
    have the fully developed query to generate an explain plan.


    Instead, generate an execution plan as you iteratively add tables and conditions
    to the WHERE clause.


    If you generate an explain plan with statistics turned on (via SET AUTOTRACE ON
    STATISTICS) you will also see output such as this:


    Statistics


    276 recursive calls


    0 db block gets


    51 consistent gets


    7 physical reads


    0 redo size


    583 bytes sent via SQL*Net to client


    524 bytes received via SQL*Net from client


    2 SQL*Net roundtrips to/from client


    4 sorts (memory)


    0 sorts (disk)


    3 rows processed


    These statistics are described in Table 19-5\. In general, one of the goals of
    query tuning is to try to reduce the number of consistent gets required by a query.


    ***Table 19-5.** Execution Plan Statistics*


    **Statistic Description**


    recursive calls


    Preliminary work performed by Oracle such as checking


    syntax, semantics, permissions, looking up data dictionary


    information, and so on.


    db block gets


    Number of times Oracle needs the current version of a block.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    ***Table 19-5.** Execution Plan Statistics (continued)*


    **Statistic Description**


    consistent gets


    Number of times consistent versions of blocks were read.


    The consistent versions of the blocks are the blocks as they


    were when the SQL statement started. Logical reads are db


    block gets plus consistent gets.


    physical reads


    Number of blocks read from disk because the block was not


    found in memory.


    redo size


    Amount of information Oracle writes to the redo stream for a


    SQL operation.


    bytes sent via SQL*Net to client


    Number of bytes sent to the client tool.


    bytes received via SQL*Net from client


    Number of bytes received from the client tool.


    SQL*Net roundtrips to/from client


    Number of times data was sent to and from client.


    sorts (memory)


    Number of sorting operations performed in memory.


    sorts (disk)


    Number of sorting operations performed on disk.


    rows processed


    Total number of rows returned by query.


    19-11\. Obtaining SQL Tuning Advice


    Problem


    You want advice on how to improve performance of a problem query.


    Solution


    Use the SQL Tuning Advisor to display suggestions on how to improve the performance
    of a query.'
  trans: "# 第 19 章 SQL 监控与调优\n\n## 排序合并连接\n将来自两个独立表或结果集的行进行连接。当行已排序时，排序合并连接效率较高。哈希连接通常比排序合并连接更高效。\n\
    \n## 笛卡尔连接\n在没有连接条件时使用。\n\n## 外连接\n返回其中一个表中不满足连接条件的行。\n\n执行计划（有时也称为解释计划）是 DBA\
    \ 和开发人员用于改进 SQL 查询性能的便捷工具。如果你刚开始使用执行计划，请遵循以下启发式方法入门：\n\n-   确定查询需要运行的快慢程度。\n-\
    \   确保已生成准确的统计信息（详情参见配方 19-13）。\n-   确定 `WHERE` 子句中使用的列是否存在索引（查看表上创建的索引方法参见配方\
    \ 10-5）。\n-   关注执行计划中代价最高的步骤，并确定对操作所涉及的列创建索引是否可能降低代价（创建索引的详情参见配方 18-7）。\n-   查询大表时，确定并行提示（hint）是否可能有所帮助。\n\
    -   确定查询（或其部分）是否可以重写以获得更好的性能。\n\n执行计划的结果有时可能反直觉，因为优化器会判断使用索引代价过高。或者优化器可能判定全表扫描比使用索引更高效。\n\
    \n在开发查询时，有时分阶段编写并分析每个阶段后的执行计划是有用的。例如，你可能有一个连接五个表并在 `WHERE` 子句中有多个条件的查询。不要等到开发完整个查询才生成解释计划。\n\
    \n相反，在迭代地向 `WHERE` 子句添加表和条件时生成执行计划。\n\n如果你在开启统计信息的情况下生成解释计划（通过 `SET AUTOTRACE\
    \ ON STATISTICS`），你还会看到类似这样的输出：\n\n```\nStatistics\n----------------------------------------------------------\n\
    \t276  recursive calls\n\t  0  db block gets\n\t 51  consistent gets\n\t  7  physical\
    \ reads\n\t  0  redo size\n\t583  bytes sent via SQL*Net to client\n\t524  bytes\
    \ received via SQL*Net from client\n\t  2  SQL*Net roundtrips to/from client\n\
    \t  4  sorts (memory)\n\t  0  sorts (disk)\n\t  3  rows processed\n```\n\n这些统计信息在表\
    \ 19-5 中描述。一般来说，查询调优的目标之一是尝试减少查询所需的 `一致性读取` 次数。\n\n### 表 19-5. 执行计划统计信息\n\n| 统计项\
    \ | 描述 |\n| :--- | :--- |\n| `recursive calls` | Oracle 执行的初步工作，例如检查语法、语义、权限、查找数据字典信息等。\
    \ |\n| `db block gets` | Oracle 需要数据块当前版本的次数。 |\n| `consistent gets` | 读取数据块一致性版本的次数。一致性版本是\
    \ SQL 语句启动时的数据块状态。逻辑读取等于 `db block gets` 加上 `consistent gets`。 |\n| `physical\
    \ reads` | 因内存中未找到数据块而从磁盘读取的块数。 |\n| `redo size` | Oracle 为 SQL 操作写入重做流的信息量。 |\n\
    | `bytes sent via SQL*Net to client` | 发送到客户端工具的字节数。 |\n| `bytes received via\
    \ SQL*Net from client` | 从客户端工具接收的字节数。 |\n| `SQL*Net roundtrips to/from client`\
    \ | 向客户端发送和从客户端接收数据的次数。 |\n| `sorts (memory)` | 在内存中执行的排序操作次数。 |\n| `sorts (disk)`\
    \ | 在磁盘上执行的排序操作次数。 |\n| `rows processed` | 查询返回的总行数。 |\n\n## 19-11. 获取 SQL 调优建议\n\
    \n### 问题\n你希望获得关于如何改进问题查询性能的建议。\n\n### 解决方案\n使用 `SQL 调优顾问` 来显示关于如何提高查询性能的建议。"
- fmt: "# CHAPTER 19: SQL MONITORING AND TUNING\n\n**Note** As of the writing of this\
    \ book, the SQL Tuning Advisor is part of the Oracle Database Tuning Pack and\
    \ requires an extra-cost license.\n\nFollow these steps to get tuning suggestions\
    \ from the Advisor:\n\n1. Connect as a privileged user and issue the following\
    \ grants to the schema that will be performing the tuning analysis:\n\n   ```sql\n\
    \   GRANT ADMINISTER SQL TUNING SET TO &&tune_user;\n   GRANT ADVISOR TO &&tune_user;\n\
    \   GRANT CREATE ANY SQL PROFILE TO &&tune_user;\n   GRANT ALTER ANY SQL PROFILE\
    \ TO &&tune_user;\n   GRANT DROP ANY SQL PROFILE TO &&tune_user;\n   ```\n\n \
    \  If you’re using Oracle Database 11g, the previous `GRANT ... ANY SQL PROFILE`\
    \ statements can be replaced with:\n\n   ```sql\n   GRANT ADMINISTER SQL MANAGEMENT\
    \ OBJECT TO &&tune_user;\n   ```\n\n2. Create a tuning task using the `DBMS_SQLTUNE`\
    \ package. Change the following code to match the query you’re attempting to tune\
    \ and also your user name:\n\n   ```sql\n   DECLARE\n     tune_task_name VARCHAR2(30);\n\
    \     tune_sql CLOB;\n   BEGIN\n     tune_sql := 'select a.emp_name, b.dept_name\
    \ from emp a, dept b';\n     tune_task_name := DBMS_SQLTUNE.CREATE_TUNING_TASK(\n\
    \       sql_text => tune_sql,\n       user_name => 'STAR_APR',\n       scope =>\
    \ 'COMPREHENSIVE',\n       time_limit => 1800,\n       task_name => 'tune1',\n\
    \       description => 'Basic tuning example'\n     );\n   END;\n   /\n   ```\n\
    \n3. Verify that your tuning task exists by querying the `USER_ADVISOR_LOG` view:\n\
    \n   ```sql\n   SQL> SELECT task_name FROM user_advisor_log WHERE task_name LIKE\
    \ 'tune1';\n   ```\n\n4. Run the tuning task:\n\n   ```sql\n   SQL> EXEC DBMS_SQLTUNE.EXECUTE_TUNING_TASK(task_name=>'tune1');\n\
    \   ```\n\n5. Display the SQL Tuning Advisor report. Run the following SQL statements\
    \ to display the output:\n\n   ```sql\n   SET LONG 10000\n   SET LONGCHUNKSIZE\
    \ 10000\n   SET LINESIZE 132\n   SET PAGESIZE 200\n   --\n   SELECT DBMS_SQLTUNE.REPORT_TUNING_TASK('tune1')\
    \ FROM dual;\n   ```\n\n   Here is a partial snippet of the output:\n\n   3- Restructure\
    \ SQL finding (see plan 1 in explain plans section)\n\n   An expensive cartesian\
    \ product operation was found at line ID 1 of the execution plan.\n\n   **Recommendation**\n\
    \n   - Consider removing the disconnected table or view from this statement or\
    \ add a join condition which refers to it.\n\n   **Rationale**\n\n   A cartesian\
    \ product should be avoided whenever possible because it is an expensive operation\
    \ and might produce a large amount of data.\n\n   As you can see from the previous\
    \ output, the SQL Tuning Advisor report correctly recommends rewriting the query\
    \ so that it doesn’t use a cartesian join.\n\n**How It Works**\n\nThe SQL Tuning\
    \ Advisor helps automate the task of tuning poorly performing queries. The tool\
    \ is fairly easy to use and the tuning output report provides detailed suggestions\
    \ on how to tune a query.\n\nIf you need to drop a tuning task, use the `DBMS_SQLTUNE`\
    \ package as follows:\n\n```sql\nSQL> EXEC DBMS_SQLTUNE.DROP_TUNING_TASK(task_name=>'tune1');\n\
    ```\n\n**Note** The SQL Tuning Advisor is also available in Oracle Enterprise\
    \ Manager. If you have access to Enterprise Manager, you may find it easier to\
    \ use the graphical interface.\n\n## 19-12. Forcing Your Own Execution Plan on\
    \ a Query\n\n### Problem\n\nYou suspect that the optimizer isn’t using an index\
    \ that is available. You want to force the optimizer to use the index and see\
    \ if the cost of the query is reduced.\n\n### Solution\n\nThe syntax for a hint\
    \ is to place the following comment `/*+ <hint> */` immediately after the `SELECT`\
    \ keyword. The following code uses the `INDEX` hint to instruct the optimizer\
    \ to use the `EMP_IDX1` index on the `EMP` table:\n\n```sql\nSELECT /*+ INDEX\
    \ (emp emp_idx1) */\n  ename\nFROM emp\nWHERE ename='Chaya';\n```\n\nIf you use\
    \ table aliases, ensure that the alias is referenced in the hint, not the table\
    \ name. When using aliases, the hint will be ignored if you use the table name\
    \ within the hint. The following example references the table alias within the\
    \ full table scan hint:\n\n```sql\nSELECT /*+ FULL(a) */ ename\nFROM emp a\nWHERE\
    \ ename='Heera';\n```"
