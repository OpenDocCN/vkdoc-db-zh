- fmt: '# CHAPTER 10 ■ DATA DICTIONARY


    You know that a child table has foreign key constraints defined on it. You want
    to show the child table foreign key constraints and its corresponding parent table
    primary key constraints.


    ## Solution


    The following script queries the `DBA_CONSTRAINTS` view to determine the parent
    primary key constraints that are related to child foreign key constraints. This
    script correlates foreign key columns (for the entered table) to any parent key
    column constraints:


    ```sql

    select

    a.constraint_type cons_type

    ,a.table_name child_table

    ,a.constraint_name child_cons

    ,b.table_name parent_table

    ,b.constraint_name parent_cons

    ,b.constraint_type cons_type

    from dba_constraints a

    ,dba_constraints b

    where a.owner = upper(''&owner'')

    and a.table_name = upper(''&table_name'')

    and a.constraint_type = ''R''

    and a.r_owner = b.owner

    and a.r_constraint_name = b.constraint_name;

    ```


    The preceding script will prompt you for two `SQL*Plus` ampersand variables (`OWNER`
    and `TABLE_NAME`).


    If you are not using `SQL*Plus`, you may need to modify the script with the appropriate
    values before you run the script.


    ```

    C CHILD_TABLE CHILD_CONS PARENT_TABLE PARENT_CONS C

    - --------------- ------------------- --------------- ------------------- -

    R REG_COMPANIES REG_COMPANIES_FK2 D_COMPANIES D_COMPANIES_PK P

    R REG_COMPANIES REG_COMPANIES_FK1 CLUSTER_BUCKETS CLUSTER_BUCKETS_PK P

    ```


    This output shows that there are two foreign key constraints and it also shows
    the parent table primary key constraints.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## How It Works


    Sometimes when troubleshooting data integrity issues, you’ll need to verify how
    foreign keys are related to primary keys. This usually involves interrogating
    one of the `DBA/ALL/USER_CONSTRAINTS` views.


    When the `CONSTRAINT_TYPE` column contains an `R` value, this indicates that the
    row describes a referential integrity constraint, which means that the child table
    constraint references a primary key constraint. We use the technique of joining
    to the same table twice to retrieve the primary key constraint information. The
    child constraint columns (`R_OWNER` and `R_CONSTRAINT_NAME`) will match with another
    row in the `DBA_CONSTRAINTS` view that contains the primary key information.


    You can also do the reverse of the problem for this recipe. In other words, for
    a primary key constraint, find the foreign key columns (if any) that correlate
    to it. The next script takes the primary key record and looks to see if it has
    any child records that have a constraint type of `R`. When you run this script,
    you will be prompted for the primary key table owner and name:


    ```sql

    select

    b.table_name primary_key_table

    ,a.table_name fk_child_table

    ,a.constraint_name fk_child_table_constraint

    from dba_constraints a

    ,dba_constraints b

    where a.r_constraint_name = b.constraint_name

    and a.r_owner = b.owner

    and a.constraint_type = ''R''

    and b.owner = upper(''&table_owner'')

    and b.table_name = upper(''&table_name'');

    ```


    Here is some sample output:


    ```

    PRIMARY_KEY_TABLE FK_CHILD_TABLE FK_CHILD_TABLE_CONSTRAINT

    -------------------- -------------------- ------------------------------

    CLUSTER_BUCKETS CB_AD_ASSOC CB_AD_ASSOC_FK1

    CLUSTER_BUCKETS CLUSTER_CONTACTS CLUSTER_CONTACTS_FK1

    CLUSTER_BUCKETS CLUSTER_NOTES CLUSTER_NOTES_FK1

    CLUSTER_BUCKETS DOMAIN_NAMES DOMAIN_NAMES_FK1

    CLUSTER_BUCKETS REG_COMPANIES REG_COMPANIES_FK1

    CLUSTER_BUCKETS CB_MS_ASSOC CB_MS_ASSOC_FK2

    ```


    The output indicates that the `CLUSTER_BUCKETS` table has several foreign key
    constraints that refer to it.


