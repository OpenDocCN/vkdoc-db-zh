    \n`CHAPTER 3`\n\n■ ■ ■\n\n`Querying from Multiple Tables`\n\n从Oracle表中查询数据可能是作为开发人员或数据分析师，甚至可能是作为DBA（尽管对于ETL（提取、转换和加载）工具专家来说可能不是）将执行的最常见任务。通常，您可能只查询一个表的一小部分行，但迟早您必须将多个表连接在一起。这就是关系数据库的魅力所在，因为访问数据的路径不是固定的：您可以连接具有公共列的表，甚至可以连接没有公共列的表（但您需要自担风险！）。\n\
    \n在本章中，我们将介绍连接两个或更多表并根据所需行在两个表中是否存在（等值连接）、可能仅存在于一个表或另一个表中的行（左外连接或右外连接）或连接两个表并包括两个表中的所有行并在可能时匹配（全外连接）来检索结果的解决方案。\n\
    \n但是等等，还有更多！Oracle（以及SQL语言标准）包含许多构造，帮助您根据另一个表中具有与查询中选定行相同列值的相同行的存在，从表中检索行。这些构造包括`INTERSECT`、`UNION`、`UNION\
    \ ALL`和`MINUS`操作符。在某些情况下，使用这些操作符的查询结果可以通过标准的表连接语法获得，但如果您处理的列不止几个，查询就会变得笨拙、难以阅读和维护。\n\
    \n您可能还需要根据另一个表中的匹配或不匹配值来更新一个表中的行，因此我们还将提供一些关于使用`IN`/`EXISTS` SQL构造进行关联查询和关联更新的方法。\n\
    \n当然，关于表操作的讨论如果不深入查询世界的“野孩子”——笛卡尔连接，就不算完整。有些情况下，您希望在没有连接条件的情况下连接两个或多个表，我们将为您提供针对该场景的解决方案。\n\
