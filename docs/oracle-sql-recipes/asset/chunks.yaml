  trans: '# 9-3. 优化行与表锁定


    ## 问题


    DML 查询完成耗时过长，数据库管理员怀疑是其他用户或应用程序事务持有锁的时间超过了必要限度。


    ## 解决方案


    遵循 Oracle 应用程序开发的最佳实践，请使用 `NOWAIT` 子句，并尽量减少 `LOCK` 语句的使用，除非应用程序有特定需求。当一条 `DML`
    语句运行时，如果所需的资源已被锁定，`NOWAIT` 子句会立即返回。例如，你想更新 `EMPLOYEES` 表中的一行，但不希望在该行（或你试图更新的那些行）已有其他活动时执行更新。示例如下：


    ```

    update employees

    set salary = salary * 1.2

    where employee_id = 101

    ;

    ```


    如果该行当前没有锁，`UPDATE` 语句会立即返回。如果第二个用户运行相同的 `UPDATE` 语句，该命令将等待，直到第一个用户的 `UPDATE` 被提交或回滚。为避免在第二次
    `UPDATE` 尝试时发生等待，可以在所有会话中，在 `UPDATE` 语句之前的 `SELECT` 语句里使用 `NOWAIT` 子句，如下所示：


    ```

    select * from employees e

    where employee_id = 101

    for update of salary nowait

    ;

    ```


    如果另一个会话已经锁定了该行，你将收到以下错误消息：

    ```

    Error starting at line 1 in command:

    select * from employees e

    where employee_id = 101

    for update of salary nowait

    Error report:

    SQL Error: ORA-00054: resource busy and acquire with NOWAIT specified or timeout
    expired

    00054. 00000 - "resource busy and acquire with NOWAIT specified"

    *Cause: Resource interested is busy.

    *Action: Retry if necessary.

    ```


    ## 工作原理


    Oracle 表的并发访问通常无需担心，因为 Oracle 会自动获取适当级别的锁，以最小化争用并最大化吞吐量。此外，即使应用程序同时支持多个用户，这些用户通常也不会在同一时间编辑相同的行或行集。但对于那些你希望在表中的相同行发生争用时立即提醒用户的情形，可以在
    `SELECT` 语句中使用 `NOWAIT` 关键字。


    **注意：** 有多种方式可以指定显式锁定，例如使用 `SELECT ... FOR UPDATE`。然而，Oracle 的默认锁定机制几乎总是最高效的，它能最小化特定事务锁定的行数。但也存在例外情况，例如当你需要确保在对具有父子关系的多个表进行更改时数据一致性时。


    对表的查询（`SELECT` 语句）总是会成功，即使一个或多个进程锁定了表中的部分或所有行。来自另一个会话的 `SELECT` 语句将使用撤销表空间中行的未更改版本，直到持有锁的会话执行
    `COMMIT`。


    你可以在应用程序循环中指定等待获取锁的秒数，而不是多次重试，即使用 `WAIT n` 子句替代 `NOWAIT`，如下例所示：


    ```

    select * from employees e

    where employee_id = 101

    for update of salary wait 15

    ;

    ```


    如果这些行在 15 秒内无法用于 `DML` 语句，则该语句将终止并报错，如同指定了 `NOWAIT` 一样，只是错误消息略有不同：

    ```

    Error starting at line 1 in command:

    select * from employees e

    where employee_id = 101

    for update of salary wait 15

    Error report:

    SQL Error: ORA-30006: resource busy; acquire with WAIT timeout expired

    30006. 00000 - "resource busy; acquire with WAIT timeout expired"

    *Cause: The requested resource is busy.

    *Action: Retry the operation later.

    ```


    如果你想为实例设置全局超时，可以设置初始化参数 `DDL_LOCK_TIMEOUT`，如下所示：

    ```

    SQL> connect / as sysdba

    Connected.

    SQL> alter system set ddl_lock_timeout = 15 scope=both;

    System altered.

    SQL>

    ```


    默认值为 0。即使在实例或会话级别设置了此参数，仍然可以在 `SELECT` 语句的 `WAIT` 子句中通过显式指定值来覆盖它。


    两条准则有助于缓解你可能遇到的锁定问题：首先，尽可能缩短持锁时间，尤其是在事务性环境中。其次，尽可能让 Oracle 自动管理锁定。在绝大多数情况下，Oracle
    会为具体情况选择最高效的锁定方法。


    # 9-4. 避免死锁场景


    ## 问题'
- fmt: '# CHAPTER 9 ■ MANAGING TRANSACTIONS


    In your transaction environment, you frequently encounter deadlocks. Although
    Oracle resolves these deadlocks automatically, the deadlocks cause delays and
    unnecessarily use extra resources— and must still be handled within your application.


    ## Solution


    Deadlocks are a more serious type of locking conflict in that this type of lock
    cannot be resolved by waiting for one user to `COMMIT` or `ROLLBACK` since each
    session is waiting on a resource held by the other.


    For example, consider the scenario described in **`Table 9-1.`**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 22](index-245_1.png)


    ### **`Table 9-1.`** Typical Deadlock Scenario


    **Time**


    **Session A DML**


    **Session B DML**


    9:55 A.M.


    `update employees set salary = salary * 1.25 where employee_id = 105;`


    `update employees set job_id = ''IT_WEB'' where employee_id = 110;`


    9:58 A.M.


    `update employees set salary = salary * 1.35 where employee_id = 110;`


    9:59 A.M.


    `update employees set job_id = ''IT_WEB'' where employee_id = 105;`


    At around 9:55 a.m., two separate sessions run `UPDATE` statements on employee
    numbers 105 and 110 in the `EMPLOYEES` table; they complete successfully but are
    not yet committed. So far, so good. At 9:58 a.m., session A runs an `UPDATE` statement
    on employee 110 and the statement pauses, because session B has that row locked.
    Still not a major concern. At 9:59 a.m., however, session B tries to update a
    row (for employee number 105) that is locked by session A. Both sessions are now
    waiting on the other for the desired resource to become available.


    The immediate solution to the problem requires no user intervention: Oracle detects
    the deadlock and automatically rolls back one of the transactions, releasing one
    of the sets of row locks so that the other session’s DML will complete. The session,
    however, still waits on the lock already in place. Thus, this is a good scenario
    for using `NOWAIT` at the command line or similar logic in the application. The
    session whose statement was rolled back receives the error message shown in **`Figure
    9-1.`**


    ### **`Figure 9-1.`** Oracle deadlock resolution error message


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    The user may then attempt to retry the original DML statement that caused the
    deadlock, since it is possible that the other session’s DML statement has completed
    and been committed.


    ## How It Works


    Although Oracle automatically rolls back one of the statements involved in the
    deadlock, you still cause delays for users and waste database resources when these
    deadlocks occur. There are many ways to avoid deadlocks entirely. For instance,
    for the example in **`Table 9-1.`**, it appears that the maintenance duties are
    by column instead of by row. In other words, one user is modifying all salaries,
    and the other user is modifying job roles. If instead the user maintains all columns
    for an individual employee, this deadlock situation would most likely be avoided.


    Another frequent cause of deadlocks is explicit locking at a level that is unnecessarily
    high. Oracle will most often lock at the lowest level after analyzing the DML
    statement, and no explicit locking is typically required.


    ## 9-5\. Deferring Constraint Validation


    ### Problem


    You have many dependencies in your database with foreign keys that enforce referential
    integrity (RI), commonly known as parent/child relationships, and you want to
    prevent transactions from failing due to the ordering of the `INSERT` statements
    to the parent and child tables.


    ### Solution


    Drop and recreate the constraint on the child tables referenced in the transaction
    using the `DEFERRABLE` keyword in the constraint definition. For example, the
    `EMPLOYEES` table in the `HR` schema contains a foreign key (FK) constraint on
    the `JOB_ID` column called `EMP_JOB_FK`. This constraint ensures that any job
    identifier entered into the `JOB_ID` column in the `EMPLOYEES` table must exist
    in the `JOBS` table as a primary key (PK). Here is the SQL to drop and recreate
    the constraint:


    ```sql

    alter table employees drop constraint emp_job_fk;

    ```'
