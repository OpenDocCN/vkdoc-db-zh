- fmt: '## Substitution Variables vs. Bind Variables


    `statement` get sent to Oracle for parsing and execution. This means the database
    never knows about the substitution variables, or the string manipulation that
    occurred on the statement it receives.


    Bind variables in prepared statements are treated very differently. Any high-level
    language where you use a bind variable, such as `PL/SQL`, `Java`, or `C#`, passes
    your `SQL` including its bind variable markers to Oracle for preparation and execution.
    Oracle knows the statement has bind variables present, and optimizes the query’s
    execution plan accordingly. As you provided values for the prepared statements
    with bind variables, the values are sent to Oracle, which deals with the mechanics
    of correctly substituting them in place of the bind variables, and executing the
    resulting statement. Where bind variables are concerned, Oracle is fully aware
    of their existence, and intimately involved in their use at the database level.


    ## 11-3. Returning Detail Columns in Grouped Results


    ### Problem


    While performing aggregation with various data, you need to include additional
    result columns on the same line that are not going to be grouped, without changing
    the degree of aggregation. For example, you need aggregate data on the longest
    and shortest serving employees in each department, together with more detail columns
    on those employees without having to included them in the `GROUP BY` clause.


    ### Solution


    Use Oracle’s analytic equivalents for functions like `MAX` and `MIN`, in conjunction
    with nested `SELECT` statements, to add additional detail to aggregate rows without
    affecting your degree of aggregation.


    Our recipe uses the `HIRE_DATE` for employees within each department, together
    with useful information like the employee’s first and last name and employee identifier.
    The next `SQL` block shows the recipe for our particular problem, but can be utilized
    for every similar demand to return additional detail data combined with aggregation.


    ```sql

    select department_id, employee_id, first_name, last_name,

    case

    when hire_date = first_hire and hire_date = last_hire

    then ''Shortest and Longest Serving''

    when hire_date = first_hire then ''Longest Serving''

    when hire_date = last_hire then ''Shortest Serving''

    end Department_Tenure

    from (

    select department_id, employee_id, first_name, last_name, hire_date,

    max(hire_date) over(partition by department_id) first_hire,

    min(hire_date) over(partition by department_id) last_hire

    from hr.employees

    ) Hire_Dates

    where hire_date in (first_hire, last_hire)

    order by department_id, department_tenure;

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    The results show the aggregation working as desired to return the correct determination
    of shortest and longest-serving employee, together with additional details about
    that employee.


    ```

    DEPARTMENT_ID EMPLOYEE_ID FIRST_NAME LAST_NAME DEPARTMENT_TENURE

    ------------- ----------- ----------- --------- ----------------------------

    10 200 Jennifer Whalen Shortest and Longest Serving

    20 202 Pat Fay Longest Serving

    20 201 Michael Hartstein Shortest Serving

    30 119 Karen Colmenares Longest Serving

    30 114 Den Raphaely Shortest Serving

    40 203 Susan Mavris Shortest and Longest Serving

    50 128 Steven Markle Longest Serving

    50 122 Payam Kaufling Shortest Serving

    ...

    ```


    ### How It Works


    If we attempted a normal `SELECT` that looked for `MIN` and `MAX` statement, our
    `SELECT` statement would look like the next `SQL` block.


    ```sql

    select department_id, employee_id, first_name, last_name,

    min(hire_date), max(hire_date)

    from hr.employees

    group by department_id, employee_id, first_name, last_name;

    ```


    We receive totally unhelpful results, because we were forced to group by non-aggregated
    columns like `FIRST_NAME` and `EMPLOYEE_ID`, and some of these are unique!


    ```

    DEPARTMENT_ID EMPLOYEE_ID FIRST_NAME LAST_NAME MIN(HIRE_DATE) MAX(HIRE_DATE)

    ------------- ----------- ---------- --------- -------------- --------------

    20 201 Michael Hartstein 17-FEB-96 7-FEB-96

    20 202 Pat Fay 17-AUG-97 17-AUG-97

    60 103 Alexander Hunold 03-JAN-90 03-JAN-90

    60 107 Diana Lorentz 07-FEB-99 07-FEB-99

    ```'
