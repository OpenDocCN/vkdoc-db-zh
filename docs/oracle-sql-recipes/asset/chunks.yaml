- fmt: '# CHAPTER 2: SUMMARIZING AND AGGREGATING DATA


    The results from a query need to be allocated an ordinal number representing their
    positions in the result. You do not want to have to insert and track these numbers
    in the source data.


    ## Solution


    Oracle provides the `RANK` analytic function to generate a ranking number for
    rows in a result set. `RANK` is applied as a normal OLAP-style function to a column
    or derived expression. For the purposes of this recipe, we’ll assume that the
    business would like to rank employees by salary, from highest-paid down.


    The following `SELECT` statement uses the `rank` function to assign these values.


    ```sql

    select employee_id, salary, rank() over (order by salary desc) as Salary_Rank
    from hr.employees;

    ```


    Our query produces results from the highest earner at 24000 per month, right down
    to the employee in 107th place earning 2100 per month, as these abridged results
    show.


    | EMPLOYEE_ID | SALARY | SALARY_RANK |

    |-------------|--------|-------------|

    | 100         | 24000  | 1           |

    | 101         | 17000  | 2           |

    | 102         | 17000  | 2           |

    | 145         | 14000  | 4           |

    | 146         | 13500  | 5           |

    | 201         | 13000  | 6           |

    | 205         | 12000  | 7           |

    | 108         | 12000  | 7           |

    | 147         | 12000  | 7           |

    | ...         | ...    | ...         |

    | 132         | 2100   | 107         |


    107 rows selected.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## How It Works


    `RANK` acts like any other analytic function, operating in a second pass over
    the result set once non-analytic processing is complete. In this recipe, the `EMPLOYEE_ID`
    and `SALARY` values are selected (there are no `WHERE` predicates to filter the
    table’s data, so we get everyone employed in the organization). The analytic phase
    then orders the results in descending order by salary, and computes the rank value
    on the results starting at 1.


    Note carefully how the `RANK` function has handled equal values. Two employees
    with salary of 17000 are given equal rank of 2\. The next employee, at 14000,
    has a rank of 4\. This is known as sparse ranking, where tied values “consume”
    place holders. In practical terms, this means that our equal second-place holders
    consume both second and third place, and the next available rank to provide is
    4.


    You can use an alternative to sparse ranking called dense ranking. Oracle supports
    this using the `DENSE_RANK` analytical function. Observe what happens to the recipe
    when we switch to dense ranking.


    ```sql

    select employee_id, salary, dense_rank() over (order by salary desc)

    as Salary_Rank

    from hr.employees;

    ```


    We now see the “missing” consecutive rank values.


    | EMPLOYEE_ID | SALARY | SALARY_RANK |

    |-------------|--------|-------------|

    | 100         | 24000  | 1           |

    | 101         | 17000  | 2           |

    | 102         | 17000  | 2           |

    | 145         | 14000  | 3           |

    | 146         | 13500  | 4           |

    | 201         | 13000  | 5           |

    | 205         | 12000  | 6           |

    | 108         | 12000  | 6           |

    | 147         | 12000  | 6           |

    | 168         | 11500  | 7           |

    | ...         | ...    | ...         |

    | 132         | 2100   | 58          |


    107 rows selected.


    The classic examples of when the different kinds of ranking are used are in sporting
    competitions. Football and other sports typically use sparse ranking when tracking
    team win/loss progress on a ladder or table. The Olympic Games, on the other hand,
    tend to use dense ranking when competitors tie in events like swimming and others.
    They like to ensure that there are always gold, silver, and bronze medalists,
    even if there are tied entries and they have to give out more medals.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### Note


    The authors live in hope that, one day, writing SQL statements will be an Olympic
    event. We’ll be sure to use a dense ranking approach to maximize our chance of
    getting a medal.


    Our recipe uses a simple ranking across all employees to determine salary order.
    Both `RANK` and `DENSE_RANK` support normal analytic extensions, allowing us to
    partition our source data so we can generate a rank for each subset of data. Continuing
    our recipe’s theme, this means we could allocate a rank for salary earners from
    highest to lowest within each department. Introducing that partitioning to the
    query looks like this:


    ```sql

    Select department_id, employee_id, salary, rank() over

    (partition by department_id order by salary desc) as Salary_Rank

    From hr.employees

    ;

    ```


    Our results now show per-department ranking of employees by salary.


    | DEPARTMENT_ID | EMPLOYEE_ID | SALARY | SALARY_RANK |

    |---------------|-------------|--------|-------------|'
