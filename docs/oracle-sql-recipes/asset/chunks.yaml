  trans: "# 第 2 章 ■ 数据汇总与聚合\n\n`GROUP BY`子句决定了目标表的行应归入哪些组，以供后续的聚合函数使用。出于性能考虑，Oracle\
    \ 会隐式地对数据进行排序以符合所需的分组。通常，从`SELECT`语句的第一行就能推断出`GROUP BY`子句中需要的列。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n```sql\nselect department_id, avg(salary)\n```\n\n我们告诉 Oracle 希望将个人的薪资数据聚合成平均值，但我们还没有说明如何处理每行中单独的`DEPARTMENT_ID`值。我们是否应该显示每个`DEPARTMENT_ID`条目（包括重复项），并对每个条目显示平均值？显然，这会导致输出重复且浪费——同时也会让你疑惑是否还有更复杂的东西需要理解。通过在`GROUP\
    \ BY`子句中使用“未聚合”的字段，我们指示 Oracle 如何根据其计算出的聚合值来折叠或分组单个行值。\n\n```sql\ngroup by department_id\n\
    ```\n\n这意味着我们`SELECT`语句中的所有值要么是聚合值，要么被`GROUP BY`子句所覆盖。编写语法正确的`GROUP BY`语句的关键在于始终记住：值要么被分组，要么被聚合——不允许有“漏网之鱼”。在一个按多个值分组的查询中，你可以清楚地看到这一点。\n\
    \n## 2-3. 按多个字段分组数据\n\n### 问题\n\n你需要同时按多个值分组报告数据。例如，人力资源部门可能需要按`DEPARTMENT_ID`和`JOB_ID`报告最低、平均和最高`SALARY`。\n\
    \n### 解决方案\n\nOracle 的`GROUP BY`功能可以扩展到任意数量的列和表达式，因此我们可以扩展之前的方案以满足新的分组需求。我们知道需要聚合什么：`SALARY`值以三种不同的方式聚合。剩下的`DEPARTMENT_ID`和`JOB_ID`则用于分组。我们还希望结果排序，以便能在同一部门内查看不同的`JOB_ID`值及其上下文，并按薪资从高到低排列。接下来的\
    \ SQL 语句通过向`GROUP BY`和`ORDER BY`子句添加必要的条件实现了这一点。\n\n```sql\nSelect department_id,\
    \ job_id, min(salary), avg(salary), max(salary)\nFrom hr.employees\nGroup by department_id,\
    \ job_id\nOrder by department_id, max(salary) desc;\n```\n\n```text\nDEPARTMENT_ID\
    \ JOB_ID MIN(SALARY) AVG(SALARY) MAX(SALARY)\n------------- ---------- -----------\
    \ ----------- -----------\n           10 AD_ASST        4400        4400     \
    \   4400\n           20 MK_MAN        13000       13000       13000\n        \
    \   20 MK_REP         6000        6000        6000\n           30 PU_MAN     \
    \   11000       11000       11000\n           30 PU_CLERK       2500        2780\
    \        3100\n...\n20 rows selected.\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 工作原理\n\n当按聚合函数或其他函数排序时，你可以利用 Oracle 对排序列的简写表示法。因此，你可以编写语句按数据的基于列的位置排序，而不必写出聚合表达式繁琐的完整文本。\n\
    \n```sql\nSelect department_id, job_id, min(salary), avg(salary), max(salary)\n\
    From hr.employees\nGroup by department_id, job_id\nOrder by 1, 5 desc;\n```\n\n\
    在处理分组结果时，你可以在排序中混合使用列名、聚合表达式、数字位置，甚至是`SELECT`子句中的列别名，如下一个 SQL 语句所示。\n\n```sql\n\
    Select department_id, job_id, min(salary), avg(salary), max(salary) Max_Sal\n\
    From hr.employees\nGroup by department_id, job_id\nOrder by 1, job_id, Max_Sal\
    \ desc;\n```\n\n灵活性是这里的关键，随着你创建和使用更复杂的排序与分组表达式，你会发现别名和序数表示法很有帮助。然而，为了可读性，你应该尽量保持一致。\n\
    \n## 2-4. 在聚合数据集中忽略分组\n\n### 问题\n\n你希望根据聚合函数或分组操作的结果忽略某些数据组。实际上，你真正需要的是在`GROUP\
    \ BY`子句之后再运行一个`WHERE`子句，用于在组级别或聚合级别提供筛选条件。\n\n### 解决方案\n\nSQL 提供了`HAVING`子句来对分组数据应用条件。对于我们的方案，我们解决了在`HR.EMPLOYEES`表中，找出每个部门中从事相同工作的人员的最低、平均和最高薪资的问题。重要的是，我们只想看到那些在给定部门中有超过一人从事相同工作的聚合值。接下来的\
    \ SQL 语句在`HAVING`子句中使用一个表达式来解决我们的问题。\n\n```sql\nselect department_id, job_id,\
    \ min(salary), avg(salary), max(salary), count(*)\nfrom hr.employees\ngroup by\
    \ department_id, job_id\nhaving count(*) > 1;\n```\n\n我们的方案产生如下汇总结果。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n```text\nDEPARTMENT_ID JOB_ID MIN(SALARY) AVG(SALARY) MAX(SALARY) COUNT(*)\n\
    ------------- ---------- ----------- ----------- ----------- ----------\n    \
    \       90 AD_VP        17000       17000       17000          2\n           50\
    \ ST_CLERK      2100        2800        3600         19\n           80 SA_REP\
    \        6100  8396.55172       11500         29\n           50 ST_MAN       \
    \ 3750  6691.66667        8200          6\n           80 SA_MAN       10500  \
    \     12200       14000          5\n           50 SH_CLERK      2500        3215\
    \        4200         20\n           60 IT_PROG       4200        5760       \
    \ 9000          5\n           30 PU_CLERK      2500        2780        3100  \
    \        5\n          100 FI_ACCOUNT    6900        7920        9000         \
    \ 5\n9 rows selected.\n```\n\n### 工作原理\n\n你可以立即看到，我们只有九组员工的结果。与之前方案返回的 20 组相比，显然`HAVING`子句起了作用——但它做了什么呢？\n\
    \n`HAVING`子句是在所有分组和聚合操作完成后进行评估的。Oracle 内部会先生成如下结果：\n\n```text\nDEPARTMENT_ID JOB_ID\
    \ MIN(SALARY) AVG(SALARY) MAX(SALARY) COUNT(*)\n------------- ---------- -----------\
    \ ----------- ----------- ----------\n          110 AC_ACCOUNT    8300       \
    \ 8300        8300          1\n           90 AD_VP        17000       17000  \
    \     17000          2\n           50 ST_CLERK      2100        2800        3600\
    \         19\n           80 SA_REP        6100  8396.55172       11500       \
    \  29\n          110 AC_MGR       12000       12000       12000          1\n...\n\
    ```\n\n这实际上就是我们没有`HAVING`子句的方案结果。然后，Oracle 应用`HAVING`条件 `having count(*) > 1`\n\
    \n之前结果中加粗的行的计数为 1（在相应的`DEPARTMENT_ID`中只有一名该`JOB_ID`的员工），这意味着它们未能满足`HAVING`子句的标准，因此被排除在最终结果之外，从而得到了我们上面看到的解决方案。\n\
    \n`HAVING`子句的条件可以任意复杂，因此你可以使用多种不同类型的条件。\n\n```sql\nselect department_id, job_id,\
    \ min(salary), avg(salary), max(salary), count(*)\nfrom hr.employees\ngroup by\
    \ department_id, job_id\nhaving count(*) > 1\n   and min(salary) between 2500\
    \ and 17000\n   and avg(salary) != 5000\n   and max(salary)/min(salary) < 2\n\
    ;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n```text\nDEPARTMENT_ID\
    \ JOB_ID MIN(SALARY) AVG(SALARY) MAX(SALARY) COUNT(*)\n------------- ----------\
    \ ----------- ----------- ----------- ----------\n           90 AD_VP        17000\
    \       17000       17000          2\n           80 SA_REP        6100  8396.55172\
    \       11500         29\n           80 SA_MAN       10500       12200       14000\
    \          5\n           50 SH_CLERK      2500        3215        4200       \
    \  20\n           30 PU_CLERK      2500        2780        3100          5\n \
    \         100 FI_ACCOUNT    6900        7920        9000          5\n6 rows selected.\n\
    ```\n\n## 2-5. 在多个层级聚合数据\n\n### 问题\n\n你想要为报表计算总计、平均值和其他聚合数据，以及各种维度的子汇总。你希望用尽可能少的语句实现这一点，最好只用一条，而不是必须执行单独的语句来获取沿途每个中间子汇总。\n\
    \n### 解决方案\n"
- fmt: 'You can calculate subtotals or other intermediate aggregates in Oracle using
    the `CUBE`, `ROLLUP` and grouping sets features. For this recipe, we’ll assume
    some real-world requirements. We want to find average and total (summed) salary
    figures by `department_id` and `job_id`, and show meaningful higher-level averages
    and subtotals at the department level (regardless of job category), as well as
    a grand total and company-wide average for the whole organization.


    ```sql

    select department_id, job_id, avg(salary), sum(salary)

    from hr.employees

    group by rollup (department_id, job_id);

    ```


    Our results (partial output shown) include sum and average by `DEPARTMENT_ID`
    and `JOB_ID`, rolled-up aggregates by `DEPARTMENT_ID`, and grand totals across
    all data.


    ```

    DEPARTMENT_ID JOB_ID AVG(SALARY) SUM(SALARY)

    ------------- ---------- ----------- -----------

    ...

    80 SA_MAN 12200 61000

    80 SA_REP 8396.55172 243500

    80 8955.88235 304500

    90 AD_VP 17000 34000

    90 AD_PRES 24000 24000

    90 19333.3333 58000

    100 FI_MGR 12000 12000

    100 FI_ACCOUNT 7920 39600

    100 8600 51600

    [www.it-ebooks.info](http://www.it-ebooks.info/)

    CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA

    110 AC_MGR 12000 12000

    110 AC_ACCOUNT 8300 8300

    110 10150 20300

    6473.36449 692650

    33 rows selected.

    ```


    ### How It Works


    The `ROLLUP` function performs grouping at multiple levels, using a right-to-left
    method of rolling up through intermediate levels to any grand total or summation.
    In our recipe, this means that after performing normal grouping by `DEPARTMENT_ID`
    and `JOB_ID`, the `ROLLUP` function rolls up all `JOB_ID` values so that we see
    an average and sum for the `DEPARTMENT_ID` level across all jobs in a given department.


    `ROLLUP` then rolls up to the next (and highest) level in our recipe, rolling
    up all departments, in effect providing an organization-wide rollup. You can see
    the rolled up rows in the output.


    Performing this rollup would be the equivalent of running three separate statements,
    such as the three that follow, and using `UNION` or application-level code to
    stitch the results together.


    ```sql

    select department_id, job_id, avg(salary), sum(salary)

    from hr.employees

    group by department_id, job_id;

    ```


    ```sql

    select department_id, avg(salary), sum(salary)

    from hr.employees

    group by department_id;

    ```


    ```sql

    select avg(salary), sum(salary)

    from hr.employees;

    ```


    Of course, in doing this, you’re responsible for your own interspersing of subtotals
    at the intuitive points in the output. You could try writing a three-way `UNION`
    subselect with an outer `SELECT` to do the ordering. If this sounds more and more
    complicated, be thankful the `ROLLUP` command, and its associated command `CUBE`,
    have displaced the need to perform such awkward computations.


    Careful observers will note that because `ROLLUP` works from right to left with
    the columns given, we don’t see values where departments are rolled up by job.
    We could achieve this using this version of the recipe.


    ```sql

    select department_id, job_id, avg(salary), sum(salary)

    from hr.employees

    group by rollup (job_id, department_id);

    ```


    In doing so, we get the `DEPARTMENT_ID` intermediate rollup we want, but lose
    the `JOB_ID` intermediate rollup, seeing only `JOB_ID` rolled up at the final
    level. To roll up in all dimensions, change the recipe to use the `CUBE` function.


    ```sql

    select department_id, job_id, min(salary), avg(salary), max(salary)

    from hr.employees

    group by cube (department_id, job_id);

    ```


    The results show our rollups at each level, shown in the partial results that
    follow.


    ```

    DEPARTMENT_ID JOB_ID MIN(SALARY) AVG(SALARY) MAX(SALARY)

    ------------- ---------- ----------- ----------- -----------

    7000 7000 7000

    2100 6392.27273 24000

    AD_VP 17000 17000 17000

    AC_MGR 12000 12000 12000

    FI_MGR 12000 12000 12000

    ...

    10 4400 4400 4400

    10 AD_ASST 4400 4400 4400

    20 6000 9500 13000

    20 MK_MAN 13000 13000 13000

    20 MK_REP 6000 6000 6000

    ...

    ```'
