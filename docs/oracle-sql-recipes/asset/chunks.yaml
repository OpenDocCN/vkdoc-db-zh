- fmt: "# CHAPTER 19 ■ SQL MONITORING AND TUNING\n\n## 19-4. Identifying Resource-Intensive\
    \ SQL Statements\n\n### Problem\nYou want to identify which SQL statements are\
    \ consuming the most resources.\n\n### Solution\nUse the following query to identify\
    \ the ten most resource-intensive queries based on CPU time:\n\n```sql\nselect\
    \ * from(\n    select\n        sql_text\n        ,buffer_gets\n        ,disk_reads\n\
    \        ,sorts\n        ,cpu_time/1000000 cpu_sec\n        ,executions\n    \
    \    ,rows_processed\n    from v$sqlstats\n    order by cpu_time DESC)\nwhere\
    \ rownum < 11;\n```\n\nAn inline view is utilized to first retrieve all records\
    \ and sorts the output by `CPU_TIME` in descending order. The outer query then\
    \ limits the result set to the top ten rows using the `ROWNUM` pseudocolumn.\n\
    \nThe query can be easily modified to sort by a column other than `CPU_TIME`.\
    \ For example, if you want to report resource usage by `BUFFER_GETS`, simply change\
    \ the `ORDER BY` clause to use `BUFFER_GETS` instead of `CPU_TIME`. The `CPU_TIME`\
    \ column is calculated in microseconds; to convert it to seconds it is divided\
    \ by 1000000.\n\n### How It Works\nThe `V$SQLSTATS` view displays performance\
    \ statistics for SQL statements that have recently executed. You can also use\
    \ `V$SQL` and `V$SQLAREA` to report on SQL resource usage. `V$SQLSTATS` is faster\
    \ and retains information for a longer period of time, but contains only a subset\
    \ of the columns in `V$SQL` and `V$SQLAREA`. Thus there are scenarios where you\
    \ may want to query from `V$SQL` or `V$SQLAREA`. For example, if you want to display\
    \ information like the user who first parsed the query, you use the `PARSING_USER_ID`\
    \ column of `V$SQLAREA`:\n\n```sql\nselect * from(\n    select\n        b.sql_text\n\
    \        ,a.username\n        ,b.buffer_gets\n        ,b.disk_reads\n        ,b.sorts\n\
    \        ,b.cpu_time/1000000 cpu_sec\n    from v$sqlarea b\n        ,dba_users\
    \ a\n    where b.parsing_user_id = a.user_id\n    order by b.cpu_time DESC)\n\
    where rownum < 11;\n```\n\n## 19-5. Using Oracle Performance Reports to Identify\
    \ Resource-Intensive SQL\n\n### Problem\nYou want to use one of Oracle’s performance-tuning\
    \ reports to identify resource-intensive queries.\n\n### Solution\nIf you notice\
    \ that your database performance slowed down for a day or was sluggish for a few\
    \ hours, you should run one of the following reports for the timeframe in which\
    \ performance issues were noticed:\n\n*   Automatic Workload Repository (`AWR`)\n\
    *   Automatic Database Diagnostic Monitor (`ADDM`)\n*   Active Session History\
    \ (`ASH`)\n*   Statspack\n\nEach of these reports is described in the next several\
    \ subsections.\n\n**Note** As of the writing of this book, you need to purchase\
    \ an additional license from Oracle Corporation to use the `AWR`, `ADDM`, and\
    \ `ASH` utilities. If you don’t have a license, you can use the free Statspack\
    \ utility.\n\n### Using AWR\nTo monitor long-running operations, you can query\
    \ the `V$SESSION_LONGOPS` view. The following example shows a query against this\
    \ view, with `SQL*Plus` formatting commands to produce a readable report.\n\n\
    ```sql\nCOL opname FORMAT A16 HEAD \"Operation|Type\"\nCOL sql_text FORMAT A33\
    \ HEAD \"SQL|Text\" TRUNC\nCOL start_time FORMAT A15 HEAD \"Start|Time\"\nCOL\
    \ how_long FORMAT 99,990 HEAD \"Time|Run\"\nCOL secs_left FORMAT 99,990 HEAD \"\
    Appr.|Secs Left\"\nCOL sofar FORMAT 9,999,990 HEAD \"Work|Done\"\nCOL totalwork\
    \ FORMAT 9,999,990 HEAD \"Total|Work\"\nCOL percent FORMAT 999.90 HEAD \"%|Done\"\
    \n\nselect\n    a.username\n    ,a.opname\n    ,b.sql_text\n    ,to_char(a.start_time,'DD-MON-YY\
    \ HH24:MI') start_time\n    ,a.elapsed_seconds how_long\n    ,a.time_remaining\
    \ secs_left\n    ,a.sofar\n    ,a.totalwork\n    ,round(a.sofar/a.totalwork*100,2)\
    \ percent\nfrom v$session_longops a\n    ,v$sql b\nwhere a.sql_address = b.address\n\
    and a.sql_hash_value = b.hash_value\nand a.sofar <> a.totalwork\nand a.totalwork\
    \ != 0;\n```\n\n#### How It Works\nThe `V$SESSION_LONGOPS` view displays the status\
    \ of various database operations that have been running for longer than six seconds.\
    \ To use `V$SESSION_LONGOPS`, you must use the cost-based optimizer and have the\
    \ following in place:\n\n*   `TIMED_STATISTICS` initialization parameter set to\
    \ `TRUE`\n*   Statistics generated for the objects in the query\n\nThe `V$SESSION_LONGOPS`\
    \ view gives you a rough idea of how long a currently running query has left to\
    \ finish. In our experience, the results are not 100% accurate, so allow some\
    \ fudge-factor time into what it reports."
