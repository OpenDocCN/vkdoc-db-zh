    ## 7-3. 单字符字符串替换


    ### 问题


    你希望在字符串列中执行单字符替换。要替换的字符可以出现在字符串中的任何位置，所有不在替换列表中的其他字符保持不变。


    ### 解决方案


    你可以使用内置的 `TRANSLATE` 函数在字符串内执行一对一的字符替换。在 `HR` 示例模式中，数据录入人员不小心在一些街道地址中错误地输入了方括号
    "[]" 而不是圆括号 "()"，以及下划线 "_" 而不是连字符 "-"。以下是一些包含错误值的行：


    ```sql

    select location_id, street_address


    from locations


    where location_id in (2100,2900)


    ;

    ```


    ```

    LOCATION_ID STREET_ADDRESS

    ---------------------- ----------------------------------------

    2100 1298 Vileparle [E]

    2900 20 Rue des Corps_Saints

    2 rows selected

    ```


    为了在一次操作中完成所有替换，你可以使用 `TRANSLATE` 函数，指定要转换的源字符串、需要被替换的字符列表以及对应的替换字符列表。以下是可用于修复
    `LOCATIONS` 表中 `STREET_ADDRESS` 列的 `UPDATE` 语句：


    ```sql

    update locations


    set street_address = translate(street_address,''[]_'',''()-'')


    where location_id in (2100,2900)


    ;

    ```


    ```

    2 rows updated

    ```


    ### 工作原理


    `TRANSLATE` 函数检查源字符串（此处为 `STREET_ADDRESS`）中的每个字符。对于源字符串中的每个单独字符，`TRANSLATE` 检查其是否在第二个参数中；如果匹配，则该字符将被第三个参数中的对应字符替换。因此，"["
    被替换为 "("，"]" 被替换为 ")"，"_" 被替换为 "-"。源字符串中未在第二个参数中找到的任何字符都不会被替换。


    你也可以使用 `TRANSLATE` 来完全移除源字符串中的字符。为此，你可以在第二个参数中指定一个不会被翻译的单字符加上要移除的字符，并在第三个参数中仅指定那个不会被翻译的单字符。通过一个例子可以最好地说明这一点。在这个
    `UPDATE` 语句中，你希望移除源字符串中的所有方括号字符：


    ```sql

    update locations


    set street_address = translate(street_address,''X[]'',''X'')


    where location_id in (2100,2900)


    ;

    ```


    ```

    2 rows updated

    ```


    所有出现的字母 "X" 都被替换为 "X"，而方括号字符被移除且未被替换。你必须至少指定一个要被替换的字符，因为如果 `TRANSLATE` 的任何参数为
    `NULL`，则结果将是 `NULL`，这显然不是期望的结果！


    当然，如果你想同时替换和移除源字符串中的字符，则不需要指定任何额外字符。因此，如果你想将下划线字符替换为连字符并完全移除方括号，`UPDATE` 语句将如下所示：


    ```sql

    update locations


    set street_address = translate(street_address,''[]_'',''-'')


    where location_id in (2100,2900)


    ;

    ```


    ```

    2 rows updated

    ```


    在执行对包含字符串的列的条件更新时，通常必须使用 `WHERE` 子句，除非表非常小。没有 `WHERE` 子句，你将产生大量不必要的 undo，因为表中的所有行都将被更新。此外，你可能会造成性能问题，并为其他想要更新那些你的
    `UPDATE` 语句实际上并不需要更新的行的会话带来不必要的延迟。


    最后，你可能会遇到一种情况，即你不知道哪些行需要更新。在前面的例子中，我们知道 `LOCATION_ID` 为 2100 和 2900 的行需要更新。但如果你知道有不止几个
    `STREET_ADDRESS` 的值是错误的，却不知道 `LOCATION_ID` 的值是什么？在这种情况下，你可以更改 `WHERE` 子句，以检查与
    `TRANSLATE` 语句中用于替换的字符相同的字符，如下面的示例：


    ```sql

    update locations


    set street_address = translate(street_address,''[]_'',''()-'')


    where instr(street_address,''['') > 0


    or instr(street_address,'']'') > 0


    or instr(street_address,''_'') > 0


    ;

    ```


    正如你将在本章后面的一个解决方案中发现的，你可以在 `WHERE` 子句中使用 `REGEXP_INSTR`（`INSTR` 的正则表达式等效形式）来进一步简化此代码，如下面的示例：


    ```sql

    update locations


    set street_address = translate(street_address,''[]_'',''()-'')


    where regexp_instr(street_address,''\[|\]|_'') > 0


    ;

    ```


