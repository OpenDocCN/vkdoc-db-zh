    \    Munich                     80925\n        2800 Rua Frei Caneca 1360     \
    \                     Sao Paulo                  01307-002\n        2900 20 Rue\
    \ des Corps-Saints                       Geneva                     1730\n   \
    \     3000 Murtenstrasse 921                             Bern                \
    \       3095\n        3100 Pieter Breughelstraat 837                     Utrecht\
    \                    3029SK\n        3200 Mariano Escobedo 9991              \
    \           Mexico City                11932\n23 rows selected\n```\n\n要找出哪些街道地址超过三个单词，请使用以下语句：\n\
    \n```sql\nselect location_id, street_address,\n       city, postal_code\nfrom\
    \   locations\nwhere  regexp_count(street_address,'\\s') >= 3\n;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n```\nLOCATION_ID STREET_ADDRESS                                CITY        \
    \               POSTAL_CODE\n------------ --------------------------------- -----------------------\
