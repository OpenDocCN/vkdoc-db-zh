- fmt: '## CHAPTER 4 ■ CREATING AND DERIVING DATA


    Use Oracle string concatenation functions or operators to save space in your report
    and make the output more readable. For example, in the `EMPLOYEES` table, you
    can use the `||` (two vertical bars) operator or the `CONCAT` function to combine
    the employee’s first and last name:


    ```sql

    select employee_id, last_name || '', '' || first_name full_name, email

    from employees

    ;

    ```


    ```

    EMPLOYEE_ID FULL_NAME EMAIL

    ---------------- -------------------------------- ------------------

    100 King, Steven SKING

    101 Kochhar, Neena NKOCHHAR

    102 De Haan, Lex LDEHAAN

    103 Hunold, Alexander AHUNOLD

    104 Ernst, Bruce BERNST

    105 Austin, David DAUSTIN

    . . .

    204 Baer, Hermann HBAER

    205 Higgins, Shelley SHIGGINS

    206 Gietz, William WGIETZ

    107 rows selected

    ```


    The query concatenates the last name, a comma, and the first name into a single
    string, aliased as `FULL_NAME` in the results. If your platform’s character set
    does not support using `||` as a concatenation operator (as some IBM mainframe
    character sets do), or you might soon migrate your SQL to such a platform, you
    can make your code more platform-independent by using the `CONCAT` functions instead:


    ```sql

    select employee_id, concat(concat(last_name,'', ''),first_name) full_name, email

    from employees

    ;

    ```


    Because the `CONCAT` function only supports two operands as of Oracle Database
    `11g`, concatenating more than two strings can make the code unreadable very fast!


    ### How It Works


    You can apply a number of different Oracle built-in functions to make your output
    more readable; some Oracle shops I’ve worked in relied solely on `SQL*Plus` for
    their reporting. Applying the appropriate functions and using the right `SQL*Plus`
    commands makes the output extremely readable, even with queries returning Oracle
    objects, currency columns, and long character strings.


    If your text-based columns have leading or trailing blanks (which of course should
    have been cleaned up on import or by the GUI form), or the column is a fixed-length
    `CHAR` column, you can get rid of leading and trailing blanks using the `TRIM`
    function, as in this example:


    ```sql

    select employee_id, trim(last_name) || '', '' || trim(first_name) full_name, email

    from employees

    ;

    ```


    If you only want to trim leading or trailing blanks, you can use `LTRIM` or `RTRIM`
    respectively. If some of your employees don’t have first names (or last names),
    your output using any of the previous solutions would look a little odd:


    ```sql

    select employee_id, last_name || '', '' || first_name full_name, email

    from celebrity_employees

    ;

    ```


    ```

    EMPLOYEE_ID FULL_NAME EMAIL

    ---------------- -------------------------------- ------------------

    1001 Cher, CHER

    1021 Kajol, KAJOL

    1032 Madonna, MADONNA

    2033 Bono, BONO

    1990 Yanni, YANNI

    5 rows selected

    ```


    To remedy this situation, you can add the `NVL2` function to your `SELECT` statement:


    ```sql

    select employee_id,

    trim(last_name) ||

    nvl2(trim(first_name),'', '','''') ||

    trim(first_name) full_name,

    email

    from employees

    ;

    ```


    The `NVL2` function evaluates the first argument `TRIM(FIRST_NAME)`. If it is
    not `NULL`, it returns `'', ''`, otherwise it returns a `NULL` (empty string),
    so that our celebrity employees won’t have a phantom comma at the end of their
    name:


    ```

    EMPLOYEE_ID FULL_NAME EMAIL

    ---------------- -------------------------------- ------------------

    1001 Cher CHER

    1021 Kajol KAJOL

    1032 Madonna MADONNA

    2033 Bono BONO

    1990 Yanni YANNI

    5 rows selected

    ```


    Finally, you can also take advantage of the `INITCAP` function to fix up character
    strings that might have been entered in all caps or have mixed case. If your `EMPLOYEES`
    table had some rows with last name and first name missing, you could derive most
    of the employee names from the e-mail address by using a combination of `SUBSTR`,
    `UPPER`, and `INITCAP` as in this example:


    ```sql

    select employee_id, email,

    upper(substr(email,1,1)) || '' '' || initcap(substr(email,2)) name

    from employees

    ;

    ```


    ```

    EMPLOYEE_ID EMAIL NAME

    ---------------------- ------------------------- --------------------------

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)'
