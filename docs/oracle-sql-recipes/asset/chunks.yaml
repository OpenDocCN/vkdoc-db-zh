    2-13\. Finding First and Last Values within a Group


    Problem


    You want to calculate and display aggregate information like minimum and maximum
    for a group, along with detail information for each member. You want don’t want
    to repeat effort to display the aggregate and detail values.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA


    Solution


    Oracle provides the analytic functions FIRST and LAST to calculate the leading
    and ending values in any ordered sequence. Importantly, these do not require grouping
    to be used, unlike explicit aggregate functions such as MIN and MAX that work
    without OLAP features.


    For our recipe, we’ll assume the problem is a concrete one of displaying an employee’s
    salary, alongside the minimum and maximum salaries paid to the employee’s peers
    in their department. This SELECT statement does the work.


    select department_id, first_name, last_name,


    min(salary)


    over (partition by department_id) "MinSal",


    salary,


    max(salary)


    over (partition by department_id) "MaxSal"


    from hr.employees


    order by department_id, salary;


    This code outputs all employees and displays their salaries between the lowest
    and highest within their own department, as shown in the following partial output.


    DEPARTMENT_ID FIRST_NAME LAST_NAME MinSal SALARY MaxSal


    ------------- ---------- ---------- ---------- ---------- ----------


    10 Jennifer Whalen 4400 4400 4400


    20 Pat Fay 6000 6000 13000


    20 Michael Hartstein 6000 13000 13000


    30 Karen Colmenares 2500 2500 11000


    30 Guy Himuro 2500 2600 11000


    30 Sigal Tobias 2500 2800 11000


    30 Shelli Baida 2500 2900 11000


    30 Alexander Khoo 2500 3100 11000


    30 Den Raphaely 2500 11000 11000


    40 Susan Mavris 6500 6500 6500


    …


    107 rows selected.


    How It Works


    The key to both the FIRST and LAST analytic functions is their ability to let
    you perform the grouping and ordering on one set of criteria, while leaving you
    free to order differently in the main body of the query, and optionally group
    or not as desired by other factors.


    The OLAP window is partitioned over each department with the OVER clause over
    (partition by department_id) “MinSal”


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA


    2-14\. Performing Aggregations over Moving Windows


    Problem


    You need to provide static and moving summaries or aggregates based on the same
    data. For example, as part of a sales report, you need to provide a monthly summary
    of sales order amounts, together with a moving three- month average of sales amounts
    for comparison.


    Solution


    Oracle provides moving or rolling window functions as part of the analytical function
    set. This gives you the ability to reference any number of preceding rows in a
    result set, the current row in the result set, and any number of following rows
    in a result set. Our initial recipe uses the current row and the three preceding
    rows to calculate the rolling average of order values.


    select to_char(order_date, ''MM'') as OrderMonth, sum(order_total) as MonthTotal,
    avg(sum(order_total))


    over


    (order by to_char(order_date, ''MM'') rows between 3 preceding and current row)
    as RollingQtrAverage


    from oe.orders


    where order_date between ''01-JAN-1999'' and ''31-DEC-1999''


    group by to_char(order_date, ''MM'')


    order by 1;


    We see the month, the associated total, and the calculated rolling three-month
    average in our results.


    OR MONTHTOTAL ROLLINGQTRAVERAGE


    -- ---------- -----------------


    02 120281.6 120281.6


    03 200024.1 160152.85


    04 1636 107313.9


    05 165838.2 121944.975


    06 350019.9 179379.55


    07 280857.1 199587.8


    08 152554.3 237317.375


    09 460216.1 310911.85


    10 59123.6 238187.775


    11 415875.4 271942.35


    12 338672 318471.775


    11 rows selected.


    You might notice January (OrderMonth 01) is missing. This isn’t a quirk of this
    approach: rather it’s because the OE.ORDERS table has no orders recorded for this
    month in 1999.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA


    How It Works


    Our SELECT statement for a rolling average starts by selecting some straightforward
    values. The month number is extracted from the ORDER_DATE field using the TO_CHAR()
    function with the MM format string to obtain the month’s number. We choose the
    month number rather than the name so that the output is sorted as a person would
    expect.


    Next up is a normal aggregate of the ORDER_TOTAL field using the traditional SUM
    function. No magic there. We then introduce an OLAP AVG function, which is where
    the detail of our rolling average is managed. That part of the statement looks
    like this.


    avg(sum(order_total)) over (order by to_char(order_date, ''MM'')


    rows between 3 preceding and current row) as RollingQtrAverage


    All of that text is to generate our result column, the ROLLINGQTRAVERAGE. Breaking
    the sections down will illustrate how each part contributes to the solution. The
    leading functions, AVG(SUM(ORDER_TOTAL)), suggest we are going to sum the ORDER_TOTAL
    values and then take their average. That is correct to an extent, but Oracle isn’t
    just going to calculate a normal average or sum. These are OLAP AVG and SUM


    functions, so their scope is governed by the OVER clause.


    The OVER clause starts by instructing Oracle to perform the calculations based
    on the order of the formatted ORDER_DATE field—that’s what ORDER BY TO_CHAR(ORDER_DATE,
    ''MM'') achieves—effectively ordering the calculations by the values 02 to 12
    (remember, there’s no data for January 1999 in the database). Finally, and most
    importantly, the ROWS element tells Oracle the size of the window of rows over
    which it should calculate the driving OLAP aggregate functions. In our case, that
    means over how many months should the ORDER_TOTAL values be summed and then averaged.
    Our recipe instructs Oracle to use the results from the third-last row through
    to the current row. This is one interpretation of three-month rolling average,
    though technically it’s actually generating an average over four months. If what
    you want is really a three-month average —the last two months plus the current
    month—you’d change the ROWS BETWEEN element to read


    rows between 2 preceding and current row


    This brings up an interesting point. This recipe assumes you want a rolling average
    computed over historic data. But some business requirements call for a rolling
    window to track trends based on data not only prior to a point in time, but also
    after that point. For instance, we might want to use a three-month window but
    base it on the previous, current, and following months. The next version of the
    recipe shows exactly this ability of the windowing function, with the key changes
    in bold.


    select to_char(order_date, ''MM'') as OrderMonth, sum(order_total) as MonthTotal,
    avg(sum(order_total)) over (order by to_char(order_date, ''MM'')


    **rows between 1 preceding and 1 following) as AvgTrend**


    from oe.orders


    where order_date between ''01-JAN-1999'' and ''31-DEC-1999''


    group by to_char(order_date, ''MM'')


    order by 1


    /


    Our output changes as you’d expect, as the monthly ORDER_TOTAL values are now
    grouped differently for the calculation.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA


    OR MONTHTOTAL AVGTREND


    -- ---------- ----------


    02 120281.6 160152.85


    03 200024.1 107313.9


    04 1636 122499.433


    05 165838.2 172498.033


    06 350019.9 265571.733


    07 280857.1 261143.767


    08 152554.3 297875.833


    09 460216.1 223964.667


    10 59123.6 311738.367


    11 415875.4 271223.667


    12 338672 377273.7


    11 rows selected.'
