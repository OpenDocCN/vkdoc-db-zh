    # 第 14 章 ■ 处理 XML 数据


    ## 14-2. 以原生形式存储 XML


    ### 问题


    您需要将原生 XML 数据存储到数据库的关系表中。XML 需要作为接收到的完整 XML 文档存储。


    ### 解决方案


    Oracle 通过支持多种不同形式（从原生 XMLTYPE 表到各种函数）使得原生 XML 存储变得简单。关键在于找到工作量最小的方法。对于无需修改的 XML
    数据，或可通过 XSLT 提取部分 XML 的情况，使用直接的 `XMLTYPE` 数据类型转换是最简便的方法。


    在常规操作中，您不一定需要显示 XML，因此可以用为过程声明的额外 `OUT` 参数赋值来替代 `DBMS_OUTPUT` 调用。我们解决方案的结构将变为以下通用形式。


    ```sql

    create or replace procedure employee_xml

    (emp_id IN number, xml_employee OUT xmltype)

    as

    -- 无需将 xml_employee 指定为局部变量

    [www.it-ebooks.info](http://www.it-ebooks.info/)


    -- 此处为现有解决方案的过程逻辑

    -- 不调用 dbms_output.put_line

    end;

    /

    ```


    此解决方案变体要求调用的应用程序能够理解返回的 `XMLTYPE` 类型变量。


    **提示** 我们的解决方案每次调用过程时都使用 `EMPLOYEE_MAP_TYPE` 执行到 XML 的动态转换。您可以通过使用一个物化列来保存 `EMPLOYEE`
    数据（以用户定义类型的形式备用），从而提高此方法的速度并降低过程的复杂性。这会增加 `INSERT` 和 `UPDATE` 时的开销，但能加速通过此过程的检索。


    我们的解决方案使用 `XMLTYPE` 将新的仓库定义存储在 `OE.WAREHOUSES` 表中。这使我们能够将 XML 直接存储在 Oracle 中，实际上使
    XML 的内部结构对于添加到数据库的目的而言变得不透明。Oracle 的众多 XML 函数支持在插入时无需额外工作即可使用和管理 XML 中的元素、标签和值。表结构非常简单，如下所示。


    ```sql

    Name                                      Null?    Type

    ----------------------------------------- -------- ------------------

    WAREHOUSE_ID                              NOT NULL NUMBER(3)

    WAREHOUSE_SPEC                                     SYS.XMLTYPE

    WAREHOUSE_NAME                                     VARCHAR2(35)

    LOCATION_ID                                        NUMBER(4)

    WH_GEO_LOCATION                                    MDSYS.SDO_GEOMETRY

    ```


    我们可以使用以下包含 `XMLTYPE` 转换的 `INSERT` 语句，插入一个位于伦敦、拥有 15000 平方英尺建筑面积及其他详细信息的新仓库。


    ```sql

    insert into oe.warehouses

    (warehouse_id, warehouse_spec, warehouse_name, location_id)

    values

    (10,

    xmltype(''

    <?xml version="1.0"?>

    <Warehouse>

    <Building>Owned</Building>

    <Area>15000</Area>

    <Docks>1</Docks>

    <DockType>Side load</DockType>

    <WaterAccess>Y</WaterAccess>

    <RailAccess>Y</RailAccess>

    <Parking>Street</Parking>

    <VClearance>10 ft</VClearance>

    </Warehouse>''),

    ''London'',

    2300);

    ```


    请注意，对 `XMLTYPE` 的调用已进行格式化以便于页面阅读。在实际使用中，如果元素之间包含回车符、换行符和空格，转换到 `XMLTYPE` 将引发 `ORA-31011:
    XML parsing failed` 错误。在随 *Oracle SQL Recipes* 提供的代码示例中，您将看到 `INSERT` 语句的 `XMLTYPE`
    调用被格式化在一行上。


    ```sql

    insert into oe.warehouses

    …

    xmltype(''<?xml version="1.0"?><Warehouse><Building>Owned</Building>…''),

    …

    ```


    ### 工作原理


    我们的解决方案利用了 Oracle 能够将 XML 作为另一种数据类型处理的能力。我们使用 `XMLTYPE` 调用将提供的文本转换为 `XMLTYPE`
    数据类型。在底层，`XMLTYPE` 支持 `CLOB` 语义，因为它在内部存储为 `CLOB`。这意味着我们可以使用相同的转换方法，向 `XMLTYPE`
    传递一个最大可达 4GB 的字符串。我们决定缩短示例以节省篇幅！


    正如转换到其他数据类型会对精度、长度等强制执行规则一样，转换到 `XMLTYPE` ...

