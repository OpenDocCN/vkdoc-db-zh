  trans: '

    # 第 10 章 ■ 数据字典


    接下来是 DBA 静态视图。DBA 视图包含描述数据库中所有对象的元数据（无论其所有者或访问权限如何）。要访问 DBA 视图，必须向当前用户授予 `DBA`
    角色或 `SELECT_CATALOG_ROLE`。


    这些静态视图基于内部 Oracle 表（如 `USER$`、`TAB$` 和 `IND$`）。如果你拥有访问 `SYS` 模式的权限，则可以直接通过 SQL
    查看底层表。在大多数情况下，你只需要访问基于这些内部表的静态视图即可。


    数据字典表（如 `USER$`、`TAB$` 和 `IND$`）是在执行 `CREATE DATABASE` 命令期间创建的。作为创建数据库的一部分，会执行
    `sql.bsq` 文件，该文件构建了这些内部数据字典表。`sql.bsq` 文件通常位于 `ORACLE_HOME/rdbms/admin` 目录中，可以通过操作系统编辑实用程序（如
    UNIX 中的 `vi` 或 Windows 中的 `notepad`）查看。


    静态视图是在你运行 `catalog.sql` 脚本时创建的（通常该脚本在 `CREATE DATABASE` 操作成功后立即运行）。`catalog.sql`
    脚本位于 `ORACLE_HOME/rdbms/admin` 目录中。


    **图 10-1.** 创建静态数据字典视图


    诸如 `DBA_USERS`、`DBA_TABLES` 和 `DBA_INDEXES` 之类的静态视图构建于静态表（如 `USER$`、`TAB$` 和 `IND$`）之上。你可以通过查询
    `DBA_VIEWS` 的 `TEXT` 列来查看这些静态视图的创建脚本。


    > **注意** 运行 `catalog.sql` 脚本时，必须以 `SYS` 模式连接。`SYS` 模式是数据字典中所有对象的所有者。


    ## 动态性能视图


    动态性能数据字典视图通常被称为 `V$` 和 `GV$` 视图。这些视图由 Oracle 持续更新，反映了实例和数据库的当前状况。


    动态视图对于诊断实时性能问题至关重要。


    `V$` 和 `GV$` 视图间接基于底层的 `X$` 表，这些表是在启动 Oracle 实例时实例化的内部内存结构。一些 `V$` 视图在 Oracle
    实例首次启动时就可用。例如，在发出 `STARTUP NOMOUNT` 命令后，`V$PARAMETER` 就包含有意义的数据，而不需要数据库被加载或打开。其他动态视图依赖于控制文件中的信息，因此仅在数据库被加载后才包含有意义的信息（如
    `V$CONTROLFILE`）。一些 `V$` 视图提供内核处理信息（如 `V$BH`），因此仅在数据库被打开后才有有用数据。


    在最顶层，`V$` 视图是指向底层 `SYS.V_$` 视图的同义词。在下一层，`SYS.V_$` 对象是建立在另一层 `SYS.V$` 视图之上的视图。而
    `SYS.V$` 视图又基于 `SYS.GV$` 视图。在最底层，`SYS.GV$` 视图基于 `X$` 内存结构。


    > **提示** 你可以通过查询 `V$FIXED_VIEW_DEFINITION` 数据字典视图来显示 `V$` 和 `GV$` 视图的定义。


    顶层的 `V$` 同义词和 `SYS.V_$` 视图是在运行 `catalog.sql` 脚本时创建的，该脚本通常由 DBA 在数据库最初创建后运行。


    **图 10-2.** 创建动态 `V$` 性能数据字典视图


    通过最顶层的同义词访问 `V$` 视图几乎总能满足你对动态性能信息的需求。然而，在极少数情况下，你可能需要查询无法通过 `V$` 视图获取的内部信息。在这些情况下，理解底层的
    `X$` 结构至关重要。


    如果你使用 Oracle Real Application Clusters，你应该熟悉 `GV$` 全局视图。这些视图提供关于集群中所有实例的全局动态性能信息（而
    `V$` 视图是特定于实例的）。`GV$` 视图包含一个 `INST_ID` 列，用于标识集群环境中的特定实例。


    本章并未包含用于查询数据字典对象的详尽 SQL 脚本集。相反，我们试图向你展示直接查询数据字典的常用（以及一些不那么常用）技术。你应该能够基于本章的概念进行扩展，以满足你查看数据字典元数据的任何需求。


    ## SYS 与 SYSTEM


    Oracle 新手有时会问 “`SYS` 和 `SYSTEM` 模式之间有什么区别？” `SYS` 模式是数据库的超级用户，拥有所有内部数据字典对象，并用于执行诸如创建数据库、启动或停止实例、备份和恢复、或添加或移动数据文件等任务。这类任务通常需要
    `SYSDBA` 或 `SYSOPER` 角色。这些角色的安全性通常通过控制对 Oracle 软件操作系统帐户所有者的访问来管理。此外，这些角色的安全性也可以通过密码文件进行管理，该文件允许远程客户端/服务器访问。


    相比之下，`SYSTEM` 模式并不特别。它只是一个被授予了 `DBA` 角色的模式。许多机构在数据库创建后就简单地锁定 `SYSTEM` 模式并不再使用它，因为它通常是黑客尝试入侵数据库时首先尝试访问的模式。与其冒险使用一个容易猜到的数据库入口点，DBA
    会创建一个单独的模式（命名为非 `SYSTEM` 的名称），并授予其 `DBA` 角色。这个 DBA 模式用于执行管理任务，例如创建用户、更改密码、授予数据库权限等。


    为管理员设置单独的 DBA 模式提供了更多的安全和审计选项。


    ### 10-1. 显示用户信息


    #### 问题


    你希望显示有关数据库中模式的信息。


    #### 解决方案


    要快速显示你当前连接所用的模式，请使用以下语句：


    ```sql

    SQL> show user;

    ```


    要快速获取你当前连接用户的信息，请查询 `USER_USERS` 视图。以下查询将显示诸如你的用户名以及分配给你的模式的临时表空间和默认表空间等信息：


    ```sql

    select * from user_users;

    ```


    如果你想查看数据库中所有用户的信息，请使用 `DBA_USERS` 视图。以下查询将显示诸如每个帐户何时创建等信息：


    ```sql

    select username, account_status, created, lock_date

    from dba_users

    order by 1;

    ```


    #### All_Users 与安全性


    任何具有 `CREATE SESSION` 系统权限的模式都可以从 `ALL_USERS` 视图中选择模式信息。例如：


    ```sql

    select username, created

    from all_users

    order by username;

    ```


    这种从 `ALL_USERS` 中查询的能力可能带来安全隐患，因为它允许任何具有最小权限（如 `CREATE SESSION`）的用户查看数据库中的所有用户名。查看所有用户信息使恶意用户能够开始猜测现有用户的密码。如果你是数据库管理员，请确保更改已知帐户的默认密码，并鼓励用户使用不易被猜到的密码。


    #### 工作原理

    '
- fmt: '# CHAPTER 10 DATA DICTIONARY


    A `schema` is a collection of database objects (such as tables, indexes, and so
    on). A schema is owned by a database user (and has the same name as the user).
    A `database user` is an account through which you can log in to the database and
    establish a connection. A `session` is a connection to the Oracle database through
    a user operating-system process. Sometimes the terms `account` or `username` are
    also used when referring to a database user. An account can also refer to an operating
    system user (such as `oracle`).


    When a DBA creates a user (via a `CREATE USER` statement) an entry is added to
    the data dictionary.


    You can use views like `USER/ALL/DBA_USERS` to display information about users
    in your database. You can also use the `SYS_CONTEXT` built-in SQL function to
    display a wide variety of details about your currently connected session. This
    example displays the user, authentication method, host, and instance:


    ```

    select

    sys_context(''USERENV'',''CURRENT_USER'') usr

    ,sys_context(''USERENV'',''AUTHENTICATION_METHOD'') auth_mth

    ,sys_context(''USERENV'',''HOST'') host

    ,sys_context(''USERENV'',''INSTANCE_NAME'') inst

    from dual;

    ```


    **Note:** The `SYS_CONTEXT` function can be called from either SQL or PL/SQL.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    If you want to view dynamic information such as users currently logged onto your
    database, use the following query:


    ```

    select

    count(*)

    ,username

    from v$session

    group by username;

    ```


    If you want to see the SQL statements that currently connected users are running,
    issue this query:


    ```

    select a.sid, a.username, b.sql_text

    from v$session a

    ,v$sqltext_with_newlines b

    where a.sql_id = b.sql_id

    order by a.username, a.sid, b.piece;

    ```


    If you’re using an Oracle Database 9*i* or earlier, the previous query won’t work
    because the `SQL_ID` column is not available. Here is a query that works for older
    versions of Oracle:


    ```

    select a.sid, a.username, b.sql_text

    from v$session a

    ,v$sqltext_with_newlines b

    where a.sql_address = b.address

    and a.sql_hash_value = b.hash_value

    order by a.username, a.sid, b.piece;

    ```


    **Tip:** The `V$SQLTEXT_WITH_NEWLINES` is identical to `V$SQLTEXT` with the exception
    that `V$SQLTEXT_WITH_NEWLINES` does not replace tabs and newlines with spaces.


    ## 10-2. Determining the Tables You Can Access


    ### Problem


    The application you have written requires some reference information from another
    schema and you want to display which tables you have access to.


    ### Solution


    Users always have access to their own tables. You can query the `USER_TABLES`
    view to display your tables:


    ```

    select table_name, tablespace_name

    from user_tables;

    ```


    Use this query to display which tables your user account has select access to:


    ```

    select table_name, tablespace_name

    from all_tables;

    ```


    Run the following query to view table privileges that have been granted to your
    current user account:


    ```

    select grantee, table_name, privilege

    from user_tab_privs

    where grantee = sys_context(''USERENV'',''CURRENT_USER'')

    order by table_name, privilege;

    ```


    In the previous lines of code, the `SYS_CONTEXT` function is used to extract the
    current username from the session. Without qualifying the `GRANTEE` to your current
    username, the query would also display object privileges you have granted and
    show privileges that have been granted by other users to your objects. The query
    could have alternatively prompted you for your current username. For example:


    ```

    select grantee, table_name, privilege

    from user_tab_privs

    where grantee = UPPER(''&your_user_name'')

    order by table_name, privilege;

    ```


    ### How It Works


    Querying the `USER_TABLES` view is a quick way to determine which tables exist
    in your current account, whereas the `ALL_TABLES` view contains every table you
    have select access to. If you have access to the `DBA_TABLES` view, you can also
    query the tables a user has access to via the following query:


    ```

    select table_name

    ```'
