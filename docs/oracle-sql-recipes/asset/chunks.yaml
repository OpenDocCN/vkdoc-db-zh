    # Chapter 15: Partitioning


    ## How It Works


    A large table size combined with a good business reason means you should consider
    partitioning. Keep in mind that there is more setup work and maintenance when
    you partition a table. However, it is much easier to partition a table initially
    during setup, rather than trying to convert it after it''s grown to an unwieldy
    size.


    `Note` Currently, partitioning is an extra-cost option that is available only
    with the Oracle Enterprise Edition. You''ll have to decide based on your business
    requirements whether partitioning is worth the cost.


    ## 15-2. Partitioning by Range


    ### Problem


    You''re working in a data warehouse environment with a star schema. You have a
    fact table that contains a number column that represents a date. For example,
    the value `20100101` represents January 1st, 2010.


    You want to partition the fact table based on this number column.


    ### Solution


    Use the `PARTITION BY RANGE` clause to partition a table by range. The following
    example creates three partitions based on a range of numbers:


    ```sql

    create table f_regs

    (reg_count number

    ,d_date_id number

    )

    partition by range (d_date_id)(

    partition p_2009 values less than (20100101),

    partition p_2010 values less than (20110101),

    partition p_max values less than (maxvalue)

    );

    ```


    You can view information about partitioned tables by running the following query:


    ```sql

    select table_name,partitioning_type,def_tablespace_name from user_part_tables;

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # Chapter 15: Partitioning


    Here is a snippet of the output:


    ```

    TABLE_NAME PARTITION DEF_TABLESPACE_NAME

    -------------------- --------- -------------------------

    F_REGS RANGE USERS

    ```


    To view information about the partitions within a table, issue a query like this:


    ```sql

    select table_name, partition_name, high_value from user_tab_partitions;

    ```


    Here is some sample output:


    ```

    TABLE_NAME PARTITION_NAME HIGH_VALUE

    -------------------- ------------------------------ ---------------

    F_REGS P_2009 20100101

    F_REGS P_2010 20110101

    F_REGS P_MAX MAXVALUE

    ```


    ### How It Works


    The `PARTITION BY RANGE` clause uses a partitioning column (also called the partition
    key) to determine which partition a row is inserted into. In the recipe, the `D_DATE_ID`
    column is the partitioning column.


    The `VALUES LESS THAN` clause creates the partition bound, which defines which
    partition a row will be inserted into. For example, a row with a partition key
    value of `20100202` will be inserted into the `P_2010` partition (the high value
    for the `P_2010` partition is defined to be `20110101`).'
