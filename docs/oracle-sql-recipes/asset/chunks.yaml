- fmt: "You can query `USER_TAB_SUBPARTITIONS` to verify that the subpartition has\
    \ been dropped.\n\n### Note\nOracle will not allow you to drop all subpartitions\
    \ of a composite-partitioned table. There must be at least one subpartition per\
    \ partition.\n\n### How It Works\nWhen you drop a partition there is no undrop\
    \ operation. Therefore, before you drop a partition, ensure that you're in the\
    \ correct environment and really do need to drop it. If you need to preserve the\
    \ data in a partition to be dropped, merge the partition to another partition\
    \ instead of dropping it.\n\nYou can't drop a partition from a hash-partitioned\
    \ table. For hash-partitioned tables, you must coalesce partitions to remove one.\
    \ And you can't explicitly drop a partition from a reference-partitioned table.\
    \ When a parent table partition is dropped, it will also be dropped from corresponding\
    \ child reference-partitioned tables.\n\n## 15-19. Removing Rows from a Partition\n\
    ### Problem\nYou want to efficiently remove all records from a partition.\n\n\
    ### Solution\nFirst identify the name of the partition you want to remove records\
    \ from.\n\n```sql\nselect segment_name, segment_type, partition_name\nfrom user_segments\n\
    where partition_name is not null;\n```\n\nUse the `ALTER TABLE...TRUNCATE PARTITION`\
    \ statement to remove all records from a partition. This example truncates the\
    \ `P_2008` partition of the `F_SALES` table:\n\n```sql\nalter table f_sales truncate\
    \ partition p_2008;\n```\n\nYou should see the following message:\n\n```\nTable\
    \ truncated.\n```\n\nIn this scenario, that message does not mean the entire table\
    \ was truncated. It's only confirming that the specified partition was truncated.\n\
    \n### How It Works\nTruncating a partition is an efficient way to quickly remove\
    \ large amounts of data. When you truncate a partition, however, there is no rollback\
    \ mechanism. The truncate operation permanently deletes the data from the partition.\n\
    \nIf you need the option of rolling back a transaction, use the `DELETE` statement:\n\
    ```sql\ndelete from f_sales partition(p2008);\n```\n\nThe downside to this approach\
    \ is that if you have millions of records, the `DELETE` operation could take a\
    \ long time to run. Also, for a large number of records, `DELETE` generates a\
    \ great deal of rollback information. This could cause performance issues for\
    \ other SQL statements contending for resources.\n\n## 15-20. Generating Statistics\
    \ for a Partition\n### Problem\nYou have just loaded data into a single partition\
    \ and need to generate statistics to reflect the newly inserted data.\n\n### Solution\n\
    Use the `EXECUTE` statement to run the `DBMS_STATS` package to generate statistics\
    \ for a particular partition.\n\nIn this example, the owner is `STAR`, the table\
    \ is `F_SALES`, and the partition being analyzed is `P_2009`:\n```sql\nexec dbms_stats.gather_table_stats(ownname=>'STAR',-\n\
    \                                   tabname=>'F_SALES',-\n                   \
    \                partname=>'P_2009');\n```\n\nIf you're working with a large partition,\
    \ you'll probably want to specify the percentage sampling size, degree of parallelism,\
    \ and also generate statistics for any indexes:\n```sql\nexec dbms_stats.gather_table_stats(ownname=>'STAR',-\n\
    \                                   tabname=>'F_SALES',-\n                   \
    \                partname=>'P_2009',-\n                                   estimate_percent=>dbms_stats.auto_sample_size,-\n\
    \                                   degree=>dbms_stats.auto_degree,-\n       \
    \                            cascade=>true);\n```\n\n### How It Works\nFor a partitioned\
    \ table, you can generate statistics either on a single partition or the entire\
    \ table. We recommend that you generate statistics whenever a significant amount\
    \ of data changes within the partition. You need to understand your tables and\
    \ data well enough to determine whether generating new statistics will be required.\n\
    \n## 15-21. Creating an Index that Maps to a Partition (Local Index)\n### Problem\n\
    You find that you often use the partition key in the `WHERE` clause when querying\
    \ a partitioned table. You want to improve the performance of your queries.\n\n\
    ### Solution\nHere is the SQL to create a simple partitioned table:\n```sql\n\
    create table f_regs(\n   reg_count number\n  ,d_date_id number\n)\npartition by\
    \ range(d_date_id)\n   (partition p2009 values less than (20100101) tablespace\
    \ tbsp1\n   ,partition p2010 values less than (20110101) tablespace tbsp2\n);\n\
    ```\n\nNext, use the `LOCAL` clause of the `CREATE INDEX` statement to create\
    \ a local index on the partitioned table: This example creates a local index on\
    \ the `D_DATE_ID` column of the `F_REGS` table:\n```sql\ncreate index f_regs_dates_fk1\
    \ on f_regs(d_date_id) local;\n```\n\nRun the following query to view information\
    \ about partitioned indexes:\n```sql\nselect index_name, table_name, partitioning_type\n\
    from user_part_indexes;\n```\nHere's some sample output:\n\n```\nINDEX_NAME  \
    \                   TABLE_NAME           PARTITI\n------------------------------\
    \ -------------------- -------\nF_REGS_DATES_FK1               F_REGS        \
    \       RANGE\n```\n\nNow query the `USER_IND_PARTITIONS` table to view information\
    \ about the locally partitioned index:\n```sql\nselect index_name, partition_name,\
    \ tablespace_name\nfrom user_ind_partitions;\n```\nNotice that an index partition\
    \ has been created for each partition of the table, and that the index is created\
    \ in the same tablespace as the table partition:\n\n```\nINDEX_NAME          \
    \ PARTITION_NAME       TABLESPACE_NAME\n-------------------- --------------------\
    \ --------------------\nF_REGS_DATES_FK1     P2009                TBSP1\nF_REGS_DATES_FK1\
    \     P2010                TBSP2\n```\n\nIf you want the local index partitions\
    \ be created in a tablespace (or tablespaces) separate from the table partitions,\
    \ specify those when creating the index:\n```sql\ncreate index f_regs_dates_fk1\
    \ on f_regs(d_date_id) local\n   (partition p2009 tablespace idx1\n   ,partition\
    \ p2010 tablespace idx2);\n```\nIf you specify the partition information when\
    \ building a local partitioned index, the number of partitions must match the\
    \ number of partitions in the table on which the partitioned index is built.\n\
    \n### How It Works\nA local partitioned index is partitioned in exactly the same\
    \ manner as the partitioned table that the local index is built on. Each table\
    \ partition will have a corresponding index that contains `ROWID` values and index\
    \ key values for just that table partition. In other words, a `ROWID` in a local\
    \ partitioned index will only point to rows in its corresponding table partition.\n\
    \nOracle keeps local index partitions in sync with the table partitions. You cannot\
    \ explicitly add or drop a partition from a local index. When you add or drop\
    \ a table partition, Oracle automatically performs the corresponding work for\
    \ the local index. Oracle manages the local index partitions regardless of how\
    \ the local indexes have been assigned to tablespaces.\n\nLocal indexes are common\
    \ in data-warehouse and decision-support systems. If you query frequently by using\
    \ the partitioned column(s), a local index is appropriate. This lets Oracle use\
    \ the appropriate index and table partition to quickly retrieve the data.\n\n\
    There are two types of local indexes, local *prefixed* and local *nonprefixed*.\
    \ A local prefixed index is one in which the leftmost column of the index matches\
    \ the table partition key. The example in the solution section is a local prefixed\
    \ index because its leftmost column (`D_DATE_ID`) is also the partition key for\
    \ the table.\n\nA nonprefixed local index is one in which its leftmost column\
    \ does not match the partition key used to partition the corresponding table.\
    \ For example, this is a local nonprefixed index:\n```sql\ncreate index f_regs_idx1\
    \ on f_regs(reg_count) local;\n```\nThe index is partitioned with the `REG_COUNT`\
    \ column, which is not the partition key of the table, and is therefore a nonprefixed\
    \ index. You can verify whether an index is considered prefixed by querying the\
    \ `ALIGNMENT` column from `USER_PART_INDEXES`:\n```sql\nselect index_name,table_name,alignment,locality\n\
    from user_part_indexes;\n```\nHere is some sample output:\n\n```\nINDEX_NAME \
    \          TABLE_NAME           ALIGNMENT     LOCALITY\n-------------------- --------------------\
    \ ------------ ----------\nF_REGS_DATES_FK1     F_REGS               PREFIXED\
    \      LOCAL\nF_REGS_IDX1          F_REGS               NON_PREFIXED  LOCAL\n\
    ```"
