    # 第 13 章 ■ 树状结构数据


    ## 工作原理


    表面上看，很难理解这个查询是如何工作的；如果你不常使用 `CONNECT BY` 和 `START WITH`，可能会觉得更难懂。让我们分解一下，并回顾 `CONNECT
    BY` 的工作原理，从 `SELECT` 语句的高亮部分开始：


    ```

    select level new_pk from dual connect by level <= 1000;

    ```


    `LEVEL` 返回的值将作为我们的主键，我们为结果列分配了一个新名称。记住，`LEVEL` 是一个伪列，仅在层次查询中可用。到目前为止，这相当直接。但我们如何让
    `LEVEL` 递增到 1000 或其他用户定义的值呢？让我们看看语句的下一部分：


    ```

    select level new_pk from dual connect by level <= 1000;

    ```


    同样，我们没有偏离已知领域太远。`DUAL` 表将始终只有一行和一列，列名为 `DUMMY`，其值为 `X`。如果这个表消失，或者拥有多于一行，那么毫不夸张地说，几乎所有
    Oracle 数据库应用程序都会在短时间内灾难性地失败。但是，我们如何从仅有一行中获取 1000 行呢？让我们看看语句的下一部分：`select level
    new_pk from dual connect by level <= 1000;`


    当你使用 `CONNECT BY` 时，Oracle 会遍历表中定义的树结构，`LEVEL` 列表示你在层次结构中向下深入了多少层。但是，`DUAL` 只有一行，所以我们的树只有一层，对吗？并不完全是。记住，`CONNECT
    BY` 子句通常包含一元运算符 `PRIOR`，以告诉 Oracle 如何遍历树并将前一行连接到当前行。由于这里没有 `START WITH` 子句或 `PRIOR`
    运算符，这个 `SELECT` 语句的评估过程如下：


    1.  Oracle 找到层次结构的根行。由于没有 `START WITH` 子句，Oracle 从结果集中唯一的行开始，它处于 `LEVEL = 1`。

    2.  检索下一个子行；由于除了 `LEVEL <= 1000` 之外没有其他 `CONNECT BY` 条件，Oracle 将前一行连接到自身作为下一个子行返回，并增加
    `LEVEL` 的值。

    3.  Oracle 评估 `CONNECT BY` 条件，查看是否已完成行检索；如果没有，Oracle 继续执行步骤 2 以返回更多子行。

    4.  满足 `CONNECT BY` 条件后，查询完成结果返回。


    最后，我们有语句的最后一部分，高亮显示如下：


    ```

    select level new_pk from dual connect by level <= 1000;

    ```


    我们必须以某种方式限制结果，指定 `LEVEL <= 1000` 告诉 Oracle 在达到 1000 时停止。如果我们没有这个过滤器，查询将无限期运行，直到你取消语句或关闭数据库为止。你不能指定没有过滤器或层次连接条件的
    `CONNECT BY`；因此，如果你铁了心要运行一个永远不会结束的查询，你必须写类似这样的东西：


    ```

    select level new_pk from dual connect by 1=1;

    ```


    你还可以通过在 `SELECT` 语句中嵌入一些过程式 SQL 代码来进一步增强该语句。在这个变体中，你希望创建一个具有唯一主键的表，以及第二列，当主键是奇数时该列值为
    `ODD`，当主键是偶数时该列值为 `EVEN`：


    ```

    select level new_pk,


    case


    when mod(level,2) = 1 then ''ODD''


    else ''EVEN''


    end odd_or_even


    from dual connect by level <= 1000;

    ```


    ```

    NEW_PK ODD_OR_EVEN

    ---------------------- -----------

    1 奇数

    2 偶数

    3 奇数

    4 偶数

    5 奇数

    6 偶数

    7 奇数

    8 偶数

    ...

    995 奇数

    996 偶数

    997 奇数

    998 偶数

    999 奇数

    1000 偶数

    已选择 1000 行

    ```


    你可以使用这个 `SELECT` 语句作为 `CTAS`（Create Table As Select）操作的基础，并添加一些额外的列，正如你将在下一节中看到的。

