    **and a.r_owner = b.owner**


    **and a.constraint_type = ''R''**


    **and b.owner = upper(''&table_owner'');**


    **spo off;**


    This script generates a file named dis_dyn.sql that disables all of the foreign
    key constraints for a user. Listed next is a similar script to generate a file
