- fmt: "# 第15章 分区\n\n## MAXVALUE 参数与智能代理键\n\n`MAXVALUE` 参数用于创建一个分区，以存储不符合其他已定义分区范围的行。您不必指定\
    \ `MAXVALUE`。但是，如果您尝试插入一个不符合现有分区范围的值，系统将抛出错误。\n\n您可能已经注意到，在 `F_REGS` 表中，我们将 `D_DATE_ID`\
    \ 列用作数字数据类型，而非日期数据类型。`D_DATE_ID` 是一个从 `D_DATES` 维度表指向 `F_REGS` 事实表的外键。数据仓库环境中采用的一种技术是在\
    \ `D_DATES` 维度的主键上使用智能代理键。对于日期使用智能键的主要原因在于物理数据库设计，特别是当您希望基于日期字段进行范围分区时。这允许您在外键数字（看起来像一个日期）上进行分区。\n\
    \n## 15-3. 按列表分区\n\n### 问题\n\n您希望根据列表中的值（例如州代码列表）对表进行分区。\n\n### 解决方案\n\n使用 `CREATE\
    \ TABLE` 语句的 `PARTITION BY LIST` 子句。此示例按 `STATE_CODE` 列进行分区：\n\n```sql\ncreate\
    \ table f_sales\n(\n reg_sales number\n,d_date_id number\n,state_code varchar2(20)\n\
    )\npartition by list (state_code)\n(\n partition reg_west values ('AZ','CA','CO','MT','OR','ID','UT','NV')\n\
    ,partition reg_mid values ('IA','KS','MI','MN','MO','NE','OH','ND')\n,partition\
    \ reg_rest values (default)\n);\n```\n\n### 工作原理\n\n列表分区表的分区键只能是一列。使用 `DEFAULT`\
    \ 列表来指定一个分区，用于存储其值不匹配列表中任何值的行。运行此 SQL 语句可查看每个分区的列表值：\n\n```sql\nselect table_name,\
    \ partition_name, high_value\nfrom user_tab_partitions\norder by 1;\n```\n\n`HIGH_VALUE`\
    \ 列将显示为每个分区定义的列表值。此列的数据类型为 `LONG`。如果您使用 `SQL*Plus`，可能需要将 `LONG` 变量的值设置得比默认值（80字节）更高，以显示该列的全部内容：\n\
    \n```sql\nSQL> set long 1000\n```\n\n## 15-4. 按哈希分区\n\n### 问题\n\n您有一个表，其中没有包含明显的列可以进行范围或列表分区。您希望根据表中的一个\
    \ ID 列将数据均匀地分散到各个分区中。\n\n### 解决方案\n\n使用 `CREATE TABLE` 语句的 `PARTITION BY HASH`\
    \ 子句。此示例创建一个表，该表被划分为三个分区，每个分区位于自己的表空间中。\n\n```sql\ncreate table browns(\n brown_id\
    \ number\n,bear_name varchar2(30))\npartition by hash(brown_id)\npartitions 3\n\
    store in(tbsp1, tbsp2, tbsp3);\n```\n\n当然，您需要修改表空间名称等细节以匹配您环境中的名称。或者，您可以省略 `STORE\
    \ IN` 子句，Oracle 会将所有分区放置在您的默认表空间中。如果您想同时为表空间和分区命名，可以按如下方式指定：\n\n```sql\ncreate\
    \ table browns(\n brown_id number\n,bear_name varchar2(30))\npartition by hash(brown_id)\n\
    (\n partition p1 tablespace tbsp1\n,partition p2 tablespace tbsp2\n,partition\
    \ p3 tablespace tbsp3\n);\n```\n\n### 工作原理\n\n哈希分区根据一种算法将行映射到分区，该算法会将数据均匀地分散到所有分区中。您无法控制哈希算法或\
    \ Oracle 分布数据的方式。\n\n您指定所需的分区数量，Oracle 会根据哈希键列将数据均匀划分。\n\n哈希分区具有一些有趣的性能影响。所有哈希键值相同的行将被插入到同一个分区中。这意味着插入操作特别高效，因为哈希算法确保了数据在各分区之间的均匀分布。此外，如果您通常针对特定的键值进行选择，Oracle\
    \ 只需访问一个分区即可检索这些行。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)"
  raw: 'The MAXVALUE parameter creates a partition to store rows that don’t fit into
    the other defined partitions. You don’t have to specify a MAXVALUE. However, an
    error will be thrown if you attempt to insert a value that doesn’t fit into an
    existing partition.


    You may have noticed that we used a column D_DATE_ID as a number data type instead
    of a date data type for the F_REGS table. The D_DATE_ID is a foreign key from
    a D_DATES dimension table into the F_REGS


    fact table. One technique employed in data warehouse environments is to use a
    smart surrogate key for the primary key of the D_DATES dimension. The main reason
    for using smart keys for dates is for the physical database design when you want
    to use range partitioning on a date field. This allows you to partition on a foreign
    key number that looks like a date.


    15-3\. Partitioning by List


    Problem


    You want to partition a table by values in a list, such as a list of state codes.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ PARTITIONING


    Solution


    Use the PARTITION BY LIST clause of the CREATE TABLE statement. This example partitions
    by the column STATE_CODE:


    create table f_sales


    (reg_sales number


    ,d_date_id number


    ,state_code varchar2(20)


    )


    partition by list (state_code)


    ( partition reg_west values (''AZ'',''CA'',''CO'',''MT'',''OR'',''ID'',''UT'',''NV'')


    ,partition reg_mid values (''IA'',''KS'',''MI'',''MN'',''MO'',''NE'',''OH'',''ND'')


    ,partition reg_rest values (default)


    );


    How It Works


    The partition key for a list-partitioned table can be only one column. Use the
    DEFAULT list to specify a partition for rows that don’t match values in the list.
    Run this SQL statement to view list values for each partition:


    select table_name, partition_name, high_value


    from user_tab_partitions


    order by 1;


    The HIGH_VALUE column will display the list values defined for each partition.
    This column is of data type LONG. If you’re using SQL*Plus, you may need to set
    the LONG variable to a value higher than the default (80 bytes) to display the
    entire contents of the column:


    SQL> set long 1000


    15-4\. Partitioning by Hash


    Problem


    You have a table that doesn’t contain an obvious column to partition it by range
    or list. You want to spread out the data evenly among partitions based on an ID
    column in the table.


    Solution


    Use the PARTITION BY HASH clause of the CREATE TABLE statement. This example creates
    a table that is divided into three partitions. Each partition is created in its
    own tablespace.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ PARTITIONING


    create table browns(


    brown_id number


    ,bear_name varchar2(30))


    partition by hash(brown_id)


    partitions 3


    store in(tbsp1, tbsp2, tbsp3);


    Of course you’ll have to modify details like the tablespace names to match those
    in your environment. Alternatively, you can omit the STORE IN clause and Oracle
    will place all partitions in your default tablespace. If you want to name both
    the tablespaces and partitions, you can specify them as follows:


    create table browns(


    brown_id number


    ,bear_name varchar2(30))


    partition by hash(brown_id)


    (partition p1 tablespace tbsp1


    ,partition p2 tablespace tbsp2


    ,partition p3 tablespace tbsp3);


    How It Works


    Hash partitioning maps rows to partitions based on an algorithm that will spread
    data evenly across all partitions. You don’t have any control over the hashing
    algorithm or how Oracle distributes the data.


    You specify how many partitions you’d like and Oracle divides the data evenly
    based on the hash key column.


    Hash partitioning has some interesting performance implications. All rows that
    share the same value for the hash key will be inserted into the same partition.
    This means that inserts are particularly efficient as the hashing algorithm ensures
    that the data is distributed uniformly across partitions. Also, if you typically
    select for a specific key value, Oracle only has to access one partition to retrieve
    those rows.'
  trans: "\n# 第 15 章 分区\n\n## MAXVALUE 参数与智能代理键\n\n`MAXVALUE` 参数用于创建一个分区，以存储不符合其他已定义分区范围的行。您不必指定\
    \ `MAXVALUE`。但是，如果您尝试插入一个不符合现有分区范围的值，系统将抛出错误。\n\n您可能已经注意到，在 `F_REGS` 表中，我们将 `D_DATE_ID`\
    \ 列用作数字数据类型，而非日期数据类型。`D_DATE_ID` 是一个从 `D_DATES` 维度表指向 `F_REGS` 事实表的外键。数据仓库环境中采用的一种技术是在\
    \ `D_DATES` 维度的主键上使用**智能代理键**。对于日期使用智能键的主要原因在于物理数据库设计，特别是当您希望基于日期字段进行范围分区时。这允许您在外键数字（看起来像一个日期）上进行分区。\n\
    \n## 15-3. 按列表分区\n\n### 问题\n\n您希望根据列表中的值（例如州代码列表）对表进行分区。\n\n### 解决方案\n\n使用 `CREATE\
    \ TABLE` 语句的 `PARTITION BY LIST` 子句。此示例按 `STATE_CODE` 列进行分区：\n\n```sql\ncreate\
    \ table f_sales\n(\n reg_sales number\n,d_date_id number\n,state_code varchar2(20)\n\
    )\npartition by list (state_code)\n(\n partition reg_west values ('AZ','CA','CO','MT','OR','ID','UT','NV')\n\
    ,partition reg_mid values ('IA','KS','MI','MN','MO','NE','OH','ND')\n,partition\
    \ reg_rest values (default)\n);\n```\n\n### 工作原理\n\n列表分区表的分区键只能是一列。使用 `DEFAULT`\
    \ 列表来指定一个分区，用于存储其值不匹配列表中任何值的行。运行此 SQL 语句可查看每个分区的列表值：\n\n```sql\nselect table_name,\
    \ partition_name, high_value\nfrom user_tab_partitions\norder by 1;\n```\n\n`HIGH_VALUE`\
    \ 列将显示为每个分区定义的列表值。此列的数据类型为 `LONG`。如果您使用 `SQL*Plus`，可能需要将 `LONG` 变量的值设置得比默认值（80\
    \ 字节）更高，以显示该列的全部内容：\n\n```sql\nSQL> set long 1000\n```\n\n## 15-4. 按哈希分区\n\n###\
    \ 问题\n\n您有一个表，其中没有包含明显的列可以进行范围或列表分区。您希望根据表中的一个 ID 列将数据均匀地分散到各个分区中。\n\n### 解决方案\n\
    \n使用 `CREATE TABLE` 语句的 `PARTITION BY HASH` 子句。此示例创建一个表，该表被划分为三个分区，每个分区位于自己的表空间中。\n\
    \n```sql\ncreate table browns(\n brown_id number\n,bear_name varchar2(30))\npartition\
    \ by hash(brown_id)\npartitions 3\nstore in(tbsp1, tbsp2, tbsp3);\n```\n\n当然，您需要修改表空间名称等细节以匹配您环境中的名称。或者，您可以省略\
    \ `STORE IN` 子句，Oracle 会将所有分区放置在您的默认表空间中。如果您想同时为表空间和分区命名，可以按如下方式指定：\n\n```sql\n\
    create table browns(\n brown_id number\n,bear_name varchar2(30))\npartition by\
    \ hash(brown_id)\n(\n partition p1 tablespace tbsp1\n,partition p2 tablespace\
    \ tbsp2\n,partition p3 tablespace tbsp3\n);\n```\n\n### 工作原理\n\n哈希分区根据一种算法将行映射到分区，该算法会将数据均匀地分散到所有分区中。您无法控制哈希算法或\
    \ Oracle 分布数据的方式。\n\n您指定所需的分区数量，Oracle 会根据哈希键列将数据均匀划分。\n\n哈希分区具有一些有趣的性能影响。所有哈希键值相同的行将被插入到同一个分区中。这意味着插入操作特别高效，因为哈希算法确保了数据在各分区之间的均匀分布。此外，如果您通常针对特定的键值进行选择，Oracle\
    \ 只需访问一个分区即可检索这些行。\n\n[电子书下载](http://www.it-ebooks.info/)\n"
- fmt: "However, if you search by ranges of values, Oracle will most likely have to\
    \ search every partition to determine which rows to retrieve. Thus range searches\
    \ can perform poorly in hash-partitioned tables.\n\n## 15-5. Partitioning a Table\
    \ in Multiple Ways\n\n### Problem\n\nYou have a table you want to partition on\
    \ a number range, but you also want to subdivide each partition by a list of regions.\n\
    \n### Solution\n\nUse composite partitioning to instruct Oracle to divide a table\
    \ in multiple ways. The following example first partitions a table by a number\
    \ range, then further distributes data via list partitioning:\n\n```sql\ncreate\
    \ table f_sales(\n  sales_amnt number\n ,reg_code varchar2(3)\n ,d_date_id number\n\
    )\npartition by range(d_date_id)\nsubpartition by list(reg_code)\n(partition p2010\
    \ values less than (20100101)\n (subpartition p1_north values ('ID','OR')\n  ,subpartition\
    \ p1_south values ('AZ','NM')\n ),\n partition p2011 values less than (20110101)\n\
    \ (subpartition p2_north values ('ID','OR')\n  ,subpartition p2_south values ('AZ','NM')\n\
    \ )\n);\n```\n\nYou can view subpartition information by running the following\
    \ query:\n\n```sql\nselect table_name, partitioning_type, subpartitioning_type\n\
    from user_part_tables;\n```\n\nHere is some sample output:\n\n```\nTABLE_NAME\
    \           PARTITIONING_TYPE    SUBPARTITIONING_TYPE\n-------------------- --------------------\
    \ ---------------------\nF_SALES              RANGE                LIST\n```\n\
    \nRun the next query to view information about the subpartitions:\n\n```sql\n\
    select table_name, partition_name, subpartition_name\nfrom user_tab_subpartitions;\n\
    ```\n\nHere is a snippet of the output:\n\n```\nTABLE_NAME           PARTITION_NAME\
    \       SUBPARTITION_NAME\n-------------------- -------------------- --------------------\n\
    F_SALES              P2010                P1_SOUTH\nF_SALES              P2010\
    \                P1_NORTH\nF_SALES              P2011                P2_SOUTH\n\
    F_SALES              P2011                P2_NORTH\n```\n\nCHAPTER 15 ■ PARTITIONING\n\
    \n### How It Works\n\nOracle allows you to combine two partitioning strategies,\
    \ as follows:\n\n- Range-Range Partitioning\n- Range-Hash Partitioning\n- Range-List\
    \ Partitioning\n- List-Range Partitioning\n- List-Hash Partitioning\n- List-List\
    \ Partitioning\n\nComposite partitioning gives you a great deal of flexibility\
    \ in the way you divvy up your data. You can use these methods to further refine\
    \ how data is distributed and maintained.\n\n## 15-6. Creating Partitions on Demand\n\
    \n### Problem\n\nYou have a range-partitioned table and want Oracle to automatically\
    \ add a partition when values are inserted above the highest value defined for\
    \ the highest range.\n\n### Solution\n\nIf you are using Oracle Database `11 g`\
    \ or higher, you can use the `INTERVAL` clause of the `CREATE TABLE` statement\
    \ to instruct Oracle to automatically add a partition to the high end of a range-partitioned\
    \ table.\n\nThis example creates a table that initially has one partition with\
    \ a high-value range of 01-JAN-2010.\n\n```sql\ncreate table f_sales(\n  sales_amt\
    \ number\n ,d_date date\n)\npartition by range (d_date)\ninterval(numtoyminterval(1,\
    \ 'YEAR'))\n(partition p1 values less than (to_date('01-jan-2010','dd-mon-yyyy')));\n\
    ```\n\nThe interval in this example is 1 year, defined by the `INTERVAL(NUMTOYMINTERVAL(1,\
    \ 'YEAR'))` clause.\n\nIf a record is inserted into the table with a `D_DATE`\
    \ value greater than or equal to 01-JAN-2010, Oracle will automatically add a\
    \ new partition to the high end of the table. You can check the details of the\
    \ partition by running this SQL statement:\n\n```sql\nselect table_name, partition_name,\
    \ partition_position, high_value\nfrom user_tab_partitions order by table_name,\
    \ partition_name;\n```\n\nHere is some sample output (the `HIGH_VALUE` column\
    \ has been cut short so the output fits on the page):\n\n```\nTABLE_NAME     \
    \      PARTITION_NAME       PARTITION_POSITION   HIGH_VALUE\n----------      \
    \     ------------         -------------------- ----------\nF_SALES          \
    \    P1                   1                    TO_DATE(' 2010-01-01 00:00:00',...\n\
    ```\n\nNow we insert some data above the high value for the highest partition:\n\
    \n```sql\ninsert into f_sales values(1,sysdate+1000);\n```\n\nHere’s what the\
    \ output from selecting from `USER_TAB_PARTITIONS` now shows:\n\n```\nTABLE_NAME\
    \           PARTITION_NAME       PARTITION_POSITION   HIGH_VALUE\n---------- \
    \          ------------         -------------------- ----------\n```"
