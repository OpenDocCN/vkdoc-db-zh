- fmt: "# CHAPTER 18 ■ OBJECT MANAGEMENT\n\n## 18-13. Enforcing Unique Rows in a Table\n\
    \n### Problem\n\nYou want to ensure that the data entered into the database conforms\
    \ to certain business rules. For example, you need to ensure that a new department\
    \ will not be mistakenly added under the same department number as an existing\
    \ one. You want to enforce uniqueness with a `PRIMARY KEY` constraint.\n\n###\
    \ Solution\n\nWhen implementing a database, most tables you create will require\
    \ a `PRIMARY KEY` constraint that guarantees every record in the table can be\
    \ uniquely identified. There are multiple techniques for adding a primary key\
    \ constraint to a table. The first example creates the primary key inline with\
    \ the column definition:\n\n```sql\ncreate table dept(\n    dept_id number primary\
    \ key,\n    dept_desc varchar2(30)\n);\n```\n\nIf you select the `CONSTRAINT_NAME`\
    \ from `USER_CONSTRAINTS`, you’ll notice that Oracle generates a cryptic name\
    \ for the constraint (something like `SYS_C003682`). Use the following syntax\
    \ to explicitly give a name to a primary key constraint:\n\n```sql\ncreate table\
    \ dept(\n    dept_id number constraint dept_pk primary key using index tablespace\
    \ users,\n    dept_desc varchar2(30)\n);\n```\n\n**Note** When you create a primary\
    \ key constraint, Oracle will also create a unique index with the same name as\
    \ the constraint.\n\nYou can also specify the primary key constraint definition\
    \ after the columns have been defined. The advantage of doing this is that you\
    \ can define the constraint on multiple columns. The next example creates the\
    \ primary key when the table is created, but not inline with the column definition:\n\
    \n```sql\ncreate table dept(\n    dept_id number,\n    dept_desc varchar2(30),\n\
    \    constraint dept_pk primary key (dept_id)\n    using index tablespace prod_index\n\
    );\n```\n\nIf the table has already been created and you want to add a primary\
    \ key constraint, use the `ALTER TABLE` statement. This example places a primary\
    \ key constraint on the `DEPT_ID` column of the `DEPT` table:\n\n```sql\nalter\
    \ table dept add constraint dept_pk primary key (dept_id)\nusing index tablespace\
    \ users;\n```\n\nWhen a primary key constraint is enabled, Oracle will automatically\
    \ create a unique index associated with the primary key constraint. Some DBAs\
    \ prefer to first create a non-unique index on the primary key column and then\
    \ define the primary key constraint:\n\n```sql\ncreate index dept_pk on dept(dept_id);\n\
    \nalter table dept add constraint dept_pk primary key (dept_id);\n```\n\nThe advantage\
    \ to this approach is that you can drop or disable the primary key constraint\
    \ independently of the index. When working with large data sets, you may want\
    \ that sort of flexibility. If you don’t create the index before creating the\
    \ primary key constraint, then whenever you drop or disable the primary key constraint,\
    \ the index is automatically dropped.\n\nConfused as to which method to use to\
    \ create a primary key? All of the methods are valid and have their merits. The\
    \ following table summarizes the primary key and unique key constraint creation\
    \ methods.\n\n```text\n**Table 18-1. Primary Key and Unique Key Constraint Creation\
    \ Methods**\n\n**Constraint Creation Method** | **Advantages** | **Disadvantages**\n\
    --- | --- | ---\nInline, no name | Very simple | Oracle-generated name makes troubleshooting\
    \ harder; less control over storage attributes; only applied to single column\n\
    Inline, with name | Simple; user-defined name makes troubleshooting easier | Requires\
    \ more thought than inline without name\nInline, with name and tablespace | Full\
    \ control over constraint and index naming and storage | More complex syntax\n\
    ```\n\nNotice the `&&MASTER_USER` variable with the two dots appended to it in\
    \ the `SELECT` statement. A single dot at the end of an ampersand variable instructs\
    \ `SQL*Plus` to concatenate anything after the single dot to the ampersand variable.\
    \ So when you place two dots together, that tells `SQL*Plus` to concatenate a\
    \ single dot to the string contained in the ampersand variable.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)"
