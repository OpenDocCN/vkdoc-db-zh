  trans: "# 6-12. 计算两个日期或日期部分之差\n\n## 问题\n您希望计算两个日期或日期时间值之间经过的时间。\n\n## 解决方案\nOracle\
    \ 支持使用加减符号等常规运算符进行直观的日期和日期时间算术运算。将两个日期相减以求其差值是可行的，但产生的结果不一定易于理解。例如，我们可以使用下面的 SQL\
    \ 语句来查找 `HR.EMPLOYEES` 表中员工的任职时长，但随后必须处理以小数表示的非整天数部分。\n\n```sql\nselect employee_id,\
    \ first_name, last_name, sysdate - hire_date Length_of_employment from hr.employees;\n\
    ```\n\n| EMPLOYEE_ID | FIRST_NAME | LAST_NAME | LENGTH_OF_EMPLOYMENT |\n|-------------|------------|-----------|----------------------|\n\
    | 198         | Donald     | OConnell  | 3636.5341            |\n| 199       \
    \  | Douglas    | Grant     | 3430.5341            |\n| 200         | Jennifer\
    \   | Whalen    | 7931.5341            |\n| 201         | Michael    | Hartstein\
    \ | 4856.5341            |\n| 202         | Pat        | Fay       | 4309.5341\
    \            |\n| …           |            |           |                     \
    \ |\n\n如果您在计算日期和时间差，通常希望精确到秒，甚至更小的时间单位。如果您在为一份人类可读的报告计算员工任职时长，您可能希望以年或年和月为单位表示值。在此类报告中，精确到秒的小数几乎没有必要。接下来的\
    \ SQL 语句同时输出了精确到秒的数值和人类可读的年月形式。\n\n```sql\nselect employee_id, first_name, last_name,\n\
    \       (sysdate - hire_date)*86400 Emp_Length_Seconds,\n       extract(year from\
    \ (sysdate - hire_date) year to month) || ' years, ' ||\n       extract(month\
    \ from (sysdate - hire_date) year to month) || ' months. '\n       Emp_Length_Readable\n\
    from hr.employees;\n```\n\n| EMPLOYEE_ID | FIRST_NAME | LAST_NAME | EMP_LENGTH_SECONDS\
    \ | EMP_LENGTH_READABLE  |\n|-------------|------------|-----------|--------------------|----------------------|\n\
    | 198         | Donald     | OConnell  | 314198410          | 9 years, 11 months.\
    \  |\n| 199         | Douglas    | Grant     | 296400010          | 9 years, 5\
    \ months.   |\n| 200         | Jennifer   | Whalen    | 685286410          | 21\
    \ years, 9 months.  |\n| 201         | Michael    | Hartstein | 419606410    \
    \      | 13 years, 4 months.  |\n| 202         | Pat        | Fay       | 372345610\
    \          | 11 years, 10 months. |\n| …           |            |           |\
    \                    |                      |\n\n## 工作原理\n如果被问到“你在这里工作多久了？”，您不太可能回答“3636.5341\
    \ 天”。然而，如果您确实需要那种以天和天的小数表示的值，那么我们方案中第一个 SQL 语句的默认减法运算即可实现。我们选择员工的 ID、名和姓，然后使用等式\
    \ `sysdate - hire_date` 进行简单的日期运算。我们为其指定了一个更具可读性的别名 `LENGTH_OF_EMPLOYMENT`。Oracle\
    \ 在内部执行其日期差计算并返回结果。\n\n更可能的情况是，您需要一个精确的数字，它不会显示给任何人，而是用于后续处理或计算，或者需要一个人类可读的描述来表示两个日期之间经过的时间。我们通过将计算出的以天为单位的经过时间乘以一天的秒数\
    \ `86400`，来实现任职秒数的精确计算。\n\n`(sysdate - hire_date)*86400`\n\n虽然我们为显示的结果提供了一个有意义的名称\
    \ `EMP_LENGTH_SECONDS`，但很可能您会将此类计算以不可见的方式用于其他语句或 PL/SQL 过程及函数中。\n\n第二个计算是为了返回更符合英语语言习惯的响应，它更为精细，值得更深入的解释。\n\
    \n```sql\nextract(year from (sysdate - hire_date) year to month) || ' years, '\
    \ ||\nextract(month from (sysdate - hire_date) year to month) || ' months. '\n\
    Emp_Length_Readable\n```\n\n在此子句中，我们首先使用 `EXTRACT` 函数从基础计算 `SYSDATE - HIRE_DATE`\
    \ 中提取年份数。我们使用 `YEAR TO MONTH` 间隔数据类型将基础算术结果准确地转换为可用于提取已过年间隔的形式。我们第二次执行相同的计算，但在第二次实例中，我们使用\
    \ `EXTRACT` 找出两个日期之间经过的间隔中剩余的月份部分。最后，我们使用 `||` 连接运算符将计算出的年和月间隔与单词 “years” 和 “months”\
    \ 连接起来，并为整个结果赋予一个有意义的别名 `EMP_LENGTH_READABLE`。\n\n# 6-13. 确定任意年份的复活节日期\n\n## 问题\n\
    您希望动态地确定给定年份的复活节日期。\n\n## 解决方案\nOracle 没有提供一个单一、优雅的函数来为您执行复活节计算。但 Oracle 确实拥有强大的日期算术函数，我们可以用它们来构建我们自己的复活节计算器。这就引出了一个问题，我们究竟如何确定复活节的日期？\n\
    \n对于格里高利历下的复活节，复活节星期日是四旬斋后第一个满月之后的星期日。现代算法将其转化为 3 月 21 日或之后第一个满月之后的第一个星期日。\n\n\
    以下函数返回指定年份的复活节星期日的日期。\n\n```sql\ncreate or replace function easter_sunday(given_year\
    \ number) return date as\n  golden_metonic number;\n  century number;\n  leap_year_fix\
    \ number;\n  lunar_sync number;\n  sunday_date number;\n  epact number;\n  day_of_month\
    \ number;\n  easter_offset number;\nbegin\n  golden_metonic := mod(given_year,19)\
    \ + 1;\n  century := (given_year / 100) + 1;\n  leap_year_fix := (3 * century\
    \ / 4) - 12;\n  lunar_sync := ((8 * century + 5)/25) - 5;\n  sunday_date := (5\
    \ * given_year / 4) - leap_year_fix - 3;\n  epact := mod((11 * golden_metonic\
    \ + 20 + lunar_sync - leap_year_fix),30);\n  if((epact = 25 and golden_metonic\
    \ < 11) or (epact = 24)) then\n    epact := epact + 1;\n  end if;\n  day_of_month\
    \ := 44 - epact;\n  if(day_of_month < 21) then\n    day_of_month := day_of_month\
    \ + 30;\n  end if;\n  easter_offset := (day_of_month + 7 - mod((sunday_date +\
    \ day_of_month),7)) - 1;\n  return to_date('01-MAR-' || to_char(given_year),'DD-MON-YYYY')\
    \ + easter_offset;\nend;\n/\n```\n\n我们本可以用纯 SQL 将其编写为一个相当庞大的嵌套 `IF` 和 `CASE` 语句集，但这个函数在实践中既更易于阅读，也更易于使用。我们现在可以找到任何给定年份的复活节，例如下面\
    \ SQL 语句中显示的 2000 年。\n\n```sql\nselect easter_sunday(2000)\nfrom dual;\n```\n\n\
    | EASTER_SUNDAY |\n|---------------|\n| 23-APR-00     |\n\n我们还可以动态确定当前年份的复活节星期日，而无需显式指定年份。接下来的\
    \ SQL 语句展示了这一点。\n\n```sql\nselect easter_sunday(extract(year from (sysdate)))\n\
    from dual;\n```\n\n| EASTER_SUNDAY |\n|---------------|\n| 12-APR-09     |\n\n\
    ## 工作原理\n我们不是从“3 月 21 日之后满月后的第一个星期日”这一概念出发，从基本原理推导算法，而是将求助于计算机算法的元老，Donald Knuth。Knuth\
    \ 在《*计算机编程艺术，第一卷*》（Addison-Wesley 出版社）中提供了一个极好的算法来确定复活节的星期日。\n\nKnuth 的算法接受一个年份，计算一个黄金“默冬”周期、世纪、闰年偏移、月球同步和一个“纪龄”值，然后返回复活节星期日是在\
    \ 3 月 1 日之后多少天。所有其他复活节日期都可以由此推导出来。事实上，其他日期如圣灰星期三、棕枝主日等，都可以通过固定的偏移量计算出来。"
- fmt: "# 6-14. Calculating \"X Day Active\" Users for a Web Site\n\n## Problem\n\
    You want to track how many unique web site visitors or customers you’ve had in\
    \ the last seven days.\n\n## Solution\nOracle’s date arithmetic together with\
    \ the `DISTINCT` operator for dealing with duplicates are the perfect tools for\
    \ tracking details like seven-day or one-month active users. In fact, any duration\
    \ window can be tracked. The main consideration is adapting the technique to the\
    \ way the visitor or customer data is collected and stored.\n\nFor our recipe,\
    \ we’ll use the sales history data collected in the `SH.SALES` table. This tracks\
    \ simple data like customer ID, the date and time a purchase was made, and the\
    \ sales channel used. This mimics what many web sites collect for their shopping\
    \ cart data. Where you wish to track simple visitors, this kind of data is analogous\
    \ to a web server log that tracks visitor IP address, page requested, and date\
    \ and time of request.\n\nUse this SQL statement to show customers making a purchase\
    \ in the seven days up to December 31, 2001.\n\n```sql\nselect count(distinct\
    \ cust_id) Seven_Day_Customers\nfrom sh.sales\nwhere time_id > to_date('31-DEC-2001')\
    \ - 7;\n```\n\nOur results indicate the number of unique customers who have placed\
    \ orders in the last seven days.\n\n```\nSEVEN_DAY_CUSTOMERS\n-------------------\n\
    \                801\n```\n\n## How It Works\nOracle supports the `COUNT(DISTINCT\
    \ …)` aggregate function to enable you to count distinct rows with data. We use\
    \ this in our `SELECT` clause to count our unique customers. The sole criterion\
    \ in the `WHERE` clause acts to control our time window. Our use of `TIME_ID >\
    \ TO_DATE('31-DEC-2001') - 7` is a shorthand way of writing this criterion.\n\n\
    ```sql\nwhere time_id between to_date('24-DEC-2001') and to_date('31-DEC-2001')\n\
    ```\n\nThis saves us from having to write a nested subquery to first find the\
    \ unique values, and then an outer query to count those unique values. That’s\
    \ still perfectly legal SQL, and we could write our recipe to use the nested subquery\
    \ if required, as shown in the next SQL statement.\n\n```sql\nselect count(*)\
    \ Seven_Day_Customers\nfrom\n  (select distinct cust_id\n   from sh.sales\n  \
    \ where time_id > to_date('31-DEC-2001') - 7\n  );\n```\n\nIf we had simply counted\
    \ all the customer IDs noted in the seven-day range, we would have included repeat\
    \ purchases by the same client, which is not what our problem statement set out\
    \ to find.\n\n```sql\nselect count(cust_id) Seven_Day_Sales\nfrom sh.sales\nwhere\
    \ time_id > to_date('31-DEC-2001') - 7;\n```\n\n```\nSEVEN_DAY_SALES\n---------------\n\
    \           4807\n```\n\nIt is good to know we made 4807 sales in that week, but\
    \ we’re missing the vital detail of how many unique clients bought our products.\n\
    \nA more general form of the recipe to find unique seven-day customers would target\
    \ the most recent data, based on using the current date returned from `SYSDATE`\
    \ or `CURRENT_DATE`. The next statement shows this general form.\n\n```sql\nselect\
    \ count(distinct cust_id) Seven_Day_Customers\nfrom sh.sales\nwhere time_id between\
    \ sysdate and sysdate - 7;\n```\n\nNote that if you run this against the `SH.SALES`\
    \ table in the Oracle example `SH` schema, you won’t see any data returned, as\
    \ there are no sales after 2001 in that table. However, the applicability remains.\n\
    \n## Caution\nBecause we are using the `COUNT(DISTINCT …)` form of the `COUNT`\
    \ aggregate, we do `not` count `NULL` values encountered in the `CUST_ID` field.\
    \ This is a moot point in this instance, as there are no such `NULL` values in\
    \ the `SH.SALES` table for `CUST_ID`. However, it is important to remember that\
    \ only the `COUNT(*)` form of the `COUNT` function observes `NULL` values. All\
    \ other types of `COUNT` ignore `NULL` values.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 6 ■ WORKING WITH DATE AND TIME VALUES\n\n164\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# CHAPTER 7"
