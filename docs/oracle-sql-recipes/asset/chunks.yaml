    other programming language. You could use an existing table, but it might have
    too few or too many rows for your needs.


    Solution


    You can use a little-known (until now) side-effect of Oracle’s CONNECT BY hierarchical
    feature by not specifying the START WITH or CONNECT BY clauses. Here is how to
    generate 1000 rows in sequence: select level new_pk from dual connect by level
    <= 1000;


    NEW_PK


    ...


