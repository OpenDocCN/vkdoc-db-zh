- fmt: "# 20-10\\. 细粒度审计\n\n## 问题\n\n你拥有一些关于员工薪水的敏感数据。你希望审计对表中特定列的任何类型访问。你需要比标准审计更细粒度的审计。\n\
    \n## 解决方案\n\n使用 Oracle 细粒度审计（FGA）来监控任何用户从特定列的选择。按照以下步骤实现 FGA：\n\n**注意** 细粒度审计功能需要\
    \ Oracle 企业版。\n\n1.  使用 `DBMS_FGA` 包创建一个策略。此示例为 `INV` 表创建一个策略，指定任何针对 `EMP` 表 `SALARY`\
    \ 列的 `INSERT`、`UPDATE`、`DELETE` 或 `SELECT` 语句都将被记录到审计跟踪中：\n\n```\nbegin\n    dbms_fga.add_policy\
    \ (\n        object_schema   => 'INV',\n        object_name     => 'EMP',\n  \
    \      audit_column    => 'SALARY',\n        policy_name     => 'S1_AUDIT',\n\
    \        statement_types => 'INSERT, UPDATE, DELETE, SELECT',\n        audit_trail\
    \     => DBMS_FGA.DB_EXTENDED\n    );\nend;\n/\n```\n\n2.  通过查询 `DBA_AUDIT_POLICIES`\
    \ 视图来验证策略是否存在：\n\n```\nselect object_schema\n      ,object_name\n      ,policy_name\n\
    \      ,sel, ins, upd, del, policy_column\nfrom dba_audit_policies;\n```\n\n此示例的输出如下：\n\
    \n```\nOBJECT_SCHEMA OBJECT_NAME POLICY_NAME SEL INS UPD DEL POLICY_COL\n--------------\
    \ -------------- -------------- ----- ----- ----- ----- ----------\nINV      \
    \      EMP           S1_AUDIT       YES  YES  YES  YES  SALARY\n```\n\n3.  要查看\
    \ FGA 审计跟踪中记录的 SQL 语句，请从 `DBA_FGA_AUDIT_TRAIL` 视图中选择：\n\n```\nselect\n    db_user\n\
    \   ,to_char(timestamp,'dd-mon-yy hh24:mi:ss') ts\n   ,sql_text\nfrom dba_fga_audit_trail\n\
    order by timestamp;\n```\n\n**注意** `DBA_FGA_AUDIT_TRAIL` 视图基于 `FGA_LOG$` 表。\n\n\
    以下是一些示例输出：\n\n```\nDB_USER    TS                   SQL_TEXT\n---------- --------------------\
    \ --------------------------\nINV        21-jul-09 21:47:07   select * from emp\n\
    SYSTEM     21-jul-09 21:58:36   select salary from inv.emp\n```\n\n如果需要禁用策略，请使用\
    \ `DISABLE_POLICY` 过程：\n\n```\nSQL> exec dbms_fga.disable_policy('INV','EMP','S1_AUDIT');\n\
    ```\n\n要删除策略，请使用 `DROP_POLICY` 过程：\n\n```\nSQL> exec dbms_fga.drop_policy('INV','EMP','S1_AUDIT');\n\
    ```\n\n作为 `SYS` 方案，你可以按如下方式清除细粒度审计审计表中的记录：\n\n```\ntruncate table fga_log$;\n\
    ```\n\n## 工作原理\n\n细粒度审计允许你在比简单的 `INSERT`、`UPDATE`、`DELETE` 和 `SELECT` 操作更细的粒度级别上审计\
    \ SQL。FGA 审计允许你审计在列级别发生的 SQL 活动。FGA 审计还允许你对操作执行布尔检查，例如“如果选定的值在某个范围内，则审计该活动”。\n\
    \n你通过使用 FGA 策略来管理细粒度审计。`DBMS_FGA` 包允许你添加、禁用、启用和删除 FGA 策略。你需要 `DBMS_FGA` 包上的执行权限来管理审计策略。\n\
    \n**提示** 有关细粒度审计的更多详细信息，请参阅 Oracle 的《安全指南》，可从 otn.oracle.com 网站获取。\n\n## 提示\n\n\
    如果你只需要知道是否正在对表进行插入、更新或删除，可以使用 `USER_TAB_MODIFICATIONS` 视图来报告此类活动。此视图包含诸如 `INSERTS`、`UPDATES`、`DELETES`\
    \ 和 `TRUNCATED` 等列，这些列将提供有关如何修改表中数据的信息。\n\n****索引**\n\n■**符号和数字**\n\n在多个级别聚合数据，[30-32](#index_split_000.html#p58)\n\
    \n*（星号）占位符，[5](#index_split_000.html#p33)\n\n按时间段，[159-160](#index_split_002.html#p187)\n\
    \n%（百分号）字符，在字符串中搜索，\n\n在其它查询中使用结果，[32-33](#index_split_000.html#p60)\n\n字符串，[169](#index_split_002.html#p197)\n\
