- fmt: '- Tables you know will grow large; it''s better to create a table as partitioned
    rather than rebuild as partitioned when performance begins to suffer as the table
    grows


    - Rows can be divided in a way that facilitates parallel operations like loading,
    archiving, retrieval, or backup and recovery


    One general rule is that any table over 2 gigabytes in size is a potential candidate
    for partitioning.


    Run this query to show the top space-consuming objects in your database:


    ```sql

    select * from (

    select owner, segment_name, segment_type, sum(extents) num_ext, sum(bytes) tot
    from dba_segments

    group by owner, segment_name, segment_type order by sum(extents) desc) where rownum
    < 10;

    ```


    Here is a snippet of the output from the query:


    ```

    OWNER SEGMENT_NAME SEGMENT_TYPE NUM_EXT TOT

    --------------- --------------------- --------------- ---------- ----------

    REP_MV REG_QUEUE_REP TABLE 6273 6577717248

    CIA_STAR F_DOWNLOADS_IDX1 INDEX 2927 3069181952

    REP_MV CWP_USER_PROFILE TABLE 2332 2445279232

    ```


    The output shows that there are large tables in this database that might benefit
    from partitioning.


    In addition to looking at the size of objects, if you can divide your data so
    that it facilitates operations such as loading data, querying, backups, archiving,
    and deleting, you should consider using partitioning. For example, if you work
    with a large table that contains data that is often accessed by a particular time
    range, such as by day, week, month, or year, it makes sense to consider partitioning.


