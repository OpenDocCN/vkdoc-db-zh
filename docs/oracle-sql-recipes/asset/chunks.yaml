    img_blb into lBlob; -- save pointer for local use


    dbms_output.put_line(''Attempt retrieval of: '' || r_img_list.img_url);


    -- attempt to retrieve image via HTTP


    l_http_request := utl_http.begin_request(r_img_list.img_url); -- request l_http_response
