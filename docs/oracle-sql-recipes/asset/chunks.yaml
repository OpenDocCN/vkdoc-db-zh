  trans: "\n稍加探索，您会很快发现某些值无法用一种或另一种数据类型精确存储。\n\n## 8-3. 选择数据类型的精度与比例\n\n### 问题\n在一个在线购物应用中，您需要存储货币信息，如价格、订单金额和销售折扣。您需要准确地跟踪美元和美分（或其他货币）。\n\
    \n### 解决方案\n几乎所有 Oracle 的 `NUMBER` 类型数据都可以用来存储价格和销售金额。为了更好地说明精度和比例的使用，我们将直接使用\
    \ `NUMBER` 数据类型本身。\n\n我们的示例将专注于在 `OE` 模式中为订单录入系统新建一个表。让我们创建一个表来跟踪客户折扣券。\n```sql\n\
    create table oe.coupons (\n  coupon_code  number(9,0)  not null,\n  customer_id\
    \  number(6,0)  not null,\n  coupon_value number(5,2)  not null,\n  restrictions\
    \ varchar2(100)\n);\n```\n现在，我们可以使用新的 `OE.COUPONS` 表来存储精确的折扣券金额。接下来的 `INSERT`\
    \ 语句演示了向表中添加新数据。\n```sql\ninsert into oe.coupons values\n(1, 150, 29.95, 'No restrictions');\n\
    commit;\n```\n查询该表可显示我们定义在 `CREATE TABLE` 语句中的精度和比例下存储的各个 `NUMBER` 值。\n```sql\n\
    select * from oe.coupons;\n```\n```\nCOUPON_CODE CUSTOMER_ID COUPON_VALUE RESTRICTIONS\n\
    ----------- ----------- ------------ ------------------------------------------\n\
    \          1         150        29.95 No restrictions\n```\n\n### 工作原理\n理解 `NUMBER`、`NUMERIC`\
    \ 和 `DECIMAL` 数据类型格式的最佳方式是将其视为通用形式 `number(p,s)`。\n\n在此表达式中，`number` 是数据类型名称；您可以使用\
    \ `numeric` 或 `decimal`，但要知道它们在存储时被隐式映射到 `NUMBER` 数据类型。值 `p` 是精度，它指定了数字总共可以拥有的位数，*包括*数字的小数（比例）部分。值\
    \ `s` 是比例，它指示在总精度位数中，有多少位专门用于数字的小数部分，即小数点右边的部分。\n\n在我们的 `OE.COUPONS` 表中，您可以推断出\
    \ `COUPON_CODE` 最多可以有 9 位数字，由于比例值为零，因此不允许有小数位。同样，`CUSTOMER_ID` 作为 `OE.CUSTOMERS`\
    \ 表的外键，使用最多六位数字的 `NUMBER`，且不允许有小数位。\n\n`COUPON_VALUE` 字段引入了一个在美元计价及类似系统中常见的货币规格说明。它的精度是五，意味着总共五位数字可用于表示优惠券值的整数和小数部分。比例是二，将\
    \ `COUPON_VALUE` 限制为使用其五位数字中的两位作为小数位。这意味着，只剩下三位数字用于整数美元部分。您可以通过下一个 `INSERT` 语句自己测试这一点，该语句试图创建一个超出我们\
    \ `COUPON_VALUE` 列约束范围的优惠券值。\n```sql\ninsert into oe.coupons values\n(2, 155,\
    \ 1000, 'Requires CEO approval');\n```\n尝试此 `INSERT` 会返回一个错误，指出 `COUPON_VALUE`\
    \ 上的限制。\n```\nERROR at line 2:\nORA-01438: value larger than specified precision\
    \ allowed for this column\n```\n请注意，显示的错误指明是 `COUPON_VALUE` 字段的精度阻止了值 `1000` 的使用。因为该列被指定为\
    \ `COUPON_VALUE NUMBER(5,2) NOT NULL`，Oracle 隐式地只能存储三位精度，意味着最大到 `999`，但不包括需要四位的\
    \ `1000`。人们很容易认为，如果超过了指定的两位小数比例，同样的约束风格也适用于比例。下一个 `INSERT` 语句试图插入一个新优惠券，其比例指定得比表定义允许的要具体得多。\n\
    ```sql\ninsert into oe.coupons values\n(3, 160, 0.9950, 'We will see if anyone\
    \ can spend half a cent!');\n```\n`1 row created.`\n\n第 8 章 ■ 处理数字\n"
- fmt: "# Oracle 数字处理与特殊值管理\n\n## 8-4. 正确处理非数字与无限数字的计算\n\n### 问题\n您需要处理涉及异常结果和非数字值的数值数据。例如，您的计算可能返回超出存储范围的值，或者需要用非错误的方式来标记除数为零的情况。\n\
    \n### 解决方案\n使用 Oracle 的 `BINARY_FLOAT` 和 `BINARY_DOUBLE` 数据类型来支持存储和使用无穷大（`INF`）和非数字（`NAN`）值。本方案将假设一个管理概率计算结果（例如可能用于天文计算）的需求。\n\
    \n下一个示例展示了使用 `BINARY_FLOAT` 数据类型安全处理除数为零的最简单显示方式。\n\n```sql\nselect\n    to_binary_float(42)\
    \ / to_binary_float(0) Div_By_Zero\nfrom dual;\n```\n\n与您可能预期的错误不同，Oracle 返回以下结果。\n\
    ```\nDIV_BY_ZERO\n-----------\nInf\n```\n\n### 工作原理\n`BINARY_FLOAT` 和 `BINARY_DOUBLE`\
    \ 数据类型符合 IEEE 浮点计算标准。该标准强制包含了对特殊值无穷大和非数字的支持。在普通 SQL 中，可能返回错误的计算结果（如除以零）将提供弹性行为，并返回相应的特殊值。这乍看像是一个“免费逃避错误”的方案——但请记住，您的代码和应用程序仍然需要预期这种行为并做出相应处理。\n\
    \n在我们的方案中，我们将数字 `42` 和零转换为 `BINARY_FLOAT`，然后隐式执行了 `BINARY_FLOAT` 除法。这返回了 `INF`\
    \ 值。如果我们尝试使用 `NUMBER` 或 `INTEGER` 值，结果将大不相同。下一条 SQL 语句展示了除以零时您可能预期看到的结果。\n\n```sql\n\
    select 42 / 0\nfrom dual;\n```\n```\nselect 42 / 0\n*\nERROR at line 1:\nORA-01476:\
    \ divisor is equal to zero\n```\n\n这意味着您可以定义所需数据类型的列，例如 `BINARY_DOUBLE`，从而避免为了捕获除数为零的情况而将除法包装在辅助\
    \ PL/SQL 函数或 case 语句中。\n\n试问自己，哪个更容易：是使用 `BINARY_DOUBLE` 的方案，还是下面这段历史上可能用来避免 `ORA-01476`\
    \ 错误的 PL/SQL 和 SQL？\n\n```sql\ncreate or replace procedure safediv (op1 number,\
    \ op2 number) is\n    result number;\nbegin\n    result := op1 / op2;\n    --\
    \ more logic\n    -- ...\nexception\n    when zero_divide then\n        -- throw\
    \ a catchable error, or attempt some other resolution\n        -- ...\nend;\n\
    /\n\nselect safediv(42, 0) from dual;\n```\n\n我们知道当问题需要处理无穷大和非数字时，哪个选项更具吸引力。\n\
    \n然而，必须注意使用 `BINARY_FLOAT` 和 `BINARY_DOUBLE` 是有后果的。其中最主要的是它们使用二进制精度，而非十进制精度。这意味着可以在\
    \ `NUMBER` 或 `FLOAT` 中精确存储的值，可能无法在 `BINARY_FLOAT` 和 `BINARY_DOUBLE` 中精确存储。相反，有些可以精确存储的值，`NUMBER`\
    \ 或 `FLOAT` 会隐式地进行舍入。\n\n另一个主要考虑因素是您的开发环境和/或编程语言是否支持 IEEE 数据类型。如果您后续不得不因为编程语言不理解而丢弃像非数字和无穷大这样的有用特性，那么费心使用这些数据类型就没什么意义了。\n\
    \n**比无穷大更大？**\nOracle 实施 IEEE 标准的一个有趣结果是，非数字值 `NAN` 被认为大于无穷大 `INF`。您可以使用一些快速 SQL\
    \ 自行检查哪个值最大。以下代码正是进行了这样的比较。\n\n```sql\nselect\n    case\n        when to_binary_float('nan')\
    \ > to_binary_float('inf')\n        then 'Nan is greater than Inf'\n        else\
    \ 'Inf is greater than Nan'\n    end Largest_Value\nfrom dual;\n```\n```\nLARGEST_VALUE\n\
    ------------------------------------\nNan is greater than Inf\n```\n\n这意味着如果您使用\
    \ `BINARY_DOUBLE` 或 `BINARY_FLOAT` 数据类型，您的算术运算需要考虑 `NULL`、`NAN` 和 `INF` 值及其特性。\n\
    \n## 8-5. 验证字符串中的数字\n\n### 问题\n您需要解析、验证并转换一个以完整格式文本呈现的数字。例如，您需要接收一个表示外币销售数字的字符串，验证并将其转换为\
    \ Oracle `NUMBER` 以进行进一步处理。\n\n### 解决方案\nOracle 的 `TO_NUMBER` 函数可以将数字的文本表示形式转换为\
    \ `NUMBER` 数据类型，并包含处理区域格式偏好、货币符号和标点符号的能力。\n\n在本方案中，我们将处理从欧洲合作伙伴、客户或供应商处接收的货币数字，该数字根据原产国的惯例进行格式化。十五个欧洲国家使用欧元，通常用自己的符号\
    \ `€` 表示。一些欧洲地区使用逗号作为小数点分隔符，句点作为千位分隔符。数字 `€12.345.687,90` 可以使用 `TO_NUMBER` 函数进行转换，如下面的\
    \ SQL 语句所示。\n\n```sql\nselect to_number(\n          '€12.345.687,90',\n      \
    \    'L99G999G999D99',\n          ' nls_currency = ''€'' nls_numeric_characters\
    \ = '',.'' '\n       ) Profit\nfrom dual;\n```\n```\nPROFIT\n----------\n12345687.9\n\
    ```\n请注意，尾随零的丢失是 `NUMBER` 数据类型修剪无意义尾随零的正常行为，并非此格式化示例的特殊功能。\n\n### 工作原理\n我们的方案使用了\
    \ `TO_NUMBER` 函数的两个主要可选参数：格式掩码和 `NLS_LANGUAGE` 字符串。这些参数协同工作，使 Oracle 能够解析提供的字符串并将其正确转换为数字形式。以下是适用于此类情况的\
    \ `TO_NUMBER` 函数的通用形式：\n```\nto_number(\n    <string representation or expression>,\n\
    \    <format mask>,\n    <nls_language options>\n)\n```\n\n对于我们的方案，字符串是 `€12.345.687,90`。当然，这可以是一个字符串字面量、从表返回的值、视图或任何其他字符串表达式。\n\
    \n我们的格式掩码值为 `L99G999G999D99`。为了节省您翻阅大量 Oracle 文档的时间，记住这些值的简写方法是记住这些字母代表由 `NLS_LANGUAGE`\
    \ 选项字符串提供的替换选项，如下所示：\n*   `L`：本地货币符号\n*   `G`：分组字符（如千位分隔符）\n*   `D`：小数符号\n\n`NLS_LANGUAGE`\
    \ 是一个 `STRING`，其选项会被解析；它并不意味着传递多个参数给 `TO_NUMBER`。选项嵌入在字符串中作为一个参数发送。这是一个非常奇特的行为，可能导致令人沮丧的调试，以确定字符串格式化和转义的引号究竟需要在哪里。在我们的方案中，您会看到选项字符串用单引号括起来。\n\
    ```\n' nls_currency = ''€'' nls_numeric_characters = '',.'' '\n```"
  raw: 'If you were expecting to see an error, you’ve been caught out by Oracle’s
    separate handling of scale beyond the constrained value of the column in question.
    The next SELECT statement will expose what Oracle has done with our fraction of
    a cent.


    select * from oe.coupons;


    COUPON_CODE CUSTOMER_ID COUPON_VALUE RESTRICTIONS


    ----------- ----------- ------------ -------------------------


    1 150 29.95 No restrictions


    3 160 1 We will see if anyone can spend half a cent!


    Where scale is concerned, Oracle will round the fractional part of a number to
    fit the scale specified by the column. So in our recipe, our attempt to store
    a coupon value of 0.9950 is rounded to 1, because the scale of two means 0.9950
    could not be stored. This is not just rounded for display purposes; the value
    1 is what has actually been stored.


    8-4\. Performing Calculations Correctly with Non-Numbers


    and Infinite Numbers


    Problem


    You need to manage numeric data that involves dealing with abnormal results and
    values not considered numbers. For instance, your calculations may return values
    larger than can possibly be stored, or need to flag division by zero with something
    other than an error.


    Solution


    Use Oracle’s BINARY_FLOAT and BINARY_DOUBLE data types to enable the storage and
    use of the values infinity (INF) and not-a-number (NAN). Our recipe will use a
    hypothetical requirement to manage the results of probability calculations, as
    might be used with astronomical calculations.


    The next example provides the simplest display of safe division by zero using
    the BINARY_FLOAT data type.


    select


    to_binary_float(42) / to_binary_float(0) Div_By_Zero


    from dual;


    Instead of the error you might expect, Oracle returns the following results.


    DIV_BY_ZERO


    Inf


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8 ■ WORKING WITH NUMBERS


    How It Works


    The BINARY_FLOAT and BINARY_DOUBLE data types conform to the IEEE standard for
    floating point computation. The IEEE standard includes mandated support for the
    special values infinity and not-a-number. In normal SQL, results from calculations
    that might return an error, such as division by zero, will provide resilient behavior
    and return the appropriate special value. This may seem at first like an


    “escape from your errors for free” recipe—but remember, your code and applications
    still need to expect this behavior and respond accordingly.


    In our recipe, we cast the numbers 42 and zero to BINARY_FLOAT, and then implicitly
    performed a BINARY_FLOAT division. This returned the value INF. If we had attempted
    this with NUMBER or INTEGER


    values, the result would have been quite different. The next SQL statement shows
    the results you probably expect to see when dividing by zero.


    select 42 / 0


    from dual;


    select 42 / 0


    *


    ERROR at line 1:


    ORA-01476: divisor is equal to zero


    This means you can define columns of a desired data type, such as BINARY_DOUBLE
    and avoid the need to wrap your division in a helper PL/SQL function or case statement
    to trap the division by zero.


    Ask yourself, what is easier: our recipe using BINARY_DOUBLE, or the next PL/SQL
    and SQL that historically might have been used to avoid the ORA-01476 error.


    create or replace procedure safediv (op1 number, op2 number) is


    result number;


    begin


    result := op1 / op2;


    -- more logic


    -- ...


    exception


    when zero_divide then


    -- throw a catchable error, or attempt some other resolution


    -- ...


    end;


    /


    select safediv(42, 0) from dual;


    We know which option appeals when a problem calls for handling infinity and not-a-number.


    However, it is important to note that there are consequences to using BINARY_FLOAT
    and BINARY_DOUBLE.


    Principal among these is their use of binary precision, not decimal precision.
    This means that values that can be precisely stored in a NUMBER or FLOAT may not
    be precisely stored in BINARY_FLOAT and BINARY_DOUBLE. Conversely, some values
    can be stored precisely that NUMBER or FLOAT would implicitly round.


    The other major consideration is whether your development environment and/or programming
    language support IEEE data types. There’s little point in going to the effort
    of using these data types if you then have to discard useful features like not-a-number
    and infinity because your programming language doesn’t understand them.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8 ■ WORKING WITH NUMBERS


    **Bigger Than Infinity?**


    One interesting consequence of the IEEE standard— and its implementation in Oracle—
    is that the value not-a-number, NAN, is considered larger than infinity, INF.
    You can check this yourself using some quick SQL to test which is the largest
    value. The following code does just such a comparison.


    select


    case


    when to_binary_float(''nan'') > to_binary_float(''inf'')


    then ''Nan is greater than Inf''


    else ''Inf is greater than Nan''


    end Largest_Value


    from dual;


    LARGEST_VALUE


    Nan is greater than Inf


    This means that your arithmetic needs to account for NULL, NAN, and INF values
    and their quirks if you use the BINARY_DOUBLE or BINARY_FLOAT data types.


    8-5\. Validating Numbers in Strings


    Problem


    You need to parse, validate, and convert a number presented as fully formatted
    text. For example, you need to take a string representation of a sales figure
    in a foreign currency and validate and convert it for further processing as an
    Oracle NUMBER.


    Solution


    Oracle’s TO_NUMBER function can convert textual representations of numbers to
    the NUMBER data type, and includes the ability to handle regional formatting preferences,
    currency symbols, and punctuation.


    For this recipe, we’ll tackle the problem of receiving a currency figure from
    a European partner, customer, or supplier, formatted according to the customs
    of the country of origin. Fifteen European countries use the Euro, typically written
    with its own symbol €. Some European locations use the comma as the decimal separator,
    and the period as a thousands separator. The figure €12.345.687,90 can be converted
    using the TO_NUMBER function, illustrated with the next SQL statement.


    select to_number


    (''€12.345.687,90'',


    ''L99G999G999D99'',


    '' nls_currency = ''''€'''' nls_numeric_characters = '''',.'''' '') Profit


    from dual;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8 ■ WORKING WITH NUMBERS


    PROFIT


    12345687.9


    Note that the loss of the trailing zero is normal NUMBER data type behavior in
    trimming trailing zeros of no significance, not a special feature of this formatting
    example.


    How It Works


    Our recipe uses two of the major optional parameters with the TO_NUMBER function,
    the format mask and the NLS_LANGUAGE string. These parameters work in tandem to
    allow Oracle to parse the provided string and correctly convert it to numeric
    form. Here’s the general form of the TO_NUMBER function for cases such as this:


    to_number


    (<string representation or expression>,


    <format mask>,


    <nls_language options>)


    For our recipe, the string is the figure €12.345.687,90\. Naturally, this can
    be a string literal, a value returned from a table, a view, or any other string
    expression.


    Our format mask has the value L99G999G999D99\. To save you from having to wade
    through pages of Oracle documentation, a shorthand way of remembering these values
    is to keep in mind that the letters stand for substitution options that are provided
    by the NLS_LANGUAGE options string, as follows: L: Local currency symbol


    G: Grouping character (such as the thousands separator)


    D: Decimal symbol


    NLS_LANGUAGE is a STRING whose options are parsed; it does not mean that multiple
    parameters are passed to TO_NUMBER. The options are embedded in the string and
    sent as one paramter. This is very quirky behavior and can lead to frustrating
    debugging to determine where exactly quotes for string formatting and escaping
    are needed. In our recipe, you’ll see that the options string is enclosed in single
    quotes.


    '' nls_currency = ''''€'''' nls_numeric_characters = '''',.'''' '''
