    有编程背景的读者会发现，零长度字符串的概念与此类似——字符串内存中只有字符串终止符（`\0`）作为其唯一组成部分。相比之下，未实例化的字符串则没有已知状态……甚至连终止符都没有。你不会将零长度字符串和未实例化字符串互换使用，但这与
    Oracle 处理 `NULL` 的方式类似。


    ## `NULL` 没有等价物


    在 SQL 中使用 `NULL` 的日常操作（或常规工作）常会让人困惑。SQL 表达式是三值逻辑，意味着每个表达式可以是 `true`、`false` 或
    `NULL`。正如你已看到的，这会影响所有类型的比较、运算符和逻辑判断。但这种逻辑的一个细微之处常被遗忘，因此我们在此明确重申：`NULL` 没有等价物。没有任何值与
    `NULL` 相同，*甚至其他的 `NULL` 值也不例外*。如果你运行以下查询，能猜到结果吗？


    ```sql

    select first_name, last_name

    from hr.employees

    where commission_pct = NULL;

    ```


    答案是不会选出任何行。尽管你从本示例中上面的 `SELECT` 语句已看到有 72 名员工的 `COMMISSION_PCT` 为 `NULL`，但没有任何
    `NULL` 值等于另一个 `NULL`，因此 `COMMISSION_PCT = NULL` 这个条件永远不会匹配，你也就永远无法从此查询中看到结果。


    务必使用 `IS NULL` 和 `IS NOT NULL` 来查找或排除 `NULL` 值。


    ## 1-14. 按照人的预期进行排序


    ### 问题


    你的文本数据以大小写和句子形式混合存储。你需要以通常人们自然的方式，按不区分大小写的字母顺序对这些数据进行排序。


    ### 解决方案


    为了向 `HR.EMPLOYEES` 表中引入一些混合大小写的数据，让我们运行以下 `UPDATE` 语句，将 William Smith 的姓氏改为大写。


    ```sql

    update hr.employees

    set last_name = ''SMITH''

    where employee_id = 171;

    ```


    这条 `select` 语句展示了 Oracle 对员工姓氏的默认排序。


    ```sql

    select last_name

    from hr.employees

    order by last_name;

    ```


    ```

    LAST_NAME

    …

    Rogers

    Russell

    SMITH

    Sarchand

    Sciarra

    Seo

    Sewall

    Smith

    Stiles

    Sullivan

    …

    ```


    敏锐的读者可能已经预料到这个结果。默认情况下，Oracle 使用二进制排序顺序。这意味着在这个简单示例中，文本是根据所用代码页（`US7ASCII`、`WEISO8859P1`
    等）中的数值等价项进行排序的。在这些代码页中，大小写字母具有不同的值，大写字母排在前面。这就是为什么大写的 `SMITH` 排在所有以大写 `S` 开头的其他姓名之前。


    大多数人期望看到的是两个“Smith”值排在一起，而不区分大小写。下面的 `NLS` 指令可以实现这一结果。


    ```sql

    alter session set NLS_SORT=''BINARY_CI'';


    select last_name

    from hr.employees

    order by last_name;

    ```


    ```

    LAST_NAME

    …

    Rogers

    Russell

    Sarchand

    Sciarra

    Seo

    Sewall

    Smith

    SMITH

    Stiles

    Sullivan

    …

    ```


    ### 工作原理


    Oracle 支持区分大小写和不区分大小写的排序顺序。默认情况下，你处于名为 `BINARY` 的区分大小写排序环境中。对于每一种这样的排序顺序，都存在一个使用后缀
    `_CI` 的等效不区分大小写顺序。我们改用 `BINARY_CI` 排序顺序，并重新运行查询，以看到普通用户预期的结果顺序。


    顾名思义，`NLS_SORT` 选项仅影响排序。它并不影响大小写敏感性的其他方面。使用 `NLS_SORT=''BINARY_CI''` 时，尝试以不区分大小写的方式比较数据仍然会表现出
    Oracle 的默认行为。


    ```sql

    select first_name, last_name

    from hr.employees

    where last_name like ''s%'';

    ```


    ```

    no rows selected

    ```


    别担心。Oracle 提供了一个类似的选项，可以实现这种不区分大小写的比较。


    **提示** 更传统的方法可以在不更改任何 `NLS` 参数的情况下解决此问题。你可以使用 Oracle 的 `UPPER` 和 `LOWER` 函数将列名、字面量或两者都转换为大写或小写来进行比较。

