- fmt: "# CHAPTER 11 ■ COMMON REPORTING PROBLEMS\n\n```\nEMPLOYEE_ID LAST_NAME SALARY_GRAPH\n\
    ----------- --------- -------------------------\n100         King      XXXXXXXXXXXXXXXXXXXXXXXX\n\
    101         Kochhar   XXXXXXXXXXXXXXXXX\n102         De Haan   XXXXXXXXXXXXXXXXX\n\
    145         Russell   XXXXXXXXXXXXXX\n146         Partners  XXXXXXXXXXXXX\n201\
    \         Hartstein XXXXXXXXXXXXX\n205         Higgins   XXXXXXXXXXXX\n108   \
    \      Greenberg XXXXXXXXXXXX\n147         Errazuriz XXXXXXXXXXXX\n168       \
    \  Ozer      XXXXXXXXXXX\n148         Cambrault XXXXXXXXXXX\n...\n```\n\nWe’ve\
    \ cut the results at ten lines to save space, but try this recipe for yourself\
    \ to see what an ASCII graph with a long tail looks like. Other useful implementations\
    \ of this technique include visualizing overlapping time windows, for instance\
    \ in project tasks or resource allocation.\n\n## How It Works\n\nThe key to our\
    \ recipe’s graphical gymnastics is the `RPAD` function, which simply reproduces\
    \ the same character—in this case the `X` character—as many times as instructed.\
    \ To create a graph that is proportional to an employee’s salary, we simply pass\
    \ `RPAD` the salary value. In our recipe, we’ve taken the floor of the salary\
    \ when divided by 1000, as this provides a graph of the same relative size, without\
    \ requiring 24000 `X`s for the highest-paid employee.\n\nIn this recipe, this\
    \ means someone with a salary between 8000 and 9000 will have eight `X`’s printed,\
    \ while someone with a salary between 9000 and 10000 will have ten `X`s, and so\
    \ on.\n\nThere is one quirk to this recipe. The `RPAD` function obeys Oracle’s\
    \ `NULL` handling rules, so we can’t start with an empty string (which Oracle\
    \ considers `NULL`) and add `X`s to that. In practice, this means an `RPAD`-style\
    \ graph must have at least one character. If accuracy at this low level is important\
    \ to you, wrap the `RPAD` function in a `CASE` expression to substitute a true\
    \ `NULL` value for those rows that should be represented with no characters.\n\
    \n## 11-9. Producing Web-Page Reports Directly from the Database\n\n### Problem\n\
    \nYou’d like to produce graphical web-page reports directly from the database,\
    \ without having to use an additional reporting application to generate HTML.\
    \ For instance, you’d like a graphical depiction of relative salary across all\
    \ employees.\n\n### Solution\n\nWhile you may not think of Oracle as a GUI designer\
    \ for web sites, using simple functions like `ROUND`, `TO_CHAR`, `||` string concatenation,\
    \ and literal strings can produce all of the textual elements that make up a HTML\
    \ page or report.\n\nThe next SQL statement builds all of the HTML required to\
    \ represent employee salary in a comparative graph.\n\n```sql\nselect\n  case\
    \ rownum\n    when 1 then\n      '<html>' || chr(10) ||\n      '<head>' || chr(10)\
    \ ||\n      '<style type=\"text/css\">' || chr(10) ||\n      ' body {background-color:\
    \ Lavender;}' || chr(10) ||\n      ' table.outer {width: 80%; border: Black solid\
    \ 1px;}' || chr(10) ||\n      ' table.inner {width: 100%; border: none;}' || chr(10)\
    \ ||\n      ' th {background-color: LightSteelBlue; color: WhiteSmoke;}' || chr(10)\
    \ ||\n      ' .bar {background-color: LightSlateGray;}' || chr(10) ||\n      '\
    \ .empty {background-color: Lavender;}' || chr(10) ||\n      ' .left {text-align:\
    \ left; padding-left: 5px;}' || chr(10) ||\n      ' .right {text-align: right;\
    \ padding-right: 5px;}' || chr(10) ||\n      '</style>' || chr(10) ||\n      '</head>'\
    \ || chr(10) ||\n      '<body>' || chr(10) ||\n      '<center>' || chr(10) ||\n\
    \      '<table class=\"outer\">' || chr(10) ||\n      '<tr>' || chr(10) ||\n \
    \     '<th width=\"15%\">Employee ID</th>' || chr(10) ||\n      '<th width=\"\
    20%\">Last Name</th>' || chr(10) ||\n      '<th>Salary Graph</th>' || chr(10)\
    \ || '</tr>'\n    else ''\n  end ||\n  '<tr><td class=\"right\">' || to_char(employee_id)\
    \ || '</td>' || chr(10) ||\n  '<td class=\"left\">' || last_name || '</td>' ||\
    \ chr(10) ||\n  '<td class=\"left\">' ||\n    '<table class=\"inner\">' || chr(10)\
    \ ||\n    '<tr><td class=\"bar\" width=\"' ||\n      to_char(round(100 * salary\
    \ / maxsalary)) ||\n      '%\">' || chr(38) || 'nbsp;</td>' || chr(10) ||\n  \
    \  '<td class=\"empty\" width=\"' ||\n      to_char(100 - round(100 * salary /\
    \ maxsalary)) ||\n      '%\">' || chr(38) || 'nbsp;</td></tr>' || chr(10) ||\n\
    \    '</table></td></tr>' || chr(10) ||\n  case rownum\n```"
