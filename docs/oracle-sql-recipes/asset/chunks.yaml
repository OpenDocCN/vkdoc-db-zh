    Here is a partial listing of the output (truncated in order to fit on the page):


    | Id | Operation | Name | Rows | Bytes | Cost (%CPU)| Time |


    | 0 | SELECT STATEMENT | | | | 1 (100)| |


    | 1 | TABLE ACCESS BY | PARTIES | 1 | 47 | 1 (0)| 00:00:01 |


    |* 2 | INDEX UNIQUE SC| SYS_C0047742 | 1 | | 1 (0)| 00:00:01 |


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    19-9\. Tracing All SQL Statements for a Session


    Problem


    A user running an application that calls hundreds of SQL statements is having
    performance issues. You want to determine specifically which statements are consuming
    the most resources.


    Solution


    You can instruct Oracle to capture resources consumed and execution plans for
    all SQL statements run by a session. One technique for enabling SQL tracing is
    to use the DBMS_SESSION package. You’ll need the ALTER SESSION privilege granted
    to your schema before you can execute this: SQL> exec dbms_session.set_sql_trace(sql_trace=>true);


    ■ **Note** The TIMED_STATISTICS initialization parameter must be set to TRUE (the
    default setting) before you can generate SQL trace statistics.


    Now any SQL you run will be traced. For demonstration purposes, we’ll trace the
    following SQL


    statement:


    select ''my_trace'' from dual;


    To turn off SQL tracing for a session, you can either log out of SQL*Plus or use
    DBMS_SESSION to disable tracing:


    SQL> exec dbms_session.set_sql_trace(sql_trace=>false);


    Now inspect the value of your USER_DUMP_DEST initialization parameter: SQL> show
    parameter user_dump_dest


    NAME TYPE VALUE


    -------------------------- ----------- --------------------------------------


    user_dump_dest string /oracle/diag/rdbms/rmdb11/RMDB11/trace From the operating
    system, navigate to the user dump destination directory: $ cd /oracle/diag/rdbms/rmdb11/RMDB11/trace


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    ■ **Tip** You can assign your trace file an easily identifiable name by setting
    the TRACEFILE_IDENTIFIER


    initialization parameter before you enable tracing. For example, ALTER SESSION
    SET


    TRACEFILE_IDENTIFIER=FOO will produce a trace file with the name of <SID>_ora_<PID>_FOO.trc.


    There may be hundreds of trace files in your user dump destination directory.
    Look for the most recent files. In this example, we know that our trace file will
    contain the string of my_trace within it (from running the SQL above). In a Unix
    environment, you can search for that string with the grep command: $ grep -i my_trace
    *.trc


    RMDB11_ora_21846.trc: select ''my_trace'' from dual


    Oracle provides the tkprof command line utlity to translate the contents of a
    trace file into human-readable format. This utility is located in the ORACLE_HOME/bin
    directory (along with all other standard Oracle utilities like sqlplus, expdp,
    and so on). Provide tkprof with the username and password of the schema you used
    to generate the trace file (in this example it’s heera/foo): $ tkprof RMDB11_ora_21846.trc
    readable.txt explain=heera/foo sys=no


    ■ **Tip** Run tkprof from the command line without any parameters to view all
    options for this utility. By default, SQL statements are reported in the order
    in which they were run. You can alter the sort order using the SORT


    parameter to order the output by CPU, disk reads, elapsed time, and so on.


    Now inspect the readable.txt file with a text editor. Here is some sample output
    from the text file: call count cpu elapsed disk query current rows


    ------- ------ -------- ---------- ---------- ---------- ---------- ----------


    Parse 1 0.01 0.01 0 0 0 0


    Execute 1 0.00 0.00 0 0 0 0


    Fetch 2 0.00 0.00 2 3 0 1


    ------- ------ -------- ---------- ---------- ---------- ---------- ----------


    total 4 0.01 0.01 2 3 0 1


    Misses in library cache during parse: 1


    Optimizer mode: ALL_ROWS


    Parsing user id: 28 (HEERA)


    Rows Row Source Operation


    ------- ---------------------------------------------------


    1 SORT AGGREGATE (cr=3 pr=2 pw=2 time=0 us)


    103 TABLE ACCESS FULL EMP (cr=3 pr=2 pw=2 time=4 us cost=2 size=0 card=103) 477


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    Rows Execution Plan


    ------- ---------------------------------------------------


    0 SELECT STATEMENT MODE: ALL_ROWS


    1 SORT (AGGREGATE)


    103 TABLE ACCESS MODE: ANALYZED (FULL) OF ''EMP'' (TABLE)


    The tkprof output gives detailed information on the resources consumed by each
    SQL statement issued while tracing was enabled. Use this utility to identify which
    SQL statements are potential bottlenecks and tune them accordingly.


    ■ **Tip** By default, the permissions on trace files only permit the Oracle software
    operating system owner to view the files. To enable public read permissions on
    the trace files, set the initialization parameter _TRACE_FILES_PUBLIC to TRUE.
    However, you should do this only on test or development systems where developers
    need access to trace files for tuning purposes.


