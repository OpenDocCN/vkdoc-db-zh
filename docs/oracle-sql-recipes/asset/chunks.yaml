    13-2\. Sorting Nodes Within a Hierarchical Level


    Problem


    You want to sort the rows at the same level in a hierarchy that are underneath
    the same parent row.


    Solution


    Use the SIBLINGS keyword in the ORDER BY clause. If you want to sort the employees
    by last name within each manager, the standard ORDER BY clause will not work,
    since it will sort on the last name independent of the level within the tree hierarchy.
    Instead, you must use the ORDER SIBLINGS BY clause, as in this example:


    select employee_id, level,


    lpad('' '',(level-1)*3) || last_name || '', '' || first_name full_name


    from employees


    start with manager_id is null


    connect by manager_id = prior employee_id


    order **siblings** by last_name, first_name


    ;


