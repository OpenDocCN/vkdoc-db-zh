  trans: "\n使用 `FULL OUTER JOIN`。正如您所预料的那样，两个或多个表之间的全外连接将返回查询中每个表的所有行，并在可能的情况下进行匹配。您可以对\
    \ `EMPLOYEES` 和 `DEPARTMENTS` 表使用 `FULL OUTER JOIN`，如下所示：\n\n## 第 3 章 ■ 从多表查询\n\
    \n```sql\nselect employee_id, last_name, first_name, department_id, department_name\n\
    from employees\nfull outer join departments\nusing(department_id)\n;\n```\n\n\
    ```\nEMPLOYEE_ID LAST_NAME FIRST_NAME DEPARTMENT_ID DEPARTMENT_NAME\n------------\
    \ ----------------- ------------- ---------------- --------------------\n100 King\
    \ Steven 90 Executive\n101 Kochhar Neena 90 Executive\n102 De Haan Lex 90 Executive\n\
    . . .\n177 Livingston Jack 80 Sales\n178 Grant Kimberely\n179 Johnson Charles\
    \ 80 Sales\n. . .\n206 Gietz William 110 Accounting\n180 Construction\n190 Contracting\n\
    230 IT Helpdesk\n123 rows selected\n```\n\n`注意`：在使用 `FULL`、`LEFT` 或 `RIGHT` 连接时，`OUTER`\
    \ 关键字是可选的。它确实能为您的查询增加文档价值，清楚地表明来自一个或两个表的不匹配行将包含在结果中。\n\n使用 `FULL OUTER JOIN` 是快速查看两个表之间不匹配情况的好方法。在上面的输出中，您可以看到一个没有部门的员工，以及几个没有员工的部门。\n\
    \n### 工作原理\n\n在 Oracle9i 之前，实现全外连接有点不雅观：您必须使用 Oracle 专有语法，对两个外连接（左外连接和右外连接）执行\
    \ `UNION`，如下所示：\n\n```sql\nselect employee_id, last_name, first_name, e.department_id,\
    \ department_name\nfrom employees e, departments d\nwhere e.department_id = d.department_id\
    \ (+)\nunion\nselect employee_id, last_name, first_name, e.department_id, department_name\n\
    from employees e, departments d\nwhere e.department_id (+) = d.department_id\n\
    ;\n```\n\n运行两个独立的查询，然后去重，比使用 `FULL OUTER JOIN` 语法执行时间更长，因为后者只需要对每个表进行一次扫描。\n\n\
    您可以调整 `FULL OUTER JOIN` 以仅生成不匹配的记录，如下所示：\n\n```sql\nselect employee_id, last_name,\
    \ first_name, department_id, department_name\nfrom employees\nfull outer join\
    \ departments\nusing(department_id)\nwhere employee_id is null or department_name\
    \ is null\n;\n```\n\n## 3-5. 根据其他表中的数据删除行\n\n### 问题\n\n您想从一个表中删除行，前提是这些行在第二个表中存在对应行。例如，您想从\
    \ `EMPLOYEES_RETIRED` 表中删除任何在 `EMPLOYEES` 表中存在的员工对应的行。\n\n### 解决方案\n\n使用带有子查询的\
    \ `IN` 或 `EXISTS` 子句。您有一个名为 `EMPLOYEES_RETIRED` 的表，它应该只包含——您猜对了——退休员工。然而，`EMPLOYEES_RETIRED`\
    \ 表错误地包含了一些在职员工，因此您想从 `EMPLOYEES_RETIRED` 表中移除这些在职员工。您可以这样做：\n\n```sql\ndelete\
    \ from employees_retired\nwhere employee_id\nin (select employee_id from employees)\n\
    ;\n```\n\n### 工作原理\n\n当使用 `SELECT` 时，您可以相对奢侈地使用连接条件来返回结果。但在删除行时，除非连接条件在子查询中，或者您使用内联视图，否则无法执行显式连接，如下所示：\n\
    \n```sql\ndelete (\n  select employee_id\n  from employees_retired join employees\
    \ using(employee_id)\n);\n```\n\nSQL 标准将视图视为与表类似，不仅可以对视图运行 `SELECT` 语句，还可以在特定情况下进行\
    \ `INSERT`、`UPDATE` 和 `DELETE`。如果满足这些情况（例如，您有一个键保留表，没有聚合等），`DELETE` 将只删除 `FROM`\
    \ 子句中的第一个表。请注意：如果您的 `DELETE` 语句如下所示，您将无法得到预期的结果：\n\n```sql\ndelete (\n  select\
    \ employee_id\n  from employees join employees_retired using(employee_id)\n);\n\
    ```\n"
- fmt: "The rows will be deleted from the `EMPLOYEES` table instead, and that is not\
    \ the desired result!\n\nAnother potential solution to the problem uses an `EXISTS`\
    \ clause to determine which rows to delete:\n```sql\ndelete from employees_retired\
    \ er\nwhere exists (\n    select 1 from employees e\n    where er.employee_id\
    \ = e.employee_id\n);\n```\nThis is not as elegant as the first solution, but\
    \ might be more efficient. It appears contrived, and it is, because Oracle never\
    \ uses the results of the query anywhere. It only uses the subquery to verify\
    \ the existence of a match, and then deletes the corresponding row(s). You can\
    \ use a “1”, an “X”, or even `NULL`; internally, Oracle translates the result\
    \ to a zero and does not use it.\n\nWhether you use `IN` or `EXISTS` depends on\
    \ the sizes of the driving table (the outer table referenced in the `SELECT`,\
    \ `UPDATE`, or `DELETE`) and the size of the result set in the subquery. Using\
    \ `IN` is most likely better if the results of the subquery are small or is a\
    \ list of constants. However, using `EXISTS` may run a lot more efficiently since\
    \ the implicit `JOIN` may take advantage of indexes. The bottom line is, it depends.\
    \ Look at the execution plans for each method (`IN` versus `EXISTS`), and if the\
    \ relative row counts remain stable whenever the query is run, you can use whichever\
    \ method is faster.\n\n## 3-6. Finding Matched Data Across Tables\n\n### Problem\n\
    You want to find the rows in common between two or more tables or queries.\n\n\
    ### Solution\nUse the `INTERSECT` operator. When you use `INTERSECT`, the resulting\
    \ row set contains only rows that are in common between the two tables or queries:\n\
    ```sql\nselect count(*) from employees_act;\nCOUNT(*)\nselect count(*) from employees_new;\n\
    COUNT(*)\nselect * from employees_act\nintersect\nselect * from employees_new;\n\
    EMPLOYEE_ID FIRST_NAME LAST_NAME\n---------------------- --------------------\
    \ -------------------------\n105        David      Austin\n112        Jose Manuel\
    \ Urman\n2 rows selected\n```\n\n### How It Works\nThe `INTERSECT` operator, along\
    \ with `UNION`, `UNION ALL`, and `MINUS`, joins two or more queries together.\
    \ As of Oracle Database 11g, these operators have equal precedence, and unless\
    \ you override them with parentheses, they are evaluated in left-to-right order.\
    \ Or, more intuitively since you usually don’t have two queries on one line, top-to-bottom\
    \ order!\n\n**Tip** Future ANSI SQL standards give the `INTERSECT` operator higher\
    \ precedence than the other operators. Thus, to “bulletproof” your SQL code, use\
    \ parentheses to explicitly specify evaluation order where you use `INTERSECT`\
    \ with other set operators.\n\nTo better understand how `INTERSECT` works, Figure\
    \ 3-1 shows a Venn diagram representation of the `INTERSECT` operation on two\
