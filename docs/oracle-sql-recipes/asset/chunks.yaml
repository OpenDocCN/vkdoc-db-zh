- fmt: "# CHAPTER 12 ■ CLEANSING DATA\n\n## 12-2. Removing Duplicate Rows\n\n### Problem\n\
    You want to remove duplicate rows from a table.\n\n### Solution\nUse a correlated\
    \ subquery to remove duplicate rows from a table. The following example removes\
    \ duplicate rows from the `PARTIES` table where there are duplicates on the column\
    \ `PARTY_ID`:\n\n```\ndelete from parties a\nwhere a.rowid <\n    (select max(b.rowid)\n\
    \       from parties b\n      where a.party_id = b.party_id);\n```\n\nBefore you\
    \ issue a delete statement like this, you should run a query similar to the one\
    \ in recipe 12-1 to determine how much data will be removed.\n\n### How It Works\n\
    Each row in the database has a unique `ROWID`. The `DELETE` statement in the solution\
    \ section will arbitrarily delete all rows with the same `PARTY_ID` except the\
    \ row with the highest `ROWID`.\n\nIf there are multiple columns that comprise\
    \ your unique identifier, use all of those columns in the correlated subquery\
    \ `WHERE` clause. For example, if your primary key logically consists of `FIRST_NAME`\
    \ and `LAST_NAME`, issue the following SQL statement to delete duplicates:\n\n\
    ```\ndelete from parties a\nwhere a.rowid <\n    (select max(b.rowid)\n      \
    \ from parties b\n      where a.first_name = b.first_name\n        and a.last_name\
    \ = b.last_name);\n```\n\nListed next is a slight variation of the SQL in the\
    \ solution section of this recipe:\n\n```\ndelete from parties\n where rowid not\
    \ in\n    (select max(rowid)\n       from parties\n      group by party_id);\n\
    ```\n\nUsing this query or the previous one is a matter of SQL coding preference.\
    \ If you generate execution plans for each query, you’ll notice that there isn’t\
    \ much difference in the cost.\n\n## 12-3. Determining if Data Can Be Loaded as\
    \ Numeric\n\n### Problem\nYou have a field that has been defined as character\
    \ string in the old system but will be migrated to a numeric number field in the\
    \ new database. You have the data loaded into a temporary staging table and you\
    \ want to determine if any of the character data will not convert cleanly to a\
    \ numeric data type.\n\n### Solution\nYou need to create a small PL/SQL function:\n\
    \n```\ncreate or replace function isnum(v_in varchar2)\nreturn varchar is\n  val_err\
    \ exception;\n  pragma exception_init(val_err, -6502); -- char to num conv. error\n\
    \  scrub_num number;\nbegin\n  scrub_num := to_number(v_in);\n  return 'Y';\n\
    exception\n  when val_err then\n    return 'N';\nend;\n/\n```\n\nIf the value\
    \ passed into the `ISNUM` function is a number, then a `Y` is returned. If the\
    \ value cannot be converted to a number, then an `N` is returned.\n\n### How It\
    \ Works\nYou can use the `ISNUM` function to detect whether data in a column is\
    \ numeric. The function defines a PL/SQL pragma exception for the `ORA-06502`\
    \ character-to-number conversion error. When this error is encountered, the exception\
    \ handler captures it and returns an `N`.\n\nYou can use this function to determine\
    \ if a character can be converted to a number. For example, say you have a table\
    \ named `STAGE` and it contains a column named `HOLD_COL` with the following values\
    \ in it:\n\n```\nHOLD_COL\n------------------------------\n1\nc\n3\n$\n```"
