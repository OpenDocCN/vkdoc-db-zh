    # 第 9 章 ■ 事务管理


    在事务处理环境中，你经常会遇到死锁。虽然 Oracle 会自动解决这些死 lock，但死锁会导致延迟并额外消耗不必要的资源——并且仍然必须在你的应用程序中处理。


    ## 解决方案


    死锁是一种更严重的锁冲突类型，因为这种锁无法通过等待某个用户`COMMIT`或`ROLLBACK`来解决，因为每个会话都在等待对方持有的资源。


    例如，请考虑**`表 9-1.`**中描述的场景。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 22](img/index-245_1.png)


    ### **`表 9-1.`** 典型的死锁场景


    **时间**


    **会话 A DML**


    **会话 B DML**


    上午 9:55


    `update employees set salary = salary * 1.25 where employee_id = 105;`


    `update employees set job_id = ''IT_WEB'' where employee_id = 110;`


    上午 9:58


    `update employees set salary = salary * 1.35 where employee_id = 110;`


    上午 9:59


    `update employees set job_id = ''IT_WEB'' where employee_id = 105;`


    大约在上午 9:55，两个独立的会话在`EMPLOYEES`表中对员工编号 105 和 110 运行`UPDATE`语句；它们成功完成但尚未提交。到目前为止，一切正常。上午
    9:58，会话 A 对员工 110 运行一条`UPDATE`语句，该语句暂停，因为会话 B 已锁定了该行。这仍然不是主要问题。然而，到了上午 9:59，会话
    B 试图更新一行（员工编号 105 的行），而该行已被会话 A 锁定。现在，两个会话都在等待对方释放所需的资源。


    该问题的即时解决方案无需用户干预：Oracle 检测到死锁并自动回滚其中一个事务，释放其中一组行锁，以便另一个会话的 DML 能够完成。然而，该会话仍然在等待已存在的锁。因此，这是一个在命令行使用`NOWAIT`或在应用程序中使用类似逻辑的好场景。其语句被回滚的会话会收到如**`图
    9-1.`**所示的错误消息。


    ### **`图 9-1.`** Oracle 死锁解析错误消息


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    然后，用户可以尝试重试导致死锁的原始 DML 语句，因为另一个会话的 DML 语句可能已经完成并提交。


    ## 工作原理


    虽然 Oracle 会自动回滚涉及死锁的一条语句，但当这些死 lock 发生时，你仍然会导致用户延迟并浪费数据库资源。有很多方法可以完全避免死锁。例如，对于**`表
    9-1.`**中的示例，似乎是按列而非按行执行维护任务。换句话说，一个用户正在修改所有薪资，而另一个用户正在修改职位角色。如果用户改为针对单个员工维护所有列，则很可能避免这种死锁情况。


    死锁的另一个常见原因是显式锁的级别设置得过高。Oracle 在分析 DML 语句后，通常会在最低级别加锁，通常不需要显式加锁。


    ## 9-5. 延迟约束验证


    ### 问题


    你的数据库中有许多外键强制实施引用完整性（RI）的依赖关系，通常称为父/子关系，并且你希望防止由于向父表和子表插入`INSERT`语句的顺序而导致事务失败。


    ### 解决方案


    使用约束定义中的`DEFERRABLE`关键字，在事务中引用的子表上删除并重新创建约束。例如，`HR`模式中的`EMPLOYEES`表在`JOB_ID`列上有一个名为`EMP_JOB_FK`的外键（FK）约束。此约束确保在`EMPLOYEES`表的`JOB_ID`列中输入的任何职位标识符必须作为主键（PK）存在于`JOBS`表中。以下是删除并重新创建该约束的
    SQL：


    ```sql

    alter table employees drop constraint emp_job_fk;

    ```

    '
- fmt: '# 延迟外键约束


    ```sql

    alter table employees

    add constraint emp_job_fk

    foreign key (job_id)

    references hr.jobs(job_id)

    initially deferred deferrable

    enable

    ;

    ```


    对 `EMPLOYEES` 表未来的插入或更新操作，直到执行 `COMMIT` 命令时，才会验证 `JOB_ID` 列中插入的值是否在 `JOBS` 表中存在。如果约束在提交时无效，整个事务将被回滚并显示错误信息。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第9章 ■ 管理事务


    ### 工作原理


    对于 `EMPLOYEES` 表，必须提供一个部门标识符 (`JOB_ID`)，因为该列不可为空。如果员工属于一个新部门，但 `DEPARTMENTS` 表中对应的行还不存在，而你想在该部门行可用之前，就在事务中使用该员工编号进行其他操作，这就陷入了一个两难境地。你可以等到所有父表中的信息都就绪，但这可能会在员工需要她的身份徽章且员工编号必须印在徽章上时造成瓶颈。在另一种场景中，你可能从每日数据源获取所有员工和部门数据，但数据的顺序无法保证是新部门先于新员工。


    如果你尝试向 `EMPLOYEES` 表插入一行，其作业标识符尚不存在，且约束未被设置为延迟，那么当你尝试执行插入时会发生以下情况：


    ```sql

    insert into employees

    (employee_id, first_name, last_name, email, hire_date, job_id)

    values

    (301, ''Ellen'', ''Kruser'', ''EKRU'', ''31-may-1966'', ''IT_WEB'')

    ;

    ```


    ```

    Error starting at line 1 in command:

    insert into employees

    (employee_id, first_name, last_name, email, hire_date, job_id)

    values

    (301, ''Ellen'', ''Kruser'', ''EKRU'', ''31-may-1966'', ''IT_WEB'')

    Error report:

    SQL Error: ORA-02291: integrity constraint (HR.EMP_JOB_FK) violated - parent key
    not found

    02291. 00000 - "integrity constraint (%s.%s) violated - parent key not found"

    *Cause: A foreign key value has no matching primary key value.

    *Action: Delete the foreign key or add a matching primary key.

    ```


    如果约束被设置为 `DEFERRABLE`，那么 `INSERT` 会成功。然而，如果父表 `DEPARTMENTS` 中的行还不存在，执行 `COMMIT`
    将导致以下结果：


    ```sql

    insert into employees

    (employee_id, first_name, last_name, email, hire_date, job_id)

    values

    (301, ''Ellen'', ''Kruser'', ''EKRU'', ''31-may-1966'', ''IT_WEB'')

    ;

    1 rows inserted

    commit;

    ```


    ```

    Error starting at line 6 in command:

    commit

    Error report:

    SQL Error: ORA-02091: transaction rolled back

    ORA-02291: integrity constraint (HR.EMP_JOB_FK) violated - parent key not found

    02091. 00000 - "transaction rolled back"

    *Cause: Also see error 2092. If the transaction is aborted at a remote site then
    you will only see 2091; if aborted at host then you will see 2092 and 2091.

    *Action: Add rollback segment and retry the transaction.

    ```


    因此，你必须确保在提交前，父行（在 `DEPARTMENTS` 表中）是存在的，如下例所示：


    ```sql

    insert into employees

    (employee_id, first_name, last_name, email, hire_date, job_id)

    values

    (301, ''Ellen'', ''Kruser'', ''EKRU'', ''31-may-1966'', ''IT_WEB'')

    ;

    1 rows inserted

    insert into jobs

    (job_id, job_title)

    values

    (''IT_WEB'', ''Web Developer'')

    ;

    1 rows inserted

    commit;

    commit succeeded.

    ```


    请注意，对 `DEPARTMENTS` 表的 `INSERT` 发生在对 `EMPLOYEES` 表的 `INSERT` 之后。因为 `JOB_ID` 列上的约束被设置为
    `DEFERRABLE`，所以插入的顺序可以是任意的，只要在执行 `COMMIT` 时数据是一致的。


    当你重新创建约束时，可以将延迟约束设置为 `INITIALLY DEFERRED` 或 `INITIALLY IMMEDIATE`。换句话说，即使约束被设置为
    `DEFERRABLE`，你仍然可以通过默认设置 `INITIALLY IMMEDIATE` 来最初执行即时约束检查。如果约束被创建为 `INITIALLY
    DEFERRED`，如本解决方案所示，你可以使用以下语句打开即时约束检查：'
