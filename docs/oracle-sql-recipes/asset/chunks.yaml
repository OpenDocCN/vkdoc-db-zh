  trans: "\n# 1-1. 从表中检索数据\n\n## 问题\n\n你想要从一个表中检索特定的行和列数据。\n\n## 解决方案\n\n执行一条包含 `WHERE`\
    \ 子句的 `SELECT` 语句。下面是一个简单的 `SELECT` 语句示例，它针对数据库表中符合定义条件的行，查询特定的列值：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**第 1 章 ■ 基础知识**\n\n```sql\nselect employee_id, first_name, last_name, hire_date,\
    \ salary\nfrom hr.employees\nwhere department_id = 50\nand salary < 7500;\n```\n\
    \n当在加载了示例 `HR` 模式的 Oracle 11g 数据库上运行时，该 `SELECT` 语句返回 45 行。以下是你会看到的前 10 行。\n\n\
    ```\nEMPLOYEE_ID FIRST_NAME LAST_NAME HIRE_DATE SALARY\n----------- ----------\
    \ --------- --------- ------\n        198 Donald     OConnell  21-JUN-99   2600\n\
    \        199 Douglas    Grant     13-JAN-00   2600\n        123 Shanta     Vollman\
    \   10-OCT-97   6500\n        124 Kevin      Mourgos   16-NOV-99   5800\n    \
    \    125 Julia      Nayer     16-JUL-97   3200\n        126 Irene      Mikkilineni\
    \ 28-SEP-98   2700\n        127 James      Landry    14-JAN-99   2400\n      \
    \  128 Steven     Markle    08-MAR-00   2200\n        129 Laura      Bissot  \
    \  20-AUG-97   3300\n        130 Mozhe      Atkinson  30-OCT-97   2800\n...\n\
    ```\n\n## 工作原理\n\n该 `SELECT` 语句的格式旨在帮助你理解（或复习）构成一个可工作查询的基本元素。查询的第一行明确说明了我们希望包含在结果中的五个列。\n\
    \n```sql\nselect employee_id, first_name, last_name, hire_date, salary\n```\n\n\
    下一行是 `FROM` 子句，指定了要引用的表（或多表）以提取我们希望看到的列：\n\n```sql\nfrom hr.employees\n```\n\n\
    在这个例子中，我们使用了双部分对象命名法，同时指定了表名 `EMPLOYEES` 以及 `employees` 所属的模式 `HR`。这样可以区分 `HR`\
    \ 模式中的 `EMPLOYEES` 表与任何其他模式中可能存在的其他 `employees` 表，更重要的是，可以避免在未指定模式时，默认隐式选择用户自身模式或当前设置模式中的表。\n\
    \n接下来我们列出 `WHERE` 子句，其中包含两个必须满足才能将行包含在我们结果中的条件。\n\n```sql\nwhere department_id\
    \ = 50\nand salary < 7500\n```\n\n`EMPLOYEES` 表中的行必须同时满足这两个测试才能包含在我们的结果中。只满足一个条件而不满足另一个，将无法满足我们的查询，因为我们使用了\
    \ `AND` 布尔运算符来组合条件。用非技术术语来说，这意味着一名员工必须列在 ID 为 `50` 的部门中，并且工资低于 `7500`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**第 1 章 ■ 基础知识**\n\n其他布尔运算符是 `OR` 和 `NOT`，它们遵循正常的布尔优先级规则，并且可以使用括号来明确修改逻辑。我们可以修改第一个例子来展示这些运算符的组合使用：\n\
    \n```sql\nselect employee_id, first_name, last_name, hire_date, salary\nfrom hr.employees\n\
    where department_id = 50\nand (salary < 2500 or salary > 7500);\n```\n\n此查询寻求与第一个查询相同的列，但这次关注的是部门\
    \ `50` 中工资低于 `2500` 或高于 `7500` 的成员。\n\n```\nEMPLOYEE_ID FIRST_NAME LAST_NAME HIRE_DATE\
    \ SALARY\n----------- ---------- --------- --------- ------\n        120 Matthew\
    \    Weiss     18/JUL/96   8000\n        121 Adam       Fripp     10/APR/97  \
    \ 8200\n        122 Payam      Kaufling  01/MAY/95   7900\n        127 James \
    \     Landry    14/JAN/99   2400\n        128 Steven     Markle    08/MAR/00 \
    \  2200\n        132 TJ         Olson     10/APR/99   2100\n        135 Ki   \
    \      Gee       12/DEC/99   2400\n        136 Hazel      Philtanker 06/FEB/00\
    \   2200\n```\n\n在示例 `HR` 模式中，只有 8 行匹配这些条件。\n\n# 1-2. 从表中选择所有列\n\n## 问题\n\n你想要从表中检索所有列，但不想花时间键入所有列名作为\
    \ `SELECT` 语句的一部分。\n\n## 解决方案\n\n使用星号 (`*`) 占位符来表示表的所有列。例如：\n\n```sql\nselect\
    \ *\nfrom hr.employees\nwhere department_id = 50\nand salary < 7500;\n```\n\n\
    我们的结果显示了换行且仅列出了部分数据以节省空间，但你可以看到星号对所选列的效果：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**第 1 章 ■ 基础知识**\n"
- fmt: '# SQL 基础操作示例


    ## 数据查询结果示例


    ```

    EMPLOYEE_ID FIRST_NAME LAST_NAME EMAIL PHONE_NUMBER HIRE_DATE JOB_ID SALARY

    COMMISSION_PCT MANAGER_ID DEPARTMENT_ID

    ----------- ---------- --------- -------- ------------ ---------- --------- ------

    -------------- ---------- -------------

    198 Donald OConnell DOCONNEL 650.507.9833 21-JUN-99 SH_CLERK 2600

    124 50

    199 Douglas Grant DGRANT 650.507.9844 13-JAN-00 SH_CLERK 2600

    124 50

    123 Shanta Vollman SVOLLMAN 650.123.4234 10-OCT-97 ST_MAN 6500

    100 50

    ```


    ## 如何工作


    在 SQL 中，`*` 是一个表示表中所有列名的快捷方式。当 Oracle 的解析器在查询中看到 `SELECT *` 时，解析器会将 `*` 替换为所有可能的列名列表（标记为隐藏的列除外）。使用
    `SELECT *` 是构建临时查询的快速方法，因为您无需查找并输入所有正确的列名。


    在您忍不住对所有查询使用星号之前，重要的是要记住，良好的设计通常意味着只显式命名您感兴趣的那些列。这会带来更好的性能，因为 Oracle 否则必须读取系统目录来确定要包含在查询中的字段。指定显式列还可以保护您免受未来可能添加列到表中的问题。如果您编写的代码期望使用星号带来的隐式顺序，当该顺序意外更改时（例如以不同方式删除并重新创建表，或向表中添加新列），您可能会遇到令人不快的意外。


    在大多数情况下，星号最好保留用于交互式查询和临时分析。


    ## 1-3. 对结果进行排序


    ### 问题


    用户希望以特定方式查看查询排序后的数据。例如，他们希望看到员工按姓氏字母顺序排序，然后是名字。


    ### 解决方案


    Oracle 使用标准的 `ORDER BY` 子句来允许您对查询结果进行排序。


    ```sql

    select employee_id, first_name, last_name, hire_date, salary

    from hr.employees

    where salary > 5000

    order by last_name, first_name;

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### 第 1 章 ■ 基础知识


    结果如下。


    ```

    EMPLOYEE_ID FIRST_NAME LAST_NAME HIRE_DATE SALARY

    ----------- ---------- --------- --------- ------

    174 Ellen Abel 11/MAY/96 11000

    166 Sundar Ande 24/MAR/00 6400

    204 Hermann Baer 07/JUN/94 10000

    167 Amit Banda 21/APR/00 6200

    172 Elizabeth Bates 24/MAR/99 7300

    151 David Bernstein 24/MAR/97 9500

    169 Harrison Bloom 23/MAR/98 10000

    148 Gerald Cambrault 15/OCT/99 11000

    154 Nanette Cambrault 09/DEC/98 7500

    110 John Chen 28/SEP/97 8200

    …

    ```


    ### 如何工作


    此解决方案中的 `ORDER BY` 子句指示 Oracle 按 `LAST_NAME` 列排序，当 `LAST_NAME` 值匹配时，再按 `FIRST_NAME`
    列排序。除非另有指示，Oracle 隐式使用升序排序，因此数字从零到九排序，字母从 A 到 Z 排序，依此类推。您可以使用 `ASC` 和 `DESC` 选项显式控制升序和降序排序方向。


    这是一个例子：


    ```sql

    select employee_id, first_name, last_name, hire_date, salary

    from hr.employees

    where salary > 5000

    order by salary desc;

    ```


    我们对薪水进行的显式降序排序结果如下：


    ```

    EMPLOYEE_ID FIRST_NAME LAST_NAME HIRE_DATE SALARY

    ----------- ---------- --------- --------- ------

    100 Steven King 17-JUN-87 24000

    102 Lex De Haan 13-JAN-93 17000

    101 Neena Kochhar 21-SEP-89 17000

    145 John Russell 01-OCT-96 14000

    146 Karen Partners 05-JAN-97 13500

    …

    ```


    ## 1-4. 向表中添加行


    ### 问题


    您需要向表中添加新的数据行。例如，一位新员工加入公司，需要将他的数据添加到 `HR.EMPLOYEES` 表中。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### 第 1 章 ■ 基础知识


    ### 解决方案


    使用 `INSERT` 语句向表中添加新行。要向表添加新行，请为所有必填列提供值，以及任何可选列的值。这是一条添加新员工的语句：


    ```sql

    insert into hr.employees

    (employee_id, first_name, last_name, email, phone_number, hire_date, job_id, salary,
    commission_pct, manager_id, department_id)

    values

    (207, ''John '', ''Doe '', ''JDOE '', ''650.555.8877 '', ''25-MAR-2009 '', ''SA_REP
    '', 3500, 0.25, 145, 80);

    ```


    ### 如何工作


    `INSERT` 语句将值列表与列列表关联起来。它基于该关联创建一行，并将该行插入到目标表中。


    Oracle 将检查 `NULL` 约束以及主键、外键和其他已定义约束，以确保插入数据的完整性。有关确定表上约束状态以及它们可能如何影响插入新数据的配方，请参见第
    10 章。


    您可以通过检查表的描述来检查哪些字段是必填的（定义为 `NOT NULL`）。您可以从 SQL Developer 或 SQL*Plus 中发出 `DESCRIBE`
    命令（可以缩写为 `DESC`）来实现。例如：


    ```sql

    desc hr.employees;

    ```


    ```

    Name Null Type

    ------------------------------ -------- ------------

    EMPLOYEE_ID NOT NULL NUMBER(6)

    FIRST_NAME VARCHAR2(20)

    LAST_NAME NOT NULL VARCHAR2(25)

    EMAIL NOT NULL VARCHAR2(25)

    PHONE_NUMBER VARCHAR2(20)

    HIRE_DATE NOT NULL DATE

    JOB_ID NOT NULL VARCHAR2(10)

    SALARY NUMBER(8,2)

    COMMISSION_PCT NUMBER(2,2)

    MANAGER_ID NUMBER(6)

    DEPARTMENT_ID NUMBER(4)

    11 rows selected

    ```


    您可以通过不枚举列名列表，并为当前表定义中的*每一列*按正确顺序提供数据来编写更短的 `INSERT` 语句。这是一个例子：


    ```sql

    insert into hr.employees

    values

    (208, ''Jane '', ''Doe '', ''JADOE '', ''650.555.8866 '', ''25-MAR-2009 '', ''SA_REP
    '', 3500, 0.25, 145, 80)

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### 第 1 章 ■ 基础知识


    **注意** 省略列名列表很少（如果有的话）是一个好主意——这是出于一些相当严重的原因。您不知道未来可能会对表进行哪些更改，并且通过假设隐式列顺序，您会使您的
    SQL 对未来的架构更改变得脆弱。也许可以说明可能出现问题的最佳例子是静默逻辑损坏。如果有人以不同的列顺序重建基础表，但您的 `INSERT` 语句通过了数据类型和其他检查，您可能会发现自己将数据静默地插入到了错误的列中，带来灾难性的后果。我们强烈建议始终在
    `INSERT` 语句中枚举列。


    ## 1-5. 将行从一个表复制到另一个表


    ### 问题


    您想将信息从一个表复制到另一个表。


    ### 解决方案


    使用带有 `SELECT` 选项的 `INSERT` 语句将数据从一个表复制到另一个表。假设您有一个候选职位申请表，其中许多详细信息与 `HR.EMPLOYEES`
    表相同。这个 `INSERT` 语句将基于对 `CANDIDATES` 表的 `SELECT` 语句插入到 `HR.EMPLOYEES` 表中。


    ```sql

    insert into hr.employees

    (employee_id, first_name, last_name, email, phone_number, hire_date, job_id, salary,
    commission_pct, manager_id, department_id)

    select 210, first_name, last_name, email, phone_number, sysdate, ''IT_PROG'',
    3500, NULL, 103, 60

    from hr.candidates

    where first_name = ''Susan''

    and last_name = ''Jones'';

    ```


    ### 如何工作


    此配方将要插入到 `HR.EMPLOYEES` 表中的值播种为对 `CANDIDATES` 表进行 `SELECT` 的结果。`SELECT` 语句可以单独运行以查看传递给
    `INSERT` 语句的数据。


    ```sql

    select 210, first_name, last_name, email, phone_number, sysdate, job_id, 3500,
    NULL,

    ''IT_PROG'', 103

    from hr.candidates

    where first_name = ''Susan''

    and last_name = ''Jones'';

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### 第 1 章 ■ 基础知识


    ```

    210 FIRST_NAME LAST_NAME EMAIL PHONE_NUMBER SYSDATE ''IT_PRO 3500 N 103 60

    --- ---------- --------- ------ ------------ --------- ------- ---- - --- --

    210 Susan Jones SJONES 650.555.9876 30-MAR-09 IT_PROG 3500 103 60

    ```'
