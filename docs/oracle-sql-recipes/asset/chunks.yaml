    # ABOUT THE AUTHORS


    ## About the Authors


    - **Grant Allen** has worked in the IT field for 20 years, most recently as Chief
    Technology Officer for a leading Australian software vendor before taking on his
    current role at Google. He has worked across the industry, as well as in government
    and academia around the world, consulting on large-scale systems design, development,
    performance, technology innovation, and disruptive change. Grant is a frequent
    speaker at conferences and industry events on topics such as data mining, collaboration
    technologies, relational databases, and the business of technology. He is now
    a team leader at Google, using database technologies to tackle problems of Google-scale
    and beyond.


    - **Bob Bryla** is an Oracle 9i, 10g, and 11g Certified Professional with more
    than 20 years of experience in database design, database application development,
    database administration, and training. Bob is an Internet database analyst and
    Oracle DBA at Lands’ End, Inc., in Dodgeville, Wisconsin. He is the author of
    several other Oracle DBA books for both the novice and seasoned professional.


    - **Darl Kuhn** is an Oracle DBA and developer. He has coauthored three other
    books: *Linux Recipes for Oracle DBAs*, *RMAN Recipes for Oracle Database 11g*,
    and *Oracle RMAN Pocket Reference*. He also teaches advanced database courses
    at Regis University and performs volunteer DBA work for the Rocky Mountain Oracle
    Users Group. He has a graduate degree from Colorado State University and currently
    lives near Mauricio Canyon, Colorado with his wife, Heidi, and daughters, Brandi
    and Lisa.


    xviii ([www.it-ebooks.info](http://www.it-ebooks.info/))


    ## About the Technical Reviewer


    - **Stéphane Faroult** first discovered relational databases and the SQL language
    back in 1983. He joined Oracle France in its early days (after a short spell with
    IBM and a bout of teaching at the University of Ottawa) and soon developed an
    interest in performance and tuning topics. After leaving Oracle in 1988, he briefly
    tried to reform and did a bit of operational research, but after one year he succumbed
    again to relational databases. Stéphane has been continuously performing database
    consultancy since then, relentlessly improving queries and trying to teach good
    SQL manners to developers. He is the author of *The Art of SQL* and of *Refactoring
    SQL Applications*.


    xix ([www.it-ebooks.info](http://www.it-ebooks.info/))


    [www.it-ebooks.info](http://www.it-ebooks.info/)


