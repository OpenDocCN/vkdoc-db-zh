    5-2\. Sorting on Null Values


    Problem


    Results for a business report are sorted by department manager, but you need to
    find a way to override the sorting of nulls so they appear where you want at the
    beginning or end of the report.


    Solution


    Oracle provides two extensions to the ORDER BY clause to enable SQL developers
    to treat NULL values separately from the known data, allowing any NULL entries
    to sort explicitly to the beginning or end of the results.


    For our recipe, we’ll assume that the report desired is based on the department
    names and manager identifiers from the HR.DEPARTMENTS table. This SQL selects
    this data and uses the NULLS FIRST option to explicitly control NULL handling.


    select department_name, manager_id


    from hr.departments


    order by manager_id nulls first;


    The results present the “unmanaged” departments first, followed by the departments
    with managers by MANAGER_ID. We’ve abbreviated the results to save trees.


    DEPARTMENT_NAME MANAGER_ID


    -------------------- ----------


    Control And Credit


    Recruiting


    …


    Shareholder Services


    Benefits


    Executive 100


    IT 103


    …


    Public Relations 204


    Accounting 205


    27 rows selected.


    How It Works


    Normally, Oracle sorts NULL values to the end of the results for default ascending
    sorts, and to the beginning of the results for descending sorts. The NULLS FIRST
    ORDER BY option, together with its complement, NULLS LAST, overrides Oracle’s
    normal sorting behavior for NULL values and places them exactly where you specify:
    either at the beginning or end of the results.


    Your first instinct when presented with the problem of NULL values sorting to
    the “wrong” end of your data might be to simply switch from ascending to descending
    sort, or vice versa. But if you think about more complex queries, subselects using
    ROWNUM or ROWID tricks, and other queries that need to 112


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ COMMON QUERY PATTERNS


    preserve data order while getting NULL values moved, you’ll see that NULLS FIRST
    and NULLS LAST have real utility. Using them *guarantees* where the NULL values
    appear, regardless of how the data values are sorted.


    5-3\. Paginating Query Results


    Problem


    You need to display query results on web pages, showing a subset of results on
    each page. Users will be able to navigate back and forth through the pages of
    results.


    Solution


    Solving pagination problems requires thinking of the process in more generic terms—and
    using several fundamental Oracle features in combination to tackle problems like
    this. What we’re really attempting to do is find a *defined subset* of a set of
    results, whether we display this subset on a web page or report, or feed it in
    to some subsequent process. There is no need to alter your data to add explicit
    page numbers or partitioning details. Our solutions will use Oracle’s ROWNUM pseudo-column
    and ROW_NUMBER OLAP


    function to handle implicit page calculations, and nested subselects to control
    which page of data we see.


    We’ll use the OE.PRODUCT_INFORMATION table as the source for our solution, supposing
    we’ll use the data therein to publish an online shopping web site. In the sample
    schema Oracle provides, the OE.PRODUCT_INFORMATION table holds 288 rows. That’s
    too many for a single web page aesthetically, even though you could technically
    display a list that long. Your poor customers would tire of scrolling before they
    bought anything!


    Thankfully, we can save our clients with the next SELECT statement. We’ll control
    our SELECT


    statement to return 10 results only.


    select product_id, product_name, list_price from


    (select prodinfo.*, rownum r


    from


    (select product_id, product_name, list_price


    from oe.product_information


    order by product_id) prodinfo


    where rownum <= 10)


    where r >= 1;


    For once, we won’t abbreviate the results the solution so you can see we have
    10 rows of results for display on our hypothetical web page.


    PRODUCT_ID PRODUCT_NAME LIST_PRICE


    ---------- -------------------- ----------


    1726 LCD Monitor 11/PM 259


    1729 Chemicals - RCP 80


    1733 PS 220V /UK 89


    1734 Cable RS232 10/AM 6


    1737 Cable SCSI 10/FW/ADS 8


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ COMMON QUERY PATTERNS


    1738 PS 110V /US 86


    1739 SDRAM - 128 MB 299


    1740 TD 12GB/DAT 134


    1742 CD-ROM 500/16x 101


    1743 HD 18.2GB @10000 /E 800


    10 rows selected.


    An alternative technique is to use the ROW_NUMBER OLAP function to perform equivalent
    row numbering, and similarly filter by a predicate on the numbers it produces.


    select product_id, product_name, list_price from


    (select product_id, product_name, list_price,


    row_number() over (order by product_id) r


    from oe.product_information)


    where r between 1 and 10


    The results are the same, including the historical artifacts like 18 gigabyte
    hard disk drives for $800!


    Those were the days.


    How It Works'
  trans: "## 第五章 ■ 常见查询模式\n\n177 利文斯顿 基于佣金\n178 格兰特 基于佣金\n179 约翰逊 基于佣金\n180 泰勒 无佣金\n\
    181 弗勒尔 无佣金\n182 沙利文 无佣金\n\n我们的第三种方法使用 `COALESCE` 函数，为基于佣金的员工返回 `COMMISSION_PCT`\
    \ 和 `SALARY` 的乘积，或者为 `COMMISSION_PCT` 为 `NULL` 的员工返回 `SALARY` 值。\n\n```sql\nselect\
    \ employee_id, last_name,\n       coalesce((1 + commission_pct) * salary, salary)\
    \ as SAL_INC_COMM\n  from hr.employees;\n```\n\nEMPLOYEE_ID LAST_NAME COMM_OR_SAL\n\
    ----------- --------- -----------\n…\n210 King 4375\n211 Sully 4375\n212 McEwen\
    \ 4375\n100 King 24000\n101 Kochhar 17000\n102 De Haan 17000\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n我们的第四种方法使用 `CASE` 特性来返回非佣金制员工的工资。\n\n```sql\nselect employee_id, last_name,\n\
    \       case\n          when commission_pct is null then salary\n          else\
    \ (1 + commission_pct) * salary\n       end total_pay\n  from hr.employees;\n\
    ```\n\n结果与使用 `COALESCE` 函数的代码相同。\n\n### 工作原理\n\n`NVL`、`NVL2` 和 `COALESCE` 函数让您可以根据需求以不同方式处理\
    \ `NULL` 值。我们使用 `NVL` 的方法以基本方式选择 `EMPLOYEE_ID` 和 `LAST_NAME`，然后使用 `NVL` 来识别 `COMMISSION_PCT`\
    \ 是有值还是 `NULL`。具有实际值的行返回该值，而 `NULL` 的行返回文本 \"No Commission\" 而不是什么都没有。\n\n`NVL`\
    \ 函数的基本形式如下：\n\n```sql\nnvl(expression, <value to return if expression is null>)\n\
    ```\n\n相比之下，第二种方法使用 `NVL2` 函数进一步处理 `NULL` 值。\n\n`NVL2` 函数不只是为 `NULL` 替换一个占位符值，而是充当一个开关。在我们的例子中，`NVL2`\
    \ 评估 `COMMISSION_PCT` 的值。如果检测到实际值，则返回第二个表达式。如果 `NVL2` 检测到 `NULL`，则返回第三个表达式。\n\n\
    `NVL2` 函数的一般形式如下所示：\n\n```sql\nnvl(expression,\n    <value to return if expression\
    \ is not null>,\n    <value to return if expression is null>)\n```\n\n第三，我们使用\
    \ `COALESCE` 函数在每位员工的 `COMMISSION_PCT` 和 `SALARY` 中找到第一个非 `NULL` 值。`COALESCE`\
    \ 函数可以接受任意数量的表达式，并返回解析为非 `NULL` 值的第一个表达式。一般形式是：\n\n```sql\ncoalesce(expression_1,\
    \ expression_2, expression_3 … expression_n)\n```\n\n最后，我们使用 `CASE` 表达式来评估 `COMMISSION_PCT`\
    \ 字段，并在找到的值为 `NULL` 时切换逻辑。`CASE` 表达式的一般形式是：\n\n```sql\ncase\n   when <expression>\
    \ then <value, expression, column>\n   <optional additional when clauses>\n  \
    \ else <some default value, expression, column>\nend\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 5-2. 对空值进行排序\n\n**问题**\n\n业务报告的结果按部门经理排序，但你需要找到一种方法来覆盖 `NULL` 值的排序，使它们出现在报告开头或结尾你想要的位置。\n\
    \n**解决方案**\n\nOracle 为 `ORDER BY` 子句提供了两个扩展，使 SQL 开发人员能够将 `NULL` 值与已知数据分开处理，允许将任何\
    \ `NULL` 条目显式地排序到结果的开头或结尾。\n\n在我们的方法中，我们假设所需的报告基于 `HR.DEPARTMENTS` 表中的部门名称和经理标识符。此\
    \ SQL 选择此数据并使用 `NULLS FIRST` 选项来显式控制 `NULL` 处理。\n\n```sql\nselect department_name,\
    \ manager_id\n  from hr.departments\n order by manager_id nulls first;\n```\n\n\
    结果首先显示“无人管理”的部门，然后是按 `MANAGER_ID` 排序的有经理的部门。我们缩写了结果以节省篇幅。\n\nDEPARTMENT_NAME MANAGER_ID\n\
    -------------------- ----------\nControl And Credit\nRecruiting\n…\nShareholder\
    \ Services\nBenefits\nExecutive 100\nIT 103\n…\nPublic Relations 204\nAccounting\
    \ 205\n27 rows selected.\n\n### 工作原理\n\n默认情况下，对于升序排序，Oracle 将 `NULL` 值排序到结果的末尾；对于降序排序，则排序到结果的开头。`NULLS\
    \ FIRST ORDER BY` 选项及其补充 `NULLS LAST` 覆盖了 Oracle 对 `NULL` 值的正常排序行为，并将它们准确地放置在你指定的位置：结果的开头或结尾。\n\
    \n当你面对 `NULL` 值排序到数据“错误”一端的问题时，你的第一反应可能是简单地从升序切换到降序排序，或反之亦然。但如果你考虑更复杂的查询，使用 `ROWNUM`\
    \ 或 `ROWID` 技巧的子查询，以及需要保留数据顺序同时移动 `NULL` 值的其他查询，你会看到 `NULLS FIRST` 和 `NULLS LAST`\
    \ 具有真正的实用性。使用它们 *保证* 了 `NULL` 值出现的位置，无论数据值如何排序。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 5-3. 对查询结果进行分页\n\n**问题**\n\n你需要在网页上显示查询结果，每页显示结果的一个子集。用户将能够在结果页之间前后导航。\n\
    \n**解决方案**\n\n解决分页问题需要从更通用的角度思考这个过程——并结合使用几个基本的 Oracle 特性来处理像这样的问题。我们真正试图做的是找到结果集的一个\
    \ *明确的子集*，无论我们是在网页或报告上显示这个子集，还是将其输入到某个后续过程中。不需要更改你的数据来添加显式的页码或分区细节。我们的解决方案将使用\
    \ Oracle 的 `ROWNUM` 伪列和 `ROW_NUMBER` OLAP 函数来处理隐式页面计算，并使用嵌套子查询来控制我们看到的是哪一页数据。\n\
    \n我们将使用 `OE.PRODUCT_INFORMATION` 表作为解决方案的数据源，假设我们使用其中的数据来发布一个在线购物网站。在 Oracle 提供的示例模式中，`OE.PRODUCT_INFORMATION`\
    \ 表包含 288 行。即使你技术上可以显示那么长的列表，对于单个网页来说也太多了。你的可怜客户在购买任何东西之前就会因为滚动而感到疲惫！\n\n谢天谢地，我们可以用下一个\
    \ `SELECT` 语句来拯救我们的客户。我们将控制 `SELECT` 语句只返回 10 个结果。\n\n```sql\nselect product_id,\
    \ product_name, list_price from\n  (select prodinfo.*, rownum r\n     from\n \
    \      (select product_id, product_name, list_price\n          from oe.product_information\n\
    \         order by product_id) prodinfo\n    where rownum <= 10)\n where r >=\
    \ 1;\n```\n\n这一次，我们不会缩写解决方案的结果，这样你就可以看到我们有 10 行结果可以显示在假设的网页上。\n\nPRODUCT_ID PRODUCT_NAME\
    \ LIST_PRICE\n---------- -------------------- ----------\n1726 LCD Monitor 11/PM\
    \ 259\n1729 Chemicals - RCP 80\n1733 PS 220V /UK 89\n1734 Cable RS232 10/AM 6\n\
    1737 Cable SCSI 10/FW/ADS 8\n1738 PS 110V /US 86\n1739 SDRAM - 128 MB 299\n1740\
    \ TD 12GB/DAT 134\n1742 CD-ROM 500/16x 101\n1743 HD 18.2GB @10000 /E 800\n10 rows\
    \ selected.\n\n一种替代技术是使用 `ROW_NUMBER` OLAP 函数执行等效的行编号，并类似地通过其生成的数字上的谓词进行过滤。\n\n\
    ```sql\nselect product_id, product_name, list_price from\n  (select product_id,\
    \ product_name, list_price,\n          row_number() over (order by product_id)\
    \ r\n     from oe.product_information)\n where r between 1 and 10\n```\n\n结果相同，包括像\
    \ 18 GB 硬盘 800 美元这样的历史性产物！\n\n那是美好的旧时光。\n\n### 工作原理"
- fmt: "# ROWNUM 与 ROW_NUMBER 分页技术详解\n\n让我们首先研究一下 ROWNUM 技术。这个解决方案的核心是在子查询中使用 `ROWNUM`\
    \ 来为我们真正想要的数据标记一个便于控制分页的序号。`ROWNUM` 的值并不存储在任何地方：它不是表中的列，也没有隐藏在其他地方。`ROWNUM` 是你**结果集**的一个伪列，它仅在你的结果被收集时才会产生，并且是在任何排序或聚合之前。\n\
    \n看看我们示例核心的子查询，你会看到格式是这样的结构。\n\n```sql\nselect <columns I actually want>, rownum\
    \ r\nfrom\n  (select <columns I actually want>\n   from oe.product_information\n\
    \   order by product_id)\nwhere rownum <= 10\n```\n\n我们选择实际需要的数据和列，并将它们包装在另一个类似的\
    \ `SELECT` 中，该 `SELECT` 添加了 `ROWNUM` 值。我们为其指定一个别名，以便稍后在外层 `SQL` 语句中使用，我们很快会解释。\n\
    \n`FROM` 和 `ORDER BY` 子句是不言自明的，剩下的是 `ROWNUM` 谓词。在这个例子中，我们查找 `ROWNUM` 值小于 10 的行，因为我们最终想显示第\
    \ 1 到 10 行。其一般形式是，我们真正请求的是所有匹配的结果行，其 `ROWNUM` 不超过我们想要的分页结束点。因此，如果我们想在假设的网站第 5\
    \ 页显示第 41 到 50 项，这个子句应该写成 `WHERE ROWNUM <= 50`。在你的应用程序代码或存储过程中，很自然地会用一个绑定变量来替换它。\n\
    \n```sql\nwhere rownum <= :page-end-row\n```\n\n这意味着子查询实际上会为直到你打算用于分页的最后一行的所有行产生结果。如果我们使用查询最终来显示第\
    \ 41 到 50 项的页面，并使用了 `WHERE ROWNUM <= 50` 选项，子查询将收集 50 行的结果，而不仅仅是你打算显示的那 10 行。此时，外层查询就派上用场了。\n\
    \n外层查询的结构具有这种通用形式：\n\n```sql\nselect <columns I actually want>\nfrom\n  (<rows\
    \ upto the end-point of pagination provided by subselect>)\nwhere r >= 1;\n```\n\
    \n我们执行一个相当常规的子查询，在语句的 `SELECT` 部分从子查询中选取用于显示的有意义的列，并使用我们的 `WHERE` 谓词从子查询的结果中剔除任何不必要的前导行，为我们留下用于分页的完美数据集。对于针对第\
    \ 41 到 50 行的示例修改，这个谓词将改为 `WHERE R >= 41`。同样地，在准备语句或存储过程中使用时，通常会使用绑定变量，给出 `WHERE`\
    \ 子句的这种通用形式。\n\n```sql\nwhere r >= :page-start-row\n```\n\n此时，我们希望你心里存有两个疑问。为什么我们在子查询中为\
    \ `ROWNUM` 引入列别名 “r”，而不是在外层 `SELECT` 语句中再次直接使用 `ROWNUM` 特性？以及为什么我们不直接使用 `BETWEEN`\
    \ 子句来简化整个设计？使用别名是为了将子查询中的 `ROWNUM` 值保留下来供外层查询使用。假设我们尝试像下面的 `SQL` 语句那样再次使用 `ROWNUM`。\n\
    \n```sql\n-- 注意！这是故意错误的 rownum 逻辑\nselect product_id, product_name, list_price\n\
    from\n  (select prodinfo.*, rownum\n   from\n     (select product_id, product_name,\
    \ list_price\n      from oe.product_information\n      order by product_id) prodinfo\n\
    \   where rownum <= 50)\nwhere rownum >= 41;\n```\n\n自己试试运行它，你会惊讶地发现没有返回行。同样地，如果我们去掉子查询结构，只尝试一个\
    \ `BETWEEN` 子句，我们会构建出像下一个例子这样的 `SQL`。\n\n```sql\n-- 注意！这是故意错误的 rownum 逻辑\nselect\
    \ product_id, product_name, list_price\nfrom oe.product_information\nwhere rownum\
    \ between 41 and 50;\n```\n\n哎呀！再次，没有返回行。为什么这些会失败？这是因为 `ROWNUM` 机制只会在基本（非排序/聚合）条件满足后才分配一个值，并且总是从\
    \ `ROWNUM` 值 1 开始。只有在该值被分配后，它才会递增到 2，以此类推。通过去掉别名，我们最终在外层 `SELECT` 中生成了*新的* `ROWNUM`\
    \ 值，然后询问第一个候选值 1 是否大于或等于 41。它不是，所以该行被丢弃，我们的 `ROWNUM` 值不会递增。后续的行都不满足相同的谓词——你最终得不到任何结果。使用\
    \ `BETWEEN` 变体也会引入同样的问题。这就是为什么我们首先使用别名，以及为什么我们在成功的示例中引用已保留的 “r” 值。\n\n**注意** 开发者在使用这种逻辑风格时，常常未能测试非显而易见的案例。有一类数据子集会使我们有问题的示例返回结果。这会出现在第一页的数据，其起始行的\
    \ `ROWNUM` 值确实是 1。这是一个边界条件有效但所有其他可能数据范围都失败的典型案例。确保你的测试涵盖数据的自然端点以及中间范围，以避免自己陷入此类陷阱。\n\
    \n我们的第二个示例采用了不同的思路。使用 `ROW_NUMBER` OLAP 函数，我们可以在一次数据扫描中达成相同的结果。像所有 OLAP 函数一样，`ROW_NUMBER`\
    \ 函数是在常规谓词、连接等被评估后才应用于查询的。就分页而言，这意味着子查询有效地查询了 `OE.PRODUCT_INFORMATION` 表中的所有数据，然后\
    \ `ROW_NUMBER` 按照指示的顺序（本例中按 `PRODUCT_ID`）应用一个递增的数字。\n\n```sql\nselect product_id,\
    \ product_name, list_price,\n       row_number() over (order by product_id) r\n\
    from oe.product_information\n```\n\n如果我们单独评估这个子查询，会看到类似这样的结果（为节省纸张而缩写）。\n\n```sql\n\
    PRODUCT_ID PRODUCT_NAME             LIST_PRICE          R\n---------- --------------------\
    \ --------------- ----------\n      1726 LCD Monitor 11/PM               259 \
    \         1\n      1729 Chemicals - RCP                  80          2\n     \
    \ 1733 PS 220V /UK                      89          3\n...\n      3511 Paper -\
    \ HQ Printer                9        287\n      3515 Lead Replacement        \
    \          2        288\n\n288 rows selected.\n```\n\n表的每一行都被返回，因为我们的 `SELECT`\
    \ 语句没有使用任何过滤谓词来限定数据。`ROW_NUMBER` 函数已经为所有 288 行进行了编号，从 1 到 288。\n\n此时，外层查询就派上用场了，它的作用非常直接。我们的示例使用了一个看起来像下一个\
    \ `SQL` 片段的外层查询语句。\n\n```sql\nselect product_id, product_name, list_price\nfrom\n\
    \  (<subselect returning desired columns and row number “r”>)\nwhere r between\
    \ 1 and 10\n```\n\n这个外层 `SQL` 正如它看起来那样简单。从子查询中选择所需的列，其中 `r` 值（由子查询的 `ROW_NUMBER`\
    \ 函数生成）在 1 到 10 之间。与我们使用 `ROWNUM` 的另一个解决方案相比，如果我们想表示不同页面的结果，比如第 41 到 50 项，外层查询的\
    \ `WHERE` 子句只需改为 `WHERE R BETWEEN 41 AND 50`。在一般形式中，我们建议对 `page-start-row` 和 `page-end-row`\
    \ 进行参数化，如下面的 `SQL` 伪代码所示。\n\n```sql\nselect <desired columns>\nfrom\n  (select\
    \ <desired columns>,\n          row_number() over (order by <ordering column>)\
    \ r\n   from <source table, view, etc.>)\nwhere r between :page-start-row and\
    \ :page-end-row\n```"
  raw: 'Let’s examine the ROWNUM technique first. The core of this solution is using
    ROWNUM in a subselect to tag the data we really want with a handy number that
    controls the pagination. The ROWNUM values aren’t stored anywhere: they’re not
    a column in your table or hidden somewhere else. ROWNUM is a pseudo-column of
    your *results*, and it only comes into being when your results are gathered, but
    before any sorting or aggregation.


    Looking at the subselects at the heart of our recipe, you’ll see the format has
    this structure.


    select <columns I actually want>, **rownum r**


    from


    (select <columns I actually want>


    from oe.product_information


    order by product_id)


    where rownum <= **10**


    We select the actual data and columns we want and wrap those in a similar SELECT
    that adds the ROWNUM value. We give this an alias for later use in the outer SQL
    statement, which we’ll explain shortly.


    The FROM and ORDER BY clauses are self-explanatory, leaving us the ROWNUM predicate.
    In this case, we look for ROWNUM values less than 10, because ultimately we want
    to show the rows from 1 to 10\. In its general form, we are really asking for
    all matching result rows with a ROWNUM up to the end point we want for our page.
    So if we wanted to show items 41 to 50 on page 5 of our hypothetical web site,
    this clause would read WHERE ROWNUM <= 50\. In your application code or stored
    procedure, it’s natural to replace this with a bind variable.


    where rownum <= :page-end-row


    This means the subselect will actually produce results for all rows up to the
    last row you intend to use in pagination. If we use our query to ultimately display
    the page for items 41 to 50 with the WHERE


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ COMMON QUERY PATTERNS


    ROWNUM <= 50 option, the subselect will gather the results for 50 rows, not just
    the 10 you intend to display. At this point, the outer query comes in to play.


    The structure of the outer query has this general form:


    select <columns I actually want> from


    (<rows upto the end-point of pagination provided by subselect>) where **r >= 1**;


    We’re performing a quite normal subselect, where we take the meaningful columns
    from the subselect for display in the SELECT portion of the statement, and use
    our WHERE predicate to lop off any unnecessary leading rows from the results of
    the subselect, leaving us with the perfect set of data for pagination. For our
    recipe modification targeting rows 41 to 50, this predicate would change to WHERE
    R


    >= 41\. Again, using this in a prepared fashion or through a stored procedure
    would typically be done with a bind variable, giving this general form of the
    WHERE clause.


    where r >= :page-start-row


    At this point, we hope you find yourself with two lingering questions. Why did
    we introduce the column alias “r” for ROWNUM in the subselect rather than just
    using the ROWNUM feature again in the outer SELECT statement, and why didn’t we
    just use a BETWEEN clause to simplify the whole design? The alias is used to preserve
    the ROWNUM values from the subselect for use in the outer select. Suppose instead
    we’d tried to use ROWNUM again as in the next SQL statement.


    -- Note! Intentionally flawed rownum logic


    select product_id, product_name, list_price from


    (select prodinfo.*, rownum from


    (select product_id, product_name, list_price


    from oe.product_information


    order by product_id) prodinfo


    where rownum <= 50)


    where rownum >= 41;


    Try running that yourself and you’ll be surprised to find no rows returned. Equally,
    if we stripped out the subselect constructs and just tried a BETWEEN clause, we’d
    construct SQL like the next example.


    -- Note! Intentionally flawed rownum logic


    select product_id, product_name, list_price


    from oe.product_information


    where rownum between 41 and 50;


    Oops! Once again, no rows returned. Why are these failing? It’s because the ROWNUM
    mechanism only assigns a value after the basic (non-sorting/aggregating) criteria
    are satisfied, and always starts with a ROWNUM value of 1\. Only after that value
    is assigned does it increment to 2, and so on. By removing the alias, we end up
    generating *new* ROWNUM values in the outer SELECT and then asking if the first
    candidate value, 1, is greater than or equal to 41\. It’s not, so that row is
    discarded and our ROWNUM value doesn’t increment. No subsequent rows satisfy the
    same predicate—and you end up with no results. Using the BETWEEN variant introduces
    the same problem. That’s why we use the alias in the first place, and why we refer
    to the preserved “r” values in our successful recipe.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ COMMON QUERY PATTERNS


    ■ **Caution** Developers often fail to test non-obvious cases when using this
    style of logic. There is one subset of data where our problematic examples would
    return results. This would be for the first page of data, where the page starting
    row does have a ROWNUM value of 1\. This is a classic case of the boundary condition
    working but all other possible data ranges failing. Make sure your testing covers
    both the natural end points of your data, as well as ranges in between, to save
    yourself from such pitfalls.


    Our second recipe takes a different tack. Using the ROW_NUMBER OLAP function,
    we achieve the same outcome in one pass over the data. Like all OLAP functions,
    the ROW_NUMBER function is applied to the query after the normal predicates, joins,
    and the like are evaluated. For the purposes of pagination, this means that the
    subquery effectively queries all of the data from the OE.PRODUCT_INFORMATION table,
    and ROW_NUMBER then applies an incrementing number by the order indicated, in
    this case by PRODUCT_ID.


    select product_id, product_name, list_price,


    row_number() over (order by product_id) r


    from oe.product_information


    If we evaluated the subquery by itself, we’d see results like this (abbreviated
    to save paper).


    PRODUCT_ID PRODUCT_NAME LIST_PRICE R


    ---------- ------------------ ---------- ---


    1726 LCD Monitor 11/PM 259 1


    1729 Chemicals - RCP 80 2


    1733 PS 220V /UK 89 3


    ...


    3511 Paper - HQ Printer 9 287


    3515 Lead Replacement 2 288


    288 rows selected.


    Every row of the table is returned, as our SELECT statement hasn’t qualified the
    data with any filtering predicates. The ROW_NUMBER function has numbered all 288
    rows, from 1 to 288.


    At this point, the outer query comes into play and its role is very straightforward.
    Our recipe uses an outer query statement that looks like the next SQL snippet.


    select product_id, product_name, list_price from


    (<subselect returning desired columns and row number “r”>)


    where r between 1 and 10


    This outer SQL is as obvious as it looks. Select the desired columns returned
    from the subselect, where the r value (generated by the subselect’s ROW_NUMBER
    function) is between 1 and 10\. In comparison to our other solution that used
    ROWNUM, if we wanted to represent a different page of results for products 41
    to 50, the outer query’s WHERE clause would simply change to WHERE R BETWEEN 41
    AND 50\. In the general form, we’d recommend parameterizing the page-start-row
    and page-end-row, as illustrated in the following SQL pseudo code.


    select <desired columns>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ COMMON QUERY PATTERNS


    (select <desired columns>,


    row_number() over (order by <ordering column>) r


    from <source table, view, etc.>)


    where r between :page-start-row and :page-end-row'
  trans: "\n# ROWNUM 与 ROW_NUMBER 分页技术详解\n\n让我们首先研究一下 ROWNUM 技术。这个解决方案的核心是在子查询中使用\
    \ `ROWNUM` 来为我们真正想要的数据标记一个便于控制分页的序号。`ROWNUM` 的值并不存储在任何地方：它不是表中的列，也没有隐藏在其他地方。`ROWNUM`\
    \ 是你**结果集**的一个伪列，它仅在你的结果被收集时才会产生，并且是在任何排序或聚合之前。\n\n看看我们示例核心的子查询，你会看到格式是这样的结构。\n\
    \n```sql\nselect <columns I actually want>, rownum r\nfrom\n  (select <columns\
    \ I actually want>\n   from oe.product_information\n   order by product_id)\n\
    where rownum <= 10\n```\n\n我们选择实际需要的数据和列，并将它们包装在另一个类似的 `SELECT` 中，该 `SELECT` 添加了\
    \ `ROWNUM` 值。我们为其指定一个别名，以便稍后在外层 `SQL` 语句中使用，我们很快会解释。\n\n`FROM` 和 `ORDER BY` 子句是不言自明的，剩下的是\
    \ `ROWNUM` 谓词。在这个例子中，我们查找 `ROWNUM` 值小于 10 的行，因为我们最终想显示第 1 到 10 行。其一般形式是，我们真正请求的是所有匹配的结果行，其\
    \ `ROWNUM` 不超过我们想要的分页结束点。因此，如果我们想在假设的网站第 5 页显示第 41 到 50 项，这个子句应该写成 `WHERE ROWNUM\
    \ <= 50`。在你的应用程序代码或存储过程中，很自然地会用一个绑定变量来替换它。\n\n```sql\nwhere rownum <= :page-end-row\n\
    ```\n\n这意味着子查询实际上会为直到你打算用于分页的最后一行的所有行产生结果。如果我们使用查询最终来显示第 41 到 50 项的页面，并使用了 `WHERE\
    \ ROWNUM <= 50` 选项，子查询将收集 50 行的结果，而不仅仅是你打算显示的那 10 行。此时，外层查询就派上用场了。\n\n外层查询的结构具有这种通用形式：\n\
    \n```sql\nselect <columns I actually want>\nfrom\n  (<rows upto the end-point\
    \ of pagination provided by subselect>)\nwhere r >= 1;\n```\n\n我们执行一个相当常规的子查询，在语句的\
    \ `SELECT` 部分从子查询中选取用于显示的有意义的列，并使用我们的 `WHERE` 谓词从子查询的结果中剔除任何不必要的前导行，为我们留下用于分页的完美数据集。对于针对第\
    \ 41 到 50 行的示例修改，这个谓词将改为 `WHERE R >= 41`。同样地，在准备语句或存储过程中使用时，通常会使用绑定变量，给出 `WHERE`\
    \ 子句的这种通用形式。\n\n```sql\nwhere r >= :page-start-row\n```\n\n此时，我们希望你心里存有两个疑问。为什么我们在子查询中为\
    \ `ROWNUM` 引入列别名 “r”，而不是在外层 `SELECT` 语句中再次直接使用 `ROWNUM` 特性？以及为什么不直接使用 `BETWEEN`\
    \ 子句来简化整个设计？使用别名是为了将子查询中的 `ROWNUM` 值保留下来供外层查询使用。假设我们尝试像下面的 `SQL` 语句那样再次使用 `ROWNUM`。\n\
    \n```sql\n-- 注意！这是故意错误的 rownum 逻辑\nselect product_id, product_name, list_price\n\
    from\n  (select prodinfo.*, rownum\n   from\n     (select product_id, product_name,\
    \ list_price\n      from oe.product_information\n      order by product_id) prodinfo\n\
    \   where rownum <= 50)\nwhere rownum >= 41;\n```\n\n自己试试运行它，你会惊讶地发现没有返回行。同样地，如果我们去掉子查询结构，只尝试一个\
    \ `BETWEEN` 子句，我们会构建出像下一个例子这样的 `SQL`。\n\n```sql\n-- 注意！这是故意错误的 rownum 逻辑\nselect\
    \ product_id, product_name, list_price\nfrom oe.product_information\nwhere rownum\
    \ between 41 and 50;\n```\n\n哎呀！再次，没有返回行。为什么这些会失败？这是因为 `ROWNUM` 机制只会在基本（非排序/聚合）条件满足后才分配一个值，并且总是从\
    \ `ROWNUM` 值 1 开始。只有在该值被分配后，它才会递增到 2，以此类推。通过去掉别名，我们最终在外层 `SELECT` 中生成了*新的* `ROWNUM`\
    \ 值，然后询问第一个候选值 1 是否大于或等于 41。它不是，所以该行被丢弃，我们的 `ROWNUM` 值不会递增。后续的行都不满足相同的谓词——你最终得不到任何结果。使用\
    \ `BETWEEN` 变体也会引入同样的问题。这就是为什么我们首先使用别名，以及为什么我们在成功的示例中引用已保留的 “r” 值。\n\n**注意** 开发者在使用这种逻辑风格时，常常未能测试非显而易见的案例。有一类数据子集会使我们有问题的示例返回结果。这会出现在第一页的数据，其起始行的\
    \ `ROWNUM` 值确实是 1。这是一个边界条件有效但所有其他可能数据范围都失败的典型案例。确保你的测试涵盖数据的自然端点以及中间范围，以避免自己陷入此类陷阱。\n\
    \n我们的第二个示例采用了不同的思路。使用 `ROW_NUMBER` OLAP 函数，我们可以在一次数据扫描中达成相同的结果。像所有 OLAP 函数一样，`ROW_NUMBER`\
    \ 函数是在常规谓词、连接等被评估后才应用于查询的。就分页而言，这意味着子查询有效地查询了 `OE.PRODUCT_INFORMATION` 表中的所有数据，然后\
    \ `ROW_NUMBER` 按照指示的顺序（本例中按 `PRODUCT_ID`）应用一个递增的数字。\n\n```sql\nselect product_id,\
    \ product_name, list_price,\n       row_number() over (order by product_id) r\n\
    from oe.product_information\n```\n\n如果我们单独评估这个子查询，会看到类似这样的结果（为节省纸张而缩写）。\n\n```sql\n\
    PRODUCT_ID PRODUCT_NAME             LIST_PRICE          R\n---------- --------------------\
    \ --------------- ----------\n      1726 LCD Monitor 11/PM               259 \
    \         1\n      1729 Chemicals - RCP                  80          2\n     \
    \ 1733 PS 220V /UK                      89          3\n...\n      3511 Paper -\
    \ HQ Printer                9        287\n      3515 Lead Replacement        \
    \          2        288\n\n288 rows selected.\n```\n\n表的每一行都被返回，因为我们的 `SELECT`\
    \ 语句没有使用任何过滤谓词来限定数据。`ROW_NUMBER` 函数已经为所有 288 行进行了编号，从 1 到 288。\n\n此时，外层查询就派上用场了，它的作用非常直接。我们的示例使用了一个看起来像下一个\
    \ `SQL` 片段的外层查询语句。\n\n```sql\nselect product_id, product_name, list_price\nfrom\n\
    \  (<subselect returning desired columns and row number “r”>)\nwhere r between\
    \ 1 and 10\n```\n\n这个外层 `SQL` 正如它看起来那样简单。从子查询中选择所需的列，其中 `r` 值（由子查询的 `ROW_NUMBER`\
    \ 函数生成）在 1 到 10 之间。与我们使用 `ROWNUM` 的另一个解决方案相比，如果我们想表示不同页面的结果，比如第 41 到 50 项，外层查询的\
    \ `WHERE` 子句只需改为 `WHERE R BETWEEN 41 AND 50`。在一般形式中，我们建议对 `page-start-row` 和 `page-end-row`\
    \ 进行参数化，如下面的 `SQL` 伪代码所示。\n\n```sql\nselect <desired columns>\nfrom\n  (select\
    \ <desired columns>,\n          row_number() over (order by <ordering column>)\
    \ r\n   from <source table, view, etc.>)\nwhere r between :page-start-row and\
    \ :page-end-row\n```\n"
- fmt: "By now you’re probably asking yourself which of the two methods, `ROWNUM`\
    \ and `ROW_NUMBER`, you should use. There’s no clear-cut answer to that question.\
    \ Instead, it’s best to remember some of the qualities of both recipes. The `ROWNUM`\
    \ approach enjoys historical support and has built-in optimization in Oracle to\
    \ make the sort induced by the ordering faster than a normal sort. The `ROW_NUMBER`\
    \ approach is more versatile, enabling you to number your rows in an order different\
    \ from the order produced by a standard `ORDER BY` clause. You can also alter\
    \ the recipe to use other OLAP functions like `RANK` and `DENSE_RANK` to handle\
    \ different paging requirements, such as needing to show items in “tied” positions.\n\
    \n## Pagination Outside the Database\n\nOur recipe drives the pagination of data\
    \ where it is generally best handled—in the database! You may have used or experienced\
    \ other techniques, such as cursor-driven pagination and even result-caching at\
    \ the application tier, with data discarded or hidden to provide pagination.\n\
    \nOur advice is to eschew those techniques in pretty much all cases. The application\
    \ caching technique inevitably requires excessive network traffic with associated\
    \ performance delay and cost, which the end user won’t appreciate. Cursor-driven\
    \ approaches do work at the database tier to minimize the network issue, but you\
    \ are always susceptible to “stale” pagination with cursor techniques. Don’t be\
    \ in any doubt: use the database to paginate for you—and reap the benefits!\n\n\
    ## 5-4. Testing for the Existence of Data\n\n### Problem\n\nYou would like to\
    \ compare the data in two related tables, to show where matching data exists,\
    \ and to also show where matching data doesn’t exist.\n\n### Solution\n\nOracle\
    \ supports the `EXISTS` and `NOT EXISTS` predicates, allowing you to correlate\
    \ the data in one table or expression with matching or missing data in another\
    \ table or expression. We’ll use the hypothetical situation of needing to find\
    \ which departments currently have managers. Phrasing this in a way that best\
    \ illustrates the `EXISTS` solution, the next SQL statement finds all departments\
    \ where a manager is known to exist.\n\n```sql\nselect department_name\nfrom hr.departments\
    \ d\nwhere exists\n  (select e.employee_id\n   from hr.employees e\n   where d.manager_id\
    \ = e.employee_id);\n```\n\nThe complement, testing for non-existence, is shown\
    \ in the next statement. We ask to find all departments in `HR.DEPARTMENTS` with\
    \ a manager that does not exist in the data held in `HR.EMPLOYEES`.\n\n```sql\n\
    select department_name\nfrom hr.departments d\nwhere not exists\n  (select e.employee_id\n\
    \   from hr.employees e\n   where d.manager_id = e.employee_id);\n```\n\n### How\
    \ It Works\n\nIn any database, including Oracle, the `EXISTS` predicate answers\
    \ the question, “Is there a relationship between two data items, and by extension,\
    \ what items in one set are related to items in a second set?”\n\nThe `NOT EXISTS`\
    \ variant tests the converse, “Can it definitively be said that no relationship\
    \ exists between two sets of data, based on a proposed criterion?” Each approach\
    \ is referred to as correlation or a correlated subquery (literally, co-relation,\
    \ sharing a relationship).\n\nInterestingly, Oracle bases its decision on whether\
    \ satisfying data exists solely on this premise: was a matching row found that\
    \ satisfied the subquery’s predicates? It’s almost too subtle, so we’ll point\
    \ out the obvious thing Oracle isn’t seeking. What you select in the inner correlated\
    \ query doesn’t matter—it’s only the criteria that matter. So you’ll often see\
    \ versions of existence tests that form their subselect by selecting the value\
    \ `1`, the entire row using an asterisk (`*`), a literal value, or even `NULL`.\
    \ Ultimately, it’s immaterial in this form of the recipe. The key point is the\
    \ correlation expression. In our case, it’s `WHERE D.MANAGER_ID = E.EMPLOYEE_ID`.\n\
    \nThis also helps explain what Oracle is doing in the second half of the recipe,\
    \ where we’re looking for `DEPARTMENT_NAME` values for rows where the `MANAGER_ID`\
    \ doesn’t exist in the `HR.EMPLOYEES` table. Oracle drives the query by evaluating,\
    \ for each row in the outer query, whether no rows are returned by the inner correlated\
    \ query. Oracle doesn’t care what data exists in other columns not in the correlation\
    \ criteria. It pays to be careful using such `NOT EXISTS` clauses on their own—not\
    \ because the logic won’t work but because against large data sets, the optimizer\
    \ can decided to repeatedly scan the inner data in full, which might affect performance.\
    \ In our example, so long as a manager’s ID listed for a department is not found\
    \ in the `HR.EMPLOYEES` table, the `NOT EXISTS` predicate will be satisfied, and\
    \ department included in the results.\n\n■ **Caution** Correlated subqueries satisfy\
    \ an important problem-solving niche, but it’s crucial to remember the nature\
    \ of `NULL` values when using either `EXISTS` or `NOT EXISTS`. `NULL` values are\
    \ not equivalent to any other value, including other `NULL` values. This means\
    \ that a `NULL` in the outer part of a correlated query will never satisfy the\
    \ correlation criterion for the inner table, view, or expression. In practice,\
    \ this means you’ll see precisely the opposite effect as the one you might expect\
    \ because the `EXISTS` test will always return false, even if both the inner and\
    \ outer data sources have `NULL` values for the correlation, and `NOT EXISTS`\
    \ will always return true. Not what the lay person would expect.\n\n## 5-5. Conditional\
    \ Branching In One SQL Statement\n\n### Problem\n\nIn order to produce a concise\
    \ result in one query, you need to change the column returned on a row-by-row\
    \ basis, conditional on a value from another row. You want to avoid awkward mixes\
    \ of unions, subqueries, aggregation, and other inelegant techniques.\n\n### Solution\n\
    \nFor circumstances where you need to conditionally branch or alternate between\
    \ source data, Oracle provides the `CASE` statement. `CASE` mimics the traditional\
    \ switch or case statement found in many programming languages like C or Java.\n\
    \nTo bring focus to our example, we’ll assume our problem is far more tangible\
    \ and straightforward.\n\nWe want to find the date employees in the shipping department\
    \ (with the `DEPARTMENT_ID` of 50) started their current job. We know their initial\
    \ hire date with the firm is tracked in the `HIRE_DATE` column on the `HR.EMPLOYEES`\
    \ table, but if they’ve had a promotion or changed roles, the date when they commenced\
    \ their new position can be inferred from the `END_DATE` of their previous position\
    \ in the `HR.JOB_HISTORY` table. We need to branch between `HIRE_DATE` or `END_DATE`\
    \ for each employee of the shipping department accordingly, as shown in the next\
    \ SQL statement.\n\n```sql\nselect e.employee_id,\n       case\n         when\
    \ old.job_id is null then e.hire_date\n         else old.end_date end\n      \
    \ job_start_date\nfrom hr.employees e left outer join hr.job_history old\n  on\
    \ e.employee_id = old.employee_id\nwhere e.department_id = 50\norder by e.employee_id;\n\
    ```\n\nOur results are very straightforward, hiding the complexity that went into\
    \ picking the correct `JOB_START_DATE`.\n\n```\nEMPLOYEE_ID JOB_START\n-----------\
    \ ---------\n        120 18-JUL-96\n        121 10-APR-97\n        122 31-DEC-99\n\
    \        123 10-OCT-97\n        124 16-NOV-99\n…\n```\n\n### How It Works\n\n\
    Our recipe uses the `CASE` feature, in Search form rather than Simple form, to\
    \ switch between `HIRE_DATE` and `END_DATE` values from the joined tables. In\
    \ some respects, it’s easiest to think of this `CASE` operation as a combination\
    \ of two `SELECT` statements in one. For employees with no promotions, it’s as\
    \ if we were selecting as follows:\n\n```sql\nselect e.employee_id, e.hire_date…\n\
    ```\n\nWhereas for employees that have had promotions, the `CASE` statement switches\
    \ the `SELECT` to the following form:\n\n```sql\nselect e.employee_id, old.end_date…\n\
    ```"
