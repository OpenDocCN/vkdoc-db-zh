    ## 10-3\. Displaying a Table’s Disk Space Usage


    ### Problem


    You’re trying to anticipate when to add space to a tablespace that contains several
    large tables. You want to determine how much space the tables are currently using.


    ### Solution


    The next query is handy when you want to view the space consumption of a table:


    ```sql

    UNDEFINE owner

    UNDEFINE tab_name

    SET linesize 200

    COL table_name FORMAT A25

    COL tablespace_name FORMAT A20

    COL partition_name FORMAT A25

    COL file_name FORMAT A35

    COL meg_space_used FORMAT 999,999,999.999

    --

    SELECT

    a.table_name

    ,b.tablespace_name

    ,b.partition_name

    ,c.file_name

    ,SUM(b.bytes)/1024/1024 meg_space_used

    FROM dba_tables a

    ,dba_extents b

    ,dba_data_files c

    WHERE a.owner = UPPER(''&&owner'')

    AND a.table_name = UPPER(''&&tab_name'')

    AND a.owner = b.owner

    AND a.table_name = b.segment_name

    AND b.file_id = c.file_id

    GROUP BY

    a.table_name

    ,b.tablespace_name

    ,b.partition_name

    ,c.file_name

    ORDER BY a.table_name, b.tablespace_name;

    ```


    ![Image 28](index-266_1.png)


    ![Image 29](index-266_2.png)


    This script will prompt you for a user and a table name. If the table has partitions,
    the space per partition will be displayed. You will need access to `DBA`-level
    views to run the script. You can modify the script to point at the `ALL` or `USER`-level
    tables to report on tables for the currently connected user account. This query
    also uses SQL\*Plus-specific commands, such as setting the line size and column
    formatting, which are necessary to make the output readable.


    ### How It Works


    Each table in the database consumes some amount of physical disk space. The query
    in the solution section will display the space consumed in megabytes, the physical
    data file(s) that the table data exists in, the tablespace name, and partition
    names (if any).


    Managing object space in Oracle starts with understanding how Oracle internally
    stores information regarding space usage. When a database is created, it contains
    multiple logical space containers called tablespaces. Each tablespace consists
    of one or more physical data files. Each data file consists of many operating
    system blocks.


    Each database also contains many users. Each user has a schema that is the logical
    container for objects such as tables and indexes. Each table or index consists
    of a segment. If a table or index is partitioned, there will be many partition
    segments for each partitioned table or partitioned index.


    Each segment contains one or more extents. As a segment needs space, it allocates
    additional extents. Each extent consists of a set of database blocks. A typical
    database block size for an online transaction processing (OLTP) database is 8K.
    Each database block contains one or more operating system blocks. Figure 10-3
    describes the relationships between logical and physical structures in an Oracle
    database.


    **Figure 10-3.** Oracle database logical and physical structure relationships'
