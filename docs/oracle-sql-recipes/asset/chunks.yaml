- fmt: "# execution plan\n\n## 19-1. Monitoring Real-Time SQL Execution Statistics\n\
    \n### Problem\n\nYou want to identify in real time SQL statements consuming the\
    \ most resources.\n\n### Solution\n\nIf your database is Oracle Database 11g,\
    \ you can use the following query to select from the `V$SQL_MONITOR` to monitor\
    \ the near real-time resource consumption of SQL queries:\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nCHAPTER 19 ■ SQL MONITORING AND TUNING\n\n```sql\nselect * from (\nselect\n\
    \    a.sid session_id\n    ,a.sql_id\n    ,a.status\n    ,a.cpu_time/1000000 cpu_sec\n\
    \    ,a.buffer_gets\n    ,a.disk_reads\n    ,b.sql_text sql_text\nfrom v$sql_monitor\
    \ a\n    ,v$sql b\nwhere a.sql_id = b.sql_id\norder by a.cpu_time desc)\nwhere\
    \ rownum <=20;\n```\n\nThe output of this query doesn’t fit easily onto a page.\
    \ Here is a subset of the output:\n\n```\nSESSION_ID SQL_ID        STATUS    CPU_SEC\
    \ BUFFER_GETS DISK_READS SQL_TEXT\n---------- ------------- --------- --------\
    \ ----------- ---------- ------------\n       194 4k8runghhh31d DONE      7  \
    \      8.66        0          select count(*)\n       191 9tjq6dfrwgzfr EXECUTING\
    \ 45.57    1944        7          select output f\n```\n\nIn the query, an inline\
    \ view is utilized to first retrieve all records and organize them by `CPU_TIME`\
    \ in descending order. The outer query then limits the result set to the top twenty\
    \ rows using the `ROWNUM` pseudocolumn. You can modify the previous query to order\
    \ by the statistic of your choice. You can also modify it to display only the\
    \ queries that are currently executing. For example, the next SQL statement monitors\
    \ executing queries ordered by the number of disk reads:\n\n```sql\nselect * from\
    \ (\nselect\n    a.sid session_id\n    ,a.sql_id\n    ,a.status\n    ,a.cpu_time/1000000\
    \ cpu_sec\n    ,a.buffer_gets\n    ,a.disk_reads\n    ,substr(b.sql_text,1,15)\
    \ sql_text\nfrom v$sql_monitor a\n    ,v$sql b\nwhere a.sql_id = b.sql_id\n  \
    \  and a.status='EXECUTING'\norder by a.disk_reads desc)\nwhere rownum <=20;\n\
    ```\n\n`Note` If you’re using Oracle Database 10g or lower, see recipe 19-4 for\
    \ displaying resource-consuming queries.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nCHAPTER 19 ■ SQL MONITORING AND TUNING\n\n### How It Works\n\nThe statistics\
    \ in `V$SQL_MONITOR` are updated every second so you can view resource consumption\
    \ as it changes. These statistics are gathered by default if a SQL statement runs\
    \ in parallel or consumes more than 5 seconds of CPU or I/O time.\n\nThe `V$SQL_MONITOR`\
    \ view includes a subset of statistics contained in the `V$SQL`, `V$SQLAREA`,\
    \ and `V$SQLSTATS` views. The `V$SQL_MONITOR` view displays real-time statistics\
    \ for each execution of a resource-intensive SQL statement, whereas `V$SQL`, `V$SQLAREA`,\
    \ and `V$SQLSTATS` contain cumulative sets of statistics over several executions\
    \ of a SQL statement.\n\nOnce the SQL statement execution ends, the run time statistics\
    \ are not immediately flushed from `V$SQL_MONITOR`. Depending on activity in your\
    \ database, the statistics can be available for some period of time. If you have\
    \ a very active database, the statistics could potentially be flushed soon after\
    \ the query finishes.\n\n`Tip` You can uniquely identify an execution of a SQL\
    \ statement in `V$SQL_MONITOR` from a combination of the following columns: `SQL_ID`,\
    \ `SQL_EXEC_START`, `SQL_EXEC_ID`.\n\n## 19-2. Displaying a Query’s Progress in\
    \ the Execution Plan\n\n### Problem\n\nYou want to view exactly where Oracle is\
    \ taking time within a SQL execution plan. You are using Oracle Database 11g.\n\
    \n### Solution\n\nIf you’re working with Oracle Database 11g, you can watch a\
    \ SQL query’s execution plan progress while the SQL is running. The `V$SQL_PLAN_MONITOR`\
    \ view contains a row for each step of a SQL statement’s execution plan.\n\nThis\
    \ query will show the number of rows and memory used for each step of the execution\
    \ plan while the query is running. You’ll have to use some SQL*Plus formatting\
    \ commands to make the output readable:\n\n```sql\nCOL SID FORMAT 99999\nCOL status\
    \ FORMAT A15\nCOL start_time FORMAT A12\nCOL plan_line_id FORMAT 99999 HEAD \"\
    Plan ID\"\nCOL plan_options FORMAT A16\nCOL mem_bytes FORMAT 99999999\nCOL temp_bytes\
    \ FORMAT 99999999\nSET LINESIZE 132 PAGESI 100 TRIMSP ON\nBREAK ON sid on status\
    \ on start_time NODUP SKIP 1\n--\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nCHAPTER 19 ■ SQL MONITORING AND TUNING\n\n```sql\nselect\n```"
