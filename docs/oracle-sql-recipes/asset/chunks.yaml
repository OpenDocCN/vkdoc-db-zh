- fmt: "# CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA\n\nROLLUP 和 CUBE 函数的强大之处在于，它们可以扩展到查询所需的任意多“维度”。诚然，“立方体”（cube）一词意在暗示在三维空间中查看中间聚合的思想，但您的数据通常可能拥有超过三维的维度。扩展我们的食谱，我们可以通过部门、职位、经理和入职年份来“立方体化”平均工资的计算。\n\
    \n```sql\nSELECT department_id, job_id, manager_id,\n       extract(year from\
    \ hire_date) as \"START_YEAR\", avg(salary)\nFROM   hr.employees\nGROUP  BY cube\
    \ (department_id, job_id, manager_id, extract(year from hire_date));\n```\n此食谱的结果是对四个维度平均工资的考察！\n\
    \n## 2-6. 在其他查询中使用聚合结果\n\n### 问题\n\n您希望将涉及聚合和分组的复杂查询的输出，用作另一个查询的源数据。\n\n### 解决方案\n\
    \nOracle 允许任何查询用作子查询或内联视图，包括那些包含聚合和分组函数的查询。这在您希望指定组级条件，并与其他表或查询的数据进行比较，且没有现成视图可用时特别有用。\n\
    \n对于我们的食谱，我们将使用一个包含按部门、职位和起始年份进行 rollup 的平均工资计算，如下面的 `SELECT` 语句所示。\n\n```sql\n\
    select * from (\n  select department_id as \"dept\", job_id as \"job\",\n    \
    \     to_char(hire_date,'YYYY') as \"Start_Year\", avg(salary) as \"avsal\"\n\
    \  from   hr.employees\n  group  by rollup (department_id, job_id, to_char(hire_date,'YYYY')))\n\
    salcalc where salcalc.start_year > '1990'\nor salcalc.start_year is null\norder\
    \ by 1,2,3,4;\n```\n\n我们的食谱产生以下（节选的）输出：\n\ndept job Start_Year avsal\n----------\
    \ ---------- ----- ----------\n10 AD_ASST     4400\n10                  4400\n\
    20 MK_MAN 1996 13000\n20 MK_MAN      13000\n20 MK_REP 1997 6000\n20 MK_REP   \
    \    6000\n…\n              6473.36449\n79 rows selected.\n\n### 工作原理\n\n我们的食谱使用子查询的聚合和分组结果作为内联视图，然后我们从中选择并应用进一步的条件。在这种情况下，我们可以通过使用更复杂的\
    \ `HAVING` 子句来避免子查询方法，如下所示。\n\n```sql\nhaving to_char(hire_date,'YYYY') > '1990'\n\
    or to_char(hire_date,'YYYY') is null\n```\n\n在这里避免子查询之所以可行，仅仅是因为我们将聚合与字面值进行比较。如果我们想查找那些在某个职位上有人曾担任过的部门中，该职位的平均值，我们就需要引用\
    \ `HR.JOBHISTORY` 表。根据业务需求，我们可能幸运地能够在一个语句中构建连接、聚合、分组和 `HAVING` 条件。通过将聚合和分组查询的结果视为另一个查询的输入，我们获得了更好的可读性，并且能够编码比\
    \ `HAVING` 子句所允许的更复杂的逻辑。\n\n## 2-7. 统计组和集合中的成员\n\n### 问题\n\n您需要统计一个组的成员、组的组以及其他基于集合的集合。同时，您需要根据其他数据动态地包含或排除单个成员和组。例如，您想根据员工在公司内获得的晋升次数，统计他们在组织任职期间担任过多少个不同的职位。\n\
    \n### 解决方案\n\nOracle 的 `COUNT` 功能可用于统计物化结果以及表中的实际行。下一个 `SELECT` 语句使用一个子查询来统计跨表持有的职位实例，然后汇总这些计数。实际上，这是对查询结果数据的计数的计数，而不是任何直接存储在\
    \ Oracle 中的内容。\n\n```sql\nselect jh.JobsHeld, count(*) as StaffCount\nfrom\n \
    \ (select u.employee_id, count(*) as JobsHeld\n   from\n     (select employee_id\
    \ from hr.employees\n      union all\n      select employee_id from hr.job_history)\
    \ u\n   group by u.employee_id) jh\ngroup by jh.JobsHeld;\n```\n\n从该 `SELECT`\
    \ 语句中，我们得到以下简明的摘要。\n\nJOBSHELD STAFFCOUNT\n---------- ----------"
  raw: 'The power of both the ROLLUP and CUBE functions extends to as many “dimensions”
    as you need for your query. Admittedly, the term *cube* is meant to allude to
    the idea of looking at intermediate aggregations in three dimensions, but your
    data can often have more dimensions than that. Extending our recipe, we could
    “cube” a calculation of average salary by department, job, manager, and starting
    year.


    Select department_id, job_id, manager_id,


    extract(year from hire_date) as "START_YEAR", avg(salary)


    From hr.employees


    Group by cube (department_id, job_id, manager_id, **extract(year from hire_date)**);
    This recipe results in an examination of average salary in four dimensions!


    2-6\. Using Aggregate Results in Other Queries


    Problem


    You want to use the output of a complex query involving aggregates and grouping
    as source data for another query.


    Solution


    Oracle allows any query to be used as a subquery or inline view, including those
    containing aggregates and grouping functions. This is especially useful where
    you’d like to specify group-level criteria compared against data from other tables
    or queries, and don’t have a ready-made view available.


    For our recipe, we’ll use an average salary calculation with rollups across department,
    job, and start year, as shown in this SELECT statement.


    select * from (


    select department_id as "dept", job_id as "job", to_char(hire_date,''YYYY'') as


    "Start_Year", avg(salary) as "avsal"


    from hr.employees


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA


    group by rollup (department_id, job_id, to_char(hire_date,''YYYY''))) salcalc
    where salcalc.start_year > ''1990''


    or salcalc.start_year is null


    order by 1,2,3,4;


    Our recipe results in the following (abridged) output:


    dept job Start avsal


    ---------- ---------- ----- ----------


    10 AD_ASST 4400


    10 4400


    20 MK_MAN 1996 13000


    20 MK_MAN 13000


    20 MK_REP 1997 6000


    20 MK_REP 6000


    …


    6473.36449


    79 rows selected.


    How It Works


    Our recipe uses the aggregated and grouped results of the subquery as an inline
    view, which we then select from and apply further criteria. In this case, we could
    avoid the subquery approach by using a more complex HAVING clause like this.


    having to_char(hire_date,''YYYY'') > ''1990''


    or to_char(hire_date,''YYYY'') is null


    Avoiding a subquery here works only because we’re comparing our aggregates with
    literals. If we wanted to find averages for jobs in departments where someone
    had previously held the job, we’d need to reference the HR.JOBHISTORY table. Depending
    on the business requirement, we might get lucky and be able to construct our join,
    aggregates, groups, and having criteria in one statement. By treating the results
    of the aggregate and grouping query as input to another query, we get better readability,
    and the ability to code even more complexity than the HAVING clause allows.


    2-7\. Counting Members in Groups and Sets


    Problem


    You need to count members of a group, groups of groups, and other set-based collections.
    You also need to include and exclude individual members and groups dynamically
    based on other data at the same time. For instance, you want to count how many
    jobs each employee has held during their time at the organization, based on the
    number of promotions they’ve had within the company.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA


    Solution


    Oracle’s COUNT feature can be used to count materialized results as well as actual
    rows in tables. The next SELECT statement uses a subquery to count the instances
    of jobs held across tables, and then summarizes those counts. In effect, this
    is a count of counts against data resulting from a query, rather than anything
    stored directly in Oracle.


    select jh.JobsHeld, count(*) as StaffCount


    from


    (select u.employee_id, count(*) as JobsHeld


    from


    (select employee_id from hr.employees


    union all


    select employee_id from hr.job_history) u


    group by u.employee_id) jh


    group by jh.JobsHeld;


    From that SELECT statement, we get the following concise summary.


    JOBSHELD STAFFCOUNT'
  trans: "\n# 第 2 章 ■ 数据汇总与聚合\n\nROLLUP 和 CUBE 函数的强大之处在于，它们可以扩展到查询所需的任意多“维度”。诚然，“立方体”（cube）一词意在暗示在三维空间中查看中间聚合的思想，但您的数据通常可能拥有超过三维的维度。扩展我们的食谱，我们可以通过部门、职位、经理和入职年份来“立方体化”平均工资的计算。\n\
    \n```sql\nSELECT department_id, job_id, manager_id,\n       extract(year from\
    \ hire_date) as \"START_YEAR\", avg(salary)\nFROM   hr.employees\nGROUP  BY cube\
    \ (department_id, job_id, manager_id, extract(year from hire_date));\n```\n此食谱的结果是对四个维度平均工资的考察！\n\
    \n## 2-6. 在其他查询中使用聚合结果\n\n### 问题\n\n您希望将涉及聚合和分组的复杂查询的输出，用作另一个查询的源数据。\n\n### 解决方案\n\
    \nOracle 允许任何查询用作子查询或内联视图，包括那些包含聚合和分组函数的查询。这在您希望指定组级条件，并与其他表或查询的数据进行比较，且没有现成视图可用时特别有用。\n\
    \n对于我们的食谱，我们将使用一个包含按部门、职位和起始年份进行 rollup 的平均工资计算，如下面的 `SELECT` 语句所示。\n\n```sql\n\
    select * from (\n  select department_id as \"dept\", job_id as \"job\",\n    \
    \     to_char(hire_date,'YYYY') as \"Start_Year\", avg(salary) as \"avsal\"\n\
    \  from   hr.employees\n  group  by rollup (department_id, job_id, to_char(hire_date,'YYYY')))\n\
    salcalc where salcalc.start_year > '1990'\nor salcalc.start_year is null\norder\
    \ by 1,2,3,4;\n```\n\n我们的食谱产生以下（节选的）输出：\n\ndept job Start_Year avsal\n----------\
    \ ---------- ----- ----------\n10 AD_ASST     4400\n10                  4400\n\
    20 MK_MAN 1996 13000\n20 MK_MAN      13000\n20 MK_REP 1997 6000\n20 MK_REP   \
    \    6000\n…\n              6473.36449\n79 rows selected.\n\n### 工作原理\n\n我们的食谱使用子查询的聚合和分组结果作为内联视图，然后我们从中选择并应用进一步的条件。在这种情况下，我们可以通过使用更复杂的\
    \ `HAVING` 子句来避免子查询方法，如下所示。\n\n```sql\nhaving to_char(hire_date,'YYYY') > '1990'\n\
    or to_char(hire_date,'YYYY') is null\n```\n\n在这里避免子查询之所以可行，仅仅是因为我们将聚合与字面值进行比较。如果我们想查找那些在某个职位上有人曾担任过的部门中，该职位的平均值，我们就需要引用\
    \ `HR.JOBHISTORY` 表。根据业务需求，我们可能幸运地能够在一个语句中构建连接、聚合、分组和 `HAVING` 条件。通过将聚合和分组查询的结果视为另一个查询的输入，我们获得了更好的可读性，并且能够编码比\
    \ `HAVING` 子句所允许的更复杂的逻辑。\n\n## 2-7. 统计组和集合中的成员\n\n### 问题\n\n您需要统计一个组的成员、组的组以及其他基于集合的集合。同时，您需要根据其他数据动态地包含或排除单个成员和组。例如，您想根据员工在公司内获得的晋升次数，统计他们在组织任职期间担任过多少个不同的职位。\n\
    \n### 解决方案\n\nOracle 的 `COUNT` 功能可用于统计物化结果以及表中的实际行。下一个 `SELECT` 语句使用一个子查询来统计跨表持有的职位实例，然后汇总这些计数。实际上，这是对查询结果数据的计数的计数，而不是任何直接存储在\
    \ Oracle 中的内容。\n\n```sql\nselect jh.JobsHeld, count(*) as StaffCount\nfrom\n \
    \ (select u.employee_id, count(*) as JobsHeld\n   from\n     (select employee_id\
    \ from hr.employees\n      union all\n      select employee_id from hr.job_history)\
    \ u\n   group by u.employee_id) jh\ngroup by jh.JobsHeld;\n```\n\n从该 `SELECT`\
    \ 语句中，我们得到以下简明的摘要。\n\nJOBSHELD STAFFCOUNT\n---------- ----------\n"
