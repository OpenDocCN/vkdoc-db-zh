- fmt: "## 14-5\\. Generating Complex XML Documents\n\n### Problem\n\nYou need to\
    \ convert a variety of traditional data in your database to an XML format. You\
    \ particularly want to create a more complex XML document than a simple table-to-XML\
    \ conversion, for instance by treating some relational values as attributes, and\
    \ nesting values at different levels from a sample of employee data.\n\n### Solution\n\
    \nOracle has a bewildering array of functions and procedures for generating XML\
    \ from regular data. For our stated problem, we’ll assume we’d like to use the\
    \ `EMPLOYEE_ID` of an employee as an XML attribute to the root element, rather\
    \ than as an element in its own right. We’d also like to provide added detail\
    \ on salary, specifying the payment period as an attribute, and adding currency\
    \ details. Tools like `DBMS_XMLGEN` or `SYS_XMLGEN` would require awkward intervention\
    \ to provide this level of XML-specific massaging of the data.\n\nWhen dealing\
    \ with the need to carefully craft an XML result, the lower-level functions `XMLROOT`,\
    \ `XMLELEMENT`, and `XMLATTRIBUTE` provide fine-grained control over the structure\
    \ of your desired XML. The next statement uses these functions to produce the\
    \ XML finesse our recipe demands.\n\n```sql\nselect XMLRoot(\n    XMLElement(\"\
    Employee\",\n        XMLAttributes(employee_id as \"Employee_ID\"),\n        XMLElement(\"\
    FirstName\", first_name),\n        XMLElement(\"LastName\", last_name),\n    \
    \    XMLElement(\"Salary\",\n            XMLAttributes('Monthly' as \"Period\"\
    ),\n            XMLElement(\"Amount\", salary),\n            XMLElement(\"Currency\"\
    , 'USD'))\n    ),\n    VERSION '1.0') Employee_XML\nfrom hr.employees\nwhere employee_id\
    \ = 205;\n```\n\nThe results yield our required data in a well-formed XML document,\
    \ including the correct XML header.\n\n```xml\n<?xml version=\"1.0\"?>\n<Employee\
    \ Employee_ID=\"205\">\n  <FirstName>Shelley</FirstName>\n  <LastName>Higgins</LastName>\n\
    \  <Salary Period=\"Monthly\">\n    <Amount>12000</Amount>\n    <Currency>USD</Currency>\n\
    \  </Salary>\n</Employee>\n```\n\n### How It Works\n\nOur recipe uses the `XMLROOT`,\
    \ `XMLELEMENT`, and `XMLATTRIBUTES` functions to build the required XML structure\
    \ to represent our employee data.\n\nUsing `XMLROOT` provides the necessary XML\
    \ header to turn our results from an XML fragment into a fully formed XML document.\
    \ `XMLROOT` produces the header line, shown next.\n\n```xml\n<?xml version=\"\
    1.0\"?>\n```\n\nTo most people this is just a semantic difference, but when testing\
    \ XML for validity as a full XML document, the correct header element is required.\n\
    \nYou can think of `XMLELEMENT` as being the XML equivalent of a `PUT_LINE` and\
    \ concatenation, `||`, command. A call to `XMLELEMENT` outputs the source column\
    \ or expression together with the provided element name to form XML building blocks\
    \ for the result. The trick to using `XMLELEMENT` is to keep in mind two capabilities.\
    \ You can string as many calls to `XMLELEMENT` together as you wish (just as you\
    \ can concatenate any number of strings), and the expression on which it operates\
    \ can itself be another call to `XMLELEMENT`. This nesting of calls produces equivalent\
    \ nested elements in the output. You can see this in the recipe in this code fragment.\n\
    \n```sql\n…\nXMLElement(\"Salary\",\n    XMLAttributes('Monthly' as \"Period\"\
    ),\n    XMLElement(\"Amount\", salary),\n    XMLElement(\"Currency\", 'USD')\n\
    …\n```\n\nHere we’re instructing Oracle that the `<Salary>` element is composed\
    \ of a call to `XMLATTRIBUTES`, and two calls to `XMLELEMENT`. While this is more\
    \ laborious than a call to `DBMS_XMLGEN` or `SYS_XMLGEN`, the key is the ability\
    \ to control the structure with simple commands. Neither of those system packages\
    \ provides the ability to structure your results beyond simple, single-level XML.\
    \ This is where `XMLELEMENT` provides the needed capabilities.\n\nOur calls to\
    \ `XMLATTRIBUTES` instruct Oracle to place the given columns or expressions as\
    \ attributes of the element created by the parent call to `XMLELEMENT`. For instance,\
    \ in the code fragment just shown, we use `XMLATTRIBUTES` to create a `Period`\
    \ attribute for the `<Salary>` element, giving the attribute the value `Monthly`.\
    \ A very common technique in XML data management is to include the notional primary\
    \ key value or values as attributes to the root element or parent element of an\
    \ entity, rather than place them as a sub-elements in their own right. You can\
    \ see we’ve taken this approach with the `EMPLOYEE_ID` value sources from the\
    \ `HR.EMPLOYEES` table. We use the call shown next to make this an attribute of\
    \ the `<Employee>` element.\n\n```sql\nXMLAttributes(employee_id as \"Employee_ID\"\
    )\n```\n\n## 14-6\\. Validating XML Schema\n\n### Problem\n\nYou would like to\
    \ enforce XML schema validity on XML data stored in your database. Warehouse specifications\
    \ are currently stored without being checked against a valid schema, and you want\
    \ to check this data against an appropriate schema to ensure its structure and\
    \ content adhere to the schema’s stipulations.\n\n### Solution\n\nOracle provides\
    \ the `DBMS_XMLSCHEMA.REGISTERSCHEMA` function to define XML schemas within the\
    \ Oracle database. We’ve created the necessary XML schema and hosted it on a local\
    \ web server. As shown next, we embed a reference to this schema in a call to\
    \ `REGISTERSCHEMA` to enable Oracle to find and register the schema.\n\n```sql\n\
    begin\n    dbms_xmlschema.registerschema(\n        schemaurl=>'http://localhost/transfer/warehouse_schema.xsd',\n\
    \        schemadoc=>\n'<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<xs:schema\n\
    \    targetNamespace=\"http://tempuri.org/XMLSchema.xsd\"\n    elementFormDefault=\"\
    qualified\"\n    >\n  <xs:element name=\"warehouse_spec\">\n    <xs:complexType>\n\
    \      <xs:sequence>\n        <xs:element name=\"Building\" type=\"xs:string\"\
    \ minOccurs=\"1\"\n                    xdb:SQLName=\"BUILDING\" />\n        <xs:element\
    \ name=\"Area\" type=\"xs:unsignedInt\" minOccurs=\"1\"\n                    xdb:SQLName=\"\
    AREA\" />\n        <xs:element name=\"Docks\" type=\"xs:unsignedInt\" minOccurs=\"\
    1\"\n                    xdb:SQLName=\"DOCKS\" />\n        <xs:element name=\"\
    DockType\" type=\"xs:string\" minOccurs=\"1\"\n                    xdb:SQLName=\"\
    DOCKTYPE\" />\n        <xs:element name=\"WaterAccess\" type=\"xs:boolean\" minOccurs=\"\
    1\"\n                    xdb:SQLName=\"WATERACCESS\" />\n        <xs:element name=\"\
    RailAccess\" type=\"xs:boolean\" minOccurs=\"0\"\n                    xdb:SQLName=\"\
    RAILACCESS\" />\n        <xs:element name=\"Parking\" type=\"xs:string\" minOccurs=\"\
    0\"\n                    xdb:SQLName=\"PARKING\" />\n        <xs:element name=\"\
    VClearance\" type=\"xs:string\" minOccurs=\"0\"\n                    xdb:SQLName=\"\
    VCLEARANCE\" />\n      </xs:sequence>\n    </xs:complexType>\n  </xs:element>\n\
    </xs:schema>');\nend;\n/\n```"
  raw: 'The EXTRACT function’s operation on XML differs from its behavior when used
    against other datatypes. For instance, when used on dates or times, EXTRACT will
    return only the portion of the date or time requested, such as the month. If month
    is requested, EXTRACT won’t return the date or time, or any of the “smaller” measures,
    such as day, hour, and so on. See Chapter 6 for recipes illustrating this behavior.
    When operating against XMLTYPE data, EXTRACT returns everything at or below the
    nesting level of the matching element. The next SQL statement shows the implications
    of this behavior if we alter our recipe to seek the <Warehouse> element, rather
    than <VClearance> element within <Warehouse>.


    select


    extract(warehouse_spec, ''Warehouse'') as VClearance_XML


    from oe.warehouses


    where warehouse_id = 1;


    <Warehouse>


    <Building>Owned</Building>


    <Area>25000</Area>


    <Docks>2</Docks>


    <DockType>Rear load</DockType>


    <WaterAccess>Y</WaterAccess>


    <RailAccess>N</RailAccess>


    <Parking>Street</Parking>


    <VClearance>10 ft</VClearance>


    </Warehouse>


    Our modified statement matched the <Warehouse> element, and EXTRACT returned the
    entire XML


    sub-tree below the requested element as a result.


    14-5\. Generating Complex XML Documents


    Problem


    You need to convert a variety of traditional data in your database to an XML format.
    You particularly want to create a more complex XML document than a simple table-to-XML
    conversion, for instance by treating some relational values as attributes, and
    nesting values at different levels from a sample of employee data.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ WORKING WITH XML DATA


    Solution


    Oracle has a bewildering array of functions and procedures for generating XML
    from regular data. For our stated problem, we’ll assume we’d like to use the EMPLOYEE_ID
    of an employee as an XML attribute to the root element, rather than as an element
    in its own right. We’d also like to provide added detail on salary, specifying
    the payment period as an attribute, and adding currency details. Tools like DBMS_XMLGEN
    or SYS_XMLGEN would require awkward intervention to provide this level of XML-specific
    massaging of the data.


    When dealing with the need to carefully craft an XML result, the lower-level functions
    XMLROOT, XMLELEMENT, and XMLATTRIBUTE provide fine-grained control over the structure
    of your desired XML. The next statement uses these functions to produce the XML
    finesse our recipe demands.


    select XMLRoot(


    XMLElement("Employee",


    XMLAttributes(employee_id as "Employee_ID"),


    XMLElement("FirstName", first_name),


    XMLElement("LastName", last_name),


    XMLElement("Salary",


    XMLAttributes(''Monthly'' as "Period"),


    XMLElement("Amount", salary),


    XMLElement("Currency", ''USD''))


    ),


    VERSION ''1.0'') Employee_XML


    from hr.employees


    where employee_id = 205;


    The results yield our required data in a well-formed XML document, including the
    correct XML


    header.


    <?xml version="1.0"?>


    <Employee Employee_ID="205">


    <FirstName>Shelley</FirstName>


    <LastName>Higgins</LastName>


    <Salary Period="Monthly">


    <Amount>12000</Amount>


    <Currency>USD</Currency>


    </Salary>


    </Employee>


    How It Works


    Our recipe uses the XMLROOT, XMLELEMENT, and XMLATTRIBUTES functions to build
    the required XML


    structure to represent our employee data.


    Using XMLROOT provides the necessary XML header to turn our results from an XML
    fragment into a fully formed XML document. XMLROOT produces the header line, shown
    next.


    <?xml version="1.0"?>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ WORKING WITH XML DATA


    To most people this is just a semantic difference, but when testing XML for validity
    as a full XML


    document, the correct header element is required.


    You can think of XMLELEMENT as being the XML equivalent of a PUT_LINE and concatenation,
    ||, command. A call to XMLELEMENT outputs the source column or expression together
    with the provided element name to form XML building blocks for the result. The
    trick to using XMLELEMENT is to keep in mind two capabilities. You can string
    as many calls to XMLELEMENT together as you wish (just as you can concatenate
    any number of strings), and the expression on which it operates can itself be
    another call to XMLELEMENT. This nesting of calls produces equivalent nested elements
    in the output. You can see this in the recipe in this code fragment.


    …


    XMLElement("Salary",


    XMLAttributes(''Monthly'' as "Period"),


    XMLElement("Amount", salary),


    XMLElement("Currency", ''USD'')


    …


    Here we’re instructing Oracle that the <Salary> element is composed of a call
    to XMLATTRIBUTES, and two calls to XMLELEMENT. While this is more laborious than
    a call to DBMS_XMLGEN or SYS_XMLGEN, the key is the ability to control the structure
    with simple commands. Neither of those system packages provides the ability to
    structure your results beyond simple, single-level XML. This is where XMLELEMENT
    provides the needed capabilities.


    Our calls to XMLATTRIBUTES instruct Oracle to place the given columns or expressions
    as attributes of the element created by the parent call to XMLELEMENT. For instance,
    in the code fragment just shown, we use XMLATTRIBUTES to create a Period attribute
    for the <Salary> element, giving the attribute the value Monthly. A very common
    technique in XML data management is to include the notional primary key value
    or values as attributes to the root element or parent element of an entity, rather
    than place them as a sub-elements in their own right. You can see we’ve taken
    this approach with the EMPLOYEE_ID value sources from the HR.EMPLOYEES table.
    We use the call shown next to make this an attribute of the


    <Employee> element.


    XMLAttributes(employee_id as "Employee_ID")


    14-6\. Validating XML Schema


    Problem


    You would like to enforce XML schema validity on XML data stored in your database.
    Warehouse specifications are currently stored without being checked against a
    valid schema, and you want to check this data against an appropriate schema to
    ensure its structure and content adhere to the schema’s stipulations.


    Solution


    Oracle provides the DBMS_XMLSCHEMA.REGISTERSCHEMA function to define XML schemas
    within the Oracle database. We’ve created the necessary XML schema and hosted
    it on a local web server. As shown next, 346


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ WORKING WITH XML DATA


    we embed a reference to this schema in a call to REGISTERSCHEMA to enable Oracle
