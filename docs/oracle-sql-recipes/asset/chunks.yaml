- fmt: "## 2-15. Removing Duplicate Rows Based on a Subset of Columns\n\n### Problem\n\
    \nData needs to be cleansed from a table based on duplicate values that are present\
    \ only in a subset of rows.\n\n### Solution\n\nHistorically there were Oracle-specific\
    \ solutions for this problem that used the `ROWNUM` feature. However, this can\
    \ become awkward and complex if you have multiple groups of duplicates and want\
    \ to remove the excess data in one pass. Instead, you can use Oracle’s `ROW_NUMBER`\
    \ OLAP function with a `DELETE` statement to efficiently remove all duplicates\
    \ in one pass.\n\nTo illustrate our recipe in action, we’ll first introduce several\
    \ new staff members that have the same `FIRST_NAME` and `LAST_NAME` as some existing\
    \ employees. These `INSERT` statements create our problematic duplicates.\n\n\
    ```sql\ninsert into hr.employees\n(employee_id, first_name, last_name, email,\
    \ phone_number, hire_date, job_id, salary, commission_pct, manager_id, department_id)\n\
    Values\n(210, 'Janette', 'King', 'JKING2', '650.555.8880', '25-MAR-2009', 'SA_REP',\
    \ 3500, 0.25, 145, 80);\n\nInsert into hr.employees\n(employee_id, first_name,\
    \ last_name, email, phone_number, hire_date, job_id, salary, commission_pct, manager_id,\
