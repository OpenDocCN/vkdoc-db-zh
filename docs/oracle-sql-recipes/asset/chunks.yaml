    \ ------------\n        1000 1297 Via Cola di Rie                          Roma\
    \                       00989\n        1100 93091 Calle della Testa          \
    \             Venice                     10934\n        2500 Magdalen Centre,\
    \ The Oxford Science Park      Oxford                     OX9 9ZB\n        2800\
    \ Rua Frei Caneca 1360                          Sao Paulo                  01307-002\n\
    \        2900 20 Rue des Corps-Saints                       Geneva           \
    \          1730\n5 rows selected\n```\n\n模式 `\\s` 匹配目标字符串中的空白字符（例如空格、制表符或换行符）。因此，没有匹配的\
    \ `\\s` 意味着地址是一个单词，匹配一次意味着地址是两个单词，依此类推。\n\n### 工作原理\n\n当您只想查明字符串是否匹配某个模式时，`REGEXP_INSTR`\
    \ 甚至 `INSTR` 都可以正常工作。您甚至可以找到字符串的第 *n* 次出现。但在提取第 *n* 次出现之前，您通常想知道 *n* 是什么！一旦知道了计数，它会使您在\
    \ PL/SQL 或其他语言中的循环结构变得简单一些。它也是过滤表中行的另一种方式：例如，只包含计数超过阈值的行，如本解决方案所示。\n\n**注意** 对于在目标字符串中计算字符串常量（而不是模式）的次数，没有等效的单一内置\
    \ Oracle 函数与 `REGEXP_COUNT` 功能相同。\n"
- fmt: "# CHAPTER 7 ■ STRINGS\n\n## 7-7. Replacing Text in a String\n\n### Problem\n\
    \nYou need to perform basic address standardization by converting all variations\
    \ of “Road” to the string “RD” at the end of the string.\n\n### Solution\n\nTo\
    \ update substrings within several database columns using a regular expression,\
    \ you can use the `REPLACE` function; however `REPLACE` may be not be suitable\
    \ or practical for some substring substitutions, such as scenarios where using\
    \ `REPLACE` will be tedious, error-prone, or even impossible without using a programming\
    \ language. Thus, you can use the `REGEXP_REPLACE` built-in function to extend\
    \ the functionality of `REPLACE` to specify a regular expression instead of a\
    \ constant as the string to replace. This example performs basic address standardization\
    \ by converting all variations of “Road” to “RD” at the end of the string:\n\n\
    ```sql\nupdate locations\nset street_address =\n    regexp_replace(street_address,'\\\
    s(road|rd|roade)$',' RD',1,0,'i')\nwhere regexp_instr(street_address,'\\s(road|rd|roade)$',1,1,0,'i')\
    \ > 0\n;\n```\n\n```\n3 rows updated\n```\n\nIf you query the table after performing\
    \ the update, you can see the translated street addresses (including street addresses\
    \ that already include “RD” in the street address):\n\n```sql\nselect location_id,\
    \ street_address\nfrom locations\nwhere instr(street_address,'RD') > 0\n;\n```\n\
    \n```\nLOCATION_ID STREET_ADDRESS\n---------------------- ----------------------------------------\n\
    1400 2014 Jabberwocky RD\n1700 2004 Charade RD\n2600 9702 Chester RD\n3 rows selected\n\
    ```\n\nThe `REGEXP_REPLACE` starts searching at the first character in the string\
    \ and replaces all occurrences of any of the strings within the pattern. `REGEXP_REPLACE`\
    \ ignores case when performing the substitutions.\n\nNote that you must include\
    \ the whitespace character `\\s` in the regular expression to make sure you do\
    \ not match words like “Oxford” or “Broad” or any word ending with one of the\
    \ options within the regular expression at the end of the street address.\n\n\
    ### How It Works\n\nThe solution uses `REGEXP_REPLACE` and `REGEXP_INSTR` to perform\
    \ the task. To further simplify the task, you could simplify the `UPDATE` statement\
    \ to this:\n\n```sql\nupdate locations\nset street_address =\n    regexp_replace(street_address,'\\\
    s(road|rd|roade)$',' RD',1,0,'i')\n;\n```\n\nHowever, there is a significant downside\
    \ to this `UPDATE` statement. Regardless of whether there is a match, *every*\
    \ row will have its `STREET_ADDRESS` column updated. This will introduce unnecessary\
    \ row locking on the table, as well as excessive use of the redo log files where\
    \ it is not necessary. Unless you expect to update all rows in the table, use\
    \ the `WHERE` clause. The slight additional CPU cost of running both `REGEXP_REPLACE`\
    \ and `REGEXP_INSTR` for rows that match the `WHERE` clause is a much better alternative\
    \ than reducing table availability or unnecessarily using redo and undo space.\n\
    \nYou can specify that `REGEXP_REPLACE` start in a specific position within the\
    \ target string, match only the nth occurrence, or change matching behavior such\
    \ as case sensitivity; the solution mapped all variations of “road” using case-insensitivity.\
    \ These capabilities are common among all of the Oracle `REGEXP_` functions. Here\
    \ is the list of parameters for `REGEXP_REPLACE`:\n\n* `source_string`: the column\
    \ or string to be updated.\n\n### Additional Note on REGEXP_COUNT\n\n`REGEXP_COUNT`\
    \ includes two additional parameters you will see in other Oracle functions that\
    \ find patterns: one for changing the starting position of the search in the target\
    \ string and one for changing the matching behavior. For example, you may want\
    \ your search to start in the fifth position of the target string and perform\
    \ a case-insensitive match:\n\n```sql\nselect location_id, street_address, city\n\
    from locations\nwhere regexp_count(street_address,'east [0-9]*',5,'i') > 0\n;\n\
    ```\n\nRegardless of where you start the search in the target string, `REGEXP_COUNT`\
    \ starts looking for successive matches at the first character after the end of\
    \ the previous match."
