    5-4\. Testing for the Existence of Data


    Problem


    You would like to compare the data in two related tables, to show where matching
    data exists, and to also show where matching data doesn’t exist.


    Solution


    Oracle supports the EXISTS and NOT EXISTS predicates, allowing you to correlate
    the data in one table or expression with matching or missing data in another table
    or expression. We’ll use the hypothetical situation of needing to find which departments
    currently have managers. Phrasing this in a way that best illustrates the EXISTS
    solution, the next SQL statement finds all departments where a manager is known
    to exist.


    select department_name


    from hr.departments d


    where exists


    (select e.employee_id


