- fmt: "# 13-5. Detecting Cycles in Hierarchical Data\n\n## Problem\n\nUpdates were\
    \ made to a hierarchical table and now any hierarchical query run against the\
    \ table generates this error message:\n\nSQL Error: ORA-01436: CONNECT BY loop\
    \ in user data\n\nYou need to identify the row that was updated incorrectly, generating\
    \ this error message.\n\n## Solution\n\nUse the `CONNECT_BY_ISCYCLE` pseudo-column\
    \ and the `NOCYCLE` keyword in the `CONNECT BY` clause to force Oracle to run\
    \ the query but stop returning rows that cause a cycle in the hierarchy structure.\
    \ For example:\n\n```sql\nselect employee_id, manager_id, level lvl,\nconnect_by_iscycle\
    \ is_cycle,\nlpad(' ',(level-1)*3) || last_name || ', ' || first_name full_name\n\
    from employees\nstart with last_name = 'Kochhar'\nconnect by nocycle manager_id\
    \ = prior employee_id\n;\n```\n\nEMPLOYEE_ID MANAGER_ID LVL IS_CYCLE FULL_NAME\n\
    ------------ ------------ --- -------- -----------------------\n101 113 1 0 Kochhar,\
    \ Neena\n108 101 2 0 Greenberg, Nancy\n109 108 3 0 Faviet, Daniel\n110 108 3 0\
    \ Chen, John\n111 108 3 0 Sciarra, Ismael\n112 108 3 0 Urman, Jose Manuel\n113\
    \ 108 3 1 Popp, Luis\n200 101 2 0 Whalen, Jennifer\n203 101 2 0 Mavris, Susan\n\
    204 101 2 0 Baer, Hermann\n205 101 2 0 Higgins, Shelley\n206 205 3 0 Gietz, William\n\
    \n12 rows selected\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nCHAPTER\
    \ 13 ■ TREE-STRUCTURED DATA\n\nThe employee hierarchy in the department headed\
    \ by Kochhar was incorrectly modified, and the row with `IS_CYCLE = 1` identifies\
    \ the row causing a cycle in the data. The manager for the department, Kochhar,\
    \ now has a manager with `EMPLOYEE_ID = 113` (Popp), whose managerial structure\
    \ follows up the tree back to Kochhar. The `MANAGER_ID` for Kochhar has to be\
    \ changed to another employee who is not one of the subordinates in her management\
    \ hierarchy.\n\n## How It Works\n\nAny application that maintains a table or set\
    \ of tables in a hierarchical structure should not allow any edits that generate\
    \ a loop. However, errors occur, such as manual edits to the table that bypass\
    \ the application logic. Detecting the source of the loop is a two-step process:\
    \ first, identify the row that is causing the loop. However, as in this scenario,\
    \ that row may not be the row that was incorrectly updated. The second step is\
    \ to take the row information (usually a primary key) and find other rows that\
    \ may incorrectly reference the flagged row. It might be easy to spot the loop\
    \ with a small result set, as in the example above, but for queries returning\
    \ hundreds or thousands of rows, you will have to use a query like this:\n\n```sql\n\
    select employee_id, manager_id, last_name, first_name\nfrom employees\nwhere manager_id\
    \ in\n(\n    select employee_id\n    from employees\n    where connect_by_iscycle\
    \ = 1\n    start with last_name = 'Kochhar'\n    connect by nocycle manager_id\
    \ = prior employee_id\n);\n```\n\nFixing the problem requires identifying the\
    \ correct parent for the row causing the loop using the previous query, then updating\
    \ the column in the row that links the rows together:\n\n```sql\nupdate employees\n\
    set manager_id = 100\nwhere employee_id = 101\n;\n```\n\nEmployee Kochhar has\
    \ now been updated to the original value with the correct manager (King), who\
    \ is not one of her direct or indirect reports!\n\n# 13-6. Generating a Fixed\
    \ Number of Sequential Primary Keys\n\n## Problem\n\nYou want to generate a virtual\
    \ table of a sequence of 1000 numbers as the basis of a new table you will populate\
    \ later. Using a sequence won’t work, however, unless you create a table using\
    \ PL/SQL or some other programming language. You could use an existing table,\
    \ but it might have too few or too many rows for your needs.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nCHAPTER 13 ■ TREE-STRUCTURED DATA\n\n## Solution\n\nYou can use a little-known\
    \ (until now) side-effect of Oracle’s `CONNECT BY` hierarchical feature by not\
    \ specifying the `START WITH` or `CONNECT BY` clauses. Here is how to generate\
    \ 1000 rows in sequence:\n\n```sql\nselect level new_pk from dual connect by level\
    \ <= 1000;\n```\n\nNEW_PK\n...\n1000 rows selected"
