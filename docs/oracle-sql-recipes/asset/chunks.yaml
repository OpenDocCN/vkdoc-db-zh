    4-4\. Pivoting on Multiple Columns


    Problem


    You have implemented the solution shown in the previous recipe. Now you wish to
    pivot not only on the total quantity of products, but also on the total dollar
    value purchased.


    Solution


    The following query extends the previous recipe’s solution to add a total dollar
    amount column for each product number:


    with order_item_query as


    (select customer_id, product_id, quantity, **unit_price**


    from orders join order_items using(order_id))


    select * from order_item_query


    pivot (


    sum(quantity) as sum_qty,


    **sum(quantity*unit_price) as sum_prc**


    for (product_id) in (3170 as P3170,


    3176 as P3176,


    3182 as P3182,


    3163 as P3163,


    3165 as P3165)


    )


    order by customer_id


    ;


