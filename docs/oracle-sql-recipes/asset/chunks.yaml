    使用 Oracle 的 `TIMESTAMP` 和 `TIMESTAMP WITH TIME ZONE` 数据类型来处理需要跟踪或与时区一起工作的日期和时间信息。通过
    `FROM_TZ` 函数，你可以使用 `TIMESTAMP` 数据，让 Oracle 执行所有从一个时区转换到另一个时区的计算，处理夏令时变化，甚至处理时区及其夏令时开始和结束日期的历史性变更。


    下一条 SQL 将给定的澳大利亚悉尼时间转换为美国洛杉矶时间。它考虑到了在 SQL 指定的时间点，美国实行夏令时而澳大利亚没有。


    ```

    select

    from_tz

    (cast

    (to_date

    (''2009-08-14 11:25:00'',''YYYY-MM-DD HH:MI:SS'')

    as timestamp)

    , ''Australia/Sydney'')

    ```

