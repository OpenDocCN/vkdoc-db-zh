    \   values (nc.country_id, nc.country_name, nc.region_id)\n    where (nc.region_id\
    \ != 4);\n```\n\n在这个修改后的配方中，匹配的行将会更新其 `COUNTRY_NAME`，除非新数据的 `REGION_ID` 等于 `4`，在这种情况下，`HR.COUNTRIES`\
    \ 中的相应行最终将被删除。\n\n不匹配的行将被插入到 `HR.EMPLOYEES` 表中，除非它们的 `REGION_ID` 是 `4`，在这种情况下它们将被忽略。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 2 章 ■ 数据汇总与聚合\n\n在本章中，我们将介绍一些在更高层次上处理数据的配方，其中分组、汇总和全局概览非常重要。我们将探讨的许多配方涵盖了常见或棘手的报告场景，这类场景常见于商业或专业环境中。大多数机构都需要关于“谁在何时向谁销售了什么”、“特定时间段内发生了多少人、销售额或活动”、“跨区域或客户群的趋势”等方面的报告。\n\
    \n许多人都熟悉 Oracle 提供的一些用于执行汇总和聚合的基本方法。但开发人员和 DBA 通常会尝试在他们的应用程序中执行更复杂的计算——结果把自己搞得一团糟。如果你在自己的工作中看到以下任何组合：在代码中复制数据库功能、不必要地移动临时数据和结果，以及类似低效的任务，你就能发现这个问题。\n\
    \nOracle 在这方面功能正呈爆炸式增长，尤其是在过去几个主要版本中引入了在线分析处理（`OLAP`）功能之后。在探索了这些用于汇总和聚合数据的配方后，你会发现\
    \ Oracle 是你手中满足大量报告和其他需求的头号工具。\n\n## 2-1. 汇总列中的值\n\n**问题**\n\n你需要以某种方式汇总某一列的数据。例如，你被要求报告每位员工的平均薪资、薪资预算总额、员工人数、最高和最低收入者等信息。\n\
    \n**解决方案**\n\n你不需要单独计算总和和计数员工人数来确定平均薪资。`AVG` 函数可以为你计算平均薪资，如下一条 `SELECT` 语句所示。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n```sql\nselect avg(salary)\n\
    from hr.employees;\n\nAVG(SALARY)\n-----------\n6473.36449\n```\n\n请注意，我们的配方中没有\
    \ `WHERE` 子句，这意味着计算总体平均值时评估了 `HR.EMPLOYEES` 表中的所有行。\n\n像 `AVG` 这样的函数被称为 **聚合函数**，你有许多这样的函数可供使用。例如，要计算已支付的总薪资，请使用\
    \ `SUM` 函数，如下所示：\n\n```sql\nselect sum(salary)\nfrom hr.employees;\n\nSUM(SALARY)\n\
    -----------\n666666\n```\n\n要统计领取薪资的人数，你可以简单地使用 `COUNT` 函数统计表中的行数。\n\n```sql\n\
    Select count(salary)\nFrom hr.employees;\n\nCOUNT(SALARY)\n-------------\n107\n\
    ```\n\n最大值和最小值可以使用 `MAX` 和 `MIN` 函数计算。到现在你可能在想 Oracle 为统计函数使用了非常简单的缩写名称，大体上你是对的。`MAX`\
    \ 和 `MIN` 函数如下所示。\n\n```sql\nselect min(salary), max(salary)\nfrom hr.employees;\n\
    \nMIN(SALARY) MAX(SALARY)\n----------- -----------\n2100        24000\n```\n\n\
    **工作原理**\n\nOracle 有大量内置的统计和分析函数来执行常见的汇总任务，例如计算平均值、总和以及最小值和最大值。你不需要手动执行中间计算，尽管如果你想验证\
    \ Oracle 的计算过程也可以这样做。\n\n下面的语句将 Oracle 对薪资的平均值计算结果与我们自己用总额除以员工人数的结果进行了比较。\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n```sql\nselect avg(salary),\
    \ sum(salary)/count(salary)\nfrom hr.employees;\n\nAVG(SALARY) SUM(SALARY)/COUNT(SALARY)\n\
    ----------- -------------------------\n6473.36449  6473.36449\n```\n\n很高兴知道 Oracle\
    \ 的计算是正确的。为了完整了解 Oracle 的聚合功能，我们需要考虑当数据包含 `NULL` 值时会发生什么。我们当前的配方聚合了员工的薪资，恰好每位员工都有薪资。但只有销售人员因其销售努力而获得佣金，这在\
    \ `HR.EMPLOYEES` 表中体现为 `COMMISSION_PCT` 列有值。非销售人员没有佣金，在 `COMMISSION_PCT` 中体现为\
    \ `NULL` 值。那么，当我们尝试对 `COMMISSION_PCT` 值进行平均或计数时会发生什么？下一条 `SQL` 语句展示了这两种聚合的结果。\n\
    \n```sql\nselect count(commission_pct), avg(commission_pct)\nfrom hr.employees;\n\
    \nCOUNT(COMMISSION_PCT) AVG(COMMISSION_PCT)\n--------------------- -------------------\n\
    38                    .225\n```\n\n尽管我们看到了 107 位有薪资的员工，但 `COUNT` 函数忽略了所有 `COMMISSION_PCT`\
    \ 为 `NULL` 的值，只统计了 38 位有佣金的员工。同样，在计算员工佣金的平均值时，Oracle 也只考虑了那些有实际值的行，忽略了 `NULL`\
    \ 条目。\n\n只有两种特殊情况，Oracle 会在聚合函数中考虑 `NULL` 值。第一种是 `GROUPING` 函数，用于测试包含 `NULL` 值的分析函数的结果是直接来自基础表中的行，还是来自分析计算的最终聚合“`NULL`\
    \ 集”。第二种特殊情况是 `COUNT(*)` 函数。因为星号意味着表中的所有列，Oracle 处理行计数时不依赖于任何实际数据值，在这种情况下将 `NULL`\
    \ 和正常值同等对待。\n\n为了说明这一点，下一条 `SQL` 语句并排显示了 `COUNT(*)` 和 `COUNT(COMMISSION_PCT)`\
    \ 的区别。\n\n```sql\nselect count(*), count(commission_pct)\nfrom hr.employees;\n\
    \nCOUNT(*) COUNT(COMMISSION_PCT)\n-------- ---------------------\n107      38\n\
    ```\n\n我们使用 `COUNT(*)` 统计了表中的所有行，而 `COUNT(COMMISSION_PCT)` 只统计了 `COMMISSION_PCT`\
    \ 不为 `NULL` 的值。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 2-2.\
    \ 为不同分组汇总数据\n\n**问题**\n\n你想汇总某一列的数据，但你不想对表中的所有行进行汇总。\n\n你想将行分成若干组，然后分别为每组汇总该列。例如，你需要知道每个部门的平均薪资。\n\
    \n**解决方案**\n\n使用 `SQL` 的 `GROUP BY` 功能将共同的数据子集分组在一起，以便应用 `COUNT`、`MIN`、`MAX`、`SUM`\
    \ 和 `AVG` 等函数。这条 `SQL` 语句展示了如何使用 `GROUP BY` 对数据的子组应用聚合函数。\n\n```sql\nselect department_id,\
    \ avg(salary)\nfrom hr.employees\ngroup by department_id;\n```\n\n以下是按 `DEPARTMENT_ID`\
    \ 显示平均值的结果。\n\n```\nDEPARTMENT_ID AVG(SALARY)\n------------- -----------\n100\
    \           8600\n30            4150\n20            9500\n70            10000\n\
    90            19333.3333\n110           10150\n50            3503.33333\n40  \
    \          6500\n80            8955.88235\n10            4400\n60            5760\n\
    \n12 rows selected.\n```\n\n请注意，结果的第三行显示 `DEPARTMENT_ID` 为 null。\n\n**工作原理**\n"
- fmt: "# CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA\n\nThe `GROUP BY` clause determines\
    \ what groups the target table’s rows should be put into for any subsequence aggregate\
    \ functions. For performance reasons, Oracle will implicitly sort the data to\
    \ match the grouping desired. From the first line of the `SELECT` statement, you\
    \ can normally glean the columns that will be required in the `GROUP BY` clause.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n```sql\nselect department_id,\
    \ avg(salary)\n```\n\nWe’ve told Oracle that we want to aggregate individual salary\
    \ data into an average, but we haven’t told it what to do with the individual\
    \ `DEPARTMENT_ID` values for each row. Should we show every `DEPARTMENT_ID` entry,\
    \ including duplicates, with the average against each one? Obviously, this would\
    \ result in wasted, duplicate output—and also leave you wondering if there was\
    \ something more complex you needed to understand. By using the “unaggregated”\
    \ fields in the `GROUP BY` clause, we instruct Oracle how to collapse, or group,\
    \ the singular row values against the aggregated values it has calculated.\n\n\
    ```sql\ngroup by department_id\n```\n\nThis means that all values in our `SELECT`\
    \ statement are either aggregates or covered by the `GROUP BY` clause. The key\
    \ to writing syntactically correct `GROUP BY` statements is to always remember,\
    \ values are either grouped or aggregated—no “stragglers” are allowed. You can\
    \ see this clearly in a query that groups by multiple values.\n\n## 2-3. Grouping\
    \ Data by Multiple Fields\n\n### Problem\n\nYou need to report data grouped by\
    \ multiple values simultaneously. For example, an HR department may need to report\
    \ on minimum, average, and maximum `SALARY` by `DEPARTMENT_ID` and `JOB_ID`.\n\
    \n### Solution\n\nOracle’s `GROUP BY` capabilities extend to an arbitrary number\
    \ of columns and expressions, so we can extend the previous recipe to encompass\
    \ our new grouping requirements. We know what we want aggregated: the `SALARY`\
    \ value aggregated three different ways. That leaves the `DEPARTMENT_ID` and `JOB_ID`\
    \ to be grouped. We also want our results ordered so we can see different `JOB_ID`\
    \ values in the same department in context, from highest `SALARY` to lowest. The\
    \ next SQL statement achieves this by adding the necessary criteria to the `GROUP\
    \ BY` and `ORDER BY` clauses.\n\n```sql\nSelect department_id, job_id, min(salary),\
    \ avg(salary), max(salary)\nFrom hr.employees\nGroup by department_id, job_id\n\
    Order by department_id, max(salary) desc;\n```\n\n```text\nDEPARTMENT_ID JOB_ID\
    \ MIN(SALARY) AVG(SALARY) MAX(SALARY)\n------------- ---------- ----------- -----------\
    \ -----------\n           10 AD_ASST        4400        4400        4400\n   \
    \        20 MK_MAN        13000       13000       13000\n           20 MK_REP\
    \         6000        6000        6000\n           30 PU_MAN        11000    \
    \   11000       11000\n           30 PU_CLERK       2500        2780        3100\n\
    ...\n20 rows selected.\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## How It Works\n\nWhen ordering by aggregate or other functions, you can take\
    \ advantage of Oracle’s shorthand notation for ordering columns. Thus you can\
    \ write the statement to order by the column-based positions of your data, rather\
    \ than having to write the cumbersome full text of the aggregate expression.\n\
    \n```sql\nSelect department_id, job_id, min(salary), avg(salary), max(salary)\n\
    From hr.employees\nGroup by department_id, job_id\nOrder by 1, 5 desc;\n```\n\n\
    You can mix column names, aggregate expressions, numeric positions, and even column\
    \ aliases in the `SELECT` clause within your ordering when working with grouped\
    \ results, as shown in the next SQL statement.\n\n```sql\nSelect department_id,\
    \ job_id, min(salary), avg(salary), max(salary) Max_Sal\nFrom hr.employees\nGroup\
    \ by department_id, job_id\nOrder by 1, job_id, Max_Sal desc;\n```\n\nFlexibility\
    \ is the key here, and as you create and use more complex expressions for ordering\
    \ and grouping, you’ll find aliases and ordinal notation helpful. However, for\
    \ readability’s sake, you should try to stay consistent.\n\n## 2-4. Ignoring Groups\
    \ in Aggregate Data Sets\n\n### Problem\n\nYou want to ignore certain groups of\
    \ data based on the outcome of aggregate functions or grouping actions. In effect,\
    \ you’d really like another `WHERE` clause to work after the `GROUP BY` clause,\
    \ providing criteria at the group or aggregate level.\n\n### Solution\n\nSQL provides\
    \ the `HAVING` clause to apply criteria to grouped data. For our recipe, we solve\
    \ the problem of finding minimum, average, and maximum salary for people performing\
    \ the same job in each of the departments in the `HR.EMPLOYEES` table. Importantly,\
    \ we only want to see these aggregate values where more than one person performs\
    \ the same job in a given department. The next SQL statement uses an expression\
    \ in the `HAVING` clause to solve our problem.\n\n```sql\nselect department_id,\
    \ job_id, min(salary), avg(salary), max(salary), count(*)\nfrom hr.employees\n\
    group by department_id, job_id\nhaving count(*) > 1;\n```\n\nOur recipe results\
    \ in the following summary.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n```text\nDEPARTMENT_ID JOB_ID MIN(SALARY) AVG(SALARY) MAX(SALARY) COUNT(*)\n\
    ------------- ---------- ----------- ----------- ----------- ----------\n    \
    \       90 AD_VP        17000       17000       17000          2\n           50\
    \ ST_CLERK      2100        2800        3600         19\n           80 SA_REP\
    \        6100  8396.55172       11500         29\n           50 ST_MAN       \
    \ 3750  6691.66667        8200          6\n           80 SA_MAN       10500  \
    \     12200       14000          5\n           50 SH_CLERK      2500        3215\
    \        4200         20\n           60 IT_PROG       4200        5760       \
    \ 9000          5\n           30 PU_CLERK      2500        2780        3100  \
    \        5\n          100 FI_ACCOUNT    6900        7920        9000         \
    \ 5\n9 rows selected.\n```\n\n### How It Works\n\nYou can immediately see that\
    \ we have results for only nine groups of employees. Compared with the 20 groups\
    \ returned in the previous recipe, it’s obvious the `HAVING` clause has done something—but\
    \ what?\n\nThe `HAVING` clause is evaluated after all grouping and aggregation\
    \ has taken place. Internally, Oracle will first generate results like this.\n\
    \n```text\nDEPARTMENT_ID JOB_ID MIN(SALARY) AVG(SALARY) MAX(SALARY) COUNT(*)\n\
    ------------- ---------- ----------- ----------- ----------- ----------\n    \
    \      110 AC_ACCOUNT    8300        8300        8300          1\n           90\
    \ AD_VP        17000       17000       17000          2\n           50 ST_CLERK\
    \      2100        2800        3600         19\n           80 SA_REP        6100\
    \  8396.55172       11500         29\n          110 AC_MGR       12000       12000\
    \       12000          1\n...\n```\n\nThis, in effect, is our recipe without the\
    \ `HAVING` clause. Oracle then applies the `HAVING` criteria `having count(*)\
    \ > 1`\n\nThe bolded rows in the previous results have a count of 1 (there’s only\
    \ one employee of that `JOB_ID` in the respective `DEPARTMENT_ID`), which means\
    \ they fail the `HAVING` clause criterion and are excluded from the final results,\
    \ leaving us with the solution we saw above.\n\nThe `HAVING` clause criteria can\
    \ be arbitrarily complex, so you can use multiple criteria of different sorts.\n\
    \n```sql\nselect department_id, job_id, min(salary), avg(salary), max(salary),\
    \ count(*)\nfrom hr.employees\ngroup by department_id, job_id\nhaving count(*)\
    \ > 1\n   and min(salary) between 2500 and 17000\n   and avg(salary) != 5000\n\
    \   and max(salary)/min(salary) < 2\n;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n```text\nDEPARTMENT_ID JOB_ID MIN(SALARY) AVG(SALARY) MAX(SALARY) COUNT(*)\n\
    ------------- ---------- ----------- ----------- ----------- ----------\n    \
    \       90 AD_VP        17000       17000       17000          2\n           80\
    \ SA_REP        6100  8396.55172       11500         29\n           80 SA_MAN\
    \       10500       12200       14000          5\n           50 SH_CLERK     \
    \ 2500        3215        4200         20\n           30 PU_CLERK      2500  \
    \      2780        3100          5\n          100 FI_ACCOUNT    6900        7920\
    \        9000          5\n6 rows selected.\n```\n\n## 2-5. Aggregating Data at\
    \ Multiple Levels\n\n### Problem\n\nYou want to find totals, averages, and other\
    \ aggregate figures, as well as subtotals in various dimensions for a report.\
    \ You want to achieve this with as few statements as possible, preferably just\
    \ one, rather than having to issue separate statements to get each intermediate\
    \ subtotal along the way.\n\n### Solution"
