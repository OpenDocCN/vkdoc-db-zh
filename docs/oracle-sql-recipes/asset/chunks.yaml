    where order_date between ''01-NOV-1999'' and ''30-NOV-1999'')


    select prev_sale, next_sale


    from salesdays


    where next_sale - prev_sale > 1


    order by prev_sale;


    Our query exposes the gaps, in days, between sales for the month of November 1999.


