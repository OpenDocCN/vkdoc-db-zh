  raw: 'The newly designated AVGTREND value is calculated as described, using both
    preceding and following rows. Both our original recipe and this modified version
    are rounded out with a WHERE clause to select only data from the OE.ORDERS table
    for the year 1999\. We group by the derived month number so that our traditional
    sum of ORDER_TOTAL in the second field of the results aggregates correctly, and
    finish up ordering logically by the month number.


    2-15\. Removing Duplicate Rows Based on a Subset of


    Columns


    Problem


    Data needs to be cleansed from a table based on duplicate values that are present
    only in a subset of rows.


    Solution


    Historically there were Oracle-specific solutions for this problem that used the
    ROWNUM feature. However, this can become awkward and complex if you have multiple
    groups of duplicates and want to remove the excess data in one pass. Instead,
    you can use Oracle’s ROW_NUMBER OLAP function with a DELETE


    statement to efficiently remove all duplicates in one pass.


    To illustrate our recipe in action, we’ll first introduce several new staff members
    that have the same FIRST_NAME and LAST_NAME as some existing employees. These
    INSERT statements create our problematic duplicates.


    insert into hr.employees


    (employee_id, first_name, last_name, email, phone_number, hire_date, job_id, salary,
    commission_pct, manager_id, department_id)


    Values


    (210, ''Janette'', ''King'', ''JKING2'', ''650.555.8880'', ''25-MAR-2009'', ''SA_REP'',
    3500, 0.25, 145, 80);


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA


    Insert into hr.employees


    (employee_id, first_name, last_name, email, phone_number, hire_date, job_id, salary,
    commission_pct, manager_id, department_id)


    Values


    (211, ''Patrick'', ''Sully'', ''PSULLY2'', ''650.555.8881'', ''25-MAR-2009'',
    ''SA_REP'', 3500, 0.25, 145, 80);


    Insert into hr.employees


    (employee_id, first_name, last_name, email, phone_number, hire_date, job_id, salary,
    commission_pct, manager_id, department_id)


    **Values**


    **(212, ''Allen'', ''McEwen'', ''AMCEWEN2'', ''650.555.8882'', ''25-MAR-2009'',
    ''SA_REP'',** **3500, 0.25, 145, 80);**


    commit;


    To show that we do indeed have some duplicates, a quick SELECT shows the rows
    in question.


    select employee_id, first_name, last_name


    from hr.employees


    where first_name in (''Janette'',''Patrick'',''Allan'')


    and last_name in (''King'',''Sully'',''McEwen'')


    order by first_name, last_name;


    EMPLOYEE_ID FIRST_NAME LAST_NAME


    **----------- ----------- ----------**


    **158 Allan McEwen**


    **212 Allan McEwen**


    **210 Janette King**


    **156 Janette King**


    **211 Patrick Sully**


    **157 Patrick Sully**


    If you worked in HR, or were one of these people, you might be concerned with
    the unpredictable consequences and want to see the duplicates removed. With our
    problematic data in place, we can introduce the SQL to remove the “extra” Janette
    King, Patrick Sully, and Allen McEwen.


    delete from hr.employees


    where rowid in


    (select rowid


    from


    (select first_name, last_name, rowid,


    row_number() over


    (partition by first_name, last_name order by employee_id)


    staff_row


    from hr.employees)


    where staff_row > 1);


    When run, this code does indeed claim to remove three rows, presumably our duplicates.
    To check, we can repeat our quick query to see which rows match those three names.
    We see this set of results.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA


    EMPLOYEE_ID FIRST_NAME LAST_NAME


    ----------- ----------- -------------------------


    158 Allan McEwen


    156 Janette King


    157 Patrick Sully


    Our DELETE has succeeded, based on finding duplicates for a subset of columns
    only.


    How It Works


    Our recipe uses both the ROW_NUMBER OLAP function and Oracle’s internal ROWID
    value for uniquely identifying rows in a table. The query starts with exactly
    the kind of DELETE syntax you’d assume.


    delete from hr.employees


    where rowid in


    (… nested subqueries here …)'
  trans: "## 2-15. 基于列子集删除重复行\n\n### 问题\n\n需要根据表中仅在部分列上存在的重复值，对数据进行清洗。\n\n### 解决方案\n\
    \n历史上，针对此问题有使用 `ROWNUM` 特性的 Oracle 专有解决方案。然而，如果你有多个重复组并且希望一次操作中删除多余数据，这种方法可能会变得笨拙和复杂。作为替代方案，你可以使用\
    \ Oracle 的 `ROW_NUMBER` OLAP 函数结合 `DELETE` 语句，以高效地在一次操作中删除所有重复项。\n\n为了演示我们的方法，我们将首先引入几名新员工，他们的\
    \ `FIRST_NAME` 和 `LAST_NAME` 与一些现有员工相同。这些 `INSERT` 语句创建了有问题的重复数据。\n\n```sql\n\
    insert into hr.employees\n(employee_id, first_name, last_name, email, phone_number,\
    \ hire_date, job_id, salary, commission_pct, manager_id, department_id)\nValues\n\
    (210, 'Janette', 'King', 'JKING2', '650.555.8880', '25-MAR-2009', 'SA_REP', 3500,\
    \ 0.25, 145, 80);\n\nInsert into hr.employees\n(employee_id, first_name, last_name,\
    \ email, phone_number, hire_date, job_id, salary, commission_pct, manager_id,\
    \ department_id)\nValues\n(211, 'Patrick', 'Sully', 'PSULLY2', '650.555.8881',\
    \ '25-MAR-2009', 'SA_REP', 3500, 0.25, 145, 80);\n\nInsert into hr.employees\n\
    (employee_id, first_name, last_name, email, phone_number, hire_date, job_id, salary,\
    \ commission_pct, manager_id, department_id)\nValues\n(212, 'Allen', 'McEwen',\
    \ 'AMCEWEN2', '650.555.8882', '25-MAR-2009', 'SA_REP', 3500, 0.25, 145, 80);\n\
    \ncommit;\n```\n\n为了证明我们确实存在重复项，一个快速的 `SELECT` 查询显示了有问题的行。\n\n```sql\nselect employee_id,\
    \ first_name, last_name\nfrom hr.employees\nwhere first_name in ('Janette','Patrick','Allan')\n\
    \  and last_name in ('King','Sully','McEwen')\norder by first_name, last_name;\n\
    ```\n\n```\nEMPLOYEE_ID FIRST_NAME LAST_NAME\n----------- ----------- ----------\n\
    \        158 Allan      McEwen\n        212 Allan      McEwen\n        210 Janette\
    \    King\n        156 Janette    King\n        211 Patrick    Sully\n       \
    \ 157 Patrick    Sully\n```\n\n如果你在人力资源部门工作，或者你就是这些人中的一员，你可能会担心不可预测的后果，并希望看到重复项被移除。现在问题数据已经存在，我们可以引入\
    \ SQL 来删除“多余”的 Janette King、Patrick Sully 和 Allen McEwen。\n\n```sql\ndelete from\
    \ hr.employees\nwhere rowid in\n  (select rowid\n    from\n      (select first_name,\
    \ last_name, rowid,\n              row_number() over\n                (partition\
    \ by first_name, last_name order by employee_id)\n                staff_row\n\
    \        from hr.employees)\n    where staff_row > 1);\n```\n\n运行后，这段代码确实声称删除了三行，大概就是我们的重复项。为了验证，我们可以重复之前的快速查询，查看哪些行匹配这三个名字。我们看到如下结果集。\n\
    \n```\nEMPLOYEE_ID FIRST_NAME LAST_NAME\n----------- ----------- -------------------------\n\
    \        158 Allan      McEwen\n        156 Janette    King\n        157 Patrick\
    \    Sully\n```\n\n我们的 `DELETE` 操作成功了，它仅基于部分列子集找到了重复项。\n\n### 工作原理\n\n我们的方法同时使用了\
    \ `ROW_NUMBER` OLAP 函数和 Oracle 内部的 `ROWID` 值（用于唯一标识表中的行）。查询以你预想中的 `DELETE` 语法开始。\n\
    \n```sql\ndelete from hr.employees\nwhere rowid in\n  (… 嵌套子查询在这里 …)\n```"
- fmt: 'As you’d expect, we’re asking Oracle to delete rows from `HR.EMPLOYEES` where
    the `ROWID` value matches the values we detect for duplicates, based on criteria
    evaluating a subset of columns. In our case, we use subqueries to precisely identify
    duplicates based on `FIRST_NAME` and `LAST_NAME`.


    To understand how the nested subqueries work, it’s easiest to start with the innermost
    subquery, which looks like this.


    ```sql

    select first_name, last_name, rowid,

    row_number() over

    (partition by first_name, last_name order by employee_id)

    staff_row

    from hr.employees

    ```


    We’ve intentionally added the columns `FIRST_NAME` and `LAST_NAME` to this innermost
    subquery to make the recipe understandable as we work through its logic. Strictly
    speaking, these are superfluous to the logic, and the innermost subquery could
    be written without them to the same effect. If we execute just this innermost
    query (with the extra columns selected for clarity), we see these results.


    ```

    FIRST_NAME    LAST_NAME       ROWID              STAFF_ROW

    -----------   ------------    ------------------ ----------

    ...

    Alexander     Khoo            AAARAgAAFAAAABYAAP          1

    Janette       King            AAARAgAAFAAAABXAAD          1

    Janette       King            AAARAgAAFAAAABYAA4          2

    Steven        King            AAARAgAAFAAAABYAAA          1

    ...

    Samuel        McCain          AAARAgAAFAAAABYABe          1

    Allan         McEwen          AAARAgAAFAAAABXAAF          1

    Allan         McEwen          AAARAgAAFAAAABYAA6          2

    Irene         Mikkilineni     AAARAgAAFAAAABYAAa          1

    ...

    ...

    Martha        Sullivan        AAARAgAAFAAAABYABS          1

    Patrick       Sully           AAARAgAAFAAAABXAAE          1

    Patrick       Sully           AAARAgAAFAAAABYAA5          2

    Jonathon      Taylor          AAARAgAAFAAAABYABM          1

    ...

    ```


    `110 rows selected.`


    All 110 staff from the `HR.EMPLOYEES` table have their `FIRST_NAME`, `LAST_NAME`
    and `ROWID` returned. The `ROW_NUMBER()` function then works over sets of `FIRST_NAME`
    and `LAST_NAME` driven by the `PARTITION BY` instruction. This means that for
    every unique `FIRST_NAME` and `LAST_NAME`, `ROW_NUMBER` will start a running count
    of rows we’ve aliased as `STAFF_ROW`. When a new `FIRST_NAME` and `LAST_NAME`
    combination is observed, the `STAFF_ROW` counter resets to 1.


    In this way, the first Janette King has a `STAFF_ROW` value of 1, the second Janette
    King entry has a `STAFF_ROW` value of 2, and if there were a third and fourth
    such repeated name, they’d have `STAFF_ROW` values of 3 and 4 respectively. With
    our identically-named staff now numbered, we move to the next outermost subselect,
    which queries the results from above.


    ```sql

    select rowid

    from

    (select rowid,

    row_number() over

    (partition by first_name, last_name order by first_name, last_name)

    staff_row

    from hr.employees)

    where staff_row > 1

    ```


    This outer query looks simple, because it is! We simply `SELECT` the `ROWID` values
    from the results of our innermost query, where the calculated `STAFF_ROW` value
    is greater than 1. That means that we only select the `ROWID` values for the second
    Janette King, Allan McEwen, and Patrick Sully, like this.


    ```

    ROWID

    AAARAgAAFAAAABYAA4

    AAARAgAAFAAAABYAA6

    AAARAgAAFAAAABYAA5

    ```


    Armed with those `ROWID` values, the `DELETE` statement knows exactly which rows
    are the duplicates, based on only a comparison and count of `FIRST_NAME` and `LAST_NAME`.


    The beauty of this recipe is the basic structure translates very easily to deleting
    data based on any such column-subset duplication. The format stays the same, and
    only the table name and a few column names need to be changed. Consider this a
    pseudo-SQL template for all such cases.


    ```sql

    delete from <your_table_here>

    where rowid in

    (select rowid

    from

    (select rowid,

    row_number() over

    (partition by <first_duplicate_column>, <second_duplicate_column>, <etc.> order
    by <desired ordering column> )

    duplicate_row_count

    from <your_table_here> )

    where duplicate_row_count > 1)

    /

    ```


    Simply plug in the value for your table in place of the marker `<your_table_here>`,
    and the columns you wish to use to determine duplication in place of equivalent
    column placeholders, and you’re in business!


    ### 2-16\. Finding Sequence Gaps in a Table


    **Problem**


    You want to find all gaps in the sequence of numbers or in dates and times in
    your data. The gaps could be in dates recorded for a given action, or in some
    other data with a logically consecutive nature.


    **Solution**


    Oracle’s `LAG` and `LEAD` OLAP functions let you compare the current row of results
    with a preceding row.


    The general format of `LAG` looks like this:


    `LAG(column or expression, preceding row offset, default for first row)`


    The `column or expression` is the value to be compared with lagging (preceding)
    values. The `preceding row offset` indicates how many rows prior to the current
    row the `LAG` should act against. We’ve used ‘1’ in the following listing to mean
    the row one prior to the current row. The `default for LAG` indicates what value
    to use as a precedent for the first row, as there is no row zero in a table or
    result. We instruct Oracle to use 0 as the default anchor value, to handle the
    case where we look for the day prior to the first of the month.


    The `WITH` query alias approach can be used in almost all situations where a subquery
    is used, to relocate the subquery details ahead of the main query. This aids readability
    and refactoring of the code if required at a later date.


    This recipe looks for gaps in the sequence of days on which orders were made for
    the month of November 1999:


    ```sql

    with salesdays as

    (select extract(day from order_date) next_sale,

    lag(extract(day from order_date),1,0)

    over (order by extract(day from order_date)) prev_sale

    from oe.orders

    where order_date between ''01-NOV-1999'' and ''30-NOV-1999'')

    select prev_sale, next_sale

    from salesdays

    where next_sale - prev_sale > 1

    order by prev_sale;

    ```


    Our query exposes the gaps, in days, between sales for the month of November 1999.


    ```

    PREV_SALE   NEXT_SALE

    ----------  ----------

    1          10

    10          14

    15          19

    20          22

    ```


    The results indicate that after an order was recorded on the first of the month,
    no subsequent order was recorded until the 10th. Then a four-day gap followed
    to the 14th, and so on. An astute sales manager might well use this data to ask
    what the sales team was doing on those gap days, and why no orders came in!


    **How It Works**


    The query starts by using the `WITH` clause to name a subquery with an alias in
    an out-of-order fashion. The subquery is then referenced with an alias, in this
    case `SALESDAYS`.


    The `SALESDAYS` subquery calculates two fields. First, it uses the `EXTRACT` function
    to return the numeric day value from the `ORDER_DATE` date field, and labels this
    data as `NEXT_SALE`. The `lag` OLAP function is then used to calculate the number
    for the day in the month (again using the `EXTRACT` method) of the `ORDER_DATE`
    of the preceding row in the results, which becomes the `PREV_SALE` result value.
    This makes more sense when you visualize the output of just the subquery select
    statement:


    ```sql

    select extract(day from order_date) next_sale,

    lag(extract(day from order_date),1,0)

    over (order by extract(day from order_date)) prev_sale

    from oe.orders

    where order_date between ''01-NOV-1999'' and ''30-NOV-1999''

    ```


    The results would look like this if executed independently.


    ```

    NEXT_SALE   PREV_SALE

    ----------  ----------

    1           0

    10          1

    10          10

    10          10

    14          10

    14          14

    15          14

    19          15

    …

    ```


    Starting with the anchor value of 0 in the lag, we see the day of the month for
    a sale as `NEXT_SALE`, and the day of the previous sale as `PREV_SALE`. You can
    probably already visually spot the gaps, but it’s much easier to let Oracle do
    that for you too. This is where our outer query does its very simple arithmetic.


    The driving query over the `SALESDAYS` subquery selects the `PREV_SALE` and `NEXT_SALE`
    values from the results, based on this predicate:


    ```sql

    where next_sale - prev_sale > 1

    ```'
