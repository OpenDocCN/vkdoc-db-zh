    CHAPTER 10 ■ DATA DICTIONARY


    How It Works


    A role is a database object that lets you group together system and object privileges
    and then grant that grouping (the role) to another user or role. Roles help manage
    database security. For example, DBAs will often use roles in the management and
    administration of database object privileges and system privileges.


    The USER_ROLE_PRIVS and DBA_ROLE_PRIVS views describe roles granted to users.
    To view roles granted to roles, query the ROLE_ROLE_PRIVS view:


    **select role, granted_role**


    **from role_role_privs;**


    When you create a database, several predefined roles are created for you, including.
    DBA and SELECT_CATALOG_ROLE. To view all roles in your database (both predefined
    and user-created), select the ROLE column from DBA_ROLES:


    **select role from dba_roles;**


    Here is some sample output of role names in a typical database:


    **CONNECT**


    **RESOURCE**


    **DBA**


    **SELECT_CATALOG_ROLE**


    **EXECUTE_CATALOG_ROLE**


    **DELETE_CATALOG_ROLE**


    **EXP_FULL_DATABASE**


    **IMP_FULL_DATABASE**


    **Roles in USER$**


    Internally, role names are stored in the data dictionary USER$ table. If you run
    this SELECT statement you’ll see all of the role names in your database:


    **select name**


    **from user$**


    **where type# = 0;**


    Compare that output to the following query:


    **select role**


    **from dba_roles;**


    You’ll notice that there are a few roles in the first query that do not appear
    in the second.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 10 ■ DATA DICTIONARY


    10-14\. Displaying Object Privileges


    Problem


    You want to see what object-level privileges have been granted to a user.


    Solution


    The following query selects from the USER_TAB_PRIVS_RECD view to display the table
    privileges that have been granted to the currently connected user:


    **select**


    **owner**


    **,table_name**


    **,grantor**


    **,privilege**


    **from user_tab_privs_recd;**


    To view privileges that the current user has granted to other users, select from
    the USER_TAB_PRIVS_MADE view:


    **select**


    **grantee**


    **,table_name**


    **,grantor**


    **,privilege**


    **from user_tab_privs_made;**


    How It Works


    Object privileges are grants that allow you to perform data manipulation (DML)
    operations (INSERT, UPDATE, and DELETE) on another user’s tables. Before you can
    perform DML operations on another user’s objects, you must be granted the appropriate
    privileges. Object privileges are managed through the GRANT and REVOKE statements.


    This next query selects from USER_TAB_PRIVS and ROLE_TAB_PRIVS to check for any
    object privileges that have been granted directly to the user or granted through
    a role that has been granted to the user: **select**


    **grantee**


    **,owner**


    **,table_name**


    **,grantor**


    **,privilege**


    **from user_tab_privs**


    **union**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 10 ■ DATA DICTIONARY


    **select**


    **role**


    **,owner**


    **,table_name**


    **,''ROLE''**


    **,privilege**


    **from role_tab_privs**


    **order by 2, 3;**


    The ROLE_TAB_PRIVS view will show table privileges that have been granted to a
    role that the current user has access to.


    10-15\. Displaying System Privileges


    Problem'
  trans: "\n对于触发器，你也可以在 `DBA_TRIGGERS`、`ALL_TRIGGERS` 或 `USER_TRIGGERS` 静态视图中查看源信息。例如：\n\
    \n```sql\nselect\n    trigger_name\n    , triggering_event\n    , trigger_type\n\
    \    , table_name\n    , trigger_body\nfrom user_triggers\nwhere trigger_name\
    \ = upper('&trigger_name');\n```\n\n`TRIGGER_BODY` 列的类型是 `LONG`，因此如果你是从 SQL*Plus\
    \ 中运行此代码，请务必使用 `SET LONG` 命令将大小设置得足够大，以显示所有的触发器代码。\n\n### 10-13. 显示已授予的角色\n\n\
    **问题**\n\n你想显示已授予用户的角色。\n\n**解决方案**\n\n使用此查询查看已授予当前连接用户的角色：\n```sql\nselect username,\
    \ granted_role\nfrom user_role_privs;\n```\n\n下一个查询显示已授予特定用户的角色：\n```sql\nselect\n\
    \    grantee\n    , granted_role\nfrom dba_role_privs\nwhere grantee = upper('&grantee')\n\
    order by grantee;\n```\n\n**工作原理**\n\n角色是一种数据库对象，它允许你将系统权限和对象权限分组，然后将该分组（即角色）授予另一个用户或角色。角色有助于管理数据库安全性。例如，数据库管理员（DBA）经常在管理和维护数据库对象权限和系统权限时使用角色。\n\
    \n`USER_ROLE_PRIVS` 和 `DBA_ROLE_PRIVS` 视图描述了授予用户的角色。要查看授予角色的角色，请查询 `ROLE_ROLE_PRIVS`\
    \ 视图：\n```sql\nselect role, granted_role\nfrom role_role_privs;\n```\n\n当你创建数据库时，系统会为你创建几个预定义的角色，包括\
    \ `DBA` 和 `SELECT_CATALOG_ROLE`。要查看数据库中的所有角色（包括预定义的和用户创建的），从 `DBA_ROLES` 中选择 `ROLE`\
    \ 列：\n```sql\nselect role from dba_roles;\n```\n\n以下是一个典型数据库中角色名称的一些示例输出：\n```\n\
    CONNECT\nRESOURCE\nDBA\nSELECT_CATALOG_ROLE\nEXECUTE_CATALOG_ROLE\nDELETE_CATALOG_ROLE\n\
    EXP_FULL_DATABASE\nIMP_FULL_DATABASE\n```\n\n#### USER$ 表中的角色\n\n在内部，角色名称存储在数据字典\
    \ `USER$` 表中。如果你运行这个 `SELECT` 语句，你将看到数据库中所有的角色名称：\n```sql\nselect name\nfrom user$\n\
    where type# = 0;\n```\n\n将此输出与以下查询进行比较：\n```sql\nselect role\nfrom dba_roles;\n\
    ```\n\n你会注意到，第一个查询中有几个角色并未出现在第二个查询中。\n\n### 10-14. 显示对象权限\n\n**问题**\n\n你想查看已授予用户的对象级权限。\n\
    \n**解决方案**\n\n以下查询从 `USER_TAB_PRIVS_RECD` 视图中选择，以显示已授予当前连接用户的表权限：\n```sql\nselect\n\
    \    owner\n    , table_name\n    , grantor\n    , privilege\nfrom user_tab_privs_recd;\n\
    ```\n\n要查看当前用户授予其他用户的权限，请从 `USER_TAB_PRIVS_MADE` 视图中选择：\n```sql\nselect\n    grantee\n\
    \    , table_name\n    , grantor\n    , privilege\nfrom user_tab_privs_made;\n\
    ```\n\n**工作原理**\n\n对象权限是允许你在其他用户的表上执行数据操作（DML）操作（`INSERT`、`UPDATE` 和 `DELETE`）的授权。在你能够对另一个用户的对象执行\
    \ DML 操作之前，你必须被授予相应的权限。对象权限通过 `GRANT` 和 `REVOKE` 语句进行管理。\n\n下一个查询从 `USER_TAB_PRIVS`\
    \ 和 `ROLE_TAB_PRIVS` 中选择，以检查直接授予用户或通过授予用户的角色授予的任何对象权限：\n```sql\nselect\n    grantee\n\
    \    , owner\n    , table_name\n    , grantor\n    , privilege\nfrom user_tab_privs\n\
    union\nselect\n    role\n    , owner\n    , table_name\n    , 'ROLE'\n    , privilege\n\
    from role_tab_privs\norder by 2, 3;\n```\n\n`ROLE_TAB_PRIVS` 视图将显示已授予当前用户有权访问的角色的表权限。\n\
    \n### 10-15. 显示系统权限\n\n**问题**\n"
- fmt: "You want to see the database system privileges assigned to a user.\n\n## Solution\n\
    \nQuery the `DBA_SYS_PRIVS` view to display which system privileges have been\
    \ granted to various user.\n\nListed next is a simple script that prompts for\
    \ the `GRANTEE`:\n\n```sql\nselect\n    grantee\n    ,privilege\n    ,admin_option\n\
    from dba_sys_privs\nwhere grantee = UPPER('&grantee')\norder by privilege;\n```\n\
    \nTo view system privileges granted to the currently connected user, run this\
    \ query:\n\n```sql\nselect username, privilege, admin_option\nfrom user_sys_privs;\n\
    ```\n\nThe `USERNAME` column will show whether the privilege has been granted\
    \ to the currently connected user or if the privilege has been granted to `PUBLIC`.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### CHAPTER 10 ■ DATA DICTIONARY\n\
    \n## How It Works\n\nThe `DBA_SYS_PRIVS` view displays system privileges granted\
    \ to database users and roles. System privileges allow you to manage some aspect\
    \ of the database like creating tables and views. For example, some commonly granted\
    \ privileges are `CREATE TABLE` and `CREATE VIEW`.\n\nThe `ROLE_SYS_PRIVS` view\
    \ displays what system privileges have been assigned to a role. When querying\
    \ this view, you will only see roles that have been granted to the currently connected\
    \ schema:\n\n```sql\nselect\n    role, privilege\nfrom role_sys_privs\nwhere role\
    \ = upper('&role');\n```\n\nThe SQL example in the Solution section displays only\
    \ database system privileges that have been directly granted to a user. To view\
    \ any system privileges that have been granted through a role to a user, you have\
    \ to additionally query a view such as `ROLE_SYS_PRIVS`. The following query will\
    \ display system privileges granted either directly to the currently connected\
    \ user or through any roles granted to the user:\n\n```sql\nselect\n    privilege\n\
    \    ,'DIRECT GRANT'\nfrom user_sys_privs\nunion\nselect\n    privilege\n    ,'ROLE\
    \ GRANT'\nfrom role_sys_privs;\n```\n\nTwo roles—`CONNECT` and `RESOURCE`—are\
    \ commonly assigned to newly created accounts. However, Oracle recommends not\
    \ assigning these roles to users because they may not be available in future releases.\
    \ Instead, Oracle advises that you create your own roles and assign privileges\
    \ as required. Run this query to view privileges assigned to these roles:\n\n\
    ```sql\nselect grantee, privilege\nfrom dba_sys_privs\nwhere grantee IN ('CONNECT','RESOURCE')\n\
    order by grantee;\n```\n\nHere is the output:\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### CHAPTER 10 ■ DATA DICTIONARY\n\n**ROLE PRIVILEGE**\n**-------------------------\
    \ -------------------------**\n**CONNECT CREATE SESSION**\n**RESOURCE CREATE CLUSTER**\n\
    **RESOURCE CREATE INDEXTYPE**\n**RESOURCE CREATE OPERATOR**\n**RESOURCE CREATE\
    \ PROCEDURE**\n**RESOURCE CREATE SEQUENCE**\n**RESOURCE CREATE TABLE**\n**RESOURCE\
    \ CREATE TRIGGER**\n**RESOURCE CREATE TYPE**\n\nThere are a great many data dictionary\
    \ views that can be used to determine what users and roles have been assigned\
    \ which system and object privileges. We have touched on just a few examples in\
    \ this recipe. See Table 10-3 for a description of the various privilege-related\
    \ data dictionary views and their purposes.\n\n**Table 10-3. Privilege-Related\
    \ Data Dictionary Views**\n\n| **Role** | **Description** |\n| :--- | :--- |\n\
    | `DBA_ROLES` | All roles in the database. |\n| `DBA_ROLE_PRIVS` | Roles granted\
    \ to users and roles. |\n| `DBA_SYS_PRIVS` | All system privileges granted to\
    \ users and roles. |\n| `DBA_TAB_PRIVS` | All object privileges granted to users\
    \ and roles. |\n| `DBA_COL_PRIVS` | All column object grants. |\n| `ROLE_ROLE_PRIVS`\
    \ | Roles granted to other roles, only for roles that the user has access to.\
    \ |\n| `ROLE_SYS_PRIVS` | Privileges granted to other roles, only for roles that\
    \ the user has access to. |\n| `ROLE_TAB_PRIVS` | Table privileges granted to\
    \ roles, only for roles that the user has access to. |\n| `ALL_TAB_PRIVS` | Object\
    \ grants for which the user is the object owner, grantor, or grantee; also object\
    \ grants for which `PUBLIC` is the grantee. |\n| `ALL_TAB_PRIVS_MADE` | Object\
    \ grants where the user is the object owner or grantor. |\n| `ALL_TAB_PRIVS_RECD`\
    \ | Object grants where the user is the grantee or where `PUBLIC` is the grantee.\
    \ |\n| `ALL_COL_PRIVS` | |"
