    [www.it-ebooks.info](http://www.it-ebooks.info/)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 1


    ■ ■ ■


    ## The Basics


    This chapter presents lots of basic recipes to get you started—or rekindle old
    memories—on the core building blocks of SQL statements. We’ll show you recipes
    for selecting, changing, and removing data from Oracle database tables, plus some
    common options you usually want to include when doing this kind of work.


    Those of you with a firm grounding in SQL should feel free to delve into this
    chapter in an *à la carte* fashion. We’ve included one or two clever recipes at
    this early stage to make sure you get the most from Oracle SQL Recipes from the
    very first chapter. To continue the menu metaphor, feel free to consume the recipes
    herein in any order you like, and mix and match code fragments and techniques
    across the chapters to derive your own recipes.


    ■ **Note** We’ll move through the basics quickly, and avoid such niceties as syntax
    diagrams and discussing every permutation of every recipe’s options. Don’t fret
    if you see commands and techniques you don’t immediately understand. Try them
    out yourself in an Oracle test instance to get a feel for them, and remember that
    complementary books like *Begining Oracle SQL* (de Haan, Fink, Jørgensen, Morton)
    and *Beginning SQL Queries* (Churcher) help with learning SQL itself.'
