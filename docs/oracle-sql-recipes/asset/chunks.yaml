    \n## PART 4\n\n■ ■ ■\n\n## Special Topics\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 11\n\n■ ■ ■\n\n## Common Reporting Problems\n\nAs a SQL developer,\
    \ DBA, or power user, at some point you’ll have to write reports to share with\
    \ colleagues, management, clients, or other companies. If you’re lucky, you’ll\
    \ be able to concentrate on the logic and presentation of your reports in peace\
    \ and quiet. Unfortunately, however, you’ll almost certainly be confronted with\
    \ “shoulder surfing” report critics. You know the kind: they stand behind you,\
    \ gesticulating at the screen, offering helpful advice like “That should be converted\
    \ to a spreadsheet.” or “Can you make it look like the old report? It’s easier\
    \ to read that way.”\n\nMany of these demands will have common solutions, to rotate,\
    \ compress, substitute and otherwise transform perfectly normal report data into\
    \ a format that’s more familiar or suitable for the intended audience. This chapter\
    \ covers many common styles of reporting, and offers some common and not-so-common\
    \ solutions to help you meet your immediate needs, as well as equip you with ideas\
    \ to tackle future reporting scenarios we haven’t thought of, but your boss surely\
    \ has.\n\n### 11-1\\. Avoiding Repeating Rows in Reports\n\n**Problem**\n\nYou\
    \ want to mimic the SQL*Plus `BREAK` feature to suppress near-identical leading\
    \ data in rows of data.\n\nFor instance, in a multi-column report where only the\
    \ last column differs from one row to the next, you want to blank out the repeated\
    \ early columns and show only the differing column’s data.\n\n**Solution**\n\n\
    Oracle’s `SQL*Plus` tool has supported the `BREAK` feature for decades, and many\
    \ basic text reports rely on this crude but effective formatting approach. Unfortunately,\
    \ the `BREAK` command isn’t native to SQL, so it can’t be used to achieve the\
