    Although REGEXP_INSTR can perform all tasks that INSTR can, you can still use
    INSTR if your search does not require pattern matching and you want to make your
    code more readable. INSTR will also perform a slight bit more efficiently than
    REGEXP_INSTR, but the performance benefits should be considered only in the most
    computation-intensive applications where string manipulation is the primary function
    of the application.


    How It Works


    Understanding regular expressions may seem daunting at first, until you break
    the regular expressions down into their individual components. Regular expressions
    (also known as *patterns*) are the mainstay of the Unix or Linux command line
    when you use the egrep command or write a PERL script. They consist of two types
    of characters: regular characters and special *metacharacters*. One or more regular
    characters match those same characters in the strings to be searched. For example,
    cat matches the string cat or caterer or scat. Extra characters in the target
    string don’t really matter. As long as the target string (such as “caterer”) contains
    the pattern (for example, “cat”), the result will be a match.


    The most common regular expressions you will see include the metacharacters in
    Table 7-1\. For example, ca?t matches cat or cart, cat|dog matches either cat
    or dog in the string, and d[oi]g matches dog or dig.


