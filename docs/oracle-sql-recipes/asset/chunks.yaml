    **ORA-02437: cannot validate (STAR1.D_PRODS_PK) - primary key violated** You need
    to identify which rows are duplicates.


    Solution


    Use a SELECT statement with a GROUP BY and HAVING COUNT clause. The next listing
    of code displays duplicate rows in the PARTIES table based on values in the PARTY_ID
    column: **select**


    **count(*)**'
