    to a point in time (to a System Change Number or SCN) right after Chen’s update.


    How It Works


    A transaction begins when any of the following occurs:


    • **A session begins**


    **• **A COMMIT is executed**


    **• **A ROLLBACK is executed**


    **• **Any DDL (Data Definition Language) or DCL (Data Control Language) command
    is executed**


    **When a ROLLBACK is performed, all DDL commands are reversed to the beginning
    of the transaction, unless you specify a *savepoint* in the ROLLBACK command.
    A savepoint is a marker within a transaction that can divide a transaction into
    smaller parts that can incrementally be reversed, or rolled back, without rolling
    back the entire transaction.


    As mentioned in the recipe solution, a SAVEPOINT command assigns a label to a
    System Change Number (SCN). An SCN is created in the Oracle database every time
    any change is made to the database; an SCN is unique across the entire database.


    You can specify any name for a SAVEPOINT that follows Oracle object naming conventions.
    If you reuse a SAVEPOINT name within a transaction, the first SAVEPOINT with the
    same name is no longer accessible via a ROLLBACK command. After a COMMIT or a
    ROLLBACK without a SAVEPOINT name, all SAVEPOINTS are cleared and no longer accessible.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 9 ■ MANAGING TRANSACTIONS


    9-2\. Identifying Blocking Transactions


    Problem


    When you execute various DML statements, such as UPDATE and DELETE, you often
    have to wait several seconds or longer for the statement to complete. You suspect
    that other users are holding locks on rows or waiting too long to perform a COMMIT.


    Solution'
