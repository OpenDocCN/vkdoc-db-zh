    ## 第 9 章 ■ 管理事务


    ### 工作原理


    对于 `EMPLOYEES` 表，必须提供一个部门标识符 (`JOB_ID`)，因为该列不可为空。如果员工属于一个新部门，但 `DEPARTMENTS` 表中对应的行还不存在，而你想在该部门行可用之前，就在事务中使用该员工编号进行其他操作，这就陷入了一个两难境地。你可以等到所有父表中的信息都就绪，但这可能会在员工需要她的身份徽章且员工编号必须印在徽章上时造成瓶颈。在另一种场景中，你可能从每日数据源获取所有员工和部门数据，但数据的顺序无法保证是新部门先于新员工。


    如果你尝试向 `EMPLOYEES` 表插入一行，其作业标识符尚不存在，且约束未被设置为延迟，那么当你尝试执行插入时会发生以下情况：


    ```sql

    insert into employees

    (employee_id, first_name, last_name, email, hire_date, job_id)

    values

    (301, ''Ellen'', ''Kruser'', ''EKRU'', ''31-may-1966'', ''IT_WEB'')

    ;

    ```


    ```

    Error starting at line 1 in command:

    insert into employees

    (employee_id, first_name, last_name, email, hire_date, job_id)

    values

    (301, ''Ellen'', ''Kruser'', ''EKRU'', ''31-may-1966'', ''IT_WEB'')

    Error report:

    SQL Error: ORA-02291: integrity constraint (HR.EMP_JOB_FK) violated - parent key
    not found

    02291. 00000 - "integrity constraint (%s.%s) violated - parent key not found"

    *Cause: A foreign key value has no matching primary key value.

    *Action: Delete the foreign key or add a matching primary key.

    ```


    如果约束被设置为 `DEFERRABLE`，那么 `INSERT` 会成功。然而，如果父表 `DEPARTMENTS` 中的行还不存在，执行 `COMMIT`
    将导致以下结果：


    ```sql

    insert into employees

    (employee_id, first_name, last_name, email, hire_date, job_id)

    values

    (301, ''Ellen'', ''Kruser'', ''EKRU'', ''31-may-1966'', ''IT_WEB'')

    ;

    1 rows inserted

    commit;

    ```


    ```

    Error starting at line 6 in command:

    commit

    Error report:

    SQL Error: ORA-02091: transaction rolled back

    ORA-02291: integrity constraint (HR.EMP_JOB_FK) violated - parent key not found

    02091. 00000 - "transaction rolled back"

    *Cause: Also see error 2092. If the transaction is aborted at a remote site then
    you will only see 2091; if aborted at host then you will see 2092 and 2091.

    *Action: Add rollback segment and retry the transaction.

    ```


    因此，你必须确保在提交前，父行（在 `DEPARTMENTS` 表中）是存在的，如下例所示：


    ```sql

    insert into employees

    (employee_id, first_name, last_name, email, hire_date, job_id)

    values

    (301, ''Ellen'', ''Kruser'', ''EKRU'', ''31-may-1966'', ''IT_WEB'')

    ;

    1 rows inserted

    insert into jobs

    (job_id, job_title)

    values

    (''IT_WEB'', ''Web Developer'')

    ;

    1 rows inserted

    commit;

    commit succeeded.

    ```


    请注意，对 `DEPARTMENTS` 表的 `INSERT` 发生在对 `EMPLOYEES` 表的 `INSERT` 之后。因为 `JOB_ID` 列上的约束被设置为
    `DEFERRABLE`，所以插入的顺序可以是任意的，只要在执行 `COMMIT` 时数据是一致的。


    当你重新创建约束时，可以将延迟约束设置为 `INITIALLY DEFERRED` 或 `INITIALLY IMMEDIATE`。换句话说，即使约束被设置为
    `DEFERRABLE`，你仍然可以通过默认设置 `INITIALLY IMMEDIATE` 来最初执行即时约束检查。如果约束被创建为 `INITIALLY
    DEFERRED`，如本解决方案所示，你可以使用以下语句打开即时约束检查：

