    Use an outer join. In Oracle’s sample database, the HR user maintains the EMPLOYEES
    and DEPARTMENTS


    tables; assigning a department to an employee is optional. There are 107 employees
    in the EMPLOYEES


    table. Using a standard join between EMPLOYEES and DEPARTMENTS only returns 106
    rows, however, since one employee is not assigned a department. To return all
    rows in the EMPLOYEES table, you can use LEFT OUTER JOIN to include all rows in
    the EMPLOYEES table and matching rows in DEPARTMENTS, if any: select employee_id,
    last_name, first_name, department_id, department_name from employees


    left outer join departments using(department_id)


    ;


    EMPLOYEE_ID LAST_NAME FIRST_NAME DEPARTMENT_ID DEPARTMENT_NAME


    ------------ --------------- --------------- ----------------- -------------------


    200 Whalen Jennifer 10 Administration 202 Fay Pat 20 Marketing 201 Hartstein Michael
    20 Marketing 119 Colmenares Karen 30 Purchasing


    . . .


    206 Gietz William 110 Accounting 205 Higgins Shelley 110 Accounting 178 Grant
    Kimberely


    107 rows selected


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ QUERYING FROM MULTIPLE TABLES


    There are now 107 rows in the result set instead of 106; Kimberely Grant is included
    even though she does not currently have a department assigned.


    How It Works


    When two tables are joined using LEFT OUTER JOIN, the query returns all the rows
    in the table to the left of the LEFT OUTER JOIN clause, as you might expect. Rows
    in the table on the right side of the LEFT OUTER


    JOIN clause are matched when possible. If there is no match, columns from the
    table on the right side will contain NULL values in the results.


    As you might expect, there is a RIGHT OUTER JOIN as well (in both cases, the OUTER
    keyword is optional). You can rewrite the solution as follows:


    select employee_id, last_name, first_name, department_id, department_name from
    departments


    right outer join employees using(department_id)


    ;


    The results are identical, and which format you use depends on readability and
    style.


    The query can be written using the ON clause as well, just as with an equi-join
    (inner join). And for versions of Oracle before 9 *i*, you must use Oracle’s somewhat
    obtuse and proprietary outer-join syntax with the characters (+) on the side of
    the query that is missing rows, as in this example: select employee_id, last_name,
    first_name, e.department_id, department_name from employees e, departments d


    where e.department_id = d.department_id (+)


    ;


    Needless to say, if you can use ANSI SQL-99 syntax, by all means do so for clarity
    and ease of maintenance.


    3-4\. Making a Join Optional in Both Directions


    Problem


    All of the tables in your query have at least a few rows that don’t match rows
    in the other tables, but you still want to return all rows from all tables and
    show the mismatches in the results. For example, you want to reduce the number
    of reports by including mismatches from both tables instead of having one report
    for each scenario.


    Solution'
