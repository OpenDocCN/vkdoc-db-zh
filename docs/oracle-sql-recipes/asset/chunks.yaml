    the top ten rows using the ROWNUM pseudocolumn.


    The query can be easily modified to sort by a column other than CPU_TIME. For
    example, if you want to report resource usage by BUFFER_GETS, simply change the
    ORDER BY clause to use BUFFER_GETS instead of CPU_TIME. The CPU_TIME column is
    calculated in microseconds; to convert it to seconds it is divided by 1000000.


    How It Works


    The V$SQLSTATS view displays performance statistics for SQL statements that have
    recently executed. You can also use V$SQL and V$SQLAREA to report on SQL resource
    usage. V$SQLSTATS is faster and retains information for a longer period of time,
    but contains only a subset of the columns in V$SQL and V$SQLAREA. Thus there are
    scenarios where you may want to query from V$SQL or V$SQLAREA. For example, if
    you want to display information like the user who first parsed the query, you
    use the PARSING_USER_ID


    column of V$SQLAREA:


    select * from(


    select


    b.sql_text


    ,a.username


    ,b.buffer_gets


    ,b.disk_reads


    ,b.sorts


    ,b.cpu_time/1000000 cpu_sec


    from v$sqlarea b


    ,dba_users a


    where b.parsing_user_id = a.user_id


    order by b.cpu_time DESC)


    where rownum < 11;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    19-5\. Using Oracle Performance Reports to Identify


    Resource-Intensive SQL


    Problem


    You want to use one of Oracle’s performance-tuning reports to identify resource-intensive
    queries.


    Solution


    If you notice that your database performance slowed down for a day or was sluggish
    for a few hours, you should run one of the following reports for the timeframe
    in which performance issues were noticed:


    • Automatic Workload Repository (AWR)


    • Automatic Database Diagnostic Monitor (ADDM)


    • Active Session History (ASH)


    • Statspack


    Each of these reports is described in the next several subsections.


    ■ **Note** As of the writing of this book, you need to purchase an additional
    license from Oracle Corporation to use the AWR, ADDM, and ASH utilities. If you
    don’t have a license, you can use the free Statspack utility.


    Using AWR'
  trans: "# 第 19 章 SQL 监控与调优\n\n## 19-4. 识别资源密集型 SQL 语句\n\n### 问题\n您希望识别哪些 SQL 语句消耗了最多的资源。\n\
    \n### 解决方案\n使用以下查询，基于 CPU 时间识别出最消耗资源的前十个查询：\n\n```sql\nselect * from(\n    select\n\
    \        sql_text\n        ,buffer_gets\n        ,disk_reads\n        ,sorts\n\
    \        ,cpu_time/1000000 cpu_sec\n        ,executions\n        ,rows_processed\n\
    \    from v$sqlstats\n    order by cpu_time DESC)\nwhere rownum < 11;\n```\n\n\
    这里使用了一个内联视图，先检索所有记录，并按 `CPU_TIME` 降序对输出进行排序。然后外层查询使用 `ROWNUM` 伪列将结果集限制为前 10 行。\n\
    \n这个查询可以轻松修改为按 `CPU_TIME` 以外的列排序。例如，如果您想按 `BUFFER_GETS` 报告资源使用情况，只需将 `ORDER BY`\
    \ 子句改为使用 `BUFFER_GETS` 而不是 `CPU_TIME`。`CPU_TIME` 列以微秒计算；要将其转换为秒，需除以 1000000。\n\
    \n### 工作原理\n`V$SQLSTATS` 视图显示最近执行过的 SQL 语句的性能统计信息。您也可以使用 `V$SQL` 和 `V$SQLAREA`\
    \ 来报告 SQL 资源使用情况。`V$SQLSTATS` 速度更快，并且信息保留时间更长，但它只包含了 `V$SQL` 和 `V$SQLAREA` 中列的子集。因此，在某些情况下您可能需要查询\
    \ `V$SQL` 或 `V$SQLAREA`。例如，如果您想显示首次解析查询的用户等信息，可以使用 `V$SQLAREA` 的 `PARSING_USER_ID`\
    \ 列：\n\n```sql\nselect * from(\n    select\n        b.sql_text\n        ,a.username\n\
    \        ,b.buffer_gets\n        ,b.disk_reads\n        ,b.sorts\n        ,b.cpu_time/1000000\
    \ cpu_sec\n    from v$sqlarea b\n        ,dba_users a\n    where b.parsing_user_id\
    \ = a.user_id\n    order by b.cpu_time DESC)\nwhere rownum < 11;\n```\n\n## 19-5.\
    \ 使用 Oracle 性能报告识别资源密集型 SQL\n\n### 问题\n您希望使用 Oracle 的性能调优报告之一来识别资源密集型查询。\n\n###\
    \ 解决方案\n如果您注意到数据库性能在某一天变慢或几个小时内运行迟缓，您应在发现问题的时段运行以下报告之一：\n\n*   自动工作量存储库（`AWR`）\n\
    *   自动数据库诊断监视器（`ADDM`）\n*   活动会话历史（`ASH`）\n*   Statspack\n\n接下来的几个小节将分别描述这些报告。\n\
    \n**注意** 截至本书撰写时，您需要从 Oracle 公司购买额外许可证才能使用 `AWR`、`ADDM` 和 `ASH` 工具。如果您没有许可证，可以使用免费的\
    \ Statspack 工具。\n\n### 使用 AWR\n要监控长时间运行的操作，您可以查询 `V$SESSION_LONGOPS` 视图。以下示例展示了针对该视图的查询，并使用了\
    \ `SQL*Plus` 格式化命令以生成可读的报告。\n\n```sql\nCOL opname FORMAT A16 HEAD \"Operation|Type\"\
    \nCOL sql_text FORMAT A33 HEAD \"SQL|Text\" TRUNC\nCOL start_time FORMAT A15 HEAD\
    \ \"Start|Time\"\nCOL how_long FORMAT 99,990 HEAD \"Time|Run\"\nCOL secs_left\
    \ FORMAT 99,990 HEAD \"Appr.|Secs Left\"\nCOL sofar FORMAT 9,999,990 HEAD \"Work|Done\"\
    \nCOL totalwork FORMAT 9,999,990 HEAD \"Total|Work\"\nCOL percent FORMAT 999.90\
    \ HEAD \"%|Done\"\n\nselect\n    a.username\n    ,a.opname\n    ,b.sql_text\n\
    \    ,to_char(a.start_time,'DD-MON-YY HH24:MI') start_time\n    ,a.elapsed_seconds\
    \ how_long\n    ,a.time_remaining secs_left\n    ,a.sofar\n    ,a.totalwork\n\
    \    ,round(a.sofar/a.totalwork*100,2) percent\nfrom v$session_longops a\n   \
    \ ,v$sql b\nwhere a.sql_address = b.address\nand a.sql_hash_value = b.hash_value\n\
    and a.sofar <> a.totalwork\nand a.totalwork != 0;\n```\n\n#### 工作原理\n`V$SESSION_LONGOPS`\
    \ 视图显示运行时间超过六秒的各种数据库操作的状态。要使用 `V$SESSION_LONGOPS`，您必须使用基于成本的优化器，并满足以下条件：\n\n*\
    \   `TIMED_STATISTICS` 初始化参数设置为 `TRUE`\n*   为查询中的对象生成了统计信息\n\n`V$SESSION_LONGOPS`\
    \ 视图能让您大致了解当前正在运行的查询还需要多长时间完成。根据我们的经验，结果并非 100%准确，因此请在其报告的时间基础上预留一些弹性时间。"
- fmt: "# Oracle数据库性能监控与SQL调优\n\n## 使用AWR报告\nAWR报告适用于查看整个系统性能并识别消耗资源最多的SQL查询。运行以下脚本生成AWR报告：\n\
    ```\nSQL> @?/rdbms/admin/awrrpt\n```\n\n从AWR输出中，在报告的“SQL ordered by Elapsed Time”或“SQL\
    \ ordered by CPU Time”部分识别消耗资源最多的语句。以下是部分样本输出：\n\n### SQL ordered by CPU Time样本输出\n\
    ```\nDB/Inst: DWREP/DWREP  Snaps: 11384-11407\n-> Resources reported for PL/SQL\
    \ code includes the resources used by all SQL\n   statements called by the code.\n\
    -> % Total DB Time is the Elapsed Time of the SQL statement divided into the\n\
    \   Total Database Time multiplied by 100\n                                  \
    \                                        \n    CPU    Elapsed      CPU per   \
    \ % Total                                    \nTime (s) Time (s)   Executions\
    \  Exec (s)  DB Time SQL Id                   \n---------- ---------- ------------\
    \ ---------- ------- -------------          \n     4,809     13,731          \
    \ 10    480.86     6.2 8wx77jyhdr31c          \n```\n\n**[www.it-ebooks.info](http://www.it-ebooks.info/)**\n\
    \n### 示例SQL查询\n```sql\nModule: JDBC Thin Client\nSELECT D.DERIVED_COMPANY\n  \
    \    ,CB.CLUSTER_BUCKET_ID\n      ,CB.CB_NAME\n      ,CB.SOA_ID\n      ,COUNT(*)\
    \ TOTAL\n      ,NVL(SUM(CASE WHEN F.D_DATE_ID > TO_NUMBER(TO_CHAR(SYSDATE-30,'YYYYMMDD'))\
    \ THEN 1 END), 0) RECENT\n      ,NVL(D.BLACKLIST_FLG,0) BLACKLIST_FLG\n  FROM\
    \ F_DOWNLOADS F\n      ,D_DOMAINS D\n      ,D_PRODUCTS P\n      ,PID_DF_ASSOC\
    \ PDA\n      ,( SELECT * FROM ( SELECT CLUSTER_\n```\n\n从Oracle数据库10*g*开始，Oracle会每小时自动对数据库进行一次快照，并填充存储统计信息的底层AWR表。默认情况下，统计信息会保留七天。\n\
    \n您还可以通过运行`awrsqrpt.sql`报告来为特定的SQL语句生成AWR报告。运行以下脚本时，系统将提示您输入感兴趣的查询的`SQL_ID`：\n\
    ```\nSQL> @?/rdbms/admin/awrsqrpt.sql\n```\n\n## 使用ADDM\nADDM报告提供了关于哪些SQL语句是调优候选者的有用建议。使用以下SQL脚本生成ADDM报告：\n\
    ```\nSQL> @?/rdbms/admin/addmrpt\n```\n\n查找报告中标有“SQL statements consuming significant\
    \ database time.”的部分。\n\n### ADDM报告样本输出\n```\nFINDING 2: 29% impact (65043 seconds)\n\
    ------------------------------\n  SQL statements consuming significant database\
    \ time were found.\n\n  RECOMMENDATION 1: SQL Tuning, 6.7% benefit (14843 seconds)\n\
    \  ----------------------------------------------------------\n     ACTION: Investigate\
    \ the SQL statement with SQL_ID \"46cc3t7ym5sx0\"\n        for possible performance\
    \ improvements.\n     RELEVANT OBJECT: SQL statement with SQL_ID 46cc3t7ym5sx0\
    \ and\n        PLAN_HASH 1234997150\n     MERGE INTO d_files a\n     USING\n \
    \     ( SELECT\n```\n\nADDM报告分析AWR表中的数据，以识别潜在的瓶颈和高资源消耗的SQL查询。\n\n## 使用ASH\nASH报告使您能够关注最近运行过且可能只执行了短暂时间的短生命周期SQL语句。使用以下脚本生成ASH报告：\n\
    ```\nSQL> @?/rdbms/admin/ashrpt\n```\n\n在输出中搜索标有“Top SQL”的部分。以下是部分样本输出：\n\n###\
    \ ASH报告样本输出\n```\nSQL ID        Planhash            Sampled # of Executions  \
    \  % Activity\n----------------------- -------------------- --------------------\
    \ --------------\nEvent                          % Event Top Row Source      \
    \        % RwSrc\n------------------------------ ------- ---------------------------------\
    \ -------\n4k8runghhh31d                 3219321046               12      51.61\n\
    CPU + Wait for CPU             51.61 HASH JOIN                    12.26\nselect\
    \ countryimp0_.COUNTRY_ID as COUNTRY_ID, countryimp0_.COUNTRY_NAME\n```\n\n前面的输出表明该查询正在等待CPU资源。在这种情况下，实际问题可能是另一个消耗CPU资源的查询。\n\
    \nASH报告何时比AWR或ADDM报告更有用？AWR和ADDM输出显示的是总数据库时间方面的顶级消耗SQL。如果SQL性能问题是短暂且生命周期短的，它可能不会出现在AWR和ADDM报告中。在这些情况下，ASH报告更有用。\n\
    \n> **注意：** 您也可以从Enterprise Manager运行AWR、ADDM和ASH报告，您可能会觉得这比从SQL*Plus手动运行脚本更直观。\n\
    \n## 使用Statspack"
