    ****Separate Tablespaces for Tables and Indexes**


    DBAs debate the merits of separating tables and indexes into different tablespaces.
    If you have the luxury of setting up a storage system from scratch and can set
    up mount points that have their own sets of disks and controllers, you may see
    some I/O benefits by specifying tables to be built in tablespaces based on datafiles
    on one mount point, and indexes to be built in tablespaces based on datafiles
    on a separate mount point.


    However, nowadays it’s often the case where your storage administrator will just
    give you a large slice of storage in a SAN and there’s no way to guarantee that
    data and indexes will be stored physically on separate disks (and controllers).
    Nevertheless, there are still valid reasons to separate index tablespaces from
    the table tablespaces:


    • You may want to implement different physical storage characteristics (such as
    extent size) for tables and indexes, and you prefer to allow the table and index
    to inherit their storage attributes from the tablespace.


    • You prefer to have the option of being able to back up, restore, and recover
    table and index tablespaces separately.


    • When running maintenance reports, you find it easier to manage tables and indexes
    when the reports have sections separated by tablespace.


    If any of these reasons are valid for your environment, it’s probably worth the
    extra effort to employ different tablespaces for tables and indexes.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ OBJECT MANAGEMENT


    18-8\. Creating a Function-Based Index


    Problem


    You’re running this SQL query:


    select emp_name from emp where UPPER(emp_name) = ''DAVE'';


    You’ve created a normal B-tree index on the EMP_NAME column, but you notice that
    Oracle is not using the index whenever you apply the UPPER function to the EMP_NAME
    column. You wonder if you can create an index that Oracle will use.


    Solution


    Create a function-based index to improve performance of queries that use a SQL
    function in the WHERE


    clause. This example creates a function-based index on UPPER(EMP_NAME): create
    index user_upper_idx on emp(upper(emp_name));


    Why use a function-based index? Because that’s the only kind Oracle will use in
    this scenario. Oracle will disregard a regular index on a column if you apply
    a SQL function to it in the WHERE clause.


    How It Works


    Function-based indexes allow index lookups on columns referenced by functions
    in the WHERE clause of a SQL query. The function-based index can be as simple
    as the preceding example, or it can be based on complex logic stored in a PL/SQL
    function.


    Any user-created SQL functions must be declared deterministic before they can
    be used in a function-based index. Deterministic means that for a given set of
    inputs, the function will always return the same results. You must use the key
    word DETERMINISTIC when creating a user-defined function you want to use in a
    function-based index.


    Select from the DBA/ALL/USER_IND_EXPRESSIONS view to display the SQL associated
    with a function-based index:


    select index_name, column_expression from user_ind_expressions;


    If you’re running this SQL from SQL*Plus, don’t forget to use the SET LONG command
    in order to display the entire contents of the COLUMN_EXPRESSION column. For example:
    SQL> set long 500


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ OBJECT MANAGEMENT


    18-9\. Creating a Bitmap Index


    Problem


    You’ve built a star schema in a data warehouse. You want to ensure that SQL queries
    that join fact and dimension tables return data efficiently.


    Solution


    Create bitmap indexes on columns used to join the fact and dimension tables. Bitmap
    indexes are created by using the keyword BITMAP of the CREATE INDEX statement.
    This example creates a bitmap index on the column D_DATE_ID of the F_DOWNLOADS
    table:


    create bitmap index f_down_date_fk1 on f_downloads(d_date_id);


    If your fact table is partitioned, you must create the bitmap index as locally
    partitioned. Do this by specifying the LOCAL keyword:


    create bitmap index f_down_date_fk1 on f_downloads(d_date_id) local;


    How It Works


    Bitmapped indexes are used extensively in data warehouse environments, typically
    on fact table foreign key columns. Bitmap indexes are less appropriate for OLTP
    environments where you have multiple-session DML activity on a table. This is
    because with a bitmap-indexed column, the internal structure of the bitmap index
    often requires that many rows be locked during the update. Therefore, if you have
    more than one session performing UPDATES, INSERTS, and DELETES, you will encounter
    locking and deadlock problems.


    Bitmap indexes in data warehouse environments are usually dropped and re-created
    as needed.


    Typically, before a large amount of data is loaded, the bitmap indexes are dropped,
    and then re-created after the table is populated. To improve the performance of
    creating a bitmap index, you can turn off the generation of redo via the NOLOGGING
    option:


    create bitmap index f_down_date_fk1 on f_downloads(d_date_id) local nologging;
    Because the index can easily be re-created, there’s usually no reason to generate
    redo for the CREATE


    INDEX operation.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ OBJECT MANAGEMENT


    18-10\. Creating an Index-Organized Table


    Problem


    You have an application that mainly accesses the table data through queries that
    select on the primary key or a range of primary key values. You want to efficiently
    query this table.


    Solution


    Index-organized tables (IOTs) are efficient objects when the table data is typically
    accessed through querying on the primary key. Use the ORGANIZATION INDEX clause
    to create an index-organized table: create table prod_sku


    (prod_sku_id number,


    sku varchar2(256),


    create_dtt timestamp(5),


    constraint prod_sku_pk primary key(prod_sku_id)


    )


    organization index


    including sku


    pctthreshold 30


    tablespace inv_mgmt_data


    overflow


    tablespace mts;


    How It Works


    An index-organized table stores the entire contents of the table’s row in a B-tree
    index structure. Index-organized tables provide fast access for queries that have
    exact matches and/or range searches on the primary key.


    The INCLUDING clause specifies the start of which columns to store in the overflow
    data segment. In the previous example, the SKU and CREATE_DTT columns are stored
    in the overflow segment.


    The PCTTHRESHOLD specifies the percentage of space reserved in the index block
    for the index-organized table row. This value can be from 1 to 50, and defaults
    to 50 if no value is specified. There must be enough space in the index block
    to store the primary key.


    The OVERFLOW clause details which tablespace should be used to store overflow
    data segments.'
  trans: "\n默认情况下，当你在 Oracle 中创建索引时，其类型将是平衡的 B-tree 结构。图 18-1 展示了一个在名字列上创建的 B-tree\
    \ 索引的平衡树状结构。当 Oracle 访问该索引时，它从称为`root block`的顶部节点开始。它使用此块来确定接下来要读取哪个二级块。二级块指向多个叶节点，这些叶节点包含一个`ROWID`和名字值。在此结构中，需要三次\
    \ I/O 操作才能找到`ROWID`。一旦确定了`ROWID`，Oracle 将使用它来读取包含该`ROWID`的表块。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 33](img/index-465_1.png)\n\n![Image 34](img/index-465_2.png)\n\n![Image\
    \ 35](img/index-465_3.png)\n\n![Image 36](img/index-465_4.png)\n\n![Image 37](img/index-465_5.png)\n\
    \n![Image 38](img/index-465_6.png)\n\n![Image 39](img/index-465_7.png)\n\n![Image\
    \ 40](img/index-465_8.png)\n\n![Image 41](img/index-465_9.png)\n\n![Image 42](img/index-465_10.png)\n\
    \n![Image 43](img/index-465_11.png)\n\n# 第 18 章 ■ 对象管理\n\n*图 18-1. 平衡的 B-tree\
    \ 索引结构*\n\n## 为表和索引使用独立的表空间\n\n数据库管理员们对于将表和索引分离到不同表空间中的优劣存在争论。如果你有从头开始设置存储系统的条件，并且能够设置拥有独立磁盘和控制器组的挂载点，那么通过指定表建立在基于一个挂载点上数据文件的表空间中，而索引建立在基于另一个独立挂载点上数据文件的表空间中，你可能会看到一些\
    \ I/O 性能上的好处。\n\n然而，如今常见的实际情况是，你的存储管理员只会给你存储区域网络（SAN）中的一大块存储空间，并且无法保证数据和索引会物理地存储在不同的磁盘（和控制器）上。尽管如此，将索引表空间与表表空间分离仍然有一些合理的理由：\n\
    \n• 你可能希望为表和索引实现不同的物理存储特性（例如区大小），并且你更倾向于让表和索引从表空间继承其存储属性。\n\n• 你倾向于拥有能够分别备份、恢复和还原表表空间和索引表空间的选项。\n\
    \n• 在运行维护报告时，你发现当报告按表空间分段时，管理表和索引更为容易。\n\n如果这些原因中任何一个对你的环境有效，那么值得付出额外的努力来为表和索引使用不同的表空间。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 18 章 ■ 对象管理\n\n## 18-8.\
    \ 创建基于函数的索引\n\n### 问题\n\n你正在运行这条 SQL 查询：\n\n```\nselect emp_name from emp where\
    \ UPPER(emp_name) = 'DAVE';\n```\n\n你已经在 `EMP_NAME` 列上创建了一个普通的 B-tree 索引，但你注意到，当你对\
    \ `EMP_NAME` 列应用 `UPPER` 函数时，Oracle 并未使用该索引。你想知道是否可以创建一个 Oracle 会使用的索引。\n\n###\
    \ 解决方案\n\n创建一个基于函数的索引，以提高在 `WHERE` 子句中使用了 SQL 函数的查询的性能。此示例在 `UPPER(EMP_NAME)`\
    \ 上创建了一个基于函数的索引：\n\n```\ncreate index user_upper_idx on emp(upper(emp_name));\n\
    ```\n\n为什么要使用基于函数的索引？因为这是 Oracle 在此场景下唯一会使用的索引类型。如果你在 `WHERE` 子句中对列应用 SQL 函数，Oracle\
    \ 将忽略该列上的常规索引。\n\n### 工作原理\n\n基于函数的索引允许在 SQL 查询的 `WHERE` 子句中对函数引用的列进行索引查找。基于函数的索引可以像前面的示例那样简单，也可以基于存储在\
    \ PL/SQL 函数中的复杂逻辑。\n\n任何用户创建的 SQL 函数在用于基于函数的索引之前，必须声明为 `deterministic`（确定性）。确定性意味着对于一组给定的输入，函数总是返回相同的结果。当你创建一个希望用于基于函数的索引的用户定义函数时，必须使用关键字\
    \ `DETERMINISTIC`。\n\n从 `DBA/ALL/USER_IND_EXPRESSIONS` 视图中选择，以显示与基于函数的索引相关的 SQL：\n\
    \n```\nselect index_name, column_expression from user_ind_expressions;\n```\n\n\
    如果你正在从 SQL*Plus 运行此 SQL，请不要忘记使用 `SET LONG` 命令，以便显示 `COLUMN_EXPRESSION` 列的完整内容。例如：\n\
    \n```\nSQL> set long 500\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# 第 18 章 ■ 对象管理\n\n## 18-9. 创建位图索引\n\n### 问题\n\n你已经在数据仓库中构建了一个星型模式。你希望确保连接事实表和维度表的\
    \ SQL 查询能高效地返回数据。\n\n### 解决方案\n\n在用于连接事实表和维度表的列上创建位图索引。位图索引通过使用 `CREATE INDEX`\
    \ 语句的关键字 `BITMAP` 来创建。此示例在 `F_DOWNLOADS` 表的 `D_DATE_ID` 列上创建了一个位图索引：\n\n```\n\
    create bitmap index f_down_date_fk1 on f_downloads(d_date_id);\n```\n\n如果你的事实表是分区的，你必须将位图索引创建为本地分区索引。通过指定\
    \ `LOCAL` 关键字来实现：\n\n```\ncreate bitmap index f_down_date_fk1 on f_downloads(d_date_id)\
    \ local;\n```\n\n### 工作原理\n\n位图索引在数据仓库环境中被广泛使用，通常用于事实表的外键列。位图索引不太适合具有多会话 DML 活动的\
    \ OLTP 环境。这是因为对于位图索引列，位图索引的内部结构通常要求在更新时锁定许多行。因此，如果有多个会话执行 `UPDATES`、`INSERTS`\
    \ 和 `DELETES`，你将遇到锁和死锁问题。\n\n数据仓库环境中的位图索引通常根据需要删除并重新创建。\n\n通常，在加载大量数据之前，会删除位图索引，然后在表填充后重新创建。为了提高创建位图索引的性能，你可以通过\
    \ `NOLOGGING` 选项关闭重做日志的生成：\n\n```\ncreate bitmap index f_down_date_fk1 on f_downloads(d_date_id)\
    \ local nologging;\n```\n\n由于索引可以轻松重建，因此通常没有理由为 `CREATE INDEX` 操作生成重做日志。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# 第 18 章 ■ 对象管理\n\n## 18-10. 创建索引组织表\n\n### 问题\n\n你有一个主要通过基于主键或主键值范围的查询来访问表数据的应用程序。你希望高效地查询此表。\n\
    \n### 解决方案\n\n当表数据通常通过主键查询访问时，索引组织表（IOT）是高效的对象。使用 `ORGANIZATION INDEX` 子句来创建索引组织表：\n\
    \n```\ncreate table prod_sku\n(prod_sku_id number,\n sku varchar2(256),\n create_dtt\
    \ timestamp(5),\n constraint prod_sku_pk primary key(prod_sku_id)\n )\norganization\
    \ index\nincluding sku\npctthreshold 30\ntablespace inv_mgmt_data\noverflow\n\
    tablespace mts;\n```\n\n### 工作原理\n\n索引组织表将表行的全部内容存储在 B-tree 索引结构中。索引组织表为那些在主键上进行精确匹配和/或范围搜索的查询提供了快速访问。\n\
    \n`INCLUDING` 子句指定了哪些列开始存储在溢出数据段中。在前面的示例中，`SKU` 和 `CREATE_DTT` 列存储在溢出段中。\n\n`PCTTHRESHOLD`\
    \ 指定了为索引组织表行在索引块中保留的空间百分比。此值可以是 1 到 50，如果未指定值，则默认为 50。索引块中必须有足够的空间来存储主键。\n\n`OVERFLOW`\
    \ 子句详细说明了应使用哪个表空间来存储溢出数据段。\n"
