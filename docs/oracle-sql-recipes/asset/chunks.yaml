  trans: "\n# 第 10 章 ■ 数据字典\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    表 10-1 描述了用于报告数据库物理空间管理的部分视图。这不是一个详尽的列表；此表仅包含了最常用的用于监控数据库空间的表。\n\n**表 10-1.**\
    \ 数据库空间管理视图概览\n\n| 数据字典视图 | 用途 |\n| :--- | :--- |\n| `V$DATABASE` | 控制文件中的数据库信息。\
    \ |\n| `DBA/ALL/USER_USERS` | 用户账户信息。 |\n| `DBA/USER_TABLESPACES` | 描述表空间。 |\n\
    | `DBA_DATA_FILES` | 描述数据库数据文件。 |\n| `DBA/USER_FREE_SPACE` | 表空间中的空闲区间。 |\n| `V$DATAFILE`\
    \ | 来自控制文件的数据文件信息。 |\n| `DBA/ALL/USER_TABLES` | 描述表属性。 |\n| `DBA/ALL/USER_INDEXES`\
    \ | 描述索引属性。 |\n| `DBA/USER_SEGMENTS` | 段的存储数据。 |\n| `DBA/ALL/USER_PART_TABLES`\
    \ | 分区表数据。 |\n| `DBA/ALL/USER_PART_INDEXES` | 分区索引数据。 |\n| `DBA/ALL/USER_TAB_PARTITIONS`\
    \ | 分区表的存储信息。 |\n| `DBA/ALL/USER_IND_PARTITIONS` | 分区索引的存储信息。 |\n| `DBA/USER_EXTENTS`\
    \ | 每个段的区间信息。 |\n| `V$CONTROLFILE` | 控制文件的名称和大小。 |\n| `V$LOG` | 控制文件中的在线重做日志文件信息。\
    \ |\n| `V$LOG_HISTORY` | 控制文件中的在线重做日志文件历史信息。 |\n| `V$ARCHIVED_LOG` | 控制文件中的归档日志文件信息。\
    \ |\n\n## 10-4. 显示表行数\n\n### 问题\n\n你想运行一个报告，显示某个模式（schema）内表的行数。\n\n### 解决方案\n\
    \n以具有 DBA 权限的模式运行以下 SQL 代码。请注意，此脚本包含 SQL*Plus 特有的命令，如 `UNDEFINE` 和 `SPOOL`。脚本每次都会提示你输入用户名：`UNDEFINE\
    \ user`\n\n```sql\nSPOOL tabcount_&&user..sql\nSET LINESIZE 132 PAGESIZE 0 TRIMSPO\
    \ OFF VERIFY OFF FEED OFF TERM OFF\nSELECT\n'SELECT RPAD(' || '''' || table_name\
    \ || '''' ||',30)'\n|| ',' || ' COUNT(*) FROM &&user..' || table_name || ';'\n\
    FROM dba_tables\nWHERE owner = UPPER('&&user')\nORDER BY 1;\nSPO OFF;\nSET TERM\
    \ ON\n@@tabcount_&&user..sql\nSET VERIFY ON FEED ON\n```\n\n这段代码将生成一个名为 `tabcount_<user>.sql`\
    \ 的文件，其中包含从指定模式内所有表中选择行数的 SQL 语句。\n\n### 工作原理\n\n开发人员和 DBA 经常使用 SQL 来生成 SQL 语句。当你需要将相同的\
    \ SQL 过程（重复地）应用于许多不同对象（例如一个模式内的所有表）时，这是一种非常有用的技术。解决方案部分的代码假设你有权访问 `DBA_TABLES`\
    \ 视图。如果你没有访问 DBA 级别视图的权限，可以查询 `USER_TABLES` 视图。例如：\n\n```sql\nSPO tabcount.sql\n\
    SET LINESIZE 132 PAGESIZE 0 TRIMSPO OFF VERIFY OFF FEED OFF TERM OFF\nSELECT\n\
    'SELECT RPAD(' || '''' || table_name || '''' ||',30)'\n|| ',' || ' COUNT(*) FROM\
    \ ' || table_name || ';'\nFROM user_tables\nORDER BY 1;\nSPO OFF;\nSET TERM ON\n\
    @@tabcount.sql\nSET VERIFY ON FEED ON\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n如果你有准确的统计信息，可以查询 `DBA/ALL/USER_TABLES` 视图的 `NUM_ROWS` 列。如果统计信息是定期生成的，该列通常会显示接近的行数。以下查询从\
    \ `USER_TABLES` 视图中选择 `NUM_ROWS`：\n\n```sql\nselect table_name, num_rows from\
    \ user_tables;\n```\n\n如果你有分区表并希望按分区显示行数，请使用以下几行 SQL 和 PL/SQL 代码：\n\n```sql\n\
    UNDEFINE user\nSET SERVEROUT ON SIZE 1000000 VERIFY OFF\nSPO part_count_&&user..txt\n\
    DECLARE\n    counter NUMBER;\n    sql_stmt VARCHAR2(1000);\n    CURSOR c1 IS\n\
    \        SELECT table_name, partition_name\n        FROM dba_tab_partitions\n\
    \        WHERE table_owner = UPPER('&&user');\nBEGIN\n    FOR r1 IN c1 LOOP\n\
    \        sql_stmt := 'SELECT COUNT(*) FROM &&user..' || r1.table_name\n      \
    \      ||' PARTITION ( '||r1.partition_name ||' )';\n        EXECUTE IMMEDIATE\
    \ sql_stmt INTO counter;\n        DBMS_OUTPUT.PUT_LINE(RPAD(r1.table_name\n  \
    \          ||'('||r1.partition_name||')',30) ||' '||TO_CHAR(counter));\n    END\
    \ LOOP;\nEND;\n/\nSPO OFF\n```\n\n## 10-5. 显示表的索引\n\n### 问题\n\n你遇到一些 SQL 查询性能问题。你想知道某个表是否有索引。\n\
    \n### 解决方案\n\n首先确保你处理的对象是一个表（而不是同义词或视图）。运行以下查询以检查对象是否为表：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n```sql\nselect\n    object_name\n    ,object_type\nfrom user_objects\nwhere\
    \ object_name=upper('&object_name');\n```\n\n之前的查询会提示你输入一个 SQL*Plus 的&变量 (`OBJECT_NAME`)。如果你没有使用\
    \ SQL*Plus，可能需要修改查询以明确查询特定对象。\n\n一旦确认对象是表，现在查询 `USER_INDEXES` 视图以显示你用户中特定表的索引：\n\
    \n```sql\nselect\n    a.index_name, a.column_name, b.status, b.index_type, a.column_position\n\
    from user_ind_columns a\n    ,user_indexes b\nwhere a.table_name = upper('&table_name')\n\
    and a.index_name = b.index_name\norder by a.index_name, a.column_position;\n```\n\
    \n之前的查询会提示你输入一个 SQL*Plus 的&变量 (`TABLE_NAME`)。如果你没有使用 SQL*Plus，可能需要修改查询以明确查询特定的表。将显示你输入的表的索引和对应的列。\n\
    \n### 工作原理\n\n处理性能问题时，首先要检查的项目之一是表的哪些列建立了索引。`USER_INDEXES` 视图包含索引名称信息，`USER_IND_COLUMNS`\
    \ 视图包含被索引的列。如果索引建立在多个列上，`COLUMN_POSITION` 列将提供这些列在索引中出现的顺序。\n\n如果你使用基于函数的索引，有时显示创建这些索引所用的表达式会很方便。函数表达式包含在\
    \ `DBA/ALL/USER_IND_EXPRESSIONS` 视图的 `COLUMN_EXPRESSION` 列中。以下脚本显示该表达式以及索引和表名：\n\
    \n```sql\nSELECT table_name, index_name, column_expression\nFROM user_ind_expressions\n\
    ORDER BY table_name;\n```\n\n## 10-6. 显示未建立索引的外键列\n\n### 问题\n\n你有一个数据库标准，即所有外键列都必须为其创建索引。你想验证是否所有外键列都已建立索引。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 解决方案\n\n以下查询将指出某个模式中，哪些表列定义了外键约束但没有相应的索引：\n\
    \n```sql\nselect\n    a.constraint_name cons_name\n    ,a.table_name tab_name\n\
    \    ,b.column_name cons_column\n    ,nvl(c.column_name,'***No Index***') ind_column\n\
    from user_constraints a\njoin\n    user_cons_columns b on a.constraint_name =\
    \ b.constraint_name\nleft outer join\n    user_ind_columns c on b.column_name\
    \ = c.column_name\n    and b.table_name = c.table_name\nwhere constraint_type\
    \ = 'R'\norder by 2,1;\n```\n\n任何具有外键约束但没有对应索引的列，都将在输出的最后一列中标注文本 `***No Index***`。以下是一些示例输出：\n\
    \n```text\nCONS_NAME           TAB_NAME            CONS_COLUMN          IND_COLUMN\n\
    -------------------- -------------------- -------------------- ----------------\n\
    FK_DEPOSITS         DEPOSITS            BATCH_NO             ***No Index***\n\
    ```\n\n### 工作原理\n"
- fmt: '# CHAPTER 10 ■ DATA DICTIONARY


    ## 10-7\. Displaying Constraints


    ### Problem

    You want to display the constraints associated with a table.


    ### Solution

    Query the `DBA_CONSTRAINTS` view to display constraint information for an owner
    and table name. The following script will prompt you for two SQL\*Plus ampersand
    variables (`OWNER` and `TABLE_NAME`). If you are not using SQL\*Plus, you may
    need to modify the script with the appropriate values before you run the script:


    ```sql

    select

    (case constraint_type

    when ''P'' then ''Primary Key''

    when ''R'' then ''Foreign Key''

    when ''C'' then ''Check''

    when ''U'' then ''Unique''

    when ''O'' then ''Read Only View''

    when ''V'' then ''Check view''

    when ''H'' then ''Hash expression''

    when ''F'' then ''REF column''

    when ''S'' then ''Supplemental logging''

    end) cons_type

    ,constraint_name cons_name

    ,search_condition check_cons

    ,status

    from dba_constraints

    where owner like upper(''&owner'')

    and table_name like upper(''&table_name'')

    order by cons_type;

    ```


    Here is some sample output:


    ```

    CONS_TYPE        CONS_NAME          CHECK_CONS                   STATUS

    ---------------- -------------------- ----------------------------- --------

    Check            SYS_C0030642       "DOWNLOAD_COUNT" IS NOT NULL  ENABLED

    Check            SYS_C0030643       "CREATE_DTT" IS NOT NULL      ENABLED

    Foreign Key      F_DOWN_SKUS_FK1                                 ENABLED

    Foreign Key      F_DOWN_PRODS_FK1                                ENABLED

    Foreign Key      F_DOWN_PROD_DESC_FK1                            ENABLED

    Foreign Key      F_DOWN_LOCS_FK1                                 ENABLED

    ```


    As you can see from the output, this table has two check constraints and four
    foreign key constraints enabled. The `SEARCH_CONDITION` column of `DBA_CONSTRAINTS`
    contains the text of the search condition for CHECK type constraints.


    ### How It Works

    The `DBA`/`ALL`/`USER_CONSTRAINTS` views document the constraints defined for
    tables in your database.


    Integrity constraints allow you to define rules about your data that are verified
    by the database engine before the data can be successfully added or modified.
    This ensures that your data has a high degree of quality.


    The `CONSTRAINT_TYPE` column of the `DBA`/`ALL`/`USER_CONSTRAINTS` views is a
    one character code. There are currently nine different types of constraints. Table
    10-2 describes the integrity constraints available.


    **Table 10-2.** Integrity Constraints

    | Constraint Code | Meaning |

    | :--- | :--- |

    | C | Check for a condition |

    | P | Primary key |

    | U | Unique key |

    | R | Referential integrity (foreign key) |

    | V | With check option on a view |

    | O | With read only on a view |

    | H | Hash expression |

    | F | Constraint with a REF column |

    | S | Supplemental logging |


    **Note:** The check constraint types of `H`, `F`, and `S` are available only in
    Oracle Database 11 *g* or higher.


    ## 10-8\. Showing Primary Key and Foreign Key Relationships


    ### Problem

    The query in the solution section joins three views. The `USER_CONSTRAINTS` view
    contains definitions of all constraints in a user’s schema. This is joined to
    `USER_CONS_COLUMNS`, which contains information about the columns accessible to
    the user that are used in constraints. A `LEFT OUTER JOIN` clause is placed between
    `USER_CONS_COLUMNS` and `USER_IND_COLUMNS` because there might be a case where
    the view on the left-hand side of the join has rows without corresponding rows
    on the right. We then apply the condition that any constraints reported by this
    query are of type `R` (a referential or foreign key constraint).


    The following listing shows the old Oracle syntax style for querying with an outer
    join. The outer join is specified by the `(+)` characters.


    ```sql

    select

    a.constraint_name cons_name

    ,a.table_name tab_name

    ,b.column_name cons_column

    ,nvl(c.column_name,''***No Index***'') ind_column

    from user_constraints a

    ,user_cons_columns b

    ,user_ind_columns c

    where constraint_type = ''R''

    and a.constraint_name = b.constraint_name

    and b.column_name = c.column_name(+)

    and b.table_name = c.table_name(+)

    order by 2,1;

    ```'
