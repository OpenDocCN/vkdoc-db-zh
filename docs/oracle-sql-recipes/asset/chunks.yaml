  trans: "\n# 13-5. 检测层次数据中的循环\n\n## 问题\n\n对一个层次表进行了更新，现在针对该表运行的任何层次查询都会产生此错误消息：\n\
    \nSQL 错误：ORA-01436：用户数据中存在 CONNECT BY 循环\n\n你需要找出被错误更新、导致此错误消息的行。\n\n## 解决方案\n\
    \n在 `CONNECT BY` 子句中使用 `CONNECT_BY_ISCYCLE` 伪列和 `NOCYCLE` 关键字，以强制 Oracle 运行查询但停止返回在层次结构中导致循环的行。例如：\n\
    \n```sql\nselect employee_id, manager_id, level lvl,\nconnect_by_iscycle is_cycle,\n\
    lpad(' ',(level-1)*3) || last_name || ', ' || first_name full_name\nfrom employees\n\
    start with last_name = 'Kochhar'\nconnect by nocycle manager_id = prior employee_id\n\
    ;\n```\n\nEMPLOYEE_ID MANAGER_ID LVL IS_CYCLE FULL_NAME\n------------ ------------\
    \ --- -------- -----------------------\n101 113 1 0 Kochhar, Neena\n108 101 2\
    \ 0 Greenberg, Nancy\n109 108 3 0 Faviet, Daniel\n110 108 3 0 Chen, John\n111\
    \ 108 3 0 Sciarra, Ismael\n112 108 3 0 Urman, Jose Manuel\n113 108 3 1 Popp, Luis\n\
    200 101 2 0 Whalen, Jennifer\n203 101 2 0 Mavris, Susan\n204 101 2 0 Baer, Hermann\n\
    205 101 2 0 Higgins, Shelley\n206 205 3 0 Gietz, William\n\n12 行已选择\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n第 13 章 ■ 树形结构数据\n\n由 Kochhar 领导的部门中的员工层次结构被错误地修改，`IS_CYCLE = 1` 的行标识了导致数据循环的行。该部门的经理\
    \ Kochhar 现在有一个 `EMPLOYEE_ID = 113` (Popp) 的经理，其管理结构沿着树向上回溯至 Kochhar。必须将 Kochhar\
    \ 的 `MANAGER_ID` 更改为另一个不在其管理层次结构中的下属员工。\n\n## 工作原理\n\n任何维护层次结构表或表集合的应用程序都不应允许产生循环的编辑。然而，错误仍然会发生，例如绕过应用程序逻辑对表进行手动编辑。检测循环源是一个两步过程：首先，识别导致循环的行。然而，如本场景所示，该行可能不是被错误更新的行。第二步是获取该行信息（通常是主键）并查找可能错误引用了被标记行的其他行。对于像上面示例这样的小结果集，可能很容易发现循环，但对于返回数百或数千行的查询，你将不得不使用如下查询：\n\
    \n```sql\nselect employee_id, manager_id, last_name, first_name\nfrom employees\n\
    where manager_id in\n(\n    select employee_id\n    from employees\n    where\
    \ connect_by_iscycle = 1\n    start with last_name = 'Kochhar'\n    connect by\
    \ nocycle manager_id = prior employee_id\n);\n```\n\n修复问题需要使用之前的查询识别导致循环的行的正确父节点，然后更新连接这些行的列：\n\
    \n```sql\nupdate employees\nset manager_id = 100\nwhere employee_id = 101\n;\n\
    ```\n\n员工 Kochhar 现在已被更新为具有正确经理（King）的原始值，该经理不是她的直接或间接下属！\n\n# 13-6. 生成固定数量的序列主键\n\
    \n## 问题\n\n你想要生成一个包含 1000 个数字的序列表作为虚拟表，以便后续填充新表。然而，使用序列无法实现，除非你使用 PL/SQL 或其他编程语言创建表。你可以使用现有表，但其行数可能太少或太多，无法满足你的需求。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 13 章 ■ 树形结构数据\n\n## 解决方案\n\
    \n你可以利用 Oracle `CONNECT BY` 层次特性的一个鲜为人知（直到现在）的副作用，即不指定 `START WITH` 或 `CONNECT\
    \ BY` 子句。以下是生成 1000 行序列的方法：\n\n```sql\nselect level new_pk from dual connect by\
    \ level <= 1000;\n```\n\nNEW_PK\n...\n已选择 1000 行\n"
- fmt: '# CHAPTER 13 ■ TREE-STRUCTURED DATA


    ## How It Works


    On the surface, it’s hard to see how this query works; if you don’t use `CONNECT
    BY` and `START WITH` very often, this will probably make even less sense. Let’s
    break it down and remember how `CONNECT BY` works, starting with the highlighted
    part of the `SELECT` statement:


    ```

    select level new_pk from dual connect by level <= 1000;

    ```


    The value returned for `LEVEL` will be our primary key, and we’re assigning a
    new name to the resulting column. Remember that `LEVEL` is a pseudo-column, and
    is only available in hierarchical queries. So far, this is fairly straightforward.
    But how do we get `LEVEL` to increment to 1000 or some other user-defined value?
    Let’s look at the next part of the statement:


    ```

    select level new_pk from dual connect by level <= 1000;

    ```


    Again, we’re not straying too far from known territory. The table `DUAL` will
    always have only one row and one column, `DUMMY`, whose value is `X`. If this
    table were to disappear, or have more than one row, then it is no exaggeration
    to say that virtually all Oracle database applications would spectacularly fail
    in short order. But how can we get 1000 rows from only one? Let’s look at the
    next part of the statement: `select level new_pk from dual connect by level <=
    1000;`


    When you use `CONNECT BY`, Oracle traverses the tree structure defined in your
    table, and the column `LEVEL` indicates how far down the tree you are in the hierarchical
    structure. But again, `DUAL` only has one row, so we only have a tree with one
    level, right? Not exactly. Remember that the `CONNECT BY` clause usually contains
    the unary operator `PRIOR` to tell Oracle how to traverse the tree and connect
    previous rows to the current row. Since there is no `START WITH` clause or `PRIOR`
    operators, this `SELECT` statement is evaluated as follows:


    1.  Oracle finds the root row for the hierarchy. Since there is no `START WITH`
    clause, Oracle starts with the only row in the result set, and it is at `LEVEL
    = 1`.

    2.  The next child row is retrieved; since there is no `CONNECT BY` criterion
    other than `LEVEL <= 1000`, Oracle returns the previous row connected to itself
    as the next child row, incrementing the value of `LEVEL`.

    3.  Oracle evaluates the `CONNECT BY` criteria to see if we’re done retrieving
    rows, and if not, Oracle continues at step 2 to return additional child rows.

    4.  After the `CONNECT BY` criteria are satisfied, the query is done returning
    results.


    Finally, we have the last part of the statement, highlighted below:


    ```

    select level new_pk from dual connect by level <= 1000;

    ```


    We have to limit the results somehow, and specifying `LEVEL <= 1000` tells Oracle
    to stop at 1000. If we didn’t have this filter, the query would run indefinitely,
    and would not stop until you cancelled the statement or shut down the database.
    You cannot specify `CONNECT BY` without a filter or hierarchical join condition;
    thus, if you were bound and determined to run a query that would never finish,
    you would have to write something like to this:


    ```

    select level new_pk from dual connect by 1=1;

    ```


    You can enhance the statement even more by slipping some procedural SQL code into
    the `SELECT` statement. In this variation, you want to create a table with a unique
    primary key, as well as a second column that has a value of `ODD` when the primary
    key is an odd number and a value of `EVEN` when the primary key is an even number:


    ```

    select level new_pk,


    case


    when mod(level,2) = 1 then ''ODD''


    else ''EVEN''


    end odd_or_even


    from dual connect by level <= 1000;

    ```


    ```

    NEW_PK ODD_OR_EVEN

    ---------------------- -----------

    1 ODD

    2 EVEN

    3 ODD

    4 EVEN

    5 ODD

    6 EVEN

    7 ODD

    8 EVEN

    ...

    995 ODD

    996 EVEN

    997 ODD

    998 EVEN

    999 ODD

    1000 EVEN

    1000 rows selected

    ```


    You can use this `SELECT` statement as the basis of a `CTAS` (Create Table As
    Select) operation, and add some extra columns, as you will see in the next section.'
