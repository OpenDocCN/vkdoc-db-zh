  trans: "# 第 13 章 ■ 树形结构数据\n\n某个员工的 `MANAGER_ID` 是 `NULL`，换句话说，就是公司的所有者或总裁，他不再向公司中的任何人汇报。如果公司有两个所有者（两人的\
    \ `MANAGER_ID` 均为 `NULL`），查询仍然有效：在返回完一棵树的员工后，查询会返回表中另一个层次结构的所有下属（子）行。此场景由图 13-1\
    \ 中的层次结构表示，其中节点 1 和 3 是两位公司所有者。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n如果我们知道员工编号永不改变，我们也可以使用这个 `START WITH` 子句：\n\n```sql\nstart with employee_id\
    \ = 100\n```\n\n此外，如果表中有两个层次结构，并且公司的共同所有者的 `EMPLOYEE_ID` = 250，那么 `START WITH`\
    \ 子句将如下所示：\n\n```sql\nstart with employee_id in (100,250)\n```\n\n此解决方案添加了一个可视化元素以及一些额外的格式，以使查询结果更具可读性。`LPAD`\
    \ 函数根据当前行在层次结构中的深度（由 `LEVEL` 伪列定义），在每个全名前添加相应数量的空格字符。\n\n从底向上遍历树结构与在 `CONNECT\
    \ BY` 子句中切换连接列一样简单直观。如果你想以相反的顺序（从底向上）查看层次结构，从 Diana Lorentz（员工编号 107）开始，你的 `SELECT`\
    \ 语句将如下所示：\n\n```sql\nselect employee_id, level,\nlpad(' ',(level-1)*3) || last_name\
    \ || ', ' || first_name full_name\nfrom employees\nstart with employee_id = 107\n\
    connect by employee_id = prior manager_id\n;\n```\n\n```\nEMPLOYEE_ID LEVEL FULL_NAME\n\
    ---------------------- ---------------------- ----------------------------\n \
    \       107       1 Lorentz, Diana\n        103       2 Hunold, Alexander\n  \
    \      102       3 De Haan, Lex\n        100       4 King, Steven\n4 rows selected\n\
    ```\n\n如果你省略 `START WITH` 子句，你将得到所有员工及其经理，以及他们经理的经理，以此类推，直到回到 King（至少在这家公司；King\
    \ 是整个层次结构顶端所有人的经理）。以下是省略 `START WITH` 子句的查询返回的几行数据：\n\n```sql\nselect employee_id,\
    \ level,\nlpad(' ',(level-1)*3) || last_name || ', ' || first_name full_name\n\
    from employees\nconnect by employee_id = prior manager_id\n;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n```\nEMPLOYEE_ID LEVEL FULL_NAME\n---------------------- ----------------------\
    \ --------------------------------------\n        100       1 King, Steven\n \
    \       101       1 Kochhar, Neena\n        100       2 King, Steven\n       \
    \ 102       1 De Haan, Lex\n        100       2 King, Steven\n        103    \
    \   1 Hunold, Alexander\n        102       2 De Haan, Lex\n        100       3\
    \ King, Steven\n        104       1 Ernst, Bruce\n        103       2 Hunold,\
    \ Alexander\n        102       3 De Haan, Lex\n        100       4 King, Steven\n\
    ...\n```\n\n此查询的输出将 King 作为没有上级的员工包含在内，此外，对于其他每一位员工，他也会出现在其所属层次结构分支的末端。\n\n##\
    \ 13-2. 在层次级别内对节点排序\n\n### 问题\n\n你希望对层次结构中位于同一父行下、同一级别的行进行排序。\n\n### 解决方法\n\n\
    在 `ORDER BY` 子句中使用 `SIBLINGS` 关键字。如果你想按姓氏对每个经理下的员工进行排序，标准的 `ORDER BY` 子句将不起作用，因为它会独立于树形层次结构中的级别对姓氏进行排序。相反，你必须使用\
    \ `ORDER SIBLINGS BY` 子句，如下例所示：\n\n```sql\nselect employee_id, level,\nlpad('\
    \ ',(level-1)*3) || last_name || ', ' || first_name full_name\nfrom employees\n\
    start with manager_id is null\nconnect by manager_id = prior employee_id\norder\
    \ `siblings` by last_name, first_name\n;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n```\nEMPLOYEE_ID LEVEL FULL_NAME\n---------------------- ----------------------\
    \ ---------------------------------\n        100       1 King, Steven\n      \
    \  148       2 Cambrault, Gerald\n        172       3 Bates, Elizabeth\n     \
    \   169       3 Bloom, Harrison\n        170       3 Fox, Tayler\n        173\
    \       3 Kumar, Sundita\n        168       3 Ozer, Lisa\n        171       3\
    \ Smith, William\n        102       2 De Haan, Lex\n        103       3 Hunold,\
    \ Alexander\n        105       4 Austin, David\n        104       4 Ernst, Bruce\n\
    ```"
- fmt: "# CHAPTER 13 ■ TREE-STRUCTURED DATA\n\n## 13-3. Generating Pathnames from\
    \ Hierarchical Tables\n\n### Problem\n\nThe Linux system administrator is creating\
    \ directory structures in the file system that match the management structure\
    \ of the company, and suspects that the DBA can help her out by accessing the\
    \ hierarchical features of Oracle to save time when creating the directory structure\
    \ for the first time.\n\n### Solution\n\nUse the `SYS_CONNECT_BY_PATH` operator\
    \ in a hierarchical query against the `EMPLOYEES` table. Here’s an example of\
    \ how to do that:\n\n```sql\nselect\n'/u01/empl' ||\nSYS_CONNECT_BY_PATH(last_name,\
    \ '/') ||\n'/' ||\nSUBSTR(first_name, 1, 1) ||\nLOWER(SUBSTR(first_name, 2)) ||\n\
    '.' ||\nLOWER(job_id) ||\n'@' ||\ndepartment_id ||\n'.dir' as path_name\nfrom\
    \ employees\nstart with manager_id is null\nconnect by manager_id = prior employee_id\n\
    order siblings by last_name, first_name\n;\n```\n\nThe sorting occurs at each\
    \ level. Under King, the direct subordinates are Cambrault, De Haan, and Errazuriz,\
    \ in alphabetical order within level 2. Under Cambrault at level 3, the direct\
    \ subordinates are sorted alphabetically as well.\n\nTree “pruning” is easy. Let’s\
    \ say that the management team does not want to see Gerald Cambrault and his subordinates\
    \ in this report. This means we’re going to prune an entire branch from the tree.\
    \ To do this, you must filter out the top of the branch to be removed in the `CONNECT\
    \ BY` clause as an additional condition, as follows:\n\n```sql\nselect employee_id,\
    \ level,\nlpad(' ',(level-1)*3) || last_name || ', ' || first_name full_name\n\
    from employees\nstart with manager_id is null\nconnect by manager_id = prior employee_id\n\
    \  and not (last_name = 'Cambrault' and first_name = 'Gerald')\norder siblings\
    \ by last_name, first_name\n;\n```\n\n```text\nEMPLOYEE_ID LEVEL FULL_NAME\n----------------------\
    \ ---------------------- ---------------------------------\n         100     \
    \ 1 King, Steven\n         102      2   De Haan, Lex\n         103      3    \
    \ Hunold, Alexander\n         105      4       Austin, David\n         104   \
    \   4       Ernst, Bruce\n         107      4       Lorentz, Diana\n         106\
    \      4       Pataballa, Valli\n         147      2   Errazuriz, Alberto\n  \
    \       166      3     Ande, Sundar\n         167      3     Banda, Amit\n   \
    \      163      3     Greene, Danielle\n         165      3     Lee, David\n \
    \        164      3     Marvins, Mattea\n         162      3     Vishney, Clara\n\
    ...\n         149      2   Zlotkey, Eleni\n         174      3     Abel, Ellen\n\
    \         178      3     Grant, Kimberely\n         175      3     Hutton, Alyssa\n\
    \         179      3     Johnson, Charles\n         177      3     Livingston,\
    \ Jack\n         176      3     Taylor, Jonathon\n\n100 rows selected\n```\n\n\
    If someone decides the report should exclude only Gerald Cambrault but still include\
    \ his subordinate employees, the filter should be in the `WHERE` clause instead,\
    \ as follows:\n\n```sql\nselect employee_id, level,\nlpad(' ',(level-1)*3) ||\
    \ last_name || ', ' || first_name full_name\nfrom employees\nwhere not (last_name\
    \ = 'Cambrault' and first_name = 'Gerald')\nstart with manager_id is null\nconnect\
    \ by manager_id = prior employee_id\norder siblings by last_name, first_name\n\
    ;\n```\n\n```text\nEMPLOYEE_ID LEVEL FULL_NAME\n---------------------- ----------------------\
    \ ---------------------------------\n         100      1 King, Steven\n      \
    \   172      3   Bates, Elizabeth\n         169      3   Bloom, Harrison\n   \
    \      170      3   Fox, Tayler\n         173      3   Kumar, Sundita\n      \
    \   168      3   Ozer, Lisa\n         171      3   Smith, William\n         102\
    \      2   De Haan, Lex\n         103      3     Hunold, Alexander\n         105\
    \      4       Austin, David\n         104      4       Ernst, Bruce\n       \
    \  107      4       Lorentz, Diana\n         106      4       Pataballa, Valli\n\
    \         147      2   Errazuriz, Alberto\n         166      3     Ande, Sundar\n\
    \         167      3     Banda, Amit\n         163      3     Greene, Danielle\n\
    \         165      3     Lee, David\n         164      3     Marvins, Mattea\n\
    \         162      3     Vishney, Clara\n...\n         149      2   Zlotkey, Eleni\n\
    \         174      3     Abel, Ellen\n         178      3     Grant, Kimberely\n\
    \         175      3     Hutton, Alyssa\n         179      3     Johnson, Charles\n\
    \         177      3     Livingston, Jack\n         176      3     Taylor, Jonathon\n\
    \n106 rows selected\n```\n\nThere are now several phantom employees at level 3\
    \ in the report. It is not clear who the immediate supervisor is, but we do know\
    \ that they work for a manager whose last name comes before DeHaan in the alphabet!\
    \ This method of pruning is usually more useful when trimming leaf (bottom) nodes\
    \ from a tree."
