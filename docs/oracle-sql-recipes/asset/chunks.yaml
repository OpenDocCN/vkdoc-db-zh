    create database link db2 connect to &&user2 identified by &&user2_pwd using ''db-prod1:1521/scaprd'';

    ```


    创建数据库链接后，运行 SQL 语句以从数据字典视图显示元数据差异。接下来的两条语句使用 `MINUS` 集合运算符来确定表名是否存在任何差异：


    ```sql

    prompt ...Tables in db1 NOT IN db2

    select table_name

    from user_tables&&conn1

    minus

    select table_name

    from user_tables&&conn2;


    prompt ...Tables in db2 NOT IN db1

    select table_name

    from user_tables&&conn2

    minus

    select table_name

    from user_tables&&conn1;

    ```


    如果您想将本地模式与远程模式进行比较，则只需要一个数据库链接。在这种情况下，您还需要将一个连接变量定义为空，例如：`define conn2=''''`


    现在，您可以作为本地用户连接到您的数据库，并将远程模式与本地模式进行比较。


    如果您想比较同一数据库中两个模式中的对象，则必须修改脚本以包含 `OWNER` 并使用 `DBA` 或 `ALL` 数据字典视图（而不是 `USER`）。


    ### 工作原理


    在本方法的解决方案部分，我们展示了一个简单的示例，说明如何使用数据字典来确定两个模式在表名方面是否存在任何差异。它通过使用 `MINUS` 集合运算符来显示存在于第一个模式但不存在于第二个模式的数据字典行来比较模式。然后运行另一个类似的查询，但这次它检查存在于第二个模式但不存在于第一个模式的行。


    以下是一个更完整的比较两个模式对象的示例。此脚本比较多个不同的数据字典视图以查找元数据差异：


    ```sql

    spo diff.txt


    prompt Default or temp tablespace in db1 NOT IN db2

    select default_tablespace, temporary_tablespace

    from user_users&&conn1

    minus

    select default_tablespace, temporary_tablespace

    from user_users&&conn2;


    prompt Default or temp tablespace in db2 NOT IN db1

    select default_tablespace, temporary_tablespace

    from user_users&&conn2

    minus

    select default_tablespace, temporary_tablespace

    from user_users&&conn1;


    prompt Tablespace quotas in db1 NOT IN db2

    select tablespace_name, max_bytes

    from user_ts_quotas&&conn1

    minus

    select tablespace_name, max_bytes

    from user_ts_quotas&&conn2;


    prompt Tablespace quotas in db2 NOT IN db1

    select tablespace_name, max_bytes

    from user_ts_quotas&&conn2

    minus

    select tablespace_name, max_bytes

    from user_ts_quotas&&conn1;


    prompt Objects in db1 NOT IN db2

    select object_name, object_type

    from user_objects&&conn1

    minus

    select object_name, object_type

    from user_objects&&conn2 order by 2;


    prompt Objects in db2 NOT IN db1

    select object_name, object_type

    from user_objects&&conn2

    minus

    select object_name, object_type

    from user_objects&&conn1 order by 2;


    prompt Tables in db1 NOT IN db2

    select table_name

    from user_tables&&conn1

    minus

    select table_name

    from user_tables&&conn2;


    prompt Tables in db2 NOT IN db1

    select table_name

    from user_tables&&conn2

    minus

    select table_name

    from user_tables&&conn1;


    prompt Indexes in db2 NOT IN db1

    select table_name, index_name, index_type, uniqueness

    from user_indexes&&conn2

    minus

    select table_name, index_name, index_type, uniqueness

    from user_indexes&&conn1 order by 1, 2;


    prompt Table columns db1 NOT IN db2

    select table_name, column_name

    from user_tab_columns&&conn1

    minus

    select table_name, column_name

    from user_tab_columns&&conn2 order by 1,2;


    prompt Table columns in db2 NOT IN db1

    select table_name, column_name

    from user_tab_columns&&conn2

    minus

    select table_name, column_name

    from user_tab_columns&&conn1 order by 1,2;


    spo off;

    ```


    前面的脚本只是您如何使用数据字典视图来报告模式之间元数据差异的示例。我们并未将所有可能的检查类型都包含在脚本中。


    相反，我们在此包含了足够的内容，为您提供一个示例，说明如何查找开发人员和 DBA 寻找的最常见类型的差异。我们已在 Apress 网站 (http://www.apress.com)
    的源代码部分包含了此脚本的完整版本。


    如果您可以访问诸如 Enterprise Manager Change Management Pack 之类的工具，您也可以使用它来显示两个模式之间的差异。快速的
    Google 搜索将显示数十种可用于比较模式的工具。本方法的目的不是与这些工具竞争，而是表明您可以快速创建一组 SQL 语句来显示模式差异。这些语句可以根据您的环境需要轻松地进行扩充和增强。


    # 第 13 章


    ## 树形结构数据


    树形结构——分层数据——无处不在。除了您后院或附近公园里可能有一棵有树干和树枝的真树之外，您还可能参加一个篮球锦标赛，其对阵图是基于时间的树形结构版本，最终只有一支队伍在锦标赛结束时位于根节点。在您的工作中，管理结构本质上是一个树形结构，老板或所有者在顶部，经过一层或多层管理才到达位于树底部的时薪员工。

    '
- fmt: '# CHAPTER 13 ■ TREE-STRUCTURED DATA


    整个数据库管理系统都围绕层次数据构建。IBM公司最受欢迎的产品之一，信息管理系统（IMS），出现在20世纪60年代末，并为层次数据和事务速度进行了优化。尽管它仍然是IBM最畅销的产品之一，但其实现方式使得在不进行额外编码的情况下，难以以多种方式访问数据。XML是一种相对较新的表示树形结构数据的方式，它提供了标准化的数据交换，但如果你尝试以替代顺序遍历XML文档，则会很有挑战性。在20世纪70年代末，Oracle及其关系数据库架构开始解决层次模型的不灵活性，并提供对使用内置功能对一个或多个表进行层次遍历的支持。


    图13-1显示了两个层次树；它们可能在不同的表中，也可能在同一个表中。


    ![](media/image1.png)


    **Figure 13-1.** *来自单个数据库表的两个树中的层次（树形结构）数据*


    如你将在本章的一个示例中看到的，Oracle可以在同一张表中处理多棵树而没有任何问题。树中每个节点的键通常是主键或候选键。一个给定的节点可以有零个、一个或多个子节点；一个给定的子节点只能有一个父节点。在遍历树时，经常使用*级别*的概念；它指定了一个节点距离树的根节点有多远，其中级别1是根节点所在的级别。根据它们在层次结构中的位置，每个级别的一行可以是两种类型之一。以下是我们将在本章中使用的定义：


    `Root`: 层次结构中最高的行


    `Child`: 任何非根行


    `Parent`: 任何拥有子行的行


    `Leaf`: 没有任何子行的行


    在图13-1中，节点1和3是根节点，19和27（以及每棵树底部的许多其他节点）是叶节点，除叶节点外的所有节点都是父节点。除根节点外的所有节点都是子节点。一个节点不能同时拥有四种角色中的三种或全部四种，而只有一行的表是唯一一种节点可以同时是根节点和叶节点的情况。


    在本章中，我们将介绍访问单个表或跨多个表的层次数据的大部分方法。在层次查询中你会看到的关键子句是`CONNECT BY`和`START WITH`。`CONNECT
    BY`子句指定了你希望如何将行与其前驱和后继链接起来；正如你将看到的示例，这个子句也可能包含其他过滤器。通常，你的查询中也会有一个`START WITH`子句，但这不是必需的。你使用`START
    WITH`来指定你希望从层次结构中的哪个位置开始检索行。如果你的表中有多个层次结构，如图13-1中的例子，这将特别有用。你也可以使用`START WITH`来排除层次结构的顶层节点。


    在许多情况下，你的层次数据可能不一致。例如，你的数据库可能无意中表明员工Smith向King汇报，员工Jones向Smith汇报，而员工King向Jones汇报。这显然不是一个有效的业务条件，Oracle会自动检测这些情况并返回错误消息；或者，你可以使用`NOCYCLE`与`CONNECT_BY_ISCYCLE`一起使用，以轻松识别那些后继同时也是层次结构中某处前驱的行。


    其他伪列使你的层次查询对报表更有用。`LEVEL`伪列返回当前行的树深度。在图13-1中，节点1和3将返回`LEVEL`值1，节点5和15将返回`LEVEL`值2，依此类推。用`CONNECT_BY_ROOT`限定的列返回该列在层次结构顶部的值，与查询结果中当前行的级别编号无关。


    有时你想看到“大局”，你可以使用`SYS_CONNECT_BY_PATH`函数来构建一个字符串，其中包含从树根到当前节点的列值。伪列`CONNECT_BY_ISLEAF`指示该行是否是叶节点，换句话说，是否是层次结构中分支底部的节点。


    你可能会发现需要对层次查询的结果进行排序。然而，标准的`ORDER BY`不会产生预期的结果，因为排序是跨所有行的，而不是在层次结构的每个级别内进行的。在层次结构中，你将使用`ORDER
    SIBLINGS BY`子句来在其父行内对列的子集进行排序。


    本章的示例将涵盖所有这些子句的变体，至少为你提供一个模板，用于创建你的应用程序所需的任何类型的层次查询。虽然你可以在Java或C++等过程语言中模拟大部分（如果不是全部）这些功能，但使用Oracle内置层次查询功能的易用性、清晰性和效率使其成为一个轻松的选择。


    ## 13-1. Traversing Hierarchical Data from Top to Bottom


    ### Problem


    你需要从包含层次数据的表中生成报表，从上到下遍历层次结构，并清晰地标识层次结构中每行的级别。


    ### Solution


    使用`CONNECT BY`子句指定层次查询，使用`PRIOR`操作符定义父节点之间的链接条件，并结合`LEVEL`伪列和`LPAD`在报表中提供视觉辅助。在以下示例中，管理团队希望获得一份显示公司管理结构的报告，清晰地显示每个高级经理下的下属：


    ```sql

    select employee_id, level,

    lpad('' '',(level-1)*3) || last_name || '', '' || first_name full_name

    from employees

    start with manager_id is null

    connect by manager_id = prior employee_id

    ;

    ```


    ```

    EMPLOYEE_ID LEVEL FULL_NAME

    ---------------------- ------------------- -----------------------------

    100       1     King, Steven

    101       2     Kochhar, Neena

    108       3     Greenberg, Nancy

    109       4     Faviet, Daniel

    110       4     Chen, John

    111       4     Sciarra, Ismael

    112       4     Urman, Jose Manuel

    113       4     Popp, Luis

    200       3     Whalen, Jennifer

    203       3     Mavris, Susan

    204       3     Baer, Hermann

    205       3     Higgins, Shelley

    206       4     Gietz, William

    102       2     De Haan, Lex

    103       3     Hunold, Alexander

    104       4     Ernst, Bruce

    105       4     Austin, David

    106       4     Pataballa, Valli

    107       4     Lorentz, Diana

    ...

    201       2     Hartstein, Michael

    202       3     Fay, Pat

    107 rows selected

    ```


    该查询根据员工在公司管理结构中的位置按比例缩进结果。


    ### How It Works


    你在解决方案中看到的SQL关键字和子句是你在大多数层次查询中都会看到的：`LEVEL`伪列用于指示当前行（节点）距离根节点有多远，`START WITH`子句用于指示从何处开始树导航，`CONNECT
    BY`用于指定父节点和子节点如何连接。此外，你几乎总是使用一元操作符`PRIOR`来指定父行中与子行（当前行）的链接列具有相同值的列。


    `START WITH`子句表示我们希望从`MANAGER_ID`为NULL的行开始导航。'
  raw: 'Entire database management systems are built around hierarchical data. One
    of IBM Corporation’s most popular products, Information Management System (IMS),
    arrived in the late 1960s and is optimized for hierarchical data and transaction
    speed. Although it is still one of IBM’s best-selling products, its implementation
    makes it difficult to access the data in a variety of ways without additional
    coding. XML is a relatively new way of representing tree-structured data that
    offers standardized data interchange, but is challenging if you try to traverse
    an XML document in an alternative order. In the late 1970s, Oracle and its relational
    database architecture began to address the inflexibility of the hierarchical model
    and to provide support for hierarchical traversal of one or more tables using
    built-in features.


    Figure 13-1 shows two hierarchical trees; they could be in different tables or
    in the same table.


    Oracle handles more than one tree within the same table without any problem, as
    you will see in one of the recipes in this chapter. Each node’s key within a tree
    is typically a primary or alternate key. A given node can have zero, one, or many
    children; a given child node can have only one parent. The concept of a *level*
    is often used when traversing a tree; it specifies how far a node is from the
    root node of a tree, with level 1 being the level of the root node(s). A row at
    each level can be one of two types depending on where in the hierarchy they are.
    Here are the definitions we’ll use throughout the chapter: **Root**: the highest
    row in a hierarchical structure


    **Child**: any non-root row


    **Parent**: any row that has children rows


    **Leaf**: a row without any children rows


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13 ■ TREE-STRUCTURED DATA


    Tree A Root


    Level


    Tree B Root


    ***Figure 13-1.** Hierarchical (tree-structured) data in two trees from a single
    database table* In Figure 13-1, nodes 1 and 3 are root nodes, 19 and 27 (and many
    others at the bottom of each tree) are leaf nodes, and all nodes except the leaf
    nodes are parent nodes. All nodes other than the root nodes are child nodes. A
    node cannot have three of the four roles, or all four, and a table with one row
    is the only case where a node can be a root node and a leaf node at the same time.


    In this chapter, we’ll cover most of the ways to access hierarchical data in a
    single table or across several tables. The key clauses you’ll see in a hierarchical
    query are CONNECT BY and START WITH. The CONNECT BY clause specifies how you want
    to link rows to their predecessors and successors; this clause may also contain
    other filters, as you will see in one of the recipes. Typically, you will also
    have a START


    WITH clause in your query, but it is not required. You use START WITH to specify
    where in the hierarchy you want to begin retrieving rows. This is especially useful
    if you have more than one hierarchy in your table, as in the example in Figure
    13-1\. You also might use START WITH to exclude the top node of the hierarchy,
    for example.


    In many situations, your hierarchical data might not be consistent. For example,
    your database might inadvertently indicate that the employee Smith reports to
    King, the employee Jones reports to Smith, and the employee King reports to Jones.
    This is clearly not a valid business condition, and Oracle will automatically
    detect these conditions and return an error message; alternatively, you can use
    NOCYCLE with CONNECT_BY_ISCYCLE to easily identify rows that have a successor
    that is also a predecessor somewhere in the hierarchy.


    Other pseudo-columns make your hierarchical queries more useful for reporting.
    The LEVEL


    pseudo-column returns the tree depth of the current row. In Figure 13-1, nodes
    1 and 3 would return a LEVEL of 1, nodes 5 and 15 will return a LEVEL of 2, and
    so forth. Qualifying a column with CONNECT_BY_ROOT returns the column’s value
    at the top of the hierarchy, regardless of the level number of the current row
    in the query results.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13 ■ TREE-STRUCTURED DATA


    Sometimes you want to see the “big picture,” and you can use the SYS_CONNECT_BY_PATH
    function to build a string containing column values from the root of the tree
    to the current node. The pseudocolumn CONNECT_BY_ISLEAF indicates whether the
    row is a leaf node, at the bottom of a branch in the hierarchy, in other words.


    You may find a need to sort the results of your hierarchical query. However, the
    standard ORDER BY


    does not produce the desired result, since the ordering is across all rows, and
    not within each level of the hierarchy. In a hierarchy, you’ll use the ORDER SIBLINGS
    BY clause instead to order a subset of columns within their parent row.


    The recipes in this chapter will cover variations of all these clauses to at least
    give you a template for creating any type of hierarchical query that your application
    requires. Although you could simulate most, if not all, of these features in a
    procedural language such as Java or C++, the ease of use, clarity, and efficiency
    of using Oracle’s built-in hierarchical query features make it an easy choice.


    13-1\. Traversing Hierarchical Data from Top to Bottom


    Problem


    You need to generate reports from tables with hierarchical data, traversing the
    hierarchy from top to bottom and clearly denoting the level of each row in the
    hierarchy.


    Solution


    Use the CONNECT BY clause to specify a hierarchical query, the PRIOR operator
    to define the linking condition between the parent nodes, and the combination
    of the LEVEL pseudo-column and LPAD to provide a visual aid in the report. In
    the following example, the management team wants a report that displays the management
    structure of the company, clearly showing subordinates within each higher-level
    manager:


    select employee_id, level,


    lpad('' '',(level-1)*3) || last_name || '', '' || first_name full_name


    from employees


    start with manager_id is null


    connect by manager_id = prior employee_id


    ;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13 ■ TREE-STRUCTURED DATA


    EMPLOYEE_ID LEVEL FULL_NAME


    ---------------------- ------------------- -----------------------------


    100 1 King, Steven


    101 2 Kochhar, Neena


    108 3 Greenberg, Nancy


    109 4 Faviet, Daniel


    110 4 Chen, John


    111 4 Sciarra, Ismael


    112 4 Urman, Jose Manuel 113 4 Popp, Luis


    200 3 Whalen, Jennifer


    203 3 Mavris, Susan


    204 3 Baer, Hermann


    205 3 Higgins, Shelley


    206 4 Gietz, William


    102 2 De Haan, Lex


    103 3 Hunold, Alexander


    104 4 Ernst, Bruce


    105 4 Austin, David


    106 4 Pataballa, Valli


    107 4 Lorentz, Diana


    ...


    201 2 Hartstein, Michael


    202 3 Fay, Pat


    107 rows selected


    The query indents the results proportionally to the employee’s position in the
    company management structure.


    How It Works


    The SQL keywords and clauses you see in the solution are the ones you see in most
    hierarchical queries: the LEVEL pseudo-column to indicate how far from the root
    node the current row (node) is, the START


    WITH clause to indicate where to start the tree navigation, and CONNECT BY to
    specify how the parent nodes and child nodes are connected. In addition, you almost
    always use the PRIOR unary operator to specify the column or columns in the parent
    row that have the same values as the linking columns in the child (current) row.


    The START WITH clause indicates that we want to start the navigation on a row
    where the MANAGER_ID'
