    **C H A P T E R 5**


    ■ ■ ■


    **Common Query Patterns**


    In this chapter we introduce recipes to handle many common query patterns, often
    for the sort of problems that you know should have an elegant solution, but for
    which no obvious SQL command or operator exists. Whether it’s predicting the trend
    in data for extrapolation and planning purposes, paginating your data for display
    on a web site, or finding lost text in your database, you’ll find a recipe to
    suit you in this chapter.


    Many of the problems we address here have multiple solutions. Where space allows,
    we’ve tried to cover as many options as possible. Having said that, if you invent
    or know of a different approach, consider yourself a budding SQL chef too!


    5-1\. Changing Nulls into Real Values


    Problem


    You want to substitute null values in a table or result with a meaningful alternative.


    Solution


    Oracle provides several functions to allow manipulation and conversion of null
    values into arbitrary literals, including NVL, NVL2, COALESCE, and CASE-based
    tests. Each of these allows for different logic when handling null values, translating
    their inclusion in results in different ways. The goal is to turn NULL


    values into something more meaningful to the non-database professional, or more
    appropriate to the business context in which the data will be used.


    Our recipe’s first SELECT statement uses the NVL function to return an employee’s
    id and surname, and either the commission percentage or the human-readable “no
    commission” for staff with a null COMMISSION_PCT.


    select employee_id, last_name,


    nvl(to_char(commission_pct), ''No Commission'') as COMMISSION


    from hr.employees;


