  trans: "\n100 SKING S·金\n101 NKOCHHAR N·科卡尔\n102 LDEHAAN L·德赫安\n103 AHUNOLD A·亨诺德\n\
    104 BERNST B·恩斯特\n105 DAUSTIN D·奥斯汀\n106 VPATABAL V·帕塔巴尔\n. . .\n\n如果电子邮件地址不包含完整的员工姓名，或者员工的姓氏由两部分组成（如\
    \ McDonald、DeVry 或 DeHaan），那么这个解决方案就不太理想。\n\n[IT 电子书网站](http://www.it-ebooks.info/)\n\
    \n# 第 4 章 ■ 创建与衍生数据\n\n## 4-7. 将字符串转换为数字等价物\n\n### 问题\n\n为了集中管理你的领域代码并进一步规范化数据库表的结构，你想清理并转换一些文本格式的业务属性为数字等价物。这将增强报告能力，并减少未来数据录入的错误。\n\
    \n### 解决方案\n\n使用 `CASE` 函数将业务键或其他智能数字键，转换为集中存储在领域代码表中的数字代码。例如，`OE` 模式下的 `ORDERS`\
    \ 表包含一个 `ORDER_MODE` 列，该列当前有四个可能的值，如表 4-1 所示。\n\n**表 4-1.** 将 `ORDER_MODE` 列中的文本映射到数字值\n\
    \n| 文本（源列） | 数字（目标列） |\n|----------------------|-------------------------------|\n\
    | 直销                 | 1                             |\n| 在线                 |\
    \ 2                             |\n| 沃尔玛               | 3                   \
    \          |\n| 亚马逊               | 4                             |\n\n表 4-1 的第二列包含了我们希望为\
    \ `ORDER_MODE` 列中每个可能值映射到的数字。以下是你用于向表中添加新列的 SQL：\n\n```sql\nalter table orders\
    \ add (order_mode_num number);\n```\n\nOracle 9 `i` 及更高版本包含了 `CASE` 语句，它本质上是在通常非过程化的\
    \ `SQL` 命令语言中，更轻松地执行过程化代码的一种方式。\n\n`CASE` 语句有两种形式：一种用于较简单的场景，其中单个表达式与一个常量或表达式列表进行比较；第二种形式支持对任何列和表达式的组合进行求值。在这两种形式中，`CASE`\
    \ 都返回一个结果，该结果被赋值给 `SELECT` 查询或 `DML` 语句中的一个列。\n\n使用较简单的 `CASE` 语句形式的解决方案如下：\n\n\
    ```sql\nupdate orders\nset order_mode_num =\n  case order_mode\n    when 'direct'\
    \ then 1\n    when 'online' then 2\n    when 'walmart' then 3\n    when 'amazon'\
    \ then 4\n    else 0\n  end;\n```\n\n一旦你运行了 `UPDATE` 语句，在验证没有其他现有的 `SQL` 引用它之后，就可以删除\
    \ `ORDER_MODE` 列。\n\n[IT 电子书网站](http://www.it-ebooks.info/)\n\n# 第 4 章 ■ 创建与衍生数据\n\
    \n### 工作原理\n\n`CASE` 语句执行与较旧的（但在某些场景下仍然有用的）`DECODE` 函数相同的功能，并且可读性更高一些。对于更复杂的比较，例如评估多个表达式或列的情况，你可以使用第二种形式的\
    \ `CASE` 语句。在第二种形式中，`CASE` 子句不包含列或表达式；相反，每个 `WHEN` 子句包含所需的比较操作。以下是一个示例，当订单是员工订单（`CUSTOMER_ID`\
    \ 小于 102）时，我们希望分配一个特殊代码 5：\n\n```sql\nupdate orders\nset order_mode_num =\n  case\n\
    \    when order_mode = 'direct' and customer_id < 102 then 5\n    when order_mode\
    \ = 'direct' then 1\n    when order_mode = 'online' then 2\n    when order_mode\
    \ = 'walmart' then 3\n    when order_mode = 'amazon' then 4\n    else 0\n  end;\n\
    ```\n\n请注意，在此场景中，你需要在 `WHEN` 子句列表中首先检查员工订单，否则 `ORDER_MODE` 列将被设置为 1，并且不会标记任何客户订单，因为两个条件都检查\
    \ `ORDER_MODE = 'direct'`。对于 `DECODE` 和 `CASE`，一旦 Oracle 找到第一个计算结果为 `TRUE` 的表达式，评估和赋值就会停止。\n\
    \n在解决方案中，字符串 `'direct'` 被转换为 1，`'online'` 被转换为 2，依此类推。如果 `ORDER_MODE` 列不包含列表中的任何字符串，则\
    \ `ORDER_MODE_NUM` 列被赋值为 0。\n"
- fmt: 'Finally, reversing the mapping in a `SELECT` statement for reporting purposes
    is very straightforward: we can use `CASE` or `DECODE` with the text and numeric
    values reversed. Here is an example:


    ```sql

    select order_id, customer_id, order_mode_num,

    case order_mode_num

    when 1 then ''Direct, non-employee''

    when 2 then ''Online''

    when 3 then ''WalMart''

    when 4 then ''Amazon''

    when 5 then ''Direct, employee''

    else ''unknown''

    end order_mode_text

    from orders

    where order_id in (2458,2397,2355,2356)

    ;

    ```


    ORDER_ID CUSTOMER_ID ORDER_MODE_NUM ORDER_MODE_TEXT

    -------------- --------------- ----------------- --------------------

    2355 104 2 Online

    2356 105 2 Online

    2397 102 1 Direct, non-employee

    2458 101 5 Direct, employee


    4 rows selected


    The older `DECODE` statement is the most basic of the Oracle functions that converts
    one set of values to another; you can convert numeric codes to human-readable
    text values or vice versa, as we do in the previous solutions. `DECODE` has been
    available in Oracle since the earliest releases. `DECODE` has a variable number
    of arguments, but the arguments can be divided into three groups:


    *   The column or expression to be translated

    *   One or more pairs of values; the first value is the existing value and the
    second is the translated value

    *   A single default value if the column or expression to be translated does not
    match the first value of any of the specified pairs


    Here is the `UPDATE` statement using `DECODE`:


    ```sql

    update orders

    set order_mode_num =

    decode(order_mode,

    ''direct'',1,

    ''online'',2,

    ''walmart'',3,

    ''amazon'',4,

    0)

    ;

    ```


    105 rows updated


    `DECODE` translates the `ORDER_MODE` column just as `CASE` does. If the values
    in the column do not match any of the values in the first of each pair of constants,
    `DECODE` returns 0.


    ### Generating Random Data


    **Problem**


    You need to generate random numbers to simulate real-world events that do not
    follow a discernible pattern.


    **Solution**


    Use the Oracle built-in PL/SQL package `DBMS_RANDOM`. The `RANDOM` function returns
    an integer in the range `[-2^31, 2^31)` (`-2^31` can be returned, but `2^31` will
    not), and the `VALUE` function returns a decimal number in the range `[0,1)` with
    38 digits of precision.


    For example, the merchandising department wants to lower pricing below list price
    on catalog items on a daily basis to potentially stimulate sales from customers
    who perceive a bargain when the price is at least 10 percent below list price.
    However, the merchandising analysts want to vary the discount from 10 percent
    to 20 percent on a random basis. To do this, first create a `DAILY_PRICE` column
    in the `PRODUCT_INFORMATION` table as follows:


    ```sql

    alter table product_information add (daily_price number);

    ```


    Next, use the `DBMS_RANDOM.VALUE` function to adjust the `DAILY_PRICE` to a value
    between 10 percent and 20 percent below the list price:


    ```sql

    update product_information

    set daily_price =

    round(list_price*(0.9-(dbms_random.value*0.1)))

    ;

    ```


    288 rows updated.


    Here is the query to retrieve the calculated daily price:


    ```sql

    select product_id, list_price, daily_price

    from product_information

    ;

    ```


    PRODUCT_ID LIST_PRICE DAILY_PRICE

    ---------------------- ---------------------- ----------------------

    1772 456 380

    2414 454 379

    2415 359 293

    2395 123 99

    1755 121 104

    2406 223 200

    2404 221 182

    . . .


    Running the `UPDATE` statement a second time will adjust the prices randomly again,
    with a different discount for each product, but still ranging from 10 to 20 percent
    off:


    ```sql

    update product_information

    set daily_price =

    round(list_price*(0.9-(dbms_random.value*0.1)))

    ;


    select product_id, list_price, daily_price

    from product_information

    ;

    ```


    PRODUCT_ID LIST_PRICE DAILY_PRICE

    ---------------------- ---------------------- ----------------------

    1772 456 383

    2414 454 378

    2415 359 319

    2395 123 111

    1755 121 107

    2406 223 193

    2404 221 184

    . . .'
