    CHAPTER 6 ■ WORKING WITH DATE AND TIME VALUES


    6-5\. Generating a Gapless Time Series from Data with Gaps


    Problem


    You would like to report business activity on each day of the month, but only
    store data on dates on which actions like launching a new promotion occur. You’d
    like to generate data for all the dates in a month, filling in the gaps in your
    records and showing zero activity on days for which no data was recorded.


    Solution


    Use Oracle’s CONNECT BY LEVEL functionality and an OUTER JOIN to join date and
    time data with gaps to a reference table representing all dates and/or times you
    want to cover.


    Our recipe SQL, shown next, uses this approach to fill in the gaps in promotions
    recorded in the SH.PROMOTIONS table for the month of June 1998.


    select Day_Source.Day_Row Promotion_Date,


    count(sh.promotions.promo_begin_date) Promotions_Launched


    from


    (select to_date(''01-JUN-98'') + rownum - 1 as Day_Row


    from dual


    connect by level <= 30)


    Day_Source left outer join sh.promotions


    on Day_Source.Day_Row = sh.promotions.promo_begin_date


    group by Day_Source.Day_Row


    order by Day_Source.Day_Row;


    Even though there were 14 days in June 1998 when no data was recorded in the SH.PROMOTIONS
    table, our recipe can report full results for each day of the month, showing zero
    promotions for those


    “missing” days.


    PROMOTION_DATE PROMOTIONS_LAUNCHED


    -------------- -------------------


    01-JUN-98 3


    02-JUN-98 6


    03-JUN-98 7


    04-JUN-98 0


    05-JUN-98 0


    06-JUN-98 1


    07-JUN-98 0


    08-JUN-98 0


    09-JUN-98 0


    10-JUN-98 0'
  trans: "\n# `ORA_ROWSCN` 伪列\n\n`ORA_ROWSCN` 是一个自 Oracle 10*g* 版本起就支持的伪列。默认情况下，其取值来源于存储行所在数据块的块级系统更改号（`SCN`）。\n\
    \n## 第 6 章 ■ 处理日期和时间值\n\n通过下面的 SQL 语句可以直接查看此 `SCN`，该语句返回我们 `HR.EMPLOYEES` 表中行的\
    \ `SCN`。\n\n```sql\nselect employee_id, ora_rowscn\nfrom hr.employees;\n\nEMPLOYEE_ID\
    \ ORA_ROWSCN\n----------- ----------\n210 7824020\n211 7824020\n212 7824020\n\
    100 7824148\n101 7824148\n102 7824148\n…\n```\n\n`SCN` 值被传递给 `SCN_TO_TIMESTAMP`\
    \ 函数，该函数确定相关 `SCN` 是由 Oracle 在何时生成的。此值的类型为 `TIMESTAMP`，尽管 Oracle 声明返回的 `TIMESTAMP`\
    \ 仅精确到 3 秒内，而非 `TIMESTAMP` 可存储的微秒级精度。如果 `SCN` 比实例仍跟踪的最旧 `SCN` 还要老，您将收到 \"`ORA-08181:\
    \ specified number is not a valid system change number`\" 错误消息。这意味着数月或数年前的 `SCN`\
    \ 值可能无法使用此技术进行转换。\n\n`提示`：您可以通过查询 `SYS.SMON_SCN_TIME` 表，独立于任何给定的行或数据块来查找 `TIMESTAMP`\
    \ 到 `SCN` 的对应关系。\n\n您可能已经从使用的 SQL 描述或结果中发现了我们这个方法的某个局限。我们使用 `ORA_ROWSCN` 伪列返回的是块级\
    \ `SCN`，这是 Oracle 默认的 `SCN` 跟踪级别。这意味着，对于给定数据块上的任何行进行的值更新，或插入该块的任何新行，都会将 `ORA_ROWSCN`\
    \ 值设置为相关事务的 `SCN`。因此，存储在给定数据块上的所有行似乎都是在同一时间更改的。您可以在示例结果中看到这一点，其中几行似乎都在 `12-SEP-09\
    \ 03.54.55.000000000 PM` 同时被更新。\n\nOracle 提供了一个名为 `ROWDEPENDENCIES` 的表选项，用于在行级启用\
    \ `SCN` 跟踪。此选项只能在创建表时选择——无法在表已存在后激活。启用 `ROWDEPENDENCIES` 后，Oracle 将为基于行的 `SCN`\
    \ 额外使用六字节的存储空间。我们可以通过基于 `HR.EMPLOYEES` 表的内容创建一个启用了 `ROWDEPENDENCIES` 的新表来调整它，然后使用我们方法中的\
    \ `SCN_TO_TIMESTAMP` 方法，来跟踪诸如薪水之类所需数据何时发生变化。\n\n## 6-5\\. 从有间隔的数据生成无间隔的时间序列\n\n\
    ### 问题\n\n您希望报告每月每日的业务活动，但只存储了发生诸如启动新促销活动等动作的日期数据。您希望生成该月所有日期的数据，填补记录中的间隔，并在没有记录数据的日期显示零活动。\n\
    \n### 解决方案\n\n使用 Oracle 的 `CONNECT BY LEVEL` 功能和一个 `OUTER JOIN`，将存在间隔的日期时间数据与一个代表您希望覆盖的所有日期和/或时间的引用表进行连接。\n\
    \n我们接下来展示的方法 SQL，使用这种方法来填补 `SH.PROMOTIONS` 表中 1998 年 6 月记录的促销活动间隔。\n\n```sql\n\
    select Day_Source.Day_Row Promotion_Date,\n       count(sh.promotions.promo_begin_date)\
    \ Promotions_Launched\nfrom\n  (select to_date('01-JUN-98') + rownum - 1 as Day_Row\n\
    \   from dual\n   connect by level <= 30) Day_Source\nleft outer join sh.promotions\n\
    \  on Day_Source.Day_Row = sh.promotions.promo_begin_date\ngroup by Day_Source.Day_Row\n\
    order by Day_Source.Day_Row;\n```\n\n尽管 1998 年 6 月有 14 天在 `SH.PROMOTIONS` 表中没有记录数据，但我们的方法可以报告该月每天的完整结果，在那些“缺失”的日期显示零个促销活动。\n\
    \n```\nPROMOTION_DATE PROMOTIONS_LAUNCHED\n-------------- -------------------\n\
    01-JUN-98      3\n02-JUN-98      6\n03-JUN-98      7\n04-JUN-98      0\n05-JUN-98\
    \      0\n06-JUN-98      1\n07-JUN-98      0\n08-JUN-98      0\n09-JUN-98    \
    \  0\n10-JUN-98      0\n```\n"
