- fmt: '# CHAPTER 16 ■ LOBS


    ## How It Works


    This anonymous procedure reads each row in the URL table, attempts to retrieve
    the contents of each URL, and writes a row to the new table. A status is recorded
    for the success or failure of each URL.


    The solution uses this list of URLs, and they are stored in the `IMG_LIST` table:

    `select img_url from img_list;`


    ```

    IMG_URL

    http://apress.com/img/masthead_logo.gif

    http://apress.com/img/dealofdaysanstimer_v2.gif

    http://apress.com/img/AlphaProgram_140.gif

    http://apress.com/img/mini_toe_logo.gif

    http://apress.com/img/banner/1515banner.gif

    5 rows selected

    ```


    Here is the SQL you use to create the image list, the destination image table,
    and the image table’s sequence generator:


    `create table img_list ( img_url varchar2(255) );`


    `create table web_img ( img_num number, img_url varchar2(255), img_blb blob, ins_ts
    timestamp );`


    `create sequence web_img_seq;`


    The cursor `IMG_LIST` retrieves each URL. For each URL, the procedure uses two
    built-in PL/SQL packages: `DBMS_LOB` and `UTL_HTTP`. Previous solutions in this
    chapter use `DBMS_LOB.LOADBLOBFROMFILE` to copy a binary object from a file system
    to a `BLOB` column in a database table. In contrast, we’re using `DBMS_LOB.WRITEAPPEND`
    to write the contents of the image in 32KB chunks after receiving each 32KB chunk
    from the call to `UTL_HTTP.READ_RAW`.


    The PL/SQL package `UTL_HTTP` is what you’d expect: sending HTTP requests to a
    web site and receiving HTTP replies. For each URL, here are the steps that the
    procedure performs:


    1.  Request the URL using `UTL_HTTP.BEGIN_REQUEST`.

    2.  Receive response from web site using `UTL_HTTP.GET_RESPONSE`.

    3.  If the response code is 200 (URL found), open the `BLOB` in the table, otherwise
    go back to step 1 with the next URL.

    4.  Read the contents of the URL in 32K chunks using `UTL_HTTP.READ_RAW` in a
    local PL/SQL block until you’ve reached the end of the URL and append each 32K
    chunk to the end of the destination `BLOB` using `DBMS_LOB.WRITE_APPEND`.

    5.  Close the destination `BLOB`.

    6.  Get the next URL in step 1; if there are no more, proceed to step 7.

    7.  Close the cursor, commit all transactions.


    The logging from running this procedure indicates that one of the URLs did not
    exist:


    ```

    *** Begin image load.

    Attempt retrieval of: http://apress.com/img/masthead_logo.gif

    HTTP stat code: 200

    HTTP resp reason phrase: OK

    Image URL loaded: 16 http://apress.com/img/masthead_logo.gif

    Attempt retrieval of: http://apress.com/img/dealofdaysanstimer_v2.gif

    HTTP stat code: 200

    HTTP resp reason phrase: OK

    Image URL loaded: 17 http://apress.com/img/dealofdaysanstimer_v2.gif

    Attempt retrieval of: http://apress.com/img/AlphaProgram_140.gif

    HTTP stat code: 200

    HTTP resp reason phrase: OK

    Image URL loaded: 18 http://apress.com/img/AlphaProgram_140.gif

    Attempt retrieval of: http://apress.com/img/mini_toe_logo.gif

    HTTP stat code: 404

    HTTP resp reason phrase: Not Found

    No Image at this URL

    Attempt retrieval of: http://apress.com/img/banner/1515banner.gif

    HTTP stat code: 200

    HTTP resp reason phrase: OK

    Image URL loaded: 20 http://apress.com/img/banner/1515banner.gif

    *** Done importing images.

    ```


    No doubt you have received a 404 error on many occasions while using your favorite
    web browser.


    After running the procedure, here are the contents of the `WEB_IMG` table:


    `select img_num, img_url, length(img_blb) from web_img order by img_num;`'
