    13-4\. Identifying Leaf Data in a Hierarchical Table


    Problem


    The management team wants a report that differentiates managers from non-managers,
    which means you need to differentiate leaf nodes from root and branch nodes in
    a hierarchical table.


    Solution


    Use the CONNECT_BY_ISLEAF pseudo-column to identify rows that are not parents
    of any other rows—in other words, to identify leaf nodes. Here’s an example showing
    how to do that: select


    lpad('' '',(level-1)*3) || last_name || '', '' || first_name full_name,


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13 ■ TREE-STRUCTURED DATA


    level, connect_by_isleaf is_leaf


    from employees


    start with manager_id is null


    connect by prior employee_id = manager_id


    ;


