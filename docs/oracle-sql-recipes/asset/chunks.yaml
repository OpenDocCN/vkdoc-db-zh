  trans: "\n你需要查看分配给某个用户的数据库系统权限。\n\n## 解决方案\n\n查询 `DBA_SYS_PRIVS` 视图，可以显示已授予不同用户的系统权限。\n\
    \n下面是一个简单的脚本，它会提示输入 `GRANTEE`：\n\n```sql\nselect\n    grantee\n    ,privilege\n\
    \    ,admin_option\nfrom dba_sys_privs\nwhere grantee = UPPER('&grantee')\norder\
    \ by privilege;\n```\n\n要查看授予当前连接用户的系统权限，请运行此查询：\n\n```sql\nselect username, privilege,\
    \ admin_option\nfrom user_sys_privs;\n```\n\n`USERNAME` 列将显示该权限是授予当前连接用户的，还是授予\
    \ `PUBLIC` 的。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 第 10\
    \ 章 ■ 数据字典\n\n## 原理\n\n`DBA_SYS_PRIVS` 视图显示授予数据库用户和角色的系统权限。系统权限允许你管理数据库的某些方面，例如创建表和视图。例如，一些常见的权限是\
    \ `CREATE TABLE` 和 `CREATE VIEW`。\n\n`ROLE_SYS_PRIVS` 视图显示已分配给某个角色的系统权限。查询此视图时，你只会看到授予当前连接用户的模式（schema）的角色：\n\
    \n```sql\nselect\n    role, privilege\nfrom role_sys_privs\nwhere role = upper('&role');\n\
    ```\n\n“解决方案”部分的 SQL 示例仅显示直接授予用户的数据库系统权限。要查看通过角色授予用户的任何系统权限，你必须额外查询 `ROLE_SYS_PRIVS`\
    \ 之类的视图。以下查询将显示直接授予当前连接用户或通过授予该用户的任何角色授予的系统权限：\n\n```sql\nselect\n    privilege\n\
    \    ,'直接授予'\nfrom user_sys_privs\nunion\nselect\n    privilege\n    ,'通过角色授予'\n\
    from role_sys_privs;\n```\n\n两个角色——`CONNECT` 和 `RESOURCE`——通常分配给新创建的账户。但是，Oracle\
    \ 建议不要将这些角色分配给用户，因为它们在未来版本中可能不可用。相反，Oracle 建议你创建自己的角色并根据需要分配权限。运行此查询以查看分配给这些角色的权限：\n\
    \n```sql\nselect grantee, privilege\nfrom dba_sys_privs\nwhere grantee IN ('CONNECT','RESOURCE')\n\
    order by grantee;\n```\n\n输出如下：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 第 10 章 ■ 数据字典\n\n**角色 权限**\n**------------------------- -------------------------**\n\
    **CONNECT CREATE SESSION**\n**RESOURCE CREATE CLUSTER**\n**RESOURCE CREATE INDEXTYPE**\n\
    **RESOURCE CREATE OPERATOR**\n**RESOURCE CREATE PROCEDURE**\n**RESOURCE CREATE\
    \ SEQUENCE**\n**RESOURCE CREATE TABLE**\n**RESOURCE CREATE TRIGGER**\n**RESOURCE\
    \ CREATE TYPE**\n\n有大量数据字典视图可用于确定哪些用户和角色被分配了哪些系统和对象权限。我们在本方案中仅触及了几个示例。有关各种权限相关数据字典视图的描述及其用途，请参见表\
    \ 10-3。\n\n**表 10-3. 权限相关的数据字典视图**\n\n| **视图名** | **描述** |\n| :--- | :--- |\n\
    | `DBA_ROLES` | 数据库中的所有角色。 |\n| `DBA_ROLE_PRIVS` | 授予用户和角色的角色。 |\n| `DBA_SYS_PRIVS`\
    \ | 授予用户和角色的所有系统权限。 |\n| `DBA_TAB_PRIVS` | 授予用户和角色的所有对象权限。 |\n| `DBA_COL_PRIVS`\
    \ | 所有列对象授权。 |\n| `ROLE_ROLE_PRIVS` | 授予其他角色的角色，仅限用户有权访问的角色。 |\n| `ROLE_SYS_PRIVS`\
    \ | 授予其他角色的权限，仅限用户有权访问的角色。 |\n| `ROLE_TAB_PRIVS` | 授予角色的表权限，仅限用户有权访问的角色。 |\n|\
    \ `ALL_TAB_PRIVS` | 用户是对象所有者、授权者或被授权者的对象授权；也包括`PUBLIC`是被授权者的对象授权。 |\n| `ALL_TAB_PRIVS_MADE`\
    \ | 用户是对象所有者或授权者的对象授权。 |\n| `ALL_TAB_PRIVS_RECD` | 用户是被授权者或`PUBLIC`是被授权者的对象授权。\
    \ |\n| `ALL_COL_PRIVS` | |\n"
