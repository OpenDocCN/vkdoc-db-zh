  raw: '■ **Tip** If you simply need to know whether a table is being inserted, updated,
    or deleted from, you can use the USER_TAB_MODIFICATIONS view to report on that
    type of activity. This view has columns such as INSERTS, UPDATES, DELETES, and
    TRUNCATED that will provide information as to how data in the table is being modified.


    20-10\. Auditing at a Granular Level


    Problem


    You have some sensitive data regarding employee salaries. You want to audit any
    type of access to a particular column in a table. You need to audit at a more
    granular level than is available with standard auditing.


    Solution


    Use Oracle fine-grained auditing (FGA) to monitor any user selecting from a particular
    column. Follow the next several steps to implement FGA:


    ■ **Note** The fine-grained auditing feature requires the Enterprise Edition of
    Oracle.


    1.


    Create a policy using the DBMS_FGA package. This example creates a policy for
    the INV table and specifies that any INSERT, UPDATE, DELETE, or SELECT statement
    against the SALARY column of the EMP table will be recorded in the audit trail:
    begin


    dbms_fga.add_policy (


    object_schema => ''INV'',


    object_name => ''EMP'',


    audit_column=> ''SALARY'',


    policy_name => ''S1_AUDIT'',


    statement_types => ''INSERT, UPDATE, DELETE, SELECT'',


    audit_trail => DBMS_FGA.DB_EXTENDED


    );


    end;


    /


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    2.


    Verify that the policy exists by querying the DBA_AUDIT_POLICIES view: select
    object_schema


    ,object_name


    ,policy_name


    ,sel, ins, upd, del, policy_column


    from dba_audit_policies;


    Here’s the output for this example:


    OBJECT_SCHEMA OBJECT_NAME POLICY_NAME SEL INS UPD DEL POLICY_COL


    -------------- -------------- -------------- ----- ----- ----- ----- ----------


    INV EMP S1_AUDIT YES YES YES YES SALARY


    3.


    To view the recorded SQL statements in the FGA audit trail, select from the DBA_FGA_AUDIT_TRAIL
    view:


    select


    db_user


    ,to_char(timestamp,''dd-mon-yy hh24:mi:ss'') ts


    ,sql_text


    from dba_fga_audit_trail


    order by timestamp;


    ■ **Note** The DBA_FGA_AUDIT_TRAIL view is based on the FGA_LOG$ table.


    Here’s some sample output:


    DB_USER TS SQL_TEXT


    --------------- ------------------------ --------------------------


    INV 21-jul-09 21:47:07 select * from emp


    SYSTEM 21-jul-09 21:58:36 select salary from inv.emp


    If you need to disable a policy, use the DISABLE_POLICY procedure:


    SQL> exec dbms_fga.disable_policy(''INV'',''EMP'',''S1_AUDIT'');


    To drop a policy, use the DROP_POLICY procedure:


    SQL> exec dbms_fga.drop_policy(''INV'',''EMP'',''S1_AUDIT'');


    As the SYS schema you can purge records from the fine-grained auditing audit table
    as follows: truncate table fga_log$;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    How It Works


    Fine-grained auditing allows you to audit SQL at a more granular level than simple
    INSERT, UPDATE, DELETE, and SELECT operations. FGA auditing allows you to audit
    for SQL activities that occur at the column level. FGA auditing also allows you
    to perform a Boolean check on an operation, such as “if the value selected is
    in a range then audit the activity”.


    You manage fine-grained auditing through the use of FGA policies. The DBMS_FGA
    package allows you to add, disable, enable, and drop FGA policies. You need execute
    privilege on the DBMS_FGA package to administer audit policies.


    ■ **Tip** For more details on fine-grained auditing, see Oracle’s Security Guide
    available from the otn.oracle.com web site.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


