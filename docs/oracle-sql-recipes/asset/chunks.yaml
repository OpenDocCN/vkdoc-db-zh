    \ need to be treated as new data to be inserted.\n\nThe matched and not-matched\
    \ clauses can also include further filtering criteria, and even criteria that\
    \ when satisfied result in rows being deleted.\n\n```sql\nmerge into hr.countries\
    \ c\nusing\n    (select country_id, country_name, region_id\n     from hr.new_countries)\
    \ nc\non (c.country_id = nc.country_id)\nwhen matched then\n    update set c.country_name\
    \ = nc.country_name,\n               c.region_id    = nc.region_id\n    delete\
    \ where nc.region_id = 4\nwhen not matched then\n    insert (c.country_id, c.country_name,\
    \ c.region_id)\n    values (nc.country_id, nc.country_name, nc.region_id)\n  \
    \  where (nc.region_id != 4);\n```\n\nIn this modified version of the recipe,\
    \ matched rows will have their `COUNTRY_NAME` updated unless the `REGION_ID` of\
    \ the new data is equal to `4`, in which case the row in `HR.COUNTRIES` will ultimately\
    \ be deleted.\n\nUnmatched rows will be inserted into `HR.EMPLOYEES` unless their\
    \ `REGION_ID` is `4`, in which case they will be ignored.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA\n\nIn this chapter we’ll introduce\
    \ recipes for working with your data at a higher level, where grouping, summaries,\
    \ and the bigger picture are important. Many of the recipes we’ll explore cover\
    \ common or tricky reporting scenarios, the kind you encounter in a business or\
    \ professional setting. Most organizations ask for reports about who sold what\
    \ to whom, how many people, sales, or activities happened in a given time frame,\
    \ trends across regions or customer groups, and the like.\n\nMany people are familiar\
    \ with some of the basic methods Oracle provides for performing summaries and\
    \ aggregates. But often developers and DBAs will try to execute more complex calculations\
    \ in their applications—and tie themselves in knots. You can spot this in your\
    \ own work if you see any combination of duplicating database capabilities in\
    \ code, shuffling temporary data and results around needlessly, and similar less-than-efficient\
    \ tasks.\n\nOracle is exploding with this kind of functionality now, especially\
    \ with the introduction of On-Line Analytical Processing capabilities (`OLAP`)\
    \ over the last few major versions. After you’ve explored these recipes for summarizing\
    \ and aggregating data, you’ll realize that Oracle is the number one tool at your\
    \ disposal to satisfy a huge range of reporting and other requirements.\n\n##\
    \ 2-1\\. Summarizing the Values in a Column\n\n**Problem**\n\nYou need to summarize\
    \ data in a column in some way. For example, you have been asked to report on\
    \ the average salary paid per employee, as well as the total salary budget, number\
    \ of employees, highest and lowest earners, and more.\n\n**Solution**\n\nYou don’t\
    \ need to calculate a total and count the number of employees separately to determine\
    \ the average salary. The `AVG` function calculates average salary for you, as\
    \ shown in the next `SELECT` statement.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n```sql\nselect avg(salary)\nfrom hr.employees;\n\nAVG(SALARY)\n-----------\n\
    6473.36449\n```\n\nNote there is no `WHERE` clause in our recipe, meaning all\
    \ rows in the `HR.EMPLOYEES` table are assessed to calculate the overall average\
    \ for the table’s rows.\n\nFunctions such as `AVG` are termed `aggregate functions`,\
    \ and there are many such functions at your disposal. For example, to calculate\
    \ the total salary paid, use the `SUM` function, as shown here:\n\n```sql\nselect\
    \ sum(salary)\nfrom hr.employees;\n\nSUM(SALARY)\n-----------\n666666\n```\n\n\
    To tally the number of people receiving a salary, you can simply count the number\
    \ of rows in the table using the `COUNT` function.\n\n```sql\nSelect count(salary)\n\
    From hr.employees;\n\nCOUNT(SALARY)\n-------------\n107\n```\n\nMaximum and minimum\
    \ values can be calculated using the `MAX` and `MIN` functions. By now you’re\
    \ probably thinking Oracle uses very simple abbreviated names for the statistical\
    \ functions, and by and large you are right. The `MAX` and `MIN` functions are\
    \ shown next.\n\n```sql\nselect min(salary), max(salary)\nfrom hr.employees;\n\
    \nMIN(SALARY) MAX(SALARY)\n----------- -----------\n2100        24000\n```\n\n\
    **How It Works**\n\nOracle has numerous built-in statistical and analytic functions\
    \ for performing common summarizing tasks, such as average, total, and minimum\
    \ and maximum value. There’s no need for you to manually perform the intermediate\
    \ calculations, though you can do so if you want to confirm Oracle’s arithmetic.\n\
    \nThe following statement compares Oracle’s average calculation for salary with\
    \ our own explicit total divided by the number of employees.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n```sql\nselect avg(salary), sum(salary)/count(salary)\nfrom hr.employees;\n\n\
    AVG(SALARY) SUM(SALARY)/COUNT(SALARY)\n----------- -------------------------\n\
    6473.36449  6473.36449\n```\n\nIt’s pleasing to know Oracle gets this right. To\
    \ complete the picture on Oracle’s aggregation capabilities, we need to consider\
    \ what happens when our data includes `NULL` data. Our current recipe aggregates\
    \ employee’s salaries, and it so happens that every employee has a salary. But\
    \ only sales people have a commission for their sales efforts, reflected in the\
    \ `HR.EMPLOYEES` table by a value in the `COMMISSION_PCT`. Non-sales staff have\
    \ no commission, reflected by a `NULL` value in `COMMISSION_PCT`. So what happens\
    \ when we try to average or count the `COMMISSION_PCT` values? The next `SQL`\
    \ statement shows both of these aggregates.\n\n```sql\nselect count(commission_pct),\
    \ avg(commission_pct)\nfrom hr.employees;\n\nCOUNT(COMMISSION_PCT) AVG(COMMISSION_PCT)\n\
    --------------------- -------------------\n38                    .225\n```\n\n\
    Even though we saw 107 employees with a salary, the `COUNT` function has ignored\
    \ all `NULL` values for `COMMISSION_PCT`, tallying only the 38 employees with\
    \ a commission. Equally, when calculating the average for the employees’ commissions,\
    \ Oracle has again only considered those rows with a real value, ignoring the\
    \ `NULL` entries.\n\nThere are only two special cases where Oracle considers `NULL`\
    \ values in aggregate functions. The first is the `GROUPING` function, used to\
    \ test if the results of an analytic function that includes `NULL` values generated\
    \ those values directly from rows in the underlying table or as a final aggregate\
    \ “`NULL` set” from the analytic calculation. The second special case is the `COUNT(*)`\
    \ function. Because the asterisk implies all columns within the table, Oracle\
    \ handles the counting of rows independently of any of the actual data values,\
    \ treating `NULL` and normal values alike in this case.\n\nTo illustrate, the\
    \ next `SQL` statement shows the difference between `COUNT(*)` and `COUNT(COMMISSION_PCT)`\
    \ side by side.\n\n```sql\nselect count(*), count(commission_pct)\nfrom hr.employees;\n\
    \nCOUNT(*) COUNT(COMMISSION_PCT)\n-------- ---------------------\n107      38\n\
    ```\n\nOur use of `COUNT(*)` tallies all rows in the table, whereas `COUNT(COMMISSION_PCT)`\
    \ counts only the non-`NULL` values for `COMMISSION_PCT`.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 2-2\\. Summarizing Data for Different Groups\n\n**Problem**\n\nYou want to\
    \ summarize data in a column, but you don’t want to summarize over all the rows\
    \ in a table.\n\nYou want to divide the rows into groups, and then summarize the\
    \ column separately for each group. For example, you need to know the average\
    \ salary paid per department.\n\n**Solution**\n\nUse `SQL`’s `GROUP BY` feature\
    \ to group common subsets of data together to apply functions like `COUNT`, `MIN`,\
    \ `MAX`, `SUM`, and `AVG`. This `SQL` statement shows how to use an aggregate\
    \ function on subgroups of your data with `GROUP BY`.\n\n```sql\nselect department_id,\
    \ avg(salary)\nfrom hr.employees\ngroup by department_id;\n```\n\nHere are the\
    \ results showing averages by `DEPARTMENT_ID`.\n\n```\nDEPARTMENT_ID AVG(SALARY)\n\
    ------------- -----------\n100           8600\n30            4150\n20        \
    \    9500\n70            10000\n90            19333.3333\n110           10150\n\
    50            3503.33333\n40            6500\n80            8955.88235\n10   \
    \         4400\n60            5760\n\n12 rows selected.\n```\n\nNote that the\
    \ third result row indicates a null `DEPARTMENT_ID`.\n\n**How It Works**"
