    | H: 150,000 - 169,999       | 87.9378656| 75.5795925| -1.0492257 | .294347158        |

    | I: 170,000 - 189,999       | 61.99     | 106.499274| .980448064 | .422460165        |

    | J: 190,000 - 249,999       | 17.99     | 104.578557| 6.66684928 | .008117071        |

