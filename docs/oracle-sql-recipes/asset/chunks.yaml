    \ will have a lot more rows than you expected! This is much like adding extra\
    \ columns to a `GROUP BY` clause in a regular `SELECT` statement with aggregates,\
    \ typically increasing the number of rows in the result.\n\nThe `PIVOT` clause\
    \ itself generates the additional columns in the query results. Here is the first\
    \ part of the `PIVOT` clause in the solution:\n\n`sum(quantity) as sum_qty`\n\n\
    You specify one or more aggregates that you want to appear in the new columns\
    \ and assign a label suffix that Oracle will use for each new column. (We’ll show\
    \ you how to pivot on more than one column or aggregate more than one column later\
    \ in this section.) In this case, all of the derived columns will end in `SUM_QTY`.\n\
    \nThe column or columns in the `FOR` clause filter the rows that are used to aggregate\
    \ the results. Each value of the column in the `FOR` clause, or each specified\
    \ combination of two or more columns, will produce an additional derived column\
    \ in the results. The `FOR` clause in the solution is as follows: `for (product_id)\
    \ in (3170 as P3170, 3176 as P3176, 3182 as P3182, 3163 as P3163, 3165 as P3165)`\n\
    \nThe query will only use rows whose `PRODUCT_ID` is in the list, and thus acts\
    \ like a `WHERE` clause to filter the results before aggregation. The text string\
    \ specified after each pivoted value is used as the prefix for the new column\
    \ name, as you can see in the solution query’s results.\n\nFinally, the `ORDER\
    \ BY` clause does the same thing as it would in any other query—order the final\
    \ result set by the columns specified.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n#### Problem\n\nYou have implemented the solution shown in the previous recipe.\
