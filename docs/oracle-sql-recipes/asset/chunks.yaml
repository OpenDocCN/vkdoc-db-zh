    \       43         185      7955\n2422     9            3167       54        \
    \ 39       2106\n\n665 rows selected\n```\n\n## How It Works\n\n在 `SELECT` 语句（或任何\
    \ DML 语句，如 `INSERT`、`UPDATE` 或 `DELETE`）中，你可以在语句中任何列上引用任何 Oracle 内置函数（或你自己的函数）。你也可以包含聚合函数，如\
    \ `SUM()` 和 `AVG()`，只要你在 `GROUP BY` 子句中包含非聚合列。\n\n你还可以在 `SELECT` 语句中嵌套函数。`LINE_TOTAL_PRICE`\
    \ 列包含了期望的结果，但未格式化得适合向客服代表或客户显示。为了提高输出的可读性，向查询中已有的计算添加 `TO_CHAR` 函数，如下所示：\n\n```\n\
    select order_id, line_item_id, product_id,\n       unit_price, quantity,\n   \
    \    to_char(unit_price*quantity,'$9,999,999.99') line_total_price\nfrom order_items;\n\
    \nORDER_ID LINE_ITEM_ID PRODUCT_ID UNIT_PRICE QUANTITY LINE_TOTAL_PRICE\n---------\
    \ ------------ ---------- ---------- -------- ----------------\n2423     7   \
    \         3290       65         33       $2,145.00\n2426     5            3252\
    \       25         29       $725.00\n2427     7            2522       40     \
    \    22       $880.00\n2428     11           3173       86         28       $2,408.00\n\
    2429     10           3165       36         67       $2,412.00\n. . .\n2418  \
    \   6            3150       17         37       $629.00\n2419     9          \
    \  3167       54         81       $4,374.00\n2420     10           3171      \
