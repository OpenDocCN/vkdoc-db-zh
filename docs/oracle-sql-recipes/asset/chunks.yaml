    COMMISSION_PCT MANAGER_ID DEPARTMENT_ID


    ----------- ---------- --------- -------- ------------ ---------- --------- ------


    -------------- ---------- -------------


    198 Donald OConnell DOCONNEL 650.507.9833 21-JUN-99 SH_CLERK 2600


    124 50


    199 Douglas Grant DGRANT 650.507.9844 13-JAN-00 SH_CLERK 2600


    124 50


    123 Shanta Vollman SVOLLMAN 650.123.4234 10-OCT-97 ST_MAN 6500


    100 50


    How It Works


    In SQL, the * is a shortcut that stands for all of the column names in a table.
    When Oracle’s parser sees SELECT * as part of a query, the parser replaces the
    * with a list of all the possible column names, except those that have been marked
    hidden. Writing SELECT * is a quick way to build ad-hoc queries, because you avoid
    having to look up and type out all the correct column names.


    Before you succumb to the temptation to use the asterisk for all your queries,
    it''s important to remember that good design usually means explicitly naming only
    those columns in which you are interested. This results in better performance,
    as Oracle otherwise must read the system catalog to determine the fields to include
    in the query. Specifying explicit columns also protects you from problems in the
    future where columns may be added to a table. If you write code expecting the
    implicit order from using the asterisk, you could be in for a nasty surprise when
    that order changes unexpectedly, such as when a table is dropped and re-created
    in a different way, or a new column is added to a table.


    For the most part, the asterisk is best reserved for interactive querying, and
    ad-hoc analysis.


    1-3\. Sorting Your Results


    Problem


    Users want to see data from a query sorted in a particular way. For example, they
    would like to see employees sorted alphabetically by surname, and then first name.


    Solution


    Oracle uses the standard ORDER BY clause to allow you to sort the results of your
    queries.


    select employee_id, first_name, last_name, hire_date, salary


    from hr.employees


    where salary > 5000


    order by last_name, first_name;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ THE BASICS


    The results are as follows.


    EMPLOYEE_ID FIRST_NAME LAST_NAME HIRE_DATE SALARY


    ----------- ---------- --------- --------- ------


    174 Ellen Abel 11/MAY/96 11000


    166 Sundar Ande 24/MAR/00 6400


    204 Hermann Baer 07/JUN/94 10000


    167 Amit Banda 21/APR/00 6200


    172 Elizabeth Bates 24/MAR/99 7300


    151 David Bernstein 24/MAR/97 9500


    169 Harrison Bloom 23/MAR/98 10000


    148 Gerald Cambrault 15/OCT/99 11000


    154 Nanette Cambrault 09/DEC/98 7500


    110 John Chen 28/SEP/97 8200


    …


    How It Works


    The ORDER BY clause in this solution instructs Oracle to sort by the LAST_NAME
    column, and where values for LAST_NAME match, to then sort by the FIRST_NAME column.
    Oracle implicitly uses ascending ordering unless instructed otherwise, so numbers
    sort from zero to nine, letters from A to Z, and so on. You can explicitly control
    sorting direction with the ASC and DESC options for ascending and descending sorting.


    Here is an example:


    select employee_id, first_name, last_name, hire_date, salary


    from hr.employees


    where salary > 5000


    order by salary desc;


    Our explicit descending sort on salary has these results:


    EMPLOYEE_ID FIRST_NAME LAST_NAME HIRE_DATE SALARY


    ----------- ---------- --------- --------- ------


    100 Steven King 17-JUN-87 24000


    102 Lex De Haan 13-JAN-93 17000


    101 Neena Kochhar 21-SEP-89 17000


    145 John Russell 01-OCT-96 14000


    146 Karen Partners 05-JAN-97 13500


    …


    1-4\. Adding Rows to a Table


    Problem


    You need to add new rows of data to a table. For example, a new employee joins
    the company, requiring his data to be added to the HR.EMPLOYEES table.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ THE BASICS


    Solution


    Use the INSERT statement to add new rows to a table. To add a new row to a table,
    provide values for all mandatory columns, as well as any values for optional columns.
    Here’s a statement to add a new employee:


    insert into hr.employees


    (employee_id, first_name, last_name, email, phone_number, hire_date, job_id, salary,
    commission_pct, manager_id, department_id)


    values


    (207, ''John '', ''Doe '', ''JDOE '', ''650.555.8877 '', ''25-MAR-2009 '', ''SA_REP
    '', 3500, 0.25, 145, 80);


    How It Works


    The INSERT statement associates a list of values with a list of columns. It creates
    a row based upon that association, and inserts that row into the target table.


    Oracle will check NULL constraints, as well as primary keys, foreign keys, and
    other defined constraints to ensure the integrity of your inserted data. See Chapter
    10 for recipes on determining the state of constraints on your tables, and how
    they might affect inserting new data.


    You can check which fields are mandatory, defined as not null, by examining the
    description of the table. You can do this from SQL Developer or SQL*Plus by issuing
    the DESCRIBE command, which you can abbreviate to DESC. For example:


    desc hr.employees;


    Name Null Type


    ------------------------------ -------- ------------


    EMPLOYEE_ID NOT NULL NUMBER(6)


    FIRST_NAME VARCHAR2(20)


    LAST_NAME NOT NULL VARCHAR2(25)


    EMAIL NOT NULL VARCHAR2(25)


    PHONE_NUMBER VARCHAR2(20)


    HIRE_DATE NOT NULL DATE


    JOB_ID NOT NULL VARCHAR2(10)


    SALARY NUMBER(8,2)


    COMMISSION_PCT NUMBER(2,2)


    MANAGER_ID NUMBER(6)


    DEPARTMENT_ID NUMBER(4)


    11 rows selected


    You can write a shorter INSERT statement by not enumerating the list of column
    names, and providing data for *every* column in the right order for the current
    table definition. Here’s an example: insert into hr.employees


    values


    (208, ''Jane '', ''Doe '', ''JADOE '', ''650.555.8866 '', ''25-MAR-2009 '', ''SA_REP
    '', 3500, 0.25, 145, 80)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ THE BASICS


    ■ **Caution** It is rarely, if ever, a good idea to omit the list of column names—and
    this is for some quite serious reasons. You have no idea what changes might be
    made to the table in future, and you make your SQL brittle to future schema changes
    by assuming an implicit column order. Perhaps the best example of what can go
    wrong is silent logical corruption. If someone rebuilds the underlying table with
    a different column order, but your INSERT


    statement passes data type and other checks, you could find yourself silently
    inserting data into the wrong columns, with disastrous consequences. Our strong
    recommendation is to always enumerate the columns in your INSERT statement.


    1-5\. Copying Rows from One Table to Another


    Problem


    You want to copy information from one table to another.


    Solution


    Use the INSERT statement with the SELECT option to copy data from one table to
    another. Suppose you have a table of candidates applying for jobs at your company,
    with many of the same details as the HR.EMPLOYEES table. This INSERT statement
    will insert into the HR.EMPLOYEES table based on a SELECT


    statement on the CANDIDATES table.


    insert into hr.employees


    (employee_id, first_name, last_name, email, phone_number, hire_date, job_id, salary,
    commission_pct, manager_id, department_id)


    select 210, first_name, last_name, email, phone_number, sysdate, ''IT_PROG'',
    3500, NULL, 103, 60


    from hr.candidates


    where first_name = ''Susan''


    and last_name = ''Jones'';


    How It Works


    This recipe seeds the values to be inserted into the HR.EMPLOYEES table with the
    results of a SELECT on a CANDIDATES table. The SELECT statement can be run by
    itself to see the data passed to the INSERT


    statement.


    select 210, first_name, last_name, email, phone_number, sysdate, job_id, 3500,
    NULL,


    ''IT_PROG'', 103


    from hr.candidates


    where first_name = ''Susan''


    and last_name = ''Jones'';


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ THE BASICS


    210 FIRST_NAME LAST_NAME EMAIL PHONE_NUMBER SYSDATE ''IT_PRO 3500 N 103 60


    --- ---------- --------- ------ ------------ --------- ------- ---- - --- --


    210 Susan Jones SJONES 650.555.9876 30-MAR-09 IT_PROG 3500 103 60'
