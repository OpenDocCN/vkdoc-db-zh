    TOTAL ,NVL(SUM(CASE WHEN F.D_DATE_ID > TO_NUMBER(TO_CHAR(SYSDATE-30,''YYYYMMDD''))
    THEN 1 END), 0) RECENT ,NVL(D.BLACKLIST_FLG,0) BLACKLIST_FLG FROM F_DOWNLOADS
    F


    ,D_DOMAINS D ,D_PRODUCTS P ,PID_DF_ASSOC PDA ,( SELECT * FROM ( SELECT CLUSTER_


    As of Oracle Database 10 *g*, Oracle will automatically take a snapshot of your
    database once an hour and populate the underlying AWR tables that store the statistics.
    By default, seven days of statistics are retained.


    You can also generate an AWR report for a specific SQL statement by running the
    awrsqrpt.sql report. When you run the following script, you will be prompted for
    the SQL_ID of the query of interest: SQL> @?/rdbms/admin/awrsqrpt.sql


    Using ADDM


    The ADDM report provides useful suggestions on which SQL statements are candidates
    for tuning. Use the following SQL script to generate an ADDM report:


    SQL> @?/rdbms/admin/addmrpt


    Look for the section of the report labeled “SQL statements consuming significant
    database time.”


    Here is some sample output:


    FINDING 2: 29% impact (65043 seconds)


    SQL statements consuming significant database time were found.


    RECOMMENDATION 1: SQL Tuning, 6.7% benefit (14843 seconds)


    ACTION: Investigate the SQL statement with SQL_ID "46cc3t7ym5sx0" for possible
    performance improvements.


    RELEVANT OBJECT: SQL statement with SQL_ID 46cc3t7ym5sx0 and


    PLAN_HASH 1234997150


    MERGE INTO d_files a


    USING


    ( SELECT


    The ADDM report analyzes data in the AWR tables to identify potential bottlenecks
    and high resource-consuming SQL queries.


    Using ASH


    The ASH report allows you to focus on short-lived SQL statements that have been
    recently run and may have only executed for a brief amount of time. Use the following
    script to generate an ASH report: SQL> @?/rdbms/admin/ashrpt


    Search the output for the section labeled “Top SQL”. Here is some sample output:
    466


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    Sampled #


    SQL ID Planhash of Executions % Activity


    ----------------------- -------------------- -------------------- --------------


    Event % Event Top Row Source % RwSrc


    ------------------------------ ------- --------------------------------- -------


    4k8runghhh31d 3219321046 12 51.61


    CPU + Wait for CPU 51.61 HASH JOIN 12.26


    select countryimp0_.COUNTRY_ID as COUNTRY_ID, countryimp0_.COUNTRY_NAME


    The previous output indicates that the query is waiting for CPU resources. In
    this scenario, it may actually be another query that is consuming the CPU resources
    that is the problem.


    When is the ASH report more useful than the AWR or ADDM reports? The AWR and ADDM
    output shows top-consuming SQL in terms of total database time. If the SQL performance
    problem is transient and short-lived, it may not appear on the AWR and ADDM reports.
    In these situations an ASH report is more useful.


    ■ **Note** You can also run the AWR, ADDM, and ASH reports from Enterprise Manager,
    which you may find more intuitive than manually running the scripts from SQL*Plus.


    Using Statspack'
