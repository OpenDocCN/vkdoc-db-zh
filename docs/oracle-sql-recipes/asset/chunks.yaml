    Unfortunately, the direct marketing application needs the e-mail address list
    in a more normalized format as follows:


    REQUEST_ACCOUNT | REQUEST_DATE | EMAIL_ADDRESS


    To generate the e-mail list in the format that the direct marketing group needs,
    you can use the UNPIVOT command like so:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4 ■ CREATING AND DERIVING DATA


    select user_account, signup_date, src_col_name, friend_email


    from email_signup


    unpivot (


    (friend_email) for src_col_name


    in (user_email, friend1_email, friend2_email, friend3_email)


    )


    ;


    USER_ACCOUNT SIGNUP_DATE SRC_COL_NAME FRIEND_EMAIL


    ------------ ------------ ---------------- -------------------------


    rjbryla 21-AUG-09 USER_EMAIL rjbryla@example.com


    rjbryla 21-AUG-09 FRIEND1_EMAIL rjbdba@example.com


    rjbryla 21-AUG-09 FRIEND2_EMAIL pensivepenman@example.com


    rjbryla 21-AUG-09 FRIEND3_EMAIL unclebob@example.com


    johndoe 22-AUG-09 USER_EMAIL janedoe@example.com


    johndoe 22-AUG-09 FRIEND2_EMAIL dog@example.com


    6 rows selected.


    How It Works


    In contrast to the PIVOT operator, the UNPIVOT operator changes columns into multiple
    rows, although you can’t reverse engineer any aggregated column totals without
    the original data—and if you had the original data, you would not need to UNPIVOT!
    There are many uses for UNPIVOT, as in converting data in a denormalized table
    or spreadsheet to individual rows for each column or set of columns.


    The direct marketing department does not need the column SRC_COL_NAME, but it
    can come in handy when you want to find out which source column the e-mail address
    came from. You can also use UNPIVOT


    to create more than one destination column; for example, the web form may include
    a field for each friend’s name in addition to their e-mail address:


    select user_account, signup_date, src_col_names, friend_email, friend_name from
    email_signup


    unpivot (


    (friend_email,friend_name) for src_col_names


    in ((user_email,user_name),


    (friend1_email,friend1_name),


    (friend2_email,friend2_name),


    (friend3_email,friend3_name))


    )


    ;


    **Before Oracle Could PIVOT and UNPIVOT**


    Before Oracle Database 11 *g*, your options were somewhat limited and painful,
    as the PIVOT and UNPIVOT


    clauses did not exist! To perform a PIVOT query, you had to use a series of DECODE
    statements or make a very complicated foray into the MODEL analytical clause.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4 ■ CREATING AND DERIVING DATA


    Performing an UNPIVOT operation before Oracle Database 11 *g* was nearly as painful.
    Here is a pre-Oracle Database 11 *g* UNPIVOT operation on the e-mail address list
    processing table from the previous section: select user_account, signup_date,


    ''USER_EMAIL'' as src_col_name, user_email as friend_email


    from email_signup


    where user_email is not null


    union


    select user_account, signup_date, ''FRIEND1_EMAIL'', friend1_email


    from email_signup


    where friend1_email is not null


    union


    select user_account, signup_date, ''FRIEND2_EMAIL'', friend2_email


    from email_signup


    where friend2_email is not null


    union


    select user_account, signup_date, ''FRIEND3_EMAIL'', friend3_email


    from email_signup


    where friend3_email is not null


    ;


    The maintenance cost of this query is much higher and the execution time much
    longer due to the sorting and merging required with the series of UNION statements
    and multiple passes over the same table.


    4-6\. Concatenating Data for Readability


    Problem


    For reporting and readability purposes, you want to combine multiple columns into
    a single output column, eliminating extra blank space and adding punctuation where
    necessary.


    Solution'
