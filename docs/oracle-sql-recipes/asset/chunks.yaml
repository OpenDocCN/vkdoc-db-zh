  trans: "# 第 6 章 ■ 处理日期和时间值\n\n## 6-9. 确定某月的第一个日期或星期\n\n### 问题\n\n你需要在运行时动态地确定给定月份的第一天日期。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 解决方案\n\nOracle 的 `TRUNC`\
    \ 函数可用于日期，以执行周期开始计算，例如每月的第一天。\n\n```sql\nselect trunc(sysdate,'mm')\nfrom dual;\n\
    ```\n\n```\nTRUNC(SYS\n--------\n01-MAY-09\n```\n\n我们的示例编写于 5 月 21 日。可以使用任意的日期、日期时间或时间戳表达式。\n\
    \n### 工作原理\n\n乍一看，你可能认为确定某月的第一个日期并不难。它始终是第一天！但在实践中，当你对日期进行计算时，你希望能够动态地确定代表你所关注月份第一天的完整日期值。\n\
    \n面向日期的 `TRUNC` 函数接受任何日期、日期时间或时间戳值（在处理前会隐式转换为日期），以及一个日期格式字符串。日期格式字符串基于 Oracle\
    \ 中其他地方使用的相同日期格式代码，例如 `MM` 或 `MONTH` 表示月份，`YY` 或 `YYYY` 表示年份。本章前面的表 6-1 突出显示了一些常用的日期格式字符串选项。\n\
    \n你可以将此方法扩展为更通用的形式，以查找动态周、季度或 Oracle 具有格式化代码的任何其他时间段的第一个“日期”。只需将代码与日期一起传递给 `TRUNC`\
    \ 函数，它就会为你完成工作。下一条 SQL 语句采用我们的方法，仅将格式化选项更改为 `Q`（代表季度），以获取该季度的第一天。\n\n```sql\n\
    select trunc(sysdate,'q')\nfrom dual;\n```\n\n```\nTRUNC(SYS\n--------\n01-APR-09\n\
    ```\n\n## 6-10. 计算星期几\n\n### 问题\n\n你想确定星期几，并指示其被视为工作日还是周末日。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 解决方案\n\n使用 Oracle 的 `TO_CHAR` 函数和 `DAY` 格式代码来检索星期几的文本名称。\n\n要确定是工作日还是周末日，可使用带有\
    \ `D` 格式代码的 `TO_CHAR` 函数来检索星期编号（1 到 7），然后应用特定于地区的惯例来确定该日的状态。这是一个重要的考虑因素，因为工作周在世界各地差异很大。你的代码可能在沙特阿拉伯运行，那里的工作日通常是星期六到星期三；或者在中国不同地区，通常认为工作周是从星期一到星期六。\n\
    \n我们的方法在下面简洁的 SQL 语句中运用 `TO_CHAR` 来确定日期名称以及工作日/周末状态，从星期一至星期五作为工作周的基础。\n\n```sql\n\
    select to_char(sysdate,'Day') Day_Of_Week,\n       case\n         when to_char(sysdate,'D')\
    \ in (1,7) then 'Weekend'\n         else 'Weekday'\n       end Day_Type\nfrom\
    \ dual;\n```\n\n在星期一运行我们的方法，返回以下结果。\n\n```\nDAY_OF_WEEK             DAY_TYPE\n\
    ----------------------- --------\nMonday                  Weekday\n```\n\n相反，在星期六运行我们的方法，显示此输出。\n\
    \n```\nDAY_OF_WEEK             DAY_TYPE\n----------------------- --------\nSaturday\
    \                Weekend\n```\n\n### 工作原理\n\nOracle 本身在此方法中承担了几乎所有的繁重工作。我们将从 `SYSDATE`\
    \ 返回的当前日期传递给 `TO_CHAR` 函数时，利用了 `DAY` 格式选项。这会根据当前的区域设置自动返回日期的名称。我们通过提供别名 `DAY_OF_WEEK`\
    \ 使结果更易于阅读。\n\n请注意，`DAY` 格式化代码适用于任何提供的日期，而不仅仅是 `SYSDATE` 或 `CURRENT_DATE` 给出的日期。我们可以传递一个包含日期名称的文字日期字符串，并让\
    \ `DAY` 为我们提取它。\n\n我们也可以传递一个返回日期的计算或表达式。这符合我们在前面表 6-1 中看到的日期格式化代码的一般规则。\n\n确定该日是工作日还是周末日使用了一个可以调整以适应世界上任何地区的快捷方式。我们再次在日期上使用\
    \ `TO_CHAR` 函数，但这次使用格式化代码 `D` 返回星期编号，并用它来驱动 `CASE` 语句。\n\n`D` 日期格式默认为 1 代表星期日，2\
    \ 代表星期一，依此类推，直到 7 代表星期六。星期编号与名称之间的这种对应关系由你的区域设置决定，但我们使用的逻辑可以根据你所在的位置进行调整，以适应任何地点的运行。\n\
    \n我们查看星期编号是否在集合(1,7)中：即，星期编号是否等于 1 或 7。数字 1 和 7 分别对应星期日和星期六。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n```sql\nwhen to_char(sysdate,'D') in (1,7) then 'Weekend'\n```\n\n如果星期编号不是 1\
    \ 或 7，那么该日隐含是星期一到星期五，在西方世界大部分地区这被认为是工作周。我们给 `CASE` 语句的结果一个有用的列别名 `DAY_TYPE`，以完成逻辑。\n\
    \n**提示：** 如果你本地对周末或非工作日的定义与我们的示例不同，只需在 `CASE` 语句中更改相应的星期编号即可。\n\n## 6-11. 按时间段进行分组和聚合\n\
    \n### 问题\n\n你想按月份或年份对日期或日期时间数据进行分组。\n\n### 解决方案\n\nOracle 的分组功能支持使用任何确定性函数，包括用于日期的\
    \ `TO_CHAR` 函数。我们可以用它来提取我们感兴趣的聚合级别的日期信息，并让 `GROUP BY` 子句处理必要的分组。\n\n假设我们想报告公司按月统计的订单数量，以便我们可以看到全年中哪些月份是销售旺季，哪些是淡季，并可以运行一些促销活动来提振淡季。下一条\
    \ SQL 语句按月统计 `OE.ORDERS` 表中的订单数量。\n\n```sql\nselect to_char(order_date, 'MM')\
    \ Order_Month, count(*) Order_Count\nfrom oe.orders\ngroup by to_char(order_date,\
    \ 'MM')\norder by 1;\n```\n\n我们看到了订单量在一年各个月份中的波动，其中 4 月是一个明显的订单低谷月份。\n\n```\n\
    ORDER_MONTH ORDER_COUNT\n----------- -----------\n01          5\n02          9\n\
    03          11\n04          1\n05          10\n06          14\n07          14\n\
    08          5\n09          11\n10          5\n11          16\n12          4\n\
    ```\n\n### 工作原理\n\n`SELECT` 和 `GROUP BY` 子句都使用 `TO_CHAR` 函数来定位 `ORDER_DATE` 字段中所需的月份部分。`MM`\
    \ 代码提取日期的两位数字版本，我们选择它纯粹是为了使排序按时间月份顺序显示。\n\nOracle 使用这种分组来确定如何将不同的订单行（特别是计算出的月份值）捆绑在一起，以供\
    \ `COUNT` 函数使用。这遵循了第 2 章方法中强调的规则，以确保结果中所有非聚合值都包含在我们的 `GROUP BY` 子句中。\n\n我们可以对任何能使用\
    \ `TO_CHAR` 或其他函数处理日期得到的结果进行时间段分组。我们可以执行日期算术、时间戳到日期的转换或其他数据类型转换等等。对我们方法稍作修改，可以生成按年份级别聚合的订单数量。"
- fmt: "# 6-12. Finding the Difference Between Two Dates or Date Parts\n\n## Problem\n\
    You want to calculate the elapsed time between two dates or datetime values.\n\
    \n## Solution\nOracle supports intuitive date and datetime arithmetic using normal\
    \ operators like the addition and subtraction symbols. Subtracting two dates to\
    \ find the difference between them works, but produces results that aren’t necessarily\
    \ formatted for easy understanding. For instance, we can use the next SQL statement\
    \ to find the employment duration for employees in the `HR.EMPLOYEES` table, but\
    \ then have to wrestle with part-days represented as fractional numbers.\n\n```sql\n\
    select employee_id, first_name, last_name, sysdate - hire_date Length_of_employment\
    \ from hr.employees;\n```\n\n| EMPLOYEE_ID | FIRST_NAME | LAST_NAME | LENGTH_OF_EMPLOYMENT\
    \ |\n|-------------|------------|-----------|----------------------|\n| 198  \
    \       | Donald     | OConnell  | 3636.5341            |\n| 199         | Douglas\
    \    | Grant     | 3430.5341            |\n| 200         | Jennifer   | Whalen\
    \    | 7931.5341            |\n| 201         | Michael    | Hartstein | 4856.5341\
    \            |\n| 202         | Pat        | Fay       | 4309.5341           \
    \ |\n| …           |            |           |                      |\n\nIf you’re\
    \ calculating date and time differences, you usually want to be precise, down\
    \ to the second or even smaller time unit. If you’re calculating employee duration\
    \ for a human-readable report, you probably want values in years or years and\
    \ months. There’s little need to be accurate to the fraction of a second in this\
    \ kind of report. The next SQL statement achieves both precise seconds and human-readable\
    \ years and months as output.\n\n```sql\nselect employee_id, first_name, last_name,\n\
    \       (sysdate - hire_date)*86400 Emp_Length_Seconds,\n       extract(year from\
    \ (sysdate - hire_date) year to month) || ' years, ' ||\n       extract(month\
    \ from (sysdate - hire_date) year to month) || ' months. '\n       Emp_Length_Readable\n\
    from hr.employees;\n```\n\n| EMPLOYEE_ID | FIRST_NAME | LAST_NAME | EMP_LENGTH_SECONDS\
    \ | EMP_LENGTH_READABLE  |\n|-------------|------------|-----------|--------------------|----------------------|\n\
    | 198         | Donald     | OConnell  | 314198410          | 9 years, 11 months.\
    \  |\n| 199         | Douglas    | Grant     | 296400010          | 9 years, 5\
    \ months.   |\n| 200         | Jennifer   | Whalen    | 685286410          | 21\
    \ years, 9 months.  |\n| 201         | Michael    | Hartstein | 419606410    \
    \      | 13 years, 4 months.  |\n| 202         | Pat        | Fay       | 372345610\
    \          | 11 years, 10 months. |\n| …           |            |           |\
    \                    |                      |\n\n## How It Works\nIt’s unlikely\
    \ that if asked the question, “How long have you worked here?” you’d respond “3636.5341\
    \ days”. However, if you really do need that kind of value in days and fractions\
    \ of days, then the default subtraction arithmetic in our recipe’s first SQL statement\
    \ delivers. We select the employee’s ID, given name, and surname, and then perform\
    \ simple date arithmetic using this equation: `sysdate - hire_date`. We give this\
    \ a more readable alias, `LENGTH_OF_EMPLOYMENT`. Oracle performs its date difference\
    \ calculation internally and returns the result.\n\nIt’s far more likely you’ll\
    \ want either a precise figure that no one will see but will be fed into subsequent\
    \ processing or calculations, or a human-readable description of time elapsed\
    \ between two dates. We achieve the precise calculation of number of seconds of\
    \ employment by multiplying the elapsed time calculated in days by the number\
    \ of seconds in a day, `86400`.\n\n`(sysdate - hire_date)*86400`\n\nWhile we’ve\
    \ provided a meaningful name for the results shown, `EMP_LENGTH_SECONDS`, in all\
    \ likelihood you’d use this style of calculation unseen in other statements or\
    \ PL/SQL procedures and functions.\n\nThe second calculation performed to return\
    \ a more English-language style response is more elaborate and deserves a more\
    \ in-depth explanation.\n\n```sql\nextract(year from (sysdate - hire_date) year\
    \ to month) || ' years, ' ||\nextract(month from (sysdate - hire_date) year to\
    \ month) || ' months. '\nEmp_Length_Readable\n```\n\nIn this clause, we use the\
    \ `EXTRACT` function to first glean the number of years from our base calculation,\
    \ `SYSDATE - HIRE_DATE`. We use the `YEAR TO MONTH` interval datatype to accurately\
    \ cast our base arithmetic result into a form useful for extracting the number\
    \ of years elapsed. We perform the same calculation a second time, but in the\
    \ second instance we use `EXTRACT` to find the remaining month portion of the\
    \ interval elapsed between the two dates. Finally, we concatenate the calculated\
    \ year and month intervals with the words “years” and “months” using the `||`\
    \ concatenation operator, and give the whole result a meaningful alias, `EMP_LENGTH_READABLE`.\n\
    \n# 6-13. Determining the Dates of Easter for Any Year\n\n## Problem\nYou would\
    \ like to dynamically determine the dates of Easter for a given year.\n\n## Solution\n\
    Oracle doesn’t provide a single, elegant function to perform Easter calculations\
    \ for you. But Oracle does have robust date arithmetic functions that we can use\
    \ to build our own Easter calculator. This begs the question, how do we decide\
    \ the dates of Easter anyway?\n\nFor Easter under the Gregorian calendar, Easter\
    \ Sunday is the Sunday following the first full moon after Lent. Contemporary\
    \ algorithms translate this to the first Sunday after the first full moon on or\
    \ after March 21.\n\nThe next function returns the date of Easter Sunday for a\
    \ specified year.\n\n```sql\ncreate or replace function easter_sunday(given_year\
    \ number) return date as\n  golden_metonic number;\n  century number;\n  leap_year_fix\
    \ number;\n  lunar_sync number;\n  sunday_date number;\n  epact number;\n  day_of_month\
    \ number;\n  easter_offset number;\nbegin\n  golden_metonic := mod(given_year,19)\
    \ + 1;\n  century := (given_year / 100) + 1;\n  leap_year_fix := (3 * century\
    \ / 4) - 12;\n  lunar_sync := ((8 * century + 5)/25) - 5;\n  sunday_date := (5\
    \ * given_year / 4) - leap_year_fix - 3;\n  epact := mod((11 * golden_metonic\
    \ + 20 + lunar_sync - leap_year_fix),30);\n  if((epact = 25 and golden_metonic\
    \ < 11) or (epact = 24)) then\n    epact := epact + 1;\n  end if;\n  day_of_month\
    \ := 44 - epact;\n  if(day_of_month < 21) then\n    day_of_month := day_of_month\
    \ + 30;\n  end if;\n  easter_offset := (day_of_month + 7 - mod((sunday_date +\
    \ day_of_month),7)) - 1;\n  return to_date('01-MAR-' || to_char(given_year),'DD-MON-YYYY')\
    \ + easter_offset;\nend;\n/\n```\n\nWe could have coded this in pure SQL as one\
    \ rather large nested set of `IF` and `CASE` statements, but this function is\
    \ both easier to read and easier to use in practice. We can now find Easter for\
    \ any given year, such as 2000 shown in the next SQL statement.\n\n```sql\nselect\
    \ easter_sunday(2000)\nfrom dual;\n```\n\n| EASTER_SUNDAY |\n|---------------|\n\
    | 23-APR-00     |\n\nWe can also dynamically determine Easter Sunday for the current\
    \ year without needing to explicitly state the year. The next SQL statement illustrates\
    \ this in action.\n\n```sql\nselect easter_sunday(extract(year from (sysdate)))\n\
    from dual;\n```\n\n| EASTER_SUNDAY |\n|---------------|\n| 12-APR-09     |\n\n\
    ## How It Works\nRather than work from the notion of the first Sunday after the\
    \ full moon following March 21 to derive an algorithm from first principles, we’ll\
    \ turn to the doyen of computer algorithms, Donald Knuth. Knuth provides an excellent\
    \ algorithm in *The Art Of Computer Programming, Volume 1* (Addison-Wesley) to\
    \ determine the Sunday of Easter.\n\nKnuth’s algorithm takes a year, and calculates\
    \ a golden “metonic” cycle, the century, leap year offset, lunar synchronization,\
    \ and an “epact” value to then return the number of days after March 1 for Easter\
    \ Sunday. All other days of Easter can then be derived from this. In fact, other\
    \ dates such as Ash Wednesday, Palm Sunday, and more can then be calculated by\
    \ fixed offsets."
