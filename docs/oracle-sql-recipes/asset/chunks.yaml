    The `ANY` keyword is shorthand for `SELECT DISTINCT PRODUCT_ID FROM ORDER_ITEM_QUERY`.
    Instead of `ANY`, you can put in just about any SQL statement that returns values
    in the domain you’re pivoting on, as in this example where you only want to display
    results for products that are currently orderable:


    ```

    with order_item_query as

    (select customer_id, product_id, quantity

    from orders join order_items using(order_id))

    select * from order_item_query

    pivot xml (

    sum(quantity) as sum_qty

    for (product_id) in (select distinct product_id

    from product_information

    where product_status = ''orderable'' )

    )

    order by customer_id

    ;

    ```


