- fmt: '# CHAPTER 7 ■ STRINGS


    ## 正则表达式符号表


    | 符号 | 名称 | 说明 |

    | :--- | :--- | :--- |

    | `.` | 任意字符 | 匹配数据库字符集中的任意字符。 |

    | `+` | 一个或多个 | 匹配前一个字符或子表达式的一次或多次出现。 |

    | `?` | 零个或一个 | 匹配前一个字符或子表达式的零次或一次出现。 |

    | `*` | 零个或多个 | 匹配前一个子表达式的零次或多次出现。 |

    | `{m}` | 确切计数 | 精确匹配前一个子表达式的 *m* 次出现。 |

    | `{m,}` | 至少计数 | 匹配前一个子表达式的至少 *m* 次出现。 |

    | `{m,n}` | 区间计数 | 匹配前一个子表达式的至少 *m* 次但不超过 *n* 次出现。 |

    | `[…]` | 匹配字符 | 匹配列表中的任意单个字符，连字符 (`-`) 作为范围运算符。 |

    | `[^…]` | 非匹配字符 | 匹配不在列表中的任意单个字符，连字符 (`-`) 作为范围运算符。 |

    | `|` | 或 | 匹配多个备选项之一。 |

    | `\` | 转义 | 将指定字符视为字面量而非元字符。 |

    | `^` | 行首锚点 | 匹配字符串的开头。 |

    | `$` | 行尾锚点 | 匹配字符串的结尾。 |


    如果你想在模式中包含特殊字符之一，可以通过在它前面加上反斜杠 (`\`) 来*转义*它。要匹配反斜杠字符，可以指定两次 (`\\`)。为原本不需要转义的字符添加反斜杠会在正则表达式求值中提供替代含义。例如，`\d`
    匹配数字字符，`\D` 匹配非数字字符。


    Oracle 在字符串函数中的正则表达式支持完全符合 IEEE 可移植操作系统接口 (POSIX) 标准，并且 Oracle 对多语言数据的扩展支持超出了
    POSIX 标准。Oracle 还支持不与 POSIX 标准冲突的 PERL 正则表达式扩展，例如 `\s` 表示空白字符或 `??` 表示匹配前一个模式
    0 或 1 次。


    ## 正则表达式解析示例


    让我们逐一分解这个示例中的正则表达式。详尽的正则表达式综述超出了本书的范围，但我们将在其他示例中使用它们，因此理解正则表达式具体在做什么是很有用的：


    ```

    ^: Start the pattern match at the beginning of the target string.

    [A-D]: Match any single character in the range A-D.

    [[:alpha:] ]*: Match zero or more alphabetic characters or spaces.

    a[^a]+a: Match a single “a” character, one or more characters that is not “a”,
    then another “a” character.

    [[:alpha:] ]*: Match zero or more alphabetic characters or spaces.

    t: Match a single “t” character.

    $: Finish the pattern match at the end of the target string.

    ```


    如果我们在模式开头没有包含 `^`，就无法保证范围 A-D 中的第一个字符位于字符串的开头。类似地，在模式末尾的 “t” 之后使用 `$` 确保了你搜索的字符串末尾有一个
    “t”。


    将第一个字符匹配为 A-D 排除了列表中 Doran 之后的所有姓氏。匹配两个 “a” 字符且中间至少有一个非 “a” 字符，只留下了 Baida、Banda
    和两位 Cambrault 员工。用末尾的 “t” 固定模式排除了 Baida 和 Banda，只剩下两位 Cambrault 员工。


    ## REGEXP_INSTR 参数


    `REGEXP_INSTR` 在必需的 `source` 字符串和 `pattern` 参数之后，还有五个额外的可选参数：


    - `position`：在目标字符串中开始搜索的位置（默认为 1）。

    - `occurrence`：要查找的模式在目标字符串中的第几次出现（默认为第一次出现）。

    - `return_option`：0 = 返回模式出现的第一个字符的位置（默认）；1 = 返回模式出现之后的第一个字符的位置。

    - `match_parameter`：更改默认的匹配行为。

    - `subexpression`：当模式包含子表达式时，指定使用哪个子表达式。'
  raw: 'Matches any character in the database character set.


    +


    One or More


    Matches one or more occurrences of the previous


    character or subexpression.


    ?


    Zero or One


    Matches zero or one occurrence of the previous character


    or subexpression.


    *


    Zero or More


    Matches zero or more occurrences of the preceding


    subexpression.


    { *m*}


    Exact Count


    Matches exactly *m* occurrences of the preceding


    subexpression.


    { *m*,}


    At Least Count


    Matches at least *m* occurrences of the preceding


    subexpression.


    { *m,n*}


    Interval Count


    Matches at least *m* but not more than *n* occurrences of the preceding subexpression.


    […]


    Matching Character


    Matches any single character, with dash (-) as the range


    operator.


    [^…]


    Nonmatching Character


    Matches any single character not in the list, with dash (-)


    as the range operator.


    |


    Or


    Matches one of the alternatives.


    \


    Escape


    Treats specified character as a literal instead of a


    metacharacter.


    ^ Beginning


    of


    Line


    Matches the beginning of the string.


    Anchor


    $


    End of Line Anchor


    Matches the end of the string.


    If you want to include one of the special characters in your pattern, you can
    *escape* it by preceding it with a backslash (\). To match a backslash character,
    you can specify it twice (\\). Adding a backslash to a character that would otherwise
    not need escaping provides an alternate meaning in regular expression evaluation.
    For example, \d matches a digit character and \D matches a non-digit character.


    Oracle’s regular expression support in string functions fully complies with the
    IEEE Portable Operating System Interface (POSIX) standard, and Oracle extends
    this support for multilingual data beyond the POSIX standard. Oracle also supports
    PERL regular expression extensions that do not 176


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 7 ■ STRINGS


    conflict with the POSIX standard, such as \s for a whitespace character or ??
    to match the preceding pattern 0 or 1 time.


    Let’s break down the regular expression in this recipe piece by piece. An exhaustive
    review of regular expressions is beyond the scope of this book, but we will be
    using them in other examples, so it’s useful to understand just what the regular
    expression is doing:


    • **^: Start the pattern match at the beginning of the target string.**


    **• **[A-D]: Match any single character in the range A-D.**


    **• **[[:alpha:] ]*: Match zero or more alphabetic characters or spaces.**


    **• **a[^a]+a: Match a single “a” character, one or more characters that is not
    “a”, then another “a” character.**


    **• **[[:alpha:] ]*: Match zero or more alphabetic characters or spaces.**


    **• **t: Match a single “t” character.**


    **• **$: Finish the pattern match at the end of the target string.**


    **If we did not include the ^ at the beginning of the pattern, you could not guarantee
    that the first character in the range A-D would be found at the beginning of the
    string. Similarly, using $ at the end of the pattern right after the “t” ensures
    that there is a “t” at the end of the string you are searching.


    Matching for A-D as the first character eliminates all last names after Doran
    in the list. Matching two


    “a” characters with at least one non-“a” character in between eliminates all but
    Baida, Banda, and the two Cambrault employees. Anchoring the pattern with a “t”
    at the end eliminates Baida and Banda, leaving us with the two Cambrault employees.


    There are five additional parameters for REGEXP_INSTR after the required source
    string and pattern parameters, all optional:


    • **position**: Where to begin the search in the target string (default 1).


    • **occurrence**: Which occurrence of the pattern to find in the target string
    (default is first occurrence).


    • **return_option**: 0 = return position of first character in the pattern occurrence
    (default); 1 = return the position of the first character after the pattern occurrence.


    • **match_parameter**: Change the default matching behavior.


    • **subexpression**: Specify which subexpression to use when the pattern contains
    a subexpression.'
