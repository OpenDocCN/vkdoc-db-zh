    10-13\. Displaying Granted Roles


    Problem


    You want to display the roles that a user has been granted.


    Solution


    Use this query to view which roles are granted to the currently connected user:
    **select**


    **username, granted_role**


    **from user_role_privs;**


    This next query displays the roles that have been granted to a specific user:
    **select**


    **grantee**


