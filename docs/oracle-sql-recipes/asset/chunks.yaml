- fmt: '# 本书适合人群


    本书适用于所有使用 Oracle SQL 的人员，无论是数据库管理员、开发人员、报表编写者，甚至是最终用户。无论您当前编写和使用 SQL 的技能水平如何，《Oracle
    SQL Recipes》中都有一些适合您的解决方案。本书并非旨在教您 SQL，也不是作为 Oracle SQL 参考手册的替代品。相反，您将看到的是针对实际问题的优雅且有时很巧妙的解决方案，而这些方案通常不会在语言手册中介绍。


    # 本书结构


    我们将本书分为五个部分，每个部分涵盖为 Oracle 数据库编写 SQL 的一个广泛方面。


    **第 1 部分** 讲述 Oracle SQL 的基础知识以及 SQL 各个方面的基础内容。


    **第 2 部分** 介绍 Oracle 数据类型的复杂性，以及管理和操作不同形式数据的解决方案。


    **第 3 部分** 讨论如何将 Oracle 作为开发环境使用，并介绍了帮助开发人员和数据库管理员解决复杂 SQL 任务的解决方案。


    **第 4 部分** 是一个特殊主题的纲要，范围从 XML 到直接从数据库生成动态报表网页。


    **第 5 部分** 面向数据库管理员，展示了如何应用 SQL 解决管理员日常面临的许多问题和任务。


    xxiii


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 引言


    ## 选择工具


    我们在《Oracle SQL Recipes》中包含的所有解决方案都设计为无需借助特殊工具或应用程序即可工作。您应该能够通过 `SQL*Plus` 以即席方式选取一个解决方案并使用它，或者在调用
    `Oracle OCI` 或类似客户端库的应用程序代码中包含它。


    我们这些长期热心使用 `SQL*Plus` 的人都很欣赏它那种“复古”的格式化和美学处理方式——好吧，我们指的是带有 `Courier` 字体所能提供的所有美感的
    1980 年代风格的输出——但这有时会让解决方案，尤其是那些展示输出格式化技巧的解决方案，显得有些失色。多年来，Oracle 一直提供 `SQL Developer`，我们一直是它的热心用户。从
    Oracle Database 11g 开始，`SQL Developer` 已成为标准安装的一部分，因此您可能已经拥有它而不自知！我们很乐意您在处理这些解决方案时使用任何喜欢的工具，但如果您有任何疑虑，现在就开始使用
    `SQL Developer`，您会感到满意的。


    ## SQL 解决方案的示例数据


    在《Oracle SQL Recipes》中，我们将使用的许多示例都将利用 Oracle 作为每次安装的一部分提供的优秀示例模式——一直可以追溯到 Oracle
    Database 9i。古老的 `Scott` 模式已经不再使用，所以您可以忘记密码 `"tiger"`。取而代之的是以下六个模式，它们展示了 Oracle
    数据库的许多技术功能：


    - **`BI`**：商业智能模式是 Oracle Database 11g 的新特性，用于说明 Oracle 中日益增强的 BI 功能。该模式将吸引那些正在使用或考虑使用
    `OBIEE` 产品的用户。


    - **`HR`**：这是最基础的模式，模拟了非常常见的员工及其工作部门的概念。细心的读者会注意到，这其实就是旧的 `Scott` 模式演变而来的。


    - **`IX`**：信息交换模式展示了 Oracle 高级队列和 IPC 技术的能力。我们将在本书末尾探讨这一点。


    - **`OE`**：订单输入是另一个经典的示例模式，涉及销售、订单、订单项、客户等概念。任何处理过销售流程、零售系统或在线商务的人都会感到熟悉。Oracle
    已经增强了这个模式，以至于它还有自己的子模式，在线目录（`OC`），并且它们之间存在相当多的相互关系。


    - **`PM`**：在产品媒体模式中，Oracle 在多媒体对象操作方面的优势得到了突显。这包括用于大型对象操作的高级功能，我们将在第 16 章中探讨。'
  raw: 'This book is for everyone working with Oracle SQL, be they DBAs, developers,
    report writers, or even end users. No matter what level of expertise you currently
    possess for writing and using SQL, there are recipes within Oracle SQL Recipes
    that will appeal to you. This book is not designed to teach you SQL or to act
    as a facsimile of the Oracle SQL reference. Instead, what you’ll find are elegant
    and sometimes tricky solutions to real problems that you’ll never see presented
    in a language manual.


    How This Book Is Structured


    We’ve split the book into five parts, each covering one broad aspect of writing
    SQL for Oracle databases.


    **Part 1** deals with the fundamentals of SQL for Oracle and the basics of all
    facets of SQL.


    **Part 2** covers the intricacies of Oracle data types and recipes to manage and
    manipulate data in different forms.


    **Part 3** discusses working with Oracle as a development environment and introduces
    recipes to help the developer and DBA solve complex tasks in SQL.


    **Part 4** is a compendium of special topics and ranges from XML to generating
    dynamic reporting web pages straight from the database.


    **Part 5** is for database administrators and shows how SQL can be applied to
    many of the problems and tasks administrators face on a daily basis.


    xxiii


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ■ INTRODUCTION


    Choosing Tools


    All of the recipes we’ve included in Oracle SQL Recipes are designed to work without
    the aid of special tools or applications. You should be able to pick a recipe
    and use it in an ad-hoc fashion through SQL*Plus, or include it in your application
    code calling the Oracle OCI or similar client library.


    Those of us who’ve been avid users of SQL*Plus for some time appreciate that its
    “vintage” approach to formatting and aesthetics–OK, we mean 1980’s throw-back
    output with all the beauty the Courier font can offer–sometimes takes something
    away from the recipes, especially those that show off neat tricks with output
    formatting. For years, Oracle has made SQL Developer available and we’ve been
    keen users of it. SQL Developer is part of the standard install as of Oracle Database
    11g, so you may already have it without realizing! We’re happy for you to use
    any tool you like when working with these recipes, but if you are in any doubt,
    start using SQL Developer now, and you’ll be glad you did.


    Working With Example Data for SQL Recipes


    For many of the examples we''ll use in Oracle SQL Recipes, we''ll take advantage
    of the excellent sample schemata that Oracle provides as part of every installation–all
    the way back to Oracle Database 9i. Gone is the venerable Scott schema, so you
    can forget the password “tiger”. Taking the place of the Scott schema are the
    following six schemata that show off many of Oracle Database’s technical capabilities:
    **BI** The Business Intelligence schema is new to Oracle Database 11g and is used
    to illustrate the growing power of BI capabilities in Oracle. The BI schema will
    appeal to those who are–or are thinking of–using the OBIEE products.


    **HR** This is the most basic of the schemata and models the very common notion
    of employees and the departments in which they work. Close observers will note
    that this is what happened to the old Scott schema.


    **IX** The Information Exchange schema illustrates the power of Oracle''s Advanced
    Queuing and IPC


    technology. We explore this toward the end of the book.


    **OE** Order Entry is another classic example schema, dealing with concepts of
    sales, orders, order items, customers, and the like. It will strike a chord with
    anyone who''s dealt with the sales process, retail systems, or online commerce.
    Oracle has enhanced this schema to the point where it also has its own sub-schema,
    Online Catalog (OC), and quite a few interrelationships between them.


    **PM** In the Product Media schema, Oracle''s strengths in multimedia object manipulation
    are highlighted. This includes advanced features for large object manipulation,
    which we explore in Chapter 16.'
