    \n# CHAPTER 4 ■ CREATING AND DERIVING DATA\n\n## 4-7. Translating Strings to Numeric\
    \ Equivalents\n\n### Problem\n\nIn an effort to centralize your domain code management\
    \ and further normalize the structure of your database tables, you want to clean\
    \ up and convert some text-format business attributes to numeric equivalents.\
    \ This will enhance reporting capabilities and reduce data entry errors in the\
    \ future.\n\n### Solution\n\nUse the `CASE` function to translate business keys\
    \ or other intelligent numeric keys to numeric codes that are centrally stored\
    \ in a domain code table. For example, the `ORDERS` table of the `OE` schema contains\
    \ a column `ORDER_MODE` that currently has four possible values, identified in\
    \ Table 4-1.\n\n**Table 4-1.** Mapping the Text in the `ORDER_MODE` Column to\
    \ Numeric Values\n\n| Text (source column) | Numeric (destination column) |\n\
    |----------------------|-------------------------------|\n| Direct           \
    \    | 1                             |\n| Online               | 2           \
    \                  |\n| Walmart              | 3                             |\n\
    | Amazon               | 4                             |\n\nThe second column\
    \ of Table 4-1 contains the numeric value we want to map to for each of the possible\
    \ values in the `ORDER_MODE` column. Here is the SQL you use to add the new column\
    \ to the table:\n\n```sql\nalter table orders add (order_mode_num number);\n```\n\
    \nOracle versions 9 `i` and later include the `CASE` statement, which is essentially\
    \ a way to more easily execute procedural code within the confines of the typically\
    \ non-procedural `SQL` command language.\n\nThe `CASE` statement has two forms:\
    \ one for simpler scenarios with a single expression that is compared to a list\
    \ of constants or expressions, and a second that supports evaluation of any combination\
    \ of columns and expressions. In both forms, `CASE` returns a single result that\
    \ is assigned to a column in the `SELECT` query or `DML` statement.\n\nThe recipe\
    \ solution using the simpler form of the `CASE` statement is as follows:\n\n```sql\n\
    update orders\nset order_mode_num =\n  case order_mode\n    when 'direct' then\
    \ 1\n    when 'online' then 2\n    when 'walmart' then 3\n    when 'amazon' then\
    \ 4\n    else 0\n  end;\n```\n\nOnce you run the `UPDATE` statement, you can drop\
    \ the `ORDER_MODE` column after verifying that no other existing `SQL` references\
    \ it.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# CHAPTER 4 ■ CREATING\
    \ AND DERIVING DATA\n\n### How It Works\n\nThe `CASE` statement performs the same\
    \ function as the older (but still useful in some scenarios) `DECODE` function,\
    \ and is a bit more readable as well. For more complex comparisons, such as those\
    \ evaluating more than one expression or column, you can use the second form of\
    \ the `CASE` statement. In the second form, the `CASE` clause does not contain\
    \ a column or expression; instead, each `WHEN` clause contains the desired comparison\
    \ operation. Here is an example where we want to assign a special code of 5 when\
    \ the order is an employee order (the `CUSTOMER_ID` is less than 102):\n\n```sql\n\
    update orders\nset order_mode_num =\n  case\n    when order_mode = 'direct' and\
    \ customer_id < 102 then 5\n    when order_mode = 'direct' then 1\n    when order_mode\
    \ = 'online' then 2\n    when order_mode = 'walmart' then 3\n    when order_mode\
    \ = 'amazon' then 4\n    else 0\n  end;\n```\n\nNote that in this scenario you\
    \ need to check for the employee order first in the list of `WHEN` clauses, otherwise\
    \ the `ORDER_MODE` column will be set to 1 and no customer orders will be flagged,\
    \ since both conditions check for `ORDER_MODE = 'direct'`. For both `DECODE` and\
    \ `CASE`, the evaluation and assignment stops as soon as Oracle finds the first\
    \ expression that evaluates to `TRUE`.\n\nIn the solution, the string `'direct'`\
    \ is translated to 1, `'online'` is translated to 2, and so forth. If the `ORDER_MODE`\
    \ column does not contain any of the strings in the list, the `ORDER_MODE_NUM`\
    \ column is assigned 0."
