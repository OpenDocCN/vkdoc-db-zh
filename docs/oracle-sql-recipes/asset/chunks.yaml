    # CHAPTER 6 ■ WORKING WITH DATE AND TIME VALUES


    ## How It Works


    Our recipe works by creating an inline view, `DAY_SOURCE`, that comprises every
    day in the month of June 1998, and uses that as the outer table in a `LEFT OUTER
    JOIN` with the `SH.PROMOTIONS` table.


    We can examine the recipe from the inside out to gain some understanding. The
    inner `SELECT` statement uses the `DUAL` table and `CONNECT BY LEVEL` to create
    a very simple virtual table. If we run the inner `SELECT` statement in isolation,
    as shown next, you’ll immediately see how simple this construct is.


    ```

    select to_date(''01-JUN-98'') + rownum - 1 as Day_Row

    from dual

    connect by level <= 30

    ```


    The `SELECT` clause may look complex at first, but it’s actually quite simple.
    We use `TO_DATE` to turn the string `''01-JUN-98''` into a valid Oracle `DATE`
    datatype. Then we perform simple date arithmetic to add the number from the pseudo-column
    `ROWNUM` to the date, and subtract one. Our recipe does this so the first date
    generated isn’t the second of the month. We could have used `TO_DATE(''31-MAY-98'')
    + ROWNUM` instead, but casual reading of a function with “May” in the data doesn’t
    immediately suggest one would be generating dates for June. As `CONNECT BY LEVEL`
