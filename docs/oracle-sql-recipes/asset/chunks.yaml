    CHAPTER 8 ■ WORKING WITH NUMBERS


    8-8\. Handling Nulls in Numeric Calculations


    Problem


    You are performing arithmetic and other calculations on data that may contain
    NULL values. You want to ensure your results are valid and not affected by the
    NULL data.


    Solution


    Oracle strictly adheres to ternary logic rules when any arithmetic or mathematical
    operation involves a NULL value. In lay terms, that means any calculation that
    operates on an unknown value returns an unknown result. Any addition, subtraction,
    multiplication, or other calculation involving NULL will always return NULL. When
    you want to deal with NULL values in another way, the key is to override normal
    Oracle behavior by intercepting the NULL values and substituting your desired
    alternative.


    For our recipe, we’ll tackle the problem of attempting to calculate the total
    annual salary plus commission for all staff in the HR.EMPLOYEES table. The next
    SQL statement overrides Oracle’s default NULL arithmetic, providing an answer
    both the business and employees would deem correct.


    select employee_id, job_id, salary * (1 + nvl(commission_pct,0)) final_pay from
    hr.employees;


    Our results are meaningful for both sales representatives, with a JOB_ID of SA_REP,
    and for non-sales representatives.


    EMPLOYEE_ID JOB_ID FINAL_PAY


    ----------- - --------- ----------


    199 SH_CLERK 2600


    200 AD_ASST 4400


    201 MK_MAN 13000


    ...


    210 SA_REP 4375


    211 SA_REP 4375


    212 SA_REP 4375


    ...


    How It Works


    Our recipe relies on the NVL function to substitute an alternative whenever the
    expression or column in question evaluates to NULL. For our purposes, we’ve passed
    NVL the COMMISSION_PCT column, so that employees who aren’t on commission don’t
    receive a final pay of NULL. It would be hard to pay the mortgage or buy groceries
    with that kind of salary.


    Without our intervention, the calculation for FINAL_PAY would sorely disappoint
    some of the employees. The next SQL statement shows the strict behavior of our
    calculation if we don’t intervene to handle the NULL values.'
