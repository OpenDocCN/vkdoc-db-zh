  trans: "# 第 9 章 ■ 管理事务\n\n对于那些害怕图形界面的用户，下面这个匿名的 PL/SQL 块将向您展示使用内置 PL/SQL 过程 `DBMS_METADATA`\
    \ 存储在数据字典中的实际参照完整性约束定义：\n\n```\ndeclare\n  v_consdef varchar2(4000);\nbegin\n\
    \  for rec in (select constraint_name as name\n              from user_constraints\n\
    \              where constraint_type = 'R'\n              and table_name not like\
    \ 'BIN$%')\n  loop\n    select dbms_metadata.get_ddl('REF_CONSTRAINT', rec.name)\n\
    \      into v_consdef from dual;\n    dbms_output.put_line(v_consdef);\n  end\
    \ loop;\nend;\n```\n\n## 9-6. 确保整个事务中的读一致性\n\n### 问题\n默认情况下，Oracle 为单个 `SELECT`\
    \ 语句提供读一致性，但您希望确保事务内的多个查询在事务完成前都保持读一致性。\n\n### 解决方案\n使用 `SET TRANSACTION` 命令更改默认的读一致性选项。在此示例中，您希望针对\
    \ `EMPLOYEES` 表运行“假设”场景，例如下面这个您想查看在某个部门内提高或降低工资所产生的影响的示例：\n\n```\nselect sum(salary+100)\n\
    from employees\nwhere department_id = 100\n;\n\nselect sum(salary-50)\nfrom employees\n\
    where department_id = 100\n;\n```\n\n但是，如果在您运行第一个 `SELECT` 之后、开始第二个查询之前，有另一位员工更改了部门\
    \ 100 中的某些工资，会怎么样呢？结果很可能与您的预期不一致。因此，您可以在开始分析之前运行此命令：`set transaction read only;`\n\
    \n一旦运行此命令，整个事务将看到 `EMPLOYEES` 表的一个读一致的版本，直到您执行 `COMMIT` 或 `ROLLBACK`。\n\n### 原理说明\n\
    Oracle 支持*多版本控制*，以便在存在多个并发读取器和写入器时提供表的多个视图。查询返回的行始终与单个时间点一致。写入器永远不会阻塞读取器，反之亦然；两个写入器不会相互阻塞，除非它们正在访问表中的同一行。\n\
    \n在上述解决方案中，您将事务环境设置为 `READ ONLY`。默认情况下，Oracle 以 `READ WRITE` 模式启动事务：查询仅在单个查询范围内保持读一致性。在长时间运行的查询期间，其他会话对表所做的任何已提交更改都不会反映在该查询结果中。但是，后续查询将看到这些更改。以下是您如何显式将事务隔离级别设置为读/写：\n\
    \n`set transaction read write;`\n\n如果您在读/写事务中对表执行任何 DML 操作，对于已在另一事务中被更改但尚未提交的行，所做的任何更改将等待，直到另一个事务完成或被回滚。\n\
    \n## 9-7. 管理事务隔离级别\n\n### 问题\n您希望提供事务级别的读一致性，并且能够在事务内执行 DML 语句。\n\n### 解决方案\n\
    使用以下命令将事务隔离级别设置为可序列化：`set transaction isolation level serializable;`\n\n在事务中执行的所有\
    \ `SELECT` 语句都将保持读一致，直到执行 `COMMIT` 或 `ROLLBACK`。只要您不尝试访问在序列化事务开始时未提交的任何表行，您就可以在事务期间执行任何\
    \ DML 语句。\n\n### 原理说明\n事务的*隔离级别*定义了包含 DML 命令的事务如何相对于其他包含 DML 命令的事务进行管理。根据隔离级别的类型，您的事务可能会使数据库处于不同的状态。以下是三种类型的现象，在特定隔离级别下可能被允许或不被允许：\n\
    \n- **脏读：** 一个事务中的 `SELECT` 读取了另一个事务中未提交的数据。"
- fmt: '# CHAPTER 9 ■ MANAGING TRANSACTIONS


    *   **Fuzzy (non-repeatable) reads:** a transaction reads the same row a second
    time and returns different data, or no data (the row has been deleted).

    *   **Phantom reads:** a transaction re-executes a query and returns more rows
    that have since been committed by another transaction.


    Fuzzy reads and phantom reads are different in that fuzzy reads access changed
    or deleted rows, and phantom reads access new rows from a transaction. However,
    and this is a key differentiator from dirty reads, they are the same in that another
    transaction has committed the new or changed rows. Some databases support dirty
    reads for performance reasons; Oracle does not support any form of dirty reads,
    as you will see shortly. Table 9-2 shows the types of isolation levels defined
    by the ANSI SQL standard that allow these phenomena.


    *Table 9-2. Read Anomalies by ANSI SQL Isolation Level*


    | Isolation Level | Dirty Read | Fuzzy (Non-repeatable) Read | Phantom Read |

    | :--- | :--- | :--- | :--- |

    | Read Uncommitted | Allowed | Allowed | Allowed |

    | Read Committed | Not Allowed | Allowed | Allowed |

    | Repeatable Read | Not Allowed | Not Allowed | Allowed |

    | Serializable | Not Allowed | Not Allowed | Not Allowed |


    For example, if you set the isolation level of your transaction to read-committed,
    a `SELECT` statement repeated within a session may see either changed rows or
    new rows, but will never see uncommitted data from another transaction.


    A transaction set to serializable, as in the recipe solution, appears to the session
    as if no one else is making changes to the database. The read-consistency extends
    beyond a single `SELECT` statement to the entire transaction. You can perform
    DML statements within a serializable transaction just as you can with a read-consistent
    transaction, with this important difference: if the serializable transaction tries
    to change a row that has already been changed and committed by another session
    after the serializable transaction has begun, you will receive this error:


    `ORA-08177: Cannot serialize access for this transaction`


    If this happens, your choices are to roll back the entire transaction or commit
    the work made up to this point. After a `COMMIT` or `ROLLBACK`, you will have
    access to the changes made by other sessions.


    Using serializable isolation avoids the non-repeatable read and phantom read in
    Table 9-2, but at a high cost. Due to additional locking required, your transaction
    throughput will suffer. Serializable transactions are also more prone to deadlocks.


    You can set the isolation level to read-committed (the default) by using this
    command: `set transaction isolation level read committed;`


    The `ISOLATION_LEVEL` clause is also available in the `ALTER SESSION` command.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    If you want read-consistency across the entire transaction but you are not going
    to perform any DML commands, you can use read-only serialization (Oracle’s variation
    from the ANSI standard) by using this command:


    ```sql

    set transaction read only;

    ```


    The advantage of using this method is that you won’t receive any `ORA-08177` errors.
    However, as with single long-running `SELECT` statements, if your undo retention
    is not set properly, you can still receive an `ORA-01555: snapshot too old` error.
    This isolation level was covered in a previous recipe.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 10 ■ DATA DICTIONARY


    This chapter focuses on techniques using SQL to display information about database
    objects.


    Developers and DBAs frequently access the Oracle data dictionary to view the structure
    of objects, relationships between objects, frequency of events, and so on.


    An effective database engineer must know where to look and how to query the database
    when resolving security, availability, and performance issues. Using data dictionary
    posters from your last Oracle conference as office wallpaper isn’t enough. When
    problems arise, you need to know where to look and how to interpret and translate
    metadata information into solutions.


    ## Graphical Tools vs. SQL


    There are several graphical tools available for viewing metadata about your database.
    Often, a visual image is extremely valuable in troubleshooting issues in your
    environment. Many people are more comfortable with pointing, clicking, and visually
    diagnosing problems. Both novice and experienced DBAs understand the power of
    graphics.


    So why bother learning how to use SQL manually to query the database metadata
    when you have powerful graphical tools that can do the job? Here are a few reasons
    to ponder:


    *   You’re in a new shop where your favorite graphical tool is not available.

    *   There’s an issue with your high-speed Internet access and you are forced to
    diagnose remote database issues via a sluggish dial-up connection where using
    a graphical display is painfully slow.

    *   The graphical tool won’t display additional information, though you know it’s
    available in the data dictionary.

    *   You’re interviewing for a job and the old-school DBA seems obsessed with asking
    trivia questions about data dictionary views.

    *   There is no source code available and you want to directly query the data
    dictionary via SQL for information.

    *   You understand you’ll be a more effective database engineer if you know how
    to retrieve information directly from the data dictionary.

    *   You want to attract a potential mate at the Oracle OpenWorld SQL trivia event.

    *   You see strange results in the graphical tool and want a second opinion.

    *   There are a few custom database checks you want to automate but they’re not
    available via the visual tool.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    These are not reasons to stop using graphical tools like Enterprise Manager, SQL
    Developer, TOAD, and so on. We fully understand the power and usefulness of these
    utilities. Graphical tools are invaluable for providing a quick and easy way to
    view the database metadata. Furthermore, these visual utilities have become ubiquitous
    and so it’s often a job requirement to know how to use them. However, the preceding
    list does point out some very valid reasons why it is important to know how to
    use SQL to query the data dictionary. You will be a more effective database engineer
    if you know which data dictionary views contain the information required to solve
    the problem at hand.


    ## Data Dictionary Architecture


    There are two general categories of Oracle data dictionary views:


    *   Static `USER`/`ALL`/`DBA` views

    *   Dynamic `V$` and `GV$` views


    In the following sections we’ll discuss the basic architecture of static and dynamic
    views.


    ### Static Views


    Oracle describes a subset of the data dictionary views as *static*. Oracle’s documentation
    states that these views are static in the sense that they change only when certain
    events transact in the database, such as the creation of a table or the granting
    of a privilege.


    However, in some cases the static name can be something of a misnomer. For example,
    the `DBA_SEGMENTS` and `DBA_EXTENTS` views will change dynamically as the amount
    of data in your database grows and shrinks.


    Regardless, Oracle has made the distinction between static and dynamic and it’s
    important to understand this architectural nuance when querying the data dictionary.
    There are three types or levels of static views:


    *   `USER`

    *   `ALL`

    *   `DBA`


    The `USER` views contain information available to the current user. For example,
    the `USER_TABLES` view contains information on tables owned by the current user.
    No special privileges are required to select from these views.


    The next level is the `ALL` static views. The `ALL` views show you all object
    information the current user has access to. For example, the `ALL_TABLES` view
    displays all database tables that the current user can select from. No special
    privileges are required to query from these views.'
