    as a switch. In our example, NVL2 evaluates the value of COMMISSION_PCT. If a
    real value is detected, the second expression is returned. If a NULL is detected
    by NVL2, the third expression is returned.


    The general form of the NVL2 function is shown next.


    nvl(expression,


