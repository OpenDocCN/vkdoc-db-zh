    **C H A P T E R 2 0**


    ■ ■ ■


    **Database Troubleshooting**


    Database troubleshooting is a general term that can apply to vast a range of topics,
    such as resolving storage issues, investigating sluggish performance, or monitoring
    database objects. SQL is often the first tool you’ll use to get an idea of what
    might be amiss in the database. Therefore, you must be familiar with SQL techniques
    for extracting and analyzing database information.


    The recipes in this chapter are mainly for DBAs. However, if you’re a developer,
    many of these topics will indirectly impact your ability to work efficiently with
    the database. Knowing the solutions to the problems described in this chapter
    will give you a better understanding of the Oracle architecture and will also
    arm you with information for troubleshooting application issues with the crusty
    old territorial database administrator.


    DBAs, of course, need to be experts at identifying problem areas within their
    databases. The DBA is the go-to team member for any connectivity, performance,
    or availability issues. A good DBA must be proficient with SQL, especially with
    regard to troubleshooting.


    It would be impossible to cover every type of SQL statement you can use to troubleshoot
    issues with your database. Rather, we present SQL insights for dealing with common
    database pain points. We’ll begin by showing you how to identify potential problems,
    then explore how to deal with storage issues and database auditing.


    20-1\. Determining Causes of Database Problems


    Problem


    Users are reporting that the application using the database is acting odd. Your
    manager wants you to check to see if anything is wrong with the database.


    Solution


    When diagnosing database problems, you have to have a strategy for determining
    where to look for issues. For example, if a user is reporting a specific database
    error or if there is a detailed message in the alert log, then it’s obvious to
    begin by investigating those reported problems.


    If there’s not a clear starting point, you can run an Automatic Workload Repository
    (AWR) report (requires a license) or a Statspack report; see Chapter 19 for more
    details on how to run these reports. If 497


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    you don’t have either of these tools at your disposal, you can query the data
    dictionary directly to determine if the database is stressed and what might be
    the root cause of the issue.


    The next query uses the V$SYSSTAT view to determine the database time spent processing
    user requests and CPU time to infer the database wait time (by subtraction). This
    relates to the available time, which is the wall-clock time multiplied by the
    number of CPUs. The purpose of this query is to determine whether your database
    is spending an inordinate amount of time waiting for resources (indicative of
    an overloaded system):


    select


    round(100*CPU_sec/available_time,2) "ORACLE CPU TIME AS % AVAIL."


    ,round(100*(DB_sec - CPU_sec)/available_time,2) "NON-IDLE WAITS AS % AVAIL."


    ,case


    sign(available_time - DB_sec)


    when 1 then round(100*(available_time - DB_sec) / available_time, 2)


    else 0


    end "ORACLE IDLE AS % AVAIL."


    from


    (


    select


    (sysdate - i.startup_time) * 86400 * c.cpus available_time


    ,t.DB_sec


    ,t.CPU_sec


    from v$instance i


    ,(select value cpus


    from v$parameter


    where name = ''cpu_count'') c


