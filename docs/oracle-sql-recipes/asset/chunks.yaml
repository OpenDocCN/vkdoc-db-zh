    **C H A P T E R 6**


    ■ ■ ■


    **Working with Date and Time Values**


    This chapter deals with recipes for date, time, and related temporal datatypes.
    Queries involving dates and times are very common in almost all databases. Working
    with dates and times is also very strange when compared to other forms of data,
    due to the long history (pardon the pun) of how our concepts of dates, hours,
    minutes, seconds, days, months and years came about. For instance, our division
    of minutes into 60 seconds, hours into sixty minutes, and days into two 12-hour
    blocks is derived from ancient Sumerian and Babylonian tradition. And they got
    the notion of a base-12 for counting hours and other things by using the segments
    of the four fingers (not the thumb) of one hand.


    Calendars around the world stem from various religious influences, the whims of
    emperors and kings in different regions, and more. To put the icing on the cake,
    when you think you understand dates and times at a fundamental level, just ask
    astronomers for their perspective. They’ll tell you there are at least three different
    measurements for the length of a day—depending on whether you’re measuring rotation
    of the Earth; the Earth’s time to return to point to the same fixed stars in the
    night sky; and, strangest of all, simply considering the day as an equation relating
    to angles in space.


    It is therefore no surprise that dealing with date and time values, performing
    temporal arithmetic, and answering supposedly simple date and time questions can
    often lead to very tricky problems—with or without Oracle.'
  trans: "\n# SQL 查询示例与数据同步\n\n```sql\nselect min(employee_id), max(employee_id),\
    \ count(*)\nfrom hr.empb;\n```\n\n```\nMIN(EMPLOYEE_ID) MAX(EMPLOYEE_ID) COUNT(*)\n\
    ---------------- ---------------- ----------\n             100              212\
    \        110\n```\n\n当然，欢迎您浏览两张表中的全部数据，但您会很高兴地知道，您不会失望，所有数据都将显示为已同步。\n\n## 工作原理\n\
    \n这个方法使用了两次 `MINUS` 操作，每次方向各一次。首先，我们处理表 `HR.EMPA`，使用 `INSERT INTO … SELECT` 方法。其中的\
    \ `SELECT` 是关键，如下一条语句片段所示。\n\n```sql\nselect *\nfrom hr.empb\nminus\nselect *\n\
    from hr.empa;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n您可以单独运行此语句，以查看\
    \ `HR.EMPA` 的内容如何从 `HR.EMPB` 的内容中被“减去”，从而留下 `HR.EMPB` 中独有的行。为节省空间，这些示例结果已缩略。\n\
    \n```\nEMPLOYEE_ID FIRST_NAME AST_NAME EMAIL …\n----------- ---------- --------\
    \ --------\n        175 Alyssa     Hutton   AHUTTON …\n        176 Jonathon  \
    \ Taylor   JTAYLOR …\n        177 Jack       Livingston JLIVINGS …\n        178\
    \ Kimberely  Grant    KGRANT …\n        179 Charles    Johnson  CJOHNSON …\n…\n\
    ```\n\n来自 `MINUS` 操作的这些结果随后被输入到 `INSERT` 语句中，然后 `HR.EMPA` 就拥有了其所有原始行，外加 `HR.EMPB`\
    \ 中存在但 `HR.EMPA` 中没有的所有那些行。\n\n然后，我们只需在第二条语句中反转数据流的顺序，使用 `MINUS` 操作来选择仅存在于 `HR.EMPA`\
    \ 但缺失于 `HR.EMPB` 的行，并将它们适当地插入。这两条 `INSERT` 语句的执行顺序无关紧要，只要它们都成功完成即可。\n\n您也可以用替代方案替换第二条\
    \ SQL 语句。因为我们知道在第一次 `INSERT` 后 `HR.EMPA` 拥有完整的数据集，所以我们可以清空 `HR.EMPB` 中的所有数据，并从\
    \ `HR.EMPA` 复制所有内容，而无需任何谓词或 union 操作符。接下来的代码展示了第二步所需的语句。\n\n```sql\ntruncate table\
    \ HR.EMPB;\ninsert into HR.EMPB select * from HR.EMPA;\n```\n\n这有时可能更快，因为它避免了使用\
    \ `MINUS` 操作符所隐含的排序。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n#\
    \ 第二部分\n\n## 数据类型及其问题\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    # 第六章\n\n## 处理日期和时间值\n\n本章涉及日期、时间及相关时态数据类型的配方。涉及日期和时间的查询在几乎所有的数据库中都非常普遍。与其他形式的数据相比，处理日期和时间也非常奇特，这源于我们的日期、小时、分钟、秒、日、月和年概念形成的悠久历史（请原谅这个双关语）。例如，我们将分钟划分为\
    \ 60 秒，小时划分为 60 分钟，天划分为两个 12 小时时段，这源于古代苏美尔和巴比伦的传统。而他们通过使用一只手四根手指（不包括拇指）的关节来计数小时和其他事物，从而得到了十二进制的概念。\n\
    \n世界各地的日历源于各种宗教影响、不同地区帝王和国王的兴致等等。雪上加霜的是，当您以为自己从基本层面理解了日期和时间时，只需问问天文学家的看法。他们会告诉您，一天的长度至少有三种不同的度量方式——取决于您是在测量地球的自转；地球返回到指向夜空中同一固定恒星所需的时间；以及，最奇怪的是，简单地将一天视为空间角度的方程。\n\
    \n因此，处理日期和时间值、执行时态运算以及回答本应简单的日期和时间问题，常常会导致非常棘手的问题——无论是否使用 Oracle，皆是如此。\n"
- fmt: "# CHAPTER 6 ■ WORKING WITH DATE AND TIME VALUES\n\nOne of the key aspects\
    \ of this chapter is to get you thinking about your own date and time problems\
    \ and queries in a new light, and to spark your imagination as to how Oracle’s\
    \ many and varied date and time functions and tools can solve some of your trickiest\
    \ chronological problems.\n\n## 6-1. Converting Datetime Values into Readable\
    \ Strings\n\n### Problem\n\nYou want to convert the short dates provided by Oracle’s\
    \ default date format into a full date for inclusion in a form letter or report.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### Solution\n\nUse Oracle’s\
    \ `TO_CHAR` function to format date, time, and other temporal data in the desired\
    \ format. The `TO_CHAR` function supports a wide range of date-specific formatting\
    \ options that handle day and month names, number notation and formatting, and\
    \ similar tasks. Our recipe assumes you want to display the date on which employees\
    \ were hired in a fully descriptive format. Specifically, you’d want `1/1/2009`\
    \ reported as `Thursday, January 1st, 2009`.\n\nThe next SQL statement performs\
    \ the relevant calculations and formatting for all employees.\n\n```sql\nselect\
    \ first_name, last_name,\n       to_char(hire_date, 'Day, Month DDTH, YYYY') formatted_hire_date\n\
    \  from hr.employees;\n```\n\nResults from our `TO_CHAR` formatting appear with\
    \ the correct day name, month name and other desired formatting in place.\n\n\
    ```\nFIRST_NAME   LAST_NAME   FORMATTED_HIRE_DATE\n-----------  ----------  --------------------------------------\n\
    Donald       OConnell    Monday, June 21ST, 1999\nDouglas      Grant       Thursday,\
    \ January 13TH, 2000\nJennifer     Whalen      Thursday, September 17TH, 1987\n\
    Michael      Hartstein   Saturday, February 17TH, 1996\nPat          Fay     \
    \    Sunday, August 17TH, 1997\n...\n```\n\n### How It Works\n\nOur recipe uses\
    \ a very straightforward structure to select the `FIRST_NAME` and `LAST_NAME`\
    \ values from the `HR.EMPLOYEES` table. When selecting the `HIRE_DATE`, we employ\
    \ the `TO_CHAR` function with specific formatting codes to change the default\
    \ format of the data, instructing Oracle to emit the full day and month name,\
    \ ordinal date number, and full year.\n\nThe general format of the `TO_CHAR` function\
    \ for converting dates takes this form.\n\n```sql\nto_char(<date/time expression>,\
    \ '<format options>')\n```\n\nIn our recipe, we used several options to format\
    \ the day. We led with the `Day` option, which returns the full day name, such\
    \ as `Monday`. We also use `DD`, together with the ordinal formatting code `TH`,\
    \ to return the ordinal day number, such as `21st` and `17th`. The `MONTH` code\
    \ returns the full month name, such as `January`. The year is returned by the\
    \ `YYYY` code, which instructs Oracle to return the full four-digit year.\n\n\
    We assume a future upgrade of Oracle will support five `Y` formatting characters\
    \ here at some point before the year 10000.\n\nOracle includes numerous other\
    \ day, month, year, and other formatting options to return date and time information\
    \ in digits, words, and regionally sensitive strings (although the key words that\
    \ are used in formatting commands are always in English). There are five more\
    \ formatting characters in the string, though they may not be immediately obvious.\
    \ The two comma characters and three spaces are themselves included as format\
    \ options. These, together with other common punctuation such as dashes and colons,\
    \ are all valid options in the `TO_CHAR` format string.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n`Note` It’s comforting to know that Oracle supports all manner of formatting\
    \ codes and options in `TO_CHAR` for dates and times. However, there is a 22-character\
    \ limit on the formatting options passed to the `TO_CHAR` function.\n\nThis can\
    \ frustrate your attempts to format dates and times in elaborate fashion. Don’t\
    \ despair if you run into this limit. You can always combine multiple calls to\
    \ `TO_CHAR`, with other string functions, such as those shown in Chapter 7, to\
    \ produce your desired output.\n\n## 6-2. Converting Strings to Datetime Values\n\
    \n### Problem\n\nYou need to convert date information provided in textual form\
    \ to Oracle’s `DATE` format.\n\n### Solution"
