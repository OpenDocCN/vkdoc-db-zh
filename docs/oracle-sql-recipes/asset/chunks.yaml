    This SQL statement would work just as well if you already had the suits and ranks
    in two existing tables. In that case, you would reference the two tables rather
    than write those long subqueries involving UNION operations against the DUAL table.
    For example:


    select rank || ''-'' || suit, 0 from


    card_ranks


    cross join


    card_suits


