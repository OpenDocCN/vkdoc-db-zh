    ## 7-2. Extracting a Substring from a String


    ```sql

    select employee_id, last_name, job_id,


    substr(job_id,1,2) dept_code,


    substr(job_id,4) job_code


    from employees


    ;

    ```


    ```

    EMPLOYEE_ID LAST_NAME JOB_ID DEPT_CODE JOB_CODE

    ---------------------- ------------------------- ---------- --------- --------

    100 King AD_PRES AD PRES

    101 Kochhar AD_VP AD VP

    102 De Haan AD_VP AD VP

    103 Hunold IT_PROG IT PROG

    104 Ernst IT_PROG IT PROG

    . . .

    204 Baer PR_REP PR REP

    205 Higgins AC_MGR AC MGR

    206 Gietz AC_ACCOUNT AC ACCOUNT

    107 rows selected

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### How It Works


    In the solution we use the `SUBSTR` function twice: once with an explicit length
    and the second time with only the starting position. As a result, the second `SUBSTR`
    will start extracting at the third position in the string and return the remaining
    portion of the string regardless of length.


    The `SUBSTR` function is even more useful in conjunction with other functions,
    such as `INSTR`. In the solution for this recipe, you assume that the underscore
    character is always the third character in the `JOB_ID` column. If future assignments
    of the `JOB_ID` value include a department code that is three characters instead
    of two, the solution will not return the desired results.


    To allow for a department code of any length, you can use the `INSTR` function
    to search for the underscore and use the results to determine where in the source
    string the job code starts, as well as how long the department code is. Here is
    the revised solution for future expansion of the department code:


    ```sql

    select employee_id, last_name, job_id,


    substr(job_id,1,instr(job_id,''_'')-1) dept_code,


    substr(job_id,instr(job_id,''_'')+1) job_code


    from employees


    ;

    ```


    ```

    EMPLOYEE_ID LAST_NAME JOB_ID DEPT_CODE JOB_CODE

    ---------------------- ------------------------- ---------- --------- --------

    100 King AD_PRES AD PRES

    101 Kochhar AD_VP AD VP

    102 De Haan AD_VP AD VP

    103 Hunold IT_PROG IT PROG

    104 Ernst IT_PROG IT PROG

    . . .

    204 Baer PR_REP PR REP

    205 Higgins AC_MGR AC MGR

    206 Gietz AC_ACCOUNT AC ACCOUNT

    107 rows selected

    ```


    Not surprisingly, this query returns the same results as the original solution,
    but it helps to future-proof the query in case changes are made to the format
    of the column. The first `SUBSTR` stops extracting right before the first underscore
    character in the string, and the second `SUBSTR` starts extracting the remainder
    of the string right after the first underscore.


    This solution is fairly robust. If there is no underscore in the source string,
    the first `SUBSTR` returns `NULL` and the second `SUBSTR` returns the entire string.
    The assumption therefore is that any `JOB_ID` without an underscore does not include
    a department code.


    In another recipe, you will see how `REGEXP_SUBSTR` expands the functionality
    of `SUBSTR` by allowing you to specify a pattern instead of a starting position
    to extract the desired string. In other words, you can extract a substring of
    the source string that matches the pattern without knowing where in the source
    string the desired substring begins.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 7-3. Single-Character String Substitutions


    ### Problem


    You want to perform single-character substitutions in string columns. The characters
    to be substituted can be anywhere in the string, and all other characters not
    in the substitution list are left as is.


    ### Solution


    You can use the built-in `TRANSLATE` function to perform one-to-one character
    substitutions within a string. In the `HR` sample schema, the data-entry person
    accidentally entered brackets “[]” instead of parentheses “()” and underscores
    “_” instead of hyphens “-” in some of the street addresses. Here are some rows
    with incorrect values:


    ```sql

    select location_id, street_address


    from locations


    where location_id in (2100,2900)


    ;

    ```


    ```

    LOCATION_ID STREET_ADDRESS

    ---------------------- ----------------------------------------

    2100 1298 Vileparle [E]

    2900 20 Rue des Corps_Saints

    2 rows selected

    ```


    To make all substitutions in one pass, you can use the `TRANSLATE` function, specifying
    the source string to be translated, the list of characters that need to be translated,
    and the list of corresponding characters that will replace those characters to
    be translated. Here is the `UPDATE` statement you can use to fix the `STREET_ADDRESS`
    column in the `LOCATIONS` table:


    ```sql

    update locations


    set street_address = translate(street_address,''[]_'',''()-'')


    where location_id in (2100,2900)


    ;

    ```


    ```

    2 rows updated

    ```


    ### How It Works


    The `TRANSLATE` function checks each character in the source string (in this case,
    `STREET_ADDRESS`). For each individual character in the source string, `TRANSLATE`
    checks for one of the characters in the second argument; if there is a match,
    the character is replaced with the corresponding character in the third argument.
    Thus, “[” is replaced by “(”, “]” is replaced by “)”, and “_” is replaced by a
    “-”. Any characters in the source string that are not found in the second argument
    are not replaced.


    You can also use `TRANSLATE` to completely remove characters in the source string.
    To do this, you specify a single character that will not be translated plus the
    characters to be removed in the second argument, and specify only the single character
    not to be translated in the third argument. This is best explained by an example.
    In this `UPDATE` statement, you want to remove all bracket characters from the
    source string:


    ```sql

    update locations


    set street_address = translate(street_address,''X[]'',''X'')


    where location_id in (2100,2900)


    ;

    ```


    ```

    2 rows updated

    ```


    All occurrences of the letter “X” are replaced with an “X”, and the bracket characters
    are removed and not replaced. You must specify at least one character to be replaced
    because if any argument of `TRANSLATE` is `NULL`, then the result is `NULL`, and
    that is certainly not the desired result!


    Of course, if you want to both replace and remove characters in the source string,
    you do not need to specify any extra characters. Therefore, if you want to replace
    the underscore character with a hyphen and remove the brackets completely, the
    `UPDATE` statement would look like this:


    ```sql

    update locations


    set street_address = translate(street_address,''_[]'',''-'')


    where location_id in (2100,2900)


    ;

    ```


    ```

    2 rows updated

    ```


    You must typically use a `WHERE` clause when you perform conditional updates to
    columns containing character strings, unless the table is very small. Without
    the `WHERE` clause, you will create a lot of unnecessary undo since all rows in
    a table will be updated. In addition, you may create performance problems and
    cause unnecessary delays for other sessions that want to update rows that your
    `UPDATE` statement does not really need to update.


    Finally, you may have a scenario where you do not know which rows need to be updated.
    In the previous examples, we knew that rows with a `LOCATION_ID` of 2100 and 2900
    needed updating. But what if you know there are more than a few incorrect values
    for `STREET_ADDRESS`, but don’t know what the values are for `LOCATION_ID`? In
    this situation, you can change the `WHERE` clause to check for the same characters
    that you’re substituting with the `TRANSLATE` statement, as in this example:


    ```sql

    update locations


    set street_address = translate(street_address,''[]_'',''()-'')


    where instr(street_address,''['') > 0


    or instr(street_address,'']'') > 0


    or instr(street_address,''_'') > 0


    ;

    ```


    As you will find out in one of the recipes later in this chapter, you can simplify
    this code even further by using `REGEXP_INSTR`, the regular expression equivalent
    of `INSTR`, in the `WHERE` clause, as in this example:


    ```sql

    update locations


    set street_address = translate(street_address,''[]_'',''()-'')


    where regexp_instr(street_address,''\[|\]|_'') > 0


    ;

    ```


