    \ | 列对象授权，其中用户是对象所有者。 |\n| `USER_COL_PRIVS_RECD` | 列对象授权，其中用户是被授权者。 |\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第四部分\n\n■ ■ ■\n\n## 专题\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# 第十一章\n\n■ ■ ■\n\n## 常见的报表问题\n\n作为 SQL 开发人员、DBA 或高级用户，你有时必须编写报表，以与同事、管理层、客户或其他公司分享。如果你幸运的话，你可以安静地专注于报表的逻辑和呈现。然而，不幸的是，你几乎肯定会遇到“站在背后指手画脚”的报表批评者。你知道那种人：他们站在你身后，对着屏幕指指点点，提供“有帮助的”建议，比如“那应该转换成电子表格。”或者“你能让它看起来像旧报表那样吗？那样更容易阅读。”\n\
    \n许多这类需求都有通用的解决方案，可以将完全正常的报表数据进行旋转、压缩、替换和以其他方式转换，使其更符合目标受众的熟悉习惯或需求。本章涵盖了许多常见的报表样式，并提供了一些通用和不太常见的解决方案，以帮助你满足当前需求，同时为你提供思路，以应对我们尚未想到但你的老板肯定已经想到的未来报表场景。\n\
    \n### 11-1. 避免在报表中重复行\n\n**问题**\n\n你想模仿 SQL*Plus 的 `BREAK` 功能，以抑制数据行中几乎相同的前导数据。\n\
    \n例如，在一个多列报表中，只有最后一列在行与行之间不同，你想将重复的前导列置空，只显示不同列的数据。\n\n**解决方案**\n\nOracle 的 `SQL*Plus`\
    \ 工具支持 `BREAK` 功能已有数十年，许多基础的文本报表依赖于这种简单但有效的格式化方法。不幸的是，`BREAK` 命令并非 SQL 原生，因此无法在\
    \ `SQL*Plus` 之外用于实现相同的结果。使用 Oracle 的 `ROW_NUMBER` 分析函数和 `CASE` 表达式，你可以在任何 SQL\
    \ 接口中模仿 `BREAK` 的行为。\n\n对于那些不熟悉 `SQL*Plus BREAK` 功能的人，接下来的命令演示了它如何在一个简单的 `SELECT`\
    \ 语句输出中“隐藏”相同的 `job` 标识符和经理标识符。只显示了部分结果，但你可以清楚地看到效果。\n\n```\nbreak on job_id on\
    \ manager_id\n```\n\n```\nselect job_id, manager_id, employee_id\nfrom hr.employees\n\
    order by job_id, manager_id, employee_id;\n```\n\n```\nJOB_ID         MANAGER_ID\
    \ EMPLOYEE_ID\n-------------- ---------- -----------\n...\nAD_VP             \
    \    100         101\nFI_ACCOUNT            108         109\nFI_MGR          \
    \      101         108\nHR_REP                101         203\nIT_PROG       \
    \        102         103\n                                      103\n        \
    \                              104\n...\n```\n\n我们可以使用 Oracle 的 `CASE` 表达式和 `ROW_NUMBER`\
    \ 分析函数，在任何 SQL 查询接口或编程 API 中模仿 `BREAK` 功能。下一个 SQL 语句展示了这两个特性的实际应用，以及从任何接口生成的相同结果。\n\
    \n```\nselect\ncase when job_ctr = 1 then job_id else null end \"JOB_ID\",\n```\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n"
- fmt: "# CHAPTER 11 ■ COMMON REPORTING PROBLEMS\n\n## 11-1. Eliminating Duplicate\
    \ Values in a Column Report\n\n```sql\ncase when jobman_ctr = 1 then manager_id\
    \ else null end \"MANAGER_ID\", employee_id\nfrom (\n  select job_id,\n      \
    \   row_number() over (partition by job_id order by job_id) as job_ctr,\n    \
    \     manager_id,\n         row_number() over (partition by job_id, manager_id\
    \ order by job_id, manager_id) as jobman_ctr,\n         employee_id\n  from hr.employees\n\
    );\n```\nAs promised, our results are pleasingly similar to the SQL*Plus approach,\
    \ with precious ink saved in not printing repeating data.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n```text\nJOB_ID          MANAGER_ID    EMPLOYEE_ID\n----------      ----------\
    \    ------------\n...\nAD_VP           100           101\nFI_ACCOUNT      108\
    \           109\nFI_MGR          101           108\nHR_REP          101      \
    \     203\nIT_PROG         102           103\n                103           104\n\
    ...\n```\n\n### How It Works\nOur recipe works in two parts. The inner query selects\
    \ the columns of data in which we are interested, in this case, `JOB_ID`, `MANAGER_ID`,\
    \ and `EMPLOYEE_ID`. It also adds two further columns computed with the `ROW_NUMBER`\
    \ analytic function that we don’t see in the final output. These two columns are\
    \ the `JOB_CTR` and `JOBMAN_CTR` values, and are used to number the result rows\
    \ based on our explicit desire to have `JOB_ID` displayed first, and `MANAGER_ID`\
    \ displayed second. Our partitioning and sorting options for `JOB_CTR` restarts\
    \ numbering each time the `JOB_ID` changes. For `JOBMAN_CTR`, we restart numbering\
    \ each time the `MANAGER_ID` changes within each `JOB_ID`.\n\nTo understand how\
    \ we then use this data in the outer `SELECT`, let’s look at the results of the\
    \ subselect in isolation. The next SQL statement is the subselect executed as\
    \ a stand-alone `SELECT` statement, followed by partial results.\n\n```sql\nselect\
    \ job_id,\n       row_number() over (partition by job_id order by job_id) as job_ctr,\n\
    \       manager_id,\n       row_number() over (partition by job_id, manager_id\
    \ order by job_id, manager_id) as jobman_ctr,\n       employee_id\nfrom hr.employees;\n\
    ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n```text\nJOB_ID   \
    \    JOB_CTR    MANAGER_ID    JOBMAN_CTR    EMPLOYEE_ID\n----------   --------\
    \   ----------    ----------    -----------\n...\nAD_VP        1          100\
    \           1             101\nAD_VP        2          100           2       \
    \      102\nFI_ACCOUNT   1          108           1             109\nFI_ACCOUNT\
    \   2          108           2             110\nFI_ACCOUNT   3          108  \
    \         3             111\nFI_ACCOUNT   4          108           4         \
    \    112\nFI_ACCOUNT   5          108           5             113\nFI_MGR    \
    \   1          101           1             108\nHR_REP       1          101  \
    \         1             203\nIT_PROG      1          102           1         \
    \    103\nIT_PROG      2          103           1             104\n...\n```\n\
    The key to understanding our outer `SELECT` is the test performed by the respective\
    \ `CASE` statement on the counters. We’ve emphasized in bold the values of interest\
    \ in the above output.\n\nOur outer `SELECT` statement is designed to test when\
    \ the counter value equals one, as that signals when the related `JOB_ID` or `MANAGER_ID`\
    \ value changes. Any other value indicates the row we’re examining has the same\
    \ `JOB_ID` or `MANAGER_ID` as the previous row. We know we’ve printed the relevant\
    \ value already, so we can substitute a `NULL` that ordinarily won’t be displayed.\
    \ So in our partial results, we have a `JOB_ID` of `AD_VP` and `MANAGER_ID` of\
    \ `100`, both of which were counted as the first instance of those values in that\
    \ combination by the `ROW_NUMBER` technique. Our recipe’s `CASE` statements detect\
    \ that those values should therefore be printed. The next row has the same `JOB_ID`\
    \ and `MANAGER_ID`, and each has a counter value of 2. Our `CASE` expressions\
    \ evaluate to `NULL`, so the final result suppresses these values, printing nothing\
    \ except the `EMPLOYEE_ID`.\n\nYou can expand this technique to as many columns\
    \ as you like. All that’s needed is to pair the desired result column with a counter\
    \ determined by the `ROW_NUMBER` technique, and to craft an identically patterned\
    \ `CASE` statement in the outer `SELECT` block.\n\n## 11-2. Parameterizing a SQL\
    \ Report\n\n### Problem\nYou have a variety of SQL statements you’d like to provide\
    \ to users for reporting purposes, with the ability to let them specify values\
    \ for various predicates and criteria. For example, you have used SQL*Plus features\
    \ for parameters, and need similar support in other query tools.\n\n### Solution\n\
    When composing reporting SQL via a programming language like Java or C#, adding\
    \ parameters to your SQL statements is fairly straightforward. However, when dealing\
    \ with “native” SQL and query tools, you don’t have the luxury of an object model\
    \ and well-defined methods for allowing users to simply provide values to parameters\
    \ in a query. This recipe acts as not quite a SQL recipe, but as a SQL usage recipe.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 30](index-295_1.png)\n\
    \nYou may previously have used the ampersand and double-ampersand labeling technique\
    \ in SQL*Plus to place substitutable parameters into your SQL statements. Our\
    \ recipe shows that this technique is actually supported across almost all of\
    \ Oracle’s query tool interfaces, such as SQL Developer, SQL Worksheet, and the\
    \ APEX SQL Command tool. Even better, even some third-party tools such as TOAD\
    \ support the same syntax.\n\nWe’ll show our recipe in action by using the following\
    \ SQL statement to query for all staff with a salary above a certain value. We’ll\
    \ use a parameter for the threshold salary value, to be supplied by the user at\
    \ runtime.\n\n```sql\nselect employee_id, last_name, salary\nfrom hr.employees\n\
    where salary > &threshold_salary\n```\nExecuting this query through SQL*Plus gives\
    \ the familiar prompt for the `THRESHOLD_SALARY` value:\n`Enter value for threshold_salary:\
    \ 15000`\n\nWe’ve entered the value 15000. Our parameter is substituted, and the\
    \ results are shown.\n\n```text\nold 3: where salary > &threshold_salary\nnew\
    \ 3: where salary > 15000\n\nEMPLOYEE_ID LAST_NAME                 SALARY\n-----------\
    \ ------------------------- ------\n100        King                      24000\n\
    101        Kochhar                   17000\n102        De Haan               \
    \    17000\n```\nBut look what happens when we issue the identical SQL through\
    \ SQL Developer. It understands Oracle’s notation for parameters (or substitution\
    \ variables) in query tools, and prompts you for the parameter in an intuitive\
    \ dialog box as shown in Figure 11-1.\n\n**Figure 11-1.** SQL Developer prompts\
    \ for SQL parameters.\n\nAs you’d expect, with the value 15000 entered again,\
    \ SQL Developer performs the identical substitution. Figure 11-2 shows SQL Developer\
    \ returning the same results, as you’d expect.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 31](index-296_1.png)\n\n**Figure 11-2.** SQL Developer accepts and correctly\
    \ uses Oracle-style SQL parameters.\n\n### How It Works\nEarly in the development\
    \ of SQL*Plus, support was added for the ampersand-style substitution variables\
    \ to allow users to pass parameter values to their queries. Oracle has ensured\
    \ that the same technique can be used with most (if not all) of its subsequent\
    \ query tools, and other companies’ products have followed suit, most notably\
    \ TOAD.\n\nBoth the single-ampersand and double-ampersand style of parameters\
    \ can be used across all of these tools. For those unfamiliar with the difference\
    \ between the two, single-ampersand parameters are temporary substitution variables,\
    \ taking and using a value once for one SQL statement. If you re-execute the statement\
    \ with a single-ampersand substitution variable, you’ll be asked to provide a\
    \ value again. A double-ampersand parameter creates a permanent substitution variable.\
    \ The first value you provide will persist as the substituted value for the duration\
    \ of your session.\n\nThere is an important difference between SQL*Plus-style\
    \ substitution variables and bind variables in prepared statements in application\
    \ code. Our recipe, and any other SQL you write utilizing substitution variables,\
    \ works by using client-side string replacement techniques. SQL*Plus, SQL Developer,\
    \ or your tool of choice, finds the substitution variables in your SQL before\
    \ passing the statement to the Oracle database. The query tool itself prompts\
    \ for the values to be substituted, and uses string functions to replace the variable\
    \ marker with the value you provide. Only then does the SQL"
