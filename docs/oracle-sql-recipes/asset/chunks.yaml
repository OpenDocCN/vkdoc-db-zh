    How It Works


    For the EMPLOYEES table, you must provide a department identifier (JOB_ID), since
    that column is not nullable. If the employee is part of a new department and the
    row in the DEPARTMENTS table is not there yet, but you want to use the employee
    number for other operations within the transaction before the department row is
    available, you have a dilemma. You could wait until all information is available
    in all parent tables, but this might cause a bottleneck when the employee needs
    her identification badge and the employee number must be printed on the badge.
    In another scenario, you may get all the employee and department data from a daily
    feed, but the order of the data is not guaranteed to be the new department before
    the new employee.


    If you try to insert a row into the EMPLOYEES table with a job identifier that
    is not there yet and the constraint is not deferred, here is what happens when
