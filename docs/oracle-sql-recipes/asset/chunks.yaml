- fmt: 'set `constraint emp_job_fk immediate;`


    And of course, you can change it back to the `DEFERRED` state as follows: set
    `constraint emp_job_fk deferred;`


    The scope of the `SET CONSTRAINT` statement is for the duration of the transaction
    (until a `COMMIT` or `ROLLBACK` is issued) or until another `SET CONSTRAINT` command
    is issued.


    `Note` You can set all applicable constraints to be deferred by using the `SET
    CONSTRAINTS ALL DEFERRED` command.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## CHAPTER 9 ■ MANAGING TRANSACTIONS


    As you may infer, you cannot create a constraint as `INITIALLY DEFERRED NOT DEFERRABLE`.
    Here is the error message you will receive if you dare to try it:

    ```

    alter table employees

    add constraint emp_job_fk

    foreign key (job_id)

    references hr.jobs(job_id)

    initially deferred not deferrable

    enable

    ```

    Error report:

    SQL Error: ORA-02447: cannot defer a constraint that is not deferrable

    02447. 00000 - "cannot defer a constraint that is not deferrable"

    *Cause: An attempt was made to defer a nondeferrable constraint

    *Action: Drop the constraint and create a new one that is deferrable

    To be able to recreate the constraint, you must know the name of the constraint
    to drop. To find the name of the constraint in the child and parent tables, you
    can look in the data dictionary tables `USER_CONSTRAINTS` and `ALL_CONS_COLUMNS`
    for the constraint name, as in this example:

    ```

    select uc.table_name child_table_name,

    acc1.column_name child_column_name,

    uc.constraint_name child_constraint_name,

    acc2.table_name parent_table_name,

    uc.r_constraint_name parent_constraint_name

    from user_constraints uc

    join all_cons_columns acc1

    on uc.table_name = acc1.table_name

    and uc.constraint_name = acc1.constraint_name

    join all_cons_columns acc2

    on uc.r_constraint_name = acc2.constraint_name

    where uc.table_name = ''EMPLOYEES''

    and acc1.column_name = ''JOB_ID''

    and uc.constraint_type = ''R'' -- foreign key

    ;

    ```

    ```

    CHILD_TABLE    CHILD_COLUMN    CHILD_CONSTRAINT    PARENT_TABLE    PARENT_CONSTRAINT

    -------------  --------------  ------------------  --------------  -----------------

    EMPLOYEES      JOB_ID          EMP_JOB_FK          JOBS            JOB_ID_PK

    ```

    1 rows selected


