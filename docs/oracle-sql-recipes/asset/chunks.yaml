    ## 8-8\. Handling Nulls in Numeric Calculations


    ### Problem

    You are performing arithmetic and other calculations on data that may contain
    `NULL` values. You want to ensure your results are valid and not affected by the
    `NULL` data.


    ### Solution

    Oracle strictly adheres to ternary logic rules when any arithmetic or mathematical
    operation involves a `NULL` value. In lay terms, that means any calculation that
    operates on an unknown value returns an unknown result. Any addition, subtraction,
    multiplication, or other calculation involving `NULL` will always return `NULL`.
    When you want to deal with `NULL` values in another way, the key is to override
    normal Oracle behavior by intercepting the `NULL` values and substituting your
    desired alternative.


    Our third option is `MAXVALUE 999999`. We’ve used this as a purely arbitrary limit
    to the odd numbers we’ll generate. Using the `MAXVALUE` option is often done to
    suit particular business requirements.


    The fourth option is `NOCYCLE`. This instructs Oracle to halt issuing any new
    sequence values once the `MAXVALUE` threshold is reached. Oracle returns the error
    shown next when a sequence is exhausted and `NOCYCLE` has been specified.


    `ORA-08004: sequence ODD_NUMBER_GENERATOR.NEXTVAL exceeds MAXVALUE and cannot
    be instantiated`


    This would be especially important in cases like our job control process, as we
    wouldn’t necessarily want to resubmit the same job number again.


    Our second-last option is `NOCACHE`, which instructs Oracle not to precalculate
    and cache any sequence values for this sequence. By default, 20 such values are
    generated and cached, which helps to speed up concurrent rapid access to sequence
    values. The downside of caching is that cached values may be lost or discarded
    if Oracle crashes, causing the sequence to appear to jump a gap and start handing
    out number beyond the previously cached block. Normally, you should never code
    your logic to rely on every sequence number being generated. After all, transactions
    can fail or roll back for many reasons, and Oracle will never try to backtrack
    and use a sequence value missed due to a lost cache, regardless of the `CACHE`/`NOCACHE`
    setting. By using the `NOCACHE` option, at least we won’t skip values due to recovery
    processes.


    Lastly, we issued the `ORDER` option when creating our sequence. This means that
    sequence values will be handed out to callers in order of their execution of the
    `NEXTVAL` pseudocolumn. With the `ORDER` option, Oracle can reorder requests for
    processing and performance reasons. Again, it makes sense not to rely on this
    unless strictly necessary: we’re using this in our recipe to indicate that you
    want jobs processed in order.


    For our recipe, we’ll tackle the problem of attempting to calculate the total
    annual salary plus commission for all staff in the `HR.EMPLOYEES` table. The next
    SQL statement overrides Oracle’s default `NULL` arithmetic, providing an answer
    both the business and employees would deem correct.


    ```sql

    select employee_id, job_id, salary * (1 + nvl(commission_pct,0)) final_pay from
    hr.employees;

    ```


    Our results are meaningful for both sales representatives, with a `JOB_ID` of
    `SA_REP`, and for non-sales representatives.


    `EMPLOYEE_ID JOB_ID FINAL_PAY`


    `----------- - --------- ----------`


    `199 SH_CLERK 2600`


    `200 AD_ASST 4400`


    `201 MK_MAN 13000`


    `...`


    `210 SA_REP 4375`


    `211 SA_REP 4375`


    `212 SA_REP 4375`


    `...`


    ### How It Works

    Our recipe relies on the `NVL` function to substitute an alternative whenever
    the expression or column in question evaluates to `NULL`. For our purposes, we’ve
    passed `NVL` the `COMMISSION_PCT` column, so that employees who aren’t on commission
    don’t receive a final pay of `NULL`. It would be hard to pay the mortgage or buy
    groceries with that kind of salary.


    Without our intervention, the calculation for `FINAL_PAY` would sorely disappoint
    some of the employees. The next SQL statement shows the strict behavior of our
    calculation if we don’t intervene to handle the `NULL` values.


    ```sql

    select employee_id, job_id, salary * (1 + commission_pct) final_pay from hr.employees;

    ```'
