    (not shown in this recipe). Astute readers will realize that this means our recipe
    could have included a general ORDER BY clause that sorted the data for presentation
    in a different order from the HIRE_DATE ordering used for the LAG function. This
    gives you the most flexibility to handle general ordering and analytic lag and
    lead in different ways for the same statement. We’ll show an example of this later
    in this chapter. And remember, you should never rely on the implicit sorting that
    analytic functions use. This can and will change in the future, so you are best
    advised to always include ORDER BY for sorting wherever explicitly required.


    The LEAD function works in a nearly identical fashion to LAG, but instead tracks
    following rows rather than preceding ones. We could rewrite our recipe to show
    hires along with the HIRE_DATE of the next employee, and a similar elapsed-time
    window between their employment dates, as in this SELECT


    statement.


    select first_name, last_name, hire_date,


    lead(hire_date, 1, sysdate) over (order by hire_date) as Next_Hire_Date, lead(hire_date,
    1, sysdate) over (order by hire_date) - hire_date


    as Days_Between_Hires


    from hr.employees;


    The pattern of dates is very intuitive now that you’ve seen the LAG example. With
    LEAD, the key difference is the effect of the default value in the third parameter.


    FIRST_NAME LAST_NAME HIRE_DATE NEXT_HIRE DAYS_BETWEEN


    **----------- ---------- --------- --------- ------------**


    **Steven King 17-JUN-87 17-SEP-87 92**


    **Jennifer Whalen 17-SEP-87 21-SEP-89 735**


    Neena Kochhar 21-SEP-89 03-JAN-90 104


    Alexander Hunold 03-JAN-90 21-MAY-91 503


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA


    Bruce Ernst 21-MAY-91 13-JAN-93 603


    ...


    David Lee 23-FEB-00 08-MAR-00 14


    Steven Markle 08-MAR-00 24-MAR-00 16


    Sundar Ande 24-MAR-00 21-APR-00 28


    Amit Banda 21-APR-00 21-APR-00 0


    Sundita Kumar 21-APR-00 21-APR-09 3287.98


    107 rows selected.


    In contrast to LAG, where the default provides a notional starting point for the
    first row’s comparison, LEAD uses the default value to provide a hypothetical
    end point for the last row in the forward-looking chain. In this recipe, we are
    comparing how many days have elapsed between employees being hired. It makes sense
    for us to compare the last employee hired (in this case, Sundita Kumar) with the
    current date using the SYSDATE function. This is a quick and easy finishing flourish
    to calculate the days that have elapsed since hiring the last employee.


    2-12\. Assigning Ranking Values to Rows in a Query Result


    Problem'
  trans: "\n## 第 2 章 ■ 数据汇总与聚合\n\nNeena Kochhar 21-SEP-89（待定）\n\nAlexander Hunold\
    \ 03-JAN-90（待定）\n\nBruce Ernst 21-MAY-91（待定）\n\n...\n\n随后处理分析函数，提供您所看到的结果。我们的方案使用\
    \ `LAG` 函数来比较当前行结果与前一行的结果。理解 `LAG` 的最佳方式是了解其通用格式，其形式如下：\n\n`lag (列或表达式, 前移位数,\
    \ 首行默认值)`\n\n`列或表达式` 基本不言自明，因为这是您希望 `LAG` 操作的表数据或计算结果。`前移位数` 部分表示 `LAG` 应参照的、相对于当前行的前几行。在我们的例子中，值\
    \ '1' 表示当前行的前一行。`LAG` 的默认值指定当没有“第零行”时，应使用什么值作为首行的参考值。我们选择了一个任意的日期 01-JUN-1987\
    \ 作为组织成立的假想日期。您可以在此处使用任何日期、日期计算或返回日期的函数。\n\n如果您未指定首行的参考值，Oracle 将提供一个 `NULL` 值。\n\
    \n接着，`OVER` 分析子句规定了应用分析函数时数据的排序方式，以及将数据分割为窗口或子集的任何分区（本方案中未展示）。细心的读者会意识到，这意味着我们的方案本可以包含一个通用的\
    \ `ORDER BY` 子句，该子句可以按照与 `LAG` 函数所使用的 `HIRE_DATE` 排序不同的顺序对数据进行排序呈现。这为您处理通用排序以及同一语句中不同的分析滞后和超前需求提供了最大的灵活性。我们将在本章后面展示一个这样的示例。请记住，您绝不应依赖分析函数使用的隐式排序。这种方式未来可能而且将会改变，因此强烈建议您在任何明确需要排序的地方始终包含\
    \ `ORDER BY` 子句。\n\n### LEAD 函数\n\n`LEAD` 函数的工作方式与 `LAG` 几乎完全相同，但它跟踪的是后续行而非前序行。我们可以改写我们的方案，以显示员工的雇佣信息以及下一位员工的\
