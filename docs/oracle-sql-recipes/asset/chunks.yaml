    ■ **Note** See recipe 18-5 for full details on dropping a table.


    How It Works


    In Oracle, you can rename many different objects such as:


    • Tables


    • Columns


    • Indexes


    • Constraints


    • Triggers


    Renaming a table before you drop it is a common practice because it gives you
    a quick way to recover in the event the table is still being used. Another good
    reason to rename an object is to make sure it conforms to your database naming
    standards.


    Here are some brief examples showing how to rename other object types. The following
    code renames one of the PRODUCTS table’s columns from PRODUCT_ID to PRODUCT_NO:
    alter table products rename column product_id to product_no;


    The next line renames an index from PRODID to PROD_IDX1:


    alter index prodid rename to prod_idx1;


    Similarly, you can rename a constraint. The next line of code renames a constraint
    from MAST_CON to MAST_FK1:


    alter table details rename constraint mast_con to mast_fk1;


    The next example renames a trigger from F_SHIPMENTS_BU_TR1 to F_AU_TR2: alter
    trigger f_shipments_bu_tr1 rename to f_au_tr2;


    Note that it is possible to create two objects within the same schema with the
    same name. For example, you can create a table and an index in the same schema
    with the same name. However, you can’t create a table and a view with the same
    name within the same schema.


    To understand which objects can (or cannot) be created with the same name within
    a schema, you must understand the concept of a namespace. A *namespace* is a grouping
    of objects within a schema in which no two objects can have the same name. Objects
    in different groupings (that is, different namespaces) within a schema can have
    the same name.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ OBJECT MANAGEMENT


    The following objects share the same namespace within a schema:


    • tables


    • views


    • materialized views


    • private synonyms


    • sequences


    • procedures


    • functions


    • packages


    • user defined types


    Each of the follow objects has its own namespace within a schema:


    • indexes


    • constraints


    • triggers


    • clusters


    • private database links


    • dimensions


    Thus it is possible to create a trigger with the same name as a function or procedure.
    However, a table and a view are in the same namespace and therefore can’t have
    the same name. Each schema has its own namespace for the objects that it owns.
    Two different schemas can therefore create a table with the same name.


    These objects each have their own namespaces within a database:


    • roles


    • public synonyms


    • public database links


    • tablespaces


    • profiles


    • initialization files (spfile and init.ora)'
  trans: '# 全局临时表


    全局临时表存储仅存在于会话或事务期间的会话私有数据。一旦创建了临时表，它就会一直存在，直到你将其删除为止。换句话说，临时表的定义是永久的；只是其中的数据是短暂的。


    你可以通过查询 `DBA/ALL/USER_TABLES` 的 `TEMPORARY` 列来查看一个表是否是临时表：

    ```sql

    select table_name, temporary from user_tables;

    ```

    临时表在 `TEMPORARY` 列中标记为 `Y`。普通表在 `TEMPORARY` 列中标记为 `N`。


    当你在临时表中创建记录时，空间是在你的默认临时表空间中分配的。你可以通过运行以下 SQL 语句来验证这一点：

    ```sql

    select username, contents, segtype from v$sort_usage;

    ```

    如果你正在处理大量行，并且在选择性地检索行时需要更好的性能，你可能需要考虑在临时表的相应列上创建索引：

    ```sql

    create index temp_index on temp_output(temp_row);

    ```

    使用 `DROP TABLE` 命令来删除临时表：

    ```sql

    drop table temp_output;

    ```


    ## 临时表与重做


    对全局临时表的数据块所做的更改不会生成重做数据。但是，针对临时表的事务会生成回滚数据。由于回滚数据会产生重做，因此与临时表的事务相关联会有一些重做数据。你可以通过启用统计跟踪（更多详情请参见技巧
    19-7）并在向临时表插入记录时查看重做大小来验证这一点：

    ```sql

    SQL> set autotrace on

    ```

    接下来向临时表中插入几条记录：

    ```sql

    insert into temp_output values(1);

    insert into temp_output values(1);

    ```

    以下是部分输出片段（仅显示重做大小）：`140 redo size`


    临时表的重做负载小于普通表，因为生成的重做仅与临时表事务的回滚数据相关。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 18 章 ■ 对象管理


    ## 18-3. 移动表


    ### 问题

    你需要将一个表移动到不同的表空间。


    ### 解决方案

    使用 `ALTER TABLE MOVE` 语句将表从一个表空间移动到另一个表空间。此示例将 `PARTIES` 表移动到 `MTS` 表空间。

    ```sql

    alter table parties move tablespace mts;

    ```

    你可以通过查询 `USER_TABLES` 来验证表是否已移动：

    ```sql

    select table_name, tablespace_name from user_tables where table_name=''PARTIES'';

    ```

    ```

    TABLE_NAME           TABLESPACE_NAME

    -------------------- --------------------

    PARTIES              MTS

    ```


    ### 工作原理

    有时你需要将表从一个表空间移动到另一个表空间。可能存在管理问题，或者表的使用方式与最初预期不同，出于组织上的考虑，将表放在不同的表空间更合理。


    当你移动一个表时，它的所有索引都会变得不可用。这是因为表的索引结构中包含 `ROWID`。表的 `ROWID` 包含有关物理位置的信息。由于当表从一个表空间移动到另一个表空间时，表的
    `ROWID` 会发生变化（因为表行现在物理上位于不同的数据文件中），表上的任何索引都包含不正确的信息。要重建索引，请使用 `ALTER INDEX ...
    REBUILD` 命令。


    #### Oracle Rowid

    每个表中的每一行都有一个地址。行的地址由以下组合确定：

    * 数据文件号

    * 块号

    * 行在块内的位置

    * 对象号


    可以通过查询 `ROWID` 伪列来显示表中某一行的地址。例如：

    ```sql

    select rowid, emp_id from emp;

    ```

    这是一些示例输出：

    ```

    ROWID              EMP_ID

    ------------------ ----------

    AAAFWXAAFAAAAlWAAA 1

    ```

    `ROWID` 伪列值并非物理存储在数据库中。Oracle 在你查询时计算其值。`ROWID` 内容显示为 base 64 值，可包含字符 `A-Z`、`a-z`、`0-9`、`+`
    和 `/`。你可以通过 `DBMS_ROWID` 包将 `ROWID` 值转换为有意义的信息。


    例如，要显示行存储所在的相对文件号，请执行以下语句：

    ```sql

    select dbms_rowid.rowid_relative_fno(rowid), emp_id from emp;

    ```

    这是一些示例输出：

    ```

    DBMS_ROWID.ROWID_RELATIVE_FNO(ROWID) EMP_ID

    ------------------------------------ ----------

    5                                    1

    ```

    `ROWID` 值可用于 SQL 语句的 `SELECT` 和 `WHERE` 子句中。在大多数情况下，`ROWID` 唯一标识一行。但是，不同表中的行可能存储在同一个簇中，因此可能包含具有相同
    `ROWID` 的行。


    ## 18-4. 重命名对象


    ### 问题

    你的模式中有一个过时的表。在删除该表之前，你想先重命名它，看看是否有人会抱怨无法再访问它。


    ### 解决方案

    使用 `ALTER TABLE ... RENAME` 语句重命名表。此示例将表从 `PRODUCTS` 重命名为 `PRODUCTS_OLD`：

    ```sql

    alter table products rename to products_old;

    ```

    在你确定该表不再被使用后，可以将其删除：

    ```sql

    drop table products_old;

    ```

    > **注意** 有关删除表的完整详细信息，请参见技巧 18-5。


    ### 工作原理

    在 Oracle 中，你可以重命名许多不同的对象，例如：

    * 表

    * 列

    * 索引

    * 约束

    * 触发器


    在删除表之前重命名它是一种常见做法，因为它为你提供了一种快速恢复的方法，以防该表仍在被使用。重命名对象的另一个好理由是确保它符合你的数据库命名标准。


    以下是一些简短的示例，展示了如何重命名其他对象类型。以下代码将 `PRODUCTS` 表的列之一从 `PRODUCT_ID` 重命名为 `PRODUCT_NO`：

    ```sql

    alter table products rename column product_id to product_no;

    ```

    下一行将索引从 `PRODID` 重命名为 `PROD_IDX1`：

    ```sql

    alter index prodid rename to prod_idx1;

    ```

    同样地，你可以重命名约束。下一行代码将约束从 `MAST_CON` 重命名为 `MAST_FK1`：

    ```sql

    alter table details rename constraint mast_con to mast_fk1;

    ```

    下一个示例将触发器从 `F_SHIPMENTS_BU_TR1` 重命名为 `F_AU_TR2`：

    ```sql

    alter trigger f_shipments_bu_tr1 rename to f_au_tr2;

    ```

    请注意，在同一个模式中创建两个同名的对象是可能的。例如，你可以在同一个模式中创建一个表和一个索引，并赋予它们相同的名称。但是，你不能在同一个模式中创建一个表和一个视图并赋予它们相同的名称。


    要理解哪些对象可以在模式内以相同名称创建（或哪些不能），你必须理解命名空间的概念。*命名空间* 是模式内对象的分组，其中不能有两个对象具有相同的名称。模式内不同分组（即不同命名空间）中的对象可以具有相同的名称。


    以下对象在模式内共享相同的命名空间：

    * 表

    * 视图

    * 物化视图

    * 私有同义词

    * 序列

    * 存储过程

    * 函数

    * 包

    * 用户定义类型


    以下每个对象在模式内都有自己的命名空间：

    * 索引

    * 约束

    * 触发器

    * 簇

    * 私有数据库链接

    * 维度


    因此，创建一个与函数或过程同名的触发器是可能的。然而，表和视图位于同一个命名空间中，因此不能同名。每个模式对于其拥有的对象都有自己的命名空间。因此，两个不同的模式可以创建同名的表。


    这些对象在数据库中各自拥有自己的命名空间：

    * 角色

    * 公共同义词

    * 公共数据库链接

    * 表空间

    * 配置文件

    * 初始化文件 (`spfile` 和 `init.ora`)'
