    NEXT_SALE PREV_SALE


    ---------- ----------


    1 0


    10 1


    10 10


    10 10


    14 10


    14 14


    15 14


    19 15


    …


    Starting with the anchor value of 0 in the lag, we see the day of the month for
    a sale as NEXT_SALE, and the day of the previous sale as PREV_SALE. You can probably
    already visually spot the gaps, but it’s much easier to let Oracle do that for
    you too. This is where our outer query does its very simple arithmetic.


    The driving query over the SALESDAYS subquery selects the PREV_SALE and NEXT_SALE
    values from the results, based on this predicate.


