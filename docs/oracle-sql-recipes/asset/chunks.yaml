    as the HR.EMPLOYEES table. We create these tables, EMPA and EMPB, with the next
    CREATE TABLE statements.


    create table hr.empa


    as


    select *


    from hr.employees


    where employee_id < 175;


    create table hr.empb


    as


    select *


    from hr.employees


    where employee_id > 125;


    The EMPLOYEE_ID cutoff chosen is arbitrary and was selected only to ensure there
    were not only some duplicates in the two tables, but also some rows unique to
    each table. We can quickly prove that our tables have different data with the
    next two SQL statements.


    select min(employee_id), max(employee_id), count(*)


    from hr.empa;


    MIN(EMPLOYEE_ID) MAX(EMPLOYEE_ID) COUNT(*)


    ---------------- ---------------- ----------


    100 174 75


    select min(employee_id), max(employee_id), count(*)


    from hr.empb;


    MIN(EMPLOYEE_ID) MAX(EMPLOYEE_ID) COUNT(*)


    ---------------- ---------------- ----------


    126 212 84


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ COMMON QUERY PATTERNS


    So we’ve established our subsidiary tables and can see they have overlapping,
    but in places different, data. Our solution uses the MINUS operation to bring
    the tables in to synchronization in the next two statements.


    insert into hr.empa


    select *


    from hr.empb


    minus


    select *


    from hr.empa;


    insert into hr.empb


    select *


    from hr.empa


    minus


    select *


    from hr.empb;


    With our synchronization performed, a quick check shows we seem to now have identical
    sets of data.


    select min(employee_id), max(employee_id), count(*)


    from hr.empa;


    MIN(EMPLOYEE_ID) MAX(EMPLOYEE_ID) COUNT(*)'
  trans: '# 第 5 章 ■ 常用查询模式


    ***图 5-3.** 第二个选择更新被阻塞，等待会话 1*


    高亮显示的行表明第二个会话处于 `WAIT` 状态，在第一个会话提交或回滚其工作之前，它被阻塞无法执行任何操作。一旦我们在会话 1 中执行更新并提交结果，阻塞条件就会清除，第二个会话获得它想要的排他行级事务锁，进而可以执行其预期的更新。图
    5-4 显示了已清除的 `WAIT` 状态，以及现在持有锁的第二个会话。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图 21](img/index-165_1.png)


    ***图 5-4.** 已从等待状态清除，第二个选择更新现在持有一个排他锁*


    通过这种方式，在那些无法避免锁定的特定情况下，你可以对 Oracle 中的锁定采取显式的悲观控制。


    > **注意：** 虽然这种方法可能会让你的上司高兴，但你可能需要随着时间的推移，温和地向他/她普及 Oracle 的伟大技术，特别是非阻塞能力——读者不会阻塞写者，并且每个人都能获得数据的一致视图。他们第一次可能不想听，但请在交谈中不断提及，“老板，您当初选择购买一个能实现这种功能的数据库，真是太明智了。”
    这样，他们的自尊心就会开始为你服务，而不是与你作对，你就可以尽可能避免使用这些悲观锁定技术了。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 5-12. 同步两个表的内容


    ### 问题


    你管理一个系统，其中维护着两个或多个结构相同的表，但每个表只存储了另一个表的一部分行。你需要同步这些表，使它们各自包含完整的行集合。


    ### 解决方案


    表同步是一个有无数潜在解决方案的问题。Oracle 所有基本的 SQL 功能都可以用来比较、插入或删除行。对于我们的方案，我们将尝试使用一种更优雅的同步方法，这种方法在急于用程序化方式解决问题的喧嚣中常常被忽视。


    与其在 SQL 或 PL/SQL 中编写复杂的循环、测试等逻辑，Oracle 的 `MINUS` 集合操作符可以以集合的方式确定两个数据集之间的差异。


    为了说明我们的方案，我们设想公司有两个子公司，每个子公司都在结构与 `HR.EMPLOYEES` 表相同的表中跟踪一部分员工子集。我们用以下 `CREATE
    TABLE` 语句创建这些表 `EMPA` 和 `EMPB`。


    ```sql

    create table hr.empa

    as

    select *

    from hr.employees

    where employee_id < 175;


    create table hr.empb

    as

    select *

    from hr.employees

    where employee_id > 125;

    ```


    选择的 `EMPLOYEE_ID` 截止值是任意的，只是为了确保两个表中不仅有一些重复的行，也有一些每个表独有的行。我们可以通过接下来的两个 SQL 语句快速证明我们的表数据不同。


    ```sql

    select min(employee_id), max(employee_id), count(*)

    from hr.empa;


    MIN(EMPLOYEE_ID) MAX(EMPLOYEE_ID) COUNT(*)

    ---------------- ---------------- ----------

    100              174              75


    select min(employee_id), max(employee_id), count(*)

    from hr.empb;


    MIN(EMPLOYEE_ID) MAX(EMPLOYEE_ID) COUNT(*)

    ---------------- ---------------- ----------

    126              212              84

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    至此，我们已经建立了子公司表，并看到它们的数据有重叠，但在某些地方是不同的。我们的解决方案使用 `MINUS` 操作，通过下面的两个语句使表达到同步。


    ```sql

    insert into hr.empa

    select *

    from hr.empb

    minus

    select *

    from hr.empa;


    insert into hr.empb

    select *

    from hr.empa

    minus

    select *

    from hr.empb;

    ```


    同步执行后，快速检查显示我们现在似乎拥有了相同的数据集。


    ```sql

    select min(employee_id), max(employee_id), count(*)

    from hr.empa;


    MIN(EMPLOYEE_ID) MAX(EMPLOYEE_ID) COUNT(*)

    ---------------- ---------------- ----------

    ```'
- fmt: "# SQL 查询示例与数据同步\n\n```sql\nselect min(employee_id), max(employee_id), count(*)\n\
    from hr.empb;\n```\n\n```\nMIN(EMPLOYEE_ID) MAX(EMPLOYEE_ID) COUNT(*)\n----------------\
    \ ---------------- ----------\n             100              212        110\n\
    ```\n\nNaturally, you are welcome to browse the entire set of data in both tables,\
    \ but you’ll be glad to know you won’t be disappointed and all of the data will\
    \ show as synchronized.\n\n## How It Works\n\nThis recipe uses the `MINUS` operation\
    \ twice, once in each direction. First, we work on the table `HR.EMPA`, using\
    \ an `INSERT INTO … SELECT` method. It’s the `SELECT` that is key, as shown in\
    \ the next statement fragment.\n\n```sql\nselect *\nfrom hr.empb\nminus\nselect\
    \ *\nfrom hr.empa;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    You can run this in isolation, to see how the contents of `HR.EMPA` itself are\
    \ “subtracted” from the contents of `HR.EMPB` to leave us with the rows unique\
    \ to `HR.EMPB`. These sample results are abbreviated to save space.\n\n```\nEMPLOYEE_ID\
    \ FIRST_NAME AST_NAME EMAIL …\n----------- ---------- -------- --------\n    \
    \    175 Alyssa     Hutton   AHUTTON …\n        176 Jonathon   Taylor   JTAYLOR\
    \ …\n        177 Jack       Livingston JLIVINGS …\n        178 Kimberely  Grant\
    \    KGRANT …\n        179 Charles    Johnson  CJOHNSON …\n…\n```\n\nThese results\
    \ from the `MINUS` operation are then fed into the `INSERT`, and `HR.EMPA` then\
    \ has all of its original rows, plus all those rows `HR.EMPB` had that were not\
    \ present in `HR.EMPA`.\n\nWe then simply reverse the order of data flow in the\
    \ second statement, using the `MINUS` operation to select only those rows in `HR.EMPA`\
    \ that were missing from `HR.EMPB`, and insert them appropriately. It doesn’t\
    \ matter in which order these two `INSERT` statements are performed, so long as\
    \ they both complete successfully.\n\nYou can also replace the second SQL statement\
    \ with an alternative. Because we know `HR.EMPA` has the complete set of data\
    \ after the first `INSERT`, we can remove all the data from `HR.EMPB` and copy\
    \ everything over from `HR.EMPA` without the need for any predicates or union\
    \ operators. The next code shows the necessary statements for the second step.\n\
    \n```sql\ntruncate table HR.EMPB;\ninsert into HR.EMPB select * from HR.EMPA;\n\
    ```\n\nThis can sometimes be faster, as you avoid the implied sort that using\
    \ the `MINUS` operator means.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# PART 2\n\n## Data Types and Their Problems\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 6\n\n## Working with Date and Time Values\n\nThis chapter deals with\
    \ recipes for date, time, and related temporal datatypes. Queries involving dates\
    \ and times are very common in almost all databases. Working with dates and times\
    \ is also very strange when compared to other forms of data, due to the long history\
    \ (pardon the pun) of how our concepts of dates, hours, minutes, seconds, days,\
    \ months and years came about. For instance, our division of minutes into 60 seconds,\
    \ hours into sixty minutes, and days into two 12-hour blocks is derived from ancient\
    \ Sumerian and Babylonian tradition. And they got the notion of a base-12 for\
    \ counting hours and other things by using the segments of the four fingers (not\
    \ the thumb) of one hand.\n\nCalendars around the world stem from various religious\
    \ influences, the whims of emperors and kings in different regions, and more.\
    \ To put the icing on the cake, when you think you understand dates and times\
    \ at a fundamental level, just ask astronomers for their perspective. They’ll\
    \ tell you there are at least three different measurements for the length of a\
    \ day—depending on whether you’re measuring rotation of the Earth; the Earth’s\
    \ time to return to point to the same fixed stars in the night sky; and, strangest\
    \ of all, simply considering the day as an equation relating to angles in space.\n\
    \nIt is therefore no surprise that dealing with date and time values, performing\
    \ temporal arithmetic, and answering supposedly simple date and time questions\
    \ can often lead to very tricky problems—with or without Oracle."
