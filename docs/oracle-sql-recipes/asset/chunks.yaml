    ```sql

    ''<td class="empty" width="'' ||

    to_char(100 - round(100 * salary / maxsalary)) ||

    ''%">'' || chr(38) || ''nbsp;</td></tr>'' || chr(10) ||

    ''</table></td></tr>'' || chr(10) ||

    ...

