    \ ---------- -------- ----------------\n2423     7            3290       65  \
    \       33       2145\n2426     5            3252       25         29       725\n\
    2427     7            2522       40         22       880\n2428     11        \
    \   3173       86         28       2408\n2429     10           3165       36 \
    \        67       2412\n. . .\n2418     6            3150       17         37\
