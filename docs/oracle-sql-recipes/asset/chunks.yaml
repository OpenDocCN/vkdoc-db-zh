- fmt: '# CHAPTER 3: Querying From Multiple Tables


    ## 3-2. Stacking Query Results Vertically


    ### Problem

    You want to combine the results from two `SELECT` statements into a single result
    set.


    ### Solution

    Use the `UNION` operator. `UNION` combines the results of two or more queries
    and removes duplicates from the entire result set. In Oracle’s mythical company,
    the employees in the `EMPLOYEES_ACT` table need to be merged with employees from
    a recent corporate acquisition. The recently acquired company’s employee table
    `EMPLOYEES_NEW` has the same exact format as the existing `EMPLOYEES_ACT` table,
    so it should be easy to use `UNION` to combine the two tables into a single result
    set as follows:


    ```sql

    select employee_id, first_name, last_name from employees_act;

    ```


    ```

    EMPLOYEE_ID FIRST_NAME LAST_NAME

    ---------------------- -------------------- -------------------------

    102 Lex De Haan

    105 David Austin

    112 Jose Manuel Urman

    118 Guy Himuro

    119 Karen Colmenares

    205 Shelley Higgins

    6 rows selected

    ```


    ```sql

    select employee_id, first_name, last_name from employees_new;

    ```


    ```

    EMPLOYEE_ID FIRST_NAME LAST_NAME

    ---------------------- -------------------- -------------------------

    101 Neena Kochhar

    105 David Austin

    112 Jose Manuel Urman

    171 William Smith

    201 Michael Hartstein

    5 rows selected

    ```


    ```sql

    select employee_id, first_name, last_name from employees_act

    union

    select employee_id, first_name, last_name from employees_new

    order by employee_id;

    ```


    ```

    EMPLOYEE_ID FIRST_NAME LAST_NAME

    `---------------------- -------------------- -------------------------`

    `101 Neena Kochhar`

    `102 Lex De Haan`

    `105 David Austin`

    `112 Jose Manuel Urman`

    `118 Guy Himuro`

    `119 Karen Colmenares`

    `171 William Smith`

    `201 Michael Hartstein`

    `205 Shelley Higgins`

    9 rows selected

    ```


    Using `UNION` removes the duplicate rows. You can have one `ORDER BY` at the end
    of the query to order the results. In this example, the two employee tables have
    two rows in common (some people need to work two or three jobs to make ends meet!),
    so instead of returning 11 rows, the `UNION` query returns nine.


    ### How It Works

    Note that for the `UNION` operator to remove duplicate rows, all columns in a
    given row must be equal to the same columns in one or more other rows. When Oracle
    processes a `UNION`, it must perform a sort/merge to determine which rows are
    duplicates. Thus, your execution time will likely be more than running each `SELECT`
    individually. If you know there are no duplicates within and across each `SELECT`
    statement, you can use `UNION ALL` to combine the results without checking for
    duplicates.


    If there are duplicates, it will not cause an error; you will merely get duplicate
    rows in your result set.


    ## 3-3. Writing an Optional Join


    ### Problem

    You are joining two tables by one or more common columns, but you want to make
    sure to return all rows in the first table regardless of a matching row in the
    second. For example, you are joining the employee and department tables, but some
    employees lack department assignments.


    ### Solution

    Use an outer join. In Oracle’s sample database, the `HR` user maintains the `EMPLOYEES`
    and `DEPARTMENTS` tables; assigning a department to an employee is optional. There
    are 107 employees in the `EMPLOYEES` table. Using a standard join between `EMPLOYEES`
    and `DEPARTMENTS` only returns 106 rows, however, since one employee is not assigned
    a department. To return all rows in the `EMPLOYEES` table, you can use `LEFT OUTER
    JOIN` to include all rows in the `EMPLOYEES` table and matching rows in `DEPARTMENTS`,
    if any:


    ```sql

    select employee_id, last_name, first_name, department_id, department_name

    from employees

    left outer join departments using(department_id);

    ```


    ```

    EMPLOYEE_ID LAST_NAME FIRST_NAME DEPARTMENT_ID DEPARTMENT_NAME

    ------------ --------------- --------------- ----------------- -------------------

    200 Whalen Jennifer 10 Administration

    202 Fay Pat 20 Marketing

    201 Hartstein Michael 20 Marketing

    119 Colmenares Karen 30 Purchasing

    . . .

    206 Gietz William 110 Accounting

    205 Higgins Shelley 110 Accounting

    178 Grant Kimberely

    107 rows selected

    ```


    There are now 107 rows in the result set instead of 106; `Kimberely Grant` is
    included even though she does not currently have a department assigned.


    ### How It Works

    When two tables are joined using `LEFT OUTER JOIN`, the query returns all the
    rows in the table to the left of the `LEFT OUTER JOIN` clause, as you might expect.
    Rows in the table on the right side of the `LEFT OUTER JOIN` clause are matched
    when possible. If there is no match, columns from the table on the right side
    will contain `NULL` values in the results.


    As you might expect, there is a `RIGHT OUTER JOIN` as well (in both cases, the
    `OUTER` keyword is optional). You can rewrite the solution as follows:


    ```sql

    select employee_id, last_name, first_name, department_id, department_name

    from departments

    right outer join employees using(department_id);

    ```


    The results are identical, and which format you use depends on readability and
    style.


    The query can be written using the `ON` clause as well, just as with an equi-join
    (inner join). And for versions of Oracle before 9*i*, you must use Oracle’s somewhat
    obtuse and proprietary outer-join syntax with the characters `(+)` on the side
    of the query that is missing rows, as in this example:


    ```sql

    select employee_id, last_name, first_name, e.department_id, department_name

    from employees e, departments d

    where e.department_id = d.department_id (+);

    ```


    Needless to say, if you can use ANSI SQL-99 syntax, by all means do so for clarity
    and ease of maintenance.


    ## 3-4. Making a Join Optional in Both Directions


    ### Problem

    All of the tables in your query have at least a few rows that don’t match rows
    in the other tables, but you still want to return all rows from all tables and
    show the mismatches in the results. For example, you want to reduce the number
    of reports by including mismatches from both tables instead of having one report
    for each scenario.


    ### Solution'
  raw: 'When you use NATURAL JOIN, Oracle automatically joins the two tables on columns
    with the same name, which in this case is the DEPARTMENT_ID column. This makes
    the query even simpler and more readable, but has a very dark side in some circumstances.
    Here’s an example. The query we’ve just shown with NATURAL JOIN returns 32 rows,
    while the earlier queries that used USING or ON each return 106


    rows. What happened? Why the difference?


    If you look closely at the table definitions, you’ll see another common column
    called MANAGER_ID.


    NATURAL JOIN includes that column in the join criteria. Thus, the preceding query
    is really equivalent to the following:


    select employee_id, last_name, first_name, department_id, department_name from
    employees join departments using(department_id, manager_id)


    ;


    This join is almost certainly not what you want, as the MANAGER_ID in the EMPLOYEES
    table has a slightly different meaning than the MANAGER_ID in the DEPARTMENTS
    table: EMPLOYEES.MANAGER_ID is the employee’s manager, whereas DEPARTMENTS.MANAGER_ID
    is the manager of the entire department. As a result, the query does not return
    employees and their managers. Instead, it produces a list of employees whose department
    has the same manager as they do, which will not be the case in many organizations.


    Furthermore, a large number of departments in the DEPARTMENTS table do not have
    a manager assigned, thus the query using NATURAL JOIN will leave out employees
    who do have a reporting manager, but whose department does not have a manager
    assigned. Use NATURAL JOIN with caution!


    Later in this chapter, we’ll look at two techniques that can help you uncover
    these logical errors: using optional joins and dealing with NULL values in queries.


