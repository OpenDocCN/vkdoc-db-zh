  trans: "# 第 18 章 ■ 对象管理\n\n## 约束定义方法比较\n\n- 用户定义的名称和表空间；较不简单；定义使故障排除更容易。\n- 在列定义之后（行外）：可以对多个列进行操作。\n\
    - `ALTER TABLE 仅添加约束`：索引和约束分离；更复杂。\n- 在单独的语句（和文件）中管理约束与表创建脚本；可以对多个列进行操作。\n- `CREATE\
    \ INDEX`，`ALTER TABLE add constraint`：最复杂，维护更多，组件更多；因此您可以删除/禁用约束而不影响索引；可以对多个列进行操作。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 工作原理\n\n主键约束用于确保表中的每条记录都可以被唯一标识。一种常见的表设计技术是创建一个无意义的数字列来包含唯一生成的系统序列号（也称为代理键）。在代理键列上放置主键约束以确保其唯一性。\n\
    \n除了主键约束，我们还建议您在业务用户用于唯一标识记录的列（也称为逻辑键）上放置唯一键约束。同时使用代理键和逻辑键：\n- 允许您在单个数字列上高效地连接父子表；\n\
    - 允许更新逻辑键列而无需更改代理键。\n\n唯一键保证表中所定义列的唯一性。主键和唯一约束之间存在一些细微差别。每个表只能定义一个主键，但可以有多个唯一键。主键不允许其任何列包含空值，而唯一键允许空值。\n\
    \n与主键约束一样，创建唯一列约束有几种方法。此方法将 `UNIQUE` 关键字与列行内定义一起使用：\n```sql\ncreate table dept(dept_id\
    \ number, dept_desc varchar2(30) unique);\n```\n\n如果想显式命名约束，请使用 `CONSTRAINT` 关键字：\n\
    ```sql\ncreate table dept(dept_id number,\n    dept_desc varchar2(30) constraint\
    \ dept_desc_uk1 unique);\n```\n\n您还可以在行内添加表空间信息，用于为唯一约束自动创建的关联唯一索引：\n```sql\n\
    create table dept(dept_id number,\n    dept_desc varchar2(30) constraint dept_desc_uk1\n\
    \    unique using index tablespace prod_index);\n```\n\n**注意：**当您创建唯一键约束时，Oracle\
    \ 还会创建一个与该约束同名的唯一索引。\n\n与主键一样，唯一约束可以在列定义之外指定：\n```sql\ncreate table dept(dept_id\
    \ number,\n    dept_desc varchar2(30),\n    constraint dept_desc_uk1 unique (dept_desc)\
    \ using index tablespace prod_index);\n```\n\n您也可以通过修改表来添加唯一约束：\n```sql\nalter\
    \ table dept add constraint dept_desc_uk1 unique (dept_desc);\n```\n\n并且您可以在定义唯一键约束之前，在感兴趣的列上创建索引：\n\
    ```sql\ncreate index dept_desc_uk1 on dept(dept_desc);\n\nalter table dept add\
    \ constraint dept_desc_uk1 unique(dept_desc);\n```\n\n当处理大型数据集并且您希望能够在不删除关联索引的情况下禁用或删除唯一约束时，这可能很有帮助。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 18-14. 确保查找值存在\n\n###\
    \ 问题\n\n您有一条业务规则，规定一列的值必须始终在有效的值列表中。例如，在 `EMP` 表中输入的任何 `DEPT_ID` 都必须始终存在于主表 `DEPT`\
    \ 中。\n\n### 解决方案\n\n创建一个外键约束，以确保输入到外键列的值作为唯一键或主键值存在于父表中。创建外键约束有几种方法。以下在 `EMP`\
    \ 表的 `DEPT_ID` 列上创建了一个外键约束：\n```sql\ncreate table emp(\n    emp_id number,\n \
    \   name varchar2(30),\n    dept_id constraint emp_dept_fk references dept(dept_id));\n\
    ```\n\n请注意，`DEPT_ID` 的数据类型没有显式定义。它从被引用的 `DEPT` 表的 `DEPT_ID` 列派生数据类型。在定义列时，您也可以显式指定数据类型（无论是否定义外键）：\n\
    ```sql\ncreate table emp(\n    emp_id number,\n    name varchar2(30),\n    dept_id\
    \ number constraint emp_dept_fk references dept(dept_id));\n```\n\n外键定义也可以在 `CREATE\
    \ TABLE` 语句中的列定义之外指定：\n```sql\ncreate table emp(\n    emp_id number,\n    name\
    \ varchar2(30),\n    dept_id number,\n    constraint emp_dept_fk foreign key (dept_id)\
    \ references dept(dept_id)\n);\n```\n\n您还可以通过修改现有表来添加外键约束：\n```sql\nalter table\
    \ emp add constraint emp_dept_fk foreign key (dept_id)\n    references dept(dept_id);\n\
    ```\n\n**注意：**与主键和唯一键约束不同，Oracle 不会自动为外键列添加索引。您必须在外键列上显式创建索引。\n\n### 工作原理\n\n\
    外键约束用于确保列值包含在定义的值列表中。使用数据库约束是强制执行数据在插入或更新被允许之前必须是预定义值的一种有效方式。约束的优点在于，一旦启用，就无法输入违反给定约束的数据。\n\
    \n外键约束是一种将有效值列表存储在表中的技术。此技术适用于以下场景：\n- 值列表中的条目很多\n- 需要存储有关查找值的其他信息\n- 容易通过 SQL\
    \ 选择、插入、更新或删除查找值\n\n例如，您可能有一个 `STATES` 查找表，其中包含 `STATE_CODE`、`STATE_NAME`、`STATE_DESC`\
    \ 和 `REGION` 等列。您的业务规则可能是您有一个 `ADDRESSES` 表，其中包含一个 `STATE_CODE` 列，在此列中输入的任何值都必须存在于\
    \ `STATES` 表中。对于此场景，使用带有外键约束的单独表非常有效。\n\n如果您要检查的条件是一个不常更改的小列表，请考虑使用检查约束而不是外键约束（有关详细信息，请参阅配方\
    \ 18-15）。例如，如果您有一个列将始终定义为仅包含 `0` 或 `1`，则检查约束是一个高效的解决方案。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 18-15. 检查数据是否满足条件\n\n### 问题\n\n您有一条业务规则，规定一列必须包含 `0` 或 `1` 的值。您希望确保该业务规则不会被违反。\n\
    \n### 解决方案\n\n使用检查完整性约束为列定义 SQL 检查。创建检查约束有几种方法。例如，您可以在创建表时定义检查约束。以下定义了 `ST_FLG`\
    \ 列必须为 `0` 或 `1`：\n```sql\ncreate table emp(\n    emp_id number,\n    emp_name\
    \ varchar2(30),\n    st_flg number(1) CHECK (st_flg in (0,1))\n);\n```\n\n一个稍好一点的方法是给检查约束一个名称：\n\
    ```sql\ncreate table emp(\n    emp_id number,\n    emp_name varchar2(30),\n  \
    \  st_flg number(1) constraint st_flg_chk CHECK (st_flg in (0,1))\n);\n```\n\n\
    一个更具描述性的命名约束的方法是在约束名称中嵌入实际描述被违反条件的信息。例如：\n```sql\nCREATE table emp(\n    emp_id\
    \ number,\n    emp_name varchar2(30),\n    st_flg number(1) constraint \"st_flg\
    \ must be 0 or 1\" check (st_flg in (0,1))\n);\n```\n\n您还可以修改现有列以包含约束。该列不得包含任何违反正在启用的约束的值：\n\
    ```sql\nalter table emp add constraint \"st_flg must be 0 or 1\" check (st_flg\
    \ in (0,1));\n```\n\n### 工作原理"
- fmt: "# CHAPTER 18 ■ OBJECT MANAGEMENT\n\nA check constraint works well for lookups\
    \ when you have a short list of fairly static values, such as a column that can\
    \ be either a `Y` or `N`. In this situation, the list of values will most likely\
    \ not change and there is no other information that needs to be stored other than\
    \ the `Y` or `N`, so a check constraint is the appropriate solution.\n\nIf you\
    \ have a long list of values that needs to be periodically updated, then a table\
    \ and foreign key constraint would be a better solution (see recipe 18-14 for\
    \ details). If you have sophisticated business logic that must be validated, then\
    \ the application code would be more appropriate. A check constraint works well\
    \ for a business rule that must always be enforced and can be written with a simple\
    \ SQL expression.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nFor example,\
    \ if you could have a business rule where you want to ensure that an amount is\
    \ always greater than zero, you could use a check constraint:\n\n```sql\nalter\
    \ table sales add constraint \"sales_amt must be > 0\" check(sales_amt > 0);\n\
    ```\n\nThe check constraint must evaluate to a true or unknown (null) value in\
    \ the row being inserted or updated. You cannot use subqueries or sequences in\
    \ a check constraint. Also you cannot reference the SQL functions of `UID`, `USER`,\
    \ `SYSDATE` or `USERENV`, or the pseudo-columns of `LEVEL` or `ROWNUM`.\n\nAnother\
    \ common condition to check for is whether a column is null, and the `NOT NULL`\
    \ constraint should be used for this. The `NOT NULL` constraint can be defined\
    \ in several ways. The simplest technique is shown here:\n\n```sql\ncreate table\
    \ emp(\n    emp_id number,\n    emp_name varchar2(30) not null\n);\n```\n\nA slightly\
    \ better approach is to give the `NOT NULL` constraint a name that makes sense\
    \ to you:\n\n```sql\ncreate table emp(\n    emp_id number,\n    emp_name varchar2(30)\
    \ constraint emp_name_nn not null\n);\n```\n\nUse the `ALTER TABLE` command if\
    \ you need to modify a column for an existing table. For the following command\
    \ to work, there must not be any `NULL` values in the column being defined as\
    \ `NOT NULL`.\n\n```sql\nalter table emp modify(emp_name not null);\n```\n\nIf\
    \ there are currently `NULL` values in a column that is being defined as `NOT\
    \ NULL`, then either first update the column to a `NOT NULL` value or specify\
    \ a default value for the column:\n\n```sql\nalter table emp modify(emp_name default\
    \ 'not available');\n```\n\n## 18-16. Creating a Connection Between Databases\n\
    \n### Problem\n\nYou want to run SQL statements against a table in a remote database\
    \ while connected to a local database.\n\n### Solution\n\nUse a database link\
    \ to create a connection between two databases. You must use a naming method for\
    \ the database link to resolve the location of the remote database. Two common\
    \ methods used to resolve the location of the remote database are:\n\n- Easy connect\
    \ naming\n- Local naming\n\nThe `easy connect naming` method directly embeds the\
    \ location of the remote database into the database link. In this example, the\
    \ remote host is `OSS.EAST`, the port number of the remote listener is `1521`,\
    \ and the remote instance name is `BRDSTN`:\n\n```sql\ncreate database link mss\
    \ connect to e123 identified by e123\nusing 'oss.east:1521/BRDSTN';\n```\n\nThe\
    \ `CONNECT TO` and `IDENTIFIED BY` clauses identify the remote user and password\
    \ respectively. The remote user account doesn’t have to be the owner of the remote\
    \ objects. It can be a regular account with the privileges to access the remote\
    \ objects.\n\nThe `local naming` method resolves the remote service through entries\
    \ in a `tnsnames.ora` file. This file needs to be located in a directory that\
    \ the Oracle client library will look in when attempting to connect to a remote\
    \ database, such as the directory specified by the `TNS_ADMIN` operating system\
    \ variable. In this example, the TNS (Transparent Network Substrate, Oracle’s\
    \ network architecture) information is first placed in the `tnsnames.ora` file:\n\
    \n```\nmss =\n  (DESCRIPTION =\n    (ADDRESS = (PROTOCOL=TCP) (HOST=oss.east)(PORT=1521))\n\
    \    (CONNECT_DATA=(SERVICE_NAME=BRDSTN)(SERVER=DEDICATED)))\n```"
  raw: 'A check constraint works well for lookups when you have a short list of fairly
    static values, such as a column that can be either a Y or N. In this situation,
    the list of values will most likely not change and there is no other information
    that needs to be stored other than the Y or N, so a check constraint is the appropriate
    solution.


    If you have a long list of values that needs to be periodically updated, then
    a table and foreign key constraint would be a better solution (see recipe 18-14
    for details). If you have sophisticated business logic that must be validated,
    then the application code would be more appropriate. A check constraint works
    well for a business rule that must always be enforced and can be written with
    a simple SQL


    expression.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ OBJECT MANAGEMENT


    For example, if you could have a business rule where you want to ensure that an
    amount is always greater than zero, you could use a check constraint:


    alter table sales add constraint "sales_amt must be > 0" check(sales_amt > 0);
    The check constraint must evaluate to a true or unknown (null) value in the row
    being inserted or updated. You cannot use subqueries or sequences in a check constraint.
    Also you cannot reference the SQL functions of UID, USER, SYSDATE or USERENV,
    or the pseudo-columns of LEVEL or ROWNUM.


    Another common condition to check for is whether a column is null, and the NOT
    NULL constraint should be used for this. The NOT NULL constraint can be defined
    in several ways. The simplest technique is shown here:


    create table emp(


    emp_id number,


    emp_name varchar2(30) not null);


    A slightly better approach is to give the NOT NULL constraint a name that makes
    sense to you: create table emp(


    emp_id number,


    emp_name varchar2(30) constraint emp_name_nn not null);


    Use the ALTER TABLE command if you need to modify a column for an existing table.
    For the following command to work, there must not be any NULL values in the column
    being defined as NOT NULL.


    alter table emp modify(emp_name not null);


    If there are currently NULL values in a column that is being defined as NOT NULL,
    then either first update the column to a NOT NULL value or specify a default value
    for the column: alter table emp modify(emp_name default ''not available'');


    18-16\. Creating a Connection Between Databases


    Problem


    You want to run SQL statements against a table in a remote database while connected
    to a local database.


    Solution


    Use a database link to create a connection between two databases. You must use
    a naming method for the database link to resolve the location of the remote database.
    Two common methods used to resolve the location of the remote database are:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ OBJECT MANAGEMENT


    • Easy connect naming


    • Local naming


    The *easy connect naming* method directly embeds the location of the remote database
    into the database link. In this example, the remote host is OSS.EAST, the port
    number of the remote listener is 1521, and the remote instance name is BRDSTN:


    create database link mss connect to e123 identified by e123


    using ''oss.east:1521/BRDSTN'';


    The CONNECT TO and IDENTIFIED BY clauses identify the remote user and password
    respectively. The remote user account doesn’t have to be the owner of the remote
    objects. It can be a regular account with the privileges to access the remote
    objects.


    The *local naming* method resolves the remote service through entries in a tnsnames.ora
    file. This file needs to be located in a directory that the Oracle client library
    will look in when attempting to connect to a remote database, such as the directory
    specified by the TNS_ADMIN operating system variable. In this example, the TNS
    (Transparent Network Substrate, Oracle’s network architecture) information is
    first placed in the tnsnames.ora file:


    mss =


    (DESCRIPTION =


    (ADDRESS = (PROTOCOL=TCP) (HOST=oss.east)(PORT=1521))


    (CONNECT_DATA=(SERVICE_NAME=BRDSTN)(SERVER=DEDICATED)))'
  trans: "\n# 第 18 章 ■ 对象管理\n\n检查约束在处理查找表时表现良好，特别是当您有一个包含少量相对静态值的短列表时，例如某列只能取`Y`或`N`值。在这种情况下，值列表很可能不会改变，并且除了`Y`或`N`之外没有其他信息需要存储，因此检查约束是合适的解决方案。\n\
    \n如果您有一个需要定期更新的长值列表，那么使用表和外键约束会是更好的解决方案（详见方案 18-14）。如果您有必须验证的复杂业务逻辑，那么应用程序代码会更合适。对于必须始终强制执行且可以用简单\
    \ SQL 表达式编写的业务规则，检查约束很有效。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n例如，如果您有一个业务规则要确保金额始终大于零，您可以使用检查约束：\n\n```sql\nalter table sales add constraint\
    \ \"sales_amt must be > 0\" check(sales_amt > 0);\n```\n\n检查约束必须对插入或更新的行计算为真或未知（空值）结果。您不能在检查约束中使用子查询或序列。同时，也不能引用`UID`、`USER`、`SYSDATE`或`USERENV`等\
    \ SQL 函数，或者`LEVEL`、`ROWNUM`等伪列。\n\n另一个常见的检查条件是判断列是否为空，为此应使用`NOT NULL`约束。`NOT NULL`约束可以通过多种方式定义。最简单的技术如下所示：\n\
    \n```sql\ncreate table emp(\n    emp_id number,\n    emp_name varchar2(30) not\
    \ null\n);\n```\n\n一个稍好的方法是给`NOT NULL`约束起一个您认为有意义的名字：\n\n```sql\ncreate table\
    \ emp(\n    emp_id number,\n    emp_name varchar2(30) constraint emp_name_nn not\
    \ null\n);\n```\n\n如果您需要修改现有表的列，可以使用`ALTER TABLE`命令。要使以下命令生效，被定义为`NOT NULL`的列中必须不能有任何`NULL`值。\n\
    \n```sql\nalter table emp modify(emp_name not null);\n```\n\n如果当前被定义为`NOT NULL`的列中存在`NULL`值，那么要么先将该列更新为非空值，要么为该列指定一个默认值：\n\
    \n```sql\nalter table emp modify(emp_name default 'not available');\n```\n\n##\
    \ 18-16. 在数据库之间建立连接\n\n### 问题\n\n您希望在连接到本地数据库的同时，对远程数据库中的表运行 SQL 语句。\n\n### 解决方案\n\
    \n使用数据库链接在两个数据库之间建立连接。您必须使用一种命名方法来解析远程数据库的位置。两种常用于解析远程数据库位置的方法是：\n\n-   简单连接命名\n\
    -   本地命名\n\n`简单连接命名`方法将远程数据库的位置直接嵌入到数据库链接中。在此示例中，远程主机是`OSS.EAST`，远程监听器的端口号是`1521`，远程实例名称是`BRDSTN`：\n\
    \n```sql\ncreate database link mss connect to e123 identified by e123\nusing 'oss.east:1521/BRDSTN';\n\
    ```\n\n`CONNECT TO`和`IDENTIFIED BY`子句分别标识远程用户和密码。远程用户账户不必是远程对象的所有者，它可以是一个具有访问远程对象权限的普通账户。\n\
    \n`本地命名`方法通过`tnsnames.ora`文件中的条目解析远程服务。该文件需要位于 Oracle 客户端库在尝试连接到远程数据库时会查找的目录中，例如由操作系统变量`TNS_ADMIN`指定的目录。在此示例中，TNS（透明网络底层，Oracle\
    \ 的网络架构）信息首先被放置在`tnsnames.ora`文件中：\n\n```\nmss =\n  (DESCRIPTION =\n    (ADDRESS\
    \ = (PROTOCOL=TCP) (HOST=oss.east)(PORT=1521))\n    (CONNECT_DATA=(SERVICE_NAME=BRDSTN)(SERVER=DEDICATED)))\n\
    ```\n"
- fmt: '# CHAPTER 18: OBJECT MANAGEMENT


    ## Creating a Database Link


    Now the database link can be created by referencing the TNS information in the
    `tnsnames.ora` file:


    ```sql

    create database link mss connect to E123 identified by E123 using ''MSS'';

    ```


    To drop a database link, use the `DROP DATABASE LINK` command:


    ```sql

    drop database link mss;

    ```


    > **Note:** There are two other remote database name resolution methods— `directory
    naming` (LDAP) and `external naming`. See the *Oracle Database Net Services Administrator’s
    Guide* for details on how to implement this documentation is available at `http://www.oracle.com/technology`.


    ## How It Works


    A database link is nothing more than a named connection to another database. It
    enables you to access objects that exist in a different database. In other words,
    a database link allows you to perform `insert`, `update`, `delete`, and `select`
    statements on tables and views that exist in a remote database. The other database
    doesn’t need to be an Oracle database. However, you must use Oracle Heterogeneous
    Services to access non-Oracle databases.


    After you have created a database link, you can reference remote tables and views
    using the syntax `<REMOTE_OBJECT>@<DATABASE_link>`. This example selects a count
    from the remote view `INVENTORY_V`:


    ```sql

    select count(*) from inventory_v@mss;

    ```


    You can also reference a database link in a local view, synonym, or a materialized
    view to provide a transparency layer between the remote objects and the local
    objects. This example creates a local synonym that points at the remote `INVENTORY_V`
    view:


    ```sql

    create synonym inventory_v for inventory_v@mss;

    ```


    The following query will display information about database links for a user:


    ```sql

    select db_link,username,password,host from user_db_links;

    ```


    To view information on all database links in the database, query the `DBA_DB_LINKS`
    view. Use the `ALL_DB_LINKS` to view all database links your account has access
    to. Query the `USER_DB_LINKS` to show database links owned by your account.


    You can also create a public database link that is accessible to all users in
    the database. To create a public link, use the `PUBLIC` clause:


    ```sql

    create public database link mss connect to e123 identified by e123 using ''oss.east:1521/BRDSTN'';

    ```


    ## 18-17. Creating an Auto-incrementing Value


    ### Problem


    You want to be able to automatically increment a value used to populate a primary
    key in a table.


    ### Solution


    Create a sequence and then reference it in `INSERT` statements. The following
    example uses a sequence to populate the primary key value of a parent table, and
    then uses the same sequence to populate corresponding foreign key values in a
    child table:


    ```sql

    create sequence inv_seq;

    ```


    Now use the sequence in `INSERT` statements. The first time you access the sequence,
    use the `NEXTVAL` pseudo-column:


    ```sql

    insert into inv(inv_id, inv_desc) values (inv_seq.nextval, ''Book'');

    ```


    If you want to re-use that same sequence value, you can reference it via the `CURRVAL`
    pseudo-column.


    Next, a record is inserted into a child table that uses the same value for the
    foreign key column as its parent primary key value:


    ```sql

    insert into inv_lines(inv_line_id,inv_id,inv_item_desc) values (1, inv_seq.currval,
    ''Tome1'');

    insert into inv_lines(inv_line_id,inv_id,inv_item_desc) values (2, inv_seq.currval,
    ''Tome2'');

    ```


    ### How It Works


    A `sequence` is a database object that users can access to select unique integers.
    Sequences are typically used to generate integers for populating primary key and
    foreign key columns. A sequence is incremented by accessing it via a `SELECT`,
    `INSERT`, or `UPDATE` statements. Oracle guarantees that a sequence number will
    be unique when selected. No two sessions can select the same sequence number.


    If you don’t specify a starting number and a maximum number for a sequence, by
    default the starting number will be 1, the increment will be 1, and the maximum
    value will be `10^27`. This example specifies a starting value of 1000 and a maximum
    value of 1000000:'
