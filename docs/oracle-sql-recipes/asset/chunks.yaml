  trans: '# 第 5 章 ■ 常见查询模式


    ## ALL_TAB_COLUMNS 与 ALL_TAB_COLS


    细心的观察者会注意到，我们的解决方案是基于 `ALL_TAB_COLUMNS` 系统视图设计的。Oracle 还包含一个名为 `ALL_TAB_COLS`
    的系统视图。这两个视图看起来几乎一模一样，拥有相同的字段，但行数略有不同。那么，为何在本方案中选择 `ALL_TAB_COLUMNS` 呢？


    答案在于 Oracle 定义这两个视图时所使用的定义略有不同。`ALL_TAB_COLS` 系统视图包含了通常对用户或开发者不可见的隐藏列。由于我们的方案旨在查找最终用户日常使用的普通数据，我们可以合理地假设开发人员没有通过隐藏自己的列或滥用
    Oracle 系统控制的隐藏列来耍花招。


    到目前为止，本方案并未假设您将使用何种工具来配合解决方案工作。您可以愉快地在 `SQL*Plus`、`SQL Developer` 中运行第一条语句，或者通过可编程
    API 运行，并获取需要执行的第二组语句。同样，您可以使用任何工具来执行这些语句并查看结果，揭示丢失文本的藏身之处。但还可以实现一些额外的优化。例如，您可以将大部分逻辑封装在
    `PL/SQL` 函数或存储过程中，或者利用 `SQL*Plus` 等查询工具的格式化功能，使解决方案更加优雅。


    ## 5-10. 预测序列结束后的数据值和趋势


    ### 问题


    你需要从一个大型数据集中，预测信息在当前数据集范围之外的行为或趋势。


    ### 解决方案


    基于数据中的模式（例如两个数值之间的关系）来预测趋势并推断可能性，可以通过多种方式实现。最流行的技术之一是线性回归分析，Oracle 为此提供了众多适用于当代趋势分析算法的线性回归函数。


    作为 Oracle 数据库附带的示例模式的一部分，`SH` 模式下提供了一个销售历史数据仓库示例。它包含一个事实表，其中有约一百万条已售出单品的记录，并包含时间、销售渠道等维度信息，以及给定销售的商品价格。


    我们的方案假设我们正在解决这样一个问题：如果我们引入比目前销售的商品更昂贵的商品，预测会发生什么情况。实际上，我们希望根据当前销量与商品价格的销售趋势，推断超出当前最昂贵商品的范围。


    我们正在回答一个基本问题：如果某件商品更贵，我们真的会销售它吗？如果会，我们能卖出多少件？


    以下的 `SELECT` 语句使用了三个 Oracle 线性回归函数来帮助指导我们的推断。我们在探究：如果我们开始以更高的价格销售 `Electronics`
    类别的商品，可能会发生什么？我们会卖得更多还是更少？销售量会随着价格变化而变化多快？


    ```sql

    select

    s.channel_desc,

    regr_intercept(s.total_sold, p.prod_list_price) total_sold_intercept, regr_slope
    (s.total_sold, p.prod_list_price) trend_slope,

    regr_r2(s.total_sold, p.prod_list_price) r_squared_confidence

    from sh.products p,

    (select c.channel_desc, s.prod_id, s.time_id, sum(s.quantity_sold) total_sold
    from sh.sales s inner join sh.channels c

    ```


    接下来，只需运行这些 `SELECT` 语句，并记录下哪些语句真正产生了结果。所有精心设计的字面量转义和引号用于一直保留到这个层级的对象名称，因此结果不仅包含上下文中您要查找的文本，还包含
    `schema`、`table` 和 `column` 的人类可读数据，如下例所示的一行：


    `HR EMPLOYEES LAST_NAME Greene`


    文本“Greene”的至少一个实例可以在 `HR.EMPLOYEES` 表的 `LAST_NAME` 列中找到。


    [www.it-ebooks.info](http://www.it-ebooks.info/)'
- fmt: "# 线性回归分析\n\n```sql\nselect s.channel_desc,\n       regr_intercept(s.total_sold,\
    \ p.list_price) intercept,\n       regr_slope(s.total_sold, p.list_price) slope,\n\
    \       regr_r2(s.total_sold, p.list_price) r2\nfrom\n    (select c.channel_desc,\
    \ s.prod_id, s.time_id, sum(s.quantity_sold) total_sold\n     from sh.sales s\n\
    \     inner join sh.channels c\n     on s.channel_id = c.channel_id\n     group\
    \ by c.channel_desc, s.prod_id, s.time_id) s,\n    sh.products p\nwhere s.prod_id\
    \ = p.prod_id\n    and p.prod_category = 'Electronics'\n    and s.time_id between\
    \ to_date('01-JAN-1998') and to_date('31-DEC-1999')\ngroup by s.channel_desc\n\
    order by 1;\n```\n\n`CHANNEL_DESC` `TOTAL_SOLD_INTERCEPT` `TREND_SLOPE` `R_SQUARED_CONFIDENCE`\n\
    ------------ ------------------- ----------- --------------------\nDirect Sales\
    \ 24.2609713 -.02001389 .087934647\nInternet 6.30196312 -.00513654 .065673194\n\
    Partners 11.738347 -.00936476 .046714001\nTele Sales 36.1015696 -.11700913 .595086378\n\
    \n对于那些不熟悉解读线性回归的人来说，外推趋势可以用以下通用形式读取：\n\n`Y = Intercept + Slope(X)`\n\n对于我们数据，`Y`\
    \ 是销售物品的总数，`X` 是标价。我们可以看到，对于直销、互联网和合作伙伴渠道，随着价格上升，销售额会温和下降，而电话销售渠道的销售量随着成本增加会急剧下降。然而，我们的置信度值表明前三个预测对于这些渠道来说拟合不佳。`R`\
    \ 平方置信度值表示外推拟合线与数据的契合程度（也称为拟合优度），值为 `1.0` 表示“完美拟合”，`0` 表示“绝对没有相关性”。\n\n## 它是如何工作的\n\
    \n为了给我们的线性回归函数（如 `REGR_SLOPE`）提供数据，我们需要确保提供的是我们想要比较的实际值。我们的方法将销售物品的总数与物品的标价进行比较。`SH.SALES`\
    \ 表跟踪每个单独物品的销售情况，每个售出物品有一条记录。\n\n正是由于这个原因，我们使用内联视图将这些单独的销售记录汇总为特定产品、日期和渠道的总销售数量。你可以单独运行子查询，如下面的\
    \ SQL 语句所示。\n\n```sql\nselect c.channel_desc, s.prod_id, s.time_id, sum(s.quantity_sold)\
    \ total_sold\nfrom sh.sales s\ninner join sh.channels c\non s.channel_id = c.channel_id\n\
    group by c.channel_desc, s.prod_id, s.time_id;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 5 章 ■ 通用查询模式\n\n这不足为奇，结果提供了一个简单的汇总，准备好用于我们的线性回归函数。\n\n`CHANNEL_DESC` `PROD_ID`\
    \ `TIME_ID` `TOTAL_SOLD`\n-------------------- ---------- --------- ----------\n\
    …\nDirect Sales 30 24-OCT-01 1\nInternet 32 30-NOV-01 4\nDirect Sales 35 28-OCT-01\
    \ 12\nPartners 47 09-NOV-01 1\nDirect Sales 14 06-OCT-01 5\n…\n\n我们的结果为我们销售的每种物品类型提供了此汇总。我们将内联视图连接到\
    \ `SH.PRODUCTS` 表，然后通过 `PROD_CATEGORY` 为 `Electronics` 和一个两年的日期范围进行筛选，以聚焦于我们推测的问题。然后，`SELECT`\
    \ 子句中的线性回归函数开始发挥作用。\n\n这三个统计函数中的每一个都获取每个渠道的已计算的 `TOTAL_SOLD` 数量和 `LIST_PRICE`\
    \ 值（感谢 `GROUP BY` 子句），并执行相关的计算。一本好的统计学教科书会告诉你这些公式是如何推导出来的，但表 5-1 向你展示了每个公式的方法。\n\
    \n***表 5-1.** 支持线性回归分析的 Oracle 统计方法*\n\n`Function` `Formula`\n`REGR_INTERCEPT`\
    \ `(Σy)/n - (Σxy - (Σx)(Σy)/n)/(Σx² - (Σx)²/n) (Σx)/n`\n`REGR_SLOPE` `(Σxy - (Σx)(Σy)/n)/(Σx²\
    \ - (Σx)²/n)`\n`REGR_R2` `(Σxy - (Σx)(Σy)/n)²/(Σx² - (Σx)²/n)(Σy² - (Σy)²/n)`\n\
    \n只看那些公式就应该让你庆幸自己不必亲自编写计算代码。只需调用相应的函数，Oracle 就会为你完成繁重的工作。利用这些函数返回的数据，你就可以可视化销售量如何随价格变化。图\
    \ 5-1 显示了我们的线性回归数据，以假设的外推线形式表达了销售量与标价之间的关系。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 5 章 ■ 通用查询模式\n\n直销\n\n互联网\n\n合作伙伴\n\n电话销售\n\n标价 (x)"
  raw: 'on s.channel_id = c.channel_id


    group by c.channel_desc, s.prod_id, s.time_id) s


    where s.prod_id=p.prod_id


    and p.prod_category=''Electronics''


    and s.time_id between to_date(''01-JAN-1998'') and to_date(''31-DEC-1999'') group
    by s.channel_desc


    order by 1;


    CHANNEL_DESC TOTAL_SOLD_INTERCEPT TREND_SLOPE R_SQUARED_CONFIDENCE


    ------------ ------------------- ----------- --------------------


    Direct Sales 24.2609713 -.02001389 .087934647


    Internet 6.30196312 -.00513654 .065673194


    Partners 11.738347 -.00936476 .046714001


    Tele Sales 36.1015696 -.11700913 .595086378


    For those unfamiliar with interpreting linear regressions, the extrapolated trends
    can be read in the general form:


    Y = Intercept + Slope(X)


    For our data, Y is the total number of items sold and X is the list price. We
    can see that for Direct Sales, Internet, and Partners, there’s a gentle decrease
    in sales as price increases, whereas sales volume plummets dramatically for Tele
    Sales as cost increases. However, our confidence values suggest the first three
    predictions are a poorly fit extrapolation for these channels. The R-squared confidence
    value indicates how well the extrapolated line of fit suits the data (also known
    as goodness of fit), where a value of 1.0 means “perfect fit”, and 0 means “absolutely
    no correlation”.


    How It Works


    To feed data to our linear regression functions, such as REGR_SLOPE, we need to
    ensure we are providing the actual values we want to compare. Our recipe compares
    the total number of items sold to the list price of an item. The SH.SALES table
    tracks the sale of each individual item, with one entry per item sold.


    It’s for this reason that we use the inline view to aggregate all of these individual
    sale entries into aggregate number of sales for a certain product, date, and channel.
    You can run the subselect by itself, as shown in the next SQL statement.


    select c.channel_desc, s.prod_id, s.time_id, sum(s.quantity_sold) total_sold from
    sh.sales s inner join sh.channels c


    on s.channel_id = c.channel_id


    group by c.channel_desc, s.prod_id, s.time_id;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ COMMON QUERY PATTERNS


    No surprises there, and the results provide a simple rolled-up summary ready for
    use in our linear regression functions.


    CHANNEL_DESC PROD_ID TIME_ID TOTAL_SOLD


    -------------------- ---------- --------- ----------


    …


    Direct Sales 30 24-OCT-01 1


    Internet 32 30-NOV-01 4


    Direct Sales 35 28-OCT-01 12


    Partners 47 09-NOV-01 1


    Direct Sales 14 06-OCT-01 5


    …


    Our results provide this summary for every type of item we sell. We join the inline
    view to the SH.PRODUCTS table, and then we filter by PROD_CATEGORY of Electronics
    and a two-year date range to focus on our supposed problem. The fun then starts
    with the linear regression functions in the SELECT clause.


    Each of the three statistical functions takes the calculated TOTAL_SOLD amounts
    and LIST_PRICE


    values for each channel (thanks to the GROUP BY clause), and performs the relevant
    calculations. A good statistics textbook will tell you how these formulae were
    derived, but Table 5-1 shows you each formula’s method.


    ***Table 5-1.** Oracle Statistical Methods Supporting Linear Regression Analysis*
    **Function Formula**


    REGR_INTERCEPT


    (Σy)/n - (Σxy - (Σx)(Σy)/n)/(Σx² - (Σx)²/n) (Σx)/n


    REGR_SLOPE


    (Σxy - (Σx)(Σy)/n)/(Σx² - (Σx)²/n)


    REGR_R2


    (Σxy - (Σx)(Σy)/n)²/(Σx² - (Σx)²/n)(Σy² - (Σy)²/n)


    Just looking at those formulae should make you glad you don’t have to code the
    calculations yourself. Just call the appropriate function and Oracle does the
    hard work for you. Armed with the data returned by those functions, you can then
    visualize how the sales volume changes with price. Figure 5-1


    shows our linear regression data expressed as hypothetical extrapolated lines
    showing the relationship between sales volume and list price.


