    \ 20-2 列出了常用于排除数据库问题的视图描述。\n\n我们意识到，从`V$SYSSTAT`和`V$SYSTEM_EVENT`等视图中选择数据有其固有的局限性，因为这些视图报告的是自实例启动以来收集的平均值。如果可能，查询\
