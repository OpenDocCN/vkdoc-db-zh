  trans: "\n我们实现此逻辑时，有两个不太明显的方面值得进一步解释。第一个涉及处理负数。我们的函数设置了多个局部变量（其中一些我们稍后会讨论），最后一个称为\
    \ `SIGN`。我们将其初始化为空字符串，这隐含地意味着向调用者报告正数结果，除非我们检测到有负数被传递给函数进行转换。在函数逻辑体的第一部分，我们测试\
    \ `STARTING_VALUE` 的符号，对于检测到的任何负数，将 `SIGN` 值更改为 `'-'`。\n\n```sql\nif (starting_value\
    \ < 0) then\n    sign := '-';\n    working_remainder := abs(working_remainder);\n\
    end if;\n```\n\n检测负数并使用 `ABS` 函数将 `WORKING_NUMBER` 转换为正数，并不属于标准的十进制到十六进制转换过程。事实上，我们在算术运算中也不使用它！\n\
    \n它的存在纯粹是为了帮助实现我们实现中第二个不明显的方面，这是我们在函数中使用的一个技巧，我们稍后会讲到。在函数结束时，我们会恢复 `SIGN` 应有的状态，这样用户就不会注意到这个数据处理过程。\n\
    \n```sql\nrebased_value := sign || rebased_value;\n```\n\n那么，为什么一开始要对数字的符号进行两步处理呢？这是因为我们使用了一个技巧来“查找”十进制数字（或数字组）转换到新进制的结果：通过找到我们取模除法的整数部分在字符串中的映射位置。在这个例子中，字符串就是你在函数开头看到的那个不寻常的局部变量\
    \ `CHAR_STRING`。\n\n```sql\nchar_string varchar2(36) default '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';\n\
    ```\n\n你可能会想，为什么作者们要在书里练习打字？但我们不是！这个技巧是使用 `SUBSTR` 函数来遍历这个字符串，以找到我们转换的匹配值。它的基本工作原理如下。我们取一个源数字，比如\
    \ 13，以及期望的进制，比如 16，然后将其插入到我们的 `SUBSTR` 调用中，如下一个片段所示。\n\n```sql\nsubstr(char_string,\
    \ mod(13 /* our remainder */, 16 /* our new base */)+1, 1)\n```\n\n执行算术运算很容易。13\
    \ 对 16 取模，商为 0，余数为 13。我们给这个值加一，因为我们的字符串是从零开始索引的，所以我们需要考虑到“第零个”位置，得到值 14。然后，我们从这个位置（14）开始，取\
    \ `CHAR_STRING` 的子字符串，长度为 1 个字符。字符串中的第 14 个字符是 D。瞧：我们已经将十进制数 13 转换为其十六进制等价值 D。从那里开始，只需对连续的取模除法结果重复此过程即可。\n\
    \n反向逻辑也可以整合到一个函数中，从而可以将任意进制的值转换为十进制。我们还可以将这些函数包装在一个辅助函数中，以实现从任意进制到其他任意进制的转换。这些函数可在\
    \ `www.oraclesqlrecipes.com` 获取。\n\n5-9. 在不知道列名或表名的情况下搜索字符串\n\n**问题**\n\n你需要在数据库中查找某个特定文本值存储在哪里，但无法访问应用程序代码或逻辑，无法通过应用程序查看数据来确定这一点。你只有\
    \ Oracle 数据字典表和 SQL 来找到你想要的东西。\n\n**解决方案**\n\n目前没有可用的数据库包含一个全知全能的“到处搜索我想要的东西”的操作符。然而，利用\
    \ Oracle 字符串搜索 `LIKE` 操作符的基本构建块，以及将一个 `SELECT` 语句的结果作为另一个 `SELECT` 语句输出的能力，我们可以执行一系列步骤，自动追踪到保存我们所需文本数据的模式、表和列。\n\
    \n为了使我们的方案更具体，我们假设我们要在数据库中的某处查找文本“Greene”，但我们不知道——也找不到任何文档告诉我们——这个文本是人名、供应商或客户公司名、产品名称的一部分，还是其他文本的一部分。\n\
    \n我们的解决方案分两部分工作。第一个 `SELECT` 语句（如下所示）生成独立的 `SELECT` 查询作为结果，用于在所有模式的所有表的所有列中搜索我们未识别的文本“Greene”。\n\
    \n```sql\nSelect\n    'select ''' || owner || ''','\n    || '''' || table_name\
    \ || ''','\n    || '''' || column_name || ''','\n    || column_name ||\n    '\
    \ from ' ||\n    owner ||\n    '.' ||\n    table_name ||\n    ' where ' ||\n \
    \   column_name ||\n    ' like ''%Greene%'';' as Child_Select_Statements\nfrom\
    \ all_tab_columns\nwhere owner in ('BI', 'HR', 'IX', 'OE', 'PM', 'SH')\nand data_type\
    \ in ('VARCHAR2','CHAR','NVARCHAR2','NCHAR')\nand data_length >= length('Greene');\n\
    ```\n\n在我们的示例中，此命令的输出是一个包含 271 条 `SELECT` 语句的列表，每条语句对应 Oracle 示例模式中每个表的每个文本类列。下面显示了一个子集，并进行了格式化以便在打印页面上可读。\n\
    \n```\nCHILD_SELECT_STATEMENTS\n…\nselect 'HR','COUNTRIES','COUNTRY_NAME', COUNTRY_NAME\n\
    from HR.COUNTRIES\nwhere COUNTRY_NAME like '%Greene%';\n\nselect 'HR','DEPARTMENTS','DEPARTMENT_NAME',\
    \ DEPARTMENT_NAME\nfrom HR.DEPARTMENTS\nwhere DEPARTMENT_NAME like '%Greene%';\n\
    \nselect 'HR','EMPLOYEES','FIRST_NAME', FIRST_NAME\nfrom HR.EMPLOYEES\nwhere FIRST_NAME\
    \ like '%Greene%';\n\nselect 'HR','EMPLOYEES','LAST_NAME', LAST_NAME\nfrom HR.EMPLOYEES\n\
    where LAST_NAME like '%Greene%';\n\nselect 'HR','EMPLOYEES','EMAIL', EMAIL\nfrom\
    \ HR.EMPLOYEES\nwhere EMAIL like '%Greene%';\n…\n```\n\n当你查看这些输出语句时，首先停下来思考一下，在许多（如果不是全部）表上运行这些语句是否会有性能影响。如果你的数据库大小达到数\
    \ TB，可能值得规划一下执行时间，以免影响性能。\n\n一旦你对执行时机的安排感到满意，就可以针对数据库运行它们。它们将返回包含所查找文本的模式名、表名、列名以及列数据。部分结果如下所示。\n\
    \n```\nselect 'HR','EMPLOYEES','FIRST_NAME', FIRST_NAME\nfrom HR.EMPLOYEES\nwhere\
    \ FIRST_NAME like '%Greene%';\nno rows selected\n\nselect 'HR','EMPLOYEES','LAST_NAME',\
    \ LAST_NAME\nfrom HR.EMPLOYEES\nwhere LAST_NAME like '%Greene%';\n'H 'EMPLOYEE\
    \ 'LAST_NAM LAST_NAME\n-- --------- --------- -------------------------\nHR EMPLOYEES\
    \ LAST_NAME Greene\n\nselect 'HR','EMPLOYEES','EMAIL', EMAIL\nfrom HR.EMPLOYEES\n\
    where EMAIL like '%Greene%';\nno rows selected\n```\n\n随着第二组语句执行完毕，我们已经在 `HR.EMPLOYEES`\
    \ 表的 `LAST_NAME` 列中找到了文本“Greene”。\n\n**工作原理**\n\n此解决方案采用两步法来解决这个问题。当你运行第一个查询时，它会搜索\
    \ `ALL_TAB_COLUMNS` 系统视图中的所有列，以查找具有文本数据类型（如 `VARCHAR2` 或 `CHAR`）的列的模式名、表名和列名。由于充斥着大量的字面量格式化和字符串拼接，逻辑有点难以看清，所以最好用以下通用结构来理解。\n\
    \n```sql\nselect\n    <转义后的列名、表名和模式名，用于后续展示>,\n    <实际的列名，用于后续查询>,\n    <转义后的\
    \ from 子句，用于后续查询 >\n    <转义后的 where 子句，用于后续查询 >\nfrom all_tab_columns\nwhere owner\
    \ in (<我们感兴趣的模式列表>)\nand data_type in ('VARCHAR2','CHAR','NVARCHAR2','NCHAR')\n\
    and data_length >= <所查找文本的长度>;\n```\n\n对于每个至少有一个相关文本数据类型的表，此查询将发出一个结果，该结果采用如下形式的\
    \ `SELECT` 语句：\n\n```sql\nselect\n    <字面模式名>,\n    <字面表名>,\n    <字面列名>,\n   \
    \ <列名>\nfrom <模式.表>\nwhere <列名> like '%<所查找的文本>%';\n```"
- fmt: '# CHAPTER 5 ■ COMMON QUERY PATTERNS


    ## ALL_TAB_COLUMNS versus ALL_TAB_COLS


    Careful observers will note that we’ve crafted our solution to work with the `ALL_TAB_COLUMNS`
    system view. Oracle also includes a system view named `ALL_TAB_COLS`. The two
    seem almost identical, having the same fields, but slightly different row counts.
    So why choose `ALL_TAB_COLUMNS` in this recipe?


    The answer has to do with the slightly different definitions Oracle uses in defining
    the two views. The `ALL_TAB_COLS` system view includes hidden columns not normally
    visible to users or developers. As our recipe seeks ordinary data used every day
    by end-users, we rightly assume that the developers have not played tricks by
    either hiding columns of their own or abusing Oracle’s system-controlled hidden
    columns.


    The recipe so far has not made any assumptions about the tool or tools you’ll
    use when working with the solution. You can happily run the first statement in
    `SQL*Plus`, `SQL Developer`, or through a programmable API, and retrieve the second
    set of statements to run. Similarly, you can use any tool to then execute those
    statements and view the results revealing the hiding place of your lost text.
    But some extra niceties are possible. For instance, you could wrap much of the
    logic in a `PL/SQL` function or stored procedure, or use the formatting capabilities
    of a query tool like `SQL*Plus` to make the solution even more elegant.


    ## 5-10\. Predicting Data Values and Trends Beyond a Series End


    ### Problem


    From a large set of data, you need to predict the behavior or trend of the information
    beyond the bounds of your current data set.


    ### Solution


    Predicting trends and extrapolating possibilities based on patterns in the data,
    such as relationships between two values, can be addressed in many ways. One of
    the most popular techniques is linear regression analysis, and Oracle provides
    numerous linear regression functions for many contemporary trending and analysis
    algorithms.


    As part of the sample schemata included with the Oracle database, a Sales History
    data warehouse example is provided in the `SH` schema. This includes a fact table
    of around a million entries of individual items sold with dimensions for time,
    sales channel, and so on, and the item price for a given sale.


    Our recipe supposes that we’re solving the problem of predicting what would happen
    if we introduced more expensive items than those currently sold. In effect, we’d
    like to extrapolate beyond the current most expensive item, based on the current
    sales trend of volume sold compared with item price.


    We’re answering the fundamental question, would we actually sell an item if it
    were more expensive, and if so, how many of those items would we sell?


    The following `SELECT` statement uses three Oracle linear regression functions
    to help guide our extrapolation. We’re asking what’s likely to happen if we start
    selling items in the `Electronics` category at higher prices, will we sell more
    or fewer, and how quickly will sales volume change with price.


    ```sql

    select

    s.channel_desc,

    regr_intercept(s.total_sold, p.prod_list_price) total_sold_intercept, regr_slope
    (s.total_sold, p.prod_list_price) trend_slope,

    regr_r2(s.total_sold, p.prod_list_price) r_squared_confidence

    from sh.products p,

    (select c.channel_desc, s.prod_id, s.time_id, sum(s.quantity_sold) total_sold
    from sh.sales s inner join sh.channels c

    ```


    It’s then just a matter of running those `SELECT` statements and noting which
    ones actually produce results. All of the elaborate literal escaping and quoting
    is used to preserve the object names right down to this level, so the results
    include not only the text you seek in context, but also the human-readable data
    for `schema`, `table`, and `column`, as you can see in this example row.


    `HR EMPLOYEES LAST_NAME Greene`


    At least one instance of the text “Greene” can be found in `HR.EMPLOYEES`, in
    the `LAST_NAME` column.


    [www.it-ebooks.info](http://www.it-ebooks.info/)'
