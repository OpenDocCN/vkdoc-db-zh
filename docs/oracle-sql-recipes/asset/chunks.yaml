    CHAPTER 19 ■ SQL MONITORING AND TUNING


    The method you use depends on your personal preferences and various aspects of
    your environment, such as the version of the database and PL/SQL packages installed.
    Each of these tracing methods is described briefly in the following subsections.


    Using DBMS_SESSION


    Using the DBMS_SESSION package was covered in the solution section of this recipe.
    Here’s a brief summary of how to enable and disable tracing using DBMS_SESSION:


    SQL> exec dbms_session.set_sql_trace(sql_trace=>true);


    SQL> -- run sql statements that you want to trace...


    SQL> exec dbms_session.set_sql_trace(sql_trace=>false);


    Using DBMS_MONITOR


    If you are using Oracle Database 10 *g* or higher, we recommend using the DBMS_MONITOR
    package, which offers a high degree of flexibility, for facilitating tracing.
    To enable and disable tracing within the current session use the following statements:


    SQL> exec dbms_monitor.session_trace_enable;


    SQL> -- run sql statements that you want to trace...


    SQL> exec dbms_monitor.session_trace_disable;


    Use the WAIT and BINDS parameters to enable tracing with wait and bind variable
    information: SQL> exec dbms_monitor.session_trace_enable(waits=>TRUE, binds=>TRUE);


    ■ **Note** Wait events track the amount of time spent waiting for a resource.
    Bind variables are substitution variables used in place of literal variables.


    Use the SESSION_ID and SERIAL_NUM parameters to enable and disable tracing for
    an already connected session. First run this SQL query to determine the SESSION_ID
    and SERIAL_NUM for target session:


    select username,sid,serial# from v$session;


    Now use the appropriate values when calling DBMS_SESSION:


    SQL> exec dbms_monitor.session_trace_enable(session_id=>1234, serial_num=>12345);
    SQL> -- run sql statements that you want to trace...


    SQL> exec dbms_monitor.session_trace_disable(session_id=>1234, serial_num=>12345);
    You can also enable the tracing of wait and bind variable information as follows:
    479


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    SQL> exec dbms_monitor.session_trace_enable(session_id=>1234, -


    > serial_num=>12345, waits=>TRUE, binds=>TRUE);


    Using DBMS_SYSTEM


    To enable SQL tracing in another session, you can use the DBMS_SYSTEM package.
    You first must identify the session you want to trace:


    select username,sid,serial# from v$session;


    Pass the appropriate values to the following lines of code:


    SQL> exec dbms_system.set_sql_trace_in_session(sid=>200,serial#=>5,-


    > sql_trace=>true);


    Run the following to disable tracing for the session:


    SQL> exec dbms_system.set_sql_trace_in_session(sid=>200,serial#=>5,-


    > sql_trace=>false);


    You can also use DBMS_SYSTEM to capture wait events:


    SQL> exec dbms_system.set_ev(si=>123, se=>1234, ev=>10046, le=>8, nm=>'' '');
    SQL> exec dbms_system.set_ev(si=>123, se=>1234, ev=>10046, le=>0, nm=>'' '');
    Using DBMS_SUPPORT


    This technique requires that you first load the DBMS_SUPPORT package (it’s not
    created by default): SQL> @?/rdbms/admin/dbmssupp.sql


    Use the following syntax to enable and disable tracing in your current session:
    SQL> exec dbms_support.start_trace(waits=>TRUE, binds=>TRUE); SQL> exec dbms_support.stop_trace;


    Use this syntax to enable and disable tracing in session other than your own:
    SQL> exec dbms_support.start_trace_in_session(sid=>123, serial=>1234,-


    > waits=>TRUE, binds=>TRUE);


    SQL> exec dbms_support.stop_trace_in_session(sid=>123, serial=>1234); Altering
    Your Session


    You can use ALTER SESSION to turn tracing on and off:


    SQL> alter session set sql_trace=true;


    SQL> -- run sql commands...


    SQL> alter session set sql_trace=false;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    ■ **Note** The SQL_TRACE parameter is deprecated. Oracle recommends that you use
    the DBMS_MONITOR or DBMS_SESSION packages to enable tracing.


    Sometimes it’s useful to see where the SQL statement is waiting for resources
    within the database.


    To instruct Oracle to write wait information to the trace file, use the following
    syntax: SQL> alter session set events ''10046 trace name context forever, level
    8''; SQL> -- run sql commands...


    SQL> alter session set events ''10046 trace name context off'';


    The LEVEL 8 instructs Oracle to write wait events to the trace file. If you want
    to view wait events and bind variables, specify LEVEL 12.


    ■ **Tip** On Unix systems inspect the ORACLE_HOME/rdbms/mesg/oraus.msg file for
    a description of Oracle events.


    Oracle provides a tool called the Trace Analyzer that will parse SQL trace files
    and produce comprehensive tuning reports. See My Oracle Support (formerly known
    as MetaLink) note 224270.1 for details.


    Sometimes when tracing an application, the trace files can span multiple files.
    In such cases, use the trcsess utility to translate multiple trace files into
    one readable output file.


    Altering the System


    You can turn on tracing for all sessions in the database by using this ALTER SYSTEM
    statement: SQL> alter system set sql_trace=true;


    Use the following SQL to disable system-wide tracing:


    SQL> alter system set sql_trace=false;


    ■ **Caution** We recommend that you don’t set SQL tracing at the system level
    as it can severely degrade system performance.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    Using oradebug


    The oradebug utility can be used to enable and disable tracing for a session.
    You need SYSDBA privileges to run this utility.


    You can identify a process to trace either by its operating system process ID
    or its Oracle process ID.


    To determine these IDs, run the following SQL query for the username you want
    to trace (in this example the user is HEERA):


    select spid os_pid, pid ora_pid from v$process


    where addr=(select paddr from v$session where username=''HEERA'');


    Here is the output for this example:


    OS_PID ORA_PID


    ------------------------ ----------


    31064 23


    Next, use oradebug with either the SETOSPID or SETORAPID option to attach oradebug
    to a session. This example uses the SETOSPID option:


    SQL> oradebug setospid 31064;


    Now you can set tracing on for the session:


    SQL> oradebug EVENT 10046 TRACE NAME CONTEXT FOREVER, LEVEL 8;


    You can verify that tracing is enabled by viewing the trace file name: SQL> oradebug
    TRACEFILE_NAME;


    Use the following syntax to disable tracing:


    SQL> oradebug EVENT 10046 TRACE NAME CONTEXT OFF;


    Use the HELP option to view all features available in the oradebug utility: SQL>
    oradebug help


    **DBMS_TRACE**'
  trans: '

    # SQL 监控与调优


    有时用户可能运行一个包含数百个查询的应用程序。在这种情况下，可能很难准确定位到底是哪条 SQL 语句导致了性能问题（特别是当问题在于累计成本高，而非单次执行成本高时）。遇到这类情况，你可以开启
    SQL 跟踪来捕获某个用户运行的所有 SQL 语句的统计信息。


    此外，当 SQL 是通过应用程序动态生成时，你无法从源代码中判断哪条 SQL 可能导致了性能问题。你可能遇到的情况是，应用程序生成的 SQL 在每次运行时都不同。在这种情况下，你必须为某个会话开启
    SQL 跟踪，以记录该会话发出的所有 SQL 语句消耗的资源。此外，跟踪输出允许你查看实际的执行计划。


    以下是跟踪会话的一般步骤：


    1. 启用跟踪。

    2. 运行你想要跟踪的 SQL 语句。

    3. 禁用跟踪。

    4. 使用像 `tkprof`、`trcsess` 或 Oracle Trace Analyzer 这样的工具，将跟踪文件转换为人类可读的格式。


    Oracle 提供了多种方法来生成 SQL 资源使用跟踪文件（老实说，多到令人困惑），包括：


    - `DBMS_SESSION`

    - `DBMS_MONITOR`

    - `DBMS_SYSTEM`

    - `DBMS_SUPPORT`

    - `ALTER SESSION`

    - `ALTER SYSTEM`

    - `oradebug`


    你使用的方法取决于个人偏好和环境的各个方面，例如数据库版本和安装的 PL/SQL 包。以下小节将简要描述这些跟踪方法。


    ## 使用 DBMS_SESSION


    本解决方案章节已介绍过如何使用 `DBMS_SESSION` 包。以下是使用 `DBMS_SESSION` 启用和禁用跟踪的简要总结：


    ```sql

    SQL> exec dbms_session.set_sql_trace(sql_trace=>true);

    SQL> -- 运行你想要跟踪的 sql 语句...

    SQL> exec dbms_session.set_sql_trace(sql_trace=>false);

    ```


    ## 使用 DBMS_MONITOR


    如果你使用的是 Oracle Database 10 *g* 或更高版本，我们推荐使用 `DBMS_MONITOR` 包，它提供了高度的灵活性，便于跟踪。要在当前会话中启用和禁用跟踪，请使用以下语句：


    ```sql

    SQL> exec dbms_monitor.session_trace_enable;

    SQL> -- 运行你想要跟踪的 sql 语句...

    SQL> exec dbms_monitor.session_trace_disable;

    ```


    使用 `WAIT` 和 `BINDS` 参数可启用包含等待和绑定变量信息的跟踪：


    ```sql

    SQL> exec dbms_monitor.session_trace_enable(waits=>TRUE, binds=>TRUE);

    ```


    > **注意**：等待事件跟踪等待资源所花费的时间。绑定变量是用于替代字面变量的替换变量。


    使用 `SESSION_ID` 和 `SERIAL_NUM` 参数可为已连接的会话启用和禁用跟踪。首先运行此 SQL 查询以确定目标会话的 `SESSION_ID`
    和 `SERIAL_NUM`：


    ```sql

    select username,sid,serial# from v$session;

    ```


    现在，在调用 `DBMS_SESSION` 时使用适当的值：


    ```sql

    SQL> exec dbms_monitor.session_trace_enable(session_id=>1234, serial_num=>12345);

    SQL> -- 运行你想要跟踪的 sql 语句...

    SQL> exec dbms_monitor.session_trace_disable(session_id=>1234, serial_num=>12345);

    ```


    你也可以如下启用等待和绑定变量信息的跟踪：


    ```sql

    SQL> exec dbms_monitor.session_trace_enable(session_id=>1234, -

    > serial_num=>12345, waits=>TRUE, binds=>TRUE);

    ```


    ## 使用 DBMS_SYSTEM


    要在另一个会话中启用 SQL 跟踪，你可以使用 `DBMS_SYSTEM` 包。你必须首先识别出你想要跟踪的会话：


    ```sql

    select username,sid,serial# from v$session;

    ```


    将适当的值传递给以下代码行：


    ```sql

    SQL> exec dbms_system.set_sql_trace_in_session(sid=>200,serial#=>5,-

    > sql_trace=>true);

    ```


    运行以下命令以禁用该会话的跟踪：


    ```sql

    SQL> exec dbms_system.set_sql_trace_in_session(sid=>200,serial#=>5,-

    > sql_trace=>false);

    ```


    你也可以使用 `DBMS_SYSTEM` 来捕获等待事件：


    ```sql

    SQL> exec dbms_system.set_ev(si=>123, se=>1234, ev=>10046, le=>8, nm=>'' '');

    SQL> exec dbms_system.set_ev(si=>123, se=>1234, ev=>10046, le=>0, nm=>'' '');

    ```


    ## 使用 DBMS_SUPPORT


    此技术要求你首先加载 `DBMS_SUPPORT` 包（默认不创建）：


    ```sql

    SQL> @?/rdbms/admin/dbmssupp.sql

    ```


    使用以下语法在你当前的会话中启用和禁用跟踪：


    ```sql

    SQL> exec dbms_support.start_trace(waits=>TRUE, binds=>TRUE);

    SQL> exec dbms_support.stop_trace;

    ```


    使用此语法在你自身以外的会话中启用和禁用跟踪：


    ```sql

    SQL> exec dbms_support.start_trace_in_session(sid=>123, serial=>1234,-

    > waits=>TRUE, binds=>TRUE);

    SQL> exec dbms_support.stop_trace_in_session(sid=>123, serial=>1234);

    ```


    ## 修改你的会话


    你可以使用 `ALTER SESSION` 来开启和关闭跟踪：


    ```sql

    SQL> alter session set sql_trace=true;

    SQL> -- 运行 sql 命令...

    SQL> alter session set sql_trace=false;

    ```


    > **注意**：`SQL_TRACE` 参数已弃用。Oracle 建议你使用 `DBMS_MONITOR` 或 `DBMS_SESSION` 包来启用跟踪。


    有时，查看 SQL 语句在数据库内等待资源的位置很有用。


    要指示 Oracle 将等待信息写入跟踪文件，请使用以下语法：


    ```sql

    SQL> alter session set events ''10046 trace name context forever, level 8'';

    SQL> -- 运行 sql 命令...

    SQL> alter session set events ''10046 trace name context off'';

    ```


    `LEVEL 8` 指示 Oracle 将等待事件写入跟踪文件。如果你想同时查看等待事件和绑定变量，请指定 `LEVEL 12`。


    > **提示**：在 Unix 系统上，可以检查 `$ORACLE_HOME/rdbms/mesg/oraus.msg` 文件以获取 Oracle 事件的描述。


    Oracle 提供了一个名为 Trace Analyzer 的工具，它将解析 SQL 跟踪文件并生成全面的调优报告。详情请参阅 My Oracle Support（以前称为
    MetaLink）说明 224270.1。


    有时在跟踪应用程序时，跟踪文件可能跨越多个文件。在这种情况下，使用 `trcsess` 实用程序将多个跟踪文件转换为一个可读的输出文件。


    ## 修改系统


    你可以使用以下 `ALTER SYSTEM` 语句为数据库中的所有会话开启跟踪：


    ```sql

    SQL> alter system set sql_trace=true;

    ```


    使用以下 SQL 禁用系统范围的跟踪：


    ```sql

    SQL> alter system set sql_trace=false;

    ```


    > **注意**：我们建议不要在系统级别设置 SQL 跟踪，因为它会严重降低系统性能。


    ## 使用 oradebug


    `oradebug` 实用程序可用于为会话启用和禁用跟踪。你需要 `SYSDBA` 权限才能运行此实用程序。


    你可以通过其操作系统进程 ID 或其 Oracle 进程 ID 来标识要跟踪的进程。


    要确定这些 ID，请为你想要跟踪的用户（本例中用户为 `HEERA`）运行以下 SQL 查询：


    ```sql

    select spid os_pid, pid ora_pid from v$process

    where addr=(select paddr from v$session where username=''HEERA'');

    ```


    以下是此示例的输出：


    ```

    OS_PID   ORA_PID

    -------- ---------

    31064    23

    ```


    接下来，使用带有 `SETOSPID` 或 `SETORAPID` 选项的 `oradebug` 将 `oradebug` 附加到会话。此示例使用 `SETOSPID`
    选项：


    ```sql

    SQL> oradebug setospid 31064;

    ```


    现在你可以为该会话开启跟踪：


    ```sql

    SQL> oradebug EVENT 10046 TRACE NAME CONTEXT FOREVER, LEVEL 8;

    ```


    你可以通过查看跟踪文件名来验证跟踪是否已启用：


    ```sql

    SQL> oradebug TRACEFILE_NAME;

    ```


    使用以下语法禁用跟踪：


    ```sql

    SQL> oradebug EVENT 10046 TRACE NAME CONTEXT OFF;

    ```


    使用 `HELP` 选项可以查看 `oradebug` 实用程序中所有可用的功能：


    ```sql

    SQL> oradebug help

    ```

