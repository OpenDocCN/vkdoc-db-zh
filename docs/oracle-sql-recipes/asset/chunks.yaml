- fmt: '# 9-3. Optimizing Row and Table Locking


    ## Problem


    DML queries are taking a long time to complete and the DBA suspects that other
    users or application transactions are holding locks longer than necessary.


    ## Solution


    To follow Oracle best practices for application development, use the `NOWAIT`
    clause and minimize the use of `LOCK` statements unless the application requires
    it. When a `DML` statement runs, the `NOWAIT` clause returns immediately if there
    is already a lock on the resource you require for the `DML` statement. For example,
    you want to update a row in the `EMPLOYEES` table, but you don’t want to perform
    the update if there is already other activity on the row or rows you are trying
    to update. Here is an example:


    ```

    update employees

    set salary = salary * 1.2

    where employee_id = 101

    ;

    ```


    If there is no current lock on the row, the `UPDATE` statement returns immediately.
    If a second user runs the same `UPDATE` statement, the command waits until the
    first user’s `UPDATE` is committed or rolled back. To avoid the wait during the
    second `UPDATE` attempt, use the `NOWAIT` clause in a `SELECT` before the `UPDATE`
    statement in all sessions, as follows:


    ```

    select * from employees e

    where employee_id = 101

    for update of salary nowait

    ;

    ```


    If another session already has the row locked, you will receive this error message:

    ```

    Error starting at line 1 in command:

    select * from employees e

    where employee_id = 101

    for update of salary nowait

    Error report:

    SQL Error: ORA-00054: resource busy and acquire with NOWAIT specified or timeout
    expired

    00054. 00000 - "resource busy and acquire with NOWAIT specified"

    *Cause: Resource interested is busy.

    *Action: Retry if necessary.

    ```


    ## How It Works


    Concurrent access of Oracle tables is usually hassle-free, as Oracle automatically
    acquires the appropriate level of locking to minimize contention and maximize
    throughput. In addition, even if the application supports more than one user at
    a time, the users are typically not editing the same row or set of rows at the
    same time. But for those scenarios where you want to alert the user immediately
    when there is contention on the same rows in a table, you can use the `NOWAIT`
    keyword in a `SELECT` statement.


    **Note:** You can specify explicit locking in a number of ways, such as with `SELECT
    ... FOR UPDATE`. However, Oracle’s default locking mechanisms are almost always
    the most efficient, minimizing the number of rows locked for a particular transaction.
    There are exceptions, though, such as when you need to ensure consistent data
    across changes to multiple tables in parent/child relationships.


    Queries (`SELECT` statements) against a table always succeed, even if one or more
    processes lock some or all rows of the table. A `SELECT` statement from another
    session will use the unchanged version of the rows in the undo tablespace until
    a `COMMIT` occurs in the session holding the lock.


    Rather than retrying a number of times to obtain the lock in an application loop,
    you can specify the number of seconds to wait to acquire a lock on one or more
    rows by using the `WAIT n` clause instead of `NOWAIT`, as in this example:


    ```

    select * from employees e

    where employee_id = 101

    for update of salary wait 15

    ;

    ```


    If the rows are not available for `DML` statements within 15 seconds, the statement
    terminates with an error as if `NOWAIT` was specified, although with a slightly
    different error message:

    ```

    Error starting at line 1 in command:

    select * from employees e

    where employee_id = 101

    for update of salary wait 15

    Error report:

    SQL Error: ORA-30006: resource busy; acquire with WAIT timeout expired

    30006. 00000 - "resource busy; acquire with WAIT timeout expired"

    *Cause: The requested resource is busy.

    *Action: Retry the operation later.

    ```


    If you want to set a global timeout for the instance, you can set the initialization
    parameter `DDL_LOCK_TIMEOUT` as follows:

    ```

    SQL> connect / as sysdba

    Connected.

    SQL> alter system set ddl_lock_timeout = 15 scope=both;

    System altered.

    SQL>

    ```


    The default value is 0. Even when setting this parameter at the instance or session
    level, it can still be overridden in a `SELECT` statement with an explicit value
    in the `WAIT` clause.


    Two guidelines will help ease any locking issues you may have: first, hold a lock
    for as little time as possible, especially in a transactional environment. Second,
    if at all possible, let Oracle manage locks automatically. In the vast majority
    of scenarios, Oracle will pick the most efficient locking method for the situation.


    # 9-4. Avoiding Deadlock Scenarios


    ## Problem'
  raw: 'Use Oracle dynamic performance views to see which objects are being concurrently
    accessed, along with who is holding the resource and who is waiting on it. For
    example, you can query dynamic performance views such as V$LOCK and data dictionary
    tables such as DBA_OBJECTS to retrieve currently locked objects.


    Here is the SELECT statement:


    select s1.username blkg_user, s1.machine blkg_ws, s1.sid blkg_sid,


    s2.username wait_user, s2.machine wait_ws, s2.sid wait_sid,


    lo.object_id blkd_obj_id, do.owner, do.object_name


    from v$lock l1, v$session s1, v$lock l2, v$session s2,


    v$locked_object lo, dba_objects do


    where s1.sid = l1.sid


    and s2.sid = l2.sid


    and l1.id1 = l2.id1


    and s1.sid = lo.session_id


    and lo.object_id = do.object_id


    and l1.block = 1


    and l2.request > 0


    ;


    BLKG_USER BLKG_WS BLKG_SID WAIT_USER WAIT_WS WAIT_SID BLKD_OBJ_ID OWNER OBJECT_NAME


    --------- ------- -------- --------- ------- -------- ----------- ----- -----------


    RJB WRK1 122 HR WRK87 131 70272 HR EMPLOYEES


    1 rows selected


    The query retrieves all currently locked objects, which user is holding the lock,
    which user is waiting for access, and the username and workstation holding the
    lock. In this example, the user RJB is holding a lock on one or more rows of the
    EMPLOYEES table, and HR is waiting for the lock to be released. It also lists
    the session ID and the workstation ID of each user.


    How It Works


    The solution uses a number of data dictionary views to retrieve the information
    about who is locking the objects as well as the schema name and object names that
    are locked:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 9 ■ MANAGING TRANSACTIONS


    • **V$LOCK: Locks currently held, and requests for a lock. The BLOCK column is
    1 if this lock is in effect and is blocking other lock requests, otherwise 0 if
    this is a request for a lock. The REQUEST column is the type of lock requested;
    a value of 0 indicates that no lock is requested.**


    **• **V$SESSION: Session identifier, user name, status.**


    **• **V$LOCKED_OBJECT: Session ID and object ID for locked objects.**


    **• **DBA_OBJECTS: All database objects, with object number, object name, owner.**


    **You can use other columns in V$SESSION to further identify which rows are involved
    in the lock, but typically you only need to know the username, workstation, and
    the object being locked so you can give the user a call and find out why the rows
    are locked for an extended period of time!


    The only caveat to this method pertains to database security. Typically, a developer
    or an end user will not have access to data dictionary views or tables. However,
    in a development environment, the DBA will be more likely to grant such access
    to help the developers debug the application and identify any transaction-related
    coding errors before moving to production. Alternatively, the DBA can create a
    view accessing these dynamic performance views, and grant SELECT access to developers
    and support personnel.


