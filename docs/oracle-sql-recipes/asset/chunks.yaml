    ### How It Works


    Many ETL (Extract, Transform, and Load) tools include an option to read from an
    Oracle database and create an output file in CSV format. If your data movement
    needs are rather modest and a six-figure ETL tool license is not within your budget,
    the `SQL*Plus` version may suffice. Even `SQL*Developer`, a free tool from Oracle,
    will export the results of a query or a table to a number of formats including
    Microsoft Excel, but `SQL*Plus` is more amenable to scripting and scheduling within
    a batch job.


    The `SQL*Plus` commands ensure that the default column headers are off, the output
    width is sufficient, and so forth. The `SPOOL` and `SPOOL OFF` commands send the
    output to a file on disk that can be read by Microsoft Excel or another program
    that can read CSV files.


    When you open the file `emp_sal.csv` generated in the recipe solution with Microsoft
    Excel, it looks much like any spreadsheet, as you can see in `Figure 4-1`.


    `Figure 4-1.` A `SQL*Plus`-generated CSV file opened in Microsoft Excel 107


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## CHAPTER 5


    ■ ■ ■


    ### Common Query Patterns


    In this chapter we introduce recipes to handle many common query patterns, often
    for the sort of problems that you know should have an elegant solution, but for
    which no obvious SQL command or operator exists. Whether it’s predicting the trend
    in data for extrapolation and planning purposes, paginating your data for display
    on a web site, or finding lost text in your database, you’ll find a recipe to
    suit you in this chapter.


    Many of the problems we address here have multiple solutions. Where space allows,
    we’ve tried to cover as many options as possible. Having said that, if you invent
    or know of a different approach, consider yourself a budding SQL chef too!


    #### 5-1. Changing Nulls into Real Values


    **Problem**


    You want to substitute null values in a table or result with a meaningful alternative.


    **Solution**


    Oracle provides several functions to allow manipulation and conversion of null
    values into arbitrary literals, including `NVL`, `NVL2`, `COALESCE`, and `CASE`-based
    tests. Each of these allows for different logic when handling null values, translating
    their inclusion in results in different ways. The goal is to turn `NULL` values
    into something more meaningful to the non-database professional, or more appropriate
    to the business context in which the data will be used.


    Our recipe’s first `SELECT` statement uses the `NVL` function to return an employee’s
    id and surname, and either the commission percentage or the human-readable “no
    commission” for staff with a null `COMMISSION_PCT`.


    `select employee_id, last_name, nvl(to_char(commission_pct), ''No Commission'')
    as COMMISSION from hr.employees;`


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## CHAPTER 5 ■ COMMON QUERY PATTERNS


    `EMPLOYEE_ID` `LAST_NAME` `COMMISSION`


    ----------- ----------- -------------


    …


    177 Livingston .2


    178 Grant .15


    179 Johnson .1


    180 Taylor No Commission


    181 Fleaur No Commission


    182 Sullivan No Commission


    …


    The second version of our recipe targets the same information, but uses the `NVL2`
    function to split the employees into those that are paid a commission and those
    that aren’t.


    `select employee_id, last_name, nvl2(commission_pct, ''Commission Based'', ''No
    Commission'') as COMMISSION from hr.employees;`


