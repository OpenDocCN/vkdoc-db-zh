    ## CHAPTER 7 ■ STRINGS


    ```

    EMPLOYEE_ID LAST_NAME FIRST_NAME

    ---------------------- ------------------------- --------------------

    145 Russell John

    161 Sewall Sarath

    198 OConnell Donald

    3 rows selected

    ```


    **Tip** If you want to search for the characters `%` or `_` within a string, you
    can add the `ESCAPE` keyword, specifying a character that will interpret the next
    character in the search string literally. For example, if you want to search for
    underscores in a column, you could use this syntax:


    ```sql

    select * from products where product_name like ''%\_%'' escape ''\'';

    ```


    If you want to also search for the escape character itself, you specify it twice
    in the search string, or switch escape characters!


    Since you can use both `INSTR` and `LIKE` to produce identical results in many
    cases, which should you use? It depends. From a coding-style standpoint, `LIKE`
    can be more readable, and may even use an index if there are no pattern-matching
    characters at the beginning of the search string. `INSTR` will never use an existing
    index unless you have created a function-based index containing the exact `INSTR`
    clause that you use in the `WHERE` clause. (We’ll cover function-based indexes
    in another recipe).


    The `NOT` prefix reverses the logic of the `LIKE` clause, finding a match if the
    search string is `not` in the target string. If you wanted to list all employees
    who do not have `ll` in their last names starting with the fourth character in
    the string, you can simply prefix the `LIKE` clause with `NOT`, as in this example:


    ```sql

    select employee_id, last_name, first_name

    from employees

    where last_name not like ''___%ll%'' -- three underscores

    ;

    ```


    Using `INSTR` is a better choice than `LIKE` if you want to use substitution variables
    at runtime to specify the starting position of the search as well as the occurrence
    number, as in this example:


    ```sql

    select employee_id, last_name, first_name

    from employees

    where instr(last_name,''&srch_str'',&start_pos,&occ_num) > 0

    ;

    ```


    In a few cases, you can do things in `INSTR` that you can’t do in the `LIKE` clause.
    For example, you can specify a negative number for the last parameter of the `INSTR`
    function to search for the occurrence number starting from the end of the string
    instead of from the beginning.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## CHAPTER 7 ■ STRINGS


    If you can’t construct a search query using either `INSTR` or `LIKE`, you’ll almost
    certainly be able to perform the search using `REGEXP_INSTR`, which we will cover
    in another recipe in this chapter. A good rule of thumb is to use `INSTR` or `LIKE`
    when the pattern is simple, and `REGEXP_INSTR` when the complexity can be encapsulated
    into a single `REGEXP_INSTR` call instead of multiple `INSTR` and `SUBSTR` calls.


    ### 7-2. Extracting a Substring


    #### Problem


    You need to split up string values into two or more pieces or extract only the
    relevant portions of a string column. For example, you want to split up a database
    column that has two attributes into two separate columns to further normalize
    the design of the table.


    #### Solution


    Use the `SUBSTR` function to extract a substring from a string. The `SUBSTR` function
    has three arguments: the source string, the position in the string to start the
    extraction, and an optional length component.


    For this solution, we’ll use the tables included in the `EXAMPLE` schema, which
    can be installed when you install the Oracle database software (if not, you can
    install with the scripts in the `$ORACLE_HOME/demo/schema` directory). The `EMPLOYEES`
    table in the Oracle sample database has a column called `JOB_ID` in this format:


    ```

    dd_jjjjjjjjjj

    ```


    The `dd` portion of the `JOB_ID` column is an alphanumeric representation of the
    department, and `jjjjjjjjjj` is the job title. This SQL statement uses the `SUBSTR`
    function to separate the department identifier from the job title:'
