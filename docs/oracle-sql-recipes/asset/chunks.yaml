    CHAPTER 18 ■ OBJECT MANAGEMENT


    18-5\. Dropping a Table


    Problem


    You want to remove an object such as a table from a user.


    Solution


    Use the DROP TABLE statement to remove a table. This example drops a table named
    INVENTORY: drop table inventory;


    You should see the following confirmation:


    Table dropped.


    If you attempt to drop a table that has a primary key or unique keys referenced
    as a foreign key in a child table, you’ll see an error such as:


    ORA-02449: unique/primary keys in table referenced by foreign keys


    You’ll either need to drop the referenced foreign key constraint(s), or use the
    CASCADE CONSTRAINTS


    option when dropping the parent table:


    drop table inventory cascade constraints;


    How It Works


    You must be the owner of the table or have the DROP ANY TABLE system privilege
    to drop a table. If you have the DROP ANY TABLE privilege, you can drop a table
    in a different schema by prepending the schema name to the table name:


    drop table inv_mgmt.inventory;


    If you don’t prepend the table name with a user name, Oracle assumes you are dropping
    a table in your current user.


    If you’re using the RECYCLEBIN feature, DROP TABLE logically marks a table as
    dropped and renames it.


    The renamed table is placed in a logical container called the RECYCLEBIN. The
    table remains in your RECYCLEBIN until you manually remove it or until Oracle
    needs the space for other objects.


    This means that the space associated with the dropped table is not released until
    you purge your RECYCLEBIN. If you want to purge the entire contents of the RECYCLEBIN,
    use the PURGE RECYCLEBIN


    statement:


    SQL> purge recyclebin;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ OBJECT MANAGEMENT


    If you want to bypass the RECYCLEBIN feature and permanently drop a table a table,
    use the PURGE


    option of the DROP TABLE statement:


    drop table inventory purge;


    If you use the PURGE option, the table is permanently dropped. You can’t use the
    FLASHBACK TABLE


    statement (see recipe 18-6 for details) to retrieve the table. All space used
    by the table is released and any associated indexes and triggers are also dropped.


    18-6\. Undropping a Table


    Problem


    You accidentally dropped a table and you want to restore it.


    Solution


    First verify that the table you want to restore is in the recycle bin: SQL> show
    recyclebin;


    ORIGINAL NAME RECYCLEBIN NAME OBJECT TYPE DROP TIME


    ---------------- ------------------------------ ------------ -------------------


    PURCHASES BIN$YzqK0hN3Fh/gQHdAPLFgMA==$0 TABLE 2009-02-18:17:23:15


    Next, use the FLASHBACK TABLE...TO BEFORE DROP statement to recover a dropped
    table: flashback table purchases to before drop;


    ■ **Note** You cannot FLASHBACK TABLE...TO BEFORE DROP for a table created in
    the SYSTEM tablespace.


    How It Works


    In Oracle Database 10 *g* and higher, when a DROP TABLE statement is issued, the
    table is actually renamed (to a name that starts with BIN$) and placed in the
    recycle bin. The recycle bin is a mechanism that allows you to view some of the
    metadata associated with a dropped object. You can view complete metadata regarding
    renamed objects by querying DBA_SEGMENTS:


    select segment_name, segment_type, tablespace_name


    from dba_segments


    where segment_name like ''BIN%'';


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ OBJECT MANAGEMENT


    SEGMENT_NAME SEGMENT_TYPE TABLESPACE_NAME


    ------------------------------ ------------------ ---------------


    BIN$YzqK0hN4Fh/gQHdAPLFgMA==$0 TABLE MTS


    The FLASHBACK TABLE statement simply renames the table back to its original name.
    By default, the RECYCLEBIN feature is enabled in Oracle Database 10 *g* and higher.
    You can change the default by setting the RECYCLEBIN initialization parameter
    to OFF.


    We recommend that you don’t disable the RECYCLEBIN feature. It’s safer to leave
    this feature enabled and purge the RECYCLEBIN to remove objects that you want
    permanently deleted. If you want to permanently drop a table, use the PURGE option
    of the DROP TABLE statement.


    18-7\. Creating an Index


    Problem


    You are experiencing performance issues. You’ve identified a selective column
    that is used as a search criterion. You want to add an index to the table.


    Solution


    The default index type in Oracle is a B-tree (balanced tree) index. To create
    a B-tree index on an existing table, use the CREATE INDEX statement. This example
    creates an index on the D_SOURCES table, specifying D_SOURCE_ID as the column:


    create index d_sources_idx1 on d_sources(d_source_id);


    By default, Oracle will try to create an index in your default tablespace. Use
    the following syntax to instruct Oracle to build an index in a specific tablespace:


    create index d_sources_idx1 on d_sources(d_source_id) tablespace dim_index; If
    you don’t specify any physical storage properties for an index, the index will
    inherit its properties from the tablespace. This is usually an acceptable method
    for managing index storage.


    To view index metadata information, query the DBA/USER/ALL_INDEXES data dictionary
    views. For example, this query displays all index information for the currently
    connected user: select


    table_name


    ,index_name


    ,index_type


    ,tablespace_name


    ,status


    from user_indexes


    order by table_name;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ OBJECT MANAGEMENT


    **To Rebuild or not**


    In the olden days (version 7 or so), in the name of performance, DBAs would religiously
    rebuild indexes on a regular basis. Just about every DBA had a script similar
    to the one listed next that would use SQL to generate the SQL required to rebuild
    indexes for a schema:


    **SPO ind_build_dyn.sql**


    **SET HEAD OFF PAGESIZE 0 FEEDBACK OFF;**


    **SELECT ''ALTER INDEX '' || index_name || '' REBUILD;''**


    **FROM user_indexes;**


    **SPO OFF;**


    **SET FEEDBACK ON;**


    However, it’s debatable as to whether rebuilding an index with the newer versions
    of Oracle will achieve any kind of performance gain. Refer to Oracle’s My Oracle
    Support (formerly known as MetaLink) web site for more details. In particular,
    document ID 555284.1 contains a script that detects whether an index might need
    to be rebuilt.


    How It Works


    An index is an optional database object that is used primarily to increase performance.
    An index in Oracle works much like an index in the back of a book that associates
    a page number with information of interest. When looking for information in a
    book, it’s usually much faster to look in the index first, then go to the page
    of interest. If there were no index, you would have to scan every page of the
    book to find the information.


    An index is a separate object from the table and can be created and dropped independently
    of the table. Just like a table, indexes require storage. Additionally, there
    is some overhead with an index as Oracle has to maintain the indexes as data is
    inserted, updated, or deleted in the associated table.


    Therefore, you should only add an index when you are certain it will improve performance.
    See Chapter 19 for details on improving SQL query performance.


    The index definition is associated with a table and column(s). The index structure
    stores a mapping of a row’s ROWID and the column data on which the index is built.
    A ROWID usually uniquely identifies a row within a database. The ROWID contains
    information to physically locate a row (datafile, block, and row position within
    block).'
  trans: "\n因为之前对象的命名空间不包含在模式内，所以这些对象必须在整个数据库中具有唯一的名称。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 18 章 ■ 对象管理\n\n### 18-5. 删除表\n\n#### 问题\n\n你想从用户中移除一个对象，例如表。\n\n#### 解决方案\n\
    \n使用 `DROP TABLE` 语句来删除表。此示例删除了一个名为 `INVENTORY` 的表：\n```sql\ndrop table inventory;\n\
    ```\n你应该会看到以下确认信息：\n```sql\nTable dropped.\n```\n如果你尝试删除一个其主键或唯一键被子表中的外键引用的表，你会看到类似这样的错误：\n\
    ```sql\nORA-02449: unique/primary keys in table referenced by foreign keys\n```\n\
    你需要么删除被引用的外键约束，要么在删除父表时使用 `CASCADE CONSTRAINTS` 选项：\n```sql\ndrop table inventory\
    \ cascade constraints;\n```\n\n#### 工作原理\n\n你必须是表的所有者或拥有 `DROP ANY TABLE` 系统权限才能删除表。如果你有\
    \ `DROP ANY TABLE` 权限，你可以在表名前加上模式名来删除不同模式中的表：\n```sql\ndrop table inv_mgmt.inventory;\n\
    ```\n如果表名前没有用户名，Oracle 会假定你要删除当前用户中的表。\n\n如果你正在使用 `RECYCLEBIN` 功能，`DROP TABLE`\
    \ 会在逻辑上将表标记为已删除并重命名它。重命名后的表被放入一个称为 `RECYCLEBIN` 的逻辑容器中。该表会保留在你的 `RECYCLEBIN` 中，直到你手动移除它或\
    \ Oracle 需要空间给其他对象。这意味着，与被删除表相关的空间直到你清空 `RECYCLEBIN` 后才会被释放。如果你想清空 `RECYCLEBIN`\
    \ 的全部内容，请使用 `PURGE RECYCLEBIN` 语句：\n```sql\nSQL> purge recyclebin;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n如果你想绕过 `RECYCLEBIN` 功能并永久删除一个表，请使用 `DROP TABLE` 语句的 `PURGE` 选项：\n```sql\ndrop\
    \ table inventory purge;\n```\n如果你使用 `PURGE` 选项，表将被永久删除。你将无法使用 `FLASHBACK TABLE`\
    \ 语句（详情参见配方 18-6）来恢复该表。该表使用的所有空间都会被释放，所有相关的索引和触发器也会被删除。\n\n### 18-6. 撤消删除表\n\n\
    #### 问题\n\n你不小心删除了一个表，并希望恢复它。\n\n#### 解决方案\n\n首先确认你想要恢复的表是否在回收站中：\n```sql\nSQL>\
    \ show recyclebin;\n```\n```\nORIGINAL NAME RECYCLEBIN NAME OBJECT TYPE DROP TIME\n\
    ---------------- ------------------------------ ------------ -------------------\n\
    PURCHASES BIN$YzqK0hN3Fh/gQHdAPLFgMA==$0 TABLE 2009-02-18:17:23:15\n```\n接下来，使用\
    \ `FLASHBACK TABLE...TO BEFORE DROP` 语句来恢复被删除的表：\n```sql\nflashback table purchases\
    \ to before drop;\n```\n> **注意** 你不能对在 `SYSTEM` 表空间中创建的表执行 `FLASHBACK TABLE...TO\
    \ BEFORE DROP`。\n\n#### 工作原理\n\n在 Oracle 数据库 10*g* 及更高版本中，当发出 `DROP TABLE` 语句时，表实际上被重命名（重命名为以\
    \ `BIN$` 开头的名称）并放入回收站。回收站是一种机制，允许你查看与被删除对象相关联的一些元数据。你可以通过查询 `DBA_SEGMENTS` 来查看有关重命名对象的完整元数据：\n\
    ```sql\nselect segment_name, segment_type, tablespace_name\nfrom dba_segments\n\
    where segment_name like 'BIN%';\n```\n```\nSEGMENT_NAME SEGMENT_TYPE TABLESPACE_NAME\n\
    ------------------------------ ------------------ ---------------\nBIN$YzqK0hN4Fh/gQHdAPLFgMA==$0\
    \ TABLE MTS\n```\n`FLASHBACK TABLE` 语句只是简单地将表重命名回其原始名称。默认情况下，在 Oracle 数据库 10*g*\
    \ 及更高版本中，`RECYCLEBIN` 功能是启用的。你可以通过将 `RECYCLEBIN` 初始化参数设置为 `OFF` 来更改默认设置。\n\n我们建议你不要禁用\
    \ `RECYCLEBIN` 功能。保持此功能启用并清空 `RECYCLEBIN` 以移除你想要永久删除的对象更安全。如果你想永久删除一个表，请使用 `DROP\
    \ TABLE` 语句的 `PURGE` 选项。\n\n### 18-7. 创建索引\n\n#### 问题\n\n你遇到了性能问题。你已经识别出一个用作搜索条件的高选择性列。你想在表上添加一个索引。\n\
    \n#### 解决方案\n\nOracle 中的默认索引类型是 B 树（平衡树）索引。要在现有表上创建 B 树索引，请使用 `CREATE INDEX` 语句。此示例在\
    \ `D_SOURCES` 表上创建了一个索引，指定 `D_SOURCE_ID` 作为列：\n```sql\ncreate index d_sources_idx1\
    \ on d_sources(d_source_id);\n```\n默认情况下，Oracle 会尝试在你的默认表空间中创建索引。使用以下语法指示 Oracle\
    \ 在特定表空间中构建索引：\n```sql\ncreate index d_sources_idx1 on d_sources(d_source_id)\
    \ tablespace dim_index;\n```\n如果你没有为索引指定任何物理存储属性，索引将从表空间继承其属性。这通常是管理索引存储的一种可接受的方法。\n\
    \n要查看索引元数据信息，请查询 `DBA_INDEXES`、`USER_INDEXES` 或 `ALL_INDEXES` 数据字典视图。例如，此查询显示当前连接用户的所有索引信息：\n\
    ```sql\nselect\n  table_name\n  ,index_name\n  ,index_type\n  ,tablespace_name\n\
    \  ,status\nfrom user_indexes\norder by table_name;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n#### 是否重建索引\n\n在过去（大约版本 7 左右），为了性能，DBA 们会定期地重建索引。几乎每个 DBA 都有一个类似于下面列出的脚本，该脚本使用\
    \ SQL 为模式生成重建索引所需的 SQL：\n```sql\nSPO ind_build_dyn.sql\nSET HEAD OFF PAGESIZE\
    \ 0 FEEDBACK OFF;\nSELECT 'ALTER INDEX ' || index_name || ' REBUILD;'\nFROM user_indexes;\n\
    SPO OFF;\nSET FEEDBACK ON;\n```\n然而，对于较新版本的 Oracle，重建索引是否能带来任何形式的性能提升是值得商榷的。更多详情请参考\
    \ Oracle 的 My Oracle Support（以前称为 MetaLink）网站。特别是，文档 ID 555284.1 包含一个脚本，用于检测索引是否可能需要重建。\n\
    \n#### 工作原理\n\n索引是一个可选的数据库对象，主要用于提高性能。Oracle 中的索引工作原理很像书末尾的索引，它将页码与感兴趣的信息关联起来。在书中查找信息时，通常先查看索引，然后转到感兴趣的页面要快得多。如果没有索引，你将不得不扫描书的每一页来查找信息。\n\
    \n索引是与表分开的对象，可以独立于表创建和删除。就像表一样，索引需要存储空间。此外，索引会带来一些开销，因为 Oracle 必须在关联表中插入、更新或删除数据时维护索引。因此，只有在你确定索引能提高性能时才应添加索引。有关提高\
    \ SQL 查询性能的详细信息，请参见第 19 章。\n\n索引定义与表和列相关联。索引结构存储了行的 `ROWID` 和构建索引所基于的列数据的映射。`ROWID`\
    \ 通常唯一标识数据库中的一行。`ROWID` 包含物理定位一行的信息（数据文件、块和行在块中的位置）。\n"
- fmt: "By default, when you create an index in Oracle, its type will be a balanced\
    \ B-tree structure. Figure 18-1 shows the balanced, tree-like structure of a B-tree\
    \ index created on a first-name column. When Oracle accesses the index, it starts\
    \ with the top node called the `root block`. It uses this block to determine which\
    \ second-level block to read next. The second-level block points to several leaf\
    \ nodes that contain a `ROWID` and the name value. In this structure, it will\
    \ take three I/O operations to find the `ROWID`. Once the `ROWID` is determined,\
    \ Oracle will use it to read the table block that contains the `ROWID`.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 33](index-465_1.png)\n\n![Image 34](index-465_2.png)\n\n![Image 35](index-465_3.png)\n\
    \n![Image 36](index-465_4.png)\n\n![Image 37](index-465_5.png)\n\n![Image 38](index-465_6.png)\n\
    \n![Image 39](index-465_7.png)\n\n![Image 40](index-465_8.png)\n\n![Image 41](index-465_9.png)\n\
    \n![Image 42](index-465_10.png)\n\n![Image 43](index-465_11.png)\n\n# CHAPTER\
    \ 18 ■ OBJECT MANAGEMENT\n\n*Figure 18-1. Balanced B-tree index structure*\n\n\
    ## Separate Tablespaces for Tables and Indexes\n\nDBAs debate the merits of separating\
    \ tables and indexes into different tablespaces. If you have the luxury of setting\
    \ up a storage system from scratch and can set up mount points that have their\
    \ own sets of disks and controllers, you may see some I/O benefits by specifying\
    \ tables to be built in tablespaces based on datafiles on one mount point, and\
    \ indexes to be built in tablespaces based on datafiles on a separate mount point.\n\
    \nHowever, nowadays it’s often the case where your storage administrator will\
    \ just give you a large slice of storage in a SAN and there’s no way to guarantee\
    \ that data and indexes will be stored physically on separate disks (and controllers).\
    \ Nevertheless, there are still valid reasons to separate index tablespaces from\
    \ the table tablespaces:\n\n• You may want to implement different physical storage\
    \ characteristics (such as extent size) for tables and indexes, and you prefer\
    \ to allow the table and index to inherit their storage attributes from the tablespace.\n\
    \n• You prefer to have the option of being able to back up, restore, and recover\
    \ table and index tablespaces separately.\n\n• When running maintenance reports,\
    \ you find it easier to manage tables and indexes when the reports have sections\
    \ separated by tablespace.\n\nIf any of these reasons are valid for your environment,\
    \ it’s probably worth the extra effort to employ different tablespaces for tables\
    \ and indexes.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# CHAPTER\
    \ 18 ■ OBJECT MANAGEMENT\n\n## 18-8. Creating a Function-Based Index\n\n### Problem\n\
    \nYou’re running this SQL query:\n\n```\nselect emp_name from emp where UPPER(emp_name)\
    \ = 'DAVE';\n```\n\nYou’ve created a normal B-tree index on the `EMP_NAME` column,\
    \ but you notice that Oracle is not using the index whenever you apply the `UPPER`\
    \ function to the `EMP_NAME` column. You wonder if you can create an index that\
    \ Oracle will use.\n\n### Solution\n\nCreate a function-based index to improve\
    \ performance of queries that use a SQL function in the `WHERE` clause. This example\
    \ creates a function-based index on `UPPER(EMP_NAME)`:\n\n```\ncreate index user_upper_idx\
    \ on emp(upper(emp_name));\n```\n\nWhy use a function-based index? Because that’s\
    \ the only kind Oracle will use in this scenario. Oracle will disregard a regular\
    \ index on a column if you apply a SQL function to it in the `WHERE` clause.\n\
    \n### How It Works\n\nFunction-based indexes allow index lookups on columns referenced\
    \ by functions in the `WHERE` clause of a SQL query. The function-based index\
    \ can be as simple as the preceding example, or it can be based on complex logic\
    \ stored in a PL/SQL function.\n\nAny user-created SQL functions must be declared\
    \ `deterministic` before they can be used in a function-based index. Deterministic\
    \ means that for a given set of inputs, the function will always return the same\
    \ results. You must use the key word `DETERMINISTIC` when creating a user-defined\
    \ function you want to use in a function-based index.\n\nSelect from the `DBA/ALL/USER_IND_EXPRESSIONS`\
    \ view to display the SQL associated with a function-based index:\n\n```\nselect\
    \ index_name, column_expression from user_ind_expressions;\n```\n\nIf you’re running\
    \ this SQL from SQL*Plus, don’t forget to use the `SET LONG` command in order\
    \ to display the entire contents of the `COLUMN_EXPRESSION` column. For example:\n\
    \n```\nSQL> set long 500\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 18 ■ OBJECT MANAGEMENT\n\n## 18-9. Creating a Bitmap Index\n\n###\
    \ Problem\n\nYou’ve built a star schema in a data warehouse. You want to ensure\
    \ that SQL queries that join fact and dimension tables return data efficiently.\n\
    \n### Solution\n\nCreate bitmap indexes on columns used to join the fact and dimension\
    \ tables. Bitmap indexes are created by using the keyword `BITMAP` of the `CREATE\
    \ INDEX` statement. This example creates a bitmap index on the column `D_DATE_ID`\
    \ of the `F_DOWNLOADS` table:\n\n```\ncreate bitmap index f_down_date_fk1 on f_downloads(d_date_id);\n\
    ```\n\nIf your fact table is partitioned, you must create the bitmap index as\
    \ locally partitioned. Do this by specifying the `LOCAL` keyword:\n\n```\ncreate\
    \ bitmap index f_down_date_fk1 on f_downloads(d_date_id) local;\n```\n\n### How\
    \ It Works\n\nBitmapped indexes are used extensively in data warehouse environments,\
    \ typically on fact table foreign key columns. Bitmap indexes are less appropriate\
    \ for OLTP environments where you have multiple-session DML activity on a table.\
    \ This is because with a bitmap-indexed column, the internal structure of the\
    \ bitmap index often requires that many rows be locked during the update. Therefore,\
    \ if you have more than one session performing `UPDATES`, `INSERTS`, and `DELETES`,\
    \ you will encounter locking and deadlock problems.\n\nBitmap indexes in data\
    \ warehouse environments are usually dropped and re-created as needed.\n\nTypically,\
    \ before a large amount of data is loaded, the bitmap indexes are dropped, and\
    \ then re-created after the table is populated. To improve the performance of\
    \ creating a bitmap index, you can turn off the generation of redo via the `NOLOGGING`\
    \ option:\n\n```\ncreate bitmap index f_down_date_fk1 on f_downloads(d_date_id)\
    \ local nologging;\n```\n\nBecause the index can easily be re-created, there’s\
    \ usually no reason to generate redo for the `CREATE INDEX` operation.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 18 ■ OBJECT MANAGEMENT\n\n## 18-10. Creating an Index-Organized Table\n\
    \n### Problem\n\nYou have an application that mainly accesses the table data through\
    \ queries that select on the primary key or a range of primary key values. You\
    \ want to efficiently query this table.\n\n### Solution\n\nIndex-organized tables\
    \ (IOTs) are efficient objects when the table data is typically accessed through\
    \ querying on the primary key. Use the `ORGANIZATION INDEX` clause to create an\
    \ index-organized table:\n\n```\ncreate table prod_sku\n(prod_sku_id number,\n\
    \ sku varchar2(256),\n create_dtt timestamp(5),\n constraint prod_sku_pk primary\
    \ key(prod_sku_id)\n )\norganization index\nincluding sku\npctthreshold 30\ntablespace\
    \ inv_mgmt_data\noverflow\ntablespace mts;\n```\n\n### How It Works\n\nAn index-organized\
    \ table stores the entire contents of the table’s row in a B-tree index structure.\
    \ Index-organized tables provide fast access for queries that have exact matches\
    \ and/or range searches on the primary key.\n\nThe `INCLUDING` clause specifies\
    \ the start of which columns to store in the overflow data segment. In the previous\
    \ example, the `SKU` and `CREATE_DTT` columns are stored in the overflow segment.\n\
    \nThe `PCTTHRESHOLD` specifies the percentage of space reserved in the index block\
    \ for the index-organized table row. This value can be from 1 to 50, and defaults\
    \ to 50 if no value is specified. There must be enough space in the index block\
    \ to store the primary key.\n\nThe `OVERFLOW` clause details which tablespace\
    \ should be used to store overflow data segments."
