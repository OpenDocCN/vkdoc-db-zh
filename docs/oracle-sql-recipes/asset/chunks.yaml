    CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA


    2-10\. Building Your Own Aggregate Function


    Problem


    You need to implement a custom aggregation to work in conjunction with Oracle’s
    existing aggregate functions and grouping mechanisms. You specifically want to
    aggregate strings in multiple rows to one row so that the text from each row is
    concatenated, one after the other. You’ve seen this supported in other databases
    but you can’t find an equivalent Oracle function.


    Solution


    Oracle provides a framework for writing your own aggregate functions, either to
    provide an aggregation not otherwise available in Oracle or to develop your own
    custom version of a common aggregate function with differing behavior. Our recipe
    creates a new aggregate function, STRING_TO_LIST, and the supporting type definition
    and type body based on Oracle’s template for custom aggregates.


    The following type definition defines the mandatory four functions Oracle requires
    for a custom aggregate type.


    create or replace type t_list_of_strings as object (


    string_list varchar2(4000),


    static function odciaggregateinitialize


    (agg_context in out t_list_of_strings)


    return number,


    member function odciaggregateiterate


    (self in out t_list_of_strings,


    next_string_to_add in varchar2 )


    return number,


    member function odciaggregatemerge


    (self in out t_list_of_strings,


    para_context in t_list_of_strings)


    return number,


    member function odciaggregateterminate


    (self in t_list_of_strings,


    final_list_to_return out varchar2,


    flags in number)


    return number


    );


    /


    We’ve limited the STRING_LIST parameter to 4000, even though PL/SQL supports up
    to 32000, to ensure we don’t pass the threshold supported by plain SQL in Oracle.
    Each of the four required functions implements the various stages of our aggregation
    of a set of strings into one list.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA


    create or replace type body t_list_of_strings is


    static function odciaggregateinitialize


    (agg_context in out t_list_of_strings)


    return number is


    begin


    agg_context := t_list_of_strings(null);


    return odciconst.success;


    end;


    member function odciaggregateiterate


    (self in out t_list_of_strings,


    next_string_to_add in varchar2 )


    return number is


    begin


    self.string_list := self.string_list || '' , '' || next_string_to_add;


    return odciconst.success;


    end;


    member function odciaggregatemerge


    (self in out t_list_of_strings,


    para_context in t_list_of_strings)


    return number is


    begin


    self.string_list := self.string_list || '' , '' || para_context.string_list; return
    odciconst.success;


    end;


    member function odciaggregateterminate


    (self in t_list_of_strings,


    final_list_to_return out varchar2,


    flags in number)


    return number is


    begin


    final_list_to_return := ltrim(rtrim(self.string_list, '' , ''), '' , ''); return
    odciconst.success;


    end;


    end;


    /


    With the type and type body in place, we build the function we’ll use in our actual
    SQL statements to produce custom aggregated data.


    create or replace function string_to_list


    (input_string varchar2)


    return varchar2


    parallel_enable


    aggregate using t_list_of_strings;


    /


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA


    We can now use our custom aggregate function to compose a list from any set or
    subset of strings that we generate in a query. In this recipe, we want to return
    the surnames of all the employees assigned to a given manager.


    select manager_id, string_to_list (last_name) as employee_list


    from hr.employees


    group by manager_id;


    Our new custom aggregation function does the trick, producing the surnames in
    a list-like output along with the manager’s ID.


    MANAGER_ID EMPLOYEE_LIST


    ---------- ------------------------------------------------------------


    100 Hartstein , Kochhar , De Haan , Fripp , Kaufling , Weiss ...


    101 Whalen , Greenberg , Higgins , Baer , Mavris


    102 Hunold


    103 Ernst , Pataballa , Lorentz , Austin


    108 Faviet , Chen , Sciarra , Urman , Popp


    ...


    How It Works


    Don’t let the jump to PL/SQL, or the length of the recipe, scare you away. In
    fact, the majority of the code above is boiler-plate template offered by Oracle
    to assist with building custom aggregates quickly and easily.


    This recipe builds the three components necessary to create a custom aggregation,
    and then uses it in a SQL statement to list the employee surnames by manager.
    First it defines a custom type defining the four prescribed functions Oracle requires
    for a custom aggregate. These are: **ODCIAggregateInitialize:** This function
    is called at the very beginning of processing and sets up the new instance of
    the aggregate type—in our case, T_LIST_OF_STRINGS. This new instance has its member
    variables (if any) and is ready for the main aggregation phase **ODCIAggregateIterate:**
    This holds the core functionality of your custom aggregation. The logic in this
    function will be called for each data value passed over in your driving query.
    In our case, this is the logic that takes each string value and appends it to
    the existing list of strings.


    **ODCIAggregateMerge:** This is the semi-optional function that controls Oracle’s
    behavior, if Oracle decides to perform the aggregation in parallel, using multiple
    parallel slaves working against portions of the data. While you don’t have to
    enable the parallel option (see below), you still need to include this function.
    In our case, should our list creation be split into parallel tasks, all we need
    to do is concatenate the sublists at the end of the parallel process.


    **ODCIAggregateTerminate;** This is the final function and is required to return
    the result to the calling SQL function. In our case, it returns the global variable
    STRING_LIST that has been built up in the iteration and parallel merging stages.


    We now have the mechanics of aggregation built. The next part of the recipe builds
    the function that you can call to actually get your great new aggregation feature
    working on data. We create a function that has many of the normal features you’d
    expect:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA


    create or replace function string_to_list


    (input_string varchar2)


    return varchar2


    parallel_enable


    aggregate using t_list_of_strings;


    /


    The function gets a name, STRING_TO_LIST, and it takes a VARCHAR2 string as input
    and returns one as output. So far, very mundane. It’s the next two lines that
    are key to our recipe’s aggregation behavior.


    The PARALLEL_ENABLE clause is entirely optional, and instructs Oracle that it
    is safe to perform the underlying aggregation logic in parallel if the optimizer
    decides to take that path. Depending on the logic in your ODCIAGGREGATEITERATE
    function, you may have particular actions that must happen in a particular order
    and thus want to avoid parallelism. Enabling parallel processing also implies
    that logic is in place in the ODCIAGGREGATEMERGE member function to deal with
    merged subsets of results.'
