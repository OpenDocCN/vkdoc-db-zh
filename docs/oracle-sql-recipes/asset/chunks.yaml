    Results from our TO_CHAR formatting appear with the correct day name, month name
    and other desired formatting in place.


    FIRST_NAME LAST_NAME FORMATTED_ HIRE_DATE


    ------------------- ------------------ --------------------------------------


    Donald OConnell Monday, June 21ST, 1999


    Douglas Grant Thursday, January 13TH, 2000


    Jennifer Whalen Thursday, September 17TH, 1987


    Michael Hartstein Saturday, February 17TH, 1996


    Pat Fay Sunday, August 17TH, 1997


    …


    How It Works


    Our recipe uses a very straightforward structure to select the FIRST_NAME and
    LAST_NAME values from the HR.EMPLOYEE table. When selecting the HIRE_DATE, we
    employ the TO_CHAR function with specific formatting codes to change the default
    format of the data, instructing Oracle to emit the full day and month name, ordinal
    date number, and full year.


    The general format of the TO_CHAR function for converting dates takes this form.


    to_char(<date/time expression>, ''<format options>'')


    In our recipe, we used several options to format the day. We led with the Day
    option, which returns the full day name, such as Monday. We also use DD, together
    with the ordinal formatting code TH, to return the ordinal day number, such as
    21st and 17th. The MONTH code returns the full month name, such as January. The
    year is returned by the YYYY code, which instructs Oracle to return the full four-digit
    year.


    We assume a future upgrade of Oracle will support five Y formatting characters
    here at some point before the year 10000.


    Oracle includes numerous other day, month, year, and other formatting options
    to return date and time information in digits, words, and regionally sensitive
    strings (although the key words that are used in formatting commands are always
    in English). There are five more formatting characters in the string, though they
    may not be immediately obvious. The two comma characters and three spaces are
    themselves included as format options. These, together with other common punctuation
    such as dashes and colons, are all valid options in the TO_CHAR format string.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ WORKING WITH DATE AND TIME VALUES


    ■ **Note** It’s comforting to know that Oracle supports all manner of formatting
    codes and options in TO_CHAR for dates and times. However, there is a 22-character
    limit on the formatting options passed to the TO_CHAR function.


    This can frustrate your attempts to format dates and times in elaborate fashion.
    Don’t despair if you run into this limit. You can always combine multiple calls
    to TO_CHAR, with other string functions, such as those shown in Chapter 7, to
    produce your desired output.


    6-2\. Converting Strings to Datetime Values


    Problem


    You need to convert date information provided in textual form to Oracle’s DATE
    format.


    Solution'
  trans: "\n# 第六章 ■ 处理日期和时间值\n\n本章的一个关键方面，是让你以全新的视角来思考自己面临的日期和时间问题及查询，并激发你的想象力，思考\
    \ Oracle 众多各异的日期和时间函数与工具如何能够解决一些最棘手的时间序列问题。\n\n## 6-1. 将日期时间值转换为可读字符串\n\n### 问题\n\
    \n你需要将 Oracle 默认日期格式提供的短日期转换为完整日期，以便插入到套用信函或报告中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 解决方案\n\n使用 Oracle 的 `TO_CHAR` 函数，以所需格式格式化日期、时间及其他时间数据。`TO_CHAR` 函数支持广泛的日期专用格式选项，可处理日/月名称、数字表示和格式化，以及类似任务。我们的示例假设你希望以完整的描述性格式显示员工被雇佣的日期。具体来说，你希望将\
    \ `1/1/2009` 报告为 `Thursday, January 1st, 2009`（星期四，2009 年 1 月 1 日）。\n\n接下来的 SQL\
    \ 语句为所有员工执行相关的计算和格式化。\n\n```sql\nselect first_name, last_name,\n       to_char(hire_date,\
    \ 'Day, Month DDTH, YYYY') formatted_hire_date\n  from hr.employees;\n```\n\n\
    我们的 `TO_CHAR` 格式化结果会显示正确的星期名称、月份名称以及其他所需的格式。\n\n```\nFIRST_NAME   LAST_NAME  \
    \ FORMATTED_HIRE_DATE\n-----------  ----------  --------------------------------------\n\
    Donald       OConnell    Monday, June 21ST, 1999\nDouglas      Grant       Thursday,\
    \ January 13TH, 2000\nJennifer     Whalen      Thursday, September 17TH, 1987\n\
    Michael      Hartstein   Saturday, February 17TH, 1996\nPat          Fay     \
    \    Sunday, August 17TH, 1997\n...\n```\n\n### 工作原理\n\n我们的示例采用了非常直接的结构来从 `HR.EMPLOYEES`\
    \ 表中选取 `FIRST_NAME` 和 `LAST_NAME` 值。在选取 `HIRE_DATE` 时，我们使用了 `TO_CHAR` 函数并配合特定的格式代码，以更改数据的默认格式，指示\
    \ Oracle 输出完整的星期和月份名称、序数日期数字以及完整的年份。\n\n用于转换日期的 `TO_CHAR` 函数通用格式如下。\n\n```sql\n\
    to_char(<日期/时间表达式>, '<格式选项>')\n```\n\n在我们的示例中，我们使用了几个选项来格式化日期。我们以 `Day` 选项开头，它返回完整的星期名称，例如\
    \ `Monday`（星期一）。我们还使用了 `DD` 结合序数格式代码 `TH`，来返回序数日期数字，例如 `21st` 和 `17th`。`MONTH`\
    \ 代码返回完整的月份名称，例如 `January`（一月）。年份由 `YYYY` 代码返回，它指示 Oracle 返回完整的四位数年份。\n\n我们假设在未来的某个版本中（大概是在公元\
    \ 10000 年之前的某个时候），Oracle 会支持这里使用五个 `Y` 格式字符。\n\nOracle 包含众多其他的日、月、年及其他格式选项，可以以数字、文字和区域敏感的字符串（尽管格式化命令中使用的关键字始终是英文）返回日期和时间信息。字符串中还有另外五个格式字符，尽管它们可能并不显而易见。两个逗号字符和三个空格本身也包含为格式选项。这些，连同其他常见的标点符号（如破折号和冒号），都是\
    \ `TO_CHAR` 格式字符串中的有效选项。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n`Note` 令人欣慰的是，Oracle 在日期和时间的 `TO_CHAR` 函数中支持各种格式代码和选项。但是，传递给 `TO_CHAR` 函数的格式选项有\
    \ 22 个字符的限制。\n\n这可能会阻碍你以精心设计的方式格式化日期和时间。如果遇到此限制，请不要绝望。你总是可以结合多次调用 `TO_CHAR` 与其他字符串函数（如第\
    \ 7 章所示）来生成所需的输出。\n\n## 6-2. 将字符串转换为日期时间值\n\n### 问题\n\n你需要将文本形式提供的日期信息转换为 Oracle\
    \ 的 `DATE` 格式。\n\n### 解决方案\n"
- fmt: '# CHAPTER 6 ■ WORKING WITH DATE AND TIME VALUES


    ## TO_DATE Function


    Just as Oracle supports the `TO_CHAR` function to convert dates and times to text,
    it supports an equivalent function `TO_DATE` to perform the complementary process
    of converting text into dates and times.


    Suppose you are given a date in written form, like `January 17, 2009`. Oracle
    expects dates to appear in a default format depending on the `NLS` regional settings.
    Oracle defaults to expecting one of `DD-MMM-YY` or `DD-MMM-YYYY` as the date format.
    You can use the `TO_DATE` function to convert `January 17, 2009` to one of these
    formats, as shown in the next SQL statement.


    ```sql

    select to_date(''January 17, 2009'', ''Month DD, YYYY'') formatted_date

    from dual;

    ```


    ```

    FORMATTED_DATE

    --------------

    17-JAN-09

    ```


    ## How It Works


    The `TO_DATE` function is designed to interpret dates and times in textual and
    numeric form and uses a formatting pattern to apply translation rules to produce
    a result cast to the `DATE` datatype. The general form of the `TO_DATE` function
    is shown next.


    ```

    to_date(<string>, <format options>)

    ```


    The `string` parameter to the function is the textual words, numbers, and punctuation
    you wish converted to an Oracle `DATE` datatype. The `format` parameter is a string
    composed of formatting options.


    Oracle uses the formatting options to parse the textual string in a "parse and
    match" fashion. The key to successfully converting your text to a meaningful date
    is to find the format option that matches the text you need to convert.


    ## Table 6-1. Common Date and Time Formatting Options


    | Code | Format |

    | :--- | :--- |

    | `Day` | Day of week in full written form (for example, `Wednesday`) |

    | `DD` | Day of month in numeric form, 1 to 31 |

    | `DY` | Day of week in abbreviated written form (for example, `Mon` for `Monday`)
    |

    | `HH` | Hour of the day in numeric form, 1 to 12 |

    | `HH12` | Hour of the day in numeric form, 1 to 12 |

    | `HH24` | Hour of the day in 24-hour clock numeric form, 0 to 23 |

    | `MI` | Minute of the hour in numeric form, 0 to 59 |

    | `MM` | Month in numeric form, 01 to 12 |

    | `Mon` | Month in abbreviated written form (for example, `Apr` for `April`) |

    | `Month` | Month in full written form (for example, `September`) |

    | `RR` | Year from the previous (20th) century in two-byte notation |

    | `YYYY` | Numeric year, expressed with four digits. |


    Oracle even includes formatting codes to deal with such complexities as the day
    of the month, expressed in numeric ordinal form in words rather than numbers.
    So you can successfully convert the string `January Seventeenth` if you need to.


    ## 6-3. Detecting Overlapping Date Ranges


    ### Problem


    You need to find where start and end date ranges overlap for some of the data
    modeled in your system.


    ### Solution


    Oracle supports all of the typical comparison operators for query criteria and
    predicates with the `DATE`, `TIMESTAMP` and other temporal datatypes. This means
    you can test if dates are greater than others, less than others, equal to others,
    in a given list, not found in a given list, and so on. The concepts of greater
    and lesser dates translate to earlier and later points in time.


    Our recipe will focus on the `SH.PROMOTIONS` table, which tracks what promotional
    offers like coupons and discount codes have been recorded and used as part of
    sales over time. The next SQL statement determines which promotions began while
    an existing promotion was still running, for the `Ad News` subcategory within
    the `Newspaper` promotional category.


    ```sql

    select p2.promo_name || '' started before '' || p1.promo_name || '' ended.''

    as "Promotion Overlap"

    from sh.promotions p1 inner join sh.promotions p2 on

    (p1.promo_category = p2.promo_category and

    p1.promo_subcategory = p2.promo_subcategory and

    p1.promo_id != p2.promo_id)

    where p1.promo_category = ''newspaper''

    and p1.promo_subcategory = ''ad news''

    and p2.promo_begin_date >= p1.promo_begin_date

    ```'
