    \ this `START WITH` clause:\n\n```sql\nstart with employee_id = 100\n```\n\nFurthermore,\
    \ if there are two hierarchies in the table, and the co-owner of the company has\
    \ an `EMPLOYEE_ID` = 250, the `START WITH` clause would be as follows:\n\n```sql\n\
