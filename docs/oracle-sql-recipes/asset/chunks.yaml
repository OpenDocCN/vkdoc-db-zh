- fmt: "# How It Works\n\n大多数（如果不是全部）随机数生成器都从一个 **种子** 值开始生成结果，换句话说，随机数生成器使用该值在随机数序列中计算起始位置。`DBMS_RANDOM`\
    \ 包也不例外。如果您不指定种子值，Oracle 会使用当前日期、用户ID和进程ID来计算种子。要从同一起点重现随机数序列，您可以指定自己的种子，如下例所示：\n\
    \n```\nbegin\n  dbms_random.seed(40027);\nend;\n```\n\n`DBMS_RANDOM.SEED` 过程也接受字符串值来初始化随机数序列：\n\
    \n```\nbegin\n  dbms_random.seed('The Rain in Spain');\nend;\n```\n\n`DBMS_RANDOM.VALUE`\
    \ 函数甚至更加灵活：您可以指定随机数落在指定范围内。例如，如果您只需要50到100之间的随机数，可以这样做：\n\n```\nselect dbms_random.value(50,100)\
    \ from dual;\n\nDBMS_RANDOM.VALUE(50,100)\n-------------------------\n95.2813813550075919354971754613182604395\n\
    \n1 rows selected\n```\n\n因此，您可以稍微修改解决方案，以利用范围规范：\n\n```\nupdate product_information\n\
    set daily_price =\n  round(list_price*(0.9-(dbms_random.value(0.0,0.1))))\n;\n\
    ```\n\n最后，`DBMS_RANDOM` 包还包含 `STRING` 函数，因此您可以检索随机字符串值。您需要指定两个参数：返回的字符串类型和长度。以下是一个示例：\n\
    \n```\nselect dbms_random.string('U',20) from dual;\n\nDBMS_RANDOM.STRING('U',20)\n\
    --------------------------\nFTFGYZPCYWNCOKYCKDJI\n\n1 rows selected\n```\n\n第一个参数可以是以下字符串常量之一：\n\
    \n- ‘u’ 或 ‘U’：大写字母\n- ‘l’ 或 ‘L’：小写字母\n- ‘a’ 或 ‘A’：混合大小写字母\n- ‘x’ 或 ‘X’：大写字母数字\n\
    - ‘p’ 或 ‘P’：任何可打印字符\n\n因此，要生成一组非常隐蔽且随机的25个字符，您可以这样做：\n\n```\nselect dbms_random.string('p',25)\
    \ from dual;\n\nDBMS_RANDOM.STRING('P',25)\n--------------------------\nn!Wuew+R$$Qhf^mbGR,2%tr@a\n\
    \n1 rows selected\n```\n\n## 4-9. 创建逗号分隔值文件\n\n### 问题\n\n您需要将 Oracle 表或视图导出为 CSV（逗号分隔值）格式，以便导入到\
    \ Microsoft Excel 或其他可以导入 CSV 格式数据的应用程序中。\n\n### 解决方案\n\n使用 SQL*Plus、针对一个或多个表的自定义查询以及一组精心选择的\
    \ SQL*Plus 命令，创建一个在导入 Microsoft Excel 之前无需进一步处理的文本文件。\n\n您用于检索数据的查询返回的第一行是列名，然后是表中的行，每列之间用逗号分隔，每个字符串用双引号括起来。以下是查询以及所需的\
    \ SQL*Plus 命令，您可以将它们存储在一个文件中，例如 `emp_sal.sql`：\n\n```\n-- suppress sql output\
    \ in results\nset echo off\n-- eliminate row count message at end\nset feedback\
    \ off\n-- make line long enough to hold all row data\nset linesize 1000\n-- suppress\
    \ headings and page breaks\nset pagesize 0\n-- eliminate SQL*Plus prompts from\
    \ output\nset sqlprompt ''\n-- eliminate trailing blanks\nset trimspool on\n--\
    \ send output to file\nspool emp_sal.csv\n\nselect '\"EMPLOYEE_ID\",\"LAST_NAME\"\
    ,\"FIRST_NAME\",\"SALARY\"' from dual union all\nselect employee_id || ',\"' ||\n\
    \       last_name || '\",\"' ||\n       first_name || '\",' ||\n       salary\n\
    from employees\n;\n\nspool off\nexit\n```\n\n运行此脚本的输出如下所示：\n\n```\nC:\\>sqlplus\
    \ hr/hr@recipes @emp_sal.sql\n\nSQL*Plus: Release 11.1.0.6.0 - Production on Sun\
    \ Sep 27 22:12:01 2009\n\nCopyright (c) 1982, 2007, Oracle.  All rights reserved.\n\
    \nConnected to:\n```"
