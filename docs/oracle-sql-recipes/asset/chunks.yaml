    CHAPTER 4 ■ CREATING AND DERIVING DATA


    How It Works


    Once you’ve mastered the basics of the PIVOT clause, taking it a step further
    is easy. Just add as many additional aggregates to your PIVOT clause as you need.
    Remember, though, that adding a second aggregate doubles the number of derived
    columns, adding a third triples it, and so forth.


    Let’s extend the solution even more, adding another pivot column. In the ORDERS
    table, the column ORDER_MODE contains the string direct if the sale was over the
    phone and ONLINE if the order was placed on the company’s Internet site. To pivot
    on ORDER_MODE, just add the column to the FOR clause and specify pairs of values
    instead of single values in the FOR list as follows: with order_item_query as


    (select customer_id, product_id, quantity, unit_price, order_mode


    from orders join order_items using(order_id))


    select * from order_item_query


    pivot (


    sum(quantity) as sum_qty,


    sum(quantity*unit_price) as sum_prc


    for (product_id**, order_mode**) in ((3170, **''direct''** ) as P3170_**DIR**,
    (3170, **''online''** ) as P3170_**ONL**,


    (3176, **''direct''** ) as P3176_**DIR**,


    (3176, **''online''** ) as P3176_**ONL**,


    (3182, **''direct''** ) as P3182_**DIR**,


    (3182, **''online''** ) as P3182_**ONL**,'
  trans: "\n## 第四章 ■ 创建与推导数据\n\n### 4-4. 在多个列上进行透视\n\n否则，如果你的查询中有多余的列，你的结果将会比预期多出许多行！这非常类似于在带有聚合的常规\
    \ `SELECT` 语句中的 `GROUP BY` 子句添加额外的列，通常会增加结果中的行数。\n\n`PIVOT` 子句本身会在查询结果中生成额外的列。以下是解决方案中\
    \ `PIVOT` 子句的第一部分：\n\n`sum(quantity) as sum_qty`\n\n你指定一个或多个希望出现在新列中的聚合，并为 Oracle\
    \ 将用于每个新列分配一个标签后缀。（我们将在本节后面展示如何在多个列上进行透视或聚合多个列。）在本例中，所有派生列都将以 `SUM_QTY` 结尾。\n\n\
    `FOR` 子句中的列会筛选用于聚合结果的行。`FOR` 子句中列的每个值，或每个指定的两列或多列组合，都将在结果中产生一个额外的派生列。解决方案中的 `FOR`\
    \ 子句如下：`for (product_id) in (3170 as P3170, 3176 as P3176, 3182 as P3182, 3163\
    \ as P3163, 3165 as P3165)`\n\n该查询将仅使用 `PRODUCT_ID` 在列表中的行，因此其作用类似于 `WHERE` 子句，在聚合之前筛选结果。每个透视值后指定的文本字符串用作新列名的前缀，如解决方案查询的结果所示。\n\
    \n最后，`ORDER BY` 子句的作用与在任何其他查询中的作用相同——按指定的列对最终结果集进行排序。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n#### 问题\n\n你已经实现了前一个方案中展示的解决方案。现在你希望不仅根据产品的总数量进行透视，还根据购买的总美元价值进行透视。\n\n####\
    \ 解决方案\n\n以下查询扩展了前一个方案的解决方案，为每个产品编号添加了一个总金额列：\n\n```sql\nwith order_item_query\
    \ as\n(select customer_id, product_id, quantity, unit_price\n from orders join\
    \ order_items using(order_id))\nselect * from order_item_query\npivot (\n sum(quantity)\
    \ as sum_qty,\n sum(quantity*unit_price) as sum_prc\n for (product_id) in (3170\
    \ as P3170,\n                      3176 as P3176,\n                      3182\
    \ as P3182,\n                      3163 as P3163,\n                      3165\
    \ as P3165)\n )\norder by customer_id\n;\n```\n\n```\nCUSTOMER_ID P3170_SUM_QTY\
    \ P3170_SUM_PRC P3176_SUM_QTY P3176_SUM_PRC . . .\n----------- ------------- -------------\
    \ ------------- ------------- ---------\n        104            70         10164\
    \            72         8157.6\n        106            62         7024.6\n   \
    \     116            48         6969.6            24         2719.2\n        118\
    \            42         6098.4\n        119            36         5227.2\n. .\
    \ .\n```\n\n这份报告进一步强化了原始方案的发现：客户编号 `104` 在支付总金额方面也是一个大买家。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n#### 工作原理\n\n一旦掌握了 `PIVOT` 子句的基础，更进一步操作就很容易了。只需根据需要向你的 `PIVOT` 子句添加任意多个额外的聚合。不过要记住，添加第二个聚合会使派生列的数量翻倍，添加第三个则使其变为三倍，依此类推。\n\
    \n让我们进一步扩展这个解决方案，再添加一个透视列。在 `ORDERS` 表中，如果销售是通过电话进行的，`ORDER_MODE` 列包含字符串 `direct`；如果订单是在公司互联网站点下达的，则包含\
    \ `ONLINE`。要在 `ORDER_MODE` 上进行透视，只需将该列添加到 `FOR` 子句中，并在 `FOR` 列表中指定成对的值而不是单个值，如下所示：\n\
    \n```sql\nwith order_item_query as\n(select customer_id, product_id, quantity,\
    \ unit_price, order_mode\n from orders join order_items using(order_id))\nselect\
    \ * from order_item_query\npivot (\n sum(quantity) as sum_qty,\n sum(quantity*unit_price)\
    \ as sum_prc\n for (product_id, order_mode) in ((3170, 'direct' ) as P3170_DIR,\n\
    \                                  (3170, 'online' ) as P3170_ONL,\n         \
    \                         (3176, 'direct' ) as P3176_DIR,\n                  \
    \                (3176, 'online' ) as P3176_ONL,\n                           \
    \       (3182, 'direct' ) as P3182_DIR,\n                                  (3182,\
    \ 'online' ) as P3182_ONL,\n```\n"
