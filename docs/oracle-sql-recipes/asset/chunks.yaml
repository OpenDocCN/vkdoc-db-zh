    How It Works


    Our recipe starts by using the DBMS_XMLSCHEMA package to process an XML schema
    using the REGISTERSCHEMA function. This registration provides two features for
    us. First, it allows Oracle to identify the external location or locations from
    which it can source the schema. This frees future users of the schema from needing
    to track the schema’s location themselves. Second and most important, REGISTERSCHEMA
    parses the schema for syntactical correctness and completeness. XML schemas are
    themselves XML documents, so it’s possible to test whether they are well-formed
    to ensure elements are properly nested, closed, and so forth, and to test them
    for validity themselves against the W3C standard for XML schemata.


    The REGISTERSCHEMA function can take the XML schema from a variety of locations,
    such as the text presented as a VARCHAR in our recipe, as well as from a BFILE
    or URI reference. We’ve included the schema on the website for *Oracle SQL Recipes*,
    www.oraclesqlrecipes.com, so you don’t have to retype the text when exploring
    this recipe on your own.


    Detailing the syntax and design choices of XML schemas could take a whole book.
    However, there are several noteworthy aspects of our schema that help with Oracle
    XML management. The first is the inclusion of Oracle’s namespace for database-related
    XML. The


    “ entry in our schema header allows us to use Oracle-specific datatypes as type
    attributes. It also allows us to add a SQLName mapping to assist Oracle to perform
    sub-element indexing and other administrative tasks.


    With our schema validated and registered with Oracle, we know it’s safe to use
    as a validity test (and even as a check constraint) against XML data. Our OE.WAREHOUSES
    table holds descriptions for warehouses in XML form in the WAREHOUSE_SPEC column,
    and this schema is designed for that warehouse data. Any XMLTYPE data incorporates
    member functions to perform a variety of XML processing, and we used the ISSCHEMAVALID
    function to test the WAREHOUSE_SPEC data against the XML schema. ISSCHEMAVALID


    returns 1 for valid data, 0 for invalid data, and NULL where no data is found.
    Instead of presenting this 348


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ WORKING WITH XML DATA


    shorthand to the user, we’ve wrapped the call to ISSCHEMAVALID in a CASE block,
    to return the human-readable values of Valid, Invalid and Undefined for the three
    possible results.


    14-7\. Changing XML in Place


    Problem


    You need to alter data stored in an XMLTYPE column without affecting other elements
    in each XML entry.


    For instance, you need to change XML data describing warehouse floor area from
    imperial to metric measures.


    Solution


    Use Oracle’s UPDATEXML function to perform updates to any part of an XMLTYPE datatype
    or XML


    document. Because our source data for the update is within the WAREHOUSE_SPEC
    column, of type XMLTYPE, we also use the EXTRACTVALUE function to find the target
    <Area> element we wish to update, so that we can perform the complete recipe in
    one statement. The next SQL shows UPDATEXML and EXTRACTVALUE


    working in unison to change the <Area> element from imperial to metric.


    update oe.warehouses


    set warehouse_spec =


    updatexml(


    warehouse_spec,


    ''/Warehouse/Area/text()'',


    extractvalue(


    warehouse_spec,


    ''Warehouse/Area'')*0.09290304


    );


    We can use the next SQL we developed to view the newly calculated floor area values.


    select


    extractvalue(warehouse_spec, ''Warehouse/Area'')


    from oe.warehouses;


    EXTRACTVALUE(WAREHOUSE_SPEC,''WAREHOUSE/AREA'')


    2322.576


    4645.152


    7961.790528


    9569.01312


    …


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ WORKING WITH XML DATA


    ■ **Note** 1 square foot equals exactly 0.09290304 square meters, thanks to the
    modern imperial inch being defined as exactly 2.54 centimeters.


    How It Works


    Our recipe uses two XML functions together to perform the apparent in-place update
    of the warehouse floor area from square feet to square meters. The overall structure
    of the update statement is familiar to anyone conversant in SQL.


    update oe.warehouses


    set warehouse_spec = <calculation of new space>;


    It’s the calculation of new space that requires the two XML functions, UPDATEXML
    and EXTRACTVALUE.


    A call to UPDATEXML takes this general form.


    updatexml(<XMLTYPE column>, <XPath Expression>, <New Value>) For our recipe, we
    target the WAREHOUSE_SPEC column, and use the XPath expression


    /Warehouse/Area/text() to target the value of the <Area> element. If we omitted
    the /text() portion of the XPath expression, we’d be telling UPDATEXML to change
    both the value and the element tags plus any attributes for <Area>.


    To calculate the new value for UPDATEXML, we use EXTRACTVALUE to extract the current
    <Area> element values for each row. EXTRACTVALUE explicitly returns the value
    from an XPath expression, so we don’t need to include the call to /text() in our
    XPath path. With each value returned, we multiply by 0.09290304 to convert the
    value in square feet to a value in square meters. This gives us the final value
    to be used by UPDATEXML to change the <Area> element’s value.


    **When an Update is more than an Update**


    Our description of UPDATEXML suggests the in-place update of the <Area> element
    is only apparent. We weren’t trying to suggest the update doesn’t happen: it certainly
    does.


    However, it’s important to note that XMLTYPE data in Oracle can be stored internally
    as CLOB data as one of the storage options. Just as with CLOB data, you cannot
    update part of the value. Rather, when updating, you replace the existing data
    with a newly constructed form of the data. So in our example, the complete WAREHOUSE_SPEC
    XMLTYPE value is rewritten to Oracle with the new <Area> values. This means that
    even a small update to a large block of XML can have performance and logging implications.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 1 5**


    ■ ■ ■


    **Partitioning**


    If you work with large tables and indexes, at some point you’ll experience some
    performance degradation as the row counts grow into the hundreds of millions.
    Even efficiently written SQL executing against appropriately indexed tables will
    eventually slow down as table and index sizes grow into the gigabytes, terabytes,
    or even higher. For such situations you’ll have to devise a strategy that allows
    your database to scale with increasing data volumes.


    Oracle provides two key scalability features: parallelism and partitioning—mechanisms
    that enable good performance even with massively large databases. Parallelism
    allows Oracle to start more than one thread of execution to take advantage of
    multiple hardware resources. Partitioning allows subsets of a table or index to
    be managed independently. The focus of this chapter is on partitioning strategies.'
  trans: "# 第 14 章：处理 XML 数据\n\n通过我们的模式，并由 `DBMS_XMLSCHEMA.REGISTERSCHEMA` 隐式解析其正确性和完整性，我们现在可以使用它来检查数据库中对应的\
    \ `XMLTYPE` 列，以查看存在的 XML 是否符合该模式。用 XML 术语来说，此测试确定了 XML 的有效性。\n\n```sql\nselect\
    \ w.warehouse_id,\ncase\nwhen\n  w.warehouse_spec.isSchemaValid\n  ('http://localhost/transfer/warehouse_schema.xsd',\n\
    \   'warehouse_spec') = 1 then 'Valid'\nwhen\n  w.warehouse_spec.isSchemaValid\n\
    \  ('http://localhost/transfer/warehouse_schema.xsd',\n   'warehouse_spec') is\
    \ null then 'Undefined'\nelse 'Invalid'\nend XML_Validity\nfrom oe.warehouses\
    \ w;\n```\n\n我们的结果提供了每个 `WAREHOUSE_SPEC` XML 文档相对于 XML 模式有效性的人类可读摘要。\n\n```\n\
    WAREHOUSE_ID XML_VALIDITY\n------------ ------------\n           1 Valid\n   \
    \        2 Valid\n           3 Valid\n           4 Valid\n       5 Undefined\n\
    \       6 Undefined\n       7 Undefined\n       8 Undefined\n       9 Undefined\n\
    ```\n\n## 工作原理\n\n我们的方法首先使用 `DBMS_XMLSCHEMA` 包，通过 `REGISTERSCHEMA` 函数来处理 XML 模式。此注册为我们提供了两个功能。首先，它允许\
    \ Oracle 识别其可以从中获取模式的外部位置。这使得模式的未来用户无需自己跟踪模式的位置。其次，也是最重要的，`REGISTERSCHEMA` 会解析模式以检查语法上的正确性和完整性。XML\
    \ 模式本身也是 XML 文档，因此可以测试它们是否格式良好，以确保元素被正确嵌套、关闭等，并可以对照 W3C 的 XML 模式标准测试它们自身的有效性。\n\
    \n`REGISTERSCHEMA` 函数可以从多种位置获取 XML 模式，例如我们方法中作为 `VARCHAR` 提供的文本，以及从 `BFILE` 或\
    \ `URI` 引用。我们已将该模式包含在网站 *Oracle SQL Recipes*，www.oraclesqlrecipes.com 上，因此您在自行探索此方法时无需重新输入文本。\n\
    \n详细描述 XML 模式的语法和设计选择可能需要一整本书。然而，我们的模式中有几个值得注意的方面有助于 Oracle XML 管理。首先是包含了 Oracle\
    \ 用于数据库相关 XML 的命名空间。模式头中的 `xmlns:ora=\"http://xmlns.oracle.com/oxml\"` 条目允许我们使用\
    \ Oracle 特定的数据类型作为类型属性。它还允许我们添加 `SQLName` 映射，以帮助 Oracle 执行子元素索引和其他管理任务。\n\n我们的模式经过验证并在\
    \ Oracle 中注册后，我们知道它可以安全地用作对 XML 数据的有效性测试（甚至可以用作检查约束）。我们的 `OE.WAREHOUSES` 表在 `WAREHOUSE_SPEC`\
    \ 列中以 XML 形式保存仓库的描述，并且该模式是为该仓库数据设计的。任何 `XMLTYPE` 数据都包含用于执行各种 XML 处理的成员函数，我们使用\
    \ `ISSCHEMAVALID` 函数根据 XML 模式测试 `WAREHOUSE_SPEC` 数据。`ISSCHEMAVALID` 对有效数据返回 1，对无效数据返回\
    \ 0，对未找到数据的情况返回 `NULL`。我们没有将这种简写形式直接呈现给用户，而是将 `ISSCHEMAVALID` 的调用包装在 `CASE` 块中，以便为三种可能的结果返回人类可读的值\
    \ `Valid`、`Invalid` 和 `Undefined`。\n\n## 14-7. 就地更改 XML\n\n### 问题\n\n您需要修改存储在\
    \ `XMLTYPE` 列中的数据，而不影响每个 XML 条目中的其他元素。例如，您需要将描述仓库占地面积的 XML 数据从英制单位更改为公制单位。\n\n\
    ### 解决方案\n\n使用 Oracle 的 `UPDATEXML` 函数来更新 `XMLTYPE` 数据类型或 XML 文档的任何部分。由于我们更新的源数据位于\
    \ `WAREHOUSE_SPEC` 列（类型为 `XMLTYPE`）中，因此我们还使用 `EXTRACTVALUE` 函数来查找我们希望更新的目标 `<Area>`\
    \ 元素，以便我们可以在一个语句中完成整个方法。接下来的 SQL 显示了 `UPDATEXML` 和 `EXTRACTVALUE` 如何协同工作，将 `<Area>`\
    \ 元素从英制单位更改为公制单位。\n\n```sql\nupdate oe.warehouses\nset warehouse_spec =\n  updatexml(\n\
    \    warehouse_spec,\n    '/Warehouse/Area/text()',\n    extractvalue(\n     \
    \ warehouse_spec,\n      'Warehouse/Area')*0.09290304\n  );\n```\n\n我们可以使用接下来开发的\
    \ SQL 来查看新计算的占地面积值。\n\n```sql\nselect\n  extractvalue(warehouse_spec, 'Warehouse/Area')\n\
    from oe.warehouses;\n```\n\n```\nEXTRACTVALUE(WAREHOUSE_SPEC,'WAREHOUSE/AREA')\n\
    --------------------------------------------\n                               2322.576\n\
    \                               4645.152\n                             7961.790528\n\
    \                              9569.01312\n...\n```\n\n> **注意：** 1 平方英尺正好等于 0.09290304\
    \ 平方米，这得益于现代英制英寸被定义为恰好 2.54 厘米。\n\n### 工作原理\n\n我们的方法使用两个 XML 函数一起执行仓库占地面积从平方英尺到平方米的明显就地更新。更新语句的整体结构对于任何熟悉\
    \ SQL 的人来说都很熟悉。\n\n```sql\nupdate oe.warehouses\nset warehouse_spec = <calculation\
    \ of new space>;\n```\n\n正是新空间的计算需要两个 XML 函数 `UPDATEXML` 和 `EXTRACTVALUE`。`UPDATEXML`\
    \ 的调用采用以下通用形式。\n\n```sql\nupdatexml(<XMLTYPE column>, <XPath Expression>, <New\
    \ Value>)\n```\n\n对于我们的方法，我们以 `WAREHOUSE_SPEC` 列为目标，并使用 `XPath` 表达式 `/Warehouse/Area/text()`\
    \ 来定位 `<Area>` 元素的值。如果我们省略 `XPath` 表达式中的 `/text()` 部分，我们将告诉 `UPDATEXML` 同时更改值和元素标签以及\
    \ `<Area>` 的任何属性。\n\n为了计算 `UPDATEXML` 的新值，我们使用 `EXTRACTVALUE` 来提取每一行当前的 `<Area>`\
    \ 元素值。`EXTRACTVALUE` 显式地从 `XPath` 表达式返回值，因此我们不需要在 `XPath` 路径中包含对 `/text()` 的调用。对于返回的每个值，我们乘以\
    \ 0.09290304，将平方英尺的值转换为平方米的值。这为我们提供了 `UPDATEXML` 用来更改 `<Area>` 元素值的最终值。\n\n###\
    \ 当更新不仅仅是更新时\n\n我们对 `UPDATEXML` 的描述表明 `<Area>` 元素的就地更新只是表面上的。我们并不是想暗示更新没有发生：它确实发生了。然而，值得注意的是，Oracle\
    \ 中的 `XMLTYPE` 数据可以作为 `CLOB` 数据之一存储在内部。与 `CLOB` 数据一样，您无法更新部分值。相反，在更新时，您需要用新构建的数据形式替换现有数据。因此，在我们的示例中，完整的\
    \ `WAREHOUSE_SPEC` `XMLTYPE` 值连同新的 `<Area>` 值一起被重写回 Oracle。这意味着即使对大型 XML 块进行小幅更新，也可能对性能和日志记录产生影响。\n\
    \n# 第 15 章：分区\n\n如果您处理大型表和索引，当行数增长到数亿时，您在某些时候会遇到性能下降的问题。即使针对适当索引的表执行的高效编写的 SQL，随着表和索引大小增长到千兆字节、兆字节甚至更高，最终也会变慢。对于这种情况，您必须制定一种策略，使您的数据库能够随着数据量的增长而扩展。\n\
    \nOracle 提供了两个关键的可扩展性特性：并行处理和分区——这些机制即使在数据库规模巨大时也能实现良好的性能。并行处理允许 Oracle 启动多个执行线程以利用多个硬件资源。分区允许表或索引的子集被独立管理。本章的重点是分区策略。"
- fmt: 'Partitioning lets you create a logical table or index that consists of separate
    physical segments. Each partition of a table or index has the same logical structure,
    such as the column definitions, but can physically reside in separate containers.
    In other words, you can store each partition in its own tablespace and associated
    datafiles. This allows you to manage one large logical object as a group of smaller,
    more maintainable physical pieces.


    Throughout this chapter, we will use various terms related to partitioning. Table
    15-1 describes the meanings of terms you should be familiar with when using the
    recipes in this chapter.


    **Table 15-1.** Oracle Partitioning Terminology


    | Term | Meaning |

    | :--- | :--- |

    | Partitioning | Transparently implementing one logical table or index as many
    separate, smaller, physical segments. |

    | Partition key | One or more columns that determine which partition a row is
    stored in. |

    | Partition bound | Boundary between partitions. |

    | Single-level partitioning | Partitioning using a single method. |

    | Composite partitioning | Partitioning using a combination of methods. |

    | Subpartition | Partition within a partition. |

    | Partition independence | Ability to access partitions separately to perform
    maintenance operations without impacting the availability of other partitions.
    |

    | Partition pruning | Eliminating unnecessary partitions. Oracle detects which
    partitions need to be accessed by a SQL statement and removes (prunes) any that
    aren’t needed. |

    | Partition-wise join | When two tables are partitioned on the same key and are
    joined together, Oracle can divide the join into smaller joins that occur between
    partitions and thereby improve performance. |

    | Local index | Uses the same partition key as its table. |

    | Global index | Does not use the same partition strategy as its table. |


    If you work with mainly small OLTP databases, you probably don’t need to build
    partitioned tables and indexes. However, if you work with a large OLTP database
    or in a data warehouse environment, you will most likely benefit from using partitioning.
    Partitioning is a key to designing and building scalable database systems.


    This chapter is for developers and DBAs who work with large databases. Oracle
    provides a robust set of methods for dividing tables and indexes into smaller
    subsets. For example, you can divide a table’s data by date ranges, such as by
    month or year. Table 15-2 gives an overview of the many partitioning strategies
    available.


    **Table 15-2.** Partitioning Strategies


    | Partition type | Description |

    | :--- | :--- |

    | Range | Allows partitioning based on ranges of dates, numbers, or characters.
    |

    | List | Useful when the partitions fit nicely into a list of values, like state
    or region codes. |

    | Hash | Allows even distribution of rows when there is no obvious partitioning
    key. |

    | Composite | Allows combinations of other partitioning strategies. |

    | Interval | Extends range partitioning by automatically allocating new partitions
    when new partition key values exceed the existing high range. |

    | Reference | Useful for partitioning a child table based on a parent table column.
    |

    | Virtual | Allows partitioning on a virtual column. |

    | System | Allows the application inserting the data to determine which partition
    should be used. |


    The first few sections of this chapter describe the various partitioning strategies
    available with Oracle. The later sections delve into a variety of partition maintenance
    operations.


    ## 15-1. Determining if a Table Should be Partitioned


    **Problem**


    You have a large table and you wonder whether it should be partitioned.


    **Solution**


    Here are some rules of thumb for determining whether to partition a table:


    - Tables that are over 2 gigabytes in size

    - Tables that have more than 10 million rows and SQL operations are getting slower
    as more data is added'
  raw: 'Partitioning lets you create a logical table or index that consists of separate
    physical segments. Each partition of a table or index has the same logical structure,
    such as the column definitions, but can physically reside in separate containers.
    In other words, you can store each partition in its own tablespace and associated
    datafiles. This allows you to manage one large logical object as a group of smaller,
    more maintainable physical pieces.


    Throughout this chapter, we will use various terms related to partitioning. Table
    15-1 describes the meanings of terms you should be familiar with when using the
    recipes in this chapter.


    ***Table 15-1.** Oracle Partitioning Terminology*


    ****Term Meaning**


    Partitioning Transparently


    implementing


    one logical table or index as many separate,


    smaller, physical segments.


    Partition key


    One or more columns that determine which partition a row is stored in.


    Partition bound


    Boundary between partitions.


    Single-level partitioning


    Partitioning using a single method.


    Composite partitioning


    Partitioning using a combination of methods.


    Subpartition


    Partition within a partition.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ PARTITIONING


    ***Table 15-1.** Oracle Partitioning Terminology (continued)*


    ****Term Meaning**


    Partition independence


    Ability to access partitions separately to perform maintenance operations without
    impacting the availability of other partitions.


    Partition pruning


    Eliminating unnecessary partitions. Oracle detects which partitions need to be
    accessed by a SQL statement and removes (prunes) any that aren’t


    needed.


    Partition-wise join


    When two tables are partitioned on the same key and are joined together, Oracle
    can divide the join into smaller joins that occur between partitions and thereby
    improve performance.


    Local index


    Uses the same partition key as its table.


    Global index


    Does not use the same partition strategy as its table.


    If you work with mainly small OLTP databases, you probably don’t need to build
    partitioned tables and indexes. However, if you work with a large OLTP database
    or in a data warehouse environment, you will most likely benefit from using partitioning.
    Partitioning is a key to designing and building scalable database systems.


    This chapter is for developers and DBAs who work with large databases. Oracle
    provides a robust set of methods for dividing tables and indexes into smaller
    subsets. For example, you can divide a table’s data by date ranges, such as by
    month or year. Table 15-2 gives an overview of the many partitioning strategies
    available.


    ***Table 15-2.** Partitioning Strategies*


    ****Partition type**


    **Description**


    Range Allows


    partitioning


    based on ranges of dates, numbers, or characters.


    List


    Useful when the partitions fit nicely into a list of values, like state or region
    codes.


    Hash


    Allows even distribution of rows when there is no obvious partitioning key.


    Composite


    Allows combinations of other partitioning strategies.


    Interval


    Extends range partitioning by automatically allocating new partitions when new
    partition key values exceed the existing high range.


    Reference


    Useful for partitioning a child table based on a parent table column.


    Virtual Allows


    partitioning on a virtual column.


    System


    Allows the application inserting the data to determine which partition should
    be used.


