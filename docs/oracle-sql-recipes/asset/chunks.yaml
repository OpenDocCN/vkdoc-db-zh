    How It Works


    Early in the development of SQL*Plus, support was added for the ampersand-style
    substitution variables to allow users to pass parameter values to their queries.
    Oracle has ensured that the same technique can be used with most (if not all)
    of its subsequent query tools, and other companies’ products have followed suit,
    most notably TOAD.


    Both the single-ampersand and double-ampersand style of parameters can be used
    across all of these tools. For those unfamiliar with the difference between the
    two, single-ampersand parameters are temporary substitution variables, taking
    and using a value once for one SQL statement. If you re-execute the statement
    with a single-ampersand substitution variable, you’ll be asked to provide a value
    again. A double-ampersand parameter creates a permanent substitution variable.
    The first value you provide will persist as the substituted value for the duration
    of your session.


    There is an important difference between SQL*Plus-style substitution variables
    and bind variables in prepared statements in application code. Our recipe, and
    any other SQL you write utilizing substitution variables, works by using client-side
    string replacement techniques. SQL*Plus, SQL


    Developer, or your tool of choice, finds the substitution variables in your SQL
    before passing the statement to the Oracle database. The query tool itself prompts
    for the values to be substituted, and uses 268


