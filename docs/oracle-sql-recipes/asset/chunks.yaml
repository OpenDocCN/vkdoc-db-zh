    **20091430**


    **20090330**


    The following query uses the ISDATE function to determine if there is any character
    data that does not conform to the YYYYMMDD date format:


    **select hold_col**


    **from stage**


    **where isdate(hold_col,''YYYYMMDD'') = ''N'';**


    Here are the values that do not map to valid dates:


    **HOLD_COL**


    **------------------------------**


    **20090132**


    **20090229**


    **20091430**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ CLEANSING DATA


    12-5\. Performing Case-Insensitive Queries


    Problem


    You have loaded a significant amount of data that is in mixed case. You want to
    query as if it were all lowercase (or all uppercase).


    Solution


    If you are using Oracle Database 10 *g* or higher, you can use the ALTER SESSION
    statement to enable case-insensitive searching with the >, <, and = comparison
    operators. To enable case-insensitive searching, alter the NLS_SORT and NLS_COMP
    parameters:


    **alter session set nls_sort=binary_ci;**


    **alter session set nls_comp=linguistic;**


    These settings allow case-insensitive searches. You can run the following query
    to select all values of John, regardless of case:


    **select * from parties where first_name = ''john'';**


    **FIRST_NAME**


    **------------------------------**


    **John**


    **JOHN**


    **john**


    How It Works


    Prior to Oracle Database 10 *g* you would have had to use an UPPER or LOWER SQL
    function to perform case-insensitive searches, for example:


    **select * from parties where upper(first_name) = ''JOHN'';**


    ■ **Tip** Oracle will not access an index on a column that has a SQL function
    applied to it. To get around this, you can create a function-based index.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ CLEANSING DATA


    Other common techniques for making sure case is not an issue in your searches
    include:


    *


    Utilizing a trigger to enforce that the string is inserted as all uppercase or
    all lowercase.


    *


    Adding a column to the table that contains an all-uppercase or all-lowercase version
    of the string in question.


    In Oracle Database 10 *g* or higher, the combination of setting NLS_SORT to BINARY_CI
    and NLS_COMP


    to LINGUISTIC instructs SQL to ignore case for comparison operations. The NLS_SORT
    parameter determines the type of sort for character data. The NLS_SORT setting
    of BINARY_CI designates that sorting behavior is case-insensitive. The NLS_COMP
    parameter affects the comparison behavior of SQL


    operations. Setting NLS_COMP to LINGUISTIC instructs SQL to perform a linguistic
    comparison of values.'
  trans: "\n# 数据清洗技术笔记\n\n## 1032.22\n\n**32423432234234432x**\n\n以下查询使用 `ISNUM` 函数来判断表中是否存在非数值数据：\n\
    \n`select hold_col from stage where isnum(hold_col)='N';`\n\n预期输出如下：\n\n`HOLD_COL`\n\
    `------------------------------`\n`c`\n`$`\n`32423432234234432x`\n\n## 12-4. 判断数据是否能作为日期加载\n\
    \n### 问题\n旧系统中定义为字符串的字段，在新数据库中将迁移到日期数据类型。数据已加载到临时暂存表中，需要确定是否有字符数据无法干净地转换为日期数据类型。\n\
    \n### 解决方案\n需要创建一个小型 PL/SQL 函数：\n\n```\ncreate or replace function isdate(p_in\
    \ varchar2, f_in varchar2)\nreturn varchar is\n  scrub_dt date;\nbegin\n  scrub_dt\
    \ := to_date(p_in, f_in);\n  return 'Y';\nexception when others then\n  return\
    \ 'N';\nend;\n/\n```\n\n`ISDATE` 函数接受两个值：字符数据和日期格式掩码。如果传入函数的值是有效日期，则返回 `Y`。如果无法转换为日期，则返回\
    \ `N`。\n\n### 工作原理\n`ISDATE` 函数可用于检测列中的字符数据是否有效。例如，假设有一个名为 `STAGE` 的表，其中包含一个名为\
    \ `HOLD_COL` 的列，其值如下：\n\n`HOLD_COL`\n`------------------------------`\n`20090130`\n\
    `20090132`\n`20090229`\n`20091430`\n`20090330`\n\n以下查询使用 `ISDATE` 函数判断是否有字符数据不符合\
    \ `YYYYMMDD` 日期格式：\n\n`select hold_col`\n`from stage`\n`where isdate(hold_col,'YYYYMMDD')\
    \ = 'N';`\n\n无法映射到有效日期的值如下：\n\n`HOLD_COL`\n`------------------------------`\n\
    `20090132`\n`20090229`\n`20091430`\n\n## 12-5. 执行大小写不敏感查询\n\n### 问题\n已加载大量大小写混合的数据。希望查询时如同数据全是小写（或全是大写）。\n\
    \n### 解决方案\n如果使用的是 Oracle Database 10 *g* 或更高版本，可以使用 `ALTER SESSION` 语句来启用大小写不敏感的\
    \ `>`、`<` 和 `=` 比较运算符。要启用大小写不敏感搜索，需修改 `NLS_SORT` 和 `NLS_COMP` 参数：\n\n`alter session\
    \ set nls_sort=binary_ci;`\n`alter session set nls_comp=linguistic;`\n\n这些设置允许进行大小写不敏感的搜索。可以运行以下查询来选择所有\
    \ `john` 值（不区分大小写）：\n\n`select * from parties where first_name = 'john';`\n\n\
    `FIRST_NAME`\n`------------------------------`\n`John`\n`JOHN`\n`john`\n\n###\
    \ 工作原理\n在 Oracle Database 10 *g* 之前，必须使用 `UPPER` 或 `LOWER` SQL 函数来执行大小写不敏感的搜索，例如：\n\
    \n`select * from parties where upper(first_name) = 'JOHN';`\n\n■ **提示**：Oracle\
    \ 不会访问对列应用了 SQL 函数的索引。为了解决这个问题，可以创建基于函数的索引。\n\n其他确保搜索中不受大小写影响的常用技术包括：\n\n- 使用触发器强制字符串以全大写或全小写插入。\n\
    - 在表中添加一列，用于存储该字符串的全大写或全小写版本。\n\n在 Oracle Database 10 *g* 或更高版本中，将 `NLS_SORT`\
    \ 设置为 `BINARY_CI` 并将 `NLS_COMP` 设置为 `LINGUISTIC` 的组合会指示 SQL 在比较操作时忽略大小写。`NLS_SORT`\
    \ 参数确定字符数据的排序类型。`NLS_SORT` 设置为 `BINARY_CI` 表示排序行为不区分大小写。`NLS_COMP` 参数影响 SQL 操作的行为。将\
    \ `NLS_COMP` 设置为 `LINGUISTIC` 会指示 SQL 执行值的语言学比较。\n"
- fmt: "# Binary versus Linguistic Sorts\n\nWhen sorting character data, normally\
    \ the sort is based on numeric values of the character-encoding scheme. This is\
    \ known as binary sorting. Binary sorts work well with the English alphabet because\
    \ the ASCII and EBCDIC character-encoding schemes define the English letters with\
    \ ascending numeric values.\n\nFor example the character `A` has an ASCII decimal\
    \ value of 65; the `B` character has a decimal value of 66, and so on.\n\nHowever,\
    \ sorting can have undesirable results when characters are present from languages\
    \ other than English. In such scenarios, a linguistic sorting order based on the\
    \ language being used is more appropriate. For example, to specify the French\
    \ linguistic sort:\n\n```sql\nalter session set nls_sort = French;\n```\n\nYou\
    \ can override the session setting by directly using the `NLSSORT` function in\
    \ a SQL statement:\n\n```sql\nselect first_name from parties\norder by nlssort(first_name,'nls_sort\
    \ = French');\n```\n\n## 12-6. Obfuscating Values\n\n### Problem\n\nYour database\
    \ is being audited, but it contains information such as names and social security\
    \ numbers that should remain private. You need to present the data to the auditor\
    \ in a form in which that data can’t be read, but the auditor can still detect\
    \ patterns in the data. If the audit process detects fraud, then the real names\
    \ and social security numbers can be provided on a case-by-case basis.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 12 ■ CLEANSING DATA\n\n### Solution\n\nUse the `TRANSLATE` built-in\
    \ SQL function to change each character value to a different value. Here’s a simple\
    \ example:\n\n```sql\nselect translate('ORACLE',\n                 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',\n\
    \                 'ZYXWVUTSRQPONMLKJIHGFEDCBA')\nfrom dual;\n```\n\nHere is the\
    \ output:\n\n```\nTRANSL\n------\nLIZXOV\n```\n\nTo translate the obfuscated value\
    \ back to its original value, use the `TRANSLATE` function again:\n\n```sql\n\
    select translate('LIZXOV',\n                 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',\n \
    \                'ZYXWVUTSRQPONMLKJIHGFEDCBA')\nfrom dual;\n```\n\nIf you’re going\
    \ to obfuscate a large amount of data, it’s more efficient to put the `TRANSLATE`\
    \ function in a PL/SQL package and use the package to obfuscate data. Here is\
    \ a simple example:\n\n```sql\ncreate or replace package obfus is\n  function\
    \ obf(clear_string varchar2) return varchar2;\n  function unobf(obs_string varchar2)\
    \ return varchar2;\nend obfus;\n/\n--\ncreate or replace package body obfus is\n\
    \  fromstr varchar2(62) := '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ' ||\n       \
    \                   'abcdefghijklmnopqrstuvwxyz';\n  tostr   varchar2(62) := 'defghijklmnopqrstuvwxyzabc3456789012'\
    \ ||\n                          'KLMNOPQRSTUVWXYZABCDEFGHIJ';\n--\n  function\
    \ obf(clear_string varchar2) return varchar2 is\n  begin\n    return translate(clear_string,\
    \ fromstr, tostr);\n  end obf;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 12 ■ CLEANSING DATA\n\n```sql\n--\n  function unobf(obs_string varchar2)\
    \ return varchar2 is\n  begin\n    return translate(obs_string, tostr, fromstr);\n\
    \  end unobf;\nend obfus;\n/\n```\n\nNow columns in a table can be obfuscated\
    \ by calling the `OBF` function:\n\n```sql\nupdate emp set emp_name = obfus.obf(emp_name),\n\
    \               ssn      = obfus.obf(ssn);\n```\n\nThe column values can be set\
    \ back to their original values using the `UNOBF` function:\n\n```sql\nupdate\
    \ emp set emp_name = obfus.unobf(emp_name),\n               ssn      = obfus.unobf(ssn);\n\
    ```\n\n> **Note** The process of substituting a single alphabet character with\
    \ another character that is a fixed number of positions further down in the alphabet\
    \ is known in cryptography as *Caesar’s cipher*. For example a single character\
    \ shift would mean that `A` is represented by `B`, and `B` is represented by `C`,\
    \ and so on. This method derives its name from the Roman emperor Julius Caesar\
    \ who used this encryption technique to communicate with his generals.\n\nIn some\
    \ cases, you may need to obfuscate your data. Obfuscation is changing the data\
    \ just enough so that real values aren’t detected simply by looking at the data.\
    \ Obfuscation *is not* a secure way of making data unreadable, nor is it a substitute\
    \ for encryption."
  raw: '**Binary versus Linguistic Sorts**


    When sorting character data, normally the sort is based on numeric values of the
    character-encoding scheme. This is known as binary sorting. Binary sorts work
    well with the English alphabet because the ASCII and EBCDIC character-encoding
    schemes define the English letters with ascending numeric values.


    For example the character A has an ASCII decimal value of 65; the B character
    has a decimal value of 66, and so on.


    However, sorting can have undesirable results when characters are present from
    languages other than English. In such scenarios, a linguistic sorting order based
    on the language being used is more appropriate. For example, to specify the French
    linguistic sort:


    **alter session set nls_sort = French;**


    You can override the session setting by directly using the NLSSORT function in
    a SQL statement: **select first_name from parties**


    **order by nlssort(first_name,''nls_sort = French'');**


    12-6\. Obfuscating Values


    Problem


    Your database is being audited, but it contains information such as names and
    social security numbers that should remain private. You need to present the data
    to the auditor in a form in which that data can’t be read, but the auditor can
    still detect patterns in the data. If the audit process detects fraud, then the
    real names and social security numbers can be provided on a case-by-case basis.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ CLEANSING DATA


    Solution


    Use the TRANSLATE built-in SQL function to change each character value to a different
    value. Here’s a simple example:


    **select translate(''ORACLE'',**


    **''ABCDEFGHIJKLMNOPQRSTUVWXYZ'',**


    **''ZYXWVUTSRQPONMLKJIHGFEDCBA'')**


    **from dual;**


    Here is the output:


    **TRANSL**


    **------**


    **LIZXOV**


    To translate the obfuscated value back to its original value, use the TRANSLATE
    function again: **select translate(''LIZXOV'',**


    **''ABCDEFGHIJKLMNOPQRSTUVWXYZ'',**


    **''ZYXWVUTSRQPONMLKJIHGFEDCBA'')**


    **from dual;**


    If you’re going to obfuscate a large amount of data, it’s more efficient to put
    the TRANSLATE function in a PL/SQL package and use the package to obfuscate data.
    Here is a simple example: **create or replace package obfus is**


    **function obf(clear_string varchar2) return varchar2;**


    **function unobf(obs_string varchar2) return varchar2;**


    **end obfus;**


    **/**


    **--**


    **create or replace package body obfus is**


    **fromstr varchar2(62) := ''0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'' ||**


    **''abcdefghijklmnopqrstuvwxyz'';**


    **tostr varchar2(62) := ''defghijklmnopqrstuvwxyzabc3456789012'' ||**


    **''KLMNOPQRSTUVWXYZABCDEFGHIJ'';**


    **--**


    **function obf(clear_string varchar2) return varchar2 is**


    **begin**


    **return translate(clear_string, fromstr, tostr);**


    **end obf;**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ CLEANSING DATA


    **--**


    **function unobf(obs_string varchar2) return varchar2 is**


    **begin**


    **return translate(obs_string, tostr, fromstr);**


    **end unobf;**


    **end obfus;**


    **/**


    Now columns in a table can be obfuscated by calling the OBF function: **update
    emp set emp_name = obfus.obf(emp_name),**


    **ssn = obfus.obf(ssn);**


    The column values can be set back to their original values using the UNOBF function:
    **update emp set emp_name = obfus.unobf(emp_name),**


    **ssn = obfus.unobf(ssn);**


    ■ **Note** The process of substituting a single alphabet character with another
    character that is a fixed number of positions further down in the alphabet is
    known in cryptography as *Caesar’s cipher*. For example a single character shift
    would mean that A is represented by B, and B is represented by C, and so on. This
    method derives its name from the Roman emperor Julius Caesar who used this encryption
    technique to communicate with his generals.


    In some cases, you may need to obfuscate your data. Obfuscation is changing the
    data just enough so that real values aren’t detected simply by looking at the
    data. Obfuscation *is not* a secure way of making data unreadable, nor is it a
    substitute for encryption.'
  trans: "\n# 二进制排序与语言排序\n\n对字符数据进行排序时，排序通常基于字符编码方案的数值。这被称为二进制排序。二进制排序在处理英文字母时效果良好，因为\
    \ ASCII 和 EBCDIC 字符编码方案为英文字母定义了升序的数值。\n\n例如，字符 `A` 的 ASCII 十进制值为 65；字符 `B` 的十进制值为\
    \ 66，依此类推。\n\n然而，当存在非英语语言的字符时，排序可能会产生不理想的结果。在这种情况下，基于所使用语言的语言排序顺序更为合适。例如，要指定法语语言排序：\n\
    \n```sql\nalter session set nls_sort = French;\n```\n\n你可以通过在 SQL 语句中直接使用 `NLSSORT`\
    \ 函数来覆盖会话设置：\n\n```sql\nselect first_name from parties\norder by nlssort(first_name,'nls_sort\
    \ = French');\n```\n\n## 12-6. 数据混淆\n\n### 问题\n\n你的数据库正在接受审计，但它包含姓名和社会保障号码等应保持私密的信息。你需要以一种无法直接读取该数据的形式向审计员展示，但审计员仍然能够察觉数据中的模式。如果审计过程发现欺诈行为，则可以根据具体情况提供真实的姓名和社会保障号码。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 12 章 ■ 数据清洗\n\n###\
    \ 解决方案\n\n使用内置的 SQL 函数 `TRANSLATE` 将每个字符值转换为另一个不同的值。这里是一个简单的例子：\n\n```sql\nselect\
    \ translate('ORACLE',\n                 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',\n      \
    \           'ZYXWVUTSRQPONMLKJIHGFEDCBA')\nfrom dual;\n```\n\n输出如下：\n\n```\nTRANSL\n\
    ------\nLIZXOV\n```\n\n要将混淆后的值转回其原始值，再次使用 `TRANSLATE` 函数：\n\n```sql\nselect translate('LIZXOV',\n\
    \                 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',\n                 'ZYXWVUTSRQPONMLKJIHGFEDCBA')\n\
    from dual;\n```\n\n如果你需要混淆大量数据，将 `TRANSLATE` 函数放在 PL/SQL 包中并使用该包来混淆数据会更高效。这里是一个简单的例子：\n\
    \n```sql\ncreate or replace package obfus is\n  function obf(clear_string varchar2)\
    \ return varchar2;\n  function unobf(obs_string varchar2) return varchar2;\nend\
    \ obfus;\n/\n--\ncreate or replace package body obfus is\n  fromstr varchar2(62)\
    \ := '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ' ||\n                          'abcdefghijklmnopqrstuvwxyz';\n\
    \  tostr   varchar2(62) := 'defghijklmnopqrstuvwxyzabc3456789012' ||\n       \
    \                   'KLMNOPQRSTUVWXYZABCDEFGHIJ';\n--\n  function obf(clear_string\
    \ varchar2) return varchar2 is\n  begin\n    return translate(clear_string, fromstr,\
    \ tostr);\n  end obf;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 12 章 ■ 数据清洗\n\n```sql\n--\n  function unobf(obs_string varchar2) return\
    \ varchar2 is\n  begin\n    return translate(obs_string, tostr, fromstr);\n  end\
    \ unobf;\nend obfus;\n/\n```\n\n现在，可以通过调用 `OBF` 函数来混淆表中的列：\n\n```sql\nupdate emp\
    \ set emp_name = obfus.obf(emp_name),\n               ssn      = obfus.obf(ssn);\n\
    ```\n\n可以使用 `UNOBF` 函数将列值设置回其原始值：\n\n```sql\nupdate emp set emp_name = obfus.unobf(emp_name),\n\
    \               ssn      = obfus.unobf(ssn);\n```\n\n> **注意** 这种用字母表中固定位置之后的另一个字符来替代单个字母字符的过程，在密码学中被称为*凯撒密码*。例如，单字符移位意味着\
    \ `A` 由 `B` 表示，`B` 由 `C` 表示，依此类推。该方法得名于罗马皇帝尤利乌斯·凯撒，他使用这种加密技术与他的将军们通信。\n\n在某些情况下，你可能需要对数据进行混淆。混淆是将数据改动到足以让真实值无法通过简单查看数据就被识别出来的程度。混淆*并非*一种使数据不可读的安全方式，也不是加密的替代品。\n"
- fmt: 'Encryption is a secure method for making data unreadable and not easily decipherable.
    If you need to encrypt data, use the `DBMS_CRYPTO` package or encryption features
    available in the `Oracle Advanced Security` option.


    Obfuscation may be appropriate when you need to make the data unreadable but still
    preserve the general character patterns. Encryption doesn’t work well in these
    situations because it renders data into values outside of the normal range of
    ASCII characters.


    ## How It Works


    The `TRANSLATE` function performs a character-for-character substitution, one
    character at a time. It takes three input arguments: the string to be translated,
    the source characters, and the target characters.


    The `TRANSLATE` function is ideal for data obfuscation.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 12 ■ CLEANSING DATA


    Sometimes the `TRANSLATE` function is confused with the `REPLACE` function, but
    the `REPLACE` function substitutes one string for another string while the `TRANSLATE`
    function swaps one character for another. Here is a simple example of using `REPLACE`:


    ```sql

    select replace(''scrappple'',''ppp'',''bb'')

    from dual;

    ```


    The output shows that the `ppp` string has been replaced with the `bb` string:


    ```

    REPLACE

    --------

    scrabble

    ```


    ## 12-7. Dropping All Indexes


    ### Problem


    You’re inserting a large amount of data into a table and want to load the data
    as fast as possible. For performance reasons, you want to drop the indexes on
    the table before you insert the data.


    ### Solution


    The easiest way to drop all indexes for a table is to use SQL to generate the
    SQL required. The following example generates the SQL required to drop all indexes
    for the `F_SALES` table:


    ```sql

    select ''drop index '' || index_name || '';''

    from user_indexes where table_name=''F_SALES'';

    ```


    Here is some sample output:


    ```

    ''DROPINDEX''||INDEX_NAME||'';''

    ------------------------------------------

    drop index F_SALES_FK1;

    drop index F_SALES_FK2;

    drop index F_SALES_FK3;

    drop index F_SALES_FK4;

    drop index F_SALES_FK5;

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 12 ■ CLEANSING DATA


    ### How It Works


    When loading large data warehouse tables, sometimes it’s more efficient to drop
    a table’s indexes before a load and then recreate them after the data loading
    is completed. This is especially true with bitmap indexes associated with a star
    schema fact table.


    Before you drop any indexes, ensure you have the DDL required to recreate the
    indexes. You don’t want to put yourself in the situation of dropping the indexes
    and then have no idea how to recreate them. Ideally you have the original DDL
    scripts used to create the indexes. If you don’t, use the `DBMS_METADATA` package
    to generate the index-creation DDL as shown:


    ```sql

    select dbms_metadata.get_ddl(''INDEX'', index_name)

    from user_indexes

    where table_name = upper(''&table_name'');

    ```


    If you run the previous SQL from `SQL*Plus`, be sure to set your `LONG` variable
    to a large value so you can view all of the text.


    An alternative approach to dropping and recreating indexes is to mark them as
    unusable and then rebuild them. Here is a script that generates the SQL required
    to alter all indexes for a table into an unusable state:


    ```sql

    select ''alter index '' || index_name || '' unusable;''

    from user_indexes where table_name=upper(''&table_name'');

    ```


    And here is a script that generates the SQL required to rebuild all indexes for
    a table:


    ```sql

    select ''alter index '' || index_name || '' rebuild;''

    from user_indexes where table_name=upper(''&table_name'');

    ```


    If you want to capture the output of the SQL statement in the solution section
    in a script, use the `SQL*Plus` `SET` command to turn off some of the default
    feedback settings, as shown in the following code:


    ```sql

    set verify off feedback off pagesize 0

    spool drop_ind.sql

    select ''drop index '' || index_name || '';''

    from user_indexes where table_name=''F_SALES'';

    spool off;

    ```


    The `VERIFY` parameter turns off before and after images of lines containing substitution
    variables.'
  raw: 'Encryption is a secure method for making data unreadable and not easily decipherable.
    If you need to encrypt data, use the DBMS_CRYPTO package or encryption features
    available in the Oracle Advanced Security option.


    Obfuscation may be appropriate when you need to make the data unreadable but still
    preserve the general character patterns. Encryption doesn’t work well in these
    situations because it renders data into values outside of the normal range of
    ASCII characters.


    How It Works


    The TRANSLATE function performs a character-for-character substitution, one character
    at a time. It takes three input arguments: the string to be translated, the source
    characters, and the target characters.


    The TRANSLATE function is ideal for data obfuscation.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ CLEANSING DATA


    Sometimes the TRANSLATE function is confused with the REPLACE function, but the
    REPLACE


    function substitutes one string for another string while the TRANSLATE function
    swaps one character for another. Here is a simple example of using REPLACE:


    **select replace(''scrappple'',''ppp'',''bb'')**


    **from dual;**


    The output shows that the ppp string has been replaced with the bb string: **REPLACE**


    **--------**


    **scrabble**


    12-7\. Dropping All Indexes


    Problem


    You’re inserting a large amount of data into a table and want to load the data
    as fast as possible. For performance reasons, you want to drop the indexes on
    the table before you insert the data.


    Solution


    The easiest way to drop all indexes for a table is to use SQL to generate the
    SQL required. The following example generates the SQL required to drop all indexes
    for the F_SALES table: **select ''drop index '' || index_name || '';''**


    **from user_indexes where table_name=''F_SALES'';**


    Here is some sample output:


    **''DROPINDEX''||INDEX_NAME||'';''**


    **------------------------------------------**


    **drop index F_SALES_FK1;**


    **drop index F_SALES_FK2;**


    **drop index F_SALES_FK3;**


    **drop index F_SALES_FK4;**


    **drop index F_SALES_FK5;**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 12 ■ CLEANSING DATA


    How It Works


    When loading large data warehouse tables, sometimes it’s more efficient to drop
    a table’s indexes before a load and then recreate them after the data loading
    is complete. This is especially true with bitmap indexes associated with a star
    schema fact table.


    Before you drop any indexes, ensure you have the DDL required to recreate the
    indexes. You don’t want to put yourself in the situation of dropping the indexes
    and then have no idea how to recreate them. Ideally you have the original DDL
    scripts used to create the indexes. If you don’t, use the DBMS_METADATA package
    to generate the index-creation DDL as shown:


    **select dbms_metadata.get_ddl(''INDEX'', index_name)**


    **from user_indexes**


    **where table_name = upper(''&table_name'');**


    If you run the previous SQL from SQL*Plus, be sure to set your LONG variable to
    a large value so you can view all of the text.


    An alternative approach to dropping and recreating indexes is to mark them as
    unusable and then rebuild them. Here is a script that generates the SQL required
    to alter all indexes for a table into an unusable state:


    **select ''alter index '' || index_name || '' unusable;''**


    **from user_indexes where table_name=upper(''&table_name'');**


    And here is a script that generates the SQL required to rebuild all indexes for
    a table: **select ''alter index '' || index_name || '' rebuild;''**


    **from user_indexes where table_name=upper(''&table_name'');**


    If you want to capture the output of the SQL statement in the solution section
    in a script, use the SQL*Plus SET command to turn off some of the default feedback
    settings, as shown in the following code:


    **set verify off feedback off pagesize 0**


    **spool drop_ind.sql**


    **select ''drop index '' || index_name || '';''**


    **from user_indexes where table_name=''F_SALES'';**


    **spool off;**


    The VERIFY parameter turns off before and after images of lines containing substitution
    variables.'
  trans: '

    加密是一种安全的方法，可以使数据不可读且难以解密。如果你需要加密数据，请使用 `DBMS_CRYPTO` 包或 `Oracle Advanced Security`
    选项中提供的加密功能。


    当你需要使数据不可读但仍保留一般字符模式时，混淆可能更合适。在这些情况下，加密效果不佳，因为它会将数据转换为超出正常 ASCII 字符范围的值。


    ## 工作原理


    `TRANSLATE` 函数执行逐字符替换，一次替换一个字符。它接受三个输入参数：要翻译的字符串、源字符和目标字符。


    `TRANSLATE` 函数非常适合数据混淆。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 12 章 ■ 数据清理


    有时 `TRANSLATE` 函数会与 `REPLACE` 函数混淆，但 `REPLACE` 函数是用一个字符串替换另一个字符串，而 `TRANSLATE`
    函数则是交换一个字符与另一个字符。以下是一个使用 `REPLACE` 的简单示例：


    ```sql

    select replace(''scrappple'',''ppp'',''bb'')

    from dual;

    ```


    输出显示 `ppp` 字符串已被 `bb` 字符串替换：


    ```

    REPLACE

    --------

    scrabble

    ```


    ## 12-7. 删除所有索引


    ### 问题


    你正在向表中插入大量数据，并希望尽可能快地加载数据。出于性能考虑，你希望在插入数据之前删除表上的索引。


    ### 解决方案


    为表删除所有索引的最简单方法是使用 SQL 生成所需的 SQL。以下示例生成为 `F_SALES` 表删除所有索引所需的 SQL：


    ```sql

    select ''drop index '' || index_name || '';''

    from user_indexes where table_name=''F_SALES'';

    ```


    以下是一些示例输出：


    ```

    ''DROPINDEX''||INDEX_NAME||'';''

    ------------------------------------------

    drop index F_SALES_FK1;

    drop index F_SALES_FK2;

    drop index F_SALES_FK3;

    drop index F_SALES_FK4;

    drop index F_SALES_FK5;

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 12 章 ■ 数据清理


    ### 工作原理


    在加载大型数据仓库表时，有时在加载前删除表的索引，然后在数据加载完成后重新创建它们，效率会更高。这对于与星型模式事实表关联的位图索引尤其如此。


    在删除任何索引之前，请确保你有重新创建索引所需的 DDL。你不想让自己陷入删除了索引却不知道如何重新创建它们的境地。理想情况下，你拥有用于创建索引的原始 DDL
    脚本。如果没有，请使用 `DBMS_METADATA` 包来生成索引创建 DDL，如下所示：


    ```sql

    select dbms_metadata.get_ddl(''INDEX'', index_name)

    from user_indexes

    where table_name = upper(''&table_name'');

    ```


    如果你从 `SQL*Plus` 运行前面的 SQL，请务必将 `LONG` 变量设置为一个较大的值，以便能够查看所有文本。


    删除和重新创建索引的另一种方法是将它们标记为不可用，然后重建它们。以下是一个生成用于将表的所有索引更改为不可用状态所需 SQL 的脚本：


    ```sql

    select ''alter index '' || index_name || '' unusable;''

    from user_indexes where table_name=upper(''&table_name'');

    ```


    以下是一个生成用于重建表的所有索引所需 SQL 的脚本：


    ```sql

    select ''alter index '' || index_name || '' rebuild;''

    from user_indexes where table_name=upper(''&table_name'');

    ```


    如果你想在脚本中捕获解决方案部分中的 SQL 语句输出，请使用 `SQL*Plus` 的 `SET` 命令关闭一些默认的反馈设置，如下列代码所示：


    ```sql

    set verify off feedback off pagesize 0

    spool drop_ind.sql

    select ''drop index '' || index_name || '';''

    from user_indexes where table_name=''F_SALES'';

    spool off;

    ```


    `VERIFY` 参数会关闭包含替换变量的行的前后图像。

