    \        2900 20 Rue des Corps-Saints                       Geneva           \
    \          1730\n5 rows selected\n```\n\n模式 `\\s` 匹配目标字符串中的空白字符（例如空格、制表符或换行符）。因此，没有匹配的\
    \ `\\s` 意味着地址是一个单词，匹配一次意味着地址是两个单词，依此类推。\n\n### How It Works\n\n当您只想查明字符串是否匹配某个模式时，`REGEXP_INSTR`\
    \ 甚至 `INSTR` 都可以正常工作。您甚至可以找到字符串的第 *n* 次出现。但在提取第 *n* 次出现之前，您通常想知道 *n* 是什么！一旦知道了计数，它会使您在\
    \ PL/SQL 或其他语言中的循环结构变得简单一些。它也是过滤表中行的另一种方式：例如，只包含计数超过阈值的行，如本解决方案所示。\n\n**注意** 对于在目标字符串中计算字符串常量（而不是模式）的次数，没有等效的单一内置\
    \ Oracle 函数与 `REGEXP_COUNT` 功能相同。"
  raw: 'The match_parameter parameter can be one or more of the following characters:


    • **i: case-insensitive match**


    **• **c: case-sensitive match (the default unless it is overridden by the NLS_SORT**


    **initialization parameter)


    • **n: allow a period “.” to match the newline character**


    **• **m: treat the target string as multiple lines**


    **• **x: ignore whitespace characters, such as a space or tab character 177**


    **[www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 7 ■ STRINGS


    ■ **Note** You can specify contradictory values in **match_parameter**, but Oracle
    ignores all conflicting values except for the last one. For example, if you specify
    both i and c, Oracle considers only the one that comes last.


    You want to search for all last names with at least two “s” characters that don’t
    follow a “u”


    character, and you also want to know the position of the second occurrence of
    the pattern in the target string, so your SELECT statement would look like this:


    select employee_id, last_name, first_name,


    regexp_instr(last_name,''[^u]?s'',1,2,0,''i'') next_char


    from employees


    where regexp_instr(last_name,''[^u]?s'',1,2,0,''i'') > 0


    order by last_name, first_name


    ;


    EMPLOYEE_ID LAST_NAME FIRST_NAME NEXT_CHAR


    ------------- ------------------------- -------------------- --------------


    129 Bissot Laura 4


    138 Stiles Stephen 6


    120 Weiss Matthew 5


    3 rows selected


    The search pattern matches any character except for a “u” followed by a single
    “s”. To match successive “s” characters or an “s” at the beginning of the string,
    you put a ? after the [^u] to specify zero or one occurrences. The search begins
    at the first character in the target string, and you’re looking for the second
    occurrence of the search pattern. The function will return the position of the
    second occurrence of the pattern in the target string. The “i” specifies that
    the search will be case-insensitive, and thus returns the last name “Stiles”.
    Note that a last name of “Russell” would not be returned because there is a “u”
    before one of the occurrences of “s.”


    7-5\. Extracting a Pattern


    Problem


    The SUBSTR function is limited to a starting position and length, and you want
    instead to extract a substring based on a pattern.


    Solution


    You can use the REGEXP_SUBSTR function to extract a substring of the target string
    based on a regular expression. You can optionally specify a starting position
    for the search, along with many other options found in other built-in functions
    that manipulate regular expressions such as REGEXP_INSTR.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 7 ■ STRINGS


    If you wanted to search for two-part last names (in other words, an embedded space
    within the last name) that end with the character “n,” for example, here’s the
    SELECT statement you’d use: select employee_id, last_name, first_name,


    regexp_substr(last_name,'' [a-zA-Z]+n$'') second_part


    from employees


    where regexp_substr(last_name,'' [a-zA-Z]+n$'') is not null


    order by last_name, first_name


    ;


    EMPLOYEE_ID LAST_NAME FIRST_NAME SECOND_PART


    ------------ -------------- -------------- --------------


    102 De Haan Lex Haan


    For last names that do not have an embedded space and end with an “n,” and thus
    don’t match the regular expression, REGEXP_SUBSTR returns NULL. The solution uses
    the NULL value to filter the results in the WHERE clause.


    How It Works


    The REGEXP_SUBSTR function has very little in common with the SUBSTR function,
    other than specifying the string to be searched and a starting position for the
    search. In fact, REGEXP_SUBSTR has much more in common with REGEXP_INSTR: it has
    the same arguments, except that REGEXP_INSTR returns the position of the substring
    that matches the pattern, and REGEXP_SUBSTR returns the substring itself. (The
    only other difference is that the number REGEXP_INSTR returns can be either the
    first character of the substring or the first character after the substring).
    Another recipe in this chapter exercises many of the arguments of REGEXP_INSTR.


    The solution could be rewritten using a combination of INSTR and SUBSTR as follows:
    select employee_id, last_name, first_name,


    substr(last_name,instr(last_name,'' '')) second_part


    from employees


    where instr(last_name,'' '') > 0 and substr(last_name,-1,1) = ''n''


    order by last_name, first_name


    ;


    It’s a slightly less elegant and arguably a less readable alternative to using
    REGEXP_SUBSTR in this situation. Moreover, other more complex patterns would be
    difficult or impossible using INSTR and SUBSTR.


    7-6\. Counting Patterns


    Problem


    You want to count how many times a pattern defined by a regular expression occurs
    in a string.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 7 ■ STRINGS


    Solution


    The built-in function REGEXP_COUNT counts the number of times a pattern occurs
    in a specified target string. REGEXP_INSTR will tell you whether the pattern occurs
    1 or more times, but if you need to know exactly how many times the pattern occurs,
    use REGEXP_COUNT.


    In this example, you want to find out how many street addresses are more than
    three words. The sample tables included in the HR schema include the LOCATIONS
    table:


    select location_id, street_address,


    city, postal_code


    from locations;


    LOCATION_ID STREET_ADDRESS CITY POSTAL_CODE


    ------------ --------------------------------- ----------------------- ------------


    1000 1297 Via Cola di Rie Roma 00989


    1100 93091 Calle della Testa Venice 10934


    1200 2017 Shinjuku-ku Tokyo 1689


    1300 9450 Kamiya-cho Hiroshima 6823


    1400 2014 Jabberwocky Rd Southlake 26192


    1500 2011 Interiors Blvd South San Francisco 99236


    1600 2007 Zagora St South Brunswick 50090


    1700 2004 Charade Rd Seattle 98199


    1800 147 Spadina Ave Toronto M5V 2L7


    1900 6092 Boxwood St Whitehorse YSW 9T2


    2000 40-5-12 Laogianggen Beijing 190518


    2100 1298 Vileparle (E) Bombay 490231


    2200 12-98 Victoria Street Sydney 2901


    2300 198 Clementi North Singapore 540198


    2400 8204 Arthur St London


    2500 Magdalen Centre, The Oxford Oxford OX9 9ZB


    Science Park


    2600 9702 Chester Road Stretford 09629850293


    2700 Schwanthalerstr. 7031 Munich 80925


    2800 Rua Frei Caneca 1360 Sao Paulo 01307-002


    2900 20 Rue des Corps-Saints Geneva 1730


    3000 Murtenstrasse 921 Bern 3095


    3100 Pieter Breughelstraat 837 Utrecht 3029SK


    3200 Mariano Escobedo 9991 Mexico City 11932


    23 rows selected


    To find out which street addresses are more than three words, use the following:
    select location_id, street_address,


    city, postal_code


    from locations


    where regexp_count(street_address,''\s'') >= 3


    ;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 7 ■ STRINGS


    LOCATION_ID STREET_ADDRESS CITY POSTAL_CODE


    ------------ --------------------------------- ----------------------- ------------


    1000 1297 Via Cola di Rie Roma 00989


    1100 93091 Calle della Testa Venice 10934


    2500 Magdalen Centre, The Oxford Oxford OX9 9ZB


    Science Park


    2800 Rua Frei Caneca 1360 Sao Paulo 01307-002


    2900 20 Rue des Corps-Saints Geneva 1730


    5 rows selected


    The pattern \s matches a whitespace character (a space, tab, or line break, for
    example) in the target string. Thus, no matches on \s means that the address is
    one word, one match means the address is two words, and so forth.


    How It Works


    In cases where you only want to find out if a string matches a pattern, REGEXP_INSTR
    or even INSTR works fine. You can even find the *n* th occurrence of the string.
    But before you extract the *n* th occurrence, you often want to know what *n*
    is! Once you know the count, it makes your looping constructs in PL/SQL or another
    language a bit simpler. It’s also another way to filter the rows in the table:
    for example, only include rows where the count exceeds a threshold, as in the
    solution.


    ■ **Note** There is no equivalent single built-in Oracle function to REGEXP_COUNT
    that returns the count of a string constant (instead of a pattern) within a target
    string.'
