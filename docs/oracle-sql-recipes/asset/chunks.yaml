    \n**注意** 您可以在 `match_parameter` 中指定相互矛盾的值，但 Oracle 会忽略所有冲突值，只保留最后一个。例如，如果您同时指定\
    \ `i` 和 `c`，Oracle 只考虑最后指定的那一个。\n\n您想要搜索所有姓氏中至少包含两个不跟在字符 `u` 后面的 “s” 字符，并且还想知道该模式在目标字符串中第二次出现的位置，因此您的\
    \ SELECT 语句如下所示：\n\n```sql\nselect employee_id, last_name, first_name,\n     \
    \  regexp_instr(last_name,'[^u]?s',1,2,0,'i') next_char\nfrom   employees\nwhere\
    \  regexp_instr(last_name,'[^u]?s',1,2,0,'i') > 0\norder by last_name, first_name\n\
    ;\n```\n\n```\nEMPLOYEE_ID LAST_NAME                 FIRST_NAME           NEXT_CHAR\n\
    ------------- ------------------------- -------------------- --------------\n\
    \        129 Bissot                    Laura                         4\n     \
    \   138 Stiles                    Stephen                       6\n        120\
    \ Weiss                     Matthew                       5\n3 rows selected\n\
    ```\n\n搜索模式匹配任何非 “u” 字符后跟一个 “s”。要匹配连续的 “s” 字符或字符串开头的 “s”，您在 `[^u]` 后放置一个 `?` 来指定零次或一次出现。搜索从目标字符串的第一个字符开始，您要查找搜索模式的第二次出现。该函数将返回模式在目标字符串中第二次出现的位置。`i`\
    \ 指定搜索不区分大小写，因此返回了姓氏 “Stiles”。注意，姓氏 “Russell” 不会被返回，因为在其中一个 “s” 出现之前有一个 “u”。\n\
    \n## 7-5. Extracting a Pattern\n\n### Problem\n\n`SUBSTR` 函数受限于起始位置和长度，而您希望基于模式提取子字符串。\n\
    \n### Solution\n\n您可以使用 `REGEXP_SUBSTR` 函数，基于正则表达式从目标字符串中提取子字符串。您可以选择指定搜索的起始位置，以及其他许多在操作正则表达式的内置函数（如\
    \ `REGEXP_INSTR`）中常见的选项。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n例如，如果您想搜索以字符 “n” 结尾的两部分姓氏（即姓氏中内嵌空格），可以使用以下 SELECT 语句：\n\n```sql\nselect employee_id,\
    \ last_name, first_name,\n       regexp_substr(last_name,' [a-zA-Z]+n$') second_part\n\
    from   employees\nwhere  regexp_substr(last_name,' [a-zA-Z]+n$') is not null\n\
    order by last_name, first_name\n;\n```\n\n```\nEMPLOYEE_ID LAST_NAME         \
    \        FIRST_NAME           SECOND_PART\n------------ -------------- --------------\
    \ --------------\n        102 De Haan                    Lex                 \
    \    Haan\n```\n\n对于没有内嵌空格且以 “n” 结尾的姓氏，由于它们与正则表达式不匹配，`REGEXP_SUBSTR` 返回 `NULL`。该解决方案在\
    \ `WHERE` 子句中使用 `NULL` 值来过滤结果。\n\n### How It Works\n\n`REGEXP_SUBSTR` 函数与 `SUBSTR`\
    \ 函数几乎没有共同之处，除了指定要搜索的字符串和搜索的起始位置。实际上，`REGEXP_SUBSTR` 与 `REGEXP_INSTR` 有更多的共同点：它们具有相同的参数，只是\
    \ `REGEXP_INSTR` 返回匹配模式的子字符串的位置，而 `REGEXP_SUBSTR` 返回子字符串本身。（唯一的另一个区别是 `REGEXP_INSTR`\
    \ 返回的数字可以是子字符串的第一个字符，也可以是子字符串之后的第一个字符）。本章的另一个示例练习了 `REGEXP_INSTR` 的许多参数。\n\n该解决方案可以使用\
    \ `INSTR` 和 `SUBSTR` 的组合重写，如下所示：\n\n```sql\nselect employee_id, last_name, first_name,\n\
    \       substr(last_name,instr(last_name,' ')) second_part\nfrom   employees\n\
    where  instr(last_name,' ') > 0 and substr(last_name,-1,1) = 'n'\norder by last_name,\
    \ first_name\n;\n```\n\n与在这种情况下使用 `REGEXP_SUBSTR` 相比，这是一个稍微不那么优雅且可读性较差的替代方案。此外，使用\
    \ `INSTR` 和 `SUBSTR` 很难或不可能处理其他更复杂的模式。\n\n## 7-6. Counting Patterns\n\n### Problem\n\
    \n您想计算一个由正则表达式定义的模式在字符串中出现的次数。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### Solution\n\n内置函数 `REGEXP_COUNT` 计算指定目标字符串中模式出现的次数。`REGEXP_INSTR` 会告诉您模式是否出现\
    \ 1 次或多次，但如果您需要确切知道模式出现的次数，请使用 `REGEXP_COUNT`。\n\n在此示例中，您想找出有多少街道地址超过三个单词。HR 方案中包含的示例表有\
    \ `LOCATIONS` 表：\n\n```sql\nselect location_id, street_address,\n       city,\
    \ postal_code\nfrom   locations;\n```\n\n```\nLOCATION_ID STREET_ADDRESS     \
    \                           CITY                       POSTAL_CODE\n------------\
