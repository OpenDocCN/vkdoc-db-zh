    **and view_name=''INV_VIEW'';**'
  trans: "# 第 10 章 ■ 数据字典\n\n当脚本运行时，它会生成一个格式为 `dep_dyn_<owner>.txt` 的转储文件。你可以使用操作系统编辑器打开该文本文件查看其内容。以下是本示例的输出样本：\n\
    \n**表：DOMAIN_NAMES**\n\n**+ 函数 STAR2.GET_DERIVED_COMPANY**\n\n**+ 触发器 STAR2.DOMAIN_NAMES_BU_TR1**\n\
    \n**+ 同义词 CIA_APP.DOMAIN_NAMES**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n前面的输出显示表 `DOMAIN_NAMES` 有三个依赖于它的对象：一个函数、一个触发器和一个同义词。\n\n## Utldtree\n\nOracle\
    \ 提供了一个脚本，可用于构建可显示依赖树的对象。要安装 `UTLDTREE`，请在您要分析依赖关系的模式中运行此脚本：\n\n```sql\nSQL> @?/rdbms/admin/utldtree\n\
    ```\n\n现在，您可以通过执行 `DEPTREE_FILL` 过程来构建依赖树。此过程接受三个参数：对象类型、所有者和对象名称：\n\n```sql\n\
    SQL> exec deptree_fill('table','inv_mgmt','inv');\n```\n\n要显示依赖树，请执行此 SQL 语句：\n\
    \n```sql\nSQL> select * from ideptree;\n```\n\n请注意，运行 `UTLDTREE` 脚本时，它将在当前连接的用户账户中删除并创建对象：因此，我们建议仅在测试或开发环境中使用此实用程序。\n\
    \n## 10-10. 显示同义词元数据\n\n### 问题\n\n您想显示有关同义词的信息。\n\n### 解决方案\n\n使用以下 SQL 查看用户的同义词元数据：\n\
    \n```sql\nselect\n synonym_name, table_owner, table_name, db_link\nfrom user_synonyms\n\
    order by 1;\n```\n\n`ALL_SYNONYMS` 视图将显示所有私有同义词、所有公共同义词，以及您有权限访问基础表的其他用户拥有的私有同义词。\n\
    \n您可以通过查询 `DBA_SYNONYMS` 视图来显示数据库中所有私有和公共同义词的信息。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 工作原理\n\n`DBA/ALL/USER_SYNONYMS` 视图中的 `TABLE_NAME` 列名有些误导，因为 `TABLE_NAME`\
    \ 实际上可以引用多种类型的数据库对象，例如另一个同义词、视图、包、函数、过程、物化视图等。同样，`TABLE_OWNER` 指的是对象的所有者（该对象不一定是一张表）。\n\
    \n您还可以使用 `DBMS_METADATA` 包的 `GET_DDL` 函数来显示同义词元数据。您必须向 `GET_DDL` 函数传递对象类型、名称和模式，例如：\n\
    \n```sql\nselect\n dbms_metadata.get_ddl('SYNONYM','VDB','INV')\nfrom dual;\n\
    ```\n\n在诊断数据完整性问题时，有时您可能首先需要确定实际访问的是哪张表或哪个对象。您可能选择了一个看起来是表的对象，但实际上它可能是一个同义词，指向一个视图，而该视图又从另一个同义词选择数据，该同义词最终指向另一个数据库中的表。\n\
    \n以下查询通常是确定对象是否为同义词、视图或表的起点：\n\n```sql\nselect\n owner\n,object_name\n,object_type\n\
    ,status\nfrom dba_objects\nwhere object_name like upper('&object_name%');\n```\n\
    \n请注意，在此查询中使用百分号通配符 (`%`) 允许您输入对象名称的一部分。因此，该查询有可能返回部分匹配您输入的文本字符串的任何对象的信息。\n\n\
    ## 10-11. 显示视图文本\n\n### 问题\n\n您想查看与视图关联的文本。\n\n### 解决方案\n\n使用以下脚本显示特定用户的特定视图所关联的文本：\n\
    \n```sql\nselect\n view_name\n,text\nfrom dba_views\nwhere owner = upper('&owner')\n\
    and view_name like upper('&view_name');\n```\n\n您也可以从 `ALL_VIEWS` 视图查询您有权访问的任何视图的文本：\n\
    \n```sql\nselect text\nfrom all_views\nwhere owner='INV'\nand view_name='INV_VIEW';\n\
    ```"
- fmt: 'If you want to display the view text that exists within your schema, use the
    `USER_VIEWS` view:

    ```sql

    select text from user_views where view_name=upper(''&view_name'');

    ```


    ## How It Works


    The `TEXT` column of `DBA_VIEWS` is of data type `LONG`. The default amount of
    data in a `LONG` data type displayed by SQL*Plus is 80 characters. If you don’t
    `SET LONG` to a length greater than the number of characters in the `TEXT` column,
    only part of the view listing will be shown. You can determine the view length
    by querying the `TEXT_LENGTH` column of `DBA`/`ALL`/`USER_VIEWS`.


    You can also use the `DBMS_METADATA` package `GET_DDL` function to display a view’s
    code. The data type returned from `GET_DDL` is a `CLOB`, therefore if you run
    it from SQL*Plus, make sure you first set your `LONG` variable to a sufficient
    size to display all of the text. For example, here’s how to set `LONG` to 5000
    characters:

    ```sql

    set long 5000

    ```


    You need to provide the `GET_DDL` function the object type, name, and schema respectively.
    You can display the view code by invoking `DBMS_METADATA.GET_DDL` with a `SELECT`
    statement as follows:

    ```sql

    select dbms_metadata.get_ddl(''VIEW'',''USER_VIEW'',''INV'') from dual;

    ```


    ## Oracle Internal View Definitions


    You may occasionally need to view the definition of an Oracle internal view. For
    example, you might be troubleshooting an issue and need to know more details on
    how Oracle is retrieving information from the data dictionary. Select from the
    `V$FIXED_VIEW_DEFINITION` view for definitions of the `V$` views. This example
    selects the text of the `V$BH` view:

    ```sql

    select view_definition from v$fixed_view_definition where view_name=''V$BH'';

    ```


    Here is the corresponding output:

    ```sql

    select file#, block#, class#, status, xnc, forced_reads, forced_writes, lock_element,
    addr, lock_element_name, lock_element_class, dirty, temp, ping, stale, direct,
    new, objd, ts# from gv$bh where inst_id = USERENV(''Instance'')

    ```


    Displaying these definitions can also give you a better understanding of the intricacies
    of Oracle internals.


    # 10-12. Displaying Database Code


    ## Problem


    You want to display the code associated with PL/SQL object or a trigger.


    ## Solution


    Select from the `USER_SOURCE` view to see trigger code:

    ```sql

    select text from user_source where name like upper(''&unit_name%'') and type =
    ''TRIGGER'' order by type, name, line;

    ```


    The `TYPE` column is used because there can be different types of PL/SQL within
    the `USER_SOURCE` view, such as procedures, functions, and packages. For example,
    it’s possible that you may have named a trigger with the exact same name as a
    procedure of function. Therefore you need to use the `TYPE` column or you could
    return some confusing results.


    ## How It Works


    With the SQL example in the solution section of this recipe, you can type in a
    partial name of the trigger. The `LIKE` predicate can be used with wildcard characters
    such as the percent sign (`%`) and the underscore (`_`). The percent sign instructs
    `LIKE` to match on any number of characters you type in, whereas the underscore
    symbol matches on exactly one character.


    The `TEXT` column in the `DBA`/`ALL`/`USER_SOURCE` views is a `VARCHAR2` column
    (and not a `LONG`). Therefore you don’t need to set the SQL*Plus `LONG` variable
    before querying the view.


    You can also use the `DBMS_METADATA` package `GET_DDL` function to display trigger
    code. The data type that is returned from `GET_DDL` is a `CLOB`, therefore if
    you run it from SQL*Plus, make sure you first set your `LONG` variable to a sufficient
    size to display all of the text. For example, to set `LONG` to 5000 characters:

    ```sql

    set long 5000

    ```


    You need to provide the `GET_DDL` function the object type, name, and owner respectively.
    You can display the trigger code by invoking `DBMS_METADATA.GET_DDL` with a `SELECT`
    statement as follows:

    ```sql

    select dbms_metadata.get_ddl(''TRIGGER'', ''INVTRIG_BU1'', ''INV'') from dual;

    ```'
