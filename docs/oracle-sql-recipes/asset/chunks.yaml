    15-13\. Adding a Partition to a Partitioned Table


    Problem


    You have a table that is already partitioned but you want to add another partition
    to the table.


    Solution


    The solution will depend on the type of partitioning you’ve implemented. For a
    range-partitioned table, if the table’s highest bound is not defined with a MAXVALUE,
    you can use the ALTER TABLE...ADD PARTITION


    statement to add a partition to the high end of the table. This example adds a
    partition to the high end of a range-partitioned table:


    alter table f_regs add partition p2011 values less than (20120101)


    pctfree 5 pctused 95 tablespace p_tbsp;


    If you have a range-partitioned table with the high range bounded by MAXVALUE,
    you can’t add a partition. In this situation you’ll have to split an existing
    partition (see recipe 15-16 for details).


    If you have a hash-partitioned table, use the ADD PARTITION clause as follows
    to add a partition: 368


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ PARTITIONING


    alter table browns add partition new_part tablespace p_tbsp update indexes; If
    you don’t specify the UPDATE INDEXES clause, any global indexes and local indexes
    for the new partition on a hash-partitioned table will have to be rebuilt.


    For a list-partitioned table, you can only add a new partition if there is not
    a DEFAULT partition defined. The next example adds a partition to a list-partitioned
    table: alter table f_sales add partition reg_east values(''GA'');


    How It Works


    After adding a partition to a table, always check the indexes to ensure that they
    all still have a usable STATUS:


    select index_name, partition_name, status from user_ind_partitions;


    Consider using the UPDATE INDEXES clause of the ALTER TABLE statement to automatically
    rebuild indexes when performing maintenance operations. In some cases, you may
    not be able to use the UPDATE


    INDEXES clause and will have to rebuild any unusable indexes. We highly recommend
    that you always test a maintenance operation in a non-production database to determine
    any unforeseen side effects.


    15-14\. Exchanging a Partition with an Existing Table


    Problem


    You have loaded a staging table with data. You now want to make the table a partition
    in a partitioned table.


    Solution


    Use the partition exchange feature to swap a stand-alone table with a table partition.
    A simple example will illustrate the process. Say you have a range-partitioned
    table created as follows: create table f_sales


    (sales_amt number, d_date_id number)


    partition by range (d_date_id)


    (partition p_2007 values less than (20080101),


    partition p_2008 values less than (20090101),


    partition p_2009 values less than (20100101)


    );


    Also, a bitmap index has been created on the D_DATE_ID column:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ PARTITIONING


    create bitmap index d_date_id_fk1 on


    f_sales(d_date_id) local;


    Now add a new partition to the table that will store new data:


    alter table f_sales add partition p_2010


    values less than(20110101);


    Next, create a staging table and insert data that falls within the range of values
    for the newly added partition:


    create table workpart(sales_amt number, d_date_id number);


    insert into workpart values(100,20100101);


    insert into workpart values(120,20100102);


    Create a bitmap index on the WORKPART table that matches the structure of the
    bitmap index on F_SALES:


    create bitmap index d_date_id_fk2 on workpart(d_date_id);


    Now exchange the WORKPART table with the P_2010 partition:


    alter table f_sales exchange partition p_2010


    with table workpart including indexes without validation;


    A quick query of the F_SALES table verifies the partition was exchanged successfully:
    select * from f_sales partition(p_2010);


    Here is the output:


    SALES_AMT D_DATE_ID


    ---------- ----------


    100 20100101


    120 20100102


    This query will display that the indexes are all still usable:


    select index_name, partition_name, status from user_ind_partitions;


    You can also verify that a local index segment was created for the new partition:
    select segment_name,segment_type,partition_name


    from user_segments


    where segment_name IN(''F_SALES'',''D_DATE_ID_FK1'');


    Here is the output:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ PARTITIONING


    SEGMENT_NAME SEGMENT_TYPE PARTITION_NAME


    -------------------- -------------------- --------------------


    D_DATE_ID_FK1 INDEX PARTITION P_2007


    D_DATE_ID_FK1 INDEX PARTITION P_2008


    D_DATE_ID_FK1 INDEX PARTITION P_2009


    D_DATE_ID_FK1 INDEX PARTITION P_2010


    F_SALES TABLE PARTITION P_2007


    F_SALES TABLE PARTITION P_2008


    F_SALES TABLE PARTITION P_2009


    F_SALES TABLE PARTITION P_2010


    How It Works'
  trans: "# 第 15 章 ■ 分区\n\n## 15-12. 对现有表进行分区\n\n### 问题\n\n你有一个表已经变得很大，且当前未分区。你想知道是否可以对它进行分区。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 解决方案\n\n有几种方法可以将非分区表转换为分区表。本解决方案展示一种简单的方法，步骤如下：\n\
    \n1.  使用 `CREATE TABLE <新表名>...AS SELECT * FROM <旧表名>` 从旧表创建一个新的分区表。\n2.  删除或重命名旧表。\n\
    3.  将步骤 1 中创建的表重命名为被删除的旧表名。\n\n在此示例中，我们首先使用 `CREATE TABLE` 语句从旧的、名为 `F_REGS` 的非分区表创建一个名为\
    \ `F_REGS_NEW` 的新分区表：\n\n```sql\ncreate table f_regs_new\npartition by range (d_date_id)\n\
    (partition p2008 values less than(20090101),\npartition p2009 values less than(20100101),\n\
    partition pmax values less than(maxvalue)\n)\nnologging\nas select * from f_regs;\n\
    ```\n\n现在，你可以删除（或重命名）旧的非分区表，并将新的分区表重命名为旧表名：\n\n```sql\ndrop table f_regs purge;\n\
    rename f_regs_new to f_regs;\n```\n\n最后，为新表重建所有约束、授权、索引和统计信息。你现在应该拥有一个替换了旧的非分区表的新分区表。\n\
    \n如果原始表包含许多约束、授权和索引，对于最后一步，你可能希望使用 Data Pump `EXPDP` 或 `EXP` 导出不含数据的原始表，然后在创建新表后，使用\
    \ Data Pump `IMPDP` 或 `IMP` 在新表上创建约束、授权、索引和统计信息。\n\n### 工作原理\n\n将表从非分区转换为分区可能是一个耗时的过程。在解决方案部分，我们展示了一种简单的表转换方法。表\
    \ 15-3 列出了从非分区表创建分区表的各种技术的优缺点。毫无疑问，你需要仔细规划并测试你的转换过程。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**表 15-3. 转换非分区表的方法**\n\n| **转换方法** | **优点** | **缺点** |\n| :--- | :--- | :---\
    \ |\n| `CREATE <新分区表> AS SELECT * FROM <旧表>` | 简单，可使用 `NOLOGGING` 和 `PARALLEL`\
    \ 选项。直接路径加载。 | 需要同时容纳新旧表的空间。 |\n| `INSERT /*+ APPEND */ INTO <新分区表> SELECT * FROM\
    \ <旧表>` | 快速、简单。直接路径加载。 | 需要同时容纳新旧表的空间。 |\n| Data Pump `EXPDP` 旧表，`IMPDP` 新表（或对于旧版\
    \ Oracle 使用 `EXP` 和 `IMP`） | 快速，所需空间较少。处理了授权、权限等。可按分区通过过滤条件进行加载。 | 因为需要使用工具而更复杂。\
    \ |\n| 创建分区表 `<新分区表>`，与旧表 `<旧表>` 交换分区 | 潜在停机时间更少。 | 步骤多，复杂。 |\n| 使用 `DBMS_REDEFINITION`\
    \ 包（较新版本的 Oracle） | 在线转换现有表。 | 步骤多，复杂。 |\n| 创建 CSV 文件或外部表，使用 SQL*Loader 加载 `<新分区表>`\
    \ | 可按分区进行加载。 | 步骤多，复杂。 |\n\n## 15-13. 向分区表添加分区\n\n### 问题\n\n你有一个已经分区的表，但你想向该表添加另一个分区。\n\
    \n### 解决方案\n\n解决方案取决于你实现的分区类型。对于范围分区表，如果表的最高界限未定义 `MAXVALUE`，你可以使用 `ALTER TABLE...ADD\
    \ PARTITION` 语句向表的高端添加分区。此示例向范围分区表的高端添加一个分区：\n\n```sql\nalter table f_regs add\
    \ partition p2011 values less than (20120101)\npctfree 5 pctused 95 tablespace\
    \ p_tbsp;\n```\n\n如果你有一个高范围以 `MAXVALUE` 限定的范围分区表，则无法添加分区。在这种情况下，你必须拆分一个现有分区（详见配方\
    \ 15-16）。\n\n对于哈希分区表，使用 `ADD PARTITION` 子句添加分区，如下所示：\n\n```sql\nalter table browns\
    \ add partition new_part tablespace p_tbsp update indexes;\n```\n\n如果你未指定 `UPDATE\
    \ INDEXES` 子句，哈希分区表上新分区的任何全局索引和本地索引都需要重建。\n\n对于列表分区表，只有在未定义 `DEFAULT` 分区的情况下，你才能添加新分区。下一个示例向列表分区表添加一个分区：\n\
    \n```sql\nalter table f_sales add partition reg_east values('GA');\n```\n\n###\
    \ 工作原理\n\n向表添加分区后，务必检查索引以确保它们都仍处于可用状态 (`USABLE`)：\n\n```sql\nselect index_name,\
    \ partition_name, status from user_ind_partitions;\n```\n\n考虑在执行维护操作时使用 `ALTER\
    \ TABLE` 语句的 `UPDATE INDEXES` 子句来自动重建索引。在某些情况下，你可能无法使用 `UPDATE INDEXES` 子句，而将不得不重建任何不可用的索引。我们强烈建议你始终在非生产数据库中测试维护操作，以确定任何不可预见的副作用。\n\
    \n## 15-14. 将分区与现有表交换\n\n### 问题\n\n你已经将数据加载到一个临时表（staging table）中。现在你想将该表作为分区表的一个分区。\n\
    \n### 解决方案\n\n使用分区交换功能将独立表与表分区交换。一个简单的示例将说明该过程。假设你创建了一个范围分区表，如下所示：\n\n```sql\n\
    create table f_sales\n(sales_amt number, d_date_id number)\npartition by range\
    \ (d_date_id)\n(partition p_2007 values less than (20080101),\npartition p_2008\
    \ values less than (20090101),\npartition p_2009 values less than (20100101)\n\
    );\n```\n\n并且，在 `D_DATE_ID` 列上创建了一个位图索引：\n\n```sql\ncreate bitmap index d_date_id_fk1\
    \ on\nf_sales(d_date_id) local;\n```\n\n现在向表中添加一个新分区以存储新数据：\n\n```sql\nalter table\
    \ f_sales add partition p_2010\nvalues less than(20110101);\n```\n\n接下来，创建一个临时表并插入属于新添加分区值范围的数据：\n\
    \n```sql\ncreate table workpart(sales_amt number, d_date_id number);\ninsert into\
    \ workpart values(100,20100101);\ninsert into workpart values(120,20100102);\n\
    ```\n\n在 `WORKPART` 表上创建一个与 `F_SALES` 上的位图索引结构匹配的位图索引：\n\n```sql\ncreate bitmap\
    \ index d_date_id_fk2 on workpart(d_date_id);\n```\n\n现在交换 `WORKPART` 表与 `P_2010`\
    \ 分区：\n\n```sql\nalter table f_sales exchange partition p_2010\nwith table workpart\
    \ including indexes without validation;\n```\n\n快速查询 `F_SALES` 表可验证分区已成功交换：\n\n\
    ```sql\nselect * from f_sales partition(p_2010);\n```\n\n输出如下：\n\n```\nSALES_AMT\
    \ D_DATE_ID\n---------- ----------\n       100 20100101\n       120 20100102\n\
    ```\n\n此查询将显示所有索引仍可用：\n\n```sql\nselect index_name, partition_name, status from\
    \ user_ind_partitions;\n```\n\n你还可以验证是否为新区创建了本地索引段：\n\n```sql\nselect segment_name,segment_type,partition_name\n\
    from user_segments\nwhere segment_name IN('F_SALES','D_DATE_ID_FK1');\n```\n\n\
    输出如下：\n\n```\nSEGMENT_NAME       SEGMENT_TYPE       PARTITION_NAME\n--------------------\
    \ -------------------- --------------------\nD_DATE_ID_FK1       INDEX PARTITION\
    \    P_2007\nD_DATE_ID_FK1       INDEX PARTITION    P_2008\nD_DATE_ID_FK1    \
    \   INDEX PARTITION    P_2009\nD_DATE_ID_FK1       INDEX PARTITION    P_2010\n\
    F_SALES             TABLE PARTITION    P_2007\nF_SALES             TABLE PARTITION\
    \    P_2008\nF_SALES             TABLE PARTITION    P_2009\nF_SALES          \
    \   TABLE PARTITION    P_2010\n```\n\n### 工作原理"
- fmt: '# CHAPTER 15 ■ PARTITIONING


    ## 15-14\. Exchanging a Partition


    The ability to exchange partitions is a powerful feature. It allows you to take
    a partition of an existing table and make it a stand-alone table, and at the same
    time, make a stand-alone table part of a partitioned table. When you exchange
    a partition, Oracle simply updates the entries in the data dictionary to perform
    the exchange.


    When you exchange a partition with the `WITHOUT VALIDATION` clause, you instruct
    Oracle not to validate that the rows in the incoming partition (or subpartition)
    are valid entries for the defined range.


    This has the advantage of making the exchange a very quick operation because Oracle
    is only updating pointers in the data dictionary to perform the exchange operation.
    You will need to make sure that your data is accurate if you use `WITHOUT VALIDATION`.


    If you have a primary key defined for the partitioned table, the table being exchanged
    must also have the same primary key structure defined. If there is a primary key,
    the `WITHOUT VALIDATION` clause does not stop Oracle from enforcing unique constraints.


    ## 15-15\. Renaming a Partition


    ### Problem


    You want to rename a partition so that it conforms to your naming standards.


    ### Solution


    You can rename both table partitions and index partitions. This example uses the
    `ALTER TABLE` statement to rename a table partition:


    ```sql

    alter table f_regs rename partition reg_p_1 to reg_part_1;

    ```


    This next line of code uses the `ALTER INDEX` statement to rename an index partition:


    ```sql

    alter index f_reg_dates_fk1 rename partition reg_p_1 to reg_part_1;

    ```


    ### How It Works


    Sometimes it’s necessary to rename a table partition or index partition. For example,
    you might want to rename a partition before you drop it. Also, you may want to
    rename objects so that they conform to standards. In these scenarios, use the
    appropriate `ALTER TABLE` or `ALTER INDEX` statement to do so. You can query the
    data dictionary to verify the information regarding renamed objects. This query
    shows partitioned table names:


    ```sql

    select table_name,partition_name,tablespace_name from user_tab_partitions;

    ```


    Similarly, this query displays partitioned index information:


    ```sql

    select index_name,partition_name,status,high_value,tablespace_name

    from user_ind_partitions;

    ```


    ## 15-16\. Splitting a Partition


    ### Problem


    You have identified a partition that has too many rows. You want to split the
    partition into two partitions.


    ### Solution


    Use the `ALTER TABLE...SPLIT PARTITION` statement to split an existing partition.
    The following example splits a partition in a range-partitioned table:


    ```sql

    alter table f_regs split partition p2010 at (20100601)

    into (partition p2010_a, partition p2010) update indexes;

    ```


    If you don’t specify `UPDATE INDEXES`, you will need to rebuild any local indexes
    associated with the split partition as well as any global indexes. You can verify
    the status of indexes with the following SQL:


    ```sql

    select index_name, partition_name, status from user_ind_partitions;

    ```


    The next example splits a list partition. First the `CREATE TABLE` statement is
    shown so that you can see how the list partitions were originally defined:


    ```sql

    create table f_sales

    (reg_sales number

    ,d_date_id number

    ,state_code varchar2(20)

    )

    partition by list (state_code)

    ( partition reg_west values (''AZ'',''CA'',''CO'',''MT'',''OR'',''ID'',''UT'',''NV'')

    ,partition reg_mid values (''IA'',''KS'',''MI'',''MN'',''MO'',''NE'',''OH'',''ND'')

    ,partition reg_rest values (default)

    );

    ```


    Next, the `REG_MID` partition is split:


    ```sql

    alter table f_sales split partition reg_mid values (''IA'',''KS'',''MI'',''MN'')
    into (partition reg_mid_a,

    partition reg_mid_b);

    ```


    The `REG_MID_A` partition now contains the values of `IA`, `KS`, `MI`, and `MN`,
    while the `REG_MID_B` is assigned the remaining values of `MO`, `NE`, `OH`, and
    `ND`.


    ### How It Works


    The split-partition operation allows you to create two new partitions from a single
    partition. Each new partition has its own segment, physical attributes, and extents.
    The segment associated with the original partition is deleted.'
