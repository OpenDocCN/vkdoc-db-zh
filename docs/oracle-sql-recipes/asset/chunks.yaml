    table name used when creating an IOT. Additionally, there will be a record in
    `DBA/ALL/USER_INDEXES` with the name of the primary key constraint specified.
    The `INDEX_TYPE` column will contain a value of `IOT - TOP` for index organized
    tables:


    ```sql

    select index_name,table_name,index_type from user_indexes;

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## CHAPTER 18 ■ OBJECT MANAGEMENT


    Here’s a sample of the output:


    ```text

    INDEX_NAME TABLE_NAME INDEX_TYPE


    -------------------- -------------------- ---------------------------


    PROD_SKU_PK PROD_SKU IOT - TOP

    ```


    ### 18-11. Creating a View


    #### Problem

    You want to store a SQL query that is run frequently.


    #### Solution

    Use the `CREATE VIEW` command to create a view. The following code creates a view
    (or replaces it if the view already exists) that selects a subset of columns and
    rows from the `SALES` table:


    ```sql

    create or replace view sales_rockies as


    select sales_id, amnt, state


    from sales


    where state in (''CO'',''UT'',''WY'',''ID'',''AZ'');

    ```


    Now you can treat the `SALES_ROCKIES` view as if it were a table. Views that only
    select from one table are called simple views. The schema that has access to the
    view can perform any `SELECT`, `INSERT`, `UPDATE`, or `DELETE` operation that
    it has object grants for and the DML operation will result in the underlying table
    data being changed.


    If you want to allow only the underlying table data within the scope of the view
    to be changed, then specify the `WITH CHECK OPTION`:


    ```sql

    create or replace view sales_rockies as


    select sales_id, amnt, state


    from sales


    where state in (''CO'',''UT'',''WY'',''ID'',''AZ'')


    with check option;

    ```


    Using the `WITH CHECK OPTION` means that you can only insert or update rows that
    would be returned by the view query. For example, this update statement will work
    because we are not changing the underlying data in a way that would cause it not
    to be returned by the view:


    ```sql

    update sales_rockies set state=''CO'' where sales_id=160;

    ```


    However this next update statement will fail because it attempts to update the
    `STATE` column to a state that is not selectable by the view:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## CHAPTER 18 ■ OBJECT MANAGEMENT


    ```sql

    update sales_rockies set state=''CA'' where sales_id=160;

    ```


    If you don’t want a user to be able to perform `INSERT`, `UPDATE`, or `DELETE`
    operations on a view, then don’t grant those object privileges on the underlying
    table(s) to that user. If you don’t want an account that owns the underlying tables
    (or has privileges to modify the table data) to be able to change underlying table
    data through a view, create the view with the `WITH READ ONLY` clause:


    ```sql

    create or replace view sales_rockies as


    select sales_id, amnt, state


    from sales


    where state in (''CO'',''UT'',''WY'',''ID'',''AZ'')


    with read only;

    ```


    If you need to modify the SQL query that a view is based on, then either drop
    and re-create it or use the `CREATE OR REPLACE` syntax as in the previous examples.
    The advantage to the `CREATE OR REPLACE` method is that you don’t have to reestablish
    access to the view for users with previously granted permissions. If you drop
    and re-create the view, you’ll need to regrant privileges to any users or roles
    that previously had been granted access to the dropped and re-created object.


    `Note` There is an `ALTER VIEW` command that is used for modifying constraint
    attributes of the view. You can also use the `ALTER VIEW` command to recompile
    a view.


    #### How It Works

    You can think of a view as a SQL statement stored in the database. When you select
    from a view, Oracle looks up the view definition in the data dictionary, executes
    the query that the view is based on, and returns the results. Or put another way,
    views are logical tables built on other tables and/or views. Views are used to:


    - create an efficient method of storing a SQL query for reuse.

    - provide an interface layer between application and physical tables.

    - hide the complexity of a SQL query from the application.

    - report on only a subset of columns and/or rows to a user.'
