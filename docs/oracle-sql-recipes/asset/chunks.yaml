    **C H A P T E R 1 4**


    ■ ■ ■


    **Working with XML Data**


    Back in the halcyon days of the dot-com boom, it seemed every problem known to
    humankind could be solved with the application of a single technology —XML was
    the answer! Fast forward 10 years, and XML


    has become part of everyday life for information technology. Whether it’s as part
    of the SOAP protocols for web services, the basis for workflow with BPEL (the
    Business Process Execution Language for Web Services), or as a universal mechanism
    for data interchange, XML is increasingly entering the database world.


    Oracle added support for XML with Oracle 9 *i*, and has improved its capabilities
    so that XML in 11 *g* Release 2 is a first-class data citizen, with a wealth of
    tricks up its metaphorical sleeve. The recipes presented here are a mix of introductory
    examples, as well as more complex tasks to suit both beginners and experienced
    hands at XML in Oracle.


    14-1\. Translating SQL to XML


    Problem


    You need to convert data stored in traditional form in your database to XML. For
    instance, you need to dynamically create XML from your employee data for an employee
    record to send to a third party.


    Solution


    Oracle possesses many different functions for converting data to XML format. The
    sheer number of functions stems from the evolution of XML in the database, from
    its early inclusion in Oracle 9 *i* through to its amazing flexibility in Oracle
    today. Some of the principal functions Oracle provides for converting relational
    data to XML are the SYS_XMLGEN, DBMS_XMLGEN, and XMLELEMENT functions. Each of
    these could solve this particular problem, but each has its own idiosyncracies.


    We’ve chosen to craft our recipe for dynamically converting one row of data with
    SYS_XMLGEN. We employ a user-defined type to act as a helper type to map our target
    data from relational to object-relational form, so it can be passed straight to
    SYS_XMLGEN. The SYS_XMLGEN function returns a block of XML based on a row or row-like
    expression. It can take a literal value, a single column, or a user-defined type
    as input parameter. We create the EMPLOYEE_MAP_TYPE shown next to map the relational
    data in the HR.EMPLOYEES table to a user-defined type that can be used directly
    by SYS_XMLGEN.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ WORKING WITH XML DATA


    create or replace type employee_map_type as object (


    employee_id number(6),


    first_name varchar2(20),


    last_name varchar2(25),


    email varchar2(25),


    phone_number varchar2(20),


    hire_date date,


    job_id varchar2(10),


    salary number(8,2),


    commission_pct number(2,2),


    manager_id number(6),


    department_id number(4)


    );


    /


    We now use the EMPLOYEE_MAP_TYPE type as a catalyst to feed data stored relationally
    for XML


    processing and output. The next procedure returns a valid, well-formed XML document
    representing the details of a given employee.


    create or replace procedure employee_xml (emp_id IN number)


    as


    xml_employee xmltype;


    begin


    select


    sys_xmlgen


    (employee_map_type


    (e.employee_id,


    e.first_name,


    e.last_name,


    e.email,


    e.phone_number,


    e.hire_date,


    e.job_id,


    e.salary,


    e.commission_pct,


    e.manager_id,


    e.department_id)


    ) into xml_employee


    from hr.employees


    where e.employee_id = emp_id;


    dbms_output.put_line(xml_employee.getclobval());


    end;


    /


    We can now call the EMPLOYEE_XML procedure to provide employee data in XML form.


    call employee_xml(150);


    <?xml version="1.0"?>


    <ROW>


    <EMPLOYEE_ID>150</EMPLOYEE_ID>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ WORKING WITH XML DATA


    <FIRST_NAME>Peter</FIRST_NAME>


    <LAST_NAME>Tucker</LAST_NAME>


    <EMAIL>PTUCKER</EMAIL>


    <PHONE_NUMBER>011.44.1344.129268</PHONE_NUMBER>


    <HIRE_DATE>30-JAN-97</HIRE_DATE>


    <JOB_ID>SA_REP</JOB_ID>


    <SALARY>10000</SALARY>


    <COMMISSION_PCT>.3</COMMISSION_PCT>


    <MANAGER_ID>145</MANAGER_ID>


    <DEPARTMENT_ID>80</DEPARTMENT_ID>


    </ROW>


    Call completed.


    How It Works


    Our recipe works in two parts to build reusable components to convert employee
    data to XML. One limitation of the SYS_XMLGEN function is that it cannot accept
    multiple columns or tabular results as an input —such as the result of a SELECT
    * … statement. While the DBMS_XMLGEN procedure could do this, there’s significant
    extra complexity to using that approach, which we want to avoid. We use SYS_XMLGEN’s
    ability to operate on a user-defined type of arbitrary complexity. Our EMPLOYEE_MAP_TYPE
    mimics the column names and datatypes of the HR.EMPLOYEES table.


    We create the EMPLOYEE_XML procedure by declaring a variable XML_EMPLOYEE to hold
    the generated XML version of the employee data.


    Up to this point, our procedure is very straightforward. The next step calls SYS_XMLGEN:
    select


    sys_xmlgen


    (employee_map_type


    (e.employee_id,


    e.first_name,


    e.last_name,


    e.email,


    e.phone_number,


    e.hire_date,


    e.job_id,


    e.salary,


    e.commission_pct,


    e.manager_id,


    e.department_id)


    ) into xml_employee


    from hr.employees


    where e.employee_id = emp_id;


    Here we use our EMPLOYEE_MAP_TYPE to dynamically cast the results from the SELECT
    statement into our custom user-defined datatype. At this point, we have a parameter
    that SYS_XMLGEN can accept. The result of the SYS_XMLGEN call is then directed
    to the XML_EMPLOYEE variable by the INTO clause.


    At this point, the XML_EMPLOYEE variable holds our desired data in XML form. For
    a normal user to see the XML, we need to use a trick that relies on the underlying
    storage model for XML in Oracle. Under the hood, XML can be stored and managed
    in several ways. The most common is as a CLOB, and we can use 337


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ WORKING WITH XML DATA


    this knowledge to invoke CLOB methods to retrieve the XML. The last line of our
    procedure invokes the GETCLOBVAL function on our XML_EMPOYEE variable, passing
    the results to DBMS_OUTPUT.PUT_LINE for printing onscreen (If you’re running in
    SQL*Plus, don’t forget to issue SET SERVEROUTPUT ON).


    **The Many Forms of XMLTYPE Storage**


    Oracle provides four different storage mechanisms for XMLTYPE data. These different
    approaches stem from the nature of XML as typically large blocks of text with
    a readily defined structure. It’s this tension between large size and the patterns
    or structure hidden within that leads to trade-offs in storage efficiency versus
    indexing, and throughput versus transactional capabilities.


    The four storage approaches for the XMLTYPE datatype are:


    • **Object-Relational:** XML data is shredded into automatically created object-relational
    rows, ideal for element-based access, updates, and processing. Object-relational
    storage requires processing overhead to reform the complete XML


    document each time it is accessed as a single object.


    • **CLOB:** Using a character large object approach to storing XML allows for
    easy processing of the whole XML document, preserving format, whitespace, and
    more.


    Extra overhead is introduced when updating individual elements in the XML, or
    indexing at the element level.


    • **Hybrid:** A compromise between object-relational and CLOB storage, hybrid
    attempts to add element-level performance enhancements to document-centric CLOB
    storage.


    • **Binary XML:** The newest form of XML storage in Oracle, this approach stores
    XML


    documents in a “post-parse” format, with checks for XML structure already performed.
    The underlying storage uses a compressed binary form, adding space efficiency
    to the processing efficiency gains.


    Older applications and designs based on Oracle would normally choose between object-relational
    and CLOB storage, depending on the element/processing-centric versus document/throughput-centric
    nature of the system. Any new development with Oracle should favor the new Binary
    XML storage mechanism—


    though edge cases that emphasize extreme throughput or heavy element-level manipulation
    should be benchmarked with the CLOB or object-relational storage options.'
  trans: "\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 14 章\n\n■ ■ ■\n\
    \n# 处理 XML 数据\n\n回溯到互联网泡沫那平静美好的岁月，似乎人类已知的每一个问题都能通过应用一种技术来解决——XML 就是答案！快进十年，XML\
    \ 已成为信息技术日常生活的一部分。无论是作为 Web 服务 SOAP 协议的一部分，还是作为 BPEL（Web 服务的业务流程执行语言）工作流的基础，抑或是作为通用的数据交换机制，XML\
    \ 正越来越多地进入数据库的世界。\n\nOracle 从 Oracle 9*i*开始增加对 XML 的支持，并不断增强其能力，使得 11*g* Release\
    \ 2 中的 XML 成为一等公民，其“比喻性的袖子”里藏着丰富的技巧。这里介绍的方法混合了入门示例和更复杂的任务，既适合初学者，也适合有 Oracle 中\
    \ XML 使用经验的老手。\n\n## 14-1. 将 SQL 转换为 XML\n\n### 问题\n\n你需要将数据库中传统形式存储的数据转换为 XML。例如，你需要从员工数据中动态创建\
    \ XML，以便将员工记录发送给第三方。\n\n### 解决方案\n\nOracle 提供了许多不同的函数用于将数据转换为 XML 格式。函数数量如此之多，源于\
    \ XML 在数据库中的演变历程，从 Oracle 9*i*的早期包含，到今天 Oracle 中惊人的灵活性。Oracle 提供的一些用于将关系数据转换为\
    \ XML 的主要函数是`SYS_XMLGEN`、`DBMS_XMLGEN`和`XMLELEMENT`。每个函数都可以解决这个特定问题，但各自有其特点。\n\
    \n我们选择使用`SYS_XMLGEN`来动态转换一行数据。我们采用一个用户定义类型作为辅助类型，将目标数据从关系形式映射到对象关系形式，以便可以直接传递给`SYS_XMLGEN`。`SYS_XMLGEN`函数基于一行或类似行的表达式返回一块\
    \ XML。它可以接受字面值、单列或用户定义类型作为输入参数。我们创建如下所示的`EMPLOYEE_MAP_TYPE`，将`HR.EMPLOYEES`表中的关系数据映射到一个可直接供`SYS_XMLGEN`使用的用户定义类型。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 14 章 ■ 处理 XML 数据\n\n```sql\n\
    create or replace type employee_map_type as object (\n  employee_id    number(6),\n\
    \  first_name     varchar2(20),\n  last_name      varchar2(25),\n  email     \
    \     varchar2(25),\n  phone_number   varchar2(20),\n  hire_date      date,\n\
    \  job_id         varchar2(10),\n  salary         number(8,2),\n  commission_pct\
    \ number(2,2),\n  manager_id     number(6),\n  department_id  number(4)\n);\n\
    /\n```\n\n我们现在使用`EMPLOYEE_MAP_TYPE`类型作为催化剂，将关系存储的数据送入 XML 处理和输出。接下来的过程返回一个格式正确、表示给定员工详细信息的\
    \ XML 文档。\n\n```sql\ncreate or replace procedure employee_xml (emp_id IN number)\n\
    as\n  xml_employee xmltype;\nbegin\n  select\n    sys_xmlgen\n      (employee_map_type\n\
    \        (e.employee_id,\n         e.first_name,\n         e.last_name,\n    \
    \     e.email,\n         e.phone_number,\n         e.hire_date,\n         e.job_id,\n\
    \         e.salary,\n         e.commission_pct,\n         e.manager_id,\n    \
    \     e.department_id)\n      ) into xml_employee\n  from hr.employees e\n  where\
    \ e.employee_id = emp_id;\n\n  dbms_output.put_line(xml_employee.getclobval());\n\
    end;\n/\n```\n\n现在我们可以调用`EMPLOYEE_XML`过程来获取 XML 形式的员工数据。\n\n```sql\ncall employee_xml(150);\n\
    ```\n\n输出结果：\n\n```xml\n<?xml version=\"1.0\"?>\n<ROW>\n  <EMPLOYEE_ID>150</EMPLOYEE_ID>\n\
    \  <FIRST_NAME>Peter</FIRST_NAME>\n  <LAST_NAME>Tucker</LAST_NAME>\n  <EMAIL>PTUCKER</EMAIL>\n\
    \  <PHONE_NUMBER>011.44.1344.129268</PHONE_NUMBER>\n  <HIRE_DATE>30-JAN-97</HIRE_DATE>\n\
    \  <JOB_ID>SA_REP</JOB_ID>\n  <SALARY>10000</SALARY>\n  <COMMISSION_PCT>.3</COMMISSION_PCT>\n\
    \  <MANAGER_ID>145</MANAGER_ID>\n  <DEPARTMENT_ID>80</DEPARTMENT_ID>\n</ROW>\n\
    ```\n\n调用完成。\n\n### 工作原理\n\n我们的方法分两部分来构建可重用的组件，将员工数据转换为 XML。`SYS_XMLGEN`函数的一个限制是它不能接受多列或表格结果作为输入——例如`SELECT\
    \ * …`语句的结果。虽然`DBMS_XMLGEN`过程可以做到这一点，但使用该方法的额外复杂性很高，我们希望避免。我们利用`SYS_XMLGEN`能够操作任意复杂度的用户定义类型的能力。我们的`EMPLOYEE_MAP_TYPE`模拟了`HR.EMPLOYEES`表的列名和数据类型。\n\
    \n我们通过声明一个变量`XML_EMPLOYEE`来保存生成的员工数据的 XML 版本，从而创建了`EMPLOYEE_XML`过程。\n\n到目前为止，我们的过程非常直接。下一步调用`SYS_XMLGEN`：\n\
    \n```sql\nselect\n  sys_xmlgen\n    (employee_map_type\n      (e.employee_id,\n\
    \       e.first_name,\n       e.last_name,\n       e.email,\n       e.phone_number,\n\
    \       e.hire_date,\n       e.job_id,\n       e.salary,\n       e.commission_pct,\n\
    \       e.manager_id,\n       e.department_id)\n    ) into xml_employee\nfrom\
    \ hr.employees e\nwhere e.employee_id = emp_id;\n```\n\n在这里，我们使用`EMPLOYEE_MAP_TYPE`将`SELECT`语句的结果动态转换为我们自定义的用户定义数据类型。此时，我们有了一个`SYS_XMLGEN`可以接受的参数。`SYS_XMLGEN`调用的结果然后通过`INTO`子句被定向到`XML_EMPLOYEE`变量。\n\
    \n此时，`XML_EMPLOYEE`变量保存着我们想要的 XML 格式数据。为了让普通用户看到 XML，我们需要一个技巧，该技巧依赖于 Oracle 中\
    \ XML 的底层存储模型。在底层，XML 可以以多种方式存储和管理。最常见的是作为`CLOB`，我们可以利用这一点来调用`CLOB`方法以检索 XML。过程的最后一行在我们的`XML_EMPOYEE`变量上调用`GETCLOBVAL`函数，并将结果传递给`DBMS_OUTPUT.PUT_LINE`以便在屏幕上打印（如果你在\
    \ SQL*Plus 中运行，别忘了执行`SET SERVEROUTPUT ON`）。\n\n## XMLTYPE 存储的多种形式\n\nOracle 为`XMLTYPE`数据提供了四种不同的存储机制。这些不同的方法源于\
    \ XML 的本质——通常是具有明确定义结构的大块文本。正是这种大尺寸与隐藏在其中的模式或结构之间的张力，导致了存储效率与索引、吞吐量与事务处理能力之间的权衡。\n\
    \n`XMLTYPE`数据类型的四种存储方法是：\n\n- **对象关系型：** XML 数据被分解为自动创建的对象关系行，非常适合基于元素的访问、更新和处理。对象关系存储每次作为单一对象访问时，都需要处理开销来重组完整的\
    \ XML 文档。\n- **CLOB：** 使用字符大对象方法存储 XML，可以轻松处理整个 XML 文档，保留格式、空格等。更新 XML 中的单个元素或在元素级别进行索引时，会引入额外的开销。\n\
    - **混合型：** 对象关系存储和`CLOB`存储之间的折中方案，混合型试图为以文档为中心的`CLOB`存储增加元素级别的性能增强。\n- **二进制 XML：**\
    \ Oracle 中最新的 XML 存储形式，这种方法以“后解析”格式存储 XML 文档，XML 结构的检查已经完成。底层存储使用压缩的二进制形式，增加了空间效率，同时提升了处理效率。\n\
    \n基于 Oracle 的旧应用程序和设计通常会在对象关系存储和`CLOB`存储之间做选择，具体取决于系统是以元素/处理为中心还是以文档/吞吐量为中心。任何基于\
    \ Oracle 的新开发都应倾向于新的`二进制 XML`存储机制——尽管对于强调极高吞吐量或重度元素级操作的极端情况，应该使用`CLOB`或对象关系存储选项进行基准测试。\n"
- fmt: '# CHAPTER 14 ■ WORKING WITH XML DATA


    ## 14-2\. Storing XML in Native Form


    ### Problem


    You need to store native XML data into a relational table in your database. The
    XML needs to be stored as an intact XML document as it received.


    ### Solution


    Oracle makes native storage of XML easy by supporting numerous different forms,
    from native XMLtyped tables to a wide range of functions. The trick is finding
    the approach that takes the least effort. For storing data where your XML doesn’t
    need to be altered, or where a portion of the XML can be extracted with XSLT,
    using direct `XMLTYPE` data casting is the easiest approach.


    In normal operation, you don’t necessarily care about displaying the XML, and
    so can substitute the `DBMS_OUTPUT` call with an assignment to an extra `OUT`
    parameter value declared with the procedure. The structure of our recipe would
    change to this general form.


    ```sql

    create or replace procedure employee_xml

    (emp_id IN number, xml_employee OUT xmltype)

    as

    -- no need to specify xml_employee as local variable

    [www.it-ebooks.info](http://www.it-ebooks.info/)


    -- our existing recipe’s procedure logic here

    -- no call to dbms_output.put_line

    end;

    /

    ```


    This variant of the recipe would require the calling application to understand
    a returned variable of type `XMLTYPE`.


    **Tip** Our recipe performs the dynamic conversion to XML using the `EMPLOYEE_MAP_TYPE`
    each time the procedure is called. You can increase the speed of this approach,
    and decrease the complexity of the procedure, by using a materialized column to
    keep the `EMPLOYEE` data ready in the form of the user-defined type for when it’s
    needed. This requires more overhead at `INSERT` and `UPDATE` time, but speeds
    up retrieval via this procedure.


    Our recipe uses `XMLTYPE` to store a new warehouse definition in the `OE.WAREHOUSES`
    table. This allows us to store the XML directly in Oracle, effectively making
    the inner structure of the XML opaque for the purposes of adding it to the database.
    Oracle’s many XML functions enable use and management of the elements, tags, and
    values within the XML without burdening us with added effort at insert time. The
    table structure is very simple, as shown here.


    ```sql

    Name                                      Null?    Type

    ----------------------------------------- -------- ------------------

    WAREHOUSE_ID                              NOT NULL NUMBER(3)

    WAREHOUSE_SPEC                                     SYS.XMLTYPE

    WAREHOUSE_NAME                                     VARCHAR2(35)

    LOCATION_ID                                        NUMBER(4)

    WH_GEO_LOCATION                                    MDSYS.SDO_GEOMETRY

    ```


    We can insert a new warehouse, based in London, with a 15,000-square-foot floor
    area and other details, using the following `INSERT` statement with `XMLTYPE`
    casting.


    ```sql

    insert into oe.warehouses

    (warehouse_id, warehouse_spec, warehouse_name, location_id)

    values

    (10,

    xmltype(''

    <?xml version="1.0"?>

    <Warehouse>

    <Building>Owned</Building>

    <Area>15000</Area>

    <Docks>1</Docks>

    <DockType>Side load</DockType>

    <WaterAccess>Y</WaterAccess>

    <RailAccess>Y</RailAccess>

    <Parking>Street</Parking>

    <VClearance>10 ft</VClearance>

    </Warehouse>''),

    ''London'',

    2300);

    ```


    Note that the call to `XMLTYPE` has been formatted for easy reading on the printed
    page. In use, casting to `XMLTYPE` will throw an `ORA-31011: XML parsing failed`
    error if you include carriage returns, new lines, and spaces between your elements.
    In the code samples included with *Oracle SQL Recipes*, you’ll see the `INSERT`
    statement formatted with the `XMLTYPE` call on one line.


    ```sql

    insert into oe.warehouses

    …

    xmltype(''<?xml version="1.0"?><Warehouse><Building>Owned</Building>…''),

    …

    ```


    ### How It Works


    Our recipe leverages Oracle’s ability to work with XML as just another datatype.
    We use the `XMLTYPE` call to cast the text provided into the `XMLTYPE` datatype.
    Under the hood, `XMLTYPE` supports `CLOB` semantics, because it’s stored internally
    as a `CLOB`. This means we can use the same approach to casting, passing the call
    to `XMLTYPE` a string up to 4GB in size. We decided to keep our example short
    to save trees!


    Just as casting to other datatypes enforces rules on precision, length, and so
    on, casting to `XMLTYPE`'
