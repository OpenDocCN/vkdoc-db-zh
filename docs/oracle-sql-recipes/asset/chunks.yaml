  trans: "\n# 第四章 创建与派生数据\n\n关于虚拟列存在一些限制，其中一部分显而易见，另一部分则不那么明显。如果你的虚拟列包含内置函数或用户自定义函数，那么被引用的函数必须声明为\
    \ `DETERMINISTIC`（确定性）；换句话说，对于同一组输入值（例如，行中的其他列），该函数必须返回相同的结果。因此，你不能在虚拟列中使用诸如 `SYSDATE`\
    \ 或 `SYSTIMESTAMP` 之类的函数，因为只要检索该行，它们几乎总是会返回不同的结果（除非是在同一秒内针对 `SYSDATE`，或同一百万分之一秒内针对\
    \ `SYSTIMESTAMP` 进行检索！）。如果你将一个非确定性的用户函数声明为 `DETERMINISTIC` 并在虚拟列中引用它，那就是自找麻烦；包含该虚拟列的查询结果很可能不正确，或者会根据查询执行的时间、执行者等因素而产生不同结果。\n\
    \n虚拟列的其他限制则不那么明显。一个虚拟列不能引用同一表中的另一个虚拟列（尽管你当然可以将一个虚拟列的定义包含在第二个虚拟列的定义中）。此外，虚拟列只能引用同一表内的列。总的来说，虚拟列在一定程度上减少了你可能需要在数据库视图中维护的元数据量，从而增强了数据库的易用性。\n\
    \n## 4-2. 返回不存在的行\n\n### 问题\n\n用于表主键的序列号存在间隔，你希望找出中间缺失的序列号。\n\n### 解决方案\n\n尽管主键通常是（并且最好是）对最终用户不可见的，但有时你可能希望重用序列号，前提是必须将序列号的位数保持在尽可能低的水平，以满足下游系统或流程的需求。例如，公司棒球队使用\
    \ `EMPLOYEE_ID`（员工 ID）列中的数字作为队服背后的号码。经理希望尽可能重复使用旧队服号码，因为队服背后的号码限制为三位数。\n\n要找出被跳过或当前未使用的员工编号，你可以使用一个包含两个嵌套子查询的查询，如下所示：\n\
    \n```sql\nwith all_used_emp_ids as\n(select level poss_emp_id from (select max(employee_id)\
    \ max_emp_num\nfrom employees)\nconnect by level <= max_emp_num)\nselect poss_emp_id\n\
    from all_used_emp_ids\nwhere poss_emp_id not in (select employee_id from employees)\n\
    order by poss_emp_id\n;\n```\n\n```\nPOSS_EMP_ID\n. . .\n101 rows selected\n```\n\
    \n该查询检索 `EMPLOYEES` 表中当前最高员工编号之下所有未使用的员工编号。\n\n### 工作原理\n\n该解决方案使用子查询因子化和两个显式子查询来找出缺失的员工编号列表。`WITH`\
    \ 子句中的查询创建了一个从 1 到 `EMPLOYEES` 表中最高员工编号值的连续数字序列（无间隔）。子查询的高亮部分负责检索最高编号：\n\n```sql\n\
    (select level poss_emp_id from (select max(employee_id) max_emp_num\nfrom employees)\n\
    connect by level <= max_emp_num)\n```\n\n`WITH` 子句中查询的其余部分生成了这个无间隔的数字序列。它利用了 Oracle\
    \ 层次查询特性（`CONNECT BY` 子句和 `LEVEL` 伪列）的一个微妙特性来生成序列中的每个数字。有关需要遍历层次数据的其他有用示例，请参见第\
    \ 13 章。\n\n以下是 `SELECT` 查询的主要部分：\n\n```sql\nselect poss_emp_id\nfrom all_used_emp_ids\n\
    where poss_emp_id not in (select employee_id from employees)\n```\n\n它从无间隔序列中检索所有可能的员工编号，这些编号尚未存在于\
    \ `EMPLOYEES` 表中。最终的结果集按 `POSS_EMP_ID` 排序，以便轻松地将最低的可用号码分配给下一个员工。如果你想始终排除一位数或两位数的编号，可以向\
    \ `WHERE` 子句中添加另一个谓词，如下所示：\n\n```sql\nwith all_used_emp_ids as\n(select level\
    \ poss_emp_id from (select max(employee_id) max_emp_num\nfrom employees)\nconnect\
    \ by level <= max_emp_num)\nselect poss_emp_id\nfrom all_used_emp_ids\nwhere poss_emp_id\
    \ not in (select employee_id from employees)\nand poss_emp_id > 99\norder by poss_emp_id\n\
    ;\n```\n\n```\nPOSS_EMP_ID\n2 rows selected\n```\n\n在修改后的查询结果中，在当前使用的最高员工编号之下，唯一可以重复使用的三位数编号是\
    \ 179 和 183。\n\n## 4-3. 将行转换为列\n\n### 问题\n\n你的事务数据存储在高度规范化的数据库结构中，你希望为业务分析师轻松创建交叉表风格的报告，在单一行中以多列形式返回总计值或其他聚合结果。\n\
    \n### 解决方案\n\n在 `SELECT` 语句中使用 `PIVOT` 关键字，将多个行中的值（来自一列或多列）聚合并展开到查询输出中的多列。例如，在\
    \ Oracle 订单录入示例模式 `OE` 中，你希望从所有订单中挑选五种关键产品，并找出哪些客户购买了这些产品，以及购买了多少。\n\n`ORDERS`\
    \ 表和 `ORDER_ITEMS` 表定义如下：\n\n```\ndescribe orders;\n\nName                   \
    \                   Null      Type\n-----------------------------------------\
    \ -------- --------------------------------\nORDER_ID                        \
    \          NOT NULL NUMBER(12)\nORDER_DATE                                NOT\
    \ NULL TIMESTAMP(6) WITH LOCAL TIME ZONE\nORDER_MODE                         \
    \                VARCHAR2(8)\nCUSTOMER_ID                              NOT NULL\
    \ NUMBER(6)\nORDER_STATUS                                      NUMBER(2)\nORDER_TOTAL\
    \                                       NUMBER(8,2)\nSALES_REP_ID            \
    \                          NUMBER(6)\nPROMOTION_ID                           \
    \           NUMBER(6)\n\n8 rows selected\n```\n\n```\ndescribe order_items;\n\n\
    Name                                      Null      Type\n-----------------------------------------\
    \ -------- --------------------------------\nORDER_ID                        \
    \          NOT NULL NUMBER(12)\nLINE_ITEM_ID                              NOT\
    \ NULL NUMBER(3)\nPRODUCT_ID                                NOT NULL NUMBER(6)\n\
    UNIT_PRICE                                         NUMBER(8,2)\nQUANTITY     \
    \                                      NUMBER(8)\nLINE_TOTAL_PRICE           \
    \                        VARCHAR2(14)\n\n6 rows selected\n```\n\n以下是按客户检索前五种产品数量总计的透视查询：\n\
    \n```sql\nwith order_item_query as\n(select customer_id, product_id, quantity\n\
    from orders join order_items using(order_id))\nselect * from order_item_query\n\
    pivot (\nsum(quantity) as sum_qty\nfor (product_id) in (3170 as P3170,\n     \
    \                3176 as P3176,\n                     3182 as P3182,\n       \
    \              3163 as P3163,\n                     3165 as P3165)\n)\norder by\
    \ customer_id\n;\n```\n\n```\nCUSTOMER_ID P3170_SUM_QTY P3176_SUM_QTY P3182_SUM_QTY\
    \ P3163_SUM_QTY P3165_SUM_QTY\n----------- ------------- ------------- -------------\
    \ ------------- -------------\n        101           208\n        104        \
    \    70            72            77            61            64\n        106 \
    \           62            55\n        107            76\n        108         \
    \   45            31\n        109           115           112\n        116   \
    \         48            24             5            10\n        117          \
    \  63            67\n        118            42\n        119            36    \
    \        30\n. . .\n        170            92\n\n47 rows selected\n```\n\n从这个查询的结果中，你可以很容易地看出客户编号\
    \ 104 是 `PIVOT` 子句中指定的所有产品的最大买家。\n\n### 工作原理\n\n`PIVOT` 运算符，顾名思义，将行旋转为列。在解决方案中，你会注意到一些熟悉的结构，以及一些不那么熟悉的。首先，解决方案使用了\
    \ `WITH` 子句（子查询因子化）将基础查询与查询的其余部分更清晰地分离开；以下是解决方案中使用的 `WITH` 子句：\n\n```sql\nwith\
    \ order_item_query as\n(select customer_id, product_id, quantity\nfrom orders\
    \ join order_items using(order_id))\n```\n\n使用 `WITH` 子句还是内联视图是风格问题。无论哪种情况，请确保只包含你将用于分组、聚合的列，或者在\
    \ `PIVOT` 子句中使用的列。\n"
- fmt: "## CHAPTER 4 ■ CREATING AND DERIVING DATA\n\n### 4-4. Pivoting on Multiple\
