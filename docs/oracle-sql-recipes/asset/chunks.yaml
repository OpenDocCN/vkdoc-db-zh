  trans: '`AGGREGATE USING T_LIST_OF_STRINGS` 子句是所有魔法发生的地方。这一行指令表明该函数本质上是聚合函数，并且应使用输入参数实例化一个
    `T_LIST_OF_STRINGS` 类型的对象，从而启动实际的聚合工作。


    ■ 注意 Oracle 仅支持创建恰好接受一个输入参数并恰好返回一个输出参数的自定义聚合函数。这就是为什么在我们的示例中，你没有看到任何显式指令将 `INPUT_STRING`
    参数传递给实例化的 `T_LIST_OF_STRINGS` 类型，也没有看到将 `T_LIST_OF_STRINGS.ODCIAGGREGATETERMINATE`
    成员函数的返回值映射回 `STRING_TO_LIST` 函数返回值的指令。当 Oracle 看到聚合子句时，这些是它唯一能做的事情，因此当你使用聚合功能时，它们都是隐式完成的。


    此后，新的 `STRING_TO_LIST` 函数的调用和使用方式就与其他聚合函数（如 `AVG`、`MAX`、`MIN` 等）非常相似。


    ## 2-11. 访问后续或先前行中的值


    ### 问题


    你想查询数据以产生有序的结果，但你希望在结果集中包含基于前后行的计算。例如，你想根据在时间上较早和较晚发生的事件，对事件式数据进行计算。


    ### 解决方案


    Oracle 支持 `LAG` 和 `LEAD` 分析函数，利用前置/后置逻辑来访问表或表达式中的多行数据——并且你不需要诉诸于将源数据与自身进行连接 42


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 2 章 ■ 数据汇总与聚合


    我们的示例假设你正试图解决一个业务问题：可视化员工随时间变化的雇佣趋势。`LAG` 函数可用于查看哪位员工的雇佣紧随另一位之后，也可用于计算雇佣之间的时间间隔。


    ```

    select first_name, last_name, hire_date,

    lag(hire_date, 1, ''01-JUN-1987'') over (order by hire_date) as Prev_Hire_Date,

    hire_date - lag(hire_date, 1, ''01-JUN-1987'') over (order by hire_date) as Days_Between_Hires

    from hr.employees

    order by hire_date;

    ```


    我们的查询返回了 107 行数据，按员工被雇佣的顺序（虽然不一定保留用于显示或其他目的的隐式排序）连接员工，并显示了每位员工加入组织之间的时间差。


    FIRST_NAME LAST_NAME HIRE_DATE PREV_HIRE DAYS_BETWEEN

    ----------- ---------- --------- --------- ------------

    Steven King 17-JUN-87 01-JUN-87 16

    Jennifer Whalen 17-SEP-87 17-JUN-87 92

    Neena Kochhar 21-SEP-89 17-SEP-87 735

    Alexander Hunold 03-JAN-90 21-SEP-89 104

    Bruce Ernst 21-MAY-91 03-JAN-90 503

    ...

    David Lee 23-FEB-00 06-FEB-00 17

    Steven Markle 08-MAR-00 23-FEB-00 14

    Sundar Ande 24-MAR-00 08-MAR-00 16

    Amit Banda 21-APR-00 24-MAR-00 28

    Sundita Kumar 21-APR-00 21-APR-00 0


    已选择 107 行。


    你可以自己计算天数差，以确认 `LAG` 函数和差值算术运算确实如所述那样工作。例如，1990 年 1 月 3 日和 1991 年 5 月 21 日之间确实有
    503 天。


    ### 工作原理


    `LAG` 和 `LEAD` 函数与大多数其他分析和窗口函数类似，它们在查询的非分析基础部分完成后才开始操作。Oracle 对中间结果集执行第二次遍历以应用任何分析谓词。实际上，非分析组件会首先被评估，就像已经运行了这个查询一样：


    ```

    select first_name, last_name, hire_date

    -- 用于 Prev_Hire_Date 的占位符,

    -- 用于 Days_Between_Hires 的占位符

    from hr.employees;

    ```


    此时的结果（如果你能看到的话）将如下所示： 43


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    第 2 章 ■ 数据汇总与聚合'
- fmt: "## CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA\n\nNeena Kochhar 21-SEP-89\
    \ ( To Be Determined )\n\nAlexander Hunold 03-JAN-90 ( To Be Determined )\n\n\
    Bruce Ernst 21-MAY-91 ( To Be Determined )\n\n...\n\nThe analytic function(s)\
    \ are then processed, providing the results you’ve seen. Our recipe uses the `LAG`\
    \ function to compare the current row of results with a preceding row. The general\
    \ format is the best way to understand `LAG`, and has the following form.\n\n\
    `lag (column or expression, preceding row offset, default for first row)`\n\n\
    The `column or expression` is mostly self-explanatory, as this is the table data\
    \ or computed result over which you want `LAG` to operate. The `preceding row\
    \ offset` portion indicates the relative row prior to the current row the `LAG`\
    \ should act against. In our case, the value ‘1’ means the row that is one row\
    \ before the current row. The default for `LAG` indicates what value to use as\
    \ a precedent for the first row, as there is no row `zero` in a table or result.\
    \ We’ve chosen the arbitrary date of 01-JUN-1987 as a notional date on which the\
    \ organization was founded. You could use any date, date calculation, or date-returning\
    \ function here.\n\nOracle will supply a `NULL` value if you don’t specify the\
    \ first row’s precedent value.\n\nThe `OVER` analytic clause then dictates the\
    \ order of data against which to apply the analytic function, and any partitioning\
    \ of the data into windows or subsets (not shown in this recipe). Astute readers\
    \ will realize that this means our recipe could have included a general `ORDER\
    \ BY` clause that sorted the data for presentation in a different order from the\
    \ `HIRE_DATE` ordering used for the `LAG` function. This gives you the most flexibility\
    \ to handle general ordering and analytic lag and lead in different ways for the\
    \ same statement. We’ll show an example of this later in this chapter. And remember,\
    \ you should never rely on the implicit sorting that analytic functions use. This\
    \ can and will change in the future, so you are best advised to always include\
    \ `ORDER BY` for sorting wherever explicitly required.\n\n### LEAD Function\n\n\
    The `LEAD` function works in a nearly identical fashion to `LAG`, but instead\
    \ tracks following rows rather than preceding ones. We could rewrite our recipe\
    \ to show hires along with the `HIRE_DATE` of the next employee, and a similar\
    \ elapsed-time window between their employment dates, as in this `SELECT` statement.\n\
    \n```\nselect first_name, last_name, hire_date,\n       lead(hire_date, 1, sysdate)\
    \ over (order by hire_date) as Next_Hire_Date,\n       lead(hire_date, 1, sysdate)\
    \ over (order by hire_date) - hire_date\n           as Days_Between_Hires\n  from\
    \ hr.employees;\n```\n\nThe pattern of dates is very intuitive now that you’ve\
    \ seen the `LAG` example. With `LEAD`, the key difference is the effect of the\
    \ default value in the third parameter.\n\nFIRST_NAME LAST_NAME HIRE_DATE NEXT_HIRE\
    \ DAYS_BETWEEN\n----------- ---------- --------- --------- ------------\nSteven\
    \ King 17-JUN-87 17-SEP-87 92\nJennifer Whalen 17-SEP-87 21-SEP-89 735\nNeena\
    \ Kochhar 21-SEP-89 03-JAN-90 104\nAlexander Hunold 03-JAN-90 21-MAY-91 503\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\nBruce Ernst 21-MAY-91 13-JAN-93\
    \ 603\n...\nDavid Lee 23-FEB-00 08-MAR-00 14\nSteven Markle 08-MAR-00 24-MAR-00\
    \ 16\nSundar Ande 24-MAR-00 21-APR-00 28\nAmit Banda 21-APR-00 21-APR-00 0\nSundita\
    \ Kumar 21-APR-00 21-APR-09 3287.98\n\n107 rows selected.\n\nIn contrast to `LAG`,\
    \ where the default provides a notional starting point for the first row’s comparison,\
    \ `LEAD` uses the default value to provide a hypothetical end point for the last\
    \ row in the forward-looking chain. In this recipe, we are comparing how many\
    \ days have elapsed between employees being hired. It makes sense for us to compare\
    \ the last employee hired (in this case, Sundita Kumar) with the current date\
    \ using the `SYSDATE` function. This is a quick and easy finishing flourish to\
    \ calculate the days that have elapsed since hiring the last employee.\n\n###\
    \ 2-12. Assigning Ranking Values to Rows in a Query Result\n\nProblem"
