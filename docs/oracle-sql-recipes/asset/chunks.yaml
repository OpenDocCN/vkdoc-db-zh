  trans: "\n## 第 3 章 ■ 从多表查询\n\n使用带有聚合函数的子查询，并将员工工资与聚合结果中检索到的平均工资进行比较。例如，此查询使用子查询计算部门\
    \ 90 以外员工的平均工资，并将每位员工的工资与该子查询结果的 80%进行比较：\n\n```sql\nselect employee_id, last_name,\
    \ first_name, salary\nfrom employees\nwhere salary < 0.8 * (\n    select avg(salary)\n\
    \    from employees\n    where department_id != 90\n);\n```\n\nEMPLOYEE_ID LAST_NAME\
    \ FIRST_NAME SALARY\n----------------- ------------------- --------------------\
    \ ----------------\n105 Austin David 4800\n106 Pataballa Valli 4800\n107 Lorentz\
    \ Diana 4200\n115 Khoo Alexander 3100\n. . .\n198 OConnell Donald 2600\n199 Grant\
    \ Douglas 2600\n200 Whalen Jennifer 4400\n49 rows selected\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 工作原理\n\n上述解决方案在子查询中返回一行。Oracle 优化器计算一次平均工资，乘以`0.8`，然后将其与`EMPLOYEE`表中除部门`90`（高管组）以外的所有其他员工的工资进行比较。\n\
    \n如果你的子查询返回多行，主查询将返回错误，因为你使用的是`<`运算符；像`<`、`>`、`=`、`>=`、`<=`和`!=`这样的运算符会将列或表达式的值与另一个单一值进行比较。要将主查询中的值与子查询中的一个或多个值列表进行比较，可以在`WHERE`子句中使用`ANY`或`SOM`E\
    \ 运算符（它们是等价的）。例如，如果你想返回工资与高管部门中任何员工匹配的所有员工，可以这样做：\n\n```sql\nselect employee_id,\
    \ last_name, first_name, salary\nfrom employees\nwhere salary = any (\n    select\
    \ salary\n    from employees\n    where department_id = 90\n);\n```\n\n你也可以在使用聚合函数的查询的`HAVING`子句中使用子查询。在这个例子中，你可以检索所有平均工资高于\
    \ IT 部门平均工资的部门及其平均工资：\n\n```sql\nselect department_id, avg(salary) avg_salary\n\
    from employees\ngroup by department_id\nhaving avg(salary) > (\n    select avg(salary)\n\
    \    from employees\n    where department_id = 60\n);\n```\n\n# 3-8. 查找缺失行\n\n\
    ## 问题\n\n你有两个表，必须找出第一个表中存在但第二个表中不存在的行。你想比较每个表中的所有行，而不仅仅是列的子集。\n\n## 解决方案\n\n使用`MINUS`集合运算符。`MINUS`运算符将返回存在于第一个查询但不存在于第二个查询中的所有行。`EMPLOYEES_BONUS`表包含过去获得过奖金的员工，你需要找出`EMPLOYEES`表中尚未获得奖金的员工。使用`MINUS`运算符如下，比较两个表中的三个选定列：\n\
    \n```sql\nselect employee_id, last_name, first_name\nfrom employees\nminus\nselect\
    \ employee_id, last_name, first_name\nfrom employees_bonus;\n```\n\nEMPLOYEE_ID\
    \ LAST_NAME FIRST_NAME\n---------------------- ------------------------- --------------------\n\
    100 King Steven\n109 Faviet Daniel\n110 Chen John\n120 Weiss Matthew\n140 Patel\
    \ Joshua\n5 rows selected\n\n## 工作原理\n\n请注意，与`INTERSECT`和`UNION`运算符不同，`MINUS`集合运算符是不可交换的：操作数（查询）的顺序很重要！改变解决方案中查询的顺序会产生截然不同的结果。\n\
    \n如果你想记录整个行的变化，可以改用此查询：\n\n```sql\nselect * from employees\nminus\nselect * from\
    \ employees_bonus;\n```\n\n维恩图可能有助于展示`MINUS`运算符的工作方式。图 3-2 显示了 Query1 MINUS Query2\
    \ 的结果。Query1 和 Query2 之间重叠的任何行，以及 Query2 中不与 Query1 重叠的任何行，都会从结果集中移除。换句话说，只返回\
    \ Query1 中的行，但会剔除 Query1 中存在于 Query2 中的行。\n\n***图 3-2.** Oracle MINUS 操作*\n\n\
    ![Image 16](img/index-101_1.png)\n\nQuery2 中存在但 Query1 中不存在的行，可以通过反转查询中操作数的顺序来识别：\n\
    \n```sql\nselect * from employees_bonus\nminus\nselect * from employees;\n```\n\
    \n如果 Query2 是 Query1 的真子集会怎样？换句话说，Query2 中的所有行都已经存在于 Query1 中？查询仍然按预期工作；`MINUS`只会移除\
    \ Query1 中与 Query2 共有的行，并且永远不会返回任何不在 Query1 中的 Query2 行。图 3-3 展示了 Query2 是 Query1\
    \ 的真子集时的维恩图。\n\n***图 3-3.** 包含真子集的 Oracle MINUS 操作*\n\n你可能会问，为什么外连接或`IN`/`EXISTS`查询可能解决大多数类似问题。对于具有单一主键的表集合，使用连接可能效率更高。然而，对于返回大量列的查询结果，或者即使主键匹配也要比较整行数据时，`MINUS`是更合适的运算符。\n\
    \n# 3-9. 查找两个表共有的行中不存在的行\n\n## 问题\n\n你想找出来自两个查询或表的行，而这些行是这两个查询或表所**不**共有的。\n\n\
    分析人员已经为你提供了用于检索所需数据的维恩图和集合表示法，因此你必须使用 Oracle 集合运算符的组合来检索期望的结果。\n\n## 解决方案\n\n\
    在复合查询中结合使用聚合函数和`UNION ALL`运算符，并用括号括起来以确保清晰和正确。例如，你想找出在`EMPLOYEES_ACT`表中但不在`EMPLOYEES_NEW`表中的员工列表，反之亦然。执行以下查询以显示每个表的内容，并使用\
    \ Oracle 集合运算符查找每个表中的唯一行：\n\n```sql\nselect employee_id, first_name, last_name\n\
    from employees_act\norder by employee_id;\n```\n\nEMPLOYEE_ID FIRST_NAME LAST_NAME\n\
    ---------------------- -------------------- -------------------------\n102 Lex\
    \ De Haan\n105 David Austin\n112 Jose Manuel Urman\n118 Guy Himuro\n119 Karen\
    \ Colmenares\n205 Shelley Higgins\n6 rows selected\n\n```sql\nselect employee_id,\
    \ first_name, last_name\nfrom employees_new\norder by employee_id;\n```\n\nEMPLOYEE_ID\
    \ FIRST_NAME LAST_NAME\n---------------------- -------------------- -------------------------\n\
    101 Neena Kochhar\n105 David Austin\n112 Jose Manuel Urman\n171 William Smith\n\
    201 Michael Hartstein\n5 rows selected\n\n```sql\nselect employee_id, first_name,\
    \ last_name,\n       count(act_emp_src) act_emp_row_count,\n       count(new_emp_src)\
    \ new_emp_row_count\nfrom\n(\n    select ea.*, 1 act_emp_src, to_number(NULL)\
    \ new_emp_src\n    from employees_act ea\n    union all\n    select en.*, to_number(NULL)\
    \ act_emp_src, 1 new_emp_src\n    from employees_new en\n)\ngroup by employee_id,\
    \ first_name, last_name\nhaving count(act_emp_src) != count(new_emp_src);\n```\n\
    \n![Image 17](img/index-103_1.png)\n\nEMPLOYEE_ID FIRST_NAME LAST_NAME ACT_EMP_ROW_COUNT\
    \ NEW_EMP_ROW_COUNT\n----------- ----------- --------------- -----------------\
    \ -----------------\n101 Neena Kochhar 0 1\n205 Shelley Higgins 1 0\n102 Lex De\
    \ Haan 1 0\n171 William Smith 0 1\n201 Michael Hartstein 0 1\n118 Guy Himuro 1\
    \ 0\n119 Karen Colmenares 1 0\n7 rows selected\n\n## 工作原理\n\n要获得正确的结果，你必须首先在子查询中使用`UNION\
    \ ALL`组合两个结果集，并分配一个“标签”列来指示行来自哪个表——第一个表或第二个表。这里我们使用“1”，但使用“2”或“X”也可以。\n"
- fmt: "# CHAPTER 3 ■ QUERYING FROM MULTIPLE TABLES\n\nThe `GROUP BY` and `HAVING`\
    \ clauses pick out the common rows. If a given row exists in both tables once,\
    \ or several times, the count for that row will be the same, and thus will be\
    \ excluded by the condition in the `HAVING` clause. If the counts are not the\
    \ same, the row will show up in the result along with how many times it appears\
    \ in one table but not the other, and vice versa. Because we are including primary\
    \ keys in this query, you will not see more than one non-common row in each table.\n\
    \nFigure 3-4 shows the Venn diagram for the result set.\n\n**Figure 3-4.** An\
    \ Oracle set operation to find unique rows between component queries\n\nUsing\
    \ standard set notation, the result you are looking for can be more succinctly\
    \ expressed as follows:\n\n`NOT (Query1 INTERSECT Query2)`\n\nAlthough Oracle\
    \ syntax does have `NOT` and `INTERSECT`, `NOT` is not supported for use with\
    \ Oracle set operators. Thus, you must write the query as shown in the solution\
    \ with `UNION ALL` and `GROUP BY` to provide the result identified in Figure 3-4.\
    \ Even if Oracle supported `NOT` with set operators, you would still have to use\
    \ the solution provided to identify how many of each non-common row exists in\
    \ each component query.\n\n## 3-10. Generating Test Data\n\n### Problem\n\nYou\
    \ want to combine two or more tables without common columns to generate test data\
    \ or a template for all possible combinations of values from two or more tables.\n\
    \nFor example, you are writing an embedded Oracle database application to help\
    \ you count cards at the next blackjack game, and you want to generate the template\
    \ table for the 52-card deck with a minimum of effort.\n\n### Solution\n\nUse\
    \ a `CROSS JOIN` construct between the set of four suits (hearts, clubs, diamonds,\
    \ and spades) and the 13 rank values (Ace, 2-10, Jack, Queen, and King). For example:\n\
    \n```sql\ncreate table card_deck\n(suit_rank varchar2(5),\n card_count number)\n\
    ;\n\ninsert into card_deck\nselect rank || '-' || suit, 0 from\n(select 'A' rank\
    \ from dual\n union all\n select '2' from dual\n union all\n select '3' from dual\n\
    \ union all\n select '4' from dual\n union all\n select '5' from dual\n union\
    \ all\n select '6' from dual\n union all\n select '7' from dual\n union all\n\
    \ select '8' from dual\n union all\n select '9' from dual\n union all\n select\
    \ '10' from dual\n union all\n select 'J' from dual\n union all\n select 'Q' from\
    \ dual\n union all\n select 'K' from dual)\ncross join\n(select 'S' suit from\
    \ dual\n union all\n select 'H' from dual\n union all\n select 'D' from dual\n\
    \ union all\n select 'C' from dual)\n;\n\nselect suit_rank from card_deck;\n\n\
    SUIT_RANK\n---------\nA-S\n2-S\n3-S\n4-S\n5-S\n6-S\n. . .\n10-C\nJ-C\nQ-C\nK-C\n\
    \n52 rows selected\n```\n\n### The `DUAL` Table\n\nThe `DUAL` table comes in handy\
    \ in many situations. It is available in every version of Oracle from the last\
    \ 20 years, and contains one row and one column. It is handy when you want to\
    \ return a row when you don’t have to retrieve data from any particular table—you\
    \ just want to return a value. You would also use the `DUAL` table to perform\
    \ an ad-hoc calculation using a built-in function, as in this example:\n\n```sql\n\
    select sqrt(144) from dual;\n\nSQRT(144)\n---------\n        12\n```\n\nThis SQL\
    \ statement would work just as well if you already had the suits and ranks in\
    \ two existing tables. In that case, you would reference the two tables rather\
    \ than write those long subqueries involving `UNION` operations against the `DUAL`\
    \ table. For example:\n\n```sql\nselect rank || '-' || suit, 0 from\n  card_ranks\n\
    cross join\n  card_suits\n;\n```\n\n### How It Works\n\nUsing a `CROSS JOIN`,\
    \ otherwise known as a Cartesian product, is rarely intentional. If you specify\
    \ no join conditions between two tables, the number of rows in the results is\
    \ the product of the number of rows in each table. Usually this is not the desired\
    \ result! As a general rule, for a query with *n* tables, you need to specify\
    \ at least *n-1* join conditions to avoid a Cartesian product."
