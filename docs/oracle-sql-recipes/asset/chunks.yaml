    CHAPTER 5 ■ COMMON QUERY PATTERNS


    5-5\. Conditional Branching In One SQL Statement


    Problem


    In order to produce a concise result in one query, you need to change the column
    returned on a row-by-row basis, conditional on a value from another row. You want
    to avoid awkward mixes of unions, subqueries, aggregation, and other inelegant
    techniques.


    Solution


    For circumstances where you need to conditionally branch or alternate between
    source data, Oracle provides the CASE statement. CASE mimics the traditional switch
    or case statement found in many programming languages like C or Java.


    To bring focus to our example, we’ll assume our problem is far more tangible and
    straightforward.


    We want to find the date employees in the shipping department (with the DEPARTMENT_ID
    of 50) started their current job. We know their initial hire date with the firm
    is tracked in the HIRE_DATE column on the HR.EMPLOYEES table, but if they’ve had
    a promotion or changed roles, the date when they commenced their new position
    can be inferred from the END_DATE of their previous position in the HR.JOB_HISTORY


    table. We need to branch between HIRE_DATE or END_DATE for each employee of the
    shipping department accordingly, as shown in the next SQL statement.


    select e.employee_id,


    case


    when old.job_id is null then e.hire_date


    else old.end_date end


    job_start_date


    from hr.employees e left outer join hr.job_history old


    on e.employee_id = old.employee_id


    where e.department_id = 50


    order by e.employee_id;


    Our results are very straightforward, hiding the complexity that went into picking
    the correct JOB_START_DATE.


    EMPLOYEE_ID JOB_START


    ----------- ---------


    120 18-JUL-96


    121 10-APR-97


    122 31-DEC-99


    123 10-OCT-97


    124 16-NOV-99


    …


    How It Works


    Our recipe uses the CASE feature, in Search form rather than Simple form, to switch
    between HIRE_DATE


    and END_DATE values from the joined tables. In some respects, it’s easiest to
    think of this CASE operation 119


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ COMMON QUERY PATTERNS


    as a combination of two SELECT statements in one. For employees with no promotions,
    it’s as if we were selecting as follows:


    select e.employee_id, e.hire_date…


    Whereas for employees that have had promotions, the CASE statement switches the
    SELECT to the following form:


    select e.employee_id, old.end_date…'
  trans: "\n至此，你可能正在自问，在 `ROWNUM` 和 `ROW_NUMBER` 这两种方法中，应该选用哪一个。这个问题没有明确的答案。相反，最好记住这两种方案的一些特点。`ROWNUM`\
    \ 方法拥有历史支持，并且在 Oracle 中内置了优化，使得由排序引发的操作比常规排序更快。`ROW_NUMBER` 方法则更为通用，它允许你以与标准 `ORDER\
    \ BY` 子句产生的顺序不同的方式对行进行编号。你还可以修改方案，使用 `RANK` 和 `DENSE_RANK` 等其他 OLAP 函数来处理不同的分页需求，例如需要显示在“并列”位置的项目。\n\
    \n## 在数据库之外进行分页\n\n我们的方案是在数据通常最适合处理的地方——数据库中——驱动数据分页！你可能使用过或体验过其他技术，例如基于游标的分页，甚至在应用层进行结果缓存，通过丢弃或隐藏数据来提供分页功能。\n\
    \n我们的建议是，在几乎所有情况下都应避免使用那些技术。应用缓存技术不可避免地需要产生过量的网络流量，并伴随相关的性能延迟和成本，而这并不会让用户欣赏。基于游标的方法确实在数据库层面工作以最小化网络问题，但使用游标技术总是容易受到“过时”分页的影响。不要有任何疑虑：让数据库为你进行分页——并收获其好处！\n\
    \n## 5-4. 测试数据的存在性\n\n### 问题\n\n你想要比较两个相关表中的数据，以显示哪些地方存在匹配数据，同时也要显示哪些地方不存在匹配数据。\n\
    \n### 解决方案\n\nOracle 支持 `EXISTS` 和 `NOT EXISTS` 谓词，允许你将一个表或表达式中的数据与另一个表或表达式中的匹配或缺失数据关联起来。我们将使用一个假设情景：需要找出哪些部门当前有经理。为了最好地说明\
    \ `EXISTS` 解决方案，下一条 SQL 语句查找所有已知存在经理的部门。\n\n```sql\nselect department_name\nfrom\
    \ hr.departments d\nwhere exists\n  (select e.employee_id\n   from hr.employees\
    \ e\n   where d.manager_id = e.employee_id);\n```\n\n其补集，即测试不存在性的语句，在下一条语句中展示。我们要查找\
    \ `HR.DEPARTMENTS` 中所有其经理不存在于 `HR.EMPLOYEE` 表所保存数据中的部门。\n\n```sql\nselect department_name\n\
    from hr.departments d\nwhere not exists\n  (select e.employee_id\n   from hr.employees\
    \ e\n   where d.manager_id = e.employee_id);\n```\n\n### 工作原理\n\n在任何数据库（包括 Oracle）中，`EXISTS`\
    \ 谓词回答了这个问题：“两个数据项之间是否存在关系，进而，一个集合中的哪些项目与第二个集合中的项目相关？”\n\n`NOT EXISTS` 变体则测试其反面：“基于一个给定的标准，是否可以明确地说两个数据集之间不存在关系？”\
    \ 每种方法都被称为关联或关联子查询（字面意思是 co-relation，共享关系）。\n\n有趣的是，Oracle 判断是否存在满足条件的数据完全基于这个前提：是否找到了满足子查询谓词的匹配行？这几乎太微妙了，所以我们要指出\
    \ Oracle 显然不会去寻找的东西。你在内部关联查询中选择什么并不重要——只有标准才重要。因此，你经常会看到存在性测试的不同版本，它们通过选择值 `1`、使用星号\
    \ (`*`) 选择整行、字面值、甚至 `NULL` 来形成子查询。最终，在这种方案形式中，这都无关紧要。关键点是关联表达式。在我们的例子中，就是 `WHERE\
    \ D.MANAGER_ID = E.EMPLOYEE_ID`。\n\n这也有助于解释 Oracle 在方案的后半部分做了什么，在那里我们寻找 `DEPARTMENT_NAME`\
    \ 值，其行对应的 `MANAGER_ID` 不存在于 `HR.EMPLOYEES` 表中。Oracle 通过评估外部查询的每一行，内部关联查询是否返回任何行来驱动查询。Oracle\
    \ 不关心关联标准之外的其他列中存在什么数据。单独使用此类 `NOT EXISTS` 子句时需要格外小心——不是因为逻辑不起作用，而是因为对于大型数据集，优化器可能会决定重复完整地扫描内部数据，这可能会影响性能。在我们的示例中，只要为一个部门列出的经理\
    \ ID 在 `HR.EMPLOYEES` 表中找不到，`NOT EXISTS` 谓词就会得到满足，该部门就会被包含在结果中。\n\n■ **注意** 关联子查询满足了一个重要的问题解决需求，但在使用\
    \ `EXISTS` 或 `NOT EXISTS` 时，记住 `NULL` 值的性质至关重要。`NULL` 值不等同于任何其他值，包括其他 `NULL` 值。这意味着关联查询外部部分的\
    \ `NULL` 永远不会满足内部表、视图或表达式的关联标准。在实践中，这意味着你会看到与你预期可能完全相反的效果，因为即使内部和外部数据源的关联列都有 `NULL`\
    \ 值，`EXISTS` 测试也将始终返回 false，而 `NOT EXISTS` 将始终返回 true。这不是普通人会预期的结果。\n\n## 5-5.\
    \ 在一条 SQL 语句中进行条件分支\n\n### 问题\n\n为了在一条查询中产生简洁的结果，你需要根据另一行中的值有条件地、逐行更改返回的列。你希望避免笨拙地混合使用联合、子查询、聚合和其他不优雅的技术。\n\
    \n### 解决方案\n\n对于需要有条件地分支或在源数据之间交替的情况，Oracle 提供了 `CASE` 语句。`CASE` 模仿了许多编程语言（如 C\
    \ 或 Java）中的传统 switch 或 case 语句。\n\n为了聚焦于我们的示例，我们假设问题更加具体和直接。\n\n我们想要找出运输部门（`DEPARTMENT_ID`\
    \ 为 50）的员工开始当前工作的日期。我们知道他们最初入职公司的日期记录在 `HR.EMPLOYEES` 表的 `HIRE_DATE` 列中，但如果他们曾获得晋升或改变角色，则他们开始新职位的日期可以从\
    \ `HR.JOB_HISTORY` 表中他们前一职位的 `END_DATE` 推断出来。我们需要根据情况，为运输部门的每个员工在 `HIRE_DATE`\
    \ 或 `END_DATE` 之间进行分支，如下一条 SQL 语句所示。\n\n```sql\nselect e.employee_id,\n      \
    \ case\n         when old.job_id is null then e.hire_date\n         else old.end_date\
    \ end\n       job_start_date\nfrom hr.employees e left outer join hr.job_history\
    \ old\n  on e.employee_id = old.employee_id\nwhere e.department_id = 50\norder\
    \ by e.employee_id;\n```\n\n我们的结果非常直接，掩盖了为选择正确的 `JOB_START_DATE` 而进行的复杂操作。\n\n\
    ```\nEMPLOYEE_ID JOB_START\n----------- ---------\n        120 18-JUL-96\n   \
    \     121 10-APR-97\n        122 31-DEC-99\n        123 10-OCT-97\n        124\
    \ 16-NOV-99\n…\n```\n\n### 工作原理\n\n我们的方案使用了 `CASE` 功能（是搜索形式而非简单形式），以在连接表的 `HIRE_DATE`\
    \ 和 `END_DATE` 值之间进行切换。在某些方面，最容易将这个 `CASE` 操作视为一个结合了两个 `SELECT` 语句的操作。对于没有晋升的员工，就好像我们是这样选择的：\n\
    \n```sql\nselect e.employee_id, e.hire_date…\n```\n\n而对于有过晋升的员工，`CASE` 语句将 `SELECT`\
    \ 切换为以下形式：\n\n```sql\nselect e.employee_id, old.end_date…\n```\n"
- fmt: "# The Beauty of CASE and Conditional Logic\n\nThe beauty is in not having\
    \ to explicitly code these statements yourself, and for far more complex uses\
    \ of `CASE`, not having to code many dozens or hundreds of statement combinations.\n\
    \nTo explore the solution from the data’s perspective, the following `SQL` statement\
    \ extracts the employee identifier and the hire and end dates using the same left\
    \ outer join as our recipe.\n\n```sql\nselect e.employee_id, e.hire_date, old.end_date\
    \ end\nfrom hr.employees e left outer join hr.job_history old\non e.employee_id\
    \ = old.employee_id\nwhere e.department_id = 50\norder by e.employee_id;\n```\n\
    \n```\nEMPLOYEE_ID HIRE_DATE   END_DATE\n----------- ---------   ---------\n120\
    \         18-JUL-96\n121         10-APR-97\n122         01-MAY-95   31-DEC-99\n\
    123         10-OCT-97\n124         16-NOV-99\n...\n```\n\nThe results show the\
    \ data that drove the `CASE` function’s decision in our recipe. The values in\
    \ bold were the results returned by our recipe. For the first, second, fourth,\
    \ and fifth rows shown, `END_DATE` from the `HR.JOB_HISTORY` table is `NULL`,\
    \ so the `CASE` operation returned the `HIRE_DATE`. For the third row, with `EMPLOYEE_ID`\
    \ 122, `END_DATE` has a date value, and thus was returned in preference to `HIRE_DATE`\
    \ when examined by our original recipe. There is a shorthand form of the `CASE`\
    \ statement known as the Simple `CASE` that only operates against one column or\
    \ expression and has `THEN` clauses for possible values. This wouldn’t have suited\
    \ us as Oracle limits the use of `NULL` with the Simple `CASE` in awkward ways.\n\
    \n## 5-6. Conditional Sorting and Sorting By Function\n\n### Problem\n\nWhile\
    \ querying some data, you need to sort by an optional value, and where that value\
    \ is not present, you’d like to change the sorting condition to another column.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### Solution\n\nOracle supports\
    \ the use of almost all of its expressions and functions in the `ORDER BY` clause.\
    \ This includes the ability to use the `CASE` statement and simple and complex\
    \ functions like arithmetic operators to dynamically control ordering. For our\
    \ recipe, we’ll tackle a situation where we want to show employees ordered by\
    \ highest-paid to lowest-paid.\n\nFor those with a commission, we want to assume\
    \ the commission is earned but don’t want to actually calculate and show this\
    \ value; we simply want to order on the implied result. The following `SQL` leverages\
    \ the `CASE` statement in the `ORDER BY` clause to conditionally branch sorting\
    \ logic for those with and without a `COMMISSION_PCT` value.\n\n```sql\nselect\
    \ employee_id, last_name, salary, commission_pct\nfrom hr.employees\norder by\n\
    case\n  when commission_pct is null then salary\n  else salary * (1+commission_pct)\n\
    end desc;\n```\n\nWe can see from just the first few rows of results how the conditional\
    \ branching while sorting has worked.\n\n```\nEMPLOYEE_ID LAST_NAME   SALARY COMMISSION_PCT\n\
    ----------- ---------   ------ --------------\n100         King        24000\n\
    145         Russell     14000  .4\n146         Partners    13500  .3\n101    \
    \     Kochhar     17000\n102         De Haan     7000\n...\n```\n\nEven though\
    \ employees 101 and 102 have a higher base salary, the `ORDER BY` clause using\
    \ `CASE` has correctly positioned employees 145 and 146 based on their included\
    \ commission percentage.\n\n### How It Works\n\nThe selection of data for our\
    \ results follows Oracle’s normal approach, so employee identifiers, last names,\
    \ and so forth are fetched from the `HR.EMPLOYEES` table. For the purposes of\
    \ ordering the data using our `CASE` expression, Oracle performs additional calculations\
    \ that aren’t shown in the results. All the candidate result rows that have a\
    \ non-`NULL` commission value have the product of `COMMISSION_PCT` and `SALARY`\
    \ calculated and then used to compare with the `SALARY` figures for all other\
    \ employees for ordering purposes.\n\nThe next `SELECT` statement helps you visualize\
    \ the data Oracle is deriving for the ordering calculation.\n\n```sql\nselect\
    \ employee_id, last_name, commission_pct, salary,\n       salary * (1+commission_pct)\
    \ sal_x_comm\nfrom hr.employees;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n```\nEMPLOYEE_ID LAST_NAME COMMISSION_PCT SALARY SAL_X_COMM\n----------- ---------\
    \ -------------- ------ ----------\n100         King      24000\n```"
  raw: 'The beauty is in not having to explicitly code these statements yourself,
    and for far more complex uses of CASE, not having to code many dozens or hundreds
    of statement combinations.


    To explore the solution from the data’s perspective, the following SQL statement
    extracts the employee identifier and the hire and end dates using the same left
    outer join as our recipe.


    select e.employee_id, e.hire_date, old.end_date end


    from hr.employees e left outer join hr.job_history old


    on e.employee_id = old.employee_id


    where e.department_id = 50


    order by e.employee_id;


    EMPLOYEE_ID HIRE_DATE END_DATE


    ----------- --------- ---------


    120 **18-JUL-96**


    121 **10-APR-97**


    122 01-MAY-95 **31-DEC-99**


    123 **10-OCT-97**


    124 **16-NOV-99**


    …


    The results show the data that drove the CASE function’s decision in our recipe.
    The values in bold were the results returned by our recipe. For the first, second,
    fourth, and fifth rows shown, END_DATE from the HR.JOB_HISTORY table is NULL,
    so the CASE operation returned the HIRE_DATE. For the third row, with EMPLOYEE_ID
    122, END_DATE has a date value, and thus was returned in preference to HIRE_DATE
    when examined by our original recipe. There is a shorthand form of the CASE statement
    known as the Simple CASE that only operates against one column or expression and
    has THEN clauses for possible values. This wouldn’t have suited us as Oracle limits
    the use of NULL with the Simple CASE in awkward ways.


    5-6\. Conditional Sorting and Sorting By Function


    Problem


    While querying some data, you need to sort by an optional value, and where that
    value is not present, you’d like to change the sorting condition to another column.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ COMMON QUERY PATTERNS


    Solution


    Oracle supports the use of almost all of its expressions and functions in the
    ORDER BY clause. This includes the ability to use the CASE statement and simple
    and complex functions like arithmetic operators to dynamically control ordering.
    For our recipe, we’ll tackle a situation where we want to show employees ordered
    by highest-paid to lowest-paid.


    For those with a commission, we want to assume the commission is earned but don’t
    want to actually calculate and show this value; we simply want to order on the
    implied result. The following SQL


    leverages the CASE statement in the ORDER BY clause to conditionally branch sorting
    logic for those with and without a COMMISSION_PCT value.


    select employee_id, last_name, salary, commission_pct


    from hr.employees


    order by


    case


    when commission_pct is null then salary


    else salary * (1+commission_pct)


    end desc;


    We can see from just the first few rows of results how the conditional branching
    while sorting has worked.


    EMPLOYEE_ID LAST_NAME SALARY COMMISSION_PCT


    ----------- --------- ------ --------------


    100 King 24000


    145 Russell 14000 .4


    146 Partners 13500 .3


    101 Kochhar 17000


    102 De Haan 7000


    …


    Even though employees 101 and 102 have a higher base salary, the ORDER BY clause
    using CASE has correctly positioned employees 145 and 146 based on their included
    commission percentage.


    How It Works


    The selection of data for our results follows Oracle’s normal approach, so employee
    identifiers, last names, and so forth are fetched from the HR.EMPLOYEES table.
    For the purposes of ordering the data using our CASE expression, Oracle performs
    additional calculations that aren’t shown in the results. All the candidate result
    rows that have a non-NULL commission value have the product of COMMISSION_PCT
    and SALARY calculated and then used to compare with the SALARY figures for all
    other employees for ordering purposes.


    The next SELECT statement helps you visualize the data Oracle is deriving for
    the ordering calculation.


    select employee_id, last_name, commission_pct, salary,


    salary * (1+commission_pct) sal_x_comm


    from hr.employees;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 5 ■ COMMON QUERY PATTERNS


    EMPLOYEE_ID LAST_NAME COMMISSION_PCT SALARY SAL_X_COMM


    ----------- --------- -------------- ------ ----------


    100 King **24000**'
  trans: "\n# CASE 与条件逻辑之美\n\n其精妙之处在于，你无需亲自显式编写这些语句，并且对于`CASE`更复杂的应用场景，也免去了编码数十甚至上百种语句组合的麻烦。\n\
    \n为了从数据的角度探究解决方案，以下`SQL`语句采用了与我们配方中相同的左外连接，来提取员工标识以及入职日期和结束日期。\n\n```sql\nselect\
    \ e.employee_id, e.hire_date, old.end_date end\nfrom hr.employees e left outer\
    \ join hr.job_history old\non e.employee_id = old.employee_id\nwhere e.department_id\
    \ = 50\norder by e.employee_id;\n```\n\n```\nEMPLOYEE_ID HIRE_DATE   END_DATE\n\
    ----------- ---------   ---------\n120         18-JUL-96\n121         10-APR-97\n\
    122         01-MAY-95   31-DEC-99\n123         10-OCT-97\n124         16-NOV-99\n\
    ...\n```\n\n结果显示了驱动我们配方中`CASE`函数决策的数据。粗体显示的值是我们配方返回的结果。对于所示的第一、第二、第四和第五行，来自`HR.JOB_HISTORY`表的`END_DATE`为`NULL`，因此`CASE`操作返回了`HIRE_DATE`。对于第三行，员工标识为\
    \ 122，`END_DATE`有一个日期值，因此在我们的原始配方中被优先返回，而非`HIRE_DATE`。`CASE`语句有一种称为简单`CASE`的简写形式，它仅针对一个列或表达式进行操作，并为可能的值设置`THEN`子句。这对我们并不适用，因为\
    \ Oracle 以一种笨拙的方式限制了简单`CASE`中对`NULL`的使用。\n\n## 5-6. 条件排序与按函数排序\n\n### 问题\n\n在查询某些数据时，你需要按一个可选值排序，当该值不存在时，你希望将排序条件更改为另一个列。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 解决方案\n\nOracle 支持在其`ORDER\
    \ BY`子句中使用几乎所有表达式和函数。这包括使用`CASE`语句以及像算术运算符这样简单和复杂的函数来动态控制排序。针对我们的配方，我们将处理一种情况：我们希望按从最高到最低的薪酬来显示员工。\n\
    \n对于那些有佣金的员工，我们想假设佣金是已赚取的，但不想实际计算并显示这个值；我们只想按隐含的结果进行排序。以下`SQL`利用`ORDER BY`子句中的`CASE`语句，为有和无`COMMISSION_PCT`值的情况进行条件分支排序逻辑。\n\
    \n```sql\nselect employee_id, last_name, salary, commission_pct\nfrom hr.employees\n\
    order by\ncase\n  when commission_pct is null then salary\n  else salary * (1+commission_pct)\n\
    end desc;\n```\n\n从结果的前几行，我们就能看出排序时的条件分支是如何生效的。\n\n```\nEMPLOYEE_ID LAST_NAME\
    \   SALARY COMMISSION_PCT\n----------- ---------   ------ --------------\n100\
    \         King        24000\n145         Russell     14000  .4\n146         Partners\
    \    13500  .3\n101         Kochhar     17000\n102         De Haan     7000\n\
    ...\n```\n\n尽管员工 101 和 102 的底薪更高，但使用了`CASE`的`ORDER BY`子句已根据包含的佣金百分比，正确地将员工 145\
    \ 和 146 排在了前面。\n\n### 工作原理\n\n为我们的结果选择数据遵循 Oracle 的常规方法，因此员工标识、姓氏等是从`HR.EMPLOYEES`表中提取的。为了使用我们的`CASE`表达式对数据进行排序的目的，Oracle\
    \ 执行了未在结果中显示的额外计算。所有佣金值非`NULL`的候选结果行都会计算`COMMISSION_PCT`和`SALARY`的乘积，然后与所有其他员工的`SALARY`数值进行比较以用于排序。\n\
    \n下一个`SELECT`语句有助于您可视化 Oracle 为排序计算而推导出的数据。\n\n```sql\nselect employee_id, last_name,\
    \ commission_pct, salary,\n       salary * (1+commission_pct) sal_x_comm\nfrom\
    \ hr.employees;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n```\n\
    EMPLOYEE_ID LAST_NAME COMMISSION_PCT SALARY SAL_X_COMM\n----------- ---------\
    \ -------------- ------ ----------\n100         King      24000\n```\n"
- fmt: "# CHAPTER 5 ■ COMMON QUERY PATTERNS\n\n145 Russell .4 14000 `19600`\n\n146\
    \ Partners .3 13500 `17550`\n\n101 Kochhar `17000`\n\n102 De Haan `17000`\n\n\
    …\n\nThe values in bold show the calculations Oracle used for ordering when evaluating\
    \ the data via the `CASE` expression in the `ORDER BY` clause. The general form\
    \ of the `CASE` expression can be expressed simply as follows.\n\n```\ncase\n\
    when <expression, column, etc.> then <expression, column, literal, etc.>\nwhen\
    \ <expression, column, etc.> then <expression, column, literal, etc.>\n…\nelse\
    \ <default expression for unmatched cases>\nend\n```\n\nWe won’t needlessly repeat\
    \ what the Oracle manual covers in plenty of detail. In short, the `CASE` expression\
    \ evaluates the first `WHEN` clause for a match and if satisfied, performs the\
    \ `THEN` expression. If the first `WHEN` clause isn’t satisfied, it tries the\
    \ second `WHEN` clause, and so on. If no matches are found, the `ELSE` default\
    \ expression is evaluated.\n\n## 5-7\\. Overcoming Issues and Errors when Subselects\
    \ Return Unexpected Multiple Values\n\n### Problem\n\nIn working with data from\
    \ a subselect, you need to deal with ambiguous situations where in some cases\
    \ the subselect will return a single (scalar) value, and in other cases multiple\
    \ values.\n\n### Solution\n\nOracle supports three expressions that allow a subselect\
    \ to be compared based on a single column of results. The operators `ANY`, `SOME`,\
    \ and `ALL` allow one or more single-column values from a subselect to be compared\
    \ to data in an outer `SELECT`. Using these operators allows you to deal with\
    \ situations where you’d like to code your SQL to handle comparisons with flexible\
    \ set sizes.\n\nOur recipe focuses on using these expressions for a concrete business\
    \ problem. The order-entry system tracks product information in the `OE.PRODUCT_INFORMATION`\
    \ table, including the `LIST_PRICE` value.\n\nHowever, we know discounts are often\
    \ offered, so we’d like to get an approximate idea of which items have never sold\
    \ at full price. To do this, we could do a precise correlated subquery of every\
    \ sale against list price. Before doing that, a very quick approximation can be\
    \ done to see if any `LIST_PRICE` value is higher than any known sale price for\
    \ any item, indicated by the `UNIT_PRICE` column of the `OE.ORDER_ITEMS` table.\
    \ Our `SELECT` statement takes this form.\n\n```\nselect product_id, product_name\n\
    from oe.product_information\nwhere list_price > ALL\n(select unit_price\nfrom\
    \ oe.order_items);\n```\n\nFrom this query, we see three results:\n\n```\nPRODUCT_ID\
    \ PRODUCT_NAME\n---------- ------------------------\n2351 Desk - W/48/R\n3003\
    \ Laptop 128/12/56/v90/110\n2779 Desk - OS/O/F\n```\n\nThese results mean at least\
    \ three items—two desks and a laptop—have never sold a full price.\n\n### How\
    \ It Works\n\nOur example’s use of the `ALL` expression allows Oracle to compare\
    \ the `UNIT_PRICE` values from every sale, to see if any known sale price was\
    \ greater than the `LIST_PRICE` for an item. Breaking down the steps that make\
    \ this approach useful, we can first look at the subselect.\n\n```\nselect unit_price\n\
    from oe.order_items\n```\n\nThis is a very simple statement that returns a single-column\
    \ result set of zero or more items, shown next in abbreviated form.\n\n```\nUNIT_PRICE\n\
    -----------\n482.9\n…\n665 rows selected.\n```\n\nBased on those results, our\
    \ outer `SELECT` statement compares each `LIST_PRICE` from the `OE.PRODUCTION_INFORMATION`\
    \ table with every item in the list, as we are using the `ALL` expression. If\
    \ the `LIST_PRICE` is greater than all of the returned values, the expression\
    \ resolves to true, and the product is included in the results. Where even one\
    \ of the `UNIT_PRICE` values returned exceeds the `LIST_PRICE` of an item, the\
    \ expression is false and that row is discarded from further consideration.\n\n\
    If you review that logic, you’ll realize this is not a precise calculation of\
    \ every item that didn’t sell for full price. Rather, it’s just a quick approximation,\
    \ though one that shows off the `ALL` technique quite well.\n\nThe alternatives\
    \ `SOME` and `ANY`, which are effectively synonyms, resolve the true/false determination\
    \ based on only needing one item in the subselect to satisfy the `SOME`/`ANY`\
    \ condition. Oracle will happily accept more than one item matching the `SOME`/`ANY`\
    \ criteria, but only needs to determine one value to evaluate the subselect.\n\
    \n## 5-8\\. Converting Numbers Between Different Bases\n\n### Problem\n\nYou need\
    \ to find a generic way to turn decimal representations of numbers such as IP\
    \ addresses and MAC addresses into hexadecimal, octal, binary, and other unusual\
    \ number bases.\n\n### Solution\n\nOracle ships with a small number of base-conversion\
    \ features, the most notable of which is the `TO_CHAR` function’s ability to convert\
    \ from decimal to hexadecimal. We can convert an arbitrary value, such as `19452`,\
    \ to hexadecimal using the next `SELECT` statement:\n\n```\nselect to_char(19452,'xxxxx')-oi-0ij\n\
    from dual;\n```\n\nOur output shows the correctly calculated value of `4BFC`.\
    \ Run that query yourself to confirm Oracle’s accuracy at hexadecimal conversion.\
    \ While this is useful for this specific case, often we’ll want to see decimals\
    \ converted to binary, octal, and other uncommon bases.\n\n■ `Tip` You may ask\
    \ yourself, what other bases might possibly be used? One of the authors once worked\
    \ on software that stored all numbers in base 36, using the digits 0 to 9 and\
    \ the letters A to Z to deal with limitations in certain hardware products that\
    \ could only store strings. You may find yourself needing number conversion to\
    \ unusual bases when you least expect it!\n\nOther base conversions are not natively\
    \ addressed out of the box by Oracle, so we’ll create our own generic decimal-conversion\
    \ function that can take a given number and convert it to any base from 2 to 36!\
    \ We’ll build our `REBASE_NUMBER` function using the fundamental arithmetic operations\
    \ that do ship with Oracle, as shown here.\n\n```\ncreate or replace function\
    \ rebase_number\n  (starting_value in integer, new_base in number)\n  return varchar2\n\
    is\n  rebased_value varchar2(4000) default NULL;\n  working_remainder integer\
    \ default starting_value;\n  char_string varchar2(36) default '0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';\n\
    \  sign varchar2(1) default '';\nbegin\n  if (starting_value < 0) then\n    sign\
    \ := '-';\n    working_remainder := abs(working_remainder);\n  end if;\n  loop\n\
    \    rebased_value := substr(char_string, mod(working_remainder,new_base)+1, 1)\n\
    \                     || rebased_value;\n    working_remainder := trunc(working_remainder/new_base);\n\
    \    exit when (working_remainder = 0);\n  end loop;\n  rebased_value := sign\
    \ || rebased_value;\n  return rebased_value;\nend rebase_number;\n/\n```\n\nWith\
    \ the `REBASE_NUMBER` function now available, we can perform conversions of our\
    \ original test number, `19452`, to a variety of bases. The first example shows\
    \ conversion to hexadecimal, to prove we’re getting the same result as Oracle.\n\
    \n```\nselect rebase_number(19452,16) as DEC_TO_HEX\nfrom dual;\n```\n\nWe successfully\
    \ calculate the correct result.\n\n```\nDEC_TO_HEX\n----------\n4BFC\n```\n\n\
    The same number converted to octal also succeeds.\n\n```\nselect rebase_number(19452,8)\
    \ as DEC_TO_OCTAL\nfrom dual;\n```\n\n```\nDEC_TO_OCTAL\n------------\n45374\n\
    ```\n\nA final example converting to binary similarly produces the correct result.\n\
    \n```\nselect rebase_number(19452,2) as DEC_TO_BINARY\nfrom dual;\n```\n\n```\n\
    DEC_TO_BINARY\n-------------\n100101111111100\n```\n\n### How It Works\n\nOur\
    \ function models the classic discrete mathematics used to perform a conversion\
    \ between two bases for any number. The basic algorithm takes this form: For each\
    \ significant digit in the original number (thousands, hundreds, and so forth)\n\
    \n• `Perform modulo division on that part of the number using the new base.`\n\
    \n• `Use the whole part of the result as the new “digit” in the converted number.`\n\
    \n• `Take the remainder, and repeat until the remainder is less than the new base.`\n\
    \n`Return the new digits and the last remainder as the converted number.`"
