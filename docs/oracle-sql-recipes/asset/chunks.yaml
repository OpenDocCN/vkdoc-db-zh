  trans: '

    # 第 2 章：数据汇总与聚合


    查询结果需要分配一个序号来表示它们在结果中的位置。你肯定不希望手动插入并跟踪源数据中的这些序号。


    ## 解决方案


    Oracle 提供了 `RANK` 分析函数，用于为结果集中的行生成排名编号。`RANK` 作为一个常规的 OLAP 风格函数应用于某列或派生表达式。本方案中，我们将假设业务需求是按薪资从高到低对员工进行排名。


    以下 `SELECT` 语句使用 `rank` 函数来分配这些排名值。


    ```sql

    select employee_id, salary, rank() over (order by salary desc) as Salary_Rank
    from hr.employees;

    ```


    我们的查询生成了结果，从月薪最高的 24000 开始，一直到第 107 位月薪 2100 的员工，如下面的节选结果所示。


    | EMPLOYEE_ID | SALARY | SALARY_RANK |

    |-------------|--------|-------------|

    | 100         | 24000  | 1           |

    | 101         | 17000  | 2           |

    | 102         | 17000  | 2           |

    | 145         | 14000  | 4           |

    | 146         | 13500  | 5           |

    | 201         | 13000  | 6           |

    | 205         | 12000  | 7           |

    | 108         | 12000  | 7           |

    | 147         | 12000  | 7           |

    | ...         | ...    | ...         |

    | 132         | 2100   | 107         |


    共选择了 107 行。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 工作原理


    `RANK` 的行为类似于任何其他分析函数，在非分析处理完成后，对结果集进行第二次遍历操作。在本方案中，选取了 `EMPLOYEE_ID` 和 `SALARY`
    值（没有 `WHERE` 谓词来过滤表数据，因此我们得到了组织内的每位员工）。然后分析阶段按薪资降序对结果进行排序，并从 1 开始计算结果的排名值。


    请注意 `RANK` 函数如何处理相等的值。两名薪资为 17000 的员工被赋予相同的排名 2。下一位薪资为 14000 的员工，排名是 4。这被称为**稀疏排名（sparse
    ranking）**，其中并列值会“占用”名次位置。实际上，这意味着我们并列第二名的员工占用了第二和第三名的位置，下一个可用的排名就是 4。


    你可以使用稀疏排名的替代方案，称为**密集排名（dense ranking）**。Oracle 通过 `DENSE_RANK` 分析函数支持这一点。观察一下当我们在本方案中切换到密集排名时发生的情况。


    ```sql

    select employee_id, salary, dense_rank() over (order by salary desc)

    as Salary_Rank

    from hr.employees;

    ```


    现在我们看到了“缺失”的连续排名值。


    | EMPLOYEE_ID | SALARY | SALARY_RANK |

    |-------------|--------|-------------|

    | 100         | 24000  | 1           |

    | 101         | 17000  | 2           |

    | 102         | 17000  | 2           |

    | 145         | 14000  | 3           |

    | 146         | 13500  | 4           |

    | 201         | 13000  | 5           |

    | 205         | 12000  | 6           |

    | 108         | 12000  | 6           |

    | 147         | 12000  | 6           |

    | 168         | 11500  | 7           |

    | ...         | ...    | ...         |

    | 132         | 2100   | 58          |


    共选择了 107 行。


    不同排名类型的经典使用场景是在体育比赛中。足球和其他运动在追踪球队在积分榜上的胜/负进展时通常使用稀疏排名。另一方面，奥运会等赛事在游泳等项目中出现并列情况时，倾向于使用密集排名。他们希望确保总是有金牌、银牌和铜牌获得者，即使出现并列情况需要颁发更多奖牌。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### 注意


    作者们一直希望，有一天写 SQL 语句能成为奥运会项目。我们一定会采用密集排名方法，以最大化我们获得奖牌的机会。


    我们的方案使用了一个跨越所有员工的简单排名来确定薪资顺序。`RANK` 和 `DENSE_RANK` 都支持常规的分析扩展，允许我们对源数据进行分区，以便为每个数据子集生成排名。延续我们方案的主题，这意味着我们可以为每个部门内的薪资收入者从高到低分配一个排名。将分区引入查询如下所示：


    ```sql

    Select department_id, employee_id, salary, rank() over

    (partition by department_id order by salary desc) as Salary_Rank

    From hr.employees

    ;

    ```


    我们的结果现在显示了按部门划分的员工薪资排名。


    | DEPARTMENT_ID | EMPLOYEE_ID | SALARY | SALARY_RANK |

    |---------------|-------------|--------|-------------|

    '
- fmt: "# 第二章：汇总与聚合数据\n\n## 2-13. 在组内查找第一个和最后一个值\n\n### 问题\n\n你想为一个组计算并显示聚合信息（如最小值和最大值），同时显示该组每个成员的详细信息。你希望避免重复显示聚合值和详细信息的工作。\n\
    \n### 解决方案\n\nOracle 提供了分析函数 `FIRST` 和 `LAST` 来计算任何有序序列中的起始值和结束值。重要的是，与 `MIN`\
    \ 和 `MAX` 这类显式的聚合函数不同，这些分析函数的使用**不依赖**于分组（`GROUP BY`）。\n\n对于我们的示例，我们假设一个具体问题：显示员工的薪资，同时显示其所在部门同事的最低和最高薪资。以下\
    \ `SELECT` 语句可以完成这项工作。\n\n```sql\nselect department_id, first_name, last_name,\n\
    \       min(salary)\n         over (partition by department_id) \"MinSal\",\n\
    \       salary,\n       max(salary)\n         over (partition by department_id)\
    \ \"MaxSal\"\nfrom   hr.employees\norder  by department_id, salary;\n```\n\n这段代码输出所有员工，并显示他们的薪资，该薪资介于其部门内的最低和最高薪资之间，如下方的示例输出所示。\n\
    \n```\nDEPARTMENT_ID FIRST_NAME LAST_NAME   MinSal  SALARY    MaxSal\n-------------\
    \ ---------- ---------- ------- ------- ----------\n           10 Jennifer   Whalen\
    \        4400    4400       4400\n           20 Pat        Fay           6000\
    \    6000      13000\n           20 Michael    Hartstein     6000   13000    \
    \  13000\n           30 Karen      Colmenares    2500    2500      11000\n   \
    \        30 Guy        Himuro        2500    2600      11000\n           30 Sigal\
    \      Tobias        2500    2800      11000\n           30 Shelli     Baida \
    \        2500    2900      11000\n           30 Alexander  Khoo          2500\
    \    3100      11000\n           30 Den        Raphaely      2500   11000    \
    \  11000\n           40 Susan      Mavris        6500    6500       6500\n…\n\
    107 rows selected.\n```\n\n### 工作原理\n\n`FIRST` 和 `LAST` 分析函数的关键在于，它们允许你根据一组条件进行分组和排序，同时在查询的主体中自由地按不同方式排序，并可选择性地根据其他因素进行或不进行分组。\n\
    \n`OLAP` 窗口通过 `OVER` 子句 `over (partition by department_id) \"MinSal\"` 在每个部门上进行分区。\n\
    \n## 2-14. 在移动窗口上执行聚合\n\n### 问题\n\n你需要基于相同的数据提供静态和移动的摘要或聚合。例如，在销售报告的一部分中，你需要提供销售订单金额的月度汇总，以及用于比较的三个月的移动平均销售额。\n\
    \n### 解决方案\n\nOracle 作为其分析函数集的一部分，提供了移动或滚动窗口函数。这使你能够引用结果集中的任意数量的前置行、当前行以及任意数量的后置行。我们最初的示例使用当前行和前三行来计算订单金额的滚动平均值。\n\
    \n```sql\nselect to_char(order_date, 'MM') as OrderMonth,\n       sum(order_total)\
    \ as MonthTotal,\n       avg(sum(order_total))\n         over\n           (order\
    \ by to_char(order_date, 'MM') rows between 3 preceding and current row) as RollingQtrAverage\n\
    from   oe.orders\nwhere  order_date between '01-JAN-1999' and '31-DEC-1999'\n\
    group  by to_char(order_date, 'MM')\norder  by 1;\n```\n\n我们在结果中看到了月份、相关合计以及计算出的三个月滚动平均值。\n\
    \n```\nOR MONTHTOTAL ROLLINGQTRAVERAGE\n-- ---------- -----------------\n02  \
    \    120281.6         120281.6\n03      200024.1         160152.85\n04       \
    \ 1636          107313.9\n05      165838.2         121944.975\n06      350019.9\
    \         179379.55\n07      280857.1         199587.8\n08      152554.3     \
    \    237317.375\n09      460216.1         310911.85\n10       59123.6        \
    \ 238187.775\n11      415875.4         271942.35\n12       338672          318471.775\n\
    11 rows selected.\n```\n\n你可能注意到一月（`OrderMonth` 01）缺失了。这不是此方法的特性，而是因为 `OE.ORDERS`\
    \ 表在1999年没有记录该月的订单。\n\n### 工作原理\n\n我们的滚动平均值 `SELECT` 语句首先选择了一些直接的数值。使用带有 `MM`\
    \ 格式字符串的 `TO_CHAR()` 函数从 `ORDER_DATE` 字段中提取月份数字。我们选择月份数字而非名称，是为了让输出按预期的顺序排序。\n\
    \n接下来是对 `ORDER_TOTAL` 字段使用传统的 `SUM` 函数进行常规聚合。这部分很简单。然后我们引入了 `OLAP AVG` 函数，这是滚动平均值计算的核心。该语句部分如下所示：\n\
    \n```sql\navg(sum(order_total)) over (order by to_char(order_date, 'MM')\n   \
    \  rows between 3 preceding and current row) as RollingQtrAverage\n```\n\n所有这些文本都是为了生成结果列\
    \ `ROLLINGQTRAVERAGE`。分解各部分将说明每一部分如何为解决方案做出贡献。前导函数 `AVG(SUM(ORDER_TOTAL))` 表明我们将对\
    \ `ORDER_TOTAL` 值求和然后取平均。这在某种程度上是正确的，但 Oracle 计算的不是普通的平均值或总和。这些是 `OLAP AVG` 和\
    \ `SUM` 函数，因此它们的范围由 `OVER` 子句管理。\n\n`OVER` 子句首先指示 Oracle 基于格式化后的 `ORDER_DATE`\
    \ 字段的顺序执行计算——这就是 `ORDER BY TO_CHAR(ORDER_DATE, 'MM')` 所实现的——实际上按02到12的值排序计算（记住，数据库中没有1999年1月的数据）。最后，也是最重要的，`ROWS`\
    \ 元素告诉 Oracle 应该在其上计算核心 `OLAP` 聚合函数的行窗口大小。在我们的案例中，这意味着应该对多少个月的 `ORDER_TOTAL` 值进行求和然后平均。我们的示例指示\
    \ Oracle 使用从倒数第三行到当前行的结果。这是对三个月滚动平均值的一种解释，尽管从技术上讲，它实际上生成的是四个月的平均值。如果你想要的是真正的三个月平均值——即前两个月加上当前月——你应该将\
    \ `ROWS BETWEEN` 元素改为：\n\n```sql\nrows between 2 preceding and current row\n```\n\
    \n这引出了一个有趣的点。此示例假设你想基于历史数据计算滚动平均值。但一些业务需求要求一个滚动窗口来跟踪基于某个时间点之前**和**之后的数据的趋势。例如，我们可能想使用三个月窗口，但基于前一个月、当前月和后一个月的数据。示例的下一个版本正好展示了窗口函数的这个能力，关键更改已加粗显示。\n\
    \n```sql\nselect to_char(order_date, 'MM') as OrderMonth,\n       sum(order_total)\
    \ as MonthTotal,\n       avg(sum(order_total))\n         over\n           (order\
    \ by to_char(order_date, 'MM')\n            rows between 1 preceding and 1 following)\
    \ as AvgTrend\nfrom   oe.orders\nwhere  order_date between '01-JAN-1999' and '31-DEC-1999'\n\
    group  by to_char(order_date, 'MM')\norder  by 1\n/\n```\n\n我们的输出正如预期那样发生了变化，因为月度的\
    \ `ORDER_TOTAL` 值现在为了计算而被以不同的方式分组。\n\n```\nOR MONTHTOTAL  AVGTREND\n-- ----------\
    \ ----------\n02      120281.6 160152.85\n03      200024.1 107313.9\n04      \
    \  1636   122499.433\n05      165838.2 172498.033\n06      350019.9 265571.733\n\
    07      280857.1 261143.767\n08      152554.3 297875.833\n09      460216.1 223964.667\n\
    10       59123.6 311738.367\n11      415875.4 271223.667\n12       338672  377273.7\n\
    11 rows selected.\n```"
