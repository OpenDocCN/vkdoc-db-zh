    \ these objects must have unique names across the entire database.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 18 ■ OBJECT MANAGEMENT\n\n### 18-5\\. Dropping a Table\n\n#### Problem\n\
    \nYou want to remove an object such as a table from a user.\n\n#### Solution\n\
    \nUse the `DROP TABLE` statement to remove a table. This example drops a table\
    \ named `INVENTORY`:\n```sql\ndrop table inventory;\n```\nYou should see the following\
    \ confirmation:\n```sql\nTable dropped.\n```\nIf you attempt to drop a table that\
    \ has a primary key or unique keys referenced as a foreign key in a child table,\
    \ you’ll see an error such as:\n```sql\nORA-02449: unique/primary keys in table\
    \ referenced by foreign keys\n```\nYou’ll either need to drop the referenced foreign\
    \ key constraint(s), or use the `CASCADE CONSTRAINTS` option when dropping the\
    \ parent table:\n```sql\ndrop table inventory cascade constraints;\n```\n\n####\
    \ How It Works\n\nYou must be the owner of the table or have the `DROP ANY TABLE`\
    \ system privilege to drop a table. If you have the `DROP ANY TABLE` privilege,\
    \ you can drop a table in a different schema by prepending the schema name to\
    \ the table name:\n```sql\ndrop table inv_mgmt.inventory;\n```\nIf you don’t prepend\
    \ the table name with a user name, Oracle assumes you are dropping a table in\
    \ your current user.\n\nIf you’re using the `RECYCLEBIN` feature, `DROP TABLE`\
    \ logically marks a table as dropped and renames it. The renamed table is placed\
    \ in a logical container called the `RECYCLEBIN`. The table remains in your `RECYCLEBIN`\
    \ until you manually remove it or until Oracle needs the space for other objects.\
    \ This means that the space associated with the dropped table is not released\
    \ until you purge your `RECYCLEBIN`. If you want to purge the entire contents\
    \ of the `RECYCLEBIN`, use the `PURGE RECYCLEBIN` statement:\n```sql\nSQL> purge\
    \ recyclebin;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nIf you\
    \ want to bypass the `RECYCLEBIN` feature and permanently drop a table, use the\
    \ `PURGE` option of the `DROP TABLE` statement:\n```sql\ndrop table inventory\
    \ purge;\n```\nIf you use the `PURGE` option, the table is permanently dropped.\
    \ You can’t use the `FLASHBACK TABLE` statement (see recipe 18-6 for details)\
    \ to retrieve the table. All space used by the table is released and any associated\
    \ indexes and triggers are also dropped.\n\n### 18-6\\. Undropping a Table\n\n\
    #### Problem\n\nYou accidentally dropped a table and you want to restore it.\n\
    \n#### Solution\n\nFirst verify that the table you want to restore is in the recycle\
    \ bin:\n```sql\nSQL> show recyclebin;\n```\n```\nORIGINAL NAME RECYCLEBIN NAME\
    \ OBJECT TYPE DROP TIME\n---------------- ------------------------------ ------------\
    \ -------------------\nPURCHASES BIN$YzqK0hN3Fh/gQHdAPLFgMA==$0 TABLE 2009-02-18:17:23:15\n\
    ```\nNext, use the `FLASHBACK TABLE...TO BEFORE DROP` statement to recover a dropped\
    \ table:\n```sql\nflashback table purchases to before drop;\n```\n> **Note** You\
    \ cannot `FLASHBACK TABLE...TO BEFORE DROP` for a table created in the `SYSTEM`\
    \ tablespace.\n\n#### How It Works\n\nIn Oracle Database 10*g* and higher, when\
    \ a `DROP TABLE` statement is issued, the table is actually renamed (to a name\
    \ that starts with `BIN$`) and placed in the recycle bin. The recycle bin is a\
    \ mechanism that allows you to view some of the metadata associated with a dropped\
    \ object. You can view complete metadata regarding renamed objects by querying\
    \ `DBA_SEGMENTS`:\n```sql\nselect segment_name, segment_type, tablespace_name\n\
    from dba_segments\nwhere segment_name like 'BIN%';\n```\n```\nSEGMENT_NAME SEGMENT_TYPE\
    \ TABLESPACE_NAME\n------------------------------ ------------------ ---------------\n\
    BIN$YzqK0hN4Fh/gQHdAPLFgMA==$0 TABLE MTS\n```\nThe `FLASHBACK TABLE` statement\
    \ simply renames the table back to its original name. By default, the `RECYCLEBIN`\
    \ feature is enabled in Oracle Database 10*g* and higher. You can change the default\
    \ by setting the `RECYCLEBIN` initialization parameter to `OFF`.\n\nWe recommend\
    \ that you don’t disable the `RECYCLEBIN` feature. It’s safer to leave this feature\
    \ enabled and purge the `RECYCLEBIN` to remove objects that you want permanently\
    \ deleted. If you want to permanently drop a table, use the `PURGE` option of\
    \ the `DROP TABLE` statement.\n\n### 18-7\\. Creating an Index\n\n#### Problem\n\
    \nYou are experiencing performance issues. You’ve identified a selective column\
    \ that is used as a search criterion. You want to add an index to the table.\n\
    \n#### Solution\n\nThe default index type in Oracle is a B-tree (balanced tree)\
    \ index. To create a B-tree index on an existing table, use the `CREATE INDEX`\
    \ statement. This example creates an index on the `D_SOURCES` table, specifying\
    \ `D_SOURCE_ID` as the column:\n```sql\ncreate index d_sources_idx1 on d_sources(d_source_id);\n\
    ```\nBy default, Oracle will try to create an index in your default tablespace.\
    \ Use the following syntax to instruct Oracle to build an index in a specific\
    \ tablespace:\n```sql\ncreate index d_sources_idx1 on d_sources(d_source_id) tablespace\
    \ dim_index;\n```\nIf you don’t specify any physical storage properties for an\
    \ index, the index will inherit its properties from the tablespace. This is usually\
    \ an acceptable method for managing index storage.\n\nTo view index metadata information,\
    \ query the `DBA_INDEXES`, `USER_INDEXES`, or `ALL_INDEXES` data dictionary views.\
    \ For example, this query displays all index information for the currently connected\
    \ user:\n```sql\nselect\n  table_name\n  ,index_name\n  ,index_type\n  ,tablespace_name\n\
    \  ,status\nfrom user_indexes\norder by table_name;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n#### To Rebuild or not\n\nIn the olden days (version 7 or so), in the name of\
    \ performance, DBAs would religiously rebuild indexes on a regular basis. Just\
    \ about every DBA had a script similar to the one listed next that would use SQL\
    \ to generate the SQL required to rebuild indexes for a schema:\n```sql\nSPO ind_build_dyn.sql\n\
    SET HEAD OFF PAGESIZE 0 FEEDBACK OFF;\nSELECT 'ALTER INDEX ' || index_name ||\
    \ ' REBUILD;'\nFROM user_indexes;\nSPO OFF;\nSET FEEDBACK ON;\n```\nHowever, it’s\
    \ debatable as to whether rebuilding an index with the newer versions of Oracle\
    \ will achieve any kind of performance gain. Refer to Oracle’s My Oracle Support\
    \ (formerly known as MetaLink) web site for more details. In particular, document\
    \ ID 555284.1 contains a script that detects whether an index might need to be\
    \ rebuilt.\n\n#### How It Works\n\nAn index is an optional database object that\
    \ is used primarily to increase performance. An index in Oracle works much like\
    \ an index in the back of a book that associates a page number with information\
    \ of interest. When looking for information in a book, it’s usually much faster\
    \ to look in the index first, then go to the page of interest. If there were no\
    \ index, you would have to scan every page of the book to find the information.\n\
    \nAn index is a separate object from the table and can be created and dropped\
    \ independently of the table. Just like a table, indexes require storage. Additionally,\
    \ there is some overhead with an index as Oracle has to maintain the indexes as\
    \ data is inserted, updated, or deleted in the associated table. Therefore, you\
    \ should only add an index when you are certain it will improve performance. See\
    \ Chapter 19 for details on improving SQL query performance.\n\nThe index definition\
    \ is associated with a table and column(s). The index structure stores a mapping\
    \ of a row’s `ROWID` and the column data on which the index is built. A `ROWID`\
    \ usually uniquely identifies a row within a database. The `ROWID` contains information\
    \ to physically locate a row (datafile, block, and row position within block)."
