    ## 工作原理


    `DBA_DEPENDENCIES` 视图对于确定哪些数据库对象依赖于其他数据库对象非常方便。例如，你可能有一个表，它被同义词、视图、物化视图、函数、过程和触发器所依赖。你可能想要删除或修改一个表，而在进行更改之前，你想查看有哪些其他对象依赖于你将要修改的对象。


    `DBA_DEPENDENCIES` 视图包含了 `OWNER`、`NAME` 和 `TYPE` 列与其引用的列名 `REFERENCED_OWNER`、`REFERENCED_NAME`
    和 `REFERENCED_TYPE` 之间的层次关系。Oracle 提供了许多结构来执行层次查询。例如，`START WITH` 和 `CONNECT BY`
    允许你在树中识别一个起点，并沿着层次关系向上或向下遍历。


    > **注意：** 关于层次查询的完整讨论，请参见第 13 章。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 10 章 ■ 数据字典


    解决方案中的 SQL 仅对一个对象进行操作。如果你想检查某个模式（schema）中的每一个对象，可以使用 SQL 生成 SQL 来创建脚本，以显示该模式所有对象的所有依赖关系。下一节代码就实现了这一点。为了格式化和输出，我们使用了一些
    `SQL*Plus` 特有的结构，例如设置页面大小和行大小，以及将输出假脱机（spool）到文件：


    ```sql

    UNDEFINE owner

    SET LINESIZE 132 PAGESIZE 0 VERIFY OFF FEEDBACK OFF TIMING OFF

    SPO dep_dyn_&&owner..sql

    SELECT ''SPO dep_dyn_&&owner..txt'' FROM DUAL;

    --

    SELECT

    ''PROMPT '' || ''_____________________________''|| CHR(10) ||

    ''PROMPT '' || object_type || '': '' || object_name || CHR(10) ||

    ''SELECT '' || '''''''' || ''+'' || '''''''' || '' '' || ''|| LPAD('' || ''''''''
    || '' '' || '''''''' || '',level+3)''

    || CHR(10) || '' || type || '' || '''''''' || '' '' || '''''''' ||

    '' || owner || '' || '''''''' || ''.'' || '''''''' || '' || name'' || CHR(10)
    ||

    '' FROM dba_dependencies '' || CHR(10) ||

    '' CONNECT BY PRIOR owner = referenced_owner AND prior name = referenced_name
    ''

    || CHR(10) ||

    '' AND prior type = referenced_type '' || CHR(10) ||

    '' START WITH referenced_owner = '' || '''''''' || UPPER(''&&owner'') || ''''''''
    || CHR(10) ||

    '' AND referenced_name = '' || '''''''' || object_name || '''''''' || CHR(10)
    ||

    '' AND owner IS NOT NULL;''

    FROM dba_objects

    WHERE owner = UPPER(''&&owner'')

    AND object_type NOT IN (''INDEX'',''INDEX PARTITION'',''TABLE PARTITION'');

    --

    SELECT ''SPO OFF'' FROM dual;

    SPO OFF

    SET VERIFY ON LINESIZE 80 FEEDBACK ON

    ```


    现在，你应该在运行脚本的同一目录下创建了一个名为 `dep_dyn_<owner>.sql` 的脚本。此脚本包含显示你输入的所有者（owner）对象依赖关系所需的所有
    SQL。运行该脚本以显示对象依赖关系。在此示例中，所有者是 `CIA`：


    ```sql

    SQL> @dep_dyn_cia.sql

    ```'
- fmt: "# CHAPTER 10 ■ DATA DICTIONARY\n\nWhen the script runs, it will spool a file\
    \ with the format of `dep_dyn_<owner>.txt`. You can open that text file with an\
    \ operating system editor to view its contents. Here’s a sample of the output\
    \ from this example:\n\n**TABLE: DOMAIN_NAMES**\n\n**+ FUNCTION STAR2.GET_DERIVED_COMPANY**\n\
    \n**+ TRIGGER STAR2.DOMAIN_NAMES_BU_TR1**\n\n**+ SYNONYM CIA_APP.DOMAIN_NAMES**\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nThe previous output shows\
    \ that the table `DOMAIN_NAMES` has three objects that are dependent on it, a\
    \ function, a trigger, and a synonym.\n\n## Utldtree\n\nOracle provides a script\
    \ that will build objects that can be used to display a dependency tree. To install\
    \ `UTLDTREE`, run this script in the schema in which you want to analyze dependencies:\n\
    \n```sql\nSQL> @?/rdbms/admin/utldtree\n```\n\nNow you can build a dependency\
    \ tree by executing the `DEPTREE_FILL` procedure. This procedure accepts three\
    \ arguments: object type, owner, and object name:\n\n```sql\nSQL> exec deptree_fill('table','inv_mgmt','inv');\n\
    ```\n\nTo display the dependency tree, issue this SQL statement:\n\n```sql\nSQL>\
    \ select * from ideptree;\n```\n\nBe aware that when running the `UTLDTREE` script,\
    \ it will drop and create objects within the currently connected user account:\
    \ therefore we recommend using this utility only in a test or development environment.\n\
    \n## 10-10\\. Displaying Synonym Metadata\n\n### Problem\n\nYou want to display\
    \ information regarding a synonym.\n\n### Solution\n\nUse the following SQL to\
    \ view synonym metadata for a user:\n\n```sql\nselect\n synonym_name, table_owner,\
    \ table_name, db_link\nfrom user_synonyms\norder by 1;\n```\n\nThe `ALL_SYNONYMS`\
    \ view will display all private synonyms, all public synonyms, and also any private\
    \ synonyms owned by different users where you have select access to the underlying\
    \ base table.\n\nYou can display information for all private and public synonyms\
    \ in your database by querying the `DBA_SYNONYMS` view.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### How It Works\n\nThe `TABLE_NAME` column in the `DBA/ALL/USER_SYNONYMS` views\
    \ is a bit of a misnomer because `TABLE_NAME` can actually reference many types\
    \ of database objects, such as another synonym, view, package, function, procedure,\
    \ materialized view, and so on. Similarly, `TABLE_OWNER` refers to the owner of\
    \ the object (and that object may not necessarily be a table).\n\nYou can also\
    \ use the `GET_DDL` function of the `DBMS_METADATA` package to display synonym\
    \ metadata. You must pass the `GET_DDL` function the object type, name, and schema,\
    \ for example:\n\n```sql\nselect\n dbms_metadata.get_ddl('SYNONYM','VDB','INV')\n\
    from dual;\n```\n\nWhen diagnosing data integrity issues, sometimes you’ll first\
    \ want to identify what table or object is actually being accessed. You can select\
    \ from what appears to be a table, but in reality it can be a synonym that points\
    \ to a view that selects from a synonym that in turn points to a table in a different\
    \ database.\n\nThe following query is often a starting point for figuring out\
    \ if an object is a synonym, view, or a table:\n\n```sql\nselect\n owner\n,object_name\n\
    ,object_type\n,status\nfrom dba_objects\nwhere object_name like upper('&object_name%');\n\
    ```\n\nNotice that using the percent sign wildcard character in this query allows\
    \ you to enter the partial name of the object. Therefore the query has the potential\
    \ to return information regarding any object that partially matches the text string\
    \ you enter.\n\n## 10-11\\. Displaying View Text\n\n### Problem\n\nYou want to\
    \ see the text associated with a view.\n\n### Solution\n\nUse the following script\
    \ to display the text associated with a particular view for a user:\n\n```sql\n\
    select\n view_name\n,text\nfrom dba_views\nwhere owner = upper('&owner')\nand\
    \ view_name like upper('&view_name');\n```\n\nYou can also query from the `ALL_VIEWS`\
    \ view for the text of any view you have access to:\n\n```sql\nselect text\nfrom\
    \ all_views\nwhere owner='INV'\nand view_name='INV_VIEW';\n```"
