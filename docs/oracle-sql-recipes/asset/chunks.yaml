    ### 工作原理


    理解正则表达式起初可能令人生畏，直到你将其分解为各个组成部分。正则表达式（也称为 *模式*）是 Unix 或 Linux 命令行（当你使用 `egrep`
    命令或编写 `PERL` 脚本时）的主力。它们由两种类型的字符组成：常规字符和特殊的 *元字符*。一个或多个常规字符匹配待搜索字符串中相同的字符。例如，`cat`
    匹配字符串 `cat`、`caterer` 或 `scat`。目标字符串中的额外字符并不重要。只要目标字符串（如“caterer”）包含该模式（例如“cat”），结果就是匹配。


    你将看到的最常见的正则表达式包含表 7-1 中的元字符。例如，`ca?t` 匹配 `cat` 或 `cart`，`cat|dog` 匹配字符串中的 `cat`
    或 `dog`，而 `d[oi]g` 匹配 `dog` 或 `dig`。


