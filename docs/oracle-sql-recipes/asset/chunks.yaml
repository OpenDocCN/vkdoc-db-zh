- fmt: "# 1-1. Retrieving Data from a Table\n\n## Problem\n\nYou want to retrieve\
    \ specific row and column data from a table.\n\n## Solution\n\nIssue a `SELECT`\
    \ statement that includes a `WHERE` clause. The following is a straightforward\
    \ `SELECT` statement querying a database table for particular column values, for\
    \ those rows that match defined criteria:\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**CHAPTER 1 ■ THE BASICS**\n\n```sql\nselect employee_id, first_name, last_name,\
    \ hire_date, salary\nfrom hr.employees\nwhere department_id = 50\nand salary <\
    \ 7500;\n```\n\nThe `SELECT` statement returns 45 rows when run against an Oracle\
    \ 11g database loaded with the sample `HR` schema. Here are the first 10 rows\
    \ you will see.\n\n```\nEMPLOYEE_ID FIRST_NAME LAST_NAME HIRE_DATE SALARY\n-----------\
    \ ---------- --------- --------- ------\n        198 Donald     OConnell  21-JUN-99\
    \   2600\n        199 Douglas    Grant     13-JAN-00   2600\n        123 Shanta\
    \     Vollman   10-OCT-97   6500\n        124 Kevin      Mourgos   16-NOV-99 \
    \  5800\n        125 Julia      Nayer     16-JUL-97   3200\n        126 Irene\
    \      Mikkilineni 28-SEP-98   2700\n        127 James      Landry    14-JAN-99\
    \   2400\n        128 Steven     Markle    08-MAR-00   2200\n        129 Laura\
    \      Bissot    20-AUG-97   3300\n        130 Mozhe      Atkinson  30-OCT-97\
    \   2800\n...\n```\n\n## How It Works\n\nThe `SELECT` statement was formatted\
    \ to help you understand (or refresh your understanding of) the basic elements\
    \ that constitute a working query. The first line of the query explicitly states\
    \ the five columns we wish to include in the results.\n\n```sql\nselect employee_id,\
    \ first_name, last_name, hire_date, salary\n```\n\nThe next line is the `FROM`\
    \ clause, naming the table or tables to be referenced to pull out the columns\
    \ we want to see:\n\n```sql\nfrom hr.employees\n```\n\nIn this example, we use\
    \ two-part object naming, specifying both the table name, `EMPLOYEES`, and the\
    \ schema to which `employees` belongs, `HR`. This disambiguates the `EMPLOYEES`\
    \ table in the `HR` schema from any other `employees` table that may be present\
    \ in any other schema, and more importantly avoids the implicit selection of the\
    \ table in the user’s own schema or the currently set schema, which is the default\
    \ where no schema is specified.\n\nNext we list the `WHERE` clause, with two criteria\
    \ that must be satisfied in order for rows to be included in our results.\n\n\
    ```sql\nwhere department_id = 50\nand salary < 7500\n```\n\nRows in the `EMPLOYEES`\
    \ table must satisfy both tests to be included in our results. Meeting one, or\
    \ the other, but not both will not satisfy our query, as we've used the `AND`\
    \ Boolean operator to combine the criteria. In non-technical terms, this means\
    \ an employee must be listed in the department with an ID of `50`, as well as\
    \ have a salary below `7500`.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**CHAPTER 1 ■ THE BASICS**\n\nOther Boolean operators are `OR` and `NOT`, and\
    \ these follow normal Boolean precedence rules and can be modified using parenthesis\
    \ to alter logic explicitly. We can modify our first example to illustrate these\
    \ operators in combination:\n\n```sql\nselect employee_id, first_name, last_name,\
    \ hire_date, salary\nfrom hr.employees\nwhere department_id = 50\nand (salary\
    \ < 2500 or salary > 7500);\n```\n\nThis query seeks the same columns as the first,\
    \ this time focusing on those members of department `50` whose salary is either\
    \ less than `2500`, or more than `7500`.\n\n```\nEMPLOYEE_ID FIRST_NAME LAST_NAME\
    \ HIRE_DATE SALARY\n----------- ---------- --------- --------- ------\n      \
    \  120 Matthew    Weiss     18/JUL/96   8000\n        121 Adam       Fripp   \
    \  10/APR/97   8200\n        122 Payam      Kaufling  01/MAY/95   7900\n     \
    \   127 James      Landry    14/JAN/99   2400\n        128 Steven     Markle \
    \   08/MAR/00   2200\n        132 TJ         Olson     10/APR/99   2100\n    \
    \    135 Ki         Gee       12/DEC/99   2400\n        136 Hazel      Philtanker\
    \ 06/FEB/00   2200\n```\n\nOnly 8 rows in the sample `HR` schema match these criteria.\n\
    \n# 1-2. Selecting All Columns from a Table\n\n## Problem\n\nYou want to retrieve\
    \ all columns from a table, but you don’t want to take the time to type all the\
    \ column names as part of your `SELECT` statement.\n\n## Solution\n\nUse the asterisk\
    \ (`*`) placeholder, to represent all columns for a table. For example:\n\n```sql\n\
    select *\nfrom hr.employees\nwhere department_id = 50\nand salary < 7500;\n```\n\
    \nOur results show wrapped lines and only a partial listing to save space, but\
    \ you can see the effect of the asterisk on the columns selected:\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**CHAPTER 1 ■ THE BASICS**"
