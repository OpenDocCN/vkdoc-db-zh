  trans: "\n# 第 6 章 ■ 处理日期和时间值\n\n## 6-7. 检测闰年\n\n### 问题\n你需要判断任意给定年份是否为闰年。\n\n###\
    \ 解决方案\n判断一个年份是否为闰年有许多快捷技巧。其中包括一些古怪的计算，例如确定该年是否存在 2 月 29 日，或者 3 月 1 日是该年的第 61\
    \ 天还是第 62 天。下面展示的 SQL 使用的是经典（且官方）的闰年定义。\n\n```sql\nselect to_number(to_char(sysdate,'YYYY'))\
    \ Year,\n       case\n         when mod(to_number(to_char(sysdate,'YYYY')),400)\
    \ = 0 then 'Leap Year'\n         when mod(to_number(to_char(sysdate,'YYYY')),100)\
    \ = 0 then 'Not Leap Year'\n         when mod(to_number(to_char(sysdate,'YYYY')),4)\
    \ = 0 then 'Leap Year'\n         else 'Not Leap Year'\n       end as \"Leap Year?\"\
    \nfrom dual;\n```\n\n对于本书出版年份 2009 年，我们可以看到结果符合预期。\n\n```\nYEAR Leap Year?\n----\
    \ -------------\n2009 Not Leap Year\n```\n\n我们也可以使用本方案的通用形式，将年份计算替换为字面年份值，例如 2000，以获得准确的结果。\n\
    \n```sql\nselect '2000' Year,\n       case\n         when mod(2000,400) = 0 then\
    \ 'Leap Year'\n         when mod(2000,100) = 0 then 'Not Leap Year'\n        \
    \ when mod(2000,4) = 0 then 'Leap Year'\n         else 'Not Leap Year'\n     \
    \  end as \"Leap Year?\"\nfrom dual;\n```\n\n```\nYEAR Leap Year?\n---- -------------\n\
    2000 Leap Year\n```\n\n### 工作原理\n我们的解决方案基于从年份推导出的标准闰年定义。标准算法规定：如果一个年份能被 4 整除，则它是闰年。但是，如果该年份也能被\
    \ 100 整除，则此规则优先于能被 4 整除的规则，该年不是闰年。最后，如果该年份也能被 400 整除，则此规则优先于所有其他规则，该年是闰年。\n\n\
    将其转换为我们的 SQL 方案，我们在`SELECT`语句中首先向调用者回显当前年份。这仅仅是为了展示我们方案的工作原理。在实际应用中，你可能会将我们方案的组件转化为函数的逻辑，而完全不必重复年份。\n\
    \n我们使用`CASE`语句来驱动闰年检测逻辑的主体。我们在`CASE`语句中逆序应用闰年算法，以利用`CASE`语句的行为特性。一旦找到匹配的规则，`CASE`语句就会中断。这意味着我们需要首先评估最重要的、优先于所有其他规则的规则：该年份能否被\
    \ 400 整除？如果结果为假，我们接着评估下一个最严格的规则——能否被 100 整除——依此类推。\n\n我们使用`MOD`函数执行取模运算。首先，如果年份对\
    \ 400 取模没有余数，我们知道它能被 400 整除，因此是闰年。对于这种情况，我们返回字符串`Leap Year`，`CASE`语句结束。如果年份对 400\
    \ 取模有余数，我们知道它不是闰年，于是继续对年份进行除以 100 的取模运算。如果没有余数，我们知道该年份能被 100 整除，因此不是闰年。我们知道这一点是因为，如果该年份也能被\
    \ 400 整除，`CASE`语句本应早已终止，而不会执行到`CASE`表达式的这一部分。\n\n类似地，如果前两次取模运算都有余数，我们会继续进行第三次取模运算，即计算年份除以\
    \ 4 的余数。同样，如果没有余数，我们知道前两条规则都未匹配，因此该年是闰年。\n\n此时，我们的`CASE`语句已执行完毕，我们知道该年份没有匹配任何明确的闰年判定规则。因此我们可以推断该年不是闰年，并返回`Not\
    \ Leap Year`。最后，我们为`CASE`语句的评估结果赋予一个有意义的别名`Leap Year?`。\n\n## 6-8. 计算月末日期\n\n\
    ### 问题\n你需要在运行时动态确定给定月份的最后一天。\n\n### 解决方案\n使用 Oracle 的`LAST_DAY`函数自动计算给定月份的最后一天的日期。我们在下面的\
    \ SQL 语句中首先对当前日期使用`LAST_DAY`，以模拟在运行时动态确定当前月份最后一天的方法。\n\n```sql\nselect last_day(sysdate)\n\
    from dual;\n```\n\n```\nLAST_DAY\n---------\n31-MAY-09\n```\n\n大多数开发人员和数据用户担心的典型边界情况是，在闰年和非闰年中正确计算二月份的最后一天。下面的\
    \ SQL 语句展示了`LAST_DAY`函数如何为一系列有趣的闰年和非闰年正确确定二月份的结束日期。\n\n```sql\nselect '1900' Year,last_day('01-FEB-1900')\
    \ End_Of_Feb\nfrom dual\nunion\nselect '2000' Year,last_day('01-FEB-2000') End_Of_Feb\n\
    from dual\nunion\nselect '2010' Year,last_day('01-FEB-2010') End_Of_Feb\nfrom\
    \ dual;\n```\n\n```\nYEAR END_OF_FEB\n---- ---------\n1900 28-FEB-00\n2000 29-FEB-00\n\
    2010 28-FEB-10\n```\n\n### 工作原理\n`LAST_DAY`函数正是为此计算而设计的，它使你免于对月份数字进行繁琐的算术运算，或使用查找表来确定正确值。\n\
    \n在我们的方案中，我们将`SYSDATE`的返回值传递给`LAST_DAY`函数。这意味着我们提供了一个日期数据类型的值，就好像我们单独运行这条 SQL\
    \ 语句一样。\n\n```sql\nselect sysdate\nfrom dual;\n```\n\n```\nSYSDATE\n---------\n\
    21-MAY-09\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n"
- fmt: "# CHAPTER 6 ■ WORKING WITH DATE AND TIME VALUES\n\n## 6-9. Determining the\
    \ First Date or Day in a Month\n\n### Problem\n\nYou need to dynamically determine\
    \ the first date in a given month at runtime.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### Solution\n\nOracle’s `TRUNC` function can be used on dates to perform start-of-period\
    \ calculations, such as the first day of the month.\n\n```sql\nselect trunc(sysdate,'mm')\n\
    from dual;\n```\n\n```\nTRUNC(SYS\n--------\n01-MAY-09\n```\n\nOur recipe was\
    \ written on May 21st. Any arbitrary date, datetime, or timestamp expression can\
    \ be used.\n\n### How It Works\n\nAt first, you might be tempted to think that\
    \ it’s just not that hard to determine the first date of a month. It’s always\
    \ going to be the first! But in practice, when you’re performing calculations\
    \ on dates, you want to dynamically determine the full date value representing\
    \ the first of the month, for the month in which you are interested.\n\nThe date-oriented\
    \ version of the `TRUNC` function takes any date, datetime or timestamp value\
    \ (implicitly converting to date before proceeding), and a date format string.\
    \ The date format string is based on the same date format codes used elsewhere\
    \ in Oracle, such as `MM` or `MONTH` for month, and `YY` or `YYYY` for year. Table\
    \ 6-1 earlier in this chapter highlighted some common options for date format\
    \ strings.\n\nYou can extend this recipe into a more generic form to find the\
    \ first “date” of a dynamic week, quarter, or other time period for which Oracle\
    \ has a formatting code. Simply pass the code along with a date to the `TRUNC`\
    \ function, and it does the work for you. The next SQL takes our recipe and changes\
    \ only the formatting option to `Q` for quarter to get the first day of the quarter.\n\
    \n```sql\nselect trunc(sysdate,'q')\nfrom dual;\n```\n\n```\nTRUNC(SYS\n--------\n\
    01-APR-09\n```\n\n## 6-10. Calculating the Day of the Week\n\n### Problem\n\n\
    You want to determine the day of the week, and also indicate whether it’s considered\
    \ a work day or weekend.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### Solution\n\nUse Oracle’s `TO_CHAR` function with a `DAY` format code to\
    \ retrieve the textual name for the day of the week.\n\nTo determine working day\
    \ or weekend day, use the `TO_CHAR` function with the `D` format code to retrieve\
    \ the number of the day of the week, from 1 to 7, and then apply regionally specific\
    \ conventions to determine the day’s status. This is an important consideration,\
    \ as the working week varies widely all around the world. It could be that your\
    \ code operates in Saudi Arabia, where the working days are typically Saturday\
    \ to Wednesday, or various regions in China where it’s common to think of the\
    \ working week running Monday to Saturday.\n\nOur recipe puts `TO_CHAR` into action\
    \ to determine both the day name, and workday/weekend status in the next succinct\
    \ SQL statement, starting with Monday to Friday as the basis for the working week.\n\
    \n```sql\nselect to_char(sysdate,'Day') Day_Of_Week,\n       case\n         when\
    \ to_char(sysdate,'D') in (1,7) then 'Weekend'\n         else 'Weekday'\n    \
    \   end Day_Type\nfrom dual;\n```\n\nRunning our recipe on a Monday returns the\
    \ following results.\n\n```\nDAY_OF_WEEK             DAY_TYPE\n-----------------------\
    \ --------\nMonday                  Weekday\n```\n\nConversely, running our recipe\
    \ on a Saturday shows this output.\n\n```\nDAY_OF_WEEK             DAY_TYPE\n\
    ----------------------- --------\nSaturday                Weekend\n```\n\n###\
    \ How It Works\n\nOracle itself does almost all the heavy lifting in this recipe.\
    \ We leverage the `DAY` format option when passing the current date returned from\
    \ `SYSDATE` to the `TO_CHAR` function. This automatically returns the name of\
    \ the day according to the current regional settings. We make the results a little\
    \ more easily read by providing the alias `DAY_OF_WEEK`.\n\nNote that the `DAY`\
    \ formatting code works on any supplied date, not just the day given by `SYSDATE`\
    \ or `CURRENT_DATE`. We can pass a literal date string that includes the day name,\
    \ and have `DAY` extract it for us.\n\nWe can also pass a calculation or expression\
    \ that returns a date. This conforms to the general rule of date formatting codes\
    \ we saw earlier in Table 6-1.\n\nDetermining whether the day is a working day\
    \ or weekend uses a shortcut that can be tailored to suit any region around the\
    \ world. We use the `TO_CHAR` function again on our date, but this time we use\
    \ the formatting code `D` to return the number of the day of the week, and use\
    \ this to drive a `CASE` statement.\n\nThe `D` date format defaults to 1 for Sunday,\
    \ 2 for Monday and so on, through to 7 for Saturday. This correlation between\
    \ day number and name is dictated by your regional settings, but the logic we\
    \ use can be adjusted to suit operation in whatever location you find yourself.\n\
    \nWe look to see if the day number is in the set (1,7): that is, does the day\
    \ number equal 1 or 7. The numbers 1 and 7 match Sunday and Saturday respectively.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n```sql\nwhen to_char(sysdate,'D')\
    \ in (1,7) then 'Weekend'\n```\n\nIf the day number is not 1 or 7, by implication\
    \ the day would be Monday through Friday, which in much of the Western world is\
    \ considered the work week. We give the result of the `CASE` statement a useful\
    \ column alias, `DAY_TYPE`, to complete the logic.\n\n**Tip:** Where your local\
    \ definition of the weekend or non-working days differs from our example, simply\
    \ change the day numbers in the `CASE` statement to suit.\n\n## 6-11. Grouping\
    \ and Aggregating by Time Periods\n\n### Problem\n\nYou’d like to group date or\
    \ datetime data by month or year.\n\n### Solution\n\nOracle’s grouping functionality\
    \ supports use of any deterministic function, including the `TO_CHAR` function\
    \ for dates. We can use this to extract date information at the level of aggregation\
    \ in which we’re interested, and have a `GROUP BY` clause handle the necessary\
    \ grouping.\n\nLet’s suppose we want to report how many orders our company receives\
    \ by month, so we can see when the busy and slow sales periods are throughout\
    \ the year, and run some promotions to boost the slow months. The next SQL statement\
    \ counts the orders in the `OE.ORDERS` table by month.\n\n```sql\nselect to_char(order_date,\
    \ 'MM') Order_Month, count(*) Order_Count\nfrom oe.orders\ngroup by to_char(order_date,\
    \ 'MM')\norder by 1;\n```\n\nWe see the fluctuations in results across the months\
    \ of the year, with April being a notably poor month for orders.\n\n```\nORDER_MONTH\
    \ ORDER_COUNT\n----------- -----------\n01          5\n02          9\n03     \
    \     11\n04          1\n05          10\n06          14\n07          14\n08  \
    \        5\n09          11\n10          5\n11          16\n12          4\n```\n\
    \n### How It Works\n\nBoth the `SELECT` and `GROUP BY` clauses use the `TO_CHAR`\
    \ function to target the desired month portion of the `ORDER_DATE` field. The\
    \ `MM` code extracts the two-digit version of the date, which we’ve chosen solely\
    \ so the sorting appears in chronological month order.\n\nThis grouping is used\
    \ by Oracle to determine how to bundle together the different order rows—and specifically\
    \ the month value calculated—for the `COUNT` function. This follows the rules\
    \ highlighted in Chapter 2’s recipes to ensure all non-aggregated values in the\
    \ result are in our `GROUP BY` clause.\n\nGrouping by time periods is possible\
    \ on any conceivable result we can achieve using `TO_CHAR` or other functions\
    \ on the date. We can perform date arithmetic, timestamp to date, or other datatype\
    \ conversion, and more. A slight tweak to our recipe produces order counts aggregated\
    \ at the year level."
