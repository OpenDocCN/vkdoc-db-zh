- fmt: "# CHAPTER 20 Database Troubleshooting\n\nDatabase troubleshooting is a general\
    \ term that can apply to vast a range of topics, such as resolving storage issues,\
    \ investigating sluggish performance, or monitoring database objects. SQL is often\
    \ the first tool you’ll use to get an idea of what might be amiss in the database.\
    \ Therefore, you must be familiar with SQL techniques for extracting and analyzing\
    \ database information.\n\nThe recipes in this chapter are mainly for DBAs. However,\
    \ if you’re a developer, many of these topics will indirectly impact your ability\
    \ to work efficiently with the database. Knowing the solutions to the problems\
    \ described in this chapter will give you a better understanding of the Oracle\
    \ architecture and will also arm you with information for troubleshooting application\
    \ issues with the crusty old territorial database administrator.\n\nDBAs, of course,\
    \ need to be experts at identifying problem areas within their databases. The\
    \ DBA is the go-to team member for any connectivity, performance, or availability\
    \ issues. A good DBA must be proficient with SQL, especially with regard to troubleshooting.\n\
    \nIt would be impossible to cover every type of SQL statement you can use to troubleshoot\
    \ issues with your database. Rather, we present SQL insights for dealing with\
    \ common database pain points. We’ll begin by showing you how to identify potential\
    \ problems, then explore how to deal with storage issues and database auditing.\n\
    \nThere are numerous methods for invoking `DBMS_STATS`. For example, if you want\
    \ to generate statistics for just one table, use the `GATHER_TABLE_STATS` procedure.\
    \ This example gathers statistics for the `D_DOMAINS` table:\n\n```sql\nSQL> exec\
    \ dbms_stats.gather_table_stats(ownname=>'STAR2',tabname=>'D_DOMAINS',-\n> cascade=>true,\
    \ estimate_percent=>20, degree=4);\n```\n\nStarting with Oracle Database 10g,\
    \ there is a default `DBMS_SCHEDULER` job that runs once a day that automatically\
    \ analyzes your database objects. To view the last time this job ran, execute\
    \ the following query:\n\n```sql\nselect\nowner\n,job_name\n,last_start_date\n\
    from dba_scheduler_jobs\nwhere job_name IN\n('GATHER_STATS_JOB', -- 10g\n'BSLN_MAINTAIN_STATS_JOB'\
    \ -- 11g\n);\n```\n\nFor many databases, this automatic statistics-gathering job\
    \ is adequate. However, you may experience poor performance after a large proportion\
    \ of data has been modified in the tables the SQL queries are based on. In situations\
    \ where the table data changes significantly, you may want to manually generate\
    \ statistics as shown in the solution section of this recipe.\n\nWhen you run\
    \ a query, if there are no statistics generated for a table, Oracle will by default\
    \ dynamically attempt to estimate optimizer statistics. For dynamic sampling to\
    \ take place, the `OPTIMIZER_DYNAMIC_SAMPLING` initialization parameter must be\
    \ set. In Oracle Database 10g and higher, the default value of this parameter\
    \ is 2. If you have `AUTOTRACE` enabled, Oracle will denote the usage of dynamic\
    \ sampling for a SQL statement as follows:\n\nNote\n- dynamic sampling used for\
    \ this statement\n\n## 20-1. Determining Causes of Database Problems\n\n### Problem\n\
    \nUsers are reporting that the application using the database is acting odd. Your\
    \ manager wants you to check to see if anything is wrong with the database.\n\n\
    ### Solution\n\nWhen diagnosing database problems, you have to have a strategy\
    \ for determining where to look for issues. For example, if a user is reporting\
    \ a specific database error or if there is a detailed message in the alert log,\
    \ then it’s obvious to begin by investigating those reported problems.\n\nIf there’s\
    \ not a clear starting point, you can run an Automatic Workload Repository (AWR)\
    \ report (requires a license) or a Statspack report; see Chapter 19 for more details\
    \ on how to run these reports. If you don’t have either of these tools at your\
    \ disposal, you can query the data dictionary directly to determine if the database\
    \ is stressed and what might be the root cause of the issue.\n\nThe next query\
    \ uses the `V$SYSSTAT` view to determine the database time spent processing user\
    \ requests and CPU time to infer the database wait time (by subtraction). This\
    \ relates to the available time, which is the wall-clock time multiplied by the\
    \ number of CPUs. The purpose of this query is to determine whether your database\
    \ is spending an inordinate amount of time waiting for resources (indicative of\
    \ an overloaded system):\n\n```sql\nselect\nround(100*CPU_sec/available_time,2)\
    \ \"ORACLE CPU TIME AS % AVAIL.\"\n,round(100*(DB_sec - CPU_sec)/available_time,2)\
    \ \"NON-IDLE WAITS AS % AVAIL.\"\n,case\nsign(available_time - DB_sec)\nwhen 1\
    \ then round(100*(available_time - DB_sec) / available_time, 2)\nelse 0\nend \"\
    ORACLE IDLE AS % AVAIL.\"\nfrom\n(\nselect\n(sysdate - i.startup_time) * 86400\
    \ * c.cpus available_time\n,t.DB_sec\n,t.CPU_sec\nfrom v$instance i\n,(select\
    \ value cpus\nfrom v$parameter\nwhere name = 'cpu_count') c\n,(select\nsum(case\
    \ name\nwhen 'DB time' then round(value/100)\nelse 0\nend) DB_sec\n,sum(case name\n\
    when 'DB time' then 0\nelse round(value/100)\nend) CPU_sec\nfrom v$sysstat\nwhere\
    \ name in ('DB time', 'CPU used by this session')) t\nwhere i.instance_number\
    \ = userenv('INSTANCE')\n);\n```\n\nHere is some output:\n\n```\nORACLE CPU TIME\
    \ AS % AVAIL. NON-IDLE WAITS AS % AVAIL. ORACLE IDLE AS % AVAIL.\n---------------------------\
    \ -------------------------- -----------------------\n31.97                  \
    \     129.59                     0\n```\n\nAs indicated by the non-idle waits,\
    \ this database is clearly under a heavy load. Now that we know we have a problem\
    \ relating to waiting for resources, the next question is to determine specifically\
    \ where the waits occur. The following query details where Oracle is spending\
    \ its wait time. The query uses some standard SQL*Plus formatting commands to\
    \ make the output more readable:\n\n```sql\ncol wait_class format A15\ncol event\
    \ format A35 trunc\ncol \"CLASS AS % OF WHOLE\" format 990.00 HEAD \"CLASS AS|%\
    \ OF WHOLE\"\ncol \"EVENT AS % OF CLASS\" like \"CLASS AS % OF WHOLE\" HEAD \"\
    EVENT AS|% OF CLASS\"\ncol \"EVENT AS % OF WHOLE\" like \"CLASS AS % OF WHOLE\"\
    \ HEAD \"EVENT AS|% OF WHOLE\"\nset pagesize 30\nbreak on wait_class on \"CLASS\
    \ AS % OF WHOLE\"\n--\n\nselect\nwait_class,\nround(100 * time_class / total_waits,\
    \ 2) \"CLASS AS % OF WHOLE\", event,\nround(100 * time_waited / time_class, 2)\
    \ \"EVENT AS % OF CLASS\", round(100 * time_waited / total_waits, 2) \"EVENT AS\
    \ % OF WHOLE\"\nfrom\n(select\nwait_class\n,event\n,time_waited\n,sum(time_waited)\
    \ over (partition by wait_class) time_class\n,rank() over (partition by wait_class\
    \ order by time_waited desc) rank_within_class\n,sum(time_waited) over () total_waits\n\
    from v$system_event\nwhere wait_class <> 'Idle')\nwhere rank_within_class <= 3\n\
    order by time_class desc, rank_within_class;\n```\n\nHere is a snippet of the\
    \ output:\n\n```\n                   CLASS AS     EVENT AS     EVENT AS\nWAIT_CLASS\
    \         % OF WHOLE   % OF CLASS   % OF WHOLE\n------------ --------------- ------------\
    \ ------------\nSystem I/O           15.50        60.14         9.32\n       \
    \                         log file parallel write\n                          \
    \      db file parallel write    18.59         2.88\n                        \
    \        control file parallel write 17.80      2.76\n\nCommit               14.34\
    \       100.00        14.34\n                                log file sync\n\n\
    User I/O             12.40        59.47         7.37\n                       \
    \         db file scattered read\n                                db file sequential\
    \ read   26.11         3.24\n                                direct path read\
    \           5.99         0.74\n```\n\nFrom the System I/O section of the report,\
    \ the `log file parallel write` event could indicate contention in the online\
    \ redo log files. Similarly, from the User I/O section, the `db file scattered\
    \ read` wait event could indicate that excessive full table scans are being performed\
    \ by SQL queries. If you think your problem is with SQL performance, see Chapter\
    \ 19 for details on how to isolate poorly performing SQL."
