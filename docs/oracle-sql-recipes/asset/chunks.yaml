  trans: "\n# 第 3 章 ■ 从多表查询\n\n`GROUP BY`和`HAVING`子句用于挑选出共同的行。如果某给定行在两个表中各出现一次或数次，则该行的计数将相同，从而会被`HAVING`子句中的条件排除。如果计数不同，该行将随其在一个表中出现而另一个表中未出现的次数（反之亦然）一同显示在结果中。由于我们在此查询中包含了主键，因此您在每个表中最多只会看到一个非共同行。\n\
    \n图 3-4 展示了结果集的维恩图。\n\n**图 3-4.** 用于查找组件查询之间唯一行的 Oracle 集合操作\n\n使用标准集合表示法，您所寻找的结果可更简洁地表达为：\n\
    \n`NOT (Query1 INTERSECT Query2)`\n\n虽然 Oracle 语法确实有`NOT`和`INTERSECT`，但 Oracle\
    \ 集合运算符不支持使用`NOT`。因此，您必须按照解决方案中所示，使用`UNION ALL`和`GROUP BY`来编写查询，以提供图 3-4 所标识的结果。即使\
    \ Oracle 支持在集合运算符中使用`NOT`，您仍需使用提供的解决方案来确定每个非共同行在每个组件查询中存在多少个。\n\n## 3-10. 生成测试数据\n\
    \n### 问题\n\n您希望组合两个或多个没有共同列的表，以生成测试数据或作为来自两个或多个表的所有可能值组合的模板。\n\n例如，您正在编写一个嵌入式\
    \ Oracle 数据库应用程序，以帮助在下一场 21 点游戏中计牌，并且您希望以最少的努力生成 52 张牌组的模板表。\n\n### 解决方案\n\n在四种花色（红桃、梅花、方块和黑桃）的集合与\
    \ 13 个点数（A、2-10、J、Q、K）之间使用`CROSS JOIN`结构。例如：\n\n```sql\ncreate table card_deck\n\
    (suit_rank varchar2(5),\n card_count number)\n;\n\ninsert into card_deck\nselect\
    \ rank || '-' || suit, 0 from\n(select 'A' rank from dual\n union all\n select\
    \ '2' from dual\n union all\n select '3' from dual\n union all\n select '4' from\
    \ dual\n union all\n select '5' from dual\n union all\n select '6' from dual\n\
    \ union all\n select '7' from dual\n union all\n select '8' from dual\n union\
    \ all\n select '9' from dual\n union all\n select '10' from dual\n union all\n\
    \ select 'J' from dual\n union all\n select 'Q' from dual\n union all\n select\
    \ 'K' from dual)\ncross join\n(select 'S' suit from dual\n union all\n select\
    \ 'H' from dual\n union all\n select 'D' from dual\n union all\n select 'C' from\
    \ dual)\n;\n\nselect suit_rank from card_deck;\n\nSUIT_RANK\n---------\nA-S\n\
    2-S\n3-S\n4-S\n5-S\n6-S\n. . .\n10-C\nJ-C\nQ-C\nK-C\n\n52 rows selected\n```\n\
    \n### `DUAL` 表\n\n`DUAL` 表在许多情况下都很方便。它在过去 20 年的每个 Oracle 版本中都可用，包含一行一列。当您不需要从任何特定表中检索数据而只想返回一个值时，它非常有用。您也可以使用\
    \ `DUAL` 表通过内置函数执行临时计算，如本例所示：\n\n```sql\nselect sqrt(144) from dual;\n\nSQRT(144)\n\
    ---------\n        12\n```\n\n如果您已经将花色和点数存储在两个现有表中，这条 SQL 语句同样有效。在这种情况下，您会引用这两个表，而不是编写那些涉及对`DUAL`表进行`UNION`操作的长子查询。例如：\n\
    \n```sql\nselect rank || '-' || suit, 0 from\n  card_ranks\ncross join\n  card_suits\n\
    ;\n```\n\n### 工作原理\n\n使用`CROSS JOIN`（也称为笛卡尔积）很少是故意的。如果您没有在两个表之间指定连接条件，则结果中的行数将是每个表中行数的乘积。这通常不是期望的结果！作为一个通用规则，对于包含*n*个表的查询，您需要至少指定*n-1*个连接条件以避免笛卡尔积。\n"
- fmt: "If your card games usually involve using one or two jokers in the deck, you\
    \ can tack them onto the end as easily as this:\n```sql\nselect rank || '-' ||\
    \ suit, 0 from\n(select 'A' rank from dual\n union all\n select '2' from dual\n\
    \ . . .\n select 'C' from dual)\nunion (select 'J1', 0 from dual)\nunion (select\
    \ 'J2', 0 from dual)\n;\n```\nUsing the pre-Oracle9 *i* syntax (Oracle proprietary\
    \ syntax), you can rewrite the original query as follows:\n```sql\nselect rank\
    \ || '-' || suit, 0 from\ncard_ranks, card_suits\n;\n```\nIt’s odd to see a multi-table\
    \ join using the proprietary Oracle syntax and no `WHERE` clause, but it produces\
    \ the results you want!\n\n### 3-11\\. Updating Rows Based on Data in Other Tables\n\
    \n#### Problem\nYou want to update some or all rows in your table based on individual\
    \ values or aggregates in the same or another table. The values used to update\
    \ the query are dependent on column values in the table to be updated.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 3 ■ QUERYING FROM MULTIPLE TABLES\n\n#### Solution\nUse a correlated\
    \ update to link the values in the subquery to the main table in the `UPDATE`\
    \ clause. In the following example, you want to update all employee salaries to\
    \ 10% more than the average salary for their department:\n```sql\nupdate employees\
    \ e\nset salary = (select avg(salary)*1.10\n              from employees se\n\
    \              where se.department_id = e.department_id)\n;\n```\n```\n107 rows\
    \ updated\n```\n\n#### How It Works\nFor each row in the `EMPLOYEES` table, the\
    \ current salary is updated with 10% more than the average salary for their department.\
    \ The subquery will always return a single row since it has an aggregate with\
    \ no `GROUP BY`. Note that this query shows Oracle’s read consistency feature\
    \ in action: Oracle preserves the original salary value for each employee to compute\
    \ the average while updating each employee’s salary in the same `UPDATE` statement.\n\
    \nCorrelated updates are much like correlated subqueries (discussed elsewhere\
    \ in this chapter): you link one or more columns in the main part of the query\
    \ with the corresponding columns in the subquery. When performing correlated updates,\
    \ take special note of how many rows are updated; coding the subquery incorrectly\
    \ can often update most values in the table with `NULL` or incorrect values!\n\
    \nIn fact, the solution provided will fail if an employee does not have a department\
    \ assigned. The correlated subquery will return `NULL` in this scenario because\
    \ a `NULL` department value will never match any other department values that\
    \ are `NULL`, and thus the employee will be assigned a `SALARY` of `NULL`. To\
    \ fix this problem, add a filter in the `WHERE` clause:\n```sql\nupdate employees\
    \ e\nset salary = (select avg(salary)*1.10\n              from employees se\n\
    \              where se.department_id = e.department_id)\nwhere department_id\
    \ is not null\n;\n```\n```\n106 rows updated\n```\nAll employees without an assigned\
    \ department will keep their existing salary. Another way to accomplish the same\
    \ thing is by using the `NVL` function in the `SET` clause to check for `NULL`\
    \ values:\n```sql\nupdate employees e\nset salary = nvl((select avg(salary)*1.10\n\
    \                  from employees se\n                  where se.department_id\
    \ = e.department_id),salary)\n;\n```\n```\n107 rows updated\n```\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 3 ■ QUERYING FROM MULTIPLE TABLES\nThis option may not be as desirable\
    \ from an I/O perspective or in terms of redo log file usage, since all rows will\
    \ be updated whether they have a department assigned or not.\n\n### 3-12\\. Manipulating\
    \ and Comparing NULLs in Join Conditions\n\n#### Problem\nYou want to map `NULL`\
    \ values in a join column to a default value that will match a row in the joined\
    \ table, thus avoiding the use of an outer join.\n\n#### Solution\nUse the `NVL`\
    \ function to convert `NULL` values in the foreign key column of the table to\
    \ be joined to its parent table. In this example, holiday parties are scheduled\
    \ for each department, but several employees do not have a department assigned.\
    \ Here is one of them:\n```sql\nselect employee_id, first_name, last_name, department_id\n\
    from employees\nwhere employee_id = 178\n;\n```\n```\nEMPLOYEE_ID FIRST_NAME \
    \             LAST_NAME                 DEPARTMENT_ID\n------------- ---------------\
    \ --------------- -----------------\n        178 Kimberely              Grant\n\
    1 rows selected\n```\nTo ensure that each employee will attend a holiday party,\
    \ convert all `NULL` department codes in the `EMPLOYEES` table to department 110\
    \ (Accounting) in the query as follows:\n```sql\nselect employee_id, first_name,\
    \ last_name, d.department_id, department_name\nfrom employees e\njoin departments\
    \ d\non nvl(e.department_id,110) = d.department_id\n;\n```\n```\nEMPLOYEE_ID FIRST_NAME\
    \              LAST_NAME                 DEPARTMENT_ID DEPARTMENT_NAME\n-------------\
    \ --------------- --------------- ----------------- ------------------\n     \
    \   200 Jennifer                Whalen                              10 Administration\n\
    \        201 Michael                 Hartstein                           20 Marketing\n\
    \        202 Pat                     Fay                                 20 Marketing\n\
    \        114 Den                     Raphaely                            30 Purchasing\n\
    \        115 Alexander               Khoo                                30 Purchasing\n\
    . . .\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## CHAPTER 3 ■ QUERYING\
    \ FROM MULTIPLE TABLES\n        113 Luis                    Popp             \
    \                  100 Finance\n        178 Kimberely              Grant     \
    \                         110 Accounting\n        205 Shelley                \
    \ Higgins                            110 Accounting\n        206 William     \
    \            Gietz                              110 Accounting\n107 rows selected\n\
    ```\n\n#### How It Works\nMapping columns with `NULL`s to non-`NULL` values in\
    \ a join condition to avoid using an `OUTER JOIN` might still have performance\
    \ problems, since the index on `EMPLOYEES.DEPARTMENT_ID` will not be used during\
    \ the join (primarily because `NULL` columns are not indexed). You can address\
    \ this new problem by using a function-based index (FBI). An FBI creates an index\
    \ on an expression, and may use that index if the expression appears in a join\
    \ condition or a `WHERE` clause. Here is how to create an FBI on the `DEPARTMENT_ID`\
    \ column:\n```sql\ncreate index employees_dept_fbi on employees(nvl(department_id,110));\n\
    ```\n■ **Tip** As of Oracle Database 11 *g*, you can now use *virtual columns*\
    \ as an alternative to FBIs. Virtual columns are derived from constants, functions,\
    \ and columns from the same table. You can define indexes on the virtual columns,\
    \ which the optimizer will use in any query as it would a regular column index.\n\
    \nUltimately, the key to handling `NULL`s in join conditions is based on knowing\
    \ your data. If at all possible, avoid joining on columns that may have `NULL`s,\
    \ or ensure that every column you will join on has a default value when it is\
    \ populated. If the column must have `NULL`s, use functions like `NVL`, `NVL2`,\
    \ and `COALESCE` to convert `NULL`s before joining; you can create function-based\
    \ indexes to offset any performance issues with joining on expressions. If that\
    \ is not possible, understand the business rules about what `NULL`s mean in your\
    \ database columns: do they mean zero, unknown, or not applicable? Your SQL code\
    \ must reflect the business definition of columns that can have `NULL`s.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# C H A P T E R 4\n## Creating\
    \ and Deriving Data\nStoring your data in the database is only half the story.\
    \ The other half is making that data available to users in ways they can comprehend.\
    \ When you extract data from the database, either in a report format or one row\
    \ at a time on a data maintenance page, the values in each row are often not suitable\
    \ for display for a number of reasons. Usually, your data is highly normalized\
    \ for performance and maintenance reasons—storing each part of a name in a different\
    \ column or using a numeric code set that references the full text descriptions\
    \ in another table. Other normalization-related scenarios include storing numeric\
    \ quantities or prices across several rows or within several columns in the same\
    \ row, and not storing a sum or other transformations within the table.\n\nAs\
    \ a result of a highly normalized database, you often must perform some transformations\
    \ to make it easy for end-users to interpret the results of a report by creating\
    \ new values on the fly. You may want to perform transformations on single columns,\
    \ on several columns within a single row, or on one or more columns across multiple\
    \ rows within one or many tables. This chapter has recipes to cover all of these\
    \ scenarios."
  raw: 'If your card games usually involve using one or two jokers in the deck, you
    can tack them onto the end as easily as this:


    select rank || ''-'' || suit, 0 from


    (select ''A'' rank from dual


    union all


    select ''2'' from dual


    . . .


    select ''C'' from dual)


    union (select ''J1'', 0 from dual)


    union (select ''J2'', 0 from dual)


    ;


    Using the pre-Oracle9 *i* syntax (Oracle proprietary syntax), you can rewrite
    the original query as follows:


    select rank || ''-'' || suit, 0 from


    card_ranks, card_suits


    ;


    It’s odd to see a multi-table join using the proprietary Oracle syntax and no
    WHERE clause, but it produces the results you want!


    3-11\. Updating Rows Based on Data in Other Tables


    Problem


    You want to update some or all rows in your table based on individual values or
    aggregates in the same or another table. The values used to update the query are
    dependent on column values in the table to be updated.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ QUERYING FROM MULTIPLE TABLES


    Solution


    Use a correlated update to link the values in the subquery to the main table in
    the UPDATE clause. In the following example, you want to update all employee salaries
    to 10% more than the average salary for their department:


    update employees e


    set salary = (select avg(salary)*1.10


    from employees se


    where se.department_id = e.department_id)


    ;


    107 rows updated


    How It Works


    For each row in the EMPLOYEES table, the current salary is updated with 10% more
    than the average salary for their department. The subquery will always return
    a single row since it has an aggregate with no GROUP BY. Note that this query
    shows Oracle’s read consistency feature in action: Oracle preserves the original
    salary value for each employee to compute the average while updating each employee’s
    salary in the same UPDATE statement.


    Correlated updates are much like correlated subqueries (discussed elsewhere in
    this chapter): you link one or more columns in the main part of the query with
    the corresponding columns in the subquery. When performing correlated updates,
    take special note of how many rows are updated; coding the subquery incorrectly
    can often update most values in the table with NULL or incorrect values!


    In fact, the solution provided will fail if an employee does not have a department
    assigned. The correlated subquery will return NULL in this scenario because a
    NULL department value will never match any other department values that are NULL,
    and thus the employee will be assigned a SALARY of NULL. To fix this problem,
    add a filter in the WHERE clause:


    update employees e


    set salary = (select avg(salary)*1.10


    from employees se


    where se.department_id = e.department_id)


    where department_id is not null


    ;


    106 rows updated


    All employees without an assigned department will keep their existing salary.
    Another way to accomplish the same thing is by using the NVL function in the SET
    clause to check for NULL values: update employees e


    set salary = nvl((select avg(salary)*1.10


    from employees se


    where se.department_id = e.department_id),salary)


    ;


    107 rows updated


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ QUERYING FROM MULTIPLE TABLES


    This option may not be as desirable from an I/O perspective or in terms of redo
    log file usage, since all rows will be updated whether they have a department
    assigned or not.


    3-12\. Manipulating and Comparing NULLs in Join Conditions


    Problem


    You want to map NULL values in a join column to a default value that will match
    a row in the joined table, thus avoiding the use of an outer join.


    Solution


    Use the NVL function to convert NULL values in the foreign key column of the table
    to be joined to its parent table. In this example, holiday parties are scheduled
    for each department, but several employees do not have a department assigned.
    Here is one of them:


    select employee_id, first_name, last_name, department_id


    from employees


    where employee_id = 178


    ;


    EMPLOYEE_ID FIRST_NAME LAST_NAME DEPARTMENT_ID


    ------------- --------------- --------------- -----------------


    178 Kimberely Grant


    1 rows selected


    To ensure that each employee will attend a holiday party, convert all NULL department
    codes in the EMPLOYEES table to department 110 (Accounting) in the query as follows:
    select employee_id, first_name, last_name, d.department_id, department_name from
    employees e join departments d


    on nvl(e.department_id,110) = d.department_id


    ;


    EMPLOYEE_ID FIRST_NAME LAST_NAME DEPARTMENT_ID DEPARTMENT_NAME


    ------------- --------------- --------------- ----------------- ------------------


    200 Jennifer Whalen 10 Administration 201 Michael Hartstein 20 Marketing 202 Pat
    Fay 20 Marketing 114 Den Raphaely 30 Purchasing 115 Alexander Khoo 30 Purchasing


    . . .


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 3 ■ QUERYING FROM MULTIPLE TABLES


    113 Luis Popp 100 Finance **178 Kimberely Grant 110 Accounting** 205 Shelley Higgins
    110 Accounting 206 William Gietz 110 Accounting 107 rows selected


    How It Works


    Mapping columns with NULLs to non-NULL values in a join condition to avoid using
    an OUTER JOIN might still have performance problems, since the index on EMPLOYEES.DEPARTMENT_ID
    will not be used during the join (primarily because NULL columns are not indexed).
    You can address this new problem by using a function-based index (FBI). An FBI
    creates an index on an expression, and may use that index if the expression appears
    in a join condition or a WHERE clause. Here is how to create an FBI on the DEPARTMENT_ID
    column:


    create index employees_dept_fbi on employees(nvl(department_id,110));


    ■ **Tip** As of Oracle Database 11 *g*, you can now use *virtual columns* as an
    alternative to FBIs. Virtual columns are derived from constants, functions, and
    columns from the same table. You can define indexes on the virtual columns, which
    the optimizer will use in any query as it would a regular column index.


    Ultimately, the key to handling NULLs in join conditions is based on knowing your
    data. If at all possible, avoid joining on columns that may have NULLs, or ensure
    that every column you will join on has a default value when it is populated. If
    the column must have NULLs, use functions like NVL, NVL2, and COALESCE to convert
    NULLs before joining; you can create function-based indexes to offset any performance
    issues with joining on expressions. If that is not possible, understand the business
    rules about what NULLs mean in your database columns: do they mean zero, unknown,
    or not applicable? Your SQL code must reflect the business definition of columns
    that can have NULLs.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 4**


    ■ ■ ■


    **Creating and Deriving Data**


    Storing your data in the database is only half the story. The other half is making
    that data available to users in ways they can comprehend. When you extract data
    from the database, either in a report format or one row at a time on a data maintenance
    page, the values in each row are often not suitable for display for a number of
    reasons. Usually, your data is highly normalized for performance and maintenance
    reasons—storing each part of a name in a different column or using a numeric code
    set that references the full text descriptions in another table. Other normalization-related
    scenarios include storing numeric quantities or prices across several rows or
    within several columns in the same row, and not storing a sum or other transformations
    within the table.


    As a result of a highly normalized database, you often must perform some transformations
    to make it easy for end-users to interpret the results of a report by creating
    new values on the fly. You may want to perform transformations on single columns,
    on several columns within a single row, or on one or more columns across multiple
    rows within one or many tables. This chapter has recipes to cover all of these
    scenarios.'
  trans: "\n如果你的纸牌游戏通常会在牌组中使用一到两张王牌，你可以像这样轻松地将它们附加到末尾：\n```sql\nselect rank || '-'\
    \ || suit, 0 from\n(select 'A' rank from dual\n union all\n select '2' from dual\n\
    \ . . .\n select 'C' from dual)\nunion (select 'J1', 0 from dual)\nunion (select\
    \ 'J2', 0 from dual)\n;\n```\n使用 Oracle9 *i* 之前的语法（Oracle 专有语法），你可以重写原始查询如下：\n\
    ```sql\nselect rank || '-' || suit, 0 from\ncard_ranks, card_suits\n;\n```\n使用\
    \ Oracle 专有语法进行多表连接且没有 `WHERE` 子句虽然看似奇怪，但它确实能产生你想要的结果！\n\n### 3-11. 基于其他表中的数据更新行\n\
    \n#### 问题\n你希望根据同一张表或另一张表中的单个值或聚合值，来更新表中的部分或所有行。用于更新查询的值依赖于被更新表中的列值。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第三章 ■ 从多张表中查询\n\n#### 解决方案\n使用关联更新将子查询中的值与 `UPDATE` 子句中的主表链接起来。在下面的示例中，你希望将所有员工的薪资更新为其部门平均薪资的\
    \ 110%：\n```sql\nupdate employees e\nset salary = (select avg(salary)*1.10\n \
    \             from employees se\n              where se.department_id = e.department_id)\n\
    ;\n```\n```\n107 行已更新\n```\n\n#### 工作原理\n对于 `EMPLOYEES` 表中的每一行，当前薪资都会被更新为该部门平均薪资的\
    \ 110%。由于该子查询包含聚合但没有 `GROUP BY`，它将始终返回一行。请注意，此查询展示了 Oracle 的读一致性特性正在生效：Oracle\
    \ 在更新同一 `UPDATE` 语句中每位员工的薪资时，会保留每位员工的原始薪资值来计算平均值。\n\n关联更新与关联子查询（本章其他地方会讨论）非常相似：你将查询主体部分的一个或多个列与子查询中的相应列链接起来。执行关联更新时，请特别注意更新了多少行；错误地编写子查询常常会用\
    \ `NULL` 或错误值更新表中的大多数值！\n\n事实上，如果某位员工没有被分配部门，提供的解决方案将会失败。在这种情况下，关联子查询将返回 `NULL`，因为\
    \ `NULL` 部门值永远不会匹配任何其他也是 `NULL` 的部门值，因此该员工的 `SALARY` 将被设为 `NULL`。要解决此问题，请在 `WHERE`\
    \ 子句中添加一个过滤器：\n```sql\nupdate employees e\nset salary = (select avg(salary)*1.10\n\
    \              from employees se\n              where se.department_id = e.department_id)\n\
    where department_id is not null\n;\n```\n```\n106 行已更新\n```\n所有没有分配部门的员工将保留其现有薪资。另一种实现相同效果的方法是在\
    \ `SET` 子句中使用 `NVL` 函数来检查 `NULL` 值：\n```sql\nupdate employees e\nset salary =\
    \ nvl((select avg(salary)*1.10\n                  from employees se\n        \
    \          where se.department_id = e.department_id),salary)\n;\n```\n```\n107\
    \ 行已更新\n```\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第三章 ■ 从多张表中查询\n\
    从 I/O 角度或重做日志文件使用情况来看，此选项可能不太理想，因为无论行是否有关联部门，所有行都将被更新。\n\n### 3-12. 在连接条件中操作和比较\
    \ NULL\n\n#### 问题\n你希望将连接列中的 `NULL` 值映射到一个默认值，该值将与被连接表中的一行匹配，从而避免使用外连接。\n\n####\
    \ 解决方案\n使用 `NVL` 函数将要连接到其父表的表的外键列中的 `NULL` 值进行转换。在此示例中，为每个部门安排了节日聚会，但有几位员工没有分配部门。这是其中一位：\n\
    ```sql\nselect employee_id, first_name, last_name, department_id\nfrom employees\n\
    where employee_id = 178\n;\n```\n```\nEMPLOYEE_ID FIRST_NAME              LAST_NAME\
    \                 DEPARTMENT_ID\n------------- --------------- ---------------\
    \ -----------------\n        178 Kimberely              Grant\n已选择 1 行\n```\n\
    为确保每位员工都将参加节日聚会，在查询中将 `EMPLOYEES` 表中所有为 `NULL` 的部门代码转换为部门 110（会计部），如下所示：\n```sql\n\
    select employee_id, first_name, last_name, d.department_id, department_name\n\
    from employees e\njoin departments d\non nvl(e.department_id,110) = d.department_id\n\
    ;\n```\n```\nEMPLOYEE_ID FIRST_NAME              LAST_NAME                 DEPARTMENT_ID\
    \ DEPARTMENT_NAME\n------------- --------------- --------------- -----------------\
    \ ------------------\n        200 Jennifer                Whalen             \
    \                 10 Administration\n        201 Michael                 Hartstein\
    \                           20 Marketing\n        202 Pat                    \
    \ Fay                                 20 Marketing\n        114 Den          \
    \           Raphaely                            30 Purchasing\n        115 Alexander\
    \               Khoo                                30 Purchasing\n. . .\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第三章 ■ 从多张表中查询\n        113 Luis                    Popp                 \
    \              100 Finance\n        178 Kimberely              Grant         \
    \                     110 Accounting\n        205 Shelley                 Higgins\
    \                            110 Accounting\n        206 William             \
    \    Gietz                              110 Accounting\n已选择 107 行\n```\n\n####\
    \ 工作原理\n在连接条件中将包含 `NULL` 的列映射到非 `NULL` 值以避免使用 `OUTER JOIN`，可能仍然存在性能问题，因为在连接期间将不会使用\
    \ `EMPLOYEES.DEPARTMENT_ID` 上的索引（主要是因为 `NULL` 列不会被索引）。你可以通过使用基于函数的索引来解决这个新问题。FBI\
    \ 在表达式上创建索引，如果该表达式出现在连接条件或 `WHERE` 子句中，优化器可能会使用该索引。以下是如何在 `DEPARTMENT_ID` 列上创建\
    \ FBI：\n```sql\ncreate index employees_dept_fbi on employees(nvl(department_id,110));\n\
    ```\n■ **提示** 从 Oracle Database 11 *g* 开始，你现在可以使用*虚拟列*作为 FBI 的替代方案。虚拟列源自常量、函数以及同一表中的列。你可以在虚拟列上定义索引，优化器将在任何查询中使用这些索引，就像使用常规列索引一样。\n\
    \n最终，处理连接条件中的 `NULL` 的关键在于了解你的数据。如果可能，避免在可能包含 `NULL` 的列上进行连接，或者确保你将用于连接的每个列在填充时都有默认值。如果该列必须包含\
    \ `NULL`，请在连接前使用 `NVL`、`NVL2` 和 `COALESCE` 等函数将 `NULL` 转换掉；你可以创建基于函数的索引来抵消在表达式上连接的任何性能问题。如果无法做到这一点，请了解你的数据库列中\
    \ `NULL` 的业务规则含义：它们是表示零、未知还是不适用？你的 SQL 代码必须反映可以包含 `NULL` 的列的业务定义。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第四章\n## 创建和派生数据\n将数据存储在数据库中只是故事的一半。另一半是以用户能够理解的方式使这些数据可用。当你从数据库中提取数据时，无论是在报表格式中，还是在数据维护页面上一次提取一行，每行中的值通常由于多种原因而不适合直接显示。通常，你的数据为了性能和维护原因而高度规范化——将名称的各个部分存储在不同的列中，或者使用数字代码集来引用另一张表中的完整文本描述。其他与规范化相关的场景包括将数量或价格存储在多行或同一行的多个列中，以及不在表中存储总和或其他转换结果。\n\
    \n由于数据库高度规范化，你通常必须执行一些转换，通过即时创建新值，使最终用户能够轻松解读报表结果。你可能希望对单列、单行中的多个列，或者对一个或多个表中的多行中的一个或多个列执行转换。本章包含涵盖所有这些场景的解决方案。\n"
- fmt: "# 4-1. Deriving New Columns\n\n## Problem\n\n你不想在数据库表中存储冗余数据，但希望能够为行中的列创建总计、派生值或替代格式。\n\
    \n## Solution\n\n在 `SELECT` 语句中，对表中的一个或多个列应用 Oracle 内置函数或创建表达式，从而在查询结果中创建一个虚拟列。例如，假设你想要汇总员工的总薪酬，将工资和佣金结合起来。\n\
    \n在 Oracle 默认安装中包含的 OE 用户示例表中，`ORDER_ITEMS` 表包含 `UNIT_PRICE` 和 `QUANTITY` 列，如下所示：\n\
    \n```\nselect * from order_items;\n\nORDER_ID LINE_ITEM_ID PRODUCT_ID UNIT_PRICE\
    \ QUANTITY\n--------- ------------ ---------- ---------- --------\n2423     7\
    \            3290       65         33\n2426     5            3252       25   \
    \      29\n2427     7            2522       40         22\n2428     11       \
    \    3173       86         28\n2429     10           3165       36         67\n\
