    as mentioned, it only deals with the Gregorian calendar. This means that it’s
    not accurate for finding the Orthodox Easter. Secondly, for the same reason, we
    can’t reliably predict Easter for years prior to the adoption of the first adoption
    of Gregorian calendar in 1582.


    6-14\. Calculating “X Day Active” Users for a Web Site


    Problem


    You want to track how many unique web site visitors or customers you’ve had in
    the last seven days.


    Solution


    Oracle’s date arithmetic together with the DISTINCT operator for dealing with
    duplicates are the perfect tools for tracking details like seven-day or one-month
    active users. In fact, any duration window can be tracked. The main consideration
    is adapting the technique to the way the visitor or customer data is collected
    and stored.


    For our recipe, we’ll use the sales history data collected in the SH.SALES table.
    This tracks simple data like customer ID, the date and time a purchase was made,
    and the sales channel used. This mimics what many web sites collect for their
    shopping cart data. Where you wish to track simple visitors, this kind of data
    is analogous to a web server log that tracks visitor IP address, page requested,
    and date and time of request.


    Use this SQL statement to show customers making a purchase in the seven days up
    to December 31, 2001.


    select count(distinct cust_id) Seven_Day_Customers


    from sh.sales


    where time_id > to_date(''31-DEC-2001'') - 7;


    Our results indicate the number of unique customers who have placed orders in
    the last seven days.


    SEVEN_DAY_CUSTOMERS


    How It Works


    Oracle supports the COUNT(DISTINCT …) aggregate function to enable you to count
    distinct rows with data. We use this in our SELECT clause to count our unique
    customers. The sole criterion in the WHERE


    clause acts to control our time window. Our use of TIME_ID > TO_DATE(''31-DEC-2001'')
    - 7 is a shorthand way of writing this criterion.


    where time_id between to_date(''24-DEC-2001'') and to_date(''31-DEC-2001'') 164


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 6 ■ WORKING WITH DATE AND TIME VALUES


    This saves us from having to write a nested subquery to first find the unique
    values, and then an outer query to count those unique values. That’s still perfectly
    legal SQL, and we could write our recipe to use the nested subquery if required,
    as shown in the next SQL statement.


    select count(*) Seven_Day_Customers


    from


    (select distinct cust_id


    from sh.sales


    where time_id > to_date(''31-DEC-2001'') - 7


    );


    If we had simply counted all the customer IDs noted in the seven-day range, we
    would have included repeat purchases by the same client, which is not what our
    problem statement set out to find.


    select count(cust_id) Seven_Day_Sales


    from sh.sales


    where time_id > to_date(''31-DEC-2001'') - 7;


    SEVEN_DAY_SALES


    It is good to know we made 4807 sales in that week, but we’re missing the vital
    detail of how many unique clients bought our products.


    A more general form of the recipe to find unique seven-day customers would target
    the most recent data, based on using the current date returned from SYSDATE or
    CURRENT_DATE. The next statement shows this general form.


    select count(distinct cust_id) Seven_Day_Customers


    from sh.sales


    where time_id between sysdate and sysdate - 7;


    Note that if you run this against the SH.SALES table in the Oracle example SH
    schema, you won’t see any data returned, as there are no sales after 2001 in that
    table. However, the applicability remains.


    ■ **Caution** Because we are using the COUNT(DISTINCT …) form of the COUNT aggregate,
    we do *not* count NULL


    values encountered in the CUST_ID field. This is a moot point in this instance,
    as there are no such NULL values in the SH.SALES table for CUST_ID. However, it
    is important to remember that only the COUNT(*) form of the COUNT


    function observes NULL values. All other types of COUNT ignore NULL values.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


