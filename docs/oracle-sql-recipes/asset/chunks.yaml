    # 1-9. 从表中移除不需要的行


    ## 问题

    一名员工已入职另一家公司，你需要将其详细信息从 `HR.EMPLOYEE` 表中移除。


    ## 解决方案

    假设 James Landry，其 `EMPLOYEE_ID` 为 127，已入职另一家公司。你可以使用 `DELETE` 语句来移除 James 的详细信息。


    ```sql

    delete

    from hr.employees

    where employee_id = 127;

    ```


    ## 工作原理

    本方法演示了基本的 `DELETE` 语句，在 `FROM` 子句中目标表为 `HR.EMPLOYEES`。`WHERE` 子句提供了用于仅影响符合指定条件行的谓词。


    可以构建没有 `WHERE` 子句的 `DELETE` 语句，这实际上会匹配表中的所有行。在这种情况下，表中的所有行都将被删除。


    ```sql

    delete

    from hr.employees;

    ```


    **注意**：如果你确实运行了上述任一 `DELETE` 语句，并且希望在后续方法中继续使用 `HR.EMPLOYEES` 数据，请不要忘记回滚。


    # 1-10. 从表中移除所有行


    ## 问题

    你希望移除给定表的所有数据。


    ## 解决方案

    使用 `DELETE` 语句删除表中的所有行，允许 Oracle 完整记录该操作，这样如果你意外执行了此语句，可以进行回滚。但同样的记录操作及其所需时间，意味着使用
    `DELETE` 语句有时对于期望的结果来说太慢了。


    Oracle 提供了一种补充技术来移除表中的所有数据，称为 `TRUNCATE`。要截断 `HR.EMPLOYEES` 表，我们使用以下 SQL 语句：


    ```sql

    truncate table hr.employees;

    ```


    ## 工作原理

    执行 `TRUNCATE` 语句时不使用 `WHERE` 子句谓词或其他修饰符。该语句被视为 DDL（数据定义语言）SQL，这对事务有其他影响，例如隐式提交其他未完成的事务。有关事务控制和监控方法的更多详情，请参阅第
    9 章。


    使用 `TRUNCATE` 命令还会重置表的高水位线，这意味着当 Oracle 执行优化器计算（包括判断表中已用容量的影响）时，它会将该表视为从未有数据占用过任何空间。


    # 1-11. 从另一个查询的结果中选择


    ## 问题

    你需要将查询的结果视作表的内容。你不希望存储中间结果，因为每次运行查询时都需要重新生成它们。


    ## 解决方案

    Oracle 的内联视图功能允许将查询包含在语句的 `FROM` 子句中，并使用表别名来引用结果。


    ```sql

    select d.department_name

    from

    (select department_id, department_name

    from hr.departments

    where location_id != 1700) d;

    ```


    结果将如下所示。


    ```

    DEPARTMENT_NAME

    ---------------

    Marketing

    Human Resources

    Shipping

    IT

    Public Relations

    Sales


    6 rows selected.

    ```


    ## 工作原理

    本方法将针对 `HR.DEPARTMENTS` 表的 `SELECT` 语句的结果视为一个内联视图，并为其命名为 “d”。虽然在这种情况下提供别名是可选的，但它使得
    SQL 更具可读性、可测试性，并且更符合标准。然后，你几乎可以像引用普通语句一样引用该语句的结果。以下是内联视图的 `SELECT` 语句的结果。


    ```

    DEPARTMENT_ID DEPARTMENT_NAME

    ------------- -----------------

    20 Marketing

    40 Human Resources

    50 Shipping

    60 IT

    70 Public Relations

    80 Sales


    6 rows selected.

    ```


    该内联视图现在的作用就像你有一个表 `D`，其结构定义如下。


    ```

    Name                                      Null?    Type

    ----------------------------------------- -------- ----------------------------

    DEPARTMENT_ID                             NOT NULL NUMBER(4)

    DEPARTMENT_NAME                           NOT NULL VARCHAR2(30)

    ```

