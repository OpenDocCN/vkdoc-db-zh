  trans: "\n## 促销重叠\n\n并且 `p2.promo_begin_date <= p1.promo_end_date`。\n\n结果以通俗的英文语言提供了重叠促销活动的详细信息。\n\
    \n### 促销重叠\n\n报纸促销活动 #16-108 在报纸促销活动 #16-441 结束前开始。\n\n报纸促销活动 #16-349 在报纸促销活动\
    \ #16-216 结束前开始。\n\n报纸促销活动 #16-349 在报纸促销活动 #16-512 结束前开始。\n\n报纸促销活动 #16-349 在报纸促销活动\
    \ #16-345 结束前开始。\n\n报纸促销活动 #16-327 在报纸促销活动 #16-330 结束前开始。\n\n…\n\n计算此类重叠的一个实际用途是动态确定哪些促销代码或优惠券代码在并发运行，并防止人们同时使用多个代码。\n\
    \n## 工作原理\n\n我们的方法是通过在 `SH.PROMOTIONS` 表中查找成对的行来实现的，其中第二行的 `PROMO_BEGIN_DATE`\
    \ 日期落在第一行的 `PROMO_BEGIN_DATE` 和 `PROMO_END_DATE` 之间的日期窗口内。\n\n该方法的 `SELECT` 部分很简单。我们将找到的两个重叠的促销活动\
    \ `P1.PROMO_NAME` 和 `P2.PROMO_NAME` 与文本连接起来，以便结果能显示为一份简明、人类可读的重叠促销活动摘要。`FROM`\
    \ 子句是我们逻辑的关键。在这里，我们将 `SH.PROMOTIONS` 表与自身连接，并在连接中将每个副本引用为 `P1` 和 `P2`。我们基于 `PROMO_CATEGORY`\
    \ 和 `PROMO_SUBCATEGORY` 进行连接，以满足我们最初在同一类别和子类别内查找重叠促销活动的条件，因此我们只连接这些字段值匹配的行。重要的是，我们包含了额外的连接条件\
    \ `P1.PROMO_ID != P2.PROMO_ID`，因为我们不想将一个促销活动与其自身连接——试图确定一个促销活动是否与自身重叠是没有意义的。\n\
    \n使用我们的连接条件对 `SH.PROMOTIONS` 表进行自连接后，我们的 `WHERE` 子句接着进行过滤，仅针对 Ad News 子类别中的报纸促销活动。同样，这是为了确保我们符合配方问题中概述的假设条件（这些条件本可以包含在连接条件中）。\n\
    \n最后两个条件用于查找第二个促销活动的开始时间发生在第一个促销活动的活动窗口期内的情况。条件 `P2.PROMO_BEGIN_DATE >= P1.PROMO_BEGIN_DATE`\
    \ 找出的连接对中，第二个促销活动在第一个促销活动日期当天或之后开始。条件 `P2.PROMO_BEGIN_DATE <= P1.PROMO_END_DATE`\
    \ 则会排除所有这些匹配项中，除了那些第二个促销活动的开始时间也发生在第一个促销活动结束之前的匹配项。\n\n## 6-4. 自动跟踪数据变更的时间\n\n\
    ### 问题\n\n你希望出于审核目的跟踪数据何时发生变更，但你当前的表设计并未为此目的包含任何专用字段。如果可能，你希望确定历史变更的日期和时间，并提供一种机制来跟踪未来的变更。\n\
    \n### 解决方案\n\n使用 Oracle 的 `ORA_ROWSCN` 伪列和 `SCN_TO_TIMESTAMP` 函数来查找行被更改的近似或确切时间。\n\
    \n下面的 SQL 演示了如何使用 `ORA_ROWSCN` 伪列和 `SCN_TO_TIMESTAMP` 函数来确定 `HR.EMPLOYEES` 表中行被更改时的\
    \ `TIMESTAMP` 值。\n\n```sql\nselect employee_id, last_name, salary,\nscn_to_timestamp(ora_rowscn)\
    \ Change_Timestamp\nfrom hr.employees;\n```\n\n```text\nEMPLOYEE_ID LAST_NAME\
    \                 SALARY CHANGE_TIMESTAMP\n----------- -------------------------\
    \ ------ -------------------------------\n        210 King                   \
    \    3510 12-SEP-09 03.54.55.000000000 PM\n        211 Sully                 \
    \     3510 12-SEP-09 03.54.55.000000000 PM\n        212 McEwen               \
    \      3510 12-SEP-09 03.54.55.000000000 PM\n        100 King                \
    \      24000 08-AUG-09 11.06.28.000000000 PM\n        101 Kochhar            \
    \       17000 08-AUG-09 11.06.28.000000000 PM\n        102 De Haan           \
    \        17000 08-AUG-09 11.06.28.000000000 PM\n...\n```\n\n### 工作原理\n"
- fmt: "# The ORA_ROWSCN Pseudo-Column\n\nThe `ORA_ROWSCN` is a pseudo-column Oracle\
    \ has supported since the release of Oracle 10*g*. By default, its value is taken\
    \ from the block-level System Change Number (`SCN`) on the block storing the row\
    \ or rows.\n\n## CHAPTER 6 ■ WORKING WITH DATE AND TIME VALUES\n\nThis `SCN` can\
    \ be seen directly with the next SQL that returns the `SCN` for the rows in our\
    \ `HR.EMPLOYEES` table.\n\n```sql\nselect employee_id, ora_rowscn\nfrom hr.employees;\n\
    \nEMPLOYEE_ID ORA_ROWSCN\n----------- ----------\n210 7824020\n211 7824020\n212\
    \ 7824020\n100 7824148\n101 7824148\n102 7824148\n…\n```\n\nThe `SCN` value is\
    \ passed to the `SCN_TO_TIMESTAMP` function, which determines at what time the\
    \ relevant `SCN` was generated by Oracle. This value is of type `TIMESTAMP`, although\
    \ Oracle states that the `TIMESTAMP` returned is only accurate to within 3 seconds,\
    \ rather than the microsecond accuracy a `TIMESTAMP` can store. Where the `SCN`\
    \ is older than the oldest `SCN` still tracked by the instance, you will receive\
    \ an “`ORA-08181: specified number is not a valid system change number`” error\
    \ message. This means that `SCN` values months or years in the past may not be\
    \ translatable using this technique.\n\n`Tip`: You can find the `TIMESTAMP` to\
    \ `SCN` relationship independently of any given row or block of data, by looking\
    \ at the `SYS.SMON_SCN_TIME` table.\n\nOne limitation of our recipe might have\
    \ struck you from the description of the SQL used, or the results. Our use of\
    \ the `ORA_ROWSCN` pseudo-column is returning the block-level `SCN`, which is\
    \ Oracle’s default level of `SCN` tracking. This means that any value updated\
    \ for a row on a given block, or any new row inserted into the block, will set\
    \ the `ORA_ROWSCN` value to the `SCN` of the relevant transaction. Because of\
    \ this, it will appear that all rows stored on a given block were changed at the\
    \ same time. You can see this in the sample results where several rows appear\
    \ to have been updated simultaneously at `12-SEP-09 03.54.55.000000000 PM`.\n\n\
    Oracle provides a table option called `ROWDEPENDENCIES` to enable tracking of\
    \ `SCN`s at the row level. This option can only be chosen at table creation time—it\
    \ can’t be activated once a table already exists. With `ROWDEPENDENCIES` in place,\
    \ Oracle will use an additional six bytes of storage for row-based `SCN`s. We\
    \ could adapt our `HR.EMPLOYEES` table by creating a new table based on its contents\
    \ with `ROWDEPENDENCIES` enabled, and then use it to track when desired data like\
    \ salary changed, by using our recipe’s `SCN_TO_TIMESTAMP` approach.\n\n## 6-5\\\
    . Generating a Gapless Time Series from Data with Gaps\n\n### Problem\n\nYou would\
    \ like to report business activity on each day of the month, but only store data\
    \ on dates on which actions like launching a new promotion occur. You’d like to\
    \ generate data for all the dates in a month, filling in the gaps in your records\
    \ and showing zero activity on days for which no data was recorded.\n\n### Solution\n\
    \nUse Oracle’s `CONNECT BY LEVEL` functionality and an `OUTER JOIN` to join date\
    \ and time data with gaps to a reference table representing all dates and/or times\
    \ you want to cover.\n\nOur recipe SQL, shown next, uses this approach to fill\
    \ in the gaps in promotions recorded in the `SH.PROMOTIONS` table for the month\
    \ of June 1998.\n\n```sql\nselect Day_Source.Day_Row Promotion_Date,\n       count(sh.promotions.promo_begin_date)\
    \ Promotions_Launched\nfrom\n  (select to_date('01-JUN-98') + rownum - 1 as Day_Row\n\
    \   from dual\n   connect by level <= 30) Day_Source\nleft outer join sh.promotions\n\
    \  on Day_Source.Day_Row = sh.promotions.promo_begin_date\ngroup by Day_Source.Day_Row\n\
    order by Day_Source.Day_Row;\n```\n\nEven though there were 14 days in June 1998\
    \ when no data was recorded in the `SH.PROMOTIONS` table, our recipe can report\
    \ full results for each day of the month, showing zero promotions for those “missing”\
    \ days.\n\n```\nPROMOTION_DATE PROMOTIONS_LAUNCHED\n-------------- -------------------\n\
    01-JUN-98      3\n02-JUN-98      6\n03-JUN-98      7\n04-JUN-98      0\n05-JUN-98\
    \      0\n06-JUN-98      1\n07-JUN-98      0\n08-JUN-98      0\n09-JUN-98    \
    \  0\n10-JUN-98      0\n```"
