    \n## CHAPTER 8 ■ WORKING WITH NUMBERS\n\n### 8-9. Automatically Rounding Numbers\n\
    \n#### Problem\n\nYou need incoming data to be automatically rounded to a given\
    \ level, without forcing users or developers to remember to use the `ROUND`, `TRUNC`\
    \ or `CEIL` functions. For instance, you need to track budget numbers in the thousands,\
    \ millions, or billions, ignoring much smaller cash amounts.\n\n#### Solution\n\
    \nOracle supplies several ways to round numbers automatically. Some people opt\
    \ for triggers while others choose PL/SQL wrappers and other automatic processing\
    \ to force the use of the `ROUND` function or similar approaches. However, Oracle\
    \ comes with the ability to round numbers to any degree of digits without needing\
    \ added code or data interception. And Oracle’s precision feature for the numeric\
    \ data types, like `NUMBER`, allows us to specify negative precision. This will\
    \ perform the rounding for us.\n\nFor our recipe, we’ll assume we’re calculating\
    \ the salary budget for all departments, but we aren’t interested in the hundreds,\
    \ tens, or units of dollars at the “small” end of our calculation. Our budget\
    \ requirements mean we’re only interested in increments of a thousand.\n\nThe\
    \ next SQL statement creates our budget tracking table. We use a negative precision\
    \ for the `SALARY_BUDGET` to manage our automatic rounding.\n\n```sql\ncreate\
    \ table hr.dept_budget\n(\n  department_id number(4,0),\n  salary_budget number(10,-3)\n\
    );\n```\n\nWe use the next `INSERT` statement to populate our `HR.DEPT_BUDGET`\
    \ table with a summary of current salary numbers.\n\n```sql\ninsert into hr.dept_budget\n\
    select department_id, sum(salary * 12)\nfrom hr.employees\ngroup by department_id;\n\
    ```\n\nAt this point, our desire to round at the thousands level has been processed\
    \ automatically. Compare the results of the next two SQL statements. First we\
    \ see our automatic rounding in action by selecting the contents of `HR.DEPT_BUDGET`.\n\
    \n```sql\nselect *\nfrom hr.dept_budget\norder by department_id;\n```\n\n```\n\
    DEPARTMENT_ID SALARY_BUDGET\n------------- -------------\n10 53000\n20 228000\n\
    30 299000\n40 78000\n50 1892000\n...\n```\n\nPerforming a raw calculation against\
    \ the base data in the `HR.EMPLOYEES` table confirms we’ve achieved our desired\
    \ outcome.\n\n```sql\nselect department_id, sum(salary * 12)\nfrom hr.employees\n\
    group by department_id\norder by department_id;\n```\n\n```\nDEPARTMENT_ID SUM(SALARY*12)\n\
    ------------- -------------\n10 52800\n20 228000\n30 298800\n40 78000\n50 1891800\n\
    ...\n```\n\nThe items in bold show our automatic rounding in action in the first\
    \ result set, and the raw data in the second result set.\n\n#### How It Works\n\
    \nIt’s easy to think of the precision specified for a number as meaning how many\
    \ significant digits are in the fractional part of a number. However, Oracle actually\
    \ implements the concept of precision in its entirety. It uses positive and negative\
    \ precision to track significant digits either side of the decimal point (or decimal\
    \ symbol for your locale).\n\nThe best way to think about the precision element\
    \ of a number is to remember this basic format.\n\n```\nnumber (<scale>, <where\
    \ precision ends>)\n```\n\nYou then interpret `<where precision ends>` as follows\n\
    - **Positive precision:** number of places to the right of the decimal symbol\
    \ at which precision ends.\n- **Negative precision:** number of places to the\
    \ left of the decimal symbol at which precision ends.\n- **Zero precision:** precision\
    \ ends at the decimal symbol.\n\nWith these easy rules in mind, you can rely on\
    \ Oracle to round your number at the point precision ends, regardless of whether\
    \ that’s to the left or right of the decimal symbol. For our recipe, we defined\
    \ the `SALARY_BUDGET` amount like this:\n\n```\nsalary_budget number(10,-3)\n\
    ```\n\nUsing our simple shorthand, we know Oracle will end its tracking of precision\
    \ three places to the left of the decimal point. That is, units, tens and hundreds,\
    \ being the first three places to the left of the decimal point will be *discarded*,\
    \ and the number rounded up or down appropriately, and *automatically*.\n\nOur\
    \ first department, number 10, has a raw salary budget of 52800. But we know that\
    \ the ‘800’ component is beyond the precision of our `SALARY_BUDGET` field, so\
    \ the value 52800 is rounded using typical mathematics rules to 53000 automatically.\
    \ This is repeated for all the values we stored, and we didn’t need to force developers\
    \ or users down the path of building triggers, wrapper functions, or remembering\
    \ to make this calculation themselves in their code.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 8 ■ WORKING WITH NUMBERS\n\n### 8-10. Automatically Generating Lists\
    \ of Numbers\n\n#### Problem\n\nYou want to generate a list of numbers for a one-time\
    \ calculation or SQL query. For instance, you need a table or view with the numbers\
    \ 1 to 1000 for ranking and position calculations, but you don’t want to create\
    \ a sequence and call it 1000 times to populate your table.\n\n#### Solution\n\
    \nOracle provides several techniques for spontaneously generating sets of numbers.\
    \ Our recipe will use Oracle’s traditional hierarchy support via the `CONNECT\
    \ BY` clause and the `ROWNUM` pseudocolumn, to build a ready-made list of numbers.\n\
    \nThe next SQL statement uses `CONNECT BY LEVEL` against the `dual` table, to\
    \ build a list of the numbers 1 to 1000.\n\n```sql\nselect rownum as my_numbers\n\
    from dual\nconnect by level <= 1000;\n```\n\nThe results are hopefully obvious,\
    \ but just in case you’re wondering, we return the numbers 1 to 1000 (with abridged\
    \ results shown here to save space).\n\n```\nMY_NUMBERS\n...\n1000 rows selected.\n\
    ```\n\nWe can use this SQL to act as an inline view or the basis of a `CREATE\
    \ TABLE AS SELECT` statement for ranking, counting, and other problems, such as\
    \ in the recipe *Filtering Results by Relative Rank*, in Chapter 11.\n\n#### How\
    \ It Works\n\nIn standard use, the `CONNECT BY` ability in Oracle relies on the\
    \ user specifying two aspects to drive Oracle to build a hierarchy. You typically\
    \ tell Oracle how one row is a child or parent of another row using the `PRIOR\
    \ ...` notation, and then you tell Oracle how to start the hierarchy by specifying\
    \ a `START WITH` clause so it can derive lower tiers or levels in the hierarchy\
    \ from there.\n\nOur recipe cheats by not doing these things! We start by telling\
    \ Oracle to simply select the `ROWNUM`..."
