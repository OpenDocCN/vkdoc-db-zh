- fmt: "This has the disadvantage of preventing the optimizer from using standard\
    \ indexes, but you can also create function-based indexes to counter this.\n\n\
    ## 1-15. Enabling Other Sorting and Comparison Options\n\n### Problem\n\nYou need\
    \ to perform case-insensitive comparisons and other sorting operations on textual\
    \ data that has been stored in an assortment of uppercase, lowercase, and sentence\
    \ case.\n\n### Solution\n\nBy activating Oracle's linguistic comparison logic,\
    \ you can use the same statement to retrieve the data a human would expect to\
    \ see, without the burden of artificial case sensitivity.\n\n```sql\nalter session\
    \ set NLS_COMP='LINGUISTIC';\n\nselect first_name, last_name\nfrom hr.employees\n\
    where last_name = 'smith';\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nCHAPTER 1 ■ THE BASICS\n\n```\nFIRST_NAME                   LAST_NAME\n--------------------\
    \ -------------------------\nWilliam              SMITH\nLindsey             \
    \ Smith\n```\n\nThis recipe relies on the same case-altering statements used in\
    \ the previous recipes. Be sure to run those statements prior to testing this\
    \ recipe in action.\n\n### How It Works\n\nHistorically, there were two ways to\
    \ treat Oracle's normal case-sensitive handling of text when designing applications.\
    \ One approach was to design the application logic to ensure data would be stored\
    \ in a consistent fashion, such as the initial-caps data you see in the `HR.EMPLOYEES`\
    \ table we've used in several recipes. The other approach allowed data to be stored\
    \ as users liked, with database and application logic used to hide any case differences\
    \ from users where they wouldn’t be expected.\n\nThis once took a great deal of\
    \ effort, but you can now achieve it with remarkably little fuss. The following\
    \ statement will retrieve no rows, because no `LAST_NAME` entered in the `HR.EMPLOYEES`\
    \ table is recorded in lowercase.\n\n```sql\nSelect first_name, last_name\nFrom\
    \ hr.employees\nWhere last_name = 'smith';\n```\n```\nno rows selected\n```\n\n\
    But our recipe manages to return the right data because it changes the session\
    \ settings, instructing Oracle to perform comparisons in linguistic fashion. Neither\
    \ version of `Smith` is stored in the lowercase form we specified in the query,\
    \ but the `NLS_COMP` parameter controls comparison and other behaviors in Oracle,\
    \ and set to `LINGUISTIC` induces what the typical person would consider normal\
    \ comparison behavior.\n\n## 1-16. Conditional Inserting or Updating Based on\
    \ Existence\n\n### Problem\n\nYou want to insert rows into a table with a key\
    \ identifier that may already be present. If the identifier is not present, a\
    \ new row should be created. If the identifier is present, the other columns for\
    \ that row should be updated with new data, rather than a new row created.\n\n\
    ### Solution\n\nThe `MERGE` statement provides the ability to insert new data\
    \ into a table, and if the proposed new primary key does not already exist in\
    \ the table, a newly created row is inserted. If the primary key matches an existing\
    \ row in a table, the statement instead updates that row with the additional details\
    \ matching that key.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nCHAPTER\
    \ 1 ■ THE BASICS\n\nFor our recipe, we’ll assume the `HR.COUNTRIES` table is to\
    \ be loaded with amended country details sourced from a `NEW_COUNTRIES` table.\n\
    \n```sql\nmerge into hr.countries c\nusing\n  (select country_id, country_name\n\
    \   from hr.new_countries) nc\non (c.country_id = nc.country_id)\nwhen matched\
    \ then\n  update set c.country_name = nc.country_name\nwhen not matched then\n\
    \  insert (c.country_id, c.country_name)\n  values (nc.country_id, nc.country_name);\n\
    ```\n\n### How It Works\n\nRather than simply inserting the source data from the\
    \ `HR.NEW_COUNTRIES` table directly into the target `HR.COUNTRIES` table—and potentially\
    \ failing on a primary key duplication error—the `MERGE` statement sets up a logic\
    \ branch to handle matched and unmatched rows based on the `ON` clause.\n\nTypically,\
    \ the `ON` clause specifies how to match primary or unique key data between the\
    \ source and target. In this recipe, that’s the matching of `COUNTRY_ID` values\
    \ like this.\n```\non (c.country_id = nc.country_id)\n```\nThis is followed by\
    \ two additional clauses, the `WHEN MATCHED THEN` clause for values that match\
    \ the `ON`"
