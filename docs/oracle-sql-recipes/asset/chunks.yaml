- fmt: "## 验证 XML 数据\n\nOracle 为 XML 数据强制实施一些特定规则。如果你的列或表是使用 XML 模式定义的，那么该模式将用于验证数据，确保必需的元素存在并且整体结构符合模式。这被称为有效性测试。如果没有使用模式，如我们的\
    \ `OE.WAREHOUSES` 表，XML 数据结构的另一个完整性检查仍然会被强制执行：也就是“格式良好”测试。在此测试中，Oracle 确保提供的 XML\
    \ 具有匹配的开始和结束标签，并且元素嵌套正确。\n\n如果你试图存储格式错误的 XML 数据，就可以看到格式良好测试的实际效果。下面的代码故意破坏了我们仓库的\
    \ XML 格式，省略了结束的 `</Warehouse>` 元素标签。\n\n```sql\n-- intentionally invalid SQL\n\
    insert into oe.warehouses\n(warehouse_id, warehouse_spec, warehouse_name, location_id)\n\
    values\n(10,\nxmltype('<?xml version=\"1.0\"?><Warehouse><Building>Owned</Building>'),\n\
    'London',\n2300);\n```\n\n```\nxmltype('<?xml version=\"1.0\"?><Warehouse><Building>Owned</Building>'),\n\
    *\nERROR at line 5:\nORA-31011: XML parsing failed\nORA-19202: Error occurred\
    \ in XML processing\nLPX-00007: unexpected end-of-file encountered\nORA-06512:\
    \ at \"SYS.XMLTYPE\", line 310\nORA-06512: at line 1\n```\n\n注意那个加粗的晦涩错误消息。意外的文件结束是\
    \ Oracle 告诉你它到达了数据末尾却没有找到预期的结束元素标签的方式。这不是世界上最好的错误消息，但现在你知道该找什么了。\n\n## 14-3\\\
    . 为关系型使用拆分 XML\n\n### 问题\n\n你需要从 XML 文档中提取单个元素值用于其他计算。例如，你需要从 XML 文档中提取文本和数值，用于计算和详细报告仓库的空间信息。\n\
    \n### 解决方案\n\nOracle 提供了 `XMLTABLE` 函数，可以使用 XQuery 和列映射到传统 Oracle 数据类型来操作 XML\
    \ 文档。通过 `XMLTABLE`，我们可以以关系的方式识别和使用 XML 文档中的数据元素。\n\n我们的下一个示例使用 `XMLTABLE` 来识别\
    \ `OE.WAREHOUSES` 表中仓库的许多细节，包括建筑类型、仓库的 floor space area、码头访问权限等。\n\n```sql\nselect\n\
    \  shredded_warehouses.\"Building\",\n  shredded_warehouses.\"FloorArea\",\n \
    \ shredded_warehouses.\"#Docks\",\n  shredded_warehouses.\"DockType\",\n  shredded_warehouses.\"\
    WaterAccess\",\n  shredded_warehouses.\"RailAccess\",\n  shredded_warehouses.\"\
    Parking\",\n  shredded_warehouses.\"VertClearance\"\nfrom oe.warehouses,\n  xmltable\n\
    \    ('/Warehouse'\n      passing warehouses.warehouse_spec\n      columns\n \
    \       \"Building\" varchar2(8) path '/Warehouse/Building',\n        \"FloorArea\"\
    \ number path '/Warehouse/Area',\n        \"#Docks\" number path '/Warehouse/Docks',\n\
    \        \"DockType\" varchar2(10) path '/Warehouse/DockType',\n        \"WaterAccess\"\
    \ varchar2(8) path '/Warehouse/WaterAccess',\n        \"RailAccess\" varchar2(7)\
    \ path '/Warehouse/RailAccess',\n        \"Parking\" varchar2(7) path '/Warehouse/Parking',\n\
    \        \"VertClearance\" varchar(9) path '/Warehouse/VClearance'\n    ) shredded_warehouses;\n\
    ```\n\n```\nBuilding  FloorArea  #Docks  DockType     WaterAcc  RailAcc  Parking\
    \  VertClear\n--------  ---------  ------  -----------  --------  -------  -------\
    \  ----------\nOwned     25000      2       Rear load    Y         N        Street\
    \   10 ft\nRented    50000      1       Side load    Y         N        Lot  \
    \    12 ft\nRented    85700      N       N            N         N        Street\
    \   11.5 ft\nOwned     103000     3       Side load    N         Y        Lot\
    \      15 ft\n```\n\n将数据拆分成表格形式后，我们就可以在普通查询、函数、PL/SQL 过程等中使用它了。\n\n### 工作原理\n\n\
    我们示例的关键是使用 `XMLTABLE` 函数来完成从 XML 中提取元素值的繁重工作。查看原始 XML 数据，我们正在寻找存储在 `WAREHOUSE_SPEC`\
    \ 列中的给定 XML 文档中加粗的值。\n\n```xml\n<?xml version=\"1.0\"?>\n<Warehouse>\n  <Building>\
    \ Owned</Building>\n  <Area> 25000</Area>\n  <Docks> 2</Docks>\n  <DockType> Rear\
    \ load</DockType>\n  <WaterAccess> Y</WaterAccess>\n  <RailAccess> N</RailAccess>\n\
    \  <Parking> Street</Parking>\n  <VClearance> 10 ft</VClearance>\n</Warehouse>\n\
    ```\n\n`XMLTABLE` 函数接受一个或多个 XQuery 表达式，应用于 `XMLTYPE` 数据的引用列或表达式。`XMLTABLE` 的一般形式如下所示。\n\
    \n```sql\nxmltable(\n  <XQuery to apply>,\n  <Source XMLTYPE column or expression>,\n\
    \  <Column definition optionally mapped with XQuery path expression>\n)\n```\n\
    \n我们没有太多空闲章节来讨论文档对象模型以及 XQuery 与 SQL 的区别，但你可以将每列的可选 `PATH` 表达式视为指示 `XMLTABLE`\
    \ 函数如何在找到指定的基本元素（在我们的例子中是 `'/Warehouse'`）时遍历 XML 树结构。\n\n我们的示例指示 Oracle 遍历 `OE.WAREHOUSES`\
    \ 的 `WAREHOUSE_SPEC` 列，寻找 `<Warehouse>` 元素。接下来，我们在 `columns` 子句中使用 XPath 表达式 `'/Warehouse/Building'`\
    \ 来查找嵌套在 `<Warehouse>` 元素下的名为 `<Building>`` 的子元素。标签内的值被转换为 `VARCHAR2(8)` 类型，并命名为\
    \ `\"Building\"`。然后对指定的任何其他列重复此过程，从而构建出 XML 的拆分版本。\n\n`XMLTABLE` 函数的结果在我们的示例中被视为一个内联视图，我们为表达式起了一个别名\
    \ `SHREDDED_WAREHOUSES`。然后我们在 `SELECT` 列表中使用这个别名，就像使用任何其他内联视图的结果一样。我们同样可以在任何类型的查询、函数或\
    \ PL/SQL 块中引用来自 `XMLTABLE` 的 `SHREDDED_WAREHOUSES` 结果。\n\n## 14-4\\. 从 XML 文档中提取关键\
    \ XML 元素\n\n### 问题\n\n你需要在其他处理中提取 XML 的子部分，包括元素名称、属性和值。例如，你需要从仓库 XML 文档中提取一部分\
    \ XML 传递给 XSLT 进程。\n\n### 解决方案\n\nOracle 的 `EXTRACT` 函数支持 `XMLTYPE` 数据类型，并提供通过将结果作为\
    \ `XMLTYPE` 值返回来保留 XML 元素名称和属性结构的能力。\n\n我们的示例使用 `EXTRACT` 函数从 `OE.WAREHOUSES`\
    \ 表中的仓库中选择 `<VClearance>` 元素及其属性和数据。下一个 SQL 显示了与该函数一起使用的 XPath 表达式，用于查找我们想要的 XML\
    \ 子部分。\n\n```sql\nselect\n  extract(warehouse_spec, 'Warehouse/VClearance') as\
    \ VClearance_XML\nfrom oe.warehouses;\n```\n\n```\nVCLEARANCE_XML\n------------------------------------------------------\n\
    <VClearance>10 ft</VClearance>\n<VClearance>12 ft</VClearance>\n<VClearance>11.5\
    \ ft</VClearance>\n<VClearance>15 ft</VClearance>\n…\n```\n\n每个返回的值是匹配在 `<Warehouse>`\
    \ 元素下找到的 `<VClearance>` 元素的 XML 子树。\n\n### 工作原理\n\n`EXTRACT` 函数使用 XPath 表达式来遍历文档对象模型。它旨在从源\
    \ XML 文档中返回格式良好的 XML 片段。当 `EXTRACT` 函数找到与 XPath 查询中表达的最低级别匹配的元素时，它会返回从该元素开始的 XML\
    \ 文档部分，同时保留所有元素名称、属性和值。在我们的示例中，这意味着当 `EXTRACT` 遇到 `<VClearance>` 元素时，它开始从该元素及其嵌套的所有子元素返回\
    \ XML。"
  raw: 'enforces some particular rules for XML data. If your column or table is defined
    using an XML schema, the schema will be used to validate the data, ensuring that
    mandatory elements are present and the overall structure conforms to the schema.
    This is known as testing for validity. Where no schema is used, as in our OE.WAREHOUSES
    table, the other integrity check of XML data structures is still enforced: the
    “well-formed” test. Here, Oracle ensures that the XML provided has matching opening
    and closing tags and that elements are nested correctly.


    You can see the well-formed test in action if you attempt to store malformed data
    as XML. The next code deliberately breaks the XML formatting for our warehouse,
    omitting the closing </Warehouse> element tag.


    -- intentionally invalid SQL


    insert into oe.warehouses


    (warehouse_id, warehouse_spec, warehouse_name, location_id)


    values


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ WORKING WITH XML DATA


    (10,


    xmltype(''<?xml version="1.0"?><Warehouse><Building>Owned</Building>''),


    ''London'',


    2300);


    xmltype(''<?xml version="1.0"?><Warehouse><Building>Owned</Building>''),


    *


    ERROR at line 5:


    ORA-31011: XML parsing failed


    ORA-19202: Error occurred in XML processing


    **LPX-00007: unexpected end-of-file encountered**


    ORA-06512: at "SYS.XMLTYPE", line 310


    ORA-06512: at line 1


    Note the obscure error message in bold. Unexpected end-of-file is Oracle’s way
    of telling you that it reached the end of the data without finding the expected
    closing element tag. Not the best error message in the world, but now you know
    what to look for.


    14-3\. Shredding XML for Relational Use


    Problem


    You need to extract individual element values from an XML document for use in
    other calculations. For instance, you need to extract text and numeric values
    in an XML document for calculations and details in a report on the space in your
    warehouses.


    Solution


    Oracle provides the XMLTABLE function to manipulate XML documents using XQuery
    and column mapping to traditional Oracle datatypes. Using XMLTABLE, we can identify
    and use data elements in an XML document in a relational way.


    Our next recipe uses XMLTABLE to identify many of the details of warehouses in
    the OE.WAREHOUSES


    table, including the building type, the floor space area of the warehouses, dock
    access, and more.


    select


    shredded_warehouses."Building",


    shredded_warehouses."FloorArea",


    shredded_warehouses."#Docks",


    shredded_warehouses."DockType",


    shredded_warehouses."WaterAccess",


    shredded_warehouses."RailAccess",


    shredded_warehouses."Parking",


    shredded_warehouses."VertClearance"


    from oe.warehouses,


    xmltable


    (''/Warehouse''


    passing warehouses.warehouse_spec


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ WORKING WITH XML DATA


    columns


    "Building" varchar2(8) path ''/Warehouse/Building'',


    "FloorArea" number path ''/Warehouse/Area'',


    "#Docks" number path ''/Warehouse/Docks'',


    "DockType" varchar2(10) path ''/Warehouse/DockType'',


    "WaterAccess" varchar2(8) path ''/Warehouse/WaterAccess'',


    "RailAccess" varchar2(7) path ''/Warehouse/RailAccess'',


    "Parking" varchar2(7) path ''/Warehouse/Parking'',


    "VertClearance" varchar(9) path ''/Warehouse/VClearance''


    ) shredded_warehouses;


    Building FloorArea #Docks DockType WaterAcc RailAcc Parking VertClear


    -------- ---------- ---------- ---------- -------- ------- ------- ---------


    Owned 25000 2 Rear load Y N Street 10 ft Rented 50000 1 Side load Y N Lot 12 ft
    Rented 85700 N N Street 11.5 ft Owned 103000 3 Side load N Y Lot 15 ft With the
    data shredded into a table form, we can then use this in normal queries, functions,
    PL/SQL


    procedures, and so on.


    How It Works


    The key to our recipe is using the XMLTABLE function to do the hard work of teasing
    out the element values from the XML. Looking at the raw XML data, we’re looking
    for the values in bold for a given XML


    document stored in the WAREHOUSE_SPEC column.


    <?xml version="1.0"?>


    <Warehouse>


    <Building> **Owned**</Building>


    <Area> **25000**</Area>


    <Docks> **2**</Docks>


    <DockType> **Rear load**</DockType>


    <WaterAccess> **Y**</WaterAccess>


    <RailAccess> **N**</RailAccess>


    <Parking> **Street**</Parking>


    <VClearance> **10 ft**</VClearance>


    </Warehouse>


    The XMLTABLE function takes one or more XQuery expressions to apply to a reference
    column or expression of XMLTYPE data. The general form of XMLTABLE is shown next.


    xmltable(


    <XQuery to apply>,


    <Source XMLTYPE column or expression>,


    <Column definition optionally mapped with XQuery path expression>) We don’t have
    a huge number of spare chapters to devote to working with the DOM and how XQuery
    differs from SQL, but you can think of the optional PATH expressions for each
    column as 342


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ WORKING WITH XML DATA


    instructing the XMLTABLE function how to walk the XML tree structure on finding
    the base element specified, which in our case is ''/Warehouse''.


    Our recipe instructs Oracle to walk through the WAREHOUSE_SPEC column of OE.WAREHOUSES,
    looking for the <Warehouse> element. Next, we find the sub-element named <Building>
    nested below the


    <Warehouse> element, using the XPath expression ''/Warehouse/Building'' in our
    columns clause. The value within the tags is cast to the type VARCHAR2(8), and
    given the name "Building". This process is then repeated for any other columns
    specified, building up our shredded version of the XML.


    The results of the XMLTABLE function are treated just like an inline view in our
    recipe, as we give the expression an alias SHREDDED_WAREHOUSES. We then use this
    alias in our SELECT list just as we would use the results of any other inline
    view. We could equally refer to our SHREDDED_WAREHOUSES result from XMLTABLE in
    any type of query, function, or PL/SQL block.


    14-4\. Extracting Key XML Elements from an XML Document


    Problem


    You need to extract subsections of XML in other processing, including element
    names, attributes, and values. For instance, you need to extract a portion of
    XML from your warehouse XML documents for passing to an XSLT process.


    Solution


    Oracle’s EXTRACT function includes support for the XMLTYPE datatype, and provides
    the ability to preserve XML element name and attribute constructs by returning
    the results as an XMLTYPE value.


    Our recipe uses the EXTRACT function to select the <VClearance> element and its
    attributes and data from the warehouses in the OE.WAREHOUSES table. The next SQL
    shows the XPath expression used with the function to find our desired XML subsection.


    select


    extract(warehouse_spec, ''Warehouse/VClearance'') as VClearance_XML


    from oe.warehouses;


    VCLEARANCE_XML


    <VClearance>10 ft</VClearance>


    <VClearance>12 ft</VClearance>


    <VClearance>11.5 ft</VClearance>


    <VClearance>15 ft</VClearance>


    …


    Each returned value is the XML sub-tree matching the <VClearance> elements found
    under


    <Warehouse> elements.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 14 ■ WORKING WITH XML DATA


    How It Works


    The EXTRACT function uses XPath expressions to walk the DOM. It is designed to
    return well-formed fragments of XML from the source XML document. When the EXTRACT
    function finds the element matching the lowest level expressed in the XPath query,
    it returns the portion of the XML document from that element down, while preserving
    all element names, attributes, and values. In our recipe, that means when EXTRACT
    encounters the <VClearance> element, it starts returning XML from that element
    and all sub-elements nested from that point.'
