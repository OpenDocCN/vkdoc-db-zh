    ## 17-8. Associating a Group of Privileges


    ### Problem


    You want to group privileges together so you can assign those privileges in one
    operation to a schema.


    ### Solution


    First connect to the database as a user who has the `CREATE ROLE` system privilege.
    Next create a role and assign to it the system or object privileges you want to
    group together. This example uses the `CREATE ROLE` command to create the `JR_DBA`
    role:


    ```sql

    create role jr_dba;

    ```


    The next several lines of SQL grant system privileges to the newly created role:


    ```sql

    grant select any table to jr_dba;

    grant create any table to jr_dba;

    grant create any view to jr_dba;

    grant create synonym to jr_dba;

    grant create database link to jr_dba;

    ```


    Next, grant the role to any schema you want to possess those privileges:


    ```sql

    grant jr_dba to lellison;

    grant jr_dba to cphillips;

    ```


    Now the schemas `LELLISON` and `CPHILLIPS` can perform tasks such as creating
    synonyms, views, and so on. As a DBA schema, to view schemas assigned to roles,
    query the `DBA_ROLES_PRIVS` view:


    ```sql

    select grantee, granted_role from dba_role_privs order by 1;

    ```


    To view roles granted to your currently connected user, query from the `USER_ROLE_PRIVS`
    view:


    ```sql

    select * from user_role_privs;

    ```


    To revoke a privilege from a role, use the `REVOKE` command:


    ```sql

    revoke create database link from jr_dba;

    ```


    Similarly, use the `REVOKE` command to remove a role from a schema:


    ```sql

    revoke jr_dba from lellison;

    ```


    > **Note**

    >

    > Unlike other database objects, roles do not have owners. A role is defined by
    the privileges assigned to it.


    ### How It Works


    A database *role* is a logical grouping of system or object privileges that can
    be assigned to schemas or other roles. Roles help you manage aspects of database
    security. They also provide a central object that has privileges assigned to it;
    the role can subsequently be assigned to multiple users.


    A typical use of a role is when you need to grant several users read-only access
    to another user’s tables. To implement this, first create a role named `SELECT_APP`:


    ```sql

    create role select_app;

    ```


    Next grant `SELECT` TABLE access for every table that read-only access is required
    for. The following code dynamically creates a script that grants `SELECT` access
    for every table in the schema to the specified role:


    ```sql

    CONN &user_name/&password

    DEFINE sel_user=SELECT_APP

    SET LINES 132 PAGES 0 ECHO OFF FEEDBACK OFF VERIFY OFF HEAD OFF TERM OFF TRIMS
    ON

    SPO gen_grants_dyn.sql

    --

    SELECT ''grant select on '' || table_name || '' to &&sel_user ;''

    FROM user_tables;

    --

    SPO OFF;

    SET ECHO ON FEEDBACK ON VERIFY ON HEAD ON TERM ON;

    --

    @@gen_grants_dyn

    ```


    Now you can assign the `SELECT_APP` role to any user who requires read-only access
    to the tables within the schema that owns the tables.


    ### PL/SQL and Roles


    If you work with PL/SQL, sometimes you’ll get this error when attempting to compile
    a procedure or a function:


    `PL/SQL: ORA-00942: table or view does not exist`


    What confuses you is that you can describe the table:


    `SQL> desc app_table;`


    So why doesn’t PL/SQL seem to be able to recognize the table? It’s because PL/SQL
    requires that the owner of the package, procedure, or function must be explicitly
    granted privileges to any objects referenced in the code. The owner of the PL/SQL
    code cannot have obtained the grants through a role.


    Try this as the owner of the PL/SQL code:


    `SQL> set role none;`


    Now try to run a SQL statement that accesses the table in question:


    `SQL> select count(*) from app_table;`


    If you can no longer access the table, then you have been granted access through
    a role. To resolve the issue, explicitly grant access to any tables to the owner
    of the PL/SQL code (as the owner of the table):


    `SQL> connect owner/pass`

    `SQL> grant select on app_table to proc_owner;`


    Now you should be able to connect as the owner of the PL/SQL code and successfully
    compile your code.


    ## 17-9. Creating Users


    ### Problem


    You need to create a new user.


    ### Solution


    Use the `CREATE USER` statement to create a user. This example creates a user
    named `HEERA` with a password of `CHAYA` and assigns the default temporary tablespace
    of `TEMP` and default tablespace of `USERS`:


    ```sql

    create user heera identified by chaya

    default tablespace users

    temporary tablespace temp;

    ```


    This creates a bare-bones schema that has no privileges to do anything in the
    database. To make the schema useful, it must be minimally granted the `CREATE
    SESSION` system privilege:


    ```sql

    grant create session to heera;

    ```


    If the new schema needs to be able to create tables, it will need to be granted
    additional privileges like `CREATE TABLE`.


    ```sql

    grant create table to heera;

    ```


    The new schema will also need to have quota privileges granted for any tablespace
    it needs to create objects in:


    ```sql

    alter user heera quota unlimited on users;

    ```


    > **Note**

    >

    > A common technique that DBAs use is to grant the predefined roles of `CONNECT`
    and `RESOURCE` to newly created schemas. These roles contain system privileges
    such as `CREATE SESSION` and `CREATE TABLE` (and several others, it varies by
    release). We recommend against doing this as Oracle has stated those roles may
    not be available in future releases.


    ### How It Works


    A user is a database account, which is the mechanism that allows you to log on
    to a database. You must have the `CREATE USER` system privilege to create a user.
    When you create a user, you establish the initial security and storage attributes.
    These user attributes can be modified with the `ALTER USER` statement.


    You can view user information by selecting from the `DBA_USERS` view:


    ```sql

    select username, default_tablespace, temporary_tablespace from dba_users;

    ```


    Here is some sample output:


    ```

    USERNAME               DEFAULT_TABLESPACE       TEMPORARY_TABLESPACE

    ---------------------- ------------------------ ------------------------------

    C2R                    USERS                    TEMP

    REP_MV_SEL             USERS                    TEMP

    STAR_SEL               USERS                    TEMP

    SYS                    SYSTEM                   TEMP

    ```


    All of your users should be assigned a temporary tablespace that has been created
    as type *temporary*. If a user has a temporary tablespace of `SYSTEM`, then any
    sort area that they require temporary disk storage for will acquire extents in
    the `SYSTEM` tablespace. This can lead to the `SYSTEM` tablespace temporarily
    filling up. None of your users, other than the `SYS` user, should have a default
    tablespace of `SYSTEM`. You don’t want any users other than `SYS` creating objects
    in the `SYSTEM` tablespace. The `SYSTEM` tablespace should be reserved for the
    `SYS` user’s objects.


    ## 17-10. Dropping Users


    ### Problem


    You want to drop a user.


    ### Solution


    Use the `DROP USER` statement to remove a database account. This next example
    drops the user `HEERA`:


    ```sql

    drop user heera;

    ```


    This command won’t work if the user owns any database objects. Use the `CASCADE`
    clause to remove a user and have its objects dropped:


    ```sql

    drop user heera cascade;

    ```


    > **Note**

    >

    > The `DROP USER` statement may take an inordinate amount of time to execute if
    the user being dropped owns a vast number of database objects. In these situations,
    you may want to consider dropping the user’s objects before dropping the user.


    ### How It Works'
