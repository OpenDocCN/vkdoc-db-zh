    CHAPTER 7 ■ STRINGS


    7-7\. Replacing Text in a String


    Problem


    You need to perform basic address standardization by converting all variations
    of “Road” to the string


    “RD” at the end of the string.


    Solution


    To update substrings within several database columns using a regular expression,
    you can use the REPLACE function; however REPLACE may be not be suitable or practical
    for some substring substitutions, such as scenarios where using REPLACE will be
    tedious, error-prone, or even impossible without using a programming language.
    Thus, you can use the REGEXP_REPLACE built-in function to extend the functionality
    of REPLACE to specify a regular expression instead of a constant as the string
    to replace. This example performs basic address standardization by converting
    all variations of “Road” to “RD” at the end of the string:


    update locations


    set street_address =


    regexp_replace(street_address,''\s(road|rd|roade)$'','' RD'',1,0,''i'')


    where regexp_instr(street_address,''\s(road|rd|roade)$'',1,1,0,''i'') > 0


    ;


    3 rows updated


    If you query the table after performing the update, you can see the translated
    street addresses (including street addresses that already include “RD” in the
    street address): select location_id, street_address


    from locations


    where instr(street_address,''RD'') > 0


    ;


    LOCATION_ID STREET_ADDRESS


    ---------------------- ----------------------------------------


    1400 2014 Jabberwocky RD


    1700 2004 Charade RD


    2600 9702 Chester RD


    3 rows selected


    The REGEXP_REPLACE starts searching at the first character in the string and replaces
    all occurrences of any of the strings within the pattern. REGEXP_REPLACE ignores
    case when performing the substitutions.


    Note that you must include the whitespace character \s in the regular expression
    to make sure you do not match words like “Oxford” or “Broad” or any word ending
    with one of the options within the regular expression at the end of the street
    address.


