- fmt: "For triggers, you can also view source information in the `DBA_TRIGGERS`,\
    \ `ALL_TRIGGERS`, or `USER_TRIGGERS` static views. For example:\n\n```sql\nselect\n\
    \    trigger_name\n    , triggering_event\n    , trigger_type\n    , table_name\n\
    \    , trigger_body\nfrom user_triggers\nwhere trigger_name = upper('&trigger_name');\n\
    ```\n\nThe `TRIGGER_BODY` column is of type `LONG`, so if you’re running this\
    \ code from SQL*Plus, be sure to use the `SET LONG` command to make the size large\
    \ enough to display all of the trigger code.\n\n### 10-13. Displaying Granted\
    \ Roles\n\n**Problem**\n\nYou want to display the roles that a user has been granted.\n\
    \n**Solution**\n\nUse this query to view which roles are granted to the currently\
    \ connected user:\n```sql\nselect username, granted_role\nfrom user_role_privs;\n\
    ```\n\nThis next query displays the roles that have been granted to a specific\
    \ user:\n```sql\nselect\n    grantee\n    , granted_role\nfrom dba_role_privs\n\
    where grantee = upper('&grantee')\norder by grantee;\n```\n\n**How It Works**\n\
    \nA role is a database object that lets you group together system and object privileges\
    \ and then grant that grouping (the role) to another user or role. Roles help\
    \ manage database security. For example, DBAs will often use roles in the management\
    \ and administration of database object privileges and system privileges.\n\n\
    The `USER_ROLE_PRIVS` and `DBA_ROLE_PRIVS` views describe roles granted to users.\
    \ To view roles granted to roles, query the `ROLE_ROLE_PRIVS` view:\n```sql\n\
    select role, granted_role\nfrom role_role_privs;\n```\n\nWhen you create a database,\
    \ several predefined roles are created for you, including `DBA` and `SELECT_CATALOG_ROLE`.\
    \ To view all roles in your database (both predefined and user-created), select\
    \ the `ROLE` column from `DBA_ROLES`:\n```sql\nselect role from dba_roles;\n```\n\
    \nHere is some sample output of role names in a typical database:\n```\nCONNECT\n\
    RESOURCE\nDBA\nSELECT_CATALOG_ROLE\nEXECUTE_CATALOG_ROLE\nDELETE_CATALOG_ROLE\n\
    EXP_FULL_DATABASE\nIMP_FULL_DATABASE\n```\n\n#### Roles in USER$\n\nInternally,\
    \ role names are stored in the data dictionary `USER$` table. If you run this\
    \ `SELECT` statement you’ll see all of the role names in your database:\n```sql\n\
    select name\nfrom user$\nwhere type# = 0;\n```\n\nCompare that output to the following\
    \ query:\n```sql\nselect role\nfrom dba_roles;\n```\n\nYou’ll notice that there\
    \ are a few roles in the first query that do not appear in the second.\n\n###\
    \ 10-14. Displaying Object Privileges\n\n**Problem**\n\nYou want to see what object-level\
    \ privileges have been granted to a user.\n\n**Solution**\n\nThe following query\
    \ selects from the `USER_TAB_PRIVS_RECD` view to display the table privileges\
    \ that have been granted to the currently connected user:\n```sql\nselect\n  \
    \  owner\n    , table_name\n    , grantor\n    , privilege\nfrom user_tab_privs_recd;\n\
    ```\n\nTo view privileges that the current user has granted to other users, select\
    \ from the `USER_TAB_PRIVS_MADE` view:\n```sql\nselect\n    grantee\n    , table_name\n\
    \    , grantor\n    , privilege\nfrom user_tab_privs_made;\n```\n\n**How It Works**\n\
    \nObject privileges are grants that allow you to perform data manipulation (DML)\
    \ operations (`INSERT`, `UPDATE`, and `DELETE`) on another user’s tables. Before\
    \ you can perform DML operations on another user’s objects, you must be granted\
    \ the appropriate privileges. Object privileges are managed through the `GRANT`\
    \ and `REVOKE` statements.\n\nThis next query selects from `USER_TAB_PRIVS` and\
    \ `ROLE_TAB_PRIVS` to check for any object privileges that have been granted directly\
    \ to the user or granted through a role that has been granted to the user:\n```sql\n\
    select\n    grantee\n    , owner\n    , table_name\n    , grantor\n    , privilege\n\
    from user_tab_privs\nunion\nselect\n    role\n    , owner\n    , table_name\n\
    \    , 'ROLE'\n    , privilege\nfrom role_tab_privs\norder by 2, 3;\n```\n\nThe\
    \ `ROLE_TAB_PRIVS` view will show table privileges that have been granted to a\
    \ role that the current user has access to.\n\n### 10-15. Displaying System Privileges\n\
    \n**Problem**"
