  trans: "\n# 第 11 章 ■ 常见报表问题\n\n## 11-6. 按相对排名过滤结果\n\n### 问题\n\n您希望过滤查询结果，以找到在排序结果中处于任意位置的行。例如，您希望模拟其他数据库的\
    \ top N 或第 n 个结果的查询功能。\n\n### 解决方案\n\n从 Oracle 11g Release 2 开始，Oracle 引入了新的获取第\
    \ n 个结果的功能。在 11g Release 2 被广泛部署之前，您应该使用现有的分析函数 `ROW_NUMBER` 来确定任何分组中的第 n 个结果，或\
    \ top N 结果。\n\n对于我们的方案，我们希望找出业务部门中每个部门薪资第三高的员工。接下来的 SQL 语句在嵌套子查询中使用 `ROW_NUMBER`，使我们能够快速找到每个区域薪资第三高的获得者。\n\
    \n```sql\nselect department_id, last_name, salary as third_salary\nfrom (\n  select\
    \ department_id, last_name, salary,\n    row_number()\n    over (partition by\
    \ department_id order by salary desc) sal_position\n  from hr.employees )\nsal_by_dept\n\
    where sal_by_dept.sal_position = 3;\n```\n\n```\nDEPARTMENT_ID LAST_NAME THIRD_SALARY\n\
    ------------- --------- -------------\n30 Baida 2900\n50 Kaufling 7900\n60 Austin\
    \ 4800\n80 Errazuriz 12000\n90 De Haan 17000\n100 Chen 8200\n```\n\n每个部门薪资第三高的员工及其相应薪资都被列出。\n\
    \n### 工作原理\n\n我们的方案使用了 Oracle 普遍存在的分析函数 `ROW_NUMBER` 来帮助识别哪些行应作为组内的第 n 项返回。基于\
    \ `ROW_NUMBER` 的查询结果随后被用作外部查询中的一个内联视图。外部查询通过 `WHERE` 子句来定位目标行。\n\n从内联视图开始，关键组件是\
    \ `ROW_NUMBER` 函数的 `OVER` 子句。\n\n```sql\nrow_number()\nover (partition by department_id\
    \ order by salary desc) sal_position\n```\n\n在这里，我们指示 Oracle 按 `DEPARTMENT_ID`\
    \ 将源数据划分为子组。在这些组内，我们按薪资值降序对数据进行排序，然后就可以应用 `ROW_NUMBER` 值。我们给生成的行号命名为 `SAL_POSITION`。以下是该内联视图产生的（部分）中间工作数据：\n\
    \n```\nDEPARTMENT_ID LAST_NAME SALARY SAL_POSITION\n------------- --------- -------\
    \ ------------\n...\n30 Raphaely 11000 1\n30 Khoo 3100 2\n`30` `Baida` `2900`\
    \ `3`\n30 Tobias 2800 4\n...\n50 Fripp 8200 1\n50 Weiss 8000 2\n`50` `Kaufling`\
    \ `7900` `3`\n50 Vollman 6500 4\n...\n```\n\n您可以看到，突出显示的行在其各自部门中拥有第三高的薪资，并被赋予了\
    \ `SAL_POSITION` 编号 3，该编号源自我们的 `ROW_NUMBER` 表达式。\n\n---\n\n(`expression or column`,\
    \ `lower bound`, `upper bound`, `number of buckets`) 从我们方案中的内联视图子查询向外进行，我们首先要求\
    \ Oracle 使用 `WIDTH_BUCKET` 根据客户的 `SUM` 或 `ORDER_TOTAL` 值，在 0 和 500000 的边界之间将我们的数据分成\
    \ 10 个存储桶。如果我们单独运行内部的 `SELECT` 语句，将会收集到以下结果：\n\n```sql\nselect customer_id, sum(order_total),\n\
    \  width_bucket(sum(order_total),0,500000,10) as total_spend_histogram\nfrom oe.orders\n\
    group by customer_id\n```\n\n```\nCUSTOMER_ID SUM(ORDER_TOTAL) TOTAL_SPEND_HISTOGRAM\n\
    ----------- ---------------- ---------------------\n101 190395.1 4\n102 69211.4\
    \ 2\n103 20591.4 1\n104 146605.5 3\n105 61376.5 2\n...\n```\n\n内联视图的结果易于解释。客户\
    \ 101 在所有订单中的总花费为 190395.10 美元。这使其位于第 4 个存储桶中，该桶包含 150001 到 200000 美元之间的值。下一个客户\
    \ 102 在第 2 个存储桶中，依此类推。\n\n我们在外部 SQL 中使用内联视图的结果，来计算每个存储桶中的客户数量。作为最后的修饰，我们将客户组的直方图存储桶乘以值\
    \ 50000，以按照我们方案问题最初要求的那样，以 50000 的倍数报告直方图。\n"
- fmt: "# CHAPTER 11 ■ COMMON REPORTING PROBLEMS\n\nFrom this point, the operation\
    \ of the outer query is clear. We have a simple `SELECT` of the columns we seek\
    \ from the inline view, and a `WHERE` clause that looks for `SAL_POSITION` equal\
    \ to 3. This technique is 276\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nflexible, in that you only need to change the final `WHERE` clause to use a\
    \ different value to find a different nth value. Here’s the general form of this\
    \ recipe.\n\n```\nselect <desired rows from inline view>\nfrom (\n  select <desired\
    \ rows>,\n         row_number()\n           over (\n             partition by\
    \ <partition column>\n             order by <column for n-th detection>\n    \
    \       ) <your_column_alias>\n  from <target table>\n) <inline_view_alias>\n\
    where <inline_view_alias>.<your_column_alias> = <n-th position>;\n```\n\nOne aspect\
    \ you may wish to tweak is how ranking is determined. You can substitute the `RANK`\
    \ or `DENSE_RANK` analytic function in place of `ROW_NUMBER` to control how tied\
    \ or absent values affect your nth result determination.\n\n## 11-7\\. Comparing\
    \ Hypotheses on Sets of Data\n\n### Problem\n\nYou have two or more sets of similar\
    \ data that need comparison at the set level. Specifically, you’d like to use\
    \ a recognized hypothesis-comparison approach with your data residing in Oracle—without\
    \ having to move the data to another tool or system—to compare similar purchasing\
    \ history for the residents of two states.\n\n### Solution\n\nOracle provides\
    \ a number of recognized hypothesis-testing statistical functions, including functions\
    \ for F-test, T-test, ANOVA, and numerous others. Many readers will probably be\
    \ wondering what on earth these types of functions do, and more importantly, why\
    \ they might be useful in comparing sets of data.\n\nStatistics students in the\
    \ audience will know that tests like the T-test help in modeling linear regressions\
    \ and in inferring differences in statistical mean and variance between two groups.\
    \ In lay terms, a T-test could, for example, help you make decisions about whether\
    \ you could sell more items online or from direct retail stores, or learn whether\
    \ a particular income group is affecting your sales. The T-test tells you whether\
    \ the difference between two groups is real, or an artifact of errors in your\
    \ sampling or measurement.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n`Beer And Statistics Do Mix`\n\nThe T-test was invented by staff at the Guinness\
    \ Brewery in Ireland, where the proprietor was a firm believer in using statistics\
    \ to make a better brew. This included examining everything from what a better\
    \ quality of hops or barley might do to the beer, all the way through to determining\
    \ whether the brewery would be better off by hiring the greatest minds of Oxford\
    \ and Cambridge universities.\n\nAt the time of its invention, the T-test was\
    \ considered one of Guinness’ best trade secrets, but luckily the passage of time\
    \ means you can benefit from it, both in your business data management tasks and\
    \ in any beer drinking you might fancy.\n\nFor our recipe, we’ll try to determine\
    \ if the residents of the states of New Jersey and New York in the USA have statistically\
    \ significant purchasing history for the same income brackets.\n\nThe next `SQL`\
    \ invokes several different forms of the T-test to assess the sales history data\
    \ for these two groups.\n\n```\nselect substr(cust_income_level, 1, 22) income_level,\n\
    \       avg(case when cust_state_province = 'NJ' then amount_sold else null end)\
    \ NJ_sales,\n       avg(case when cust_state_province = 'NY' then amount_sold\
    \ else null end) NY_sales,\n       stats_t_test_indepu(cust_state_province, amount_sold,\
    \ 'STATISTIC', 'NY') T_observed,\n       stats_t_test_indepu(cust_state_province,\
    \ amount_sold) two_sided_p_value\nfrom sh.customers c, sh.sales s\nwhere c.cust_id\
    \ = s.cust_id\n  and c.cust_state_province in ('NY','NJ')\ngroup by rollup(cust_income_level)\n\
    order by income_level, NJ_sales, NY_sales, t_observed;\n```\n\nThe results at\
    \ first seem a little esoteric, but to the trained eye they indicate that our\
    \ samples of New Jersey and New York residents aren’t statistically related, even\
    \ where they share similar incomes."
