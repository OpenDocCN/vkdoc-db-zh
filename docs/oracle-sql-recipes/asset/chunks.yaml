    CHAPTER 13 ■ TREE-STRUCTURED DATA


    The employee hierarchy in the department headed by Kochhar was incorrectly modified,
    and the row with IS_CYCLE = 1 identifies the row causing a cycle in the data.
    The manager for the department, Kochhar, now has a manager with EMPLOYEE_ID =
    113 (Popp), whose managerial structure follows up the tree back to Kochhar. The
    MANAGER_ID for Kochhar has to be changed to another employee who is not one of
    the subordinates in her management hierarchy.


    How It Works


    Any application that maintains a table or set of tables in a hierarchical structure
    should not allow any edits that generate a loop. However, errors occur, such as
    manual edits to the table that bypass the application logic. Detecting the source
    of the loop is a two-step process: first, identify the row that is causing the
    loop. However, as in this scenario, that row may not be the row that was incorrectly
    updated. The second step is to take the row information (usually a primary key)
    and find other rows that may incorrectly reference the flagged row. It might be
    easy to spot the loop with a small result set, as in the example above, but for
    queries returning hundreds or thousands of rows, you will have to use a query
    like this: select employee_id, manager_id, last_name, first_name from employees


    where manager_id in


    (


    select employee_id


    from employees


    where connect_by_iscycle = 1


    start with last_name = ''Kochhar''


    connect by nocycle manager_id = prior employee_id


    );


    Fixing the problem requires identifying the correct parent for the row causing
    the loop using the previous query, then updating the column in the row that links
    the rows together: update employees


    set manager_id = 100


    where employee_id = 101


    ;


    Employee Kochhar has now been updated to the original value with the correct manager
    (King), who is not one of her direct or indirect reports!


    13-6\. Generating a Fixed Number of Sequential Primary Keys


    Problem


    You want to generate a virtual table of a sequence of 1000 numbers as the basis
    of a new table you will populate later. Using a sequence won’t work, however,
    unless you create a table using PL/SQL or some 330


