  trans: '# 第 9 章 ■ 事务管理


    *   **模糊读（不可重复读）：** 一个事务第二次读取同一行时，返回不同的数据，或没有数据（该行已被删除）。

    *   **幻读：** 一个事务重新执行一个查询，会返回其他事务已提交的新行。


    模糊读和幻读的区别在于，模糊读访问的是已更改或已删除的行，而幻读访问的是来自另一个事务的新行。然而，与脏读的一个关键区别在于，它们的共同点是这些新的或已更改的行已经被另一个事务提交。出于性能原因，一些数据库支持脏读；Oracle
    不支持任何形式的脏读，稍后你会看到。表 9-2 显示了 ANSI SQL 标准定义的、允许这些现象的隔离级别类型。


    *表 9-2. 按 ANSI SQL 隔离级别划分的读取异常*


    | 隔离级别 | 脏读 | 模糊读（不可重复读） | 幻读 |

    | :--- | :--- | :--- | :--- |

    | 读未提交 | 允许 | 允许 | 允许 |

    | 读已提交 | 不允许 | 允许 | 允许 |

    | 可重复读 | 不允许 | 不允许 | 允许 |

    | 可序列化 | 不允许 | 不允许 | 不允许 |


    例如，如果你将事务的隔离级别设置为读已提交，在一个会话中重复执行`SELECT`语句可能会看到已更改的行或新行，但绝不会看到来自另一个事务的未提交数据。


    如方案解决方案中那样，设置为可序列化的事务，对于会话来说，就好像没有其他人在对数据库进行更改。读一致性从单个`SELECT`语句扩展到整个事务。你可以在可序列化事务中执行
    DML 语句，就像在读一致性事务中一样，但有一个重要区别：如果可序列化事务试图更改自其开始以来已被另一个会话更改并提交的行，你将收到此错误：


    `ORA-08177: Cannot serialize access for this transaction`


    如果发生这种情况，你的选择是回滚整个事务或提交到此点所做的工作。在`COMMIT`或`ROLLBACK`之后，你将能够访问其他会话所做的更改。


    使用可序列化隔离级别可以避免表 9-2 中的不可重复读和幻读，但代价高昂。由于需要额外的锁定，你的事务吞吐量将会受到影响。可序列化事务也更容易发生死锁。


    你可以使用以下命令将隔离级别设置为读已提交（默认值）：`set transaction isolation level read committed;`


    `ALTER SESSION`命令中也提供了`ISOLATION_LEVEL`子句。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    如果你想在整个事务中保持读一致性，但又不打算执行任何 DML 命令，可以使用只读序列化（Oracle 对 ANSI 标准的变体），命令如下：


    ```sql

    set transaction read only;

    ```


    使用此方法的优点是不会收到任何`ORA-08177`错误。然而，与单个长时间运行的`SELECT`语句一样，如果你的回滚保留期设置不当，仍然可能收到`ORA-01555:
    snapshot too old`错误。此隔离级别在之前的方案中已介绍过。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 10 章 ■ 数据字典


    本章重点介绍使用 SQL 显示数据库对象信息的技巧。


    开发人员和 DBA 经常访问 Oracle 数据字典，以查看对象的结构、对象之间的关系、事件发生的频率等等。


    一名高效的数据库工程师必须知道在解决安全性、可用性和性能问题时该去哪里查找以及如何查询数据库。将上次 Oracle 会议的数据字典海报用作办公室墙纸是不够的。当问题出现时，你需要知道去哪里查找，以及如何将元数据信息解读并转化为解决方案。


    ## 图形化工具 vs. SQL


    有几种图形化工具可用于查看数据库的元数据。通常，可视化图像对于排查环境中的问题非常有价值。许多人更习惯于通过指点、点击来直观地诊断问题。无论是新手还是经验丰富的
    DBA，都理解图形化的力量。


    那么，既然有强大的图形化工具可以完成这项工作，为什么还要费心去学习如何手动使用 SQL 来查询数据库元数据呢？以下几个理由值得深思：


    *   你身处一个新环境，那里没有你喜欢的图形化工具。

    *   你的高速互联网接入出了问题，被迫通过缓慢的拨号连接远程诊断数据库问题，使用图形化显示会慢得令人痛苦。

    *   图形化工具不显示额外信息，尽管你知道这些信息在数据字典中可用。

    *   你正在面试一份工作，而守旧的 DBA 似乎痴迷于问关于数据字典视图的冷知识问题。

    *   没有源代码可用，你想直接通过 SQL 查询数据字典获取信息。

    *   你明白，如果知道如何直接从数据字典检索信息，你将成为一名更高效的数据库工程师。

    *   你想在 Oracle OpenWorld 的 SQL 冷知识活动上吸引潜在的伴侣。

    *   你在图形化工具中看到了奇怪的结果，想要寻求第二种意见。

    *   有几个自定义的数据库检查你想自动化，但无法通过可视化工具实现。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    这些并不是要停止使用诸如 Enterprise Manager、SQL Developer、TOAD 等图形化工具的理由。我们完全理解这些实用程序的强大功能和实用性。图形化工具对于提供快速简便的查看数据库元数据的方式是无价的。此外，这些可视化实用程序已经无处不在，因此通常工作要求就是要懂得如何使用它们。然而，前面的列表确实指出了一些非常充分的理由，说明了为什么懂得如何使用
    SQL 查询数据字典很重要。如果你知道哪些数据字典视图包含了解决手头问题所需的信息，你将成为一名更高效的数据库工程师。


    ## 数据字典架构


    Oracle 数据字典视图大致分为两类：


    *   静态`USER`/`ALL`/`DBA`视图

    *   动态`V$`和`GV$`视图


    在接下来的部分中，我们将讨论静态视图和动态视图的基本架构。


    ### 静态视图


    Oracle 将一部分数据字典视图描述为*静态的*。Oracle 的文档指出，这些视图是静态的，因为它们只在数据库中发生某些事件（如创建表或授予权限）时才会更改。


    然而，在某些情况下，“静态”这个名字可能有点用词不当。例如，`DBA_SEGMENTS`和`DBA_EXTENTS`视图会随着数据库中数据量的增长和缩减而动态变化。


    尽管如此，Oracle 已经区分了静态和动态，在查询数据字典时理解这种架构上的细微差别很重要。静态视图有三种类型或级别：


    *   `USER`

    *   `ALL`

    *   `DBA`


    `USER`视图包含当前用户可用的信息。例如，`USER_TABLES`视图包含当前用户拥有的表的信息。从这些视图中选择数据不需要特殊权限。


    下一个级别是`ALL`静态视图。`ALL`视图显示当前用户有权限访问的所有对象信息。例如，`ALL_TABLES`视图显示当前用户可以从中选择的所有数据库表。查询这些视图也不需要特殊权限。'
- fmt: '# CHAPTER 10 ■ DATA DICTIONARY


    Next are the DBA static views. The DBA views contain metadata describing all objects
    in the database (regardless of ownership or access privilege). To access the DBA
    views you must have a `DBA` role or `SELECT_CATALOG_ROLE` granted to the current
    user.


    The static views are based on internal Oracle tables such as `USER$`, `TAB$`,
    and `IND$`. If you have access to the `SYS` schema, you can view underlying tables
    directly via SQL. For most situations, you only need to access the static views
    that are based on the internal tables.


    The data dictionary tables (like `USER$`, `TAB$`, and `IND$`) are created during
    the execution of the `CREATE DATABASE` command. As part of creating a database,
    the `sql.bsq` file is executed, which builds these internal data dictionary tables.
    The `sql.bsq` file is usually located in the `ORACLE_HOME/rdbms/admin` directory
    and can be viewed via an operating system editing utility (such as `vi` in UNIX
    or `notepad` in Windows).


    The static views are created when you run the `catalog.sql` script (usually this
    script is run immediately after the `CREATE DATABASE` operation succeeds). The
    `catalog.sql` script is located in the `ORACLE_HOME/rdbms/admin` directory.


    **Figure 10-1.** Creating the static data-dictionary views


    Static views such as `DBA_USERS`, `DBA_TABLES`, and `DBA_INDEXES` are built upon
    the static tables (such as `USER$`, `TAB$` and `IND$`). You can view the creation
    scripts of these static views by querying the `TEXT` column of `DBA_VIEWS`.


    > **Note** You must be connected as the `SYS` schema when you run the `catalog.sql`
    script. The `SYS` schema is the owner of all objects in the data dictionary.


    ## Dynamic Performance Views


    The dynamic performance data dictionary views are often referred to as the `V$`
    and `GV$` views. These views are constantly updated by Oracle and reflect the
    current condition of the instance and database.


    The dynamic views are critical for diagnosing real-time performance issues.


    The `V$` and `GV$` views are indirectly based on the underlying `X$` tables, which
    are internal memory structures that are instantiated when you start your Oracle
    instance. Some of the `V$` views are available the moment the Oracle instance
    is first started. For example, the `V$PARAMETER` contains meaningful data after
    the `STARTUP NOMOUNT` command has been issued, and does not require the database
    to be mounted or open. Other dynamic views depend on information in the control
    file and therefore only contain meaningful information after the database has
    been mounted (like `V$CONTROLFILE`). Some `V$` views provide kernel processing
    information (like `V$BH`) and thus only have useful data after the database has
    been opened.


    At the top layer, the `V$` views are synonyms that point to underlying `SYS.V_$`
    views. At the next layer down, the `SYS.V_$` objects are views created on top
    of another layer of `SYS.V$` views. The `SYS.V$` views in turn are based on the
    `SYS.GV$` views. At the bottom layer, the `SYS.GV$` views are based on the `X$`
    memory structures.


    > **Tip** You can display the `V$` and `GV$` view definitions by querying the
    `V$FIXED_VIEW_DEFINITION` data dictionary view.


    The top level `V$` synonyms and `SYS.V_$` views are created when you run the `catalog.sql`
    script, which is usually run by the DBA after the database is initially created.


    **Figure 10-2.** Creating the dynamic `V$` performance data dictionary views


    Accessing the `V$` views through the top-most synonyms will almost always be adequate
    for your dynamic performance information needs. There will be rare occasions,
    however, when you’ll want to query internal information that may not be available
    through the `V$` views. In these situations, it’s critical to understand the underlying
    `X$` underpinnings.


    If you work with Oracle Real Application Clusters, you should be familiar with
    the `GV$` global views. These views provide global dynamic performance information
    regarding all instances in a cluster (whereas the `V$` views are instance-specific).
    The `GV$` views contain an `INST_ID` column for identifying specific instances
    within a clustered environment.


    This chapter does not contain an exhaustive set of SQL scripts for querying data
    dictionary objects. Rather, we try to show you common (and some not-so-common)
    techniques for directly querying the data dictionary. You should be able to build
    upon the concepts in this chapter to fulfill any requirement you have for viewing
    data dictionary metadata.


    ## Sys vs. System


    Oracle novices sometimes ask “what’s the difference between the `SYS` and `SYSTEM`
    schemas?” The `SYS` schema is the super user of the database, owns all internal
    data dictionary objects, and is used for tasks such as creating a database, starting
    or stopping the instance, backup and recovery, or adding or moving data files.
    These types of tasks typically require the `SYSDBA` or the `SYSOPER` role. Security
    for these roles is often controlled through access to the operating system account
    owner of the Oracle software. Additionally, security for these roles can also
    be administered via a password file, which allows remote client/server access.


    In contrast, the `SYSTEM` schema isn’t very special. It is just a schema that
    has been granted the `DBA` role. Many shops simply lock the `SYSTEM` schema after
    database creation and never use it because it is often the first schema a hacker
    will try to access when attempting to break into a database. Rather than risking
    an easily guessable entry point to the database, DBAs will create a separate schema
    (named something other than `SYSTEM`) that has the `DBA` role granted to it. This
    DBA schema is used for administrative tasks such as creating users, changing passwords,
    granting database privileges, and so on.


    Having a separate DBA schema(s) for administrators provides more options for security
    and auditing.


    ### 10-1\. Displaying User Information


    #### Problem


    You want to display information about schemas in the database.


    #### Solution


    To quickly display the schema you are currently connected as, use this statement:


    ```sql

    SQL> show user;

    ```


    To get a quick listing of information about the user you are currently connected
    as, query the `USER_USERS` view. The following query will show information like
    your username and the temporary and default tablespace assigned to your schema:


    ```sql

    select * from user_users;

    ```


    If you want to view information about all users in the database, use the `DBA_USERS`
    view. The following will display information such as when each account was created:


    ```sql

    select username, account_status, created, lock_date

    from dba_users

    order by 1;

    ```


    #### All_Users and Security


    Any schema with the `CREATE SESSION` system privilege can select schema information
    from the `ALL_USERS` view. For example:


    ```sql

    select username, created

    from all_users

    order by username;

    ```


    This ability to select from `ALL_USERS` can be a security concern because it allows
    any user with minimal privileges (like `CREATE SESSION`) to view all user names
    in the database. Viewing all user information allows a malicious person to start
    guessing passwords for existing users. If you are a database administrator, ensure
    that you change the default passwords to well-known accounts and encourage users
    to use passwords that are not easily guessable.


    #### How It Works'
