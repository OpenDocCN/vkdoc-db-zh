    你会注意到，在创建索引组织表（IOT）时，所使用的表名会在 `DBA/ALL/USER_TABLES` 中有一条记录。此外，在 `DBA/ALL/USER_INDEXES`
    中也会有一条记录，其名称是指定的主键约束名。对于索引组织表，`INDEX_TYPE` 列的值将为 `IOT - TOP`：


    ```sql

    select index_name,table_name,index_type from user_indexes;

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 18 章 ■ 对象管理


    以下是输出示例：


    ```text

    INDEX_NAME TABLE_NAME INDEX_TYPE


    -------------------- -------------------- ---------------------------


    PROD_SKU_PK PROD_SKU IOT - TOP

    ```


    ### 18-11. 创建视图


    #### 问题

    你想要存储一个经常运行的 SQL 查询。


    #### 解决方案

    使用 `CREATE VIEW` 命令来创建视图。以下代码创建一个视图（如果视图已存在，则替换它），该视图从 `SALES` 表中选择一部分列和行：


    ```sql

    create or replace view sales_rockies as


    select sales_id, amnt, state


    from sales


    where state in (''CO'',''UT'',''WY'',''ID'',''AZ'');

    ```


    现在，你可以像对待表一样对待 `SALES_ROCKIES` 视图。只从一个表中选择的视图称为简单视图。拥有该视图访问权限的模式可以执行其拥有对象权限的任何
    `SELECT`、`INSERT`、`UPDATE` 或 `DELETE` 操作，并且 DML 操作会导致底层表数据被更改。


    如果你想只允许更改视图范围内的底层表数据，则指定 `WITH CHECK OPTION`：


    ```sql

    create or replace view sales_rockies as


    select sales_id, amnt, state


    from sales


    where state in (''CO'',''UT'',''WY'',''ID'',''AZ'')


    with check option;

    ```


    使用 `WITH CHECK OPTION` 意味着你只能插入或更新那些会被视图查询返回的行。例如，以下更新语句会成功，因为我们没有以会导致其不被视图返回的方式更改底层数据：


    ```sql

    update sales_rockies set state=''CO'' where sales_id=160;

    ```


    然而，接下来的这个更新语句将失败，因为它试图将 `STATE` 列更新为一个无法通过视图选取的值：


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 18 章 ■ 对象管理


    ```sql

    update sales_rockies set state=''CA'' where sales_id=160;

    ```


    如果你不希望用户能够对视图执行 `INSERT`、`UPDATE` 或 `DELETE` 操作，那么就不要授予该用户对底层表的那些对象权限。如果你不希望拥有底层表（或拥有修改表数据权限）的账户能够通过视图更改底层表数据，请使用
    `WITH READ ONLY` 子句创建视图：


    ```sql

    create or replace view sales_rockies as


    select sales_id, amnt, state


    from sales


    where state in (''CO'',''UT'',''WY'',''ID'',''AZ'')


    with read only;

    ```


    如果你需要修改视图所基于的 SQL 查询，那么可以先删除再重新创建它，或者像前面的例子那样使用 `CREATE OR REPLACE` 语法。`CREATE
    OR REPLACE` 方法的优点是，你无需为先前已授予权限的用户重新建立对视图的访问权限。如果你删除并重新创建视图，则需要向先前被授予对该已删除和重建对象访问权限的任何用户或角色重新授予权限。


    `注意` 有一个 `ALTER VIEW` 命令用于修改视图的约束属性。你也可以使用 `ALTER VIEW` 命令来重新编译视图。


    #### 工作原理

    你可以将视图视为存储在数据库中的 SQL 语句。当你从视图中查询时，Oracle 会在数据字典中查找视图定义，执行视图所基于的查询，并返回结果。换句话说，视图是建立在其他表和/或视图之上的逻辑表。视图用于：

    -   创建一种高效的存储 SQL 查询以供重用的方法。

    -   在应用程序和物理表之间提供一个接口层。

    -   向应用程序隐藏 SQL 查询的复杂性。

    -   仅向用户报告列和/或行的子集。

    '
- fmt: '# CHAPTER 18 ■ OBJECT MANAGEMENT


    ## 18-12. Creating an Alternate Name for an Object


    ### Problem


    You have been granted access to another user’s tables. You wonder if there’s a
    way to create a pointer to those tables so you don’t have to place the schema
    name in front of the table name every time you access a table.


    ### Solution


    Use the `CREATE SYNONYM` command to create an alias for another database object.
    The following example creates a synonym for a table named `INV` that’s owned by
    the `INV_MGMT` user:


    ```sql

    create or replace synonym inv for inv_mgmt.inv;

    ```


    Once you’ve created the `INV` synonym, you can operate on the `INV_MGMT.INV` table
    directly. If `select` access has been granted to the `INV_MGMT.INV` table, you
    can now select by referencing the synonym `INV`. For example:


    ```sql

    select * from inv;

    ```


    The creation of the synonym does not create the privilege to access an object.
    Such privileges must be granted separately, usually before creating the synonym.


    ### How It Works


    Creating a synonym that points to another object eliminates the need to specify
    the schema owner or name of the object. This lets you create a layer of abstraction
    between an object and the user, often referred to as object transparency. Synonyms
    allow you to transparently manage objects separately from the users who access
    the objects.


    For example, you can use synonyms to set up multiple application environments
    within one database. Each environment would have its own synonyms that point to
    a different user’s objects, allowing you to run the exact same code against several
    different schemas within one database. You might do this because you can’t afford
    to build a separate box or database for development, testing, quality assurance,
    production, and so on.


    You can create synonyms for the following types of database objects:

    - Tables

    - Views or object views

    - Other synonyms

    - Remote objects via a database link

    - PL/SQL packages, procedures and functions

    - Materialized views

    - Sequences

    - Java class schema object

    - User defined object types


    You can also define a synonym to be `public`, which means that any user in the
    database has access to the synonym. Sometimes, what lazy (or inexperienced) DBAs
    do is the following:


    ```sql

    grant all on books to public;


    create public synonym books for inv_mgmt.books;

    ```


    Now any user that can connect to the database can perform any `INSERT`, `UPDATE`,
    `DELETE`, or `SELECT` operation on the `BOOKS` table that exists in the `INV_MGMT`
    schema. DBAs might be tempted to do this so they don’t have to bother setting
    up individual grants and synonyms for each schema that needs access.


    This is almost always a bad idea. There are a few issues with using `public` synonyms:

    - Troubleshooting can be problematic if you’re not aware of globally defined (`public`)
    synonyms.

    - Applications that share one database can have collisions on object names if
    multiple applications use `public` synonyms that are not unique within the database.

    - Security should be administered as needed, not on a wholesale basis.


    Sometimes it’s useful to dynamically generate synonyms for all tables or views
    for a schema that needs private synonyms. The following script uses SQL*Plus commands
    to format and capture the output of a SQL script that generates synonyms for all
    tables within a schema:


    ```sql

    CONNECT &&master_user/&&master_pwd.@&&tns_alias

    --

    SET LINESIZE 132 PAGESIZE 0 ECHO OFF FEEDBACK OFF VERIFY OFF HEAD OFF TERM OFF
    TRIMSPOOL ON

    --

    SPO gen_syns_dyn.sql

    --

    select ''create synonym '' || table_name || '' for '' || ''&&master_user..'' ||

    table_name || '';''

    from user_tables;

    --

    SPO OFF;

    --

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### As long as a user has `select` access on a view, they can issue the following
    SQL statements to display the SQL the view is based on:


    ```sql

    select text from all_views where view_name like upper(''&view_name'');

    ```


    If you’re running this SQL from SQL*Plus, use the `SET LONG` command in order
    to display the entire view. For example:


    ```

    SQL> set long 5000

    ```'
