- fmt: '# How It Works


    One nice feature of Oracle is that you can disable and enable constraints without
    dropping and recreating them. This means you avoid having to have on hand the
    DDL statements that would be required to recreate the dropped constraints.


    You can’t `TRUNCATE` a table that has a primary key defined that is referenced
    by an enabled foreign key constraint in a child table—even if the child table
    has zero rows in it. Oracle prevents you from doing this because in a multiuser
    system there is a possibility that another session can populate the child table
    with rows in between the time you truncate the child table and subsequently truncate
    the parent table.


    Oracle prudently does not allow you to truncate a parent table in this situation.


    Also keep in mind that `TRUNCATE` is a DDL command, so it automatically commits
    the current transaction after it executes. Thus, you can’t roll back a `TRUNCATE`
    operation, and you won’t be able to `TRUNCATE` two separate tables as one transaction.
    Compare the `TRUNCATE` behavior to that of `DELETE`.


    Oracle does allow you to use the `DELETE` statement to remove rows from a parent
    table while the constraints are enabled that reference a child table. This is
    because `DELETE` generates undo, is read-consistent, and can be rolled back.


    You can disable a primary key and all dependent foreign key constraints with the
    `CASCADE` option of the `DISABLE` clause. For example, this next line of code
    disables all foreign key constraints related to the `D_DATES_PK` primary key constraint:


    ```sql

    alter table d_dates disable constraint d_dates_pk cascade;

    ```


    The prior statement does not cascade through all levels of dependencies. It only
    disables the foreign key constraints directly dependent on the `D_DATES_PK`. Also
    keep in mind that there is no `ENABLE...CASCADE` statement. To re-enable the constraints,
    you’ll have to query the data dictionary to determine which constraints have been
    disabled and then re-enable them individually.


    Sometimes you’ll run into situations when loading data where it’s convenient to
    disable all of the foreign keys before loading data (perhaps from a schema-level
    import). In these situations, the `imp` utility simply imports the tables in alphabetical
    order and doesn’t ensure that child tables are imported before parent tables.
    Also, you might want to run several import jobs in parallel to take advantage
    of parallel hardware. In such scenarios, you can disable the foreign keys, perform
    the import, and then re-enable the foreign keys. Here is a script that uses SQL
    to generate SQL to disable all foreign key constraints for a user:


    ```sql

    set lines 132 trimsp on head off feed off verify off echo off pagesize 0

    spo dis_dyn.sql

    select ''alter table '' || a.table_name

    || '' disable constraint '' || a.constraint_name || '';''

    from dba_constraints a

    ,dba_constraints b

    where a.r_constraint_name = b.constraint_name

    and a.r_owner = b.owner

    and a.constraint_type = ''R''

    and b.owner = upper(''&table_owner'');

    spo off;

    ```


    This script generates a file named `dis_dyn.sql` that disables all of the foreign
    key constraints for a user. Listed next is a similar script to generate a file
    with the commands to re-enable foreign key constraints for a user:


    ```sql

    set lines 132 trimsp on head off feed off verify off echo off pagesize 0

    spo enable_dyn.sql

    select ''alter table '' || a.table_name

    || '' enable constraint '' || a.constraint_name || '';''

    from dba_constraints a

    ,dba_constraints b

    where a.r_constraint_name = b.constraint_name

    and a.r_owner = b.owner

    and a.constraint_type = ''R''

    and b.owner = upper(''&table_owner'');

    spo off;

    ```


    When enabling constraints, by default Oracle will check to ensure that the data
    doesn’t violate the constraint definition. If you are fairly certain that the
    data integrity is fine and that you don’t need to incur the performance hit by
    revalidating the constraint, you can use the `NOVALIDATE` clause when re-enabling
    the constraints. Here’s an example:


    ```sql

    select ''alter table '' || a.table_name

    || '' modify constraint '' || a.constraint_name || '' enable novalidate;''

    from dba_constraints a

    ,dba_constraints b

    where a.r_constraint_name = b.constraint_name

    and a.r_owner = b.owner

    and a.constraint_type = ''R''

    and b.owner = upper(''&table_owner'');

    ```


    The `NOVALIDATE` clause instructs Oracle not to validate the constraints being
    enabled, but it does enforce that any new DML activities do adhere to the constraint
    definition.


    You may also run into situations where you need to disable primary key or unique
    constraints. For example, you may want to perform a large data load and for performance
    reasons you want to disable the primary key and unique key constraints. You don’t
    want to incur the overhead of having every row checked as it is inserted.


    The same general techniques used for disabling foreign keys are applicable for
    disabling primary or unique keys. Run this query to display the primary key and
    unique key constraints for a user:


    ```sql

    select

    a.table_name

    ,a.constraint_name

    ,a.constraint_type

    from dba_constraints a

    where a.owner = upper(''&table_owner'')

    and a.constraint_type in (''P'',''U'')

    order by a.table_name;

    ```


    Here is some sample output:


    ```

    TABLE_NAME                     CONSTRAINT_NAME                C

    ------------------------------ ------------------------------ -

    DEPT                           SYS_C006507                    P

    D_DATES                        D_DATES_UK1                    U

    D_DATES                        D_DATES_PK                     P

    ```


    Once the table name and constraint name are identified, use the `ALTER TABLE`
    statement to disable the constraint:


    ```sql

    alter table d_dates disable constraint d_dates_pk;

    ```


    Oracle will not allow you to disable a primary key or unique key constraint that
    is referenced in a foreign key. You will first have to disable the foreign key
    constraints.


    Also, consider using the `NOVALIDATE` clause if you’re confident that the data
    does not need to be validated:


    ```sql

    alter table d_dates modify constraint d_dates_pk enable novalidate;

    ```


    This will instruct Oracle not to verify data when enabling the constraint but
    will validate any data modified after the constraint is enabled.


    ## Disabling Triggers


    ### Problem


    You’re about ready to load a large amount of data. You don’t want triggers impacting
    performance while you’re inserting data into a table. Moreover, you want to load
    the source data as it is; you do not want triggers executing and modifying data
    as it is loaded. You want to disable the triggers before you perform the data
    load.


    ### Solution


    You can disable single triggers or all triggers on a table. You can view the triggers
    for a table by querying the `DBA/ALL/USER_TRIGGERS` views. For example:


    ```sql

    select trigger_name, status

    from user_triggers where table_name=''CLUSTER_BUCKETS'';

    ```


    Here is the output:


    ```

    TRIGGER_NAME                  STATUS

    ------------------------------ --------

    CLUSTER_BUCKETS_BU_TR1        ENABLED

    ```


    Now use the `ALTER TRIGGER` statement to disable the trigger:


    ```sql

    alter trigger CLUSTER_BUCKETS_BU_TR1 disable;

    ```


    If you want to disable all triggers on a table, use the `ALTER TABLE...DISABLE
    ALL TRIGGERS` statement:


    ```sql

    alter table cluster_buckets disable all triggers;

    ```


    After you have loaded the data into the table, you can re-enable all triggers
    as follows:


    ```sql

    alter table cluster_buckets enable all triggers;

    ```'
