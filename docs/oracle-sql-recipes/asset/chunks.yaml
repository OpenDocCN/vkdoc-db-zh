    # CHAPTER 12


    ■ ■ ■


    # Cleansing Data


    Occasionally you’ll find yourself working in environments where you are extracting
    information from some data source and importing it into a relational database.
    The source of the information could be spreadsheets, CSV files, other databases,
    and so on. For example, it’s common in data warehouse environments to take data
    from several different database sources and import it into a centralized reporting
    database.


    When moving data from one source to another, there are sometimes conversion issues
    if the source data types are different from the target data types. In these situations,
    you’ll have to check the source data to make sure it is loadable into the destination
    database. For example, you could have a character string that needs to be imported
    into an Oracle database field that is of a `TIMESTAMP` data type. Or you may be
    transferring data from a system that does not have a primary key defined for a
    table, and before you load it into a destination database you’ll need to detect
    any duplicate rows.


    In some environments you may have an automated ETL (extract, transform, and load)
    process that performs the data cleansing. However, even if you are using a feature-rich
    ETL tool, you will still encounter situations in which you need to quickly use
    SQL to troubleshoot issues with the data. If the ETL process breaks or produces
    inconsistent results, you will have to use SQL to validate data.


    When transferring data, you’ll find that you need to use SQL to ensure that data
    conforms to the business rules for the destination database. These types of activities
    are broadly referred to as *data cleansing* (or data scrubbing). This chapter
    shows common SQL techniques that developers and DBAs use when moving data from
    one data source to another.


    ## 12-1. Detecting Duplicate Rows


    ### Problem


    You’re trying to add a primary key constraint to a table:


    ```sql

    alter table d_prods add constraint d_prods_pk primary key(d_prod_id);

    ```


