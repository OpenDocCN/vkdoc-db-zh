    \ DDL 的环境中。例如，你可能在一个没有 DBA 的团队工作，或者你已经创建了自己的个人数据库用于开发和测试。在这些情况下，开发人员需要执行数据库管理任务，因此必须熟悉编写\
    \ DDL 语句。\n\n本章不会涵盖所有可用的对象操作语句。相反，它重点介绍最常遇到的用户对象及其管理方法。我们将首先看基本的表创建和修改语句，然后逐步介绍其他典型的对象维护任务。\n\
    \n## 18-1. 创建表\n\n### 问题\n\n你想执行创建表的基本任务。\n\n### 解决方案\n\n毫无疑问，你使用`CREATE TABLE`命令来完成此任务。以下是一个简单的例子：\n\
    ```\ncreate table d_sources(\n    d_source_id number not null,\n    source_type\
    \ varchar2(32),\n    create_dtt date default sysdate not null,\n    update_dtt\
    \ timestamp(5)\n);\n```\n\n这段代码只创建了基本列定义的表，如果你赶时间，这通常就足够了。如果不指定任何表空间信息，表将在分配给你用户账户的默认表空间中创建。\n\
    \n查询`USER_TABLES`以查看当前连接账户内的表的元数据。从`ALL_TABLES`中选择以显示你的账户已被授予访问权限的表的信息。使用`DBA_TABLES`视图显示数据库中所有表的信息。\n\
    \n> **注意** 为什么使用`VARCHAR2`数据类型而不是`VARCHAR`数据类型？Oracle 是这么说的。尽管`VARCHAR`目前与`VARCHAR2`同义，但文档指出未来`VARCHAR`将被重新定义为单独的数据类型。\n\
    \n### 工作原理\n\nOracle 表是一个灵活且功能丰富的数据存储容器。如果你在 Oracle 文档中查找`CREATE TABLE`命令，你会发现大约七十页的细节。当你真正需要的只是一些好的例子时，翻阅冗长的文档可能令人生畏。\n\
    \n以下代码展示了创建表时最常用的功能。例如，这个 DDL 定义了主键、外键和表空间信息：\n```\ncreate table computer_systems(\n\
    \    computer_system_id number(38, 0) not null,\n    agent_uuid varchar2(256),\n\
    \    operating_system_id number(19, 0) not null,\n    hardware_model varchar2(50),\n\
    \    create_dtt date default sysdate not null,\n    update_dtt date,\n    constraint\
    \ computer_systems_pk primary key (computer_system_id)\n        using index tablespace\
    \ inv_mgmt_index\n) tablespace inv_mgmt_data;\n\n--\n\ncomment on column computer_systems.computer_system_id\
    \ is\n    'Surrogate key generated via an Oracle sequence.';\n\n--\n\ncreate unique\
    \ index computer_system_uk1 on computer_systems(agent_uuid)\n    tablespace inv_mgmt_index;\n\
    \n--\n\nalter table computer_systems add constraint computer_systems_fk1\n   \
    \ foreign key (operating_system_id)\n    references operating_systems(operating_system_id);\n\
    ```\n\n在表和索引创建语句中，请注意我们没有指定任何表物理空间属性。我们只为表和索引指定了表空间。如果没有指定表级空间属性，表将从表空间继承其空间属性。这简化了表的管理和维护。\n\
    \n让表从表空间继承其物理空间属性是一个好主意。如果你有需要不同物理空间属性的表，你可以创建单独的表空间来容纳具有不同需求的表。例如，你可以创建一个`DATA_LARGE`表空间，其扩展大小为\
    \ 16M，以及一个`DATA_SMALL`表空间，其扩展大小为 128K。（关于扩展和其他逻辑结构的讨论见第 10 章，创建表空间的示例见配方 17-4。）\n\
    \n## 18-2. 临时存储数据\n\n### 问题\n\n你想临时存储查询结果，以便会话稍后使用。\n\n### 解决方案\n\n使用`CREATE GLOBAL\
    \ TEMPORARY TABLE`语句创建一个仅临时存储数据的表。\n\n你可以指定临时表是保留数据直至会话结束还是直至事务提交。使用`ON COMMIT\
    \ PRESERVE ROWS`指定数据应在用户会话结束时删除。在此例中，行将被保留，直到用户显式删除数据或用户终止会话：\n```\ncreate global\
    \ temporary table today_regs\n    on commit preserve rows\n    as select * from\
    \ f_registrations\n    where create_dtt > sysdate - 1;\n```\n\n指定`ON COMMIT DELETE\
    \ ROWS`表示数据应在事务结束时删除。\n\n以下示例创建了一个名为`TEMP_OUTPUT`的临时表，并指定记录应在每个提交的事务结束时删除：\n```\n\
    create global temporary table temp_output(temp_row varchar2(30))\n    on commit\
    \ delete rows;\n```\n\n> **注意** 如果你没有为全局临时表指定提交方法，则默认是`ON COMMIT DELETE ROWS`。\n\
    \n你可以创建一个临时表并授予其他用户访问它的权限。但是，一个会话只能查看它自己插入到表中的数据。换句话说，如果两个会话使用同一个临时表，一个会话无法选择另一个会话插入到临时表中的任何数据。\n\
    \n### 工作原理\n\n全局临时表对于需要在表结构中短暂存储数据的应用程序非常有用。\n"
- fmt: '# Global Temporary Tables


    Global temporary tables store session private data that exists only for the duration
    of the session or transaction. Once you create a temporary table, it exists until
    you drop it. In other words, the definition of the temporary table is permanent;
    it’s the data that is short-lived.


    You can view whether a table is temporary by querying the `TEMPORARY` column of
    `DBA/ALL/USER_TABLES`:

    ```sql

    select table_name, temporary from user_tables;

    ```

    Temporary tables are designated with a `Y` in the `TEMPORARY` column. Regular
    tables contain an `N` in the `TEMPORARY` column.


    When you create records within a temporary table, space is allocated in your default
    temporary tablespace. You can verify this by running the following SQL:

    ```sql

    select username, contents, segtype from v$sort_usage;

    ```

    If you are working with a large number of rows and need better performance when
    selectively retrieving rows, you may want to consider creating an index on the
    appropriate columns in your temporary table:

    ```sql

    create index temp_index on temp_output(temp_row);

    ```

    Use the `DROP TABLE` command to drop a temporary table:

    ```sql

    drop table temp_output;

    ```


    ## Temporary Table Redo


    No redo data is generated for changes to blocks of a global temporary table. However,
    rollback data is generated for a transaction against a temporary table. Since
    the rollback data generates redo, there is some redo data associated with a transaction
    for a temporary table. You can verify this by turning on statistics tracing (see
    recipe 19-7 for more details) and viewing the redo size as you insert records
    into a temporary table:

    ```sql

    SQL> set autotrace on

    ```

    Next insert a few records into the temporary table:

    ```sql

    insert into temp_output values(1);

    insert into temp_output values(1);

    ```

    Here is a partial snippet of the output (only showing the redo size): `140 redo
    size`


    The redo load is less for temporary tables than normal tables because the redo
    generated is only associated with the rollback data for a temporary table transaction.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # Chapter 18 ■ Object Management


    ## 18-3. Moving a Table


    ### Problem

    You want to move a table to a different tablespace.


    ### Solution

    Use the `ALTER TABLE MOVE` statement to move a table from one tablespace to another.
    This example moves the `PARTIES` table to the `MTS` tablespace.

    ```sql

    alter table parties move tablespace mts;

    ```

    You can verify that the table has been moved by querying `USER_TABLES`:

    ```sql

    select table_name, tablespace_name from user_tables where table_name=''PARTIES'';

    ```

    ```

    TABLE_NAME           TABLESPACE_NAME

    -------------------- --------------------

    PARTIES              MTS

    ```


    ### How It Works

    Occasionally you will need to move a table from one tablespace to another. There
    may be manageability issues or perhaps the table is being used in a different
    way than originally intended and for organizational purposes it makes more sense
    for the table to be in a different tablespace.


    When you move a table, all of its indexes are rendered unusable. This is because
    a table’s index includes the `ROWID` as part of the structure. The table `ROWID`
    contains information about the physical location. Since the `ROWID` of a table
    changes when the table moves from one tablespace to another (because the table
    rows are now physically located in different datafiles), any indexes on the table
    contain incorrect information. To rebuild the index, use the `ALTER INDEX ...
    REBUILD` command.


    #### Oracle Rowid

    Every row in every table has an address. The address of a row is determined from
    a combination of the following:

    * datafile number

    * block number

    * location of row within the block

    * object number


    The address of a row in a table can be displayed by querying the `ROWID` pseudo-column.
    For example:

    ```sql

    select rowid, emp_id from emp;

    ```

    Here is some sample output:

    ```

    ROWID              EMP_ID

    ------------------ ----------

    AAAFWXAAFAAAAlWAAA 1

    ```

    The `ROWID` pseudo-column value is not physically stored in the database. Oracle
    calculates its value when you query it. The `ROWID` contents are displayed as
    base 64 values that can contain the characters `A-Z`, `a-z`, `0-9`, `+`, and `/`.
    You can translate the `ROWID` value into meaningful information via the `DBMS_ROWID`
    package.


    For example to display the relative file number that a row is stored in, issue
    this statement:

    ```sql

    select dbms_rowid.rowid_relative_fno(rowid), emp_id from emp;

    ```

    Here is some sample output:

    ```

    DBMS_ROWID.ROWID_RELATIVE_FNO(ROWID) EMP_ID

    ------------------------------------ ----------

    5                                    1

    ```

    The `ROWID` value can be used in the `SELECT` and `WHERE` clauses of a SQL statement.
    In most cases the `ROWID` uniquely identifies a row. However, it is possible to
    have rows in different tables that are stored in the same cluster and so contain
    rows with the same `ROWID`.


    ## 18-4. Renaming Objects


    ### Problem

    You have an obsolete table in a schema. Before you drop the table, you want to
    rename it and see if anybody complains that they no longer have access.


    ### Solution

    Use the `ALTER TABLE ... RENAME` statement to rename a table. This example renames
    a table from `PRODUCTS` to `PRODUCTS_OLD`:

    ```sql

    alter table products rename to products_old;

    ```

    After you’re sure the table is not being used, you can drop it:

    ```sql

    drop table products_old;

    ```

    > **Note** See recipe 18-5 for full details on dropping a table.


    ### How It Works

    In Oracle, you can rename many different objects such as:

    * Tables

    * Columns

    * Indexes

    * Constraints

    * Triggers


    Renaming a table before you drop it is a common practice because it gives you
    a quick way to recover in the event the table is still being used. Another good
    reason to rename an object is to make sure it conforms to your database naming
    standards.


    Here are some brief examples showing how to rename other object types. The following
    code renames one of the `PRODUCTS` table’s columns from `PRODUCT_ID` to `PRODUCT_NO`:

    ```sql

    alter table products rename column product_id to product_no;

    ```

    The next line renames an index from `PRODID` to `PROD_IDX1`:

    ```sql

    alter index prodid rename to prod_idx1;

    ```

    Similarly, you can rename a constraint. The next line of code renames a constraint
    from `MAST_CON` to `MAST_FK1`:

    ```sql

    alter table details rename constraint mast_con to mast_fk1;

    ```

    The next example renames a trigger from `F_SHIPMENTS_BU_TR1` to `F_AU_TR2`:

    ```sql

    alter trigger f_shipments_bu_tr1 rename to f_au_tr2;

    ```

    Note that it is possible to create two objects within the same schema with the
    same name. For example, you can create a table and an index in the same schema
    with the same name. However, you can’t create a table and a view with the same
    name within the same schema.


    To understand which objects can (or cannot) be created with the same name within
    a schema, you must understand the concept of a namespace. A *namespace* is a grouping
    of objects within a schema in which no two objects can have the same name. Objects
    in different groupings (that is, different namespaces) within a schema can have
    the same name.


    The following objects share the same namespace within a schema:

    * tables

    * views

    * materialized views

    * private synonyms

    * sequences

    * procedures

    * functions

    * packages

    * user defined types


    Each of the follow objects has its own namespace within a schema:

    * indexes

    * constraints

    * triggers

    * clusters

    * private database links

    * dimensions


    Thus it is possible to create a trigger with the same name as a function or procedure.
    However, a table and a view are in the same namespace and therefore can’t have
    the same name. Each schema has its own namespace for the objects that it owns.
    Two different schemas can therefore create a table with the same name.


    These objects each have their own namespaces within a database:

    * roles

    * public synonyms

    * public database links

    * tablespaces

    * profiles

    * initialization files (`spfile` and `init.ora`)'
