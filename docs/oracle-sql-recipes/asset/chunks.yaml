    ## 11-4\. Sorting Results into Equal-Size Buckets


    ### Problem


    You need to group data into equal-size buckets for a report. For instance, you
    want to sort your customers in quartiles based on the value of their orders, so
    you can identify your big spenders.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### Solution


    Use Oracle’s two bucket-style analytic functions to perform easy bucket sorts.
    `NTILE` provides constant-height (equi-height) bucket sorts, and `WIDTH_BUCKET`
    provides constant width, histogram-style bucket sorts.


    In order to find quartiles among our customers based on spending, we’ll use the
    `NTILE` function.


    This will provide equal-sized quartiles for our analysis. The next SQL examines
    the total order amount by customer, returning the quartiles we seek.


    ```sql

    select customer_id, order_total,

    ntile(4) over (order by order_total desc) as order_quartile

    from oe.orders;

    ```


    The abbreviated results give you the feel for how the quartiles break down.


    ```

    CUSTOMER_ID ORDER_TOTAL ORDER_QUARTILE

    ----------- ----------- --------------

    147 295892 1

    150 282694.3 1

    149 268651.8 1

    ...

    168 45175 2

    102 42283.2 2

    ...

    169 15760.5 3

    116 14685.8 3

    ...

    103 78 4

    167 48 4

    ```


    A common sales technique in many companies would see account representatives target
    the highest quartile, and ensure those customers get special treatment and support
    to keep the big orders rolling in. Customer 167 is unlikely to get such attention,
    based on a $48 order.


    ### How It Works


    The `NTILE` function takes the general form of specifying the number of buckets
    to use for grouping, and the data to use for ordering to determine the groups.
    In pseudo-SQL, the general form looks like this.


    ```

    NTILE(<number of buckets>) over (<partitioning and ordering to determine bucket>)

    ```


    In our recipe, we’ve instructed Oracle to create four buckets using `NTILE(4)`,
    so we can create four groups to satisfy the usual meaning of quartile. The `OVER
    (ORDER BY ORDER_TOTAL DESC)` clause directs Oracle to order the data by `ORDER_TOTAL`
    in descending order for the purposes of allocating each row to the relevant bucket/quartile.
    Whatever data is sorted first will be allocated to the first bucket, so the 272


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    choice of ascending and descending sorts in the analytic function controls whether
    high or low values are considered to be in the first or last bucket.


    Remember, this ordering does not dictate the order in which the data will be finally
    displayed. It only controls bucket allocation for the `NTILE` function. The sample
    results appear to be neatly ordered by bucket, but this is just coincidence. If
    your data is large, or Oracle uses parallel query execution, you could find the
    results returned in a different order. The bucket allocation will still be correct,
    of course.


    To control the order of presentation, use a normal `ORDER BY` clause, as shown
    in the next SQL.


    ```sql

    select customer_id, order_total,

    ntile(4) over (order by order_total desc) as order_quartile

    from oe.orders

    order by 2 desc, 3;

    ```


    This ordering ensures you will always see the highest-value orders, those in the
    first quartile, sorted first in the results.


    You can satisfy yourself that `NTILE` has produced equal-size buckets by wrapping
    the base query into a simple outer `SELECT` with a `COUNT` function. The next
    SQL shows how the customer order data has been balanced across the buckets.


    ```sql

    select order_quartile, count(*) as bucket_count

    from (

    select customer_id, order_total,

    ntile(4) over (order by order_total desc) as order_quartile

    from oe.orders )

    group by order_quartile

    order by order_quartile;

    ```


    ```

    ORDER_QUARTILE BUCKET_COUNT

    -------------- ------------

    1 27

    2 26

    3 26

    4 26

    ```


    You can see how Oracle has dealt with the fact that the number of orders is not
    perfectly divisible into our four buckets, and has approximated a perfect balance
    as a result.


