- fmt: "[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# CHAPTER 14\n\n■ ■ ■\n\
    \n# Working with XML Data\n\nBack in the halcyon days of the dot-com boom, it\
    \ seemed every problem known to humankind could be solved with the application\
    \ of a single technology — XML was the answer! Fast forward 10 years, and XML\
    \ has become part of everyday life for information technology. Whether it’s as\
    \ part of the SOAP protocols for web services, the basis for workflow with BPEL\
    \ (the Business Process Execution Language for Web Services), or as a universal\
    \ mechanism for data interchange, XML is increasingly entering the database world.\n\
    \nOracle added support for XML with Oracle 9*i*, and has improved its capabilities\
    \ so that XML in 11*g* Release 2 is a first-class data citizen, with a wealth\
    \ of tricks up its metaphorical sleeve. The recipes presented here are a mix of\
    \ introductory examples, as well as more complex tasks to suit both beginners\
    \ and experienced hands at XML in Oracle.\n\n## 14-1\\. Translating SQL to XML\n\
    \n### Problem\n\nYou need to convert data stored in traditional form in your database\
    \ to XML. For instance, you need to dynamically create XML from your employee\
    \ data for an employee record to send to a third party.\n\n### Solution\n\nOracle\
    \ possesses many different functions for converting data to XML format. The sheer\
    \ number of functions stems from the evolution of XML in the database, from its\
    \ early inclusion in Oracle 9*i* through to its amazing flexibility in Oracle\
    \ today. Some of the principal functions Oracle provides for converting relational\
    \ data to XML are the `SYS_XMLGEN`, `DBMS_XMLGEN`, and `XMLELEMENT` functions.\
    \ Each of these could solve this particular problem, but each has its own idiosyncracies.\n\
    \nWe’ve chosen to craft our recipe for dynamically converting one row of data\
    \ with `SYS_XMLGEN`. We employ a user-defined type to act as a helper type to\
    \ map our target data from relational to object-relational form, so it can be\
    \ passed straight to `SYS_XMLGEN`. The `SYS_XMLGEN` function returns a block of\
    \ XML based on a row or row-like expression. It can take a literal value, a single\
    \ column, or a user-defined type as input parameter. We create the `EMPLOYEE_MAP_TYPE`\
    \ shown next to map the relational data in the `HR.EMPLOYEES` table to a user-defined\
    \ type that can be used directly by `SYS_XMLGEN`.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nCHAPTER 14 ■ WORKING WITH XML DATA\n\n```sql\ncreate or replace type employee_map_type\
    \ as object (\n  employee_id    number(6),\n  first_name     varchar2(20),\n \
    \ last_name      varchar2(25),\n  email          varchar2(25),\n  phone_number\
    \   varchar2(20),\n  hire_date      date,\n  job_id         varchar2(10),\n  salary\
    \         number(8,2),\n  commission_pct number(2,2),\n  manager_id     number(6),\n\
    \  department_id  number(4)\n);\n/\n```\n\nWe now use the `EMPLOYEE_MAP_TYPE`\
    \ type as a catalyst to feed data stored relationally for XML processing and output.\
    \ The next procedure returns a valid, well-formed XML document representing the\
    \ details of a given employee.\n\n```sql\ncreate or replace procedure employee_xml\
    \ (emp_id IN number)\nas\n  xml_employee xmltype;\nbegin\n  select\n    sys_xmlgen\n\
    \      (employee_map_type\n        (e.employee_id,\n         e.first_name,\n \
    \        e.last_name,\n         e.email,\n         e.phone_number,\n         e.hire_date,\n\
    \         e.job_id,\n         e.salary,\n         e.commission_pct,\n        \
    \ e.manager_id,\n         e.department_id)\n      ) into xml_employee\n  from\
    \ hr.employees e\n  where e.employee_id = emp_id;\n\n  dbms_output.put_line(xml_employee.getclobval());\n\
    end;\n/\n```\n\nWe can now call the `EMPLOYEE_XML` procedure to provide employee\
    \ data in XML form.\n\n```sql\ncall employee_xml(150);\n```\n\n输出结果：\n\n```xml\n\
    <?xml version=\"1.0\"?>\n<ROW>\n  <EMPLOYEE_ID>150</EMPLOYEE_ID>\n  <FIRST_NAME>Peter</FIRST_NAME>\n\
    \  <LAST_NAME>Tucker</LAST_NAME>\n  <EMAIL>PTUCKER</EMAIL>\n  <PHONE_NUMBER>011.44.1344.129268</PHONE_NUMBER>\n\
    \  <HIRE_DATE>30-JAN-97</HIRE_DATE>\n  <JOB_ID>SA_REP</JOB_ID>\n  <SALARY>10000</SALARY>\n\
    \  <COMMISSION_PCT>.3</COMMISSION_PCT>\n  <MANAGER_ID>145</MANAGER_ID>\n  <DEPARTMENT_ID>80</DEPARTMENT_ID>\n\
    </ROW>\n```\n\nCall completed.\n\n### How It Works\n\nOur recipe works in two\
    \ parts to build reusable components to convert employee data to XML. One limitation\
    \ of the `SYS_XMLGEN` function is that it cannot accept multiple columns or tabular\
    \ results as an input — such as the result of a `SELECT * …` statement. While\
    \ the `DBMS_XMLGEN` procedure could do this, there’s significant extra complexity\
    \ to using that approach, which we want to avoid. We use `SYS_XMLGEN`’s ability\
    \ to operate on a user-defined type of arbitrary complexity. Our `EMPLOYEE_MAP_TYPE`\
    \ mimics the column names and datatypes of the `HR.EMPLOYEES` table.\n\nWe create\
    \ the `EMPLOYEE_XML` procedure by declaring a variable `XML_EMPLOYEE` to hold\
    \ the generated XML version of the employee data.\n\nUp to this point, our procedure\
    \ is very straightforward. The next step calls `SYS_XMLGEN`:\n\n```sql\nselect\n\
    \  sys_xmlgen\n    (employee_map_type\n      (e.employee_id,\n       e.first_name,\n\
    \       e.last_name,\n       e.email,\n       e.phone_number,\n       e.hire_date,\n\
    \       e.job_id,\n       e.salary,\n       e.commission_pct,\n       e.manager_id,\n\
    \       e.department_id)\n    ) into xml_employee\nfrom hr.employees e\nwhere\
    \ e.employee_id = emp_id;\n```\n\nHere we use our `EMPLOYEE_MAP_TYPE` to dynamically\
    \ cast the results from the `SELECT` statement into our custom user-defined datatype.\
    \ At this point, we have a parameter that `SYS_XMLGEN` can accept. The result\
    \ of the `SYS_XMLGEN` call is then directed to the `XML_EMPLOYEE` variable by\
    \ the `INTO` clause.\n\nAt this point, the `XML_EMPLOYEE` variable holds our desired\
    \ data in XML form. For a normal user to see the XML, we need to use a trick that\
    \ relies on the underlying storage model for XML in Oracle. Under the hood, XML\
    \ can be stored and managed in several ways. The most common is as a `CLOB`, and\
    \ we can use this knowledge to invoke `CLOB` methods to retrieve the XML. The\
    \ last line of our procedure invokes the `GETCLOBVAL` function on our `XML_EMPOYEE`\
    \ variable, passing the results to `DBMS_OUTPUT.PUT_LINE` for printing onscreen\
    \ (If you’re running in SQL*Plus, don’t forget to issue `SET SERVEROUTPUT ON`).\n\
    \n## The Many Forms of XMLTYPE Storage\n\nOracle provides four different storage\
    \ mechanisms for `XMLTYPE` data. These different approaches stem from the nature\
    \ of XML as typically large blocks of text with a readily defined structure. It’s\
    \ this tension between large size and the patterns or structure hidden within\
    \ that leads to trade-offs in storage efficiency versus indexing, and throughput\
    \ versus transactional capabilities.\n\nThe four storage approaches for the `XMLTYPE`\
    \ datatype are:\n\n- **Object-Relational:** XML data is shredded into automatically\
    \ created object-relational rows, ideal for element-based access, updates, and\
    \ processing. Object-relational storage requires processing overhead to reform\
    \ the complete XML document each time it is accessed as a single object.\n- **CLOB:**\
    \ Using a character large object approach to storing XML allows for easy processing\
    \ of the whole XML document, preserving format, whitespace, and more. Extra overhead\
    \ is introduced when updating individual elements in the XML, or indexing at the\
    \ element level.\n- **Hybrid:** A compromise between object-relational and `CLOB`\
    \ storage, hybrid attempts to add element-level performance enhancements to document-centric\
    \ `CLOB` storage.\n- **Binary XML:** The newest form of XML storage in Oracle,\
    \ this approach stores XML documents in a “post-parse” format, with checks for\
    \ XML structure already performed. The underlying storage uses a compressed binary\
    \ form, adding space efficiency to the processing efficiency gains.\n\nOlder applications\
    \ and designs based on Oracle would normally choose between object-relational\
    \ and `CLOB` storage, depending on the element/processing-centric versus document/throughput-centric\
    \ nature of the system. Any new development with Oracle should favor the new `Binary\
    \ XML` storage mechanism — though edge cases that emphasize extreme throughput\
    \ or heavy element-level manipulation should be benchmarked with the `CLOB` or\
    \ object-relational storage options."
