- fmt: "The `FEEDBACK` parameter controls the display of the number of lines affected\
    \ by the SQL statement. The `PAGESIZE` parameter when set to `0` will suppress\
    \ headings and page breaks.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 12 ■ CLEANSING DATA\n\nAfter the various display settings have been\
    \ turned off, the script uses the `SPOOL` command to send the output to a file.\
    \ You can now run the drop commands contained within the captured output file\
    \ as follows: `SQL> @drop_ind.sql`\n\n## 12-8. Disabling Constraints\n\n### Problem\n\
    You’re trying to truncate a table but receive the following error message: `ORA-02266:\
    \ unique/primary keys in table referenced by enabled foreign keys`. Upon further\
    \ investigation, you discover that Oracle will not allow a truncate operation\
    \ on a parent table with a primary key that is referenced by an enabled foreign\
    \ key in a child table. You need to disable the foreign key constraint before\
    \ proceeding with the truncate operation.\n\n### Solution\nIf you need to truncate\
    \ a parent table, you’ll first have to disable all of the enabled foreign key\
    \ constraints that reference the parent table primary key. Run this query to determine\
    \ the names of the constraints that need to be disabled:\n\n```sql\nselect\n \
    \ b.table_name primary_key_table\n ,a.table_name fk_child_table\n ,a.constraint_name\
    \ fk_child_table_constraint\nfrom dba_constraints a\n    ,dba_constraints b\n\
    where a.r_constraint_name = b.constraint_name\n  and a.r_owner = b.owner\n  and\
    \ a.constraint_type = 'R'\n  and b.owner = upper('&table_owner')\n  and b.table_name\
    \ = upper('&table_name');\n```\n\nFor this example, there is only one foreign\
    \ key dependency:\n\n```\nPRIMARY_KEY_TABLE FK_CHILD_TABLE        FK_CHILD_TABLE_CONST\n\
    -------------------- -------------------- --------------------\nD_DATES      \
    \        F_SALES              F_SALES_FK1\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 12 ■ CLEANSING DATA\n\nUse the `ALTER TABLE` statement to disable\
    \ constraints on a table. In this case, there is only one foreign key to disable:\n\
    \n`alter table f_sales disable constraint f_sales_fk1;`\n\nYou can now truncate\
    \ the parent table:\n\n`truncate table d_dates;`\n\nDon’t forget to re-enable\
    \ the foreign key constraints after the truncate operation has completed, like\
    \ this:\n\n`alter table f_sales enable constraint f_sales_fk1;`\n\nIn multiuser\
    \ systems, there is the possibility that another session has inserted data into\
    \ the child table while the foreign key constraint was disabled. If that happens,\
    \ you’ll see the following error when you attempt to re-enable the foreign key:\n\
    \n`ORA-02298: cannot validate (<owner>.<constraint>) - parent keys not found`.\
    \ In this scenario, you can use the `ENABLE NOVALIDATE` clause. This instructs\
    \ Oracle not to validate any existing rows, but to validate rows added after the\
    \ constraint is re-enabled: `alter table f_sales enable novalidate constraint\
    \ f_sales_fk1;`\n\nTo clean up the rows that violate the constraint, first ensure\
    \ that you have an `EXCEPTIONS` table created in your schema. If you don’t have\
    \ an `EXCEPTIONS` table, use this script to create one: `SQL> @?/rdbms/admin/utlexcpt.sql`\n\
    \nNext populate the `EXCEPTIONS` table with the rows that violate the constraint\
    \ with the `EXCEPTIONS INTO` clause:\n\n```sql\nalter table f_sales modify constraint\
    \ f_sales_fk1 validate\nexceptions into exceptions;\n```\n\nThis statement will\
    \ still throw the `ORA-02298` error as long as there are rows that violate the\
    \ constraint. The statement will also insert records into the `EXCEPTIONS` table\
    \ for any bad rows. You can now use the `ROW_ID` column of the `EXCEPTIONS` table\
    \ to remove any records that violate the constraint.\n\nHere we see that one row\
    \ needs to be removed from the `F_SALES` table:\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 12 ■ CLEANSING DATA\n\n```sql\nselect * from exceptions;\n```\n\n\
    ```\nROW_ID            OWNER        TABLE_NAME    CONSTRAINT\n-----------------\
    \ ------------ ------------- ---------------\nAAAFVmAAFAAAAihAAA INV_MMGT    F_SALES\
    \       F_SALES_FK1\n```\n\nTo remove the offending record, issue a `DELETE` statement:\n\
    \n`delete from f_sales where rowid = 'AAAFVmAAFAAAAihAAA';`"
