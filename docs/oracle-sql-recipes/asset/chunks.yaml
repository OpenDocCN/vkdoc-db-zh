- fmt: "# 第18章 对象管理\n\n本章重点介绍用于管理数据库对象的SQL技术，包括表、索引、视图和同义词等对象类型。用于创建和修改对象的SQL语句通常被称为数据定义语言（DDL）语句。管理DDL是数据库管理员日常工作的一部分。DBA经常生成和修改DDL脚本来构建开发、测试、预生产和生产数据库。因此，DBA需要特别擅长编写DDL。\n\
    \n有些人会争辩说，只有数据库管理员才应该维护和管理DDL，开发人员不应该插手模式管理。然而，现实情况是，开发人员常常发现自己身处需要编写和维护DDL的环境中。例如，你可能在一个没有DBA的团队工作，或者你已经创建了自己的个人数据库用于开发和测试。在这些情况下，开发人员需要执行数据库管理任务，因此必须熟悉编写DDL语句。\n\
    \n本章不会涵盖所有可用的对象操作语句。相反，它重点介绍最常遇到的用户对象及其管理方法。我们将首先看基本的表创建和修改语句，然后逐步介绍其他典型的对象维护任务。\n\
    \n## 18-1. 创建表\n\n### 问题\n\n你想执行创建表的基本任务。\n\n### 解决方案\n\n毫无疑问，你使用`CREATE TABLE`命令来完成此任务。以下是一个简单的例子：\n\
    ```\ncreate table d_sources(\n    d_source_id number not null,\n    source_type\
    \ varchar2(32),\n    create_dtt date default sysdate not null,\n    update_dtt\
    \ timestamp(5)\n);\n```\n\n这段代码只创建了基本列定义的表，如果你赶时间，这通常就足够了。如果不指定任何表空间信息，表将在分配给你用户账户的默认表空间中创建。\n\
    \n查询`USER_TABLES`以查看当前连接账户内的表的元数据。从`ALL_TABLES`中选择以显示你的账户已被授予访问权限的表的信息。使用`DBA_TABLES`视图显示数据库中所有表的信息。\n\
    \n> **注意** 为什么使用`VARCHAR2`数据类型而不是`VARCHAR`数据类型？Oracle是这么说的。尽管`VARCHAR`目前与`VARCHAR2`同义，但文档指出未来`VARCHAR`将被重新定义为单独的数据类型。\n\
    \n### 工作原理\n\nOracle表是一个灵活且功能丰富的数据存储容器。如果你在Oracle文档中查找`CREATE TABLE`命令，你会发现大约七十页的细节。当你真正需要的只是一些好的例子时，翻阅冗长的文档可能令人生畏。\n\
    \n以下代码展示了创建表时最常用的功能。例如，这个DDL定义了主键、外键和表空间信息：\n```\ncreate table computer_systems(\n\
    \    computer_system_id number(38, 0) not null,\n    agent_uuid varchar2(256),\n\
    \    operating_system_id number(19, 0) not null,\n    hardware_model varchar2(50),\n\
    \    create_dtt date default sysdate not null,\n    update_dtt date,\n    constraint\
    \ computer_systems_pk primary key (computer_system_id)\n        using index tablespace\
    \ inv_mgmt_index\n) tablespace inv_mgmt_data;\n\n--\n\ncomment on column computer_systems.computer_system_id\
    \ is\n    'Surrogate key generated via an Oracle sequence.';\n\n--\n\ncreate unique\
    \ index computer_system_uk1 on computer_systems(agent_uuid)\n    tablespace inv_mgmt_index;\n\
    \n--\n\nalter table computer_systems add constraint computer_systems_fk1\n   \
    \ foreign key (operating_system_id)\n    references operating_systems(operating_system_id);\n\
    ```\n\n在表和索引创建语句中，请注意我们没有指定任何表物理空间属性。我们只为表和索引指定了表空间。如果没有指定表级空间属性，表将从表空间继承其空间属性。这简化了表的管理和维护。\n\
    \n让表从表空间继承其物理空间属性是一个好主意。如果你有需要不同物理空间属性的表，你可以创建单独的表空间来容纳具有不同需求的表。例如，你可以创建一个`DATA_LARGE`表空间，其扩展大小为16M，以及一个`DATA_SMALL`表空间，其扩展大小为128K。（关于扩展和其他逻辑结构的讨论见第10章，创建表空间的示例见配方17-4。）\n\
    \n## 18-2. 临时存储数据\n\n### 问题\n\n你想临时存储查询结果，以便会话稍后使用。\n\n### 解决方案\n\n使用`CREATE GLOBAL\
    \ TEMPORARY TABLE`语句创建一个仅临时存储数据的表。\n\n你可以指定临时表是保留数据直至会话结束还是直至事务提交。使用`ON COMMIT\
    \ PRESERVE ROWS`指定数据应在用户会话结束时删除。在此例中，行将被保留，直到用户显式删除数据或用户终止会话：\n```\ncreate global\
    \ temporary table today_regs\n    on commit preserve rows\n    as select * from\
    \ f_registrations\n    where create_dtt > sysdate - 1;\n```\n\n指定`ON COMMIT DELETE\
    \ ROWS`表示数据应在事务结束时删除。\n\n以下示例创建了一个名为`TEMP_OUTPUT`的临时表，并指定记录应在每个提交的事务结束时删除：\n```\n\
    create global temporary table temp_output(temp_row varchar2(30))\n    on commit\
    \ delete rows;\n```\n\n> **注意** 如果你没有为全局临时表指定提交方法，则默认是`ON COMMIT DELETE ROWS`。\n\
    \n你可以创建一个临时表并授予其他用户访问它的权限。但是，一个会话只能查看它自己插入到表中的数据。换句话说，如果两个会话使用同一个临时表，一个会话无法选择另一个会话插入到临时表中的任何数据。\n\
    \n### 工作原理\n\n全局临时表对于需要在表结构中短暂存储数据的应用程序非常有用。"
  raw: 'By default, the DEFAULT profile is assigned to all new users created in the
    database. In the solution section of this recipe, the PASSWORD_VERIFY_FUNCTION
    parameter of the DEFAULT profile is assigned the VERIFY_FUNCTION_11G function.
    From that point on, any user assigned the DEFAULT profile will have the VERIFY_FUNCTION_11G
    function execute when his password is created or modified.


    You can verify that the new security function is in effect by attempting to change
    the password of a user who has been assigned the DEFAULT profile. In this example
    an attempt is made to change the password to less than the minimum length:


    SQL> password


    Changing password for HEERA


    Old password:


    New password:


    Retype new password:


    ERROR:


    ORA-28003: password verification for the specified password failed


    ORA-20001: Password length less than 8


    Password unchanged


    ■ **Note** For Oracle Database 11 *g*, the minimum length is eight characters.
    For Oracle Database 10 *g*, the minimum length is four characters.


    Starting with Oracle Database 11 *g,* password case-sensitivity is enforced. You
    can disable this feature by setting the SEC_CASE_SENSITIVE_LOGON initialization
    parameter to FALSE: alter system set sec_case_sensitive_logon = FALSE;


    However, this is not recommended.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 1 8**


    ■ ■ ■


    **Object Management**


    This chapter focuses on SQL techniques used to manage database objects, including
    object types such as tables, indexes, views, and synonyms. The SQL statements
    you use to create and modify objects are often referred to as data definition
    language (DDL) statements. Managing DDL is part of a database administrator’s
    daily job. DBAs frequently generate and modify DDL scripts to build development,
    test, staging, and production databases. For these reasons a DBA needs to be particularly
    deft at writing DDL.


    Some will argue that only a database administrator should maintain and manage
    DDL and that developers should keep their hands out of schema management. However,
    the reality is that developers often find themselves in environments where they
    need to write and maintain DDL. For example, you might be in a shop that doesn’t
    have a DBA or perhaps you’ve created your own personal database to use for development
    and testing. In these situations the developer is required to perform database
    administration tasks and therefore must be familiar with writing DDL statements.


    This chapter doesn’t cover every object manipulation statement available. Instead,
    it focuses on the most commonly encountered user objects and how to manage them.
    We’ll look first at basic table creation and modification statements, then progress
    to other typical object maintenance tasks.


    18-1\. Creating a Table


    Problem


    You want to perform the basic task of creating a table.


    Solution


    Not surprisingly, you use the CREATE TABLE command to accomplish this task. Here’s
    a simple example: create table d_sources(


    d_source_id number not null,


    source_type varchar2(32),


    create_dtt date default sysdate not null,


    update_dtt timestamp(5)


    );


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ OBJECT MANAGEMENT


    This code creates a table with just basic column definitions, which is usually
    sufficient if you’re in a hurry. If you don’t specify any tablespace information,
    the table will be created in the default tablespace assigned to your user account.


    Query the USER_TABLES to view metadata regarding tables within your currently
    connected account Select from the ALL_TABLES to display information about tables
    that your account has been granted privileges on. Use the DBA_TABLES view to display
    information regarding all tables in the database.


    ■ **Note** Why use the VARCHAR2 datatype instead of the VARCHAR datatype? Oracle
    says so. Although VARCHAR is currently synonymous with VARCHAR2, the documentation
    states that in the future VARCHAR will be redefined as a separate datatype.


    How It Works


    The Oracle table is a flexible and feature-rich container for storing data. If
    you look in Oracle’s documentation for the CREATE TABLE command, you’ll find about
    seventy pages of details. It can be daunting to wade through lengthy documentation
    when what you really need are a few good examples.


    The following code shows the most common features you’ll use when creating a table.
    For example, this DDL defines primary keys, foreign keys, and tablespace information:
    create table computer_systems(


    computer_system_id number(38, 0) not null,


    agent_uuid varchar2(256),


    operating_system_id number(19, 0) not null,


    hardware_model varchar2(50),


    create_dtt date default sysdate not null,


    update_dtt date,


    constraint computer_systems_pk primary key (computer_system_id)


    using index tablespace inv_mgmt_index


    ) tablespace inv_mgmt_data;


    --


    comment on column computer_systems.computer_system_id is


    ''Surrogate key generated via an Oracle sequence.'';


    --


    create unique index computer_system_uk1 on computer_systems(agent_uuid) tablespace
    inv_mgmt_index;


    --


    alter table computer_systems add constraint computer_systems_fk1


    foreign key (operating_system_id)


    references operating_systems(operating_system_id);


    In the table and index creation statements, notice that we did not specify any
    table physical space properties. We only specified the tablespace for the table
    and the index. If no table-level space properties 426


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ OBJECT MANAGEMENT


    are specified, the table inherits its space properties from the tablespace. This
    simplifies table administration and maintenance.


    It’s a good idea to let a table inherit its physical space properties from the
    tablespace. If you have tables that require different physical space properties,
    you can create separate tablespaces to hold tables with differing needs. For example,
    you might create a DATA_LARGE tablespace with extent sizes of 16M, and a DATA_SMALL
    tablespace with extents sizes of 128K. (See Chapter 10 for a discussion of extents
    and other logical structures, and recipe 17-4 for an example of creating a tablespace.)
    18-2\. Storing Data Temporarily


    Problem


    You want to store the results of a query temporarily for later use by a session.


    Solution


    Use the CREATE GLOBAL TEMPORARY TABLE statement to create a table that stores
    data only provisionally.


    You can specify that the temporary table retain the data for a session or until
    a transaction commits. Use ON COMMIT PRESERVE ROWS to specify the data should
    be deleted at the end of the user’s session. In this example, the rows will be
    retained until the user either explicitly deletes data or until the user terminates
    the session:


    create global temporary table today_regs


    on commit preserve rows


    as select * from f_registrations


    where create_dtt > sysdate - 1;


    Specify ON COMMIT DELETE ROWS to indicate the data should be deleted at the end
    of the transaction.


    The following example creates a temporary table named TEMP_OUTPUT and specifies
    that records should be deleted at the end of each committed transaction:


    create global temporary table temp_output(temp_row varchar2(30))


    on commit delete rows;


    ■ **Note** If you don’t specify a commit method for a global temporary table,
    then the default is ON COMMIT DELETE


    ROWS.


    You can create a temporary table and grant other users access to it. However,
    a session can only view the data that it inserts into a table. In other words,
    if two sessions are using the same temporary table, a session cannot select any
    data inserted into the temporary table by a different session.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ OBJECT MANAGEMENT


    How It Works


    A global temporary table is useful for applications that need to briefly store
    data in a table structure.'
