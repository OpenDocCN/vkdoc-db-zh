- fmt: "We also need the `TO_CHAR` conversion to work in conjunction with the `NVL`\
    \ null-testing function, to map the employees with a null `DEPARTMENT_ID` to a\
    \ “-” to indicate no department. This is for purely cosmetic reasons, but you\
    \ can see how it can provide clarity for people reading your recipe results. This\
    \ way, they don’t have to wonder what a blank or null `DEPARTMENT_ID` means.\n\
    \nThe second query in the union calculates only the total count of employees in\
    \ the `HR.EMPLOYEES` table, and utilizes the flexible literal handling Oracle\
    \ provides to implicitly group the full count with the value “All Depts.”\n\n\
    ```sql\nselect 'All Depts.', count(*)\nfrom hr.employees\n```\n\nThe `UNION` clause\
    \ then simply stitches the two results together, giving the output you see. This\
    \ is equivalent to using the `ROLLUP` clause covered in the recipe *Aggregating\
    \ Data at Multiple Levels* earlier in this chapter.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA\n\n## 2-10. Building Your Own\
    \ Aggregate Function\n\n### Problem\n\nYou need to implement a custom aggregation\
    \ to work in conjunction with Oracle’s existing aggregate functions and grouping\
    \ mechanisms. You specifically want to aggregate strings in multiple rows to one\
    \ row so that the text from each row is concatenated, one after the other. You’ve\
    \ seen this supported in other databases but you can’t find an equivalent Oracle\
    \ function.\n\n### Solution\n\nOracle provides a framework for writing your own\
    \ aggregate functions, either to provide an aggregation not otherwise available\
    \ in Oracle or to develop your own custom version of a common aggregate function\
    \ with differing behavior. Our recipe creates a new aggregate function, `STRING_TO_LIST`,\
    \ and the supporting type definition and type body based on Oracle’s template\
    \ for custom aggregates.\n\nThe following type definition defines the mandatory\
    \ four functions Oracle requires for a custom aggregate type.\n\n```sql\ncreate\
    \ or replace type t_list_of_strings as object (\n  string_list varchar2(4000),\n\
    \  static function odciaggregateinitialize\n    (agg_context in out t_list_of_strings)\n\
    \    return number,\n  member function odciaggregateiterate\n    (self in out\
    \ t_list_of_strings,\n     next_string_to_add in varchar2 )\n    return number,\n\
    \  member function odciaggregatemerge\n    (self in out t_list_of_strings,\n \
    \    para_context in t_list_of_strings)\n    return number,\n  member function\
    \ odciaggregateterminate\n    (self in t_list_of_strings,\n     final_list_to_return\
    \ out varchar2,\n     flags in number)\n    return number\n);\n/\n```\n\nWe’ve\
    \ limited the `STRING_LIST` parameter to 4000, even though PL/SQL supports up\
    \ to 32000, to ensure we don’t pass the threshold supported by plain SQL in Oracle.\
    \ Each of the four required functions implements the various stages of our aggregation\
    \ of a set of strings into one list.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA\n\n```sql\ncreate or replace\
    \ type body t_list_of_strings is\n  static function odciaggregateinitialize\n\
    \    (agg_context in out t_list_of_strings)\n    return number is\n  begin\n \
    \   agg_context := t_list_of_strings(null);\n    return odciconst.success;\n \
    \ end;\n\n  member function odciaggregateiterate\n    (self in out t_list_of_strings,\n\
    \     next_string_to_add in varchar2 )\n    return number is\n  begin\n    self.string_list\
    \ := self.string_list || ' , ' || next_string_to_add;\n    return odciconst.success;\n\
    \  end;\n\n  member function odciaggregatemerge\n    (self in out t_list_of_strings,\n\
    \     para_context in t_list_of_strings)\n    return number is\n  begin\n    self.string_list\
    \ := self.string_list || ' , ' || para_context.string_list;\n    return odciconst.success;\n\
    \  end;\n\n  member function odciaggregateterminate\n    (self in t_list_of_strings,\n\
    \     final_list_to_return out varchar2,\n     flags in number)\n    return number\
    \ is\n  begin\n    final_list_to_return := ltrim(rtrim(self.string_list, ' , '),\
    \ ' , ');\n    return odciconst.success;\n  end;\nend;\n/\n```\n\nWith the type\
    \ and type body in place, we build the function we’ll use in our actual SQL statements\
    \ to produce custom aggregated data.\n\n```sql\ncreate or replace function string_to_list\n\
    \  (input_string varchar2)\n  return varchar2\n  parallel_enable\n  aggregate\
    \ using t_list_of_strings;\n/\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA\n\nWe can now use our custom\
    \ aggregate function to compose a list from any set or subset of strings that\
    \ we generate in a query. In this recipe, we want to return the surnames of all\
    \ the employees assigned to a given manager.\n\n```sql\nselect manager_id, string_to_list\
    \ (last_name) as employee_list\nfrom hr.employees\ngroup by manager_id;\n```\n\
    \nOur new custom aggregation function does the trick, producing the surnames in\
    \ a list-like output along with the manager’s ID.\n\n```\nMANAGER_ID EMPLOYEE_LIST\n\
    ---------- ------------------------------------------------------------\n    \
    \   100 Hartstein , Kochhar , De Haan , Fripp , Kaufling , Weiss ...\n       101\
    \ Whalen , Greenberg , Higgins , Baer , Mavris\n       102 Hunold\n       103\
    \ Ernst , Pataballa , Lorentz , Austin\n       108 Faviet , Chen , Sciarra , Urman\
    \ , Popp\n...\n```\n\n### How It Works\n\nDon’t let the jump to PL/SQL, or the\
    \ length of the recipe, scare you away. In fact, the majority of the code above\
    \ is boiler-plate template offered by Oracle to assist with building custom aggregates\
    \ quickly and easily.\n\nThis recipe builds the three components necessary to\
    \ create a custom aggregation, and then uses it in a SQL statement to list the\
    \ employee surnames by manager. First it defines a custom type defining the four\
    \ prescribed functions Oracle requires for a custom aggregate. These are:\n\n\
    `ODCIAggregateInitialize`: This function is called at the very beginning of processing\
    \ and sets up the new instance of the aggregate type—in our case, `T_LIST_OF_STRINGS`.\
    \ This new instance has its member variables (if any) and is ready for the main\
    \ aggregation phase.\n\n`ODCIAggregateIterate`: This holds the core functionality\
    \ of your custom aggregation. The logic in this function will be called for each\
    \ data value passed over in your driving query. In our case, this is the logic\
    \ that takes each string value and appends it to the existing list of strings.\n\
    \n`ODCIAggregateMerge`: This is the semi-optional function that controls Oracle’s\
    \ behavior, if Oracle decides to perform the aggregation in parallel, using multiple\
    \ parallel slaves working against portions of the data. While you don’t have to\
    \ enable the parallel option (see below), you still need to include this function.\
    \ In our case, should our list creation be split into parallel tasks, all we need\
    \ to do is concatenate the sublists at the end of the parallel process.\n\n`ODCIAggregateTerminate`:\
    \ This is the final function and is required to return the result to the calling\
    \ SQL function. In our case, it returns the global variable `STRING_LIST` that\
    \ has been built up in the iteration and parallel merging stages.\n\nWe now have\
    \ the mechanics of aggregation built. The next part of the recipe builds the function\
    \ that you can call to actually get your great new aggregation feature working\
    \ on data. We create a function that has many of the normal features you’d expect:\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# CHAPTER 2 ■ SUMMARIZING\
    \ AND AGGREGATING DATA\n\n```sql\ncreate or replace function string_to_list\n\
    \  (input_string varchar2)\n  return varchar2\n  parallel_enable\n  aggregate\
    \ using t_list_of_strings;\n/\n```\n\nThe function gets a name, `STRING_TO_LIST`,\
    \ and it takes a `VARCHAR2` string as input and returns one as output. So far,\
    \ very mundane. It’s the next two lines that are key to our recipe’s aggregation\
    \ behavior.\n\nThe `PARALLEL_ENABLE` clause is entirely optional, and instructs\
    \ Oracle that it is safe to perform the underlying aggregation logic in parallel\
    \ if the optimizer decides to take that path. Depending on the logic in your `ODCIAGGREGATEITERATE`\
    \ function, you may have particular actions that must happen in a particular order\
    \ and thus want to avoid parallelism. Enabling parallel processing also implies\
    \ that logic is in place in the `ODCIAGGREGATEMERGE` member function to deal with\
    \ merged subsets of results."
