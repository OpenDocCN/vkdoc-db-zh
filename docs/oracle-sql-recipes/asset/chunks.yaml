    \ * from order_item_query\npivot (\n sum(quantity) as sum_qty,\n sum(quantity*unit_price)\
    \ as sum_prc\n for (product_id) in (3170 as P3170,\n                      3176\
    \ as P3176,\n                      3182 as P3182,\n                      3163\
