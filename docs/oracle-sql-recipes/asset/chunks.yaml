  trans: '# 工作原理


    Oracle 的一个便利特性是，你可以禁用和启用约束，而无需删除并重新创建它们。这意味着你无需手头准备重新创建已删除约束所需的 DDL 语句。


    如果一个表定义了主键，并且该主键被子表中一个已启用的外键约束引用，你就不能 `TRUNCATE` 该表——即使子表中没有任何行。Oracle 会阻止你这样做，因为在多用户系统中，在你截断子表之后和随后截断父表之前的间隙，另一个会话有可能向子表中插入行。


    在这种情况下，Oracle 谨慎地不允许你截断父表。


    同时请记住，`TRUNCATE` 是一个 DDL 命令，它执行后会自动提交当前事务。因此，你无法回滚 `TRUNCATE` 操作，也无法将两个独立表的 `TRUNCATE`
    操作作为单个事务处理。请将 `TRUNCATE` 的行为与 `DELETE` 进行比较。


    Oracle 确实允许你在约束（引用子表的约束）启用的情况下，使用 `DELETE` 语句从父表中删除行。这是因为 `DELETE` 会生成撤销数据、具有读一致性，并且可以被回滚。


    你可以使用 `DISABLE` 子句的 `CASCADE` 选项来禁用主键和所有依赖的外键约束。例如，下面这行代码禁用了与 `D_DATES_PK` 主键约束相关的所有外键约束：


    ```sql

    alter table d_dates disable constraint d_dates_pk cascade;

    ```


    前面的语句不会级联通过所有依赖层级。它只会禁用直接依赖于 `D_DATES_PK` 的外键约束。另外请记住，没有 `ENABLE...CASCADE` 语句。要重新启用约束，你必须查询数据字典来确定哪些约束已被禁用，然后逐个重新启用它们。


    有时在加载数据时，你会遇到这种情况：在加载数据前（例如从模式级别导入）禁用所有外键会很方便。在这些情况下，`imp` 工具只是按字母顺序导入表，并不确保子表在父表之前导入。此外，你可能希望并行运行多个导入作业以利用并行硬件。在这种场景下，你可以禁用外键，执行导入，然后重新启用外键。下面是一个使用
    SQL 生成 SQL 来禁用某个用户所有外键约束的脚本：


    ```sql

    set lines 132 trimsp on head off feed off verify off echo off pagesize 0

    spo dis_dyn.sql

    select ''alter table '' || a.table_name

    || '' disable constraint '' || a.constraint_name || '';''

    from dba_constraints a

    ,dba_constraints b

    where a.r_constraint_name = b.constraint_name

    and a.r_owner = b.owner

    and a.constraint_type = ''R''

    and b.owner = upper(''&table_owner'');

    spo off;

    ```


    这个脚本生成一个名为 `dis_dyn.sql` 的文件，该文件禁用了某个用户的所有外键约束。接下来列出的是一个类似的脚本，用于生成一个包含重新启用某个用户外键约束命令的文件：


    ```sql

    set lines 132 trimsp on head off feed off verify off echo off pagesize 0

    spo enable_dyn.sql

    select ''alter table '' || a.table_name

    || '' enable constraint '' || a.constraint_name || '';''

    from dba_constraints a

    ,dba_constraints b

    where a.r_constraint_name = b.constraint_name

    and a.r_owner = b.owner

    and a.constraint_type = ''R''

    and b.owner = upper(''&table_owner'');

    spo off;

    ```


    启用约束时，默认情况下 Oracle 会检查数据是否违反约束定义。如果你相当确定数据完整性良好，并且不想因为重新验证约束而产生性能开销，那么在重新启用约束时可以使用
    `NOVALIDATE` 子句。下面是一个例子：


    ```sql

    select ''alter table '' || a.table_name

    || '' modify constraint '' || a.constraint_name || '' enable novalidate;''

    from dba_constraints a

    ,dba_constraints b

    where a.r_constraint_name = b.constraint_name

    and a.r_owner = b.owner

    and a.constraint_type = ''R''

    and b.owner = upper(''&table_owner'');

    ```


    `NOVALIDATE` 子句指示 Oracle 不验证正在启用的约束，但它会强制执行任何新的 DML 活动都必须遵守约束定义。


    你可能还会遇到需要禁用主键或唯一键约束的情况。例如，你可能想执行大规模数据加载，并且出于性能原因，你想禁用主键和唯一键约束。你不想为插入的每一行都进行检查而产生开销。


    用于禁用外键的通用技术同样适用于禁用主键或唯一键。运行此查询以显示某个用户的主键和唯一键约束：


    ```sql

    select

    a.table_name

    ,a.constraint_name

    ,a.constraint_type

    from dba_constraints a

    where a.owner = upper(''&table_owner'')

    and a.constraint_type in (''P'',''U'')

    order by a.table_name;

    ```


    以下是一些示例输出：


    ```

    TABLE_NAME                     CONSTRAINT_NAME                C

    ------------------------------ ------------------------------ -

    DEPT                           SYS_C006507                    P

    D_DATES                        D_DATES_UK1                    U

    D_DATES                        D_DATES_PK                     P

    ```


    一旦确定了表名和约束名，就使用 `ALTER TABLE` 语句来禁用约束：


    ```sql

    alter table d_dates disable constraint d_dates_pk;

    ```


    Oracle 不允许你禁用被外键引用的主键或唯一键约束。你必须先禁用外键约束。


    此外，如果你确信数据不需要验证，请考虑使用 `NOVALIDATE` 子句：


    ```sql

    alter table d_dates modify constraint d_dates_pk enable novalidate;

    ```


    这将指示 Oracle 在启用约束时不验证数据，但会对约束启用后修改的任何数据进行验证。


    ## 禁用触发器


    ### 问题


    你正准备加载大量数据。在向表中插入数据时，你不想让触发器影响性能。此外，你想按原样加载源数据；你不希望触发器在数据加载时执行并修改数据。你想在执行数据加载前禁用触发器。


    ### 解决方案


    你可以禁用单个触发器或表上的所有触发器。你可以通过查询 `DBA/ALL/USER_TRIGGERS` 视图来查看表的触发器。例如：


    ```sql

    select trigger_name, status

    from user_triggers where table_name=''CLUSTER_BUCKETS'';

    ```


    输出如下：


    ```

    TRIGGER_NAME                  STATUS

    ------------------------------ --------

    CLUSTER_BUCKETS_BU_TR1        ENABLED

    ```


    现在使用 `ALTER TRIGGER` 语句来禁用触发器：


    ```sql

    alter trigger CLUSTER_BUCKETS_BU_TR1 disable;

    ```


    如果你想禁用表上的所有触发器，请使用 `ALTER TABLE...DISABLE ALL TRIGGERS` 语句：


    ```sql

    alter table cluster_buckets disable all triggers;

    ```


    将数据加载到表中后，你可以按如下方式重新启用所有触发器：


    ```sql

    alter table cluster_buckets enable all triggers;

    ```'
- fmt: '# CHAPTER 12 ■ CLEANSING DATA


    If you’re performing a large load of data into a table, sometimes for performance
    reasons it’s desirable to disable all of the triggers on a table. If there are
    many tables involved with the data-loading operation, you can use SQL to generate
    SQL to disable the triggers for all tables for a user:


    ```

    select ''alter table '' || table_name || '' disable all triggers;''

    from user_tables;

    ```


    Once you’ve completed the data load, you’ll need to re-enable the triggers. Here
    is the SQL to generate SQL to re-enable the triggers for all tables for a user:


    ```

    select ''alter table '' || table_name || '' enable all triggers;''

    from user_tables;

    ```


    When you re-enable triggers, the triggers do not run. The status of the trigger
    is simply changed from `DISABLED` to `ENABLED`. Once the trigger is enabled, it
    will execute for any subsequent SQL statements that cause the trigger to be executed.
    Therefore, you will have to validate the data with a SQL query to determine if
    any data has been loaded while the trigger was disabled that violates any critical
    business rules.


    ## 12-10. Removing Data from a Table


    ### Problem


    You want to efficiently remove all data from a large table.


    ### Solution


    Use the `TRUNCATE` command to remove data from a table. This example removes all
    data from the `F_SALES` table:


    ```

    truncate table f_sales;

    ```


    ```

    Table truncated.

    ```


    By default, Oracle will deallocate all space used for the table except the space
    defined by the `MINEXTENTS` table storage parameter. If you don’t want the `TRUNCATE`
    statement to deallocate the extents, use the `REUSE STORAGE` parameter:


    ```

    truncate table f_sales reuse storage;

    ```


    ### How It Works


    Oracle defines the high-water mark of a table as the boundary between used and
    unused space in a segment. When you create a table, Oracle will allocate a number
    of extents to the table defined by the `MINEXTENTS` table storage parameter. Each
    extent contains a number of blocks. Before data is inserted into the table, none
    of the blocks have been used and the high-water mark is zero.


    The `TRUNCATE` statement sets the high-water mark of a table back to zero. When
    you use a `DELETE` statement to remove data from a table, the high-water mark
    does not change. One advantage to using a `TRUNCATE` statement and resetting the
    high-water mark is that full table scans will only search for rows in blocks below
    the high-water mark. This can have significant performance implications.


    **Note:** You can determine the space usage of blocks beneath the high-water mark
    via the `DBMS_SPACE` package.


    #### High-water Mark and Performance


    Oracle sometimes needs to scan every block of a table (under the high-water mark)
    when performing a query. This is known as a full table scan. If there has been
    a significant amount of data deleted from a table, a full table scan can take
    a long time to complete, even for an empty table.


    You can run this simple test to detect this issue:


    1. `SQL> set autotrace trace statistics`

    2. Run the query that performs the full table scan

    3. Compare the number of rows processed to the number of logical I/Os


    If the number of rows processed is low yet the number of logical I/Os is high,
    you may have an issue with the number of free blocks below the high-water mark.
    To readjust the high-water mark you must enable row movement for the table and
    then use the `ALTER TABLE...SHRINK SPACE` statement.


    The `TRUNCATE` statement is a DDL statement. This means that Oracle automatically
    commits the statement (and the current transaction) after it runs, so there is
    no way to roll back a `TRUNCATE` statement.


    If you need to be able to roll back when removing data, you should use the `DELETE`
    statement. However, the `DELETE` statement has the disadvantage that it generates
    a great deal of undo and redo information.


    For large tables, therefore, a `TRUNCATE` statement is usually the most efficient
    way to remove data.'
