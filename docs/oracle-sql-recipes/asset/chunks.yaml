    \ from two independent tables or result sets. Sort merge joins are efficient when\
    \ rows are already sorted. Hash joins are usually more efficient than sort merge\
    \ joins.\n\n## Cartesian join\n\nUsed when no join condition is present.\n\n##\
    \ Outer join\n\nReturns from one table rows that don’t satisfy the join condition.\n\
    \nThe execution plan (sometimes referred to as the explain plan) is a handy tool\
    \ used by DBAs and developers for improving the performance of SQL queries. If\
    \ you’re new to using execution plans, follow these heuristics to get started:\n\
    \n- Establish how fast the query needs to run.\n- Ensure that accurate statistics\
    \ have been generated (see recipe 19-13 for details).\n- Determine if indexes\
    \ exist for columns used in the `WHERE` clause (see recipe 10-5 for viewing indexes\
    \ created on a table).\n- Focus on the most costly steps in the execution plan\
    \ and determine if an index on a column involved in the operation might reduce\
    \ the cost (see recipe 18-7 for details on creating indexes).\n- When querying\
    \ large tables, determine if a parallel hint might help.\n- Determine if the query\
    \ (or parts of it) can be rewritten for better performance.\n\nThe results of\
    \ an execution plan can sometimes be non-intuitive because the optimizer will\
    \ determine that using an index is too costly. Or the optimizer might determine\
    \ that a full table scan is more efficient than using an index.\n\nWhen developing\
    \ queries, it’s sometimes useful to write in stages and analyze the execution\
    \ plan after each stage. For example, you may have a query that joins five tables\
    \ and has several conditions in the `WHERE` clause. Don’t wait until you have\
    \ the fully developed query to generate an explain plan.\n\nInstead, generate\
    \ an execution plan as you iteratively add tables and conditions to the `WHERE`\
    \ clause.\n\nIf you generate an explain plan with statistics turned on (via `SET\
    \ AUTOTRACE ON STATISTICS`) you will also see output such as this:\n\n```\nStatistics\n\
    ----------------------------------------------------------\n\t276  recursive calls\n\
    \t  0  db block gets\n\t 51  consistent gets\n\t  7  physical reads\n\t  0  redo\
    \ size\n\t583  bytes sent via SQL*Net to client\n\t524  bytes received via SQL*Net\
    \ from client\n\t  2  SQL*Net roundtrips to/from client\n\t  4  sorts (memory)\n\
    \t  0  sorts (disk)\n\t  3  rows processed\n```\n\nThese statistics are described\
    \ in Table 19-5. In general, one of the goals of query tuning is to try to reduce\
    \ the number of `consistent gets` required by a query.\n\n### Table 19-5. Execution\
    \ Plan Statistics\n\n| Statistic | Description |\n| :--- | :--- |\n| `recursive\
    \ calls` | Preliminary work performed by Oracle such as checking syntax, semantics,\
    \ permissions, looking up data dictionary information, and so on. |\n| `db block\
    \ gets` | Number of times Oracle needs the current version of a block. |\n| `consistent\
    \ gets` | Number of times consistent versions of blocks were read. The consistent\
    \ versions of the blocks are the blocks as they were when the SQL statement started.\
    \ Logical reads are `db block gets` plus `consistent gets`. |\n| `physical reads`\
    \ | Number of blocks read from disk because the block was not found in memory.\
    \ |\n| `redo size` | Amount of information Oracle writes to the redo stream for\
    \ a SQL operation. |\n| `bytes sent via SQL*Net to client` | Number of bytes sent\
    \ to the client tool. |\n| `bytes received via SQL*Net from client` | Number of\
    \ bytes received from the client tool. |\n| `SQL*Net roundtrips to/from client`\
    \ | Number of times data was sent to and from client. |\n| `sorts (memory)` |\
    \ Number of sorting operations performed in memory. |\n| `sorts (disk)` | Number\
    \ of sorting operations performed on disk. |\n| `rows processed` | Total number\
    \ of rows returned by query. |\n\n## 19-11. Obtaining SQL Tuning Advice\n\n###\
    \ Problem\n\nYou want advice on how to improve performance of a problem query.\n\
    \n### Solution\n\nUse the `SQL Tuning Advisor` to display suggestions on how to\
