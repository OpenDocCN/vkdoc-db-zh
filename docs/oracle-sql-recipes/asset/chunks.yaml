- fmt: "## Promotion Overlap\n\nand `p2.promo_begin_date <= p1.promo_end_date`。\n\n\
    The results provide details of the overlapping promotions in plain English language.\n\
    \n### Promotion Overlap\n\nnewspaper promotion #16-108 started before newspaper\
    \ promotion #16-441 ended。\n\nnewspaper promotion #16-349 started before newspaper\
    \ promotion #16-216 ended。\n\nnewspaper promotion #16-349 started before newspaper\
    \ promotion #16-512 ended。\n\nnewspaper promotion #16-349 started before newspaper\
    \ promotion #16-345 ended。\n\nnewspaper promotion #16-327 started before newspaper\
    \ promotion #16-330 ended。\n\n…\n\nA concrete example of the usefulness of calculating\
    \ such overlaps is to dynamically determine what promotion codes or coupon codes\
    \ are operating concurrently, and preventing people from using multiple codes\
    \ simultaneously。\n\n## How It Works\n\nOur recipe works by finding pairs of rows\
    \ in the `SH.PROMOTIONS` table, where the date of `PROMO_BEGIN_DATE` for the second\
    \ row falls in the date window between `PROMO_BEGIN_DATE` and `PROMO_END_DATE`\
    \ for the first row。\n\nThe `SELECT` portion of the recipe is straightforward.\
    \ We concatenate the two promotions we find that overlap, `P1.PROMO_NAME` and\
    \ `P2.PROMO_NAME`, with text so that our results show as a succinct human-readable\
    \ summary of overlapping promotions. The `FROM` clause is the key to our logic.\
    \ Here we join the `SH.PROMOTIONS` table to itself and refer to each copy in the\
    \ join as `P1` and `P2`. We join based on `PROMO_CATEGORY` and `PROMO_SUBCATEGORY`\
    \ to meet our original recipe criteria for finding overlapping promotions within\
    \ the same category and subcategory, so we only join rows with matching values\
    \ for these fields. Importantly, we include the additional join criteria `P1.PROMO_ID\
    \ != P2.PROMO_ID`, because 147\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nCHAPTER 6 ■ WORKING WITH DATE AND TIME VALUES\n\nwe don’t want to join a promotion\
    \ to itself —it would be nonsensical to try to determine if a promotion overlapped\
    \ itself。\n\nWith the `SH.PROMOTIONS` table self-joined using our join criteria,\
    \ our `WHERE` clause then filters to only target Newspaper promotions in the Ad\
    \ News subcategory. Again, this is to ensure we match our hypothetical criteria\
    \ outlined in the recipe problem (these criteria could have been included in the\
    \ join conditions instead)。\n\nThe last two criteria work to find where the start\
    \ of a second promotion occurs during the active window of a first promotion.\
    \ The criterion `P2.PROMO_BEGIN_DATE >= P1.PROMO_BEGIN_DATE` finds joined pairs\
    \ where the second promotion begins on or after the date of the first promotion.\
    \ The criterion `P2.PROMO_BEGIN_DATE <= P1.PROMO_END_DATE` then discards all of\
    \ those matches except the ones where the start of the second promotion also occurs\
    \ before the first promotion finishes。\n\n## 6-4. Automatically Tracking Date\
    \ and Time for Data Changes\n\n### Problem\n\nYou want to track when changes to\
    \ data occur for auditing purposes, but your current table design hasn’t incorporated\
    \ any dedicated fields for this purpose. You want to determine the date and time\
    \ of historic changes if possible, and provide a mechanism to track future changes。\n\
    \n### Solution\n\nUse Oracle’s `ORA_ROWSCN` pseudo-column and the `SCN_TO_TIMESTAMP`\
    \ function to find approximate or exact times that rows were changed。\n\nThe next\
    \ SQL illustrates the `SCN_TO_TIMESTAMP` function using the `ORA_ROWSCN` pseudo-column\
    \ to determine the `TIMESTAMP` value at which rows in the `HR.EMPLOYEES` table\
    \ were changed。\n\n```sql\nselect employee_id, last_name, salary,\nscn_to_timestamp(ora_rowscn)\
    \ Change_Timestamp\nfrom hr.employees;\n```\n\n```text\nEMPLOYEE_ID LAST_NAME\
    \                 SALARY CHANGE_TIMESTAMP\n----------- -------------------------\
    \ ------ -------------------------------\n        210 King                   \
    \    3510 12-SEP-09 03.54.55.000000000 PM\n        211 Sully                 \
    \     3510 12-SEP-09 03.54.55.000000000 PM\n        212 McEwen               \
    \      3510 12-SEP-09 03.54.55.000000000 PM\n        100 King                \
    \      24000 08-AUG-09 11.06.28.000000000 PM\n        101 Kochhar            \
    \       17000 08-AUG-09 11.06.28.000000000 PM\n        102 De Haan           \
    \        17000 08-AUG-09 11.06.28.000000000 PM\n...\n```\n\n### How It Works"
