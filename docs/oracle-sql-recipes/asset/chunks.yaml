    dropping and recreating them. This means you avoid having to have on hand the
    DDL statements that would be required to recreate the dropped constraints.


    You can’t truncate a table that has a primary key defined that is referenced by
    an enabled foreign key constraint in a child table—even if the child table has
    zero rows in it. Oracle prevents you from doing this because in a multiuser system
    there is a possibility that another session can populate the child table with
    rows in between the time you truncate the child table and subsequently truncate
    the parent table.


    Oracle prudently does not allow you to truncate a parent table in this situation.


    Also keep in mind that TRUNCATE is a DDL command, so it automatically commits
    the current transaction after it executes. Thus, you can’t roll back a TRUNCATE
    operation, and you won’t be able to TRUNCATE two separate tables as one transaction.
    Compare the TRUNCATE behavior to that of DELETE.


    Oracle does allow you to use the DELETE statement to remove rows from a parent
    table while the constraints are enabled that reference a child table. This is
    because DELETE generates undo, is read-consistent, and can be rolled back.


    You can disable a primary key and all dependent foreign key constraints with the
    CASCADE option of the DISABLE clause. For example, this next line of code disables
    all foreign key constraints related to the D_DATES_PK primary key constraint:


    **alter table d_dates disable constraint d_dates_pk cascade;**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


