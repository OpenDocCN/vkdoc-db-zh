    9-6\. Ensuring Read-Consistency Across a Transaction


    Problem


    By default, Oracle provides read-consistency for individual SELECT statements,
    but you want to ensure that several queries within a transaction maintain read-consistency
    until the transaction completes.


    Solution


    Use the SET TRANSACTION command to change the default read-consistency option.
    In this example, you want to run “what if” scenarios against the EMPLOYEES table,
    as in this example where you want to see the effects of raising or lowering salaries
    across a department:


    select sum(salary+100)


    from employees


    where department_id = 100


    ;


    select sum(salary-50)


    from employees


    where department_id = 100


    ;


    However, what if another employee changes some of the salaries in department 100
    after you run the first SELECT but before you start the second? The results will
    most likely be inconsistent with your expectations. Thus, you can run this command
    before starting your analyses: set transaction read only;


    Once you run this command, the entire transaction will see a read-consistent version
    of the EMPLOYEES table until you perform a COMMIT or ROLLBACK,


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 9 ■ MANAGING TRANSACTIONS


    How It Works


    Oracle supports *multiversioning* to provide more than one view of a table when
    there are multiple concurrent readers and writers. The rows returned by a query
    are always consistent to a single point in time. Writers never block readers and
    vice versa; two writers will not block each other unless they are accessing the
    same row in a table.


    In the recipe solution, you set the transaction environment to be READ ONLY. By
    default, Oracle starts a transaction as READ WRITE: queries are read-consistent
    across a single query only. Any changes committed by another session to a table
    during a long-running query will not be reflected in the query results. A subsequent
    query, however, will see those changes. Here is how you can explicitly set the
    transaction isolation level to read/write:


    set transaction read write;


    If you perform any DML against a table in a read/write transaction, any changes
    against rows that have already been changed but not committed in another transaction
    will wait until the other transaction completes or is rolled back.


    9-7\. Managing Transaction Isolation Levels


    Problem


    You want to provide transaction-level read-consistency as well as be able to perform
    DML statements within the transaction.


    Solution


    Set the transaction isolation level to serializable by using the following command:
    set transaction isolation level serializable;


    Any SELECT statements throughout the transaction will be read-consistent until
    a COMMIT or ROLLBACK


    is performed. You can perform any DML statements during the transaction as long
    as you do not try to access any table rows that were uncommitted at the beginning
    of the serialized transaction.


    How It Works


    The *isolation level* of a transaction defines how transactions containing DML
    commands are managed in relation to other transactions containing DML commands.
    Depending on the type of isolation level, your transactions may leave the database
    in different states. Here are three types of phenomena that are either permitted
    or not permitted at a specific isolation level:


    • **Dirty reads: a SELECT in one transaction reads uncommitted data from another
    transaction.**


