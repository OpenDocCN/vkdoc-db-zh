    \n### Solution"
  raw: '---------- ------------ ------------------ ----------------------------------------


    F_SALES P1 1 TO_DATE('' 2010-01-01 00:00:00'',...


    F_SALES SYS_P93 2 TO_DATE('' 2013-01-01 00:00:00'',...


    A partition was automatically created named SYS_P93 with a high value of 2013-01-01.


    How It Works


    As of Oracle Database 11 *g,* you can instruct Oracle to automatically add partitions
    to range-partitioned tables. Interval partitioning instructs Oracle to dynamically
    create a new partition when data inserted exceeds the maximum bound of a range-partitioned
    table. The newly added partition is based on an interval that you specify.


    ■ **Note** With interval partitioning, you can specify only a single key column
    from the table and it must be either a DATE or NUMBER data type.


    15-7\. Partitioning by Referential Constraints


    Problem


    You have a parent ORDERS table and a child ORDER_ITEMS table that are related
    by primary key and foreign key constraints on the ORDER_ID column. The parent
    ORDERS table is partitioned on the ORDER_DATE


    column. Even though the child ORDER_ITEMS table does not contain the ORDER_DATE
    column, you wonder if you can partition it so that the records are distributed
    in the same way as the parent ORDERS table.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ PARTITIONING


    Solution


    If you are using Oracle Database 11 *g* or higher, you can use the PARTITION BY
    REFERENCE clause to specify that a child table should be partitioned in the same
    way as its parent. This example creates a parent table with a primary key constraint
    on ORDER_ID and range partitions on ORDER_DATE: create table orders(


    order_id number


    ,order_date date


    ,constraint order_pk primary key(order_id)


    )


    partition by range(order_date)


    (partition p10 values less than (to_date(''01-jan-2010'',''dd-mon-yyyy''))


    ,partition p11 values less than (to_date(''01-jan-2011'',''dd-mon-yyyy''))


    ,partition pmax values less than (maxvalue)


    );


    Next the child ORDER_ITEMS table is created. It is partitioned by naming the foreign
    key constraint as the referenced object:


    create table order_items(


    line_id number


    ,order_id number not null


    ,sku number


    ,quantity number


    ,constraint order_items_pk primary key(line_id, order_id)


    ,constraint order_items_fk1 foreign key (order_id) references orders


    )


    partition by reference (order_items_fk1);


    Notice that the foreign key column ORDER_ID must be defined as NOT NULL. The foreign
    key column must be enabled and enforced.


    How It Works


    As of Oracle Database 11 *g,* you can partition by reference. This allows a child
    table to inherit the partitioning strategy of its parent table. Any parent table
    partitioning maintenance operations are also applied to the child record tables.


    Before the advent of the partitioning by reference feature, you would have to
    physically duplicate and maintain the parent table column in the child table,
    which not only requires more disk space, it is also prone to errors when maintaining
    the partitions.


    When creating the referenced partition child table, if you don’t explicitly name
    the child table partitions, by default Oracle will create partitions for the child
    table with the same partition names as its parent table. This example explicitly
    names the child table referenced partitions: create table order_items(


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ PARTITIONING


    line_id number


    ,order_id number not null


    ,sku number


    ,quantity number


    ,constraint order_items_pk primary key(line_id, order_id)


    ,constraint order_items_fk1 foreign key (order_id) references orders


    )


    partition by reference (order_items_fk1)


    (partition c10


    ,partition c11


    ,partition cmax


    );


    You can’t specify the partition bounds of a referenced table. Partitions of a
    referenced table will be created in the same tablespace as the parent partition
    unless you specify tablespaces for the child partitions.


    15-8\. Partitioning on a Virtual Column


    Problem


    You’ve defined a virtual column in a table. You want to partition the table based
    on the virtual column.


    Solution'
