    ### How It Works


    When tuning a SQL query, you may wonder which steps within the execution plan
    are consuming the most resources. The `V$SQL_PLAN_MONITOR` provides you with information
    on the steps that are using the most resources. The statistics in `V$SQL_PLAN_MONITOR`
    are updated every second.


    You can also generate a real-time text, HTML, or XML report of query progress
    within an execution plan by using the `REPORT_SQL_MONITOR` function of the `DBMS_SQLTUNE`
    package.


    ■ Note As of the writing of this book, an extra license is required for the `DBMS_SQLTUNE`
    package, which is part of the Oracle Tuning Pack.


    The next example demonstrates how to generate such a report. If you are running
    this from SQL*Plus, be sure you use the `SET` command to set variables to appropriate
    values so you can view the results:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ```sql

    SQL> SET LINES 3000 PAGES 0 LONG 1000000 TRIMSPOOL ON

    ```


    If you don’t pass any parameters to `REPORT_SQL_MONITOR`, then by default Oracle
    will report on the last query monitored:


    ```sql

    select dbms_sqltune.report_sql_monitor from dual;

    ```


    Here is small snippet of the output:


    ```

    Global Information

    Status : DONE (ALL ROWS)

    Instance ID : 1

    Session ID : 185

    SQL ID : 1nzw6bfkm0pry

    SQL Execution ID : 16777218

    Plan Hash Value : 2855621993

    Execution Started : 07/17/2009 15:35:31

    First Refresh Time : 07/17/2009 15:35:37

    Last Refresh Time : 07/17/2009 15:37:21

    | Elapsed | Cpu | IO | Fetch | Buffer | Reads | Writes |

    | Time(s) | Time(s) | Waits(s) | Calls | Gets | | |

    | 100 | 13 | 86 | 275 | 22827 | 24866 | 6231 |

    ```


    You can also instruct `REPORT_SQL_MONITOR` to report on a specific session ID
    or SQL ID. This example reports on the SQL being monitored for the session ID
    of 185:


    ```sql

    select dbms_sqltune.report_sql_monitor(session_id=>185) from dual;

    ```


    By default, `REPORT_SQL_MONITOR` generates a text report. If you prefer, you can
    create a report in HTML or XML. This example generates an HTML report, using the
    SQL*Plus `SPOOL` command to capture the output to a file:


    ```sql

    SET LINES 3000 PAGES 0 LONG 1000000 TRIMSPOOL ON

    SPOOL out.html

    select dbms_sqltune.report_sql_monitor(session_id=>185,

    event_detail => ''YES'' ,report_level => ''ALL'' ,type => ''HTML''

    )

    from dual;

    SPOOL OFF;

    ```


    Now you can open the HTML file from a browser and view a nicely formatted graphical
    report like the one shown in Figure 19-1.


