    11-7\. Comparing Hypotheses on Sets of Data


    Problem


    You have two or more sets of similar data that need comparison at the set level.
    Specifically, you’d like to use a recognized hypothesis-comparison approach with
    your data residing in Oracle—without having to move the data to another tool or
    system—to compare similar purchasing history for the residents of two states.


    Solution


    Oracle provides a number of recognized hypothesis-testing statistical functions,
    including functions for F-test, T-test, ANOVA, and numerous others. Many readers
    will probably be wondering what on earth these types of functions do, and more
    importantly, why they might be useful in comparing sets of data.


    Statistics students in the audience will know that tests like the T-test help
    in modeling linear regressions and in inferring differences in statistical mean
    and variance between two groups. In lay terms, a T-test could, for example, help
    you make decisions about whether you could sell more items online or from direct
    retail stores, or learn whether a particular income group is affecting your sales.
    The T-test tells you whether the difference between two groups is real, or an
    artifact of errors in your sampling or measurement.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 11 ■ COMMON REPORTING PROBLEMS


    **Beer And Statistics Do Mix**


    The T-test was invented by staff at the Guinness Brewery in Ireland, where the
    proprietor was a firm believer in using statistics to make a better brew. This
    included examining everything from what a better quality of hops or barley might
    do to the beer, all the way through to determining whether the brewery would be
    better off by hiring the greatest minds of Oxford and Cambridge universities.


    At the time of its invention, the T-test was considered one of Guinness’ best
    trade secrets, but luckily the passage of time means you can benefit from it,
    both in your business data management tasks and in any beer drinking you might
    fancy.


    For our recipe, we’ll try to determine if the residents of the states of New Jersey
    and New York in the USA have statistically significant purchasing history for
    the same income brackets.


    The next SQL invokes several different forms of the T-test to assess the sales
    history data for these two groups.


    select substr(cust_income_level, 1, 22) income_level,


    avg(case when cust_state_province = ''NJ'' then amount_sold else null end) NJ_sales,
    avg(case when cust_state_province = ''NY'' then amount_sold else null end) NY_sales,
    stats_t_test_indepu(cust_state_province, amount_sold, ''STATISTIC'', ''NY'') T_observed,


    stats_t_test_indepu(cust_state_province, amount_sold)


    two_sided_p_value


    from sh.customers c, sh.sales s


    where c.cust_id = s.cust_id


    and c.cust_state_province in (''NY'',''NJ'')


    group by rollup(cust_income_level)


    order by income_level, NJ_sales, NY_sales, t_observed;


    The results at first seem a little esoteric, but to the trained eye they indicate
    that our samples of New Jersey and New York residents aren’t statistically related,
    even where they share similar incomes.'
  trans: "# 第 11 章 ■ 常见的报表问题\n\n从这一点来看，外部查询的操作就清晰了。我们有一个简单的`SELECT`语句，用于从内联视图中选择我们需要的列，以及一个`WHERE`子句，用于查找`SAL_POSITION`等于\
    \ 3 的记录。这个技术是灵活的，因为你只需要改变最后的`WHERE`子句，使用不同的值，就能找到不同的第 n 个值。以下是此方法的通用形式。\n\n```\n\
    select <从内联视图中选择所需的行>\nfrom (\n  select <所需的行>,\n         row_number()\n     \
    \      over (\n             partition by <分区列>\n             order by <用于确定第 n\
    \ 个值的列>\n           ) <你的列别名>\n  from <目标表>\n) <内联视图别名>\nwhere <内联视图别名>.<你的列别名>\
    \ = <第 n 个位置>;\n```\n\n你可能希望调整的一个方面是排名的确定方式。你可以用`RANK`或`DENSE_RANK`分析函数替代`ROW_NUMBER`，以控制并列或缺失值如何影响你的第\
    \ n 个结果的确定。\n\n## 11-7. 在数据集上比较假设\n\n### 问题\n\n你有两组或多组类似的数据，需要在集合层面进行比较。具体来说，你想使用一种公认的假设比较方法，处理存储在\
    \ Oracle 中的数据——而无需将数据迁移到其他工具或系统——例如，比较两个州居民的相似购买历史。\n\n### 解决方案\n\nOracle 提供了许多公认的假设检验统计函数，包括用于\
    \ F 检验、T 检验、方差分析（ANOVA）等诸多函数。许多读者可能想知道这些函数到底有什么用，更重要的是，为什么它们可能对比较数据集有用。\n\n统计学学生会知道，像\
    \ T 检验这样的检验有助于建立线性回归模型，并推断两组之间的统计均值和方差的差异。通俗地说，T 检验可以帮助你做出决策，例如，判断你是通过在线渠道还是直接零售店能卖出更多商品，或者了解某个特定收入群体是否影响了你的销售额。T\
    \ 检验告诉你两组之间的差异是真实存在的，还是由抽样或测量误差造成的假象。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n`啤酒与统计确实相配`\n\nT 检验是由爱尔兰健力士啤酒厂的员工发明的，该厂的老板坚信运用统计学可以酿造出更好的啤酒。这包括检查从更优质的啤酒花或大麦可能对啤酒产生什么影响，一直到确定雇佣牛津和剑桥大学的顶尖人才是否会让啤酒厂受益更多。\n\
    \n在其发明之时，T 检验被认为是健力士啤酒最好的商业秘密之一，但幸运的是，时间的推移意味着你可以在商业数据管理任务以及任何你可能喜欢的啤酒饮用中受益于它。\n\
    \n对于我们的方法，我们将尝试确定美国新泽西州和纽约州的居民在相同收入水平上是否具有统计显著性的购买历史。\n\n接下来的`SQL`语句调用了 T 检验的几种不同形式来评估这两组的销售历史数据。\n\
    \n```\nselect substr(cust_income_level, 1, 22) income_level,\n       avg(case\
    \ when cust_state_province = 'NJ' then amount_sold else null end) NJ_sales,\n\
    \       avg(case when cust_state_province = 'NY' then amount_sold else null end)\
    \ NY_sales,\n       stats_t_test_indepu(cust_state_province, amount_sold, 'STATISTIC',\
    \ 'NY') T_observed,\n       stats_t_test_indepu(cust_state_province, amount_sold)\
    \ two_sided_p_value\nfrom sh.customers c, sh.sales s\nwhere c.cust_id = s.cust_id\n\
    \  and c.cust_state_province in ('NY','NJ')\ngroup by rollup(cust_income_level)\n\
    order by income_level, NJ_sales, NY_sales, t_observed;\n```\n\n结果起初看起来有点深奥，但对训练有素的人来说，它们表明我们的新泽西州和纽约州居民样本在统计上并不相关，即使在他们收入相似的情况下也是如此。"
- fmt: '# CHAPTER 11 ■ COMMON REPORTING PROBLEMS


    ## How It Works


    The mechanics of our recipe can be split into two areas. The first, selecting
    the salary brackets and the average purchases using the `CASE` expression and
    the grouping and ordering clauses, are typical SQL. The second is the heart of
    the T-test technique and comes from the two calls to the `STATS_T_TEST_INDEPU`
    function.


    While statistical definitions of T-test are often quite convoluted, the calculations
    that Oracle performs can be explained in lay terms. Essentially, the `STATS_T_TEST_INDEPU`
    function tests two groups that we know are not equal in number, and for which
    we expect some significant variance from the mean, *and* the variances are different
    for both groups.


    With those caveats in mind, our test attempts to establish whether the two samples
    sets are related, and if so, how closely. In plain English, we’re trying to determine
    if the purchasing habits of the residents of New Jersey and New York are similar,
    even though there are different numbers of buyers in each state, in different
    income brackets, purchasing different products of different value.


    Our resultant observed T values, and the two-sided test P value, differ markedly
    between each income bracket. To the trained statistician, this suggests that for
    many of our income groups, the differences in purchasing behavior we see in the
    base data could be due to sampling errors or the small size of the two income
    brackets being compared. For example, the `190,000 - 249,999` income bracket has
    a T value of `6.66684928`, suggesting significant sampling issues. Looking at
    the base data, this is almost certainly because only one purchase was made by
    a New Jersey resident in this income bracket. We can safely say this group isn’t
    statistically comparable, or related to, the same income bracket in New York.


