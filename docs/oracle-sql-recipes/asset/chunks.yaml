    percent of the list price is 10 percent off), resulting in a discount of between
    10 and 20 percent. The final result is rounded to the nearest dollar.


    How It Works


    Most, if not all, random number generators start generating the results with a
    *seed* value, in other words, a value that the random number generator uses to
    calculate a starting place in the random number sequence. The DBMS_RANDOM package
    is no exception. If you do not specify a seed value, Oracle uses the current date,
    user ID, and process ID to calculate the seed. To reproduce a sequence of random
    numbers from the same starting point, you can specify your own seed, as in this
    example: begin


    dbms_random.seed(40027);


    end;


    The DBMS_RANDOM.SEED procedure will also accept a string value to initialize the
    random number sequence:


    begin


    dbms_random.seed(''The Rain in Spain'');


    end;


    The DBMS_RANDOM.VALUE function has even a bit more flexibility: you can specify
    that the random number fall within the specified range. For example, if you only
    want random numbers between 50 and 100, you can do this:


    select dbms_random.value(50,100) from dual;


    DBMS_RANDOM.VALUE(50,100)


    95.2813813550075919354971754613182604395


    1 rows selected


    As a result, you can modify the recipe solution a bit as follows to take advantage
    of the range specification:


    update product_information


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4 ■ CREATING AND DERIVING DATA


    set daily_price =


    round(list_price*(0.9-(dbms_random.value(0.0,0.1))))


    ;


    Finally, the DBMS_RANDOM package also includes the STRING function so you can
    retrieve random string values. You specify two parameters: the type of string
    returned, and the length. Here is an example: select dbms_random.string(''U'',20)
    from dual;


    DBMS_RANDOM.STRING(''U'',20)


    FTFGYZPCYWNCOKYCKDJI


    1 rows selected


    The first parameter can be one of these string constants:


    • **‘u’ or ‘U’: uppercase alpha**


    **• **‘l’ or ‘L’: lowercase alpha**


    **• **‘a’ or ‘A’: mixed case alpha**


    **• **‘x’ or ‘X’: upper case alphanumeric**


    **• **‘p’ or ‘P’: any printable characters**


    **Thus, to generate a very cryptic and random set of 25 characters, you can do
    this: select dbms_random.string(''p'',25) from dual;


    DBMS_RANDOM.STRING(''P'',25)


    n!Wuew+R$$Qhf^mbGR,2%tr@a


    1 rows selected


    4-9\. Creating a Comma-Separated Values File


    Problem


    You need to export an Oracle table or view to CSV (Comma-Separated Values) for
    import into Microsoft Excel or another application that can import data in CSV
    format.


    Solution


    Use SQL*Plus, a custom query against one or more tables, and a set of carefully
    selected SQL*Plus commands to create a text file that will need no further processing
    before import into Microsoft Excel.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4 ■ CREATING AND DERIVING DATA


    The query you use to retrieve the data returns the first line with the column
    names, then the rows in the table with commas separating each column and double
    quotes around each string. Here is the query along with the required SQL*Plus
    commands that you can store in a file called emp_sal.sql, for example:


    -- suppress sql output in results


    set echo off


    -- eliminate row count message at end


    set feedback off


    -- make line long enough to hold all row data


    set linesize 1000


    -- suppress headings and page breaks


    set pagesize 0


    -- eliminate SQL*Plus prompts from output


    set sqlprompt ''''


    -- eliminate trailing blanks


    set trimspool on


    -- send output to file


    spool emp_sal.csv


    select ''"EMPLOYEE_ID","LAST_NAME","FIRST_NAME","SALARY"'' from dual union all


    select employee_id || '',"'' ||


    last_name || ''","'' ||


    first_name || ''",'' ||


    salary


    from employees


    ;


    spool off


    exit


    The output from running this script looks like this:


    C:\>sqlplus hr/hr@recipes @emp_sal.sql


