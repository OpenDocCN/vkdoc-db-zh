    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    How It Works


    Sometimes developers and DBAs take the old “Battleship” approach to database troubleshooting.
    They randomly lob queries at the database that might help reveal an issue in a
    hit or miss fashion. That’s an inefficient way to troubleshoot, though. Instead,
    we recommend you take the more focused approach to troubleshooting. First run
    a utility (such as AWR) or the queries provided in the solution section of this
    recipe to point you toward the real issue.


    The queries in the solution section use Oracle’s dynamic performance views V$SYSSTAT
    and V$SYSTEM_EVENT to help pinpoint the possible source of a database issue. Table
    20-2 lists descriptions of views commonly used in troubleshooting database problems.


    We realize that selecting from views such as V$SYSSTAT and V$SYSTEM_EVENT has
    inherent limitations because these views report on averages collected since instance
    startup. It would be better to query the AWR or Statspack historical views (if
    available). However, despite these known limitations, the solution section queries
    will give you a place to begin your database troubleshooting. The point is that
    you should start your analysis with a set of tools that will direct your efforts.


    ***Table 20-2.*** *CommonlyUsed Oracle Dynamic Performance Views* **View Description**


    V$SYSSTAT


    System-level cumulative workload statistics.


    V$SESSTAT


    Session-level cumulative workload statistics.


    V$SEGSTAT


    Segment-level cumulative workload statistics.


    V$EVENT_NAME


    All wait events and associated classes.


    V$SYSTEM_EVENT


    Total number of times all sessions have waited for an event.


    V$SESSION_EVENT


    Total number of times individual sessions have waited for an event.


    V$SESSION_WAIT


    Events for sessions that are currently waiting or have recently completed.


    20-2\. Displaying Open Cursors


    Problem


    An application accessing the database is throwing the following error: ORA-01000:
    maximum open cursors exceeded


    You want to query the data dictionary to determine the number of cursors that
    are open per session.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    Solution


    The following query will show the currently open cursors per session: select


    a.value


    ,c.username


    ,c.machine


    ,c.sid


    ,c.serial#


    from v$sesstat a


    ,v$statname b


    ,v$session c


    where a.statistic# = b.statistic#


    and c.sid = a.sid


    and b.name = ''opened cursors current''


    and a.value != 0


    and c.username IS NOT NULL


    order by 1,2;


    We recommend that you query V$SESSION instead of V$OPEN_CURSOR to determine the
    number of open cursors. V$SESSION provides a more accurate number of the cursors
    currently open.


    How It Works


    The OPEN_CURSORS initialization parameter determines the maximum number of cursors
    a session can have open. This setting is per session. The default value of 50
    is usually too low for any application. It’s common to set OPEN_CURSORS to a value
    such as 1000.


    However, if a single session has over 1000 open cursors, there is probably something
    in the code that is not closing a cursor. When this limit is reached, somebody
    should inspect the application code to determine if a cursor is not being closed.


    If you work in an environment that has thousands of connections to the database,
    you may want to view only the top cursor-consuming sessions. The following query
    uses an inline view and the pseudocolumn ROWNUM to display the top twenty values:


    select * from (


    select


    a.value


    ,c.username


    ,c.machine


    ,c.sid


    ,c.serial#


    from v$sesstat a


    ,v$statname b


    ,v$session c


    where a.statistic# = b.statistic#


    and c.sid = a.sid


    and b.name = ''opened cursors current''


    and a.value != 0


    and c.username IS NOT NULL


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    order by 1 desc,2)


    where rownum < 21;


    20-3\. Determining If Online Redo Logs Are Sized Properly


    Problem


    You notice that there are an inordinate number of log file switch (checkpoint
    incomplete) wait events (see Table 20-1 for a description). You want to verify
    the frequency with which the redo logs are switching in a production database.


    Solution


    The V$LOG_HISTORY contains history information about the online redo logs. Execute
    this query to view the number of log switches per hour:


    select count(*)


    ,to_char(first_time,''YYYY:MM:DD:HH24'')


    from v$log_history


    group by to_char(first_time,''YYYY:MM:DD:HH24'')


    order by 2;


    Here’s a snippet of the output:


    COUNT(*) TO_CHAR(FIRST


    ---------- -------------


    15 2009:07:20:00


    31 2009:07:20:01


    47 2009:07:20:02


    14 2009:07:20:03


    3 2009:07:20:04


    1 2009:07:20:05


    From the previous output, you can see that a lot of redo generation occurred on
    July 20th, from about midnight to 3:00 a.m. This could be due to a nightly batch
    job or users running the database application on the opposite side of the world
    (where your nighttime is their daytime).


