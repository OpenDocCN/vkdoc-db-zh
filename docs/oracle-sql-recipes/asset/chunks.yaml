    ## 6-6. Converting Dates and Times Between Time Zones


    ### Problem


    You need to convert date and time information stored (implicitly or explicitly)
    in one time zone to another time zone. For example, you’d like to convert the
    current date and time in your location to that of another location automatically
    in your code, and not need to worry about correcting for daylight savings yourself.


    ### Solution


    Use Oracle’s `TIMESTAMP` and `TIMESTAMP WITH TIME ZONE` datatypes to deal with
    date and time information that needs to track or work with time zones. With the
    `FROM_TZ` function, you use `TIMESTAMP` data to have Oracle perform all the calculations
    around converting from one zone to another, dealing with daylight savings changes,
    and even dealing with historic changes to zones and their daylight savings start
    and end dates.


    The next SQL takes a given time in Sydney, Australia and converts it to the time
    in Los Angeles, USA. It takes into consideration that at the time specified in
    the SQL, daylight savings was in force in the USA but not in Australia.


    ```

    select

    from_tz

    (cast

    (to_date

    (''2009-08-14 11:25:00'',''YYYY-MM-DD HH:MI:SS'')

    as timestamp)

    , ''Australia/Sydney'')

    ```'
