    # 第 17 章 ■ 数据库管理


    ## 17-8. 关联一组权限


    ### 问题


    你想将权限分组，以便通过一次操作将它们分配给一个模式。


    ### 解决方案


    首先，以一个具有 `CREATE ROLE` 系统权限的用户身份连接到数据库。接下来创建一个角色，并将你希望分组在一起的系统或对象权限分配给它。此示例使用
    `CREATE ROLE` 命令创建 `JR_DBA` 角色：


    ```sql

    create role jr_dba;

    ```


    接下来的几行 SQL 将系统权限授予新创建的角色：


    ```sql

    grant select any table to jr_dba;

    grant create any table to jr_dba;

    grant create any view to jr_dba;

    grant create synonym to jr_dba;

    grant create database link to jr_dba;

    ```


    然后，将该角色授予你希望拥有这些权限的任何模式：


    ```sql

    grant jr_dba to lellison;

    grant jr_dba to cphillips;

    ```


    现在，模式 `LELLISON` 和 `CPHILLIPS` 就可以执行诸如创建同义词、视图等任务。作为 DBA 模式，要查看分配了角色的模式，可以查询 `DBA_ROLES_PRIVS`
    视图：


    ```sql

    select grantee, granted_role from dba_role_privs order by 1;

    ```


    要查看授予当前连接用户的角色，可以从 `USER_ROLE_PRIVS` 视图查询：


    ```sql

    select * from user_role_privs;

    ```


    要从角色撤销权限，使用 `REVOKE` 命令：


    ```sql

    revoke create database link from jr_dba;

    ```


    同样，使用 `REVOKE` 命令从模式中移除角色：


    ```sql

    revoke jr_dba from lellison;

    ```


    > **注意**

    >

    > 与其他数据库对象不同，角色没有所有者。角色由分配给它的权限定义。


    ### 工作原理


    数据库*角色*是一组系统或对象权限的逻辑分组，可以分配给模式或其他角色。角色帮助你管理数据库安全性的各个方面。它们还提供了一个中心对象，权限可以分配给它；该角色随后可以被分配给多个用户。


    角色的典型用法是当你需要授予多个用户对另一个用户的表的只读访问权限时。要实现这一点，首先创建一个名为 `SELECT_APP` 的角色：


    ```sql

    create role select_app;

    ```


    接下来，为需要只读访问的每个表授予 `SELECT` TABLE 访问权限。以下代码动态创建一个脚本，为模式中的每个表向指定角色授予 `SELECT` 访问权限：


    ```sql

    CONN &user_name/&password

    DEFINE sel_user=SELECT_APP

    SET LINES 132 PAGES 0 ECHO OFF FEEDBACK OFF VERIFY OFF HEAD OFF TERM OFF TRIMS
    ON

    SPO gen_grants_dyn.sql

    --

    SELECT ''grant select on '' || table_name || '' to &&sel_user ;''

    FROM user_tables;

    --

    SPO OFF;

    SET ECHO ON FEEDBACK ON VERIFY ON HEAD ON TERM ON;

    --

    @@gen_grants_dyn

    ```


    现在，你可以将 `SELECT_APP` 角色分配给任何需要对拥有表的模式内的表进行只读访问的用户。


    ### PL/SQL 与角色


    如果你使用 PL/SQL，有时在尝试编译过程或函数时会遇到此错误：


    `PL/SQL: ORA-00942: table or view does not exist`


    令你困惑的是，你可以描述该表：


    `SQL> desc app_table;`


    那么为什么 PL/SQL 似乎无法识别该表呢？这是因为 PL/SQL 要求包、过程或函数的所有者必须被显式授予对代码中引用的任何对象的权限。PL/SQL 代码的所有者不能通过角色获得这些授权。


    尝试以 PL/SQL 代码所有者的身份执行：


    `SQL> set role none;`


    现在尝试运行访问该问题表的 SQL 语句：


    `SQL> select count(*) from app_table;`


    如果你不再能访问该表，那么你就是通过角色获得了访问权限。要解决此问题，请显式向 PL/SQL 代码的所有者授予对任何表的访问权限（以表所有者的身份）：


    `SQL> connect owner/pass`

    `SQL> grant select on app_table to proc_owner;`


    现在，你应该能够以 PL/SQL 代码所有者的身份连接并成功编译你的代码。


    ## 17-9. 创建用户


    ### 问题


    你需要创建一个新用户。


    ### 解决方案


    使用 `CREATE USER` 语句创建用户。此示例创建一个名为 `HEERA` 的用户，密码为 `CHAYA`，并分配默认临时表空间为 `TEMP`，默认表空间为
    `USERS`：


    ```sql

    create user heera identified by chaya

    default tablespace users

    temporary tablespace temp;

    ```


    这会创建一个基本的模式，该模式在数据库中没有任何执行操作的权限。要使该模式有用，必须至少授予其 `CREATE SESSION` 系统权限：


    ```sql

    grant create session to heera;

    ```


    如果新模式需要能够创建表，则需要授予额外的权限，如 `CREATE TABLE`。


    ```sql

    grant create table to heera;

    ```


    新模式还需要在其需要创建对象的任何表空间上授予配额权限：


    ```sql

    alter user heera quota unlimited on users;

    ```


    > **注意**

    >

    > DBA 使用的一个常见技术是将预定义的 `CONNECT` 和 `RESOURCE` 角色授予新创建的模式。这些角色包含诸如 `CREATE SESSION`
    和 `CREATE TABLE`（以及其他一些，因版本而异）之类的系统权限。我们不建议这样做，因为 Oracle 已声明这些角色在未来版本中可能不再可用。


    ### 工作原理


    用户是一个数据库账户，它是允许你登录数据库的机制。你必须具有 `CREATE USER` 系统权限才能创建用户。创建用户时，你建立了初始的安全性和存储属性。这些用户属性可以使用
    `ALTER USER` 语句进行修改。


    你可以通过从 `DBA_USERS` 视图中选择来查看用户信息：


    ```sql

    select username, default_tablespace, temporary_tablespace from dba_users;

    ```


    以下是一些示例输出：


    ```

    USERNAME               DEFAULT_TABLESPACE       TEMPORARY_TABLESPACE

    ---------------------- ------------------------ ------------------------------

    C2R                    USERS                    TEMP

    REP_MV_SEL             USERS                    TEMP

    STAR_SEL               USERS                    TEMP

    SYS                    SYSTEM                   TEMP

    ```


    你所有的用户都应被分配一个已创建为*临时*类型的临时表空间。如果用户的临时表空间是 `SYSTEM`，那么他们所需的任何临时磁盘存储的排序区都将在 `SYSTEM`
    表空间中获取区间。这可能导致 `SYSTEM` 表空间暂时被填满。除了 `SYS` 用户外，你的任何用户都不应将默认表空间设置为 `SYSTEM`。你不希望除
    `SYS` 外的任何用户在 `SYSTEM` 表空间中创建对象。`SYSTEM` 表空间应保留给 `SYS` 用户的对象。


    ## 17-10. 删除用户


    ### 问题


    你想删除一个用户。


    ### 解决方案


    使用 `DROP USER` 语句删除数据库账户。下一个示例删除用户 `HEERA`：


    ```sql

    drop user heera;

    ```


    如果该用户拥有任何数据库对象，此命令将不起作用。使用 `CASCADE` 子句删除用户并删除其对象：


    ```sql

    drop user heera cascade;

    ```


    > **注意**

    >

    > 如果被删除的用户拥有大量数据库对象，`DROP USER` 语句可能需要异常长的时间才能执行。在这种情况下，你可能需要考虑在删除用户之前先删除该用户的对象。


    ### 工作原理

    '
- fmt: 'When you drop a user, any tables that it owns will also be dropped. Additionally,
    all indexes, triggers, and referential integrity constraints will be removed.
    If referential integrity constraints exist in other schemas that depend on any
    dropped primary key and unique key constraints, the referential constraints in
    other schemas will also be dropped. Oracle will invalidate but not drop any views,
    synonyms, procedures, functions, or packages that are dependent on the dropped
    user’s objects.


    Sometimes you’ll run into a situation where you want to drop a user, but are not
    sure if anybody is using it. In these scenarios it’s safer to first lock the user
    and see who screams:

    ```sql

    alter user heera account lock;

    ```

    Any user or application attempting to connect to this user will now receive this
    error: `ORA-28000: the account is locked`


    To view the users and lock dates in your database, issue this query:

    ```sql

    select username, lock_date from dba_users;

    ```

    To unlock an account issue this command:

    ```sql

    alter user heera account unlock;

    ```

    The locking of users is a very handy technique for securing your database and
    discovering which users are used.


    ## 17-11. Modifying Passwords


    ### Problem

    You want to modify a user’s password.


    ### Solution

    Use the `ALTER USER` command to modify an existing user’s password. This example
    changes the `HEERA` user’s password to `foobar`:

    ```sql

    alter user heera identified by foobar;

    ```

    You can only change the password of another account if you have the `ALTER USER`
    privilege granted to your user. This privilege is granted to the `DBA` role.


    ### How It Works

    After you change a password for a user, any subsequent connection to the database
    by that user must use the password changed by the `ALTER USER` statement.


    In Oracle Database 11g or higher, when you modify a password it is by default
    case sensitive. See recipe 17-12 for details on how to disable password case-sensitivity.
    If you are using Oracle Database 10g or lower, the password is not case-sensitive.


    ### SQL*Plus Password Command

    You can change the password for a user with the `SQL*Plus` `PASSWORD` command.
    (Like all `SQL*Plus` commands, it can be abbreviated.) You will be prompted for
    a new password:

    ```

    SQL> passw heera

    Changing password for heera

    New password:

    Retype new password:

    Password changed

    ```

    This method has the advantage of changing a password for a user without displaying
    the new password on the screen.


    ## 17-12. Enforcing Password Complexity


    ### Problem

    You want to ensure that your database users are creating passwords that cannot
    be easily guessed by a hacker.


    ### Solution

    Run the following script as the `SYS` schema:

    ```

    SQL> @?/rdbms/admin/utlpwdmg

    Function created.

    Profile altered.

    Function created.

    ```

    For Oracle Database 11g, set the `PASSWORD_VERIFY_FUNCTION` of the `DEFAULT` profile
    to be `verify_function_11G`:

    ```sql

    alter profile default limit PASSWORD_VERIFY_FUNCTION verify_function_11G;

    ```

    For Oracle Database 10g, set the `PASSWORD_VERIFY_FUNCTION` of the `DEFAULT` profile
    to `VERIFY_Function`:

    ```sql

    alter profile default limit PASSWORD_VERIFY_FUNCTION verify_function;

    ```

    If you need to back out of the new security for any reason, run this statement
    to disable the password function:

    ```sql

    alter profile default limit PASSWORD_VERIFY_FUNCTION null;

    ```


    ### How It Works

    When enabled, the password verification function ensures that users are correctly
    creating or modifying their passwords. The `utlpwdmg.sql` script creates a function
    that checks a password to ensure that it meets basic security standards such as
    minimum password length, password not the same as username, and so on. In Oracle
    Database 11g, the password security PL/SQL function name is `VERIFY_FUNCTION_11G`.


    Once this PL/SQL function is created in the `SYS` schema, it can be assigned to
    the `PASSWORD_VERIFY_FUNCTION` parameter of a profile.'
