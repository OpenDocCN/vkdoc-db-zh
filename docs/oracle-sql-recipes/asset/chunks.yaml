    \ the top N or nth result query capabilities of other databases.\n\n### Solution\n\
    \nWith Oracle 11g Release 2, Oracle has introduced its new nth result capabilities.\
    \ Until 11g Release 2 is widely deployed, you should use the existing analytic\
    \ function `ROW_NUMBER` to determine the nth result, or top N result, of any grouping.\n\
    \nFor our recipe, we want to find the employee with the third-highest salary in\
    \ each department of the business. The next SQL statement uses `ROW_NUMBER` in\
    \ a nested subquery to allow us to quickly find the third-highest salary recipient\
    \ in each area.\n\n```sql\nselect department_id, last_name, salary as third_salary\n\
    from (\n  select department_id, last_name, salary,\n    row_number()\n    over\
    \ (partition by department_id order by salary desc) sal_position\n  from hr.employees\
    \ )\nsal_by_dept\nwhere sal_by_dept.sal_position = 3;\n```\n\n```\nDEPARTMENT_ID\
    \ LAST_NAME THIRD_SALARY\n------------- --------- -------------\n30 Baida 2900\n\
    50 Kaufling 7900\n60 Austin 4800\n80 Errazuriz 12000\n90 De Haan 17000\n100 Chen\
    \ 8200\n```\n\nEach of the third-highest departmental salary earners is listed\
    \ with the relevant salary.\n\n### How It Works\n\nOur recipe uses Oracle’s ubiquitous\
    \ analytic function `ROW_NUMBER` to help identify which rows should be returned\
    \ as the nth item in a group. The results of the `ROW_NUMBER`-based query are\
    \ then used as an inline view within an outer query. The outer query is crafted\
    \ with a `WHERE` clause to find the target rows.\n\nStarting with the inline view,\
    \ the key component is the `OVER` clause of the `ROW_NUMBER` function.\n\n```sql\n\
    row_number()\nover (partition by department_id order by salary desc) sal_position\n\
    ```\n\nHere, we instruct Oracle to split the source data into subgroups by `DEPARTMENT_ID`.\
    \ Within those groups, we order the data by descending salary value so we can\
    \ then apply the `ROW_NUMBER` value. We give the resulting number the name `SAL_POSITION`.\
    \ Here’s the (partial) resulting intermediate working data of this inline view:\n\
    \n```\nDEPARTMENT_ID LAST_NAME SALARY SAL_POSITION\n------------- --------- -------\
    \ ------------\n...\n30 Raphaely 11000 1\n30 Khoo 3100 2\n`30` `Baida` `2900`\
    \ `3`\n30 Tobias 2800 4\n...\n50 Fripp 8200 1\n50 Weiss 8000 2\n`50` `Kaufling`\
    \ `7900` `3`\n50 Vollman 6500 4\n...\n```\n\nYou can see that the highlighted\
    \ rows have the third-highest salary for their respective departments and have\
    \ been given the `SAL_POSITION` number of 3, derived from our `ROW_NUMBER` expression.\n\
    \n---\n\n(`expression or column`, `lower bound`, `upper bound`, `number of buckets`)\
    \ Working from the inline view’s subquery in our recipe out, we first ask Oracle\
    \ to use `WIDTH_BUCKET` to split our data into 10 buckets between the bounds 0\
    \ and 500000, based on the `SUM` or the `ORDER_TOTAL` values for a customer. If\
    \ we run the inner `SELECT` statement on its own, we’d gather these results:\n\
    \n```sql\nselect customer_id, sum(order_total),\n  width_bucket(sum(order_total),0,500000,10)\
    \ as total_spend_histogram\nfrom oe.orders\ngroup by customer_id\n```\n\n```\n\
    CUSTOMER_ID SUM(ORDER_TOTAL) TOTAL_SPEND_HISTOGRAM\n----------- ----------------\
    \ ---------------------\n101 190395.1 4\n102 69211.4 2\n103 20591.4 1\n104 146605.5\
    \ 3\n105 61376.5 2\n...\n```\n\nThe results of the inline view are easy to interpret.\
    \ Customer 101 spent a total of $190395.10 across all of its orders. This puts\
    \ it in the 4th bucket, which would include values between $150001 and $200000.\
    \ The next customer, 102, is in bucket 2, and so on.\n\nWe use the results of\
    \ the inline view in our outer SQL, to count the number of customers in each bucket.\
    \ As a final flourish, we multiply the customer group’s histogram bucket by the\
    \ value 50000 to report the histogram in multiples of 50000 as originally sought\
    \ in our recipe problem."
