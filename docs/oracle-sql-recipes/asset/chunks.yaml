    its corresponding table partition.


    Oracle keeps local index partitions in sync with the table partitions. You cannot
    explicitly add or drop a partition from a local index. When you add or drop a
    table partition, Oracle automatically performs the corresponding work for the
    local index. Oracle manages the local index partitions regardless of how the local
    indexes have been assigned to tablespaces.


    Local indexes are common in data-warehouse and decision-support systems. If you
    query frequently by using the partitioned column(s), a local index is appropriate.
    This lets Oracle use the appropriate index and table partition to quickly retrieve
    the data.


    There are two types of local indexes, local *prefixed* and local *nonprefixed*.
    A local prefixed index is one in which the leftmost column of the index matches
    the table partition key. The example in the solution section is a local prefixed
    index because its leftmost column (D_DATE_ID) is also the partition key for the
    table.


    A nonprefixed local index is one in which its leftmost column does not match the
    partition key used to partition the corresponding table. For example, this is
    a local nonprefixed index: create index f_regs_idx1 on f_regs(reg_count) local;


    The index is partitioned with the REG_COUNT column, which is not the partition
    key of the table, and is therefore a nonprefixed index. You can verify whether
    an index is considered prefixed by querying the ALIGNMENT column from USER_PART_INDEXES:


    select index_name,table_name,alignment,locality


    from user_part_indexes;


    Here is some sample output:


    INDEX_NAME TABLE_NAME ALIGNMENT LOCALITY


    -------------------- -------------------- ------------ ----------


    F_REGS_DATES_FK1 F_REGS PREFIXED LOCAL


    F_REGS_IDX1 F_REGS NON_PREFIXED LOCAL'
  trans: "\n你可以查询 `USER_TAB_SUBPARTITIONS` 来确认子分区是否已被删除。\n\n### 注意\nOracle 不允许你删除复合分区表中的所有子分区。每个分区必须至少保留一个子分区。\n\
    \n### 工作原理\n当你删除一个分区时，没有恢复删除的操作。因此，在删除分区前，请确保你处于正确的环境并且确实需要删除它。如果你需要保留待删除分区中的数据，可以将该分区合并到另一个分区，而不是直接删除它。\n\
    \n你不能从哈希分区表中删除分区。对于哈希分区表，你必须合并分区来移除一个。同样，你不能显式地从引用分区表中删除分区。当父表的分区被删除时，它也会从相应的子引用分区表中删除。\n\
    \n## 15-19. 从分区中删除行\n### 问题\n你想高效地删除一个分区中的所有记录。\n\n### 解决方案\n首先，确定你想要删除记录的分区的名称。\n\
    \n```sql\nselect segment_name, segment_type, partition_name\nfrom user_segments\n\
    where partition_name is not null;\n```\n\n使用 `ALTER TABLE...TRUNCATE PARTITION`\
    \ 语句来删除分区中的所有记录。此示例截断了 `F_SALES` 表的 `P_2008` 分区：\n\n```sql\nalter table f_sales\
    \ truncate partition p_2008;\n```\n\n你应该会看到以下消息：\n\n```\nTable truncated.\n```\n\
    \n在此场景下，该消息并不意味着整个表被截断了。它只是确认指定的分区已被截断。\n\n### 工作原理\n截断分区是快速删除大量数据的一种高效方法。然而，当你截断一个分区时，没有回滚机制。截断操作会从分区中永久删除数据。\n\
    \n如果你需要能够回滚事务的选项，请使用 `DELETE` 语句：\n```sql\ndelete from f_sales partition(p2008);\n\
    ```\n\n这种方法的缺点是，如果你有数百万条记录，`DELETE` 操作可能会运行很长时间。此外，对于大量记录，`DELETE` 会生成大量的回滚信息。这可能会给竞争资源的其他\
    \ SQL 语句带来性能问题。\n\n## 15-20. 为分区生成统计信息\n### 问题\n你刚刚将数据加载到单个分区中，需要生成统计信息以反映新插入的数据。\n\
    \n### 解决方案\n使用 `EXECUTE` 语句运行 `DBMS_STATS` 包来为特定分区生成统计信息。\n\n在此示例中，所有者是 `STAR`，表是\
    \ `F_SALES`，正在分析的分区是 `P_2009`：\n```sql\nexec dbms_stats.gather_table_stats(ownname=>'STAR',-\n\
    \                                   tabname=>'F_SALES',-\n                   \
    \                partname=>'P_2009');\n```\n\n如果你正在处理一个大型分区，你可能需要指定百分比抽样大小、并行度，并为任何索引也生成统计信息：\n\
    ```sql\nexec dbms_stats.gather_table_stats(ownname=>'STAR',-\n               \
    \                    tabname=>'F_SALES',-\n                                  \
    \ partname=>'P_2009',-\n                                   estimate_percent=>dbms_stats.auto_sample_size,-\n\
    \                                   degree=>dbms_stats.auto_degree,-\n       \
    \                            cascade=>true);\n```\n\n### 工作原理\n对于分区表，你可以在单个分区或整个表上生成统计信息。我们建议每当分区内有大量数据发生变化时，就生成新的统计信息。你需要足够了解你的表和数据，以确定是否需要生成新的统计信息。\n\
    \n## 15-21. 创建映射到分区的索引（本地索引）\n### 问题\n你发现查询分区表时经常在 `WHERE` 子句中使用分区键。你想提高查询的性能。\n\
    \n### 解决方案\n以下是创建简单分区表的 SQL：\n```sql\ncreate table f_regs(\n   reg_count number\n\
    \  ,d_date_id number\n)\npartition by range(d_date_id)\n   (partition p2009 values\
    \ less than (20100101) tablespace tbsp1\n   ,partition p2010 values less than\
    \ (20110101) tablespace tbsp2\n);\n```\n\n接下来，使用 `CREATE INDEX` 语句的 `LOCAL` 子句在分区表上创建本地索引：此示例在\
    \ `F_REGS` 表的 `D_DATE_ID` 列上创建了一个本地索引：\n```sql\ncreate index f_regs_dates_fk1\
    \ on f_regs(d_date_id) local;\n```\n\n运行以下查询以查看有关分区索引的信息：\n```sql\nselect index_name,\
    \ table_name, partitioning_type\nfrom user_part_indexes;\n```\n以下是一些示例输出：\n\n\
    ```\nINDEX_NAME                     TABLE_NAME           PARTITI\n------------------------------\
    \ -------------------- -------\nF_REGS_DATES_FK1               F_REGS        \
    \       RANGE\n```\n\n现在查询 `USER_IND_PARTITIONS` 表以查看有关本地分区索引的信息：\n```sql\nselect\
    \ index_name, partition_name, tablespace_name\nfrom user_ind_partitions;\n```\n\
    注意，已为表的每个分区创建了一个索引分区，并且索引是在与表分区相同的表空间中创建的：\n\n```\nINDEX_NAME           PARTITION_NAME\
    \       TABLESPACE_NAME\n-------------------- -------------------- --------------------\n\
    F_REGS_DATES_FK1     P2009                TBSP1\nF_REGS_DATES_FK1     P2010  \
    \              TBSP2\n```\n\n如果你想让本地索引分区创建在与表分区不同的表空间（或多个表空间）中，请在创建索引时指定这些表空间：\n\
    ```sql\ncreate index f_regs_dates_fk1 on f_regs(d_date_id) local\n   (partition\
    \ p2009 tablespace idx1\n   ,partition p2010 tablespace idx2);\n```\n如果在构建本地分区索引时指定分区信息，则分区数必须与构建索引的表上的分区数相匹配。\n\
    \n### 工作原理\n本地分区索引的分区方式与其所基于的分区表的分区方式完全相同。每个表分区将有一个对应的索引，该索引仅包含该表分区的 `ROWID` 值和索引键值。换句话说，本地分区索引中的\
    \ `ROWID` 只指向其对应表分区中的行。\n\nOracle 保持本地索引分区与表分区同步。你不能显式地从本地索引中添加或删除分区。当你添加或删除表分区时，Oracle\
    \ 会自动为本地索引执行相应的工作。Oracle 管理本地索引分区，无论本地索引是如何分配到表空间的。\n\n本地索引在数据仓库和决策支持系统中很常见。如果你经常使用分区列进行查询，本地索引是合适的。这使得\
    \ Oracle 可以使用适当的索引和表分区来快速检索数据。\n\n有两种类型的本地索引：本地*前缀*索引和本地*非前缀*索引。本地前缀索引是指索引的最左列与表分区键匹配的索引。解决方案部分中的示例是一个本地前缀索引，因为其最左列\
    \ (`D_DATE_ID`) 也是表的分区键。\n\n非前缀本地索引是指其最左列与用于对相应表进行分区的分区键不匹配的索引。例如，这是一个本地非前缀索引：\n\
    ```sql\ncreate index f_regs_idx1 on f_regs(reg_count) local;\n```\n该索引按 `REG_COUNT`\
    \ 列分区，这不是表的分区键，因此是非前缀索引。你可以通过查询 `USER_PART_INDEXES` 中的 `ALIGNMENT` 列来验证索引是否被视为前缀索引：\n\
    ```sql\nselect index_name,table_name,alignment,locality\nfrom user_part_indexes;\n\
    ```\n以下是一些示例输出：\n\n```\nINDEX_NAME           TABLE_NAME           ALIGNMENT  \
    \   LOCALITY\n-------------------- -------------------- ------------ ----------\n\
    F_REGS_DATES_FK1     F_REGS               PREFIXED      LOCAL\nF_REGS_IDX1   \
    \       F_REGS               NON_PREFIXED  LOCAL\n```"
- fmt: '# CHAPTER 15：分区（PARTITIONING）


    你可能会问，为什么还要区分前缀索引和非前缀索引？本地的非前缀索引意味着索引定义中没有将分区键作为前导列。这可能会带来性能问题，因为使用非前缀索引进行范围扫描可能需要搜索每一个索引分区。如果分区数量很多，这可能导致性能低下。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    你可以通过将分区键列包含在索引定义的前导列中，将所有本地索引创建为前缀索引。例如，我们可以将 `F_REGS_IDX1` 索引创建为前缀索引，如下所示：

    ```

    create index f_regs_idx2 on f_regs(d_date_id,reg_count) local;

    ```


    前缀索引一定比非前缀索引更好吗？这取决于你如何查询表。你需要为你使用的查询生成执行计划（explain plans），并检查前缀索引是否比非前缀索引能更好地利用分区裁剪（partition
    pruning，即消除需要搜索的分区）。


    另外请记住，多列的前缀本地索引会比非前缀本地索引消耗更多的空间和资源。


    ## 15-22. 创建具有自身分区方案的索引（全局索引）


    ### 问题


    你通过一个非分区键列来查询分区表。你希望通过在该列上创建索引来提高性能。


    ### 解决方案


    你可以创建一个基于范围分区的全局索引或基于哈希分区的全局索引。使用关键字 `GLOBAL` 来指定索引将采用与其对应表不同的分区策略来构建。在创建基于范围分区的全局索引时，必须始终指定
    `MAXVALUE`。以下示例创建了一个基于范围的全局索引：

    ```

    create index f_sales_gidx1 on f_sales(sales_id)

    global partition by range(sales_id)

    (partition pg1 values less than (100)

    ,partition pg2 values less than (200)

    ,partition pg3 values less than (maxvalue));

    ```


    另一种类型的全局分区索引是基于哈希的。此示例创建了一个基于哈希分区的全局索引：

    ```

    create index f_count_idx1 on f_regs(reg_count)

    global partition by hash(reg_count) partitions 3;

    ```


    ### 工作原理


    与其基础表分区方式不同的索引被称为**全局索引**。全局索引中的一条记录可以指向其基础表的任何分区。全局索引可以在任何类型的分区表上创建。全局索引本身可以是基于范围或基于哈希进行分区的。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    通常，全局索引比本地索引更难维护。我们建议你尽量避免使用全局索引，并尽可能使用本地索引。全局索引没有自动维护机制（而本地索引有）。对于全局索引，你需要负责添加和删除索引分区。此外，对基础分区表的许多维护操作通常要求重建全局索引分区。以下对堆组织表的操作将使全局索引失效：


    *   `ADD`（`HASH`）

    *   `COALESCE`（`HASH`）

    *   `DROP`

    *   `EXCHANGE`

    *   `MERGE`

    *   `MOVE`

    *   `SPLIT`

    *   `TRUNCATE`


    在执行维护操作时，请考虑使用 `UPDATE INDEXES` 子句。这将使全局索引在操作期间保持可用，并消除了重建的需要。使用 `UPDATE INDEXES`
    的缺点是，由于在操作过程中需要维护索引，维护操作将花费更长时间。


    全局索引对于通过索引检索少量行的查询很有用。在这些情况下，Oracle 可以消除（裁剪）任何不必要的索引分区并高效地检索数据。例如，全局范围分区索引在需要高效访问单个记录的
    OLTP 环境中非常有用。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # CHAPTER 16


    ■ ■ ■


    大对象（LOBs）'
  raw: 'You may be asking why even make the distinction between prefixed and nonprefixed?
    A local nonprefixed index means the index doesn’t include the partition key as
    a leading edge of its index definition. This could have performance implications
    in that a range scan accessing a nonprefixed index may need to search every index
    partition. If there are a large number of partitions, this could result in poor
    performance.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ PARTITIONING


    You can create all local indexes as prefixed by including the partition key column
    in the leading edge of the index. For example, we could create the F_REGS_IDX1
    index as prefixed as follows: create index f_regs_idx2 on f_regs(d_date_id,reg_count)
    local;


    Is a prefixed index better than a nonprefixed index? It depends on how you query
    your tables. You’ll have to generate explain plans for the queries you use and
    examine whether a prefixed index is able to better take advantage of partition
    pruning (eliminating partitions to search in) than a nonprefixed index.


    Also keep in mind that a multi-column prefixed local index will consume more space
    and resources than a nonprefixed local index.


    15-22\. Creating an Index with Its Own Partitioning Scheme


    (Global


    Index)


    Problem


    You query your partitioned table by a column that is not a partition key. You
    want to improve performance by creating an index on this column.


    Solution


    You can create either a range-partitioned global index or hash-based global index.
    Use the keyword GLOBAL to specify that the index will be built with a partitioning
    strategy separate from its corresponding table. You must always specify a MAXVALUE
    when creating a range-partitioned global index. The following example creates
    a range-based global index:


    create index f_sales_gidx1 on f_sales(sales_id)


    global partition by range(sales_id)


    (partition pg1 values less than (100)


    ,partition pg2 values less than (200)


    ,partition pg3 values less than (maxvalue));


    The other type of global partitioned index is hash based. This example creates
    a hash-partitioned global index:


    create index f_count_idx1 on f_regs(reg_count)


    global partition by hash(reg_count) partitions 3;


    How It Works


    An index that is partitioned differently from its base table is known as a *global
    index*. An entry in a global index can point to any of the partitions of its base
    table. A global index can be created on any type of partitioned table. A global
    index itself can be either partitioned by range or hash.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ PARTITIONING


    In general, global indexes are more difficult to maintain than local indexes.
    We recommend that you try to avoid using global indexes and use local indexes
    whenever possible. There is no automatic maintenance of a global index (as there
    is with local indexes). With global indexes, you are responsible for adding and
    dropping index partitions. Also, many maintenance operations on the underlying
    partitioned table often require that the global index partitions be rebuilt. The
    following operations on a heap-organized table will render a global index unusable:


    • ADD (HASH)


    • COALESCE (HASH)


    • DROP


    • EXCHANGE


    • MERGE


    • MOVE


    • SPLIT


    • TRUNCATE


    Consider using the UPDATE INDEXES clause when performing maintenance operations.
    This will keep the global index available during the operation and eliminates
    the need for rebuilding. The downside to using UPDATE INDEXES is that the maintenance
    operation will take longer due to the indexes being maintained during the action.


    Global indexes are useful for queries that retrieve a small set of rows via an
    index. In these situations, Oracle can eliminate (prune) any unnecessary index
    partitions and efficiently retrieve the data. For example, global range-partitioned
    indexes are useful in OLTP environments where you need efficient access to individual
    records.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **C H A P T E R 1 6**


    ■ ■ ■


    **LOBs**'
