- fmt: "# CHAPTER 16 ■ LOBS\n\nLarge objects, generically known as LOBs, seem to keep\
    \ the hard-drive manufacturers in business.\n\nWhether it’s images, word-processing\
    \ documents, video clips, full-length movies, or XML documents, large objects\
    \ are frequently found on web sites for download by customers who *want them now*.\n\
    \nStoring these types of objects on disk is only half the picture—they need to\
    \ be easily managed, organized, and retrieved. Not only do LOBs need to be easily\
    \ and quickly accessible, they need to be backed up and kept consistent with their\
    \ associated metadata. In other words, an Oracle database with its high level\
    \ of redundancy, availability, and recoverability becomes an ideal platform in\
    \ which to store LOBs.\n\nLOBs come in a number of different flavors. Character\
    \ large objects, or CLOBs, include all kinds of text-based objects that will likely\
    \ exceed 4000 characters (the maximum size for a `VARCHAR2` column).\n\nCLOBs\
    \ include word-processing documents, XML documents, log files, and so forth, that\
    \ are typically and more conveniently accessed as a single column in a database\
    \ row.\n\nBinary large objects (BLOBs), in contrast, are not tied to a specific\
    \ locale or character set and represent binary information that is not usually\
    \ human-readable without a viewer of some type. Images and video clips are the\
    \ most common forms of BLOBs. The task of decoding the contents of a BLOB is typically\
    \ performed by a middleware or client application. The type of a BLOB (such as\
    \ JPEG or MPEG) can be stored within the BLOB itself or as another column in the\
    \ same row in which the BLOB is stored.\n\nFor those applications where it is\
    \ not feasible to store LOBs in the database, you can use BFILES. A `BFILE` is\
    \ a data type whose metadata is stored in the database, but whose actual content\
    \ is stored in operating system files outside of the database. In essence, a `BFILE`\
    \ object is a pointer to an operating system file.\n\nIn this chapter we’ll cover\
    \ a few tasks involving CLOBs, BLOBs, and BFILE objects. We’ll show you how to\
    \ get LOBs into the database. We’ll show how to perform bulk loads using `SQL*Loader`.\
    \ And, of course, we’ll show you how to query LOB data, as well as how to retrieve\
    \ LOBs using the HTTP protocol.\n\nRetrieval by HTTP is handy when there is no\
    \ other convenient way to load a LOB, such as from a disk file system or via some\
    \ other file transfer protocol such as FTP.\n\n## 16-1. Loading Large Documents\
    \ into CLOB Columns\n\n### Problem\n\nYou want to manage your large text files\
    \ in the database. Your files are in a directory on the file system (a local file\
    \ system, a Windows network share, or an NFS-mounted directory), and you need\
    \ to load them into a database table that has other attributes about each file.\n\
    \n### Solution\n\nCreate a directory object, a sequence, and a table to hold your\
    \ CLOB documents as follows:\n```\ncreate directory lob_src as '/Download/Docs2Load';\n\
    \ncreate sequence doc_seq;\n\ncreate table txt_docs\n(\n  doc_num number,\n  doc_nm\
    \ varchar2(100),\n  doc_clb clob,\n  ins_ts timestamp\n);\n```\n\nNext, create\
    \ an anonymous PL/SQL block (or a stored procedure) to create a reference to the\
    \ file in the file system (a LOB pointer), insert a row into the database with\
    \ an empty CLOB column, then use a built-in PL/SQL procedure to populate the CLOB\
    \ column in the row you just inserted. It should look like the following:\n```\n\
    declare\n  src_clb bfile;        /* point to source CLOB on file system */\n \
    \ dst_clb clob;         /* destination CLOB in table */\n  src_doc_nm varchar2(100)\
    \ := 'Baseball Roster.doc';\n  src_offset integer := 1;   /* where to start in\
    \ the source CLOB */\n  dst_offset integer := 1;   /* where to start in the target\
    \ CLOB */\n  lang_ctx integer := dbms_lob.default_lang_ctx;\n  warning_msg number;\
    \   /* returns warning value if we find */\n                        /* unconvertible\
    \ characters */\nbegin\n  src_clb := bfilename('LOB_SRC',src_doc_nm); -- assign\
    \ pointer to file\n                                               -- within the\
    \ Oracle directory\n  insert into txt_docs (doc_num, doc_nm, doc_clb, ins_ts)\n\
    \    values(doc_seq.nextval, src_doc_nm, empty_clob(), systimestamp)\n    returning\
    \ doc_clb into dst_clb; -- create LOB placeholder column first\n  dbms_lob.open(src_clb,\
    \ dbms_lob.lob_readonly);\n\n  dbms_lob.loadclobfromfile\n  (\n    dest_lob  \
    \   => dst_clb,\n    src_bfile    => src_clb,\n    amount       => dbms_lob.lobmaxsize,\n\
    \    dest_offset  => dst_offset,\n    src_offset   => src_offset,\n    bfile_csid\
    \   => dbms_lob.default_csid,\n    lang_context => lang_ctx,\n    warning    \
    \  => warning_msg\n  );\n\n  dbms_lob.close(src_clb);\n\n  commit;\n\n  dbms_output.put_line('Wrote\
    \ CLOB to table: ' || src_doc_nm);\nend;\n```\n\nThe procedure creates a pointer,\
    \ `SRC_CLB`, to the CLOB on the file system, initializes the database row containing\
    \ the CLOB, and returns a pointer in the PL/SQL variable `DST_CLB` to the empty\
    \ CLOB column in the newly inserted row. `DBMS_LOB.LOADCLOBFROMFILE` uses the\
    \ variable `SRC_CLB` to access the LOB in the file system and the variable `DST_CLB`\
    \ to access the CLOB column in the table, and copies the document from the file\
    \ system to the CLOB column. Finally, the change is committed.\n\n### How It Works\n\
    \nThe various documents and images are in a file system directory containing the\
    \ following files:\n```\n[oracle@dw ~]$ ls -l /Download/Docs2Load\ntotal 718\n\
    -rwxr-xr-x 1 root root  80896 Mar 15 22:59 Baseball Roster.txt\n-rwxr-xr-x 1 root\
    \ root  47104 Jan 25 17:40 Display Table.php\n-rwxr-xr-x 1 root root  78336 Apr\
    \ 11 23:20 My Antiques.docx\n-rwxr-xr-x 1 root root 451638 May 30 22:08 Screen\
    \ Capture.bmp\n-rwxr-xr-x 1 root root  76800 Feb 16 23:02 Water Table Analysis.doc\n\
    [oracle@dw ~]$\n```\n\nIn the recipe solution, we create an Oracle directory object\
    \ `LOB_SRC` to reference an operating system file directory. An Oracle *directory\
    \ object* is a logical abstraction of a physical file directory. It has a number\
    \ of benefits and uses; in this example, we use it to access the LOBs from the\
    \ PL/SQL block. From the DBA’s perspective, it has the advantages of transparency\
    \ and security. The DBA can change the file system referenced by the directory\
    \ object without requiring a change to any SQL or PL/SQL code, since the directory\
    \ object name stays the same. In addition, the DBA can grant privileges on the\
    \ directory object to one or more users, and thus control who can read from or\
    \ write to objects within the file system directory.\n\nAfter specifying the file\
    \ name in the `SRC_DOC_NM` variable and running the anonymous block, the output\
    \ is as follows:\n```\nWrote CLOB to table: Baseball Roster.txt\n```\n\nNow you\
    \ can run the following `SELECT` statement against the table and see that a CLOB\
    \ has been loaded:\n```\nSQL> select doc_num, doc_nm, ins_ts, length(doc_clb)\
    \ from txt_docs;\n\nDOC_NUM DOC_NM                     INS_TS                \
    \       LENGTH(DOC_CLB)\n------------ ---------------------- -----------------------------\
    \ ------------------\n         1 Baseball Roster.txt     07-JUN-09 07.52.41.229794\
    \ PM            80896\n```\n\nThe steps in the PL/SQL block are straightforward\
    \ when you take them one at a time:\n1. Create a pointer to the CLOB on disk using\
    \ the `BFILENAME` function.\n2. Create a new row in the database table and initialize\
    \ the CLOB column using `EMPTY_CLOB`.\n3. Open the CLOB on disk with `DBMS_LOB.OPEN`.\n\
    4. Copy the CLOB from disk to table using `DBMS_LOB.LOADCLOBFROMFILE`.\n5. Close\
    \ the source CLOB with `DBMS_LOB.CLOSE`.\n6. Commit the transaction.\n\nMost of\
    \ the defaults for `DBMS_LOB.LOADCLOBFROMFILE` are demonstrated in the solution.\
    \ For example, you typically want to copy from source to destination starting\
    \ at the beginning (`SRC_OFFSET` and `DST_OFFSET`), using the default language\
    \ context (`DBMS_LOB.DEFAULT_LANG_CTX`), and copying the entire CLOB into the\
    \ database column (`DBMS_LOB.LOBMAXSIZE`).\n\n**Note** An alternative to `DBMS_LOB.LOADCLOBFROMFILE`\
    \ is `DBMS_LOB.LOADFROMFILE`. It has fewer parameters and is a bit easier to use;\
    \ however, it does not support multi-byte character sets."
  raw: 'Large objects, generically known as LOBs, seem to keep the hard-drive manufacturers
    in business.


    Whether it’s images, word-processing documents, video clips, full-length movies,
    or XML documents, large objects are frequently found on web sites for download
    by customers who *want them now*.


    Storing these types of objects on disk is only half the picture—they need to be
    easily managed, organized, and retrieved. Not only do LOBs need to be easily and
    quickly accessible, they need to be backed up and kept consistent with their associated
    metadata. In other words, an Oracle database with its high level of redundancy,
    availability, and recoverability becomes an ideal platform in which to store LOBs.


    LOBs come in a number of different flavors. Character large objects, or CLOBs,
    include all kinds of text-based objects that will likely exceed 4000 characters
    (the maximum size for a VARCHAR2 column).


    CLOBs include word-processing documents, XML documents, log files, and so forth,
    that are typically and more conveniently accessed as a single column in a database
    row.


    Binary large objects (BLOBs), in contrast, are not tied to a specific locale or
    character set and represent binary information that is not usually human-readable
    without a viewer of some type. Images and video clips are the most common forms
    of BLOBs. The task of decoding the contents of a BLOB is typically performed by
    a middleware or client application. The type of a BLOB (such as JPEG or MPEG)
    can be stored within the BLOB itself or as another column in the same row in which
    the BLOB is stored.


    For those applications where it is not feasible to store LOBs in the database,
    you can use BFILES. A BFILE is a data type whose metadata is stored in the database,
    but whose actual content is stored in operating system files outside of the database.
    In essence, a BFILE object is a pointer to an operating system file.


    In this chapter we’ll cover a few tasks involving CLOBs, BLOBs, and BFILE objects.
    We’ll show you how to get LOBs into the database. We’ll show how to perform bulk
    loads using SQL*Loader. And, of course, we’ll show you how to query LOB data,
    as well as how to retrieve LOBs using the HTTP protocol.


    Retrieval by HTTP is handy when there is no other convenient way to load a LOB,
    such as from a disk file system or via some other file transfer protocol such
    as FTP.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ LOBS


    16-1\. Loading Large Documents into CLOB Columns


    Problem


    You want to manage your large text files in the database. Your files are in a
    directory on the file system (a local file system, a Windows network share, or
    an NFS-mounted directory), and you need to load them into a database table that
    has other attributes about each file.


    Solution


    Create a directory object, a sequence, and a table to hold your CLOB documents
    as follows: create directory lob_src as ''/Download/Docs2Load'';


    create sequence doc_seq;


    create table txt_docs


    (


    doc_num number,


    doc_nm varchar2(100),


    doc_clb clob,


    ins_ts timestamp


    );


    Next, create an anonymous PL/SQL block (or a stored procedure) to create a reference
    to the file in the file system (a LOB pointer), insert a row into the database
    with an empty CLOB column, then use a built-in PL/SQL procedure to populate the
    CLOB column in the row you just inserted. It should look like the following:


    declare


    src_clb bfile; /* point to source CLOB on file system */


    dst_clb clob; /* destination CLOB in table */


    src_doc_nm varchar2(100) := ''Baseball Roster.doc'';


    src_offset integer := 1; /* where to start in the source CLOB */


    dst_offset integer := 1; /* where to start in the target CLOB */


    lang_ctx integer := dbms_lob.default_lang_ctx;


    warning_msg number; /* returns warning value if we find */


    /* unconvertible characters */


    begin


    src_clb := bfilename(''LOB_SRC'',src_doc_nm); -- assign pointer to file


    -- within the Oracle directory


    insert into txt_docs (doc_num, doc_nm, doc_clb, ins_ts)


    values(doc_seq.nextval, src_doc_nm, empty_clob(), systimestamp)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ LOBS


    returning doc_clb into dst_clb; -- create LOB placeholder column first dbms_lob.open(src_clb,
    dbms_lob.lob_readonly);


    dbms_lob.loadclobfromfile


    (


    dest_lob => dst_clb,


    src_bfile => src_clb,


    amount => dbms_lob.lobmaxsize,


    dest_offset => dst_offset,


    src_offset => src_offset,


    bfile_csid => dbms_lob.default_csid,


    lang_context => lang_ctx,


    warning => warning_msg


    );


    dbms_lob.close(src_clb);


    commit;


    dbms_output.put_line(''Wrote CLOB to table: '' || src_doc_nm);


    end;


    The procedure creates a pointer, SRC_CLB, to the CLOB on the file system, initializes
    the database row containing the CLOB, and returns a pointer in the PL/SQL variable
    DST_CLB to the empty CLOB


    column in the newly inserted row. DBMS_LOB.LOADCLOBFROMFILE uses the variable
    SRC_CLB to access the LOB in the file system and the variable DST_CLB to access
    the CLOB column in the table, and copies the document from the file system to
    the CLOB column. Finally, the change is committed.


    How It Works


    The various documents and images are in a file system directory containing the
    following files:


    [oracle@dw ~]$ ls -l /Download/Docs2Load


    total 718


    -rwxr-xr-x 1 root root 80896 Mar 15 22:59 Baseball Roster.txt


    -rwxr-xr-x 1 root root 47104 Jan 25 17:40 Display Table.php


    -rwxr-xr-x 1 root root 78336 Apr 11 23:20 My Antiques.docx


    -rwxr-xr-x 1 root root 451638 May 30 22:08 Screen Capture.bmp


    -rwxr-xr-x 1 root root 76800 Feb 16 23:02 Water Table Analysis.doc


    [oracle@dw ~]$


    In the recipe solution, we create an Oracle directory object LOB_SRC to reference
    an operating system file directory. An Oracle *directory object* is a logical
    abstraction of a physical file directory. It has a number of benefits and uses;
    in this example, we use it to access the LOBs from the PL/SQL block. From the
    DBA’s perspective, it has the advantages of transparency and security. The DBA
    can change the file system referenced by the directory object without requiring
    a change to any SQL or PL/SQL code, since the directory object name stays the
    same. In addition, the DBA can grant privileges on the directory object to one
    or more users, and thus control who can read from or write to objects within the
    file system directory.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 16 ■ LOBS


    After specifying the file name in the SRC_DOC_NM variable and running the anonymous
    block, the output is as follows:


    Wrote CLOB to table: Baseball Roster.txt


    Now you can run the following SELECT statement against the table and see that
    a CLOB has been loaded:


    SQL> select doc_num, doc_nm, ins_ts, length(doc_clb) from txt_docs; DOC_NUM DOC_NM
    INS_TS LENGTH(DOC_CLB)


    ------------ ---------------------- ----------------------------- ------------------


    1 Baseball Roster.txt 07-JUN-09 07.52.41.229794 PM 80896


    The steps in the PL/SQL block are straightforward when you take them one at a
    time: 1.


    Create a pointer to the CLOB on disk using the BFILENAME function.


    2.


    Create a new row in the database table and initialize the CLOB column using EMPTY_CLOB.


    3.


    Open the CLOB on disk with DBMS_LOB.OPEN.


    4.


    Copy the CLOB from disk to table using DBMS_LOB.LOADCLOBFROMFILE.


    5.


    Close the source CLOB with DBMS_LOB.CLOSE.


    6.


    Commit the transaction.


    Most of the defaults for DBMS_LOB.LOADCLOBFROMFILE are demonstrated in the solution.
    For example, you typically want to copy from source to destination starting at
    the beginning (SRC_OFFSET and DST_OFFSET), using the default language context
    (DBMS_LOB.DEFAULT_LANG_CTX), and copying the entire CLOB into the database column
    (DBMS_LOB.LOBMAXSIZE).


    ■ **Note** An alternative to DBMS_LOB.LOADCLOBFROMFILE is DBMS_LOB.LOADFROMFILE.
    It has fewer parameters and is a bit easier to use; however, it does not support
    multi-byte character sets.'
  trans: "# 第 16 章 ■ 大对象（LOB）\n\n大对象，通常被称为 LOB，似乎是硬盘驱动器制造商的业务支柱。\n\n无论是图像、文字处理文档、视频片段、整部电影还是\
    \ XML 文档，大型对象经常出现在网站上，供*希望立即获取*的客户下载。\n\n将这些类型的对象存储在磁盘上只是故事的一半——它们还需要易于管理、组织和检索。大对象不仅需要能够轻松快速地访问，还需要进行备份，并与其关联的元数据保持一致。换句话说，具有高度冗余、可用性和可恢复性的\
    \ Oracle 数据库成为了存储大对象的理想平台。\n\n大对象有多种不同类型。字符大对象（CLOB）包含各种可能超过 4000 字符（`VARCHAR2`列的最大大小）的基于文本的对象。\n\
    \nCLOB 包括文字处理文档、XML 文档、日志文件等，这些通常更方便地作为数据库行中的单个列进行访问。\n\n相比之下，二进制大对象（BLOB）与特定的区域设置或字符集无关，代表的是通常需要某种查看器才能阅读的二进制信息。图像和视频片段是最常见的\
    \ BLOB 形式。解码 BLOB 内容的任务通常由中间件或客户端应用程序执行。BLOB 的类型（如 JPEG 或 MPEG）可以存储在 BLOB 本身内部，也可以作为\
    \ BLOB 所在行的另一列存储。\n\n对于那些将大对象存储在数据库中不可行的应用程序，可以使用 BFILE。`BFILE`是一种数据类型，其元数据存储在数据库中，但实际内容存储在数据库外部的操作系统文件中。本质上，`BFILE`对象是指向操作系统文件的指针。\n\
    \n在本章中，我们将介绍一些涉及 CLOB、BLOB 和 BFILE 对象的任务。我们将展示如何将大对象加载到数据库中。我们将展示如何使用`SQL*Loader`执行批量加载。当然，我们还将展示如何查询大对象数据，以及如何使用\
    \ HTTP 协议检索大对象。\n\n当没有其他便捷方式（例如从磁盘文件系统或通过其他文件传输协议如 FTP）加载大对象时，通过 HTTP 进行检索非常方便。\n\
    \n## 16-1. 将大型文档加载到 CLOB 列\n\n### 问题\n\n您希望在数据库中管理大型文本文件。您的文件位于文件系统（本地文件系统、Windows\
    \ 网络共享或 NFS 挂载目录）的某个目录中，并且需要将它们加载到数据库表中，该表包含每个文件的其他属性。\n\n### 解决方案\n\n创建一个目录对象、一个序列和一个表来保存您的\
    \ CLOB 文档，如下所示：\n```\ncreate directory lob_src as '/Download/Docs2Load';\n\ncreate\
    \ sequence doc_seq;\n\ncreate table txt_docs\n(\n  doc_num number,\n  doc_nm varchar2(100),\n\
    \  doc_clb clob,\n  ins_ts timestamp\n);\n```\n\n接下来，创建一个匿名 PL/SQL 块（或存储过程），以创建对文件系统中文件的引用（LOB\
    \ 指针），插入一行包含空 CLOB 列的数据到数据库中，然后使用内置的 PL/SQL 过程填充刚插入行中的 CLOB 列。应如下所示：\n```\ndeclare\n\
    \  src_clb bfile;        /* 指向文件系统上的源 CLOB */\n  dst_clb clob;         /* 表中的目标\
    \ CLOB */\n  src_doc_nm varchar2(100) := 'Baseball Roster.doc';\n  src_offset\
    \ integer := 1;   /* 在源 CLOB 中的起始位置 */\n  dst_offset integer := 1;   /* 在目标 CLOB\
    \ 中的起始位置 */\n  lang_ctx integer := dbms_lob.default_lang_ctx;\n  warning_msg number;\
    \   /* 如果找到不可转换的字符，则返回警告值 */\nbegin\n  src_clb := bfilename('LOB_SRC',src_doc_nm);\
    \ -- 将指针分配给 Oracle 目录内的文件\n  insert into txt_docs (doc_num, doc_nm, doc_clb, ins_ts)\n\
    \    values(doc_seq.nextval, src_doc_nm, empty_clob(), systimestamp)\n    returning\
    \ doc_clb into dst_clb; -- 首先创建 LOB 占位列\n  dbms_lob.open(src_clb, dbms_lob.lob_readonly);\n\
    \n  dbms_lob.loadclobfromfile\n  (\n    dest_lob     => dst_clb,\n    src_bfile\
    \    => src_clb,\n    amount       => dbms_lob.lobmaxsize,\n    dest_offset  =>\
    \ dst_offset,\n    src_offset   => src_offset,\n    bfile_csid   => dbms_lob.default_csid,\n\
    \    lang_context => lang_ctx,\n    warning      => warning_msg\n  );\n\n  dbms_lob.close(src_clb);\n\
    \n  commit;\n\n  dbms_output.put_line('已将 CLOB 写入表：' || src_doc_nm);\nend;\n```\n\
    \n该过程创建了一个指向文件系统上 CLOB 的指针`SRC_CLB`，初始化了包含 CLOB 的数据库行，并在 PL/SQL 变量`DST_CLB`中返回了一个指向新插入行中空\
    \ CLOB 列的指针。`DBMS_LOB.LOADCLOBFROMFILE`使用变量`SRC_CLB`访问文件系统中的 LOB，使用变量`DST_CLB`访问表中的\
    \ CLOB 列，并将文档从文件系统复制到 CLOB 列。最后，提交更改。\n\n### 工作原理\n\n各种文档和图像位于文件系统目录中，该目录包含以下文件：\n\
    ```\n[oracle@dw ~]$ ls -l /Download/Docs2Load\ntotal 718\n-rwxr-xr-x 1 root root\
    \  80896 Mar 15 22:59 Baseball Roster.txt\n-rwxr-xr-x 1 root root  47104 Jan 25\
    \ 17:40 Display Table.php\n-rwxr-xr-x 1 root root  78336 Apr 11 23:20 My Antiques.docx\n\
    -rwxr-xr-x 1 root root 451638 May 30 22:08 Screen Capture.bmp\n-rwxr-xr-x 1 root\
    \ root  76800 Feb 16 23:02 Water Table Analysis.doc\n[oracle@dw ~]$\n```\n\n在解决方案中，我们创建了一个\
    \ Oracle 目录对象`LOB_SRC`来引用操作系统文件目录。Oracle*目录对象*是物理文件目录的逻辑抽象。它有许多好处和用途；在此示例中，我们使用它从\
    \ PL/SQL 块访问大对象。从 DBA 的角度来看，它具有透明性和安全性的优势。DBA 可以更改目录对象引用的文件系统，而无需更改任何 SQL 或 PL/SQL\
    \ 代码，因为目录对象名称保持不变。此外，DBA 可以向一个或多个用户授予目录对象的权限，从而控制谁可以读取或写入文件系统目录中的对象。\n\n在`SRC_DOC_NM`变量中指定文件名并运行匿名块后，输出如下：\n\
    ```\n已将 CLOB 写入表：Baseball Roster.txt\n```\n\n现在您可以对表运行以下`SELECT`语句，看到 CLOB 已被加载：\n\
    ```\nSQL> select doc_num, doc_nm, ins_ts, length(doc_clb) from txt_docs;\n\nDOC_NUM\
    \ DOC_NM                     INS_TS                       LENGTH(DOC_CLB)\n------------\
    \ ---------------------- ----------------------------- ------------------\n  \
    \       1 Baseball Roster.txt     07-JUN-09 07.52.41.229794 PM            80896\n\
    ```\n\n当您逐步进行时，PL/SQL 块中的步骤非常直接：\n1. 使用`BFILENAME`函数创建指向磁盘上 CLOB 的指针。\n2. 在数据库表中创建新行，并使用`EMPTY_CLOB`初始化\
    \ CLOB 列。\n3. 使用`DBMS_LOB.OPEN`打开磁盘上的 CLOB。\n4. 使用`DBMS_LOB.LOADCLOBFROMFILE`将\
    \ CLOB 从磁盘复制到表中。\n5. 使用`DBMS_LOB.CLOSE`关闭源 CLOB。\n6. 提交事务。\n\n解决方案中展示了`DBMS_LOB.LOADCLOBFROMFILE`的大多数默认值。例如，您通常希望从源到目标从头开始复制（`SRC_OFFSET`和`DST_OFFSET`），使用默认语言上下文（`DBMS_LOB.DEFAULT_LANG_CTX`），并将整个\
    \ CLOB 复制到数据库列中（`DBMS_LOB.LOBMAXSIZE`）。\n\n**注意** `DBMS_LOB.LOADCLOBFROMFILE`的替代方法是`DBMS_LOB.LOADFROMFILE`。它的参数较少，使用起来更简单；但是，它不支持多字节字符集。"
- fmt: "# CHAPTER 16 ■ LOBS\n\n## 16-2. Loading Image Data into BLOB Columns\n\n###\
    \ Problem\n\nYou have various JPG, PNG, GIF, and BMP image files that need to\
    \ be managed and backed up in the database, and you need a way to do an initial\
    \ load into the database.\n\n### Solution\n\nLoading binary LOBs is a bit simpler\
    \ than loading text-based LOBs. You don’t have to worry about character-set conversions—or\
    \ character sets at all; a picture is worth a thousand words, and an image file\
    \ in the database means that you don’t need to store an equivalent text document\
    \ with those one thousand words!\n\nCreate a sequence for your image table’s unique\
    \ identifier, plus the table itself:\n\n```sql\ncreate sequence img_seq;\n\ncreate\
    \ table image\n(\n  img_num number,\n  img_nm varchar2(100),\n  img_blb blob,\n\
    \  ins_ts timestamp\n);\n```\n\nNext, run an anonymous block to load the image\
    \ `SCREEN CAPTURE.BMP` into your database table:\n\n```sql\ndeclare\n  src_blb\
    \ bfile; /* point to source BLOB on file system */\n  dst_blb blob;  /* destination\
    \ BLOB in table */\n  src_img_nm varchar2(100) := 'Screen Capture.bmp';\n  src_offset\
    \ integer := 1; /* where to start in the source BLOB */\n  dst_offset integer\
    \ := 1; /* where to start in the target BLOB */\nbegin\n  src_blb := bfilename('LOB_SRC',src_img_nm);\n\
    \  insert into image (img_num, img_nm, img_blb, ins_ts)\n    values(img_seq.nextval,\
    \ src_img_nm, empty_blob(), systimestamp)\n    returning img_blb into dst_blb;\n\
    \  dbms_lob.open(src_blb, dbms_lob.lob_readonly);\n  dbms_lob.loadblobfromfile\n\
    \  (\n    dest_lob => dst_blb,\n    src_bfile => src_blb,\n    amount => dbms_lob.lobmaxsize,\n\
    \    dest_offset => dst_offset,\n    src_offset => src_offset\n  );\n  dbms_lob.close(src_blb);\n\
    \  commit;\n  dbms_output.put_line('Wrote BLOB to table: ' || src_img_nm);\nend;\n\
    ```\n\n### How It Works\n\nLoading binary objects into a `BLOB` column is very\
    \ similar to loading text files into `CLOB` columns.\n\nUnlike with text documents,\
    \ however, you will rarely find a situation where you copy only part of an image\
    \ file into a `BLOB` column. This is due to the nature of the structure of most\
    \ image files. You either load all of an image, or none at all.\n\nQuerying the\
    \ table `IMAGE`, you see the metadata for the image file you just loaded:\n\n\
    ```sql\nselect img_num, img_nm, ins_ts, length(img_blb) from image;\n```\n\n```\n\
    IMG_NUM IMG_NM                  INS_TS                        LENGTH(IMG_BLB)\n\
    ------- ----------------------- ----------------------------- ---------------\n\
    \      1 Screen Capture.bmp     07-JUN-09 10.25.02.984755 PM           451638\n\
    ```\n\nTo further automate this process (assuming you are still dealing only with\
    \ a relatively small number of objects), you could create a stored procedure instead\
    \ of using an anonymous procedure. Your parameters would consist of, at a minimum,\
    \ the name of the file to be loaded. Here is an example of such a procedure:\n\
    \n```sql\ncreate or replace procedure load_blob ( src_img_nm in varchar2 )\nis\n\
    \  src_blb bfile; /* point to source BLOB on file system */\n  dst_blb blob; \
    \ /* destination BLOB in table */\n  src_offset integer := 1; /* where to start\
    \ in the source BLOB */\n  dst_offset integer := 1; /* where to start in the target\
    \ BLOB */\nbegin\n  ... /* same code as in the anonymous block version */\nend;\n\
    ```\n\nCalling the procedure is easy from a loop in another stored procedure or\
    \ from an anonymous block. For example:\n\n```sql\nbegin\n  load_blob('Screen\
    \ Capture.bmp');\nend;\n```\n\nYou may also consider parameterizing the directory\
    \ object, and creating a new column for the description of the image file and\
    \ parameterizing that as well. Typically the file name itself is not a very good\
    \ description of the contents of the image!\n\n> **Note** This recipe uses the\
    \ same directory object as the `CLOB` example at the beginning of the chapter.\
    \ As you might surmise, you could treat all objects, whether `CLOB` or `BLOB`,\
    \ as binary objects if you did not have to worry about character conversions.\n\
    \n## 16-3. Using SQL*Loader to Bulk-Load Large Objects\n\n### Problem\n\nYou want\
    \ to load thousands of binary objects from a local file system, and you want to\
    \ minimize manual intervention as well as the time it takes to load the objects.\n\
    \n### Solution\n\nPrevious solutions used an Oracle directory object and PL/SQL\
    \ procedures. If the binary files are accessible from an Oracle client, you can\
    \ use `SQL*Loader` to easily load the `BLOB`s. Here is a `SQL*Loader` control\
    \ file named `load_lobs.ctl`:\n\n```\nload data\ninfile load_lobs.list\nappend\
    \ into table image\nfields terminated by ','\ntrailing nullcols\n(\n  img_num\
    \ char,\n  img_nm char(100),\n  img_file_nm filler char(100),\n  img_blb lobfile(img_file_nm)\
    \ terminated by EOF,\n  ins_ts \"systimestamp\"\n)\n```\n\nHere is the referenced\
    \ data file `load_lobs.list`, containing the location of the `BLOB`s:\n\n```\n\
    101,Water Table Analysis,E:\\Download\\Docs2Load\\Water Table Analysis.doc\n102,My\
    \ Antiques,My Antiques.docx\n103,Screen Capture for Book,Screen Capture.bmp\n\
    ```\n\nYour `SQL*Loader` command line will look something like this:\n\n```\n\
    sqlldr userid=rjb/rjb@recipes control=load_lobs.ctl\n```\n\n### How It Works\n\
    \nUsing `SQL*Loader` for `LOB`s is much the same as using `SQL*Loader` for traditional\
    \ data types, except that the `SQL*Loader` `INFILE` contains a pointer to the\
    \ location of the `LOB` in the file system.\n\nYou specify the other table columns\
    \ as you would in a typical `SQL*Loader` job. For `BLOB` data, however, you need\
    \ to specify two columns: the location of the `BLOB` and the column in the table\
    \ that will hold the `BLOB`. In the solution, the column `IMG_FILE_NM` is marked\
    \ as `FILLER`, which means that `IMG_FILE_NM` is not a real column, but will be\
    \ referenced later when loading the `BLOB` data. The `SQL*Loader` line containing\
    \ the `BLOB` column is as follows:\n\n```\nimg_blb lobfile(img_file_nm) terminated\
    \ by EOF,\n```\n\nThe `LOBFILE` clause references the `SQL*Loader` column containing\
    \ the `BLOB`’s location in the file system. Note in the example that you can provide\
    \ an absolute file location (`E:\\Download\\Docs2Load\\Water Table Analysis.doc`)\
    \ or a file name relative to the directory where you run `SQL*Loader`.\n\nFinally,\
    \ the clause `TERMINATED BY EOF` tells `SQL*Loader` to stop reading the `BLOB`\
    \ at the end. In other scenarios, you may only want to read part of the `CLOB`\
    \ or `BLOB`, up to a specific delimiter, which you specify with a constant in\
    \ the `TERMINATED BY` clause along with an optional maximum size, as in this example:\n\
    \n```\nparagraph_clb lobfile(chapter_file_nm) char(2000) terminated by '[PARA]'\n\
    ```\n\nAfter loading the `BLOB`s into the `IMAGE` table from the solution, the\
    \ contents of the table look like this:\n\n```sql\nselect img_num, img_nm, ins_ts,\
    \ length(img_blb) from image;\n```\n\n```\nIMG_NUM IMG_NM                  INS_TS\
    \                        LENGTH(IMG_BLB)\n------- ----------------------- -----------------------------\
    \ ---------------\n    101 Water Table Analysis    11-JUN-09 10.49.44.154432000\
    \ PM        76800\n    102 My Antiques            11-JUN-09 10.49.44.154432000\
    \ PM        78336\n    103 Screen Capture for Book 11-JUN-09 10.49.44.154432000\
    \ PM       451638\n3 rows selected\n```\n\nAs you might expect, you can load multiple\
    \ `BLOB` and `CLOB` columns in the same `SQL*Loader` job, just make sure that\
    \ your `LOBFILE` locators are defined as `FILLER` columns if they are not the\
    \ values for actual columns in the table.\n\nThis method works very well even\
    \ when the client is on a different platform from the database instance. In the\
    \ solution provided, the client and the `BLOB` objects are on a Microsoft Windows\
    \ platform (MS-Word `DOC` and `DOCX` files are essentially binary files), whereas\
    \ the database containing the tables with the `BLOB` columns are on a Linux platform.\
    \ Remember that we don’t worry about platform character set conversion issues\
    \ when we are using `BLOB` large object types."
