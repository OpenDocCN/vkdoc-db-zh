    1-13\. Finding and Eliminating NULLs in Queries


    Problem


    You need to report how many of your employees have a commission percentage as
    part of their remuneration, together with the number that get only a fixed salary.
    You track this using the COMMISSION_PCT field of the HR.EMPLOYEES table.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ THE BASICS


    Solution


    The structure of the HR.EMPLOYEE tables allows the COMMISSION_PCT to be NULL.
    Two queries can be used to find those whose commission percent is NULL and those
    whose commission percent is non-NULL.


    First, here’s the query that finds employees with NULL commission percent: select
    first_name, last_name


    from hr.employees


    where commission_pct is null;


    FIRST_NAME LAST_NAME


    -------------------- -------------------------


    Donald OConnell


    Douglas Grant


    Jennifer Whalen


    Michael Hartstein


    Pat Fay


    …


    72 rows selected.


    Now here’s the query that finds non-NULL commission-percentage holders: select
    first_name, last_name


    from hr.employees


    where commission_pct is not null;


    FIRST_NAME LAST_NAME


    -------------------- -------------------------


    John Russell


    Karen Partners


    Alberto Errazuriz


    Gerald Cambrault


    Eleni Zlotkey


    …


    35 rows selected.


    How It Works


    Our first SELECT statement uses the COMMISSION_PCT IS NULL clause to test for
    NULL entries. This has only two outcomes: either the column has a NULL entry,
    thus possessing no value, and satisfies the test; or it has some value.


    The second statement uses the COMMISSION_PCT IS NOT NULL clause, which will find
    a match for any employee with an actual value for COMMISSION_PCT.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ THE BASICS


    **Oracle’s Non-standard Treatment of the Empty String**


    Oracle deviates from the SQL standard in implicitly treating an empty, or zero-length,
    string as a surrogate for NULL. This is for a range of historical and pragmatic
    reasons, but it''s important to remember. Almost all other implementations of
    SQL treat the empty string as a separate, known value.'
  trans: "\n\n## 1-12. 基于查询设置 Where 条件\n\n`DEPARTMENT_ID` NOT NULL NUMBER(4)\n`DEPARTMENT_NAME`\
    \ NOT NULL VARCHAR2(30)\n\n这些是基础表 `HR.DEPARTMENTS` 的定义，我们的内联视图隐式地继承了这些定义。外部的 `SELECT`\
    \ 语句查询结果集，就好像有一个真实的表 `d`，并且你是针对它编写了这条语句。\n\n```\nselect department_name\nfrom\
    \ d;\n```\n\n### 问题\n\n你需要从表中查询数据，但其中一个查询条件依赖于另一张表在查询运行时的数据——并且你想避免硬编码条件。具体来说，你希望找出所有在北美设有办公室的部门，以便用于报告。\n\
    \n### 解决方案\n\n在 HR 模式中，`DEPARTMENTS` 表列出了部门，`LOCATIONS` 表列出了地点。\n\n```\nselect\
    \ department_name\nfrom hr.departments\nwhere location_id in\n  (select location_id\n\
    \   from hr.locations\n   where country_id = 'US'\n      or country_id = 'CA');\n\
    ```\n\n我们的结果如下：\n\nDEPARTMENT_NAME\n---------------\nIT 部\n运输部\n行政部\n采购部\n执行部\n\
    …\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n第一章 ■ 基础知识\n\n### 原理\n\n\
    我们的 `in` 谓词右侧读取子 `SELECT` 的结果，提供值用于与 `HR.DEPARTMENTS` 表的 `LOCATION_ID` 值进行比较。运行子\
    \ `SELECT` 查询本身就可以看到生成了哪些值。\n\n```\nselect location_id\nfrom hr.locations\nwhere\
    \ country_id = 'US'\n   or country_id = 'CA';\n```\n\n结果如下：\n\nLOCATION_ID\n-----------\n\
    1400\n1500\n1600\n1700\n1800\n1900\n已选择 6 行。\n\n外部的 `SELECT` 将 `LOCATION_ID` 值与这个动态查询出的列表进行比较。这与运行以下静态查询类似。\n\
    \n```\nselect department_name\nfrom hr.departments\nwhere location_id in (1400,1500,1600,1700,1800,1900);\n\
    ```\n\n此方法的关键优势在于，如果我们开设新办公室并更改了北美所有的 `LOCATION_ID`，我们无需重写查询：子查询将动态输出必要的新值。\n\n\
    ## 1-13. 查找和消除查询中的 NULL 值\n\n### 问题\n\n你需要报告有多少员工的薪酬中包含佣金百分比，以及有多少员工只领取固定工资。你通过\
    \ `HR.EMPLOYEES` 表的 `COMMISSION_PCT` 字段来追踪这个信息。\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    第一章 ■ 基础知识\n\n### 解决方案\n\n`HR.EMPLOYEE` 表的结构允许 `COMMISSION_PCT` 为 `NULL`。可以使用两个查询来查找佣金百分比为\
    \ `NULL` 的员工和非 `NULL` 的员工。\n\n首先，这是查找佣金百分比为 `NULL` 的员工的查询：\n\n```\nselect first_name,\
    \ last_name\nfrom hr.employees\nwhere commission_pct is null;\n```\n\nFIRST_NAME\
    \           LAST_NAME\n-------------------- -------------------------\nDonald\
    \               OConnell\nDouglas              Grant\nJennifer             Whalen\n\
    Michael              Hartstein\nPat                  Fay\n…\n已选择 72 行。\n\n现在，这是查找持有非\
    \ `NULL` 佣金百分比的员工的查询：\n\n```\nselect first_name, last_name\nfrom hr.employees\n\
    where commission_pct is not null;\n```\n\nFIRST_NAME           LAST_NAME\n--------------------\
    \ -------------------------\nJohn                 Russell\nKaren             \
    \   Partners\nAlberto              Errazuriz\nGerald               Cambrault\n\
    Eleni                Zlotkey\n…\n已选择 35 行。\n\n### 原理\n\n我们的第一个 `SELECT` 语句使用 `COMMISSION_PCT\
    \ IS NULL` 子句来测试 `NULL` 条目。这只有两种结果：要么该列条目为 `NULL`，即没有值，满足测试条件；要么它有某个值。\n\n第二个语句使用\
    \ `COMMISSION_PCT IS NOT NULL` 子句，这将找到任何 `COMMISSION_PCT` 有实际值的员工。\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    第一章 ■ 基础知识\n\n#### Oracle 对空字符串的非标准处理\n\nOracle 偏离了 SQL 标准，它将空字符串（或零长度字符串）隐式地视为\
    \ `NULL` 的替代符。这是出于一系列历史和实用原因，但这一点很重要，需要牢记。几乎所有其他 SQL 实现都将空字符串视为一个独立、已知的值。\n"
- fmt: 'Those of you with a programming background will find analogous the idea of
    a zero length string being well defined, with the memory for the string having
    a string terminator (`\0`) as its only component. In contrast, an uninstantiated
    string has no known state … not even a terminator. You wouldn’t use zero-length
    and uninstantiated strings interchangeably, but this is analogous to what Oracle
    does with `NULL`s.


    ## `NULL` Has No Equivalents


    One aspect of recipes (and indeed day-to-day work) involving `NULL` in SQL often
    stumps people. SQL expressions are tri-valued, meaning every expression can be
    `true`, `false`, or `NULL`. This affects all kinds of comparisons, operators,
    and logic as you''ve already seen. But a nuance of this kind of logic is occasionally
    forgotten, so we''ll repeat it explicitly. `NULL` has no equivalents. No other
    value is the same as `NULL`, *not even other `NULL` values*. If you run the following
    query, can you guess your results?


    ```sql

    select first_name, last_name

    from hr.employees

    where commission_pct = NULL;

    ```


    The answer is no rows will be selected. Even though you saw from the above `SELECT`
    statement in this recipe that 72 employees have a `NULL` `COMMISSION_PCT`, no
    `NULL` value equals another, so the `COMMISSION_PCT = NULL` criterion will never
    find a match, and you will never see results from this query.


    Always use `IS NULL` and `IS NOT NULL` to find or exclude your `NULL` values.


    ## 1-14. Sorting as a Person Expects


    ### Problem


    Your textual data has been stored in a mix of uppercase, lowercase, and sentence
    case. You need to sort this data alphabetically as a person normally would, in
    a case-insensitive fashion.


    ### Solution


    To introduce some mixed case data into our `HR.EMPLOYEES` table, let’s run the
    following `UPDATE` to uppercase William Smith’s last name.


    ```sql

    update hr.employees

    set last_name = ''SMITH''

    where employee_id = 171;

    ```


    This `select` statement shows Oracle’s default sorting of employee last names.


    ```sql

    select last_name

    from hr.employees

    order by last_name;

    ```


    ```

    LAST_NAME

    …

    Rogers

    Russell

    SMITH

    Sarchand

    Sciarra

    Seo

    Sewall

    Smith

    Stiles

    Sullivan

    …

    ```


    Astute readers will have anticipated these results. Oracle, by default, sorts
    using a binary sort order. This means that in a simple example like this one,
    text is sorted according to the numeric equivalent on the code page in use (`US7ASCII`,
    `WEISO8859P1`, and so on). In these code pages, upper- and lowercase letters have
    different values, with uppercase coming first. This is why the uppercase `SMITH`
    has sorted before all other names starting with a capital `S`.


    What most people would expect to see are the two “Smith” values sorted together,
    regardless of case. This `NLS` directive achieves that result.


    ```sql

    alter session set NLS_SORT=''BINARY_CI'';


    select last_name

    from hr.employees

    order by last_name;

    ```


    ```

    LAST_NAME

    …

    Rogers

    Russell

    Sarchand

    Sciarra

    Seo

    Sewall

    Smith

    SMITH

    Stiles

    Sullivan

    …

    ```


    ### How It Works


    Oracle supports both case-sensitive and case-insensitive sort orders. By default,
    you operate in a case-sensitive sort environment called `BINARY`. For every such
    sort order, an equivalent insensitive order exists using a suffix of `_CI`. We
    changed to using the `BINARY_CI` sort order, and reran the query to see results
    in the order a normal user would expect.


    As the name suggests, the `NLS_SORT` option affects sorting only. It doesn''t
    affect some other aspects of case sensitivity. With `NLS_SORT=''BINARY_CI''`,
    attempts to compare data in a case-insensitive fashion still exhibit Oracle''s
    default behavior.


    ```sql

    select first_name, last_name

    from hr.employees

    where last_name like ''s%'';

    ```


    ```

    no rows selected

    ```


    Don''t despair. Oracle provides a similar option to allow case-insensitive comparisons
    just like this.


    **Tip** A more traditional approach tackles this problem without changing any
    `NLS` parameters. You can cast the column name, literals, or both to upper- or
    lowercase for comparison using Oracle’s `UPPER` and `LOWER` functions.'
  raw: 'Those of you with a programming background will find analogous the idea of
    a zero length string being well defined, with the memory for the string having
    a string terminator (\0) as its only component. In contrast, an uninstantiated
    string has no known state … not even a terminator. You wouldn’t use zero-length
    and uninstantiated strings interchangeably, but this is analogous to what Oracle
    does with NULLs.


    NULL Has No Equivalents


    One aspect of recipes (and indeed day-to-day work) involving NULL in SQL often
    stumps people. SQL


    expressions are tri-valued, meaning every expression can be true, false, or NULL.
    This affects all kinds of comparisons, operators, and logic as you''ve already
    seen. But a nuance of this kind of logic is occasionally forgotten, so we''ll
    repeat it explicitly. NULL has no equivalents. No other value is the same as NULL,
    *not even other NULL values*. If you run the following query, can you guess your
    results?


    select first_name, last_name


    from hr.employees


    where commission_pct = NULL;


    The answer is no rows will be selected. Even though you saw from the above SELECT
    statement in this recipe that 72 employees have a NULL COMMISSION_PCT, no NULL
    value equals another, so the COMMISSION_PCT = NULL criterion will never find a
    match, and you will never see results from this query.


    Always use IS NULL and IS NOT NULL to find or exclude your NULL values.


    1-14\. Sorting as a Person Expects


