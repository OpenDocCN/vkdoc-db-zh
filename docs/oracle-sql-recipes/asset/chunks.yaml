    Figure 19-1. An HTML Report Generated Using `DBMS_SQLTUNE.REPORT_SQL_MONITOR`


    ## 19-3. Determining How Much SQL Work Is Left


    ### Problem


    A SQL query has been running for quite some time and you wonder if there’s a way
    to tell how much longer it will take to finish.


    ### Solution


    Use the `V$SESSION_LONGOPS` view to approximate how much time a query has left
    to run. To view the output from SQL*Plus, you’ll need to use the `SET` and `COLUMN`
    commands to format the output. Run the following query to get an estimate of the
    progress of currently running SQL statements:


    ```sql

    SET LINESIZE 141 TRIMSPOOL ON PAGES 66

    COL username FORMAT A8 HEAD "User|Name"

    ```'
