- fmt: "# CHAPTER 4 CREATING AND DERIVING DATA\n\nThere are a few restrictions on\
    \ virtual columns, some of them obvious, some not so much. If your virtual column\
    \ contains a built-in or user function, the referenced function must be declared\
    \ as `DETERMINISTIC`; in other words, the function must return the same results\
    \ for the same set of input values (for example, other columns in the row). Therefore,\
    \ you can’t use functions such as `SYSDATE` or `SYSTIMESTAMP` in a virtual column,\
    \ as they will almost always return different results every time the row is retrieved\
    \ (unless the results are retrieved within the same second for `SYSDATE` or millionth\
    \ of a second for `SYSTIMESTAMP`!). If you declare a user function to be `DETERMINISTIC`\
    \ when it’s not and reference it in a virtual column, you are asking for trouble;\
    \ your query results that include the virtual column will most likely be incorrect\
    \ or will produce different results depending on when you run it, who is running\
    \ it, and so forth.\n\nOther restrictions on virtual columns are not so obvious.\
    \ A virtual column can’t reference another virtual column in the table (although\
    \ you can certainly include one virtual column’s definition within the definition\
    \ of the second virtual column). In addition, the virtual column can only reference\
    \ columns within the same table. Overall, virtual columns can enhance your database\
    \ usability while somewhat reducing the amount of metadata you might otherwise\
    \ have to maintain in a database view.\n\n## 4-2. Returning Nonexistent Rows\n\
    \n### Problem\n\nYou have gaps in the sequence numbers used for a table’s primary\
    \ key, and you want to identify the intermediate sequence numbers.\n\n### Solution\n\
    \nAlthough primary keys are generally (and preferably) invisible to the end user,\
    \ there are times you may want to reuse sequence numbers where the number of digits\
    \ in the sequence number must be kept as low as possible to satisfy the requirements\
    \ of downstream systems or processes. For example, the company baseball team uses\
    \ the number in `EMPLOYEE_ID` column as the number on the back of the uniform\
    \ jersey. The manager wants to reuse old jersey numbers if possible, since the\
    \ number on the back of the jersey is limited to three digits.\n\nTo find the\
    \ employee numbers that were skipped or are currently not in use, you can use\
    \ a query with two embedded subqueries as follows:\n\n```sql\nwith all_used_emp_ids\
    \ as\n(select level poss_emp_id from (select max(employee_id) max_emp_num\nfrom\
    \ employees)\nconnect by level <= max_emp_num)\nselect poss_emp_id\nfrom all_used_emp_ids\n\
    where poss_emp_id not in (select employee_id from employees)\norder by poss_emp_id\n\
    ;\n```\n\n```\nPOSS_EMP_ID\n. . .\n101 rows selected\n```\n\nThe query retrieves\
    \ any unused employee numbers up to the highest existing employee number currently\
    \ in the `EMPLOYEES` table.\n\n### How It Works\n\nThe solution uses subquery\
    \ factoring and two explicit subqueries to find the list of skipped employee numbers.\
    \ The query in the `WITH` clause creates a series of numbers (with no gaps) from\
    \ one to the value of the highest employee number in the `EMPLOYEES` table. The\
    \ highlighted part of the subquery that follows retrieves the highest number:\n\
    \n```sql\n(select level poss_emp_id from (select max(employee_id) max_emp_num\n\
    from employees)\nconnect by level <= max_emp_num)\n```\n\nThe rest of the query\
    \ in the `WITH` clause generates the gapless sequence of numbers. It leverages\
    \ a subtle feature of Oracle’s hierarchical query features (the `CONNECT BY` clause\
    \ and the `LEVEL` pseudocolumn) to generate each number in the sequence. See Chapter\
    \ 13 for other useful recipes that require traversing hierarchical data.\n\nHere\
    \ is the main part of the `SELECT` query:\n\n```sql\nselect poss_emp_id\nfrom\
    \ all_used_emp_ids\nwhere poss_emp_id not in (select employee_id from employees)\n\
    ```\n\nIt retrieves all rows from the gapless sequence with possible employee\
    \ numbers that do not already exist in the `EMPLOYEES` table. The final result\
    \ set is ordered by `POSS_EMP_ID` to make it easy to assign the lowest available\
    \ number to the next employee. If you want to always exclude one- or two-digit\
    \ numbers, you can add another predicate to the `WHERE` clause as follows:\n\n\
    ```sql\nwith all_used_emp_ids as\n(select level poss_emp_id from (select max(employee_id)\
    \ max_emp_num\nfrom employees)\nconnect by level <= max_emp_num)\nselect poss_emp_id\n\
    from all_used_emp_ids\nwhere poss_emp_id not in (select employee_id from employees)\n\
    and poss_emp_id > 99\norder by poss_emp_id\n;\n```\n\n```\nPOSS_EMP_ID\n2 rows\
    \ selected\n```\n\nIn the revised query’s results, the only three-digit numbers\
    \ that can be reused below the highest employee number currently in use are 179\
    \ and 183.\n\n## 4-3. Changing Rows into Columns\n\n### Problem\n\nYour transaction\
    \ data is in a highly normalized database structure, and you want to easily create\
    \ crosstab-style reports for the business analysts, returning totals or other\
    \ aggregate results as multiple columns within a single row.\n\n### Solution\n\
    \nUse the `PIVOT` keyword in your `SELECT` statement to spread values (in one\
    \ or many columns) from multiple rows aggregated into multiple columns in the\
    \ query output. For example, in the Oracle order entry sample schema, `OE`, you\
    \ want to pick five key products from all orders and find out which customers\
    \ are buying these products, and how many they bought.\n\nThe `ORDERS` table and\
    \ `ORDER_ITEMS` table are defined as follows:\n\n```\ndescribe orders;\n\nName\
    \                                      Null      Type\n-----------------------------------------\
    \ -------- --------------------------------\nORDER_ID                        \
    \          NOT NULL NUMBER(12)\nORDER_DATE                                NOT\
    \ NULL TIMESTAMP(6) WITH LOCAL TIME ZONE\nORDER_MODE                         \
    \                VARCHAR2(8)\nCUSTOMER_ID                              NOT NULL\
    \ NUMBER(6)\nORDER_STATUS                                      NUMBER(2)\nORDER_TOTAL\
    \                                       NUMBER(8,2)\nSALES_REP_ID            \
    \                          NUMBER(6)\nPROMOTION_ID                           \
    \           NUMBER(6)\n\n8 rows selected\n```\n\n```\ndescribe order_items;\n\n\
    Name                                      Null      Type\n-----------------------------------------\
    \ -------- --------------------------------\nORDER_ID                        \
    \          NOT NULL NUMBER(12)\nLINE_ITEM_ID                              NOT\
    \ NULL NUMBER(3)\nPRODUCT_ID                                NOT NULL NUMBER(6)\n\
    UNIT_PRICE                                         NUMBER(8,2)\nQUANTITY     \
    \                                      NUMBER(8)\nLINE_TOTAL_PRICE           \
    \                        VARCHAR2(14)\n\n6 rows selected\n```\n\nHere is the pivot\
    \ query to retrieve quantity totals for the top five products by customer:\n\n\
    ```sql\nwith order_item_query as\n(select customer_id, product_id, quantity\n\
    from orders join order_items using(order_id))\nselect * from order_item_query\n\
    pivot (\nsum(quantity) as sum_qty\nfor (product_id) in (3170 as P3170,\n     \
    \                3176 as P3176,\n                     3182 as P3182,\n       \
    \              3163 as P3163,\n                     3165 as P3165)\n)\norder by\
    \ customer_id\n;\n```\n\n```\nCUSTOMER_ID P3170_SUM_QTY P3176_SUM_QTY P3182_SUM_QTY\
    \ P3163_SUM_QTY P3165_SUM_QTY\n----------- ------------- ------------- -------------\
    \ ------------- -------------\n        101           208\n        104        \
    \    70            72            77            61            64\n        106 \
    \           62            55\n        107            76\n        108         \
    \   45            31\n        109           115           112\n        116   \
    \         48            24             5            10\n        117          \
    \  63            67\n        118            42\n        119            36    \
    \        30\n. . .\n        170            92\n\n47 rows selected\n```\n\nFrom\
    \ the results of this query, you can easily see that customer number 104 is the\
    \ top buyer of all of the products specified in the `PIVOT` clause.\n\n### How\
    \ It Works\n\nThe `PIVOT` operator, as the name implies, pivots rows into columns.\
    \ In the solution, you will notice a few familiar constructs, and a few not so\
    \ familiar. First, the solution uses the `WITH` clause (subquery factoring) to\
    \ more cleanly separate the base query from the rest of the query; here is the\
    \ `WITH` clause used in the solution:\n\n```sql\nwith order_item_query as\n(select\
    \ customer_id, product_id, quantity\nfrom orders join order_items using(order_id))\n\
    ```\n\nWhether you use the `WITH` clause or an inline view is a matter of style.\
    \ In either case, be sure to only include columns that you will be grouping by,\
    \ aggregate columns, or columns used in the `PIVOT` clause."
