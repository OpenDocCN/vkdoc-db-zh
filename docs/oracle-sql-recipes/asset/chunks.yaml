    ## 11-11. Graphically Representing Data Distribution with Text


    ### Problem


    You’d like to include simple graphs or histograms with your basic SQL reports.
    You don’t want to export data to a graphing or GUI tool, and would like to use
    SQL statements and string manipulation to create ASCII-art style graphics in native
    SQL.


    ### Solution


    The need to print ASCII-style art in a report is not necessarily a common one,
    so when it does crop up, the solution needs a little lateral thinking. One of
    the best ways to present the magnitude of something is with a bar chart, and with
    Oracle we can use the `RPAD` function to print a string of identical characters
    to a specified length, to mimic the look and feel of a bar chart.


    The next SQL statement uses `RPAD` and simple calculations to print a bar chart
    of comparative employee salary, using a chart made up of `X` characters to symbolize
    the magnitude of a given employee’s salary.


    ```sql

    select employee_id, last_name, rpad(''X'',floor(salary/1000), ''X'') salary_graph
    from hr.employees

    order by salary desc;

    ```


    The results produce exactly the kind of simple graph we want. If it helps, try
    turning the book sideways to have your graph “rise” from the x-axis at the bottom,
    rather than the side.


    [www.it-ebooks.info](http://www.it-ebooks.info/)'
