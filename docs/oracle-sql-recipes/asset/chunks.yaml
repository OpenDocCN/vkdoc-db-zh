    the desired result!


    Another potential solution to the problem uses an EXISTS clause to determine which
    rows to delete: delete from employees_retired er


    where exists (


    select 1 from employees e


    where er.employee_id = e.employee_id


    )


    ;


    This is not as elegant as the first solution, but might be more efficient. It
    appears contrived, and it is, because Oracle never uses the results of the query
    anywhere. It only uses the subquery to verify the existence of a match, and then
    deletes the corresponding row(s). You can use a “1”, an “X”, or even NULL; internally,
    Oracle translates the result to a zero and does not use it.


    Whether you use IN or EXISTS depends on the sizes of the driving table (the outer
    table referenced in the SELECT, UPDATE, or DELETE) and the size of the result
    set in the subquery. Using IN is most likely better if the results of the subquery
    are small or is a list of constants. However, using EXISTS may run a lot more
    efficiently since the implicit JOIN may take advantage of indexes. The bottom
    line is, it depends. Look at the execution plans for each method (IN versus EXISTS),
    and if the relative row counts remain stable whenever the query is run, you can
    use whichever method is faster.


    3-6\. Finding Matched Data Across Tables


    Problem


    You want to find the rows in common between two or more tables or queries.


    Solution


    Use the INTERSECT operator. When you use INTERSECT, the resulting row set contains
    only rows that are in common between the two tables or queries:


    select count(*) from employees_act;


    COUNT(*)


    select count(*) from employees_new;


    COUNT(*)


