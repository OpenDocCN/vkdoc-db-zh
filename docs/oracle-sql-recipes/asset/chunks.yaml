    您知道一个子表上定义了外键约束。您希望展示该子表的外键约束及其对应的父表主键约束。


    ## 解决方案


    以下脚本查询 `DBA_CONSTRAINTS` 视图，以确定与子表外键约束相关的父表主键约束。该脚本将外键列（针对指定的表）与任何父键列约束进行关联：


    ```sql

    select

    a.constraint_type cons_type

    ,a.table_name child_table

    ,a.constraint_name child_cons

    ,b.table_name parent_table

    ,b.constraint_name parent_cons

    ,b.constraint_type cons_type

    from dba_constraints a

    ,dba_constraints b

    where a.owner = upper(''&owner'')

    and a.table_name = upper(''&table_name'')

    and a.constraint_type = ''R''

    and a.r_owner = b.owner

    and a.r_constraint_name = b.constraint_name;

    ```


    前面的脚本会提示您输入两个 `SQL*Plus` 的 `&` 变量（`OWNER` 和 `TABLE_NAME`）。


    如果您不使用 `SQL*Plus`，则可能需要在运行脚本前，用适当的值修改脚本。


    ```

    C CHILD_TABLE CHILD_CONS PARENT_TABLE PARENT_CONS C

    - --------------- ------------------- --------------- ------------------- -

    R REG_COMPANIES REG_COMPANIES_FK2 D_COMPANIES D_COMPANIES_PK P

    R REG_COMPANIES REG_COMPANIES_FK1 CLUSTER_BUCKETS CLUSTER_BUCKETS_PK P

    ```


    此输出显示存在两个外键约束，并同时显示了父表的主键约束。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 工作原理


    在排查数据完整性问题时，有时需要验证外键如何与主键相关联。这通常涉及查询 `DBA/ALL/USER_CONSTRAINTS` 视图之一。


    当 `CONSTRAINT_TYPE` 列包含值 `R` 时，表明该行描述的是一个引用完整性约束，即子表约束引用了主键约束。我们使用与同一表连接两次的技术来检索主键约束信息。子约束列（`R_OWNER`
    和 `R_CONSTRAINT_NAME`）将与 `DBA_CONSTRAINTS` 视图中另一行（包含主键信息）相匹配。


    您也可以反向解决本配方的问题。也就是说，对于一个主键约束，找出与之关联的外键列（如果有）。下一个脚本获取主键记录，并查看它是否有任何约束类型为 `R` 的子记录。运行此脚本时，系统将提示您输入主键表的所有者和名称：


    ```sql

    select

    b.table_name primary_key_table

    ,a.table_name fk_child_table

    ,a.constraint_name fk_child_table_constraint

    from dba_constraints a

    ,dba_constraints b

    where a.r_constraint_name = b.constraint_name

    and a.r_owner = b.owner

    and a.constraint_type = ''R''

    and b.owner = upper(''&table_owner'')

    and b.table_name = upper(''&table_name'');

    ```


    以下是一些示例输出：


    ```

    PRIMARY_KEY_TABLE FK_CHILD_TABLE FK_CHILD_TABLE_CONSTRAINT

    -------------------- -------------------- ------------------------------

    CLUSTER_BUCKETS CB_AD_ASSOC CB_AD_ASSOC_FK1

    CLUSTER_BUCKETS CLUSTER_CONTACTS CLUSTER_CONTACTS_FK1

    CLUSTER_BUCKETS CLUSTER_NOTES CLUSTER_NOTES_FK1

    CLUSTER_BUCKETS DOMAIN_NAMES DOMAIN_NAMES_FK1

    CLUSTER_BUCKETS REG_COMPANIES REG_COMPANIES_FK1

    CLUSTER_BUCKETS CB_MS_ASSOC CB_MS_ASSOC_FK2

    ```


    输出表明 `CLUSTER_BUCKETS` 表有多个外键约束引用它。


    ## 10-9. 显示对象依赖关系


    ### 问题


    您即将删除一个表，并想知道有哪些其他对象可能依赖于它。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### 解决方案


    使用 `DBA_DEPENDENCIES` 视图来显示对象依赖关系。以下查询将提示您输入用户名和对象名：'
- fmt: '# SQL查询依赖关系


    ```sql

    select ''+'' || lpad('' '',level+2) || type || '' '' || owner || ''.'' || name
    dep_tree

    from dba_dependencies


    connect by prior owner = referenced_owner and prior name = referenced_name

    and prior type = referenced_type


    start with referenced_owner = upper(''&object_owner'')

    and referenced_name = upper(''&object_name'')

    and owner is not null;

    ```


    In the output, each object listed has a dependency on the object you entered.
    Lines are indented to show the dependency of an object on the object in the preceding
    line.


    **输出示例：**


    ```

    DEP_TREE

    ------------------------------------------------------------

    + TRIGGER STAR2.D_COMPANIES_BU_TR1

    + MATERIALIZED VIEW CIA.CB_RAD_COUNTS

    + SYNONYM STAR1.D_COMPANIES

    + SYNONYM CIA.D_COMPANIES

    + MATERIALIZED VIEW CIA.CB_RAD_COUNTS

    ```


    In this example, the object being analyzed is a table named `D_COMPANIES`. There
    are several synonyms, materialized views, and one trigger that are dependent on
    this table. For example, the materialized view `CB_RAD_COUNTS` owned by `CIA`
    is dependent on the synonym `D_COMPANIES` owned by `CIA`, which in turn is dependent
    on the `D_COMPANIES` synonym owned by `STAR1`.


    ## How It Works


    The `DBA_DEPENDENCIES` view is handy for determining what database objects are
    dependent on other database objects. For example, you may have a table that has
    synonyms, views, materialized views, functions, procedures, and triggers that
    rely on it. You may want to drop or modify a table, and before making the changes
    you want to review what other objects are dependent on the object you are modifying.


    The `DBA_DEPENDENCIES` view contains a hierarchical relationship between the `OWNER`,
    `NAME`, and `TYPE` columns and their referenced column names of `REFERENCED_OWNER`,
    `REFERENCED_NAME`, and `REFERENCED_TYPE`. Oracle provides a number of constructs
    to perform hierarchical queries. For example, `START WITH` and `CONNECT BY` allow
    you to identify a starting point in a tree and walk either up or down the hierarchical
    relationship.


    > **Note:** See Chapter 13 for a complete discussion of hierarchical queries.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## CHAPTER 10 ■ DATA DICTIONARY


    The SQL in the solution section operates on only one object. If you want to inspect
    every object in a schema, you can use SQL to generate SQL to create scripts that
    display all dependencies for a schema’s objects. The next section of code does
    that. For formatting and output, we used some constructs specific to `SQL*Plus`,
    such as setting the page sizes and line size and spooling the output:


    ```sql

    UNDEFINE owner

    SET LINESIZE 132 PAGESIZE 0 VERIFY OFF FEEDBACK OFF TIMING OFF

    SPO dep_dyn_&&owner..sql

    SELECT ''SPO dep_dyn_&&owner..txt'' FROM DUAL;

    --

    SELECT

    ''PROMPT '' || ''_____________________________''|| CHR(10) ||

    ''PROMPT '' || object_type || '': '' || object_name || CHR(10) ||

    ''SELECT '' || '''''''' || ''+'' || '''''''' || '' '' || ''|| LPAD('' || ''''''''
    || '' '' || '''''''' || '',level+3)''

    || CHR(10) || '' || type || '' || '''''''' || '' '' || '''''''' ||

    '' || owner || '' || '''''''' || ''.'' || '''''''' || '' || name'' || CHR(10)
    ||

    '' FROM dba_dependencies '' || CHR(10) ||

    '' CONNECT BY PRIOR owner = referenced_owner AND prior name = referenced_name
    ''

    || CHR(10) ||

    '' AND prior type = referenced_type '' || CHR(10) ||

    '' START WITH referenced_owner = '' || '''''''' || UPPER(''&&owner'') || ''''''''
    || CHR(10) ||

    '' AND referenced_name = '' || '''''''' || object_name || '''''''' || CHR(10)
    ||

    '' AND owner IS NOT NULL;''

    FROM dba_objects

    WHERE owner = UPPER(''&&owner'')

    AND object_type NOT IN (''INDEX'',''INDEX PARTITION'',''TABLE PARTITION'');

    --

    SELECT ''SPO OFF'' FROM dual;

    SPO OFF

    SET VERIFY ON LINESIZE 80 FEEDBACK ON

    ```


    You should now have a script named `dep_dyn_<owner>.sql` created in the same directory
    you ran the script from. This script contains all of the SQL required to display
    dependencies on objects within the owner you entered. Run the script to display
    object dependencies. In this example, the owner is `CIA`:


    ```sql

    SQL> @dep_dyn_cia.sql

    ```'
