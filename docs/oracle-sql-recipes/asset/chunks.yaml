    Primary key constraints are used to guarantee that each record in a table can
    be uniquely identified. A common table design technique is to create a non-meaningful
    numeric column to contain a unique system-generated sequence number (also called
    a surrogate key). A primary key constraint is placed on the surrogate key column
    to ensure its uniqueness.


