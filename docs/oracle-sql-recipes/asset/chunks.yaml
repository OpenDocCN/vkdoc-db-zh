    前面的练习是一个简单的示例，展示了添加索引如何提升单个查询的性能。请注意，添加一个能加速某个查询的索引，可能会对应用程序的其他方面产生不利影响。索引至少会增加额外的磁盘空间开销，以及在表进行插入、更新或删除操作时维护索引的处理开销。你应该在测试环境中添加索引，并验证它在提升性能的同时没有产生意料之外的副作用。其他需要考虑的因素包括索引类型（`B
    树`、`位图`等）、存储特性以及索引所在的表空间。


    **注意** 每一行的`成本`是优化器对每个步骤在系统资源（如`CPU`、`I/O`和`内存`）方面开销的加权估算值。`成本`本身并没有一个具体的度量单位；它是一个数字，优化器用来比较执行计划和步骤。一般来说，`成本`越低，操作和查询的预期性能越好。


    ## 工作原理


    在解读执行计划的每个步骤时，计划中的每个`ID`都与一个操作相关联。


    对性能影响最大的两种操作类型是：


    - 访问路径

    - 连接方法


    `访问路径`描述了如何从数据库中检索数据。表 19-3 描述了最常见的执行计划访问路径。通常，当只需要检索表中一小部分数据时，应使用索引访问路径。当需要返回表中的大部分数据时，全表扫描可能更合适。


    [IT 电子书官网](http://www.it-ebooks.info/)


    # 第 19 章 SQL 监控与调优


    ### 表 19-3 最常见的访问路径


    | 访问路径 | 描述 |

    |----------|------|

    | 全表扫描 | 读取表中的所有行，当需要读取表的大部分行时，这种方式效率较高。当只需要读取表的一小部分数据时，可以创建索引来避免全表扫描。 |

    | ROWID 扫描 | 通过`ROWID`定位一行。`ROWID`包含该行在数据文件和块中的物理位置，当检索的行数相对较少时效率高，当读取表的大部分数据时效率较低。
    |

    | 索引扫描 | 索引包含键值和一个`ROWID`。如果查询只需要索引键值中包含的信息，`Oracle`直接返回这些值；否则，它会使用`ROWID`从表行中检索额外的数据。
    |


    `连接方法`是优化器用于从多个表中检索数据的技术。连接语句源于在`WHERE`子句中连接的表。表 19-4 概述了各种连接方法。优化器必须为每个连接语句计算以下内容：


    - 返回连接中每个表的行所使用的访问路径

    - 连接方法

    - 当连接涉及两个以上表时的连接顺序


    ### 表 19-4 连接方法


    | 连接方法 | 描述 |

    |----------|------|

    | 嵌套循环 | 当连接少量数据子集，并且对连接中第二个表（内表）有唯一索引或高度选择性的索引访问时非常有用。 |

    | 哈希连接 | 对于连接大型数据集效率高。在内存中基于较小表或结果集的连接键构建一个哈希表。扫描较大的表，并使用哈希表来检索行。 |

    ```'
