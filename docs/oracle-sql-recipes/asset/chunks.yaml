    # SQL 基础操作示例


    ## 数据查询结果示例


    ```

    EMPLOYEE_ID FIRST_NAME LAST_NAME EMAIL PHONE_NUMBER HIRE_DATE JOB_ID SALARY

    COMMISSION_PCT MANAGER_ID DEPARTMENT_ID

    ----------- ---------- --------- -------- ------------ ---------- --------- ------

    -------------- ---------- -------------

    198 Donald OConnell DOCONNEL 650.507.9833 21-JUN-99 SH_CLERK 2600

    124 50

    199 Douglas Grant DGRANT 650.507.9844 13-JAN-00 SH_CLERK 2600

    124 50

    123 Shanta Vollman SVOLLMAN 650.123.4234 10-OCT-97 ST_MAN 6500

    100 50

    ```


    ## 如何工作


    在 SQL 中，`*` 是一个表示表中所有列名的快捷方式。当 Oracle 的解析器在查询中看到 `SELECT *` 时，解析器会将 `*` 替换为所有可能的列名列表（标记为隐藏的列除外）。使用
    `SELECT *` 是构建临时查询的快速方法，因为您无需查找并输入所有正确的列名。


    在您忍不住对所有查询使用星号之前，重要的是要记住，良好的设计通常意味着只显式命名您感兴趣的那些列。这会带来更好的性能，因为 Oracle 否则必须读取系统目录来确定要包含在查询中的字段。指定显式列还可以保护您免受未来可能添加列到表中的问题。如果您编写的代码期望使用星号带来的隐式顺序，当该顺序意外更改时（例如以不同方式删除并重新创建表，或向表中添加新列），您可能会遇到令人不快的意外。


    在大多数情况下，星号最好保留用于交互式查询和临时分析。


    ## 1-3. 对结果进行排序


    ### 问题


    用户希望以特定方式查看查询排序后的数据。例如，他们希望看到员工按姓氏字母顺序排序，然后是名字。


    ### 解决方案


    Oracle 使用标准的 `ORDER BY` 子句来允许您对查询结果进行排序。


    ```sql

    select employee_id, first_name, last_name, hire_date, salary

    from hr.employees

    where salary > 5000

    order by last_name, first_name;

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### 第 1 章 ■ 基础知识


    结果如下。


    ```

    EMPLOYEE_ID FIRST_NAME LAST_NAME HIRE_DATE SALARY

    ----------- ---------- --------- --------- ------

    174 Ellen Abel 11/MAY/96 11000

    166 Sundar Ande 24/MAR/00 6400

    204 Hermann Baer 07/JUN/94 10000

    167 Amit Banda 21/APR/00 6200

    172 Elizabeth Bates 24/MAR/99 7300

    151 David Bernstein 24/MAR/97 9500

    169 Harrison Bloom 23/MAR/98 10000

    148 Gerald Cambrault 15/OCT/99 11000

    154 Nanette Cambrault 09/DEC/98 7500

    110 John Chen 28/SEP/97 8200

    …

    ```


    ### 如何工作


    此解决方案中的 `ORDER BY` 子句指示 Oracle 按 `LAST_NAME` 列排序，当 `LAST_NAME` 值匹配时，再按 `FIRST_NAME`
    列排序。除非另有指示，Oracle 隐式使用升序排序，因此数字从零到九排序，字母从 A 到 Z 排序，依此类推。您可以使用 `ASC` 和 `DESC` 选项显式控制升序和降序排序方向。


    这是一个例子：


    ```sql

    select employee_id, first_name, last_name, hire_date, salary

    from hr.employees

    where salary > 5000

    order by salary desc;

    ```


    我们对薪水进行的显式降序排序结果如下：


    ```

    EMPLOYEE_ID FIRST_NAME LAST_NAME HIRE_DATE SALARY

    ----------- ---------- --------- --------- ------

    100 Steven King 17-JUN-87 24000

    102 Lex De Haan 13-JAN-93 17000

    101 Neena Kochhar 21-SEP-89 17000

    145 John Russell 01-OCT-96 14000

    146 Karen Partners 05-JAN-97 13500

    …

    ```


    ## 1-4. 向表中添加行


    ### 问题


    您需要向表中添加新的数据行。例如，一位新员工加入公司，需要将他的数据添加到 `HR.EMPLOYEES` 表中。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### 第 1 章 ■ 基础知识


    ### 解决方案


    使用 `INSERT` 语句向表中添加新行。要向表添加新行，请为所有必填列提供值，以及任何可选列的值。这是一条添加新员工的语句：


    ```sql

    insert into hr.employees

    (employee_id, first_name, last_name, email, phone_number, hire_date, job_id, salary,
    commission_pct, manager_id, department_id)

    values

    (207, ''John '', ''Doe '', ''JDOE '', ''650.555.8877 '', ''25-MAR-2009 '', ''SA_REP
    '', 3500, 0.25, 145, 80);

    ```


    ### 如何工作


    `INSERT` 语句将值列表与列列表关联起来。它基于该关联创建一行，并将该行插入到目标表中。


    Oracle 将检查 `NULL` 约束以及主键、外键和其他已定义约束，以确保插入数据的完整性。有关确定表上约束状态以及它们可能如何影响插入新数据的配方，请参见第
    10 章。


    您可以通过检查表的描述来检查哪些字段是必填的（定义为 `NOT NULL`）。您可以从 SQL Developer 或 SQL*Plus 中发出 `DESCRIBE`
    命令（可以缩写为 `DESC`）来实现。例如：


    ```sql

    desc hr.employees;

    ```


    ```

    Name Null Type

    ------------------------------ -------- ------------

    EMPLOYEE_ID NOT NULL NUMBER(6)

    FIRST_NAME VARCHAR2(20)

    LAST_NAME NOT NULL VARCHAR2(25)

    EMAIL NOT NULL VARCHAR2(25)

    PHONE_NUMBER VARCHAR2(20)

    HIRE_DATE NOT NULL DATE

    JOB_ID NOT NULL VARCHAR2(10)

    SALARY NUMBER(8,2)

    COMMISSION_PCT NUMBER(2,2)

    MANAGER_ID NUMBER(6)

    DEPARTMENT_ID NUMBER(4)

    11 rows selected

    ```


    您可以通过不枚举列名列表，并为当前表定义中的*每一列*按正确顺序提供数据来编写更短的 `INSERT` 语句。这是一个例子：


    ```sql

    insert into hr.employees

    values

    (208, ''Jane '', ''Doe '', ''JADOE '', ''650.555.8866 '', ''25-MAR-2009 '', ''SA_REP
    '', 3500, 0.25, 145, 80)

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### 第 1 章 ■ 基础知识


    **注意** 省略列名列表很少（如果有的话）是一个好主意——这是出于一些相当严重的原因。您不知道未来可能会对表进行哪些更改，并且通过假设隐式列顺序，您会使您的
    SQL 对未来的架构更改变得脆弱。也许可以说明可能出现问题的最佳例子是静默逻辑损坏。如果有人以不同的列顺序重建基础表，但您的 `INSERT` 语句通过了数据类型和其他检查，您可能会发现自己将数据静默地插入到了错误的列中，带来灾难性的后果。我们强烈建议始终在
    `INSERT` 语句中枚举列。


    ## 1-5. 将行从一个表复制到另一个表


    ### 问题


    您想将信息从一个表复制到另一个表。


    ### 解决方案


    使用带有 `SELECT` 选项的 `INSERT` 语句将数据从一个表复制到另一个表。假设您有一个候选职位申请表，其中许多详细信息与 `HR.EMPLOYEES`
    表相同。这个 `INSERT` 语句将基于对 `CANDIDATES` 表的 `SELECT` 语句插入到 `HR.EMPLOYEES` 表中。


    ```sql

    insert into hr.employees

    (employee_id, first_name, last_name, email, phone_number, hire_date, job_id, salary,
    commission_pct, manager_id, department_id)

    select 210, first_name, last_name, email, phone_number, sysdate, ''IT_PROG'',
    3500, NULL, 103, 60

    from hr.candidates

    where first_name = ''Susan''

    and last_name = ''Jones'';

    ```


    ### 如何工作


    此配方将要插入到 `HR.EMPLOYEES` 表中的值播种为对 `CANDIDATES` 表进行 `SELECT` 的结果。`SELECT` 语句可以单独运行以查看传递给
    `INSERT` 语句的数据。


    ```sql

    select 210, first_name, last_name, email, phone_number, sysdate, job_id, 3500,
    NULL,

    ''IT_PROG'', 103

    from hr.candidates

    where first_name = ''Susan''

    and last_name = ''Jones'';

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### 第 1 章 ■ 基础知识


    ```

    210 FIRST_NAME LAST_NAME EMAIL PHONE_NUMBER SYSDATE ''IT_PRO 3500 N 103 60

    --- ---------- --------- ------ ------------ ------- ---- - --- --

    210 Susan Jones SJONES 650.555.9876 30-MAR-09 IT_PROG 3500 103 60

    ```

    '
- fmt: "## 1-6. Copying Data in Bulk from One Table to Another\n\n### Problem\n\n\
    You want to copy multiple rows from one table to another.\n\n### Solution\n\n\
    The `INSERT INTO … SELECT …` approach is capable of inserting multiple rows. The\
    \ key is using desired criteria in the `SELECT` statement to return the rows you\
    \ wish to insert. We can amend our previous recipe to handle multiple rows. Here’s\
    \ is an example of multi-row `INSERT` in action.\n\n```sql\nselect candidate_id,\
    \ first_name, last_name, email, phone_number, sysdate, job_id, 3500, NULL, 'IT_PROG',\
    \ 103\nfrom hr.candidates;\n```\n\nThis recipe relies on the existence of the\
    \ same `HR.CANDIDATES` table used in the previous recipe. If you’re playing along\
    \ at home, be sure you create this table first.\n\n### How It Works\n\nThis recipe\
    \ also seeds the values to be inserted from the `HR.CANDIDATES` table. As there\
    \ is no `WHERE` clause in the `SELECT` portion of the statement, all the rows\
    \ in the `CANDIDATES` table will be selected, and thus all have equivalent rows\
    \ inserted into the `HR.EMPLOYEES` table.\n\n## 1-7. Changing Values in a Row\n\
    \n### Problem\n\nYou want to change some of the data in one or more rows of a\
    \ table.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nCHAPTER 1 ■ THE\
    \ BASICS\n\n### Solution\n\nThe `UPDATE` statement is designed to change data,\
    \ as its name suggests. For this problem, let's assume we want to increase the\
    \ salaries of everyone in department 50 by five percent. This `UPDATE` statement\
    \ achieves the change:\n\n```sql\nupdate hr.employees\nset salary = salary * 1.05\n\
    where department_id = 50;\n```\n\n### How It Works\n\nThe basic design of the\
    \ `UPDATE` statement starts with the `UPDATE` clause itself `update hr.employees`.\
    \ This tells Oracle what table is to have its rows updated. The `SET` clause then\
    \ specifies which columns are to change and how they are to be updated—either\
    \ by a literal value, calculation, function result, subselect, or other method.\n\
    \n`set salary = salary * 1.05`\n\nIn this case, we're using a self-referencing\
    \ calculation. The new `SALARY` value will be 1.05 times the existing value, relative\
    \ to each row (that is, Oracle will perform this calculation for each row affected).\n\
    \nFinally, the `WHERE` clause acts to provide the normal filtering predicates\
    \ you're already familiar with from the `SELECT` statement. Only those rows that\
    \ match a `DEPARTMENT_ID` of 50 will be affected.\n\n## 1-8. Updating Multiple\
    \ Fields with One Statement\n\n### Problem\n\nYou want to change multiple columns\
    \ for one or more rows of a table.\n\n### Solution\n\nThe `update` statement is\
    \ designed to update as many rows as you need in one statement. This means you\
    \ can use multiple `column = value` clauses in the `UPDATE` statement to change\
    \ as many fields as you wish in one statement. For example, to change the phone\
    \ number, job role, and salary of James Marlow, `EMPLOYEE_ID` 131, we can use\
    \ a single `UPDATE` statement.\n\n```sql\nupdate hr.employees\nset job_id = 'ST_MAN',\n\
    \    phone_number = '650.124.9876',\n    salary = salary * 1.5\nwhere employee_id\
    \ = 131;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nCHAPTER 1\
    \ ■ THE BASICS\n\n### How It Works\n\nOracle evaluates the predicates of the `UPDATE`\
    \ statement normally. In this case, it targets the row with the `EMPLOYEE_ID`\
    \ of 131. It then changes each field based on the `SET` criteria given. It performs\
    \ this action in one pass of the row.\n\nOracle also supports the grouping the\
    \ columns and values for updates in parenthesis, in a similar fashion to other\
    \ databases, but with one quirk.\n\n```sql\nupdate hr.employees\nset (job_id,Phone_number,Salary)\n\
    \    = (select 'ST_MAN','650.124.9876',salary * 1.5 from dual)\nwhere employee_id\
    \ = 131;\n```\n\n`Note` If the subquery returns no data, the values specified\
    \ in the set clause will be set to null."
  raw: 'We use literal (hard-coded) values for EMPLOYEE_ID, SALARY, and DEPARTMENT_ID.
    We also use the NULL place-holder to indicate that Susan has no COMMISSION_PCT—that
    is, she''s not a sales person and therefore isn''t part of a sales commission
    scheme. We want the HIRE_DATE to reflect the day on which we run the INSERT statement,
    so we use the built-in SYSDATE function to return the current system date.


    1-6\. Copying Data in Bulk from One Table to Another


    Problem


    You want to copy multiple rows from one table to another.


    Solution


    The INSERT INTO … SELECT … approach is capable of inserting multiple rows. The
    key is using desired criteria in the SELECT statement to return the rows you wish
    to insert. We can amend our previous recipe to handle multiple rows. Here’s is
    an example of multi-row INSERT in action.


    select candidate_id, first_name, last_name, email, phone_number, sysdate, job_id,
    3500, NULL, ''IT_PROG'', 103


    from hr.candidates;


    This recipe relies on the existence of the same HR.CANDIDATES table used in the
    previous recipe. If you’re playing along at home, be sure you create this table
    first.


    How It Works


    This recipe also seeds the values to be inserted from the HR.CANDIDATES table.
    As there is no WHERE clause in the SELECT portion of the statement, all the rows
    in the CANDIDATES table will be selected, and thus all have equivalent rows inserted
    into the HR.EMPLOYEES table.


    1-7\. Changing Values in a Row


    Problem


    You want to change some of the data in one or more rows of a table.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ THE BASICS


    Solution


    The UPDATE statement is designed to change data, as its name suggests. For this
    problem, let''s assume we want to increase the salaries of everyone in department
    50 by five percent. This UPDATE statement achieves the change:


    update hr.employees


    set salary = salary * 1.05


    where department_id = 50;


    How It Works


    The basic design of the UPDATE statement starts with the UPDATE clause itself
    update hr.employess


    This tells Oracle what table is to have its rows updated. The SET clause then
    specifies which columns are to change and how they are to be updated—either by
    a literal value, calculation, function result, subselect, or other method.


    set salary = salary * 1.05


    In this case, we''re using a self-referencing calculation. The new SALARY value
    will be 1.05 times the existing value, relative to each row (that is, Oracle will
    perform this calculation for each row affected).


    Finally, the WHERE clause acts to provide the normal filtering predicates you''re
    already familiar with from the SELECT statement. Only those rows that match a
    DEPARTMENT_ID of 50 will be affected.


    1-8\. Updating Multiple Fields with One Statement


    Problem


    You want to change multiple columns for one or more rows of a table.


    Solution


    The update statement is designed to update as many rows as you need in one statement.
    This means you can use multiple column = value clauses in the UPDATE statement
    to change as many fields as you wish in one statement. For example, to change
    the phone number, job role, and salary of James Marlow, EMPLOYEE_ID 131, we can
    use a single UPDATE statement.


    update hr.employees


    set job_id = ''ST_MAN'',


    phone_number = ''650.124.9876'',


    salary = salary * 1.5


    where employee_id = 131;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 1 ■ THE BASICS


    How It Works


    Oracle evaluates the predicates of the UPDATE statement normally. In this case,
    it targets the row with the EMPLOYEE_ID of 131\. It then changes each field based
    on the SET criteria given. It performs this action in one pass of the row.


    Oracle also supports the grouping the columns and values for updates in parenthesis,
    in a similar fashion to other databases, but with one quirk.


    update hr.employees


    set (job_id,Phone_number,Salary)


    = (select ''ST_MAN'',''650.124.9876'',salary * 1.5 from dual)


    where employee_id = 131;


    ■ **Note** If the subquery returns no data, the values specified in the set clause
    will be set to null.'
  trans: "\n## 1-6. 批量将数据从一个表复制到另一个表\n\n### 问题\n\n你需要将多行数据从一个表复制到另一个表。\n\n### 解决方案\n\
    \n`INSERT INTO … SELECT …` 方法能够插入多行数据。关键在于 `SELECT` 语句中使用所需的条件来返回你希望插入的行。我们可以修改之前的方案来处理多行。以下是一个多行\
    \ `INSERT` 的实际示例。\n\n```sql\nselect candidate_id, first_name, last_name, email,\
    \ phone_number, sysdate, job_id, 3500, NULL, 'IT_PROG', 103\nfrom hr.candidates;\n\
    ```\n\n此方案依赖于与前一个方案中相同的 `HR.CANDIDATES` 表的存在。如果你在本地练习，请确保先创建此表。\n\n### 工作原理\n\n\
    此方案同样从 `HR.CANDIDATES` 表中选取要插入的值。由于 `SELECT` 语句部分没有 `WHERE` 子句，`CANDIDATES` 表中的所有行都将被选中，因此这些行对应的记录都将被插入到\
    \ `HR.EMPLOYEES` 表中。\n\n## 1-7. 修改行中的值\n\n### 问题\n\n你想更改表中一个或多个行的部分数据。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n第一章 ■ 基础知识\n\n### 解决方案\n\n顾名思义，`UPDATE` 语句就是用来更改数据的。针对此问题，假设我们想将部门 50 所有员工的薪资提高百分之五。下面的\
    \ `UPDATE` 语句实现了此更改：\n\n```sql\nupdate hr.employees\nset salary = salary * 1.05\n\
    where department_id = 50;\n```\n\n### 工作原理\n\n`UPDATE` 语句的基本设计以 `UPDATE` 子句本身开始\
    \ `update hr.employees`。这告诉 Oracle 要更新哪个表的行。接着，`SET` 子句指定了要更改的列以及如何更新它们——可以通过字面值、计算、函数结果、子查询或其他方法。\n\
    \n`set salary = salary * 1.05`\n\n在此例中，我们使用了一个自引用计算。新的 `SALARY` 值将是当前值的 1.05 倍，相对于每一行（也就是说，Oracle\
    \ 将为受影响的每一行执行此计算）。\n\n最后，`WHERE` 子句的作用是提供你已经从 `SELECT` 语句中熟悉的常规过滤谓词。只有那些 `DEPARTMENT_ID`\
    \ 为 50 的行会受到影响。\n\n## 1-8. 用单条语句更新多个字段\n\n### 问题\n\n你想更改表中一个或多个行的多个列。\n\n### 解决方案\n\
    \n`update` 语句设计为可以在一条语句中更新任意多行。这意味着你可以在一条 `UPDATE` 语句中使用多个 `column = value` 子句来更改任意多的字段。例如，要更改员工\
    \ James Marlow（`EMPLOYEE_ID` 为 131）的电话号码、职位和薪资，我们可以使用一条 `UPDATE` 语句。\n\n```sql\n\
    update hr.employees\nset job_id = 'ST_MAN',\n    phone_number = '650.124.9876',\n\
    \    salary = salary * 1.5\nwhere employee_id = 131;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n第一章 ■ 基础知识\n\n### 工作原理\n\nOracle 正常评估 `UPDATE` 语句的谓词。在此例中，它定位 `EMPLOYEE_ID`\
    \ 为 131 的行。然后根据给定的 `SET` 标准更改每个字段。它在对行的单次处理中完成此操作。\n\nOracle 还支持在括号中对要更新的列和值进行分组，方式与其他数据库类似，但有一个不同之处。\n\
    \n```sql\nupdate hr.employees\nset (job_id,Phone_number,Salary)\n    = (select\
    \ 'ST_MAN','650.124.9876',salary * 1.5 from dual)\nwhere employee_id = 131;\n\
    ```\n\n`注意` 如果子查询没有返回数据，set 子句中指定的值将被设置为 null。\n"
- fmt: '# 1-9. Removing Unwanted Rows from a Table


    ## Problem

    An employee has taken a job with another company and you need to remove his details
    from the `HR.EMPLOYEE` table.


    ## Solution

    Let’s assume that James Landry, `EMPLOYEE_ID` 127, has taken a job with another
    company. You can use the `DELETE` statement to remove James'' details.


    ```sql

    delete

    from hr.employees

    where employee_id = 127;

    ```


    ## How It works

    This recipe illustrates the basic `DELETE` statement, targeting the table `HR.EMPLOYEES`
    in the `FROM` clause. A `WHERE` clause provides the predicates to use to affect
    only those rows that match the specified criteria.


    It’s possible to construct the `DELETE` statement with no `WHERE` clause, in effect
    matching all rows of the table. In that case, all the table''s rows are deleted.


    ```sql

    delete

    from hr.employees;

    ```


    **Caution**: If you do run either of those `DELETE` statements, don’t forget to
    roll back if you want to continue using `HR.EMPLOYEES` data for the following
    recipes.


    # 1-10. Removing All Rows from a Table


    ## Problem

    You want to remove all of the data for a given table.


    ## Solution

    Deleting all rows from a table using the `DELETE` statement allows Oracle to fully
    log the action, so that you can roll back if you issue this statement by accident.
    But that same logging, and the time it takes, means that using the `DELETE` statement
    is sometimes too slow for the desired result.


    Oracle provides a complementary technique for removing all data from a table,
    called `TRUNCATE`. To truncate the `HR.EMPLOYEES` table, let’s use the SQL statement:


    ```sql

    truncate table hr.employees;

    ```


    ## How It Works

    No `WHERE` clause predicates or other modifiers are used when issuing the `TRUNCATE`
    statement. This statement is treated as DDL (Data Definition Language) SQL, which
    has other implications for transactions, such as implicitly committing other open
    transactions. See Chapter 9 for more details on recipes for transaction control
    and monitoring.


    Using the `TRUNCATE` command also resets the high-water mark for a table, which
    means when Oracle does optimizer calculations that include judging the effect
    of the used capacity in a table, it will treat the table as if it had never had
    data consume any space.


    # 1-11. Selecting from the Results of Another Query


    ## Problem

    You need to treat the results of a query as if they were the contents of a table.
    You don''t want to store the intermediate results as you need them freshly generated
    every time you run your query.


    ## Solution

    Oracle''s inline view feature allows a query to be included in the `FROM` clause
    of a statement, with the results referred to using a table alias.


    ```sql

    select d.department_name

    from

    (select department_id, department_name

    from hr.departments

    where location_id != 1700) d;

    ```


    The results will look like this.


    ```

    DEPARTMENT_NAME

    ---------------

    Marketing

    Human Resources

    Shipping

    IT

    Public Relations

    Sales


    6 rows selected.

    ```


    ## How It Works

    This recipe treats the results of a `SELECT` statement on the `HR.DEPARTMENTS`
    table as an inline view, giving it the name “d”. Though providing an alias in
    this case is optional, it makes for more readable, testable, and standards-compliant
    SQL. You can then refer to the results of that statement as if it were a normal
    statement in almost all ways. Here are the results of the inline view''s `SELECT`
    statement.


    ```

    DEPARTMENT_ID DEPARTMENT_NAME

    ------------- -----------------

    20 Marketing

    40 Human Resources

    50 Shipping

    60 IT

    70 Public Relations

    80 Sales


    6 rows selected.

    ```


    The inline view now acts as if you had a table, `D`, defined with this structure.


    ```

    Name                                      Null?    Type

    ----------------------------------------- -------- ----------------------------

    DEPARTMENT_ID                             NOT NULL NUMBER(4)

