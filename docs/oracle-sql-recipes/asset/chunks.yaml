    where we’re looking for DEPARTMENT_NAME values for rows where the MANAGER_ID doesn’t
    exist in the HR.EMPLOYEES table. Oracle drives the query by evaluating, for each
    row in the outer query, whether no rows are returned by the inner correlated query.
    Oracle doesn’t care what data exists in other columns not in the correlation criteria.
