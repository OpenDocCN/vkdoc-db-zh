    ## How It Works


    Don’t be daunted by the size of the SQL statement used to generate our HTML. We
    can break the statement down into four parts to make it digestible, and from there
    you’ll see how easy it is to create even more complex HTML output.


    Starting with the inline view at the end of the recipe, we query our base employee
    salary data to find several values that help craft our HTML. The SQL for our inline
    view is shown next, followed by its output if run in isolation.


    ```sql

    select employee_id, last_name, salary,

    count(*) over () as row_count,

    max(salary) over () as maxsalary

    from hr.employees

    order by salary desc

    ```


    ```

    EMPLOYEE_ID LAST_NAME SALARY ROW_COUNT MAXSALARY

    ----------- --------- ------ --------- ---------

    100 King 24000 110 24000

    101 Kochhar 17000 110 24000

    102 De Haan 17000 110 24000

    145 Russell 14010 110 24000

    146 Partners 13510 110 24000

    ...

    ```


    We select the employee’s ID, surname, and `SALARY`, and combine that with the
    analytic functions to return the total number of rows in the result set, and the
    maximum salary.


    We start using some of these values in the earlier parts of our SQL. Our recipe
    constructs the full HTML header and footer for our report using string concatenation
    of literals. It determines the right point to inject the header and footer into
    the results by evaluating the `ROWNUM` of the outer `SELECT` statement. The abbreviated
    sections of our recipe that control this are shown here.


    ```sql

    select

    case rownum

    when 1 then

    <many literal strings concatenated to form the HTML header>

    else ''''

    end ||

    ...

    case rownum

    when row_count then

    <literal strings concatenated to form the HTML footer

    else ''''

    end

    ...

    ```


    When dealing with the first result row, with `ROWNUM` of 1, for the body of the
    HTML report our recipe prefixes all of the HTML header requirements. When it encounters
    the row with a `ROWNUM` equal to the `ROW_COUNT` calculated in the inline view,
    it knows it has encountered the last row of results. At this point it appends
    the HTML footer.


    The remaining part of our recipe is the section that builds the table rows with
    colored bars to represent the comparative salary levels. This section of the `SELECT`
    statement is shown next.


    ```sql

    ...

    ''<tr><td class="right">'' || to_char(employee_id) || ''</td>'' || chr(10) ||

    ''<td class="left">'' || last_name || ''</td>'' || chr(10) ||

    ''<td class="left">'' ||

    ''<table class="inner">'' || chr(10) ||

    ''<tr> <td class="bar" width="'' ||

    to_char(round(100 * salary / maxsalary)) ||

    ''%">'' || chr(38) || ''nbsp;</td>'' || chr(10) ||

    ```


    The resultant text is the entire HTML page required to produce the web page. A
    short sample looks like the following text block:


