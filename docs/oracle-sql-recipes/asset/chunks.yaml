- fmt: "# 20-7. 显示对象大小\n\n## 问题\n\n你希望主动运行一个报告，显示数据库中哪些表和索引占用了最多的空间。\n\n## 解决方案\n\n\
    以下是一个典型的脚本，用于显示数据库中占用空间最大的对象（表和索引）：\n\n```sql\nselect * from\n(\n  select\n  \
    \  segment_name\n    ,partition_name\n    ,segment_type\n    ,owner\n    ,bytes/1024/1024\
    \ mb\n  from dba_segments\n  order by bytes desc)\nwhere rownum <=20;\n```\n\n\
    以下是一些示例输出：\n\n```\nSEGMENT_NAME        PARTITION_NAME  SEGMENT_TYPE       OWNER\
    \           MB\n------------------- --------------- ------------------ ---------------\
    \ ----------\n_SYSSMU1$           TYPE2           UNDO               SYS     \
    \        18481.4375\nCIA_DOWNLOADS                       TABLE              CIA\
    \             7868\nREG_QUEUE_REP                        TABLE              REP_MV\
    \          6874\nF_DOWNLOADS        DOWN_P_7        TABLE PARTITION     STAR2\
    \           3180\nF_DOWNLOADS_IDX1                    INDEX              CIA_STAR\
    \        2927\n```\n\n## 工作原理\n\n有时在排查磁盘空间问题时，查看哪些对象（表和索引）消耗了最多的存储空间是很有用的。解决方案部分中的脚本使用一个内联视图，先选择数据库中的所有段，并按\
    \ `BYTES` 列降序排序。外部查询然后将输出限制为数据库中占用空间最大的前二十个对象。\n\n如果你有兴趣查看哪些对象在哪些数据文件中占用空间，你需要查询\
    \ `DBA_DATA_FILES` 视图。下面列出了一个脚本，它会提示你输入所有者，然后显示表以及相关数据文件中消耗的空间：\n\n```sql\nselect\n\
    \  a.table_name\n  ,b.tablespace_name\n  ,b.partition_name\n  ,c.file_name\n \
    \ ,sum(b.bytes)/1024/1024 mb\nfrom dba_tables a\n  ,dba_extents b\n  ,dba_data_files\
    \ c\nwhere a.owner = upper('&owner')\n  and a.owner = b.owner\n  and a.table_name\
    \ = b.segment_name\n  and b.file_id = c.file_id\ngroup by\n  a.table_name\n  ,b.tablespace_name\n\
    \  ,b.partition_name\n  ,c.file_name\norder by a.table_name, b.tablespace_name;\n\
    ```\n\n# 20-8. 监控索引使用情况\n\n## 问题\n\n你希望移除数据库中未被使用的任何索引。你需要一个关于索引是否正在被使用的简单“是”或“否”的答案。\n\
    \n## 解决方案\n\n使用 `ALTER INDEX...MONITORING USAGE` 语句来启用基本的索引监控。以下示例在名为 `F_DOWN_DOM_FK9`\
    \ 的索引上启用索引监控：\n\n```sql\nalter index F_DOWN_DOM_FK9 monitoring usage;\n```\n\n\
    从此时起，第一次访问该索引时，Oracle 会记录这一点，并可以通过 `V$OBJECT_USAGE` 视图查看。要报告哪些被监控的索引曾被使用过，运行此查询：\n\
    \n```sql\nselect * from v$object_usage;\n```\n\n很可能你不会只监控一个索引。相反，你可能希望监控某个用户的所有索引。在这种情况下，使用\
    \ SQL 生成 SQL 来创建一个你可以运行的脚本，以打开对所有索引的监控。下面就是一个这样的脚本：\n\n```sql\nselect 'alter index\
    \ ' || index_name || ' monitoring usage;'\nfrom user_indexes;\n```\n\n## 工作原理\n\
    \n`V$OBJECT_USAGE` 视图只显示当前连接用户的信息。如果你检查 `DBA_VIEWS` 的 `TEXT` 列，会注意到以下一行：\n\n`where\
    \ io.owner# = userenv('SCHEMAID')`\n\n如果你以 DBA 账户登录，并想查看所有已启用监控的索引的状态（无论用户是谁），请执行此查询：\n\
    \n```sql\nselect io.name, t.name,\n       decode(bitand(i.flags, 65536), 0, 'NO',\
    \ 'YES'),\n       decode(bitand(ou.flags, 1), 0, 'NO', 'YES'),\n       ou.start_monitoring,\n\
    \       ou.end_monitoring\nfrom sys.obj$ io, sys.obj$ t, sys.ind$ i, sys.object_usage\
    \ ou\nwhere i.obj# = ou.obj#\n  and io.obj# = ou.obj#\n  and t.obj# = i.bo#;\n\
    ```\n\n# 20-9. 审计对象使用情况\n\n## 问题\n\n你想知道数据库中哪些表实际正在被使用。\n\n## 解决方案\n\n使用数据库审计来确定对象是否正被\
    \ `SELECT`、`INSERT`、`UPDATE` 和 `DELETE` 语句访问。按照以下步骤启用和使用数据库审计：\n\n1."
  raw: '20-7\. Showing Object Sizes


    Problem


    You want to proactively run a report that shows which tables and indexes are consuming
    the most space in your database.


    Solution


    Here is a typical script that shows the top space-consuming objects (tables and
    indexes) in the database: select * from


    (


    select


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    segment_name


    ,partition_name


    ,segment_type


    ,owner


    ,bytes/1024/1024 mb


    from dba_segments


    order by bytes desc)


    where rownum <=20;


    Here is some sample output:


    SEGMENT_NAME PARTITION_NAME SEGMENT_TYPE OWNER MB


    ------------------------- --------------- ------------------ --------- ----------


    _SYSSMU1$ TYPE2 UNDO SYS 18481.4375


    CIA_DOWNLOADS TABLE CIA 7868


    REG_QUEUE_REP TABLE REP_MV 6874


    F_DOWNLOADS DOWN_P_7 TABLE PARTITION STAR2 3180


    F_DOWNLOADS_IDX1 INDEX CIA_STAR 2927


    How It Works


    Sometimes when you’re troubleshooting disk space issues, it’s useful to view which
    objects (tables and indexes) are consuming the most storage. The script in the
    solution section uses an inline view to first select all segments in the database
    and order them by the BYTES column in descending order. The outer query then limits
    the output to the top twenty space-consuming objects in the database.


    If you’re interested in seeing information such as which objects are consuming
    space in which datafiles, you’ll need to query the DBA_DATA_FILES view. Listed
    next is a script that prompts you for an owner and then displays tables and the
    space consumed in the associated datafiles: select


    a.table_name


    ,b.tablespace_name


    ,b.partition_name


    ,c.file_name


    ,sum(b.bytes)/1024/1024 mb


    from dba_tables a


    ,dba_extents b


    ,dba_data_files c


    where a.owner = upper(''&owner'')


    and a.owner = b.owner


    and a.table_name = b.segment_name


    and b.file_id = c.file_id


    group by


    a.table_name


    ,b.tablespace_name


    ,b.partition_name


    ,c.file_name


    order by a.table_name, b.tablespace_name;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    20-8\. Monitoring Index Usage


    Problem


    You want to remove any indexes that aren’t being used in your database. You need
    a simple yes or no answer as to whether an index is being used.


    Solution


    Use the ALTER INDEX...MONITORING USAGE statement to enable basic index monitoring.
    The following example enables index monitoring on an index named F_DOWN_DOM_FK9:


    alter index F_DOWN_DOM_FK9 monitoring usage;


    From this point on, the first time the index is accessed, Oracle will record this
    and it can be viewed via the V$OBJECT_USAGE view. To report which indexes are
    being monitored and have ever been used, run this query:


    select * from v$object_usage;


    Most likely you’re not going to monitor only only one index. Rather, you’re going
    to want to monitor all indexes for a user. In this situation, use SQL to generate
    SQL to create a script you can run to turn on monitoring for all indexes. Here
    is such a script:


    select ''alter index '' || index_name || '' monitoring usage;''


    from user_indexes;


    How It Works


    The V$OBJECT_USAGE view will only show information for the currently connected
    user. If you inspect the TEXT column of DBA_VIEWS, you’ll notice the following
    line:


    where io.owner# = userenv(''SCHEMAID'')


    If you’re logged in as a DBA account and want to view the status of all indexes
    that have monitoring enabled (regardless of the user), execute this query:


    select io.name, t.name,


    decode(bitand(i.flags, 65536), 0, ''NO'', ''YES''),


    decode(bitand(ou.flags, 1), 0, ''NO'', ''YES''),


    ou.start_monitoring,


    ou.end_monitoring


    from sys.obj$ io, sys.obj$ t, sys.ind$ i, sys.object_usage ou


    where i.obj# = ou.obj#


    and io.obj# = ou.obj#


    and t.obj# = i.bo#;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    20-9\. Auditing Object Usage


    Problem


    You wonder which tables in your database are actually being used.


    Solution


    Use database auditing to determine if an object is being accessed by SELECT, INSERT,
    UPDATE, and DELETE


    statements. Follow these steps to enable and use database auditing:


    1.'
  trans: "\n# 20-7. 显示对象大小\n\n## 问题\n\n你希望主动运行一个报告，显示数据库中哪些表和索引占用了最多的空间。\n\n## 解决方案\n\
    \n以下是一个典型的脚本，用于显示数据库中占用空间最大的对象（表和索引）：\n\n```sql\nselect * from\n(\n  select\n\
    \    segment_name\n    ,partition_name\n    ,segment_type\n    ,owner\n    ,bytes/1024/1024\
    \ mb\n  from dba_segments\n  order by bytes desc)\nwhere rownum <=20;\n```\n\n\
    以下是一些示例输出：\n\n```\nSEGMENT_NAME        PARTITION_NAME  SEGMENT_TYPE       OWNER\
    \           MB\n------------------- --------------- ------------------ ---------------\
    \ ----------\n_SYSSMU1$           TYPE2           UNDO               SYS     \
    \        18481.4375\nCIA_DOWNLOADS                       TABLE              CIA\
    \             7868\nREG_QUEUE_REP                        TABLE              REP_MV\
    \          6874\nF_DOWNLOADS        DOWN_P_7        TABLE PARTITION     STAR2\
    \           3180\nF_DOWNLOADS_IDX1                    INDEX              CIA_STAR\
    \        2927\n```\n\n## 工作原理\n\n有时在排查磁盘空间问题时，查看哪些对象（表和索引）消耗了最多的存储空间是很有用的。解决方案部分中的脚本使用一个内联视图，先选择数据库中的所有段，并按\
    \ `BYTES` 列降序排序。外部查询然后将输出限制为数据库中占用空间最大的前二十个对象。\n\n如果你有兴趣查看哪些对象在哪些数据文件中占用空间，你需要查询\
    \ `DBA_DATA_FILES` 视图。下面列出了一个脚本，它会提示你输入所有者，然后显示表以及相关数据文件中消耗的空间：\n\n```sql\nselect\n\
    \  a.table_name\n  ,b.tablespace_name\n  ,b.partition_name\n  ,c.file_name\n \
    \ ,sum(b.bytes)/1024/1024 mb\nfrom dba_tables a\n  ,dba_extents b\n  ,dba_data_files\
    \ c\nwhere a.owner = upper('&owner')\n  and a.owner = b.owner\n  and a.table_name\
    \ = b.segment_name\n  and b.file_id = c.file_id\ngroup by\n  a.table_name\n  ,b.tablespace_name\n\
    \  ,b.partition_name\n  ,c.file_name\norder by a.table_name, b.tablespace_name;\n\
    ```\n\n# 20-8. 监控索引使用情况\n\n## 问题\n\n你希望移除数据库中未被使用的任何索引。你需要一个关于索引是否正在被使用的简单“是”或“否”的答案。\n\
    \n## 解决方案\n\n使用 `ALTER INDEX...MONITORING USAGE` 语句来启用基本的索引监控。以下示例在名为 `F_DOWN_DOM_FK9`\
    \ 的索引上启用索引监控：\n\n```sql\nalter index F_DOWN_DOM_FK9 monitoring usage;\n```\n\n\
    从此时起，第一次访问该索引时，Oracle 会记录这一点，并可以通过 `V$OBJECT_USAGE` 视图查看。要报告哪些被监控的索引曾被使用过，运行此查询：\n\
    \n```sql\nselect * from v$object_usage;\n```\n\n很可能你不会只监控一个索引。相反，你可能希望监控某个用户的所有索引。在这种情况下，使用\
    \ SQL 生成 SQL 来创建一个你可以运行的脚本，以打开对所有索引的监控。下面就是一个这样的脚本：\n\n```sql\nselect 'alter index\
    \ ' || index_name || ' monitoring usage;'\nfrom user_indexes;\n```\n\n## 工作原理\n\
    \n`V$OBJECT_USAGE` 视图只显示当前连接用户的信息。如果你检查 `DBA_VIEWS` 的 `TEXT` 列，会注意到以下一行：\n\n`where\
    \ io.owner# = userenv('SCHEMAID')`\n\n如果你以 DBA 账户登录，并想查看所有已启用监控的索引的状态（无论用户是谁），请执行此查询：\n\
    \n```sql\nselect io.name, t.name,\n       decode(bitand(i.flags, 65536), 0, 'NO',\
    \ 'YES'),\n       decode(bitand(ou.flags, 1), 0, 'NO', 'YES'),\n       ou.start_monitoring,\n\
    \       ou.end_monitoring\nfrom sys.obj$ io, sys.obj$ t, sys.ind$ i, sys.object_usage\
    \ ou\nwhere i.obj# = ou.obj#\n  and io.obj# = ou.obj#\n  and t.obj# = i.bo#;\n\
    ```\n\n# 20-9. 审计对象使用情况\n\n## 问题\n\n你想知道数据库中哪些表实际正在被使用。\n\n## 解决方案\n\n使用数据库审计来确定对象是否正被\
    \ `SELECT`、`INSERT`、`UPDATE` 和 `DELETE` 语句访问。按照以下步骤启用和使用数据库审计：\n\n1.\n"
- fmt: "## 启用审计\n\n通过将 `AUDIT_TRAIL` 初始化参数设置为有效值（例如 `DB`）来在数据库上启用审计。如果您使用的是 SPFILE，则使用\
    \ `ALTER SYSTEM` 语句设置 `AUDIT_TRAIL` 参数：\n```sql\nSQL> alter system set audit_trail=db\
    \ scope=spfile;\n```\n如果您使用的是 `init.ora` 文件，请用文本编辑器打开它并将其值设置为 `DB`（有关 `AUDIT_TRAIL`\
    \ 参数有效值的描述，请参见表 20-3）：\n```\nAUDIT_TRAIL=DB\n```\n\n**表 20-3. `AUDIT_TRAIL` 的有效设置**\n\
    \n| 设置 | 含义 |\n| --- | --- |\n| `DB` | 启用审计并将 `SYS.AUD$` 表设置为审计存储库。 |\n| `DB,\
    \ EXTENDED` | 启用审计并将 `SYS.AUD$` 表设置为审计存储库，同时包含 `SQLTEXT` 和 `SQLBIND` 列。 |\n| `OS`\
    \ | 启用审计并指定操作系统文件将存储审计信息。 |\n| `XML` | 启用审计并将审计记录以 XML 格式写入操作系统文件。 |\n| `XML,\
    \ EXTENDED` | 启用审计并将审计记录以 XML 格式写入操作系统文件，包括 `SqlText` 和 `SqlBind` 的值。 |\n| `NONE`\
    \ | 禁用数据库审计。 |\n\n2.  接下来，停止并启动您的数据库。\n```sql\nSQL> shutdown immediate;\n\nSQL>\
    \ startup;\n\nSQL> show parameter audit_trail;\n```\n```\nNAME               \
    \                  TYPE        VALUE\n------------------------------------ -----------\
    \ ------------------------------\naudit_trail                          string\
    \      DB\n```\n3.  现在，您可以按对象、权限或语句启用审计。例如，以下语句对 `INV_MGMT` 用户拥有的 `EMP` 表上的所有\
    \ DML 访问启用审计：\n```sql\nSQL> audit select, insert, update, delete on inv_mgmt.emp;\n\
    ```\n4.  从此时起，对 `INV_MGMT.EMP` 表的任何 DML 访问都将被记录在 `SYS.AUD$` 表中。您可以使用类似以下的查询来报告对表的\
    \ DML 访问：\n```sql\nselect\n  username\n  ,obj_name\n  ,timestamp\n  ,substr(ses_actions,4,1)\
    \ del\n  ,substr(ses_actions,7,1) ins\n  ,substr(ses_actions,10,1) sel\n  ,substr(ses_actions,11,1)\
    \ upd\nfrom dba_audit_object;\n```\n要关闭对某个对象的审计，请使用 `NOAUDIT` 语句：\n```sql\nSQL>\
    \ noaudit select, insert, update, delete on inv_mgmt.inv;\n```\n您应定期清理 `AUD$`\
    \ 表，以免其在 `SYSTEM` 表空间中占用过多空间。如果您需要保存 `AUD$` 数据，可以先导出该表，然后使用 `TRUNCATE` 命令删除记录。\n\
    \n> **提示：** 如果您想将 `AUD$` 表移动到非 `SYSTEM` 表空间，请参阅 My Oracle Support (MetaLink) 笔记\
    \ 72460.1 以获取说明。\n\n## 工作原理\n\nOracle 审计是一项强大的功能，允许您确定针对表正在执行何种类型的 SQL 活动。例如，您可能希望确定哪些表正在被使用或未被使用。如果一个表未被使用，您可能希望重命名然后删除该表。审计允许您捕获用于访问表的\
    \ SQL 语句类型。\n\n在解决方案的第 4 步中，我们使用 `SUBSTR` 函数来引用 `DBA_AUDIT_OBJECT` 视图的 `SES_ACTIONS`\
    \ 列。该列包含一个 16 个字符的字符串，其中每个字符表示某个特定操作已发生。这 16 个字符按以下顺序代表以下操作：`ALTER`、`AUDIT`、`COMMENT`、`DELETE`、`GRANT`、`INDEX`、`INSERT`、`LOCK`、`RENAME`、`SELECT`、`UPDATE`、`REFERENCES`\
    \ 和 `EXECUTE`。\n\n位置 14、15 和 16 由 Oracle 保留以供将来使用。字符 `S` 表示成功，`F` 表示失败，`B` 表示成功和失败。\n\
    \n一旦您确定了未使用的表，您可以简单地重命名这些表，看看这是否会破坏应用程序或是否有任何用户投诉。如果没有投诉，那么一段时间后您可以考虑删除这些表。在删除任何您以后可能需要恢复的表之前，请确保使用\
    \ `RMAN` 和 Data Pump 对数据库进行了良好的备份。"
  raw: 'Enable auditing on the database by setting the AUDIT_TRAIL initialization
    parameter to a valid value such as DB. If you are using an SPFILE, then set the
    AUDIT_TRAIL parameter with the ALTER SYSTEM statement:


    SQL> alter system set audit_trail=db scope=spfile;


    If you are using an init.ora file, open it with a text editor and set the value
    to DB (see Table 20-3 for a description of valid values for the AUDIT_TRAIL


    parameter):


    AUDIT_TRAIL=DB


    ***Table 20-3.** Valid AUDIT_TRAILSettings*


    **Setting Meaning**


    DB


    Enables auditing and sets the SYS.AUD$ table as the audit repository.


    DB, EXTENDED


    Enables auditing and sets the SYS.AUD$ table as the audit repository and includes
    the SQLTEXT and SQLBIND columns.


    OS


    Enables auditing and specifies that an operating system file will store auditing
    information.


    XML


    Enables auditing and writes audit records in XML format to an OS file.


    XML, EXTENDED


    Enables auditing and writes audit records in XML format to an OS file including
    values for SqlText and SqlBind.


    NONE


    Disables database auditing.


    2.


    Next, stop and start your database.


    SQL> shutdown immediate;


    SQL> startup;


    SQL> show parameter audit_trail;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    NAME TYPE VALUE


    ------------------------------------ ----------- ------------------------------


    audit_trail string DB


    3\. Now you can enable auditing by object, privilege, or statement. For example,
    the following statement enables auditing on all DML access to the EMP table owned
    by INV_MGMT:


    SQL> audit select, insert, update, delete on inv_mgmt.emp;


    4\. From this point on, any DML access to the INV_MGMT.EMP table will be recorded
    in the SYS.AUD$ table. You can use a query such as this to report on DML access
    to a table:


    select


    username


    ,obj_name


    ,timestamp


    ,substr(ses_actions,4,1) del


    ,substr(ses_actions,7,1) ins


    ,substr(ses_actions,10,1) sel


    ,substr(ses_actions,11,1) upd


    from dba_audit_object;


    To turn off auditing on an object, use the NOAUDIT statement:


    SQL> noaudit select, insert, update, delete on inv_mgmt.inv;


    You should periodically purge the AUD$ table so that it doesn’t consume inordinate
    amounts of space in your SYSTEM tablespace. If you need to save the AUD$ data,
    you can first export the table and then use the TRUNCATE command to remove records.


    ■ **Tip** If you want to move the AUD$ table to a non-SYSTEM tablespace, refer
    to My Oracle Support (MetaLink) note 72460.1 for instructions.


    How It Works


    Oracle auditing is a powerful feature that allows you to determine what types
    of SQL activities are occurring against a table. For example, you may want to
    determine which tables are being used or not. If a table is not being used, you
    may want to rename and then drop the table. Auditing allows you to capture the
    types of SQL statements being used to access a table.


    In step 4 of the solution we use the SUBSTR function to reference the SES_ACTIONS
    column of the DBA_AUDIT_OBJECT view. That column contains a 16-character string
    in which each character means that a certain operation has occurred. The 16 characters
    represent the following operations in this order: ALTER, AUDIT, COMMENT, DELETE,
    GRANT, INDEX, INSERT, LOCK, RENAME, SELECT, UPDATE, REFERENCES, and EXECUTE.


    Positions 14, 15, and 16 are reserved by Oracle for future use. The character
    of S represents success, F


    represents failure, and B represents both success and failure.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    Once you have identified tables that are not being used, you can simply rename
    the tables and see if this breaks the application or if any users complain. If
    there are no complaints, then after some time you can consider dropping the tables.
    Make sure you take a good backup of your database with both RMAN


    and Data Pump before you drop any tables you might have to later recover.'
