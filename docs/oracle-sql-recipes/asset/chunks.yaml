  trans: "\n# 第 12 章 ■ 数据清洗\n\n## 12-2. 删除重复行\n\n### 问题\n你想要从表中删除重复的行。\n\n### 解决方案\n\
    使用关联子查询从表中删除重复行。以下示例从 `PARTIES` 表中删除 `PARTY_ID` 列上存在重复值的重复行：\n\n```\ndelete from\
    \ parties a\nwhere a.rowid <\n    (select max(b.rowid)\n       from parties b\n\
    \      where a.party_id = b.party_id);\n```\n\n在执行这样的删除语句之前，你应该先运行一个类似于配方 12-1\
    \ 的查询，以确定将有多少数据会被删除。\n\n### 工作原理\n数据库中的每一行都有一个唯一的 `ROWID`。解决方案部分中的 `DELETE` 语句将任意删除所有具有相同\
    \ `PARTY_ID` 的行，只保留 `ROWID` 最高的那一行。\n\n如果你的唯一标识符由多个列组成，请在关联子查询的 `WHERE` 子句中使用所有这些列。例如，如果你的逻辑主键由\
    \ `FIRST_NAME` 和 `LAST_NAME` 组成，请执行以下 SQL 语句来删除重复项：\n\n```\ndelete from parties\
    \ a\nwhere a.rowid <\n    (select max(b.rowid)\n       from parties b\n      where\
    \ a.first_name = b.first_name\n        and a.last_name = b.last_name);\n```\n\n\
    接下来列出的是本配方解决方案部分中 SQL 的一个轻微变体：\n\n```\ndelete from parties\n where rowid not in\n\
    \    (select max(rowid)\n       from parties\n      group by party_id);\n```\n\
    \n使用此查询还是前一个查询，取决于 SQL 编码偏好。如果你为每个查询生成执行计划，你会注意到两者在成本上差异不大。\n\n## 12-3. 判断数据是否可以作为数值加载\n\
    \n### 问题\n你有一个在旧系统中被定义为字符串的字段，但在新数据库中将迁移到数值型字段。你已经将数据加载到一个临时的暂存表中，并且想要确定是否有任何字符数据无法干净地转换为数值数据类型。\n\
    \n### 解决方案\n你需要创建一个小的 PL/SQL 函数：\n\n```\ncreate or replace function isnum(v_in\
    \ varchar2)\nreturn varchar is\n  val_err exception;\n  pragma exception_init(val_err,\
    \ -6502); -- 字符到数字转换错误\n  scrub_num number;\nbegin\n  scrub_num := to_number(v_in);\n\
    \  return 'Y';\nexception\n  when val_err then\n    return 'N';\nend;\n/\n```\n\
    \n如果传入 `ISNUM` 函数的值是一个数字，则返回 `Y`。如果该值无法转换为数字，则返回 `N`。\n\n### 工作原理\n你可以使用 `ISNUM`\
    \ 函数来检测列中的数据是否为数值。该函数为 `ORA-06502` 字符到数字转换错误定义了一个 PL/SQL 预编译异常。当遇到此错误时，异常处理程序会捕获它并返回\
    \ `N`。\n\n你可以使用此函数来判断一个字符是否能转换为数字。例如，假设你有一个名为 `STAGE` 的表，其中包含一个名为 `HOLD_COL` 的列，其值如下：\n\
    \n```\nHOLD_COL\n------------------------------\n1\nc\n3\n$\n```\n"
- fmt: "# 数据清洗技术笔记\n\n## 1032.22\n\n**32423432234234432x**\n\n以下查询使用 `ISNUM` 函数来判断表中是否存在非数值数据：\n\
    \n`select hold_col from stage where isnum(hold_col)='N';`\n\n预期输出如下：\n\n`HOLD_COL`\n\
    `------------------------------`\n`c`\n`$`\n`32423432234234432x`\n\n## 12-4. 判断数据是否能作为日期加载\n\
    \n### 问题\n旧系统中定义为字符串的字段，在新数据库中将迁移到日期数据类型。数据已加载到临时暂存表中，需要确定是否有字符数据无法干净地转换为日期数据类型。\n\
    \n### 解决方案\n需要创建一个小型 PL/SQL 函数：\n\n```\ncreate or replace function isdate(p_in\
    \ varchar2, f_in varchar2)\nreturn varchar is\n  scrub_dt date;\nbegin\n  scrub_dt\
    \ := to_date(p_in, f_in);\n  return 'Y';\nexception when others then\n  return\
    \ 'N';\nend;\n/\n```\n\n`ISDATE` 函数接受两个值：字符数据和日期格式掩码。如果传入函数的值是有效日期，则返回 `Y`。如果无法转换为日期，则返回\
    \ `N`。\n\n### 工作原理\n`ISDATE` 函数可用于检测列中的字符数据是否有效。例如，假设有一个名为 `STAGE` 的表，其中包含一个名为\
    \ `HOLD_COL` 的列，其值如下：\n\n`HOLD_COL`\n`------------------------------`\n`20090130`\n\
    `20090132`\n`20090229`\n`20091430`\n`20090330`\n\n以下查询使用 `ISDATE` 函数判断是否有字符数据不符合\
    \ `YYYYMMDD` 日期格式：\n\n`select hold_col`\n`from stage`\n`where isdate(hold_col,'YYYYMMDD')\
    \ = 'N';`\n\n无法映射到有效日期的值如下：\n\n`HOLD_COL`\n`------------------------------`\n\
    `20090132`\n`20090229`\n`20091430`\n\n## 12-5. 执行大小写不敏感查询\n\n### 问题\n已加载大量大小写混合的数据。希望查询时如同数据全是小写（或全是大写）。\n\
    \n### 解决方案\n如果使用的是 Oracle Database 10 *g* 或更高版本，可以使用 `ALTER SESSION` 语句来启用大小写不敏感的\
    \ `>`、`<` 和 `=` 比较运算符。要启用大小写不敏感搜索，需修改 `NLS_SORT` 和 `NLS_COMP` 参数：\n\n`alter session\
    \ set nls_sort=binary_ci;`\n`alter session set nls_comp=linguistic;`\n\n这些设置允许进行大小写不敏感的搜索。可以运行以下查询来选择所有\
    \ `john` 值（不区分大小写）：\n\n`select * from parties where first_name = 'john';`\n\n\
    `FIRST_NAME`\n`------------------------------`\n`John`\n`JOHN`\n`john`\n\n###\
    \ 工作原理\n在 Oracle Database 10 *g* 之前，必须使用 `UPPER` 或 `LOWER` SQL 函数来执行大小写不敏感的搜索，例如：\n\
    \n`select * from parties where upper(first_name) = 'JOHN';`\n\n■ **提示**：Oracle\
    \ 不会访问对列应用了 SQL 函数的索引。为了解决这个问题，可以创建基于函数的索引。\n\n其他确保搜索中不受大小写影响的常用技术包括：\n\n- 使用触发器强制字符串以全大写或全小写插入。\n\
    - 在表中添加一列，用于存储该字符串的全大写或全小写版本。\n\n在 Oracle Database 10 *g* 或更高版本中，将 `NLS_SORT`\
    \ 设置为 `BINARY_CI` 并将 `NLS_COMP` 设置为 `LINGUISTIC` 的组合会指示 SQL 在比较操作时忽略大小写。`NLS_SORT`\
    \ 参数确定字符数据的排序类型。`NLS_SORT` 设置为 `BINARY_CI` 表示排序行为不区分大小写。`NLS_COMP` 参数影响 SQL 操作的行为。将\
    \ `NLS_COMP` 设置为 `LINGUISTIC` 会指示 SQL 执行值的语言学比较。"
