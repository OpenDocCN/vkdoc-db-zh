    ## 工作原理


    本示例中的问题和解决方案看起来有点刻意，但这只是因为我们希望使用任何 Oracle 安装中都提供的 `HR.EMPLOYEES` 表。此外，一些员工的姓氏和名字中包含空格，这会在系统管理员尝试创建目录时引起
    Linux 的抱怨。要解决这个问题，只需添加一个对 `TRANSLATE` 函数的调用以删除所有出现的空格字符。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### 第 13 章 ■ 树形结构数据


    本解决方案使用了许多层次查询特性，就像前一个示例一样。在 `employees` 表中，`MANAGER_ID` 列是员工经理所在行的外键。因此，这是 `SELECT`
    语句这部分的要求：

    ```sql

    connect by prior employee_id = manager_id

    ```

    `CONNECT BY` 子句引入了链接根节点、父节点和子节点行的条件。在此示例中，`CONNECT BY` 子句将当前行中的 `MANAGER_ID` 连接到父行中的
    `EMPLOYEE_ID`。您可以重写该子句如下，产生相同的结果：`connect by manager_id = prior employee_id`


    您通常只使用一个 `PRIOR` 操作符，但如果链接条件跨越多个列，则可以在 `CONNECT BY` 子句中使用多个 `PRIOR` 操作符。您也可以像本章第一个示例中所做的那样，使用过滤条件来限制结果集中的行。


    您很少会省略 `PRIOR` 操作符，因为这是 Oracle 链接父行和子行的方式。在某些情况下，您可以省略 `PRIOR` 操作符而只保留一个过滤条件，正如您将在本章后面的一个示例中看到的那样。


    该查询使用 `START WITH` 来指示层次结构中的起始点。如果某个员工没有经理（通常是老板或所有者），则 `MANAGER_ID` 列为 `NULL`，因此
    `START WITH MANAGER_ID IS NULL` 给了我们想要的结果。但是，您也可以根据表中任何其他列的值从层次结构中的任何位置开始。在此示例中，您只想显示
    Neena Kochhar 及其下属员工的层次结构：

    ```sql

    select

    sys_connect_by_path(lower(last_name)||''.''||lower(first_name),''/'') mgmt_path
    from employees

    start with last_name = ''Kochhar''

    connect by prior employee_id = manager_id

    ;


    MGMT_PATH

