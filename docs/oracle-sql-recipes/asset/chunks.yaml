    13-3\. Generating Pathnames from Hierarchical Tables


    Problem


    The Linux system administrator is creating directory structures in the file system
    that match the management structure of the company, and suspects that the DBA
    can help her out by accessing the hierarchical features of Oracle to save time
    when creating the directory structure for the first time.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13 ■ TREE-STRUCTURED DATA


    Solution


    Use the SYS_CONNECT_BY_PATH operator in a hierarchical query against the EMPLOYEES
    table. Here’s an example of how to do that:


