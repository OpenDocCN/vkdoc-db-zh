    Most staff have had only one job, five have held two positions, and three have
    held three positions each.


    ## How It Works


    The key to our recipe is the flexibility of the `COUNT` function, which can be
    used for far more than just physically counting the number of rows in a table.
    You can count anything you can represent in a `result`.


    This means you can count derived data, inferred data, and transient calculations
    and determinations.


    Our recipe uses nested subselects and counts at two levels, and is best understood
    starting from the inside and working out.


    We know an employee’s current position is tracked in the `HR.EMPLOYEES` table,
    and that each instance of previous positions with the organization is recorded
    in the `HR.JOB_HISTORY` table. We can’t just count the entries in `HR.JOB_HISTORY`
    and add one for the employees’ current positions, because staff who have never
    changed jobs don’t have an entry in `HR.JOB_HISTORY`.


    Instead, we perform a `UNION ALL` of the `EMPLOYEE_ID` values across both `HR.EMPLOYEES`
    and `HR.JOB_HISTORY`, building a basic result set that repeats an `EMPLOYEE_ID`
    for every position an employee has held. Partial results of just the inner `UNION
    ALL` statement are shown here to help you follow the logic.


    `EMPLOYEE_ID`


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA**


    …


    ### Union vs. Union All


    It’s useful to remember the difference between `UNION` and `UNION ALL`. `UNION`
    will remove duplicate entries in result sets (and perform a sort on the data as
    part of deduplication), whereas `UNION ALL` preserves all values in all source
    sets, even the duplicates. In our recipe, the use of `UNION` would have resulted
    in a count of one job for every employee, regardless of how many promotions or
    jobs they’d actually had.


    You’ll be pleased to know `UNION` operators are useful ingredients for many recipes
    in other chapters of the book.


    The next subselect aggregates and groups the values derived in our innermost subselect,
    counting the occurrences of each `EMPLOYEE_ID` to determine how many jobs each
    person has held. This is the first point where we use the `COUNT` function on
    the results of another query, rather than raw data in a table.


    Partial output at this subselect would look like this.


    `EMPLOYEE_ID JOBSHELD`


    `----------- ----------`


    `100 1`


    `101 3`


    `102 2`


    `103 1`


    `104 1`


    …


    Our outermost query also performs straightforward aggregation and grouping, once
    again employing the `COUNT` function on the results of a subselect—which itself
    was producing counts of derived data.


    ## 2-8. Finding Duplicates and Unique Values in a Table


    ### Problem


    You need to test if a given data value is unique in a table—that is, it appears
    only once.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA**


    ### Solution


    Oracle supports the standard `HAVING` clause for `SELECT` statements, and the
    `COUNT` function, which together can identify single instances of data in a table
    or result. The following `SELECT` statement solves the problem of finding if the
    surname Fay is unique in the `HR.EMPLOYEES` table.


    ```sql

    select last_name, count(*)

    from hr.employees

    where last_name = ''Fay''

    group by last_name

    having count(*) = 1;

    ```


    With this recipe, we receive these results:


    `LAST_NAME COUNT(*)`


    `------------------------- ----------`


    `Fay 1`


    Because there is exactly one `LAST_NAME` value of `Fay`, we get a count of 1 and
    therefore see results.


    ### How It Works


    Only unique combinations of data will group to a count of 1. For instance, we
    can test if the surname King is unique:


    ```sql

    select last_name, count(*)

    from hr.employees

    where last_name = ''King''

    group by last_name

    having count(*) = 1;

    ```


    This statement returns no results, meaning that the count of people with a surname
    of `King` is not 1; it’s some other number like 0, 2, or more. The statement first
    determines which rows have a `LAST_NAME` value of `King`. It then groups by `LAST_NAME`
    and counts the hits encountered. Lastly, the `HAVING` clause tests to see if the
    count of rows with a `LAST_NAME` of `King` was equal to 1. Only those results
    are returned, so a surname is unique only if you see a result.


    If we remove the `HAVING` clause as in the next `SELECT` statement, we’ll see
    how many Kings are in the `HR.EMPLOYEES` table.


    ```sql

    select last_name, count(*)

    from hr.employees

    where last_name = ''King''

    group by last_name;

    ```


    `LAST_NAME COUNT(*)`


    `------------------------- ----------`


    `King 2`


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA**


    Two people have a surname of `King`, thus it isn’t unique and didn’t show up in
    our test for uniqueness.


    The same technique can be extended to test for unique combinations of columns.
    We can expand our recipe to test if someone’s complete name, based on the combination
    of `FIRST_NAME` and `LAST_NAME`, is unique. This `SELECT` statement includes both
    columns in the criteria, testing to see if Lindsey Smith is a unique full name
    in the `HR.EMPLOYEES` table.


    ```sql

    select first_name, last_name, count(*)

    from hr.employees

    where first_name = ''Lindsey''

    and last_name = ''Smith''

    group by first_name, last_name

    having count(*) = 1;

    ```


    `FIRST_NAME LAST_NAME COUNT(*)`


    `-------------------- ------------------------- ----------`


    `Lindsey Smith 1`


    You can write similar recipes that use string concatenation, self-joins, and a
    number of other methods.


    ## 2-9. Calculating Totals and Subtotals


    ### Problem


    You need to calculate totals and subtotals in a variety of environments, using
    the lowest common denominator of SQL. For instance, you need to count the number
    of people in each department, as well as a grand total, in a way that can run
    across a variety of editions of Oracle without change.


    ### Solution


    In situations where you feel you can’t use analytic functions like `ROLLUP` and
    `CUBE`, or are restricted by licensing or other factors, you can use traditional
    aggregation and grouping techniques in separate SQL statements, and combine the
    results with a `UNION` to fold all the logic into a single statement. This `SELECT`
    combines counts of employees by department in one query, with the count of all
    employees in another query.


    ```sql

    select nvl(to_char(department_id),''-'') as "DEPT.", count(*) as "EMP_COUNT"

    from hr.employees

    group by department_id

    union

    select ''All Depts.'', count(*)

    from hr.employees;

    ```


    The recipe results appear as follows, with abridged output to save space.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA**


    `DEPT. EMP_COUNT`


    `----------- ----------`


    `10 1`


    `100 6`


    `110 2`


    …


    `90 3`


    `All Depts. 107`


    `13 rows selected.`


    ### How It Works


    This recipe uses separate queries to calculate different aggregates and different
    levels, combining the results into a report-style output using `UNION`. In effect,
    two distinct sets of results are generated. First, the count of employees by department
    is accomplished using this `SELECT` statement.


    ```sql

    select nvl(to_char(department_id),''-'') as "DEPT.", count(*) as "EMP_COUNT"

    from hr.employees

    group by department_id;

    ```


    Note that the `TO_CHAR` function is used to convert the integer `DEPARTMENT_ID`
    values to character equivalents. This is to ensure the eventual `UNION` is not
    plagued by implicit casting overhead, or even casting errors. In this recipe,
    we know we’re going to want to use the literal phrase `"All Depts."` in conjunction
    with the overall employee count, and have it appear in line with the `DEPARTMENT_ID`
    values.


    Without casting, this results in an attempt to form a union from a column defined
    as an integer and a literal string. We’ll receive this error if we don’t perform
    the casting.


    `ORA-01790: expression must have same datatype as corresponding expression`


    Obviously not a useful outcome. You will often see this error when dealing with
    unions that must handle `NULL` values.'
