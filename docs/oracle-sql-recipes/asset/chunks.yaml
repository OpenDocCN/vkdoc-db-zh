    To introduce some mixed case data into our HR.EMPLOYEES table, let’s run the following
    UPDATE to uppercase William Smith’s last name.


    update hr.employees


    set last_name = ''SMITH''


    where employee_id = 171;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


