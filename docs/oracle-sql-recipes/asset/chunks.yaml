    ***图 5-1.*** *使用线性回归对销售量和标价进行外推* 这清楚地表明了当您调整价格时，销售量可能会如何变化。但此图缺少了拟合优度的指示：具体来说，就是数据与从中提取的外推值之间的估计关系有多可靠。这是使用
    `REGR_R2` 函数计算出的 R 平方值。


    ## 5-11. 显式（悲观地）锁定待更新的行


    ### 问题


    为了保护一个特别敏感和特殊的业务场景，您被要求确保对员工薪资的更新能够避免丢失更新，同时还被要求不能使用乐观锁定方法。


    ### 解决方案


    我们的问题模拟了开发人员和数据库管理员所面临的经典问题之一。虽然 Oracle 提供了出色的并发控制和锁定机制，并支持乐观和悲观设计方法，但通常是政策或业务决策迫使您使用某一种技术。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    在您使用 Oracle 的某个阶段，您可能会发现您关于 Oracle 优秀并发技术的最有说服力的论点，被一位经理搁置一旁，这位经理会说：“那些都很好，但我想只授予一次加薪，而且*我不想看到*任何消息提示另一位经理更新了同一位员工的薪资，让我需要再试一次。”


    面对这种威胁职业生涯的要求，您会很高兴知道 Oracle 提供了 `SELECT … FOR UPDATE` 选项来显式锁定数据并提供悲观并发控制。对于我们的方案，我们将使用以下
    SELECT 语句来查找员工 200，Jennifer Whalen 的薪资数据，为后续的更新做准备。


    ```

    select employee_id, last_name, salary

    from hr.employees

    where employee_id = 200

    for update;

    ```


    ```

    EMPLOYEE_ID LAST_NAME SALARY

    ----------- --------- ------

    200 Whalen 4400

    ```


    到目前为止，一切顺利。如果第二个用户（或同一用户通过不同连接）尝试对这一行执行 `SELECT`、`UPDATE` 或 `DELETE` 操作，该用户将被阻塞。尝试从另一个连接发出相同的
    SELECT 语句，您会发现没有结果，因为会话正在等待与 `SELECT … FOR UPDATE` 悲观锁定相关的锁被释放。


    ```

    select employee_id, last_name, salary

    from hr.employees

    where employee_id = 200

    for update;

    ```


    （尚未有结果……等待阻塞的排他锁）


    从第一个会话中，我们完成更新。


    ```

    update hr.employees

    set salary = salary * 1.1

    where employee_id = 200;

    commit;

    ```


    随着第一个会话的提交，第二个会话的 SELECT 语句最终运行，并返回以下结果。


    ```

    EMPLOYEE_ID LAST_NAME SALARY

    ----------- --------- ------

    200 Whalen 4840

    ```


    请注意，第二个会话没有中断更新操作，并且从未看到更新前的数据。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图片 19](img/index-163_1.png)


    ### 工作原理


    `FOR UPDATE` 子句实现悲观锁定效果的关键在于它强制 Oracle 对 SELECT 查询所涵盖的数据获取锁的方式。Oracle 会尝试对满足 `SELECT
    … FOR UPDATE` 查询的每一行获取模式 X（排他）的事务行级锁。


    当第一个连接发出 `SELECT … FOR UPDATE` 语句时，我们可以查询 `V$LOCK` 动态视图或使用 SQL Developer 等图形化工具来查看已获取的锁，如图
    5-2 所示。


    ***图 5-2.** 在 SQL Developer 中，针对第一个会话的 Select for update 显式锁定* 高亮行显示了 `HR.EMPLOYEES`
    表中 `EMPLOYEE_ID` 为 200 的行上的锁。一旦第二个连接尝试相同的语句，它就会尝试获取相同的排他锁，即使这样做通常的第一个后果仅仅是选择数据。图
    5-3 展示了 Oracle 正常的“写入不会阻塞读取”行为是如何被 `FOR UPDATE` 技术所覆盖的。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图片 20](img/index-164_1.png)'
