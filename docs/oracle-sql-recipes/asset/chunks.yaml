    \n表 20-2. 常用的 Oracle 动态性能视图\n| 视图 | 描述 |\n| :--- | :--- |\n| `V$SYSSTAT` | 系统级别的累积工作负载统计信息。\
    \ |\n| `V$SESSTAT` | 会话级别的累积工作负载统计信息。 |\n| `V$SEGSTAT` | 段级别的累积工作负载统计信息。 |\n|\
    \ `V$EVENT_NAME` | 所有等待事件及其关联的类。 |\n| `V$SYSTEM_EVENT` | 所有会话因某个事件而等待的总次数。 |\n\
    | `V$SESSION_EVENT` | 单个会话因某个事件而等待的总次数。 |\n| `V$SESSION_WAIT` | 当前正在等待或最近完成等待的会话的事件。\
    \ |\n\n## 20-2. 显示打开的游标\n\n### 问题\n\n一个访问数据库的应用程序抛出以下错误：`ORA-01000: maximum open\
    \ cursors exceeded`\n\n您希望查询数据字典以确定每个会话打开的游标数量。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### 解决方案\n\n以下查询将显示每个会话当前打开的游标：\n```sql\nselect\n    a.value\n    ,c.username\n\
    \    ,c.machine\n    ,c.sid\n    ,c.serial#\nfrom v$sesstat a\n    ,v$statname\
    \ b\n    ,v$session c\nwhere a.statistic# = b.statistic#\nand c.sid = a.sid\n\
    and b.name = 'opened cursors current'\nand a.value != 0\nand c.username IS NOT\
    \ NULL\norder by 1,2;\n```\n\n我们建议您查询`V$SESSION`而不是`V$OPEN_CURSOR`来确定打开的游标数量。`V$SESSION`提供了当前打开游标数量的更准确数字。\n\
    \n### 工作原理\n\n`OPEN_CURSORS`初始化参数决定了一个会话可以打开的游标数量上限。这个设置是针对每个会话的。默认值`50`对于任何应用程序来说通常都太低了。通常将`OPEN_CURSORS`设置为`1000`这样的值。\n\
    \n但是，如果单个会话有超过`1000`个打开的游标，那么代码中很可能存在未关闭游标的情况。当达到此限制时，应该有人检查应用程序代码，以确定是否有游标未被关闭。\n\
    \n如果您工作的环境有数千个到数据库的连接，您可能只想查看消耗游标最多的前几个会话。以下查询使用了一个内联视图和伪列`ROWNUM`来显示前二十个值：\n\
    ```sql\nselect * from (\n    select\n        a.value\n        ,c.username\n  \
    \      ,c.machine\n        ,c.sid\n        ,c.serial#\n    from v$sesstat a\n\
    \        ,v$statname b\n        ,v$session c\n    where a.statistic# = b.statistic#\n\
    \    and c.sid = a.sid\n    and b.name = 'opened cursors current'\n    and a.value\
    \ != 0\n    and c.username IS NOT NULL\n    order by 1 desc,2\n)\nwhere rownum\
    \ < 21;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 20-3. 判断在线重做日志大小是否合适\n\
    \n### 问题\n\n您注意到存在异常多的`log file switch (checkpoint incomplete)`等待事件（描述参见表 20-1）。您希望验证生产数据库中重做日志切换的频率。\n\
    \n### 解决方案\n\n`V$LOG_HISTORY`包含有关在线重做日志的历史信息。执行此查询以查看每小时的日志切换次数：\n```sql\nselect\
    \ count(*)\n    ,to_char(first_time,'YYYY:MM:DD:HH24')\nfrom v$log_history\ngroup\
    \ by to_char(first_time,'YYYY:MM:DD:HH24')\norder by 2;\n```\n\n以下是输出的一个片段：\n\
    ```\nCOUNT(*) TO_CHAR(FIRST\n---------- -------------\n        15 2009:07:20:00\n\
    \        31 2009:07:20:01\n        47 2009:07:20:02\n        14 2009:07:20:03\n\
    \         3 2009:07:20:04\n         1 2009:07:20:05\n```\n\n从前面的输出中，您可以看到在 7 月\
    \ 20 日，大约从午夜到凌晨 3:00，产生了大量的重做数据。这可能是由于夜间批处理作业，或者是由于位于世界另一端的用户在运行数据库应用程序（您的夜晚是他们的白天）所致。\n\
    \n### 工作原理\n"
- fmt: "# The V$LOG_HISTORY derives its data from the control file. Each time there\
    \ is a log switch, an entry is recorded in this view that details information,\
    \ such as the time of the switch and system change number (`SCN`).\n\nA general\
    \ rule of thumb is that you should size your online redo log files so that they\
    \ switch about two or three times per hour. You don’t want them switching too\
    \ often because there is overhead with the log switch. Oracle initiates a checkpoint\
    \ as part of a log switch. During a checkpoint, the database writer background\
    \ process writes all modified (dirty) blocks to disk, which is resource-intensive.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## CHAPTER 20 ■ DATABASE\
    \ TROUBLESHOOTING\n\nOn the other hand, you don’t want online redo log files to\
    \ never switch because there are transactions in the current online redo log that\
    \ you may need in the event of a recovery. If you were to have a disaster that\
    \ caused a media failure in your current online redo log, you could lose those\
    \ transactions that haven’t been archived yet.\n\n**Tip** Use the `ARCHIVE_LAG_TARGET`\
    \ initialization parameter to set a maximum amount of time (in seconds) between\
    \ log switches. A typical setting for this parameter is 1800 seconds (30 minutes).\
    \ A value of 0 (default) disables this feature. This parameter is commonly used\
    \ in Oracle Data Guard environments to force log switches after the specified\
    \ amount of time lapses.\n\nYou can also query the `OPTIMAL_LOGFILE_SIZE` column\
    \ from the `V$INSTANCE_RECOVERY` view to determine if your online redo log files\
    \ have been sized correctly:\n\n```sql\nselect optimal_logfile_size from v$instance_recovery;\n\
    ```\n\nHere is some sample output:\n\n```\nOPTIMAL_LOGFILE_SIZE\n```\n\nThis reports\
    \ the redo log file size (in megabytes) that is considered optimal based on the\
    \ initialization parameter setting of `FAST_START_MTTR_TARGET`. Oracle recommends\
    \ you configure all online redo logs to be at least the value of `OPTIMAL_LOGFILE_SIZE`.\
    \ However, when sizing your online redo logs, you must take into consideration\
    \ information about your environment (such as the frequency of the switches).\n\
    \nYou can view the current size of your online redo log files by issuing the following\
    \ query:\n\n```sql\nselect a.group#,\n       a.member,\n       b.status,\n   \
    \    b.bytes/1024/1024 meg_bytes\nfrom v$logfile a,\n     v$log b\nwhere a.group#\
    \ = b.group#\norder by a.group#;\n```\n\nHere is some sample output:\n\n```\n\
    GROUP# MEMBER                          STATUS              MEG_BYTES\n---------\
    \ ------------------------------ -------------------- ----------\n1 /oralogs01/DWREP/redo01a.log\
    \       INACTIVE                   256\n1 /oralogs02/DWREP/redo01b.log       INACTIVE\
    \                   256\n2 /oralogs01/DWREP/redo02a.log       CURRENT        \
    \            256\n2 /oralogs02/DWREP/redo02b.log       CURRENT               \
    \     256\n3 /oralogs01/DWREP/redo03a.log       INACTIVE                   256\n\
    3 /oralogs02/DWREP/redo03b.log       INACTIVE                   256\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 20 ■ DATABASE TROUBLESHOOTING\n\n### 20-4. Determining If Undo Is\
    \ Sized Properly\n\n**Problem**\n\nYou have a long-running SQL statement that\
    \ is throwing an `ORA-01555` “snapshot too old” error. You want to determine if\
    \ you have properly sized your undo tablespace.\n\n**Solution**\n\nRun this next\
    \ query to identify potential issues with your undo tablespace. The query checks\
    \ for issues with the undo tablespace that have occurred within the last day:\n\
    \n```sql\nselect\n  to_char(begin_time,'MM-DD-YYYY HH24:MI') begin_time,\n  ssolderrcnt\
    \ ORA_01555_cnt,\n  nospaceerrcnt no_space_cnt,\n  txncount max_num_txns,\n  maxquerylen\
    \ max_query_len,\n  expiredblks blck_in_expired\nfrom v$undostat\nwhere begin_time\
    \ > sysdate - 1\norder by begin_time;\n```\n\nHere is some sample output. Part\
    \ of the output has been omitted to fit this on the page:\n\n```\nBEGIN_TIME \
    \        ORA_01555_CNT  NO_SPACE_CNT MAX_NUM_TXNS MAX_QUERY_LEN\n------------------\
    \ -------------  ------------ ------------ -------------\n07-20-2009 18:10   \
    \           0              0          249             0\n07-20-2009 18:20    \
    \          0              0          290             0\n07-20-2009 18:30     \
    \         0              0          244             0\n07-20-2009 18:40      \
    \        0              0          179             0\n```\n\nThe `ORA_01555_CNT`\
    \ column indicates the number of times your database has encountered the `ORA-01555`\
    \ “snapshot too old” error. If this column reports a non-zero value, you need\
    \ to do one or more of the following:\n\n- Ensure that code does not contain `COMMIT`\
    \ statements within cursor loops.\n- Tune the SQL statement throwing the error\
    \ so that it runs faster.\n- Ensure that you have good statistics (so your SQL\
    \ runs efficiently).\n- Increase the `UNDO_RETENTION` initialization parameter.\n\
    \nThe `NO_SPACE_CNT` column displays the number of times space was requested in\
    \ the undo tablespace but none was to be found. If the `NO_SPACE_CNT` is reporting\
    \ a non-zero value, you may need to add more space to your undo tablespace.\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## CHAPTER 20 ■ DATABASE TROUBLESHOOTING\n\
    \n**How It Works**\n\nThere is a maximum of four days’ worth of information stored\
    \ in the `V$UNDOSTAT` view. The statistics are gathered every ten minutes for\
    \ a maximum of 576 rows in the table. If you’ve stopped and started your database\
    \ within the last four days, this view will only have information in it from the\
    \ time you last started your database.\n\nAnother way to get advice on the undo\
    \ tablespace sizing is to use the Oracle Undo Advisor, which you can invoke by\
    \ querying the PL/SQL `DBMS_UNDO_ADV` package from a `SELECT` statement. The following\
    \ query displays the current undo size and the recommended size for an undo retention\
    \ setting of 900 seconds:\n\n```sql\nselect\n  sum(bytes)/1024/1024 cur_mb_size,\n\
    \  dbms_undo_adv.required_undo_size(900) req_mb_size\nfrom dba_data_files\nwhere\
    \ tablespace_name LIKE 'UNDO%';\n```\n\nHere is some sample output:\n\n```\nCUR_MB_SIZE\
    \ REQ_MB_SIZE\n----------- -----------\n      36864       20897\n```\n\nThe output\
    \ shows that the undo tablespace currently has 36.8 gigabytes allocated to it.\
    \ In the prior query we used 900 seconds for the amount of time to retain information\
    \ in the undo tablespace. To retain undo information for 900 seconds, the Oracle\
    \ Undo Advisor estimates that the undo tablespace should be 20.8 gigabytes. For\
    \ this example, the undo tablespace is sized adequately. If it were not sized\
    \ adequately, you would either have to add space to an existing datafile or add\
    \ a datafile to the undo tablespace.\n\nHere’s a slightly more complex example\
    \ of using the Oracle Undo Advisor to find the required size of the undo tablespace.\
    \ This example uses PL/SQL to display information about potential issues and recommendations\
    \ to fix the problem.\n\n```sql\nSET SERVEROUT ON SIZE 1000000\nDECLARE\n  pro\
    \ VARCHAR2(200);\n  rec VARCHAR2(200);\n  rtn VARCHAR2(200);\n  ret NUMBER;\n\
    \  utb NUMBER;\n  retval NUMBER;\nBEGIN\n  DBMS_OUTPUT.PUT_LINE(DBMS_UNDO_ADV.UNDO_ADVISOR(1));\n\
    \  DBMS_OUTPUT.PUT_LINE('Required Undo Size (megabytes): ' ||\n    DBMS_UNDO_ADV.REQUIRED_UNDO_SIZE\
    \ (900));\n  retval := DBMS_UNDO_ADV.UNDO_HEALTH(pro, rec, rtn, ret, utb);\n \
    \ DBMS_OUTPUT.PUT_LINE('Problem: ' || pro);\n  DBMS_OUTPUT.PUT_LINE('Advice: '\
    \ || rec);\n  DBMS_OUTPUT.PUT_LINE('Rational: ' || rtn);\n  DBMS_OUTPUT.PUT_LINE('Retention:\
    \ ' || TO_CHAR(ret));\n  DBMS_OUTPUT.PUT_LINE('UTBSize: ' || TO_CHAR(utb));\n\
    END;\n/\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## CHAPTER\
    \ 20 ■ DATABASE TROUBLESHOOTING\n\nIf no issues are found, a 0 will be returned\
    \ for the retention size. Here is some sample output:\n\n```\nFinding 1:The undo\
    \ tablespace is OK.\n\nRequired Undo Size (megabytes): 20897\n\nProblem: No problem\
    \ found\n\nAdvice:\nRational:\nRetention: 0\nUTBSize: 0\n```\n\n### 20-5. Determining\
    \ If Temporary Tablespace Is Sized Correctly\n\n**Problem**\n\nYou’re trying to\
    \ build an index and Oracle is throwing this error:\n\n```\nORA-01652: unable\
    \ to extend temp segment by 128 in tablespace TEMP\n```\n\nYou want to determine\
    \ if your temporary tablespace is sized correctly.\n\n**Solution**\n\nIf you are\
    \ using Oracle Database 11g or higher, run the following query to show both the\
    \ allocated and free space within the temporary tablespace:\n\n```sql\nselect\n\
    \  tablespace_name,\n  tablespace_size/1024/1024 mb_size,\n  allocated_space/1024/1024\
    \ mb_alloc,\n  free_space/1024/1024 mb_free\nfrom dba_temp_free_space;\n```\n\n\
    Here is some sample output:\n\n```\nTABLESPACE_NAME                MB_SIZE   \
    \ MB_ALLOC     MB_FREE\n--------------- ---------- ---------- ----------\nTEMP\
    \                              200        200        170\n```"
  raw: 'The V$LOG_HISTORY derives its data from the control file. Each time there
    is a log switch, an entry is recorded in this view that details information, such
    as the time of the switch and system change number (SCN).


    A general rule of thumb is that you should size your online redo log files so
    that they switch about two or three times per hour. You don’t want them switching
    too often because there is overhead with the log switch. Oracle initiates a checkpoint
    as part of a log switch. During a checkpoint, the database writer background process
    writes all modified (dirty) blocks to disk, which is resource-intensive.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    On the other hand, you don’t want online redo log files to never switch because
    there are transactions in the current online redo log that you may need in the
    event of a recovery. If you were to have a disaster that caused a media failure
    in your current online redo log, you could lose those transactions that haven’t
    been archived yet.


    ■ **Tip** Use the ARCHIVE_LAG_TARGET initialization parameter to set a maximum
    amount of time (in seconds) between log switches. A typical setting for this parameter
    is 1800 seconds (30 minutes). A value of 0 (default) disables this feature. This
    parameter is commonly used in Oracle Data Guard environments to force log switches
    after the specified amount of time lapses.


    You can also query the OPTIMAL_LOGFILE_SIZE column from the V$INSTANCE_RECOVERY
    view to determine if your online redo log files have been sized correctly:


    select optimal_logfile_size from v$instance_recovery;


    Here is some sample output:


    OPTIMAL_LOGFILE_SIZE


    This reports the redo log file size (in megabytes) that is considered optimal
    based on the initialization parameter setting of FAST_START_MTTR_TARGET. Oracle
    recommends you configure all online redo logs to be at least the value of OPTIMAL_LOGFILE_SIZE.
    However, when sizing your online redo logs, you must take into consideration information
    about your environment (such as the frequency of the switches).


    You can view the current size of your online redo log files by issuing the following
    query: select a.group#


    ,a.member


    ,b.status


    ,b.bytes/1024/1024 meg_bytes


    from v$logfile a,


    v$log b


    where a.group# = b.group#


    order by a.group#;


    Here is some sample output:


    GROUP# MEMBER STATUS MEG_BYTES


    --------- ------------------------------ -------------------- ----------


    1 /oralogs01/DWREP/redo01a.log INACTIVE 256


    1 /oralogs02/DWREP/redo01b.log INACTIVE 256


    2 /oralogs01/DWREP/redo02a.log CURRENT 256


    2 /oralogs02/DWREP/redo02b.log CURRENT 256


    3 /oralogs01/DWREP/redo03a.log INACTIVE 256


    3 /oralogs02/DWREP/redo03b.log INACTIVE 256


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    20-4\. Determining If Undo Is Sized Properly


    Problem


    You have a long-running SQL statement that is throwing an ORA-01555 “snapshot
    too old” error. You want to determine if you have properly sized your undo tablespace.


    Solution


    Run this next query to identify potential issues with your undo tablespace. The
    query checks for issues with the undo tablespace that have occurred within the
    last day:


    select


    to_char(begin_time,''MM-DD-YYYY HH24:MI'') begin_time


    ,ssolderrcnt ORA_01555_cnt


    ,nospaceerrcnt no_space_cnt


    ,txncount max_num_txns


    ,maxquerylen max_query_len


    ,expiredblks blck_in_expired


    from v$undostat


    where begin_time > sysdate - 1


    order by begin_time;


    Here is some sample output. Part of the output has been omitted to fit this on
    the page: BEGIN_TIME ORA_01555_CNT NO_SPACE_CNT MAX_NUM_TXNS MAX_QUERY_LEN


    ---------------- ------------- ------------ ------------ -------------


    07-20-2009 18:10 0 0 249 0


    07-20-2009 18:20 0 0 290 0


    07-20-2009 18:30 0 0 244 0


    07-20-2009 18:40 0 0 179 0


    The ORA_01555_CNT column indicates the number of times your database has encountered
    the ORA-01555 “snapshot too old” error. If this column reports a non-zero value,
    you need to do one or more of the following:


    • Ensure that code does not contain COMMIT statements within cursor loops.


    • Tune the SQL statement throwing the error so that it runs faster.


    • Ensure that you have good statistics (so your SQL runs efficiently).


    • Increase the UNDO_RETENTION initialization parameter.


    The NO_SPACE_CNT column displays the number of times space was requested in the
    undo tablespace but none was to be found. If the NO_SPACE_CNT is reporting a non-zero
    value, you may need to add more space to your undo tablespace.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    How It Works


    There is a maximum of four days’ worth of information stored in the V$UNDOSTAT
    view. The statistics are gathered every ten minutes for a maximum of 576 rows
    in the table. If you’ve stopped and started your database within the last four
    days, this view will only have information in it from the time you last started
    your database.


    Another way to get advice on the undo tablespace sizing is to use the Oracle Undo
    Advisor, which you can invoke by querying the PL/SQL DBMS_UNDO_ADV package from
    a SELECT statement. The following query displays the current undo size and the
    recommended size for an undo retention setting of 900


    seconds:


    select


    sum(bytes)/1024/1024 cur_mb_size


    ,dbms_undo_adv.required_undo_size(900) req_mb_size


    from dba_data_files


    where tablespace_name LIKE ''UNDO%'';


    Here is some sample output:


    CUR_MB_SIZE REQ_MB_SIZE


    ----------- -----------


    36864 20897


    The output shows that the undo tablespace currently has 36.8 gigabytes allocated
    to it. In the prior query we used 900 seconds for the amount of time to retain
    information in the undo tablespace. To retain undo information for 900 seconds,
    the Oracle Undo Advisor estimates that the undo tablespace should be 20.8 gigabytes.
    For this example, the undo tablespace is sized adequately. If it were not sized
    adequately, you would either have to add space to an existing datafile or add
    a datafile to the undo tablespace.


    Here’s a slightly more complex example of using the Oracle Undo Advisor to find
    the required size of the undo tablespace. This example uses PL/SQL to display
    information about potential issues and recommendations to fix the problem.


    SET SERVEROUT ON SIZE 1000000


    DECLARE


    pro VARCHAR2(200);


    rec VARCHAR2(200);


    rtn VARCHAR2(200);


    ret NUMBER;


    utb NUMBER;


    retval NUMBER;


    BEGIN


    DBMS_OUTPUT.PUT_LINE(DBMS_UNDO_ADV.UNDO_ADVISOR(1));


    DBMS_OUTPUT.PUT_LINE(''Required Undo Size (megabytes): '' ||


    DBMS_UNDO_ADV.REQUIRED_UNDO_SIZE (900));


    retval := DBMS_UNDO_ADV.UNDO_HEALTH(pro, rec, rtn, ret, utb);


    DBMS_OUTPUT.PUT_LINE(''Problem: '' || pro);


    DBMS_OUTPUT.PUT_LINE(''Advice: '' || rec);


    DBMS_OUTPUT.PUT_LINE(''Rational: '' || rtn);


    DBMS_OUTPUT.PUT_LINE(''Retention: '' || TO_CHAR(ret));


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    DBMS_OUTPUT.PUT_LINE(''UTBSize: '' || TO_CHAR(utb));


    END;


    /


    If no issues are found, a 0 will be returned for the retention size. Here is some
    sample output: Finding 1:The undo tablespace is OK.


    Required Undo Size (megabytes): 20897


    Problem: No problem found


    Advice:


    Rational:


    Retention: 0


    UTBSize: 0


    20-5\. Determining If Temporary Tablespace Is Sized Correctly


    Problem


    You’re trying to build an index and Oracle is throwing this error:


    ORA-01652: unable to extend temp segment by 128 in tablespace TEMP


    You want to determine if your temporary tablespace is sized correctly.


    Solution


    If you are using Oracle Database 11 *g* or higher, run the following query to
    show both the allocated and free space within the temporary tablespace:


    select


    tablespace_name


    ,tablespace_size/1024/1024 mb_size


    ,allocated_space/1024/1024 mb_alloc


    ,free_space/1024/1024 mb_free


    from dba_temp_free_space;


    Here is some sample output:


    TABLESPACE_NAME MB_SIZE MB_ALLOC MB_FREE


    --------------- ---------- ---------- ----------


    TEMP 200 200 170'
  trans: "\n# `V$LOG_HISTORY` 视图的数据源自控制文件。每当发生日志切换时，此视图中就会记录一条详细记录，包含诸如切换时间和系统变更号（`SCN`）等信息。\n\
    \n一条通用的经验法则是，你应该将在线重做日志文件的大小设置为大约每小时切换两到三次。你不希望它们切换得过于频繁，因为日志切换会产生开销。Oracle 在日志切换过程中会启动一个检查点。在检查点期间，数据库写入器后台进程会将所有已修改的（脏）块写入磁盘，这是资源密集型操作。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 20 章 ■ 数据库故障排除\n\n\
    另一方面，你也不希望在线重做日志文件从不切换，因为当前在线重做日志中可能包含你在恢复事件中需要用到的事务。如果你遭遇灾难，导致当前在线重做日志发生介质故障，你可能会丢失那些尚未归档的事务。\n\
    \n**提示** 使用 `ARCHIVE_LAG_TARGET` 初始化参数来设置日志切换之间的最长时间（以秒为单位）。该参数的典型设置是 1800 秒（30\
    \ 分钟）。值为 0（默认值）则禁用此功能。此参数常用于 Oracle Data Guard 环境，以在指定时间过后强制进行日志切换。\n\n你还可以查询\
    \ `V$INSTANCE_RECOVERY` 视图中的 `OPTIMAL_LOGFILE_SIZE` 列，以确定你的在线重做日志文件大小是否设置正确：\n\
    \n```sql\nselect optimal_logfile_size from v$instance_recovery;\n```\n\n以下是一些示例输出：\n\
    \n```\nOPTIMAL_LOGFILE_SIZE\n--------------------\n                 512\n```\n\
    \n此查询报告被认为是最优的重做日志文件大小（以兆字节为单位），其基于 `FAST_START_MTTR_TARGET` 初始化参数设置。Oracle 建议你将所有在线重做日志配置为至少达到\
    \ `OPTIMAL_LOGFILE_SIZE` 的值。然而，在确定在线重做日志大小时，你必须考虑你的环境信息（例如切换频率）。\n\n你可以通过执行以下查询来查看当前在线重做日志文件的大小：\n\
    \n```sql\nselect a.group#,\n       a.member,\n       b.status,\n       b.bytes/1024/1024\
    \ meg_bytes\nfrom v$logfile a,\n     v$log b\nwhere a.group# = b.group#\norder\
    \ by a.group#;\n```\n\n以下是一些示例输出：\n\n```\nGROUP# MEMBER                      \
    \    STATUS              MEG_BYTES\n--------- ------------------------------ --------------------\
    \ ----------\n1 /oralogs01/DWREP/redo01a.log       INACTIVE                  \
    \ 256\n1 /oralogs02/DWREP/redo01b.log       INACTIVE                   256\n2\
    \ /oralogs01/DWREP/redo02a.log       CURRENT                    256\n2 /oralogs02/DWREP/redo02b.log\
    \       CURRENT                    256\n3 /oralogs01/DWREP/redo03a.log       INACTIVE\
    \                   256\n3 /oralogs02/DWREP/redo03b.log       INACTIVE       \
    \            256\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
    ## 第 20 章 ■ 数据库故障排除\n\n### 20-4. 确定撤销表空间大小是否合适\n\n**问题**\n\n你有一个运行时间很长的 SQL 语句，正在抛出\
    \ `ORA-01555` “快照过旧” 错误。你想要确定你的撤销表空间大小设置是否正确。\n\n**解决方案**\n\n运行以下查询，以识别撤销表空间在过去一天内发生的潜在问题：\n\
    \n```sql\nselect\n  to_char(begin_time,'MM-DD-YYYY HH24:MI') begin_time,\n  ssolderrcnt\
    \ ORA_01555_cnt,\n  nospaceerrcnt no_space_cnt,\n  txncount max_num_txns,\n  maxquerylen\
    \ max_query_len,\n  expiredblks blck_in_expired\nfrom v$undostat\nwhere begin_time\
    \ > sysdate - 1\norder by begin_time;\n```\n\n以下是一些示例输出。部分输出已省略以适应页面：\n\n```\n\
    BEGIN_TIME         ORA_01555_CNT  NO_SPACE_CNT MAX_NUM_TXNS MAX_QUERY_LEN\n------------------\
    \ -------------  ------------ ------------ -------------\n07-20-2009 18:10   \
    \           0              0          249             0\n07-20-2009 18:20    \
    \          0              0          290             0\n07-20-2009 18:30     \
    \         0              0          244             0\n07-20-2009 18:40      \
    \        0              0          179             0\n```\n\n`ORA_01555_CNT` 列指示你的数据库遇到\
    \ `ORA-01555` “快照过旧” 错误的次数。如果此列报告非零值，你需要执行以下一项或多项操作：\n\n-   确保代码中没有在游标循环内包含 `COMMIT`\
    \ 语句。\n-   优化抛出错误的 SQL 语句，使其运行得更快。\n-   确保你拥有良好的统计信息（以便你的 SQL 高效运行）。\n-   增加 `UNDO_RETENTION`\
    \ 初始化参数的值。\n\n`NO_SPACE_CNT` 列显示了在撤销表空间中请求空间但未找到可用空间的次数。如果 `NO_SPACE_CNT` 报告非零值，你可能需要为你的撤销表空间添加更多空间。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 20 章 ■ 数据库故障排除\n\n\
    **工作原理**\n\n`V$UNDOSTAT` 视图中最多存储四天的信息。统计信息每十分钟收集一次，表中最多有 576 行。如果你在最近四天内停止并启动过数据库，此视图将仅包含自上次启动数据库以来的信息。\n\
    \n另一种获取撤销表空间大小调整建议的方法是使用 Oracle Undo Advisor，你可以通过 `SELECT` 语句查询 PL/SQL `DBMS_UNDO_ADV`\
    \ 包来调用它。以下查询显示了在撤销保留设置为 900 秒的情况下，当前的撤销大小和建议大小：\n\n```sql\nselect\n  sum(bytes)/1024/1024\
    \ cur_mb_size,\n  dbms_undo_adv.required_undo_size(900) req_mb_size\nfrom dba_data_files\n\
    where tablespace_name LIKE 'UNDO%';\n```\n\n以下是一些示例输出：\n\n```\nCUR_MB_SIZE REQ_MB_SIZE\n\
    ----------- -----------\n      36864       20897\n```\n\n输出显示，撤销表空间当前分配了 36.8\
    \ GB。在之前的查询中，我们使用 900 秒作为在撤销表空间中保留信息的时间。Oracle Undo Advisor 估计，为了保留撤销信息 900 秒，撤销表空间应为\
    \ 20.8 GB。在此示例中，撤销表空间的大小是足够的。如果大小不足，你将需要向现有数据文件添加空间，或者向撤销表空间添加一个数据文件。\n\n下面是一个稍微复杂一点的使用\
    \ Oracle Undo Advisor 来查找撤销表空间所需大小的示例。此示例使用 PL/SQL 来显示有关潜在问题的信息和修复问题的建议。\n\n```sql\n\
    SET SERVEROUT ON SIZE 1000000\nDECLARE\n  pro VARCHAR2(200);\n  rec VARCHAR2(200);\n\
    \  rtn VARCHAR2(200);\n  ret NUMBER;\n  utb NUMBER;\n  retval NUMBER;\nBEGIN\n\
    \  DBMS_OUTPUT.PUT_LINE(DBMS_UNDO_ADV.UNDO_ADVISOR(1));\n  DBMS_OUTPUT.PUT_LINE('Required\
    \ Undo Size (megabytes): ' ||\n    DBMS_UNDO_ADV.REQUIRED_UNDO_SIZE (900));\n\
    \  retval := DBMS_UNDO_ADV.UNDO_HEALTH(pro, rec, rtn, ret, utb);\n  DBMS_OUTPUT.PUT_LINE('Problem:\
    \ ' || pro);\n  DBMS_OUTPUT.PUT_LINE('Advice: ' || rec);\n  DBMS_OUTPUT.PUT_LINE('Rational:\
    \ ' || rtn);\n  DBMS_OUTPUT.PUT_LINE('Retention: ' || TO_CHAR(ret));\n  DBMS_OUTPUT.PUT_LINE('UTBSize:\
    \ ' || TO_CHAR(utb));\nEND;\n/\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 20 章 ■ 数据库故障排除\n\n如果没有发现问题，则保留大小将返回 0。以下是一些示例输出：\n\n```\nFinding 1: 撤销表空间正常。\n\
    \nRequired Undo Size (megabytes): 20897\n\nProblem: 未发现问题\n\nAdvice:\nRational:\n\
    Retention: 0\nUTBSize: 0\n```\n\n### 20-5. 确定临时表空间大小是否正确\n\n**问题**\n\n你尝试创建一个索引，Oracle\
    \ 抛出此错误：\n\n```\nORA-01652: 无法通过 128 (在表空间 TEMP 中) 扩展 temp 段\n```\n\n你想要确定你的临时表空间大小是否设置正确。\n\
    \n**解决方案**\n\n如果你使用的是 Oracle Database 11g 或更高版本，请运行以下查询以显示临时表空间中已分配和空闲的空间：\n\n\
    ```sql\nselect\n  tablespace_name,\n  tablespace_size/1024/1024 mb_size,\n  allocated_space/1024/1024\
    \ mb_alloc,\n  free_space/1024/1024 mb_free\nfrom dba_temp_free_space;\n```\n\n\
    以下是一些示例输出：\n\n```\nTABLESPACE_NAME                MB_SIZE    MB_ALLOC     MB_FREE\n\
    --------------- ---------- ---------- ----------\nTEMP                       \
    \       200        200        170\n```\n"
- fmt: "If the `FREE_SPACE` (`MB_FREE`) value drops to near zero, there are SQL operations\
    \ in your database consuming most of the available space. The `FREE_SPACE` (`MB_FREE`)\
    \ column is the total free space available, including space currently allocated\
    \ and available for reuse.\n\n## Database Troubleshooting\n\nIf you are using\
    \ an Oracle Database 10g database, run this query to view space being used in\
    \ your temporary tablespace:\n\n```sql\nselect tablespace_name, sum(bytes_used)/1024/1024\
    \ mb_used\nfrom v$temp_extent_pool\ngroup by tablespace_name;\n```\n\nHere is\
    \ some sample output:\n\n```\nTABLESPACE_NAME   MB_USED\n--------------- ----------\n\
    TEMP                      120\n```\n\nIf the used amount is getting near your\
    \ current allocated amount, you may need to allocate more space to the temporary\
    \ tablespace datafiles. Run the following query to view the temporary datafile\
    \ names and allocated sizes:\n\n```sql\nselect name, bytes/1024/1024 mb_alloc\
    \ from v$tempfile;\n```\n\nHere is some typical output:\n\n```\nNAME         \
    \                 MB_ALLOC\n------------------------------ ----------\n/ora02/DWREP/temp01.dbf\
    \            12000\n/ora03/DWREP/temp03.dbf            10240\n/ora01/DWREP/temp02.dbf\
    \             2048\n```\n\n### How It Works\n\nThe temporary tablespace is used\
    \ as a sorting area on disk when a process has consumed the available memory and\
    \ needs more space. Operations that require a sorting area include:\n\n- Index\
    \ creation\n- SQL sorting operations\n- Temporary tables and temporary indexes\n\
    - Temporary LOBs\n- Temporary B-trees\n\nThere is no exact formula for determining\
    \ if your temporary tablespace is sized correctly. It depends on the number and\
    \ types of queries, index build operations, parallel operations, and size of your\
    \ memory sort space (program global area). You’ll have to use one of the queries\
    \ in the solution section to monitor your temporary tablespace while there is\
    \ a load on your database to determine its usage patterns.\n\nIf Oracle throws\
    \ the `ORA-01652` error, that is one indicator that your temporary tablespace\
    \ is too small. However, Oracle may throw that error if it runs out of space because\
    \ of a one-time event, like a large index build. You’ll have to decide whether\
    \ a one-time index build or a query that consumes large amounts of sort space\
    \ in the temporary tablespace warrants adding space.\n\nIf you determine that\
    \ you need to add space, you can either resize an existing datafile or add a new\
    \ datafile. To resize a temporary tablespace datafile, use the `ALTER DATABASE\
    \ TEMPFILE...RESIZE` statement. The following resizes a temporary datafile to\
    \ 12 gigabytes:\n\n```sql\nalter database tempfile '/ora03/DWREP/temp03.dbf' resize\
    \ 12g;\n```\n\nYou can add a datafile to a temporary tablespace as follows:\n\n\
    ```sql\nalter tablespace temp add tempfile '/ora04/DWREP/temp04.dbf' size 2g;\n\
    ```\n\n## Displaying Tablespace Fullness\n\n### Problem\n\nYou’re getting an `ORA-01653`\
    \ “unable to extend table” error. You want to find out how much free space remains\
    \ in each tablespace.\n\n### Solution\n\nRun the following script to view the\
    \ amount of free and allocated bytes in your database:\n\n```sql\nselect\n   \
    \ a.tablespace_name\n    ,(f.bytes/a.bytes)*100 pct_free\n    ,f.bytes/1024/1024\
    \ mb_free\n    ,a.bytes/1024/1024 mb_allocated\nfrom\n    (select nvl(sum(bytes),0)\
    \ bytes, x.tablespace_name\n    from dba_free_space y, dba_tablespaces x\n   \
    \ where x.tablespace_name = y.tablespace_name(+)\n    and x.contents != 'TEMPORARY'\
    \ and x.status != 'READ ONLY'\n    and x.tablespace_name not like 'UNDO%'\n  \
    \  group by x.tablespace_name) f,\n    (select sum(bytes) bytes, tablespace_name\n\
    \    from dba_data_files\n    group by tablespace_name) a\nwhere a.tablespace_name\
    \ = f.tablespace_name\norder by 1;\n```\n\nHere’s some sample output:\n\n```\n\
    TABLESPACE_NAME     PCT_FREE    MB_FREE MB_ALLOCATED\n--------------- -------------\
    \ ---------- ------------\nDOWN_TBSP_9        79.1992188       8110        10240\n\
    DTS_STAGE_DATA           84.3        843         1000\nDTS_STAGE_INDEX       \
    \   96.7        967         1000\nINST_TBSP_1              96.8        484   \
    \       500\n```\n\n### How It Works"
  raw: 'If the FREE_SPACE (MB_FREE) value drops to near zero, there are SQL operations
    in your database consuming most of the available space. The FREE_SPACE (MB_FREE)
    column is the total free space available, including space currently allocated
    and available for reuse.


    If you are using an Oracle Database 10 *g* database, run this query to view space
    being used in your temporary tablespace:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    select tablespace_name, sum(bytes_used)/1024/1024 mb_used


    from v$temp_extent_pool


    group by tablespace_name;


    Here is some sample output:


    TABLESPACE_NAME MB_USED


    --------------- ----------


    TEMP 120


    If the used amount is getting near your current allocated amount, you may need
    to allocate more space to the temporary tablespace datafiles. Run the following
    query to view the temporary datafile names and allocated sizes:


    select name, bytes/1024/1024 mb_alloc from v$tempfile;


    Here is some typical output:


    NAME MB_ALLOC


    ------------------------------ ----------


    /ora02/DWREP/temp01.dbf 12000


    /ora03/DWREP/temp03.dbf 10240


    /ora01/DWREP/temp02.dbf 2048


    How It Works


    The temporary tablespace is used as a sorting area on disk when a process has
    consumed the available memory and needs more space. Operations that require a
    sorting area include:


    • Index creation


    • SQL sorting operations


    • Temporary tables and temporary indexes


    • Temporary LOBs


    • Temporary B-trees


    There is no exact formula for determining if your temporary tablespace is sized
    correctly. It depends on the number and types of queries, index build operations,
    parallel operations, and size of your memory sort space (program global area).
    You’ll have to use one of the queries in the solution section to monitor your
    temporary tablespace while there is a load on your database to determine its usage
    patterns.


    If Oracle throws the ORA-01652 error, that is one indicator that your temporary
    tablespace is too small. However, Oracle may throw that error if it runs out of
    space because of a one-time event, like a large index build. You’ll have to decide
    whether a one-time index build or a query that consumes large amounts of sort
    space in the temporary tablespace warrants adding space.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    If you determine that you need to add space, you can either resize an existing
    datafile or add a new datafile. To resize a temporary tablespace datafile, use
    the ALTER DATABASE TEMPFILE...RESIZE


    statement. The following resizes a temporary datafile to 12 gigabytes: alter database
    tempfile ''/ora03/DWREP/temp03.dbf'' resize 12g;


    You can add a datafile to a temporary tablespace as follows:


    alter tablespace temp add tempfile ''/ora04/DWREP/temp04.dbf'' size 2g; 20-6\.
    Displaying Tablespace Fullness


    Problem


    You’re getting an ORA-01653 “unable to extend table” error. You want to find out
    how much free space remains in each tablespace.


    Solution


    Run the following script to view the amount of free and allocated bytes in your
    database: select


    a.tablespace_name


    ,(f.bytes/a.bytes)*100 pct_free


    ,f.bytes/1024/1024 mb_free


    ,a.bytes/1024/1024 mb_allocated


    from


    (select nvl(sum(bytes),0) bytes, x.tablespace_name


    from dba_free_space y, dba_tablespaces x


    where x.tablespace_name = y.tablespace_name(+)


    and x.contents != ''TEMPORARY'' and x.status != ''READ ONLY''


    and x.tablespace_name not like ''UNDO%''


    group by x.tablespace_name) f,


    (select sum(bytes) bytes, tablespace_name


    from dba_data_files


    group by tablespace_name) a


    where a.tablespace_name = f.tablespace_name


    order by 1;


    Here’s some sample output:


    TABLESPACE_NAME PCT_FREE MB_FREE MB_ALLOCATED


    --------------- ---------- ---------- ------------


    DOWN_TBSP_9 79.1992188 8110 10240


    DTS_STAGE_DATA 84.3 843 1000


    DTS_STAGE_INDEX 96.7 967 1000


    INST_TBSP_1 96.8 484 500


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    How It Works'
  trans: "\n如果 `FREE_SPACE` (`MB_FREE`) 值下降到接近零，说明你的数据库中有某些 SQL 操作正在消耗大部分可用空间。`FREE_SPACE`\
    \ (`MB_FREE`) 列显示的是总可用空闲空间，包括当前已分配且可重复使用的空间。\n\n## 数据库故障排除\n\n如果你使用的是 Oracle Database\
    \ 10g 数据库，可以运行此查询来查看临时表空间中已使用的空间：\n\n```sql\nselect tablespace_name, sum(bytes_used)/1024/1024\
    \ mb_used\nfrom v$temp_extent_pool\ngroup by tablespace_name;\n```\n\n以下是一些示例输出：\n\
    \n```\nTABLESPACE_NAME   MB_USED\n--------------- ----------\nTEMP           \
    \           120\n```\n\n如果已使用量接近当前分配的总量，你可能需要为临时表空间数据文件分配更多空间。运行以下查询以查看临时数据文件名称和分配大小：\n\
    \n```sql\nselect name, bytes/1024/1024 mb_alloc from v$tempfile;\n```\n\n以下是一些典型输出：\n\
    \n```\nNAME                          MB_ALLOC\n------------------------------\
    \ ----------\n/ora02/DWREP/temp01.dbf            12000\n/ora03/DWREP/temp03.dbf\
    \            10240\n/ora01/DWREP/temp02.dbf             2048\n```\n\n### 工作原理\n\
    \n当进程已消耗完可用内存并需要更多空间时，临时表空间会被用作磁盘上的排序区域。需要排序区域的操作包括：\n\n- 索引创建\n- SQL 排序操作\n-\
    \ 临时表和临时索引\n- 临时 LOB\n- 临时 B 树\n\n没有确切的公式来确定你的临时表空间大小是否合适。这取决于查询的数量和类型、索引构建操作、并行操作以及你的内存排序空间（程序全局区）的大小。你必须在数据库有负载时，使用解决方案部分中的某个查询来监控你的临时表空间，以确定其使用模式。\n\
    \n如果 Oracle 抛出 `ORA-01652` 错误，这表明你的临时表空间太小。然而，如果因为一次性事件（如大型索引构建）导致空间耗尽，Oracle\
    \ 也可能抛出此错误。你必须判断是一次性的索引构建还是消耗大量临时表空间排序空间的查询，值得为此增加空间。\n\n如果你确定需要增加空间，可以调整现有数据文件的大小，也可以添加一个新的数据文件。要调整临时表空间数据文件的大小，请使用\
    \ `ALTER DATABASE TEMPFILE...RESIZE` 语句。以下语句将一个临时数据文件的大小调整为 12 GB：\n\n```sql\n\
    alter database tempfile '/ora03/DWREP/temp03.dbf' resize 12g;\n```\n\n你可以按如下方式向临时表空间添加一个数据文件：\n\
    \n```sql\nalter tablespace temp add tempfile '/ora04/DWREP/temp04.dbf' size 2g;\n\
    ```\n\n## 显示表空间使用率\n\n### 问题\n\n你遇到了 `ORA-01653` “无法扩展表” 错误。你想查明每个表空间还剩多少空闲空间。\n\
    \n### 解决方案\n\n运行以下脚本以查看数据库中的空闲字节数和已分配字节数：\n\n```sql\nselect\n    a.tablespace_name\n\
    \    ,(f.bytes/a.bytes)*100 pct_free\n    ,f.bytes/1024/1024 mb_free\n    ,a.bytes/1024/1024\
    \ mb_allocated\nfrom\n    (select nvl(sum(bytes),0) bytes, x.tablespace_name\n\
    \    from dba_free_space y, dba_tablespaces x\n    where x.tablespace_name = y.tablespace_name(+)\n\
    \    and x.contents != 'TEMPORARY' and x.status != 'READ ONLY'\n    and x.tablespace_name\
    \ not like 'UNDO%'\n    group by x.tablespace_name) f,\n    (select sum(bytes)\
    \ bytes, tablespace_name\n    from dba_data_files\n    group by tablespace_name)\
    \ a\nwhere a.tablespace_name = f.tablespace_name\norder by 1;\n```\n\n以下是一些示例输出：\n\
    \n```\nTABLESPACE_NAME     PCT_FREE    MB_FREE MB_ALLOCATED\n--------------- -------------\
    \ ---------- ------------\nDOWN_TBSP_9        79.1992188       8110        10240\n\
    DTS_STAGE_DATA           84.3        843         1000\nDTS_STAGE_INDEX       \
    \   96.7        967         1000\nINST_TBSP_1              96.8        484   \
    \       500\n```\n\n### 工作原理\n"
- fmt: "# 监控表空间的剩余空间\n\n监控表空间的剩余空间是数据库管理员的一项基本活动。您可以使用表空间数据文件的 AUTOEXTEND 功能，该功能允许数据文件根据需要增长空间。一些\
    \ DBA 不愿意使用 AUTOEXTEND 功能，因为担心某个包含大量事务的失控进程会导致数据文件填满现有的磁盘空间。如果您没有为数据文件启用 AUTOEXTEND，则需要使用类似本解决方案中提供的脚本来监控表空间。\n\
    \n有时在对数据库执行物理文件维护时，列出与数据库关联的所有文件很有用。在这些情况下，您需要一个能显示数据文件、控制文件和在线重做日志文件的脚本。这在生产支持场景中尤其重要，例如当某个表空间即将写满，而您希望向与该表空间关联的众多数据文件之一添加空间时。\n\
    \n下一个脚本允许您快速识别即将写满的表空间以及哪些数据文件是扩展空间的候选对象。这里我们使用了许多 SQL*Plus 格式化命令以使输出易于阅读：\n\n\
    ```sql\nREM *****************************************************\nREM * File\
    \ : freesp.sql\nREM *****************************************************\n\n\
    SET PAGESIZE 100 LINES 132 ECHO OFF VERIFY OFF FEEDB OFF SPACE 1 TRIMSP ON\n\n\
    COMPUTE SUM OF a_byt t_byt f_byt ON REPORT\n\nBREAK ON REPORT ON tablespace_name\
    \ ON pf\n\nCOL tablespace_name FOR A17 TRU HEAD 'Tablespace|Name'\nCOL file_name\
    \ FOR A40 TRU HEAD 'Filename'\nCOL a_byt FOR 9,990.999 HEAD 'Allocated|GB'\nCOL\
    \ t_byt FOR 9,990.999 HEAD 'Current|Used GB'\nCOL f_byt FOR 9,990.999 HEAD 'Current|Free\
    \ GB'\nCOL pct_free FOR 990.0 HEAD 'File %|Free'\nCOL pf FOR 990.0 HEAD 'Tbsp\
    \ %|Free'\nCOL seq NOPRINT\n\nDEFINE b_div=1073741824\n--\n\nCOL db_name NEW_VALUE\
    \ h_db_name NOPRINT\nCOL db_date NEW_VALUE h_db_date NOPRINT\n\nSELECT name db_name,\
    \ TO_CHAR(sysdate,'YYYY_MM_DD') db_date FROM v$database;\n--\n\nSPO &&h_db_name._&&h_db_date..lis\n\
    \nPROMPT Database: &&h_db_name, Date: &&h_db_date\n--\n\nSELECT 1 seq, b.tablespace_name,\
    \ nvl(x.fs,0)/y.ap*100 pf, b.file_name file_name, b.bytes/&&b_div a_byt, NVL((b.bytes-SUM(f.bytes))/&&b_div,b.bytes/&&b_div)\
    \ t_byt, NVL(SUM(f.bytes)/&&b_div,0) f_byt, NVL(SUM(f.bytes)/b.bytes*100,0) pct_free\
    \ FROM dba_free_space f, dba_data_files b\n,(SELECT y.tablespace_name, SUM(y.bytes)\
    \ fs\n  FROM dba_free_space y GROUP BY y.tablespace_name) x\n,(SELECT x.tablespace_name,\
    \ SUM(x.bytes) ap\n  FROM dba_data_files x GROUP BY x.tablespace_name) y\nWHERE\
    \ f.file_id(+) = b.file_id\nAND x.tablespace_name(+) = y.tablespace_name\nand\
    \ y.tablespace_name = b.tablespace_name\nAND f.tablespace_name(+) = b.tablespace_name\n\
    GROUP BY b.tablespace_name, nvl(x.fs,0)/y.ap*100, b.file_name, b.bytes\nUNION\n\
    SELECT 2 seq, tablespace_name, j.bf/k.bb*100 pf, b.name file_name, b.bytes/&&b_div\
    \ a_byt, a.bytes_used/&&b_div t_byt, a.bytes_free/&&b_div f_byt, a.bytes_free/b.bytes*100\
    \ pct_free\nFROM v$temp_space_header a, v$tempfile b\n,(SELECT SUM(bytes_free)\
    \ bf FROM v$temp_space_header) j\n,(SELECT SUM(bytes) bb FROM v$tempfile) k\n\
    WHERE a.file_id = b.file#\nORDER BY 1,2,4,3;\n--\n\nCOLUMN name FORMAT A60 HEAD\
    \ 'Control Files'\n\nSELECT name FROM v$controlfile;\n--\n\nCOL member FORMAT\
    \ A50 HEAD 'Redo log files'\nCOL status FORMAT A9 HEAD 'Status'\nCOL archived\
    \ FORMAT A10 HEAD 'Archived'\n--\n\nSELECT\na.group#, a.member, b.status,\nb.archived,\
    \ SUM(b.bytes)/1024/1024 mb\nFROM v$logfile a, v$log b\nWHERE a.group# = b.group#\n\
    GROUP BY a.group#, a.member, b.status, b.archived\nORDER BY 1, 2;\n--\n\nSPO OFF;\n\
    ```\n\n该脚本将输出假脱机到一个文件中，文件名嵌入了数据库名称和日期。\n\n例如，如果您在 2009 年 7 月 22 日为名为 `DW11` 的数据库运行该脚本，输出文件将被命名为\
    \ `DW11_2009_07_22.lis`。该脚本还使用了一个 `B_DIV` 参数，将所有字节列除以值 `1073741824`，这使得输出以千兆字节为单位显示。"
  raw: 'Monitoring a tablespace for freespace is a basic activity of a database administrator.
    You can use the AUTOEXTEND feature for tablespace datafiles, which allows a datafile
    to grow as it needs space. Some DBAs are reluctant to use the AUTOEXTEND feature
    for fear of a runaway process with many transactions that causes a datafile to
    fill up the existing disk space. If you’re not using AUTOEXTEND for your datafiles,
    you’ll need to monitor the tablespaces with a script such as the one in the solution
    section of this recipe.


    Sometimes when you’re performing physical file maintenance on a database, it’s
    useful to list all of the files associated with your database. In these situations
    you’ll need a script that displays datafiles, control files and online redo log
    files. This is particularly true in production support situations where you may
    have a tablespace that is getting full and you want to add space to one of the
    many datafiles associated with a tablespace.


    This next script allows you to quickly identify tablespaces that are getting full
    and which datafiles are candidates for more space. We use many SQL*Plus formatting
    commands here to make the output readable:


    REM *****************************************************


    REM * File : freesp.sql


    REM *****************************************************


    SET PAGESIZE 100 LINES 132 ECHO OFF VERIFY OFF FEEDB OFF SPACE 1 TRIMSP ON


    COMPUTE SUM OF a_byt t_byt f_byt ON REPORT


    BREAK ON REPORT ON tablespace_name ON pf


    COL tablespace_name FOR A17 TRU HEAD ''Tablespace|Name''


    COL file_name FOR A40 TRU HEAD ''Filename''


    COL a_byt FOR 9,990.999 HEAD ''Allocated|GB''


    COL t_byt FOR 9,990.999 HEAD ''Current|Used GB''


    COL f_byt FOR 9,990.999 HEAD ''Current|Free GB''


    COL pct_free FOR 990.0 HEAD ''File %|Free''


    COL pf FOR 990.0 HEAD ''Tbsp %|Free''


    COL seq NOPRINT


    DEFINE b_div=1073741824


    --


    COL db_name NEW_VALUE h_db_name NOPRINT


    COL db_date NEW_VALUE h_db_date NOPRINT


    SELECT name db_name, TO_CHAR(sysdate,''YYYY_MM_DD'') db_date FROM v$database;


    --


    SPO &&h_db_name._&&h_db_date..lis


    PROMPT Database: &&h_db_name, Date: &&h_db_date


    --


    SELECT 1 seq, b.tablespace_name, nvl(x.fs,0)/y.ap*100 pf, b.file_name file_name,
    b.bytes/&&b_div a_byt, NVL((b.bytes-SUM(f.bytes))/&&b_div,b.bytes/&&b_div) t_byt,
    NVL(SUM(f.bytes)/&&b_div,0) f_byt, NVL(SUM(f.bytes)/b.bytes*100,0) pct_free FROM
    dba_free_space f, dba_data_files b


    ,(SELECT y.tablespace_name, SUM(y.bytes) fs


    FROM dba_free_space y GROUP BY y.tablespace_name) x


    ,(SELECT x.tablespace_name, SUM(x.bytes) ap


    FROM dba_data_files x GROUP BY x.tablespace_name) y


    WHERE f.file_id(+) = b.file_id


    AND x.tablespace_name(+) = y.tablespace_name


    and y.tablespace_name = b.tablespace_name


    AND f.tablespace_name(+) = b.tablespace_name


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 20 ■ DATABASE TROUBLESHOOTING


    GROUP BY b.tablespace_name, nvl(x.fs,0)/y.ap*100, b.file_name, b.bytes UNION


    SELECT 2 seq, tablespace_name, j.bf/k.bb*100 pf, b.name file_name, b.bytes/&&b_div
    a_byt, a.bytes_used/&&b_div t_byt, a.bytes_free/&&b_div f_byt, a.bytes_free/b.bytes*100
    pct_free


    FROM v$temp_space_header a, v$tempfile b


    ,(SELECT SUM(bytes_free) bf FROM v$temp_space_header) j


    ,(SELECT SUM(bytes) bb FROM v$tempfile) k


    WHERE a.file_id = b.file#


    ORDER BY 1,2,4,3;


    --


    COLUMN name FORMAT A60 HEAD ''Control Files''


    SELECT name FROM v$controlfile;


    --


    COL member FORMAT A50 HEAD ''Redo log files''


    COL status FORMAT A9 HEAD ''Status''


    COL archived FORMAT A10 HEAD ''Archived''


    --


    SELECT


    a.group#, a.member, b.status,


    b.archived, SUM(b.bytes)/1024/1024 mb


    FROM v$logfile a, v$log b


    WHERE a.group# = b.group#


    GROUP BY a.group#, a.member, b.status, b.archived


    ORDER BY 1, 2;


    --


    SPO OFF;


    This script spools the output to a file with the database name and date embedded
    into the filename.


    For example, if you run the script on the 22nd of July in 2009 for the database
    named DW11, the output file will be named DW11_2009_07_22.lis. The script also
    uses a B_DIV parameter to divide all of the byte columns by a value of 1073741824,
    which results in the output being displayed in gigabytes.'
  trans: "\n# 监控表空间的剩余空间\n\n监控表空间的剩余空间是数据库管理员的一项基本活动。您可以使用表空间数据文件的 AUTOEXTEND 功能，该功能允许数据文件根据需要增长空间。一些\
    \ DBA 不愿意使用 AUTOEXTEND 功能，因为担心某个包含大量事务的失控进程会导致数据文件填满现有的磁盘空间。如果您没有为数据文件启用 AUTOEXTEND，则需要使用类似本解决方案中提供的脚本来监控表空间。\n\
    \n有时在对数据库执行物理文件维护时，列出与数据库关联的所有文件很有用。在这些情况下，您需要一个能显示数据文件、控制文件和在线重做日志文件的脚本。这在生产支持场景中尤其重要，例如当某个表空间即将写满，而您希望向与该表空间关联的众多数据文件之一添加空间时。\n\
    \n下一个脚本允许您快速识别即将写满的表空间以及哪些数据文件是扩展空间的候选对象。这里我们使用了许多 SQL*Plus 格式化命令以使输出易于阅读：\n\n\
    ```sql\nREM *****************************************************\nREM * File\
    \ : freesp.sql\nREM *****************************************************\n\n\
    SET PAGESIZE 100 LINES 132 ECHO OFF VERIFY OFF FEEDB OFF SPACE 1 TRIMSP ON\n\n\
    COMPUTE SUM OF a_byt t_byt f_byt ON REPORT\n\nBREAK ON REPORT ON tablespace_name\
    \ ON pf\n\nCOL tablespace_name FOR A17 TRU HEAD 'Tablespace|Name'\nCOL file_name\
    \ FOR A40 TRU HEAD 'Filename'\nCOL a_byt FOR 9,990.999 HEAD 'Allocated|GB'\nCOL\
    \ t_byt FOR 9,990.999 HEAD 'Current|Used GB'\nCOL f_byt FOR 9,990.999 HEAD 'Current|Free\
    \ GB'\nCOL pct_free FOR 990.0 HEAD 'File %|Free'\nCOL pf FOR 990.0 HEAD 'Tbsp\
    \ %|Free'\nCOL seq NOPRINT\n\nDEFINE b_div=1073741824\n--\n\nCOL db_name NEW_VALUE\
    \ h_db_name NOPRINT\nCOL db_date NEW_VALUE h_db_date NOPRINT\n\nSELECT name db_name,\
    \ TO_CHAR(sysdate,'YYYY_MM_DD') db_date FROM v$database;\n--\n\nSPO &&h_db_name._&&h_db_date..lis\n\
    \nPROMPT Database: &&h_db_name, Date: &&h_db_date\n--\n\nSELECT 1 seq, b.tablespace_name,\
    \ nvl(x.fs,0)/y.ap*100 pf, b.file_name file_name, b.bytes/&&b_div a_byt, NVL((b.bytes-SUM(f.bytes))/&&b_div,b.bytes/&&b_div)\
    \ t_byt, NVL(SUM(f.bytes)/&&b_div,0) f_byt, NVL(SUM(f.bytes)/b.bytes*100,0) pct_free\
    \ FROM dba_free_space f, dba_data_files b\n,(SELECT y.tablespace_name, SUM(y.bytes)\
    \ fs\n  FROM dba_free_space y GROUP BY y.tablespace_name) x\n,(SELECT x.tablespace_name,\
    \ SUM(x.bytes) ap\n  FROM dba_data_files x GROUP BY x.tablespace_name) y\nWHERE\
    \ f.file_id(+) = b.file_id\nAND x.tablespace_name(+) = y.tablespace_name\nand\
    \ y.tablespace_name = b.tablespace_name\nAND f.tablespace_name(+) = b.tablespace_name\n\
    GROUP BY b.tablespace_name, nvl(x.fs,0)/y.ap*100, b.file_name, b.bytes\nUNION\n\
    SELECT 2 seq, tablespace_name, j.bf/k.bb*100 pf, b.name file_name, b.bytes/&&b_div\
    \ a_byt, a.bytes_used/&&b_div t_byt, a.bytes_free/&&b_div f_byt, a.bytes_free/b.bytes*100\
    \ pct_free\nFROM v$temp_space_header a, v$tempfile b\n,(SELECT SUM(bytes_free)\
    \ bf FROM v$temp_space_header) j\n,(SELECT SUM(bytes) bb FROM v$tempfile) k\n\
    WHERE a.file_id = b.file#\nORDER BY 1,2,4,3;\n--\n\nCOLUMN name FORMAT A60 HEAD\
    \ 'Control Files'\n\nSELECT name FROM v$controlfile;\n--\n\nCOL member FORMAT\
    \ A50 HEAD 'Redo log files'\nCOL status FORMAT A9 HEAD 'Status'\nCOL archived\
    \ FORMAT A10 HEAD 'Archived'\n--\n\nSELECT\na.group#, a.member, b.status,\nb.archived,\
    \ SUM(b.bytes)/1024/1024 mb\nFROM v$logfile a, v$log b\nWHERE a.group# = b.group#\n\
    GROUP BY a.group#, a.member, b.status, b.archived\nORDER BY 1, 2;\n--\n\nSPO OFF;\n\
    ```\n\n该脚本将输出假脱机到一个文件中，文件名嵌入了数据库名称和日期。\n\n例如，如果您在 2009 年 7 月 22 日为名为 `DW11` 的数据库运行该脚本，输出文件将被命名为\
