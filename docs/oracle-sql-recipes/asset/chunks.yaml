  trans: "\n# 第 18 章 ■ 对象管理\n\n## 18-13. 在表中强制唯一行\n\n### 问题\n\n您需要确保输入数据库的数据符合特定的业务规则。例如，您需要确保不会在相同部门编号下误添加一个新部门。您希望使用\
    \ `PRIMARY KEY`（主键）约束来强制实现唯一性。\n\n### 解决方案\n\n在实施数据库时，您创建的大多数表都需要一个 `PRIMARY KEY`\
    \ 约束，以保证表中的每条记录都能被唯一标识。有多种技术可以为表添加主键约束。第一个示例在定义列的同时内联创建主键：\n\n```sql\ncreate table\
    \ dept(\n    dept_id number primary key,\n    dept_desc varchar2(30)\n);\n```\n\
    \n如果您从 `USER_CONSTRAINTS` 中查询 `CONSTRAINT_NAME`，您会注意到 Oracle 为该约束生成了一个晦涩的名称（类似\
    \ `SYS_C003682`）。使用以下语法可以显式地为主键约束命名：\n\n```sql\ncreate table dept(\n    dept_id\
    \ number constraint dept_pk primary key using index tablespace users,\n    dept_desc\
    \ varchar2(30)\n);\n```\n\n**注意** 当您创建主键约束时，Oracle 还会创建一个与约束同名的唯一索引。\n\n您也可以在列定义之后指定主键约束定义。这样做的好处是您可以在多个列上定义约束。下一个示例在创建表时创建主键，但不是内联于列定义：\n\
    \n```sql\ncreate table dept(\n    dept_id number,\n    dept_desc varchar2(30),\n\
    \    constraint dept_pk primary key (dept_id)\n    using index tablespace prod_index\n\
    );\n```\n\n如果表已经创建，而您想添加主键约束，请使用 `ALTER TABLE` 语句。此示例在 `DEPT` 表的 `DEPT_ID` 列上放置一个主键约束：\n\
    \n```sql\nalter table dept add constraint dept_pk primary key (dept_id)\nusing\
    \ index tablespace users;\n```\n\n当启用主键约束时，Oracle 会自动创建一个与主键约束关联的唯一索引。一些 DBA 更喜欢先在主键列上创建一个非唯一索引，然后再定义主键约束：\n\
    \n```sql\ncreate index dept_pk on dept(dept_id);\n\nalter table dept add constraint\
    \ dept_pk primary key (dept_id);\n```\n\n这种方法的优势在于，您可以独立于索引删除或禁用主键约束。在处理大型数据集时，您可能需要这种灵活性。如果您在创建主键约束之前没有创建索引，那么每当您删除或禁用主键约束时，索引也会被自动删除。\n\
    \n对于使用哪种方法创建主键感到困惑？所有方法都是有效的，各有优点。下表总结了主键和唯一键约束的创建方法。\n\n```text\n**表 18-1. 主键和唯一键约束创建方法**\n\
    \n**约束创建方法** | **优点** | **缺点**\n--- | --- | ---\n内联，无名称 | 非常简单 | Oracle 生成的名称使故障排查更难；对存储属性的控制较少；仅应用于单列\n\
    内联，有名称 | 简单；用户定义的名称使故障排查更容易 | 比内联无名称需要更多考虑\n内联，有名称和表空间 | 完全控制约束和索引的命名及存储 | 语法更复杂\n\
    ```\n\n注意 `SELECT` 语句中带有两个点的 `&&MASTER_USER` 变量。在 & 符号变量末尾的单个点指示 `SQL*Plus` 将单个点后的任何内容连接到该\
    \ & 符号变量。因此，当您将两个点放在一起时，就告诉 `SQL*Plus` 将一个单点连接到 & 符号变量包含的字符串。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n"
- fmt: "# CHAPTER 18 ■ OBJECT MANAGEMENT\n\n## Comparison of Constraint Definition\
    \ Methods\n\n- User-defined name and tablespace; Less simple; Definition makes\
    \ troubleshooting easier.\n- After column definition (out of line): can operate\
    \ on multiple columns.\n- `ALTER TABLE add just constraint`: Separation of index\
    \ and constraint; More complicated.\n- Manage constraints in separate statements\
    \ (and files) from table creation scripts; can operate on multiple columns.\n\
    - `CREATE INDEX`, `ALTER TABLE add constraint`: Most complicated, more to maintain,\
    \ more moving parts; so you can drop/disable constraints without affecting index;\
    \ can operate on multiple columns.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## How It Works\n\nPrimary key constraints are used to guarantee that each record\
    \ in a table can be uniquely identified. A common table design technique is to\
    \ create a non-meaningful numeric column to contain a unique system-generated\
    \ sequence number (also called a surrogate key). A primary key constraint is placed\
    \ on the surrogate key column to ensure its uniqueness.\n\nIn addition to a primary\
    \ key constraint, we also recommend that you place a unique key constraint on\
    \ the column(s) a business user would use to uniquely identify a record (also\
    \ called a logical key). Using both a surrogate key and logical key:\n- lets you\
    \ efficiently join parent and child tables on a single numeric column;\n- allows\
    \ updates to logical key columns without changing the surrogate key.\n\nA unique\
    \ key guarantees uniqueness on the defined columns within a table. There are some\
    \ subtle differences between primary key and unique constraints. You can define\
    \ only one primary key per table but there can be several unique keys. A primary\
    \ key does not allow a null value in any of its columns whereas a unique key allows\
    \ null values.\n\nAs with the primary key constraint, there are several methods\
    \ for creating a unique column constraint. This method uses the `UNIQUE` keyword\
    \ inline with the column:\n```sql\ncreate table dept(dept_id number, dept_desc\
    \ varchar2(30) unique);\n```\n\nIf you want to explicitly name the constraint,\
    \ use the `CONSTRAINT` keyword:\n```sql\ncreate table dept(dept_id number,\n \
    \   dept_desc varchar2(30) constraint dept_desc_uk1 unique);\n```\n\nYou can also\
    \ add the tablespace information inline to be used for the associated unique index\
    \ that is automatically created for unique constraints:\n```sql\ncreate table\
    \ dept(dept_id number,\n    dept_desc varchar2(30) constraint dept_desc_uk1\n\
    \    unique using index tablespace prod_index);\n```\n\n**Note:** When you create\
    \ a unique key constraint, Oracle will also create a unique index with the same\
    \ name as the constraint.\n\nAs with the primary key, the unique constraint can\
    \ be specified out of line from the column definitions:\n```sql\ncreate table\
    \ dept(dept_id number,\n    dept_desc varchar2(30),\n    constraint dept_desc_uk1\
    \ unique (dept_desc) using index tablespace prod_index);\n```\n\nYou can also\
    \ alter a table to include a unique constraint:\n```sql\nalter table dept add\
    \ constraint dept_desc_uk1 unique (dept_desc);\n```\n\nAnd you can create an index\
    \ on the columns of interest before you define a unique key constraint:\n```sql\n\
    create index dept_desc_uk1 on dept(dept_desc);\n\nalter table dept add constraint\
    \ dept_desc_uk1 unique(dept_desc);\n```\n\nThis can be helpful when working with\
    \ large data sets and you want to be able to disable or drop the unique constraint\
    \ without dropping the associated index.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 18-14. Ensuring Lookup Values Exist\n\n### Problem\n\nYou have a business\
    \ rule that states that a column must always be a value in a valid list of values.\
    \ For example, any `DEPT_ID` entered in the `EMP` table must always exist in the\
    \ master `DEPT` table.\n\n### Solution\n\nCreate a foreign key constraint to ensure\
    \ that a value entered into a foreign key column exists as a unique or primary\
    \ key value in the parent table. There are several methods for creating a foreign\
    \ key constraint. The following creates a foreign key constraint on the `DEPT_ID`\
    \ column in the `EMP` table:\n```sql\ncreate table emp(\n    emp_id number,\n\
    \    name varchar2(30),\n    dept_id constraint emp_dept_fk references dept(dept_id));\n\
    ```\n\nNotice that the `DEPT_ID` data type is not explicitly defined. It derives\
    \ the data type from the referenced `DEPT_ID` column of the `DEPT` table. You\
    \ can also explicitly specify the data type when defining a column (regardless\
    \ of the foreign key definition):\n```sql\ncreate table emp(\n    emp_id number,\n\
    \    name varchar2(30),\n    dept_id number constraint emp_dept_fk references\
    \ dept(dept_id));\n```\n\nThe foreign key definition can also be specified out\
    \ of line from the column definition in the `CREATE TABLE` statement:\n```sql\n\
    create table emp(\n    emp_id number,\n    name varchar2(30),\n    dept_id number,\n\
    \    constraint emp_dept_fk foreign key (dept_id) references dept(dept_id)\n);\n\
    ```\n\nYou can also alter an existing table to add a foreign key constraint:\n\
    ```sql\nalter table emp add constraint emp_dept_fk foreign key (dept_id)\n   \
    \ references dept(dept_id);\n```\n\n**Note:** Unlike with primary key and unique\
    \ key constraints, Oracle does not automatically add an index to the foreign key\
    \ column(s). You must explicitly create indexes on foreign key columns.\n\n###\
    \ How It Works\n\nForeign key constraints are used to ensure that a column value\
    \ is contained within a defined list of values. Using database constraints is\
    \ an efficient way of enforcing that data must be a predefined value before an\
    \ insert or update is allowed. Constraints are advantageous because once enabled,\
    \ there’s no way to enter data that violates a given constraint.\n\nThe foreign\
    \ key constraint is a technique that stores in a table the list of valid values.\
    \ This technique works well for the following scenarios:\n- Many entries in the\
    \ list of values\n- Other information about the lookup value needs to be stored\n\
    - Easy to select, insert, update, or delete values lookup via SQL\n\nFor example,\
    \ you may have a `STATES` lookup table that has columns such as `STATE_CODE`,\
    \ `STATE_NAME`, `STATE_DESC`, and `REGION`. Your business rule may be that you\
    \ have an `ADDRESSES` table that contains a `STATE_CODE` column and any values\
    \ entered in this column must exist in the `STATES` table. A separate table with\
    \ a foreign key constraint works well for this scenario.\n\nIf the condition you\
    \ want to check for is a small list that doesn’t change very often, consider using\
    \ a check constraint instead of a foreign key constraint (see recipe 18-15 for\
    \ details). For example, if you have a column that will always be defined to contain\
    \ either a `0` or a `1`, a check constraint is an efficient solution.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 18-15. Checking Data for a Condition\n\n### Problem\n\nYou have a business\
    \ rule that a column must contain the values of `0` or `1`. You want to ensure\
    \ that the business rule will not be violated.\n\n### Solution\n\nUse a check\
    \ integrity constraint to define a SQL check for a column. There are several methods\
    \ for creating a check constraint. For example, you can define a check constraint\
    \ when you create a table. The following defines that the `ST_FLG` column must\
    \ be either a `0` or a `1`:\n```sql\ncreate table emp(\n    emp_id number,\n \
    \   emp_name varchar2(30),\n    st_flg number(1) CHECK (st_flg in (0,1))\n);\n\
    ```\n\nA slightly better method is to give the check constraint a name:\n```sql\n\
    create table emp(\n    emp_id number,\n    emp_name varchar2(30),\n    st_flg\
    \ number(1) constraint st_flg_chk CHECK (st_flg in (0,1))\n);\n```\n\nA more descriptive\
    \ way to name the constraint would be to embed information in the constraint name\
    \ that actually describes the condition that was violated. For example:\n```sql\n\
    CREATE table emp(\n    emp_id number,\n    emp_name varchar2(30),\n    st_flg\
    \ number(1) constraint \"st_flg must be 0 or 1\" check (st_flg in (0,1))\n);\n\
    ```\n\nYou can also alter an existing column to include a constraint. The column\
    \ must not contain any values that violate the constraint being enabled:\n```sql\n\
    alter table emp add constraint \"st_flg must be 0 or 1\" check (st_flg in (0,1));\n\
    ```\n\n### How It Works"
