  trans: "# 6-14. 计算网站的“X 日活跃”用户\n\n## 问题\n你希望追踪过去七天内有多少独立的网站访客或客户。\n\n## 解决方案\nOracle\
    \ 的日期运算结合用于处理重复项的 `DISTINCT` 操作符，是追踪诸如七日或一月活跃用户等细节的完美工具。事实上，任何时长窗口都可以被追踪。主要的考虑是使该技术适应访客或客户数据的收集和存储方式。\n\
    \n在我们的示例中，将使用存储在 `SH.SALES` 表中的销售历史数据。它追踪简单的数据，如客户 ID、购买发生的日期和时间，以及使用的销售渠道。这模仿了许多网站为其购物车数据收集的内容。如果你希望追踪简单的访客，这类数据类似于追踪访客\
    \ IP 地址、请求页面以及请求日期和时间的网络服务器日志。\n\n使用以下 SQL 语句显示在 2001 年 12 月 31 日之前七天内有购买行为的客户。\n\
    \n```sql\nselect count(distinct cust_id) Seven_Day_Customers\nfrom sh.sales\n\
    where time_id > to_date('31-DEC-2001') - 7;\n```\n\n我们的结果表明在过去七天内下过订单的独立客户数量。\n\
    \n```\nSEVEN_DAY_CUSTOMERS\n-------------------\n                801\n```\n\n\
    ## 工作原理\nOracle 支持 `COUNT(DISTINCT …)` 聚合函数，使你能够统计具有数据的独立行。我们在 `SELECT` 子句中使用它来统计我们的独立客户。`WHERE`\
    \ 子句中的唯一标准用于控制我们的时间窗口。我们使用 `TIME_ID > TO_DATE('31-DEC-2001') - 7` 是编写此标准的简写方式。\n\
    \n```sql\nwhere time_id between to_date('24-DEC-2001') and to_date('31-DEC-2001')\n\
    ```\n\n这省去了我们编写嵌套子查询来首先查找唯一值，然后再用外部查询来统计这些唯一值的麻烦。这仍然是完全合法的 SQL，如果需要，我们可以编写我们的示例来使用嵌套子查询，如下面的\
    \ SQL 语句所示。\n\n```sql\nselect count(*) Seven_Day_Customers\nfrom\n  (select distinct\
    \ cust_id\n   from sh.sales\n   where time_id > to_date('31-DEC-2001') - 7\n \
    \ );\n```\n\n如果我们只是统计了在七天时间范围内出现的所有客户 ID，我们将会包括同一客户的重复购买，这不是我们问题陈述所要寻找的结果。\n\n\
    ```sql\nselect count(cust_id) Seven_Day_Sales\nfrom sh.sales\nwhere time_id >\
    \ to_date('31-DEC-2001') - 7;\n```\n\n```\nSEVEN_DAY_SALES\n---------------\n\
    \           4807\n```\n\n了解我们在该周内完成了 4807 笔销售是好事，但我们缺失了有多少独立客户购买了我们产品这一重要细节。\n\
    \n一个更通用的用于查找独立七日客户的示例版本将针对最新数据，基于使用从 `SYSDATE` 或 `CURRENT_DATE` 返回的当前日期。下一个语句展示了这种通用形式。\n\
    \n```sql\nselect count(distinct cust_id) Seven_Day_Customers\nfrom sh.sales\n\
    where time_id between sysdate and sysdate - 7;\n```\n\n请注意，如果你在 Oracle 示例 `SH`\
    \ 模式中的 `SH.SALES` 表上运行此语句，你不会看到任何返回的数据，因为该表中没有 2001 年之后的销售记录。然而，其适用性依然存在。\n\n\
    ## 注意\n因为我们使用的是 `COUNT` 聚合的 `COUNT(DISTINCT …)` 形式，我们 `不会` 统计在 `CUST_ID` 字段中遇到的\
    \ `NULL` 值。这在此时是一个有争议的问题，因为在 `SH.SALES` 表中 `CUST_ID` 字段没有这样的 `NULL` 值。然而，重要的是要记住，只有\
    \ `COUNT` 函数的 `COUNT(*)` 形式会统计 `NULL` 值。所有其他类型的 `COUNT` 都会忽略 `NULL` 值。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# 第 6 章 ■ 处理日期和时间值\n\n164\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 7 章"
- fmt: '# Strings


    Most likely, at least some of your database tables have some kind of string columns,
    whether they are `CHAR`, `VARCHAR2`, `CLOB`, or one of the equivalent multibyte
    versions. Once you have these columns in your tables, you generally have to do
    more than just display or capture the values in those columns. Thus, the focus
    of the recipes in this chapter is on searching, concatenating, and splitting string
    values in database columns.


    Oracle has many built-in functions to search and manipulate strings. The `INSTR`
    function searches for a specified string within a second string. You can start
    the search anywhere within the second string, and you can also search for a specific
    occurrence of the first string as well.


    To perform one-to-one substitutions of characters in a string, you can use the
    `TRANSLATE` function.


    The `REPLACE` function extends the functionality of `TRANSLATE` to find one or
    more occurrences of a specified string and replace them with a second string.


    To make string manipulation, searching, and extraction even easier for developers
    who typically use regular expressions in the Unix environment, Oracle provides
    the `REGEXP_REPLACE`, `REGEXP_SUBSTR`, and `REGEXP_INSTR` functions. They operate
    the same as the `REPLACE`, `SUBSTR`, and `INSTR` functions except that they allow
    you to specify the search or replacement pattern as a regular expression.


    We’ll cover all of these functions in the following recipes. However, no chapter
    on Oracle string usage would be complete without some tips on how to efficiently
    find the strings you’re looking for across all rows in the table, not just within
    a column of a single row. Therefore, we’ll provide a recipe to help speed up your
    queries that search for rows containing a string expression or use strings in
    your join conditions.


    ## CHAPTER 7 ■ STRINGS


    ### 7-1. Searching for a Substring


    #### Problem


    You want to search a string in a `VARCHAR2` or `CLOB` database table column for
    one or more occurrences of a specified string.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    #### Solution


    Use the `INSTR` function to find the specified string within the table column.
    Using `INSTR`, you can optionally specify a different starting place in the target
    string, as well as find the second, third, or any occurrence of the search string.


    The `INSTR` function returns the position in the string where the search string
    starts, otherwise it returns `0`. If you want to search for a string represented
    by a pattern (in other words, a regular expression), you can use `REGEXP_INSTR`
    instead.


    In this example, you want to search the `EMPLOYEES` table for any last names containing
    the string `ll` (two lowercase “l” characters) after the third position in the
    string. Here is the solution using `INSTR` with the position parameter:


    ```sql

    select employee_id, last_name, first_name

    from employees

    where instr(last_name,''ll'',4) > 0

    ;

    ```


    ```

    EMPLOYEE_ID LAST_NAME                 FIRST_NAME

    ---------------------- ------------------------- --------------------

    106 Pataballa              Valli

    145 Russell                John

    161 Sewall                 Sarath

    198 OConnell               Donald

    4 rows selected

    ```


    #### How It Works


    For each row in the table, the `INSTR` function checks for the first occurrence
    of the string `ll` starting at the fourth position in the `LAST_NAME` column.
    If the return value from `INSTR` returns `0`, then the string `ll` was not found
    starting at the fourth position in `LAST_NAME`.


    Oracle typically gives you many ways to solve a problem, and string searching
    and extraction is no exception. This recipe’s problem can also be solved using
    the `LIKE` clause as follows:


    ```sql

    select employee_id, last_name, first_name

    from employees

    where last_name like ''___%ll%'' -- three underscores

    ;

    ```


    The `LIKE` clause is a very limited implementation of pattern matching. `LIKE`
    supports pattern matching with two characters: `%` and `_`. The `%` character
    represents zero or more characters, and `_` represents exactly one character.
    This solution would return too many results if you left out the underscore characters;
    in that case, the `LIKE` clause would return all last names with `ll` anywhere
    in the string.'
  raw: '■ ■ ■


    **Strings**


    Most likely, at least some of your database tables have some kind of string columns,
    whether they are CHAR, VARCHAR2, CLOB, or one of the equivalent multibyte versions.
    Once you have these columns in your tables, you generally have to do more than
    just display or capture the values in those columns. Thus, the focus of the recipes
    in this chapter is on searching, concatenating, and splitting string values in
    database columns.


    Oracle has many built-in functions to search and manipulate strings. The INSTR
    function searches for a specified string within a second string. You can start
    the search anywhere within the second string, and you can also search for a specific
    occurrence of the first string as well.


    To perform one-to-one substitutions of characters in a string, you can use the
    TRANSLATE function.


    The REPLACE function extends the functionality of TRANSLATE to find one or more
    occurrences of a specified string and replace them with a second string.


    To make string manipulation, searching, and extraction even easier for developers
    who typically use regular expressions in the Unix environment, Oracle provides
    the REGEXP_REPLACE, REGEXP_SUBSTR, and REGEXP_INSTR functions. They operate the
    same as the REPLACE, SUBSTR, and INSTR functions except that they allow you to
    specify the search or replacement pattern as a regular expression.


    We’ll cover all of these functions in the following recipes. However, no chapter
    on Oracle string usage would be complete without some tips on how to efficiently
    find the strings you’re looking for across all rows in the table, not just within
    a column of a single row. Therefore, we’ll provide a recipe to help speed up your
    queries that search for rows containing a string expression or use strings in
    your join conditions.


    7-1\. Searching for a Substring


    Problem


    You want to search a string in a VARCHAR2 or CLOB database table column for one
    or more occurrences of a specified string.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 7 ■ STRINGS


    Solution


    Use the INSTR function to find the specified string within the table column. Using
    INSTR, you can optionally specify a different starting place in the target string,
    as well as find the second, third, or any occurrence of the search string.


    The INSTR function returns the position in the string where the search string
    starts, otherwise it returns 0\. If you want to search for a string represented
    by a pattern (in other words, a regular expression), you can use REGEXP_INSTR
    instead.


    In this example, you want to search the EMPLOYEES table for any last names containing
    the string ll (two lowercase “l” characters) after the third position in the string.
    Here is the solution using INSTR with the position parameter:


    select employee_id, last_name, first_name


    from employees


    where instr(last_name,''ll'',4) > 0


    ;


    EMPLOYEE_ID LAST_NAME FIRST_NAME


    ---------------------- ------------------------- --------------------


    106 Pataballa Valli


    145 Russell John


    161 Sewall Sarath


    198 OConnell Donald


    4 rows selected


    How It Works


    For each row in the table, the INSTR function checks for the first occurrence
    of the string ll starting at the fourth position in the LAST_NAME column. If the
    return value from INSTR returns 0, then the string ll was not found starting at
    the fourth position in LAST_NAME.


    Oracle typically gives you many ways to solve a problem, and string searching
    and extraction is no exception. This recipe’s problem can also be solved using
    the LIKE clause as follows: select employee_id, last_name, first_name


    from employees


    where last_name like ''___%ll%'' -- three underscores


    ;


    The LIKE clause is a *very* limited implementation of pattern matching. LIKE supports
    pattern matching with two characters: % and _. The % character represents zero
    or more characters, and _


    represents exactly one character. This solution would return too many results
    if you left out the underscore characters; in that case, the LIKE clause would
    return all last names with ll anywhere in the string.'
