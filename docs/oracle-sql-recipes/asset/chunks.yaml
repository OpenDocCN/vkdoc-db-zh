    to the current result row. It does this for as many times as we specify in the
    `LEVEL` clause, which in our recipe is 1000 times.


    So to begin with, Oracle links the `ROWNUM` value 1 to the first row, then links
    the `ROWNUM` 2 for level 2, and so on all the way to level 1000. At this point,
    our inline view has generated 1000 rows, with values from 1 to 1000.


    ## 9-1. Partially Rolling Back a Transaction


    ### Problem


    You have a group of DML statements that must all complete for your transaction
    to be successful, but you want the capability to roll back only the most recent
    statements and not all statements since the beginning of the transaction.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ### Solution


    Use the `SAVEPOINT` statement to create markers within the transaction. You can
    undo DML within the transaction to any `SAVEPOINT` created since the implicit
    or explicit beginning of the transaction. For example, you want to adjust salaries
    for several employees within department 100. Employee John Chen will get a raise
    of $1000 per month, and all other employees in the department will get smaller
    raises such that the total monthly salary for the department does not exceed $60,000.
    Here is the list of employees and the current total salary for department 100:


    ```sql

    select employee_id, last_name, first_name, salary

    from employees

    where department_id = 100;

    ```


    ```

    EMPLOYEE_ID LAST_NAME                 FIRST_NAME           SALARY

    ---------------------- ------------------------- -------------------- ---------

    108 Greenberg                 Nancy                9460

    109 Faviet                    Daniel               9460

    110 Chen                      John                 9460

    111 Sciarra                   Ismael               9460

    112 Urman                     Jose Manuel          9460

    113 Popp                      Luis                 9460

    6 rows selected

    ```


    The total salary for department 100 before any updates is as follows:


    ```sql

    select sum(salary)

    from employees

    where department_id = 100;

    ```


    ```

    SUM(SALARY)

    -----------

    56760

    1 rows selected

    ```


    Next, we will update Chen’s salary and create a `SAVEPOINT`:


    ```sql

    update employees

    set salary = salary + 1000

    where employee_id = 110;

    ```


    ```

    1 rows updated

    ```


    ```sql

    savepoint chen_salary;

    ```


    ```

    savepoint chen_salary succeeded.

    ```


    Next, we’ll update the rest of the salaries in department 100 and see if we’re
    still within the budget guidelines:


    ```sql

    update employees

    set salary = salary + 450

    where department_id = 100 and employee_id != 110;

    ```


    ```

    5 rows updated

    ```


    ```sql

    select sum(salary)

    from employees

    where department_id = 100;

    ```


    ```

    SUM(SALARY)

    -----------

    64110

    1 rows selected

    ```


    The total salary is over $60,000, so we need to lower the salary adjustment for
    all employees except for Chen. We’ll roll back the `UPDATE`s up to but not including
    the Chen salary adjustment:


    ```sql

    rollback to savepoint chen_salary;

    ```


    ```

    rollback to succeeded.

    ```


    Updating the remaining employees in department 100 by a lower amount ($400 instead
    of $450), we find that we’re within the total salary guidelines:


    ```sql

    update employees

    set salary = salary + 400

    where department_id = 100 and employee_id != 110;

    ```


    ```

    5 rows updated

    ```


    ```sql

    select sum(salary)

    from employees

    where department_id = 100;

    ```


    ```

    SUM(SALARY)

    -----------

    63760

    1 rows selected

    ```


    Finally, we’ll perform a `COMMIT` and look at the final salary totals:


    ```sql

    commit;

    ```


    ```

    commit succeeded.

    ```


    ```sql

    select employee_id, last_name, first_name, salary

    from employees

    where department_id = 100;

    ```


    ```

    EMPLOYEE_ID LAST_NAME                 FIRST_NAME           SALARY

    ---------------------- ------------------------- -------------------- ---------

    108 Greenberg                 Nancy                9860

    109 Faviet                    Daniel               9860

    110 Chen                      John                 10460

    111 Sciarra                   Ismael               9860

    112 Urman                     Jose Manuel          9860

    113 Popp                      Luis                 9860

    6 rows selected

    ```


    Note that Chen’s salary update remained intact, since we performed a `ROLLBACK`
    to a point in time (to a System Change Number or `SCN`) right after Chen’s update.


    ### How It Works


    A transaction begins when any of the following occurs:


    *   A session begins

    *   A `COMMIT` is executed

    *   A `ROLLBACK` is executed

    *   Any DDL (Data Definition Language) or DCL (Data Control Language) command
    is executed


    When a `ROLLBACK` is performed, all DDL commands are reversed to the beginning
    of the transaction, unless you specify a *savepoint* in the `ROLLBACK` command.
    A savepoint is a marker within a transaction that can divide a transaction into
    smaller parts that can incrementally be reversed, or rolled back, without rolling
    back the entire transaction.


    As mentioned in the recipe solution, a `SAVEPOINT` command assigns a label to
    a System Change Number (`SCN`). An `SCN` is created in the Oracle database every
    time any change is made to the database; an `SCN` is unique across the entire
    database.


    You can specify any name for a `SAVEPOINT` that follows Oracle object naming conventions.
    If you reuse a `SAVEPOINT` name within a transaction, the first `SAVEPOINT` with
    the same name is no longer accessible via a `ROLLBACK` command. After a `COMMIT`
    or a `ROLLBACK` without a `SAVEPOINT` name, all `SAVEPOINT`s are cleared and no
    longer accessible.


