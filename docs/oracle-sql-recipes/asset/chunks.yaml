    “Is there a relationship between two data items, and by extension, what items
    in one set are related to items in a second set?”


    The NOT EXISTS variant tests the converse, “Can it definitively be said that no
    relationship exists between two sets of data, based on a proposed criterion?”
    Each approach is referred to as correlation or a correlated subquery (literally,
    co-relation, sharing a relationship).


