    10-10\. Displaying Synonym Metadata


    Problem


    You want to display information regarding a synonym.


    Solution


    Use the following SQL to view synonym metadata for a user:


    **select**


    **synonym_name, table_owner, table_name, db_link**


    **from user_synonyms**


    **order by 1;**


    The ALL_SYNONYMS view will display all private synonyms, all public synonyms,
    and also any private synonyms owned by different users where you have select access
    to the underlying base table.


    You can display information for all private and public synonyms in your database
    by querying the DBA_SYNONYMS view.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 10 ■ DATA DICTIONARY


    How It Works


    The TABLE_NAME column in the DBA/ALL/USER_SYNONYMS views is a bit of a misnomer
    because TABLE_NAME


    can actually reference many types of database objects, such as another synonym,
    view, package, function, procedure, materialized view, and so on. Similarly, TABLE_OWNER
    refers to the owner of the object (and that object may not necessarily be a table).


    You can also use the GET_DDL function of the DBMS_METADATA package to display
    synonym metadata.


    You must pass the GET_DDL function the object type, name, and schema, for example:
    **select**


    **dbms_metadata.get_ddl(''SYNONYM'',''VDB'',''INV'')**


    **from dual;**


    When diagnosing data integrity issues, sometimes you’ll first want to identify
    what table or object is actually being accessed. You can select from what appears
    to be a table, but in reality it can be a synonym that points to a view that selects
    from a synonym that in turn points to a table in a different database.


    The following query is often a starting point for figuring out if an object is
    a synonym, view, or a table:


    **select**


    **owner**


    **,object_name**


    **,object_type**


    **,status**


    **from dba_objects**


    **where object_name like upper(''&object_name%'');**


    Notice that using the percent sign wildcard character in this query allows you
    to enter the partial name of the object. Therefore the query has the potential
    to return information regarding any object that partially matches the text string
    you enter.


