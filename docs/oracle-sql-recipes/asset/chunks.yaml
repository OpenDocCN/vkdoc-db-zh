    我们这些长期热心使用 `SQL*Plus` 的人都很欣赏它那种“复古”的格式化和美学处理方式——好吧，我们指的是带有 `Courier` 字体所能提供的所有美感的
    1980 年代风格的输出——但这有时会让解决方案，尤其是那些展示输出格式化技巧的解决方案，显得有些失色。多年来，Oracle 一直提供 `SQL Developer`，我们一直是它的热心用户。从
    Oracle Database 11g 开始，`SQL Developer` 已成为标准安装的一部分，因此您可能已经拥有它而不自知！我们很乐意您在处理这些解决方案时使用任何喜欢的工具，但如果您有任何疑虑，现在就开始使用
    `SQL Developer`，您会感到满意的。


    ## SQL 解决方案的示例数据


    在《Oracle SQL Recipes》中，我们将使用的许多示例都将利用 Oracle 作为每次安装的一部分提供的优秀示例模式——一直可以追溯到 Oracle
    Database 9i。古老的 `Scott` 模式已经不再使用，所以您可以忘记密码 `"tiger"`。取而代之的是以下六个模式，它们展示了 Oracle
    数据库的许多技术功能：


    - **`BI`**：商业智能模式是 Oracle Database 11g 的新特性，用于说明 Oracle 中日益增强的 BI 功能。该模式将吸引那些正在使用或考虑使用
    `OBIEE` 产品的用户。


    - **`HR`**：这是最基础的模式，模拟了非常常见的员工及其工作部门的概念。细心的读者会注意到，这其实就是旧的 `Scott` 模式演变而来的。


    - **`IX`**：信息交换模式展示了 Oracle 高级队列和 IPC 技术的能力。我们将在本书末尾探讨这一点。


    - **`OE`**：订单输入是另一个经典的示例模式，涉及销售、订单、订单项、客户等概念。任何处理过销售流程、零售系统或在线商务的人都会感到熟悉。Oracle
    已经增强了这个模式，以至于它还有自己的子模式，在线目录（`OC`），并且它们之间存在相当多的相互关系。


    - **`PM`**：在产品媒体模式中，Oracle 在多媒体对象操作方面的优势得到了突显。这包括用于大型对象操作的高级功能，我们将在第 16 章中探讨。'
- fmt: '**SH** Sales History is best thought of as a mini warehouse or datamart, perfect
    for exercising data mining, analytic, and other tools like cubes and rollups.


    We should warn you now that we will be taking many liberties with the sample data,
    changing it as well as the objects that house it, slicing and dicing and even
    deleting and destroying. Fear not, as by the time you''ve finished the book, you''ll
    be happily doing the same to more than just the sample schemata.


    xxiv


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # INTRODUCTION


    In a typical Oracle Database installation, the six sample schemata are installed
    if a full installation is performed through the Oracle Universal Installer. If
    this wasn''t done for the database you propose to use, don''t panic. You can add
    (or refresh) the sample schemata at any time by running the script `ORACLE_HOME/demo/schema/mksample`
    under Linux or Unix. Under Windows, the equivalent script is `%ORACLE_HOME%\demo\schema\mksample`.


    We recommend you rerun the Database Configuration Assistant to have it do the
    dirty work for you, as it will save you from having to search around for some
    of the obscure options for which the manual script will prompt.


    And if you really want to become an expert in sample data, you’ll be gratified
    to know that Oracle''s sample schema are now so large as to have a dedicated manual
    all to themselves. You can download the Oracle Database Sample Schemas 11g Release
    1 guide (complete with the incorrect plural “schemas”) from the Oracle documentation
    site at **http://www.oracle.com/docs**. The part number is B28328-03, and you''ll
    find both an HTML and Adobe Acrobat version of the material.


    ## Conventions


    Throughout the book, we’ve kept a consistent style for presenting SQL and results.
    Where a piece of code, a SQL reserved word or fragment of SQL is presented in
    the text, it is presented in fixed-width Courier font, such as this (working)
    example: `select * from dual;`


    Where we discuss the syntax and options of SQL commands, we’ve used a conversational
    style so you can quickly reach an understanding of the command or technique. This
    means we haven’t duplicated large syntax diagrams that better suit a reference
    manual.


    ## Contacting the Authors


    Should you have any questions or comments–or even spot a mistake you think we
    should know about–you can contact the authors via the book’s web site, at **www.oraclesqlrecipes.com**.
    To contact Bob Bryla directly, e-mail him at rjbdba@gmail.com.


    xxv


