- fmt: "## CHAPTER 3 ■ QUERYING FROM MULTIPLE TABLES\n\nUse a subquery with an aggregate,\
    \ and compare the employee’s salary to the average salary retrieved in the aggregate.\
    \ For example, this query uses a subquery to calculate the average salary for\
    \ employees outside of department 90, and compares every employee’s salary to\
    \ 80% of the result from the subquery:\n\n```sql\nselect employee_id, last_name,\
    \ first_name, salary\nfrom employees\nwhere salary < 0.8 * (\n    select avg(salary)\n\
    \    from employees\n    where department_id != 90\n);\n```\n\nEMPLOYEE_ID LAST_NAME\
    \ FIRST_NAME SALARY\n----------------- ------------------- --------------------\
    \ ----------------\n105 Austin David 4800\n106 Pataballa Valli 4800\n107 Lorentz\
    \ Diana 4200\n115 Khoo Alexander 3100\n. . .\n198 OConnell Donald 2600\n199 Grant\
    \ Douglas 2600\n200 Whalen Jennifer 4400\n49 rows selected\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n### How It Works\n\nThe presented solution returns one row in the subquery.\
    \ The Oracle optimizer calculates the average salary once, multiplies it by `0.8`,\
    \ and compares it to the salary of all other employees in the `EMPLOYEE` table\
    \ other than those in department `90` (the executive group).\n\nIf your subquery\
    \ returns more than one row, the main query will return an error since you are\
    \ using the `<` operator; operators such as `<`, `>`, `=`, `>=`, `<=`, and `!=`\
    \ compare a column’s or expression’s value to another single value. To compare\
    \ a value in the main query to a list of one or more values in a subquery, you\
    \ can use the `ANY` or `SOME` operator (they are equivalent) in the `WHERE` clause.\
    \ For example, if you wanted to return all employees whose salary matches any\
    \ of the employees in the executive department, you can do this:\n\n```sql\nselect\
    \ employee_id, last_name, first_name, salary\nfrom employees\nwhere salary = any\
    \ (\n    select salary\n    from employees\n    where department_id = 90\n);\n\
    ```\n\nYou can also use subqueries in the `HAVING` clause of a query that uses\
    \ aggregates. In this example, you can retrieve all departments and average salaries\
    \ whose average salary is greater than the average salary of the IT department:\n\
    \n```sql\nselect department_id, avg(salary) avg_salary\nfrom employees\ngroup\
    \ by department_id\nhaving avg(salary) > (\n    select avg(salary)\n    from employees\n\
    \    where department_id = 60\n);\n```\n\n# 3-8. Finding Missing Rows\n\n## Problem\n\
    \nYou have two tables, and you must find rows in the first table that are not\
    \ in the second table. You want to compare all rows in each table, not just a\
    \ subset of columns.\n\n## Solution\n\nUse the `MINUS` set operator. The `MINUS`\
    \ operator will return all rows in the first query that are not in the second\
    \ query. The `EMPLOYEES_BONUS` table contains employees who have been given bonuses\
    \ in the past, and you need to find employees in the `EMPLOYEES` table who have\
    \ not yet received bonuses. Use the `MINUS` operator as follows to compare three\
    \ selected columns from two tables:\n\n```sql\nselect employee_id, last_name,\
    \ first_name\nfrom employees\nminus\nselect employee_id, last_name, first_name\n\
    from employees_bonus;\n```\n\nEMPLOYEE_ID LAST_NAME FIRST_NAME\n----------------------\
    \ ------------------------- --------------------\n100 King Steven\n109 Faviet\
    \ Daniel\n110 Chen John\n120 Weiss Matthew\n140 Patel Joshua\n5 rows selected\n\
    \n## How It Works\n\nNote that unlike the `INTERSECT` and `UNION` operators, the\
    \ `MINUS` set operator is not commutative: the order of the operands (queries)\
    \ is important! Changing the order of the queries in the solution will produce\
    \ very different results.\n\nIf you wanted to note changes for the entire row,\
    \ you could use this query instead:\n\n```sql\nselect * from employees\nminus\n\
    select * from employees_bonus;\n```\n\nA Venn diagram may help to show how the\
    \ `MINUS` operator works. Figure 3-2 shows the result of Query1 MINUS Query2.\
    \ Any rows that overlap between Query1 and Query2 are removed from the result\
    \ set along with any rows in Query2 that do not overlap Query1. In other words,\
    \ only rows in Query1 are returned less any rows in Query1 that exist in Query2.\n\
    \n***Figure 3-2.** An Oracle MINUS operation*\n\n![Image 16](index-101_1.png)\n\
    \nRows in Query2 that do not exist in Query1 can be identified by reversing the\
    \ order of the operands in the query:\n\n```sql\nselect * from employees_bonus\n\
    minus\nselect * from employees;\n```\n\nWhat if Query2 is a proper subset of Query1?\
    \ In other words, all the rows in Query2 are already in Query1? The query still\
    \ works as advertised; `MINUS` only removes rows from Query1 that are in common\
    \ with Query2, and never returns any rows in Query2 that are not in Query1. Figure\
    \ 3-3 shows the Venn diagram for the scenario where Query2 is a proper subset\
    \ of Query1.\n\n***Figure 3-3.** An Oracle MINUS operation with proper subsets*\n\
    \nYou may ask why an outer join or an `IN`/`EXISTS` query might solve most problems\
    \ like this. For sets of tables with a single primary key, it may be more efficient\
    \ to use a join. However, for query results with a large number of columns or\
    \ for comparing entire rows of data even when the primary keys match, `MINUS`\
    \ is the more appropriate operator to use.\n\n# 3-9. Finding Rows that Tables\
    \ Do Not Have in Common\n\n## Problem\n\nYou want to find rows from two queries\
    \ or tables that the two queries or tables do NOT have in common.\n\nThe analysts\
    \ have provided you with Venn diagrams and the set notation for retrieving the\
    \ required data, so you must use a combination of Oracle set operators to retrieve\
    \ the desired result.\n\n## Solution\n\nUse aggregate functions and the `UNION\
    \ ALL` operator together in a compound query, parenthesizing for clarity and correctness.\
    \ For example, you want to find the list of employees that are in the `EMPLOYEES_ACT`\
    \ table but not in the `EMPLOYEES_NEW` table, and vice versa. Execute the following\
    \ queries to show the contents of each table and the results of using Oracle set\
    \ operators to find the unique rows in each table:\n\n```sql\nselect employee_id,\
    \ first_name, last_name\nfrom employees_act\norder by employee_id;\n```\n\nEMPLOYEE_ID\
    \ FIRST_NAME LAST_NAME\n---------------------- -------------------- -------------------------\n\
    102 Lex De Haan\n105 David Austin\n112 Jose Manuel Urman\n118 Guy Himuro\n119\
    \ Karen Colmenares\n205 Shelley Higgins\n6 rows selected\n\n```sql\nselect employee_id,\
    \ first_name, last_name\nfrom employees_new\norder by employee_id;\n```\n\nEMPLOYEE_ID\
    \ FIRST_NAME LAST_NAME\n---------------------- -------------------- -------------------------\n\
    101 Neena Kochhar\n105 David Austin\n112 Jose Manuel Urman\n171 William Smith\n\
    201 Michael Hartstein\n5 rows selected\n\n```sql\nselect employee_id, first_name,\
    \ last_name,\n       count(act_emp_src) act_emp_row_count,\n       count(new_emp_src)\
    \ new_emp_row_count\nfrom\n(\n    select ea.*, 1 act_emp_src, to_number(NULL)\
    \ new_emp_src\n    from employees_act ea\n    union all\n    select en.*, to_number(NULL)\
    \ act_emp_src, 1 new_emp_src\n    from employees_new en\n)\ngroup by employee_id,\
    \ first_name, last_name\nhaving count(act_emp_src) != count(new_emp_src);\n```\n\
    \n![Image 17](index-103_1.png)\n\nEMPLOYEE_ID FIRST_NAME LAST_NAME ACT_EMP_ROW_COUNT\
    \ NEW_EMP_ROW_COUNT\n----------- ----------- --------------- -----------------\
    \ -----------------\n101 Neena Kochhar 0 1\n205 Shelley Higgins 1 0\n102 Lex De\
    \ Haan 1 0\n171 William Smith 0 1\n201 Michael Hartstein 0 1\n118 Guy Himuro 1\
    \ 0\n119 Karen Colmenares 1 0\n7 rows selected\n\n## How It Works\n\nTo get the\
    \ correct result, you must first combine both result sets using `UNION ALL` in\
    \ the subquery, assigning a “tag” column to indicate where the row came from—the\
    \ first table or the second. Here, we use a “1”, but it would work fine with a\
    \ “2”, or an “X”."
