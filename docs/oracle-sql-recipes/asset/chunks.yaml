    \    para_context in t_list_of_strings)\n    return number,\n  member function\
    \ odciaggregateterminate\n    (self in t_list_of_strings,\n     final_list_to_return\
    \ out varchar2,\n     flags in number)\n    return number\n);\n/\n```\n\n我们将`STRING_LIST`参数限制在\
    \ 4000，尽管 PL/SQL 支持高达 32000，以确保我们不传递 Oracle 纯 SQL 所支持的阈值。这四个必需函数中的每一个都实现了将一组字符串聚合成一个列表的各个阶段。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 2 章 ■ 汇总与聚合数据\n\n```sql\n\
    create or replace type body t_list_of_strings is\n  static function odciaggregateinitialize\n\
    \    (agg_context in out t_list_of_strings)\n    return number is\n  begin\n \
    \   agg_context := t_list_of_strings(null);\n    return odciconst.success;\n \
    \ end;\n\n  member function odciaggregateiterate\n    (self in out t_list_of_strings,\n\
    \     next_string_to_add in varchar2 )\n    return number is\n  begin\n    self.string_list\
    \ := self.string_list || ' , ' || next_string_to_add;\n    return odciconst.success;\n\
    \  end;\n\n  member function odciaggregatemerge\n    (self in out t_list_of_strings,\n\
    \     para_context in t_list_of_strings)\n    return number is\n  begin\n    self.string_list\
    \ := self.string_list || ' , ' || para_context.string_list;\n    return odciconst.success;\n\
    \  end;\n\n  member function odciaggregateterminate\n    (self in t_list_of_strings,\n\
    \     final_list_to_return out varchar2,\n     flags in number)\n    return number\
    \ is\n  begin\n    final_list_to_return := ltrim(rtrim(self.string_list, ' , '),\
    \ ' , ');\n    return odciconst.success;\n  end;\nend;\n/\n```\n\n有了类型和类型体，我们构建将在实际\
    \ SQL 语句中使用的函数来生成自定义聚合数据。\n\n```sql\ncreate or replace function string_to_list\n\
    \  (input_string varchar2)\n  return varchar2\n  parallel_enable\n  aggregate\
    \ using t_list_of_strings;\n/\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# 第 2 章 ■ 汇总与聚合数据\n\n我们现在可以使用我们的自定义聚合函数，从查询中生成的任何字符串集合或子集来构建列表。在此配方中，我们希望返回分配给特定经理的所有员工的姓氏。\n\
    \n```sql\nselect manager_id, string_to_list (last_name) as employee_list\nfrom\
    \ hr.employees\ngroup by manager_id;\n```\n\n我们的新自定义聚合函数奏效了，生成了类似列表输出的姓氏以及经理的\
    \ ID。\n\n```\nMANAGER_ID EMPLOYEE_LIST\n---------- ------------------------------------------------------------\n\
    \       100 Hartstein , Kochhar , De Haan , Fripp , Kaufling , Weiss ...\n   \
    \    101 Whalen , Greenberg , Higgins , Baer , Mavris\n       102 Hunold\n   \
    \    103 Ernst , Pataballa , Lorentz , Austin\n       108 Faviet , Chen , Sciarra\
    \ , Urman , Popp\n...\n```\n\n### 工作原理\n\n不要被跳转到 PL/SQL，或者配方的长度吓到。事实上，上面的大部分代码是\
    \ Oracle 提供的样板模板，旨在帮助快速轻松地构建自定义聚合。\n\n这个配方构建了创建自定义聚合所必需的三个组件，然后在 SQL 语句中使用它，按经理列出员工姓氏。首先，它定义了一个自定义类型，其中定义了\
    \ Oracle 对自定义聚合要求的四个规定函数。它们是：\n\n`ODCIAggregateInitialize`：此函数在处理最开始时被调用，并设置聚合类型的新实例——在我们的例子中是`T_LIST_OF_STRINGS`。这个新实例初始化了其成员变量（如果有），并为主聚合阶段做好准备。\n\
    \n`ODCIAggregateIterate`：此函数包含了自定义聚合的核心功能。此函数中的逻辑将为驱动查询中传递的每个数据值调用。在我们的例子中，这是获取每个字符串值并将其附加到现有字符串列表的逻辑。\n\
    \n`ODCIAggregateMerge`：这是一个半可选函数，用于控制 Oracle 的行为，如果 Oracle 决定并行执行聚合，使用多个并行从属进程处理部分数据。虽然你不必启用并行选项（见下文），但你仍然需要包含这个函数。在我们的例子中，如果我们的列表创建被拆分成并行任务，我们只需要在并行过程结束时连接子列表。\n\
    \n`ODCIAggregateTerminate`：这是最后一个函数，用于将结果返回给调用的 SQL 函数。在我们的例子中，它返回在迭代和并行合并阶段构建的全局变量`STRING_LIST`。\n\
    \n我们现在已经构建了聚合的机制。配方的下一部分构建了你可以调用以在数据上实际运行你强大的新聚合功能的函数。我们创建了一个具有许多你期望的常规特性的函数：\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 2 章 ■ 汇总与聚合数据\n\n```sql\n\
    create or replace function string_to_list\n  (input_string varchar2)\n  return\
    \ varchar2\n  parallel_enable\n  aggregate using t_list_of_strings;\n/\n```\n\n\
    该函数获得一个名称`STRING_TO_LIST`，它接受一个`VARCHAR2`字符串作为输入，并返回一个作为输出。到目前为止，非常普通。接下来的两行是我们配方聚合行为的关键。\n\
    \n`PARALLEL_ENABLE`子句是完全可选的，它指示 Oracle，如果优化器决定走那条路径，那么底层聚合逻辑可以安全地并行执行。根据你的`ODCIAGGREGATEITERATE`函数中的逻辑，你可能有必须按特定顺序执行的特定操作，因此希望避免并行。启用并行处理也意味着在`ODCIAGGREGATEMERGE`成员函数中具备处理合并结果子集的逻辑。\n"
- fmt: 'The `AGGREGATE USING T_LIST_OF_STRINGS` clause is where all the magic happens.
    This line instructs the function that it is aggregate in nature, and an object
    of type `T_LIST_OF_STRINGS` should be instantiated with the input parameter, kicking
    off the actual aggregation work.


    ■ Note Oracle only supports the creation of custom aggregate functions that take
    exactly one input parameter, and return exactly one output parameter. That’s why
    you don’t see any explicit instruction in our recipe to pass the `INPUT_STRING`
    parameter to the instantiated `T_LIST_OF_STRINGS` type, nor one mapping the return
    value from the `T_LIST_OF_STRINGS.ODCIAGGREGATETERMINATE` member function back
    to the return value of the `STRING_TO_LIST` function. They are the only things
    Oracle can do when it sees the aggregate clause, so they are implicit when you
    use the aggregate feature.


    From there, calling and use of the new `STRING_TO_LIST` function behaves much
    like any other aggregate function, like `AVG`, `MAX`, `MIN`, and so on.


    ## 2-11\. Accessing Values from Subsequent or Preceding Rows


    ### Problem


    You would like to query data to produce an ordered result, but you want to include
    calculations based on preceding and following rows in the result set. For instance,
    you want to perform calculations on event-style data based on events that occurred
    earlier and later in time.


    ### Solution


    Oracle supports the `LAG` and `LEAD` analytical functions to provide access to
    multiple rows in a table or expression, utilizing preceding/following logic—and
    you won’t need to resort to joining the source data 42


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA


    to itself. Our recipe assumes you are trying to tackle the business problem of
    visualizing the trend in hiring of staff over time. The `LAG` function can be
    used to see which employee’s hiring followed another, and also to calculate the
    elapsed time between hiring.


    ```

    select first_name, last_name, hire_date,

    lag(hire_date, 1, ''01-JUN-1987'') over (order by hire_date) as Prev_Hire_Date,

    hire_date - lag(hire_date, 1, ''01-JUN-1987'') over (order by hire_date) as Days_Between_Hires

    from hr.employees

    order by hire_date;

    ```


    Our query returns 107 rows, linking the employees in the order they were hired
    (though not necessarily preserving the implicit sort for display or other purposes),
    and showing the time delta between each joining the organization.


    FIRST_NAME LAST_NAME HIRE_DATE PREV_HIRE DAYS_BETWEEN

    ----------- ---------- --------- --------- ------------

    Steven King 17-JUN-87 01-JUN-87 16

    Jennifer Whalen 17-SEP-87 17-JUN-87 92

    Neena Kochhar 21-SEP-89 17-SEP-87 735

    Alexander Hunold 03-JAN-90 21-SEP-89 104

    Bruce Ernst 21-MAY-91 03-JAN-90 503

    ...

    David Lee 23-FEB-00 06-FEB-00 17

    Steven Markle 08-MAR-00 23-FEB-00 14

    Sundar Ande 24-MAR-00 08-MAR-00 16

    Amit Banda 21-APR-00 24-MAR-00 28

    Sundita Kumar 21-APR-00 21-APR-00 0


    107 rows selected.


    You can calculate for yourself the day differences to confirm the `LAG` function
    and difference arithmetic are indeed working as claimed. For instance, there really
    are 503 days between January 3, 1990 and May 21, 1991.


    ### How It Works


    The `LAG` and `LEAD` functions are like most other analytical and windowing functions
    in that they operate once the base non-analytic portion of the query is complete.
    Oracle performs a second pass over the intermediate result set to apply any analytical
    predicates. In effect, the non-analytic components are evaluated first, as if
    this query had been run.


    ```

    select first_name, last_name, hire_date

    -- placeholder for Prev_Hire_Date,

    -- placeholder for Days_Between_Hires

    from hr.employees;

    ```


    The results at this point would look like this if you could see them: 43


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 2 ■ SUMMARIZING AND AGGREGATING DATA'
