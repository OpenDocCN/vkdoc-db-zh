    How It Works


    The problem and solution in this recipe seem a bit contrived, but only because
    we want to use the HR.EMPLOYEES table that is available with any Oracle installation.
    Furthermore, some of the employee last names and first names have embedded blanks,
    and this will cause some complaining from Linux when the system administrator
    tries to create the directories. To fix that, all you need to add is a call to
    the TRANSLATE function to remove all occurrences of blank characters.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13 ■ TREE-STRUCTURED DATA


    This solution uses a number of hierarchical query features, just as in the previous
    recipe. In the employees table, the column MANAGER_ID is a foreign key to the
    row of the employee’s manager. Thus the requirement for this part of the SELECT
    statement:


    connect by prior employee_id = manager_id


    The CONNECT BY clause introduces the conditions for linking the root, parent,
    and child rows. In this example, the CONNECT BY clause connects the MANAGER_ID
    in the current row to the EMPLOYEE_ID in the parent row. You could rewrite that
    clause as follows, producing the same results: connect by manager_id = prior employee_id


    You will typically have only one PRIOR operator, but it is possible to have multiple
    PRIOR operators in the CONNECT BY clause if the linking conditions span more than
    one column. You can also use a filtering condition to limit the rows in the result
    set as we did in the first recipe of this chapter.


    You will rarely omit the PRIOR operator, as that is how Oracle links parent and
    child rows. Under some circumstances, you can leave out the PRIOR operator and
    only have a filter condition, as you will see in a recipe later in this chapter.


    The query uses START WITH to indicate where in the hierarchy to begin. If an employee
    has no manager (usually the boss or owner), then the MANAGER_ID column is NULL,
    thus START WITH MANAGER_ID


    IS NULL gives us the desired result. You could, however, start anywhere in the
    hierarchical structure based on the value of any other column in the table. In
    this example, you only want to show the hierarchy for Neena Kochhar and her employees:


    select


    sys_connect_by_path(lower(last_name)||''.''||lower(first_name),''/'') mgmt_path
    from employees


    start with last_name = ''Kochhar''


    connect by prior employee_id = manager_id


    ;


    MGMT_PATH


    /kochhar.neena


