- fmt: '■ **Caution** Obviously, you should be careful when dropping a database. You
    are *not* prompted when dropping the database and, as of this writing, there is
    no `UNDROP ACCIDENTALLY DROPPED DATABASE` command.


    ### How It Works


    Use *extreme* caution when dropping a database as this operation will remove datafiles,
    control files, and online redo log files.


    The `DROP DATABASE` command is useful when you have a database that needs to be
    removed. This could be a test database or an old database that is no longer used.


    The `DROP DATABASE` command will not remove old archive redo log files. You will
    need to manually remove those files with an operating system command (such as
    the `rm` in Linux/Unix or `DEL` at the Windows command prompt). You can also instruct
    `RMAN` to remove archive redo log files.


    ## 17-3. Verifying Connection Information


    ### Problem


    You’re running several `DDL` scripts as part of an application upgrade. You want
    to ensure you’re connected to the correct database environment before you issue
    commands.


    ### Solution


    The easiest way to verify your environment is to connect to the database and query
    the `V$DATABASE` view:


    ```

    select name from v$database;

    ```


    You can also run the `SHOW USER` command to quickly verify the schema you’re connected
    to the database as:


    ```

    SQL> show user;

    ```


    If you want your `SQL` prompt to display user and instance information, you can
    set it via the following command:


    ```

    SQL> set sqlprompt ''&_user.@&_connect_identifier.> ''

    ```


    Here’s an example of what your `SQL` command prompt might look like:


    ```

    SYS@RMDB11>

    ```


    If you want the prompt to change when you connect to the database as a different
    user, then add the previous line of code to either your `glogin.sql` file or your
    `login.sql` file. The `glogin.sql` file is usually located in the `ORACLE_HOME/sqlplus/admin`
    directory and will be run each time any user connects to `SQL*Plus`.


    If you only want the change to show when you connect to the database, create a
    `login.sql` in the directory you initiate `SQL*Plus` from, or ensure that the
    `login.sql` file is in a directory contained in your `SQLPATH` operating system
    environment variable.


    ### How It Works


    There are at least two aspects of ensuring that you are connected properly. First,
    you must make certain you’ve connected to the correct database. Next, you must
    ensure that you are connected to the proper user within that database. The solution
    shows how to verify both database and user. Having verified those, you can run
    your `DDL` script with confidence.


    Sometimes when deploying code through various development, test, and production
    environments, it’s handy to be prompted as to whether you’re in the right environment.
    The technique for accomplishing that requires two files: `answer_yes.sql` and
    `answer_no.sql`. Here are the contents of `answer_yes.sql`:


    ```

    -- answer_yes.sql


    PROMPT


    PROMPT Continuing...

    ```


    And here’s `answer_no.sql`:


    ```

    -- answer_no.sql


    PROMPT


    PROMPT Quitting and Discarding changes...


    ROLLBACK;


    EXIT;

    ```


    Now you can place the following code into the first part of a deployment script
    that will prompt you as to whether you’re in the right environment and if you
    want to continue:


    ```

    WHENEVER SQLERROR EXIT FAILURE ROLLBACK;


    WHENEVER OSERROR EXIT FAILURE ROLLBACK;


    SELECT name FROM v$database;


    SHOW user;


    SET ECHO OFF;


    PROMPT


    ACCEPT answer PROMPT ''Correct environment? Enter yes to continue: ''


    @@answer_&answer..sql

    ```


    If you type in `yes`, then the `answer_yes.sql` script will run and you will continue
    to run any other scripts you call. If you type in `no`, then the `answer_no.sql`
    script will run and you will exit from `SQL*Plus` and end up at the `OS` prompt.
    If you press `Enter` without typing either, you will also exit and wind up back
    at the `OS` prompt.


