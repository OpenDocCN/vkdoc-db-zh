    logic won’t work but because against large data sets, the optimizer can decided
    to repeatedly scan the inner data in full, which might affect performance. In
    our example, so long as a manager’s ID listed for a department is not found in
    the HR.EMPLOYEES table, the NOT EXISTS predicate will be satisfied, and department
    included in the results.


