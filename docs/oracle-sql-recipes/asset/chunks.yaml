    \ `UTL_FILE.FGETATTR` 来检查操作系统目录中是否存在 BFILE。\n\n使用存在的文件运行此过程如下所示：\n```sql\nbegin\n\
    \  load_bfile('LOB_SRC','Screen Capture.bmp');\nend;\n```\n输出：\n```\nWrote BFILE\
    \ pointer to table: Screen Capture.bmp\n```\n\n相反，尝试存储一个不存在的文件会产生以下输出：\n```sql\n\
    begin\n  load_bfile('LOB_SRC','Cake Boss.bmp');\nend;\n```\n输出：\n```\nBLOB Cake\
    \ Boss.bmp in directory LOB_SRC does not exist.\n```\n\n当你查询该表时，它会返回以下结果：\n```sql\n\
    select * from web_img2;\n```\n```\nIMG_NUM IMG_NM                 IMG_BLB INS_TS\n\
    ------- ------------------- ------- --------------------------------\n1      \
    \ Screen Capture.bmp   (BFILE) 13-JUN-09 10.43.16.737554000 PM\n```\n\n你可能想知道如何解码\
    \ `IMG_BLB` 列中引用的 BFILE 内容。`DBMS_LOB.FILEGETNAME` 过程也可以帮助你。这里是一个返回 Oracle 目录名称和目录内文件名的函数：\n\
    ```sql\ncreate or replace function get_bfile_attrs (bfile_obj in bfile)\nreturn\
    \ varchar2 is\n  dir_alias varchar2(30);\n  file_name varchar2(100);\nbegin\n\
    \  dbms_lob.filegetname(bfile_obj, dir_alias, file_name);\n  return('BFILE: Directory='\
    \ || dir_alias || ' File=' || file_name);\nend;\n```\n```sql\nselect img_num,\
    \ img_nm, get_bfile_attrs(img_blb) from web_img2;\n```\n```\nIMG_NUM IMG_NM  \
    \               GET_BFILE_ATTRS(IMG_BLB)\n------- -------------------- --------------------------------------------------\n\
    1       Screen Capture.bmp   BFILE: Directory=LOB_SRC File=Screen Capture.bmp\n\
    ```\n你可以使用 `DBMS_LOB` 包将文件系统上的图像或 Word 文档复制到表中的 BLOB 或 CLOB 列；请参阅本章前面的配方。\n\n\
    ## 16-6\\. 删除或更新数据库表中的 LOB\n\n**问题**\n\n数据库表中的几个 LOB 要么已过时，要么需要替换。\n\n**解决方案**\n\
    \n要删除 LOB，你可以将 LOB 列的内容设置为 `EMPTY_CLOB()` 或 `EMPTY_BLOB()`，如本例所示：\n```sql\nupdate\
    \ web_img\nset img_blb = empty_blob()\nwhere img_num = 19;\n```\n\n虽然你也可以将列 `IMG_BLB`\
    \ 设置为 `NULL`，但必须在重新插入 LOB 到该列之前将其设置为 `EMPTY_CLOB()` 或 `EMPTY_BLOB()`。允许 LOB 列具有\
    \ `NULL` 值使其与可以具有 `NULL` 的其他列的使用保持一致：你可以将值未知的 LOB 列与具有零长度空 LOB 的 LOB 区分开来。\n\n\
    更新 LOB 列的值与更新空 LOB 列相同——检索 LOB 列的指针并使用 `DBMS_LOB` 来填充该列。如果你知道 LOB 的哪一部分需要替换，可以使用\
    \ `DBMS_LOB.COPY` 的其他参数。以下是 `DBMS_LOB.COPY` 的参数：\n```\nDBMS_LOB.COPY\n(\n  dest_lob\
    \    IN OUT NOCOPY BLOB, -- 要更新的 BLOB\n  src_lob     IN BLOB,           -- 包含新内容的\
    \ BLOB\n  amount      IN INTEGER,        -- 要复制的字节数\n  dest_offset IN INTEGER\
    \ := 1,   -- 在目标中的起始位置\n  src_offset  IN INTEGER := 1    -- 在源中的起始位置\n);\n```\n\
    正如你可能期望的那样，Oracle 为在源 LOB 和目标 LOB 中的起始位置提供了合理的默认值。\n\n以下是如何将新 LOB 的第 10 个字节开始的\
    \ 5000 个字节复制到现有 LOB 的第 125 个字节：\n```sql\ndbms_lob.copy (existing_blb, new_blb,\
    \ 5000, 125, 10);\n```\n\n更新 CLOB 使用相同的过程（它被重载了，就像许多其他 Oracle PL/SQL 过程一样），只是\
    \ `DEST_LOB` 和 `SRC_LOB` 是 `CLOB` 类型，并将从源字符集转换为目标字符集。\n\n**工作原理**\n\n由于其潜在的大小，大对象列（BLOB\
    \ 和 CLOB）在 `SELECT` 和 `DDL` 语句中有几个限制，包括以下内容：\n\n- LOB 不能用于 `SELECT DISTINCT`、`ORDER\
    \ BY` 或 `GROUP BY` 子句中\n- 你不能使用 LOB 列作为 `JOIN` 列\n- LOB 列不允许在 `UNION`、`INTERSECTION`\
    \ 和 `MINUS` 中\n- LOB 列不能有位图索引、唯一索引或 B 树索引——只能有基于函数的索引或域索引\n- LOB 列不能是主键\n"
- fmt: '# PART 5


    ## Administration


    ### Chapter 17: Database Administration


    *Database administration* refers to a wide variety of tasks that DBAs perform
    to ensure the availability, scalability, usability, and maintainability of a database
    management system. Entire books have been written on this topic. This chapter
    does not cover every aspect of SQL a DBA might use. Rather, its goal is to show
    you how to use SQL to perform the common database administrator tasks.


    Many of the tasks covered in this chapter can also be performed using graphical
    tools like Enterprise Manager. Graphical tools are excellent for quickly carrying
    out basic database administration tasks, especially if you’re not comfortable
    with running SQL commands directly. They are fine for most scenarios.


    However, you will eventually find yourself in a situation where you’ll need to
    implement a SQL feature that just doesn’t work with a graphical tool. For example,
    you may need to use some new aspect or special command syntax that isn’t available
    in the graphical tool. Or you may want to write a somewhat complicated script
    that has to run in batch mode. In such circumstances, you’ll need the SQL scripting
    skills required to perform the operation.


    ### The Five-command Rule


    One of us worked at a company where a junior DBA had recently been hired. When
    it came time for the junior DBA to be on call, the youngster fretted over whether
    the knowledge was there to perform database administration tasks in the production
    environment. One of the senior DBAs took the junior DBA aside and explained that
    there really are only five SQL commands you need to know to be a DBA:


    * `STARTUP`

    * `SHUTDOWN`

    * `RECOVER`

    * `ALTER DATABASE`

    * `ALTER SYSTEM`


    The senior DBA was being a bit facetious in stating that DBAs needed only a handful
    of SQL commands. Of course, DBAs also need to know how to backup and restore a
    database—among other tasks.


    Still, there is some truth to the five-command rule. The key is acquiring a solid
    foundation in Oracle database architecture, as well as the know-how to use SQL
    to interact with the database. When serious problems arise, SQL is the tool that
    a DBA uses to troubleshoot and fix problems. You must be knowledgeable about the
    basic commands a DBA uses, as well as how to look up commands for scenarios that
    fall outside of the basic SQL commands.


    ### 17-1. Creating a Database


    #### Problem


    You’ve just installed the Oracle binaries. You want to create a database.


    #### Solution


    Before you run a `CREATE DATABASE` command, you must connect to SQL*Plus and start
    your database in `NOMOUNT` mode:


    ```

    $ sqlplus / as sysdba

    SQL> startup nomount;

    ```


    Listed next is a typical Oracle `CREATE DATABASE` statement:


    ```

    create database invrep controlfile reuse

    maxlogfiles 16

    maxlogmembers 4

    maxdatafiles 1024

    maxinstances 1

    maxloghistory 680

    character set "UTF8"

    logfile group 1

    (''/ora01/oradata/INVREP/redo01a.log'',

    ''/ora01/oradata/INVREP/redo01b.log'') size 200m reuse,

    group 2

    (''/ora01/oradata/INVREP/redo02a.log'',

    ''/ora01/oradata/INVREP/redo02b.log'' ) size 200m reuse,

    group 3

    (''/ora01/oradata/INVREP/redo03a.log'',

    ''/ora01/oradata/INVREP/redo03b.log'' ) size 200m reuse

    datafile

    ''/ora01/oradata/INVREP/system01.dbf''

    size 500m

    reuse

    undo tablespace undotbs1 datafile

    ```


    Most of these restrictions seem reasonable considering the amount of overhead
    that would be required, for example, to make a LOB column a primary key. However,
    you can treat them as any other database column in other operations, such as updating
    a LOB column to another LOB column in the same table or another table, or setting
    the LOB column to a `NULL` or an empty value using `EMPTY_CLOB()`.


    LOBs can also be rolled back in a transaction, although the old version of the
    LOB is stored in the LOB segment instead of the undo tablespace.'
