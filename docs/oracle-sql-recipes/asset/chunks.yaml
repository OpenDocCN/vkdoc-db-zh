    available to transfer data is via HTTP (port 80).


    Figure 16-1 shows the desired data, its destination, and the roadblocks to moving
    the data from the source to the target.


    ***Figure 16-1.** Transferring LOBs between servers with firewall restrictions*
    Firewall restrictions on the network containing the image file server prevent
    any direct access to the image server from the database server, other than web
    page access on port 80 to a web server front end used to serve images on the source
    system. In other words, the only way to get images from the image server is via
    HTTP.


