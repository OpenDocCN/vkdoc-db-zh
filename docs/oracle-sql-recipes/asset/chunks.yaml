    \      $7,955.00\n2422     9            3167       54         39       $2,106.00\n\
    \n665 rows selected\n```\n\n`TO_CHAR` 函数也可用于将日期或时间戳列转换为更易读或非默认的格式；你甚至可以使用 `TO_CHAR`\
    \ 将国家字符集（`NCHAR`、`NVARCHAR2`、`NCLOB`）和 `CLOB` 的数据类型转换为数据库字符集，返回一个 `VARCHAR2`。\n\
    \n如果你的用户需要经常运行此查询，可以考虑创建一个数据库视图（`view`），这将使你的分析师和其他最终用户更容易访问数据。新视图将看起来像另一个表，比原始表多一列。使用\
    \ `CREATE VIEW` 语句在 `ORDER_ITEMS` 表上创建一个包含派生列的视图：\n\n```\ncreate view order_items_subtotal_vw\
    \ as\nselect order_id, line_item_id, product_id,\n       unit_price, quantity,\n\
    \       to_char(unit_price*quantity,'$9,999,999.99') line_total_price\nfrom order_items\n\
    ;\n```\n\n要从视图中访问表的列和派生列，请使用以下语法：\n\n```\nselect order_id, line_item_id, product_id,\n\
    \       unit_price, quantity, line_total_price\nfrom order_items_subtotal_vw;\n\
    ```\n\n下次你需要访问派生的 `LINE_TOTAL_PRICE` 列时，就不再需要记住计算过程或将总价格转换为货币格式的函数了！\n\n在这种场景下使用数据库视图很有用，但它向数据字典添加了另一个对象，因此如果基表发生变化（例如当你修改或删除\
    \ `UNIT_PRICE` 或 `QUANTITY` 列时），就会创建另一个维护点。如果你使用的是 Oracle Database 11*g* 或更高版本，可以使用一个称为**虚拟列**（`virtual\
    \ columns`）的功能，它本质上是在表定义本身内为派生列创建元数据。你可以在创建表时创建虚拟列，也可以像添加任何其他列一样稍后添加它。虚拟列定义本身不占用表中的空间；当你访问包含虚拟列的表时，它会动态计算。要向\
    \ `ORDER_ITEMS` 添加虚拟列 `LINE_TOTAL_PRICE`，请使用以下语法：\n\n```\nalter table order_items\n\
    add (line_total_price as (to_char(unit_price*quantity,'$9,999,999.99')));\n```\n\
    \n虚拟列看起来与表中的任何真实列一样，是一个常规列：\n\n```\ndescribe order_items;\n\nName            \
    \                          Null?    Type\n-----------------------------------------\
    \ -------- -----------------\nORDER_ID                                  NOT NULL\
    \ NUMBER(12)\nLINE_ITEM_ID                              NOT NULL NUMBER(3)\nPRODUCT_ID\
    \                                NOT NULL NUMBER(6)\nUNIT_PRICE              \
    \                           NUMBER(8,2)\nQUANTITY                            \
    \               NUMBER(8)\nLINE_TOTAL_PRICE                                  \
    \ VARCHAR2(14)\n\n6 rows selected\n```\n\n虚拟列的数据类型由虚拟列定义中计算结果的隐式决定；`LINE_TOTAL_PRICE`\
    \ 虚拟列中的表达式结果是一个最大宽度为 14 的字符串，因此虚拟列的数据类型是 `VARCHAR2(14)`。\n\n> **提示** 要查明某列是否是虚拟列，可以查询\
    \ `*_TAB_COLS` 数据字典视图的 `VIRTUAL_COLUMN` 列。\n\n使用虚拟列有许多优点，例如无需像上一个示例那样在表上创建视图。此外，你可以在虚拟列上创建索引并收集统计信息。以下是在前一个示例的虚拟列上创建索引的示例：\n\
    \n```\ncreate index ie1_order_items on order_items(line_total_price);\n```\n\n\
    > **注意** 对于不支持虚拟列的 Oracle 版本（Oracle Database 11*g* 之前），你可以通过在虚拟列使用的表达式上创建基于函数的索引来部分模拟虚拟列的索引功能。"
  raw: 'Also, your data might not be in the correct format or have erroneous values;
    you are obligated as a DBA or data analyst to ensure that the data is clean when
    it is entered into your database. Thus, there are some recipes in this chapter
    that will help you cleanse the data before it is stored in your database, or transform
    it to a format suitable for export to a downstream system.


    Finally, this chapter will provide some insight on how to generate random data
    for your database.


    For load testing, it is often useful to create a random distribution of data to
    thoroughly test execution paths in your application before going live.


    4-1\. Deriving New Columns


    Problem


    You don’t want to store redundant data in your database tables, but you want to
    be able to create totals, derived values, or alternate formats for columns within
    a row.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4 ■ CREATING AND DERIVING DATA


    Solution


    In your SELECT statements, apply Oracle built-in functions or create expressions
    on one or more columns in the table, creating a virtual column in the query results.
    For example, suppose you want to summarize total compensation for an employee,
    combining salary and commissions.


    In the sample tables included for the OE user from a default installation of Oracle,
    the ORDER_ITEMS


    table contains UNIT_PRICE and QUANTITY columns as follows:


    select * from order_items;


    ORDER_ID LINE_ITEM_ID PRODUCT_ID UNIT_PRICE QUANTITY


    --------- ------------ ---------- ---------- --------


    2423 7 3290 65 33


    2426 5 3252 25 29


    2427 7 2522 40 22


    2428 11 3173 86 28


    2429 10 3165 36 67


    . . .


    2418 6 3150 17 37


    2419 9 3167 54 81


    2420 10 3171 132 47


    2421 9 3155 43 185


    2422 9 3167 54 39


    665 rows selected


    To provide a line-item total in the query results, add an expression that multiplies
    unit price by quantity, as follows:


    select order_id, line_item_id, product_id,


    unit_price, quantity, unit_price*quantity line_total_price


    from order_items;


    ORDER_ID LINE_ITEM_ID PRODUCT_ID UNIT_PRICE QUANTITY LINE_TOTAL_PRICE


    --------- ------------ ---------- ---------- -------- ----------------


    2423 7 3290 65 33 2145


    2426 5 3252 25 29 725


    2427 7 2522 40 22 880


    2428 11 3173 86 28 2408


    2429 10 3165 36 67 2412


    . . .


    2418 6 3150 17 37 629


    2419 9 3167 54 81 4374


    2420 10 3171 132 47 6204


    2421 9 3155 43 185 7955


    2422 9 3167 54 39 2106


    665 rows selected


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4 ■ CREATING AND DERIVING DATA


    How It Works


    In a SELECT statement (or any DML statement, such as INSERT, UPDATE, or DELETE),
    you can reference any Oracle built-in function (or one of your own functions)
    on any or all columns in the statement. You can include aggregate functions such
    as SUM() and AVG() as well, as long as you include the non-aggregated columns
    in a GROUP BY clause.


    You can also nest your functions within a SELECT statement. The column LINE_TOTAL_PRICE
    contains the desired result, but is not formatted appropriately for displaying
    to a customer service representative or a customer. To improve the readability
    of the output, add the TO_CHAR function to the calculation already in the query
    as follows:


    select order_id, line_item_id, product_id,


    unit_price, quantity,


    **to_char(unit_price*quantity,''$9,999,999.99'')** line_total_price


    from order_items;


    ORDER_ID LINE_ITEM_ID PRODUCT_ID UNIT_PRICE QUANTITY LINE_TOTAL_PRICE


    --------- ------------ ---------- ---------- -------- ----------------


    2423 7 3290 65 33 $2,145.00


    2426 5 3252 25 29 $725.00


    2427 7 2522 40 22 $880.00


    2428 11 3173 86 28 $2,408.00


    2429 10 3165 36 67 $2,412.00


    . . .


    2418 6 3150 17 37 $629.00


    2419 9 3167 54 81 $4,374.00


    2420 10 3171 132 47 $6,204.00


    2421 9 3155 43 185 $7,955.00


    2422 9 3167 54 39 $2,106.00


    665 rows selected


    The TO_CHAR function can also be used to convert date or timestamp columns to
    a more readable or non-default format; you can even use TO_CHAR to convert data
    types in the national character set (NCHAR, NVARCHAR2, NCLOB) and CLOBs to the
    database character set, returning a VARCHAR2.


    If your users need to run this query often, you might consider creating a database
    *view,* which will make it even easier for your analysts and other end-users to
    access the data. The new view will look like another table with one more column
    than the original table. Use the CREATE VIEW statement to create a view on the
    ORDER_ITEMS table, including the derived column:


    **create view order_items_subtotal_vw as**


    select order_id, line_item_id, product_id,


    unit_price, quantity,


    to_char(unit_price*quantity,''$9,999,999.99'') line_total_price


    from order_items


    ;


    To access the table’s columns and the derived column from the view, use this syntax:
    select order_id, line_item_id, product_id,


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4 ■ CREATING AND DERIVING DATA


    unit_price, quantity, line_total_price


    from order_items_subtotal_vw;


    The next time you need to access the derived LINE_TOTAL_PRICE column, you don’t
    need to remember the calculations or the function you used to convert the total
    price to a currency format!


    Using a database view in this scenario is useful, but adds another object to the
    data dictionary and thus creates another maintenance point if the base table changes,
    as when you modify or remove the UNIT_PRICE or QUANTITY columns. If you are using
    Oracle Database 11 *g* or later, you can use a feature called *virtual columns*,
    which essentially creates the metadata for a derived column within the table definition
    itself. You can create a virtual column when you create a table, or add it later
    as you would any other column. The virtual column definition takes up no space
    in the table itself; it is calculated on the fly when you access the table containing
    the virtual column. To add the virtual column LINE_TOTAL_PRICE


    to ORDER_ITEMS, use this syntax:


    alter table order_items


    add (line_total_price as (to_char(unit_price*quantity,''$9,999,999.99''))); The
    virtual column appears to be a regular column like any of the real columns in
    the table: describe order_items;


    Name Null Type


    ------------------------------ -------- -----------------


    ORDER_ID NOT NULL NUMBER(12)


    LINE_ITEM_ID NOT NULL NUMBER(3)


    PRODUCT_ID NOT NULL NUMBER(6)


    UNIT_PRICE NUMBER(8,2)


    QUANTITY NUMBER(8)


    LINE_TOTAL_PRICE VARCHAR2(14)


    6 rows selected


    The data type of the virtual column is implied by the result of the calculation
    in the virtual column definition; the result of the expression in the LINE_TOTAL_PRICE
    virtual column is a character string with a maximum width of 14, thus the data
    type of the virtual column is VARCHAR2(14).


    ■ **Tip** To find out if a column is a virtual column, you can query the VIRTUAL_COLUMN
    column of the *_TAB_COLS


    data dictionary views.


    There are a number of advantages to using virtual columns, such not having to
    create a view on the table, as we did in the previous example. In addition, you
    can create indexes on virtual columns and collect statistics on them. Here is
    an example of creating an index on the virtual column from the previous example:


    create index ie1_order_items on order_items(line_total_price);


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 4 ■ CREATING AND DERIVING DATA


    ■ **Note** For versions of Oracle that do not support virtual columns (before
    Oracle Database 11 *g*), you can somewhat simulate the indexing feature of a virtual
    column by creating a function-based index on the expression used in the virtual
    column.'
