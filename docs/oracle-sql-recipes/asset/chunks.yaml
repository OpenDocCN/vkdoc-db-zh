    How It Works


    The V$SESSION_LONGOPS view displays the status of various database operations
    that have been running for longer than six seconds. To use V$SESSION_LONGOPS,
    you must use the cost-based optimizer and have the following in place:


    • TIMED_STATISTICS initialization parameter set to TRUE


    • Statistics generated for the objects in the query


    The V$SESSION_LONGOPS view gives you a rough idea of how long a currently running
    query has left to finish. In our experience, the results are not 100% accurate,
    so allow some fudge-factor time into what it reports.


