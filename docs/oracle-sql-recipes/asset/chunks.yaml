    **C H A P T E R 1 9**


    ■ ■ ■


    **SQL Monitoring and Tuning**


    SQL is the language used to create, retrieve, update, and delete (CRUD) data from
    databases. If your SQL


    statements are slow, the whole system suffers. Whether you’re a developer or a
    DBA, effectively tuning SQL is a critical job requirement. When troubleshooting
    performance issues, you must know how to identify and tune resource-intensive
    queries.


    A good developer must be familiar with query-tuning techniques. Ideally, developers
    will proactively evaluate queries for potential performance issues before they
    are deployed to production. In reality, bad SQL often makes it into production
    because it wasn’t adequately tested, or the test environment does not accurately
    reflect the production environment (in terms of hardware, data volumes, load on
    box, and so on). In scenarios where inefficient SQL is deployed, developers must
    be familiar with reactive techniques for identifying and fixing poorly performing
    queries.


    DBAs (who want to keep their jobs) must also be adept at identifying SQL queries
    that hog resources. The DBA is often the first person looked to when the database
    code is performing poorly.


    DBAs should also be able to help developers generate query execution plans and
    implement solutions to poorly performing SQL queries.


    Most application performance issues can be attributed to code ineffectively accessing
    the database.


    This could be in the form of SQL, PL/SQL, JDBC, and so on. This chapter focuses
    on techniques used to identify and tune resource-intensive SQL statements. If
    you are new to SQL, this chapter will lay the foundation for critical tuning skills.
    If you are already familiar with SQL, this chapter covers new features in Oracle
    related to SQL tuning. We start with basic tasks such as monitoring and identifying
    resource-intensive SQL statements and then progress to topics such as generating
    and interpreting a SQL'
