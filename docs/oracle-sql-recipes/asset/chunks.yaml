    The results indicate that after an order was recorded on the first of the month,
    no subsequent order was recorded until the 10th. Then a four-day gap followed
    to the 14th, and so on. An astute sales manager might well use this data to ask
    what the sales team was doing on those gap days, and why no orders came in!


    How It Works


    The query starts by using the WITH clause to name a subquery with an alias in
    an out-of-order fashion. The subquery is then referenced with an alias, in this
    case SALESDAYS.


    The SALESDAYS subquery calculates two fields. First, it uses the EXTRACT function
    to return the numeric day value from the ORDER_DATE date field, and labels this
    data as NEXT_SALE. The lag OLAP


    function is then used to calculate the number for the day in the month (again
    using the EXTRACT method) of the ORDER_DATE of the preceding row in the results,
    which becomes the PREV_SALE result value. This makes more sense when you visualize
    the output of just the subquery select statement select extract(day from order_date)
    next_sale,


    lag(extract(day from order_date),1,0)


    over (order by extract(day from order_date)) prev_sale


    from oe.orders


    where order_date between ''01-NOV-1999'' and ''30-NOV-1999''


