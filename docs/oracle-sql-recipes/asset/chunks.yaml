  trans: "\n# 第 16 章 ■ 大型对象\n\n## 16-2. 将图像数据加载到 BLOB 列\n\n### 问题\n\n你有各种 JPG、PNG、GIF\
    \ 和 BMP 图像文件需要在数据库中进行管理和备份，并且需要一种方法来执行初始加载到数据库中。\n\n### 解决方案\n\n加载二进制大对象比加载基于文本的大对象稍微简单一些。你不必担心字符集转换——或者根本无需关心字符集；一图胜千言，数据库中的一个图像文件意味着你不需要存储包含那一千个单词的等效文本文档！\n\
    \n为你的图像表的唯一标识符创建一个序列，以及表本身：\n\n```sql\ncreate sequence img_seq;\n\ncreate table\
    \ image\n(\n  img_num number,\n  img_nm varchar2(100),\n  img_blb blob,\n  ins_ts\
    \ timestamp\n);\n```\n\n接下来，运行一个匿名块，将图像`SCREEN CAPTURE.BMP`加载到你的数据库表中：\n\n```sql\n\
    declare\n  src_blb bfile; /* point to source BLOB on file system */\n  dst_blb\
    \ blob;  /* destination BLOB in table */\n  src_img_nm varchar2(100) := 'Screen\
    \ Capture.bmp';\n  src_offset integer := 1; /* where to start in the source BLOB\
    \ */\n  dst_offset integer := 1; /* where to start in the target BLOB */\nbegin\n\
    \  src_blb := bfilename('LOB_SRC',src_img_nm);\n  insert into image (img_num,\
    \ img_nm, img_blb, ins_ts)\n    values(img_seq.nextval, src_img_nm, empty_blob(),\
    \ systimestamp)\n    returning img_blb into dst_blb;\n  dbms_lob.open(src_blb,\
    \ dbms_lob.lob_readonly);\n  dbms_lob.loadblobfromfile\n  (\n    dest_lob => dst_blb,\n\
    \    src_bfile => src_blb,\n    amount => dbms_lob.lobmaxsize,\n    dest_offset\
    \ => dst_offset,\n    src_offset => src_offset\n  );\n  dbms_lob.close(src_blb);\n\
    \  commit;\n  dbms_output.put_line('Wrote BLOB to table: ' || src_img_nm);\nend;\n\
    ```\n\n### 工作原理\n\n将二进制对象加载到`BLOB`列中，与将文本文件加载到`CLOB`列中非常相似。\n\n然而，与文本文档不同，你很少会遇到只将图像文件的一部分复制到`BLOB`列的情况。这是由于大多数图像文件的结构特性决定的。你要么加载整个图像，要么完全不加载。\n\
    \n查询表`IMAGE`，你可以看到刚刚加载的图像文件的元数据：\n\n```sql\nselect img_num, img_nm, ins_ts, length(img_blb)\
    \ from image;\n```\n\n```\nIMG_NUM IMG_NM                  INS_TS            \
    \            LENGTH(IMG_BLB)\n------- ----------------------- -----------------------------\
    \ ---------------\n      1 Screen Capture.bmp     07-JUN-09 10.25.02.984755 PM\
    \           451638\n```\n\n为了进一步自动化这个过程（假设你处理的仍然是相对较少的对象），你可以创建一个存储过程来代替使用匿名过程。你的参数至少应包含要加载的文件名。以下是这样一个过程的示例：\n\
    \n```sql\ncreate or replace procedure load_blob ( src_img_nm in varchar2 )\nis\n\
    \  src_blb bfile; /* point to source BLOB on file system */\n  dst_blb blob; \
    \ /* destination BLOB in table */\n  src_offset integer := 1; /* where to start\
    \ in the source BLOB */\n  dst_offset integer := 1; /* where to start in the target\
    \ BLOB */\nbegin\n  ... /* same code as in the anonymous block version */\nend;\n\
    ```\n\n从另一个存储过程的循环或匿名块中调用该过程很容易。例如：\n\n```sql\nbegin\n  load_blob('Screen Capture.bmp');\n\
    end;\n```\n\n你也可以考虑对目录对象进行参数化，并为图像文件的描述创建一个新列并进行参数化。通常，文件名本身并不是图像内容的很好描述！\n\n\
    > **注意** 本方案使用了与本章开头`CLOB`示例相同的目录对象。正如你可能推断的那样，如果你不必担心字符转换，你可以将所有对象，无论是`CLOB`还是`BLOB`，都视为二进制对象来处理。\n\
    \n## 16-3. 使用 SQL*Loader 批量加载大型对象\n\n### 问题\n\n你想从本地文件系统加载数千个二进制对象，并希望尽量减少手动干预以及加载对象所需的时间。\n\
    \n### 解决方案\n\n之前的解决方案使用了 Oracle 目录对象和 PL/SQL 过程。如果二进制文件可以从 Oracle 客户端访问，你可以使用`SQL*Loader`轻松地加载`BLOB`。以下是一个名为`load_lobs.ctl`的`SQL*Loader`控制文件：\n\
    \n```\nload data\ninfile load_lobs.list\nappend into table image\nfields terminated\
    \ by ','\ntrailing nullcols\n(\n  img_num char,\n  img_nm char(100),\n  img_file_nm\
    \ filler char(100),\n  img_blb lobfile(img_file_nm) terminated by EOF,\n  ins_ts\
    \ \"systimestamp\"\n)\n```\n\n这是所引用的数据文件`load_lobs.list`，包含了`BLOB`的位置：\n\n```\n\
    101,Water Table Analysis,E:\\Download\\Docs2Load\\Water Table Analysis.doc\n102,My\
    \ Antiques,My Antiques.docx\n103,Screen Capture for Book,Screen Capture.bmp\n\
    ```\n\n你的`SQL*Loader`命令行将类似于这样：\n\n```\nsqlldr userid=rjb/rjb@recipes control=load_lobs.ctl\n\
    ```\n\n### 工作原理\n\n对`LOB`使用`SQL*Loader`与对传统数据类型使用`SQL*Loader`非常相似，区别在于`SQL*Loader`的`INFILE`包含一个指向文件系统中`LOB`位置的指针。\n\
    \n你像在典型的`SQL*Loader`作业中一样指定其他表列。然而，对于`BLOB`数据，你需要指定两列：`BLOB`的位置和表中将容纳该`BLOB`的列。在解决方案中，`IMG_FILE_NM`列被标记为`FILLER`，这意味着`IMG_FILE_NM`不是一个真实的列，而是在稍后加载`BLOB`数据时会被引用。包含`BLOB`列的`SQL*Loader`行如下：\n\
    \n```\nimg_blb lobfile(img_file_nm) terminated by EOF,\n```\n\n`LOBFILE`子句引用了包含文件系统中`BLOB`位置的`SQL*Loader`列。注意在例子中，你可以提供一个绝对文件位置（`E:\\\
    Download\\Docs2Load\\Water Table Analysis.doc`）或一个相对于你运行`SQL*Loader`的目录的文件名。\n\
    \n最后，子句`TERMINATED BY EOF`告诉`SQL*Loader`在文件结尾处停止读取`BLOB`。在其他场景中，你可能只想读取`CLOB`或`BLOB`的一部分，直到特定的分隔符，你可以用`TERMINATED\
    \ BY`子句中的一个常量以及一个可选的最大大小来指定，如下例所示：\n\n```\nparagraph_clb lobfile(chapter_file_nm)\
    \ char(2000) terminated by '[PARA]'\n```\n\n从解决方案中的`BLOB`被加载到`IMAGE`表后，表的内容如下所示：\n\
    \n```sql\nselect img_num, img_nm, ins_ts, length(img_blb) from image;\n```\n\n\
    ```\nIMG_NUM IMG_NM                  INS_TS                        LENGTH(IMG_BLB)\n\
    ------- ----------------------- ----------------------------- ---------------\n\
    \    101 Water Table Analysis    11-JUN-09 10.49.44.154432000 PM        76800\n\
    \    102 My Antiques            11-JUN-09 10.49.44.154432000 PM        78336\n\
    \    103 Screen Capture for Book 11-JUN-09 10.49.44.154432000 PM       451638\n\
    3 rows selected\n```\n\n正如你可能预期的那样，你可以在同一个`SQL*Loader`作业中加载多个`BLOB`和`CLOB`列，只需要确保你的`LOBFILE`定位器被定义为`FILLER`列（如果它们不是表中实际列的值）。\n\
    \n这种方法非常有效，即使客户端与数据库实例位于不同的平台上也是如此。在提供的解决方案中，客户端和`BLOB`对象位于 Microsoft Windows\
    \ 平台上（MS-Word 的`DOC`和`DOCX`文件本质上是二进制文件），而包含带有`BLOB`列的表的数据库则位于 Linux 平台上。请记住，当我们使用`BLOB`大型对象类型时，我们不必担心平台字符集转换问题。\n"
- fmt: "# CHAPTER 16 ■ LOBS\n\nWhether you use `SQL*Loader` or PL/SQL with directory\
    \ objects to load your `BLOB`s and `CLOB`s depends on a number of factors. If\
    \ you do not need any procedural logic to load your data and your developers are\
    \ more familiar with `SQL*Loader`, that may be the best option. `SQL*Loader` is\
    \ also a good choice if the data to be loaded is not accessible via Oracle directory\
    \ objects or if the data is not always available in the same file system location.\
    \ On the other hand, if the `LOB`s are on the same server as the Oracle database\
    \ and all of the directory objects are in place, loading the `LOB`s using PL/SQL\
    \ calls is more efficient than using `SQL*Loader` on a client workstation, which\
    \ must then copy the data from the source location to the client location and\
    \ then back to the database server.\n\n## 16-4\\. Accessing Large Objects Using\
    \ HTTP\n\n### Problem\n\nYou need to load `LOB`s from a remote server to your\
    \ database, but the only protocol available to transfer data is via HTTP (port\
    \ 80).\n\nFigure 16-1 shows the desired data, its destination, and the roadblocks\
    \ to moving the data from the source to the target.\n\n`Figure 16-1. Transferring\
    \ LOBs between servers with firewall restrictions`\n\nFirewall restrictions on\
    \ the network containing the image file server prevent any direct access to the\
    \ image server from the database server, other than web page access on port 80\
    \ to a web server front end used to serve images on the source system. In other\
    \ words, the only way to get images from the image server is via HTTP.\n\n###\
    \ Solution\n\nThe images for Apress.com must be migrated to another database server;\
    \ the servers are separated by thousands of miles and there is no network access\
    \ between the servers other than the HTTP (port 80) protocol. You don’t have time\
    \ to do an export/import to a DVD or to a tape and ship the DVD or tape to the\
    \ physical location of the local database server. However, you do have a local\
    \ database table containing the list of URLs to be transferred.\n\nTo facilitate\
    \ this transfer, use the Oracle PL/SQL packages `UTL_HTTP` and `DBMS_LOB` to transfer\
    \ the files over the network using the HTTP protocol. For this solution, the table\
    \ `IMG_LIST` contains the list of URLs holding the images, and the table `WEB_IMG`\
    \ contains the metadata for each image along with the image itself.\n\nHere is\
    \ the code to access the remote objects using HTTP and copy the remote objects\
    \ to `LOB` columns in your local database tables:\n\n```sql\n-- create image table\
    \ with list of URLs\n-- and retrieve those images via HTTP\ndeclare\n    cursor\
    \ img_list is -- image URLs to retrieve\n        select img_url from img_list;\n\
    \    r_img_list img_list%rowtype;\n    lBlob blob; -- locator for current image\n\
    \    l_http_request utl_http.req;\n    l_http_response utl_http.resp;\n    l_raw\
    \ raw(32767); -- blob buffer\nbegin\n    dbms_output.put_line('*** Begin image\
    \ load.');\n    open img_list;\n    loop\n        fetch img_list into r_img_list;\n\
    \        exit when img_list%notfound;\n        -- initialize image table row with\
    \ empty blob\n        insert into web_img(img_num, img_url, img_blb, ins_ts)\n\
    \        values(web_img_seq.nextval, r_img_list.img_url, empty_blob(), systimestamp)\n\
    \        returning img_blb into lBlob; -- save pointer for local use\n       \
    \ dbms_output.put_line('Attempt retrieval of: ' || r_img_list.img_url);\n    \
    \    -- attempt to retrieve image via HTTP\n        l_http_request := utl_http.begin_request(r_img_list.img_url);\
    \ -- request\n        l_http_response := utl_http.get_response(l_http_request);\
    \ -- response back\n        dbms_output.put_line(' HTTP stat code: ' || l_http_response.status_code);\n\
    \        dbms_output.put_line(' HTTP resp reason phrase: ' || l_http_response.reason_phrase);\n\
    \        if l_http_response.status_code = 200 then /* image file found */\n  \
    \          dbms_lob.open(lBlob, dbms_lob.lob_readwrite);\n            begin\n\
    \                loop\n                    utl_http.read_raw(l_http_response,\
    \ l_raw, 32767);\n                    dbms_lob.writeappend(lBlob, utl_raw.length(l_raw),\
    \ l_raw);\n                end loop;\n            exception\n                when\
    \ utl_http.end_of_body then\n                    utl_http.end_response(l_http_response);\n\
    ```"
