    # Managing Transactions


    A single update or insert to a database table is often part of several other updates,
    deletes, or inserts (DML statements) within a unit of work for a particular task.
    Those inserts, updates, or deletes that must all succeed to maintain the integrity
    of the data must occur as a database *transaction*. Every modern RDBMS supports
    the concept of transactions by encapsulating one or more DML statements and treating
    them as an atomic unit of work.


    In addition to ensuring that the entire set of operations either succeeds or fails,
    a transaction also hides the visibility of the changes within a transaction from
    other database users who may be reading or changing the same data. Once a transaction
    completes, the changes are visible to any other user sessions that begin their
    own transaction after the first transaction completes. Note that a single DML
    statement is also considered a transaction—the changes made during the DML statement
    are not visible to other sessions until a `COMMIT` occurs.


    The recipes in this chapter will cover several aspects of transactions in the
    database. First, we’ll show you some data dictionary views that will help you
    identify your own transactions, as well as other active transactions that may
    be preventing your own transactions from completing.


    The dreaded *deadlock*, where two transactions exclusively lock a resource that
    each transaction needs before it can complete, is automatically resolved by Oracle,
    which unceremoniously rolls back one of the transactions. However, preventing
    a deadlock from occurring in the first place saves time and database resources,
    so we’ll also provide a recipe for minimizing the occurrence of a deadlock.


    Finally, there’s a recipe to change the constraint definition on one or more tables
    such that the constraint is not checked until you attempt to issue a `COMMIT`
    statement. This scenario may occur when you have a third-party application that
    is not aware of the relational integrity (RI) of the database, or when you receive
    child rows from an upstream process before you receive the parent rows.


