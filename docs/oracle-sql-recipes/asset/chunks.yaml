    # 第 8 章 ■ 处理数字


    ## 8-8\. 在数值计算中处理空值


    ### 问题

    你需要对可能包含 `NULL` 值的数据执行算术和其他计算。你希望确保结果有效，不受 `NULL` 数据的影响。


    ### 解决方案

    当任何算术或数学运算涉及 `NULL` 值时，Oracle 严格遵循三元逻辑规则。通俗地说，这意味着任何对未知值进行的计算都会返回未知结果。任何涉及 `NULL`
    的加、减、乘或其他计算都将始终返回 `NULL`。当你想以另一种方式处理 `NULL` 值时，关键在于通过拦截 `NULL` 值并用你期望的替代值来替换，从而覆盖
    Oracle 的默认行为。


    我们的第三个选项是 `MAXVALUE 999999`。我们将其用作对将要生成的奇数的一个纯粹任意限制。使用 `MAXVALUE` 选项通常是为了满足特定的业务需求。


    第四个选项是 `NOCYCLE`。它指示 Oracle 一旦达到 `MAXVALUE` 阈值，就停止发出任何新的序列值。当序列用尽且已指定 `NOCYCLE`
    时，Oracle 会返回如下错误。


    `ORA-08004: sequence ODD_NUMBER_GENERATOR.NEXTVAL exceeds MAXVALUE and cannot
    be instantiated`


    这在像我们的作业控制流程这样的情况下尤其重要，因为我们不一定想重新提交相同的作业编号。


    我们的倒数第二个选项是 `NOCACHE`，它指示 Oracle 不要为该序列预计算和缓存任何序列值。默认情况下，会生成并缓存 20 个这样的值，这有助于加快对序列值的并发快速访问。缓存的缺点是，如果
    Oracle 崩溃，缓存的值可能会丢失或被丢弃，导致序列似乎出现间隔，并开始分发超出先前缓存块的数字。通常，你绝不应该将逻辑编码为依赖于生成的每一个序列号。毕竟，事务可能因多种原因失败或回滚，而且无论
    `CACHE`/`NOCACHE` 设置如何，Oracle 都永远不会尝试回溯并使用因缓存丢失而错过的序列值。通过使用 `NOCACHE` 选项，至少我们不会因恢复过程而跳过值。


    最后，我们在创建序列时使用了 `ORDER` 选项。这意味着序列值将按照调用者执行 `NEXTVAL` 伪列的顺序分配给他们。使用 `ORDER` 选项时，Oracle
    可以出于处理和性能原因重新排序请求。同样，除非绝对必要，否则依赖于此是不明智的：我们在本方案中使用它，是为了表明你希望按顺序处理作业。


    在我们的方案中，我们将处理试图计算 `HR.EMPLOYEES` 表中所有员工的总年薪加佣金的问题。下面的 SQL 语句覆盖了 Oracle 默认的 `NULL`
    算术，提供了一个业务部门和员工都会认为正确的答案。


    ```sql

    select employee_id, job_id, salary * (1 + nvl(commission_pct,0)) final_pay from
    hr.employees;

    ```


    我们的结果对于 `JOB_ID` 为 `SA_REP` 的销售代表和非销售代表都有意义。


    `EMPLOYEE_ID JOB_ID FINAL_PAY`


    `----------- - --------- ----------`


    `199 SH_CLERK 2600`


    `200 AD_ASST 4400`


    `201 MK_MAN 13000`


    `...`


    `210 SA_REP 4375`


    `211 SA_REP 4375`


    `212 SA_REP 4375`


    `...`


    ### 工作原理

    我们的方案依赖于 `NVL` 函数，在表达式或列求值为 `NULL` 时，用替代值进行替换。就我们的目的而言，我们将 `COMMISSION_PCT` 列传递给了
    `NVL`，这样不拿佣金的员工就不会得到 `NULL` 的最终薪酬。用那种薪水很难支付抵押贷款或购买日用品。


    如果没有我们的干预，`FINAL_PAY` 的计算将令一些员工大失所望。下面的 SQL 语句显示了如果我们不介入处理 `NULL` 值，计算的严格行为。


    ```sql

    select employee_id, job_id, salary * (1 + commission_pct) final_pay from hr.employees;

    ```

