    \n> **提示：** 如果您想将 `AUD$` 表移动到非 `SYSTEM` 表空间，请参阅 My Oracle Support (MetaLink) 笔记\
    \ 72460.1 以获取说明。\n\n## 工作原理\n\nOracle 审计是一项强大的功能，允许您确定针对表正在执行何种类型的 SQL 活动。例如，您可能希望确定哪些表正在被使用或未被使用。如果一个表未被使用，您可能希望重命名然后删除该表。审计允许您捕获用于访问表的\
