    19-10\. Interpreting an Execution Plan


    Problem


    You’re looking at the formatted output of an execution plan from a utility such
    as AUTOTRACE (see recipe 19-7 for details on AUTOTRACE). You wonder how to interpret
    the output.


    Solution


    An *execution plan* is a line-by-line description of how Oracle will retrieve
    and process a result set for a SQL


    statement. Each line in the execution plan describes how Oracle will physically
    retrieve rows from the database or process rows that have been retrieved in previous
    steps. Here are some guidelines for determining the order in which the steps are
    run in a formatted execution plan (such as the output of AUTOTRACE):


    • If there are two steps at the same level of indentation then the topmost step
    is executed first.


    • For a given step, the most heavily indented substep is executed first.


    • When the operation completes, it passes its results up to the next level.


    A simple example will help illustrate these concepts. An explain plan is generated
    for this query with the SET AUTOTRACE statement:


    SET AUTOTRACE TRACE EXPLAIN


    select


    p.first_name


    ,a.address1


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    ,i.invoice_id


    from parties p


    ,addresses a


    ,invoice_transactions i


    where a.party_id = p.party_id


    and p.first_name = ''HEERA''


    and p.party_id = i.party_id;


    Here is a partial listing of the corresponding plan:


    | Id | Operation | Name | Rows | Bytes | Cost (%CPU)|


    | 0 | SELECT STATEMENT | | 39 | 1716 | 375 (1)|


    |* 1 | HASH JOIN | | 39 | 1716 | 375 (1)|


    |* 2 | HASH JOIN | | 2 | 70 | 32 (4)|


    |* 3 | TABLE ACCESS FULL| PARTIES | 2 | 22 | 22 (0)|


    | 4 | TABLE ACCESS FULL| ADDRESSES | 1664 | 39936 | 9 (0)|


