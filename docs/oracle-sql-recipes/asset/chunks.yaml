- fmt: "## 1-12. Basing a Where Condition on a Query\n\n`DEPARTMENT_ID` NOT NULL NUMBER(4)\n\
    \n`DEPARTMENT_NAME` NOT NULL VARCHAR2(30)\n\nThese are the definitions from the\
    \ underlying `HR.DEPARTMENTS` table, which are implicitly inherited by our inline\
    \ view. The outer `SELECT` statement queries the result set, just as if there\
    \ were a real table `d` and you’d written this statement against it.\n\n```\n\
    select department_name\nfrom d;\n```\n\n### Problem\n\nYou need to query the data\
    \ from a table, but one of your criteria will be dependent on data from another\
    \ table at the time the query runs—and you want to avoid hard-coding criteria.\
    \ Specifically, you want to find all departments with offices in North America\
    \ for the purposes of reporting.\n\n### Solution\n\nIn the HR schema, the `DEPARTMENTS`\
    \ table lists departments, and the `LOCATIONS` table lists locations.\n\n```\n\
    select department_name\nfrom hr.departments\nwhere location_id in\n  (select location_id\n\
    \   from hr.locations\n   where country_id = 'US'\n      or country_id = 'CA');\n\
    ```\n\nOur results are as follows:\n\nDEPARTMENT_NAME\n\nIT\n\nShipping\n\nAdministration\n\
    \nPurchasing\n\nExecutive\n\n…\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nCHAPTER 1 ■ THE BASICS\n\n### How It Works\n\nThe right-hand side of our `in`\
    \ predicate reads the results of the sub-`SELECT` to provide values to drive the\
    \ comparison with the `LOCATION_ID` values from the `HR.DEPARTMENTS` table. You\
    \ can see what values are generated by running the sub-`SELECT` query itself.\n\
    \n```\nselect location_id\nfrom hr.locations\nwhere country_id = 'US'\n   or country_id\
    \ = 'CA';\n```\n\nHere are the results:\n\nLOCATION_ID\n\n6 rows selected.\n\n\
    The outer `SELECT` compares `LOCATION_ID` values against this dynamically queried\
    \ list. It is similar to running this static query.\n\n```\nselect department_name\n\
    from hr.departments\nwhere location_id in (1400,1500,1600,1700,1800,1900);\n```\n\
    \nThe key advantage of this recipe is that, should we open new offices and change\
    \ all our `LOCATION_ID`’s for North America, we don’t have to rewrite our query:\
    \ the sub-select will output the necessary new values dynamically.\n\n## 1-13.\
    \ Finding and Eliminating NULLs in Queries\n\n### Problem\n\nYou need to report\
    \ how many of your employees have a commission percentage as part of their remuneration,\
    \ together with the number that get only a fixed salary. You track this using\
    \ the `COMMISSION_PCT` field of the `HR.EMPLOYEES` table.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nCHAPTER 1 ■ THE BASICS\n\n### Solution\n\nThe structure of the `HR.EMPLOYEE`\
    \ tables allows the `COMMISSION_PCT` to be `NULL`. Two queries can be used to\
    \ find those whose commission percent is `NULL` and those whose commission percent\
    \ is non-`NULL`.\n\nFirst, here’s the query that finds employees with `NULL` commission\
    \ percent:\n\n```\nselect first_name, last_name\nfrom hr.employees\nwhere commission_pct\
    \ is null;\n```\n\nFIRST_NAME LAST_NAME\n\n-------------------- -------------------------\n\
    \nDonald OConnell\n\nDouglas Grant\n\nJennifer Whalen\n\nMichael Hartstein\n\n\
    Pat Fay\n\n…\n\n72 rows selected.\n\nNow here’s the query that finds non-`NULL`\
    \ commission-percentage holders:\n\n```\nselect first_name, last_name\nfrom hr.employees\n\
    where commission_pct is not null;\n```\n\nFIRST_NAME LAST_NAME\n\n--------------------\
    \ -------------------------\n\nJohn Russell\n\nKaren Partners\n\nAlberto Errazuriz\n\
    \nGerald Cambrault\n\nEleni Zlotkey\n\n…\n\n35 rows selected.\n\n### How It Works\n\
    \nOur first `SELECT` statement uses the `COMMISSION_PCT IS NULL` clause to test\
    \ for `NULL` entries. This has only two outcomes: either the column has a `NULL`\
    \ entry, thus possessing no value, and satisfies the test; or it has some value.\n\
    \nThe second statement uses the `COMMISSION_PCT IS NOT NULL` clause, which will\
    \ find a match for any employee with an actual value for `COMMISSION_PCT`.\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\nCHAPTER 1 ■ THE BASICS\n\n\
    #### Oracle’s Non-standard Treatment of the Empty String\n\nOracle deviates from\
    \ the SQL standard in implicitly treating an empty, or zero-length, string as\
    \ a surrogate for `NULL`. This is for a range of historical and pragmatic reasons,\
    \ but it's important to remember. Almost all other implementations of SQL treat\
    \ the empty string as a separate, known value."
