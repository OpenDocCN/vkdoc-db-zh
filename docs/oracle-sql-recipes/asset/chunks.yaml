- fmt: '# CHAPTER 15 ■ PARTITIONING


    ## 15-9\. Application-Controlled Partitioning


    ### Problem


    You have a rare situation in which you want the application inserting records
    into a table to explicitly control which partition it inserts data into.


    ### Solution


    If you are using Oracle Database 11g or higher, you can use the `PARTITION BY
    SYSTEM` clause to allow an `INSERT` statement to specify into which partition
    to insert data. This next example creates a system-partitioned table with three
    partitions:


    ```sql

    create table apps

    (app_id number

    ,app_amnt number)

    partition by system

    (partition p1

    ,partition p2

    ,partition p3);

    ```


    When inserting data into this table, you must specify a partition. The next line
    of code inserts a record into partition `P1`:


    ```sql

    insert into apps partition(p1) values(1,100);

    ```


    When updating or deleting, if you don’t specify a partition Oracle will scan all
    partitions of a system-partitioned table to find the relevant rows. Therefore,
    you should specify a partition when updating and deleting to avoid poor performance.


    ### How It Works


    As of Oracle Database 11g, you can create system partitions. A system-partitioned
    table is for unusual situations in which you need to explicitly control which
    partition a record is inserted into. This allows your application code to manage
    the distribution of records among the partitions. We recommend you use this feature
    in situations where you can’t use one of Oracle’s other partitioning mechanisms
    to solve your business requirement.


    ## 15-10\. Configuring Partitions with Tablespaces


    ### Problem


    You want to place each partition of a table in its own tablespace. This will facilitate
    operations such as backing up and recovering partitions independently of each
    other.


    ### Solution


    If you don’t specify a tablespace when creating a partitioned table or index,
    the partitions will be created in your default tablespace. If you prefer to place
    each partition in its own tablespace, use the `TABLESPACE` clause. Of course,
    you’ll have to pre-create the tablespaces you reference before you can use them
    in your `CREATE TABLE` statement:


    ```sql

    create table f_regs

    (reg_count number

    ,d_date_id number

    )

    partition by range (d_date_id)(

    partition p_2009 values less than (20100101)

    tablespace p_2009_tbsp,

    partition p_2010 values less than (20110101)

    tablespace p_2010_tbsp,

    partition p_max values less than (maxvalue)

    tablespace p_max_tbsp

    );

    ```'
  raw: 'If you are using Oracle Database 11 *g* or higher, you can partition on a
    virtual column. Here is a sample script that creates a table named EMP with a
    virtual column of COMMISSION and a corresponding range partition for the virtual
    column:


    create table emp (


    emp_id number


    ,salary number


    ,comm_pct number


    ,commission generated always as (salary*comm_pct)


    )


    partition by range(commission)


    (partition p1 values less than (1000)


    ,partition p2 values less than (2000)


    ,partition p3 values less than (maxvalue));


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ PARTITIONING


    How It Works


    A virtual column is a derived calculation from other columns in the table. Starting
    with Oracle Database 11 *g*, you can create a table with a virtual column, and
    you can use a virtual column to partition. This strategy allows you to partition
    on a column that is not stored in the table but is computed dynamically.


    Virtual-column partitioning is supported with all of the basic indexing strategies.


    Virtual-column partitioning is appropriate when there is a business requirement
    to partition on a column that is not physically stored in a table. This could
    be a complex calculation, a subset of a column string, a combination of columns,
    and so on. For example, you may have a ten-character string column where the first
    two digits represent a region and last eight digits represent a specific location
    (this is a bad design, but it happens). In this case, it may make sense from the
    business perspective to partition on the first two digits of this column (by region).


