    partitioning_type, subpartitioning_type


    from user_part_tables;


    Here is some sample output:


    TABLE_NAME PARTITION SUBPART


    -------------------- --------- -------


    F_SALES RANGE LIST


    Run the next query to view information about the subpartitions:


