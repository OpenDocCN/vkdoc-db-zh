    ## 5-11. Explicitly (Pessimistically) Locking Rows for an Update


    ### Problem


    To protect a particularly sensitive and special business case, you have been asked
    to ensure that updates to employee salaries are protected from lost updates, and
    also asked not to use an optimistic locking approach.


    ### Solution


    Our problem models one of the classic issues faced by developers and DBAs. While
    Oracle provides excellent concurrency control and locking mechanisms and supports
    both optimistic and pessimistic design approaches, often a political or business
    decision forces you to use one technique.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    At some stage in your work with Oracle, you may find your most coherent arguments
    about Oracle’s excellent concurrency technology brushed aside by a manager who
    says “That’s all well and good, but I want to grant pay rises once, and *I don’t
    want to see* any messages indicating another manager updated the same employee’s
    salary and I should try again.”


    Faced with such a career-threatening imperative, you’ll be glad to know Oracle
    provides the `SELECT … FOR UPDATE` option to explicitly lock data and provide
    pessimistic concurrency control. For our recipe, we’ll use the next SELECT statement
    to find the salary data for employee 200, Jennifer Whalen, in preparation for
    a later update.


    ```

    select employee_id, last_name, salary

    from hr.employees

    where employee_id = 200

    for update;

    ```


    ```

    EMPLOYEE_ID LAST_NAME SALARY

    ----------- --------- ------

    200 Whalen 4400

    ```


    So far, so good. If a second user (or the same user via a different connection)
    attempts to perform a `SELECT`, `UPDATE`, or `DELETE` of this row, that user will
    be blocked. Try issuing the same SELECT statement from another connection and
    you’ll see no results as the session waits for the locks related to the `SELECT
    … FOR UPDATE` pessimistic locking to be released.


    ```

    select employee_id, last_name, salary

    from hr.employees

    where employee_id = 200

    for update;

    ```


    (no results yet … waiting on blocking exclusive lock)


    From the first session, we complete our update.


    ```

    update hr.employees

    set salary = salary * 1.1

    where employee_id = 200;

    commit;

    ```


    Upon commit from the first session, the second session’s SELECT statement finally
    runs, returning these results.


    ```

    EMPLOYEE_ID LAST_NAME SALARY

    ----------- --------- ------

    200 Whalen 4840

    ```


    Note the second session did not interrupt the update, and never saw the pre-updated
    data.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 19](index-163_1.png)


    ### How It Works


    The key to the pessimistic locking effect of the `FOR UPDATE` clause is in the
    way it forces Oracle to take locks on the data covered by the SELECT query. Oracle
    attempts to take a mode X (exclusive) transaction row-level lock on each row that
    satisfies a `SELECT … FOR UPDATE` query.


    When the first connection issues the `SELECT … FOR UPDATE` statement, we can query
    the `V$LOCK` dynamic view or use a graphical tool like SQL Developer to see the
    lock taken, as in Figure 5-2.


    ***Figure 5-2.** Select for update explicit locks for first session in SQL Developer*
    The highlighted row shows the lock on the row of the `HR.EMPLOYEES` table for
    `EMPLOYEE_ID` 200. As soon as the second connection attempts the same statement,
    it tries to acquire the same exclusive lock, even though the first consequence
    of doing so would normally only be to select the data. Figure 5-3 shows how Oracle’s
    normal “writes don’t block reads” behavior has been overridden by the `FOR UPDATE`
    technique.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 20](index-164_1.png)'
