    The body of the HTML report is produced as a table whose each row is itself a
    table. These individual rows have a table structure formed by two table cells.
    The code shown in bold is the heart of the calculation. First, the left-hand side
    table cell is given a width proportional to the employee’s salary compared to
    the maximum salary. So for employee King, whose salary of 24000 is the maximum,
    this table cell is 100% of the width of the outer table. The right-hand cell for
    the employee is calculated as 100 minus the percentage calculated for the first
    cell. In King’s case, this means the right-hand cell is zero width. The HTML header
    includes style-sheet information to color the left-hand cell in blue, and the
    right-hand cell to match the background color so it appears transparent.


    As we move through employees in the inline view whose `SALARY` amounts are a smaller
    and smaller fraction of the maximum, the size of the left-hand table cell shrinks
    and the size of the right-hand table cell grows in proportion. This gives the
    appearance of correctly sized graph bars representing proportional salary.


