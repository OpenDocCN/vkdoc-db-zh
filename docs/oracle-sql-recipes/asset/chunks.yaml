    # 10-12. 显示数据库代码


    ## 问题


    您希望显示与 PL/SQL 对象或触发器关联的代码。


    ## 解决方案


    从 `USER_SOURCE` 视图中选择以查看触发器代码：

    ```sql

    select text from user_source where name like upper(''&unit_name%'') and type =
    ''TRIGGER'' order by type, name, line;

    ```


    之所以使用 `TYPE` 列，是因为 `USER_SOURCE` 视图中可能存在不同类型的 PL/SQL，例如过程、函数和包。例如，您可能将某个触发器命名为与某个过程或函数完全相同的名称。因此，您需要使用
    `TYPE` 列，否则可能会返回一些令人困惑的结果。


    ## 工作原理


    使用本解决方案部分中的 SQL 示例，您可以输入触发器的部分名称。`LIKE` 谓词可以与通配符（例如百分号 (`%`) 和下划线 (`_`)）一起使用。百分号指示
    `LIKE` 匹配您输入的任意数量的字符，而下划线符号则精确匹配一个字符。


    `DBA`/`ALL`/`USER_SOURCE` 视图中的 `TEXT` 列是 `VARCHAR2` 列（而不是 `LONG`）。因此，在查询视图之前，您不需要设置
    SQL*Plus 的 `LONG` 变量。


    您也可以使用 `DBMS_METADATA` 包的 `GET_DDL` 函数来显示触发器代码。`GET_DDL` 返回的数据类型是 `CLOB`，因此如果您从
    SQL*Plus 运行它，请确保首先将您的 `LONG` 变量设置为足够大的尺寸以显示所有文本。例如，将 `LONG` 设置为 5000 个字符：

    ```sql

    set long 5000

    ```


    您需要分别向 `GET_DDL` 函数提供对象类型、名称和所有者。您可以通过使用 `SELECT` 语句调用 `DBMS_METADATA.GET_DDL`
    来显示触发器代码，如下所示：

    ```sql

    select dbms_metadata.get_ddl(''TRIGGER'', ''INVTRIG_BU1'', ''INV'') from dual;

    ```

