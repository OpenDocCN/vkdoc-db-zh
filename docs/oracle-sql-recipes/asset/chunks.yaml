    How It Works


    Foreign key constraints are used to ensure that a column value is contained within
    a defined list of values. Using database constraints is an efficient way of enforcing
    that data must be a predefined value before an insert or update is allowed. Constraints
    are advantageous because once enabled, there’s no way to enter data that violates
    a given constraint.


    The foreign key constraint is a technique that stores in a table the list of valid
    values. This technique works well for the following scenarios:


    • Many entries in the list of values


    • Other information about the lookup value needs to be stored


    • Easy to select, insert, update, or delete values lookup via SQL


    For example, you may have a STATES lookup table that has columns such as STATE_CODE,
    STATE_NAME, STATE_DESC, and REGION. Your business rule may be that you have an
    ADDRESSES table that contains a STATE_CODE column and any values entered in this
    column must exist in the STATES table. A separate table with a foreign key constraint
    works well for this scenario.


    If the condition you want to check for is a small list that doesn’t change very
    often, consider using a check constraint instead of a foreign key constraint (see
    recipe 18-15 for details). For example, if you have a column that will always
    be defined to contain either a 0 or a 1, a check constraint is an efficient solution.


