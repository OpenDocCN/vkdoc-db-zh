    select * from employees_act


    intersect


    select * from employees_new


    ;


    EMPLOYEE_ID FIRST_NAME LAST_NAME . . .


    ---------------------- -------------------- -------------------------


    105 David Austin


    112 Jose Manuel Urman


    2 rows selected


    How It Works


    The INTERSECT operator, along with UNION, UNION ALL, and MINUS, joins two or more
    queries together. As of Oracle Database 11 *g*, these operators have equal precedence,
    and unless you override them with parentheses, they are evaluated in left-to-right
    order. Or, more intuitively since you usually don’t have two queries on one line,
    top-to-bottom order!


    ■ **Tip** Future ANSI SQL standards give the INTERSECT operator higher precedence
    than the other operators. Thus, to “bulletproof” your SQL code, use parentheses
    to explicitly specify evaluation order where you use INTERSECT


    with other set operators.


    To better understand how INTERSECT works, Figure 3-1 shows a Venn diagram representation
    of the INTERSECT operation on two queries.


    ***Figure 3-1.** An Oracle INTERSECT operation*


