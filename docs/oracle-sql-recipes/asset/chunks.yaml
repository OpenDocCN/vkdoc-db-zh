    15-12\. Partitioning an Existing Table


    Problem


    You have a table that has grown quite large and it is currently not partitioned.
    You wonder if you can partition it.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ PARTITIONING


    Solution


    There are several methods for converting a non-partitioned table to a partitioned
    table. In this solution we show one simple approach in which you:


    1\. Create a new partitioned table from the old with CREATE TABLE <new table>...AS


    SELECT * FROM <old table>


    2\. Drop or rename the old table


    3\. Rename the table created in Step 1 to the name of the dropped table In this
    example, we first create a new partitioned table named F_REGS_NEW with the CREATE
    TABLE


    statement selecting from the old, non-partitioned table named F_REGS: create table
    f_regs_new


    partition by range (d_date_id)


    (partition p2008 values less than(20090101),


    partition p2009 values less than(20100101),


    partition pmax values less than(maxvalue)


    )


    nologging


    as select * from f_regs;


    Now you can drop (or rename) the old non-partitioned table and rename the new
    partitioned table to the old table name:


    drop table f_regs purge;


    rename f_regs_new to f_regs;


    Lastly, build any constraints, grants, indexes, and statistics for the new table.
    You should now have a partitioned table that replaces the old, non-partitioned
    table.


    For the last step, if the original table contains many constraints, grants, and
    indexes, you may want to use Data Pump EXPDP or EXP to export the original table
    without data, and then after the new table is created, use then use Data Pump
    IMPDP or IMP to create the constraints, grants, indexes, and statistics on the
    new table.


    How It Works


    Converting tables from non-partitioned to partitioned can be a time-consuming
    process. In the solution section we showed a simple way to convert a table. Table
    15-3 lists the pros and cons of techniques used to create partitioned tables from
