    For clarity, this solution includes the value of the CONNECT_BY_ISLEAF column.
    To filter out non-leaf nodes, use a WHERE clause to keep rows where CONNECT_BY_IS_LEAF
    = 1.


    Identifying a root node is easy: a node is a root node if its parent key is NULL.
    Note that a root node with no siblings is at the same time a leaf node!


    How It Works


    The CONNECT_BY_ISLEAF pseudo-column is handy when you want to see rows that are
    at the bottom of each branch of the tree. If you want to see rows at the top of
    the tree, you can select rows with LEVEL = 1.


    As you might expect, if you want to see only tree branches (not the root and not
    the leaves), you can select any rows that are not at level 1 and not a leaf. For
    example:


