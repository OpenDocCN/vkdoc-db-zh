    19-1\. Monitoring Real-Time SQL Execution Statistics


    Problem


    You want to identify in real time SQL statements consuming the most resources.


    Solution


    If your database is Oracle Database 11 *g*, you can use the following query to
    select from the V$SQL_MONITOR to monitor the near real-time resource consumption
    of SQL queries: 457


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    select * from (


    select


    a.sid session_id


    ,a.sql_id


    ,a.status


    ,a.cpu_time/1000000 cpu_sec


    ,a.buffer_gets


    ,a.disk_reads


    ,b.sql_text sql_text


    from v$sql_monitor a


    ,v$sql b


    where a.sql_id = b.sql_id


    order by a.cpu_time desc)


    where rownum <=20;


    The output of this query doesn’t fit easily onto a page. Here is a subset of the
    output: SESSION_ID SQL_ID STATUS CPU_SEC BUFFER_GETS DISK_READS SQL_TEXT


    ---------- ------------- --------- ---------- ----------- ---------- ------------


    194 4k8runghhh31d DONE 7 8.66 0 0 select count(*) 191 9tjq6dfrwgzfr EXECUTING
    45.57 1944 7 select output f In the query, an inline view is utilized to first
    retrieve all records and organize them by CPU_TIME in descending order. The outer
    query then limits the result set to the top twenty rows using the ROWNUM


    pseudocolumn. You can modify the previous query to order by the statistic of your
    choice. You can also modify it to display only the queries that are currently
    executing. For example, the next SQL statement monitors executing queries ordered
    by the number of disk reads:


    select * from (


    select


    a.sid session_id


    ,a.sql_id


    ,a.status


    ,a.cpu_time/1000000 cpu_sec


    ,a.buffer_gets


    ,a.disk_reads


    ,substr(b.sql_text,1,15) sql_text


    from v$sql_monitor a


    ,v$sql b


    where a.sql_id = b.sql_id


    and a.status=''EXECUTING''


    order by a.disk_reads desc)


    where rownum <=20;


    ■ **Note** If you’re using Oracle Database 10 *g* or lower, see recipe 19-4 for
    displaying resource-consuming queries.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ SQL MONITORING AND TUNING


    How It Works


    The statistics in V$SQL_MONITOR are updated every second so you can view resource
    consumption as it changes. These statistics are gathered by default if a SQL statement
    runs in parallel or consumes more than 5 seconds of CPU or I/O time.


    The V$SQL_MONITOR view includes a subset of statistics contained in the V$SQL,
    V$SQLAREA, and V$SQLSTATS views. The V$SQL_MONITOR view displays real-time statistics
    for each execution of a resource-intensive SQL statement, whereas V$SQL, V$SQLAREA,
    and V$SQLSTATS contain cumulative sets of statistics over several executions of
    a SQL statement.


    Once the SQL statement execution ends, the run time statistics are not immediately
    flushed from V$SQL_MONITOR. Depending on activity in your database, the statistics
    can be available for some period of time. If you have a very active database,
    the statistics could potentially be flushed soon after the query finishes.


    ■ **Tip** You can uniquely identify an execution of a SQL statement in V$SQL_MONITOR
    from a combination of the following columns: SQL_ID, SQL_EXEC_START, SQL_EXEC_ID.


    19-2\. Displaying a Query’s Progress in the Execution Plan


    Problem


    You want to view exactly where Oracle is taking time within a SQL execution plan.
    You are using Oracle Database 11 *g*.


    Solution


    If you’re working with Oracle Database 11 *g*, you can watch a SQL query’s execution
    plan progress while the SQL is running. The V$SQL_PLAN_MONITOR view contains a
    row for each step of a SQL statement’s execution plan.


    This query will show the number of rows and memory used for each step of the execution
    plan while the query is running. You’ll have to use some SQL*Plus formatting commands
    to make the output readable:


    COL SID FORMAT 99999


    COL status FORMAT A15


    COL start_time FORMAT A12


    COL plan_line_id FORMAT 99999 HEAD "Plan ID"


    COL plan_options FORMAT A16


    COL mem_bytes FORMAT 99999999


    COL temp_bytes FORMAT 99999999


    SET LINESIZE 132 PAGESI 100 TRIMSP ON


    BREAK ON sid on status on start_time NODUP SKIP 1


    --


    [www.it-ebooks.info](http://www.it-ebooks.info/)


