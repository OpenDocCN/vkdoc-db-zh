  \n图 11-1: 网络设置\n\n选择适配器（`enp0s8`）并确保 IPv4 地址以`192.168`开头。如果地址不正确，你可能需要选择另一个以太网适配器。在右下角，点击齿轮图标以更改此适配器的设置。将出现一个类似于图\
