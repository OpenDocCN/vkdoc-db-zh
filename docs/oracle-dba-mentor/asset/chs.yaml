  \n你不仅限于使用一个密码验证函数。你可以为不同类别的用户设置不同的验证规则。例如，你可能希望管理员用户的密码比普通用户的密码具有更严格的限制。我们将在下一节中看到如何为用户强制使用的密码验证函数进行定义。\n\
  \n现在密码验证函数已经被修改，我们可以通过将 `SYSTEM` 的密码更改为一些我们知道无法通过测试的密码来测试它。在清单 8-5 中，我们首先尝试将密码更改为\
  \ \"password\"，然后更改为一个不包含特殊字符的密码。\n\n```sql\nSQL> alter user system identified by\
