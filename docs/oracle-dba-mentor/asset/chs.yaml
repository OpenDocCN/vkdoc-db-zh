  ## 继续前行


  为 Oracle 数据库打补丁对于修复数据库操作中的错误、填补安全漏洞并帮助保护数据安全是必要的。您应该定期为数据库应用季度 CPU（关键补丁更新）补丁。除非已为您的版本应用了最新最好的
  CPU，否则切勿将 Oracle 数据库投入生产状态。


  正如本章所述，季度 CPU 补丁是为完全支持的 Oracle 版本发布的。在某个时间点，无论您是谁，您当前的版本都会过时，Oracle 公司将停止为其发布补丁。每个数据库管理员在其职业生涯的某个阶段都必须将其数据库升级到更新的版本。下一章将讨论各种升级技术。


  '
- "# 18. 升级\n\n数据库首次创建后，数据库管理员将通过应用常规季度补丁（如前一章所述）来维护它。DBA 还可能需要在 Oracle Support 的指导下应用其他补丁以修复错误。经过一段时间（可能是几个月甚至几年）后，数据库管理员将需要将数据库升级到更新的版本。本章将讨论不同的升级路径并提供一些最佳实践。\n\
  \n\n\n## 升级的理由\n\n我遇到过许多数据库管理员，他们不敢将自己的 Oracle 数据库升级到更新的版本。拒绝升级最常见的理由是那句老话：\"没坏就别修\"\
  。他们当前的配置运行良好，系统又至关重要，因此他们选择维持现状。他们的心态是，升级任何数据库总会带来一定风险，而升级后可能出现的问题使得升级变得不值得。但事实恰恰相反——收益远大于风险。即使今天一切运行良好，你仍有许多理由应该升级你的\
  \ Oracle 数据库。本节将详细说明一些升级的理由，顺序不分先后。\n\n正如我们在第 17 章所见，每季度发布的安全补丁仅适用于完全受支持的版本。在撰写本文时，补丁仅适用于\
  \ `11.2.0.4`、`12.1.0.2`、`12.2.0.1` 和 `18` 版本。如果你的 Oracle 数据库不在此列表中，那么你将存在永远无法修补的安全漏洞。即使数据库及其应用程序可能运行良好，黑客也会乐于利用你的疏忽。务必使用受支持的版本以获取安全补丁，并使你的数据库环境尽可能安全。\n\
  \n如果你提交服务请求，Oracle 支持也可能要求你升级到受支持的版本。如果你运行的是不支持的版本，支持分析师最喜欢的回应就是让你升级并检查问题是否仍然存在。错误一直在被修复，如果是一个已知且已被修复的错误，分析师为何要浪费时间去追踪你的问题？他们希望数据库升级能解决问题，从而以最小的工作量关闭服务单。\n\
  \n你的公司很可能已经支付了 Oracle 支持合同的费用。升级是该合同的一部分。如果你不升级数据库，你就是在为支持服务多付费。你已经为更新的数据库版本付过费了，所以尽情使用它吧。话虽如此，有一个拒绝升级\
  \ Oracle 数据库的理由。如果你没有付费的支持合同，那么升级到较新版本可能会让你与 Oracle 公司产生法律纠纷。如果你的支持合同到期，你不能升级到该合同到期后发布的版本。如果你没有支持合同，请不要升级。如果你没有支持合同，那么这个数据库对你的公司来说一定不是很重要。\n\
  \n你的新数据库版本具有许多新功能。升级后，许多新功能将可供你使用。虽然完成一次 Oracle 升级可能需要付出相当大的努力，但这些新功能通常是出色的省时工具。有些新功能减轻了数据库管理员的工作量。其他功能可能缩短应用程序开发时间。新功能可以让你将数据库架构转向一个有利于组织需求的新方向。\n\
  \n我经常在讨论论坛上看到人们询问如何在新操作系统上安装非常旧的 Oracle 版本，这简直令人抓狂。Oracle 版本针对不同的操作系统平台进行了认证，而 Oracle\
  \ 公司不会费力确保非常古老的 Oracle `8.0.5` 版本能在更新得多的操作系统 Windows Server 2016 上运行。服务器超过保修期后，系统管理员定期更换硬件没有问题。更换硬件时，管理员通常会借此机会也升级操作系统。如果你的公司正在更换旧硬件（理应如此），数据库管理员也应该升级\
  \ Oracle（理应如此）。\n\n正如我们将在本章后面看到的，你可以从有限的旧版本子集直接升级到较新的 Oracle 版本。例如，无论你多么努力，都无法将\
  \ Oracle `7.3.4` 数据库直接升级到 Oracle `12.2.0.1`。你必须先升级到一个中间版本。如果你的数据库非常旧，你可能需要进行多次升级。在达到最终版本之前需要完成的升级次数越多，追踪任何升级问题可能就越困难。是第一次、第二次还是第三次升级导致了你的问题？如果你的\
  \ Oracle 版本保持最新，升级过程就不会那么痛苦。\n\n除了获得 Oracle 的支持，以及保持与操作系统的认证组合外，数据库管理员还需要注意应用软件供应商的支持。第三方应用程序针对特定的数据库版本进行了认证。如果你想升级应用程序，可能也需要升级数据库以跟上步伐。遗憾的是，太多的应用软件供应商落后于最新的\
  \ Oracle 版本。我经常听到数据库管理员抱怨他们无法升级数据库，因为应用软件供应商尚未支持它，即使该 Oracle 版本已经发布多年！如果你的应用软件供应商在\
  \ Oracle 版本方面非常落后，你可能要考虑重新评估未来与该供应商的业务关系。\n\n在第 16 章中，我们讨论了如何通过社交媒体与世界各地的 Oracle\
  \ 专业人士互动。他们中的许多人非常愿意帮助你解决 Oracle 问题，并教你更多关于 Oracle 数据库的知识。虽然许多人使用 Oracle 已经很长时间了，但请不要期望他们记得非常旧版本的确切细节。我从\
  \ `7.1` 版本就开始使用 Oracle，但除了今天版本中仍然适用的内容外，我对它记得很少。我几乎不记得 Oracle `9.2` 版本特有的那些详细细节。我会在讨论论坛上回答问题，但如果你的版本太旧，我可能不会像你希望的那样有帮助。我已经熟练掌握如何在\
  \ Oracle 文档中查找东西，但我不会为了回答一个问题而去翻找一套旧文档。我更可能会以尽可能礼貌的方式建议你升级到较新版本。帮助你的 Oracle 专业人士是自愿提供帮助的。他们中很少有人是收费为你提供服务的，所以，请保持你的版本更新，以帮助他们更好地帮助你。\n\
  \n希望本节能说服你升级数据库。你不需要在新版本一发布时就立即升级，偶尔跳过一个版本也是完全可以接受的。例如，我有许多生产数据库运行的是 Oracle `12.1.0.2`，但我会将它们升级到\
  \ Oracle `18.3`，跳过 `12.2.0.1` 版本。我的最佳实践是最多跳过一个版本。即使可能，我也不会从 `12.1.0.2` 版本直接升级到 `19c`。跳过两个版本（`12.2`\
  \ 和 `18`）的风险太大了。\n\n## 升级与新功能指南\n\n每当新的 Oracle 版本发布时，有两本书是必须从头到尾仔细阅读的。第 13 章讨论了\
  \ Oracle 文档集。到现在，你应该知道如何访问它们了，因此本章将跳过这些细节。\n\n《数据库升级指南》包含了如何升级到新版本的信息。这本书提供了如何升级数据库的说明。你必须阅读它，以降低在升级过程中出错的可能性。本章将涵盖你可以在那本书中找到的内容，但无论如何你仍然必须阅读它。如果你已经执行过许多次数据库升级，并且新版本发布了，请阅读新版本的《升级指南》。Oracle\
  \ 一直在改变升级过程。大部分升级过程是相同的，但他们会在一些地方加入一些不同的变化。《升级指南》包含了成功升级所需的详细信息。\n\n\n\n### 提示\n\
  \n请阅读 *升级指南*！\n\n升级数据库后，请务必阅读对应版本的 *数据库新特性指南*。每个新版本都有一些值得探索的新特性。其中一些特性和功能对您及您的组织可能价值不大，而另一些新特性将成为企业中广受欢迎的改变。\n\
  \n除了介绍该版本的新特性外，*新特性指南* 还包含已弃用和已过时特性的列表。*已弃用* 的特性仍然可用且完全受支持。认为弃用特性不受支持是一种误解。只要某个版本仍在支持期内，Oracle\
  \ 数据库中任何仍然可用的特性都是受支持的。当一个特性被弃用时，Oracle 公司是在告知我们该特性将来会被移除。Oracle 从不会告诉我们特性何时会变得不可用。据我回忆，LONG\
  \ 和 LONG RAW 数据类型已被弃用很久，但它们至今仍然存在。有时，一个特性在一个主要版本中被弃用，在下一个版本中就被移除。当一个特性被弃用时，数据库管理员有责任弄清楚它是否会影响组织，并确定如何应对。很多时候，一个弃用的特性会被一个新特性取代，DBA\
  \ 只需转向使用这个替代特性即可。\n\n一个 *已过时* 的特性是不再可用的特性。如果 DBA 工作得当，这不应该是个意外，因为该特性之前已被弃用，并且 DBA\
  \ 已将该功能迁移到了其他地方。例如，DBA 与应用开发团队合作，将 LONG 和 LONG RAW 列分别迁移到了 CLOB 和 BLOB。一旦 LONG 和\
  \ RAW 变得过时，DBA 就无需担心。\n\n事情偶尔也会有疏漏，在我们有机会采取行动之前，某个特性就变得过时了。如果我们升级到新版本数据库，可能会遇到问题。DBA\
  \ 应在升级活动的早期规划阶段阅读 *新特性指南*，并确定任何已过时的特性是否会带来问题。\n\n## 升级方法论\n\n有多种升级方法可供选择，下一节将进行讨论。无论您选择哪种方法升级\
  \ Oracle 数据库，都有一些您应该始终遵循的步骤，以给自己最佳的成功机会。升级生产数据库确实涉及一定风险，错误可能是危险的。遵循这些步骤，您将显著降低该风险：\n\
  \n1.  阅读新版本的 *安装指南*。您可能已经阅读了当前版本的指南。新版本可能有新的安装要求。\n2.  阅读新版本的 *升级指南*。尽可能多地学习成功升级所需的知识。\n\
  3.  创建一个类似于本书中使用的测试环境。安装当前版本并创建一个数据库。安装新版本的数据库并将您的数据库升级到此目标版本。您可能会学到一些关于升级到此版本的知识。记录所有经验教训。\n\
  4.  选择一个您将用于升级生产数据库的升级方法。每种升级方法都有其自身的优缺点。一旦您确定了最适合您特定情况的升级方法，在您推进开发和测试环境时使用该方法进行升级。如果您没有开发或测试环境，请务必为您的组织获取。更改在未经非生产环境适当验证之前，不应被推送到生产环境。\n\
  5.  在尽可能接近生产环境的开发数据库上安装新版本。安装新版本时，请逐步记录该过程。\n6.  使用步骤 4 中选择的方法升级数据库。逐步记录该过程。记录升级所需的停机时间长度，这将用于规划生产升级的维护窗口。\n\
  7.  针对升级后的数据库测试应用程序。如果公司有，利用自动化测试工具确保没有功能损坏且性能仍可接受。如果出现问题，确定如何修复。如果性能不可接受，确定如何解决问题。无论哪种情况，都要确定在推进过程中如何缓解问题。此测试期应至少持续两周，根据最终用户在开发数据库中的活跃程度，可能需要更长时间。数据库中的活动越多，问题就会越快被发现。如果数据库几乎未被使用，发现问题可能需要更长时间。\n\
  8.  如果可能，至少保留一个尚未升级的开发数据库。如果您在升级后的数据库上遇到问题，可以尝试在旧版本上执行相同过程，以查看问题是否也存在。如果问题在旧版本中也存在，则升级并非原因。\n\
  9.  在 IT 团队中的每个人都对第一次开发升级感到满意后，计划升级任何剩余的开发数据库（除了上面步骤中提到的保留一个）。使用步骤 5 和 6 中的说明作为指导。升级其他开发环境是微调您所创建文档的机会。\n\
  10. 使用您的文档安装和升级测试数据库。理想情况下，一切应按照您的说明按计划进行。如果安装和升级过程有所不同，请相应地更新您的文档。\n11. 让测试数据库在新版本上运行至少两周。在此期间，您应该寻找任何由升级引起的新问题。在此周期结束时，您应该已在开发和测试环境中测试了应用程序，并确信升级不会导致生产环境中的任何应用程序问题。您也应该对升级过程本身充满信心。\n\
  \n\n## 升级准备与执行\n\n12. 为生产环境升级安排一个停机窗口。所有相关的 IT 团队成员都应参与该计划。每个人都知道将要发生什么以及升级将在何时进行。\n\
  \n13. 在停机窗口开始前，在数据库服务器上安装新版 Oracle。软件安装不需要任何停机时间，可以提前完成。请将第 5 步中创建的文档作为您的操作指南，安装过程应能顺利进行。\n\
  \n14. 现在是升级生产数据库的时候了。在升级开始前，对数据库进行一次完整的备份。万一升级过程中出现问题，可能导致数据库处于无法运行的状态。您需要手头有这份备份，以便在需要时能恢复到升级前的状态。\n\
  \n15. 升级生产数据库。请将第 6 步中创建的文档作为您的操作指南。这会让您对升级顺利进行充满信心。同时，由于无论进行到哪一步，您都知道下一步该做什么，这也能减少人为错误的几率，并缩短停机窗口。如果需要，可以打印出文档，并在完成每一步后将其划掉。\n\
  \n16. 升级结束后，立即对数据库进行一次完整的备份。数据库升级并非易事。万一服务器或磁盘出现故障，您现在就有了升级后数据库的副本以备不时之需进行恢复。不要跳过第\
  \ 14 步和第 16 步，因为有一天它们很可能会帮您避免一场灾难。\n\n17. 升级完成后，继续监控应用程序的功能和性能数周。在开发和测试环境中进行的测试工作，很少能涵盖应用程序及其最终用户在生产环境中执行的所有操作。\n\
  \nOracle 将安装和升级过程记录在两本不同的手册中，您可以参考上述的第 1 步和第 2 步进行阅读。然而，这些手册是为通用环境编写的。您的环境是您组织所特有的。不要省略编写自己的逐步操作文档，因为这是您如何完成（专为您量身定制的）安装和升级的“行动手册”。不止一次，这种简单的文档编写任务使我避免了许多升级错误。\n\
  \n不要跳过升级前后的备份。您可能永远用不到它们，它们看起来也像是不必要的步骤。然而，只需经历一次糟糕的升级，您就会庆幸自己做了这些额外的工作。\n\n## 升级方法\n\
  \n您可以使用三种不同的升级方法。所有方法都能将您的数据库升级到新版本。正如您能想到的，存在三种方法是因为它们的操作方式略有不同，并且各有优缺点，我们将在本节中探讨。这三种方法分别是：使用数据库升级助手\
  \ (`DBUA`)、执行手动升级，以及使用某种形式的导出/导入来迁移数据库。\n\n在我们详细探讨这些方法之前，需要特别说明一点：无论您选择哪种方法，Oracle\
  \ 公司都建议您在开始升级过程之前，为数据库应用最新的补丁集更新 (PSU) 或修订更新 (RU)。在极少数情况下，旧版本中的一个错误在尝试升级到新版本时会导致问题。这个错误在旧版本上运行数据库时不一定会引发问题，但只在升级时才会“暴露其丑陋的面目”。如果您的数据库版本是最新的，就能减少遇到此类升级问题的几率。\n\
  \n### 数据库升级助手\n\n数据库升级助手 (`DBUA`) 是一个基于 Java 的、图形化的向导式实用程序，它将引导您完成升级过程。回答几个问题，多次点击“下一步”按钮，然后看着\
  \ `DBUA` 为您完成工作。由于 `DBUA` 是用 Java 编写的，无论您的 Oracle 数据库运行在哪个操作系统平台上，它都是同一个实用程序。`DBUA`\
  \ 还有一个静默模式，您可以实现流程自动化并在命令行模式下运行。\n\n我的建议是，对于数据库升级，尽可能多地使用 `DBUA`。这种数据库升级方法通常具有最短的停机窗口。停机窗口时长不由数据库大小决定。`DBUA`\
  \ 大大降低了人为错误的几率，因为它为您自动化了许多过程。`DBUA` 甚至会运行先决条件检查，如果发现问题，会在尝试升级之前停止。\n\n更短的停机窗口和降低的风险是使用\
  \ `DBUA` 的两个好处。该实用程序的一个缺点是，升级过程不能同时将数据库迁移到不同的服务器。另一个缺点是，`DBUA` 还要求待升级的数据库是少数几个版本之一。这称为直接升级。在本章中，我们将把测试环境中的数据库升级到\
  \ Oracle 18.3 版本。只有源数据库版本是 11.2.0.3、11.2.0.4、12.1.0.1、12.1.0.2 或 12.2.0.1 时，才能直接升级到\
  \ 18.3。如果您的数据库是其他版本，则无法使用 `DBUA` 升级到 18.3 版本。\n\n《数据库升级指南》总会列出可以进行直接升级的版本。如果您运行的是其他版本，那么您有两个选择：升级到一个支持直接升级的版本，或者使用导出/导入工具。导出/导入的升级路径稍后会讨论。\n\
  \n例如，如果数据库是 10.2.0.5 版本，您可以升级到 11.2.0.4，然后再升级到 18.3。这种情况需要执行两次升级。如果这适用于您，我强烈建议您执行一次升级，然后等待一段时间，确保没有问题。在您确信\
  \ 11.2.0.4 版本运行良好后，再升级到 18c。不要尝试在同一个停机窗口内，从 10.2.0.5 直接升级到 11.2.0.4，然后再升级到 18.3。\n\
  \n### 手动升级\n\n您总是可以选择执行手动升级。在 `DBUA` 出现之前，这是最受青睐的方法。手动升级与使用 `DBUA` 有两个相同的特点。第一，您只能为支持直接升级的版本执行手动升级。实际上，`DBUA`\
  \ 执行的步骤与手动升级相同，只是它为您自动化了过程。第二，停机窗口相似，但实际上会稍长一些，因为数据库管理员需要手动执行一些 `DBUA` 能更快完成的步骤。手动升级最大的缺点是步骤由\
  \ DBA 手动执行，人为错误的几率大大增加。由于风险增加，几乎每次都会推荐使用 `DBUA` 而非手动升级。\n\n执行手动升级时，数据库管理员必须为数据库准备新的\
  \ Oracle 主目录。然后，数据库被干净地关闭。DBA 更改其环境以使用新的软件版本。数据库以 `MIGRATE` 模式启动，并运行脚本来升级数据库。完成后，DBA\
  \ 使用新版本重启数据库。\n\n如果 `DBUA` 是更好的选择，为什么还要执行手动升级？唯一的理由是数据库管理员可以在升级过程中进行干预。`DBUA` 会按其预设程序执行。可能会有一些特殊情况，您希望在升级过程中手动介入并添加一个步骤。这种情况将非常、非常罕见。因此，在当今的\
  \ Oracle 环境中，手动升级不太可能被采用。\n\n\n### 导出/导入\n\n最后一种升级路径是使用导出和导入实用程序。你可以使用多种不同类型的实用程序。当人们谈论导出/导入升级路径时，通常指的是使用\
  \ Oracle 的数据泵实用程序 `impdp` 和 `expdp`。举另一个例子，你也可以将数据导出到文本文件，然后使用 `SQL*Loader` 导入。数据复制工具，如\
  \ `Oracle GoldenGate`，也可用于将数据迁移到更新的 Oracle 版本。你还可以使用具有类似功能的第三方实用程序。\n\n使用导出/导入升级路径时，你需要创建一个运行新版本的数据库。你从旧数据库导出数据，然后导入到新数据库中。从技术上讲，这并不是数据库升级，因为新数据库根本没有更改版本。\n\
  \n使用导出/导入升级路径有两个主要原因。第一，你希望一步完成升级，而你当前的 Oracle 版本不支持直接升级。例如，使用导出/导入，你可以从 Oracle\
  \ 7.1 一步升级到 18.3。第二，你可以同时迁移到不同的数据库服务器。你将在一个服务器上导出数据，将转储文件移动到新服务器，然后在那里导入。如果你使用数据泵，你可以通过网络将数据从一个数据库传输到另一个数据库。\n\
  \n这种方法有两个大问题。第一，所需时间取决于数据库大小。数据库越大，导出所需时间就越长，导入所需时间也越长，道理很简单。如果你的数据库非常大，完成此升级方法所需的时间可能会无法接受。第二，确保你迁移所有内容存在一定的风险。如果你导出到文本文件，你将缺少索引、约束、存储过程、视图以及许多其他方案对象。你必须单独迁移这些对象。如果你使用数据泵，转储文件可以包含所有方案对象，从而降低此风险。数据泵是在\
  \ Oracle 10*g* 中引入的。如果你是从更旧的版本升级，你也可以使用传统的导出和导入实用程序 `exp` 和 `imp`。\n\n### 如何选择？\n\
  \n在大多数情况下，数据库管理员使用 `DBUA` 来执行升级。只要你可以执行直接升级，就选择此升级方法。如果你要迁移到不同的服务器，或者你的版本非常旧并且你想避免多次升级，请使用导出/导入方法。如今，手动升级几乎不再使用。\n\
  \n## 安装 18c\n\n在升级我们的测试数据库之前，我们需要在虚拟机上安装更新版本的数据库软件。在第 5 章中，我们逐步讲解了在测试机上安装 Oracle\
  \ 12.2.0.1 软件的过程。现在是时候升级我们在第 6 章中创建的那个数据库了。使用第 5 章中的信息，从 Oracle 技术网 `https://otn.oracle.com`\
  \ 下载新版本：点击 Essential Links 部分的 Software Downloads，然后点击 Database 18c Enterprise/Standard\
  \ Editions 链接。为简洁起见，我在此不再重复第 5 章中的后续说明。唯一变化的是正在下载的版本。将软件下载到虚拟机后，在其自己的目录中解压该文件。18c\
  \ 版本的一个变化是，你将该文件解压到你想要的 Oracle 主目录中。下载的 zip 文件是主目录的镜像。这是与先前版本相比的一个微小变化。\n\n首先，创建主目录，如清单\
  \ 18-1 所示。\n\n```\n[oracle@dbamentor ~]$ cd /u01/app/oracle/product\n[oracle@dbamentor\
  \ product]$ mkdir 18.3\n[oracle@dbamentor product]$ cd 18.3\n[oracle@dbamentor 18.3]$\
  \ pwd\n/u01/app/oracle/product/18.3\n清单 18-1\n创建 18c 主目录\n```\n\n然后将下载的文件放入此目录并解压。\n\
  \n下载文件解压后，启动 `runInstaller` 实用程序。在本节中，我将展示与我们在第 5 章安装的 12.2 版本相比已更改内容的屏幕截图。从图 18-1\
  \ 中我们可以立即看到，初始屏幕有些不同。\n\n![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig1_HTML.jpg](img/467924_1_En_18_Fig1_HTML.jpg)\n\
  \n图 18-1\n\nOracle 18c 安装程序步骤 1\n\n选择“仅设置软件”选项，因为我们在此系统上已经有一个数据库。图 18-1 中的注释 2 确认这对于我们的测试机是正确的选择。单击下一步。在下一个屏幕（步骤\
  \ 2）上，选择“执行单实例安装”选项，然后单击下一步。在下一个屏幕上，选择了企业版。单击下一步。\n\n在步骤 4 的屏幕上，我们需要确保 Oracle 基目录正确。在以前的版本中，`OUI`\
  \ 会询问我们 Oracle 主目录。在 18c 中，`OUI` 假定产品安装在其解压的位置。从图 18-2 中我们可以看到，软件位置对于我们的主目录是正确的。我们没有选项来更改软件位置。单击下一步。\n\
  \n![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig2_HTML.jpg](img/467924_1_En_18_Fig2_HTML.jpg)\n\
  \n图 18-2\n\nOracle 18c 安装程序 Oracle 主目录\n\n下一个屏幕询问操作系统组；默认值是可接受的，因此单击下一步。在步骤 6 中，Oracle\
  \ Universal Installer (`OUI`) 执行其先决条件检查。图 18-3 显示我们的测试机系统上有一个检查失败。\n\n![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig3_HTML.jpg](img/467924_1_En_18_Fig3_HTML.jpg)\n\
  \n图 18-3\n\nOracle 18c 先决条件检查\n\n`OUI` 发现数据库服务器没有足够的物理内存。当我们安装 Oracle 12.2 版本时，这不是问题。每个\
  \ Oracle 版本的要求都有所不同，而此版本提高了我们所需的内存量。由于这是一个虚拟机，我们可以轻松地将其关闭，增加内存，然后重新启动。确保你的主机工作站或笔记本电脑有足够的内存可以分配给虚拟机。因为这是一个测试机，我们可以选择其他选项忽略发现的问题并继续，因此图\
  \ 18-3 中勾选了“忽略所有”框。在确认我们打算忽略该问题后，我们可以单击“安装”按钮。\n\n安装将继续进行，`OUI` 将要求以 root 身份运行脚本。运行此脚本时，系统会要求你确认是否可以覆盖\
  \ `oraenv` 和 `coraenv` 文件。在安装 12.2 版本时我们没有被问到这个问题，因为这些文件当时还不存在。我们将用新版本覆盖它们，以防 18c\
  \ 更改了文件内容。新版本现已安装完毕，可以进行数据库升级了。\n\n\n\n## 预升级信息工具\n\n在升级数据库之前，您需要针对当前版本运行预升级信息工具。这是一个\
  \ Java 归档文件，它会生成一系列需要修复的项目列表，以确保升级成功。要运行预升级信息工具，我们需要将会话的环境变量设置为指向当前数据库，如清单 18-2\
  \ 所示。\n\n```\n[oracle@dbamentor ~]$ export ORACLE_HOME=/u01/app/oracle/product/12.2.0.1\n\
  [oracle@dbamentor ~]$ export ORACLE_BASE=/u01/app/oracle\n[oracle@dbamentor ~]$\
  \ export ORACLE_SID=orcl\n[oracle@dbamentor ~]$ export PATH=$ORACLE_HOME/bin:$PATH\n\
  清单 18-2\n预升级设置环境变量\n```\n\n然后，我们使用该 Oracle 主目录中的 Java 可执行文件来运行 JAR 文件。清单 18-3 显示了预升级实用程序的一次示例运行。\n\
  \n```\n[oracle@dbamentor ~]$ $ORACLE_HOME/jdk/bin/java -jar /u01/app/oracle/product/18.3/rdbms/admin/preupgrade.jar\n\
  ==================\nPREUPGRADE SUMMARY\n==================\n/u01/app/oracle/cfgtoollogs/orcl/preupgrade/preupgrade.log\n\
  /u01/app/oracle/cfgtoollogs/orcl/preupgrade/preupgrade_fixups.sql\n/u01/app/oracle/cfgtoollogs/orcl/preupgrade/postupgrade_fixups.sql\n\
  Execute fixup scripts as indicated below:\nBefore upgrade log into the database\
  \ and execute the preupgrade fixups\n@/u01/app/oracle/cfgtoollogs/orcl/preupgrade/preupgrade_fixups.sql\n\
  After the upgrade:\nLog into the database and execute the postupgrade fixups\n@/u01/app/oracle/cfgtoollogs/orcl/preupgrade/postupgrade_fixups.sql\n\
  Preupgrade complete: 2018-09-14T14:21:32\n清单 18-3\n运行预升级信息工具\n```\n\n预升级信息工具为我们创建了三个文件：一个日志文件，以及两个修复脚本（一个升级前用，一个升级后用）。第一步是阅读\
  \ `preupgrade.log` 文件的内容。如清单 18-4 所示，日志文件的开头部分提供了一些基本信息，例如当前数据库的版本以及我们要升级到的版本。\n\
  \n```\nReport generated by Oracle Database Pre-Upgrade Information Tool Version\n\
