  我关注的账户还有很多。这个列表只是一个示例。我目前关注了 88 个不同的 `Twitter` 账户。我知道有人关注的比我多得多。一旦你开始关注几个账户，`Twitter`
  会推荐其他账户给你关注。如果你愿意，请随时在 `Twitter` 上关注我，账号是 `@BPeaslandDBA`。


  `Twitter` 不是寻求帮助的好资源，尽管我看到有人试图用它来解决问题。这个平台不容易支持详细深入的来回讨论。幸运的是，我们有更好的平台来解决问题。




  ## 询问 TOM


  几乎每位 Oracle 专业人士都曾在某个时候使用过 Oracle 的 Ask TOM 网站。许多年前，Oracle 公司聘请了一位名叫 Tom Kyte 的顾问。除了被派往客户现场解决
  Oracle 问题外，Tom Kyte 还建立了一个网站，你可以向他提问，Ask TOM 由此诞生。你可以访问该站点：`https://asktom.oracle.com`。该网页已随时间演变，现在看起来如图
  16-1 所示。


  ![../images/467924_1_En_16_Chapter/467924_1_En_16_Fig1_HTML.png](img/467924_1_En_16_Fig1_HTML.png)


  图 16-1 Ask TOM 主页


  在主页上，你可以立即开始搜索问题的答案。不要被标题迷惑。这个站点既适用于数据库管理员，也适用于 Oracle 开发人员。在提出任何问题之前，请务必先进行搜索。很可能在过去已经有人问过同样的问题。


  尽管 Ask TOM 站点多年来发生了变化，但所有旧的答案仍然可用。该站点提供了丰富、详细且包含大量示例的问答历史记录。请将此网站加入浏览器书签并经常使用，尤其是在你遇到
  Oracle 问题卡住时。


  2016 年，Tom Kyte 从 Oracle 公司退休。Oracle 不希望 Ask TOM 这一资源消失，因为它对全球 Oracle 社区来说已变得非常宝贵。在
  Tom Kyte 退休之际，Oracle 转向了其他员工，即 Connor McDonald 和 Chris Saxon，来维持该站点的运行。不久之后，他们扩展了站点，纳入了许多各自领域专长的员工。`Ask
  TOM` 不再指代特定个人，而是被重新命名为 `Ask TOM` 或 Ask The Oracle Masters。Oracle 公司仍使用相同的名称，但更改了品牌以反映这是一个专家团队，而非特定个人。


  如果你试图获取与 Oracle 相关问题的答案，并且搜索 `Ask TOM` 档案库没有找到任何相关内容，你可以发布自己的问题。只需点击“Questions”选项卡并填写所需信息即可。


  ## 讨论论坛


  讨论论坛是与全球 Oracle 专业人士互动的好方法。在这些论坛中，你可以提出问题并就问题来回讨论，直到找到解决方案。如今的讨论论坛通常通过网络浏览器访问。市面上有很多讨论论坛，但在我看来，只有少数几个拥有可观的流量，值得关注。


  `Oracle-L` (`www.freelists.org/list/oracle-l`) 已经存在了很长时间。这实际上是一个讨论列表。访问上面的 URL 订阅该列表，你将通过电子邮件收到每一条更新。如果你选择订阅
  `Oracle-L`，请务必设置电子邮件规则，将这些邮件路由到一个文件夹，而不是堵塞你的收件箱。你回复讨论串的方式是回复你收到的电子邮件。`Oracle-L`
  设计于讨论论坛实现网络化之前。虽然按照今天的标准，与讨论组的交互方式有点过时，但这个讨论列表值得一提，仅仅是因为在那里回答问题的人才水平很高。


  `Oracle Groundbreakers` 论坛 (`https://community.oracle.com/community/technology_network_community`)
  在更名之前曾被称为 Oracle Technology Network (OTN) 社区。`Oracle Groundbreakers` 是一个免费使用的讨论论坛。你只需要一个
  Oracle 单点登录账户即可访问。你可能在本书前面下载 Oracle 软件以创建测试平台时创建过这个账户。


  `My Oracle Support Community (MOSC)` (`https://community.oracle.com/community/support/`)
  是另一个基于网络的讨论论坛。该站点与 Oracle Developer Community 集成。如果你访问这两者，本质上你使用的是同一个站点。这很方便，因为不必从一个站点跳转到另一个站点。当你订阅任一站点中的讨论空间时，新内容会出现在同一个收件箱中。


  如果有两个站点并且它们是集成的，那为什么还要有两个站点呢？`Oracle Groundbreakers` 面向所有人，对公众开放。`MOSC` 则面向拥有付费
  Oracle 支持合同的 Oracle 客户，因此得名。你甚至可以从 My Oracle Support 内部通过点击 Community 选项卡进入 `MOSC`。当你在
  `MOS` 中创建服务请求时，你可以选择通过点击 Community 中的提问按钮来在 `MOSC` 中发起讨论，如图 16-2 所示。


  ![../images/467924_1_En_16_Chapter/467924_1_En_16_Fig2_HTML.jpg](img/467924_1_En_16_Fig2_HTML.jpg)


  图 16-2 MOS “在社区中提问”按钮


  这两个网站的主要区别在于，Oracle 支持员工经常会在 `MOSC` 中参与并提供答案。值得庆幸的是，你不必在两者之间做选择，因为它们是集成的并且协同工作得很好。


  无论你使用哪个讨论论坛，都需要遵循一些规则。不遵守这些规则将导致众多喜欢攻击新受害者的论坛喷子出现。不幸的是，任何讨论论坛中都有太多粗鲁和居高临下的人。避开他们恶劣态度的最好方式是遵循一些众所周知的准则参与讨论：


  *   主题行应包含问题的简要描述，而不是陈述整个问题。

  *   发布你的 Oracle 版本。你的版本不是“12c”，而是类似 12.1.0.2 或 12.2 这样的具体版本。很多答案是特定于版本的。了解你的版本能让你获得针对问题的正确答案。未能包含你的版本信息，可能会得到诸如“哪个版本？”这样的简短回复，或者来自论坛喷子的攻击。




  - 不要发布 **RTFM** 问题。感谢本书的第 13 章，你现在知道如何使用 Oracle 文档了。如果你能阅读**精细的手册**，你就可以自己回答这些问题。不要通过发布你自己就能查到的问题来浪费志愿者宝贵的时间。

  - 不要发布你可以轻易搜索到的问题。本章前面，我们讨论了如何使用搜索引擎寻找答案。如果通过简单的网络搜索就能轻易找到答案，就不应该将其发布到讨论论坛。人们通常会回复"**LMGTFY**"，这是“让我为你谷歌一下”的缩写。他们的回复后面会附上一个指向
  [`http://lmgtfy.com`](http://lmgtfy.com) 的链接，展示谷歌搜索结果。

  - 如果可能，发布展示你工作的示例代码，并包含哪些部分不工作。例如，如果你正在处理一条 SQL 语句，请发布创建示例表并用示例数据填充它的代码。然后发布无法工作的
  SQL 语句，并尽你所能解释它应该如何工作。有了所有这些信息，回复者就可以在他们的数据库中创建该表，并尝试相同的 SQL 语句，从而找出解决问题的方法。

  - 发布完整的错误信息。如果你说你收到了一个 ORA-00942 错误，却什么也不提供，你不太可能得到好的答案。请发布收到错误的 SQL 语句，然后将整个错误堆栈复制并粘贴到你的初始帖子中。

  - 切勿要求立即帮助或说你的请求很紧急。回答问题的人并非有偿工作。他们是志愿者，他们有自己的工作要做。他们会在有空时回答你的问题。如果你想要立即解决，请向 My
  Oracle Support 提交服务请求。


  当你与这些论坛互动时，请开始作为问题的回答者参与进来。我经常看到有些人只问问题却从不分享他们的知识。当有更多人关注问题时，讨论论坛会变得更好。在你职业生涯的初始阶段，你可能不具备回答很多不同问题所需的技能组合，这是可以预料的。尽管如此，还是尝试回答几个问题。正如我在讨论博客的部分所说，当你尝试以书面形式解释某事时，神奇的事情会发生：你自己实际上学到了更多东西。在讨论论坛中也是如此。你回答的问题越多，你就越能理解
  Oracle 是如何工作的。开始时，尝试每天回答一个问题。如果可以找到简单的问题，就从简单的开始。然后逐步提高难度。


  回答问题并成为讨论论坛主要参与者的另一个原因是你将非常熟悉 Oracle 文档。我通常只需点击几下鼠标就能在 Oracle 文档中查找到我需要的任何东西，因为我知道确切该去哪里查找。直到我开始回答问题，我才更善于知道如何使用文档。当我回答一个问题时，我会尽量包含指向文档相关部分的链接。这样，读者可以找到更多信息。找到那个链接确实需要额外的时间，但我节省了输入大量额外信息的时间，这些信息读者可以在文档中看到。如果存在疑问，文档也作为证明我所言属实的一种方式。


  我在讨论论坛回答问题的最后一个原因是我每天学到的东西很多。人们会发布一些我在常规工作中永远见不到的最奇怪的问题。此外，有人会用一些我以前不知道的东西来回复一个问题。无论我对
  Oracle 产品了解多少，我也永远不会知道一切。每个人都可以教我一些东西。仅仅阅读不同的讨论帖就经常让我受益匪浅。在我的职业生涯中，有很多次我遇到一个问题，而我之前已经在某个讨论论坛中接触过这个问题。我对这个问题已经有所了解。我所需要做的就是找到讨论该问题的论坛帖子，然后我就能轻松获得解决方案。


  如果你确实在讨论论坛回答问题，请准备好犯错。学习如何恰当地回答问题需要一段时间。太多的人会因为你的错误而抨击你，有时非常粗鲁。忽略负面情绪，找出你错在哪里以及下次如何更好地回应。不要让负面情绪阻止你回答未来的问题。像任何事情一样，你做得越多，你就会做得越好。回答问题也是如此。


  ## YouTube


  我越来越多地看到 Oracle 专业人士在 YouTube 上发布视频。我是从通过博客和讨论论坛以书面形式分享信息开始的。对我来说，尝试以视频形式分享 Oracle
  概念是一个陌生的概念。我在一个 YouTube 频道上发布了几个视频，但这真的不适合我。这不是我擅长的事情。值得庆幸的是，有些 Oracle 专业人士做得非常好，并在
  YouTube 上发布了很棒的视频。你可能会喜欢自己制作一些视频来分享你的知识。


  YouTube 上大多数与 Oracle 相关的内容都是操作指南视频。由于视频是预先录制的，该平台很难发挥与讨论论坛相同的作用。例如，在 YouTube 上搜索"Oracle
  SQL Developer"，你会发现许多视频展示了如何使用该产品的特定功能。


  当你找到一个发布你喜欢内容的人时，订阅他们的 YouTube 频道。这样，当他们发布新内容时，你会收到通知。



