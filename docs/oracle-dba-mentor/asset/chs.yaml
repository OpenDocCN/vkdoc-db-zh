  RMAN 命令就是简单的 `backup database plus archivelog`。一条命令搞定一切。如果你仔细阅读 RMAN 的输出，可以看到 RMAN
  在读取数据库的文件，甚至备份了归档重做日志。最后，RMAN 还备份了控制文件和参数文件。


  如果我们的测试环境不进行实际测试，那就没什么价值了。所以让我们运行之前做过的相同测试。我关闭了实例，然后删除了 `users01.dbf` 数据文件，模拟文件丢失。现在我将使用
  RMAN 进行恢复。它会找出缺失的文件并按顺序将其全部恢复。还记得之前关于 `restore` 和 `recovery` 区别的讨论吗？这些区别现在很重要，因为我们首先需要告诉
  RMAN 恢复（`restore`）数据库，然后应用恢复（`recovery`）。在清单 7-9 中，操作顺序是：以 `mount` 模式启动实例、恢复数据库、恢复数据库，然后打开数据库对外服务。


