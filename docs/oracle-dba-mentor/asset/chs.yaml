  \ IP 地址。\n\n### 修改 Hosts 文件\n\n现在 IP 地址是静态定义的，只要虚拟机处于启动并运行状态，我们随时都可以连接到它。然而，使用 IP\
  \ 地址操作起来很麻烦，而且我们不想麻烦网络团队在 DNS 中创建别名。为了方便自己，我们将修改本地的“hosts”文件。在 Windows 上，使用资源管理器导航到`C:\\\
  Windows\\System32\\drivers\\etc`目录，并使用任何文本编辑器打开名为`hosts`的文件。在 Mac 平台上，`hosts`文件位于`/etc`目录。在文件末尾附近，添加一行类似于清单\
  \ 11-3 中最后一条目的内容。\n\n```\n# localhost name resolution is handled within DNS itself.\n\
  #      127.0.0.1       localhost\n#      ::1             localhost\n192.168.56.101\
  \      dbamentor\n清单 11-3\nHosts 文件条目\n```\n\n输出的最后一行是我对`hosts`文件的新条目。它包含我的 IP 地址和我希望用来指代这台机器的任何别名。我使用的别名是`dbamentor`。保存文件，然后使用该别名进行\
  \ ping 测试，如清单 11-4 所示。\n\n```\nC:\\Users\\bpeasland\\Desktop>ping dbamentor -n 3\n\
  Pinging dbamentor [192.168.56.101] with 32 bytes of data:\nReply from 192.168.56.101:\
  \ bytes=32 time<1ms TTL=64\nReply from 192.168.56.101: bytes=32 time<1ms TTL=64\n\
  Reply from 192.168.56.101: bytes=32 time<1ms TTL=64\nPing statistics for 192.168.56.101:\n\
  Packets: Sent = 3, Received = 3, Lost = 0 (0% loss),\nApproximate round trip times\
  \ in milli-seconds:\nMinimum = 0ms, Maximum = 0ms, Average = 0ms\n清单 11-4\n使用 Hosts\
  \ 别名进行 Ping 测试\n```\n\n我现在可以在任何想要连接到虚拟机时使用这个别名。这比记住一个 IP 地址要容易得多。\n\n### 建立 SSH\
  \ 连接\n\n如果我在 Mac 平台上运行虚拟机，那么我可以使用终端窗口建立到该机器的安全外壳（SSH）会话。在 Windows 上，我需要一个 SSH 客户端。我经常使用`PuTTY`或`MobaXterm`。这两个都是免费的实用程序，通过简单的\
  \ Google 搜索就能找到。无论你使用哪一个，看看是否能建立到该机器的 SSH 会话。清单 11-5 展示了我如何使用`MobaXterm`进行连接。\n\n\
  ```\n[bpeasland.winworkstation] ➤ ssh oracle@dbamentor\nWarning: Permanently added\
  \ 'dbamentor' (RSA) to the list of known hosts.\noracle@dbamentor's password:\n\
  Last login: Tue Jul 24 14:35:22 2018 from 192.168.56.1\n/usr/bin/xauth:  file /home/oracle/.Xauthority\
  \ does not exist\n[oracle@dbamentor ~]$ hostname\ndbamentor.localdomain\n清单 11-5\n\
  从 MobaXterm 进行 SSH 连接\n```\n\n清单末尾的`hostname`命令向我们表明，我们确实连接到了我们的虚拟机。\n\n既然我们已经从主机操作系统建立了连接，我们就可以使用主机上安装的任何实用程序来连接到虚拟机及其内部运行的数据库。\n\
  \n\n\n## SQL*Plus\n\n本书中的许多示例已经使用了 **SQL*Plus**，这是一个命令行工具，用于启动和停止 Oracle 实例，以及向数据库发出\
  \ SQL 语句。正如本章将看到的，虽然还有其他查询工具，但 **SQL*Plus** 总是触手可及。当我们安装数据库软件时，**SQL*Plus** 就已经安装好了。至少，我们可以通过\
  \ SSH 连接到数据库服务器，然后使用 **SQL*Plus**。由于 **SQL*Plus** 是一个命令行工具，即使是基于文本的 SSH 会话也足以使用它。\n\
  \n### 提示\n\n学会使用 **SQL*Plus**。它始终对你可用。\n\n如果你在自己的工作站上安装了 Oracle Client 软件，**SQL*Plus**\
  \ 也包含在其中。你需要设置一个 TNS 别名，如第[9]章所示，以便连接到任何其他机器上的数据库。\n\n**SQL*Plus** 是 Oracle 判断“是否有效”的标准。任何查询工具都只是一个向数据库提交\
  \ SQL 语句并显示结果的应用程序。已经有很多次，向 Oracle 支持团队提交的服务请求都显示，在其他某个查询工具中，Oracle 数据库似乎没有返回正确的结果。提交服务请求的人会向\
  \ Oracle 提供 SQL 语句和一些示例数据，并展示从数据库返回的结果集看起来不正确。如果你遇到这种情况，Oracle 总是会要求你在 **SQL*Plus**\
  \ 中重现该问题。如果它在 **SQL*Plus** 中能正常工作，那么问题就出在查询工具上，而不是数据库引擎。如果 SQL 语句在 **SQL*Plus**\
  \ 中产生了错误结果，那么 Oracle 支持团队就需要处理该问题并提供解决方案。\n\n**SQL*Plus** 有许多人们可能没有意识到的功能。你可以将 SQL\
  \ 语句保存到文本文件中。你可以运行包含 SQL 语句的文件，以脚本方式执行多个操作。**SQL*Plus** 甚至可以生成格式化的报告。\n\n**SQL*Plus**\
  \ 中一个许多人没有意识到的隐藏功能是编辑你的命令的能力。**SQL*Plus** 会将当前命令保存在缓冲区中。考虑清单 [11-6] 中的例子，其中数据库管理员试图创建一个表空间，但发生了错误。很明显，DBA\
  \ 在第 3 行和第 4 行两次指定了表空间的大小。\n\n```\nSQL> create tablespace apps_ts\n2  datafile '/u01/app/oracle/oradata/orcl/apps_ts01.dbf'\n\
  3  size 5g\n4  size 10g\n5  extent management local auto;\nsize 10g\n*\nERROR at\
  \ line 4:\nORA-02180: invalid option for CREATE TABLESPACE\n清单 11-6\n不正确的 SQL*Plus\
  \ 命令\n```\n\nDBA 想从这个命令中删除第 4 行，而不想重新输入整个 SQL 语句。DBA 可以输入小写字母 `l` 来列出缓冲区的内容，如清单\
  \ [11-7] 所示。\n\n```\nSQL> l\n1  create tablespace apps_ts\n2  datafile '/u01/app/oracle/oradata/orcl/apps_ts01.dbf'\n\
  3  size 5g\n4  size 10g\n5* extent management local auto\n清单 11-7\n列出 SQL*Plus 缓冲区\n\
  ```\n\n注意最后一行有一个星号。带星号的行是当前行。如果我们想删除第 4 行，我们需要使其成为当前行，然后发出命令来删除该行。我们只需输入感兴趣的行号，按回车键，然后输入\
  \ `del` 来删除当前行。一旦该行被删除，我们可以输入前斜杠 `/` 来执行缓冲区的内容，如清单 [11-8] 所示。\n\n```\nSQL> 4\n4*\
  \ size 10g\nSQL> del\nSQL> l\n1  create tablespace apps_ts\n2  datafile '/u01/app/oracle/oradata/orcl/apps_ts01.dbf'\n\
  3  size 5g\n4* extent management local auto\nSQL> /\nextent management local auto\n\
  *\nERROR at line 4:\nORA-02180: invalid option for CREATE TABLESPACE\n清单 11-8\n\
  在 SQL*Plus 缓冲区中删除一行\n```\n\n当列出缓冲区内容时，我们可以看到包含 `size 10g` 的行已被删除。再次执行语句时，又出现了另一个错误。问题在于\
  \ Oracle 不喜欢关键字 `auto`。它应该是 `autoallocate`。从星号我们可以看到，当前行（带错误的那一行）是我们正在编辑的行。我们可以更改当前行中的单词并重新执行命令，如清单\
  \ [11-9] 所示。\n\n```\nSQL> c /auto/autoallocate\n4* extent management local autoallocate\n\
  SQL> /\nTablespace created.\n清单 11-9\n在 SQL*Plus 缓冲区中更改文本\n```\n\n`c` 命令将更改或在当前行执行文本替换。第一个字符是你的分隔符。在清单\
  \ [11-9] 中，分隔符是前斜杠 `/`，但你可以选择任何字符，特别是如果你要更改的文本包含前斜杠时。分隔符之后是要更改的文本，然后是分隔符，接着是更正后的文本。一旦\
  \ `auto` 被更改为 `autoallocate`，下一个前斜杠 `/` 就执行缓冲区的内容，表空间便成功创建。\n\n**SQL*Plus** 中的这个缓冲区对于需要长期监控情况的\
  \ DBA 非常有帮助。输入命令并查看输出。然后，过一段时间后，只需输入前斜杠 `/` 就可以再次执行缓冲区。在清单 [11-10] 的例子中，DBA 需要知道实例中当前会话的数量并观察其随时间的变化。DBA\
  \ 不必重复输入命令，只需在下次执行时按下前斜杠 `/` 即可。\n\n```\nSQL> select count(*) as num_sessions from\
  \ v$session where username is not null;\nNUM_SESSIONS\n        103\nSQL> /\nNUM_SESSIONS\n\
  \        105\nSQL> /\nNUM_SESSIONS\n        104\n清单 11-10\n在 SQL*Plus 中多次执行缓冲区\n\
  ```\n\n如果 DBA 将来需要运行此语句，可能希望将其保存到一个脚本中。`save` 命令会将缓冲区的内容写入文件。通常使用 `.sql` 作为 SQL\
  \ 脚本的文件扩展名。如果未指定路径，文件将保存在当前目录中。`@` 符号用于告诉 **SQL*Plus** 将该文件的内容加载到缓冲区并执行它。在清单 [11-11]\
  \ 中，我们可以看到缓冲区的内容。我们将该 SQL 语句保存到文件中，然后将该文件作为脚本执行。\n\n```\nSQL> l\n1* select count(*)\
  \ as num_sessions from v$session where username is not null\nSQL> save num_sessions.sql\n\
  Created file num_sessions.sql\nSQL> @num_sessions.sql\nNUM_SESSIONS\n        104\n\
  清单 11-11\n在 SQL*Plus 中保存缓冲区\n```\n\n**SQL*Plus** 是 Oracle DBA 的宝贵工具。它始终对你可用，而且一旦你学会了利用其缓冲区的威力，正如我们在前面的例子中看到的，你会发现它远比仅仅与数据库引擎进行命令行交互要好用得多。\n\
  \n\n## SQL 开发人员\n\n虽然 SQL*Plus 是一款出色的命令行工具，但我们通常生活在图形用户界面（GUI）世界中。可以将 SQL Developer\
  \ 视为 GUI 形式的 SQL*Plus。Oracle 的 SQL Developer 产品团队的主要目标是让你的工作更轻松。这款工具对于 Oracle 应用程序开发人员和数据库管理员来说都非常适用。最棒的部分是，SQL\
  \ Developer 是免费使用的。\n\n当你在服务器上安装 Oracle 数据库软件时，它会附带一个 SQL Developer 副本。但这个副本几乎可以肯定是过时的，因此你应该下载最新最好的版本。将你的网页浏览器指向\
  \ [`http://otn.oracle.com`](http://otn.oracle.com)，然后像你下载 Oracle 数据库软件时那样，点击“必备链接”部分中的“软件下载”。在下一个屏幕中，SQL\
  \ Developer 列在“开发人员工具”下，尽管它严格来说并不是一个软件开发产品。点击 SQL Developer，你将被带到下载屏幕。你需要点击单选按钮以接受许可协议。如果要求进行身份验证，请使用与你下载\
  \ RDBMS 软件时相同的 Oracle 单点登录凭据。如果我是在为 Windows 下载，我总是会选择包含 Java 开发工具包（JDK）的版本。对于其他平台，你必须自行提供\
  \ JDK。\n\n下载文件是一个 zip 压缩包。无需安装。只需将文件解压缩到某个目录即可。在软件文件夹中，你会看到 `sqldeveloper` 可执行文件。运行该文件，SQL\
  \ Developer 就会启动。在本章前面，我们确保了我们有能力将工作站上的工具连接到我们虚拟机测试平台中的数据库。在本节中，我们将使用 SQL Developer\
  \ 来完成这一操作。\n\n如果你是第一次启动 SQL Developer，你应该会看到一个起始页。此页面包含一个“概述视频”链接以及许多教程和演示的链接。起始页只列出了三个教程和演示，但有一个链接指向更多在线内容。我强烈建议你花时间学习这些内容，因为它们能比这本书更详尽地解释\
  \ SQL Developer 的功能。起始页还包含一个指向 SQL Developer 文档的链接。\n\n在你能够与数据库交互之前，你需要创建一个连接。在“连接”选项卡中（如图\
  \ 11-3 所示），你可以看到我有三个文件夹来更好地组织我的连接。\n\n![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig3_HTML.jpg](img/467924_1_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3 SQL Developer 中的连接\n\n点击绿色的加号图标以创建新的数据库连接。将弹出一个屏幕，你需要在其中填写所有相关详细信息，如图 11-4\
  \ 所示。\n\n![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig4_HTML.jpg](img/467924_1_En_11_Fig4_HTML.jpg)\n\
  \n图 11-4 SQL Developer 连接详细信息\n\n连接需要一个名称。我通常使用 *数据库名 _ 用户名* 的形式，但你可以自由使用任何对你有用的命名约定。输入用户名和密码。如果你不想每次都被提示输入密码，请勾选“保存密码”框，但前提是这台机器没有与他人共享。你可以使用“连接颜色”设置来直观地定义你的连接窗口。如果这是到生产数据库的连接，我通常会选择红色。当我打开到生产数据库的连接时，SQL\
  \ Developer 会在窗口周围画一条红线。在“连接”选项卡中的名称也会显示为红色。这种视觉指示器有助于提醒我要小心，因为我的操作是在生产环境中，而不是在开发或测试环境中。\n\
  \n在图 11-4 的示例中，我选择了“基本”连接类型。如果你安装了 Oracle Client，并且定义了一个 TNS 别名，你可以将“连接类型”更改为“TNS”，然后选择该别名。由于我的连接是“基本”类型，我必须提供主机名、端口和服务名。输入所有信息后，点击“测试”按钮。如果出现错误，可能是由于虚拟机上运行的防火墙导致的。在我们测试平台虚拟机中，以\
  \ root 用户身份，在终端窗口中执行清单 11-12 中的以下命令以禁用防火墙。\n\n```\nsystemctl stop firewalld\nsystemctl\
  \ disable firewalld\n```\n清单 11-12 禁用 Linux 防火墙\n\n连接成功测试后，点击“保存”按钮。双击连接将打开它并调出一个工作表。我们可以输入任何\
  \ SQL 语句，然后点击绿色的播放按钮（或按 `Ctrl-Enter`）来运行该语句，示例如图 11-5 所示。\n\n![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig5_HTML.jpg](img/467924_1_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5 在 SQL Developer 中运行 SQL 语句\n\n可以通过点击“运行脚本”按钮（或按 `F5`）来连续执行多个语句。“运行脚本”按钮位于绿色播放按钮的旁边。它看起来像一页文本，左下角有一个绿色的播放箭头。\n\
  \n在“查询结果”窗口中，可以按任何列对结果进行排序。如果你想保存结果，以免被下一次语句执行覆盖，请点击红色的图钉图标。下一次语句执行将在不同的结果选项卡中显示。\n\
  \nSQL Developer 的 Oracle 产品经理是 Jeff Smith。他在 [`www.thatjeffsmith.com`](http://www.thatjeffsmith.com)\
  \ 上维护着一个博客，我强烈建议你将此页面加入书签。新版本会在此博客上发布。每次有新版本发布时，你都可以找到讨论新功能的博客文章，甚至可以看到它们的实际操作演示。\n\
  \n我发现我每天越来越多地使用 SQL Developer。这款产品是 Oracle 开发出的最实用的工具之一。像任何有价值的工具一样，它只是让我的工作更轻松。花些时间来学习如何利用这个工具吧。\n\
  \n\n## Oracle Enterprise Manager\n\n你的 Oracle 数据库许可证中包含了 Oracle Enterprise Manager\
  \ (EM) 产品。当 Enterprise Manager 首次推出时，它是一个 DBA 在其工作站上运行的 Java 应用程序。他们可以将其连接到 Oracle\
  \ 数据库，并通过点击操作完成许多管理任务。与任何产品一样，EM 随时间不断成熟。如今的 EM 产品已是基于 Web 的，运行在数据库服务器或其他中央机器上。\n\
  \nEnterprise Manager 有两种形式：Enterprise Manager Database Express 或 Enterprise Manager\
  \ Cloud Control。当你创建 Oracle 数据库时，可以创建 `EM DB Express`，并且它只能用于管理该数据库。如果你需要管理第二个数据库，你可以设置第二个\
  \ `EM DB Express` 实例。显而易见，如果你有超过几个 Oracle 数据库需要管理，你的 `EM DB Express` 实例数量将会开始增长。每个实例都有不同的\
  \ URL，因此数据库越多，意味着需要收藏的 `EM DB Express` URL 就越多。`EM Cloud Control (EM CC)` 是一个用于管理任意数量数据库的集中式管理平台。如果你的\
  \ Oracle 基础架构开始增长，请使用 `EM CC`。在本节后续部分中，当我们谈论 `EM DB Express` 或 `EM CC` 时，我们将仅称为\
  \ Enterprise Manager 或 EM。\n\nEnterprise Manager 允许你管理你的 Oracle 数据库。例如，你可以查看有关表空间的详细信息，并创建新的表空间、删除旧的表空间或添加数据文件。我们可以在图\
  \ 11-6 中的 EM 里看到多个表空间。\n\n![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig6_HTML.jpg](img/467924_1_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6\nEM 表空间\n\nEnterprise Manager 可以监控你的数据库，如果发现异常，它可以呼叫或发送电子邮件给数据库管理员，告知他们有一个需要关注的问题。如果需要，DBA\
  \ 可以创建一个修复作业，这样下次 EM 发现该问题时，就能自动采取纠正措施。\n\nEnterprise Manager 的一个缺点是它太容易导致违反许可协议。例如，如果你正在使用\
  \ EM 管理一个数据库，并进入性能主页，你可以获得一个显示 Oracle 实例当前性能的精美图表。示例如图 11-7 所示。\n\n![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig7_HTML.jpg](img/467924_1_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7\nEM 性能页面\n\n在此屏幕上没有任何地方告诉你，要访问此页面，你需要获得可选组件 Diagnostics Pack 的许可。如果你在性能主页，可以转到\
  \ `Setup ➤ Management Packs ➤ Packs for this Page` 来确定使用该页面需要许可哪些可选组件包。你可以在图 11-8\
  \ 中看到，此页面需要获得 Diagnostics Pack 的许可。\n\n![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig8_HTML.jpg](img/467924_1_En_11_Fig8_HTML.jpg)\n\
  \n图 11-8\n此页面的管理组件包屏幕\n\n然而，如果你未获得此可选产品的许可，那么到现在已经为时已晚。一旦你访问了该页面，Oracle 就会向数据库表中写入一条记录，表明你已使用了此可选产品。如果你受到\
  \ Oracle 审计，他们会发现你的组织使用了未付费的产品。\n\n为了防止意外使用组件包，请转到 `Setup ➤ Management Packs ➤ Management\
  \ Pack Access`。在该页面上，取消勾选你未获许可使用的产品的复选框。如果 EM 在使用这些页面之前能询问以验证你是否拥有该产品的许可，那就更好了，但它并未这样做。\n\
  \n## 显示 SQL\n\nEnterprise Manager 是一款出色的产品，尤其对于需要通过点击操作来完成管理任务的新手数据库管理员而言。与大多数管理工具一样，该界面为你省去了繁琐的细节。工具会询问你几个问题，只需点击按钮，任务即可完成。不幸的是，数据库管理员如果仅依赖任何\
  \ GUI 工具的点击特性，学到的东西就不会那么多。\n\n在图 11-9 的示例中，数据库管理员正在创建一个新的表空间。只需要点击“确定”按钮，任务就完成了。\n\
  \n![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig9_HTML.jpg](img/467924_1_En_11_Fig9_HTML.jpg)\n\
  \n图 11-9\nEM 创建表空间屏幕\n\n你可以不点击“确定”按钮，而是点击 `Show SQL` 按钮，Enterprise Manager 会向你展示确切的\
  \ SQL 语句，类似于图 11-10。\n\n![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig10_HTML.jpg](img/467924_1_En_11_Fig10_HTML.jpg)\n\
  \n图 11-10\nEM 显示 SQL 屏幕\n\n许多工具都有能力向你展示它们将代表你发出的 SQL 语句。GUI 工具并不能变任何魔术。它们所做的一切就是询问你问题，并根据你填写的空白来构建\
  \ SQL 语句。然后，该工具将 SQL 语句提交给数据库引擎并等待回复。所有这些都是在幕后为你完成的。\n\n使用这个 `Show SQL` 按钮是学习更多关于\
  \ SQL 语句及其工作原理的好方法。例如，如果我点击图 11-10 中所示的 `Return` 按钮，然后勾选复选框以使其成为大文件表空间（bigfile tablespace），我就可以看到新形成的\
  \ SQL 语句并弄清楚发生了什么变化。\n\n### 提示\n\n使用 `Show SQL` 按钮或类似功能，查看工具在后台为你做了什么。\n\n下次当你使用\
  \ Enterprise Manager 或类似工具时，花些时间确定工具正在为你发出什么 SQL 语句。然后尝试更改一些选项，分析其对该 SQL 语句的影响。通过这种方式，你是在让工具教你更多关于\
  \ SQL 语句的知识，因为它们与当前任务相关。\n\n你也可以在 `SQL Developer` 中创建表空间。要查看 `SQL Developer` 发送给数据库的\
  \ SQL 语句，请点击 `DDL` 选项卡，如图 11-11 所示。\n\n![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig11_HTML.jpg](img/467924_1_En_11_Fig11_HTML.jpg)\n\
  \n图 11-11\nSQL Developer DDL 选项卡\n\n尝试查找工具发送到数据库的确切 SQL 语句，是学习更多数据库管理知识的好方法。\n\n\
  我也会使用这个“显示 SQL”功能来帮助构建我的 SQL 语句。如果我在语法上遇到问题并需要一些帮助，我会逐步完成工具的向导，然后查看我在哪里出错了。我并不强制通过该工具运行此语句。我可以将\
  \ SQL 语句复制粘贴到 `SQL*Plus` 或 `SQL Developer` 中。\n\n工具只会做其设计要做的事情。你会遇到一些情况，工具完成了你想做的大部分事情，但不是全部。你可以从工具中获取\
  \ SQL 语句，然后复制到 `SQL Developer` 中。从那里，你可以补充完整剩余部分，然后继续工作。如果工具无法完成确切的任务，看看它是否能通过显示它能做的\
  \ SQL 来给你一个起点。\n\n\n\n"
- '# 数据库配置助手


  在第 6 章中，我们使用了数据库配置助手（`DBCA`）来创建我们的第一个 Oracle 数据库。如图 11-12 所示，`DBCA`还可以执行其他任务，例如删除数据库、管理`DBCA`模板以及配置现有数据库。


  ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig12_HTML.jpg](img/467924_1_En_11_Fig12_HTML.jpg)

  *图 11-12：`DBCA`操作*


  配置现有数据库可用于添加或删除可选组件，如 Oracle Text、Oracle Multimedia、Oracle Spatial 等。


  在创建 Oracle 数据库时，`DBCA`会引导您回答一系列问题。您可以选择将这些答案保存为模板，这样不仅可以简化未来数据库的创建过程，还能遵循您的标准。如果您选择“管理模板”选项，`DBCA`会询问您是创建一个还是删除一个模板，类似于图
  11-13。


  ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig13_HTML.jpg](img/467924_1_En_11_Fig13_HTML.jpg)

  *图 11-13：`DBCA`创建模板*


  您可以使用现有模板或通过检查现有数据库来创建模板。模板创建后，您可以在列表中看到它。在图 11-14 中，前三个模板是`DBCA`自带的，但最后一个模板是我创建的。


  ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig14_HTML.jpg](img/467924_1_En_11_Fig14_HTML.jpg)

  *图 11-14：`DBCA`模板选择*


  '
- '# 网络配置助手


  Oracle 提供了一个网络配置助手（`NETCA`）来帮助配置 Oracle 数据库的网络组件。`NETCA`用于为 Oracle 数据库配置监听器以及任何
  LDAP 身份验证。


  在第 9 章中，我们通过手动编辑`tnsnames.ora`配置文件创建了一个`TNS`别名。大多数 Oracle 数据库管理员使用任何文本编辑器手动编辑`tnsnames.ora`。网络配置助手也可用于修改`tnsnames.ora`配置文件。


  启动`NETCA`后，该实用程序应如图 11-15 所示。选择“本地网络服务名配置”并点击“下一步”。


  ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig15_HTML.jpg](img/467924_1_En_11_Fig15_HTML.jpg)

  *图 11-15：`NETCA`初始屏幕*


  在下一个屏幕中，我们可以添加、重新配置、删除、重命名或测试`TNS`别名。向导将引导您完成剩余步骤。


  如前所述，大多数 Oracle 数据库管理员手动编辑配置文件。有时，他们会遇到语法无法正常工作的问题。使用`NETCA`是确保语法正确构成的好方法。


  '
- '# 其他工具和实用程序


  本章介绍了 Oracle 数据库管理员可能使用的一些工具和实用程序。您的大部分时间将花在`SQL*Plus`和/或`SQL Developer`上。许多数据库管理员也整天使用`Enterprise
  Manager`。由于篇幅限制，本章无法更详细地讨论这些工具。毕竟，`Enterprise Manager`本身就值得一本书来介绍。与 Oracle 的任何事物一样，您必须自己探索和学习更多。


  工具和实用程序并不限于本章到目前为止所见的内容。有许多实用程序您会时不时地用到。在本节中，我将讨论其中一些实用程序，并告知您它们的用途。重要的是了解有哪些工具，以及每个工具擅长执行什么工作。一旦知道使用哪个工具，您就可以立即集中精力到适当的领域。以下是各种工具和实用程序的列表：


  *   `Database Upgrade Assistant (DBUA)`：一个 GUI 向导，引导您完成升级过程。未来的章节将更详细地展示此工具。

  *   `Data Pump`：一组用于将数据从一个 Oracle 数据库导出和导入到另一个 Oracle 数据库的实用程序。

  *   `SQL*Loader`：一个命令行实用程序，用于将文本文件数据导入到 Oracle 数据库中。

  *   `Automatic Diagnostic Repository Command Interpreter (adrci)`：一个命令行实用程序，用于管理诊断跟踪文件。它也可用于打包跟踪文件，发送给
  Oracle 支持部门进行分析。

  *   `Database Verify (dbv)`：一个命令行实用程序，用于检查数据库的数据文件是否损坏。

  *   `Character Set Scanner (csscan)`：一个命令行实用程序，用于在更改数据库字符集之前扫描数据库。此实用程序将有助于发现字符集转换导致的问题。

  *   `Listener Control (lsnrctl)`：一个命令行实用程序，用于管理监听器。我们在本书中已经看到了许多示例。

  *   `Oracle Error (oerr)`：一个命令行实用程序，用于显示特定错误代码的错误消息。例如，在终端窗口中，键入`oerr ora 100`以获取`ORA-00100`错误消息的文本帮助。

  *   `Oracle Password Utility (orapwd)`：一个命令行实用程序，用于管理 Oracle 的密码文件，该文件用于`SYSDBA`和`SYSOPER`账户的外部身份验证。

  *   `Orion`：一个命令行实用程序，用于基准测试磁盘性能。

  *   `Relink`：一个命令行实用程序，用于重新编译 Oracle 软件。

  *   `Recovery Manager (RMAN)`：一个命令行实用程序，用于备份和恢复 Oracle 数据库。`RMAN`在第 7 章中讨论过。

  *   `tkprof`：一个命令行实用程序，可以将一些跟踪文件重新格式化为更易于人类阅读的输出。

  *   `TNS Ping (tnsping)`：一个命令行实用程序，用于确定`TNS`别名是否能到达有效的监听器。此实用程序在第 9 章中讨论过。

  *   `sqlcl`：一个命令行实用程序，是`SQL*Plus`的替代品。`SQL*Plus`多年来没有重大变化。`sqlcl`实用程序由 Oracle 创建`SQL
  Developer`的同一团队提供。它被宣传为“`SQL Developer`遇见`SQL*Plus`”。这是列表中默认未安装的唯一一个 Oracle 产品。

  *   `Swingbench`：一个免费的实用程序，可从[`www.dominicgiles.com`](http://www.dominicgiles.com)获取，可用于对
  Oracle 数据库进行性能测试。这不是 Oracle 产品，默认未安装。

  *   `HammerDB`：一个开源实用程序，可用于对 Oracle 和其他数据库平台进行性能测试。这不是 Oracle 产品，默认未安装。


  此列表中的大多数工具和实用程序由 Oracle Corporation 提供，在您安装 Oracle 数据库软件时即已存在。您也可以使用许多第三方工具。其中一些通常需要额外费用。您和您的公司将不得不评估这些产品，看看它们是否值得额外成本。


  ## 继续前行


  本章花了一些时间讨论 Oracle DBA 可用的一些工具。在使用这些工具时，您将更多地了解它们以及如何使用它们来完成工作。


  在下一章中，我们将转向 Oracle 诊断文件。数据库管理员知道如何利用诊断和跟踪文件来了解 Oracle 数据库出了什么问题，这一点很重要。


  '
- '# 12. 诊断


  在前面的章节中，我们设置了一个数据库并开始使用它。在本章中，我们将利用诊断和跟踪文件来了解更多可能困扰 Oracle 数据库的问题。如果 Oracle 实例无法启动或崩溃，诊断文件是开始深入研究问题的绝佳起点。




  ## 诊断目标地


  当今的 Oracle 数据库引擎将其诊断文件和跟踪文件整合到一个称为**诊断目标地**的统一位置。在 Oracle Database 11*g* 之前，这些文件分散在多个位置，使得查找所需内容更加困难。默认情况下，诊断目标地是
  Oracle 基目录下的一个子目录。如果不确定其位置，可以使用一个简单的 SQL*Plus 命令 `show parameter` 来查找，如清单 12-1 所示。`show
  parameter` 命令可用于查看任何初始化参数的值。


  ```

  SQL> show parameter diagnostic_dest

  NAME                 TYPE        VALUE

  -------------------- ----------- ----------------

  diagnostic_dest      string      /u01/app/oracle

  清单 12-1

  诊断目标地

  ```


  上面的输出对应于 Oracle 基目录的位置。诊断文件位于一个名为 `diag` 的子目录中。在 `/u01/app/oracle/diag`（或您系统上的类似位置）内，还有许多其他子目录，每个可能生成诊断和跟踪文件的组件都有一个对应的目录。例如，数据库引擎会将其跟踪文件写入
  `rdbms` 子目录。Oracle 监听器会将其跟踪文件写入 `tnslsnr` 子目录。清单 12-2 展示了我们测试平台上 `/u01/app/oracle/diag`
  下的多个子目录。


  ```

  [oracle@dbamentor ~]$ cd /u01/app/oracle/diag

  [oracle@dbamentor diag]$ ls -l

  total 0

  drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 afdboot

  drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 apx

  drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 asm

  drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 asmtool

  drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 bdsql

  drwxrwxr-x. 3 oracle oinstall 24 Jul 10 00:14 clients

  drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 crs

  drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 diagtool

  drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 dps

  drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 em

  drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 gsm

  drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 ios

  drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 lsnrctl

  drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 netcman

  drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 ofm

  drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 plsql

  drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 plsqlapp

  drwxrwxr-x. 3 oracle oinstall 17 Sep 29  2017 rdbms

  drwxrwxr-x. 4 oracle oinstall 38 Jul 30 10:30 tnslsnr

  清单 12-2

  诊断目标地内容

  ```


  在您使用 Oracle 的职业生涯中，您会发现自己会经常访问其中的许多子目录，而其他的则永远不需要您的关注。如果您使用 Oracle 的自动存储管理器 (ASM)，那么您可能偶尔需要查看
  `asm` 子目录。如果您从未使用过 ASM，那么您永远不需要此组件的跟踪文件，并且该目录很可能是空的。您可能访问的其他常见目录包括：


  - `crs`：如果您安装了 Oracle 的 Grid Infrastructure (GI)，任何 GI 跟踪文件都将写入此处。在早期， GI 曾被称为集群就绪服务
  (CRS)，因此目录名由此而来。

  - `em`：如果您在此系统上安装并运行了 Enterprise Manager (EM)，您可以在此处找到其文件。

  - `rdbms`：如前所述，此目录是 Oracle 数据库引擎写入其诊断跟踪文件的位置。

  - `tnslsnr`：Oracle 监听器会将其文件写入此处。


  `/u01/app/oracle/diag` 的其他子目录很少使用。


  由于一台服务器可以支持多个 Oracle 数据库，每个 Oracle 实例会将跟踪文件写入类似于 `/u01/app/oracle/diag/rdbms/`*数据库名*`/`*实例名*
  的目录路径中。


  对于我们的测试平台，Oracle 实例名称与数据库名称相同。只有在运行 Oracle 真正应用集群 (RAC) 时，实例名才会与数据库名不同。由于我们的数据库不使用
  RAC，因此我们数据库诊断和跟踪文件的目录路径是 `/u01/app/oracle/diag/rdbms/orcl/orcl`。


  Oracle 监听器会将其诊断和跟踪文件写入类似于 `/u01/app/oracle/diag/tnslsnr/`*主机名*`/listener` 的路径中。


  随着本章的推进，我们将看到更多这些文件。


  ## 告警日志


  有一个特殊的文件，当您管理 Oracle 数据库时，您会很快熟悉它，那就是**告警日志**。很可能您在职业生涯早期就已经接触过这个文件。在我们的测试平台上，告警日志存储在
  `/u01/app/oracle/diag/rdbms/orcl/orcl/trace` 中。第 6 章中的说明创建了一个名为 "orcl" 的数据库。如果您使用了不同的名称，那么目录路径会略有不同。


  告警日志始终按照 `alert_`*实例名*`.log` 的约定命名，使用实例名。如前所述，除非您运行的是 Oracle RAC，否则实例名与数据库名相同。Oracle
  还在 `/u01/app/oracle/diag/rdbms/orcl/orcl/alert` 中创建了一个基于 XML 的告警日志，其中日志文件的每个条目都包裹在
  XML 标记标签中。我发现 XML 版本的日志文件难以阅读，但对于解析日志文件的工具来说，此文件非常有用。如果您与 Oracle 支持部门合作，他们可能会要求您发送基于
  XML 的告警日志，以便他们用工具解析。否则，我从不查看基于 XML 的告警日志。


  清单 12-3 显示了我们测试平台上的基于文本的告警日志。


  ```

  [oracle@dbamentor ~]$ cd /u01/app/oracle/diag/rdbms/orcl/orcl/trace/

  [oracle@dbamentor trace]$ ls -l alert*

  -rw-r-----. 1 oracle oinstall 466338 Jul 30 14:09 alert_orcl.log

  清单 12-3

  告警日志位置

  ```


  告警日志应该是 Oracle DBA 排查 Oracle 数据库问题的首选位置之一。Oracle 不会为每个会话的错误或问题都向此处写入信息。这样做会消耗过多资源。相反，告警日志是用于影响
  Oracle 数据库及其整体实例的问题。我们将在告警日志中看到 Oracle 实例启动和关闭的消息。


  当 Oracle 实例启动时，它会向告警日志写入大量信息性消息。在清单 12-4 中，我们可以看到告警日志中的一些信息。为简洁起见，许多信息已被移除。看看您是否能从包含的内容中发现以下信息：


  - 实例启动的日期和时间

  - 数据库服务器上的核心数

  - Oracle 数据库版本

  - Oracle 主目录

  - 数据库服务器名称及其操作系统版本

  - 参数文件 (spfile) 的位置

  - 正在使用的非默认参数

  - 实例开放业务的日期和时间



