  \n*   `DBA_BLOCKERS`：显示哪个会话正在阻塞谁。\n*   `DBA_CONSTRAINTS`：显示应用于数据库中所有表的约束。\n*   `DBA_DATA_FILES`：显示构成数据库的文件。\n\
