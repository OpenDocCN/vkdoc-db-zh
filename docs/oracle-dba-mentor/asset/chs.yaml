  Destination  :  /u01/app/oracle/oradata/arch/\nThe database has archiving enabled.\
  \  The upgrade process will need free\ndisk space in the archive log destination(s)\
  \ to generate archived logs to.\n清单 18-7\n预升级信息部分\n```\n\n然后，日志文件以关于一个可以在升级前运行以修复任何问题的脚本信息，结束了升级前部分。清单\
  \ 18-8 包含了测试环境的预升级脚本。\n\n```\nORACLE GENERATED FIXUP SCRIPT\n=============================\n\
  All of the issues in database ORCL\nwhich are identified above as BEFORE UPGRADE\
  \ \"(AUTOFIXUP)\" can be resolved by executing the following\nSQL>@/u01/app/oracle/cfgtoollogs/orcl/preupgrade/preupgrade_fixups.sql\n\
  清单 18-8\n预升级修复脚本\n```\n\n预升级实用程序无法生成命令来修复所有升级前可能需要关注的问题。如果有修复脚本无法处理的问题，实用程序会告知我们这一情况。为稳妥起见，我们在数据库中运行了预升级修复脚本，如清单\
  \ 18-9 所示。\n\n\n## 升级前修复脚本执行\n\n```\nSQL> @preupgrade_fixups.sql\n正在执行 Oracle 升级前修复脚本\n\
