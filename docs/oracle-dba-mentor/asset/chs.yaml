  \              Empty             0.00\nSYSAUX               1,184,890,880      1,122,566,144\
  \            94.74\nSYSTEM                 734,003,200        730,726,400      \
  \      99.55\nUNDOTBS1               492,830,720         13,959,168            \
  \ 2.83\nUSERS                    5,242,880              Empty             0.00\n\
  清单 14-13\n表空间空闲空间\n```\n\n我可以看到有两个表空间是空的，而 `SYSTEM` 和 `SYSAUX` 表空间的使用率超过了 90%。\n\
  \n接下来，我通常想了解数据库中的用户。Oracle 包含许多为支持内部数据库操作而创建的用户。我通常只关心非 Oracle 维护的用户，如清单 14-14 所示。\n\
  \n```\nSQL> select username,account_status from dba_users\n2  where oracle_maintained='N'\
  \ order by username;\nUSERNAME                       ACCOUNT_STATUS\n------------------------------\
  \ --------------------------------\nPEASLAND                       OPEN\nTEST_USER\
  \                      OPEN\nHR                             OPEN\n清单 14-14\n非 Oracle\
  \ 用户\n```\n\n在讨论用户账户时，安全应该是每个人最关心的问题。接下来，我将查询数据字典以确定正在使用的安全配置文件，如清单 14-15 所示。\n\n\
  ```\nSQL> select username,profile from dba_users\n2  where oracle_maintained='N'\
  \ order by username;\nUSERNAME                       PROFILE\n------------------------------\
  \ ------------------------------\nPEASLAND                       DEFAULT\nTEST_USER\
  \                      DEFAULT\n清单 14-15\n用户的配置文件\n```\n\n我看到用户正在使用名为 `DEFAULT`\
  \ 的配置文件。要了解有关此配置文件的更多信息，我可以再次查询数据字典，如清单 14-16 所示。\n\n```\nSQL> select resource_name,limit\
  \ from dba_profiles\n2  where profile='DEFAULT';\nRESOURCE_NAME                \
  \    LIMIT\n-------------------------------- ------------------------------\nCOMPOSITE_LIMIT\
  \                  UNLIMITED\nSESSIONS_PER_USER                UNLIMITED\nCPU_PER_SESSION\
  \                  UNLIMITED\nCPU_PER_CALL                     UNLIMITED\nLOGICAL_READS_PER_SESSION\
  \        UNLIMITED\nLOGICAL_READS_PER_CALL           UNLIMITED\nIDLE_TIME      \
  \                  UNLIMITED\nCONNECT_TIME                     UNLIMITED\nPRIVATE_SGA\
  \                      UNLIMITED\nFAILED_LOGIN_ATTEMPTS            5\nPASSWORD_LIFE_TIME\
  \               90\nPASSWORD_REUSE_TIME              730\nPASSWORD_REUSE_MAX   \
  \            8\nPASSWORD_VERIFY_FUNCTION         ORA12C_VERIFY_FUNCTION\nPASSWORD_LOCK_TIME\
  \               .0069\nPASSWORD_GRACE_TIME              7\nINACTIVE_ACCOUNT_TIME\
  \            365\n清单 14-16\n默认配置文件设置\n```\n\n如果上述任何配置文件设置不符合我的安全预期，我可以着手进行改进。\n\n\
  了解数据库中哪些用户被授予了强大的 `DBA` 角色是很有用的。清单 14-17 显示了一个简单的查询，用于确定拥有 `DBA` 角色的用户。\n\n```\n\
  SQL> select grantee from dba_role_privs\n2  where granted_role='DBA';\nGRANTEE\n\
  ------------------------------\nPEASLAND\nSYSTEM\nSYS\n清单 14-17\nDBA 用户\n```\n\n\
  \n我总是期望看到`SYSTEM`和`SYS`用户拥有此角色。任何其他用户都应该是`DBA`团队的一部分。\n\n接下来，我通常会尝试了解数据库中正在使用的初始化参数。我只关心那些被设置为非默认值的参数，因此我在清单\
  \ 14-18 中的查询将给我非默认值。\n\n```sql\nSQL> select name,value from v$parameter\n2  where\
  \ isdefault='FALSE'\n3  order by name;\nNAME                           VALUE\n------------------------------\
  \ ----------------------------------------\naudit_file_dest                /u01/app/oracle/admin/orcl/adump\n\
  audit_trail                    DB\ncompatible                     12.2.0\ncontrol_files\
  \                  /u01/app/oracle/oradata/orcl/control01.c\ntl, /u01/app/oracle/oradata/orcl/control\n\
  02.ctl\ndb_block_size                  8192\ndb_name                        orcl\n\
  diagnostic_dest                /u01/app/oracle\ndispatchers                    (PROTOCOL=TCP)\
  \ (SERVICE=orclXDB)\nnls_language                   AMERICAN\nnls_territory    \
  \              AMERICA\nopen_cursors                   300\npga_aggregate_target\
  \           810549248\nprocesses                      300\nremote_login_passwordfile\
  \      EXCLUSIVE\nsga_target                     4294967296\nundo_tablespace   \
  \             UNDOTBS1\n```\n**清单 14-18** 非默认参数\n\n接下来，我确定数据库中的计划任务。我不关心 Oracle\
  \ 内部操作的任务，因此我忽略了那些由 `SYS` 和 `ORACLE_OCM` 拥有的任务，如清单 14-19 所示。\n\n```sql\nSQL> select\
  \ owner,job_name,repeat_interval\n2  from DBA_scheduler_jobs\n3  where owner'SYS'\
  \ and owner'ORACLE_OCM'\n4  order by 1,2;\nOWNER     JOB_NAME          REPEAT_INTERVAL\n\
  --------- ----------------- --------------------------------------------\nHR   \
  \     EMP_ROLLUP_JOB    freq=daily;byhour=01;byminute=01;bysecond=01\n```\n**清单\
  \ 14-19** 计划任务\n\n仅仅通过几次查询，并快速浏览数据字典，我就对我继承的这个数据库了解了不少。正如生活中任何事情一样，当我们得知一个问题的答案时，很可能会引发新的问题。我们需要做的就是找到合适的数据字典视图，进一步了解这个特定的数据库。\n\
  \n没有作者能写一本包含你数据库具体信息的书。我最多只能向你展示如何利用数据字典。你现在有能力深入了解你正在管理的特定数据库。\n\n## 继续前进\n\n数据字典是数据库的内部文档。作为一名\
  \ Oracle DBA，你会发现自己需要不断地查询数据字典来解答许多问题。Oracle 文档告诉你 Oracle 数据库通常是**如何工作**的。而数据字典则具体地告诉你**关于你的数据库**的信息。\n\
  \n在下一章中，我们将讨论 My Oracle Support。这个宝贵的资源能让你了解到比文档所写的更多的 Oracle 数据库知识。它可以帮助你判断一个问题是否与缺陷（bug）相关，以及是否有已知的解决方法或补丁。如果\
  \ Oracle 文档和数据字典无法回答你的问题，My Oracle Support 通常是下一个去处。\n\n"
- '# 第四部分 维护 Oracle 数据库


  '
- "# 15. My Oracle Support\n\n读完本书后，你很可能会产生更多问题并希望了解更多。在前面的两章中，我们开启了一段深入 Oracle 文档的旅程。正如你所发现的，Oracle\
  \ 文档是学习更多 Oracle 知识的重要资源。文档集非常庞大，最大的障碍是弄清楚哪本书包含你想要的信息，这就是为什么我们花了两章来探索如何导航文档。\n\n\
  在上一章中，我们讨论了 Oracle 数据字典。所有优秀的数据库引擎都以数据字典或数据库目录的形式是自我文档化的。使用数据字典的最大障碍是弄清楚哪个视图包含你想要的信息。\n\
  \n如果你遇到一个问题，而 Oracle 文档和数据字典都没有包含你寻找的答案，那么下一个通常要去的地方就是 My Oracle Support。\n\n##\
  \ 登录 My Oracle Support\n\nMy Oracle Support，通常缩写为 `MOS`，是 Oracle 公司的支持门户。`MOS` 用户可以搜索知识库、获取补丁并提交援助请求。`MOS`\
  \ 处理 Oracle 的所有产品。正如我们将在本章中看到的，`MOS` 还提供了更多功能。\n\n要访问 My Oracle Support，请将 Web 浏览器指向\
  \ [`http://support.oracle.com`](http://support.oracle.com)，并使用你的 Oracle 单点登录 (`SSO`)\
  \ 账户登录，如图 15-1 所示。回想一下，在第 3 章和第 5 章中，你使用了你的 Oracle `SSO` 账户从 Oracle 技术网络下载软件。如果你没有\
  \ Oracle `SSO` 账户，可以免费创建一个。图 15-1 显示了登录 `MOS` 的按钮。如果你没有 Oracle `SSO` 账户，请点击**新用户**链接。创建账户时，我通常使用公司电子邮件地址作为用户\
  \ ID。所有 Oracle `SSO` 账户都使用电子邮件地址作为用户 ID。如果你因支持问题填写服务请求，Oracle 支持会将通知发送到该电子邮件地址。\n\
  \n![图 15-1](img/467924_1_En_15_Fig1_HTML.jpg)\n*图 15-1 My Oracle Support 登录屏幕*\n\
  \n登录后，你将被定向到 **MOS 仪表板**选项卡。在仪表板选项卡的右侧，有多个其他选项卡可用于导航到 `MOS` 的不同区域，如图 15-2 所示。\n\n\
  ![图 15-2](img/467924_1_En_15_Fig2_HTML.jpg)\n*图 15-2 MOS 导航选项卡*\n\n\n\n## CSI\n\n\
  虽然访问 MOS 是免费的，但如果贵公司没有处于有效状态的 Oracle 支持合同，您在那里能做的事情将非常有限。当首次为公司的 Oracle 产品购买支持合同时，Oracle\
  \ 会提供一个客户服务标识号。只要维护合同每年续签，您就可以继续使用该 CSI 号码。如果贵公司在不同时间购买了 Oracle 产品，您可能会拥有多个 CSI\
  \ 号码。\n\n第一个输入有效 CSI 号码的 MOS 账户将成为 CSI 管理员。如果贵公司已经有其他人担任 CSI 管理员，当您将该 CSI 输入到您的\
  \ MOS 账户时，管理员需要批准您使用该 CSI 号码。\n\n如果贵公司的 CSI 号码已经输入到 MOS 中，请向您的数据库管理团队询问您应使用哪些 CSI\
  \ 值。然后登录 My Oracle Support 并点击 `设置` 标签页。如图 15-3 左侧所示，点击 `我的账户` 链接。\n\n![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig3_HTML.jpg](img/467924_1_En_15_Fig3_HTML.jpg)\n\
  图 15-3\n\n支持标识符\n\n在“支持标识符”部分，您应该能看到与您的 MOS 账户关联的 CSI 号码。点击 `请求访问` 按钮。您将被转到如图 15-4\
  \ 所示的屏幕，以将该 CSI 添加到您的账户。\n\n![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig4_HTML.jpg](img/467924_1_En_15_Fig4_HTML.jpg)\n\
  图 15-4\n\n添加新 CSI\n\n输入您需要访问的 CSI 值。系统将自动向您组织中的 CSI 管理员发送一封电子邮件。\n\nCSI 管理员需要前往\
  \ MOS 中相同的 `设置` 标签页，并点击 `待处理的用户请求` 链接以批准您的访问。一旦获得批准，您就可以将此 CSI 值用于您的需求。\n\n## 仪表板\n\
  \n首次登录 My Oracle Support 时，您将进入如图 15-5 所示的 `仪表板` 标签页。如果您想返回仪表板，只需点击页面顶部的其标签页即可。\n\
  \n![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig5_HTML.jpg](img/467924_1_En_15_Fig5_HTML.jpg)\n\
  图 15-5\n\nMOS 仪表板\n\n`仪表板` 标签页是一个很好的起点。它包含最新消息、知识库快速搜索、未解决服务请求摘要以及入门指南等部分。\n\n大多数人使用仪表板的默认设置，但您也可以根据需要对其进行定制。在页面的右上角，点击\
  \ `自定义页面` 链接。在那里，如果您不想看到某些仪表板面板，可以将其移除。您可以点击 `添加内容` 按钮来添加错误追踪器、补丁搜索等面板。\n\n## 教程视频\n\
  \n在仪表板的“入门指南”部分，有一个标题为“学习 My Oracle Support：操作系列”的链接。我强烈建议您点击该链接，花些时间观看一些关于如何使用\
  \ MOS 的视频。这些视频将补充您在本章中阅读的内容。如果您点击该链接，您将看到一个类似于图 15-6 的页面。点击“播放视频”下的任意按钮以了解更多信息。\n\
  \n![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig6_HTML.jpg](img/467924_1_En_15_Fig6_HTML.jpg)\n\
  图 15-6\n\nMOS 培训视频\n\n图 15-6 显示了 `MOS 新手` 标签页，它为 My Oracle Support 的新用户提供视频。这里有许多短视频，描述了大部分功能。欢迎点击其他标签页，探索有哪些视频等着您。\n\
  \n## 知识库\n\n当我访问 My Oracle Support 时，知识库是我花费时间最多的地方。如果您遇到问题，而 Oracle 文档或数据字典都无法帮助您解决问题，那么\
  \ MOS 知识库通常是您下一个应该查找的地方。\n\n搜索知识库非常容易。它非常类似于使用 Google 或其他搜索引擎进行网络搜索。只需输入您的搜索文本并点击放大镜图标即可开始搜索。您可以在仪表板的“知识库”部分的框中输入搜索文本，也可以点击\
  \ `知识库` 标签页。每个页面的顶部都有一个类似于图 15-7 的搜索框。\n\n![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig7_HTML.jpg](img/467924_1_En_15_Fig7_HTML.jpg)\n\
  图 15-7\n\nMOS 搜索框\n\n我通常使用页面顶部的搜索框，因为我知道无论我在 MOS 中的哪个位置，它总是在那里。搜索框左侧的下拉菜单会显示您最近的搜索词历史。\n\
  \n与进行任何网络搜索一样，您的术语越具体，获得相关命中结果的机会就越大。如果您只搜索“Oracle”，您将得到大量结果，其中许多可能对您的问题没有帮助。将您的确切错误消息复制并粘贴到搜索框中通常很有帮助。\n\
  \n图 15-8 显示了使用错误消息进行的一次搜索结果。搜索文本仍在框中。\n\n![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig8_HTML.jpg](img/467924_1_En_15_Fig8_HTML.jpg)\n\
  图 15-8\n\n知识库搜索结果\n\nMOS 会将搜索命中结果分解为不同的部分。在图 15-8 的示例中，这些部分是“推荐链接”、“知识库搜索结果”和“社区搜索结果”。点击蓝色三角形可展开每个部分。在图\
  \ 15-8 的顶部，您会在 `知识库` 和 `社区` 旁边看到一个绿色复选标记。您可以点击该绿色复选标记将其关闭，并从结果中移除来自这些区域的命中结果。再次点击复选标记可显示结果中的命中项。\n\
  \n如果我在图 15-8 中点击 `知识库搜索结果` 旁边的蓝色三角形，然后点击第一个命中项，我将被带到如图 15-9 所示的 My Oracle Support\
  \ 注释页面。MOS 中的每个文档都称为一个注释，并且都有一个 ID 号。在图 15-9 的示例中，我正在查看 MOS 注释 `1475147.1`。在 Oracle\
  \ 支持的早期，注释是通过其文档 ID 或简称 Doc ID 来引用的。您可能仍然会看到人们引用 Doc ID 而不是 Note。即使在图 15-9 中的文章也写着“Doc\
  \ ID”。如今的 Oracle DBA 会将 Doc ID 和 Note 互换使用。\n\n![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig9_HTML.jpg](img/467924_1_En_15_Fig9_HTML.jpg)\n\
  图 15-9\n\nMOS 文档\n\n在 My Oracle Support 之外披露 MOS 注释的内容是违反您的支持协议的。您会在图 15-9 中注意到，我只包含了标题，而没有包含文档的实际内容。另请注意页面顶部的“Oracle\
  \ 机密”字样。\n\n\n## 显示文档与书签功能\n\n当你从搜索结果显示文档时，有两点需要注意。首先，左侧列出了符合你搜索条件的文档列表。你可以利用它轻松跳转到下一个感兴趣的文档，而不必在搜索结果和文档之间来回切换。当然，你也可以选择返回搜索结果。其次，注意文档标题左侧的空心金色星标。点击该星标即可为文档添加书签，如图\
  \ 15-10 所示。\n\n![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig10_HTML.jpg](img/467924_1_En_15_Fig10_HTML.jpg)\n\
  \n图 15-10  \nMOS 书签功能\n\n你会看到文档标题旁的金色星标现在变成了实心，表示已添加书签。那么在哪里访问你的书签呢？请看屏幕顶部搜索框的左侧。你应该能看到一个金色星标的下拉菜单。点击该金色星标，然后选择`Documents`即可查看你已收藏的书签。随着书签越来越多，你可能希望按主题进行组织。在同一个下拉菜单中，你可以选择`Manage\
  \ Favorites`来创建文件夹以便更好地管理。\n\n## 知识库使用建议\n\n正如我之前所说，在使用 MOS 时，我花费大量时间在知识库中。如果我无法解决问题，通常其他人也遇到过相同情况，并且\
  \ Oracle Support 已将其记录下来供你查阅。这为每个人都节省了大量时间。如果你能阅读 MOS Note 并自行解决问题，Oracle Support\
  \ 就无需花费时间与你一对一沟通，而你也不必等待 Oracle Support 来处理。如果你还记得第 13 章关于 Oracle 文档的内容，我提到过，当你寻求帮助时，最好表明你已提前做了一些工作。就像我们不应该问“RTFM”（请阅读手册）问题一样，我们也不应该提出那些通过简单\
  \ MOS 搜索就能找到答案的简单问题。请做好你自己的功课，为包括你自己在内的每个人节省时间。\n\n像任何类型的搜索一样，你在 MOS 中搜索得越多，就会越熟练。你的搜索越具体，结果就越好。不要搜索“ORA-700”；相反，如果你的错误信息显示的是“ORA-700\
  \ [kesqsMakeSql-invstat:elpsTime]”，就应该搜索这个完整信息。那些括号内的文本具有很高的唯一性，能非常迅速地缩小结果范围。\n\n\
  ## 服务请求\n\n假设你遇到了一个无法解决的问题。Oracle 文档中没有任何帮助。你在 MOS Notes 中搜索了一个小时，没有一个真正解决你的问题或回答你的疑问。下一步通常是执行谷歌搜索。如果那也不成功，你该向谁求助？通常，最后的选择是向\
  \ Oracle Support 提交一个服务请求。在 MOS 中，点击`Service Requests`选项卡。你的屏幕应如图 15-11 所示。\n\n\
  ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig11_HTML.jpg](img/467924_1_En_15_Fig11_HTML.jpg)\n\
  \n图 15-11  \nMOS 服务请求选项卡\n\n在服务请求选项卡中，你可以看到未解决的 SR 列表。你也可以点击`Create SR`按钮。当你创建一个新的服务请求时，系统会要求你提供一系列信息，以便将请求分配给正确的支持分析师。也许最重要的是确定你请求的严重级别，如图\
  \ 15-12 所示。\n\n![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig12_HTML.jpg](img/467924_1_En_15_Fig12_HTML.jpg)\n\
  \n图 15-12  \nSR 严重级别选项\n\n如果这是一个生产系统，并且你完全丧失了服务，请选择严重级别为`1`。被归类为`Sev 1`的服务请求会立即获得\
  \ Oracle Support 的关注。如果你有`Sev 1`请求，请确保在 Oracle 回复你时能够及时响应。你的服务请求中很少有属于`Sev 1`或`Sev\
