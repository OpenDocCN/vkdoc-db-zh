  *   `V$SESSION_EVENT`：显示每个会话自启动以来一直在等待的事件。\n*   `V$SESSION_WAIT`：显示每个会话当前正在等待的详细信息。\n\
  *   `V$SGAINFO`：显示 SGA 每个组件的大小。\n*   `V$SPPARAMETER`：显示存储在 SPFILE 中的参数值。\n*   `V$SQL`：显示有关存储在共享池中的\
