  ## 降级


  大多数人从未考虑过对 Oracle 数据库进行降级。我曾在讨论论坛上发起过一个投票，询问有多少人执行过 Oracle 数据库降级。在 675 名受访者中，只有
  14 人实践过 Oracle 数据库降级，这个数字至今仍让我感到困惑。我希望更多的 Oracle 数据库管理员至少能偶尔练习一下降级操作。


  降级是最后的手段。如果你已在新的 Oracle 版本上对应用程序进行了充分测试，并且测试了升级过程，那么你将永远不需要降级。虽然我实践过降级，但我从未需要对生产数据库进行降级，尽管有一次非常接近。我只会在升级完成后无法修复数据库中的问题时才考虑降级。例如，在升级到
  12.1.0.2 时，我遇到了许多优化器问题，导致查询性能低下。在我几乎要执行数据库降级时，我了解到其他人也遇到了同样的问题，而 Oracle 提供了一些隐藏的初始化参数来解决我的问题。


  你应该在升级前后都进行备份，这意味着你有能力回溯到任一时间点。现在考虑一下，如果在升级完成并为应用程序用户开放数据库后才发现问题，会发生什么。自升级完成以来，这些应用程序用户已经在数据库中生成了事务。你不能使用升级后创建的备份，因为该备份是用于新版本的。如果你想使用升级前的备份，你当然可以回退到旧版本，但你将无法前滚升级后的任何事务。如果你选择使用该升级前的备份，你将面临数据丢失，这一点简单明了。


  在理想情况下，数据库升级后的第二天早上我来到办公室，没有人会说什么。最终用户根本不知道数据库现在是一个闪亮的新版本。没有人抱怨，也没有报告问题。有时事情会发生，而数据库管理员的工作就是修复数据库，因为升级破坏了某些东西。有些问题容易解决，有些则可能很困难。尽快解决问题，因为你真的不想回退到旧版本。在极少数情况下，你可能需要做出决定：升级并非明智之举，需要回到旧版本。你有两个选择：从升级前的备份恢复并丢失自那时起的所有事务，或者执行降级。对我来说，数据丢失是一个糟糕的选择，降级是更好的选择，这就是为什么当我发现许多数据库管理员根本不考虑降级时感到惊讶。这一点非常重要，我再强调一遍。降级可能是你在不丢失任何数据的情况下回退到旧数据库版本的唯一选择。


  新版本的 Oracle *升级指南* 总是专门用一章来讲 Oracle 降级。如果你必须执行降级，你会想要非常仔细地阅读该章。它将包含如何执行降级的分步说明。步骤取决于你可能正在使用和安装的各种选项，因此本章不会重复该过程。从高层来看，降级步骤是：关闭数据库，使用旧版本软件以
  `DOWNGRADE` 模式启动，然后运行 `catdwgrd.sql` 脚本。


  `DBUA` 不执行降级。降级是一个手动过程。我建议你在职业生涯的不同阶段在测试环境中练习 Oracle 降级。我们的测试环境是练习的完美场所。只需关闭虚拟机，并对服务器及其存储进行快照。全部启动后，按照
  *升级指南* 中的步骤降级到旧版本。数据库降级后，你可以选择恢复到快照瞬间回到新版本，或者可以再次练习升级，这也不是个坏主意。


  ## 继续前进


  本章讨论了如何将 Oracle 数据库升级到新版本。我们在测试环境中逐步完成了升级过程，现在拥有一个可以运行和把玩的 Oracle 18c 数据库。我们讨论了数据库升级和阅读
  Oracle 文档的重要性。我们甚至提到了数据库降级。


  在下一章中，我们将更专注于维护 Oracle 数据库。我们将探讨容量规划，以确保数据库能够处理未来的负载。你构建的东西可能今天适用，但明天可能就太小了。


  '
- '# 19. 容量规划


  在过去的两章中，我们通过应用补丁和执行升级使我们的 Oracle 数据库保持前进，这两项对于数据库管理员来说都是至关重要的任务。有时，应用补丁是修复问题的被动任务。大多数时候，应用补丁是一项主动的努力。升级数据库是保持最新、维持支持并享受新功能的方式，这些新功能使数据库能够持续发展以支持基础设施。


  在本章中，我们将讨论 Oracle 数据库的容量规划。就其本身而言，容量规划不会影响你当前的环境。相反，容量规划是你今天执行的一项活动，以帮助你为未来做出更好的决策。




  ## 复杂性


  如果你与容量规划领域的专家交流，他们会非常乐意让你了解他们的工作有多么复杂和重要，以确保当今和未来拥有成功的运营环境。虽然我并非意在贬低或轻视他们的努力，但我对容量规划采取了一种更为简化的方法，正如我将在本章概述的那样。在我的
  DBA 职业生涯中，这一方法一直对我颇有裨益。阅读本章后，你可能会发现你需求更多，并希望在容量规划工作中更加细致。如果本章内容对于你未来进行的容量规划来说有所不足，那么请务必自行深入学习该主题，在读完本章后，达到比我通常做法更深入的程度。对你们中的许多人来说，本章的信息将提供你所需的大部分知识，你很可能凭借这些知识就能维持你的数据库管理员职业生涯。


  当我刚进入这个行业时，计算机系统的资源非常有限。软件开发人员会精打细算每一个字节的内存。将代码重构为执行相同任务但更高效、更精简的代码体，以节省内存，曾是一项常见任务。那时，磁盘空间极其有限，DBA
  只存储他们需要的信息，不多存一分。如果你要求更多内存或更多磁盘空间，你必须明确说出需要增加多少。组织不会购买超出必要的资源。


  我记得当我刚开始担任 Oracle DBA 时，我发现了一个 Excel 电子表格。只需输入几个数值，这个表格就能准确算出一个索引会有多大。你输入索引列的数据类型和精度，加上预期的行数，这个表格就会结合所有
  Oracle 索引所需的开销进行计算，然后其中一个单元格会神奇地给出一个以 KB 为单位的数字。老实说，对于那个年代的 Oracle 版本，这个电子表格实际上非常好用。我记得用它来估算索引大小，然后在实际中创建索引，结果证明，一次又一次，估算都非常准确。


  在一个项目中反复使用这个电子表格后，我意识到这种方法存在许多问题。首先，这种方法非常耗时。DBA 必须在电子表格中填入数值，得到估算结果，然后为每一个索引重复这一过程。我发现更简单的方法是：用样本数据填充一张表，创建一个索引，然后直接询问
  Oracle 需要多少空间。如果样本数据量大约是预期数据量的 10%，那么我只需将索引大小乘以 10，就能得到一个很好的估计值。这样我不仅得到了索引大小的估计值，也得到了表大小的估计值。这意味着我也可以抛弃那个帮我估算表大小的电子表格了。


  电子表格方法的另一个问题是，虽然它看起来非常精确并给出了一个确切的数字，但其输入值本身有时就是估算值。如果输入值不精确，那么无论工具多好，输出值也不会精确。所以，让我们把所有详细的分析留给更好的方法吧。相反，让我们尽可能轻松地得到一个答案。毕竟，这只是一个估算。


  最后，尽管你在初步估算中可能做了些精细的工作，但根据我的经验，估算值在确定后不久就会变得不准确。例如，我曾参与一个系统项目，该系统将接收来自一颗卫星的数据点。我的任务是创建和设计一个能够处理来自这个绕地球运行物体的数据的数据库。卫星的制造者精确知道每天每分钟捕获的数据量。我对预期数据量的估算完全准确。我加载了一些样本数据，并能够精确计算出每月需要多少磁盘空间。当我们在生产环境中开始向数据库填充数据时，我生成的估算值与我们的实际系统情况相符。然后，需求变了。由于系统运行得非常好，于是有人提议将另一个系统的数据也加入到这个数据库中。好吧，这应该很简单。只需将预期增长乘以
  2 就行了。然而，这个新系统会有原卫星所缺乏的额外数据。就这样，我那精确的估算瞬间泡汤了。关键在于，无论你的初始估算多么准确，需求和数据使用模式都可能发生变化。我们中很少有人维护的数据库系统，其数据流入是稳定且规律可循的，能够可靠地据此长期准确推断数据总量。


  在我的职业生涯中，我学到的一个道理是，有时在对系统预期使用情况进行估算时，不必过于追求精确。与其陷入细枝末节的纠缠，我常常采取一种完全相反的方法，那就是从更高的层面来看待系统使用情况。



  ## 容量规划


  在我们开始之前，我们需要明确 `容量规划` 的定义。这个术语的名称可能显而易见，但我发现不同的人对它可能有不同的理解。在本章深入学习之前，这个术语需要被明确定义，以确保我们都在同一页面上，双关语无意冒犯。


  所有计算机系统都有一套执行工作的资源。在大多数情况下，我主要关注的资源只有 CPU 使用率、内存使用率和磁盘使用率。后者可以进一步细分为已使用的磁盘量，并由此推论出空闲磁盘空间量，以及处理请求所花费的时间。计算机系统中当然还有其他资源，但
  CPU、内存和磁盘是最重要的三大资源。


  当系统收到请求时，资源就会被使用。一旦请求完成，资源就可用于处理下一个请求。不幸的是，系统上的资源是有限的。对任何一个资源的需求过多，性能就会受到影响。如果我的请求占用了所有
  CPU 资源，你的请求就不得不等待，而你完全有理由抱怨系统运行缓慢。资源不仅有限，而且需要同时被多个用户和进程共享。你作为数据库管理员的职责，就是确保最终用户有足够的资源，使他们不会察觉到任何性能问题。换句话说，你需要确保有足够的
  `容量` 来承载工作负载。


  数据库管理员的部分职责是确定系统初始上线时需要多少资源。换一种说法，DBA 需要 `规划` 资源利用率。在初始上线之后，DBA 需要预测未来的资源利用率。资源需求随时间增长是很常见的情况。DBA
  需要为未来的增长 `做计划`，以便在需求产生之前就能提供相应的资源。


  `容量规划` 是一种活动，旨在确保当前和未来有足够的资源来满足预期的需求。这是一种积极主动的做法。如果你发现自己是在被动模式下进行容量规划，那可能为时已晚，并且可能会失去客户。


  对我而言，容量规划最困难的部分不是预测未来，而是为一个未知的产品设置系统并进行初始上线。预测未来是查看当前状况，乘以一个最佳估算系数，然后看图表上的趋势线指向何处。这是一项简单的任务。如果产品是已知的，那么你可以查看该产品在以往部署中的资源需求。如果产品来自第三方，供应商通常会提供资源建议以确保其产品正常运行。


  为一个未知的系统进行首次设置更为困难，因为我们对它的资源利用率知之甚少。管理层的某人可能会说这样的话：“我们预计第一个月有 10 万用户，六个月内达到 100
  万用户。”这些数字是有一些参考价值，但它们并没有告诉我们用户会消耗多少 CPU 或内存。简而言之，这是一个未知的系统，其资源需求也是未知的。对于未知系统，DBA
  的最佳行动方案是：首先学习所有已定义的已知需求。然后，尝试参考他们过去参与过的、可能具有类似细节的其他系统，并以其作为指导。如果没有任何类似的系统存在，DBA
  只能做出一个初步的猜测。无论哪种情况，DBA 都需要让团队中的其他人知道，初步的估计缺乏足够的背景信息来保证其高度可信。


  多年来，我见过人们提出类似这样的问题：“支持一百万用户需要多少内存？”我很抱歉要让他们失望了，但并没有一个神奇的公式或表格能回答这个问题。我的系统中的一百万应用用户，可能与另一个系统中的一百万用户有着完全不同的资源需求。


  由于这是一个未知的系统，在投入生产环境之前，它需要被开发和测试。在开发期间，DBA 应该关注资源利用率，以确定初步的猜测是否仍然有效，还是需要重新定义。一旦系统进入测试阶段，DBA
  应该观察系统在负载下的表现。自动化测试工具很有帮助，它们可以模拟大量并发用户而无需真实人员的参与。你可以使用 `Swingbench` 或 `HammerDB`
  来模拟测试负载，但请记住，这些模拟可能并不能代表你的应用程序。我过去曾使用 `JMeter` 来测试一个基于 Web 的应用程序，模拟多个用户。


  如果可能的话，让一些真实用户来操作应用程序。我曾经时不时地寻求整个 IT 部门的帮助，让他们同时操作应用程序，即使只有 10 或 15 分钟。这样做能让我在真实世界接触系统之前，更好地了解资源在实际环境中的利用情况。



  '
- '# 企业管理器


  如果您的环境中尚未安装，我强烈建议您尽快让 Oracle 企业管理器 (EM) 运行起来。您会庆幸自己花时间安装、配置并开始使用 EM。关于 EM 的专著可谓汗牛充栋，因此我们在此不再赘述其细节。如果您的环境里没有
  EM，本章将向您展示一些唾手可得的信息，这或许能让您信服，在不久的将来将其纳入您的 DBA 基础架构。


  企业管理器会持续监控您的系统，并捕获有关其配置、资源利用率以及数据库和操作系统性能的信息。正如我们将在本章中看到的，您当然可以创建自己的例程来捕获资源利用率，但正如俗话所说，为何要重复造轮子？让我们来看看
  EM 为我们收集的信息示例，这些信息开箱即用，无需额外定制。在 EM 云控制中，您可以转到 `目标` ➤ `主机`，然后单击感兴趣的特定服务器。在摘要屏幕向下滚动一点，您可以看到一些图表，显示该服务器的
  CPU 和内存利用率，如图 19-1 所示。


  ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig1_HTML.png](img/467924_1_En_19_Fig1_HTML.png)


  图 19-1 EM 资源利用率摘要


  这两张图表向我们展示了该服务器的 CPU 和内存利用率。当我们初次进入此页面时，图表默认显示过去四小时的活动情况。对于容量规划而言，四个小时是不够的。此视图用于帮助发现即时的性能问题。如果您想查看更长时间段的信息，可以单击
  `天` 选项卡或 `周` 选项卡。图 19-2 显示了查看过去一周数据的同一服务器。


  ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig2_HTML.jpg](img/467924_1_En_19_Fig2_HTML.jpg)


  图 19-2 过去一周的 EM CPU 利用率


  其中一个更有趣的图表是并排视图，如图 19-3 所示。


  ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig3_HTML.jpg](img/467924_1_En_19_Fig3_HTML.jpg)


  图 19-3 EM CPU 利用率并排视图


  图 19-3 中的图表如其名所示，并排展示了所有三张图表。对本章而言不幸的是，这里的数据只回溯七天。一周的历史数据远远不足以帮助发现资源利用率的趋势。关键在于，企业管理器正在为我们捕获这些信息。我们只需要善加利用。为了进行准确的容量规划，我们需要尽可能多的数据点。一周甚至一个月的数据可能都不够。我建议至少使用一年的指标数据，不过，我倾向于将我的数据保留整个系统生命周期的长度。


  在 EM 中查看同一台主机时，选择 `主机` ➤ `监控` ➤ `CPU 详细信息`。这将带我们更深入地查看 EM 对该服务器上该资源的指标，如图 19-4 所示。


  ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig4_HTML.jpg](img/467924_1_En_19_Fig4_HTML.jpg)


  图 19-4 EM CPU 利用率详细信息


  在图 19-4 的图表中，我们可以看到过去一小时的 CPU 利用率。单击图表图例中的 `CPU 利用率` 超链接，将转到下一个屏幕，如图 19-5 所示。默认情况下，视图显示过去
  24 小时的数据，但这里将顶部的 `查看数据` 下拉菜单更改为 31 天。


  ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig5_HTML.png](img/467924_1_En_19_Fig5_HTML.png)


  图 19-5 过去 31 天的 EM CPU 利用率


  现在我们对于该服务器的历史 CPU 利用率有了更好的了解。从图 19-5 的图表中我们可以看到，过去一个月的 CPU 利用率显示出相对稳定的消耗状态。当然，每天之内有起伏，但总体上图表呈现出一种水平的、线性的模式。我们没有看到任何尖峰，图表也未显示出随时间增长的趋势。话虽如此，可以说，31
  天的数据不足以恰当地确定未来的容量规划。


  企业管理器在其存储库中存储 CPU 利用率的指标值。我使用了清单 19-1 中的查询从企业管理器存储库获取服务器的 CPU 利用率。


  ```sql

  select rollup_timestamp,trunc(average,2) as host_avg,

  trunc(maximum,2) as host_max

  from sysman.mgmt$metric_daily

  where metric_column=''cpuUtil''

  and target_name=''myhost.acme.com'' and metric_label=''Load''

  order by rollup_timestamp;

  ```

  清单 19-1 EM CPU 利用率存储库查询


  如果您在 EM 存储库数据库中运行上述查询，您可以看到其中有多少数据。通常，它会是 90 天或更少的数据。请注意，这是您的 EM 存储库数据库，而不是该服务器上的数据库。


  使用该查询提取数据值并将其存储在 Excel 电子表格中是一个简单的操作。通过卸载到 Excel，您可以将数据点保留的时间远比 EM 在其存储库中保留的时间长得多。您还可以用这些信息创建图表。图
  19-6 显示了我根据同一查询创建的简单图表，用于存储随时间变化的数据值。


  ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig6_HTML.jpg](img/467924_1_En_19_Fig6_HTML.jpg)


  图 19-6 CPU 趋势线


  在图 19-6 的图表中，我添加了一条线性趋势线，预测未来三年的资源利用率。为此，我只需右键单击折线图，选择 `添加趋势线`，然后修改趋势线的属性，将其预测期设为
  1,095 天，大约三年。


  这并不困难。企业管理器已经在为我捕获这些数据。我所做的只是将其存储在 Excel 中并创建一个快速简便的图表。我现在对未来的需求有了很好的了解。该图表使用了七年的数据，这意味着我对我的预测也有很高的置信度。


  还记得在第 17 章中我们讨论过的了解您的受众吗？像图 19-6 所示的图表对大多数人来说都易于理解。蓝线是每天的平均 CPU 消耗量。红线是每天的最大 CPU
  消耗量。趋势线显示了我们的预测。您无需成为 Oracle 专家就能理解其意。IT 经理和 IT 团队的其他成员可以立即从这种简单的分析中受益。


  同样，我们可以使用清单 19-2 中的查询，从 EM 存储库获取受监控服务器的内存使用情况。


  ```sql

  select rollup_timestamp,trunc(average,2) as host_avg,

  trunc(maximum,2) as host_max

  from sysman.mgmt$metric_daily

  where metric_column=''usedLogicalMemoryPct''

  and target_name=''myhost.acme.com''

  order by rollup_timestamp;

  ```

  清单 19-2 EM 内存利用率存储库查询


  同样，我们将上述查询的数据点复制到 Excel 电子表格，并绘制随时间变化的图表。图 19-7 中的图表显示了来自另一个生产系统的内存使用情况。


  ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig7_HTML.jpg](img/467924_1_En_19_Fig7_HTML.jpg)


  图 19-7 内存趋势线




