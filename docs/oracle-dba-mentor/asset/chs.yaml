  \n\n## 连接到我们的数据库\n\n在本书前面的章节中，我们创建了一台虚拟机并为测试环境构建了一个 Oracle 数据库。虽然我们始终可以使用虚拟机内的终端窗口并像之前那样使用`SQL*Plus`，但如果能从工作站连接到该虚拟机内的\
  \ Oracle 实例将会方便得多。\n\n### 配置网络连接\n\n回顾一下，在第 3 章创建虚拟机时，我们定义了两个网络适配器。其中一个是 NAT 适配器，用于让虚拟机访问外部世界、下载更新等。另一个网络适配器我们定义为“仅主机”（host-only）适配器，我们将通过它进行连接。在虚拟机的终端窗口中，输入`ip\
