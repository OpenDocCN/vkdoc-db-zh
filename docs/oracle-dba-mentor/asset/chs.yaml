  要恢复到之前的快照，请先关闭虚拟机。选择要恢复的快照，然后单击 Restore 按钮。系统会弹出一个对话框要求您确认恢复。您将获得一个选项，可以选择先为当前机器创建一个快照，以便您可以返回到当前状态，如图
  10-5 所示。


  ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig5_HTML.jpg](img/467924_1_En_10_Fig5_HTML.jpg)


  *图 10-5 恢复快照选项*


  恢复操作完成后，我们可以看到已恢复的快照。请注意，在图 10-6 中，当前状态现在是我们所恢复到的快照的子项。


  ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig6_HTML.jpg](img/467924_1_En_10_Fig6_HTML.jpg)


  *图 10-6 快照已恢复*


  快照是一种很好的方式，可以让您回退到一个已知的、希望是良好的状态。每个快照都会占用一定的磁盘空间。如果您创建了太多快照，可能会开始感受到磁盘空间的压力。删除不再需要的快照是一个好习惯。


