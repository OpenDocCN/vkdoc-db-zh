  在创建生产数据库时，请始终选择 `Custom Database`（自定义数据库）选项。


  本章中，我们将为测试环境创建一个数据库，但我们也想了解配置向导其余部分的行为，以便学习它会提出哪些问题。请选择 `Custom Database` 模板并点击
  `Next`（下一步）。`DBCA` 将前进到如图 6-4 所示的 `Database Identification`（数据库标识）屏幕。图 6-4 中的图片是整个屏幕的一部分。


