  `PGA_TARGET_FACTOR` 列等于 1 的那一行是我们当前的设置。该因子列的其余部分显示了如果我们按该行中的值增加或减少 PGA 会发生什么。例如，最后一行显示了将
  PGA 增加 8 倍的效果。第一行显示了将 PGA 减少 0.125 倍（八分之一）的效果。第二列和第三列显示了如果 PGA 按该因子变化，数据库需要做的额外工作量。我们希望调整
  PGA 大小，使第二列和第三列中的值为 0。我们可以在因子等于 1 的行中看到非零值，因此我们应该考虑增加 PGA。下一行的第二列和第三列全为零，因此该视图告诉我们应将
  PGA 增加 1.2 倍。将 PGA 增加更大的因子不会带来任何好处。


  ### SGA


  系统全局区 (`SGA`) 是在 Oracle 实例中所有会话之间全局共享的内存。这个内存结构被划分为许多不同的组件，每个组件都有不同的工作职责。在本节中，我们将讨论
  `SGA` 的各个组件。



  ### 缓冲区缓存


  缓冲区缓存将数据文件中的块副本存储在内存中，以便快速高效地检索。如果数据库引擎每次需要数据时都必须从磁盘读取，性能将非常低下。从内存中读取数据则快得多。实例启动时，缓冲区缓存初始为空。当向数据库发出
  SQL 语句时，这些语句将尝试读取或修改数据库中的数据。在数据被修改或返回给用户之前，数据文件的块会被读入缓冲区缓存。其理念是，既然你的会话需要访问这些数据，那么其他会话在不久的将来可能也需要类似的访问。如果我们将数据缓存在内存中，就可以省去为后续任何请求从磁盘读取数据的昂贵操作。


  在与非 Oracle 专业人士交谈时，我简单地将此结构称为“数据库的缓存”。许多人都熟悉缓存的概念，因此使用简单的术语有助于我们更有效地沟通。我也会将 SGA（系统全局区）中的其他缓存结构归入这一术语，我们很快会讨论到。在与
  Oracle 数据库管理员交谈时，我会非常具体地说明我指的是 SGA 中的哪个缓存组件。


  除非数据库相对较小，否则服务器可能缺乏足够的内存来缓存整个数据库的内容。缓冲区缓存需要管理其内容，以便最常请求的数据保留在内存中。Oracle 使用一种改进的“最近最少使用”算法来确定当需要为另一个请求腾出空间时，应从缓存中清除哪些数据。


  在某些情况下，特别是当 Oracle 引擎认为数据只会被请求一次时，可能会跳过缓冲区缓存。数据直接从磁盘读取并传递到用户的会话，Oracle 称之为 `直接路径读取`。直接路径读取可以避免在从磁盘读取数据之前查找并可能清理出部分缓冲区缓存所需的时间。但是，如果数据被再次访问，则必须再次从磁盘读取。


  该结构之所以被称为缓冲区缓存，是因为缓存中的每个空间块都被称为 `缓冲区`。缓冲区的大小等于数据库的 `DB_BLOCK_SIZE` 初始化参数。如果你的数据库块大小为
  8K，那么缓存中的每个缓冲区就是内存中连续的 8K 块。缓冲区缓存就是这些块或缓冲区的集合。


  如前所述，实例启动时，缓冲区缓存为空。缓存中的每个缓冲区状态都是 `未使用`。然后，一个会话发出 `SELECT` 语句从表中读取数据。块从磁盘读取并放入缓存中的缓冲区。此时，数据尚未被修改，因此缓冲区状态为
  `干净`。如果会话更改了缓冲区中的数据，状态则变为 `脏`。当事务提交更改后，缓冲区仍保留在缓存中，并标记为脏。


  需要注意的是，提交事务的操作并不会导致 Oracle 将脏缓冲区的内容写入磁盘。脏缓冲区仅在 Oracle 执行检查点时才会被写入数据文件。以下事件将触发检查点：


  *   重做日志切换到下一组。

  *   达到 `LOG_CHECKPOINT_INTERVAL` 指定的间隔。

  *   超过 `LOG_CHECKPOINT_TIMEOUT` 指定的值。

  *   有人执行了 `ALTER SYSTEM CHECKPOINT` 命令。


  另一个需要注意的重要事项是，即使修改缓冲区的事务尚未提交，脏缓冲区也可能被写入磁盘。当缓冲区缓存存在空间压力时，就可能发生这种情况。


  ### 共享池


  另一个重要的 SGA 组件是共享池。共享池是内存结构的集合，全部归入此类。我们可以分别考虑其子组件，但出于某种原因，Oracle 决定将它们分组到共享池中。这些子组件，也称为子池，定义如下。


  ### 库缓存


  库缓存是 Oracle 存储所有已处理 SQL 语句的地方。当用户向实例发出 SQL 语句时，在 Oracle 开始返回数据之前会进行大量工作。必须解析该语句以确保其语法正确。接下来，Oracle
  优化器必须确定高效的执行计划，以尽快返回数据。如果另一个用户发出相同的 SQL 语句，能够受益于之前的工作将非常有益。Oracle 将所有这些信息存储在库缓存中。当用户提交
  SQL 语句时，Oracle 首先检查库缓存以查看该语句是否已存在。如果它在缓存中，则可以跳过所有预处理步骤。


  ### 数据字典缓存


  缓冲区缓存存储来自应用程序表的数据。请记住，数据字典也存储在表中，由 `SYS` 用户拥有。数据字典表对于数据库操作至关重要，因此它们拥有自己的缓存，即共享池的一个子组件。数据字典缓存不保存块或缓冲区，而是保存数据行。因此，你在一些较早的
  Oracle 文献中有时会看到它被称为 `行缓存`。


  ### 结果缓存


  如果 SQL 语句返回一致的结果，DBA 可以利用结果缓存来存储该结果，而不必在每次执行 SQL 语句时重新计算结果。下次用户发出相同的 SQL 语句时，Oracle
  会查看库缓存，并发现执行它的最佳方式是直接从结果缓存获取结果。结果缓存可以极大地提高这些 SQL 语句的性能。此功能最适用于基础数据不经常更改且结果集不非常大的
  SQL 语句。只有极少数 SQL 语句会受益于结果缓存，但对于那些适用的语句，Oracle 需要内存，而结果缓存就是存放它们的地方。


  ### 重做日志缓冲区


  重做日志缓冲区，也称为 `日志缓冲区`，是 SGA 的另一个组件。当事务对数据进行更改时，Oracle 必须存储信息以便能够重放或重做该事务。重做记录将被写入联机重做日志，但直接将重做记录写入磁盘将花费太多时间。事务将重做信息写入内存，即重做日志缓冲区。


  重做日志缓冲区是一个循环内存结构。如果有足够多的数据写入缓冲区，最终较旧的内容将被覆盖。Oracle 需要在缓冲区填满之前将重做记录写入联机重做日志。


  ### 大型池


  大型池是为大于其他共享池需求的内存需求而预留的空间。通常，大型池用作并行 SQL 语句和 RMAN 从属进程的缓冲区空间。


  ### Java 池


  Java 池是 Oracle 存储在数据库 Java 虚拟机（JVM）内执行的 Java 代码的地方。


  ### 固定 SGA


  SGA 需要一定空间用于内部管理活动。此空间大小固定且无法更改，因此得名 `固定 SGA`。但是，新的 Oracle 版本可能需要更大的固定 SGA。



  '
- "# 调整 SGA 组件的大小\n\n过去，Oracle 数据库管理员需要指定不同的初始化参数来设置 SGA（系统全局区）各组件的大小，包括共享池（Shared\
  \ Pool）、缓冲区高速缓存（Buffer Cache）等。如今的 Oracle DBA 使用 `SGA_TARGET` 初始化参数来定义 SGA 的总大小，并让\
  \ Oracle 实例在符合该参数设置的前提下，自行决定各独立组件的最佳大小。使用此参数有两大好处。首先，调整 SGA 大小变得更容易，因为只需准确设置一个参数。其次，Oracle\
  \ 实例可以根据工作负载的变化动态调整各个组件。如果缓冲区高速缓存需要更多空间，可以从共享池中借用——前提是共享池有充足的可用空间。\n\n与为 PGA（程序全局区）确定合适的大小类似，Oracle\
  \ 提供了 `V$SGA_TARGET_ADVICE` 视图。在清单 20-5 中，大小因子等于 1 的行就是我们当前的 SGA 设置。\n\n```sql\n\
  SQL>  select sga_size_factor,estd_db_time,estd_physical_reads\n  2  from v$sga_target_advice;\n\
  \nSGA_SIZE_FACTOR ESTD_DB_TIME ESTD_PHYSICAL_READS\n--------------- ------------\
  \ -------------------\n            .25        53470             4175955\n      \
  \       .5       686730            42630654\n            .75        77000      \
  \      29370744\n              1        60692             4175955\n           1.25\
  \        59958             3005852\n            1.5        59703             3005852\n\
  \           1.75        59581             3005852\n              2        59521\
  \             3005852\n\n清单 20-5\nSGA 目标建议\n```\n\n在上面的输出中，我们当前的 SGA 估计的数据库时间值为\
  \ `60,692`，估计的物理读次数为 `4,175,955`。如果我们将 SGA 增加 25%（因子=`1.25`），估计的数据库时间和物理读次数都会略有下降。请注意，如果我们将\
  \ SGA 增加 50%（因子=`1.5`），估计的物理读次数并没有变化。这个视图告诉我们，将 SGA 大小翻倍所带来的性能提升，并不会比适度增加 25% 好很多。\n\
  \nOracle 还包含了另一个参数 `MEMORY_TARGET`，用于同时设置 SGA 和 PGA 的大小。这个单一参数使得数据库管理员为支持 Oracle\
  \ 实例而调整内存结构变得更加容易。但是，如果您的数据库服务器已为共享内存分配启用了大页（Huge Pages），则无法使用 `MEMORY_TARGET`。如果您在\
  \ Linux 上运行 Oracle，那么您很可能需要使用大页，这意味着您需要为 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET` 初始化参数确定合适的值。\n\
  \n"
- "# 后台进程\n\n分配所有这些内存固然很好，但仅靠内存分配是无法完成任何工作的。需要有东西将数据移入和移出内存。在 Unix 和 Linux 环境中，Oracle\
  \ 大量使用在服务器上运行的不同进程或小程序。每个进程都有自己的工作要做。这些进程协同工作，使 Oracle 实例得以运行。在 Windows 服务器上，工作由同一进程中的不同线程完成。\n\
  \n当您启动 Oracle 实例时，会分配内存并自动启动若干进程。这些被称为 `后台进程`，因为它们在后台工作以管理实例。这与特定于用户会话的进程不同。\n\n\
  有些后台进程是 `强制性` 的。如果一个强制性进程终止，实例也将终止。毕竟，如果一个实例必需的进程不存在，它就无法存活。其他进程是 `可选` 的，其启动取决于实例的配置。回想一下，在第\
  \ 7 章中，我们为测试平台设置了归档日志模式。以此模式配置时，Oracle 实例将启动一个进程，将在线重做日志（ORL）的内容复制到归档日志目标位置。这是该进程唯一的工作。由于归档日志模式不是必需的，支持它的进程也就不是必需的。如果一个可选进程异常终止，实例将继续保持运行。通常，某个强制性进程会检测到可选进程已关闭并尝试重启它。\n\
  \n每个新的 Oracle 版本都可能带来新的进程，有些是强制性的，有些是可选的。请查阅您所用特定版本的 *《数据库概念》* 指南，以了解实例可能生成的不同进程。有时，创建新进程是为了支持新功能。其他时候，Oracle\
  \ 公司会创建新进程，以分担某个已不堪重负的进程的工作。例如，自我了解以来，每个 Oracle 版本都有一个 `PMON` 进程。`PMON` 仍然存在，但 Oracle\
  \ 12*c* 现在已将 `PMON` 的部分职责剥离出来，放入了 `CLMN` 和 `CLnn` 进程中，我们将在下一节看到。\n\n## 强制性进程\n\n\
  本节描述 Oracle 12.2 实例的强制性进程。\n\n*   `进程监视器 (PMON)`：此进程负责监控其他进程并在其后进行清理。`PMON` 会清理缓冲区高速缓存。一旦用户会话结束，`PMON`\
  \ 将释放该会话持有的任何资源，包括任何事务锁。在 Oracle 12*c* 中，`PMON` 包含几个辅助进程，即 `CLMN` 和 `CLnn`。\n  \
  \  *   `清理主进程 (CLMN)`：当 `PMON` 知道用户进程需要清理工作时，它会将工作委托给 `CLMN`。然后 `CLMN` 负责确保工作完成。因为清理工作本身可能就很繁重，几乎没有时间进行监督，所以\
  \ `CLMN` 会将实际工作委托给下一个进程。\n    *   `清理辅助进程 (CLnn)`：这些是执行实际清理工作的进程。`CLMN` 是监督者，`CLnn`\
  \ 执行实际工作。`nn` 是两位数字的占位符。如果运行多个进程，您可能会看到 `CL01` 和 `CL02` 进程。\n\n*   `进程管理器 (PMAN)`：此进程监控和控制调度程序和共享服务器进程、作业队列进程以及任何可重启的后台进程。\n\
  \n*   `系统监视器 (SMON)`：此进程执行系统清理工作。`PMON` 及其助手负责进程清理。`SMON` 负责其余部分。实例启动时，`SMON` 将恢复任何未提交的事务。`SMON`\
  \ 还会清理任何临时段。\n\n*   `监听器注册 (LREG)`：此进程告知监听器（Listener）实例已启动、正在运行并准备好接受连接请求。它会定期向监听器更新与实例的当前连接数。在\
  \ 12*c* 之前，此进程的工作由 `SMON` 执行。\n\n*   `数据库写入器 (DBWn)`：此进程也称为 `DBWR`，负责将缓冲区高速缓存中的脏块写回数据库文件。通常有一个进程\
  \ (`DBW0`)，但繁重的工作负载可能需要多个进程。\n\n*   `日志写入器 (LGWR)`：此进程负责将重做日志缓冲区（Redo Log Buffer）的内容写入在线重做日志。\n\
  \n*   `检查点 (CKPT)`：此进程启动检查点活动。发生检查点时，它会提示 `DBWR` 采取行动。`CKPT` 将更新控制文件以及每个数据文件头中的最新系统更改号\
  \ (`SCN`)。\n\n*   `可管理性监视器 (MMON)`：此进程更新和管理自动工作量资料库 (`AWR`)。\n    *   `轻量级可管理性监视器\
  \ (MMNL)`：此进程从活动会话历史缓冲区读取统计信息，并将数据写入磁盘，这些都是 `AWR` 的一部分。\n\n*   `恢复进程 (RECO)`：此进程清理任何分布式事务中的失败。分布式事务是涉及一个以上\
  \ Oracle 数据库的事务。\n\n\n\n### 可选后台进程\n\n并非所有进程都是必需的。本节将详细介绍可选后台进程。\n\n*   *归档进程 (`ARC*n*)`*：这些进程将在线重做日志的内容复制到归档日志目标位置。仅当数据库处于归档日志模式时，此进程才会启动。\n\
  \n*   *作业队列进程 (`CJQ0` 和 `J*nnn*)`*：这些进程在 Oracle 调度器中执行作业。`CJQ0` 是主作业协调器进程。每个运行的作业将在不同的从属进程\
  \ `J*nnn*` 中执行。\n\n*   *并行查询从属进程 (`P*nnn*)`*：这些进程负责执行工作以支持并行 SQL 语句。用户的会话是主进程，它将工作分配给并行查询从属进程。\n\
  \n*   *Data Guard 监视器 (`DMON`)*：当实现 Data Guard Broker 以支持备用数据库时，会启动此进程。\n\n*   *受管恢复进程\
  \ (`MRP`)*：此进程在备用数据库上运行以重放事务。\n\n*   *队列监视器进程 (`QMN*n*)`*：此进程管理 Oracle Streams 和高级队列。\n\
  \n*   *锁监视器 (`LMON`)*：此进程帮助管理实时应用集群 (`RAC`) 数据库的锁。\n\n正如您从上面的列表中可以想象的，如果您没有使用归档日志模式、并行查询、备用数据库或\
  \ `RAC`，您将不会在系统上看到这些进程。\n\n实际上还有许多其他可选的后台进程。上面列出的是最常见的。\n\n## 用户进程\n\n最后要讨论的一类进程是用户会话的进程。在本节之后，我们将尝试将所有内容——进程、文件和内存结构——整合在一起，并构建一个架构图。\n\
  \n用户总是通过使用某个应用程序连接到 `Oracle` 实例。该应用程序可能简单如 `SQL*Plus` 或某个命令行工具，但它们仍然是应用程序。应用程序在其自己的计算机进程中运行。在当今的计算机环境中，应用程序通常运行在数据库服务器以外的机器上。\n\
  \n当应用程序请求连接到实例时，`Oracle` 会在数据库服务器上创建一个*服务器进程*。根据配置，该进程可能专用于单个用户，这种情况下称为*专用服务器进程*；或者该进程可能被多个应用程序连接共享使用，这种情况下称为*共享服务器进程*。`Oracle`\
  \ 公司创建了共享服务器进程的功能，以应对互联网时代的爆炸式增长。数据库需要能够支持比基于 `Web` 的应用程序诞生之前多得多的用户。`Oracle` 公司决定为我们提供拥有共享服务器进程的能力。大约在同一时期，`Web`\
  \ 服务器的开发者也为我们带来了连接池等美妙的东西。在应用层使用连接池比使用共享服务器进程更为常见。我管理过的每个 `Oracle` 数据库都使用了专用服务器进程。如果可能，我建议避免使用共享服务器进程，因为它会给\
  \ `DBA` 带来额外的管理负担。您只需知道，当有需求证明其合理性时，该功能是存在的。在本章的其余部分，我们将使用术语*服务器进程*来指代专用类型或共享类型，具体取决于数据库配置。\n\
  \n没有任何应用程序直接连接到实例。当应用程序请求连接时，`Oracle` 会确保有一个可用的服务器进程。应用程序仅与服务器进程通信。服务器进程代表应用程序与实例对话。您可以将服务器进程视为中间人。监听器接受传入的连接请求，并促进应用程序和服务器进程之间的连接。之后，监听器就不再参与两者之间发生的任何事情。应用程序总是通过监听器进行连接是一个误解。\n\
  \n## 整合说明\n\n我们已经讨论了构成数据库的各种文件，以及构成实例的内存结构和进程。现在是时候理清所有内容，并了解这些组件如何协同工作了。我们将从上次中断的地方开始，查看应用程序、监听器和服务器进程之间的交互，如图\
  \ 20-1 所示。\n\n![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig1_HTML.png](img/467924_1_En_20_Fig1_HTML.png)\n\
  \n图 20-1\n\n应用程序连接\n\n如前一节所述，应用程序联系监听器，后者调解连接请求并让应用程序进程开始与服务器进程对话。服务器进程为其使用分配 `PGA`。\n\
  \n在某个时刻，应用程序将通过发出 `SQL` 语句提出请求。我们假设满足此请求所需的数据块当前不在缓冲区高速缓存中。这些块需要被读入缓冲区高速缓存。可能会让一些人感到惊讶的是，正是用户会话的服务器进程从数据文件中读取，如图\
  \ 20-2 所示。\n\n![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig2_HTML.png](img/467924_1_En_20_Fig2_HTML.png)\n\
  \n图 20-2\n\n将数据块读入缓冲区高速缓存\n\n一旦数据块进入缓冲区高速缓存，服务器进程就可以访问其中的数据。如果该块已经在缓冲区高速缓存中，则无需从数据文件读取。如果\
  \ `SQL` 操作导致直接路径读取，则从数据文件返回的箭头直接指向服务器进程，而不使用缓冲区高速缓存。\n\n然后，用户会话通过事务修改高速缓存中数据块的内容。该块现在被标记为脏块。信息被写入重做日志缓冲区，以便在必要时能够重放该事务。最终，`LGWR`\
  \ 将重做信息写入在线重做日志，`DBW*n*` 将脏块写入数据文件，但这两者不一定是同时发生的。图 20-3 展示了与缓冲区高速缓存、重做日志缓冲区以及后台进程的交互。\n\
  \n![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig3_HTML.png](img/467924_1_En_20_Fig3_HTML.png)\n\
  \n图 20-3\n\n将事务写入磁盘\n\n如果开启了归档日志模式，归档进程会将在线重做日志复制到归档日志目标位置。\n\n\n\n\n## 交互式快速参考\n\
