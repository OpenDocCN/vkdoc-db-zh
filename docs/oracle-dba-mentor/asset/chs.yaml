- '# 第一部分：初始设置


  ## 1. 引言


  如果您已经拿起这本书，那么您很可能已经获得（或希望获得）一份 Oracle 数据库管理员（DBA）的工作，并且正在寻求职业生涯下一步的指导。市场上有许多书籍会详细介绍
  Oracle 数据库工作原理的技术信息。我的书架上就有很多这类书籍。它们提供了大量有用的信息，是极好的资源。


  正如本书标题所示，它旨在成为您 DBA 职业生涯中的一位导师。导师通常会与学员携手同行，指导他们的职业发展。我无法亲自在您身边，因此我认为次好的选择是写下我多年来传授给他人的建议和见解。我希望这本书比一般的计算机书籍更具个人色彩，更像任何其他导师与学员之间的关系，所以我经常使用“我”和“我们”这样的词。本书很可能是您职业生涯中众多导师中的一员。许多初级数据库管理员会与一位资深
  DBA 一起工作，后者是他们的主要导师。本书应作为您主要导师指导的补充。您还会从遇到的其他 Oracle 专业人士那里获得建议，他们虽非正式导师，却会对您的职业成长产生影响。


  您正在阅读的这本书之所以与众不同，是因为它的目标是教您如何找到其他同类书籍中没有的答案。如果您需要更多信息该怎么办？该去哪里寻找？最常见的答案是查阅 Oracle
  文档，这是个很好的应对方法。但很多时候，人们因为 Oracle 文档庞大复杂而不敢使用。在本书的第 13 章，我将教您如何有效利用文档。可惜的是，Oracle
  文档并不总是完备的，那么接下来该去哪里？当信息不易获得时，本书将为您指明下一步的方向。


  有时，寻找答案的最佳资源就在您自己身上。我从许多初级 Oracle DBA 那里最常听到的一类问题大致是：“我能在 Oracle 中做*X*吗？”如果您问了这个问题，那么答案显然是“不能！”，因为这表明您甚至没有尝试过。在本书的学习过程中，我们将构建一个系统，让我们能够为自己创造许多问题的答案。在构建这个系统的过程中，我们将涵盖许多最佳实践。如果您遵循本书的建议，您不仅将拥有一个可以使用的测试环境，还会充满信心，确信您正在创建和管理的
  Oracle 系统能够应对系统所需的多种不同需求。


  本书并非高度技术性的书籍。它旨在供您在数据库管理职业生涯初期使用。有些人可能称之为*初级 DBA*级别。中级 DBA 也可能从中发现一些有用的信息。如果您是资深
  DBA，您可能已经了解本书中呈现的大部分信息。然而，我发现有太多资深 DBA 不得不以艰难的方式学习这些知识，并希望有人能在他们职业生涯早期就向他们传授本书中的知识（这也是我写作本书的部分动机）。这本书仅仅是对您职业生涯漫长旅程的一个开始。没有人能一夜之间成为伟大的
  DBA。您在职业生涯中可能已经遇到过一些杰出的 DBA。他们是如何达到如此崇高地位的？通过努力工作和持续学习。我担任 Oracle DBA 已超过 20 年，至今仍在不断学习新东西。对于许多我遇到的顶级数据库管理员来说，解决复杂数据库问题的挑战以及学习如何利用数据库引擎的特性，是这份职业最令人欣慰的方面。


  本书的大部分内容源于多年来指导我的众多 DBA 们传授给我的东西，但遗憾的是，在我早期缺乏一位真正手把手的导师。在我该领域的第一份工作中，我是唯一的 DBA，所以没有人指导我。我的大多数“导师”甚至从未见过我，可能也不知道我的名字，或者他们曾帮助过我的职业生涯。但在我的职业生涯中，我从许多人那里汲取了点点滴滴，并用这些构建了您将在这里阅读的内容基础。


  现在，这是我给您的第一条建议，以帮助您发展职业生涯：付出多少，就收获多少。听起来很简单，对吧？然而，付出需要时间、精力和自律，因此人们通常无法充分分享他们本可以分享的知识。我多年来学到的一个秘诀是，与他人分享知识的过程，教会我的和我教给他们的一样多。当您必须整理思路，尤其是以书面形式表达时，大脑中会发生一些变化，让您比没有写下任何东西时更好地掌握这些材料。Oracle
  社区中的大部分知识共享都是通过书籍、博客文章、白皮书和论坛等书面形式完成的。


  > **提示**

  >

  > 分享您的知识。您学到的将和您教授的一样多。


  虽然本书专注于 Oracle，但您可以将这些相同的原则和技术用于处理其他数据库系统。例如，在第 13 章，我们将花时间学习 Oracle 文档。如果您是 SQL
  Server DBA，您只需将这些知识转换到微软的在线手册（Books Online）中。虽然本书涵盖了与 Oracle 相关的论坛，但也有许多针对 SQL Server
  的论坛。建议是相同的，您只需要将其转换为适用于其他数据库引擎即可。


  在您的职业生涯中，极有可能被要求使用多种数据库平台。在我当前的工作中，我主要使用 Oracle，但也使用 SQL Server 和 MongoDB。多年来我还使用过
  PostgreSQL、MySQL 和 DB2。每当我接触一个新的数据库系统时，我都会尝试弄清楚如何在 Oracle 中完成某项任务，然后看看其他数据库引擎是如何做同样的事情的。例如，所有数据库引擎都有某种形式的事务日志。在
  Oracle 中，它是联机重做日志。在 SQL Server 中，它被称为事务日志。两种引擎具有相同的功能。区别在于它们实现该功能的方式。




  ### 成为一名 DBA


  通常来说，有两条职业路径可以成为数据库管理员。一般来说，初级的数据库管理员在从事 `DBA` 工作之前，要么是应用程序开发人员，要么是系统管理员 (`SysAdmin`)。成为
  `DBA` 的应用程序开发人员通常有开发以数据库为中心的应用程序的经验，并且已经接触过表、查询和其他数据库活动。前系统管理员了解操作系统、磁盘子系统和基本的网络技能，这些都是数据库管理员需要理解的关键知识。无论
  `DBA` 在开启数据库职业生涯之前走过这两条路径中的哪一条，他们在晋升填补公司初级 `DBA` 职位之前，很可能已经展现出高水平的技能。有时，`DBA` 会在其组织内参与与数据库相关的项目，即使还不是正式的数据库管理员。他们可以凭借这份工作经历，在另一家公司谋得一个入门级的
  `DBA` 职位。虽然也可能，但一个人在没有过去担任过开发人员或 `SysAdmin` 的情况下获得 `DBA` 职位的情况更为罕见。那些直接从 `DBA` 起步、而非来自上述两条路径的人，通常在大学里专注于数据库系统的学习。


  我常对人说，数据库引擎位于应用程序和服务器之间。因此，从一端或另一端招聘初级 `DBA` 是合理的。理想情况下，候选人应同时具备服务器和应用程序开发的经验，但这通常更难找到。


  获得第一份数据库管理员工作可能很困难。首先，这份工作在技术上很复杂，但这也是它令人兴奋的原因之一。正如前面讨论过的，除了理解数据库引擎如何工作外，`DBA` 还需要对系统管理和应用程序开发有良好的了解。`DBA`
  还需要理解网络和存储，并对 IT 安全有透彻的掌握。今天的 `DBA` 应具备云技术方面的经验。数据库管理员面临的挑战之一是胜任这份工作所需知识的广度。但这也对许多
  `DBA` 非常有吸引力——这份工作永远不会枯燥，因为有太多东西要学，有太多不同的领域可以探索。多样性、复杂性和探索新功能的机会，是这份工作对许多人来说具有吸引力的特质。


  获得第一份 `DBA` 工作的另一个绊脚石是公司内部数据的重要性。数据是一种组织资产。它需要被保护，同时又要保持可用以支持业务。许多公司不愿意将管理、维护和保护其
  IT 基础设施中最重要组成部分之一的任务托付给经验不足的个人。我们将在本章后面的“数据守护者”一节进一步讨论这一点。


  那么，你如何获得第一份 `DBA` 工作呢？对大多数人来说，如前面提到的，你会从系统管理或应用程序开发开始你的职业生涯。如果你从 `SysAdmin` 起步，那么尽可能多地学习关于网络、存储和
  IT 安全的知识。如果你从应用程序开发人员起步，那么花时间尽可能多地了解如何创建良好的数据库应用程序。学习表设计的细节、编写 `SQL` 语句，以及如何通过利用索引、物化视图等适当的数据库特性来获得最佳的应用程序性能。


  接下来，尝试将你的职业生涯重心向数据库方向倾斜。与你的经理谈谈你希望更多地了解数据库管理的意愿。主动承担小型的数据库相关项目，即使这些项目超出了你传统职责的范围。正如你将在本书后面学到的，你可以下载
  `Oracle` 数据库，安装在测试系统上，并开始试用这个产品。你现在就可以开始构建你的 `Oracle` 数据库知识和经验，没有任何东西能阻止你！在你职业生涯的某个阶段，你很可能还会培养与
  `DBA` 角色相关的其他技能，包括软技能和技术技能。


  一旦你有机会在一些 `DBA` 任务上小试牛刀，就开始留意初级 `DBA` 的职位空缺。很多时候，如果你的经理知道你的兴趣，他们可能愿意给你一个机会，作为一个好员工，在你期望的方向上发展你的职业生涯。一个好的经理明白让好员工保持满意的价值，即使员工在公司内部转岗时需要更新他们的技能组合。


  并非所有经理都愿意帮助员工发展他们的职业道路。另一个障碍可能仅仅是当前公司内部缺乏机会。在这种情况下，经理们不能仅仅因为一个员工想换岗位就凭空创造一个职位空缺。如果这两种情况中任何一种适用于你，那么也许是时候在当前公司之外寻找工作机会了。归根结底，推动你的职业生涯前进取决于你自己。你可能希望在当前公司继续前进，或者，如果你的公司无法帮助你实现职业抱负，你可能需要决定做出更大的改变。


  如果你正在其他公司面试一个新职位，你不可避免地会被问到类似 `你认为五年后自己会在哪里？` 这样的问题。这是你向潜在的新雇主表明你渴望朝着 `DBA` 职位努力的机会。抓住时机！明确表达，让你的意图为人所知。有些公司可能会根据这个答案认定你不适合他们，但很多其他公司会愿意，因为他们理解投入且热情的员工的价值。根据我自己的经验，我宁愿为一家有兴趣帮助我朝期望方向推进职业生涯的公司工作，也不愿得到一份看不到未来职业发展的工作。有太多人被困在他们讨厌的工作中。我宁愿拥有一份能让我满足的职业，做有挑战性和回报的工作。最终，你必须审视自己的内心，找出什么能激励和让你兴奋。对我来说，那就是成为一名
  `DBA`。我无法想象做其他工作。既然你在读这本书，你可能也有同感。无论你选择哪条道路去获得第一份 `DBA` 工作，祝你好运！



  ### 典型的 DBA 一日


  本节的标题有些用词不当，因为对于 DBA 来说，并不存在所谓“典型”的一天。当然，与我交谈过的每一位 DBA 都是以喝杯咖啡或其他晨间饮料、然后检查电子邮件中是否有需要立即处理的事务来开始一天的，但在此之后，这一天很可能就与“典型”二字毫不沾边了。这种多样性对许多
  DBA 来说很有吸引力，因为他们不会日复一日地 `困在` 同样的事务中。


  大多数数据库管理员确实有一套相似的职责组合，例如：


  *   检查备份作业状态

  *   确保数据库安全

  *   创建新数据库

  *   创建新数据库对象

  *   确保数据持续可用

  *   调优数据库性能

  *   设计数据库

  *   规划数据库容量

  *   与其他 IT 员工和应用程序开发人员紧密协作

  *   参与值班轮换

  *   安装软件

  *   执行 `提取、转换和加载 (ETL)` 活动

  *   故障排除


  这绝非一份详尽无遗的清单，DBA 很可能还负有其他职责。很多时候，你并不会在一段长时间内持续、积极地处理某项分配的任务。例如，我每年只进行几次容量规划活动，但检查备份作业状态是每日的例行工作。事务有起有落，存在
  `季节性` 变化，这些都使得工作保持趣味性。


  DBA 的职责也会因公司而异。不同的组织根据自身需求和目标对该职位进行了定制。例如，我曾在一家只使用第三方软件应用程序的公司工作。在这种情况下，DBA 负责与应用程序供应商合作，为软件提供数据库服务。在另一家公司，我需要与应用程序开发人员紧密合作，协助他们编写
  `SQL` 语句。这两份工作都给了我 DBA 的头衔，但工作的性质却大相径庭。


  ## 数据守护者


  我在上一节中已有所提及，但掌握这个主题对于你作为数据库管理员取得成功至关重要。DBA 是公司的 `数据守护者`。然而，当我问同行 DBA 们他们认为自己最重要的职责是什么时，典型的回答是“备份”。对于
  DBA 最重要职责是什么这个问题，我的回答是“保护数据”。备份只是整个数据保护使命中的一个组成部分。


  数据是一项宝贵的资产。像 `Google` 和 `Facebook` 这样的公司免费向你提供他们的产品。你有没有想过为什么？简单的答案是，他们从你为他们生成的数据中获利。你搜索什么、关注谁，这些行为都会生成数据点，从而构建出你——这个用户的画像。这些数据点随后会被以多种方式使用。例如，`Google`
  和 `Facebook` 可以利用这些画像为其他公司生成定向广告。他们也可以将数据出售给第三方。


  即使你的公司不从事买卖数据的业务，其数据库中的数据仍然是一项宝贵的企业资产。一家销售产品的公司可能希望更多地了解其客户。我在大学时了解到一个著名案例，一家杂货店挖掘了客户购买模式的数据，发现在周末，啤酒和尿布经常被一起购买。杂货店推测，是父亲被派去商店为宝宝买尿布，同时也买了一些啤酒带回家。这家连锁杂货店开始将啤酒和尿布并排摆放在货架末端，从而提高了两者的销量。了解客户是企业利用其数据资产的一种方式。


  即使你认为自己公司的数据没有价值，黑客们肯定不这么认为。黑客会尝试各种方法来获取访问你公司数据的权限。公司投入了大量资金用于硬件、许可证和工资，以存储数据并使其可供业务使用。然而，作为数据守护者，我们不能允许对这些数据进行无限制的访问。这样做可能会危及业务运营。我们决不能让任何人随意更改数据。例如，一家销售体育用品的公司拥有其销售产品的库存数据。如果公司有十根棒球棒库存，那么数据库就应该反映这一事实。如果有人恶意或意外地将数据更改为库存中有零根球棒，那么客户将无法订购该产品，公司就会失去潜在的销售额。相反，如果有人将数据更改为库存中有
  100 根棒球棒，那么销售系统可能会尝试销售根本不存在的 90 根球棒，导致这些订单无法履行，从而引起客户不满。客户不满会导致未来的销售损失，这是必须避免的。这家体育用品公司需要在其数据库中准确反映其产品的库存。


  当今许多数据库系统还存储着因其敏感性质而自身就具有价值的信息，例如 `个人身份信息 (PII)`。`PII` 是可用于识别特定个人的数据，例如姓名和出生日期、税号、信用卡号等。数据库中的任何
  `PII` 都需要被加密，这样即使黑客获得了数据库访问权限，也无法从这些数据中获取任何价值。


  未能保护数据对业务在多个层面上都是有害的，正如我们从近期众多关于又一数据泄露事件的头条新闻中所知。例如，2013 年，`Target Corporation`
  遭受了一次众所周知的数据泄露，据报道，这次事件使该公司损失了超过 3 亿美元！`Yahoo` 在 2013-2014 年遭受了超过 30 亿账户的数据泄露。当
  `Yahoo` 被 `Verizon` 收购时，据估计，收购价比如果没有发生此次泄露事件要低 3.5 亿美元。据估计，遭受数据泄露的小公司中有 60% 会倒闭。


  我一直秉持的观点是，作为一名 DBA，我就是我公司的数据守护者。DBA 需要成为那个时刻思考着保护数据的人。这意味着要确保只有那些具有合法业务需求的人才能访问数据，并且只有那些具有适当修改权限的人才能修改数据。我们尽可能限制对数据的访问。DBA
  不断被要求为业务中的新途径提供数据访问权限。随着公司学会将数据作为一项资产加以利用，他们正在探索利用这些数据驱动收入的新方法。数据不仅会以新颖而令人兴奋的方式被使用，DBA
  可能还需要只为业务部门提供他们所需的数据，不多不少，以保护数据。DBA 可能还需要在另一个业务部门获得访问权限之前对数据进行清洗。


  数据保护远不止备份。DBA 需要确保数据库引擎应用了最新的安全补丁。DBA 在数据库中授予和撤销权限。DBA 需要熟悉 `SQL` 注入和其他数据库黑客技术。DBA
  需要学习如何加密数据库中的数据，以及如何保护加密密钥。希望本节能让你相信，DBA 最重要的工作不是备份。相反，DBA 必须精通数据保护的各个方面。DBA 需要成为数据守护者。


  ## 继续前进


  正如之前所述，本书与其他书籍不同，因为它不仅专注于成为一名成功的 Oracle 数据库管理员所必需的技术信息，还为你提供如何学习那些在任何书籍中都找不到的知识的建议。本书可以作为你职业发展道路上众多导师之一，助你推进数据库管理员的生涯。我设计本书的目的，不仅是帮助你学习更多关于管理
  Oracle 数据库的知识，更是帮助你掌握如何学习那些在其他书籍、甚至 Oracle 官方文档中也无法找到的内容。


  下一章可能并不包含你所认为的技术信息。相反，它将重点介绍作为一名数据库管理员执行工作所必需的**软技能**。请不要跳过这一章，因为它仍然包含非常重要的信息。


  '
- '# 2. 作为数据库管理员工作


  在上一章，我介绍了成为数据库管理员的职业路径，以及 DBA 的一般职责和责任，包括他们作为**数据守护者**的角色。在本章中，我们将花时间讨论如何作为数据库管理员进行工作。本章的信息本质上并非技术性的，也适用于非
  Oracle DBA。本章将重点介绍所有优秀数据库管理员都应具备的软技能。本章中的许多信息可以在 DBA 角色之外使用，并应用于组织中的其他职位。


  ## 粗鲁的数据库管理员


  取决于你询问的对象，数据库管理员在 IT 世界中通常是一个备受尊敬的职业。正如我们在上一章讨论的，DBA 通常来自应用程序开发或系统管理背景。一个人大学一毕业就直接成为数据库管理员的情况比较少见。通常，DBA
  是逐步晋升到这个职位，并展现了高超的技能才得以成功。


  当你作为一名 DBA 工作时，请试着记住，你不仅代表你自己和你的组织，你也代表着这个职业。我一直认为数据库管理员是 IT 职业阶梯上的顶级职位之一。因此，你将与组织内部的许多人互动。如果你遵循后续章节的建议，你还将与全球
  Oracle 社区的许多人互动。以积极的方式展现自己，其对你整个职业生涯的影响，将远远大于你表现出不良行为所带来的影响。遗憾的是，我遇到过太多这样的 DBA，他们总是脾气暴躁，对他人持阻挠态度——这些特质并非
  DBA 独有。例如，一位 DBA 无论业务需求如何，也不给出解释，就拒绝授予特权或创建新数据库。我听过太多关于 DBA 是个混蛋、难以共事的故事。一些 DBA
  持有这种态度的原因可能有很多，但请不要成为这类 DBA。如果你收到一个特权或创建新数据库的请求，并且你认为这个请求不应该被满足，与其用某种粗鲁的方式拒绝请求，更好的方法是弄清楚请求者真正需要什么，以及你如何能帮助他们完成工作。不要回应“你的请求被拒绝”，而是说“抱歉，但按照你概述的方式满足该请求会导致其他问题。我们能否换种方式，既能让你完成工作，又能解决我的顾虑？”


  ### 提示


  不要做那个粗鲁的 DBA。要做乐于助人的那一个。


  我一直有一种未经证实的观点：粗鲁的 DBA 是当今非常流行的无模式数据库兴起的次要原因之一。应用程序开发者声称，像 MongoDB 这样的数据库很棒，因为他们可以自己安装、设置并开始编码，而无需
  DBA 的任何协助。我的反驳观点是，通过避开 DBA，开发者会错过数据库管理员通常会考虑的许多其他方面。其中一些方面涉及数据库安全以及经过验证的备份与恢复实施。应用程序开发者不习惯成为数据守护者，这是我们在上一章讨论过的概念。在第七章（7）中，我们将讨论
  DBA 应该在备份之前就考虑恢复，这一观点是大多数应用程序开发者甚至不会考虑的。2017 年，超过 25,000 个未受保护的 MongoDB 数据库遭到了勒索软件^(¹)的攻击。这并非因为
  MongoDB 是一个不安全的数据库平台。相反，这些部署使用了弱密码和默认用户名。DBA 被绕过了，安全从未被考虑，公司为此付出了代价。如果 DBA 参与了这些项目，数据库很可能会得到保护，因为一个好的
  DBA 会考虑这些问题。我很好奇，那 25,000 多个 MongoDB 实例所属的公司中，现在有多少家希望当初是由他们的 DBA 负责管理其数据库平台。


  这个例子并非意在指责 MongoDB。它是一个很棒的产品，我目前也管理着几个 MongoDB 数据库。开箱即用，MongoDB、Oracle 和其他数据库平台都不安全。无论部署哪种数据库平台，锁定安全设置都是数据库管理员的职责。这个例子的重点是，人们试图避开粗鲁的
  DBA，并会寻找替代方案，而这些方案往往缺乏对良好数据治理至关重要的安全性和其他控制措施。


  ### 提示


  粗鲁的 DBA 是负债。乐于助人的 DBA 是资产。


  乐于助人并不意味着 DBA 需要满足同事的任何请求。有很多时候我会拒绝请求。每当我拒绝一个请求时，我都会保持礼貌，并提供后续指导，让请求者能够继续工作。请求者需要完成他们的工作。他们知道数据库中的某些东西目前阻碍了他们完成任务。根据我的经验，大多数请求者在如何正确绕过数据库障碍方面的知识不如数据库管理员丰富。这正是
  DBA 必须帮助将请求塑造成能同时满足双方需求的方案的时刻。


  ## 跨平台工作


  如今的数据库管理员（DBA）通常需要与多种数据库平台打交道。只专注于一个数据库平台的管理员已经很少见了。在我 DBA 职业生涯早期，我受雇于一家只使用 Oracle
  数据库系统的公司。我们的 DBA 小团队日复一日地与 Oracle 系统打交道。有一天，我们的经理告诉我们，SQL Server 即将引入公司，我们中需要有一个人来快速掌握这个产品。我立刻抓住了这个机会。我有些惊讶，当时团队里并没有为谁来管理这个新产品而争抢。虽然我的主要专长是
  Oracle，但从那天起，我之后的每一份工作都需要同时管理 Oracle 和 SQL Server。就在那一天，我知道能够管理多个平台对我的未来职业前景是有好处的。我发现，能够成功地与多个数据库平台合作，对我的职业成长更为有益。在学会了
  SQL Server 之后，我并没有止步于此。我继续学习更多关于其他数据库产品的知识，尤其是在社区中推出新产品时。


  多年来，我使用过许多不同的数据库引擎：Oracle、SQL Server、MongoDB、MySQL、PostgreSQL 和 DB2 等。如今的数据库管理员也被要求这样做。很多时候，由于第三方软件的部署，你会被要求支持不同的数据库平台。例如，一个产品在
  Oracle 上运行，而另一个产品只支持 SQL Server。随着 NoSQL 数据库的兴起，你可能会发现你信赖的关系型数据库并不是满足不断增长的数据量的合适解决方案。因此，你的职业生涯很可能会让你在多个数据库平台上工作。那么你该如何做呢？你如何与这些彼此差异巨大的产品一起工作？


  我在第一次参加 SQL Server 管理课程时，就学到了该如何应对这个新系统。在开始 DBA 职业生涯之前，我选择上大学并获得了计算机科学学位，专注于数据库系统。在大学里，我学习了数据库系统如何工作的理论。我学习了范式、事务的属性、关系数据库理论等等。当我学习成为一名
  Oracle DBA 时，我并没有过多思考这些理论。当我坐在第一次 SQL Server 课堂上，讲师正在讲述如何在 SQL Server 数据库中创建表时，我的思绪开始集中：在
  Oracle 中，我们在表空间中创建表，一个数据库由多个表空间组成，但 SQL Server 有些不同。然后我想起大学里的一位教授曾谈到，数据库引擎负有将存储与数据库设计抽象开来的责任。那一刻我意识到，我应该依靠大学里学到的关系数据库理论，而我需要做的就是弄清楚每个数据库平台是如何实现这个理论的。第二天
  SQL Server 管理课，我们将讨论备份和恢复。我知道这在 Oracle 中是如何工作的。我记得大学时学过，数据库系统拥有事务日志，而一份备份加上日志可以让我将数据恢复到某个时间点。从
  Oracle 的角度来看，那个事务日志就是在线和归档的重做日志。我在课堂上了解到，SQL Server 为每个数据库保留一个事务日志。我大学课程中学到的关于数据库系统如何运作的基础知识，让我在进入职场后，能够轻松地看懂
  Oracle 是如何实现细节的。面对一个新平台，我立刻明白我只需要弄清楚该系统是如何实现事务日志的，之后我就可以顺利上手了。


  ### 小贴士


  如果你通晓通用的数据库理论，那么遇到不同的平台就意味着你只需要了解该平台是如何实现这个理论的。


  对我而言，大学时光已是久远的记忆。从那时起，数据库系统已经发生了巨大的变化。数据库厂商不断实现新功能，比如物化视图，这些我在大学里从未学过。Oracle 引入了物化视图，我曾利用它们在某些情况下成功地提升了应用性能。有一天，我需要在
  SQL Server 上做点什么，我觉得物化视图会是个不错的选择——如果我能弄清楚 SQL Server 是如何实现这个功能的话。在这种情况下，当我知道在 Oracle
  中要利用哪个功能，并想在另一个数据库引擎中实现它时，我会进行一次简单的网络搜索，输入 Oracle 功能名称和另一个平台的名称。快速搜索“SQL Server
  物化视图”让我迅速找到了一个名为索引视图的 Microsoft 功能——名称不同，但功能非常接近。然后我搜索“SQL Server 索引视图”，很快就在另一个平台上顺利上手了。这方法反过来也适用。如果你来自
  SQL Server 背景，需要使用 Oracle，搜索“Oracle 索引视图”会很快让你找到物化视图这个功能名称。


  当我确定了新数据库引擎中哪个功能有望提供我所需要的功能后，我就会转向该产品的官方文档以了解更多。


  ## 技巧


  如果你了解某个平台上的某个功能，并想在另一个平台上找到类似功能，你可以搜索“其他平台名称 功能名称”，这样你就能快速找出另一个平台上的对应功能。


  只要你知道在一个平台上用什么功能来完成工作，通常花不了多长时间就能找出另一个数据库平台上类似功能的名称。这让你能够快速地在可能不熟悉的平台上执行任务。


  另一个技巧是搜索“为新平台管理员准备的老平台指南”。这会提供一些指南，帮助你将已知平台的知识迁移到你刚开始使用的另一个平台。例如，你可以搜索“Oracle for
  the SQL Server DBA”或反之亦然。当我需要快速熟悉一个新的数据库平台时，我经常进行类似的搜索。通常花不了太长时间就能找到一份（或几份）“速查表”。速查表能让我快速了解新数据库引擎所需的术语。但是，你应该只把这些结果当作指南。获取最佳信息来源，应使用产品的官方文档。我经常发现，有些速查表是由对一种数据库引擎非常了解、而对另一种产品只有粗浅了解的人编写的，他们常常遗漏一些非常重要的信息。例如，在对比
  Oracle 的“数据库”和 SQL Server 的“数据库”时，速查表通常无法清晰地解释“数据库”这个术语在这两个不同平台上的含义是不同的。一份速查表通常只用一句话来强调差异，而要更准确地解释这些差异，可能需要一整段话。因此，你应该参考官方文档来了解更多。


  最后，扎实的数据库理论基础并非必需，但它确实有帮助。Oracle 是一种关系数据库。因此，Oracle 数据库管理员应该学习 Edgar F. Codd 博士的关系理论以及
  Christopher J. Date 的工作。Codd 和 Date 是我们今天使用的关系数据库的先驱。正如我之前提到的，如果你了解引擎**应该**如何工作的理论，那么你就能轻松地专注于引擎如何实现该理论。


  让我用一个汽车的例子来说明这一点。你会把你的丰田车只交给一个只知道如何修理雪佛兰 5.7 升发动机的修理工吗？我更愿意把车交给一个了解内燃机**工作原理**的修理工。汽油与氧气混合后进入气缸。火花点燃油气混合物，推动活塞，从而使发动机运转。一辆丰田轿车可能使用的是燃油喷射，而不是老式的化油器。那个雪佛兰
  5.7 升发动机修理工对燃油喷射可能一无所知。但理解内燃机工作基础的修理工知道，燃油喷射是将燃料和氧气输送到气缸的另一种方法。


  回到关系数据库引擎，制造商们努力遵循许多 Codd 和 Date 的理论基础。正如我之前所说，如果你了解其背后**应该**如何工作的理论，那么你只需要弄清楚特定供应商是如何实现该细节的。这使得使用不同的数据库平台变得容易得多。即使你只使用一种数据库平台，扎实的数据库理论基础也会对你的职业生涯有所帮助。遗憾的是，如今太多大学专注于向学生传授“可就业技能”，这意味着他们教授行业最急需的具体知识，而忽略了理论基础。别误会，可就业技能固然很好。但我见过太多大学只关注
  Oracle，而完全跳过了 Codd 和 Date 的工作。学生毕业了，凭借在大学学到的知识，很容易就找到了一份 Oracle 数据库管理员的工作。大学和学生皆大欢喜。然后学生在职业生涯中晋升，被要求使用
  MySQL。对这位学生来说糟糕的是，他们只是一个“雪佛兰 5.7 升发动机修理工”。他们从未接受过适当的数据库理论基础教育，很可能很难适应不同的数据库平台。


  回顾一下你自己的教育背景。如果你没有接受过良好的数据库理论教育，花些时间投资自己，学习更多关于它**应该**如何工作的理论。然后将该理论应用到你管理的数据库中，看看它是**实际**上如何工作的。


  ## 数据库管理员的典型回答


  我观察到，当有人向数据库管理员提问时，给出的回答似乎经常属于以下三类：


  *   是的，我可以做这个。

  *   不，我不能做这个。

  *   这要看情况。


  第一个回答是每个人都爱听的。他们向你提出了要求，而你将满足他们的请求。


  中间的回答是每个人都讨厌听到的。在本章前面，我描述了粗鲁的数据库管理员。通常，正是这个回答开始定义了那位难以共事的粗鲁管理员。如前所述，如果你需要向某人提供这个回答，请找一种更委婉的方式表达，并且务必努力为他们提供一些帮助，以便他们能继续完成自己的工作。在那些你需要说“不”的场合，务必提供一个充分的理由说明为什么请求无法满足。如果你能解释拒绝的原因，你就不会被认为是那个粗鲁的管理员。要准备好在日后为你的拒绝辩护。请求者不可避免地会对别人说，因为你的拒绝妨碍了他们的工作。管理层可能会来找你，问你为什么拒绝该请求。你需要有一个充分、可靠、基于事实的拒绝理由。没有人喜欢听到“不”，但有时它不得不说。


  这就引出了最后一个回答，这也是每位数据库管理员最喜欢的回应：“这要看情况。”通常的情况是，某人带着一个请求来找数据库管理员，但却遗漏了管理员需要知道的关键细节。管理员需要进行一些调查工作以了解更多信息。无论出于何种原因，数据库系统中的决策往往是一种平衡行为。在天平的一端增加某些东西，另一端就会受到影响，反之亦然。例如，一位应用程序开发人员问：“在这个表上添加索引会提升我的性能吗？”这个回答，可想而知，是“这要看情况。”如果`SELECT`语句使用了该索引，它很可能会更快完成。但天平的另一端是`INSERT`性能，如果在表上创建了过多的索引，性能可能会受到负面影响。即使是回答的前半部分也取决于尚未明确的细节。索引不一定能提升`SELECT`性能。表中的行数以及需要返回的行数是问题中缺失的关键细节。有时，表面上看起来简单的请求，需要进行更多分析才能给出恰当的回答。


  每当给出“这要看情况”的回答时，通常最好提出一些引导性的问题，以帮助给出最佳可能的答案。请求者通常不知道他们需要提供哪些细节才能得到正确的答案。如果请求者知道得足够多，能提供这些细节，他们自己就能回答这个问题了。他们是来向数据库管理员求助的，很多时候，管理员需要手把手地引导他们。如果数据库管理员仍然需要给出“这要看情况”的回答，管理员应该解释其中的权衡取舍，以便请求者能掌握尽可能充分的信息。



  ## 了解你的受众


  作为数据库管理员（DBA），你是组织内处理数据库相关事务的最佳资源。DBA 需要能够与公司许多不同领域的人沟通。成功的 DBA 是能够根据听众调整其措辞的人。你与首席执行官（CEO）和首席信息官（CIO）的谈话方式会不同于与其他
  IT 人员的谈话方式，而这又会不同于与其他数据库管理员的谈话方式。例如，如果你与 IT 管理层交谈，并开始抛出像 `buffer cache` 或 `shared
  pool` 这样的术语，你将是在他们理解范围之上说话，他们将无法跟上你。相反，使用术语 `cache`。大多数 IT 管理层理解什么是缓存。当与可能不知道缓存含义的
  CEO 讨论相同主题时，使用术语 `database memory`，他们可能会有更好的理解。然而，如果你在与另一位 Oracle DBA 交谈时使用术语 `cache`，他们会问“哪一个？”
  DBA 精通 `shared pool` 和 `buffer cache` 的不同功能，因此你可以更具体。了解你的听众以及如何快速提供他们能够理解的术语将使你成为更有效的沟通者。表
  `2-1` 说明了你如何根据交谈对象改变你的术语。


  表 2-1


  听众数据库术语对照


  | 与 DBA 交谈 | 与 IT 人员交谈 | 与非 IT 人员交谈 |

  | --- | --- | --- |

  | `Buffer cache` | `Cache` | `Database memory` |

  | `View` | `View` | `Stored query` |

  | `Instance` | `Database` | `Database` |

  | `Redo logs` | `Transaction logs` | `Transactions journal` |

  | `Table` | `Table` | `Table` |

  | `Index` | `Index` | `Index` |

  | `Tablespace` | `Data files` | `Database` |


  表 `2-1` 绝对不是一个完整的列表，但它确实让你了解了如何根据听众选择词汇。大多数与数据库交互的人都理解 `table` 或 `index` 的概念，因此无论听众是谁，DBA
  通常都可以使用这些词。然而，作为 DBA，在与非 IT 人员交谈时，你真的需要关注他们的肢体语言。有很多非 IT 人员使用数据库并理解一些基本概念，如表、索引甚至事务。当你与他们交谈时，观察他们对你术语的反应。你可能已经简化了你的用词，但仍然超出了他们的理解范围。如果他们理解
  `table` 这个术语有困难，可以说一些类似这样的话：“`table` 就像 Excel 电子表格中数据按列和行排列的方式。”大多数人都使用过 Excel 或类似软件，因此就能理解这个概念。如果他们理解事务的概念有困难，给他们举一个从银行账户取款或转账的例子。尽最大努力保持冷静。如果与不了解数据库技术的人交谈时需要额外时间，请不要感到沮丧。分析你是否准确地传达了你的观点，并准备好提供更多的背景信息。准备好成为他们的导师，如果你愿意的话。


  对于像 `shared pool` 这样的 Oracle 内存结构，我们在与其他 Oracle DBA 交谈时会用其名称指代该结构，但对 IT 人员会改为 `cache`，对非
  IT 人员则改为 `database memory`，正如我们已经讨论过的那样。Oracle DBA 在彼此交谈时提到连接到 `instance`，但对其他所有人来说，它就是
  `database`。


  如果听众的技能水平未知，最好从假设他们属于非 IT 类别开始说话。尽可能简化与数据库相关的术语。在你的讨论中，倾听他们说的话。很多时候，他们使用的术语可以提示你需要如何调整你的词汇以适应他们的技能水平并更有效地沟通。在处理数据库服务请求时，DBA
  应做的第一件事是倾听请求的细节。记住，并非每个人都使用与 DBA 相同的术语。不要立即拒绝他们的请求。他们可能不知道如何正确地提出他们的需求，因为他们不懂如何说你的语言。这是粗鲁的
  DBA 需要真正重点关注并加以改进的一个方面。


  ## 继续前进


  本章讨论了你在数据库管理职业生涯中应如何工作和与他人互动的不同方面。本章不包含任何技术内容，但当你翻到下一页时，这种情况将会改变。在本章中，我们讨论了不做粗鲁的数据库管理员的重要性，以及当有人向你提交请求时需要进一步调查的必要性。我们讨论了你将会互动的不同人来自不同听众的观点，并且根据听众使用适当的术语是你的责任。我们还阐述了当今的
  DBA 通常需要在不同平台上工作的事实。良好的数据库理论基础可以帮助 DBA 从一个数据库平台导航到另一个。


  在本书中，你将建立一些管理 Oracle 数据库的最佳实践，并更多地了解该产品。在我们开始之前，我们需要一个练习 Oracle 技术的地方。在下一章中，你将在工作站或笔记本电脑上设置一个虚拟机，以便有一个学习和探索的地方。


