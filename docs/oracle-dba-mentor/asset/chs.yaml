  ### 配置安装目录


  在下一个屏幕上，我们现在有足够的信息来填写空白处。请记住，上一章定义了 Oracle 基础目录和 Oracle 主目录。此屏幕是我们告诉 `OUI` 这两个目录位置的地方。但首先我们需要创建
  Oracle 基础目录。启动命令窗口并执行代码清单 5-4 中的命令。


