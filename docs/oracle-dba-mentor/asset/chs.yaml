  ### 总结


  调优包对于 DBA 来说是一个巨大的时间节省工具。但是，如果应用程序来自其他供应商，DBA 通常不负责调优 SQL 语句。那是软件供应商的工作。调优包由需要支持内部开发应用程序的
  DBA 使用。




  ## 分区


  分区是一项需要额外付费的可选功能，它允许你将一个表细分为更小的表，称为 `分区`。分区对应用是透明的，它使得这些较小的表能够像一个大表一样协同工作。当一个表需要处理非常大量的行（通常是数百万行或更多）时，才会对其进行分区。小表通常无法从分区中获益。


  图 21-24 中的示意图展示了一个典型网店中的 `ORDER_DETAILS` 表。随着客户填写订单，订单的详细信息会存储在此表中。由于这是一个高流量网站，每天销售大量产品，数据库管理员（DBA）已根据下单年份对该表进行了分区。图
  21-24 的示意图显示了该表的四个分区，分别对应 2016 年至 2019 年。在 2020 年到来之前，DBA 将需要为该年添加一个分区。


  ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig24_HTML.jpg](img/467924_1_En_21_Fig24_HTML.jpg)

  图 21-24 `ORDER_DETAILS` 分区表


  用户和应用程序通常不会直接引用分区。相反，它们仍然查询 `ORDER_DETAILS` 表。`ORDER_DETAILS` 表在存储上并不存在，它只存在于数据字典中。实际存储在磁盘上的是各个分区。当用户或应用程序查询
  `ORDER_DETAILS` 表时，Oracle 会从各个分区中提取数据。对表进行分区主要有两个原因：存储和性能。


  一个表位于且仅位于一个表空间中。然而，如果表被分区，那么各个分区可以被放置在不同的表空间中。这使得 DBA 可以根据需要将较旧、较少使用的分区放在较慢的磁盘存储上。例如，2016
  年的 `ORDER_DETAILS` 分区可以放在“慢速”磁盘上，而 2018 和 2019 年的分区因为更新，可以放在更快的磁盘上。DBA 通过在不同类型的磁盘存储上创建不同的表空间，并将分区移动到相应的表空间来实现这一点。由于
  2016 年的数据不会改变，DBA 随后可以将该表空间更改为 `只读`，从而让 `RMAN` 备份它一次，并在后续备份中跳过它。


  一个经过适当分区的表可以受益于 Oracle 的 `分区修剪` 功能。在图 21-24 的示例图中，很少有人会查看较旧年份的订单详情。通常，我们会查询最近的订单。DBA
  可以在表中存储订单详情日期的列上创建索引。但是，如果我们查询的日期范围足够大，比如上个季度的订单详情，Oracle 的优化器可能会认为索引的选择性不足，并执行全表扫描，读取回溯数年的详情。这可能导致极差的性能。如果表是按照详情日期分区的，Oracle
  将自动移除或修剪掉无需访问的非参与分区。在我们的例子中，如果我们要查询 2018 年第四季度的所有订单详情，Oracle 将只访问 2018 年的分区，并忽略其余分区，因为它知道它们没有任何记录可以满足该
  `SQL` 语句。


  当人们对 Oracle 表进行分区时，最大的错误是未能查看针对该表执行的最常见的 `SQL` 语句。你应该尽可能地利用 `分区修剪`。如果你经常按订单详情日期进行查询，那么按订单
  ID 列分区将不会给你带来任何 `分区修剪` 的好处。在决定分区列之前，请确保你知道哪些 `SQL` 语句需要受益于 `分区修剪`。


  在 Oracle 提供分区选项之前，人们实现了一种被称为“穷人的分区”的方法。他们通过创建多个较小的表，然后创建一个对所有这些表执行 `UNION ALL` 操作的视图来实现。虽然这个解决方案让你能享受到与
  Oracle 分区选项相同的存储优势，但它不能自动参与 `分区修剪`。


  在代码清单 21-1 中，我们可以看到如何对图 21-24 中的表进行分区的示例。


  ```

  CREATE TABLE ORDER_ENTRY.ORDER_DETAILS (

  ORDER_ID NUMBER(38,0) NOT NULL,

  ORDER_DETAIL_DATE_BEGIN DATE NOT NULL,

  ORDER_ITEM_ID NUMBER NOT NULL,

  ORDER_ITEM_COST NUMBER(38,2) NOT NULL,

  DATE_ITEM_SHIPPED DATE)

  TABLESPACE ORDER_ENTRY_DATA

  PARTITION BY RANGE (ORDER_DETAIL_DATE)

  (PARTITION o_d_2016  VALUES LESS THAN (TO_DATE(''01/01/2017 00:00:00'',''MM/DD/YYYY
  HH24:MI:SS'')) TABLESPACE ORDER_ENTRY_DATA,

  PARTITION o_d_2017  VALUES LESS THAN (TO_DATE(''01/01/2018 00:00:00'',''MM/DD/YYYY
  HH24:MI:SS'')) TABLESPACE ORDER_ENTRY_DATA,

  PARTITION o_d_2018  VALUES LESS THAN (TO_DATE(''01/01/2019 00:00:00'',''MM/DD/YYYY
  HH24:MI:SS'')) TABLESPACE ORDER_ENTRY_DATA,

  PARTITION o_d_2019  VALUES LESS THAN (TO_DATE(''01/01/2020 00:00:00'',''MM/DD/YYYY
  HH24:MI:SS'')) TABLESPACE ORDER_ENTRY_DATA,

  PARTITION o_d_max  VALUES LESS THAN (MAXVALUE) TABLESPACE ORDER_ENTRY_DATA);

  ```

  代码清单 21-1 分区表示例


  在上面的示例中，`ORDER_DETAILS` 表按照 `ORDER_DETAIL_DATE` 列进行分区。第一个分区 `O_D_2016` 包含该列值小于 2017
  年 1 月 1 日的所有记录。2017 年分区包含值大于 2016 年分区且小于 2018 年 1 月 1 日的所有记录。最后一个分区是一个兜底分区，用于存放值高于其他分区且小于该列可能最大值的所有记录。我经常包含这个兜底分区，以防
  DBA 忘记添加下一年的分区。一旦 DBA 发现了错误，他们可以在维护窗口期间采取纠正措施，但这样，应用程序功能就不会因为人为错误而中断。


  到目前为止展示的示例使用了 `范围分区`。分区是基于特定的值范围定义的。Oracle 支持以下分区方案：


  *   `范围分区`：可能是最常用的分区方法。数据基于值的范围进行分区，正如我们前面讨论的那样。


  *   `列表分区`：DBA 定义分区以保存一个离散值列表。例如，你可以按州或国家，或类似的政府边界进行分区。例如，在美国，可以有 50 个分区，每个州一个。


  *   `哈希分区`：对值运行哈希算法以确定使用哪个分区。


  *   `自动列表分区`：Oracle 会自动为你扩展列表分区表。


  *   `间隔分区`：与 `范围分区` 非常相似。我们不是定义具体的边界范围，而是可以使用数据类型的间隔。例如，在日期数据类型上，我们可以将间隔定义为该日期的年份部分。


  *   `复合分区`：表先使用一种方法分区，然后使用第二种方法进行子分区。一个常见的例子是使用基于日期的 `范围分区`，然后使用 `哈希分区` 来进一步细分数据。


  如果你处理的数据量非常大，分区选项可能正是你所需要的。并非所有东西都应该分区，但这个选项确实有助于驯服大型数据集。



  ## 真正的应用集群


  在上一章中，我们探讨了 Oracle 数据库和实例之间的区别。请记住，数据库是磁盘上的文件，而实例是服务器上的内存和进程的集合。对于许多 Oracle 部署，数据库和实例之间是一对一的关系。这种架构有两个问题。第一，如果服务器不可用，任何人都无法访问数据。第二，性能受限于该服务器上的资源上限。Oracle
  真正的应用集群解决了这两个问题。Oracle RAC 是一个高可用性和高可扩展性的解决方案。你不必在两者之间二选一，通过 Oracle RAC 可以兼得。


  使用 Oracle RAC，其架构拥有多个实例，每个实例位于自己的服务器上。这些实例可以同时访问同一个数据库，即磁盘上的相同文件。通过 Oracle RAC，实例与数据库之间形成了多对一的关系。图
  21-25 中的示意图展示了一个 Oracle RAC 系统。


  ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig25_HTML.jpg](img/467924_1_En_21_Fig25_HTML.jpg)


  图 21-25 Oracle RAC 系统


  我们可以看到磁盘上的数据库 `ORCL`。磁盘必须在配置中的所有系统之间共享。因此，磁盘通常是网络附加存储或存储区域网络。为避免单点故障，磁盘系统应具有内置冗余。此外，磁盘需要可通过多条路径访问。


  在配置中的服务器之间创建了一个私有网络。该网络速度很高，用于实例间的通信。重要的是，该网络必须是私有的，这样其他网络活动才不会对 Oracle RAC 性能产生负面影响。


  在图 21-25 的示意图中，我们为这个 Oracle RAC 系统设置了三台服务器。这些服务器形成一个*集群*，意味着多台机器作为一个整体协同工作。使集群正常工作的粘合剂是称为网格基础设施的
  Oracle 软件，它必须在创建 Oracle RAC 数据库之前安装并运行。


  每台服务器上都运行着一个实例。实例名称与数据库名称相同，但附加了实例标识符。对于 `ORCL` 数据库，我们有实例 `ORCL1`、`ORCL2` 和 `ORCL3`。


  用户会话可以连接到任何一个实例。高可用性得以实现，因为如果一台服务器不可用，集群中的另一台服务器（称为*节点*）可以接管工作。如果系统配置了透明应用故障切换，当某个实例终止时，会话可以从一个实例迁移到另一个实例。


  通过向集群添加更多节点可以实现可扩展性。Oracle RAC 系统通常使用成本较低的服务器作为集群中的节点。如果需要更多资源，只需在配置中添加另一个节点。需要双倍资源？那就增加一倍的节点。


  请记住，Oracle 数据库软件需要在集群的所有节点上获得许可。Oracle 真正的应用集群也需要在所有节点上获得许可。虽然这听起来可能需要大量额外的许可费用，但它通常比购买一台具有足够资源来支持工作负载的更大容量的服务器更便宜。


  如果你正在寻找高可用性或高可扩展性的解决方案，请关注 Oracle RAC。你将能够通过一次购买同时享受这两个方面的优势。


  ## 多租户


  Oracle 多租户是 Oracle 数据库的未来方向。多租户技术将虚拟化带到了 Oracle 层面。本书前面我们创建了一个虚拟机作为我们的测试服务器。我们使用虚拟机是为了拥有自己独立的数据库服务器，而无需额外的物理硬件。如果我们能在
  Oracle 中创建虚拟数据库，那不是很好吗？这正是多租户所提供的。


  在多租户出现之前，Oracle DBA 可以通过在同一数据库服务器上运行多个实例来整合服务器。每个实例都有自己的数据库，所以请不要将其与 Oracle RAC
  混淆。例如，我们可能有一个 Oracle 数据库支持公司的人力资源应用程序，另一个数据库支持公司的会计系统。为了降低成本，我们可以将两者托管在同一台物理机器上。我们有两个数据库，每个都有自己的实例。正如我们在上一章所知，当我们启动实例时，每个实例都需要自己的
  `SGA` 和自己的后台进程。每个实例都会带来一定数量的开销。


  Oracle 数据库管理员后来尝试将它们合并到同一个数据库中，将人力资源表放在自己的模式中，将会计表放在另一个模式中。只要两个系统没有相同的公共同义词或对 `PUBLIC`
  的相同授权，这种方法就可行。


  为了促进数据库整合，Oracle 提供了多租户选项。使用多租户，我们有一个大部分为空的容器数据库。然后我们插入一个人力资源数据库，再插入另一个会计数据库。所有的资源和开销都发生在容器数据库中。我们可以插入许多数据库，称为可插拔数据库，而不会增加开销。每个
  `PDB` 都与其他 `PDB` 隔离。`PDB` 甚至不知道其他 `PDB` 的存在。


  多租户对于 Oracle 数据库管理员来说也是一个巨大的时间节省器。DBA 不是分别修补每个数据库，而是修补容器数据库。所有的 `PDB` 都通过这一单次操作完成修补。如果
  DBA 使用 `RMAN` 进行备份，备份容器也会备份所有 `PDB`。如果 DBA 添加另一个 `PDB`，则无需为确保其得到备份而进行任何额外工作。


  Oracle 多租户对应用程序是透明的。应用程序连接到实例，并且只能看到那个 `PDB`，这与非多租户数据库没有什么不同。应用程序无需做任何改变即可与多租户一起工作。


  虽然不是必须的，但 Oracle 多租户通常部署在 Oracle RAC 之上。在整合数据库服务器时，我们可能不希望将它们全部放在一台服务器上。如果那台服务器发生故障，所有的
  `PDB` 都会宕机，给多个应用程序带来问题。此外，可能还会担心所有这些应用程序的工作负载对一台服务器来说太大了。Oracle RAC 凭借其高可用性和高可扩展性，解决了这些担忧。许多客户正在将数十个或超过一百个
  Oracle 数据库从单独的服务器迁移到带有多租户的 Oracle RAC 集群上，从而使用更少的机器。Oracle RAC 和多租户是两个不同的产品，它们之间实际上没有必然联系。你可以使用其中一个，也可以两者都使用。我们越来越多地看到
  Oracle RAC 与多租户一起部署。


  Oracle 公司已声明多租户是未来的方向。Oracle 12*c* 已弃用非多租户的 Oracle 数据库。虽然你仍然可以创建一个非多租户的数据库，就像我们在测试环境中所做的那样，但在未来某个时候，这将不再是一个选项。只要你将自己限制在一个
  `PDB` 内，你今天就可以开始使用多租户并在未来继续使用，而无需产生任何额外成本。如果你想要第二个或更多的 `PDB`，那就是你必须开始为多租户选项获取许可的时候。



  '
- '# 数据卫士


  ## 概述


  为 Oracle 数据库的高可用性能力锦上添花的产品叫做 `Data Guard`。Oracle `RAC` 在为您的生产数据中心提供数据库高可用性方面表现出色。但如果该数据中心因某些原因不可用了怎么办？您的业务需求可能需要在另一个数据中心运行一份数据库的副本。`Data
  Guard` 通过将事务从主站点传输到备用站点来实现这一点。当事务在主数据库中修改数据时，该事务将不断更新备用数据库。如果主数据中心发生故障，`DBA` 可以打开备用数据库，让应用程序继续执行其业务。


  ## 与传统方法的对比


  没有 `Data Guard` 的话，唯一的选择是备份数据库并在备用站点的硬件上执行恢复。如果数据库足够大，执行恢复所需的时间可能会超出业务可接受的范围。此外，如果备份不是最新的，将会导致大量数据丢失。有了
  `Data Guard`，则无需恢复任何内容，因为数据库始终存在且可用。


  ## 数据丢失配置


  可以将 `Data Guard` 配置为零数据丢失，或者，对于那些担心潜在性能影响的场景，配置为最小数据丢失。零数据丢失配置意味着当事务提交时，它必须在主备数据库中都完成提交。站点间的延迟时间可能会在零数据丢失配置中引发性能问题。`DBA`
  可能希望将 `Data Guard` 配置为最小数据丢失，这样应用程序性能就不会受到影响。虽然我们从不愿意丢失数据，但这却是数据库管理员部署 `Data Guard`
  时最典型的配置。在大多数配置中，最小数据丢失解决方案意味着一秒或更短的数据丢失。我曾与一个每周处理超过 `1TB` 事务量的大型主数据库合作，备用数据库最多落后主库一秒。理想情况下，我们希望采用零数据丢失方案，但其性能代价对业务来说过于高昂。丢失一秒的事务则更容易接受。


  ## 架构


  `图 21-26` 中的示意图展示了 Oracle 架构如何变化以支持 `Data Guard`。


  ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig26_HTML.jpg](img/467924_1_En_21_Fig26_HTML.jpg)


  图的第一部分取自前一章。当 `Data Guard` 就绪后，一个名为 `LNS` 的新进程会将重做日志从主数据库传输到备用站点。这与 `LGWR` 将重做日志写入联机重做日志文件的操作差别不大。唯一的变化是
  `LNS` 将重做日志写入到备用实例上运行的 `RFS` 进程。当 `RFS` 接收到重做日志后，它会将其写入备用重做日志文件。受管理恢复进程 (`MRP0`)
  从备用重做日志文件中读取重做日志，并用这些事务更新备用数据库。


  在 Oracle 术语中，此图中有两个活动。首先是重做日志 `传输`，即向备用数据库发送重做日志的行为。其次是重做日志 `应用`，即重放这些事务的行为。`LNS`
  负责重做传输。`MRP0` 负责重做应用。


  ## 操作模式：切换与故障转移


  当两个系统都就绪后，备用数据库就静静地待在那里，不断更新，直到接到行动指令。如果 `DBA` 执行 `切换` 操作，两个数据库将互换角色。主库变为备用库，反之亦然。切换会有短暂的停机时间。在此停机期间，所有已提交的事务都将确保被发送到备用库并在那里应用。切换是一个零数据丢失操作。因为角色正在互换，所以显而易见主数据库需要是可用的。如果主数据库不可用，那么唯一的选择是执行
  `故障转移` 操作。当 `DBA` 发起故障转移时，备用库成为主库，而旧的主库本质上变成了一个死库，不再属于此配置的一部分。故障转移导致的数据丢失量取决于 `Data
  Guard` 的配置。


  ## 许可要求


  `Data Guard` 不需要额外许可。但是，备用数据库确实需要获得许可。如果您想创建备用数据库，请与您的 Oracle 销售代表或经销商联系，告知他们您有兴趣购买专门用于备用数据库的许可。只要该数据库仅用作备用数据库，他们很可能会为您提供此
  Oracle 许可的折扣。


  Oracle 确实有一个名为 `Active Data Guard` 的付费附加组件。除了需要为备用 Oracle 数据库购买许可外，您还可以购买额外的 `Active
  Data Guard` 来获得更多功能。通常，备用数据库只是静静地应用重做日志。虽然这在灾难发生时非常有用，但在那之前它几乎无法用于任何有价值的事情。借助 `Active
  Data Guard`，您可以以只读模式打开备用数据库，并将其用作报表数据库，从而将资源密集型的报表任务分流到此系统。在只读模式下，`Active Data Guard`
  也会重放事务，使备用库与主库保持同步。


  ## Active Data Guard


  `Active Data Guard` 可以检测并自动修复主库和备用库中的数据块损坏。因为数据库在事务上是一致的，所以数据块在两个位置包含相同的数据。如果在主库中检测到数据块损坏，`Active
  Data Guard` 将从备用库获取该数据块的内容并替换主库中的损坏块。如果在备用库中检测到数据块损坏，操作方式相同。


  在 Oracle `12c` 之前，`DBA` 必须在零数据丢失和更好性能之间做出选择。借助 `12c` 中的 `Active Data Guard`，`DBA`
  可以两者兼得。Oracle `12c` 引入了新的 `远端同步` 功能，让您在保持相同性能水平的同时实现零数据丢失。


  `Active Data Guard` 还支持滚动升级。这将减少升级 Oracle 数据库的停机窗口。如果没有 `Active Data Guard`，升级将导致更大的停机窗口，因为主数据库在升级期间对最终用户不可用。


  需要权衡这些额外的 `Active Data Guard` 功能与成本，以确定该产品是否值得额外花费。请记住，`Data Guard` 包含在您的 Oracle
  企业版数据库许可中。`Active Data Guard` 则不包含。


  ## 兼容性


  最后，`Data Guard` 和 `Active Data Guard` 可与`多租户`和 Oracle `RAC` 一起使用。您可以混合搭配这些组件以满足您的要求。




  '
- '# 企业管理器


  在本书中，包括本章在内，我们已经看到了一些 Oracle 企业管理器（EM）的截图。企业管理器是 Oracle 的监控和管理控制台。它不仅可以管理您的 Oracle
  数据库及其服务器，还可以管理 Web 服务器等众多其他组件。EM 已包含在您当前的 Oracle 许可中，因此与本章讨论的其他选项不同，使用它**无需额外付费**。


  ## EM DB Express 与 EM Cloud Control


  企业管理器有两种不同的发行版：`EM DB Express` 和 `EM Cloud Control`。`EM DB Express` 可以通过 `数据库配置助手`
  创建，用于管理**一个且仅一个**数据库。如果您有第二个数据库，则需要将 Web 浏览器指向另一个 `EM DB Express` 实例。您想通过 EM 管理的数据库越多，如果使用
  `EM DB Express`，您需要收藏的 URL 就越多。


  `EM Cloud Control` 是一个集中式版本，可以管理任意数量的 Oracle 数据库。`EM Cloud Control` 应部署在它自己的服务器上。它还需要一个单独的数据库作为其存储库。如果您仅将此数据库用于
  `EM Cloud Control` 存储库，则此存储库数据库**无需额外许可**。


  本章的这一部分将重点介绍 `EM Cloud Control`，并将其简称为 EM。如果您拥有超过两到三个 Oracle 数据库，您可能希望使用 Cloud Control
  而非 `EM DB Express`，尽管这个数量尚有争议。有人可能会说，您需要管理更多数据库时才考虑 `EM Cloud Control`。


  ## EM 界面与导航


  连接到 EM 后，系统会提示您选择欢迎页面，如图 21-27 所示。


  ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig27_HTML.png](img/467924_1_En_21_Fig27_HTML.png)


  *图 21-27：EM 主页选择*


  我通常选择“概览”屏幕，但您可以自由选择最适合您角色的页面。“概览”屏幕显示了在给定时间您所管理目标的运行状况概览。图 21-28 展示了一个“概览”屏幕的示例。


  ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig28_HTML.jpg](img/467924_1_En_21_Fig28_HTML.jpg)


  *图 21-28：EM 概览屏幕的“概览”部分*


  在图 21-28 中，我可以看到 EM 正在管理 228 个目标。其中两个目标正在进行计划维护，九个状态未知。如果状态为“关闭”或“未知”，这就提示我需要进一步调查。图表下方的表格显示了过去七天内发生的事件。此系统没有任何需要关注的事件。导航到
  `目标` ➤ `数据库` 会显示受管数据库列表，如图 21-29 所示。


  ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig29_HTML.png](img/467924_1_En_21_Fig29_HTML.png)


  *图 21-29：EM 受管数据库*


  图 21-29 显示了一些受管数据库及其状态、数据库版本和任何未解决的事件。如果我们点击其中一个数据库，就可以获取该目标的信息并进行管理。在图 21-30 中，我点击了
  `bidev` 数据库以查看该特定目标的详细信息。


  ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig30_HTML.png](img/467924_1_En_21_Fig30_HTML.png)


  *图 21-30：EM 数据库目标*


  我们可以看到数据库名称旁边有一个绿色的向上箭头，表明此实例状态为“向上”。我们可以看到数据库的版本和运行时间。在版本和运行时间上方有多个下拉菜单，可用于监控和管理数据库。在讨论
  `诊断包` 时，我们已经看到了 `性能` 菜单中的许多项目。`可用性` 菜单允许我们备份和恢复数据库，并在配置中添加备用数据库。`安全` 菜单是我们创建用户、分配权限和修改审计策略的地方。`模式`
  菜单让我们能够创建数据库对象。`管理` 菜单允许我们配置存储和处理计划任务。这里还有很多值得探索的内容，所以如果您有 EM 访问权限，请四处看看，找找您感兴趣的功能。


  ## 监控与告警


  EM 将监控您的数据库、服务器和其他受管目标，寻找超出正常运行条件范围的情况。如果出现问题，EM 将引发事件，并可以向 DBA 发送通知，以便他们调查问题。DBA
  有能力修改告警阈值，以便在问题不够严重时不会收到通知。如果开箱即用的监控指标无法满足您的需求，您可以创建自己的自定义指标。


  ## 管理额外付费包


  EM 的一个问题是，它太容易让人无意中使用到额外付费的选项，例如 `诊断` 和 `调优包`。仅仅导航到数据库的 `性能主页` 页面，就需要为 `诊断包` 购买许可。您可以通过点击
  `设置` ➤ `管理包` ➤ `此页的包` 来查看特定页面所需的许可，如图 21-31 所示。


  ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig31_HTML.png](img/467924_1_En_21_Fig31_HTML.png)


  *图 21-31：EM “此页的包”*


  在图 21-31 中，我们可以看到 `性能主页` 页面。我们还可以看到，要使用此页面，必须为 `数据库诊断包` 购买许可。从我的角度来看，大问题在于，在您进入该页面之前，无法看到此页面需要什么。到那时，您已经触发了表示您正在使用额外付费选项的标志。EM
  现在允许您在数据库级别控制这些额外付费选项的页面。导航到 `设置` ➤ `管理包` ➤ `管理包访问`，您将看到一个类似于图 21-32 的屏幕。


  ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig32_HTML.png](img/467924_1_En_21_Fig32_HTML.png)


  *图 21-32：EM 包访问选项*


  对于每个受管数据库，您可以取消选中您未获许可的选项。不幸的是，这些选项默认是启用的。请确保您因缺乏许可而不应使用的选项的复选框被取消选中。每个数据库可以单独配置。取消选中这些复选框后，您就不会意外地发出您已使用了额外付费选项的信号。


  `诊断` 和 `调优包` 的复选框显示为灰色，因为这两个包由每个数据库中的 `CONTROL_PACK_MANAGEMENT_ACCESS` 初始化参数控制。有效值为
  `NONE`、`DIAGNOSTIC` 或 `DIAGNOSTIC+TUNING`。在 Oracle 企业版中，默认是在数据库级别启用这两个包。请适当设置此参数以确保符合您的许可协议。


