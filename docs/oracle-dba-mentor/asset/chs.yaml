  \ 通虚拟机。如果你遇到问题，请再次检查你的 IP 地址。可能有多个以`192.168`开头的地址，因此你可能需要逐一尝试。同时检查虚拟机的设置，确保其中一个网络适配器是作为仅主机适配器创建的。\n\
  \n### 设置静态 IP\n\n虚拟机当前配置的问题在于，每次虚拟机启动时 IP 地址都可能改变。为了让配置更固定，在 Linux 虚拟机中，转到 应用程序\
