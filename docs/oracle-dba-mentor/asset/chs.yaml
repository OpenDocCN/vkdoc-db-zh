  \nOracle 数据库管理员需要知道为工作选择哪些工具，这与木匠或机械师没什么不同。合适的工具用于合适的工作可以简化你的生活。就像你会用锤子钉钉子一样，你会使用数据库配置助手来创建数据库。\n\
