  并且仍然存在于数据库中。\n根据具体问题的严重程度及其性质，\n这可能意味着您的数据库尚未准备好进行升级。\n要解决遗留问题，请首先查看\npreupgrade_fixups.sql\
  \ 文件，并在其中搜索上面列出的\n失败的 CHECK NAME（检查名称）或 Preupgrade Action Number（升级前操作编号）。\n在那里，您将找到来自升级前工具的原始对应诊断消息，\n\
  其中更详细地解释了仍需要完成的工作。\nPL/SQL 过程已成功完成。\n```\n\n### 回到日志文件中，剩下的只有升级后部分。\n\n## 升级后信息\n\
  \n```\n=================\n升级后\n=================\n必需操作\n============\n无\n建议操作\n\
  ===================\n4.  使用 `DBMS_DST` 包升级数据库时区文件。\n    数据库当前使用的时间区文件版本为 26，而目标版本\
  \ `18.0.0.0.0`\n    自带的时间区文件版本为 31。\n    Oracle 建议升级到所需（最新）版本的时区文件。\n    更多信息，请参阅\
  \ `18.0.0.0.0` 版《Oracle 数据库全球化支持指南》中的\n    “升级时区文件和带时区的时间戳数据”。\n5.  （自动修复）升级后使用以下命令收集字典统计信息：\n\
  \    `EXECUTE DBMS_STATS.GATHER_DICTIONARY_STATS;`\n    Oracle 建议在升级后收集字典统计信息。\n\
  \    字典统计信息为 Oracle 优化器提供 essential 信息，以帮助其找到高效的 SQL 执行计划。\n    数据库升级后，统计信息需要重新收集，因为升级过程中可能会有表发生显著变化，\n\
  \    或者可能有新表尚未收集统计信息。\n6.  升级后，并在系统有代表性工作负载时，使用以下命令收集固定对象统计信息：\n    `EXECUTE DBMS_STATS.GATHER_FIXED_OBJECTS_STATS;`\n\
  \    此建议适用于所有升级前运行。\n    固定对象统计信息为 Oracle 优化器提供 essential 信息，以帮助其找到高效的 SQL 执行计划。\n\
  \    这些统计信息是特定于生成它们的 Oracle 数据库版本的，在数据库升级后可能已经过时。\n    有关管理优化器统计信息的详细信息，请参阅 `12.2.0.1`\
  \ 版《Oracle 数据库 SQL 调优指南》。\nORACLE 生成的修复脚本\n=============================\n上面识别出的、数据库\
  \ ORCL 中所有标记为升级后“（自动修复）”的问题\n都可以通过执行以下命令来解决：\nSQL>`@/u01/app/oracle/cfgtoollogs/orcl/preupgrade/postupgrade_fixups.sql`\n\
  ```\n\n日志文件中的输出告诉我们没有必需操作。建议升级时区信息并收集字典和固定对象统计信息。`升级前信息工具` 已生成一个升级后修复脚本，我们可以执行该脚本来执行这些推荐操作。\n\
  \n我们现在已准备好开始数据库升级。新的 Oracle 软件已安装，并且已执行 `升级前实用程序`。该实用程序建议的所有操作已在升级前执行。\n\n\n## 升级数据库\n\
  \n在本次升级中，我们将使用 `Database Upgrade Assistant`。大多数 Oracle 升级都使用此工具，因为它能通过自动化升级过程，实现最短的停机窗口并最大程度降低风险。\n\
  \n首先，我们需要将会话的环境变量指向新的软件主目录，但保留相同的 `Oracle SID`。然后，我们需要启动 `DBUA` 工具。代码清单 18-11 展示了如何在我们的\
  \ Linux 测试环境中设置环境变量并启动 `DBUA`。\n\n```\n[oracle@dbamentor ~]$ export ORACLE_HOME=/u01/app/oracle/product/18.3\n\
  [oracle@dbamentor ~]$ export ORACLE_SID=orcl\n[oracle@dbamentor ~]$ export PATH=$ORACLE_HOME/bin:$PATH\n\
  [oracle@dbamentor ~]$ dbua\n代码清单 18-11\n设置升级环境\n```\n\n在如图 18-4 所示的初始屏幕上，`DBUA`\
  \ 会询问要升级哪个数据库。如果服务器上有多个数据库，`DBA` 需要从列表中选择。我们的测试环境只有一个数据库。如果从另一台服务器运行此工具，则必须提供 `SYSDBA`\
  \ 凭据。通常，您是在数据库服务器本身上运行此工具，因此 `SYSDBA` 的用户名和密码可以留空。\n\n![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig4_HTML.jpg](img/467924_1_En_18_Fig4_HTML.jpg)\n\
  \n**图 18-4**\n**DBUA 升级目标选择**\n\n点击 `Next` 按钮后，`DBUA` 将花费几分钟时间收集有关待升级数据库的信息。`DBUA`\
  \ 完成此任务后，将执行一些先决条件检查。图 18-5 显示了这些检查的结果。\n\n![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig5_HTML.jpg](img/467924_1_En_18_Fig5_HTML.jpg)\n\
  \n**图 18-5**\n**DBUA 先决条件检查屏幕**\n\n如果我们很好地修复了 `Pre-Upgrade Information Tool` 发现的任何问题，那么先决条件检查应该会通过，且不会有任何额外发现。在图\
  \ 18-5 中，唯一的是一些升级后的建议，这些我们已经知道并将在最后处理。\n\n点击 `Next` 后，系统会要求我们提供一些升级选项，如图 18-6 所示。\n\
  \n![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig6_HTML.jpg](img/467924_1_En_18_Fig6_HTML.jpg)\n\
  \n**图 18-6**\n**DBUA 升级选项**\n\n图 18-6 中的前三个选项默认被选中，我们通常保持这些选项不变。第一个选项通过并行执行许多任务让升级过程运行得更快。如果您正在此服务器上运行多个数据库，您可能希望取消选中此框，以使并行操作不会对其他数据库性能产生负面影响。第二个选项将运行一个脚本，重新编译在升级期间变为无效的对象。没有充分的理由取消选中此框。第三个选项升级时区数据。同样，几乎没有理由避免这样做。\n\
  \n第四个选项指示 `DBUA` 将用户表空间更改为 `只读`。此选项用于在升级失败时促进快速回退，但 Oracle 建议您如果担心此问题，则使用有保证的还原点。\n\
  \n`DBUA 步骤 3` 的最后一部分允许您在升级前后执行自定义脚本。如果您愿意，可以将 `升级后` 部分指向由 `Pre-Upgrade Installation\
  \ Tool` 生成的修复脚本。\n\n在 `步骤 4` 中，如图 18-7 所示，`DBUA` 询问我们，如果升级过程中发生故障，我们希望如何处理数据库恢复。\n\
  \n![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig7_HTML.jpg](img/467924_1_En_18_Fig7_HTML.jpg)\n\
  \n**图 18-7**\n**DBUA 还原选项**\n\n如果您选择使用 `闪回` 和有保证的还原点，或者选择使用 `RMAN` 备份，并且在升级过程中发生错误，`DBUA`\
  \ 将自动使用您选择的选项将您恢复到起始点。如果您选择最后一个选项，即使用您自己的备份和恢复策略，`DBUA` 将无法为您恢复。您将必须自己执行恢复操作。\n\n\
  如前所述，Oracle 的建议是使用有保证的还原点。这是让您恢复到升级前状态的最快方法，但您必须已经定义了 `闪回恢复区`。另一个很好的选择是 `RMAN` 备份。\n\
  \n记得我说过您需要在开始升级过程之前执行备份吗？`DBUA` 的 `步骤 4` 就是您定义该策略的地方。如果您选择最后一个选项，您的备份应该在启动 `DBUA`\
  \ 之前进行。\n\n由于这是一个测试环境，我将选择使用我自己的备份和恢复策略，并点击 `Next` 进入 `DBUA` 的下一个屏幕，如图 18-8 所示。`DBUA`\
  \ 的 `步骤 5` 要求我们创建一个新的 `监听器`。\n\n![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig8_HTML.jpg](img/467924_1_En_18_Fig8_HTML.jpg)\n\
  \n**图 18-8**\n**DBUA 监听器选择**\n\n`DBUA` 看不到当前的 `监听器`，因为它是在旧的 Oracle 主目录下运行的。它确实为我们提供了创建新\
  \ `监听器` 的选项，但我们不希望服务器上运行两个监听器。升级完成后，我将向您展示如何轻松地将 `监听器` 移动到新的主目录。在此步骤中接受默认设置并点击 `Next`\
  \ 按钮。\n\n在 `步骤 6` 中，`DBUA` 要求我们定义管理选项，即我们是否想使用 `Oracle Enterprise Manager (EM) Database\
  \ Express` 或 `EM Cloud Control` 来管理此数据库。默认情况下，选择了 `EM Database Express`。我在图 18-9\
  \ 中取消选择了该选项。\n\n![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig9_HTML.jpg](img/467924_1_En_18_Fig9_HTML.jpg)\n\
  \n**图 18-9**\n**DBUA 管理选项**\n\n如果我使用 `Cloud Control`，我可以轻松地在以后添加此数据库。如果我将来需要，我可以使用\
  \ `Database Configuration Assistant (DBCA)` 添加 `Database Express`。目前，我们将不使用任何 `Enterprise\
  \ Manager`。如果您想使用 `EM`，请选择 `Database Express` 选项。在升级结束时，`DBUA` 将为您提供有关如何使用它的信息。\n\
  \n当我们点击 `Next` 按钮时，我们将转到所选选项的数据库摘要页面，如图 18-10 所示。\n\n![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig10_HTML.jpg](img/467924_1_En_18_Fig10_HTML.jpg)\n\
  \n**图 18-10**\n**DBUA 摘要**\n\n此屏幕是我们继续之前最后确认一切是否正确的机会。到目前为止，`DBUA` 尚未进行任何更改，也未尝试升级数据库。当您点击\
  \ `Finish` 按钮时，升级将开始。此时数据库将不可用。您可以在计划的停机窗口之前提前到达此点，为计划开始的升级节省一些时间。\n\n现在是让 `DBUA`\
  \ 为我们完成所有艰巨工作的时候了。点击 `Finish` 按钮，然后坐下来观看它工作。我们可以在图 18-11 中看到 `进度` 屏幕的示例。\n\n![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig11_HTML.jpg](img/467924_1_En_18_Fig11_HTML.jpg)\n\
  \n**图 18-11**\n**DBUA 进度屏幕**\n\n当 `DBUA` 正在升级数据库时，它将继续显示 `进度` 屏幕，以便您可以跟踪进度。一段时间后，升级将完成，`DBUA`\
  \ 将显示一个类似于图 18-12 的最终结果页面。\n\n\n"
