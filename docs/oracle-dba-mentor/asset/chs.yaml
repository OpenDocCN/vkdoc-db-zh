  \ DBA 账户并锁定 `SYSTEM`。\n\n\n## 密码配置文件\n\n今天的 IT 从业者都知道，一个好密码对于确保系统安全至关重要。像 password、123456\
  \ 和 qwerty 这样的密码简直是在邀请黑客使用你的账户。你肯定有过登录某个计算机系统并尝试为账户设置密码时，收到反馈说密码必须超过八个字符、包含大小写字母混合、并包含数字和特殊字符的经历。在本节中，你将学习如何创建一个密码验证函数来强制执行类似的规则。\n\
  \n在开始之前，我们需要将 Oracle 提供的一个文件复制到我们的主目录中。我们不想直接修改这个文件，而只对文件副本进行操作。在清单 8-2 中，我们将 `catpvf.sql`\
  \ 脚本复制到测试服务器上的 Linux 主目录。\n\n```bash\n[oracle@dbamentor ~]$ cp $ORACLE_HOME/rdbms/admin/catpvf.sql\
  \ $HOME/.\n```\n清单 8-2\n复制安全文件\n\n`catpvf.sql` 脚本包含一个密码验证函数。如果你像第 6 章描述的那样，使用数据库配置助手（`DBCA`）创建了数据库，那么\
  \ Oracle 已经针对数据库运行过这些脚本。\n\n在文本编辑器中打开 `catpvf.sql` 脚本。如果你滚动浏览这个文件，会看到它首先创建了一个名为\
  \ `ora_complexity_check` 的函数。该函数检查密码是否包含大小写字母、数字和特殊字符。它还检查密码是否足够长。如果其中任何一项检查失败，该函数就会引发错误。\n\
  \n在同一脚本的后面部分，是用于创建函数 `ora12_verify_function` 的代码。这是实际的密码验证函数，在创建用户或更改其密码时会被调用。检查这段代码可以发现，该函数确保密码不包含用户名或反转的用户名。它确保密码不包含服务器名。我们还可以在清单\
  \ 8-3 中看到对 `ora_complexity_check` 的调用。\n\n```sql\nIF NOT ora_complexity_check(password,\
  \ chars => 8, letter => 1, digit => 1,\nspecial => 1) THEN\n  RETURN(FALSE);\n```\n\
  清单 8-3\n调用 `ora_complexity_check`\n\n开箱即用，Oracle 会检查密码是否至少有八个字符，且至少包含一个字母、一个数字和一个特殊字符。许多安全专家会说，好密码的长度应至少为\
  \ 12 个字符。在这个文件中，让我们将 `8` 改为 `12`。我们还需要通过更改清单 8-3 中的那些参数，来要求密码至少包含两个字母、两个数字和两个特殊字符。然后保存文件。\n\
  \n密码验证函数必须由 `SYS` 用户拥有。启动 `SQL*Plus`，以 `SYS` 用户身份连接，然后执行我们刚刚修改的脚本。我们可以在清单 8-4 中看到一个例子。\n\
