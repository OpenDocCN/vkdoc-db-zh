  \n我们需要寻找两个 IP 地址，一个以`10.0`开头，另一个以`192.168`开头。前者用于我们的 NAT 适配器，后者用于我们的仅主机适配器，这也是本章我们最关心的那个。在我的输出中，IP\
  \ 地址是`192.168.56.101`，但你的地址可能略有不同。我的虚拟机运行在 Windows 工作站上，因此我将启动一个命令窗口（`CMD`）。在 Mac\
  \ 上，你会启动一个终端窗口。在排除网络连接故障时，人们通常首先会问：“你能 ping 通它吗？”清单 11-2 给出了我的虚拟机的答案。\n\n```\nC:\\\
  Users\\bpeasland\\Desktop>ping 192.168.56.101 -n 3\nPinging 192.168.56.101 with\
