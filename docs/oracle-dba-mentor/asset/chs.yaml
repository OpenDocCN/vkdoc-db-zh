  \ `V$` 视图，可以查询 `DICT` 或查阅《*Database Reference*》。\n\n### 常用 V$ 视图\n\n以下列表显示了许多常用的\
  \ `V$` 视图。与 `DBA_` 视图一样，您还可以使用许多其他视图。\n\n*   `V$ACCESS`：显示哪个会话在库缓存中锁定了对象。\n*   `V$CACHE`：显示缓冲区缓存的内容。\n\
