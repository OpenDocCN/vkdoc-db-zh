  trans: '

    ## 恢复先于备份


    我几乎每天都能看到这种情况。数据库管理员讨论备份与恢复的顺序是错的。我见过这类问题：“备份数据库的最佳方式是什么？”“如何备份一个非常大的数据库？”“Oracle
    首选的备份工具是什么？”“我应该执行增量备份吗？”每一个问题都在讨论备份，却丝毫未涉及恢复。甚至“备份与恢复”(`backup and recovery`)这个术语在我看来都是颠倒的。如果每个立志成为数据库管理员的人都将术语改为“恢复与备份”(`recovery
    and backup`)，那会更好，因为这才是我们思考问题应有的顺序。


    ### 小贴士


    在设计备份方案之前，先定义你的恢复要求。


    在我的职业生涯中，我一直大力倡导，在考虑备份之前先思考恢复要求。如今，我看到其他数据库管理员也开始效仿，我们一小群人正在改变这种态度。作为本书的读者，你现在已经加入了这场“先讨论恢复，再讨论备份”的运动。


    备份只有一个且唯一的目的：能够在发生故障后，让数据库重新运行并恢复业务。重要的不是执行备份这个动作本身，而是从故障中**恢复和还原**这一关键任务。太多数据库管理员先实施备份方案，然后要么希望它能让自己从故障中恢复，要么盲目相信它未来一定能起作用。在这两种情况下，数据库管理员都犯了关键的判断错误。本书的读者将会明白，在实施备份方案之前，他们必须了解自己的恢复要求。请帮忙传播这个理念：是**恢复要求驱动备份方案**，而不是反过来。


    大多数 Oracle 数据库管理员会告诉你使用 Oracle 恢复管理器(`RMAN`)来备份和还原你的数据库。他们会告诉你每周或每月执行完全备份，如果你的数据库很大或交易量很高，则在中间执行增量备份。表面上，这似乎是很好的建议，并且可能满足你绝大多数需求。但如果你的管理层告诉你，需要确保数据库在一小时内恢复运行，而你的数据库有
    100TB 大，那会怎样？`RMAN`将很难在如此短的时间内还原这么大的数据库。这并不是说`RMAN`不好。`RMAN`是一个优秀的产品，如果可能，你应该使用它。`RMAN`是
    Oracle 首选的备份与恢复工具。就像任何工具一样，使用它有优点也有缺点。有时，你的恢复要求决定了要使用不同的工具。与其思考你将使用哪个工具进行备份和恢复，不如让我们首先定义恢复要求。


    ## 恢复要求


    在设计备份方案之前，请将你的恢复要求记录成文。这通常需要数据库管理员与管理层紧密合作，而管理层又可能需要与组织紧密合作。请回想第 2 章，我们讨论了了解你的受众，并考虑了一些与不同技能背景的人沟通的技巧。收集恢复要求正是你沟通技巧派上用场的时候。


    恢复要求需要被记录下来，并用于制定服务级别协议(`SLA`)。`SLA`应包含业界所知的恢复时间目标(`RTO`)，即衡量你的数据库需要在故障后多快恢复运行的指标。你的恢复要求还需要指明可接受的数据丢失级别，称为恢复点目标(`RPO`)，通常以一段时间来表示。我需要恢复每一个事务吗？在这种情况下，`RPO`为零。或者，组织能否承受丢失一周的数据，或者介于两者之间的某个值？数据库管理员需要知道这两个指标，才能设计出满足`SLA`要求的备份策略。


    `RTO`或数据丢失量`RPO`越低，实施方案的成本就越高。例如，如果你的组织可以承受七天的停机时间，并且可以丢失一个月的数据，那么你可以每月将备份写到异地磁带上。你会有充足的时间把那盘磁带带回数据中心并还原你的数据库。如果你的要求是零数据丢失，并且数据库必须在五分钟内恢复运行，那么`RMAN`或基于磁盘的快照将无法帮助你。你将需要实施`Data
    Guard`，并在另一个数据中心拥有一个事务一致的数据库副本。第一种情况成本更低，更容易实施。第二种情况则昂贵得多。


    组织正在为你需要实施的灾难恢复解决方案付费。既然他们必须为数据库管理员你所设计的方案买单，那么你和组织双方对所有相关方的期望都有坚实的理解，这是你的责任。这就是为什么`SLA`如此重要。


    `SLA`不仅仅是一份让所有相关方理解期望的文件。它也是数据库管理员与业务部门之间的一份合同。如果数据库管理员没有实施满足`SLA`的备份与恢复策略，那么该数据库管理员应被组织解雇。如果组织没有为满足`SLA`所需的资源付费，数据库管理员应对此进行记录，以便在无法满足协议条款时免于承担责任。

    '
- fmt: '### 建议


    与管理层合作，为公司数据库恢复制定服务级别协议。


    该 SLA 应为企业中每个数据库包含以下项目：


    *   恢复时间目标，即数据库必须恢复运行的时间范围。

    *   恢复点目标，即可接受的数据丢失量。

    *   适用于安置数据库的数据中心的灾难场景列表，例如火灾、洪水、飓风、龙卷风或人为错误。

    *   为备份数据库可接受的停机时间（如有）。

    *   该数据库的任何特殊需求。


    生产数据库的 SLA 条款通常与非生产数据库大不相同。许多数据库管理员仅为生产数据库创建 SLA，但你的非生产数据库也应该有 SLA。开发和测试数据库通常可以承受更长的停机时间并丢失更多数据，这需要被记录在案。请记住，虽然你组织的最终用户依赖你的生产数据库，但你的开发和测试数据库对某些人（通常是内部员工）而言也被视为生产环境。如果你的开发数据库宕机，应用开发人员可能无法工作。如果测试数据库宕机，质量保证人员可能无法工作。


    当今的 IT 基础设施有助于满足非生产 SLA 要求。例如，利用云计算，可以轻松丢弃一个损坏的开发测试数据库并快速启动另一个，但你可能会经历完全的数据丢失。使用
    `Oracle Multitenant`，你可以为不同目的克隆数据库。例如，我有一个每周的“黄金镜像”，它是生产数据库的一个副本，挂载在一个 `Oracle
    Multitenant` 数据库中。所有的开发和测试数据库都是从这些黄金镜像克隆而来的。如果一个开发数据库损坏到无法使用，我们只需销毁它并从黄金镜像重新克隆。本段的全部重点是，技术变革可以帮助满足
    SLA 要求。云计算、多租户、虚拟化和容器等新技术可以协助数据库管理员。


    一旦 SLA 创建完毕且所有相关方都已签署，数据库管理员就需要仔细审阅它并设计恢复测试计划。恢复测试计划确保 SLA 中的所有要求都被考虑到，并且数据库管理员已验证可以按要求缓解灾难。恢复测试计划是一个检查清单，列出了根据
    SLA 必须满足的项目。


    请注意，在本节中，我们只讨论恢复这一半。在分析恢复需求时，我们从不考虑备份。SLA 中永远不应包含任何关于备份的内容，只应涉及恢复。如果你的 SLA 说明了要使用任何特定的备份方法，请将该条款从文档中删除。我见过太多
    SLA 例如写道“每周执行完整备份，每日执行增量备份”——这种语言不属于 SLA。SLA 不应限制备份解决方案。相反，它应有助于制定备份解决方案。经过测试，数据库管理员可能会发现备份解决方案无法满足
    SLA 的恢复要求，因此数据库管理员可能需要采用另一种备份解决方案。如果备份解决方案不在 SLA 中，这样做会更容易。


    ### 建议


    只有在 SLA 完成之后，才能创建备份解决方案。


    既然数据库管理员知道了需要从哪些场景中恢复、恢复速度要求以及可接受的最大数据丢失量，他们最终能够设计备份解决方案了。`Oracle` 数据库管理员很可能会发现，使用
    `RMAN` 每周执行一次完整备份、每日执行增量备份就足够了。数据库管理员也可能会发现需要实施不止一种备份解决方案。例如，数据库管理员可能需要能够定期刷新开发中的某个模式。此需求将属于前面列表中最后一个要点提到的“特殊需求”。数据库管理员可以选择使用
    `RMAN` 备份来满足大部分恢复需求，但也利用数据库导出来满足这一特殊需求。或者，数据库管理员可以决定在 `Multitenant` 环境中使用 `RMAN`
    备份，该环境为开发数据库创建克隆。


    备份解决方案设计并实施后，数据库管理员针对所有要求进行恢复测试至关重要。数据库管理员应使用源自 SLA 的恢复测试计划，以确保覆盖所有 SLA 条款。如果某个恢复要求无法满足，数据库管理员需要弄清楚如何处理该要求。是需要修改现有的备份解决方案来处理这个额外要求并同时处理其他所有要求，还是需要数据库管理员实施另一个工具来满足该要求？


    数据库管理员应每年与管理层一起审查 SLA。所有相关方都需要确保协议条款在接下来的一年仍然有效。事物随时间变化，在创建 SLA 时有效的内容可能不再有效。


    数据库管理员也应至少每年练习一次恢复测试计划。这确保过去一年的技术变化不会影响满足 SLA 的能力。年度恢复测试应验证每个 SLA 要求是否仍然得到满足。如果数据库管理员有上面提到的恢复要求检查清单，他们可以在这里使用它。执行定期的恢复测试也能使数据库管理员的技能保持最新。作为数据库管理员，最糟糕的感觉之一莫过于所有人都在等待你将生产数据库恢复上线，而你却不记得该怎么做了。年度审查至关重要。理想情况下，应每半年甚至每季度进行一次审查。如果你的公司因业务或监管要求而接受审计，则需要进行多次恢复测试。


    ### 建议


    至少每年审查一次 SLA 并演练恢复测试计划。'
  raw: '### Tip


    Work with management to implement a service-level agreement for recovery of the
    company’s databases.


    The SLA should include the following items for each and every database in the
    enterprise:


    *   Recovery time objective, the time within which it must be operational


    *   Recovery point objective, the acceptable amount of data loss


    *   A list of disaster scenarios, such as fire, flood, hurricane, tornado, or
    human error, applicable to the data center(s) that house the database.


    *   How much downtime is acceptable to back up the database, if any


    *   Any special needs for this database


    Production databases often have much different SLA terms than non-production databases.
    Many DBAs only create an SLA for production databases, but your non-production
    databases should have an SLA as well. Development and test databases can often
    withstand much longer outages and lose much more data, and it needs to be documented
    as such. Remember that while your organization’s end users rely on your production
    database, your dev and test databases are considered production for someone as
    well, typically internal staff. If your development database is down, application
    developers may not be able to work. If the test database is down, quality assurance
    staff may be unable to work.


    Today’s IT infrastructure can help facilitate meeting non-production SLA requirements.
    For example, with cloud computing, it is easy to throw away a broken development
    test database and spin up another one, however you may experience total data loss.
    With Oracle Multitenant, you can clone databases for different purposes. For example,
    I have a weekly golden image, which is a copy of production mounted up in an Oracle
    Multitenant database. All development and test databases are cloned from these
    golden images. Should a development database become too broken to use, we simply
    destroy it and re-clone from a golden image. The whole point of this paragraph
    is that technology changes can help meet SLA requirements. Cloud, Multitenant,
    virtualization, and containers are newer technologies that can assist the DBA.


    Once the SLA has been created and all parties have signed off on the document,
    the database administrator needs to go through it and design a recovery test plan.
    The recovery test plan ensures that everything in the SLA is accounted for and
    that the DBA has verified disaster can be mitigated as required. The recovery
    test plan is a checklist of items that must be met, according to the SLA.


    Notice that in this section, we only discuss the recovery half. We never think
    about backups during the analysis of our recovery requirements. The SLA should
    never have anything in it about backups, only recovery. If your SLA says to use
    any specific backup methodology, strike that term from the document. I’ve seen
    too many SLAs that say, for example, to perform full backups weekly with incremental
    backups daily—that language does not belong in the SLA. The SLA should never constrain
    the backup solution. Rather, it should help craft the backup solution. After testing,
    the DBA may discover the backup solution does not meet the SLA’s recovery requirements,
    so the DBA may need to employ another backup solution. This is easier to do if
    the backup solution is not in the SLA.


    ### Tip


    Only after the SLA is complete can the backup solution be created.


    Now that the database administrator knows the scenarios they need to recover from,
    how quickly, and with the maximum acceptable data loss, the DBA is finally able
    to design a backup solution. The Oracle DBA may very well find that using RMAN
    for full backups once a week and incremental backups daily is sufficient. The
    DBA may also find that they need to implement more than one backup solution. For
    example, the DBA may be required to be able to refresh a schema in development
    on a periodic basis. This requirement would fall under the “special needs” mentioned
    in the final bullet point in the previous list. The DBA may opt for RMAN backups
    to fulfill most of the recovery requirements, but also leverage database exports
    for this special requirement. Or, the DBA may decide to use RMAN backups in a
    Multitenant environment that creates clones for development databases.


    After the backup solution has been designed and implemented, it is vital for the
    database administrator to test recovery against all of the requirements. The DBA
    should use the recovery test plan, derived from the SLA, to ensure the SLA terms
    are covered. If a recovery requirement cannot be met, the DBA will need to figure
    out how to handle that requirement. Does the existing backup solution need to
    be modified to handle that extra requirement while handling all the rest? Or does
    the DBA need to implement another tool to meet that requirement?


    The database administrator should review the SLA with management on a yearly basis.
    All parties need to ensure the terms of the agreement still hold for the upcoming
    year. Things change over time, and what was valid when the SLA was created may
    no longer be valid.


    The DBA should also practice the recovery test plan on a yearly basis, at a minimum.
    This ensures that technology changes over the past year will not impact the ability
    to meet the SLA. The annual recovery testing should verify that each and every
    SLA requirement is still being met. If the DBA has their recovery requirements
    checklist mentioned above, they can use it here. Performing regular recovery tests
    also keeps the DBA’s skills up to date. One of the worst feelings as a DBA is
    to have everyone waiting for the DBA to return a production database back into
    service and not be able to remember what to do. An annual review is essential.
    Ideally, the review should be performed biannually or even quarterly. If your
    company is audited due to business or regulatory requirements, multiple recovery
    tests will be needed.


    ### Tip


    At least yearly, review the SLA and exercise the recovery test plan.'
