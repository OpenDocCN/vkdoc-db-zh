    decided to change its version numbering scheme.


    An Oracle 11*g* Interactive Quick Reference guide is published at the following
    URL:

    ```

    www.oracle.com/webfolder/technetwork/tutorials/obe/db/11g/Poster/11g_interactive.html

    ```

    The 11*g* version of this tool does require Adobe Flash in your browser.


    ## Instance Startup


    When an Oracle instance is started, the instance goes through three stages: `NOMOUNT`,
    `MOUNT`, and `OPEN`, in that order. In Listing 20-6, we have connected to an idle
    instance, meaning it is not yet running. The instance is then started in `NOMOUNT`
    mode, then advanced to `MOUNT`, and finally to `OPEN`.


    ```sql

    SQL> connect / as sysdba

    Connected to an idle instance.

    SQL> startup nomount

    ORACLE instance started.

    Total System Global Area 2147483648 bytes

    Fixed Size                  2926472 bytes

    Variable Size             687868024 bytes

    Database Buffers         1442840576 bytes

    Redo Buffers               13848576 bytes

    SQL> alter database mount;

    Database altered.

    SQL> alter database open;

    Database altered.

    ```

    Listing 20-6 Moving Instance Through Startup Stages


    The database administrator can start the instance and have it proceed to any of
    the three stages. In the example above, the DBA started the instance in `NOMOUNT`
    mode. But the DBA could have specified `STARTUP MOUNT` or `STARTUP OPEN` to proceed
    to those stages. If no stage is specified on the `STARTUP` command, the default
    action is to proceed to the `OPEN` stage.


    When an instance is started in `NOMOUNT` mode, the only file accessed on disk
    is the parameter file. The instance starts, memory is allocated, and background
    processes necessary to support the instance are spawned. When the instance moves
    to `MOUNT` mode, the control file is accessed for the first time. When the instance
    is moved to `OPEN` mode, the rest of the database’s files are accessed. If needed,
    `SMON` will perform recovery to roll back any uncommitted transactions from when
    the instance was terminated. Once complete, the database is then open for business
    and connections are allowed to the instance.


    You would use `NOMOUNT` mode when you need to perform work on the control files.
    Remember that the control files are not yet accessed in this stage. If you need
    to manually re-create the control files, you need to be in `NOMOUNT` mode.


    The `MOUNT` mode is used when you need access to the control files but not to
    the rest of the data files. You would use this stage if you wanted to move or
    rename data files. `MOUNT` mode is also used when configuring the archivelog mode
    for the database or performing full database recovery.


    Most of the time, you will use the `OPEN` stage. After all, we want the instance
    open and ready for business. You would use the other stages for maintenance activities.


    There is one other startup mode to discuss. You can open the instance in `RESTRICTED`
    mode. In this mode, the instance starts to the `OPEN` stage. However, only those
    users with the `RESTRICTED SESSION` system privilege will be allowed to connect
    to the instance. You would use this method when you want to gain access to the
    database for maintenance activities, but you do not want those activities to negatively
    impact end users.


    ## Moving On


    This chapter has discussed many facets of the Oracle architecture: files, processes,
    and memory structures. The information in this chapter only scratches the surface.
    You will want to make sure you read the *Database Concepts* guide in the Oracle
    documentation to add more to your knowledge.


    In the next chapter, we will discuss a number of advanced options for the Oracle
    database. You can certainly make a career without using any of these options.
    The options exist to extend the functionality of the Oracle database. In many
    cases, the options have additional licensing costs, but can actually save your
    company money in the long run by saving on labor or third-party products.'
