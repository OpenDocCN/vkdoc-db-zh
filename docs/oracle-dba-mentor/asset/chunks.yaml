- fmt: "# Oracle 数据字典与动态性能视图指南\n\n## Common DBA Views\n\n本节将介绍一些您可能会用到的常见数据字典视图及其简要说明。毫无疑问，您使用的视图将远超此列表范围。\n\
    \n*   `DBA_BLOCKERS`：显示哪个会话正在阻塞谁。\n*   `DBA_CONSTRAINTS`：显示应用于数据库中所有表的约束。\n* \
    \  `DBA_DATA_FILES`：显示构成数据库的文件。\n*   `DBA_DEPENDENCIES`：显示数据库中依赖于其他对象的对象。\n* \
    \  `DBA_FREE_SPACE`：显示每个表空间中的可用空间。\n*   `DBA_IND_COLUMNS`：显示数据库中每个索引的列。\n*   `DBA_INDEXES`：显示数据库中的所有索引。\n\
    *   `DBA_OBJECTS`：显示数据库中的所有对象。\n*   `DBA_ROLES`：显示数据库中的所有角色。\n*   `DBA_ROLE_PRIVS`：显示数据库中授予他人的角色。\n\
    *   `DBA_SCHEDULER_JOBS`：显示数据库中的所有计划作业。\n*   `DBA_SEGMENTS`：显示所有作为段的对象，即表和索引。\n\
    *   `DBA_SEQUENCES`：显示数据库中的所有序列对象。\n*   `DBA_SOURCE`：显示构成视图、过程、包、触发器等的源代码。\n*\
    \   `DBA_SYS_PRIVS`：显示授予他人的所有系统权限。\n*   `DBA_SYNONYMS`：显示数据库中的所有同义词。\n*   `DBA_TAB_COLUMNS`：显示数据库中所有表的所有列。\n\
    *   `DBA_TAB_COMMENTS`：显示所有表的注释。\n*   `DBA_TAB_PRIVS`：显示授予他人的所有表的权限。\n*   `DBA_TABLES`：显示数据库中的所有表。\n\
    *   `DBA_TABLESPACES`：显示数据库中的所有表空间。\n*   `DBA_TEMP_FILES`：显示数据库中临时表空间的所有临时文件。\n\
    *   `DBA_TRIGGERS`：显示数据库中所有表上的所有触发器。\n*   `DBA_USERS`：显示数据库中的所有用户。\n*   `DBA_VIEWS`：显示数据库中的所有视图。\n\
    \n在您的职业生涯中，可能已经查询过此列表中的许多视图。如果对某些视图不熟悉，请花些时间了解它们包含的信息。\n\n## Useful Views\n\n\
    有许多有用的数据字典静态视图不以 `DBA_`、`ALL_`、`USER_` 或 `CDB_` 开头，您需要熟悉它们。\n\n*   `DATABASE_PROPERTIES`：显示永久数据库属性，例如时区和语言。\n\
    *   `DICT`：显示所有数据字典视图。\n*   `RECYCLEBIN`：显示回收站中的表，这些表可能可以从意外删除中恢复。\n*   `SESSION_PRIVS`：显示当前会话可用的权限。\n\
    *   `SESSION_ROLES`：显示为当前会话启用的角色。\n\n## Dynamic Performance Views\n\n对于静态数据字典视图，需要某种事务来更改其输出。而对于动态性能视图，则不需要此类事务。考虑清单\
    \ [14-9](#467924_1_En_14_Chapter.xhtml#PC9) 中的示例，它显示了有多少会话连接到 Oracle 实例。\n\n```sql\n\
    SQL> select count(*) from v$session;\nCOUNT(*)\n---\n        36\n\nSQL> select\
    \ count(*) from v$session;\nCOUNT(*)\n---\n        37\n```\n\n清单 14-9 会话计数\n\n\
    第一次执行查询时，有 36 个会话连接到 Oracle 实例。第二次执行时，有 37 个会话连接。由于这是一个受控环境，我知道用户会话都没有生成任何事务，但数值仍然发生了变化。这就是为什么这类视图被称为\
    \ *动态* 的。即使数据库中没有任何用户事务，这些值也可能并将会随时间变化。\n\n静态视图和动态性能视图之间还有另一个重要区别，这与实例关闭有关。如果数据库中有\
    \ 1,498 个表，然后将其关闭，那么在启动时，必须仍然有 1,498 个表。而对于动态性能视图，当实例关闭时，所有信息都会丢失。这些视图返回的任何计数器在实例重新启动时都会从头开始。\n\
    \n大多数动态性能视图以 `V$` 开头。在清单 [14-9](#467924_1_En_14_Chapter.xhtml#PC9) 的示例中，我们看到对\
    \ `V$SESSION` 的查询。`V$` 视图通常供数据库管理员用来了解其数据库的运行状况。如果您正在寻找特定的 `V$` 视图，可以查询 `DICT`\
    \ 或查阅《*Database Reference*》。\n\n### Common V$ Views\n\n以下列表显示了许多常用的 `V$` 视图。与\
    \ `DBA_` 视图一样，您还可以使用许多其他视图。\n\n*   `V$ACCESS`：显示哪个会话在库缓存中锁定了对象。\n*   `V$CACHE`：显示缓冲区缓存的内容。\n\
    *   `V$CONTROLFILE`：显示控制文件的状态。\n*   `V$DATABASE`：显示记录在控制文件中的数据库信息。\n*   `V$FILESTAT`：显示数据库文件的\
    \ I/O 统计信息。\n*   `V$INSTANCE`：显示有关当前运行实例的信息。\n*   `V$LOG`：显示有关联机重做日志的信息。\n*  \
    \ `V$LOGFILE`：显示联机重做日志成员。\n*   `V$MYSTAT`：显示有关当前会话的统计信息。\n*   `V$PARAMETER`：显示当前会话的参数会话。\n\
    *   `V$SESSION`：显示当前连接到实例的会话。\n*   `V$SESSION_EVENT`：显示每个会话自启动以来一直在等待的事件。\n* \
    \  `V$SESSION_WAIT`：显示每个会话当前正在等待的详细信息。\n*   `V$SGAINFO`：显示 SGA 每个组件的大小。\n*   `V$SPPARAMETER`：显示存储在\
    \ SPFILE 中的参数值。\n*   `V$SQL`：显示有关存储在共享池中的 SQL 语句的详细信息。\n*   `V$VERSION`：显示 Oracle\
    \ 版本。\n\n当然，在您的职业生涯中，您还可以使用并将使用更多 `V$` 视图。您可能已经使用过上面列表中的一些。如果对某些视图不熟悉，请花些时间查询每个视图并进行进一步研究。\n\
    \n### GV$ Views\n\n现在介绍对上一节讨论的 `V$` 视图的一个扩展。在我们的测试环境中，启动 Oracle 时，数据库只有一个实例。Oracle\
    \ 数据库的一个额外付费选项是真正应用集群（RAC），它允许您在多个服务器上为同一数据库启动多个实例。Oracle RAC 用于高可用性和高可扩展性。\n\n\
    `V$` 视图仅显示当前实例。如果您使用 Oracle RAC，则配置中会有其他实例。`GV$` 视图在 Oracle RAC 中非常有用，因为它们允许您查询数据库所有实例的信息。我一直认为它们是全局\
    \ `V$` 视图。如果您在 Oracle RAC 中查询 `V$SESSION`，它会显示连接到您所连接实例的会话。如果您查询 `GV$SESSION`，它会显示所有实例上的所有会话。\n\
    \n如果您不使用 Oracle RAC，`GV$` 视图仍然有效，但它们只包含一个实例（唯一运行的实例）的信息。`GV$` 视图还包含一个额外的列 `INST_ID`，用于表示该行信息来自哪个实例。在非\
    \ RAC 的单实例环境中，`INST_ID` 列始终为 1。"
  raw: '### Common DBA Views


    In this section, I will go over a number of the common data dictionary views that
    you might use, along with a brief description. Undoubtedly, you will use more
    than what is in this list.


    *   DBA_BLOCKERS: Shows which session is blocking who.


    *   DBA_CONSTRAINTS: Shows the constraints applied to all of the tables in the
    database.


    *   DBA_DATA_FILES: Shows the files that make up the database.


    *   DBA_DEPENDENCIES: Shows objects dependent on other objects in the database.


    *   DBA_FREE_SPACE: Shows how much free space is in each tablespace.


    *   DBA_IND_COLUMNS: Shows the column of each index in the database.


    *   DBA_INDEXES: Shows all of the indexes in the database.


    *   DBA_OBJECTS : Shows all of the objects in the database.


    *   DBA_ROLES: Shows all of the roles in the database.


    *   DBA_ROLE_PRIVS: Shows roles granted to others in the database.


    *   DBA_SCHEDULER_JOBS: Shows all scheduled jobs in the database.


    *   DBA_SEGMENTS: Shows all objects that are segments, i.e., tables and indexes.


    *   DBA_SEQUENCES: Shows all sequence objects in the database.


    *   DBA_SOURCE: Shows the source code that makes up views, procedures, packages,
    triggers, etc.


    *   DBA_SYS_PRIVS: Shows all system privileges assigned to others


    *   DBA_SYNONYMS: Shows all synonyms in the database.


    *   DBA_TAB_COLUMNS: Shows all columns for all tables in the database.


    *   DBA_TAB_COMMENTS: Shows comments on all tables in the database.


    *   DBA_TAB_PRIVS: Shows privileges on all tables assigned to others.


    *   DBA_TABLES: Shows all tables in the database.


    *   DBA_TABLESPACES: Shows all tablespaces in the database.


    *   DBA_TEMP_FILES : Shows all temporary files for temp tablespaces in the database.


    *   DBA_TRIGGERS: Shows all triggers on all tables in the database.


    *   DBA_USERS: Shows all users in the database.


    *   DBA_VIEWS: Shows all views in the database.


    You have probably been querying a number of the views in this list in your career.
    If there are some that are unfamiliar to you, take some time to see what information
    they contain.


    ### Useful Views


    There are a number of useful static data dictionary views that do not start with
    DBA_, ALL_, USER_, or CDB_ that you will want to be familiar with.


    *   DATABASE_PROPERTIES: Shows permanent database properties such as the timezone
    and language.


    *   DICT: Shows all of the data dictionary views.


    *   RECYCLE BIN: Shows tables that are in the recycle bin and may be able to be
    restored from an accidental drop.


    *   SESSION_PRIVS: Shows the privileges available to your session.


    *   SESSION_ROLES: Shows the roles enabled for your session.


    ## Dynamic Performance Views


    With the static data dictionary views, a transaction of some sort is needed to
    change the output. With the dynamic performance views, no such transaction is
    needed. Consider the example in Listing [14-9](#467924_1_En_14_Chapter.xhtml#PC9)
    showing how many sessions are connected to the Oracle instance.


    ```

    SQL> select count(*) from v$session;

    COUNT(*)


    SQL> select count(*) from v$session;

    COUNT(*)


    Listing 14-9

    Session Count

    ```


    The first time the query was issued, 36 sessions were connected to the Oracle
    instance. The second time, 37 sessions were connected. Because this is a controlled
    environment, I know that none of the user sessions generated any transactions,
    yet the value changed. This is why this category of views is called *dynamic*.
    The values can and will change over time, even without any user transactions in
    the database.


    There is one other big difference between the static and the dynamic performance
    views and that deals with instance shutdown. If there are 1,498 tables in the
    database and you shut it down, then on startup, there better be 1,498 tables.
    With the dynamic performance views, when the instance is shut down, all of the
    information is lost. Any of the counters returned by these views starts over from
    the beginning when the instance starts back up.


    Most of the dynamic performance views start with V$. In the example in Listing
    [14-9](#467924_1_En_14_Chapter.xhtml#PC9), we can see a query of V$SESSION. The
    V$ views are normally used by database administrators to get an idea of what is
    going on in their database. If you are looking for a specific V$ view, you can
    query DICT or look in the *Database Reference*.


    ### Common V$ Views


    The following list shows many of the commonly used V$ views. As with the DBA_
    views, there are many others at your disposal that you may use from time to time.


    *   V$ACCESS: Shows which session has a lock on an object in the library cache.


    *   V$CACHE: Shows the contents of the buffer cache.


    *   V$CONTROLFILE: Shows the status of the control files.


    *   V$DATABASE: Displays information about the database that is recorded in the
    control files.


    *   V$FILESTAT: Shows I/O statistics on the database’s files.


    *   V$INSTANCE: Shows information about the currently running instance.


    *   V$LOG: Shows information about the online redo logs.


    *   V$LOGFILE: Shows the online redo log members.


    *   V$MYSTAT: Shows statistics about your current session.


    *   V$PARAMETER: Shows the parameter sessions for your current session.


    *   V$SESSION: Shows the currently connected sessions to the instance.


    *   V$SESSION_EVENT: Shows what events each session has been waiting on since
    the session started.


    *   V$SESSION_WAIT: Shows details about what each session is currently waiting
    on.


    *   V$SGAINFO: Shows how each component of the SGA is sized.


    *   V$SPPARAMETER: Shows the parameter values as stored in the SPFILE.


    *   V$SQL: Shows details about the SQL statements stored in the shared pool.


    *   V$VERSION: Shows the Oracle version.


    Of course, there are many more V$ views you can and will use over the course of
    your career. You may have already used some of what you see in the list above.
    If there are some that are unfamiliar to you, take some to query each and investigate
    further.


    ### GV$ Views


    It is time to throw in an extension to the V$ views discussed in the prior section.
    In our testbed, when we start Oracle, there is one instance for the database.
    An extra-cost option for the Oracle database is Real Application Clusters (RAC),
    which lets you start multiple instances over multiple servers for that same database.
    Oracle RAC is used for high availability and high scalability.


    The V$ views show you the current instance only. If you are using Oracle RAC,
    then there are other instances in the configuration. The GV$ views are beneficial
    in Oracle RAC because they let you query the information for all instances of
    the database. I’ve always thought of these as Global V$ views. If you query V$SESSION
    in Oracle RAC, it shows you the sessions connected to the same instance you are
    connected to. If you query GV$SESSION, it shows you all sessions over all instances.


    If you are not using Oracle RAC, the GV$ views still work, but they only have
    one instance’s information, the only one running. The GV$ views also contain an
    additional column, INST_ID, to denote which instance the row of information is
    coming from. In a non-RAC, single-instance environment, the INST_ID column is
    always 1.'
  trans: "# Oracle 数据字典与动态性能视图指南\n\n## 常用 DBA 视图\n\n本节将介绍一些您可能会用到的常见数据字典视图及其简要说明。毫无疑问，您使用的视图将远超此列表范围。\n\
    \n*   `DBA_BLOCKERS`：显示哪个会话正在阻塞谁。\n*   `DBA_CONSTRAINTS`：显示应用于数据库中所有表的约束。\n* \
    \  `DBA_DATA_FILES`：显示构成数据库的文件。\n*   `DBA_DEPENDENCIES`：显示数据库中依赖于其他对象的对象。\n* \
    \  `DBA_FREE_SPACE`：显示每个表空间中的可用空间。\n*   `DBA_IND_COLUMNS`：显示数据库中每个索引的列。\n*   `DBA_INDEXES`：显示数据库中的所有索引。\n\
    *   `DBA_OBJECTS`：显示数据库中的所有对象。\n*   `DBA_ROLES`：显示数据库中的所有角色。\n*   `DBA_ROLE_PRIVS`：显示数据库中授予他人的角色。\n\
    *   `DBA_SCHEDULER_JOBS`：显示数据库中的所有计划作业。\n*   `DBA_SEGMENTS`：显示所有作为段的对象，即表和索引。\n\
    *   `DBA_SEQUENCES`：显示数据库中的所有序列对象。\n*   `DBA_SOURCE`：显示构成视图、过程、包、触发器等的源代码。\n*\
    \   `DBA_SYS_PRIVS`：显示授予他人的所有系统权限。\n*   `DBA_SYNONYMS`：显示数据库中的所有同义词。\n*   `DBA_TAB_COLUMNS`：显示数据库中所有表的所有列。\n\
    *   `DBA_TAB_COMMENTS`：显示所有表的注释。\n*   `DBA_TAB_PRIVS`：显示授予他人的所有表的权限。\n*   `DBA_TABLES`：显示数据库中的所有表。\n\
    *   `DBA_TABLESPACES`：显示数据库中的所有表空间。\n*   `DBA_TEMP_FILES`：显示数据库中临时表空间的所有临时文件。\n\
    *   `DBA_TRIGGERS`：显示数据库中所有表上的所有触发器。\n*   `DBA_USERS`：显示数据库中的所有用户。\n*   `DBA_VIEWS`：显示数据库中的所有视图。\n\
    \n在您的职业生涯中，可能已经查询过此列表中的许多视图。如果对某些视图不熟悉，请花些时间了解它们包含的信息。\n\n## 有用的视图\n\n有许多有用的数据字典静态视图不以\
    \ `DBA_`、`ALL_`、`USER_` 或 `CDB_` 开头，您需要熟悉它们。\n\n*   `DATABASE_PROPERTIES`：显示永久数据库属性，例如时区和语言。\n\
    *   `DICT`：显示所有数据字典视图。\n*   `RECYCLEBIN`：显示回收站中的表，这些表可能可以从意外删除中恢复。\n*   `SESSION_PRIVS`：显示当前会话可用的权限。\n\
    *   `SESSION_ROLES`：显示为当前会话启用的角色。\n\n## 动态性能视图\n\n对于静态数据字典视图，需要某种事务来更改其输出。而对于动态性能视图，则不需要此类事务。考虑清单\
    \ 14-9 中的示例，它显示了有多少会话连接到 Oracle 实例。\n\n```sql\nSQL> select count(*) from v$session;\n\
    COUNT(*)\n---\n        36\n\nSQL> select count(*) from v$session;\nCOUNT(*)\n\
    ---\n        37\n```\n\n清单 14-9 会话计数\n\n第一次执行查询时，有 36 个会话连接到 Oracle 实例。第二次执行时，有\
    \ 37 个会话连接。由于这是一个受控环境，我知道用户会话都没有生成任何事务，但数值仍然发生了变化。这就是为什么这类视图被称为 *动态* 的。即使数据库中没有任何用户事务，这些值也可能并将会随时间变化。\n\
    \n静态视图和动态性能视图之间还有另一个重要区别，这与实例关闭有关。如果数据库中有 1,498 个表，然后将其关闭，那么在启动时，必须仍然有 1,498 个表。而对于动态性能视图，当实例关闭时，所有信息都会丢失。这些视图返回的任何计数器在实例重新启动时都会从头开始。\n\
    \n大多数动态性能视图以 `V$` 开头。在清单 14-9 的示例中，我们看到对 `V$SESSION` 的查询。`V$` 视图通常供数据库管理员用来了解其数据库的运行状况。如果您正在寻找特定的\
    \ `V$` 视图，可以查询 `DICT` 或查阅《*Database Reference*》。\n\n### 常用 V$ 视图\n\n以下列表显示了许多常用的\
    \ `V$` 视图。与 `DBA_` 视图一样，您还可以使用许多其他视图。\n\n*   `V$ACCESS`：显示哪个会话在库缓存中锁定了对象。\n* \
    \  `V$CACHE`：显示缓冲区缓存的内容。\n*   `V$CONTROLFILE`：显示控制文件的状态。\n*   `V$DATABASE`：显示记录在控制文件中的数据库信息。\n\
    *   `V$FILESTAT`：显示数据库文件的 I/O 统计信息。\n*   `V$INSTANCE`：显示有关当前运行实例的信息。\n*   `V$LOG`：显示有关联机重做日志的信息。\n\
    *   `V$LOGFILE`：显示联机重做日志成员。\n*   `V$MYSTAT`：显示有关当前会话的统计信息。\n*   `V$PARAMETER`：显示当前会话的参数会话。\n\
    *   `V$SESSION`：显示当前连接到实例的会话。\n*   `V$SESSION_EVENT`：显示每个会话自启动以来一直在等待的事件。\n* \
    \  `V$SESSION_WAIT`：显示每个会话当前正在等待的详细信息。\n*   `V$SGAINFO`：显示 SGA 每个组件的大小。\n*   `V$SPPARAMETER`：显示存储在\
    \ SPFILE 中的参数值。\n*   `V$SQL`：显示有关存储在共享池中的 SQL 语句的详细信息。\n*   `V$VERSION`：显示 Oracle\
    \ 版本。\n\n当然，在您的职业生涯中，您还可以使用并将使用更多 `V$` 视图。您可能已经使用过上面列表中的一些。如果对某些视图不熟悉，请花些时间查询每个视图并进行进一步研究。\n\
    \n### GV$ 视图\n\n现在介绍对上一节讨论的 `V$` 视图的一个扩展。在我们的测试环境中，启动 Oracle 时，数据库只有一个实例。Oracle\
    \ 数据库的一个额外付费选项是真正应用集群（RAC），它允许您在多个服务器上为同一数据库启动多个实例。Oracle RAC 用于高可用性和高可扩展性。\n\n\
    `V$` 视图仅显示当前实例。如果您使用 Oracle RAC，则配置中会有其他实例。`GV$` 视图在 Oracle RAC 中非常有用，因为它们允许您查询数据库所有实例的信息。我一直认为它们是全局\
    \ `V$` 视图。如果您在 Oracle RAC 中查询 `V$SESSION`，它会显示连接到您所连接实例的会话。如果您查询 `GV$SESSION`，它会显示所有实例上的所有会话。\n\
    \n如果您不使用 Oracle RAC，`GV$` 视图仍然有效，但它们只包含一个实例（唯一运行的实例）的信息。`GV$` 视图还包含一个额外的列 `INST_ID`，用于表示该行信息来自哪个实例。在非\
    \ RAC 的单实例环境中，`INST_ID` 列始终为 1。"
- fmt: '## Useful Examples


    This chapter has discussed the Oracle data dictionary, both the static views and
    the dynamic performance views. The data dictionary is where you can learn so much
    about your database. In this section, I will provide some useful examples. You
    can use many of the scripts in this section and even tailor them for your specific
    needs. Please follow this section to learn examples on how to leverage the data
    dictionary.


    Every Oracle DBA has at one point or another during their career inherited a database
    someone else set up. The DBA in this situation often needs to find out some introductory
    information about the database to learn more about it. When encountering an existing
    database for the first time, I often run a series of queries against the data
    dictionary in order to become more familiar with the system. One of the first
    things I do is to make sure I know the instance name, hostname, and the database’s
    version, shown in Listing 14-10.


    ```

    SQL> select instance_name,host_name,version,startup_time

    2  from v$instance;

    INSTANCE_NAME    HOST_NAME                      VERSION           STARTUP_T

    ---------------- ------------------------------ ----------------- ---------

    orcl             dbamentor.localdomain          12.2.0.1.0        20-AUG-18

    Listing 14-10

    V$INSTANCE Query

    ```


    Next, I determine the tablespaces that make up the database using a query similar
    to Listing 14-11.


    ```

    SQL> select tablespace_name from dba_tablespaces

    2  order by tablespace_name;

    TABLESPACE_NAME


    APPS_TS

    SYSAUX

    SYSTEM

    TEMP

    UNDOTBS1

    USERS

    Listing 14-11

    Database’s Tablespaces

    ```


    I am naturally curious about where the tablespaces’ data files reside on disk
    storage. In addition to the data files, I also want to know where the temp files,
    control files, and online redo logs are located. All of this information is stored
    in different data dictionary views, but I can perform a `UNION` operation to put
    it all together, as shown in Listing 14-12.


    ```

    SQL> select ''DATA'' as type,file_name,bytes from dba_data_files

    2  union all

    3  select ''TEMP'',file_name,bytes from dba_temp_files

    4  union all

    5  select ''REDO'',lf.member,l.bytes

    6  from v$logfile lf join v$log l on lf.group#=l.group#

    7  union all

    8  select ''CTL'',value,NULL from v$parameter where name=''control_files'';

    TYPE FILE_NAME                                               BYTES

    ---- -------------------------------------------------- ----------

    DATA /u01/app/oracle/oradata/orcl/system01.dbf           734003200

    DATA /u01/app/oracle/oradata/orcl/sysaux01.dbf          1184890880

    DATA /u01/app/oracle/oradata/orcl/undotbs01.dbf          492830720

    DATA /u01/app/oracle/oradata/orcl/users01.dbf              5242880

    DATA /u01/app/oracle/oradata/orcl/apps_ts01.dbf         5368709120

    TEMP /u01/app/oracle/oradata/orcl/temp01.dbf              20971520

    REDO /u01/app/oracle/oradata/orcl/redo01.log             209715200

    REDO /u01/app/oracle/oradata/orcl/redo02.log             209715200

    REDO /u01/app/oracle/oradata/orcl/redo03.log             209715200

    CTL  /u01/app/oracle/oradata/orcl/control01.ctl

    CTL  /u01/app/oracle/oradata/orcl/control02.ctl

    Listing 14-12

    Databases Files

    ```


    I now have a better idea of what the storage configuration looks like for this
    database. I want to make sure the tablespaces are not running low on space, so
    I can issue a query similar to Listing 14-13.


    ```

    SQL> select f.tablespace_name, to_char(f.bytes,''99,999,999,999,999'') as bytes_alloc,

    2  nvl(to_char(se.bytes,''99,999,999,999,999''),LPAD(''Empty'',19)) as bytes_used,

    3  to_char(nvl(trunc((se.bytes/f.bytes)*100,2),0),''990.00'') as pct_used

    4  from

    5  ( select df.tablespace_name, sum(bytes) as bytes

    6    from dba_data_files df group by df.tablespace_name) f,

    7  ( select s.tablespace_name, sum(bytes) as bytes

    8    from dba_segments s group by s.tablespace_name ) se

    9  where f.tablespace_name=se.tablespace_name (+)

    10  order by f.tablespace_name;

    TABLESPACE_NAME        BYTES_ALLOC         BYTES_USED          PCT_USE

    ---------------------- ------------------- ------------------- -------

    APPS_TS              5,368,709,120              Empty             0.00

    SYSAUX               1,184,890,880      1,122,566,144            94.74

    SYSTEM                 734,003,200        730,726,400            99.55

    UNDOTBS1               492,830,720         13,959,168             2.83

    USERS                    5,242,880              Empty             0.00

    Listing 14-13

    Tablespace Free Space

    ```


    I can see that two tablespaces are empty and the `SYSTEM` and `SYSAUX` tablespaces
    are more than 90% full.


    Next, I often want to learn about the users in the database. Oracle includes a
    number of users created to support internal database operations. I typically only
    care about the non-Oracle-maintained users, as shown in Listing 14-14.


    ```

    SQL> select username,account_status from dba_users

    2  where oracle_maintained=''N'' order by username;

    USERNAME                       ACCOUNT_STATUS

    ------------------------------ --------------------------------

    PEASLAND                       OPEN

    TEST_USER                      OPEN

    HR                             OPEN

    Listing 14-14

    Non-Oracle Users

    ```


    When discussing user accounts, security should be at the forefront of everyone’s
    mind. Next, I’ll query the data dictionary to determine the security profile in
    use, shown in Listing 14-15.


    ```

    SQL> select username,profile from dba_users

    2  where oracle_maintained=''N'' order by username;

    USERNAME                       PROFILE

    ------------------------------ ------------------------------

    PEASLAND                       DEFAULT

    TEST_USER                      DEFAULT

    Listing 14-15

    User’s Profile

    ```


    I see the profile named `DEFAULT` is in use by the users. To learn more about
    this profile, I can query the data dictionary again as shown in Listing 14-16.


    ```

    SQL> select resource_name,limit from dba_profiles

    2  where profile=''DEFAULT'';

    RESOURCE_NAME                    LIMIT

    -------------------------------- ------------------------------

    COMPOSITE_LIMIT                  UNLIMITED

    SESSIONS_PER_USER                UNLIMITED

    CPU_PER_SESSION                  UNLIMITED

    CPU_PER_CALL                     UNLIMITED

    LOGICAL_READS_PER_SESSION        UNLIMITED

    LOGICAL_READS_PER_CALL           UNLIMITED

    IDLE_TIME                        UNLIMITED

    CONNECT_TIME                     UNLIMITED

    PRIVATE_SGA                      UNLIMITED

    FAILED_LOGIN_ATTEMPTS            5

    PASSWORD_LIFE_TIME               90

    PASSWORD_REUSE_TIME              730

    PASSWORD_REUSE_MAX               8

    PASSWORD_VERIFY_FUNCTION         ORA12C_VERIFY_FUNCTION

    PASSWORD_LOCK_TIME               .0069

    PASSWORD_GRACE_TIME              7

    INACTIVE_ACCOUNT_TIME            365

    Listing 14-16

    Default Profile Settings

    ```


    If any of the above profile settings are out of line for my security expectations,
    I can work toward closing the gap.


    It is useful to learn which users in the database are granted the powerful `DBA`
    role. Listing 14-17 shows a simple query to determine the users with the `DBA`
    role.


    ```

    SQL> select grantee from dba_role_privs

    2  where granted_role=''DBA'';

    GRANTEE


    PEASLAND

    SYSTEM

    SYS

    Listing 14-17

    DBA Users

    ```'
  raw: '## Useful Examples


    This chapter has discussed the Oracle data dictionary, both the static views and
    the dynamic performance views. The data dictionary is where you can learn so much
    about your database. In this section, I will provide some useful examples. You
    can use many of the scripts in this section and even tailor them for your specific
    needs. Please follow this section to learn examples on how to leverage the data
    dictionary.


    Every Oracle DBA has at one point or another during their career inherited a database
    someone else set up. The DBA in this situation often needs to find out some introductory
