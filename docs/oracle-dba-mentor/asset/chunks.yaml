    the first part of the answer depends on details that have yet to be defined. An
    index does not necessarily help SELECT performance. The number of rows in the
    table and how many rows need to be returned are crucial details missing from the
    question. Sometimes what looks like a simple request on the surface requires more
    analysis before a proper answer can be given.


    Whenever giving the “It depends” answer, it is usually a good idea to ask probing
    questions to help provide the best possible answer. The requestor often does not
    know which details they need to provide to obtain the correct answer. If the requestor
    knew enough to provide these details, they would be knowledgeable enough to answer
    their own question. They are coming to the DBA for assistance and, many times,
    the DBA needs to lead them by the hand, so to speak. If the DBA still needs to
    give an “It depends” answer, the DBA should explain the trade-offs so the requestor
    has the best information possible.'
  trans: '# 技巧


    如果你了解某个平台上的某个功能，并想在另一个平台上找到类似功能，你可以搜索“其他平台名称 功能名称”，这样你就能快速找出另一个平台上的对应功能。


    只要你知道在一个平台上用什么功能来完成工作，通常花不了多长时间就能找出另一个数据库平台上类似功能的名称。这让你能够快速地在可能不熟悉的平台上执行任务。


    另一个技巧是搜索“为新平台管理员准备的老平台指南”。这会提供一些指南，帮助你将已知平台的知识迁移到你刚开始使用的另一个平台。例如，你可以搜索“Oracle
    for the SQL Server DBA”或反之亦然。当我需要快速熟悉一个新的数据库平台时，我经常进行类似的搜索。通常花不了太长时间就能找到一份（或几份）“速查表”。速查表能让我快速了解新数据库引擎所需的术语。但是，你应该只把这些结果当作指南。获取最佳信息来源，应使用产品的官方文档。我经常发现，有些速查表是由对一种数据库引擎非常了解、而对另一种产品只有粗浅了解的人编写的，他们常常遗漏一些非常重要的信息。例如，在对比
    Oracle 的“数据库”和 SQL Server 的“数据库”时，速查表通常无法清晰地解释“数据库”这个术语在这两个不同平台上的含义是不同的。一份速查表通常只用一句话来强调差异，而要更准确地解释这些差异，可能需要一整段话。因此，你应该参考官方文档来了解更多。


    最后，扎实的数据库理论基础并非必需，但它确实有帮助。Oracle 是一种关系数据库。因此，Oracle 数据库管理员应该学习 Edgar F. Codd 博士的关系理论以及
    Christopher J. Date 的工作。Codd 和 Date 是我们今天使用的关系数据库的先驱。正如我之前提到的，如果你了解引擎**应该**如何工作的理论，那么你就能轻松地专注于引擎如何实现该理论。


    让我用一个汽车的例子来说明这一点。你会把你的丰田车只交给一个只知道如何修理雪佛兰 5.7 升发动机的修理工吗？我更愿意把车交给一个了解内燃机**工作原理**的修理工。汽油与氧气混合后进入气缸。火花点燃油气混合物，推动活塞，从而使发动机运转。一辆丰田轿车可能使用的是燃油喷射，而不是老式的化油器。那个雪佛兰
    5.7 升发动机修理工对燃油喷射可能一无所知。但理解内燃机工作基础的修理工知道，燃油喷射是将燃料和氧气输送到气缸的另一种方法。


    回到关系数据库引擎，制造商们努力遵循许多 Codd 和 Date 的理论基础。正如我之前所说，如果你了解其背后**应该**如何工作的理论，那么你只需要弄清楚特定供应商是如何实现该细节的。这使得使用不同的数据库平台变得容易得多。即使你只使用一种数据库平台，扎实的数据库理论基础也会对你的职业生涯有所帮助。遗憾的是，如今太多大学专注于向学生传授“可就业技能”，这意味着他们教授行业最急需的具体知识，而忽略了理论基础。别误会，可就业技能固然很好。但我见过太多大学只关注
    Oracle，而完全跳过了 Codd 和 Date 的工作。学生毕业了，凭借在大学学到的知识，很容易就找到了一份 Oracle 数据库管理员的工作。大学和学生皆大欢喜。然后学生在职业生涯中晋升，被要求使用
    MySQL。对这位学生来说糟糕的是，他们只是一个“雪佛兰 5.7 升发动机修理工”。他们从未接受过适当的数据库理论基础教育，很可能很难适应不同的数据库平台。


    回顾一下你自己的教育背景。如果你没有接受过良好的数据库理论教育，花些时间投资自己，学习更多关于它**应该**如何工作的理论。然后将该理论应用到你管理的数据库中，看看它是**实际**上如何工作的。


    ## 数据库管理员的典型回答


    我观察到，当有人向数据库管理员提问时，给出的回答似乎经常属于以下三类：


    *   是的，我可以做这个。

    *   不，我不能做这个。

    *   这要看情况。


    第一个回答是每个人都爱听的。他们向你提出了要求，而你将满足他们的请求。


    中间的回答是每个人都讨厌听到的。在本章前面，我描述了粗鲁的数据库管理员。通常，正是这个回答开始定义了那位难以共事的粗鲁管理员。如前所述，如果你需要向某人提供这个回答，请找一种更委婉的方式表达，并且务必努力为他们提供一些帮助，以便他们能继续完成自己的工作。在那些你需要说“不”的场合，务必提供一个充分的理由说明为什么请求无法满足。如果你能解释拒绝的原因，你就不会被认为是那个粗鲁的管理员。要准备好在日后为你的拒绝辩护。请求者不可避免地会对别人说，因为你的拒绝妨碍了他们的工作。管理层可能会来找你，问你为什么拒绝该请求。你需要有一个充分、可靠、基于事实的拒绝理由。没有人喜欢听到“不”，但有时它不得不说。


    这就引出了最后一个回答，这也是每位数据库管理员最喜欢的回应：“这要看情况。”通常的情况是，某人带着一个请求来找数据库管理员，但却遗漏了管理员需要知道的关键细节。管理员需要进行一些调查工作以了解更多信息。无论出于何种原因，数据库系统中的决策往往是一种平衡行为。在天平的一端增加某些东西，另一端就会受到影响，反之亦然。例如，一位应用程序开发人员问：“在这个表上添加索引会提升我的性能吗？”这个回答，可想而知，是“这要看情况。”如果`SELECT`语句使用了该索引，它很可能会更快完成。但天平的另一端是`INSERT`性能，如果在表上创建了过多的索引，性能可能会受到负面影响。即使是回答的前半部分也取决于尚未明确的细节。索引不一定能提升`SELECT`性能。表中的行数以及需要返回的行数是问题中缺失的关键细节。有时，表面上看起来简单的请求，需要进行更多分析才能给出恰当的回答。


    每当给出“这要看情况”的回答时，通常最好提出一些引导性的问题，以帮助给出最佳可能的答案。请求者通常不知道他们需要提供哪些细节才能得到正确的答案。如果请求者知道得足够多，能提供这些细节，他们自己就能回答这个问题了。他们是来向数据库管理员求助的，很多时候，管理员需要手把手地引导他们。如果数据库管理员仍然需要给出“这要看情况”的回答，管理员应该解释其中的权衡取舍，以便请求者能掌握尽可能充分的信息。'
- fmt: '## Know Your Audience


    作为数据库管理员，你是组织内与数据库相关事务的最佳资源。DBA 需要能够与公司许多不同领域的人沟通。成功的 DBA 是能够根据听众调整其词汇的人。你与 CEO
    和 CIO 的谈话方式会不同于与其他 IT 人员的谈话方式，而这又会不同于与其他数据库管理员的谈话方式。例如，如果你与 IT 管理层交谈，并开始抛出像 `buffer
    cache` 或 `shared pool` 这样的术语，你将是在他们理解范围之上说话，他们将无法跟上你。相反，使用术语 `cache`。大多数 IT 管理层理解什么是缓存。当与可能不知道缓存含义的
    CEO 讨论相同主题时，使用术语 `database memory`，他们可能会有更好的理解。然而，如果你在与另一位 Oracle DBA 交谈时使用术语
    `cache`，他们会问“哪一个？” DBA 精通 `shared pool` 和 `buffer cache` 的不同功能，因此你可以更具体。了解你的听众以及如何快速提供他们能够理解的术语将使你成为更有效的沟通者。表
    `2-1` 说明了你如何根据交谈对象改变你的术语。


    表 2-1


    听众数据库术语对照


    | 与 DBA 交谈 | 与 IT 人员交谈 | 与非 IT 人员交谈 |

    | --- | --- | --- |

    | `Buffer cache` | `Cache` | `Database memory` |

    | `View` | `View` | `Stored query` |

    | `Instance` | `Database` | `Database` |

    | `Redo logs` | `Transaction logs` | `Transactions journal` |

    | `Table` | `Table` | `Table` |

    | `Index` | `Index` | `Index` |

    | `Tablespace` | `Data files` | `Database` |


    表 `2-1` 绝对不是一个完整的列表，但它确实让你了解了如何根据听众选择词汇。大多数与数据库交互的人都理解 `table` 或 `index` 的概念，因此无论听众是谁，DBA
    通常都可以使用这些词。然而，作为 DBA，在与非 IT 人员交谈时，你真的需要关注他们的肢体语言。有很多非 IT 人员使用数据库并理解一些基本概念，如表、索引甚至事务。当你与他们交谈时，观察他们对你术语的反应。你可能已经简化了你的用词，但仍然超出了他们的理解范围。如果他们理解
    `table` 这个术语有困难，可以说一些类似这样的话：“`table` 就像 Excel 电子表格中数据按列和行排列的方式。”大多数人都使用过 Excel
    或类似软件，因此就能理解这个概念。如果他们理解事务的概念有困难，给他们举一个从银行账户取款或转账的例子。尽最大努力保持冷静。如果与不了解数据库技术的人交谈时需要额外时间，请不要感到沮丧。分析你是否准确地传达了你的观点，并准备好提供更多的背景信息。准备好成为他们的导师，如果你愿意的话。


    对于像 `shared pool` 这样的 Oracle 内存结构，我们在与其他 Oracle DBA 交谈时会用其名称指代该结构，但对 IT 人员会改为
    `cache`，对非 IT 人员则改为 `database memory`，正如我们已经讨论过的那样。Oracle DBA 在彼此交谈时提到连接到 `instance`，但对其他所有人来说，它就是
    `database`。


    如果听众的技能水平未知，最好从假设他们属于非 IT 类别开始说话。尽可能简化与数据库相关的术语。在你的讨论中，倾听他们说的话。很多时候，他们使用的术语可以提示你需要如何调整你的词汇以适应他们的技能水平并更有效地沟通。在处理数据库服务请求时，DBA
    应做的第一件事是倾听请求的细节。记住，并非每个人都使用与 DBA 相同的术语。不要立即拒绝他们的请求。他们可能不知道如何正确地提出他们的需求，因为他们不懂如何说你的语言。这是粗鲁的
    DBA 需要真正重点关注并加以改进的一个方面。


    ## Moving On


    本章讨论了你在数据库管理职业生涯中应如何工作和与他人互动的不同方面。本章不包含任何技术内容，但当你翻到下一页时，这种情况将会改变。在本章中，我们讨论了不做粗鲁的数据库管理员的重要性，以及当有人向你提交请求时需要进一步调查的必要性。我们讨论了你将会互动的不同人来自不同听众的观点，并且根据听众使用适当的术语是你的责任。我们还阐述了当今的
    DBA 通常需要在不同平台上工作的事实。良好的数据库理论基础可以帮助 DBA 从一个数据库平台导航到另一个。


    在本书中，你将建立一些管理 Oracle 数据库的最佳实践，并更多地了解该产品。在我们开始之前，我们需要一个练习 Oracle 技术的地方。在下一章中，你将在工作站或笔记本电脑上设置一个虚拟机，以便有一个学习和探索的地方。


