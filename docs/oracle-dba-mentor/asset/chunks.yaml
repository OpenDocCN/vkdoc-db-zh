  raw: 'When you are ready, click the Next button. In the old days, that was all there
    was to submitting a service request. With Oracle Support today, you have more
    work to do. For better or worse, you will have to provide more information up
    front. MOS will also be looking at the information you have provided to determine
    if there is a known resolution to the problem. In my case, I am filling out an
    SR for an ORA-600 error, so MOS asks me a question, as shown in Figure [15-15](#467924_1_En_15_Chapter.xhtml#Fig15).


