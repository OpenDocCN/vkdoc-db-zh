- fmt: '# 21. Advanced Options


    In this chapter, we will discuss different advanced options for the Oracle database
    that you may employ in your enterprise architecture. The options exist because
    they extend the functionality of the core database product. In some cases, it
    is possible to engineer similar functionality, and in other cases, it is not possible.


    Most of the options in this chapter require `Oracle Enterprise Edition` and, except
    for `Enterprise Manager`, come with an added cost. Most of these options are not
    part of your regular database license. While they do cost extra money, they can
    be well worth the expenditure if you need their services. As stated above, it
    may be possible to engineer some of the functionality an Oracle option provides,
    without spending actual funds by coding the functionality in your application.
    However, your company will still spend money in the form of labor expenses. Not
    only will you have to develop the functionality, you will have to maintain it
    going forward. If you desire to extend the functionality further, you will incur
    additional development time. Too many organizations that want the functionality
    look at the cost of the Oracle option and then decide to develop their own functionality.
    While this choice looks attractive, they often fail to look at it from a long-term
    perspective. Oracle Corporation is likely to implement the functionality much
    better than a home-grown solution. Lastly, the functionality from these extra
    options is largely application independent. The application may not even know
    or care if the option is in use. If you code your own functionality, you may have
    to deploy it to the next application, which means your functionality now needs
    to be maintained in multiple places. If you use Oracle’s option, you do not maintain
    the feature and it is all in one location, the database.


    Because these features are extra-cost items, Oracle Corporation will examine the
    usage of each with great detail during an Oracle audit. If your company is ever
    audited, Oracle will ask you to run a series of scripts against all databases
    in your enterprise. These scripts will detect if you have ever used the feature
    in your database. All it takes is one time for the audit script to detect the
    usage of that feature. If you are not licensed for that option, you will be in
    breach of your Oracle contract and Oracle Corporation may take legal action.


    If you do want to try out an option, do not use the feature in any of your development,
    test, and production databases. Doing so, even for a simple test, will flip that
    flag Oracle Corporation will find during an audit. Instead, set up a testbed and
    kick the tires on the feature there. After your testing is done, you can destroy
    the testbed. Oracle’s Technology Network license will allow you to test out features
    of the advanced options, but you cannot perform real development work with any
    option until you have paid for the extra option. Put some sample data in your
    testbed and derive a proof of concept for your organization. Kick the tires on
    the feature and see what it will do and what it will not do for your project.
    In the first few chapters of this book, we created our own testbed, so you know
    how to create an area for this type of activity. Do not attempt the examples in
    this chapter in non-testbeds unless you have licensed the option!


    As you read this chapter, do not try to become an expert in each of these options.
    Instead, try to determine what each option is trying to provide for you and your
    enterprise. In the future, you may be working on the design for some new project
    and then remember that an option exists which can help you. At that time, your
    organization can further explore the option and determine if it is worth the extra
    cost.


    ## Diagnostics Pack


    This is the one extra-cost option I cannot live without. The last time I interviewed
    for a job, I asked if they had licensed the `Diagnostics Pack` for their `Oracle`
    infrastructure. If they did not have the option licensed, there is a strong possibility
    I would have turned down any job offer based on that alone. The `Diagnostics Pack`
    is that important to me. Not everyone will agree with me.


    As a senior-level DBA I am often tasked with resolving a number of performance
    issues. The `Diag Pack` is a huge, huge time saver when examining `Oracle` performance.
    While it has an added cost, and you have to license it for all of the databases
    you want to use it on, it is well worth the money. If I did not have this option
    licensed for me, my company would have to hire two or three additional database
    administrators. It saves me that much time. The number of extra employees mentioned
    is probably a conservative estimate.


    The `Diagnostics Pack` is primarily used for database performance activities.
    Many times when I am working on a performance issue, I can determine the root
    cause of the problem within minutes because of the `Diag Pack`. Without it, I
    would spend days finding the bottleneck. If I have to compare bad performance
    today to good performance last month, the `Diag Pack` lets me do this in minutes.
    Without it, I might spend a week completing the comparison. It literally saves
    me that much time.


    The `Diagnostics Pack` consists of the following:


    *   Automatic Database Diagnostic Monitor (`ADDM`)

    *   Active Session History (`ASH`)

    *   Automatic Workload Repository (`AWR`)

    *   `AWR Warehouse`


    The best way to see the `Diag Pack` in action is with `Oracle Enterprise Manager`.
    You can interact with the `Diag Pack` through `SQL` statements, but `EM` does
    this for you and displays usable and informative graphs to help you understand
    at a glance what is going on with the database and its performance. For example,
    if we navigate to a database in `EM`, and then click Performance ➤ Performance
    Home, we can see a chart showing the current activity in the instance, as shown
    in Figure 21-1.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig1_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig1_HTML.png)

    *Figure 21-1 EM Performance chart*


    It’s hard to see in Figure 21-1, but there is a red line at the top of the chart
    denoting this system has 16 CPU cores. When the graph goes above the red line,
    that is an indicator that end users are experiencing poor-performance issues.
    In Figure 21-1, the graph is well below the line. This does not necessarily mean
    that performance is fine, because we may have a few sessions that are having some
    difficulties, but overall, performance should be good for most users.


    On the right side of the chart is a color-coded legend showing classifications
    where user sessions are spending their time. The graph has a predominately green
    color and, from the legend, we can see this represents users spending their time
    processing on the CPU. If we mouse over an item in the legend, it will change
    to a yellow highlight and the corresponding classification in the chart will change
    to match. This can help view some of the classifications that are not easily seen
    in the chart.


    If we click a classification, `EM` will drill down into that area. Because the
    dominant classification is `CPU`, I will drill down into that area. In the graph
    in Figure 21-2, there is a shaded box which can be dragged from side to side.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig2_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig2_HTML.png)

    *Figure 21-2 EM drilldown into CPU usage*'
  raw: '# 21. Advanced Options


    In this chapter, we will discuss different advanced options for the Oracle database
    that you may employ in your enterprise architecture. The options exist because
    they extend the functionality of the core database product. In some cases, it
    is possible to engineer similar functionality, and in other cases, it is not possible.


    Most of the options in this chapter require Oracle Enterprise Edition and, except
    for Enterprise Manager, come with an added cost. Most of these options are not
    part of your regular database license. While they do cost extra money, they can
    be well worth the expenditure if you need their services. As stated above, it
    may be possible to engineer some of the functionality an Oracle option provides,
    without spending actual funds by coding the functionality in your application.
    However, your company will still spend money in the form of labor expenses. Not
    only will you have to develop the functionality, you will have to maintain it
    going forward. If you desire to extend the functionality further, you will incur
    additional development time. Too many organizations that want the functionality
    look at the cost of the Oracle option and then decide to develop their own functionality.
    While this choice looks attractive, they often fail to look at it from a long-term
    perspective. Oracle Corporation is likely to implement the functionality much
    better than a home-grown solution. Lastly, the functionality from these extra
    options is largely application independent. The application may not even know
    or care if the option is in use. If you code your own functionality, you may have
    to deploy it to the next application, which means your functionality now needs
    to be maintained in multiple places. If you use Oracle’s option, you do not maintain
    the feature and it is all in one location, the database.


    Because these features are extra-cost items, Oracle Corporation will examine the
    usage of each with great detail during an Oracle audit. If your company is ever
    audited, Oracle will ask you to run a series of scripts against all databases
    in your enterprise. These scripts will detect if you have ever used the feature
    in your database. All it takes is one time for the audit script to detect the
    usage of that feature. If you are not licensed for that option, you will be in
    breach of your Oracle contract and Oracle Corporation may take legal action.


    If you do want to try out an option, do not use the feature in any of your development,
    test, and production databases. Doing so, even for a simple test, will flip that
    flag Oracle Corporation will find during an audit. Instead, set up a testbed and
    kick the tires on the feature there. After your testing is done, you can destroy
    the testbed. Oracle’s Technology Network license will allow you to test out features
    of the advanced options, but you cannot perform real development work with any
    option until you have paid for the extra option. Put some sample data in your
    testbed and derive a proof of concept for your organization. Kick the tires on
    the feature and see what it will do and what it will not do for your project.
    In the first few chapters of this book, we created our own testbed, so you know
    how to create an area for this type of activity. Do not attempt the examples in
    this chapter in non-testbeds unless you have licensed the option!


    As you read this chapter, do not try to become an expert in each of these options.
    Instead, try to determine what each option is trying to provide for you and your
    enterprise. In the future, you may be working on the design for some new project
    and then remember that an option exists which can help you. At that time, your
    organization can further explore the option and determine if it is worth the extra
    cost.


    ## Diagnostics Pack


    This is the one extra-cost option I cannot live without. The last time I interviewed
    for a job, I asked if they had licensed the Diagnostics Pack for their Oracle
    infrastructure. If they did not have the option licensed, there is a strong possibility
    I would have turned down any job offer based on that alone. The Diagnostics Pack
    is that important to me. Not everyone will agree with me.


    As a senior-level DBA I am often tasked with resolving a number of performance
    issues. The Diag Pack is a huge, huge time saver when examining Oracle performance.
    While it has an added cost, and you have to license it for all of the databases
    you want to use it on, it is well worth the money. If I did not have this option
    licensed for me, my company would have to hire two or three additional database
    administrators. It saves me that much time. The number of extra employees mentioned
    is probably a conservative estimate.


    The Diagnostics Pack is primarily used for database performance activities. Many
    times when I am working on a performance issue, I can determine the root cause
    of the problem within minutes because of the Diag Pack. Without it, I would spend
    days finding the bottleneck. If I have to compare bad performance today to good
    performance last month, the Diag Pack lets me do this in minutes. Without it,
    I might spend a week completing the comparison. It literally saves me that much
    time.


    The Diagnostics Pack consists of the following:


    *   Automatic Database Diagnostic Monitor (ADDM)


    *   Active Session History (ASH)


    *   Automatic Workload Repository (AWR)


    *   AWR Warehouse


    The best way to see the Diag Pack in action is with Oracle Enterprise Manager.
    You can interact with the Diag Pack through SQL statements, but EM does this for
    you and displays usable and informative graphs to help you understand at a glance
    what is going on with the database and its performance. For example, if we navigate
    to a database in EM, and then click Performance ➤ Performance Home, we can see
    a chart showing the current activity in the instance, as shown in Figure [21-1](#467924_1_En_21_Chapter.xhtml#Fig1).


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig1_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig1_HTML.png)


    Figure 21-1


    EM Performance chart


    It’s hard to see in Figure [21-1](#467924_1_En_21_Chapter.xhtml#Fig1), but there
    is a red line at the top of the chart denoting this system has 16 CPU cores. When
    the graph goes above the red line, that is an indicator that end users are experiencing
    poor-performance issues. In Figure [21-1](#467924_1_En_21_Chapter.xhtml#Fig1),
    the graph is well below the line. This does not necessarily mean that performance
    is fine, because we may have a few sessions that are having some difficulties,
    but overall, performance should be good for most users.


    On the right side of the chart is a color-coded legend showing classifications
    where user sessions are spending their time. The graph has a predominately green
    color and, from the legend, we can see this represents users spending their time
    processing on the CPU. If we mouse over an item in the legend, it will change
    to a yellow highlight and the corresponding classification in the chart will change
    to match. This can help view some of the classifications that are not easily seen
    in the chart.


    If we click a classification, EM will drill down into that area. Because the dominant
    classification is CPU, I will drill down into that area. In the graph in Figure
    [21-2](#467924_1_En_21_Chapter.xhtml#Fig2), there is a shaded box which can be
    dragged from side to side.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig2_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig2_HTML.png)


    Figure 21-2


    EM drilldown into CPU usage'
  trans: '

    # 21. 高级选项


    在本章中，我们将探讨 Oracle 数据库中可供您在企业架构中采用的若干高级选项。这些选项之所以存在，是因为它们扩展了核心数据库产品的功能。在某些情况下，可以自行设计实现类似功能；而在另一些情况下，则无法实现。


    本章讨论的大多数选项都要求使用 `Oracle 企业版`，并且除 `Enterprise Manager` 外，通常需要额外付费。这些选项大多不包含在常规数据库许可证中。虽然它们需要额外支出，但如果您需要其服务，这些花费通常是值得的。如上所述，通过自行编码在应用程序中实现
    Oracle 选项提供的某些功能，可能无需实际资金投入。然而，公司仍需承担人工成本。您不仅需要开发该功能，未来还需持续维护。若希望进一步扩展功能，还会产生额外的开发时间。许多渴望获得此类功能的组织，在看到
    Oracle 选项的成本后，便决定自行开发功能。尽管这个选择看似诱人，但他们往往未能从长远角度考虑。Oracle 公司实现的功能很可能远优于自研解决方案。最后，这些额外选项提供的功能在很大程度上与应用程序无关。应用程序甚至可能不知道或不关心该选项是否在使用中。如果您自行编码实现功能，可能需要将其部署到下一个应用程序中，这意味着您的功能现在需要在多个地方进行维护。如果您使用
    Oracle 的选项，则无需自行维护该功能，它全部集中在一个地方——数据库。


    由于这些功能是额外付费项目，Oracle 公司会在审计期间详细检查每个功能的使用情况。如果您的公司接受审计，Oracle 会要求您对企业的所有数据库运行一系列脚本。这些脚本将检测您是否曾在数据库中使用过该功能。只要有一次使用记录，审计脚本就能检测到该功能的使用。如果您没有该选项的许可证，您将违反
    Oracle 合同，Oracle 公司可能会采取法律行动。


    如果您确实想试用某个选项，请勿在您的任何开发、测试或生产数据库中使用该功能。即使只是进行简单测试，这样做也会触发 Oracle 公司在审计时能够发现的标记。相反，应搭建一个测试环境，在那里试用该功能。测试完成后，您可以销毁该测试环境。Oracle
    的技术网络许可证允许您测试高级选项的功能，但在您支付额外费用之前，无法使用任何选项进行实际开发工作。在您的测试环境中放入一些样本数据，为您的组织推导出一个概念验证。试用该功能，看看它能为您的项目做什么，不能做什么。在本书的前几章中，我们创建了自己的测试环境，因此您知道如何为这类活动创建一个区域。除非您已获得该选项的许可证，否则请勿在非测试环境中尝试本章的示例！


    阅读本章时，不要试图成为每个选项的专家。相反，尝试理解每个选项旨在为您和您的企业提供的价值。未来，当您参与某个新项目的设计时，可能会想起存在一个可以提供帮助的选项。届时，您的组织可以进一步探索该选项，并判断其是否值得额外成本。


    ## 诊断包


    这是我无法割舍的一项额外付费选项。上次我参加工作面试时，我询问了他们是否为其 `Oracle` 基础设施获得了 `诊断包` 的许可。如果他们没有许可该选项，我很有可能会因此拒绝任何工作邀请。`诊断包`
    对我来说就是如此重要。并非所有人都会同意我的看法。


    作为一名高级 DBA，我经常需要解决许多性能问题。在检查 `Oracle` 性能时，`诊断包` 是一个巨大的时间节省工具。虽然它需要额外成本，并且必须为您希望使用的所有数据库获取许可证，但这笔钱非常值得。如果我没有获得此选项的许可，我的公司将不得不额外雇佣两到三名数据库管理员。它为我节省的时间就是这么多。提到的额外员工数量可能还是保守估计。


    `诊断包` 主要用于数据库性能活动。很多时候，当我在处理性能问题时，借助 `诊断包`，我可以在几分钟内确定问题的根本原因。没有它，我可能需要花费数天时间来寻找瓶颈。如果需要将当前的糟糕性能与上个月的良好性能进行比较，`诊断包`
    让我可以在几分钟内完成。没有它，我可能需要花费一周时间来完成比较。它确实为我节省了这么多时间。


    `诊断包` 包含以下内容：


    *   自动数据库诊断监视器 (`ADDM`)

    *   活动会话历史 (`ASH`)

    *   自动工作量仓储 (`AWR`)

    *   `AWR 仓储`


    通过 `Oracle Enterprise Manager` 来体验 `诊断包` 是最佳方式。您可以通过 `SQL` 语句与 `诊断包` 交互，但 `EM`
    会为您完成这项工作，并显示有用且信息丰富的图表，帮助您一目了然地了解数据库及其性能的状况。例如，如果我们在 `EM` 中导航到一个数据库，然后点击 性能 ➤
    性能主页，我们可以看到一张显示当前实例活动的图表，如图 21-1 所示。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig1_HTML.png](img/467924_1_En_21_Fig1_HTML.png)

    *图 21-1 EM 性能图表*


    在图 21-1 中可能看不清楚，但图表顶部有一条红线，表示该系统有 16 个 CPU 核心。当图表超过红线时，表明最终用户正在经历性能不佳的问题。在图 21-1
    中，图表远低于该线。这并不一定意味着性能良好，因为可能有少数会话遇到困难，但对于大多数用户而言，整体性能应该是良好的。


    图表右侧有一个颜色编码的图例，显示了用户会话花费时间的分类。图表主要呈现绿色，从图例中我们可以看到这代表用户在 CPU 上进行处理所花费的时间。如果我们将鼠标悬停在图例中的某个项目上，它会变为黄色高亮显示，图表中相应的分类也会相应改变。这有助于查看图表中不易看到的一些分类。


    如果我们点击某个分类，`EM` 会深入探究该领域。由于主导分类是 `CPU`，我将深入探究该领域。在图 21-2 的图表中，有一个可以左右拖动的阴影框。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig2_HTML.png](img/467924_1_En_21_Fig2_HTML.png)

    *图 21-2 EM 下钻到 CPU 使用情况*

    '
- fmt: '# 使用 Enterprise Manager 和 Diagnostics Pack 进行性能诊断


    我们可以从图[21-2](#467924_1_En_21_Chapter.xhtml#Fig2)中看到，CPU利用率有几个尖峰。如果我们将阴影框拖到其中一个尖峰上，`Top
    Working SQL`和`Top Working Sessions`会相应更新。在这个案例中，我们看到在该阴影框所代表的时间段内，来自一个用户的单个SQL语句占用了超过90%的CPU。如果我是在处理一个用户抱怨性能差的问题，第一个图表可能不会提供太多信息。通过深入分析CPU利用率，我能够看到一个用户确实使用了大量CPU，并且很可能很快找到了根本原因。请注意，我遮盖了用户名称和程序列，以隐藏可能的专有信息。


    `SQL ID`和`Session ID`列包含超链接。我可以快速深入查看会话的详细信息，甚至是SQL语句。在图[21-3](#467924_1_En_21_Chapter.xhtml#Fig3)中，我点击了SQL语句以查看它为何使用如此多的CPU。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig3_HTML.jpg](images/467924_1_En_21_Chapter/467924_1_En_21_Fig3_HTML.jpg)


    图 21-3


    EM SQL 详细信息执行计划


    通过深入查看SQL语句，我可以看到确切的SQL文本。我点击了`Plan`选项卡，并从图形化的执行计划切换到了表格形式。我看到正在执行一个`Full Table
    Access`步骤。这看起来不太对，于是我点击了`Statistics`选项卡，如图[21-4](#467924_1_En_21_Chapter.xhtml#Fig4)所示。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig4_HTML.jpg](images/467924_1_En_21_Chapter/467924_1_En_21_Fig4_HTML.jpg)


    图 21-4


    EM SQL 详细信息统计信息


    我从该SQL语句的统计信息中看到，该SQL已被执行了19,974次。它产生了超过1.36亿次的缓冲区读取。这意味着用户会话从`Buffer Cache`中读取了数据超过1.36亿次。从`Buffer
    Cache`读取需要CPU。如果我查看`Per Execution`列，可以看到这个SQL语句每次执行需要6,842次缓冲区读取。进一步查看该列，我看到这个SQL语句每次执行只返回一行。作为数据库管理员，我知道数据库的块大小是8,192字节。将缓冲区读取次数乘以块大小，`8,192
    × 6,842`，表明仅仅为了返回一行数据，就需要从缓存中读取超过50MB的数据！对于训练有素的Oracle性能专家来说，很容易诊断出执行全表扫描导致了性能问题。如果我能利用索引来加速查询，就可以显著减少CPU时间，同时为其他用户释放CPU资源。


    这个问题的解决很好地说明了为什么`Diagnostics Pack`非常有价值。只需点击几下鼠标，我就能深入下去，找出问题查询并确定它为何表现如此糟糕。如果没有通过`Enterprise
    Manager`提供的`Diag Pack`的这种能力，我就需要手动运行多个脚本，计算和解释结果，然后再弄清楚需要运行哪些脚本来引导我进一步深入。`EM`和`Diag
    Pack`使这个过程快得多。


    `Enterprise Manager`中另一个有用的视图是选择 `Performance ➤ SQL Monitoring`。在图[21-5](#467924_1_En_21_Chapter.xhtml#Fig5)中，我点击了`Database
    Time`列，按降序对SQL语句进行排序，以便查看运行时间最长的SQL语句。再次说明，我在图中遮盖了敏感信息。我想展示真实的生产性能，这意味着专有信息需要被隐藏。后续的图形也因同样原因有被遮盖的部分。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig5_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig5_HTML.png)


    图 21-5


    EM SQL 监控


    在图[21-5](#467924_1_En_21_Chapter.xhtml#Fig5)中，我们可以看到顶部的一个SQL语句显示的`Database Time`远大于其他语句。虽然还没有人抱怨性能问题，但我们可能想花几分钟看看是否能主动处理。顺便说一句，数据库管理员应该寻找机会，在系统管理上更具主动性。在最终用户抱怨之前解决问题。


    点击这个SQL语句的`ID`，会带我们查看关于该SQL语句的更多详细信息，如图[21-6](#467924_1_En_21_Chapter.xhtml#Fig6)所示。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig6_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig6_HTML.png)


    图 21-6


    EM SQL 计划统计信息选项卡


    如果我们查看该列的`Plan Statistics`选项卡，`Activity %`列中的条形图可以很好地指示这个SQL语句的时间花费在哪里。在这个案例中，该SQL语句98%的活动是用于通过索引访问一个表。也许在这个案例中，要么是使用的索引不对，要么是全表扫描会更高效。


    我们将捕获这些信息，并弄清楚需要多少工作量才能使这个SQL语句更高效。只需在`EM`中点击几下，利用`Diag Pack`，我们就能够快速发现一个潜在问题并主动解决它。


    `Diagnostics Pack`还包括`Automatic Database Diagnostic Monitor`，即`ADDM`。`ADDM`会查看一段时间内（通常是一小时）的整体数据库性能，并就如何提高性能提出建议。需要注意的是，`ADDM`是自动完成这些工作的，我们不需要进行设置。


    如果我们查看一个性能图表，`EM`会在图表下方显示一个小剪贴板图标，在图[21-7](#467924_1_En_21_Chapter.xhtml#Fig7)中已圈出。我们可以点击该图标查看`ADDM`运行的结果。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig7_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig7_HTML.png)


    图 21-7


    EM ADDM 运行图标


    点击此图标将带我们进入`EM`中的`ADDM`部分。我们可以看到一个图表，显示了过去24小时的`ADDM`运行情况。现在我们看到了多个剪贴板。在图[21-8](#467924_1_En_21_Chapter.xhtml#Fig8)中，我点击了图表中活动峰值最大处下方的图标。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig8_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig8_HTML.png)


    图 21-8


    EM ADDM 屏幕


    当我们点击其中一个图标查看`ADDM`结果时，图表下方的信息会相应改变。在点击图[21-8](#467924_1_En_21_Chapter.xhtml#Fig8)中最大峰值下的剪贴板图标后，`ADDM`呈现了图[21-9](#467924_1_En_21_Chapter.xhtml#Fig9)所示的发现结果。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig9_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig9_HTML.png)


    图 21-9


    ADDM 性能分析


    我们可以看到，`ADDM`已确定在此期间，顶级SQL语句对整体数据库性能的影响占了40%。如果我们点击`Finding`列中的链接，就可以深入查看这些顶级SQL语句，如图[21-10](#467924_1_En_21_Chapter.xhtml#Fig10)所示。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig10_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig10_HTML.png)


    图 21-10


    ADDM 顶级 SQL 语句建议


    `ADDM`发现了五个SQL语句。所有语句似乎都有相似的影响。我们可以点击`Schedule SQL Tuning Advisor`按钮，让Oracle就如何调整该SQL语句提供建议。点击此按钮需要获得可选的`Tuning
    Pack`许可，这将在下一节讨论。'
  raw: 'We can see from Figure [21-2](#467924_1_En_21_Chapter.xhtml#Fig2) that there
    are a few spikes in CPU utilization. If we were to drag the shaded box over one
    of those spikes, the Top Working SQL and Top Working Sessions would be updated
    to match. In this case, we can see one SQL statement from one user is taking up
    over 90% of the CPU during the time period represented by that shaded box. If
    I was working on an issue where a user called complaining of poor performance,
    the first chart would not have yielded much information. By drilling down in the
    CPU utilization, I was able to see that one user does appear to be using large
    amounts of CPU, and it is likely that I have very quickly found the root cause.
    Note that I blacked out the User Name and Program columns to obscure potentially
    proprietary information.


    The SQL ID and Session ID columns contain hyperlinks. I can drill down quickly
    into the session’s details and even the SQL statement. In Figure [21-3](#467924_1_En_21_Chapter.xhtml#Fig3),
    I clicked the SQL statement to see why this was using so much CPU.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig3_HTML.jpg](images/467924_1_En_21_Chapter/467924_1_En_21_Fig3_HTML.jpg)


    Figure 21-3


    EM SQL details execution plan


    By drilling down into the SQL statement, I can see the exact SQL text. I clicked
    the Plan tab and changed from a graphical execution plan to a tabular one. I can
    see a Full Table Access step being performed. That doesn’t seem right, so I click
    the Statistics tab, as shown in Figure [21-4](#467924_1_En_21_Chapter.xhtml#Fig4).


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig4_HTML.jpg](images/467924_1_En_21_Chapter/467924_1_En_21_Fig4_HTML.jpg)


    Figure 21-4


    EM SQL details statistics


    I can see from the statistics on this SQL statement that the SQL has been executed
    19,974 times. It has generated over 136 million buffer gets. This means user sessions
    have read the data from the Buffer Cache over 136 million times. Reading from
    the Buffer Cache requires CPU. If I look in the Per Execution column, I can see
    that this SQL statement requires 6,842 buffer gets per execution. Looking further
    in that column, I can see that this SQL statement is returning one row per execution.
    As the database administrator, I know that the block size for the database is
    8,192 bytes. Multiplying the number of buffer gets by the block size, 8,192 `×`
    6,842, indicates that over 50MB of data is being read from the cache just to return
    one row! To a trained Oracle performance specialist, it is easy to diagnose that performing
    a full table scan is leading to the performance problem. If I could leverage an
    index to speed up the query, I could reduce the CPU time significantly, freeing
    up CPU resources for other users as well.


    This problem resolution is a good example of why the Diagnostics Pack is very
    valuable. With a few clicks of my mouse, I was able to drill down and spot the
    problem query and determine why it was performing so terribly. Without this ability
    from the Diag Pack via Enterprise Manager, I would have needed to run multiple
    scripts by hand, calculate and interpret the results, and then figure out which
    scripts to run to lead me further down the path. EM and the Diag Pack made this
    process much quicker.


    Another useful view in Enterprise Manager is to select Performance ➤ SQL Monitoring.
    In Figure [21-5](#467924_1_En_21_Chapter.xhtml#Fig5), I clicked the Database Time
    column to sort the SQL statements in descending order so that I could view the
    longest-running SQL statements. Again, I blacked out sensitive information in
    the figure. I wanted to show real-life production performance, which meant proprietary
    information needed to be obscured. Subsequent figures also have blacked-out portions
    for that reason.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig5_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig5_HTML.png)


    Figure 21-5


    EM SQL Monitoring


    In Figure [21-5](#467924_1_En_21_Chapter.xhtml#Fig5), we can see that one SQL
    statement at the top is showing Database Time much larger than the rest. While
    no one has complained of a performance issue, we might want to spend just a few
    minutes and see if we can be proactive. As an aside, the database administrator
    should find opportunities to be more proactive with administration of their systems.
    Resolve problems before end users complain.


    Clicking the ID for this SQL statement takes us to more details about this SQL
    statement, shown in Figure [21-6](#467924_1_En_21_Chapter.xhtml#Fig6).


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig6_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig6_HTML.png)


    Figure 21-6


    EM SQL Plan Statistics tab


    If we look at the Plan Statistics tab for this column, the bar charts in the Activity
    % column can be a good indicator of where this SQL statement is spending its time.
    In this case, 98% of the activity for this SQL statement was spent accessing a
    table using an index. Maybe in this case either the index is the wrong one to
    use or a full table scan would be more efficient.


    We will capture this information and figure out how much effort is needed to make
    this SQL statement more efficient. With just a few clicks in EM, leveraging the
    Diag Pack, we were able to quickly spot a potential issue and proactively address
    the problem.


    The Diagnostics Pack also includes the Automatic Database Diagnostic Monitor,
    ADDM. ADDM will take a look at overall database performance for a period of time,
    usually an hour, and make recommendations on how to improve performance. It should
    be noted that ADDM does this automatically. We do not have to set it up.


    If we look at a performance chart, EM will show a little clipboard icon below
    the graph, circled in Figure [21-7](#467924_1_En_21_Chapter.xhtml#Fig7). We can
    click that icon to see the results from an ADDM run.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig7_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig7_HTML.png)


    Figure 21-7


    EM ADDM run icon


    Clicking this icon will take us to the ADDM section in EM. We can see a chart
    showing the ADDM runs in the past 24 hours. We now see multiple clipboards. In
    Figure [21-8](#467924_1_En_21_Chapter.xhtml#Fig8), I clicked the icon under the
    largest peak of activity in the graph.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig8_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig8_HTML.png)


    Figure 21-8


    EM ADDM screen


    When we click one of the icons to see ADDM results, the information below the
    chart changes to match. After clicking the clipboard icon under the largest peak
    in Figure [21-8](#467924_1_En_21_Chapter.xhtml#Fig8), ADDM presented the findings
    shown in Figure [21-9](#467924_1_En_21_Chapter.xhtml#Fig9).


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig9_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig9_HTML.png)


    Figure 21-9


    ADDM Performance Analysis


    We can see that ADDM has determined that top SQL statements contributed 40% to
    the impact of overall database performance during this period. If we click the
    link in the Finding column, we can drill down into the top SQL statements, as
    shown in Figure [21-10](#467924_1_En_21_Chapter.xhtml#Fig10).


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig10_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig10_HTML.png)


    Figure 21-10


    ADDM top SQL statement recommendations


    ADDM found five SQL statements. All seem to have similar impact. We can click
    the Schedule SQL Tuning Advisor button to have Oracle give us recommendations
    on how to tune the SQL statement if we choose. Clicking this button requires the
    optional Tuning Pack to be licensed, which is discussed in the next section.'
  trans: '# 使用 Enterprise Manager 和 Diagnostics Pack 进行性能诊断


    我们可以从图 21-2 中看到，CPU 利用率有几个尖峰。如果我们将阴影框拖到其中一个尖峰上，`Top Working SQL`和`Top Working
    Sessions`会相应更新。在这个案例中，我们看到在该阴影框所代表的时间段内，来自一个用户的单个 SQL 语句占用了超过 90%的 CPU。如果我是在处理一个用户抱怨性能差的问题，第一个图表可能不会提供太多信息。通过深入分析
    CPU 利用率，我能够看到一个用户确实使用了大量 CPU，并且很可能很快找到了根本原因。请注意，我遮盖了用户名称和程序列，以隐藏可能的专有信息。


    `SQL ID`和`Session ID`列包含超链接。我可以快速深入查看会话的详细信息，甚至是 SQL 语句。在图 21-3 中，我点击了 SQL 语句以查看它为何使用如此多的
    CPU。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig3_HTML.jpg](img/467924_1_En_21_Fig3_HTML.jpg)


    图 21-3


    EM SQL 详细信息执行计划


    通过深入查看 SQL 语句，我可以看到确切的 SQL 文本。我点击了`Plan`选项卡，并从图形化的执行计划切换到了表格形式。我看到正在执行一个`Full
    Table Access`步骤。这看起来不太对，于是我点击了`Statistics`选项卡，如图 21-4 所示。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig4_HTML.jpg](img/467924_1_En_21_Fig4_HTML.jpg)


    图 21-4


    EM SQL 详细信息统计信息


    我从该 SQL 语句的统计信息中看到，该 SQL 已被执行了 19,974 次。它产生了超过 1.36 亿次的缓冲区读取。这意味着用户会话从`Buffer
    Cache`中读取了数据超过 1.36 亿次。从`Buffer Cache`读取需要 CPU。如果我查看`Per Execution`列，可以看到这个 SQL
    语句每次执行需要 6,842 次缓冲区读取。进一步查看该列，我看到这个 SQL 语句每次执行只返回一行。作为数据库管理员，我知道数据库的块大小是 8,192
    字节。将缓冲区读取次数乘以块大小，`8,192 × 6,842`，表明仅仅为了返回一行数据，就需要从缓存中读取超过 50MB 的数据！对于训练有素的 Oracle
    性能专家来说，很容易诊断出执行全表扫描导致了性能问题。如果我能利用索引来加速查询，就可以显著减少 CPU 时间，同时为其他用户释放 CPU 资源。


    这个问题的解决很好地说明了为什么`Diagnostics Pack`非常有价值。只需点击几下鼠标，我就能深入下去，找出问题查询并确定它为何表现如此糟糕。如果没有通过`Enterprise
    Manager`提供的`Diag Pack`的这种能力，我就需要手动运行多个脚本，计算和解释结果，然后再弄清楚需要运行哪些脚本来引导我进一步深入。`EM`和`Diag
    Pack`使这个过程快得多。


    `Enterprise Manager`中另一个有用的视图是选择 `Performance ➤ SQL Monitoring`。在图 21-5 中，我点击了`Database
    Time`列，按降序对 SQL 语句进行排序，以便查看运行时间最长的 SQL 语句。再次说明，我在图中遮盖了敏感信息。我想展示真实的生产性能，这意味着专有信息需要被隐藏。后续的图形也因同样原因有被遮盖的部分。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig5_HTML.png](img/467924_1_En_21_Fig5_HTML.png)


    图 21-5


    EM SQL 监控


    在图 21-5 中，我们可以看到顶部的一个 SQL 语句显示的`Database Time`远大于其他语句。虽然还没有人抱怨性能问题，但我们可能想花几分钟看看是否能主动处理。顺便说一句，数据库管理员应该寻找机会，在系统管理上更具主动性。在最终用户抱怨之前解决问题。


    点击这个 SQL 语句的`ID`，会带我们查看关于该 SQL 语句的更多详细信息，如图 21-6 所示。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig6_HTML.png](img/467924_1_En_21_Fig6_HTML.png)


    图 21-6


    EM SQL 计划统计信息选项卡


    如果我们查看该列的`Plan Statistics`选项卡，`Activity %`列中的条形图可以很好地指示这个 SQL 语句的时间花费在哪里。在这个案例中，该
    SQL 语句 98%的活动是用于通过索引访问一个表。也许在这个案例中，要么是使用的索引不对，要么是全表扫描会更高效。


    我们将捕获这些信息，并弄清楚需要多少工作量才能使这个 SQL 语句更高效。只需在`EM`中点击几下，利用`Diag Pack`，我们就能够快速发现一个潜在问题并主动解决它。


    `Diagnostics Pack`还包括`Automatic Database Diagnostic Monitor`，即`ADDM`。`ADDM`会查看一段时间内（通常是一小时）的整体数据库性能，并就如何提高性能提出建议。需要注意的是，`ADDM`是自动完成这些工作的，我们不需要进行设置。


    如果我们查看一个性能图表，`EM`会在图表下方显示一个小剪贴板图标，在图 21-7 中已圈出。我们可以点击该图标查看`ADDM`运行的结果。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig7_HTML.png](img/467924_1_En_21_Fig7_HTML.png)


    图 21-7


    EM ADDM 运行图标


    点击此图标将带我们进入`EM`中的`ADDM`部分。我们可以看到一个图表，显示了过去 24 小时的`ADDM`运行情况。现在我们看到了多个剪贴板。在图 21-8
    中，我点击了图表中活动峰值最大处下方的图标。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig8_HTML.png](img/467924_1_En_21_Fig8_HTML.png)


    图 21-8


    EM ADDM 屏幕


    当我们点击其中一个图标查看`ADDM`结果时，图表下方的信息会相应改变。在点击图 21-8 中最大峰值下的剪贴板图标后，`ADDM`呈现了图 21-9 所示的发现结果。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig9_HTML.png](img/467924_1_En_21_Fig9_HTML.png)


    图 21-9


    ADDM 性能分析


    我们可以看到，`ADDM`已确定在此期间，顶级 SQL 语句对整体数据库性能的影响占了 40%。如果我们点击`Finding`列中的链接，就可以深入查看这些顶级
    SQL 语句，如图 21-10 所示。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig10_HTML.png](img/467924_1_En_21_Fig10_HTML.png)


    图 21-10


    ADDM 顶级 SQL 语句建议


    `ADDM`发现了五个 SQL 语句。所有语句似乎都有相似的影响。我们可以点击`Schedule SQL Tuning Advisor`按钮，让 Oracle
    就如何调整该 SQL 语句提供建议。点击此按钮需要获得可选的`Tuning Pack`许可，这将在下一节讨论。'
- fmt: 'I should make one note about advisor recommendations in general, such as what
    you will see in the `ADDM` findings. The advisors always make a recommendation.
    I have yet to see one that says “everything is fine so change nothing.” If you
    are constantly looking at advisor results, you will constantly be making changes
    and, in return, spending a great deal of time in one area. I once had an advisor
    say to make a change, which I did. The next run of the advisor said essentially
    to change it back. Which I did. You can probably guess that the next advisor run
    wanted the first change again. I would have been stuck in an endless loop if I
    continued to follow the advice. Take `advisor` and other `expert system` recommendations
    with a grain of salt. Know when to stop and move on to other `DBA` tasks.


    So far, we have seen the `Diagnostics Pack` in action to quickly drill down to
    a singular session or SQL statement experiencing performance issues. The `Diag
    Pack` also includes the `Automatic Workload Repository (AWR)` to capture information
    at the instance level. The `AWR` is often useful when we want to get a detailed
    analysis of the instance’s performance. Out of the box, the `AWR` takes a snapshot
    of instance performance once per hour, but you can manually capture a snapshot
    on demand. Many of the metrics will be indicators of the activity since instance
    startup. For example, there is a metric tracking the total number of disk reads
    since instance startup. All of this metric collection occurs automatically. The
    data is stored in the `SYSAUX` tablespace and retained for 30 days unless you
    modify the retention period.


    When the database administrator wants to look at overall performance, they will
    run an `AWR` report. The `AWR` reports asks for a beginning and ending snapshot.
    The report then calculates the differences and uses the time interval to generate
    averages. For example, in the case of disk reads, the `AWR` report will subtract
    the number of disk reads in the beginning snapshot from the number in the ending
    snapshot and obtain the total number of disk reads over that interval. If the
    snapshots were taken 60 minutes apart, the `AWR` report will divide the total
    disk reads by 3,600 to obtain an average number of disk reads per second for that
    report period.


    To generate an `AWR` report, you can run the `$ORACLE_HOME/rdbms/admin/awrreport.sql`
    script in `SQL*Plus`, or you can navigate to `Performance ➤ AWR ➤ AWR Report`
    in `Enterprise Manager`, as shown in Figure [21-11](#467924_1_En_21_Chapter.xhtml#Fig11).


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig11_HTML.jpg](images/467924_1_En_21_Chapter/467924_1_En_21_Fig11_HTML.jpg)


    Figure 21-11


    Specifying `AWR` report parameters


    In the example in Figure [21-11](#467924_1_En_21_Chapter.xhtml#Fig11), I selected
    the `By Snapshot` option. I clicked the magnifying glass icon to bring up a list
    of snapshots and chose two of them for my report period. Then I clicked the `Generate
    Report` button. After a few minutes, the report shown if Figure [21-12](#467924_1_En_21_Chapter.xhtml#Fig12)
    was displayed in the browser. The first part of the report contains some introductory
    information such as hostname, database version, etc.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig12_HTML.jpg](images/467924_1_En_21_Chapter/467924_1_En_21_Fig12_HTML.jpg)


    Figure 21-12


    Example `AWR` report


    If you have licensed the `Diag Pack`, you can view the pages of information found
    in the `AWR` report. Learning how to leverage the `AWR` report is the subject
    of another book. I would start by reading the `Oracle Database Performance Tuning
    Guide` if you want more information.


    If you do not have the license for the `Diag Pack`, you can use `Statspack` to
    mimic the functionality. `Statspack` is the predecessor to the `Diag Pack`. With
    `Statspack`, you run some scripts to set it up. You then have to schedule a job
    to perform the data collection. `Statspack` comes with your license, so there
    is no additional cost, but it is no longer being developed as new features come
    with new versions. Oracle saves their development effort at extending `AWR`, not
    `Statspack`.


    One of the downsides of the `AWR` is that the repository keeps the data for 30
    days and then it is automatically purged. You can change the retention period,
    but then your `AWR` disk usage will grow, and we normally do not want that in
    a production system. Oracle has provided the ability to automatically migrate
    `AWR` data to an `AWR Warehouse`. If you have licensed the `Diag Pack`, you can
    enjoy the `AWR Warehouse`. In `Enterprise Manager`, click `Performance ➤ AWR ➤
    AWR Warehouse` and follow the directions to set it up. You will need to create
    another Oracle database, and this should not be on the same server as your production
    databases. The `AWR Warehouse` configuration is shown in Figure [21-13](#467924_1_En_21_Chapter.xhtml#Fig13).
    We can see that it was created by me, its database version is 12.1.0.2, and 75%
    of the disk space is currently used.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig13_HTML.jpg](images/467924_1_En_21_Chapter/467924_1_En_21_Fig13_HTML.jpg)


    Figure 21-13


    `AWR Warehouse` configuration


    Figure [21-14](#467924_1_En_21_Chapter.xhtml#Fig14) shows that three databases
    hold data in the `AWR Warehouse`, totaling 105GB of disk space.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig14_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig14_HTML.png)


    Figure 21-14


    `AWR Warehouse` details


    The best use of the `AWR Warehouse` is to be able to compare performance today
    with performance quite a while ago. In my `AWR Warehouse`, I have defined the
    retention period to be two years. How long you keep data in your warehouse depends
    on your business cycle. My business experiences ebbs and flows with the calendar.
    I wanted to be able to compare over slightly more than one year ago, so I chose
    a two-year retention period. Once the warehouse is created, I can then create
    an `AWR` report that shows the differences between two periods. The most common
    place for me to use this is when trying to correlate performance after an upgrade
    of the database or the application to the same period the year before.'
