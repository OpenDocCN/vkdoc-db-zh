    ### 提示


    请阅读`管理员指南`！它至关重要，不容错过！


    再次强调，这本书非常重要，你不会只想记住其中的内容。你需要花时间消化书中呈现的信息，并尽可能多地学习。


    `管理员指南`包含六个主要部分：


    *   第一部分，“基础数据库管理”，涵盖了如何创建和管理 Oracle 数据库，包括启动/关闭以及我们之前在本书中讨论的许多内容。

    *   第二部分，“Oracle 数据库结构与存储”，涵盖了如何管理控制文件、数据文件、临时文件、重做日志和撤销（undo）。

    *   第三部分，“模式对象”，涵盖了如何管理表、索引、视图等。

    *   第四部分，“数据库资源管理与任务调度”，涵盖了如何利用资源管理器确保重要用户不被次要用户挤占资源，以及如何调度数据库作业。

    *   第五部分，“分布式数据库管理”，涵盖了如何执行跨多个数据库的事务。如果你没有分布式数据库，可以跳读本节。

    *   第六部分，“管理只读物化视图”，涵盖了如何使用可能提升应用性能的物化视图。你也可以选择跳读本节。


    本书的前四部分对于你成为一名成功的 Oracle DBA 至关重要。最后两部分可以浏览一下。你可能永远用不到那些章节里的信息，但如果用到，你会知道去哪里查找。


    ## 性能调优指南


    在你的数据库管理职业生涯中，让任何数据库引擎达到最佳性能迟早会成为一个关注焦点。数据库是用户交互的核心。用户希望访问数据，并且希望访问速度要快。每个 DBA
    都会接到性能糟糕的报告，而诊断问题的根本原因并将性能恢复到可接受的水平，正是 DBA 的职责所在。


    关于性能调优这个话题，可以写、也已经写了太多内容。在我职业生涯早期，Oracle 对性能调优的文档记录并不完善，但现在`数据库性能调优指南`已成为所有 Oracle
    DBA 的必读之物。性能调优是一个宏大的主题，要精通它需要付出大量努力。从这份指南开始，然后再寻找其他资料。


    `性能调优指南`分为四个部分：


    *   第一部分，“数据库性能基础”，涵盖了开始你的性能调优工作所需的基础知识。

    *   第二部分，“诊断与调优数据库性能”，涵盖了如何衡量现有性能并收集有关性能问题的信息。

    *   第三部分，“调优数据库内存”，涵盖了如何为 Oracle 实例调整内存大小以获得最佳性能。

    *   第四部分，“管理系统资源”，涵盖了如何优化系统配置以实现最佳性能。


    如果你是一名初级 DBA，那么可以先浏览这份指南，感受一下它的内容。随着你在职业生涯中不断进步，技能不断提升，你很可能会被分配更多的性能调优案例，并且会越来越深入地研究这本书。


    ## 错误消息


    `Oracle 数据库错误消息`在传统意义上并不是一本供你阅读的书。更准确地说，它是一本参考书，包含了你可能遇到的所有有文档记录的 Oracle 错误消息列表。你需要在这里学习的是，当你遇到不理解的错误消息时，如何查阅本书。例如，如果你看到`ORA-00020`错误，你可以在书中找到它，并看到如图
    13-8 所示的描述（或类似描述）。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig8_HTML.jpg](img/467924_1_En_13_Fig8_HTML.jpg)


    图 13-8：错误消息示例


    书中所有的错误消息都包含“原因”和“操作”两个部分。很多时候，仅凭错误消息本身可能不足以说明问题，这种情况下，“原因”和“操作”部分通常能帮助你理清问题并解决问题。遗憾的是，有些“原因”和“操作”部分是空白的。


    ## 备份与恢复


    在第 7 章，我们讨论了备份与恢复的主题。在那一章，我指引你阅读`备份与恢复用户指南`。希望你已经花时间至少浏览过它。由于我们已经比较深入地介绍过那本书，本章将不再花时间讨论它。


    第 7 章还提到了另一本需要查阅的书，即`数据库备份与恢复参考手册`。当你在书名中看到“参考手册”一词时，意味着该书详细列出了该主题的每一个选项。例如，虽然`备份与恢复用户指南`向你展示了如何使用恢复管理器（`RMAN`）来备份和恢复数据库，包括使用`BACKUP`、`RECOVER`和`RESTORE`命令的示例，但这些命令远不止指南中所展示的那些。每个命令都有许多选项，而指南只展示了这些命令最常用的选项。另一方面，`备份与恢复参考手册`则详细介绍了每个命令选项。如果你想了解这些命令的每一个细节，可以查阅这本参考手册。它不仅告诉你关于每个命令你需要知道的一切，还包含语法图，以便你能正确构建命令。很多时候，我把命令选项放错了顺序或错误地定义了命令。如果我去查这本参考手册，就能准确地看到如何构建我的命令并避免错误。花些时间浏览这本参考手册，以便了解它的内容。


    ## SQL 语言参考手册


    与 Oracle 数据库交互的唯一方式是向其发送 SQL 命令。每一条 SQL 命令都在`Oracle 数据库 SQL 语言参考手册`中有详细记录。例如，看看你能否在这本书里找到`CREATE
    ROLE`命令。（提示：SQL 语句按字母顺序排列在第 10 章到第 19 章。）你首先会看到的是“用途”部分，描述了该命令的用途。“先决条件”部分描述了你成功执行该命令之前需要满足的条件。在这个例子中，你需要`CREATE
    ROLE`系统权限。“语法”部分的图示展示了如何正确构建语句。“语义”部分随后深入讨论了该命令的每个选项。最后，“示例”部分提供了一些不同选项的示例，以说明命令的工作原理。


    除了这本参考手册中记录的各种 SQL 命令外，书中还讨论了 Oracle 提供的默认数据类型和函数。还讨论了可以在 SQL 语句中使用的运算符和表达式。


    花时间浏览这份文档。你可能会惊讶地发现，其中包含了大量关于你日常向 Oracle 数据库发出的 SQL 语句的信息。

    '
- fmt: '## PL/SQL Packages and Types Reference


    The *Oracle Database PL/SQL Packages and Types Reference* often goes under the
    radar, which is why I mention it here. As you progress through your Oracle DBA
    career, you will use more and more of the PL/SQL packages Oracle provides for
    us. You may have already used a few of them by now. The ones Oracle supplies start
    with “`DBMS_`” in their name. You may have been exposed to `DBMS_SCHEDULER` or
    `DBMS_OUTPUT` to name a few. This reference provides all of the details on every
    package Oracle gives to us out of the box.


    This reference gives us an overview of what each package is used for, a list of
    data types and constants exposed to us through the API, and any usage notes. It
    is the usage notes that help us when we have permissions issues. You may have
    permissions to execute the PL/SQL package, but you may also need other permissions.
    For example, if you try to use the `DBMS_STATS` package to `GATHER_TABLE_STATS`
    and run into a permissions error, this reference tells you that you need to either
    own the table or have the `ANALYZE ANY` system privilege.


    Take some time to peruse this reference. Obviously, you cannot memorize the entire
    contents of this book. The next time you use an Oracle-supplied PL/SQL package,
    take a few moments to look up that package in this book and learn more about it.
    If you are having problems when trying to use a supplied PL/SQL package, look
    it up in this reference and see if you can solve the issue.


    ## Bookshelf


    When we access a version’s documentation set, Oracle is nice enough to give us
    different categories, like the one that we have been looking at in this chapter,
    Administration. Sometimes, it is hard to find a book we are looking for because
    we cannot determine the correct category. If we are on the main landing page of
    the Oracle Database documentation, below the list of Topics is a section called
    Access Our Bookshelf, shown in Figure [13-9](#467924_1_En_13_Chapter.xhtml#Fig9).


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig9_HTML.jpg](images/467924_1_En_13_Chapter/467924_1_En_13_Fig9_HTML.jpg)


    Figure 13-9: Browse bookshelf link


    If you have selected one of the topics, the same link is on the left side, below
    the list of topics. In Figure [13-10](#467924_1_En_13_Chapter.xhtml#Fig10), you
    can see I have selected the Administration topic and below that is the link for
    Books.


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig10_HTML.jpg](images/467924_1_En_13_Chapter/467924_1_En_13_Fig10_HTML.jpg)


    Figure 13-10: Books link


    No matter how you get there, you will be taken to a complete list of books for
    that Oracle database version. Figure [13-11](#467924_1_En_13_Chapter.xhtml#Fig11)
    shows a sampling of these books (the page goes on much longer than shown).


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig11_HTML.png](images/467924_1_En_13_Chapter/467924_1_En_13_Fig11_HTML.png)


    Figure 13-11: Oracle Database 18c books


    If you scroll through the list of books, you can see they are presented in alphabetical
    order. If you cannot find the book you are looking for, come to this listing of
    all the books and do a simple text search in your browser for a keyword. Most
    browsers use Ctrl-F to bring up a text search window. If I’m looking for a book
    on JSON or Multitenant, I can easily find it by searching for those words.


    It is a good idea to read the book titles so that you know what is out there.
    You don’t have to read the books. At most, just skim through them. Again, the
    whole point of this chapter is to learn how to navigate the documentation set
    and learn what is where so that you can more easily find what you are looking
    for in the future. If you see a book title that looks interesting, click the Show
    Details link to get a sentence or two describing the book’s contents.


    ## Other Books


    I want to end this chapter by discussing, at a very high level, a few of the other
    Oracle documentation books that may be important to you as you advance through
    your Oracle career. Take some time to examine these books so that you know what
    they contain. You will most likely end up reading most of the books in this list
    at some point in the future.


    *   `Automatic Storage Management User’s Guide`: If you use ASM for your Oracle
    databases, you will need to consult this guide to understand how to work with
    your files in the storage.

    *   `Database New Features Guide`: As mentioned earlier in this chapter, when
    a new version is released, this is the first thing I read. It shows you the new
    features for that version. If you are just starting out, everything is new. At
    some point in the future, you will upgrade to a higher version, and this book
    lets you know what to look forward to.

    *   `Database Security Guide`: Everyone needs to secure their database. This book,
    introduced in Chapter [8](#467924_1_En_8_Chapter.xhtml), provides lots of great
    details on the topic.

    *   `Database Utilities`: Learn how to use Data Pump to export and import data.
    Learn how to use SQL*Loader and external tables to move data from a text file
    into the database and back again.

    *   `Multitenant Administrator’s Guide`: Oracle has stated that Multitenant is
    the future direction of Oracle. At that point, all Oracle databases will have
    at least a single tenant. This guide can be used to learn how to manage the Multitenant
    feature, even if you have only one tenant.

    *   `Net Services Administrator’s Guide`: This book shows you how to configure
    the Oracle network.

    *   `SQL Tuning Guide`: This book is for performance tuning, but focuses on how
    to write well-performing SQL statements.


    This list is not exhaustive. You may certainly need to read other books. Many
    of the books pertain to features you may be required to use, like Oracle Text
    or Real Application Clusters. If you do not use those features, you can skip those
    books. Cloud technologies are starting to demand more of our attention, and Oracle
    has documentation on its cloud database services (click the Cloud button at [`https://docs.oracle.com`](https://docs.oracle.com)).


    ## Moving On


    To the uninitiated, reading the Oracle documentation is not something you want
    to do. Early in your career, it can even be a bit scary due to its overwhelming
    size. Hopefully, having read this chapter, you no longer feel intimidated by its
    volume. You should have an understanding of the key books that are vital to your
    career. You are becoming familiar with the information, format, and structure
    presented in these books. You should be excited because you have now been exposed
    to a treasure trove of knowledge. Just reading these books will improve your skill
    set, guaranteed. Digging into the books, playing with the concepts discussed,
    and working through the features in your testbed will grow your knowledge of Oracle
    more than anything else.


    Every Oracle DBA I have ever met that is any good at their job has spent a large
    amount of time not only reading the documentation, but also learning how to leverage
    it to the best of their ability. Remember that it is not important to memorize
    everything you read. Rather, learn what is where so that you can look it up again
    in the future. Like anything, the more you do it, the easier it becomes, so start
    using the Oracle documentation today.


    The two exceptions to the rule of learning what is where are the `Concepts Guide`
    and `Administrator’s Guide`. I am of the opinion that these two guides are required
    reading. After you are done reading this book, I strongly encourage that you read
    these two guides. They are that important.


    In the next chapter, we will learn more about the data dictionary. We will discover
    how we can ask the Oracle database questions about itself. After all, no book
    on the market will be able to tell you with 100% certainty where the DBA put the
    data files on disk or which user owns a table named `RPT30_180101`. For those
    types of questions, we need to ask the data dictionary.'
