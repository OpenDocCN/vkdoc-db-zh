- fmt: '## Moving On


    This chapter is probably different than what you may have been expecting when
    you saw the chapter title. I could have written this chapter like so many other
    books: “Here are the steps to backup your database. Here are the steps to restore
    your database.” The point of this book is to make you think beyond the procedural
    steps, because that is the only real way to grow your database administrator career.
    In this chapter, we did ask the question of determining how to get the database
    operational after the loss of a data file. We asked the question of what happens
    when you lose a control file or an online redo log. Hopefully, you’ll go back
    and experiment some more. The worst that can happen is you totally make a mess
    of your test database and cannot get it operational again, but that’s okay because
    you know how to restore from that cold backup and get up and running again.


    This chapter started by laying out a convincing argument that the DBA should tackle
    recovery requirements before even thinking about backups. A service-level agreement
    should be put in place and a testing document derived. Only then is the backup
    solution designed and subsequently tested to ensure it meets all requirements.
    I encourage you to be part of the growing army of database professionals that
    espouses recovery requirements before backups.


    The chapter then laid a foundation for understanding the different types of backups
    and when they are used. We performed both hot and cold backups in our testbed
    using `RMAN` and user-managed commands, respectively. We didn’t stop there, but
    experimented just a little bit because this is how we learn. Never stop asking
    questions and never stop experimenting. What other questions have you thought
    of while reading this chapter that we did not cover? Write those questions down
    and see if you can figure out the answers.


    The next chapter focuses on database security. If we lock down our database and
    make sure to protect it with backups that are specifically tailored to meet our
    requirements, we have gone a long way toward becoming the data guardians our companies
    need us to be.


    # 8. Security


    In the previous chapter, we took our first steps to ensuring that we can be a
    good data guardian. We learned about recovery and backup. The data guardian needs
    to safeguard the data and be able to provide access to the data after a disaster.


    This chapter rounds out the data guardian’s duties and to include protecting the
    data from unauthorized access. This chapter focuses on database security. With
    today’s data breaches, it is vital that all database administrators ensure their
    databases are secure from unauthorized access.


    ## Accessing the Security Guide


    Oracle provides many documents to help you learn about all aspects of Oracle database
    security. Point your web browser to `https://docs.oracle.com` and click the `Database`
    button. Then click the `Oracle Database` button. In the drop-down menu, select
    the `12.2` database version. By now, you should be familiar with getting to the
    Oracle documentation for your version as we have already visited many guides in
    the Oracle documentation set.


    In the `Topics` section, click the `Security` link. You should see the two most
    important books, the `Oracle Database 2 Day + Security Guide` and, right below
    that, the `Database Security Guide`.


    ### Tip


    As you read this book, make sure you are becoming familiar with the Oracle documentation.


    Oracle presents a number of these “2 Day” guides on a variety of topics to get
    you up to speed quickly on the topic. After you’ve read the `2 Day + Security
    Guide`, the regular `Security Guide` gives you a deeper dive into the topics.


    Remember that as you read the Oracle documentation, it is not important to memorize
    every detail. Instead, try to remember what the book contains. Skim the book if
    needed and make sure to go over the Table of Contents. Later in your career, you
    will know where to look for the answers you seek.


    As a reminder, it is not vital to read the Oracle documentation mentioned in each
    chapter of this book immediately. You can certainly read this book first, then
    visit the Oracle documentation later. But please take time to read the Oracle
    documentation at some point.


    ## Default Users


    Oracle provides many default user accounts when you create an Oracle database.
    You have been introduced to both the `SYS` and `SYSTEM` users earlier in this
    book. Some of the users that Oracle creates for you depend on if you have installed
    certain options. The `DBA_USERS` view contains a column named `ORACLE_MAINTAINED`
    that shows if the user is supplied by Oracle. We can see the Oracle-maintained
    users in the output from Listing 8-1. Depending on your version and the options
    installed, you may have more or fewer users than what Listing 8-1 shows.


    ```

    SQL> select username,account_status

    2  from dba_users where oracle_maintained=''Y''

    3  order by username;

    USERNAME                  ACCOUNT_STATUS

    ------------------------- --------------------------------

    ANONYMOUS                 EXPIRED & LOCKED

    APPQOSSYS                 EXPIRED & LOCKED

    AUDSYS                    EXPIRED & LOCKED

    DBSFWUSER                 EXPIRED & LOCKED

    DBSNMP                    EXPIRED & LOCKED

    DIP                       EXPIRED & LOCKED

    GGSYS                     EXPIRED & LOCKED

    GSMADMIN_INTERNAL         EXPIRED & LOCKED

    GSMCATUSER                EXPIRED & LOCKED

    GSMUSER                   EXPIRED & LOCKED

    OJVMSYS                   EXPIRED & LOCKED

    ORACLE_OCM                EXPIRED & LOCKED

    OUTLN                     EXPIRED & LOCKED

    REMOTE_SCHEDULER_AGENT    EXPIRED & LOCKED

    SYS                       OPEN

    SYS$UMF                   EXPIRED & LOCKED

    SYSBACKUP                 EXPIRED & LOCKED

    SYSDG                     EXPIRED & LOCKED

    SYSKM                     EXPIRED & LOCKED

    SYSRAC                    EXPIRED & LOCKED

    SYSTEM                    OPEN

    WMSYS                     EXPIRED & LOCKED

    XDB                       EXPIRED & LOCKED

    XS$NULL                   EXPIRED & LOCKED

    Listing 8-1

    Oracle-Maintained Users

    ```


    In today’s Oracle versions, the Oracle-maintained users are locked so that no
    one can access the database with any of those users. Out of the box, the only
    two users that are unlocked are `SYS` and `SYSTEM`. Do not unlock any of the other
    users unless you have a specific need to do so. For the most part, you will never
    need to connect directly to those users, and keeping them locked will keep your
    system more secure. Most of the Oracle-maintained users are to serve as schemas
    for database options. For example, `XDB` is used to support XML in the database.
    Since you are not a database option, you do not need to connect to that user.
    You are a database administrator. As such, later in this chapter, you will create
    your own DBA account and lock `SYSTEM`.'
