    如果上述任何配置文件设置不符合我的安全预期，我可以着手进行改进。


    了解数据库中哪些用户被授予了强大的 `DBA` 角色是很有用的。清单 14-17 显示了一个简单的查询，用于确定拥有 `DBA` 角色的用户。


    ```

    SQL> select grantee from dba_role_privs

