    ```

    **清单 9-7** 带有服务的 Listener


    这次，我们可以看到两个服务：`orcl` 和 `orclXDB`。每当一个实例启动并向 `Listener` 注册自身时，至少会有两个服务在运行。第一个服务与数据库名称匹配。第二个服务用于
    `Oracle XML` 数据库处理。现在我们拥有了建立连接所需的四个重要信息：网络协议、主机名、端口和服务。


    正如您所料，我们可以使用 `lsnrctl` 实用程序停止和启动 `Listener`。示例如**清单 9-8** 所示。


