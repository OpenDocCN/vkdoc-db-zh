- fmt: '## Test Cases


    It is now time to build some test cases. As said earlier in this chapter, we need
    to be able to learn from our failures. Test cases provide us the ability to put
    our task into action, analyze what went wrong, and go from there.


    To write a test case, we need to have a specific task in mind. The task should
    be as specific as possible. If the task is too generic, we will not be able to
    accurately define the success criteria. A good test case should specify the inputs
    and the outputs and any restrictions on the execution. For example, a test case
    on learning to ride a bicycle may indicate that the input is a two-wheel bike.
    The output is being able to use the pedals to propel the bike 20 feet without
    falling. The restrictions are that you cannot place your feet on the ground to
    stop from falling.


    Let’s go back to one of the questions posed earlier in this chapter: “Can I create
    a primary key without using an index?” The success criteria is when we know the
    answer to the question. Can we have a primary key (`PK`) without using an index?
    Our input will be a table we create. The output will be the answer to the question.
    To begin with, we will verify the schema has zero objects in it, then create a
    table and create the primary key constraint on the table, as can be seen in Listing
    [10-1](#467924_1_En_10_Chapter.xhtml#PC1).


    ```

    SQL> select count(*) from user_objects;

    COUNT(*)


    SQL> create table pk_test_table (id number);

    Table created.

    SQL> alter table pk_test_table add constraint pk_constraint primary key (id);

    Table altered.

    SQL> select count(*) from user_objects;

    COUNT(*)


    SQL> select object_name,object_type from user_objects;

    OBJECT_NAME          OBJECT_TYP

    -------------------- ----------

    PK_CONSTRAINT        INDEX

    PK_TEST_TABLE        TABLE

    Listing 10-1

    Primary Key Test Case

    ```


    The test case started with zero objects in the user’s schema. We created a very
    simple table and then added a primary key constraint. There are now two objects
    in the user’s schema, the table and an index Oracle created for us. The index’s
    name is the same as the primary key constraint name.


    Notice that this table was very simple. Test cases can often use very simple objects
    to prove or disprove the task at hand.


    ### Tip


    Keep your test cases as simple as possible to avoid adding extra complications
    to the analysis.


    So far, we have not answered the question of whether we can have a primary key
    constraint without an index. When we created the primary key constraint, Oracle
    automatically created the index for us. To answer the question, we must determine
    if we can now drop the index, shown in Listing [10-2](#467924_1_En_10_Chapter.xhtml#PC2).


    ```

    SQL> drop index pk_constraint;

    drop index pk_constraint

    *

    ERROR at line 1:

    ORA-02429: cannot drop index used for enforcement of unique/primary key

    Listing 10-2

    Dropping the PK Index

    ```


    When we attempt to drop the index, Oracle raises the `ORA-02429` error and the
    operation fails. We now have an answer to our question. We cannot have a primary
    key constraint without an associated index. Since we now have an answer to the
    question, the success criteria for this task is now complete. We may not like
    the answer, but we have the answer nonetheless.


    Now let’s tackle the other question posed earlier in this chapter: “Can I create
    a foreign key to a table but reference something other than the primary key?”
    For our inputs, we’ll need a table with two columns, one column that serves as
    the primary key and another column that is not part of the primary key constraint.
    We will need another table that attempts to create the foreign key (`FK`) constraint
    to the non-`PK` column of the parent table. Our success criteria is when we know
    our answer to the question.


    We will also drop the table we used in the previous test case. It is a good idea
    to clean up the objects used for test cases. In Listing [10-3](#467924_1_En_10_Chapter.xhtml#PC3),
    the old test table is dropped. A parent table is created with a primary key constraint.
    A child table is created.


    ```

    SQL> drop table pk_test_table;

    Table dropped.

    SQL> create table parent_tbl (pk_id number, other_id number);

    Table created.

    SQL> alter table parent_tbl add constraint parent_tbl_pk primary key (pk_id);

    Table altered.

    SQL> create table child_tbl (id number);

    Table created.

    SQL> alter table child_tbl add constraint parent_child_fk

    2  foreign key (id) references parent_tbl(pk_id);

    Table altered.

    SQL> alter table child_tbl drop constraint parent_child_fk;

    Table altered.

    Listing 10-3

    FK Test Case Setup

    ```


    In the code above, we created a new table to serve as our parent and defined a
    primary key constraint on this table. We created a child table. Finally, we created
    a foreign key constraint from the child to the parent using the `PK` column just
    to prove such a constraint could be created. However, since this constraint is
    not answering our question, the constraint was dropped. In Listing [10-4](#467924_1_En_10_Chapter.xhtml#PC4),
    let’s attempt to create the foreign key constraint to the parent table’s non-`PK`
    column.


    ```

    SQL> alter table child_tbl add constraint parent_child_fk

    2  foreign key (id) references parent_tbl(other_id);

    foreign key (id) references parent_tbl(other_id)

    *

    ERROR at line 2:

    ORA-02270: no matching unique or primary key for this column-list

    Listing 10-4

    Adding FK Constraint Failure

    ```


    We received another Oracle error. `ORA-02270` says that Oracle could not find
    a unique or a primary key for the column in the parent table. Remember that failure
    means we have a learning opportunity here. The error message is indicating that
    we need to be referencing either a primary key or a unique constraint in the parent
    table. A table can have only one primary key constraint, so let’s add a unique
    constraint to the other column in the parent table and try to add the foreign
    key constraint again, shown in Listing [10-5](#467924_1_En_10_Chapter.xhtml#PC5).


    ```

    SQL> alter table parent_tbl add constraint parent_unique unique (other_id);

    Table altered.

    SQL> alter table child_tbl add constraint parent_child_fk

    2  foreign key (id) references parent_tbl(other_id);

    Table altered.

    Listing 10-5

    Adding FK Constraint Success

    ```


    This time we are successful. We have answered our initial question. We can add
    a foreign key constraint to a table but reference something other than the parent’s
    primary key. We also learned something else in our failure. The foreign key constraint
    can reference the parent’s primary key or some other unique constraint.


    Before Listing [10-5](#467924_1_En_10_Chapter.xhtml#PC5), I noted that a table
    can have only one primary key constraint. Is that true? It should be very easy
    for you to create a test table with a primary key constraint. Then try to add
    another `PK` constraint to the table. Does it succeed or does it generate an error?
    Use test cases to challenge what we all assume to be true. Just because I said
    a table can have only one primary key constraint does not make it true. Test it
    out for yourself.


    Let’s clean up from our simple test case and drop the two tables we created, starting
    with the parent table in Listing [10-6](#467924_1_En_10_Chapter.xhtml#PC6).


    ```

    SQL> drop table parent_tbl;

    drop table parent_tbl

    *

    ERROR at line 1:

    ORA-02449: unique/primary keys in table referenced by foreign keys

    Listing 10-6

    Dropping the Parent Table

    ```


    We have encountered another error. This error is telling us that we cannot drop
    the parent table because another table is referencing the parent. Let’s drop the
    child table first and then the parent table, shown in Listing [10-7](#467924_1_En_10_Chapter.xhtml#PC7).


    ```

    SQL> drop table child_tbl;

    Table dropped.

    SQL> drop table parent_tbl;

    Table dropped.

    Listing 10-7

    Drop Tables in Correct Order

    ```


    Sometimes, when working with a test case, we will learn something we did not set
    out to discover. In our case, we learned we needed to drop the child table first,
    then drop the parent table.'
