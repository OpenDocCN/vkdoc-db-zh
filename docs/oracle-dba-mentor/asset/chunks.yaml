    要输入任何查询，将其键入 SQL Worksheet，然后单击 Run 按钮。您可以输入任何有效的 SQL 语句，甚至可以创建表并用数据填充它们。图 10-8
    显示了一个加载了一些测试数据到我的 LiveSQL 模式中的表。


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig8_HTML.jpg](img/467924_1_En_10_Fig8_HTML.jpg)


    *图 10-8 LiveSQL Emp 表*


    您还可以将脚本存储在您的 LiveSQL 帐户中以备将来调用。


    LiveSQL 不应用于生产目的，但它是一个极好的测试平台，特别是对于那些无法访问最新最好的 Oracle 版本的用户。当您不想花费时间启动虚拟机、安装 Oracle
    和创建数据库时，LiveSQL 也是一个很好的测试平台。话虽如此，LiveSQL 并不是练习数据库恢复或其他需要访问数据库服务器的任务的理想测试平台。

