    Primary Key Test Case

    ```


    The test case started with zero objects in the user’s schema. We created a very
    simple table and then added a primary key constraint. There are now two objects
    in the user’s schema, the table and an index Oracle created for us. The index’s
    name is the same as the primary key constraint name.


    Notice that this table was very simple. Test cases can often use very simple objects
    to prove or disprove the task at hand.


    ### Tip


    Keep your test cases as simple as possible to avoid adding extra complications
    to the analysis.


    So far, we have not answered the question of whether we can have a primary key
    constraint without an index. When we created the primary key constraint, Oracle
    automatically created the index for us. To answer the question, we must determine
    if we can now drop the index, shown in Listing [10-2](#467924_1_En_10_Chapter.xhtml#PC2).


    ```

    SQL> drop index pk_constraint;

    drop index pk_constraint

    *

    ERROR at line 1:

    ORA-02429: cannot drop index used for enforcement of unique/primary key

    Listing 10-2

    Dropping the PK Index

    ```


    When we attempt to drop the index, Oracle raises the ORA-02429 error and the operation
    fails. We now have an answer to our question. We cannot have a primary key constraint
    without an associated index. Since we now have an answer to the question, the
    success criteria for this task is now complete. We may not like the answer, but
    we have the answer nonetheless.


    Now let’s tackle the other question posed earlier in this chapter: “Can I create
    a foreign key to a table but reference something other than the primary key?”
    For our inputs, we’ll need a table with two columns, one column that serves as
    the primary key and another column that is not part of the primary key constraint.
    We will need another table that attempts to create the foreign key (FK) constraint
    to the non-PK column of the parent table. Our success criteria is when we know
    our answer to the question.


    We will also drop the table we used in the previous test case. It is a good idea
    to clean up the objects used for test cases. In Listing [10-3](#467924_1_En_10_Chapter.xhtml#PC3),
    the old test table is dropped. A parent table is created with a primary key constraint.
    A child table is created.


    ```

    SQL> drop table pk_test_table;

    Table dropped.

    SQL> create table parent_tbl (pk_id number, other_id number);

    Table created.

    SQL> alter table parent_tbl add constraint parent_tbl_pk primary key (pk_id);

    Table altered.

    SQL> create table child_tbl (id number);

    Table created.

    SQL> alter table child_tbl add constraint parent_child_fk

    2  foreign key (id) references parent_tbl(pk_id);

    Table altered.

    SQL> alter table child_tbl drop constraint parent_child_fk;

    Table altered.

    Listing 10-3

    FK Test Case Setup

    ```


    In the code above, we created a new table to serve as our parent and defined a
    primary key constraint on this table. We created a child table. Finally, we created
    a foreign key constraint from the child to the parent using the PK column just
    to prove such a constraint could be created. However, since this constraint is
    not answering our question, the constraint was dropped. In Listing [10-4](#467924_1_En_10_Chapter.xhtml#PC4),
    let’s attempt to create the foreign key constraint to the parent table’s non-PK
    column.


    ```

    SQL> alter table child_tbl add constraint parent_child_fk

    2  foreign key (id) references parent_tbl(other_id);

    foreign key (id) references parent_tbl(other_id)

    *

    ERROR at line 2:

    ORA-02270: no matching unique or primary key for this column-list

    Listing 10-4

    Adding FK Constraint Failure

    ```


    We received another Oracle error. ORA-02270 says that Oracle could not find a
    unique or a primary key for the column in the parent table. Remember that failure
    means we have a learning opportunity here. The error message is indicating that
    we need to be referencing either a primary key or a unique constraint in the parent
    table. A table can have only one primary key constraint, so let’s add a unique
    constraint to the other column in the parent table and try to add the foreign
    key constraint again, shown in Listing [10-5](#467924_1_En_10_Chapter.xhtml#PC5).


    ```

    SQL> alter table parent_tbl add constraint parent_unique unique (other_id);

    Table altered.

    SQL> alter table child_tbl add constraint parent_child_fk

    2  foreign key (id) references parent_tbl(other_id);

    Table altered.

    Listing 10-5

    Adding FK Constraint Success

    ```


    This time we are successful. We have answered our initial question. We can add
    a foreign key constraint to a table but reference something other than the parent’s
    primary key. We also learned something else in our failure. The foreign key constraint
    can reference the parent’s primary key or some other unique constraint.


    Before Listing [10-5](#467924_1_En_10_Chapter.xhtml#PC5), I noted that a table
    can have only one primary key constraint. Is that true? It should be very easy
    for you to create a test table with a primary key constraint. Then try to add
    another PK constraint to the table. Does it succeed or does it generate an error?
    Use test cases to challenge what we all assume to be true. Just because I said
    a table can have only one primary key constraint does not make it true. Test it
    out for yourself.


    Let’s clean up from our simple test case and drop the two tables we created, starting
    with the parent table in Listing [10-6](#467924_1_En_10_Chapter.xhtml#PC6).


    ```

    SQL> drop table parent_tbl;

    drop table parent_tbl

    *

    ERROR at line 1:

    ORA-02449: unique/primary keys in table referenced by foreign keys

    Listing 10-6

    Dropping the Parent Table

    ```


    We have encountered another error. This error is telling us that we cannot drop
    the parent table because another table is referencing the parent. Let’s drop the
    child table first and then the parent table, shown in Listing [10-7](#467924_1_En_10_Chapter.xhtml#PC7).


    ```

    SQL> drop table child_tbl;

    Table dropped.

    SQL> drop table parent_tbl;

    Table dropped.

    Listing 10-7

    Drop Tables in Correct Order

    ```


    Sometimes, when working with a test case, we will learn something we did not set
    out to discover. In our case, we learned we needed to drop the child table first,
    then drop the parent table.'
  trans: '

    ## 测试用例


    现在是时候构建一些测试用例了。正如本章前面所述，我们需要能够从失败中学习。测试用例让我们能够将任务付诸实践，分析问题所在，并在此基础上继续前进。


    要编写测试用例，我们需要在心中有一个具体的任务。任务应尽可能具体。如果任务过于笼统，我们将无法准确定义成功标准。一个好的测试用例应指定输入、输出以及执行过程中的任何限制条件。例如，一个关于学习骑自行车的测试用例可能会指出，输入是一辆两轮自行车。输出是能够使用脚踏板推动自行车前进
    20 英尺而不摔倒。限制条件是不得将脚放在地上以防止摔倒。


    让我们回到本章前面提出的一个问题之一：“我能否在不使用索引的情况下创建主键？”成功的标准在于我们知道问题的答案。我们能否拥有一个主键（`PK`）而不使用索引？我们的输入将是我们创建的一张表。输出将是问题的答案。首先，我们将验证模式中对象数为零，然后创建一张表并在表上添加主键约束，如清单
    10-1 所示。


    ```

    SQL> select count(*) from user_objects;

    COUNT(*)


    SQL> create table pk_test_table (id number);

    Table created.

    SQL> alter table pk_test_table add constraint pk_constraint primary key (id);

    Table altered.

    SQL> select count(*) from user_objects;

    COUNT(*)


    SQL> select object_name,object_type from user_objects;

    OBJECT_NAME          OBJECT_TYP

    -------------------- ----------

    PK_CONSTRAINT        INDEX

    PK_TEST_TABLE        TABLE

    清单 10-1

    主键测试用例

    ```


    该测试用例开始时，用户的模式中对象数为零。我们创建了一个非常简单的表，然后添加了一个主键约束。现在用户的模式中有两个对象，即该表和 Oracle 为我们创建的一个索引。该索引的名称与主键约束的名称相同。


    请注意，这个表非常简单。测试用例通常可以使用非常简单的对象来证明或反驳当前的任务。


    ### 提示


    保持测试用例尽可能简单，以避免给分析增加额外的复杂性。


    到目前为止，我们还没有回答是否可以在没有索引的情况下拥有主键约束的问题。当我们创建主键约束时，Oracle 自动为我们创建了索引。要回答这个问题，我们必须确定是否可以删除该索引，如清单
    10-2 所示。


    ```

    SQL> drop index pk_constraint;

    drop index pk_constraint

    *

    ERROR at line 1:

    ORA-02429: cannot drop index used for enforcement of unique/primary key

    清单 10-2

    删除主键索引

    ```


    当我们尝试删除索引时，Oracle 抛出了 `ORA-02429` 错误，操作失败。我们现在得到了问题的答案。我们无法拥有一个没有关联索引的主键约束。既然我们得到了问题的答案，该任务的成功标准现已完成。我们可能不喜欢这个答案，但我们终究得到了答案。


    现在，让我们来解决本章前面提出的另一个问题：“我能否创建一个指向表的外键，但引用的不是主键？”对于我们的输入，我们需要一张包含两列的表，一列作为主键，另一列不属于主键约束的一部分。我们需要另一张表，尝试向父表的非
    `PK` 列创建外键（`FK`）约束。我们的成功标准在于我们知道问题的答案。


    我们还将删除在上一个测试用例中使用的表。清理用于测试用例的对象是个好习惯。在清单 10-3 中，旧的测试表被删除。创建了一个带有主键约束的父表。创建了一个子表。


    ```

    SQL> drop table pk_test_table;

    Table dropped.

    SQL> create table parent_tbl (pk_id number, other_id number);

    Table created.

    SQL> alter table parent_tbl add constraint parent_tbl_pk primary key (pk_id);

    Table altered.

    SQL> create table child_tbl (id number);

    Table created.

    SQL> alter table child_tbl add constraint parent_child_fk

    2  foreign key (id) references parent_tbl(pk_id);

    Table altered.

    SQL> alter table child_tbl drop constraint parent_child_fk;

    Table altered.

    清单 10-3

    外键测试用例设置

    ```


    在上面的代码中，我们创建了一张新表作为父表，并在该表上定义了一个主键约束。我们创建了一个子表。最后，我们使用 `PK` 列从子表到父表创建了一个外键约束，只是为了证明可以创建这样的约束。然而，由于这个约束并非用来回答我们的问题，它被删除了。在清单
    10-4 中，让我们尝试向父表的非 `PK` 列创建外键约束。


    ```

    SQL> alter table child_tbl add constraint parent_child_fk

    2  foreign key (id) references parent_tbl(other_id);

    foreign key (id) references parent_tbl(other_id)

    *

    ERROR at line 2:

    ORA-02270: no matching unique or primary key for this column-list

    清单 10-4

    添加外键约束失败

    ```


    我们又收到了一个 Oracle 错误。`ORA-02270` 表示 Oracle 无法为父表中的列找到唯一的或主键。请记住，失败意味着我们这里有学习的机会。错误信息表明我们需要引用父表中的主键或唯一约束。一张表只能有一个主键约束，因此让我们向父表的另一列添加一个唯一约束，然后再次尝试添加外键约束，如清单
    10-5 所示。


    ```

    SQL> alter table parent_tbl add constraint parent_unique unique (other_id);

    Table altered.

    SQL> alter table child_tbl add constraint parent_child_fk

    2  foreign key (id) references parent_tbl(other_id);

    Table altered.

    清单 10-5

    成功添加外键约束

    ```


    这次我们成功了。我们回答了最初的问题。我们可以向一张表添加外键约束，但引用的可以是父表主键以外的东西。我们还从失败中学到了另一点：外键约束可以引用父表的主键或其他唯一约束。


    在清单 10-5 之前，我提到一张表只能有一个主键约束。这是真的吗？对你来说，创建一个带有主键约束的测试表应该非常容易。然后尝试向该表添加另一个 `PK`
    约束。它是成功了还是产生了错误？使用测试用例来挑战我们所有人认为理所当然的事情。仅仅因为我这么说，并不代表一张表只能有一个主键约束。请亲自测试一下。


    让我们清理这个简单的测试用例，删除我们创建的两张表，从清单 10-6 中的父表开始。


    ```

    SQL> drop table parent_tbl;

    drop table parent_tbl

    *

    ERROR at line 1:

    ORA-02449: unique/primary keys in table referenced by foreign keys

    清单 10-6

    删除父表

    ```


    我们遇到了另一个错误。这个错误告诉我们，不能删除父表，因为有另一张表引用了它。让我们先删除子表，然后再删除父表，如清单 10-7 所示。


    ```

    SQL> drop table child_tbl;

    Table dropped.

    SQL> drop table parent_tbl;

    Table dropped.

    清单 10-7

    按正确顺序删除表

    ```


    有时，在处理测试用例时，我们会学到一些我们本不打算探索的东西。在我们的案例中，我们了解到需要先删除子表，然后才能删除父表。

    '
- fmt: '### Tip


    保持开放心态。测试案例可能会教你意想不到的知识。


    测试案例的作用远不止回答问题。它们让你得以探索。测试案例是自我学习Oracle数据库知识的绝佳方式。这些学习往往发生在你进行“假设”游戏时。例如，你可能在测试环境中摆弄Oracle分区，并创建了一个如代码清单[10-8](#467924_1_En_10_Chapter.xhtml#PC8)所示的分区表。


    ```

    SQL> create table product_sales (

    2  transaction_id number,

    3  product_id number,

    4  qty_sold number,

    5  transaction_date date)

    6  partition by range (transaction_date)

    7  ( partition product_sales_2018q1

    8      values less than (to_date(''04-01-2018'',''MM-DD-YYYY'')) tablespace users,

    9   partition product_sales_2018q2

    10      values less than (to_date(''07-01-2018'',''MM-DD-YYYY'')) tablespace users,

    11   partition product_sales_2018q3

    12      values less than (to_date(''10-01-2018'',''MM-DD-YYYY'')) tablespace users,

    13   partition product_sales_2018q4

    14      values less than (to_date(''01-01-2019'',''MM-DD-YYYY'')) tablespace users

    15  );

    Table created.

    Listing 10-8

    Partitioned Table Test Case

    ```


    ## 进行“假设”游戏


    在摆弄分区表时，你很可能会尝试添加和删除分区以及创建分区索引。当从表中删除一个分区时，你可能会问自己：“如果我尝试从回收站中恢复被删除的分区会怎样？” 这个问题可能最初并不在你的测试案例中，但通过进行“假设”游戏，你一定能学到更多。在代码清单[10-9](#467924_1_En_10_Chapter.xhtml#PC9)中，我们正好探讨了这个问题。


    ```

    SQL> alter table product_sales drop partition product_sales_2018q1;

    Table altered.

    SQL> select object_name,original_name from recyclebin;

    no rows selected

    Listing 10-9

    Recovering a Dropped Partition

    ```


    在上面的代码中，分区被删除了。查询回收站，我们发现它是空的。这回答了一个问题。你无法从回收站中恢复被删除的分区。如果我们删除整个表会怎样？该表由多个分区组成，当我们删除一个分区时，它并不在回收站中。让我们在代码清单[10-10](#467924_1_En_10_Chapter.xhtml#PC10)中继续探索并找出答案。


    ```

    SQL> drop table product_sales;

    Table dropped.

    SQL>  select object_name,original_name,type from recyclebin;

    OBJECT_NAME                    ORIGINAL_NAME               TYPE

    ------------------------------ --------------------------- ----------------

    BIN$cSQeOfrrEVLgVQAAAAAAAQ==$0 PRODUCT_SALES               Table Partition

    BIN$cSQeOfrrEVLgVQAAAAAAAQ==$0 PRODUCT_SALES               Table Partition

    BIN$cSQeOfrrEVLgVQAAAAAAAQ==$0 PRODUCT_SALES               Table Partition

    BIN$cSQeOfrrEVLgVQAAAAAAAQ==$0 PRODUCT_SALES               TABLE

    SQL>  flashback table product_sales to before drop;

    Flashback complete.

    Listing 10-10

    Recovering a Dropped Partitioned Table

    ```


    我们可以看到该表及其三个分区都在回收站中，并且我们可以使用`FLASHBACK`命令来恢复该表。从这个测试案例中学到的教训是：你无法恢复被删除的分区本身，但可以恢复被删除的整个分区表。仅仅在我们的测试环境中进行这些“假设”游戏，我们就能学到很多关于Oracle分区表如何工作的知识。


    永远不要害怕创建你自己的测试案例来证明或证伪你对Oracle数据库引擎的理论。你创建的测试案例越多，你就会越擅长创建它们。测试案例是Oracle数据库管理员的重要学习工具。


    在第[16](#467924_1_En_16_Chapter.xhtml)章，我们将讨论通过撰写博客来助力你的数据库职业生涯。测试案例是极好的博客素材。许多Oracle博主为了阐明一个观点，会生成一个简单的测试案例来展示他们想传达的内容。在博客中使用测试案例的另一个好方法是向他人展示你所学到的东西。


    ## 示例模式


    创建表并填充数据可能需要一些努力，这是人们不为自己构建测试案例的一个借口。Oracle包含了一些供你使用的示例模式。在我们深入探讨之前，可能需要了解一点历史。


    在Oracle数据库的早期，开发数据库引擎的软件开发人员需要一种方法来测试某些概念。他们和你一样需要测试数据！其中一位早期员工是一位名叫Bruce Scott的先生。他使用自己的姓氏`SCOTT`创建了一个模式。他需要一些表，于是为一个虚构的公司创建了用于员工的`EMP`表和用于部门的`DEPT`表。凭借这两张表，他会编写简单的SQL语句来展示Oracle的工作原理。这效果足够好，以至于Oracle的发行版开始包含一个创建`SCOTT`账户的脚本。该脚本将密码设置为`TIGER`，这是他女儿猫的名字。如今，你仍然能看到人们提及`scott/tiger`和`scott.emp`，指的就是这个账户及其一张表。


    从Oracle9*i*开始，Oracle开始提供其他示例模式：用于虚构人力资源系统的`HR`和用于虚构订单录入模式的`OE`。`HR`模式在很大程度上取代了`SCOTT/TIGER`。如今，你可以在Oracle开发者网络上找到这些示例模式，位置与你下载Oracle数据库软件的地方相同。向下滚动数据库软件的文件列表，直到找到`Examples`文件。你可以在数据库服务器上解压此文件，并按照说明创建供你使用的示例模式。


    如果示例模式不能满足你的需求，另一位Oracle员工Dominic Giles创建了一个数据生成器实用程序。如果你感兴趣，可以在[`www.dominicgiles.com/datagenerator.html`](http://www.dominicgiles.com/datagenerator.html)找到它。虽然这个产品是由Oracle员工创建的，但它并不是一个成熟的Oracle公司产品。数据生成器是为测试案例创建大量半随机数据的好方法。


    ## 继续前进


    请记住，本书的目标不是给你所有问题的答案。本书旨在教你如何自己找到问题的答案。在前面的章节中，我们接触了Oracle文档集中的几本书。希望你已经开始接触到一些好的文档。在本章中，我们介绍了另一个强大的工具集，以帮助你学习更多关于Oracle数据库的知识——测试环境和测试案例。


    永远不要害怕尝试。在尝试中，你会失败，但这没关系。正是通过检查失败、找出问题所在以及如何纠正，我们才学到了如此多的东西。从成功中我们学不到什么。问问你钦佩的任何数据库管理员他们失败的频率，他们肯定会回答“一直如此”。


    在下一章中，我们将转向你将在管理Oracle数据库时使用的一些工具。我们已经在使用其中一个工具`SQL*Plus`，我们也将看到更多这样的工具。


    # 第三部分 学习Oracle数据库


    # 11. 工具


    在本章中，我们将探讨可供我们使用的、有助于管理Oracle数据库的几种工具。我们已经在使用其中一种工具，`SQL*Plus`。我们将更全面地探索该工具以及其他一些工具。


    Oracle数据库管理员需要知道为工作选择哪些工具，这与木匠或机械师没什么不同。合适的工具用于合适的工作可以简化你的生活。就像你会用锤子钉钉子一样，你会使用数据库配置助手来创建数据库。


    我可以为这里讨论的每种工具专门写一章。为了简洁起见，本章将提供这些工具的概述，并讨论你将用它们来做什么。与Oracle世界中的任何事物一样，这些工具还有很多可以留待日后学习。'
  raw: '### Tip


    Keep your eyes open. Test cases may teach you unexpected facts.


    Test cases do more than just answer questions. They let you explore. Test cases
    are a fantastic way to teach yourself more about the Oracle database. These lessons
    often occur when you play “what if” games. For example, you may be playing around
    with Oracle partitioning on your testbed and you create a partitioned table as
    shown in Listing [10-8](#467924_1_En_10_Chapter.xhtml#PC8).


    ```

    SQL> create table product_sales (

    2  transaction_id number,

    3  product_id number,

    4  qty_sold number,

    5  transaction_date date)

    6  partition by range (transaction_date)

    7  ( partition product_sales_2018q1

    8      values less than (to_date(''04-01-2018'',''MM-DD-YYYY'')) tablespace users,

    9   partition product_sales_2018q2

    10      values less than (to_date(''07-01-2018'',''MM-DD-YYYY'')) tablespace users,

    11   partition product_sales_2018q3

    12      values less than (to_date(''10-01-2018'',''MM-DD-YYYY'')) tablespace users,

    13   partition product_sales_2018q4

    14      values less than (to_date(''01-01-2019'',''MM-DD-YYYY'')) tablespace users

    15  );

    Table created.

    Listing 10-8

    Partitioned Table Test Case

    ```


    ## Playing What-If Games


    When playing around with partitioned tables, you are likely to experiment with
    adding and dropping partitions and creating partitioned indexes. In dropping a
    partition from the table, you might ask yourself, “What if I try to restore the
    dropped partition from the recycle bin?” This question may not have been in your
    initial test case, but by playing “what if” games, you are bound to learn more.
    In Listing [10-9](#467924_1_En_10_Chapter.xhtml#PC9), we explore this very question.


    ```

    SQL> alter table product_sales drop partition product_sales_2018q1;

    Table altered.

    SQL> select object_name,original_name from recyclebin;

    no rows selected

    Listing 10-9

    Recovering a Dropped Partition

    ```


    In the code above, the partition was dropped. Querying the recycle bin, we see
    that it is empty. This answers one question. You cannot restore a dropped partition
    from the recycle bin. What if we dropped the table? The table is made up of multiple
    partitions, and when we dropped a partition, it was not in the recycle bin. Let’s
    play around in Listing [10-10](#467924_1_En_10_Chapter.xhtml#PC10) and find out.


    ```

    SQL> drop table product_sales;

    Table dropped.

    SQL>  select object_name,original_name,type from recyclebin;

    OBJECT_NAME                    ORIGINAL_NAME               TYPE

    ------------------------------ --------------------------- ----------------

    BIN$cSQeOfrrEVLgVQAAAAAAAQ==$0 PRODUCT_SALES               Table Partition

    BIN$cSQeOfrrEVLgVQAAAAAAAQ==$0 PRODUCT_SALES               Table Partition

    BIN$cSQeOfrrEVLgVQAAAAAAAQ==$0 PRODUCT_SALES               Table Partition

    BIN$cSQeOfrrEVLgVQAAAAAAAQ==$0 PRODUCT_SALES               TABLE

    SQL>  flashback table product_sales to before drop;

    Flashback complete.

    Listing 10-10

    Recovering a Dropped Partitioned Table

    ```


    We can see the table and its three partitions in the recycle bin and we could
    use the FLASHBACK command to recover the table. The lesson to be learned from
    this test case is that you cannot restore a partitioned table that was dropped,
    but you can restore a dropped partitioned table. Just by playing these “what if”
    games in our testbed, we could learn quite a lot about how Oracle’s partitioned
    tables work.


    Never be afraid to create your own test cases to either prove or disprove your
    theories about the Oracle database engine. The more test cases you create, the
    better you will get at making them. Test cases are an essential learning tool
    for the Oracle database administrator.


    In Chapter [16](#467924_1_En_16_Chapter.xhtml), we will discuss blogging to help
    grow your database career. Test cases are great for blogging material. Many Oracle
    bloggers will want to illustrate a point and generate a simple test case to show
    what they want to convey. Another good way to use test cases in blogs is to show
    what you have learned to others.


    ## Sample Schemas


    It can take a bit of effort to create tables and populate them with data, which
    is one excuse people give for not building their own test cases. Oracle includes
    a number of sample schemas for your use. Before we dive into those, a little history
    may be in order.


    In the early days of the Oracle database, the software developers creating the
    database engine needed a way to test out certain concepts. They needed testbed
    data as much as you do! One of those early employees was a gentleman by the name
    of Bruce Scott. He created a schema using his last name, SCOTT. He needed a few
    tables, so he created one for employees, called EMP, and one for departments,
    DEPT, all for a fictitious company. Armed with these two tables, he would do simple
    SQL statements to show how Oracle worked. This worked well enough that the Oracle
    distribution started including a script to create the SCOTT account. The script
    set the password to TIGER, which was the name of his daughter’s cat. Today, you
    can still see people refer to scott/tiger and scott.emp, referring to this account
    and one of its tables.


    Starting with Oracle9*i*, Oracle began shipping other sample schemas, HR for a
    fictitious Human Resources system and OE for a fictitious Order Entry schema.
    The HR schema is largely a replacement of SCOTT/TIGER. Today, the sample schemas
    can be found on the Oracle Developer Network in the same place you downloaded
    the Oracle database software. Scroll down the list of files for the database software
    until you find the Examples file. You can unzip this on your database server and
    follow the instructions to create sample schemas for your use.


    If the sample schemas do not meet your needs, another Oracle employee, Dominic
    Giles, has created a Data Generator utility. You can find this at [`www.dominicgiles.com/datagenerator.html`](http://www.dominicgiles.com/datagenerator.html)
    if you are interested. While this product was created by an Oracle employee, it
    is not a full-fledged Oracle Corporation product. Data Generator is a great way
    to create large volumes of semi-random data for test cases.


    ## Moving On


    Remember that the goal of this book is not to give you answers to all your questions.
    This book strives to teach you how to learn answers to questions on your own.
    In previous chapters, we have touched on a few books in the Oracle documentation
    set. Hopefully you have been getting some good exposure to the documentation.
    In this chapter, we introduced another powerful toolset to help you learn more
    about the Oracle database, the testbed and test cases.


    Never be afraid to experiment. When experimenting, you will fail and that is okay.
    It is by examining failures and determining what went wrong, and how we can get
    it right, that we learn so much. We learn very little from success. Ask any database
    administrator you admire how often they fail and they will certainly respond with
    “all the time.”


    In the next chapter, we move on to a few tools you will use in managing Oracle
    databases. We have already been using one of these tools, SQL*Plus, and we will
    see more of these tools as well.


    # Part IIILearning Oracle Database


    # 11. Tools


    In this chapter, we will explore a few of the tools at our disposal to help manage
    the Oracle database. We have already been using one of the tools, SQL*Plus. We
    will explore that tool more fully as well as a few others.


    The Oracle database administrator needs to know which tools to leverage for the
    job, no different than a carpenter or a mechanic. The right tool for the right
    job can make your life simpler. Just like you would use a hammer to pound in a
    nail, you would use the Database Configuration Assistant to create a database.


    I could write a chapter devoted to each of the tools discussed here. To keep it
    brief, this chapter will provide an overview of the tool and discuss what you
    will use it for. As with anything in the Oracle world, there is much to learn
    about the tool at a later date.'
  trans: '### 小贴士


    保持开放心态。测试案例可能会教你意想不到的知识。


    测试案例的作用远不止回答问题。它们让你得以探索。测试案例是自我学习 Oracle 数据库知识的绝佳方式。这些学习往往发生在你进行“假设”游戏时。例如，你可能在测试环境中摆弄
    Oracle 分区，并创建了一个如代码清单 10-8 所示的分区表。


    ```

    SQL> create table product_sales (

    2  transaction_id number,

    3  product_id number,

    4  qty_sold number,

    5  transaction_date date)

    6  partition by range (transaction_date)

    7  ( partition product_sales_2018q1

    8      values less than (to_date(''04-01-2018'',''MM-DD-YYYY'')) tablespace users,

    9   partition product_sales_2018q2

    10      values less than (to_date(''07-01-2018'',''MM-DD-YYYY'')) tablespace users,

    11   partition product_sales_2018q3

    12      values less than (to_date(''10-01-2018'',''MM-DD-YYYY'')) tablespace users,

    13   partition product_sales_2018q4

    14      values less than (to_date(''01-01-2019'',''MM-DD-YYYY'')) tablespace users

    15  );

    Table created.

    Listing 10-8

    Partitioned Table Test Case

    ```


    ## 进行“假设”游戏


    在摆弄分区表时，你很可能会尝试添加和删除分区以及创建分区索引。当从表中删除一个分区时，你可能会问自己：“如果我尝试从回收站中恢复被删除的分区会怎样？” 这个问题可能最初并不在你的测试案例中，但通过进行“假设”游戏，你一定能学到更多。在代码清单
    10-9 中，我们正好探讨了这个问题。


    ```

    SQL> alter table product_sales drop partition product_sales_2018q1;

    Table altered.

    SQL> select object_name,original_name from recyclebin;

    no rows selected

    Listing 10-9

    Recovering a Dropped Partition

    ```


    在上面的代码中，分区被删除了。查询回收站，我们发现它是空的。这回答了一个问题。你无法从回收站中恢复被删除的分区。如果我们删除整个表会怎样？该表由多个分区组成，当我们删除一个分区时，它并不在回收站中。让我们在代码清单
    10-10 中继续探索并找出答案。


    ```

    SQL> drop table product_sales;

    Table dropped.

    SQL>  select object_name,original_name,type from recyclebin;

    OBJECT_NAME                    ORIGINAL_NAME               TYPE

    ------------------------------ --------------------------- ----------------

    BIN$cSQeOfrrEVLgVQAAAAAAAQ==$0 PRODUCT_SALES               Table Partition

    BIN$cSQeOfrrEVLgVQAAAAAAAQ==$0 PRODUCT_SALES               Table Partition

    BIN$cSQeOfrrEVLgVQAAAAAAAQ==$0 PRODUCT_SALES               Table Partition

    BIN$cSQeOfrrEVLgVQAAAAAAAQ==$0 PRODUCT_SALES               TABLE

    SQL>  flashback table product_sales to before drop;

    Flashback complete.

    Listing 10-10

    Recovering a Dropped Partitioned Table

    ```


    我们可以看到该表及其三个分区都在回收站中，并且我们可以使用`FLASHBACK`命令来恢复该表。从这个测试案例中学到的教训是：你无法恢复被删除的分区本身，但可以恢复被删除的整个分区表。仅仅在我们的测试环境中进行这些“假设”游戏，我们就能学到很多关于
    Oracle 分区表如何工作的知识。


    永远不要害怕创建你自己的测试案例来证明或证伪你对 Oracle 数据库引擎的理论。你创建的测试案例越多，你就会越擅长创建它们。测试案例是 Oracle 数据库管理员的重要学习工具。


    在第 16 章，我们将讨论通过撰写博客来助力你的数据库职业生涯。测试案例是极好的博客素材。许多 Oracle 博主为了阐明一个观点，会生成一个简单的测试案例来展示他们想传达的内容。在博客中使用测试案例的另一个好方法是向他人展示你所学到的东西。


    ## 示例模式


    创建表并填充数据可能需要一些努力，这是人们不为自己构建测试案例的一个借口。Oracle 包含了一些供你使用的示例模式。在我们深入探讨之前，可能需要了解一点历史。


    在 Oracle 数据库的早期，开发数据库引擎的软件开发人员需要一种方法来测试某些概念。他们和你一样需要测试数据！其中一位早期员工是一位名叫 Bruce Scott
    的先生。他使用自己的姓氏`SCOTT`创建了一个模式。他需要一些表，于是为一个虚构的公司创建了用于员工的`EMP`表和用于部门的`DEPT`表。凭借这两张表，他会编写简单的
    SQL 语句来展示 Oracle 的工作原理。这效果足够好，以至于 Oracle 的发行版开始包含一个创建`SCOTT`账户的脚本。该脚本将密码设置为`TIGER`，这是他女儿猫的名字。如今，你仍然能看到人们提及`scott/tiger`和`scott.emp`，指的就是这个账户及其一张表。


    从 Oracle9*i*开始，Oracle 开始提供其他示例模式：用于虚构人力资源系统的`HR`和用于虚构订单录入模式的`OE`。`HR`模式在很大程度上取代了`SCOTT/TIGER`。如今，你可以在
    Oracle 开发者网络上找到这些示例模式，位置与你下载 Oracle 数据库软件的地方相同。向下滚动数据库软件的文件列表，直到找到`Examples`文件。你可以在数据库服务器上解压此文件，并按照说明创建供你使用的示例模式。


    如果示例模式不能满足你的需求，另一位 Oracle 员工 Dominic Giles 创建了一个数据生成器实用程序。如果你感兴趣，可以在[`www.dominicgiles.com/datagenerator.html`](http://www.dominicgiles.com/datagenerator.html)找到它。虽然这个产品是由
    Oracle 员工创建的，但它并不是一个成熟的 Oracle 公司产品。数据生成器是为测试案例创建大量半随机数据的好方法。


    ## 继续前进


    请记住，本书的目标不是给你所有问题的答案。本书旨在教你如何自己找到问题的答案。在前面的章节中，我们接触了 Oracle 文档集中的几本书。希望你已经开始接触到一些好的文档。在本章中，我们介绍了另一个强大的工具集，以帮助你学习更多关于
    Oracle 数据库的知识——测试环境和测试案例。


    永远不要害怕尝试。在尝试中，你会失败，但这没关系。正是通过检查失败、找出问题所在以及如何纠正，我们才学到了如此多的东西。从成功中我们学不到什么。问问你钦佩的任何数据库管理员他们失败的频率，他们肯定会回答“一直如此”。


    在下一章中，我们将转向你将在管理 Oracle 数据库时使用的一些工具。我们已经在使用其中一个工具`SQL*Plus`，我们也将看到更多这样的工具。


    # 第三部分 学习 Oracle 数据库


    # 11. 工具


    在本章中，我们将探讨可供我们使用的、有助于管理 Oracle 数据库的几种工具。我们已经在使用其中一种工具，`SQL*Plus`。我们将更全面地探索该工具以及其他一些工具。


    Oracle 数据库管理员需要知道为工作选择哪些工具，这与木匠或机械师没什么不同。合适的工具用于合适的工作可以简化你的生活。就像你会用锤子钉钉子一样，你会使用数据库配置助手来创建数据库。


    我可以为这里讨论的每种工具专门写一章。为了简洁起见，本章将提供这些工具的概述，并讨论你将用它们来做什么。与 Oracle 世界中的任何事物一样，这些工具还有很多可以留待日后学习。'
- fmt: '## Connecting to Our Database


    Earlier in this book, we created a virtual machine and built an Oracle database
    for our testbed. We can always use a Terminal window within the VM and use `SQL*Plus`,
    as we have been, but it would be nice if we could connect tools from our workstation
    to the Oracle instance inside that VM.


    ### 配置网络连接


    Recall that when we created the virtual machine in Chapter [3](#467924_1_En_3_Chapter.xhtml),
    we defined two network adapters. One of those is a NAT adapter, which lets the
    VM go to the outside world and download updates and more. The other network adapter
    we defined as “host-only,” and this is the adapter we will connect through. In
    a Terminal window on the VM, type `ip addr`; this command will show us the IP
    addresses for each network device. On my virtual machine, the IP addresses are
    shown in Listing [11-1](#467924_1_En_11_Chapter.xhtml#PC1). Your VM may have slightly
    different addresses, so take note of your specific settings.


    ```

    [oracle@oracle122 ~]$ ip addr

    1: lo:  mtu 65536 qdisc noqueue state UNKNOWN

    link/loopback 00:00:00:00:00:00 brd 00:00:00:00:00:00

    inet 127.0.0.1/8 scope host lo

    valid_lft forever preferred_lft forever

    inet6 ::1/128 scope host

    valid_lft forever preferred_lft forever

    2: enp0s3:  mtu 1500 qdisc pfifo_fast state UP qlen 1000

    link/ether 08:00:27:6f:30:32 brd ff:ff:ff:ff:ff:ff

    inet 10.0.2.15/24 brd 10.0.2.255 scope global dynamic enp0s3

    valid_lft 75838sec preferred_lft 75838sec

    inet6 fe80::d629:df95:c55b:252c/64 scope link

    valid_lft forever preferred_lft forever

    3: enp0s8:  mtu 1500 qdisc pfifo_fast state UP qlen 1000

    link/ether 08:00:27:d6:0e:5c brd ff:ff:ff:ff:ff:ff

    inet 192.168.56.101/24 brd 192.168.56.255 scope global dynamic enp0s8

    valid_lft 712sec preferred_lft 712sec

    inet6 fe80::777e:9533:78fd:6446/64 scope link

    valid_lft forever preferred_lft forever

    Listing 11-1

    VM IP Address

    ```


    We are looking for two IP addresses, one that starts with `10.0` and the other
    that starts with `192.168`. The former is for our NAT adapter and the latter is
    for our host-only adapter, the one that we care about the most for this chapter.
    In my output, the IP address is `192.168.56.101`, but yours may differ slightly.
    My virtual machine is running on a Windows workstation, so I’m going to start
    a command window, `CMD`. On a Mac, you would start a Terminal window. When troubleshooting
    network connectivity, the first thing people often ask is “Can you ping it?” Listing
    [11-2](#467924_1_En_11_Chapter.xhtml#PC2) provides the answer for my VM.


    ```

    C:\Users\bpeasland\Desktop>ping 192.168.56.101 -n 3

    Pinging 192.168.56.101 with 32 bytes of data:

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Ping statistics for 192.168.56.101:

    Packets: Sent = 3, Received = 3, Lost = 0 (0% loss),

    Approximate round trip times in milli-seconds:

    Minimum = 0ms, Maximum = 0ms, Average = 0ms

    Listing 11-2

    Ping the VM

    ```


    From my workstation, the virtual machine could be successfully pinged. If you
    are having problems with this, check your IP address again. There may be multiple
    ones that start with `192.168`, so you may have to try each. Also check the virtual
    machine’s settings to ensure one of the network adapters is created as host-only.


    ### 设置静态IP


    The problem with the virtual machine’s current configuration is that the IP address
    can change each time the VM starts. To make this more permanent, in the Linux
    VM, go to Applications ➤ System Tools ➤ Settings. Next, click the Network icon.
    You should see a window similar to Figure [11-1](#467924_1_En_11_Chapter.xhtml#Fig1).


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig1_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig1_HTML.jpg)


    Figure 11-1: Network settings


    Select the adapter (`enp0s8`) and make sure the IPv4 address starts with `192.168`.
    You may have to select the other Ethernet adapter if the address is incorrect.
    In the lower-right corner, click the gear icon to change this adapter’s settings.
    A dialog box similar to Figure [11-2](#467924_1_En_11_Chapter.xhtml#Fig2) will
    come up.


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig2_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig2_HTML.jpg)


    Figure 11-2: Manual IP address


    In the Addresses drop-down menu, select Manual. You will now be able to enter
    your IP address. We are using the autogenerated password and making it permanent
    for this VM so that it will not change when the VM is rebooted. Fill in the Netmask
    and Gateway fields as shown in Figure [11-2](#467924_1_En_11_Chapter.xhtml#Fig2)
    and then click the Apply button. Reboot the virtual machine to ensure the settings
    hold. You can now use this IP address to always connect to this virtual machine
    on your workstation or laptop. The only impact would be if you had another virtual
    machine running on this same system with the same IP address.


    ### 修改Hosts文件


    Now that the IP address is statically defined, we can connect to it any time the
    VM is up and running. However, working with IP addresses is cumbersome and we
    do not want to involve the network team to create an alias in DNS. To help ourselves
    out, we will modify our local “hosts” file. On Windows, use Explorer to navigate
    to the `C:\Windows\System32\drivers\etc` directory and open the file named `hosts`
    in any text editor. One Mac platforms, the `hosts` file is in the `/etc` directory.
    Toward the end of the file, add a line similar to the last entry in Listing [11-3](#467924_1_En_11_Chapter.xhtml#PC3).


    ```

    # localhost name resolution is handled within DNS itself.

    #      127.0.0.1       localhost

    #      ::1             localhost

    192.168.56.101      dbamentor

    Listing 11-3

    Hosts Entry

    ```


    The last line of the output is my new entry to the `hosts` file. It contains my
    IP address and whatever alias I want to use to refer to this machine. I am using
    the alias `dbamentor`. Save the file, and then ping with that alias, as shown
    in Listing [11-4](#467924_1_En_11_Chapter.xhtml#PC4).


    ```

    C:\Users\bpeasland\Desktop>ping dbamentor -n 3

    Pinging dbamentor [192.168.56.101] with 32 bytes of data:

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Ping statistics for 192.168.56.101:

    Packets: Sent = 3, Received = 3, Lost = 0 (0% loss),

    Approximate round trip times in milli-seconds:

    Minimum = 0ms, Maximum = 0ms, Average = 0ms

    Listing 11-4

    Ping with Hosts Alias

    ```


    I can now use this alias any time I want to connect to the virtual machine. This
    will be much easier to remember than an IP address.


    ### 建立SSH连接


    If I am running the virtual machine on a Mac platform, then I can use the Terminal
    window to establish a Secure Shell (SSH) session to the machine. On Windows, I
    need an SSH client. I often use `PuTTY` or `MobaXterm`. Both are free utilities
    you can find by doing a simple Google search. No matter which you use, see if
    you can establish an SSH session to the machine. Listing [11-5](#467924_1_En_11_Chapter.xhtml#PC5)
    shows how I connected with `MobaXterm`.


    ```

    [bpeasland.winworkstation] ➤ ssh oracle@dbamentor

    Warning: Permanently added ''dbamentor'' (RSA) to the list of known hosts.

    oracle@dbamentor''s password:

    Last login: Tue Jul 24 14:35:22 2018 from 192.168.56.1

    /usr/bin/xauth:  file /home/oracle/.Xauthority does not exist

    [oracle@dbamentor ~]$ hostname

    dbamentor.localdomain

    Listing 11-5

    SSH from MobaXterm

    ```


    The `hostname` command at the end of the listing shows us that we did in fact
    connect to our virtual machine.


    Now that we have established connectivity from our host operating system, we can
    use any utilities installed on the host to connect to the virtual machine and
    the database running inside it.'
  raw: '## Connecting to Our Database


    Earlier in this book, we created a virtual machine and built an Oracle database
    for our testbed. We can always use a Terminal window within the VM and use SQL*Plus,
    as we have been, but it would be nice if we could connect tools from our workstation
    to the Oracle instance inside that VM.


    Recall that when we created the virtual machine in Chapter [3](#467924_1_En_3_Chapter.xhtml),
    we defined two network adapters. One of those is a NAT adapter, which lets the
    VM go to the outside world and download updates and more. The other network adapter
    we defined as “host-only,” and this is the adapter we will connect through. In
    a Terminal window on the VM, type “ip addr”; this command will show us the IP
    addresses for each network device. On my virtual machine, the IP addresses are
    shown in Listing [11-1](#467924_1_En_11_Chapter.xhtml#PC1). Your VM may have slightly
    different addresses, so take note of your specific settings.


    ```

    [oracle@oracle122 ~]$ ip addr

    1: lo:  mtu 65536 qdisc noqueue state UNKNOWN

    link/loopback 00:00:00:00:00:00 brd 00:00:00:00:00:00

    inet 127.0.0.1/8 scope host lo

    valid_lft forever preferred_lft forever

    inet6 ::1/128 scope host

    valid_lft forever preferred_lft forever

    2: enp0s3:  mtu 1500 qdisc pfifo_fast state UP qlen 1000

    link/ether 08:00:27:6f:30:32 brd ff:ff:ff:ff:ff:ff

    inet 10.0.2.15/24 brd 10.0.2.255 scope global dynamic enp0s3

    valid_lft 75838sec preferred_lft 75838sec

    inet6 fe80::d629:df95:c55b:252c/64 scope link

    valid_lft forever preferred_lft forever

    3: enp0s8:  mtu 1500 qdisc pfifo_fast state UP qlen 1000

    link/ether 08:00:27:d6:0e:5c brd ff:ff:ff:ff:ff:ff

    inet 192.168.56.101/24 brd 192.168.56.255 scope global dynamic enp0s8

    valid_lft 712sec preferred_lft 712sec

    inet6 fe80::777e:9533:78fd:6446/64 scope link

    valid_lft forever preferred_lft forever

    Listing 11-1

    VM IP Address

    ```


    We are looking for two IP addresses, one that starts with 10.0 and the other that
    starts with 192.168\. The former is for our NAT adapter and the latter is for
    our host-only adapter, the one that we care about the most for this chapter. In
    my output, the IP address is 192.168.56.101, but yours may differ slightly. My
    virtual machine is running on a Windows workstation, so I’m going to start a command
    window, CMD. On a Mac, you would start a Terminal window. When troubleshooting
    network connectivity, the first thing people often ask is “Can you ping it?” Listing
    [11-2](#467924_1_En_11_Chapter.xhtml#PC2) provides the answer for my VM.


    ```

    C:\Users\bpeasland\Desktop>ping 192.168.56.101 -n 3

    Pinging 192.168.56.101 with 32 bytes of data:

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Ping statistics for 192.168.56.101:

    Packets: Sent = 3, Received = 3, Lost = 0 (0% loss),

    Approximate round trip times in milli-seconds:

    Minimum = 0ms, Maximum = 0ms, Average = 0ms

    Listing 11-2

    Ping the VM

    ```


    From my workstation, the virtual machine could be successfully pinged. If you
    are having problems with this, check your IP address again. There may be multiple
    ones that start with 192.168, so you may have to try each. Also check the virtual
    machine’s settings to ensure one of the network adapters is created as host-only.


    The problem with the virtual machine’s current configuration is that the IP address
    can change each time the VM starts. To make this more permanent, in the Linux
    VM, go to Applications ➤ System Tools ➤ Settings. Next, click the Network icon.
    You should see a window similar to Figure [11-1](#467924_1_En_11_Chapter.xhtml#Fig1).


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig1_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig1_HTML.jpg)


    Figure 11-1


    Network settings


    Select the adapter (enp0s8) and make sure the IPv4 address starts with 192.168\.
    You may have to select the other Ethernet adapter if the address is incorrect.
    In the lower-right corner, click the gear icon to change this adapter’s settings.
    A dialog box similar to Figure [11-2](#467924_1_En_11_Chapter.xhtml#Fig2) will
    come up.


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig2_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Manual IP address


    In the Addresses drop-down menu, select Manual. You will now be able to enter
    your IP address. We are using the autogenerated password and making it permanent
    for this VM so that it will not change when the VM is rebooted. Fill in the Netmask
    and Gateway fields as shown in Figure [11-2](#467924_1_En_11_Chapter.xhtml#Fig2)
    and then click the Apply button. Reboot the virtual machine to ensure the settings
    hold. You can now use this IP address to always connect to this virtual machine
    on your workstation or laptop. The only impact would be if you had another virtual
    machine running on this same system with the same IP address.


    Now that the IP address is statically defined, we can connect to it any time the
    VM is up and running. However, working with IP addresses is cumbersome and we
    do not want to involve the network team to create an alias in DNS. To help ourselves
    out, we will modify our local “hosts” file. On Windows, use Explorer to navigate
    to the C:\Windows\System32\drivers\etc directory and open the file named hosts
    in any text editor. One Mac platforms, the hosts file is in the /etc directory.
    Toward the end of the file, add a line similar to the last entry in Listing [11-3](#467924_1_En_11_Chapter.xhtml#PC3).


    ```

    # localhost name resolution is handled within DNS itself.

    #      127.0.0.1       localhost

    #      ::1             localhost

    192.168.56.101      dbamentor

    Listing 11-3

    Hosts Entry

    ```


    The last line of the output is my new entry to the hosts file. It contains my
    IP address and whatever alias I want to use to refer to this machine. I am using
    the alias dbamentor. Save the file, and then ping with that alias, as shown in
    Listing [11-4](#467924_1_En_11_Chapter.xhtml#PC4).


    ```

    C:\Users\bpeasland\Desktop>ping dbamentor -n 3

    Pinging dbamentor [192.168.56.101] with 32 bytes of data:

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Ping statistics for 192.168.56.101:

    Packets: Sent = 3, Received = 3, Lost = 0 (0% loss),

    Approximate round trip times in milli-seconds:

    Minimum = 0ms, Maximum = 0ms, Average = 0ms

    Listing 11-4

    Ping with Hosts Alias

    ```


    I can now use this alias any time I want to connect to the virtual machine. This
    will be much easier to remember than an IP address.


    If I am running the virtual machine on a Mac platform, then I can use the Terminal
    window to establish a Secure Shell (SSH) session to the machine. On Windows, I
    need an SSH client. I often use PuTTY or MobaXterm. Both are free utilities you
    can find by doing a simple Google search. No matter which you use, see if you
    can establish an SSH session to the machine. Listing [11-5](#467924_1_En_11_Chapter.xhtml#PC5)
    shows how I connected with MobaXterm.


    ```

    [bpeasland.winworkstation] ➤ ssh oracle@dbamentor

    Warning: Permanently added ''dbamentor'' (RSA) to the list of known hosts.

    oracle@dbamentor''s password:

    Last login: Tue Jul 24 14:35:22 2018 from 192.168.56.1

    /usr/bin/xauth:  file /home/oracle/.Xauthority does not exist

    [oracle@dbamentor ~]$ hostname

    dbamentor.localdomain

    Listing 11-5

    SSH from MobaXterm

    ```


    The hostname command at the end of the listing shows us that we did in fact connect
    to our virtual machine.


    Now that we have established connectivity from our host operating system, we can
    use any utilities installed on the host to connect to the virtual machine and
    the database running inside it.'
  trans: '

    ## 连接到我们的数据库


    在本书前面的章节中，我们创建了一台虚拟机并为测试环境构建了一个 Oracle 数据库。虽然我们始终可以使用虚拟机内的终端窗口并像之前那样使用`SQL*Plus`，但如果能从工作站连接到该虚拟机内的
    Oracle 实例将会方便得多。


    ### 配置网络连接


    回顾一下，在第 3 章创建虚拟机时，我们定义了两个网络适配器。其中一个是 NAT 适配器，用于让虚拟机访问外部世界、下载更新等。另一个网络适配器我们定义为“仅主机”（host-only）适配器，我们将通过它进行连接。在虚拟机的终端窗口中，输入`ip
    addr`命令；该命令将显示每个网络设备的 IP 地址。在我的虚拟机上，IP 地址如清单 11-1 所示。你的虚拟机地址可能略有不同，请记下你的具体设置。


    ```

    [oracle@oracle122 ~]$ ip addr

    1: lo:  mtu 65536 qdisc noqueue state UNKNOWN

    link/loopback 00:00:00:00:00:00 brd 00:00:00:00:00:00

    inet 127.0.0.1/8 scope host lo

    valid_lft forever preferred_lft forever

    inet6 ::1/128 scope host

    valid_lft forever preferred_lft forever

    2: enp0s3:  mtu 1500 qdisc pfifo_fast state UP qlen 1000

    link/ether 08:00:27:6f:30:32 brd ff:ff:ff:ff:ff:ff

    inet 10.0.2.15/24 brd 10.0.2.255 scope global dynamic enp0s3

    valid_lft 75838sec preferred_lft 75838sec

    inet6 fe80::d629:df95:c55b:252c/64 scope link

    valid_lft forever preferred_lft forever

    3: enp0s8:  mtu 1500 qdisc pfifo_fast state UP qlen 1000

    link/ether 08:00:27:d6:0e:5c brd ff:ff:ff:ff:ff:ff

    inet 192.168.56.101/24 brd 192.168.56.255 scope global dynamic enp0s8

    valid_lft 712sec preferred_lft 712sec

    inet6 fe80::777e:9533:78fd:6446/64 scope link

    valid_lft forever preferred_lft forever

    清单 11-1

    虚拟机 IP 地址

    ```


    我们需要寻找两个 IP 地址，一个以`10.0`开头，另一个以`192.168`开头。前者用于我们的 NAT 适配器，后者用于我们的仅主机适配器，这也是本章我们最关心的那个。在我的输出中，IP
    地址是`192.168.56.101`，但你的地址可能略有不同。我的虚拟机运行在 Windows 工作站上，因此我将启动一个命令窗口（`CMD`）。在 Mac
    上，你会启动一个终端窗口。在排除网络连接故障时，人们通常首先会问：“你能 ping 通它吗？”清单 11-2 给出了我的虚拟机的答案。


    ```

    C:\Users\bpeasland\Desktop>ping 192.168.56.101 -n 3

    Pinging 192.168.56.101 with 32 bytes of data:

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Ping statistics for 192.168.56.101:

    Packets: Sent = 3, Received = 3, Lost = 0 (0% loss),

    Approximate round trip times in milli-seconds:

    Minimum = 0ms, Maximum = 0ms, Average = 0ms

    清单 11-2

    Ping 虚拟机

    ```


    从我的工作站上，可以成功 ping 通虚拟机。如果你遇到问题，请再次检查你的 IP 地址。可能有多个以`192.168`开头的地址，因此你可能需要逐一尝试。同时检查虚拟机的设置，确保其中一个网络适配器是作为仅主机适配器创建的。


    ### 设置静态 IP


    虚拟机当前配置的问题在于，每次虚拟机启动时 IP 地址都可能改变。为了让配置更固定，在 Linux 虚拟机中，转到 应用程序 ➤ 系统工具 ➤ 设置。然后，点击网络图标。你应该会看到一个类似于图
    11-1 的窗口。


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig1_HTML.jpg](img/467924_1_En_11_Fig1_HTML.jpg)


    图 11-1: 网络设置


    选择适配器（`enp0s8`）并确保 IPv4 地址以`192.168`开头。如果地址不正确，你可能需要选择另一个以太网适配器。在右下角，点击齿轮图标以更改此适配器的设置。将出现一个类似于图
    11-2 的对话框。


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig2_HTML.jpg](img/467924_1_En_11_Fig2_HTML.jpg)


    图 11-2: 手动设置 IP 地址


    在“地址”下拉菜单中，选择“手动”。你现在将能够输入你的 IP 地址。我们正在使用自动生成的密码并将其永久设置为此虚拟机的地址，这样在虚拟机重启时它就不会改变。如图
    11-2 所示填写“子网掩码”和“网关”字段，然后点击“应用”按钮。重启虚拟机以确保设置生效。你现在可以始终使用此 IP 地址从你的工作站或笔记本电脑连接到此虚拟机。唯一可能的影响是，如果在同一系统上运行的另一台虚拟机使用了相同的
    IP 地址。


    ### 修改 Hosts 文件


    现在 IP 地址是静态定义的，只要虚拟机处于启动并运行状态，我们随时都可以连接到它。然而，使用 IP 地址操作起来很麻烦，而且我们不想麻烦网络团队在 DNS
    中创建别名。为了方便自己，我们将修改本地的“hosts”文件。在 Windows 上，使用资源管理器导航到`C:\Windows\System32\drivers\etc`目录，并使用任何文本编辑器打开名为`hosts`的文件。在
    Mac 平台上，`hosts`文件位于`/etc`目录。在文件末尾附近，添加一行类似于清单 11-3 中最后一条目的内容。


    ```

    # localhost name resolution is handled within DNS itself.

    #      127.0.0.1       localhost

    #      ::1             localhost

    192.168.56.101      dbamentor

    清单 11-3

    Hosts 文件条目

    ```


    输出的最后一行是我对`hosts`文件的新条目。它包含我的 IP 地址和我希望用来指代这台机器的任何别名。我使用的别名是`dbamentor`。保存文件，然后使用该别名进行
    ping 测试，如清单 11-4 所示。


    ```

    C:\Users\bpeasland\Desktop>ping dbamentor -n 3

    Pinging dbamentor [192.168.56.101] with 32 bytes of data:

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Reply from 192.168.56.101: bytes=32 time<1ms TTL=64

    Ping statistics for 192.168.56.101:

    Packets: Sent = 3, Received = 3, Lost = 0 (0% loss),

    Approximate round trip times in milli-seconds:

    Minimum = 0ms, Maximum = 0ms, Average = 0ms

    清单 11-4

    使用 Hosts 别名进行 Ping 测试

    ```


    我现在可以在任何想要连接到虚拟机时使用这个别名。这比记住一个 IP 地址要容易得多。


    ### 建立 SSH 连接


    如果我在 Mac 平台上运行虚拟机，那么我可以使用终端窗口建立到该机器的安全外壳（SSH）会话。在 Windows 上，我需要一个 SSH 客户端。我经常使用`PuTTY`或`MobaXterm`。这两个都是免费的实用程序，通过简单的
    Google 搜索就能找到。无论你使用哪一个，看看是否能建立到该机器的 SSH 会话。清单 11-5 展示了我如何使用`MobaXterm`进行连接。


    ```

    [bpeasland.winworkstation] ➤ ssh oracle@dbamentor

    Warning: Permanently added ''dbamentor'' (RSA) to the list of known hosts.

    oracle@dbamentor''s password:

    Last login: Tue Jul 24 14:35:22 2018 from 192.168.56.1

    /usr/bin/xauth:  file /home/oracle/.Xauthority does not exist

    [oracle@dbamentor ~]$ hostname

    dbamentor.localdomain

    清单 11-5

    从 MobaXterm 进行 SSH 连接

    ```


    清单末尾的`hostname`命令向我们表明，我们确实连接到了我们的虚拟机。


    既然我们已经从主机操作系统建立了连接，我们就可以使用主机上安装的任何实用程序来连接到虚拟机及其内部运行的数据库。

    '
- fmt: '## SQL*Plus


    Many examples in this book have already used SQL*Plus, a command-line utility
    to start and stop an Oracle instance and to issue SQL statements to the database.
    There are other query tools, as we will see in this chapter, but SQL*Plus is always
    available. SQL*Plus is installed when we install the database software. At the
    very least, we can establish an SSH connection to the database server and then
    use SQL*Plus. Because SQL*Plus is a command-line utility, even a text-based SSH
    session will be sufficient.


    ### Tip


    Learn how to use SQL*Plus. It is always available to you.


    If you install the Oracle Client software on your workstation, SQL*Plus is included
    there as well. You would have to set up a TNS alias, as shown in Chapter [9](#467924_1_En_9_Chapter.xhtml),
    to connect to a database on any other machine.


    SQL*Plus is Oracle’s standard for “if it works”. Any query tool is just an application
    that submits SQL statements to the database and displays the results. There have
    been many times that a service request has been filed with Oracle Support where
    it looks like the Oracle database is not returning the correct results in some
    other query tool. The person who filed the service request gives Oracle the SQL
    statement and some sample data and shows how the result set returned from the
    database looks incorrect. If you ever run into this situation, Oracle will always
    ask you to reproduce the issue in SQL*Plus. If it works in SQL*Plus, then it is
    a problem with the query tool, not the database engine. If the SQL statement produces
    the wrong results in SQL*Plus, then Oracle Support needs to address the problem
    and help with a resolution.


    SQL*Plus has many features that people may not be aware of. You can save your
    SQL statement to a text file. You can run a file that contains SQL statements
    to script out multiple actions. SQL*Plus can even generate formatted reports.


    One hidden feature in SQL*Plus that many people are not aware of is the ability
    to edit your command. SQL*Plus keeps the current command in a buffer. Consider
    the example in Listing [11-6](#467924_1_En_11_Chapter.xhtml#PC6) where the database
    administrator attempted to create a tablespace, but an error occurred. It should
    be obvious that the DBA specified the tablespace’s size twice in lines 3 and 4.


    ```

    SQL> create tablespace apps_ts

    2  datafile ''/u01/app/oracle/oradata/orcl/apps_ts01.dbf''

    3  size 5g

    4  size 10g

    5  extent management local auto;

    size 10g

    *

    ERROR at line 4:

    ORA-02180: invalid option for CREATE TABLESPACE

    Listing 11-6

    Incorrect SQL*Plus Command

    ```


    The DBA wants to remove line 4 from this command without having to retype the
    SQL statement anew. The DBA can type the lowercase letter `l` to list the contents
    of the buffer, as shown in Listing [11-7](#467924_1_En_11_Chapter.xhtml#PC7).


    ```

    SQL> l

    1  create tablespace apps_ts

    2  datafile ''/u01/app/oracle/oradata/orcl/apps_ts01.dbf''

    3  size 5g

    4  size 10g

    5* extent management local auto

    Listing 11-7

    Listing the SQL*Plus Buffer

    ```


    Notice the last line has an asterisk in it. The line with the asterisk is the
    current line. If we want to remove line 4, we need to make that the current line
    and then issue the command to delete that line. We simply type the line number
    of interest and hit the Enter key and then type `del` to remove our current line.
    Once the line has been removed, we can type the forward slash to execute the contents
    of the buffer, all shown in Listing [11-8](#467924_1_En_11_Chapter.xhtml#PC8).


    ```

    SQL> 4

    4* size 10g

    SQL> del

    SQL> l

    1  create tablespace apps_ts

    2  datafile ''/u01/app/oracle/oradata/orcl/apps_ts01.dbf''

    3  size 5g

    4* extent management local auto

    SQL> /

    extent management local auto

    *

    ERROR at line 4:

    ORA-02180: invalid option for CREATE TABLESPACE

    Listing 11-8

    Deleting a Line in the SQL*Plus Buffer

    ```


    When the contents of the buffer was listed, we can see the line with `size 10g`
    was removed. When the statement was executed again, another error was raised.
    The problem is that Oracle does not like the keyword `auto`. It should be `autoallocate`
    instead. We can see from the asterisk that our current line is the one with the
    error. We can change the word in the current line and re-execute the command,
    shown in Listing [11-9](#467924_1_En_11_Chapter.xhtml#PC9).


    ```

    SQL> c /auto/autoallocate

    4* extent management local autoallocate

    SQL> /

    Tablespace created.

    Listing 11-9

    Changing Text in SQL*Plus Buffer

    ```


    The `c` command will change, or perform a text substitution in the current line.
    The first character is your delimiter. In Listing [11-9](#467924_1_En_11_Chapter.xhtml#PC9),
    the delimiter is the forward slash, but you can choose any character, especially
    if the text you are trying to change contains the forward slash. After the delimiter
    is the text to change, followed by the delimiter again, then followed by the corrected
    text. Once `auto` is changed to `autoallocate`, the next forward slash executes
    the contents of the buffer and the tablespace is created successfully.


    This buffer in SQL*Plus helps the DBA who needs to keep an eye on things over
    time. Type the command and see the output. Then after a period of time, just type
    the forward slash to execute the buffer again. In the example in Listing [11-10](#467924_1_En_11_Chapter.xhtml#PC10),
    the DBA needed to know the count of current sessions in the instance and watch
    the count change over time. Instead of typing in the command repeatedly, the DBA
    just pressed the forward slash for the next execution.


    ```

    SQL> select count(*) as num_sessions from v$session where username is not null;

    NUM_SESSIONS


    SQL> /

    NUM_SESSIONS


    SQL> /

    NUM_SESSIONS


    Listing 11-10

    Multiple Buffer Executions in SQL*Plus

    ```


    If the DBA will need to run this statement in the future, the DBA may desire to
    save it to a script. The `save` command will write the contents of the buffer
    to a file. It is common practice to use the `.sql` file extension for SQL scripts.
    If the path is not specified, the file will be saved in the local directory. The
    `@` symbol is used to tell SQL*Plus to load the contents of that file into the
    buffer and execute it. In Listing [11-11](#467924_1_En_11_Chapter.xhtml#PC11),
    we can see the contents of the buffer. We save that SQL statement to a file and
    then execute the file as a script.


    ```

    SQL> l

    1* select count(*) as num_sessions from v$session where username is not null

    SQL> save num_sessions.sql

    Created file num_sessions.sql

    SQL> @num_sessions.sql

    NUM_SESSIONS


    Listing 11-11

    Saving Buffer in SQL*Plus

    ```


    SQL*Plus is a valuable tool for the Oracle DBA. It is always available to you,
    and once you learn to leverage the power of its buffer as we have seen in the
    previous examples, you will find it to be a much better tool than just some command-line
    interaction with the database engine.'
