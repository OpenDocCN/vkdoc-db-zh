- fmt: '## Backup and Recovery Documentation


    Oracle has documented how to perform backup and recovery in the `Database Backup
    and Recovery User’s Guide`. Every Oracle database administrator should read this
    guide from front to back at least twice. To access the `Database Backup and Recovery
    User’s Guide`, point a web browser to `https://docs.oracle.com` and click the
    `Database` button. Then click the `Oracle Database` button, click the drop-down
    menu, and select your database’s version. Each version typically introduces changes
    and provides new features for backup and recovery. It is important for the Oracle
    DBA to read this document when a new version is introduced. With your version
    selected, click the `Administration` link in the `Topics` section. If you scroll
    down a bit, you will see a section titled `Backup and Recovery`. This section
    should contain two manuals, the `Database Backup and Recovery Reference` and the
    `Database Backup and Recovery User’s Guide`. This chapter will cover both the
    Oracle 12.2 and 18c versions of the database.


    The `Database Backup and Recovery Reference` contains all the details on the `RMAN`
    backup commands. You will come across many examples of `RMAN` commands. On occasion,
    the example may come close to what you want to do but be a bit different. The
    `Backup and Recovery Reference` details what each command can do and lists all
    of its options. Take time to familiarize yourself with this manual. The idea is
    not to know everything in the manual but to have an idea of what it contains.
    Some day in the future you may need to find something in this manual.


    The `Database Backup and Recovery User’s Guide` is the main one to read. This
    document contains a lot of information on how to use Oracle’s utilities to back
    up and recover your databases, including `RMAN`, `Flashback Database`, and `user-managed
    backup and recovery`.


    All readers of this book are strongly encouraged to read the `Backup and Recovery
    User’s Guide`. This chapter will not cover nearly as much information as what
    Oracle provides in that guide. Not only will you learn things when you read that
    manual, but pay attention to what is in there and where it is located. Take note
    of the Table of Contents to learn how the document is organized. Like all of the
    Oracle documentation, you will need to refer to it at some later date.


    Early on in the `Backup and Recovery User’s Guide`, you may spot a statement that
    people who have not read this book may not think twice about. In Chapter 1 of
    the `Backup and Recovery User’s Guide`, it states “As a backup administrator,
    your primary job is making and monitoring backups for data protection.” Readers
    of this book know that the primary job is to get our database up and running and
    recover from a failure. Backups are not your primary job; recovering from failures
    is. Backups are a means to that end.


    ## Backup Types


    Oracle databases have two different classifications when talking about backup
    types. The first classification is the “temperature” of the backups. The second
    classification is the management type of the backup.


    ### Hot and Cold Backups


    Backups are either `hot` backups or `cold` backups. The temperature is used to
    denote if the database is open and available for business (`hot`) while the backup
    is performed or is down (`cold`) while the backup is taken. In today’s `24×7`
    world, `cold` backups are very rare for production databases. `Cold` backups are
    great because they are the easiest to implement and the easiest to recover from.
    However, with the demand for constant availability, we often need to rely on `hot`
    backups.


    A database consists of files on disks. When backing up a database, a copy of that
    file is written to a backup destination. The bigger the files and the bigger the
    database, the longer it takes to complete the backup. The problem with a database
    is that it is a living, breathing entity. Transactions are continually occurring
    and modifying the database’s data files. After the backup has started, but before
    it has yet to complete, a transaction may modify files that are already backed
    up, and modify files that have yet to be backed up. This will result in an inconsistent
    backup. One mechanism we have available to handle this is to stop all transactions,
    meaning perform a `cold` backup. With a `cold` backup, we know that all the files
    are transactionally consistent with a specific point in time.


    If we need to perform `hot` backups, we need another mechanism to be able to resolve
    any transaction inconsistencies that occurred while the data files were being
    copied to the backup destination. In Oracle, `hot` backups require us to configure
    the database for `archivelog` mode. In `archivelog` mode, the Oracle database
    will maintain copies of the transaction logs in a special location on disk. We
    perform a `hot` backup. When recovering the database from that `hot` backup, Oracle
    uses the transactions in the log files to resolve any inconsistencies. `Hot` backups
    let us protect our database while keeping it open for business, but it comes at
    the cost of maintaining transaction logs.'
