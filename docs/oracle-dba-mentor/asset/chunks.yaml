    Validating logfiles...

    Patch 28163133 apply: SUCCESS

    logfile: /u01/app/oracle/cfgtoollogs/sqlpatch/28163133/22313390/28163133_apply_ORCL_2018Sep11_23_08_53.log
    (no errors)

    SQL Patching tool complete on Tue Sep 11 23:09:54 2018

    Listing 17-9

    Datapatch Utility

    ```


    Datapatch will connect to the database and apply the current patch. We want to
    see the message “Patch *xxxxx* apply:SUCCESS” near the end of the output.


    Any time we apply patches and update the internal part of the database, we run
    the risk of making some data dictionary objects become invalid. We can run the
    utlrp.sql supplied script, shown in Listing [17-10](#467924_1_En_17_Chapter.xhtml#PC10),
    to recompile any invalid objects.


    ```

    [oracle@dbamentor 28163133]$ sqlplus /nolog

    SQL*Plus: Release 12.2.0.1.0 Production on Tue Sep 11 23:12:06 2018

    Copyright (c) 1982, 2016, Oracle.  All rights reserved.

    SQL> connect / as sysdba

    Connected.

    SQL> @?/rdbms/admin/utlrp.sql

    PL/SQL procedure successfully completed.

    Listing 17-10

    Running utlrp.sql

    ```


    I omitted output in the middle of the script invocation and the end of execution
    in Listing [17-10](#467924_1_En_17_Chapter.xhtml#PC10) for brevity.


    Congratulations! The patch has now been applied without any issues. The only thing
    that remains is to verify that the database thinks it is patched. We do this by
    querying a DBA view, as shown in Listing [17-11](#467924_1_En_17_Chapter.xhtml#PC11).


    ```

    SQL> select description,status from dba_registry_sqlpatch;

    DESCRIPTION                                        STATUS

    -------------------------------------------------- ----------

    DATABASE JUL 2018 RELEASE UPDATE 12.2.0.1.180717   SUCCESS

    Listing 17-11

    Querying DBA_REGISTRY_SQLPATCH

    ```


    We can see from the DBA_REGISTRY_SQLPATCH view that the RU was successfully applied
    to this database. There have been occurrences where the opatch utility noted everything
    was successful, as did datapatch, yet this view was not populated correctly. If
    you use Oracle Enterprise Manager (EM) to monitor your database, EM will query
    this view to determine if the most recent patch was applied. Querying this view
    yourself at the end of the patch is a great way to ensure that EM will get the
    proper information.


    ## Moving On


    Patching your Oracle database is necessary to fix bugs in the database’s operation
    and to close security holes and help keep the data safe. You should be applying
    the quarterly CPU patches for your database regularly. Never put an Oracle database
    into production status unless it has the latest and greatest CPU applied for your
    version.


    As was stated in this chapter, the quarterly CPU patches are released for fully
    supported versions of Oracle. At some point, no matter who you are, your current
    version will go out of date and Oracle Corporation will stop releasing patches
    for it. Every database administrator will have to upgrade their database to a
    newer version at some point in their career. The next chapter discusses various
    upgrade techniques.


    # 18. Upgrades


    After a database is created for the first time, the database administrator will
    maintain it by applying regular quarterly patches, as we saw in the previous chapter.
    The DBA may also have to apply, under the direction of Oracle Support, other patches
    to fix bugs. After some period of time has passed, maybe months or even years,
    the database administrator will need to upgrade the database to a newer version.
    This chapter will discuss the different upgrade paths and provide some best practices.'
