  trans: '## 容量规划


    在我们开始之前，我们需要明确 `容量规划` 的定义。这个术语的名称可能显而易见，但我发现不同的人对它可能有不同的理解。在本章深入学习之前，这个术语需要被明确定义，以确保我们都在同一页面上，双关语无意冒犯。


    所有计算机系统都有一套执行工作的资源。在大多数情况下，我主要关注的资源只有 CPU 使用率、内存使用率和磁盘使用率。后者可以进一步细分为已使用的磁盘量，并由此推论出空闲磁盘空间量，以及处理请求所花费的时间。计算机系统中当然还有其他资源，但
    CPU、内存和磁盘是最重要的三大资源。


    当系统收到请求时，资源就会被使用。一旦请求完成，资源就可用于处理下一个请求。不幸的是，系统上的资源是有限的。对任何一个资源的需求过多，性能就会受到影响。如果我的请求占用了所有
    CPU 资源，你的请求就不得不等待，而你完全有理由抱怨系统运行缓慢。资源不仅有限，而且需要同时被多个用户和进程共享。你作为数据库管理员的职责，就是确保最终用户有足够的资源，使他们不会察觉到任何性能问题。换句话说，你需要确保有足够的
    `容量` 来承载工作负载。


    数据库管理员的部分职责是确定系统初始上线时需要多少资源。换一种说法，DBA 需要 `规划` 资源利用率。在初始上线之后，DBA 需要预测未来的资源利用率。资源需求随时间增长是很常见的情况。DBA
    需要为未来的增长 `做计划`，以便在需求产生之前就能提供相应的资源。


    `容量规划` 是一种活动，旨在确保当前和未来有足够的资源来满足预期的需求。这是一种积极主动的做法。如果你发现自己是在被动模式下进行容量规划，那可能为时已晚，并且可能会失去客户。


    对我而言，容量规划最困难的部分不是预测未来，而是为一个未知的产品设置系统并进行初始上线。预测未来是查看当前状况，乘以一个最佳估算系数，然后看图表上的趋势线指向何处。这是一项简单的任务。如果产品是已知的，那么你可以查看该产品在以往部署中的资源需求。如果产品来自第三方，供应商通常会提供资源建议以确保其产品正常运行。


    为一个未知的系统进行首次设置更为困难，因为我们对它的资源利用率知之甚少。管理层的某人可能会说这样的话：“我们预计第一个月有 10 万用户，六个月内达到 100
    万用户。”这些数字是有一些参考价值，但它们并没有告诉我们用户会消耗多少 CPU 或内存。简而言之，这是一个未知的系统，其资源需求也是未知的。对于未知系统，DBA
    的最佳行动方案是：首先学习所有已定义的已知需求。然后，尝试参考他们过去参与过的、可能具有类似细节的其他系统，并以其作为指导。如果没有任何类似的系统存在，DBA
    只能做出一个初步的猜测。无论哪种情况，DBA 都需要让团队中的其他人知道，初步的估计缺乏足够的背景信息来保证其高度可信。


    多年来，我见过人们提出类似这样的问题：“支持一百万用户需要多少内存？”我很抱歉要让他们失望了，但并没有一个神奇的公式或表格能回答这个问题。我的系统中的一百万应用用户，可能与另一个系统中的一百万用户有着完全不同的资源需求。


    由于这是一个未知的系统，在投入生产环境之前，它需要被开发和测试。在开发期间，DBA 应该关注资源利用率，以确定初步的猜测是否仍然有效，还是需要重新定义。一旦系统进入测试阶段，DBA
    应该观察系统在负载下的表现。自动化测试工具很有帮助，它们可以模拟大量并发用户而无需真实人员的参与。你可以使用 `Swingbench` 或 `HammerDB`
    来模拟测试负载，但请记住，这些模拟可能并不能代表你的应用程序。我过去曾使用 `JMeter` 来测试一个基于 Web 的应用程序，模拟多个用户。


    如果可能的话，让一些真实用户来操作应用程序。我曾经时不时地寻求整个 IT 部门的帮助，让他们同时操作应用程序，即使只有 10 或 15 分钟。这样做能让我在真实世界接触系统之前，更好地了解资源在实际环境中的利用情况。'
- fmt: '## Enterprise Manager


    If you do not already have it installed in your infrastructure, I strongly encourage
    you to get Oracle Enterprise Manager (EM) up and running. You will be happy you
    took the time to install, configure, and start using EM. Entire books have been
    written about EM, so we will not cover the details here. If you do not have EM
    in your environment, this chapter will show you some of the information at your
    fingertips, which may convince you to add it to your DBA infrastructure in the
    near future.


    Enterprise Manager is constantly looking at your system and capturing information
    about its configuration as well as its resource utilization and performance of
    both the database and the operating system. As we will see in this chapter, you
    can certainly create your own routines to capture resource utilization, but as
    the saying goes, why reinvent the wheel? Let’s look at examples of the information
    EM is gathering for us, out of the box with no additional customization. In EM
    Cloud Control, you can go to `Targets` ➤ `Hosts` and then click a specific server
    of interest. Scroll down the summary screen a bit and you can see some charts
    showing the CPU and memory utilization of that server, as shown in Figure [19-1](#467924_1_En_19_Chapter.xhtml#Fig1).


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig1_HTML.png](images/467924_1_En_19_Chapter/467924_1_En_19_Fig1_HTML.png)


    Figure 19-1 EM utilization summaries


    The two charts show us the CPU and memory utilization of this server. When we
    initially land on this page, the charts default to the last four hours of activity.
    Four hours is not sufficient for capacity planning. Instead, this view is used
    to help spot immediate performance problems. If you want to see the information
    over a longer period of time, you can click the `Day` tab or `Week` tab. Figure
    [19-2](#467924_1_En_19_Chapter.xhtml#Fig2) shows the same server looking at the
    past week.


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig2_HTML.jpg](images/467924_1_En_19_Chapter/467924_1_En_19_Fig2_HTML.jpg)


    Figure 19-2 EM CPU utilization in the past week


    One of the more interesting charts is the side-by-side view, as shown in Figure
    [19-3](#467924_1_En_19_Chapter.xhtml#Fig3).


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig3_HTML.jpg](images/467924_1_En_19_Chapter/467924_1_En_19_Fig3_HTML.jpg)


    Figure 19-3 EM CPU utilization side-by-side view


    The chart in Figure [19-3](#467924_1_En_19_Chapter.xhtml#Fig3) shows us all three
    charts side by side, as the name suggests. Unfortunately for this chapter, the
    data here only goes back seven days. One week is hardly enough historical data
    to help spot trends in resource utilization. The point is that Enterprise Manager
    is capturing this information for us. We just need to harness it. For accurate
    capacity planning, we need as many data points as possible. A week’s or even a
    month’s worth of data may not be sufficient. I recommend at least a year’s worth
    of metrics, however, I tend to keep mine around for the life of the system.


    While in EM still looking at that same host, select `Host` ➤ `Monitoring` ➤ `CPU
    Details`. This takes us deeper into EM’s metrics for that resource on that server,
    as shown in Figure [19-4](#467924_1_En_19_Chapter.xhtml#Fig4).


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig4_HTML.jpg](images/467924_1_En_19_Chapter/467924_1_En_19_Fig4_HTML.jpg)


    Figure 19-4 EM CPU utilization details


    In the chart in Figure [19-4](#467924_1_En_19_Chapter.xhtml#Fig4), we can see
    the CPU utilization over the past hour. Click the `CPU Utilization` hyperlink
    in the chart’s legend to be taken to the next screen, shown in Figure [19-5](#467924_1_En_19_Chapter.xhtml#Fig5).
    By default, the view shows the last 24 hours, but here the `View Data` drop-down
    menu near the top was changed to 31 days.


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig5_HTML.png](images/467924_1_En_19_Chapter/467924_1_En_19_Fig5_HTML.png)


    Figure 19-5 EM CPU utilization in the last 31 days


    Now we are getting a better idea of the historical CPU utilization for this server.
    We can see from the chart in Figure [19-5](#467924_1_En_19_Chapter.xhtml#Fig5)
    that the CPU utilization shows a relatively steady state of consumption over the
    past month. Sure, there are ups and downs within each day, but overall the chart
    shows a horizontal, linear pattern. We do not see any spikes, and the chart is
    not showing growth over time. That being said, arguably, 31 days’ worth of data
    is not enough to properly determine capacity planning for the future.


    Enterprise Manager stores the metric values for CPU utilization in its repository.
    I used the query in Listing [19-1](#467924_1_En_19_Chapter.xhtml#PC1) to obtain
    the CPU utilization of a server from the Enterprise Manager repository.


    ```sql

    select rollup_timestamp,trunc(average,2) as host_avg,

    trunc(maximum,2) as host_max

    from sysman.mgmt$metric_daily

    where metric_column=''cpuUtil''

    and target_name=''myhost.acme.com'' and metric_label=''Load''

    order by rollup_timestamp;

    ```

    Listing 19-1 EM CPU Utilization Repository Query


    If you run the query above in your EM repository database, you can see how much
    data is in there. Typically, it will be 90 days’ worth or less. Note that this
    is your EM repository database, not the database on that server.


    It is a simple operation to pull out the data values with that query and store
    them in an Excel spreadsheet. By offloading to Excel, you can keep the data points
    around much longer than EM will in its repository. You can also create charts
    with this information. Figure [19-6](#467924_1_En_19_Chapter.xhtml#Fig6) shows
    a simple chart I created from that same query storing the data values over time.


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig6_HTML.jpg](images/467924_1_En_19_Chapter/467924_1_En_19_Fig6_HTML.jpg)


    Figure 19-6 CPU trendline


    In the chart in Figure [19-6](#467924_1_En_19_Chapter.xhtml#Fig6), I added a linear
    trendline forecasting the resource utilization over the next three years. To do
    so, I just right-clicked the line graph, chose `Add Trendline`, and modified the
    trendline’s properties to forecast forward 1,095 days, about three years.


    This was not that difficult. Enterprise Manager is already capturing this data
    for me. All I did was store it in Excel and create a quick and easy chart. I now
    have a good idea of what my needs will be in the future. The chart used seven
    years’ worth of data, which means I also have a high degree of confidence in my
    forecast.


    Remember in Chapter [17](#467924_1_En_17_Chapter.xhtml) we discussed knowing your
    audience? Charts like the one shown in Figure [19-6](#467924_1_En_19_Chapter.xhtml#Fig6)
    are easy for most people to understand. The blue line is the average CPU consumption
    per day. The red line is the maximum CPU consumption per day. The trendlines show
    our forecast. You do not need to be an Oracle expert to get the idea. IT managers
    and other members of the IT team can instantly benefit from this easy analysis.


    Similarly, we can obtain the memory usage of a monitored server from the EM repository
    with the query in Listing [19-2](#467924_1_En_19_Chapter.xhtml#PC2).


    ```sql

    select rollup_timestamp,trunc(average,2) as host_avg,

    trunc(maximum,2) as host_max

    from sysman.mgmt$metric_daily

    where metric_column=''usedLogicalMemoryPct''

    and target_name=''myhost.acme.com''

    order by rollup_timestamp;

    ```

    Listing 19-2 EM Memory Utilization Repository Query


    Again, we copy the data points from the query above to an Excel spreadsheet and
    graph over time. The chart in Figure [19-7](#467924_1_En_19_Chapter.xhtml#Fig7)
    shows memory usage from a different production system.


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig7_HTML.jpg](images/467924_1_En_19_Chapter/467924_1_En_19_Fig7_HTML.jpg)


    Figure 19-7 Memory trendline'
  raw: '## Enterprise Manager


    If you do not already have it installed in your infrastructure, I strongly encourage
    you to get Oracle Enterprise Manager (EM) up and running. You will be happy you
    took the time to install, configure, and start using EM. Entire books have been
    written about EM, so we will not cover the details here. If you do not have EM
    in your environment, this chapter will show you some of the information at your
    fingertips, which may convince you to add it to your DBA infrastructure in the
    near future.


    Enterprise Manager is constantly looking at your system and capturing information
    about its configuration as well as its resource utilization and performance of
    both the database and the operating system. As we will see in this chapter, you
    can certainly create your own routines to capture resource utilization, but as
    the saying goes, why reinvent the wheel? Let’s look at examples of the information
    EM is gathering for us, out of the box with no additional customization. In EM Cloud
    Control, you can go to Targets ➤ Hosts and then click a specific server of interest.
    Scroll down the summary screen a bit and you can see some charts showing the CPU
    and memory utilization of that server, as shown in Figure [19-1](#467924_1_En_19_Chapter.xhtml#Fig1).


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig1_HTML.png](images/467924_1_En_19_Chapter/467924_1_En_19_Fig1_HTML.png)


    Figure 19-1


    EM utilization summaries


    The two charts show us the CPU and memory utilization of this server. When we
    initially land on this page, the charts default to the last four hours of activity.
    Four hours is not sufficient for capacity planning. Instead, this view is used
    to help spot immediate performance problems. If you want to see the information
    over a longer period of time, you can click the Day tab or Week tab. Figure [19-2](#467924_1_En_19_Chapter.xhtml#Fig2)
    shows the same server looking at the past week.


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig2_HTML.jpg](images/467924_1_En_19_Chapter/467924_1_En_19_Fig2_HTML.jpg)


    Figure 19-2


    EM CPU utilization in the past week


    One of the more interesting charts is the side-by-side view, as shown in Figure
    [19-3](#467924_1_En_19_Chapter.xhtml#Fig3).


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig3_HTML.jpg](images/467924_1_En_19_Chapter/467924_1_En_19_Fig3_HTML.jpg)


    Figure 19-3


    EM CPU utilization side-by-side view


    The chart in Figure [19-3](#467924_1_En_19_Chapter.xhtml#Fig3) shows us all three
    charts side by side, as the name suggests. Unfortunately for this chapter, the
    data here only goes back seven days. One week is hardly enough historical data
    to help spot trends in resource utilization . The point is that Enterprise Manager
    is capturing this information for us. We just need to harness it. For accurate
    capacity planning, we need as many data points as possible. A week’s or even a
    month’s worth of data may not be sufficient. I recommend at least a year’s worth
    of metrics, however, I tend to keep mine around for the life of the system.


    While in EM still looking at that same host, select Host ➤ Monitoring ➤ CPU Details.
    This takes us deeper into EM’s metrics for that resource on that server, as shown
    in Figure [19-4](#467924_1_En_19_Chapter.xhtml#Fig4).


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig4_HTML.jpg](images/467924_1_En_19_Chapter/467924_1_En_19_Fig4_HTML.jpg)


    Figure 19-4


    EM CPU utilization details


    In the chart in Figure [19-4](#467924_1_En_19_Chapter.xhtml#Fig4), we can see
    the CPU utilization over the past hour. Click the CPU Utilization hyperlink in
    the chart’s legend to be taken to the next screen, shown in Figure [19-5](#467924_1_En_19_Chapter.xhtml#Fig5).
    By default, the view shows the last 24 hours, but here the View Data drop-down
    menu near the top was changed to 31 days.


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig5_HTML.png](images/467924_1_En_19_Chapter/467924_1_En_19_Fig5_HTML.png)


    Figure 19-5


    EM CPU utilization in the last 31 days


    Now we are getting a better idea of the historical CPU utilization for this server.
    We can see from the chart in Figure [19-5](#467924_1_En_19_Chapter.xhtml#Fig5)
    that the CPU utilization shows a relatively steady state of consumption over the
    past month. Sure, there are ups and downs within each day, but overall the chart
    shows a horizontal, linear pattern. We do not see any spikes, and the chart is
    not showing growth over time. That being said, arguably, 31 days’ worth of data
    is not enough to properly determine capacity planning for the future.


    Enterprise Manager stores the metric values for CPU utilization in its repository.
    I used the query in Listing [19-1](#467924_1_En_19_Chapter.xhtml#PC1) to obtain
    the CPU utilization of a server from the Enterprise Manager repository.


    ```

    select rollup_timestamp,trunc(average,2) as host_avg,

    trunc(maximum,2) as host_max

    from sysman.mgmt$metric_daily

    where metric_column=''cpuUtil''

    and target_name=''myhost.acme.com'' and metric_label=''Load''

    order by rollup_timestamp;

    Listing 19-1

    EM CPU Utilization Repository Query

    ```


    If you run the query above in your EM repository database, you can see how much
    data is in there. Typically, it will be 90 days’ worth or less. Note that this
    is your EM repository database, not the database on that server.


    It is a simple operation to pull out the data values with that query and store
    them in an Excel spreadsheet. By offloading to Excel, you can keep the data points
    around much longer than EM will in its repository. You can also create charts
    with this information. Figure [19-6](#467924_1_En_19_Chapter.xhtml#Fig6) shows
    a simple chart I created from that same query storing the data values over time.


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig6_HTML.jpg](images/467924_1_En_19_Chapter/467924_1_En_19_Fig6_HTML.jpg)


    Figure 19-6


    CPU trendline


    In the chart in Figure [19-6](#467924_1_En_19_Chapter.xhtml#Fig6), I added a linear
    trendline forecasting the resource utilization over the next three years. To do
    so, I just right-clicked the line graph, chose Add Trendline, and modified the
    trendline’s properties to forecast forward 1,095 days, about three years.


    This was not that difficult. Enterprise Manager is already capturing this data
    for me. All I did was store it in Excel and create a quick and easy chart. I now
    have a good idea of what my needs will be in the future. The chart used seven
    years’ worth of data, which means I also have a high degree of confidence in my
    forecast.


    Remember in Chapter [17](#467924_1_En_17_Chapter.xhtml) we discussed knowing your
    audience? Charts like the one shown in Figure [19-6](#467924_1_En_19_Chapter.xhtml#Fig6)
    are easy for most people to understand. The blue line is the average CPU consumption
    per day. The red line is the maximum CPU consumption per day. The trendlines show
    our forecast. You do not need to be an Oracle expert to get the idea. IT managers
    and other members of the IT team can instantly benefit from this easy analysis.


    Similarly, we can obtain the memory usage of a monitored server from the EM repository
    with the query in Listing [19-2](#467924_1_En_19_Chapter.xhtml#PC2).


    ```

    select rollup_timestamp,trunc(average,2) as host_avg,

    trunc(maximum,2) as host_max

    from sysman.mgmt$metric_daily

    where metric_column=''usedLogicalMemoryPct''

    and target_name=''myhost.acme.com''

    order by rollup_timestamp;

    Listing 19-2

    EM Memory Utilization Repository Query

    ```


    Again, we copy the data points from the query above to an Excel spreadsheet and
    graph over time. The chart in Figure [19-7](#467924_1_En_19_Chapter.xhtml#Fig7)
    shows memory usage from a different production system.


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig7_HTML.jpg](images/467924_1_En_19_Chapter/467924_1_En_19_Fig7_HTML.jpg)


    Figure 19-7


    Memory trendline'
  trans: '

    ## 企业管理器


    如果您的环境中尚未安装，我强烈建议您尽快让 Oracle 企业管理器 (EM) 运行起来。您会庆幸自己花时间安装、配置并开始使用 EM。关于 EM 的专著可谓汗牛充栋，因此我们在此不再赘述其细节。如果您的环境里没有
    EM，本章将向您展示一些唾手可得的信息，这或许能让您信服，在不久的将来将其纳入您的 DBA 基础架构。


    企业管理器会持续监控您的系统，并捕获有关其配置、资源利用率以及数据库和操作系统性能的信息。正如我们将在本章中看到的，您当然可以创建自己的例程来捕获资源利用率，但正如俗话所说，为何要重复造轮子？让我们来看看
    EM 为我们收集的信息示例，这些信息开箱即用，无需额外定制。在 EM 云控制中，您可以转到 `目标` ➤ `主机`，然后单击感兴趣的特定服务器。在摘要屏幕向下滚动一点，您可以看到一些图表，显示该服务器的
    CPU 和内存利用率，如图 19-1 所示。


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig1_HTML.png](img/467924_1_En_19_Fig1_HTML.png)


    图 19-1 EM 资源利用率摘要


    这两张图表向我们展示了该服务器的 CPU 和内存利用率。当我们初次进入此页面时，图表默认显示过去四小时的活动情况。对于容量规划而言，四个小时是不够的。此视图用于帮助发现即时的性能问题。如果您想查看更长时间段的信息，可以单击
    `天` 选项卡或 `周` 选项卡。图 19-2 显示了查看过去一周数据的同一服务器。


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig2_HTML.jpg](img/467924_1_En_19_Fig2_HTML.jpg)


    图 19-2 过去一周的 EM CPU 利用率


    其中一个更有趣的图表是并排视图，如图 19-3 所示。


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig3_HTML.jpg](img/467924_1_En_19_Fig3_HTML.jpg)


    图 19-3 EM CPU 利用率并排视图


    图 19-3 中的图表如其名所示，并排展示了所有三张图表。对本章而言不幸的是，这里的数据只回溯七天。一周的历史数据远远不足以帮助发现资源利用率的趋势。关键在于，企业管理器正在为我们捕获这些信息。我们只需要善加利用。为了进行准确的容量规划，我们需要尽可能多的数据点。一周甚至一个月的数据可能都不够。我建议至少使用一年的指标数据，不过，我倾向于将我的数据保留整个系统生命周期的长度。


    在 EM 中查看同一台主机时，选择 `主机` ➤ `监控` ➤ `CPU 详细信息`。这将带我们更深入地查看 EM 对该服务器上该资源的指标，如图 19-4
    所示。


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig4_HTML.jpg](img/467924_1_En_19_Fig4_HTML.jpg)


    图 19-4 EM CPU 利用率详细信息


    在图 19-4 的图表中，我们可以看到过去一小时的 CPU 利用率。单击图表图例中的 `CPU 利用率` 超链接，将转到下一个屏幕，如图 19-5 所示。默认情况下，视图显示过去
    24 小时的数据，但这里将顶部的 `查看数据` 下拉菜单更改为 31 天。


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig5_HTML.png](img/467924_1_En_19_Fig5_HTML.png)


    图 19-5 过去 31 天的 EM CPU 利用率


    现在我们对于该服务器的历史 CPU 利用率有了更好的了解。从图 19-5 的图表中我们可以看到，过去一个月的 CPU 利用率显示出相对稳定的消耗状态。当然，每天之内有起伏，但总体上图表呈现出一种水平的、线性的模式。我们没有看到任何尖峰，图表也未显示出随时间增长的趋势。话虽如此，可以说，31
    天的数据不足以恰当地确定未来的容量规划。


    企业管理器在其存储库中存储 CPU 利用率的指标值。我使用了清单 19-1 中的查询从企业管理器存储库获取服务器的 CPU 利用率。


    ```sql

    select rollup_timestamp,trunc(average,2) as host_avg,

    trunc(maximum,2) as host_max

    from sysman.mgmt$metric_daily

    where metric_column=''cpuUtil''

    and target_name=''myhost.acme.com'' and metric_label=''Load''

    order by rollup_timestamp;

    ```

    清单 19-1 EM CPU 利用率存储库查询


    如果您在 EM 存储库数据库中运行上述查询，您可以看到其中有多少数据。通常，它会是 90 天或更少的数据。请注意，这是您的 EM 存储库数据库，而不是该服务器上的数据库。


    使用该查询提取数据值并将其存储在 Excel 电子表格中是一个简单的操作。通过卸载到 Excel，您可以将数据点保留的时间远比 EM 在其存储库中保留的时间长得多。您还可以用这些信息创建图表。图
    19-6 显示了我根据同一查询创建的简单图表，用于存储随时间变化的数据值。


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig6_HTML.jpg](img/467924_1_En_19_Fig6_HTML.jpg)


    图 19-6 CPU 趋势线


    在图 19-6 的图表中，我添加了一条线性趋势线，预测未来三年的资源利用率。为此，我只需右键单击折线图，选择 `添加趋势线`，然后修改趋势线的属性，将其预测期设为
    1,095 天，大约三年。


    这并不困难。企业管理器已经在为我捕获这些数据。我所做的只是将其存储在 Excel 中并创建一个快速简便的图表。我现在对未来的需求有了很好的了解。该图表使用了七年的数据，这意味着我对我的预测也有很高的置信度。


    还记得在第 17 章中我们讨论过的了解您的受众吗？像图 19-6 所示的图表对大多数人来说都易于理解。蓝线是每天的平均 CPU 消耗量。红线是每天的最大 CPU
    消耗量。趋势线显示了我们的预测。您无需成为 Oracle 专家就能理解其意。IT 经理和 IT 团队的其他成员可以立即从这种简单的分析中受益。


    同样，我们可以使用清单 19-2 中的查询，从 EM 存储库获取受监控服务器的内存使用情况。


    ```sql

    select rollup_timestamp,trunc(average,2) as host_avg,

    trunc(maximum,2) as host_max

    from sysman.mgmt$metric_daily

    where metric_column=''usedLogicalMemoryPct''

    and target_name=''myhost.acme.com''

    order by rollup_timestamp;

    ```

    清单 19-2 EM 内存利用率存储库查询


    同样，我们将上述查询的数据点复制到 Excel 电子表格，并绘制随时间变化的图表。图 19-7 中的图表显示了来自另一个生产系统的内存使用情况。


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig7_HTML.jpg](img/467924_1_En_19_Fig7_HTML.jpg)


    图 19-7 内存趋势线

    '
- fmt: '# 监控与容量规划图表


    在图[19-7](#467924_1_En_19_Chapter.xhtml#Fig7)的图表中，我们仍然可以看到线性增长，但趋势是向上的。与CPU图表类似，此图表显示了平均每日利用率以及最大每日利用率。在进行容量规划时，我们需要能够处理最大值。我们需要能够处理该资源需求的峰值。


    在Excel中生成的这样一个简单图表，对于预测和解释您的资源需求大有帮助。如果图表显示我将在可预见的未来达到某个资源限制，那么就很容易证明花费额外资金提供更多该资源是合理的。


    与来自Enterprise Manager存储库的CPU和内存查询类似，我们也可以查看以每秒输入/输出操作数衡量的磁盘利用率。清单[19-3](#467924_1_En_19_Chapter.xhtml#PC3)中的查询可用于从EM存储库中获取受监控服务器的这些值。


    ```sql

    select rollup_timestamp,trunc(average,2) as host_avg,

    trunc(maximum,2) as host_max

    from sysman.mgmt$metric_daily

    where metric_column=''totiosmade''

    and target_name=''myhost.acme.com''

    order by rollup_timestamp;

    ```

    **清单 19-3**

    **EM 磁盘利用率存储库查询**


    同样，上面查询的输出很容易写入Excel电子表格，并随时间绘制图表，以显示类似于图[19-8](#467924_1_En_19_Chapter.xhtml#Fig8)的图形。


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig8_HTML.jpg](images/467924_1_En_19_Chapter/467924_1_En_19_Fig8_HTML.jpg)


    **图 19-8**

    **磁盘趋势线**


    图[19-8](#467924_1_En_19_Chapter.xhtml#Fig8)中的图表显示了从一个真实生产系统观察到的、在任意给定日期出现的最大IOPS。图中有一条由Excel生成的趋势线，但我们可以看到大多数数据点都在趋势线之上，并且在许多情况下远高于该趋势线。该图表是能够处理许多不同资源利用峰值的一个很好的例子。该系统多次产生了超过400个IOPS。无论趋势线显示什么，磁盘子系统都需要能够处理图表中的所有那些峰值。


    到目前为止展示的CPU、内存和磁盘利用率图表都是从Enterprise Manager存储库获取的数据。如果您愿意查看，EM还保存着更多的度量指标。我倾向于关注前面提到的“三大”指标，但有时也需要查看其他指标。当选择了服务器目标后，选择
    `Host` ➤ `Monitoring` ➤ `All Metrics` 以查看您可以使用的广泛数据。图[19-9](#467924_1_En_19_Chapter.xhtml#Fig9)仅显示了可选类别中的几个。该列表中的每个项目都可以展开以查看该类别中的度量指标。


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig9_HTML.jpg](images/467924_1_En_19_Chapter/467924_1_En_19_Fig9_HTML.jpg)


    **图 19-9**

    **EM 度量指标类别**


    如前所述，EM会保留一段时间的度量指标，但通常不足以支持容量规划决策。为此，您必须将数据从EM存储库中取出并存储在其他地方。本章中展示的查询可以帮助您开始弄清楚数据在该存储库中的存储位置。如果您没有访问Enterprise
    Manager的权限，请立即搭建一个EM环境。EM已经包含在您的Oracle许可证中，因此您无需额外付费。您也可以使用第三方工具，但可能需要为其支付额外费用。


    ## 数据字典


    在第[14](#467924_1_En_14_Chapter.xhtml)章中，我们探讨了数据字典及其在Oracle数据库中的作用。每个Oracle数据库都会跟踪许多度量指标，并允许您在数据字典中查看。您可能想用于容量规划的关键指标之一是数据库的总体大小。数据字典只会告诉您数据库的当前大小。如果您想保留此信息以随时间绘制图表（正如您对容量规划通常期望的那样），那么您必须将数据存储在表中。在清单[19-4](#467924_1_En_19_Chapter.xhtml#PC4)中，我们创建了一个表来保存数据库中段的已分配总空间和已使用总空间。随后的`INSERT`语句可用于用当前日期的值填充该表。只需安排该`INSERT`语句在Oracle作业中每月运行一次即可。


    ```sql

    CREATE TABLE db_size (

    date_collected  DATE,

    gb_allocated   NUMBER,

    gb_used   NUMBER);

    INSERT INTO db_size

    SELECT sysdate, df.gb_alloc, ds.gb_used

    FROM (SELECT round(sum(bytes)/1024/1024/1024,2) AS gb_alloc

    FROM dba_data_files) df

    JOIN (SELECT round(sum(bytes)/1024/1024/1024,2) AS gb_used

    FROM dba_segments) ds;

    ```

    **清单 19-4**

    **跟踪数据库大小**


    如果我们跟踪随时间推移的增长情况，就可以生成一个类似于图[19-10](#467924_1_En_19_Chapter.xhtml#Fig10)的图表，同样是在Excel中添加了趋势线。


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig10_HTML.png](images/467924_1_En_19_Chapter/467924_1_En_19_Fig10_HTML.png)


    **图 19-10**

    **数据库增长趋势线**


    在图[19-10](#467924_1_En_19_Chapter.xhtml#Fig10)的图表中，我们可以看到这个数据库随时间的增长是非常线性的，这使得生成准确的预测变得容易。我们需要知道的事情之一是容量何时将达到其限制。在为CPU和内存显示的图表中，利用率表示为总可用量的百分比。例如，在图[19-6](#467924_1_En_19_Chapter.xhtml#Fig6)中，CPU利用率超过60%，甚至偶尔接近100%。但图表中显示的没有一天达到100%的标记，所以我们仍有资源可用。在图[19-10](#467924_1_En_19_Chapter.xhtml#Fig10)的图表中，数值以总千兆字节表示。我们需要知道数据库可用的磁盘空间量。如果我们知道磁盘可以容纳20TB的数据，那么当趋势线越过20,000GB线时，我们将耗尽磁盘空间。如果磁盘可以容纳25TB的数据，我们就有更多时间。因为趋势是一致的，我们可以准确预测我们将耗尽磁盘空间的日期。这使我们能够在达到阈值之前提前为服务器购买更多磁盘。


    到目前为止，在本章中，我们已经看到了涵盖CPU、内存和磁盘这三大领域的简单图表，并且我们将磁盘领域细分为IOPS和数据库大小。这四张图是我每月为我的生产数据库系统生成的图表，也是我发现对容量规划最有用的图表。


    Oracle数据字典拥有的度量指标多到您永远无法完全了解其用途。如果本章中的图表不足以满足您的容量规划需求，您应该能够通过查询从数据字典中获取所需的度量指标。然后创建一个表并用数据填充它。确保该表有一个列来显示该度量指标是何时收集的。该列将成为至关重要的列，以便按正确的时间顺序显示度量指标值进行排序。


    如果您想查看数据字典中不同的度量指标，可以从查询`V$SYSSTAT`开始。关于这个视图以及大多数其他`V$`视图需要注意的一点是，统计信息是在实例的整个生命周期内递增的。当实例重新启动时，统计信息将重置为零。'
  raw: 'In the chart in Figure [19-7](#467924_1_En_19_Chapter.xhtml#Fig7), we can
    still see linear growth, but trending upward. Like the CPU chart, this chart shows
    the average daily utilization as well as the maximum daily utilization. When planning
    for capacity, we need to be able to handle the maximum values. We need to be able
    to handle the spikes in demand for that resource.


    Such a simple graph generated in Excel goes a long way toward forecasting and
    explaining your resource needs. If the chart showed I would hit some resource
    limit in the forecasted future, it would be easy to justify spending the additional
    money to provide more of that resource.


    Similar to the CPU and memory queries from the Enterprise Manager repository,
    we can also get a look at the disk utilization as measured in Input/Output Operations
    per Second (IOPS). The query in Listing [19-3](#467924_1_En_19_Chapter.xhtml#PC3)
    can be used to obtain those values for a monitored server in the EM repository.


    ```

    select rollup_timestamp,trunc(average,2) as host_avg,

    trunc(maximum,2) as host_max

    from sysman.mgmt$metric_daily

    where metric_column=''totiosmade''

    and target_name=''myhost.acme.com''

    order by rollup_timestamp;

    Listing 19-3

    EM Disk Utilization Repository Query

    ```


    Again, the output from the query above is easily written to an Excel spreadsheet
    and charted over time to display a graph similar to Figure [19-8](#467924_1_En_19_Chapter.xhtml#Fig8).


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig8_HTML.jpg](images/467924_1_En_19_Chapter/467924_1_En_19_Fig8_HTML.jpg)


    Figure 19-8


    Disk trendline


    The chart in Figure [19-8](#467924_1_En_19_Chapter.xhtml#Fig8) shows the maximum
    IOPS seen during any given day from a real production system. There is a trendline
    generated by Excel, but we can see most of the data points are above the trendline,
    and in many cases, well above that trendline. The chart is a good example of being
    able to handle many different spikes in resource utilization. This system has
    generated over 400 IOPS on multiple occasions. No matter what the trendline shows,
    the disk subsystem needs to be able to handle all of those spikes in the graph.


    The CPU, memory, and disk utilization charts shown so far obtained the data from
    the Enterprise Manager repository. EM holds many more metrics if one cares to
    look at them. I tend to focus on the big three as previously stated, but there
    are occasions to look at other metrics as well. When the server target has been
    selected, choose Host ➤ Monitoring ➤ All Metrics to see the breadth of data you
    can use. Figure [19-9](#467924_1_En_19_Chapter.xhtml#Fig9) shows only a few of
    the categories to choose from. Each item in that list can be expanded to view
    the metrics in that category.


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig9_HTML.jpg](images/467924_1_En_19_Chapter/467924_1_En_19_Fig9_HTML.jpg)


    Figure 19-9


    EM metrics categories


    As stated earlier, EM will keep the metrics for a period of time, but typically
    not long enough to support capacity planning decision making. For that, you will
    have to pull the data out of the EM repository and store it elsewhere. The queries
    shown in this chapter can give you a start on figuring out where the data is stored
    in that repository. If you do not have access to Enterprise Manager, stand up
    an EM environment today. EM is already included in your Oracle license, so it
    costs you nothing extra. You may use third-party tools as well, but you may need
    to pay extra for them.


    ## Data Dictionary


    In Chapter [14](#467924_1_En_14_Chapter.xhtml), we explored the data dictionary
    and its role in the Oracle database. There are many metrics that every Oracle
    database keeps track of and lets you view in the data dictionary. One of the key
    metrics you may want to use for capacity planning is the overall database size.
    The data dictionary will only tell you the current size of the database. If you
    want to keep this information to chart over time, as you normally would expect
    for capacity planning, then you have to store the data in a table. In Listing
    [19-4](#467924_1_En_19_Chapter.xhtml#PC4), we create a table to hold the total
    allocated space and the total space used by segments in the database. The INSERT
    statement that follows can be used to populate the table with the current date’s
    values. Simply schedule the INSERT statement to run monthly in an Oracle job.


    ```

    CREATE TABLE db_size (

    date_collected  DATE,

    gb_allocated   NUMBER,

    gb_used   NUMBER);

    INSERT INTO db_size

    SELECT sysdate, df.gb_alloc, ds.gb_used

    FROM (SELECT round(sum(bytes)/1024/1024/1024,2) AS gb_alloc

    FROM dba_data_files) df

    JOIN (SELECT round(sum(bytes)/1024/1024/1024,2) AS gb_used

    FROM dba_segments) ds;

    Listing 19-4

    Tracking DB Size

    ```


    If we track the growth over time, we can generate a graph similar to Figure [19-10](#467924_1_En_19_Chapter.xhtml#Fig10),
    again in Excel with a trendline added.


    ![../images/467924_1_En_19_Chapter/467924_1_En_19_Fig10_HTML.png](images/467924_1_En_19_Chapter/467924_1_En_19_Fig10_HTML.png)


    Figure 19-10


    DB growth trendline


    In the chart in Figure [19-10](#467924_1_En_19_Chapter.xhtml#Fig10), we can see
    that the growth of this database over time is very linear, which makes it easy
    to generate an accurate forecast. One of the things we need to know is when the
    capacity will reach its limit. In the charts shown for CPU and memory, the utilization
    rate is expressed as a percentage of the total available. For example, in Figure
    [19-6](#467924_1_En_19_Chapter.xhtml#Fig6), the CPU utilization was over 60% and
    even approached 100% on occasion. But none of the days shown in the chart reached
    the 100% mark, so we still have resources to spare. In the chart in Figure [19-10](#467924_1_En_19_Chapter.xhtml#Fig10),
    the values are expressed in total gigabytes. We need to know how much disk space
    is available to the database. If we know the disks can hold 20TB of data, then
    we will run out of disk space when the trendline crosses the 20,000GB line. If
    the disk can hold 25TB of data, we have more time. Because the trend was consistent,
    we can accurately forecast the date we will run out of disk space. This lets us
    buy more disk for our servers well in advance of hitting the threshold.


    So far in this chapter, we have seen easy charts to cover the big three areas,
    CPU, memory, and disk, and we broke down the disk area into IOPS and database
    size. These four charts are ones that I generate on a monthly basis for my production
    database systems and are what I find to be the most useful in capacity planning.


    The Oracle data dictionary has more metrics than you will ever know what to do
    with. If the charts in this chapter are not sufficient for your capacity planning
    needs, you should be able to obtain the metrics from the data dictionary with
    a query. Then create a table and populate it with data. Make sure the table has
    a column to show when that metric was collected. This column will become the crucial
    one to sort on so as to display the metric values in a proper time sequence.


    If you want to look at different metrics in the data dictionary, start by querying
    V$SYSSTAT. One thing to note about this and most of the other V$ views is that
    the statistics are incremented over the lifetime of the instance. The statistics
    will get reset back to zero when the instance is started anew.'
