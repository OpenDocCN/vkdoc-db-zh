  trans: '

    ## 复杂性


    如果你与容量规划领域的专家交流，他们会非常乐意让你了解他们的工作有多么复杂和重要，以确保当今和未来拥有成功的运营环境。虽然我并非意在贬低或轻视他们的努力，但我对容量规划采取了一种更为简化的方法，正如我将在本章概述的那样。在我的
    DBA 职业生涯中，这一方法一直对我颇有裨益。阅读本章后，你可能会发现你需求更多，并希望在容量规划工作中更加细致。如果本章内容对于你未来进行的容量规划来说有所不足，那么请务必自行深入学习该主题，在读完本章后，达到比我通常做法更深入的程度。对你们中的许多人来说，本章的信息将提供你所需的大部分知识，你很可能凭借这些知识就能维持你的数据库管理员职业生涯。


    当我刚进入这个行业时，计算机系统的资源非常有限。软件开发人员会精打细算每一个字节的内存。将代码重构为执行相同任务但更高效、更精简的代码体，以节省内存，曾是一项常见任务。那时，磁盘空间极其有限，DBA
    只存储他们需要的信息，不多存一分。如果你要求更多内存或更多磁盘空间，你必须明确说出需要增加多少。组织不会购买超出必要的资源。


    我记得当我刚开始担任 Oracle DBA 时，我发现了一个 Excel 电子表格。只需输入几个数值，这个表格就能准确算出一个索引会有多大。你输入索引列的数据类型和精度，加上预期的行数，这个表格就会结合所有
    Oracle 索引所需的开销进行计算，然后其中一个单元格会神奇地给出一个以 KB 为单位的数字。老实说，对于那个年代的 Oracle 版本，这个电子表格实际上非常好用。我记得用它来估算索引大小，然后在实际中创建索引，结果证明，一次又一次，估算都非常准确。


    在一个项目中反复使用这个电子表格后，我意识到这种方法存在许多问题。首先，这种方法非常耗时。DBA 必须在电子表格中填入数值，得到估算结果，然后为每一个索引重复这一过程。我发现更简单的方法是：用样本数据填充一张表，创建一个索引，然后直接询问
    Oracle 需要多少空间。如果样本数据量大约是预期数据量的 10%，那么我只需将索引大小乘以 10，就能得到一个很好的估计值。这样我不仅得到了索引大小的估计值，也得到了表大小的估计值。这意味着我也可以抛弃那个帮我估算表大小的电子表格了。


    电子表格方法的另一个问题是，虽然它看起来非常精确并给出了一个确切的数字，但其输入值本身有时就是估算值。如果输入值不精确，那么无论工具多好，输出值也不会精确。所以，让我们把所有详细的分析留给更好的方法吧。相反，让我们尽可能轻松地得到一个答案。毕竟，这只是一个估算。


    最后，尽管你在初步估算中可能做了些精细的工作，但根据我的经验，估算值在确定后不久就会变得不准确。例如，我曾参与一个系统项目，该系统将接收来自一颗卫星的数据点。我的任务是创建和设计一个能够处理来自这个绕地球运行物体的数据的数据库。卫星的制造者精确知道每天每分钟捕获的数据量。我对预期数据量的估算完全准确。我加载了一些样本数据，并能够精确计算出每月需要多少磁盘空间。当我们在生产环境中开始向数据库填充数据时，我生成的估算值与我们的实际系统情况相符。然后，需求变了。由于系统运行得非常好，于是有人提议将另一个系统的数据也加入到这个数据库中。好吧，这应该很简单。只需将预期增长乘以
    2 就行了。然而，这个新系统会有原卫星所缺乏的额外数据。就这样，我那精确的估算瞬间泡汤了。关键在于，无论你的初始估算多么准确，需求和数据使用模式都可能发生变化。我们中很少有人维护的数据库系统，其数据流入是稳定且规律可循的，能够可靠地据此长期准确推断数据总量。


    在我的职业生涯中，我学到的一个道理是，有时在对系统预期使用情况进行估算时，不必过于追求精确。与其陷入细枝末节的纠缠，我常常采取一种完全相反的方法，那就是从更高的层面来看待系统使用情况。

    '
- fmt: '## Capacity Planning


    Before we can proceed, we need to define `capacity planning`. The name may be
    obvious, but I have found it can mean different things to different people. Before
    we can learn more in this chapter, the term needs to be defined so that we are
    all on the same page, no pun intended.


    All computer systems have a set of resources that perform work. For the most part,
    the only resources I look at are CPU usage, memory usage, and disk usage. The
    latter can be broken down into the amount of disk being used, and by corollary
    the amount of free disk space, and the time spent servicing requests. There are
    certainly other resources in a computer system, but CPU, memory, and disk are
    the big three.


    As requests are made of the system, the resources get used. Once the request is
    complete, the resource becomes available to service the next request. Unfortunately,
    there is a finite supply of the resources on the system. Ask too much of any one
    resource, and performance will suffer. If my request is using all of the CPU resources,
    your request will have to wait and you will rightfully complain that the system
    is slow. Not only are resources limited, they need to be shared by multiple people
    and processes all at the same time. Your job as a database administrator is to
    ensure there are sufficient resources for the end users so that they do not notice
    any performance issues. In other words, you need to ensure there is sufficient
    `capacity` for the workload.


    Part of the database administrator’s job is to determine how many resources are
    needed for the initial launch of the system. To put it a different way, the DBA
    needs to `plan` the resource utilization. After the initial launch, the DBA needs
    to forecast the resource utilization for the future. It is very common to see
    the demands placed on the resources grow over time. The DBA needs to `plan` for
    future growth so that resources can be made available before they are needed.


    `Capacity planning` is the activity of making sure adequate resources are available
    today and for the future to meet expected demand. This activity is a proactive
    approach. If you ever find yourself performing capacity planning in a reactive
    mode, it is too late and you may lose customers.


    To me, the hardest part of capacity planning is not in forecasting for the future
    but rather in setting up the system for its initial launch for an unknown product.
    Forecasting for the future is looking at where you are today and multiplying by
    a best-estimate factor and seeing where the trendline on a graph leads you. It’s
    an easy task. If the product is known, then you can look at what the product has
    required from previous deployments. If this product is from a third party, the
    vendor will typically supply resource recommendations to ensure their product
    performs properly.


    Setting up an unknown system for the first time is harder because we know so little
    about the resource utilization. Someone in management may say things like “We
    expect 100,000 users in the first month and 1 million users by six months.” Those
    figures are something, but they do not tell us how much CPU or memory the users
    will require. In short, it’s an unknown system and its resource requirements are
    unknown as well. For unknown systems, the best course of action is for the DBA
    to take is to learn all of the known requirements that have been defined. Then
    try to see what other systems they have worked on in the past that may mimic these
    details and use those as a guide. If no other such systems exist, the DBA can
    only make an initial guess. In either case, the DBA needs to let others on the
    team know that the initial estimates do not have enough background information
    to have a high degree of confidence.


    I’ve seen people ask questions over the years that want to know something like
    “How much memory do I need to support one million users?” I hate to break it to
    them, but there is no magic formula or table that can answer that question. One
    million application users in my system can have totally different resource requirements
    than one million users in another system.


    Because this is an unknown system, it will need to be developed and tested prior
    to being place into a production status. During development, the DBA should be
    looking at resource utilization to determine if the initial guess is still on
    track or needs to be redefined. Once the system goes to testing, the DBA should
    get to see the system under load. Automated testing tools help by simulating a
    large number of simultaneous users without involving real people. You can use
    `Swingbench` or `HammerDB` to simulate a testload, but keep in mind that those
    may not be representative of your application. I have used `JMeter` to exercise
    a web-based application in the past simulating multiple users.


    If possible, have a number of real users exercise the application. I have been
    known, from time to time, to enlist the help of the entire IT staff to exercise
    the application all at the same time, even if it is only for 10 or 15 minutes.
    Doing so gives me a much better idea of how resources are utilized in a real-world
    setting before the real world gets its hands on it.'
