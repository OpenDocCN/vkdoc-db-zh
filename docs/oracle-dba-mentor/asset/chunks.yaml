    当您点击`下一步`按钮时，您将进入`联系人`屏幕。填写您的姓名、电话号码、电子邮件地址和首选联系方式。通常这些信息会根据您的个人资料信息自动填充。然后点击`提交`按钮，您的`SR`现在就进入了系统。


