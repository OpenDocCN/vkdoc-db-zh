    2018-07-30T15:40:22.882068-05:00\nInstance terminated by PMON, pid = 25978\n```\n\
    \n**清单 12-9** 警报日志中的实例崩溃\n\n我们知道发生了什么。一个必需的后台进程死亡。我们仍然不知道`SMON`为何死亡。本章后面，我们将查看各个后台进程生成的跟踪文件。\n\
    \n在某些情况下，能够向警报日志写入自定义消息是很有帮助的。由于实例正在写入文件，你不能用文本编辑器打开它来添加文本。可以使用操作系统命令来追加到文件，类似于下面这样：\n\
    \n```\ncat \"text to alert log\" >> alert_orcl.log\n```\n\n这样做会面临在实例写入文件的同时尝试写入文件的风险。更好的方法是在实例中运行一个命令来写入消息。清单\
    \ 12-10 中的示例使用`DBMS_SYSTEM`包向警报日志写入一个条目。随后显示了警报日志的相关部分。\n\n## 写入警报日志\n\n```\n\
    SQL> exec dbms_system.ksdwrt(2,'Shutting down for db maintenance - BP');\nPL/SQL\
    \ procedure successfully completed.\nSQL> !tail -2 alert_orcl.log\n2018-07-30T15:47:18.866067-05:00\n\
    Shutting down for db maintenance – BP\n```\n\n**清单 12-10** 写入警报日志\n\n在上面的示例中，我写了一条自定义消息，表示我为了数据库维护而关闭实例。我在消息末尾加上了我的姓名首字母，以便团队中的其他数据库管理员知道是谁执行的操作。\n\
    \n我已经习惯使用操作系统工具来查看警报日志的内容，就像查看任何文本文件一样。在 Oracle 11g 中，引入了一个新的固定视图，允许你使用任何 SQL\
    \ 语句查询警报日志的内容。在清单 12-11 中，我们可以看到如何查找警报日志中任何出现的`ALTER`命令。\n\n## 查询警报日志\n\n```\n\
    SQL> select originating_timestamp,message_text\n  2  from x$dbgalertext\n  3 \
    \ where upper(message_text) like '%ALTER%'\n  4  order by originating_timestamp;\n\
    ORIGINATING_TIMESTAMP              MESSAGE_TEXT\n----------------------------------\
    \ ----------------------------------------\n29-SEP-17 10.51.16.369 AM -05:00 \
    \  ALTER DATABASE DEFAULT TEMPORARY TABLESPACE TEMP\n29-SEP-17 11.04.28.706 AM\
    \ -05:00   ALTER DATABASE CLOSE NORMAL\n29-SEP-17 11.04.30.011 AM -05:00   Completed:\
    \ ALTER DATABASE CLOSE NORMAL\n29-SEP-17 11.04.30.012 AM -05:00   ALTER DATABASE\
    \ DISMOUNT\n29-SEP-17 11.04.30.018 AM -05:00   Completed: ALTER DATABASE DISMOUNT\n\
    29-SEP-17 11.04.46.162 AM -05:00   ALTER DATABASE MOUNT\n29-SEP-17 11.04.50.247\
    \ AM -05:00   Completed: ALTER DATABASE MOUNT\n29-SEP-17 11.04.50.264 AM -05:00\
    \   ALTER DATABASE OPEN\n29-SEP-17 11.04.50.950 AM -05:00   Completed: ALTER DATABASE\
    \ OPEN\n```\n\n**清单 12-11** 查询警报日志\n\n现在我们可以利用 SQL 的强大功能，可以非常容易地进行过滤。例如，如果我们知道问题发生的时间，就可以搜索该时间段内发生的任何消息。\n\
    \n# 监听器日志\n\n另一个有用的跟踪文件是监听器日志。如果监听器遇到任何问题，它会将条目写入其日志文件。清单 12-12 显示了监听器日志的位置。此目录中应该只有一个文件，即监听器日志。\n\
    \n## 监听器日志位置\n\n```\n[oracle@dbamentor ~]$ cd /u01/app/oracle/diag/tnslsnr/dbamentor/listener/trace/\n\
    [oracle@dbamentor trace]$ ls -l\ntotal 12\n-rw-r-----. 1 oracle oinstall 11514\
    \ Jul 30 16:02 listener.log\n```\n\n**清单 12-12** 监听器日志位置\n\n查看监听器日志，有点难以看出它从哪里开始。我们必须查找写着“Started\
    \ with pid”的那一行。该消息之后是有关监听器正在使用的主机、端口和网络协议的信息。在最后一行，我们可以看到实例已将服务“orcl”注册到监听器。清单\
    \ 12-13 显示了监听器启动和将服务注册到监听器的那部分日志。\n\n## 监听器启动\n\n```\n[oracle@dbamentor trace]$\
    \ cat listener.log\n2018-07-30T16:15:52.354897-05:00\nLog messages written to\
    \ /u01/app/oracle/diag/tnslsnr/dbamentor/listener/alert/log.xml\nTrace information\
    \ written to /u01/app/oracle/diag/tnslsnr/dbamentor/listener/trace/ora_29203_140321849041280.trc\n\
    Started with pid=29203\nListening on: (DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=localhost)(PORT=1521)))\n\
    30-JUL-2018 16:16:46 * (ADDRESS=(PROTOCOL=tcp)(HOST=::1)(PORT=33928)) * service_register\
    \ * orcl * 12542\n```\n\n**清单 12-13** 监听器启动\n\n当监听器关闭时，日志文件将包含少量表明这一点信息，如清单 12-14\
    \ 所示。\n\n## 监听器关闭\n\n```\n2018-07-30T16:19:38.049565-05:00\nNo longer listening\
    \ on: (DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=localhost)(PORT=1521)))\n```\n\
    \n**清单 12-14** 监听器关闭\n\n不幸的是，监听器的日志文件没有明确说明有人启动或停止了监听器。在清单 12-14 中，我们只看到监听器不再监听该主机和端口。\n\
    \n通常我们不会使用监听器日志来监控监听器的启动和关闭。前面的例子是为了说明如何在监听器的日志文件中查找信息。如果你想要真正监控监听器，请使用像 Enterprise\
    \ Manager 这样的产品。"
- fmt: '## Background Process Trace Files


    The Oracle database engine is composed of multiple processes running in the background.
    Each has a different job to do for Oracle to be operational. You may have already
    dealt with some of these processes like `PMON`, `SMON`, and `CKPT`. Chapter [21](#467924_1_En_21_Chapter.xhtml)
    will provide more information on these processes if you want to know more.


    Each of these processes can write to their own trace file. The background process
    trace files are located in the same directory as the Alert Log. The files are
    typically named `instance_process_pid`.trc, which is the instance name, followed
    by the process name, followed by the operating system’s process identifier. For
    example, I have a trace file named `orcl_pmon_25978.trc`. This file is for my
    `orcl` instance’s `PMON` process when it was running with OS pid `25978`.


    Many times, you will find these files when no problem exists. The simple act of
    the process starting up will generate one of these trace files. Normally, the
    contents are just informational. It is when you are having a problem with a specific
    background process that you will want to examine its trace file. Remember earlier
    in this chapter the Alert Log showed the instance terminated because `SMON` had
    died. `PMON` detected the condition and terminated the instance. The `PMON` trace
    file shows this event, as we can see in Listing [12-15](#467924_1_En_12_Chapter.xhtml#PC16).


    ```

    [oracle@dbamentor trace]$ cat orcl_pmon_25978.trc

    Trace file /u01/app/oracle/diag/rdbms/orcl/orcl/trace/orcl_pmon_25978.trc

    Oracle Database 12c Enterprise Edition Release 12.2.0.1.0 - 64bit Production

    Build label:    RDBMS_12.2.0.1.0_LINUX.X64_170125

    ORACLE_HOME:    /u01/app/oracle/product/12.2.0.1

    System name: Linux

    Node name:   dbamentor.localdomain

    Release:     4.1.12-103.6.1.el7uek.x86_64

    Version:     #2 SMP Wed Sep 20 12:15:11 PDT 2017

    Machine:     x86_64

    Instance name: orcl

    Redo thread mounted by this instance: 1

    Oracle process number: 2

    Unix process pid: 25978, image: oracle@dbamentor.localdomain (PMON)

