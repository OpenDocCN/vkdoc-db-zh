    \ 实例时更新。\n# 冒号 ':' 用作字段分隔符。换行符表示条目结束。\n# 以井号 '#' 开头的行是注释。\n#\n# 条目格式如下：\n#   $ORACLE_SID:$ORACLE_HOME::\n\
    #\n# 第一个和第二个字段分别是数据库的系统标识符和主目录。\n# 第三个字段指示 dbstart 工具在系统启动时是否应启动该数据库，\n# \"Y\"\
    \ 表示是，\"N\" 表示否。\n#\n# 不允许存在具有相同 $ORACLE_SID 的多个条目。\n#\n#\norcl:/u01/app/oracle/product/12.2.0.1:N\n\
    清单 9-4\nOratab 文件\n\n文件大部分内容是注释，但请看最后一行。它显示名为 `orcl` 的 `ORACLE_SID` 对应的 Oracle\
    \ 主目录是 `/u01/app/oracle/product/12.2.0.1`。当你使用 `oraenv` 设置环境时，它会查找此文件来定位 Oracle\
    \ 主目录，从而正确设置你的环境变量。如果你使用 `DBCA` 创建数据库，该工具会自动填充 `oratab` 文件。如果你使用数据库升级助理（`DBUA`）升级到新的\
    \ Oracle 版本，`DBUA` 会自动修改此文件。如果你手动创建或升级数据库，则必须手动修改此文件。该行的最后部分是 `Y` 或 `N`，这是一个标志，用于告知\
    \ Oracle 提供的启动和关闭工具是否要处理此数据库。如果标志设置为 `Y`，这些工具在运行时会启动和关闭该数据库对应的 Oracle 实例。\n\n\
    此文件在 Windows 系统上不存在。Oracle 使用 Windows 注册表来指向该服务器上每个数据库的 Oracle 主目录。启动和关闭通过 Windows\
    \ 服务和相应的注册表项实现自动化。\n\n## 进程与继承 (Bequeath)\n\n当我们建立本地连接时，底层发生了什么？要理解这一点，我们需要稍微回溯一下。启动一个\
    \ Oracle 实例会在数据库服务器上分配内存并创建许多进程。这些进程都执行 Oracle 数据库引擎所需的工作。在本书后面，我们将更深入地探讨这些用于支持\
    \ Oracle 实例的后台进程。\n\n当应用程序连接到 Oracle 实例时，Oracle 会在数据库服务器上创建一个专用于该用户会话的进程。这被称为\
    \ `专用服务器进程`。应用程序与 `专用服务器进程` 对话，而 `专用服务器进程` 与 Oracle 实例对话。应用程序不直接与实例通信。图 9-1 显示了其工作流程。\n\
    \n![../images/467924_1_En_9_Chapter/467924_1_En_9_Fig1_HTML.png](img/467924_1_En_9_Fig1_HTML.png)\n\
    图 9-1\n专用服务器进程\n\n在我们的例子中，应用程序是 `SQL*Plus`。`SQL*Plus` 是应用程序的名称，而 `sqlplus` 是我们调用来运行该应用程序的可执行文件。`SQL*Plus`\
    \ 与一个 `专用服务器进程` 对话，该进程是在我们连接到实例时为我们创建的。在清单 9-5 中，我们将找出当前会话的进程标识符，然后查看服务器上运行的进程。\n\
    \n```\nSQL> select spid from v$process\n  2  where addr in (select paddr from\
    \ v$session\n  3                 where username='PEASLAND');\nSPID\n----------\n\
    7080\n\nSQL> !ps -ef|grep 7080\noracle    7080  7069  0 14:37 ?        00:00:00\
    \ oracleorcl (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))\nSQL> !ps -ef|grep\
    \ 7069\noracle    7069  2752  0 14:37 pts/0    00:00:00 sqlplus\noracle    7080\
    \  7069  0 14:37 ?        00:00:00 oracleorcl (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))\n\
    清单 9-5\n本地进程\n```\n\n从上面的输出中，我们可以从 `V$PROCESS` 视图看到我们的 `专用服务器进程` 的服务器进程标识符 (`SPID`)\
    \ 是 `7080`。使用 `ps` 命令并通过 `grep` 过滤，我们可以看到服务器上运行着一个名为 `oracleorcl` 的进程。这就是我们的 `专用服务器进程`。让我们检查一下该行的其余部分。注意它显示\
    \ `LOCAL=YES` 和 `PROTOCOL=BEQ`。这些信息告诉我们这个 `专用服务器进程` 是用于本地连接的，并且它使用 `Bequeath`\
    \ 通信协议。我们还可以看到进程 `7080` 有一个父进程，其服务器进程标识符 (`SPID`) 是 `7069`。如果我们再次使用 `ps` 和 `grep`，可以看到进程\
    \ `7069` 就是我们的 `sqlplus` 应用程序。\n\n对于本地连接，你经常会看到使用 `Bequeath` 协议。`bequeath` 一词意为将某物传递给他人。在此上下文中，该协议只是简单地将连接直接传递给\
    \ `专用服务器进程`。`Bequeath` 总是使用 `专用服务器进程`，并且从不涉及 Oracle 监听器（Listener），这将在下一节讨论。\n\n\
    每个 `专用服务器进程` 都需要在数据库服务器上占用一定的内存和其他开销。随着互联网的爆炸式增长，越来越多的用户开始从数据库访问数据，人们逐渐认识到 `专用服务器进程`\
    \ 架构会达到一些限制。甲骨文公司（Oracle Corporation）创建了 `共享服务器进程` 架构，在这种架构中，服务器上的进程由多个应用程序共享，如图\
    \ 9-2 所示。\n\n![../images/467924_1_En_9_Chapter/467924_1_En_9_Fig2_HTML.png](img/467924_1_En_9_Fig2_HTML.png)\n\
