    `datapatch` 将连接到数据库并应用当前补丁。我们希望在输出末尾附近看到消息 “Patch *xxxxx* apply:SUCCESS”。


    每次我们应用补丁并更新数据库的内部部分时，都存在使一些数据字典对象变为无效的风险。我们可以运行随附的 `utlrp.sql` 脚本（如 **Listing
    17-10** 所示）来重新编译任何无效对象。


    ```sql

    [oracle@dbamentor 28163133]$ sqlplus /nolog

