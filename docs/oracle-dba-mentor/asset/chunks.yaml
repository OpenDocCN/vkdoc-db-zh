    ## 升级数据库


    在本次升级中，我们将使用 `Database Upgrade Assistant`。大多数 Oracle 升级都使用此工具，因为它能通过自动化升级过程，实现最短的停机窗口并最大程度降低风险。


    首先，我们需要将会话的环境变量指向新的软件主目录，但保留相同的 `Oracle SID`。然后，我们需要启动 `DBUA` 工具。代码清单 18-11 展示了如何在我们的
    Linux 测试环境中设置环境变量并启动 `DBUA`。


    ```

    [oracle@dbamentor ~]$ export ORACLE_HOME=/u01/app/oracle/product/18.3

    [oracle@dbamentor ~]$ export ORACLE_SID=orcl

    [oracle@dbamentor ~]$ export PATH=$ORACLE_HOME/bin:$PATH

    [oracle@dbamentor ~]$ dbua

    代码清单 18-11

    设置升级环境

    ```


    在如图 18-4 所示的初始屏幕上，`DBUA` 会询问要升级哪个数据库。如果服务器上有多个数据库，`DBA` 需要从列表中选择。我们的测试环境只有一个数据库。如果从另一台服务器运行此工具，则必须提供
    `SYSDBA` 凭据。通常，您是在数据库服务器本身上运行此工具，因此 `SYSDBA` 的用户名和密码可以留空。


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig4_HTML.jpg](img/467924_1_En_18_Fig4_HTML.jpg)


    **图 18-4**

    **DBUA 升级目标选择**


    点击 `Next` 按钮后，`DBUA` 将花费几分钟时间收集有关待升级数据库的信息。`DBUA` 完成此任务后，将执行一些先决条件检查。图 18-5 显示了这些检查的结果。


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig5_HTML.jpg](img/467924_1_En_18_Fig5_HTML.jpg)


    **图 18-5**

    **DBUA 先决条件检查屏幕**


    如果我们很好地修复了 `Pre-Upgrade Information Tool` 发现的任何问题，那么先决条件检查应该会通过，且不会有任何额外发现。在图
    18-5 中，唯一的是一些升级后的建议，这些我们已经知道并将在最后处理。


    点击 `Next` 后，系统会要求我们提供一些升级选项，如图 18-6 所示。


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig6_HTML.jpg](img/467924_1_En_18_Fig6_HTML.jpg)


    **图 18-6**

    **DBUA 升级选项**


    图 18-6 中的前三个选项默认被选中，我们通常保持这些选项不变。第一个选项通过并行执行许多任务让升级过程运行得更快。如果您正在此服务器上运行多个数据库，您可能希望取消选中此框，以使并行操作不会对其他数据库性能产生负面影响。第二个选项将运行一个脚本，重新编译在升级期间变为无效的对象。没有充分的理由取消选中此框。第三个选项升级时区数据。同样，几乎没有理由避免这样做。


    第四个选项指示 `DBUA` 将用户表空间更改为 `只读`。此选项用于在升级失败时促进快速回退，但 Oracle 建议您如果担心此问题，则使用有保证的还原点。


    `DBUA 步骤 3` 的最后一部分允许您在升级前后执行自定义脚本。如果您愿意，可以将 `升级后` 部分指向由 `Pre-Upgrade Installation
    Tool` 生成的修复脚本。


    在 `步骤 4` 中，如图 18-7 所示，`DBUA` 询问我们，如果升级过程中发生故障，我们希望如何处理数据库恢复。


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig7_HTML.jpg](img/467924_1_En_18_Fig7_HTML.jpg)


    **图 18-7**

    **DBUA 还原选项**


    如果您选择使用 `闪回` 和有保证的还原点，或者选择使用 `RMAN` 备份，并且在升级过程中发生错误，`DBUA` 将自动使用您选择的选项将您恢复到起始点。如果您选择最后一个选项，即使用您自己的备份和恢复策略，`DBUA`
    将无法为您恢复。您将必须自己执行恢复操作。


    如前所述，Oracle 的建议是使用有保证的还原点。这是让您恢复到升级前状态的最快方法，但您必须已经定义了 `闪回恢复区`。另一个很好的选择是 `RMAN`
    备份。


    记得我说过您需要在开始升级过程之前执行备份吗？`DBUA` 的 `步骤 4` 就是您定义该策略的地方。如果您选择最后一个选项，您的备份应该在启动 `DBUA`
    之前进行。


    由于这是一个测试环境，我将选择使用我自己的备份和恢复策略，并点击 `Next` 进入 `DBUA` 的下一个屏幕，如图 18-8 所示。`DBUA` 的 `步骤
    5` 要求我们创建一个新的 `监听器`。


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig8_HTML.jpg](img/467924_1_En_18_Fig8_HTML.jpg)


    **图 18-8**

    **DBUA 监听器选择**


    `DBUA` 看不到当前的 `监听器`，因为它是在旧的 Oracle 主目录下运行的。它确实为我们提供了创建新 `监听器` 的选项，但我们不希望服务器上运行两个监听器。升级完成后，我将向您展示如何轻松地将
    `监听器` 移动到新的主目录。在此步骤中接受默认设置并点击 `Next` 按钮。


    在 `步骤 6` 中，`DBUA` 要求我们定义管理选项，即我们是否想使用 `Oracle Enterprise Manager (EM) Database
    Express` 或 `EM Cloud Control` 来管理此数据库。默认情况下，选择了 `EM Database Express`。我在图 18-9
    中取消选择了该选项。


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig9_HTML.jpg](img/467924_1_En_18_Fig9_HTML.jpg)


    **图 18-9**

    **DBUA 管理选项**


    如果我使用 `Cloud Control`，我可以轻松地在以后添加此数据库。如果我将来需要，我可以使用 `Database Configuration Assistant
    (DBCA)` 添加 `Database Express`。目前，我们将不使用任何 `Enterprise Manager`。如果您想使用 `EM`，请选择
    `Database Express` 选项。在升级结束时，`DBUA` 将为您提供有关如何使用它的信息。


    当我们点击 `Next` 按钮时，我们将转到所选选项的数据库摘要页面，如图 18-10 所示。


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig10_HTML.jpg](img/467924_1_En_18_Fig10_HTML.jpg)


    **图 18-10**

    **DBUA 摘要**


    此屏幕是我们继续之前最后确认一切是否正确的机会。到目前为止，`DBUA` 尚未进行任何更改，也未尝试升级数据库。当您点击 `Finish` 按钮时，升级将开始。此时数据库将不可用。您可以在计划的停机窗口之前提前到达此点，为计划开始的升级节省一些时间。


    现在是让 `DBUA` 为我们完成所有艰巨工作的时候了。点击 `Finish` 按钮，然后坐下来观看它工作。我们可以在图 18-11 中看到 `进度` 屏幕的示例。


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig11_HTML.jpg](img/467924_1_En_18_Fig11_HTML.jpg)


    **图 18-11**

    **DBUA 进度屏幕**


    当 `DBUA` 正在升级数据库时，它将继续显示 `进度` 屏幕，以便您可以跟踪进度。一段时间后，升级将完成，`DBUA` 将显示一个类似于图 18-12
    的最终结果页面。

    '
- fmt: '# DBUA升级结果


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig12_HTML.jpg](images/467924_1_En_18_Chapter/467924_1_En_18_Fig12_HTML.jpg)


    图 18-12：DBUA升级结果页面


    升级结果显示数据库已从12.2升级到18c。如果向下滚动结果页面，升级详情部分将显示每个步骤的完成耗时，如图[18-13](#467924_1_En_18_Chapter.xhtml#Fig13)所示。


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig13_HTML.jpg](images/467924_1_En_18_Chapter/467924_1_En_18_Fig13_HTML.jpg)


    图 18-13：升级详情部分


    一个有趣的点是，我们升级到的是18.3版本，但图[18-13](#467924_1_En_18_Chapter.xhtml#Fig13)中的升级详情显示的是18.0版本。我们可以看到，对于这个测试库，总升级时间约为27分钟。即使对于非常大的数据库，我也通常会计划一小时的停机时间。希望您从升级开发和测试数据库时能获得良好的时间预估。当您对结果满意时，点击“关闭”按钮以结束DBUA会话。


    ## 升级后任务


    升级完成后，还有一些额外的任务需要处理。我们已经知道需要运行Pre-Upgrade Installation Tool为我们生成的升级后修复脚本。我们需要将环境更改为新的Oracle主目录，然后执行该脚本。在清单[18-12](#467924_1_En_18_Chapter.xhtml#PC12)中，我们将环境设置为新的软件主目录并运行升级后修复脚本。


    ```

    [oracle@dbamentor ~]$ export ORACLE_HOME=/u01/app/oracle/product/18.3

    [oracle@dbamentor ~]$ export ORACLE_SID=orcl

    [oracle@dbamentor ~]$ export PATH=$ORACLE_HOME/bin:$PATH

    [oracle@dbamentor ~]$ sqlplus /nolog

    SQL*Plus: Release 18.0.0.0.0 - Production on Fri Sep 14 16:31:20 2018

    Version 18.3.0.0.0

    Copyright (c) 1982, 2018, Oracle.  All rights reserved.

    SQL> connect / as sysdba

    Connected.

    SQL> @/u01/app/oracle/cfgtoollogs/orcl/preupgrade/postupgrade_fixups.sql

    Executing Oracle POST-Upgrade Fixup Script

    Auto-Generated by:       Oracle Preupgrade Script

    Version: 18.0.0.0.0 Build: 1

    Generated on:            2018-09-14 14:21:32

    For Source Database:     ORCL

    Source Database Version: 12.2.0.1.0

    For Upgrade to Version:  18.0.0.0.0

    ```

    清单 18-12：升级后修复脚本


    为简洁起见，省略了部分脚本输出。


    我总是执行的一项检查是确保DBUA已更新`oratab`文件，使其指向该数据库的新主目录。DBUA从未跳过此步骤，但我仍然会检查它，也许是出于习惯。清单[18-13](#467924_1_En_18_Chapter.xhtml#PC13)显示我的`oratab`文件已被更新。


    ```

    [oracle@dbamentor ~]$ cat /etc/oratab

    #

    # This file is used by ORACLE utilities.  It is created by root.sh

    # and updated by either Database Configuration Assistant while creating

    # a database or ASM Configuration Assistant while creating ASM instance.

    # A colon, '':'', is used as the field terminator.  A new line terminates

    # the entry.  Lines beginning with a pound sign, ''#'', are comments.

    #

    # Entries are of the form :

    #   $ORACLE_SID:$ORACLE_HOME::

    #

    # The first and second fields are the system identifier and home

    # directory of the database respectively.  The third field indicates

    # to the dbstart utility that the database should , "Y", or should not,

    # "N", be brought up at system boot time.

    #

    # Multiple entries with the same $ORACLE_SID are not allowed.

    #

    #

    orcl:/u01/app/oracle/product/18.3:Y

    ```

    清单 18-13：Oratab更新


    `oratab`文件确实指向了新的Oracle主目录。


    如果您记得本章前面的内容，DBUA询问了我们希望如何处理Oracle监听器。我们指示DBUA不要对监听器做任何操作。始终建议监听器的运行版本与您的最高数据库版本相同。如果您在同一服务器上运行Oracle
    12.2数据库以及Oracle 18数据库，请使用Oracle 18监听器。


    要切换到新的监听器，只需关闭旧的监听器，将任何配置文件复制到新主目录，然后使用新版本启动监听器。步骤如清单[18-14](#467924_1_En_18_Chapter.xhtml#PC14)所示。'
  raw: '![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig12_HTML.jpg](images/467924_1_En_18_Chapter/467924_1_En_18_Fig12_HTML.jpg)


    Figure 18-12


    DBUA Upgrade Results page


    The upgrade results show the database was upgraded from 12.2 to 18c. If you scroll
    down the results a bit, the Upgrade Details section will show how long each step
    took to complete, illustrated in Figure [18-13](#467924_1_En_18_Chapter.xhtml#Fig13).


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig13_HTML.jpg](images/467924_1_En_18_Chapter/467924_1_En_18_Fig13_HTML.jpg)


    Figure 18-13


    Upgrade Details section


    It might be interesting to note that we upgraded to the 18.3 version, but the
    Upgrade Details in Figure [18-13](#467924_1_En_18_Chapter.xhtml#Fig13) show the
    18.0 version instead. We can see that for this testbed, the total upgrade time
    was about 27 minutes. I typically plan for one hour of downtime even for very
    large databases. Hopefully you will have a good time estimate from when you upgraded
    the development and test databases. When you are satisfied with the results, click
    the Close button to end the DBUA session.


    ## Post Upgrade


    After the upgrade is complete, there are a few extra tasks to take care of. We
    already know that we need to run the post-upgrade fixup script the Pre-Upgrade
    Installation Tool generated for us. We will need to change our environment to
    the new Oracle home directory and then execute the script. In Listing [18-12](#467924_1_En_18_Chapter.xhtml#PC12),
    we set our environment to the new software home and run the post-upgrade fixup
    script.


    ```

    [oracle@dbamentor ~]$ export ORACLE_HOME=/u01/app/oracle/product/18.3

    [oracle@dbamentor ~]$ export ORACLE_SID=orcl

    [oracle@dbamentor ~]$ export PATH=$ORACLE_HOME/bin:$PATH

    [oracle@dbamentor ~]$ sqlplus /nolog

    SQL*Plus: Release 18.0.0.0.0 - Production on Fri Sep 14 16:31:20 2018

    Version 18.3.0.0.0

    Copyright (c) 1982, 2018, Oracle.  All rights reserved.

    SQL> connect / as sysdba

    Connected.

    SQL> @/u01/app/oracle/cfgtoollogs/orcl/preupgrade/postupgrade_fixups.sql

    Executing Oracle POST-Upgrade Fixup Script

    Auto-Generated by:       Oracle Preupgrade Script

    Version: 18.0.0.0.0 Build: 1

    Generated on:            2018-09-14 14:21:32

    For Source Database:     ORCL

    Source Database Version: 12.2.0.1.0

    For Upgrade to Version:  18.0.0.0.0

    Listing 18-12

    Post-Upgrade Fixup Script

    ```


    Some of the script output has been removed for brevity.


    One of the checks I always perform is to make sure the DBUA has updated the oratab
    file to point to the new home directory for this database. The DBUA has never
    skipped this step, but I still check it anyway, maybe out of habit. Listing [18-13](#467924_1_En_18_Chapter.xhtml#PC13)
    shows my oratab file has been updated.


    ```

    [oracle@dbamentor ~]$ cat /etc/oratab

    #

    # This file is used by ORACLE utilities.  It is created by root.sh

    # and updated by either Database Configuration Assistant while creating

    # a database or ASM Configuration Assistant while creating ASM instance.

    # A colon, '':'', is used as the field terminator.  A new line terminates

    # the entry.  Lines beginning with a pound sign, ''#'', are comments.

    #

    # Entries are of the form :

    #   $ORACLE_SID:$ORACLE_HOME::

    #

    # The first and second fields are the system identifier and home

    # directory of the database respectively.  The third field indicates

    # to the dbstart utility that the database should , "Y", or should not,

    # "N", be brought up at system boot time.

    #

    # Multiple entries with the same $ORACLE_SID are not allowed.

    #

    #

    orcl:/u01/app/oracle/product/18.3:Y

    Listing 18-13

    Oratab Update

    ```


    The oratab file does point to the new Oracle home directory.


    If you remember from earlier in this chapter, the DBUA asked how we wanted to
    handle the Oracle Listener. We did instruct the DBUA to do nothing with the Listener.
    It is always a good idea to have the Listener running as the same version as your
    highest database version. If you are running an Oracle 12.2 database as well as
    an Oracle 18 database on the same server, use the Oracle 18 Listener.


    To move over to the new Listener, simply shut down the old one, copy any configuration
    files to the new home, and start up the Listener with the new version. The steps
    are shown in Listing [18-14](#467924_1_En_18_Chapter.xhtml#PC14).'
  trans: '# DBUA 升级结果


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig12_HTML.jpg](img/467924_1_En_18_Fig12_HTML.jpg)


    图 18-12：DBUA 升级结果页面


    升级结果显示数据库已从 12.2 升级到 18c。如果向下滚动结果页面，升级详情部分将显示每个步骤的完成耗时，如图 18-13 所示。


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig13_HTML.jpg](img/467924_1_En_18_Fig13_HTML.jpg)


    图 18-13：升级详情部分


    一个有趣的点是，我们升级到的是 18.3 版本，但图 18-13 中的升级详情显示的是 18.0 版本。我们可以看到，对于这个测试库，总升级时间约为 27
    分钟。即使对于非常大的数据库，我也通常会计划一小时的停机时间。希望您从升级开发和测试数据库时能获得良好的时间预估。当您对结果满意时，点击“关闭”按钮以结束
    DBUA 会话。


    ## 升级后任务


    升级完成后，还有一些额外的任务需要处理。我们已经知道需要运行 Pre-Upgrade Installation Tool 为我们生成的升级后修复脚本。我们需要将环境更改为新的
    Oracle 主目录，然后执行该脚本。在清单 18-12 中，我们将环境设置为新的软件主目录并运行升级后修复脚本。


    ```

    [oracle@dbamentor ~]$ export ORACLE_HOME=/u01/app/oracle/product/18.3

    [oracle@dbamentor ~]$ export ORACLE_SID=orcl

    [oracle@dbamentor ~]$ export PATH=$ORACLE_HOME/bin:$PATH

    [oracle@dbamentor ~]$ sqlplus /nolog

    SQL*Plus: Release 18.0.0.0.0 - Production on Fri Sep 14 16:31:20 2018

    Version 18.3.0.0.0

    Copyright (c) 1982, 2018, Oracle.  All rights reserved.

    SQL> connect / as sysdba

    Connected.

    SQL> @/u01/app/oracle/cfgtoollogs/orcl/preupgrade/postupgrade_fixups.sql

    Executing Oracle POST-Upgrade Fixup Script

    Auto-Generated by:       Oracle Preupgrade Script

    Version: 18.0.0.0.0 Build: 1

    Generated on:            2018-09-14 14:21:32

    For Source Database:     ORCL

    Source Database Version: 12.2.0.1.0

    For Upgrade to Version:  18.0.0.0.0

    ```

    清单 18-12：升级后修复脚本


    为简洁起见，省略了部分脚本输出。


    我总是执行的一项检查是确保 DBUA 已更新`oratab`文件，使其指向该数据库的新主目录。DBUA 从未跳过此步骤，但我仍然会检查它，也许是出于习惯。清单
    18-13 显示我的`oratab`文件已被更新。


    ```

    [oracle@dbamentor ~]$ cat /etc/oratab

    #

    # This file is used by ORACLE utilities.  It is created by root.sh

    # and updated by either Database Configuration Assistant while creating

    # a database or ASM Configuration Assistant while creating ASM instance.

    # A colon, '':'', is used as the field terminator.  A new line terminates

    # the entry.  Lines beginning with a pound sign, ''#'', are comments.

    #

    # Entries are of the form :

    #   $ORACLE_SID:$ORACLE_HOME::

    #

    # The first and second fields are the system identifier and home

    # directory of the database respectively.  The third field indicates

    # to the dbstart utility that the database should , "Y", or should not,

    # "N", be brought up at system boot time.

    #

    # Multiple entries with the same $ORACLE_SID are not allowed.

    #

    #

    orcl:/u01/app/oracle/product/18.3:Y

    ```

    清单 18-13：Oratab 更新


    `oratab`文件确实指向了新的 Oracle 主目录。


    如果您记得本章前面的内容，DBUA 询问了我们希望如何处理 Oracle 监听器。我们指示 DBUA 不要对监听器做任何操作。始终建议监听器的运行版本与您的最高数据库版本相同。如果您在同一服务器上运行
    Oracle 12.2 数据库以及 Oracle 18 数据库，请使用 Oracle 18 监听器。


    要切换到新的监听器，只需关闭旧的监听器，将任何配置文件复制到新主目录，然后使用新版本启动监听器。步骤如清单 18-14 所示。'
