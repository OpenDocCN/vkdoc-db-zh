  trans: '

    # 14. `数据字典`


    在上一章中，我们讨论了 Oracle 文档集。希望您已经有机会查阅了这些文档，对它越来越熟悉，从而也能让它对您更有用。在本章中，我们将转向另一种类型的文档——数据字典。我们还将探讨一些我们可以使用的各种动态性能视图。


    我们在本章中看到的文档存在于您每一个 Oracle 数据库中。它能告诉您关于您数据库的信息，比任何一本书都多。每个数据库引擎，无论是 Oracle、SQL
    Server、Postgres 等，都有某种形式的数据字典。


    本章的所有内容在您特定版本的 *Oracle Database Reference* 中都有记录。在上一章关于 Oracle 文档集的内容中没有提及 *Oracle
    Database Reference*，是因为我们打算在这里提到它。如果您对在这里看到的任何视图有疑问，请随时在 *Database Reference*
    中进行更多探索。花点时间浏览一下这本书，看看它的布局。


    ## 数据字典


    每个值得使用的数据库引擎都有某种形式的数据字典。有时它也被称为 *目录*、*系统目录* 或 *数据存储库*。当 Edgar Codd 开创关系数据库规则时，其中一条规则规定必须创建一个关系目录。每个数据库引擎如何实现数据字典会有所不同，但它们都有某种形式的数据字典。


    那么，什么是数据字典？最常见的答案是，数据字典是关于数据本身的元数据。基本上，数据字典包含了您可能需要阅读的信息，以便了解更多关于数据库中内容的信息。


    无论数据字典如何实现，您与它的交互方式与您与任何其他数据库表的交互方式相同。您查询它。在 Oracle 中，您通过 `SQL` 语句来查询数据字典。一些数据库引擎会提供存储过程来执行。您从数据字典中获取信息的方式，与您应用程序中其他数据的获取方式是相同的。


    有趣的是，数据字典的更新方式也与您在应用程序表中更新数据的方式相同。当您创建一个表时，Oracle 会对一个包含数据库中所有表列表的数据字典表执行 `INSERT`
    语句。Oracle 还会向另一个包含所有表的所有列列表的表中插入其他行。Oracle 与数据字典交互的方式，与您与自己的表交互的方式是相同的。


    您绝不应该自己直接修改数据字典表中的数据。这样做可能会导致数据字典损坏，并使您的数据库处于无法操作的状态。让数据库引擎为您更新数据字典。您应该只查询数据字典。


    ## 基础表


    数据字典由许多基础表组成。在当今的 Oracle 版本中，有超过一千个基础表。所有基础表都属于 `SYS` 用户。常听到的说法是 `SYS` 就是数据字典，或者
    `SYS` 拥有数据字典。没有数据字典，数据库就无法运行，因此它必须始终受到保护。话虽如此，探索这些基础表并查看它们包含的内容是很有趣的。我还应该提到，我们几乎从不直接查询基础表。相反，我们使用
    Oracle 为我们提供的数据字典视图。正如我们将在本节中看到的，基础表中的信息可能晦涩难懂，难以或无法破译。Oracle 没有公布太多关于基础表的信息。然而，开始探索
    Oracle 数据库内部并了解数据库在底层如何工作是很有趣的。


    让我们看看其中一个基础表。`SYS.TAB$` 表包含了数据库中所有表的列表。在基础表名称中看到美元符号是很常见的。在列表 14-1 中，我们可以看到 `SYS.TAB$`
    表的描述。


    ```

    SQL> desc sys.tab$

    Name                       Null?       Type

    --------------------------- ----------- --------------

    OBJ#                       NOT NULL    NUMBER

    DATAOBJ#                               NUMBER

    TS#                        NOT NULL    NUMBER

    FILE#                      NOT NULL    NUMBER

    BLOCK#                     NOT NULL    NUMBER

    BOBJ#                                  NUMBER

    TAB#                                   NUMBER

    COLS                       NOT NULL    NUMBER

    CLUCOLS                                NUMBER

    PCTFREE$                   NOT NULL    NUMBER

    PCTUSED$                   NOT NULL    NUMBER

    INITRANS                   NOT NULL    NUMBER

    MAXTRANS                   NOT NULL    NUMBER

    FLAGS                      NOT NULL    NUMBER

    AUDIT$                     NOT NULL    VARCHAR2(38)

    ROWCNT                                 NUMBER

    BLKCNT                                 NUMBER

    EMPCNT                                 NUMBER

    AVGSPC                                 NUMBER

    CHNCNT                                 NUMBER

    AVGRLN                                 NUMBER

    AVGSPC_FLB                             NUMBER

    FLBCNT                                 NUMBER

    ANALYZETIME                            DATE

    SAMPLESIZE                             NUMBER

    DEGREE                                 NUMBER

    INSTANCES                              NUMBER

    INTCOLS                    NOT NULL    NUMBER

    KERNELCOLS                 NOT NULL    NUMBER

    PROPERTY                   NOT NULL    NUMBER

    TRIGFLAG                               NUMBER

    SPARE1                                 NUMBER

    SPARE2                                 NUMBER

    SPARE3                                 NUMBER

    SPARE4                                 VARCHAR2(1000)

    SPARE5                                 VARCHAR2(1000)

    SPARE6                                 DATE

    列表 14-1

    SYS.TAB$ 基础表

    ```


    如果您曾花时间创建过 Oracle 表，那么这个基础表中的一些列名是有意义的。我们可以看到 `PCTFREE$`、`INITRANS` 和 `DEGREE`，这些都是您在创建表时可以指定的选项。缺失的一点是表的所有者和名称。要了解这部分信息，我们必须查看描述所有数据库对象的基础表
    `SYS.OBJ$`。我们可以在列表 14-2 中看到 `SYS.OBJ$` 的描述。

    '
- fmt: '```

    SQL> desc sys.obj$

    Name                Null?     Type

    ------------------- --------- ----------------------------

    OBJ#                NOT NULL  NUMBER

    DATAOBJ#                      NUMBER

    OWNER#              NOT NULL  NUMBER

    NAME                NOT NULL  VARCHAR2(128)

    NAMESPACE           NOT NULL  NUMBER

    SUBNAME                       VARCHAR2(128)

    TYPE#               NOT NULL  NUMBER

    CTIME               NOT NULL  DATE

    MTIME               NOT NULL  DATE

    STIME               NOT NULL  DATE

    STATUS              NOT NULL  NUMBER

    REMOTEOWNER                   VARCHAR2(128)

    LINKNAME                      VARCHAR2(128)

    FLAGS                         NUMBER

    OID$                          RAW(16)

    SPARE1                        NUMBER

    SPARE2                        NUMBER

    SPARE3                        NUMBER

    SPARE4                        VARCHAR2(1000)

    SPARE5                        VARCHAR2(1000)

    SPARE6                        DATE

    SIGNATURE                     RAW(16)

    SPARE7                        NUMBER

    SPARE8                        NUMBER

    SPARE9                        NUMBER

    Listing 14-2

    SYS.OBJ$ Base Table

    ```


    Right away, it should be obvious that we need at least two tables to learn about
    any table in the database, `SYS.TAB$` and `SYS.OBJ$`. Notice that in `SYS.OBJ$`,
    we do have the object’s NAME but none of those columns tell us the owner. Instead,
    we would have to use the `OWNER#` column to join to the `USER#` column of the
    `SYS.USER$` table and we have now introduced a third base table to the mix.


    The base tables can also contain columns that do not make much sense to us. In
    `SYS.TAB$`, we have columns named `FLAGS`, `PROPERTY`, `TRIGFLAG`, and multiple
    `SPARE` columns. If you have ever wanted to know more about the columns of the
    base tables, all it takes is a little detective work in the `$ORACLE_HOME/rdbms/admin`
    directory. As we will see in a bit, we would typically use the `DBA_TABLES` view,
    not the `SYS.TAB$` table. So let’s go to the directory and see which script creates
    the `DBA_TABLES` view. Listing [14-3](#467924_1_En_14_Chapter.xhtml#PC3) shows
    how to find the scripts that create the `DBA_TABLES` view.


    ```

    [oracle@dbamentor ~]$ cd $ORACLE_HOME/rdbms/admin

    [oracle@dbamentor admin]$ grep -i dba_tables *|grep -i create|grep -i view

    catspace.sql:create or replace view DBA_TABLESPACES

    catspace.sql:execute CDBView.create_cdbview(false,''SYS'',''DBA_TABLESPACES'',''CDB_TABLESPACES'');

    catspace.sql:create or replace view DBA_TABLESPACE_GROUPS

    catspace.sql:execute CDBView.create_cdbview(false,''SYS'',''DBA_TABLESPACE_GROUPS'',''CDB_TABLESPACE_GROUPS'');

    catspace.sql:create or replace view DBA_TABLESPACE_USAGE_METRICS

    catspace.sql:execute CDBView.create_cdbview(false,''SYS'',''DBA_TABLESPACE_USAGE_METRICS'',''CDB_TABLESPACE_USAGE_METRICS'');

    cdcore.sql:create or replace view DBA_TABLES

    cdcore.sql:execute CDBView.create_cdbview(false,''SYS'',''DBA_TABLES'',''CDB_TABLES'');

    depssvrm.sql:  CREATE OR REPLACE VIEW DBA_TABLESPACE_THRESHOLDS

    depssvrm.sql:execute CDBView.create_cdbview(false,''SYS'',''DBA_TABLESPACE_THRESHOLDS'',''CDB_TABLESPACE_THRESHOLDS'');

    e1002000.sql:create or replace view dba_tablespaces as select null nn from dual
    ;

    Listing 14-3

    Finding DBA_TABLES Creation

    ```


    In Listing [14-3](#467924_1_En_14_Chapter.xhtml#PC3), I used `grep` to give me
    a list of all files that contain the string `DBA_TABLES`. I then filtered for
    only those that had `CREATE` and `VIEW` in that same line. Some of the lines returned
    are for other database objects, but we can see that the file `cdcore.sql` creates
    the view `DBA_TABLES`. Open the file in a text editor and look for the line that
    creates this view. Do not make any changes to this file! In this file, we can
    see how Oracle uses nine different SYS-owned tables to create this view, plus
    some cryptic `X$` tables, which I will get to in a bit.


    Hopefully after looking at how `DBA_TABLES` was created, and all of those different
    joins, we can understand why we do not use the data dictionary base tables directly.
    The views, as we will explore in this chapter, make things much easier for us.
    Another reason to use the views instead of the base tables is that Oracle may
    make changes to columns and the data in the base tables with a new Oracle version.
    When they do that, they update the view to handle the changes. If you query the
    base tables directly, you may have to rewrite your SQL statements. If you query
    the view, things should work the same in the new version.


    So what about those `X$` tables like `X$KSPPCV` and `X$KSPPI` that are part of
    the `DBA_TABLES` view? Those `X$` tables are a mechanism for Oracle to be able
    to look into the contents of its own memory. This way, Oracle can query to see
    what is in its own memory by a simple SQL statement. The `DBA_TABLES` view gets
    some information from various data dictionary tables and the rest of the information
    from what is stored in Oracle’s memory.


    For most of your job, these base tables and `X$` memory tables are not important
    to your database administration job. You will be able to have a long career without
    spending too much time on them. I only mention them because it is inevitable that
    as you progress through your Oracle profession, you may be more interested in
    how things work behind the scenes. Curiosity is great here. For the most part,
    we will interact with the data dictionary with the information presented in the
    rest of this chapter, but you should continue to develop a healthy curiosity about
    how Oracle works behind the scenes.


    ## Static Dictionary Views


    Oracle classifies a number of their data dictionary views as *static*. This definition
    is used because the data in those views stays static unless a transaction occurs
    in the database to make a change. For example, if you query `DBA_TABLES` over
    and over again, it will return the exact same information. If someone creates
    a new table, that transaction will cause the data returned by `DBA_TABLES` to
    change. Querying `DBA_TABLES` after the change will result in the same data being
    returned until someone drops or creates another table.

