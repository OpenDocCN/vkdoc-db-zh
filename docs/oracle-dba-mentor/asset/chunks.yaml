- fmt: '## JDBC


    ODBC was has been around since the early 1990s. Shortly after its introduction,
    Sun Microsystems developed the Java programming language with its "write once,
    run anywhere" philosophy.


    To facilitate Java programs connecting to databases, Sun Microsystems released
    the Java Database Connectivity (`JDBC`) code in 1997. `JDBC` is very similar to
    `ODBC` but it is Java-specific whereas `ODBC` can be used by a variety of programming
    languages.


    There are two types of `JDBC` drivers, `thin` and `thick`. `Thin` `JDBC` drivers
    are great because you do not need to install anything. Simply place the Java archive
    file (`.jar`) somewhere on the system where the Java program can access it. Nothing
    else needs to be installed. The `thick` driver requires you to install the full
    Oracle Client software. In reality, there are four types of `JDBC` drivers, but
    Type 1 and Type 2 are called `thick` drivers.


    The rule of thumb is to use `thin` drivers wherever you can because deployment
    is so much easier. Otherwise, use `thick` drivers. If you are running a third-party
    application, the vendor will tell you which `JDBC` drivers to use. Just like `ODBC`
    drivers, use your database vendor''s drivers as much as possible. If the application
    is connecting to an Oracle database, then use Oracle''s `JDBC` drivers.


    The example in Listing 9-17 shows Java code to define a `JDBC` connection to an
    Oracle database using the `thin` `JDBC` driver.


    ```java

    String url = "jdbc:oracle:thin:username/password@//myhost:1521/orcl";

    ```

    Listing 9-17

    Thin JDBC Driver Example


    ## Moving On


    This chapter has discussed various methods to connect to an Oracle database. You
    must be able to make such a connection to access any data contained therein. We
    discussed the role of the Listener and the four critical pieces of information:
    protocol, hostname, port, and service name. It is very common for connection errors
    to be caused by one of those pieces being specified incorrectly. Other common
    connection errors could be caused by the Listener or Oracle instance being down,
    or ports being blocked.


    Most of the examples in this book will continue to use `SQL*Plus` locally on the
    database server. In a future chapter, we will introduce other tools to interact
    with your Oracle database.


    It took nine chapters to get here, but we now have our testbed up and running,
    and we know how to connect to the Oracle instance there. In the next chapter,
    we will be discussing test cases and testbeds. We will explore the power of experimentation
    and how to learn from failures. We needed a place to experiment and learn more
    about Oracle. We are finally ready to shift our focus in that area.


    # 10. Test Cases


    With an operational database built in our virtual machine, it''s time to start
    playing around. The first nine chapters got us to this point where we can get
    to the real reason for this book, learning more about the Oracle database.


    This chapter is devoted to test cases and testbeds. In this chapter, we will explore
    why we need testbeds and how we can create test cases to learn and to make sure
    we know what we are doing. As we will see in this chapter, test cases are a great
    way to learn and explore more about the Oracle database.


    ## Failure


    Never be afraid to fail. This is age-old advice that applies for anyone, even
    a database administrator. There is a less-than-obvious implicit statement at the
    end of that advice, which is to learn from your failures.


    Failure alone does nothing. You failed. It is only when you examine what went
    wrong and subsequently determine a better course of action that you can succeed.
    It is said that you learn more from failure than from success, so do not be afraid
    to fail. Get excited! You are about to learn something new and grow your career.
    Not only will you learn from failure, but you will gain confidence in your skills
    and knowledge. After you have achieved success, you will have confidence that
    you can succeed again and know that you can figure it out should you fail again.


    The major reason I wanted to write this chapter is because I see too many questions
    on Oracle forums asking something like "Can I create a primary key without using
    an index?" or "Can I create a foreign key to a table but reference something other
    than the primary key?" In my head, a little voice immediately responds, "No, you
    cannot, because you have not tried." It sounds a little rude, which is why I never
    provide this answer, but it is the truth. In Chapter 15, we will discuss using
    Oracle forums to grow your career. For now, understand that any question that
    starts with "can I" means you have immediately failed because you have not tried.


    ### Tip


    Never ask "Can I *X*?" Try first.


    What''s the lesson to learn from that initial failure? It should be obvious that
    one needs to try. An initial attempt is always warranted. You may find that you
    succeed your first try. If you ask someone "Can I *X*?" and then go and try it
    and find out you could all along, you have wasted everyone''s time asking them
    when you could have done the work yourself.


    Almost everyone has tried something and failed. They look at what went wrong and
    decide to try again with a different approach. They fail again. That didn''t work
    so the next way to analyze the situation is to determine if the new approach is
    leading them closer to their desired goal. If they feel this is a step closer
    to their preferred solution, they determine what the next step should be. If the
    approach is not proceeding in the needed direction, a different approach may be
    warranted.


    You will find many times throughout your career that your attempts and subsequent
    actions are leading you down the wrong path. In the course of failing, learning,
    trying again, and failing again, you may often find that you are getting no closer
    to a solution. This is part of the learning process. Each of these attempts will
    make you a better database professional, but only if you learn from the failures.


    As you backtrack trying to figure out where you went down the wrong path, you
    may go back to previous attempts to ascertain if a different path was needed from
    that point. We may have to go back to much earlier attempts. Everyone has been
    part of the ultimate failure where everything we try goes wrong and we must revert
    to the proverbial "square one" and start from the beginning.'
