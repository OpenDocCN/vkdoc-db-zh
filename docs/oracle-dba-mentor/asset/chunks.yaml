  trans: '

    ## 分区


    分区是一项需要额外付费的可选功能，它允许你将一个表细分为更小的表，称为 `分区`。分区对应用是透明的，它使得这些较小的表能够像一个大表一样协同工作。当一个表需要处理非常大量的行（通常是数百万行或更多）时，才会对其进行分区。小表通常无法从分区中获益。


    图 21-24 中的示意图展示了一个典型网店中的 `ORDER_DETAILS` 表。随着客户填写订单，订单的详细信息会存储在此表中。由于这是一个高流量网站，每天销售大量产品，数据库管理员（DBA）已根据下单年份对该表进行了分区。图
    21-24 的示意图显示了该表的四个分区，分别对应 2016 年至 2019 年。在 2020 年到来之前，DBA 将需要为该年添加一个分区。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig24_HTML.jpg](img/467924_1_En_21_Fig24_HTML.jpg)

    图 21-24 `ORDER_DETAILS` 分区表


    用户和应用程序通常不会直接引用分区。相反，它们仍然查询 `ORDER_DETAILS` 表。`ORDER_DETAILS` 表在存储上并不存在，它只存在于数据字典中。实际存储在磁盘上的是各个分区。当用户或应用程序查询
    `ORDER_DETAILS` 表时，Oracle 会从各个分区中提取数据。对表进行分区主要有两个原因：存储和性能。


    一个表位于且仅位于一个表空间中。然而，如果表被分区，那么各个分区可以被放置在不同的表空间中。这使得 DBA 可以根据需要将较旧、较少使用的分区放在较慢的磁盘存储上。例如，2016
    年的 `ORDER_DETAILS` 分区可以放在“慢速”磁盘上，而 2018 和 2019 年的分区因为更新，可以放在更快的磁盘上。DBA 通过在不同类型的磁盘存储上创建不同的表空间，并将分区移动到相应的表空间来实现这一点。由于
    2016 年的数据不会改变，DBA 随后可以将该表空间更改为 `只读`，从而让 `RMAN` 备份它一次，并在后续备份中跳过它。


    一个经过适当分区的表可以受益于 Oracle 的 `分区修剪` 功能。在图 21-24 的示例图中，很少有人会查看较旧年份的订单详情。通常，我们会查询最近的订单。DBA
    可以在表中存储订单详情日期的列上创建索引。但是，如果我们查询的日期范围足够大，比如上个季度的订单详情，Oracle 的优化器可能会认为索引的选择性不足，并执行全表扫描，读取回溯数年的详情。这可能导致极差的性能。如果表是按照详情日期分区的，Oracle
    将自动移除或修剪掉无需访问的非参与分区。在我们的例子中，如果我们要查询 2018 年第四季度的所有订单详情，Oracle 将只访问 2018 年的分区，并忽略其余分区，因为它知道它们没有任何记录可以满足该
    `SQL` 语句。


    当人们对 Oracle 表进行分区时，最大的错误是未能查看针对该表执行的最常见的 `SQL` 语句。你应该尽可能地利用 `分区修剪`。如果你经常按订单详情日期进行查询，那么按订单
    ID 列分区将不会给你带来任何 `分区修剪` 的好处。在决定分区列之前，请确保你知道哪些 `SQL` 语句需要受益于 `分区修剪`。


    在 Oracle 提供分区选项之前，人们实现了一种被称为“穷人的分区”的方法。他们通过创建多个较小的表，然后创建一个对所有这些表执行 `UNION ALL`
    操作的视图来实现。虽然这个解决方案让你能享受到与 Oracle 分区选项相同的存储优势，但它不能自动参与 `分区修剪`。


    在代码清单 21-1 中，我们可以看到如何对图 21-24 中的表进行分区的示例。


    ```

    CREATE TABLE ORDER_ENTRY.ORDER_DETAILS (

    ORDER_ID NUMBER(38,0) NOT NULL,

    ORDER_DETAIL_DATE_BEGIN DATE NOT NULL,

    ORDER_ITEM_ID NUMBER NOT NULL,

    ORDER_ITEM_COST NUMBER(38,2) NOT NULL,

    DATE_ITEM_SHIPPED DATE)

    TABLESPACE ORDER_ENTRY_DATA

    PARTITION BY RANGE (ORDER_DETAIL_DATE)

    (PARTITION o_d_2016  VALUES LESS THAN (TO_DATE(''01/01/2017 00:00:00'',''MM/DD/YYYY
    HH24:MI:SS'')) TABLESPACE ORDER_ENTRY_DATA,

    PARTITION o_d_2017  VALUES LESS THAN (TO_DATE(''01/01/2018 00:00:00'',''MM/DD/YYYY
    HH24:MI:SS'')) TABLESPACE ORDER_ENTRY_DATA,

    PARTITION o_d_2018  VALUES LESS THAN (TO_DATE(''01/01/2019 00:00:00'',''MM/DD/YYYY
    HH24:MI:SS'')) TABLESPACE ORDER_ENTRY_DATA,

    PARTITION o_d_2019  VALUES LESS THAN (TO_DATE(''01/01/2020 00:00:00'',''MM/DD/YYYY
    HH24:MI:SS'')) TABLESPACE ORDER_ENTRY_DATA,

    PARTITION o_d_max  VALUES LESS THAN (MAXVALUE) TABLESPACE ORDER_ENTRY_DATA);

    ```

    代码清单 21-1 分区表示例


    在上面的示例中，`ORDER_DETAILS` 表按照 `ORDER_DETAIL_DATE` 列进行分区。第一个分区 `O_D_2016` 包含该列值小于
    2017 年 1 月 1 日的所有记录。2017 年分区包含值大于 2016 年分区且小于 2018 年 1 月 1 日的所有记录。最后一个分区是一个兜底分区，用于存放值高于其他分区且小于该列可能最大值的所有记录。我经常包含这个兜底分区，以防
    DBA 忘记添加下一年的分区。一旦 DBA 发现了错误，他们可以在维护窗口期间采取纠正措施，但这样，应用程序功能就不会因为人为错误而中断。


    到目前为止展示的示例使用了 `范围分区`。分区是基于特定的值范围定义的。Oracle 支持以下分区方案：


    *   `范围分区`：可能是最常用的分区方法。数据基于值的范围进行分区，正如我们前面讨论的那样。


    *   `列表分区`：DBA 定义分区以保存一个离散值列表。例如，你可以按州或国家，或类似的政府边界进行分区。例如，在美国，可以有 50 个分区，每个州一个。


    *   `哈希分区`：对值运行哈希算法以确定使用哪个分区。


    *   `自动列表分区`：Oracle 会自动为你扩展列表分区表。


    *   `间隔分区`：与 `范围分区` 非常相似。我们不是定义具体的边界范围，而是可以使用数据类型的间隔。例如，在日期数据类型上，我们可以将间隔定义为该日期的年份部分。


    *   `复合分区`：表先使用一种方法分区，然后使用第二种方法进行子分区。一个常见的例子是使用基于日期的 `范围分区`，然后使用 `哈希分区` 来进一步细分数据。


    如果你处理的数据量非常大，分区选项可能正是你所需要的。并非所有东西都应该分区，但这个选项确实有助于驯服大型数据集。

    '
- fmt: '## Real Application Clusters


    在上一章中，我们探讨了 Oracle 数据库和实例之间的区别。请记住，数据库是磁盘上的文件，而实例是服务器上的内存和进程的集合。对于许多 Oracle 部署，数据库和实例之间是一对一的关系。这种架构有两个问题。第一，如果服务器不可用，任何人都无法访问数据。第二，性能受限于该服务器上的资源上限。Oracle
    Real Application Clusters (RAC) 解决了这两个问题。Oracle RAC 是一个高可用性和高可扩展性的解决方案。你不必在两者之间二选一，通过
    Oracle RAC 可以兼得。


    使用 Oracle RAC，其架构拥有多个实例，每个实例位于自己的服务器上。这些实例可以同时访问同一个数据库，即磁盘上的相同文件。通过 Oracle RAC，实例与数据库之间形成了多对一的关系。图
    [21-25](#467924_1_En_21_Chapter.xhtml#Fig25) 中的示意图展示了一个 Oracle RAC 系统。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig25_HTML.jpg](images/467924_1_En_21_Chapter/467924_1_En_21_Fig25_HTML.jpg)


    图 21-25 Oracle RAC 系统


    我们可以看到磁盘上的数据库 `ORCL`。磁盘必须在配置中的所有系统之间共享。因此，磁盘通常是网络附加存储（NAS）或存储区域网络（SAN）。为避免单点故障，磁盘系统应具有内置冗余。此外，磁盘需要可通过多条路径访问。


    在配置中的服务器之间创建了一个私有网络。该网络速度很高，用于实例间的通信。重要的是，该网络必须是私有的，这样其他网络活动才不会对 Oracle RAC 性能产生负面影响。


    在图 [21-25](#467924_1_En_21_Chapter.xhtml#Fig25) 的示意图中，我们为这个 Oracle RAC 系统设置了三台服务器。这些服务器形成一个*集群*，意味着多台机器作为一个整体协同工作。使集群正常工作的粘合剂是称为网格基础设施（Grid
    Infrastructure）的 Oracle 软件，它必须在创建 Oracle RAC 数据库之前安装并运行。


    每台服务器上都运行着一个实例。实例名称与数据库名称相同，但附加了实例标识符。对于 `ORCL` 数据库，我们有实例 `ORCL1`、`ORCL2` 和 `ORCL3`。


    用户会话可以连接到任何一个实例。高可用性得以实现，因为如果一台服务器不可用，集群中的另一台服务器（称为*节点*）可以接管工作。如果系统配置了透明应用故障切换（`Transparent
    Application Failover (TAF)`），当某个实例终止时，会话可以从一个实例迁移到另一个实例。


    通过向集群添加更多节点可以实现可扩展性。Oracle RAC 系统通常使用成本较低的服务器作为集群中的节点。如果需要更多资源，只需在配置中添加另一个节点。需要双倍资源？那就增加一倍的节点。


    请记住，Oracle 数据库软件需要在集群的所有节点上获得许可。Oracle Real Application Clusters 也需要在所有节点上获得许可。虽然这听起来可能需要大量额外的许可费用，但它通常比购买一台具有足够资源来支持工作负载的更大容量的服务器更便宜。


    如果你正在寻找高可用性或高可扩展性的解决方案，请关注 Oracle RAC。你将能够通过一次购买同时享受这两个方面的优势。


    ## Multitenant


    Oracle Multitenant 是 Oracle 数据库的未来方向。多租户技术将虚拟化带到了 Oracle 层面。本书前面我们创建了一个虚拟机作为我们的测试服务器。我们使用虚拟机是为了拥有自己独立的数据库服务器，而无需额外的物理硬件。如果我们能在
    Oracle 中创建虚拟数据库，那不是很好吗？这正是 Multitenant 所提供的。


    在 Multitenant 出现之前，Oracle DBA 可以通过在同一数据库服务器上运行多个实例来整合服务器。每个实例都有自己的数据库，所以请不要将其与
    Oracle RAC 混淆。例如，我们可能有一个 Oracle 数据库支持公司的人力资源应用程序，另一个数据库支持公司的会计系统。为了降低成本，我们可以将两者托管在同一台物理机器上。我们有两个数据库，每个都有自己的实例。正如我们在上一章所知，当我们启动实例时，每个实例都需要自己的
    `SGA` 和自己的后台进程。每个实例都会带来一定数量的开销。


    Oracle 数据库管理员后来尝试将它们合并到同一个数据库中，将人力资源表放在自己的模式中，将会计表放在另一个模式中。只要两个系统没有相同的公共同义词或对
    `PUBLIC` 的相同授权，这种方法就可行。


    为了促进数据库整合，Oracle 提供了 Multitenant 选项。使用 Multitenant，我们有一个大部分为空的容器数据库。然后我们插入一个人力资源数据库，再插入另一个会计数据库。所有的资源和开销都发生在容器数据库中。我们可以插入许多数据库，称为可插拔数据库（`Pluggable
    Databases (PDBs)`），而不会增加开销。每个 `PDB` 都与其他 `PDB` 隔离。`PDB` 甚至不知道其他 `PDB` 的存在。


    Multitenant 对于 Oracle 数据库管理员来说也是一个巨大的时间节省器。DBA 不是分别修补每个数据库，而是修补容器数据库。所有的 `PDB`
    都通过这一单次操作完成修补。如果 DBA 使用 `RMAN` 进行备份，备份容器也会备份所有 `PDB`。如果 DBA 添加另一个 `PDB`，则无需为确保其得到备份而进行任何额外工作。


    Oracle Multitenant 对应用程序是透明的。应用程序连接到实例，并且只能看到那个 `PDB`，这与非多租户数据库没有什么不同。应用程序无需做任何改变即可与
    Multitenant 一起工作。


    虽然不是必须的，但 Oracle Multitenant 通常部署在 Oracle RAC 之上。在整合数据库服务器时，我们可能不希望将它们全部放在一台服务器上。如果那台服务器发生故障，所有的
    `PDB` 都会宕机，给多个应用程序带来问题。此外，可能还会担心所有这些应用程序的工作负载对一台服务器来说太大了。Oracle RAC 凭借其高可用性和高可扩展性，解决了这些担忧。许多客户正在将数十个或超过一百个
    Oracle 数据库从单独的服务器迁移到带有 Multitenant 的 Oracle RAC 集群上，从而使用更少的机器。Oracle RAC 和 Multitenant
    是两个不同的产品，它们之间实际上没有必然联系。你可以使用其中一个，也可以两者都使用。我们越来越多地看到 Oracle RAC 与 Multitenant 一起部署。


    Oracle 公司已声明 Multitenant 是未来的方向。Oracle 12*c* 已弃用非多租户的 Oracle 数据库。虽然你仍然可以创建一个非多租户的数据库，就像我们在测试环境中所做的那样，但在未来某个时候，这将不再是一个选项。只要你将自己限制在一个
    `PDB` 内，你今天就可以开始使用 Multitenant 并在未来继续使用，而无需产生任何额外成本。如果你想要第二个或更多的 `PDB`，那就是你必须开始为
    Multitenant 选项获取许可的时候。'
  raw: '## Real Application Clusters


    In the previous chapter, we examined the difference between an Oracle database
    and an instance. Remember that the database is the files on disk and the instance
    is the collection of memory and processes on the server. For many Oracle deployments,
    there is a one-to-one relationship between the database and the instance. This
    architecture has two problems. One, if the server is unavailable, no one can access
    the data. Two, performance is constrained to the limits of the resources on that
    server. Oracle Real Application Clusters (RAC) addresses these two issues. Oracle
    RAC is a high-availability and high-scalability solution. You do not have to pick
    one or the other. You can have both with Oracle RAC.


    With Oracle RAC, the architecture has multiple instances, each on its own server.
    These instances can simultaneously access the same database, the same files on
    disk. With Oracle RAC, you get a many-to-one relationship between instances and
    the database. The diagram in Figure [21-25](#467924_1_En_21_Chapter.xhtml#Fig25)
    illustrates an Oracle RAC system.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig25_HTML.jpg](images/467924_1_En_21_Chapter/467924_1_En_21_Fig25_HTML.jpg)


    Figure 21-25


    Oracle RAC system


    We can see the database, ORCL, on disk. The disk must be shared over all systems
    in the configuration. As such, the disk is often Network Attached Storage (NAS)
    or in a Storage Area Network (SAN) . To avoid single points of failure, the disk
    system should have built-in redundancy. Additionally, the disk needs to be accessible
    via multiple pathways.


    A private network is created between the servers in the configuration. This network
    is high speed and is used for instance-to-instance communications. It is important
    that the network be private so that other network activity does not negatively
    impact Oracle RAC performance.


    In the diagram in Figure [21-25](#467924_1_En_21_Chapter.xhtml#Fig25), we have
    three servers for this Oracle RAC system. The servers form a *cluster*, meaning
    many machines acting together as one. The glue that makes the cluster work is
    Oracle software called Grid Infrastructure, which must be installed and running
    before an Oracle RAC database can be created.


    Each server has an instance running on it. The instance name is the same as the
    database name but with an instance identifier appended to it. For the ORCL database,
    we have instances ORCL1, ORCL2, and ORCL3.


    User sessions can connect to any of the instances. High availability is achieved
    because if a server is unavailable, another server in the cluster (called a *node*)
    can do the work. If the system is configured with Transparent Application Failover
    (TAF) , a session can move from one instance to another should its instance terminate.


    Scalability is achieved by adding more nodes to the cluster. Oracle RAC systems
    typically use lower-cost servers for the nodes in the cluster. Should more resources
    be needed, add another node to the configuration. Need double the resources? Double
    the nodes.


    Keep in mind that the Oracle database software needs to be licensed on all nodes
    in the cluster. Oracle Real Application Clusters also needs to be licensed on
    all nodes. While this may sound like a lot of extra licensing, it is often cheaper
    than buying a larger-capacity server with enough resources to support the workload.


    If you are looking for a high-availability or high-scalability solution, look
    at Oracle RAC. You will be able to enjoy both aspects for the one purchase.


    ## Multitenant


    Oracle Multitenant is the way of the future for Oracle databases. Multitenant
    brings virtualization down to the Oracle level. Earlier in this book we created
    a virtual machine to act as our testbed server. We used a virtual machine so that
    we could have our own distinct database server without requiring additional physical
    hardware. Wouldn’t it be nice if we could create virtual databases within Oracle?
    That’s what Multitenant provides.


    Before Multitenant, the Oracle DBA could consolidate servers by running multiple
    instances on the same database server. Each instance has its own database, so
    please do not confuse this with Oracle RAC. As an example, we might have an Oracle
    database supporting our company’s Human Resources application and another database
    supporting our company’s Accounting system. To reduce costs, we can host both
    on the same physical machine. We have two databases each with their own instance.
    As we know from the previous chapter, when we start the instances, each requires
    its own SGA, its own background processes. Each brings with it a certain amount
    of overhead.


    Oracle database administrators then tried to combine these into the same database
    by placing the HR tables in their own schema and the accounting tables in a different
    schema. This works so long as the two systems do not have the same public synonyms
    or the same grants to PUBLIC.


    To facilitate database consolidation, Oracle provides the Multitenant option.
    With Multitenant, we have a container database that is mostly empty. We then plug
    in a database for HR and plug in another database for Accounting. All of the resources
    and overhead occurs in the container database. We can plug in many databases,
    called Pluggable Databases (PDBs), without increasing the overhead. Each PDB is
    segregated from the other PDBs. PDBs do not even know other PDBs exist.


    Multitenant is also a great time saver for Oracle database administrators. Instead
    of patching each database separately, the DBA patches the container database.
    All of the PDBs are patched with this single operation. If the DBA is using RMAN
    for backups, a backup of the container will also back up all PDBs. If the DBA
    adds another PDB, no additional work is necessary for ensuring it is backed up.


    Oracle Multitenant is transparent to the application. The application connects
    to the instance and can see only that PDB, no different than if this were a non-Multitenant
    database. Applications do not have to change one bit to work with Multitenant.


    While not required, Oracle Multitenant is often deployed on top of Oracle RAC.
    When consolidating database servers, we may not want to put them all on one server.
    If that server fails, all of the PDBs would be down, causing problems for multiple
    applications. Also, there might be a concern that the workloads from all of these
    applications would be too much for one server. Oracle RAC, with its high availability
    and high scalability, addresses these concerns. Many customers are moving tens
    or over a hundred Oracle databases from individual servers to Oracle RAC clusters
    with Multitenant and using fewer machines. Oracle RAC and Multitenant are two
    different products that really have nothing to do with each other. You can use
    one or the other or both. Increasingly, we are seeing Oracle RAC being deployed
    with Multitenant.


    Oracle Corporation has stated that Multitenant is the way of the future. Oracle
    12*c* has deprecated the non-Multitenant Oracle database. While you can still
    create a non-Multitenant database, as we did in our testbed, at some point that
    will not be an option. You can begin using Multitenant today and in the future
    without incurring any additional costs so long as you limit yourself to a singular
    PDB. If you want a second PDB, or more, that is when you must start licensing
    the Multitenant option.'
