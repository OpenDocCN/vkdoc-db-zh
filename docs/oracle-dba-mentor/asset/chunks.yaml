  trans: '## 继续前进


    正如之前所述，本书与其他书籍不同，因为它不仅专注于成为一名成功的 Oracle 数据库管理员所必需的技术信息，还为你提供如何学习那些在任何书籍中都找不到的知识的建议。本书可以作为你职业发展道路上众多导师之一，助你推进数据库管理员的生涯。我设计本书的目的，不仅是帮助你学习更多关于管理
    Oracle 数据库的知识，更是帮助你掌握如何学习那些在其他书籍、甚至 Oracle 官方文档中也无法找到的内容。


    下一章可能并不包含你所认为的技术信息。相反，它将重点介绍作为一名数据库管理员执行工作所必需的**软技能**。请不要跳过这一章，因为它仍然包含非常重要的信息。


    # 2. 作为数据库管理员工作


    在上一章，我介绍了成为数据库管理员的职业路径，以及 DBA 的一般职责和责任，包括他们作为**数据守护者**的角色。在本章中，我们将花时间讨论如何作为数据库管理员进行工作。本章的信息本质上并非技术性的，也适用于非
    Oracle DBA。本章将重点介绍所有优秀数据库管理员都应具备的软技能。本章中的许多信息可以在 DBA 角色之外使用，并应用于组织中的其他职位。


    ## 粗鲁的数据库管理员


    取决于你询问的对象，数据库管理员在 IT 世界中通常是一个备受尊敬的职业。正如我们在上一章讨论的，DBA 通常来自应用程序开发或系统管理背景。一个人大学一毕业就直接成为数据库管理员的情况比较少见。通常，DBA
    是逐步晋升到这个职位，并展现了高超的技能才得以成功。


    当你作为一名 DBA 工作时，请试着记住，你不仅代表你自己和你的组织，你也代表着这个职业。我一直认为数据库管理员是 IT 职业阶梯上的顶级职位之一。因此，你将与组织内部的许多人互动。如果你遵循后续章节的建议，你还将与全球
    Oracle 社区的许多人互动。以积极的方式展现自己，其对你整个职业生涯的影响，将远远大于你表现出不良行为所带来的影响。遗憾的是，我遇到过太多这样的 DBA，他们总是脾气暴躁，对他人持阻挠态度——这些特质并非
    DBA 独有。例如，一位 DBA 无论业务需求如何，也不给出解释，就拒绝授予特权或创建新数据库。我听过太多关于 DBA 是个混蛋、难以共事的故事。一些 DBA
    持有这种态度的原因可能有很多，但请不要成为这类 DBA。如果你收到一个特权或创建新数据库的请求，并且你认为这个请求不应该被满足，与其用某种粗鲁的方式拒绝请求，更好的方法是弄清楚请求者真正需要什么，以及你如何能帮助他们完成工作。不要回应“你的请求被拒绝”，而是说“抱歉，但按照你概述的方式满足该请求会导致其他问题。我们能否换种方式，既能让你完成工作，又能解决我的顾虑？”


    ### 提示


    不要做那个粗鲁的 DBA。要做乐于助人的那一个。


    我一直有一种未经证实的观点：粗鲁的 DBA 是当今非常流行的无模式数据库兴起的次要原因之一。应用程序开发者声称，像 MongoDB 这样的数据库很棒，因为他们可以自己安装、设置并开始编码，而无需
    DBA 的任何协助。我的反驳观点是，通过避开 DBA，开发者会错过数据库管理员通常会考虑的许多其他方面。其中一些方面涉及数据库安全以及经过验证的备份与恢复实施。应用程序开发者不习惯成为数据守护者，这是我们在上一章讨论过的概念。在第七章（7）中，我们将讨论
    DBA 应该在备份之前就考虑恢复，这一观点是大多数应用程序开发者甚至不会考虑的。2017 年，超过 25,000 个未受保护的 MongoDB 数据库遭到了勒索软件^(¹)的攻击。这并非因为
    MongoDB 是一个不安全的数据库平台。相反，这些部署使用了弱密码和默认用户名。DBA 被绕过了，安全从未被考虑，公司为此付出了代价。如果 DBA 参与了这些项目，数据库很可能会得到保护，因为一个好的
    DBA 会考虑这些问题。我很好奇，那 25,000 多个 MongoDB 实例所属的公司中，现在有多少家希望当初是由他们的 DBA 负责管理其数据库平台。


    这个例子并非意在指责 MongoDB。它是一个很棒的产品，我目前也管理着几个 MongoDB 数据库。开箱即用，MongoDB、Oracle 和其他数据库平台都不安全。无论部署哪种数据库平台，锁定安全设置都是数据库管理员的职责。这个例子的重点是，人们试图避开粗鲁的
    DBA，并会寻找替代方案，而这些方案往往缺乏对良好数据治理至关重要的安全性和其他控制措施。


    ### 提示


    粗鲁的 DBA 是负债。乐于助人的 DBA 是资产。


    乐于助人并不意味着 DBA 需要满足同事的任何请求。有很多时候我会拒绝请求。每当我拒绝一个请求时，我都会保持礼貌，并提供后续指导，让请求者能够继续工作。请求者需要完成他们的工作。他们知道数据库中的某些东西目前阻碍了他们完成任务。根据我的经验，大多数请求者在如何正确绕过数据库障碍方面的知识不如数据库管理员丰富。这正是
    DBA 必须帮助将请求塑造成能同时满足双方需求的方案的时刻。'
- fmt: '## Multiplatform Work


    Today’s DBA usually has to work with a variety of database platforms. It is rare
    for a database administrator to focus solely on one database platform. Early in
    my career as a DBA, I was hired to work at a company that only used Oracle database
    systems. Our small team of DBAs worked day in and day out with Oracle. One day,
    our manager told us that SQL Server was coming into the shop and one of us would
    need to get up to speed on the product. I jumped at the opportunity. I was surprised
    I didn’t have a fight on my hands deciding which DBA on the team would manage
    this new product. While my primary expertise lies with Oracle, since that day,
    I have never had a job where I did not have to manage both Oracle and SQL Server.
    On that day, I knew that being able to manage multiple platforms would be good
    for my future career prospects. I have found that it is more beneficial to my
    career growth to be able to work successfully with multiple database platforms.
    After I learned SQL Server in addition to Oracle, I did not stop there. I continued
    to learn more about other database products, especially as new ones were introduced
    to the community.


    Over the years, I’ve worked on many different database engines: Oracle, SQL Server,
    MongoDB, MySQL, PostgreSQL, and DB2, to name a few. Today’s database administrator
    is being asked to do the same. Many times, you will be asked to support different
    database platforms due to third-party software deployments. One product works
    on Oracle and another product only supports SQL Server, as an example. With the
    rise of NoSQL databases, you may find that your trusted relational databases are
    not an appropriate solution to satisfy ever-increasing volumes of data. As such,
    your career will more than likely have you working on multiple database platforms.
    So how do you do it? How do you work with all these products that can be so different
    from each other?


    I learned in my first SQL Server administration class how I needed to approach
    the new system. Prior to my DBA career, I made the personal choice to attend college
    and obtain a degree in computer science, with a focus on database systems. In
    college, I learned the theory of how database systems should work. I studied normal
    forms, properties of transactions, relational database theory, and so much more.
    I never gave it much more thought as I learned to be an Oracle DBA. Sitting there
    in my first class on SQL Server, the instructor was talking about creating tables
    in a SQL Server database. My thoughts started to center on how in Oracle we create
    the table in a tablespace and a database is composed of multiple tablespaces,
    but SQL Server is a bit different. Then I remembered how one of my professors
    in college talked about the database engine having the responsibility of abstracting
    the storage from the database design. That’s when it occurred to me that I should
    rely on the relational database theory I was taught in college and that all I
    needed to do was to figure out how each database platform implemented the theory.
    The next day of the SQL Server administration class, we were going to be discussing
    backup and recovery. I knew how this worked in Oracle. I remembered from my college
    days that database systems have a transaction journal and that a backup plus the
    journal lets me recover my data to a point in time. From an Oracle perspective,
    that transaction journal is the online and archived redo logs. I learned in class
    that SQL Server keeps a transaction log for each database. My foundation in how
    database systems work in general, from my college courses, let me easily spot
    how Oracle implements the details, as I was now in the workforce. Working on a
    new platform, I immediately knew I needed to just figure out how that system implemented
    the transaction journal, after which I was off and running.


    ### Tip


    If you know the general database theory, encountering a different platform means
    you just need to know how the platform implements the theory.


    For me, those college days are a distant memory. Database systems have changed
    so much since then. Database vendors are constantly implementing new features,
    like materialized views, that I never learned about in college. Oracle introduced
    materialized views and I’ve used them to successfully improve application performance
    in certain situations. One day I needed to do something with SQL Server and I
    thought materialized views would be a good fit if I could just figure out how
    SQL Server implements that feature. In those cases, when I know which feature
    to leverage in Oracle and want to implement it in another database engine, I do
    a simple web search with the Oracle feature and other platform name. A quick web
    search for “SQL Server materialized view” led me quickly to a Microsoft feature
    called indexed views—different name but very close to the same feature. I then
    searched for “SQL Server indexed views” and was off and running with the other
    platform. It works both ways. If you come from a SQL Server background and have
    to work on Oracle, searching for “Oracle indexed views” will quickly lead you
    to the materialized view feature name.


    After I know which feature in the new database engine promises to give me the
    functionality I seek, I then turn to the product’s official documentation to learn
    more.'
