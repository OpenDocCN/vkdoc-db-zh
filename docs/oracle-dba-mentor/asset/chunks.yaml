- fmt: '# Database Configuration Assistant


    In Chapter [6](#467924_1_En_6_Chapter.xhtml), we used the Database Configuration
    Assistant (`DBCA`) to create our first Oracle database. The `DBCA` can perform
    other tasks as well, such as deleting a database, managing `DBCA` templates, and
    configuring an existing database, as can be seen in Figure [11-12](#467924_1_En_11_Chapter.xhtml#Fig12).


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig12_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig12_HTML.jpg)

    *Figure 11-12: `DBCA` operations*


    Configuring an existing database can be used to add or remove optional components
    such as Oracle Text, Oracle Multimedia, Oracle Spatial, etc.


    When you created an Oracle database, the `DBCA` walked you through a series of
    questions. You do have the option of saving those answers as a template so that
    creating future databases is not only easier, but follows your standards. If you
    select the option to Manage Templates, the `DBCA` will ask if you want to create
    one or delete one, similar to Figure [11-13](#467924_1_En_11_Chapter.xhtml#Fig13).


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig13_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig13_HTML.jpg)

    *Figure 11-13: `DBCA` Create Template*


    You can have the template created using an existing template or by examining an
    existing database. Once the template has been created, you can see the template
    in the list. In Figure [11-14](#467924_1_En_11_Chapter.xhtml#Fig14) the first
    three templates are included in the `DBCA` out of the box, but I created the final
    template.


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig14_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig14_HTML.jpg)

    *Figure 11-14: `DBCA` template selection*


    # Network Configuration Assistant


    Oracle includes a Network Configuration Assistant (`NETCA`) to help configure
    the network components of the Oracle database. The `NETCA` is used to configure
    the Listener and any LDAP authentication for the Oracle database.


    In Chapter [9](#467924_1_En_9_Chapter.xhtml), we created a `TNS` alias by manually
    editing the `tnsnames.ora` configuration file. Most Oracle database administrators
    edit `tnsnames.ora` by hand with any text editor. The Network Configuration Assistant
    can also be used to modify the `tnsnames.ora` configuration file.


    After launching the `NETCA`, the utility should look like Figure [11-15](#467924_1_En_11_Chapter.xhtml#Fig15).
    Chose Local Net Service Name Configuration and click Next.


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig15_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig15_HTML.jpg)

    *Figure 11-15: `NETCA` initial screen*


    On the next screen, we can add, reconfigure, delete, rename, or test a `TNS` alias.
    The wizard walks you through the rest.


    As stated, most Oracle database administrators edit the configuration files by
    hand. On occasion, they will run into issues where the syntax is not working correctly.
    Using the `NETCA` is a great way to make sure the syntax gets formulated properly.


    # Other Tools and Utilities


    This chapter has touched on a few of the tools and utilities that you may use
    as an Oracle database administrator. Most of your time will be spent with `SQL*Plus`
    and/or `SQL Developer`. Many database administrators use `Enterprise Manager`
    throughout the day as well. This chapter could not spend a lot of time discussing
    these tools in more detail due to space constraints. After all, `Enterprise Manager`
    deserves a book of its own. Like anything with Oracle, you will have to explore
    and learn more on your own.


    The tools and utilities do not stop with what we have seen so far in this chapter.
    There are so many utilities that you will find yourself using from time to time.
    In this section, I will discuss a number of these utilities and let you know what
    they are used for. The important thing to learn is what is out there and what
    job each tool is good at performing. Once you know which tool to use, you can
    immediately focus your attention in the proper area. The following is a list of
    various tools and utilities:


    *   `Database Upgrade Assistant (DBUA)`: A GUI wizard that walks you through the
    upgrade process. A future chapter will show this tool in more detail.

    *   `Data Pump`: A collection of utilities to export and import data from one
    Oracle database to another.

    *   `SQL*Loader`: A command-line utility to import text file data into an Oracle
    database.

    *   `Automatic Diagnostic Repository Command Interpreter (adrci)`: A command-line
    utility to manage diagnostic trace files. It can also be used to package up trace
    files to send to Oracle Support for analysis.

    *   `Database Verify (dbv)`: A command-line utility to check the database’s data
    file for corruption.

    *   `Character Set Scanner (csscan)`: A command-line utility to scan the database
    before changing its character set. This utility will help spot issues resulting
    from a character set conversion.

    *   `Listener Control (lsnrctl)`: A command-line utility to manage the Listener.
    We have seen a number of examples throughout this book already.

    *   `Oracle Error (oerr)`: A command-line utility to display the error messages
    for a specific error code. For example, in a Terminal window, type `oerr ora 100`
    to get text help for the `ORA-00100` error message.

    *   `Oracle Password Utility (orapwd)`: A command-line utility to manage Oracle’s
    password file, which is used for external authentication to `SYSDBA` and `SYSOPER`
    accounts.

    *   `Orion`: A command-line utility to benchmark disk performance.

    *   `Relink`: A command-line utility to recompile the Oracle software.

    *   `Recovery Manager (RMAN)`: A command-line utility to back up and restore the
    Oracle database. `RMAN` was discussed in Chapter [7](#467924_1_En_7_Chapter.xhtml).

    *   `tkprof`: A command-line utility that can reformat some trace files into more
    human-readable output.

    *   `TNS Ping (tnsping)`: A command-line utility to determine that the `TNS` alias
    will reach a valid Listener. This utility was discussed in Chapter [9](#467924_1_En_9_Chapter.xhtml).

    *   `sqlcl`: A command-line utility that is a replacement for `SQL*Plus`. `SQL*Plus`
    has not seen major changes in many years. The `sqlcl` utility is provided by the
    same team at Oracle that creates `SQL Developer`. It is billed as “`SQL Developer`
    meets `SQL*Plus`.” This is the one Oracle product on the list that is not installed
    by default.

    *   `Swingbench`: A free utility available at [`www.dominicgiles.com`](http://www.dominicgiles.com)
    that lets you performance test your Oracle database. This is not an Oracle product
    and is not installed by default.

    *   `HammerDB`: An open source utility that lets you performance test Oracle and
    other database platforms. This is not an Oracle product and is not installed by
    default.


    Most of the tools and utilities in this list are supplied by Oracle Corporation
    and are present when you install the Oracle database software. There are plenty
    of third-party tools at your disposal as well. Some of those typically require
    extra fees. You and your company will have to evaluate those products to see if
    they are worth the extra cost.


    ## Moving On


    This chapter spent some time discussing some of the tools at the Oracle DBA’s
    disposal. As you work with these tools, you will learn more about them and how
    to use them to do your work.


    In the next chapter, we will move on to Oracle diagnostic files. It is important
    that the database administrator know how to leverage the diagnostics and trace
    files to learn more about what is going wrong with the Oracle database.


    # 12. Diagnostics


    In previous chapters, we set up a database and started using it. In this chapter,
    we will leverage diagnostic and trace files to learn more about the issues that
    may be plaguing our Oracle database. If the Oracle instance fails to start or
    it crashes, the diagnostic files are a great place to start digging into the problem.'
