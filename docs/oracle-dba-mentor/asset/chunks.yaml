  trans: '## 跨平台工作


    如今的数据库管理员（DBA）通常需要与多种数据库平台打交道。只专注于一个数据库平台的管理员已经很少见了。在我 DBA 职业生涯早期，我受雇于一家只使用 Oracle
    数据库系统的公司。我们的 DBA 小团队日复一日地与 Oracle 系统打交道。有一天，我们的经理告诉我们，SQL Server 即将引入公司，我们中需要有一个人来快速掌握这个产品。我立刻抓住了这个机会。我有些惊讶，当时团队里并没有为谁来管理这个新产品而争抢。虽然我的主要专长是
    Oracle，但从那天起，我之后的每一份工作都需要同时管理 Oracle 和 SQL Server。就在那一天，我知道能够管理多个平台对我的未来职业前景是有好处的。我发现，能够成功地与多个数据库平台合作，对我的职业成长更为有益。在学会了
    SQL Server 之后，我并没有止步于此。我继续学习更多关于其他数据库产品的知识，尤其是在社区中推出新产品时。


    多年来，我使用过许多不同的数据库引擎：Oracle、SQL Server、MongoDB、MySQL、PostgreSQL 和 DB2 等。如今的数据库管理员也被要求这样做。很多时候，由于第三方软件的部署，你会被要求支持不同的数据库平台。例如，一个产品在
    Oracle 上运行，而另一个产品只支持 SQL Server。随着 NoSQL 数据库的兴起，你可能会发现你信赖的关系型数据库并不是满足不断增长的数据量的合适解决方案。因此，你的职业生涯很可能会让你在多个数据库平台上工作。那么你该如何做呢？你如何与这些彼此差异巨大的产品一起工作？


    我在第一次参加 SQL Server 管理课程时，就学到了该如何应对这个新系统。在开始 DBA 职业生涯之前，我选择上大学并获得了计算机科学学位，专注于数据库系统。在大学里，我学习了数据库系统如何工作的理论。我学习了范式、事务的属性、关系数据库理论等等。当我学习成为一名
    Oracle DBA 时，我并没有过多思考这些理论。当我坐在第一次 SQL Server 课堂上，讲师正在讲述如何在 SQL Server 数据库中创建表时，我的思绪开始集中：在
    Oracle 中，我们在表空间中创建表，一个数据库由多个表空间组成，但 SQL Server 有些不同。然后我想起大学里的一位教授曾谈到，数据库引擎负有将存储与数据库设计抽象开来的责任。那一刻我意识到，我应该依靠大学里学到的关系数据库理论，而我需要做的就是弄清楚每个数据库平台是如何实现这个理论的。第二天
    SQL Server 管理课，我们将讨论备份和恢复。我知道这在 Oracle 中是如何工作的。我记得大学时学过，数据库系统拥有事务日志，而一份备份加上日志可以让我将数据恢复到某个时间点。从
    Oracle 的角度来看，那个事务日志就是在线和归档的重做日志。我在课堂上了解到，SQL Server 为每个数据库保留一个事务日志。我大学课程中学到的关于数据库系统如何运作的基础知识，让我在进入职场后，能够轻松地看懂
    Oracle 是如何实现细节的。面对一个新平台，我立刻明白我只需要弄清楚该系统是如何实现事务日志的，之后我就可以顺利上手了。


    ### 小贴士


    如果你通晓通用的数据库理论，那么遇到不同的平台就意味着你只需要了解该平台是如何实现这个理论的。


    对我而言，大学时光已是久远的记忆。从那时起，数据库系统已经发生了巨大的变化。数据库厂商不断实现新功能，比如物化视图，这些我在大学里从未学过。Oracle 引入了物化视图，我曾利用它们在某些情况下成功地提升了应用性能。有一天，我需要在
    SQL Server 上做点什么，我觉得物化视图会是个不错的选择——如果我能弄清楚 SQL Server 是如何实现这个功能的话。在这种情况下，当我知道在
    Oracle 中要利用哪个功能，并想在另一个数据库引擎中实现它时，我会进行一次简单的网络搜索，输入 Oracle 功能名称和另一个平台的名称。快速搜索“SQL
    Server 物化视图”让我迅速找到了一个名为索引视图的 Microsoft 功能——名称不同，但功能非常接近。然后我搜索“SQL Server 索引视图”，很快就在另一个平台上顺利上手了。这方法反过来也适用。如果你来自
    SQL Server 背景，需要使用 Oracle，搜索“Oracle 索引视图”会很快让你找到物化视图这个功能名称。


    当我确定了新数据库引擎中哪个功能有望提供我所需要的功能后，我就会转向该产品的官方文档以了解更多。'
- fmt: '# Tips


    If you know the feature on one platform and want to find a similar feature on
    a different platform, perform a web search for "other_platform feature_name" and
    you can quickly figure out which feature is similar on the other platform.


    So long as you know what feature you use on one platform to do the job, it normally
    doesn’t take long to find out the similar feature’s name on another database platform.
    This allows you to quickly perform tasks on a platform that you may not be familiar
    with.


    Another tip is to search for "old_platform for the new_platform DBA." This will
    provide guides to help you translate from one platform you already know to another
    one you are starting to work with. For example, you could search for "Oracle for
    the SQL Server DBA" or vice versa. When working with a new database platform on
    which I need to get up to speed quickly, I often perform a similar search. It
    doesn’t take too long for me to find a "cheat sheet" (or several). The cheat sheet
    quickly clues me in to the terminology I need for the new database engine. However,
    you should only use the results as a guide. Use the product’s official documentation
    for the best source of information. All too often I find a cheat sheet written
    by someone who knows one database engine well and only has a cursory knowledge
    of the other product, and they often miss some very important information. For
    example, when contrasting and comparing Oracle’s "database" to a SQL Server "database,"
    it is common for cheat sheets to fail to explain clearly that the term "database"
    means two different things in the two different platforms. A cheat sheet typically
    devotes one sentence to highlight the differences when a full paragraph is needed
    to explain more accurately the differences. Therefore, you should refer to the
    official documentation to learn more.


    Lastly, having a good foundation in database theory is not essential but it does
    help. Oracle is a relational database. As such, the Oracle DBA should learn Dr.
    Edgar F. Codd’s relational theory as well as the work of Christopher J. Date.
    Codd and Date are the pioneers of the relational database that we use today. As
    I alluded to earlier, if you know the theory of how the engine is supposed to
    work, then you can easily focus on how the engine implements that theory.


    Let me illustrate the point with a car example. Would you take your Toyota to
    a mechanic that only knows how to fix a Chevy 5.7L engine? I would rather take
    my vehicle to a mechanic that knows the principals of how a combustion engine
    is supposed to work. Gas is mixed with oxygen and moved into a cylinder. A spark
    ignites the gas fuel mixture, which pushes a piston that causes the engine to
    move. A Toyota sedan might have fuel injection instead of the old-fashioned carburetors.
    That Chevy 5.7L mechanic will not know anything about fuel injection. But the
    mechanic that understands the foundations of how combustion engines work knows
    that fuel injection is a different method of delivering the fuel and oxygen to
    the cylinder.


    Back to relational database engines, the manufacturers try to adhere to many of
    Codd’s and Date’s theoretical foundations. As I have said before, if you know
    the theory behind how it is supposed to work, all you need to do is figure out
    how a particular vendor implemented that detail. This makes working with different
    database platforms much easier. Even if you work with only one database platform,
    a good foundation on database theory will help your career. Sadly, too many colleges
    these days are focusing on giving their students "employable skills," which means
    they teach the specifics of the top industry needs and gloss over the theoretical
    foundations. Do not get me wrong. Employable skills are great. But I have seen
    too many colleges focus on Oracle and totally skip the work of Codd and Date.
    The student graduates and easily finds a job as an Oracle DBA, armed with the
    knowledge they learned from that institution. The college and the student are
    both happy. Then the student advances through their career and is asked to work
    on MySQL. Too bad for the student they are only a Chevy 5.7L engine mechanic.
    The student was never given a proper foundation in database theory and likely
    will have a hard time adjusting to the different database platform.


    Take a retrospective look at your own educational background. If you did not receive
    a proper education in database theory, take some time to invest in yourself by
    learning more about the theory of how it *should* work. Then apply that theory
    to the databases you manage to see how it *actually* works.


    ## Typical DBA Answers


    It seems when someone asks a question to the database administrator, I have observed
    that there are a few answers that are often given that seem to fall into these
    three categories:


    *   Yes, I can do that.

    *   No, I cannot do that.

    *   It depends.


    The first answer is one that everyone loves to hear. They asked you for something
    and you are going to satisfy their request.


    The middle answer is the one everyone hates to hear. Earlier in this chapter,
    I described the rude DBA. It is often this answer that starts to define the rude
    DBA, the one that is difficult to work with. As was stated previously, if this
    is the answer you need to provide to someone, find a gentler way to say it and
    make sure you strive to provide them some assistance so that they can get back
    to performing their job. On those occasions where you need to say "No," always
    provide a solid reason why the request cannot be satisfied. If you can explain
    why you denied the request, you will not be thought of as the rude DBA. Be prepared
    to defend your request at a later date. The requestor will inevitably say to someone
    that they cannot do their job because your denial is getting in the way. Management
    may come to you and ask why you denied the request. You need to have a good, solid,
    factual basis for the denial. No one likes to hear "No" but sometimes it needs
    to be said.


    Which brings me to the final answer, which is every database administrator’s favorite
    response. "It depends." What often happens is someone comes to the DBA with a
    request but has left out crucial details the DBA needs to know. The DBA needs
    to perform some investigative work to learn more. For whatever reason, decisions
    in database systems are often a balancing act. Add something on one side of the
    scales and the other side is impacted, and vice versa. For example, an application
    developer asks "Will adding an index to this table help my performance?" The answer
    is, predictably, "It depends." If the `SELECT` statement uses the index, it may
    well complete faster. But on the other side of the scale is `INSERT` performance,
    which can be negatively impacted if too many indexes are created on a table. Even
    the first part of the answer depends on details that have yet to be defined. An
    index does not necessarily help `SELECT` performance. The number of rows in the
    table and how many rows need to be returned are crucial details missing from the
    question. Sometimes what looks like a simple request on the surface requires more
    analysis before a proper answer can be given.


    Whenever giving the "It depends" answer, it is usually a good idea to ask probing
    questions to help provide the best possible answer. The requestor often does not
    know which details they need to provide to obtain the correct answer. If the requestor
    knew enough to provide these details, they would be knowledgeable enough to answer
    their own question. They are coming to the DBA for assistance and, many times,
    the DBA needs to lead them by the hand, so to speak. If the DBA still needs to
    give an "It depends" answer, the DBA should explain the trade-offs so the requestor
    has the best information possible.'
