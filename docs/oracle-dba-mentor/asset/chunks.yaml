    Fixed Size                  8628936 bytes

    Variable Size             939525432 bytes

    Database Buffers         3338665984 bytes

    Redo Buffers                8146944 bytes

    Database mounted.

    Database opened.

    Listing 12-7

    Fixing Our Control File

    ```


    The directory is obviously missing that control file, so I simply copied it from
    the other control file. I then terminated the instance that was partially up and
    running and started it back up with success.


    The Alert Log also contains useful information when the instance is shut down,
    although not the same volume of information. See if you can spot the following
    in the excerpt of the log seen in Listing [12-8](#467924_1_En_12_Chapter.xhtml#PC8):


    *   Date and time the shutdown was started


    *   Date and time the shutdown was completed


    ```

