    的不同方法。本书前面的所有示例都要求应用程序（通常是 `SQL*Plus`）与数据库位于同一台机器上。最终用户应用程序很少在数据库服务器上运行，因此它们需要连接到
    Oracle 实例。


    ## 本地连接


    Oracle 数据库运行在网络上某处的一台机器上。这台机器可能是你组织数据中心里的一台，也可能存在于云环境中。如果你能访问这台机器，你就可以与数据库建立本地连接。“本地”一词意味着你的数据库应用程序将与数据库位于同一台机器上。


    在本节中，我们的数据库应用程序将是 `SQL*Plus`。我们在本书前面已经看到过几个使用 `SQL*Plus` 进行本地连接的示例。在我们创建的测试系统中，打开一个终端窗口。测试系统只有一个
    Oracle 数据库，但服务器上可能存在多个 Oracle 实例，可能版本也不同。在我们能够连接到本地 Oracle 实例之前，我们需要设置环境，以便 `SQL*Plus`
    连接知道要连接到哪个实例。我们通过更改环境变量来实现这一点。首先，我们将定义我们要连接的实例，称为系统标识符（`SID`）。接下来，我们将定义 Oracle
    主目录。最后，我们将 Oracle 主目录的 `bin` 子目录添加到 `PATH` 中，这样我们只需键入可执行文件名（如“`sqlplus`”），系统就能找到它。设置环境变量如清单
