- fmt: '## Interactive Quick Reference


    Rather than rely on my diagrams of the Oracle architecture, you could look in
    the *Database Concepts* guide for some nice visualizations. In addition, Oracle
    Corporation has provided an interactive web page that lets you explore the Oracle
    architecture. You can find this web page at the following URL:

    ```

    www.oracle.com/webfolder/technetwork/tutorials/obe/db/12c/r1/poster/OUTPUT_poster/poster.html

    ```


    Once on that web page, click the **Database Architecture** tab. This will bring
    you to a complex diagram, reproduced in Figure 20-4, showing every piece of the
    architecture.


    ![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig4_HTML.jpg](images/467924_1_En_20_Chapter/467924_1_En_20_Fig4_HTML.jpg)


    Figure 20-4 Interactive Quick Reference Database Architecture tab


    We can see all of the processes and memory structures and follow the flow of activity
    through this architecture. There is so much more than was written in this chapter.
    Processes and memory structures not discussed here are not as significant as the
    ones mentioned, but they may be important to you as you explore more about how
    Oracle works.


    To interact with the diagram, double-click it. You will be zoomed into the image
    and you can use your mouse to move it to an area of interest. If you want to learn
    more about an item in the diagram, click it. In Figure 20-5, I clicked the **Checkpoint
    Process**.


    ![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig5_HTML.jpg](images/467924_1_En_20_Chapter/467924_1_En_20_Fig5_HTML.jpg)


    Figure 20-5 Interactive Quick Reference CKPT details


    The pane on the right lists the information about the `CKPT` process I clicked.
    At the bottom of these details are links to the Oracle documentation that discusses
    the item in greater detail.


    If you click the **Background Processes** tab, you can get information about all
    of the background processes. There are so many processes, this site arranges them
    by various categories. In Figure 20-6, I clicked the **General** category.


    ![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig6_HTML.jpg](images/467924_1_En_20_Chapter/467924_1_En_20_Fig6_HTML.jpg)


    Figure 20-6 Interactive Quick Reference Background Processes tab


