    ## 安装与升级


    在 Oracle 18c 版本的 Oracle Database 分类下，有一个名为 `Install and Upgrade` 的链接。它位于 `Topics`
    标题下，如图 13-4 所示。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig4_HTML.jpg](img/467924_1_En_13_Fig4_HTML.jpg)


    图 13-4：`Install and Upgrade` 链接


    点击该链接会进入一个包含多本与安装和升级 Oracle 数据库相关书籍的部分，其部分内容如图 13-5 所示。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig5_HTML.jpg](img/467924_1_En_13_Fig5_HTML.jpg)


    图 13-5：18c 安装指南（部分视图）


    我们将在第 18 章讨论 `Database Upgrade Guide`。`Licensing Information User Manual` 是所有
    Oracle 数据库管理员的必读书籍。这本书解释了 Oracle 的许可方式，非常重要，可以避免您的组织因不当使用 Oracle 而面临额外费用甚至更糟的情况。如果您因许可使用情况而被
    Oracle 审计，您会庆幸自己阅读并遵守了本手册中的信息。


    接下来页面上是针对不同平台安装 Oracle 的部分。我们在第 5 章探讨了 `Installation Guide for Linux`。希望您至少已经浏览过这份文档，了解其中呈现的信息。如果您日后需要在
    Windows、Solaris 或 AIX 上安装 Oracle，您已经知道需要阅读哪些文档才能成功完成安装。


    ## 管理


    由于本书侧重于 Oracle 数据库管理，因此需要阅读的文档主要领域是管理相关主题。如图 13-6 所示，`Topics` 下的 `Administration`
    分类中的书籍链接位于 `Install and Upgrade` 链接下方。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig6_HTML.jpg](img/467924_1_En_13_Fig6_HTML.jpg)


    图 13-6：`Administration` 主题


    点击 `Administration` 链接后，您将看到几本可供阅读的书籍，其部分列表如图 13-7 所示。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig7_HTML.png](img/467924_1_En_13_Fig7_HTML.png)


    图 13-7：18c 管理书籍（部分视图）


    图 13-7 显示的是 Oracle 18c 版本的文档。如果您需要其他版本的文档，请返回上一页并从下拉菜单中选择您的版本。接下来我们将更详细地讨论这里列出的书籍。尝试熟悉这部分文档，因为在您的
    DBA 职业生涯中，您将在这里花费大量时间。


    ## 2 天速成指南


    Oracle 公司一定意识到了其文档集对客户来说可能多么令人生畏。Oracle 在其“2 天”系列中推出了几本书。我们可以在图 13-7 中看到其中两本。Oracle
    还提供了 `Database 2 Day Developer’s Guide` 和 `Database 2 Day + Java Developer’s Guide`。这些书是获取相关主题入门材料并初步实践的绝佳方式。这些书并非让您只阅读该主题的唯一书籍。阅读
    2 天速成指南后，请深入文档集的其余部分进一步研究。


    图 13-7 中列出的 `2 Day DBA` 一书包含关于如何安装和创建 Oracle 数据库的章节、关于如何使用各种工具管理数据库的章节，以及关于如何配置网络、管理存储、提供数据库安全性以及执行备份和恢复的章节。还有一章专门讨论性能调优。这本
    2 天速成指南听起来开始与本书及市场上的其他书籍非常相似。我们在本书中也按主题涵盖了相同的领域。请将 `2 Day DBA` 一书作为您图书馆中的另一个资源。


    `Database 2 Day + Performance Tuning Guide` 引导您开始 Oracle 数据库性能调优这一非常庞大但令人兴奋的主题。这是我最喜欢的科目之一，即使我已经进行
    Oracle 数据库性能调优 20 年，我仍然每天都在学习新东西。2 天+性能调优速成指南只是触及了皮毛，但它是一个很好的起点。


    确保花些时间阅读 2 天速成指南。阅读它们后，您会遇到问题并寻求答案。这些问题的答案通常可以在我们将在本章讨论的其他书籍中找到。


    ## 概念指南


    如果您只有一两本 Oracle 书籍的阅读时间，我会告诉您，文档集中有两本每个 Oracle DBA 都必须阅读的书。第一本是概念指南，第二本是下一节将讨论的
    `Database Administrator’s Guide`。概念指南是必读书籍。这本书对您的 DBA 职业生涯如此重要，您应该从头到尾阅读它多遍。


    ### 提示


    **阅读概念指南！它太重要了，不容错过！**


    概念指南介绍了使 Oracle 数据库引擎工作的许多理论和模型。是否想过 Oracle 如何处理数据库事务？它就在里面。是否想过 Oracle 如何存储数据？它就在里面。需要了解更多关于索引的信息？它就在里面。


    在阅读概念指南时，您可能会发现自己会转向其他书籍以获取该主题的更多信息，这是消化这些信息的可接受方式。我建议先从头到尾阅读概念指南，以了解其中的内容。然后回头阅读某一章，目标是尝试学习更多关于该主题的知识。如果需要，再扩展到其他信息来源。回来阅读下一章并重复。


    概念指南包含六个主要部分：


    *   第一部分，“Oracle 关系数据结构”，涵盖表、索引和其他模式对象以及如何确保数据完整性。


    *   第二部分，“Oracle 数据访问”，涵盖 SQL 和 PL/SQL。


    *   第三部分，“Oracle 事务管理”，涵盖事务如何工作以及如何确保数据一致性。


    *   第四部分，“Oracle 数据库存储结构”，涵盖磁盘上的物理文件和逻辑存储实现。


    *   第五部分，“Oracle 实例架构”，涵盖 Oracle 如何使用进程和内存使引擎工作。


    *   第六部分，“Oracle 数据库管理和应用程序开发”，涵盖如何管理 Oracle 数据库以及为其进行开发。


    请记住，本章前面我提到过，重要的是了解文档集中各部分的位置。概念指南打破了这个规则。这是一本您会想从头到尾学习的书。在理解所有内容之前，您可能需要多次通读这本书，并且可能需要跳转到其他来源。阅读概念指南不是一场竞赛，所以请慢慢来。在与
    Oracle 打交道数十年后，我仍在阅读这本书。


    ## 管理员指南


    `Administrator’s Guide` 是另一本至关重要的书。概念指南阐述了事情应该如何工作的理念，而 `Administrator’s Guide`
    则向您展示了如何去做。这两本书相辅相成。我经常发现自己在这两本书之间来回翻阅。

