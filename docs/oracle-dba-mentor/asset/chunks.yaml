- fmt: "```markdown\n\n[oracle@oracle122 ~]$ cat /etc/oratab\n#\n# This file is used\
    \ by ORACLE utilities.  It is created by root.sh\n# and updated by either Database\
    \ Configuration Assistant while creating\n# a database or ASM Configuration Assistant\
    \ while creating ASM instance.\n# A colon, ':', is used as the field terminator.\
    \  A new line terminates\n# the entry.  Lines beginning with a pound sign, '#',\
    \ are comments.\n#\n# Entries are of the form:\n#   $ORACLE_SID:$ORACLE_HOME::\n\
    #\n# The first and second fields are the system identifier and home\n# directory\
    \ of the database respectively.  The third field indicates\n# to the dbstart utility\
    \ that the database should , \"Y\", or should not,\n# \"N\", be brought up at\
    \ system boot time.\n#\n# Multiple entries with the same $ORACLE_SID are not allowed.\n\
    #\n#\norcl:/u01/app/oracle/product/12.2.0.1:N\nListing 9-4\nOratab File\n\nMost\
    \ of the file consists of comments, but look at the last line of this file. It\
    \ shows that for the `ORACLE_SID` named `orcl`, the Oracle home directory is `/u01/app/oracle/product/12.2.0.1`.\
    \ When you use `oraenv` to set your environment, it looks in this file to find\
    \ the Oracle home. From there, it can set your environment variables properly.\
    \ If you use the `DBCA` to create the database, that utility will automatically\
    \ populate the `oratab` file. If you use the Database Upgrade Assistant (`DBUA`)\
    \ to upgrade to a new Oracle version, the `DBUA` will automatically modify this\
    \ file for you. If you manually create or upgrade databases, you will have to\
    \ manually modify this file. The last part of that line is either `Y` or `N`,\
    \ a flag that tells the Oracle-supplied startup and shutdown utilities whether\
    \ or not to handle this database. If the flag is set to `Y`, those utilities will\
    \ start up and shut down the Oracle instance for that database whenever they are\
    \ run.\n\nThis file is not present on Windows systems. Oracle uses the Windows\
    \ registry to point to the Oracle home directories for each database on that server.\
    \ Startup and shutdown is automated through Windows services and appropriate registry\
    \ entries.\n\n## Processes and Bequeath\n\nWhat happens under the covers when\
    \ we create that local connection? To understand what happens, we need to take\
    \ a bit of a step back. Starting an Oracle instance allocates memory and creates\
    \ many processes on the database server. These processes all perform the work\
    \ the Oracle database engine needs. Later in this book, we will dive deeper into\
    \ these background processes to support an Oracle instance.\n\nWhen an application\
    \ connects to an Oracle instance, Oracle created a process on the database server\
    \ dedicated to that user’s session. This is called a `dedicated server process`.\
    \ The application talks to the `dedicated server process` and the `dedicated server\
    \ process` talks to the Oracle instance. Applications do not communicate with\
    \ the instance directly. Figure 9-1 shows the workflow.\n\n![../images/467924_1_En_9_Chapter/467924_1_En_9_Fig1_HTML.png](images/467924_1_En_9_Chapter/467924_1_En_9_Fig1_HTML.png)\n\
    Figure 9-1\nDedicated server process\n\nIn our case, the application is `SQL*Plus`.\
    \ `SQL*Plus` is the application’s name, but `sqlplus` is the executable file we\
    \ call to run that application. `SQL*Plus` talks to a `dedicated server process`\
    \ that was created for us when we connected to the instance. In Listing 9-5, we\
    \ will find out our process identifier for our current session and then look at\
    \ the processes running on the server.\n\n```\nSQL> select spid from v$process\n\
    \  2  where addr in (select paddr from v$session\n  3                 where username='PEASLAND');\n\
    SPID\n----------\n7080\n\nSQL> !ps -ef|grep 7080\noracle    7080  7069  0 14:37\
    \ ?        00:00:00 oracleorcl (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))\n\
