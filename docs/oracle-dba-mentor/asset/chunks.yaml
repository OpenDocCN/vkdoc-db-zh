    ```


    希望这七行中的一行包含我感兴趣的数据字典视图。我也可能查询 `COMMENTS` 列。在列表 [14-8] 的示例中，查询 `TABLE_NAME` 列没有给我描述物化视图的视图列表，但查询
    `COMMENTS` 列却可以。


