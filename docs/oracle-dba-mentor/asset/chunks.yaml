    Figure 15-15


    SR Question 1


    I am experiencing an ORA-600 error, so I will click the first link. If you have
    a different issue, it is most likely that you will see a completely different
    question. Based on the answer I provided, MOS gives me a Note that it thinks will
    help me, as shown in Figure [15-16](#467924_1_En_15_Chapter.xhtml#Fig16).


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig16_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig16_HTML.jpg)


    Figure 15-16


    SR suggested Note


    Sometimes, the suggested Note solves my problem. Sometimes it does not. This is
    the big reason why you are asked to do more work when filing a service request.
    Like I said, in the old days you would fill out a problem statement and your SR
    would be created. Today, MOS wants to save you and the support analysts as much
    time as possible. After asking you a few more problems, you may well solve your
    problem right out of the gate. In Figure [15-17](#467924_1_En_15_Chapter.xhtml#Fig17),
    we can see that we can let MOS know if the recommendations solved our issue or
    if we want to go to the next step.


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig17_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig17_HTML.jpg)


    Figure 15-17


    SR navigation buttons


    If my problem is not yet resolved, I click the Next button. The next screen lets
    me provide more details that can help the analyst narrow down the root cause of
    my problem. Figure [15-18](#467924_1_En_15_Chapter.xhtml#Fig18) shows MOS asking
    for more details for my service request.


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig18_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig18_HTML.jpg)


    Figure 15-18


    SR More Details request


    In this case, MOS is asking me to upload any files that may help. If the database
    has created any trace files, now is the time to upload them to MOS. Other details
    you may be asked to provide will depend on the nature of the problem.


    When you click the Next button, you will be on the Contact screen. Fill in your
    name, phone number, e-mail address, and preferred contact method. Normally these
    are auto-populated from your profile information. Then click the Submit button
    and your SR is now in the system.


    When an support analyst is working on your problem, they will usually ask for
    additional information. You will be notified via your preferred contact method
    when they update the SR. Modify the SR with the requested information and help
    the analyst help you.


    It typically takes some back and forth where the analyst looks at what you provided,
    determines it isn’t enough information, and updates the SR asking you for more
    pieces to the puzzle. They may ask you to try a few things to work around the
    issue or fix it. Hopefully, this will enable you to resolve your problem to your
    satisfaction.


    ## Patches and Updates


    One of the main tabs in MOS is Patches & Updates. This section is where you can
    download any needed patches. Normally, you would only download a patch when working
    with a support analyst via a service request. When the analyst wants you to apply
    a patch, they will often include a direct link to the patch in the SR. If you
    know the patch number, you can type it into the patch search field, as shown in
    Figure [15-19](#467924_1_En_15_Chapter.xhtml#Fig19).


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig19_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig19_HTML.jpg)


    Figure 15-19


    MOS patch search


    While not required, it is often helpful to specify the platform as well. Click
    the Search button in the lower-right corner of the screen and you will be taken
    to links to download the patch. We will discuss patching Oracle databases in Chapter
    [17](#467924_1_En_17_Chapter.xhtml).


    ## Certifications


    I often see people ask questions like “Is Oracle 18c supported on Windows 2012?”
    The person wants to know if a specific Oracle version is certified for a specific
    operating system. You can answer a question like that via the Certifications tab,
    which has a section showing some quick links, as you can see in Figure [15-20](#467924_1_En_15_Chapter.xhtml#Fig20).


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig20_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig20_HTML.jpg)


