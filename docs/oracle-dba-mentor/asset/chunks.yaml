  trans: '

    ## 备份与恢复文档


    Oracle 在《**数据库备份与恢复用户指南**》中详细记录了如何执行备份和恢复操作。每位 Oracle 数据库管理员都应至少从头到尾通读此指南两遍。要访问《**数据库备份与恢复用户指南**》，请使用网页浏览器访问
    `https://docs.oracle.com` 并点击 `Database` 按钮。然后点击 `Oracle Database` 按钮，点击下拉菜单并选择您的数据库版本。每个版本通常会引入一些变更并为备份和恢复提供新功能。当新版本发布时，Oracle
    DBA 阅读此文档至关重要。选择好版本后，点击 `Topics` 部分中的 `Administration` 链接。向下滚动一点，您会看到一个标题为 `Backup
    and Recovery` 的部分。此部分应包含两份手册：《**数据库备份与恢复参考**》和《**数据库备份与恢复用户指南**》。本章将涵盖 Oracle
    12.2 和 18c 两个数据库版本。


    《**数据库备份与恢复参考**》包含了关于 `RMAN` 备份命令的所有详细信息。您会遇到许多 `RMAN` 命令示例。有时，某个示例可能与您想执行的操作很相似但略有不同。《**备份与恢复参考**》详细说明了每个命令的功能并列出了其所有选项。请花时间熟悉这份手册。目的不是要记住手册中的所有内容，而是要对其包含的内容有个概念。将来某天您可能需要在其中查找某些内容。


    《**数据库备份与恢复用户指南**》是主要的阅读材料。这份文档包含大量关于如何使用 Oracle 的实用程序来备份和恢复数据库的信息，包括 `RMAN`、`闪回数据库`
    以及 `用户管理的备份与恢复`。


    强烈建议本书的所有读者都阅读《**备份与恢复用户指南**》。本章涵盖的信息量远不及 Oracle 在该指南中所提供的。当您阅读该手册时，不仅会学到知识，还要留意其中的内容及其位置。注意目录页，以了解文档的组织结构。和所有
    Oracle 文档一样，您将来某个时候会需要参考它。


    在《**备份与恢复用户指南**》的开头部分，您可能会发现一个陈述，那些没有读过本书的人可能不会多加思考。在指南的第 1 章中写道：“作为备份管理员，您的主要工作是进行备份和监控备份以保护数据。”本书的读者知道，主要工作是让我们的数据库启动并运行，以及从故障中恢复。备份并非您的主要工作；从故障中恢复才是。备份是达成此目的的手段。


    ## 备份类型


    Oracle 数据库在讨论备份类型时有两种不同的分类。第一种分类是备份的“温度”。第二种分类是备份的管理类型。


    ### 热备份与冷备份


    备份可以是 `热` 备份或 `冷` 备份。温度用于表示在执行备份时，数据库是打开并可供业务使用（`热`）还是处于关闭状态（`冷`）。在当今 `24×7` 的环境中，生产数据库很少使用
    `冷` 备份。`冷` 备份非常好，因为它们最容易实现，也最容易从恢复。然而，由于对持续可用性的需求，我们经常需要依赖 `热` 备份。


    数据库由磁盘上的文件组成。备份数据库时，该文件的副本会被写入备份目标位置。文件越大，数据库越大，完成备份所需的时间就越长。数据库的问题在于它是一个活生生的、不断变化的实体。事务持续发生并修改数据库的数据文件。备份开始后但尚未完成前，某个事务可能会修改已经备份过的文件，以及尚未备份的文件。这将导致备份不一致。我们可用的一种处理机制是停止所有事务，即执行
    `冷` 备份。使用 `冷` 备份，我们知道所有文件在某个特定时间点上事务是一致的。


    如果我们需要执行 `热` 备份，就需要另一种机制来解决在将数据文件复制到备份目标位置期间发生的任何事务不一致问题。在 Oracle 中，`热` 备份要求我们将数据库配置为
    `归档日志` 模式。在 `归档日志` 模式下，Oracle 数据库会在磁盘上的一个特殊位置维护事务日志的副本。我们执行 `热` 备份。当从该 `热` 备份恢复数据库时，Oracle
    使用日志文件中的事务来解决任何不一致。`热` 备份让我们能够在保持数据库开放供业务使用的同时保护它，但代价是需要维护事务日志。

    '
- fmt: '### RMAN and User-Managed Backups


    There are two management types for Oracle backups. We can either let Recovery
    Manager govern the process or we can leave it up to the user. Both types are documented
    in the *Database Backup and Recovery User’s Guide*.


    In the old days, the database administrator always managed backup and subsequent
    recovery operations. When a disaster occurred, the DBA needed to analyze the problem,
    assess what to restore, and perform the proper steps to get the database open
    for business. Losing a control file required the DBA to perform a different action
    than the action required after losing a data file. The DBA needed to be well versed
    in the various disaster scenarios and the appropriate recovery steps.


    The database administrator was responsible for writing their own backup scripts.
    Once the DBA wrote a backup script that worked for most situations, the DBA used
    it as much as possible to back up many different databases. Hot and cold backup
    scripts were completely different. If the database was in archivelog mode, the
    DBA needed another script to manage the archivelog destination so that it would
    not fill up.


    The DBA needed to pay attention to every detail of both backup and recovery. As
    such, there was a high chance of human error in the process. It would be terrible
    to find out there was a human error in the backup script at the time when you
    needed to recover from a disaster. User-managed backup and recovery is a time-consuming,
    fragile activity.


    Oracle Corporation introduced Recovery Manager with the Oracle 8.0 version. With
    RMAN, the database administrator was relieved of having to know all of the details.
    RMAN figures everything out for you. With RMAN, recovery from a lost control file
    or a lost data file is the same. You tell RMAN to restore everything. RMAN figures
    out what went wrong and puts the pieces back together for you. If you use Enterprise
    Manager and have it schedule a backup of your database, it will run RMAN commands
    behind the scenes for you. RMAN has grown and matured over the years since its
    introduction and has many features you may enjoy. Hopefully, you can see why RMAN
    is Oracle’s preferred backup and recovery utility.


    With RMAN available, is there ever a need for user-managed backups anymore? Many
    database administrators will tell you to always use RMAN, but I still find use
    for user-managed backups on occasion. The two places I implement user-managed
    backups are for a quick and easy backup of a small testbed database, and for backing
    up very large databases that can leverage hardware-based disk snapshot capabilities.


    Later in this chapter, we will perform a user-managed backup of our testbed database
    we created in the previous chapter. The process is super simple and very intuitive,
    and you do not have to remember any RMAN commands.


    All of this may sound like I am against RMAN, which I am not. RMAN is an excellent
    utility and I would recommend using it so long as it meets your recovery requirements.
    What I am against is when people say to use RMAN, or that it is a preferred backup
    tool, when they have no knowledge of the exact recovery requirements that need
    to be satisfied.


    Remember that recovery requirements define the backup solution. If my requirement
    is to be able to restore a 200TB database in under ten minutes, good luck doing
    that with RMAN. The utility simply cannot perform backups or restores that fast
    for such a large database. But many disk subsystems let storage administrators
    take snapshots of the files on disk. We can have a user-managed backup strategy
    where the database is put in backup mode, the snapshot is taken, and backup mode
    is ended. The entire process can be completed in a few minutes. To restore, we
    shut down the database and have the storage administrator revert to a good snapshot.
    Even for a 200TB database, this process can be completed in minutes. The database
    administrator will have to write the backup scripts, and work with the storage
    administrator, and both need to handle all the details. However, some recovery
    requirements dictate a solution that RMAN cannot handle. RMAN can handle almost
    all recovery requirements, but not every one of them. Document those recovery
    requirements, then choose the backup tool.


    ### Logical Backups


    Too many database administrators rely solely on *logical backups* for their databases,
    which for most cases is an incorrect backup solution, as this section discusses.
    Logical backups can meet some recovery requirements. However, they rarely meet
    recovery requirements for production databases.


    What is a logical backup? It is one taken with an export utility like Data Pump’s
    `expdp`. RMAN and user-managed backups are *physical backups* because they make
    a duplicate copy of the data files to a backup destination. At the time the backup
    is taken, the database’s file and what is in the backup destination are identical.
    Over time, the database’s file will change and diverge from the backup copy. I
    should note that physical backups with RMAN often work at the data block level,
    which is smaller than the file level. This technical difference does not change
    the differences between logical and physical backups.


    A logical backup reads the contents of a table and writes the table’s data to
    a dump file. The dump file does not resemble any of the database’s files. Rather,
    the dump file contains the structure of the table and the data itself. The biggest
    difference between a physical backup and a logical backup is that one can never
    roll forward any changes since the logical backup was taken. With a physical backup,
    you can restore the database and, if you have the transaction logs, you can bring
    the database to a later point then when the backup was taken, called *rolling
    forward*. Rolling forward reduces or even eliminats any data loss. Because a logical
    backup cannot be rolled forward, it can suffer from significant amounts of data
    loss depending on how old it is and how much has changed since the logical backup
    was performed.


    All too often, I will hear junior-level database administrators ask questions
    about recovering their database from a failure, and the initial response is to
    ask for more details about how the database was backed up. The DBA needing the
    assistance responds that they use Data Pump for their backups. It is at this point
    that I know this database administrator has given little thought about their recovery
    requirements. They simply implemented a backup solution they thought would cover
    their needs, and nine times out of ten, they learn a hard lesson. This is not
    to say that logical backups are bad. They do serve a purpose, but logical backups
    are rarely the only backup option for a production database.


    Logical backups are well suited for copying data from one database to another.
    RMAN can do this to some degree as well. With Data Pump, I can export just one
    schema and import into another database. I can export a set of tables as well.
    Logical backups can also be used when taking a snapshot in time of the data. I
    will often use Data Pump when I need to preserve a schema’s contents, normally
    right before I destroy the entire schema. I’ll copy the dump files to tape media
    or some other offsite storage. Years later when someone says they need the data,
    it can be difficult to restore a user-managed or RMAN backup because I need the
    same exact database version in use when the backup was taken. Data Pump from an
    older version can be imported into a newer Oracle version without issues. Logical
    backups serve a purpose. Physical backups serve a purpose. The database administrator
    needs to learn the differences and how each one impacts their ability to recover.
    The DBA would then leverage the most appropriate method.'
