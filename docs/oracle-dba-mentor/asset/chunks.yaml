  trans: '

    - 不要发布 **RTFM** 问题。感谢本书的第 13 章，你现在知道如何使用 Oracle 文档了。如果你能阅读**精细的手册**，你就可以自己回答这些问题。不要通过发布你自己就能查到的问题来浪费志愿者宝贵的时间。

    - 不要发布你可以轻易搜索到的问题。本章前面，我们讨论了如何使用搜索引擎寻找答案。如果通过简单的网络搜索就能轻易找到答案，就不应该将其发布到讨论论坛。人们通常会回复"**LMGTFY**"，这是“让我为你谷歌一下”的缩写。他们的回复后面会附上一个指向
    [`http://lmgtfy.com`](http://lmgtfy.com) 的链接，展示谷歌搜索结果。

    - 如果可能，发布展示你工作的示例代码，并包含哪些部分不工作。例如，如果你正在处理一条 SQL 语句，请发布创建示例表并用示例数据填充它的代码。然后发布无法工作的
    SQL 语句，并尽你所能解释它应该如何工作。有了所有这些信息，回复者就可以在他们的数据库中创建该表，并尝试相同的 SQL 语句，从而找出解决问题的方法。

    - 发布完整的错误信息。如果你说你收到了一个 ORA-00942 错误，却什么也不提供，你不太可能得到好的答案。请发布收到错误的 SQL 语句，然后将整个错误堆栈复制并粘贴到你的初始帖子中。

    - 切勿要求立即帮助或说你的请求很紧急。回答问题的人并非有偿工作。他们是志愿者，他们有自己的工作要做。他们会在有空时回答你的问题。如果你想要立即解决，请向
    My Oracle Support 提交服务请求。


    当你与这些论坛互动时，请开始作为问题的回答者参与进来。我经常看到有些人只问问题却从不分享他们的知识。当有更多人关注问题时，讨论论坛会变得更好。在你职业生涯的初始阶段，你可能不具备回答很多不同问题所需的技能组合，这是可以预料的。尽管如此，还是尝试回答几个问题。正如我在讨论博客的部分所说，当你尝试以书面形式解释某事时，神奇的事情会发生：你自己实际上学到了更多东西。在讨论论坛中也是如此。你回答的问题越多，你就越能理解
    Oracle 是如何工作的。开始时，尝试每天回答一个问题。如果可以找到简单的问题，就从简单的开始。然后逐步提高难度。


    回答问题并成为讨论论坛主要参与者的另一个原因是你将非常熟悉 Oracle 文档。我通常只需点击几下鼠标就能在 Oracle 文档中查找到我需要的任何东西，因为我知道确切该去哪里查找。直到我开始回答问题，我才更善于知道如何使用文档。当我回答一个问题时，我会尽量包含指向文档相关部分的链接。这样，读者可以找到更多信息。找到那个链接确实需要额外的时间，但我节省了输入大量额外信息的时间，这些信息读者可以在文档中看到。如果存在疑问，文档也作为证明我所言属实的一种方式。


    我在讨论论坛回答问题的最后一个原因是我每天学到的东西很多。人们会发布一些我在常规工作中永远见不到的最奇怪的问题。此外，有人会用一些我以前不知道的东西来回复一个问题。无论我对
    Oracle 产品了解多少，我也永远不会知道一切。每个人都可以教我一些东西。仅仅阅读不同的讨论帖就经常让我受益匪浅。在我的职业生涯中，有很多次我遇到一个问题，而我之前已经在某个讨论论坛中接触过这个问题。我对这个问题已经有所了解。我所需要做的就是找到讨论该问题的论坛帖子，然后我就能轻松获得解决方案。


    如果你确实在讨论论坛回答问题，请准备好犯错。学习如何恰当地回答问题需要一段时间。太多的人会因为你的错误而抨击你，有时非常粗鲁。忽略负面情绪，找出你错在哪里以及下次如何更好地回应。不要让负面情绪阻止你回答未来的问题。像任何事情一样，你做得越多，你就会做得越好。回答问题也是如此。


    ## YouTube


    我越来越多地看到 Oracle 专业人士在 YouTube 上发布视频。我是从通过博客和讨论论坛以书面形式分享信息开始的。对我来说，尝试以视频形式分享 Oracle
    概念是一个陌生的概念。我在一个 YouTube 频道上发布了几个视频，但这真的不适合我。这不是我擅长的事情。值得庆幸的是，有些 Oracle 专业人士做得非常好，并在
    YouTube 上发布了很棒的视频。你可能会喜欢自己制作一些视频来分享你的知识。


    YouTube 上大多数与 Oracle 相关的内容都是操作指南视频。由于视频是预先录制的，该平台很难发挥与讨论论坛相同的作用。例如，在 YouTube 上搜索"Oracle
    SQL Developer"，你会发现许多视频展示了如何使用该产品的特定功能。


    当你找到一个发布你喜欢内容的人时，订阅他们的 YouTube 频道。这样，当他们发布新内容时，你会收到通知。

    '
- fmt: '# Conferences and User Groups


    Oracle professionals live and work all over the world. We interact with each other
    in all of the social media platforms discussed in this chapter, but nothing compares
    to face-to-face communication. This is where conferences and user groups come
    into play.


    Conferences draw a lot of people to them. In 2014, Oracle’s annual `OpenWorld`
    conference hosted over 60,000 attendees. That’s a lot of people all talking about
    Oracle! `OpenWorld` is a great place to hear the latest and greatest news about
    Oracle. You get a chance to talk with Oracle employees in a one-on-one setting
    in the demo grounds. Oracle employees are willing to walk you through a demonstration
    of a particular product and you can ask questions along the way. You can attend
    many of the conference’s sessions and learn from presenters who are experts in
    the field. You can also meet up with the people you interact with in social media.
    When you interact with a person in a discussion thread in some forum, your conversation
    often sticks to the thread’s subject. When you meet them in person, your conversation
    may go off in other directions, tangential to the initial topic. This is a great
    way to foster discussion of things you may never talk about in your normal settings.
    If you cannot attend a conference in person, see if they offer the ability to
    attend virtually through live streaming of keynote addresses and breakout sessions.


    The Independent Oracle Users Group (`IOUG`) hosts an annual conference as well,
    called `COLLABORATE`. You will find a lot of the same vendors and database experts
    at `IOUG`’s `COLLABORATE` as you will at `OpenWorld`. The big difference between
    the conferences is that `OpenWorld`’s content is defined by Oracle Corporation
    whereas `IOUG`’s content is defined by the `IOUG` members.


    Many regions have their own, independent user groups focusing on Oracle. To find
    a user group close to you, search in Google. For example, if you live in Dallas,
    search for “Dallas Oracle User Group” and you will see a link for the `DOUG`.
    Many large cities have their own user group. Joining one of these groups is a
    great way to network with people in your region. You do not have to travel very
    far to participate in their events. Most regional user groups have one- or two-day
    mini-conferences you can attend. These conferences are usually attended by individuals
    local to that area. Some regional user groups host larger conferences, like the
    Denver area’s Rocky Mountain Oracle User Group’s (`RMOUG`) Training Days conference,
    which draws attendees from all over the nation. User group conferences are not
    limited to the United States. Many areas all over the world have Oracle user groups
    and conferences.


    Take some time to find an Oracle user group in your area. Become a member and
    start interacting with your Oracle peers. Not only will you learn more about Oracle,
    you will create a network of valuable resources that you can lean on during your
    career. This network can help you resolve issues or even find a job.


    As your career progresses, you should be answering questions on discussion forums
    and writing blog posts, if you have been following the advice in this chapter.
    Over time, your Oracle knowledge will grow and you will be ready to share more
    of what you have learned. The next step is presenting at an Oracle conference.
    Conferences are always looking for presenters. They want to provide a ton of information
    to their attendees. Simply put, they need people to provide that information.
    Prior to the conference, the organizers will ask for people to submit *abstracts*.
    These are short descriptions of a presentation that you may be interested in providing
    at the conference. Typically, an abstract is one paragraph in length and explains
    what you want to discuss and how it is of value to the attendees. Always be on
    the lookout for the calls for abstracts to conferences. When you are ready to
    present at a conference, start filling out the calls for abstracts to see if you
    are chosen. Start by presenting at your local user group conferences and work
    your way up from there. Presenting at a conference gives you the same benefits
    as writing blogs or answering your questions. If you are going to explain something
    to someone, you will learn it better that if you had not. Another great benefit
    is that many of the organizers will give you free attendance to the rest of the
    conference just for presenting. The larger conferences provide free gifts to their
    presenters. You will also start to be recognized by others in your community for
    your skill.


    # Moving On


    We have spent the last few chapters discussing how you can learn more about Oracle
    and even resolve issues. It starts by reading the Oracle documentation. The documentation
    provides a plethora of information. The hardest part of using the Oracle documentation
    is trying to find the information you seek, due to its sheer size. The more you
    use the Oracle documentation, the easier it will be to navigate.


    We then discussed the Oracle data dictionary. The data dictionary helps you learn
    details about your specific database. The data dictionary is documentation of
    the database’s contents.


    If the documentation or data dictionary cannot help you, the next place to look
    is often `My Oracle Support`. You can search its extensive knowledge base for
    answers. You can file a service request and obtain help from a support analyst.


    If you have exhausted all of these sources and are not able to resolve your issue,
    then the next place to turn is to social media. There are many social media outlets
    at your disposal, as we have covered in this chapter.


    In the next chapter, we shift gears to maintaining our Oracle database. After
    we have installed Oracle and created our database, we need to learn how to apply
    patches and keep it up to date. The following chapter will discuss how to upgrade
    your Oracle database to a new version.


    # 17. Patching


    In the previous four chapters, we discussed the different avenues for you to learn
    and grow your Oracle DBA career. The Oracle documentation is a must read. Eventually,
    you will have to interact with Oracle Support. Hopefully you are starting to use
    social media to expand your interactions with Oracle professionals around the
    world.


    This chapter shifts the focus toward maintaining your Oracle database. Recall
    that earlier in the book we built a virtual machine and created our first Oracle
    database to serve as a testbed. Subsequent chapters helped harden the installation
    by discussing recovery and backups and database security. Now it’s time to keep
    that database working for the lifetime of the system.


    ## Patching Overview


    Oracle patches are inevitable if you are doing a proper job. Sadly, I have met
    a number of Oracle database administrators that have never patched an Oracle database,
    even ones that have been around for years. You should be applying patches, regularly.


    Oracle patches are often applied for one of two reasons:


    *   To fix a known issue: These patches should only be applied under the direction
    of Oracle Support.


    *   To keep your database software up to date: Notably, to plug security holes.
    These patches should be applied as they are released.


    Patches are only available from `My Oracle Support`. You will need a paid Oracle
    Support contract to be able to download patches. If you come across a patch from
    a third party, do not download and install it. For starters, the patch is not
    official, and you may run into support and legal issues down the road. Additionally,
    you have no guarantees that the third party has not introduced some sort of malware
    into the patch.'
  raw: '## Conferences and User Groups


    Oracle professionals live and work all over the world. We interact with each other
    in all of the social media platforms discussed in this chapter, but nothing compares
    to face-to-face communication. This is where conferences and user groups come
    into play.


    Conferences draw a lot of people to them. In 2014, Oracle’s annual OpenWorld conference
    hosted over 60,000 attendees. That’s a lot of people all talking about Oracle!
    OpenWorld is a great place to hear the latest and greatest news about Oracle.
    You get a chance to talk with Oracle employees in a one-on-one setting in the
    demo grounds. Oracle employees are willing to walk you through a demonstration
    of a particular product and you can ask questions along the way. You can attend
    many of the conference’s sessions and learn from presenters who are experts in
    the field. You can also meet up with the people you interact with in social media.
    When you interact with a person in a discussion thread in some forum, your conversation
    often sticks to the thread’s subject. When you meet them in person, your conversation
    may go off in other directions, tangential to the initial topic. This is a great
    way to foster discussion of things you may never talk about in your normal settings.
    If you cannot attend a conference in person, see if they offer the ability to
    attend virtually through live streaming of keynote addresses and breakout sessions.


    The Independent Oracle Users Group (IOUG) hosts an annual conference as well,
    called COLLABORATE. You will find a lot of the same vendors and database experts
    at IOUG’s COLLABORATE as you will at OpenWorld. The big difference between the
    conferences is that OpenWorld’s content is defined by Oracle Corporation whereas
    IOUG’s content is defined by the IOUG members.


    Many regions have their own, independent user groups focusing on Oracle. To find
    a user group close to you, search in Google. For example, if you live in Dallas,
    search for “Dallas Oracle User Group” and you will see a link for the DOUG. Many
    large cities have their own user group. Joining one of these groups is a great
    way to network with people in your region. You do not have to travel very far
    to participate in their events. Most regional user groups have one- or two-day
    mini-conferences you can attend. These conferences are usually attended by individuals
