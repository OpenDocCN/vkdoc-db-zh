    As the error message says, we should check the Alert Log. Toward the end of the
    Alert Log, we can see errors similar to Listing [12-6](#467924_1_En_12_Chapter.xhtml#PC6).


    ```

    2018-07-30T15:33:25.549374-05:00

    Errors in file /u01/app/oracle/diag/rdbms/orcl/orcl/trace/orcl_m000_25234.trc:

