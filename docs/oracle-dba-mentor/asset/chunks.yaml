- fmt: '# The Tough Questions


    Let’s assume you have the metrics shown so far in this chapter for `CPU`, `memory`,
    and `disk`. Your manager comes to you and asks if your database can support doubling
    the number of concurrent users. The question sounds very specific, but it really
    isn’t that simple. In order to know the answer, you need to determine if the new
    users will be doing the same exact activity as the current users or if they will
    be doing something new in the database. If they are doing something new, what
    exactly will they be doing? If you can define what they will be doing, can you
    turn that into an analysis of how that will impact the big three resources? Taking
    this simple, specific question and turning it into a capacity planning activity
    can be extremely difficult. The problem is that there are too many variables and
    too many unknowns. It becomes a bit like making a long-range weather forecast,
    and we have all seen how many times those forecasts miss the mark.


    The easiest way to answer questions like these is to extrapolate from our graphs,
    and then make a big caveat. For example, if we look at the `memory` utilization
    in `Figure 19-7`, we can see the utilization is well under `20%`, so we can easily
    handle doubling the demands on server `memory`. If we look at the `CPU` utilization
    in `Figure 19-6`, we can easily determine the `CPU` cannot handle twice the requests
    from the extra users. So the answer to the question would be that `memory` can
    handle the additional users, but `CPU` resource cannot. If we need to double the
    number of concurrent users, then we need to increase `CPU` resources in advance.


    You can show similar charts to your manager and explain your findings. You must
    then provide a big caveat to the answer, which is “all things being equal.” If
    these extra users are just like the current ones, then here is how it shapes the
    resource utilization. But if those users are different, they can impart new demands
    these charts cannot account for with any certainty.


    For the most part, if we can translate the tough question into a factor we can
    apply to our charts, we can provide a capacity planning answer. The translation
    can be as simple as increasing the demands on the database by some quantity will
    multiply the chart values by that same factor. Doubling the users means to double
    the chart values. Quadrupling the data volume means multiplying the database growth
    chart by four. Keep the capacity planning simple. You cannot account for every
    detail and every variable, and you will make capacity planning a full-time job
    if you attempt to do so. Database administrators have other duties to perform
    in addition to capacity planning.


    These charts can also be used to predict when you will run out of resources. For
    example, the `memory` utilization in `Figure 19-7` is under `20%`. We know that
    `100%` is five times `20%`, so our factor is five. We can predict that we can
    support five times as many concurrent users with this `memory` configuration.
    If we are using `30%` of our total `disk` capacity, then we can predict when we
    will run out of `disk` if we double the data growth.


    By now you may be saying to yourself that I am making this overly simplistic,
    and you would be right. You may be thinking I am glossing over a great many details,
    and you would be right again. What some people do not want to admit is that all
    of the details, the minutiae as to how to plan the capacity of your system, do
    not matter for the most part. I use summary details at a high level and it works
    for me every time. There is no database administrator that can take a requirement
    like multiplying the number of concurrent users by a factor of ten and turn that
    into a detailed analysis that says something like the number of logical read requests
    will grow by a factor of `X` in response and in turn the number of physical read
    requests will grow by a factor of `Y`. The `10`×`` increase in concurrent users
    may increase the logical read requests by the same factor of `10`×`` and yield
    a zero-net change in the number of physical read requests, or the physical reads
    may double, or triple. No one can say with any accuracy how every metric will
    change as a result because there are too many unknowns and too many variables,
    as I have said before.


    Instead of spending a ton of your valuable time trying to get the most accurate
    answer as possible, answer the tough questions with simple factors applied to
    your current metrics and get on to other important work. By the time your organization
    procures new hardware, it will have new specifications that you did not account
    for anyway, throwing any of your previous calculations off the mark. Every hardware
    purchase means the new equipment is bigger, stronger, and faster than the old
    machines.


    The cloud can make capacity planning both easier and tougher at the same time.
    Capacity planning in the cloud can be tougher if the cloud provider does not let
    you obtain metrics on your resource utilization. If they do let you see the resource
    utilization, it may be in a form that does not let you store the metric values
    over an extended period. Work with your cloud provider to understand how you can
    best obtain high-level resource metrics for your capacity planning needs. Where
    the cloud can make capacity planning easier is not so much in the planning but
    in the implementation of your plans. Need twice the `CPU` resources? I’m sure
    your cloud provider will just add more `CPUs` to your environment. Need more `memory`?
    That’s an easy fix. It has become so easy to add resources that many IT administrators
    just quit planning all together. What could be easier than just stopping the activity
    of capacity planning? Instead of trying to determine how much we will need in
    the future, we’ll have our cloud provider flip a switch and give us more resources.
    The cloud providers often allude to this in their sales pitch. I do not like this
    approach because those additional resources cost your organiation extra money.
    Every organization I have worked for has budgets and needs to plan their expenditures.
    While the `CPU`, `memory`, and `disk` resource increase is easy, paying for it
    may not be so simple.


    # Moving On


    This chapter introduced capacity planning. At a high level, we need to capture
    `CPU`, `memory`, and `disk` utilization metrics and graph them over time. Once
    we have the data points, we can easily add trendlines to obtain a good idea of
    where resource utilization is headed for the future. Keep it simple. There are
    too many variables and unknowns to account for. You can use your time more wisely
    by keeping your capacity planning efforts at a very high level.


    In the next chapter, I will provide overviews of the Oracle database architecture.
    The chapter is not meant to make you an expert in each of those areas, but rather
    to give you exposure to how the Oracle database works.


    # Part V Appendixes'
