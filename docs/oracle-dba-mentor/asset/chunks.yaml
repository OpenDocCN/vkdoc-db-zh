    ### DICT


    有大量的 `DBA_` 视图可供查询。多到可能很难找到你需要的那一个。每个新版本都会带来更多静态数据字典视图。在列表 [14-6] 中，我们可以看到一个Oracle
    12.1.0.2数据库中 `DBA_` 视图总数的计数。


    ```sql

