    PL/SQL procedure successfully completed.

    ```


    **Listing 17-10** Running utlrp.sql


    为简洁起见，我在 **Listing 17-10** 的脚本调用中间和执行结束时省略了输出。


    恭喜！补丁现已成功应用，没有任何问题。剩下的唯一事情就是验证数据库是否认为它已被修补。我们通过查询一个 DBA 视图来执行此操作，如 **Listing 17-11**
    所示。


    ```sql

    SQL> select description,status from dba_registry_sqlpatch;

    DESCRIPTION                                        STATUS

    -------------------------------------------------- ----------

    DATABASE JUL 2018 RELEASE UPDATE 12.2.0.1.180717   SUCCESS

    ```


    **Listing 17-11** Querying DBA_REGISTRY_SQLPATCH


    我们可以从 `DBA_REGISTRY_SQLPATCH` 视图中看到，RU（Release Update）已成功应用于此数据库。曾有过这样的情况：`opatch`
    实用程序指出一切成功，`datapatch` 也是如此，但此视图未正确填充。如果您使用 Oracle Enterprise Manager (EM) 来监控数据库，EM
    将查询此视图以确定是否已应用最新的补丁。在补丁结束时自己查询此视图是确保 EM 获得正确信息的好方法。


    ## Moving On


    为 Oracle 数据库打补丁对于修复数据库操作中的错误、填补安全漏洞并帮助保护数据安全是必要的。您应该定期为数据库应用季度 CPU（Critical Patch
    Update）补丁。除非已为您的版本应用了最新最好的 CPU，否则切勿将 Oracle 数据库投入生产状态。


    正如本章所述，季度 CPU 补丁是为完全支持的 Oracle 版本发布的。在某个时间点，无论您是谁，您当前的版本都会过时，Oracle 公司将停止为其发布补丁。每个数据库管理员在其职业生涯的某个阶段都必须将其数据库升级到更新的版本。下一章将讨论各种升级技术。


    # 18. Upgrades


    数据库首次创建后，数据库管理员将通过应用常规季度补丁（如前一章所述）来维护它。DBA 还可能需要在 Oracle Support 的指导下应用其他补丁以修复错误。经过一段时间（可能是几个月甚至几年）后，数据库管理员将需要将数据库升级到更新的版本。本章将讨论不同的升级路径并提供一些最佳实践。'
