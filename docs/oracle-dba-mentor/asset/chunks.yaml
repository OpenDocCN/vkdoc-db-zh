- fmt: '# 20. Oracle Architecture


    In this chapter, we will discuss the Oracle database architecture. We discuss
    the memory structures, processes, and files that comprise an Oracle database.
    Knowing how Oracle works is important because otherwise it’s just a black box
    sitting on the shelf.


    Consider an automobile and its engine. For many people, a vehicle is a black box.
    They start it up and drive. Then one day, the engine will not start. If you have
    no knowledge of how to fix a car’s engine, what do you do? You take it to an expert
    in the field, an automobile mechanic. They know how to fix the black box that
    takes you back and forth to work every day. Some readers of this book may know
    a great deal about car engines and have no problems repairing them, no matter
    what is broken. Other readers are in the middle and may know a bit about the combustion
    engine, just enough to fix minor issues, but not enough to fix major problems.


    As an Oracle database administrator, your organization is relying on you to fix
    this black box they use to store their valuable data. Just like a mechanic needs
    to have an in-depth knowledge of how engine components all come together to make
    the vehicle go, the DBA needs to understand how the Oracle components work in
    conjunction with each other. Your organization employed you to be the database
    mechanic.


    If you are reading this book, then you probably do not fall in the category of
    the expert who knows exactly how Oracle works, but you are not one who treats
    Oracle as a black box either. You are most likely somewhere in the middle. If
    so, then this chapter is for you. After all, you are most likely reading this
    book because you want to make the journey from entry-level DBA or higher all the
    way up to an expert in the field.


    In Chapter [13](#467924_1_En_13_Chapter.xhtml), I recommended that you read the
    `Oracle Database Concepts` guide. That book in the Oracle documentation provides
    a wealth of information on how the Oracle database engine works. Please read that
    guide. In this chapter I will be discussing the same topic from my viewpoint.
    I will also be touching on the areas I think are vital to understanding the Oracle
    architecture. This chapter is no substitute for reading the `Database Concepts`
    guide. While you’re in the Oracle documentation, read the `Database Administrator’s
    Guide` as well, as I recommended in Chapter [13](#467924_1_En_13_Chapter.xhtml).


    As you work with the Oracle database over the course of your career, you will
    learn more and more about this architecture. When I first started as an Oracle
    DBA, it was trying to understand how Oracle worked that was the biggest puzzle
    to solve, and the most fun too. Even though I have been working with Oracle for
    more than 20 years, I am still learning new details about the Oracle architecture.
    Not only am I getting deeper and deeper into Oracle internals, but Oracle changes
    the architecture a bit here and there with each new release.


    ## Database vs. Instance


    In the Oracle architecture, there is a big distinction between the Oracle database
    and the Oracle instance. These are not the same thing. As a database administrator,
    you need to understand the two, what they mean, and how they interact.


    An Oracle `database` is the collection of files on disk. These files include the
    tablespace’s data files, the control files, and the online redo logs. The database
    is what survives when Oracle is not up and running. The Oracle software is down,
    but the files are there. The database is still on disk, but no one can access
    it. To see the database, we can issue a query as shown in Listing [20-1](#467924_1_En_20_Chapter.xhtml#PC1).


    ```sql

    SQL> select file_name as database_files

    2  from dba_data_files

    3  union

    4  select value from v$parameter2

    5  where name=''control_files''

    6  union

    7  select member from v$logfile

    8  union

    9  select file_name from dba_temp_files;

    DATABASE_FILES


    /u01/app/oracle/oradata/hr_test/DB10.DB

    /u01/app/oracle/oradata/hr_test/DB11.DB

    /u01/app/oracle/oradata/hr_test/control01.ctl

    /u01/app/oracle/oradata/hr_test/control02.ctl

    /u01/app/oracle/oradata/hr_test/redo01.log

    /u01/app/oracle/oradata/hr_test/redo02.log

    /u01/app/oracle/oradata/hr_test/redo03.log

    /u01/app/oracle/oradata/hr_test/sysaux01.dbf

    /u01/app/oracle/oradata/hr_test/system01.dbf

    /u01/app/oracle/oradata/hr_test/temp01.dbf

    /u01/app/oracle/oradata/hr_test/undotbs01.dbf

    /u01/app/oracle/oradata/hr_test/users01.dbf

    Listing 20-1

    Database Files

    ```


    The SQL statement above queries for the data files, control files, online redo
    logs, and temp files. This collection of files is the Oracle `database`. You may
    recall we issued a similar query in Chapter [7](#467924_1_En_7_Chapter.xhtml)
    when we discussed backup and recovery.


    You will hear people say things like “I cannot connect to the database.” Technically
    speaking, you can never connect to an Oracle database. The software application
    is normally running on a different machine, maybe even a web server, accessed
    by a browser. The application does not have direct access to the files, so it
    cannot connect to the database. This is where the DBA needs to know their audience.
    To the end user, Oracle is just a black box and they will use the term “database.”
    When the DBA talks to end users, they should use the same terminology to facilitate
    the conversation, even though the DBA knows the term is not factually correct.


    Users and applications connect to an Oracle `instance`, not the database. The
    instance is the collection of processes and allocated memory that is a result
    of starting the Oracle software. User sessions spawn processes on the database
    server which interact with allocated memory as well as the database’s files, as
    we will see in this chapter.


    When the DBA starts Oracle, they are starting the instance. When the DBA shuts
    down the instance, the database is still there on disk. The `instance` is the
    collection of processes and memory. The `database` is the files on disk. When
    talking with other Oracle professionals you will want to use the correct terminology.
    When talking with others, feel free to use the term “database.”'
