- fmt: '### Tip


    Read the `Administrator''s Guide`! It is too important to miss!


    Again, this book is so important to read, you will not want to focus on just remembering
    what is in there. You will want to spend time to digest the information presented
    in the book and learn as much as you can.


    The `Administrator''s Guide` contains six major parts:


    *   Part I, “Basic Database Administration,” covers how to create and manage an
    Oracle database, including startup/shutdown and many of the things we discussed
    earlier in this book.

    *   Part II, “Oracle Database Structure and Storage,” covers how to manage control
    files, data files, temp files, redo logs, and undo.

    *   Part III, “Schema Objects,” covers how to manage tables, indexes, views, and
    more.

    *   Part IV, “Database Resource Management and Task Scheduling,” covers how to
    leverage the Resource Manager to ensure important users do not get overrun by
    less important ones and how to schedule database jobs.

    *   Part V, “Distributed Database Management,” covers how to perform transactions
    spanning multiple databases. If you do not have distributed databases, you can
    skim this section.

    *   Part VI, “Managing Read-Only Materialized Views,” covers how to use Materialized
    Views that have the potential to improve application performance. You may be fine
    with skimming this section as well.


    The first four parts of the book are vital to your success as an Oracle DBA. Skim
    through the last two parts. You may never need the information in those sections,
    but if you do, you will know where to look.


    ## Performance Tuning Guide


    Getting optimal performance out of any database engine will become a focus sooner
    or later in your database administration career. The database is at the heart
    of what users will interact with. Users want access to the data and they want
    it to be fast. Every DBA will get a call that performance is terrible, and it
    is up to the DBA to diagnose the root cause of the issue and figure out how to
    return performance back to acceptable levels.


    So much can and has been written about the topic of performance tuning. Early
    in my career, Oracle did not document performance tuning very well, but the `Database
    Performance Tuning Guide` is now a must-read for all Oracle DBAs. Performance
    tuning is a large topic and takes a lot of work to be good at it. Start with this
    guide and then look to other sources.


    The `Performance Tuning Guide` has four parts:


    *   Part I, “Database Performance Fundamentals,” covers the foundation to begin
    your performance tuning efforts.

    *   Part II, “Diagnosing and Tuning Database Performance,” covers how to measure
    existing performance and gather information about performance problems.

    *   Part III, “Tuning Database Memory,” covers how to size your Oracle instance
    for optimal performance.

    *   Part IV, “Managing System Resources,” covers how to optimize your system configuration
    for optimal performance.


    If you are a junior-level DBA, then start by skimming this guide to get a feel
    for what it contains. As you progress over your career and grow your skillset,
    you will most likely be tasked with more performance tuning cases and you will
    delve into this book more and more.


    ## Error Messages


    `Oracle Database Error Messages` is not really a book that you read in the traditional
    sense. Rather, the book is a reference that contains a list of all the documented
    Oracle error messages you may encounter. What you want to look for here is how
    to navigate the book for the time you run across some error message you do not
    understand. For example, if you see the `ORA-00020` error, you can find it in
    the book and see the description (or similar) shown in Figure 13-8.


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig8_HTML.jpg](images/467924_1_En_13_Chapter/467924_1_En_13_Fig8_HTML.jpg)


    Figure 13-8: Sample error message


    All of the error messages in the book will have a Cause section and an Action
    section. Many times, the error message alone may not be meaningful enough, in
    which case the Cause and Action sections typically can help you sort out the issue
    and help you resolve the problem. Sadly, some Cause and Action sections are blank.


    ## Backup and Recovery


    In Chapter 7, we discussed the topic of backup and recovery. In that chapter,
    I pointed you to the `Backup and Recovery User’s Guide`. Hopefully you have had
    time to at least skim through it. Because we covered that book in some depth already,
    we will not spend any more time discussing it in this chapter.


    Chapter 7 also mentioned another book to examine, the `Database Backup and Recovery
    Reference`. Any time you see the term “Reference” in the book’s title, it means
    the contents of that book detail each and every option for that topic. For example,
    although the `Backup and Recovery User’s Guide` shows you how to use Recovery
    Manager (`RMAN`) for backing up and recovering your database, including examples
    on using the `BACKUP` and `RECOVER` and `RESTORE` commands, there is so much more
    to those commands than what is shown in that guide. Each of those commands has
    many options, and the guide only shows the most commonly used options to those
    commands. The `Backup and Recovery Reference`, on the other hand, shows details
    on each of the command options. If you want to know every little detail of these
    commands, look in the reference. Not only does it tell you everything you need
    to know about each command, it also includes syntax diagrams so that you can properly
    formulate the command. Many times, I have put command options in the wrong order
    or defined a command incorrectly. If I go to this reference, I can see exactly
    how to formulate my command and avoid errors. Take some time to peruse this reference
    so that you know what it contains.


    ## SQL Language Reference


    The only way to interact with an Oracle database is to send it SQL commands. Every
    SQL command is documented in detail in the `Oracle Database SQL Language Reference`.
    For example, see if you can find the `CREATE ROLE` command in this book. (Hint:
    The SQL Statements are presented alphabetically in Chapters 10 through 19.) The
    first thing you will see is the Purpose section, describing the purpose of the
    command. The Prerequisites section describes what you need before you can successfully
    issue the command. In this example, you need the `CREATE ROLE` system privilege.
    The Syntax section diagram shows how to correctly formulate the statement. The
    Semantics section then discusses, in depth, each of the options for this command.
    Lastly, the Examples section provides a few examples of various options to illustrate
    how the command works.


    In addition to the various SQL commands documented in this reference, the book
    also discusses the default data types and functions supplied by Oracle. Also discussed
    are operators and expressions you could use in a SQL statement.


    Take time to peruse this document. You might be surprised to see how much information
    is in there about everyday SQL statements you issue to an Oracle database on a
    regular basis.'
