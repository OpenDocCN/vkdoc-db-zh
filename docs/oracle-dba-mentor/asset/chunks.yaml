- fmt: '## Upgrade Preparation and Execution


    12. Arrange for a downtime window for the production upgrade. All relevant members
    of the IT team should be involved in the plan. Everyone should know what is happening
    and when the upgrade will take place.


    13. Prior to the downtime window, install the new Oracle version on the database
    server. The software installation does not require any downtime and can be done
    in advance. Use the documentation created in step 5 as your play-by-play instructions
    and the installation should go smoothly.


    14. It is now time to upgrade the production database. Take a good backup of the
    database right before the upgrade begins. Should something fail in the upgrade
    process, it may leave the database in a state where it is no longer operational.
    You will want to have this backup on hand in case you need to get to a state just
    prior to upgrade.


    15. Upgrade the production database. Use the documentation created in step 6 as
    your play-by-play instructions. This will give you confidence that the upgrade
    will go smoothly. It will also reduce the chances of human error and lead to a
    shorter downtime window because you will know the next step no matter where you
    are in the process. If desired, print out the documentation and cross off each
    step as you complete it.


    16. Take a good backup of the database right after the upgrade ends. The database
    upgrade is not a trivial task. Should you have a failure of the server or the
    disk, you now have a copy of the upgraded database to restore just in case. Do
    not skip steps 14 and 16 as, one day, they may very well save you from a catastrophe.


    17. Continue to monitor the application functionally and performance for a few
    weeks after the upgrade is complete. Very few testing efforts in development and
    test environments will cover everything the application and its end users perform
    against production.


    Oracle documents the installation and upgrade in two different books that you
    can read in steps 1 and 2 above. However, those books are written for generic
    environments. Your environment is specific to your organization. Do not skip writing
    your own step-by-step documentation because this is your playbook as to how you
    accomplish the installation and upgrade, specifically for you. More than once,
    this simple task of documentation has saved myself from many upgrade mistakes.


    Do not skip the backups both before and after the upgrades. You may never need
    them and they may seem like unnecessary steps. However, it only takes one bad
    upgrade to be thankful you did the extra work.


    ## Upgrade Methods


    There are three different upgrade methods you could use. All will get your database
    to the new version. As you can imagine, there are three different methods because
    they do things a bit differently and they each have their own strengths and weaknesses,
    as we will see in this section. The three methods are to use the Database Upgrade
    Assistant (`DBUA`), perform a manual upgrade, and use some form of export/import
    to move the database.


    One special note needs to be mentioned before we explore these methods in detail.
    No matter which method you choose, Oracle Corporation recommends that you apply
    the latest and greatest Patch Set Update (PSU) or Revision Update (RU) to your
    database before you begin the upgrade process. On rare occasions, a bug in the
    old version has caused problems when trying to upgrade to a new version. The bug
    was not necessarily causing problems with the database running on the old version,
    but reared its ugly head only when upgrading. If your database version is up to
    date, you reduce the chances of running into such upgrade problems.


    ### Database Upgrade Assistant


    The Database Upgrade Assistant (`DBUA`) is a Java-based, graphical wizard-style
    utility that will walk you through the upgrade process. Answer a few questions,
    click the Next button a number of times, and watch the `DBUA` do the work for
    you. Because the `DBUA` is written in Java, it is the same utility no matter which
    OS platform your Oracle database is running on. The `DBUA` also has a silent mode
    where you can automate the process and run it in command-line mode.


    My recommendation is to use the `DBUA` as much as possible for your database upgrades.
    This method of upgrading the database often has the shortest downtime window.
    The downtime window is not determined by the database size. The `DBUA` significantly
    reduces the chances of human error because it automates much of the process for
    you. The `DBUA` even runs prerequisite checks and, if it finds issues, stops before
    attempting the upgrade.


    The shorter downtime window and the reduced risk are the two benefits of using
    the `DBUA`. One downside to this utility is that the upgrade cannot be used to
    simultaneously move the database to a different server. Another downside is that
    the `DBUA` also requires that the database to be upgraded be one of a few different
    versions. This is called a direct upgrade. In this chapter, we will be upgrading
    the database in our testbed to the Oracle 18.3 version. A direct upgrade to 18.3
    is only possible if the source database is version 11.2.0.3, 11.2.0.4, 12.1.0.1,
    12.1.0.2, or 12.2.0.1. If your database is a different version, you cannot use
    the `DBUA` to upgrade to the 18.3 version.


    The *Database Upgrade Guide* always lists the versions that can have a direct
    upgrade. If you are running a different version, then you have two options. Perform
    an upgrade to one of the versions supporting a direct upgrade, or use export/import
    tools. The export/import upgrade path will be discussed shortly.


    As an example, if the database is version 10.2.0.5, you can upgrade to 11.2.0.4
    and then upgrade to 18.3. This scenario would require two upgrades to be performed.
    If this situation applies to you, I highly recommend you perform one upgrade and
    then wait awhile, making sure there are no issues. After you are confident things
    are running fine on the 11.2.0.4 version, upgrade to 18c. Do not attempt to upgrade
    from 10.2.0.5 to 11.2.0.4 then to 18.3 all in the same downtime window.


    ### Manual Upgrade


    You always have the option of performing a manual upgrade. Before the `DBUA` existed,
    this method was the most preferred. The manual upgrade has two of the same characteristics
    as using the `DBUA`. One, you can only perform a manual upgrade for versions that
    support a direct upgrade. The `DBUA` is actually performing the same steps as
    a manual upgrade, it is just automating the process for you. Two, the downtime
    window is similar, but in actuality will take a little bit longer because the
    database administrator will need to perform some of the steps the `DBUA` is much
    quicker in doing. The manual upgrade’s biggest downside is that the steps are
    performed manually by the DBA and the chances of human error increase greatly.
    Because of the increased risk, the `DBUA` is recommended over the manual upgrade
    almost every time.


    When a manual upgrade is performed, the database administrator must prepare the
    new Oracle home directory for the database. The database is then shut down cleanly.
    The DBA changes their environment to use the new software version. The database
    is started in `MIGRATE` mode and scripts are run to upgrade the database. Once
    complete, the DBA restarts the database with the new version.


    If the `DBUA` is a better option, why perform a manual upgrade? The only reason
    to do so is that the database administrator can intervene midway during the upgrade
    process. The `DBUA` will do what it was programmed to do. There may be certain
    situations where you want to perform the upgrade steps and introduce a step in
    the middle of the process. Such situations would be very, very rare. As such,
    the manual upgrade is not likely to be performed in today’s Oracle environments.'
