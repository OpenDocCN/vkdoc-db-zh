    # 第四部分 维护 Oracle 数据库


    # 15. My Oracle Support


    读完本书后，你很可能会产生更多问题并希望了解更多。在前面的两章中，我们开启了一段深入 Oracle 文档的旅程。正如你所发现的，Oracle 文档是学习更多
    Oracle 知识的重要资源。文档集非常庞大，最大的障碍是弄清楚哪本书包含你想要的信息，这就是为什么我们花了两章来探索如何导航文档。


    在上一章中，我们讨论了 Oracle 数据字典。所有优秀的数据库引擎都以数据字典或数据库目录的形式是自我文档化的。使用数据字典的最大障碍是弄清楚哪个视图包含你想要的信息。


    如果你遇到一个问题，而 Oracle 文档和数据字典都没有包含你寻找的答案，那么下一个通常要去的地方就是 My Oracle Support。


    ## 登录 My Oracle Support


    My Oracle Support，通常缩写为 `MOS`，是 Oracle 公司的支持门户。`MOS` 用户可以搜索知识库、获取补丁并提交援助请求。`MOS`
    处理 Oracle 的所有产品。正如我们将在本章中看到的，`MOS` 还提供了更多功能。


    要访问 My Oracle Support，请将 Web 浏览器指向 [`http://support.oracle.com`](http://support.oracle.com)，并使用你的
    Oracle 单点登录 (`SSO`) 账户登录，如图 15-1 所示。回想一下，在第 3 章和第 5 章中，你使用了你的 Oracle `SSO` 账户从
    Oracle 技术网络下载软件。如果你没有 Oracle `SSO` 账户，可以免费创建一个。图 15-1 显示了登录 `MOS` 的按钮。如果你没有 Oracle
    `SSO` 账户，请点击**新用户**链接。创建账户时，我通常使用公司电子邮件地址作为用户 ID。所有 Oracle `SSO` 账户都使用电子邮件地址作为用户
    ID。如果你因支持问题填写服务请求，Oracle 支持会将通知发送到该电子邮件地址。


    ![图 15-1](img/467924_1_En_15_Fig1_HTML.jpg)

    *图 15-1 My Oracle Support 登录屏幕*


    登录后，你将被定向到 **MOS 仪表板**选项卡。在仪表板选项卡的右侧，有多个其他选项卡可用于导航到 `MOS` 的不同区域，如图 15-2 所示。


    ![图 15-2](img/467924_1_En_15_Fig2_HTML.jpg)

    *图 15-2 MOS 导航选项卡*

    '
- fmt: '## CSI


    While access to MOS is free, you will not be able to do much there unless your
    company has an Oracle Support contract in good standing. When a support contract
    is first purchased for the company’s Oracle products, Oracle provides a Customer
    Service Identification (CSI) number. You can continue to use the CSI so long as
    the maintenance contract is renewed on an annual basis. It is possible that you
    will have multiple CSI numbers if your company has bought Oracle products at different
    times.


    The first MOS account to enter in a valid CSI number becomes the CSI administrator.
    If someone else is already the CSI administrator for your company, when you enter
    the CSI into your MOS account, the administrator will have to approve your use
    of the CSI number.


    If your company already has its CSI numbers entered into MOS, ask the rest of
    your database administration team which CSI values you should use. Then sign in
    to My Oracle Support and click the `Settings` tab. As shown on the left side of
    Figure 15-3, click the `My Account` link.


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig3_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig3_HTML.jpg)

    Figure 15-3


    Support Identifiers


    In the section for Support Identifiers, you should see the CSI numbers associated
    with your MOS account. Click the `Request Access` button. You will be taken to
    the screen shown in Figure 15-4 to add the CSI to your account.


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig4_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig4_HTML.jpg)

    Figure 15-4


    Adding new CSI


    Enter in the value of the CSI you need access to. This will automatically send
    an e-mail to the CSI administrator in your organization.


    The CSI admin will need to go to the same `Settings` tab in MOS and click the
    `Pending User Requests` link to approve your access. Once approved, you will be
    able to use this CSI value for your needs.


    ## Dashboard


    When you first sign on to My Oracle Support, you will land on the `Dashboard`
    tab, as shown in Figure 15-5. If you ever want to get back to the Dashboard, simply
    click its tab at the top of the page.


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig5_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig5_HTML.jpg)

    Figure 15-5


    MOS Dashboard


    The `Dashboard` tab is a great place to start. It contains sections for the latest
    news, for a quick search of the knowledge base, for a summary of your outstanding
    service requests, and for getting started.


    Most people live with the default settings of the Dashboard, but you can tailor
    it to suit your needs if you choose. In the top-right corner of the page, click
    the `Customize Page` link. From there, you can remove some of the Dashboard panels
    if you do not want to see them. You can click the `Add Content` button to add
    panels for a Bug Tracker, a Patch Search, and more.


    ## Tutorial Videos


    In the dashboard’s Getting Started section there is a link titled “Learn My Oracle
    Support: How-To Series.” I highly recommend that you click that link and spend
    some time watching some videos on how to use MOS. These videos will augment what
    you read in this chapter. If you click that link, you will see a page similar
    to Figure 15-6. Click any of the buttons under Play Video to learn more.


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig6_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig6_HTML.jpg)

    Figure 15-6


    MOS training videos


    Figure 15-6 shows the `New to MOS` tab, which provides videos for those new to
    My Oracle Support. There are a number of short videos describing much of the functionality.
    Feel free to click the other tabs to discover what videos await.


    ## Knowledge Base


    The knowledge base is where I spend most of my time when I am accessing My Oracle
    Support. If you have a problem and neither the Oracle documentation nor the data
    dictionary can help you solve it, the MOS knowledge base is often the next place
    to look.


    Searching the knowledge base is pretty easy. It is very similar to performing
    a search of the Web with Google or another search engine. Simply enter in your
    search text and click the magnifying glass icon to begin the search. You can enter
    your search text into the box in the Knowledge Base section of the Dashboard or
    you can click the `Knowledge` tab. At the top of each page is a search box similar
    to Figure 15-7.


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig7_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig7_HTML.jpg)

    Figure 15-7


    MOS search box


    I typically use the search box at the top of the page because I know it’s always
    there no matter where I am in MOS. The drop-down menu on the left of the search
    box shows a history of your recent search terms.


    As with doing any web search, the more specific you are in your terminology, the
    better your chances of obtaining a relevant hit (result). If you search for “Oracle”
    only, you are going to get lots of hits and many of them will not help you with
    your problem. It is often helpful to copy and paste your exact error message into
    the search box.


    Figure 15-8 shows the results of one search conducted with an error message. The
    search text is still in the box.


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig8_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig8_HTML.jpg)

    Figure 15-8


    Knowledge base search results


    MOS will break down the search hits into various sections. In the example in Figure
    15-8, the sections are Recommended Links, Knowledge Base Search Results, and Community
    Search Results. Click the blue triangle to expand each section. At the top of
    Figure 15-8, you will see a green check mark next to `Knowledge Base` and `Community`.
    You can click that green check mark to turn those off and remove hits from those
    areas in your results. Click the check mark again to show the hits in the results.


    If I click the blue triangle next to `Knowledge Base Search Results` in Figure
    15-8 and then click the first hit, I am taken to the My Oracle Support Note shown
    in Figure 15-9. Every document in MOS is called a Note, and they all have an ID
    number. In the example in Figure 15-9, I am viewing MOS Note `1475147.1`. In the
    older days of Oracle Support, Notes were referred to by their document ID, or
    Doc ID for short. You may still see people reference Doc IDs instead of Notes.
    Even the article in Figure 15-9 says “Doc ID”. Today’s Oracle DBA will use Doc
    ID and Note interchangeably.


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig9_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig9_HTML.jpg)

    Figure 15-9


    MOS document


    It is a violation of your support agreement to disclose the contents of the MOS
    Notes outside of My Oracle Support. You will notice in Figure 15-9 that I am only
    including the title and not the actual contents of the document. Also note the
    words “Oracle Confidential” at the top of the page.'
