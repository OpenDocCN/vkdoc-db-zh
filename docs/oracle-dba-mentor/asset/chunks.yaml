    当您准备好后，点击`下一步`按钮。在过去，提交一个服务请求仅此而已。但如今使用 Oracle 支持，您还有更多工作要做。无论好坏，您都需要预先提供更多信息。`MOS`也将查看您提供的信息，以确定是否存在已知的问题解决方案。以我为例，我正在填写一个关于`ORA-600
    错误`的`SR`，因此`MOS`向我提出了一个问题，如图 15-15 所示。


