    Alert Log Instance Shutdown

    ```


    If the instance ever crashes, the best place to find out why is in the Alert Log.
    The first thing the DBA should do is to start the instance and get it up and running
    as quickly as possible to restore access to the data. The second thing the DBA
    should do is figure out why the instance crashed. In the Alert Log entries shown
    in Listing [12-9](#467924_1_En_12_Chapter.xhtml#PC9), we can see that the instance
    was critical. A background process named SMON died unexpectedly. Since SMON must
    be up and running, another process, PMON, detected the condition and terminated
    the Oracle instance.'
