  trans: '## 缓冲区缓存


    缓冲区缓存将数据文件中的块副本存储在内存中，以便快速高效地检索。如果数据库引擎每次需要数据时都必须从磁盘读取，性能将非常低下。从内存中读取数据则快得多。实例启动时，缓冲区缓存初始为空。当向数据库发出
    SQL 语句时，这些语句将尝试读取或修改数据库中的数据。在数据被修改或返回给用户之前，数据文件的块会被读入缓冲区缓存。其理念是，既然你的会话需要访问这些数据，那么其他会话在不久的将来可能也需要类似的访问。如果我们将数据缓存在内存中，就可以省去为后续任何请求从磁盘读取数据的昂贵操作。


    在与非 Oracle 专业人士交谈时，我简单地将此结构称为“数据库的缓存”。许多人都熟悉缓存的概念，因此使用简单的术语有助于我们更有效地沟通。我也会将 SGA（系统全局区）中的其他缓存结构归入这一术语，我们很快会讨论到。在与
    Oracle 数据库管理员交谈时，我会非常具体地说明我指的是 SGA 中的哪个缓存组件。


    除非数据库相对较小，否则服务器可能缺乏足够的内存来缓存整个数据库的内容。缓冲区缓存需要管理其内容，以便最常请求的数据保留在内存中。Oracle 使用一种改进的“最近最少使用”算法来确定当需要为另一个请求腾出空间时，应从缓存中清除哪些数据。


    在某些情况下，特别是当 Oracle 引擎认为数据只会被请求一次时，可能会跳过缓冲区缓存。数据直接从磁盘读取并传递到用户的会话，Oracle 称之为 `直接路径读取`。直接路径读取可以避免在从磁盘读取数据之前查找并可能清理出部分缓冲区缓存所需的时间。但是，如果数据被再次访问，则必须再次从磁盘读取。


    该结构之所以被称为缓冲区缓存，是因为缓存中的每个空间块都被称为 `缓冲区`。缓冲区的大小等于数据库的 `DB_BLOCK_SIZE` 初始化参数。如果你的数据库块大小为
    8K，那么缓存中的每个缓冲区就是内存中连续的 8K 块。缓冲区缓存就是这些块或缓冲区的集合。


    如前所述，实例启动时，缓冲区缓存为空。缓存中的每个缓冲区状态都是 `未使用`。然后，一个会话发出 `SELECT` 语句从表中读取数据。块从磁盘读取并放入缓存中的缓冲区。此时，数据尚未被修改，因此缓冲区状态为
    `干净`。如果会话更改了缓冲区中的数据，状态则变为 `脏`。当事务提交更改后，缓冲区仍保留在缓存中，并标记为脏。


    需要注意的是，提交事务的操作并不会导致 Oracle 将脏缓冲区的内容写入磁盘。脏缓冲区仅在 Oracle 执行检查点时才会被写入数据文件。以下事件将触发检查点：


    *   重做日志切换到下一组。

    *   达到 `LOG_CHECKPOINT_INTERVAL` 指定的间隔。

    *   超过 `LOG_CHECKPOINT_TIMEOUT` 指定的值。

    *   有人执行了 `ALTER SYSTEM CHECKPOINT` 命令。


    另一个需要注意的重要事项是，即使修改缓冲区的事务尚未提交，脏缓冲区也可能被写入磁盘。当缓冲区缓存存在空间压力时，就可能发生这种情况。


    ## 共享池


    另一个重要的 SGA 组件是共享池。共享池是内存结构的集合，全部归入此类。我们可以分别考虑其子组件，但出于某种原因，Oracle 决定将它们分组到共享池中。这些子组件，也称为子池，定义如下。


    ### 库缓存


    库缓存是 Oracle 存储所有已处理 SQL 语句的地方。当用户向实例发出 SQL 语句时，在 Oracle 开始返回数据之前会进行大量工作。必须解析该语句以确保其语法正确。接下来，Oracle
    优化器必须确定高效的执行计划，以尽快返回数据。如果另一个用户发出相同的 SQL 语句，能够受益于之前的工作将非常有益。Oracle 将所有这些信息存储在库缓存中。当用户提交
    SQL 语句时，Oracle 首先检查库缓存以查看该语句是否已存在。如果它在缓存中，则可以跳过所有预处理步骤。


    ### 数据字典缓存


    缓冲区缓存存储来自应用程序表的数据。请记住，数据字典也存储在表中，由 `SYS` 用户拥有。数据字典表对于数据库操作至关重要，因此它们拥有自己的缓存，即共享池的一个子组件。数据字典缓存不保存块或缓冲区，而是保存数据行。因此，你在一些较早的
    Oracle 文献中有时会看到它被称为 `行缓存`。


    ### 结果缓存


    如果 SQL 语句返回一致的结果，DBA 可以利用结果缓存来存储该结果，而不必在每次执行 SQL 语句时重新计算结果。下次用户发出相同的 SQL 语句时，Oracle
    会查看库缓存，并发现执行它的最佳方式是直接从结果缓存获取结果。结果缓存可以极大地提高这些 SQL 语句的性能。此功能最适用于基础数据不经常更改且结果集不非常大的
    SQL 语句。只有极少数 SQL 语句会受益于结果缓存，但对于那些适用的语句，Oracle 需要内存，而结果缓存就是存放它们的地方。


    ## 重做日志缓冲区


    重做日志缓冲区，也称为 `日志缓冲区`，是 SGA 的另一个组件。当事务对数据进行更改时，Oracle 必须存储信息以便能够重放或重做该事务。重做记录将被写入联机重做日志，但直接将重做记录写入磁盘将花费太多时间。事务将重做信息写入内存，即重做日志缓冲区。


    重做日志缓冲区是一个循环内存结构。如果有足够多的数据写入缓冲区，最终较旧的内容将被覆盖。Oracle 需要在缓冲区填满之前将重做记录写入联机重做日志。


    ## 大型池


    大型池是为大于其他共享池需求的内存需求而预留的空间。通常，大型池用作并行 SQL 语句和 RMAN 从属进程的缓冲区空间。


    ## Java 池


    Java 池是 Oracle 存储在数据库 Java 虚拟机（JVM）内执行的 Java 代码的地方。


    ## 固定 SGA


    SGA 需要一定空间用于内部管理活动。此空间大小固定且无法更改，因此得名 `固定 SGA`。但是，新的 Oracle 版本可能需要更大的固定 SGA。'
- fmt: "# Sizing SGA Components\n\nIt used to be that the Oracle database administrator\
    \ specified different initialization parameters to specify the size of the SGA\
    \ components, including the Shared Pool, the Buffer Cache, etc. Today’s Oracle\
    \ DBA uses the `SGA_TARGET` initialization parameter to define the total SGA size\
    \ and lets the Oracle instance determine the best size of the individual components\
    \ so long as they all fit within the parameter’s setting. By using this parameter,\
    \ there are two benefits. First, sizing the SGA is easier because only one parameter\
    \ must be accurately set. Second, the Oracle instance can adjust the individual\
    \ components in response to changing workloads. If more space is needed for the\
    \ Buffer Cache, it can be taken from the Shared Pool if there is plenty available\
    \ there.\n\nSimilar to determining a proper size for the PGA, Oracle includes\
    \ the `V$SGA_TARGET_ADVICE` view. In Listing [20-5](#467924_1_En_20_Chapter.xhtml#PC5),\
    \ the row where the size factor equals 1 is our current SGA setting.\n\n```sql\n\
    SQL>  select sga_size_factor,estd_db_time,estd_physical_reads\n  2  from v$sga_target_advice;\n\
    \nSGA_SIZE_FACTOR ESTD_DB_TIME ESTD_PHYSICAL_READS\n--------------- ------------\
    \ -------------------\n            .25        53470             4175955\n    \
    \         .5       686730            42630654\n            .75        77000  \
    \          29370744\n              1        60692             4175955\n      \
    \     1.25        59958             3005852\n            1.5        59703    \
    \         3005852\n           1.75        59581             3005852\n        \
    \      2        59521             3005852\n\nListing 20-5\nSGA Target Advice\n\
    ```\n\nIn the output above, our current SGA has an estimated DB time value of\
    \ `60,692` and an estimated number of physical reads of `4,175,955`. If we increase\
    \ the SGA by 25% (factor=`1.25`), the estimated DB time drops a little, as does\
    \ the estimated physical reads. Notice that if we increase the SGA by a factor\
    \ of 50%, the estimated physical reads do not change. This view is showing us\
    \ that doubling the SGA size would not give us that much better performance than\
    \ increasing by a more modest amount of 25%.\n\nOracle includes another parameter,\
    \ `MEMORY_TARGET`, that is used to size both the SGA and the PGA. This singular\
    \ parameter makes it even easier for database administrators to size the memory\
    \ structures to support the Oracle instance. However, you cannot use `MEMORY_TARGET`\
    \ if your database server has implemented Huge Pages for shared memory allocation.\
    \ If you are running Oracle on Linux, then you will most likely want to use Huge\
    \ Pages, which means you need to determine proper values for the `SGA_TARGET`\
    \ and `PGA_AGGREGATE_TARGET` initialization parameters.\n\n# Background Processes\n\
    \nAllocating all that memory is fine, but no work will get accomplished with simple\
    \ memory allocation. Something needs to move data in and out of memory. In Unix\
    \ and Linux environments, Oracle makes heavy use of different processes, or small\
    \ programs, running on the server. Each process has its own job to do. Together,\
    \ the processes work together to make the Oracle instance function. On Windows\
    \ servers, the work is done by different threads in the same process.\n\nWhen\
    \ you start an Oracle instance, memory is allocated and several processes automatically\
    \ start. These are called `background processes` because they work in the background\
    \ managing the instance. This differs from processes that are specific to user\
    \ sessions.\n\nSome background processes are `mandatory`. If a mandatory process\
    \ dies, the instance will terminate. After all, an instance cannot survive if\
    \ a process it requires is absent. Other processes are `optional` and are started\
    \ depending on the configuration of the instance. Recall that in Chapter [7](#467924_1_En_7_Chapter.xhtml)\
    \ we set up archivelog mode for our testbed. When configured this way, the Oracle\
    \ instance will start a process to copy the contents of an ORL to the archivelog\
    \ destination. That’s the process’s only job. Because archivelog mode is not required,\
    \ the process to support it is not required either. If an optional process abnormally\
    \ terminates, the instance will stay up and running. Typically, one of the mandatory\
    \ processes will detect the optional process is down and attempt to restart it.\n\
    \nEach new Oracle version can bring with it new processes, some mandatory and\
    \ some optional. Consult the *Database Concepts* guide for your specific version\
    \ to understand the different processes the instance may spawn. Sometimes new\
    \ processes are created to support new functionality. Other times, Oracle Corporation\
    \ creates new processes to split out work done by a process that has become overburdened.\
    \ For example, as long as I can remember, every Oracle version has had a `PMON`\
    \ process. `PMON` still exists, but Oracle 12*c* now has taken part of `PMON`’s\
    \ duties and pushed them into the `CLMN` and `CLnn` processes, as we will see\
    \ in the next section.\n\n## Mandatory Processes\n\nThis section describes the\
    \ mandatory processes for an Oracle 12.2 instance.\n\n*   `Process Monitor (PMON)`:\
    \ This process is responsible for monitoring and cleaning up after other processes.\
    \ `PMON` will clean up the Buffer Cache. Once a user’s session ends, `PMON` will\
    \ release any resources that session held, including any transaction locks. `PMON`\
    \ includes a few helper processes in Oracle 12*c*, `CLMN` and `CLnn`.\n    * \
    \  `Cleanup Main Process (CLMN)`: When `PMON` knows a user’s process needs cleanup\
    \ work, it delegates the job to `CLMN`. `CLMN` is then responsible for seeing\
    \ that the work is completed. Because the cleanup work can be a job all on its\
    \ own and leaves little time for oversight, `CLMN` delegates the real work to\
    \ the next process.\n    *   `Cleanup Helper Processes (CLnn)`: These are the\
    \ processes that do the real cleanup work. `CLMN` is the supervisor and `CLnn`\
    \ does the actual work. The `nn` is a placeholder for a two-digit number. You\
    \ might see `CL01` and `CL02` processes if multiple processes are running.\n\n\
    *   `Process Manager (PMAN)`: This process monitors and controls dispatcher and\
    \ shared server processes, job queue processes, and any background processes that\
    \ can be restarted.\n\n*   `System Monitor (SMON)`: This process performs cleanup\
    \ of the system. `PMON` and its helpers take care of process cleanup. `SMON` takes\
    \ care of the rest. When an instance is started, `SMON` will perform recovery\
    \ of any uncommitted transactions. `SMON` will also clean up any temporary segments.\n\
    \n*   `Listener Registration (LREG)`: This process tells the Listener the instance\
    \ is up and running and ready for connection requests. It periodically updates\
    \ the Listener with the number of current connections to the instance. Prior to\
    \ 12*c*, this process’s work was performed by `SMON`.\n\n*   `Database Writer\
    \ (DBWn)`: This process, also known as `DBWR`, is responsible for writing dirty\
    \ blocks in the Buffer Cache back to the database files. While there is typically\
    \ one process (`DBW0`), a heavy workload may dictate multiple processes.\n\n*\
    \   `Log Writer (LGWR)`: This process is responsible for writing the contents\
    \ of the Redo Log Buffer to the online redo logs.\n\n*   `Checkpoint (CKPT)`:\
    \ This process starts the checkpoint activity. When a checkpoint occurs, it prompts\
    \ `DBWR` to take action. `CKPT` will update the control files and update every\
    \ datafile header with the most recent System Change Number (`SCN`).\n\n*   `Manageability\
    \ Monitor (MMON)`: This process updates and manages the Automatic Workload Repository\
    \ (`AWR`).\n    *   `Manageability Monitory Lite (MMNL)`: This process reads statistics\
    \ from the Active Session History buffer and writes the data to disk, all part\
    \ of the `AWR`.\n\n*   `Recoverer Process (RECO)`: This process cleans up failures\
    \ in any distributed transactions. A distributed transaction is one that involves\
    \ more than one Oracle database."
