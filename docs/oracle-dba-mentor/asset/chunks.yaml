    ## User Trace Files


    Any end user’s database session can create a trace file as well. A session’s trace
    file is very useful because it may contain a record of each and every SQL statement
    issued to the database for the duration of the trace. Sometimes an end user will
    report a problem and neither the end user nor the database administrator knows
    what SQL statement is causing problems. The DBA can start a trace in the user’s
    session and try to figure out what the user is executing against the database.


    By default, sessions do not generate a trace file. The simplest way to start a
    trace is to modify the session’s `SQL_TRACE` parameter and set it to a value of
    `TRUE`, shown in Listing [12-16](#467924_1_En_12_Chapter.xhtml#PC17).


    ```

    SQL> alter session set sql_trace=true;

    Session altered.

    SQL> select ''this is my trace'',sysdate from dual;

    ''THISISMYTRACE''  SYSDATE

    ---------------- ---------

    this is my trace 31-JUL-18

    SQL> alter session set sql_trace=false;

    Session altered.

    SQL> select spid as os_pid from v$process

    2  where addr in (select paddr from v$session

    3                 where sid=sys_context(''USERENV'',''SID''));

    OS_PID


    Listing 12-16

    Starting SQL Trace

    ```


    In the preceding example, the user started SQL Trace, issued a SQL statement to
    the database, then ended the trace. At the end, the user used `V$SESSION` and
    `V$PROCESS` to learn the session’s OS process identifier. All user trace filenames
    have the format `instance`_ora_`pid`.trc, where the `ora` is constant. Since we
    know the instance is named `ORCL` and we now know the OS pid, we know to look
    for a file named `orcl_ora_5765.trc` in our RDBMS trace directory, which also
    contains the Alert Log.


    If we open the trace file with a text editor, we can see some introductory information,
    and if we scroll down, we can find the SQL statement that was issued to the database.
    The trace file generated in Listing [12-16](#467924_1_En_12_Chapter.xhtml#PC17)
    is shown in Listing [12-17](#467924_1_En_12_Chapter.xhtml#PC18).


    ```

    =====================

    PARSING IN CURSOR #139855599918944 len=43 dep=0 uid=0 oct=3 lid=0 tim=8201176343

    6 hv=2979390255 ad=''70aa7700'' sqlid=''az5q2d6stbstg''

    select ''this is my trace'',sysdate from dual

    END OF STMT

    PARSE #139855599918944:c=0,e=567,p=0,cr=0,cu=0,mis=1,r=0,dep=0,og=1,plh=13887349

    53,tim=82011763436

    EXEC #139855599918944:c=520,e=2029,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=1,plh=1388734953,tim=82011765502

    FETCH #139855599918944:c=0,e=7,p=0,cr=0,cu=0,mis=0,r=1,dep=0,og=1,plh=1388734953,tim=82011765583

    STAT #139855599918944 id=1 cnt=1 pid=0 pos=1 obj=0 op=''FAST DUAL  (cr=0 pr=0
    pw=0 str=1 time=2 us cost=2 size=0 card=1)''

    FETCH #139855599918944:c=0,e=1,p=0,cr=0,cu=0,mis=0,r=0,dep=0,og=0,plh=1388734953,tim=82011766311

    *** 2018-07-31T09:16:25.618519-05:00

    CLOSE #139855599918944:c=0,e=7,dep=0,type=0,tim=82020618587

    =====================

    Listing 12-17

    Raw Trace File Contents

    ```


    The output is a bit of a nightmare to read, but we can clearly make out the SQL
    statement. If we look at the lines below the SQL statement, we can see the Parse
    phase, the Execution phase, and the Fetch phase. SQL statements are typically
    parsed to ensure that they are syntactically correct and that that user has permissions
    on the statement’s objects. The statement is then executed. All SQL statements
    undergo these three phases. If the SQL statement returns rows, the results are
    the fetched and returned to the user.


    A trained Oracle DBA might be able to make sense of what follows. For example,
    the `c=` value tells us how much time that phase spent processing on the CPU.
    The `e=` value tells us how much elapsed time was spent on that phase.'
