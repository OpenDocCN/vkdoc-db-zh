    在Oracle 12.2.0.1中，有2,022个 `DBA_` 视图。那么我们如何找到能提供所需信息的视图呢？值得庆幸的是，Oracle创建了一个数据字典视图，名为
    `DICT`（Dictionary的缩写），它为我们提供数据字典视图的描述。当我很难记住哪个视图包含我想要的信息时，我会查询 `DICT` 来看看它提供了什么。`DICT`
