  trans: '## 典型的 DBA 一日


    本节的标题有些用词不当，因为对于 DBA 来说，并不存在所谓“典型”的一天。当然，与我交谈过的每一位 DBA 都是以喝杯咖啡或其他晨间饮料、然后检查电子邮件中是否有需要立即处理的事务来开始一天的，但在此之后，这一天很可能就与“典型”二字毫不沾边了。这种多样性对许多
    DBA 来说很有吸引力，因为他们不会日复一日地 `困在` 同样的事务中。


    大多数数据库管理员确实有一套相似的职责组合，例如：


    *   检查备份作业状态

    *   确保数据库安全

    *   创建新数据库

    *   创建新数据库对象

    *   确保数据持续可用

    *   调优数据库性能

    *   设计数据库

    *   规划数据库容量

    *   与其他 IT 员工和应用程序开发人员紧密协作

    *   参与值班轮换

    *   安装软件

    *   执行 `提取、转换和加载 (ETL)` 活动

    *   故障排除


    这绝非一份详尽无遗的清单，DBA 很可能还负有其他职责。很多时候，你并不会在一段长时间内持续、积极地处理某项分配的任务。例如，我每年只进行几次容量规划活动，但检查备份作业状态是每日的例行工作。事务有起有落，存在
    `季节性` 变化，这些都使得工作保持趣味性。


    DBA 的职责也会因公司而异。不同的组织根据自身需求和目标对该职位进行了定制。例如，我曾在一家只使用第三方软件应用程序的公司工作。在这种情况下，DBA 负责与应用程序供应商合作，为软件提供数据库服务。在另一家公司，我需要与应用程序开发人员紧密合作，协助他们编写
    `SQL` 语句。这两份工作都给了我 DBA 的头衔，但工作的性质却大相径庭。


    ## 数据守护者


    我在上一节中已有所提及，但掌握这个主题对于你作为数据库管理员取得成功至关重要。DBA 是公司的 `数据守护者`。然而，当我问同行 DBA 们他们认为自己最重要的职责是什么时，典型的回答是“备份”。对于
    DBA 最重要职责是什么这个问题，我的回答是“保护数据”。备份只是整个数据保护使命中的一个组成部分。


    数据是一项宝贵的资产。像 `Google` 和 `Facebook` 这样的公司免费向你提供他们的产品。你有没有想过为什么？简单的答案是，他们从你为他们生成的数据中获利。你搜索什么、关注谁，这些行为都会生成数据点，从而构建出你——这个用户的画像。这些数据点随后会被以多种方式使用。例如，`Google`
    和 `Facebook` 可以利用这些画像为其他公司生成定向广告。他们也可以将数据出售给第三方。


    即使你的公司不从事买卖数据的业务，其数据库中的数据仍然是一项宝贵的企业资产。一家销售产品的公司可能希望更多地了解其客户。我在大学时了解到一个著名案例，一家杂货店挖掘了客户购买模式的数据，发现在周末，啤酒和尿布经常被一起购买。杂货店推测，是父亲被派去商店为宝宝买尿布，同时也买了一些啤酒带回家。这家连锁杂货店开始将啤酒和尿布并排摆放在货架末端，从而提高了两者的销量。了解客户是企业利用其数据资产的一种方式。


    即使你认为自己公司的数据没有价值，黑客们肯定不这么认为。黑客会尝试各种方法来获取访问你公司数据的权限。公司投入了大量资金用于硬件、许可证和工资，以存储数据并使其可供业务使用。然而，作为数据守护者，我们不能允许对这些数据进行无限制的访问。这样做可能会危及业务运营。我们决不能让任何人随意更改数据。例如，一家销售体育用品的公司拥有其销售产品的库存数据。如果公司有十根棒球棒库存，那么数据库就应该反映这一事实。如果有人恶意或意外地将数据更改为库存中有零根球棒，那么客户将无法订购该产品，公司就会失去潜在的销售额。相反，如果有人将数据更改为库存中有
    100 根棒球棒，那么销售系统可能会尝试销售根本不存在的 90 根球棒，导致这些订单无法履行，从而引起客户不满。客户不满会导致未来的销售损失，这是必须避免的。这家体育用品公司需要在其数据库中准确反映其产品的库存。


    当今许多数据库系统还存储着因其敏感性质而自身就具有价值的信息，例如 `个人身份信息 (PII)`。`PII` 是可用于识别特定个人的数据，例如姓名和出生日期、税号、信用卡号等。数据库中的任何
    `PII` 都需要被加密，这样即使黑客获得了数据库访问权限，也无法从这些数据中获取任何价值。


    未能保护数据对业务在多个层面上都是有害的，正如我们从近期众多关于又一数据泄露事件的头条新闻中所知。例如，2013 年，`Target Corporation`
    遭受了一次众所周知的数据泄露，据报道，这次事件使该公司损失了超过 3 亿美元！`Yahoo` 在 2013-2014 年遭受了超过 30 亿账户的数据泄露。当
    `Yahoo` 被 `Verizon` 收购时，据估计，收购价比如果没有发生此次泄露事件要低 3.5 亿美元。据估计，遭受数据泄露的小公司中有 60% 会倒闭。


    我一直秉持的观点是，作为一名 DBA，我就是我公司的数据守护者。DBA 需要成为那个时刻思考着保护数据的人。这意味着要确保只有那些具有合法业务需求的人才能访问数据，并且只有那些具有适当修改权限的人才能修改数据。我们尽可能限制对数据的访问。DBA
    不断被要求为业务中的新途径提供数据访问权限。随着公司学会将数据作为一项资产加以利用，他们正在探索利用这些数据驱动收入的新方法。数据不仅会以新颖而令人兴奋的方式被使用，DBA
    可能还需要只为业务部门提供他们所需的数据，不多不少，以保护数据。DBA 可能还需要在另一个业务部门获得访问权限之前对数据进行清洗。


    数据保护远不止备份。DBA 需要确保数据库引擎应用了最新的安全补丁。DBA 在数据库中授予和撤销权限。DBA 需要熟悉 `SQL` 注入和其他数据库黑客技术。DBA
    需要学习如何加密数据库中的数据，以及如何保护加密密钥。希望本节能让你相信，DBA 最重要的工作不是备份。相反，DBA 必须精通数据保护的各个方面。DBA 需要成为数据守护者。'
- fmt: '## Moving On


    As stated earlier, this book is different than others because it not only focuses
    on technical information necessary to become a successful Oracle database administrator,
    but also gives you advice on how to learn things you won’t find in any books.
    This book can help serve as one of the many mentors you will use to advance your
    database administrator career. I have designed this book to not only help you
    learn more about administering Oracle databases, but also to help you discover
    how to learn things you will not find in other books, even the Oracle documentation.


    The next chapter does not have what you might consider to be technical information.
    Rather, it focuses on the soft skills necessary to perform work as a database
    administrator. Please do not skip this chapter because it still contains very
    important information.


    # 2. Working As a DBA


    The previous chapter I went over the career path to becoming a database administrator
    as well as the general duties and responsbilities of the DBA, including their
    role as the Data Guardian. In this chapter, we will spend time discussing how
    to work as a database administrator. The information in this chapter is not technical
    in nature and can be used by non-Oracle DBAs as well. Rather, this chapter will
    focus on the soft skills all good database administrators should possess. Much
    of the information in this chapter can be used outside of the DBA role and applied
    to other positions in the organization as well.


    ## The Rude DBA


    Depending on whom you ask, the database administrator is usually a well-respected
    profession in the IT world. As we discussed in the previous chapter, the DBA usually
    comes from either an application development or system administration background.
    It is more rare for someone to become a database administrator straight out of
    college. Typically, the DBA worked up to the position and demonstrated a high
    degree of skill to get there.


    When you are working as a DBA, try to remember that you not only represent yourself
    and your organization, but you also represent this profession. I’ve always thought
    of the database administrator as being one of the top positions of the IT career
    ladder. As such, you will interact with many people inside your organization.
    If you follow the advice in future chapters, you will interact with many people
    in the world-wide Oracle community. Representing yourself in a positive manner
    will have greater impact on your lifelong career than if you are demonstrating
    poor behavior. Sadly, I’ve come across too many DBAs in this world who are always
    grumpy and obstructionists to others, traits not exclusive to DBAs. As an example,
    a DBA refuses to grant privileges or create new databases regardless of the business
    need and without giving an explanation. I’ve heard too many stories about the
    DBA being a jerk and being hard to work with. There could be many reasons why
    some DBAs have this attitude, but please do not be this type of DBA. If you get
    a request for a privilege or a new database and you know the request should not
    be satisfied, instead of refusing the request in some rude manner, a better approach
    is to figure out what the requestor really needs and how you can help them do
    their job. Do not respond “Your request is denied” but rather “Sorry, but satisfying
    that request as you have outlined it will cause other problems. Can we do it another
    way so that you can do your job but my concerns are still met?”


    ### Tip


    Don’t be the rude DBA. Be the helpful one.


    I’ve always been of the unsubstantiated opinion that the rude DBA is a small part
    of the reason for the rise of the schema-less databases that have become very
    popular today. Application developers have stated that these databases, like MongoDB,
    are great because they can install and set them up and begin coding without ever
    having to get assistance from the DBA. My counterpoint is that by avoiding the
    DBA, developers miss many other aspects of database administration the DBA normally
    thinks about. A few of those aspects relate to database security and a proven
    backup and recovery implementation. The application developer is not used to being
    the data guardian, a concept we talked about in the previous chapter. In Chapter
    [7](#467924_1_En_7_Chapter.xhtml), we will discuss how a DBA should think of recovery
    before backups, a viewpoint that most application developers do not even consider.
    In 2017, over 25,000 unsecured MongoDB databases were hit with ransomware^([¹](#fn1)).
    It’s not that MongoDB is an insecure database platform. Rather, these deployments
    had weak passwords and default usernames. The DBA was bypassed, security was never
    given a thought, and companies paid the price. Had DBAs been involved in these
    projects, the databases likely would have been secured because a good DBA thinks
    about these things. I wonder how many of the companies with those 25,000+ MongoDB
    installations now wish their DBA was in charge of their database platform.


    This example is not meant as an indictment of MongoDB. It’s a great product and
    I currently manage a few MongoDB databases. Out of the box, MongoDB, Oracle, and
    other database platforms are not secure. It is the database administrator’s job
    to lock things down no matter which database platform is being deployed. The point
    of the example is that people try to avoid rude DBAs and will find workarounds
    that lack security and other controls essential to good data governance.


    ### Tip


    The rude DBA is a liability. The helpful DBA is an asset.


    Being helpful doesn’t mean the DBA needs to do whatever a coworker requests. There
    are many times I will deny a request. Any time I deny a request, I do so with
    politeness and a follow-up on how to get the requestor back to work. The requestor
    needs to get their job done. They know something in the database is currently
    blocking them from completing their task. Most requestors I have met are not as
    knowledgeable as the database administrator as to how to properly get past their
    database roadblock. This is where the DBA must help formulate the request into
    something that satisfies both parties.'
