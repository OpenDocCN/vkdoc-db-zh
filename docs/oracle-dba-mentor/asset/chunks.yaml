    [oracle@oracle122 ~]$ cat /etc/oratab

    #

    # This file is used by ORACLE utilities.  It is created by root.sh

    # and updated by either Database Configuration Assistant while creating

    # a database or ASM Configuration Assistant while creating ASM instance.

    # A colon, '':'', is used as the field terminator.  A new line terminates

    # the entry.  Lines beginning with a pound sign, ''#'', are comments.

    #

    # Entries are of the form:

    #   $ORACLE_SID:$ORACLE_HOME::

    #

    # The first and second fields are the system identifier and home

    # directory of the database respectively.  The third field indicates

    # to the dbstart utility that the database should , "Y", or should not,

    # "N", be brought up at system boot time.

    #

    # Multiple entries with the same $ORACLE_SID are not allowed.

    #

    #

    orcl:/u01/app/oracle/product/12.2.0.1:N

    Listing 9-4

    Oratab File

    ```


    Most of the file consists of comments, but look at the last line of this file.
    It shows that for the ORACLE_SID named orcl, the Oracle home directory is /u01/app/oracle/product/12.2.0.1\.
    When you use oraenv to set your environment, it looks in this file to find the
    Oracle home. From there, it can set your environment variables properly. If you
    use the DBCA to create the database, that utility will automatically populate
    the oratab file. If you use the Database Upgrade Assistant (DBUA) to upgrade to
    a new Oracle version, the DBUA will automatically modify this file for you. If
    you manually create or upgrade databases, you will have to manually modify this
    file. The last part of that line is either Y or N, a flag that tells the Oracle-supplied
    startup and shutdown utilities whether or not to handle this database. If the
    flag is set to Y, those utilities will start up and shut down the Oracle instance
    for that database whenever they are run.


    This file is not present on Windows systems. Oracle uses the Windows registry
    to point to the Oracle home directories for each database on that server. Startup
    and shutdown is automated through Windows services and appropriate registry entries.


    ## Processes and Bequeath


    What happens under the covers when we create that local connection? To understand
    what happens, we need to take a bit of a step back. Starting an Oracle instance
    allocates memory and creates many processes on the database server. These processes
    all perform the work the Oracle database engine needs. Later in this book, we
    will dive deeper into these background processes to support an Oracle instance.


    When an application connects to an Oracle instance, Oracle created a process on
    the database server dedicated to that user’s session. This is called a *dedicated
    server process* . The application talks to the dedicated server process and the
    dedicated server process talks to the Oracle instance. Applications do not communicate
    with the instance directly. Figure [9-1](#467924_1_En_9_Chapter.xhtml#Fig1) shows
    the workflow.


    ![../images/467924_1_En_9_Chapter/467924_1_En_9_Fig1_HTML.png](images/467924_1_En_9_Chapter/467924_1_En_9_Fig1_HTML.png)


    Figure 9-1


    Dedicated server process


    In our case, the application is SQL*Plus. SQL*Plus is the application’s name,
    but sqlplus is the executable file we call to run that application. SQL*Plus talks
    to a dedicated server process that was created for us when we connected to the
    instance. In Listing [9-5](#467924_1_En_9_Chapter.xhtml#PC5), we will find out
    our process identifier for our current session and then look at the processes
    running on the server.


    ```

    SQL> select spid from v$process

    2  where addr in (select paddr from v$session

    3                 where username=''PEASLAND'');

    SPID


    SQL> !ps -ef|grep 7080

    oracle    7080  7069  0 14:37 ?        00:00:00 oracleorcl (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))

    SQL> !ps -ef|grep 7069

    oracle    7069  2752  0 14:37 pts/0    00:00:00 sqlplus

    oracle    7080  7069  0 14:37 ?        00:00:00 oracleorcl (DESCRIPTION=(LOCAL=YES)(ADDRESS=(PROTOCOL=beq)))

    Listing 9-5

    Local Processes

    ```


    From the output above, we can see from the V$PROCESS view that our dedicated server
    process has a server process identifier (SPID) of 7080\. Using the ps command
    and filtering with grep, we can see a process named oracleorcl running on the
    server. This is our dedicated server process. Let’s examine the rest of that line.
    Notice that it says LOCAL=YES and PROTOCOL=BEQ. This information is letting us
    know the dedicated server process is for a local connection and it is using the
    Bequeath communication protocol. We can also see that the process 7080 has a parent
    process with Server Process Identifier (SPID) 7069\. If we use ps and grep again,
    we can see that process 7069 is our sqlplus application.


    For local connections, you will often see the Bequeath protocol in use. The word
    *bequeath* means to pass something on to someone else. In this case, the protocol
    is simply passing the connection right to the dedicated server process. Bequeath
    always uses a dedicated server process and never involves an Oracle Listener,
    which will be discussed in the next section.


    Each dedicated server process requires a certain amount of memory and other overhead
    on the database server. When the Internet exploded and more and more users started
    accessing data from a database, it became clear that the dedicated server process
    architecture would reach some limitations. Oracle Corporation created the *shared
    server process* architecture where the process on the server would be shared by
    multiple applications, as can be seen in Figure [9-2](#467924_1_En_9_Chapter.xhtml#Fig2).


    ![../images/467924_1_En_9_Chapter/467924_1_En_9_Fig2_HTML.png](images/467924_1_En_9_Chapter/467924_1_En_9_Fig2_HTML.png)


    Figure 9-2


    Shared server process


    With this architecture, the number of server processes can be significantly reduced.
    However, we rarely see these used in practice today. Today we have application
    and web server connection pooling. We have Java connection pooling. All of these
    reduce the number of database connections. As such, today’s Oracle DBA does not
    often need to implement the shared server architecture. I mention it here just
    so that you know it exists and have a basic understanding of what it means. Someday
    you may find that it is the proper architecture for your system.


    We’ve seen how applications local to the database server connect to an Oracle
    instance. The next logical step is to discuss how applications on another machine,
    remote from the database server, make their connections to the instance. In practice,
    the application is almost never on the database server. Typically, the only application
    used locally to the database is SQL*Plus in the DBA’s hands. End users run their
    applications on their desktop or interact with a web server or some other application
    server. Those connection requests all go through the Oracle Listener, the subject
    of the next section.


    There is one more final note when discussing processes for Oracle databases. On
    Unix and Linux systems, these all appear as individual processes running on the
    server. On Windows systems, these are threads in the same process. One cannot
    easily see threads in a Windows process, which does make running Oracle on Windows
    a bit harder to work with from time to time.


    ## Oracle Listener


    The Listener’s job is simple. Listen for incoming connection requests (hence its
    name), make the connection happen, and then get out of the way. Too many people
    erroneously think that the Listener is involved for every network communication
    between the application and the database, and that is not true. Once the connection
    has been established, the Listener is no longer needed for that session.'
