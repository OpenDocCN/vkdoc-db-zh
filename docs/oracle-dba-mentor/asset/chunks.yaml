  trans: '

    # Oracle 季度补丁概述


    ## 版本更新与 RU/RUR 说明


    在某个时间点，`Oracle 18` 发布了。接下来的一个季度，Oracle 发布了 `18 RU`，这将 Oracle 版本变更为 `18.1`。第二个
    `RU` 将 Oracle 版本变更为 `18.2`，依此类推。如果你将 `RU` 应用到 `Oracle 18` 数据库，你将获得尽可能多的修复。请注意，将
    `RU` 应用到 `Oracle 18` 数据库会改变版本号，使其看起来像是进行了 Oracle 升级，但实际情况并非如此。`RU` 是一个补丁，而不是升级。更令人困惑的是，将
    `RU` 应用到 `Oracle 12.2` 数据库并不会将版本变更为 `12.3` 或更高版本。


    有些人不喜欢对 Oracle 优化器做如此多的改动。一个糟糕的改动可能导致优化器选择低效的执行计划，进而影响应用程序性能。Oracle 为我们提供了 `RUR`，它包含与
    `RU` 相同的安全和错误修复，但不包含优化器修复，这意味着 `RUR` 将优化器保持在相同的功能水平。`Oracle 18` 发布后的第一个季度，只有 `RU`
    可用。第二个季度，DBA 可以选择应用下一个 `RU` 或应用 `RUR`。然而，优化器变更只会冻结六个月，所以 `RUR` 只能为你争取一点时间。Oracle
    公司建议你每季度应用 `RU`。他们的立场是，`RUR` 仅适用于特殊情况。


    ## 版本补丁建议


    所有这些可能会令人困惑，尤其是考虑到所有的缩写。为了简化问题，以下是针对每个 Oracle 版本的季度补丁建议。除非你有特定原因，否则请遵循 Oracle
    的建议来确定应应用哪个季度补丁。


    *   `11.2.0.4` 之前的版本：升级到较新的版本

    *   `Oracle 11.2.0.4`：应用 `PSU`

    *   `Oracle 12.1`：应用 `PSU`（如果在 Windows 上，则应用 `BP`）

    *   `Oracle 12.2`：应用 `RU`

    *   `Oracle 18` 和 `19`：应用 `RU`


    ## 如何获取季度补丁


    出于某种我一直未能弄明白的原因，获取这些季度补丁并不像你想象的那么容易。Oracle 为我们发布了一个链接，但你需要多点击几次才能真正下载补丁。我们将逐步介绍如何找到季度补丁。将
    Web 浏览器指向 [`http://otn.oracle.com`](http://otn.oracle.com) 并寻找标题为“Essential Links”的框，部分如图
    17-2 所示。


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig2_HTML.jpg](img/467924_1_En_17_Fig2_HTML.jpg)

    *图 17-2 OTN Essential Links*


    在该列表中，你可以看到“Critical Patch Updates”的链接。点击该链接。请注意，你可以在 My Oracle Support 的仪表板上找到类似的链接。这两个链接都会带你前往“Critical
    Path Updates, Security Alerts and Bulletins”页面。向下滚动一点，直到你看到标题为“Critical Patch
    Updates”的部分，如图 17-3 所示。


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig3_HTML.jpg](img/467924_1_En_17_Fig3_HTML.jpg)

    *图 17-3 CPU 链接*


    这部分的第一段告诉你接下来四个 CPU 的发布日期，以便你提前知晓。随后的表格包含指向每个季度补丁的链接。你可以下载过去几年的每一个 CPU，但除了最近的
    CPU（位于表格顶部）之外，很少有理由下载其他任何补丁。点击最近的 CPU 链接。


    下一页是该季度的“Critical Patch Update Advisory”。描述之后的表格包含了他们提供的每一个 Oracle 产品的补丁。列表相当广泛，并按字母顺序排列。你需要向下滚动以找到“Oracle
    Database Server”，如图 17-4 所示。


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig4_HTML.jpg](img/467924_1_En_17_Fig4_HTML.jpg)

    *图 17-4 Oracle Database Server 链接*


    不要点击左侧包含不同版本的那个链接。相反，点击该表格右侧写着“Database”的链接。如果你最近没有进行身份验证，系统会要求你提供凭据以连接到 `MOS`。到此为止的所有内容都是公开的，但下一页是一个
    `MOS Note`，这意味着你需要一个付费的支持合同。


    季度补丁的 `MOS Note` 提供了你想阅读的相关信息。其中一个部分详细说明了该季度的新增内容。在新信息部分，Oracle 提供了他们所谓的“Post
    Release Patches”。当 `CPU` 首次发布时，它仅适用于少数平台。其他平台会在很短的时间后发布。本节将告诉你这些平台计划在何时发布该季度的补丁。


    该 `MOS Note` 的第 3 节提供了补丁的详细信息。此时我只对 Oracle 数据库的补丁感兴趣。第 3.1.4 节，如图 17-5 所示，列出了指向当前每个受支持版本补丁的链接。


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig5_HTML.jpg](img/467924_1_En_17_Fig5_HTML.jpg)

    *图 17-5 Oracle Database 版本列表*


    我们的测试平台包含 `12.2.0.1` 版本，因此点击该链接将跳转到第 3.1.4.3 节。如果你有不同的 Oracle 版本，可以相应地点击。请注意，版本列表相当短。只显示了受支持的版本。任何不在列表中的版本都不受支持，并且不会收到季度补丁。你必须升级到列表中的某个版本。


    点击数据库版本后，浏览器将显示一个表格，列出该版本的补丁。经过所有这些点击，我们现在可以查看要下载的补丁号了。如果你想包含 Oracle Java 虚拟机
    (`OJVM`) 补丁，它们位于表格的第一个框中。第二个框如图 17-6 所示，它不包含 `OJVM` 补丁。


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig6_HTML.jpg](img/467924_1_En_17_Fig6_HTML.jpg)

    *图 17-6 Oracle CPU 补丁链接*


    我们的测试平台运行在 Linux 上，属于 UNIX 类别。点击图 17-6 所示表格中的补丁 `28163133` 链接（此补丁是表格第二行中列出的第一个补丁）。


    下一页包含指向每个 UNIX 平台的链接。向下滚动到 Linux x86-64 平台那一行，并点击左侧的链接。我们在图 17-7 中看到这只是页面上众多补丁中的一个。另请注意，因为这是一个
    `Oracle 12.2` 数据库，我们正在下载的是版本更新 (`RU`) 类型的补丁。


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig7_HTML.jpg](img/467924_1_En_17_Fig7_HTML.jpg)

    *图 17-7 Linux 补丁下载*


    如果你点击了错误的超链接，安装补丁到你的系统时会遇到问题。确保你选择了正确的那个。在下一个屏幕（如图 17-8 所示）中，请确保平台是正确的。即使你点击了适用于你平台的正确超链接，有时
    `MOS` 会在这里弄错，所以请仔细检查平台。


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig8_HTML.jpg](img/467924_1_En_17_Fig8_HTML.jpg)

    *图 17-8 PSU 平台选择*


    你可以通过点击“Read Me”按钮查看补丁的 Readme 文件。Readme 文件也会包含在下载中。点击 `Download` 按钮，将出现图 17-9
    所示的屏幕。


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig9_HTML.jpg](img/467924_1_En_17_Fig9_HTML.jpg)

    *图 17-9 下载链接*

