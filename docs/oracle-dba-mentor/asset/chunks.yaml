    ## 用户跟踪文件


    任何最终用户的数据库会话也可以创建跟踪文件。会话的跟踪文件非常有用，因为它可能包含在跟踪期间发送到数据库的每条 SQL 语句的记录。有时最终用户会报告一个问题，但无论是最终用户还是数据库管理员都不知道是哪条
    SQL 语句导致了问题。DBA 可以在用户的会话中启动跟踪，并尝试弄清楚用户正在对数据库执行什么操作。


    默认情况下，会话不会生成跟踪文件。启动跟踪最简单的方法是将会话的 `SQL_TRACE` 参数修改为 `TRUE` 值，如清单 12-16 所示。


    ```

    SQL> alter session set sql_trace=true;

    Session altered.

    SQL> select ''this is my trace'',sysdate from dual;

    ''THISISMYTRACE''  SYSDATE

    ---------------- ---------

    this is my trace 31-JUL-18

    SQL> alter session set sql_trace=false;

    Session altered.

    SQL> select spid as os_pid from v$process

    2  where addr in (select paddr from v$session

    3                 where sid=sys_context(''USERENV'',''SID''));

    OS_PID


    清单 12-16

    启动 SQL 跟踪

    ```


    在前面的例子中，用户启动了 SQL 跟踪，向数据库发出了一条 SQL 语句，然后结束了跟踪。最后，用户使用了 `V$SESSION` 和 `V$PROCESS`
    来了解会话的操作系统进程标识符。所有用户跟踪文件的命名格式为 `instance`_ora_`pid`.trc，其中 `ora` 是常量。既然我们知道实例名为
    `ORCL`，并且现在知道了操作系统进程 ID，我们就知道要在 RDBMS 跟踪目录（该目录也包含警告日志）中查找一个名为 `orcl_ora_5765.trc`
    的文件。


    如果我们用文本编辑器打开跟踪文件，可以看到一些介绍性信息，如果向下滚动，可以找到发送给数据库的 SQL 语句。清单 12-16 生成的跟踪文件如清单 12-17
    所示。


