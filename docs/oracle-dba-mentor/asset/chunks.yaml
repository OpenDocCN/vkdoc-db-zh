    ### 关于作者与关于技术审校


    ### 关于作者


    ### 关于技术审校


    # 第一部分：初始设置


    ## 1. 引言


    如果您已经拿起这本书，那么您很可能已经获得（或希望获得）一份 Oracle 数据库管理员（DBA）的工作，并且正在寻求职业生涯下一步的指导。市场上有许多书籍会详细介绍
    Oracle 数据库工作原理的技术信息。我的书架上就有很多这类书籍。它们提供了大量有用的信息，是极好的资源。


    正如本书标题所示，它旨在成为您 DBA 职业生涯中的一位导师。导师通常会与学员携手同行，指导他们的职业发展。我无法亲自在您身边，因此我认为次好的选择是写下我多年来传授给他人的建议和见解。我希望这本书比一般的计算机书籍更具个人色彩，更像任何其他导师与学员之间的关系，所以我经常使用“我”和“我们”这样的词。本书很可能是您职业生涯中众多导师中的一员。许多初级数据库管理员会与一位资深
    DBA 一起工作，后者是他们的主要导师。本书应作为您主要导师指导的补充。您还会从遇到的其他 Oracle 专业人士那里获得建议，他们虽非正式导师，却会对您的职业成长产生影响。


    您正在阅读的这本书之所以与众不同，是因为它的目标是教您如何找到其他同类书籍中没有的答案。如果您需要更多信息该怎么办？该去哪里寻找？最常见的答案是查阅 Oracle
    文档，这是个很好的应对方法。但很多时候，人们因为 Oracle 文档庞大复杂而不敢使用。在本书的第 13 章，我将教您如何有效利用文档。可惜的是，Oracle
    文档并不总是完备的，那么接下来该去哪里？当信息不易获得时，本书将为您指明下一步的方向。


    有时，寻找答案的最佳资源就在您自己身上。我从许多初级 Oracle DBA 那里最常听到的一类问题大致是：“我能在 Oracle 中做*X*吗？”如果您问了这个问题，那么答案显然是“不能！”，因为这表明您甚至没有尝试过。在本书的学习过程中，我们将构建一个系统，让我们能够为自己创造许多问题的答案。在构建这个系统的过程中，我们将涵盖许多最佳实践。如果您遵循本书的建议，您不仅将拥有一个可以使用的测试环境，还会充满信心，确信您正在创建和管理的
    Oracle 系统能够应对系统所需的多种不同需求。


    本书并非高度技术性的书籍。它旨在供您在数据库管理职业生涯初期使用。有些人可能称之为*初级 DBA*级别。中级 DBA 也可能从中发现一些有用的信息。如果您是资深
    DBA，您可能已经了解本书中呈现的大部分信息。然而，我发现有太多资深 DBA 不得不以艰难的方式学习这些知识，并希望有人能在他们职业生涯早期就向他们传授本书中的知识（这也是我写作本书的部分动机）。这本书仅仅是对您职业生涯漫长旅程的一个开始。没有人能一夜之间成为伟大的
    DBA。您在职业生涯中可能已经遇到过一些杰出的 DBA。他们是如何达到如此崇高地位的？通过努力工作和持续学习。我担任 Oracle DBA 已超过 20 年，至今仍在不断学习新东西。对于许多我遇到的顶级数据库管理员来说，解决复杂数据库问题的挑战以及学习如何利用数据库引擎的特性，是这份职业最令人欣慰的方面。


    本书的大部分内容源于多年来指导我的众多 DBA 们传授给我的东西，但遗憾的是，在我早期缺乏一位真正手把手的导师。在我该领域的第一份工作中，我是唯一的 DBA，所以没有人指导我。我的大多数“导师”甚至从未见过我，可能也不知道我的名字，或者他们曾帮助过我的职业生涯。但在我的职业生涯中，我从许多人那里汲取了点点滴滴，并用这些构建了您将在这里阅读的内容基础。


    现在，这是我给您的第一条建议，以帮助您发展职业生涯：付出多少，就收获多少。听起来很简单，对吧？然而，付出需要时间、精力和自律，因此人们通常无法充分分享他们本可以分享的知识。我多年来学到的一个秘诀是，与他人分享知识的过程，教会我的和我教给他们的一样多。当您必须整理思路，尤其是以书面形式表达时，大脑中会发生一些变化，让您比没有写下任何东西时更好地掌握这些材料。Oracle
    社区中的大部分知识共享都是通过书籍、博客文章、白皮书和论坛等书面形式完成的。


    > **提示**

    >

    > 分享您的知识。您学到的将和您教授的一样多。


    虽然本书专注于 Oracle，但您可以将这些相同的原则和技术用于处理其他数据库系统。例如，在第 13 章，我们将花时间学习 Oracle 文档。如果您是 SQL
    Server DBA，您只需将这些知识转换到微软的在线手册（Books Online）中。虽然本书涵盖了与 Oracle 相关的论坛，但也有许多针对 SQL
    Server 的论坛。建议是相同的，您只需要将其转换为适用于其他数据库引擎即可。


    在您的职业生涯中，极有可能被要求使用多种数据库平台。在我当前的工作中，我主要使用 Oracle，但也使用 SQL Server 和 MongoDB。多年来我还使用过
    PostgreSQL、MySQL 和 DB2。每当我接触一个新的数据库系统时，我都会尝试弄清楚如何在 Oracle 中完成某项任务，然后看看其他数据库引擎是如何做同样的事情的。例如，所有数据库引擎都有某种形式的事务日志。在
    Oracle 中，它是联机重做日志。在 SQL Server 中，它被称为事务日志。两种引擎具有相同的功能。区别在于它们实现该功能的方式。

    '
- fmt: '## Becoming a DBA


    Typically, there are two career paths to becoming a database administrator. In
    general, the junior-level database administrator was either an application developer
    or a system administrator (`SysAdmin`) prior to working as a `DBA`. Application
    developers that become `DBA`s normally have experience working on database-centric
    applications and have already been exposed to tables, queries, and other database
    activities. Former system administrators understand the operating system, disk
    subsystems, and basic networking skills, all of which are essential for a database
    administrator to understand. No matter which of these two paths the `DBA` traveled
    before embarking on their database career, they most likely demonstrated a high
    degree of skill before being promoted to fill a junior-level `DBA` position in
    their company. Sometimes, the `DBA` will work on database-related projects in
    their organization without being an official database administrator. They may
    take this job experience and parlay that into an entry-level `DBA` position at
    another company. While possible, it is more rare for someone to obtain a `DBA`
    position without having been a developer or `SysAdmin` in the past. Those who
    start as a `DBA` without coming from one of these two paths typically focused
    on database systems in college.


    I’ve often told people that the database engine sits between the application and
    the server. As such, it makes sense to hire junior-level `DBA`s from one end or
    the other. Ideally, the candidate would have experience in both servers and application
    development, but that is often harder to find.


    It can be difficult to obtain your first database administrator job. For starters,
    the job is technically complex, but that is also one of the reasons it can be
    very exciting. In addition to understanding how the database engine works, the
    `DBA` needs to have good knowledge of system administration and application development,
    as already discussed. The `DBA` also needs to understand networking and storage,
    and possess a thorough grasp of IT security. Today’s `DBA` should have experience
    with cloud technologies. One of the challenges facing database administrators
    is the breadth of knowledge required to be good at this job. But this also is
    very appealing to many `DBA`s—the job never gets dull because there is so much
    to learn and so many different areas to explore. The variety, complexity, and
    chance to explore new features are attractive qualities of the job to many different
    people.


    Another stumbling block to landing that first `DBA` job is the importance of the
    data within a company. Data is an organizational asset. It needs to be protected
    yet made available to support the business. Many companies are reluctant to trust
    individuals with little experience to manage, maintain, and secure one of the
    most important pieces of their IT infrastructure. We will discuss this further
    in the section “Data Guardian” later in this chapter.


    So how do you land that first `DBA` job? For most people, you begin your career
    in either system administration or application development, as mentioned earlier.
    If you started as a `SysAdmin`, then learn as much as you can about networking
    and storage and IT security. If you began as an application developer, then take
    the time to understand as much as you can about creating good database applications.
    Learn the ins and outs of table design, formulating `SQL` statements, and how
    to get the best application performance by leveraging the proper database features
    like indexes, materialized views, and more.


    Next, try to focus your career with a slant in the database direction. Talk to
    your manager about your desire to learn more about database administration. Volunteer
    for small database-related projects, even if they are out of scope for your traditional
    duties. As you will learn later in this book, you can download the `Oracle` database,
    install it on a test system, and begin playing with the product. There is nothing
    stopping you from building your `Oracle` database knowledge and experience right
    now! At some point in your career, you will likely build other skills, both soft
    and technical, relevant to the `DBA` role.


    Once you’ve had a chance to test the waters on a few `DBA` tasks, start keeping
    an eye out for junior-level `DBA` job openings. Many times, if your manager knows
    of your interest, they may be willing to take a chance on you, as a good employee,
    to grow your career in your desired direction. A good manager understands the
    value in keeping good employees happy, even if the employees have to replace their
    skillset as they move to another position within the company.


    Not all managers are willing to help their employees grow their career paths.
    Another stumbling block may simply be the lack of opportunities within your current
    company. In this case, managers cannot simply create a job opening just because
    an employee wants to change positions. If either of these situations applies to
    you, it may be time to look for employment outside your current company. At the
    end of the day, it is up to you to move your career forward. You may desire to
    move forward with your current company or you may have to decide to make a bigger
    change if your company cannot help you fulfill your career aspirations.


    If you are interviewing for a new position at some other company, you will inevitably
    be asked a question like `Where do you see yourself in five years?` This is your
    chance to tell the prospective new employer of your desire to work your way toward
    a `DBA` position. Seize the day! Make it plain and let your intentions be known.
    Some companies may determine that you are not a good fit for them based on this
    answer, but many others will, as they understand the value of engaged and enthusiastic
    employees. From my own experience, I’d rather work for a company that takes an
    interest in helping me advance my career in my desired direction than to obtain
    a job where I see no future career growth. Too many people are stuck in jobs they
    hate. I’d rather have a career that gives me satisfaction doing work that is challenging
    and rewarding. Ultimately, you have to look inside yourself to find out what motivates
    and excites you. For me, that is being a `DBA`. I cannot imagine working a different
    job. Since you’re reading this book, you may feel the same. No matter which avenue
    you choose to get to that first `DBA` job, good luck to you!'
  raw: '## Becoming a DBA


    Typically, there are two career paths to becoming a database administrator. In
    general, the junior-level database administrator was either an application developer
    or a system administrator (SysAdmin) prior to working as a DBA. Application developers
    that become DBAs normally have experience working on database-centric applications
    and have already been exposed to tables, queries, and other database activities.
    Former system administrators understand the operating system, disk subsystems,
    and basic networking skills, all of which are essential for a database administrator
    to understand. No matter which of these two paths the DBA traveled before embarking
    on their database career, they most likely demonstrated a high degree of skill
    before being promoted to fill a junior-level DBA position in their company. Sometimes,
    the DBA will work on database-related projects in their organization without being
    an official database administrator. They may take this job experience and parlay
    that into an entry-level DBA position at another company. While possible, it is
    more rare for someone to obtain a DBA position without having been a developer
    or SysAdmin in the past. Those who start as a DBA without coming from one of these
    two paths typically focused on database systems in college.


    I’ve often told people that the database engine sits between the application and
    the server. As such, it makes sense to hire junior-level DBAs from one end or
    the other. Ideally, the candidate would have experience in both servers and application
    development, but that is often harder to find.


    It can be difficult to obtain your first database administrator job. For starters,
    the job is technically complex, but that is also one of the reasons it can be
    very exciting. In addition to understanding how the database engine works, the
    DBA needs to have good knowledge of system administration and application development,
    as already discussed. The DBA also needs to understand networking and storage,
    and possess a thorough grasp of IT security. Today’s DBA should have experience
    with cloud technologies. One of the challenges facing database administrators
    is the breadth of knowledge required to be good at this job. But this also is
    very appealing to many DBAs—the job never gets dull because there is so much to
    learn and so many different areas to explore. The variety, complexity, and chance
    to explore new features are attractive qualities of the job to many different
    people.


    Another stumbling block to landing that first DBA job is the importance of the
    data within a company. Data is an organizational asset. It needs to be protected
    yet made available to support the business. Many companies are reluctant to trust
    individuals with little experience to manage, maintain, and secure one of the
    most important pieces of their IT infrastructure. We will discuss this further
    in the section “Data Guardian” later in this chapter.


    So how do you land that first DBA job? For most people, you begin your career
    in either system administration or application development, as mentioned earlier.
    If you started as a SysAdmin, then learn as much as you can about networking and
    storage and IT security. If you began as an application developer, then take the
    time to understand as much as you can about creating good database applications.
    Learn the ins and outs of table design, formulating SQL statements, and how to
    get the best application performance by leveraging the proper database features
    like indexes, materialized views, and more.


    Next, try to focus your career with a slant in the database direction. Talk to
    your manager about your desire to learn more about database administration. Volunteer
    for small database-related projects, even if they are out of scope for your traditional
    duties. As you will learn later in this book, you can download the Oracle database,
    install it on a test system, and begin playing with the product. There is nothing
    stopping you from building your Oracle database knowledge and experience right
    now! At some point in your career, you will likely build other skills, both soft
    and technical, relevant to the DBA role.


    Once you’ve had a chance to test the waters on a few DBA tasks, start keeping
    an eye out for junior-level DBA job openings. Many times, if your manager knows
    of your interest, they may be willing to take a chance on you, as a good employee,
    to grow your career in your desired direction. A good manager understands the
    value in keeping good employees happy, even if it means the employees have to
    replace their skillset as they move to another position within the company.


    Not all managers are willing to help their employees grow their career paths.
    Another stumbling block may simply be the lack of opportunities within your current
    company. In this case, managers cannot simply create a job opening just because
    an employee wants to change positions. If either of these situations applies to
    you, it may be time to look for employment outside your current company. At the
    end of the day, it is up to you to move your career forward. You may desire to
    move forward with your current company or you may have to decide to make a bigger
    change if your company cannot help you fulfill your career aspirations.


    If you are interviewing for a new position at some other company, you will inevitably
    be asked a question like “Where do you see yourself in five years?” This is your
    chance to tell the prospective new employer of your desire to work your way toward
    a DBA position. Seize the day! Make it plain and let your intentions be known.
    Some companies may determine that you are not a good fit for them based on this
    answer, but many others will, as they understand the value of engaged and enthusiastic
    employees. From my own experience, I’d rather work for a company that takes an
    interest in helping me advance my career in my desired direction than to obtain
    a job where I see no future career growth. Too many people are stuck in jobs they
    hate. I’d rather have a career that gives me satisfaction doing work that is challenging
    and rewarding. Ultimately, you have to look inside yourself to find out what motivates
    and excites you. For me, that is being a DBA. I cannot imagine working a different
    job. Since you’re reading this book, you may feel the same. No matter which avenue
    you choose to get to that first DBA job, good luck to you!'
  trans: '

    ## 成为一名 DBA


    通常来说，有两条职业路径可以成为数据库管理员。一般来说，初级的数据库管理员在从事 `DBA` 工作之前，要么是应用程序开发人员，要么是系统管理员 (`SysAdmin`)。成为
    `DBA` 的应用程序开发人员通常有开发以数据库为中心的应用程序的经验，并且已经接触过表、查询和其他数据库活动。前系统管理员了解操作系统、磁盘子系统和基本的网络技能，这些都是数据库管理员需要理解的关键知识。无论
    `DBA` 在开启数据库职业生涯之前走过这两条路径中的哪一条，他们在晋升填补公司初级 `DBA` 职位之前，很可能已经展现出高水平的技能。有时，`DBA`
    会在其组织内参与与数据库相关的项目，即使还不是正式的数据库管理员。他们可以凭借这份工作经历，在另一家公司谋得一个入门级的 `DBA` 职位。虽然也可能，但一个人在没有过去担任过开发人员或
    `SysAdmin` 的情况下获得 `DBA` 职位的情况更为罕见。那些直接从 `DBA` 起步、而非来自上述两条路径的人，通常在大学里专注于数据库系统的学习。


    我常对人说，数据库引擎位于应用程序和服务器之间。因此，从一端或另一端招聘初级 `DBA` 是合理的。理想情况下，候选人应同时具备服务器和应用程序开发的经验，但这通常更难找到。


    获得第一份数据库管理员工作可能很困难。首先，这份工作在技术上很复杂，但这也是它令人兴奋的原因之一。正如前面讨论过的，除了理解数据库引擎如何工作外，`DBA`
    还需要对系统管理和应用程序开发有良好的了解。`DBA` 还需要理解网络和存储，并对 IT 安全有透彻的掌握。今天的 `DBA` 应具备云技术方面的经验。数据库管理员面临的挑战之一是胜任这份工作所需知识的广度。但这也对许多
    `DBA` 非常有吸引力——这份工作永远不会枯燥，因为有太多东西要学，有太多不同的领域可以探索。多样性、复杂性和探索新功能的机会，是这份工作对许多人来说具有吸引力的特质。


    获得第一份 `DBA` 工作的另一个绊脚石是公司内部数据的重要性。数据是一种组织资产。它需要被保护，同时又要保持可用以支持业务。许多公司不愿意将管理、维护和保护其
    IT 基础设施中最重要组成部分之一的任务托付给经验不足的个人。我们将在本章后面的“数据守护者”一节进一步讨论这一点。


    那么，你如何获得第一份 `DBA` 工作呢？对大多数人来说，如前面提到的，你会从系统管理或应用程序开发开始你的职业生涯。如果你从 `SysAdmin` 起步，那么尽可能多地学习关于网络、存储和
    IT 安全的知识。如果你从应用程序开发人员起步，那么花时间尽可能多地了解如何创建良好的数据库应用程序。学习表设计的细节、编写 `SQL` 语句，以及如何通过利用索引、物化视图等适当的数据库特性来获得最佳的应用程序性能。


    接下来，尝试将你的职业生涯重心向数据库方向倾斜。与你的经理谈谈你希望更多地了解数据库管理的意愿。主动承担小型的数据库相关项目，即使这些项目超出了你传统职责的范围。正如你将在本书后面学到的，你可以下载
    `Oracle` 数据库，安装在测试系统上，并开始试用这个产品。你现在就可以开始构建你的 `Oracle` 数据库知识和经验，没有任何东西能阻止你！在你职业生涯的某个阶段，你很可能还会培养与
    `DBA` 角色相关的其他技能，包括软技能和技术技能。


    一旦你有机会在一些 `DBA` 任务上小试牛刀，就开始留意初级 `DBA` 的职位空缺。很多时候，如果你的经理知道你的兴趣，他们可能愿意给你一个机会，作为一个好员工，在你期望的方向上发展你的职业生涯。一个好的经理明白让好员工保持满意的价值，即使员工在公司内部转岗时需要更新他们的技能组合。


    并非所有经理都愿意帮助员工发展他们的职业道路。另一个障碍可能仅仅是当前公司内部缺乏机会。在这种情况下，经理们不能仅仅因为一个员工想换岗位就凭空创造一个职位空缺。如果这两种情况中任何一种适用于你，那么也许是时候在当前公司之外寻找工作机会了。归根结底，推动你的职业生涯前进取决于你自己。你可能希望在当前公司继续前进，或者，如果你的公司无法帮助你实现职业抱负，你可能需要决定做出更大的改变。


    如果你正在其他公司面试一个新职位，你不可避免地会被问到类似 `你认为五年后自己会在哪里？` 这样的问题。这是你向潜在的新雇主表明你渴望朝着 `DBA` 职位努力的机会。抓住时机！明确表达，让你的意图为人所知。有些公司可能会根据这个答案认定你不适合他们，但很多其他公司会愿意，因为他们理解投入且热情的员工的价值。根据我自己的经验，我宁愿为一家有兴趣帮助我朝期望方向推进职业生涯的公司工作，也不愿得到一份看不到未来职业发展的工作。有太多人被困在他们讨厌的工作中。我宁愿拥有一份能让我满足的职业，做有挑战性和回报的工作。最终，你必须审视自己的内心，找出什么能激励和让你兴奋。对我来说，那就是成为一名
    `DBA`。我无法想象做其他工作。既然你在读这本书，你可能也有同感。无论你选择哪条道路去获得第一份 `DBA` 工作，祝你好运！

    '
- fmt: '## Typical Day of the DBA


    The title of this section is a bit of a misnomer, because a typical data doesn’t
    exist for the DBA. Sure, every DBA I’ve talked to starts their day by getting
    a copy of coffee or other morning beverage and then checking their e-mail for
    anything that requires immediate attention, but after that, the day is likely
    to be anything but typical. The variety is appealing to many DBAs because they
    are not `stuck` doing the same thing day after day.


    Most database administrators do have a similar portfolio of duties and responsibilities,
    such as:


    *   Checking backup job status

    *   Securing databases

    *   Creating new databases

    *   Creating new database objects

    *   Making sure the data is up and running

    *   Tuning database performance

    *   Designing databases

    *   Planning database capacity

    *   Working closely with other IT staff and application developers

    *   Participating in an on-call rotation

    *   Installing software

    *   Performing `extract, transform, and load (ETL)` activities

    *   Troubleshooting


    This is not an exhaustive list by any means, and the DBA will likely have other
    duties as well. Many times, you will not work actively on an assigned duty for
    a long period of time. For example, I only perform capacity planning activities
    a few times each year, but checking the backup job status is a daily function.
    There are ebbs and flows, and `seasonal` variation, all of which keeps things
    interesting.


    DBA duties will vary from company to company as well. Different organizations
    have tailored the position for their own needs and purposes. For example, I worked
    at one company that used only third-party software applications. In this context
    the DBA was responsible for working with the application vendor to provide database
    services for the software. At another company I was required to work closely with
    the application developers and assist them in writing `SQL` statements. Both jobs
    gave me a DBA title, but the nature of the work was considerably different.


    ## The Data Guardian


    I alluded to it in the previous section, but mastering this topic is vitally important
    to your success as a database administrator. The DBA is the company’s `data guardian`.
    However, when I ask fellow DBAs what they consider their most important duties,
    the typical reply is “backups.” My reply to the most important duty of a DBA question
    is “to protect the data.” Backups are just one component of the overall mission
    of protecting the data.


    Data is a valuable asset. Companies like `Google` and `Facebook` give you their
    products for free. Have you ever wondered why? The simple answer is that they
    make money off data you generate for them. What you search for and who you follow
    generate data points that build a profile of you, the user. Those data points
    are then used in a variety of ways. `Google` and `Facebook`, for example, can
    generate targeted advertisements for other companies with these profiles. They
    can sell the data to third parties.


    Even if your company is not in the business of buying or selling data, the data
    in their databases is still a valuable corporate asset. A company that sells products
    may want to learn more about its customers. In college, I learned about a famous
    case where a grocery store mined data on their customers’ buying patterns and
    discovered that beer and diapers were sold together in high frequency on the weekends.
    The grocery store surmised that the father was sent to the store to get diapers
    for the baby and bought some beer to take home as well. The grocery chain started
    putting beer and diapers next to each other at the end of an aisle and increased
    sales on both. Learning about their customers is one way companies leverage their
    data assets.


    Even if you do not think your company’s data is valuable, hackers certainly do.
    Hackers will try all sorts of methods to obtain access to your company’s data.
    The company invests a large amount of money for hardware, licenses, and salaries
    to store data and make it available to the business. Yet as Data Guardians, we
    cannot allow unrestricted access to this data. To do so could potentially jeopardize
    business operations. We simply cannot have anyone and everyone making changes
    to the data. For example, a company that sells sporting goods has data showing
    the inventory of the products they sell. If the company has ten baseball bats
    in stock, then the database should reflect that fact. If someone nefariously or
    accidently changes the data to reflect there are zero bats in the inventory, then
    customers won’t be able to order the product and the company will lose potential
    sales. Conversely, if someone changes the data to indicate there are 100 baseball
    bats in the inventory, then the sales system may try to sell 90 bats that do not
    exist, leading to upset customers when these orders are not able to be fulfilled.
    Having upset customers leads to lost sales in the future, and this must be avoided.
    This sporting goods company needs an accurate inventory of their products reflected
    in their databases.


    Many database systems today also store information that has value in its own right,
    due to its sensitive nature, such as `personally identifiable information (PII)`.
    `PII` is data that can be used to identify a specific individual, such as name
    and birth date, tax identification numbers, credit card numbers, and more. Any
    `PII` in the database needs to be encrypted so that should a hacker obtain access
    to the database, they cannot get any value from this data.


    Failure to protect data is bad for business on many levels, as we know from the
    many headlines of yet another data breach in recent times. For example, in 2013,
    `Target Corporation` suffered a well-known data breach, and this reportedly cost
    the company over $300 million! `Yahoo` suffered a data breach to over 3 billion
    accounts in 2013-2014. When `Yahoo` was purchased by `Verizon`, the sale price
    was estimated to be $350 million less than it would have been had the breach not
    occurred. It is estimated that 60% of small companies that suffer a data breach
    go out of business.


    I’ve always taken the approach that as a DBA, I am my company’s data guardian.
    The DBA needs to be the one that is always thinking about protecting the data.
    This means ensuring that only those that have a legitimate business need are able
    to access the data, and only those with appropriate authority to modify data can
    do so. We restrict access to the data as much as possible. The DBA is constantly
    being asked to provide access to data to new avenues within the business. As companies
    learn to leverage their data as an asset, they are exploring new ways to use that
    data to drive revenues. Not only will data be used in new and exciting ways, the
    DBA may need to give business units just what they need, and no more, to protect
    the data. The DBA may also need to cleanse data before another business unit gains
    access.


    Data protection is much more than just backups. The DBA needs to make sure database
    engines have the most up-to-date security patches applied. The DBA grants and
    revokes privileges in the database. The DBA needs to be familiar with `SQL` injection
    and other database hacking techniques. The DBA needs to learn how to encrypt data
    in the database as well as how to protect the encryption keys. Hopefully, this
    section has convinced you that the most important job of the DBA is not backups.
    Rather, the DBA must be adept at all aspects of data protection. The DBA needs
    to be the data guardian.'
