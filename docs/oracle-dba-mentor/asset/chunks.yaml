  trans: '

    # 20. Oracle 架构


    在本章中，我们将讨论 Oracle 数据库架构。我们将探讨构成 Oracle 数据库的内存结构、进程和文件。了解 Oracle 如何工作非常重要，否则它只是一个放在架子上的黑匣子。


    考虑一辆汽车及其发动机。对许多人来说，汽车是一个黑匣子。他们启动它，然后驾驶。直到有一天，发动机无法启动。如果你完全不懂如何修理汽车引擎，你会怎么做？你会把它交给这个领域的专家——汽车修理工。他们知道如何修复这个每天载你上下班的黑匣子。本书的某些读者可能对汽车发动机了解甚多，无论什么部件损坏，他们都能轻松修复。另一些读者则介于两者之间，可能对内燃机略知一二，足以解决小问题，但不足以处理大故障。


    作为一名 Oracle 数据库管理员，您的组织依赖您来修复这个他们用来存储宝贵数据的黑匣子。就像机械师需要深入了解发动机部件如何协同工作以使汽车行驶一样，DBA
    也需要理解 Oracle 的各个组件如何相互配合工作。您的组织雇佣您，就是让您成为数据库的机械师。


    如果您正在阅读本书，那么您可能不属于那种完全了解 Oracle 工作原理的专家，但您也不是将 Oracle 视为黑匣子的人。您很可能处于中间水平。如果是这样，那么本章就是为您准备的。毕竟，您很可能阅读本书是因为您希望从初级
    DBA 或更高级别起步，一直成长为该领域的专家。


    在第 13 章中，我建议您阅读 `Oracle 数据库概念指南`。Oracle 文档中的这本书提供了关于 Oracle 数据库引擎工作原理的丰富信息。请务必阅读该指南。在本章中，我将从我的视角讨论相同的话题。我还将涉及我认为对理解
    Oracle 架构至关重要的领域。本章无法替代阅读 `数据库概念指南`。当您查阅 Oracle 文档时，也请一并阅读 `数据库管理员指南`，正如我在第 13
    章中所推荐的那样。


    随着您在职业生涯中不断使用 Oracle 数据库，您将对这一架构有越来越深入的了解。当我刚开始成为一名 Oracle DBA 时，试图理解 Oracle 如何工作是需要解决的最大难题，也是最大的乐趣所在。尽管我使用
    Oracle 已经超过 20 年，但我仍在学习有关 Oracle 架构的新细节。我不仅越来越深入 Oracle 内部，而且 Oracle 在每个新版本中都会对架构做些许更改。


    ## 数据库 vs. 实例


    在 Oracle 架构中，Oracle 数据库和 Oracle 实例之间有很大区别。它们不是一回事。作为数据库管理员，您需要理解这两者、它们的含义以及它们如何交互。


    一个 Oracle `数据库` 是磁盘上文件的集合。这些文件包括表空间的数据文件、控制文件和重做日志文件。数据库是在 Oracle 未运行时仍然存在的东西。Oracle
    软件已经关闭，但文件还在。数据库仍在磁盘上，但无人可以访问。要查看数据库，我们可以发出如代码清单 20-1 所示的查询。


    ```sql

    SQL> select file_name as database_files

    2  from dba_data_files

    3  union

    4  select value from v$parameter2

    5  where name=''control_files''

    6  union

    7  select member from v$logfile

    8  union

    9  select file_name from dba_temp_files;

    DATABASE_FILES


    /u01/app/oracle/oradata/hr_test/DB10.DB

    /u01/app/oracle/oradata/hr_test/DB11.DB

    /u01/app/oracle/oradata/hr_test/control01.ctl

    /u01/app/oracle/oradata/hr_test/control02.ctl

    /u01/app/oracle/oradata/hr_test/redo01.log

    /u01/app/oracle/oradata/hr_test/redo02.log

    /u01/app/oracle/oradata/hr_test/redo03.log

    /u01/app/oracle/oradata/hr_test/sysaux01.dbf

    /u01/app/oracle/oradata/hr_test/system01.dbf

    /u01/app/oracle/oradata/hr_test/temp01.dbf

    /u01/app/oracle/oradata/hr_test/undotbs01.dbf

    /u01/app/oracle/oradata/hr_test/users01.dbf

    代码清单 20-1

    数据库文件

    ```


    上面的 SQL 语句查询数据文件、控制文件、联机重做日志和临时文件。这组文件就是 Oracle `数据库`。您可能还记得，我们在第 7 章讨论备份和恢复时执行了类似的查询。


    您会听到人们说类似“我无法连接到数据库”这样的话。从技术上讲，您永远无法连接到一个 Oracle 数据库。软件应用程序通常运行在另一台机器上，甚至可能是一台
    Web 服务器，通过浏览器访问。应用程序无法直接访问这些文件，因此它无法连接到数据库。这就是 DBA 需要了解其受众的地方。对于最终用户来说，Oracle
    只是一个黑匣子，他们会使用“数据库”这个术语。当 DBA 与最终用户交谈时，即使 DBA 知道这个术语在事实上并不准确，也应该使用相同的术语来促进交流。


    用户和应用程序连接到的是 Oracle `实例`，而不是数据库。实例是启动 Oracle 软件后产生的一组进程和分配的内存。用户会话在数据库服务器上生成进程，这些进程与分配的内存以及数据库文件进行交互，正如我们将在本章中看到的那样。


    当 DBA 启动 Oracle 时，他们是在启动实例。当 DBA 关闭实例时，数据库仍然存在于磁盘上。`实例` 是进程和内存的集合。`数据库` 是磁盘上的文件。当与其他
    Oracle 专业人士交谈时，您需要使用正确的术语。在与其他人交谈时，可以随意使用“数据库”这个术语。

    '
- fmt: '## File Types


    For the Oracle database, there are eight different file types, each of which is
    detailed here:


    ### Data files

    Each tablespace is composed of one or more data files on disk. A data file can
    belong to only one tablespace, but a tablespace can have multiple data files.


    ### Temp files

    Any temporary tablespaces are composed of one or more special files called temp
    files. Oracle makes the distinction between data files that contain data to survive
    an instance shutdown, and temp files that are cleared out when an instance is
    started up. With this difference known between the two file types, Oracle RMAN
    can back them up differently. RMAN does not have to waste time backing up the
    contents of a temp file because the data won’t be there when the instance starts
    up again. Temp files are used when a SQL statement performs a sort or join operation
    that is too big for its memory space. The work is broken into pieces and temporarily
    stored in the TEMP tablespace.


    ### Online redo logs

    When a transaction occurs, Oracle needs to be able to replay, or redo, that transaction
    to aid in any recovery efforts. The redo information is written to the online
    redo logs (ORLs). The ORLs are created in groups. You should have a minimum of
    three and usually no more than five ORL groups. When redo information is written,
    it all goes to one ORL group. When that group is filled, Oracle will perform a
    `log switch` where redo is written to the next ORL group. Once the last ORL group
    is filled, the next log switch will go back to the first ORL group, overwriting
    what was there. Ideally, the ORL groups should be large enough so that there are
    only three or four log switches during a peak hour of transactional activity in
    the instance. The ORLs are vital to database operations. As such, the ORL groups
    should be `multiplexed`, which means Oracle maintains a mirror copy of the file.
    The two copies should not be on the same disk.


    ### Archived redo logs

    As stated above, the ORL groups will eventually be overwritten. If the DBA needs
    to save the redo records for longer periods of time, the database must be configured
    in archivelog mode. When a log switch occurs, Oracle will copy the previous ORL
    to an archivelog destination. In Chapter [7](#467924_1_En_7_Chapter.xhtml), we
    turned on archivelog mode for our testbed database.


    ### Undo tablespace files

    The undo tablespace has its own data files. Technically, Oracle considers the
    files for the Undo tablespace to be just like regular data files. However, the
    data in the undo tablespace will not survive instance shutdown, which makes the
    undo tablespace’s data files more similar to temp files. I classify these files
    differently than regular files if for no other reason than to know they are different
    than regular data files.


    ### Control files

    The control file is the master pointer for the database. When an Oracle instance
    starts, the instance has no clue where the database’s files are located. But the
    instance does know the location of the control files from the required `CONTROL_FILES`
    initialization parameter. The instance reads the data file locations from the
    control files. The control files also contain any other information Oracle may
    need before the instance is started. The control files also contain information
    about RMAN backups and the database’s name and unique identifier. You should create
    production databases with three control files, all on different disk units.


    ### Parameter file

    When an Oracle instance starts, it first needs to find the control files. The
    instance also needs to know how much memory to allocate and several other settings
    that are controlled by the various parameters influencing Oracle. These parameters
    are stored in the parameter file. Technically, the parameter file is not part
    of the “database” but it is an important file to be aware of.


    ### Password file

    This optional file is used whenever someone attempts to connect to the instance
    from a different machine than the database server and they are attempting a `SYSDBA`
    or `SYSOPER` connection. Again, this file is not part of the database, but you
    will want to understand its role.


    ## Memory Structures


    When an Oracle instance is started, it allocates memory on the database server.
    The memory used by Oracle falls under two distinct categories, the Program Global
    Area (`PGA`) and the System Global Area (`SGA`). Both are sized differently. The
    `PGA` usage is dynamic, responding to changes in user demands. The `SGA` is usually
    of a fixed size, although the DBA can change the `SGA`’s size on the fly if the
    database is configured correctly.'
