- fmt: '## Pre-Upgrade Fixup Script Execution


    ```

    SQL> @preupgrade_fixups.sql

    Executing Oracle PRE-Upgrade Fixup Script

    Auto-Generated by:       Oracle Preupgrade Script

    Version: 18.0.0.0.0 Build: 1

    Generated on:            2018-09-14 14:21:30

    For Source Database:     ORCL

    Source Database Version: 12.2.0.1.0

    For Upgrade to Version:  18.0.0.0.0

    Preup                             Preupgrade

    Action                            Issue Is

    Number  Preupgrade Check Name     Remedied    Further DBA Action

    ------  ------------------------  ----------  ----------------------------

    1.  dictionary_stats          YES         None.

    2.  tablespaces_info          NO          Informational only.

    Further action is optional.

    3.  min_archive_dest_size     NO          Informational only.

    Further action is optional.

    The fixup scripts have been run and resolved what they can. However,

    there are still issues originally identified by the preupgrade that

    have not been remedied and are still present in the database.

    Depending on the severity of the specific issue, and the nature of

    the issue itself, that could mean that your database is not ready

    for upgrade.  To resolve the outstanding issues, start by reviewing

    the preupgrade_fixups.sql and searching it for the name of

    the failed CHECK NAME or Preupgrade Action Number listed above.

    There you will find the original corresponding diagnostic message

    from the preupgrade which explains in more detail what still needs

    to be done.

    PL/SQL procedure successfully completed.

    ```


    ### Back in the log file, the post-upgrade section is all that remains.


    ## After Upgrade Information


    ```

    =============

    AFTER UPGRADE

    =============

    REQUIRED ACTIONS

    ================

    None

    RECOMMENDED ACTIONS

    ===================

    4.  Upgrade the database time zone file using the `DBMS_DST` package.

    The database is using time zone file version 26 and the target `18.0.0.0.0`

    release ships with time zone file version 31.

    Oracle recommends upgrading to the desired (latest) version of the time

    zone file. For more information, refer to "Upgrading the Time Zone File

    and Timestamp with Time Zone Data" in the `18.0.0.0.0` Oracle Database

    Globalization Support Guide.

    5.  (AUTOFIXUP) Gather dictionary statistics after the upgrade using the

    command:

    `EXECUTE DBMS_STATS.GATHER_DICTIONARY_STATS;`

    Oracle recommends gathering dictionary statistics after upgrade.

    Dictionary statistics provide essential information to the Oracle

    optimizer to help it find efficient SQL execution plans. After a database

    upgrade, statistics need to be re-gathered as there can now be tables

    that have significantly changed during the upgrade or new tables that do

    not have statistics gathered yet.

    6.  Gather statistics on fixed objects after the upgrade and when there is a

    representative workload on the system using the command:

    `EXECUTE DBMS_STATS.GATHER_FIXED_OBJECTS_STATS;`

    This recommendation is given for all preupgrade runs.

    Fixed object statistics provide essential information to the Oracle

    optimizer to help it find efficient SQL execution plans.  Those

    statistics are specific to the Oracle Database release that generates

    them, and can be stale upon database upgrade.

    For information on managing optimizer statistics, refer to the `12.2.0.1`

    Oracle Database SQL Tuning Guide.

    ORACLE GENERATED FIXUP SCRIPT

    =============================

    All of the issues in database ORCL

    which are identified above as AFTER UPGRADE "(AUTOFIXUP)" can be resolved by

    executing the following

    SQL>`@/u01/app/oracle/cfgtoollogs/orcl/preupgrade/postupgrade_fixups.sql`

    ```


    The output in the log file tells us there are no required actions. It is recommended
    to upgrade the timezone information and gather dictionary and fixed object statistics.
    The `Pre-Upgrade Information Tool` has generated a post-upgrade fixup script that
    we can execute to perform these recommended actions.


    We are now ready to begin our database upgrade. The new Oracle software has been
    installed and the `Pre-Upgrade utility` was executed. Any actions recommended
    by the utility were performed in advance of the upgrade.'
