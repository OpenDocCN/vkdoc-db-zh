    answer your question, My Oracle Support is often the next destination.


    # Part IV Maintaining the Oracle Database


    # 15. My Oracle Support


    After you finish reading this book, you will likely have additional questions
    and want to learn more. In the prior two chapters, we started a journey into the
    depths of the Oracle documentation. As you’ve discovered, the Oracle documentation
    is a great resource for learning more about Oracle. The documentation set is very
    large, and the biggest obstacle is figuring out which book contains the information
    you seek, which is why we spent two chapters exploring how to navigate the documentation.


    In the previous chapter, we discussed the Oracle data dictionary. All good database
    engines are self-documenting in the form of the data dictionary or database catalog.
    The biggest obstacle to using the data dictionary is figuring out which view contains
    the information you seek.


    If you have a problem and the Oracle documentation and data dictionary do not
    contain the answers you seek, the next place to look is in normally with My Oracle
    Support.


    ## Logging Into My Oracle Support


    My Oracle Support, often abbreviated `MOS`, is Oracle Corporation’s support portal.
    `MOS` users can search the knowledge base, obtain patches, and file a request
    for assistance. `MOS` handles all of Oracle’s products. `MOS` provides much more
    functionality as well, as we will see in this chapter.


    To access My Oracle Support, point a web browser to [`http://support.oracle.com`](http://support.oracle.com)
    and sign in with your Oracle Single Sign-On (`SSO`) account, as shown in Figure
    15-1. Recall that you used your Oracle `SSO` account to download software from
    the Oracle Technology Network in Chapters 3 and 5. If you do not have an Oracle
    `SSO` account, you can create one for free. Figure 15-1 shows the button to sign
    into `MOS`. If you do not have an Oracle `SSO` account, click the **New User**
    link. When creating an account, I typically use my corporate e-mail address for
    the user ID. All Oracle `SSO` accounts use an e-mail address for the user ID.
    If you ever fill out a service request for a support issue, Oracle Support will
    send you notifications to that e-mail address.


    ![Figure 15-1](images/467924_1_En_15_Chapter/467924_1_En_15_Fig1_HTML.jpg)

    *Figure 15-1 My Oracle Support Sign In screen*


    After you have signed in, you will be directed to the **MOS Dashboard** tab. To
    the right of the dashboard tab is a number of other tabs to navigate to the different
    areas of `MOS`, as you can see in Figure 15-2.


    ![Figure 15-2](images/467924_1_En_15_Chapter/467924_1_En_15_Fig2_HTML.jpg)

    *Figure 15-2 MOS navigation tabs*'
