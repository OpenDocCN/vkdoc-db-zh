    \n## Oracle 监听器\n\n监听器的工作很简单。监听传入的连接请求（因此得名），建立连接，然后退到一边。太多人错误地认为监听器参与了应用程序和数据库之间的每次网络通信，但事实并非如此。一旦连接建立，对于该会话来说就不再需要监听器了。\n\
