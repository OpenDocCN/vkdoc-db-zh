    Oracle 中创建虚拟数据库，那不是很好吗？这正是多租户所提供的。


    在多租户出现之前，Oracle DBA 可以通过在同一数据库服务器上运行多个实例来整合服务器。每个实例都有自己的数据库，所以请不要将其与 Oracle RAC
    混淆。例如，我们可能有一个 Oracle 数据库支持公司的人力资源应用程序，另一个数据库支持公司的会计系统。为了降低成本，我们可以将两者托管在同一台物理机器上。我们有两个数据库，每个都有自己的实例。正如我们在上一章所知，当我们启动实例时，每个实例都需要自己的
    `SGA` 和自己的后台进程。每个实例都会带来一定数量的开销。


    Oracle 数据库管理员后来尝试将它们合并到同一个数据库中，将人力资源表放在自己的模式中，将会计表放在另一个模式中。只要两个系统没有相同的公共同义词或对
    `PUBLIC` 的相同授权，这种方法就可行。


    为了促进数据库整合，Oracle 提供了多租户选项。使用多租户，我们有一个大部分为空的容器数据库。然后我们插入一个人力资源数据库，再插入另一个会计数据库。所有的资源和开销都发生在容器数据库中。我们可以插入许多数据库，称为可插拔数据库，而不会增加开销。每个
    `PDB` 都与其他 `PDB` 隔离。`PDB` 甚至不知道其他 `PDB` 的存在。


    多租户对于 Oracle 数据库管理员来说也是一个巨大的时间节省器。DBA 不是分别修补每个数据库，而是修补容器数据库。所有的 `PDB` 都通过这一单次操作完成修补。如果
    DBA 使用 `RMAN` 进行备份，备份容器也会备份所有 `PDB`。如果 DBA 添加另一个 `PDB`，则无需为确保其得到备份而进行任何额外工作。


    Oracle 多租户对应用程序是透明的。应用程序连接到实例，并且只能看到那个 `PDB`，这与非多租户数据库没有什么不同。应用程序无需做任何改变即可与多租户一起工作。


    虽然不是必须的，但 Oracle 多租户通常部署在 Oracle RAC 之上。在整合数据库服务器时，我们可能不希望将它们全部放在一台服务器上。如果那台服务器发生故障，所有的
    `PDB` 都会宕机，给多个应用程序带来问题。此外，可能还会担心所有这些应用程序的工作负载对一台服务器来说太大了。Oracle RAC 凭借其高可用性和高可扩展性，解决了这些担忧。许多客户正在将数十个或超过一百个
    Oracle 数据库从单独的服务器迁移到带有多租户的 Oracle RAC 集群上，从而使用更少的机器。Oracle RAC 和多租户是两个不同的产品，它们之间实际上没有必然联系。你可以使用其中一个，也可以两者都使用。我们越来越多地看到
    Oracle RAC 与多租户一起部署。


    Oracle 公司已声明多租户是未来的方向。Oracle 12*c* 已弃用非多租户的 Oracle 数据库。虽然你仍然可以创建一个非多租户的数据库，就像我们在测试环境中所做的那样，但在未来某个时候，这将不再是一个选项。只要你将自己限制在一个
    `PDB` 内，你今天就可以开始使用多租户并在未来继续使用，而无需产生任何额外成本。如果你想要第二个或更多的 `PDB`，那就是你必须开始为多租户选项获取许可的时候。'
- fmt: '# Data Guard


    ## 概述


    Adding to the high-availability capabilities of the Oracle database is a product
    called `Data Guard`. Oracle `RAC` does a great job of providing high availability
    for databases at your production data center. What happens if that data center
    is unavailable for some reason? Your business requirements may need a duplicate
    copy of your database running at another data center. `Data Guard` accomplishes
    this by shipping transactions from the primary site to the standby site. As a
    transaction modifies data in the primary database, that transaction will keep
    the standby database up to date. Should a failure occur at the primary data center,
    the `DBA` can open the standby database and allow applications to perform their
    business.


    ## 与传统方法的对比


    Without `Data Guard`, the only other option is to take a backup of your database
    and restore on hardware at the standby site. If the database is large enough,
    the amount of time to perform a restore could be more than is acceptable to the
    business. Additionally, if the backup is not very current, a large amount of data
    loss will occur. With `Data Guard`, there is no need to restore anything because
    the database is always there and available.


    ## 数据丢失配置


    `Data Guard` can be configured for zero data loss or, for those concerned about
    the potential performance hit, minimal data loss. A zero data loss configuration
    means that when a transaction commits, it must commit in both the primary and
    standby databases. The lag time between the sites may cause performance issues
    in a zero data loss configuration. The `DBA` may want to configure `Data Guard`
    to have minimal data loss so that application performance will not suffer. While
    we never like to lose data, this is the most typical configuration for database
    administrators deploying `Data Guard`. In most configurations, the minimal data
    loss solution amounts to one second of data loss or less. I work with one large
    primary database that sees over `1TB` of transactional volume per week, and the
    standby is at most one second behind the primary. Ideally, we would like a zero
    data loss solution, but the performance hit is too costly to the business. Losing
    one second of transactions is much more acceptable.


    ## 架构


    The diagram in `Figure 21-26` shows how the Oracle architecture changes to support
    `Data Guard`.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig26_HTML.jpg](images/467924_1_En_21_Chapter/467924_1_En_21_Fig26_HTML.jpg)


    The first part of the diagram was taken from the previous chapter. When `Data
    Guard` is in place, a new process named `LNS` will transport the redo from the
    primary database to the standby site. This is little different than `LGWR` writing
    redo to the online redo logs. The only thing that changes is that `LNS` is writing
    the redo to the `RFS` process running on the standby instance. When `RFS` receives
    the redo, it writes the redo to standby redo logs. The Managed Recovery Process
    (`MRP0`) reads the redo from the standby redo logs and updates the standby database
    with the transactions.


    In Oracle terminology, there are two activities taking place in this diagram.
    First, there is redo `transport`, the act of sending redo to the standby database.
    Second, there is redo `apply`, the act of replaying those transactions. `LNS`
    is responsible for redo transport. `MRP0` is responsible for redo apply.


    ## 操作模式：切换与故障转移


    With the two systems in place, the standby database just sits there, continually
    updating, until it gets the call to action. If the `DBA` performs a `switchover`
    operation, the two databases will reverse roles. The primary becomes the standby
    and vice versa. There is a short amount of downtime for the switchover. During
    this downtime, all committed transactions will be assured of being sent to the
    standby and applied there. A switchover is a zero data loss operation. Because
    the roles are being reversed, it should be obvious that the primary database needs
    to be available. If the primary database is not available, then the only option
    is a `failover` operation. When the `DBA` institutes a failover, the standby becomes
    the primary and the old primary is essentially a dead database, no longer part
    of this configuration. The amount of data loss from a failover depends on the
    `Data Guard` configuration.


    ## 许可要求


    `Data Guard` does not require an extra license. However, the standby database
    does need to be licensed. If you want to create a standby database, work with
    your Oracle Sales rep or reseller and let them know you are interested in a license
    specifically for a standby database. They will probably offer you a discount for
    this Oracle license so long as the database is only ever used as a standby database.


    Oracle does have an extra-cost option called `Active Data Guard`. In addition
    to licensing the standby Oracle database, you can buy the extra `Active Data Guard`
    to provide even more capabilities. Normally the standby database just sits there
    applying redo. While this is great should a disaster strike, it’s mostly unusable
    for anything of value until that time. With `Active Data Guard`, you can open
    the standby in read-only mode and use it for a reporting database, offloading
    resource-intensive reports to this system. While in read-only mode, `Active Data
    Guard` will also be replaying transactions, keeping the standby up to date with
    the primary.


    ## Active Data Guard


    `Active Data Guard` can detect and automatically repair block corruption in both
    the primary and the standby. Because the databases are transactionally consistent,
    a data block will contain the same data in both locations. If block corruption
    is detected in the primary, `Active Data Guard` will fetch that block’s contents
    from the standby and replace the block in the primary. This also works the same
    if block corruption is detected in the standby.


    Prior to Oracle `12c`, the `DBA` had to choose between zero data loss or better
    performance. With `Active Data Guard` in `12c`, the `DBA` can have the best of
    both worlds. Oracle `12c` introduced the new `Far Sync` capability, which gives
    you zero data loss while maintaining the same level of performance.


    `Active Data Guard` also supports rolling upgrades. This will reduce the downtime
    window to upgrade an Oracle database. Without `Active Data Guard`, upgrades will
    incur a larger downtime window as the primary database is upgraded and unavailable
    to end users.


    These additional `Active Data Guard` features need to be weighed against the cost
    to determine if the product merits the additional cost. Keep in mind that `Data
    Guard` comes with your Oracle Enterprise Edition database license. `Active Data
    Guard` does not.


    ## 兼容性


    Lastly, `Data Guard` and `Active Data Guard` work with `Multitenant` and Oracle
    `RAC`. You mix and match these to meet your requirements.'
