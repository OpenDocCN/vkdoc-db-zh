- fmt: '# 5. Installing Oracle


    ## Database Files


    The OFA guidelines suggest that we store database files in `$ORACLE_BASE/oradata/db_name`
    as a starting point. If your database is for anything other than a testbed, the
    disk for `ORACLE_BASE` may not be large enough to store all of the files. It is
    very common for the DBA to separate database files to different disk locations,
    for a number of reasons. They may need multiple disk units because one disk unit
    is not large enough. They may want multiple disk units so that highly active database
    files can be segregated to reduce disk contention.


    If more than one disk is being used, they are typically mounted to the Unix or
    Linux server similar to the following example:


    ```

    /u01/app/oracle/oradata/orcl/data01

    /u01/app/oracle/oradata/orcl/data02

    ```


    The database name is `orcl` in the example above. It should be noted that `data01`
    and `data02` are different disk units with different mount points. On Unix/Linux,
    they look to be subdirectories off the same disk, but they are not. Your organization
    may use a different directory structure for the Oracle disk, which is perfectly
    acceptable. Again, just be consistent across the enterprise.


    Working with the storage administrator, the DBA may decide to put online redo
    logs on their own disk to help out with performance. Online redo logs are write-intensive
    files, especially for databases that have a high transaction rate. Moving online
    redo logs to their own disk units is commonly done to spread out the disk I/O
    demands. They may be placed on a mount point similar to


    ```

    /u01/app/oracle/oradata/orcl/redo01

    ```


    Similarly, archived redo log files may be placed on its own mount point like this:


    ```

    /u01/app/oracle/oradata/orcl/arch

    ```


    On Windows systems, we use different drive letters. I often continue with this
    convention, even on Windows servers. I could have my two data disks as


    ```

    D:\oracle\oradata\orcl

    E:\oracle\oradata\orcl

    ```


    And my online and archived redo logs in


    ```

    F:\oracle\oradata\orcl

    G:\oracle\oradata\orcl

    ```


    But it’s hard to know which is which. So I’ll include one more subdirectory just
    to make it more clear:


    ```

    D:\oracle\oradata\orcl\data01

    E:\oracle\oradata\orcl\data02

    F:\oracle\oradata\orcl\redo01

    G:\oracle\oradata\orcl\arch

    ```


    Now I can easily tell what type of files I want on which disk device just by inspecting
    the directory path. The extra subdirectory does nothing to help administration
    of the database and its files other than to self-document the purpose of the drive.
    You can certainly create your own naming convention, but again, keep consistent
    across the enterprise.


    There is one more OFA guideline pertaining to database files, and that addresses
    the name of the file itself. The OFA guideline suggests that we name control files
    `controlXX.ctl`, name online redo logs `redoXX.log`, and name database files `tablespace_nameXX.dbf`,
    where `XX` is a sequential number. So, for example, I might have three control
    files with names `control01.ctl`, `control02.ctl`, and `control03.ctl`. Online
    redo logs would be named `redo01.log`, `redo02.log`, and `redo03.log`. Database
    files for the `SYSTEM` and `SYSAUX` tablespaces are usually named `system01.dbf`
    and `sysaux01.dbf` respectively. An application data tablespace with multiple
    files might have files named `app_data01.dbf` and `app_data02.dbf` as an example.


    While OFA provides guidelines for naming the database’s files, Oracle Managed
    Files (OMF) changes things a bit. With OMF, the DBA simply provides a disk location
    for data files and, optionally, another disk location for online redo log files.
    The DBA denotes these locations with the `DB_CREATE_FILE_DEST` and `DB_CREATE_ONLINE_LOG_DEST_n`
    parameters. After that, the database handles the details for the DBA. The database
    will name control files with a convention like `ora_%u.ctl`, where `%u` is a unique
    code. Data files are named with the convention `ora_%t_%u.dbf`, where `%t` is
    the tablespace name. OMF works great for testbeds. However, I rarely use OMF for
    production databases because the `DB_CREATE_FILE_DEST` parameter can only specify
    one disk location.


    There are many DBAs that will not use the `.log` extension on online redo logs
    and will ignore the OFA guideline. Their reason is that some system administrator
    may come across the file and think it’s a simple log file filled with text and
    remove it to free up some disk space, not knowing that this is a critical file
    to the database and that its deletion can cause the database to crash. Instead,
    these DBAs will use `redoXX.orl`. Just so long as they are consistent across their
    enterprise, they won’t have any issues.


    ## Full Picture


    In the next two chapters, we’ll be installing the Oracle database software on
    our Linux machine and creating our first database. Now that we’re at the end of
    this chapter, we have a better idea of where things will be placed on our server.
    Table 4-2 shows the locations of our files on our testbed that we will use throughout
    the remainder of this book.


    Table 4-2


    | Directory Path | Contents |

    | --- | --- |

    | `/u01/app/oracle` | `ORACLE_BASE` |

    | `/u01/app/oracle/oraInventory` | Oracle Inventory |

    | `/u01/app/oracle/product/12.2.0.1` | `ORACLE_HOME` |

    | `/u01/app/oracle/admin` | Admin files |

    | `/u01/app/oracle/diag/rdbms/orcl/orcl` | Diagnostic files |

    | `/u01/app/oracle/oradata/orcl` | Database files |


    If you have problems remembering where certain files are located, use Table 4-2
    as your reference.


    If I were using a Windows server, all of the `/u01/app/oracle` paths would be
    translated to `C:\oracle`.


    ## Moving On


    This chapter introduced you to Cisco Optimal Flexible Architecture (OFA) and a
    few of its guidelines. Knowing where to find certain files on disk is important
    to the DBA. Following these guidelines makes it easier to find files and reduces
    the chances of human error when someone mistakenly deletes a file because they
    were unaware of what it was. Again, whatever convention you use, even if you deviate
    from the OFA guidelines, keep it consistent across the enterprise.


    The next chapter will focus on downloading the Oracle database software and installing
    it on our server. We will install in the `ORACLE_HOME` directory noted in Table
    4-2. In Chapter 6, we will create our first database. By the end of the next two
    chapters, the entire file structure noted in Table 4-2 will be populated with
    files.


    In Chapter 3, we created our server that we will use throughout this book. In
    Chapter 4, we discussed different areas of our file system. If you recall, when
    Oracle is installed, two directories are created called the Oracle Base and the
    Oracle Home. This chapter will focus on installing Oracle for the first time,
    using the base and home directories. In Chapter 6, we will create our first database.


    This chapter will show how to install the Oracle Database 12c Release 2 (12.2)
    version on our testbed. If you are using a different Oracle version, you can use
    this chapter as a guide. If your version is slightly lower or higher than 12.2,
    then most of this chapter will match. The farther away from 12.2 you get, the
    more differences you may see.'
  raw: '## Database Files


    The OFA guidelines suggest that we store database files in $ORACLE_BASE/oradata/*db_name*
    as a starting point. If your database is for anything other than a testbed, the
    disk for ORACLE_BASE may not be large enough to store all of the files. It is
    very common for the DBA to separate database files to different disk locations,
    for a number of reasons. They may need multiple disk units because one disk unit
    is not large enough. They may want multiple disk units so that highly active database
    files can be segregated to reduce disk contention.


    If more than one disk is being used, they are typically mounted to the Unix or
    Linux server similar to the following example:


    *   /u01/app/oracle/oradata/orcl/data01


    *   /u01/app/oracle/oradata/orcl/data02


    The database name is orcl in the example above. It should be noted that data01
    and data02 are different disk units with different mount points. On Unix/Linux,
    they look to be subdirectories off the same disk, but they are not. Your organization
    may use a different directory structure for the Oracle disk, which is perfectly
    acceptable. Again, just be consistent across the enterprise.


    Working with the storage administrator, the DBA may decide to put online redo
    logs on their own disk to help out with performance. Online redo logs are write-intensive
    files, especially for databases that have a high transaction rate. Moving online
    redo logs to their own disk units is commonly done to spread out the disk I/O
    demands. They may be placed on a mount point similar to


    *   /u01/app/oracle/oradata/orcl/redo01


    Similarly, archived redo log files may be placed on its own mount point like this:


    *   /u01/app/oracle/oradata/orcl/arch


    On Windows systems, we use different drive letters. I often continue with this
    convention, even on Windows servers. I could have my two data disks as


    *   D:\oracle\oradata\orcl


    *   E:\oracle\oradata\orcl


    And my online and archived redo logs in


    *   F:\oracle\oradata\orcl


    *   G:\oracle\oradata\orcl


    But it’s hard to know which is which. So I’ll include one more subdirectory just
    to make it more clear:


    *   D:\oracle\oradata\orcl\data01


    *   E:\oracle\oradata\orcl\data02


    *   F:\oracle\oradata\orcl\redo01


    *   G:\oracle\oradata\orcl\arch


    Now I can easily tell what type of files I want on which disk device just by inspecting
    the directory path. The extra subdirectory does nothing to help administration
    of the database and its files other than to self-document the purpose of the drive.
    You can certainly create your own naming convention, but again, keep consistent
    across the enterprise.


    There is one more OFA guideline pertaining to database files, and that addresses
    the name of the file itself. The OFA guideline suggests that we name control files
    control*XX*.ctl, name online redo logs redo*XX*.log, and name database files tablespace_name*XX*.dbf,
    where *XX* is a sequential number. So, for example, I might have three control
    files with names control01.ctl, control02.ctl, and control03.ctl. Online redo
    logs would be named redo01.log, redo02.log, and redo03.log. Database files for
    the SYSTEM and SYSAUX tablespaces are usually named system01.dbf and sysaux01.dbf
    respectively. An application data tablespace with multiple files might have files
    named app_data01.dbf and app_data02.dbf as an example.


    While OFA provides guidelines for naming the database’s files, Oracle Managed
    Files (OMF) changes things a bit. With OMF, the DBA simply provides a disk location
    for data files and, optionally, another disk location for online redo log files.
    The DBA denotes these locations with the DB_CREATE_FILE_DEST and DB_CREATE_ONLINE_LOG_DEST_n
    parameters. After that, the database handles the details for the DBA. The database
    will name control files with a convention like ora_%u.ctl, where %u is a unique
    code. Data files are named with the convention ora_%t_%u.dbf, where %t is the
    tablespace name. OMF works great for testbeds. However, I rarely use OMF for production
    databases because the DB_CREATE_FILE_DEST parameter can only specify one disk
    location.


    There are many DBAs that will not use the .log extension on online redo logs and
    will ignore the OFA guideline. Their reason is that some system administrator
    may come across the file and think it’s a simple log file filled with text and
    remove it to free up some disk space, not knowing that this is a critical file
    to the database and that its deletion can cause the database to crash. Instead,
    these DBAs will use redo*XX*.orl. Just so long as they are consistent across their
    enterprise, they won’t have any issues.


    ## Full Picture


    In the next two chapters, we’ll be installing the Oracle database software on
    our Linux machine and creating our first database. Now that we’re at the end of
    this chapter, we have a better idea of where things will be placed on our server.
    Table [4-2](#467924_1_En_4_Chapter.xhtml#Tab2) shows the locations of our files
    on our testbed that we will use throughout the remainder of this book.


    Table 4-2


    Directory Structure


    | Directory Path | Contents |

    | --- | --- |

    | /u01/app/oracle | ORACLE_BASE |

    | /u01/app/oracle/oraInventory | Oracle Inventory |

    | /u01/app/oracle/product/12.2.0.1 | ORACLE_HOME |

    | /u01/app/oracle/admin | Admin files |

    | /u01/app/oracle/diag/rdbms/orcl/orcl | Diagnostic files |

    | /u01/app/oracle/oradata/orcl | Database files |


    If you have problems remembering where certain files are located, use Table [4-2](#467924_1_En_4_Chapter.xhtml#Tab2)
    as your reference.


    If I were using a Windows server, all of the /u01/app/oracle paths would be translated
    to C:\oracle.


    ## Moving On


    This chapter introduced you to Cisco Optimal Flexible Architecture (OFA) and a
    few of its guidelines. Knowing where to find certain files on disk is important
    to the DBA. Following these guidelines makes it easier to find files and reduces
    the chances of human error when someone mistakenly deletes a file because they
    were unaware of what it was. Again, whatever convention you use, even if you deviate
    from the OFA guidelines, keep it consistent across the enterprise.


    The next chapter will focus on downloading the Oracle database software and installing
    it on our server. We will install in the ORACLE_HOME directory noted in Table
    [4-2](#467924_1_En_4_Chapter.xhtml#Tab2). In Chapter [6](#467924_1_En_6_Chapter.xhtml),
    we will create our first database. By the end of the next two chapters, the entire
    file structure noted in Table [4-2](#467924_1_En_4_Chapter.xhtml#Tab2) will be
    populated with files.


    # 5. Installing Oracle


    In Chapter [3](#467924_1_En_3_Chapter.xhtml), we created our server that we will
    use throughout this book. In Chapter [4](#467924_1_En_4_Chapter.xhtml), we discussed
    different areas of our file system. If you recall, when Oracle is installed, two
    directories are created called the Oracle Base and the Oracle Home. This chapter
    will focus on installing Oracle for the first time, using the base and home directories.
    In Chapter [6](#467924_1_En_6_Chapter.xhtml), we will create our first database.


    This chapter will show how to install the Oracle Database 12c Release 2 (12.2)
    version on our testbed. If you are using a different Oracle version, you can use
    this chapter as a guide. If your version is slightly lower or higher than 12.2,
    then most of this chapter will match. The farther away from 12.2 you get, the
    more differences you may see.'
  trans: '

    # 5. 安装 Oracle


    ## 数据库文件


    OFA（最佳灵活架构）指南建议我们从`$ORACLE_BASE/oradata/db_name`开始存储数据库文件。如果您的数据库不只是用于测试环境，那么`ORACLE_BASE`所在的磁盘可能没有足够空间来存储所有文件。出于多种原因，DBA
    将数据库文件分离到不同磁盘位置是非常常见的做法。他们可能需要多个磁盘单元，因为单个磁盘单元不够大。他们可能希望使用多个磁盘单元，以便将高度活跃的数据库文件隔离到不同的磁盘上，以减少磁盘争用。


    如果使用多个磁盘，它们通常会被挂载到 Unix 或 Linux 服务器上，类似以下示例：


    ```

    /u01/app/oracle/oradata/orcl/data01

    /u01/app/oracle/oradata/orcl/data02

    ```


    在上面的示例中，数据库名称是 `orcl`。需要注意，`data01` 和 `data02` 是具有不同挂载点的不同磁盘单元。在 Unix/Linux 上，它们看起来像是同一个磁盘下的子目录，但实际上并非如此。您的组织可能会为
    Oracle 磁盘使用不同的目录结构，这完全可以接受。同样，请在整个企业内保持一致。


    DBA 与存储管理员协作，可能会决定将联机重做日志放在它们自己的磁盘上以帮助提升性能。联机重做日志是写密集型文件，尤其对于事务率高的数据库而言。将联机重做日志移到它们自己的磁盘单元是分散磁盘
    I/O 需求的常见做法。它们可能被放置在类似如下的挂载点上：


    ```

    /u01/app/oracle/oradata/orcl/redo01

    ```


    类似地，归档重做日志文件可以放在它自己的挂载点上，像这样：


    ```

    /u01/app/oracle/oradata/orcl/arch

    ```


    在 Windows 系统上，我们使用不同的驱动器盘符。即使在 Windows 服务器上，我也经常沿用这一惯例。我可以将两个数据磁盘设为：


    ```

    D:\oracle\oradata\orcl

    E:\oracle\oradata\orcl

    ```


    而将我的联机和归档重做日志放在：


    ```

    F:\oracle\oradata\orcl

    G:\oracle\oradata\orcl

    ```


    但这很难区分哪个是哪个。所以我会再包含一个子目录，使其更加清晰：


    ```

    D:\oracle\oradata\orcl\data01

    E:\oracle\oradata\orcl\data02

    F:\oracle\oradata\orcl\redo01

    G:\oracle\oradata\orcl\arch

    ```


    现在，通过检查目录路径，我可以轻松识别我想在哪个磁盘设备上存放什么类型的文件。这个额外的子目录除了自记录驱动器的用途外，对数据库及其文件的管理并无实际帮助。您当然可以创建自己的命名约定，但再次强调，请在整个企业内保持一致。


    关于数据库文件，还有一条 OFA 指南涉及文件本身的命名。OFA 指南建议我们将控制文件命名为 `controlXX.ctl`，联机重做日志命名为 `redoXX.log`，数据库文件命名为
    `tablespace_nameXX.dbf`，其中 `XX` 是一个序列号。例如，我可能有三个控制文件，名称分别为 `control01.ctl`、`control02.ctl`
    和 `control03.ctl`。联机重做日志将被命名为 `redo01.log`、`redo02.log` 和 `redo03.log`。`SYSTEM`
    和 `SYSAUX` 表空间的数据库文件通常分别命名为 `system01.dbf` 和 `sysaux01.dbf`。一个包含多个文件的应用数据表空间，其文件可能命名为
    `app_data01.dbf` 和 `app_data02.dbf`。


    虽然 OFA 为数据库文件命名提供了指南，但 Oracle 托管文件（OMF）改变了一点做法。使用 OMF 时，DBA 只需为数据文件提供一个磁盘位置，并可选择为联机重做日志文件提供另一个磁盘位置。DBA
    使用 `DB_CREATE_FILE_DEST` 和 `DB_CREATE_ONLINE_LOG_DEST_n` 参数来指定这些位置。之后，数据库会为 DBA
    处理细节问题。数据库将按照类似 `ora_%u.ctl` 的约定命名控制文件，其中 `%u` 是一个唯一代码。数据文件则按照 `ora_%t_%u.dbf`
    的约定命名，其中 `%t` 是表空间名称。OMF 在测试环境中运行良好。然而，我很少对生产数据库使用 OMF，因为 `DB_CREATE_FILE_DEST`
    参数只能指定一个磁盘位置。


    许多 DBA 不会在联机重做日志上使用 `.log` 扩展名，并且会忽略 OFA 指南。他们的理由是，某些系统管理员可能会偶然发现该文件，认为它只是一个充满文本的简单日志文件，并为了释放磁盘空间而删除它，却不知道这对数据库至关重要，删除它会导致数据库崩溃。相反，这些
    DBA 会使用 `redoXX.orl`。只要他们在整个企业内保持一致，就不会有任何问题。


    ## 全景概览


    在接下来的两章中，我们将在 Linux 机器上安装 Oracle 数据库软件并创建我们的第一个数据库。既然我们已经到了本章的末尾，我们对服务器上各项内容的放置位置有了更好的了解。表
    4-2 显示了我们在本书剩余部分将使用的测试环境中文件的存放位置。


    表 4-2


    | 目录路径 | 内容 |

    | --- | --- |

    | `/u01/app/oracle` | `ORACLE_BASE` |

    | `/u01/app/oracle/oraInventory` | Oracle 清单 |

    | `/u01/app/oracle/product/12.2.0.1` | `ORACLE_HOME` |

    | `/u01/app/oracle/admin` | 管理文件 |

    | `/u01/app/oracle/diag/rdbms/orcl/orcl` | 诊断文件 |

    | `/u01/app/oracle/oradata/orcl` | 数据库文件 |


    如果您记不清某些文件的存放位置，可以使用表 4-2 作为参考。


    如果我使用的是 Windows 服务器，所有 `/u01/app/oracle` 路径都将转换为 `C:\oracle`。


    ## 继续前进


    本章向您介绍了思科最佳灵活架构（OFA）及其部分指南。知道在磁盘上哪里可以找到某些文件对 DBA 很重要。遵循这些指南可以更容易地找到文件，并减少由于某人不知道文件是什么而错误删除它造成的人为错误的机会。再次强调，无论您使用什么约定，即使偏离了
    OFA 指南，也请在整个企业内保持一致。


    下一章将重点介绍下载 Oracle 数据库软件并将其安装在我们的服务器上。我们将安装在表 4-2 中注明的 `ORACLE_HOME` 目录中。在第 6 章中，我们将创建我们的第一个数据库。在接下来的两章结束时，表
    4-2 中注明的整个文件结构将被文件填满。


    在第 3 章中，我们创建了将在本书中使用的服务器。在第 4 章中，我们讨论了文件系统的不同区域。如果您回想一下，Oracle 安装时会创建两个目录，分别称为
    Oracle 基目录（Oracle Base）和 Oracle 主目录（Oracle Home）。本章将重点介绍首次安装 Oracle，使用基目录和主目录。在第
    6 章中，我们将创建我们的第一个数据库。


    本章将展示如何在我们的测试环境上安装 Oracle Database 12c 第 2 版（12.2）。如果您使用的是不同的 Oracle 版本，可以使用本章作为指南。如果您的版本比
    12.2 稍低或稍高，那么本章大部分内容都是适用的。离 12.2 版本越远，您可能会看到越多的差异。

    '
- fmt: '## Accessing the Installation Guide


    The Oracle documentation contains many answers to questions you may have. The
    documentation set that is relevant to this chapter is called the `Oracle Database
    Installation Guide`. This document is a must-read for anyone installing Oracle.
    Like all documentation from Oracle, there is an updated guide for each specific
    version. At the time of writing, `Oracle 12.2` is the most current version available
    for on-premises deployments. Before I installed `Oracle 12.2` for the first time,
    I made it a point to read that version’s `Installation Guide`. Once the next version,
    `Oracle Database 18c`, is released for on-premises installations, I will read
    that version of the `Installation Guide`. Most of it will be information I already
    know, so it doesn’t take too long to read the next version’s documentation. However,
    I still read the latest `Installation Guide` because it may contain a few new
    pieces of information. For example, the new version may change the amount of minimum
    memory needed to support an Oracle database. If you do not read the new version’s
    `Installation Guide`, you may experience installation issues because you do not
    have enough memory. A preface to the `Installation Guide` contains a summary of
    the changes for the new release and is always worth reading.


    ### Tip


    Always read the current version of the documentation set. It may contain new information
    that wasn’t in your older version.


    Oracle documentation, for all Oracle products, is accessible from the Oracle Help
    Center, located at [`https://docs.oracle.com`](https://docs.oracle.com). Click
    the `Database` button, shown in Figure [5-1](#467924_1_En_5_Chapter.xhtml#Fig1),
    to access the database documentation.


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig1_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig1_HTML.jpg)


    Figure 5-1: Database documentation button


    On the main `Database Documentation` page, we can see different database documentation
    sets. We are interested in the `Oracle Database` documentation set, so click that
    button, which is shown in Figure [5-2](#467924_1_En_5_Chapter.xhtml#Fig2).


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig2_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig2_HTML.jpg)


    Figure 5-2: Oracle Database documentation button


    The next page defaults to the latest and greatest documentation version, which
    at the time of writing is the `Oracle Database 18c` documentation. However, this
    book is written for `Oracle 12.2`, so in the drop-down menu located under `Oracle
    Database`, select the `Oracle 12.2` version, as shown in Figure [5-3](#467924_1_En_5_Chapter.xhtml#Fig3).


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig3_HTML.png](images/467924_1_En_5_Chapter/467924_1_En_5_Fig3_HTML.png)


    Figure 5-3: Database version selection


    If you are working with a different Oracle version, you can choose that from the
    drop-down list. After you choose the version of interest, the documentation links
    below the drop-down menu will change to match that version.


    In the section labeled `Topics`, click the `Install and Upgrade` link. You should
    see installation guides for different platforms such as `AIX`, `Solaris`, `Windows`,
    and `Linux`. We created our server (in Chapter [3](#467924_1_En_3_Chapter.xhtml))
    with the `Oracle Linux` operating system, so choose the `Database Installation
    Guide for Linux` by clicking either the `HTML` or `PDF` link to suit your preference,
    as you can see in Figure [5-4](#467924_1_En_5_Chapter.xhtml#Fig4).


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig4_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig4_HTML.jpg)


    Figure 5-4: Database Installation Guide for Linux links


    Please take some time to familiarize yourself with the `Installation Guide`’s
    contents. It’s not a bad idea to skim this document, at a minimum, before proceeding
    with the rest of this chapter. This chapter will not cover everything in that
    guide. If you do not read this guide before proceeding, make sure to read it at
    some future date. Chapters [1](#467924_1_En_1_Chapter.xhtml) through [7](#467924_1_En_7_Chapter.xhtml)
    are the most important to read. You can read either Chapter [8](#467924_1_En_8_Chapter.xhtml)
    or [9](#467924_1_En_9_Chapter.xhtml) if you are using a file system or `Automated
    Storage Manager (ASM)`, respectively. Chapter [11](#467924_1_En_11_Chapter.xhtml)
    walks you through how to install the software, which we will cover in this chapter.


    Many of your questions are answered in this guide. Which exact version of Linux
    can I use? How much memory and disk space does my server need? What are the steps
    to install Oracle software? Even the `Optimal Flexible Architecture` we discussed
    in Chapter [4](#467924_1_En_4_Chapter.xhtml) has an appendix devoted to it in
    this guide.


    ## Downloading Oracle Database Software


    Before we can install the Oracle database software, we need to download it from
    some location. If you have a valid support contract with Oracle, you can download
    from [`https://edelivery.oracle.com`](https://edelivery.oracle.com). Oracle also
    lets you download from its `Oracle Technology Network` at [`https://otn.oracle.com`](https://otn.oracle.com).
    The Technology Network requires you to have an Oracle account, but setting that
    up is free. Sign in to the Technology Network and then, in the `Essential Links`
    section, click `Software Downloads`. On the next page, scroll down a bit until
    you see the `Database` section. Click the `Database 12c Enterprise/Standard Editions`
    link, an example of which you can see in Figure [5-5](#467924_1_En_5_Chapter.xhtml#Fig5).


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig5_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig5_HTML.jpg)


    Figure 5-5: Developer Network Database download link


    On the next page, there is an `Accept License Agreement` radio button that you
    must select to accept the license terms. None of the download links will work
    until you accept the license agreement. In Figure [5-6](#467924_1_En_5_Chapter.xhtml#Fig6)
    you can see a link to the `OTN License Agreement` and the radio button to accept
    that license.


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig6_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig6_HTML.jpg)


    Figure 5-6: OTN License Agreement link and acceptance


    Make sure you click the `OTN License Agreement` link and read the license! You
    cannot use this software for any database that you need to license. You cannot
    use it for production databases or for any part of your business. What you can
    do is use it for simple testbeds, as we will be doing in this book.


    After you click the radio button to accept the license agreement, scroll down
    until you see the `Oracle Database 12c Release 2` section. Click the link named
    `File 1` next to the `Linux` operating system. If you are working on a different
    operating system, you can see the ones available to you in that same section.
    `File 1` is the database software. If you need other software, click the `See
    All` link, which takes you to a page where you can download the `Database Client`,
    `Grid Infrastructure`, `Database Gateways`, and `Example` schemas. We are only
    interested in the database `RDBMS` software, so download the file named `linuxx64_12201_database.zip`
    onto your workstation.'
  raw: '## Accessing the Installation Guide


    The Oracle documentation contains many answers to questions you may have. The
    documentation set that is relevant to this chapter is called the *Oracle Database*
    *Installation Guide* . This document is a must-read for anyone installing Oracle.
    Like all documentation from Oracle, there is an updated guide for each specific
    version. At the time of writing, Oracle 12.2 is the most current version available
    for on-premises deployments. Before I installed Oracle 12.2 for the first time,
    I made it a point to read that version’s *Installation Guide*. Once the next version, Oracle
    Database 18c, is released for on-premises installations, I will read that version
    of the *Installation Guide*. Most of it will be information I already know, so
    it doesn’t take too long to read the next version’s documentation. However, I
    still read the latest *Installation Guide* because it may contain a few new pieces
    of information. For example, the new version may change the amount of minimum
    memory needed to support an Oracle database. If you do not read the new version’s
    *Installation Guide*, you may experience installation issues because you do not
    have enough memory. A preface to the *Installation Guide* contains a summary of
    the changes for the new release and is always worth reading.


    ### Tip


    Always read the current version of the documentation set. It may contain new information
    that wasn’t in your older version.


    Oracle documentation, for all Oracle products, is accessible from the Oracle Help
    Center, located at [`https://docs.oracle.com`](https://docs.oracle.com) . Click
    the Database button, shown in Figure [5-1](#467924_1_En_5_Chapter.xhtml#Fig1),
    to access the database documentation.


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig1_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Database documentation button


    On the main Database Documentation page, we can see different database documentation
    sets. We are interested in the Oracle Database documentation set, so click that
    button, which is shown in Figure [5-2](#467924_1_En_5_Chapter.xhtml#Fig2).


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig2_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Oracle Database documentation button


    The next page defaults to the latest and greatest documentation version, which
    at the time of writing is the Oracle Database 18c documentation. However, this
    book is written for Oracle 12.2, so in the drop-down menu located under Oracle
    Database, select the Oracle 12.2 version, as shown in Figure [5-3](#467924_1_En_5_Chapter.xhtml#Fig3).


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig3_HTML.png](images/467924_1_En_5_Chapter/467924_1_En_5_Fig3_HTML.png)


    Figure 5-3


    Database version selection


    If you are working with a different Oracle version, you can choose that from the
    drop-down list. After you choose the version of interest, the documentation links
    below the drop-down menu will change to match that version.


    In the section labeled Topics, click the Install and Upgrade link. You should
    see installation guides for different platforms such as AIX, Solaris, Windows,
    and Linux. We created our server (in Chapter [3](#467924_1_En_3_Chapter.xhtml))
    with the Oracle Linux operating system, so choose the *Database Installation Guide
    for Linux* by clicking either the HTML or PDF link to suit your preference, as
    you can see in Figure [5-4](#467924_1_En_5_Chapter.xhtml#Fig4).


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig4_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Database Installation Guide for Linux links


    Please take some time to familiarize yourself with the *Installation Guide*’s
    contents. It’s not a bad idea to skim this document, at a minimum, before proceeding
    with the rest of this chapter. This chapter will not cover everything in that
    guide. If you do not read this guide before proceeding, make sure to read it at
    some future date. Chapters [1](#467924_1_En_1_Chapter.xhtml) through [7](#467924_1_En_7_Chapter.xhtml)
    are the most important to read. You can read either Chapter [8](#467924_1_En_8_Chapter.xhtml)
    or [9](#467924_1_En_9_Chapter.xhtml) if you are using a file system or Automated
    Storage Manager (ASM), respectively. Chapter [11](#467924_1_En_11_Chapter.xhtml)
    walks you through how to install the software, which we will cover in this chapter.


    Many of your questions are answered in this guide. Which exact version of Linux
    can I use? How much memory and disk space does my server need? What are the steps
    to install Oracle software? Even the Optimal Flexible Architecture we discussed
    in Chapter [4](#467924_1_En_4_Chapter.xhtml) has an appendix devoted to it in
    this guide.


    ## Downloading Oracle Database Software


    Before we can install the Oracle database software, we need to download it from
    some location. If you have a valid support contract with Oracle, you can download
    from [`https://edelivery.oracle.com`](https://edelivery.oracle.com) . Oracle also
    lets you download from its Oracle Technology Network at [`https://otn.oracle.com`](https://otn.oracle.com)
    . The Technology Network requires you to have an Oracle account, but setting that
    up is free. Sign in to the Technology Network and then, in the Essential Links
    section, click Software Downloads. On the next page, scroll down a bit until you
    see the Database section. Click the Database 12c Enterprise/Standard Editions
    link, an example of which you can see in Figure [5-5](#467924_1_En_5_Chapter.xhtml#Fig5).


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig5_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Developer Network Database download link


    On the next page, there is an Accept License Agreement radio button that you must
    select to accept the license terms. None of the download links will work until
    you accept the license agreement. In Figure [5-6](#467924_1_En_5_Chapter.xhtml#Fig6)
    you can see a link to the OTN License Agreement and the radio button to accept
    that license.


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig6_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    OTN License Agreement link and acceptance


    Make sure you click the OTN License Agreement link and read the license! You cannot
    use this software for any database that you need to license. You cannot use it
    for production databases or for any part of your business. What you can do is
    use it for simple testbeds, as we will be doing in this book.


    After you click the radio button to accept the license agreement, scroll down
    until you see the Oracle Database 12c Release 2 section. Click the link named
    File 1 next to the Linux operating system. If you are working on a different operating
    system, you can see the ones available to you in that same section. File 1 is
    the database software. If you need other software, click the See All link, which
    takes you to a page where you can download the Database Client, Grid Infrastructure,
    Database Gateways, and Example schemas. We are only interested in the database
    RDBMS software, so download the file named linuxx64_12201_database.zip onto your
    workstation.'
  trans: '## 访问安装指南


    Oracle 文档包含许多您可能遇到问题的答案。与本章相关的文档集称为 `Oracle Database Installation Guide`。对于任何安装
    Oracle 的人来说，这份文档都是必读的。与所有 Oracle 文档一样，每个特定版本都有对应的更新指南。在撰写本文时，`Oracle 12.2` 是适用于本地部署的最新版本。在我首次安装
    `Oracle 12.2` 之前，我特意阅读了该版本的 `安装指南`。一旦下一个版本 `Oracle Database 18c` 发布用于本地安装，我也会阅读该版本的
    `安装指南`。其中大部分内容将是我已经知道的，因此阅读下一个版本的文档并不会花费太长时间。然而，我仍然会阅读最新的 `安装指南`，因为它可能包含一些新的信息。例如，新版本可能会更改支持
    Oracle 数据库所需的最小内存量。如果您不阅读新版本的 `安装指南`，您可能会因为内存不足而遇到安装问题。`安装指南`的前言包含了新版本变更的摘要，非常值得一读。


    ### 提示


    务必阅读当前版本的文档集。它可能包含您旧版本中没有的新信息。


    所有 Oracle 产品的文档都可以从位于 [`https://docs.oracle.com`](https://docs.oracle.com) 的 Oracle
    帮助中心访问。点击如图 5-1 所示的 `Database` 按钮，即可访问数据库文档。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig1_HTML.jpg](img/467924_1_En_5_Fig1_HTML.jpg)


    图 5-1: 数据库文档按钮


    在主要的 `数据库文档` 页面上，我们可以看到不同的数据库文档集。我们感兴趣的是 `Oracle Database` 文档集，因此点击该按钮，如图 5-2
    所示。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig2_HTML.jpg](img/467924_1_En_5_Fig2_HTML.jpg)


    图 5-2: Oracle Database 文档按钮


    下一个页面默认显示最新最好的文档版本，在撰写本文时是 `Oracle Database 18c` 文档。然而，本书是为 `Oracle 12.2` 编写的，因此在
    `Oracle Database` 下方的下拉菜单中选择 `Oracle 12.2` 版本，如图 5-3 所示。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig3_HTML.png](img/467924_1_En_5_Fig3_HTML.png)


    图 5-3: 数据库版本选择


    如果您使用的是其他 Oracle 版本，可以从下拉列表中选择。选择感兴趣的版本后，下拉菜单下方的文档链接将更改为匹配该版本。


    在标为 `主题` 的部分，点击 `安装与升级` 链接。您应该会看到适用于不同平台的安装指南，如 `AIX`、`Solaris`、`Windows` 和 `Linux`。我们的服务器（在第
    3 章创建）使用的是 `Oracle Linux` 操作系统，因此通过点击 `HTML` 或 `PDF` 链接来选择 `Linux 数据库安装指南`，以满足您的偏好，如图
    5-4 所示。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig4_HTML.jpg](img/467924_1_En_5_Fig4_HTML.jpg)


    图 5-4: Linux 数据库安装指南链接


    请花些时间熟悉 `安装指南` 的内容。在继续本章剩余内容之前，至少浏览一下这份文档是个不错的主意。本章不会涵盖该指南中的所有内容。如果您在继续之前不阅读本指南，请务必在未来某个日期阅读它。第
    1 章到第 7 章是最重要的章节。如果您使用的是文件系统或 `自动存储管理器（ASM）`，则可以分别阅读第 8 章或第 9 章。第 11 章将引导您完成软件安装过程，这也是我们将在本章介绍的内容。


    您的许多问题都能在这个指南中找到答案。我可以使用哪个确切的 Linux 版本？我的服务器需要多少内存和磁盘空间？安装 Oracle 软件的步骤是什么？甚至我们在第
    4 章讨论的 `最佳灵活架构`，在这个指南中也有专门的附录进行介绍。


    ## 下载 Oracle 数据库软件


    在安装 Oracle 数据库软件之前，我们需要从某个位置下载它。如果您与 Oracle 签订了有效的支持合同，可以从 [`https://edelivery.oracle.com`](https://edelivery.oracle.com)
    下载。Oracle 也允许您从其 `Oracle 技术网络`（OTN）[`https://otn.oracle.com`](https://otn.oracle.com)
    下载。技术网络要求您拥有 Oracle 账户，但注册是免费的。登录技术网络，然后在 `基本链接` 部分，点击 `软件下载`。在下一页，稍微向下滚动，直到看到
    `数据库` 部分。点击 `Database 12c 企业版/标准版` 链接，您可以在图 5-5 中看到一个示例。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig5_HTML.jpg](img/467924_1_En_5_Fig5_HTML.jpg)


    图 5-5: 开发者网络数据库下载链接


    在下一页，有一个 `接受许可协议` 单选按钮，您必须选中以接受许可条款。在您接受许可协议之前，所有下载链接都将无法使用。在图 5-6 中，您可以看到 `OTN
    许可协议` 的链接以及接受该许可的单选按钮。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig6_HTML.jpg](img/467924_1_En_5_Fig6_HTML.jpg)


    图 5-6: OTN 许可协议链接及接受选项


    请务必点击 `OTN 许可协议` 链接并阅读许可条款！您不能将此软件用于任何需要获得许可的数据库。您不能将其用于生产数据库或业务的任何部分。您可以做的是将其用于简单的测试环境，正如我们将在本书中进行的那样。


    点击单选按钮接受许可协议后，向下滚动直到看到 `Oracle Database 12c Release 2` 部分。点击 `Linux` 操作系统旁边的名为
    `文件 1` 的链接。如果您使用的是其他操作系统，可以在同一部分看到可用的选项。`文件 1` 是数据库软件。如果您需要其他软件，请点击 `查看全部` 链接，它会将您带到一个页面，您可以在那里下载
    `数据库客户端`、`网格基础设施`、`数据库网关` 和 `示例` 模式。我们只对数据库 `RDBMS` 软件感兴趣，因此将名为 `linuxx64_12201_database.zip`
    的文件下载到您的工作站。'
- fmt: '## Getting the Server Ready


    Before we can perform the actual install, we need to perform a few minor tasks.
    If your virtual machine is not running, start it from VirtualBox and log in as
    the root superuser. When the virtual machine first starts up, it asks who to log
    in as, but root is not listed. Click the `Not Listed` link and enter `root` for
    the username and provide the password. Once signed in, go to `Applications ➤ Favorites`
    and start the `Terminal` application. This is our command window. In this window,
    type `yum search oracle-rdbms`. `yum` is a Linux utility that can be used to easily
    download and install operating system packages. Our command will search for any
    packages in the yum repository that contain the string `oracle-rdbms` in its name.
    We can see the search results in Listing 5-1.


    ```

    [root@dbamentor ~]# yum search oracle-rdbms

    Loaded plugins: refresh-packagekit, security

    public_ol6_UEKR3_latest                                  | 1.2 kB     00:00

    public_ol6_latest                                        | 1.4 kB     00:00

    ======================== N/S Matched: oracle-rdbms ========================

    oracle-rdbms-server-11gR2-preinstall.x86_64 : Sets the system for Oracle single

    ...: instance and Real Application Cluster install for Oracle Linux 7

    oracle-rdbms-server-12cR1-preinstall.x86_64 : Sets the system for Oracle single

    ...: instance and Real Application Cluster install for Oracle Linux 7

    Name and summary matches only, use "search all" for everything.

    Listing 5-1

    Yum Search Results

    ```


    There should be two results, a preinstall file for 11gR2 and another for 12cR1.
    Even though we are installing Oracle 12cR2, the 12cR1 preinstall file works just
    fine. If you see other versions, install the one that most closely matches the
    Oracle version you are installing.


    Much of the operating system setup defined in `Oracle Database Installation Guide`
    will be handled for us by installing this file on our server. The preinstall file
    is only available for the Linux operating system. Other operating systems need
    to be configured manually following the steps in the `Installation Guide`.


    In the command window, install the file as follows:


    ```

    yum install oracle-rdbms-server-12cR1-preinstall.x86_64

    ```


    You will be prompted to verify that it is ok to proceed. Press ‘y’ and hit the
    Enter key to proceed. Similarly, answer ‘y’ for any other prompts that may come
    up.


    In order to get the Oracle database software file we downloaded (in the prior
    section) onto the database testbed server, we need to use the file share between
    the virtual machine and our host that we set up in Chapter 3 (refer to Figure
    3-16). Just in case you skipped that part, go to VirtualBox Manager, click the
    VM, and then click the `Settings` button. Next, click the `Shared Folders` icon.
    Click the blue folder icon with a green plus sign so that you can add a shared
    folder. On my MacBook laptop, I defined the folder path to my user’s desktop.
    On the Linux side, this will be seen as `HostDesktop`. I made sure to check the
    `Auto-mount` option, as shown in Figure 5-7.


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig7_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig7_HTML.jpg)


    Figure 5-7: Shared Folders configuration


    For security purposes, you can optionally select to make this mount read-only
    on the Linux VM side. That way, the virtual machine cannot make changes to the
    host’s files in that directory.


    Before the shared folders will work, we need to set up Guest Additions, extra
    components for the operating system that Virtual Box needs to extend the functionality
    of the OS in a virtual machine. Not only will Guest Additions let us access shared
    folders, it will allow us to copy and paste between the virtual machine and the
    host environment. Guest Additions will also let us move our mouse more easily
    between the VM and the host.


    Before we can install Guest Additions, we need to install some kernel source code.
    That can be done with the following command:


    ```

    yum install kernel-uek-devel-$(uname -r)

    ```


    This command instructs `yum` to install a package. The package’s name will depend
    on your current Linux version. The `uname -r` portion is returning that OS version.


    With that package installed, reboot your VM. Sign back in as root and select `Insert
    Guest Additions CD Image` from the `Devices` menu of your virtual machine’s window.
    You will be prompted to run the software, so click `OK`. When the installation
    is complete, press Enter to close the window.


    Before all of our changes can take effect, we need to restart the server. Type
    `reboot` in a `Terminal` window (`Applications ➤ Favorites`) to reboot the server.
    Sign in as root. We now need to change the `oracle` user password. The preinstall
    file we installed earlier in this section created our user for us. In a `Terminal`
    window, type `passwd oracle` and you will be prompted twice for the new password.
    Remember this password, as you will be using it throughout this book. Sign out
    of the root user and sign in as the `oracle` user.


    Open a `Terminal` window. In the window, type `df –h` to see the mounted disk
    devices. You should see an entry for something like `/media/sf_HostDesktop`. The
    `sf` stands for *shared folder*, and `HostDesktop` is what I named my shared folder
    in Figure 5-7.


    Unfortunately, VirtualBox has the shared folder owned by `root`. In our `Terminal`
    window, enter `su` to log in as root. Enter the root password when prompted. We’ll
    copy the installation file to the oracle user’s home directory and change the
    file ownership so that `oracle` can take control. The commands to accomplish copying
    the database software download to the virtual machine are in Listing 5-2.


    ```

    cd /media/sf_HostDesktop

    cp linuxx64_12201_database.zip /home/oracle/.

    chown oracle:oinstall /home/oracle/linuxx64_12201_database.zip

    exit

    Listing 5-2: Copying DB Software to VM

    ```


    That last command exits the root user and you should be returned back to the `oracle`
    user. We will now unzip our download file:


    ```

    unzip /home/oracle/linuxx64_12201_database.zip

    ```


    We are now ready to begin our installation.'
