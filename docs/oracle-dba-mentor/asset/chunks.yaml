    Alert Log Missing Control File

    ```


    The error messages are telling us exactly which file is missing, control02.ctl,
    and that there is no such file or directory. Fixing this problem is easy. Control
    files are multiplexed, meaning any other control file is an exact duplicate. If
    we have control01.ctl, we can simply copy it as our missing file and restart the
    instance. Listing [12-7](#467924_1_En_12_Chapter.xhtml#PC7) shows how easy it
    was to resolve the issue.


    ```

    SQL> !ls -l

