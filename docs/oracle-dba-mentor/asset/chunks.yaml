- fmt: '### Tip


    If you create a database manually, you will have to set up your security controls
    manually as well.


    In the `utlpwdmg.sql` script, you can see the `DEFAULT` profile has been defined
    with the limits shown in Listing 8-6.


    ```sql

    ALTER PROFILE DEFAULT LIMIT

    PASSWORD_LIFE_TIME 180

    PASSWORD_GRACE_TIME 7

    PASSWORD_REUSE_TIME UNLIMITED

    PASSWORD_REUSE_MAX  UNLIMITED

    FAILED_LOGIN_ATTEMPTS 10

    PASSWORD_LOCK_TIME 1

    INACTIVE_ACCOUNT_TIME UNLIMITED

    PASSWORD_VERIFY_FUNCTION ora12c_verify_function;

    Listing 8-6

    DEFAULT Profile Definition

    ```


    A profile is a set of limitations on the account. We can see in Listing 8-6 that
    the profile is limited to a `PASSWORD_LIFE_TIME` of 180 days and a `PASSWORD_GRACE_TIME`
    of 7 days. So what do all of these limits mean? Table 8-1 shows the profile limit
    definitions for securing our Oracle database.


    Table 8-1

    Profile Parameter Descriptions


    | Profile Parameter | Definition |

    | --- | --- |

    | `FAILED_LOGIN_ATTEMPTS` | Specifies the number of consecutive login failures
    before Oracle will automatically lock the account. |

    | `PASSWORD_LIFE_TIME` | Specifies the number of days the password can be used.
    After these number of days pass, the password must be changed. |

    | `PASSWORD_REUSE_TIME` | Specifies the number of days before a password can be
    reused. For example, you may say that a password cannot be used until 365 days
    have passed. |

    | `PASSWORD_REUSE_MAX` | Specifies the number of times you must change the password
    before it can be reused. For example, you may not reuse a password until you have
    changed it four times. |

    | `PASSWORD_LOCK_TIME` | Specifies the number of days an account will remain locked
    if Oracle automatically locked the account due to `FAILED_LOGIN_ATTEMPTS`. Normally
    this is value less than 1. |

    | `PASSWORD_GRACE_TIME` | Specifies the number of days the password can be expired
    but still used. For example, if you set `PASSWORD_LIFE_TIME` to 90 days and `PASSWORD_GRACE_TIME`
    to 7 days, the user really has 97 days to change their password. After the grace
    time has expired, the account is locked. |

    | `INACTIVE_ACCOUNT_TIME` | Specifies the number of days of inactivity before
    the account is automatically locked. For example, this is useful when you want
    to lock accounts if the user does not log in for 365 days. |

    | `PASSWORD_VERIFY_FUNCTION` | Defines the password verification function in use
    by the profile. This parameter is how we can leverage different password verification
    functions depending on the user classification. |


    If you specify the `PASSWORD_REUSE_TIME`, you must also specify the `PASSWORD_REUSE_MAX`,
    and vice versa.


    As noted in Table 8-1, the `PASSWORD_LOCK_TIME` is specified in days. In practice
    we rarely lock the account for an entire day, so this value is often less than
    1. It is common to see the account locked for 10 minutes. There are 24 hours in
    a day and each hour is 60 minutes. To compute the value of 10 minutes expressed
    as one day, we would perform a simple calculation like `10/(24*60)`, which is
    about `0.00694`. Now I don’t know about you, but I have a challenging time remembering
    that `0.00694` of a day equals 10 minutes. Therefore, in Listing 8-7, I’ll be
    specifying the formula `10/(24*60)` instead of `0.00694` to denote 10 minutes,
    which makes the limit a bit easier to decipher.


    The first thing I do in production databases to lock down the security is to modify
    the `DEFAULT` profile. My corporate policies dictate that users must change their
    passwords every 90 days and they cannot reuse a password they’ve used any time
    in the last two years. We want Oracle to lock the account on five invalid login
    attempts and leave it locked for 10 minutes. We also lock accounts that have not
    been used in the past year. With those definitions, I can now issue the command
    in Listing 8-7 to modify the `DEFAULT` profile’s settings.


    ```sql

    ALTER PROFILE DEFAULT LIMIT

    PASSWORD_LIFE_TIME 90

    PASSWORD_GRACE_TIME 7

    PASSWORD_REUSE_TIME 730

    PASSWORD_REUSE_MAX  8

    FAILED_LOGIN_ATTEMPTS 5

    PASSWORD_LOCK_TIME 10/(24*60)

    INACTIVE_ACCOUNT_TIME 365

    PASSWORD_VERIFY_FUNCTION ora12c_verify_function;

    Listing 8-7

    Improving the DEFAULT Profile

    ```


    As promised, I used the formula to define 10 minutes for the lock time parameter,
    `PASSWORD_LOCK_TIME`. Again, I often find it easier to determine that I meant
    10 minutes from seeing the formula rather than `0.00694`. However, if we query
    the data dictionary for our profile’s password limits, we see that the lock time
    is expressed as a number, as shown in Listing 8-8.


    ```sql

    SQL> select resource_name,limit from dba_profiles

    2  where profile=''DEFAULT''

    3  and resource_type=''PASSWORD'';

    RESOURCE_NAME                    LIMIT

    -------------------------------- ------------------------------

    FAILED_LOGIN_ATTEMPTS            5

    PASSWORD_LIFE_TIME               90

    PASSWORD_REUSE_TIME              730

    PASSWORD_REUSE_MAX               8

    PASSWORD_VERIFY_FUNCTION         ORA12C_VERIFY_FUNCTION

    PASSWORD_LOCK_TIME               .0069

    PASSWORD_GRACE_TIME              7

    INACTIVE_ACCOUNT_TIME            365

    Listing 8-8

    Querying the Profile Limits

    ```


    Next, I’ll create a profile for our admin users. This profile is more restrictive
    than for end users due to the increased role of the account. For admins, we want
    them to change passwords every 60 days. Their account should be locked after three
    invalid login attempts and stay locked for 20 minutes. After I create the profile,
    I will modify the `SYS` and `SYSTEM` users to use that profile. Listing 8-9 shows
    the profile creation and the user modifications.


    ```sql

    SQL> create profile admin_profile

    2  limit failed_login_attempts 3

    3  password_life_time 60

    4  password_verify_function ora12c_verify_function

    5  password_lock_time 20/(24*60)

    6  inactive_account_time 90;

    Profile created.

    SQL> alter user sys profile admin_profile;

    User altered.

    SQL> alter user system profile admin_profile;

    User altered.

    SQL> select username,profile from dba_users

    2  where username in (''SYS'',''SYSTEM'');

    USERNAME                  PROFILE

    ------------------------- ---------------

    SYS                       ADMIN_PROFILE

    SYSTEM                    ADMIN_PROFILE

    Listing 8-9

    Admin Profile

    ```


    The profile was created. The users were modified. Lastly, the users were verified
    that they had the proper profile.


    Now that we have the admin profile in place, we can create our DBA user. It is
    a bad security practice to share the same account among multiple people, especially
    for administrative accounts. Unfortunately, I find that all too often, too many
    sites share the `SYSTEM` account with their DBA team. Each DBA should have their
    own unique account. In Listing 8-10, I will create my DBA account with the `ADMIN_PROFILE`,
    grant it the ability to create a session in the database, and give it the `DBA`
    role. Lastly, I will lock the `SYSTEM` account.


    ```sql

    SQL> create user peasland identified by MyPassword31$$ profile admin_profile;

    User created.

    SQL> grant create session to peasland;

    Grant succeeded.

    SQL> grant dba to peasland;

    Grant succeeded.

    SQL> alter user system account lock;

    User altered.

    SQL> connect peasland/MyPassword31$$

    Connected.

    Listing 8-10

    Creating a DBA User

    ```


    Being that these commands are in a book, you can rest assured the password I used
    in Listing 8-10 is one that I would never use for any of my real accounts.


    ### Tip


    Create your own DBA account and lock `SYSTEM`.'
