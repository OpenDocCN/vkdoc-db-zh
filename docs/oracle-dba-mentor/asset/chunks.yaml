  trans: '

    ## Oracle Enterprise Manager


    你的 Oracle 数据库许可证中包含了 Oracle Enterprise Manager (EM) 产品。当 Enterprise Manager 首次推出时，它是一个
    DBA 在其工作站上运行的 Java 应用程序。他们可以将其连接到 Oracle 数据库，并通过点击操作完成许多管理任务。与任何产品一样，EM 随时间不断成熟。如今的
    EM 产品已是基于 Web 的，运行在数据库服务器或其他中央机器上。


    Enterprise Manager 有两种形式：Enterprise Manager Database Express 或 Enterprise Manager
    Cloud Control。当你创建 Oracle 数据库时，可以创建 `EM DB Express`，并且它只能用于管理该数据库。如果你需要管理第二个数据库，你可以设置第二个
    `EM DB Express` 实例。显而易见，如果你有超过几个 Oracle 数据库需要管理，你的 `EM DB Express` 实例数量将会开始增长。每个实例都有不同的
    URL，因此数据库越多，意味着需要收藏的 `EM DB Express` URL 就越多。`EM Cloud Control (EM CC)` 是一个用于管理任意数量数据库的集中式管理平台。如果你的
    Oracle 基础架构开始增长，请使用 `EM CC`。在本节后续部分中，当我们谈论 `EM DB Express` 或 `EM CC` 时，我们将仅称为
    Enterprise Manager 或 EM。


    Enterprise Manager 允许你管理你的 Oracle 数据库。例如，你可以查看有关表空间的详细信息，并创建新的表空间、删除旧的表空间或添加数据文件。我们可以在图
    11-6 中的 EM 里看到多个表空间。


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig6_HTML.jpg](img/467924_1_En_11_Fig6_HTML.jpg)


    图 11-6

    EM 表空间


    Enterprise Manager 可以监控你的数据库，如果发现异常，它可以呼叫或发送电子邮件给数据库管理员，告知他们有一个需要关注的问题。如果需要，DBA
    可以创建一个修复作业，这样下次 EM 发现该问题时，就能自动采取纠正措施。


    Enterprise Manager 的一个缺点是它太容易导致违反许可协议。例如，如果你正在使用 EM 管理一个数据库，并进入性能主页，你可以获得一个显示
    Oracle 实例当前性能的精美图表。示例如图 11-7 所示。


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig7_HTML.jpg](img/467924_1_En_11_Fig7_HTML.jpg)


    图 11-7

    EM 性能页面


    在此屏幕上没有任何地方告诉你，要访问此页面，你需要获得可选组件 Diagnostics Pack 的许可。如果你在性能主页，可以转到 `Setup ➤ Management
    Packs ➤ Packs for this Page` 来确定使用该页面需要许可哪些可选组件包。你可以在图 11-8 中看到，此页面需要获得 Diagnostics
    Pack 的许可。


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig8_HTML.jpg](img/467924_1_En_11_Fig8_HTML.jpg)


    图 11-8

    此页面的管理组件包屏幕


    然而，如果你未获得此可选产品的许可，那么到现在已经为时已晚。一旦你访问了该页面，Oracle 就会向数据库表中写入一条记录，表明你已使用了此可选产品。如果你受到
    Oracle 审计，他们会发现你的组织使用了未付费的产品。


    为了防止意外使用组件包，请转到 `Setup ➤ Management Packs ➤ Management Pack Access`。在该页面上，取消勾选你未获许可使用的产品的复选框。如果
    EM 在使用这些页面之前能询问以验证你是否拥有该产品的许可，那就更好了，但它并未这样做。


    ## 显示 SQL


    Enterprise Manager 是一款出色的产品，尤其对于需要通过点击操作来完成管理任务的新手数据库管理员而言。与大多数管理工具一样，该界面为你省去了繁琐的细节。工具会询问你几个问题，只需点击按钮，任务即可完成。不幸的是，数据库管理员如果仅依赖任何
    GUI 工具的点击特性，学到的东西就不会那么多。


    在图 11-9 的示例中，数据库管理员正在创建一个新的表空间。只需要点击“确定”按钮，任务就完成了。


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig9_HTML.jpg](img/467924_1_En_11_Fig9_HTML.jpg)


    图 11-9

    EM 创建表空间屏幕


    你可以不点击“确定”按钮，而是点击 `Show SQL` 按钮，Enterprise Manager 会向你展示确切的 SQL 语句，类似于图 11-10。


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig10_HTML.jpg](img/467924_1_En_11_Fig10_HTML.jpg)


    图 11-10

    EM 显示 SQL 屏幕


    许多工具都有能力向你展示它们将代表你发出的 SQL 语句。GUI 工具并不能变任何魔术。它们所做的一切就是询问你问题，并根据你填写的空白来构建 SQL 语句。然后，该工具将
    SQL 语句提交给数据库引擎并等待回复。所有这些都是在幕后为你完成的。


    使用这个 `Show SQL` 按钮是学习更多关于 SQL 语句及其工作原理的好方法。例如，如果我点击图 11-10 中所示的 `Return` 按钮，然后勾选复选框以使其成为大文件表空间（bigfile
    tablespace），我就可以看到新形成的 SQL 语句并弄清楚发生了什么变化。


    ### 提示


    使用 `Show SQL` 按钮或类似功能，查看工具在后台为你做了什么。


    下次当你使用 Enterprise Manager 或类似工具时，花些时间确定工具正在为你发出什么 SQL 语句。然后尝试更改一些选项，分析其对该 SQL
    语句的影响。通过这种方式，你是在让工具教你更多关于 SQL 语句的知识，因为它们与当前任务相关。


    你也可以在 `SQL Developer` 中创建表空间。要查看 `SQL Developer` 发送给数据库的 SQL 语句，请点击 `DDL` 选项卡，如图
    11-11 所示。


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig11_HTML.jpg](img/467924_1_En_11_Fig11_HTML.jpg)


    图 11-11

    SQL Developer DDL 选项卡


    尝试查找工具发送到数据库的确切 SQL 语句，是学习更多数据库管理知识的好方法。


    我也会使用这个“显示 SQL”功能来帮助构建我的 SQL 语句。如果我在语法上遇到问题并需要一些帮助，我会逐步完成工具的向导，然后查看我在哪里出错了。我并不强制通过该工具运行此语句。我可以将
    SQL 语句复制粘贴到 `SQL*Plus` 或 `SQL Developer` 中。


    工具只会做其设计要做的事情。你会遇到一些情况，工具完成了你想做的大部分事情，但不是全部。你可以从工具中获取 SQL 语句，然后复制到 `SQL Developer`
    中。从那里，你可以补充完整剩余部分，然后继续工作。如果工具无法完成确切的任务，看看它是否能通过显示它能做的 SQL 来给你一个起点。

