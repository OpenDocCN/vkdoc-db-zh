    Start Date              09-JUL-2018 13:44:41

    Uptime                  0 days 9 hr. 3 min. 55 sec

    Trace Level             off

    Security                ON: Local OS Authentication

    SNMP                    OFF

    Listener Log File       /u01/app/oracle/diag/tnslsnr/oracle122/listener/alert/log.xml

    Listening Endpoints Summary...

    (DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=dbamentor)(PORT=1521)))

    The listener supports no services

    The command completed successfully

    ```

    **清单 9-6** Listener 状态


    从上面的输出中，有几点需要注意。我们可以轻松看到 `Listener` 的启动日期和运行时间。此输出还向我们展示了 `Listener` 日志文件的位置，以防我们需要对其操作进行故障排除。现在请注意“Listening
    Endpoints Summary”部分。从这一部分可以了解到三个重要信息。第一，`Listener` 使用 `TCP` 网络协议。第二，`Listener`
    运行在主机 `dbamentor`（我们的测试平台）上。第三，`Listener` 使用端口 `1521`。


    ### 提示


    重要的 `Listener` 配置信息是协议、主机和端口。


    这三个部分是问题经常出错的地方，正如我们将在本章后面看到的。


    端口下面的那行显示 `Listener` 当前不支持任何服务。此时没有服务的原因是服务器上没有运行 `Oracle` 实例。启动 `Oracle` 实例后，我们可以再次检查状态，如**清单
    9-7** 所示。


    ```

    [oracle@oracle122 ~]$ lsnrctl status

    LSNRCTL for Linux: Version 12.2.0.1.0 - Production on 09-JUL-2018 23:01:00

    Copyright (c) 1991, 2016, Oracle.  All rights reserved.

    Connecting to (ADDRESS=(PROTOCOL=tcp)(HOST=)(PORT=1521))

    STATUS of the LISTENER


