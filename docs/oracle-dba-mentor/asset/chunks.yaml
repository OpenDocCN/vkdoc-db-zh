  trans: '

    ## 准备服务器


    在开始实际安装之前，我们需要完成几项小任务。如果您的虚拟机尚未运行，请从 VirtualBox 中启动它，并以超级用户 `root` 身份登录。虚拟机首次启动时，会询问登录身份，但
    `root` 不在列表中。请点击 `Not Listed` 链接，输入 `root` 作为用户名并提供密码。登录后，前往 `应用程序 ➤ 收藏` 并启动 `终端`
    应用程序。这就是我们的命令窗口。在此窗口中，输入 `yum search oracle-rdbms`。`yum` 是一个 Linux 实用工具，可用于轻松下载和安装操作系统软件包。我们的命令将搜索
    yum 仓库中名称包含字符串 `oracle-rdbms` 的软件包。我们可以在代码清单 5-1 中看到搜索结果。


    ```

    [root@dbamentor ~]# yum search oracle-rdbms

    Loaded plugins: refresh-packagekit, security

    public_ol6_UEKR3_latest                                  | 1.2 kB     00:00

    public_ol6_latest                                        | 1.4 kB     00:00

    ======================== N/S Matched: oracle-rdbms ========================

    oracle-rdbms-server-11gR2-preinstall.x86_64 : Sets the system for Oracle single

    ...: instance and Real Application Cluster install for Oracle Linux 7

    oracle-rdbms-server-12cR1-preinstall.x86_64 : Sets the system for Oracle single

    ...: instance and Real Application Cluster install for Oracle Linux 7

    Name and summary matches only, use "search all" for everything.

    Listing 5-1

    Yum Search Results

    ```


    应该会有两个结果，一个是 11gR2 的预安装文件，另一个是 12cR1 的。尽管我们安装的是 Oracle 12cR2，但 12cR1 的预安装文件同样适用。如果您看到其他版本，请安装与您要安装的
    Oracle 版本最匹配的那个。


    `Oracle Database Installation Guide` 中定义的大部分操作系统设置，将通过在我们的服务器上安装此文件为我们自动处理。此预安装文件仅适用于
    Linux 操作系统。其他操作系统需要按照 `Installation Guide` 中的步骤手动配置。


    在命令窗口中，按如下方式安装该文件：


    ```

    yum install oracle-rdbms-server-12cR1-preinstall.x86_64

    ```


    系统将提示您确认是否可以继续。按 ‘y’ 键并按回车键继续。同样，对于其他可能出现的提示，也回答 ‘y’。


    为了将我们下载的 Oracle 数据库软件文件（在上一节中下载）放到数据库测试服务器上，我们需要使用第 3 章中设置的虚拟机与主机之间的文件共享（参考图 3-16）。以防您跳过了那部分内容，请转到
    VirtualBox 管理器，单击 VM，然后单击 `设置` 按钮。接下来，单击 `共享文件夹` 图标。点击带有绿色加号的蓝色文件夹图标，以便添加共享文件夹。在我的
    MacBook 笔记本电脑上，我将文件夹路径定义为我用户的桌面。在 Linux 端，这将被识别为 `HostDesktop`。我确保勾选了 `自动挂载` 选项，如图
    5-7 所示。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig7_HTML.jpg](img/467924_1_En_5_Fig7_HTML.jpg)


    图 5-7: 共享文件夹配置


    出于安全目的，您可以选择将此挂载点在 Linux VM 端设置为只读。这样，虚拟机就无法更改该目录中主机的文件。


    在共享文件夹生效之前，我们需要安装增强功能包（Guest Additions），这是 Virtual Box 需要的额外操作系统组件，用于扩展虚拟机中操作系统的功能。增强功能包不仅让我们可以访问共享文件夹，还允许我们在虚拟机和主机环境之间复制和粘贴。增强功能包还能让我们更轻松地在虚拟机和主机之间移动鼠标。


    在安装增强功能包之前，我们需要安装一些内核源代码。这可以通过以下命令完成：


    ```

    yum install kernel-uek-devel-$(uname -r)

    ```


    此命令指示 `yum` 安装一个软件包。该软件包的名称取决于您当前的 Linux 版本。`uname -r` 部分用于返回该操作系统版本。


    安装该软件包后，重启您的虚拟机。以 `root` 身份重新登录，并从虚拟机窗口的 `设备` 菜单中选择 `插入增强功能包 CD 镜像`。系统会提示您运行该软件，因此请点击
    `确定`。安装完成后，按 Enter 键关闭窗口。


    在我们的所有更改生效之前，我们需要重启服务器。在 `终端` 窗口（`应用程序 ➤ 收藏`）中输入 `reboot` 以重启服务器。以 `root` 身份登录。我们现在需要更改
    `oracle` 用户的密码。我们在本节前面安装的预安装文件为我们创建了用户。在 `终端` 窗口中，输入 `passwd oracle`，系统会两次提示您输入新密码。请记住此密码，因为您将在本书中一直使用它。退出
    `root` 用户并以 `oracle` 用户身份登录。


    打开一个 `终端` 窗口。在窗口中，输入 `df –h` 以查看已挂载的磁盘设备。您应该会看到一个类似于 `/media/sf_HostDesktop` 的条目。`sf`
    代表 *shared folder*，而 `HostDesktop` 是我在图 5-7 中为共享文件夹命名的名称。


    不幸的是，VirtualBox 的共享文件夹由 `root` 拥有。在我们的 `终端` 窗口中，输入 `su` 以 `root` 身份登录。提示时输入 root
    密码。我们将把安装文件复制到 oracle 用户的主目录，并更改文件所有权，以便 `oracle` 可以接管。将数据库软件下载复制到虚拟机的命令如代码清单
    5-2 所示。


    ```

    cd /media/sf_HostDesktop

    cp linuxx64_12201_database.zip /home/oracle/.

    chown oracle:oinstall /home/oracle/linuxx64_12201_database.zip

    exit

    Listing 5-2: Copying DB Software to VM

    ```


    最后一个命令退出 `root` 用户，您应返回到 `oracle` 用户。我们现在将解压下载的文件：


    ```

    unzip /home/oracle/linuxx64_12201_database.zip

    ```


    我们现在已经准备好开始安装了。

    '
- fmt: '## Installing Oracle


    In the old days, Oracle Corporation had to create a different installer for each
    platform. The Java programming language came to the rescue with its “write once,
    run anywhere” philosophy. The installer for Oracle software is now written in
    Java and is the same program no matter which platform you are using. Oracle now
    calls this the Oracle Universal Installer (`OUI`). Not only was this beneficial
    to Oracle Corporation, but it is also beneficial to you because you only have
    to learn how to use one install utility.


    ### 启动 OUI


    We install the database software by launching the `OUI`. We simply change our
    directory to the location where we unzipped the software and execute the program
    as shown in Listing 5-3.


    ```

    cd /home/oracle/database

    ./runInstaller

    ```

    **Listing 5-3** Starting the OUI


    ### 初始设置步骤


    The `OUI` starts. The first screen is to check for security updates, shown in
    Figure 5-8. For now, we’ll leave those fields blank and click the Next button.
    We will tackle patching the database software with security updates in a future
    chapter.


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig8_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig8_HTML.jpg)

    **Figure 5-8** OUI Configure Security Updates step


    After clicking the Next button, you will be asked to confirm that you wish to
    remain uninformed of security updates. Click the Yes button.


    ### 选择安装类型


    On the next screen, shown in Figure 5-9, we are going to select the option to
    install the database software only. We do not have any databases on this server
    to upgrade and we will tackle creating a database in the next chapter. Click the
    Next button.


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig9_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig9_HTML.jpg)

    **Figure 5-9** OUI Installation Option step


    We will be installing a single-instance database, so make sure the first option
    is selected, as shown in Figure 5-10, and click Next.


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig10_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig10_HTML.jpg)

    **Figure 5-10** OUI Database Installation Options step


    ### 选择数据库版本


    The `OUI` is capable of handling both Enterprise Edition and Standard Edition.
    I typically want all of the features available to me, so I’m going to select Enterprise
    Edition and click Next. You can see this choice in Figure 5-11.


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig11_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig11_HTML.jpg)

    **Figure 5-11** OUI Database Edition step


    ### 配置安装目录


    On the next screen, we now know enough to fill in the blanks. Remember that the
    previous chapter defined the Oracle base directory and the Oracle home. This screen
    is where we tell the `OUI` the locations of those two directories. But first we
    need to create the Oracle base directory. Start a command window and issue the
    commands in Listing 5-4.


    ```

    su       (enter the root password when prompted)

    mkdir –p /u01/app/oracle

    chown -R oracle:oinstall /u01

    exit

    ```

    **Listing 5-4** Creating Oracle Base Directory


    Then fill out the boxes as shown in the example in Figure 5-12. The first box
    is the location of the Oracle base, often referred to by the `$ORACLE_BASE` environment
    variable. The second box, while not as obvious, is the location of the Oracle
    home, often referred to by the `$ORACLE_HOME` environment variable. Click Next
    to continue.


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig12_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig12_HTML.jpg)

    **Figure 5-12** OUI Installation Location step


    ### 创建 oraInventory 目录


    Also remember from Chapter 4 that Oracle needs a place to store the inventory
    of the Oracle software products on this server. We refer to this as the `oraInventory`
    directory. The `OUI` will automatically populate this value. In Figure 5-13, we
    can see the `oraInventory` directory is one level up from the Oracle base shown
    in Figure 5-12. This is common practice. The `OUI` may give us a warning message
    when we click Next, which we will acknowledge.


    We also have the option of specifying the operating system group that will be
    able to modify the inventory. The default of `oinstall` is sufficient, as can
    be seen in Figure 5-13. Click the Next button.


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig13_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig13_HTML.jpg)

    **Figure 5-13** OUI Create Inventory step


    ### 指定操作系统用户组


    On the next screen, we are asked to specify different operating system groups
    for different functionality. If we were concerned about separation of duties,
    we might have different people in our organization that are responsible for the
    database backups, in which case we would not want those staff members to have
    other functionality, so we could choose their group differently from the rest
    in this screen. Since this is a testbed and we will be the only ones accessing
    it, the default `dba` group is sufficient. It is very common to see Oracle installed
    with just the `dba` group in use, as shown in Figure 5-14. Click the Next button.


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig14_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig14_HTML.jpg)

    **Figure 5-14** OUI OS Groups step


    ### 先决条件检查与摘要


    The next screen walks through some prerequisite checks. The `OUI` verifies that
    your server is set up correctly before installing the software. If there is something
    amiss, the `OUI` will let you know. You should remediate any findings before proceeding
    past that screen; otherwise, you may have issues to fix at a later date. When
    I installed the software, the `OUI` did not find any issues, so the `OUI` automatically
    advanced to the Summary screen, shown in Figure 5-15.


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig15_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig15_HTML.jpg)

    **Figure 5-15** OUI Summary


    ### 保存响应文件与安装


    Everything is ready to go. We have answered all of the wizard’s questions and
    all that is left is to click the Install button. At the bottom right of the wizard
    in Figure 5-15, you can see a button labeled Save Response File. The `OUI` has
    asked you a series of questions and you provided answers. You can save your answers,
    your responses to these questions, in a file. This is useful when you want to
    install the Oracle database software multiple times. Instead of walking through
    the wizard, you can launch the `OUI` and point it to the response file and the
    `OUI` will skip all of these screens.


    We can monitor the installation progress on the next screen. We can see that the
    `OUI` will be copying files to the Oracle home directory. After the files have
    been copied, the `OUI` will recompile the software, also called linking the binaries.
    At the very end, we will be asked to execute two scripts as the root user. We
    can see an example of the install progress in Figure 5-16.


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig16_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig16_HTML.jpg)

    **Figure 5-16** OUI installation progress


    ### 执行配置脚本


    Once the `OUI` has reached the last step, it will pop up a window similar to Figure
    5-17. This window asks us to run two scripts as a root user.


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig17_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig17_HTML.jpg)

    **Figure 5-17** OUI Execute Configuration Scripts screen'
