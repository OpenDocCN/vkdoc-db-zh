  trans: '

    ## 深入探索


    当你看到本章标题时，这很可能与你预期的不同。我本可以像许多其他书籍那样来写本章：“这是备份数据库的步骤。这是恢复数据库的步骤。”本书的要点是让你超越程序性步骤去思考，因为这才是真正拓展你数据库管理员职业生涯的唯一途径。在本章中，我们确实提出了一个问题：确定在丢失数据文件后如何使数据库恢复运行。我们还探讨了丢失控制文件或在线重做日志会发生什么。希望你能回去进行更多实验。最坏的情况是你彻底搞乱了你的测试数据库且无法使其再次运行，但这没关系，因为你知道如何从那次冷备份中恢复并重新运行起来。


    本章首先提出了一个令人信服的论点，即数据库管理员甚至应在考虑备份之前就先处理恢复需求。应制定服务级别协议，并由此衍生出一份测试文档。只有到那时，才设计备份方案并随后进行测试，以确保其满足所有要求。我鼓励你加入日益壮大的数据库专业人士行列，他们主张先明确恢复需求，再考虑备份。


    随后，本章为理解不同类型的备份及其使用场景奠定了基础。我们分别使用 `RMAN` 和用户管理命令在测试环境中执行了热备份和冷备份。我们并未止步于此，而是稍作实验，因为这就是我们的学习方式。永不停止提问，永不停止实验。在阅读本章时，你是否想到了我们未涉及的其他问题？把这些问题写下来，看看你是否能找到答案。


    下一章将聚焦于数据库安全。如果我们锁定数据库，并确保使用专门为满足我们需求而定制的备份来保护它，那么我们就朝着成为公司所需的数据守护者迈出了重要一步。


    # 8. 安全性


    在上一章中，我们迈出了确保自己能成为一名良好数据守护者的第一步。我们学习了恢复与备份。数据守护者需要保护数据，并能够在灾难后提供对数据的访问。


    本章将完善数据守护者的职责，将其扩展到保护数据免受未授权访问。本章重点讨论数据库安全。鉴于当今的数据泄露事件，所有数据库管理员确保其数据库免受未授权访问至关重要。


    ## 访问安全指南


    Oracle 提供了许多文档，帮助你了解 Oracle 数据库安全性的方方面面。将你的网络浏览器指向 `https://docs.oracle.com` 并点击
    `Database` 按钮。然后点击 `Oracle Database` 按钮。在下拉菜单中，选择 `12.2` 数据库版本。到现在为止，你应该已经熟悉了如何获取你所用版本的
    Oracle 文档，因为我们已经访问过 Oracle 文档集中的许多指南。


    在 `Topics` 部分，点击 `Security` 链接。你应该能看到两本最重要的书：`Oracle Database 2 Day + Security
    Guide`，紧随其下的是 `Database Security Guide`。


    ### 提示


    在阅读本书时，请确保你正逐渐熟悉 Oracle 文档。


    Oracle 提供了多个此类“2 天”指南，涵盖各种主题，旨在让你快速上手。在阅读完 `2 Day + Security Guide` 后，常规的 `Security
    Guide` 会让你对相关主题有更深入的了解。


    请记住，阅读 Oracle 文档时，记住每个细节并不重要。相反，试着记住文档包含的内容。如有需要，可以浏览文档，并务必查阅目录。在你未来的职业生涯中，你将会知道去哪里寻找你想要的答案。


    需要提醒的是，不必立即阅读本书每章中提到的 Oracle 文档。你完全可以先读完本书，然后再去查阅 Oracle 文档。但请务必在某个时间点花时间阅读 Oracle
    文档。


    ## 默认用户


    在创建 Oracle 数据库时，Oracle 会提供许多默认用户账户。本书前面已经向你介绍了 `SYS` 和 `SYSTEM` 用户。Oracle 为你创建的某些用户取决于你是否安装了某些选件。`DBA_USERS`
    视图包含一个名为 `ORACLE_MAINTAINED` 的列，显示用户是否由 Oracle 提供。我们可以在清单 8-1 的输出中看到 Oracle 维护的用户。根据你的版本和已安装的选件，你的用户数量可能与清单
    8-1 所示的不同。


    ```

    SQL> select username,account_status

    2  from dba_users where oracle_maintained=''Y''

    3  order by username;

    USERNAME                  ACCOUNT_STATUS

    ------------------------- --------------------------------

    ANONYMOUS                 EXPIRED & LOCKED

    APPQOSSYS                 EXPIRED & LOCKED

    AUDSYS                    EXPIRED & LOCKED

    DBSFWUSER                 EXPIRED & LOCKED

    DBSNMP                    EXPIRED & LOCKED

    DIP                       EXPIRED & LOCKED

    GGSYS                     EXPIRED & LOCKED

    GSMADMIN_INTERNAL         EXPIRED & LOCKED

    GSMCATUSER                EXPIRED & LOCKED

    GSMUSER                   EXPIRED & LOCKED

    OJVMSYS                   EXPIRED & LOCKED

    ORACLE_OCM                EXPIRED & LOCKED

    OUTLN                     EXPIRED & LOCKED

    REMOTE_SCHEDULER_AGENT    EXPIRED & LOCKED

    SYS                       OPEN

    SYS$UMF                   EXPIRED & LOCKED

    SYSBACKUP                 EXPIRED & LOCKED

    SYSDG                     EXPIRED & LOCKED

    SYSKM                     EXPIRED & LOCKED

    SYSRAC                    EXPIRED & LOCKED

    SYSTEM                    OPEN

    WMSYS                     EXPIRED & LOCKED

    XDB                       EXPIRED & LOCKED

    XS$NULL                   EXPIRED & LOCKED

    清单 8-1

    Oracle 维护的用户

    ```


    在当今的 Oracle 版本中，Oracle 维护的用户是被锁定的，因此没有人可以使用这些用户中的任何一个访问数据库。开箱即用，只有两个用户是解锁的：`SYS`
    和 `SYSTEM`。除非你有特定需要，否则不要解锁任何其他用户。在大多数情况下，你永远不需要直接连接到那些用户，保持它们的锁定状态将使你的系统更安全。大多数
    Oracle 维护的用户是作为数据库选项的模式存在的。例如，`XDB` 用于支持数据库中的 XML。既然你不是一个数据库选项，你就不需要连接到那个用户。你是一名数据库管理员。因此，在本章后面，你将创建自己的
    DBA 账户并锁定 `SYSTEM`。

    '
- fmt: "## Password Profile\n\n今天的 IT 从业者都知道，一个好密码对于确保系统安全至关重要。像 password、123456 和\
    \ qwerty 这样的密码简直是在邀请黑客使用你的账户。你肯定有过登录某个计算机系统并尝试为账户设置密码时，收到反馈说密码必须超过八个字符、包含大小写字母混合、并包含数字和特殊字符的经历。在本节中，你将学习如何创建一个密码验证函数来强制执行类似的规则。\n\
    \n在开始之前，我们需要将 Oracle 提供的一个文件复制到我们的主目录中。我们不想直接修改这个文件，而只对文件副本进行操作。在清单 [8-2](#467924_1_En_8_Chapter.xhtml#PC2)\
    \ 中，我们将 `catpvf.sql` 脚本复制到测试服务器上的 Linux 主目录。\n\n```bash\n[oracle@dbamentor ~]$\
    \ cp $ORACLE_HOME/rdbms/admin/catpvf.sql $HOME/.\n```\n清单 8-2\n复制安全文件\n\n`catpvf.sql`\
    \ 脚本包含一个密码验证函数。如果你像第 [6](#467924_1_En_6_Chapter.xhtml) 章描述的那样，使用数据库配置助手（`DBCA`）创建了数据库，那么\
    \ Oracle 已经针对数据库运行过这些脚本。\n\n在文本编辑器中打开 `catpvf.sql` 脚本。如果你滚动浏览这个文件，会看到它首先创建了一个名为\
    \ `ora_complexity_check` 的函数。该函数检查密码是否包含大小写字母、数字和特殊字符。它还检查密码是否足够长。如果其中任何一项检查失败，该函数就会引发错误。\n\
    \n在同一脚本的后面部分，是用于创建函数 `ora12_verify_function` 的代码。这是实际的密码验证函数，在创建用户或更改其密码时会被调用。检查这段代码可以发现，该函数确保密码不包含用户名或反转的用户名。它确保密码不包含服务器名。我们还可以在清单\
    \ [8-3](#467924_1_En_8_Chapter.xhtml#PC3) 中看到对 `ora_complexity_check` 的调用。\n\n\
    ```sql\nIF NOT ora_complexity_check(password, chars => 8, letter => 1, digit =>\
    \ 1,\nspecial => 1) THEN\n  RETURN(FALSE);\n```\n清单 8-3\n调用 `ora_complexity_check`\n\
    \n开箱即用，Oracle 会检查密码是否至少有八个字符，且至少包含一个字母、一个数字和一个特殊字符。许多安全专家会说，好密码的长度应至少为 12 个字符。在这个文件中，让我们将\
    \ `8` 改为 `12`。我们还需要通过更改清单 [8-3](#467924_1_En_8_Chapter.xhtml#PC3) 中的那些参数，来要求密码至少包含两个字母、两个数字和两个特殊字符。然后保存文件。\n\
    \n密码验证函数必须由 `SYS` 用户拥有。启动 `SQL*Plus`，以 `SYS` 用户身份连接，然后执行我们刚刚修改的脚本。我们可以在清单 [8-4](#467924_1_En_8_Chapter.xhtml#PC4)\
    \ 中看到一个例子。\n\n```sql\nsqlplus sys as sysdba\nSQL*Plus: Release 12.2.0.1.0 Production\
    \ on Thu Jul 5 13:34:05 2018\nCopyright (c) 1982, 2016, Oracle.  All rights reserved.\n\
    Enter password:\nConnected to:\nOracle Database 12c Enterprise Edition Release\
    \ 12.2.0.1.0 - 64bit Production\nSQL> @catpvf.sql\n```\n清单 8-4\n修改密码验证函数\n\n输出信息将快速滚动，如果我们正确修改了文件，则不会引发错误。\n\
    \n你不仅限于使用一个密码验证函数。你可以为不同类别的用户设置不同的验证规则。例如，你可能希望管理员用户的密码比普通用户的密码具有更严格的限制。我们将在下一节中看到如何为用户强制使用的密码验证函数进行定义。\n\
    \n现在密码验证函数已经被修改，我们可以通过将 `SYSTEM` 的密码更改为一些我们知道无法通过测试的密码来测试它。在清单 [8-5](#467924_1_En_8_Chapter.xhtml#PC5)\
    \ 中，我们首先尝试将密码更改为 \"password\"，然后更改为一个不包含特殊字符的密码。\n\n```sql\nSQL> alter user system\
    \ identified by password;\nalter user system identified by password\n*\nERROR\
    \ at line 1:\nORA-28003: password verification for the specified password failed\n\
    ORA-20001: Password length less than 12\n\nSQL> alter user system identified by\
    \ thisis12char;\nalter user system identified by thisis12char\n*\nERROR at line\
    \ 1:\nORA-28003: password verification for the specified password failed\nORA-20026:\
    \ Password must contain at least 2 special character(s)\n```\n清单 8-5\n尝试使用弱密码\n\
    \n每次，密码都未能通过验证函数，并且给出了有意义的错误信息。\n\n## Security Profiles\n\nOracle 允许我们通过一个*配置文件*来控制用户的安全。一个\
    \ Oracle 数据库可以使用许多配置文件来支持不同类别的用户。在我管理的数据库中，我通常定义两个配置文件：`DEFAULT` 配置文件和一个用于管理员用户的配置文件。最终用户将获得\
    \ `DEFAULT` 配置文件，管理员则获得另一个配置文件。当然，你也可以根据需要添加其他配置文件。当配置文件首次出现时，我从未使用过 `DEFAULT`\
    \ 配置文件。然而，我多次因为创建用户账户时忘记指定正确的配置文件而吃亏，导致用户账户的安全设置不当。随着时间的推移，我转而向最终用户提供 `DEFAULT`\
    \ 配置文件。无论你做什么，只需确保在整个企业中保持一致即可。\n\n`DEFAULT` 配置文件是开箱即用创建的，你无法删除它。如果你创建一个新用户而没有指定要使用的配置文件，该用户将获得\
    \ `DEFAULT` 配置文件。在文本编辑器中，打开文件 `$ORACLE_HOME/rdbms/admin/utlpwdmg.sql` 并检查其内容。我们不会修改这个文件，只是查看它以了解\
    \ Oracle 在使用 `DBCA` 创建数据库时是如何设置的。"
  raw: '## Password Profile


    Today’s IT practitioner knows that a good password is vital to ensuring systems
    are secure. Passwords like password, 123456, and qwerty are just inviting hackers
    to use your account. Surely you have signed on to some computer system and tried
    to define a password for your account and you’ve received feedback that the password
    must be more than eight characters, contain a mixture of upper- and lowercase
    letters, and include numbers and special characters. In this section, you will
    learn how to create a password verification function to enforce similar rules.
    Before we can begin, we will need to copy an Oracle-supplied file to our home
    directory. We do not want to modify this file directly but instead work only on
    a copy of the file. In Listing [8-2](#467924_1_En_8_Chapter.xhtml#PC2), we copy
    the catpvf.sql script to our Linux home directory on the testbed server.


    ```

    [oracle@dbamentor ~]$ cp $ORACLE_HOME/rdbms/admin/catpvf.sql $HOME/.

    Listing 8-2

    Copy Security File

    ```


    The catpvf.sql script contains a password verification function. If you used the
    Database Creation Assistant (DBCA) to create the database, as described in Chapter
    [6](#467924_1_En_6_Chapter.xhtml), Oracle has already run these scripts against
    the database.


    Open the catpvf.sql script in a text editor. If you scroll through this file,
    you will see that the first thing it does is create a function named ora_complexity_check.
    This function checks to see if the password contains upper- and lowercase letters,
    numbers, and special characters. It also checks to make sure the password is long
    enough. If any of these checks fails, the function raises an error.


    Later in this same script is the code to create the function ora12_verify_function.
    This is the actual password verification function called whenever a user is created
    or its password has been changed. Examining this code shows that the function
    ensures the password does not contain the username, or the username reversed.
    It ensures the password does not contain the server name. We can also see the
    call to ora_complexity_check in Listing [8-3](#467924_1_En_8_Chapter.xhtml#PC3).


    ```

    IF NOT ora_complexity_check(password, chars => 8, letter => 1, digit => 1,

    special => 1) THEN

    RETURN(FALSE);

    Listing 8-3

    Call to ora_complexity_check

    ```


    Out of the box, Oracle will check that the password has at least eight characters
    and at least one letter, one digit, and one special character. Many security experts
    will say that good passwords should be at least 12 characters in length. In this
    file let’s change the 8 to a 12\. Let’s also require that the passwords contain
    at least two letters, two digits, and two special characters by changing those
    parameters in Listing [8-3](#467924_1_En_8_Chapter.xhtml#PC3). Then save the file.


    The password verification function must be owned by the SYS user. Start SQL*Plus
    and connect as the SYS user and then execute the script we just modified. We can
    see an example of this in Listing [8-4](#467924_1_En_8_Chapter.xhtml#PC4).


    ```

    sqlplus sys as sysdba

    SQL*Plus: Release 12.2.0.1.0 Production on Thu Jul 5 13:34:05 2018

    Copyright (c) 1982, 2016, Oracle.  All rights reserved.

    Enter password:

    Connected to:

    Oracle Database 12c Enterprise Edition Release 12.2.0.1.0 - 64bit Production

    SQL> @catpvf.sql

    Listing 8-4

    Modifying the Password Verify Function

    ```


    The output will scroll by and, if we’ve modified the file correctly, no errors
    will be raised.


    You are not limited to just one password verification function. You can have different
    verifications for different classifications of users. For example, you may want
    your administrative users to have much more restrictive passwords than those of
    regular users. We will see in the next section how to define the password verification
    function a user is forced to use for password validation.


    Now that the password verification function has been modified, we can test it
    by changing the SYSTEM’s password to something we know will not pass the test.
    In Listing [8-5](#467924_1_En_8_Chapter.xhtml#PC5), we first try to change the
    password to just “password” and then to a password that does not contain special
    characters.


    ```

    SQL> alter user system identified by password;

    alter user system identified by password

    *

    ERROR at line 1:

    ORA-28003: password verification for the specified password failed

    ORA-20001: Password length less than 12

    SQL> alter user system identified by thisis12char;

    alter user system identified by thisis12char

    *

    ERROR at line 1:

    ORA-28003: password verification for the specified password failed

    ORA-20026: Password must contain at least 2 special character(s)

    Listing 8-5

    Bad Password Attempts

    ```


    Each time, the passwords did not pass the verification function and meaningful
    messages were given.


    ## Security Profiles


    Oracle lets us control a user’s security through a *profile*. An Oracle database
    can have many profiles in use to support different classifications of users. I
    typically have two profiles defined in the databases I manage, the DEFAULT profile
    and a profile for administrative users. End users will receive the DEFAULT profile
    and admins the other profile. You can certainly add other profiles as you see
    fit. When profiles first became available, I never used the DEFAULT profile. However,
    I was burned too many times creating a user account and neglecting to denote the
    proper profile and then I had a user account with bad security settings. Over
    time, I shifted to giving end users the DEFAULT profile. Whatever you do, just
    make sure you are consistent across your enterprise.


    The DEFAULT profile is created out of the box and you cannot remove it. If you
    create a new user and do not denote the profile to use, the user will receive
    the DEFAULT profile. In a text editor, open the file $ORACLE_HOME/rdbms/admin/utlpwdmg.sql
    and examine its contents. We will not be changing this file, just looking at it
    to gain an understanding of how Oracle has set up our database when created with
    the DBCA.'
