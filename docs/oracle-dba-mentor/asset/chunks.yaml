    DBA_MVIEWS             All materialized views in the database

    Listing 14-8

    Materialized Views

    ```


    我可以看到 `DBA_MVIEWS` 包含数据库中物化视图的信息。我也可以明白为什么在查询表名时没有找到它。上面的输出为了简洁而被截断了，因为在我的数据库中它返回了42行。


    查询 `DICT` 是了解有哪些数据字典视图可用的好方法。另一种方法是阅读*Database Reference*。'
  raw: '### DBA_, ALL_, USER_, and CDB_


    Most of the static data dictionary views start with DBA_, ALL_, or USER_ . What
    follows is often seen in all three. We have talked about DBA_TABLES, but there
    is also an ALL_TABLES and a USER_TABLES view. All three of these views let us
    query the data dictionary for information about tables. The difference is the
    scope of information we can see from these views as illustrated in the following
    list:


    *   USER_: These views are for what we own.


    *   ALL_: These views are for what we own and we have privileges to access.


    *   DBA_: These views are for the entire database.


    *   CDB_: These views are for Oracle Multitenant. The CDB_ view shows the same
    information as its corresponding DBA_ view, but for all pluggable databases.


    From the above list, we can correctly surmise that USER_TABLES shows us the tables
    we own. ALL_TABLES shows us the tables we own and have privileges to access. DBA_TABLES
    shows us all tables in the entire database. In Listing [14-4](#467924_1_En_14_Chapter.xhtml#PC4),
    we can see that each of the views shows us how many tables we can see in those
    categories.


    ```

    SQL> select count(*) From dba_tables;

    COUNT(*)


    SQL> select count(*) from all_tables;

    COUNT(*)


    SQL> select count(*) from user_tables;

    COUNT(*)


    Listing 14-4

    Table Counts

    ```


    The user that issued the SQL statements above owns just one table. They have access
    to 23,048 tables and there are 23,048 tables in the entire database. The reason
    ALL_TABLES and DBA_TABLES show us the same number of tables is because the user
    issuing the queries in Listing [14-4](#467924_1_En_14_Chapter.xhtml#PC4) is a
    DBA user. They have access to all tables in the database. Consider the user in
    Listing [14-5](#467924_1_En_14_Chapter.xhtml#PC5) that is not a DBA user.


    ```

    SQL> select count(*) From dba_tables;

    select count(*) From dba_tables

    *

    ERROR at line 1:

    ORA-00942: table or view does not exist

    SQL> select count(*) from all_tables;

    COUNT(*)


    SQL> select count(*) from user_tables;

    COUNT(*)


    Listing 14-5

    Table Counts Non-DBA User

    ```


    In the code above, the user owns 5 tables and has access to 4,360 tables. The
    query to DBA_TABLES returns an error because this user does not have privileges
    to access that view.


    It should be noted that the USER_ views do not contain a column named OWNER. It
    is understood that the output of these views is owned by the user querying the
    view. The ALL_ and DBA_ tables typically have an OWNER column, where it applies.


    Being a DBA, I am constantly querying the DBA_ views. Non-DBA users rarely query
    the DBA_ views. I never query the ALL_ views because as a DBA, they often return
    the same information as the corresponding DBA_ views.


    Since this book is geared toward database administrators, the code will use the
    DBA_ views. If you look up the DBA_ view in the *Database Reference* , it will
    most likely direct you to the corresponding ALL_ view instead. This is not a problem
    because DBA_ and ALL_ views show you the same thing, just different scopes. All
    that differs is which rows are returned, depending on the user querying the view.


    ### DICT


    There are lots of DBA_ views to query. So many that it can be difficult finding
    the one that you need. Each new version brings with it more static data dictionary
    views. In Listing [14-6](#467924_1_En_14_Chapter.xhtml#PC6), we can see a count
    of the total number of DBA_ views in an Oracle 12.1.0.2 database.


    ```

    SQL> select count(*) From dba_objects where object_name like ''DBA_%'' and object_type="VIEW";

    COUNT(*)


    Listing 14-6

    Oracle 12.1.0.2 DBA View Count

    ```


    In Oracle 12.2.0.1, there are 2,022 DBA_ views. So how can we find the view that
    can get us the information we need? Thankfully, Oracle creates a data dictionary
    view that gives us a description of data dictionary views, called DICT, which
    is short for Dictionary. When I am having a hard time remembering which view contains
    the information I seek, I will query DICT to see what it provides. DICT has two
    columns, the table name and a comment. The word “table” is erroneous because it
    most likely refers to a view, not a real table.


    I often use wildcards in my searches since I may not know the real name. For example,
    if I want to know which views start with DBA and contain the word INDEX, I would
    issue a query similar to Listing [14-7](#467924_1_En_14_Chapter.xhtml#PC7).


    ```

    SQL> select * from dict where upper(table_name) like ''DBA%INDEX%'';

    TABLE_NAME                COMMENTS

    ------------------------- ---------------------------------------------

    DBA_INDEXES               Description for all indexes in the database

    DBA_INDEXTYPES            All indextypes

    DBA_INDEXTYPE_ARRAYTYPES  All array types specified by the indextype

    DBA_INDEXTYPE_COMMENTS    Comments for user-defined indextypes

    DBA_INDEXTYPE_OPERATORS   All indextype operators

    DBA_PART_INDEXES

    DBA_XML_INDEXES           Description of all XML indexes in the database

    7 rows selected.

    Listing 14-7

    Index Views

    ```


    Hopefully, one of the seven rows contains the dictionary view I am interested
    in. I may also query the COMMENTS column. In the example in Listing [14-8](#467924_1_En_14_Chapter.xhtml#PC8),
    querying the TABLE_NAME column did not give me a list of views that describe materialized
    views, but querying the COMMENTS column did.


    ```

    SQL> select * from dict where upper(table_name) like ''%MATERIALIZED%'';

    no rows selected

    SQL> select * from dict where upper(comments) like ''%MATERIALIZED%'';

    TABLE_NAME             COMMENTS

    ---------------------- --------------------------------------------------

    DBA_BASE_TABLE_MVIEWS  All materialized views with log(s) in the database

    DBA_MVIEWS             All materialized views in the database

    Listing 14-8

    Materialized Views

    ```


    I can see that DBA_MVIEWS contains information on the materialized views in the
    database. I can also see why it was not found when I queried the table name. The
    output above was trimmed for brevity as it returned 42 rows in my database.


    Querying DICT is a great way to figure out what data dictionary views are at your
    disposal. The other way is to read the *Database Reference*.'
  trans: '

    ### DBA_、ALL_、USER_ 与 CDB_


    大多数静态数据字典视图以 `DBA_`、`ALL_` 或 `USER_` 开头。其后跟随的部分通常在三个视图中都可见。我们已经讨论过 `DBA_TABLES`，但也有
    `ALL_TABLES` 和 `USER_TABLES` 视图。这三个视图都允许我们查询数据字典以获取有关表的信息。不同之处在于我们可以从这些视图中看到的信息范围，如下所列：


    *   `USER_`：这些视图用于我们拥有的对象。

    *   `ALL_`：这些视图用于我们拥有且有权限访问的对象。

    *   `DBA_`：这些视图用于整个数据库。

    *   `CDB_`：这些视图用于 Oracle 多租户。`CDB_`视图显示与其对应的`DBA_`视图相同的信息，但范围是所有可插拔数据库。


    从以上列表，我们可以正确推断出：`USER_TABLES` 显示我们拥有的表；`ALL_TABLES` 显示我们拥有且有权限访问的表；`DBA_TABLES`
    显示整个数据库中的所有表。在清单 [14-4] 中，我们可以看到每个视图显示了我们在这些类别中可以看到的表的数量。


    ```sql

    SQL> select count(*) From dba_tables;

    COUNT(*)


    SQL> select count(*) from all_tables;

    COUNT(*)


    SQL> select count(*) from user_tables;

    COUNT(*)


    Listing 14-4

    Table Counts

    ```


    发出上述 SQL 语句的用户只拥有一个表。他们可以访问 23,048 个表，整个数据库中有 23,048 个表。`ALL_TABLES` 和 `DBA_TABLES`
    显示相同数量表的原因是因为发出清单 [14-4] 中查询的用户是 `DBA` 用户。他们可以访问数据库中的所有表。考虑清单 [14-5] 中那个不是 `DBA`
    用户的用户。


    ```sql

    SQL> select count(*) From dba_tables;

    select count(*) From dba_tables

    *

    ERROR at line 1:

    ORA-00942: table or view does not exist

    SQL> select count(*) from all_tables;

    COUNT(*)


    SQL> select count(*) from user_tables;

    COUNT(*)


    Listing 14-5

    Table Counts Non-DBA User

    ```


    在上面的代码中，该用户拥有 5 个表并可以访问 4,360 个表。对 `DBA_TABLES` 的查询返回错误，因为该用户无权访问该视图。


    需要注意的是，`USER_` 视图不包含名为 `OWNER` 的列。可以理解为，这些视图的输出归查询该视图的用户所有。`ALL_` 和 `DBA_` 表通常有一个
    `OWNER` 列（在适用的情况下）。


    作为一名 `DBA`，我经常查询 `DBA_` 视图。非 `DBA` 用户很少查询 `DBA_` 视图。我从不查询 `ALL_` 视图，因为作为 `DBA`，它们通常返回与相应
    `DBA_` 视图相同的信息。


    由于本书是面向数据库管理员的，代码将使用 `DBA_` 视图。如果你在*数据库参考手册*中查找 `DBA_` 视图，它很可能会引导你转到相应的 `ALL_`
    视图。这不是问题，因为 `DBA_` 和 `ALL_` 视图显示相同的内容，只是范围不同。唯一的区别是返回哪些行，这取决于查询视图的用户。


    ### DICT


    有大量的 `DBA_` 视图可供查询。多到可能很难找到你需要的那一个。每个新版本都会带来更多静态数据字典视图。在清单 [14-6] 中，我们可以看到一个 Oracle
    12.1.0.2 数据库中 `DBA_` 视图总数的计数。


    ```sql

    SQL> select count(*) From dba_objects where object_name like ''DBA_%'' and object_type="VIEW";

    COUNT(*)


    Listing 14-6

    Oracle 12.1.0.2 DBA View Count

    ```


    在 Oracle 12.2.0.1 中，有 2,022 个 `DBA_` 视图。那么我们如何找到能提供所需信息的视图呢？值得庆幸的是，Oracle 创建了一个数据字典视图，名为
    `DICT`（Dictionary 的缩写），它为我们提供数据字典视图的描述。当我很难记住哪个视图包含我想要的信息时，我会查询 `DICT` 来看看它提供了什么。`DICT`
    有两列：表名和注释。“表”这个词是错误的，因为它很可能指的是一个视图，而不是真正的表。


    我经常在搜索中使用通配符，因为我可能不知道确切的名称。例如，如果我想知道哪些视图以 `DBA` 开头并包含单词 `INDEX`，我会发出类似清单 [14-7]
    的查询。


    ```sql

    SQL> select * from dict where upper(table_name) like ''DBA%INDEX%'';

    TABLE_NAME                COMMENTS

    ------------------------- ---------------------------------------------

    DBA_INDEXES               Description for all indexes in the database

    DBA_INDEXTYPES            All indextypes

    DBA_INDEXTYPE_ARRAYTYPES  All array types specified by the indextype

    DBA_INDEXTYPE_COMMENTS    Comments for user-defined indextypes

    DBA_INDEXTYPE_OPERATORS   All indextype operators

    DBA_PART_INDEXES

    DBA_XML_INDEXES           Description of all XML indexes in the database

    7 rows selected.

    Listing 14-7

    Index Views

    ```


    希望这七行中的一行包含我感兴趣的数据字典视图。我也可能查询 `COMMENTS` 列。在清单 [14-8] 的示例中，查询 `TABLE_NAME` 列没有给我描述物化视图的视图列表，但查询
    `COMMENTS` 列却可以。


    ```sql

    SQL> select * from dict where upper(table_name) like ''%MATERIALIZED%'';

    no rows selected

    SQL> select * from dict where upper(comments) like ''%MATERIALIZED%'';

    TABLE_NAME             COMMENTS

    ---------------------- --------------------------------------------------

    DBA_BASE_TABLE_MVIEWS  All materialized views with log(s) in the database

    DBA_MVIEWS             All materialized views in the database

    Listing 14-8

    Materialized Views

    ```


    我可以看到 `DBA_MVIEWS` 包含数据库中物化视图的信息。我也可以明白为什么在查询表名时没有找到它。上面的输出为了简洁而被截断了，因为在我的数据库中它返回了
    42 行。


    查询 `DICT` 是了解有哪些数据字典视图可用的好方法。另一种方法是阅读*数据库参考手册*。

