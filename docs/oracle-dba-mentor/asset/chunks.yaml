  trans: '## SQL 开发人员


    虽然 SQL*Plus 是一款出色的命令行工具，但我们通常生活在图形用户界面（GUI）世界中。可以将 SQL Developer 视为 GUI 形式的 SQL*Plus。Oracle
    的 SQL Developer 产品团队的主要目标是让你的工作更轻松。这款工具对于 Oracle 应用程序开发人员和数据库管理员来说都非常适用。最棒的部分是，SQL
    Developer 是免费使用的。


    当你在服务器上安装 Oracle 数据库软件时，它会附带一个 SQL Developer 副本。但这个副本几乎可以肯定是过时的，因此你应该下载最新最好的版本。将你的网页浏览器指向
    [`http://otn.oracle.com`](http://otn.oracle.com)，然后像你下载 Oracle 数据库软件时那样，点击“必备链接”部分中的“软件下载”。在下一个屏幕中，SQL
    Developer 列在“开发人员工具”下，尽管它严格来说并不是一个软件开发产品。点击 SQL Developer，你将被带到下载屏幕。你需要点击单选按钮以接受许可协议。如果要求进行身份验证，请使用与你下载
    RDBMS 软件时相同的 Oracle 单点登录凭据。如果我是在为 Windows 下载，我总是会选择包含 Java 开发工具包（JDK）的版本。对于其他平台，你必须自行提供
    JDK。


    下载文件是一个 zip 压缩包。无需安装。只需将文件解压缩到某个目录即可。在软件文件夹中，你会看到 `sqldeveloper` 可执行文件。运行该文件，SQL
    Developer 就会启动。在本章前面，我们确保了我们有能力将工作站上的工具连接到我们虚拟机测试平台中的数据库。在本节中，我们将使用 SQL Developer
    来完成这一操作。


    如果你是第一次启动 SQL Developer，你应该会看到一个起始页。此页面包含一个“概述视频”链接以及许多教程和演示的链接。起始页只列出了三个教程和演示，但有一个链接指向更多在线内容。我强烈建议你花时间学习这些内容，因为它们能比这本书更详尽地解释
    SQL Developer 的功能。起始页还包含一个指向 SQL Developer 文档的链接。


    在你能够与数据库交互之前，你需要创建一个连接。在“连接”选项卡中（如图 11-3 所示），你可以看到我有三个文件夹来更好地组织我的连接。


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig3_HTML.jpg](img/467924_1_En_11_Fig3_HTML.jpg)


    图 11-3 SQL Developer 中的连接


    点击绿色的加号图标以创建新的数据库连接。将弹出一个屏幕，你需要在其中填写所有相关详细信息，如图 11-4 所示。


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig4_HTML.jpg](img/467924_1_En_11_Fig4_HTML.jpg)


    图 11-4 SQL Developer 连接详细信息


    连接需要一个名称。我通常使用 *数据库名 _ 用户名* 的形式，但你可以自由使用任何对你有用的命名约定。输入用户名和密码。如果你不想每次都被提示输入密码，请勾选“保存密码”框，但前提是这台机器没有与他人共享。你可以使用“连接颜色”设置来直观地定义你的连接窗口。如果这是到生产数据库的连接，我通常会选择红色。当我打开到生产数据库的连接时，SQL
    Developer 会在窗口周围画一条红线。在“连接”选项卡中的名称也会显示为红色。这种视觉指示器有助于提醒我要小心，因为我的操作是在生产环境中，而不是在开发或测试环境中。


    在图 11-4 的示例中，我选择了“基本”连接类型。如果你安装了 Oracle Client，并且定义了一个 TNS 别名，你可以将“连接类型”更改为“TNS”，然后选择该别名。由于我的连接是“基本”类型，我必须提供主机名、端口和服务名。输入所有信息后，点击“测试”按钮。如果出现错误，可能是由于虚拟机上运行的防火墙导致的。在我们测试平台虚拟机中，以
    root 用户身份，在终端窗口中执行清单 11-12 中的以下命令以禁用防火墙。


    ```

    systemctl stop firewalld

    systemctl disable firewalld

    ```

    清单 11-12 禁用 Linux 防火墙


    连接成功测试后，点击“保存”按钮。双击连接将打开它并调出一个工作表。我们可以输入任何 SQL 语句，然后点击绿色的播放按钮（或按 `Ctrl-Enter`）来运行该语句，示例如图
    11-5 所示。


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig5_HTML.jpg](img/467924_1_En_11_Fig5_HTML.jpg)


    图 11-5 在 SQL Developer 中运行 SQL 语句


    可以通过点击“运行脚本”按钮（或按 `F5`）来连续执行多个语句。“运行脚本”按钮位于绿色播放按钮的旁边。它看起来像一页文本，左下角有一个绿色的播放箭头。


    在“查询结果”窗口中，可以按任何列对结果进行排序。如果你想保存结果，以免被下一次语句执行覆盖，请点击红色的图钉图标。下一次语句执行将在不同的结果选项卡中显示。


    SQL Developer 的 Oracle 产品经理是 Jeff Smith。他在 [`www.thatjeffsmith.com`](http://www.thatjeffsmith.com)
    上维护着一个博客，我强烈建议你将此页面加入书签。新版本会在此博客上发布。每次有新版本发布时，你都可以找到讨论新功能的博客文章，甚至可以看到它们的实际操作演示。


    我发现我每天越来越多地使用 SQL Developer。这款产品是 Oracle 开发出的最实用的工具之一。像任何有价值的工具一样，它只是让我的工作更轻松。花些时间来学习如何利用这个工具吧。'
- fmt: '## Oracle Enterprise Manager


    Included in your Oracle database license is the Oracle Enterprise Manager (EM)
    product. When Enterprise Manager was first created, it was a Java-based application
    the DBA ran on their workstation. They could connect it to an Oracle database
    and point and click their way through many administration tasks. As with any product,
    EM has matured over time. Today’s EM product is now web-based and runs either
    the database server or some other centralized machine.


    Enterprise Manager comes in two forms, either Enterprise Manager Database Express
    or Enterprise Manager Cloud Control. `EM DB Express` can be created when you create
    an Oracle database and can be used only to manage that database. If you need to
    manage a second database, you can set up a second `EM DB Express` instance. It
    should be obvious that if you have more than a few Oracle databases to manage,
    your `EM DB Express` instances will start to grow in number. Each has a different
    URL, so more databases means more `EM DB Express` URLs to bookmark. `EM Cloud
    Control (EM CC)` is a centralized management platform for any number of databases.
    Use `EM CC` if your Oracle infrastructure starts to grow. For the rest of this
    section, we will refer to just Enterprise Manager or EM, when we are talking about
    either `EM DB Express` or `EM CC`.


    Enterprise Manager lets you manage your Oracle database. For example, you can
    see details about your tablespaces and create new ones, delete old ones, or add
    data files. We can see a number of tablespaces in EM in Figure [11-6](#467924_1_En_11_Chapter.xhtml#Fig6).


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig6_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig6_HTML.jpg)


    Figure 11-6

    EM tablespaces


    Enterprise Manager can monitor your databases and, if it spots something wrong,
    it can page or e-mail the database administrator to let them know there is an
    issue that needs their attention. If desired, the DBA can create a fix-up job
    so that the next time EM spots the issue, it can automatically take corrective
    action.


    One of the downsides to Enterprise Manager is that it makes it too easy to violate
    your license agreements. For example, if you are managing a database with EM and
    you go to the Performance home page, you can get a nice-looking chart showing
    the current performance of the Oracle instance. An example is shown in Figure
    [11-7](#467924_1_En_11_Chapter.xhtml#Fig7).


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig7_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig7_HTML.jpg)


    Figure 11-7

    EM Performance page


    Nowhere on this screen does it tell you that to access the page, you need to be
    licensed for the optional Diagnostics Pack. If you are on the Performance home
    page, you can go to `Setup ➤ Management Packs ➤ Packs for this Page` and determine
    which optional packs you need to license to use that page. You can see in Figure
    [11-8](#467924_1_En_11_Chapter.xhtml#Fig8) that this page requires the Diagnostics
    Pack to be licensed.


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig8_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig8_HTML.jpg)


    Figure 11-8

    Management Packs for this Page screen


    However, if you are not licensed for this optional product, by now it is too late.
    Once you hit the page, Oracle will write an entry to a database table indicating
    that you have used this optional product. If you are audited by Oracle, they will
    discover you have used a product the organization has not paid for.


    To stop unintended pack usage, go to `Setup ➤ Management Packs ➤ Management Pack
    Access`. On that page, uncheck the boxes for the products you are not licensed
    to use. It would be better if EM asked before using one of these pages to validate
    you are licensed for the product, but it does not do so.


    ## Showing the SQL


    Enterprise Manager is an excellent product, especially for newer database administrators
    that need to point and click their way to completing administration tasks. Like
    most administration tools, the interface removes the intricate details from you.
    The tools asks you a few questions, and with a click of the button, the task is
    complete. Unfortunately, the database administrator does not learn as much living
    by the point-and-click nature of any GUI tool.


    In the example in Figure [11-9](#467924_1_En_11_Chapter.xhtml#Fig9), the database
    administrator is creating a new tablespace. All that is needed is to click the
    OK button and the task is complete.


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig9_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig9_HTML.jpg)


    Figure 11-9

    EM Create Tablespace screen


    Instead of clicking the OK button, you can click the `Show SQL` button and Enterprise
    Manager will show you the exact SQL statement, similar to Figure [11-10](#467924_1_En_11_Chapter.xhtml#Fig10).


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig10_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig10_HTML.jpg)


    Figure 11-10

    EM Show SQL screen


    Many tools have the ability to show you the SQL statement they will be issuing
    on your behalf. The GUI tools cannot do any magic. All they are doing is asking
    you questions and formulating SQL statements based on how you fill in the blanks.
    The tool then submits the SQL statement to the database engine and waits for a
    reply. All of this is done behind the scenes for you.


    Using this `Show SQL` button is a great way to learn more about the SQL statements
    and how they work. For example, if I click the Return button shown in Figure [11-10](#467924_1_En_11_Chapter.xhtml#Fig10)
    and then check the box to make this a bigfile tablespace, I can then see the newly
    formed SQL statement and figure out what has changed.


    ### Tip


    Use the `Show SQL` button, or similar, to see what the tool is doing for you behind
    the scenes.


    The next time you use Enterprise Manager, or a similar tool, spend some time determining
    what SQL statement the tool is issuing for you. Then experiment with changing
    a few options to analyze the impact to that SQL statement. In this way, you are
    letting the tool teach you more about SQL statements as they pertain to the task
    at hand.


    You can create a tablespace in `SQL Developer` as well. To see the SQL statement
    that `SQL Developer` is sending to the database, click the `DDL` tab, shown in
    Figure [11-11](#467924_1_En_11_Chapter.xhtml#Fig11).


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig11_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig11_HTML.jpg)


    Figure 11-11

    SQL Developer DDL tab


    Experimentation with finding the exact SQL statement the tool is sending to the
    database is a great way to learn more about database administration.


    I will also use this “show SQL” feature to help craft my SQL statement. If I’m
    having problems getting the syntax right and need some help, I’ll walk through
    the tool’s wizard and then see where I went wrong. I am not forced to run this
    statement through the tool. I can copy and paste the SQL statement into `SQL*Plus`
    or `SQL Developer`.


    The tools will only do what the tools were designed to do. You will run into a
    few occasions where the tool does the majority of what you want but not the rest.
    You can obtain the SQL statement from the tool and then copy over to `SQL Developer`.
    From there, you can fill in the rest and be on your way. If the tool cannot complete
    the exact task, see if the tool can give you a start by showing you the SQL of
    what it can do.'
