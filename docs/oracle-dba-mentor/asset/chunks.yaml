- fmt: '## Reasons to Upgrade


    I have met a number of database administrators that are afraid to upgrade their
    Oracle databases to a newer version. The most common reason for refusing to upgrade
    is the mantra, “If it ain’t broke, don’t fix it.” Everything is working fine with
    their current configuration and the system is critical, so they choose to just
    leave it be. Their mindset is that upgrading any database always incurs a certain
    amount of risk, and the issues that could arise after an upgrade make upgrading
    not worth it. The inverse is true—the benefit far outweighs the risk. There are
    many reasons why you should upgrade your Oracle database, even if everything is
    working great today. This section will detail a number of reasons to upgrade your
    Oracle database, in no particular order.


    As we saw in Chapter [17](#467924_1_En_17_Chapter.xhtml), security patches released
    on a quarterly basis are available only for fully supported versions. At the time
    of writing, the patches are available only for the `11.2.0.4`, `12.1.0.2`, `12.2.0.1`,
    and `18` versions. If your Oracle database is not on this list, you have security
    holes that will never be plugged. While the database and its application may be
    running just fine, a hacker will love to exploit your approach. Always be on a
    supported version to obtain the security patches and make your database environment
    as secure as it can be.


    Oracle Support may also request that you upgrade to a supported version if you
    file a service request. If you are running on an unsupported version, the support
    analyst’s favorite response is to upgrade and check to see if the problem still
    exists. Bugs are fixed all the time, and why should the analyst waste any time
    tracking down your issue if it is a known bug that has already been fixed? The
    analyst is hoping that the database upgrade will resolve the problem and they
    can close the ticket with minimal effort on their part.


    Your company has likely paid for an Oracle Support contract. Upgrades are part
    of this contract. If you do not upgrade your databases, you are overpaying for
    support. You already paid for the newer database version, so enjoy it. That being
    said, there is one reason to refuse to upgrade your Oracle database. If you do
    not have a paid support contract, then upgrading to a newer version may land you
    in legal trouble with Oracle Corporation. If your support contract ends, you cannot
    upgrade to a version that was released after that contract expired. If you do
    not have a support contract, do not upgrade. If you do not have a support contract,
    this database must not be very important to the company.


    Your new database version has many new features. When you upgrade, many new features
    are available to you. While it may take a good amount of effort to complete an
    Oracle upgrade, these new features are often great time savers. Some new features
    reduce the workload on database administrators. Others may shorten application
    development time. New features can let you move your database architecture in
    a different direction that benefits the organization’s needs.


    It is crazy the number of times I see people on discussion forums ask how to install
    a very old Oracle version on a new operating system. Oracle versions are certified
    for different OS platforms, and Oracle Corporation is not going to make the effort
    to ensure that the very old Oracle `8.0.5` version will work on Windows Server
    2016, a much newer operating system. System administrators have no problems replacing
    hardware on a regular basis after the server has passed its warranty period. When
    hardware is replaced, admins often use the hardware replacement as a time to upgrade
    the operating system as well. If your company is replacing older hardware, as
    it should, the DBA should be upgrading Oracle as well, as they should.


    As we will see later in this chapter, you can perform direct upgrades to a newer
    Oracle version from a limited subset of older versions. For example, you cannot
    directly upgrade an Oracle `7.3.4` database to Oracle `12.2.0.1` no matter how
    hard you try. You will have to upgrade to an intermediary version. If your database
    is very old, you may need multiple upgrades. The more upgrades you must complete
    before you reach your final version, the harder it may be to track down any upgrade
    issues. Was it the first, second, or third upgrade that caused your problem? If
    you are keeping current on your Oracle versions, the upgrades are less painful.


    In addition to support from Oracle, and to maintain a certified combination with
    your operating system, the database administrator also needs to be mindful of
    the support from application vendors. Third-party applications are certified for
    specific database versions. If you want to upgrade an application, you may need
    to upgrade the database to keep pace. Sadly, too many application vendors lag
    behind the most current Oracle versions. I frequently hear database administrators
    complain they cannot upgrade their database because the application vendor has
    yet to support it, even if the Oracle version was released years ago! If your
    application vendor is very behind the current Oracle versions, you might want
    to reconsider your future business with that vendor.


    In Chapter [16](#467924_1_En_16_Chapter.xhtml), we discussed how to interact with
    Oracle professionals from around the world through social media. Many of these
    people are very willing to help you resolve your Oracle problems and teach you
    more about the Oracle database. While many have worked with Oracle for a very
    long time, please do not expect them to remember the exact details of the very
    old versions. I have worked with Oracle since the `7.1` version, but I remember
    very little about it other than what still holds true in today’s versions. I barely
    remember the intimate details that are specific to the Oracle `9.2` version. I
    will answer questions on discussion forums, but I am not going to be as helpful
    as you might want if your version is old. I have become adept at looking things
    up in the Oracle documentation, but I am not going to dig up an old documentation
    set, just to answer one question. I am more likely to respond, as politely as
    I can, to upgrade to a newer version. Oracle professionals that help you are doing
    so voluntarily. Very few of them are paid to provide you that service, so help
    them help you by keeping your version up to date.


    Hopefully this section has helped convince you to upgrade your databases. You
    do not need to upgrade the moment a new version has been released, and it is perfectly
    acceptable to skip a version once in a while. For example, I have many production
    databases that are running Oracle `12.1.0.2` but will upgrade to Oracle `18.3`,
    skipping the `12.2.0.1` version. It is my best practice to skip at most one version.
    I will not go from the `12.1.0.2` version to `19c`, even if it is possible. The
    risks of skipping two versions, `12.2` and `18`, are too great.


    ## Upgrade and New Features Guides


    Whenever a new Oracle version is released, there are two books that are a must
    read, cover to cover. Chapter [13](#467924_1_En_13_Chapter.xhtml) discussed the
    Oracle documentation set. By now, you know how to access it, so I will skip those
    details in this chapter.


    The `Database Upgrade Guide` contains information on how to upgrade to the new
    version. This book contains instructions on how to upgrade your database. You
    must read this so that you reduce your chances of error during the upgrade process.
    This chapter will cover material you will find in that book, but you must still
    read it anyway. If you have performed many database upgrades and a new version
    comes out, read the new version’s `Upgrade Guide`. Oracle changes the upgrade
    process all the time. Most of the upgrade process is the same, but they will throw
    in a few different changes here and there. The `Upgrade Guide` contains the details
    you need to know for a successful upgrade.'
