  trans: '

    ## PL/SQL 包与类型参考


    *Oracle Database PL/SQL Packages and Types Reference*（Oracle 数据库 PL/SQL 包与类型参考）这份文档常常被忽视，这就是我在此提及它的原因。随着你在
    Oracle DBA 职业生涯中不断进步，你将越来越多地使用 Oracle 为我们提供的各种 PL/SQL 包。到现在为止，你可能已经用过其中几个了。Oracle
    提供的包名以“`DBMS_`”开头。你可能接触过 `DBMS_SCHEDULER` 或 `DBMS_OUTPUT` 等。这份参考文档详细介绍了 Oracle
    开箱即用的每一个包。


    这份参考文档概述了每个包的用途、通过 API 暴露给我们的数据类型和常量列表，以及任何使用说明。当我们遇到权限问题时，正是这些使用说明能帮上忙。你可能拥有执行某个
    PL/SQL 包的权限，但也可能需要其他权限。例如，如果你尝试使用 `DBMS_STATS` 包来执行 `GATHER_TABLE_STATS` 却遇到权限错误，这份参考文档会告诉你，你需要是该表的所有者，或者拥有
    `ANALYZE ANY` 系统权限。


    花些时间浏览这份参考文档。显然，你无法记住这本书的全部内容。下次当你使用 Oracle 提供的 PL/SQL 包时，花点时间在这本书里查找该包，了解更多相关信息。如果你在使用某个自带的
    PL/SQL 包时遇到问题，可以在这份参考文档中查找，看看是否能解决问题。


    ## 书库


    当我们访问某个版本的文档集时，Oracle 会贴心地为我们提供不同的分类，就像本章中我们一直在看的“管理”分类。有时，我们很难找到想要的书，因为我们无法确定正确的分类。如果我们位于
    Oracle 数据库文档的主着陆页，在“主题”列表下方有一个名为“访问我们的书库”的部分，如图 13-9 所示。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig9_HTML.jpg](img/467924_1_En_13_Fig9_HTML.jpg)


    图 13-9：“浏览书库”链接


    如果你已经选择了一个主题，相同的链接也会出现在左侧，主题列表下方。在图 13-10 中，你可以看到我选择了“管理”主题，其下方是“图书”链接。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig10_HTML.jpg](img/467924_1_En_13_Fig10_HTML.jpg)


    图 13-10：“图书”链接


    无论你如何到达那里，你都会被带到该 Oracle 数据库版本对应的完整图书列表。图 13-11 展示了其中一部分图书（该页面比图中显示的要长得多）。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig11_HTML.png](img/467924_1_En_13_Fig11_HTML.png)


    图 13-11：Oracle Database 18c 图书


    如果你滚动浏览图书列表，会发现它们是按字母顺序排列的。如果你找不到想要的书，可以来到这个所有图书的列表页，在浏览器中按 `Ctrl-F` 调出文本搜索框，输入关键词进行简单搜索。大多数浏览器使用
    `Ctrl-F` 来调出文本搜索窗口。如果我要找一本关于 JSON 或多租户的书，通过搜索这些词就能轻松找到。


    读一读这些书的标题是个好主意，这样你就知道有什么内容。你不必通读这些书，最多只需快速浏览一下。再次强调，本章的全部重点是学习如何导航文档集，了解什么内容在哪里，以便将来更容易找到你需要的东西。如果你看到一个有趣的书名，可以点击“显示详细信息”链接，获取一两句描述该书内容的文字。


    ## 其他书籍


    我想通过非常高层次地讨论几本其他的 Oracle 文档书来结束本章，这些书可能在你 Oracle 职业生涯进阶过程中对你很重要。花些时间研究一下这些书，了解它们包含的内容。将来某个时候，你很可能会阅读这个列表中的大部分书籍。


    *   `自动存储管理用户指南`：如果你为 Oracle 数据库使用 ASM，你需要参考本指南来了解如何在存储中操作文件。

    *   `数据库新特性指南`：如本章前面提到的，当新版本发布时，这是我首先阅读的内容。它向你展示了该版本的新特性。如果你刚刚起步，一切都是新的。将来某个时候，你会升级到更高的版本，而这本书会让你知道可以期待什么。

    *   `数据库安全指南`：每个人都需要保护他们的数据库。本书在第 8 章中有介绍，提供了大量关于该主题的精彩细节。

    *   `数据库实用程序`：学习如何使用数据泵来导出和导入数据。学习如何使用 SQL*Loader 和外部表将数据从文本文件移入数据库，以及反向操作。

    *   `多租户管理员指南`：Oracle 已声明多租户是 Oracle 未来的方向。届时，所有 Oracle 数据库将至少包含一个租户。即使你只有一个租户，也可以使用本指南来学习如何管理多租户特性。

    *   `网络服务管理员指南`：本书向你展示如何配置 Oracle 网络。

    *   `SQL 调优指南`：本书面向性能调优，但侧重于如何编写性能良好的 SQL 语句。


    这个列表并非详尽无遗。你肯定还需要阅读其他书籍。许多书籍涉及你可能需要使用的特性，如 Oracle Text 或真正应用集群。如果你不使用这些特性，可以跳过那些书。云技术正开始要求我们投入更多关注，Oracle
    也有关于其云数据库服务的文档（点击 [`https://docs.oracle.com`](https://docs.oracle.com) 处的“云”按钮）。


    ## 继续前进


    对于新手来说，阅读 Oracle 文档并不是你愿意做的事情。在你职业生涯早期，由于其庞大的篇幅，甚至可能有点吓人。希望读完本章后，你不再对其体量感到畏惧。你应该已经了解了对职业生涯至关重要的关键书籍。你正在熟悉这些书中呈现的信息、格式和结构。你应该感到兴奋，因为你现在接触到了一个知识宝库。仅仅阅读这些书籍就能保证提升你的技能。深入钻研这些书，实践讨论的概念，并在测试环境中演练各项功能，这将比其他任何方式都能更好地增长你的
    Oracle 知识。


    我所遇到的每一位优秀的 Oracle DBA，都花费了大量时间不仅阅读文档，而且学习如何最大限度地利用它。记住，记住你读过的一切并不重要。重要的是了解什么内容在哪里，这样将来你可以再次查阅。像任何事情一样，你做得越多，它就变得越容易，所以从今天开始使用
    Oracle 文档吧。


    “了解内容在哪里”这条规则有两个例外：`概念指南`和`管理员指南`。我认为这两本指南是必读的。在你读完本书后，我强烈建议你阅读这两本指南。它们就是如此重要。


    在下一章中，我们将了解更多关于数据字典的知识。我们将探索如何向 Oracle 数据库询问关于它自身的问题。毕竟，市面上没有哪本书能 100%确定地告诉你 DBA
    将数据文件放在了磁盘的哪个位置，或者哪个用户拥有名为 `RPT30_180101` 的表。对于这类问题，我们需要询问数据字典。

    '
- fmt: '# 14. `Data Dictionary`


    In the previous chapter, we discussed the Oracle documentation set. Hopefully
    you have had a chance to explore the documentation so that it is becoming more
    familiar to you, and thus much more useful to you as well. In this chapter, we
    turn to a different type of documentation, the data dictionary. We will also examine
    some of the various dynamic performance views at our disposal.


    The documentation we will see in this chapter is in every one of your Oracle databases.
    It can tell you more about your database than any book can. Every database engine,
    Oracle, SQL Server, Postgres, etc., has some sort of data dictionary.


    Everything in this chapter is documented in the *Oracle Database Reference* for
    your specific version. The *Oracle Database Reference* was not mentioned in the
    previous chapter about the Oracle documentation set because we would be mentioning
    it here. If you ever have a question about any of the views you see here, feel
    free to explore more in the *Database Reference*. Take a moment to skim through
    this book to see how it is laid out.


    ## Data Dictionary


    Every database engine worth using has some form of a data dictionary. Sometimes
    it will be referred to as a *catalog, system catalog,* or a *data repository*.
    When Edgar Codd pioneered the rules for relational databases, one of those rules
    dictated a relational catalog be created. How each database engine implements
    the data dictionary will vary, but they all have it in some form or another.


    So what is a data dictionary? The most common answer is that the data dictionary
    is metadata about the data itself. Basically, the data dictionary contains the
    information you may need to read to know more about what is in your database.


    No matter how the data dictionary is implemented, you interact with it the same
    way you would interact with any other database table. You query it. In Oracle,
    you query the data dictionary through `SQL` statements. Some database engines
    give you stored procedures to execute. The manner in which you get information
    out of the data dictionary is the same means you can use for the rest of your
    application data.


    The curious thing is that the data dictionary is also updated the same way you
    update data in your application tables. When you create a table, Oracle performs
    an `INSERT` statement into a data dictionary table that contains a list of all
    tables in the database. Oracle inserts other rows into another table that contains
    a list of all columns of all tables in the database. Oracle interacts with the
    data dictionary in the same manner you would interact with your tables.


    You should never directly modify the data in the data dictionary tables yourself.
    Doing so may cause data dictionary corruption and leave your database in an inoperable
    state. Let the database engine update the data dictionary for you. You should
    only ever query the data dictionary.


    ## Base Tables


    The data dictionary is composed of a number of base tables. There are over a thousand
    base tables in today’s Oracle versions. All the base tables are owned by the `SYS`
    user. It is common to hear that `SYS` is the data dictionary or that `SYS` owns
    the data dictionary. Without the data dictionary, the database is not operable,
    so it must be protected at all times. That being said, it is fun to explore these
    base tables and see what they contain. I should also mention that we almost never
    query the base tables directly. Rather, we use the data dictionary views that
    Oracle has supplied for us. As we will see in this section, the information in
    the base tables can be cryptic and may be difficult or impossible to decipher.
    Oracle does not publish much information about the base tables. However, it is
    fun to start exploring Oracle database internals and seeing how the database works
    under the covers.


    Let’s look at one of these base tables. The `SYS.TAB$` table contains a list of
    all tables in the database. It is common to see the dollar sign in the base table
    names. In Listing [14-1](#467924_1_En_14_Chapter.xhtml#PC1), we can see a description
    of the `SYS.TAB$` table.


    ```

    SQL> desc sys.tab$

    Name                       Null?       Type

    --------------------------- ----------- --------------

    OBJ#                       NOT NULL    NUMBER

    DATAOBJ#                               NUMBER

    TS#                        NOT NULL    NUMBER

    FILE#                      NOT NULL    NUMBER

    BLOCK#                     NOT NULL    NUMBER

    BOBJ#                                  NUMBER

    TAB#                                   NUMBER

    COLS                       NOT NULL    NUMBER

    CLUCOLS                                NUMBER

    PCTFREE$                   NOT NULL    NUMBER

    PCTUSED$                   NOT NULL    NUMBER

    INITRANS                   NOT NULL    NUMBER

    MAXTRANS                   NOT NULL    NUMBER

    FLAGS                      NOT NULL    NUMBER

    AUDIT$                     NOT NULL    VARCHAR2(38)

    ROWCNT                                 NUMBER

    BLKCNT                                 NUMBER

    EMPCNT                                 NUMBER

    AVGSPC                                 NUMBER

    CHNCNT                                 NUMBER

    AVGRLN                                 NUMBER

    AVGSPC_FLB                             NUMBER

    FLBCNT                                 NUMBER

    ANALYZETIME                            DATE

    SAMPLESIZE                             NUMBER

    DEGREE                                 NUMBER

    INSTANCES                              NUMBER

    INTCOLS                    NOT NULL    NUMBER

    KERNELCOLS                 NOT NULL    NUMBER

    PROPERTY                   NOT NULL    NUMBER

    TRIGFLAG                               NUMBER

    SPARE1                                 NUMBER

    SPARE2                                 NUMBER

    SPARE3                                 NUMBER

    SPARE4                                 VARCHAR2(1000)

    SPARE5                                 VARCHAR2(1000)

    SPARE6                                 DATE

    Listing 14-1

    SYS.TAB$ Base Table

    ```


    Some of the column names in this base table make sense if you have spent any time
    creating Oracle tables. We can see `PCTFREE$`, `INITRANS`, and `DEGREE`, all of
    which are options you can specify at table creation time. One thing that is absent
    is the table’s owner and name. To know that piece of information, we have to look
    at the base table describing all database objects, `SYS.OBJ$`. We can see a description
    of `SYS.OBJ$` in Listing [14-2](#467924_1_En_14_Chapter.xhtml#PC2).'
