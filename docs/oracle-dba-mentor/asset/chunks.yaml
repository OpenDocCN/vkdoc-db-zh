    Springer Science+Business Media New York（地址：233 Spring Street, 6th Floor, New
    York, NY 10013；电话：1-800-SPRINGER；传真：(201) 348-4505；电子邮件：orders-ny@springer-sbm.com；网址：www.springeronline.com）面向全球图书贸易发行。Apress
    Media, LLC 是加利福尼亚州的有限责任公司，其唯一成员（所有者）是 Springer Science + Business Media Finance
    Inc (SSBM Finance Inc)。SSBM Finance Inc 是特拉华州的一家公司。


    谨以此书献给我的三个儿子：Chay、Jace 和 Jenner


    # 引言


    在我担任 Oracle 数据库管理员的二十多年里，我曾无数次担任导师或被指导者。本书汇集了我所学到的对我有效的方法，以及多年来别人给我的建议和我给予他人的建议。在标准的导师/被指导者关系中，双方通常身处同一地点，通过面对面接触携手合作。当今世界常常要求导师/被指导者关系更为疏远。我们不断地向他人学习如何提升我们的技艺，通常是从那些没有正式师徒关系的陌生人那里。例如，我们可能通过在讨论论坛中给出建议的人获得指导；我们可能通过阅读备受推崇的
    Oracle 专业人士的博客获得指导；我们甚至可能仅仅是通过阅读某人花时间写在书中的建议而获得指导，正如您今天即将开始的那样。感谢您的阅读！


    本书面向那些刚开始其 Oracle 数据库管理员职业生涯的人。即使是拥有几年经验的人，也能在这里找到有用的信息。如果您想晋升到该领域的顶级水平，本书中的信息将助您一臂之力。我知道许多数据库管理员都希望他们当年有这本书来启动他们的职业生涯。非
    Oracle 数据库管理员也会发现本书很有用。除了 Oracle 特有的信息外，本书中的其他建议可用于提升您的职业生涯。通过遵循我在此给出的建议，我能够快速轻松地学会管理
    SQL Server 和其他数据库平台。


    *Oracle DBA 导师*不仅仅教您如何管理 Oracle 数据库。我本可以轻松地写一本只说“做这个，做那个，再做另一个”的书，但那样它就会和市面上所有的其他书一样。本书以及我迄今为止所见过的任何其他书籍的最大区别在于，本书教会您在阅读完成后如何扩展您的知识。当您了解到“这个、那个和另一个”不能解决您的问题后，您下一步该转向哪里？本书会帮助您弄清楚这一点。


    我在本书中大量使用“我”、“你”和“我们”这些词。这种风格是有意为之，因为我希望您感觉我们仿佛身处一个真正的导师/被指导者关系中，尽管我并未亲临现场。在我写下这些文字时，我正直接与您——读者——对话。


    ## 书籍结构


    第 1 章和第 2 章介绍了一些软技能，以帮助您在这份工作中取得成功。对我们许多人来说，这些信息可能已经知道了。但为确保万无一失，我确保您理解数据库管理员最重要的角色是成为数据守护者，并就您在整个职业生涯中如何与他人互动提出了建议。


    在第 3 章到第 8 章中，我们搭建一个测试平台服务器、安装 Oracle、创建一个数据库，并实施安全措施和备份。我们需要这个系统，以便在阅读本书后续章节时能够进行更深入的探索。


    第 9 章到第 12 章向您展示如何使用 Oracle 数据库。大多数书籍会告诉我们连接到 Oracle 数据库的步骤。我们将看到这一切是如何工作的。第 10
    章讨论测试平台和开发测试用例的重要性。我们为自己的用途创建了一个测试平台，现在是时候开始使用它了。使用测试平台是我们帮助自己学习更多 Oracle 知识的第一步。


    第 13 章到第 16 章是本书的核心内容。在这里，您将学习如何在您可能购买的所有 Oracle 书籍中找不到答案的问题时，通过不同途径获取答案。正如您将发现的，我强烈建议您阅读
    Oracle 文档，因为您的大多数答案都写在那里。第 13 章帮助您解锁庞大的文档集。第 14 章探索数据字典，第 15 章解释 My Oracle Support，第
    16 章探讨社交媒体的益处。


    第 17 章到第 19 章帮助我们在系统搭建完成后维护数据库系统。我们在第 17 章探讨如何应用补丁。我们在第 18 章讨论如何升级数据库。第 19 章涵盖容量规划。


    第 20 章和第 21 章结束本书。它们分别概述了 Oracle 架构和高级选项。这里本可以写更多内容。目的是让您了解一些高级概念，以便将来需要相关信息时，您已经有所入门。


    # 致谢


    我将我的第一本书 *Oracle RAC 性能调优* 献给了我已故的父亲。在撰写那本书时，我正在为另外几本书拟定提纲。其中一个想法就是创作这本为数据库管理员提供指导建议的书。市面上有大量书籍教授丰富的入门知识，但除了让您购买另一本书之外，没有一本书教您如何自学
    Oracle。我希望这本书不仅仅是关于入门信息。我希望赋予读者能够掌控自己职业生涯并朝着他们期望的方向成长的工具。Oracle 真应用集群要求 DBA 具备高级技能。同样，Oracle
    性能调优也需要高级技能。将两者结合起来，真正要求您精通自己的技艺。我的第一本书是为经验丰富的 Oracle 老手准备的，而将书献给我生命中经验丰富的影响者——我的父亲，再合适不过了。这本书更偏向入门级别，因此，我将其献给我的三个儿子，Chay、Jace
    和 Jenner。父母最重要的角色莫过于指导他们的孩子成长为有责任感的成年人，并能在这个世界上找到自己的道路。我们无法教会他们成功所需的一切知识，但我们可以赋予他们独立解决问题的技能。将此书献给我的儿子们似乎是自然而然的事。我在他们人生的早期阶段指导他们，这类似于我尝试在专业层面上指导读者。


    我要感谢 Apress 的 Jill Balzano 和 Jonathan Gennick 为本书付出的辛勤工作。我还要感谢 Apress 所有幕后工作人员。


    最好的书籍都有出色的技术审校者来确保作者的诚实。感谢 Mike Donovan 的辛勤工作。他让我思考了一些原稿中没有的想法，这使得本书成为了更好的产品。


    我要感谢任何阅读我作品的人，无论是本书、我为网站或博客撰写的文章，还是我在许多不同论坛上对问题的回答。正如您将在本书后面了解到的，我写了很多东西来助力提升我的职业生涯。您需要阅读更多才能理解。如果没有人阅读我的作品，我就不会写那么多，我的职业成长也会受到影响。所以，感谢阅读。这对我的帮助很大，我希望它也能帮助到您。

    '
- fmt: '### About the Author and About the Technical Reviewer


    ### About the Author


    ### About the Technical Reviewer


    # Part I: Initial Setup


    ## 1. Introduction


    If you have grabbed a copy of this book, you most likely have landed (or are hoping
    to land) a job as an Oracle database administrator (DBA) and are looking for assistance
    on the next steps in your career. There are plenty of books on the market that
    will relate tons of technical information on how the Oracle database works. I
    have many such books in my library. Those books provide a wealth of useful information
    and are great resources.


    As the title of this book indicates, it is intended to serve as a mentor to you
    in your career as a DBA. A mentor is often there to work hand in hand with the
    mentee, guiding their career. I cannot be there by your side, so I figured the
    next best thing to do is to write down the advice and insights I have imparted
    to others over the years. I want this book to feel more personal than a typical
    computer book, more like any other mentor/mentee relationship, so I use words
    like “I” and “we” often. This book will most likely be one of many mentors you
    will have in your career. Many entry-level database administrators work alongside
    a senior-level DBA, who is their primary mentor. This book should supplement your
    primary mentor’s guidance. You will also receive advice from other Oracle professionals
    you encounter, who will impact your career growth without being an official mentor.


    What makes this book that you are reading different is that its aim is to teach
    you how to find the answers that are not in the other books on this topic. What
    happens if you need more information? Where do you turn? The most common answer
    is to look in the Oracle documentation, and that is a great response. Too often,
    people are afraid to use the Oracle documentation because it is vast and complex.
    In Chapter 13 of this book I will teach you how to leverage the documentation
    to your advantage. Unfortunately, the Oracle documentation is not always complete,
    so where do you go next? This book will give you pointers on how to proceed when
    the information is not readily available.


    Sometimes the best resource for the answers you seek is within yourself. One of
    the most common types of questions I get from many entry-level Oracle DBAs is
    something along the lines of “Can I do *X* in Oracle?” If you’ve asked that question,
    then the answer is clearly “No!” because it indicates you haven’t even tried.
    During the course of this book, we will build a system where we can create answers
    to many of our own questions. While building this system, we will cover many best
    practices. If you follow the advice in this book, not only will you have a testbed
    to work with, but you will have confidence that the Oracle systems you are creating
    and administering will be able to handle many of the different needs required
    from the system.


    This book is not highly technical. It is meant to be used in the beginning of
    your database administration career. Some might call this a *junior DBA* level.
    Intermediate-level DBAs may also find some useful information in here as well.
    If you are a senior-level DBA, you likely know most of the information presented
    in this book. However, I have found that too many senior DBAs have had to learn
    this information the hard way and wish someone would have given them the knowledge
    presented in this book earlier in their careers (which was part of my motivation
    to write this book). This book is just a start on your career-long journey. No
    one becomes a great DBA overnight. You’ve probably met some great DBAs in your
    career already. How did they get to such lofty status? Through hard work and constant
    learning. I’ve been an Oracle DBA for over 20 years and I’m still learning new
    things all the time. It is the challenge of solving complex database problems
    and learning how to leverage the database engine’s features that is the most rewarding
    aspect of this career for many of the top-level database administrators I have
    met.


    Much of what is in this book stems from things I have learned from the many DBAs
    that have mentored me through the years, but sadly I lacked a true hands-on mentor
    in my early days. I was the only DBA at my first job in this field, so there was
    no one to mentor me. Most of my “mentors” have never even met me and probably
    don’t even know my name or that they helped my career. But during my career I’ve
    taken tips and tidbits from many different people and used those to formulate
    the basis of what you will be reading here.


    Now comes my first bit of advice to help you grow your career: give as much as
    you get. It sounds simple, right? However, giving takes time, energy, and discipline
    and, as such, people typically do not share enough of their knowledge as they
    could. One of the secrets I’ve learned over the years is that the act of sharing
    my knowledge with others teaches me as much as I teach them. When you must formulate
    your thoughts, especially in written form, something happens in the brain where
    you learn the material better than had you not written anything. Most of knowledge
    sharing in the Oracle community is done in written form through books, blog posts,
    white papers, and forums.


    > **Tip**

    >

    > Share your knowledge. You will learn just as much as you teach.


    While this book is Oracle focused, you can use these same principles and techniques
    for working with other database systems. For example, in Chapter 13 we will spend
    time learning about the Oracle documentation. If you are a SQL Server DBA, you
    just need to convert this knowledge to Microsoft’s Books Online. While this book
    covers Oracle-related forums, there are many for SQL Server as well. The advice
    is the same, and you just need to convert it to work for the other database engine.


    It is highly likely that in your career you will be asked to work with multiple
    database platforms. In my current job, I work primarily with Oracle but also SQL
    Server and MongoDB. I have worked with PostgreSQL, MySQL, and DB2 over the years.
    Whenever I work with a new database system, I try to figure out how I do a task
    in Oracle and then see how the other database engine does the same thing. For
    example, all database engines have some form of transaction logging. In Oracle,
    it is the online redo log. In SQL Server, it is called the transaction log. Both
    engines have the same capability. It is how they implement that functionality
    that differs.'
