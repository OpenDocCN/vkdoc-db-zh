  trans: '

    ## 升级的理由


    我遇到过许多数据库管理员，他们不敢将自己的 Oracle 数据库升级到更新的版本。拒绝升级最常见的理由是那句老话："没坏就别修"。他们当前的配置运行良好，系统又至关重要，因此他们选择维持现状。他们的心态是，升级任何数据库总会带来一定风险，而升级后可能出现的问题使得升级变得不值得。但事实恰恰相反——收益远大于风险。即使今天一切运行良好，你仍有许多理由应该升级你的
    Oracle 数据库。本节将详细说明一些升级的理由，顺序不分先后。


    正如我们在第 17 章所见，每季度发布的安全补丁仅适用于完全受支持的版本。在撰写本文时，补丁仅适用于 `11.2.0.4`、`12.1.0.2`、`12.2.0.1`
    和 `18` 版本。如果你的 Oracle 数据库不在此列表中，那么你将存在永远无法修补的安全漏洞。即使数据库及其应用程序可能运行良好，黑客也会乐于利用你的疏忽。务必使用受支持的版本以获取安全补丁，并使你的数据库环境尽可能安全。


    如果你提交服务请求，Oracle 支持也可能要求你升级到受支持的版本。如果你运行的是不支持的版本，支持分析师最喜欢的回应就是让你升级并检查问题是否仍然存在。错误一直在被修复，如果是一个已知且已被修复的错误，分析师为何要浪费时间去追踪你的问题？他们希望数据库升级能解决问题，从而以最小的工作量关闭服务单。


    你的公司很可能已经支付了 Oracle 支持合同的费用。升级是该合同的一部分。如果你不升级数据库，你就是在为支持服务多付费。你已经为更新的数据库版本付过费了，所以尽情使用它吧。话虽如此，有一个拒绝升级
    Oracle 数据库的理由。如果你没有付费的支持合同，那么升级到较新版本可能会让你与 Oracle 公司产生法律纠纷。如果你的支持合同到期，你不能升级到该合同到期后发布的版本。如果你没有支持合同，请不要升级。如果你没有支持合同，那么这个数据库对你的公司来说一定不是很重要。


    你的新数据库版本具有许多新功能。升级后，许多新功能将可供你使用。虽然完成一次 Oracle 升级可能需要付出相当大的努力，但这些新功能通常是出色的省时工具。有些新功能减轻了数据库管理员的工作量。其他功能可能缩短应用程序开发时间。新功能可以让你将数据库架构转向一个有利于组织需求的新方向。


    我经常在讨论论坛上看到人们询问如何在新操作系统上安装非常旧的 Oracle 版本，这简直令人抓狂。Oracle 版本针对不同的操作系统平台进行了认证，而 Oracle
    公司不会费力确保非常古老的 Oracle `8.0.5` 版本能在更新得多的操作系统 Windows Server 2016 上运行。服务器超过保修期后，系统管理员定期更换硬件没有问题。更换硬件时，管理员通常会借此机会也升级操作系统。如果你的公司正在更换旧硬件（理应如此），数据库管理员也应该升级
    Oracle（理应如此）。


    正如我们将在本章后面看到的，你可以从有限的旧版本子集直接升级到较新的 Oracle 版本。例如，无论你多么努力，都无法将 Oracle `7.3.4` 数据库直接升级到
    Oracle `12.2.0.1`。你必须先升级到一个中间版本。如果你的数据库非常旧，你可能需要进行多次升级。在达到最终版本之前需要完成的升级次数越多，追踪任何升级问题可能就越困难。是第一次、第二次还是第三次升级导致了你的问题？如果你的
    Oracle 版本保持最新，升级过程就不会那么痛苦。


    除了获得 Oracle 的支持，以及保持与操作系统的认证组合外，数据库管理员还需要注意应用软件供应商的支持。第三方应用程序针对特定的数据库版本进行了认证。如果你想升级应用程序，可能也需要升级数据库以跟上步伐。遗憾的是，太多的应用软件供应商落后于最新的
    Oracle 版本。我经常听到数据库管理员抱怨他们无法升级数据库，因为应用软件供应商尚未支持它，即使该 Oracle 版本已经发布多年！如果你的应用软件供应商在
    Oracle 版本方面非常落后，你可能要考虑重新评估未来与该供应商的业务关系。


    在第 16 章中，我们讨论了如何通过社交媒体与世界各地的 Oracle 专业人士互动。他们中的许多人非常愿意帮助你解决 Oracle 问题，并教你更多关于
    Oracle 数据库的知识。虽然许多人使用 Oracle 已经很长时间了，但请不要期望他们记得非常旧版本的确切细节。我从 `7.1` 版本就开始使用 Oracle，但除了今天版本中仍然适用的内容外，我对它记得很少。我几乎不记得
    Oracle `9.2` 版本特有的那些详细细节。我会在讨论论坛上回答问题，但如果你的版本太旧，我可能不会像你希望的那样有帮助。我已经熟练掌握如何在 Oracle
    文档中查找东西，但我不会为了回答一个问题而去翻找一套旧文档。我更可能会以尽可能礼貌的方式建议你升级到较新版本。帮助你的 Oracle 专业人士是自愿提供帮助的。他们中很少有人是收费为你提供服务的，所以，请保持你的版本更新，以帮助他们更好地帮助你。


    希望本节能说服你升级数据库。你不需要在新版本一发布时就立即升级，偶尔跳过一个版本也是完全可以接受的。例如，我有许多生产数据库运行的是 Oracle `12.1.0.2`，但我会将它们升级到
    Oracle `18.3`，跳过 `12.2.0.1` 版本。我的最佳实践是最多跳过一个版本。即使可能，我也不会从 `12.1.0.2` 版本直接升级到 `19c`。跳过两个版本（`12.2`
    和 `18`）的风险太大了。


    ## 升级与新功能指南


    每当新的 Oracle 版本发布时，有两本书是必须从头到尾仔细阅读的。第 13 章讨论了 Oracle 文档集。到现在，你应该知道如何访问它们了，因此本章将跳过这些细节。


    《数据库升级指南》包含了如何升级到新版本的信息。这本书提供了如何升级数据库的说明。你必须阅读它，以降低在升级过程中出错的可能性。本章将涵盖你可以在那本书中找到的内容，但无论如何你仍然必须阅读它。如果你已经执行过许多次数据库升级，并且新版本发布了，请阅读新版本的《升级指南》。Oracle
    一直在改变升级过程。大部分升级过程是相同的，但他们会在一些地方加入一些不同的变化。《升级指南》包含了成功升级所需的详细信息。

    '
- fmt: '## Tip


    阅读 *Upgrade Guide*！


    升级数据库后，请务必阅读相应版本的 *Database New Features Guide*。每个新版本都有值得探索的新特性。其中一些特性对您和您的组织可能价值不大，而另一些新特性将成为企业中受欢迎的改变。


    除了介绍该版本的新特性外，*New Features Guide* 还包含已弃用和已过时特性的列表。*弃用* 的特性仍然可用且完全受支持。认为弃用特性不受支持是一个误解。只要某个版本仍在支持期内，Oracle
    数据库中任何仍可用的特性都是受支持的。当一个特性被弃用时，Oracle 公司是在告诉我们该特性将来会被移除。Oracle 从不告诉我们特性何时会变得不可用。正如我记忆所及，LONG
    和 LONG RAW 数据类型已被弃用很久，但它们至今仍然存在。有时，一个特性在一个主要版本中被弃用，在下一个版本中就被移除。当一个特性被弃用时，数据库管理员有责任弄清楚它是否会影响组织，并确定如何应对。很多时候，一个弃用的特性会被一个新特性取代，DBA
    只需转向使用这个替代特性即可。


    一个 *已过时* 的特性是不再可用的特性。如果 DBA 工作得当，这不应该是个意外，因为该特性之前已被弃用，并且 DBA 已将该功能迁移到了其他地方。例如，DBA
    与应用开发团队合作，将 LONG 和 LONG RAW 列分别迁移到了 CLOB 和 BLOB。一旦 LONG 和 RAW 变得过时，DBA 就无需担心。


    事情偶尔也会有疏漏，在我们有机会采取行动之前，某个特性就变得过时了。如果我们升级到新版本数据库，可能会遇到问题。DBA 应在升级活动的早期规划阶段阅读 *New
    Features Guide*，并确定任何已过时的特性是否会带来问题。


    ## Upgrade Methodology


    有多种升级方法可供选择，下一节将讨论。无论您选择哪种方法升级 Oracle 数据库，都有一些步骤您应该始终遵循，以给自己最佳的成功机会。升级生产数据库确实涉及一定风险，错误可能是危险的。遵循这些步骤，您将显著降低该风险：


    1. 阅读新版本的 *Installation Guide*。您可能已经阅读了当前版本的指南。新版本可能有新的安装要求。

    2. 阅读新版本的 *Upgrade Guide*。尽可能多地学习成功升级所需的知识。

    3. 创建一个类似于本书中使用的测试环境。安装当前版本并创建一个数据库。安装新版本的数据库并将您的数据库升级到此目标版本。您可能会学到一些关于升级到此版本的知识。记录所有经验教训。

    4. 选择一个您将用于升级生产数据库的升级方法。每种升级方法都有其自身的优缺点。一旦您确定了最适合您特定情况的升级方法，在您推进开发和测试环境时使用该方法进行升级。如果您没有开发或测试环境，请务必为您的组织获取。更改在未经非生产环境适当验证之前，不应被推送到生产环境。

    5. 在尽可能接近生产环境的开发数据库上安装新版本。安装新版本时，请逐步记录该过程。

    6. 使用步骤4中选择的方法升级数据库。逐步记录该过程。记录升级所需的停机时间长度，这将用于规划生产升级的维护窗口。

    7. 针对升级后的数据库测试应用程序。如果公司有，利用自动化测试工具确保没有功能损坏且性能仍可接受。如果出现问题，确定如何修复。如果性能不可接受，确定如何解决问题。无论哪种情况，都要确定在推进过程中如何缓解问题。此测试期应至少持续两周，根据最终用户在开发数据库中的活跃程度，可能需要更长时间。数据库中的活动越多，问题就会越快被发现。如果数据库几乎未被使用，发现问题可能需要更长时间。

    8. 如果可能，至少保留一个尚未升级的开发数据库。如果您在升级后的数据库上遇到问题，可以尝试在旧版本上执行相同过程，以查看问题是否也存在。如果问题在旧版本中也存在，则升级并非原因。

    9. 在 IT 团队中的每个人都对第一次开发升级感到满意后，计划升级任何剩余的开发数据库（除了上面步骤中提到的保留一个）。使用步骤5和6中的说明作为指导。升级其他开发环境是微调您所创建文档的机会。

    10. 使用您的文档安装和升级测试数据库。理想情况下，一切应按照您的说明按计划进行。如果安装和升级过程有所不同，请相应地更新您的文档。

    11. 让测试数据库在新版本上运行至少两周。在此期间，您应该寻找任何由升级引起的新问题。在此周期结束时，您应该已在开发和测试环境中测试了应用程序，并确信升级不会导致生产环境中的任何应用程序问题。您也应该对升级过程本身充满信心。'
  raw: '### Tip


    Read the *Upgrade Guide*!


    After you have upgraded your database, make sure to read the *Database New Features
    Guide* for that version. Every new version has new features to explore. Some of
    those features may be of little value to you and your organization. Other new
    features will be a welcome change in your enterprise.


    In addition to introducing new features for that version, the *New Features Guide*
    also contains a list of deprecated and obsolete features. A *deprecated* feature
    is one that is still available and still fully supported. It is a myth that deprecated
    features are not supported. Any feature still available in the Oracle database
    is supported so long as that version is supported. When a feature is deprecated,
    Oracle Corporation is telling us the feature will be going away in the future.
    Oracle never tells us when the feature will become unavailable. The LONG and LONG
    RAW datatypes have been deprecated for as long as I can remember, but they are
    still around. Sometimes, a feature is deprecated in one major release and gone
    in the next release. When a feature is deprecated, it is the database administrator’s
    responsibility to figure out if that impacts the organization and to determine
    how to remediate it. Many times, a deprecated feature is replaced by a new feature
    and the DBA just needs to move to the replacement feature.


    An *obsolete* feature is one that is no longer available. If the DBA is doing
    a proper job, this should not be a surprise because the feature was previously
    deprecated and the DBA has moved that functionality to something else. For example,
    the DBA has worked with the application development team to move from LONG and
    LONG RAW columns to CLOB and BLOB respectively. Once LONG and LONG RAW are obsolete,
    the DBA has no worries.


    Things do slip through the cracks on occasion and a feature becomes obsolete before
    we have had a chance to take action. If we upgrade the database to the new version,
    we may have problems. The DBA should read the *New Features Guide* in the earlier
    planning stages of their upgrade activity and determine if any of the obsolete
    features are going to be a problem.


    ## Upgrade Methodology


    There are different upgrade methods available to you, as will be discussed in
    the next section. No matter which method you choose to upgrade an Oracle database,
    there are certain steps that you should always take to give yourself the best
    chance of success. Upgrading a production database does involve a certain amount
    of risk and mistakes can be perilous. Follow these steps and you will significantly
    reduce that risk:


    1.  Read the *Installation Guide* for the new version. You have likely read the
    guide for your current version. The new version may have new installation requirements.


    2.  Read the *Upgrade Guide* for the new version. Learn as much as you can about
    what it takes to upgrade successfully.


    3.  Create a testbed similar to what we have done in this book. Install your current
    version and create a database. Install the new database version and upgrade your
    database to this target version. You may learn a few things about upgrading to
    this version. Document any lessons learned.


    4.  Pick an upgrade method that you will be using to upgrade your production database.
    Each upgrade method has its own pros and cons. Once you determine the upgrade
    method that will work best for your specific situation, use that method to upgrade
    as you advance through development and test environments. If you do not have development
    or test environments, do whatever you need to get them for your organization.
    A change should not be pushed to production unless the change has been properly
    vetted in non-production environments.


    5.  Install the new version on a development database that is as close to production
    as possible. As you install the new version, document the process, step by step.


    6.  Upgrade the database using the method chosen in step 4\. Document the process
    step by step. Make note of the length of downtime needed for the upgrade, as this
    will be used for planning the maintenance window for the production upgrade.


    7.  Test the application against the upgraded database. If your company has them,
    leverage automated testing tools to ensure nothing has broken and performance
    is still at acceptable levels. If something is broken, determine how to fix the
    problem. If performance is unacceptable, determine how to resolve the issue. In
    either case, determine how to mitigate the problem as you move forward. This testing
    period should last at least two weeks and could be longer depending on how active
    end users are in the development database. The more activity in the database,
    the quicker issues will be seen. If the database is barely used, it may take longer
    to spot problems.


    8.  If possible, have at least one development database that is not yet upgraded.
    If you run into an issue with a database that is upgraded, you can try the same
    process on the older version to see if the problem exists there. If the problem
    does exist in the older version, the upgrade did not cause the issue.


    9.  After everyone in the IT team is comfortable with the first development upgrade,
    plan to upgrade any remaining development databases, except for one as noted in
    the step above. Use the instructions in steps 5 and 6 as your guide. Upgrading
    other development environments is a chance to fine-tune the documentation you
    created.


    10.  Install and upgrade the test database using your documentation. Ideally,
    everything should go as planned according to your instructions. If something is
    different with the installation and upgrade processes, update your documentation
    accordingly.


    11.  Wait at least two weeks with the test database at the new version. During
    this time, you should be looking for any new issues due to the upgrade. By the
    end of this cycle, you should have tested the application in both development
    and test and have confidence that the upgrade will not cause any application issues
    in production. You should also have confidence in the upgrade process itself.'
  trans: '

    ## 提示


    请阅读 *升级指南*！


    升级数据库后，请务必阅读对应版本的 *数据库新特性指南*。每个新版本都有一些值得探索的新特性。其中一些特性和功能对您及您的组织可能价值不大，而另一些新特性将成为企业中广受欢迎的改变。


    除了介绍该版本的新特性外，*新特性指南* 还包含已弃用和已过时特性的列表。*已弃用* 的特性仍然可用且完全受支持。认为弃用特性不受支持是一种误解。只要某个版本仍在支持期内，Oracle
    数据库中任何仍然可用的特性都是受支持的。当一个特性被弃用时，Oracle 公司是在告知我们该特性将来会被移除。Oracle 从不会告诉我们特性何时会变得不可用。据我回忆，LONG
    和 LONG RAW 数据类型已被弃用很久，但它们至今仍然存在。有时，一个特性在一个主要版本中被弃用，在下一个版本中就被移除。当一个特性被弃用时，数据库管理员有责任弄清楚它是否会影响组织，并确定如何应对。很多时候，一个弃用的特性会被一个新特性取代，DBA
    只需转向使用这个替代特性即可。


    一个 *已过时* 的特性是不再可用的特性。如果 DBA 工作得当，这不应该是个意外，因为该特性之前已被弃用，并且 DBA 已将该功能迁移到了其他地方。例如，DBA
    与应用开发团队合作，将 LONG 和 LONG RAW 列分别迁移到了 CLOB 和 BLOB。一旦 LONG 和 RAW 变得过时，DBA 就无需担心。


    事情偶尔也会有疏漏，在我们有机会采取行动之前，某个特性就变得过时了。如果我们升级到新版本数据库，可能会遇到问题。DBA 应在升级活动的早期规划阶段阅读 *新特性指南*，并确定任何已过时的特性是否会带来问题。


