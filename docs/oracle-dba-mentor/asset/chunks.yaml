    script in SQL*Plus, or you can navigate to Performance ➤ AWR ➤ AWR Report in Enterprise
    Manager, as shown in Figure [21-11](#467924_1_En_21_Chapter.xhtml#Fig11).


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig11_HTML.jpg](images/467924_1_En_21_Chapter/467924_1_En_21_Fig11_HTML.jpg)


    Figure 21-11


    Specifying AWR report parameters


    In the example in Figure [21-11](#467924_1_En_21_Chapter.xhtml#Fig11), I selected
    the By Snapshot option. I clicked the magnifying glass icon to bring up a list
    of snapshots and chose two of them for my report period. Then I clicked the Generate
    Report button. After a few minutes, the report shown if Figure [21-12](#467924_1_En_21_Chapter.xhtml#Fig12)
    was displayed in the browser. The first part of the report contains some introductory
    information such as hostname, database version, etc.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig12_HTML.jpg](images/467924_1_En_21_Chapter/467924_1_En_21_Fig12_HTML.jpg)


    Figure 21-12


    Example AWR report


    If you have licensed the Diag Pack, you can view the pages of information found
    in the AWR report. Learning how to leverage the AWR report is the subject of another
    book. I would start by reading the *Oracle Database Performance Tuning Guide*
    if you want more information.


    If you do not have the license for the Diag Pack, you can use Statspack to mimic
    the functionality. Statspack is the predecessor to the Diag Pack. With Statspack,
    you run some scripts to set it up. You then have to schedule a job to perform
    the data collection. Statspack comes with your license, so there is no additional
    cost, but it is no longer being developed as new features come with new versions.
    Oracle saves their development effort at extending AWR, not Statspack.


    One of the downsides of the AWR is that the repository keeps the data for 30 days
    and then it is automatically purged. You can change the retention period, but
    then your AWR disk usage will grow, and we normally do not want that in a production
    system. Oracle has provided the ability to automatically migrate AWR data to an
    AWR Warehouse. If you have licensed the Diag Pack, you can enjoy the AWR Warehouse.
    In Enterprise Manager, click Performance ➤ AWR ➤ AWR Warehouse and follow the
    directions to set it up. You will need to create another Oracle database, and
    this should not be on the same server as your production databases. The AWR Warehouse
    configuration is shown in Figure [21-13](#467924_1_En_21_Chapter.xhtml#Fig13).
    We can see that it was created by me, its database version is 12.1.0.2, and 75%
    of the disk space is currently used.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig13_HTML.jpg](images/467924_1_En_21_Chapter/467924_1_En_21_Fig13_HTML.jpg)


    Figure 21-13


    AWR Warehouse configuration


    Figure [21-14](#467924_1_En_21_Chapter.xhtml#Fig14) shows that three databases
    hold data in the AWR Warehouse, totaling 105GB of disk space.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig14_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig14_HTML.png)


    Figure 21-14


    AWR Warehouse details


    The best use of the AWR Warehouse is to be able to compare performance today with
    performance quite a while ago. In my AWR Warehouse, I have defined the retention
    period to be two years. How long you keep data in your warehouse depends on your
    business cycle. My business experiences ebbs and flows with the calendar. I wanted
    to be able to compare over slightly more than one year ago, so I chose a two-year
    retention period. Once the warehouse is created, I can then create an AWR report
    that shows the differences between two periods. The most common place for me to
    use this is when trying to correlate performance after an upgrade of the database
    or the application to the same period the year before.'
  trans: '

    关于建议器（advisor）推荐的一般性注意事项，例如你在`ADDM`结果中会看到的，我需要特别说明一点。建议器总是会给出建议。我尚未见过哪个建议器说“一切都很好，无需更改”。如果你持续查看建议器结果，就会不断进行修改，进而在一个领域耗费大量时间。我曾遇到一个建议器要求更改，我照做了。下一次运行该建议器时，它却基本上要求改回去。我也照做了。你大概能猜到，再下一次运行时，它又想要最初的更改。如果我继续听从这些建议，就会陷入一个无尽的循环。请对`建议器`和其他`专家系统`的建议持保留态度。知道何时该停止，转而处理其他`DBA`任务。


    到目前为止，我们已经看到了`诊断包`的实际应用，它能快速下钻到遇到性能问题的单个会话或 SQL 语句。`诊断包`还包含`自动工作负载仓库 (AWR)`，用于在实例级别捕获信息。当我们想要对实例性能进行详细分析时，`AWR`通常非常有用。开箱即用时，`AWR`每小时捕获一次实例性能快照，但你也可以根据需要手动捕获快照。许多指标将是自实例启动以来的活动指示器。例如，有一个指标跟踪自实例启动以来的磁盘读取总数。所有这些指标收集都是自动发生的。数据存储在`SYSAUX`表空间中，默认保留
    30 天，除非你修改保留期。


    当数据库管理员想要查看整体性能时，他们会运行`AWR`报告。`AWR`报告需要指定起始和结束快照。然后，报告会计算差值，并利用时间间隔来生成平均值。例如，对于磁盘读取，`AWR`报告会将结束快照中的磁盘读取数减去起始快照中的磁盘读取数，从而获得该间隔期间的磁盘读取总数。如果快照间隔
    60 分钟，`AWR`报告会将总磁盘读取数除以 3,600，从而得到该报告期间每秒的平均磁盘读取数。


    要生成`AWR`报告，你可以在`SQL*Plus`中运行`$ORACLE_HOME/rdbms/admin/awrreport.sql`脚本，或者可以导航到`Enterprise
    Manager`中的`性能 ➤ AWR ➤ AWR 报告`，如图 21-11 所示。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig11_HTML.jpg](img/467924_1_En_21_Fig11_HTML.jpg)


    图 21-11


    指定`AWR`报告参数


    在图 21-11 的示例中，我选择了`按快照`选项。我点击放大镜图标调出快照列表，并为我的报告期间选择了其中两个。然后我点击了`生成报告`按钮。几分钟后，图
    21-12 中所示的报告便显示在浏览器中。报告的第一部分包含一些介绍性信息，如主机名、数据库版本等。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig12_HTML.jpg](img/467924_1_En_21_Fig12_HTML.jpg)


    图 21-12


    `AWR`报告示例


    如果你已获得`诊断包`许可，就可以查看`AWR`报告中的信息页面。如何利用`AWR`报告是另一本书的主题。如果你想要更多信息，我建议从阅读《Oracle 数据库性能调优指南》开始。


    如果你没有`诊断包`的许可，可以使用`Statspack`来模拟其功能。`Statspack`是`诊断包`的前身。使用`Statspack`，你需要运行一些脚本来进行设置。然后，你必须计划一个任务来执行数据收集。`Statspack`包含在你的许可中，因此无需额外费用，但它已不再进行新功能开发，因为新版本带来了新特性。Oracle
    将其开发精力投入到了扩展`AWR`，而非`Statspack`上。


    `AWR`的一个缺点是，仓库将数据保留 30 天后会自动清除。你可以更改保留期，但那样你的`AWR`磁盘使用量将会增长，而这在生产系统中通常是我们不希望的。Oracle
    提供了将`AWR`数据自动迁移到`AWR 仓库`的功能。如果你已获得`诊断包`许可，就可以享用`AWR 仓库`。在`Enterprise Manager`中，点击`性能
    ➤ AWR ➤ AWR 仓库`，并按照指示进行设置。你需要创建另一个 Oracle 数据库，并且这个数据库不应与你的生产数据库位于同一服务器上。`AWR 仓库`的配置如图
    21-13 所示。我们可以看到它是由我创建的，其数据库版本是 12.1.0.2，当前磁盘空间使用率为 75%。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig13_HTML.jpg](img/467924_1_En_21_Fig13_HTML.jpg)


    图 21-13


    `AWR 仓库`配置


    图 21-14 显示有三个数据库在`AWR 仓库`中持有数据，总计占用 105GB 磁盘空间。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig14_HTML.png](img/467924_1_En_21_Fig14_HTML.png)


    图 21-14


    `AWR 仓库`详情


    `AWR 仓库`的最佳用途是能够将今天的性能与相当久以前的性能进行比较。在我的`AWR 仓库`中，我将保留期定义为两年。在仓库中保留数据多久取决于你的业务周期。我的业务随着日历有淡旺季之分。我希望能够与一年多前的同期进行比较，因此选择了两年的保留期。一旦仓库创建好，我就可以创建一个`AWR`报告，显示两个时期之间的差异。我最常在尝试将数据库或应用程序升级后的性能与去年同期的性能进行关联分析时使用此功能。

    '
- fmt: '## Tuning Pack


    Tuning Pack 是 Diagnostics Pack 的绝佳伴侣。我们已经看到，诊断包中的 ADDM 提供了一个按钮，可以生成一个带有 Tuning
    Pack 的会话。这是我偶尔会使用的包，但我并不像坚持使用诊断包那样坚持要使用它。Tuning Pack 包含以下功能：


    *   Real-time SQL Monitoring

    *   SQL Tuning Advisor

    *   SQL Access Advisor

    *   SQL Profiles

    *   In-Memory Advisor

    *   Object Reorganization


    ### 使用 SQL Tuning Advisor


    如果我们回到如图 21-10 所示的 ADDM 发现，可以单击`Schedule SQL Tuning Advisor`按钮。下一个屏幕要求我们填写一些关于如何安排此工作的信息，如图
    21-15 所示。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig15_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig15_HTML.png)


    图 21-15 安排 SQL Tuning Advisor


    在图 21-15 中，我将此顾问运行的名称更改为`SQL_TUNING_DBA_MENTOR`。如果需要，可以使用默认名称。分析的范围在`Scope`部分定义。有限的范围资源消耗要少得多，但不会让顾问考虑所有备选方案。如果希望更全面的范围，并且不想在实例活动的高峰时段运行，可以将执行安排在较安静的时间，明天再检查结果。一切准备就绪后，单击`Submit`按钮。根据我的选项，我的顾问运行将立即执行。当我单击`Submit`按钮时，我可以查看任务运行情况，如图
    21-16 所示。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig16_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig16_HTML.png)


    图 21-16 调优顾问执行


    顾问运行最终将完成。结果可以在图 21-17 中看到。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig17_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig17_HTML.png)


    图 21-17 调优顾问总体发现


    一眼看去，我可以发现最大的发现类型与统计信息相关。如果向下滚动，可以看到一个表和一个索引的过时统计信息导致了问题，如图 21-18 所示。对象名称和模式被模糊处理以保护专有信息。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig18_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig18_HTML.png)


    图 21-18 调优顾问统计信息发现


    无需做太多工作，我就能够利用诊断包的`ADDM`功能告诉我某些 SQL 语句存在问题。然后，我利用调优包的顾问功能告诉我某个表及其索引的统计信息已过时。这种节省时间的方式会一次又一次地带来回报，这使得诊断包和调优包的成本更容易接受。


    ### 使用 SQL Access Advisor


    在 Enterprise Manager 中，我们可以导航到`Performance ➤ SQL ➤ SQL Access Advisor`来使用调优包的该部分。我们可以在图
    21-19 中看到初始的`SQL Access Advisor`屏幕。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig19_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig19_HTML.png)


    图 21-19 SQL Access Advisor


    在初始选项中，我将查看访问顾问是否会推荐任何新结构。该顾问将查看数据库中执行的 SQL 语句，并在适当时推荐任何新索引、分区或物化视图。在下一个屏幕上，顾问要求我分析哪个工作量，如图
    21-20 所示。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig20_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig20_HTML.png)


    图 21-20 SQL Access Advisor 工作量


    我选择使用当前和最近的 SQL 活动。在下一个屏幕上，我选择了要访问的结构类型。我还选择了`Comprehensive`范围。我的选项如图 21-21 所示。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig21_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig21_HTML.png)


    图 21-21 SQL Access Advisor 选项


    下一个屏幕要求类似调优顾问所请求的调度选项。准备就绪后，提交作业，访问顾问将开始工作。范围越全面、顾问需要分析的 SQL 语句越多，作业完成所需的时间就越长。分析完成后，我们可以查看类似于图
    21-22 的报告。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig22_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig22_HTML.png)


    图 21-22 SQL Access Advisor 摘要选项卡


    `Summary`屏幕显示原始`I/O`成本超过 3.08 亿次`I/O`操作。如果我们实施此顾问运行的结果，新成本将不到该数字的一半，约为 1.51 亿次`I/O`操作。顾问建议我们创建
    7,239 个新索引。我通常不会引入那么多变更，因此让我们通过单击`Recommendations`选项卡更深入地研究这些发现。我们可以在图 21-23 中看到这些建议。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig23_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig23_HTML.png)


    图 21-23 SQL Access Advisor 建议选项卡


    该顾问有 812 条建议。如果我们查看条形图，可以看到建议 ID 91 将贡献近 1 亿次`I/O`操作的改进。建议 88 是下一个最大的改进。查看图表下方的表格，我们可以看到这两条建议分别贡献了
    60.65% 和 27.18% 的成本改进，总计 87.83%。


    数据库管理员可以逐一检查系统中的每个 SQL 语句并单独分析它们，或者可以使用`SQL Access Advisor`节省大量时间。这个顾问运行在七分钟内分析了
    1,152 个不同的 SQL 语句。在顾问工作时，DBA 同时处理了其他活动。


    ### 总结


    Tuning Pack 对于 DBA 来说是一个巨大的时间节省工具。但是，如果应用程序来自其他供应商，DBA 通常不负责调优 SQL 语句。那是软件供应商的工作。Tuning
    Pack 由需要支持内部开发应用程序的 DBA 使用。'
  raw: '## Tuning Pack


    The Tuning Pack is a great companion to the Diagnostics Pack. We have already
    seen that the ADDM in the Diag Pack gives us a button to generate a session with
    the Tuning Pack. This is one pack that I do use on occasion, but I am not as insistent
    that it be made available to me as I am the Diag Pack. The Tuning Pack consists
    of the following:


    *   Real-time SQL Monitoring


    *   SQL Tuning Advisor


    *   SQL Access Advisor


    *   SQL Profiles


    *   In-Memory Advisor


    *   Object Reorganization


    If we return to the ADDM findings as shown in Figure [21-10](#467924_1_En_21_Chapter.xhtml#Fig10),
    we can click the Schedule SQL Tuning Advisor button. The next screen asks us to
    fill out some information on how to schedule this work, as shown in Figure [21-15](#467924_1_En_21_Chapter.xhtml#Fig15).


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig15_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig15_HTML.png)


    Figure 21-15


    Scheduling SQL Tuning Advisor


    In Figure [21-15](#467924_1_En_21_Chapter.xhtml#Fig15), I changed the name of
    this advisor run to be SQL_TUNING_DBA_MENTOR. You can use the default name if
    you like. The scope of the analysis is defined in the Scope section. A limited
    scope is much less resource intensive, but will not allow the advisor to consider
    all of the alternatives. If you want a more comprehensive scope and do not want
    to run this during peak periods of instance activity, you can schedule the execution
    during a quieter time and check on the results tomorrow. When everything is ready,
    click the Submit button. Due to my options, my advisor run will execute immediately.
    When I click the Submit button, I can watch the task run, as shown in Figure [21-16](#467924_1_En_21_Chapter.xhtml#Fig16).


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig16_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig16_HTML.png)


    Figure 21-16


    Tuning Advisor execution


    The advisor run will eventually complete. The results can then be seen in Figure
    [21-17](#467924_1_En_21_Chapter.xhtml#Fig17).


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig17_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig17_HTML.png)


    Figure 21-17


    Tuning Advisor overall findings


    At a glance, I can see the biggest finding type was related to statistics. If
    I scroll down further, I can see that a table and an index have stale statistics
    contributing to the problem, as shown in Figure [21-18](#467924_1_En_21_Chapter.xhtml#Fig18).
    The object name and schema were obscured to protect proprietary information.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig18_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig18_HTML.png)


    Figure 21-18


    Tuning Advisor statistics finding


    Without doing much work, I was able to leverage the Diag Pack’s ADDM functionality
    to tell me there was a problem with some SQL statements. I then leveraged the
    Tuning Pack’s advisor to tell me statistics were stale on a table and its index.
    This type of time savings will pay for itself over and over again, which makes
    the cost of the Diag and Tuning Packs much easier to deal with.


    In Enterprise Manager, we can navigate to Performance ➤ SQL ➤ SQL Access Advisor
    to use that portion of the Tuning Pack. We can see the initial SQL Access Advisor
    screen in Figure [21-19](#467924_1_En_21_Chapter.xhtml#Fig19).


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig19_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig19_HTML.png)


    Figure 21-19


    SQL Access Advisor


    In the initial options, I am going to see if the Access Advisor will recommend
    any new structures. This advisor will look at SQL statements executed in the database
    and recommend any new indexes, partitioning, or materialized views if appropriate.
    On the next screen, the advisor asks me which workload to analyze, as shown in
    Figure [21-20](#467924_1_En_21_Chapter.xhtml#Fig20).


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig20_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig20_HTML.png)


    Figure 21-20


    SQL Access Advisor workload


    I have chosen to use the current and recent SQL activity. On the next screen,
    I selected the type of access structures to consider. I also chose the Comprehensive
    scope. My options are shown in Figure [21-21](#467924_1_En_21_Chapter.xhtml#Fig21).


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig21_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig21_HTML.png)


    Figure 21-21


    SQL Access Advisor options


    The next screen asks for scheduling options similar to those requested by the
    Tuning Advisor. When ready, submit the job and the Access Advisor will go to work.
    The more comprehensive and the more SQL statements the advisor needs to analyze,
    the longer the job will take to complete. Once the analysis is complete, we can
    view the report similar to Figure [21-22](#467924_1_En_21_Chapter.xhtml#Fig22).


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig22_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig22_HTML.png)


    Figure 21-22


    SQL Access Advisor Summary tab


    The Summary screen shows us the original I/O cost is over 308 million I/O operations.
    If we implement the findings from this advisor run, the new cost will be less
    than half of that, about 151 million I/O operations. The advisor is recommending
    that we create 7,239 new indexes. I typically do not introduce that much change,
    so let’s dig a little deeper into the findings by clicking the Recommendations
    tab. We can see the recommendations in Figure [21-23](#467924_1_En_21_Chapter.xhtml#Fig23).


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig23_HTML.png](images/467924_1_En_21_Chapter/467924_1_En_21_Fig23_HTML.png)


    Figure 21-23


    SQL Access Advisor Recommendations tab


    The advisor has 812 recommendations. If we look at the bar chart, we can see that
    recommendation ID 91 will contribute almost 100 million I/O operation improvements.
    Recommendation 88 is the next biggest improvement. Looking at the table below
    the chart, we can see those two recommendations contribute 60.65% and 27.18% of
    the cost improvement, for a total of 87.83%.


    The database administrator could go through each and every SQL statement in the
    system and analyze them individually or could save a ton of time with the SQL
    Access Advisor. This advisor run analyzed 1,152 different SQL statement in seven
    minutes. While the advisor was doing its work, the DBA multitasked and worked
    on other activities.


    The Tuning Pack can be a great time saver for the DBA. However, if the application
    is from another vendor, the DBA typically is not responsible for tuning the SQL
    statements. That is the software vendor’s job. The Tuning Pack is used by DBAs
    that need to support in-house developed applications.'
  trans: '

    ## 调优包


    调优包是诊断包的绝佳伴侣。我们已经看到，诊断包中的 ADDM 提供了一个按钮，可以生成一个带有调优包的会话。这是我偶尔会使用的包，但我并不像坚持使用诊断包那样坚持要使用它。调优包包含以下功能：


    *   实时 SQL 监控

    *   SQL 调优顾问

    *   SQL 访问顾问

    *   SQL 概要文件

    *   内存顾问

    *   对象重组


    ### 使用 SQL 调优顾问


    如果我们回到如图 21-10 所示的 ADDM 发现，可以单击`安排 SQL 调优顾问`按钮。下一个屏幕要求我们填写一些关于如何安排此工作的信息，如图 21-15
    所示。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig15_HTML.png](img/467924_1_En_21_Fig15_HTML.png)


    图 21-15 安排 SQL 调优顾问


    在图 21-15 中，我将此顾问运行的名称更改为`SQL_TUNING_DBA_MENTOR`。如果需要，可以使用默认名称。分析的范围在`Scope`部分定义。有限的范围资源消耗要少得多，但不会让顾问考虑所有备选方案。如果希望更全面的范围，并且不想在实例活动的高峰时段运行，可以将执行安排在较安静的时间，明天再检查结果。一切准备就绪后，单击`提交`按钮。根据我的选项，我的顾问运行将立即执行。当我单击`提交`按钮时，我可以查看任务运行情况，如图
    21-16 所示。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig16_HTML.png](img/467924_1_En_21_Fig16_HTML.png)


    图 21-16 调优顾问执行


    顾问运行最终将完成。结果可以在图 21-17 中看到。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig17_HTML.png](img/467924_1_En_21_Fig17_HTML.png)


    图 21-17 调优顾问总体发现


    一眼看去，我可以发现最大的发现类型与统计信息相关。如果向下滚动，可以看到一个表和一个索引的过时统计信息导致了问题，如图 21-18 所示。对象名称和模式被模糊处理以保护专有信息。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig18_HTML.png](img/467924_1_En_21_Fig18_HTML.png)


    图 21-18 调优顾问统计信息发现


    无需做太多工作，我就能够利用诊断包的`ADDM`功能告诉我某些 SQL 语句存在问题。然后，我利用调优包的顾问功能告诉我某个表及其索引的统计信息已过时。这种节省时间的方式会一次又一次地带来回报，这使得诊断包和调优包的成本更容易接受。


    ### 使用 SQL 访问顾问


    在企业管理器中，我们可以导航到`性能 ➤ SQL ➤ SQL 访问顾问`来使用调优包的该部分。我们可以在图 21-19 中看到初始的`SQL 访问顾问`屏幕。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig19_HTML.png](img/467924_1_En_21_Fig19_HTML.png)


    图 21-19 SQL 访问顾问


    在初始选项中，我将查看访问顾问是否会推荐任何新结构。该顾问将查看数据库中执行的 SQL 语句，并在适当时推荐任何新索引、分区或物化视图。在下一个屏幕上，顾问要求我分析哪个工作量，如图
    21-20 所示。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig20_HTML.png](img/467924_1_En_21_Fig20_HTML.png)


    图 21-20 SQL 访问顾问工作量


    我选择使用当前和最近的 SQL 活动。在下一个屏幕上，我选择了要访问的结构类型。我还选择了`全面`范围。我的选项如图 21-21 所示。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig21_HTML.png](img/467924_1_En_21_Fig21_HTML.png)


    图 21-21 SQL 访问顾问选项


    下一个屏幕要求类似调优顾问所请求的调度选项。准备就绪后，提交作业，访问顾问将开始工作。范围越全面、顾问需要分析的 SQL 语句越多，作业完成所需的时间就越长。分析完成后，我们可以查看类似于图
    21-22 的报告。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig22_HTML.png](img/467924_1_En_21_Fig22_HTML.png)


    图 21-22 SQL 访问顾问摘要选项卡


    `摘要`屏幕显示原始`I/O`成本超过 3.08 亿次`I/O`操作。如果我们实施此顾问运行的结果，新成本将不到该数字的一半，约为 1.51 亿次`I/O`操作。顾问建议我们创建
    7,239 个新索引。我通常不会引入那么多变更，因此让我们通过单击`建议`选项卡更深入地研究这些发现。我们可以在图 21-23 中看到这些建议。


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig23_HTML.png](img/467924_1_En_21_Fig23_HTML.png)


    图 21-23 SQL 访问顾问建议选项卡


    该顾问有 812 条建议。如果我们查看条形图，可以看到建议 ID 91 将贡献近 1 亿次`I/O`操作的改进。建议 88 是下一个最大的改进。查看图表下方的表格，我们可以看到这两条建议分别贡献了
    60.65%和 27.18%的成本改进，总计 87.83%。


    数据库管理员可以逐一检查系统中的每个 SQL 语句并单独分析它们，或者可以使用`SQL 访问顾问`节省大量时间。这个顾问运行在七分钟内分析了 1,152 个不同的
    SQL 语句。在顾问工作时，DBA 同时处理了其他活动。


    ### 总结


    调优包对于 DBA 来说是一个巨大的时间节省工具。但是，如果应用程序来自其他供应商，DBA 通常不负责调优 SQL 语句。那是软件供应商的工作。调优包由需要支持内部开发应用程序的
    DBA 使用。

    '
- fmt: '## Partitioning


    Partitioning is an extra-cost option that lets you subdivide a table into smaller
    tables, called `partitions`. Transparent to the application, partitioning allows
    these smaller tables to function together as if they were one large table. A table
    is partitioned if it needs to be able to handle a very large number of rows, typically
    millions or more. Small tables do not normally benefit from partitioning.


    The diagram in Figure 21-24 shows an `ORDER_DETAILS` table from a typical web-based
    store. As customers fill out orders, the details of the order are stored in this
    table. Because this is a high-volume website that sells many products daily, the
    DBA has partitioned the table based on the year the order was placed. The diagram
    in Figure 21-24 shows four partitions for the table corresponding to the years
    2016 through 2019. Prior to the year 2020, the DBA will want to add a partition
    for that year.


    ![../images/467924_1_En_21_Chapter/467924_1_En_21_Fig24_HTML.jpg](images/467924_1_En_21_Chapter/467924_1_En_21_Fig24_HTML.jpg)

    Figure 21-24 `ORDER_DETAILS` partitioned table


    Users and applications do not typically reference a partition directly. Instead,
    they still query the `ORDER_DETAILS` table. The `ORDER_DETAILS` table does not
    exist on storage, only in the data dictionary. It is the partitions that are stored
    on disk. When a user or application queries the `ORDER_DETAILS` table, Oracle
    pulls the data from the partitions. There are two main reasons to partition the
    table, storage and performance.


    A table is located in one and only one tablespace. However, if a table is partitioned,
    the partitions can be placed in different tablespaces. This lets the DBA put older,
    rarely used partitions on slower disk storage if desired. For example, the 2016
    `ORDER_DETAILS` partition can be on the “slow” disk and the 2018 and 2019 partitions
    on the faster disk because they are more current. The DBA does this by creating
    different tablespaces on different disk storage types and moving the partitions
    to the appropriate tablespace. Because the 2016 data will not change, the DBA
    can then alter that tablespace to be `READ ONLY`, thus letting `RMAN` back up
    it up once and skip it for subsequent backups.


    A properly partitioned table can benefit from Oracle’s `partition pruning`. In
    the example diagram in Figure 21-24, it is rare for someone to look at order details
    from older years. Typically, we would be querying for recent orders. The DBA could
    place an index on a column in the table that stores the order detail date. However,
    if we query on a date range that is large enough, such as order details from the
    previous quarter, Oracle’s Optimizer may decide the index is not selective enough
    and perform a full table scan, reading the details going back years. This can
    cause terrible performance. If the table is partitioned on the detail date, Oracle
    will automatically remove, or prune, nonparticipating partitions from being accessed.
    In our example, if we are querying for all order details in the fourth quarter
    of 2018, Oracle would only access the 2018 partition and ignore the rest because
    it knows they do not have any records to satisfy the `SQL` statement.


    When people partition an Oracle table, the biggest mistake they make is failing
    to look at the most common `SQL` statement executed against that table. You want
    to leverage `partition pruning` as much as possible. If you often query by the
    order detail date, then partitioning on the order ID column will not give you
    any `partition pruning` benefit. Before deciding on a partition column, make sure
    you know which `SQL` statements need to benefit from `partition pruning`.


    Before partitioning was an Oracle option, people implemented what has been termed
    a “poor man’s partitioning.” They did this by creating multiple smaller tables
    and then creating a view which did a `UNION ALL` operation over all of the tables.
    While this solution does let you enjoy the same storage benefit as Oracle’s Partitioning
    option, it does not automatically participate in `partition pruning`.


    In Listing 21-1, we can see an example of how to partition the table from Figure
    21-24.


    ```

    CREATE TABLE ORDER_ENTRY.ORDER_DETAILS (

    ORDER_ID NUMBER(38,0) NOT NULL,

    ORDER_DETAIL_DATE_BEGIN DATE NOT NULL,

    ORDER_ITEM_ID NUMBER NOT NULL,

    ORDER_ITEM_COST NUMBER(38,2) NOT NULL,

    DATE_ITEM_SHIPPED DATE)

    TABLESPACE ORDER_ENTRY_DATA

    PARTITION BY RANGE (ORDER_DETAIL_DATE)

    (PARTITION o_d_2016  VALUES LESS THAN (TO_DATE(''01/01/2017 00:00:00'',''MM/DD/YYYY
    HH24:MI:SS'')) TABLESPACE ORDER_ENTRY_DATA,

    PARTITION o_d_2017  VALUES LESS THAN (TO_DATE(''01/01/2018 00:00:00'',''MM/DD/YYYY
    HH24:MI:SS'')) TABLESPACE ORDER_ENTRY_DATA,

    PARTITION o_d_2018  VALUES LESS THAN (TO_DATE(''01/01/2019 00:00:00'',''MM/DD/YYYY
    HH24:MI:SS'')) TABLESPACE ORDER_ENTRY_DATA,

    PARTITION o_d_2019  VALUES LESS THAN (TO_DATE(''01/01/2020 00:00:00'',''MM/DD/YYYY
    HH24:MI:SS'')) TABLESPACE ORDER_ENTRY_DATA,

    PARTITION o_d_max  VALUES LESS THAN (MAXVALUE) TABLESPACE ORDER_ENTRY_DATA);

    ```

    Listing 21-1 Partition Table Example


    In the example above, the `ORDER_DETAILS` table is partitioned on the `ORDER_DETAIL_DATE`
    column. The first partition, `O_D_2016`, contains all records where the column’s
    value is less than 01/01/2017. The 2017 partition contains all records with values
    higher than the 2016 partition and less than 01/01/2018. The last partition is
    a catch-all for any values higher than the other partitions and less than the
    maximum value possible for that column. I often include this catch-all in case
    the DBA neglects to add the next year’s partition. Once the DBA figures out they
    made a mistake, they can take corrective action during a maintenance window, but
    this way, the application functionality does not break due to human error.


    The example shown so far uses `range partitioning`. The partition is defined on
    a specific range of values. Oracle supports the following partitioning schemes:


    *   `Range partitioning`: Probably the most commonly used partitioning method.
    Data is partitioned on a range of values, as we have seen in the previous discussion.


    *   `List partitioning`: The DBA defines the partition to hold a list of discrete
    values. For example, you could partition by the state or the country, or similar
    governmental boundary. In the United States, there would be 50 partitions, one
    for each state, as an example.


    *   `Hash partitioning`: The value is run through a hash algorithm to determine
    which partition is used.


    *   `Automatic-list partitioning`: Oracle will automatically extend a list-partitioned
    table for you.


    *   `Interval partitioning`: Very similar to `range partitioning`. Instead of
    defining a range on specific boundaries, we can use the interval on the data type.
    For example, on a date datatype, we can define the interval to be the year portion
    of that date.


    *   `Composite partitioning`: A table is partitioned by one method, then subpartitioned
    with a second method. A common example would be to use `range partitioning` based
    on a date, then use `hash partitioning` to further subdivide the data.


    If you deal with significant volumes of data, the Partitioning option may be just
    what you need. Not everything should be partitioned, but this option really helps
    tame larger datasets.'
