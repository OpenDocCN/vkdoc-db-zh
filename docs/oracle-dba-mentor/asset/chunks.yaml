  trans: '## 成功


    失败的反面是成功。成功是每个人执行每项任务时所追求的目标。如果你正在冲泡一杯咖啡开启新的一天，你希望有一个成功的结果。如果你正在系鞋带，你希望有一个成功的结果。如果你正在设计一个数据库系统，你同样希望有一个成功的结果。


    实现成功的最佳方式是定义成功的标准。你如何知道你的任务何时已成功完成？我知道我制作晨间咖啡的任务是成功的，当我正在饮用这杯饮料，我的大脑告诉我“味道好极了”。系鞋带任务成功的定义是：鞋带系紧后能使鞋子保持在原位，并且这种状态能维持足够长的时间。如果鞋带看似系好了，但走了五步后就松开了，那么系鞋带的任务就不算成功。


    那么设计数据库系统呢？你如何定义成功？数据库启动并运行。表中填充了数据。最终用户可以访问数据。这就是成功吗？在某些情况下，这可能是一个成功的结果。然而，如果性能缓慢，且系统无法扩展以满足更大用户群的需求，人们可能会认为该系统是失败的。


    你能越准确地定义成功标准，获得成功结果的机会就越大。成功标准需要得到所有利益相关者的签字确认，这样每个人才能对项目需要完成什么才算成功有清晰一致的理解。一位数据库管理员可能会架设一个新的数据库系统，并认为自己完成得很出色，取得了成功。而这位
    DBA 的经理检查系统后，可能会说这是一个惨淡的失败。他们对于这个系统有着不同的成功标准。一个人很高兴，而另一个人则完全不满意。为了使系统的实施成为成功，所有利益相关者都需要明白成功意味着什么。清晰的沟通和明确界定的期望是成功的关键。


    一旦达到成功标准，项目就完成了。随着时间的推移，人们可能会评估该解决方案，并决定他们想要新的成功标准。于是会启动一个新项目来实现这个新目标。在 IT 行业中，部署一个解决方案后，未来的整体愿景发生变化的情况非常常见。一个原本运行良好并满足其初始成功标准的数据库系统，现在需要被修改以适应组织不断变化的需求。


    ### 提示


    确保你清楚了解你的成功标准。


    本章展示的每个测试用例都将有定义好的成功标准。没有这些标准，我们将不知道何时停止处理该测试用例。即使是出于好意的人，也可能在项目生命周期内试图重新定义成功标准。这被称为范围蔓延，并且会显著影响项目在先前定义的约束条件（尤其是项目时间表）内取得成功的能力。


    ## 测试床


    我们在本书中构建的虚拟机是我们的测试床之一。每位 Oracle 数据库管理员都需要一个测试床来练习和弄清楚事物的工作原理。生产环境是糟糕的测试床。我们应该在其他地方进行测试，只有在确切知道我们在做什么之后，才在生产环境中实施变更。


    ### 提示


    除非你确切知道自己在做什么，否则切勿在生产环境中进行任何更改。


    请记住，DBA 是数据的守护者。一个愚蠢的 DBA 才会第一次尝试某件事就在生产环境中进行，结果只能眼睁睁看着自己的行为摧毁数据库或使其对最终用户不可用。


    大多数 IT 从业者都熟悉开发（dev）、测试和生产平台。应用程序代码首先在开发环境中创建和修改。一旦确定变更有效并能解决任务，这些变更就会被推广到测试环境。质量分析（QA）团队验证变更是否达到预期效果，且未破坏先前存在的功能。测试成功完成后，变更将被推广到生产环境。


    数据库管理员需要一个地方来执行他们的工作。一些组织坚持让他们的 DBA 在应用程序开发人员工作的同一环境中工作。问题在于，DBA 可能会破坏东西，结果可能导致数据库无法运行。如果
    DBA 破坏了数据库，开发人员和 QA 人员可能将无法进行他们的工作。最终用户不会注意到开发或测试数据库宕机了，但你的开发人员和 QA 人员肯定会注意到。你可以把开发和测试数据库视为开发人员和
    QA 的“生产”环境。不要使用开发和测试数据库来尝试你的 DBA 任务，因为你有影响开发和 QA 工作的风险。


    ### 提示


    开发和测试数据库对某些人来说就是生产环境，只不过不是你的应用程序最终用户。


    数据库管理员需要自己的工作平台。他们需要属于自己的测试床。当今的虚拟化和云技术使得 DBA 更容易获得自己的测试床。本书已经展示了使用 VirtualBox
    创建一个基于 Linux 的 Oracle 测试床是多么容易。DBA 可能拥有多个测试床。例如，DBA 可能有一个如我们在本书中创建的 Oracle 12.2
    测试床，然后创建另一个专门用于测试从 12.2 升级到 18c 版本的测试床。升级测试完成后，DBA 可能不再需要那个测试床，此时可以将其销毁。'
- fmt: '# Snapshots


    虚拟化技术使得创建系统当前状态的时间点快照变得容易。如果数据库管理员后续操作导致系统出现问题，他们可以回滚到快照状态，就像从未做过任何更改一样，快速恢复运行。一些虚拟机管理程序允许您在系统运行时创建快照，而另一些则要求虚拟机处于关闭状态。


    在 Oracle VM VirtualBox Manager 中，单击我们为本书创建的虚拟机。然后，点击如图 [10-1](#467924_1_En_10_Chapter.xhtml#Fig1)
    所示的 Machine Tools 图标的下拉箭头，选择 Snapshots。


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig1_HTML.jpg](images/467924_1_En_10_Chapter/467924_1_En_10_Fig1_HTML.jpg)


    *图 10-1 VirtualBox Machine Tools 图标*


    您应该看到尚未创建任何快照。点击 Take 按钮来创建您的第一个快照。VirtualBox 将弹出一个如图 [10-2](#467924_1_En_10_Chapter.xhtml#Fig2)
    所示的对话框，您可以在其中定义快照的名称和描述。


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig2_HTML.jpg](images/467924_1_En_10_Chapter/467924_1_En_10_Fig2_HTML.jpg)


    *图 10-2 创建虚拟机快照*


    您可以输入任何有助于理解该特定快照的名称或描述。例如，您可能会在数据库升级前创建一个快照，并将其命名为 “pre-upgrade snapshot”。


    对运行 Oracle 数据库的虚拟机创建快照时，请确保数据库未运行；否则，将执行数据库的冷备份。这假设数据库的存储是虚拟机的一部分。如果存储位于虚拟机外部，您将需要以不同的方式处理数据库备份，很可能使用第
    [7](#467924_1_En_7_Chapter.xhtml) 章中讨论的技术。


    在 VirtualBox Manager 中，我们可以看到我们的快照。图 [10-3](#467924_1_En_10_Chapter.xhtml#Fig3)
    显示了快照，并且系统的当前状态是该快照的子项。


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig3_HTML.jpg](images/467924_1_En_10_Chapter/467924_1_En_10_Fig3_HTML.jpg)


    *图 10-3 VirtualBox Manager 中的虚拟机快照*


    我们还可以看到快照的创建日期和时间。在图 [10-4](#467924_1_En_10_Chapter.xhtml#Fig4) 中，我们有一个作为现有快照子项的新快照。


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig4_HTML.jpg](images/467924_1_En_10_Chapter/467924_1_En_10_Fig4_HTML.jpg)


    *图 10-4 多个快照*


    要恢复到之前的快照，请先关闭虚拟机。选择要恢复的快照，然后单击 Restore 按钮。系统会弹出一个对话框要求您确认恢复。您将获得一个选项，可以选择先为当前机器创建一个快照，以便您可以返回到当前状态，如图
    [10-5](#467924_1_En_10_Chapter.xhtml#Fig5) 所示。


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig5_HTML.jpg](images/467924_1_En_10_Chapter/467924_1_En_10_Fig5_HTML.jpg)


    *图 10-5 恢复快照选项*


    恢复操作完成后，我们可以看到已恢复的快照。请注意，在图 [10-6](#467924_1_En_10_Chapter.xhtml#Fig6) 中，当前状态现在是我们所恢复到的快照的子项。


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig6_HTML.jpg](images/467924_1_En_10_Chapter/467924_1_En_10_Fig6_HTML.jpg)


    *图 10-6 快照已恢复*


    快照是一种很好的方式，可以让您回退到一个已知的、希望是良好的状态。每个快照都会占用一定的磁盘空间。如果您创建了太多快照，可能会开始感受到磁盘空间的压力。删除不再需要的快照是一个好习惯。


    # LiveSQL


    Oracle 为我们提供了一个名为 LiveSQL 的测试平台。这个平台是一个基于 Web 的查询工具，与一个真实的 Oracle 数据库交互。任何人都可以通过将
    Web 浏览器指向 [`http://livesql.oracle.com`](http://livesql.oracle.com) 来访问 LiveSQL
    并开始使用。在右上角，单击 Sign In 链接，使用相同的 Oracle 凭据访问 Oracle Technology Network 或 My Oracle
    Support。在左侧，单击 SQL Worksheet 项，如图 [10-7](#467924_1_En_10_Chapter.xhtml#Fig7) 所示。


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig7_HTML.jpg](images/467924_1_En_10_Chapter/467924_1_En_10_Fig7_HTML.jpg)


    *图 10-7 LiveSQL*


    在撰写本章时，Oracle 18c 仅在云端可用，这就是为什么我们没有在测试平台中使用该版本。正如您在图 [10-7](#467924_1_En_10_Chapter.xhtml#Fig7)
    中所看到的，LiveSQL 使用的是最新最好的 Oracle 版本。LiveSQL 是使用尚未发布用于本地部署的新版本并开始测试新功能的好方法。在本书编辑期间，LiveSQL
    现在使用的是 19c 版本，该版本尚不可用于本地安装。


    要输入任何查询，将其键入 SQL Worksheet，然后单击 Run 按钮。您可以输入任何有效的 SQL 语句，甚至可以创建表并用数据填充它们。图 [10-8](#467924_1_En_10_Chapter.xhtml#Fig8)
    显示了一个加载了一些测试数据到我的 LiveSQL 模式中的表。


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig8_HTML.jpg](images/467924_1_En_10_Chapter/467924_1_En_10_Fig8_HTML.jpg)


    *图 10-8 LiveSQL Emp 表*


    您还可以将脚本存储在您的 LiveSQL 帐户中以备将来调用。


