- fmt: "## Oracle Client\n\n当Oracle数据库软件安装在服务器上时，它包含了支持数据库引擎所需的所有可执行文件和库文件。Oracle数据库软件还包含Oracle的网络协议栈，以便Oracle实例能够与远程应用程序进行通信。\n\
    \n当工作站上的应用程序需要与Oracle交互时，其本身必须具备某种网络能力。应用程序将其请求发送到应用程序所在机器（有时称为客户端机器）上的Oracle网络协议栈。Oracle网络协议栈将请求转发给操作系统的网络协议栈。操作系统通过通常基于TCP/IP的网络发送该请求。一旦请求到达数据库服务器，服务器的操作系统会将其发送到Oracle网络协议栈，然后再发送到Oracle实例。\n\
    \n对于工作站和应用服务器，Oracle提供了`Oracle Client`软件。`Oracle Client`包含与Oracle数据库完全相同的网络协议栈，以及一些实用程序，如`SQL*Plus`。在安装任何将要访问Oracle数据库的应用程序之前，先安装`Oracle\
    \ Client`软件是非常常见的做法。然而，这并非强制性要求。有些应用程序不需要`Oracle Client`，因为它们自己提供了网络功能。另外值得一提的是，Oracle公司确实提供了`Oracle\
    \ Instant Client`软件，这是`Oracle Client`的精简版。\n\n`Oracle Client`比数据库软件小得多。在架构的客户端一侧，我们很少需要数据库的全部功能，因此较小的占用空间是理想的。`Oracle\
    \ Client`可以从Oracle技术网络上获取，位置与数据库软件相同。\n\n在Oracle的早期，网络协议栈的Oracle部分被称为透明网络底层（TNS）。后来，它被更名为`SQL*Net`。如今，该网络栈简称为`Oracle\
    \ Net`。原始的TNS缩写仍然可见，正如我们将在下一节中看到的。\n\n## TNSNAMES\n\n在本章前面的“Oracle监听器”部分，您了解到监听器是连接请求的中介。回想一下，为了建立成功的连接，我们需要知道网络协议、主机、端口和服务名。这四个信息片段每次连接Oracle时都可能难以记住。值得庆幸的是，我们可以创建一个别名、一个快捷方式，使用一个名字来定义所有四个关键信息片段。\n\
    \n`$ORACLE_HOME/network/admin`目录可能包含一个名为`tnsnames.ora`的文件。这就是我们别名的存放位置。用Oracle的术语来说，我们通常称这些为\
    \ *TNS别名*。如果`tnsnames.ora`文件不存在，那只是因为我们尚未创建它。我们可以用任何文本编辑器创建一个。一个示例如清单[9-9]所示。\n\
    \n```\ntnsaliasX =\n(DESCRIPTION =\n  (ADDRESS_LIST =\n    (ADDRESS = (PROTOCOL\
    \ = TCP)(HOST = localhost)(PORT = 1521))\n  )\n  (CONNECT_DATA =\n    (SERVICE_NAME\
    \ = orcl)\n  )\n)\nListing 9-9\nTNSNAMES别名\n```\n\n在清单[9-9]中，别名名称是`tnsaliasX`。别名可以是我们选择的任何名称。还记得那四个重要信息吗？我们可以在别名定义中看到它们：协议（`TCP`）、主机（`localhost`）、端口（`1521`）和服务名（`orcl`）都存在。现在我们只需要记住别名名称，就可以用它来连接数据库。在清单[9-9]中，别名是在数据库服务器上创建的，所以主机只是`localhost`。您可以在测试环境中创建一个像这样的TNS别名来模拟非本地连接，正如我们将在本章中做的那样。如果这个别名是在工作站的`Oracle\
    \ Client`的`network/admin`目录中创建的，主机值将指向一个特定的数据库主机。\n\n一个`tnsnames.ora`文件当然可以包含多个别名以支持多个应用程序。我通常将别名命名为有意义的名称。清单[9-9]中的例子不是很具有意义，因为`tnsaliasX`可能暗示任何东西。一个更有意义的别名可能是`hr_prod`，我们可以很容易地看出它是用于生产人力资源数据库的。尽量避免像`prod`或`dev`这样的通用别名，因为迟早您会拥有不止一个生产或开发数据库，然后您就不知道这个别名指的是哪一个了。\n\
    \n在本书中，我将把我的别名改为`dbamentor`。我们可以使用`tnsping`实用程序测试该别名，如清单[9-10]所示。\n\n```\n[oracle@oracle122\
    \ admin]$ tnsping dbamentor\nTNS Ping Utility for Linux: Version 12.2.0.1.0 -\
    \ Production on 09-JUL-2018 23:53:24\nCopyright (c) 1997, 2016, Oracle.  All rights\
    \ reserved.\nUsed parameter files:\nUsed TNSNAMES adapter to resolve the alias\n\
    Attempting to contact (DESCRIPTION = (ADDRESS_LIST = (ADDRESS = (PROTOCOL = TCP)(HOST\
    \ = localhost)(PORT = 1521))) (CONNECT_DATA = (SERVICE_NAME = orcl)))\nOK (60\
    \ msec)\nListing 9-10\nTNSPING实用程序\n```\n\n`tnsping`实用程序查找提供的TNS别名，并尝试将其解析为协议、主机、端口和服务名。输出的最后一行简单地显示`OK`。此实用程序用于确认在该主机上、使用该端口、运行着Oracle监听器，并且可以处理该服务名。基本上，`tnsping`验证数据库的监听器具有相同的四个组件。`Tnsping`不执行任何其他检查。`Tnsping`不能用于验证该机器上是否运行着Oracle实例。\n\
    \n现在我们已经定义了一个TNS别名，我们可以用它来远程连接到Oracle实例。使用`SQL*Plus`，我们只需在用户名后面加上`@`符号分隔的TNS别名。这个符号是`SQL*Plus`在提供的信息中识别TNS别名起始位置的方式。清单[9-11]中的示例使用TNS别名连接到数据库。\n\
    \n```\n[oracle@oracle122 admin]$ sqlplus peasland@dbamentor\nSQL*Plus: Release\
    \ 12.2.0.1.0 Production on Mon Jul 9 23:57:28 2018\nCopyright (c) 1982, 2016,\
    \ Oracle.  All rights reserved.\nEnter password:\nLast Successful login time:\
    \ Mon Jul 09 2018 14:37:40 -05:00\nConnected to:\nOracle Database 12c Enterprise\
    \ Edition Release 12.2.0.1.0 - 64bit Production\nSQL> select spid from v$process\n\
    \  2  where addr in (select paddr from v$session\n  3                where username='PEASLAND');\n\
    SPID\nSQL> !ps -ef|grep 15206\noracle   15206     1  0 Jul09 ?        00:00:00\
    \ oracleorcl (LOCAL=NO)\nListing 9-11\n使用TNS别名的SQL*Plus\n```\n\n连接建立后，我们运行了本章前面清单[9-5]中的相同SQL语句，以找到我们连接的专用服务器进程。注意，这不再是`LOCAL`连接了。请记住，这个会话是从数据库服务器本身启动的，所以从技术上讲它是一个本地连接。然而，这个连接没有使用`Bequeath`协议，而是使用了`TCP`。因此，对于Oracle来说，它看起来是一个远程、非本地的连接。\n\
    \n需要记住的重要事项是，远程连接需要知道网络协议、主机、端口和服务名。我们可以使用TNS别名来减轻我们记忆所有这些信息的负担。"
  raw: '## Oracle Client


    When the Oracle database software is installed on a server, it contains all the
    executables and library files needed to support the database engine. The Oracle
    database software also contains Oracle’s network stack so that the Oracle instance
    can communicate with remote applications.


    When an application on a workstation needs to interact with Oracle, it must have
    some sort of network capabilities on its end. The application sends its request
    to the Oracle network stack on the application’s machine, sometimes called the
    client machine. The Oracle network stack forwards the request to the operating
    system’s network stack. The OS sends the request along the network, typically
    TCP/IP based. Once the request hits the database server, the server’s OS sends
    it to the Oracle network stack and on to the Oracle instance.


    For workstations and application servers, Oracle has provided the Oracle Client
    software. Oracle Client contains all of the same Oracle network stack as well
    as some utilities like SQL*Plus. It is very common to install Oracle Client software
    before installing any application that will access the Oracle database. However,
    it is not a requirement to do so. Some applications do not need Oracle Client
    because they provide their own networking capabilities. As a side note, Oracle
    Corporation does provide the Oracle Instant Client software which is a scaled
    down version of Oracle Client.


    Oracle Client is much smaller than the database software. We rarely need the database’s
    full capabilities on the client side of the architecture, so having a smaller
    footprint is ideal. Oracle Client can be obtained on the Oracle Technology Network
    in the same location as the database software.


    In the early days of Oracle, the Oracle part of the network stack was called the
    Transparent Network Substrate (TNS). Later on, it was renamed to SQL*Net. Today,
    the network stack is simply called Oracle Net. The original TNS abbreviation can
    still be found, as we can see in the next section.


    ## TNSNAMES


    In the “Oracle Listener” section earlier in the chapter, you learned that the
    Listener brokers connection requests. Recall that to make a successful connection,
    we need to know the network protocol, the host, the port, and the service name.
    Those four pieces of information can be a lot to remember every time we want to
    make a connection to Oracle. Thankfully, we can create an alias, a shortcut, and
    use one name to define all four critical pieces of information.


    The $ORACLE_HOME/network/admin directory may contain a file named tnsnames.ora.
    This is the location of our aliases. In Oracle speak, we often call these *TNS*
    *aliases* . If the tnsnames.ora file does not exist, it’s only because we have
    yet to create it. We can create one with any text editor. A sample entry looks
    like Listing [9-9](#467924_1_En_9_Chapter.xhtml#PC9).


    ```

    tnsaliasX =

    (DESCRIPTION =

    (ADDRESS_LIST =

    (ADDRESS = (PROTOCOL = TCP)(HOST = localhost)(PORT = 1521))

    )

    (CONNECT_DATA =

    (SERVICE_NAME = orcl)

    )

    )

    Listing 9-9

    TNSNAMES Alias

    ```


    In Listing [9-9](#467924_1_En_9_Chapter.xhtml#PC9), the alias name is tnsaliasX.
    The alias can be whatever we choose. Remember those four important pieces of information?
    We can see them in the alias definition. The protocol (TCP), host (localhost),
    port (1521), and service name (orcl) are all present. Now all we have to remember
    is the alias name and we can use it to connect to our database. In Listing [9-9](#467924_1_En_9_Chapter.xhtml#PC9),
    the alias was created on the database server, so the host is just localhost. You
    can create a TNS alias just like this on your testbed to simulate non-local connections,
    as we will in this chapter. If this alias were created on a workstation in Oracle
    Client’s network/admin directory, the host value would point to a specific database
    host.


    A tnsnames.ora file can certainly contain multiple aliases to support multiple
    applications. I typically name the alias something meaningful. The example in
    Listing [9-9](#467924_1_En_9_Chapter.xhtml#PC9) is not very meaningful because
    tnsaliasX could suggest just about anything. A more meaningful alias might be
    hr_prod, which we could easily discern is for the production Human Resources database.
    Try to stay away from generic aliases like prod or dev because sooner or later
    you will have more than one production or development database and then you won’t
    know which one the alias is referring to.


    I’ll change my alias to be dbamentor for this book. We can test the alias with
    the tnsping utility, as shown in Listing [9-10](#467924_1_En_9_Chapter.xhtml#PC10).


    ```

    oracle@oracle122 admin]$ tnsping dbamentor

    TNS Ping Utility for Linux: Version 12.2.0.1.0 - Production on 09-JUL-2018 23:53:24

    Copyright (c) 1997, 2016, Oracle.  All rights reserved.

    Used parameter files:

    Used TNSNAMES adapter to resolve the alias

    Attempting to contact (DESCRIPTION = (ADDRESS_LIST = (ADDRESS = (PROTOCOL = TCP)(HOST
    = localhost)(PORT = 1521))) (CONNECT_DATA = (SERVICE_NAME = orcl)))

    OK (60 msec)

    Listing 9-10

    TNSPING Utility

    ```


    The tnsping utility looks up the supplied TNS alias and attempts to resolve it
    to the protocol, host, port, and service name. The last line of output simply
    says OK. This utility is used to confirm that an Oracle Listener is running on
    that host, using that port, and can handle that service name. Basically, tnsping
    verifies the database’s Listener has the same four components. Tnsping does not
    perform any other checks. Tnsping cannot be used to verify that an Oracle instance
    is running on that machine.


    Now that we have a TNS alias defined, we can use it to make a remote connection
    to an Oracle instance. With SQL*Plus, we simply put the TNS alias after the username
    with the @ symbol separating the two. This symbol is how SQL*Plus knows where
    the TNS alias starts in the supplied information. The example in Listing [9-11](#467924_1_En_9_Chapter.xhtml#PC11)
    connects to a database using the TNS alias.


    ```

    [oracle@oracle122 admin]$ sqlplus peasland@dbamentor

    SQL*Plus: Release 12.2.0.1.0 Production on Mon Jul 9 23:57:28 2018

    Copyright (c) 1982, 2016, Oracle.  All rights reserved.

    Enter password:

    Last Successful login time: Mon Jul 09 2018 14:37:40 -05:00

    Connected to:

    Oracle Database 12c Enterprise Edition Release 12.2.0.1.0 - 64bit Production

    SQL> select spid from v$process

    2  where addr in (select paddr from v$session

    3                where username=''PEASLAND'');

    SPID


    SQL> !ps -ef|grep 15206

    oracle   15206     1  0 Jul09 ?        00:00:00 oracleorcl (LOCAL=NO)

    Listing 9-11

    SQL*Plus with TNS Alias

    ```


    After the connection was established, we ran the same SQL statement from Listing
    [9-5](#467924_1_En_9_Chapter.xhtml#PC5) earlier in this chapter to find the dedicated
    server process for our connection. Notice that this is not a LOCAL connection
    any more. Remember that this session was launched from the database server itself,
    so it technically is a local connection. However, this connection did not use
    the Bequeath protocol. It used TCP instead. As such, it appears to Oracle as a
    remote, non-local connection.


    The important items to remember are that remote connections need to know the network
    protocol, the host, the port, and the service name. We can use TNS aliases to
    ease the burden on our memories having to recall all that information.'
  trans: "\n## Oracle 客户端\n\n当 Oracle 数据库软件安装在服务器上时，它包含了支持数据库引擎所需的所有可执行文件和库文件。Oracle\
    \ 数据库软件还包含 Oracle 的网络协议栈，以便 Oracle 实例能够与远程应用程序进行通信。\n\n当工作站上的应用程序需要与 Oracle 交互时，其本身必须具备某种网络能力。应用程序将其请求发送到应用程序所在机器（有时称为客户端机器）上的\
    \ Oracle 网络协议栈。Oracle 网络协议栈将请求转发给操作系统的网络协议栈。操作系统通过通常基于 TCP/IP 的网络发送该请求。一旦请求到达数据库服务器，服务器的操作系统会将其发送到\
    \ Oracle 网络协议栈，然后再发送到 Oracle 实例。\n\n对于工作站和应用服务器，Oracle 提供了 `Oracle Client` 软件。`Oracle\
    \ Client` 包含与 Oracle 数据库完全相同的网络协议栈，以及一些实用程序，如 `SQL*Plus`。在安装任何将要访问 Oracle 数据库的应用程序之前，先安装\
    \ `Oracle Client` 软件是非常常见的做法。然而，这并非强制性要求。有些应用程序不需要 `Oracle Client`，因为它们自己提供了网络功能。另外值得一提的是，Oracle\
    \ 公司确实提供了 `Oracle Instant Client` 软件，这是 `Oracle Client` 的精简版。\n\n`Oracle Client`\
    \ 比数据库软件小得多。在架构的客户端一侧，我们很少需要数据库的全部功能，因此较小的占用空间是理想的。`Oracle Client` 可以从 Oracle\
    \ 技术网络上获取，位置与数据库软件相同。\n\n在 Oracle 的早期，网络协议栈的 Oracle 部分被称为透明网络底层（TNS）。后来，它被更名为\
    \ `SQL*Net`。如今，该网络栈简称为 `Oracle Net`。原始的 TNS 缩写仍然可见，正如我们将在下一节中看到的。\n\n## TNSNAMES\n\
    \n在本章前面的“Oracle 监听器”部分，您了解到监听器是连接请求的中介。回想一下，为了建立成功的连接，我们需要知道网络协议、主机、端口和服务名。这四个信息片段每次连接\
    \ Oracle 时都可能难以记住。值得庆幸的是，我们可以创建一个别名、一个快捷方式，使用一个名字来定义所有四个关键信息片段。\n\n`$ORACLE_HOME/network/admin`\
    \ 目录可能包含一个名为 `tnsnames.ora` 的文件。这就是我们别名的存放位置。用 Oracle 的术语来说，我们通常称这些为 *TNS 别名*。如果\
    \ `tnsnames.ora` 文件不存在，那只是因为我们尚未创建它。我们可以用任何文本编辑器创建一个。一个示例如清单 [9-9] 所示。\n\n```\n\
    tnsaliasX =\n(DESCRIPTION =\n  (ADDRESS_LIST =\n    (ADDRESS = (PROTOCOL = TCP)(HOST\
    \ = localhost)(PORT = 1521))\n  )\n  (CONNECT_DATA =\n    (SERVICE_NAME = orcl)\n\
    \  )\n)\n清单 9-9\nTNSNAMES 别名\n```\n\n在清单 [9-9] 中，别名名称是 `tnsaliasX`。别名可以是我们选择的任何名称。还记得那四个重要信息吗？我们可以在别名定义中看到它们：协议（`TCP`）、主机（`localhost`）、端口（`1521`）和服务名（`orcl`）都存在。现在我们只需要记住别名名称，就可以用它来连接数据库。在清单\
    \ [9-9] 中，别名是在数据库服务器上创建的，所以主机只是 `localhost`。您可以在测试环境中创建一个像这样的 TNS 别名来模拟非本地连接，正如我们将在本章中做的那样。如果这个别名是在工作站的\
    \ `Oracle Client` 的 `network/admin` 目录中创建的，主机值将指向一个特定的数据库主机。\n\n一个 `tnsnames.ora`\
    \ 文件当然可以包含多个别名以支持多个应用程序。我通常将别名命名为有意义的名称。清单 [9-9] 中的例子不是很具有意义，因为 `tnsaliasX` 可能暗示任何东西。一个更有意义的别名可能是\
    \ `hr_prod`，我们可以很容易地看出它是用于生产人力资源数据库的。尽量避免像 `prod` 或 `dev` 这样的通用别名，因为迟早您会拥有不止一个生产或开发数据库，然后您就不知道这个别名指的是哪一个了。\n\
    \n在本书中，我将把我的别名改为 `dbamentor`。我们可以使用 `tnsping` 实用程序测试该别名，如清单 [9-10] 所示。\n\n```\n\
    [oracle@oracle122 admin]$ tnsping dbamentor\nTNS Ping Utility for Linux: Version\
    \ 12.2.0.1.0 - Production on 09-JUL-2018 23:53:24\nCopyright (c) 1997, 2016, Oracle.\
    \  All rights reserved.\nUsed parameter files:\nUsed TNSNAMES adapter to resolve\
    \ the alias\nAttempting to contact (DESCRIPTION = (ADDRESS_LIST = (ADDRESS = (PROTOCOL\
    \ = TCP)(HOST = localhost)(PORT = 1521))) (CONNECT_DATA = (SERVICE_NAME = orcl)))\n\
    OK (60 msec)\n清单 9-10\nTNSPING 实用程序\n```\n\n`tnsping` 实用程序查找提供的 TNS 别名，并尝试将其解析为协议、主机、端口和服务名。输出的最后一行简单地显示\
    \ `OK`。此实用程序用于确认在该主机上、使用该端口、运行着 Oracle 监听器，并且可以处理该服务名。基本上，`tnsping` 验证数据库的监听器具有相同的四个组件。`Tnsping`\
    \ 不执行任何其他检查。`Tnsping` 不能用于验证该机器上是否运行着 Oracle 实例。\n\n现在我们已经定义了一个 TNS 别名，我们可以用它来远程连接到\
    \ Oracle 实例。使用 `SQL*Plus`，我们只需在用户名后面加上 `@` 符号分隔的 TNS 别名。这个符号是 `SQL*Plus` 在提供的信息中识别\
    \ TNS 别名起始位置的方式。清单 [9-11] 中的示例使用 TNS 别名连接到数据库。\n\n```\n[oracle@oracle122 admin]$\
    \ sqlplus peasland@dbamentor\nSQL*Plus: Release 12.2.0.1.0 Production on Mon Jul\
    \ 9 23:57:28 2018\nCopyright (c) 1982, 2016, Oracle.  All rights reserved.\nEnter\
    \ password:\nLast Successful login time: Mon Jul 09 2018 14:37:40 -05:00\nConnected\
    \ to:\nOracle Database 12c Enterprise Edition Release 12.2.0.1.0 - 64bit Production\n\
    SQL> select spid from v$process\n  2  where addr in (select paddr from v$session\n\
    \  3                where username='PEASLAND');\nSPID\nSQL> !ps -ef|grep 15206\n\
    oracle   15206     1  0 Jul09 ?        00:00:00 oracleorcl (LOCAL=NO)\n清单 9-11\n\
    使用 TNS 别名的 SQL*Plus\n```\n\n连接建立后，我们运行了本章前面清单 [9-5] 中的相同 SQL 语句，以找到我们连接的专用服务器进程。注意，这不再是\
    \ `LOCAL` 连接了。请记住，这个会话是从数据库服务器本身启动的，所以从技术上讲它是一个本地连接。然而，这个连接没有使用 `Bequeath` 协议，而是使用了\
    \ `TCP`。因此，对于 Oracle 来说，它看起来是一个远程、非本地的连接。\n\n需要记住的重要事项是，远程连接需要知道网络协议、主机、端口和服务名。我们可以使用\
    \ TNS 别名来减轻我们记忆所有这些信息的负担。\n"
- fmt: '## Common TNS Errors


    如果连接请求失败，Oracle会提供错误信息。对很多人来说，错误信息可能有点令人困惑。阅读本章，你已经在理解如何解决最常见的错误方面取得了很大进展，因为你已经知道了四个重要组成部分：协议、主机、端口和服务。很可能其中一个（或多个）组成部分定义不正确。在代码清单[9-12](#467924_1_En_9_Chapter.xhtml#PC12)中，我们可以看到`tnsping`工具收到了`TNS-12545`错误。


    ```

    [oracle@oracle122 admin]$ tnsping dbamentor

    TNS Ping Utility for Linux: Version 12.2.0.1.0 - Production on 10-JUL-2018 00:06:22

    Copyright (c) 1997, 2016, Oracle.  All rights reserved.

    Used parameter files:

    Used TNSNAMES adapter to resolve the alias

    Attempting to contact (DESCRIPTION = (ADDRESS_LIST = (ADDRESS = (PROTOCOL = TCP)(HOST
    = loclhost)(PORT = 1521))) (CONNECT_DATA = (SERVICE_NAME = orcl)))

    TNS-12545: Connect failed because target host or object does not exist

    ```

    代码清单 9-12

    TNS-12545 错误


    如果你仔细阅读错误信息，可以看到问题根本原因的线索。“目标主机”不存在。看一下输出中定义主机的其他部分。注意“localhost”缺少了字母*a*。一个简单的拼写错误导致了这个问题。更正`TNS`别名中的主机后问题就解决了。现在让我们看下一个示例，代码清单[9-13](#467924_1_En_9_Chapter.xhtml#PC13)。


    ```

    oracle@oracle122 admin]$ tnsping dbamentor

    TNS Ping Utility for Linux: Version 12.2.0.1.0 - Production on 10-JUL-2018 00:10:58

    Copyright (c) 1997, 2016, Oracle.  All rights reserved.

    Used parameter files:

    Used TNSNAMES adapter to resolve the alias

    Attempting to contact (DESCRIPTION = (ADDRESS_LIST = (ADDRESS = (PROTOCOL = TCP)(HOST
    = localhost)(PORT = 15211))) (CONNECT_DATA = (SERVICE_NAME = orcl)))

    TNS-12541: TNS:no listener

    ```

    代码清单 9-13

    TNS-12541 错误


    这一次，错误信息说明没有运行的监听器。数据库管理员检查了监听器并确认它是启动并运行的。你从上面的输出中看到问题所在了吗？记住，监听器在特定机器的特定端口上运行。端口定义错了。端口应该是`1521`，而不是`15211`。


    这是一个快速讨论端口的好地方。我们知道监听器使用特定端口，通常是`1521`。如果我们想连接到Oracle实例，防火墙需要允许访问这个端口。不那么明显的是，每个服务器进程（专用或共享）都有分配给它自己的端口，范围很广。仅仅通过防火墙开放`1521`端口可能不够。如果你怀疑防火墙阻止了连接，请与你的网络团队合作。如果你在云环境中运行Oracle，请与你的云提供商合作。


    在下一个示例代码清单[9-14](#467924_1_En_9_Chapter.xhtml#PC14)中，我们将为服务名指定一个不正确的值，并尝试使用`SQL*Plus`建立连接。


    ```

    [oracle@oracle122 admin]$ sqlplus peasland@dbamentor

    SQL*Plus: Release 12.2.0.1.0 Production on Tue Jul 10 00:14:31 2018

    Copyright (c) 1982, 2016, Oracle.  All rights reserved.

    Enter password:

    ERROR:

    ORA-12514: TNS:listener does not currently know of service requested in connect

    descriptor

    ```

    代码清单 9-14

    ORA-12514 错误


    `ORA-12514`错误告诉我们，监听器在该主机和端口上被联系到了，但它不知道我们提供的服务名。在这种情况下，数据库管理员需要检查`TNS`别名以确定指定了什么服务名。然后与“`lsnrctl
    status`”的输出进行比较，以确保服务名在那里。通常，`TNS`别名的`SERVICE_NAME`存在不匹配。


    最后一个例子还引出了另外一点。注意这次错误编号以`ORA`开头，而不是`TNS`。在处理`TNS`错误时，你可能会看到Oracle代码交换前缀，但编号将保持不变。所以`ORA-12514`和`TNS-12514`是完全相同的错误。


    ## EZ Connect


    `TNS`别名可以使你的生活更轻松，因为你不需要记住或输入协议、主机、端口和服务名。当你需要连接到一个远程数据库几次但不是很频繁时，`TNS`别名可能会使你的生活更加困难。使用`TNS`别名，你必须用文本编辑器打开`tnsnames.ora`文件，添加适当的别名，然后保存文件。最后，你可以在连接中使用该`TNS`别名。如果这是你唯一一次连接到该数据库，你还必须记得再次编辑`tnsnames.ora`文件以删除该别名。


    Oracle Database 10*g*通过引入EZ Connect方法使生活变得容易了一些。使用EZ Connect，你可以在传统上输入`TNS`别名的地方指定主机、端口和服务名。EZ
    Connect总是假定协议是`TCP`，所以如果你需要不同的网络协议，你就必须定义`TNS`别名。


    使用`SQL*Plus`时，“`@tnsalias`”结构用于定义要连接到的远程数据库。EZ Connect的形式是`@//*hostname*:*port*/*service*`。如果你省略端口，EZ
    Connect假定默认端口`1521`。EZ Connect格式提供了所需信息中的三个部分：主机名、端口和服务。我们知道EZ Connect只使用`TCP`协议，所以这是第四个也是最后一个信息部分。


    示例代码清单[9-15](#467924_1_En_9_Chapter.xhtml#PC15)展示了使用EZ Connect进行连接。


    ```

    [oracle@oracle122 ~]$ sqlplus peasland/password@//localhost:1521/orcl

    SQL*Plus: Release 12.2.0.1.0 Production on Tue Jul 10 08:53:23 2018

    Copyright (c) 1982, 2016, Oracle.  All rights reserved.

    Last Successful login time: Tue Jul 10 2018 08:53:16 -05:00

    Connected to:

    Oracle Database 12c Enterprise Edition Release 12.2.0.1.0 - 64bit Production

    SQL>

    ```

    代码清单 9-15

    使用 SQL*Plus 的 EZ Connect


    当与`SQL*Plus`一起使用EZ Connect时，你必须在`@`符号之前包含用户名和密码。如果你省略密码，将会收到错误。


    并非所有应用程序都支持EZ Connect。像`SQL*Plus`这样的Oracle自带工具将接受EZ Connect，但许多第三方应用程序不会。通常，第三方应用程序始终连接到同一个数据库，因此不支持EZ
    Connect并不是什么大问题，因为我们会为该应用程序定义一个`TNS`别名。'
  raw: '## Common TNS Errors


    If a connection request fails, Oracle will provide an error message. For many
    people, the error messages can be a bit confusing. By reading this chapter, you
    are already well on your way to understanding how to resolve the most common errors
    because you know the four important pieces: protocol, host, port, and service.
    There is a good chance that one (or more) of those pieces is defined incorrectly.
    In Listing [9-12](#467924_1_En_9_Chapter.xhtml#PC12), we can see the tnsping utility
    has received the TNS-12545 error.


    ```

    [oracle@oracle122 admin]$ tnsping dbamentor

    TNS Ping Utility for Linux: Version 12.2.0.1.0 - Production on 10-JUL-2018 00:06:22

    Copyright (c) 1997, 2016, Oracle.  All rights reserved.

    Used parameter files:

    Used TNSNAMES adapter to resolve the alias

    Attempting to contact (DESCRIPTION = (ADDRESS_LIST = (ADDRESS = (PROTOCOL = TCP)(HOST
    = loclhost)(PORT = 1521))) (CONNECT_DATA = (SERVICE_NAME = orcl)))

    TNS-12545: Connect failed because target host or object does not exist

    Listing 9-12

    TNS-12545 Error

    ```


    If you read the error message carefully, you can see the clue as to the root cause
    of the problem. The “target host” does not exist. Look at the rest of the output
    where the host is defined. Notice that “localhost” is missing the letter *a*.
    A simple typo caused this problem. Correcting the host in the TNS alias resolved
    the issue. Now let’s look at the next example in Listing [9-13](#467924_1_En_9_Chapter.xhtml#PC13).


    ```

    oracle@oracle122 admin]$ tnsping dbamentor

    TNS Ping Utility for Linux: Version 12.2.0.1.0 - Production on 10-JUL-2018 00:10:58

    Copyright (c) 1997, 2016, Oracle.  All rights reserved.

    Used parameter files:

    Used TNSNAMES adapter to resolve the alias

    Attempting to contact (DESCRIPTION = (ADDRESS_LIST = (ADDRESS = (PROTOCOL = TCP)(HOST
    = localhost)(PORT = 15211))) (CONNECT_DATA = (SERVICE_NAME = orcl)))

    TNS-12541: TNS:no listener

    Listing 9-13

    TNS-12541 Error

    ```


    This time, the error message is stating that there is no Listener running. The
    database administrator checks the Listener and verifies that it is up and running.
    Do you see the problem from the output above? Remember that a Listener runs on
    a specific machine listening on a specific port. The port was defined wrong. The
    port should be 1521, not 15211.


    This is a good place to have a quick discussion about ports. We know the Listener
    uses a specific port, typically 1521\. Firewalls need to allow access to this
    port if we want to connect to the Oracle instance. What is less obvious is that
    each server process, dedicated or shared, has its own port assigned to it, in
    a wide range. Opening up access to port 1521 through the firewall may not be sufficient.
    Work with your network team if you suspect the firewall is stopping connections
    from being made. If you are running Oracle in a cloud environment, work with your
    cloud provider.


    In the next example in Listing [9-14](#467924_1_En_9_Chapter.xhtml#PC14), we will
    specify an incorrect value for the service name and try to make a connection with
    SQL*Plus.


    ```

    [oracle@oracle122 admin]$ sqlplus peasland@dbamentor

    SQL*Plus: Release 12.2.0.1.0 Production on Tue Jul 10 00:14:31 2018

    Copyright (c) 1982, 2016, Oracle.  All rights reserved.

    Enter password:

    ERROR:

    ORA-12514: TNS:listener does not currently know of service requested in connect

    descriptor

    Listing 9-14

    ORA-12514 Error

    ```


    The ORA-12514 error is telling us that the Listener was contacted on that host
    and port but it does not know anything about the service name we supplied. In
    this case, the database administrator will need to examine the TNS alias to determine
    what service name was specified. Then compare to the “lsnrctl status” output to
    ensure the service name is there. Typically, there is a mismatch in the SERVICE_NAME
    for the TNS alias.


    The last example also brings up one other point. Notice that this time the error
    number started with ORA, not TNS. When dealing with TNS errors, you may see the
    Oracle code interchange the prefix, but the number will stay the same. So ORA-12514
    and TNS-12514 are the same exact error.


    ## EZ Connect


    The TNS alias can make your life easier because you do not have to remember nor
    type in the protocol, host, port, and service name. The TNS alias can make your
    life more difficult when you need to connect to a remote database a few times
    but not often. With the TNS alias, you must open the tnsnames.ora file with a
    text editor, add the appropriate alias, then save the file. Finally, you can use
    the TNS alias in your connection. If this is the only time you will be connecting
    to that database, you would have to remember to edit the tnsnames.ora file once
    more to remove that alias.


    Oracle Database 10*g* made life a little easier by introducing the EZ Connect
    method. With EZ Connect, you can specify the host, port, and service name where
    you would traditionally enter the TNS alias. EZ Connect always assumes the protocol
    is TCP, so if you need a different network protocol, you are stuck with defining
    a TNS alias.


    With SQL*Plus, the “@tnsalias” construct is used to define the remote database
    to connect to. EZ Connect has the form @//*hostname*:*port*/*service*. If you
    omit the port, EZ Connect assumes the default port, 1521\. The EZ Connect format
    provides three pieces of the required information: hostname, port, and service.
    And we know that EZ Connect only uses the TCP protocol, so that is the fourth
    and final piece of information.


    The example in Listing [9-15](#467924_1_En_9_Chapter.xhtml#PC15) shows connecting
    with EZ Connect.


    ```

    [oracle@oracle122 ~]$ sqlplus peasland/password@//localhost:1521/orcl

    SQL*Plus: Release 12.2.0.1.0 Production on Tue Jul 10 08:53:23 2018

    Copyright (c) 1982, 2016, Oracle.  All rights reserved.

    Last Successful login time: Tue Jul 10 2018 08:53:16 -05:00

    Connected to:

    Oracle Database 12c Enterprise Edition Release 12.2.0.1.0 - 64bit Production

    SQL>

    Listing 9-15

    EZ Connect with SQL*Plus

    ```


    When using EZ Connect with SQL*Plus, you must include the username and password
    before the @ symbol. If you omit the password, you will receive an error.


    Not all applications support EZ Connect. Oracle-supplied utilities like SQL*Plus
    will accept EZ Connect but many third-party applications will not. Typically,
    a third-party application connects to the same database all the time, so the lack
    of EZ Connect support is not a big deal because we would define a TNS alias for
    the application.'
  trans: '## 常见 TNS 错误


    如果连接请求失败，Oracle 会提供错误信息。对很多人来说，错误信息可能有点令人困惑。阅读本章，你已经在理解如何解决最常见的错误方面取得了很大进展，因为你已经知道了四个重要组成部分：协议、主机、端口和服务。很可能其中一个（或多个）组成部分定义不正确。在代码清单
    9-12 中，我们可以看到`tnsping`工具收到了`TNS-12545`错误。


    ```

    [oracle@oracle122 admin]$ tnsping dbamentor

    TNS Ping Utility for Linux: Version 12.2.0.1.0 - Production on 10-JUL-2018 00:06:22

    Copyright (c) 1997, 2016, Oracle.  All rights reserved.

    Used parameter files:

    Used TNSNAMES adapter to resolve the alias

    Attempting to contact (DESCRIPTION = (ADDRESS_LIST = (ADDRESS = (PROTOCOL = TCP)(HOST
    = loclhost)(PORT = 1521))) (CONNECT_DATA = (SERVICE_NAME = orcl)))

    TNS-12545: Connect failed because target host or object does not exist

    ```

    代码清单 9-12

    TNS-12545 错误


    如果你仔细阅读错误信息，可以看到问题根本原因的线索。“目标主机”不存在。看一下输出中定义主机的其他部分。注意“localhost”缺少了字母*a*。一个简单的拼写错误导致了这个问题。更正`TNS`别名中的主机后问题就解决了。现在让我们看下一个示例，代码清单
    9-13。


    ```

    oracle@oracle122 admin]$ tnsping dbamentor

    TNS Ping Utility for Linux: Version 12.2.0.1.0 - Production on 10-JUL-2018 00:10:58

    Copyright (c) 1997, 2016, Oracle.  All rights reserved.

    Used parameter files:

    Used TNSNAMES adapter to resolve the alias

    Attempting to contact (DESCRIPTION = (ADDRESS_LIST = (ADDRESS = (PROTOCOL = TCP)(HOST
    = localhost)(PORT = 15211))) (CONNECT_DATA = (SERVICE_NAME = orcl)))

    TNS-12541: TNS:no listener

    ```

    代码清单 9-13

    TNS-12541 错误


    这一次，错误信息说明没有运行的监听器。数据库管理员检查了监听器并确认它是启动并运行的。你从上面的输出中看到问题所在了吗？记住，监听器在特定机器的特定端口上运行。端口定义错了。端口应该是`1521`，而不是`15211`。


    这是一个快速讨论端口的好地方。我们知道监听器使用特定端口，通常是`1521`。如果我们想连接到 Oracle 实例，防火墙需要允许访问这个端口。不那么明显的是，每个服务器进程（专用或共享）都有分配给它自己的端口，范围很广。仅仅通过防火墙开放`1521`端口可能不够。如果你怀疑防火墙阻止了连接，请与你的网络团队合作。如果你在云环境中运行
    Oracle，请与你的云提供商合作。


    在下一个示例代码清单 9-14 中，我们将为服务名指定一个不正确的值，并尝试使用`SQL*Plus`建立连接。


    ```

    [oracle@oracle122 admin]$ sqlplus peasland@dbamentor

    SQL*Plus: Release 12.2.0.1.0 Production on Tue Jul 10 00:14:31 2018

    Copyright (c) 1982, 2016, Oracle.  All rights reserved.

    Enter password:

    ERROR:

    ORA-12514: TNS:listener does not currently know of service requested in connect

    descriptor

    ```

    代码清单 9-14

    ORA-12514 错误


    `ORA-12514`错误告诉我们，监听器在该主机和端口上被联系到了，但它不知道我们提供的服务名。在这种情况下，数据库管理员需要检查`TNS`别名以确定指定了什么服务名。然后与“`lsnrctl
    status`”的输出进行比较，以确保服务名在那里。通常，`TNS`别名的`SERVICE_NAME`存在不匹配。


    最后一个例子还引出了另外一点。注意这次错误编号以`ORA`开头，而不是`TNS`。在处理`TNS`错误时，你可能会看到 Oracle 代码交换前缀，但编号将保持不变。所以`ORA-12514`和`TNS-12514`是完全相同的错误。


    ## EZ Connect


    `TNS`别名可以使你的生活更轻松，因为你不需要记住或输入协议、主机、端口和服务名。当你需要连接到一个远程数据库几次但不是很频繁时，`TNS`别名可能会使你的生活更加困难。使用`TNS`别名，你必须用文本编辑器打开`tnsnames.ora`文件，添加适当的别名，然后保存文件。最后，你可以在连接中使用该`TNS`别名。如果这是你唯一一次连接到该数据库，你还必须记得再次编辑`tnsnames.ora`文件以删除该别名。


    Oracle Database 10*g*通过引入 EZ Connect 方法使生活变得容易了一些。使用 EZ Connect，你可以在传统上输入`TNS`别名的地方指定主机、端口和服务名。EZ
    Connect 总是假定协议是`TCP`，所以如果你需要不同的网络协议，你就必须定义`TNS`别名。


    使用`SQL*Plus`时，“`@tnsalias`”结构用于定义要连接到的远程数据库。EZ Connect 的形式是`@//*hostname*:*port*/*service*`。如果你省略端口，EZ
    Connect 假定默认端口`1521`。EZ Connect 格式提供了所需信息中的三个部分：主机名、端口和服务。我们知道 EZ Connect 只使用`TCP`协议，所以这是第四个也是最后一个信息部分。


    示例代码清单 9-15 展示了使用 EZ Connect 进行连接。


    ```

    [oracle@oracle122 ~]$ sqlplus peasland/password@//localhost:1521/orcl

    SQL*Plus: Release 12.2.0.1.0 Production on Tue Jul 10 08:53:23 2018

    Copyright (c) 1982, 2016, Oracle.  All rights reserved.

    Last Successful login time: Tue Jul 10 2018 08:53:16 -05:00

    Connected to:

    Oracle Database 12c Enterprise Edition Release 12.2.0.1.0 - 64bit Production

    SQL>

    ```

    代码清单 9-15

    使用 SQL*Plus 的 EZ Connect


    当与`SQL*Plus`一起使用 EZ Connect 时，你必须在`@`符号之前包含用户名和密码。如果你省略密码，将会收到错误。


    并非所有应用程序都支持 EZ Connect。像`SQL*Plus`这样的 Oracle 自带工具将接受 EZ Connect，但许多第三方应用程序不会。通常，第三方应用程序始终连接到同一个数据库，因此不支持
    EZ Connect 并不是什么大问题，因为我们会为该应用程序定义一个`TNS`别名。'
- fmt: '### ODBC


    开放数据库连接（`ODBC`）已经存在了很长时间。它的唯一目的是将应用程序连接到某种数据库。`ODBC`是一种软件驱动程序，有助于使数据库连接与所使用的数据库系统无关。


    你是否支持过供应商声称可以使用`Oracle`或`SQL Server`的应用程序？供应商可能还支持其他数据库引擎。供应商通常不会为其软件编写两个不同的版本，一个用于`SQL
    Server`，一个用于`Oracle`。相反，供应商使用`ODBC`打开一个与数据库无关的连接。无论使用哪个数据库，应用程序代码基本相同。并非所有的`SQL`语句都是一样的。针对`Oracle`数据库执行的`SQL`语句可能与针对`SQL
    Server`执行的相同`SQL`语句性能不同。好的应用程序供应商会根据所使用的数据库引擎采用略有不同的代码路径。然而，由于`ODBC`，对数据库的调用是相同的。这有助于加快应用程序开发速度。


    在应用程序所在的机器上，必须安装了`Oracle` `ODBC`驱动程序，该应用程序才能连接到`Oracle`。必须安装了`SQL Server` `ODBC`驱动程序才能连接到`SQL
    Server`，依此类推。


    在`Windows`系统上，你可以使用`ODBC`数据源管理器实用程序查看已安装的驱动程序。在`Windows 10`工作站上，在搜索框（屏幕左下角）中键入“`ODBC`”，`Windows`将为你找到该实用程序。有两个实用程序，一个用于`32`位，一个用于`64`位。编译为`32`位应用程序的应用程序将使用`32`位`ODBC`驱动程序。编译为`64`位的应用程序将使用`64`位`ODBC`驱动程序。


    在图 9-3 中，我们可以看到`32`位`ODBC`数据源管理器。单击“驱动程序”选项卡可显示已安装的驱动程序。你可能需要向下滚动一点才能看到`Oracle`的驱动程序。


    ![图 9-3](images/467924_1_En_9_Chapter/467924_1_En_9_Fig3_HTML.png)


    图 9-3

    `Windows 10`中的`ODBC`驱动程序


    `Windows`通常包含许多预安装的`ODBC`驱动程序。你可以在列表中看到`Microsoft ODBC for Oracle`驱动程序。你还可以在列表中看到`ODBC
    Driver 13 for SQL Server`和`SQL Server`。


    ### 提示


    永远不要使用`Microsoft ODBC for Oracle`驱动程序。`Oracle`提供的`ODBC`驱动程序效果要好得多。


    在该列表的末尾附近，你可以看到名为`Oracle in OraClient12Home1_32bit`的驱动程序，这是在该机器上安装`Oracle Client`时安装的`Oracle`
    `ODBC`驱动程序。如果你想为应用程序使用`ODBC`连接到`Oracle`数据库，请为避免将来的麻烦，安装带有`ODBC`驱动程序的`Oracle Client`。其他`ODBC`驱动程序可能声称可以与`Oracle`一起使用，但我遇到了太多问题，尤其是性能方面的问题，因此只使用`Oracle`的`ODBC`驱动程序。


    在使用`ODBC`之前，必须创建数据源名称（`DSN`）。应用程序指定用户名、密码和`DSN`来连接到数据库。如果你是为第三方应用程序创建`DSN`，供应商可能会告诉你`DSN`需要命名为什么。否则，你可以使用任何你选择的名称。`DSN`是为特定的`ODBC`驱动程序创建的。例如，你可能有一个名为`hr_orcl_dev`的`DSN`，它使用`Oracle`
    `ODBC`驱动程序，另一个名为`hr_mysql_dev`的`DSN`，它使用`MySQL` `ODBC`驱动程序。正是这些`DSN`指向了要使用的`ODBC`驱动程序。


    `DSN`有两种类型：用户`DSN`和系统`DSN`。区别在于`DSN`的可见范围。用户`DSN`只能由创建它的用户使用。系统`DSN`可以由系统的任何用户使用。如果你的工作站仅供一个人使用，那么配置哪种`DSN`类型并不重要。如果你的工作站由多人使用，那么选择可能很重要。你希望其他人也使用这个相同的`DSN`吗？如果是，则创建系统`DSN`；否则，创建用户`DSN`。


    让我们看看如何创建系统`DSN`。在`ODBC`数据源管理器中，单击“系统`DSN`”选项卡，如图 9-4 所示。然后单击“添加”按钮以创建系统`DSN`。


    ![图 9-4](images/467924_1_En_9_Chapter/467924_1_En_9_Fig4_HTML.jpg)


    图 9-4

    `ODBC`数据源管理器中的系统`DSN`选项卡


    数据源窗口将询问你为此`DSN`使用哪个驱动程序。选择`Oracle`驱动程序，如图 9-5 所示，然后单击“完成”按钮。


    ![图 9-5](images/467924_1_En_9_Chapter/467924_1_En_9_Fig5_HTML.jpg)


    图 9-5

    创建新数据源窗口


    尽管你单击了名为“完成”的按钮，但你还没有完成。这会弹出另一个窗口，如图 9-6 所示，你需要在其中提供数据源名称。如前所述，第三方应用程序供应商可能期望一个特定的名称。如果你选择，可以输入可选的描述。在下一个字段中，你需要指定`TNS`别名。如图
    9-6 所示，我在`tnsnames.ora`配置文件中创建了一个名为`hrdev1`的别名，以指向正确的`Oracle`实例。你也可以输入用户名。第三方应用程序可能会在代码中指定用户名。


    ![图 9-6](images/467924_1_En_9_Chapter/467924_1_En_9_Fig6_HTML.jpg)


    图 9-6

    驱动程序配置


    通常，可以忽略“应用程序”、“Oracle”、“解决方法”和“SQL Server 迁移”选项卡中的其余信息。默认值通常就足够了。当一切准备就绪时，单击“测试连接”按钮。你将收到另一个窗口，要求输入用户名和密码。如果在`DSN`定义中指定了用户名，此值将自动为你填写。窗口将如图
    9-7 所示。


    ![图 9-7](images/467924_1_En_9_Chapter/467924_1_En_9_Fig7_HTML.jpg)


    图 9-7

    `ODBC`驱动程序连接


    单击“确定”按钮测试连接。如果一切设置正确，你将收到另一个窗口，如图 9-8 所示，表明连接成功。


    ![图 9-8](images/467924_1_En_9_Chapter/467924_1_En_9_Fig8_HTML.png)


    图 9-8

    `ODBC`连接成功


    如果出现错误，最终窗口将给你一条错误消息，你必须解决它。否则，单击“确定”关闭窗口并返回到`ODBC`数据源管理器实用程序。系统`DSN`选项卡应显示已创建的`DSN`。


    你并不局限于将`ODBC`用于应用程序。它对于连接到数据库的脚本编写可能很有用。当今使用的一种流行脚本语言是`Python`。清单 9-16 中的示例显示了用于创建到`Oracle`
    `DSN`的`ODBC`连接的`Python`代码。如果你想使用`ODBC`，`Python`使用`pyodbc`库。


    ```python

    import pyodbc

    cnxn = pyodbc.connect("DSN=HRDEV1")

    ```

    清单 9-16

    `Python` `ODBC`示例


    如果相同的`Python`代码需要连接到`SQL Server`，只需将对`pyodbc.connect`的调用更改为适当的`DSN`。'
  raw: '### ODBC


    Open Database Computing (ODBC) has been around for a very long time. Its sole
    purpose is to connect an application to a database of some sort. ODBC is a software
    driver that helps make the database connection independent of the database system
    in use.


    Have you ever supported an application that the vendor told you can use either
    Oracle or SQL Server? The vendor might offer support for other database engines
    as well. The vendor typically does not write two different versions of its software,
    one for SQL Server and one for Oracle. Instead, the vendor opens a database-independent
    connection using ODBC. The application code is largely the same no matter which
    database is in use. Not all SQL statements are the same. A SQL statement issued
    against an Oracle database may perform differently than the same SQL statement
    issued against SQL Server. Good application vendors will have slightly different
    code paths depending on the database engine in use. However, the calls to the
    database are the same because of ODBC. This helps speed up application development.


    On the application’s machine, someone must have an Oracle ODBC driver installed
    for that application to connect to Oracle. It must have a SQL Server ODBC driver
    installed to connect to SQL Server, and so on.


    On Windows systems, you can see the installed drivers with the ODBC Data Source
    Administrator utility. On a Windows 10 workstation, type “ODBC” in the search
    box (bottom left of the screen) and Windows will find the utility for you. There
    are two utilities, one for 32-bit and one for 64-bit. Applications that are compiled
    as 32-bit apps will use 32-bit ODBC drivers. Applications that are compiled as
    64-bit will use 64-bit ODBC drivers.


    In Figure [9-3](#467924_1_En_9_Chapter.xhtml#Fig3), we can see the 32-bit ODBC
    Data Source Administrator. Clicking the Drivers tab displays the installed drivers.
    You might have to scroll down a bit to see ones for Oracle.


    ![../images/467924_1_En_9_Chapter/467924_1_En_9_Fig3_HTML.png](images/467924_1_En_9_Chapter/467924_1_En_9_Fig3_HTML.png)


    Figure 9-3


    ODBC drivers in Windows 10


    Windows normally includes many preinstalled ODBC drivers. You can see the Microsoft
    ODBC for Oracle driver in the list. You can also see the ODBC Driver 13 for SQL
    Server and SQL Server in the list.


    ### Tip


    Never use the Microsoft ODBC for Oracle driver. The ODBC driver supplied by Oracle
    works much better.


    Toward the end of that list, you can see the driver named Oracle in OraClient12Home1_32bit,
    which is the Oracle ODBC driver installed when Oracle Client was installed on
    that machine. If you want to use ODBC for your application to connect to an Oracle
    database, save yourself the future headache and install Oracle Client with the
    ODBC driver. Other ODBC drivers may say they work with Oracle, but I’ve run into
    too many issues, especially with performance, to use anything other than Oracle’s
    ODBC drivers.


    Before you can use ODBC, you must create a Data Source Name (DSN). The application
    specifies a username, password, and DSN to connect to the database. If you are
    creating a DSN for a third-party application, the vendor may tell you what the
    DSN needs to be named. Otherwise, you can use any name you choose. The DSN is
    created for a specific ODBC driver. For example, you may have one DSN named hr_orcl_dev
    that uses the Oracle ODBC driver and another DSN named hr_mysql_dev that uses
    a MySQL ODBC driver. It is these DSNs that point to the ODBC driver to use.


    There are two types of DSNs: user DSN and system DSN. The difference is the scope
    of visibility of the DSN. A user DSN can be used only by the user that created
    it. A system DSN can be used by any user of the system. If your workstation is
    only used by one person, then it does not matter which DSN type you configure.
    If your workstation is used by multiple people, then the choice can be important.
    Do you want others to use this same DSN? If so, then create a system DSN; otherwise,
    create a user DSN.


    Let’s see how to create a system DSN. In the ODBC Data Source Administrator, click
    the System DSN tab, shown in Figure [9-4](#467924_1_En_9_Chapter.xhtml#Fig4).
    Then click the Add button to create a system DSN.


    ![../images/467924_1_En_9_Chapter/467924_1_En_9_Fig4_HTML.jpg](images/467924_1_En_9_Chapter/467924_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    System DSN tab in ODBC Data Source Administrator


    The Data Source Window will ask you which driver to use for this DSN. Select the
    Oracle driver, as shown in Figure [9-5](#467924_1_En_9_Chapter.xhtml#Fig5), and
    click the Finish button.


    ![../images/467924_1_En_9_Chapter/467924_1_En_9_Fig5_HTML.jpg](images/467924_1_En_9_Chapter/467924_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Create New Data Source window


    Even though you clicked a button named Finish, you are not yet done. This pops
    up another window, shown in Figure [9-6](#467924_1_En_9_Chapter.xhtml#Fig6), in
    which you provide the Data Source Name. As previously stated, a third-party application
    vendor may be expecting a specific name. You can enter an optional description
    if you choose. In the next field, you will need to specify the TNS alias. As shown
    in Figure [9-6](#467924_1_En_9_Chapter.xhtml#Fig6), I created an alias named hrdev1
    in my tnsnames.ora configure file to point to the correct Oracle instance. You
    can enter in a username as well. Third-party applications may specify the username
    in code.


    ![../images/467924_1_En_9_Chapter/467924_1_En_9_Fig6_HTML.jpg](images/467924_1_En_9_Chapter/467924_1_En_9_Fig6_HTML.jpg)


    Figure 9-6


    Driver configuration


    Typically, the rest of the information in the Application, Oracle, Workarounds,
    and SQLServer Migration tabs can be ignored. The default values are normally sufficient.
    When everything looks ready, click the Test Connection button. You will receive
    another window asking for the username and password. If you specified a username
    in the DSN definition, this value will automatically be filled in for you. The
    window will look like Figure [9-7](#467924_1_En_9_Chapter.xhtml#Fig7).


    ![../images/467924_1_En_9_Chapter/467924_1_En_9_Fig7_HTML.jpg](images/467924_1_En_9_Chapter/467924_1_En_9_Fig7_HTML.jpg)


    Figure 9-7


    ODBC Driver Connect


    Click the OK button to test the connection. If everything is set up correctly,
    you will receive another window, shown in Figure [9-8](#467924_1_En_9_Chapter.xhtml#Fig8),
    indicating a successful connection.


    ![../images/467924_1_En_9_Chapter/467924_1_En_9_Fig8_HTML.png](images/467924_1_En_9_Chapter/467924_1_En_9_Fig8_HTML.png)


    Figure 9-8


    ODBC successful connection


    If there is an error, that final window will give you an error message that you
    will have to resolve. Otherwise, click OK to close the windows and return to the
    ODBC Data Source Administrator utility. The System DSN tab should show the DSN
    that was created.


    You are not limited to using ODBC for applications. It may be useful for coding
    scripts that connect to a database. One popular scripting language in use today
    is Python. The example in Listing [9-16](#467924_1_En_9_Chapter.xhtml#PC16) shows
    Python code to create an ODBC connection to an Oracle DSN. Python uses the pyodbc
    library if you want to use ODBC.


    ```

    import pyodbc

    cnxn = pyodbc.connect("DSN=HRDEV1")

    Listing 9-16

    Python ODBC Example

    ```


    If this same Python code needs to connect to SQL Server, the call to pyodbc.connect
    just needs to be changed to the appropriate DSN.'
