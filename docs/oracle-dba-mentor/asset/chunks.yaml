    \ Java 连接池。所有这些都减少了数据库连接的数量。因此，当今的 Oracle DBA 通常不需要实施 `共享服务器` 架构。我在这里提及它只是为了让你知道它的存在，并对其含义有一个基本的了解。也许有一天你会发现它适合你的系统架构。\n\
    \n我们已经了解了本地于数据库服务器的应用程序如何连接到 Oracle 实例。下一个合乎逻辑的步骤是讨论位于另一台机器上、远离数据库服务器的应用程序如何连接到实例。实际上，应用程序几乎从不在数据库服务器上。通常，本地用于数据库的唯一应用程序是\
    \ DBA 手中的 `SQL*Plus`。最终用户在他们的桌面上运行应用程序，或者与 Web 服务器或其他应用程序服务器交互。所有这些连接请求都通过 Oracle\
