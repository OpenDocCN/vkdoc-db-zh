  trans: '# 会议和用户组


    Oracle 专业人士遍布世界各地生活和工作。我们在本章讨论的所有社交媒体平台上互动，但没有什么能比得上面对面的交流。这就是会议和用户组发挥作用的地方。


    会议能吸引大量人群。2014 年，Oracle 一年一度的`OpenWorld`大会吸引了超过 6 万名与会者。这真是很多人都在谈论 Oracle！`OpenWorld`是获取关于
    Oracle 最新、最重要消息的绝佳场所。你可以在演示区与 Oracle 员工进行一对一的交流。Oracle 员工会很乐意带你演示特定产品，你可以随时提问。你可以参加许多会议环节，向该领域的专家讲者学习。你还可以与在社交媒体上互动的人见面。当你在某个论坛的讨论帖中与某人互动时，你们的对话通常局限于帖子的主题。当你亲自见到他们时，你们的对话可能会转向其他方向，与最初的话题有所偏离。这是促进讨论一些在常规场合下可能永远不会谈论的话题的好方法。如果你无法亲自参加会议，可以看看他们是否提供通过主题演讲和分组会议的直播在线参与的功能。


    独立 Oracle 用户组(`IOUG`)也举办一年一度的会议，名为`COLLABORATE`。你会在`IOUG`的`COLLABORATE`大会上发现许多与`OpenWorld`相同的供应商和数据库专家。这两个会议的主要区别在于，`OpenWorld`的内容由
    Oracle 公司定义，而`IOUG`的内容则由`IOUG`成员定义。


    许多地区都有自己的、专注于 Oracle 的独立用户组。要找到离你近的用户组，可以在谷歌上搜索。例如，如果你住在达拉斯，搜索“达拉斯 Oracle 用户组”，你会看到`DOUG`的链接。许多大城市都有自己的用户组。加入这些小组是与你所在地区人士建立联系的好方法。你无需长途跋涉就能参加他们的活动。大多数地区用户组都有为期一或两天的小型会议供你参加。这些会议的参与者通常来自当地。一些地区用户组举办规模更大的会议，例如丹佛地区的落基山
    Oracle 用户组(`RMOUG`)的“培训日”会议，吸引了来自全国各地的与会者。用户组会议不仅限于美国。世界许多地区都有 Oracle 用户组和会议。


    花点时间找一个你所在地区的 Oracle 用户组。成为会员，并开始与你的 Oracle 同行互动。你不仅能学到更多关于 Oracle 的知识，还能建立一个宝贵的人际资源网络，在你的职业生涯中可以依靠他们。这个网络可以帮助你解决问题，甚至找到工作。


    随着你职业生涯的发展，如果你一直遵循本章的建议，你应该开始在讨论论坛上回答问题并撰写博客文章。随着时间的推移，你的 Oracle 知识会增长，你将准备好分享更多你所学到的东西。下一步就是在
    Oracle 会议上发表演讲。会议总是在寻找演讲者。他们希望为与会者提供大量信息。简单来说，他们需要有人来提供这些信息。在会议之前，组织者会征集*摘要*。这些是你可能有兴趣在会议上发表的演讲的简短描述。通常，摘要是一段话，解释你想讨论什么以及它对与会者有何价值。请时刻留意会议摘要征集通知。当你准备好在会议上发言时，开始填写摘要征集表，看看你是否被选中。从在当地用户组会议上发表演讲开始，然后逐步提升。在会议上发表演讲与写博客或回答问题有同样的好处。如果你要向某人解释某事，你会比不解释时学得更好。另一个很大的好处是，许多组织者会因为你发表演讲而免费让你参加其余会议。大型会议还会为演讲者提供免费礼物。你还会开始因你的技能而被社区中的其他人所认可。


    # 继续前进


    在过去的几章里，我们讨论了如何了解更多关于 Oracle 的知识，甚至解决问题。这始于阅读 Oracle 文档。文档提供了海量的信息。使用 Oracle 文档最难的部分是试图找到你想要的信息，因为它篇幅巨大。你使用
    Oracle 文档越多，就越容易浏览。


    然后我们讨论了 Oracle 数据字典。数据字典帮助你了解特定数据库的详细信息。数据字典是数据库内容的文档记录。


    如果文档或数据字典无法帮助你，下一个通常求助的地方是`My Oracle Support`。你可以搜索其广泛的知识库以寻找答案。你可以提交服务请求并从支持分析师那里获得帮助。


    如果你已经穷尽了所有这些来源仍无法解决问题，那么接下来可以转向社交媒体。正如我们在本章所涵盖的，有许多社交媒体渠道可供你使用。


    在下一章，我们将转向维护我们的 Oracle 数据库。在安装 Oracle 并创建数据库后，我们需要学习如何应用补丁并保持其最新。下一章将讨论如何将你的 Oracle
    数据库升级到新版本。


    # 17. 打补丁


    在前四章中，我们讨论了你学习和成长 Oracle DBA 职业生涯的不同途径。Oracle 文档是必读的。最终，你将需要与 Oracle 支持互动。希望你已开始使用社交媒体来扩大与世界各地
    Oracle 专业人士的交流。


    本章的重点转向维护你的 Oracle 数据库。回想一下，本书前面我们构建了一台虚拟机并创建了第一个 Oracle 数据库作为测试平台。随后的章节通过讨论恢复和备份以及数据库安全性来加固安装。现在，是时候让该数据库在系统的整个生命周期内持续工作了。


    ## 补丁概述


    如果你工作得当，Oracle 补丁是不可避免的。遗憾的是，我遇到过许多从未给 Oracle 数据库打过补丁的 Oracle 数据库管理员，甚至包括一些从业多年的。你应该定期应用补丁。


    应用 Oracle 补丁通常是出于以下两个原因之一：


    *   修复已知问题：这些补丁应只在 Oracle 支持的指导下应用。


    *   保持数据库软件最新：尤其是为了堵塞安全漏洞。这些补丁应在发布时及时应用。


    补丁只能从`My Oracle Support`获取。你需要付费的 Oracle 支持合同才能下载补丁。如果你从第三方遇到补丁，不要下载和安装它。首先，这不是官方补丁，你将来可能会遇到支持和法律问题。此外，你无法保证第三方没有在补丁中引入某种恶意软件。'
- fmt: '## 补丁管理最佳实践


    ### 重要提示


    只从`MOS`下载补丁。你需要一份有效的支持合同。


    你从`MOS`下载的每个补丁都会包含一个`Readme`文件，可能是文本格式或`HTML`格式。务必阅读`Readme`文件。虽然这听起来是理所当然的建议，但我经常在`Oracle`讨论论坛上看到有人问如何应用某个特定的补丁。`Readme`文件的存在是有原因的。它包含了如何应用该补丁的逐步说明。`Readme`文件也包含了该补丁的已知问题以及已知的安装问题。如果你需要回滚补丁，说明也在`Readme`文件中。即使你熟悉应用补丁，每次也要阅读`Readme`文件。就在你以为自己知道流程时，`Oracle`可能会做出一些改变，旧的补丁安装方式就不再有效了。


    ### 关键规则


    务必阅读补丁的`Readme`文件。


    无论何时应用补丁，绝对不要先在生产环境中应用。始终通过你的开发生命周期基础设施来应用补丁。如果你有条件，先在开发数据库中应用补丁，然后在测试数据库中应用，最后才在生产数据库中应用。在每个阶段之间留出间隔。如果可能，从开发到测试至少等待一周，然后再等待一周才应用到生产环境。这意味着整个流程大约需要两周时间。你需要这种刻意的延迟，以便在补丁进入生产环境之前发现其可能引发的任何问题。等到补丁进入生产环境时，你应该对自己的应用能力以及补丁不会破坏任何应用或数据库功能充满信心。


    很多时候，我会在将补丁安装到开发数据库之前，先在一个测试环境中应用它。我的测试环境与开发、测试和生产环境没有相同的模式对象，但它让我可以在一个无人使用的系统上练习补丁安装。虽然我们经常将开发和测试视为非生产平台，但我喜欢说“开发环境对某人而言就是生产环境”。如果你的开发数据库宕机，应用开发者可能就无法工作。相比生产环境，我们在开发和测试中承担的风险更大，但我们也可以通过先在测试环境中工作来最小化风险。


    ## Oracle 版本解析


    我们在第[5]章为测试环境安装的`Oracle`数据库是`Oracle 12.2.0.1`版本。在你的企业中可能存在更新和更旧的版本。新版本发布后，我们会将数据库向前迁移，这个过程称为升级，我们将在下一章介绍。`Oracle`公司也会将这些版本称为*releases*。你可以互换使用术语`release`和`version`。


    除非我们是在与其他数据库管理员、`Oracle`支持分析师或需要了解确切技术细节的人交谈，否则我们通常会说“`Oracle 12c`”。这个表示法不是一个正确的版本号。字母`c`是一个营销标签。


    我的数据库管理职业生涯始于使用`Oracle 7.1`版本。那时，版本上还没有营销标签。我将我的第一个`Oracle`数据库升级到了`Oracle 7.2`，然后是`Oracle
    8.0`版本。就在`Oracle 8.1`即将发布之际，互联网爆发了。有些人称此为“互联网泡沫时代”。许多支持网络的应用程序已经在`Oracle`数据库后端运行，但`Oracle`公司希望宣称自己拥有为互联网准备就绪的数据库。第一个`Oracle
    8.1`版本被营销为`Oracle8i Database`，其中的`i`代表互联网。当时`IT`行业刚刚结束为所有东西贴上`e`标签（代表电子，如`e-mail`、`e-documents`等）的潮流。现在，地球上每个`IT`供应商都想成为互联网公司，我们开始看到字母`i`随处可见。直到今天，我们仍然有苹果公司的`iPhone`、`iPad`和`iTunes`。


    `Oracle`公司总是希望与竞争对手保持距离，因此开始不时地更改营销标签。在`Oracle8i`之后，我们迎来了`Oracle9i Database`。就在我们为下一个主要`Oracle`数据库版本发布做准备时，我们这些非`Oracle`员工的`Oracle`专业人士开始将下一个版本称为`10i`，但我们错了。当`Oracle
    10`发布时，它的营销标签是`Oracle Database 10g`，其中的`g`代表网格计算。`Oracle 10g`是`Oracle`公司真正开始大力推广`Oracle`真正应用集群及其他网格基础设施技术的版本。这个营销标签一直延续到了`Oracle
    11g`版本。正如你可以想象的那样，在第一个`Oracle 12`数据库发布之前，我们这些非`Oracle`员工又开始称其为`Oracle 12g`，结果再次出错。等到`Oracle
    12`发布时，云计算已成为全球`IT`供应商最喜欢的话题。于是，`Oracle`给了我们`Oracle Database 12c`。


    所有这些字母都不能真正告诉我们`Oracle`的版本号。`Oracle8i`实际上对应`Oracle`版本`8.1.5`、`8.1.6`和`8.1.7`。`Oracle9i`经历了一系列版本，从`9.0.1`到`9.2.0.7`。`Oracle
    12c`提供了`Oracle 12.1.0.1`、`12.1.0.2`、`12.2.0.1`和`12.2.0.2`。如你所见，每个营销标签都对应多个不同的版本。


    如果你在与`Oracle`专业人士交谈，确切的版本号可能对你们的讨论很重要。你不应该只说`Oracle 12c`，而应该说出完整的版本号。无论版本号的差异多么微小，每个版本都会改变特性和功能，这可能对你们的讨论产生重大影响。如果你在与非`Oracle`人员交谈，使用营销标签通常就足够了。'
  raw: '### Tip


    Only download patches from MOS. You will need a valid support contract.


    Every patch you will ever download from MOS will contain a Readme file, either
    in text or HTML form. Always read the Readme file. While that may sound like obvious
    advice, I constantly see questions on Oracle discussion forums asking how to apply
    a certain patch. The Readme file is there for a reason. It contains step-by-step
    instructions on how to apply the patch. The Readme file also contains known issues
    with the patch and known installation issues as well. If you have to roll back
    the patch, instructions are in the Readme file. Even if you are familiar with
    applying patches, read the Readme file every time. Just when you think you know
    the process, Oracle will change something and the old way of installing the patch
    will not work correctly.


    ### Tip


    Always read the patch’s Readme file.


    Whenever you apply a patch, never, ever apply it in production first. Always apply
    the patch through your development lifecycle infrastructure. If you have them,
    apply the patch in development databases first. Then apply in test databases.
    Finally, apply in production. Take a break between patching each of these stages.
    If you can, wait at least one week between the time you apply in dev to the time
    you apply in test. Then wait another week before you apply to production. This
    means it will take about two weeks to run through the chain of databases. You
    want this intentional delay so that any issues caused by the patch are found before
    the patch is in production. By the time the patch is in production, you should
    be confident in your ability to apply it and that it will not break any application
    or database functionality.


    Many times, I will apply the patch to a testbed before installing it in my development
    databases. My testbed does not have the same schema objects as dev, test, and
    prod but it does let me practice the patch installation on a system that no one
    else is using. While we often treat development and test as non-production platforms,
    I am fond of saying that “development is production for someone.” If your development
    database is down, application developers may not be able to work. We take more
    risks with development and test than we do in production, but we can also minimize
    risk by working in a testbed prior to development.


    ## Oracle Versions


    The Oracle database we installed for our testbed in Chapter [5](#467924_1_En_5_Chapter.xhtml)
    is the Oracle 12.2.0.1 version. It is possible that you have older and newer versions
    in your enterprise today. New versions are released and we migrate our database
    forward, a process known as upgrading that we will cover in the next chapter. Oracle
    Corporation will also refer to these versions are *releases*. You can use the
    terms release and version interchangeably.


    Unless we are talking with other database administrators, Oracle Support analysts,
    or others that want to know the exact technical details, we often say “Oracle
    12c.” This notation is not a proper version. The letter *c* is a marketing label.


    I started my database administration career working with the Oracle 7.1 version.
    Back then, there were no marketing labels on the versions. I upgraded my first
    Oracle database to Oracle 7.2 and then to the Oracle 8.0 version. Right about
    the time Oracle 8.1 was set to be released, the Internet had exploded. Some people
    referred to this as the “dot-com era.” Many web-enabled applications were already
    running with an Oracle database backend, but Oracle Corporation wanted to say
    they had a database ready for the Internet. The first Oracle 8.1 version was marketed
    as Oracle8*i* Database, where the *i* stood for Internet. The IT industry was
    just wrapping up tagging everything with an *e* for electronic, such as e-mail,
    e-documents, etc. Now every IT vendor on the planet wanted to be known as an Internet
    company and we started seeing the letter *i* popping up everywhere. Still today,
    we have the iPhone, iPad, and iTunes from Apple.


    Oracle Corporation, always wanting to distance themselves from the competition,
    started changing the marketing label every so often. After Oracle8*i*, we were
    treated to Oracle9*i* Database. As we were getting ready for the next major Oracle
    database version to be released, we Oracle professionals that were not Oracle
    employees started referring to the next version as 10*i*, but we were mistaken.
    When Oracle 10 was released, it had the marketing label Oracle Database 10*g*,
    where the letter *g* stood for *grid* computing. Oracle 10*g* was the version
    where Oracle Corporation really started pushing Oracle’s Real Application Clusters
    (RAC) and other Grid Infrastructure technologies. This marketing label stuck with
    us through the Oracle 11*g* version as well. As you can imagine, before the launch
    of the first Oracle 12 database, we non-Oracle employees started referring to
    it as Oracle 12*g*, only to be wrong once again. By the time Oracle 12 was released,
    *cloud* computing was the favorite topic of IT vendors around the world. So, Oracle
    gave us Oracle Database 12*c* instead.


    None of these letters really tells us the Oracle version. Oracle8*i* was really
    Oracle versions 8.1.5, 8.1.6, and 8.1.7. Oracle9*i* ran through a number of versions,
    from 9.0.1 up to 9.2.0.7\. Oracle 12*c* has provided Oracle 12.1.0.1, 12.1.0.2,
    12.2.0.1, and 12.2.0.2\. As you can see, each marketing label has a number of
    different versions associated with it.


    If you are talking with Oracle professionals, the exact version may make a difference
    in your conversation. You should not refer to Oracle 12*c*, but the full version.
    Each version, however small of a difference in the version number, changes features
    and functionality, which can make a big difference in your discussion. If you
    are talking with non-Oracle people, using the marketing label is normally sufficient.'
  trans: '

    ## 补丁管理最佳实践


    ### 重要提示


    只从`MOS`下载补丁。你需要一份有效的支持合同。


    你从`MOS`下载的每个补丁都会包含一个`Readme`文件，可能是文本格式或`HTML`格式。务必阅读`Readme`文件。虽然这听起来是理所当然的建议，但我经常在`Oracle`讨论论坛上看到有人问如何应用某个特定的补丁。`Readme`文件的存在是有原因的。它包含了如何应用该补丁的逐步说明。`Readme`文件也包含了该补丁的已知问题以及已知的安装问题。如果你需要回滚补丁，说明也在`Readme`文件中。即使你熟悉应用补丁，每次也要阅读`Readme`文件。就在你以为自己知道流程时，`Oracle`可能会做出一些改变，旧的补丁安装方式就不再有效了。


    ### 关键规则


    务必阅读补丁的`Readme`文件。


    无论何时应用补丁，绝对不要先在生产环境中应用。始终通过你的开发生命周期基础设施来应用补丁。如果你有条件，先在开发数据库中应用补丁，然后在测试数据库中应用，最后才在生产数据库中应用。在每个阶段之间留出间隔。如果可能，从开发到测试至少等待一周，然后再等待一周才应用到生产环境。这意味着整个流程大约需要两周时间。你需要这种刻意的延迟，以便在补丁进入生产环境之前发现其可能引发的任何问题。等到补丁进入生产环境时，你应该对自己的应用能力以及补丁不会破坏任何应用或数据库功能充满信心。


    很多时候，我会在将补丁安装到开发数据库之前，先在一个测试环境中应用它。我的测试环境与开发、测试和生产环境没有相同的模式对象，但它让我可以在一个无人使用的系统上练习补丁安装。虽然我们经常将开发和测试视为非生产平台，但我喜欢说“开发环境对某人而言就是生产环境”。如果你的开发数据库宕机，应用开发者可能就无法工作。相比生产环境，我们在开发和测试中承担的风险更大，但我们也可以通过先在测试环境中工作来最小化风险。


    ## Oracle 版本解析


    我们在第[5]章为测试环境安装的`Oracle`数据库是`Oracle 12.2.0.1`版本。在你的企业中可能存在更新和更旧的版本。新版本发布后，我们会将数据库向前迁移，这个过程称为升级，我们将在下一章介绍。`Oracle`公司也会将这些版本称为*releases*。你可以互换使用术语`release`和`version`。


    除非我们是在与其他数据库管理员、`Oracle`支持分析师或需要了解确切技术细节的人交谈，否则我们通常会说“`Oracle 12c`”。这个表示法不是一个正确的版本号。字母`c`是一个营销标签。


    我的数据库管理职业生涯始于使用`Oracle 7.1`版本。那时，版本上还没有营销标签。我将我的第一个`Oracle`数据库升级到了`Oracle 7.2`，然后是`Oracle
    8.0`版本。就在`Oracle 8.1`即将发布之际，互联网爆发了。有些人称此为“互联网泡沫时代”。许多支持网络的应用程序已经在`Oracle`数据库后端运行，但`Oracle`公司希望宣称自己拥有为互联网准备就绪的数据库。第一个`Oracle
    8.1`版本被营销为`Oracle8i Database`，其中的`i`代表互联网。当时`IT`行业刚刚结束为所有东西贴上`e`标签（代表电子，如`e-mail`、`e-documents`等）的潮流。现在，地球上每个`IT`供应商都想成为互联网公司，我们开始看到字母`i`随处可见。直到今天，我们仍然有苹果公司的`iPhone`、`iPad`和`iTunes`。


    `Oracle`公司总是希望与竞争对手保持距离，因此开始不时地更改营销标签。在`Oracle8i`之后，我们迎来了`Oracle9i Database`。就在我们为下一个主要`Oracle`数据库版本发布做准备时，我们这些非`Oracle`员工的`Oracle`专业人士开始将下一个版本称为`10i`，但我们错了。当`Oracle
    10`发布时，它的营销标签是`Oracle Database 10g`，其中的`g`代表网格计算。`Oracle 10g`是`Oracle`公司真正开始大力推广`Oracle`真正应用集群及其他网格基础设施技术的版本。这个营销标签一直延续到了`Oracle
    11g`版本。正如你可以想象的那样，在第一个`Oracle 12`数据库发布之前，我们这些非`Oracle`员工又开始称其为`Oracle 12g`，结果再次出错。等到`Oracle
    12`发布时，云计算已成为全球`IT`供应商最喜欢的话题。于是，`Oracle`给了我们`Oracle Database 12c`。


    所有这些字母都不能真正告诉我们`Oracle`的版本号。`Oracle8i`实际上对应`Oracle`版本`8.1.5`、`8.1.6`和`8.1.7`。`Oracle9i`经历了一系列版本，从`9.0.1`到`9.2.0.7`。`Oracle
    12c`提供了`Oracle 12.1.0.1`、`12.1.0.2`、`12.2.0.1`和`12.2.0.2`。如你所见，每个营销标签都对应多个不同的版本。


    如果你在与`Oracle`专业人士交谈，确切的版本号可能对你们的讨论很重要。你不应该只说`Oracle 12c`，而应该说出完整的版本号。无论版本号的差异多么微小，每个版本都会改变特性和功能，这可能对你们的讨论产生重大影响。如果你在与非`Oracle`人员交谈，使用营销标签通常就足够了。

    '
- fmt: '### Tip


    了解你的受众，在提及特定的 Oracle 版本时需注意。


    然后是补丁集。当 Oracle 8.1.7 发布时，其版本号是`8.1.7.0`。经过一段时间，Oracle 公司发布了一个修复了若干漏洞的补丁集。数据库管理员将`8.1.7.1`补丁集安装在已有的`8.1.7.0`
    Oracle 主目录之上。当`8.1.7.2`补丁集发布时，DBA 将其安装在相同的主目录上。Oracle 还发布了`8.1.7.3`和`8.1.7.4`补丁集，后者是`8.1.7`版本的最终补丁集。在那个年代，当你从`8.1.6`升级到`8.1.7`时，这是一次数据库*升级*，而补丁集则会改变版本号的第四位数字。


    当然，事情随时间而变化。从`Oracle 11.2`开始，Oracle 停止发布我们过去所认为的补丁集。看起来像是补丁集的东西，现在变成了一个完整的版本。Oracle
    将版本号的第四位数字改为表示一次升级而非补丁集。`Oracle 11.2.0.2`版本不是安装在`11.2.0.1`之上，而是安装在一个新的 Oracle
    主目录中。如果你回看前面讨论`Oracle 12c`的段落，你会看到列表中的版本号都有四位数字，因为我们开始以不同于过去的方式来思考这些 Oracle 版本。


    过去普遍认为，没有人会将关键的生产 IT 系统托付给第一个版本。当 Oracle 8.0 发布时，它被认为是第一个 Oracle 8 版本，所以人们避开了它。他们等待第一个或第二个补丁集。更谨慎的做法是，DBA
    等待第一个补丁集发布，即在第一个非零版本（`8.1`）发布之后的第一个补丁集。其理念是第一个版本存在缺陷，让别人去解决这些问题更为明智。我们的系统至关重要，不能暴露在漏洞面前。我们将等待一个良好、稳定的版本发布，然后再推进我们的
    Oracle 版本。


    在 Oracle 11g 初始发布之后，我们开始看到 Oracle 公司在下一个主要版本发布之前进行重大更改。`Oracle 11.1`可用，而`Oracle
    11.2`为 Grid Infrastructure 引入了 SCAN 监听器和其他新功能。在`Oracle 12.1.0.1`发布之后，`12.1.0.2`版本引入了
    Oracle 新的内存数据库功能。过去属于补丁集版本变更的情况，现在正在引入重大变更。关键在于，如果你害怕变更引发问题，并且想要一个稳定的版本，那么每一个新版本都会带来变更，而你必须不断前进。


    在讨论论坛中，我经常看到有人询问哪个 Oracle 版本是稳定版本。答案是你今天使用的任何受支持版本。在撰写本文时，完全受支持的版本是`Oracle 11.2.0.4`、`12.1.0.2`和`18`。（我稍后会谈到`Oracle
    18`版本后面没有数字的事实。）Oracle 数据库是一个拥有超过 30 年历史的成熟产品。许多公司使用 Oracle 来满足其数据库需求，它们根本无法承受事务失败或系统长时间停机，它们信任当今的
    Oracle 版本。这并不是说 Oracle 版本没有缺陷。软件中总是存在漏洞，而且将来也会一直存在。


    为什么 Oracle 公司开始在其产品的下一个主要版本发布之前引入新功能？答案是，他们希望更快地推向市场，以抵御竞争对手以更快速度发布新功能的步伐。整个 IT
    世界已经转向更快速地部署软件新功能。这种转变带来了敏捷开发方法论，在组织中增加了 DevOps 人员，并促进了云计算的兴起，从而加快了变更的步伐。采用这种更快节奏的并非只有
    Oracle 公司。


    如果你有留意，你会发现没有 Oracle 13、14、15、16 或 17 版本。我们从`Oracle 12c`直接跳到了`Oracle 18c`。`Oracle
    12.1`于 2013 年推出。`Oracle 12.2`于 2016 年发布给 Oracle 的云客户，并于 2017 年发布给本地部署客户。由于 Oracle
    公司希望更定期地发布，他们改变了编号方案以匹配发布的日历年份。`Oracle 18`被如此命名是因为它在 2018 年发布。当 Oracle 在 2019
    年发布其新版本时，它被命名为`Oracle 19`。根据你应用到`Oracle 18c`数据库的补丁不同，版本号可能是`18.1`、`18.2`等。


    如果你到目前为止还没有被所有这些版本号完全搞糊涂，那么 Oracle 的季度补丁（我们将在本章讨论）会更改版本号以表示所应用的补丁。如果你在 2018 年
    7 月将补丁应用到`Oracle 12.1.0.2`数据库，从技术上讲，版本号是`12.1.0.2.180717`，表示已应用 2018 年 7 月 17
    日的补丁。


    这些版本号足以让人开始头晕。我提及这些版本号的历史，是为了让你能更好地理解为什么编号方案多年来会发生变化以及各个数位的含义。Oracle 公司在`Oracle
    18c`版本中再次更改了补丁及其影响版本的方式，正如我们将在本章后面看到的。'
  raw: '### Tip


    Know your audience when referring to specific Oracle versions.


    Then there were the patchsets. When Oracle 8.1.7 was released, its version number
    was 8.1.7.0\. After a period of time, Oracle Corporation released a patchset fixing
    a number of bugs. The database administrator installed the 8.1.7.1 patchset over
    the top of the existing 8.1.7.0 Oracle home directory. When the 8.1.7.2 patchset
    was released, the DBA installed this on top of the same home directory. Oracle
    also released the 8.1.7.3 and 8.1.7.4 patchsets, the latter being the end of the
    line for the 8.1.7 version. Back in those days, when you moved from 8.1.6 to 8.1.7,
    it was a database *upgrade*, and patchsets changed the fourth number in the version.


    Of course, things change over time. Beginning with Oracle 11.2, Oracle stopped
    releasing patchsets as we used to think of them. What looked like a patchset was
    now a full version. Oracle changed the fourth digit in the version number to signify
    an upgrade rather than a patchset. The Oracle 11.2.0.2 version was not installed
    on top of 11.2.0.1, but rather into a new Oracle home directory. If you look back
    a few paragraphs to where Oracle 12*c* was discussed, you will see the versions
    in the list all have four places in the digits because we started to think about
    those Oracle versions differently than in the past.


    It used to be common wisdom that no one ever trusted a critical production IT
    system to the first version. When Oracle 8.0 was released, that was thought of
    as the first Oracle 8 version, so people shied away from it. They waited for the
    first or second patchset. Better yet, the cautious DBA waited for the first patchset
    after the first change from the dot-zero release, meaning the first patchset after
    8.1 was released. The idea was that the first version was buggy and letting someone
    else sort out these problems was wiser. Our systems are too critical to be exposed
    to bugs. We will wait for a good, stable release before we move forward with our
    Oracle versions.


    After the initial release of Oracle 11g, we started seeing Oracle Corporation
    make major changes before the next major version. Oracle 11.1 was available and
    Oracle 11.2 introduced the SCAN Listeners and other new features to Grid Infrastructure.
    After Oracle 12.1.0.1 was released, the 12.1.0.2 version introduced to Oracle’s
    new In-Memory database features. What used to be a patchset version change was
    now introducing big changes. The point is that if you are fearful of changes causing
    problems and you want a stable release, each new release is going to bring changes
    yet you have to keep moving forward.


    In discussion forums, I see questions asked all the time about what version of
    Oracle is a stable release. The answer is any supported version you are using
    today. At the time of writing, the fully supported versions are Oracle 11.2.0.4,
    12.1.0.2, and 18\. (I’ll get to the fact that the Oracle 18 version has no number
    after it shortly.) The Oracle database is a mature product that is over 30 years
    old. Many companies use Oracle for their database needs and quite simply cannot
    have transactions fail or systems that are down for an extended period of time,
    and they trust today’s Oracle versions. This is not to say that Oracle versions
    are free from defects. There are always bugs in the software and there always
    will be.


    Why did Oracle Corporation start introducing new functionality in their product
    before the next major release? The answer is because they wanted to be quicker
    to market to ward off their competitors who were releasing new features at a faster
    rate. The entire IT world has shifted for more rapid deployments of new features
    in software. This shift has brought about agile development methodologies, added
    DevOps personnel in the organization, and contributed to the rise of cloud computing
    that facilitates a faster pace of change. Oracle Corporation is not alone in adopting
    this faster pace.


    If you have paid attention, there is no Oracle 13, 14, 15, 16, or 17 version.
    We jumped from Oracle 12*c* to Oracle 18c. Oracle 12.1 was introduced in 2013\.
    Oracle 12.2 was released in 2016 for Oracle’s cloud customers and in 2017 for
    on-premises deployments. Because of Oracle Corporation’s desire to release more
    regularly, they changed the numbering scheme to match the calendar year of release.
    Oracle 18 is denoted as such because it was released in 2018\. When Oracle released
    it’s new version in 2019, it was named Oracle 19\. Depending on the patch you
    apply to your Oracle 18c database, the version number may be 18.1, 18.2, and so
    on.


    If you’re not totally confused by all of these version numbers so far, Oracle’s
    quarterly patches, which we will discuss in this chapter, change the version number
    to denote the patch that was applied. If you applied the July 2018 patches to
    an Oracle 12.1.0.2 database, the version is technically 12.1.0.2.180717 to denote
    that the patch from July 17, 2018 has been applied.


    These version numbers are enough to start making one’s head dizzy. I mentioned
    the history of these version numbers so that you can have a better understanding
    of why the number scheme has changed over the years and what the digits mean.
    Oracle Corporation changed the patches and how it affects the versions, once again,
    for the Oracle 18c release, as we will see later in this chapter.'
  trans: '### 提示


    了解你的受众，特别是在提及特定的 Oracle 版本时需要注意。


    然后是补丁集。当 Oracle 8.1.7 发布时，其版本号是`8.1.7.0`。经过一段时间，Oracle 公司发布了一个修复了若干漏洞的补丁集。数据库管理员将`8.1.7.1`补丁集安装在已有的`8.1.7.0`
    Oracle 主目录之上。当`8.1.7.2`补丁集发布时，DBA 将其安装在相同的主目录上。Oracle 还发布了`8.1.7.3`和`8.1.7.4`补丁集，后者是`8.1.7`版本的最终补丁集。在那个年代，当你从`8.1.6`升级到`8.1.7`时，这是一次数据库*升级*，而补丁集则会改变版本号的第四位数字。


    当然，事情随时间而变化。从`Oracle 11.2`开始，Oracle 停止发布我们过去所认为的补丁集。看起来像是补丁集的东西，现在变成了一个完整的版本。Oracle
    将版本号的第四位数字改为表示一次升级而非补丁集。`Oracle 11.2.0.2`版本不是安装在`11.2.0.1`之上，而是安装在一个新的 Oracle
    主目录中。如果你回看前面讨论`Oracle 12c`的段落，你会看到列表中的版本号都有四位数字，因为我们开始以不同于过去的方式来思考这些 Oracle 版本。


    过去普遍认为，没有人会将关键的生产 IT 系统托付给第一个版本。当 Oracle 8.0 发布时，它被认为是第一个 Oracle 8 版本，所以人们避开了它。他们等待第一个或第二个补丁集。更谨慎的做法是，DBA
    等待第一个补丁集发布，即在第一个非零版本（`8.1`）发布之后的第一个补丁集。其理念是第一个版本存在缺陷，让别人去解决这些问题更为明智。我们的系统至关重要，不能暴露在漏洞面前。我们将等待一个良好、稳定的版本发布，然后再推进我们的
    Oracle 版本。


    在 Oracle 11g 初始发布之后，我们开始看到 Oracle 公司在下一个主要版本发布之前进行重大更改。`Oracle 11.1`可用，而`Oracle
    11.2`为网格基础设施引入了 SCAN 监听器和其他新功能。在`Oracle 12.1.0.1`发布之后，`12.1.0.2`版本引入了 Oracle 新的内存数据库功能。过去属于补丁集版本变更的情况，现在正在引入重大变更。关键在于，如果你害怕变更引发问题，并且想要一个稳定的版本，那么每一个新版本都会带来变更，而你必须不断前进。


    在讨论论坛中，我经常看到有人询问哪个 Oracle 版本是稳定版本。答案是你今天使用的任何受支持版本。在撰写本文时，完全受支持的版本是`Oracle 11.2.0.4`、`12.1.0.2`和`18`。（我稍后会谈到`Oracle
    18`版本后面没有数字的事实。）Oracle 数据库是一个拥有超过 30 年历史的成熟产品。许多公司使用 Oracle 来满足其数据库需求，它们根本无法承受事务失败或系统长时间停机，它们信任当今的
    Oracle 版本。这并不是说 Oracle 版本没有缺陷。软件中总是存在漏洞，而且将来也会一直存在。


    为什么 Oracle 公司开始在其产品的下一个主要版本发布之前引入新功能？答案是，他们希望更快地推向市场，以抵御竞争对手以更快速度发布新功能的步伐。整个 IT
    世界已经转向更快速地部署软件新功能。这种转变带来了敏捷开发方法论，在组织中增加了 DevOps 人员，并促进了云计算的兴起，从而加快了变更的步伐。采用这种更快节奏的并非只有
    Oracle 公司。


    如果你有留意，你会发现没有 Oracle 13、14、15、16 或 17 版本。我们从`Oracle 12c`直接跳到了`Oracle 18c`。`Oracle
    12.1`于 2013 年推出。`Oracle 12.2`于 2016 年发布给 Oracle 的云客户，并于 2017 年发布给本地部署客户。由于 Oracle
    公司希望更定期地发布，他们改变了编号方案以匹配发布的日历年份。`Oracle 18`被如此命名是因为它在 2018 年发布。当 Oracle 在 2019
    年发布其新版本时，它被命名为`Oracle 19`。根据你应用到`Oracle 18c`数据库的补丁不同，版本号可能是`18.1`、`18.2`等。


    如果你到目前为止还没有被所有这些版本号完全搞糊涂，那么 Oracle 的季度补丁（我们将在本章讨论）会更改版本号以表示所应用的补丁。如果你在 2018 年
    7 月将补丁应用到`Oracle 12.1.0.2`数据库，从技术上讲，版本号是`12.1.0.2.180717`，表示已应用 2018 年 7 月 17
    日的补丁。


    这些版本号足以让人开始头晕。我提及这些版本号的历史，是为了让你能更好地理解为什么编号方案多年来会发生变化以及各个数位的含义。Oracle 公司在`Oracle
    18c`版本中再次更改了补丁及其影响版本的方式，正如我们将在本章后面看到的。'
- fmt: '## OPatch


    Oracle 现在使用一个基于 Java 的工具来为其数据库软件应用补丁。该工具名为 OPatch，显然是 Oracle Patch 的缩写。由于此工具基于
    Java，无论您在哪个平台上运行 Oracle，它都是相同的工具，这一特性使 Oracle DBA 的工作更加轻松。如果我们负责不同平台上的 Oracle，例如
    Linux 和 Windows，我们无需采用不同的打补丁方式。在两种系统上，流程通常是相同的。


    大多数补丁都会告知应用该补丁所需的最低 OPatch 版本。您可能需要先为补丁软件本身打补丁。要查看当前的 OPatch 版本，请使用清单 [17-1](#467924_1_En_17_Chapter.xhtml#PC1)
    中的示例。


    ```

    [oracle@dbamentor ~]$ $ORACLE_HOME/OPatch/opatch version

    OPatch Version: 12.2.0.1.6

    OPatch succeeded.

    Listing 17-1

    OPatch Version

    ```


    当您安装 Oracle 数据库软件时，它会自动将 OPatch 包含在 `$ORACLE_HOME/OPatch` 目录中。通常，安装的 OPatch 版本已经过时，而您应该使用更新的版本。在清单
    [17-1](#467924_1_En_17_Chapter.xhtml#PC1) 中，我们可以看到 OPatch 版本是 12.2.0.1.6，这是我们在测试平台上安装
    Oracle 12.2 软件时安装的版本。


    要获取最新版本，我们需要登录 My Oracle Support，然后单击 Patches & Updates 选项卡。OPatch 通过补丁 6880880
    下载，您可以在相应的搜索框中输入该补丁编号。然后单击 Search 按钮。您需要选择所需的 OPatch 版本和平台。图 [17-1](#467924_1_En_17_Chapter.xhtml#Fig1)
    显示我已选择了 Linux x86-64 平台和 12.2 版本以匹配我的测试环境。


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig1_HTML.jpg](images/467924_1_En_17_Chapter/467924_1_En_17_Fig1_HTML.jpg)


    Figure 17-1

    OPatch download


    将 OPatch 更新下载到您的测试环境。您也应该查看 Readme 文件以获取说明。Readme 文件会告诉您将下载的文件解压缩到 `$ORACLE_HOME`
    目录。首先备份旧的 OPatch 版本始终是一个好主意。我已将下载的 zip 文件放在 `$HOME` 目录中。我现在将把 OPatch 安装到 `$ORACLE_HOME`。首先，将
    OPatch 目录移动到备份位置。将 zip 文件复制到 `$ORACLE_HOME` 并解压缩。然后我检查新的 OPatch 版本，以确保它高于默认安装的
    12.2.0.1.6。这些步骤如清单 [17-2](#467924_1_En_17_Chapter.xhtml#PC2) 所示。


    ```

    [oracle@dbamentor ~]$ cd $ORACLE_HOME

    [oracle@dbamentor 12.2.0.1]$ mv OPatch OPatch.old

    [oracle@dbamentor 12.2.0.1]$ cp $HOME/p6880880_122010_Linux-x86-64.zip .

    [oracle@dbamentor 12.2.0.1]$ unzip p6880880_122010_Linux-x86-64.zip

    [oracle@dbamentor 12.2.0.1]$ $ORACLE_HOME/OPatch/opatch version

    OPatch Version: 12.2.0.1.14

    OPatch succeeded.

    Listing 17-2

    Updating OPatch

    ```


    我们已成功更新 OPatch，现在已准备好应用一些补丁。


    ### Tip


    OPatch 总是通过下载补丁 6880880 来更新。


    ## Quarterly Patches


    每个季度，Oracle 公司都会发布一批新的补丁。这些补丁在每年的一月、四月、七月和十月发布，通常在该月最接近 17 号的星期二发布。


    Oracle 只为完全支持的版本提供补丁。在下一章中，我们将讨论如何将数据库升级到更新的版本。季度补丁只是您希望保持数据库版本最新的原因之一。


    当 Oracle 公司最初开始发布季度补丁时，这些补丁只包含修复软件中安全漏洞的补丁。这些补丁被称为该季度的累积补丁更新（CPU）。顾名思义，补丁是累积的，这意味着为某个季度发布的补丁包含该季度的所有修复以及之前季度的修复。如果您像我们在测试环境中那样安装
    Oracle 12.2.0.1，您无需为该版本查找每一个发布的 CPU。只需应用最新、最好的 CPU，您就全部跟上了。


    跟上季度的 CPU 是帮助保护组织数据库基础设施安全的方法之一。许多组织都有规定必须应用安全补丁的政策。遗憾的是，有太多公司没有此类政策，导致数据库未打补丁，结果存在大量安全漏洞。如果您的组织没有任何此类政策，请与管理层合作制定一项，哪怕只为数据库。


    如果您希望在安全补丁发布时收到通知，请使用您的 Oracle 单点登录账户登录 [`http://otn.oracle.com`](http://otn.oracle.com)。然后将鼠标悬停在
    Account 按钮上并单击 Account 链接。接下来，单击 Subscriptions。展开名为“Oracle security notifications”的部分，并勾选
    Security Alerts 旁边的框。单击 Save 按钮。


    当季度补丁只包含安全修复时，下载和安装很容易，因为您只有一个选择。随着时间的推移，事情变得更加困难。Oracle 公司决定创建一种新的季度补丁类型，称为补丁集更新（PSU）。PSU
    包含相同的安全修复以及其他他们认为对所有人环境都安全的错误修复。当 PSU 创建时，CPU 重命名为安全补丁更新（SPU）。我认为他们本可以在首字母缩略词上做得更好，因为
    PSU 和 SPU 太相似了。Oracle 开始将 SPU 和 PSU 的集合称为 CPU。今天，如果您听到 CPU，它指的是季度补丁的集合。Oracle
    还将名称更改为关键补丁更新（Critical Patch Updates），但它们仍然是累积的。


    直到 Oracle 11.2，您每个季度都可以选择应用 SPU 或 PSU。世界各地的许多数据库管理员只应用 SPU，因为它对他们的 Oracle 环境引入的改动最少。然而，Oracle
    公司的官方建议是应用 PSU，但选择权在 DBA 手中。当 Oracle 12.1 发布时，该版本不再提供 SPU。Oracle 只为 12.1 版本发布
    PSU。Oracle 公司为 12c* 取消了这一选择。更令人困惑的是，建议在 Windows 上运行 Oracle 的 DBA 应用捆绑补丁（BP）而不是
    PSU。BP 包含 PSU 中的所有内容以及更多的错误修复。


    Oracle 12.2 改变了季度补丁。Oracle 12.2 引入了发布更新（RU）和发布更新修订版（RUR）补丁。发布更新（RU）包含安全修复和错误修复，就像
    PSU 一样。RU 还包含对 Oracle 优化器的修复，该优化器负责确定执行发送到数据库的所有 SQL 语句的有效方法。'
  raw: '## OPatch


    Oracle now uses a Java-based utility to apply patches to its database software.
    That utility is named OPatch, which is obviously short for Oracle Patch. Because
    this utility is Java based, it is the same utility no matter which platform you
    run Oracle on, a feature that makes it easier for the Oracle DBA. If we are in
    charge of Oracle on different platforms, such as Linux and Windows, we do not
    have to patch differently. It is usually the same process on both systems.


    Most patches will tell you a minimum OPatch version that must be used to apply
    the patch. You may have to patch the patch software first. To see the current
    OPatch version, use the example in Listing [17-1](#467924_1_En_17_Chapter.xhtml#PC1).


    ```

    [oracle@dbamentor ~]$ $ORACLE_HOME/OPatch/opatch version

    OPatch Version: 12.2.0.1.6

    OPatch succeeded.

    Listing 17-1

    OPatch Version

    ```


    When you install the Oracle database software, it will automatically include OPatch
    in the $ORACLE_HOME/OPatch directory. Normally, the installed OPatch version is
    already out of date and there is a newer version you should be using. In Listing
    [17-1](#467924_1_En_17_Chapter.xhtml#PC1), we can see the OPatch version is 12.2.0.1.6,
    which is the version that was installed when we installed the Oracle 12.2 software
    on our testbed.


    To obtain the latest version, we need to sign on to My Oracle Support and then
    click the Patches & Updates tab. OPatch is downloaded via patch 6880880, and you
    can enter that patch number in the appropriate search box. Then click the Search
    button. You will need to select the OPatch version and platform you seek. Figure
    [17-1](#467924_1_En_17_Chapter.xhtml#Fig1) shows that I have selected the Linux
    x86-64 platform and the 12.2 release to match my testbed.


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig1_HTML.jpg](images/467924_1_En_17_Chapter/467924_1_En_17_Fig1_HTML.jpg)


    Figure 17-1


    OPatch download


    Download the OPatch update to your testbed. You should view the Readme file for
    instructions as well. The Readme file will tell you to unzip the download file
    in the $ORACLE_HOME directory. It is always a good idea to back up your old OPatch
    version first. I have placed the downloaded zip file in the $HOME directory. I
    will now install OPatch into $ORACLE_HOME. First, the OPatch directory is moved
    to a backup location. The zip file is copied to $ORACLE_HOME and then unzipped.
    I then check the new OPatch version to make sure it is higher than 12.2.0.1.6
    that was installed by default. These steps are shown in Listing [17-2](#467924_1_En_17_Chapter.xhtml#PC2).


    ```

    [oracle@dbamentor ~]$ cd $ORACLE_HOME

    [oracle@dbamentor 12.2.0.1]$ mv OPatch OPatch.old

    [oracle@dbamentor 12.2.0.1]$ cp $HOME/p6880880_122010_Linux-x86-64.zip .

    [oracle@dbamentor 12.2.0.1]$ unzip p6880880_122010_Linux-x86-64.zip

    [oracle@dbamentor 12.2.0.1]$ $ORACLE_HOME/OPatch/opatch version

    OPatch Version: 12.2.0.1.14

    OPatch succeeded.

    Listing 17-2

    Updating OPatch

    ```


    We have successfully updated OPatch as we are now ready to apply some patches.


    ### Tip


    OPatch is always updated by downloading patch 6880880.


    ## Quarterly Patches


    Every quarter, Oracle Corporation releases a new bundle of patches. The patches
    are released in January, April, July, and October every year, usually released
    on the Tuesday closest to the 17th of the month.


    Oracle will only provide patches for fully supported versions. In the next chapter,
    we will discuss how to upgrade your database to a newer version. The quarterly
    patches are just one reason you will want to keep your database version up to
    date.


    When Oracle Corporation first started releasing quarterly patches, the patches
    only contained fixes to plug security holes in the software. The patch became
    known as the quarter’s Cumulative Patch Update (CPU). The patches are cumulative
    as the name states, meaning a patch released for a quarter contains all the fixes
    for that quarter plus fixes for the previous quarters as well. If you install
    Oracle 12.2.0.1 as we did in our testbed, you do not have to find each and every
    CPU released for that version. Just apply the latest and greatest CPU and you
    are all caught up.


    Keeping up with the quarterly CPU is one of the ways you can help secure your
    organization’s database infrastructure. Many organizations have a policy that
    the security patches must be applied. Sadly, too many companies do not have any
    such policy and the database goes unpatched and, as a result, has gaping security
    holes all over it. If your organization does not have any such policy, work with
    management to get one implemented, if for nothing else other than the databases.


    If you want to be notified when the security patches are released, sign on to
    [`http://otn.oracle.com`](http://otn.oracle.com) with your Oracle Single Sign-On
    account. Then mouse over the Account button and click the Account link. Next,
    click Subscriptions. Expand the section named “Oracle security notifications”
    and check the box next to Security Alerts. Click the Save button.


    When the quarterly patches contained only security fixes, downloading and installing
    was easy because you only had one choice. Over time, things became much more difficult.
    Oracle Corporation decided to create a new quarterly patch type called the Patch
    Set Update (PSU). The PSU contained the same security fixes as well as other bug
    fixes they deem to be safe for everyone’s environment. When the PSU was created,
    the CPU was renamed to be the Security Patch Update (SPU). I think they could
    have done a better job with the acronyms because PSU and SPU are too similar.
    Oracle started referring to the collection of SPU and PSU as the CPU. Today, if
    you ever hear of the CPU, it is meant to refer to a collection of quarterly patches.
    Oracle also changed the name to Critical Patch Updates, but they are still cumulative.


    Up until Oracle 11.2, you had your choice of SPU or PSU to apply each quarter.
    Many database administrators around the world would apply only the SPU because
    it introduced the least amount of change in their Oracle environments. However,
    Oracle Corporation’s official recommendation was to apply the PSU, but the choice
    was up to the DBA. When Oracle 12.1 was released, the SPU was no longer supplied
    for that version. Oracle releases just the PSU for the 12.1 version. Oracle Corporation
    took away that choice for 12*c*. To make matters even more confusing, it was recommended
    for DBAs who ran Oracle on Windows to apply the Bundle Patch (BP) instead of the
    PSU. The BP contains everything in the PSU plus even more bug fixes.


    Oracle 12.2 changed the quarterly patches. Oracle 12.2 introduced the Release
    Update (RU) and the Release Update Revision (RUR) patches. A Release Update contains
    security fixes and bug fixes just like a PSU does. The RU also contains fixes
    to the Oracle Optimizer, which is responsible for determining an efficient method
    to execute all SQL statements sent to the database.'
