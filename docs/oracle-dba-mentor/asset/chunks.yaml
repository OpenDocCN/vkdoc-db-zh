  trans: '

    ## 搜索引擎


    我将大量时间花在使用搜索引擎寻找答案上。我家附近的五金店营业到几点？莱昂内尔·梅西多大了？鸡蛋要煮多久？只需将问题输入你最喜欢的搜索引擎，你就能知道答案。人们在互联网上放置了海量信息，而搜索引擎是通往所需信息的门户。


    在我的职业生涯中，唯一变化的是问题本身。Oracle 错误 `PRVG-2027` 是什么意思？当 `.patch_storage` 目录变得过大时，我该怎么办？Oracle
    7 是什么时候发布的？如何创建一个多租户数据库？


    通常，当人们想到搜索引擎时，他们指的是谷歌。其他搜索引擎也存在，但谷歌占据着至高无上的地位。你可以根据喜好使用雅虎、必应或其他引擎。它们都通向同一个互联网。谷歌之所以最常用，是因为它被认为能为你的搜索提供最相关的结果，但谷歌并非完美。如果谷歌没有找到你想要的东西，你可能需要使用其他搜索引擎。某些搜索引擎在特定地区表现更好。例如，在中国，你可能会使用百度。


    无论你使用哪种搜索引擎，你的搜索词越具体，搜索结果可能就越相关。如果你搜索“Oracle”，可能不会得到任何有助于解决外键约束问题的结果。如果你搜索“oracle
    foreign key”，你会得到大量关于如何创建外键的相关结果，但如果你在寻找禁用外键的解决方案，那你就找错方向了。相反，搜索“oracle disable
    all foreign key constraints on a table”，你的搜索会更成功。你的搜索词越具体，你就能越快找到所需内容。


    我通常使用的一个技巧是在搜索词中包含数据库平台。如果我搜索“disable all foreign key constraints on a table”，谷歌的前两个结果返回的是关于
    SQL Server 平台的信息。在搜索词中添加“Oracle”一词，可以更快地将结果缩小到我的平台。有时你还需要包含你的 Oracle 版本。搜索词“oracle
    12.2”将确保不会出现来自旧版 Oracle 10.1 的结果。包含平台及其版本是一个帮助获得最相关搜索结果的小技巧。


    很多时候，你需要在搜索词中包含与你的问题相关的多行内容。有一次，在尝试修补 Oracle 数据库时，我遇到了如代码清单 16-1 所示的问题。


    ```

    Queryable inventory could not determine the current opatch status.

    Execute ''select dbms_sqlpatch.verify_queryable_inventory from dual''

    and/or check the invocation log

    /u01/app/oracle/cfgtoollogs/sqlpatch/sqlpatch_25889_2016_11_09_22_26_12/sqlpatch_invocation.log

    for the complete error.

    Listing 16-1

    Example Problem

    ```


    我不确定如何解决这个问题。我试着确定上述输出中的哪条信息可以作为一个好的搜索词。第一行看起来很通用，所以可能没用。第二个链接包含了一些具体的东西，`dbms_sqlpatch.verify_queryable_inventory`，所以我将其用作我的搜索词。不幸的是，结果与我的问题无关。当我查看上述输出中提到的日志文件时，我看到了代码清单
    16-2 所示的附加信息。


    ```

    verify_queryable_inventory returned ORA-20008: Timed out, Job

    Load_opatch_inventory_1execution time is

    more than 120Secs

    Queryable inventory could not determine the current opatch status.

    Listing 16-2

    Example Problem Log File

    ```


    现在我有了更具体的信息。我的搜索词现在是“`dbms_sqlpatch.verify_queryable_inventory` ORA-20008 Timed
    Out”。通过使搜索词非常具体，我可以尽快锁定最相关的结果。


    对于许多读者来说，这些建议可能看起来是常识。然而，我发现，那些在网络搜索中找不到相关信息的人，往往使用的是过于笼统的搜索词。例如，如果你在搜索中包含任何错误代码，会很有帮助。如果搜索结果仍然过于宽泛，那么可以同时包含错误代码和错误信息，因为有些错误可能有多种信息。如果你的问题涉及多个错误代码，请将它们全部包含在搜索词中。所有这些都是我多年来在网上研究问题时学到的技巧。

    '
- fmt: '## Blogs


    A blog is a website where you can post any content you desire, normally to share
    information or start a discussion. The author of the blog writes an article and
    posts it to the website. The articles are typically arranged in reverse order
    of the date they were posted, with the most recent article at the top.


    As you will see later in this section, I strongly recommend that all readers start
    a blog for their database career. Over the course of your career, expect your
    blog to change nature and scope as your career grows. Eventually, you will find
    your niche and provide meaningful content for the worldwide community to enjoy.


    ### Blog Platforms


    The two most commonly used blog sites are Blogger ( [`www.blogger.com`](http://www.blogger.com)
    ) and WordPress ( [`www.wordpress.com`](http://www.wordpress.com) ). Each of these
    sites includes an editor that lets you quickly and easily create content. You
    can choose from many predefined themes to give your blog a look and feel that
    suits your style. Both platforms allow for free blogs to be hosted on their systems.
    Many Internet service providers also provide the capability to host your own blog
    on other systems.


    ### Reasons to Start a Blog


    Many people start a blog for multiple reasons. Blogs were not in existence during
    my first few years. After a while, web searches kept leading me to other blogs
    that people had started. Over time, I learned that blogs all start with sharing
    something the author has to say. When I write a blog post as a DBA, it is typically
    for one of three categories:


    *   Whenever I have a tricky problem that I resolved, I will write a blog entry
    detailing the specifics of the issue and what I did to resolve it.

    *   Whenever I learn something new, I will write a blog article showing the new
    concept in action. I try to include any tips I learned along the way that are
    not written or obvious in the documentation.

    *   Something is on my mind and I want to share with it people.


    You will find that most database-related blog posts fall into these main categories.
    There are always exceptions to the rule, of course, and you can make your blog
    unique. One of the great things about blogging is that the author defines the
    content. You may have a different idea for a blog than what I have enumerated
    above.


    I encourage all readers to start their own blog. In addition to the altruistic
    endeavor of sharing information with the database community at large, there are
    self-serving reasons for blogging as well. If you read my blog and learn something
    from it, that is excellent! However, I also blog for myself.


    ### Personal Benefits of Blogging


    One reason I blog is because the act of writing down my own thoughts enhances
    my own understanding. Whenever I must write something and explain it to someone
    else, I learn more about the subject than if I had not written anything at all.
    There is something magical that happens inside the human brain where the simple
    act of relating content to someone makes you understand it better yourself. For
    many people, writing also helps them remember the topic easier as well.


    The second reason I blog is because my blog is a piece of my documentation. The
    Oracle documentation cannot explain everything. It covers a lot but there are
    things missing in the documentation as well. For example, when Oracle 12c introduced
    IDENTITY columns, very similar to a feature long available in SQL Server, there
    were a few things I learned about this new feature. I wrote a blog entry about
    the subject over five years ago. Over time, I could not remember the exact details
    of what I had learned, so I referred to my blog post to remind myself of the specifics.
    It was not vitally important that I retain every piece of information in that
    blog post; rather, I just had to remember that I had written it and I could easily
    refer to it. A quick Google search of “ [`www.peasland.net`](http://www.peasland.net)
    identity” was all that I needed to do and I could quickly find my blog’s entries
    for this information.


    As I stated earlier in this section, I will often write a blog entry whenever
    I have solved a tricky problem. Throughout my career, I have run into problems
    that were not solved through My Oracle Support or by a Google search. Once I solve
    a problem, I know that others have yet to see the solution, and my solution becomes
    an immediate candidate for a blog entry. I post the details and the solution to
    my blog. I have been rewarded many times over the years with wonderful comments
    on how much time I saved someone by resolving their issue, all because of my blog
    post.


    Now here’s a secret most bloggers will not tell you. My blog helps me most of
    all! I cannot tell you the number of times I have written up a difficult problem
    on my blog. Years later, I run into the issue again. By now, I have forgotten
    that I already solved the problem. My mind is totally blank on the issue. It’s
    like this is the first time I have ever seen the problem in my life. I do a quick
    search on My Oracle Support and do not see any resolutions to my problem. I head
    to Google and search for my specific issue and, sure enough, right there near
    the top of the search results is a blog entry I wrote a long time ago. I click
    the link to my own blog and the post describes in exact detail the problem I am
    experiencing today, and it even gives me a nice resolution. Yet I do not remember
    even writing the blog entry. So much for the idea that writing helps with memory
    retention.'
