- fmt: '### DBMS_CRYPTO


    如果你希望即使在数据库开放的情况下，数据也能免受窥探，最好的办法是利用 `DBMS_CRYPTO` 供应包。这不需要额外的许可证，但它对应用程序并不透明。应用程序必须在想要查看加密数据时调用此包，并且必须调用此包来以加密形式存储数据。


    ### Virtual Private Database


    虚拟专用数据库 (`VPD`) 是企业版功能，它允许每个用户访问同一个表，但只允许每个用户看到他们有权看到的数据。例如，你可能有一个 `EMPLOYEES`
    表。员工只能看到自己在此表中的记录。经理可以看到自己的记录以及向他们汇报的任何员工的记录。人力资源部门的某个人可能可以看到此表中的所有员工。`VPD` 使用应用程序上下文来定义某人在启用了
    `VPD` 的表中可以看到的记录。一旦定义了应用程序上下文，用户就只能看到他们被允许看到的数据。通过这种方式，表中的数据根据其分类对用户是私有的。


    ### Network Encryption


    Oracle 会通过网络以明文形式传输数据。这可能引起一些组织的担忧。Oracle 确实提供了在数据流经网络时对其进行加密的能力。与透明数据加密类似，此功能需要额外成本，包含在高级安全选项中，这是
    Oracle 企业版的一个额外付费选项。


    ### Stronger Authentication


    对于某些组织来说，简单的密码是不够的。Oracle 确实提供了利用 `Kerberos` 或 `RADIUS` 进行身份验证的能力。组织也可以选择利用 `LDAP`
    身份验证。


