- fmt: '## 降级


    大多数人从未考虑过降级 Oracle 数据库。我曾在讨论论坛上创建了一个投票，询问有多少人曾执行过 Oracle 数据库降级。在 675 名受访者中，只有
    14 人实践过 Oracle 数据库降级，这个数字至今仍让我感到困惑。我希望更多的 Oracle 数据库管理员至少能偶尔练习一下降级操作。


    降级是最后的手段。如果你已在新的 Oracle 版本上对应用程序进行了充分测试，并且测试了升级过程，那么你将永远不需要降级。虽然我实践过降级，但我从未需要对生产数据库进行降级，尽管有一次非常接近。我只会在升级完成后无法修复数据库中的问题时才考虑降级。例如，在升级到
    12.1.0.2 时，我遇到了许多优化器问题，导致查询性能低下。在我几乎要执行数据库降级时，我了解到其他人也遇到了同样的问题，而 Oracle 提供了一些隐藏的初始化参数来解决我的问题。


    你应该在升级前后都进行备份，这意味着你有能力回溯到任一时间点。现在考虑一下，如果在升级完成并为应用程序用户开放数据库后才发现问题，会发生什么。自升级完成以来，这些应用程序用户已经在数据库中生成了事务。你不能使用升级后创建的备份，因为该备份是用于新版本的。如果你想使用升级前的备份，你当然可以回退到旧版本，但你将无法前滚升级后的任何事务。如果你选择使用该升级前的备份，你将面临数据丢失，这一点简单明了。


    在理想情况下，数据库升级后的第二天早上我来到办公室，没有人会说什么。最终用户根本不知道数据库现在是一个闪亮的新版本。没有人抱怨，也没有报告问题。有时事情会发生，而数据库管理员的工作就是修复数据库，因为升级破坏了某些东西。有些问题容易解决，有些则可能很困难。尽快解决问题，因为你真的不想回退到旧版本。在极少数情况下，你可能需要做出决定：升级并非明智之举，需要回到旧版本。你有两个选择：从升级前的备份恢复并丢失自那时起的所有事务，或者执行降级。对我来说，数据丢失是一个糟糕的选择，降级是更好的选择，这就是为什么当我发现许多数据库管理员根本不考虑降级时感到惊讶。这一点非常重要，我再强调一遍。降级可能是你在不丢失任何数据的情况下回退到旧数据库版本的唯一选择。


    新版本的 Oracle *升级指南* 总是专门用一章来讲 Oracle 降级。如果你必须执行降级，你会想要非常仔细地阅读该章。它将包含如何执行降级的分步说明。步骤取决于你可能正在使用和安装的各种选项，因此本章不会重复该过程。从高层来看，降级步骤是：关闭数据库，使用旧版本软件以
    `DOWNGRADE` 模式启动，然后运行 `catdwgrd.sql` 脚本。


    `DBUA` 不执行降级。降级是一个手动过程。我建议你在职业生涯的不同阶段在测试环境中练习 Oracle 降级。我们的测试环境是练习的完美场所。只需关闭虚拟机，并对服务器及其存储进行快照。全部启动后，按照
    *升级指南* 中的步骤降级到旧版本。数据库降级后，你可以选择恢复到快照瞬间回到新版本，或者可以再次练习升级，这也不是个坏主意。


    ## 继续前进


    本章讨论了如何将 Oracle 数据库升级到新版本。我们在测试环境中逐步完成了升级过程，现在拥有一个可以运行和把玩的 Oracle 18c 数据库。我们讨论了数据库升级和阅读
    Oracle 文档的重要性。我们甚至提到了数据库降级。


    在下一章中，我们将更专注于维护 Oracle 数据库。我们将探讨容量规划，以确保数据库能够处理未来的负载。你构建的东西可能今天适用，但明天可能就太小了。


    # 19. 容量规划


    在过去的两章中，我们通过应用补丁和执行升级使我们的 Oracle 数据库保持前进，这两项对于数据库管理员来说都是至关重要的任务。有时，应用补丁是修复问题的被动任务。大多数时候，应用补丁是一项主动的努力。升级数据库是保持最新、维持支持并享受新功能的方式，这些新功能使数据库能够持续发展以支持基础设施。


    在本章中，我们将讨论 Oracle 数据库的容量规划。就其本身而言，容量规划不会影响你当前的环境。相反，容量规划是你今天执行的一项活动，以帮助你为未来做出更好的决策。'
  raw: '## Downgrading


    Most people never consider downgrading an Oracle database. I once created a poll
    on a discussion forum asking how many people had ever practiced an Oracle downgrade.
    Out of 675 respondents, only 14 had practiced an Oracle downgrade, a figure that
    totally baffles me to this day. I wish more Oracle database administrators would
    practice a downgrade at least once in a while.


    Downgrades are an avenue of last resort. If you have performed adequate testing
    of the application on the new Oracle version, and if you have tested the upgrade
    process, you will never need to downgrade. While I have practiced a downgrade,
    I have never needed to downgrade a production database, although I came very close
    once. I only consider a downgrade if I cannot fix problems in the database after
    the upgrade is complete. For example, when upgrading to 12.1.0.2, I ran into many
    Optimizer issues leading to poorly performing queries. As I came close to pulling
    the trigger on a database downgrade, I learned others had the same problem and
    Oracle had some hidden initialization parameters that would fix my problem.


    You should have taken backups both before and after the upgrade, which means you
    have the capability of going back in time to either point. Now consider what happens
    if you discover a problem after the upgrade is complete, after you have opened
    the database for business to the application users. Those application users have
    generated transactions in the database since the upgrade completed. You cannot
    use the backup taken after the upgrade because that backup is for the new version.
    If you want to use the backup taken prior to the upgrade, you can certainly revert
    to the old version, but you will not be able to roll forward any transactions
    after the upgrade. If you want to use that pre-upgrade backup, you will experience
    data loss, pure and simple.


    In an ideal world, the morning after a database upgrade, I come into the office
    and no one says anything. End users never know the database is now a shiny new
    version. No one complains and there are no reported issues. Sometimes things happen
    and it is the database administrator’s job to fix the database because the upgrade
    broke something. Some problems are easy to fix and others can be difficult. Solve
    the problems as quickly as you can because you really do not want to revert to
    the old version. In rare circumstances, you may need to make the decision that
    the upgrade was not a good thing to do and you need to go back to the old version.
    You have two choices to make. Restore from the pre-upgrade backup and lose all
    transactions since that time, or perform a downgrade. To me, data loss is a bad
    option and the downgrade is the better choice, which is why I am surprised when
    so many database administrators do not give downgrades any thought. This is so
    important, I’ll say it again to emphasize the point. Downgrades may be your only
    option to revert to an older database version without any data loss.


    The Oracle *Upgrade Guide* for the new version always devotes one chapter to downgrading
    Oracle. If you have to perform a downgrade, you will want to read that chapter
    very thoroughly. It will contain step-by-step instructions on how to perform a
    downgrade. The steps depend on the various options you may be using and have installed,
    so this chapter will not repeat the process. At a high level, the downgrade steps
    are to shut down the database, start in DOWNGRADE mode with the old version software,
    and then run the catdwgrd.sql script.


    The DBUA does not perform downgrades. Downgrades are a manual process. It is my
    recommendation that you practice an Oracle downgrade on a testbed at different
    points in your career. Our testbed makes a perfect place to practice. Simply shut
    down the virtual machine and take a snapshot of the server and its storage. Start
    it all up and follow the steps in the *Upgrade Guide* to downgrade to the old
    version. When the database has been downgraded, you can either revert to the snapshot
    and be instantaneously on the new version, or you can practice the upgrade all
    over again, which is not a bad idea.


    ## Moving On


    This chapter has discussed how to upgrade Oracle databases to a new version. We
    walked through the upgrade process on our testbed and now have an Oracle 18c database
    up and running to play around with. We discussed the importance of database upgrades
    and reading the Oracle documentation. We even touched on database downgrades.


    In the next chapter, we will focus more on maintaining an Oracle database. We
    will look at capacity planning so that we can ensure the database will be able
    to handle the load for the future. What you built may work for today, but be too
    small for tomorrow.


    # 19. Capacity Planning


    In the last two chapters, we have kept our Oracle databases moving forward by
    applying patches and performing upgrades, both vital tasks for the database administrator.
    Sometimes, applying patches is a reactive task to fix a problem. Most of the time,
    applying patches is a proactive endeavor. Upgrading your database is a way to
    keep current, maintain support, and enjoy new features that keep the database
    moving forward to support the infrastructure.


    In this chapter, we will discuss capacity planning for the Oracle database. By
    itself, capacity planning does not impact your current environment. Rather, capacity
    planning is an activity that you perform today to help you make better decisions
    for the future.'
  trans: '

    ## 降级


    大多数人从未考虑过对 Oracle 数据库进行降级。我曾在讨论论坛上发起过一个投票，询问有多少人执行过 Oracle 数据库降级。在 675 名受访者中，只有
    14 人实践过 Oracle 数据库降级，这个数字至今仍让我感到困惑。我希望更多的 Oracle 数据库管理员至少能偶尔练习一下降级操作。


    降级是最后的手段。如果你已在新的 Oracle 版本上对应用程序进行了充分测试，并且测试了升级过程，那么你将永远不需要降级。虽然我实践过降级，但我从未需要对生产数据库进行降级，尽管有一次非常接近。我只会在升级完成后无法修复数据库中的问题时才考虑降级。例如，在升级到
    12.1.0.2 时，我遇到了许多优化器问题，导致查询性能低下。在我几乎要执行数据库降级时，我了解到其他人也遇到了同样的问题，而 Oracle 提供了一些隐藏的初始化参数来解决我的问题。


    你应该在升级前后都进行备份，这意味着你有能力回溯到任一时间点。现在考虑一下，如果在升级完成并为应用程序用户开放数据库后才发现问题，会发生什么。自升级完成以来，这些应用程序用户已经在数据库中生成了事务。你不能使用升级后创建的备份，因为该备份是用于新版本的。如果你想使用升级前的备份，你当然可以回退到旧版本，但你将无法前滚升级后的任何事务。如果你选择使用该升级前的备份，你将面临数据丢失，这一点简单明了。


    在理想情况下，数据库升级后的第二天早上我来到办公室，没有人会说什么。最终用户根本不知道数据库现在是一个闪亮的新版本。没有人抱怨，也没有报告问题。有时事情会发生，而数据库管理员的工作就是修复数据库，因为升级破坏了某些东西。有些问题容易解决，有些则可能很困难。尽快解决问题，因为你真的不想回退到旧版本。在极少数情况下，你可能需要做出决定：升级并非明智之举，需要回到旧版本。你有两个选择：从升级前的备份恢复并丢失自那时起的所有事务，或者执行降级。对我来说，数据丢失是一个糟糕的选择，降级是更好的选择，这就是为什么当我发现许多数据库管理员根本不考虑降级时感到惊讶。这一点非常重要，我再强调一遍。降级可能是你在不丢失任何数据的情况下回退到旧数据库版本的唯一选择。


    新版本的 Oracle *升级指南* 总是专门用一章来讲 Oracle 降级。如果你必须执行降级，你会想要非常仔细地阅读该章。它将包含如何执行降级的分步说明。步骤取决于你可能正在使用和安装的各种选项，因此本章不会重复该过程。从高层来看，降级步骤是：关闭数据库，使用旧版本软件以
    `DOWNGRADE` 模式启动，然后运行 `catdwgrd.sql` 脚本。


    `DBUA` 不执行降级。降级是一个手动过程。我建议你在职业生涯的不同阶段在测试环境中练习 Oracle 降级。我们的测试环境是练习的完美场所。只需关闭虚拟机，并对服务器及其存储进行快照。全部启动后，按照
    *升级指南* 中的步骤降级到旧版本。数据库降级后，你可以选择恢复到快照瞬间回到新版本，或者可以再次练习升级，这也不是个坏主意。


    ## 继续前进


    本章讨论了如何将 Oracle 数据库升级到新版本。我们在测试环境中逐步完成了升级过程，现在拥有一个可以运行和把玩的 Oracle 18c 数据库。我们讨论了数据库升级和阅读
    Oracle 文档的重要性。我们甚至提到了数据库降级。


    在下一章中，我们将更专注于维护 Oracle 数据库。我们将探讨容量规划，以确保数据库能够处理未来的负载。你构建的东西可能今天适用，但明天可能就太小了。


    # 19. 容量规划


    在过去的两章中，我们通过应用补丁和执行升级使我们的 Oracle 数据库保持前进，这两项对于数据库管理员来说都是至关重要的任务。有时，应用补丁是修复问题的被动任务。大多数时候，应用补丁是一项主动的努力。升级数据库是保持最新、维持支持并享受新功能的方式，这些新功能使数据库能够持续发展以支持基础设施。


    在本章中，我们将讨论 Oracle 数据库的容量规划。就其本身而言，容量规划不会影响你当前的环境。相反，容量规划是你今天执行的一项活动，以帮助你为未来做出更好的决策。

