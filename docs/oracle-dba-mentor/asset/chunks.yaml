    piece handle=/u01/app/oracle/oradata/db_backup/backupORCL_1lt5rd16_53_1 tag=TAG20180619T132454
    comment=NONE

    channel ORA_DISK_1: backup set complete, elapsed time: 00:00:15

    Finished backup at 19-JUN-18

    Starting backup at 19-JUN-18

    current log archived

    using channel ORA_DISK_1

    channel ORA_DISK_1: starting archived log backup set

    channel ORA_DISK_1: specifying archived log(s) in backup set

    input archived log thread=1 sequence=25 RECID=9 STAMP=979219509

    channel ORA_DISK_1: starting piece 1 at 19-JUN-18

    channel ORA_DISK_1: finished piece 1 at 19-JUN-18

    piece handle=/u01/app/oracle/oradata/db_backup/backupORCL_1mt5rd1l_54_1 tag=TAG20180619T132509
    comment=NONE

    channel ORA_DISK_1: backup set complete, elapsed time: 00:00:01

    Finished backup at 19-JUN-18

    Starting Control File and SPFILE Autobackup at 19-JUN-18

    piece handle=/u01/app/oracle/product/12.2.0.1/dbs/c-1506090724-20180619-00 comment=NONE

    Finished Control File and SPFILE Autobackup at 19-JUN-18

    Listing 7-8

    RMAN Hot Backup

    ```


    The RMAN command is simply “backup database plus archivelog”. One command covers
    it all. If you read through the RMAN output, you can see RMAN is reading our database’s
    files and even backs up the archived redo log. At the end, RMAN backs up the control
    file and the parameter file.


    Our testbed is of little value if we do not test something out. So let’s run the
    same test we did before. I shutdown the instance and then removed the users01.dbf
    data file simulating the loss of a file. Now I’ll use RMAN for my restore. It
    will figure out what is missing and get it all back in order. Remember the earlier
    discussion of the differences between restore and recovery? Those differences
    are important now because we first need to tell RMAN to restore the database,
    then apply recovery. In Listing [7-9](#467924_1_En_7_Chapter.xhtml#PC9), the order
    of operations is to start the instance in mount mode, restore the database, recover
    the database, then open it for business.


    ```

    [oracle@dbamentor orcl]$ rman

    Recovery Manager: Release 12.2.0.1.0 - Production on Tue Jun 19 13:29:38 2018

    Copyright (c) 1982, 2017, Oracle and/or its affiliates.  All rights reserved.

    RMAN> connect target /

    connected to target database (not started)

    RMAN> run {

    2> startup mount;

    3> restore database;

    4> recover database;

    5> alter database open;

    6> }

    Oracle instance started

    database mounted

    Total System Global Area    1660944384 bytes

    Fixed Size                    8621376 bytes

    Variable Size              1056965312 bytes

    Database Buffers            587202560 bytes

    Redo Buffers                  8155136 bytes

    Starting restore at 19-JUN-18

    using target database control file instead of recovery catalog

    allocated channel: ORA_DISK_1

    channel ORA_DISK_1: SID=34 device type=DISK

    channel ORA_DISK_1: starting datafile backup set restore

    channel ORA_DISK_1: specifying datafile(s) to restore from backup set

    channel ORA_DISK_1: restoring datafile 00001 to /u01/app/oracle/oradata/orcl/system01.dbf

    channel ORA_DISK_1: restoring datafile 00002 to /u01/app/oracle/oradata/orcl/sysaux01.dbf

    channel ORA_DISK_1: restoring datafile 00003 to /u01/app/oracle/oradata/orcl/undotbs01.dbf

    channel ORA_DISK_1: restoring datafile 00004 to /u01/app/oracle/oradata/orcl/users01.dbf

    channel ORA_DISK_1: reading from backup piece /u01/app/oracle/oradata/db_backup/backupORCL_1lt5rd16_53_1

    channel ORA_DISK_1: piece handle=/u01/app/oracle/oradata/db_backup/backupORCL_1lt5rd16_53_1
    tag=TAG20180619T132454

    channel ORA_DISK_1: restored backup piece 1

    channel ORA_DISK_1: restore complete, elapsed time: 00:00:15

    Finished restore at 19-JUN-18

    Starting recover at 19-JUN-18

    using channel ORA_DISK_1

    starting media recovery

    media recovery complete, elapsed time: 00:00:00

    Finished recover at 19-JUN-18

    Statement processed

    Listing 7-9

    RMAN Recovery from Missing Data File

    ```


    RMAN figures it all out for us and gets things back in order in a short period
    of time.


    RMAN has a ton of features, and there is so much more to learn. Again, it is very
    important for you to read the *Database Backup and Recovery User’s Guide* to learn
    all of the things that RMAN can do. There is simply too much to cover in this
    chapter.'
  trans: '

    ## 我们的热备份


    现在我们的测试数据库已处于归档日志模式，可以执行热备份了。这次，我们将使用 RMAN 来执行备份。首先，我们需要配置 RMAN，让其知道备份文件的存放位置。在清单
    7-7 中，我们将调用 RMAN 工具并配置备份目标位置。


    ```

    [oracle@dbamentor ~]$ rman

    Recovery Manager: Release 12.2.0.1.0 - Production on Tue Jun 19 13:18:06 2018

    Copyright (c) 1982, 2017, Oracle and/or its affiliates. All rights reserved.

    RMAN> connect target /

    connected to target database: ORCL (DBID=1506090724)

    RMAN> configure default device type to disk;

    using target database control file instead of recovery catalog

    new RMAN configuration parameters:

    CONFIGURE DEFAULT DEVICE TYPE TO DISK;

    new RMAN configuration parameters are successfully stored

    RMAN> configure controlfile autobackup on;

    new RMAN configuration parameters:

    CONFIGURE CONTROLFILE AUTOBACKUP ON;

    new RMAN configuration parameters are successfully stored

    RMAN> configure channel device type disk format ''/u01/app/oracle/oradata/db_backup/backup%d_%u_%s_%p'';

    new RMAN configuration parameters:

    CONFIGURE CHANNEL DEVICE TYPE DISK FORMAT  ''/u01/app/oracle/oradata/db_backup/backup%d_%u_%s_%p'';

    new RMAN configuration parameters are successfully stored

    Listing 7-7

    RMAN Configuration

    ```


    我们指示 RMAN 将备份写入磁盘，并希望控制文件能够自动备份。最后一条命令指定了磁盘位置和文件命名格式。这个配置可以在你的 RMAN 脚本中轻松覆盖。备份到磁盘因其速度优势而非常普遍。我通常会将备份写入专门为该目的保留的磁盘。如果需要将备份写入磁带，另一个作业会将备份从磁盘复制到磁带。如果需要将备份异地存放，我会使用像
    `rsync` 或 `robocopy` 这样的工具。当然，RMAN 也具备直接写入磁带介质的能力。


    设置好这些默认值后，我们的 RMAN 数据库备份命令就变得简单多了。在清单 7-8 中，可以看到备份数据库及其归档重做日志只需一个简单的命令。


    ```

    RMAN> run { backup database plus archivelog; }

    Starting backup at 19-JUN-18

    current log archived

    using target database control file instead of recovery catalog

    allocated channel: ORA_DISK_1

    channel ORA_DISK_1: SID=71 device type=DISK

    channel ORA_DISK_1: starting archived log backup set

    channel ORA_DISK_1: specifying archived log(s) in backup set

    input archived log thread=1 sequence=22 RECID=6 STAMP=979219448

    input archived log thread=1 sequence=23 RECID=7 STAMP=979219451

    input archived log thread=1 sequence=24 RECID=8 STAMP=979219492

    channel ORA_DISK_1: starting piece 1 at 19-JUN-18

    channel ORA_DISK_1: finished piece 1 at 19-JUN-18

    piece handle=/u01/app/oracle/oradata/db_backup/backupORCL_1kt5rd15_52_1 tag=TAG20180619T132453
    comment=NONE

    channel ORA_DISK_1: backup set complete, elapsed time: 00:00:01

    Finished backup at 19-JUN-18

    Starting backup at 19-JUN-18

    using channel ORA_DISK_1

    channel ORA_DISK_1: starting full datafile backup set

    channel ORA_DISK_1: specifying datafile(s) in backup set

    input datafile file number=00001 name=/u01/app/oracle/oradata/orcl/system01.dbf

    input datafile file number=00002 name=/u01/app/oracle/oradata/orcl/sysaux01.dbf

    input datafile file number=00003 name=/u01/app/oracle/oradata/orcl/undotbs01.dbf

    input datafile file number=00004 name=/u01/app/oracle/oradata/orcl/users01.dbf

    channel ORA_DISK_1: starting piece 1 at 19-JUN-18

    channel ORA_DISK_1: finished piece 1 at 19-JUN-18

    piece handle=/u01/app/oracle/oradata/db_backup/backupORCL_1lt5rd16_53_1 tag=TAG20180619T132454
    comment=NONE

    channel ORA_DISK_1: backup set complete, elapsed time: 00:00:15

    Finished backup at 19-JUN-18

    Starting backup at 19-JUN-18

    current log archived

    using channel ORA_DISK_1

    channel ORA_DISK_1: starting archived log backup set

    channel ORA_DISK_1: specifying archived log(s) in backup set

    input archived log thread=1 sequence=25 RECID=9 STAMP=979219509

    channel ORA_DISK_1: starting piece 1 at 19-JUN-18

    channel ORA_DISK_1: finished piece 1 at 19-JUN-18

    piece handle=/u01/app/oracle/oradata/db_backup/backupORCL_1mt5rd1l_54_1 tag=TAG20180619T132509
    comment=NONE

    channel ORA_DISK_1: backup set complete, elapsed time: 00:00:01

    Finished backup at 19-JUN-18

    Starting Control File and SPFILE Autobackup at 19-JUN-18

    piece handle=/u01/app/oracle/product/12.2.0.1/dbs/c-1506090724-20180619-00 comment=NONE

    Finished Control File and SPFILE Autobackup at 19-JUN-18

    Listing 7-8

    RMAN Hot Backup

    ```


    RMAN 命令就是简单的 `backup database plus archivelog`。一条命令搞定一切。如果你仔细阅读 RMAN 的输出，可以看到
    RMAN 在读取数据库的文件，甚至备份了归档重做日志。最后，RMAN 还备份了控制文件和参数文件。


    如果我们的测试环境不进行实际测试，那就没什么价值了。所以让我们运行之前做过的相同测试。我关闭了实例，然后删除了 `users01.dbf` 数据文件，模拟文件丢失。现在我将使用
    RMAN 进行恢复。它会找出缺失的文件并按顺序将其全部恢复。还记得之前关于 `restore` 和 `recovery` 区别的讨论吗？这些区别现在很重要，因为我们首先需要告诉
    RMAN 恢复（`restore`）数据库，然后应用恢复（`recovery`）。在清单 7-9 中，操作顺序是：以 `mount` 模式启动实例、恢复数据库、恢复数据库，然后打开数据库对外服务。


    ```

    [oracle@dbamentor orcl]$ rman

    Recovery Manager: Release 12.2.0.1.0 - Production on Tue Jun 19 13:29:38 2018

    Copyright (c) 1982, 2017, Oracle and/or its affiliates.  All rights reserved.

    RMAN> connect target /

    connected to target database (not started)

    RMAN> run {

    2> startup mount;

    3> restore database;

    4> recover database;

    5> alter database open;

    6> }

    Oracle instance started

    database mounted

    Total System Global Area    1660944384 bytes

    Fixed Size                    8621376 bytes

    Variable Size              1056965312 bytes

    Database Buffers            587202560 bytes

    Redo Buffers                  8155136 bytes

    Starting restore at 19-JUN-18

    using target database control file instead of recovery catalog

    allocated channel: ORA_DISK_1

    channel ORA_DISK_1: SID=34 device type=DISK

    channel ORA_DISK_1: starting datafile backup set restore

    channel ORA_DISK_1: specifying datafile(s) to restore from backup set

    channel ORA_DISK_1: restoring datafile 00001 to /u01/app/oracle/oradata/orcl/system01.dbf

    channel ORA_DISK_1: restoring datafile 00002 to /u01/app/oracle/oradata/orcl/sysaux01.dbf

    channel ORA_DISK_1: restoring datafile 00003 to /u01/app/oracle/oradata/orcl/undotbs01.dbf

    channel ORA_DISK_1: restoring datafile 00004 to /u01/app/oracle/oradata/orcl/users01.dbf

    channel ORA_DISK_1: reading from backup piece /u01/app/oracle/oradata/db_backup/backupORCL_1lt5rd16_53_1

    channel ORA_DISK_1: piece handle=/u01/app/oracle/oradata/db_backup/backupORCL_1lt5rd16_53_1
    tag=TAG20180619T132454

    channel ORA_DISK_1: restored backup piece 1

    channel ORA_DISK_1: restore complete, elapsed time: 00:00:15

    Finished restore at 19-JUN-18

    Starting recover at 19-JUN-18

    using channel ORA_DISK_1

    starting media recovery

    media recovery complete, elapsed time: 00:00:00

    Finished recover at 19-JUN-18

    Statement processed

    Listing 7-9

    RMAN Recovery from Missing Data File

    ```


    RMAN 为我们理清了所有头绪，并在很短的时间内让一切恢复了秩序。


    RMAN 拥有大量功能，还有很多东西需要学习。再次强调，阅读 `Database Backup and Recovery User’s Guide` 以了解
    RMAN 所有的功能是非常重要的。本章实在无法涵盖其所有内容。

