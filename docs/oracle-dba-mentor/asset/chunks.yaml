  trans: "\n# 调整 SGA 组件的大小\n\n过去，Oracle 数据库管理员需要指定不同的初始化参数来设置 SGA（系统全局区）各组件的大小，包括共享池（Shared\
    \ Pool）、缓冲区高速缓存（Buffer Cache）等。如今的 Oracle DBA 使用 `SGA_TARGET` 初始化参数来定义 SGA 的总大小，并让\
    \ Oracle 实例在符合该参数设置的前提下，自行决定各独立组件的最佳大小。使用此参数有两大好处。首先，调整 SGA 大小变得更容易，因为只需准确设置一个参数。其次，Oracle\
    \ 实例可以根据工作负载的变化动态调整各个组件。如果缓冲区高速缓存需要更多空间，可以从共享池中借用——前提是共享池有充足的可用空间。\n\n与为 PGA（程序全局区）确定合适的大小类似，Oracle\
    \ 提供了 `V$SGA_TARGET_ADVICE` 视图。在清单 20-5 中，大小因子等于 1 的行就是我们当前的 SGA 设置。\n\n```sql\n\
    SQL>  select sga_size_factor,estd_db_time,estd_physical_reads\n  2  from v$sga_target_advice;\n\
    \nSGA_SIZE_FACTOR ESTD_DB_TIME ESTD_PHYSICAL_READS\n--------------- ------------\
    \ -------------------\n            .25        53470             4175955\n    \
    \         .5       686730            42630654\n            .75        77000  \
    \          29370744\n              1        60692             4175955\n      \
    \     1.25        59958             3005852\n            1.5        59703    \
    \         3005852\n           1.75        59581             3005852\n        \
    \      2        59521             3005852\n\n清单 20-5\nSGA 目标建议\n```\n\n在上面的输出中，我们当前的\
    \ SGA 估计的数据库时间值为 `60,692`，估计的物理读次数为 `4,175,955`。如果我们将 SGA 增加 25%（因子=`1.25`），估计的数据库时间和物理读次数都会略有下降。请注意，如果我们将\
    \ SGA 增加 50%（因子=`1.5`），估计的物理读次数并没有变化。这个视图告诉我们，将 SGA 大小翻倍所带来的性能提升，并不会比适度增加 25%\
    \ 好很多。\n\nOracle 还包含了另一个参数 `MEMORY_TARGET`，用于同时设置 SGA 和 PGA 的大小。这个单一参数使得数据库管理员为支持\
    \ Oracle 实例而调整内存结构变得更加容易。但是，如果您的数据库服务器已为共享内存分配启用了大页（Huge Pages），则无法使用 `MEMORY_TARGET`。如果您在\
    \ Linux 上运行 Oracle，那么您很可能需要使用大页，这意味着您需要为 `SGA_TARGET` 和 `PGA_AGGREGATE_TARGET`\
    \ 初始化参数确定合适的值。\n\n# 后台进程\n\n分配所有这些内存固然很好，但仅靠内存分配是无法完成任何工作的。需要有东西将数据移入和移出内存。在 Unix\
    \ 和 Linux 环境中，Oracle 大量使用在服务器上运行的不同进程或小程序。每个进程都有自己的工作要做。这些进程协同工作，使 Oracle 实例得以运行。在\
    \ Windows 服务器上，工作由同一进程中的不同线程完成。\n\n当您启动 Oracle 实例时，会分配内存并自动启动若干进程。这些被称为 `后台进程`，因为它们在后台工作以管理实例。这与特定于用户会话的进程不同。\n\
    \n有些后台进程是 `强制性` 的。如果一个强制性进程终止，实例也将终止。毕竟，如果一个实例必需的进程不存在，它就无法存活。其他进程是 `可选` 的，其启动取决于实例的配置。回想一下，在第\
    \ 7 章中，我们为测试平台设置了归档日志模式。以此模式配置时，Oracle 实例将启动一个进程，将在线重做日志（ORL）的内容复制到归档日志目标位置。这是该进程唯一的工作。由于归档日志模式不是必需的，支持它的进程也就不是必需的。如果一个可选进程异常终止，实例将继续保持运行。通常，某个强制性进程会检测到可选进程已关闭并尝试重启它。\n\
    \n每个新的 Oracle 版本都可能带来新的进程，有些是强制性的，有些是可选的。请查阅您所用特定版本的 *《数据库概念》* 指南，以了解实例可能生成的不同进程。有时，创建新进程是为了支持新功能。其他时候，Oracle\
    \ 公司会创建新进程，以分担某个已不堪重负的进程的工作。例如，自我了解以来，每个 Oracle 版本都有一个 `PMON` 进程。`PMON` 仍然存在，但\
    \ Oracle 12*c* 现在已将 `PMON` 的部分职责剥离出来，放入了 `CLMN` 和 `CLnn` 进程中，我们将在下一节看到。\n\n##\
    \ 强制性进程\n\n本节描述 Oracle 12.2 实例的强制性进程。\n\n*   `进程监视器 (PMON)`：此进程负责监控其他进程并在其后进行清理。`PMON`\
    \ 会清理缓冲区高速缓存。一旦用户会话结束，`PMON` 将释放该会话持有的任何资源，包括任何事务锁。在 Oracle 12*c* 中，`PMON` 包含几个辅助进程，即\
    \ `CLMN` 和 `CLnn`。\n    *   `清理主进程 (CLMN)`：当 `PMON` 知道用户进程需要清理工作时，它会将工作委托给 `CLMN`。然后\
    \ `CLMN` 负责确保工作完成。因为清理工作本身可能就很繁重，几乎没有时间进行监督，所以 `CLMN` 会将实际工作委托给下一个进程。\n    * \
    \  `清理辅助进程 (CLnn)`：这些是执行实际清理工作的进程。`CLMN` 是监督者，`CLnn` 执行实际工作。`nn` 是两位数字的占位符。如果运行多个进程，您可能会看到\
    \ `CL01` 和 `CL02` 进程。\n\n*   `进程管理器 (PMAN)`：此进程监控和控制调度程序和共享服务器进程、作业队列进程以及任何可重启的后台进程。\n\
    \n*   `系统监视器 (SMON)`：此进程执行系统清理工作。`PMON` 及其助手负责进程清理。`SMON` 负责其余部分。实例启动时，`SMON`\
    \ 将恢复任何未提交的事务。`SMON` 还会清理任何临时段。\n\n*   `监听器注册 (LREG)`：此进程告知监听器（Listener）实例已启动、正在运行并准备好接受连接请求。它会定期向监听器更新与实例的当前连接数。在\
    \ 12*c* 之前，此进程的工作由 `SMON` 执行。\n\n*   `数据库写入器 (DBWn)`：此进程也称为 `DBWR`，负责将缓冲区高速缓存中的脏块写回数据库文件。通常有一个进程\
    \ (`DBW0`)，但繁重的工作负载可能需要多个进程。\n\n*   `日志写入器 (LGWR)`：此进程负责将重做日志缓冲区（Redo Log Buffer）的内容写入在线重做日志。\n\
    \n*   `检查点 (CKPT)`：此进程启动检查点活动。发生检查点时，它会提示 `DBWR` 采取行动。`CKPT` 将更新控制文件以及每个数据文件头中的最新系统更改号\
    \ (`SCN`)。\n\n*   `可管理性监视器 (MMON)`：此进程更新和管理自动工作量资料库 (`AWR`)。\n    *   `轻量级可管理性监视器\
    \ (MMNL)`：此进程从活动会话历史缓冲区读取统计信息，并将数据写入磁盘，这些都是 `AWR` 的一部分。\n\n*   `恢复进程 (RECO)`：此进程清理任何分布式事务中的失败。分布式事务是涉及一个以上\
    \ Oracle 数据库的事务。\n"
- fmt: '### Optional Background Processes


    并非所有进程都是必需的。本节将详细介绍可选后台进程。


    *   *归档进程 (`ARC*n*)`*：这些进程将在线重做日志的内容复制到归档日志目标位置。仅当数据库处于归档日志模式时，此进程才会启动。


    *   *作业队列进程 (`CJQ0` 和 `J*nnn*)`*：这些进程在 Oracle 调度器中执行作业。`CJQ0` 是主作业协调器进程。每个运行的作业将在不同的从属进程
    `J*nnn*` 中执行。


    *   *并行查询从属进程 (`P*nnn*)`*：这些进程负责执行工作以支持并行 SQL 语句。用户的会话是主进程，它将工作分配给并行查询从属进程。


    *   *Data Guard 监视器 (`DMON`)*：当实现 Data Guard Broker 以支持备用数据库时，会启动此进程。


    *   *受管恢复进程 (`MRP`)*：此进程在备用数据库上运行以重放事务。


    *   *队列监视器进程 (`QMN*n*)`*：此进程管理 Oracle Streams 和高级队列。


    *   *锁监视器 (`LMON`)*：此进程帮助管理实时应用集群 (`RAC`) 数据库的锁。


    正如您从上面的列表中可以想象的，如果您没有使用归档日志模式、并行查询、备用数据库或 `RAC`，您将不会在系统上看到这些进程。


    实际上还有许多其他可选的后台进程。上面列出的是最常见的。


    ## 用户进程


    最后要讨论的一类进程是用户会话的进程。在本节之后，我们将尝试将所有内容——进程、文件和内存结构——整合在一起，并构建一个架构图。


    用户总是通过使用某个应用程序连接到 `Oracle` 实例。该应用程序可能简单如 `SQL*Plus` 或某个命令行工具，但它们仍然是应用程序。应用程序在其自己的计算机进程中运行。在当今的计算机环境中，应用程序通常运行在数据库服务器以外的机器上。


    当应用程序请求连接到实例时，`Oracle` 会在数据库服务器上创建一个*服务器进程*。根据配置，该进程可能专用于单个用户，这种情况下称为*专用服务器进程*；或者该进程可能被多个应用程序连接共享使用，这种情况下称为*共享服务器进程*。`Oracle`
    公司创建了共享服务器进程的功能，以应对互联网时代的爆炸式增长。数据库需要能够支持比基于 `Web` 的应用程序诞生之前多得多的用户。`Oracle` 公司决定为我们提供拥有共享服务器进程的能力。大约在同一时期，`Web`
    服务器的开发者也为我们带来了连接池等美妙的东西。在应用层使用连接池比使用共享服务器进程更为常见。我管理过的每个 `Oracle` 数据库都使用了专用服务器进程。如果可能，我建议避免使用共享服务器进程，因为它会给
    `DBA` 带来额外的管理负担。您只需知道，当有需求证明其合理性时，该功能是存在的。在本章的其余部分，我们将使用术语*服务器进程*来指代专用类型或共享类型，具体取决于数据库配置。


    没有任何应用程序直接连接到实例。当应用程序请求连接时，`Oracle` 会确保有一个可用的服务器进程。应用程序仅与服务器进程通信。服务器进程代表应用程序与实例对话。您可以将服务器进程视为中间人。监听器接受传入的连接请求，并促进应用程序和服务器进程之间的连接。之后，监听器就不再参与两者之间发生的任何事情。应用程序总是通过监听器进行连接是一个误解。


    ## 整合说明


    我们已经讨论了构成数据库的各种文件，以及构成实例的内存结构和进程。现在是时候理清所有内容，并了解这些组件如何协同工作了。我们将从上次中断的地方开始，查看应用程序、监听器和服务器进程之间的交互，如图
    [20-1](#467924_1_En_20_Chapter.xhtml#Fig1) 所示。


    ![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig1_HTML.png](images/467924_1_En_20_Chapter/467924_1_En_20_Fig1_HTML.png)


    图 20-1


    应用程序连接


    如前一节所述，应用程序联系监听器，后者调解连接请求并让应用程序进程开始与服务器进程对话。服务器进程为其使用分配 `PGA`。


    在某个时刻，应用程序将通过发出 `SQL` 语句提出请求。我们假设满足此请求所需的数据块当前不在缓冲区高速缓存中。这些块需要被读入缓冲区高速缓存。可能会让一些人感到惊讶的是，正是用户会话的服务器进程从数据文件中读取，如图
    [20-2](#467924_1_En_20_Chapter.xhtml#Fig2) 所示。


    ![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig2_HTML.png](images/467924_1_En_20_Chapter/467924_1_En_20_Fig2_HTML.png)


    图 20-2


    将数据块读入缓冲区高速缓存


    一旦数据块进入缓冲区高速缓存，服务器进程就可以访问其中的数据。如果该块已经在缓冲区高速缓存中，则无需从数据文件读取。如果 `SQL` 操作导致直接路径读取，则从数据文件返回的箭头直接指向服务器进程，而不使用缓冲区高速缓存。


    然后，用户会话通过事务修改高速缓存中数据块的内容。该块现在被标记为脏块。信息被写入重做日志缓冲区，以便在必要时能够重放该事务。最终，`LGWR` 将重做信息写入在线重做日志，`DBW*n*`
    将脏块写入数据文件，但这两者不一定是同时发生的。图 [20-3](#467924_1_En_20_Chapter.xhtml#Fig3) 展示了与缓冲区高速缓存、重做日志缓冲区以及后台进程的交互。


    ![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig3_HTML.png](images/467924_1_En_20_Chapter/467924_1_En_20_Fig3_HTML.png)


    图 20-3


    将事务写入磁盘


    如果开启了归档日志模式，归档进程会将在线重做日志复制到归档日志目标位置。'
  raw: '### Optional Background Processes


    Not all processes are mandatory. This section details the optional background
    processes.


    *   *Archiver Processes (ARC*n*)*: These processes copy the contents of the online
    redo logs to the archivelog destination. This process is only started when the
    database is in archivelog mode.


    *   *Job Queue Processes (CJQ0 and J*nnn*)*: These processes execute jobs in the
    Oracle Scheduler. CJQ0 is the master job coordinator process. Each running job
    will execute in a different slave process, J*nnn*.


    *   *Parallel Query Slaves (P*nnn*)*: These processes are responsible for doing
    work to support parallel SQL statements. The user’s session is the master process
    and pieces out the work to the parallel query slaves.


    *   *Data Guard Monitor (DMON)*: This process is started when the Data Guard Broker
    is implemented to support standby databases.


    *   *Managed Recovery Process (MRP)*: This process runs on a standby database
    to replay transactions.


    *   *Queue Monitor Process (QMN*n*)*: This process manages Oracle Streams and
    Advanced Queueing.


    *   *Lock Monitor (LMON)*: This process helps manage locks for Real Application
    Clusters (RAC) databases.


    As you can imagine looking at the list above, if you are not using archivelog
    mode, parallel query, standby databases, or RAC, you will not see these processes
    on your system.


    There are many, many other optional background processes as well. The list above
    shows the most common.


    ## User Processes


    The last category of processes to discuss are those for user sessions. After this
    section, we will attempt to put it all together—processes, files, and memory structures—and
    build an architecture diagram.


    Users always connect to an Oracle instance by using some application. That application
    may be as simple as SQL*Plus or some command-line tool, but they are still applications.
    The application runs in its own process on a computer. Normally in today’s computer
    environments, the applications run on a machine other than the database server.


    When the application requests a connection to the instance, Oracle will create
    a *server process* on the database server. Depending on the configuration, that
    process make be earmarked solely for the user, in which case it is called a *dedicated
    server process*, or the process may be used by multiple application connections,
    in which case it is called a *shared server process*. Oracle Corporation created
    the capability to share the server process in response to the explosion of the
    Internet age. Databases needed to be able to support many more users than prior
    to the birth of web-based applications. Oracle Corporation decided to give us
    the ability to have shared server processes. About the same time, those who made
    the web servers we use gave us wonderful things like connection pooling. It is
    much more common to use connection pooling in the application tier than it is
    to use shared server processes. Every Oracle database I have administered has
    used dedicated server processes. I recommend avoiding shared server processes
    if possible due to the extra management it requires from the DBA. Just know that
    the capability is there should the need warrant its implementation. For the rest
    of this chapter, we will refer to the term *server process* to mean either the
    dedicated type or the shared type, depending on the database configuration.


    No application connects directly to the instance. When the application does request
    a connection, Oracle ensures a server process is available. The application communicates
    only to the server process. The server process talks to the instance on behalf
    of the application. You can think of the server process as the middleman. The
    Listener accepts the incoming connection request and facilitates the connection
    between the application and the server process. After that, the Listener is no
    longer involved in whatever occurs between the two. It is a myth that the application
    always goes through the Listener.


    ## Putting It Together


    We have discussed the various files that make up the database as well as the memory
    structures and processes that make up the instance. Now it’s time to make some
    sense of it all and see how these components work together. We’ll start where
    we left off and view the interaction between the application, the Listener, and
    the server process, as shown in Figure [20-1](#467924_1_En_20_Chapter.xhtml#Fig1).


    ![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig1_HTML.png](images/467924_1_En_20_Chapter/467924_1_En_20_Fig1_HTML.png)


    Figure 20-1


    Application connection


    As stated in the previous section, the application contacts the Listener, which
    brokers the connection request and gets the application process talking to the
    server process. The server process allocates the PGA for its use.


    At some point, the application is going to make a request by issuing a SQL statement.
    We will assume that the data blocks needed to satisfy this request are not currently
    in the Buffer Cache. The blocks need to be read into the Buffer Cache. What may
    surprise some is that it is the server process for the user’s session that reads
    from the data file, as shown in Figure [20-2](#467924_1_En_20_Chapter.xhtml#Fig2).


    ![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig2_HTML.png](images/467924_1_En_20_Chapter/467924_1_En_20_Fig2_HTML.png)


    Figure 20-2


    Reading block into Buffer Cache


    Once the block is in the Buffer Cache, the server process can access the data.
    If the block was already in the Buffer Cache, the read from the data file is not
    necessary. If the SQL operation results in a direct path read, the arrow from
    the data file goes back to the server process and the Buffer Cache is not used.


    The user’s session then modifies the contents of a data block in the cache through
    a transaction. The block is now marked as dirty. Information is written to the
    Redo Log Buffer to be able to replay the transaction if necessary. Eventually,
    LGWR writes the redo information to the online redo logs and DBW*n* writes the
    dirty block to the data files, but not necessarily at the same time. Figure [20-3](#467924_1_En_20_Chapter.xhtml#Fig3)
    shows the interactions with the Buffer Cache, Redo Log Buffer, and the background
    processes.


    ![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig3_HTML.png](images/467924_1_En_20_Chapter/467924_1_En_20_Fig3_HTML.png)


    Figure 20-3


    Writing transaction to disk


    If archivelog mode is turned on, the Archiver Process will copy the online redo
    logs to the archivelog destination.'
