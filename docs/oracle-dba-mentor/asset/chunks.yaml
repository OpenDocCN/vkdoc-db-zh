- fmt: '## Moving On


    In this chapter we set up a virtual machine for our use later in the book. We
    will use this VM as a testbed for learning more about Oracle. In Chapter [10](#467924_1_En_10_Chapter.xhtml),
    we will discuss testbeds in more detail. However, you are probably getting a sense
    of why they are important after reading this chapter. If you look back at Figure
    [3-9](#467924_1_En_3_Chapter.xhtml#Fig9), you can see my workstation already had
    two testbeds, one for learning new features of Oracle 12.2 and another for exploring
    the Multitenant option. Now that you know how to set up a server with VirtualBox,
    you can begin using VMs to test out a myriad of possibilities, some not even related
    to databases.


    With VirtualBox, it is possible to clone VMs so that you do not have to repeat
    these steps for other testbeds. Cloning an existing VM means you can create a
    new testbed much faster.


    Before we can install Oracle, we need to discuss file layouts, the subject of
    the next chapter. The easiest thing to do would be to place all files in a singular
    location. However, that would be the easiest route just for installing Oracle
    and creating our first database. Future maintenance will be harder. The next chapter
    will focus on planning a foundation for success for the future needs of our Oracle
    database.


    ## 4. Disk Layouts


    Before we can install the Oracle database software for the first time, we need
    to plan our disk layout strategy. This chapter will start by discussing Oracle’s
    Optimal Flexible Architecture (OFA) and then give some general guidelines regarding
    where to create your database on disk.


    As I stated earlier in this book, we will see some best practices as we work through
    the material. This chapter is filled with best practices. If you are setting up
    Oracle in a production environment, you will want to follow the best practices
    as much as possible. For simple testbeds, it may be more desirable to just place
    your files on a big disk drive and not give this chapter much thought. Many times,
    we want to spin up a testbed as quickly as possible even though we know it is
    not production ready. Also, if you are using prebuilt VirtualBox images, or even
    Oracle on Docker or other containers, the disk layout has already been decided
    for you.


    As we will discuss in this chapter, OFA is a set of guidelines for placing Oracle
    files on disk and there are always times to deviate from the standard practices.
    I have been to many sites where OFA was followed to the letter and to other sites
    where OFA was not given any thought, let alone implemented on database servers.
    No matter what path you choose, make things consistent across the entire enterprise.
    It is time consuming for the database administrator to work on one database server
    and look for files in one location, and then shift their work to another database
    server and have to hunt for files because they are in a completely different location.
    Keeping your files in the same locations across all database servers will save
    time and reduce human error should a database administrator accidentally remove
    files or directories they did not think were part of an Oracle environment. When
    setting up my Oracle databases, I follow the OFA guidelines as much as possible,
    even for development and test environments. For testbeds where I am the only user,
    I often just place the files on disk in any fashion.


    ### Tip


    Keep your file locations consistent across the enterprise.


    While the OFA guidelines offer specific locations on disk, you may be tempted
    to use another location. For file locations, I would recommend that you follow
    the OFA guidelines as much as possible for anything other than your personal testbed.
    There may be some time in the future where your organization hires an Oracle consultant
    to come in and assist you with your work. The consultant most likely knows the
    OFA guidelines and will expect to find files in a specific location. If you use
    a different location, the consultant will waste valuable time learning your enterprise
    configuration. Since consultants charge by the hour, this wasted time will incur
    additional costs to the organization. Similarly, there may come a time in the
    future where your organization hires another DBA to add to your team. If this
    DBA has prior experience, they will likely be familiar with the OFA guidelines.
    Sticking to the OFA guidelines will help consultants or new DBAs get up to speed
    quicker in your environment. For example, I was called in to help with a database
    problem for an Oracle system I had never seen before. The database administrator
    who was in charge of this system, but was unavailable at that current time, did
    not follow OFA guidelines. Because of this, it took me longer to find the alert
    log and other trace files I needed to resolve the issue, which in turn led to
    a longer time to resolve the problem.


    ## Optimal Flexible Architecture


    Optimal Flexible Architecture (OFA) is a set of guidelines that Oracle Corporation
    provides to help us define where to place the files for Oracle on disk. These
    include the database’s files, the Oracle software files, and any trace files,
    all of which are discussed in this section.


    Keep in mind that OFA offers guidelines, not rules. You do not have to follow
    them. For a quick and simple setup of Oracle, usually for a personal testbed,
    you may ignore these guidelines. If you do plan on using your Oracle installation
    for development, testing, or production purposes, then follow the OFA guidelines
    as a best practice.


    ### ORACLE_BASE


    Before we can install any Oracle software, we need to have a base location. This
    location is called the Oracle Base, and many times on Unix and Linux environments,
    the `$ORACLE_BASE` environment variable is explicitly defined to this location.
    The OFA guidelines suggests that `ORACLE_BASE` be located at `/u01/app/oracle`
    on Unix and Linux machines. On Windows, `ORACLE_BASE` is often located in the
    `C:\oracle` directory. As stated, this is just a guideline and you can have `ORACLE_BASE`
    in any other location, but this book will assume the guidelines are followed unless
    otherwise noted.


    More accurately, the OFA guidelines recommend that `ORACLE_BASE` be located in
    `/*disk_unit*/app/*owner*`. It is very common for the disk unit to be `/u01`,
    but you may also see `/u02`, `/u03`, and so on. In days past, it was common for
    storage administrators to mount the differently numbered disk units. With today’s
    storage area networks and network file systems, `/u01` is common and the others
    are more rare. Your storage admin may use different disk unit naming conventions
    like `/disk1` and `/disk2`. Just ask your storage admin to be consistent. On Windows
    machines, the disk is mounted as a drive letter, so you may see `ORACLE_BASE`
    in `D:\app\oracle` or `E:\app\oracle`, but many sites shorten this to `D:\oracle`
    or `E:\oracle`, respectively. No matter which convention you use, be consistent.


    The Oracle Base is the root of the Oracle software and its log files. The Oracle
    database software will be installed in a subdirectory of the base. Oracle keeps
    an internal inventory of the Oracle software and its patches in `$ORACLE_BASE/oraInventory`.
    Oracle database files can be a subdirectory of the base as well.


    Remember that in Chapter [3](#467924_1_En_3_Chapter.xhtml) we set up a Linux server
    with Oracle’s VirtualBox. As such, this book will mostly talk about Linux environments.
    If you will be working with Oracle on Windows servers, the translation is very
    similar. On Windows machines, the environment variable is named `%ORACLE_BASE%`
    and often points to `C:\oracle` or `D:\oracle`.'
