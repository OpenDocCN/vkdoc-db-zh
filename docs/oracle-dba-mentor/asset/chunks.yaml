    ## 后台进程跟踪文件


    Oracle 数据库引擎由多个在后台运行的进程组成。为使 Oracle 能够运行，每个进程都有不同的职责。您可能已经接触过其中一些进程，如 `PMON`、`SMON`
    和 `CKPT`。如果您想了解更多关于这些进程的信息，第 21 章将提供更多内容。


    这些进程中的每一个都可以写入自己的跟踪文件。后台进程跟踪文件位于与**警告日志**相同的目录中。文件通常命名为 `instance_process_pid`.trc，其格式为实例名，后跟进程名，再后跟操作系统的进程标识符。例如，我有一个名为
    `orcl_pmon_25978.trc` 的跟踪文件。这个文件对应我的 `orcl` 实例的 `PMON` 进程，当时它运行时的操作系统进程 ID 为 `25978`。


    很多时候，即使没有问题发生，您也会找到这些文件。进程启动这一简单动作就会生成其中一个跟踪文件。通常，其内容只是信息性的。只有当您遇到特定后台进程的问题时，您才需要检查其跟踪文件。请回想本章前面部分，警告日志显示实例终止是因为
    `SMON` 已死亡。`PMON` 检测到此情况并终止了实例。`PMON` 的跟踪文件记录了此事件，正如我们在清单 12-15 中看到的。


    ```

    [oracle@dbamentor trace]$ cat orcl_pmon_25978.trc

