  raw: '## Know Your Audience


    As a database administrator, you are the organization’s best resource for anything
    related to the database. The DBA needs to be able to communicate with people from
    many different areas of the company. The successful DBA is one that can change
    their vocabulary depending on the audience. How you talk to the CEO and CIO will
    differ from how you talk to other IT staff, which in turn will differ from how
    you talk to other database administrators. For example, if you are talking to
    IT management and start throwing around terms like *buffer cache* or *shared pool*,
    you will be talking over their heads and they won’t be able to follow what you
    say. Instead, use the term *cache*. Most IT management understands what a cache
    is. When discussing the same topic with the CEO, who many not know what cache
    means, use the term *database memory* and they will probably have a better idea.
    However, if you use the term *cache* when talking with another Oracle DBA, they
    will ask “Which one?” The DBA is well versed in the different functions of the
    shared pool and buffer cache, so you can be more specific. Understanding your
    audience and how to quickly provide terms they can understand will make you a
    more effective communicator. Table [2-1](#467924_1_En_2_Chapter.xhtml#Tab1) illustrates
    how you might change your terminology depending on whom you are talking to.


    Table 2-1


    Audience Database Translations


    | Talking to DBAs | Talking to IT Staff | Talking to non-IT People |

    | --- | --- | --- |

    | Buffer cache | Cache | Database memory |

    | View | View | Stored query |

    | Instance | Database | Database |

    | Redo logs | Transaction logs | Transactions journal |

    | Table | Table | Table |

    | Index | Index | Index |

    | Tablespace | Data files | Database |


    Table [2-1](#467924_1_En_2_Chapter.xhtml#Tab1) is definitely not an exclusive
    list but it does give you an idea of how to choose words depending on the audience.
    Most people who interact with databases get the idea of a *table* or an *index*,
    so a DBA usually can use those words no matter who the audience is composed of.
    However, as a DBA, you really need to focus on the body language of non-IT people
    when talking to them. There are a lot of non-IT people who work with databases
    and get some basic concepts like tables and indexes and even transactions. As
    you are talking to them, watch how they are responding to your terminology. You
    may have simplified your words and still be talking over their heads. If they
    struggle with the term *table*, say something like “A table is like how data is
    arranged in an Excel spreadsheet with columns and rows.” Most people have worked
    with Excel or similar and can then get the concept. If they are struggling with
    the concept of a transaction, give them an example of withdrawing or transferring
    funds from their bank account. Try your best to keep a cool head. Do not get frustrated
    if you have to take extra time when talking with someone who does not understand
    database technology. Analyze if you are accurately getting your point across and
    be prepared to provide even more background information. Be prepared to be their
    mentor, if you will.


    In the case of Oracle memory structures like the shared pool, we would refer to
    that structure by its name when talking with another Oracle DBA, but would change
    it to *cache* for IT staff and *database memory* for non-IT people, as we already
    discussed. Oracle DBAs refer to connecting to the *instance* when conversing with
    each other, but to everyone else, it’s just the *database*.


    If the audience’s skill level is unknown, it is best to start talking as if they
    are in the non-IT category. Make the database-related terms as simple as possible.
    During your discussions, listen to the words they say. Many times, the terms they
    use can clue you in to how you need to change your vocabulary to fit their skill
    level and communicate more effectively. When fielding a request for database service,
    the first thing the DBA should do is listen to the details of the request. Remember
    that not everyone speaks the same terminology as the DBA. Do not dismiss their
    request right away. They may not understand how to properly ask for what they
    need because they do not understand how to speak your language. This is one avenue
    the rude DBA really needs to focus on for improvement.


    ## Moving On


    This chapter discussed different facets of how you should work and interact with
    others during the course of your database administration career. The chapter did
    not contain any technical content, but that is going to change as you turn the
    page. In this chapter we discussed the importance of not being a rude database
    administrator and the need to investigate further when someone submits a request
    to you. We went over the notion that different people you will interact with come
    from different audiences and that it is up to you to use the proper terminology
    based on the audience. We also addressed the fact that today’s DBA often needs
    to work with different platforms. A good foundation in database theory can help
    the DBA navigate from one database platform to another.


    In this book you will build some best practices for managing an Oracle database
    as well as learn more about the product. Before we can begin, we need a place
    to practice Oracle techniques. In the next chapter you will set up a virtual machine
    on your workstation or laptop so that you have a place to learn and explore.


    Footnotes [1](#467924_1_En_2_Chapter.xhtml#Fn1_source)'
