    schema and import into another database. I can export a set of tables as well.
    Logical backups can also be used when taking a snapshot in time of the data. I
    will often use Data Pump when I need to preserve a schema’s contents, normally
    right before I destroy the entire schema. I’ll copy the dump files to tape media
    or some other offsite storage. Years later when someone says they need the data,
    it can be difficult to restore a user-managed or RMAN backup because I need the
    same exact database version in use when the backup was taken. Data Pump from an
    older version can be imported into a newer Oracle version without issues. Logical
    backups serve a purpose. Physical backups serve a purpose. The database administrator
    needs to learn the differences and how each one impacts their ability to recover.
    The DBA would then leverage the most appropriate method.'
  trans: '

    ### RMAN 与用户管理备份


    Oracle 备份有两种管理方式。我们可以让恢复管理器来管理流程，也可以完全交由用户自行处理。这两种方式都在《*数据库备份与恢复用户指南*》中有详细记录。


    过去，数据库管理员总是亲自管理备份及后续的恢复操作。当灾难发生时，DBA 需要分析问题，评估需要恢复的内容，并执行正确的步骤以使数据库重新开放业务。丢失控制文件后，DBA
    需要执行的操作与丢失数据文件后的操作截然不同。DBA 需要精通各种灾难场景及相应的恢复步骤。


    数据库管理员负责编写自己的备份脚本。一旦 DBA 编写出一个适用于大多数情况的备份脚本，就会尽可能地用它来备份许多不同的数据库。热备份和冷备份的脚本完全不同。如果数据库处于归档日志模式，DBA
    还需要另一个脚本来管理归档日志目标，以防其被填满。


    DBA 需要密切关注备份和恢复的每一个细节。因此，过程中出现人为错误的可能性很高。在你需要从灾难中恢复时才发现备份脚本中存在人为错误，那将是一场噩梦。用户管理的备份与恢复是一项耗时且脆弱的活动。


    Oracle 公司随 Oracle 8.0 版本引入了恢复管理器（Recovery Manager）。有了 RMAN，数据库管理员无需再了解所有细节。RMAN
    会为你打理一切。在 RMAN 中，恢复丢失的控制文件或数据文件的操作是相同的。你只需告诉 RMAN 恢复所有内容。RMAN 会找出问题所在，并为你重新整合数据。如果你使用企业管理器并安排数据库备份，它会在后台为你执行
    RMAN 命令。自推出以来，RMAN 多年来不断发展壮大，现已具备许多你可能会喜欢的功能。希望你能明白为什么 RMAN 是 Oracle 首选的备份和恢复实用工具。


    有了 RMAN，用户管理的备份是否就完全没有必要了呢？许多数据库管理员会告诉你始终使用 RMAN，但我偶尔仍然发现用户管理备份的用武之地。我采用用户管理备份的两个场景是：对小型测试数据库进行快速简便的备份，以及备份那些可以利用基于硬件的磁盘快照功能的超大型数据库。


    本章稍后，我们将对我们上一章创建的测试数据库执行一次用户管理的备份。该过程超级简单且非常直观，你无需记住任何 RMAN 命令。


    所有这些听起来可能像是我反对 RMAN，但事实并非如此。RMAN 是一款出色的工具，只要它能满足你的恢复需求，我推荐使用它。我反对的是，在人们不了解具体需要满足哪些恢复需求的情况下，就声称要使用
    RMAN，或者说它是首选备份工具。


    请记住，恢复需求决定了备份解决方案。如果我的需求是在十分钟内恢复一个 200TB 的数据库，那么用 RMAN 祝你好运。对于如此庞大的数据库，该工具根本无法实现那么快的备份或恢复。但许多磁盘子系统允许存储管理员对磁盘上的文件进行快照。我们可以制定一种用户管理的备份策略：将数据库置于备份模式，进行快照，然后结束备份模式。整个过程可以在几分钟内完成。要恢复时，我们关闭数据库，并让存储管理员恢复到一个好的快照状态。即使是
    200TB 的数据库，这个过程也可以在几分钟内完成。数据库管理员必须编写备份脚本，并与存储管理员协作，双方都需要处理所有细节。然而，有些恢复需求决定了必须采用
    RMAN 无法处理的解决方案。RMAN 几乎能满足所有恢复需求，但并非全部。请记录下这些恢复需求，然后选择备份工具。


    ### 逻辑备份


    太多数据库管理员仅依赖*逻辑备份*来保护其数据库，在大多数情况下，这是不正确的备份解决方案，正如本节所讨论的。逻辑备份可以满足某些恢复需求。然而，它们很少能满足生产数据库的恢复需求。


    什么是逻辑备份？它是使用类似数据泵的`expdp`这样的导出实用工具进行的备份。RMAN 和用户管理的备份是*物理备份*，因为它们将数据文件复制到备份目标位置。备份时，数据库中的文件与备份目标位置中的内容是完全相同的。随着时间的推移，数据库文件会发生变化，并与备份副本产生差异。我需要指出的是，RMAN
    的物理备份通常在比文件级别更小的数据块级别上操作。这种技术差异不会改变逻辑备份与物理备份之间的本质区别。


    逻辑备份读取表的内容，并将表中的数据写入转储文件。该转储文件不像数据库中的任何文件。相反，转储文件包含表的结构及其数据本身。物理备份和逻辑备份之间最大的区别在于，对于逻辑备份，你永远无法前滚（*rolling
    forward*）自备份以来发生的任何更改。而对于物理备份，你可以恢复数据库，并且如果你拥有事务日志，就可以将数据库带到比备份时间点更晚的状态，这称为*前滚*。前滚可以减少甚至消除任何数据丢失。因为逻辑备份无法前滚，根据其陈旧程度以及自执行逻辑备份以来数据变化的多少，它可能会遭受大量的数据丢失。


    我经常听到初级数据库管理员询问关于从故障中恢复数据库的问题，而我最初的回应通常是询问有关数据库如何备份的更多细节。需要帮助的 DBA 回应说他们使用数据泵进行备份。此时，我就知道这位数据库管理员几乎没有考虑过他们的恢复需求。他们只是实施了他们认为能覆盖需求的备份解决方案，而十有八九，他们会得到一个惨痛的教训。这并不是说逻辑备份不好。它们确实有其用途，但逻辑备份很少是生产数据库的唯一备份选项。


    逻辑备份非常适合将数据从一个数据库复制到另一个数据库。RMAN 在某种程度上也能做到这一点。使用数据泵，我可以只导出一个方案（schema）并导入到另一个数据库中。我也可以导出一组表。逻辑备份也可用于获取数据的某个时间点快照。当我需要保留某个方案的内容时，我经常会使用数据泵，通常是在我销毁整个方案之前。我会将转储文件复制到磁带介质或其他异地存储中。多年后，当有人说他们需要这些数据时，恢复用户管理或
    RMAN 备份可能会很困难，因为我需要与备份时完全相同的数据库版本。而将旧版本的数据泵导出文件导入到较新的 Oracle 版本中通常没有问题。逻辑备份有其用途。物理备份也有其用途。数据库管理员需要了解两者的区别，以及每种方式对恢复能力的影响。然后，DBA
    将利用最合适的方法。

    '
- fmt: '## Restore and Recovery


    我们经常互换使用 `restore` 和 `recover` 这两个术语，认为它们是同一回事。在 Oracle 的术语中，它们具有截然不同的含义。注意这些区别非常重要。


    当你 `restore` 一个 Oracle 数据库时，你只是简单地将数据库的文件放回磁盘。恢复阶段将文件从备份位置复制到服务器上 Oracle 可以访问的某个位置。通常，我们会尝试恢复到完全相同的位置，但如果那个磁盘设备损坏了，我们可能需要将文件恢复到服务器上的不同位置。


    请记住，数据库是一个动态的实体。事务不断对数据进行更改。`recovery` 阶段将确保所有已提交事务的更改都已写入数据文件，并且任何未提交的事务都会被回滚。无论你执行的是热备份还是冷备份，恢复阶段都是必需的。


    ## Our Cold Backup


    既然我们已经创建了测试数据库，现在是时候备份它了。因为这是一个测试环境，我可能会在尝试新概念时破坏某些东西。能够回到一个已知状态是很好的。这个数据库没有任何生产用途，我可以丢失其中的所有数据。毕竟，它只是一个测试库。我不需要任何快速恢复，因此我的
    RTO 可以相当大。现在我了解了简单的恢复需求，可以设计备份策略了。对于我的测试环境，我通常对数据库进行一次冷的、用户管理的备份。


    在对数据库执行用户管理的备份时，我们需要备份控制文件、在线重做日志和数据文件。控制文件包含所有其他文件位置的主目录。在线重做日志包含事务日志。数据文件包含数据库中的数据。我们可以查询
    `V$CONTROLFILE`、`V$LOGFILE` 和 `V$DATAFILE` 来了解这些文件的名称和位置。清单 [7-1](#467924_1_En_7_Chapter.xhtml#PC1)
    显示了获取这些文件位置的基本查询。


    ```sql

    SQL> select name from v$controlfile;

    NAME

    ------------------------------------------------------

    /u01/app/oracle/oradata/orcl/control01.ctl

    /u01/app/oracle/oradata/orcl/control02.ctl

    SQL> select member from v$logfile;

    MEMBER

    ------------------------------------------------------

    /u01/app/oracle/oradata/orcl/redo01.log

    /u01/app/oracle/oradata/orcl/redo02.log

    /u01/app/oracle/oradata/orcl/redo03.log

    SQL> select name from v$datafile;

    NAME

    ------------------------------------------------------

    /u01/app/oracle/oradata/orcl/system01.dbf

    /u01/app/oracle/oradata/orcl/sysaux01.dbf

    /u01/app/oracle/oradata/orcl/undotbs01.dbf

    /u01/app/oracle/oradata/orcl/users01.dbf

    ```


    清单 7-1

    用于冷备份的文件


    因为这是一个测试环境，所有文件都在同一个位置。让我们创建一个备份目录，关闭实例，备份数据库，然后启动实例。我们可以在不离开 `SQL*Plus` 的情况下完成这些操作，只需在所有主机命令前加上感叹号。清单
    [7-2](#467924_1_En_7_Chapter.xhtml#PC2) 显示了执行冷备份的步骤。


    ```sql

    SQL> !mkdir /u01/app/oracle/oradata/db_backup

    SQL> shutdown immediate

    Database closed.

    Database dismounted.

    ORACLE instance shut down.

    SQL> !cp /u01/app/oracle/oradata/orcl/* /u01/app/oracle/oradata/db_backup/.

    SQL> startup

    ORACLE instance started.

    Total System Global Area 1660944384 bytes

    Fixed Size                  8621376 bytes

    Variable Size            1056965312 bytes

    Database Buffers          587202560 bytes

    Redo Buffers                8155136 bytes

    Database mounted.

    Database opened.

    ```


    清单 7-2

    冷备份


    我们的备份完成了。无论我们对测试数据库造成何种损坏，我们总能回退到执行此备份的那一天。如清单 [7-2](#467924_1_En_7_Chapter.xhtml#PC2)
    所示，对于我们的测试环境，冷备份非常简单。我们创建了一个备份目标目录，关闭了实例，将文件复制到备份目标目录，然后启动了实例。


    要从故障中恢复，我们需要做的就是关闭实例，将文件复制回来，然后再次启动它。就是这么简单，这就是为什么我喜欢为测试环境使用用户管理的冷备份。对于这个测试环境，用户管理的冷备份易于理解和执行。如果你的数据库更复杂，文件位于不同的位置，那么备份和恢复可能会更复杂。


    让我们关闭实例并删除一个数据文件，然后尝试启动实例。我们正在模拟数据文件丢失的情况。数据文件丢失的原因可能是人为意外删除，或者磁盘上该文件所在位置有坏块。清单
    [7-3](#467924_1_En_7_Chapter.xhtml#PC3) 显示了当我们尝试启动一个缺少数据库文件的实例时会发生什么。


    ```sql

    SQL> shutdown immediate

    Database closed.

    Database dismounted.

    ORACLE instance shut down.

    SQL> !rm /u01/app/oracle/oradata/orcl/users01.dbf

    SQL> startup

    ORACLE instance started.

    Total System Global Area 1660944384 bytes

    Fixed Size                  8621376 bytes

    Variable Size            1056965312 bytes

    Database Buffers          587202560 bytes

    Redo Buffers                8155136 bytes

    Database mounted.

    ORA-01157: cannot identify/lock data file 4 - see DBWR trace file

    ORA-01110: data file 4: ''/u01/app/oracle/oradata/orcl/users01.dbf''

    ```


    清单 7-3

    模拟数据文件丢失


    该文件因某种原因丢失了。当实例启动时，它无法找到该文件，因此给了我们 ORA-1157 错误。为了让系统重新运行起来，我们将中止并关闭实例，恢复我们的文件，然后启动系统。我们可以在清单
    [7-4](#467924_1_En_7_Chapter.xhtml#PC4) 中看到这些步骤。


    ```sql

    SQL> shutdown abort

    ORACLE instance shut down.

    SQL> !cp /u01/app/oracle/oradata/db_backup/* /u01/app/oracle/oradata/orcl/.

    SQL> startup

    ORACLE instance started.

    Total System Global Area 1660944384 bytes

    Fixed Size                  8621376 bytes

    Variable Size            1056965312 bytes

    Database Buffers          587202560 bytes

    Redo Buffers                8155136 bytes

    Database mounted.

    Database opened.

    ```


    清单 7-4

    从丢失的数据文件中恢复


    清单中的最后一行显示数据库现在已打开可供使用。


    此时，我们现在可以开始玩“假设”游戏，并真正开始了解更多关于 Oracle 数据库的知识。我们有了测试环境，可以随心所欲地进行尝试。在后面的章节中，我们将更详细地讨论测试环境和测试用例，但在这里我们也可以做一点。鼓励你花些时间寻找以下问题的答案：


    *   如果我丢失了一个控制文件会怎样？

    *   如果我丢失了一个在线重做日志文件会怎样？

    *   如果我只恢复丢失的文件而不恢复整个数据库会怎样？


    培养提出这类问题的好奇心。当你心中有一个问题时，就去你的测试环境看看会发生什么。如果你彻底搞砸了，你总可以从你的冷备份中恢复。记住，像这样的书不会教你所有东西，所以要通过提问来学习更多。'
  raw: '## Restore and Recovery


    We often use the terms *restore* and *recover* interchangeably to mean the same
    thing. In Oracle terms, they have distinctly different meanings. It is important
    to note the differences.


    When you *restore* an Oracle database, you are simply placing the database’s files
    back on disk. The restore phase copies the files from the backup location to the
    server somewhere Oracle can access it. Usually, we try to restore to the same
    exact location, but if we lose that disk device, we may need to restore the files
    to a different location on the server.


    Remember that the database is a living and breathing entity. Transactions are
    constantly making changes to the data. The *recovery* phase will ensure that all
    committed transactions have their changes written to the data files and that any
    uncommitted transactions are rolled back. No matter if you perform a hot or cold
    backup, the recovery phase is still needed.


    ## Our Cold Backup


    Now that we have created our testbed database, it’s time to back it up. Because
    this is a testbed, I may break things while I’m trying out new concepts. It would
    be nice to be able to get back to a known state. This database does not have any
    production purposes and I can lose all of the data inside. After all, it’s just
    a testbed. I have no need for any quick recovery, so my RTO can be quite large.
    Now that I know my simplistic recovery requirements, I can design my backup strategy.
    For my testbeds, I often take a cold, user-managed backup of the database.


    When performing a user-managed backup of the database, we need to back up the
    control files, the online redo logs, and the data files. The control files contain
    the master directory of where all the other files are located. The online redo
    logs contain the transaction log. The data files contain the data in the database.
    We can query V$CONTROLFILE, V$LOGFILE, and V$DATAFILE to learn the names and locations
    of these files. Listing [7-1](#467924_1_En_7_Chapter.xhtml#PC1) shows basic queries
    to learn the locations of these files.


    ```

    SQL> select name from v$controlfile;

    NAME


    /u01/app/oracle/oradata/orcl/control01.ctl

    /u01/app/oracle/oradata/orcl/control02.ctl

    SQL> select member from v$logfile;

    MEMBER


    /u01/app/oracle/oradata/orcl/redo01.log

    /u01/app/oracle/oradata/orcl/redo02.log

    /u01/app/oracle/oradata/orcl/redo03.log

    SQL> select name from v$datafile;

    NAME


    /u01/app/oracle/oradata/orcl/system01.dbf

    /u01/app/oracle/oradata/orcl/sysaux01.dbf

    /u01/app/oracle/oradata/orcl/undotbs01.dbf

    /u01/app/oracle/oradata/orcl/users01.dbf

    Listing 7-1

    Files for Cold Backup

    ```


    Because this is a testbed, all the files are in the same location. Let’s create
    a backup directory, shut down the instance, back up the database, then start up
    the instance. We can do this without leaving SQL*Plus by preceding all host commands
    with an exclamation point. Listing [7-2](#467924_1_En_7_Chapter.xhtml#PC2) shows
    the steps to perform a cold backup.


    ```

    SQL> !mkdir /u01/app/oracle/oradata/db_backup

    SQL> shutdown immediate

    Database closed.

    Database dismounted.

    ORACLE instance shut down.

    SQL> !cp /u01/app/oracle/oradata/orcl/* /u01/app/oracle/oradata/db_backup/.

    SQL> startup

    ORACLE instance started.

    Total System Global Area 1660944384 bytes

    Fixed Size                  8621376 bytes

    Variable Size            1056965312 bytes

    Database Buffers          587202560 bytes

    Redo Buffers                8155136 bytes

    Database mounted.

    Database opened.

    Listing 7-2

    Cold Backup

    ```


    Our backup is complete. No matter what kind of damage we do to our test database,
    we can always revert to the day this backup was taken. As shown in Listing [7-2](#467924_1_En_7_Chapter.xhtml#PC2),
    the cold backup was pretty simple for our testbed. We created a backup destination,
    shut down the instance, copied the files to the backup destination, and then started
    the instance.


    To recover from a failure, all we need to do is shut down the instance, copy the
    files back, and start it up again. It’s really that simple, which is why I like
    user-managed cold backups for testbeds. User-managed cold backups are easy to
    understand and easy to perform for this testbed. If your database is more complex
    and files are in different locations, the backup and recovery can be more complex.


    Let’s shut down the instance and remove a data file, then try to start the instance.
    We are simulating the loss of a data file. The data file may be lost because a
    human accidentally deleted it or because the disk has a bad spot where the file
    was located. Listing [7-3](#467924_1_En_7_Chapter.xhtml#PC3) shows what happens
    when we try to start the instance that has a missing database file.


    ```

    SQL> shutdown immediate

    Database closed.

    Database dismounted.

    ORACLE instance shut down.

    SQL> !rm /u01/app/oracle/oradata/orcl/users01.dbf

    SQL> startup

    ORACLE instance started.

    Total System Global Area 1660944384 bytes

    Fixed Size                  8621376 bytes

    Variable Size            1056965312 bytes

    Database Buffers          587202560 bytes

    Redo Buffers                8155136 bytes

    Database mounted.

    ORA-01157: cannot identify/lock data file 4 - see DBWR trace file

    ORA-01110: data file 4: ''/u01/app/oracle/oradata/orcl/users01.dbf''

    Listing 7-3

    Simulating Loss of a Data File

    ```


    The file was lost for some reason. When the instance started, it was not able
    to find the file so it gave us the ORA-1157 error. To get things back up and running,
    we will shut down and abort the instance, restore our files, and start things
    up. We can see the steps in Listing [7-4](#467924_1_En_7_Chapter.xhtml#PC4).


    ```

    SQL> shutdown abort

    ORACLE instance shut down.

    SQL> !cp /u01/app/oracle/oradata/db_backup/* /u01/app/oracle/oradata/orcl/.

    SQL> startup

    ORACLE instance started.

    Total System Global Area 1660944384 bytes

    Fixed Size                  8621376 bytes

    Variable Size            1056965312 bytes

    Database Buffers          587202560 bytes

    Redo Buffers                8155136 bytes

    Database mounted.

    Database opened.

    Listing 7-4

    Recovering from a Lost Data File

    ```


    The last line in the listing shows the database is now open for business.


    At this point, we can now start to play “what if” games and really start to learn
    more about the Oracle database. We have our testbed and we can play around with
    things as much as we want. In a later chapter, we will discuss testbeds and test
    cases in more detail, but we can do a little here as well. You are encouraged
    to spend some time finding the answers to these questions:


    *   What if I lost a control file?


    *   What if I lost an online redo log file?


    *   What if I restored just the lost file without restoring the entire database?


    Develop a curiosity for asking these types of questions. When you have a question
    in your mind, go to your testbed and see what happens. If you totally screw things
    up, you can always restore from your cold backup. Remember that books like this
    won’t teach you everything, so ask questions to learn more.'
  trans: '## 还原与恢复


    我们经常互换使用 `restore` 和 `recover` 这两个术语，认为它们是同一回事。在 Oracle 的术语中，它们具有截然不同的含义。注意这些区别非常重要。


    当你 `restore` 一个 Oracle 数据库时，你只是简单地将数据库的文件放回磁盘。还原阶段将文件从备份位置复制到服务器上 Oracle 可以访问的某个位置。通常，我们会尝试还原到完全相同的位置，但如果那个磁盘设备损坏了，我们可能需要将文件还原到服务器上的不同位置。


    请记住，数据库是一个动态的实体。事务不断对数据进行更改。`recovery` 阶段将确保所有已提交事务的更改都已写入数据文件，并且任何未提交的事务都会被回滚。无论你执行的是热备份还是冷备份，恢复阶段都是必需的。


    ## 我们的冷备份


    既然我们已经创建了测试数据库，现在是时候备份它了。因为这是一个测试环境，我可能会在尝试新概念时破坏某些东西。能够回到一个已知状态是很好的。这个数据库没有任何生产用途，我可以丢失其中的所有数据。毕竟，它只是一个测试库。我不需要任何快速恢复，因此我的
    RTO 可以相当大。现在我了解了简单的恢复需求，可以设计备份策略了。对于我的测试环境，我通常对数据库进行一次冷的、用户管理的备份。


    在对数据库执行用户管理的备份时，我们需要备份控制文件、在线重做日志和数据文件。控制文件包含所有其他文件位置的主目录。在线重做日志包含事务日志。数据文件包含数据库中的数据。我们可以查询
    `V$CONTROLFILE`、`V$LOGFILE` 和 `V$DATAFILE` 来了解这些文件的名称和位置。清单 7-1 显示了获取这些文件位置的基本查询。


    ```sql

    SQL> select name from v$controlfile;

    NAME

    ------------------------------------------------------

    /u01/app/oracle/oradata/orcl/control01.ctl

    /u01/app/oracle/oradata/orcl/control02.ctl

    SQL> select member from v$logfile;

    MEMBER

    ------------------------------------------------------

    /u01/app/oracle/oradata/orcl/redo01.log

    /u01/app/oracle/oradata/orcl/redo02.log

    /u01/app/oracle/oradata/orcl/redo03.log

    SQL> select name from v$datafile;

    NAME

    ------------------------------------------------------

    /u01/app/oracle/oradata/orcl/system01.dbf

    /u01/app/oracle/oradata/orcl/sysaux01.dbf

    /u01/app/oracle/oradata/orcl/undotbs01.dbf

    /u01/app/oracle/oradata/orcl/users01.dbf

    ```


    清单 7-1

    用于冷备份的文件


    因为这是一个测试环境，所有文件都在同一个位置。让我们创建一个备份目录，关闭实例，备份数据库，然后启动实例。我们可以在不离开 `SQL*Plus` 的情况下完成这些操作，只需在所有主机命令前加上感叹号。清单
    7-2 显示了执行冷备份的步骤。


    ```sql

    SQL> !mkdir /u01/app/oracle/oradata/db_backup

    SQL> shutdown immediate

    Database closed.

    Database dismounted.

    ORACLE instance shut down.

    SQL> !cp /u01/app/oracle/oradata/orcl/* /u01/app/oracle/oradata/db_backup/.

    SQL> startup

    ORACLE instance started.

    Total System Global Area 1660944384 bytes

    Fixed Size                  8621376 bytes

    Variable Size            1056965312 bytes

    Database Buffers          587202560 bytes

    Redo Buffers                8155136 bytes

    Database mounted.

    Database opened.

    ```


    清单 7-2

    冷备份


    我们的备份完成了。无论我们对测试数据库造成何种损坏，我们总能回退到执行此备份的那一天。如清单 7-2 所示，对于我们的测试环境，冷备份非常简单。我们创建了一个备份目标目录，关闭了实例，将文件复制到备份目标目录，然后启动了实例。


    要从故障中恢复，我们需要做的就是关闭实例，将文件复制回来，然后再次启动它。就是这么简单，这就是为什么我喜欢为测试环境使用用户管理的冷备份。对于这个测试环境，用户管理的冷备份易于理解和执行。如果你的数据库更复杂，文件位于不同的位置，那么备份和恢复可能会更复杂。


    让我们关闭实例并删除一个数据文件，然后尝试启动实例。我们正在模拟数据文件丢失的情况。数据文件丢失的原因可能是人为意外删除，或者磁盘上该文件所在位置有坏块。清单
    7-3 显示了当我们尝试启动一个缺少数据库文件的实例时会发生什么。


    ```sql

    SQL> shutdown immediate

    Database closed.

    Database dismounted.

    ORACLE instance shut down.

    SQL> !rm /u01/app/oracle/oradata/orcl/users01.dbf

    SQL> startup

    ORACLE instance started.

    Total System Global Area 1660944384 bytes

    Fixed Size                  8621376 bytes

    Variable Size            1056965312 bytes

    Database Buffers          587202560 bytes

    Redo Buffers                8155136 bytes

    Database mounted.

    ORA-01157: cannot identify/lock data file 4 - see DBWR trace file

    ORA-01110: data file 4: ''/u01/app/oracle/oradata/orcl/users01.dbf''

    ```


    清单 7-3

    模拟数据文件丢失


    该文件因某种原因丢失了。当实例启动时，它无法找到该文件，因此给了我们 ORA-1157 错误。为了让系统重新运行起来，我们将中止并关闭实例，还原我们的文件，然后启动系统。我们可以在清单
    7-4 中看到这些步骤。


    ```sql

    SQL> shutdown abort

    ORACLE instance shut down.

    SQL> !cp /u01/app/oracle/oradata/db_backup/* /u01/app/oracle/oradata/orcl/.

    SQL> startup

    ORACLE instance started.

    Total System Global Area 1660944384 bytes

    Fixed Size                  8621376 bytes

    Variable Size            1056965312 bytes

    Database Buffers          587202560 bytes

    Redo Buffers                8155136 bytes

    Database mounted.

    Database opened.

    ```


    清单 7-4

    从丢失的数据文件中恢复


    清单中的最后一行显示数据库现在已打开可供使用。


    此时，我们现在可以开始玩“假设”游戏，并真正开始了解更多关于 Oracle 数据库的知识。我们有了测试环境，可以随心所欲地进行尝试。在后面的章节中，我们将更详细地讨论测试环境和测试用例，但在这里我们也可以做一点。鼓励你花些时间寻找以下问题的答案：


    *   如果我丢失了一个控制文件会怎样？

    *   如果我丢失了一个在线重做日志文件会怎样？

    *   如果我只还原丢失的文件而不还原整个数据库会怎样？


    培养提出这类问题的好奇心。当你心中有一个问题时，就去你的测试环境看看会发生什么。如果你彻底搞砸了，你总可以从你的冷备份中恢复。记住，像这样的书不会教你所有东西，所以要通过提问来学习更多。'
- fmt: '## Archivelog Mode


    正如我在本章前面提到的，如果你想执行热备份，就需要将数据库配置为归档日志模式。当事务发生时，Oracle会将事务的更改写入在线重做日志。当事务完成时，Oracle会写入一个标记，表明事务是已提交还是已回滚。Oracle数据库中只有少数几个在线重做日志组。如果你回顾清单[7-1](#467924_1_En_7_Chapter.xhtml#PC1)，你会看到我们的测试数据库有三个在线重做日志组。Oracle会先写入第一个，然后转到第二个，再转到第三个。当第三个在线重做日志组写满时，Oracle会回到第一个组并覆盖其内容。由于在线重做日志是以这种循环方式使用的，我们会随着时间的推移丢失事务历史记录。


    大多数Oracle数据库有三到五个在线重做日志组。一个好的经验法则是使在线重做日志组足够大，以便我们每小时使用三到四个组。这意味着我们将每小时覆盖一次事务日志。


    为了保存我们的事务历史记录，我们需要让Oracle归档在线重做日志。因此，我们开启归档日志模式。一旦Oracle切换到下一个在线重做日志组，它将归档前一个组。要开启归档日志模式，我们将定义归档目标。然后我们关闭实例，以装载模式启动它，并启动归档日志模式。最后，我们打开数据库供业务使用。这个过程确实需要停机时间，因此你可能需要在维护窗口期间执行。为数据库配置归档日志模式的步骤如清单[7-5](#467924_1_En_7_Chapter.xhtml#PC5)所示。


    ```

    SQL> !mkdir /u01/app/oracle/oradata/arch

    SQL> alter system set log_archive_dest_1=''location=/u01/app/oracle/oradata/arch/''
    scope=spfile;

    System altered.

    SQL> shutdown immediate

    Database closed.

    Database dismounted.

    ORACLE instance shut down.

    SQL> startup mount

    ORACLE instance started.

    Total System Global Area 1660944384 bytes

    Fixed Size                  8621376 bytes

    Variable Size            1056965312 bytes

    Database Buffers          587202560 bytes

    Redo Buffers                8155136 bytes

    Database mounted.

    SQL> alter database archivelog;

    Database altered.

    SQL> alter database open;

    Database altered.

    SQL> archive log list;

    Database log mode              Archive Mode

    Automatic archival             Enabled

    Archive destination            /u01/app/oracle/oradata/arch/

    Oldest online log sequence     15

    Next log sequence to archive   17

    Current log sequence           17

    Listing 7-5

    Archivelog Mode

    ```


    清单[7-5](#467924_1_En_7_Chapter.xhtml#PC5)中的最后一个命令显示归档日志模式已启用。


    数据库处于归档日志模式后，我们的事务就能安全地保存，不会被在线重做日志覆盖。我们可以从之前的备份中恢复，并使用归档的重做日志进行前滚。你还需要备份归档的重做日志。至少，你应该在数据库服务器上保留足够的归档重做日志，以覆盖自上次数据库备份以来的时间段。如果你执行每周完整备份，你应该在磁盘上保留七天的归档重做日志。然而，你也应该备份这些归档重做日志，这样数据库服务器的磁盘就不是它们唯一存储的地方。


    应该指出的是，启用归档日志模式是有成本的。当归档日志模式开启时，Oracle需要在在线重做日志写满后读取它并将其复制到归档日志目标。这将需要在数据库服务器上使用额外的资源，即CPU和磁盘I/O。通常，好处大于成本，但数据库管理员需要意识到这一点。


    如果我们不管理归档日志目标，它最终会被填满。当它被填满并且Oracle无法归档任何重做日志时，数据库中的事务将戛然而止。对于我的测试平台，我通常使用类似清单[7-6](#467924_1_En_7_Chapter.xhtml#PC6)所示的`RMAN`命令删除所有超过一天的归档重做日志。


    ```

    [oracle@dbamentor ~]$ rman

    Recovery Manager: Release 12.2.0.1.0 - Production on Tue Jun 19 13:10:46 2018

    Copyright (c) 1982, 2017, Oracle and/or its affiliates. All rights reserved.

    RMAN> connect target /

    connected to target database: ORCL (DBID=1506090724)

    RMAN> run { delete archivelog all completed before ''sysdate-1''; }

    using target database control file instead of recovery catalog

    allocated channel: ORA_DISK_1

    channel ORA_DISK_1: SID=63 device type=DISK

    List of Archived Log Copies for database with db_unique_name ORCL

    =====================================================================

    Key    Thrd Seq     S Low Time

    ------ ---- ------- - ---------

    1      1    17      A 18-JUN-18

    Name: /u01/app/oracle/oradata/arch/1_17_978309988.dbf

    2      1    18      A 19-JUN-18

    Name: /u01/app/oracle/oradata/arch/1_18_978309988.dbf

    3      1    19      A 19-JUN-18

    Name: /u01/app/oracle/oradata/arch/1_19_978309988.dbf

    4      1    20      A 19-JUN-18

    Name: /u01/app/oracle/oradata/arch/1_20_978309988.dbf

    5      1    21      A 19-JUN-18

    Name: /u01/app/oracle/oradata/arch/1_21_978309988.dbf

    Do you really want to delete the above objects (enter YES or NO)? YES

    deleted archived log

    archived log file name=/u01/app/oracle/oradata/arch/1_17_978309988.dbf RECID=1
    STAMP=979218471

    deleted archived log

    archived log file name=/u01/app/oracle/oradata/arch/1_18_978309988.dbf RECID=2
    STAMP=979218632

    deleted archived log

    archived log file name=/u01/app/oracle/oradata/arch/1_19_978309988.dbf RECID=3
    STAMP=979218638

    deleted archived log

    archived log file name=/u01/app/oracle/oradata/arch/1_20_978309988.dbf RECID=4
    STAMP=979218638

    deleted archived log

    archived log file name=/u01/app/oracle/oradata/arch/1_21_978309988.dbf RECID=5
    STAMP=979218641

    Deleted 5 objects

    Listing 7-6

    Cleaning Up Archived Redo Logs

    ```


    `RMAN`找到了所有超过24小时的归档重做日志，并从目标中删除了它们。然而，这只对测试平台有效。对于正常操作，你会希望使用`RMAN`或其他例程来备份你的归档重做日志以及数据库的其余部分。然后让`RMAN`或其他例程删除任何已备份的归档重做日志。这样，你就拥有了备份和事务，并且在需要恢复时可以最大限度地减少数据损失。


    许多数据库管理员总是将生产数据库置于归档日志模式。但对于可以轻松重新创建丢失数据并且我可以承担冷备份停机时间的大型数据仓库，我将偏离这一惯例。一些数据库管理员也希望他们的测试数据库处于归档日志模式。理由是归档事务的行为确实给数据库带来了一定程度的开销。在某些情况下，这可能会导致性能问题。如果我们将更改首先应用到测试数据库，我们就有很好的机会在更改影响生产之前发现任何性能问题，并且我们可以找出处理方法，以免生产用户受到负面影响。'
  raw: '## Archivelog Mode


    As I mentioned earlier in this chapter, if you want to perform hot backups, you
    will need to configure your database for archivelog mode. When a transaction occurs,
    Oracle will write the transaction’s changes in the online redo logs. When the
    transaction is complete, Oracle will write a marker indicating if the transaction
    committed or was rolled back. There are only a few online redo log groups in an
    Oracle database. If you look back at Listing [7-1](#467924_1_En_7_Chapter.xhtml#PC1),
    you’ll see that our testbed database has three online redo log groups. Oracle
    will write to the first one and then move on to the second, then on to the third.
    When the third online redo log group is full, Oracle will go back to the first
    group and overwrite its contents. Because the online redo logs are used in this
    circular fashion, we lose the transaction history over time.


    Most Oracle databases have between three and five online redo log groups. A good
    rule of thumb is to make the online redo log groups large enough so that we use
    three to four groups per hour. This means we will be overwriting the transaction
    logs every hour.


    To save our transaction history, we need to have Oracle archive the online redo
    logs. Hence, we turn on archivelog mode. Once Oracle switches to the next online
    redo log group, it will archive the previous group. To turn on archivelog mode,
    we will define the archive destination. We then shut down the instance, start
    it in mount mode, and start archivelog mode. Finally, we open the database for
    business. This process does require downtime, so you may have to perform this
    during a maintenance window. The steps to configure the database for archivelog
    mode are shown in Listing [7-5](#467924_1_En_7_Chapter.xhtml#PC5).


    ```

    SQL> !mkdir /u01/app/oracle/oradata/arch

    SQL> alter system set log_archive_dest_1=''location=/u01/app/oracle/oradata/arch/''
    scope=spfile;

    System altered.

    SQL> shutdown immediate

    Database closed.

    Database dismounted.

    ORACLE instance shut down.

    SQL> startup mount

    ORACLE instance started.

    Total System Global Area 1660944384 bytes

    Fixed Size                  8621376 bytes

    Variable Size            1056965312 bytes

    Database Buffers          587202560 bytes

    Redo Buffers                8155136 bytes

    Database mounted.

    SQL> alter database archivelog;

    Database altered.

    SQL> alter database open;

    Database altered.

    SQL> archive log list;

    Database log mode              Archive Mode

    Automatic archival             Enabled

    Archive destination            /u01/app/oracle/oradata/arch/

    Oldest online log sequence     15

    Next log sequence to archive   17

    Current log sequence           17

    Listing 7-5

    Archivelog Mode

    ```


    The last command in Listing [7-5](#467924_1_En_7_Chapter.xhtml#PC5) shows that
    archivelog mode is enabled.


    With the database in archivelog mode, our transactions are kept safe from being
    overwritten in the online redo logs. We can restore from a previous backup and
    roll forward using the archived redo logs. You will need to back up the archived
    redo logs as well. At a bare minimum, you should keep enough archived redo logs
    on the database server to cover the time period since the last backup of the database.
    If you perform a weekly full backup, you should keep seven days’ worth of archived
    redo logs on disk. However, you should be backing up those archived redo logs
    so the database server’s disk is not the only place they are stored.


    It should be noted that there is a cost to enabling archivelog mode. When archivelog
    mode is turned on, Oracle will need to read the online redo log once it fills
    and copy it to the archivelog destination. This will require additional resources
    to be used on your database server, namely CPU and disk I/O. Normally, the benefits
    outweigh the costs, but the database administrator does need to be aware.


    If we do not manage the archivelog destination, it will eventually fill up. When
    it fills up and Oracle cannot archive any redo logs, the transactions in the database
    will come to a screeching halt. For my testbed, I typically remove all archived
    redo logs older than one day with an RMAN command similar to that shown in Listing
    [7-6](#467924_1_En_7_Chapter.xhtml#PC6).


    ```

    [oracle@dbamentor ~]$ rman

    Recovery Manager: Release 12.2.0.1.0 - Production on Tue Jun 19 13:10:46 2018

    Copyright (c) 1982, 2017, Oracle and/or its affiliates. All rights reserved.

    RMAN> connect target /

    connected to target database: ORCL (DBID=1506090724)

    RMAN> run { delete archivelog all completed before ''sysdate-1''; }

    using target database control file instead of recovery catalog

    allocated channel: ORA_DISK_1

    channel ORA_DISK_1: SID=63 device type=DISK

    List of Archived Log Copies for database with db_unique_name ORCL

    =====================================================================

    Key    Thrd Seq     S Low Time

    ------ ---- ------- - ---------

    1      1    17      A 18-JUN-18

    Name: /u01/app/oracle/oradata/arch/1_17_978309988.dbf

    2      1    18      A 19-JUN-18

    Name: /u01/app/oracle/oradata/arch/1_18_978309988.dbf

    3      1    19      A 19-JUN-18

    Name: /u01/app/oracle/oradata/arch/1_19_978309988.dbf

    4      1    20      A 19-JUN-18

    Name: /u01/app/oracle/oradata/arch/1_20_978309988.dbf

    5      1    21      A 19-JUN-18

    Name: /u01/app/oracle/oradata/arch/1_21_978309988.dbf

    Do you really want to delete the above objects (enter YES or NO)? YES

    deleted archived log

    archived log file name=/u01/app/oracle/oradata/arch/1_17_978309988.dbf RECID=1
    STAMP=979218471

    deleted archived log

    archived log file name=/u01/app/oracle/oradata/arch/1_18_978309988.dbf RECID=2
    STAMP=979218632

    deleted archived log

    archived log file name=/u01/app/oracle/oradata/arch/1_19_978309988.dbf RECID=3
    STAMP=979218638

    deleted archived log

    archived log file name=/u01/app/oracle/oradata/arch/1_20_978309988.dbf RECID=4
    STAMP=979218638

    deleted archived log

    archived log file name=/u01/app/oracle/oradata/arch/1_21_978309988.dbf RECID=5
    STAMP=979218641

    Deleted 5 objects

    Listing 7-6

    Cleaning Up Archived Redo Logs

    ```


    RMAN has found all archived redo logs older than 24 hours and removed them from
    the destination. However, this is only good for a testbed. For normal operations,
    you will want RMAN or some other routine to back up your archived redo logs as
    well as the rest of your database. Then have RMAN or the other routine remove
    any archived redo logs that have been backed up. This way, you have your backups,
    plus the transactions, and can minimize your data loss should you need to restore.


    Many database administrators make it a point to always put production databases
    in archivelog mode. I will deviate from that convention for large data warehouses
    that can easily re-create the lost data and where I can afford the downtime for
    a cold backup. Some database administrators also want their test databases in
    archivelog mode. The reasoning is that the act of archiving transactions does
    impart a certain amount of overhead on the database. In some cases, this can cause
    performance issues. If we roll our changes into the test database first, we have
    a good chance of catching any performance issues before that change hits production
    and we can figure out how to handle it so that production users are not negatively
    impacted.'
  trans: '## 归档日志模式


    正如我在本章前面提到的，如果你想执行热备份，就需要将数据库配置为归档日志模式。当事务发生时，Oracle 会将事务的更改写入在线重做日志。当事务完成时，Oracle
    会写入一个标记，表明事务是已提交还是已回滚。Oracle 数据库中只有少数几个在线重做日志组。如果你回顾清单 7-1，你会看到我们的测试数据库有三个在线重做日志组。Oracle
    会先写入第一个，然后转到第二个，再转到第三个。当第三个在线重做日志组写满时，Oracle 会回到第一个组并覆盖其内容。由于在线重做日志是以这种循环方式使用的，我们会随着时间的推移丢失事务历史记录。


    大多数 Oracle 数据库有三到五个在线重做日志组。一个好的经验法则是使在线重做日志组足够大，以便我们每小时使用三到四个组。这意味着我们将每小时覆盖一次事务日志。


    为了保存我们的事务历史记录，我们需要让 Oracle 归档在线重做日志。因此，我们开启归档日志模式。一旦 Oracle 切换到下一个在线重做日志组，它将归档前一个组。要开启归档日志模式，我们将定义归档目标。然后我们关闭实例，以装载模式启动它，并启动归档日志模式。最后，我们打开数据库供业务使用。这个过程确实需要停机时间，因此你可能需要在维护窗口期间执行。为数据库配置归档日志模式的步骤如清单
    7-5 所示。


    ```

    SQL> !mkdir /u01/app/oracle/oradata/arch

    SQL> alter system set log_archive_dest_1=''location=/u01/app/oracle/oradata/arch/''
    scope=spfile;

    System altered.

    SQL> shutdown immediate

    Database closed.

    Database dismounted.

    ORACLE instance shut down.

    SQL> startup mount

    ORACLE instance started.

    Total System Global Area 1660944384 bytes

    Fixed Size                  8621376 bytes

    Variable Size            1056965312 bytes

    Database Buffers          587202560 bytes

    Redo Buffers                8155136 bytes

    Database mounted.

    SQL> alter database archivelog;

    Database altered.

    SQL> alter database open;

    Database altered.

    SQL> archive log list;

    Database log mode              Archive Mode

    Automatic archival             Enabled

    Archive destination            /u01/app/oracle/oradata/arch/

    Oldest online log sequence     15

    Next log sequence to archive   17

    Current log sequence           17

    Listing 7-5

    归档日志模式

    ```


    清单 7-5 中的最后一个命令显示归档日志模式已启用。


    数据库处于归档日志模式后，我们的事务就能安全地保存，不会被在线重做日志覆盖。我们可以从之前的备份中恢复，并使用归档的重做日志进行前滚。你还需要备份归档的重做日志。至少，你应该在数据库服务器上保留足够的归档重做日志，以覆盖自上次数据库备份以来的时间段。如果你执行每周完整备份，你应该在磁盘上保留七天的归档重做日志。然而，你也应该备份这些归档重做日志，这样数据库服务器的磁盘就不是它们唯一存储的地方。


    应该指出的是，启用归档日志模式是有成本的。当归档日志模式开启时，Oracle 需要在在线重做日志写满后读取它并将其复制到归档日志目标。这将需要在数据库服务器上使用额外的资源，即
    CPU 和磁盘 I/O。通常，好处大于成本，但数据库管理员需要意识到这一点。


    如果我们不管理归档日志目标，它最终会被填满。当它被填满并且 Oracle 无法归档任何重做日志时，数据库中的事务将戛然而止。对于我的测试平台，我通常使用类似清单
    7-6 所示的`RMAN`命令删除所有超过一天的归档重做日志。


    ```

    [oracle@dbamentor ~]$ rman

    Recovery Manager: Release 12.2.0.1.0 - Production on Tue Jun 19 13:10:46 2018

    Copyright (c) 1982, 2017, Oracle and/or its affiliates. All rights reserved.

    RMAN> connect target /

    connected to target database: ORCL (DBID=1506090724)

    RMAN> run { delete archivelog all completed before ''sysdate-1''; }

    using target database control file instead of recovery catalog

    allocated channel: ORA_DISK_1

    channel ORA_DISK_1: SID=63 device type=DISK

    List of Archived Log Copies for database with db_unique_name ORCL

    =====================================================================

    Key    Thrd Seq     S Low Time

    ------ ---- ------- - ---------

    1      1    17      A 18-JUN-18

    Name: /u01/app/oracle/oradata/arch/1_17_978309988.dbf

    2      1    18      A 19-JUN-18

    Name: /u01/app/oracle/oradata/arch/1_18_978309988.dbf

    3      1    19      A 19-JUN-18

    Name: /u01/app/oracle/oradata/arch/1_19_978309988.dbf

    4      1    20      A 19-JUN-18

    Name: /u01/app/oracle/oradata/arch/1_20_978309988.dbf

    5      1    21      A 19-JUN-18

    Name: /u01/app/oracle/oradata/arch/1_21_978309988.dbf

    Do you really want to delete the above objects (enter YES or NO)? YES

    deleted archived log

    archived log file name=/u01/app/oracle/oradata/arch/1_17_978309988.dbf RECID=1
    STAMP=979218471

    deleted archived log

    archived log file name=/u01/app/oracle/oradata/arch/1_18_978309988.dbf RECID=2
    STAMP=979218632

    deleted archived log

    archived log file name=/u01/app/oracle/oradata/arch/1_19_978309988.dbf RECID=3
    STAMP=979218638

    deleted archived log

    archived log file name=/u01/app/oracle/oradata/arch/1_20_978309988.dbf RECID=4
    STAMP=979218638

    deleted archived log

    archived log file name=/u01/app/oracle/oradata/arch/1_21_978309988.dbf RECID=5
    STAMP=979218641

    Deleted 5 objects

    Listing 7-6

    清理归档重做日志

    ```


    `RMAN`找到了所有超过 24 小时的归档重做日志，并从目标中删除了它们。然而，这只对测试平台有效。对于正常操作，你会希望使用`RMAN`或其他例程来备份你的归档重做日志以及数据库的其余部分。然后让`RMAN`或其他例程删除任何已备份的归档重做日志。这样，你就拥有了备份和事务，并且在需要恢复时可以最大限度地减少数据损失。


    许多数据库管理员总是将生产数据库置于归档日志模式。但对于可以轻松重新创建丢失数据并且我可以承担冷备份停机时间的大型数据仓库，我将偏离这一惯例。一些数据库管理员也希望他们的测试数据库处于归档日志模式。理由是归档事务的行为确实给数据库带来了一定程度的开销。在某些情况下，这可能会导致性能问题。如果我们将更改首先应用到测试数据库，我们就有很好的机会在更改影响生产之前发现任何性能问题，并且我们可以找出处理方法，以免生产用户受到负面影响。'
- fmt: '## Our Hot Backup


    现在我们的测试数据库已处于归档日志模式，可以执行热备份了。这次，我们将使用 RMAN 来执行备份。首先，我们需要配置 RMAN，让其知道备份文件的存放位置。在清单
    [7-7](#467924_1_En_7_Chapter.xhtml#PC7) 中，我们将调用 RMAN 工具并配置备份目标位置。


    ```

    [oracle@dbamentor ~]$ rman

    Recovery Manager: Release 12.2.0.1.0 - Production on Tue Jun 19 13:18:06 2018

