- fmt: 'We are finally here! I wish it was easier, but after all of that clicking,
    we can now actually download the patch. Click the link to begin the download.
    After the download is complete, unzip the patch in its own, empty directory.


    ## Installing the PSU


    Most any patch you will ever apply is a two-step process. First, the Oracle software
    is updated. Then the internal database is updated. Some patches may only have
    one of the steps, but most have two. Applying the PSU is always a two-step process.
    `OPatch` is used for the first step, and another utility, `datapatch`, is used
    for the second step. Do not worry about updating the `datapatch` utility. It is
    part of `OPatch` and was updated when you updated `OPatch`.


    Now that the PSU has been downloaded and unzipped, let’s define our environment
    variables. The `PATH` environment variable will have both the `$ORACLE_HOME/bin`
    and `$ORACLE_HOME/OPatch` directories.


    After unzipping the patch file in an empty directory, there are three files, a
    subdirectory named with the patch number, the zip file, and a file named `PatchSearch.xml`,
    as you can see in Listing [17-3](#467924_1_En_17_Chapter.xhtml#PC3). Environment
    variables are also declared in this code sample.


    ```

    [oracle@dbamentor PSU]$ ls

    28163133  p28163133_122010_LINUX-x86-64.zip  PatchSearch.xml

    [oracle@dbamentor PSU]$ export ORACLE_HOME=/u01/app/oracle/product/12.2.0.1

    [oracle@dbamentor PSU]$ export PATH=$ORACLE_HOME/OPatch:$ORACLE_HOME/bin:$PATH

    [oracle@dbamentor PSU]$ export ORACLE_SID=orcl

    Listing 17-3

    Ready for Patching

    ```


    Patch filenames are usually of the form `p*number*_version_platform.zip`. In Listing
    [17-3](#467924_1_En_17_Chapter.xhtml#PC3), the patch file is in bold text and
    we can see this is patch number 28163133 for the 12.2.0.1 database on Linux x86-64
    platforms. The next quarter’s PSU will have a completely different patch number.


    To apply the patch, we must first stop all Oracle software running out of this
    home directory. We also change to the directory created from the unzip operation.
    In Listing [17-4](#467924_1_En_17_Chapter.xhtml#PC4), we shut down Oracle software
    on our testbed.


    ```

    [oracle@dbamentor PSU]$ sqlplus /nolog

    SQL*Plus: Release 12.2.0.1.0 Production on Sat Sep 8 19:32:03 2018

    Copyright (c) 1982, 2016, Oracle.  All rights reserved.

    SQL> connect / as sysdba

    Connected.

    SQL> shutdown immediate

    Database closed.

    Database dismounted.

    ORACLE instance shut down.

    SQL> exit

    Disconnected from Oracle Database 12c Enterprise Edition Release 12.2.0.1.0 -
    64bit Production

    [oracle@dbamentor PSU]$ cd 28163133/

    Listing 17-4

    Shutting Down Oracle

    ```


    Next, we run the `opatch apply` command to install the patch. Please note that
    while I am showing you the steps to apply the patch, this is no substitute for
    reading the patch’s Readme file for complete instructions.


    When `OPatch` starts, it always shows information such as the `OPatch` version,
    the `Oracle Home` directory, and the location of the log file generated for this
    execution of `OPatch`. `OPatch` will run some prerequisite checks to ensure a
    smooth installation of the patch. If any of the prerequisite checks fail, `OPatch`
    will end execution here. The database administrator will need to resolve the issue
    and then run `opatch` again. In Listing [17-5](#467924_1_En_17_Chapter.xhtml#PC5),
    we tell `opatch` to apply the patch in our current directory.


    ```

    [oracle@dbamentor 28163133]$ opatch apply

    Oracle Interim Patch Installer version 12.2.0.1.14

    Copyright (c) 2018, Oracle Corporation.  All rights reserved.

    Oracle Home       : /u01/app/oracle/product/12.2.0.1

    Central Inventory : /u01/app/oraInventory

    from           : /u01/app/oracle/product/12.2.0.1/oraInst.loc

    OPatch version    : 12.2.0.1.14

    OUI version       : 12.2.0.1.4

    Log file location : /u01/app/oracle/product/12.2.0.1/cfgtoollogs/opatch/opatch2018-09-11_22-54-18PM_1.log

    Verifying environment and performing prerequisite checks...

    OPatch continues with these patches:   28163133

    Do you want to proceed? [y|n]

    Listing 17-5

    opatch apply Prerequisite Checks

    ```


    Once everything checks out, the `opatch` utility asks if it is okay to proceed
    with the patch installation. You will want to make sure all Oracle software running
    out of this home is down and then respond with `y`. The `opatch` utility will
    ask you to confirm that everything is down, as shown in Listing [17-6](#467924_1_En_17_Chapter.xhtml#PC6).


    ```

    Do you want to proceed? [y|n]

    y

    User Responded with: Y

    All checks passed.

    Please shutdown Oracle instances running out of this ORACLE_HOME on the local
    system.

    (Oracle Home = ''/u01/app/oracle/product/12.2.0.1'')

    Is the local system ready for patching? [y|n]

    Listing 17-6

    OPatch Confirmation

    ```


    Once you respond with `y`, the `opatch` utility will begin to do its work. The
    first thing it does is make a backup of any files it will be modified in `ORACLE_HOME`.
    This way, should you need to roll back the patch, the `opatch` utility will simply
    restore those files from the backups.


    The `opatch` utility may inform you that there are patches for optional components
    that are not present in the current `ORACLE_HOME` directory. This message is informational
    and the `opatch` utility will skip that portion of the patch. After that, we can
    see the `opatch` utility applying the patches to various components that are installed
    in that home. I trimmed the output in Listing [17-7](#467924_1_En_17_Chapter.xhtml#PC7)
    for brevity, as we do not need to see each and every component that the `opatch`
    utility updated.


    ```

    Is the local system ready for patching? [y|n]

    y

    User Responded with: Y

    Backing up files...

    Applying interim patch ''28163133'' to OH ''/u01/app/oracle/product/12.2.0.1''

    ApplySession: Optional component(s) [ oracle.oid.client, 12.2.0.1.0 ] , [ oracle.has.crs,
    12.2.0.1.0 ] , [ oracle.ons.daemon, 12.2.0.1.0 ] , [ oracle.network.cman, 12.2.0.1.0
    ]  not present in the Oracle Home or a higher version is found.

    Patching component oracle.assistants.server, 12.2.0.1.0...

    Patching component oracle.rdbms.rman, 12.2.0.1.0...

    Patching component oracle.rdbms.rsf.ic, 12.2.0.1.0...

    Patching component oracle.rdbms, 12.2.0.1.0..

    Patching component oracle.sdo, 12.2.0.1.0...

    Patch 28163133 successfully applied.

    Log file location: /u01/app/oracle/product/12.2.0.1/cfgtoollogs/opatch/opatch2018-09-11_22-54-18PM_1.log

    OPatch succeeded.

    Listing 17-7

    OPatch Installing the Patch

    ```


    There are two messages we want to see after the `opatch` utility is done. The
    first message is “Patch `xxxxx` successfully applied.” The second message is “`OPatch`
    succeeded.” If we do not see those messages, then something went wrong and we
    will need to look into the log file for clues to help resolve the issue.


    Once the `opatch` utility has done its work, the first phase of updating the software
    is complete. It is time to start up the Listener and the database and then run
    the `datapatch` utility to complete the second phase. The Listener and the database
    instance are started in Listing [17-8](#467924_1_En_17_Chapter.xhtml#PC8).


    ```

    [oracle@dbamentor 28163133]$ lsnrctl start

    LSNRCTL for Linux: Version 12.2.0.1.0 - Production on 11-SEP-2018 23:06:22

    Copyright (c) 1991, 2016, Oracle.  All rights reserved.

    Starting /u01/app/oracle/product/12.2.0.1/bin/tnslsnr: please wait...

    TNSLSNR for Linux: Version 12.2.0.1.0 - Production

    Log messages written to /u01/app/oracle/diag/tnslsnr/dbamentor/listener/alert/log.xml

    Listening on: (DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=dbamentor)(PORT=1521)))

    Connecting to (ADDRESS=(PROTOCOL=tcp)(HOST=)(PORT=1521))

    STATUS of the LISTENER

    ```'
