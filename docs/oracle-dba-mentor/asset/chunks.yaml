    ### ODBC


    开放数据库连接（`ODBC`）已经存在了很长时间。它的唯一目的是将应用程序连接到某种数据库。`ODBC`是一种软件驱动程序，有助于使数据库连接与所使用的数据库系统无关。


    你是否支持过供应商声称可以使用`Oracle`或`SQL Server`的应用程序？供应商可能还支持其他数据库引擎。供应商通常不会为其软件编写两个不同的版本，一个用于`SQL
    Server`，一个用于`Oracle`。相反，供应商使用`ODBC`打开一个与数据库无关的连接。无论使用哪个数据库，应用程序代码基本相同。并非所有的`SQL`语句都是一样的。针对`Oracle`数据库执行的`SQL`语句可能与针对`SQL
    Server`执行的相同`SQL`语句性能不同。好的应用程序供应商会根据所使用的数据库引擎采用略有不同的代码路径。然而，由于`ODBC`，对数据库的调用是相同的。这有助于加快应用程序开发速度。


    在应用程序所在的机器上，必须安装了`Oracle` `ODBC`驱动程序，该应用程序才能连接到`Oracle`。必须安装了`SQL Server` `ODBC`驱动程序才能连接到`SQL
    Server`，依此类推。


    在`Windows`系统上，你可以使用`ODBC`数据源管理器实用程序查看已安装的驱动程序。在`Windows 10`工作站上，在搜索框（屏幕左下角）中键入“`ODBC`”，`Windows`将为你找到该实用程序。有两个实用程序，一个用于`32`位，一个用于`64`位。编译为`32`位应用程序的应用程序将使用`32`位`ODBC`驱动程序。编译为`64`位的应用程序将使用`64`位`ODBC`驱动程序。


    在图 9-3 中，我们可以看到`32`位`ODBC`数据源管理器。单击“驱动程序”选项卡可显示已安装的驱动程序。你可能需要向下滚动一点才能看到`Oracle`的驱动程序。


    ![图 9-3](img/467924_1_En_9_Fig3_HTML.png)


    图 9-3

    `Windows 10`中的`ODBC`驱动程序


    `Windows`通常包含许多预安装的`ODBC`驱动程序。你可以在列表中看到`Microsoft ODBC for Oracle`驱动程序。你还可以在列表中看到`ODBC
    Driver 13 for SQL Server`和`SQL Server`。


    ### 提示


    永远不要使用`Microsoft ODBC for Oracle`驱动程序。`Oracle`提供的`ODBC`驱动程序效果要好得多。


    在该列表的末尾附近，你可以看到名为`Oracle in OraClient12Home1_32bit`的驱动程序，这是在该机器上安装`Oracle Client`时安装的`Oracle`
    `ODBC`驱动程序。如果你想为应用程序使用`ODBC`连接到`Oracle`数据库，请为避免将来的麻烦，安装带有`ODBC`驱动程序的`Oracle Client`。其他`ODBC`驱动程序可能声称可以与`Oracle`一起使用，但我遇到了太多问题，尤其是性能方面的问题，因此只使用`Oracle`的`ODBC`驱动程序。


    在使用`ODBC`之前，必须创建数据源名称（`DSN`）。应用程序指定用户名、密码和`DSN`来连接到数据库。如果你是为第三方应用程序创建`DSN`，供应商可能会告诉你`DSN`需要命名为什么。否则，你可以使用任何你选择的名称。`DSN`是为特定的`ODBC`驱动程序创建的。例如，你可能有一个名为`hr_orcl_dev`的`DSN`，它使用`Oracle`
    `ODBC`驱动程序，另一个名为`hr_mysql_dev`的`DSN`，它使用`MySQL` `ODBC`驱动程序。正是这些`DSN`指向了要使用的`ODBC`驱动程序。


    `DSN`有两种类型：用户`DSN`和系统`DSN`。区别在于`DSN`的可见范围。用户`DSN`只能由创建它的用户使用。系统`DSN`可以由系统的任何用户使用。如果你的工作站仅供一个人使用，那么配置哪种`DSN`类型并不重要。如果你的工作站由多人使用，那么选择可能很重要。你希望其他人也使用这个相同的`DSN`吗？如果是，则创建系统`DSN`；否则，创建用户`DSN`。


    让我们看看如何创建系统`DSN`。在`ODBC`数据源管理器中，单击“系统`DSN`”选项卡，如图 9-4 所示。然后单击“添加”按钮以创建系统`DSN`。


    ![图 9-4](img/467924_1_En_9_Fig4_HTML.jpg)


    图 9-4

    `ODBC`数据源管理器中的系统`DSN`选项卡


    数据源窗口将询问你为此`DSN`使用哪个驱动程序。选择`Oracle`驱动程序，如图 9-5 所示，然后单击“完成”按钮。


    ![图 9-5](img/467924_1_En_9_Fig5_HTML.jpg)


    图 9-5

    创建新数据源窗口


    尽管你单击了名为“完成”的按钮，但你还没有完成。这会弹出另一个窗口，如图 9-6 所示，你需要在其中提供数据源名称。如前所述，第三方应用程序供应商可能期望一个特定的名称。如果你选择，可以输入可选的描述。在下一个字段中，你需要指定`TNS`别名。如图
    9-6 所示，我在`tnsnames.ora`配置文件中创建了一个名为`hrdev1`的别名，以指向正确的`Oracle`实例。你也可以输入用户名。第三方应用程序可能会在代码中指定用户名。


    ![图 9-6](img/467924_1_En_9_Fig6_HTML.jpg)


    图 9-6

    驱动程序配置


    通常，可以忽略“应用程序”、“Oracle”、“解决方法”和“SQL Server 迁移”选项卡中的其余信息。默认值通常就足够了。当一切准备就绪时，单击“测试连接”按钮。你将收到另一个窗口，要求输入用户名和密码。如果在`DSN`定义中指定了用户名，此值将自动为你填写。窗口将如图
    9-7 所示。


    ![图 9-7](img/467924_1_En_9_Fig7_HTML.jpg)


    图 9-7

    `ODBC`驱动程序连接


    单击“确定”按钮测试连接。如果一切设置正确，你将收到另一个窗口，如图 9-8 所示，表明连接成功。


    ![图 9-8](img/467924_1_En_9_Fig8_HTML.png)


    图 9-8

    `ODBC`连接成功


    如果出现错误，最终窗口将给你一条错误消息，你必须解决它。否则，单击“确定”关闭窗口并返回到`ODBC`数据源管理器实用程序。系统`DSN`选项卡应显示已创建的`DSN`。


    你并不局限于将`ODBC`用于应用程序。它对于连接到数据库的脚本编写可能很有用。当今使用的一种流行脚本语言是`Python`。清单 9-16 中的示例显示了用于创建到`Oracle`
    `DSN`的`ODBC`连接的`Python`代码。如果你想使用`ODBC`，`Python`使用`pyodbc`库。


    ```python

    import pyodbc

    cnxn = pyodbc.connect("DSN=HRDEV1")

    ```

    清单 9-16

    `Python` `ODBC`示例


    如果相同的`Python`代码需要连接到`SQL Server`，只需将对`pyodbc.connect`的调用更改为适当的`DSN`。

