  trans: '

    # 数据库配置助手


    在第 6 章中，我们使用了数据库配置助手（`DBCA`）来创建我们的第一个 Oracle 数据库。如图 11-12 所示，`DBCA`还可以执行其他任务，例如删除数据库、管理`DBCA`模板以及配置现有数据库。


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig12_HTML.jpg](img/467924_1_En_11_Fig12_HTML.jpg)

    *图 11-12：`DBCA`操作*


    配置现有数据库可用于添加或删除可选组件，如 Oracle Text、Oracle Multimedia、Oracle Spatial 等。


    在创建 Oracle 数据库时，`DBCA`会引导您回答一系列问题。您可以选择将这些答案保存为模板，这样不仅可以简化未来数据库的创建过程，还能遵循您的标准。如果您选择“管理模板”选项，`DBCA`会询问您是创建一个还是删除一个模板，类似于图
    11-13。


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig13_HTML.jpg](img/467924_1_En_11_Fig13_HTML.jpg)

    *图 11-13：`DBCA`创建模板*


    您可以使用现有模板或通过检查现有数据库来创建模板。模板创建后，您可以在列表中看到它。在图 11-14 中，前三个模板是`DBCA`自带的，但最后一个模板是我创建的。


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig14_HTML.jpg](img/467924_1_En_11_Fig14_HTML.jpg)

    *图 11-14：`DBCA`模板选择*


    # 网络配置助手


    Oracle 提供了一个网络配置助手（`NETCA`）来帮助配置 Oracle 数据库的网络组件。`NETCA`用于为 Oracle 数据库配置监听器以及任何
    LDAP 身份验证。


    在第 9 章中，我们通过手动编辑`tnsnames.ora`配置文件创建了一个`TNS`别名。大多数 Oracle 数据库管理员使用任何文本编辑器手动编辑`tnsnames.ora`。网络配置助手也可用于修改`tnsnames.ora`配置文件。


    启动`NETCA`后，该实用程序应如图 11-15 所示。选择“本地网络服务名配置”并点击“下一步”。


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig15_HTML.jpg](img/467924_1_En_11_Fig15_HTML.jpg)

    *图 11-15：`NETCA`初始屏幕*


    在下一个屏幕中，我们可以添加、重新配置、删除、重命名或测试`TNS`别名。向导将引导您完成剩余步骤。


    如前所述，大多数 Oracle 数据库管理员手动编辑配置文件。有时，他们会遇到语法无法正常工作的问题。使用`NETCA`是确保语法正确构成的好方法。


    # 其他工具和实用程序


    本章介绍了 Oracle 数据库管理员可能使用的一些工具和实用程序。您的大部分时间将花在`SQL*Plus`和/或`SQL Developer`上。许多数据库管理员也整天使用`Enterprise
    Manager`。由于篇幅限制，本章无法更详细地讨论这些工具。毕竟，`Enterprise Manager`本身就值得一本书来介绍。与 Oracle 的任何事物一样，您必须自己探索和学习更多。


    工具和实用程序并不限于本章到目前为止所见的内容。有许多实用程序您会时不时地用到。在本节中，我将讨论其中一些实用程序，并告知您它们的用途。重要的是了解有哪些工具，以及每个工具擅长执行什么工作。一旦知道使用哪个工具，您就可以立即集中精力到适当的领域。以下是各种工具和实用程序的列表：


    *   `Database Upgrade Assistant (DBUA)`：一个 GUI 向导，引导您完成升级过程。未来的章节将更详细地展示此工具。

    *   `Data Pump`：一组用于将数据从一个 Oracle 数据库导出和导入到另一个 Oracle 数据库的实用程序。

    *   `SQL*Loader`：一个命令行实用程序，用于将文本文件数据导入到 Oracle 数据库中。

    *   `Automatic Diagnostic Repository Command Interpreter (adrci)`：一个命令行实用程序，用于管理诊断跟踪文件。它也可用于打包跟踪文件，发送给
    Oracle 支持部门进行分析。

    *   `Database Verify (dbv)`：一个命令行实用程序，用于检查数据库的数据文件是否损坏。

    *   `Character Set Scanner (csscan)`：一个命令行实用程序，用于在更改数据库字符集之前扫描数据库。此实用程序将有助于发现字符集转换导致的问题。

    *   `Listener Control (lsnrctl)`：一个命令行实用程序，用于管理监听器。我们在本书中已经看到了许多示例。

    *   `Oracle Error (oerr)`：一个命令行实用程序，用于显示特定错误代码的错误消息。例如，在终端窗口中，键入`oerr ora 100`以获取`ORA-00100`错误消息的文本帮助。

    *   `Oracle Password Utility (orapwd)`：一个命令行实用程序，用于管理 Oracle 的密码文件，该文件用于`SYSDBA`和`SYSOPER`账户的外部身份验证。

    *   `Orion`：一个命令行实用程序，用于基准测试磁盘性能。

    *   `Relink`：一个命令行实用程序，用于重新编译 Oracle 软件。

    *   `Recovery Manager (RMAN)`：一个命令行实用程序，用于备份和恢复 Oracle 数据库。`RMAN`在第 7 章中讨论过。

    *   `tkprof`：一个命令行实用程序，可以将一些跟踪文件重新格式化为更易于人类阅读的输出。

    *   `TNS Ping (tnsping)`：一个命令行实用程序，用于确定`TNS`别名是否能到达有效的监听器。此实用程序在第 9 章中讨论过。

    *   `sqlcl`：一个命令行实用程序，是`SQL*Plus`的替代品。`SQL*Plus`多年来没有重大变化。`sqlcl`实用程序由 Oracle
    创建`SQL Developer`的同一团队提供。它被宣传为“`SQL Developer`遇见`SQL*Plus`”。这是列表中默认未安装的唯一一个 Oracle
    产品。

    *   `Swingbench`：一个免费的实用程序，可从[`www.dominicgiles.com`](http://www.dominicgiles.com)获取，可用于对
    Oracle 数据库进行性能测试。这不是 Oracle 产品，默认未安装。

    *   `HammerDB`：一个开源实用程序，可用于对 Oracle 和其他数据库平台进行性能测试。这不是 Oracle 产品，默认未安装。


    此列表中的大多数工具和实用程序由 Oracle Corporation 提供，在您安装 Oracle 数据库软件时即已存在。您也可以使用许多第三方工具。其中一些通常需要额外费用。您和您的公司将不得不评估这些产品，看看它们是否值得额外成本。


    # 继续前行


    本章花了一些时间讨论 Oracle DBA 可用的一些工具。在使用这些工具时，您将更多地了解它们以及如何使用它们来完成工作。


    在下一章中，我们将转向 Oracle 诊断文件。数据库管理员知道如何利用诊断和跟踪文件来了解 Oracle 数据库出了什么问题，这一点很重要。


    # 12. 诊断


    在前面的章节中，我们设置了一个数据库并开始使用它。在本章中，我们将利用诊断和跟踪文件来了解更多可能困扰 Oracle 数据库的问题。如果 Oracle 实例无法启动或崩溃，诊断文件是开始深入研究问题的绝佳起点。

    '
- fmt: '## Diagnostic Destination


    Today’s Oracle database engine combines its diagnostic and trace files into a
    singular location called the Diagnostic Destination. Prior to Oracle Database
    11*g*, the files were scattered over multiple locations, making it harder to find
    what you were looking for. By default, the Diagnostic Destination is a sub-directory
    in the Oracle Base location. If you are unsure where this is, you can use a simple
    SQL*Plus command, `show parameter`, to find out, as shown in Listing [12-1](#467924_1_En_12_Chapter.xhtml#PC1).
    The `show parameter` command can be used to see the value of any initialization
    parameter.


    ```

    SQL> show parameter diagnostic_dest

    NAME                 TYPE        VALUE

    -------------------- ----------- ----------------

    diagnostic_dest      string      /u01/app/oracle

    Listing 12-1

    Diagnostics Destination

    ```


    The output above corresponds to the Oracle Base location. The diagnostics files
    are in a subdirectory named `diag`. Within `/u01/app/oracle/diag` (or similar
    location on your system), there are a number of other subdirectories, one for
    each component that might create diagnostic and trace files. For example, the
    database engine will write its trace files in the `rdbms` subdirectory. The Oracle
    Listener will write its trace files in the `tnslsnr` subdirectory. Listing [12-2](#467924_1_En_12_Chapter.xhtml#PC2)
    shows the multiple subdirectories of `/u01/app/oracle/diag` on our testbed.


    ```

    [oracle@dbamentor ~]$ cd /u01/app/oracle/diag

    [oracle@dbamentor diag]$ ls -l

    total 0

    drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 afdboot

    drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 apx

    drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 asm

    drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 asmtool

    drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 bdsql

    drwxrwxr-x. 3 oracle oinstall 24 Jul 10 00:14 clients

    drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 crs

    drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 diagtool

    drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 dps

    drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 em

    drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 gsm

    drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 ios

    drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 lsnrctl

    drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 netcman

    drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 ofm

    drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 plsql

    drwxrwxr-x. 2 oracle oinstall  6 Sep 29  2017 plsqlapp

    drwxrwxr-x. 3 oracle oinstall 17 Sep 29  2017 rdbms

    drwxrwxr-x. 4 oracle oinstall 38 Jul 30 10:30 tnslsnr

    Listing 12-2

    Diag Dest Contents

    ```


    As you work with Oracle during your career, you will find yourself visiting many
    of these subdirectories, and others will never need your attention. If you use
    Oracle’s Automated Storage Manager (ASM) , then you may need to look into the
    `asm` subdirectory on occasion. If you never use ASM, then you will never need
    this component’s trace files and the directory will likely be empty. Other common
    ones you may visit are:


    - `crs`: If you have installed Oracle’s Grid Infrastructure (GI), any GI trace
    files will be written here. In the old days, GI used to be known by the name Cluster
    Ready Services (CRS), hence the directory name.

    - `em`: If you have Enterprise Manager (EM) installed and running on this system,
    you can find its files here.

    - `rdbms`: As stated earlier, this directory is where an Oracle database engine
    writes its diagnostic trace files.

    - `tnslsnr`: The Oracle Listener will write its files here.


    The other subdirectories of `/u01/app/oracle/diag` are rarely used.


    Because a server can support multiple Oracle databases, each Oracle instance will
    write trace files into a directory path similar to `/u01/app/oracle/diag/rdbms/`*db_name*`/`*instance_name*.


    For our testbed, the Oracle instance name is the same as the database name. The
    only time the instance differs from the database name is when running Oracle Real
    Application Clusters (RAC). Since our database does not use RAC, the directory
    path to our database’s diagnostic and trace files is `/u01/app/oracle/diag/rdbms/orcl/orcl`.


    The Oracle Listener will write its diagnostic and trace files into a path similar
    to `/u01/app/oracle/diag/tnslsnr/`*hostname*`/listener`.


    We will see more of these files as we progress through this chapter.


    ## Alert Log


    There is a special file that you will rapidly become familiar with as you administer
    Oracle databases, and that is the Alert Log. It is likely that you have already
    had some exposure to this file, even early in your career. On our testbed, the
    Alert Log is stored in `/u01/app/oracle/diag/rdbms/orcl/orcl/trace`. The instructions
    in Chapter [6](#467924_1_En_6_Chapter.xhtml) created a database named “orcl”.
    If you used a different name, then the directory path will differ slightly.


    The Alert Log is always named with the convention of `alert_`*instance*`.log`,
    using the instance name. As said before, unless you are running Oracle RAC, the
    instance name is the same as the database name. Oracle also creates an XML-based
    Alert Log in `/u01/app/oracle/diag/rdbms/orcl/orcl/alert` where each entry in
    the log file is wrapped in XML markup tags. I find the XML version of the log
    file hard to read, but this file is very useful for tools that parse the log file.
    If you work with Oracle support, they may ask you to send the XML-based Alert
    Log so they can parse it with their tools. Otherwise, I never look at the XML-based
    Alert Log.


    Listing [12-3](#467924_1_En_12_Chapter.xhtml#PC3) shows the text-based Alert Log
    in our testbed.


    ```

    [oracle@dbamentor ~]$ cd /u01/app/oracle/diag/rdbms/orcl/orcl/trace/

    [oracle@dbamentor trace]$ ls -l alert*

    -rw-r-----. 1 oracle oinstall 466338 Jul 30 14:09 alert_orcl.log

    Listing 12-3

    Alert Log Location

    ```


    The Alert Log should be one of the first places the Oracle DBA looks to troubleshoot
    problems with the Oracle database. Oracle will not write information here for
    errors or issues with each and every session. Doing so would be too resource intensive.
    Rather, the Alert Log is for issues affecting the Oracle database and its instance,
    as a whole. We will see Oracle instance startup and shutdown messages in the Alert
    Log.


    When an Oracle instance starts up, it writes a great deal of informational messages
    into the Alert Log. In Listing [12-4](#467924_1_En_12_Chapter.xhtml#PC4), we can
    see some of the information in the Alert Log. Much of the information has also
    been removed for brevity. See if you can spot the following from what is included:


    - Date and time the instance was started

    - Number of cores on the database server

    - Oracle database version

    - Oracle home directory

    - Database server name and its OS version

    - Location of the parameter file (spfile)

    - Non-default parameters in use

    - Date and time the instance was open for business'
