  raw: 'We do have the option of creating a Listener at this point in the DBCA. We
    will skip this section by simply clicking the Next button. It is easy to create
    a Listener, as will be shown later in this chapter. After clicking the Next button,
    the DBCA will advance to the Database Options screen, most of which is shown in
    Figure [6-8](#467924_1_En_6_Chapter.xhtml#Fig8).


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig8_HTML.jpg](images/467924_1_En_6_Chapter/467924_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    DBCA Database Options step


    On this screen, uncheck everything except for the Oracle JVM component. This book
    will not be showing anything for OLAP or Spatial or Application Express. These
    are unnecessary components for us. If you had used one of the predefined templates,
    these options would have been included automatically for you.


    There may certainly be times when you want to test out and play with those extra
    options. You now know how to create a testbed database and include those options
    should you desire.


    After clicking the Next button, the DBCA will advance to the Configuration Options screen as
    we can see most of it in Figure [6-9](#467924_1_En_6_Chapter.xhtml#Fig9).


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig9_HTML.jpg](images/467924_1_En_6_Chapter/467924_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    DBCA Configuration Options step


    On this screen, you can configure the memory footprint the Oracle database will
    use. We will make our life easier by selecting the option to use Automatic Memory
    Management (AMM) and use the DBCA’s recommended value. The DBCA calculates this
    value based on the total memory of the database server. With AMM, Oracle will
    decide how much memory to allocate to different memory structures based on the
    workload, thus simplifying the administration tasks. However, for production purposes,
    the recommended options are rarely a good choice and the DBA must arrive at better
    values. The other tabs let us control other configuration items. It is a good
    idea for you to just click each of those to see what they contain, but for now
    we will accept the default values and click Next to arrive at the Management Options,
    partially shown in Figure [6-10](#467924_1_En_6_Chapter.xhtml#Fig10).


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig10_HTML.jpg](images/467924_1_En_6_Chapter/467924_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    DBCA Management Options step


    This screen asks us to configure different management options. We have three choices.
    We can use Enterprise Manager (EM) Database Express, Enterprise Manager Cloud
    Control, or nothing. We will configure this database with none of the EM options
    by unselecting any check boxes. Both EM options are web-based graphical management
    tools of the database. The difference is that EM Database Express is for just
    this one database, whereas EM Cloud Control is a centralized platform capable
    of managing all of the Oracle databases in your enterprise. In this book we will
    use neither of these tools, although Chapter [11](#467924_1_En_11_Chapter.xhtml)
    will provide an overview for those that are interested in learning more. Uncheck
    the boxes and click Next and the DBCA will advance to the User Credentials screen,
    a portion of which is shown in Figure [6-11](#467924_1_En_6_Chapter.xhtml#Fig11).


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig11_HTML.jpg](images/467924_1_En_6_Chapter/467924_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    DBCA User Credentials step


    This screen asks us to supply the passwords for the SYS and SYSTEM users. The
    SYS user is the most powerful user in the database and also has the distinction
    of owning the data dictionary. As such, its password should be a closely guarded
    secret known to a small handful of individuals. The SYSTEM user is an account
    a DBA would use on a day-to-day basis for administration activities. Supply passwords
    for these users and click Next to advance to the Creation Option screen, which
    has a portion of it shown in Figure [6-12](#467924_1_En_6_Chapter.xhtml#Fig12).


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig12_HTML.jpg](images/467924_1_En_6_Chapter/467924_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    DBCA Creation Option step


    By the time we reach the screen in Figure [6-12](#467924_1_En_6_Chapter.xhtml#Fig12),
    we have provided everything the DBCA needs to know to create the database. Now
    the DBCA wants to know how to proceed. We could save the collection of all of
    our settings as its own template to speed up database creation in the future,
    just like the option of saving a response file when installing Oracle covered
    in Chapter [5](#467924_1_En_5_Chapter.xhtml). We could have the DBCA create scripts
    to create this database at a later date. For now, we will make sure the Create
    Database box is checked. After all, this option is the point of the entire chapter.
    Click Next and the DBCA will show us a summary of our options, a section of which
    can be seen in Figure [6-13](#467924_1_En_6_Chapter.xhtml#Fig13).


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig13_HTML.jpg](images/467924_1_En_6_Chapter/467924_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    DBCA Summary


    We are finally presented with a Summary screen. This gives us a chance to review
    all of the settings we have defined to the DBCA. If something looks amiss, we
    can click the Back button appropriately to make changes to the answers we have
    previously supplied. Once we are satisfied, we click the Finish button and the
    DBCA will go to work. Figure [6-14](#467924_1_En_6_Chapter.xhtml#Fig14) shows
    the a section of the Progress screen of the DBCA creating the database.


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig14_HTML.jpg](images/467924_1_En_6_Chapter/467924_1_En_6_Fig14_HTML.jpg)


    Figure 6-14


    DBCA Progress screen


    We can watch the DBCA as it works through various steps. It will start the Oracle
    instance, then create the database’s files and the data dictionary. The list of
    steps in this screen depends on the answers we supplied to the DBCA.


    If anything goes wrong with creating the database, the first place to look is
    in the file noted as the DBCA Log Location.


    Once the database has been created, the DBCA will show one final screen, the Creation
    Complete panel, partially shown in Figure [6-15](#467924_1_En_6_Chapter.xhtml#Fig15).


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig15_HTML.jpg](images/467924_1_En_6_Chapter/467924_1_En_6_Fig15_HTML.jpg)


    Figure 6-15


    DBCA DB creation complete


    Click the Close button to exit the utility. Our database has now been created
    and is ready for use.'
  trans: '



    ## 跳过监听器创建


    此时我们确实可以选择在`DBCA`中创建监听器。我们将通过直接点击“下一步”按钮跳过此部分。创建监听器很容易，本章稍后会进行展示。点击“下一步”按钮后，`DBCA`将进入“数据库选项”屏幕，其大部分内容如图
    6-8 所示。


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig8_HTML.jpg](img/467924_1_En_6_Fig8_HTML.jpg)


    **图 6-8**

    `DBCA` 数据库选项步骤


    在此屏幕上，除了 `Oracle JVM` 组件外，请取消选中所有其他选项。本书不会涉及 `OLAP`、`Spatial` 或 `Application Express`
    的内容。这些对我们来说是不必要的组件。如果您使用了预定义的模板，这些选项会自动包含在内。


    当然，您可能有时希望测试和尝试这些额外选项。现在您知道如何创建测试数据库并根据需要包含这些选项了。


    点击“下一步”按钮后，`DBCA` 将前进到“配置选项”屏幕，其大部分内容如图 6-9 所示。


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig9_HTML.jpg](img/467924_1_En_6_Fig9_HTML.jpg)


    **图 6-9**

    `DBCA` 配置选项步骤


    在此屏幕上，您可以配置 Oracle 数据库将使用的内存占用空间。为了简化我们的操作，我们将选择使用自动内存管理（`AMM`）并采用 `DBCA` 的推荐值。`DBCA`
    会根据数据库服务器的总内存计算此值。使用 `AMM`，Oracle 将根据工作负载决定为不同内存结构分配多少内存，从而简化管理任务。然而，对于生产用途，推荐选项很少是好选择，`DBA`
    必须确定更好的值。其他选项卡允许我们控制其他配置项。建议您逐一点击这些选项卡查看其内容，但现在我们将接受默认值并点击“下一步”进入“管理选项”，部分内容如图
    6-10 所示。


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig10_HTML.jpg](img/467924_1_En_6_Fig10_HTML.jpg)


    **图 6-10**

    `DBCA` 管理选项步骤


    此屏幕要求我们配置不同的管理选项。我们有三种选择：使用 `Enterprise Manager (EM) Database Express`、`Enterprise
    Manager Cloud Control` 或不使用任何选项。我们将通过取消选中任何复选框来将此数据库配置为不使用任何 `EM` 选项。这两种 `EM`
    选项都是基于 `Web` 的数据库图形化管理工具。区别在于 `EM Database Express` 仅用于这一个数据库，而 `EM Cloud Control`
    是一个集中式平台，能够管理您企业中的所有 `Oracle` 数据库。在本书中，我们将不使用这两种工具，尽管第 11 章将为有兴趣了解更多的人提供概述。取消选中复选框并点击“下一步”，`DBCA`
    将前进到“用户凭证”屏幕，其部分如图 6-11 所示。


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig11_HTML.jpg](img/467924_1_En_6_Fig11_HTML.jpg)


    **图 6-11**

    `DBCA` 用户凭证步骤


    此屏幕要求我们提供 `SYS` 和 `SYSTEM` 用户的密码。`SYS` 用户是数据库中最强大的用户，并且还拥有数据字典的所有权。因此，其密码应是一个只有少数人知道的严格保密的秘密。`SYSTEM`
    用户是 `DBA` 用于日常管理活动的帐户。为这些用户提供密码并点击“下一步”进入“创建选项”屏幕，其部分内容如图 6-12 所示。


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig12_HTML.jpg](img/467924_1_En_6_Fig12_HTML.jpg)


    **图 6-12**

    `DBCA` 创建选项步骤


    当我们到达图 6-12 所示的屏幕时，我们已经提供了 `DBCA` 创建数据库所需的所有信息。现在 `DBCA` 想要知道如何继续。我们可以将所有设置的集合保存为其自己的模板，以加快未来的数据库创建，就像第
    5 章中介绍的在安装 `Oracle` 时保存响应文件的选项一样。我们可以让 `DBCA` 创建脚本以便日后创建此数据库。现在，我们将确保选中“创建数据库”框。毕竟，这个选项是整个章节的重点。点击“下一步”，`DBCA`
    将向我们显示我们选项的摘要，其中一部分可以在图 6-13 中看到。


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig13_HTML.jpg](img/467924_1_En_6_Fig13_HTML.jpg)


    **图 6-13**

    `DBCA` 摘要


    我们最终会看到一个摘要屏幕。这让我们有机会复查所有已定义给 `DBCA` 的设置。如果某些内容看起来有问题，我们可以适当地点击“上一步”按钮来修改我们先前提供的答案。一旦我们满意，就点击“完成”按钮，`DBCA`
    将开始工作。图 6-14 显示了 `DBCA` 创建数据库过程中的进度屏幕的一部分。


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig14_HTML.jpg](img/467924_1_En_6_Fig14_HTML.jpg)


    **图 6-14**

    `DBCA` 进度屏幕


    我们可以观看 `DBCA` 执行各个步骤。它将启动 `Oracle` 实例，然后创建数据库的文件和数据字典。此屏幕中的步骤列表取决于我们提供给 `DBCA`
    的答案。


    如果创建数据库时出现任何问题，首先应查看指定为 `DBCA` 日志位置的文件。


    数据库创建完成后，`DBCA` 将显示最后一个屏幕，即“创建完成”面板，其部分内容如图 6-15 所示。


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig15_HTML.jpg](img/467924_1_En_6_Fig15_HTML.jpg)


    **图 6-15**

    `DBCA` 数据库创建完成


    点击“关闭”按钮退出该实用程序。我们的数据库现在已经创建完成并可以使用了。


