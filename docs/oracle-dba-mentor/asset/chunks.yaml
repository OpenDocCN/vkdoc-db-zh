  raw: '### DBMS_CRYPTO


    If you want to keep data safe from prying eyes, even when the database is open,
    your best bet would be to leverage the DBMS_CRYPTO supplied package. There is
    no additional license for this, but it is not transparent to the application.
    The application must leverage this package whenever it wants to view the encrypted
    data. The application must call this package to store the data in encrypted form.


    ### Virtual Private Database


    The Virtual Private Database (VPD), an Enterprise Edition feature, lets each user
    access the same table but allows each user to see only the data they are allowed
    to see. For example, you may have a table of EMPLOYEES. An employee can only see
    their record in this table. Managers can see their own record as well as the records
    of any employees that report to them. Someone in the Human Resources department
    may be able to see all employees in this table. VPD uses application contexts
    to define the records someone can see in the VPD-enabled table. Once the application
    context is defined, the users can only see the data they are allowed to see. In
    this manner, the data in a table is private to their classification.


    ### Network Encryption


    Oracle will transmit the data over the network in clear text. This may be cause
    for concern for some organizations. Oracle does provide the ability to encrypt
    data as it flows over the network. Like Transparent Data Encryption, this feature
    does have an extra cost with the Advanced Security option, an Oracle Enterprise
    Edition extra cost option.


    ### Stronger Authentication


    For some organizations, simple passwords are not enough. Oracle does provide the
    ability to leverage Kerberos or RADIUS for authentication. Organizations can also
    leverage LDAP authentication for organizations that choose to do so.


    ## Moving On


    This chapter helped us harden our database by improving its security. We configured
    a password verification function and then leveraged profiles to implement our
    security controls. This chapter and Chapter [7](#467924_1_En_7_Chapter.xhtml)
    have set us up to be a better data guardians for our corporate databases by outlining
    how to safeguard the data with backups and better security.


    Remember that the topic of database security is broad and could not be covered
    sufficiently in one chapter of this book. It is vital that you read more about
    the subject, particularly the Oracle guides referenced in this chapter, to learn
    how to protect the data in your databases.


    Up to this point, we have set up our testbed system and then made sure we have
    set it up for the future. The next few chapters will be a bit of a departure as
    we move more into how to use an Oracle database. In the next chapter, we will
    discuss how to connect to an Oracle database. Users rarely connect to the database
    from the database server itself. There are many ways to connect to a running Oracle
    instance, as we will soon see.


    # 9. Connecting to Oracle


    After the last few chapters, we now have an operational Oracle database in our
    virtual machine. If you have been following the advice in the previous chapters,
    you have implemented some best practices. Hopefully, you have also been reading
    some of the Oracle documentation that has previously been discussed.


    In this chapter, we will discuss how to connect to a running Oracle instance.
    After all, what good is storing data in a database system if you cannot access
    it? In this chapter, we will discuss different methods for connecting to Oracle.
    All of the previous examples in this book required the application, usually SQL*Plus,
    to be on the same machine as the database. End-user applications are rarely running
    on the database server, so they need connectivity to the Oracle instance.


    ## Local Connections


    Oracle databases run on a machine somewhere on a network. This machine could be
    one in your organization’s data center or it could exist in a cloud environment.
    If you can access this machine, you can make a local connection to the database.
    The term “local” means your database application will be on the same machine as
    the database.


    In this section, our database application will be SQL*Plus. We have already seen
    a few examples of making a local connection with SQL*Plus earlier in this book.
    In our testbed system we have created, open a Terminal window. The testbed only
    has one Oracle database, but it is possible to have multiple Oracle instances
    on the server, potentially with different versions. Before we can connect to a
    local Oracle instance, we need to set up our environment so that the SQL*Plus
    connection knows which instance to connect to. We do that by changing our environment
    variables. First, we’ll define the instance we want to connect to, called the
    System Identifer (SID). Next, we’ll define the Oracle home directory. Lastly,
    we will add the Oracle home’s bin subdirectory to our PATH so that we can just
    type the executable name, like “sqlplus”, and it will be found. Setting the environment
    variables is shown in Listing [9-1](#467924_1_En_9_Chapter.xhtml#PC1).


    ```

    [oracle@oracle122 ~]$ export ORACLE_SID=orcl

    [oracle@oracle122 ~]$ export ORACLE_HOME=/u01/app/oracle/product/12.2.0.1

    [oracle@oracle122 ~]$ export PATH=$ORACLE_HOME/bin:$PATH

    Listing 9-1

    Setting Environment for Local Connection

    ```


    Those three commands are all we need for Oracle on Linux operating systems. On
    Unix platforms, you may have other environment variables. On Windows, the Database
    Configuration Assistant (DBCA) set up the environment variables when we installed
    and created the Oracle database. With our environment variables properly defined,
    we can make our local connection and issue a simple query to the database, as
    shown in Listing [9-2](#467924_1_En_9_Chapter.xhtml#PC2).


    ```

    [oracle@oracle122 ~]$ sqlplus peasland

    SQL*Plus: Release 12.2.0.1.0 Production on Mon Jul 9 14:12:05 2018

    Copyright (c) 1982, 2016, Oracle.  All rights reserved.

    Enter password:

    Last Successful login time: Mon Jul 09 2018 14:12:00 -05:00

    Connected to:

    Oracle Database 12c Enterprise Edition Release 12.2.0.1.0 - 64bit Production

    SQL> select instance_name from v$instance;

    INSTANCE_NAME


    orcl

    Listing 9-2

    Local Connection

    ```


    Notice that the connection used the DBA account I created in Chapter [8](#467924_1_En_8_Chapter.xhtml).
    The simple query confirmed that I was connected to the proper Oracle instance
    on this machine.


    Oracle does provide a shortcut to setting up your environment variables. In our
    Linux terminal window, type “. oraenv” (a period followed by a space followed
    by the word oraenv). This will ask you which database you want to work with and
    then set your environment variables for you. In Listing [9-3](#467924_1_En_9_Chapter.xhtml#PC3),
    I use oraenv to set the environment for the orcl database.


    ```

    [oracle@oracle122 ~]$ . oraenv

    ORACLE_SID = [orcl] ? orcl

    The Oracle base has been set to /u01/app/oracle

    Listing 9-3

    Sourcing oraenv

    ```


    Remember that we manually defined the Oracle home directory. So how does Oracle
    know where the home directory is for this database? The answer lies in the /etc/oratab
    file, which is created when you run the root scripts after installing the database
    software. Initially, the file only has comments in it. When using the DBCA to
    create the database, the utility will add an entry in this file. Let’s look at
    its contents now in Listing [9-4](#467924_1_En_9_Chapter.xhtml#PC4).'
