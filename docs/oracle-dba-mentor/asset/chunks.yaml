    Start a blog today. Your career will only grow as a result.


    While writing to share and help others is certainly a noble endeavor, it will
    help your career as well. Most bloggers are reluctant to admit there is a bit
    of self-serving activity in their blogging, but it is there. In addition to the
    previously mentioned benefits of blogging, you may also see career growth. I have
    personally been approached by web magazines and asked to write content for them,
    in part because they read articles on my blog. I know of some database administrators
    that monetize their blog and get paid for posting ads. If you are an independent
    consultant, blogging will be essential so that your customers can gauge your level
    of expertise.


    Start your own blog today. You can use Blogger or WordPress, as I mentioned, for
    free. At first, you may struggle to find what you want to write about. The more
    you write, the more you will find your own voice and, I promise, the more your
    Oracle career will grow. Blogging does not have to be terribly time consuming.
    You can write a post as seldom or as often as you like. I often go in spurts and
    will post a couple times a month and then be dormant for a period. Some bloggers
    are more regular and try to post at least once a week.


    There are many great blogs to follow out there. The following is a list of candidates
    for you to consider. I follow all of these bloggers and learn a great deal from
    them.


    *   Brian Peasland ( [`www.peasland.net`](http://www.peasland.net) ): My blog,
    of course!


    *   Connor McDonald ( [`https://connor-mcdonald.com`](https://connor-mcdonald.com)
    ): Oracle employee who is one of the driving forces behind the popular Ask TOM
    site.


    *   Jonathan Lewis ( [`https://jonathanlewis.wordpress.com`](https://jonathanlewis.wordpress.com)
    ): The world’s foremost expert on how the Oracle Optimizer works.


    *   Tim Hall ( [`https://oracle-base.com/blog`](https://oracle-base.com/blog)
    ): Tim Hall does a great job showcasing most everything you want to know about
    how to use Oracle.


    *   Jeff Smith ( [`www.thatjeffsmith.com`](http://www.thatjeffsmith.com) ): Oracle
    product manager for the SQL Developer tool. This blog always has great tips on
    how to get the most out of the product.


    *   Mike Dietrich ( [`https://mikedietrichde.com`](https://mikedietrichde.com)
    ): Oracle product manager for patches and upgrades.


    Please do not feel offended if your blog did not make the list. The blogs above
    are a few that I follow on a regular basis and recommend as a great start for
    you. As you advance through your career and build networks in your database community,
    you will learn of other useful blogs that you may want to follow.


    Almost all blogs include the ability to sign up for an RSS feed. RSS lets you
    be informed of updates to the blog. You need a news reader that can handle the
    RSS feeds. I use a product called NewsBlur , which requires a small annual subscription.
    There are other news readers out there and some are even free. I visit the news
    reader in the morning to see what new blog posts have been created for me to read,
    rather than visiting each blog individually only to find out many of them do not
    have any new content that day.


    ## Twitter


    Twitter is a social media platform for sending messages to several people, called
    followers. You can follow anyone with a Twitter account and anyone can follow
    you. When you send a message, called a tweet, everyone who follows you will see
    it in their Twitter feed. Likewise, your twitter feed will show the tweets of
    those you follow.


    It wasn’t that long ago that tweets were limited to 140 characters, which meant
    the messages needed to be brief. If someone wanted to post a longer message, they
    sent it as an image or video. Due to its shorter message length, Twitter is often
    best suited for getting the news to your audience of followers.


    What constitutes news may vary from person to person. Some Oracle professionals
    think that their choice of morning coffee is news. Others think it is important
    to tell me how many miles they ran over the lunch break . Personally, I do not
    find that as news, and even though they may be a top-notch Oracle professional,
    I tend not to follow those types of individuals on Twitter. Similarly, you will
    not see me tweet about my non-professional life, but as they say, to each his
    own. You may find that learning more about a person’s non-Oracle day as a fantastic
    way to bond and connect with that individual. You can make Twitter what you want
    it to be and do not need to share my views on the subject.


    The Twitter accounts I follow often fall into two categories, individuals and
    companies. While not an exhaustive list, here are some of the individuals I follow:


    *   Mike Dietrich (@MikeDietrichDE): Oracle product manager of upgrades and patches


    *   Christian Antognini (@ChrisAntognini): Oracle performance specialist


    *   Franck Pachot (@FranckPachot): Oracle DBA


    *   Markus Michalewicz (@OracleRACPM): Oracle product manager for Real Application
    Clusters


    *   Tim Hall (@oraclebase): The same Tim Hall whose blog I follow


    *   Jeff Smith (@thatjeffsmith): Oracle product manager for SQL Developer


    *   Jonathan Lewis (@JLOracle): Oracle Optimizer expert


    And here are some of the companies I follow on Twitter:


    *   Orachrome (@orachrome): Twitter feed for the makers of the awesome Lighty
    product for Oracle performance tuning


    *   Oracle DB Support (@OracleDBSupport): Twitter feed for Oracle Support


    *   Oracle SQL Developer (@OracleSQLDev): Twitter feed for the Oracle SQL Developer
    product


    *   Oracle VirtualBox (@virtualbox): Twitter feed for the Oracle VirtualBox product


    There are many more that I follow as well. The list is just a sampling. I am currently
    following 88 different Twitter accounts. I know of people who follow a lot more
    than I do. Once you start following a few accounts , Twitter will recommend others
    to follow. Feel free to follow me on Twitter at @BPeaslandDBA if you like.


    Twitter is not a great resource to seek help, although I have seen people try
    to use it for problem resolution. The platform does not easily allow for a back
    and forth discussion with significant detail. Thankfully, we have much better
    platforms for resolving problems.'
  trans: '

    ### 小贴士


    今天就开始写博客吧。你的职业道路自然会越走越宽。


    虽然为了分享和帮助他人而写作无疑是件高尚的事，但它同样会对你的职业生涯有所裨益。大多数博主都不太愿意承认他们的博客活动中带有一点利己的成分，但这确实存在。除了之前提到的写博客的好处，你可能还会看到职业上的成长。我个人就曾被网络杂志联系，邀请我为他们撰写内容，部分原因就是他们读了我博客上的文章。我知道有些数据库管理员通过博客盈利，靠发布广告获得收入。如果你是一名独立顾问，写博客将是必不可少的，因为客户可以借此评估你的专业水平。


    今天就开始建立你自己的博客吧。如前所述，你可以免费使用 `Blogger` 或 `WordPress`。起初，你可能会苦于不知写什么好。写得越多，你越能找到自己的风格，而且我保证，你的
    `Oracle` 职业生涯也会随之成长。写博客不一定非常耗时。你可以随心所欲地决定更新频率，或疏或密。我经常是间歇性地写，一个月发几篇，然后沉寂一段时间。有些博主则更有规律，尽量做到每周至少发一篇。


    网上有很多优秀的博客值得关注。以下是一些供你参考的选择。我关注了所有这些博主，并从他们身上学到了很多东西。


    *   Brian Peasland ( [`www.peasland.net`](http://www.peasland.net) )：当然是我的博客！

    *   Connor McDonald ( [`https://connor-mcdonald.com`](https://connor-mcdonald.com)
    )：`Oracle` 员工，是广受欢迎的 `Ask TOM` 网站背后的核心推动者之一。

    *   Jonathan Lewis ( [`https://jonathanlewis.wordpress.com`](https://jonathanlewis.wordpress.com)
    )：全球首屈一指的 `Oracle 优化器` 工作原理专家。

    *   Tim Hall ( [`https://oracle-base.com/blog`](https://oracle-base.com/blog)
    )：Tim Hall 在展示关于如何使用 `Oracle` 的几乎所有知识方面都做得非常出色。

    *   Jeff Smith ( [`www.thatjeffsmith.com`](http://www.thatjeffsmith.com) )：`SQL
    Developer` 工具的 `Oracle` 产品经理。这个博客总是提供关于如何充分利用该产品的绝佳技巧。

    *   Mike Dietrich ( [`https://mikedietrichde.com`](https://mikedietrichde.com)
    )：负责补丁和升级的 `Oracle` 产品经理。


    如果您的博客未上榜，请不要感到不快。以上只是我定期关注的几个博客，作为你入门的一个绝佳推荐。随着你在职业生涯中不断进步，并在数据库社区中建立人脉，你会了解到其他有用的博客，你可能也想关注。


    几乎所有博客都提供注册 `RSS` 订阅的功能。`RSS` 能让你及时获知博客的更新。你需要一个能处理 `RSS` 订阅源的新闻阅读器。我使用一个叫做 `NewsBlur`
    的产品，它需要支付少量年费。市面上还有其他新闻阅读器，有些甚至是免费的。我早上会查看新闻阅读器，看看有哪些新博客文章等我阅读，而不是逐个访问每个博客，结果却发现很多博客当天并没有新内容。


    ## Twitter


    `Twitter` 是一个社交媒体平台，用于向多人（称为关注者）发送消息。你可以关注任何拥有 `Twitter` 账户的人，任何人也可以关注你。当你发送一条消息（称为推文）时，所有关注你的人都会在他们的
    `Twitter` 信息流中看到它。同样，你的信息流也会显示你所关注者的推文。


    就在不久前，推文还被限制在 140 个字符以内，这意味着信息需要非常简洁。如果有人想发布更长的消息，他们会将其作为图片或视频发送。由于消息长度较短，`Twitter`
    通常最适合向你的关注者受众发布新闻。


    什么构成新闻可能因人而异。一些 `Oracle` 专业人士认为他们选择的早晨咖啡就是新闻。另一些人则认为告诉我他们午休时间跑了多少英里很重要。就我个人而言，我不认为那是新闻，即使他们可能是顶尖的
    `Oracle` 专业人士，我也倾向于不在 `Twitter` 上关注这类人。同样，你也不会看到我在 `Twitter` 上谈论我的非职业生活，但正如俗话所说，人各有志。你可能会发现，更多地了解一个人的非
    `Oracle` 日常是建立联系和 bonding 的绝佳方式。你可以让 `Twitter` 按你想要的方式运作，无需认同我对此的看法。


    我关注的 `Twitter` 账户通常分为两类：个人和公司。以下是我关注的部分个人账户（并非详尽列表）：


    *   Mike Dietrich (`@MikeDietrichDE`): 负责升级和补丁的 `Oracle` 产品经理

    *   Christian Antognini (`@ChrisAntognini`): `Oracle` 性能专家

    *   Franck Pachot (`@FranckPachot`): `Oracle DBA`

    *   Markus Michalewicz (`@OracleRACPM`): `Real Application Clusters` 的 `Oracle`
    产品经理

    *   Tim Hall (`@oraclebase`): 我关注其博客的同一个 Tim Hall

    *   Jeff Smith (`@thatjeffsmith`): `SQL Developer` 的 `Oracle` 产品经理

    *   Jonathan Lewis (`@JLOracle`): `Oracle 优化器` 专家


    以下是我关注的公司 `Twitter` 账户：


    *   Orachrome (`@orachrome`): 出色的 `Oracle` 性能调优产品 `Lighty` 制造商的 `Twitter` 账户

    *   Oracle DB Support (`@OracleDBSupport`): `Oracle Support` 的 `Twitter` 账户

    *   Oracle SQL Developer (`@OracleSQLDev`): `Oracle SQL Developer` 产品的 `Twitter`
    账户

    *   Oracle VirtualBox (`@virtualbox`): `Oracle VirtualBox` 产品的 `Twitter` 账户


    我关注的账户还有很多。这个列表只是一个示例。我目前关注了 88 个不同的 `Twitter` 账户。我知道有人关注的比我多得多。一旦你开始关注几个账户，`Twitter`
    会推荐其他账户给你关注。如果你愿意，请随时在 `Twitter` 上关注我，账号是 `@BPeaslandDBA`。


    `Twitter` 不是寻求帮助的好资源，尽管我看到有人试图用它来解决问题。这个平台不容易支持详细深入的来回讨论。幸运的是，我们有更好的平台来解决问题。

    '
- fmt: '## Ask TOM


    几乎每位 Oracle 专业人士都曾在某个时候使用过 Oracle 的 Ask TOM 网站。许多年前，Oracle 公司聘请了一位名叫 Tom Kyte
    的顾问。除了被派往客户现场为解决 Oracle 问题外，Tom Kyte 还建立了一个网站，你可以向他提问，Ask TOM 由此诞生。你可以访问该站点：`https://asktom.oracle.com`。该网页已随时间演变，现在看起来如图
    [16-1](#467924_1_En_16_Chapter.xhtml#Fig1)所示。


    ![../images/467924_1_En_16_Chapter/467924_1_En_16_Fig1_HTML.png](images/467924_1_En_16_Chapter/467924_1_En_16_Fig1_HTML.png)


    图 16-1 Ask TOM 主页


    在主页上，你可以立即开始搜索问题的答案。不要被标题迷惑。这个站点既适用于数据库管理员，也适用于 Oracle 开发人员。在提出任何问题之前，请务必先进行搜索。很可能在过去已经有人问过同样的问题。


    尽管 Ask TOM 站点多年来发生了变化，但所有旧的答案仍然可用。该站点提供了丰富、详细且包含大量示例的问答历史记录。请将此网站加入浏览器书签并经常使用，尤其是在你遇到
    Oracle 问题卡住时。


    2016 年，Tom Kyte 从 Oracle 公司退休。Oracle 不希望 Ask TOM 这一资源消失，因为它对全球 Oracle 社区来说已变得非常宝贵。在
    Tom Kyte 退休之际，Oracle 转向了其他员工，即 Connor McDonald 和 Chris Saxon，来维持该站点的运行。不久之后，他们扩展了站点，纳入了许多各自领域专长的员工。`Ask
    TOM` 不再指代特定个人，而是被重新命名为 `Ask TOM` 或 Ask The Oracle Masters。Oracle 公司仍使用相同的名称，但更改了品牌以反映这是一个专家团队，而非特定个人。


    如果你试图获取与 Oracle 相关问题的答案，并且搜索 `Ask TOM` 档案库没有找到任何相关内容，你可以发布自己的问题。只需点击“Questions”选项卡并填写所需信息即可。


    ## 讨论论坛


    讨论论坛是与全球 Oracle 专业人士互动的好方法。在这些论坛中，你可以提出问题并就问题来回讨论，直到找到解决方案。如今的讨论论坛通常通过网络浏览器访问。市面上有很多讨论论坛，但在我看来，只有少数几个拥有可观的流量，值得关注。


    `Oracle-L` (`www.freelists.org/list/oracle-l`) 已经存在了很长时间。这实际上是一个讨论列表。访问上面的 URL
    订阅该列表，你将通过电子邮件收到每一条更新。如果你选择订阅 `Oracle-L`，请务必设置电子邮件规则，将这些邮件路由到一个文件夹，而不是堵塞你的收件箱。你回复讨论串的方式是回复你收到的电子邮件。`Oracle-L`
    设计于讨论论坛实现网络化之前。虽然按照今天的标准，与讨论组的交互方式有点过时，但这个讨论列表值得一提，仅仅是因为在那里回答问题的人才水平很高。


    `Oracle Groundbreakers` 论坛 (`https://community.oracle.com/community/technology_network_community`)
    在更名之前曾被称为 Oracle Technology Network (OTN) 社区。`Oracle Groundbreakers` 是一个免费使用的讨论论坛。你只需要一个
    Oracle 单点登录账户即可访问。你可能在本书前面下载 Oracle 软件以创建测试平台时创建过这个账户。


    `My Oracle Support Community (MOSC)` (`https://community.oracle.com/community/support/`)
    是另一个基于网络的讨论论坛。该站点与 Oracle Developer Community 集成。如果你访问这两者，本质上你使用的是同一个站点。这很方便，因为不必从一个站点跳转到另一个站点。当你订阅任一站点中的讨论空间时，新内容会出现在同一个收件箱中。


    如果有两个站点并且它们是集成的，那为什么还要有两个站点呢？`Oracle Groundbreakers` 面向所有人，对公众开放。`MOSC` 则面向拥有付费
    Oracle 支持合同的 Oracle 客户，因此得名。你甚至可以从 My Oracle Support 内部通过点击 Community 选项卡进入 `MOSC`。当你在
    `MOS` 中创建服务请求时，你可以选择通过点击 Community 中的提问按钮来在 `MOSC` 中发起讨论，如图 [16-2](#467924_1_En_16_Chapter.xhtml#Fig2)所示。


    ![../images/467924_1_En_16_Chapter/467924_1_En_16_Fig2_HTML.jpg](images/467924_1_En_16_Chapter/467924_1_En_16_Fig2_HTML.jpg)


    图 16-2 MOS “Ask in Community”按钮


    这两个网站的主要区别在于，Oracle 支持员工经常会在 `MOSC` 中参与并提供答案。值得庆幸的是，你不必在两者之间做选择，因为它们是集成的并且协同工作得很好。


    无论你使用哪个讨论论坛，都需要遵循一些规则。不遵守这些规则将导致众多喜欢攻击新受害者的论坛喷子出现。不幸的是，任何讨论论坛中都有太多粗鲁和居高临下的人。避开他们恶劣态度的最好方式是遵循一些众所周知的准则参与讨论：


    *   主题行应包含问题的简要描述，而不是陈述整个问题。

    *   发布你的 Oracle 版本。你的版本不是“12c”，而是类似 12.1.0.2 或 12.2 这样的具体版本。很多答案是特定于版本的。了解你的版本能让你获得针对问题的正确答案。未能包含你的版本信息，可能会得到诸如“哪个版本？”这样的简短回复，或者来自论坛喷子的攻击。'
  raw: '## Ask TOM


    Almost every Oracle professional has used Oracle’s Ask TOM website at one time
    or another. Many years ago, Oracle Corporation employed a consultant by the name
    of Tom Kyte. In addition to being sent to client sites to resolve Oracle issues
    for customers, Tom Kyte set up a website where you could ask him questions, and
    Ask TOM was born. You can visit this site at [`https://asktom.oracle.com`](https://asktom.oracle.com)
    . The web page has evolved over time and now looks like Figure [16-1](#467924_1_En_16_Chapter.xhtml#Fig1).


    ![../images/467924_1_En_16_Chapter/467924_1_En_16_Fig1_HTML.png](images/467924_1_En_16_Chapter/467924_1_En_16_Fig1_HTML.png)


    Figure 16-1


    Ask TOM home page


    On the home page, you can immediately start searching for answers to questions.
    Do not let the title fool you. This site is for database administrators as well
    as Oracle Developers. Always perform a search first, before asking any questions
    of your own. Chances are good that someone else has asked the question in the
    past.


    Even though the Ask TOM site has changed over the years, all of the old answers
    are still available. The site provides a rich history of questions and answers
    in amazing detail with lots of examples. Bookmark this website in your browser
    and use it often, especially when you are stuck with a problem in Oracle.


    In 2016, Tom Kyte retired from Oracle Corporation. Oracle did not want the Ask
    TOM resource to fade away, as it has become too valuable to the Oracle worldwide
    community. Upon Tom Kyte’s retirement, Oracle turned to other employees, namely
    Connor McDonald and Chris Saxon, to keep the site going. Soon after, they expanded
    it to include many employees, each with their own expertise. Ask TOM no longer
    refers to a specific individual, but is now rebranded as Ask TOM or Ask The Oracle
    Masters. Oracle Corporation still uses the same name, but changed the branding
    to reflect a team of experts rather than a specific individual. 


    If you are trying to obtain an answer to your Oracle-related question, and a search
    of the Ask TOM archives does not provide anything relevant, you can post your
    own question. Simply click the Questions tab and fill out the required information.


    ## Discussion Forums


    Discussion forums are a great way to interact with Oracle professionals from around
    the globe. These forums are where you can ask questions and discuss the issue
    back and forth until a resolution is obtained. Today’s discussion forums are typically
    accessed with a web browser. There are many discussion forums out there, but only
    a few see a good amount of traffic to make them worthwhile in my opinion.


    Oracle-L ( [`www.freelists.org/list/oracle-l`](http://www.freelists.org/list/oracle-l)
    ) has been around a very long time. This one is really a discussion list. Visit
    the URL above to subscribe to the list and you will receive each and every update
    by e-mail. If you choose to subscribe to Oracle-L, make sure you set up an e-mail
    rule and route the e-mails to a folder instead of clogging up your Inbox. The
    way you respond to threads of discussion is to respond to the e-mail you receive.
    Oracle-L was designed before discussion forums became web based. While the interaction
    with the discussion group is a bit archaic by today’s standards, this discussion
    list deserves mention simply because of the talent level of the individuals that
    still respond to questions there.


    The Oracle Groundbreakers forum ( [`https://community.oracle.com/community/technology_network_community`](https://community.oracle.com/community/technology_network_community)
    ) used to be known as the Oracle Technology Network (OTN) Community before they
    changed the name. Oracle Groundbreakers is a free to use discussion forum. All
    you need is an Oracle Single Sign-On account to obtain access. You may have created
    this account when you downloaded Oracle software earlier in this book to create
    our testbed.


    The My Oracle Support Community (MOSC) ( [`https://community.oracle.com/community/support/`](https://community.oracle.com/community/support/)
    ) is another web-based discussion forum. This site is integrated with Oracle Developer
    Community. If you access both of them, you use the same site essentially. This
    makes it easy because you do not have to bounce from one site to another. When
    you subscribe to discussion spaces in either site, the new content appears in
    one Inbox.


    If there are two sites and they are integrated, why have two sites at all? Oracle
    Groundbreakers is for everyone, open to the public. MOSC is for Oracle customers
    who have a paid Oracle Support contract, hence its name. You can even enter MOSC
    from within My Oracle Support by clicking the Community tab. When you create a
    service request in MOS, you do have the option of starting a discussion in MOSC
    instead by clicking the button to ask a question in the Community, as you can
    see in Figure [16-2](#467924_1_En_16_Chapter.xhtml#Fig2).


    ![../images/467924_1_En_16_Chapter/467924_1_En_16_Fig2_HTML.jpg](images/467924_1_En_16_Chapter/467924_1_En_16_Fig2_HTML.jpg)


    Figure 16-2


    MOS Ask in Community button


    The main differentiator between the two sites is that Oracle Support employees
    will often participate and provide answers in MOSC. Thankfully, you do not have
    to choose between the two sites because they are integrated and work nicely together.


    No matter which discussion forum you use, there are a few rules to follow. Failure
    to adhere to these rules will result in the numerous forum trolls who like to
    flame new victims. It is unfortunate, but there are too many people in any discussion
    forum that are rude and condescending. The best way around their poor attitudes
    is to participate under some well-known guidelines:


    *   The subject line should contain a brief description of the problem, not state
    the entire problem.


    *   Post your Oracle version. Your version is not “12c” but rather something like
    12.1.0.2 or 12.2\. Too many answers are version-specific. Knowing your version
    gets you the correct answer to your question. Failure to include your version
    will get terse responses like “Which version?” or flames from the forum trolls.'
  trans: '

    ## 询问 TOM


    几乎每位 Oracle 专业人士都曾在某个时候使用过 Oracle 的 Ask TOM 网站。许多年前，Oracle 公司聘请了一位名叫 Tom Kyte
    的顾问。除了被派往客户现场解决 Oracle 问题外，Tom Kyte 还建立了一个网站，你可以向他提问，Ask TOM 由此诞生。你可以访问该站点：`https://asktom.oracle.com`。该网页已随时间演变，现在看起来如图
    16-1 所示。


    ![../images/467924_1_En_16_Chapter/467924_1_En_16_Fig1_HTML.png](img/467924_1_En_16_Fig1_HTML.png)


    图 16-1 Ask TOM 主页


    在主页上，你可以立即开始搜索问题的答案。不要被标题迷惑。这个站点既适用于数据库管理员，也适用于 Oracle 开发人员。在提出任何问题之前，请务必先进行搜索。很可能在过去已经有人问过同样的问题。


    尽管 Ask TOM 站点多年来发生了变化，但所有旧的答案仍然可用。该站点提供了丰富、详细且包含大量示例的问答历史记录。请将此网站加入浏览器书签并经常使用，尤其是在你遇到
    Oracle 问题卡住时。


    2016 年，Tom Kyte 从 Oracle 公司退休。Oracle 不希望 Ask TOM 这一资源消失，因为它对全球 Oracle 社区来说已变得非常宝贵。在
    Tom Kyte 退休之际，Oracle 转向了其他员工，即 Connor McDonald 和 Chris Saxon，来维持该站点的运行。不久之后，他们扩展了站点，纳入了许多各自领域专长的员工。`Ask
    TOM` 不再指代特定个人，而是被重新命名为 `Ask TOM` 或 Ask The Oracle Masters。Oracle 公司仍使用相同的名称，但更改了品牌以反映这是一个专家团队，而非特定个人。


    如果你试图获取与 Oracle 相关问题的答案，并且搜索 `Ask TOM` 档案库没有找到任何相关内容，你可以发布自己的问题。只需点击“Questions”选项卡并填写所需信息即可。


    ## 讨论论坛


    讨论论坛是与全球 Oracle 专业人士互动的好方法。在这些论坛中，你可以提出问题并就问题来回讨论，直到找到解决方案。如今的讨论论坛通常通过网络浏览器访问。市面上有很多讨论论坛，但在我看来，只有少数几个拥有可观的流量，值得关注。


    `Oracle-L` (`www.freelists.org/list/oracle-l`) 已经存在了很长时间。这实际上是一个讨论列表。访问上面的 URL
    订阅该列表，你将通过电子邮件收到每一条更新。如果你选择订阅 `Oracle-L`，请务必设置电子邮件规则，将这些邮件路由到一个文件夹，而不是堵塞你的收件箱。你回复讨论串的方式是回复你收到的电子邮件。`Oracle-L`
    设计于讨论论坛实现网络化之前。虽然按照今天的标准，与讨论组的交互方式有点过时，但这个讨论列表值得一提，仅仅是因为在那里回答问题的人才水平很高。


    `Oracle Groundbreakers` 论坛 (`https://community.oracle.com/community/technology_network_community`)
    在更名之前曾被称为 Oracle Technology Network (OTN) 社区。`Oracle Groundbreakers` 是一个免费使用的讨论论坛。你只需要一个
    Oracle 单点登录账户即可访问。你可能在本书前面下载 Oracle 软件以创建测试平台时创建过这个账户。


    `My Oracle Support Community (MOSC)` (`https://community.oracle.com/community/support/`)
    是另一个基于网络的讨论论坛。该站点与 Oracle Developer Community 集成。如果你访问这两者，本质上你使用的是同一个站点。这很方便，因为不必从一个站点跳转到另一个站点。当你订阅任一站点中的讨论空间时，新内容会出现在同一个收件箱中。


    如果有两个站点并且它们是集成的，那为什么还要有两个站点呢？`Oracle Groundbreakers` 面向所有人，对公众开放。`MOSC` 则面向拥有付费
    Oracle 支持合同的 Oracle 客户，因此得名。你甚至可以从 My Oracle Support 内部通过点击 Community 选项卡进入 `MOSC`。当你在
    `MOS` 中创建服务请求时，你可以选择通过点击 Community 中的提问按钮来在 `MOSC` 中发起讨论，如图 16-2 所示。


    ![../images/467924_1_En_16_Chapter/467924_1_En_16_Fig2_HTML.jpg](img/467924_1_En_16_Fig2_HTML.jpg)


    图 16-2 MOS “在社区中提问”按钮


    这两个网站的主要区别在于，Oracle 支持员工经常会在 `MOSC` 中参与并提供答案。值得庆幸的是，你不必在两者之间做选择，因为它们是集成的并且协同工作得很好。


    无论你使用哪个讨论论坛，都需要遵循一些规则。不遵守这些规则将导致众多喜欢攻击新受害者的论坛喷子出现。不幸的是，任何讨论论坛中都有太多粗鲁和居高临下的人。避开他们恶劣态度的最好方式是遵循一些众所周知的准则参与讨论：


    *   主题行应包含问题的简要描述，而不是陈述整个问题。

    *   发布你的 Oracle 版本。你的版本不是“12c”，而是类似 12.1.0.2 或 12.2 这样的具体版本。很多答案是特定于版本的。了解你的版本能让你获得针对问题的正确答案。未能包含你的版本信息，可能会得到诸如“哪个版本？”这样的简短回复，或者来自论坛喷子的攻击。

    '
- fmt: '- Do not post RTFM questions. Thanks to Chapter [13](#467924_1_En_13_Chapter.xhtml)
    of this book, you now know how to use the Oracle documentation. If you can Read
    The Fine Manual, you can answer these questions yourself. Do not waste the valuable
    time of volunteers by posting questions that you could have looked up yourself.

    - Do not post questions you could easily search for. Earlier in this chapter,
    we discussed how to use search engines to find answers. If you can easily find
    the answer by a simple web search, it should not be posted to discussion forums.
    People will often reply “LMGTFY,” which is short for Let Me Google That For You.
    Their reply will then be followed by a link to [`http://lmgtfy.com`](http://lmgtfy.com)
    showing Google search results.

    - If possible, post sample code showing your work and also include what is not
    working. For example, if you are working on a SQL statement, post code to create
    a sample table and populate it with sample data. Then post the SQL statement that
    does not work and do your best to explain how it should work. With all of this
    information, the responder can create the table in their database and try the
    same SQL statement to figure out how to resolve the issue.

    - Post entire error messages. If you say you are receiving an ORA-00942 error
    and provide nothing else, you are not likely to obtain a good answer. Post the
    SQL statement that received the error and then copy and paste the entire error
    stack into your initial post.

    - Never ask for immediate help or say that your request is urgent. The people
    who answer questions are not paid for their work. They are volunteers and they
    have their own jobs to do. They will answer your questions when they have time.
    If you want an immediate resolution, file a service request with My Oracle Support.


    As you interact with these discussion forums, start participating as a respondent
    to questions. All too often, I see people who only ask questions and never share
    their knowledge. The discussion forums are better when we have more people looking
    at the problem. In the beginning stages of your career, you may not have the skill
    set needed to answer a lot of different questions, which is to be expected. Try
    to answer a few questions anyway. As I stated in the section discussing blogging,
    something magical happens when you try to explain something in written form: you
    actually learn more yourself. The same thing holds true in discussion forums.
    The more questions you answer, the better you will understand how Oracle works.
    In the beginning, try to answer one question a day. Make it an easy question if
    you can find one. Then start working your way up.


    Another reason for answering questions and becoming a major participant in the
    discussion forums is that you will learn the Oracle documentation very well. I
    can typically look up anything I need in the Oracle documentation with a few clicks
    of the mouse because I know exactly where to look. It wasn’t until I started answering
    questions that I became better at knowing how to use the documentation. When I
    answer a question, I try to include a link to the relevant portion of the documentation
    if I can. That way, the reader can find more information. It does take extra time
    to find that link, but I save time from typing lots of extra information that
    the reader can see in the documentation. The documentation also serves as a way
    of proving what I am saying is true in case there is a doubt.


    The last reason I answer questions on the discussion forums is because I learn
    so much every day. People will post some of the oddest problems that I would have
    never seen in my regular job. Additionally, someone will respond to a question
    with something I did not know before. No matter how much I know about the Oracle
    product, I will never know everything. Everyone can teach me something. Just reading
    different discussion threads often teaches me a great deal. On many occasions
    during my career I have come across a problem that I had been exposed to at a
    previous time in some discussion forum. I already have an introduction to this
    problem. All I need to do is find the forum thread that discussed the problem
    and I easily have a solution.


    If you do answer questions in discussion forums, prepare to be wrong. It takes
    a while to learn how to answer questions properly. Too many people will jump on
    you for being wrong, sometimes very rudely. Ignore the negativity and figure out
    where you went wrong and how you can respond better the next time. Do not let
    the negativity deter you from answering future questions. Like anything, the more
    you do it, the better you will be at it. Answering questions is the same.


    ## YouTube


    More and more, I see Oracle professionals posting videos on YouTube. I started
    with sharing information via blogging and discussion forums, in written form.
    For me, trying to share Oracle concepts in video form was a foreign concept. I
    have put out a few videos in a YouTube channel, but it’s just not for me. It’s
    not something I do well. Thankfully, there are some Oracle professionals that
    do it very well and have posted great videos on YouTube. You may enjoy creating
    some videos of your own to share your knowledge.


    Most of the Oracle-related content on YouTube are how-to videos. Because the video
    is prerecorded, it is difficult for the platform to serve the same role as a discussion
    forum. For examples, search for “Oracle SQL Developer” on YouTube and you will
    find many videos showing how to use specific features of the product.


    When you find a person that publishes content to your liking, subscribe to their
    YouTube channel. This way you will be notified when they publish something new.'
