    After you click the Next button, the DBUA will then take a few minutes to gather
    information about the database to be upgraded. After the DBUA has completed that
    task, it will perform some prerequisite checks. Figure [18-5](#467924_1_En_18_Chapter.xhtml#Fig5)
    shows the results of those checks.


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig5_HTML.jpg](images/467924_1_En_18_Chapter/467924_1_En_18_Fig5_HTML.jpg)


    Figure 18-5


    DBUA Prerequisite Checks screen


    If we did a good job remediating any findings from the Pre-Upgrade Information
    Tool, the prerequisite checks should pass without any additional findings. In
    Figure [18-5](#467924_1_En_18_Chapter.xhtml#Fig5), the only information is some
    post-upgrade recommendations that we already know and will handle at the end.


    After clicking Next, we are asked to provide some upgrade options, as shown in
    Figure [18-6](#467924_1_En_18_Chapter.xhtml#Fig6).


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig6_HTML.jpg](images/467924_1_En_18_Chapter/467924_1_En_18_Fig6_HTML.jpg)


    Figure 18-6


    DBUA upgrade options


    The first three options in Figure [18-6](#467924_1_En_18_Chapter.xhtml#Fig6) were
    selected by default and we normally leave those options as they are. The first
    one lets the upgrade process run faster by performing many tasks in parallel.
    If you are running multiple databases on this server, you may want to uncheck
    this box so that the parallel operations do not negatively impact other database
    performance. The second option will run a script to recompile any objects that
    became invalid during the upgrade. There is no good reason to uncheck this box.
    The third option upgrades the timezone data. Again, there is little reason to
    avoid doing so.


    The fourth option instructs the DBUA to change user tablespaces to Read Only.
    This option is used to facilitate fast fallback during a failure in the upgrade,
    but Oracle recommends that you use a guaranteed restore point if that is a concern
    for you.


    The last part of DBUA Step 3 lets you execute custom scripts before and after
    the upgrade. You could point the After Upgrade part to that fixup script generated
    by the Pre-Upgrade Installation Tool if you desire.


    In Step 4, shown in Figure [18-7](#467924_1_En_18_Chapter.xhtml#Fig7), the DBUA
    asks us how we want to handle restoring the database should a failure occur in
    the upgrade process.


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig7_HTML.jpg](images/467924_1_En_18_Chapter/467924_1_En_18_Fig7_HTML.jpg)


    Figure 18-7


    DBUA restore options


    If you choose the option to use Flashback and a guaranteed restore point or you
    choose the option to use an RMAN backup, and an error occurs during the upgrade
    process, the DBUA will automatically use the option you selected to get you back
    to the place you started. If you choose the last option to use your own backup
    and restore strategy, the DBUA will not be able to recover for you. You will have
    to perform the recovery on your own.


    As stated earlier, Oracle’s recommendation is to use a guaranteed restore point.
    This is the fastest way to get you back to the pre-upgrade state, but you must
    have a Flashback Recovery Area already defined. Another great option is an RMAN
    backup.


    Remember that I said you need to perform a backup before you begin the upgrade
    process? Step 4 of the DBUA is where you define that strategy. If you choose the
    last option, your backup should take place right before you start the DBUA.


    Since this is a testbed, I am going to choose to use my own backup and restore
    strategy and click Next to move on to the next screen of the DBUA, as shown in
    Figure [18-8](#467924_1_En_18_Chapter.xhtml#Fig8). Step 5 of the DBUA asks us
    to create a new Listener.


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig8_HTML.jpg](images/467924_1_En_18_Chapter/467924_1_En_18_Fig8_HTML.jpg)


    Figure 18-8


    DBUA Listener Selection


    The DBUA does not see the current Listener because it is running out of an old
    Oracle home directory. It does give us the option to create a new Listener, but
    we do not want two running on the server. After the upgrade is complete, I will
    show you how easy it is to move the Listener to the new home. Accept the defaults
    on this step and click the Next button.


    In Step 6, the DBUA asks us to define management options, meaning do we want to
    manage this database with Oracle Enterprise Manager (EM) Database Express or EM
    Cloud Control. By default, EM Database Express is chosen. I have deselected that
    option in Figure [18-9](#467924_1_En_18_Chapter.xhtml#Fig9).


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig9_HTML.jpg](images/467924_1_En_18_Chapter/467924_1_En_18_Fig9_HTML.jpg)


    Figure 18-9


    DBUA management options


    If I use Cloud Control, I can easily add this database at a later date. I can
    use the Database Configuration Assistant (DBCA) to add Database Express in the
    future, should I desire. For now, we will go without any Enterprise Manager. If
    you want to play around with EM, select the Database Express option. At the end
    of the upgrade, DBUA will give you information on how to use it.


    When we click the Next button, we are taken to the database summary of our selected
    options, as shown in Figure [18-10](#467924_1_En_18_Chapter.xhtml#Fig10).


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig10_HTML.jpg](images/467924_1_En_18_Chapter/467924_1_En_18_Fig10_HTML.jpg)


    Figure 18-10


    DBUA summary


    This screen is our last chance to verify everything is correct before proceeding.
    Up until now, the DBUA has not made any changes nor attempted to upgrade the database.
    When you click the Finish button, the upgrade will start. It is at this time that
    the database will be unavailable. You can get to this point in advance of your
    downtime window and save yourself some time when the upgrade is scheduled to begin.


    It is now time to let the DBUA do all of the hard work for us. Click the Finish
    button and sit back and watch it work. We can see an example of the Progress screen
    in Figure [18-11](#467924_1_En_18_Chapter.xhtml#Fig11).


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig11_HTML.jpg](images/467924_1_En_18_Chapter/467924_1_En_18_Fig11_HTML.jpg)


    Figure 18-11


    DBUA Progress screen


    While the DBUA is upgrading the database, it will continue to display the Progress
    screen so that you can keep track of where it is. After some period of time, the
    upgrade will complete and the DBUA will display a final page of results similar
    to Figure [18-12](#467924_1_En_18_Chapter.xhtml#Fig12).'
