    ## 交互式快速参考


    与其依赖我绘制的 Oracle 架构图，你不如在*数据库概念*指南中寻找一些优质的可视化图示。此外，Oracle 公司提供了一个交互式网页，让你可以探索 Oracle
    架构。你可以通过以下 URL 访问此网页：

    ```

    www.oracle.com/webfolder/technetwork/tutorials/obe/db/12c/r1/poster/OUTPUT_poster/poster.html

    ```


    进入该网页后，点击**数据库架构**选项卡。这将带你到一个复杂的图示（在图 20-4 中复制显示），展示了架构的每一个组成部分。


    ![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig4_HTML.jpg](img/467924_1_En_20_Fig4_HTML.jpg)


    图 20-4 交互式快速参考 数据库架构选项卡


    我们可以看到所有的进程和内存结构，并能跟踪活动流经此架构的过程。其内容远比本章所写的要多得多。此处未讨论的进程和内存结构不如提及的那些重要，但随着你深入探索
    Oracle 的工作原理，它们可能对你很重要。


    要与图示交互，请双击它。图像将被放大，你可以使用鼠标将其移动到感兴趣的区域。如果你想了解更多关于图中某个项目的信息，请点击它。在图 20-5 中，我点击了**检查点进程**。


    ![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig5_HTML.jpg](img/467924_1_En_20_Fig5_HTML.jpg)


    图 20-5 交互式快速参考 CKPT 详细信息


    右侧窗格列出了我点击的`CKPT`进程的相关信息。这些详细信息的底部是链接，指向 Oracle 文档中更详细讨论该项目的部分。


    如果你点击**后台进程**选项卡，你可以获取所有后台进程的信息。进程非常多，这个网站按各种类别对它们进行了分类。在图 20-6 中，我点击了**通用**类别。


    ![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig6_HTML.jpg](img/467924_1_En_20_Fig6_HTML.jpg)


    图 20-6 交互式快速参考 后台进程选项卡


    回想一下，在第 14 章我们讨论了数据字典。这个交互式工具也提供了关于数据字典视图的文档。点击**DBA 视图**、**性能视图**或**架构视图**选项卡。在图
    20-7 中，**DBA 视图**选项卡上选择了**存储**类别。通过跟随图中的连线，我们可以看到视图之间是如何关联的。如果你知道视图名称的一部分，可以使用搜索框更容易地找到它。


    ![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig7_HTML.jpg](img/467924_1_En_20_Fig7_HTML.jpg)


    图 20-7 交互式快速参考 DBA 视图选项卡


    点击一个视图将显示其描述。如果我们点击`DBA_TABLESPACES`视图，我们可以看到其所有的列，类似于图 20-8 所示。


