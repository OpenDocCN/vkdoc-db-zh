  trans: '

    ## CSI


    虽然访问 MOS 是免费的，但如果贵公司没有处于有效状态的 Oracle 支持合同，您在那里能做的事情将非常有限。当首次为公司的 Oracle 产品购买支持合同时，Oracle
    会提供一个客户服务标识号。只要维护合同每年续签，您就可以继续使用该 CSI 号码。如果贵公司在不同时间购买了 Oracle 产品，您可能会拥有多个 CSI
    号码。


    第一个输入有效 CSI 号码的 MOS 账户将成为 CSI 管理员。如果贵公司已经有其他人担任 CSI 管理员，当您将该 CSI 输入到您的 MOS 账户时，管理员需要批准您使用该
    CSI 号码。


    如果贵公司的 CSI 号码已经输入到 MOS 中，请向您的数据库管理团队询问您应使用哪些 CSI 值。然后登录 My Oracle Support 并点击
    `设置` 标签页。如图 15-3 左侧所示，点击 `我的账户` 链接。


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig3_HTML.jpg](img/467924_1_En_15_Fig3_HTML.jpg)

    图 15-3


    支持标识符


    在“支持标识符”部分，您应该能看到与您的 MOS 账户关联的 CSI 号码。点击 `请求访问` 按钮。您将被转到如图 15-4 所示的屏幕，以将该 CSI
    添加到您的账户。


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig4_HTML.jpg](img/467924_1_En_15_Fig4_HTML.jpg)

    图 15-4


    添加新 CSI


    输入您需要访问的 CSI 值。系统将自动向您组织中的 CSI 管理员发送一封电子邮件。


    CSI 管理员需要前往 MOS 中相同的 `设置` 标签页，并点击 `待处理的用户请求` 链接以批准您的访问。一旦获得批准，您就可以将此 CSI 值用于您的需求。


    ## 仪表板


    首次登录 My Oracle Support 时，您将进入如图 15-5 所示的 `仪表板` 标签页。如果您想返回仪表板，只需点击页面顶部的其标签页即可。


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig5_HTML.jpg](img/467924_1_En_15_Fig5_HTML.jpg)

    图 15-5


    MOS 仪表板


    `仪表板` 标签页是一个很好的起点。它包含最新消息、知识库快速搜索、未解决服务请求摘要以及入门指南等部分。


    大多数人使用仪表板的默认设置，但您也可以根据需要对其进行定制。在页面的右上角，点击 `自定义页面` 链接。在那里，如果您不想看到某些仪表板面板，可以将其移除。您可以点击
    `添加内容` 按钮来添加错误追踪器、补丁搜索等面板。


    ## 教程视频


    在仪表板的“入门指南”部分，有一个标题为“学习 My Oracle Support：操作系列”的链接。我强烈建议您点击该链接，花些时间观看一些关于如何使用
    MOS 的视频。这些视频将补充您在本章中阅读的内容。如果您点击该链接，您将看到一个类似于图 15-6 的页面。点击“播放视频”下的任意按钮以了解更多信息。


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig6_HTML.jpg](img/467924_1_En_15_Fig6_HTML.jpg)

    图 15-6


    MOS 培训视频


    图 15-6 显示了 `MOS 新手` 标签页，它为 My Oracle Support 的新用户提供视频。这里有许多短视频，描述了大部分功能。欢迎点击其他标签页，探索有哪些视频等着您。


    ## 知识库


    当我访问 My Oracle Support 时，知识库是我花费时间最多的地方。如果您遇到问题，而 Oracle 文档或数据字典都无法帮助您解决问题，那么
    MOS 知识库通常是您下一个应该查找的地方。


    搜索知识库非常容易。它非常类似于使用 Google 或其他搜索引擎进行网络搜索。只需输入您的搜索文本并点击放大镜图标即可开始搜索。您可以在仪表板的“知识库”部分的框中输入搜索文本，也可以点击
    `知识库` 标签页。每个页面的顶部都有一个类似于图 15-7 的搜索框。


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig7_HTML.jpg](img/467924_1_En_15_Fig7_HTML.jpg)

    图 15-7


    MOS 搜索框


    我通常使用页面顶部的搜索框，因为我知道无论我在 MOS 中的哪个位置，它总是在那里。搜索框左侧的下拉菜单会显示您最近的搜索词历史。


    与进行任何网络搜索一样，您的术语越具体，获得相关命中结果的机会就越大。如果您只搜索“Oracle”，您将得到大量结果，其中许多可能对您的问题没有帮助。将您的确切错误消息复制并粘贴到搜索框中通常很有帮助。


    图 15-8 显示了使用错误消息进行的一次搜索结果。搜索文本仍在框中。


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig8_HTML.jpg](img/467924_1_En_15_Fig8_HTML.jpg)

    图 15-8


    知识库搜索结果


    MOS 会将搜索命中结果分解为不同的部分。在图 15-8 的示例中，这些部分是“推荐链接”、“知识库搜索结果”和“社区搜索结果”。点击蓝色三角形可展开每个部分。在图
    15-8 的顶部，您会在 `知识库` 和 `社区` 旁边看到一个绿色复选标记。您可以点击该绿色复选标记将其关闭，并从结果中移除来自这些区域的命中结果。再次点击复选标记可显示结果中的命中项。


    如果我在图 15-8 中点击 `知识库搜索结果` 旁边的蓝色三角形，然后点击第一个命中项，我将被带到如图 15-9 所示的 My Oracle Support
    注释页面。MOS 中的每个文档都称为一个注释，并且都有一个 ID 号。在图 15-9 的示例中，我正在查看 MOS 注释 `1475147.1`。在 Oracle
    支持的早期，注释是通过其文档 ID 或简称 Doc ID 来引用的。您可能仍然会看到人们引用 Doc ID 而不是 Note。即使在图 15-9 中的文章也写着“Doc
    ID”。如今的 Oracle DBA 会将 Doc ID 和 Note 互换使用。


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig9_HTML.jpg](img/467924_1_En_15_Fig9_HTML.jpg)

    图 15-9


    MOS 文档


    在 My Oracle Support 之外披露 MOS 注释的内容是违反您的支持协议的。您会在图 15-9 中注意到，我只包含了标题，而没有包含文档的实际内容。另请注意页面顶部的“Oracle
    机密”字样。

    '
- fmt: "## 显示文档与书签功能\n\n当你从搜索结果显示文档时，有两点需要注意。首先，左侧列出了符合你搜索条件的文档列表。你可以利用它轻松跳转到下一个感兴趣的文档，而不必在搜索结果和文档之间来回切换。当然，你也可以选择返回搜索结果。其次，注意文档标题左侧的空心金色星标。点击该星标即可为文档添加书签，如图[15-10](#467924_1_En_15_Chapter.xhtml#Fig10)所示。\n\
    \n![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig10_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig10_HTML.jpg)\n\
    \n图 15-10  \nMOS 书签功能\n\n你会看到文档标题旁的金色星标现在变成了实心，表示已添加书签。那么在哪里访问你的书签呢？请看屏幕顶部搜索框的左侧。你应该能看到一个金色星标的下拉菜单。点击该金色星标，然后选择`Documents`即可查看你已收藏的书签。随着书签越来越多，你可能希望按主题进行组织。在同一个下拉菜单中，你可以选择`Manage\
    \ Favorites`来创建文件夹以便更好地管理。\n\n## 知识库使用建议\n\n正如我之前所说，在使用 MOS 时，我花费大量时间在知识库中。如果我无法解决问题，通常其他人也遇到过相同情况，并且\
    \ Oracle Support 已将其记录下来供你查阅。这为每个人都节省了大量时间。如果你能阅读 MOS Note 并自行解决问题，Oracle Support\
    \ 就无需花费时间与你一对一沟通，而你也不必等待 Oracle Support 来处理。如果你还记得第[13](#467924_1_En_13_Chapter.xhtml)章关于\
    \ Oracle 文档的内容，我提到过，当你寻求帮助时，最好表明你已提前做了一些工作。就像我们不应该问“RTFM”（请阅读手册）问题一样，我们也不应该提出那些通过简单\
    \ MOS 搜索就能找到答案的简单问题。请做好你自己的功课，为包括你自己在内的每个人节省时间。\n\n像任何类型的搜索一样，你在 MOS 中搜索得越多，就会越熟练。你的搜索越具体，结果就越好。不要搜索“ORA-700”；相反，如果你的错误信息显示的是“ORA-700\
    \ [kesqsMakeSql-invstat:elpsTime]”，就应该搜索这个完整信息。那些括号内的文本具有很高的唯一性，能非常迅速地缩小结果范围。\n\
    \n## 服务请求\n\n假设你遇到了一个无法解决的问题。Oracle 文档中没有任何帮助。你在 MOS Notes 中搜索了一个小时，没有一个真正解决你的问题或回答你的疑问。下一步通常是执行谷歌搜索。如果那也不成功，你该向谁求助？通常，最后的选择是向\
    \ Oracle Support 提交一个服务请求。在 MOS 中，点击`Service Requests`选项卡。你的屏幕应如图[15-11](#467924_1_En_15_Chapter.xhtml#Fig11)所示。\n\
    \n![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig11_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig11_HTML.jpg)\n\
    \n图 15-11  \nMOS 服务请求选项卡\n\n在服务请求选项卡中，你可以看到未解决的 SR 列表。你也可以点击`Create SR`按钮。当你创建一个新的服务请求时，系统会要求你提供一系列信息，以便将请求分配给正确的支持分析师。也许最重要的是确定你请求的严重级别，如图[15-12](#467924_1_En_15_Chapter.xhtml#Fig12)所示。\n\
    \n![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig12_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig12_HTML.jpg)\n\
    \n图 15-12  \nSR 严重级别选项\n\n如果这是一个生产系统，并且你完全丧失了服务，请选择严重级别为`1`。被归类为`Sev 1`的服务请求会立即获得\
    \ Oracle Support 的关注。如果你有`Sev 1`请求，请确保在 Oracle 回复你时能够及时响应。你的服务请求中很少有属于`Sev 1`或`Sev\
    \ 2`类别的。大多数问题的严重级别较低。\n\n选择严重级别后，你需要描述问题。如果你有确切的错误信息，请包含它们，这将有助于初步诊断。在图[15-13](#467924_1_En_15_Chapter.xhtml#Fig13)中，我正在为生产环境中一个特定的`ORA-600`错误提交服务请求。\n\
    \n![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig13_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig13_HTML.jpg)\n\
    \n图 15-13  \nSR 问题摘要\n\n接下来，你需要提供一些关于问题所在位置的详细信息。在`Product`框中，开始键入产品名称。弹出菜单会显示与你键入内容匹配的产品。在图[15-14](#467924_1_En_15_Chapter.xhtml#Fig14)中，我键入了“database”，并能够选择`Oracle\
    \ Database Enterprise Edition`产品。\n\n![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig14_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig14_HTML.jpg)\n\
    \n图 15-14  \nSR 问题区域\n\n选择产品后，你可以在`Product Version`字段中选择该产品的特定版本。务必包含版本号，因为某些问题可能特定于某个版本。在图[15-14](#467924_1_En_15_Chapter.xhtml#Fig14)中，我选择了版本`12.1.0.2`。然后，我从`Operating\
    \ System/Version`下拉列表中选择了`Oracle Linux 7`。\n\n填写这部分最困难的部分是从`Problem Type`下拉菜单中选择正确的问题类型。问题类型是决定哪位\
    \ Oracle 分析师接收你问题的标准之一。如果选择错误，服务请求的处理时间可能会更长，因为接收问题的分析师需要确定将请求转交给谁。在选择之前，请仔细阅读所有问题类型。最后，在`Support\
    \ Identifier`字段中输入你的`CSI`号码。如果你将光标放在该框中，弹出菜单会显示你可以访问的所有`CSI`号码。"
  raw: 'There are two things to point out once you display a document from your search
    results. First, on the left side is a list of the documents found matching your
    search criteria. You can use this to easily get to the next document of interest
    rather than having to bounce back and forth from search results to document and
    over again. You do have the option of going back to the search results should
    you choose. Second, notice the hollow gold star to the left of the document title.
    Clicking that star will bookmark the document for you, as shown in Figure [15-10](#467924_1_En_15_Chapter.xhtml#Fig10).


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig10_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig10_HTML.jpg)


    Figure 15-10


    MOS bookmark


    You can see the gold star next to the document title is now filled in, meaning
    it has been bookmarked. So where do you access your bookmarks? Look to the left
    of the search box at the top of the screen. You should see a gold star drop-down
    menu. Click that gold star and then select Documents to see what you have bookmarked.
    As you collect more and more bookmarks, you may want to organize them by topic.
    In that same drop-down menu, you can select Manage Favorites to create folders
    for better organization.


    As I stated earlier, the knowledge base is where I spend a lot of my time when
    I am using MOS. If I cannot solve a problem, typically others have had the same
    issue and Oracle Support has documented it for your consumption. This saves everyone
    a great deal of time. Oracle Support does not have to spend time working with
    you one on one if you can read the MOS Note and solve the issue yourself, and
    you do not have to wait for Oracle Support to get around to helping you. If you
    remember from Chapter [13](#467924_1_En_13_Chapter.xhtml), covering the Oracle
    documentation, I indicated that when you are asking for help, it is better to
    show that you have done some work in advance. Just like we should not be asking
    RTFM questions, we should not be asking simple questions that can be found with
    an easy MOS search. Do your own legwork and save everyone, including yourself,
    some time.


    Like any type of searching, the more you search MOS, the better you will get.
    The more specific you are, the better your results will be. Do not search for
    “ORA-700”; instead, search for “ORA-700 [kesqsMakeSql-invstat:elpsTime]” if that
    is what your error message states. The text in those brackets is pretty unique
    and will narrow down the results rather quickly.


    ## Service Requests


    Suppose that you have an issue that you cannot solve. Nothing in the Oracle documentation
    helps. You’ve been searching MOS Notes for an hour and none of them really solves
    your issue or answers your questions. The next step is often to perform a Google
    search. If that proves unsuccessful, where do you turn? Often, the option of last
    resort is to file a service request (SR) with Oracle Support. In MOS, click the
    Service Requests tab. Your screen should look like Figure [15-11](#467924_1_En_15_Chapter.xhtml#Fig11).


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig11_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig11_HTML.jpg)


    Figure 15-11


    MOS Service Requests tab


    In the Service Requests tab, you can see a list of your open SRs. You can also
    click the Create SR button. When you create a new service request, you will be
    asked for a bunch of information that will help get the request assigned to the
    correct support analyst. Perhaps most important is identifying the severity of
    your request, as shown in Figure [15-12](#467924_1_En_15_Chapter.xhtml#Fig12).


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig12_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig12_HTML.jpg)


    Figure 15-12


    SR severity options


    If this is a production system and you have a complete loss of service, choose
    a Severity (Sev) of 1. Service requests classified as Sev 1 get the immediate
    attention of Oracle Support. If you have a Sev 1 request, expect to be available
    when Oracle responds to you. Very few of your service requests will be in the
    Sev 1 or Sev 2 category. Most of your issues will have a lower severity rating.


    After selecting the severity, you will need to describe the problem. If you have
    exact error messages, include them, as it will help in the initial diagnosis.
    In Figure [15-13](#467924_1_En_15_Chapter.xhtml#Fig13), I am entering in a service
    request for a specific ORA-600 error in production.


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig13_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig13_HTML.jpg)


    Figure 15-13


    SR problem summary


    Next, you need to include some details about where the problem lies. In the Product
    box, start typing the product name. A pop-up menu will show you which products
    match what you are typing. In Figure [15-14](#467924_1_En_15_Chapter.xhtml#Fig14),
    I typed “database” and was able to choose the Oracle Database Enterprise Edition
    product.


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig14_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig14_HTML.jpg)


    Figure 15-14


    SR problem area


    After you choose the product, you can then select a specific version of the product
    in the Product Version field. Always include the version number, as some issues
    could be version-specific. In Figure [15-14](#467924_1_En_15_Chapter.xhtml#Fig14),
    I chose version 12.1.0.2\. I then chose Oracle Linux 7 from the Operating System/Version
    drop-down list.


    The hardest part about filling out this section is selecting the correct type
    of problem from the Problem Type drop-down menu. The problem type is one of the
    criteria in determining which Oracle analyst will receive your problem. If you
    choose incorrectly, expect the service request to take longer, as the analyst
    that receives the issue will need to determine where to route the request. Read
    through all problem types before selecting. Lastly, enter in your CSI number in
    the Support Identifier field. If you put the cursor in that box, a pop-up menu
    will show you all of the CSI numbers you have access to.'
