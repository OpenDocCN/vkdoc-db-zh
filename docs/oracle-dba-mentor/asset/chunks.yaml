    ## JDBC


    ODBC 自 20 世纪 90 年代初就已存在。在其推出后不久，Sun Microsystems 开发了 Java 编程语言，秉持其“一次编写，到处运行”的理念。


    为方便 Java 程序连接数据库，Sun Microsystems 于 1997 年发布了 Java 数据库连接（`JDBC`）代码。`JDBC` 与 `ODBC`
    非常相似，但它是 Java 专用的，而 `ODBC` 可被多种编程语言使用。


    `JDBC` 驱动程序有两种类型：`thin`（瘦）和 `thick`（厚）。`Thin` `JDBC` 驱动非常方便，因为你无需安装任何东西。只需将 Java
    归档文件（`.jar`）放置在 Java 程序可以访问的系统位置即可。无需安装其他任何内容。`thick` 驱动则要求你安装完整的 Oracle 客户端软件。实际上，`JDBC`
    驱动有四种类型，但类型 1 和类型 2 被称为 `thick` 驱动。


    经验法则是，尽可能使用 `thin` 驱动，因为部署要容易得多。否则，就使用 `thick` 驱动。如果你运行的是第三方应用程序，供应商会告诉你使用哪种 `JDBC`
    驱动。就像 `ODBC` 驱动一样，尽可能使用数据库供应商提供的驱动。如果应用程序连接的是 Oracle 数据库，那就使用 Oracle 的 `JDBC`
    驱动。


    清单 9-17 中的示例展示了使用 `thin` `JDBC` 驱动定义到 Oracle 数据库的 `JDBC` 连接的 Java 代码。


    ```java

    String url = "jdbc:oracle:thin:username/password@//myhost:1521/orcl";

    ```

    清单 9-17

    瘦 JDBC 驱动示例


    ## 继续前行


    本章讨论了连接到 Oracle 数据库的各种方法。你必须能够建立这样的连接，才能访问其中包含的任何数据。我们讨论了监听器的作用以及四个关键信息：协议、主机名、端口和服务名。连接错误通常由这些信息之一指定不正确引起。其他常见的连接错误可能是由于监听器或
    Oracle 实例未运行，或者端口被阻止造成的。


    本书中的大多数示例将继续在数据库服务器本地使用 `SQL*Plus`。在未来的章节中，我们将介绍其他工具来与你的 Oracle 数据库进行交互。


    我们用了九章才走到这里，但现在我们的测试平台已经建立并运行，并且我们知道如何连接到那里的 Oracle 实例。在下一章中，我们将讨论测试用例和测试平台。我们将探讨实验的力量以及如何从失败中学习。我们需要一个地方来实验和学习更多关于
    Oracle 的知识。我们终于准备好将注意力转向那个领域了。


    # 10. 测试用例


    既然我们已在虚拟机中建立了一个可运行的数据库，是时候开始动手尝试了。前九章让我们走到了这一步，使我们能够触及本书的真正目的——学习更多关于 Oracle 数据库的知识。


    本章致力于测试用例和测试平台。在本章中，我们将探讨为什么需要测试平台，以及如何创建测试用例来学习和确保我们知道自己在做什么。正如我们将在本章中看到的，测试用例是学习和探索更多关于
    Oracle 数据库知识的绝佳方式。


    ## 失败


    永远不要害怕失败。这是一个古老的建议，适用于任何人，甚至是数据库管理员。这个建议的结尾隐含着一个不那么明显的陈述，那就是从失败中学习。


    失败本身毫无意义。你失败了。只有当你审视哪里出了问题，并随后确定一个更好的行动方案时，你才能成功。据说你从失败中学到的东西比从成功中学到的更多，所以不要害怕失败。兴奋起来吧！你即将学到新东西，并促进你的职业发展。你不仅会从失败中学习，还会对你的技能和知识获得信心。在你取得成功之后，你将有信心能够再次成功，并且知道即使再次失败，你也能找到解决办法。


    我想写这一章的主要原因是，我在 Oracle 论坛上看到太多类似这样的问题：“我能否在不使用索引的情况下创建主键？”或者“我能否创建一个外键指向某个表，但引用的不是主键？”在我脑海里，一个小声音会立刻回应：“不，你不能，因为你没有尝试过。”这听起来有点粗鲁，所以我从不提供这样的答案，但这是事实。在第
    15 章，我们将讨论如何利用 Oracle 论坛来促进你的职业发展。现在，请理解任何以“我能否”开头的问题，都意味着你已经立刻失败了，因为你没有去尝试。


    ### 提示


    永远不要问“我能否 *X*？”先尝试。


    从最初的失败中应该学到什么教训？显而易见的是，一个人需要尝试。首先尝试总是必要的。你可能会发现第一次尝试就成功了。如果你问别人“我能否 *X*？”然后去尝试，发现你本来就可以，那么你就浪费了大家的时间去问他们，而本可以自己完成这项工作。


    几乎每个人都曾尝试过某事但失败了。他们审视哪里出了问题，然后决定用不同的方法再试一次。他们又失败了。那方法行不通，所以下一步分析情况的方法是判断新方法是否让他们更接近期望的目标。如果他们觉得这一步更接近理想的解决方案，他们就会确定下一步该怎么做。如果这个方法没有朝着需要的方向进展，可能就需要另一种不同的方法。


    在你的职业生涯中，你会发现很多次，你的尝试和后续行动正将你引向错误的道路。在失败、学习、再次尝试、再次失败的过程中，你可能经常发现自己并没有离解决方案更近。这是学习过程的一部分。这些尝试中的每一次都会让你成为一个更好的数据库专业人员，但前提是你从失败中学习。


    当你回溯试图找出在哪里走错了路时，你可能会回到之前的尝试，以确定从那个点起是否需要不同的路径。我们可能不得不回溯到更早的尝试。每个人都经历过终极失败，即我们尝试的一切都出错，我们必须回到谚语所说的“起点”，从头开始。

    '
- fmt: '## Success


    The opposite of failure is success. Success is what everyone strives for with
    every task they perform. If you are making a cup of coffee to start your day,
    you want a successful outcome. If you are tying your shoe, you want a successful
    outcome. If you are designing a database system, you want a successful outcome.


    The best way to achieve success is to define the criteria for success. How do
    you know when your task has reached a successful conclusion? I know my task to
    make a morning cup of coffee is successful when I am drinking the beverage and
    my brain says, “that tastes great.” Success for the task of tying a shoe is defined
    when the laces are fastened so they keep the shoe in place and stay that way for
    a sufficient period of time. If the laces appear to be tied and five steps later
    they come undone, the task of tying the shoes was not a success.


    How about designing a database system? How do you define success? The database
    is up and running. Tables are populated with data. End users can access the data.
    Is that success? In some cases, it might be a successful outcome. However, if
    performance is slow and the system cannot scale to meet the demands of a larger
    user base, one might consider the system to be a failure.


    The more accurately you can define success criteria, the higher your chances of
    achieving a successful outcome. Success criteria needs to be signed off by all
    of the stakeholders so that everyone has a solid understanding of what the project
    needs to accomplish to be a success. A database administrator may stand up a new
    database system and think they have done an excellent job and have achieved success.
    The DBA’s manager may then look at the system and say that it is a dismal failure.
    They have different success criteria for this system. One person is happy and
    the other is anything but happy. In order for the implementation of the system
    to be a success, all stakeholders need to understand what that means. Clear communication
    and defining the expectations are key to success.


    Once the success criteria has been met, the project is completed. Over time, people
    may evaluate the solution and decide they want new success criteria. A new project
    is created to achieve this new objective. It is very common in the IT business
    to deploy a solution and then have the overall vision change in the future. A
    database system that was working just fine and met its initial success criteria
    now needs to be modified to support the changing needs of the organization.


    ### Tip


    Make sure you know your success criteria.


    Every test case shown in this chapter will have defined success criteria. Without
    the criteria, we will not know when to stop working on the test case. Even well-intentioned
    people may attempt to redefine the success criteria during the life of the project.
    This is called scope creep and can significantly impact the project’s ability
    to achieve success within the previously defined constraints, especially on the
    project timeline.


    ## Testbeds


    The virtual machine we have built in this book is one of our testbeds. Every Oracle
    database administrator needs a testbed to practice and figure out how things work.
    Production environments are poor testbeds. We should test things out elsewhere
    and then implement the change in production only after we know exactly what we
    are doing.


    ### Tip


    Never make any change in production unless you know exactly what you are doing.


    Remember that the DBA is the data guardian. It would be a foolish DBA that attempts
    something for the first time in production only to watch their action destroy
    the database or make it unavailable to end users.


    Most IT practitioners are familiar with development (dev), test, and production
    platforms. Application code is created and modified in the dev environment first.
    Once the changes are known and working to solve the task, the changes are rolled
    into the test environment. Quality Analysis (QA) teams verify that the changes
    achieved the desired result without breaking previously existing functionality.
    Once testing has completed successfully, the change is rolled into production.


    The database administrator needs a place to perform their work. Some organizations
    insist on having their DBA perform their work in the same environment in which
    application developers work. The problem is that DBAs can break things and the
    result may be a database that is no longer operational. If the DBA breaks the
    database, developers and QA staff may not be able to perform their work. End users
    will not notice that a dev or test database is down. But your developers and QA
    staff certainly will. Your dev and test databases can be thought of as “production”
    for developers and QA. Do not use dev and test databases to try out your DBA tasks
    because you risk impacting dev and QA work.


    ### Tip


    Dev and test databases are production for someone, just not your application end
    users.


    The database administrator needs their own platform to work on. They need a testbed
    of their own. Today’s virtualization and cloud technologies make it even easier
    for the DBA to get their hands on their own testbed. This book has shown how easy
    it is to create an Oracle on Linux testbed using VirtualBox. The DBA may have
    multiple testbeds. For example, the DBA may have an Oracle 12.2 testbed, as we
    have created in this book, and then create another one just for the purpose of
    testing an upgrade from 12.2 to the 18c version. After their upgrade testing is
    complete, the DBA may no longer need that testbed, in which case it can be destroyed.'
