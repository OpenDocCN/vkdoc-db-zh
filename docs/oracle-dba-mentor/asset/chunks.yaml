  trans: '

    # 创建服务器


    要开始创建我们的测试服务器，只需启动 VirtualBox 程序。在图 3-9 中，您可以看到我已经创建了两个虚拟机，一个用于测试 Oracle 12.2
    新特性，另一个用于试用 Oracle 多租户。如果您是第一次尝试创建，您的 VirtualBox 管理器可能不会显示任何虚拟机。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig9_HTML.jpg](img/467924_1_En_3_Fig9_HTML.jpg)

    *图 3-9 Oracle VM VirtualBox 管理器*


    很可能，您目前还没有创建任何虚拟机。点击 `新建` 按钮来创建您的第一个虚拟机。在对话框中，您需要为您的虚拟机起一个有意义的名字，并选择操作系统类型和版本。图
    3-10 展示了一个示例。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig10_HTML.jpg](img/467924_1_En_3_Fig10_HTML.jpg)

    *图 3-10 创建虚拟机*


    我以书名命名了这个虚拟机，但您可以提供任何您想要的名称。操作系统类型是 `Linux`，版本是 `Oracle (64-bit)`。然后点击 `下一步`。


    下一步是为这个虚拟机分配内存。您至少需要分配 4GB 内存。此内存来自您的工作站或笔记本电脑，即 `主机`，因此请确保您的工作站或笔记本电脑至少有 8GB
    的 RAM。每个 Oracle 版本都有不同的内存要求。本书中我们将安装的版本需要一个 4GB 的操作系统。如果您使用的内存较少，Oracle 将运行缓慢或可能根本无法运行。您的工作站或笔记本电脑需要足够的内存来运行虚拟机以及您可能打开的任何其他应用程序。如果您的主机有超过
    8GB 的 RAM，您当然可以为虚拟机分配更多内存，但这对我们正在创建的测试环境益处不大。内存大小如图 3-11 所示。点击 `下一步`。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig11_HTML.jpg](img/467924_1_En_3_Fig11_HTML.jpg)

    *图 3-11 设置内存大小*


    在下一个屏幕上，确保选中“现在创建虚拟硬盘”，然后点击 `创建` 按钮。在之后的屏幕上，确认虚拟硬盘类型为 `VDI`，然后点击 `下一步`。虚拟硬盘可以是固定大小或动态分配的。动态分配磁盘的好处是，用于模拟硬盘的文件开始时很小，并根据需要增长，直到达到最大大小。固定大小选项将立即分配最大大小。我通常使用动态分配，但您也可以选择另一个选项。点击
    `下一步`。


    在下一个屏幕上，如图 3-12 所示，提供一个文件名和磁盘大小。我通常保持文件名与虚拟机名称相同。您可以点击文件名右侧的图标来为磁盘文件选择非默认的位置。对于这台机器，我们将创建一个
    60GB 的磁盘。我们需要这个容量来为安装操作系统、安装 Oracle 软件和创建我们的第一个数据库提供足够的空间。点击 `创建` 按钮。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig12_HTML.jpg](img/467924_1_En_3_Fig12_HTML.jpg)

    *图 3-12 创建虚拟硬盘*


    在启动虚拟机之前，让我们更改一些 VirtualBox 未提示我们设置的其他选项。在 VirtualBox 管理器中，点击虚拟机，然后点击 `设置` 按钮（黄色齿轮图标）。您可以看到在图
    3-13 中，`DBAMentor` 虚拟机被选中（蓝色显示）。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig13_HTML.jpg](img/467924_1_En_3_Fig13_HTML.jpg)

    *图 3-13 访问虚拟机设置*


    在 `设置` 页面，选择左侧导航窗格中的 `网络`。确保选中 `网卡 1` 选项卡，如图 3-14 所示。然后确保选中 `启用网络连接` 复选框，并且 `连接方式`
    菜单选择了 `网络地址转换(NAT)`。`NAT` 网络适配器允许虚拟机连接到外部世界。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig14_HTML.jpg](img/467924_1_En_3_Fig14_HTML.jpg)

    *图 3-14 启用网络适配器*


    我们还需要第二个网络适配器，以便我们工作站或笔记本电脑上的工具可以连接到虚拟机内部的 Oracle 数据库。选择 `网卡 2` 选项卡。确保选中 `启用网络连接`
    复选框。对于 `连接方式` 选项，选择 `仅主机(Host-Only)网络`，如图 3-15 所示。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig15_HTML.jpg](img/467924_1_En_3_Fig15_HTML.jpg)

    *图 3-15 选择仅主机适配器*


    我们还将添加一个共享文件夹，以便我们可以在主机工作站和虚拟机之间轻松传递文件。在 `设置` 面板中，选择导航窗格中的 `共享文件夹`。点击那个看起来像文件夹带绿色加号的图标。这将弹出一个对话框。我打算将我工作站上的
    `C:\temp` 目录映射到我的 Linux 客户机上的 `C_temp` 挂载点，并设置为每次启动虚拟机时自动挂载。您可以将共享文件夹映射到主机硬盘上的任何位置。因为我将共享文件夹映射到了
    `C:\temp`，显然我是在 Windows 上运行 VirtualBox。如果您在 macOS 或 Linux 上运行，您的文件夹位置会不同。我的设置如图
    3-16 所示。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig16_HTML.jpg](img/467924_1_En_3_Fig16_HTML.jpg)

    *图 3-16 共享文件夹定义*


    在我点击 `确定` 后，设置看起来如图 3-17 所示。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig17_HTML.jpg](img/467924_1_En_3_Fig17_HTML.jpg)

    *图 3-17 共享文件夹设置*


    点击 `确定` 接受当前设置。我们现在准备启动虚拟机。在 VirtualBox 管理器中，点击虚拟机并点击绿色的 `启动` 按钮。虚拟机还没有操作系统，所以
    VirtualBox 要求我们指定一个。点击文件夹图标，导航到您为 Oracle Linux 下载的 ISO 文件，然后点击 `启动` 按钮。在图 3-18
    中，我们可以看到我在撰写本文时下载的 `V975367-01.iso` 文件。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig18_HTML.jpg](img/467924_1_En_3_Fig18_HTML.jpg)

    *图 3-18 ISO 位置*


    当红色的 Oracle Linux 屏幕出现时，按 `I` 键，然后按 `Enter` 启动。如果您等待 60 秒，VirtualBox 将测试介质然后自行启动。


    Oracle Linux 已启动，并希望获取一些信息以完成其配置。第一页要求您选择安装过程中偏好的语言，如图 3-19 所示。选择语言并点击 `继续` 按钮。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig19_HTML.jpg](img/467924_1_En_3_Fig19_HTML.jpg)

    *图 3-19 安装过程的语言选择*


    在 `安装概要` 屏幕上，您可以更改日期和时间、键盘和其他项目。确保这些设置适合您的环境。图 3-20 显示了 `软件选择` 按钮。点击该按钮。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig20_HTML.jpg](img/467924_1_En_3_Fig20_HTML.jpg)

    *图 3-20 软件选择按钮*

    '
- fmt: '## 安装与配置步骤


    选择安装类型时，图标提示将执行最小化安装，但我们希望确保功能更全面。我总是选择左侧的 `Server with GUI` 单选按钮，并勾选右侧的 `Performance
    Tools` 和 `System Administration Tools` 复选框。`Oracle Universal Installer` 是一个基于图形界面的工具。拥有图形界面的服务器为我们提供了安装
    Oracle 所需的基础设施。我们也可以在没有图形界面的环境中安装 Oracle，但拥有它会使工作更轻松，正如我们将在第5章中看到的那样。点击图 3-29
    中的图标以查看“软件选择”屏幕，其应如图 3-21 所示。请确保选择了 `Server with GUI` 以及两个附加组件。点击 `Done` 完成选择。


    ![图 3-21 软件选择屏幕](images/467924_1_En_3_Chapter/467924_1_En_3_Fig21_HTML.jpg)


    回到“安装摘要”屏幕，`Installation Destination` 按钮显示为红色文字，如图 3-22 所示，这意味着我们需要关注它。点击该按钮以修改安装目标。


    ![图 3-22 安装目标按钮](images/467924_1_En_3_Chapter/467924_1_En_3_Fig22_HTML.jpg)


    确保选中了自动配置分区的单选按钮。然后点击 `Done` 按钮。如果您希望有更多手动控制权，可以手动配置虚拟机的硬盘分区。由于这是我们的第一台虚拟机，我们将让
    `VirtualBox` 来完成这项工作。在“安装目标”屏幕上，存储选项应如图 3-23 所示。


    ![图 3-23 存储选项](images/467924_1_En_3_Chapter/467924_1_En_3_Fig23_HTML.jpg)


    还有一项需要处理。在“安装摘要”屏幕上，点击 `Network & Hostname` 按钮。在“网络和主机名”屏幕上，列表中应显示两个以太网适配器。（如果您还记得，我们在图
    3-15 所示的步骤中定义了第二个网络适配器。）这两个网络适配器将被赋予适配器名称。在图 3-24 中，适配器名称是 `enp0s3` 和 `enp0s8`。您的适配器名称可能略有不同。


    ![图 3-24 以太网适配器](images/467924_1_En_3_Chapter/467924_1_En_3_Fig24_HTML.jpg)


    对于列出的第一个适配器，请确保右侧的按钮设置为 `On`，如图 3-25 所示。它默认为 `Off`，我们希望操作系统自动启动两个适配器。点击按钮以更改其值。然后选择另一个网络适配器，并确保它也设置为
    `On`。


    ![图 3-25 已开启的以太网适配器](images/467924_1_En_3_Chapter/467924_1_En_3_Fig25_HTML.jpg)


    在“网络和主机名”屏幕的底部，您可以选择为此机器指定一个主机名，然后点击 `Apply` 按钮。在图 3-26 中，我将此机器命名为 `dbamentor.localdomain`。您可以为此机器指定任何有意义的名称。


    ![图 3-26 命名主机](images/467924_1_En_3_Chapter/467924_1_En_3_Fig26_HTML.jpg)


    网络配置完成。点击 `Done` 按钮。回到“安装摘要”页面，点击 `Begin Installation` 按钮。


    在后台安装进行的同时，点击按钮设置 `root` 密码，如图 3-27 所示。设置 `root` 密码很简单，只需在对话框中输入两次密码，然后按 `Done`
    按钮确认您的选择。


    ![图 3-27 Root 密码按钮](images/467924_1_En_3_Chapter/467924_1_En_3_Fig27_HTML.jpg)


    在 `Root Password` 按钮旁边是一个创建用户的按钮。当前显示“不会创建用户”。您可以在此刻创建用户，或者在操作系统重启时它会提示您创建用户。只是不要创建名为
    `oracle` 的用户。在后面的章节中，我们将在安装软件时创建 `oracle` 用户。如果我们现在创建该用户，可能会创建得不正确。


    操作系统安装完成后，会出现一个使您能够重启机器的按钮。点击该按钮进行重启。重启完成后，我们只剩下几个步骤。一是接受许可协议。点击图 3-28 中所示的按钮阅读许可协议。勾选表示您接受条款的复选框，然后点击
    `Done`。


    ![图 3-28 许可接受](images/467924_1_En_3_Chapter/467924_1_En_3_Fig28_HTML.jpg)


    点击 `Finish Configuration` 按钮，我们快完成了。还需要再完成一个向导。这个最终向导看起来非常冗余，因为我们已经提供了这些答案，但我们需要完成它。如果您使用的是不同的
    `Oracle Linux` 版本，向导步骤可能与我遇到的情况略有不同，但以下信息将帮助您完成安装。


    向导的第一页要求我确认语言，然后点击 `Next`。然后我确认键盘设置并点击 `Next`。下一个屏幕询问我的位置偏好，我确认后点击 `Next`。在下一个屏幕上，我提供时区信息并点击
    `Next`。随后的屏幕询问一些在线账户，我直接点击 `Skip` 按钮。然后询问我的姓名并定义我的用户ID。当您进行到这一步时，输入虚拟值，因为我们稍后将为
    `Oracle` 软件创建我们的账户。定义用户后，下一个屏幕要求提供密码，我输入后点击 `Next`。现在我已完成向导，可以点击按钮开始使用 `Oracle
    Linux`。如果您已完成所有这些步骤，应该会看到如图 3-29 所示的确认屏幕。


    ![图 3-29 准备开始使用 Oracle Linux Server](images/467924_1_En_3_Chapter/467924_1_En_3_Fig29_HTML.jpg)


    点击开始使用服务器的按钮后，我以在向导中提供的用户ID登录到 `Gnome` 界面。


    虚拟机设置完成。在顶部菜单中，我选择 `Machine` ➤ `ACPI Shutdown` 来暂时关闭它。我们将在本书后面返回到这个虚拟机。'
  raw: 'The icon is saying a minimal installation will be performed but we want to
    make sure we have a bit more. I always select the Server with GUI radio button
    on the left side and check the Performance Tools and System Administration Tools
    check boxes on the right side. The Oracle Universal Installer is a GUI-based tool.
    Having a server with a GUI gives us the infrastructure we need to install Oracle.
    We can install Oracle without a GUI environment, but having it there makes the
    job easier, as we will see in Chapter [5](#467924_1_En_5_Chapter.xhtml). Click
    on the icon in Figure [3-29](#467924_1_En_3_Chapter.xhtml#Fig29) to see the Software
    Selection screen, which should look like Figure [3-21](#467924_1_En_3_Chapter.xhtml#Fig21).
    Make sure Server with GUI is selected as well as the two add-ons. Click Done to
    complete the selection.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig21_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig21_HTML.jpg)


    Figure 3-21


    Software Selection screen


    Back on the Installation Summary screen, the Installation Destination button has
    red text, as shown in Figure [3-22](#467924_1_En_3_Chapter.xhtml#Fig22), which
    means it needs our attention. Click the button to modify the installation destination.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig22_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig22_HTML.jpg)


    Figure 3-22


    Installation Destination button


    Make sure the radio button to automatically configure partitioning is selected.
    Then click the Done button. If you want more manual control, you can manually
    configure partitioning of the virtual machine’s hard disk. Since this is our first
    virtual machine, we will let VirtualBox do the work for us. On the Installation
    Destination screen, the storage options should look like Figure [3-23](#467924_1_En_3_Chapter.xhtml#Fig23).


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig23_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig23_HTML.jpg)


    Figure 3-23


    Storage options


    One more item needs to be addressed. On the Installation Summary screen, click
    the Network & Hostname button. On the Network and Hostname screen, there should
    be two Ethernet adapters shown in the list. (If you remember, we defined a second
    network adapter in the step shown in Figure [3-15](#467924_1_En_3_Chapter.xhtml#Fig15).)
    The two network adapters will be given adapter names. In Figure [3-24](#467924_1_En_3_Chapter.xhtml#Fig24),
    the adapter names are enp0s3 and enp0s8\. Your adapter names may be slightly different.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig24_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig24_HTML.jpg)


    Figure 3-24


    Ethernet adapters


    For the first adapter listed, make sure the button on the right is set to On,
    as shown in Figure [3-25](#467924_1_En_3_Chapter.xhtml#Fig25). It defaults to
    Off and we want the operating system to start both adapters automatically. Click
    the button to change its value. Then select the other network adapter and make
    sure it is set to On as well.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig25_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig25_HTML.jpg)


    Figure 3-25


    Ethernet adapters turned on


    At the bottom of the Network and Hostname screen, you can optionally give this
    machine a hostname and click the Apply button. In Figure [3-26](#467924_1_En_3_Chapter.xhtml#Fig26),
    I have named this machine dbamentor.localdomain. You can give this machine any
    name that makes sense to you.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig26_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig26_HTML.jpg)


    Figure 3-26


    Naming the host


    The network configuration is complete. Click the Done button. Back on the Installation
    Summary page, click the Begin Installation button.


    While the installation proceeds in the background, click the button to set the
    root password, shown in Figure [3-27](#467924_1_En_3_Chapter.xhtml#Fig27). Setting
    the root password is as simple as entering the password twice in the dialog box
    and press the Done button to confirm your selection.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig27_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig27_HTML.jpg)


    Figure 3-27


    Root Password button


    Next to the Root Password button is a button to create a user. It currently says
    “No user will be created.” You can create a user at this time, or when the OS
    reboots it will prompt you to create a user. Just do not create a user named oracle.
    In a later chapter, we will create an oracle user when we install the software.
    If we create the user now, it may be created incorrectly.


    After the installation of the OS is complete, a button will appear that enables
    you to reboot the machine. Click the button to reboot. After the reboot is complete,
    we only have a few more steps. One is to accept the license. Click the button
    shown in Figure [3-28](#467924_1_En_3_Chapter.xhtml#Fig28) to read the license
    agreement. Check the box indicating you accept the terms and click Done.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig28_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig28_HTML.jpg)


    Figure 3-28


    License Acceptance


    Click the Finish Configuration button and we’re almost there. One more wizard
    to walk through. This final wizard seems very redundant as we’ve already supplied
    these answers, but we need to get through this. If you are using a different Oracle
    Linux version, the wizard steps may vary slightly from what I encounter, but the
    following information will help you get through the installation.


    The first page of the wizard asks me to confirm my language and then click Next.
    I then confirm my keyboard setting and click Next. The next screen asks me for
    my location preferences, which I confirm and click Next. On the next screen I
    supply the time zone information and click Next. The subsequent screen asks for
    some online accounts, and I just click the Skip button. I am then asked for my
    name and to define my userid. When you get to this step, enter dummy values because
    we will create our account for the Oracle software later. After I define the user,
    the next screen asks for the password, which I supply and click Next. I am now
    done with the wizard and I can click the button to start using Oracle Linux. If
    you have completed all of these steps, you should see a confirmation screen like
    Figure [3-29](#467924_1_En_3_Chapter.xhtml#Fig29).


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig29_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig29_HTML.jpg)


    Figure 3-29


    Ready to start using Oracle Linux Server


    After clicking the button to start using the server, I am signed in to a Gnome
    interface with the userid I supplied in the wizard.


    The virtual machine setup is complete. On the top menu, I choose Machine ➤ ACPI
    Shutdown to close it down for now. We’ll return to this virtual machine later
    in the book.'
