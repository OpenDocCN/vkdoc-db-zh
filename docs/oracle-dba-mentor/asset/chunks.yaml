    ## 实例崩溃分析


    如果实例崩溃了，找出原因的最佳位置就是警报日志。DBA 应该做的第一件事是尽快启动实例并使其运行，以恢复对数据的访问。第二件事是弄清楚实例崩溃的原因。在 Listing
    12-9 所示的警报日志条目中，我们可以看到实例进入了关键状态。一个名为`SMON`的后台进程意外死亡。由于`SMON`必须保持运行，另一个进程`PMON`检测到了这个状况并终止了
    Oracle 实例。'
