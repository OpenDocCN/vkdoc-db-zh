    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig19_HTML.jpg](img/467924_1_En_15_Fig19_HTML.jpg)


    图 15-19


    MOS 补丁搜索


    虽然不是必须的，但指定平台通常也很有帮助。点击屏幕右下角的`搜索`按钮，您将被带到下载补丁的链接。我们将在第 17 章讨论 Oracle 数据库的打补丁。


    ## 认证


    我经常看到人们问诸如“Oracle 18c 是否支持 Windows 2012？”这样的问题。提问者想知道特定的 Oracle 版本是否通过了特定操作系统的认证。您可以通过`认证`选项卡回答此类问题，该选项卡有一个显示一些快速链接的部分，如图
    15-20 所示。


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig20_HTML.jpg](img/467924_1_En_15_Fig20_HTML.jpg)


    图 15-20


    MOS 认证快速链接


    花些时间观看教程视频是个好主意。但我们将继续介绍一个示例，说明如何使用`MOS`此选项卡中的搜索功能。在`认证搜索`部分，将鼠标光标放在`产品`框中并开始输入“database”；弹出菜单会让您选择与您输入内容匹配的任何产品。选择`Oracle
    Database`产品后，如图 15-21 所示，点击`版本`框。您可以选择显示的任何产品版本。在我们的示例中，我们将选择 18.0 版本。现在，将`平台`框保留为默认值`任意`。点击`搜索`按钮。


