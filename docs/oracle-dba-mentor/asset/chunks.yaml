    ask you to reproduce the issue in SQL*Plus. If it works in SQL*Plus, then it is
    a problem with the query tool, not the database engine. If the SQL statement produces
    the wrong results in SQL*Plus, then Oracle Support needs to address the problem
    and help with a resolution.


    SQL*Plus has many features that people may not be aware of. You can save your
    SQL statement to a text file. You can run a file that contains SQL statements
    to script out multiple actions. SQL*Plus can even generate formatted reports.


    One hidden feature in SQL*Plus that many people are not aware of is the ability
    to edit your command. SQL*Plus keeps the current command in a buffer. Consider
    the example in Listing [11-6](#467924_1_En_11_Chapter.xhtml#PC6) where the database
    administrator attempted to create a tablespace, but an error occurred. It should
    be obvious that the DBA specified the tablespace’s size twice in lines 3 and 4.


    ```

    SQL> create tablespace apps_ts

    2  datafile ''/u01/app/oracle/oradata/orcl/apps_ts01.dbf''

    3  size 5g

    4  size 10g

    5  extent management local auto;

    size 10g

    *

    ERROR at line 4:

    ORA-02180: invalid option for CREATE TABLESPACE

    Listing 11-6

    Incorrect SQL*Plus Command

    ```


    The DBA wants to remove line 4 from this command without having to retype the
    SQL statement anew. The DBA can type the lowercase letter l to list the contents
    of the buffer, as shown in Listing [11-7](#467924_1_En_11_Chapter.xhtml#PC7) .


    ```

    SQL> l

    1  create tablespace apps_ts

    2  datafile ''/u01/app/oracle/oradata/orcl/apps_ts01.dbf''

    3  size 5g

    4  size 10g

    5* extent management local auto

    Listing 11-7

    Listing the SQL*Plus Buffer

    ```


    Notice the last line has an asterisk in it. The line with the asterisk is the
    current line. If we want to remove line 4, we need to make that the current line
    and then issue the command to delete that line. We simply type the line number
    of interest and hit the Enter key and then type “del” to remove our current line.
    Once the line has been removed, we can type the forward slash to execute the contents
    of the buffer, all shown in Listing [11-8](#467924_1_En_11_Chapter.xhtml#PC8).


    ```

    SQL> 4

    4* size 10g

    SQL> del

    SQL> l

    1  create tablespace apps_ts

    2  datafile ''/u01/app/oracle/oradata/orcl/apps_ts01.dbf''

    3  size 5g

    4* extent management local auto

    SQL> /

    extent management local auto

    *

    ERROR at line 4:

    ORA-02180: invalid option for CREATE TABLESPACE

    Listing 11-8

    Deleting a Line in the SQL*Plus Buffer

    ```


    When the contents of the buffer was listed, we can see the line with “size 10g”
    was removed. When the statement was executed again, another error was raised.
    The problem is that Oracle does not like the keyword *auto*. It should be *autoallocate*
    instead. We can see from the asterisk that our current line is the one with the
    error. We can change the word in the current line and re-execute the command,
    shown in Listing [11-9](#467924_1_En_11_Chapter.xhtml#PC9).


    ```

    SQL> c /auto/autoallocate

    4* extent management local autoallocate

    SQL> /

    Tablespace created.

    Listing 11-9

    Changing Text in SQL*Plus Buffer

    ```


    The c command will change, or perform a text substitution in the current line.
    The first character is your delimiter. In Listing [11-9](#467924_1_En_11_Chapter.xhtml#PC9),
    the delimiter is the forward slash, but you can choose any character, especially
    if the text you are trying to change contains the forward slash. After the delimiter
    is the text to change, followed by the delimiter again, then followed by the corrected
    text. Once auto is changed to autoallocate, the next forward slash executes the
    contents of the buffer and the tablespace is created successfully.


    This buffer in SQL*Plus helps the DBA who needs to keep an eye on things over
    time. Type the command and see the output. Then after a period of time, just type
    the forward slash to execute the buffer again. In the example in Listing [11-10](#467924_1_En_11_Chapter.xhtml#PC10),
    the DBA needed to know the count of current sessions in the instance and watch
    the count change over time. Instead of typing in the command repeatedly, the DBA
    just pressed the forward slash for the next execution.


    ```

    SQL> select count(*) as num_sessions from v$session where username is not null;

    NUM_SESSIONS


    SQL> /

    NUM_SESSIONS


    SQL> /

    NUM_SESSIONS


    Listing 11-10

    Multiple Buffer Executions in SQL*Plus

    ```


    If the DBA will need to run this statement in the future, the DBA may desire to
    save it to a script. The save command will write the contents of the buffer to
    a file. It is common practice to use the .sql file extension for SQL scripts.
    If the path is not specified, the file will be saved in the local directory. The
    @ symbol is used to tell SQL*Plus to load the contents of that file into the buffer
    and execute it. In Listing [11-11](#467924_1_En_11_Chapter.xhtml#PC11), we can
    see the contents of the buffer. We save that SQL statement to a file and then
    execute the file as a script.


    ```

    SQL> l

    1* select count(*) as num_sessions from v$session where username is not null

    SQL> save num_sessions.sql

    Created file num_sessions.sql

    SQL> @num_sessions.sql

    NUM_SESSIONS


    Listing 11-11

    Saving Buffer in SQL*Plus

    ```


    SQL*Plus is a valuable tool for the Oracle DBA. It is always available to you,
    and once you learn to leverage the power of its buffer as we have seen in the
    previous examples, you will find it to be a much better tool than just some command-line
    interaction with the database engine.'
  trans: "\n## SQL*Plus\n\n本书中的许多示例已经使用了 **SQL*Plus**，这是一个命令行工具，用于启动和停止 Oracle 实例，以及向数据库发出\
    \ SQL 语句。正如本章将看到的，虽然还有其他查询工具，但 **SQL*Plus** 总是触手可及。当我们安装数据库软件时，**SQL*Plus** 就已经安装好了。至少，我们可以通过\
    \ SSH 连接到数据库服务器，然后使用 **SQL*Plus**。由于 **SQL*Plus** 是一个命令行工具，即使是基于文本的 SSH 会话也足以使用它。\n\
    \n### 提示\n\n学会使用 **SQL*Plus**。它始终对你可用。\n\n如果你在自己的工作站上安装了 Oracle Client 软件，**SQL*Plus**\
    \ 也包含在其中。你需要设置一个 TNS 别名，如第[9]章所示，以便连接到任何其他机器上的数据库。\n\n**SQL*Plus** 是 Oracle 判断“是否有效”的标准。任何查询工具都只是一个向数据库提交\
    \ SQL 语句并显示结果的应用程序。已经有很多次，向 Oracle 支持团队提交的服务请求都显示，在其他某个查询工具中，Oracle 数据库似乎没有返回正确的结果。提交服务请求的人会向\
    \ Oracle 提供 SQL 语句和一些示例数据，并展示从数据库返回的结果集看起来不正确。如果你遇到这种情况，Oracle 总是会要求你在 **SQL*Plus**\
    \ 中重现该问题。如果它在 **SQL*Plus** 中能正常工作，那么问题就出在查询工具上，而不是数据库引擎。如果 SQL 语句在 **SQL*Plus**\
    \ 中产生了错误结果，那么 Oracle 支持团队就需要处理该问题并提供解决方案。\n\n**SQL*Plus** 有许多人们可能没有意识到的功能。你可以将\
    \ SQL 语句保存到文本文件中。你可以运行包含 SQL 语句的文件，以脚本方式执行多个操作。**SQL*Plus** 甚至可以生成格式化的报告。\n\n\
    **SQL*Plus** 中一个许多人没有意识到的隐藏功能是编辑你的命令的能力。**SQL*Plus** 会将当前命令保存在缓冲区中。考虑清单 [11-6]\
    \ 中的例子，其中数据库管理员试图创建一个表空间，但发生了错误。很明显，DBA 在第 3 行和第 4 行两次指定了表空间的大小。\n\n```\nSQL>\
    \ create tablespace apps_ts\n2  datafile '/u01/app/oracle/oradata/orcl/apps_ts01.dbf'\n\
    3  size 5g\n4  size 10g\n5  extent management local auto;\nsize 10g\n*\nERROR\
    \ at line 4:\nORA-02180: invalid option for CREATE TABLESPACE\n清单 11-6\n不正确的 SQL*Plus\
    \ 命令\n```\n\nDBA 想从这个命令中删除第 4 行，而不想重新输入整个 SQL 语句。DBA 可以输入小写字母 `l` 来列出缓冲区的内容，如清单\
    \ [11-7] 所示。\n\n```\nSQL> l\n1  create tablespace apps_ts\n2  datafile '/u01/app/oracle/oradata/orcl/apps_ts01.dbf'\n\
    3  size 5g\n4  size 10g\n5* extent management local auto\n清单 11-7\n列出 SQL*Plus\
    \ 缓冲区\n```\n\n注意最后一行有一个星号。带星号的行是当前行。如果我们想删除第 4 行，我们需要使其成为当前行，然后发出命令来删除该行。我们只需输入感兴趣的行号，按回车键，然后输入\
    \ `del` 来删除当前行。一旦该行被删除，我们可以输入前斜杠 `/` 来执行缓冲区的内容，如清单 [11-8] 所示。\n\n```\nSQL> 4\n\
    4* size 10g\nSQL> del\nSQL> l\n1  create tablespace apps_ts\n2  datafile '/u01/app/oracle/oradata/orcl/apps_ts01.dbf'\n\
    3  size 5g\n4* extent management local auto\nSQL> /\nextent management local auto\n\
    *\nERROR at line 4:\nORA-02180: invalid option for CREATE TABLESPACE\n清单 11-8\n\
    在 SQL*Plus 缓冲区中删除一行\n```\n\n当列出缓冲区内容时，我们可以看到包含 `size 10g` 的行已被删除。再次执行语句时，又出现了另一个错误。问题在于\
    \ Oracle 不喜欢关键字 `auto`。它应该是 `autoallocate`。从星号我们可以看到，当前行（带错误的那一行）是我们正在编辑的行。我们可以更改当前行中的单词并重新执行命令，如清单\
    \ [11-9] 所示。\n\n```\nSQL> c /auto/autoallocate\n4* extent management local autoallocate\n\
    SQL> /\nTablespace created.\n清单 11-9\n在 SQL*Plus 缓冲区中更改文本\n```\n\n`c` 命令将更改或在当前行执行文本替换。第一个字符是你的分隔符。在清单\
    \ [11-9] 中，分隔符是前斜杠 `/`，但你可以选择任何字符，特别是如果你要更改的文本包含前斜杠时。分隔符之后是要更改的文本，然后是分隔符，接着是更正后的文本。一旦\
    \ `auto` 被更改为 `autoallocate`，下一个前斜杠 `/` 就执行缓冲区的内容，表空间便成功创建。\n\n**SQL*Plus** 中的这个缓冲区对于需要长期监控情况的\
    \ DBA 非常有帮助。输入命令并查看输出。然后，过一段时间后，只需输入前斜杠 `/` 就可以再次执行缓冲区。在清单 [11-10] 的例子中，DBA 需要知道实例中当前会话的数量并观察其随时间的变化。DBA\
    \ 不必重复输入命令，只需在下次执行时按下前斜杠 `/` 即可。\n\n```\nSQL> select count(*) as num_sessions\
    \ from v$session where username is not null;\nNUM_SESSIONS\n        103\nSQL>\
    \ /\nNUM_SESSIONS\n        105\nSQL> /\nNUM_SESSIONS\n        104\n清单 11-10\n\
    在 SQL*Plus 中多次执行缓冲区\n```\n\n如果 DBA 将来需要运行此语句，可能希望将其保存到一个脚本中。`save` 命令会将缓冲区的内容写入文件。通常使用\
    \ `.sql` 作为 SQL 脚本的文件扩展名。如果未指定路径，文件将保存在当前目录中。`@` 符号用于告诉 **SQL*Plus** 将该文件的内容加载到缓冲区并执行它。在清单\
    \ [11-11] 中，我们可以看到缓冲区的内容。我们将该 SQL 语句保存到文件中，然后将该文件作为脚本执行。\n\n```\nSQL> l\n1* select\
    \ count(*) as num_sessions from v$session where username is not null\nSQL> save\
    \ num_sessions.sql\nCreated file num_sessions.sql\nSQL> @num_sessions.sql\nNUM_SESSIONS\n\
    \        104\n清单 11-11\n在 SQL*Plus 中保存缓冲区\n```\n\n**SQL*Plus** 是 Oracle DBA 的宝贵工具。它始终对你可用，而且一旦你学会了利用其缓冲区的威力，正如我们在前面的例子中看到的，你会发现它远比仅仅与数据库引擎进行命令行交互要好用得多。\n"
- fmt: '## SQL Developer


    Although SQL*Plus is a great command-line tool, we typically live in a GUI world.
    Think of SQL Developer as SQL*Plus in GUI form. The main goal of the SQL Developer
    product team at Oracle is to make your life easier. The tool works great for Oracle
    application developers and database administrators alike. The best part is that
    SQL Developer is free to use.


    When you install the Oracle database software on the server, it includes a copy
    of SQL Developer. This copy is guaranteed to be out of date, so you should download
    the latest and greatest version. Point your web browser to [`http://otn.oracle.com`](http://otn.oracle.com)
    and then click Software Downloads in the Essential Links section, just like you
    did when downloading the Oracle database software. On the next screen, SQL Developer
    is listed under Developer Tools even though it is not strictly a software development
    product. Click SQL Developer, and you will be taken to the download screen. You
    need click the radio button to accept the license agreement. If asked to authenticate,
    use the same Oracle Single Sign-On credentials you used to download the RDBMS
    software. I always download the version that includes the Java Development Kit
    (JDK) if I am downloading for Windows. For other platforms, you must supply the
    JDK.


    The download is a zip file. There is no installation. Just unzip the file to a
    directory somewhere. In the software’s folder, you will see the `sqldeveloper`
    executable. Run that file and SQL Developer will start. Earlier in this chapter,
    we made sure we had the ability to connect tools on our workstation to the database
    in our VM testbed. We will do that with SQL Developer in this section.


    If this is the first time you have started SQL Developer, you should see a Start
    Page. This page contains an Overview Video link as well as links to many tutorials
    and demonstrations. The Start Page only lists three tutorials and demos, but there
    is a link to many more online. I highly recommend spending time with these as
    they will explain so much more about the SQL Developer capabilities than this
    book can. The Start Page also contains a link to the SQL Developer documentation.


    Before you can interact with a database, you need to create a connection. In the
    Connections tab, shown in Figure 11-3, you can see I have three folders to better
    organize my connections.


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig3_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig3_HTML.jpg)


    Figure 11-3 Connections in SQL Developer


    Click the green plus sign icon to create a new database connection. A screen will
    pop up where you will need to fill in all the relevant details, shown in Figure
    11-4.


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig4_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig4_HTML.jpg)


    Figure 11-4 SQL Developer connection details


    The connection needs a name. I typically use the form *dbname_username*, but you
    are free to use whatever naming convention works for you. Enter the username and
    password. If you do not want to be prompted for the password each time, check
    the Save Password box, but only if this machine is not shared with others. You
    can use the Connection Color setting to visually define your connection window.
    I typically choose red if this is a connection to a production database. When
    I open a connection to the production database, SQL Developer will draw a red
    line around the window. The name will also be red in the Connections tab. This
    visual indicator is helpful to warn me to be careful because my actions are in
    production and not dev or test.


    In the example in Figure 11-4, I chose the Basic connection type. If you have
    Oracle Client installed, and have defined a TNS alias, you can change the Connection
    Type to TNS and then choose the alias. Since my connection is Basic, I have to
    supply the hostname, the port, and the service name. Once you have entered all
    of the information, click the Test button. If you have an error, it may be due
    to a firewall running on the VM. As the root user in our testbed VM, issue the
    following commands in Listing 11-12 in a Terminal window to disable the firewall.


    ```

    systemctl stop firewalld

    systemctl disable firewalld

    ```

    Listing 11-12 Disable Linux Firewall


    After the connection has been successfully tested, click the Save button. Double-clicking
    the connection will open it and bring up a worksheet. We can type in any SQL statement
    and click the green play button (or press `Ctrl-Enter`) to run the statement,
    an example of which is shown in Figure 11-5.


    ![../images/467924_1_En_11_Chapter/467924_1_En_11_Fig5_HTML.jpg](images/467924_1_En_11_Chapter/467924_1_En_11_Fig5_HTML.jpg)


    Figure 11-5 Running a SQL statement in SQL Developer


    Multiple statements can be executed, one after the other, by clicking the Run
    Script button (or pressing `F5`). The Run Script button is next to the green play
    button. It looks like a page of text with the green play arrow in the bottom left
    corner.


    Results can be sorted by any column in the Query Result window. If you want to
    save the results from being overwritten with the next statement execution, click
    the red push-pin icon. The next statement execution will be displayed in a different
    result tab.


    The Oracle product manager for SQL Developer is Jeff Smith. He maintains a blog
    at [`www.thatjeffsmith.com`](http://www.thatjeffsmith.com) and I highly recommend
    you bookmark this page. New versions are announced on this blog. Every time a
    new version comes out, you can find blog posts discussing the new features and
    even see them in action.


    I find myself using SQL Developer more and more every day. This product is one
    of the more useful tools Oracle has produced. Like any valuable tool, it just
    makes my job easier. Take some time to spend learning how to leverage this tool.'
