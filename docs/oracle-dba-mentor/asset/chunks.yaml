  trans: '

    ## 安装 Oracle


    过去，甲骨文公司必须为每个平台创建不同的安装程序。Java 编程语言凭借其“一次编写，到处运行”的理念解决了这个问题。现在 Oracle 软件的安装程序是用
    Java 编写的，无论你使用哪个平台，都是同一个程序。Oracle 现在将其称为 Oracle 通用安装程序 (`OUI`)。这不仅对甲骨文公司有益，对你也同样有益，因为你只需要学习如何使用一个安装工具。


    ### 启动 OUI


    我们通过启动 `OUI` 来安装数据库软件。我们只需将目录更改为解压软件的位置，并如代码清单 5-3 所示执行程序。


    ```

    cd /home/oracle/database

    ./runInstaller

    ```

    **代码清单 5-3** 启动 OUI


    ### 初始设置步骤


    `OUI` 启动。第一个屏幕是检查安全更新，如图 5-8 所示。目前，我们将这些字段留空并单击“下一步”按钮。我们将在后续章节中处理使用安全更新修补数据库软件的问题。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig8_HTML.jpg](img/467924_1_En_5_Fig8_HTML.jpg)

    **图 5-8** OUI 配置安全更新步骤


    单击“下一步”按钮后，系统将要求您确认是否希望保持不接收安全更新通知。单击“是”按钮。


    ### 选择安装类型


    在下一个屏幕（如图 5-9 所示）中，我们将选择仅安装数据库软件的选项。此服务器上没有需要升级的数据库，我们将在下一章中处理创建数据库的问题。单击“下一步”按钮。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig9_HTML.jpg](img/467924_1_En_5_Fig9_HTML.jpg)

    **图 5-9** OUI 安装选项步骤


    我们将安装单实例数据库，因此请确保选中第一个选项，如图 5-10 所示，然后单击“下一步”。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig10_HTML.jpg](img/467924_1_En_5_Fig10_HTML.jpg)

    **图 5-10** OUI 数据库安装选项步骤


    ### 选择数据库版本


    `OUI` 能够处理企业版和标准版。我通常希望拥有所有可用的功能，因此我将选择企业版并单击“下一步”。您可以在图 5-11 中看到此选择。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig11_HTML.jpg](img/467924_1_En_5_Fig11_HTML.jpg)

    **图 5-11** OUI 数据库版本步骤


    ### 配置安装目录


    在下一个屏幕上，我们现在有足够的信息来填写空白处。请记住，上一章定义了 Oracle 基础目录和 Oracle 主目录。此屏幕是我们告诉 `OUI` 这两个目录位置的地方。但首先我们需要创建
    Oracle 基础目录。启动命令窗口并执行代码清单 5-4 中的命令。


    ```

    su       (系统提示时输入 root 密码)

    mkdir –p /u01/app/oracle

    chown -R oracle:oinstall /u01

    exit

    ```

    **代码清单 5-4** 创建 Oracle 基础目录


    然后如图 5-12 示例所示填写方框。第一个方框是 Oracle 基础目录的位置，通常由环境变量 `$ORACLE_BASE` 引用。第二个方框（虽然不那么明显）是
    Oracle 主目录的位置，通常由环境变量 `$ORACLE_HOME` 引用。单击“下一步”继续。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig12_HTML.jpg](img/467924_1_En_5_Fig12_HTML.jpg)

    **图 5-12** OUI 安装位置步骤


    ### 创建 oraInventory 目录


    还记得第 4 章中提到的，Oracle 需要一个地方来存储此服务器上 Oracle 软件产品的清单。我们将其称为 `oraInventory` 目录。`OUI`
    将自动填充此值。在图 5-13 中，我们可以看到 `oraInventory` 目录位于图 5-12 所示 Oracle 基础目录的上一级。这是常见做法。当我们单击“下一步”时，`OUI`
    可能会给我们一个警告消息，我们将予以确认。


    我们还可以选择指定能够修改清单的操作系统组。如图 5-13 所示，默认的 `oinstall` 组已足够。单击“下一步”按钮。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig13_HTML.jpg](img/467924_1_En_5_Fig13_HTML.jpg)

    **图 5-13** OUI 创建清单步骤


    ### 指定操作系统用户组


    在下一个屏幕中，系统要求我们为不同的功能指定不同的操作系统组。如果我们关心职责分离，可能会让组织中不同的人员负责数据库备份，在这种情况下，我们不希望这些员工拥有其他功能，因此可以在此屏幕上将他们的组与其他组区分开。由于这是一个测试环境，并且只有我们将访问它，默认的
    `dba` 组已足够。如图 5-14 所示，Oracle 安装仅使用 `dba` 组的情况非常常见。单击“下一步”按钮。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig14_HTML.jpg](img/467924_1_En_5_Fig14_HTML.jpg)

    **图 5-14** OUI 操作系统组步骤


    ### 先决条件检查与摘要


    下一个屏幕将进行一些先决条件检查。`OUI` 会在安装软件前验证您的服务器设置是否正确。如果有任何问题，`OUI` 会通知您。您应该在继续该屏幕之前修复任何发现的问题；否则，您可能需要在以后修复问题。当我安装软件时，`OUI`
    没有发现任何问题，因此 `OUI` 自动进入“摘要”屏幕，如图 5-15 所示。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig15_HTML.jpg](img/467924_1_En_5_Fig15_HTML.jpg)

    **图 5-15** OUI 摘要


    ### 保存响应文件与安装


    一切准备就绪。我们已经回答了向导的所有问题，剩下的就是单击“安装”按钮。在图 5-15 向导的右下角，您可以看到一个标有“保存响应文件”的按钮。`OUI`
    向您提出了一系列问题，您提供了答案。您可以将您的答案（即对这些问题的响应）保存在一个文件中。当您想要多次安装 Oracle 数据库软件时，这非常有用。您无需一步步通过向导，只需启动
    `OUI` 并指向响应文件，`OUI` 将跳过所有这些屏幕。


    我们可以在下一个屏幕上监控安装进度。我们可以看到 `OUI` 将把文件复制到 Oracle 主目录。文件复制完成后，`OUI` 将重新编译软件，也称为链接二进制文件。最后，系统将要求我们以
    root 用户身份执行两个脚本。我们可以在图 5-16 中看到安装进度的示例。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig16_HTML.jpg](img/467924_1_En_5_Fig16_HTML.jpg)

    **图 5-16** OUI 安装进度


    ### 执行配置脚本


    一旦 `OUI` 到达最后一步，它将弹出一个类似于图 5-17 的窗口。此窗口要求我们以 root 用户身份运行两个脚本。


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig17_HTML.jpg](img/467924_1_En_5_Fig17_HTML.jpg)

    **图 5-17** OUI 执行配置脚本屏幕

    '
- fmt: 'In a Terminal window, perform the commands shown in Listing [5-5](#467924_1_En_5_Chapter.xhtml#PC8).


    ```

    su      (enter the root password when prompted)

    /u01/app/oraInventory/orainstRoot.sh

    /u01/app/oracle/product/12.2.0.1/root.sh

    exit

    Listing 5-5

    Run Root Scripts

    ```


    The last script will have a few prompts to answer. Simply accept the default values
    by pressing the `Enter` key. Once the root scripts have completed, click the `OK`
    button in the window shown in Figure [5-17](#467924_1_En_5_Chapter.xhtml#Fig17).


    The `OUI` then gives us confirmation that our installation is complete, as shown
    in Figure [5-18](#467924_1_En_5_Chapter.xhtml#Fig18). Click the `Close` button.


    ![../images/467924_1_En_5_Chapter/467924_1_En_5_Fig18_HTML.jpg](images/467924_1_En_5_Chapter/467924_1_En_5_Fig18_HTML.jpg)


    Figure 5-18


    OUI Finish screen


    Let’s confirm the software is installed by executing the commands shown in Listing
    [5-6](#467924_1_En_5_Chapter.xhtml#PC9) in a terminal window.


    ```

    cd /u01/app/oracle/product/12.2.0.1

    ls –l

    Listing 5-6

    Verifying Software Installed

    ```


    We should see a number of directories present in our Oracle home.


    ## Moving On


    The Oracle database software is now installed on our testbed. We could not proceed
    directly to this chapter because we needed the information in Chapter [4](#467924_1_En_4_Chapter.xhtml)
    to be able to answer some of the Oracle Universal Installer’s questions. For most
    of the wizard’s prompts, we simply accepted the default values.


    Now that we have the software installed, we will create our first database in
    the next chapter. We will walk through another Java-based wizard, the Database
    Configuration Assistant, and create the database we will use in our testbed.


    # 6. Creating Our Database


    In the previous chapter, we installed the Oracle database software on our testbed
    server. In this chapter, we will create our first Oracle database and have a fully
    functional system where we can practice and learn Oracle.


    The `OUI` does have an option where you can install and create a database in unison.
    In this book, we will perform the actions separately, install the software then
    create the database. You are encouraged to create another virtual machine at a
    later date and test out installing and creating the database at the same time.
    You may find this option to be a time saver.


    ## Creating the Database


    Oracle includes a wizard called the `DBCA` to walk us through the database creation
    steps. Like most of the wizards and like the `OUI` we used in Chapter [5](#467924_1_En_5_Chapter.xhtml),
    the `DBCA` is written in Java so it functions the same no matter which platform
    you are on. You can create an Oracle database manually, but the `DBCA` automates
    the process and reduces your chances of human errors. Always use the `DBCA` unless
    you have a specific need that requires you to create the database manually.


    If your virtual machine is not running, start it. Then log in as the `oracle`
    user. Start a command line window, `Terminal`, from Applications ➤ System Tools.
    Before we can start the `DBCA`, we need to set up our environment with the commands
    in Listing [6-1](#467924_1_En_6_Chapter.xhtml#PC1). Type these two `export` commands
    in your `Terminal` window.


    ```

    export ORACLE_HOME=/u01/app/oracle/product/12.2.0.1

    export PATH=$ORACLE_HOME/bin:$PATH

    Listing 6-1

    Setting the Environment Variables

    ```


    The first command sets an environment variable pointing to our Oracle home directory.
    The second command modifies the `PATH` environment variable. If you do not tell
    the operating system were to find the utility, it will search its predefined path
    looking for it. We add the `bin` subdirectory of the Oracle home to the path.
    If you are running on other Unix variants, you may need to add other environment
    variables like `LD_LIBRARY_PATH`. On Windows platforms, this is unnecessary as
    the `OUI` defined these for us when the software was installed. With the environment
    variables defined, type `dbca` in the `Terminal` window and press the `Enter`
    key. After a short period of time, the `DBCA` starts. The initial `DBCA` screen
    is shown in Figure [6-1](#467924_1_En_6_Chapter.xhtml#Fig1).


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig1_HTML.jpg](images/467924_1_En_6_Chapter/467924_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Creating a database in `DBCA`


    At this point, we only have two options. We will select the option to create the
    database.


    As you can see in Figure [6-1](#467924_1_En_6_Chapter.xhtml#Fig1), the `DBCA`
    does more than just create Oracle databases. It can also be used to configure
    an existing database, delete databases, and so much more. Because this system
    does not have any databases running, those options are not available to us. The
    `DBCA` does come with some predefined templates to simply administration, but
    for our purposes, we will walk through all the options. After making sure the
    option to create the database is selected, click `Next`. The `DBCA` will advance
    to the Creation Mode screen shown in Figure [6-2](#467924_1_En_6_Chapter.xhtml#Fig2).


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig2_HTML.jpg](images/467924_1_En_6_Chapter/467924_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    `DBCA` Creation Mode step


    In an effort to make things easier for the database administrator, Oracle has
    provided a short outline with some typical configuration items. If the Typical
    Configuration option is chosen, the `DBCA` skips a number of steps. Instead, we
    will choose the Advanced Configuration option and walk through each of the steps
    to learn more about this process. Click `Next` to advance to the Database Deployment
    Type screen shown in Figure [6-3](#467924_1_En_6_Chapter.xhtml#Fig3).


    ![../images/467924_1_En_6_Chapter/467924_1_En_6_Fig3_HTML.jpg](images/467924_1_En_6_Chapter/467924_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    `DBCA` Deployment Type step


    The only database type available to us is the Oracle Single Instance Database.
    If you pull down that menu, you will see options for RAC and RAC One Node, but
    our server is not configured for those choices. The rest of this screen asks us
    to choose a template. Notice that the first two templates include the data files.
    If you choose any of these templates, the `DBCA` will run much faster because
    it is not creating a database. Instead, it is copying files that already exist
    in the Oracle home directory of a database that has been pre-created. These templates
    work very well for creating a testbed database, but never use them for production.
    Your production database will be getting features and configurations you may not
    want.'
