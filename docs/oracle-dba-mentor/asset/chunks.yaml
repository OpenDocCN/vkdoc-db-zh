  trans: '

    ### 导出/导入


    最后一种升级路径是使用导出和导入实用程序。你可以使用多种不同类型的实用程序。当人们谈论导出/导入升级路径时，通常指的是使用 Oracle 的数据泵实用程序
    `impdp` 和 `expdp`。举另一个例子，你也可以将数据导出到文本文件，然后使用 `SQL*Loader` 导入。数据复制工具，如 `Oracle
    GoldenGate`，也可用于将数据迁移到更新的 Oracle 版本。你还可以使用具有类似功能的第三方实用程序。


    使用导出/导入升级路径时，你需要创建一个运行新版本的数据库。你从旧数据库导出数据，然后导入到新数据库中。从技术上讲，这并不是数据库升级，因为新数据库根本没有更改版本。


    使用导出/导入升级路径有两个主要原因。第一，你希望一步完成升级，而你当前的 Oracle 版本不支持直接升级。例如，使用导出/导入，你可以从 Oracle
    7.1 一步升级到 18.3。第二，你可以同时迁移到不同的数据库服务器。你将在一个服务器上导出数据，将转储文件移动到新服务器，然后在那里导入。如果你使用数据泵，你可以通过网络将数据从一个数据库传输到另一个数据库。


    这种方法有两个大问题。第一，所需时间取决于数据库大小。数据库越大，导出所需时间就越长，导入所需时间也越长，道理很简单。如果你的数据库非常大，完成此升级方法所需的时间可能会无法接受。第二，确保你迁移所有内容存在一定的风险。如果你导出到文本文件，你将缺少索引、约束、存储过程、视图以及许多其他方案对象。你必须单独迁移这些对象。如果你使用数据泵，转储文件可以包含所有方案对象，从而降低此风险。数据泵是在
    Oracle 10*g* 中引入的。如果你是从更旧的版本升级，你也可以使用传统的导出和导入实用程序 `exp` 和 `imp`。


    ### 如何选择？


    在大多数情况下，数据库管理员使用 `DBUA` 来执行升级。只要你可以执行直接升级，就选择此升级方法。如果你要迁移到不同的服务器，或者你的版本非常旧并且你想避免多次升级，请使用导出/导入方法。如今，手动升级几乎不再使用。


    ## 安装 18c


    在升级我们的测试数据库之前，我们需要在虚拟机上安装更新版本的数据库软件。在第 5 章中，我们逐步讲解了在测试机上安装 Oracle 12.2.0.1 软件的过程。现在是时候升级我们在第
    6 章中创建的那个数据库了。使用第 5 章中的信息，从 Oracle 技术网 `https://otn.oracle.com` 下载新版本：点击 Essential
    Links 部分的 Software Downloads，然后点击 Database 18c Enterprise/Standard Editions 链接。为简洁起见，我在此不再重复第
    5 章中的后续说明。唯一变化的是正在下载的版本。将软件下载到虚拟机后，在其自己的目录中解压该文件。18c 版本的一个变化是，你将该文件解压到你想要的 Oracle
    主目录中。下载的 zip 文件是主目录的镜像。这是与先前版本相比的一个微小变化。


    首先，创建主目录，如清单 18-1 所示。


    ```

    [oracle@dbamentor ~]$ cd /u01/app/oracle/product

    [oracle@dbamentor product]$ mkdir 18.3

    [oracle@dbamentor product]$ cd 18.3

    [oracle@dbamentor 18.3]$ pwd

    /u01/app/oracle/product/18.3

    清单 18-1

    创建 18c 主目录

    ```


    然后将下载的文件放入此目录并解压。


    下载文件解压后，启动 `runInstaller` 实用程序。在本节中，我将展示与我们在第 5 章安装的 12.2 版本相比已更改内容的屏幕截图。从图 18-1
    中我们可以立即看到，初始屏幕有些不同。


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig1_HTML.jpg](img/467924_1_En_18_Fig1_HTML.jpg)


    图 18-1


    Oracle 18c 安装程序步骤 1


    选择“仅设置软件”选项，因为我们在此系统上已经有一个数据库。图 18-1 中的注释 2 确认这对于我们的测试机是正确的选择。单击下一步。在下一个屏幕（步骤
    2）上，选择“执行单实例安装”选项，然后单击下一步。在下一个屏幕上，选择了企业版。单击下一步。


    在步骤 4 的屏幕上，我们需要确保 Oracle 基目录正确。在以前的版本中，`OUI` 会询问我们 Oracle 主目录。在 18c 中，`OUI` 假定产品安装在其解压的位置。从图
    18-2 中我们可以看到，软件位置对于我们的主目录是正确的。我们没有选项来更改软件位置。单击下一步。


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig2_HTML.jpg](img/467924_1_En_18_Fig2_HTML.jpg)


    图 18-2


    Oracle 18c 安装程序 Oracle 主目录


    下一个屏幕询问操作系统组；默认值是可接受的，因此单击下一步。在步骤 6 中，Oracle Universal Installer (`OUI`) 执行其先决条件检查。图
    18-3 显示我们的测试机系统上有一个检查失败。


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig3_HTML.jpg](img/467924_1_En_18_Fig3_HTML.jpg)


    图 18-3


    Oracle 18c 先决条件检查


    `OUI` 发现数据库服务器没有足够的物理内存。当我们安装 Oracle 12.2 版本时，这不是问题。每个 Oracle 版本的要求都有所不同，而此版本提高了我们所需的内存量。由于这是一个虚拟机，我们可以轻松地将其关闭，增加内存，然后重新启动。确保你的主机工作站或笔记本电脑有足够的内存可以分配给虚拟机。因为这是一个测试机，我们可以选择其他选项忽略发现的问题并继续，因此图
    18-3 中勾选了“忽略所有”框。在确认我们打算忽略该问题后，我们可以单击“安装”按钮。


    安装将继续进行，`OUI` 将要求以 root 身份运行脚本。运行此脚本时，系统会要求你确认是否可以覆盖 `oraenv` 和 `coraenv` 文件。在安装
    12.2 版本时我们没有被问到这个问题，因为这些文件当时还不存在。我们将用新版本覆盖它们，以防 18c 更改了文件内容。新版本现已安装完毕，可以进行数据库升级了。

    '
- fmt: '## Pre-Upgrade Information Tool


    Before you upgrade the database, you will be required to run the Pre-Upgrade Information
    Tool against the current version. This is a Java archive (JAR) file that will
    generate a list of items you will want to remediate to ensure a successful upgrade.
    To run the Pre-Upgrade Information Tool, we set our session’s environment variables
    to point to the current database, as shown in Listing 18-2.


    ```

    [oracle@dbamentor ~]$ export ORACLE_HOME=/u01/app/oracle/product/12.2.0.1

    [oracle@dbamentor ~]$ export ORACLE_BASE=/u01/app/oracle

    [oracle@dbamentor ~]$ export ORACLE_SID=orcl

    [oracle@dbamentor ~]$ export PATH=$ORACLE_HOME/bin:$PATH

    Listing 18-2

    Pre-Upgrade Setting Environment Variables

    ```


    We then use the Java executable in that Oracle home directory to run the JAR file.
    Listing 18-3 shows a sample run of the Pre-Upgrade utility.


    ```

    [oracle@dbamentor ~]$ $ORACLE_HOME/jdk/bin/java -jar /u01/app/oracle/product/18.3/rdbms/admin/preupgrade.jar

    ==================

    PREUPGRADE SUMMARY

    ==================

    /u01/app/oracle/cfgtoollogs/orcl/preupgrade/preupgrade.log

    /u01/app/oracle/cfgtoollogs/orcl/preupgrade/preupgrade_fixups.sql

    /u01/app/oracle/cfgtoollogs/orcl/preupgrade/postupgrade_fixups.sql

    Execute fixup scripts as indicated below:

    Before upgrade log into the database and execute the preupgrade fixups

    @/u01/app/oracle/cfgtoollogs/orcl/preupgrade/preupgrade_fixups.sql

    After the upgrade:

    Log into the database and execute the postupgrade fixups

    @/u01/app/oracle/cfgtoollogs/orcl/preupgrade/postupgrade_fixups.sql

    Preupgrade complete: 2018-09-14T14:21:32

    Listing 18-3

    Running Pre-Upgrade Information Tool

    ```


    The Pre-Upgrade Information Tool has created three files for us. A log file, and
    two fixup scripts, one pre- and one post-upgrade. The first stop is to read the
    contents of the `preupgrade.log` file. The initial part of the log file, shown
    in Listing 18-4, gives some basic information such as the version of the current
    database and the version we are upgrading to.


    ```

    Report generated by Oracle Database Pre-Upgrade Information Tool Version

    18.0.0.0.0 on 2018-09-14T14:21:32

    Upgrade-To version: 18.0.0.0.0

    =======================================

    Status of the database prior to upgrade

    =======================================

    Database Name:  ORCL

    Container Name:  ORCL

    Container ID:  0

    Version:  12.2.0.1.0

    Compatible:  12.2.0

    Blocksize:  8192

    Platform:  Linux x86 64-bit

    Timezone File:  26

    Database log mode:  ARCHIVELOG

    Readonly:  FALSE

    Edition:  EE

    Oracle Component                       Upgrade Action    Current Status

    ----------------                       --------------    --------------

    Oracle Server                          [to be upgraded]  VALID

    JServer JAVA Virtual Machine           [to be upgraded]  VALID

    Oracle XDK for Java                    [to be upgraded]  VALID

    Oracle Workspace Manager               [to be upgraded]  VALID

    Oracle XML Database                    [to be upgraded]  VALID

    Oracle Java Packages                   [to be upgraded]  VALID

    Listing 18-4

    Pre-Upgrade Log File Introductory Information

    ```


    The next section of the log file, displayed in Listing 18-5, shows us actions
    we will need to complete.


    ```

    ==============

    BEFORE UPGRADE

    ==============

    REQUIRED ACTIONS

    ================

    None

    RECOMMENDED ACTIONS

    ===================

    1.  (AUTOFIXUP) Gather stale data dictionary statistics prior to database

    upgrade in off-peak time using:

    EXECUTE DBMS_STATS.GATHER_DICTIONARY_STATS;

    Dictionary statistics do not exist or are stale (not up-to-date).

    Dictionary statistics help the Oracle optimizer find efficient SQL

    execution plans and are essential for proper upgrade timing. Oracle

    recommends gathering dictionary statistics in the last 24 hours before

    database upgrade.

    For information on managing optimizer statistics, refer to the 12.2.0.1

    Oracle Database SQL Tuning Guide.

    Listing 18-5

    Log File Actions

    ```


    The tool has not found any required actions we need to complete. It does recommend
    one action at this time, which is to upgrade stale data dictionary statistics.
    Always try to follow any recommended actions to ensure a smoother upgrade. The
    log file gave us the exact command to execute, as we can see in Listing 18-6.


    ```

    SQL> EXECUTE DBMS_STATS.GATHER_DICTIONARY_STATS;

    PL/SQL procedure successfully completed.

    Listing 18-6

    Updating Dictionary Stats

    ```


    The Pre-Upgrade Information Tool continues to provide us some valuable information.
    In our case, this utility is informing us that two tablespaces will automatically
    extend during the upgrade. It also informs us that the archive log destination
    will need about 3GB of space so we need to ensure the space is available. Both
    of these can be seen in Listing 18-7.


    ```

    INFORMATION ONLY

    ================

    2.  To help you keep track of your tablespace allocations, the following

    AUTOEXTEND tablespaces are expected to successfully EXTEND during the

    upgrade process.

    Min Size

    Tablespace                        Size     For Upgrade

    ----------                     ----------  -----------

    SYSTEM                             720 MB      1140 MB

    TEMP                                20 MB       150 MB

    Minimum tablespace sizes for upgrade are estimates .

    3.  Ensure there is additional disk space in LOG_ARCHIVE_DEST_1 for at least

    3139 MB of archived logs.  Check alert log during the upgrade that there

    is no write error to the destination due to lack of disk space.

    Archiving cannot proceed if the archive log destination is full during

    upgrade.

    Archive Log Destination:

    Parameter    :  LOG_ARCHIVE_DEST_1

    Destination  :  /u01/app/oracle/oradata/arch/

    The database has archiving enabled.  The upgrade process will need free

    disk space in the archive log destination(s) to generate archived logs to.

    Listing 18-7

    Pre-Upgrade Information Section

    ```


    The log file then concludes the pre-upgrade section with information on a script
    we can run before the upgrade to remediate any issues. Listing 18-8 contains the
    pre-upgrade script for the testbed.


    ```

    ORACLE GENERATED FIXUP SCRIPT

    =============================

    All of the issues in database ORCL

    which are identified above as BEFORE UPGRADE "(AUTOFIXUP)" can be resolved by
    executing the following

    SQL>@/u01/app/oracle/cfgtoollogs/orcl/preupgrade/preupgrade_fixups.sql

    Listing 18-8

    Pre-Upgrade Fixup Script

    ```


    The pre-upgrade utility cannot generate the commands to fix everything that might
    need attention prior to the upgrade. If there was something the fixup script could
    not handle, the utility would have informed us of this fact. Just to be safe,
    we run the pre-upgrade fixup script in our database, as shown in Listing 18-9.'
