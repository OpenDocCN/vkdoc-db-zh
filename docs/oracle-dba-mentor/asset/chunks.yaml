    图 15-17


    服务请求导航按钮


    如果我的问题尚未解决，我点击`下一步`按钮。下一个屏幕让我提供更多详细信息，以帮助分析师缩小问题的根本原因。图 15-18 显示`MOS`要求为我的服务请求提供更多详细信息。


