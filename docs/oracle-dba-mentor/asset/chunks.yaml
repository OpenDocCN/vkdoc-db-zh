    和创建数据库时，LiveSQL 也是一个很好的测试平台。话虽如此，LiveSQL 并不是练习数据库恢复或其他需要访问数据库服务器的任务的理想测试平台。'
  raw: '## Snapshots


    Virtualization technologies make it easy create a point-in-time snapshot of the
    current state of the system. Should the database administrator subsequently break
    everything, they can revert to the snapshot and be back up and running as if they
    never changed anything. Some virtual machine hypervisors let you take a snapshot
    of the system while it is up and running, whereas others require the virtual machine
    to be off.


    In the Oracle VM VirtualBox Manager, single-click the virtual machine we created
    for this book. Then click the drop-down arrow for the Machine Tools icon, shown
    in Figure [10-1](#467924_1_En_10_Chapter.xhtml#Fig1), and choose Snapshots.


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig1_HTML.jpg](images/467924_1_En_10_Chapter/467924_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    VirtualBox Machine Tools icon


    You should see that no snapshots have been taken as of yet. Click the Take button
    to take your first snapshot. VirtualBox will give you a dialog box, shown in Figure
    [10-2](#467924_1_En_10_Chapter.xhtml#Fig2), where you can define a name and description
    of the snapshot.


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig2_HTML.jpg](images/467924_1_En_10_Chapter/467924_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Taking a VM snapshot


    You can enter any snapshot name or description that makes it easier to understand
    more about that specific snapshot. For example, you might take a snapshot before
    a database upgrade and name the snapshot “pre-upgrade snapshot.”


    When taking a snapshot of a VM with an Oracle database, make sure the database
    is not running; otherwise, a cold backup of the database will be taken. This assumes
    the database’s storage is part of the virtual machine. If the storage is external
    to the VM, you will need to handle the backup of the database in a different manner,
    most likely using techniques discussed in Chapter [7](#467924_1_En_7_Chapter.xhtml).


    In the VirtualBox Manager, we can see our snapshot. Figure [10-3](#467924_1_En_10_Chapter.xhtml#Fig3)
    shows the snapshot and that the current state of the system is a child of that
    snapshot.


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig3_HTML.jpg](images/467924_1_En_10_Chapter/467924_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    VM snapshot in VirtualBox Manager


    We can also see the date and time the snapshot was taken. In Figure [10-4](#467924_1_En_10_Chapter.xhtml#Fig4),
    we have a snapshot as a child of an existing snapshot.


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig4_HTML.jpg](images/467924_1_En_10_Chapter/467924_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Multiple snapshots


    To restore a previous snapshot, shut down the virtual machine. Select the snapshot
    to restore and click the Restore button. A dialog box asks you to confirm the
    restore. You are given the option of creating a snapshot of the current machine
    first so that you can get back to this state, as shown in Figure [10-5](#467924_1_En_10_Chapter.xhtml#Fig5).


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig5_HTML.jpg](images/467924_1_En_10_Chapter/467924_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Restore snapshot option


    With the restore operation complete, we can see the restore snapshot. Note that
    the current state is now a child of the snapshot we restored to in Figure [10-6](#467924_1_En_10_Chapter.xhtml#Fig6).


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig6_HTML.jpg](images/467924_1_En_10_Chapter/467924_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Snapshot restored


    Snapshots are a great way to let you revert to a known, hopefully good state.
    Each snapshot takes a certain amount of disk space. If you take too many snapshots,
    you may start to feel some disk space pressure. It is a good idea to delete any
    snapshots you no longer need.


    ## LiveSQL


    Oracle has provided a testbed for our use they call LiveSQL. This testbed is a
    web-based query tool interacting with a real Oracle database. Anyone can access
    LiveSQL by pointing their web browser to [`http://livesql.oracle.com`](http://livesql.oracle.com)
    and start playing around. In the upper right corner, click the Sign In link and
    use the same Oracle credentials to access the Oracle Technology Network or My
    Oracle Support. On the left side, click the SQL Worksheet item, as shown in Figure
    [10-7](#467924_1_En_10_Chapter.xhtml#Fig7).


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig7_HTML.jpg](images/467924_1_En_10_Chapter/467924_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    LiveSQL


    At the time this chapter was written, Oracle 18c was available only in the cloud,
    which is why we did not use that version for our testbed. As you can see in Figure
    [10-7](#467924_1_En_10_Chapter.xhtml#Fig7), LiveSQL uses the latest and greatest
    version of Oracle. LiveSQL is a great way to use a new version that has not yet
    been released for on-premises use and begin testing out new features. As this
    book was being edited, LiveSQL now uses the 19c version which is not available
    for on-premise installation. 


    To enter any query, type it into the SQL Worksheet and then click the Run button.
    You can enter any valid SQL statement, even creating tables and populating them
    with data. Figure [10-8](#467924_1_En_10_Chapter.xhtml#Fig8) shows a table with
    some test data loaded into my LiveSQL schema.


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig8_HTML.jpg](images/467924_1_En_10_Chapter/467924_1_En_10_Fig8_HTML.jpg)


    Figure 10-8


    LiveSQL Emp table


    You can also store scripts in your LiveSQL account for future recall.


    LiveSQL is not to be used for production purposes but it serves as a great testbed,
    especially for those that do not have access to the latest and greatest Oracle
    version. LiveSQL also is a great testbed when you do not want to spend the time
    spinning up a virtual machine, installing Oracle, and creating a database. That
    being said, LiveSQL is not a great testbed for practicing database restores or
    other tasks where you need access to the database server.'
  trans: '

    # 快照


    虚拟化技术使得创建系统当前状态的时间点快照变得容易。如果数据库管理员后续操作导致系统出现问题，他们可以回滚到快照状态，就像从未做过任何更改一样，快速恢复运行。一些虚拟机管理程序允许您在系统运行时创建快照，而另一些则要求虚拟机处于关闭状态。


    在 Oracle VM VirtualBox Manager 中，单击我们为本书创建的虚拟机。然后，点击如图 10-1 所示的 Machine Tools
    图标的下拉箭头，选择 Snapshots。


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig1_HTML.jpg](img/467924_1_En_10_Fig1_HTML.jpg)


    *图 10-1 VirtualBox Machine Tools 图标*


    您应该看到尚未创建任何快照。点击 Take 按钮来创建您的第一个快照。VirtualBox 将弹出一个如图 10-2 所示的对话框，您可以在其中定义快照的名称和描述。


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig2_HTML.jpg](img/467924_1_En_10_Fig2_HTML.jpg)


    *图 10-2 创建虚拟机快照*


    您可以输入任何有助于理解该特定快照的名称或描述。例如，您可能会在数据库升级前创建一个快照，并将其命名为 “升级前快照”。


    对运行 Oracle 数据库的虚拟机创建快照时，请确保数据库未运行；否则，将执行数据库的冷备份。这假设数据库的存储是虚拟机的一部分。如果存储位于虚拟机外部，您将需要以不同的方式处理数据库备份，很可能使用第
    7 章中讨论的技术。


    在 VirtualBox Manager 中，我们可以看到我们的快照。图 10-3 显示了快照，并且系统的当前状态是该快照的子项。


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig3_HTML.jpg](img/467924_1_En_10_Fig3_HTML.jpg)


    *图 10-3 VirtualBox Manager 中的虚拟机快照*


    我们还可以看到快照的创建日期和时间。在图 10-4 中，我们有一个作为现有快照子项的新快照。


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig4_HTML.jpg](img/467924_1_En_10_Fig4_HTML.jpg)


    *图 10-4 多个快照*


    要恢复到之前的快照，请先关闭虚拟机。选择要恢复的快照，然后单击 Restore 按钮。系统会弹出一个对话框要求您确认恢复。您将获得一个选项，可以选择先为当前机器创建一个快照，以便您可以返回到当前状态，如图
    10-5 所示。


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig5_HTML.jpg](img/467924_1_En_10_Fig5_HTML.jpg)


    *图 10-5 恢复快照选项*


    恢复操作完成后，我们可以看到已恢复的快照。请注意，在图 10-6 中，当前状态现在是我们所恢复到的快照的子项。


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig6_HTML.jpg](img/467924_1_En_10_Fig6_HTML.jpg)


    *图 10-6 快照已恢复*


    快照是一种很好的方式，可以让您回退到一个已知的、希望是良好的状态。每个快照都会占用一定的磁盘空间。如果您创建了太多快照，可能会开始感受到磁盘空间的压力。删除不再需要的快照是一个好习惯。


    # LiveSQL


    Oracle 为我们提供了一个名为 LiveSQL 的测试平台。这个平台是一个基于 Web 的查询工具，与一个真实的 Oracle 数据库交互。任何人都可以通过将
    Web 浏览器指向 [`http://livesql.oracle.com`](http://livesql.oracle.com) 来访问 LiveSQL
    并开始使用。在右上角，单击 Sign In 链接，使用相同的 Oracle 凭据访问 Oracle Technology Network 或 My Oracle
    Support。在左侧，单击 SQL Worksheet 项，如图 10-7 所示。


    ![../images/467924_1_En_10_Chapter/467924_1_En_10_Fig7_HTML.jpg](img/467924_1_En_10_Fig7_HTML.jpg)


    *图 10-7 LiveSQL*


    在撰写本章时，Oracle 18c 仅在云端可用，这就是为什么我们没有在测试平台中使用该版本。正如您在图 10-7 中所看到的，LiveSQL 使用的是最新最好的
