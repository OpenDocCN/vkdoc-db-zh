    ```


    我们已成功更新 OPatch，现在已准备好应用一些补丁。


    ### 提示


    OPatch 总是通过下载补丁 6880880 来更新。


    ## 季度补丁


    每个季度，Oracle 公司都会发布一批新的补丁。这些补丁在每年的一月、四月、七月和十月发布，通常在该月最接近 17 号的星期二发布。


    Oracle 只为完全支持的版本提供补丁。在下一章中，我们将讨论如何将数据库升级到更新的版本。季度补丁只是您希望保持数据库版本最新的原因之一。


    当 Oracle 公司最初开始发布季度补丁时，这些补丁只包含修复软件中安全漏洞的补丁。这些补丁被称为该季度的累积补丁更新（CPU）。顾名思义，补丁是累积的，这意味着为某个季度发布的补丁包含该季度的所有修复以及之前季度的修复。如果您像我们在测试环境中那样安装
    Oracle 12.2.0.1，您无需为该版本查找每一个发布的 CPU。只需应用最新、最好的 CPU，您就全部跟上了。


    跟上季度的 CPU 是帮助保护组织数据库基础设施安全的方法之一。许多组织都有规定必须应用安全补丁的政策。遗憾的是，有太多公司没有此类政策，导致数据库未打补丁，结果存在大量安全漏洞。如果您的组织没有任何此类政策，请与管理层合作制定一项，哪怕只为数据库。


    如果您希望在安全补丁发布时收到通知，请使用您的 Oracle 单点登录账户登录 [`http://otn.oracle.com`](http://otn.oracle.com)。然后将鼠标悬停在
    Account 按钮上并单击 Account 链接。接下来，单击 Subscriptions。展开名为“Oracle security notifications”的部分，并勾选
    Security Alerts 旁边的框。单击 Save 按钮。


    当季度补丁只包含安全修复时，下载和安装很容易，因为您只有一个选择。随着时间的推移，事情变得更加困难。Oracle 公司决定创建一种新的季度补丁类型，称为补丁集更新（PSU）。PSU
    包含相同的安全修复以及其他他们认为对所有人环境都安全的错误修复。当 PSU 创建时，CPU 重命名为安全补丁更新（SPU）。我认为他们本可以在首字母缩略词上做得更好，因为
    PSU 和 SPU 太相似了。Oracle 开始将 SPU 和 PSU 的集合称为 CPU。今天，如果您听到 CPU，它指的是季度补丁的集合。Oracle
    还将名称更改为关键补丁更新（Critical Patch Updates），但它们仍然是累积的。


    直到 Oracle 11.2，您每个季度都可以选择应用 SPU 或 PSU。世界各地的许多数据库管理员只应用 SPU，因为它对他们的 Oracle 环境引入的改动最少。然而，Oracle
    公司的官方建议是应用 PSU，但选择权在 DBA 手中。当 Oracle 12.1 发布时，该版本不再提供 SPU。Oracle 只为 12.1 版本发布
    PSU。Oracle 公司为 12c* 取消了这一选择。更令人困惑的是，建议在 Windows 上运行 Oracle 的 DBA 应用捆绑补丁（BP）而不是
    PSU。BP 包含 PSU 中的所有内容以及更多的错误修复。


    Oracle 12.2 改变了季度补丁。Oracle 12.2 引入了发布更新（RU）和发布更新修订版（RUR）补丁。发布更新（RU）包含安全修复和错误修复，就像
    PSU 一样。RU 还包含对 Oracle 优化器的修复，该优化器负责确定执行发送到数据库的所有 SQL 语句的有效方法。'
- fmt: '# Oracle 季度补丁概述


    ## 版本更新与RU/RUR说明


    At some point, `Oracle 18` was released. The following quarter, Oracle released
    the `18 RU`, which changes the Oracle version to `18.1`. The second `RU` changes
    the Oracle version to `18.2`, and so on. If you apply the `RU` to an `Oracle 18`
    database, you will have the most fixes you possibly can. Please note that applying
    the `RU` to an `Oracle 18` database changes the version to make it look as if
    an Oracle upgrade has taken place, but this is not the case. The `RU` is a patch,
    not an upgrade. Making the issue even more confusing is that applying the `RU`
    to an `Oracle 12.2` database does not change the version to `12.3` or higher.


    Some people do not like making so many changes to the Oracle Optimizer. One bad
    change can make the Optimizer choose inefficient execution plans, and application
    performance will suffer. Oracle provides us with the `RUR`, which contains the
    same security and bug fixes as the `RU` but does not have the Optimizer fixes
    in it, which means the `RUR` keeps the Optimizer at the same level of functionality.
    The first quarter after `Oracle 18` was released, only the `RU` was available.
    The second quarter, the DBA had a choice to apply the next `RU` or apply the `RUR`.
    However, the Optimizer changes are frozen for only six months, so the `RUR` only
    buys you a little time. Oracle Corporation is recommending you apply the `RU`
    every quarter. Their position is that the `RUR` is only for special circumstances.


    ## 版本补丁建议


    All of that can be confusing, especially with all of the acronyms. To make matters
    easier, the following are the recommendations for each Oracle version for your
    quarterly patches. Unless you have a specific reason, follow Oracle’s recommendation
    to determine which quarterly patch to apply.


    *   Versions prior to `11.2.0.4`: Upgrade to a more recent version

    *   `Oracle 11.2.0.4`: Apply the `PSU`

    *   `Oracle 12.1`: Apply the `PSU` (or `BP` if on Windows)

    *   `Oracle 12.2`: Apply the `RU`

    *   `Oracle 18` and `19`: Apply the `RU`


    ## 如何获取季度补丁


    For some reason that I have never been able to figure out, getting these quarterly
    patches is not as easy as you might think. Oracle publishes a link for us, but
    you need to click a few more times before you can actually download the patch.
    We will walk through how to find the quarterly patch. Point a web browser to [`http://otn.oracle.com`](http://otn.oracle.com)
    and look for the box titled Essential Links, partially shown in Figure [17-2](#467924_1_En_17_Chapter.xhtml#Fig2).


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig2_HTML.jpg](images/467924_1_En_17_Chapter/467924_1_En_17_Fig2_HTML.jpg)

    *Figure 17-2 OTN Essential Links*


    In that list, you can see the link for Critical Patch Updates. Click that link.
    Note that you can find a similar link on the Dashboard of My Oracle Support. Either
    link takes you to the Critical Path Updates, Security Alerts and Bulletins page.
    Scroll down just a bit until you see the section titled Critical Patch Updates,
    shown in Figure [17-3](#467924_1_En_17_Chapter.xhtml#Fig3).


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig3_HTML.jpg](images/467924_1_En_17_Chapter/467924_1_En_17_Fig3_HTML.jpg)

    *Figure 17-3 CPU links*


    The first part of this section tells you the next four CPU release dates so that
    you are informed in advance. The table that follows contains a link to each quarter’s
    patches. You can download every CPU for the past few years, but there is rarely
    a reason to download anything but the most recent CPU, which is at the top of
    the table. Click the most recent CPU link.


    The next page is the Critical Patch Update Advisory for that quarter. The table
    that follows the description contains patches for each and every Oracle product
    they provide. The list is quite extensive and in alphabetical order. You need
    to scroll down to find Oracle Database Server, as shown in Figure [17-4](#467924_1_En_17_Chapter.xhtml#Fig4).


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig4_HTML.jpg](images/467924_1_En_17_Chapter/467924_1_En_17_Fig4_HTML.jpg)

    *Figure 17-4 Oracle Database Server link*


    Do not click the link on the left with the different versions in it. Instead,
    click the link on the right side of that table that says just Database. You will
    then be asked to provide credentials to connect to `MOS` if you have not authenticated
    recently. Everything up to this point is in the public domain, but the next page
    is a `MOS Note`, which means you need a paid support contract.


    The `MOS Note` for the quarterly patch provides relevant information you will
    want to read. One section details what is new for that quarter. In the section
    of new information, Oracle provides what they call Post Release Patches. When
    the `CPU` is first released, it is only available for a handful of platforms.
    Other platforms are released a short period of time later. This section will tell
    you when those platforms are scheduled to release that quarter’s patch.


    Section 3 of this `MOS Note` gives details on the patch. I am only interested
    in patches for Oracle Database at this time. Section 3.1.4, shown in Figure [17-5](#467924_1_En_17_Chapter.xhtml#Fig5),
    lists links to patches for each currently supported version.


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig5_HTML.jpg](images/467924_1_En_17_Chapter/467924_1_En_17_Fig5_HTML.jpg)

    *Figure 17-5 Oracle Database version list*


    Our testbed contains the `12.2.0.1` version, so click that link to be taken to
    Section 3.1.4.3. If you have a different Oracle version, you can click appropriately.
    Notice that the version list is pretty short. Only supported versions are shown.
    Any version not on the list is unsupported and will not receive the quarterly
    patches. You must upgrade to one of the versions on the list.


    After clicking the database version, the browser will show a table listing the
    patches for that version. After all of that clicking, we are now at a place where
    we can see the patch numbers to download. If you want to include the Oracle Java
    Virtual Machine (`OJVM`) patches, they are in the first box in the table. The
    second box is shown in Figure [17-6](#467924_1_En_17_Chapter.xhtml#Fig6) and it
    does not contain the `OJVM` patches.


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig6_HTML.jpg](images/467924_1_En_17_Chapter/467924_1_En_17_Fig6_HTML.jpg)

    *Figure 17-6 Oracle CPU patch links*


    Our testbed is on Linux, which is in the UNIX category. Click the Patch `28163133`
    link in the table shown in Figure [17-6](#467924_1_En_17_Chapter.xhtml#Fig6) (this
    patch is the first one listed in the second row of the table).


    The next page contains a link for each of the UNIX platforms. Scroll down to the
    line for the Linux x86-64 platform and click the link to the left. We can see
    in Figure [17-7](#467924_1_En_17_Chapter.xhtml#Fig7) that this is just one of
    many patches on the page. Also notice that because this is an `Oracle 12.2` database,
    we are downloading a Release Update (`RU`) type of patch.


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig7_HTML.jpg](images/467924_1_En_17_Chapter/467924_1_En_17_Fig7_HTML.jpg)

    *Figure 17-7 Patch download for Linux*


    If you click the wrong hyperlink, you will have problems installing the patches
    on your system. Make sure you selected the proper one. On the next screen, shown
    in Figure [17-8](#467924_1_En_17_Chapter.xhtml#Fig8), make sure the platform is
    correct. Even though you may have clicked the correct hyperlink for your platform,
    there are times `MOS` gets it wrong here, so double-check the platform.


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig8_HTML.jpg](images/467924_1_En_17_Chapter/467924_1_En_17_Fig8_HTML.jpg)

    *Figure 17-8 PSU Platform Selection*


    You can view the patch’s Readme file by clicking the Read Me button. The Readme
    file will also be in the download. Click the `Download` button and the screen
    in Figure [17-9](#467924_1_En_17_Chapter.xhtml#Fig9) will appear.


    ![../images/467924_1_En_17_Chapter/467924_1_En_17_Fig9_HTML.jpg](images/467924_1_En_17_Chapter/467924_1_En_17_Fig9_HTML.jpg)

    *Figure 17-9 Download link*'
