- fmt: 'Thankfully, we do not have to read this raw trace file. Introduced in Chapter
    11, Oracle provides a nice utility called `tkprof` that will format the trace
    file into something more human readable. We can call the `tkprof` utility by passing
    it two parameters, the trace file and the output file. Listing 12-18 shows how
    to use the `tkprof` utility for our raw trace file.


    ```

    [oracle@dbamentor trace]$ tkprof orcl_ora_5765.trc tkprof.out

    TKPROF: Release 12.2.0.1.0 - Development on Tue Jul 31 09:40:13 2018

    Copyright (c) 1982, 2017, Oracle and/or its affiliates. All rights reserved.

    Listing 12-18

    tkprof Execution

    ```


    In the example above, the output will be placed in a file named `tkprof.out`.
    If we look at the file’s contents, we can see the information presented in a form
    that is much easier to read, as shown in Listing 12-19.


    ```

    SQL ID: az5q2d6stbstg Plan Hash: 1388734953

    select ''this is my trace'',sysdate

    from

    dual

    call     count     cpu    elapsed     disk     query    current       rows

    ------- ------  ------ ---------- -------- --------- ----------  ---------

    Parse        1    0.00       0.00        0         0          0          0

    Execute      1    0.00       0.00        0         0          0          0

    Fetch        2    0.00       0.00        0         0          0          1

    ------- ------  ------ ---------- -------- --------- ----------  ---------

    total        4    0.00       0.00        0         0          0          1

    Listing 12-19

    tkprof Output

    ```


    From the output above, we can easily see the three phases of the SQL statement.


    The `tkprof` utility has many options to help format the trace file to suit your
    specific needs. Just type `tkprof` with no additional parameters and the utility
    will display some helpful information. One of my favorite ways to use `tkprof`
    is to sort the SQL statements in order of the elapsed run time so that the longest-running
    SQL statement is last in the output. If a user is experiencing slowness, it is
    often the longest-running SQL statement causing them the most pain.


    It is very common for the end user to be unable to issue the `ALTER SESSION` command
    to start the SQL Trace. End users typically access the database through some application
    that does not let them enter any SQL statement they want. Oracle includes the
    ability for the DBA to start a trace in that user’s session. The DBA just needs
    to determine the session’s identifier and serial number. In the example in Listing
    12-20, the DBA has queried `V$SESSION` to learn those values. Once known, the
    DBA calls the `DBMS_MONITOR` package to start a trace in that session. After a
    period of time, the DBA ends the trace.


    ```

    SQL> select sid,serial# from v$session

    2  where username=''PEASLAND'';

    SID    SERIAL#

    ---------- ----------

    61      21753

    SQL> exec dbms_monitor.session_trace_enable(session_id=>61,serial_num=>21753);

    PL/SQL procedure successfully completed.

    SQL> exec dbms_monitor.session_trace_disable(session_id=>61,serial_num=>21753);

    PL/SQL procedure successfully completed.

    Listing 12-20

    SQL Trace in Another Session

    ```


    The resulting trace file is no different than if the user issued the `ALTER SESSION`
    command on their own.


    This section has introduced SQL Trace and the `tkprof` utility. The ability to
    trace a user’s actions and the SQL statements they execute is a valuable tool
    for the database administrator. Most of the time, a SQL Trace is used when trying
    to resolve performance problems. Performance tuning is a large topic and is not
    going to be discussed in this book. If you want to learn more about performance
    tuning, the Oracle documentation is a great place to start, as we will discuss
    in the next chapter.


    SQL Trace files are also useful when trying to determine which SQL statement is
    resulting in an error when you do not have access to the application code. For
    example, the application is telling the user that an `ORA-00942` error has been
    reached. The database administrator can start a trace in their session and then
    search the resulting trace file for `942` to see which SQL statement is getting
    this error.


    ## ADRCI


    It used to be, prior to Oracle 11*g*, that the database administrator needed to
    manage all the trace files. Oracle does not remove the files automatically, so
    the DBA needed a regularly scheduled job to remove files older than a specific
    period of time. The other problem with these trace files was that if you needed
    to enlist the help of Oracle Support to resolve an issue, they often requested
    a trace file or two and the DBA had a challenging time identifying the files that
    Support needed. The DBA then sent all trace files to Oracle Support. Oracle now
    includes the Automatic Diagnostic Repository Command Interpreter (`adrci`), which
    is a command-line utility to manage these trace files.


    Let’s start by seeing how `adrci` can help package up the trace files Oracle Support
    may need to resolve an issue. In Listing 12-21, we start by asking `adrci` to
    give us a list of problems it has tracked in our Oracle database.


    ```

    adrci> show problem

    ADR Home = /u01/app/oracle/diag/rdbms/orcl/orcl:

    *************************************************************************

    PROBLEM_ID   PROBLEM_KEY   LAST_INCIDENT  LASTINC_TIME

    ------------ -----------   -------------  ---------------------------------

    3            ORA 445       222031         2016-12-10 04:30:31.338000 -06:00

    Listing 12-21

    adrci Problems

    ```


    Only one problem is logged here. Let’s create a package to send to Oracle Support,
    shown in Listing 12-22.


    ```

    adrci> set home diag/rdbms/mspstg/mspstg

    adrci> ips create package problem 3 correlate all

    Created package 1 based on problem id 3, correlation level all

    adrci> ips generate  package 1 in "/home/oracle"

    Generated package 1 in file /home/oracle/IPSPKG_20180731101513_COM_1.zip, mode
    complete

    Listing 12-22

    adrci Creating Package

    ```


    The `adrci` utility has created a zip file for us to upload to Oracle Support.
    Do not worry if all of the `adrci` commands sound confusing. Oracle Support will
    provide all the instructions you will need should they want you to send them trace
    files this way.


    Prior to `adrci`, the database administrator had to take matters into their own
    hands in managing the trace files. Leave them on the server for too long and the
    storage will fill up. On Unix/Linux systems, database administrators often used
    commands in `crontab` to schedule the removal of trace files older than a certain
    age. The problem was that the DBA needed to remove trace files from multiple subdirectories.
    If a new version of Oracle was released, the routine to purge old files needed
    to be updated.


    The `adrci` can remove trace files and handle any changes a future version might
    throw at you. The command to remove the trace files is very simple, as shown in
    Listing 12-23.


    ```

    adrci> purge -age 10080 -type trace

    Listing 12-23

    ADRCI Purge Trace Files

    ```


    The command above will remove any files older than 10,080 minutes, or 7 days.
    All the DBA needs to do is put this in a script and schedule it on the database
    server.'
  raw: 'Thankfully, we do not have to read this raw trace file. Introduced in Chapter
    [11](#467924_1_En_11_Chapter.xhtml), Oracle provides a nice utility called tkprof
    that will format the trace file into something more human readable. We can call
    the tkprof utility by passing it two parameters, the trace file and the output
    file. Listing [12-18](#467924_1_En_12_Chapter.xhtml#PC19) shows how to use the
    tkprof utility for our raw trace file.


    ```

    [oracle@dbamentor trace]$ tkprof orcl_ora_5765.trc tkprof.out

    TKPROF: Release 12.2.0.1.0 - Development on Tue Jul 31 09:40:13 2018

    Copyright (c) 1982, 2017, Oracle and/or its affiliates. All rights reserved.

    Listing 12-18

    tkprof Execution

    ```


    In the example above, the output will be placed in a file named tkprof.out. If
    we look at the file’s contents, we can see the information presented in a form
    that is much easier to read, as shown in Listing [12-19](#467924_1_En_12_Chapter.xhtml#PC20).


    ```

    SQL ID: az5q2d6stbstg Plan Hash: 1388734953

    select ''this is my trace'',sysdate

    from

    dual

    call     count     cpu    elapsed     disk     query    current       rows

    ------- ------  ------ ---------- -------- --------- ----------  ---------

    Parse        1    0.00       0.00        0         0          0          0

    Execute      1    0.00       0.00        0         0          0          0

    Fetch        2    0.00       0.00        0         0          0          1

    ------- ------  ------ ---------- -------- --------- ----------  ---------

    total        4    0.00       0.00        0         0          0          1

    Listing 12-19

    tkprof Output

    ```


    From the output above, we can easily see the three phases of the SQL statement.


    The tkprof utility has many options to help format the trace file to suit your
    specific needs. Just type “tkprof” with no additional parameters and the utility
    will display some helpful information. One of my favorite ways to use tkprof is
    to sort the SQL statements in order of the elapsed run time so that the longest-running
    SQL statement is last in the output. If a user is experiencing slowness, it is
    often the longest-running SQL statement causing them the most pain.


    It is very common for the end user to be unable to issue the ALTER SESSION command
    to start the SQL Trace. End users typically access the database through some application
    that does not let them enter any SQL statement they want. Oracle includes the
    ability for the DBA to start a trace in that user’s session. The DBA just needs
    to determine the session’s identifier and serial number. In the example in Listing
    [12-20](#467924_1_En_12_Chapter.xhtml#PC21), the DBA has queried V$SESSION to
    learn those values. Once known, the DBA calls the DBMS_MONITOR package to start
    a trace in that session. After a period of time, the DBA ends the trace.


    ```

    SQL> select sid,serial# from v$session

    2  where username=''PEASLAND'';

    SID    SERIAL#

    ---------- ----------

    61      21753

    SQL> exec dbms_monitor.session_trace_enable(session_id=>61,serial_num=>21753);

    PL/SQL procedure successfully completed.

    SQL> exec dbms_monitor.session_trace_disable(session_id=>61,serial_num=>21753);

    PL/SQL procedure successfully completed.

    Listing 12-20

    SQL Trace in Another Session

    ```


    The resulting trace file is no different than if the user issued the ALTER SESSION
    command on their own.


    This section has introduced SQL Trace and the tkprof utility. The ability to trace
    a user’s actions and the SQL statements they execute is a valuable tool for the
    database administrator. Most of the time, a SQL Trace is used when trying to resolve
    performance problems. Performance tuning is a large topic and is not going to
    be discussed in this book. If you want to learn more about performance tuning,
    the Oracle documentation is a great place to start, as we will discuss in the
    next chapter.


    SQL Trace files are also useful when trying to determine which SQL statement is
    resulting in an error when you do not have access to the application code. For
    example, the application is telling the user that an ORA-00942 error has been
    reached. The database administrator can start a trace in their session and then
    search the resulting trace file for 942 to see which SQL statement is getting
    this error.


    ## ADRCI


    It used to be, prior to Oracle 11*g*, that the database administrator needed to
    manage all the trace files. Oracle does not remove the files automatically, so
    the DBA needed a regularly scheduled job to remove files older than a specific
    period of time. The other problem with these trace files was that if you needed
    to enlist the help of Oracle Support to resolve an issue, they often requested
    a trace file or two and the DBA had a challenging time identifying the files that
    Support needed. The DBA then sent all trace files to Oracle Support. Oracle now
    includes the Automatic Diagnostic Repository Command Interpreter (adrci), which
    is a command-line utility to manage these trace files.


    Let’s start by seeing how adrci can help package up the trace files Oracle Support
    may need to resolve an issue. In Listing [12-21](#467924_1_En_12_Chapter.xhtml#PC22),
    we start by asking adrci to give us a list of problems it has tracked in our Oracle
    database.


    ```

    adrci> show problem

    ADR Home = /u01/app/oracle/diag/rdbms/orcl/orcl:

    *************************************************************************

    PROBLEM_ID   PROBLEM_KEY   LAST_INCIDENT  LASTINC_TIME

    ------------ -----------   -------------  ---------------------------------

    3            ORA 445       222031         2016-12-10 04:30:31.338000 -06:00

    Listing 12-21

    adrci Problems

    ```


    Only one problem is logged here. Let’s create a package to send to Oracle Support,
    shown in Listing [12-22](#467924_1_En_12_Chapter.xhtml#PC23).


    ```

    adrci> set home diag/rdbms/mspstg/mspstg

    adrci> ips create package problem 3 correlate all

    Created package 1 based on problem id 3, correlation level all

    adrci> ips generate  package 1 in "/home/oracle"

    Generated package 1 in file /home/oracle/IPSPKG_20180731101513_COM_1.zip, mode
    complete

    Listing 12-22

    adrci Creating Package

    ```


    The adrci utility has created a zip file for us to upload to Oracle Support. Do
    not worry if all of the adrci commands sound confusing. Oracle Support will provide
    all the instructions you will need should they want you to send them trace files
    this way.


    Prior to adrci, the database administrator had to take matters into their own
    hands in managing the trace files. Leave them on the server for too long and the
    storage will fill up. On Unix/Linux systems, database administrators often used
    commands in crontab to schedule the removal of trace files older than a certain
    age. The problem was that the DBA needed to remove trace files from multiple subdirectories.
    If a new version of Oracle was released, the routine to purge old files needed
    to be updated.


    The adrci can remove trace files and handle any changes a future version might
    throw at you. The command to remove the trace files is very simple, as shown in
    Listing [12-23](#467924_1_En_12_Chapter.xhtml#PC24).


    ```

    adrci> purge -age 10080 -type trace

    Listing 12-23

    ADRCI Purge Trace Files

    ```


    The command above will remove any files older than 10,080 minutes, or 7 days.
    All the DBA needs to do is put this in a script and schedule it on the database
    server.'
  trans: '幸运的是，我们无需直接阅读这个原始跟踪文件。第 11 章介绍过，Oracle 提供了一个实用的工具`tkprof`，它能将跟踪文件格式化为更便于人类阅读的形式。我们可以通过向`tkprof`工具传递两个参数（即跟踪文件和输出文件）来调用它。清单
    12-18 展示了如何对我们的原始跟踪文件使用`tkprof`工具。


    ```

    [oracle@dbamentor trace]$ tkprof orcl_ora_5765.trc tkprof.out

    TKPROF: Release 12.2.0.1.0 - Development on Tue Jul 31 09:40:13 2018

    Copyright (c) 1982, 2017, Oracle and/or its affiliates. All rights reserved.

    清单 12-18

    tkprof 执行

    ```


    在上面的例子中，输出将被放置在名为`tkprof.out`的文件中。如果我们查看该文件的内容，可以看到信息以一种*更易阅读*的形式呈现，如清单 12-19
    所示。


    ```

    SQL ID: az5q2d6stbstg Plan Hash: 1388734953

    select ''this is my trace'',sysdate

    from

    dual

    调用     次数     CPU 时间    耗时       磁盘读    查询量    当前量       行数

    ------- ------  ------ ---------- -------- --------- ----------  ---------

    解析        1    0.00       0.00        0         0          0          0

    执行        1    0.00       0.00        0         0          0          0

    获取        2    0.00       0.00        0         0          0          1

    ------- ------  ------ ---------- -------- --------- ----------  ---------

    总计        4    0.00       0.00        0         0          0          1

    清单 12-19

    tkprof 输出

    ```


    从上面的输出中，我们可以轻松地看到 SQL 语句的三个阶段。


    `tkprof`工具有许多选项，可以帮助格式化跟踪文件以满足你的特定需求。只需输入不带任何额外参数的`tkprof`，该工具就会显示一些有用的信息。我最喜欢的一种使用`tkprof`的方式是，按语句的**运行耗时**排序
    SQL 语句，这样运行时间最长的 SQL 语句就会出现在输出的最后。如果用户遇到响应缓慢的问题，通常正是这个运行时间最长的 SQL 语句给他们带来了最大的痛苦。


    最终用户无法发出`ALTER SESSION`命令来启动 SQL 跟踪，这种情况非常常见。最终用户通常通过某个应用程序访问数据库，而该应用程序不允许他们输入任意的
    SQL 语句。Oracle 允许 DBA 在该用户的会话中启动跟踪。DBA 只需要确定该会话的标识符和序列号。在清单 12-20 的例子中，DBA 通过查询`V$SESSION`获取了这些值。一旦获知，DBA
    就调用`DBMS_MONITOR`包来启动该会话的跟踪。经过一段时间后，DBA 结束跟踪。


    ```

    SQL> select sid,serial# from v$session

    2  where username=''PEASLAND'';

    SID    SERIAL#

    ---------- ----------

    61      21753

    SQL> exec dbms_monitor.session_trace_enable(session_id=>61,serial_num=>21753);

    PL/SQL 过程已成功完成。

    SQL> exec dbms_monitor.session_trace_disable(session_id=>61,serial_num=>21753);

    PL/SQL 过程已成功完成。

    清单 12-20

    在其他会话中启动 SQL 跟踪

    ```


    生成的跟踪文件与用户自行发出`ALTER SESSION`命令所生成的文件没有区别。


    本节介绍了 SQL Trace 和`tkprof`工具。能够跟踪用户操作及其执行的 SQL 语句，是数据库管理员一个有价值的工具。大多数情况下，SQL Trace
    用于尝试解决性能问题。性能调优是一个很大的话题，本书不作讨论。如果你想了解更多关于性能调优的知识，Oracle 文档是一个很好的起点，我们将在下一章讨论。


    当你无法访问应用程序代码，却又需要确定是哪条 SQL 语句导致了错误时，SQL Trace 文件也很有用。例如，应用程序告知用户出现了`ORA-00942`错误。数据库管理员可以在该用户的会话中启动跟踪，然后在生成的跟踪文件中搜索`942`，以查看是哪条
    SQL 语句出现了这个错误。


    ## ADRCI


    在 Oracle 11*g*之前，数据库管理员需要管理所有的跟踪文件。Oracle 不会自动删除这些文件，因此 DBA 需要一个定期执行的作业，来删除超过特定时间的旧文件。这些跟踪文件的另一个问题是，如果你需要寻求
    Oracle 支持的帮助来解决问题，他们通常会要求提供一两个跟踪文件，而 DBA 很难确定支持部门需要哪些文件。于是 DBA 就把所有的跟踪文件都发送给 Oracle
    支持。Oracle 现在包含了自动诊断资料库命令解释器（`adrci`），这是一个用来管理这些跟踪文件的命令行实用程序。


    让我们首先看看`adrci`如何帮助打包 Oracle 支持可能需要用于解决问题的跟踪文件。在清单 12-21 中，我们首先要求`adrci`列出它在我们的
    Oracle 数据库中跟踪到的问题。


    ```

    adrci> show problem

    ADR Home = /u01/app/oracle/diag/rdbms/orcl/orcl:

    *************************************************************************

    问题 ID   问题键     最后事件 ID  最后事件时间

    ------------ -----------   -------------  ---------------------------------

    3            ORA 445       222031         2016-12-10 04:30:31.338000 -06:00

    清单 12-21

    adrci 问题列表

    ```


    这里只记录了一个问题。让我们创建一个包发送给 Oracle 支持，如清单 12-22 所示。


    ```

    adrci> set home diag/rdbms/mspstg/mspstg

    adrci> ips create package problem 3 correlate all

    基于问题 ID 3 创建了包 1，关联级别为全部

    adrci> ips generate package 1 in "/home/oracle"

    在文件 /home/oracle/IPSPKG_20180731101513_COM_1.zip 中生成了包 1，模式为完整

    清单 12-22

    adrci 创建包

    ```


    `adrci`工具已经为我们创建了一个 zip 文件，可以上传给 Oracle 支持。如果所有这些`adrci`命令听起来令人困惑，请不要担心。如果 Oracle
    支持需要你以这种方式发送跟踪文件，他们会提供所有必要的指导。


    在`adrci`出现之前，数据库管理员必须自己动手管理跟踪文件。将文件留在服务器上太久，存储空间就会被占满。在 Unix/Linux 系统上，数据库管理员经常使用`crontab`中的命令来安排删除超过一定时间的跟踪文件。问题在于
    DBA 需要从多个子目录中删除跟踪文件。如果 Oracle 发布了新版本，用于清理旧文件的例程也需要更新。


    `adrci`可以删除跟踪文件，并能处理未来版本可能带来的任何变化。删除跟踪文件的命令非常简单，如清单 12-23 所示。


    ```

    adrci> purge -age 10080 -type trace

    清单 12-23

    ADRCI 清理跟踪文件

    ```


    上面的命令将删除所有超过 10,080 分钟（即 7 天）的文件。DBA 需要做的就是将这个命令放入一个脚本中，并在数据库服务器上安排定时执行。'
- fmt: '## Moving On


    This chapter has shown us where the various diagnostic and trace files reside
    on the database server. We have seen a few examples of how to use the Alert Log
    and other trace files to help with problem resolution. This chapter also has shown
    us how to start a SQL Trace in order for the DBA to get information on the SQL
    statements the end user issues to the database. Trace files can be difficult to
    read, but they are necessary to decipher to obtain diagnostic data to help resolve
    issues. At the very least, they will be sent to Oracle support for an analyst
    to read.


    The next chapter will focus on a subject that too many Oracle professionals seem
    to despise, the Oracle documentation. Do not skip the next chapter as it contains
    important information that you will need to grow your Oracle DBA career. The reason
    many people do not like the documentation is because it is so voluminous that
    it becomes difficult to find what you are looking for. The next chapter will sort
    this out for you and help you learn to find what you need to know.


    # 13. Oracle Documentation


    In the first eight chapters, we discussed some introductory material and set up
    our testbed. In Chapters [9](#467924_1_En_9_Chapter.xhtml)–[12](#467924_1_En_12_Chapter.xhtml)
    we then turned to the topic of using our Oracle database, where we spent time
    connecting to Oracle, running test cases, and examining various tools we will
    use in our administration duties.


    This chapter shifts focus to learning more about Oracle. My primary reason for
    writing this book was to teach you how to become a self-sufficient DBA. Technology
    books are a great resource and I have a large number of them on my bookshelf,
    but most technology books are self-contained guides that teach you what is written
    but do not help you expand upon that knowledge going forward. As I’ve said before,
    what makes this book different is that it will teach you to learn on your own.
    This chapter and the three that follow are at the heart of what you need to focus
    on as you read this book.


    If you work with other database systems, you can still leverage the techniques
    in these four chapters to help grow your career there as well. We will be covering
    the Oracle product documentation in this chapter, the data dictionary in the next
    chapter, Oracle’s support site in Chapter [15](#467924_1_En_15_Chapter.xhtml),
    and using social media in Chapter [16](#467924_1_En_16_Chapter.xhtml). If you
    are working with another database platform, such as SQL Server or DB2, then you
    can reference its documentation set, data dictionary, support sites, and related
    social media sites. The ideas hold as you move from platform to platform. I’ve
    even used these same focus areas to learn about non-database systems as well.
    You have probably been using some of them thus far in your career.


    In the end, no one can teach you everything you will possibly need to know for
    your DBA career. You will have to spend time learning more. Undoubtedly, you will
    rely on multiple sources of information to help you learn more so that you can
    do your job. All of the great database administrators I know are very adept at
    leveraging each of the avenues of information presented here and in Chapters [14](#467924_1_En_14_Chapter.xhtml)
    through [16](#467924_1_En_16_Chapter.xhtml). This is not an accident.


    The primary source of information for the many Oracle experts out there in the
    world is the Oracle documentation, as we discuss in this chapter. During my career,
    I’ve seen too many Oracle professionals that avoid the Oracle documentation set
    at all costs. The documentation is their resource of last resort. Readers of this
    book will know that the documentation should be one of your first stops when you
    need more information. When I ask people why they do not look up the information
    in the Oracle documentation, they may give me examples of errors in the books.
    Fair enough. Any book can have errors. As I dig deeper, I almost always conclude
    the person doesn’t like the documentation because it is hard to use. In this chapter,
    you will find out how easy and beneficial the documentation is.


    ## RTFM


    You may have seen the acronym before. The polite version is Read The Fine Manual.
    There is a more offensive version of the acronym that you’ll likely hear in the
    field, which does not need to be repeated here. If you ever ask anyone a question
    and they reply with “RTFM,” they are telling you the answer is in the documentation.
    No matter if the responder to your question has a polite or rude intent, the direction
    you need to pursue is to look in the documentation.


    As any parent can tell you, one of their jobs is to help teach their children
    how to be polite members of society. We are continually reminding our kids to
    say “please” and “thank you.” The other day my son asked me, “Can you help me
    please?” and I told him I would. The next words he said were “come here.” I always
    tell my kids that if they want someone’s help, they should burden them as little
    as possible. I tell them “If you want my help, you come to me.” For some reason
    I always think of this when I hear an RTFM question. You want my help in finding
    your Oracle answer, but you’re not willing to do a little work to look it up yourself?
    Oracle professionals that answer questions do it willingly of their own time.
    They do not like to be bothered with simple questions you could answer yourself.
    We are not here to do your job for you. If you ever ask a question that is a candidate
    for an RTFM response, make sure you preemptively point out that you already looked
    in the Oracle documentation and are having difficulty finding the answer, if it
    is there.


    Every Oracle guru I have ever met has spent countless hours poring over Oracle’s
    documentation set. I have long been of the opinion that part of the reason they
    are so good at this job is because of the time spent with the documentation. It’s
    not the only reason they are experts in their field, but I can definitively say
    that I have never met an Oracle expert or guru that has not read the documentation.
    If you want to grow your Oracle DBA career, then reading the Oracle documentation
    is important. If you read the Oracle documentation guides I discuss in this book
    and take some time to learn what is in them, you can easily find yourself as one
    of the top database administrators. All of the top DBAs have read the documentation
    over and over again, and they will tell you to do the same. Probably the most
    important guide for the DBA is the `Oracle Database Concepts Guide`, which we
    will discuss in this chapter. If you really want to be one of the best Oracle
    DBAs around, you will know the information in the `Oracle Database Concepts Guide`
    very well.


    If you want to raise yourself to guru status, you need to study the documentation
    with a fine-toothed comb. Pour over every detail. Take the examples given in the
    documentation and use them to form test cases and play around with the concept.
    I’m always amazed when I read a blog post by some guru-level DBA who has taken
    a small section of the Oracle documentation that I have completely glossed over
    and has examined every minute detail.


    I hope I’ve convinced you that you need to use the Oracle documentation to improve
    your skill set and advance your career. So far in this book, I have referred you
    to the `Database Installation Guides` (Chapter [5](#467924_1_En_5_Chapter.xhtml));
    the `Database Backup and Recovery User’s Guide` and `Database Backup and Recovery
    Reference` (Chapter [7](#467924_1_En_7_Chapter.xhtml)); and the `Database 2 Day
    + Security Guide` and `Database Security Guide` (Chapter [8](#467924_1_En_8_Chapter.xhtml)).
    I have left it to you to pursue those guides in the documentation set for reading
    on your own. The decision to leave it up to you, the reader, is a purposeful one.
    **You must get used to the idea of reading the documentation.**'
