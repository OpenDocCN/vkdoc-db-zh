- fmt: '## The Complexity


    If you talk to experts in the capacity planning field, they will be more than
    happy to let you know how complex and important their work is to ensure a successful
    operational environment for today and for the future. While I am not trying to
    dismiss or demean their efforts, I take a more simplistic approach to capacity
    planning, as I will outline in this chapter. My approach has served me well over
    the course of my DBA career. After reading this chapter, you may find you need
    more and want to be more detailed in your capacity planning efforts. If this chapter
    falls short of what you need for capacity planning going forward, then by all
    means learn more about the subject on your own and after you read this chapter
    to become more in-depth on the subject than I usually am. For many of you, the
    information in this chapter will provide much of what you need and you can probably
    sustain your database administrator career with it.


    When I first started in this business, resources for a computer system were in
    very limited supply. Software developers squeezed every single byte of memory.
    It was a common task to refactor one’s code into more efficient, smaller bodies
    of work that did the same thing so as to use less memory. Back then, disk space
    was very limited and DBAs only stored the information they needed and nothing
    more. If you asked for more memory or more disk space, you needed to know exactly
    how much more. Organizations did not buy more than was necessary.


    I remember when I first started as an Oracle DBA that I had discovered an Excel
    spreadsheet where you plugged in a few values, and the document would tell you
    exactly how big an index was going to be. You put in the index’s column datatype
    and precision, added the expected number of rows, and the spreadsheet factored
    that information, along with all of the Oracle overhead needed for an index, and
    one of the cells magically gave you a figure in kilobytes. To be honest, this
    spreadsheet was actually very good for the Oracle versions of that day. I remember
    using it to get an estimate for the index size, then creating the index in real
    life and the estimate was proven to be very good, time after time.


    After using this spreadsheet over and over again for a project, I came to the
    realization that there were many problems with this approach. For starters, this
    approach was very time consuming. The DBA had to fill in values in the spreadsheet,
    get the estimate, and then repeat for each and every index. I found it much easier
    to fill a table with sample data, create an index, and then ask Oracle how much
    space it required. If the sample data was approximately 10% of the expected data
    volume, I could then simply multiply the index’s size by a factor of ten and receive
    a good estimate. Not only would I have an estimate of the index’s size, but also
    of the table’s size. This meant I could ditch the spreadsheet helping me size
    tables as well.


    Another problem with the spreadsheet approach is that while it seemed very precise
    and offered up an exact number, the inputs to the spreadsheet were sometimes estimates
    themselves. If the inputs are not exact, then no matter how good the tool is,
    the output will not be exact either. So, let’s save all of the detailed analysis
    for something better. Instead, let’s get to an answer as easily as possible. After
    all, it’s just an estimate.


    Lastly, while you may have done some fine work in your initial estimates, it has
    been my experience that shortly after the estimates are defined, they are wrong.
    For example, I once worked on a system that would be receiving data points from
    a satellite. My job was to create and design a database that would be able to
    handle the data received from the object orbiting our planet. The creators of
    the satellite knew precisely how much data was captured every minute of every
    day. My estimate of the expected data volume was spot on. I loaded some sample
    data and was able to determine exactly how much disk space I would need month
    to month. When we started populating the database with data in a production setting,
    the estimates I generated were in agreement with our real-world system. Then requirements
    changed. Things worked so well there was talk of adding another system’s data
    to this same database. Well, that should be easy enough. Simply multiply the expected
    growth by a factor of two. However, this new system would have additional data
    the original satellite lacked. There went my exact estimate right out the window.
    The point is that no matter how accurate your initial estimate is, requirements
    and data usage patterns can change. Very few of us work on a database system that
    receives a steady stream of data with the same regularity that can be counted
    on to be able to accurately make determinations of the total data volume over
    time.


    Over the course of my career, I have learned that it is often better to become
    less precise in our estimates of expected system usage. Instead of getting down
    into the nitty-gritty details, I often take a completely opposite approach, and
    that is to look at system usage from a higher level.'
