    is that many of the organizers will give you free attendance to the rest of the
    conference just for presenting. The larger conferences provide free gifts to their
    presenters. You will also start to be recognized by others in your community for
    your skill.


    ## Moving On


    We have spent the last few chapters discussing how you can learn more about Oracle
    and even resolve issues. It starts by reading the Oracle documentation. The documentation
    provides a plethora of information. The hardest part of using the Oracle documentation
    is trying to find the information you seek, due to its sheer size. The more you
    use the Oracle documentation, the easier it will be to navigate.


    We then discussed the Oracle data dictionary. The data dictionary helps you learn
    details about your specific database. The data dictionary is documentation of
    the database’s contents.


    If the documentation or data dictionary cannot help you, the next place to look
    is often My Oracle Support. You can search its extensive knowledge base for answers.
    You can file a service request and obtain help from a support analyst.


    If you have exhausted all of these sources and are not able to resolve your issue,
    then the next place to turn is to social media. There are many social media outlets
    at your disposal, as we have covered in this chapter.


    In the next chapter, we shift gears to maintaining our Oracle database. After
    we have installed Oracle and created our database, we need to learn how to apply
    patches and keep it up to date. The following chapter will discuss how to upgrade
    your Oracle database to a new version.


    # 17. Patching


    In the previous four chapters, we discussed the different avenues for you to learn
    and grow your Oracle DBA career. The Oracle documentation is a must read. Eventually,
    you will have to interact with Oracle Support. Hopefully you are starting to use
    social media to expand your interactions with Oracle professionals around the
    world.


    This chapter shifts the focus toward maintaining your Oracle database. Recall
    that earlier in the book we built a virtual machine and created our first Oracle
    database to serve as a testbed. Subsequent chapters helped harden the installation
    by discussing recovery and backups and database security. Now it’s time to keep
    that database working for the lifetime of the system.


    ## Patching Overview


    Oracle patches are inevitable if you are doing a proper job. Sadly, I have met
    a number of Oracle database administrators that have never patched an Oracle database,
    even ones that have been around for years. You should be applying patches, regularly.


    Oracle patches are often applied for one of two reasons:


    *   *To fix a known issue*: These patches should only be applied under the direction
    of Oracle Support.


    *   *To keep your database software up to date*: Notably, to plug security holes.
    These patches should be applied as they are released.


