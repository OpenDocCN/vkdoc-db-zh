- fmt: '## Relative Time


    By default, My Oracle Support shows what is called "relative time." Instead of
    giving me a specific date, MOS will show me something like "2 days ago." Have
    a look at the dates in Figure [15-23](#467924_1_En_15_Chapter.xhtml#Fig23) from
    a number of service requests in MOS.


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig23_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig23_HTML.jpg)

    Figure 15-23

    MOS relative time


    It is a matter of personal preference, but to me something like "1+ year ago"
    is not descriptive enough. Was that 12 months ago? Or does + indicate it could
    be 18 or even 23 months ago? My preference is to show the exact date. In the `View`
    menu, you can uncheck `Show Relative Time` and you will then see the dates as
    shown in Figure [15-24](#467924_1_En_15_Chapter.xhtml#Fig24).


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig24_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig24_HTML.jpg)

    Figure 15-24

    MOS regular time


    To me, that looks better. However, your preference may differ, which is why MOS
    gives us the option.


    If you have relative time turned on in the `Service Requests` tab, that setting
    will carry over when you view the details of an SR. In Figure [15-25](#467924_1_En_15_Chapter.xhtml#Fig25),
    the dates on each entry of the service request’s history show relative time of
    ten months or more.


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig25_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig25_HTML.jpg)

    Figure 15-25

    MOS regular time in SR


    If you want to see the exact date, you have to go back to the `Service Requests`
    tab and turn off relative time, then enter the SR again.


    As stated, relative time is turned on by default. I mentioned it in this book
    because it is not obvious how to control the behavior should you have a different
    preference.


    ## Moving On


    This chapter continues the focus on how to learn things on your own. Remember
    that no single source, not even this book, can teach you everything you need to
    know to advance your DBA career. You will have to consult the Oracle documentation,
    the data dictionary, and maybe even My Oracle Support. MOS is a great resource
    for those that have a valid Oracle Support contract.


    In the next chapter, we will continue with the notion of learning how to learn.
    The next chapter discusses social media and its role in today’s Oracle DBA career.
    Social media is a great way to stay on top of the fast-moving Oracle ecosystem.
    It is also a great way to find answers when even My Oracle Support fails you.


    # 16. Social Media


    In Chapter [13](#467924_1_En_13_Chapter.xhtml), we discussed how to leverage the
    Oracle documentation to answer many of the questions we might have as well as
    learn more about how the Oracle database engine works. In the next chapter, we
    discovered the data dictionary and explored how it could answer questions about
    what is contained in our specific Oracle database. Chapter [15](#467924_1_En_15_Chapter.xhtml)
    discussed My Oracle Support, another resource for obtaining answers to questions
    you might have throughout your Oracle DBA career. In this chapter, we examine
    the role of social media to assist today’s database administrator. Social media
    is not specific to Oracle DBAs. If you work on another platform, you may find
    the information in this chapter beneficial as well.


    When I first drafted the outline for this book, I had this chapter right before
    the one on My Oracle Support. I’ve heard many people say they use social media
    outlets first and use My Oracle Support only as a method of last resort. The reason
    for this viewpoint is that My Oracle Support has a bad reputation when it comes
    to responding to service requests. Many times, service requests take a very long
    time and it seems to appear that a resolution to the problem is nowhere in sight.
    Personally, I have had bad experiences with MOS and have had to rely on social
    media for my answers.


    At the time I wrote this book, I flipped the order of the social media and My
    Oracle Support chapters. There are two reasons for this change from the initial
    draft. One, aside from service requests, MOS has a great knowledge base and is
    the only place you should obtain patches and updates. Second, social media often
    contains misinformation. Even though MOS has its issues, it is an authoritative
    source and the information in MOS is very reliable. Over time, you will learn
    when to leverage MOS and when to turn to social media.


    ## Social Media Definition


    What is social media? Social media comprises all the computer technologies that
    foster the creation and sharing of information, ideas, and careers. When people
    think of social media, they often think of platforms like Facebook, LinkedIn,
    and Twitter. These platforms connect people to each other based on their common
    interests. Facebook was initially designed to connect family and friends with
    each other, but businesses use it to connect to their customers. LinkedIn was
    created to connect job seekers with potential employers, but people are using
    it more often to share ideas and discuss non-career items. Twitter was created
    to be able to send short messages to people who might want to hear what you say,
    but today it has evolved into a platform for obtaining newsworthy information
    as it is happening.


    Social media platforms evolve over time, and so do our careers. While the creators
    of a social media platform might have designed their system with a specific intent
    in mind, it is the users that make it work for their needs. The creators respond
    by giving the users a better experience to meet their needs, and the platform
    evolves.


    When I first started in the Information Technology field, the Internet was largely
    a research project. The best way to get any information was to read all the manuals
    a vendor supplied to you. When I first started with Oracle databases, Oracle Corporation
    would send customers a box filled with hard copy manuals included with the CD
    to install the Oracle software. Over time, Oracle started providing the manuals
    in soft copy form and customers could install the documentation set on their computers.
    Like many vendors, Oracle stopped shipping hard copy books of their documentation.


    Technology changes the way we work, and most documentation is now accessed through
    the Internet. Software vendors set up support portals, which are just a specific
    form of social media. Not only can you access documentation from the vendor, but
    the support portals let you ask questions, read best practices, and so much more.
    Although limited to those with a current support contract, My Oracle Support can
    be thought of as a form of social media, but a very important one for the Oracle
    DBA. Because of its importance, I devoted an entire chapter to it in this book,
    Chapter [15](#467924_1_En_15_Chapter.xhtml).


    Because things evolve, so will the definition for the term *social media*. In
    this chapter, we will explore more than just traditional social media platforms.
    This chapter will extend the term social media to cover search engines, blogs,
    forums, and networking with conferences and user groups. While some of these are
    not true social media outlets, they are still important for the success of your
    career.'
  raw: '## Relative Time


    By default, My Oracle Support shows what is called “relative time.” Instead of
    giving me a specific date, MOS will show me something like “2 days ago.” Have
    a look at the dates in Figure [15-23](#467924_1_En_15_Chapter.xhtml#Fig23) from
    a number of service requests in MOS.


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig23_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig23_HTML.jpg)


    Figure 15-23


    MOS relative time


    It is a matter of personal preference, but to me something like “1+ year ago”
    is not descriptive enough. Was that 12 months ago? Or does + indicate it could
    be 18 or even 23 months ago? My preference is to show the exact date. In the View
    menu, you can uncheck Show Relative Time and you will then see the dates as shown
    in Figure [15-24](#467924_1_En_15_Chapter.xhtml#Fig24).


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig24_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig24_HTML.jpg)


    Figure 15-24


    MOS regular time


    To me, that looks better. However, your preference may differ, which is why MOS
    gives us the option.


    If you have relative time turned on in the Service Requests tab, that setting
    will carry over when you view the details of an SR. In Figure [15-25](#467924_1_En_15_Chapter.xhtml#Fig25),
    the dates on each entry of the service request’s history show relative time of
    ten months or more.


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig25_HTML.jpg](images/467924_1_En_15_Chapter/467924_1_En_15_Fig25_HTML.jpg)


    Figure 15-25


    MOS regular time in SR


    If you want to see the exact date, you have to go back to the Service Requests
    tab and turn off relative time, then enter the SR again.


    As stated, relative time is turned on by default. I mentioned it in this book
    because it is not obvious how to control the behavior should you have a different
    preference.


    ## Moving On


    This chapter continues the focus on how to learn things on your own. Remember
    that no single source, not even this book, can teach you everything you need to
    know to advance your DBA career. You will have to consult the Oracle documentation,
    the data dictionary, and maybe even My Oracle Support. MOS is a great resource
    for those that have a valid Oracle Support contract.


    In the next chapter, we will continue with the notion of learning how to learn.
    The next chapter discusses social media and its role in today’s Oracle DBA career.
    Social media is a great way to stay on top of the fast-moving Oracle ecosystem.
    It is also a great way to find answers when even My Oracle Support fails you.


    # 16. Social Media


    In Chapter [13](#467924_1_En_13_Chapter.xhtml), we discussed how to leverage the
    Oracle documentation to answer many of the questions we might have as well as
    learn more about how the Oracle database engine works. In the next chapter, we
    discovered the data dictionary and explored how it could answer questions about
    what is contained in our specific Oracle database. Chapter [15](#467924_1_En_15_Chapter.xhtml)
    discussed My Oracle Support, another resource for obtaining answers to questions
    you might have throughout your Oracle DBA career. In this chapter, we examine
    the role of social media to assist today’s database administrator. Social media
    is not specific to Oracle DBAs. If you work on another platform, you may find
    the information in this chapter beneficial as well.


    When I first drafted the outline for this book, I had this chapter right before
    the one on My Oracle Support. I’ve heard many people say they use social media
    outlets first and use My Oracle Support only as a method of last resort. The reason
    for this viewpoint is that My Oracle Support has a bad reputation when it comes
    to responding to service requests. Many times, service requests take a very long
    time and it seems to appear that a resolution to the problem is nowhere in sight.
    Personally, I have had bad experiences with MOS and have had to rely on social
    media for my answers.


    At the time I wrote this book, I flipped the order of the social media and My
    Oracle Support chapters. There are two reasons for this change from the initial
    draft. One, aside from service requests, MOS has a great knowledge base and is
    the only place you should obtain patches and updates. Second, social media often
    contains misinformation. Even though MOS has its issues, it is an authoritative
    source and the information in MOS is very reliable. Over time, you will learn
    when to leverage MOS and when to turn to social media.


    ## Social Media Definition


    What is social media? Social media comprises all the computer technologies that
    foster the creation and sharing of information, ideas, and careers. When people
    think of social media, they often think of platforms like Facebook, LinkedIn,
    and Twitter. These platforms connect people to each other based on their common
    interests. Facebook was initially designed to connect family and friends with
    each other, but businesses use it to connect to their customers. LinkedIn was
    created to connect job seekers with potential employers, but people are using
    it more often to share ideas and discuss non-career items. Twitter was created
    to be able to send short messages to people who might want to hear what you say,
    but today it has evolved into a platform for obtaining newsworthy information
    as it is happening.


    Social media platforms evolve over time, and so do our careers. While the creators
    of a social media platform might have designed their system with a specific intent
    in mind, it is the users that make it work for their needs. The creators respond
    by giving the users a better experience to meet their needs, and the platform
    evolves.


    When I first started in the Information Technology field, the Internet was largely
    a research project. The best way to get any information was to read all the manuals
    a vendor supplied to you. When I first started with Oracle databases, Oracle Corporation
    would send customers a box filled with hard copy manuals included with the CD
    to install the Oracle software. Over time, Oracle started providing the manuals
    in soft copy form and customers could install the documentation set on their computers.
    Like many vendors, Oracle stopped shipping hard copy books of their documentation.


    Technology changes the way we work, and most documentation is now accessed through
    the Internet. Software vendors set up support portals, which are just a specific
    form of social media. Not only can you access documentation from the vendor, but
    the support portals let you ask questions, read best practices, and so much more.
    Although limited to those with a current support contract, My Oracle Support can
    be thought of as a form of social media, but a very important one for the Oracle
    DBA. Because of its importance, I devoted an entire chapter to it in this book,
    Chapter [15](#467924_1_En_15_Chapter.xhtml).


    Because things evolve, so will the definition for the term *social media*. In
    this chapter, we will explore more than just traditional social media platforms.
    This chapter will extend the term social media to cover search engines, blogs,
    forums, and networking with conferences and user groups. While some of these are
    not true social media outlets, they are still important for the success of your
    career.'
  trans: '## 相对时间


    默认情况下，My Oracle Support 显示所谓的“相对时间”。它不会给我一个具体日期，而是显示“2 天前”之类的信息。请看图 15-23，其中展示了
    MOS 中多个服务请求的日期。


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig23_HTML.jpg](img/467924_1_En_15_Fig23_HTML.jpg)

    图 15-23

    MOS 相对时间


    这取决于个人偏好，但对我来说，“1+ 年前”这样的描述不够具体。那是 12 个月前吗？还是加号表示可能是 18 个月甚至 23 个月前？我倾向于显示确切的日期。在`查看`菜单中，您可以取消选中`显示相对时间`，之后您就会看到如图
    15-24 所示的日期。


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig24_HTML.jpg](img/467924_1_En_15_Fig24_HTML.jpg)

    图 15-24

    MOS 常规时间


    在我看来，这样看起来更好。然而，您的偏好可能不同，这就是 MOS 给我们提供这个选项的原因。


    如果您在`服务请求`标签页中开启了相对时间显示，那么在查看某个服务请求的详细信息时，这个设置也会延续。在图 15-25 中，服务请求历史记录的每个条目上显示的日期都是十个月或更久之前的相对时间。


    ![../images/467924_1_En_15_Chapter/467924_1_En_15_Fig25_HTML.jpg](img/467924_1_En_15_Fig25_HTML.jpg)

    图 15-25

    SR 中的 MOS 常规时间


    如果您想看到确切的日期，您必须回到`服务请求`标签页，关闭相对时间显示，然后重新进入该服务请求。


    如前所述，相对时间显示默认是开启的。我在本书中提到这一点，是因为如果您有不同的偏好，其控制方法并不显而易见。


    ## 继续前进


    本章继续聚焦于如何自主学习。请记住，没有任何单一来源（甚至包括本书）能教会您推进 DBA 职业生涯所需的一切知识。您将需要查阅 Oracle 文档、数据字典，甚至可能还需要用到
    My Oracle Support。对于拥有有效 Oracle 支持合同的用户来说，MOS 是一个极好的资源。


    在下一章中，我们将继续探讨如何学习学习。下一章将讨论社交媒体及其在当今 Oracle DBA 职业生涯中的作用。社交媒体是紧跟快速发展的 Oracle 生态系统的重要途径。即使
    My Oracle Support 让您失望时，它也是寻找答案的好方法。


    # 16. 社交媒体


    在第 13 章中，我们讨论了如何利用 Oracle 文档来解答我们可能遇到的许多问题，并了解更多关于 Oracle 数据库引擎如何工作的知识。在接下来的章节中，我们发现了数据字典，并探索了它如何解答关于我们的特定
    Oracle 数据库包含内容的问题。第 15 章讨论了 My Oracle Support，这是您在整个 Oracle DBA 职业生涯中获取问题答案的另一个资源。在本章中，我们将探讨社交媒体在协助当今数据库管理员方面所扮演的角色。社交媒体并非
    Oracle DBA 专属。如果您使用其他平台，您也可能会发现本章中的信息同样有益。


    当我最初为本书起草大纲时，我将本章安排在关于 My Oracle Support 的那一章之前。我听过很多人说他们会先使用社交媒体平台，只在最后万不得已时才使用
    My Oracle Support。这种观点产生的原因是，My Oracle Support 在响应服务请求方面声誉不佳。很多时候，服务请求需要很长时间，而且似乎看不到问题解决的希望。就我个人而言，我与
    MOS 有过不愉快的经历，不得不依赖社交媒体来寻找答案。


    在我撰写本书时，我调换了社交媒体和 My Oracle Support 章节的顺序。做出这个与初稿不同的调整有两个原因。第一，除了服务请求，MOS 拥有一个强大的知识库，并且是您应该获取补丁和更新的唯一渠道。第二，社交媒体常常包含错误信息。尽管
    MOS 存在问题，但它是一个权威来源，其中的信息非常可靠。随着时间的推移，您将学会何时利用 MOS，何时转向社交媒体。


    ## 社交媒体定义


    什么是社交媒体？社交媒体包含了所有促进信息、思想和职业创建与共享的计算机技术。当人们想到社交媒体时，他们通常会想到像 Facebook、LinkedIn 和
    Twitter 这样的平台。这些平台根据人们的共同兴趣将他们联系起来。Facebook 最初旨在连接家人和朋友，但企业用它来连接客户。LinkedIn 的创立是为了连接求职者和潜在雇主，但人们现在更频繁地用它来分享想法和讨论与职业无关的内容。Twitter
    的创立是为了向可能想听您说话的人发送简短消息，但如今它已发展成一个在新闻事件发生时获取新闻信息的平台。


    社交媒体平台随着时间的推移而演变，我们的职业生涯也是如此。虽然社交媒体平台的创建者可能设计他们的系统时有特定的意图，但用户才是使其满足自身需求的人。创建者通过为用户提供更好的体验来满足他们的需求作为回应，平台也随之进化。


    当我最初进入信息技术领域时，互联网主要是一个研究项目。获取任何信息的最佳方式是阅读供应商提供给您的所有手册。当我刚开始接触 Oracle 数据库时，Oracle
    公司会寄给客户一个装满纸质手册的盒子，并附带安装 Oracle 软件的 CD。随着时间的推移，Oracle 开始以电子版形式提供手册，客户可以将文档集安装在自己的电脑上。与许多供应商一样，Oracle
    停止了其文档纸质书籍的发货。


    技术改变了我们的工作方式，现在大多数文档都通过互联网访问。软件供应商建立了支持门户，这本身就是一种特定形式的社交媒体。您不仅可以访问供应商提供的文档，支持门户还允许您提问、阅读最佳实践等等。尽管仅限于拥有有效支持合同的用户，My
    Oracle Support 可以被视为一种社交媒体形式，但对于 Oracle DBA 来说非常重要。鉴于其重要性，我在本书中用一整章，即第 15 章，专门讨论了它。


    因为事物在发展，*社交媒体*这个术语的定义也将随之演变。在本章中，我们将探讨的不仅仅是传统的社交媒体平台。本章将扩展社交媒体的含义，涵盖搜索引擎、博客、论坛，以及通过会议和用户组进行的交流。虽然其中一些并非真正的社交媒体平台，但它们对于您职业生涯的成功仍然至关重要。'
- fmt: '## Search Engines


    I spend a large amount of my time looking for answers with search engines. What
    are the hours of the hardware store near my house? How old is Lionel Messi? How
    long do I boil eggs? Just type the question into your favorite search engine and
    you learn the answers. People put an astounding amount of information on the Internet,
    and search engines are the gateway to finding what you need.


    In my professional life, the only thing that changes are the questions. What is
    the meaning of Oracle error `PRVG-2027`? What do I do when the `.patch_storage`
    directory gets too large? When was Oracle 7 released? How do I create a multitenant
    database?


    Typically, when people think of a search engine, they mean Google. Other search
    engines exist, but Google reigns supreme. You can use Yahoo, Bing, or others should
    use desire. They all lead to the same Internet. Google is the most often used
    because it is thought to provide the most relevant hits for your searches, but
    Google is not perfect. You may want to use other search engines if Google is not
    finding what you seek. Some search engines are better for a specific geography.
    For example, in China, you might use Baidu.


    No matter what search engine you use, the search results may be more relevant
    to you the more specific you are in your search terms. If you search for “Oracle”
    you probably will not get any hits helping you solve a problem with a foreign
    key constraint. If you search for “oracle foreign key” you will get plenty of
    hits related to showing you how to create foreign keys, but if you are searching
    for a solution to disable foreign keys, you will miss the mark. Instead, search
    for “oracle disable all foreign key constraints on a table” and your search will
    be more successful. The more specific you are in your search terms, the quicker
    you will find what you are looking for.


    One trick I typically use is to include the database platform in the search terms.
    If I search for “disable all foreign key constraints on a table,” Google responds
    with information on the SQL Server platform as its first two results. Adding the
    word “Oracle” to the search terms narrows down the results more quickly to my
    platform. There are times you will want to include your Oracle version. The term
    “oracle 12.2” will ensure that results from the old Oracle 10.1 version do not
    appear. Including the platform and its version is one trick to help obtain the
    most relevant results of your search.


    Many times, you will need to include multiple lines from your issue in your search
    terms. I once ran into the problem shown in Listing 16-1 while trying to patch
    an Oracle database.


    ```

    Queryable inventory could not determine the current opatch status.

    Execute ''select dbms_sqlpatch.verify_queryable_inventory from dual''

    and/or check the invocation log

    /u01/app/oracle/cfgtoollogs/sqlpatch/sqlpatch_25889_2016_11_09_22_26_12/sqlpatch_invocation.log

    for the complete error.

    Listing 16-1

    Example Problem

    ```


    I wasn’t sure how to resolve this problem. I tried to determine what message in
    the output above would be a good search term. The first line looks generic, so
    that probably wouldn’t work. The second link contains something specific, `dbms_sqlpatch.verify_queryable_inventory`,
    so I used that as my search team. Unfortunately, the results were not related
    to my problem. When I looked in the log file mentioned in the output above, I
    could see the additional information shown in Listing 16-2.


    ```

    verify_queryable_inventory returned ORA-20008: Timed out, Job

    Load_opatch_inventory_1execution time is

    more than 120Secs

    Queryable inventory could not determine the current opatch status.

    Listing 16-2

    Example Problem Log File

    ```


    I now have something even more specific. My search term is now “`dbms_sqlpatch.verify_queryable_inventory`
    ORA-20008 Timed Out”. By making the search term very specific, I can hone in on
    the most relevant results as quickly as possible.


    For many readers, this advice may seem like common sense. However, I have found
    that people who do not find relevant information in a web search are often using
    terms that are too generic. It is helpful if you include any error codes in your
    search, for example. If the hits are still too broad, then include the error code
    and the error message, as some errors can have multiple messages. If your issue
    has multiple error codes, include them all in your search terms. All of these
    are a tips I have learned over the years when trying to research problems on the
    Web.'
