  trans: '# 3. 创建我们的服务器


    本章是本书首次引入技术内容的章节。每位数据库管理员都需要一个可以试验想法、尝试新功能并验证更改是否有效的场所。数据库管理员需要一个非生产环境，因为他们在首次进行操作时，可能会弄坏某些东西。我们不希望生产环境中的东西被弄坏。理想情况下，当我们在生产环境中进行更改时，应是在充分理解、经过演练且毫无意外的情况下进行的。要达到这种状态通常需要多次尝试。生产数据库绝不应被视为游乐场。


    许多组织会为数据库管理员及其他 IT 人员提供非生产区域。在理想情况下，这些非生产工作空间应尽可能与生产环境相匹配。但是，如果你的公司没有任何可供你使用的非生产环境，该怎么办？或者，如果你只是需要一个基本上为空的简单数据库来测试几个概念，该怎么办？


    虚拟化技术已让 IT 员工的生活变得更好。当今的容器环境，如 Docker 和 Kubernetes，以及云技术，正在为 IT 基础设施带来类似的改进。本章将向你展示如何创建一个
    Linux 虚拟机，并在其上安装和创建一个 Oracle 数据库。第 10 章将讨论测试平台和构建测试用例的重要性。你在接下来几章中构建的内容将为你提供这样一个测试平台。


    即使你的公司为你提供了非生产区域供你使用，你仍然可能会发现在你的工作站或笔记本电脑上创建简单的测试平台是有益的。我们通常认为，非生产数据库分别用于我们的开发和测试工作，以产出和验证变更。我常说，虽然这些是非生产环境，但对某些人来说它们就是生产环境。如果你在一天中关闭了开发数据库，应用程序开发者将无法工作。如果你在一天中关闭了测试数据库，质量保证团队将无法验证变更。数据库管理员需要一个属于自己的个人工作区，在那里他们可以试验变更和新功能。他们需要对这个环境拥有完全的控制权，如果他们把事情搞砸了，也只会伤害到他们自己。提供一个测试平台服务器还可以让数据库管理员在不同的操作系统上运行数据库，这可能是他们环境所需要的。


    ## 下载 VirtualBox


    在本章中，我们将使用 Oracle VM VirtualBox 来管理虚拟机（VMs）。当然，你也可以使用其他虚拟机管理程序，例如 VMware Fusion
    或 Microsoft Hyper-V。我为本书选择了 VirtualBox，因为它是免费的，而且许多 Oracle 专业人士都在使用它。由于其广泛使用，你可以找到许多关于在
    VirtualBox 上运行 Oracle 的有用资源。


    要下载 VirtualBox，请将你的网页浏览器指向 `www.virtualbox.org`，在主屏幕上，点击大的“Download VirtualBox”按钮，即可显示该产品的最新版本。图
    3-1 展示了在本章编写时可寻找的按钮及当时最新版本的示例。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig1_HTML.jpg](img/467924_1_En_3_Fig1_HTML.jpg)


    图 3-1：VirtualBox 下载按钮


    VirtualBox 可用于多个平台，包括 Windows、macOS 和 Linux。点击下载按钮后，你将被带到一个页面，以下载适用于你平台的产品。本章将向你展示如何在
    Windows 桌面或笔记本电脑上使用 VirtualBox 创建一个在 Linux 上运行 Oracle 的测试平台服务器，但在其他平台上的指导也非常相似。在下载页面上，我将点击
    “Windows hosts” 链接。选择你首选的平台，下载即会开始。下载完成后，运行安装软件。在 Windows 上，这就像双击下载的 `.exe` 文件一样简单。安装向导会引导你完成安装步骤。你可以接受向导提供的默认值。在某个时刻，会出现一个警告，提示安装过程会暂时重置你计算机的网络连接，因此在点击“是”按钮之前，请确保此时进行此操作是合适的。图
    3-2 显示了此警告的一个示例。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig2_HTML.jpg](img/467924_1_En_3_Fig2_HTML.jpg)


    图 3-2：VirtualBox 安装网络警告


    很简单。VirtualBox 现在已经安装好了。'
- fmt: '## Downloading Oracle Linux


    下一步是下载 Oracle Linux 操作系统。我们可以在 Windows 或其他认证的操作系统上运行 Oracle。我为本书选择 Linux，因为它被广泛使用。如果你能在
    Linux 上运行 Oracle，那么你也具备了在其他任何支持的 Unix 变体上运行它的知识。此外，Oracle Linux 可以免费下载和使用；如果你需要操作系统的支持，则需要一份维护合同。


    将网页浏览器指向 [`http://otn.oracle.com`](http://otn.oracle.com)，该网站现在被称为 Oracle Developer
    Network（之前是 Oracle Technology Network，因此 URL 中有 ''otn''）。页面左侧有一个标题为“Essential
    Links”的部分。点击该部分中的“Software Downloads”链接。在图[3-3](#467924_1_En_3_Chapter.xhtml#Fig3)中，我们可以看到“Software
    Downloads”链接是列表中的第二项。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig3_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig3_HTML.jpg)


    图 3-3


    OTN Essential Links


    在下一页，向下滚动到标题为“IT Infrastructure”的部分。点击该部分中标题为“Oracle Linux and Oracle Enterprise
    Kernel”的链接。你可以看到该链接是图[3-4](#467924_1_En_3_Chapter.xhtml#Fig4)中的第一项。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig4_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig4_HTML.jpg)


    图 3-4


    Oracle Linux 下载链接


    点击图[3-4](#467924_1_En_3_Chapter.xhtml#Fig4)中所示的“Oracle Linux and Enterprise Kernel”链接，将带你进入
    Oracle Software Delivery Cloud 网站。如果你拥有 Oracle Single Sign-On 帐户（例如用于 My Oracle
    Support 的帐户），则单击“Sign In”按钮并输入你的凭据。如果你没有帐户，请单击“New User”链接并创建一个免费帐户。图[3-5](#467924_1_En_3_Chapter.xhtml#Fig5)显示了“Sign
    In”按钮和“New User”注册链接。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig5_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig5_HTML.jpg)


    图 3-5


    Oracle Software Delivery Cloud 登录界面


    在下一个界面中，在搜索框中输入“Oracle Linux”并单击“Search”按钮。显示的结果中，最新版本的操作系统将作为顶部链接，如图[3-6](#467924_1_En_3_Chapter.xhtml#Fig6)所示。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig6_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig6_HTML.jpg)


    图 3-6


    Oracle Linux 搜索结果


    在撰写本文时，Oracle Linux 7.5 是最新版本，因此我将单击该链接。请单击在你阅读本文时的最新版本的链接。单击该链接会将此软件添加到购物车。接下来，单击购物车图标，图[3-7](#467924_1_En_3_Chapter.xhtml#Fig7)显示了一个示例。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig7_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig7_HTML.jpg)


    图 3-7


    下载购物车图标


    下一页显示你购物车的内容，其中应只包含一个产品。单击“Continue”按钮将带你进入 Oracle Standard Terms and Restrictions
    页面。阅读条款后，勾选同意条款的复选框，然后单击“Continue”按钮。


    下载页面允许你下载整个 Oracle Linux 产品套件。这远超过我们本书所需。我们只需要操作系统，在撰写本文时，其标题为“Oracle Linux Release
    7 Update 5 for x86 (64 bit)”，并且是列表中的最后一项，如图[3-8](#467924_1_En_3_Chapter.xhtml#Fig8)所示。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig8_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig8_HTML.jpg)


    图 3-8


    Linux 下载 ISO 文件


    单击文件名以开始下载。在撰写本文时，该文件名是 `V975367-01.iso`。根据你尝试下载操作系统的时间，版本和文件名可能会有所不同。一旦软件下载到你的系统，你就可以开始创建虚拟机了。'
  raw: '## Downloading Oracle Linux


    The next step is to download the Oracle Linux operating system. We could run Oracle
    on Windows or another certified operating system. I chose Linux for this book
    because it is widely used. If you can run Oracle on Linux, you also have the knowledge
    to run it on any of the supported Unix variants. Also, Oracle Linux is free to
    download and use; if you want support for the OS, you will need a maintenance
    contract.


    Point the web browser to [`http://otn.oracle.com`](http://otn.oracle.com) , which
    is now called the Oracle Developer Network (previously the Oracle Technology Network hence
    ‘otn’ in the URL). On the left side of the page is a section titled Essential
    Links. Click the Software Downloads link in that section. In Figure [3-3](#467924_1_En_3_Chapter.xhtml#Fig3),
    we can see the Software Downloads link is the second item in the list.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig3_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    OTN Essential Links


    On the next page, scroll down to the section titled IT Infrastructure. Click on
    the link in that section titled Oracle Linux and Oracle Enterprise Kernel. You
    can see the link as the first item in Figure [3-4](#467924_1_En_3_Chapter.xhtml#Fig4).


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig4_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Oracle Linux download link


    Clicking the Oracle Linux and Enterprise Kernel link shown in Figure [3-4](#467924_1_En_3_Chapter.xhtml#Fig4)
    will take you to the Oracle Software Delivery Cloud website. If you have an Oracle
    Single Sign-On account, like one used for My Oracle Support, then click the Sign
    In button and enter your credentials. If you do not have an account, click the
    New User link and create a free account. Figure [3-5](#467924_1_En_3_Chapter.xhtml#Fig5)
    shows the Sign In button and the New User registration links.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig5_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Oracle Software Delivery Cloud sign-in screen


    On the next screen, enter “Oracle Linux” in the search box and click the Search
    button. The results displayed will have the latest and greatest version of the
    OS as the top link, as you can see in Figure [3-6](#467924_1_En_3_Chapter.xhtml#Fig6).


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig6_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Oracle Linux search results


    At the time of writing, Oracle Linux 7.5 is the latest version, so I will click
    that link. Click the link for whichever version is the latest at the time you
    are reading this. Clicking the link adds this software to the cart. Next, click
    the cart icon, an example of which is shown in Figure [3-7](#467924_1_En_3_Chapter.xhtml#Fig7).


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig7_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Download cart icon


    The next page shows the contents of your cart, which should only contain the one
    product. Clicking the Continue button takes you to the Oracle Standard Terms and
    Restrictions page. After reading the terms, check the box to agree to the terms
    and click the Continue button.


    The download page lets you download the entire Oracle Linux product suite. This
    is much more than we need for this book. We just need the OS, which at the time
    of writing is titled “Oracle Linux Release 7 Update 5 for x86 (64 bit)” and is
    the last item in the list, as shown in Figure [3-8](#467924_1_En_3_Chapter.xhtml#Fig8).


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig8_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Linux download ISO file


    Click the file name to start the download. At the time of writing, that file name
    is V975367-01.iso. Depending on when you try to download the OS, the version and
    file name may be different. Once the software has been downloaded to your system,
    you can begin to create the virtual machine.'
  trans: '## 下载 Oracle Linux


    下一步是下载 Oracle Linux 操作系统。我们可以在 Windows 或其他认证的操作系统上运行 Oracle。我为本书选择 Linux，因为它被广泛使用。如果你能在
    Linux 上运行 Oracle，那么你也具备了在其他任何支持的 Unix 变体上运行它的知识。此外，Oracle Linux 可以免费下载和使用；如果你需要操作系统的支持，则需要一份维护合同。


    将网页浏览器指向 [`http://otn.oracle.com`](http://otn.oracle.com)，该网站现在被称为 Oracle Developer
    Network（之前是 Oracle Technology Network，因此 URL 中有 ''otn''）。页面左侧有一个标题为“Essential
    Links”的部分。点击该部分中的“Software Downloads”链接。在图 3-3 中，我们可以看到“Software Downloads”链接是列表中的第二项。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig3_HTML.jpg](img/467924_1_En_3_Fig3_HTML.jpg)


    图 3-3


    OTN Essential Links


    在下一页，向下滚动到标题为“IT Infrastructure”的部分。点击该部分中标题为“Oracle Linux and Oracle Enterprise
    Kernel”的链接。你可以看到该链接是图 3-4 中的第一项。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig4_HTML.jpg](img/467924_1_En_3_Fig4_HTML.jpg)


    图 3-4


    Oracle Linux 下载链接


    点击图 3-4 中所示的“Oracle Linux and Enterprise Kernel”链接，将带你进入 Oracle Software Delivery
    Cloud 网站。如果你拥有 Oracle Single Sign-On 帐户（例如用于 My Oracle Support 的帐户），则单击“Sign In”按钮并输入你的凭据。如果你没有帐户，请单击“New
    User”链接并创建一个免费帐户。图 3-5 显示了“Sign In”按钮和“New User”注册链接。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig5_HTML.jpg](img/467924_1_En_3_Fig5_HTML.jpg)


    图 3-5


    Oracle Software Delivery Cloud 登录界面


    在下一个界面中，在搜索框中输入“Oracle Linux”并单击“Search”按钮。显示的结果中，最新版本的操作系统将作为顶部链接，如图 3-6 所示。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig6_HTML.jpg](img/467924_1_En_3_Fig6_HTML.jpg)


    图 3-6


    Oracle Linux 搜索结果


    在撰写本文时，Oracle Linux 7.5 是最新版本，因此我将单击该链接。请单击在你阅读本文时的最新版本的链接。单击该链接会将此软件添加到购物车。接下来，单击购物车图标，图
    3-7 显示了一个示例。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig7_HTML.jpg](img/467924_1_En_3_Fig7_HTML.jpg)


    图 3-7


    下载购物车图标


    下一页显示你购物车的内容，其中应只包含一个产品。单击“Continue”按钮将带你进入 Oracle Standard Terms and Restrictions
    页面。阅读条款后，勾选同意条款的复选框，然后单击“Continue”按钮。


    下载页面允许你下载整个 Oracle Linux 产品套件。这远超过我们本书所需。我们只需要操作系统，在撰写本文时，其标题为“Oracle Linux Release
    7 Update 5 for x86 (64 bit)”，并且是列表中的最后一项，如图 3-8 所示。


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig8_HTML.jpg](img/467924_1_En_3_Fig8_HTML.jpg)


    图 3-8


    Linux 下载 ISO 文件


    单击文件名以开始下载。在撰写本文时，该文件名是 `V975367-01.iso`。根据你尝试下载操作系统的时间，版本和文件名可能会有所不同。一旦软件下载到你的系统，你就可以开始创建虚拟机了。'
- fmt: '# Creating the Server


    To begin creating our testbed server, simply start the VirtualBox program. In
    Figure [3-9](#467924_1_En_3_Chapter.xhtml#Fig9), you can see that I already have
    two virtual machines created, one for testing Oracle 12.2 new features and another
    for playing around with Oracle Multitenant. Your VirtualBox Manager may not show
    any virtual machines if this is your first attempt at creating one.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig9_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig9_HTML.jpg)

    *Figure 3-9 Oracle VM VirtualBox Manager*


    Most likely, you do not have any VMs created as of yet. Click the `New` button
    to create your first VM. In the dialog box, you need to give your virtual machine
    a meaningful name and select the operating system type and version. An example
    of this is shown in Figure [3-10](#467924_1_En_3_Chapter.xhtml#Fig10).


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig10_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig10_HTML.jpg)

    *Figure 3-10 Creating a virtual machine*


    I named this VM after the book title, but you can provide any name you desire.
    The OS type is `Linux` and the version is `Oracle (64-bit)`. Then click `Next`.


    The next step is to allocate memory to this virtual machine. You’ll want to allocate
    at least 4GB of memory. This memory comes from your workstation or laptop, a.k.a
    the `host`, so make sure your workstation or laptop has at least 8GB of RAM. Every
    Oracle version has different memory requirements. The version we will be installing
    in this book necessitates a 4GB operating system. If you use less memory, Oracle
    will be sluggish or may not perform at all. Your workstation or laptop needs enough
    memory to run the VM as well as any other applications you have open. If your
    host has more than 8GB of RAM, you can certainly allocate additional memory to
    the VM, but there is little benefit for the testbed we are creating. The memory
    size can be seen in Figure [3-11](#467924_1_En_3_Chapter.xhtml#Fig11). Click `Next`.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig11_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig11_HTML.jpg)

    *Figure 3-11 Setting the memory size*


    On the next screen, make sure “Create a virtual hard disk now” is selected and
    click the `Create` button. On the screen after that, confirm that the virtual
    hard disk type is `VDI` and then click `Next`. The virtual hard disk can either
    be a fixed size or dynamically created. The benefit to a dynamically created disk
    is that the file used to simulate the hard disk will start off small and grow
    as needed, up to a maximum size. The fixed-size option will allocate up to the
    max size right away. I typically use the dynamic allocation, but you can choose
    the other option as well. Click `Next`.


    On the next screen, shown in Figure [3-12](#467924_1_En_3_Chapter.xhtml#Fig12),
    provide a file name and a disk size. I typically keep the file name the same as
    the VM name. You can click the icon to the right of the file name to choose a
    non-default location for the disk file. For this machine, we’ll create a 60GB
    disk. We will need this amount to have enough space for installing the operating
    system, installing the Oracle software, and creating our first database. Click
    the `Create` button.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig12_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig12_HTML.jpg)

    *Figure 3-12 Creating the virtual hard disk*


    Before we start the virtual machine, let’s change a few other settings VirtualBox
    did not prompt us for. In the VirtualBox Manager, click the virtual machine and
    then click the `Settings` button (the yellow gear icon). You can see that the
    `DBAMentor` VM is selected, in blue, in Figure [3-13](#467924_1_En_3_Chapter.xhtml#Fig13).


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig13_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig13_HTML.jpg)

    *Figure 3-13 Accessing the VM settings*


    On the `Settings` page, select `Network` in the navigation pane on the left. Make
    sure the `Adapter 1` tab is selected, as shown in Figure [3-14](#467924_1_En_3_Chapter.xhtml#Fig14).
    Then make sure the `Enable Network Adaptor` box is selected and the `Attached
    To` menu has `NAT` chosen. The `NAT` network adapter lets the virtual machine
    connect to the outside world.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig14_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig14_HTML.jpg)

    *Figure 3-14 Enabling the network adapter*


    We will also want a second network adapter so that the tools on our workstation
    or laptop can connect to the Oracle database inside the virtual machine. Select
    the `Adapter 2` tab. Make sure the `Enable Network Adapter` box is selected. For
    the `Attached To` option, choose `Host-only Adapter`, as shown in Figure [3-15](#467924_1_En_3_Chapter.xhtml#Fig15).


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig15_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig15_HTML.jpg)

    *Figure 3-15 Choosing Host-Only Adapter*


    We’re also going to add a shared folder so that we can easily pass files back
    and forth between our host workstation and the virtual machine. In the `Settings`
    panel, select `Shared Folders` in the navigation pane. Click the icon that looks
    like a folder with a green plus sign. This will pop up a dialog box. I am going
    to map the `C:\temp` directory on my workstation to the `C_temp` mount point on
    my Linux guest and make this auto-mount every time I start the VM. You can map
    the shared folder to any location on the host’s hard drive. Because I am mapping
    the shared folder to `C:\temp`, I am obviously running VirtualBox on Windows.
    If you are running on macOS or Linux, your folder will be a different location.
    My settings are shown in Figure [3-16](#467924_1_En_3_Chapter.xhtml#Fig16).


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig16_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig16_HTML.jpg)

    *Figure 3-16 Shared folder definition*


    After I click `OK`, the settings look like the screen shown in Figure [3-17](#467924_1_En_3_Chapter.xhtml#Fig17).


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig17_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig17_HTML.jpg)

    *Figure 3-17 Shared Folders settings*


    Click `OK` to accept the current settings. We are now ready to power on our virtual
    machine. In the VirtualBox Manager, click the VM and click the green `Start` button.
    The virtual machine does not have an operating system yet, so VirtualBox asks
    us to point to one. Click the folder icon and navigate to the ISO file you downloaded
    for Oracle Linux and then click the `Start` button. In Figure [3-18](#467924_1_En_3_Chapter.xhtml#Fig18),
    we can see the `V975367-01.iso` file I downloaded at the time of writing.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig18_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig18_HTML.jpg)

    *Figure 3-18 ISO location*


    When the red Oracle Linux screen appears, press the `I` key and then press `Enter`
    to boot. If you wait 60 seconds, VirtualBox will test the media and then boot
    on its own.


    Oracle Linux has started and wants to learn some information so that it can complete
    its configuration. The first page asks you to select which language you prefer
    during the installation process, as shown in Figure [3-19](#467924_1_En_3_Chapter.xhtml#Fig19).
    Select the language and click the `Continue` button.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig19_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig19_HTML.jpg)

    *Figure 3-19 Language selection for the installation process*


    On the `Installation Summary` screen, you can change the date and time, the keyboard,
    and other items. Make sure those setting are correct for your environment. Figure
    [3-20](#467924_1_En_3_Chapter.xhtml#Fig20) shows the `Software Selection` button.
    Click that button.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig20_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig20_HTML.jpg)

    *Figure 3-20 Software Selection button*'
