  trans: '## 真实应用测试


    向数据库系统引入任何重大变更时，面临的其中一个问题是能否对应用进行充分测试，以确保变更不会引发任何问题。真实应用测试（`RAT`）是一项需额外付费的选件，它让数据库管理员能够捕获针对生产数据库运行的实际工作负载。该工作负载可以迁移到另一个数据库，并在目标数据库上回放。随后，`RAT`
    会将新性能与原始性能进行分析比较，并报告任何不足之处。这在升级到新 Oracle 版本时非常有益。捕获生产工作负载，将一个副本数据库升级到新版本，并在该升级后的数据库上回放工作负载。数据库管理员将能很好地了解版本变更对工作负载的影响程度（如果有的话）。


    ## 后续内容


    本章概述了多项 Oracle 数据库选件。其中大多数都需要额外付费，您在使用该功能前需要了解这一点。在许多情况下（尽管并非全部），对于企业而言，考虑到节省的时间，这项额外费用是值得的。如果您尚未获得许可证，我强烈建议您购买诊断包。


    本章标志着本书的结束。感谢您的阅读，并希望您发现这些建议有助于推进您的 Oracle DBA 职业生涯。您的旅程才刚刚开始，还有很多需要学习，但这应该是一段激动人心的冒险！祝您好运！


