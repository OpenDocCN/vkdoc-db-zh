    RMAN 为我们理清了所有头绪，并在很短的时间内让一切恢复了秩序。


    RMAN 拥有大量功能，还有很多东西需要学习。再次强调，阅读 `Database Backup and Recovery User’s Guide` 以了解
    RMAN 所有的功能是非常重要的。本章实在无法涵盖其所有内容。'
  raw: '## Our Hot Backup


    Now that our testbed database is in archivelog mode, we can perform a hot backup.
    This time, we’ll use RMAN to perform the backup. First, we will configure RMAN
    so that it knows where to create the backups. In Listing [7-7](#467924_1_En_7_Chapter.xhtml#PC7),
    we will invoke the RMAN utility and configure the backup destination.


    ```

    [oracle@dbamentor ~]$ rman

    Recovery Manager: Release 12.2.0.1.0 - Production on Tue Jun 19 13:18:06 2018

    Copyright (c) 1982, 2017, Oracle and/or its affiliates. All rights reserved.

    RMAN> connect target /

    connected to target database: ORCL (DBID=1506090724)

    RMAN> configure default device type to disk;

    using target database control file instead of recovery catalog

    new RMAN configuration parameters:

    CONFIGURE DEFAULT DEVICE TYPE TO DISK;

    new RMAN configuration parameters are successfully stored

    RMAN> configure controlfile autobackup on;

    new RMAN configuration parameters:

    CONFIGURE CONTROLFILE AUTOBACKUP ON;

    new RMAN configuration parameters are successfully stored

    RMAN> configure channel device type disk format ''/u01/app/oracle/oradata/db_backup/backup%d_%u_%s_%p'';

    new RMAN configuration parameters:

    CONFIGURE CHANNEL DEVICE TYPE DISK FORMAT  ''/u01/app/oracle/oradata/db_backup/backup%d_%u_%s_%p'';

    new RMAN configuration parameters are successfully stored

    Listing 7-7

    RMAN Configuration

    ```


    We instructed RMAN to write the backups to disk. We want the control file to be
    backed up automatically. The last command specifies the disk location and the
    file name format. This configuration can be overridden easily in your RMAN scripts.
    Backing up to disk is very common due to its speed. I try to write backups to
    disk set aside just for that purpose. If the backup needs to be written to tape,
    another job will copy the backup from disk to tape. If the backup needs to be
    sent offsite, I will use a tool like rsync or robocopy. RMAN also has the ability
    to write directly to tape media if you choose.


    With the defaults set, our RMAN command to back up the database becomes that much
    easier. In Listing [7-8](#467924_1_En_7_Chapter.xhtml#PC8), we can see the backup
    is one simple command to back up the database plus the archived redo logs.


    ```

    RMAN> run { backup database plus archivelog; }

    Starting backup at 19-JUN-18

    current log archived

    using target database control file instead of recovery catalog

    allocated channel: ORA_DISK_1

    channel ORA_DISK_1: SID=71 device type=DISK

    channel ORA_DISK_1: starting archived log backup set

    channel ORA_DISK_1: specifying archived log(s) in backup set

    input archived log thread=1 sequence=22 RECID=6 STAMP=979219448

    input archived log thread=1 sequence=23 RECID=7 STAMP=979219451

    input archived log thread=1 sequence=24 RECID=8 STAMP=979219492

    channel ORA_DISK_1: starting piece 1 at 19-JUN-18

    channel ORA_DISK_1: finished piece 1 at 19-JUN-18

