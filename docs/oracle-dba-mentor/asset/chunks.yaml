    ## 补丁与更新


    `MOS`中的主要选项卡之一是`补丁与更新`。此部分是您可以下载任何所需补丁的地方。通常，您只会在通过服务请求与支持分析师合作时下载补丁。当分析师希望您应用补丁时，他们通常会在`SR`中包含补丁的直接链接。如果您知道补丁编号，可以将其输入补丁搜索字段，如图
