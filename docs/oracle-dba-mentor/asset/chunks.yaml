    # 13. Oracle Documentation


    In the first eight chapters, we discussed some introductory material and set up
    our testbed. In Chapters [9](#467924_1_En_9_Chapter.xhtml)–[12](#467924_1_En_12_Chapter.xhtml)
    we then turned to the topic of using our Oracle database, where we spent time
    connecting to Oracle, running test cases, and examining various tools we will
    use in our administration duties.


    This chapter shifts focus to learning more about Oracle. My primary reason for
    writing this book was to teach you how to become a self-sufficient DBA. Technology
    books are a great resource and I have a large number of them on my bookshelf,
    but most technology books are self-contained guides that teach you what is written
    but do not help you expand upon that knowledge going forward. As I’ve said before,
    what makes this book different is that it will teach you to learn on your own.
    This chapter and the three that follow are at the heart of what you need to focus
    on as you read this book.


    If you work with other database systems, you can still leverage the techniques
    in these four chapters to help grow your career there as well. We will be covering
    the Oracle product documentation in this chapter, the data dictionary in the next
    chapter, Oracle’s support site in Chapter [15](#467924_1_En_15_Chapter.xhtml),
    and using social media in Chapter [16](#467924_1_En_16_Chapter.xhtml). If you
    are working with another database platform, such as SQL Server or DB2, then you
    can reference its documentation set, data dictionary, support sites, and related
    social media sites. The ideas hold as you move from platform to platform. I’ve
    even used these same focus areas to learn about non-database systems as well.
    You have probably been using some of them thus far in your career.


    In the end, no one can teach you everything you will possibly need to know for
    your DBA career. You will have to spend time learning more. Undoubtedly, you will
    rely on multiple sources of information to help you learn more so that you can
    do your job. All of the great database administrators I know are very adept at
    leveraging each of the avenues of information presented here and in Chapters [14](#467924_1_En_14_Chapter.xhtml)
    through [16](#467924_1_En_16_Chapter.xhtml). This is not an accident.


    The primary source of information for the many Oracle experts out there in the
    world is the Oracle documentation, as we discuss in this chapter. During my career,
    I’ve seen too many Oracle professionals that avoid the Oracle documentation set
    at all costs. The documentation is their resource of last resort. Readers of this
    book will know that the documentation should be one of your first stops when you
    need more information. When I ask people why they do not look up the information
    in the Oracle documentation, they may give me examples of errors in the books.
    Fair enough. Any book can have errors. As I dig deeper, I almost always conclude
    the person doesn’t like the documentation because it is hard to use. In this chapter,
    you will find out how easy and beneficial the documentation is.


    ## RTFM


    You may have seen the acronym before. The polite version is Read The Fine Manual.
    There is a more offensive version of the acronym that you’ll likely hear in the
    field, which does not need to be repeated here. If you ever ask anyone a question
    and they reply with “RTFM,” they are telling you the answer is in the documentation.
    No matter if the responder to your question has a polite or rude intent, the direction
    you need to pursue is to look in the documentation.


    As any parent can tell you, one of their jobs is to help teach their children
    how to be polite members of society. We are continually reminding our kids to
    say “please” and “thank you.” The other day my son asked me, “Can you help me
    please?” and I told him I would. The next words he said were “come here.” I always
    tell my kids that if they want someone’s help, they should burden them as little
    as possible. I tell them “If you want my help, you come to me.” For some reason
    I always think of this when I hear an RTFM question. You want my help in finding
    your Oracle answer, but you’re not willing to do a little work to look it up yourself?
    Oracle professionals that answer questions do it willingly of their own time.
    They do not like to be bothered with simple questions you could answer yourself.
    We are not here to do your job for you. If you ever ask a question that is a candidate
    for an RTFM response, make sure you preemptively point out that you already looked
    in the Oracle documentation and are having difficulty finding the answer, if it
    is there.


    Every Oracle guru I have ever met has spent countless hours poring over Oracle’s
    documentation set. I have long been of the opinion that part of the reason they
    are so good at this job is because of the time spent with the documentation. It’s
    not the only reason they are experts in their field, but I can definitively say
    that I have never met an Oracle expert or guru that has not read the documentation.
    If you want to grow your Oracle DBA career, then reading the Oracle documentation
    is important. If you read the Oracle documentation guides I discuss in this book
    and take some time to learn what is in them, you can easily find yourself as one
    of the top database administrators. All of the top DBAs have read the documentation
    over and over again, and they will tell you to do the same. Probably the most
    important guide for the DBA is the Oracle Database Concepts Guide, which we will
    discuss in this chapter. If you really want to be one of the best Oracle DBAs
    around, you will know the information in the Oracle Database Concepts Guide very
    well.


    If you want to raise yourself to guru status, you need to study the documentation
    with a fine-toothed comb. Pour over every detail. Take the examples given in the
    documentation and use them to form test cases and play around with the concept.
    I’m always amazed when I read a blog post by some guru-level DBA who has taken
    a small section of the Oracle documentation that I have completely glossed over
    and has examined every minute detail.


    I hope I’ve convinced you that you need to use the Oracle documentation to improve
    your skill set and advance your career. So far in this book, I have referred you
    to the *Database Installation Guides* (Chapter [5](#467924_1_En_5_Chapter.xhtml));
    the *Database Backup and Recovery User’s Guide* and *Database Backup and Recovery
    Reference* (Chapter [7](#467924_1_En_7_Chapter.xhtml)); and the *Database 2 Day
    + Security Guide* and *Database Security Guide* (Chapter [8](#467924_1_En_8_Chapter.xhtml)).
    I have left it to you to pursue those guides in the documentation set for reading
    on your own. The decision to leave it up to you, the reader, is a purposeful one.
    **You must get used to the idea of reading the documentation.**'
  trans: '

    ## 继续前行


    本章向我们展示了数据库服务器上各种诊断文件和跟踪文件的位置。我们通过一些示例了解了如何利用告警日志和其他跟踪文件来协助解决问题。本章还向我们展示了如何启动
    SQL 跟踪，以便 DBA 能够获取最终用户提交给数据库的 SQL 语句信息。跟踪文件可能难以阅读，但解析它们对于获取诊断数据、帮助解决问题是必要的。至少，它们会被发送给
    Oracle 支持人员供分析师阅读。


    下一章将聚焦于一个似乎被许多 Oracle 专业人士所鄙视的主题：Oracle 文档。请不要跳过下一章，因为它包含了对您发展 Oracle DBA 职业生涯至关重要的信息。许多人不喜欢文档的原因在于其篇幅浩繁，导致难以找到所需内容。下一章将为您梳理清楚，并帮助您学会如何查找需要了解的信息。


    # 13. Oracle 文档


    在前八章中，我们讨论了一些入门材料并搭建了我们的测试平台。在第 9 章至第 12 章，我们转向了使用 Oracle 数据库的主题，花时间连接 Oracle、运行测试用例，并检查我们将在管理职责中使用的各种工具。


    本章将重点转向更深入地了解 Oracle。我撰写本书的主要目的是教您如何成为一名**自给自足**的 DBA。技术书籍是极好的资源，我的书架上就有许多，但大多数技术书籍都是独立的指南，它们教授书中所写的内容，却无助于您在此基础上扩展知识。正如我之前所说，本书的不同之处在于，它将教会您如何**自主学习**。本章以及接下来的三章，是您阅读本书时需要关注的核心所在。


    如果您使用其他数据库系统，仍然可以利用这四章中的技巧来促进您在该领域的发展。本章我们将介绍 Oracle 产品文档，下一章介绍数据字典，第 15 章介绍 Oracle
    的支持网站，第 16 章介绍如何使用社交媒体。如果您使用的是另一个数据库平台，例如 SQL Server 或 DB2，那么您可以参考其对应的数据字典、支持网站和相关的社交媒体网站。这些理念在您切换平台时同样适用。我甚至使用过这些相同的重点领域来学习非数据库系统。您可能在职业生涯的某个阶段已经使用过其中一些了。


    归根结底，没有人能教会您 DBA 职业生涯中可能需要知道的一切。您必须花时间学习更多知识。毫无疑问，您会依赖多种信息来源来帮助您学习，从而胜任工作。我认识的所有优秀数据库管理员都**非常善于**利用此处以及第
    14 章至第 16 章中介绍的每一种信息渠道。这绝非偶然。


    正如本章所讨论的，世界上众多 Oracle 专家的主要信息来源是 Oracle 文档。在我的职业生涯中，我见过太多 Oracle 专业人士不惜一切代价避开
    Oracle 文档集。文档是他们最后的求助手段。本书的读者将会明白，当您需要更多信息时，文档应该是您的第一站之一。当我问人们为什么不查阅 Oracle 文档时，他们可能会给我举例书中的错误。这很合理。任何书都可能出错。但当我深入探究时，我几乎总是得出结论：这个人不喜欢文档是因为它**难以使用**。在本章中，您将发现文档是多么**简单易用且有益**。


    ## RTFM


    您可能见过这个缩写。其礼貌版本是“Read The Fine Manual”（阅读优质手册）。还有一种更冒犯性的版本，您可能会在现场听到，这里无需重复。如果您问任何人问题，他们用“RTFM”来回答，他们的意思是答案就在文档中。无论回答您问题的人意图是礼貌还是粗鲁，您需要遵循的方向都是去查阅文档。


    正如任何父母都能告诉您的，他们的职责之一是帮助教导孩子如何成为社会中有礼貌的一员。我们不断提醒孩子们要说“请”和“谢谢”。有一天，我儿子问我：“你能帮帮我吗？”我答应了。他接着说的是“过来这里”。我总是告诉我的孩子们，如果他们想要别人的帮助，就应该尽量少给对方添麻烦。我告诉他们：“如果你们想让我帮忙，你们就过来找我。”不知为何，每当听到
    RTFM 问题时，我总会想起这件事。您希望我帮忙找到您的 Oracle 答案，却不愿意自己稍作努力去查一下？回答问题的 Oracle 专业人士是自愿抽出自己的时间来做的。他们不喜欢被那些您自己就能回答的简单问题所打扰。我们不是来这里替您完成工作的。如果您提出的问题可能招致
    RTFM 式的回答，请务必预先说明您已经查阅过 Oracle 文档，但难以找到答案（如果答案存在的话）。


    我遇到的每一位 Oracle 大师都花费了无数时间**研读**Oracle 的文档集。我长期以来的观点是，他们之所以如此擅长这份工作，部分原因就在于花在文档上的时间。这不是他们成为领域专家的唯一原因，但我可以明确地说，我从未见过哪位
    Oracle 专家或大师没有阅读过文档。如果您想发展您的 Oracle DBA 职业生涯，那么阅读 Oracle 文档至关重要。如果您阅读了本书讨论的 Oracle
    文档指南，并花些时间学习其中的内容，您很容易就能跻身顶级数据库管理员之列。所有顶级的 DBA 都一遍又一遍地阅读文档，他们也会告诉您这样做。对 DBA 来说，最重要的指南或许是
    `Oracle Database Concepts Guide`（Oracle 数据库概念指南），我们将在本章讨论。如果您真想成为顶尖的 Oracle DBA
    之一，您将会非常熟悉 `Oracle Database Concepts Guide` 中的信息。


    如果您想将自己提升至大师级别，您需要用细齿梳子般精细地研究文档。**钻研每一个细节**。拿文档中给出的例子，用它们形成测试用例，并围绕该概念进行试验。当我读到一些大师级
    DBA 的博客文章时，总是感到惊讶，他们将 Oracle 文档中我完全一扫而过的一小部分内容拿出来，仔细检查每一个微小的细节。


    我希望我已经说服您，您需要使用 Oracle 文档来提升技能并推进您的职业生涯。到目前为止，在本书中，我已向您推荐了 `Database Installation
    Guides`（数据库安装指南）（第 5 章）；`Database Backup and Recovery User’s Guide`（数据库备份与恢复用户指南）和
    `Database Backup and Recovery Reference`（数据库备份与恢复参考）（第 7 章）；以及 `Database 2 Day
    + Security Guide`（数据库两天+安全指南）和 `Database Security Guide`（数据库安全指南）（第 8 章）。我让您自行去文档集中查阅这些指南进行阅读。让读者您自己决定，是刻意为之的。**您必须习惯阅读文档这个想法。**

    '
- fmt: '### Tip


    阅读 Oracle 文档是提升技能的必经之路。


    我曾接触过一些产品，其文档仅是 20 或 40 页的 PDF 文件，可以从头到尾轻松读完。遗憾的是，Oracle 的文档集非常冗长。当你访问 [`https://docs.oracle.com`](https://docs.oracle.com)
    时，会看到从“解决方案”到“行业”的 15 个不同类别。一开始，面对如此多的类别，你可能不确定该从何入手。前八个类别如图 [13-1](#467924_1_En_13_Chapter.xhtml#Fig1)
    所示。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig1_HTML.png](images/467924_1_En_13_Chapter/467924_1_En_13_Fig1_HTML.png)


    图 13-1


    Oracle 文档类别（部分视图）


    我们在前面的章节中已经导航到 Oracle 数据库文档。但为了完整性，我们将在此处再次 walkthrough 这些步骤。出于我们的目的，我们总是点击“数据库”类别。点击该类别后，会出现五个子类别，从
    Oracle 数据库到其他数据库。对于本书，我们将始终点击 Oracle Database，即图 [13-2](#467924_1_En_13_Chapter.xhtml#Fig2)
    左下角的按钮。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig2_HTML.png](images/467924_1_En_13_Chapter/467924_1_En_13_Fig2_HTML.png)


    图 13-2


    数据库文档子类别（部分视图）


    当你进入下一页时，可能不太明显的是，Oracle Database 类别包含了针对 Oracle 18c 版本的 147 本不同的文档书。这就是为什么人们不喜欢阅读
    Oracle 文档。如果仅仅 Oracle 数据库就有 147 本不同的书要读，那么在 [`https://docs.oracle.com`](https://docs.oracle.com)
    的其他类别中还有多少其他的书？文档书如此之多，很难知道该读哪一本。你可能会想：“光是找到 Oracle 数据库文档集就不容易了，现在你还想让我从 147 本不同的书中挑选？”别担心，本章将帮助你理清头绪。你使用文档集的经验越多，就越能更好地利用它来为自己服务。


    ### Tip


    不要让庞大的 Oracle 文档量压垮你。


    撰写文档的 Oracle 员工在网站组织方面做得很好，旨在帮助你更容易地找到所需内容。让导航到你需要的书籍更高效并非易事。在我职业生涯中使用这个文档集的过程中，我注意到它随着
    Oracle 的每个版本而增长，导航也变得更加复杂。有很多 DBA 讨厌 Oracle 决定布局文档集的方式，但这就是我们必须面对的现实。


    点击图 [13-2](#467924_1_En_13_Chapter.xhtml#Fig2) 所示的 Oracle Database 按钮后，我们可以在图
    [13-3](#467924_1_En_13_Chapter.xhtml#Fig3) 中看到主要主题。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig3_HTML.jpg](images/467924_1_En_13_Chapter/467924_1_En_13_Fig3_HTML.jpg)


    图 13-3


    Oracle 数据库文档导航


    首先要注意的是顶部的下拉菜单。每个新版本都与其前身不同，文档中的某些信息也随版本而变化。新功能被引入并记录。旧功能可能发生变化，这些变化也被记录下来。在撰写本文时，下拉菜单包含版本
    11.2、12.1、12.2 和 18c。在本章撰写之后，Oracle 19c 文档现已可用。下拉菜单的最后一项是“早期版本”，它提供了对一直追溯到 Oracle
    7.3.4 版本文档的访问。无论何时阅读 Oracle 文档，请确保选择你正在使用的正确版本，以获得尽可能准确的信息。无论何时阅读文档的某一页，页面顶部的导航面包屑会告诉你正在浏览的版本。


    每当我阅读文档时，我总是在试图学习一些东西。然而，我试图学习的最重要的事情是：哪条信息位于文档的哪个位置。有这么多文档要读，不可能记住所有内容。值得庆幸的是，你不需要全部记住。你总是可以返回并在以后找到你读过的内容。例如，在阅读
    *Database Installation Guide for Linux* 时，我不需要记住如果服务器有 4GB RAM，Oracle 数据库需要 4GB
    交换空间。相反，我只需要记住交换空间信息在 *Installation Guide* 中。以后，当我在安装 Oracle 时，既然我知道去哪里找，就可以轻松地参考
    *Installation Guide*。Oracle Database 有 147 本书要读，你很可能无法全部记住。


    ### Tip


    最重要的事情是了解文档中各处的内容。


    这是我能给你的最大建议。了解文档集中各处的内容。一旦你知道了这一点，信息量就不会显得那么庞大，你会开始更多地使用文档。像任何事情一样，你用得越多，就越擅长它。尽可能多地使用
    Oracle 文档，你会发现它是一个无价的工具。我必须如此频繁地访问文档，以至于当我想在浏览器地址栏中输入 [docs.​oracle.​com](http://docs.oracle.com)
    时，只需输入“do”，浏览器就会自动建议这个网站。


    阅读时，你可能会想要记笔记。我发现记笔记是有益的。每次我写下学到的东西，都有助于我记住这个概念。通常，我的笔记会变成博客文章来分享所学。博客将在第 [16](#467924_1_En_16_Chapter.xhtml)
    章讨论。


    在更详细地讨论文档之前，我想补充最后一点。阅读每个新版本的文档。正如我之前所说，事情可能而且将会从一个 Oracle 版本到下一个版本发生变化。当新版本发布时，我读的第一样东西就是最新的
    *Database New Features Guide*，它让我对新版本中的新特性有一个高层次的概览。之后，我会阅读本章将讨论的几本核心书籍。这样做不仅通过再次阅读信息巩固了现有知识，还让我惊喜地发现一些与新版本相关的新细节。我甚至学到了一些与旧版本相关但从未在该旧版本文档中解释过的内容。


    不要害怕文档。越来越多地使用它，你将比你想象的更大地扩展你对 Oracle 数据库的知识。我对此深有感触。不要把文档看作以后可以处理的东西。让它成为你 Oracle
    知识的主要资源。'
  raw: '### Tip


    Read the Oracle documentation. It is a must for advancing your skillset.


    I have worked with some products where the documentation was a 20- or 40-page
    PDF file. It was easy to read it from start to finish. Unfortunately for us, the
    Oracle documentation set is very, very lengthy. When you go to [`https://docs.oracle.com`](https://docs.oracle.com)
    , you will find 15 different categories, starting with Solutions all the way to
    Industries. Right away, you may not be sure where to go with so many different
    categories. You can see the first eight of these categories in Figure [13-1](#467924_1_En_13_Chapter.xhtml#Fig1).


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig1_HTML.png](images/467924_1_En_13_Chapter/467924_1_En_13_Fig1_HTML.png)


    Figure 13-1


    Oracle documentation categories (partial view)


    We have already navigated to the Oracle database documentation in previous chapters.
    However, we will go through the steps here for thoroughness. For our purposes,
    we will always be clicking the Database category. Once you click that category,
    there are five subcategories, ranging from Oracle Database to Other Databases.
    For this book, we will always click Oracle Database, the bottom-left button in
    Figure [13-2](#467924_1_En_13_Chapter.xhtml#Fig2).


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig2_HTML.png](images/467924_1_En_13_Chapter/467924_1_En_13_Fig2_HTML.png)


    Figure 13-2


    Database documentation subcategories (partial view)


    What may not be obvious when you land on the next page is that the Oracle Database
    category contains 147 different documentation books for the Oracle 18c version.
    This is why people do not like to read the Oracle documentation. If there are
    147 different books to read just for the Oracle database, how many other books
    exist on [`https://docs.oracle.com`](https://docs.oracle.com) in other categories?
    There are so many different documentation books out there that it is very difficult
    to know which one to read. You might be thinking, “Just getting to the Oracle
    Database documentation set was not an easy task and now you want me to pick through
    147 different books?” Don’t worry, as this chapter will help you sort it out.
    The more you work with the documentation set, the better you’ll be able to leverage
    it to your advantage.


    ### Tip


    Do not let the volume of Oracle documentation overwhelm you.


    The people at Oracle who write the documentation have done a good job with their
    website in their effort to organize the documentation set so that you can more
    easily find what you are looking for. It is no easy task to make navigating to
    the book you need more efficient. As I’ve worked with this documentation set over
    my career, I have noticed that it grows with every release of Oracle and navigation
    becomes more complex. There are many DBAs out there that hate the way Oracle has
    decided to lay out the documentation set, but it is what we have to work with.


    After clicking the Oracle Database button shown in Figure [13-2](#467924_1_En_13_Chapter.xhtml#Fig2),
    we can see the major topics in Figure [13-3](#467924_1_En_13_Chapter.xhtml#Fig3).


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig3_HTML.jpg](images/467924_1_En_13_Chapter/467924_1_En_13_Fig3_HTML.jpg)


    Figure 13-3


    Oracle Database documentation navigation


    The first thing to notice is the drop-down menu near the top. Each new version
    is different from its predecessors, and some of the information in the documentation
    changes from version to version. New features are introduced and documented. Older
    features may change and the changes are documented. At the time of writing, the
    drop-down menu contains versions 11.2, 12.1, 12.2, and 18c. After this chapter
    was written, the Oracle 19c documentation has now become available. The last item
    in the drop-down menu is Earlier Releases, which provides access to documentation
    for releases going all the way back to Oracle 7.3.4. Whenever you are reading
    the Oracle documentation, make sure to select the proper version you are working
    with to get to the most accurate information possible. Whenever you are reading
    a page of the documentation, the navigation breadcrumbs at the top of the page
    will tell you which version you are browsing.


    Whenever I read the documentation, I’m always trying to learn something. However,
    the most important thing I try to learn is what piece of information is located
    in which spot in the documentation. With so much documentation to read, it is
    impossible to remember everything. Thankfully, you do not have to memorize it
    all. You can always go back and find what you read at a later date. For example,
    when reading the *Database Installation Guide for Linux*, I do not need to memorize
    that an Oracle database requires 4GB of swap if the server has 4GB of RAM. Instead,
    I just need to memorize that the swap space information is in the *Installation
    Guide*. Later on, when I am installing Oracle, I can easily refer back to the
    *Installation Guide* now that I know where to go. With 147 books to read on Oracle
    Database, you will most likely not be able to memorize it all.


    ### Tip


    The most important thing is to learn what is where in the documentation.


    This is the biggest piece of advice I can give you. Learn what is where in the
    documentation set. Once you know that, the volume of information is much less
    overwhelming and you will start using the documentation more. Like anything, the
    more you use it, the better you become at it. Use the Oracle documentation as
    much as you can and you will find it an invaluable tool. I must visit the documentation
    so much, when I want to start typing [docs.​oracle.​com](http://docs.oracle.com)
    in the address bar of my browser window, the browser automatically suggests this
    site after typing “do”.


    As you read, you may be tempted to take notes. I find taking notes to be beneficial.
    Any time I write down something I learn, it helps me remember the concept. Often,
    my notes become blog posts to share what I learned. Blogging will be discussed
    in Chapter [16](#467924_1_En_16_Chapter.xhtml).


    Before moving on to discussing the documentation in more detail, I want to add
    one final item. Read the documentation with each new version. As I stated earlier,
    things can and will change from one Oracle version to the next. When a new version
    is released, the first thing I read is the latest *Database New Features Guide*,
    which gives me a high-level overview of the new goodies found in the new version.
    After that, I read a few of the core books that we will discuss in this chapter.
    Doing so solidifies existing knowledge after I have read the information again
    and also surprises me with a few new tidbits here and there related to the new
    version. I’ve even learned things that were relevant to an older version but were
    never explained in that older version’s documentation.


    Do not be afraid of the documentation. Start using it more and more and you will
    expand your knowledge of the Oracle database more than you ever thought possible.
    I feel very strongly about this. Do not think of the documentation as something
    you can get to later. Make it a primary resource for your Oracle knowledge.'
  trans: '

    ### 提示


    阅读 Oracle 文档是提升技能的必经之路。


    我曾接触过一些产品，其文档仅是 20 或 40 页的 PDF 文件，可以从头到尾轻松读完。遗憾的是，Oracle 的文档集非常冗长。当你访问 [`https://docs.oracle.com`](https://docs.oracle.com)
    时，会看到从“解决方案”到“行业”的 15 个不同类别。一开始，面对如此多的类别，你可能不确定该从何入手。前八个类别如图 13-1 所示。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig1_HTML.png](img/467924_1_En_13_Fig1_HTML.png)


    图 13-1


    Oracle 文档类别（部分视图）


    我们在前面的章节中已经导航到 Oracle 数据库文档。但为了完整性，我们将在此处再次逐步讲解这些步骤。出于我们的目的，我们总是点击“数据库”类别。点击该类别后，会出现五个子类别，从
    Oracle 数据库到其他数据库。对于本书，我们将始终点击 Oracle Database，即图 13-2 左下角的按钮。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig2_HTML.png](img/467924_1_En_13_Fig2_HTML.png)


    图 13-2


    数据库文档子类别（部分视图）


    当你进入下一页时，可能不太明显的是，Oracle Database 类别包含了针对 Oracle 18c 版本的 147 本不同的文档书。这就是为什么人们不喜欢阅读
    Oracle 文档。如果仅仅 Oracle 数据库就有 147 本不同的书要读，那么在 [`https://docs.oracle.com`](https://docs.oracle.com)
    的其他类别中还有多少其他的书？文档书如此之多，很难知道该读哪一本。你可能会想：“光是找到 Oracle 数据库文档集就不容易了，现在你还想让我从 147 本不同的书中挑选？”别担心，本章将帮助你理清头绪。你使用文档集的经验越多，就越能更好地利用它来为自己服务。


    ### 提示


    不要让庞大的 Oracle 文档量压垮你。


    撰写文档的 Oracle 员工在网站组织方面做得很好，旨在帮助你更容易地找到所需内容。让导航到你需要的书籍更高效并非易事。在我职业生涯中使用这个文档集的过程中，我注意到它随着
    Oracle 的每个版本而增长，导航也变得更加复杂。有很多 DBA 讨厌 Oracle 决定布局文档集的方式，但这就是我们必须面对的现实。


    点击图 13-2 所示的 Oracle Database 按钮后，我们可以在图 13-3 中看到主要主题。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig3_HTML.jpg](img/467924_1_En_13_Fig3_HTML.jpg)


    图 13-3


    Oracle 数据库文档导航


    首先要注意的是顶部的下拉菜单。每个新版本都与其前身不同，文档中的某些信息也随版本而变化。新功能被引入并记录。旧功能可能发生变化，这些变化也被记录下来。在撰写本文时，下拉菜单包含版本
    11.2、12.1、12.2 和 18c。在本章撰写之后，Oracle 19c 文档现已可用。下拉菜单的最后一项是“早期版本”，它提供了对一直追溯到 Oracle
    7.3.4 版本文档的访问。无论何时阅读 Oracle 文档，请确保选择你正在使用的正确版本，以获得尽可能准确的信息。无论何时阅读文档的某一页，页面顶部的导航面包屑会告诉你正在浏览的版本。


    每当我阅读文档时，我总是在试图学习一些东西。然而，我试图学习的最重要的事情是：哪条信息位于文档的哪个位置。有这么多文档要读，不可能记住所有内容。值得庆幸的是，你不需要全部记住。你总是可以返回并在以后找到你读过的内容。例如，在阅读
    *Database Installation Guide for Linux* 时，我不需要记住如果服务器有 4GB RAM，Oracle 数据库需要 4GB
    交换空间。相反，我只需要记住交换空间信息在 *Installation Guide* 中。以后，当我在安装 Oracle 时，既然我知道去哪里找，就可以轻松地参考
    *Installation Guide*。Oracle Database 有 147 本书要读，你很可能无法全部记住。


    ### 提示


    最重要的事情是了解文档中各处的内容。


    这是我能给你的最大建议。了解文档集中各处的内容。一旦你知道了这一点，信息量就不会显得那么庞大，你会开始更多地使用文档。像任何事情一样，你用得越多，就越擅长它。尽可能多地使用
    Oracle 文档，你会发现它是一个无价的工具。我必须如此频繁地访问文档，以至于当我想在浏览器地址栏中输入 [docs.oracle.com](http://docs.oracle.com)
    时，只需输入“do”，浏览器就会自动建议这个网站。


    阅读时，你可能会想要记笔记。我发现记笔记是有益的。每次我写下学到的东西，都有助于我记住这个概念。通常，我的笔记会变成博客文章来分享所学。博客将在第 16 章讨论。


    在更详细地讨论文档之前，我想补充最后一点。阅读每个新版本的文档。正如我之前所说，事情可能而且将会从一个 Oracle 版本到下一个版本发生变化。当新版本发布时，我读的第一样东西就是最新的
    *Database New Features Guide*，它让我对新版本中的新特性有一个高层次的概览。之后，我会阅读本章将讨论的几本核心书籍。这样做不仅通过再次阅读信息巩固了现有知识，还让我惊喜地发现一些与新版本相关的新细节。我甚至学到了一些与旧版本相关但从未在该旧版本文档中解释过的内容。


    不要害怕文档。越来越多地使用它，你将比你想象的更大地扩展你对 Oracle 数据库的知识。我对此深有感触。不要把文档看作以后可以处理的东西。让它成为你 Oracle
    知识的主要资源。

    '
- fmt: '## Installing and Upgrading


    在 Oracle 18c 版本的 Oracle Database 分类下，有一个名为 `Install and Upgrade` 的链接。它位于 `Topics`
    标题下，如图 [13-4](#467924_1_En_13_Chapter.xhtml#Fig4) 所示。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig4_HTML.jpg](images/467924_1_En_13_Chapter/467924_1_En_13_Fig4_HTML.jpg)


    图 13-4：`Install and Upgrade` 链接


    点击该链接会进入一个包含多本与安装和升级 Oracle 数据库相关书籍的部分，其部分内容如图 [13-5](#467924_1_En_13_Chapter.xhtml#Fig5)
    所示。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig5_HTML.jpg](images/467924_1_En_13_Chapter/467924_1_En_13_Fig5_HTML.jpg)


    图 13-5：18c 安装指南（部分视图）


    我们将在第 [18](#467924_1_En_18_Chapter.xhtml) 章讨论 `Database Upgrade Guide`。`Licensing
    Information User Manual` 是所有 Oracle 数据库管理员的必读书籍。这本书解释了 Oracle 的许可方式，非常重要，可以避免您的组织因不当使用
    Oracle 而面临额外费用甚至更糟的情况。如果您因许可使用情况而被 Oracle 审计，您会庆幸自己阅读并遵守了本手册中的信息。


    接下来页面上是针对不同平台安装 Oracle 的部分。我们在第 [5](#467924_1_En_5_Chapter.xhtml) 章探讨了 `Installation
    Guide for Linux`。希望您至少已经浏览过这份文档，了解其中呈现的信息。如果您日后需要在 Windows、Solaris 或 AIX 上安装 Oracle，您已经知道需要阅读哪些文档才能成功完成安装。


    ## Administration


    由于本书侧重于 Oracle 数据库管理，因此需要阅读的文档主要领域是管理相关主题。如图 [13-6](#467924_1_En_13_Chapter.xhtml#Fig6)
    所示，`Topics` 下的 `Administration` 分类中的书籍链接位于 `Install and Upgrade` 链接下方。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig6_HTML.jpg](images/467924_1_En_13_Chapter/467924_1_En_13_Fig6_HTML.jpg)


    图 13-6：`Administration` 主题


    点击 `Administration` 链接后，您将看到几本可供阅读的书籍，其部分列表如图 [13-7](#467924_1_En_13_Chapter.xhtml#Fig7)
    所示。


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig7_HTML.png](images/467924_1_En_13_Chapter/467924_1_En_13_Fig7_HTML.png)


    图 13-7：18c 管理书籍（部分视图）


    图 [13-7](#467924_1_En_13_Chapter.xhtml#Fig7) 显示的是 Oracle 18c 版本的文档。如果您需要其他版本的文档，请返回上一页并从下拉菜单中选择您的版本。接下来我们将更详细地讨论这里列出的书籍。尝试熟悉这部分文档，因为在您的
    DBA 职业生涯中，您将在这里花费大量时间。


    ## 2 Day Guides


    Oracle 公司一定意识到了其文档集对客户来说可能多么令人生畏。Oracle 在其“2 Day”系列中推出了几本书。我们可以在图 [13-7](#467924_1_En_13_Chapter.xhtml#Fig7)
    中看到其中两本。Oracle 还提供了 `Database 2 Day Developer’s Guide` 和 `Database 2 Day + Java
    Developer’s Guide`。这些书是获取相关主题入门材料并初步实践的绝佳方式。这些书并非让您只阅读该主题的唯一书籍。阅读 2 Day 指南后，请深入文档集的其余部分进一步研究。


    图 [13-7](#467924_1_En_13_Chapter.xhtml#Fig7) 中列出的 `2 Day DBA` 一书包含关于如何安装和创建 Oracle
    数据库的章节、关于如何使用各种工具管理数据库的章节，以及关于如何配置网络、管理存储、提供数据库安全性以及执行备份和恢复的章节。还有一章专门讨论性能调优。这本
    2 Day 指南听起来开始与本书及市场上的其他书籍非常相似。我们在本书中也按主题涵盖了相同的领域。请将 `2 Day DBA` 一书作为您图书馆中的另一个资源。


    `Database 2 Day + Performance Tuning Guide` 引导您开始 Oracle 数据库性能调优这一非常庞大但令人兴奋的主题。这是我最喜欢的科目之一，即使我已经进行
    Oracle 数据库性能调优 20 年，我仍然每天都在学习新东西。2 Day + Performance Tuning Guide 只是触及了皮毛，但它是一个很好的起点。


    确保花些时间阅读 2 Day 指南。阅读它们后，您会遇到问题并寻求答案。这些问题的答案通常可以在我们将在本章讨论的其他书籍中找到。


    ## Concepts Guide


    如果您只有一两本 Oracle 书籍的阅读时间，我会告诉您，文档集中有两本每个 Oracle DBA 都必须阅读的书。第一本是 Concepts Guide，第二本是下一节将讨论的
    `Database Administrator’s Guide`。Concepts Guide 是必读书籍。这本书对您的 DBA 职业生涯如此重要，您应该从头到尾阅读它多遍。


    ### Tip


    阅读 Concepts Guide！它太重要了，不容错过！


    Concepts Guide 介绍了使 Oracle 数据库引擎工作的许多理论和模型。是否想过 Oracle 如何处理数据库事务？它就在里面。是否想过 Oracle
    如何存储数据？它就在里面。需要了解更多关于索引的信息？它就在里面。


    在阅读 Concepts Guide 时，您可能会发现自己会转向其他书籍以获取该主题的更多信息，这是消化这些信息的可接受方式。我建议先从头到尾阅读 Concepts
    Guide，以了解其中的内容。然后回头阅读某一章，目标是尝试学习更多关于该主题的知识。如果需要，再扩展到其他信息来源。回来阅读下一章并重复。


    Concepts Guide 包含六个主要部分：


    *   第一部分，“Oracle 关系数据结构”，涵盖表、索引和其他模式对象以及如何确保数据完整性。


    *   第二部分，“Oracle 数据访问”，涵盖 SQL 和 PL/SQL。


    *   第三部分，“Oracle 事务管理”，涵盖事务如何工作以及如何确保数据一致性。


    *   第四部分，“Oracle 数据库存储结构”，涵盖磁盘上的物理文件和逻辑存储实现。


    *   第五部分，“Oracle 实例架构”，涵盖 Oracle 如何使用进程和内存使引擎工作。


    *   第六部分，“Oracle 数据库管理和应用程序开发”，涵盖如何管理 Oracle 数据库以及为其进行开发。


    请记住，本章前面我提到过，重要的是了解文档集中各部分的位置。Concepts Guide 打破了这个规则。这是一本您会想从头到尾学习的书。在理解所有内容之前，您可能需要多次通读这本书，并且可能需要跳转到其他来源。阅读
    Concepts Guide 不是一场竞赛，所以请慢慢来。在与 Oracle 打交道数十年后，我仍在阅读这本书。


    ## Administrator’s Guide


    `Administrator’s Guide` 是另一本至关重要的书。Concepts Guide 阐述了事情应该如何工作的理念，而 `Administrator’s
    Guide` 则向您展示了如何去做。这两本书相辅相成。我经常发现自己在这两本书之间来回翻阅。'
  raw: '## Installing and Upgrading


    In the Oracle Database category for the Oracle 18c version, there is a link to
    a section named Install and Upgrade. It is under the Topics heading, as shown
    in Figure [13-4](#467924_1_En_13_Chapter.xhtml#Fig4).


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig4_HTML.jpg](images/467924_1_En_13_Chapter/467924_1_En_13_Fig4_HTML.jpg)


    Figure 13-4


    Install and Upgrade link


    Clicking that link brings us to a section with several books related to installing
    and upgrading Oracle databases, part of which is shown in Figure [13-5](#467924_1_En_13_Chapter.xhtml#Fig5).


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig5_HTML.jpg](images/467924_1_En_13_Chapter/467924_1_En_13_Fig5_HTML.jpg)


    Figure 13-5


    18c Installation Guides (partial view)


    We will talk about the *Database Upgrade Guide* in Chapter [18](#467924_1_En_18_Chapter.xhtml).
    The *Licensing Information User Manual* is a must-read for all Oracle database
    administrators. This book explains how Oracle is licensed and is important so
    that you do not get your organization into a situation where they are using Oracle
    improperly and exposing themselves to extra fees or worse. If you are ever audited
    by Oracle for your license usage, you will be thankful you read this manual and
    complied with the information therein.


    What follows next on the page are sections for installing Oracle on different
    platforms. We explored the *Installation Guide for Linux* in Chapter [5](#467924_1_En_5_Chapter.xhtml).
    Hopefully you have at a minimum, scanned this documentation to see the information
    presented there. If you are asked at a later date to install Oracle on Windows,
    Solaris, or AIX, you already know which documentation you have to read to achieve
    a successful installation.


    ## Administration


    Because this book is focused on Oracle database administration, the main area
    of the documentation to read is related to the topic of administration. As shown
    in Figure [13-6](#467924_1_En_13_Chapter.xhtml#Fig6), the link for books in the
    Administration category is below the Install and Upgrade link under Topics.


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig6_HTML.jpg](images/467924_1_En_13_Chapter/467924_1_En_13_Fig6_HTML.jpg)


    Figure 13-6


    Administration topic


    Once you click the Administration link, you will be presented several books to
    read, a partial list of which is shown in Figure [13-7](#467924_1_En_13_Chapter.xhtml#Fig7).


    ![../images/467924_1_En_13_Chapter/467924_1_En_13_Fig7_HTML.png](images/467924_1_En_13_Chapter/467924_1_En_13_Fig7_HTML.png)


    Figure 13-7


    18c Administration books (partial view)


    Figure [13-7](#467924_1_En_13_Chapter.xhtml#Fig7) shows the documentation for
    the Oracle 18c version. If you want the documentation for a different version,
    go back to the previous page and select your version from the drop-down menu.
    We will discuss the books you see listed here in more detail next. Try to become
    familiar with this section of the documentation because you will be spending a
    lot of time here over the course of your DBA career.


    ## 2 Day Guides


    Oracle Corporation must have recognized how daunting the documentation set can
    be for its customers. Oracle launched a few books in its “2 Day” series. We can
    see two of these books listed in Figure [13-7](#467924_1_En_13_Chapter.xhtml#Fig7).
    Oracle also provides a *Database 2 Day Developer’s Guide* and a *Database 2 Day
    + Java Developer’s Guide* as well. These books are a great way to obtain introductory
    material on the topic at hand and get your feet wet. These books are not meant
    to be the only books you read on the subject. After reading the 2 Day guides,
    delve further into the subject with the rest of the documentation set.


    The *2 Day DBA* book listed in Figure [13-7](#467924_1_En_13_Chapter.xhtml#Fig7)
    includes a chapter on how to install and create an Oracle database, a chapter
    on how to administer the database with various tools, and chapters on how to configure
    the network, manage storage, provide database security, and perform back and recovery.
    There is a chapter devoted to performance tuning as well. This 2 Day guide starts
    to sound a lot like this book and others on the market. We’ve covered the same
    areas topically in this book as well. Use the *2 Day DBA* book as another resource
    in your library.


    The *Database 2 Day + Performance Tuning Guide* gets you started down the road
    of the very large but exciting topic of performance tuning for the Oracle database.
    This is one of my favorite subjects, and even though I have been performance tuning
    Oracle databases for 20 years, I still learn something every day. The 2 Day +
    Performance Tuning Guide just scratches the surface but it is a great place to
    start.


    Make sure to spend some time with the 2 Day guides. After reading them, you will
    have questions and want to seek answers. Those are often found in the other books
    we will discuss in this chapter.


    ## Concepts Guide


    If you only had time to read one or two Oracle books, I would tell you that there
    are two books in the documentation set that every Oracle DBA must read. The first
    is the Concepts Guide and the second is the *Database Administrator’s Guide,*
    discussed in the next section. The Concepts Guide is a must-read. This book is
    so important to your DBA career, you should read it multiple times, cover to cover.


    ### Tip


    Read the Concepts Guide! It is too important to miss!


    The Concepts Guide goes over many of the theories and models that make the Oracle
    database engine work. Ever wondered how Oracle processes database transactions?
    It’s in there. Ever wondered how Oracle stores data? It’s in there. Need to know
    more about indexes? It’s in there.


    As you read the Concepts Guide, you may find yourself moving to other books to
    get more information on that subject, which is an acceptable way to consume this
    information. I would recommend reading the Concepts Guide from cover to cover
    just to get an idea of what’s in there. Then go back and read a chapter with the
    goal of trying to learn more about that topic. If needed, then branch out to other
    sources of information. Come back and read the next chapter and repeat.


    The Concepts Guide contains six major parts:


    *   Part I, “Oracle Relational Data Structures,” covers tables, indexes, and other
    schema objects and how to ensure data integrity.


    *   Part II, “Oracle Data Access,” covers SQL and PL/SQL.


    *   Part III, “Oracle Transaction Management” covers how transactions work and
    how to ensure data consistency.


    *   Part IV, “Oracle Database Storage Structures,” covers physical files on disk
    and logical storage implementation.


    *   Part V, “Oracle Instance Architecture,” covers how Oracle uses processes and
    memory to make the engine work.


    *   Part VI, “Oracle Database Administration and Application Development,” covers
    how to administer and develop for an Oracle database.


    Remember that earlier in this chapter I mentioned the important thing is to learn
    what is where in the documentation set. The Concepts Guide breaks the rule. This
    is one book you will want to learn from front to back. It may take multiple passes
    through the book before everything makes sense and you may need to hop around
    to other sources. Reading the Concepts Guide is not a race, so take your time
    with it. After decades of working with Oracle, I’m still reading the book.


    ## Administrator’s Guide


    The *Administrator’s Guide* is the second book that is vitally important to read.
    Whereas the Concepts Guide presents the ideas of how things should work, the *Administrator’s
    Guide* shows you how to do it. These books go hand in hand. I often find myself
    bouncing between the two.'
