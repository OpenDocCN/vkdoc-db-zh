    to each other by following the lines in the diagram. The search box can be used
    to more easily find a view if you know part of its name.


    ![../images/467924_1_En_20_Chapter/467924_1_En_20_Fig7_HTML.jpg](images/467924_1_En_20_Chapter/467924_1_En_20_Fig7_HTML.jpg)


    Figure 20-7 Interactive Quick Reference DBA Views tab


    Clicking a view will bring up its description. If we click the `DBA_TABLESPACES`
    view, we can see all of its columns, similar to Figure 20-8.


