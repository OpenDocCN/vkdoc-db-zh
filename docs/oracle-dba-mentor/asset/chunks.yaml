    `database`。


    如果听众的技能水平未知，最好从假设他们属于非 IT 类别开始说话。尽可能简化与数据库相关的术语。在你的讨论中，倾听他们说的话。很多时候，他们使用的术语可以提示你需要如何调整你的词汇以适应他们的技能水平并更有效地沟通。在处理数据库服务请求时，DBA
    应做的第一件事是倾听请求的细节。记住，并非每个人都使用与 DBA 相同的术语。不要立即拒绝他们的请求。他们可能不知道如何正确地提出他们的需求，因为他们不懂如何说你的语言。这是粗鲁的
    DBA 需要真正重点关注并加以改进的一个方面。


    ## 继续前进


    本章讨论了你在数据库管理职业生涯中应如何工作和与他人互动的不同方面。本章不包含任何技术内容，但当你翻到下一页时，这种情况将会改变。在本章中，我们讨论了不做粗鲁的数据库管理员的重要性，以及当有人向你提交请求时需要进一步调查的必要性。我们讨论了你将会互动的不同人来自不同听众的观点，并且根据听众使用适当的术语是你的责任。我们还阐述了当今的
    DBA 通常需要在不同平台上工作的事实。良好的数据库理论基础可以帮助 DBA 从一个数据库平台导航到另一个。


    在本书中，你将建立一些管理 Oracle 数据库的最佳实践，并更多地了解该产品。在我们开始之前，我们需要一个练习 Oracle 技术的地方。在下一章中，你将在工作站或笔记本电脑上设置一个虚拟机，以便有一个学习和探索的地方。


    脚注 1

    '
- fmt: '# 3. Creating Our Server


    This chapter is the first in the book to introduce some technical content. Every
    database administrator needs a place to experiment with ideas, try out new features,
    and verify changes work as expected. The DBA needs a non-production environment
    because as they do work for the first time, they may break something. We do not
    want things to break in production. Ideally, when we are making a change in production,
    the change is well understood, rehearsed, and there are no surprises. Getting
    to such a point often requires multiple attempts. Production databases should
    never be treated as a playground.


    Many organizations provide non-production areas for the DBA and for other IT personnel.
    In an ideal world, these non-production workspaces match the production environment
    as closely as possible. But what do you do if your company does not have any non-production
    environment for you to use? What if you just need a simple database, mostly empty,
    to test out a few concepts?


    Virtualization technologies have changed life for the better for IT staff. Today’s
    container environments, like Docker and Kubernetes, and cloud technologies are
    making similar improvements for IT infrastructure. This chapter will show you
    how to create a Linux virtual machine on which you will install and create an
    Oracle database. Chapter 10 will discuss the importance of testbeds and building
    test cases. What you build in the next few chapters will provide you with such
    a testbed.


    Even if your company provides non-production areas for your use, you may still
    find it beneficial to create simple testbeds on your workstation or laptop. We
    often think of non-production databases for our development and testing efforts
    as we produce and verify changes, respectively. I have often said that while these
    are non-production, they are production for someone. If you take down a development
    database in the middle of the day, application developers cannot work. If you
    take down a test database in the middle of the day, the quality assurance team
    cannot validate the changes. The database administrator needs their own personal
    work area where they can experiment with changes and new features. They need to
    have complete control over this environment, and if they make a mess of things,
    they are only hurting themselves. Providing a testbed server also lets the database
    administrator run databases on different operating systems, which they may need
    for their environment.


    ## Downloading VirtualBox


    For this chapter, we will use Oracle VM VirtualBox to manage the virtual machines
    (VMs). There are other virtual hypervisors that you could certainly use, such
    as VMware Fusion or Microsoft Hyper-V. I chose VirtualBox for this book because
    it is free and because many Oracle professionals use the product. Due to its widespread
    use, you can find many helpful resources for running Oracle on VirtualBox.


    To download VirtualBox, point your web browser to `www.virtualbox.org` and, on
    the main screen, click the big Download VirtualBox button to display the latest
    and greatest version of this product. Figure 3-1 shows an example of the button
    to look for and was the latest and greatest version when this chapter was written.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig1_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig1_HTML.jpg)


    Figure 3-1: VirtualBox Download button


    VirtualBox is available for multiple platforms, including Windows, macOS, and
    Linux. After you click the Download button, you will be taken to a page to download
    the product for your platform. This chapter will show you how to create a testbed
    server running Oracle on Linux with VirtualBox on a Windows desktop or laptop,
    but the instructions are very similar on other platforms as well. On the download
    page, I’m going to click the “Windows hosts” link. Select your preferred platform
    and the download will begin. Once the download is complete, run the installation
    software. On Windows, this is as simple as double-clicking the `.exe` file that
    was downloaded. The wizard walks you through the installation steps. You can accept
    the default values supplied by the wizard. At one point, there is a warning that
    the installation process will temporarily reset your machine’s network connections,
    so make sure it is a good time to do so before clicking the Yes button. An example
    of this warning is shown in Figure 3-2.


    ![../images/467924_1_En_3_Chapter/467924_1_En_3_Fig2_HTML.jpg](images/467924_1_En_3_Chapter/467924_1_En_3_Fig2_HTML.jpg)


    Figure 3-2: VirtualBox installation network warning


    That was easy. VirtualBox is now installed.'
