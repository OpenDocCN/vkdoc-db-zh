    If this situation applies to you, I highly recommend you perform one upgrade and
    then wait awhile, making sure there are no issues. After you are confident things
    are running fine on the 11.2.0.4 version, upgrade to 18c. Do not attempt to upgrade
    from 10.2.0.5 to 11.2.0.4 then to 18.3 all in the same downtime window.


    ### Manual Upgrade


    You always have the option of performing a manual upgrade. Before the DBUA existed,
    this method was the most preferred. The manual upgrade has two of the same characteristics
    as using the DBUA. One, you can only perform a manual upgrade for versions that
    support a direct upgrade. The DBUA is actually performing the same steps as a
    manual upgrade, it is just automating the process for you. Two, the downtime window
    is similar, but in actuality will take a little bit longer because the database
    administrator will need to perform some of the steps the DBUA is much quicker
    in doing. The manual upgrade’s biggest downside is that the steps are performed
    manually by the DBA and the chances of human error increase greatly. Because of
    the increased risk, the DBUA is recommended over the manual upgrade almost every
    time.


    When a manual upgrade is performed, the database administrator must prepare the
    new Oracle home directory for the database. The database is then shut down cleanly.
    The DBA changes their environment to use the new software version. The database
    is started in MIGRATE mode and scripts are run to upgrade the database. Once complete,
    the DBA restarts the database with the new version.


    If the DBUA is a better option, why perform a manual upgrade? The only reason
    to do so is that the database administrator can intervene midway during the upgrade
    process. The DBUA will do what it was programmed to do. There may be certain situations
    where you want to perform the upgrade steps and introduce a step in the middle
    of the process. Such situations would be very, very rare. As such, the manual
    upgrade is not likely to be performed in today’s Oracle environments.'
  trans: '## 升级准备与执行


    12. 为生产环境升级安排一个停机窗口。所有相关的 IT 团队成员都应参与该计划。每个人都知道将要发生什么以及升级将在何时进行。


    13. 在停机窗口开始前，在数据库服务器上安装新版 Oracle。软件安装不需要任何停机时间，可以提前完成。请将第 5 步中创建的文档作为您的操作指南，安装过程应能顺利进行。


    14. 现在是升级生产数据库的时候了。在升级开始前，对数据库进行一次完整的备份。万一升级过程中出现问题，可能导致数据库处于无法运行的状态。您需要手头有这份备份，以便在需要时能恢复到升级前的状态。


    15. 升级生产数据库。请将第 6 步中创建的文档作为您的操作指南。这会让您对升级顺利进行充满信心。同时，由于无论进行到哪一步，您都知道下一步该做什么，这也能减少人为错误的几率，并缩短停机窗口。如果需要，可以打印出文档，并在完成每一步后将其划掉。


    16. 升级结束后，立即对数据库进行一次完整的备份。数据库升级并非易事。万一服务器或磁盘出现故障，您现在就有了升级后数据库的副本以备不时之需进行恢复。不要跳过第
    14 步和第 16 步，因为有一天它们很可能会帮您避免一场灾难。


    17. 升级完成后，继续监控应用程序的功能和性能数周。在开发和测试环境中进行的测试工作，很少能涵盖应用程序及其最终用户在生产环境中执行的所有操作。


    Oracle 将安装和升级过程记录在两本不同的手册中，您可以参考上述的第 1 步和第 2 步进行阅读。然而，这些手册是为通用环境编写的。您的环境是您组织所特有的。不要省略编写自己的逐步操作文档，因为这是您如何完成（专为您量身定制的）安装和升级的“行动手册”。不止一次，这种简单的文档编写任务使我避免了许多升级错误。


    不要跳过升级前后的备份。您可能永远用不到它们，它们看起来也像是不必要的步骤。然而，只需经历一次糟糕的升级，您就会庆幸自己做了这些额外的工作。


    ## 升级方法


    您可以使用三种不同的升级方法。所有方法都能将您的数据库升级到新版本。正如您能想到的，存在三种方法是因为它们的操作方式略有不同，并且各有优缺点，我们将在本节中探讨。这三种方法分别是：使用数据库升级助手
    (`DBUA`)、执行手动升级，以及使用某种形式的导出/导入来迁移数据库。


    在我们详细探讨这些方法之前，需要特别说明一点：无论您选择哪种方法，Oracle 公司都建议您在开始升级过程之前，为数据库应用最新的补丁集更新 (PSU) 或修订更新
    (RU)。在极少数情况下，旧版本中的一个错误在尝试升级到新版本时会导致问题。这个错误在旧版本上运行数据库时不一定会引发问题，但只在升级时才会“暴露其丑陋的面目”。如果您的数据库版本是最新的，就能减少遇到此类升级问题的几率。


    ### 数据库升级助手


    数据库升级助手 (`DBUA`) 是一个基于 Java 的、图形化的向导式实用程序，它将引导您完成升级过程。回答几个问题，多次点击“下一步”按钮，然后看着
    `DBUA` 为您完成工作。由于 `DBUA` 是用 Java 编写的，无论您的 Oracle 数据库运行在哪个操作系统平台上，它都是同一个实用程序。`DBUA`
    还有一个静默模式，您可以实现流程自动化并在命令行模式下运行。


    我的建议是，对于数据库升级，尽可能多地使用 `DBUA`。这种数据库升级方法通常具有最短的停机窗口。停机窗口时长不由数据库大小决定。`DBUA` 大大降低了人为错误的几率，因为它为您自动化了许多过程。`DBUA`
    甚至会运行先决条件检查，如果发现问题，会在尝试升级之前停止。


    更短的停机窗口和降低的风险是使用 `DBUA` 的两个好处。该实用程序的一个缺点是，升级过程不能同时将数据库迁移到不同的服务器。另一个缺点是，`DBUA`
    还要求待升级的数据库是少数几个版本之一。这称为直接升级。在本章中，我们将把测试环境中的数据库升级到 Oracle 18.3 版本。只有源数据库版本是 11.2.0.3、11.2.0.4、12.1.0.1、12.1.0.2
    或 12.2.0.1 时，才能直接升级到 18.3。如果您的数据库是其他版本，则无法使用 `DBUA` 升级到 18.3 版本。


    《数据库升级指南》总会列出可以进行直接升级的版本。如果您运行的是其他版本，那么您有两个选择：升级到一个支持直接升级的版本，或者使用导出/导入工具。导出/导入的升级路径稍后会讨论。


    例如，如果数据库是 10.2.0.5 版本，您可以升级到 11.2.0.4，然后再升级到 18.3。这种情况需要执行两次升级。如果这适用于您，我强烈建议您执行一次升级，然后等待一段时间，确保没有问题。在您确信
    11.2.0.4 版本运行良好后，再升级到 18c。不要尝试在同一个停机窗口内，从 10.2.0.5 直接升级到 11.2.0.4，然后再升级到 18.3。


    ### 手动升级


    您总是可以选择执行手动升级。在 `DBUA` 出现之前，这是最受青睐的方法。手动升级与使用 `DBUA` 有两个相同的特点。第一，您只能为支持直接升级的版本执行手动升级。实际上，`DBUA`
    执行的步骤与手动升级相同，只是它为您自动化了过程。第二，停机窗口相似，但实际上会稍长一些，因为数据库管理员需要手动执行一些 `DBUA` 能更快完成的步骤。手动升级最大的缺点是步骤由
    DBA 手动执行，人为错误的几率大大增加。由于风险增加，几乎每次都会推荐使用 `DBUA` 而非手动升级。


    执行手动升级时，数据库管理员必须为数据库准备新的 Oracle 主目录。然后，数据库被干净地关闭。DBA 更改其环境以使用新的软件版本。数据库以 `MIGRATE`
    模式启动，并运行脚本来升级数据库。完成后，DBA 使用新版本重启数据库。


    如果 `DBUA` 是更好的选择，为什么还要执行手动升级？唯一的理由是数据库管理员可以在升级过程中进行干预。`DBUA` 会按其预设程序执行。可能会有一些特殊情况，您希望在升级过程中手动介入并添加一个步骤。这种情况将非常、非常罕见。因此，在当今的
    Oracle 环境中，手动升级不太可能被采用。'
- fmt: '### Export/Import


    The last upgrade path is to use export and import utilities. There are many different
    type of utilities you could use. When people talk about export/import upgrade
    paths, they often mean to use Oracle’s Data Pump utilities, `impdp` and `expdp`.
    You could export the data to text files and import with `SQL*Loader`, as another
    example. Data replication tools, like `Oracle GoldenGate`, can also be used to
    move the data to a newer Oracle version. You could also use third-party utilities
    that have similar functionality.


    With the export/import upgrade path, you create a database running the new version.
    You export the data from the old database and import into the new database. Technically,
    this is not a database upgrade because the new database is not changing versions
    at all.


    There are two main reasons to use the export/import upgrade path. One, you want
    to perform the upgrade in one step and your current Oracle version does not support
    a direct upgrade. Using export/import, you can go from Oracle 7.1 to 18.3 in one
    step, as an example. Two, you can move to a different database server at the same
    time. You will export the data on one server and move the dump file(s) to the
    new server and import there. If you use Data Pump, you can transfer the data from
    one database to the other over the network.


    There are two big problems with this approach. One, the length of time is dependent
    on the database size. The larger the database, the longer it will take to export
    and the longer it will take to import, pure and simple. If your database is very
    large, the amount of time to complete this upgrade method may be unacceptable.
    Two, there is a certain amount of risk making sure you move everything. If you
    export to text files, you will be missing indexes, constraints, stored procedures,
    views, and so many more schema objects. You will have to move those separately.
    If you use Data Pump, the dump file can contain all of the schema objects, reducing
    this risk. Data Pump was introduced in Oracle 10*g*. If you are upgrading from
    an older version, you can alternatively use the legacy export and import utilities,
    `exp` and `imp`.


    ### Which to Choose?


    For the most part, database administrators use the `DBUA` to perform their upgrades.
    Choose this upgrade method so long as you can perform a direct upgrade. Use the
    export/import method if you are moving to a different server or your version is
    very old and you want to avoid multiple upgrades. The manual upgrade is almost
    never done today.


    ## Installing 18c


    Before we can upgrade our testbed database, we need to install a newer version
    of the database software on our virtual machine. In Chapter [5](#467924_1_En_5_Chapter.xhtml)
    we walked through installing the Oracle 12.2.0.1 software on our testbed. It is
    now time to upgrade that database we created in Chapter [6](#467924_1_En_6_Chapter.xhtml).
    Using the information in Chapter [5](#467924_1_En_5_Chapter.xhtml), download the
    newer version from the Oracle Technology Network at `https://otn.oracle.com` by
    clicking Software Downloads in the Essential Links section and then clicking the
    Database 18c Enterprise/Standard Editions link. For brevity’s sake, I will not
    repeat the subsequent instructions from Chapter [5](#467924_1_En_5_Chapter.xhtml)
    here. The only thing that changes is the version being downloaded. After you download
    the software to the virtual machine, unzip the file in its own directory. One
    change with the 18c version is that you unzip that file into the Oracle home directory
    you want. The downloaded zip file is an image of the home directory. This is a
    minor change from previous versions.


    First, create the home directory, as shown in Listing [18-1](#467924_1_En_18_Chapter.xhtml#PC1).


    ```

    [oracle@dbamentor ~]$ cd /u01/app/oracle/product

    [oracle@dbamentor product]$ mkdir 18.3

    [oracle@dbamentor product]$ cd 18.3

    [oracle@dbamentor 18.3]$ pwd

    /u01/app/oracle/product/18.3

    Listing 18-1

    Creating 18c Home Directory

    ```


    Then place the download file in this directory and unzip it.


    Once the download file is unzipped, launch the `runInstaller` utility. In this
    section, I will show screenshots from things that have changed compared to the
    12.2 version we installed in Chapter [5](#467924_1_En_5_Chapter.xhtml). Right
    away, we can see from Figure [18-1](#467924_1_En_18_Chapter.xhtml#Fig1) that the
    initial screen is a bit different.


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig1_HTML.jpg](images/467924_1_En_18_Chapter/467924_1_En_18_Fig1_HTML.jpg)


    Figure 18-1


    Oracle 18c Installer Step 1


    The option to set up the software only is chosen because we already have a database
    on this system. Note 2 in Figure [18-1](#467924_1_En_18_Chapter.xhtml#Fig1) confirms
    this is the proper choice for our testbed. Click Next. On the next screen, Step
    2, choose the option to perform a single-instance installation and then click
    Next. On the next screen, Enterprise Edition is selected. Click Next.


    On the screen for Step 4, we need to ensure the Oracle base directory is correct.
    In previous versions, the `OUI` would ask us for the Oracle home directory. In
    18c, the `OUI` assumes the product is being installed where it was unzipped. We
    can see from Figure [18-2](#467924_1_En_18_Chapter.xhtml#Fig2) that the software
    location is correct for our home. We are not given the option to change the software
    location. Click Next.


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig2_HTML.jpg](images/467924_1_En_18_Chapter/467924_1_En_18_Fig2_HTML.jpg)


    Figure 18-2


    Oracle 18c Installer Oracle home


    The next screen asks for the operating system groups; the defaults are acceptable,
    so click Next. In Step 6, the Oracle Universal Installer (`OUI`) performs its
    prerequisite checks. Figure [18-3](#467924_1_En_18_Chapter.xhtml#Fig3) shows we
    have one failed check on the testbed system.


    ![../images/467924_1_En_18_Chapter/467924_1_En_18_Fig3_HTML.jpg](images/467924_1_En_18_Chapter/467924_1_En_18_Fig3_HTML.jpg)


    Figure 18-3


    Oracle 18c prerequisite checks


    The `OUI` has discovered that the database server does not have enough physical
    memory. This was not an issue when we installed the Oracle 12.2 version. Every
    Oracle version is a bit different in its requirements, and this version has raised
    the amount of memory we need. Since this is a virtual machine, we can easily shut
    it down, increase the memory, and start it back up again. Make sure your host
    workstation or laptop has enough memory to devote to the virtual machine. Being
    that this is a testbed, we can choose the other option to ignore the findings
    and continue, hence the Ignore All box is checked in Figure [18-3](#467924_1_En_18_Chapter.xhtml#Fig3).
    After confirming we intended to ignore the issue, we can then click the Install
    button.


    The installation will proceed and the `OUI` will ask to run a script as root.
    When running this script, you will be asked to confirm if it is okay to overwrite
    the `oraenv` and `coraenv` files. We were not asked this question when the 12.2
    version was installed because these files did not exist yet. We will overwrite
    them with newer versions just in case 18c has changed the file contents. The new
    version is now installed and ready for the database upgrade.'
