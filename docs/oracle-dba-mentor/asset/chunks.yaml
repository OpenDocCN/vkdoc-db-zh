  trans: '

    ### 提示


    如果您手动创建数据库，那么您也必须手动设置安全控制。


    在 `utlpwdmg.sql` 脚本中，您可以看到 `DEFAULT` 配置文件已被定义，其限制如清单 8-6 所示。


    ```sql

    ALTER PROFILE DEFAULT LIMIT

    PASSWORD_LIFE_TIME 180

    PASSWORD_GRACE_TIME 7

    PASSWORD_REUSE_TIME UNLIMITED

    PASSWORD_REUSE_MAX  UNLIMITED

    FAILED_LOGIN_ATTEMPTS 10

    PASSWORD_LOCK_TIME 1

    INACTIVE_ACCOUNT_TIME UNLIMITED

    PASSWORD_VERIFY_FUNCTION ora12c_verify_function;

    清单 8-6

    DEFAULT 配置文件定义

    ```


    配置文件是对账户的一组限制。从清单 8-6 中我们可以看到，该配置文件的 `PASSWORD_LIFE_TIME` 限制为 180 天，`PASSWORD_GRACE_TIME`
    限制为 7 天。那么，所有这些限制都意味着什么呢？表 8-1 展示了用于保护 Oracle 数据库的配置文件限制定义。


    表 8-1

    配置文件参数描述


    | 配置文件参数 | 定义 |

    | --- | --- |

    | `FAILED_LOGIN_ATTEMPTS` | 指定在 Oracle 自动锁定账户之前允许的连续登录失败次数。 |

    | `PASSWORD_LIFE_TIME` | 指定密码可以使用的天数。超过这些天数后，必须更改密码。 |

    | `PASSWORD_REUSE_TIME` | 指定在多少天后可以重用密码。例如，您可以设置密码在 365 天后才能被重用。 |

    | `PASSWORD_REUSE_MAX` | 指定在重用密码之前必须更改密码的次数。例如，您可能需要在更改密码四次后才能重用它。 |

    | `PASSWORD_LOCK_TIME` | 指定如果 Oracle 因 `FAILED_LOGIN_ATTEMPTS` 自动锁定账户后，账户将保持锁定的天数。通常此值小于
    1。 |

    | `PASSWORD_GRACE_TIME` | 指定密码过期后仍可使用的宽限期天数。例如，如果您将 `PASSWORD_LIFE_TIME` 设置为 90
    天，`PASSWORD_GRACE_TIME` 设置为 7 天，那么用户实际上有 97 天的时间来更改密码。宽限期过后，账户将被锁定。 |

    | `INACTIVE_ACCOUNT_TIME` | 指定账户因不活动而被自动锁定前的天数。例如，当您希望在用户 365 天不登录时锁定账户，此参数很有用。
    |

    | `PASSWORD_VERIFY_FUNCTION` | 定义配置文件使用的密码验证函数。通过此参数，我们可以根据用户分类来利用不同的密码验证函数。 |


    如果您指定了 `PASSWORD_REUSE_TIME`，则也必须指定 `PASSWORD_REUSE_MAX`，反之亦然。


    如表 8-1 所述，`PASSWORD_LOCK_TIME` 是以天为单位指定的。实际上我们很少将账户锁定一整天，因此此值通常小于 1。常见做法是将账户锁定
    10 分钟。一天有 24 小时，每小时 60 分钟。要计算 10 分钟折合为多少天的值，我们会进行一个简单的计算：`10/(24*60)`，大约为 `0.00694`。我不清楚您如何，但要我记住
    `0.00694` 天等于 10 分钟是很困难的。因此，在清单 8-7 中，我将使用公式 `10/(24*60)` 而不是 `0.00694` 来表示 10
    分钟，这使得限制条件更容易理解。


    我在生产数据库中锁定安全性的第一步就是修改 `DEFAULT` 配置文件。我的公司政策规定，用户必须每 90 天更改一次密码，并且不能重用过去两年内使用过的任何密码。我们希望
    Oracle 在五次无效登录尝试后锁定账户，并保持锁定 10 分钟。我们还会锁定过去一年内未使用的账户。基于这些定义，我现在可以发出清单 8-7 中的命令来修改
    `DEFAULT` 配置文件的设置。


    ```sql

    ALTER PROFILE DEFAULT LIMIT

    PASSWORD_LIFE_TIME 90

    PASSWORD_GRACE_TIME 7

    PASSWORD_REUSE_TIME 730

    PASSWORD_REUSE_MAX  8

    FAILED_LOGIN_ATTEMPTS 5

    PASSWORD_LOCK_TIME 10/(24*60)

    INACTIVE_ACCOUNT_TIME 365

    PASSWORD_VERIFY_FUNCTION ora12c_verify_function;

    清单 8-7

    改进 DEFAULT 配置文件

    ```


    如前所述，我使用公式为锁时间参数 `PASSWORD_LOCK_TIME` 定义了 10 分钟。再次强调，我发现通过看到公式而不是 `0.00694` 来判断我意指
    10 分钟往往更容易。但是，如果我们查询数据字典以获取配置文件的密码限制，我们会看到锁时间表示为数字，如清单 8-8 所示。


    ```sql

    SQL> select resource_name,limit from dba_profiles

    2  where profile=''DEFAULT''

    3  and resource_type=''PASSWORD'';

    RESOURCE_NAME                    LIMIT

    -------------------------------- ------------------------------

    FAILED_LOGIN_ATTEMPTS            5

    PASSWORD_LIFE_TIME               90

    PASSWORD_REUSE_TIME              730

    PASSWORD_REUSE_MAX               8

    PASSWORD_VERIFY_FUNCTION         ORA12C_VERIFY_FUNCTION

    PASSWORD_LOCK_TIME               .0069

    PASSWORD_GRACE_TIME              7

    INACTIVE_ACCOUNT_TIME            365

    清单 8-8

    查询配置文件限制

    ```


    接下来，我将为我们的管理员用户创建一个配置文件。由于账户角色的重要性增加，此配置文件比最终用户的配置文件限制更严格。对于管理员，我们希望他们每 60 天更改一次密码。他们的账户应在三次无效登录尝试后被锁定，并保持锁定
    20 分钟。创建配置文件后，我将修改 `SYS` 和 `SYSTEM` 用户以使用该配置文件。清单 8-9 显示了配置文件创建和用户修改过程。


    ```sql

    SQL> create profile admin_profile

    2  limit failed_login_attempts 3

    3  password_life_time 60

    4  password_verify_function ora12c_verify_function

    5  password_lock_time 20/(24*60)

    6  inactive_account_time 90;

    Profile created.

    SQL> alter user sys profile admin_profile;

    User altered.

    SQL> alter user system profile admin_profile;

    User altered.

    SQL> select username,profile from dba_users

    2  where username in (''SYS'',''SYSTEM'');

    USERNAME                  PROFILE

    ------------------------- ---------------

    SYS                       ADMIN_PROFILE

    SYSTEM                    ADMIN_PROFILE

    清单 8-9

    管理员配置文件

    ```


    配置文件已创建。用户已修改。最后，已验证用户具有正确的配置文件。


    现在我们有了管理员配置文件，就可以创建我们的 DBA 用户了。多人共享同一个账户是一种不良的安全实践，尤其是对于管理账户。不幸的是，我发现有太多站点过于频繁地与他们的
    DBA 团队共享 `SYSTEM` 账户。每个 DBA 都应该拥有自己唯一的账户。在清单 8-10 中，我将使用 `ADMIN_PROFILE` 创建我的
    DBA 账户，授予其在数据库中创建会话的能力，并赋予其 `DBA` 角色。最后，我将锁定 `SYSTEM` 账户。


    ```sql

    SQL> create user peasland identified by MyPassword31$$ profile admin_profile;

    User created.

    SQL> grant create session to peasland;

    Grant succeeded.

    SQL> grant dba to peasland;

    Grant succeeded.

    SQL> alter user system account lock;

    User altered.

    SQL> connect peasland/MyPassword31$$

    Connected.

    清单 8-10

    创建 DBA 用户

    ```


    由于这些命令出现在一本书中，您可以放心，我在清单 8-10 中使用的密码绝不会用于我的任何真实账户。


    ### 提示


    创建您自己的 DBA 账户并锁定 `SYSTEM`。

    '
- fmt: '## Auditing


    到目前为止，本章已经稍微加强了数据库的安全性。如果有人确实入侵了数据库会怎样？如果获得数据库访问权限的人决定滥用该权限会怎么办？我们需要采取一些措施，以便进行取证分析，帮助追踪安全问题。我们将利用Oracle的审计机制来实现这些目的。


    在Oracle Database 12c之前，DBA必须先开启审计，然后告诉Oracle具体将哪些事件写入审计跟踪。Oracle 12c引入了统一审计来简化这一过程。在12c中，你仍然可以执行传统审计。你甚至可以同时执行传统审计和统一审计，Oracle称之为**混合模式审计**。


    要开始审计，必须执行两个步骤。首先，开启生成审计跟踪记录的功能。其次，告诉Oracle要审计什么。在我的职业生涯中，我见过人们忘记其中任何一个步骤。DBA开启审计后，会抱怨Oracle没有向审计跟踪写入任何内容，却不知道需要执行第二个步骤。我见过的另一个常见抱怨是，DBA告诉了Oracle要审计什么，但审计跟踪中仍然没有写入任何内容，因为他们忘记开启审计了。第一步只需要执行一次。第二步可以执行多次。


    ### 提示


    审计是一个两步过程。开启审计。告诉Oracle要审计什么。


    如果你使用Oracle 12c的DBCA实用程序创建数据库，默认情况下审计是开启的。如果审计未开启，你可以通过执行清单[8-11](#467924_1_En_8_Chapter.xhtml#PC11)中的命令来开启。


    ```

    SQL> connect / as sysdba

    Connected.

    SQL> alter system set audit_trail=db scope=spfile;

    System altered.

    SQL> shutdown immediate

    Database closed.

    Database dismounted.

    ORACLE instance shut down.

    SQL> startup

    ORACLE instance started.

    Total System Global Area 4294967296 bytes

    Fixed Size                  8628936 bytes

    Variable Size             939525432 bytes

    Database Buffers         3338665984 bytes

    Redo Buffers                8146944 bytes

    Database mounted.

    Database opened.

    ```


    清单 8-11

    开启审计


    因为实例被重启了，清单[8-11](#467924_1_En_8_Chapter.xhtml#PC11)中的步骤需要停机时间，并且可能需要在维护窗口内执行。


    现在审计已经开启，我们将使用两个统一审计策略。第一个策略名为`ORA_LOGON_FAILURES`，每当有人无法正确向Oracle数据库认证时，它将在审计跟踪中生成记录。第二个策略名为`ORA_ACCOUNT_MGMT`，每当管理员创建、修改和删除用户时，它将在审计跟踪中生成记录。Oracle的统一审计开箱即提供了这些策略，因为它们是典型的审计活动。在清单[8-12](#467924_1_En_8_Chapter.xhtml#PC12)中，我告诉Oracle开始审计这两个策略。我必须重新连接后，统一审计才会捕获我的活动。然后我创建了一个测试用户。最后，我查询审计跟踪以显示该活动已被捕获。


    ```

    SQL> audit policy ora_logon_failures;

    Audit succeeded.

    SQL> audit policy ora_account_mgmt;

    Audit succeeded.

    SQL> connect peasland

    Enter password:

    SQL> create user test_user identified by h3r$passw0rd$;

    User created.

    SQL> select dbusername,event_timestamp,sql_text from unified_audit_trail

    2  where sql_text like ''create user%'';

    DBUSERNAME EVENT_TIMESTAMP                SQL_TEXT

    ---------- ---------------------------- ------------------------------------

    SYS        05-JUL-18 03.14.05.874100 PM   create user test_user identified by
    *

    ```


    清单 8-12

    审计操作


    审计还有很多内容。我在清单[8-12](#467924_1_En_8_Chapter.xhtml#PC12)中开启的两个统一审计策略是我最常用的。然而，建议你通读*《Oracle安全指南》*，以了解更多内容，并查看是否有其他策略对你的具体情况有益。本节旨在向你展示如何开始审计重要操作，并让你了解审计是什么以及它的作用。


    ## 其他安全主题


    一整本书都可以用来写Oracle数据库安全。这个主题如此广阔。本章实在没有足够的篇幅来讨论与数据库安全相关的所有内容。本章的其余部分将高层讨论一些安全主题，你可能需要在以后的职业生涯中进一步探索。希望当你遇到数据库的安全考虑时，可以参考本节，从而知道去哪里探索以完成工作。


    ### 系统权限


    Oracle开箱即提供了许多系统权限。创建会话和连接到数据库的能力是我们在本章中已经看到的一个例子。其他系统权限的例子包括创建表的能力以及创建或删除用户的能力。


    ### 对象权限


    一旦用户在数据库中创建了对象，例如表或视图，他们可能希望授予其他用户与这些对象交互的能力。一个常见的例子是让另一个用户查看表的内容但不修改数据。表的所有者将授予从该表`SELECT`的权限。执行另一个用户的存储过程需要另一个对象权限。


    ### 角色


    由于存在这些不同类型的权限，通常希望给予同类用户相同的权限。在本章前面，我创建了一个DBA用户。完成后，在我的Oracle 12.2数据库中，该用户被授予了237个不同的系统权限。然而，本章中的示例只显示了一个授权被发出。该用户被授予了`DBA`角色。你可以将多个权限授予一个角色，然后当你将该角色授予另一个用户时，该用户将继承该角色的所有权限。角色存在的唯一原因就是为了让管理员更容易地授予多个权限。如果管理员必须记住在Oracle
    12.2中构成`DBA`角色的所有237个系统权限，那肯定会漏掉一些。通过将权限授予一个角色，管理员只需要记住角色名称并授予该角色即可。


    Oracle数据库的一个奇特之处是，角色在存储过程、函数和包内不起作用。如果用户创建了这些对象之一并遇到权限问题，DBA应验证对象所有者已被直接授予对象的权限，而不是通过角色。


    ### 透明数据加密


    透明数据加密（TDE）是Oracle的一个选项，用于加密处于静态的Oracle数据库内容。数据在磁盘上的数据文件中被加密。好处在于，这种加密对最终用户和应用程序是透明的，因此得名。


    太多人错误地认为TDE意味着他们的数据库对窥探者是加密的，而事实并非如此。任何能够访问数据库并拥有适当权限的用户都可以以未加密的形式查看该对象中的数据。


    透明数据加密的最大好处是加密你的数据库备份。借助TDE，你可以放心，如果有人获取了你的备份（可能来自异地位置），只要备份不包含数据库的钱包（存储加密密钥），数据就是加密的。请记住，一旦数据库开放供业务使用，任何有权访问数据库的人都可以透明地以未加密形式查看数据。


    透明数据加密确实要求你的组织获得Oracle高级安全选项的许可。此选项不包含在企业版（EE）许可中。即使你想要许可它，也不能在标准版中使用TDE。你必须使用EE。'
  raw: '## Auditing


    So far in this chapter, we’ve locked down database security a bit. What happens
    if someone does break into the database? What happens if someone who has been
    granted access to the database decides to misuse the privilege? We need to put
    measures into place that let us perform some forensic analysis to help track down
    security issues. We will leverage Oracle’s auditing mechanisms for these purposes.


    Prior to Oracle Database 12c, the DBA had to turn on auditing and then tell Oracle
    precisely which events to write to the audit trail. Oracle 12c introduced Unified
    Auditing to help simplify the process. You can still perform the traditional auditing
    in 12c. You can even perform traditional auditing and Unified Auditing at the
    same time, which Oracle calls *mixed mode auditing*.


    To start auditing, you must perform two steps. First, you turn on the ability
    to generate audit trail records. Second, you tell Oracle what to audit. In my
    career, I’ve seen people forgot either one of these steps. The DBA will turn on
    auditing and then complain that Oracle is not writing anything to the audit trail,
    unaware that they need to perform the second step. The other common complaint
    I’ve seen is that the DBA will tell Oracle what to audit and still nothing is
    written to the audit trail because they forgot to turn on auditing. The first
    step only needs to be performed once. The second step may be performed multiple
    times.


    ### Tip


    Auditing is a two-step process. Turn on auditing. Tell Oracle what to audit.


    If you used the Oracle 12c DBCA utility to create your database, auditing will
    be turned on by default. If auditing is not turned on, you can do so by issuing
    the commands in Listing [8-11](#467924_1_En_8_Chapter.xhtml#PC11).


    ```

    SQL> connect / as sysdba

    Connected.

    SQL> alter system set audit_trail=db scope=spfile;

    System altered.

    SQL> shutdown immediate

    Database closed.

    Database dismounted.

    ORACLE instance shut down.

    SQL> startup

    ORACLE instance started.

    Total System Global Area 4294967296 bytes

    Fixed Size                  8628936 bytes

    Variable Size             939525432 bytes

    Database Buffers         3338665984 bytes

    Redo Buffers                8146944 bytes

    Database mounted.

    Database opened.

    Listing 8-11

    Turn On Auditing

    ```


    Because the instance was restarted, the steps in Listing [8-11](#467924_1_En_8_Chapter.xhtml#PC11)
    will require downtime and may need to be performed during a maintenance window.


    Now that auditing is turned on, we will use two Unified Auditing policies. The
    first policy is named ORA_LOGON_FAILURES and will generate records in the audit
    trail whenever someone cannot authenticate properly to the Oracle database. The
    second policy is called ORA_ACCOUNT_MGMT and will generate records in the audit
    trail whenever an admin creates, modifies, and drops users. Oracle’s Unified Auditing
    provides these policies out of the box because they are typical audited activities.
    In Listing [8-12](#467924_1_En_8_Chapter.xhtml#PC12), I told Oracle to start auditing
    those two policies. I had to reconnect before Unified Auditing would capture my
    activities. I then created a test user. Lastly, I queried the audit trail to show
    the activity was captured.


    ```

    SQL> audit policy ora_logon_failures;

    Audit succeeded.

    SQL> audit policy ora_account_mgmt;

    Audit succeeded.

    SQL> connect peasland

    Enter password:

    SQL> create user test_user identified by h3r$passw0rd$;

    User created.

    SQL> select dbusername,event_timestamp,sql_text from unified_audit_trail

    2  where sql_text like ''create user%'';

    DBUSERNAME EVENT_TIMESTAMP                SQL_TEXT

    ---------- ---------------------------- ------------------------------------

    SYS        05-JUL-18 03.14.05.874100 PM   create user test_user identified by
    *

    Listing 8-12

    Auditing Actions

    ```


    There is so much more to auditing. The two Unified Auditing policies I turned
    on in Listing [8-12](#467924_1_En_8_Chapter.xhtml#PC12) are the ones I use the
    most. However, you are encouraged to go through the *Oracle Security Guide* to
    learn more and see if there are other policies that are beneficial to your situation.
    This section was meant to show you how to start auditing important actions as
    well as give you an idea of what auditing is and does.


    ## Additional Security Topics


    An entire book could be written on Oracle database security. The topic is that
    vast. There simply is not enough room in this chapter to discuss everything related
    to database security. The rest of this chapter will provide a high-level discussion
    of security topics that you may need to explore later in your career. Hopefully,
    when you come across a security consideration for your database, you can refer
    to this section so that you may know where to explore to get the job done.


    ### System Privileges


    Oracle provides many system privileges out of the box. The ability to create a
    session and connect to the database is an example we have already seen in this
    chapter. Examples of other system privileges include the ability to create a table
    and the ability to create or drop users.


    ### Object Privileges


    Once a user has created objects in the database, such as tables or views, they
    may desire to give other users the ability to interact with those objects. A common
    example is to let another user see the contents of a table but not modify the
    data. The owner of the table would grant the ability to SELECT from the table.
    Executing another user’s stored procedure requires another object privilege.


    ### Roles


    With these diverse types of privileges, it is often desirable to give the same
    classifications of users the same privileges. Earlier in this chapter, I created
    a DBA user. After I was done, the user was granted 237 different system privileges,
    in my Oracle 12.2 database. Yet the example in this chapter showed only one grant
    being issued. That user was granted the DBA role. You can grant multiple privileges
    to a role, and then when you grant the role to another user, that user inherits
    all that role’s privileges. Roles exist for one reason only and that is to make
    granting of multiple privileges easier on the administrator. If the administrator
    had to remember all 237 system privileges that make up the DBA role in Oracle
    12.2, they would be assured of missing some of them. By granting the privileges
    to a role, the administrator only needs to remember the role name and grant the
    role instead.


    One oddity of the Oracle database is that roles do not work inside stored procedures,
    functions, and packages. If a user creates one of these objects and encounters
    permissions issues, the DBA should verify the object owner has been granted direct
    permissions on the object and not through a role.


    ### Transparent Data Encryption


    Transparent Data Encryption (TDE) is an Oracle option to encrypt the Oracle database’s
    contents at rest. The data is encrypted within the data files on disk. The benefit
    is that this encryption is transparent to the end user and the applications, hence
    its name.


    Too many people erroneously think that TDE means their database is encrypted from
    prying eyes, and that is not the case. Any user that can access the database and
    has the appropriate privileges can view the data in that object in unencrypted
    form.


    The biggest benefit to Transparent Data Encryption is to encrypt your database
    backups. With TDE, you can be assured if someone gets a hold of your backup, perhaps
    from its offsite location, the data is encrypted so long as the backup does not
    also contain the database’s wallet, which stores the encryption key. Just remember
    that once the database is open for business, anyone with access to the database
    can see the data in unencrypted form, transparently.


    Transparent Data Encryption does require your organization to license the Oracle
    Advanced Security option. This option is not included in the Enterprise Edition
    (EE) license. You cannot use TDE with Standard Edition even if you want to license
    it. You must be using EE instead.'
  trans: '## 审计


    到目前为止，本章已经稍微加强了数据库的安全性。如果有人确实入侵了数据库会怎样？如果获得数据库访问权限的人决定滥用该权限会怎么办？我们需要采取一些措施，以便进行取证分析，帮助追踪安全问题。我们将利用
    Oracle 的审计机制来实现这些目的。


    在 Oracle Database 12c 之前，DBA 必须先开启审计，然后告诉 Oracle 具体将哪些事件写入审计跟踪。Oracle 12c 引入了统一审计来简化这一过程。在
    12c 中，你仍然可以执行传统审计。你甚至可以同时执行传统审计和统一审计，Oracle 称之为**混合模式审计**。


    要开始审计，必须执行两个步骤。首先，开启生成审计跟踪记录的功能。其次，告诉 Oracle 要审计什么。在我的职业生涯中，我见过人们忘记其中任何一个步骤。DBA
    开启审计后，会抱怨 Oracle 没有向审计跟踪写入任何内容，却不知道需要执行第二个步骤。我见过的另一个常见抱怨是，DBA 告诉了 Oracle 要审计什么，但审计跟踪中仍然没有写入任何内容，因为他们忘记开启审计了。第一步只需要执行一次。第二步可以执行多次。


    ### 提示


    审计是一个两步过程。开启审计。告诉 Oracle 要审计什么。


