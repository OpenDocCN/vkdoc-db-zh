  trans: "\n此页面包含两个区域。`Departments` 区域是一个经典报表，其源查询为\n\n```sql\nselect * from DEPT\n\
    order by DName\n```\n\n`Update Location` 区域是一个表单，其源查询为\n\n```sql\nselect DeptNo,\
    \ Loc\nfrom DEPT\n```\n\n你应该使用第 10 章的技术来自定义表单区域。具体来说：\n\n-   开启表单的 `Edit Enabled`\
    \ 属性，并选择 `Update Row` 作为唯一允许的操作。\n-   创建一个按钮，其操作为 `Submit`，其数据库操作为 `SQL UPDATE\
    \ action`。\n-   指定项目 `P49_DEPTNO` 是主键。同时，将其类型更改为 `Select List`，并配置值列表查询。\n\n```sql\n\
    select DName, DeptNo\nfrom DEPT\n```\n\n此页面还需要一个额外的配置来匹配图 13-17，即 `Loc` 列中的值应该以粗体格式显示。第\
    \ 3 章展示了如何使用列的 `HTML Expression` 属性将列值包裹在 HTML 标签中。例如，你可以将 `LOC` 列的 HTML 表达式设置为：\n\
    \n```html\n<b>#LOC#</b>\n```\n\n出于本示例的目的，我想使用一种不同的技术，即利用报表的源查询来格式化该列。具体来说，将报表的源查询更改为：\n\
    \n```sql\nselect DeptNo, DName, '<b>' || Loc || '</b>' as Loc\nfrom DEPT\norder\
    \ by DName\n```\n\n请注意，该查询在部门名称周围包裹了 HTML 标签，这意味着 `LOC` 的值就是 HTML 表达式。其思路是，当显示报表时，LOC\
    \ 的值应该以粗体格式化。然而，这并不完全奏效。如果你运行该页面，HTML 标签会作为值的一部分显示出来，如图 13-12 所示。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig18_HTML.jpg](img/335103_3_En_13_Fig18_HTML.jpg)\n\
    *图 13-18 报表显示了 HTML 标签*\n\n如果你仔细想想，这个结果是有一定道理的——毕竟，报表只是显示查询的输出。然而，实际情况比这更复杂。考虑\
    \ APEX 如何渲染报表：它生成一个 HTML 表格，并将输出值放入其中。因此，例如，显示报表第一行的 HTML 代码可能如下所示：\n\n```html\n\
    <tr>\n  <td>ACCOUNTING</td>\n  <td><b>NEW YORK</b></td>\n</tr>\n```\n\n尽管 `<b>`\
    \ 和 `</b>` 标签是作为数据输入到表格中的，但浏览器最终会将它们视为 HTML。为了使 APEX 能在报表中显示这些标签，它必须做额外的工作。具体来说，它会将\
    \ `<` 和 `>` 字符转换为恰好显示相同的其他字符。这种转换称为 *转义特殊字符*。具体来说，字符 `<` 被替换为 `&lt;`，字符 `>` 被替换为\
    \ `&gt;`。每个报表列在其 `Security` 部分都有一个 `Escape special characters` 属性。默认情况下它是开启的，这会导致\
    \ APEX 转义特殊字符，并如 13-18 图所示显示 HTML 标签。现在转到 `Loc` 列并关闭此属性。`Loc` 值中的标签将不会被转义，因此将被作为\
    \ HTML 处理。报表现在将看起来像图 13-17。\n\n这种在 SQL 源查询中格式化数据的能力非常强大，可以让你完成通过 `HTML Expression`\
    \ 属性无法实现的事情。例如，你可以选择将一列中的某些值格式化为文本，而将其他值格式化为链接或图像。然而，这种强大功能是有代价的。一旦你关闭了一列的 `Escape\
    \ special characters` 属性，你就使自己面临跨站脚本攻击的风险。该属性的帮助屏幕对此点特别强调；参见图 13-19。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig19_HTML.jpg](img/335103_3_En_13_Fig19_HTML.jpg)\n\
    *图 13-19 Escape Special Characters 属性的帮助文本*\n\n为了演示，让我们看看利用此页面危害应用程序是多么容易。从 `Update\
    \ Location` 区域，选择任何部门，例如 `OPERATIONS`。`Location` 字段应显示当前值，即 `BOSTON`。将该值更改为：\n\
    \n```text\nBOSTON<script>alert('Your application has been compromised')</script>\n\
    ```\n\n这个新值是一个字符串，由位置信息后跟一个调用 JavaScript 函数 `alert` 的脚本组成。当浏览器渲染此字符串时，它将显示 \"\
    BOSTON\"，然后调用脚本。换句话说，此次更新对报表没有可见的影响。但是，脚本将在每次有人渲染页面时运行。\n\n单击 `Submit Changes`\
    \ 按钮。在页面重新加载之前，你的浏览器将显示一个类似于图 13-20 的警报。现在导航到其他页面再返回此页面——警报将再次显示。意识到如果没有这个警报，你根本不会知道你的应用程序已经被严重入侵，这有点令人不寒而栗。\n\
    \n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig20_HTML.jpg](img/335103_3_En_13_Fig20_HTML.jpg)\n\
    *图 13-20 跨站脚本攻击成功*\n\n前面的 JavaScript 代码并无恶意。`alert` 函数只是在用户浏览器中显示一个警告窗口。恶意的 JavaScript\
    \ 字符串几乎肯定不会弹出警报，而是会做一些更复杂和恶意的事情。很可能，当你发现问题时，为时已晚。因此，你需要确保这种情况不会发生。\n\n消除跨站脚本攻击的唯一方法是确保页面不显示未转义的数据。有三种方法可行，我们将依次考虑：\n\
    \n-   拒绝不适当的数据\n-   在将数据保存到数据库之前对其进行转义\n-   在显示数据之前对其进行转义\n\n## 拒绝不适当的数据\n\n在任何数据录入页面中，防止不适当的数据被输入数据库是良好的实践。这就是数据库约束和\
    \ APEX 验证的用途。检查输入数据是否包含意外 HTML 的行为遵循相同的原理。你可以采取两种方法。\n\n第一种方法是使用项目 `Security`\
    \ 部分中的 `Restricted Characters` 属性。此属性允许你指定输入中允许哪些字符。图 13-21 显示了可能的选项。你可以要求输入只能是字母数字，或者可以限制使用某些特殊字符。\n\
    \n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig21_HTML.jpg](img/335103_3_En_13_Fig21_HTML.jpg)\n\
    *图 13-21 Restricted Characters 属性的选项*\n\n在当前示例中，假设部门位置是字母数字；在这种情况下，将 `P49_LOC`\
    \ 的 `Restricted Characters` 属性设置为 `Whitelist for a–Z, 0–9, and space` 是合理的。如果不是，那么你至少应该将其设置为\
    \ `Blacklist HTML command characters`。\n\n第二种方法是编写一个 APEX 验证来执行限制。APEX 提供了一个名为\
    \ `apex_escape.html` 的函数，它接受任何输入字符串，并将其转换为视觉上相同但不包含 HTML 字符的字符串。例如，代码清单 13-7 显示了一个验证的\
    \ PL/SQL 代码，如果 `P49_LOC` 的输入包含 HTML 字符，则该验证返回 `false`。\n\n```plsql\ndeclare\n\
    \  v_LocEscaped varchar2(100);\nbegin\n  v_LocEscaped := apex_escape.html(:P49_LOC);\n\
    \  if :P49_LOC = v_LocEscaped then\n    return true;\n  else\n    return false;\n\
    \  end if;\nend;\n```\n*代码清单 13-7 防范不需要的 HTML 输入的验证*\n\n## 在保存数据之前转义数据\n"
- fmt: '# 防止恶意攻击


    ## 转义 HTML 输入

    与其拒绝基于 HTML 的输入，您可以将其转换为不含 HTML 字符的版本。`apex_escape.html` 函数在这里同样非常有用。例如，在 `Cross-Site
    Scripting` 页面中，表单生成了更新数据库的流程。您可以将该流程替换为一个 PL/SQL 流程，该流程首先对值进行转义，然后再保存。此类流程的代码如代码清单
    [13-8](#335103_3_En_13_Chapter.xhtml#PC30) 所示。


    ```

    begin

    update DEPT

    set Loc = apex_escape.html(:P44_LOC)

    where DeptNo = :P44_DEPTNO;

    end;

    Listing 13-8

    Escaping Unwanted HTML Input

    ```


    ## 显示前转义数据

    应用程序可能无法保证数据库中不包含任何 HTML 代码，因为用户可能有其他输入数据的方式。因此，为了防止跨站脚本攻击，在将数据呈现在页面之前对其进行转义是一个好习惯。这正是
    `Escape Special Characters` 属性的用途（请参考图 [13-19](#335103_3_En_13_Chapter.xhtml#Fig19)）。如果您报表中的每一列都启用了此属性，那么您的报表就能免疫跨站脚本攻击。


    然而，如果您报表中的某一列需要关闭此属性，您就必须转义必要的字符。同样，`apex_escape.html` 函数非常有用。例如，代码清单 [13-9](#335103_3_En_13_Chapter.xhtml#PC31)
    给出了示例报表的原始来源，而代码清单 [13-10](#335103_3_En_13_Chapter.xhtml#PC32) 展示了一个经过修订的版本，其中的数据已经被转义。


    ```

    select DeptNo, DName, '''' || apex_escape.html(Loc) || '''' as Loc

    from DEPT

    order by DName

    Listing 13-10

    Revised Source Query

    ```


    ```

    select DeptNo, DName, '''' || Loc || '''' as Loc

    from DEPT

    order by Dname

    Listing 13-9

    Original Source Query

    ```


    ## URL 修改

    第三种恶意攻击利用了网页的访问方式。在一个典型的非恶意场景中，用户将应用程序主页的 URL 输入浏览器。从此之后，URL 在很大程度上就不重要了；用户通过点击标签、链接和按钮导航到其他页面。

    这个场景对应于应用程序的预期用途。页面上的导航链接旨在帮助用户决定接下来要查看哪些页面。事实上，衡量应用程序质量的一个标准是导航多大程度上有助于形成连贯的用户体验。

    当然，用户不一定遵循这个场景。了解应用程序 URL 结构的用户可以通过简单地构造一个有效的 URL 来访问任意页面。这种可能性给 APEX 开发人员带来了几个困难。以下小节将探讨这些困难及其解决方案。


    ### APEX URL 结构

    APEX 应用程序支持两种不同的 URL 格式：一种是旧版语法，另一种是更新的“友好”语法。本书中使用的语法一直是旧版语法，其中应用程序和页面通过其编号来指定。例如，我的
    `Employee Demo` 应用程序的编号是 91392，主页的编号是 1。因此，我的主页的旧版 URL 是


    ```

    apex.oracle.com/pls/apex/f?p=91392:1

    ```


    友好 URL 语法则通过名称来指定工作区、应用程序和页面，而不是编号。例如，我的主页的友好 URL 是


    ```

    apex.oracle.com/pls/apex/understanding_apex/r/employee-demo/home

    ```


    尽管在本章中我将继续使用旧版 URL，但大多数概念也适用于友好 URL。（即使您偏好友好 URL，您仍然需要了解恶意用户如何滥用旧版 URL。）

    一个旧版 URL 支持九个冒号分隔的参数；如果某个参数的值缺失，则使用默认值。您已经知道了前三个参数：应用程序 ID、页面 ID 和会话 ID。另外两个相关的参数是第七个和第八个，它们用于设置会话状态。


    关于这些参数的示例，请考虑第 [6](#335103_3_En_6_Chapter.xhtml) 章中的 `Employees by Department`
    页面，该页面再次出现在图 [13-22](#335103_3_En_13_Chapter.xhtml#Fig22) 中。


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig22_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig22_HTML.jpg)


    图 13-22

    Employees by Department 页面


    回想一下，当您点击 `Click for Details` 链接时，会发生重定向，设置 `P12_DEPTNO` 和 `P12_DNAME` 的会话状态值，然后页面会重新渲染。代码清单
    [13-11](#335103_3_En_13_Chapter.xhtml#PC35) 显示了点击 `ACCOUNTING` 对应的链接所产生的旧版 URL，假设会话
    ID 是 98765。（为了节省空间，我省略了 URL 的通用前缀。）


    ```

    f?p=91392:12:98765::::P12_DEPTNO,P12_DNAME:10,ACCOUNTING

    Listing 13-11

    URL for Employees by Department Page

    ```


    此清单说明了 URL 第七个和第八个参数的用途。第七个参数是一个逗号分隔的列表，包含了要设置其值的项（`P12_DEPTNO` 和 `P12_DNAME`），而第八个参数是这些项将被设置成的值的列表（`10`
    和 `ACCOUNTING`）。


    ### GET 与 POST

    浏览器向 Web 服务器发出的请求可以是不同类型。最常见的两种类型是 GET 和 POST，它们在向服务器传递信息的方式上有所不同。POST 请求将信息放置在请求数据包内的一个特定区域。而
    GET 请求则通过其 URL 将信息传递给服务器。

    在 APEX 中，POST 请求由提交操作发出。为了处理一个提交，浏览器提取页面项的值，将它们打包到 POST 请求中，然后将其发送到服务器。服务器随后使用这些值来更改会话状态。如果您想验证这一点，请转到任何带有提交按钮的页面（例如
    `Filter by Job and Department`）。点击提交按钮，并观察 URL 没有改变。这证明了计算的输入不是所提交 URL 的一部分，这也是您无法将提交操作的结果加入书签的原因。

    另一方面，APEX 中的重定向操作发出的是 GET 请求。重定向由多种 APEX 组件执行，例如按钮、基于列表的项、列链接和分支。作为重定向的一部分，APEX
    允许您将会话状态中的指定项设置为特定值。例如，在图 [13-22](#335103_3_En_13_Chapter.xhtml#Fig22) 的 `Employees
    by Department` 页面中，`Click for Details` 列链接将 `P12_DEPTNO` 和 `P12_DNAME` 分别设置为当前记录的部门编号和名称。浏览器通过将此信息编码在
    URL 内将其发送到服务器，如代码清单 [13-11](#335103_3_En_13_Chapter.xhtml#PC35) 所示。

    由于 APEX URL 的结构是众所周知的，一个经过身份验证的用户有可能构造一个 URL，以应用程序开发人员未曾意图的方式访问应用程序。接下来的章节将考虑两种技术。


    ### 页面扫描

    第一种技术称为 **页面扫描**。用户构造一系列 URL 来访问每一个可能的页面，只是为了看看会显示什么页面（如果有的话）。页面扫描的可能性意味着您不能仅仅通过隐藏页面来使其不可访问。例如，考虑图
    [13-12](#335103_3_En_13_Chapter.xhtml#Fig12) 中的 `Change Password` 页面，它是 `Employee
    Demo` 的第 47 页。在那一节中，您看到了如何通过为其导航菜单项分配授权方案来隐藏该页面。尽管这是一个良好的设计策略，但它并不能使页面不可访问，因为任何用户都可以通过
    URL 访问该页面


    ```

    apex.oracle.com/pls/apex/f?p=91392:47.

    ```'
  raw: "Instead of rejecting HTML-based input, you can instead transform it to a\n\
    version without HTML characters. The `apex_escape.html`\nfunction   is useful\
    \ here as\nwell. For example, in the `Cross-Site Scripting`\npage, the form generated\
    \ the process to update the database. You could\nreplace that process by a PL/SQL\
    \ process that first escapes the values\nbefore saving. The code for such a process\
    \ appears in Listing [13-8](#335103_3_En_13_Chapter.xhtml#PC30).\n\n```\nbegin\n\
    update DEPT\nset Loc = apex_escape.html(:P44_LOC)\nwhere DeptNo = :P44_DEPTNO;\n\
    end;\nListing 13-8\nEscaping Unwanted HTML Input\n```\n\nEscape Data Before Displaying\
    \ It\nAn application might not be able to guarantee that the database does\nnot\
    \ contain any HTML code, because users might have other ways to enter\ndata. So\
    \ to ensure against cross-site scripting, it is a good idea to\nalways escape\
    \ data before displaying it on a page. That is what the\n`Escape Special Characters`\
    \ property is all about (refer back to Figure [13-19](#335103_3_En_13_Chapter.xhtml#Fig19)).\
    \ If every\ncolumn in your report has this property turned on, your report is\
    \ immune\nto cross-site scripting attacks.\n\nHowever, if a column of your report\
    \ needs to turn this property off, you\nmust escape the necessary characters.\
    \ Again, the `apex_escape.html`\nfunction   is very useful. For\nexample, Listing\
    \ [13-9](#335103_3_En_13_Chapter.xhtml#PC31) gives the\noriginal source for the\
    \ example report, and Listing [13-10](#335103_3_En_13_Chapter.xhtml#PC32) shows\
    \ a\nrevised version in which the data has been escaped.\n\n```\nselect DeptNo,\
    \ DName, '' || apex_escape.html(Loc) || '' as Loc\nfrom DEPT\norder by DName\n\
    Listing 13-10\nRevised Source Query\n```\n\n```\nselect DeptNo, DName, '' || Loc\
    \ || '' as Loc\nfrom DEPT\norder by Dname\nListing 13-9\nOriginal Source Query\n\
    ```\n\nURL Modification\nThe third type of malicious attack takes advantage of\
    \ the way that\nweb pages are accessed. In a typical, non-malicious scenario,\
    \ a user\ntypes the URL for an application’s home page into a browser. From there,\n\
    URLs are largely irrelevant; the user clicks tabs, links, and buttons to\nnavigate\
    \ to the other pages.\nThis scenario corresponds to the intended use of the application.\
    \ The\nnavigational links on a page are designed to help the user decide what\n\
    pages to examine next. In fact, one criterion for measuring the quality\nof an\
    \ application is the extent to which navigational aids contribute to\na coherent\
    \ user experience.\nOf course, a user need not follow this scenario. A user who\
    \ knows the\nURL structure of an application can access an arbitrary page by simply\n\
    constructing a valid URL to it. This possibility presents several\ndifficulties\
    \ for APEX developers. The following subsections examine\nthese difficulties and\
    \ their solutions.\n\nAPEX URL Structure\n\nAPEX applications  support two different\n\
    URL formats: a legacy syntax and a newer “friendly” syntax. The syntax\nused in\
    \ this book has been the legacy syntax, in which applications and\npages are specified\
    \ by their number. For example, the number of my `Employee Demo`\napplication\
    \ is 91392 and the number of the home page is 1\\. Thus, the\nlegacy URL of my\
    \ home page is\n\n```\napex.oracle.com/pls/apex/f?p=91392:1\n```\n\nInstead of\
    \ numbers, the friendly URL syntax specifies the workspace,\napplication, and\
    \ page by their names. For example, the friendly URL of\nmy home page is\n\n```\n\
    apex.oracle.com/pls/apex/understanding_apex/r/employee-demo/home\n```\n\nAlthough\
    \ I will continue to use legacy URLs in this chapter, most of\nthese concepts\
    \ also apply to friendly URLs. (And even if you prefer\nfriendly URLs, you still\
    \ need to be aware of how a malicious user can\nabuse legacy URLs.)\nA legacy\
    \ URL supports nine colon-separated arguments; if the value of\nan argument is\
    \ missing, a default value is used. You already know the\nfirst three arguments:\
    \ the application id, the page id, and the session\nid. The other two relevant\
    \ arguments are the seventh and eighth, which\nare used for setting the session\
    \ state.\n\nFor an example of these arguments, consider the `Employees by Department`\
    \ page of Chapter [6](#335103_3_En_6_Chapter.xhtml), which appears again in Figure\n\
    [13-22](#335103_3_En_13_Chapter.xhtml#Fig22).\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig22_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig22_HTML.jpg)\n\
    \nFigure 13-22\nEmployees by Department page\n\nRecall that when you click a `Click\
    \ for Details`\nlink, a redirect occurs, the session state values of `P12_DEPTNO`\
    \ and `P12_DNAME` are set,\nand the page is re-rendered. Listing [13-11](#335103_3_En_13_Chapter.xhtml#PC35)\
    \ shows the\nlegacy URL that arises from clicking the link for `ACCOUNTING`, assuming\n\
    that the session id is 98765\\. (I omitted the URL’s common prefix to save\nspace.)\n\
    \n```\nf?p=91392:12:98765::::P12_DEPTNO,P12_DNAME:10,ACCOUNTING\nListing 13-11\n\
    URL for Employees by Department Page\n```\n\nThis listing illustrates the purpose\
    \ of the seventh and eighth\narguments of a URL. The seventh argument is a comma-separated\
    \ list of\nthe items whose values are to be set (`P12_DEPTNO` and `P12_DNAME`),\
    \ and the\neighth is a list of the values they will be set to (`10` and `ACCOUNTING`).\n\
    \nGET vs. POST\nRequests that a browser makes to a web server can be of different\n\
    types. The two most common types are GET and POST, which differ in\nhow they pass\
    \ information to the server. A POST request places the\ninformation in a specific\
    \ area within the request packet. A GET request,\non the other hand, passes information\
    \ to the server via its URL.\nIn APEX, POST requests are made by submit operations.\
    \ To process a\nsubmit, the browser extracts the values of the page items, packages\
    \ them\ninto the POST request, and sends it to the server. The server then uses\n\
    these values to change the session state. If you want to verify this, go\nto any\
    \ page with a submit button (such as `Filter by Job and Department`). Click the\
    \ submit button and observe that the URL\ndoes not change. This demonstrates that\
    \ the input to the computation is\nnot part of the submitted URL, which is also\
    \ the reason why you cannot\nbookmark the result of a submit operation.\nOn the\
    \ other hand, redirect operations in APEX make GET requests.\nRedirections are\
    \ performed by several kinds of APEX components, such as\nbuttons, list-based\
    \ items, column links, and branches. As part of the\nredirection, APEX lets you\
    \ assign values to specified items in the\nsession state. For example, in the\
    \ `Employees by Department` page of Figure [13-22](#335103_3_En_13_Chapter.xhtml#Fig22),\
    \ the `Click for Details`\ncolumn link sets `P12_DEPTNO` and `P12_DNAME` to the\n\
    department number and name of the current record, respectively. The\nbrowser sends\
    \ this information to the server by encoding it within the\nURL, as was shown\
    \ in Listing [13-11](#335103_3_En_13_Chapter.xhtml#PC35).\nBecause the structure\
    \ of an APEX URL is well-known, it is possible\nfor an authenticated user to construct\
    \ a URL that accesses the\napplication in a way the application developer did\
    \ not intend. The\nfollowing sections consider two techniques.\n\nPage Scanning\n\
    \nThe first technique is called *page scanning*\n . A user\nconstructs a sequence\
    \ of URLs to access every possible page, just to see\nwhat page (if any) shows\
    \ up. The possibility of page scanning means that\nyou cannot make a page inaccessible\
    \ just by hiding it. For example,\nconsider the `Change Password` page from Figure\
    \ [13-12](#335103_3_En_13_Chapter.xhtml#Fig12), which is\npage 47 of `Employee\
    \ Demo`. In that section, you saw how to hide the page by assigning\nan authorization\
    \ scheme to its navigation menu entry. Although it is a\ngood design strategy,\
    \ it doesn’t make the page inaccessible because any\nuser could access the page\
    \ via the URL\n\n```\napex.oracle.com/pls/apex/f?p=91392:47.\n```"
