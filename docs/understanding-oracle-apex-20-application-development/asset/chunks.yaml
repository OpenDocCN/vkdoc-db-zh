    ## Introduction


    Application Express (otherwise known as APEX) is a web application tightly coupled
    to an Oracle database. It has several uses: you can use its `SQL Workshop` tool
    to query and modify the database, you can use its `App Builder` tool to create
    your own web applications that interact with the database, and you can run the
    web applications created by you and others.


    The app builder is especially interesting because it provides a simple, nontraditional
    way to build web pages. You do not specify code for the page directly; instead,
    you choose from a set of built-in templates. There is a template for the overall
    page and templates for each kind of component that you want to put on the page
    (such as reports, buttons, etc.). Each template has a set of properties, whose
    values determine where each component is located on the page, what it looks like,
    and how it behaves. You create a page simply by choosing templates for the components
    you want and assigning values to their properties.


    The APEX app builder saves the property values for each component in its own database.
    When a browser requests one of your application’s pages, the APEX server extracts
    the property values relevant to that page from its database, constructs the HTML
    code corresponding to those values, and returns that code to the browser. This
    process is called `rendering` the page, and APEX is called an `HTML generator`.


    The advantage of using an HTML generator such as APEX is that you can build web
    pages without any knowledge of HTML (or CSS, JavaScript, or PHP). Moreover, because
    APEX is tightly coupled to an Oracle database, it automatically handles the intricacies
    of database interaction. APEX makes it possible to easily create good-looking,
    highly functional, and database-aware pages with only a rudimentary knowledge
    of SQL.


    ## Why This Book?


    Designing a page with APEX seems straightforward—all you have to do is choose
    the components you want and then assign the appropriate values to their properties.
    Choosing components is straightforward, but assigning property values is not.
    A page and its components have many properties, and you have to know the purpose
    of those properties to know what values to assign. These properties range from
    the essential (such as the `source query` of a report) to the obscure (such as
    the `static ID` of a report). Some properties (such as the `HTML expression` of
    a report column) are hooks that allow you to insert customized HTML or JavaScript
    code into the generated web page.


    The purpose of this book is to gently lead you through this cornucopia of properties.
    To that end, the book develops a demo web application that illustrates various
    APEX techniques for building typical web page functionality. The pages of this
    application start out simply and gradually increase their level of sophistication.
    With each page, I introduce a few new properties, discuss their purpose, and illustrate
    their usefulness. By the end of the book, you will have been so immersed in the
    world of APEX properties that you should feel confident enough to tackle any website
    project of your own. And if your project requires even more sophistication than
    appears here, you should be comfortable enough to use properties that are not
    covered, perhaps by looking at the documentation, examining the numerous prepackaged
    applications provided by Oracle, checking a web forum, or even figuring it out
    on your own.


    Another way to build web pages in APEX is to rely on wizards. APEX provides wizards
    to generate common components, such as report pages and data entry forms. Each
    wizard asks you a series of questions (such as “What is the name of the page?”
    “What table do you want to display?” “Should the page have an entry in the navigation
    menu?”) and then uses your responses to generate appropriate components having
    appropriate properties. The advantage, of course, is that you don’t need to know
    anything about properties. The disadvantage is that wizards tend to produce “one
    size fits all” pages, in terms of both their appearance and their functionality.


    Wizards can take you only so far. If you want any kind of control over the look,
    feel, and behavior of your page, you need to get involved with its properties.
    This book provides the guidance you need.'
