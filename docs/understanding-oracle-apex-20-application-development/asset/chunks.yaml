- fmt: "### Formatted vs. Unformatted Text\n\nThe source of a static content region\
    \ is the text to be displayed. APEX can interpret this text in two ways: as the\
    \ characters exactly as written or as HTML code to be formatted. The property\
    \ that specifies this option is called `Output As`, and it appears in the `Settings`\
    \ section of the region’s `Attributes` node in the page rendering tree. Figure\
    \ [3-19](#335103_3_En_3_Chapter.xhtml#Fig19) shows this section with the two possible\
    \ values of the `Output As` property.\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig19_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig19_HTML.jpg)\n\
    Figure 3-19: Type-specific properties for a static content region\n\nAn `Output\
    \ As` value of `HTML` specifies that the region’s source contains HTML code. APEX\
    \ will send this code as-is to the browser when it renders the page, so that the\
    \ browser can format the source accordingly.\n\nOn the other hand, a value of\
    \ `Text (escape special characters)` specifies that the source should be displayed\
    \ exactly as it appears. In this case, APEX needs to transform the text so that\
    \ there are no HTML tags for the browser to execute. It does so by replacing certain\
    \ characters (such as `<` and `>`) with different characters that happen to print\
    \ the same (such as `<` and `>`). This transformation is called `escaping` the\
    \ characters. The result is text that looks like HTML code, but really is not.\n\
    \nThe `Sample Database` region of Figure [3-17](#335103_3_En_3_Chapter.xhtml#Fig17)\
    \ illustrates several kinds of formatting:\n\n*   The description of the `EMP`\
    \ and `DEPT` tables makes use of the bold, italic, and underline tags.\n*   To\
    \ get the fields of `EMP` to line up in two rows, it uses a borderless table having\
    \ two columns: the first row consists of “`EMP(`” in one column and the fields\
    \ in the second column, and the second row consists of nothing in the first column\
    \ and the remaining fields in the second column.\n*   The bullet list is implemented\
    \ as an unordered list in HTML, and each bullet point is a list item.\n\nConsequently,\
    \ the region’s `Output As` property needs to be set to `HTML`. The source code\
    \ for the region is given in Listing [3-1](#335103_3_En_3_Chapter.xhtml#PC4).\n\
    \n```\nDEPT(DeptNo, DName, Loc)\n\nEMP(\nEmpNo, EName, Job, Mgr, HireDate, \n\n\
    Sal, Comm, DeptNo, Offsite) \n\n The underlined fields DeptNo and EmpNo are keys.\n\
    \ The italicized field DeptNo is a foreign key of DEPT.\n\nListing 3-1: Source\
    \ of the Sample Database Region\n```\n\nNow consider the `Demo Application` region.\
    \ Its content is unformatted and in fact contains HTML tags that should not be\
    \ formatted. So the `Output As` property for this region should be `Text (escape\
    \ special characters)`. Its source appears in Listing [3-2](#335103_3_En_3_Chapter.xhtml#PC5).\n\
    \n```\nWelcome, &APP_USER.! The purpose of this application is to demonstrate\
    \ the various techniques used in APEX applications. Please feel free to explore\
    \ its pages.\nThe regions on this page illustrate ways that static content regions\
    \ get used. Most regions format their content using HTML tags such as , , and\
    \ . This region does not.\nListing 3-2: Source of the Demo Application Region\n\
    ```\n\nThe beginning of this listing makes reference to “`&APP_USER`.”. This string\
    \ is called a substitution string, and APEX interprets it as the name of the user.\
    \ This topic is addressed next.\n\n### Substitution Strings\n\nThe APEX server\
    \ has several built-in variables that hold information of interest. Here are three\
    \ useful ones:\n\n*   The variable `APP_USER` holds the username of whoever is\
    \ currently logged in. If the application does not require users to log in, the\
    \ value of the variable is `APEX_PUBLIC_USER`.\n*   The variable `APP_ID` holds\
    \ the ID of the current application.\n*   The variable `APP_SESSION` holds the\
    \ ID of the current session.\n\nTo refer to the value of a variable from within\
    \ HTML text, you prepend the character `&` and append the period character (`.`)\
    \ to the variable name. Such an expression is called a substitution string. In\
    \ other words, the substitution string for a variable named `X` is written “`&X`.” .\
    \ When the APEX server renders a page, it textually replaces the substitution\
    \ string by the value of its variable.\n\nFor example, the substitution string\
    \ `&APP_USER.` appears in the source of the `Demo Application` region. When the\
    \ APEX server renders the page, it textually replaces the substitution string\
    \ with the value of the variable `APP_USER`, which in this case is `SCIORE@BC.EDU`.\n\
    \n### Referring to APEX Pages\n\nThe `References` region contains a bullet list\
    \ of three entries. The first two entries contain links to external web pages;\
    \ the third entry is a link to the application's `Region Practice` page. The source\
    \ of the region appears in Listing [3-3](#335103_3_En_3_Chapter.xhtml#PC6).\n\n\
    ```\nAPEX App Builder Guide \n\nAsk Tom: An Oracle Help Site \n\nThe Region Practice\
    \ page\n\nListing 3-3: Source of the References Region\n```\n\nThe HTML `<a>`\
    \ tag specifies a link; its argument is the URL of the target location. The first\
    \ link in the listing is a typical link, which refers to a page on an external\
    \ website. The second link refers to a page of another APEX application—in particular,\
    \ page 1 of application 100 on the APEX server at `asktom.oracle.com`. Note how\
    \ the link uses the “f?p=” notation, as described in Chapter [2](#335103_3_En_2_Chapter.xhtml).\n\
    \nThe third link in the listing refers to page 2 of the current application; thus,\
    \ it can be written as a relative reference. It uses the built-in variables `APP_ID`\
    \ and `APP_SESSION` to refer to the current application ID and session ID. The\
    \ reference looks like this:\n\n```\nf?p=&APP_ID.:2:&APP_SESSION.\n```\n\nThe\
    \ concept of a session will be covered in Chapter [6](#335103_3_En_6_Chapter.xhtml).\
    \ For the moment, it suffices to know that APEX uses a session identifier to indicate\
    \ related page accesses. By passing the current session ID into the URL, you ensure\
    \ that the current session will continue when the link is followed. Note that\
    \ the second link in the region did not include a session identifier. This was\
    \ appropriate because the link was beginning a new session with the Ask Tom application."
  raw: "### Formatted vs. Unformatted Text\n\nThe source of a static content region\
    \ is the text to be displayed. APEX can interpret this text in two ways: as the\
    \ characters exactly as written or as HTML code to be formatted. The property\
    \ that specifies this option is called `Output As`, and it appears in the `Settings`\
    \ section of the region’s `Attributes` node in the page rendering tree. Figure\
    \ [3-19](#335103_3_En_3_Chapter.xhtml#Fig19) shows this section with the two possible\
    \ values of the `Output As` property.\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig19_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig19_HTML.jpg)\n\
    \nFigure 3-19\n\nType-specific properties for a static content region\n\nAn `Output\
    \ As` value of `HTML` specifies that the region’s source contains HTML code. APEX\
    \ will send this code as-is to the browser when it renders the page, so that the\
    \ browser can format the source accordingly.\n\nOn the other hand, a value of\
    \ `Text (escape special characters)` specifies that the source should be displayed\
    \ exactly as it appears. In this case, APEX needs to transform the text so that\
    \ there are no HTML tags for the browser to execute. It does so by replacing certain\
    \ characters (such as `<` and `>`) with different characters that happen to print\
    \ the same (such as `<` and `>`). This transformation is called *escaping* the\
    \ characters. The result is text that looks like HTML code, but really is not.\n\
    \nThe `Sample Database` region of Figure [3-17](#335103_3_En_3_Chapter.xhtml#Fig17)\
    \ illustrates several kinds of formatting:\n\n*   The description of the `EMP`\
    \ and `DEPT` tables makes use of the bold, italic, and underline tags.\n\n*  \
    \ To get the fields of `EMP` to line up in two rows, it uses a borderless table\
    \ having two columns: the first row consists of “`EMP(`” in one column and the\
    \ fields in the second column, and the second row consists of nothing in the first\
    \ column and the remaining fields in the second column.\n\n*   The bullet list\
    \ is implemented as an unordered list in HTML, and each bullet point is a list\
    \ item.\n\nConsequently, the region’s `Output As` property needs to be set to\
    \ `HTML`. The source code for the region is given in Listing [3-1](#335103_3_En_3_Chapter.xhtml#PC4).\n\
    \n```\nDEPT(DeptNo, DName, Loc)\n\nEMP(\nEmpNo, EName, Job, Mgr, HireDate, \n\n\
    Sal, Comm, DeptNo, Offsite) \n\n The underlined fields DeptNo and EmpNo are keys.\n\
    \ The italicized field DeptNo is a foreign key of DEPT.\n\nListing 3-1\nSource\
    \ of the Sample Database Region\n```\n\nNow consider the `Demo Application` region\
    \ . Its content is unformatted and in fact contains HTML tags that should not\
    \ be formatted. So the `Output As` property for this region should be `Text (escape\
    \ special characters)`. Its source appears in Listing [3-2](#335103_3_En_3_Chapter.xhtml#PC5).\n\
    \n```\nWelcome, &APP_USER.! The purpose of this application is to demonstrate\
    \ the various techniques used in APEX applications. Please feel free to explore\
    \ its pages.\nThe regions on this page illustrate ways that static content regions\
    \ get used. Most regions format their content using HTML tags such as , , and\
    \ . This region does not.\nListing 3-2\nSource of the Demo Application Region\n\
    ```\n\nThe beginning of this listing makes reference to “`&APP_USER`.”. This string\
    \ is called a *substitution string*, and APEX interprets it as the name of the\
    \ user. This topic is addressed next.\n\n### Substitution Strings\n\nThe APEX\
    \ server has several built-in variables that hold information of interest. Here\
    \ are three useful ones:\n\n*   The variable `APP_USER` holds the username of\
    \ whoever is currently logged in. If the application does not require users to\
    \ log in, the value of the variable is **APEX_PUBLIC_USER**.\n\n*   The variable\
    \ `APP_ID` holds the ID of the current application.\n\n*   The variable `APP_SESSION`\
    \ holds the ID of the current session.\n\nTo refer to the value of a variable\
    \ from within HTML text, you prepend the character `&` and append the period character\
    \ (`.`) to the variable name. Such an expression is called a *substitution string*.\
    \ In other words, the substitution string for a variable named `X` is written\
    \ “`&X`.” . When the APEX server renders a page, it textually replaces the substitution\
    \ string by the value of its variable.\n\nFor example, the substitution string\
    \ `&APP_USER`. appears in the source of the `Demo Application` region. When the\
    \ APEX server renders the page, it textually replaces the substitution string\
    \ with the value of the variable `APP_USER`, which in this case is **SCIORE@BC.EDU**.\n\
    \n### Referring to APEX Pages\n\nThe `References` region contains a bullet list\
    \ of three entries. The first two entries contain links to external web pages;\
    \ the third entry is a link to the application's `Region Practice` page. The source\
    \ of the region appears in Listing [3-3](#335103_3_En_3_Chapter.xhtml#PC6).\n\n\
    ```\n\nAPEX App Builder Guide \n\nAsk Tom: An Oracle Help Site \n\nThe Region\
    \ Practice page\n\nListing 3-3\nSource of the References Region\n```\n\nThe HTML\
    \ `<a>` tag specifies a link; its argument is the URL of the target location.\
    \ The first link in the listing is a typical link, which refers to a page on an\
    \ external website. The second link refers to a page of another APEX application—in\
    \ particular, page 1 of application 100 on the APEX server at `asktom.oracle.com`.\
    \ Note how the link uses the “f?p=” notation, as described in Chapter [2](#335103_3_En_2_Chapter.xhtml).\n\
    \nThe third link in the listing refers to page 2 of the current application; thus,\
    \ it can be written as a relative reference. It uses the built-in variables `APP_ID`\
    \ and `APP_SESSION` to refer to the current application ID and session ID. The\
    \ reference looks like this:\n\n```\nf?p=&APP_ID.:2:&APP_SESSION.\n```\n\nThe\
    \ concept of a session will be covered in Chapter [6](#335103_3_En_6_Chapter.xhtml).\
    \ For the moment, it suffices to know that APEX uses a session identifier to indicate\
    \ related page accesses. By passing the current session ID into the URL, you ensure\
    \ that the current session will continue when the link is followed. Note that\
    \ the second link in the region did not include a session identifier. This was\
    \ appropriate because the link was beginning a new session with the Ask Tom application."
  trans: "### 格式化文本与非格式化文本\n\n静态内容区域的来源是要显示的文本。APEX 可以以两种方式解释此文本：一种是按书写原样显示的字符，另一种是需要格式化的\
    \ HTML 代码。指定此选项的属性称为 `输出为`，它出现在页面渲染树中区域 `属性` 节点的 `设置` 部分。图 3-19 展示了此部分以及 `输出为`\
    \ 属性的两个可能值。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig19_HTML.jpg](img/335103_3_En_3_Fig19_HTML.jpg)\n\
    图 3-19：静态内容区域的类型特定属性\n\n`输出为` 的值为 `HTML` 指定该区域的源包含 HTML 代码。APEX 在渲染页面时会按原样将此代码发送到浏览器，以便浏览器可以相应地格式化源。\n\
    \n另一方面，值 `文本（转义特殊字符）` 指定应按原样显示源。在这种情况下，APEX 需要转换文本，以便浏览器没有可执行的 HTML 标签。它通过将某些字符（例如\
    \ `<` 和 `>`）替换为碰巧打印效果相同的不同字符（例如 `<` 和 `>`）来实现。这种转换称为 `转义` 字符。结果是看起来像 HTML 代码但实际并非如此的文本。\n\
    \n图 3-17 中的 `示例数据库` 区域说明了几种格式：\n\n*   `EMP` 和 `DEPT` 表的描述使用了粗体、斜体和下划线标签。\n*  \
    \ 为了使 `EMP` 的字段在两行中对齐，它使用了一个包含两列的无边框表格：第一行由一列中的“`EMP(`”和第二列中的字段组成，第二行由第一列中的空内容和第二列中的剩余字段组成。\n\
    *   项目符号列表在 HTML 中实现为无序列表，每个项目符号点是一个列表项。\n\n因此，该区域的 `输出为` 属性需要设置为 `HTML`。该区域的源代码如代码清单\
    \ 3-1 所示。\n\n```\nDEPT(DeptNo, DName, Loc)\n\nEMP(\nEmpNo, EName, Job, Mgr, HireDate,\
    \ \n\nSal, Comm, DeptNo, Offsite) \n\n 下划线字段 DeptNo 和 EmpNo 是主键。\n 斜体字段 DeptNo\
    \ 是 DEPT 的外键。\n\n代码清单 3-1：示例数据库区域的源\n```\n\n现在考虑 `演示应用` 区域。它的内容是非格式化的，实际上包含不应格式化的\
    \ HTML 标签。因此，此区域的 `输出为` 属性应设置为 `文本（转义特殊字符）`。其源如代码清单 3-2 所示。\n\n```\n欢迎, &APP_USER.!\
    \ 本应用程序的目的是演示 APEX 应用程序中使用的各种技术。请随意浏览其页面。\n本页上的区域展示了静态内容区域的使用方式。大多数区域使用 HTML 标签（如\
    \ <b>、<i> 和 <u>）格式化其内容。本区域不这样做。\n代码清单 3-2：演示应用区域的源\n```\n\n此清单开头提到了“`&APP_USER`.”。此字符串称为替换字符串，APEX\
    \ 将其解释为用户名。接下来将讨论此主题。\n\n### 替换字符串\n\nAPEX 服务器有几个内置变量，其中包含有用的信息。以下是三个有用的变量：\n\n\
    *   变量 `APP_USER` 保存当前登录用户的用户名。如果应用程序不要求用户登录，则该变量的值为 `APEX_PUBLIC_USER`。\n*  \
    \ 变量 `APP_ID` 保存当前应用程序的 ID。\n*   变量 `APP_SESSION` 保存当前会话的 ID。\n\n要从 HTML 文本中引用变量的值，您在变量名前添加字符\
    \ `&` 并在后附加句点字符 (`.`)。这样的表达式称为替换字符串。换句话说，名为 `X` 的变量的替换字符串写作 “`&X`.” 。当 APEX 服务器渲染页面时，它会用该变量的值文本替换该替换字符串。\n\
    \n例如，替换字符串 `&APP_USER.` 出现在 `演示应用` 区域的源中。当 APEX 服务器渲染页面时，它会用变量 `APP_USER` 的值（在本例中为\
    \ `SCIORE@BC.EDU`）文本替换该替换字符串。\n\n### 引用 APEX 页面\n\n`参考资料` 区域包含一个包含三个条目的项目符号列表。前两个条目包含指向外部网页的链接；第三个条目是指向应用程序的\
    \ `区域实践` 页面的链接。该区域的源如代码清单 3-3 所示。\n\n```\nAPEX 应用构建器指南\n\nAsk Tom: 一个 Oracle 帮助站点\n\
    \n区域实践页面\n\n代码清单 3-3：参考资料区域的源\n```\n\nHTML `<a>` 标签指定一个链接；其参数是目标位置的 URL。清单中的第一个链接是一个典型链接，它引用外部网站上的一个页面。第二个链接引用另一个\
    \ APEX 应用程序的一个页面——特别是 `asktom.oracle.com` 上 APEX 服务器中应用程序 100 的第 1 页。请注意该链接如何使用“f?p=”表示法，如第\
    \ 2 章所述。\n\n清单中的第三个链接引用当前应用程序的第 2 页；因此，它可以写为相对引用。它使用内置变量 `APP_ID` 和 `APP_SESSION`\
    \ 来引用当前应用程序 ID 和会话 ID。引用如下所示：\n\n```\nf?p=&APP_ID.:2:&APP_SESSION.\n```\n\n会话的概念将在第\
    \ 6 章中介绍。目前，只需知道 APEX 使用会话标识符来指示相关的页面访问。通过将会话 ID 传递到 URL 中，您可以确保在跟踪链接时当前会话将继续。请注意，区域中的第二个链接没有包含会话标识符。这是合适的，因为该链接开始了一个与\
    \ Ask Tom 应用程序的新会话。"
- fmt: "## Referring to Local Images\n\nAn HTML `<img>` tag displays an image; its\
    \ argument is the URL of the image file. If the URL is a reference to a file on\
    \ another web server, an absolute URL works fine. However, if you plan to store\
    \ an image file on the APEX web server, then you should use a relative URL. The\
    \ format of this URL is determined as follows.\n\nThe first thing to do is upload\
    \ the file to the server. Go to the home screen of your application, click the\
    \ `Shared Components` button, and find the `Files` section as shown in Figure\
    \ 3-20.\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig20_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig20_HTML.jpg)\n\
    \n**Figure 3-20** Files section of the Shared Components screen\n\nYou have two\
    \ options to choose from: `Static Application Files` or `Static Workspace Files`.\
    \ The difference between them is one of visibility. An application file can be\
    \ referenced from a specific application only, whereas a workspace file can be\
    \ accessed by any application in the workspace. Whichever option you click, you\
    \ will be taken to a screen that lets you choose your file. Then click the `Upload`\
    \ button to upload it.\n\nTo display your image file using an HTML `<img>` tag,\
    \ you must specify its location on the server. However, APEX will not tell you\
    \ where it stored your image files; instead, it provides you with built-in variables.\
    \ There are two variables, `APP_IMAGES` and `WORKSPACE_IMAGES`, whose values hold\
    \ the path to your application images and workspace images on the server. You\
    \ use substitution strings to access the value of these variables. For example,\
    \ I uploaded the employee photograph to a file named `employees.jpg` and saved\
    \ it in APEX as an application file. You should do the same with a picture of\
    \ your choice. The HTML tag to display this file is:\n\n```\n<img src=\"#APP_IMAGES#employees.jpg\"\
    \ alt=\"Employees\">\n```\n\nNote the two different uses of the period character\
    \ in this tag. The first one is part of the substitution string notation and will\
    \ be replaced by the path to the image directory when the page is rendered; the\
    \ second one is part of the filename.\n\nWith this in mind, take a look at the\
    \ source of the `Quick Link` region in Listing 3-4.\n\n```\n<a href=\"f?p=&APP_ID.:3:&SESSION.\"\
    >\n    <img src=\"#APP_IMAGES#employees.jpg\" alt=\"Employees\">\n</a>\n```\n\n\
    **Listing 3-4** Source of the Quick Link Region\n\nThis code uses the `<img>`\
    \ tag to display the `employees.jpg` image and then uses `<a>` and `</a>` tags\
    \ to wrap this image in a link. Consequently, clicking the image takes the user\
    \ to page 3 of the application (which means that the link will be nonfunctional\
    \ until the next section, in which page 3 is created).\n\nChapter 2 discussed\
    \ the possibility of using an image as the application’s logo. To demonstrate\
    \ this possibility, I created a stylized image of the words “Employee Demo,” saved\
    \ it in the file `Logo.jpg`, and uploaded it to APEX as an application file. I\
    \ then configured the application’s logo as described in Chapter 2. That is, I\
    \ clicked the `Edit Application Properties` button in the application home page,\
    \ clicked the `User Interface` tab, and modified the properties in the `Logo`\
    \ section, as shown in Figure 3-21. A screenshot of the logo appears in Figure\
    \ 3-22.\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig22_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig22_HTML.jpg)\n\
    \n**Figure 3-22** Logo corresponding to Figure 3-21\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig21_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig21_HTML.jpg)\n\
    \n**Figure 3-21** Specifying an image logo\n\n## Classic Report Regions\n\nEarlier\
    \ in this chapter, you had a brief encounter with a classic report region, when\
    \ you created a report in the `Region Practice` page having the source query `select\
    \ * from DEPT`. This section examines classic reports in more detail. Page 3 of\
    \ the `Employee Demo` application contains two regions, titled `Default Report`\
    \ and `Formatted Report`. Figures 3-23 and 3-24 display the reports from these\
    \ two regions.\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig24_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig24_HTML.jpg)\n\
    \n**Figure 3-24** The formatted employee report\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig23_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig23_HTML.jpg)\n\
    \n**Figure 3-23** The default employee report\n\nBoth reports have the same source,\
    \ which is the following SQL query:\n\n```\nselect EmpNo, EName, Job, HireDate,\
    \ Sal, DeptNo, Offsite\nfrom EMP\n```\n\nThe formatted report differs from the\
    \ default report in the following ways:\n\n*   The columns `EmpNo` and `Job` are\
    \ not displayed.\n*   The column headers for `EName` and `DeptNo` have been renamed,\
    \ and the header for `Hiredate` is in italics.\n*   The records can only be sorted\
    \ by employee name or salary.\n*   Employee names are accentuated by writing them\
    \ in a larger font and in bold and include the employee’s job.\n*   Hire dates\
    \ are formatted differently from the default report and are links.\n*   Salary\
    \ values are formatted as currency and aligned right, and values over $2,500 are\
    \ colored red.\n*   Department values are shown as department names instead of\
    \ department numbers.\n*   Values for the `Offsite` column are displayed as images\
    \ instead of text.\n*   Fewer rows are displayed at a time, with pagination controls.\n\
    \nThis section will show you how to use the type-specific properties of report\
    \ regions (together with some additions to the SQL source query) to build the\
    \ formatted report. Begin by following these steps:\n\n*   Create a new blank\
    \ page named `Classic Reports` and having page number 3. Tell the wizard to create\
    \ a navigation menu entry for the page, also named `Classic Reports`.\n*   Go\
    \ to the page editor for this page and create two new regions. Title the regions\
    \ `Default Report` and `Formatted Report`, and place them in the `Content Body`\
    \ position of the page.\n*   Set the type of each region to be `Classic Report`\
    \ having the source query given earlier.\n*   Configure their `Layout` properties\
    \ so that the `Formatted Report` region starts a new row. (Or if you prefer to\
    \ see the reports side by side, set the properties so that `Formatted Report`\
    \ does not start a new row.)\n\nAt this point, your page should display two identical\
    \ regions that look like Figure 3-23. Figure 3-25 depicts the top of the resulting\
    \ rendering tree for this page, showing the components for the `Default Report`\
    \ region. (The components for the `Formatted Report` region are similar and thus\
    \ omitted.) Note that APEX created several components for each report: a component\
    \ (labeled with the region name) that contains the type-independent properties,\
    \ a component (labeled `Attributes`) that contains report-specific properties,\
    \ and a component for each column of the report that contains the column-specific\
    \ properties. The following sections examine these column-specific and report-specific\
    \ properties.\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig25_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig25_HTML.jpg)\n\
    \n**Figure 3-25** Rendering tree for a Classic Report region\n\n## Column-Specific\
    \ Properties\n\nEach column in a report has its own set of properties. When you\
    \ select a column node in the rendering tree, the property editor shows you its\
    \ column-specific properties. These properties are grouped into several sections,\
    \ which are discussed next.\n\n### Identification"
