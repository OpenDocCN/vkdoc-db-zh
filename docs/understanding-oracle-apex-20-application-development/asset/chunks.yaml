    **Figure 7-23**

    Customizing when the Previous button is displayed


    ## 方案总结


    总结来说，方案2的实现“上一个/下一个”功能的方式如下：首先创建隐藏项 `P20_PREV` 和 `P20_NEXT`。然后创建名为 `FindPreviousNext`
    的过程，它使用清单 [7-18](#335103_3_En_7_Chapter.xhtml#PC34) 的代码计算这两个项的值，并在页面呈现时执行。


    最后，配置 `Previous` 和 `Next` 按钮，使其重定向到当前页面，并为 `P20_EMPNO` 赋值。`Previous` 按钮使用 `P20_PREV`
    的值，而 `Next` 按钮使用 `P20_NEXT` 的值。每个按钮都使用条件渲染，仅当其关联的项值不为 `null` 时才显示。


    结果是，整个页面由两个相对较小的过程组成：一个获取所选行的值，另一个计算上一条和下一条记录的雇员号。两个过程都在页面呈现时执行。用户可以通过点击报表链接或
    `Previous`/`Next` 按钮来选择一行。无论哪种情况，页面都会确定所选记录的雇员号，将其保存到项 `P20_EMPNO` 中，并进行重定向，从而触发这两个过程的执行。整个过程无需任何提交操作。


    ## 单行更新


    报表模式/单行模式思想的另一个用途是支持数据录入。`Single Row Update` 页面阐述了这一思想。它是示例应用程序的第21页，如图 [7-24](#335103_3_En_7_Chapter.xhtml#Fig24)
    所示。图中的三个区域是同时显示的，但实际上一次只显示一个区域。根据可见区域的不同，页面将处于报表模式、更新模式或插入模式。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig24_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig24_HTML.jpg)


    **Figure 7-24**

    Single Row Update page


    最初，页面以报表模式显示 `Employees` 区域。从那里，用户可以点击 `Insert` 按钮进入插入模式，或者点击某个 `Edit` 链接进入更新模式。


    在插入模式下，页面显示 `Insert Employee` 区域。该区域与 `Employee Data Entry` 页面中的相应区域基本相同。它的 `Create`
    按钮创建一个具有指定值的新 `EMP` 记录，然后清除各项的值，为下一次插入做准备。`Cancel` 按钮返回到报表模式。


    在更新模式下，页面显示 `Update/Delete Employee` 区域。该区域的各项最初填充了所选雇员的信息。用户可以更改区域中的项值，然后点击 `Update`
    按钮来更新数据库。或者，点击 `Delete` 按钮会删除所选记录。删除记录后也会返回到报表模式，因为没有记录可再显示。点击 `Cancel` 按钮只是简单地返回到报表模式。


    现在你了解了页面的工作原理，可以考虑如何实现每个区域了。以下小节将探讨这些问题。


    ### 实现报表区域


    报表区域的实现与图 [7-17](#335103_3_En_7_Chapter.xhtml#Fig17) 的 `Single Row View` 页面基本相同。一个区别是它还有一个名为
    `P21_MODE` 的隐藏项，用于区分三种模式。该项的值将是 `Report`、`Insert` 和 `Update`（视情况而定），`null` 值表示报表模式。


    `EmpNo` 列被实现为一个链接。该链接重定向到第21页，并在重定向时设置两个项的值：`P21_EMPNO` 设置为所选雇员号，`P21_MODE` 设置为
    `Update`。`Insert` 按钮也会进行重定向，将 `P21_MODE` 设置为 `Insert`。该区域根据以下 SQL 表达式进行条件渲染：


    ```

    :P21_MODE = ‘Report’ or :P21_MODE is null

    ```


    ### 实现插入区域


    一条新的 `EMP` 记录有九个值，但用户只需指定其中五个。`Insert Employee` 区域为这五个值各设置了一个项。这些项被命名为 `P21_INSERT_ENAME`、`P21_INSERT_JOB`
    等。该区域还有两个按钮，分别名为 `Create` 和 `CancelInsert`。区域根据以下 SQL 表达式进行条件渲染：


    ```

    :P21_MODE = ''Insert''

    ```


    `Create` 按钮执行提交操作。它有一个关联的过程，名为 `InsertEmp`，该过程执行两件事：执行一条 SQL 插入命令，并将其项设置为 `null`。它对
    `HireDate`、`Comm` 和 `Office` 使用默认值。其代码见清单 [7-19](#335103_3_En_7_Chapter.xhtml#PC37)。


    ```

    begin

    insert into EMP(EName, Job, Mgr, Sal, DeptNo, HireDate, Comm, Offsite)

    values (:P21_INSERT_ENAME,

    :P21_INSERT_JOB,

    :P21_INSERT_MGR,

    :P21_INSERT_SAL,

    :P21_INSERT_DEPTNO,

    current_date,  0,  ''N'');

    -- Clear the region''s visible items.

    :P21_INSERT_ENAME   := null;

    :P21_INSERT_JOB     := null;

    :P21_INSERT_MGR     := null;

    :P21_INSERT_SAL     := null;

    :P21_INSERT_DEPTNO  := null;

    -- But do not change the mode.

    end;

    ```

    **Listing 7-19**

    PL/SQL Code for the InsertEmp Process


    `CancelInsert` 按钮进行重定向，将 `P21_MODE` 设置为 `Report`。


    ### 实现更新/删除区域


    `Update/Delete Employee` 区域中的各项由一个名为 `FetchRowForUpdate` 的过程填充，该过程在页面呈现时执行，并基于
    SQL 表达式进行条件判断。


    ```

    :P21_MODE = ''Update''

    ```


    该过程的代码见清单 [7-20](#335103_3_En_7_Chapter.xhtml#PC39)。该代码与清单 [7-15](#335103_3_En_7_Chapter.xhtml#PC31)
    中的 `FetchRow` 过程基本相同，只是它还处理了丢失更新的问题。（此问题与 `Single Row View` 页面无关，因为该页面不执行任何更新。）它计算三个可修改项的哈希值，并将其保存在隐藏项
    `P21_HASH` 中。


    ```

    declare

    v_valuesToHash apex_t_varchar2;

    begin

    if :P21_EMPNO is not null then

    -- First, fetch the employee record and save its values.

    select EName, Job, Sal, DeptNo

    into :P21_UPDATE_ENAME,

    :P21_UPDATE_JOB,

    :P21_UPDATE_SAL,

    :P21_UPDATE_DEPTNO

    from EMP

    where EmpNo = :P21_EMPNO;

    -- Then save the hash of the updatable values.

    v_valuesToHash := apex_t_varchar2(:P21_UPDATE_JOB,

    :P21_UPDATE_SAL, :P21_UPDATE_DEPTNO);

    :P21_HASH := apex_util.get_hash(v_valuesToHash);

    end if;

    end;

    ```

    **Listing 7-20**

    PL/SQL Code for the FetchRowForUpdate Process


    该区域的 `Delete` 按钮的 PL/SQL 代码名为 `DeleteEmp`。它执行一条 SQL `delete` 命令，类似于清单 [7-1](#335103_3_En_7_Chapter.xhtml#PC3)，然后返回到报表模式。其代码见清单
    [7-21](#335103_3_En_7_Chapter.xhtml#PC40)。


    ```

    begin

    -- First, delete the record.

    delete from EMP

    where EmpNo = :P21_EMPNO;

    -- Then return to report mode.

    :P21_EMPNO := null;

    :P21_MODE  := ''Report'';

    end;

    ```

    **Listing 7-21**

    Code for the DeleteEmp Process


    `Update` 按钮的代码名为 `UpdateEmp`。它在确保没有丢失更新后，执行一条 SQL `update` 命令。该代码与 `Revised Employee
    Data Entry` 页面的更新代码基本相同（参考清单 [7-10](#335103_3_En_7_Chapter.xhtml#PC23)）。代码见清单
    [7-22](#335103_3_En_7_Chapter.xhtml#PC41)。'
