    end;\nListing 9-4\nPL/SQL Code for the InsertRecord Process\n```\n\nRecall that\
    \ after the insertion occurs, the page should clear the\nfour wizard pages and\
    \ redirect to the first one. To do so, create a\nbranch object, named `GoToPage25`,\
    \ which is\nconditional on the `OK` button. Use the\nlink builder to specify the\
    \ action of the branch, which will look\nexactly as in Figure [9-13](#335103_3_En_9_Chapter.xhtml#Fig13).\n\
    \nSummary\nThis chapter looked at branch objects and gave some examples of their\n\
    use. Branches execute during a submit operation, after the validations\nand processes.\
    \ A branch has two important components: its target and its\ncondition.\nThe branch’s\
    \ target specifies the page (or URL) to redirect to. You\nspecify the target using\
    \ the link builder, just as you did when\nconfiguring a redirection for a button\
    \ or link. Consequently, a branch\ncan also assign values to items in the session\
    \ state or clear item\nvalues on a page.\nThe branch’s condition specifies when\
    \ the branch is relevant. A page\nmight have several target pages, depending on\
    \ its session state. You\naddress this situation by creating a branch for each\
    \ target page and\nassigning a condition to each branch. The branch conditions\
    \ should be\nnon-overlapping so that at most one branch will be able to fire during\n\
    any submit operation.\n\n10. Forms\n\nMany of the processes from Chapter [7](#335103_3_En_7_Chapter.xhtml)\
    \ involve certain basic tasks, such\nas retrieving the values of a record given\
    \ its key, finding the previous\nand next records of a given record, updating\
    \ records in a table, and\nmodifying the session state.\nAPEX has a region type,\
    \ called `Form` , which\nmakes it possible to perform these tasks without any\
    \ PL/SQL programming\nwhatsoever. A form region contains two generic processes—one\
    \ that\nexecutes during rendering and one that executes during processing—which\n\
    you can configure to meet many of your needs.\nThis chapter examines the use of\
    \ form regions, their processes, and\nsome related processes built into APEX.\
    \ It also evaluates some of the\nAPEX wizards for creating form-based pages. Knowing\
    \ how and when to use\nthe APEX form regions and wizards can relieve you of the\
    \ need to write\nPL/SQL code for the more common page development tasks."
