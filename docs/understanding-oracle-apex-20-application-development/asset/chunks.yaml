    # 图表下钻


    图表下钻与主从关系非常相似。图表是主项，报表是从项。实际上，其实现策略与主从报表的本质相同：


    1.  创建一个隐藏项，此处名为 `P13_JOB`。

    2.  创建由该隐藏项定制的明细报表。

    3.  创建图表，并配置其在被点击时将所选职位分配给该隐藏项。


    明细报表的源查询与 `按部门查看员工` 中的查询本质相同。唯一的区别是该查询执行了一个连接（join），以便报表能够显示部门名称。SQL 代码如下：


    ```sql

    select e.EmpNo, e.EName, d.DName, e.Sal

    from EMP e join DEPT d

    on    e.DeptNo = d.DeptNo

    where e.Job = :P13_JOB

    order by EName

    ```


    饼图的源代码是一个具有两个输出列的 SQL 查询。以下查询为每个职位创建一个饼图扇区，其值是拥有该职位的员工数量：


    ```sql

    select Job, count(*) as EmpCount

    from EMP

    group by Job

    order by EmpCount desc

    ```


    剩下的唯一问题是如何指定图表被点击时的行为。此行为由图表系列的 `链接` 属性决定；参见图 6-11。


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig11_HTML.jpg](img/335103_3_En_6_Fig11_HTML.jpg)


    图 6-11：图表系列的链接属性


    `类型` 属性的值为 `链接到此应用程序中的页面`。选择它会显示 `目标` 属性，你可以使用 `链接生成器` 屏幕来指定目标页面。图 6-12 显示了为该图表配置时的屏幕。你使用与图
    6-9 的主报表相同的技术：选择目标为当前页面，并设置隐藏项的值。唯一的区别在于你如何引用所选值。当该值来自报表的 `X` 列时，你写 `#X#`。当它来自图表的
    `X` 列时，你写 `&X.`——即将列名作为替换字符串引用。


