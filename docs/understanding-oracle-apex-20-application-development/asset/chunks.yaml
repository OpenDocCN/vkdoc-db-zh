    \ feel of the page. Currently, the page contains two grid\nregions, each with\
    \ its own buttons. The `Edit` and `Add Row` buttons\naffect only their own grids.\
    \ However, the `Save` buttons are\nredundant—each one saves the changes from both\
    \ grids. This behavior is\nsomewhat unexpected and could confuse users.\nThe solution\
    \ is to realize that the `Save` buttons  do not have special\nfunctionality—their\
    \ action is equivalent to a page-wide `Submit operation`.\nTherefore, it is possible\
    \ to create your own `Save` button and\ndisplay it anywhere you want on the page.\
    \ My choice was to create a new\nstatic content region, titled `Employees by Department`,\
    \ to be the parent of the two interactive grid\nregions`.` I then\ncreated a button\
    \ in the new region labeled `Save`, set its\nposition to `Edit`, turned on its\n\
    `Hot` property\n(so that it is displayed in blue), and gave it the action `Submit\
    \ Page`. You\nshould do the same.\n\nAfter you verify that the button works, you\
    \ can hide the `Save` buttons on the\nregion toolbars. Go to the rendering subtree\
    \ for the `Departments` region,\nclick the `Attributes` node, and\nfind the `Toolbar`\
    \ section in\nthe properties editor (as was shown in Figure [11-3](#335103_3_En_11_Chapter.xhtml#Fig3)).\
    \ Uncheck the\n`Save Button`\nentry. Then repeat the process for the `Employees`\
    \ region.\nFigure [11-13](#335103_3_En_11_Chapter.xhtml#Fig13) shows the\nresulting\
    \ page.\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig13_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig13_HTML.jpg)\n\
    \nFigure 11-13\nThe completed Interactive Grids page\n\nEnsuring Consistency\n\
    Chapter [8](#335103_3_En_8_Chapter.xhtml) discussed ways that a page can\npreserve\
    \ data consistency. One way was to use validations to check for\ninappropriate\
    \ item values; another was to restrict the values that can\nget entered. The following\
    \ subsections show how these solutions can be\napplied to interactive grids.\n\
    \nGrid Validations\nA validation\nin an interactive grid is an assertion that\
    \ must be true for each row of\nthe grid. You define an interactive grid validation\
    \ the same as an\nitem-based validation; the only difference is that it will apply\
    \ to\nevery row in the grid instead of just one.\n\nAs an example, consider how\
    \ to create a validation to ensure that the\nmanager of an employee is either\
    \ the president or an employee in the\nsame department. To create this validation,\
    \ go to the `Processing` tab of the\npage editor, right-click the `Validating`\
    \ node, and\nselect `Create Validation`. Figure [11-14](#335103_3_En_11_Chapter.xhtml#Fig14)\
    \ shows the\nrelevant property values you should specify:\n\n*   Set the name\
    \ of the validation to `Mgr in Same Dept`.\n\n*   Set the editable region to `Employees`.\n\
    \n*   Set the validation type to `Rows returned`, having\n    the query\n\n```\n\
    \    select * from EMP\n    where EmpNo = :MGR\n    and (DeptNo = :DEPTNO or Job\
    \ = 'PRESIDENT')\n    ```\n\n*   Give an appropriate error message.\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig14_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig14_HTML.jpg)\n\
    \nFigure 11-14\nProperties of a grid validation\n\nThe critical property here\
    \ is `Editable Region`. By\nproviding a value for this property, you are specifying\
    \ that this is an\ninteractive grid validation and not an item-based validation.\
    \ So when a\nsubmit action occurs (such as by clicking the `Save` button), APEX\n\
    will apply the validation to each changed row of the grid.\nGiven an employee\
    \ row, the validation query returns the employee’s\nmanager, provided that the\
    \ manager is either the president or\nin the same department as the employee.\
    \ In other words, if an output\nrecord exists, then the row has a proper manager\
    \ and thus satisfies the\n`Rows returned`\nvalidation type. Note that the query\
    \ references the values of the\nmodified row using bound variable syntax; that\
    \ is, it treats the cells\nof the modified row as if they were items.\n\nRestricting\
    \ Interactive Grid Input\nOne problem with using an interactive grid for update\
    \ is that\nyou might want a cell to be updatable for some operations but not\n\
    others. For example, consider the `EName` column in the\n`Employees` grid.\nSuppose\
    \ that a user should be able to enter an employee name during\ninsertion, but\
    \ should not be able to edit it subsequently. How to\nenforce this restriction?\n\
    The idea is to make use of the column’s `Read Only` properties.\nIn particular,\
    \ you want to specify that the column’s cells should be\nread-only for all rows\
    \ except update rows. To express this\nspecification, you will need to know the\
    \ update status of each row.\n\nAPEX has a built-in variable named `APEX$ROW_STATUS`\
    \ for\nthis purpose. It has a value for each row of the grid, which can be one\n\
    of four values:\n\n*   If the row has been edited, then the status is ‘`U`’.\n\
    \n*   If the row is an insert row, then the status is ‘`C`’ (for\n    “created”).\n\
    \n*   If the row is flagged for deletion, then the status is ‘`D`’.\n\n*   If\
    \ the row has not been changed, then the status is `null`.\n\nFigure [11-15](#335103_3_En_11_Chapter.xhtml#Fig15)\
    \ shows how to\nuse `APEX$ROW_STATUS` to\nspecify the `Read Only` SQL expression\
    \ for the `EName` column. Note\nalso that the value of the `Execute` property\
    \ is\n`For Each Row`,\nwhich tells APEX to apply this expression to each row in\
    \ the grid.\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig15_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig15_HTML.jpg)\n\
    \nFigure 11-15\nSpecifying when EName values can be entered\n\nThe preceding example\
    \ shows how to protect column values. The next\nexample shows how to protect row\
    \ values. Suppose that you want users of\nthis page to not be able to delete managers\
    \ and to not be able to edit\nor delete the president. The idea here is to make\
    \ use of a grid’s `Allowed Row Operations Column` property. This property appears\
    \ in the `Edit` section of the\ngrid region and is shown in Figure [11-16](#335103_3_En_11_Chapter.xhtml#Fig16).\n\
    \n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig16_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig16_HTML.jpg)\n\
    \nFigure 11-16\nEnabling row-specific updates and deletes\n\nThis property also\
    \ exists for forms (see, e.g., Figure [10-2](#335103_3_En_10_Chapter.xhtml#Fig2)),\
    \ but until now none of the\npages you created needed it. Its purpose\nis to indicate\
    \ the column of the source query whose values denote\nallowable row operations,\
    \ if one exists. In such a column, the value\n‘`U`’ denotes\nthat the row is update-only,\
    \ ‘`D`’ denotes\ndelete-only, and ‘`UD`’ denotes that both\nupdate and delete\
    \ are allowed. Any other value denotes that no\noperations are allowed on the\
    \ row. For example, here is my revised\nsource query for the Employees region:\n\
    \n```\nselect EMP.*,\ncase Job\nwhen 'PRESIDENT' then ''\nwhen 'MANAGER' then\
    \ 'U'\nelse 'UD'\nend as Status\nfrom EMP\n```\n\nThe `Status`\ncolumn values are\
    \ determined by the employee’s job. The value for the\npresident will be the empty\
    \ string, denoting that it cannot be changed;\nthe value for a manager will be\
    \ ‘U’, denoting that managers can be\nupdated only; and the value for all other\
    \ employees will be ‘UD’,\ndenoting that updates and deletes are allowed. Figure\
    \ [11-17](#335103_3_En_11_Chapter.xhtml#Fig17) shows the\nrevised `Source`\nsection\
    \ for the region.\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig17_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig17_HTML.jpg)\n\
    \nFigure 11-17\nAdding a row operations column to the grid’s source\n\nBy default,\
    \ this new source column will be\ndisplayed in the grid as a text field. This\
    \ column can be a useful\ndebugging aid. But eventually, you will want to set\
    \ its type to `Hidden`."
