    同样，这样的错误消息是向用户提供反馈的一种不令人满意的方式。黑客经常尝试生成约束违反，并非因为他们期望它奏效，而是因为他们对错误消息感兴趣。图 [8-4](#335103_3_En_8_Chapter.xhtml#Fig4)
