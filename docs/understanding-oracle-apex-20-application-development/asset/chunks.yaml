    \nFigure 3-38\nThe Employee Counts chart region\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig37_HTML.png](images/335103_3_En_3_Chapter/335103_3_En_3_Fig37_HTML.png)\n\
    \nFigure 3-37\nThe Salary Info chart region\n\nThe bar chart consists of ten data\
    \ points, giving the minimum and\nmaximum salaries of employees at each job. These\
    \ points are organized\ninto two *series* of five points each.\nThe pie chart\
    \ consists of five data points, one for each job. The\nlabel of each point is\
    \ the name of the job, and the value is the number\nof employees having that job.\
    \ The chart displays a section of the pie\nfor each label in proportion to its\
    \ value. For example, two of the\nfourteen employees are analysts, so the size\
    \ of the `ANALYST` section is\ntwo-fourteenths the size of the pie.\n\nCreating\
    \ a Chart Region\n\nTo build this page, begin by creating a new blank page named\
    \ `Charts`, and add to it\ntwo regions of type `Chart`. Name the first\nregion\
    \ `Salary Info` and the second region `Employee Counts`.\nFigure [3-39](#335103_3_En_3_Chapter.xhtml#Fig39)\
    \ shows the\nresulting rendering tree for these regions.\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig39_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig39_HTML.jpg)\n\
    \nFigure 3-39\nRendering tree for the two chart regions\n\nFrom this figure, you\
    \ can see that a chart has four kinds of\nproperties: type-independent properties\
    \ (denoted by the region name),\nchart-specific properties (denoted by `Attributes`),\n\
    properties specific to each chart series (denoted by `Series`), and\nproperties\
    \ associated with the chart axes (denoted by `Axes`). By default, a\nchart is\
    \ created with one series (named `New`), but you can\nrename the series and add\
    \ others.\nEach series in Figure [3-39](#335103_3_En_3_Chapter.xhtml#Fig39) is\
    \ flagged\nwith a red error indicator to tell you that the chart needs further\n\
    configuration. Details of this configuration are discussed next.\n\nConfiguring\
    \ a Chart\n\nEvery chart needs a *source*, which is an expression that\nspecifies\
    \ the chart’s data points. A common source is an SQL query.\nIf the chart has\
    \ N series, then the query will have N+1 columns—one\ncolumn contains the labels,\
    \ and the other columns contain the values for\neach series. For example, the\
    \ series for `Salary Info` has the\nfollowing source query:\n\n```\nselect Job,\
    \ min(Sal) as MinSal, max(Sal) as MaxSal\nfrom EMP\ngroup by Job\norder by MinSal\n\
    ```\n\nYou specify the source of a chart similar to how you would specify the\n\
    source of a report. The chart’s `Source` section\ncontains the three properties\
    \ you need. Figure [3-40](#335103_3_En_3_Chapter.xhtml#Fig40) shows the\nvalues\
    \ of these properties for the `Salary info` region.\nYou should also make similar\
    \ changes to your `Employee Counts`\nregion, using the following source query:\n\
    \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig40_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig40_HTML.jpg)\n\
    \nFigure 3-40\nSpecifying the source of the Salary Info chart\n\n```\nselect Job,\
    \ count(*) as EmpCount\nfrom EMP\ngroup by Job\norder by EmpCount desc\n```\n\n\
    Configuring a Chart Series\n\nAfter you have configured the source of a chart,\
    \ you can configure\neach of its series. The relevant properties for a series\
    \ are in its\n`Identification`,\n`Source`, and\n`Column Mapping`\nsections. Figure\
    \ [3-41](#335103_3_En_3_Chapter.xhtml#Fig41) shows these\nsections for the series\
    \ created for `Salary Info`.\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig41_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig41_HTML.jpg)\n\
    \nFigure 3-41\nSpecifying a series for the Salary Info chart"
