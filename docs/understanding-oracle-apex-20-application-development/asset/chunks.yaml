    ## 日期格式掩码


    `HIREDATE`的掩码创建方式类似。对各种日期格式掩码的检查表明，`DD`表示日期，`Mon`是月份的三字母缩写，`YYYY`是四位数的年份。我将这些元素组合起来，创建了所需格式的掩码，如图
    3-32 所示。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig32_HTML.jpg](img/335103_3_En_3_Fig32_HTML.jpg)


    图 3-32

    我为`HIREDATE`设置的格式掩码


    关于格式掩码语法的完整描述，请在 Oracle SQL 文档中搜索“format models”。


    ## 列格式化


    `纯文本`类型的列有一个名为`列格式化`的部分，其中包含一个名为`HTML 表达式`的属性。此属性允许您通过将列值包装在 HTML 表达式中来对其进行格式化。有关示例，请回顾图
    3-24 中已格式化的`ENAME`列。每个员工的名字都以大号粗体显示，其后是该员工的职位。图 3-33 显示了与此格式对应的 HTML 表达式。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig33_HTML.jpg](img/335103_3_En_3_Fig33_HTML.jpg)


    图 3-33

    格式化`ENAME`列


    这个表达式需要一些解释。首先，考虑一下您会为名为`FORD`的员工编写什么样的 HTML 表达式。要使名字变成大号粗体，可以将其放在`<b><big></big></b>`标签内。生成的表达式如下所示：


    ```

    <b><big>FORD</big></b> the ANALYST

    ```


    这个表达式几乎就是`HTML 表达式`值应有的样子——唯一的区别是员工的姓名和职位需要根据报表的每一行而变化。APEX 通过以下约定使其成为可能：对于名为`X`的列，术语`#X#`表示当前行中`X`的值。因此，您应该将上述表达式中的`FORD`替换为`#ENAME#`，将`ANALYST`替换为`#JOB#`，从而得到图
    3-33 中的表达式：


    ```

    <b><big>#ENAME#</big></b> the #JOB#

    ```


    请注意，表达式`#JOB#`是有意义的，即使`JOB`列在报表中不可见。实际上，在报表中设置不可见列的常见原因之一，就是为了能在报表的其他地方使用它们的值。


    ## 链接列


    图 3-24 中的`HIREDATE`值被格式化为链接。具体来说，点击一个雇佣日期（例如`Dec 03, 1981`）会将浏览器重定向到 URL [`http://www.infoplease.com/year/1981.html`](http://www.infoplease.com/year/1981.html)，该页面提供了当年的时事信息。


    实现此功能的一种方法是用适当的 HTML 表达式包装雇佣日期。例如，1981 年 12 月 3 日的链接将是：


    ```

    <a href="http://www.infoplease.com/year/1981.html" target="_blank">#HIREDATE#</a>

    ```


    请注意，`<a>`标签的第二个参数是`target="_blank"``。这个参数导致目标页面在新的浏览器标签页中打开，这在本例中似乎是合理的。这个 HTML
    表达式的问题在于，无论雇佣日期是什么，它总是重定向到 1981 年的页面。我们需要一种方法从雇佣日期中提取雇佣年份，不幸的是，这在 HTML 中无法实现。


    然而，在 SQL 查询中提取年份是可行的。思路是让 SQL 源查询计算一个新列，其值为雇佣年份。以下查询可以完成这项工作：


    ```sql

    select e.*, extract(year from e.HireDate) as HireYear

    from EMP e

    ```


    使用这个新的源查询的一个结果是，`HIREYEAR`现在将成为报表的一列。由于您不希望它在报表中显示，您应该将其类型设置为`隐藏列`。


    将`格式化报表`区域的源修改为此查询后，您可以通过在其`HTML 表达式`属性中使用`#HIREYEAR#`来格式化`HIREDATE`列，如下所示：


    ```

    <a href="http://www.infoplease.com/year/#HIREYEAR#.html" target="_blank">#HIREDATE#</a>

    ```


    尽管此技术有效，但将列格式化为链接的更好方法是将其`类型`属性设置为`链接`。这样做会使属性编辑器显示一个`链接`部分。此部分包含`目标`属性，其初始值为`未定义链接目标`。点击该值会打开一个模态的`链接生成器`页面，在其中您可以指定目标是
    APEX 应用程序的页面还是任意 URL。在本例中，选择`URL`并在出现的文本框中输入目标 URL，如图 3-34 所示。然后单击确定按钮返回属性编辑器。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig34_HTML.png](img/335103_3_En_3_Fig34_HTML.png)


    图 3-34

    使用`链接生成器`页面


    然后，您可以在链接部分输入`链接文本和链接属性`的适当值，如图 3-35 所示。请注意，您需要在链接生成器中输入 URL 的“http://”部分，即使`目标`属性不显示它。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig35_HTML.png](img/335103_3_En_3_Fig35_HTML.png)


    图 3-35

    `HIREDATE`列的链接属性


    ## 条件格式化


    回想一下，图 3-24 将超过 2500 的薪资显示为红色。使用`HTML 表达式`属性将`SAL`值格式化为特定颜色是相当容易的。例如，以下表达式使所有薪资值变为红色：


    ```

    <font color="red">#SAL#</font>

    ```


    但是，如何编写一个表达式使得只有部分值变为红色呢？因为 HTML 本身无法执行计算，您必须再次依赖 SQL 来完成。思路是让 SQL 源查询计算另一个新列，名为`SalColor`，其值为薪资值的颜色。以下是所需的查询（新代码以粗体显示）：


    ```sql

    select e.*, extract(year from e.HireDate) as HireYear,

    case when e.Sal>2500 then ''red'' else ''black'' end as SalColor

    from EMP e

    ```


    将`格式化报表`区域的源更改为使用此查询后，您可以通过将以下代码分配给`SAL`列的`HTML 表达式`属性来格式化该列：


    ```

    <font color="#SALCOLOR#">#SAL#</font>

    ```


    您可以对`OFFSITE`列应用相同的技术。在格式化报表中，`Offsite`值如果其值为**Y**则显示绿色对勾图片，否则显示红色对勾图片。假设这两张图片已保存为
    APEX 应用程序文件`checkgreen.jpg`和`checkred.jpg`。（您可以从 Apress 网站下载这些文件。）那么，值为**Y**时应格式化为以下
    HTML 表达式：


    ```

    <img src="#IMAGE_PREFIX#checkgreen.jpg">

    ```


    值为**N**时应格式化为：


    ```

    <img src="#IMAGE_PREFIX#checkred.jpg">

    ```


    区分这两个文件名的方法是扩展 SQL 源查询，使其计算一个新列，名为`OffsiteImage`，其值为`''checkgreen.jpg''`或`''checkred.jpg''`。SQL
    查询现在如下所示（新代码以粗体显示）：


    ```sql

    select e.*, extract(year from e.HireDate) as HireYear,

    case when e.Sal>2500 then ''red'' else ''black'' end as SalColor,

    case when e.Offsite = ''Y'' then ''checkgreen.jpg''

    else ''checkred.jpg'' end as OffsiteImage

    from EMP e

    ```


    将报表的源更改为该查询后，您可以通过将以下代码分配给`OFFSITE`列的`HTML 表达式`属性来格式化该列：


    ```

    <img src="#IMAGE_PREFIX##OFFSITEIMAGE#">

    ```


    最后，您应该将`SALCOLOR`和`OFFSITEIMAGE`列的类型设置为`隐藏列`。


    ## 报表特定属性


    现在是考虑经典报表特定属性的时候了。这些属性与渲染树中区域的`属性`节点相关联，并处理分页和记录分组等问题。图 3-36 显示了`格式化报表`区域的`布局`和`分页`部分。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig36_HTML.png](img/335103_3_En_3_Fig36_HTML.png)

