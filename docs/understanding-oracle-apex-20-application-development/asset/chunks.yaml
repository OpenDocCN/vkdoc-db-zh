    \    section for the `Previous` button, and\n    set its condition to the SQL\
    \ expression **:P29_PREV is not\n    null**. Configure the `Next` button\n   \
    \ similarly. This causes the buttons to be rendered only when\n    appropriate.\n\
    \nAt this point, your page should be fully functional. If you are like me,\nhowever,\
    \ you will want to change how it looks. This is where\nthe techniques of Chapter\
    \ [5](#335103_3_En_5_Chapter.xhtml) become useful. I invite you to\nexplore different\
    \ item type, layout, and appearance properties. Here is\nwhat I did to get to\
    \ Figure [10-1](#335103_3_En_10_Chapter.xhtml#Fig1):"
