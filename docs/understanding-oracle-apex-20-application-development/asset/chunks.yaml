  trans: '

    # 布局部分


    一个区域的 `Layout`（布局）部分包含指定该区域在其页面上位置的属性。这些属性如图 3-8 所示。

    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig8_HTML.jpg](img/335103_3_En_3_Fig8_HTML.jpg)

    图 3-8

    区域的默认布局部分


    `Parent Region`（父区域）和 `Position`（位置）属性提供了两种不同的方式来指定区域在页面上的位置。这两个属性中只能有一个有值。`Parent
    Region` 有值意味着该区域应位于一个指定的区域（称为其 `parent`，父区域）内。`Position` 有值意味着该区域应位于页面上的一个特定位置。默认情况下，新区域位于
    `Content Body`（内容主体）位置，如图 3-8 所示。您可以通过从其下拉列表中选择来更改位置，如图 3-9 所示。

    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig9_HTML.jpg](img/335103_3_En_3_Fig9_HTML.jpg)

    图 3-9

    可能的区域位置


    这些位置按它们在页面上从上到下的出现顺序列出。大多数位置都有特定的用途。例如，`Content Body` 位置是通用区域的主要放置位置，`Page Navigation`（页面导航）位置用于页面左侧的导航菜单，而
    `Breadcrumb Bar`（面包屑栏）用于面包屑区域。


    注意：其中一些位置（即 `After Header`、`Body 1`、`Body 2`、`Body 3`、`Footer` 和 `Before Footer`）是
    `legacy`（遗留）位置。也就是说，它们仅用于支持使用旧版 APEX 编写的应用程序。新应用程序不应使用它们。


    可能的区域位置集合由页面的 `template`（模板）决定。创建页面时，会为其分配应用程序主题定义的默认模板。例如，`Universal` 主题的默认页面模板称为
    `Standard`。


    可以更改页面的模板。在渲染树中选择页面组件，然后查看 `Appearance`（外观）部分中的 `Page Template`（页面模板）属性。当前，模板设置为
    `Theme Default`（主题默认）。您可以通过点击该属性的选择列表来更改模板。例如，将 `Region Practice`（区域练习）页面的模板更改为
    `Right Side Column`（右侧栏），如图 3-10 所示。

    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig10_HTML.jpg](img/335103_3_En_3_Fig10_HTML.jpg)

    图 3-10

    页面模板选项


    现在选择一个区域（例如 `My Second Region`，我的第二个区域）并重新检查其 `Position` 值列表；您会发现除了图 3-9 中的值外，还有一个值
    `Right Column`（右栏）。将 `My Second Region` 的位置设置为 `Right Column` 并重新运行页面。该区域现在应显示为右侧栏，如图
    3-11 所示。（我为第二个区域的源添加了更多文本以使其更像侧边栏。）请注意，侧边栏区域在其左上角有一个箭头图标。点击该图标可在显示和隐藏侧边栏之间切换。

    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig11_HTML.jpg](img/335103_3_En_3_Fig11_HTML.jpg)

    图 3-11

    向右侧栏添加区域


    `Layout` 部分还有一个 `Sequence`（序列）属性，可以在图 3-8 中看到。如果两个区域位于页面的同一位置，它们的 `Sequence` 值决定了它们在该位置中的放置顺序。区域在创建时按顺序分配序列号，但您只需为
    `Sequence` 分配不同的值即可更改该顺序。例如，`My First Region`（我的第一个区域）和 `My Third Region`（我的第三个区域）都位于
    `Content Body` 位置，序列号分别为 `10` 和 `30`。如果您将 `My Third Region` 的序列号更改为 `5`，则渲染后的页面将类似于图
    3-11，只不过 `My Third Region` 将出现在 `My First Region` 上方。


    尽管尝试将区域放置在页面上的不同位置是很好的，但页面上的大多数区域通常位于同一位置（特别是 `Content Body`）。在这种情况下，`Layout`
    部分的其余属性决定了区域在该位置内的相对位置。


    一个位置中的区域被组织在网格中；每个区域被分配给该网格的一行和一列。APEX 根据区域的序列号来定位它们。第一个区域被放置在网格第一行的第一列。然后，每个后续区域按以下方式之一放置：


    *   与前一个区域位于同一行和同一列（在这种情况下，它显示在前一个区域下方）

    *   在当前行的下一列

    *   在新行的第一列


    `Layout` 部分的 `Start New Row`（开始新行）和 `New Column`（新列）属性允许您指定使用哪个选项。图 3-12 显示了一个被放置在同一行新列中的区域的这些属性。图
    3-8 显示了一个区域开始新行的情况；请注意，在这种情况下，`New Column` 属性是不必要的，因此没有出现。

    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig12_HTML.jpg](img/335103_3_En_3_Fig12_HTML.jpg)

    图 3-12

    指定行和列的区域定位


    在将每个区域分配给一行和一列之后，APEX 会确定这些区域内位置中的大小和位置。为此，APEX 使用 `Column`（列）和 `Column Span`（列跨度）属性的值（如图
    3-12 所示）来确定行中每个区域的偏移量和宽度。


    `Column` 属性指定区域在其行内的偏移量。APEX 将一个位置的宽度划分为 12 个“网格点”；`Column` 的值是一个从 1 到 12 的数字，表示其中一个点。值为
    `1` 表示区域从位置的极左侧开始；值为 `7` 表示区域从位置的中心开始。`Column Span` 属性指定列的宽度。其值也是一个从 1 到 12 的数字，表示以网格点为单位的宽度。


    例如，图 3-13 显示了 `Region Practice` 区域的另一种配置。以下是如何从图 3-11 开始创建该配置：首先将页面模板改回 `Theme
    Default`，将 `My Second Region` 移回 `Content Body` 位置与其他区域在一起，并将 `My Third Region`
    的序列号设为最小。然后按如下方式设置它们的 `Grid`（网格）属性：

    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig13_HTML.png](img/335103_3_En_3_Fig13_HTML.png)

    图 3-13

    显示 Region Practice 区域的另一种方式


    *   `My Third Region` 开始一个新行，其 `Column` 值为 `3`，`Column Span` 值为 `8`。也就是说，其宽度是位置宽度的三分之二，并且居中显示。

    '
- fmt: '### Appearance Section


    图 [3-10](#335103_3_En_3_Chapter.xhtml#Fig10) 展示了页面的 `Appearance` 部分，其属性允许你配置页面的模板。类似地，每个区域也有一个模板，该模板由区域
    `Appearance` 部分中的 `Template` 属性指定。图 [3-14](#335103_3_En_3_Chapter.xhtml#Fig14)
    展示了该属性的各种可选值。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig14_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig14_HTML.jpg)


    图 3-14


    区域 `Template` 属性的选项


    最常见的是 `Standard` 模板，它在顶部的边框中显示区域的标题。其他许多模板都有特殊用途，例如 `Alert`、`Inline Dialog`、`Login`、`Title
    Bar` 和 `Wizard Container`。


    `Collapsible` 模板与 `Standard` 类似，只是在左上角增加了一个小按钮。点击该按钮可以在隐藏区域主体和显示区域主体之间切换。使用 `Buttons
    Container` 或 `Blank with Attributes` 模板的区域没有标题；这两个模板的主要区别在于按钮区域有边框，而空白区域没有。


    ## 拖放操作


    将注意力转向页面设计器的中间面板，特别是 `Layout` 选项卡。点击此选项卡会使中间面板显示页面内容的样式化表示。该面板有一个与每个区域位置对应的区域，每个区域包含分配给该位置的区域的表示。


    例如，考虑图 [3-13](#335103_3_En_3_Chapter.xhtml#Fig13) 中所示的 `Region Practice` 页面；其网格布局如图
    [3-15](#335103_3_En_3_Chapter.xhtml#Fig15) 所示。从中你可以看到 `Content Body` 位置中的三个区域，它们的显示方式与页面呈现时的大致相同。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig15_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig15_HTML.jpg)


    图 3-15


    页面布局区域


    网格布局在设计时为你提供了渲染页面布局的视觉近似。当你更改区域的 `Position` 和 `Layout` 属性值时，网格布局也会相应改变。


    如果在网格布局中点击区域的标题栏，该区域的属性将出现在属性编辑器中。你还可以将区域拖动到网格布局上的其他位置。拖动时，可用位置会以黄色高亮显示，这些区域内的放置点会由一个轮廓矩形指示。你可以将区域放置到空位置、另一个区域的
    `Sub Regions` 部分（使该区域成为另一个区域的子区域），或者另一个区域的上方、下方、左侧或右侧（将该区域添加到该位置的网格中）。当你这样做时，你会看到区域的
    `Layout` 属性相应地发生变化。


    在页面设计器中下部中央区域，网格布局下方，有一个称为 `gallery` 的区域。该区域默认最小化。要展开它，请点击网格布局底部中间的手柄。你可以使用此区域通过拖放来创建页面组件。具体来说，点击图库的
    `Regions` 按钮将显示每种可能区域类型的图标，如图 [3-16](#335103_3_En_3_Chapter.xhtml#Fig16) 所示。要创建特定类型的区域，请点击其图标并将其拖到网格布局上的所需位置。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig16_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig16_HTML.jpg)


    图 3-16


    区域图库


    使用图库是创建区域的一种便捷方式，额外的好处是 APEX 会自动为其类型和位置属性分配适当的值。但一旦创建，这样的区域就与其他任何区域相同。特别是，区域的属性（包括其类型和位置）可以随时修改，不受限制，无论它是如何创建的。


    ## 静态内容区域


    一个 `static content region` 可以显示文本或格式化的 HTML 代码。APEX 屏幕包含几个静态区域的示例。例如，再次考虑图 [1-3](#335103_3_En_1_Chapter.xhtml#Fig3)
    中的 SQL Workshop 主屏幕。页面右侧标题为 `About` 的区域是一个静态内容区域，其源是显示的文本。源中包含 HTML 标签，使 `Learn
    More...` 被格式化为一个链接。


    你可以对你的演示应用程序做类似的事情。让我们充实主页，使其包含四个静态内容区域。图 [3-17](#335103_3_En_3_Chapter.xhtml#Fig17)
    展示了页面的最终样子。本节的目标是学习创建此页面所需的概念。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig17_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig17_HTML.jpg)


    图 3-17


    包含四个静态内容区域的主页（照片由美国国会图书馆印刷品与照片部提供，编号 LC-H261-4562）


    第一步是在分配任何内容之前在页面上创建并定位这些区域。为此，请执行以下任务：


    *   转到主页的页面设计器并创建四个新区域。这些区域默认类型将是 `Static Content`，这正是你想要的。

    *   依次将标题 `Demo Application`、`Sample Database`、`References` 和 `Quick Link` 分配给这些区域。

    *   将区域放置在 `Content Body` 位置，并使用它们的 `Layout` 属性指定其在页面上的位置。具体来说，`Demo Application`
    和 `Sample Database` 区域开始新行，其他两个区域开始新列。`Sample Database`、`References` 和 `Quick
    Link` 区域的列跨度应分别为 5、3 和 4。


    此时，你可以运行你的主页并验证其是否具有预期的结构。页面应如图 [3-18](#335103_3_En_3_Chapter.xhtml#Fig18) 所示。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig18_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig18_HTML.jpg)


    图 3-18


    主页的结构


    下一步是向这些区域添加内容。以下各节将讨论相关问题。'
  raw: '*   `My First Region` starts a new row, its `Column` value is `1`, and the
    `Column Span` value is `4`. Thus, its width is one-third the size of the position
    and left justified.


    *   `My Second Region` does not start a new row. Its `Column` value is `9`, and
    the `Column Span` value is `4`. Thus, its width is also one-third the size of
    the position, but right justified.


    If you do not need such fine control over the placement of the regions in a row,
    you can assign the `Automatic` value to their `Column` and `Column Span` properties
    (as in Figure [3-8](#335103_3_En_3_Chapter.xhtml#Fig8)). In this case, APEX will
    place the regions in the row according to its best judgment.


    ### Appearance Section


    Figure [3-10](#335103_3_En_3_Chapter.xhtml#Fig10) showed the `Appearance` section
    for a page, whose properties allow you to configure the page’s template. Similarly,
    each region also has a template, which is specified by the `Template` property
    in the region’s `Appearance` section . Figure [3-14](#335103_3_En_3_Chapter.xhtml#Fig14)
    shows the various values for this property.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig14_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig14_HTML.jpg)


    Figure 3-14


    Options for a region’s Template property


    The `Standard` template , which is the most common, displays the region’s title
    in a border across the top. Many of the other templates have special purposes,
    such as `Alert`, `Inline Dialog`, `Login`, `Title Bar`, and `Wizard Container`.


    The `Collapsible` template is similar to `Standard` , with the addition of a small
    button in the top-left corner. Clicking the button toggles between hiding the
    body of the region and displaying it. A region using the `Buttons Container` or
    `Blank with Attributes` template is untitled; the main difference between these
    templates is that a button region has a border, whereas a blank region does not.


    ## Drag and Drop


    Turn your attention to the middle panel of the page designer, and in particular
    the `Layout` tab. Clicking this tab causes the middle panel to display a stylized
    representation of the page’s content. The panel has an area corresponding to each
    region position, and each area contains a representation of the regions assigned
    to that position.


    For example, consider the `Region Practice` page as it appears in Figure [3-13](#335103_3_En_3_Chapter.xhtml#Fig13);
    its grid layout is shown in Figure [3-15](#335103_3_En_3_Chapter.xhtml#Fig15).
    From it, you can see the three regions in the `Content Body` position, displayed
    in approximately the same way that they will be when the page is rendered.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig15_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig15_HTML.jpg)


    Figure 3-15


    Page layout area


    The grid layout gives you a visual approximation of the layout of the rendered
    page while you are designing it. When you change the `Position` and `Layout` property
    values of a region, the grid layout will change accordingly.


    If you click the title bar of a region in the grid layout, the properties for
    that region appear in the property editor. You can also drag a region to another
    location on the grid layout. As you drag, the available positions are highlighted
    in yellow, and drop-off spots within those regions are indicated by an outlined
    rectangle. You can drop a region to an empty position, the `Sub Regions` section
    of another region (so that the region is now a child of the other region), or
    above, below, left, or right of another region (to add the region to that position''s
    grid). As you do so, you will see that the region’s `Layout` properties change
    correspondingly.


    There is an area at the bottom-middle section of the page designer, below the
    grid layout, known as the *gallery*. This area is minimized by default. To expose
    it, click the handle at the bottom middle of the grid layout. You can use this
    area to create page components via drag and drop. In particular, clicking the
    gallery’s `Regions` button will cause it to display an icon for each possible
    region type, as shown in Figure [3-16](#335103_3_En_3_Chapter.xhtml#Fig16). To
    create a region of a specific type, click its icon and drag it to the desired
    position on the grid layout.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig16_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig16_HTML.jpg)


    Figure 3-16


    Region gallery


    This use of the gallery is a convenient way to create a region, with the added
    benefit that APEX assigns appropriate values to its type and location properties
    for you. But once it has been created, such a region becomes the same as any other
    region. In particular, a region''s properties (including its type and location)
    can be modified at any time, without restriction, regardless of how it was created.


    ## Static Content Regions


    A *static content region* can display text or formatted HTML code. The APEX screens
    contain several examples of static regions. For example, consider once again the
    SQL Workshop home screen from Figure [1-3](#335103_3_En_1_Chapter.xhtml#Fig3).
    The region titled `About` on the right side of the page is a static content region
    whose source is the displayed text. The source contains HTML tags that cause `Learn
    More...` to be formatted as a link.


    You can do similar things to your demo application. Let’s beef up the home page
    to contain four static content regions. Figure [3-17](#335103_3_En_3_Chapter.xhtml#Fig17)
    shows what the page will look like. The goal of this section is to learn the concepts
    needed to create this page.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig17_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig17_HTML.jpg)


    Figure 3-17


    Home page with four static content regions (photo courtesy of Library of Congress,
    Prints & Photographs Division, LC-H261-4562)


    The first step is to create and position the regions on the page before you assign
    any content to them. To do so, perform the following tasks:


    *   Go to the page designer for the home page and create four new regions. These
    regions by default will have the type `Static Content`, which is what you want.


    *   Assign the titles `Demo Application`, `Sample Database`, `References`, and
    `Quick Link` to the regions, in that order.


    *   Place the regions in the `Content Body` position, and use their `Layout` properties
    to specify their placement on the page. In particular, the `Demo Application`
    and `Sample Database` regions start new rows, and the other two regions start
    new columns. The `Sample Database`, `References`, and `Quick Link` regions should
    have column spans of 5, 3, and 4, respectively.


    At this point, you can run your home page and verify that it has the intended
    structure. The page should look like Figure [3-18](#335103_3_En_3_Chapter.xhtml#Fig18).


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig18_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig18_HTML.jpg)


    Figure 3-18


    Structure of the home page


    The next step is to add content to these regions. The following sections address
    the relevant issues.'
