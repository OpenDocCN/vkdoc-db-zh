    \ as a Navigation Bar` region to `Menu Bar`, and the\ntemplate of the\n`Navigation\
    \ Menu region` to `Navigation Bar`. For\nfun, you also might want to experiment\
    \ with assigning other templates to\nthese regions, such as `Badge List`, `Media\
    \ List`, and `Tabs`.\n\nFor further customization, several list templates have\
    \ options that can\nbe set via the `Template Options`\nproperty . For\nexample,\
    \ the `References Using Cards` region uses the options shown in Figure [4-18](#335103_3_En_4_Chapter.xhtml#Fig18).\
    \ In general,\nthe best way to understand the purpose of the various template\
    \ options\nis to experiment with them on your regions.\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig18_HTML.png](images/335103_3_En_4_Chapter/335103_3_En_4_Fig18_HTML.png)\n\
    \nFigure 4-18\nOptions for the Cards template\n\nIn addition to choosing a list\
    \ template, recall that you can also\ncustomize a region by choosing a region\
    \ template. (Figure [3-10](#335103_3_En_3_Chapter.xhtml#Fig10) in Chapter [3](#335103_3_En_3_Chapter.xhtml)\
    \ showed the possible templates.)\nThe top three regions of Figure [4-15](#335103_3_En_4_Chapter.xhtml#Fig15)\
    \ use the `Standard`\ntemplate  , which displays a\nheader containing the region\
    \ name. The bottom region uses the `Tabs Container`\ntemplate . This\ntemplate\
    \ displays its contents with no additional border; in fact, it\nlooks a lot like\
    \ a menu bar. This region demonstrates how you can use a\nlist region to mimic\
    \ a menu bar that appears somewhere other than the\ndefault places on the page.\n\
    \nAnother feature of Figure [4-15](#335103_3_En_4_Chapter.xhtml#Fig15) is that\
    \ it\ndoes not display the navigation menu area. You saw earlier how to hide\n\
    the navigation menu on all pages of an application by setting the global\nproperty\
    \ `Navigation Menu List` to `null`. But what if you\nwant the menu hidden on just\
    \ a single page? The answer is to use the\n`Navigation Menu`\nproperties of the\
    \ page, as shown in Figure [4-19](#335103_3_En_4_Chapter.xhtml#Fig19).\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig19_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig19_HTML.jpg)\n\
    \nFigure 4-19\nConfiguring the navigation menu for a single page"
  trans: '

    `导航菜单列表`属性让你指定将作为导航菜单显示的列表。你可以从任何现有列表中选择。例如，选择`References`列表会导致显示如图 4-11 所示的导航菜单。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig11_HTML.jpg](img/335103_3_En_4_Fig11_HTML.jpg)


    图 4-11：`References` 列表现在成为导航菜单


    你也可以选择值`-Select Navigation Menu List-`作为导航菜单。这样做会将`导航菜单列表`属性设置为`null`，这会导致 APEX
    完全不渲染导航菜单区域。


    `位置`属性的值可以是`Side`或`Top`。选择`Top`会告诉 APEX 在页面顶部、导航栏下方渲染导航菜单。它还会导致`列表模板`属性的值变为`Top
    Navigation Menu`。图 4-12 显示了在顶部显示`Desktop Navigation Menu`列表的结果。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig12_HTML.jpg](img/335103_3_En_4_Fig12_HTML.jpg)


    图 4-12：导航菜单现在出现在顶部


    ## 配置导航栏


    图 4-13 展示了`导航栏`属性。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig13_HTML.png](img/335103_3_En_4_Fig13_HTML.png)


    图 4-13：应用程序的导航栏属性


    `导航栏列表`属性让你指定将出现在导航栏中的列表。与导航菜单一样，它可以是任何列表，但不能是`null`。例如，图 4-14 显示了将`Desktop Navigation
    Menu`列表放置在导航栏中的结果。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig14_HTML.jpg](img/335103_3_En_4_Fig14_HTML.jpg)


    图 4-14：导航菜单现在出现在导航栏中


    ## 列表区域


    为了让列表的内容在页面上可见，该列表必须被分配到该页面的某个位置。导航栏和导航菜单的位置是预定义的。如果你希望列表出现在其他任何地方，你必须将其放置在你创建的区域中。该区域的类型应为`列表`，并且其源应为列表的名称。


    例如，图 4-15 展示了`列表练习`页面，这是演示应用程序的第 7 页。该页面包含四个区域，类型均为`列表`。前三个区域以三种不同的方式显示`References`列表，底部未命名的区域则显示`Desktop
    Navigation Menu`列表。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig15_HTML.jpg](img/335103_3_En_4_Fig15_HTML.jpg)


    图 4-15：列表练习页面


    要构建此页面，你应该新建一个页面并向其添加四个新区域。我将这些区域命名为`使用卡片的引用`、`使用链接的引用`、`作为导航栏的引用`和`导航菜单`。第一个区域的列跨度为
    7；第二个区域在新行的同一列开始；另外两个区域则开始新的行。


    将每个区域的类型设置为`列表`。一个`列表`区域的源必须是一个列表。属性编辑器让你从现有列表中选择，如图 4-16 所示。为前三个区域选择`References`列表，为`导航菜单`区域选择`Desktop
    Navigation Menu`列表。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig16_HTML.jpg](img/335103_3_En_4_Fig16_HTML.jpg)


    图 4-16：选择列表区域的源


    此时，你已拥有所需的列表区域，但它们都被格式化为链接。这对于`使用链接的引用`区域是合适的，但其他区域需要不同。要更改列表的显示方式，必须更改其模板。类型为`列表`的区域有一个名为`列表模板`的属性，可以通过在渲染树中选择其`属性`节点并在属性编辑器中查找`外观`部分来访问。图
    4-17 显示了此属性的可能值。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig17_HTML.png](img/335103_3_En_4_Fig17_HTML.png)


    图 4-17：可能的列表模板值


    要生成图 4-15 所示的页面，你应该将`使用卡片的引用`区域的模板设置为`卡片`，将`作为导航栏的引用`区域的模板设置为`菜单栏`，并将`导航菜单`区域的模板设置为`导航栏`。为了有趣，你也可以尝试将其他模板分配给这些区域，例如`徽章列表`、`媒体列表`和`选项卡`。


    为了进一步自定义，一些列表模板具有可通过`模板选项`属性设置的选项。例如，`使用卡片的引用`区域使用了图 4-18 所示的选项。通常，理解各种模板选项用途的最佳方法是在你的区域上进行实验。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig18_HTML.png](img/335103_3_En_4_Fig18_HTML.png)


    图 4-18：卡片模板的选项


    除了选择列表模板，还记得你也可以通过选择区域模板来自定义区域。（第 3 章的图 3-10 展示了可能的模板。）图 4-15 的前三个区域使用了`标准`模板，该模板显示一个包含区域名称的标题。底部区域使用了`选项卡容器`模板。该模板在没有额外边框的情况下显示其内容；实际上，它看起来很像一个菜单栏。这个区域展示了如何使用列表区域来模拟出现在页面默认位置之外的菜单栏。


    图 4-15 的另一个特点是它没有显示导航菜单区域。你之前已经看到了如何通过将全局属性`导航菜单列表`设置为`null`来隐藏应用程序所有页面的导航菜单。但如果你只想在单个页面上隐藏菜单呢？答案是使用页面的`导航菜单`属性，如图
    4-19 所示。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig19_HTML.jpg](img/335103_3_En_4_Fig19_HTML.jpg)


    图 4-19：为单个页面配置导航菜单

