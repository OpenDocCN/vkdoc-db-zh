    # 验证


    无论您选择哪种验证类型，属性编辑器都会显示指定验证所需的属性。例如，`PL/SQL Expression` 类型有一个对应的文本区域用于输入表达式，这在图
    8-7 中可以部分看到。`Rows returned` 或 `No Rows returned` 验证有一个用于指定查询的文本区域。验证可以有条件地执行，这由其
    `Server-side Condition` 属性决定。通常，验证以按钮为条件，因此您可以使用 `When Button Pressed` 属性，但也可以通过选择
    `Type` 属性来指定任意条件。


    每个验证都必须有一个指定的错误消息。`Error` 部分包含相关属性。`Error Message` 属性包含错误消息的文本。`Display Location`
    指定消息将显示的位置：在错误通知中、在指定项目下方，或两者兼而有之。


    为了说明这些概念，让我们为本节开头提到的问题编写验证。图 8-8 显示了名为 `DontDeleteThePresident` 的验证的属性，该验证用于验证总统记录不被删除。此验证的类型为
    `No Rows returned`，其查询为：


    ```sql

    select * from EMP

    where EmpNo = :P19_DELETE_EMPNO

    and Job = ''PRESIDENT''

    ```


    此查询仅在所选员工的工作为 `PRESIDENT` 时才会返回一条记录，这意味着如果所选员工的工作不是 `PRESIDENT`，则验证将成功。


    ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig8_HTML.jpg](img/335103_3_En_8_Fig8_HTML.jpg)


    图 8-8 DontDeleteThePresident 验证


    类似地，您可以使用以下 `No Rows returned` 查询来编写验证 `InsertedSalaryNotTooLarge`，该验证确保 `P19_INSERT_SAL`
    中的值不大于总统的薪水：


    ```sql

    select * from EMP

    where Job = ''PRESIDENT'' and :P19_INSERT_SAL > Sal

    ```


    `DontDeleteThePresident` 验证应用于 `DELETE` 请求，而 `InsertedSalaryNotTooLarge` 应用于 `INSERT`
    请求。您还应该为 `UPDATE` 请求创建两个类似的验证，分别称为 `DontUpdateThePresident` 和 `UpdatedSalaryNotTooLarge`。这些验证的代码被省略了。


    为了验证数据库的更改只在标准工作时间内发生，您可以创建验证 `WorkingHoursOnly`，如图 8-9 所示。


    ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig9_HTML.jpg](img/335103_3_En_8_Fig9_HTML.jpg)


    图 8-9 WorkingHoursOnly 验证


    此验证使用 SQL 表达式来计算所需的时间间隔。请注意，此表达式独立于会话状态，因此错误消息将仅随通知一起显示。该验证以 `Insert`、`Delete`
    和 `Update` 按钮为条件。


    本节的最后一个示例涉及如何强制特定的数字格式。例如，`Sal` 列被定义为 `NUMBER(7,2)` 类型，这意味着工资值总共不超过七位数字，小数点右侧不超过两位数字。验证此条件的最佳方法是使用*正则表达式*，这是一种表示合法值集合的模式。在这种情况下，以下正则表达式将起作用：


    ```regex

    ^\d{0,5}\.{0,1}\d{0,2}$

    ```


    这里不深入探讨正则表达式，您应该知道字符 `^` 匹配字符串的开头，`\d` 匹配任何数字字符，`\.` 匹配小数点，`$` 匹配字符串的结尾。符号 `{m,n}`
    表示至少匹配 *m* 次、最多匹配 *n* 次前面的模式。因此，该正则表达式匹配最多 5 位数字，后跟 0 或 1 个小数点，再后跟 0 到 2 位数字。


    Oracle SQL 有内置函数 `regexp_like`，如果值匹配正则表达式，则返回 `true`。因此，验证可以通过图 8-10 中所示的 SQL
    表达式来定义。


    ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig10_HTML.jpg](img/335103_3_En_8_Fig10_HTML.jpg)


    图 8-10 表达正则表达式验证的一种方式


    APEX 也有 `regular expression` 验证类型，它提供了一个直接输入正则表达式的地方。图 8-11 展示了它的用法。


    ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig11_HTML.jpg](img/335103_3_En_8_Fig11_HTML.jpg)


    图 8-11 表达正则表达式验证的另一种方式


    # 约束验证


    本章开头讨论了 APEX 属性如何帮助强制执行约束。然而，在有些情况下这些属性并不足够。例如，图 8-2 展示了如何使用项目的 `Value Required`
    属性来强制执行 `null` 值约束。但是，如果页面包含多个区域，每个区域都有自己的提交按钮，则此技术将无法正常工作。`Revised Employee Data
    Entry` 页面就是一个例子。如果 `P19_INSERT_ENAME` 的 `Value Required` 值为 `Yes`，那么即使点击 `Delete`
    或 `Update` 按钮，该限制也会被执行。因此，您将无法在不向 `P19_INSERT_ENAME` 输入虚拟值的情况下删除或更新记录。


    这个问题可以通过使用验证来强制执行 `null` 值约束来解决。该验证将以 `Insert` 按钮为条件，并具有以下 SQL 表达式：


    ```sql

    :P19_INSERT_ENAME is not null

    ```


    您还可以使用验证来验证外键约束。例如，`Revised Employee Data Entry` 页面使用选择列表来限制新员工的可能部门。假设相反，您希望用户在数字字段中输入部门编号。为了强制执行外键约束，您只需确保指定的数字在
    `DEPT` 表中。解决方案是创建一个具有以下 `Rows returned` 查询的验证，该查询以 `Insert` 按钮为条件：


    ```sql

    select * from DEPTNO

    where DeptNo = :P19_INSERT_DEPTNO

    ```


    最后，每当您希望 APEX 显示自定义错误消息时，都应该使用验证。例如，当您尝试为 `EName` 插入 `null` 值时，APEX 会显示标准错误消息“`Fill
    out this field`”，如图 8-2 所示。如果您使用验证来测试约束，它可以显示您想要的任何错误消息，例如“`An employee must have
    a name`”。


    # 过程验证


    第 7 章研究了以下避免丢失数据库更新的算法：在更新操作更改数据库之前，它首先检查相关值是否已更改；如果是，则操作中止。该部分开发的代码通过调用函数 `raise_application_error`
    来中止操作，该函数显示了图 7-10 中的错误消息。鉴于验证提供了一种更简洁的方式来处理错误场景，很自然会想验证是否也可以在这种情况下使用。答案是肯定的。


    回想一下清单 7-10 中 `Update` 按钮的代码。该代码可以分为两部分：第一部分重新读取数据并与原始值进行比较，第二部分根据比较结果执行更新或中止。第一部分本质上是一个验证。第二部分中的更新是一个以验证成功为条件的过程。

