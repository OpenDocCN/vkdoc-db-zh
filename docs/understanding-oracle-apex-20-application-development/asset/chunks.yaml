    ## 插入员工区域


    `Insert Employee`区域包含五个项目和一个按钮。这些项目对应于`EMP`表的列，名称分别为`P17_INSERT_ENAME`、`P17_INSERT_JOB`等。项目`P17_INSERT_ENAME`是一个文本字段，`P17_INSERT_SAL`是一个数字字段。另外三个项目是选择列表，其值通过以下值列表查询定义。


    `P17_INSERT_JOB`的值由以下查询定义：

    ```sql

    select distinct Job as DisplayVal, Job as ResultVal

    from EMP

    ```


    `P17_INSERT_MGR`的值由以下查询定义：

    ```sql

