    # 表单区域


    表单区域与报表区域类似，两者都有一个源查询。它们的区别在于输出记录的显示方式。报表以表格形式一次显示多条输出记录，而表单一次只显示一条记录，每个值位于一个项中。报表是只读的，但表单可以修改数据库。


    回顾第 7 章，`单行视图`页面的`员工信息`区域（参考图 7-17）被用作表单，`单行更新`页面的`插入员工`和`更新/删除员工`区域（参考图 7-24）也是如此。这些区域当时的类型是`静态内容`，并使用
    PL/SQL 代码来实现其功能。本节将介绍`表单`区域类型，并展示如何无需任何 PL/SQL 编码即可实现相同的功能。


    图 10-1 显示了`员工演示`应用程序的第 29 页，标题为`表单视图`。该页面有一个名为`浏览员工`的区域，允许用户一次一条记录地浏览`EMP`表。该区域包含五个项。前四个项显示一个`EMP`记录的四个字段值。选择一个员工姓名会用选定记录中的值填充其他三个项。单击`上一条`（或`下一条`）按钮会移动到表中的上一条（或下一条）记录。第五个项显示字符串`6
    of 14`，指示该记录在表中的位置。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig1_HTML.jpg](img/335103_3_En_10_Fig1_HTML.jpg)


    图 10-1 表单视图页面


    要构建此页面，请创建一个新的空白页面，标题为`表单视图`。然后创建一个名为`浏览员工`的区域，将其类型指定为`表单`，并赋予其如图 10-2 所示的源查询。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig2_HTML.jpg](img/335103_3_En_10_Fig2_HTML.jpg)


    图 10-2 浏览员工区域的源


    当您创建`表单`区域时，APEX 会自动为其创建一个关联的渲染过程，并为源查询中的每一列创建一个项。图 10-3 显示了创建`浏览员工`区域并设置其源之后的渲染树。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig3_HTML.jpg](img/335103_3_En_10_Fig3_HTML.jpg)


    图 10-3 表单区域的渲染树


    每个项的名称和类型取自相应的列定义。例如，对应于列`EmpNo`的项被命名为`P29_EMPNO`，其类型为`数字字段`。字符字段的项类型为`文本字段`，日期字段的类型为`日期选择器`，依此类推。


    项的`源`部分包含指定项与其列之间对应关系的属性。图 10-4 显示了`P29_EMPNO`的`源`部分。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig4_HTML.jpg](img/335103_3_En_10_Fig4_HTML.jpg)


    图 10-4 表单项的源属性


    这些项及其属性值是在您指定表单区域的源时为您创建的。但是，有一个属性值您必须自己指定，那就是图 10-4 中显示的`主键`属性。随表单提供的渲染过程需要知道哪个项对应于主键。因此，您应该为`P29_EMPNO`开启`主键`属性。如果您忘记指定主键项，APEX
    将显示错误消息提醒您。


    现在您可以运行该页面了。图 10-5 显示了显示的内容。诚然，这并不十分令人印象深刻。要使此表单能够执行任何操作，您需要利用其渲染过程。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig5_HTML.jpg](img/335103_3_En_10_Fig5_HTML.jpg)


    图 10-5 默认表单区域


    图 10-6 显示了该渲染过程的`标识`部分。该过程的默认名称是`初始化表单 P`，其中`P`是页面名称。该过程的类型是`表单初始化`，这表明其目的是初始化表单的项。实际上，初始化过程的功能类似于清单
    7-9 中的`GetEmpInfo`过程。如果页面渲染时`P29_EMPNO`的会话状态值不为空，则该过程将获取具有该员工编号的 EMP 记录，并用其初始化其他项。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig6_HTML.jpg](img/335103_3_En_10_Fig6_HTML.jpg)


    图 10-6 初始化过程的标识属性


    然而，表单区域没有为您提供将`P29_EMPNO`的值放入会话状态的方法；您需要自己实现一种方法。我采用的方法是，将`P29_EMPNO`的类型更改为选择列表，其值列表查询是：


    ```

    select EName, EmpNo

    from EMP

    order by EName

    ```


    然后，我将选择列表的操作设置为`重定向并设置值`。因此，当从列表中选择员工姓名时，相应的员工编号将被分配给项`P29_EMPNO`。您应在您的页面中验证这一点。从列表中选择一个员工姓名，观察相应的员工值出现在各个项中。


    初始化过程还包含上一条/下一条功能。其工作原理与图 7-18 中的`FindPreviousNext`过程相同，并增加了跟踪记录在表中位置的功能。要配置它，您需要执行以下步骤：


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig7_HTML.jpg](img/335103_3_En_10_Fig7_HTML.jpg)


    图 10-7 配置表单的初始化过程


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig8_HTML.jpg](img/335103_3_En_10_Fig8_HTML.jpg)


    图 10-8 配置“上一条”按钮的操作


    *   创建两个隐藏项来保存上一个和下一个员工编号。我将这些项命名为`P29_PREV`和`P29_NEXT`。

    *   创建一个文本字段项来保存显示当前记录位置的字符串。我将此项命名为`P29_COUNT`。

    *   转到初始化过程的`设置`部分，并如图 10-7 所示设置其`下一个主键项`、`上一个主键项`和`当前行/总计项`属性。

    *   创建两个按钮，分别称为`上一条`和`下一条`。`上一条`按钮应重定向，将`P29_EMPNO`的值设置为`&P29_PREV.`，如图 10-8 所示。类似地配置`下一条`按钮。

    *   （可选）转到`上一条`按钮的`服务器端条件`部分，并将其条件设置为 SQL 表达式`：P29_PREV is not null`。类似地配置`下一条`按钮。这会使按钮仅在适当的时候被渲染。


    至此，您的页面应该已完全可用。但是，如果您像我一样，您会希望更改它的外观。这时第 5 章的技术就派上用场了。我邀请您探索不同的项类型、布局和外观属性。以下是我为达到图
    10-1 效果所做的工作：

    '
- fmt: '# 表单更新


    表单也可以利用其项值来更改数据库。`Employee Demo`应用程序的第30页将阐述相关问题。此页面名为**Form Update**，如图[10-9](#335103_3_En_10_Chapter.xhtml#Fig9)所示。该页面包含两个表单区域：一个用于删除/修改现有记录，另一个用于插入新记录。以下小节将分别讨论这两个区域。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig9_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig9_HTML.jpg)


    图10-9  “Form Update”页面


    ## 更新记录


    `Update Employees`区域的工作原理如下：用户从选择列表中选择一名员工。该员工的`EMP`记录将被提取，其值用于初始化该区域的各项。随后，用户可以根据需要修改项值。点击`Update`按钮将使用这些值修改该记录。点击`Delete`按钮将删除该记录。


    要创建此区域，首先创建一个新的空白页面，命名为`Form Update`，页面编号为30。然后创建一个类型为`Form`的新区域，并将其命名为`Update
    Employees`。将源设置为SQL查询：


    ```sql

    select EmpNo, Job, Sal, DeptNo

    from EMP

    ```


    查看生成的渲染树。APEX已为查询中的每个字段创建了一个项，以及一个初始化过程。这与你在`Form View`页面中遇到的情况相同。趁还没忘记，请转到`P30_EMPNO`的`Source`属性（如图[10-4](#335103_3_En_10_Chapter.xhtml#Fig4)所示），并开启其`Primary
    Key`属性。


    现在，你需要自定义表单以匹配图[10-9](#335103_3_En_10_Chapter.xhtml#Fig9)。具体而言，将`P30_EMPNO`的模板更改为`Optional`，将其他三个项的模板更改为`Optional-Above`。将`P30_EMPNO`、`P30_JOB`和`P30_DEPTNO`的类型更改为`Select
    List`。`P30_EMPNO`的值列表查询应为：


    ```sql

    select EName, EmpNo

    from EMP

    ```


    `P30_JOB`的查询应为：


    ```sql

    select distinct Job as DisplayVal, Job as ResultVal

    from EMP

    ```


    而`P30_DEPTNO`的查询应为：


    ```sql

    select DName, DeptNo

    from DEPT

    ```


    你还需要创建两个按钮，分别命名为`Delete`和`Update`。它们的位置是`Edit`，操作是`Submit`。此时，你的表单应能成功检索所选员工的信息。你剩下的任务是让按钮执行预期的数据库修改操作。这结果出乎意料地简单。


    表单区域修改数据库的能力默认是禁用的。要启用它，请转到表单区域的渲染树，点击其`Attributes`节点，并查看`Edit`部分中的`Enabled`属性。默认情况下，此属性是关闭的。当你开启它时，将显示其他属性，如图[10-10](#335103_3_En_10_Chapter.xhtml#Fig10)所示。这些复选框允许你指定该区域应允许哪些编辑操作。`Update
    Employees`区域执行更新和删除操作，因此你应确保只勾选了`Update Row`和`Delete Row`。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig10_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig10_HTML.jpg)


    图10-10 表单区域的编辑属性


    顺便提一下，请注意图[10-10](#335103_3_En_10_Chapter.xhtml#Fig10)底部的`Lost Update Type`属性。此属性允许你指定进程应如何实现丢失更新检测。其默认值为`Row
    Values`，这对应于清单[7-10](#335103_3_En_7_Chapter.xhtml#PC10)中的丢失更新检测算法。


    当你在表单区域中启用编辑时，APEX会在`Processing`选项卡中添加一个进程。此进程的类型为`Form-Automatic Row Processing
    (DML)`，被称为*ARP进程*。该进程的默认名称是`Process form R`，其中`R`是表单区域的名称。图[10-11](#335103_3_En_10_Chapter.xhtml#Fig11)显示了`Update
    Employees`进程的`Identification`属性。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig11_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig11_HTML.jpg)


    图10-11 ARP进程属性


    ARP进程可以响应提交操作执行插入、删除或更新操作。但给定一个特定的提交请求，它如何知道要执行哪个操作呢？


    期望的操作是由发出请求的按钮的`Behavior`属性决定的。图[10-12](#335103_3_En_10_Chapter.xhtml#Fig12)显示了`Update`按钮的这些属性。`Database
    Action`属性指定了要执行三个操作中的哪一个。在图中，该值是`SQL UPDATE action`。`Delete`按钮的规范类似——其`Action`值应为`Submit
    Page`，其`Database Action`值应为`SQL DELETE action`。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig12_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig12_HTML.jpg)


    图10-12 配置“Update”按钮的行为


    ARP进程可以有条件地执行，就像任何其他进程一样。`Update Employees`区域的ARP进程应在点击`Update`或`Delete`按钮时触发。图[10-13](#335103_3_En_10_Chapter.xhtml#Fig13)显示了其`Server-side
    Condition`属性，其中指定的SQL表达式是：


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig13_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig13_HTML.jpg)


    图10-13 指定进程的条件


    ```sql

    :REQUEST = ''Update'' or :REQUEST = ''Delete''

    ```'
