    幸运的是，有一个简单的方法可以避免这个问题。通过将文本字段的 `Maximum Length` 属性设置为 `50`，你可以保证文本字段无法容纳超过 50
    个字符。如果用户尝试在文本字段中输入过多字符，APEX 将忽略多余的字符。


    类似地，如果用户尝试为 `Sal` 或 `Comm` 插入非数值，也会发生约束违反。这个问题可以通过将它们实现为数字字段来避免。如果在页面提交时数字字段包含非数值，APEX
    将捕获错误并生成错误消息，而不是由数据库生成。图 8-5 和 8-6 显示了尝试插入具有非数字薪水的新记录时产生的错误消息。在图 8-5 中，我将项目 `P19_INSERT_SAL`
    更改为文本字段，因此约束错误由数据库捕获。在图 8-6 中，项目是一个数字字段，这允许 APEX 捕获错误。请注意，APEX 生成的错误消息要好得多。


    ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig6_HTML.jpg](img/335103_3_En_8_Fig6_HTML.jpg)


    ### 图 8-6

    APEX 为无效数字输入生成的错误消息


    ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig5_HTML.jpg](img/335103_3_En_8_Fig5_HTML.jpg)


    ### 图 8-5

    数据库为无效数字输入生成的错误消息


    虽然数字字段可以检查非数字输入，但它无法检查特定类型的数字。原因是 SQL 对于不准确的数字输入非常宽容。例如，清单 8-2 中的 SQL 命令是完全合法的。


    ```sql

    insert into EMP (EmpNo, DeptNo, Sal,

    EName, Job, Mgr, HireDate, Comm,  Offsite)

    values (8090.4, 29.6, 130.678,

    ''FRANK'', ''SALES'', 7839, current_date, 0, ''N'')

    ```

    **清单 8-2**

    不合适但合法的 SQL 命令


    `EmpNo`、`DeptNo` 和 `Sal`（加粗）的指定值是有问题的，因为 `EmpNo` 和 `DeptNo` 列被定义为整数，而 `Sal` 被定义为小数点后最多两位数字。然而，当
    Oracle 被要求将一个值存储到超过该列精度的数值列时，它会先将该值四舍五入到最近的合法值，然后再保存。（一些数据库系统改为截断该值。）因此，前面的插入命令创建了一个新员工，员工号为
    8090，部门为 30，薪水为 130.68。同样，在 `Revised Employee Data Entry` 页面中，如果用户输入 `130.678`
    作为新记录的薪水值，APEX 将顺利处理输入，而不会产生约束错误。


    # 输入验证


    让我们重新思考 APEX 处理数字输入的方式。它的行为在技术上是正确的，但相当误导人。很可能用户输入带有小数点后超过两位数字的薪水，要么是打错了字（比如输入了
    `130.678` 而不是 `1306.78`），要么是不理解该字段的目的。无论哪种情况，如果 APEX 告知用户问题所在，而不是做出可能不正确的假设，那将会更好。


    通常，你希望 APEX 阻止用户输入不合适的值，即使它们是合法的。这里是 `Revised Employee Data Entry` 页面的三个更多例子：


    *   用户不应能够删除或修改职位为 `PRESIDENT` 的员工的记录。（假设此功能以其他方式执行。）

    *   用户不应能够输入高于总裁薪水的工资。

    *   对数据库的更改只应在上午 9 点到下午 5 点之间进行。


    APEX 应拒绝违反这些条件的请求，并告知用户该请求为何不合适。


    强制执行这些有效性检查的方法是在 APEX 中创建一个 *验证*。验证是在页面提交时执行的代码。如果验证失败，提交处理将停止，并且页面会重新显示，每个失败的验证都会有一条错误消息。如果所有验证都成功，则提交处理正常继续。


    要创建验证，请转到页面设计器的 `Processing` 选项卡，右键单击 `Validating` 节点，然后选择 `Create Validation`。APEX
    将创建一个名为 `New` 的默认验证，类型为 `PL/SQL Expression`。


    图 8-7 显示了一些可能的验证类型。`PL/SQL Expression` 验证在指定的 PL/SQL 表达式返回 `true` 时成功，`SQL Expression`
    验证同样如此。另外两个有用的验证类型是 `Rows returned` 和 `No Rows returned`。你通过一个 SQL 查询来指定这些验证。`Rows
    returned` 验证在查询至少返回一行时成功；`No Rows returned` 验证在查询不返回任何行时成功。


    ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig7_HTML.jpg](img/335103_3_En_8_Fig7_HTML.jpg)


    ### 图 8-7

    一些验证类型

