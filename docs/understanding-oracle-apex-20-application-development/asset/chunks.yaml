    Employees by Department 页面


    回想一下，当您点击 `Click for Details` 链接时，会发生重定向，设置 `P12_DEPTNO` 和 `P12_DNAME` 的会话状态值，然后页面会重新渲染。代码清单
    13-11 显示了点击 `ACCOUNTING` 对应的链接所产生的旧版 URL，假设会话 ID 是 98765。（为了节省空间，我省略了 URL 的通用前缀。）


    ```

    f?p=91392:12:98765::::P12_DEPTNO,P12_DNAME:10,ACCOUNTING

    代码清单 13-11

    Employees by Department 页面的 URL

    ```


    此清单说明了 URL 第七个和第八个参数的用途。第七个参数是一个逗号分隔的列表，包含了要设置其值的项（`P12_DEPTNO` 和 `P12_DNAME`），而第八个参数是这些项将被设置成的值的列表（`10`
    和 `ACCOUNTING`）。


    ### GET 与 POST

    浏览器向 Web 服务器发出的请求可以是不同类型。最常见的两种类型是 GET 和 POST，它们在向服务器传递信息的方式上有所不同。POST 请求将信息放置在请求数据包内的一个特定区域。而
    GET 请求则通过其 URL 将信息传递给服务器。

    在 APEX 中，POST 请求由提交操作发出。为了处理一个提交，浏览器提取页面项的值，将它们打包到 POST 请求中，然后将其发送到服务器。服务器随后使用这些值来更改会话状态。如果您想验证这一点，请转到任何带有提交按钮的页面（例如
    `Filter by Job and Department`）。点击提交按钮，并观察 URL 没有改变。这证明了计算的输入不是所提交 URL 的一部分，这也是您无法将提交操作的结果加入书签的原因。

    另一方面，APEX 中的重定向操作发出的是 GET 请求。重定向由多种 APEX 组件执行，例如按钮、基于列表的项、列链接和分支。作为重定向的一部分，APEX
    允许您将会话状态中的指定项设置为特定值。例如，在图 13-22 的 `Employees by Department` 页面中，`Click for Details`
    列链接将 `P12_DEPTNO` 和 `P12_DNAME` 分别设置为当前记录的部门编号和名称。浏览器通过将此信息编码在 URL 内将其发送到服务器，如代码清单
    13-11 所示。

    由于 APEX URL 的结构是众所周知的，一个经过身份验证的用户有可能构造一个 URL，以应用程序开发人员未曾意图的方式访问应用程序。接下来的章节将考虑两种技术。


    ### 页面扫描

    第一种技术称为 **页面扫描**。用户构造一系列 URL 来访问每一个可能的页面，只是为了看看会显示什么页面（如果有的话）。页面扫描的可能性意味着您不能仅仅通过隐藏页面来使其不可访问。例如，考虑图
    13-12 中的 `Change Password` 页面，它是 `Employee Demo` 的第 47 页。在那一节中，您看到了如何通过为其导航菜单项分配授权方案来隐藏该页面。尽管这是一个良好的设计策略，但它并不能使页面不可访问，因为任何用户都可以通过
    URL 访问该页面


    ```

    apex.oracle.com/pls/apex/f?p=91392:47。

    ```'
- fmt: '由于缺乏明确的标题结构，以下根据内容逻辑对文档进行层级划分和格式优化：


    ## 页面扫描与项目修改安全


    由于没有好的方法来消除页面扫描，开发者的唯一对策是使用授权来限制可访问性。换句话说，页面扫描的可能性意味着为每个页面定义授权方案至关重要，无论其在导航菜单中的可见性如何。


    ### 项目修改


    第二种技术，*项目修改*，可用于攻击那些通过 URL 设置项目值的页面。用户获取该页面的现有合法 URL，修改其赋值，并提交修改后的 URL。


    例如，假设公司有第五个部门，其部门编号为 50，名称为 `SECRET`。假设你不希望该部门的成员公开，因此你将图 [13-22](#335103_3_En_13_Chapter.xhtml#Fig22)
    中 `Departments` 报告的数据源设置为排除该部门。不幸的是，很容易使用 URL 修改来获取此隐藏信息。用户只需修改清单 [13-11](#335103_3_En_13_Chapter.xhtml#PC35)
    中的 URL，使其请求第 50 号部门的内容，如下所示：


    ```

    f?p=91392:12:98765::::P12_DEPTNO,P12_DNAME:50,SECRET

    ```


    再举一个例子，考虑图 [10-9](#335103_3_En_10_Chapter.xhtml#Fig9) 的 `Form Update` 页面。图 [13-23](#335103_3_En_13_Chapter.xhtml#Fig23)
    显示了我在 `Choose Employee` 项目中选择 BLAKE 后，其 `Update Employees` 区域的情况。这个名为 `P30_EMPNO`
    的项目执行了一个 `Redirect and Set Value` 操作。重定向操作生成的 URL 是：


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig23_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig23_HTML.jpg)


    **图 13-23** 更新员工区域


    ```

    f?p=91392:30:98765::::P30_EMPNO:7698

    ```


    此 URL 重定向到第 30 页，并将选择列表的会话状态值设置为 7698，即 BLAKE 的员工编号。一旦我理解这一点，我就可以修改此 URL 来检索任何员工的信息。例如，如果我在浏览器中输入相同的
    URL，将最后四个字符改为 `7782`，我将看到员工 CLARK 的信息。


    乍一看，这种修改似乎没什么大不了的。毕竟，我为什么要费力地在 URL 中输入值，而不是使用选择列表来为我完成呢？这项技术的关键在于，无论项目在页面上如何实现，它都有效。


    在图 [13-23](#335103_3_En_13_Chapter.xhtml#Fig23) 中，`P30_EMPNO` 是一个显示所有员工的选择列表。但假设它只显示销售部门的员工，因为应用程序开发人员希望用户只能修改这些员工的记录。这无关紧要，因为我可以通过
    URL 直接输入任何员工号来绕过选择列表。`P30_EMPNO` 的类型是什么，甚至它是否可见，都绝对没有影响。


    项目修改也可以应用于使用提交而非重定向的页面。也就是说，你可以使用项目修改来更改通过 POST 传递且甚至不出现在 URL 中的项目的值。再次考虑图 [6-5](#335103_3_En_6_Chapter.xhtml#Fig5)
    的 `Filter by Job and Department` 页面，它显示在图 [13-24](#335103_3_En_13_Chapter.xhtml#Fig24)
    中。假设你从选择列表中选择了 `Job` 和 `Dept` 值（例如 `CLERK` 和 `RESEARCH`）然后提交。URL 将是：


    ```

    f?p=91392:9:98765:::::

    ```


    也就是说，项目 `P9_JOB` 和 `P9_DEPTNO` 的值不会出现在 URL 中，因为输入是通过 POST 请求发送的。


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig24_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig24_HTML.jpg)


    **图 13-24** 按工作和部门筛选页面


    现在假设我通过向最后两个参数添加项目名和值来修改 URL，如下所示：


    ```

    f?p=91392:9:98765::::P9_JOB,P9_DEPTNO:MANAGER,10.

    ```


    APEX 执行请求的过程如下。它首先通过将项目值从浏览器复制到会话状态来执行提交；然后，它将 URL 中指定的值复制到两个指定的项目中，并呈现页面。因此，页面上选择的
    `P9_JOB` 和 `P9_DEPTNO` 的值将被 URL 中的值覆盖。也就是说，生成的报告将列出会计部门的经理，而不管选择列表中显示的值是什么！


    项目修改的可能性意味着你不能依赖基于列表的项目来对输入数据施加任何类型的限制。这对 SQL 注入和跨站脚本攻击有影响。回想一下，对这些技术的讨论指出，攻击者需要足够长的基于文本的项目进行数据输入，因此建议使用基于列表的项目。然而，攻击者可以使用项目修改直接将攻击代码输入到
    URL 中。因此，除非有办法禁止项目修改，否则使用基于列表的项目无法提供安全性（并且实际上会给人一种虚假的安全感）。


    ### 防范项目修改


    APEX 有一项名为 *页面访问保护* 的功能，其唯一目的是防止项目修改攻击。有多个保护级别。本节将仅讨论最通用的一种：`Arguments Must Have
    Checksum`。它的工作原理如下。


    假设一个页面在此级别受到保护。如果该页面的 URL 分配了项目值，则该 URL 还必须包含这些值的校验和。当 APEX 服务器收到请求时，它会提取参数值，计算它们的校验和，并将其与
    URL 中的校验和进行比较；如果不同，则拒绝该请求。


    其理念是校验和函数只有 APEX 知道。当 APEX 为重定向操作生成 URL 时，它会计算校验和并将其添加到 URL 中。如果用户以任何方式修改了项目值，现有的校验和将不再正确；此外，用户将无法知道如何计算正确的值。同样，用户无法从零开始创建保存项目的
    URL，因为无法确定其校验和。因此，项目修改是不可能的。


    为页面启用页面访问保护有两个步骤。第一步是启用应用程序的 `Session State Protection` 属性。从应用程序的主屏幕开始，单击 `Edit
    Application Properties` 按钮，然后单击 `Security` 选项卡。该属性位于 `Session State Protection`
    部分。很可能，该属性已经启用；如果未启用，请选择 `Enabled`。第二步是转到该页面的页面属性。`Page Access Protection` 属性位于
    `Security` 部分；选择选项 `Arguments Must Have Checksum`。


    作为测试，为 `Employees by Department` 页面设置页面访问保护。然后转到该页面并单击会计部门的链接。你应该看到一个类似以下的 URL：


    ```

    f?p=91392:12:98765::::P12_DEPTNO,P12_DNAME:10,ACCOUNTING&cs=10FzVgvoxRFQBVRnEe9Ww2QSzoVM

    ```


    请注意，此 URL 与清单 [13-11](#335103_3_En_13_Chapter.xhtml#PC35) 中的 URL 相同，只是末尾多了校验和信息。现在尝试对此
    URL 执行项目修改（无论是否更改校验和值）。APEX 会检测到修改，并返回图 [13-25](#335103_3_En_13_Chapter.xhtml#Fig25)
    中显示的错误消息。


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig25_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig25_HTML.jpg)


    **图 13-25** 检测到尝试进行项目修改'
