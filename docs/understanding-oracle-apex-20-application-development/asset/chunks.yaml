    background color, text color, or both. The figure shows the highlighting\ncorresponding\
    \ to Figure [3-24](#335103_3_En_3_Chapter.xhtml#Fig24).\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig59_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig59_HTML.jpg)\n\
    \nFigure 3-59\nHighlight dialog box\n\nRows Per Page\nThe `Rows Per Page` operation\n\
    \ is also in the Format submeu. It allows the user to change the\nreport pagination\
    \ at will. Clicking the menu item displays a submenu in\nwhich the user can choose\
    \ from a list of possible rows per page.\n\nChart\n\nChoosing the `Chart` operation\
    \  brings up a modal\ndialog box that lets the user create charts based on the\
    \ data in the\nreport; see Figure [3-60](#335103_3_En_3_Chapter.xhtml#Fig60).\n\
    \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig60_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig60_HTML.jpg)\n\
    \nFigure 3-60\nChart dialog box\n\nFrom this dialog box, a user can create a single-series\
    \ chart that\naggregates over a single column. The figure specifies a bar chart\
    \ that\ngives the minimum salary per job, similar to the bar chart shown in\n\
    Figure [3-37](#335103_3_En_3_Chapter.xhtml#Fig37). The resulting\nchart appears\
    \ in Figure [3-61](#335103_3_En_3_Chapter.xhtml#Fig61).\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig61_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig61_HTML.jpg)\n\
    \nFigure 3-61\nInteractive chart\n\nThere are two things worth noting in this\n\
    figure. First, many aspects of the chart are not customizable. For\nexample, a\
    \ chart can have only a single series and the color palette is\nfixed. Second,\
    \ the search bar has been extended to include two\nreport/chart buttons to the\
    \ left of the `Action` button. The\nuser can use these buttons to toggle between\
    \ the interactive report and\nits chart.\n\nConfiguring the Search Bar\nThe search\
    \ bar\nhas a lot of functionality. However, not all applications need all the\n\
    functionality. An interactive report region has properties that allow\nthe application\
    \ developer to limit this functionality. This section\nexamines those properties.\n\
    \nFigure [3-62](#335103_3_En_3_Chapter.xhtml#Fig62) shows the\nrendering tree\
    \ for the `Interactive Reports`\npage and its interactive report region `Employees`.\
    \ Note that\nthis tree has the same structure as a classic report (refer to Figure\n\
    [3-25](#335103_3_En_3_Chapter.xhtml#Fig25)), namely, that\nthe `Attributes`\n\
    component contains the report-specific properties and the `Columns` folder\ncontains\
    \ the properties for each column.\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig62_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig62_HTML.jpg)\n\
    \nFigure 3-62\nRendering tree for the Interactive Reports page\n\nThe property\
    \ editor for the `Attributes` node\ncontains two relevant sections: `Search Bar`\
    \ and `Actions Menu`. Figure\n[3-63](#335103_3_En_3_Chapter.xhtml#Fig63) shows\
    \ the\nproperties of the `Search Bar` section.\nThese properties let you selectively\
    \ display different portions of the\nsearch area. For example, turning off the\
    \ `Include Search Bar`\nproperty completely disables the bar, turning off the\
    \ `Search Field` enables\nonly the `Action`\nbutton, and so on.\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig63_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig63_HTML.jpg)\n\
    \nFigure 3-63\nProperties to configure the search area\n\nFigure [3-64](#335103_3_En_3_Chapter.xhtml#Fig64)\
    \ shows the\nfirst several properties of the `Actions Menu` section.\nThese properties\
    \ let you specify which operations are displayed in the\nmenu. (Not all the properties\
    \ are shown due to lack of space.)\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig64_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig64_HTML.jpg)\n\
    \nFigure 3-64\nSome properties of the Actions Menu section\n\nFinally, each column\
    \ of an interactive report has properties for\nconfiguring its specific capabilities.\
    \ These properties appear in the\n`Enable Users To`\nsection of that column and\
    \ are shown in Figure [3-65](#335103_3_En_3_Chapter.xhtml#Fig65). (Again, not\n\
    all properties are shown because of lack of space.)\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig65_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig65_HTML.jpg)\n\
    \nFigure 3-65\nSome properties of a column’s Enable Users To section\n\nLink Column\n\
    \nAn interactive report can display a special column, whose value is a\nlink.\
    \ Clicking this link shows the report in *single row view*.\nThat is, the report\
    \ changes to show the values of only that row; it also\ndisplays navigation buttons\
    \ for the user to move to the next or previous\nrow and a button to return to\
    \ the original report. Figure [3-66](#335103_3_En_3_Chapter.xhtml#Fig66) shows\
    \ the\ninteractive report with the link column displayed. Figure [3-67](#335103_3_En_3_Chapter.xhtml#Fig67)\
    \ shows the\nsingle row view of the report after the link for `BLAKE` is clicked.\n\
    Note that this single row view displays all the columns, not just the\nones displayed\
    \ in the report."
