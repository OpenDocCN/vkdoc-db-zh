    \ a report, similar to a classic\nreport region. The interactive report differs\
    \ in two ways. First, its\nsearch bar enables users to customize the report interactively.\
    \ Second,\nits link column allows users to view the report in single-record mode.\n\
    You examined the functionality provided by these features and compared\nthem with\
    \ what is possible using classic report and chart regions. You\nalso saw how an\
    \ application developer can enable only parts of this\nfunctionality by setting\
    \ the properties of the interactive report\nregion, as desired.\n\n4. Navigation\n\
    \nThe user of a web application should be able to easily navigate\nthrough its\
    \ pages. You have already encountered three navigational\nfeatures in your use\
    \ of APEX: links, breadcrumbs, and the navigation\nmenu. This chapter examines\
    \ these features in detail and shows you\ndifferent ways to use them in your applications.\n\
    \nLists\nIn common parlance, a *list*  is simply a collection\nof things. In APEX,\
    \ however, a list is a collection of links. A list is\na useful navigation tool,\
    \ for the obvious reason that clicking a link\ntakes you to a new page.\nFor a\
    \ good example of an APEX list, consider again the SQL Workshop\nhome screen,\
    \ as shown in Figure [1-3](#335103_3_En_1_Chapter.xhtml#Fig3). Its `Create Object`\
    \ region\nis a list that enables quick access to the various object–creation\n\
    wizard pages. That list has an entry for each kind of SQL object, with\nits link\
    \ taking you to the creation wizard for that object.\nFor another example, recall\
    \ the home page of the `Employee Demo`\napplication, as shown in Figure [3-17](#335103_3_En_3_Chapter.xhtml#Fig17).\
    \ Its `References` region is\na list with links that take you to selected web\
    \ pages.\nPerhaps the most notable example of a list is the navigation menu.\n\
    Each of its entries is a link that takes you to the specified page of\nthe application.\n\
    \nThe APEX *list manager*  lets you view, edit,\nand create lists. To get to the\
    \ list manager, begin at the application’s\nhome screen and click the large `Shared\
    \ Components`\nbutton at the top of the page. Search for the `Navigation` section\n\
    and click `Lists`. You will be\ntaken to the main screen of the list manager,\
    \ which is shown in Figure\n[4-1](#335103_3_En_4_Chapter.xhtml#Fig1).\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig1_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig1_HTML.jpg)\n\
    \nFigure 4-1\nList manager\n\nThe figure shows that the application already has\
    \ two lists: `Desktop Navigation Bar` and `Desktop Navigation Menu`. APEX treats\
    \ these lists in a special way—their\nrespective entries are displayed in the\
    \ navigation bar (which runs\nacross the top of the page) and the navigation menu\
    \ (which runs down the\nleft side of the page).\n\nViewing List Details\n\nClicking\
    \ the name of a list (or selecting the `List Details` \nlink at the top of the\
    \ screen) brings you to the `List Details` screen.\nFigure [4-2](#335103_3_En_4_Chapter.xhtml#Fig2)\
    \ shows this\nscreen for the `Desktop Navigation Menu` list.\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig2_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig2_HTML.jpg)\n\
    \nFigure 4-2\nDetails of the Desktop Navigation Menu list\n\nThe screen displays\
    \ information about each entry in the selected list.\nThe most relevant values\
    \ are `Sequence`, `Name`, and `Target`.\n\n*   The sequence numbers determine\
    \ the order in which the entries\n    appear in the list.\n\n*   The name of an\
    \ entry specifies how it is displayed in the\n    list.\n\n*   The target of an\
    \ entry is the URL that is called when the link is\n    clicked.\n\nNote in the\
    \ figure that each target URL refers to a page of the\ncurrent application, using\
    \ the syntax described in Chapter [2](#335103_3_En_2_Chapter.xhtml). One new aspect\
    \ of that syntax is\nthe string “`&DEBUG.`”, which\nappears as the fifth argument\
    \ to each URL. This portion of the URL\nspecifies that the application should\
    \ continue to use the current debug\nmode (which is an issue of minor concern,\
    \ and is ignored in this\nbook).\n\nEditing List Entries\n\nThe name of each entry\
    \ in the `List Details` screen\nis a link. Clicking the link for an entry takes\
    \ you to a `List Entry` screen, in\nwhich you can edit the entry’s values. Figure\
    \ [4-3](#335103_3_En_4_Chapter.xhtml#Fig3) shows a portion\nof this screen that\
    \ results from clicking the `Region Practice`\nentry.\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig3_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig3_HTML.jpg)\n\
    \nFigure 4-3\nList Entry screen for the Region Practice page"
