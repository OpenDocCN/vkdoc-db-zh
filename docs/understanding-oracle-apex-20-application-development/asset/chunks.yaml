    ## 单行更新


    报表模式/单行模式思想的另一个用途是支持数据录入。`Single Row Update` 页面阐述了这一思想。它是示例应用程序的第 21 页，如图 7-24
    所示。图中的三个区域是同时显示的，但实际上一次只显示一个区域。根据可见区域的不同，页面将处于报表模式、更新模式或插入模式。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig24_HTML.jpg](img/335103_3_En_7_Fig24_HTML.jpg)


    **图 7-24**

    单行更新页面


    最初，页面以报表模式显示 `Employees` 区域。从那里，用户可以点击 `Insert` 按钮进入插入模式，或者点击某个 `Edit` 链接进入更新模式。


    在插入模式下，页面显示 `Insert Employee` 区域。该区域与 `Employee Data Entry` 页面中的相应区域基本相同。它的 `Create`
    按钮创建一个具有指定值的新 `EMP` 记录，然后清除各项的值，为下一次插入做准备。`Cancel` 按钮返回到报表模式。


    在更新模式下，页面显示 `Update/Delete Employee` 区域。该区域的各项最初填充了所选雇员的信息。用户可以更改区域中的项值，然后点击 `Update`
    按钮来更新数据库。或者，点击 `Delete` 按钮会删除所选记录。删除记录后也会返回到报表模式，因为没有记录可再显示。点击 `Cancel` 按钮只是简单地返回到报表模式。


    现在你了解了页面的工作原理，可以考虑如何实现每个区域了。以下小节将探讨这些问题。


    ### 实现报表区域


    报表区域的实现与图 7-17 的 `Single Row View` 页面基本相同。一个区别是它还有一个名为 `P21_MODE` 的隐藏项，用于区分三种模式。该项的值将是
    `Report`、`Insert` 和 `Update`（视情况而定），`null` 值表示报表模式。


    `EmpNo` 列被实现为一个链接。该链接重定向到第 21 页，并在重定向时设置两个项的值：`P21_EMPNO` 设置为所选雇员号，`P21_MODE`
    设置为 `Update`。`Insert` 按钮也会进行重定向，将 `P21_MODE` 设置为 `Insert`。该区域根据以下 SQL 表达式进行条件渲染：


    ```

    :P21_MODE = ‘Report’ or :P21_MODE is null

    ```


    ### 实现插入区域


    一条新的 `EMP` 记录有九个值，但用户只需指定其中五个。`Insert Employee` 区域为这五个值各设置了一个项。这些项被命名为 `P21_INSERT_ENAME`、`P21_INSERT_JOB`
    等。该区域还有两个按钮，分别名为 `Create` 和 `CancelInsert`。区域根据以下 SQL 表达式进行条件渲染：


    ```

    :P21_MODE = ''Insert''

    ```


    `Create` 按钮执行提交操作。它有一个关联的过程，名为 `InsertEmp`，该过程执行两件事：执行一条 SQL 插入命令，并将其项设置为 `null`。它对
    `HireDate`、`Comm` 和 `Office` 使用默认值。其代码见清单 7-19。


    ```

    begin

    insert into EMP(EName, Job, Mgr, Sal, DeptNo, HireDate, Comm, Offsite)

    values (:P21_INSERT_ENAME,

    :P21_INSERT_JOB,

    :P21_INSERT_MGR,

    :P21_INSERT_SAL,

    :P21_INSERT_DEPTNO,

    current_date,  0,  ''N'');

    -- Clear the region''s visible items.

    :P21_INSERT_ENAME   := null;

    :P21_INSERT_JOB     := null;

    :P21_INSERT_MGR     := null;

    :P21_INSERT_SAL     := null;

    :P21_INSERT_DEPTNO  := null;

    -- But do not change the mode.

    end;

    ```

