    Grid Processes

    Each grid region comes with its

    own ARP process, which implements the database modification operations

    for that region. If you want your grid to have additional functionality,

    then you need to create additional processes for it.

    The processes discussed in Chapters [7](#335103_3_En_7_Chapter.xhtml) and [10](#335103_3_En_10_Chapter.xhtml)
    execute once per submit request.

    Processes for an interactive grid, however, need to execute once per

    modified row of the grid. For an example, consider the `LogChanges` process

    from Listing [7-13](#335103_3_En_7_Chapter.xhtml#PC13). That process was used
    in the

    `Revised Employee Data Entry` page—whenever a user clicked the `Delete`, `Insert`,
    or `Update` button, the

    process inserted into the `EMPLOG` table a record

    denoting the request, the user, and the date.


    You can easily re-create this process for the `Interactive Grids`

    page. Figure [11-19](#335103_3_En_11_Chapter.xhtml#Fig19) shows the

    relevant process properties. These property values are exactly the same

    as for the Chapter [7](#335103_3_En_7_Chapter.xhtml) process, except for one—the
    `Editable Region`

    property now has the value `Employees`. This value

    tells APEX that when the process executes, its code should be applied to

    each changed row in the `Employees` grid.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig19_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig19_HTML.jpg)


    Figure 11-19

    The LogChanges process


    Test your process by making some

    changes to the `Employees` grid and

    then looking at the `EMPLOG` table from the

    SQL Workshop. The table should have a record for each modification you

    made. Unfortunately, all the records look the same—the `Request` values are

    either `APEX_AJAX_DISPATCH`

    (if you used the built-in `SAVE` button on the

    toolbar) or `SAVE` (if you used the

    `SAVE` button

    that you wrote for Figure [11-13](#335103_3_En_11_Chapter.xhtml#Fig13)). That
    is

    not good enough; the value of the `Request` field ought

    to be more informative.


    Consequently, let’s revise the process code so that the value of the

    `Request` field

    contains the row status and `EmpNo` value of the

    modified row, as in “`update of 8830`” or

    “`insertion of 8200.`” Listing [11-1](#335103_3_En_11_Chapter.xhtml#PC3) contains
    the

    revised code. Note that it uses `APEX$ROW_STATUS` to

    determine which operation occurred.


    ```

    declare

    v_request varchar(20);

    begin

    case :APEX$ROW_STATUS

    when ''U'' then v_request := ''Update '';

    when ''C'' then v_request := ''Insert '';

    when ''D'' then v_request := ''Delete '';

    end case;

    v_request := v_request || :EMPNO;

    insert into EMPLOG (Request, UserName, RequestDate)

    values (v_request, :APP_USER, sysdate);

    end;

    Listing 11-1

    PL/SQL Code for the Revised LogChange Process

    ```


    Another situation you may encounter is that the grid’s built-in

    database modification code does not do what you want. In this case, APEX

    lets you write your own PL/SQL code to replace it.

    For a simple example, consider the problem of

    inserting a new row into a grid that does not contain all the fields of

    the table. The built-in insertion process will assign null values to the

    missing fields. But what if this isn’t good enough? What if the new

    record needs non-null default values?


    To explore this issue, create a new region in the `Interactive Grids`

    page. Name it `CustomEmps`, give it

    the type `Interactive Grid`, and set its template to `Standard` (so that it

    matches the `Employees by Department` region above it). Its source should be


    ```

    select EmpNo, EName, Job, Sal, DeptNo

    from EMP

    ```


    Don’t forget to turn on the `Primary Key` property

    of the `EMPNO`

    column and turn off its `Validation Required`

    property. Then go to the `Attribute` node’s

    `Edit` section

    and enable editing. Figure [11-20](#335103_3_En_11_Chapter.xhtml#Fig20) shows
    the

    top of the resulting region.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig20_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig20_HTML.jpg)


    Figure 11-20

    The Custom Emps grid region


    The task at hand is to change the region’s insertion code so that

    it places default values into the missing fields. Here is how to do

    it.


    Go to the `Processing` tab of the

    page editor and select the process node named `Custom Emps-Save Interactive Grid
    Data`. This is the built-in ARP process for the `Custom Emps` grid

    region. Figure [11-21](#335103_3_En_11_Chapter.xhtml#Fig21) shows its

    `Identification`

    and `Settings`

    properties. The critical property here is `Target Type` in the

    `Settings`

    section. The default value, `Region Source`, tells

    APEX to use the built-in modification process. To replace it with your

    code, change the property value to `PL/SQL Code`. The

    property editor will display a text box where you can enter the code.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig21_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig21_HTML.jpg)


    Figure 11-21

    Property settings for the grid ARP process


    Your custom PL/SQL code must handle all three modification

    operations, even though you are only changing insertion. Listing [11-2](#335103_3_En_11_Chapter.xhtml#PC5)
    shows my code.

    It uses a case statement to determine the operation that needs to be

    performed. The code for deletion and update are straightforward SQL

    commands, no

    different than what the ARP process would do. The code for insertion

    determines the default values for the four missing columns: the manager

    of a new employee is the president, the hire date is today, initial

    commission is 0, and the employee does not work offsite. The `returning` clause
    at

    the end of the `insert` statement

    causes the newly generated employee number to be saved in the grid’s

    session state.


    Note that your process only needs to handle a single row. APEX will loop

    over the grid, calling your code for each changed row and handling lost

    update detection.


    ```

    begin

    case :APEX$ROW_STATUS

    when ''C'' then

    insert into EMP(EName, Job, Sal, DeptNo,

    Mgr, HireDate, Comm, Offsite)

    values (:ENAME, :JOB, :SAL, :DEPTNO,

    7839, sysdate, 0, ''N'')

    returning EmpNo into :EMPNO;

    when ''U'' then

    update emp

    set EName  = :ENAME,

    Job    = :JOB,

    Sal    = :SAL,

    DeptNo = :DEPTNO

    where EmpNo  = :EMPNO;

    when ''D'' then

    delete emp

    where EmpNo = :EMPNO;

    end case;

    end;

    Listing 11-2

    Custom Interactive Grid Modification Code

    ```'
  trans: "\n## 行保护实战\n\n图 11-18 展示了页面的运行结果。可以看到，`president`（总裁）所在的行变为灰色，表明这些单元格不可编辑。（`Ename`列的单元格变灰是因为图\
    \ 11-15 所示的只读规范。）图中未显示`CLARK`和`KING`的行操作菜单，其中`Delete Row`（删除行）菜单项是灰色的。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig18_HTML.jpg](img/335103_3_En_11_Fig18_HTML.jpg)\n\
    \n**图 11-18** 行保护实战\n\n## 网格进程\n\n每个网格区域都有自己的 ARP 进程，该进程为该区域实现数据库修改操作。如果你希望网格具备额外功能，则需要为其创建额外的进程。\n\
    \n第 7 章和第 10 章讨论的进程在每次提交请求时执行一次。然而，交互式网格的进程需要针对网格中每一行被修改的行执行一次。举个例子，考虑代码清单 7-13\
    \ 中的`LogChanges`进程。该进程用于`修订后的员工数据录入`页面——每当用户单击`Delete`（删除）、`Insert`（插入）或`Update`（更新）按钮时，该进程就会向`EMPLOG`表中插入一条记录，标明请求、用户和日期。\n\
    \n## 修订 LogChanges 进程\n\n你可以轻松地为`交互式网格`页面重新创建此进程。图 11-19 显示了相关的进程属性。除了一个属性外，这些属性值与第\
    \ 7 章的进程完全相同——`可编辑区域`属性的值现在是`Employees`（员工）。这个值告诉 APEX，当进程执行时，其代码应应用于`Employees`网格中每个被更改的行。\n\
    \n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig19_HTML.jpg](img/335103_3_En_11_Fig19_HTML.jpg)\n\
    \n**图 11-19** LogChanges 进程\n\n通过修改`Employees`网格的一些数据，然后查看 SQL Workshop 中的`EMPLOG`表来测试你的进程。该表应该为你所做的每次修改都有一条记录。不幸的是，所有记录看起来都一样——`Request`（请求）值要么是`APEX_AJAX_DISPATCH`（如果你使用了工具栏上的内置`SAVE`按钮），要么是`SAVE`（如果你使用了为图\
    \ 11-13 编写的`SAVE`按钮）。这还不够好；`Request`字段的值应该更具信息性。\n\n因此，让我们修改进程代码，使得`Request`字段的值包含行状态和被修改行的`EmpNo`值，例如\"\
    `update of 8830`\"（8830 的更新）或\"`insertion of 8200.`\"（8200 的插入）。代码清单 11-1 包含了修订后的代码。注意，它使用`APEX$ROW_STATUS`来确定发生了哪种操作。\n\
    \n```sql\ndeclare\n  v_request varchar(20);\nbegin\n  case :APEX$ROW_STATUS\n\
    \    when 'U' then v_request := 'Update ';\n    when 'C' then v_request := 'Insert\
    \ ';\n    when 'D' then v_request := 'Delete ';\n  end case;\n  v_request := v_request\
    \ || :EMPNO;\n  insert into EMPLOG (Request, UserName, RequestDate)\n  values\
    \ (v_request, :APP_USER, sysdate);\nend;\n```\n*代码清单 11-1 修订后的 LogChange 进程的 PL/SQL\
    \ 代码*\n\n## 网格的自定义插入\n\n你可能遇到的另一种情况是，网格内置的数据库修改代码不能满足你的需求。在这种情况下，APEX 允许你编写自己的\
    \ PL/SQL 代码来替换它。\n\n举个简单的例子，考虑向一个不包含表所有字段的网格中插入新行的问题。内置的插入进程会给缺失的字段赋空值。但如果这还不够好呢？如果新记录需要非空的默认值怎么办？\n\
    \n要探索这个问题，请在`交互式网格`页面中创建一个新区域。将其命名为`CustomEmps`，类型设置为`交互式网格`，并将其模板设置为`标准`（以便与其上方的`按部门划分的员工`区域匹配）。其源应为：\n\
    \n```sql\nselect EmpNo, EName, Job, Sal, DeptNo\nfrom EMP\n```\n\n别忘了打开`EMPNO`列的`主键`属性，并关闭其`需要验证`属性。然后转到`属性`节点的`编辑`部分并启用编辑。图\
    \ 11-20 显示了生成区域的顶部。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig20_HTML.jpg](img/335103_3_En_11_Fig20_HTML.jpg)\n\
    \n**图 11-20** Custom Emps 网格区域\n\n手头的任务是修改该区域的插入代码，以便将默认值放入缺失的字段中。操作方法如下。\n\n\
    转到页面编辑器的`处理`选项卡，选择名为`Custom Emps-Save Interactive Grid Data`的进程节点。这是`Custom Emps`网格区域的内置\
    \ ARP 进程。图 11-21 显示了其`标识`和`设置`属性。这里的关键属性是`设置`部分中的`目标类型`。默认值`区域源`告诉 APEX 使用内置的修改进程。要将其替换为你的代码，请将该属性值更改为`PL/SQL\
    \ 代码`。属性编辑器将显示一个文本框，你可以在其中输入代码。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig21_HTML.jpg](img/335103_3_En_11_Fig21_HTML.jpg)\n\
    \n**图 11-21** 网格 ARP 进程的属性设置\n\n你的自定义 PL/SQL 代码必须处理所有三种修改操作，即使你只更改了插入操作。代码清单 11-2\
    \ 展示了我的代码。它使用 case 语句来确定需要执行的操作。删除和更新的代码是直接的 SQL 命令，与 ARP 进程的操作没有不同。插入的代码为四个缺失的列确定默认值：新员工的经理是总裁，雇佣日期是今天，初始佣金为\
    \ 0，且员工不在外地工作。`insert`语句末尾的`returning`子句导致新生成的员工编号被保存在网格的会话状态中。\n\n请注意，你的进程只需要处理单行。APEX\
    \ 将遍历网格，为每个更改的行调用你的代码，并处理丢失的更新检测。\n\n```sql\nbegin\n  case :APEX$ROW_STATUS\n\
    \    when 'C' then\n      insert into EMP(EName, Job, Sal, DeptNo,\n         \
    \             Mgr, HireDate, Comm, Offsite)\n      values (:ENAME, :JOB, :SAL,\
    \ :DEPTNO,\n              7839, sysdate, 0, 'N')\n      returning EmpNo into :EMPNO;\n\
    \    when 'U' then\n      update emp\n      set EName  = :ENAME,\n          Job\
    \    = :JOB,\n          Sal    = :SAL,\n          DeptNo = :DEPTNO\n      where\
    \ EmpNo  = :EMPNO;\n    when 'D' then\n      delete emp\n      where EmpNo = :EMPNO;\n\
    \  end case;\nend;\n```\n*代码清单 11-2 自定义交互式网格修改代码*\n"
- fmt: "# Summary\n\nThis chapter focused on interactive grids—what they are, what\
    \ they can do, and how to build them. It began by examining their report-like\
    \ characteristics. In this aspect, they look and behave a lot like interactive\
    \ reports. Interactive grids also have some additional features, most importantly\
    \ the ability to link two grid regions in a master-detail relationship.\n\nThe\
    \ chapter then considered the issue of how to use an interactive grid to update\
    \ the database. Interactive grids have a sophisticated, easy-to-use interface,\
    \ in which you can tentatively edit values in place, add rows and initialize their\
    \ values, and delete existing rows, and then undo or save these changes when desired.\n\
    \nInteractive grids have validations to ensure appropriate user input. You specify\
    \ these validations the same as in Chapter [8](#335103_3_En_8_Chapter.xhtml).\
    \ The difference is that APEX applies the validation code to each modified row\
    \ of the grid. You can also use the `Read Only` properties of a grid to restrict\
    \ users from changing the value of specified rows or columns.\n\nEach interactive\
    \ grid has a built-in process that handles the database insert, delete, and update\
    \ operations. If you need additional functionality, you can write your own processes.\
    \ As with validations, the code of the process refers to just one row of the grid;\
    \ APEX applies the process to each modified row of the grid. In fact, you can\
    \ even swap out the default database processing code and replace it with your\
    \ own.\n\n# 12. Dynamic SQL\n\nIn this book, you have seen many ways to use session\
    \ state values to customize a page. For example, the SQL source query of a report\
    \ is a good candidate for customization, as is an SQL statement in a process that\
    \ accesses the database. Much of this customization involves bound variable references\
    \ in SQL statements.\n\nHowever, there are limits to what can be customized. A\
    \ reference to a session state variable can replace a constant in the SQL query,\
    \ but it is not allowed to replace a table name or a column name. This chapter\
    \ examines a technique called `dynamic SQL`, which overcomes this limitation by\
    \ using PL/SQL code to construct and execute an SQL statement at runtime. You\
    \ will see how to use `dynamic SQL` as the source of a report or the contents\
    \ of a process and look at three examples that require `dynamic SQL`.\n\n## Dynamic\
    \ Reports\n\nConsider the `Report Builder` page shown in Figure [12-1](#335103_3_En_12_Chapter.xhtml#Fig1),\
    \ which is page 43 of the `Employee Demo` application. The items in the top region\
    \ enable a user to specify a report. A user chooses the desired table, selects\
    \ the columns to display, and then enters the text of the filtering condition.\
    \ Clicking the submit button displays the report in the bottom region.\n\n![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig1_HTML.jpg](images/335103_3_En_12_Chapter/335103_3_En_12_Fig1_HTML.jpg)\n\
    *Figure 12-1 Report Builder page*\n\nWhat does it take to implement these two\
    \ regions? The `Specify Your Report` region is relatively straightforward. The\
    \ region has three items and a button. The `Select Table` item is named `P43_TABLE`.\
    \ It is a select list that displays the names of relevant tables and has no action\
    \ when selected. When I built the page, I specified the list of table names as\
    \ the static values `[EMP, DEPT].` Another possibility is to specify the list\
    \ via the following query, which makes use of Oracle’s `User_Tables` table:\n\n\
    ```sql\nselect Table_Name as DisplayVal, Table_Name as ResultVal\nfrom User_Tables\n\
    order by DisplayVal\n```\n\nThe `Select Columns` item is named `P43_COLS`. It\
    \ is a checkbox group that displays a checkbox for each column of the selected\
    \ table. Its values are defined by the following query, which makes use of Oracle’s\
    \ `User_Tab_Cols` table:\n\n```sql\nselect Column_Name as DisplayVal, Column_Name\
    \ as ResultVal\nfrom User_Tab_Cols\nwhere Table_Name = :P43_TABLE\norder by DisplayVal\n\
    ```\n\nThis query references `P43_TABLE`, which means that its list of displayed\
    \ columns will vary according to what table is selected. To get this list to update\
    \ when `P43_TABLE` changes, use the cascading lists technique of Chapter [6](#335103_3_En_6_Chapter.xhtml).\
    \ That is, go to the `Cascading List of Values section` for `P43_COLS` and set\
    \ its `Parent Item(s)` property to `P43_TABLE`.\n\nThe item `P43_WHERE` is a text\
    \ area in which the user enters the filtering condition. This condition will be\
    \ used as the `where` clause of the report’s source query.\n\nFinally, the button\
    \ in the `Specify your Report` region executes a submit action when pressed. This\
    \ action causes the values of the three items to be saved in the session state.\n\
    \nThe `Your Report Is` region displays a report customized by the values of these\
    \ items. This region is not so straightforward to implement. Suppose that you\
    \ tried to create the region as a classic report; its source query would look\
    \ something like this:\n\n```sql\nselect :P43_COLS\nfrom   :P43_TABLE\nwhere \
    \ :P43_WHERE\n```\n\nThe problem is that such a query is not syntactically legal.\
    \ The rule is that a bind variable can be used only to reference a constant, and\
    \ this query is trying to reference columns, tables, and SQL code. To solve this\
    \ problem, set the source type of the report to be `PL/SQL Function Body returning\
    \ SQL Query`. The source of such a report is a PL/SQL function that computes the\
    \ desired SQL query and returns it as a string. Listing [12-1](#335103_3_En_12_Chapter.xhtml#PC4)\
    \ shows the code for the `Your Report is` report.\n\n```sql\ndeclare\n  v_table\
    \ varchar2(20)  := :P43_TABLE;\n  v_cols  varchar2(100) := replace(:P43_COLS,\
    \ ':', ',');\n  v_where varchar2(100) := '';\nbegin\n  if :P43_WHERE is not null\
    \ then\n    v_where := ' where ' || :P43_WHERE;\n  end if;\n  return 'select '\
    \ || v_cols || ' from ' || v_table || v_where;\nend;\n```\n*Listing 12-1 PL/SQL\
    \ Code to Generate an SQL Query*\n\nThis code constructs the desired SQL query\
    \ string piece by piece. The construction of the column list is perhaps the only\
    \ nonobvious part. Recall that `P43_COLS` is a multi-value list item, which means\
    \ that its value will be a string containing the selected column names separated\
    \ by colons. In the query, however, the column names need to be separated by commas.\
    \ So all you need to do is use the `replace` function to replace each colon by\
    \ a comma and then assign that string to the variable `v_cols`.\n\nThe technique\
    \ of using code to construct the source query is called `dynamic SQL` because\
    \ the query is computed dynamically at runtime. `Dynamic SQL` is appropriate whenever\
    \ the source query can vary in ways that go beyond simple customization by constants.\
    \ Figure [12-2](#335103_3_En_12_Chapter.xhtml#Fig2) depicts the `Identification`\
    \ and `Source` properties for the `Your Report Is` region.\n\n![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig2_HTML.jpg](images/335103_3_En_12_Chapter/335103_3_En_12_Fig2_HTML.jpg)\n\
    *Figure 12-2 Implementing the Report Builder report region*\n\nOne of the consequences\
    \ of using `dynamic SQL` is that the columns of the report may not be known until\
    \ runtime. In this case, you must tell APEX to define `generic` column names for\
    \ the report. You do so via the property `Use Generic Column Names`, which can\
    \ be seen at the bottom of Figure [12-2](#335103_3_En_12_Chapter.xhtml#Fig2).\
    \ When that property is turned on, the property `Generic Column Count` appears\
    \ for you to specify how many generic columns to create. Figure [12-2](#335103_3_En_12_Chapter.xhtml#Fig2)\
    \ specifies a column count of 9, which means that APEX will generate 9 columns\
    \ for the report. The names of these columns will be `COL01`, `COL02`, and up\
    \ to `COL09`. This specified count is a maximum; if the report happens to use\
    \ fewer columns (as shown in Figure [12-1](#335103_3_En_12_Chapter.xhtml#Fig1)),\
    \ the others will be ignored."
