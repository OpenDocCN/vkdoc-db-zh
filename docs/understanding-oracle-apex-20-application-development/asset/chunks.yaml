  trans: "\n`FetchRow` 进程会在页面每次渲染时被调用。但是，除非用户已选择了一行，否则让它去查询数据库是没有意义的——也就是说，它应该仅当 `P20_EMPNO`\
    \ 非空时才执行其 SQL 语句。这正是清单 7-15 中 if 语句的目的。（一个同样好的等效解决方案是移除 if 语句，并更改进程的 `服务器端条件`\
    \ 属性，使其仅在 `P20_EMPNO` 不为空时执行。）\n与其将 `FetchRow` 创建为提交进程然后再更改其执行点，不如直接将其创建为渲染进程更为简便。你只需在渲染树中右键单击\
    \ `After Header` 节点，然后选择 `创建进程`。\n\n## 在区域间切换\n在你应用程序的这个阶段，你应该验证点击 `Employees`\
    \ 报表上的链接是否能正确地将所选员工的值放入 `Emp Info` 的各项中。接下来的问题是要制定一个计划，让这些区域如何能“轮流”渲染自身。\n关键思路是认识到\
    \ `P20_EMPNO` 的非 `空` 值表示已选择了一行。因此，要“取消选择”一行，自然地应该将 `空` 值放入 `P20_EMPNO`。这样，两个区域便可以利用该项的值来决定它们的条件渲染——当该项值为\
    \ `空` 时，`Employees` 区域应可见；当值不为 `空` 时，`Emp Info` 区域应可见。换句话说，`P20_EMPNO` 的值决定了页面是处于\
    \ *报表模式* 还是 *单行模式*。\n这一思路也引出了实现 `ReportView` 按钮的自然方式。它应该简单地重定向到同一页面，并将 `P20_EMPNO`\
    \ 设置为 `空`。进行这些更改，并再次测试你的页面。点击报表中的一行应显示该员工的 `Emp Info` 区域，而点击 `Report View` 按钮应再次显示报表。\n\
    \n## 查找上一条和下一条记录\n最后一个问题是实现 `Previous` 和 `Next` 按钮，使得点击它们时，区域会显示报表中的上一条（或下一条）记录。本节考虑两种不同的实现此功能的方法。第一种方法更容易理解，但有一些局限性。第二种方法理解起来稍难一些，但优雅得多。\n\
    \n### 方法一：分别为上一条和下一条使用不同进程\n考虑 `Previous` 按钮，它需要选择上一条记录。我们暂时假设“上一条记录”意味着拥有次低员工编号的记录。清单\
    \ 7-16 中的 PL/SQL 代码可以完成这项工作。\n\n```sql\ndeclare\n  v_prevEmp number(4,0);\nbegin\n\
    \  select max(EmpNo) into v_prevEmp\n  from EMP\n  where EmpNo < :P20_EMPNO;\n\
    \  if v_prevEmp is not null then\n    :P20_EMPNO := v_prevEmp;\n  end if;\nend;\n\
    ```\n*清单 7-16 方法一的“上一条”按钮简化代码*\n\nif 语句对于处理尝试获取第一个员工的上一条记录的情况是必需的。在这种情况下，查询将返回一个\
    \ `空` 值。如果没有 if 语句，按钮会将该 `空` 值放入 `P20_EMPNO`，这会导致取消选择行并返回到报表模式。通过使用 if 语句，从第一行点击\
    \ `Previous` 按钮将不会有任何效果。\n\n现在假设你想使用不同的列来确定上一条记录，例如 `EName`。前面的查询不容易扩展到这种情况。相反，你应该使用\
    \ SQL 分析函数 `lag`，它根据指定的排序顺序查找前一个值。清单 7-17 给出了相应的 PL/SQL 代码。\n\n```sql\ndeclare\n\
    \  v_prevEmp number(4,0);\nbegin\n  select PrevEmp into v_prevEmp\n  from (select\
    \ EmpNo, lag(EmpNo) over (order by EName) as PrevEmp\n        from EMP)\n  where\
    \ EmpNo = :P20_EMPNO;\n  if v_prevEmp is not null then\n    :P20_EMPNO := v_prevEmp;\n\
    \  end if;\nend;\n```\n*清单 7-17 方法一的“上一条”按钮 PL/SQL 代码*\n\n内部查询创建了一个包含两列员工编号的表，其中每个员工都与排序中紧接在其前面的员工配对。外部查询然后从该表中选择\
    \ `EmpNo` 值等于 `P20_EMPNO` 的行，并返回该记录的 `PrevEmp` 值。\n除了 `lag` 函数，SQL 还有 `lead` 函数，其行为方式相同，只是它返回排序顺序中的下一个更高值。此函数可用于实现\
    \ `Next` 按钮，其 PL/SQL 代码与清单 7-17 类似（因此省略）。\n因为 `Previous` 和 `Next` 按钮各自有自己的进程，你应该将它们的动作设置为\
    \ `提交`。你还应将每个进程配置为根据其按钮有条件地执行。虽然这不是此问题的最佳解决方案，但它运行良好，值得实现以查看其实际效果。\n\n### 方法二：统一的“上一条/下一条”进程\n\
    方法一的缺点是，当 `Previous` 和 `Next` 按钮到达第一条或最后一条记录时，它们没有任何可见效果；对用户来说，它们似乎停止工作了。另一个想法是在按钮不适用时将其隐藏。为此，页面需要“向前查看”。也就是说，除了跟踪当前员工编号外，页面还需要跟踪上一个和下一个值。这样，如果上一个值为\
    \ `空`，它就可以隐藏 `Previous` 按钮，对 `Next` 按钮同理。\n\n要实现此方法，创建隐藏项 `P20_PREV` 和 `P20_NEXT`\
    \ 来保存上一个和下一个员工编号。然后，每当选择一条记录时，一个进程可以“向前查看”并将适当的值赋给这些项。这个名为 `FindPreviousNext`\
    \ 的进程如清单 7-18 所示。\n\n```sql\nbegin\n  if :P20_EMPNO is not null then\n    select\
    \ PrevEmp, NextEmp\n      into :P20_PREV, :P20_NEXT\n      from (select EmpNo,\n\
    \                   lag(EmpNo)  over (order by EName) as PrevEmp,\n          \
    \         lead(EmpNo) over (order by EName) as NextEmp\n              from EMP)\n\
    \     where EmpNo = :P20_EMPNO;\n  end if;\nend;\n```\n*清单 7-18 用于查找上一条和下一条值的\
    \ PL/SQL 代码*\n\n此代码与清单 7-17 中的代码相似，区别在于它不特定于任何特定按钮。实际上，它必须在选择一行时执行，无论该选择是通过报表中的链接还是通过\
    \ `Previous` 或 `Next` 按钮之一进行的。换句话说，`FindPreviousNext` 进程应该在页面渲染期间执行，就像 `FetchRow`\
    \ 进程一样。\n\n因此，`Previous` 和 `Next` 按钮的配置可以简单得多。考虑 `Previous` 按钮（`Next` 按钮类似）。因为\
    \ `P20_PREV` 保存着上一条记录的 `EmpNo`，你可以将按钮配置为在被点击时重定向，将 `P20_PREV` 的值放入 `P20_EMPNO`。参见图\
    \ 7-22。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig22_HTML.jpg](img/335103_3_En_7_Fig22_HTML.jpg)\n\
    *图 7-22 配置“上一条”按钮的动作*\n\n你也可以使用 `P20_PREV` 和 `P20_NEXT` 来自定义何时显示 `Previous` 和\
    \ `Next` 按钮。具体来说，当 `P20_PREV` 不为空时应显示 `Previous` 按钮，当 `P20_NEXT` 不为空时应显示 `Next`\
    \ 按钮。这些条件可以使用条件渲染来表达。例如，图 7-23 显示了 `Previous` 按钮的 `服务器端条件` 部分。\n"
