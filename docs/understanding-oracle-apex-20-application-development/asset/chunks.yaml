    ## 按钮行为与位置


    按钮的动作在其 `Behavior` 部分中指定。`Action` 属性有五个可能的值，如图 5-27 所示。最常见的选项是 `Submit Page` 和
    `Redirect to Page in this Application`。适用于重定向动作的 `Target` 属性允许您指定目标页面。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig27_HTML.jpg](img/335103_3_En_5_Fig27_HTML.jpg)

    *图 5-27：可能的按钮动作*


    按钮的位置由 `Layout` 部分中的 `Button Position` 属性决定。图 5-28 显示了可能的值。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig28_HTML.jpg](img/335103_3_En_5_Fig28_HTML.jpg)

    *图 5-28：可能的按钮位置*


    尽管有多种可能的位置，但它们可分为四个基本类别：


    *   在区域的标题中

    *   在区域的顶部或底部

    *   在区域的预定义位置

    *   在区域体中


    值 `Left of Title` 和 `Right of Title` 将按钮放置在区域的标题中，位于标题的左侧或右侧。如果多个按钮位于同一位置，它们的相对位置由它们的序号决定。


    值 `Top of Region`、`Top and Bottom of Region`、`Above Region`、`Below Region` 和 `Bottom
    of Region` 将按钮显示在区域的顶部或底部。当您选择这些值之一时，属性编辑器会显示 `Horizontal Alignment` 属性，该属性允许您指定按钮应出现在区域的左侧还是右侧。图
    5-2 中的按钮位于区域顶部，并向右对齐。


    许多页面模板为某些按钮指定了特殊位置。其目的是确保跨多个区域通用的按钮位于这些区域中的相同位置。按钮位置 `Copy`、`Edit`、`Previous`、`Next`、`Close`、`Help`、`Delete`、`Change`
    和 `Create` 对应于这些特殊用途的按钮，尽管您可以自由地将它们用于任何按钮。特别值得注意的是 `Copy` 和 `Edit` 位置，它们将按钮显示在标题的最右侧。


    `Region Body` 位置与其他位置不同，因为它将按钮放置在区域的项目之中。当您选择此值时，会出现一个 `Layout` 部分，供您指定按钮相对于区域中其他项目的位置。此外，按钮在渲染树中的节点会出现在区域项目的子树中。


    图 5-2 中的两个按钮颜色不同：`Cancel` 按钮与页面项目具有相同的颜色方案，而 `Submit` 按钮是蓝色的。`Submit` 按钮的颜色旨在吸引用户的注意；APEX
    称其为 *热按钮*。按钮的 `Appearance` 部分有一个名为 `Hot` 的属性，可让您指定按钮是否为热按钮。图 5-29 显示了 `Submit`
    按钮的这个部分。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig29_HTML.jpg](img/335103_3_En_5_Fig29_HTML.jpg)

    *图 5-29：指定热按钮*


    ## 总结：项目


    项目是保存值的页面元素。有许多项目类型，它们在页面上显示值的方式以及帮助用户指定该值的方式上有所不同。最重要的是区分基于文本的项目和基于列表的项目。


    基于文本的项目在其输入框中显示其值，用户可以通过在输入框中键入来指定值。基于文本的项目类型支持输入特殊值（如颜色和日期）、辅助数据输入（如自动完成）以及限制允许的值（如数字字段）。


    基于列表的项目强制用户从给定的值列表中选择。该列表可以通过 SQL 查询动态定义，也可以通过显式值静态定义。在任何情况下，都存在显示值（呈现给用户的值）和返回值（项目实际持有的值）之间的区别。各种基于列表的项目类型主要区别在于它们如何在页面上呈现显示值。


    项目的目的是允许用户向服务器发送一个值。第 6 章将研究这个问题，并提供展示项目在 Web 应用程序中典型用法的示例。


    ## 会话状态


    用户与应用程序的交互称为 *会话*。一个会话可以包含多个页面请求。例如，在电子商务应用程序中，一个会话可能涉及浏览待售商品、将其中一些添加到购物车、输入付款和运输信息以及完成交易。


    在会话期间，用户为页面项目赋值，可能涉及多个页面，并将这些值发送到服务器进行处理。给定会话的项目值构成其 *会话状态*。在本章中，您将研究应用程序可以修改和访问会话状态的各种方式，并了解一些利用此状态的常见页面设计技术。


    ## 会话 ID


    在 Web 应用程序中构建会话功能是有问题的，因为浏览器请求是匿名的。服务器没有内置方法来知道两个浏览器请求是否属于同一个会话。APEX 通过为每个会话分配一个标识符来解决此问题。浏览器请求通过将会话
    ID 添加到请求中来指示其会话。


    回想一下，APEX URL 由字符串 `f?p=` 后跟冒号分隔的值字符串组成。前两个值是应用程序 ID 和页面 ID；第三个值是会话 ID。要查看实际操作中的会话
    ID，请登录 APEX 并浏览其屏幕。查看与您访问的每个屏幕关联的 URL。您应该会发现每个 URL 都具有相同的会话 ID 值。现在从 APEX 注销。当您重新登录时，APEX
    将为此次交互分配一个新的会话 ID。您访问的每个屏幕的 URL 现在都将具有这个新的会话 ID。


    您也可以在您自己的应用程序中观察会话 ID。从 APEX 注销并运行您的 `Employee Demo` 应用程序。APEX 将分配一个会话 ID，该 ID
    将出现在每个页面的 URL 中。您可以通过提交会话 ID 为 0 的请求来请求新的会话。（实际上，任何随机 ID 值都可以。）例如，我可以通过提交以下 URL
    在新会话中查看我的应用程序的主页：


    ```

    apex.oracle.com/pls/apex/f?p=91392:1:0

    ```


    当页面加载时，URL 将包含一个新的会话 ID。

    '
- fmt: '# Submit vs. Redirect


    Suppose that you modify the value of an item on a web page, perhaps by selecting
    a radio button or typing into a text field. Your browser knows how to display
    this change directly, without having to ask the server to re-render the page.
    Consequently, the server will know nothing about the change you made to the item
    and thus cannot use the new value.


    If you want your application to know about the values of the items on a page,
    you must first upload those values to the server. This action is called `submit`.
    The server holds a variable for each item of your application. When you submit
    a page, the value of each item on that page is saved in its corresponding variable.
    In effect, the submit action synchronizes the session state with the current page.


    Recall that the action of a button is either `submit` or `redirect`. Both actions
    cause the APEX server to render a target page and send it to the browser. For
    redirect, you specify the target page as part of the redirect action. For submit,
    you specify the target page via a separate `branch` component—if no branches are
    specified, the current page is reloaded. Branches are discussed in Chapter 9,
    so for now you can assume that a submit operation always reloads the current page.


    The primary difference between submit and redirect is that submit uploads the
    page’s item values to the server, whereas redirect does not. If a user changes
    the value of some items on a page and then does a redirect, those changes will
    be lost—even if the redirect is to the same page.


    To see an example of this difference, consider the `Item Sampler` demo page from
    Chapter 5, as shown in Figure 5-2. Recall from Chapter 5 that the initial value
    of an item is determined by its `Source` properties. The default is to use the
    session state value if it is not null. This means that if you assign a non-null
    value to an item and submit, then that value will become the item’s initial value
    when the page is reloaded. You can verify this fact by changing some of the values
    on the page and clicking the `Cancel` button. Because that button does a redirect,
    your changes are lost. Now modify those values again and click the `Submit` button.
    The item values remain as chosen because the submit operation wrote those changes
    to the session state and then retrieved them when the page was reloaded. If you
    navigate to a different page and come back, the values will still be there.


    Recall that when you run a page from within APEX, the developer toolbar appears
    on the bottom of the screen. The toolbar button labeled `Session` shows you the
    current session state. Clicking it opens a window that displays all items and
    their current session values. This window is very useful when debugging pages.
    In the example, open the session window and look at the session state. Then change
    some items and submit. Open the session window again, and verify that the item
    values have changed.


    It is important to understand that specifying an initial value of an item will
    affect the value of the item in the browser, but will never, ever change its value
    in the session state. You can run some experiments on the `Item Sampler` page
    to verify this fact. Go to the property editor, set the source of the item `P8_JOB`
    to be the static expression `CLERK`, and have it be used `Always, replacing any
    existing value in session state`. Run the page, change the item’s value to `ANALYST`,
    and click the `Submit` button, checking the session state at each step. The session
    state value stays blank until the page is submitted, at which point it becomes
    `ANALYST`. The browser, however, will show `CLERK` when the page is rendered.
    Now go back to the property editor and change the `Source Used` property of the
    item to be `Only when current value in session state is null` and repeat the experiment.
    (Start by setting the value of the item to blank and clicking the `Submit` button
    to clear the session state.) You should observe that the session state values
    behave the same as before. The browser, however, will display `CLERK` until you
    submit a new value, after which it will display that value.


    # Using an Item to Submit a Page


    The primary way to submit a page is to use a button. However, certain item types
    can also perform a submit. The `Settings` section of a text field or password
    field has the property `Submit when Enter pressed`. Turning on this property causes
    the item to submit the page when the user presses the `Enter` key.


    The `Settings` section of a select list or radio group has the property `Page
    Action on Selection`. This property is shown in Figure 6-1 for a select list.
    The default value of the property is `None`. If you set it to `Submit Page`, then
    the page will be submitted each time a user changes the value of the item.


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig1_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig1_HTML.jpg)


    *Figure 6-1 Possible actions for a select list*


    The figure also shows three other values for this property. These values correspond
    to different forms of redirect. The `Redirect and Set Value` option saves the
    value of that item in the session state and then redirects to the same page. That
    is, it behaves like submit, but for just one item instead of all items on the
    page.


    The `Redirect to Page` and `Redirect to URL` options have different intents. The
    `Redirect to Page` action causes the item to act as a navigation list—its values
    are interpreted as page numbers, and selecting a value causes APEX to redirect
    to that page. For example, consider a select list having the static values of
    Figure 6-2 and whose action is `Redirect to Page`. This item displays the three
    options (`Home`, `Employee Reports`, `Charts`); choosing an option redirects to
    the corresponding page number.


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig2_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig2_HTML.jpg)


    *Figure 6-2 Static values for a Redirect to Page action*


    The `Redirect to URL` option is similar, except that the item values are assumed
    to be URLs. Neither of these two options changes the session state.


    # Redirect Can Set Session State


    Consider the redirect action of a button. Even though that action does not submit
    the page, it nevertheless can modify the session state.


    When you set the action of a button to `Redirect to Page in this Application`,
    the `Target` property appears in the property editor. Clicking the property’s
    input box brings up the `Link Builder` wizard page shown in Figure 6-3.


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig3_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig3_HTML.jpg)


    *Figure 6-3 Link Builder wizard page*


    In addition to setting the `Page` property to the desired target, you can use
    the `Set Items` section to set the value of as many items as you want. Enter the
    item name in the `Name` box and its desired session state value in the `Value`
    box. Each time you fill up a row, another row appears, thus allowing you to enter
    arbitrarily many name/value pairs.


    For example, consider again the `Item Sampler` page of Figure 5-2. Suppose that
    you want the `Cancel` button to set the value of the items `P8_EMPNO` to `9999`
    and `P8_JOB` to `CLERK` and to clear the value in `P8_SALARY`. Then the `Set Items`
    section of the link builder would look like Figure 6-4.


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig4_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig4_HTML.jpg)


    *Figure 6-4 Specifying item values upon redirect*'
