    from EMP

    where Job = ''MANAGER''

    ```


    `P17_INSERT_DEPTNO`的值由以下查询定义：

    ```sql

    select DName, DeptNo

    from DEPT

    ```


    该按钮名为`Insert`，其操作为`Submit`。用户输入各项的值并单击`Insert`按钮。然后，与该按钮关联的流程将使用指定的项目值作为五列的值，并为其他四列计算以下值，将一条新记录插入到`EMP`表中：

    *   `EmpNo`自动获取由`EMP`的内置插入触发器确定的序列中的下一个值。

    *   `HireDate`获取当前日期。

    *   `Comm`获取`0`。

    *   `Offsite`获取`''N''`。


    创建此流程的步骤与`DeleteEmp`流程相同。将该流程命名为`InsertEmp`。其`When Button Pressed`属性的值应为`Insert`。其
    PL/SQL 代码由清单 7-2 中显示的单个 SQL 命令组成。

    ```sql

    begin

    insert into EMP (EName, Job, Mgr, Sal, DeptNo,

    HireDate, Comm, Offsite)

    values (:P17_INSERT_ENAME,

    :P17_INSERT_JOB,

    :P17_INSERT_MGR,

    :P17_INSERT_SAL,

    :P17_INSERT_DEPTNO,

    current_date,  0,  ''N'');

    end;

    ```

    *清单 7-2：InsertEmp 流程的 PL/SQL 代码*


    此时，你可能想要测试当前页面的状态。插入一条记录并确保它在报表中正确显示。然后删除它，并观察报表恢复到其原始状态。


    ## 更新员工区域


    `Update Employee`区域有四个项目和两个按钮。项目名为`P17_UPDATE_EMPNO`、`P17_UPDATE_JOB`等。选择列表值的定义方式与其他区域相同。按钮名为`GetInfo`和`Update`，两者操作均为`Submit`。


    使用此区域需要两个步骤。首先，用户从`P17_UPDATE_EMPNO`中选择所需的员工并单击`GetInfo`按钮。与此按钮关联的流程使用该员工的`EMP`记录中的相应值填充项目`P17_UPDATE_JOB`、`P17_UPDATE_SAL`和`P17_UPDATE_DEPTNO`。然后用户根据需要更改这些项目。当用户单击`Update`按钮时，与该按钮关联的流程会使用新值更新记录。


    每个按钮都将有自己的流程。`Update`按钮的流程名为`UpdateEmp`。其 PL/SQL 代码如清单 7-3 所示，其`When Button Pressed`属性的值为`Update`。

    ```sql

    begin

    update EMP

    set Job    =  :P17_UPDATE_JOB,

    Sal    =  :P17_UPDATE_SAL,

    DeptNo =  :P17_UPDATE_DEPTNO

    where EmpNo  =  :P17_UPDATE_EMPNO;

    end;

