    ## 级联列表


    下一个任务是构建一个页面，使用户能够从选择列表中选择员工姓名，然后显示包含该员工信息的报表。该页面名为 `级联列表`，是 `员工演示` 应用的第 14 页，如图
    6-16 所示。该页面有两个区域，每个区域都提供了一种解决方案。


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig16_HTML.jpg](img/335103_3_En_6_Fig16_HTML.jpg)


    图 6-16：级联列表


    ### 顶部区域


    顶部区域有一个名为 `P14_EMPNO` 的项。这是一个选择列表，显示所有员工的姓名，并将员工编号作为结果值。也就是说，它的值列表查询如下：


    ```

    select EName, EmpNo

    from EMP

    order by EName

    ```


    顶部区域没有按钮。相反，选择列表的操作是 `重定向并设置值`，这意味着从选择列表中选择一个员工姓名会导致该项的值在会话状态中被更改。


    顶部区域的类型是 `经典报表`。它的源查询由 `P14_EMPNO` 的值定制，如下所示：


    ```

    select e.EmpNo, d.DName, e.Job, e.Sal, d.Loc

    from EMP e join DEPT d

    on    e.DeptNo = d.DeptNo

    where e.EmpNo = :P14_EMPNO

    order by EmpNo

    ```


    如果你尝试这个区域，你应该会发现，由于员工数量较少，浏览姓名列表很容易。然而，假设 `EMP` 表很大，有数千名员工可供选择。即使姓名已排序，滚动浏览选择列表也会很麻烦且耗时。解决此问题的常见方法是让用户通过一系列选择列表分步选择姓名。


    ### 底部区域


    图 6-16 的底部区域使用两个选择列表来选择一名员工。第一个选择列表显示每个员工姓名的首字母，第二个选择列表显示姓名以该字母开头的员工姓名。这种技术称为
    *级联列表*，其中第二个选择列表的显示值会根据为第一个列表选择的值而变化。这种技术可以扩展到多个选择列表——除第一个之外的每个选择列表的值都会根据其前面选择列表的值而变化。这种方法的优点是用户可以滚动浏览几个小的选择列表，而不是一个大列表。


    底部区域中的两个选择列表名为 `P14_FIRST_LETTER` 和 `P14_EMPNO_CASCADE`。它们的定义如下。


    选择列表 `P14_FIRST_LETTER` 不依赖于任何其他项，因此其查询很简单：


    ```

    select FirstLetter as DisplayVal, FirstLetter as ResultVal

    from  (select distinct substr(EName, 1, 1) as FirstLetter

    from EMP)

    order by DisplayVal

    ```


    列表 `P14_EMPNO_CASCADE` 依赖于 `P14_FIRST_LETTER` 的值，其查询如下：


    ```

    select EName, EmpNo

    from EMP

    where substr(EName, 1, 1) = :P14_FIRST_LETTER

    order by EName

    ```


    底部报表的源与顶部报表完全相同，只是 `P14_EMPNO` 被 `P14_EMPNO_CASCADE` 取代。如果你将这两个选择列表的操作都设置为 `重定向并设置值`，那么选择首字母会导致姓名列表更新，而选择姓名会导致报表更新。


    ### 在 APEX 中实现级联列表


    级联列表的概念非常普遍，因此 APEX 有一个特定的属性来处理它，称为 `父项`，它位于选择列表的 `级联值列表` 部分。图 6-17 显示了 `P14_EMPNO_CASCADE`
    列表的规范。


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig17_HTML.jpg](img/335103_3_En_6_Fig17_HTML.jpg)


    图 6-17：指定级联父项


    此图指定 `P14_EMPNO_CASCADE` 依赖于 `P14_FIRST_LETTER` 的值；也就是说，它监视 `P14_FIRST_LETTER`
    的行为，并在 `P14_FIRST_LETTER` 的值发生变化时刷新自身。因此，`P14_FIRST_LETTER` 的操作现在应设置为 `无`。`P14_EMPNO_CASCADE`
    的操作应像以前一样设置为 `重定向并设置值`。`级联值列表` 属性使 APEX 能够使用 JavaScript 和 Ajax 刷新选择列表，而无需重新渲染整个页面。这是实现级联最有效的方法。


    ## 条件渲染


    在使用应用程序构建器的过程中，你遇到过无数次这样的情况：在属性编辑器中选择一个特定值会导致编辑器突然显示其他属性。图 6-15 所示的 `链接生成器` 页面就是一个例子——如果你选择目标类型
    `URL`，那么 `设置项` 属性会突然消失，如果你将其值改回 `此应用程序中的页面`，那么那些项会重新出现。这是怎么回事？


    虽然看起来这些项是当场创建和删除的，但事实并非如此；相反，这些项始终存在。当你在链接生成器中并选择值 `此应用程序中的页面` 时，APEX 会显示额外的项；当你选择值
    `URL` 时，APEX 会隐藏它们。这种动态显示或隐藏项的能力称为 *条件渲染*。


    可以为项、按钮和区域定义条件渲染。每个在属性编辑器中都有一个 `服务器端条件` 部分，让你可以从选择列表中选择一个条件类型。尽管有许多条件类型，但这里的重点是
    `SQL 表达式` 类型。该类型的值是一个返回 `true`/`false` 的 SQL 表达式。表达式的值决定了项、按钮或区域是否被渲染。


    ### 示例 1：员工详情区域


    举个例子，让我们回到图 6-8 所示的 `按部门查看员工` 页面。请注意，在从主报表中选择一个值之前，详细报表区域将是空的。如果你不希望页面显示一个空的报表区域，那么你可以使用条件渲染，仅当项
    `P12_DEPTNO` 不为 `null` 时才显示该区域。该区域的条件 SQL 表达式如图 6-18 所示。


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig18_HTML.jpg](img/335103_3_En_6_Fig18_HTML.jpg)


    图 6-18：有条件地显示员工详情区域


    ### 示例 2：显示表页面


    再举一个例子，考虑图 6-19 所示的 `显示表` 页面，它将是 `员工演示` 应用的第 15 页。`选择表` 区域包含两个复选框和一个按钮。单击按钮会导致显示已勾选的表。


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig19_HTML.jpg](img/335103_3_En_6_Fig19_HTML.jpg)


    图 6-19：条件区域渲染

