  trans: '# 3. 区域


    页面的内容被划分为称为*区域*的矩形区域。例如，考虑图 1-3 所示的 APEX SQL Workshop 主屏幕，它显示了七个区域。其中六个区域有标题：`Recently
    Created Tables`、`Recent SQL Commands`、`Recent SQL Scripts`、`About`、`Schema` 和
    `Create Object`。第七个区域包含五个大按钮，没有标题。


    每个区域都有一个*类型*，表示它可以包含何种内容。图 1-3 中的区域属于三种不同的区域类型：


    *   `Recently Created Tables`、`Recent SQL Commands` 和 `Recent SQL Scripts` 区域包含报表，其类型为
    `Classic Report`。

    *   `Create Object` 区域包含一个链接列表，其类型为 `List`。

    *   `About`、`Schema` 以及那个无标题区域的类型为 `Static Content`。


    一个区域也可以包含*控件*——即项目和按钮。在图 1-3 中，`Schema` 区域包含一个选择列表项目和一个按钮，而无标题区域包含五个大按钮。由于 APEX
    将区域的控件视为与其内容不同的部分，因此任何区域，无论类型如何，都可以包含控件。本章重点介绍区域的内容；控件将在第 5 章和第 6 章讨论。


    APEX 支持多种不同的区域类型。本章涵盖四种基本类型：`Static Content`、`Classic Report`、`Chart` 和 `Interactive
    Report`。后续章节将介绍其他区域类型：第 4 章的 `Breadcrumb` 和 `List`，第 6 章的 `Region Display Selector`，第
    10 章的 `Form`，以及第 11 章的 `Interactive Grid`。


    ## 创建和删除区域


    要为页面创建一个新区域，请转到该页面的页面设计器。在其渲染树中右键单击 `Regions` 节点，然后选择 `Create Region`，如图 3-1 所示。然后，APEX
    会将一个区域组件（名为 `New`）作为子项添加到 `Content Body` 文件夹下的渲染树中。该组件也会有一个自己的子项，名为 `Attributes`。参见图
    3-2。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig2_HTML.jpg](img/335103_3_En_3_Fig2_HTML.jpg)


    图 3-2


    APEX 向页面添加新区域


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig1_HTML.jpg](img/335103_3_En_3_Fig1_HTML.jpg)


    图 3-1


    右键单击“区域”节点以创建新区域


    APEX 在渲染树中使用两个组件来表示单个区域，这可能看起来有些奇怪。原因是这些组件的属性有不同的关注点。特别是，区域组件（此处标记为 `New`）包含所有区域共有的属性，而
    `Attributes` 组件则包含特定于区域类型的属性。与类型无关的属性将在下一节讨论，之后是与类型相关的属性。


    如果要删除一个区域，只需在渲染树中右键单击其组件并选择 `Delete`。例如，随主页一起提供的面包屑区域是无用的。转到页面 1 的页面设计器，在渲染树中找到
    `Breadcrumb` 区域并将其删除。参见图 3-3。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig3_HTML.jpg](img/335103_3_En_3_Fig3_HTML.jpg)


    图 3-3


    删除区域


    ## 与类型无关的区域属性


    要编辑区域的与类型无关的属性，首先在渲染树中选择该区域的节点。属性编辑器随后将显示该区域的所有与类型无关的属性及其值。这些属性根据其目的被分组为*节*。这里，我将讨论四个重要的节：`Identification`、`Source`、`Layout`
    和 `Appearance`。


    ### “标识”和“来源”节


    图 3-4 显示了 `Region Practice` 页面的 `New` 区域的 `Identification` 和 `Source` 节及其属性 `Title`、`Type`
    和 `Text`。`Title` 属性标识区域并描述其用途。此值通常在页面渲染时显示在区域的标题中。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig4_HTML.jpg](img/335103_3_En_3_Fig4_HTML.jpg)


    图 3-4


    新区域的“标识”和“来源”属性


    新区域默认被分配标题 `New`。创建区域后，您应该做的第一件事就是为其分配一个更有意义的标题。APEX 在此处接受 HTML 格式标签。例如，转到 `Region
    Practice` 页面的页面设计器，在渲染树中选择 `New` 区域，并将其 `Title` 属性更改为：


    ```

    My First Region

    ```


    然后，在页面上再创建两个区域，标题分别为：


    ```

    My Second Region

    ```


    和


    ```

    My Third Region

    ```


    保存并运行页面。它应该如图 3-5 所示。请注意，每个标题分别以斜体、粗体和红色显示在其区域的标题中。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig5_HTML.jpg](img/335103_3_En_3_Fig5_HTML.jpg)


    图 3-5


    “区域练习”页面上的三个区域


    区域的内容由其 `Type` 属性和 `Source` 节决定。区域的类型指定了它包含的内容种类，而 `Source` 节指定了实际内容。例如，如果区域的类型是
    `Static Content`，则其 `Source` 节包含区域应显示的文本；如果区域的类型是 `Classic Report`，则其 `Source`
    节指定区域应显示的表。


    新区域被分配类型 `Static Content`，其源文本为空。为了有趣，让我们给区域 `My First Region` 和 `My Second Region`
    分配一些源文本。我选了一些简单的内容，即 `This is my first region` 和 `This is my second region`。


    您可以通过从其可能类型的列表中选择类型来更改区域的 `Type` 属性。例如，将 `My Third Region` 的类型更改为 `Classic Report`。当您这样做时，`Source`
    节会发生变化，以便您可以指定报表；参见图 3-6。默认情况下，属性编辑器期望报表显示整个表：源类型是 `Table/View`，而 `Table Name`
    属性为空，等待输入表名。属性编辑器在属性名称旁边放置一个红色错误指示符，以提醒您输入表名。它在这一点上非常坚持——在错误被清除之前，它不会让您保存页面。因此，输入
    `DEPT` 作为表名，并观察错误图标消失。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig6_HTML.jpg](img/335103_3_En_3_Fig6_HTML.jpg)


    图 3-6


    经典报表的默认“来源”属性


    或者，报表的来源可以是 SQL 查询。为了尝试一下，将源类型更改为 `SQL Query`。这将导致 `Table Name` 属性被 `SQL Query`
    属性替换，同样带有红色错误指示符。输入查询 `select * from DEPT` 并观察指示符消失。


    图 3-7 显示了运行修改后页面的结果。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig7_HTML.jpg](img/335103_3_En_3_Fig7_HTML.jpg)


    图 3-7


    每个区域都有一个非空的来源'
- fmt: '# Layout Section


    A region’s `Layout` section contains properties that specify the location of the
    region on its page. These properties are shown in Figure [3-8](#335103_3_En_3_Chapter.xhtml#Fig8).

    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig8_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig8_HTML.jpg)

    Figure 3-8

    Default Layout section for a region


    The `Parent Region` and `Position` properties provide two different ways to specify
    the region’s location on the page. Only one of these two properties can have a
    value. A value for `Parent Region` means that the region should be located within
    a specified region, called its `parent`. A value for `Position` means that the
    region should be located at a specific position on the page. By default, a new
    region is located in the `Content Body` position, as shown in Figure [3-8](#335103_3_En_3_Chapter.xhtml#Fig8).
    You can change the position by selecting from its drop-down list, as shown in
    Figure [3-9](#335103_3_En_3_Chapter.xhtml#Fig9).

    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig9_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig9_HTML.jpg)

    Figure 3-9

    Possible region positions


    These positions are listed in the order they appear on the page, from top to bottom.
    Most positions have specific purposes. For example, the `Content Body` position
    is the primary location for general-purpose regions, the `Page Navigation` position
    is intended for the navigation menu along the left side of the page, and the `Breadcrumb
    Bar` is for breadcrumb regions.


    Note: Some of these positions (namely, `After Header`, `Body 1`, `Body 2`, `Body
    3`, `Footer`, and `Before Footer`) are `legacy` positions. That is, they exist
    only to support applications written with older versions of APEX. New applications
    should not use them.


    The set of possible region positions is determined by the page’s `template`. When
    a page is created, it is assigned the default template defined by the application’s
    theme. For example, the default page template for the `Universal` theme is called
    `Standard`.


    It is possible to change a page’s template. Select the component for the page
    in the rendering tree, and look at the `Page Template` property in the `Appearance`
    section. At the moment, the template is set to `Theme Default`. You can change
    the template by clicking the property’s select list. For example, change the template
    for the `Region Practice` page to `Right Side Column`, as shown in Figure [3-10](#335103_3_En_3_Chapter.xhtml#Fig10).

    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig10_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig10_HTML.jpg)

    Figure 3-10

    Page template options


    Now choose a region (say, `My Second Region`) and reexamine its list of `Position`
    values; you will discover that in addition to the values in Figure [3-9](#335103_3_En_3_Chapter.xhtml#Fig9),
    there is also the value `Right Column`. Set the position of `My Second Region`
    to `Right Column` and rerun the page. That region should now appear as a right
    sidebar, as shown in Figure [3-11](#335103_3_En_3_Chapter.xhtml#Fig11). (I added
    more text to the source of the second region to make it more sidebar-like.) Note
    that the sidebar region has an arrow icon at its top left. Clicking the icon toggles
    between displaying the sidebar and hiding it.

    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig11_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig11_HTML.jpg)

    Figure 3-11

    Adding a region to the right sidebar


    The `Layout` section also has a property `Sequence`, which can be seen in Figure
    [3-8](#335103_3_En_3_Chapter.xhtml#Fig8). If two regions are located in the same
    position on a page, their `Sequence` value determines the order in which they
    are placed in that position. Regions are assigned sequence numbers in the order
    in which they were created, but you can change that order by simply assigning
    different values to `Sequence`. For example, the `My First Region` and `My Third
    Region` regions are both located in the `Content Body` position, with sequence
    numbers of `10` and `30`, respectively. If you change the sequence number of `My
    Third Region` to `5`, the rendered page will look similar to Figure [3-11](#335103_3_En_3_Chapter.xhtml#Fig11),
    except that `My Third Region` will appear above `My First Region`.


    Although it is good to experiment with placing regions in various positions on
    the page, most regions on a page are usually located in the same position (in
    particular, `Content Body`). In this case, the remaining properties of the `Layout`
    section determine the relative location of the regions within that position.


    The regions in a position are organized in a grid; each region is assigned to
    a row and column of that grid. APEX positions the regions according to their sequence
    number. The first region is placed in the first column of the first row of the
    grid. Each subsequent region is then placed in one of the following ways:


    *   In the same row and column as the previous region (in which case it is displayed
    beneath the previous region)

    *   In the next column of the current row

    *   In the first column of a new row


    The `Start New Row` and `New Column` properties of the `Layout` section allow
    you to specify which option to use. Figure [3-12](#335103_3_En_3_Chapter.xhtml#Fig12)
    displays these properties for a region that is placed in a new column of the same
    row. Figure [3-8](#335103_3_En_3_Chapter.xhtml#Fig8) showed the case when a region
    begins a new row; note that in this case, the `New Column` property is unnecessary
    and thus not present.

    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig12_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig12_HTML.jpg)

    Figure 3-12

    Specifying row and column region positioning


    After assigning each region to a row and column, APEX then determines the size
    and location of the regions within the position. To do so, APEX uses the values
    of the `Column` and `Column Span` properties (shown in Figure [3-12](#335103_3_En_3_Chapter.xhtml#Fig12))
    to determine the offset and width of each region in a row.


    The `Column` property specifies the offset of the region within its row. APEX
    divides the width of a position into 12 “grid points”; the value of `Column` is
    a number from 1 to 12, denoting one of those points. A value of `1` specifies
    that the region begins at the far left of the position; a value of `7` specifies
    that the region begins in the position’s center. The `Column Span` property specifies
    the width of the column. Its value is also a number from 1 to 12, denoting the
    width in grid points.


    For example, Figure [3-13](#335103_3_En_3_Chapter.xhtml#Fig13) shows yet another
    configuration of the `Region Practice` regions. Here is how you can create that
    configuration starting from Figure [3-11](#335103_3_En_3_Chapter.xhtml#Fig11):
    Begin by changing the page template back to `Theme Default`, moving `My Second
    Region` back to the `Content Body` position with the others, and changing the
    sequence number of `My Third Region` to be the smallest. Then set their `Grid`
    properties as follows:

    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig13_HTML.png](images/335103_3_En_3_Chapter/335103_3_En_3_Fig13_HTML.png)

    Figure 3-13

    Another way to display the Region Practice regions


    *   `My Third Region` starts a new row, its `Column` value is `3`, and `Column
    Span` value is `8`. That is, its width is two-thirds the size of the position
    and centered.'
