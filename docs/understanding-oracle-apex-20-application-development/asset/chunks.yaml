    To summarize, the Single Row Update page has four processes. Three of the processes
    execute during submit; their responsibilities are to run their respective insert,
    delete, and update SQL statements. The fourth process is responsible for running
    an SQL query to initialize a region’s items; it executes during page rendering.


    # Summary


    A process is a page component that lets you access the database and perform calculations.
    This chapter examined the role that processes play in an application. For example,
    a button that performs a submit action typically has an associated process that
    will execute when the button is clicked. A process can also be configured to execute
    during page rendering and calculate initial values for items.


    This chapter focused entirely on PL/SQL processes. To specify the behavior of
    a PL/SQL process, you write PL/SQL code. PL/SQL integrates SQL commands directly
    into a general-purpose programming language, which makes it easy to write database-aware
    code. Chapter 10 examines other process types.


    Although PL/SQL processes can be very useful, they require careful coding. This
    chapter examined one common pitfall, known as the lost update problem. You learned
    how to recognize the problem and how to write the necessary PL/SQL code to avoid
    it.


    # 8. Data Validation


    When a process writes to the database, it typically takes its values from the
    session state. Consequently, an application developer must verify that the session
    state values are valid, to ensure that the process was used appropriately and
    to preserve the integrity of the database. This chapter examines three aspects
    of a valid session state—constraint preservation, input validation, and process
    validation—and shows you how to implement them in an APEX application.


    ## Constraint Preservation


    The integrity of a database is important. The presence of an incorrect record
    not only reduces the value of any query involving that record; it also reduces
    the value of the entire database—because if one record is wrong, users will suspect
    that other records might also be wrong. Such databases can quickly become useless.


    The primary mechanism that a database system uses to protect itself is the constraint.
    A database administrator typically specifies constraints when the tables are created.
    For example, the `EMP` table has the following four constraints defined for it:


    *   The column `EmpNo` is a key, which ensures that no two employees have the
    same `EmpNo` value.

    *   The column `DeptNo` is a foreign key of `DEPT`, which ensures that every non-`null`
    value of `DeptNo` corresponds to an existing `DEPT` record.

    *   The column `Mgr` is a foreign key of `EMP`, which ensures that every non-`null`
    value of `Mgr` corresponds to an existing `EMP` record.

    *   An `EmpNo` value cannot be null, which ensures that every employee has a number.


    Let’s add two more constraints to the database:


    *   An `EName` value cannot be null, which ensures that every employee has a name.

    *   A `Sal` value must be at least 0, which ensures against meaningless salaries.


    You can define these constraints by separately executing the two SQL commands
    of Listing 8-1 in the APEX SQL workshop.


    ```

    alter table EMP

    add constraint ValidName

    check (EName is not null)

    alter table EMP

    add constraint ValidSalary

    check (Sal >= 0)

    Listing 8-1

    Two Additional Constraints for the EMP Table

    ```


    Whenever you write an APEX page that updates the database, you must be aware of
    its constraints. To investigate these issues, this chapter will use the `Revised
    Employee Data Entry` page as a running example. This page was discussed in Chapter
    7 and is page 19 of the `Employee Demo` application.


    Using this page, try to insert a new employee that does not have a value for `EName`.
    You won’t be able to do it—the database will reject the insertion because the
    new record would violate the `null` value constraint. APEX displays the error
    message shown in Figure 8-1.


    ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig1_HTML.jpg](images/335103_3_En_8_Chapter/335103_3_En_8_Fig1_HTML.jpg)


    Figure 8-1

    Result of attempting to violate a constraint


    Although the database was able to enforce the constraint, its error message is
    not particularly satisfactory. The message is unhelpful, giving obscure, system-level
    details about what went wrong. It also does not tell you what caused the mistake
    or how to fix it. In fact, the message leaves open the possibility that the problem
    is due to a bug in the system over which you have no control.


    Consequently, APEX pages should always anticipate attempted constraint violations
    and handle them itself. Ideally, the database will never need to throw one of
    its obscure constraint violation messages, because APEX would have detected and
    handled the violation first. APEX has several features that can help you in this
    regard. Let’s examine how they apply to each of the preceding constraints.


    A violation of the key constraint could occur if a user is allowed to choose the
    `EmpNo` value for a new employee. The best way to handle this constraint is to
    not give the user that choice. For example, the `Revised Employee Data Entry`
    page does not have a place for a user to enter an employee number. Instead, the
    SQL insertion command obtains the new `EmpNo` value automatically from an insertion
    trigger, thereby guaranteeing that a unique value will be chosen.


    A violation of a foreign key constraint could occur if a user is able to enter
    an inappropriate value for `DeptNo` or `Mgr`. The solution adopted by the `Revised
    Employee Data Entry` page is to use list-based items. The advantage of a list-based
    item is that you can populate it with exactly the values you want, which means
    that there is no way that the user can pick an improper value. (Caveat: this statement
    is true for a properly secured application. Chapter 13 discusses how a malicious
    user can select arbitrary values from an unsecured list-based item.)


    A violation of a `null` value constraint on `EName` could occur if a user does
    not enter a value into the item `P19_INSERT_ENAME`. The solution to this problem
    is to use the item’s `Value Required` property, which is in its `Validation` section.
    If you set the property to `On`, then APEX will refuse to submit the page as long
    as that item value is `null`. Instead, APEX will redisplay the page with an error
    message under the item, as shown in Figure 8-2. This error message is far better
    than the one in Figure 8-1.


    ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig2_HTML.jpg](images/335103_3_En_8_Chapter/335103_3_En_8_Fig2_HTML.jpg)


    Figure 8-2

    A better way to handle an attempted constraint violation


    Finally, consider the constraint on `Sal`. The item `P19_INSERT_SAL` is a number
    field, which has the properties `Minimum Value` and `Maximum Value` in its `Settings`
    section. Set the minimum value to `0`, and try to insert a record having a negative
    salary. APEX will display the error message shown in Figure 8-3.'
