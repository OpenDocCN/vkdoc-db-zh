    ## Local Variables

    A PL/SQL block can have a `variable declaration section` prior to the `begin`
    keyword. The declaration section starts with the keyword `declare` and is followed
    by a series of variable declarations. The code of Listing 7-5 declares four local
    variables: `v_amount`, `v_saleCommission`, `v_prevCommission`, and `v_newCommission`.
    The syntax for each declaration is similar to the syntax for declaring table columns
    in SQL, and the possible variable types are also the same. For example, the last
    three variables have the type `number(7,2)`, which is the same type as the column
    `Comm` in the `EMP` table.

    Local variables and item references can be used interchangeably in a PL/SQL block.
    The difference is that local variables are referenced as is, whereas an item reference
    requires a prepended colon. For example, the SQL `update` command in step 3 references
    both the local variable `v_newCommission` and the item `P18_SOLO_SALESMAN`.

    Because items are referenced using bind variable syntax, they are easy to spot.
    However, local variable references in SQL commands are hard to distinguish from
    column names or function calls. To avoid confusion, you should always name local
    variables so that people know they are variables. A common convention, which is
    adopted here, is to begin each local variable name with `v_`.


    ## Comments

    As in SQL, PL/SQL denotes comments with two consecutive minus signs. All characters
    following the two minus signs are ignored until the end of the line.


    ## Assignment Statements

    Assignment statements in PL/SQL use `:=` as the assignment operator. Assignment
    can also be used in the `declare` section to assign an initial value to a local
    variable.


    ## Conditional Statements

    PL/SQL supports several forms of a conditional statement; the form appearing in
    step 1 of Listing 7-5 is good for general-purpose use. Note that the keywords
    act as section boundaries: the conditional expression appears between `if` and
    `then`, the statements to be executed when the condition is `true` appear between
    `then` and `else`, and the statements to be executed when the condition is `false`
    appear between `else` and `end if`. As usual, if there are no statements between
    the `else` and `end if` keywords, the `else` keyword can be omitted.


    ## Handling Multi-Row SQL Queries

    Now let’s see how to build the `Shared Commission` region. Its `Enter Sale` region
    is essentially the same as in the `Solo Commission` region. Its item names are
    `P18_SHARED_SALESMAN` and `P18_SHARED_AMOUNT`.

    The items in the `Commission Info` region are named `P18_SHARED_SALE_COMMISSION`,
    `P18_SHARED_COMMISSION_EACH`, and `P18_SHARED_NEW_COMMISSIONS`.

    The select list `P18_SHARED_SALESMAN` has the same property values as `P18_SOLO_SALESMAN`;
    the difference is that its `Allow Multi Selection` property is set to `Yes`, with
    a `Height` value of `4`. Recall from Chapter 5 that the value of such an item
    is a string containing the return values separated by colons. For example, `ALLEN`
    and `TURNER` are chosen from the multi-value select list `P18_SHARED_SALESMAN`.
    Because their corresponding employee numbers are 7499 and 7844, the value of this
    item is the string `"7499:7844"`.

    It is not especially easy to extract the information you need from this string,
    so some fancy footwork is required. You will need to do two things: determine
    the number of selected employees, and extract their records from the `EMP` table.

    Note that the number of selected employees is one more than the number of colons
    in the string. You can determine the number of colons by using the SQL `replace`
    function to create a new string in which the colons are replaced by the empty
    string (effectively removing the colons) and then comparing the lengths of the
    two strings. That is, if `P18_SHARED_SALESMAN` contains the string, the number
    of employees is given by this expression:

    ```

    1 + length(:P18_SHARED_SALESMAN) - length(replace(:P18_SHARED_SALESMAN, '':'',
    ''''))

    ```

    To extract the records for each selected employee, use the `instr` function, just
    as you did for the `Filter by Possible Department` page. The following query will
    retrieve the `EMP` record of all selected employees:

    ```

    select *

    from EMP

    where instr( '':''|| :P18_SHARED_SALESMAN||'':'',  '':''||EmpNo||'':'' ) > 0

    ```

    With these issues taken care of, you can now write the process for the region''s
    `Submit` button. The PL/SQL code appears in Listing 7-6.

    ```

    declare

    v_saleCommission number(7,2);

    v_amount         int := :P18_SHARED_AMOUNT;

    v_empCount       int;

    v_commissionEach number(7,2);

    v_empInfo        varchar2(25);

    v_output         varchar2(250) := '''';

    begin

    -- Step 1: Calculate the new commission as 15% of the first $100

    -- and then 10% of the remaining sale price.

    if v_amount > 100 then

    v_amount := v_amount - 100;

    v_saleCommission := 15 + (v_amount * 0.1);

    else

    v_saleCommission := v_amount * 0.15;

    end if;

    -- Step 2: Determine the shared commission.

    v_empcount := 1 + length(:P18_SHARED_SALESMAN) - length(replace(:P18_SHARED_SALESMAN,
    '':'', '''' ));

    v_commissionEach := v_saleCommission / v_empcount;

    -- Step 3: Update the EMP table.

    update EMP

    set Comm = Comm + v_commissionEach

    where instr( '':''||:P18_SHARED_SALESMAN||'':'',  '':''||EmpNo||'':'' ) > 0;

    -- Step 4: Use a loop to collect employee info.

    for row in (

    select EName, Comm

    from EMP

    where instr( '':''||:P18_EMPNO_SHARED||'':'',  '':''||EmpNo||'':'' ) > 0 )

    loop

    v_empInfo := row.EName || '': '' || row.Comm || chr(13);

    v_output  := v_output || v_empInfo;

    end loop;

    -- Step 5: Write the item values.

    :P18_SHARED_SALE_COMMISSION  := v_saleCommission;

    :P18_SHARED_COMMISSION_EACH  := v_commissionEach;

    :P18_SHARED_NEW_COMMISSIONS  := v_output;

    end;

    ```

    Listing 7-6 PL/SQL Code to Handle Shared Commissions'
