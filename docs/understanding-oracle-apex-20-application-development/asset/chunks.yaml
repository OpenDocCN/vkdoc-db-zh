- fmt: '# Concurrent Database Updates


    ## Lost Update Problem


    Step 1, which calculates the commission on the sale, is the same as before. Step
    2 calculates the prorated commission for each employee, which you get from dividing
    the commission by the employee count. Step 3 updates the records for the selected
    employees. Step 5 writes a value to each item in the `Commission` region.


    The most interesting code appears in step 4, in which you handle each selected
    employee. The issue is that the SQL query to retrieve the employee information
    returns multiple rows, so you cannot use the `into` clause the way that you did
    earlier. Instead, the technique is to loop through the records in the query, processing
    one row each time through the loop.


    The loop has the following basic structure:


    ```

    for r in (  )

    loop

    -- statements to process row r

    end loop;

    ```


    Variable `r` need not be declared. Each time through the loop it will hold the
    next row of the query. If `C` is an output column of the query, the expression
    `r.C` will return the `C`-value of the current row. For example, in Listing 7-6,
    the row variable is named `row`, and the two output columns of the query are `EName`
    and `Comm`. The loop code therefore makes reference to `row.EName` and `row.Comm`.


    The body of the loop processes each selected employee. Its task is to construct
    the string that summarizes the new commission of that employee. The code creates
    the summary string by concatenating the employee''s name with the new commission
    value. The expression `chr(13)` denotes a newline character.


    One frequently encountered situation is called the *lost update problem*. It arises
    when two users update the same database record at approximately the same time,
    and the timing of the updates is such that the database system loses one of them.
    Here are two scenarios that illustrate the problem.


    For the first scenario, consider the `Employee Data Entry` page of Figure 7-5.
    Assume that two users use the `Update Employee` region to update Allen''s record—user
    A wants to change the salary to `1800`, and user B wants to change the job to
    `ANALYST`. If both users click the `GetInfo` button at approximately the same
    time, then they both will retrieve the same record from the `EMP` table, which
    says that Allen is a salesman who has a salary of 1600. When user A changes the
    salary and clicks the `Update` button, that record will be replaced by one saying
    that Allen is a salesman who has a salary of 1800. User B, however, doesn''t see
    the updated salary. When user B changes the job and clicks the `Update` button,
    the record will be replaced by one saying that Allen is an analyst making 1600.


    This scenario is problematic, regardless of who writes first. If user A modifies
    first, user B will overwrite the new salary with its previous value; if user B
    modifies first, user A will overwrite the new job with its previous value. No
    matter what happens, the database system will lose one of the updates.


    You can verify this scenario for yourself. Open the `Employee Data Entry` page
    in two private browser windows (using private windows keeps APEX from realizing
    that they both belong to you). Select the same employee in each window and click
    the `GetInfo` button. Then do an update in each window and click their `Update`
    button. Now look at the modified record in the report—you will see that your first
    update was lost.


    For the second scenario, consider the `Sales Commission` page of Figure 7-7. Suppose
    that Allen made solo sales of $100 and $200, earning commissions of $15 and $25,
    respectively. Users A and B each enter one of the sales into the `Solo Commission`
    region of the page and click its `Submit` button concurrently. Suppose that the
    execution of their PL/SQL processes both hit step 2 of Listing 7-5 at roughly
    the same time, meaning that both processes would see a current commission of $300.
    User A''s process would then calculate a new commission of $315 in step 3, and
    user B''s process would calculate a new commission of $325. Whichever process
    updates last would overwrite the commission of the process updating first. The
    overwritten update would be lost.


    You can also verify this scenario for yourself. This time, open the `Sales Commission`
    page in your two private browser windows. In each window, select the same salesman,
    pick different sale amounts, and click the `Submit` button. Most likely, neither
    update will be lost. The reason is that the lost update scenario will only occur
    when the APEX server happens to postpone its execution of the first process immediately
    after step 2, which is possible but unlikely. You can improve the odds considerably
    by introducing a *sleep* statement into the process immediately after step 2,
    as follows:


    ```

    ...

    v_newCommission := v_prevCommission + v_saleCommission;

    dbms_session.sleep(10);

    -- Step 3: Update the employee''s record.

    ...

    ```


    This statement causes the process to sleep for 10 seconds before beginning step
    3. Now repeat the experiment. If you click the two `Submit` buttons within 10
    seconds of each other, the problem scenario will occur and the first commission
    you submitted will be lost.


    In both of these scenarios, the occurrence of a lost update depends entirely on
    the timing of the user requests. This dependence on timing means that lost updates
    tend to occur at seemingly random times. For example, it is quite possible for
    an application to run for months (or years) without a lost update and then have
    several in short succession.


    Lost updates are clearly a very bad thing. A lost update might not be detected
    until long after it occurred, at which point it might be too late. The application
    developer must ensure that they never occur. Their unpredictable nature makes
    it hard to discover the problem via testing. Consequently, any PL/SQL process
    that updates the database must be written specifically to avoid lost updates.


    ## Avoiding Lost Updates


    Lost updates occur when two concurrent processes read the same data and then make
    conflicting updates to it. The way to avoid this problem is to force the conflicting
    processes to interact sequentially, so that the second process reads the data
    written by the first one.


    The Oracle database system uses *write locks* to ensure this sequentiality. You
    specify write locks by adding the clause `for update` to an SQL query. When your
    process executes a query having that clause, the database system locks the query''s
    output records so that they cannot be read or modified by any other process. Your
    process can then modify these records without fear of conflict. The database system
    releases the locks when your process completes.


    For example, consider the second scenario earlier, in which two users concurrently
    update the `Solo Commission` region. Step 2 of Listing 7-5 contains the problematic
    SQL query:


    ```

    select Comm into v_prevCommission

    from EMP

    where EmpNo = :P18_EMPNO;

    ```


    The output of this query is the `Comm` value of the specified `EMP` record, which
    will be modified later in step 3. To keep other processes from accessing this
    record, you lock it by changing the query to the following:


    ```

    select Comm into v_prevCommission

    from EMP

    where EmpNo = :P18_EMPNO for update;

    ```'
