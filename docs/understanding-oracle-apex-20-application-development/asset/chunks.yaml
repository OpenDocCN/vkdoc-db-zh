- fmt: 'Figure [10-33](#335103_3_En_10_Chapter.xhtml#Fig33) shows the`Link Builder`screen
    for this action. The JavaScript function`apex.confirm`displays a confirmation
    window; clicking`Yes`causes the page to submit using the request named`DELETE`.
    In other words, the`DELETE`button actually does perform a submit, albeit indirectly
    through JavaScript.


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig33_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig33_HTML.jpg)


    Figure 10-33

    Link Builder screen for the DELETE button


    The`Processing`tab of the form page contains two components: the ARP process common
    to all form regions and a branch. The process fires when the CREATE, SAVE, or
    DELETE button is clicked. Since these buttons are the only components on the page
    that perform a submit action, the process does not need to be conditional. The
    branch unconditionally redirects to the report page following the submit processing,
    which explains why every button click from the form page causes a return to the
    report page.


    ## Customizing the Report and Form


    Although the`Report with Form`wizard produces fully functional pages, they are
    raw and unpolished. It is unlikely that you would want to use them as is in any
    real application. Instead, you ought to think of them as the foundation of a more
    expansive, customized application. These customizations fall into three basic
    categories: aesthetic, functional, and organizational.


    The aesthetic customizations improve the look and feel of the application. For
    example, you can use the techniques of Chapter [3](#335103_3_En_3_Chapter.xhtml)
    to improve the format of the report and its columns and the techniques of Chapter
    [5](#335103_3_En_5_Chapter.xhtml) to improve the appearance and layout of the
    buttons and items. You can change the default region titles, button text, and
    item labels.


    Another aesthetic issue concerns the visibility of form items. Recall from Figure
    [10-25](#335103_3_En_10_Chapter.xhtml#Fig25) that the`Report with Form`wizard
    asked you to specify the items that should appear in the form page. The problem
    is that the form page gets used for both insert and update, and these two operations
    have different requirements. For example, the insert operation needs to have items
    for all columns, but you might want to hide the items for columns that receive
    default values. Moreover, the update operation should only show items for updatable
    columns. Therefore, it would be a good idea to provide a`Server-side Condition`expression
    for each item, specifying when that item should be visible.


    Alternatively, you could choose to disable an item instead of hiding it. Each
    item has a property section`Read Only`, which lets you specify a condition, much
    like the`Server-side Condition`section does. Whereas`Server-side Condition`hides
    an item,`Read Only`makes it unmodifiable. So, for example, in update mode, it
    might be a good idea to display the entire record, but format the unmodifiable
    ones (such as`EName)`) as read-only.


    Functional customizations add features to the pages generated by the wizard. For
    example, you could add`Previous`and`Next`buttons to the form page. You could also
    modify the insert and update operations so that they remain on the form page after
    changing the database, as in the`Single Row Update`page of Figure [7-24](#335103_3_En_7_Chapter.xhtml#Fig24).


    Organization-related customizations involve adding or deleting pages and regions
    and moving existing page components among them. For example, the report and form
    regions could be moved to the same page. Or you could split the form region into
    two regions—one for insertion and one for update/delete—as in the`Single Row Update`page.
    Or you could even have three form regions, as in the`Employee Data Entry`page
    of Figure [7-5](#335103_3_En_7_Chapter.xhtml#Fig5).


    ## Form Pages


    The two pages created by the`Report with Form`wizard are very loosely connected.
    Their only interaction is when a link on the report page or its`Create`button
    is clicked, both of which set the value of the item`P32_EMPNO`on the form page.
    Consequently, the form page can be used in conjunction with other kinds of page,
    the only requirement being that the other page provides the form page with an
    employee number.


    In this section, instead of connecting a report with a form, I want to connect
    a tree with a form. A tree depicts a table’s records hierarchically, which is
    possible when the table has a field that can be the basis of the hierarchy. For
    example, the`Mgr`field of`EMP`determines a hierarchy, known in business as the
    management hierarchy. The president, who has no manager, is the root of the hierarchy.
    Every other employee is the child of its manager.


    Page 33 of the`Employee Demo`application displays the employee records as a tree.
    This page is named`Management Hierarchy Tree`and appears in Figure [10-34](#335103_3_En_10_Chapter.xhtml#Fig34).
    Each node of the tree displays an employee name. Clicking a name redirects to
    a form page, named`Management Hierarchy Form`, that displays additional values
    for that employee and gives you the opportunity to update them or to delete the
    employee’s record. Figure [10-35](#335103_3_En_10_Chapter.xhtml#Fig35) shows the
    form page that results from clicking`ADAMS`.


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig35_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig35_HTML.jpg)


    Figure 10-35

    The Management Hierarchy form page


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig34_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig34_HTML.jpg)


    Figure 10-34

    The Management Hierarchy tree page


    ### Implementing the Tree Page


    Although APEX has a page wizard to create trees, it is more instructive (and simpler!)
    to create the page yourself. So create page 33 as a blank page named`Management
    Hierarchy Tree`, and create a region of type`Tree`. Its source should be the`EMP`table.


    The properties to configure the tree are in the region’s`Setting`section, which
    you get to from the`Attributes`node in the rendering tree. Figure [10-36](#335103_3_En_10_Chapter.xhtml#Fig36)
    shows the`Settings`properties for the tree of Figure [10-34](#335103_3_En_10_Chapter.xhtml#Fig34).


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig36_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig36_HTML.jpg)


    Figure 10-36

    Tree region settings


    The property named`Hierarchy`should have the value`Computed with SQL`, which tells
    APEX to compute the hierarchy from the following settings:


    *   `Node Label Column`is the field whose values are the labels of the tree nodes.

    *   `Node Id Column`is the primary key field.

    *   `Parent Key Column`is the field that defines the hierarchy. A record’s value
    for this field specifies the primary key of its parent.

    *   `Start Tree With`specifies the root of the hierarchy. The setting`Value is
    NULL`asserts that the root of the hierarchy is the record whose parent key column
    value is`null`.


    Run your page at this point, and explore the tree. If a node has children, there
    will be an arrow to its left. Clicking on these arrows will expand or contract
    their list of children.


    The final configuration step is to specify what happens when a user clicks a node
    in the tree. The property you need is`Link`, which is further down the`Settings`section.
    Clicking its box brings up the`Link Builder`wizard. Figure [10-37](#335103_3_En_10_Chapter.xhtml#Fig37)
    shows how I configured the link. It specifies that clicking the node redirects
    to page 34 and sets the value of`P34_EMPNO`to the node’s`EMPNO`value. Note that
    substitution string syntax is used to reference the value of a node’s field.


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig37_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig37_HTML.jpg)'
