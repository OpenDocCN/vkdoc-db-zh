    *清单 7-3：UpdateEmp 流程的 PL/SQL 代码*


    `GetInfo`按钮的流程名为`GetEmpInfo`。它与页面上其他流程的不同之处在于，它从数据库读取数据而不是写入数据。该技术是编写一个 SQL 查询，将其输出直接放入页面上的项目中。清单
    7-4 中的 PL/SQL 代码正是这样做的。

    ```sql

    begin

    select Job, Sal, DeptNo

    into :P17_UPDATE_JOB, :P17_UPDATE_SAL, :P17_UPDATE_DEPTNO

    from EMP

    where EmpNo = :P17_UPDATE_EMPNO;

    end;

    ```

    *清单 7-4：GetEmpInfo 流程的 PL/SQL 代码*


    该查询的关键部分是关键字`into`开头的子句。该子句表明查询的三个输出值将被放入三个指定的项目中。换句话说，`into`子句将 SQL 查询转换为一个 PL/SQL
    语句，该语句从数据库中提取值并将它们分配给项目。请注意，`into`子句仅在 SQL 查询恰好返回一行时才有意义。执行多行 SQL 查询的流程需要对查询输出进行完全不同的处理，正如你将在下一节中看到的那样。


    ## 用于计算值的 PL/SQL


    本节探讨 PL/SQL 的编程语言方面。PL/SQL 的核心是一种传统的编程语言，具有变量、赋值语句、条件语句和循环。在这方面，它与 C、Java、Python
    和类似语言没有太大区别。如果你有使用这些语言中的任何一种的经验，那么编写 PL/SQL 代码最困难的部分可能是找出合适的语法。


    例如，让我们构建如图 7-7 所示的`Sales Commission`页面，这将是`Employee Demo`应用程序的第 18 页。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig7_HTML.jpg](img/335103_3_En_7_Fig7_HTML.jpg)

    图 7-7：用于计算销售佣金的页面


    每次销售人员完成销售时都会使用此页面。假设销售人员在销售额的前 100 美元获得 15%的佣金，在剩余金额上获得 10%的佣金；如果多名销售人员合作完成一笔销售，他们平均分配佣金。该页面有两个外部区域。顶部区域名为`Solo
    Commission`，用于输入个人销售。底部区域名为`Shared Commission`，用于输入协作销售。


    `Solo Commission`区域的工作方式如下：用户选择销售人员的姓名，并将销售金额输入到`Enter Sale`区域。单击`Submit`按钮提交页面并导致流程执行。该流程执行多项操作：它根据销售额计算佣金，从`EMP`表中检索该销售人员之前的佣金，通过将两个值相加来计算新的佣金金额，并将这三个值放入`Commission
