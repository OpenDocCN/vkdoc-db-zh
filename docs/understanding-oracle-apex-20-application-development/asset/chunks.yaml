    ## Cascading Lists


    The next task is to build a page that enables a user to choose an employee name
    from a select list and then displays a report containing information about that
    employee. This page, titled `Cascading Lists`, is page 14 of the `Employee Demo`
    application and appears in Figure [6-16](#335103_3_En_6_Chapter.xhtml#Fig16).
    The page has two regions, each of which gives a solution to this task.


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig16_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig16_HTML.jpg)


    Figure 6-16: Cascading lists


    ### Top Region


    The top region has a single item, named `P14_EMPNO`. This item is a select list
    that displays the names of all employees and has employee numbers as the result
    values. That is, its list-of-values query is this:


    ```

    select EName, EmpNo

    from EMP

    order by EName

    ```


    The top region has no button. Instead, the select list has the action `Redirect
    and Set Value`, which means that choosing an employee name from the select list
    causes the item’s value to be changed in the session state.


    The type of the top region is `Classic Report`. Its source query is customized
    by the value of `P14_EMPNO`, as follows:


    ```

    select e.EmpNo, d.DName, e.Job, e.Sal, d.Loc

    from EMP e join DEPT d

    on    e.DeptNo = d.DeptNo

    where e.EmpNo = :P14_EMPNO

    order by EmpNo

    ```


    If you try out this region, you should discover that it is easy to scan through
    the list of names, due to the small number of employees. Suppose, however, that
    the `EMP` table were large, with thousands of employees to pick from. Scrolling
    through the select list would be awkward and time-consuming, even if the names
    were sorted. A common solution to this problem is to let the user choose the name
    in steps, via a series of select lists.


    ### Bottom Region


    The bottom region of Figure [6-16](#335103_3_En_6_Chapter.xhtml#Fig16) uses two
    select lists to choose an employee. The first select list displays the first letter
    of each employee name, and the second one displays the names of employees whose
    names begin with that letter. This technique is called a *cascading list*, in
    which the display values of the second select list change according to the value
    selected for the first one. This technique can be extended to multiple select
    lists—the values of each select list except the first change according to the
    values chosen for the select lists previous to it. The advantage of this approach
    is that a user can scroll through several small select lists instead of one large
    one.


    The two select lists in the bottom region are named `P14_FIRST_LETTER` and `P14_EMPNO_CASCADE`.
    They are defined as follows.


    The select list `P14_FIRST_LETTER` is not dependent on any other items, so its
    query is straightforward:


    ```

    select FirstLetter as DisplayVal, FirstLetter as ResultVal

    from  (select distinct substr(EName, 1, 1) as FirstLetter

    from EMP)

    order by DisplayVal

    ```


    The list `P14_EMPNO_CASCADE` is dependent on the value of `P14_FIRST_LETTER`,
    resulting in the following query:


    ```

    select EName, EmpNo

    from EMP

    where substr(EName, 1, 1) = :P14_FIRST_LETTER

    order by EName

    ```


    The source of the bottom report is exactly the same as the top report, except
    that `P14_EMPNO` is replaced by `P14_EMPNO_CASCADE`. If you set the action of
    both these select lists to `Redirect and Set Value`, then choosing a first letter
    causes the list of names to be updated, and choosing a name causes the report
    to be updated.


    ### Implementing Cascading Lists in APEX


    The concept of a cascaded list is common enough that APEX has a specific property
    to handle it, called `Parent Item(s)`, which is in the `Cascading List of Values`
    section of a select list. Figure [6-17](#335103_3_En_6_Chapter.xhtml#Fig17) shows
    the specification for the `P14_EMPNO_CASCADE` list.


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig17_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig17_HTML.jpg)


    Figure 6-17: Specifying the cascading parent item


    This figure specifies that `P14_EMPNO_CASCADE` depends on the value of `P14_FIRST_LETTER`;
    that is, it monitors the behavior of `P14_FIRST_LETTER` and refreshes itself when
    the value of `P14_FIRST_LETTER` changes. Consequently, the action of `P14_FIRST_LETTER`
    should now be `None`. The action of `P14_EMPNO_CASCADE` should be `Redirect and
    Set Value`, as before. The `Cascading List of Values` property enables APEX to
    use JavaScript and Ajax to refresh the select list without having the re-render
    the entire page. It is the most efficient way to implement cascading.


    ## Conditional Rendering


    Throughout your use of the app builder, you have come across numerous situations
    in which choosing a particular value in the property editor caused the editor
    to suddenly display other properties. The `Link Builder` page shown in Figure
    [6-15](#335103_3_En_6_Chapter.xhtml#Fig15) is such an example—if you choose the
    target type `URL`, then the `Set Items` properties suddenly disappear, and if
    you change its value back to `Page in this application`, then those items reappear.
    What’s going on here?


    Although it looks like the items are getting created and deleted on the spot,
    they are not; instead, those items always exist. When you are in the link builder
    and select the value `Page in this application`, APEX displays the additional
    items; when you select the value `URL`, APEX hides them. This ability to dynamically
    show or hide an item is called *conditional rendering*.


    Conditional rendering can be defined for items, buttons, and regions. Each one
    has a `Server-side Condition` section in its property editor, which lets you choose
    a condition type from a select list. Although there are many condition types,
    the focus here is on the type `SQL expression`. The value of this type is an SQL
    expression that returns `true`/`false`. The value of the expression determines
    whether the item, button, or region is rendered.


    ### Example 1: Employee Details Region


    For an example, let’s return to the `Employees by Department` page shown in Figure
    [6-8](#335103_3_En_6_Chapter.xhtml#Fig8). Note that the detail report region will
    be empty until a value from the master report has been chosen. If you don’t want
    the page to display an empty report region, then you can use conditional rendering,
    displaying the region only when the item `P12_DEPTNO` is not `null`. The region’s
    conditional SQL expression is shown in Figure [6-18](#335103_3_En_6_Chapter.xhtml#Fig18).


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig18_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig18_HTML.jpg)


    Figure 6-18: Conditionally displaying the Employee Details region


    ### Example 2: Display Table Page


    For another example, consider the `Display Table` page shown in Figure [6-19](#335103_3_En_6_Chapter.xhtml#Fig19),
    which will be page 15 of the `Employee Demo` application. The `Select Table` region
    contains two checkboxes and a button. Clicking the button causes the checked tables
    to be displayed.


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig19_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig19_HTML.jpg)


    Figure 6-19: Conditional region rendering'
