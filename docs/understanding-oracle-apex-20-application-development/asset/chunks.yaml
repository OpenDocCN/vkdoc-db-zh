- fmt: '# Clearing Session State


    Take some time to run your `Form Update` page. Choose a record, modify its values,
    and click the `Update` button. Everything should work. However, you will discover
    a problem with the `Delete` button. When you click it, APEX will display an error
    message. The problem is that after the deletion, the item `P30_EMPNO` still contains
    the deleted employee number. So during page rendering, the initialization process
    will attempt to fetch values from this nonexistent record, thereby generating
    the error. The solution is to set `P30_EMPNO` to null after the deletion occurs.
    In fact, this is exactly what you did in the PL/SQL code for the `DeleteEmp` process
    shown in Listing [7-21](#335103_3_En_7_Chapter.xhtml#PC40).


    But how to get the `Delete` button on page 30 to set the value of an item? Since
    you cannot touch the built-in ARP process, your only option is to create another
    process that will execute after the deletion occurs. Let’s call this process `ClearEmpNo`.


    One way to implement `ClearEmpNo` is as a PL/SQL process having the following
    code:


    ```

    begin

    :P30_EMPNO := null;

    end;

    ```


    Those of us familiar with PL/SQL coding realize that this is a straightforward,
    simple solution. But APEX has another solution for those unfamiliar with PL/SQL,
    namely, the `Clear Session State` process type. Here is how to use it.


    Change the type of your process `ClearEmpNo` to `Clear Session State`. Figure
    [10-14](#335103_3_En_10_Chapter.xhtml#Fig14) shows its initial properties. The
    `Type` property in the `Settings` section specifies which items to clear. By default,
    its value is `Clear all items on the Current Page`. Other values for the property
    let you clear individual items, all items on a specified page, or all items on
    all pages.


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig14_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig14_HTML.jpg)


    Figure 10-14: Properties of a Clear Session State process


    Although the default value is perfectly fine, it is also reasonable to change
    the type to `Clear Items`. If you do, then you will be able to enter explicit
    item names for the `Item(s)` property, as shown in Figure [10-15](#335103_3_En_10_Chapter.xhtml#Fig15).


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig15_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig15_HTML.jpg)


    Figure 10-15: Configuring a process to clear P30_EMPNO


    No matter how you create the `ClearEmpNo` process, you must perform the following
    two steps to ensure that it only executes after a delete operation:


    *   You must set the value of its `When Button Pressed` property to `Delete`.

    *   You must set its sequence value (shown in Figure [10-14](#335103_3_En_10_Chapter.xhtml#Fig14))
    to be larger than that of the ARP process.


    # Inserting Records


    The second region of the `Form Update` page of Figure [10-9](#335103_3_En_10_Chapter.xhtml#Fig9)
    is called `Insert Employees`. It works as follows: A user enters values into the
    five items of the region and clicks the `Insert` button. APEX will then insert
    a record into the EMP table, using default values for the unmentioned fields.


    An ARP process can only insert values appearing in page items. Thus, it is important
    that the `Insert Employees` region have an item for each field of `EMP`. In other
    words, the source of the form should be the query `select * from EMP`. You can
    then hide the items that are to receive default values.


    When you create a form region having the preceding source, APEX will immediately
    inform you of a problem. The issue is that several of its generated items have
    duplicate names. The name of a generated item is based entirely on the name of
    its corresponding field, so a field name that appears in multiple forms on the
    page will have multiple items with the same name.


    Fortunately, the solution is simple; just rename the problematic items. Figure
    [10-16](#335103_3_En_10_Chapter.xhtml#Fig16) shows my strategy, which was to add
    “`INSERT`” to all items in the `Insert Employees` region, duplicate or not.


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig16_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig16_HTML.jpg)


    Figure 10-16: Renaming duplicate items


    The two initialization processes also have duplicate names. To resolve the problem,
    I renamed each one to have the name of their region, as shown in Figure [10-17](#335103_3_En_10_Chapter.xhtml#Fig17).


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig17_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig17_HTML.jpg)


    Figure 10-17: Renaming duplicate initialization processes


    You have now resolved all of the issues with the region, so APEX will finally
    let you save your changes. Your remaining tasks are similar to what you did for
    the `Update Employees` form:


    *   Turn on the `Primary Key` property for `P30_INSERT_EMPNO` in its `Source`
    section.

    *   Turn on the `Enabled` property in the `Edit` section of the `Insert Employee
    Attributes`. Then ensure that only the `Add Row` operation is checked.

    *   Create a button named `Insert`. Configure its `Action` property to be `Submit
    Page` and its `Database Action` property to be `SQL INSERT action`.

    *   Go to the property editor for the ARP process named `Process form Insert Employees`,
    and give its `When Button Pressed` property the value `Insert`.

    *   Format the type and layout of the items according to your taste.


    If you try out your new region, you will discover one further problem, namely,
    that the form expects you to always have values for `P30_EMPNO` and `P30_INSERT_EMPNO`.
    This requirement was appropriate when `Update Employees` was the only region,
    because the `Delete` and `Update` operations make no sense without an employee
    number. But `P30_EMPNO` can (and should) be `null` when the `Insert` button is
    pressed. Similarly, `P30_INSERT_EMPNO` should be null when the `Delete` and `Update`
    buttons are pressed. Thus, you need to disable the `Value Required` property in
    the `Validation` section of both items.


    The `Insert` operation places the new employee number into `P30_INSERT_EMPNO`.
    Although the item is hidden, its value can be part of the `Success Message` property
    of the ARP process, as shown in Figure [10-18](#335103_3_En_10_Chapter.xhtml#Fig18).


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig18_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig18_HTML.jpg)


    Figure 10-18: Improving the Insert button’s success message


    # Computations


    The `Insert Employees` region shown in Figure [10-9](#335103_3_En_10_Chapter.xhtml#Fig9)
    only displays items for the columns `EName`, `Job`, `Salary`, and `DeptNo`; the
    items for `HireDate`, `Comm`, and `Offsite` are hidden. The idea is these hidden
    items will contain default values—in particular, `P30_INSERT_HIREDATE` will contain
    the current day, `P30_INSERT_COMM` will be `0`, and `P30_INSERT_OFFSITE` will
    be `''N''`. The ARP process will use the values of these items when it performs
    its insertion operation.


    The question, then, is how to get default values into the hidden items. The answer
    is to use an APEX *computation*. A computation is a page component that assigns
    a value to one item. The idea is to create a computation for each item that needs
    a default value and to arrange for these computations to be executed before the
    ARP process executes. In that way, the computed values will wind up as part of
    the session state, and the ARP process will use them when it creates a new record.'
