    ## 创建新的列表条目


    现在请关注 `Desktop Navigation Bar` 列表。APEX 应用程序中的导航栏横跨每个页面的顶部。默认情况下，导航栏左侧显示徽标，右侧显示当前用户名（如第
    2 章图 [2-8](#335103_3_En_2_Chapter.xhtml#Fig8) 所示）。导航栏的总体意图是提供常用任务的快速链接。例如，徽标实际上是主页的链接，而用户名是一个菜单，其中包含一个链接到注销用户的存储过程。导航栏通常包含用于显示站点地图、在线帮助或联系信息的链接。


    要查看导航栏的实现方式，请转到 `Desktop Navigation Bar` 列表的 `List Details` 屏幕；如图 [4-5](#335103_3_En_4_Chapter.xhtml#Fig5)
    所示。该列表包含三个条目。第一个条目显示用户名，第二个是一个无趣的分隔符，第三个是注销存储过程的链接。这些条目是分层组织的，这正是创建菜单结构的方式。用户名条目是父项，因此显示为菜单。注销条目是其子项，因此显示为菜单条目。分层列表将在本章后面详细讨论。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig5_HTML.png](images/335103_3_En_4_Chapter/335103_3_En_4_Fig5_HTML.png)


