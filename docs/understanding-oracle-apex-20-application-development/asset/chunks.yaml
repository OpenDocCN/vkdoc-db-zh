    ## Display-Based Items


    There are two other useful item types that do not appear in the `Item Sampler`
    page: `Display Only` items and `Hidden` items. These items differ from the others
    you have seen in that there is no way for a user to assign a value to them; their
    values can be assigned only by the APEX server. A display-only item has a label
    and a textual value, similar to a text field; the difference is that the value
    is not in an input box and is not editable. For example, refer again to Figure
    [5-1](#335103_3_En_5_Chapter.xhtml#Fig1); the fields labeled `Schema` and `Table`
    are display only. Hidden items are not visible, and users have no idea that they
    exist. They are typically used to hold the value of an operation so that another
    operation can use it. You will see examples of this technique in Chapter [6](#335103_3_En_6_Chapter.xhtml).


    ## Initial Item Values


    When APEX renders a page, it assigns an initial value to each item on the page.
    If the item is text based, APEX places that value inside that item’s input box;
    if the item is list based, APEX uses that value to determine the corresponding
    initial display value. APEX determines this initial value in one of two ways:
    it can evaluate the item’s `source expression`, or it can use a value previously
    stored in the session state. Because the concept of session state has not yet
    been covered, assume for now that session state values are always `null`.


    You specify an item’s source expression in its `Source` section of the property
    editor. Figure [5-24](#335103_3_En_5_Chapter.xhtml#Fig24) shows the two important
    properties of this section, `Type` and `Used`, with their default values.


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig24_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig24_HTML.jpg)


    Figure 5-24

    Item’s source properties


    The `Type` property specifies the type of the source expression; Figure [5-24](#335103_3_En_5_Chapter.xhtml#Fig24)
    shows all possible source types. Three common choices are `Null` (which is the
    default), `Static Value`, and `SQL Query (return single value)`. Choosing a type
    other than `Null` will cause the property editor to display an area for entering
    the source expression. The `Used` property specifies when the source expression
    is applicable. The default choice, shown in Figure [5-24](#335103_3_En_5_Chapter.xhtml#Fig24),
    is to use the session state if it is not `null`, and the source expression otherwise.
    The other choice, not shown in the figure, is to always use the source expression.
    These choices will be discussed in Chapter [6](#335103_3_En_6_Chapter.xhtml).


    If you use an SQL query as the source type, then that query must return a single
    row and column; the initial value of the item is the value returned by the query.
    For example, consider again the text-based items of the `Item Sampler` page, as
    shown in Figure [5-10](#335103_3_En_5_Chapter.xhtml#Fig10). Suppose that you want
    the initial value of `P8_EMPNO` to be the employee number of the president. You
    would set its source type to be `SQL Query (return single value)` and its source
    query to be the following query:


    ```sql

    select EmpNo

    from EMP

    where Job = ''PRESIDENT''

    ```


    For another example, suppose that you want the initial value of each item in Figure
    [5-18](#335103_3_En_5_Chapter.xhtml#Fig18) to be the department that is first
    alphabetically (with the lowest department number breaking the tie if there are
    multiple departments having the same name). You can assign the following source
    expression to each item:


    ```sql

    select min(DeptNo)

    from DEPT

    where DName in (select min(DName) from DEPT)

    ```


    A source expression whose type is `Static Value` is typically a constant. For
    example, suppose instead that you want the initial value of the items in Figure
    [5-18](#335103_3_En_5_Chapter.xhtml#Fig18) to be the sales department. Simply
    set the source expression for each item to be `30`. If you want the initial value
    of the multi-value list items in Figure [5-20](#335103_3_En_5_Chapter.xhtml#Fig20)
    to be both the operations and sales departments, set the source expression of
    those items to be `30:40`. One issue that arises with list-based items is how
    they should respond to an initial value that is not one of their specified return
    values. For example, suppose that you assign the static value `85` to be the source
    of the list-valued items. What should the items display, given that there is no
    department numbered 85? There are two options: accept the value and add it (temporarily)
    to the list, or reject the value and display an arbitrary value from the list.
    This choice is specified by the `Display Extra Values` property in the `List of
    Values` section, as shown in Figure [5-12](#335103_3_En_5_Chapter.xhtml#Fig12).
    In most cases, it makes no sense to display a value that is not a valid selection
    option, so `Display Extra Values` should usually be turned off.


    ## Buttons


    A button performs an `action` when clicked. An APEX button has two fundamental
    actions: it can `redirect` or it can `submit`. The term `redirect` simply means
    to move to another web page. In this respect, the button acts like an HTML link.
    The term `submit` means to have the web server process the current page. This
    processing can involve setting the session state and performing operations on
    the database, as well as moving to another page. Chapters [6](#335103_3_En_6_Chapter.xhtml)
    through [10](#335103_3_En_10_Chapter.xhtml) will cover in detail the uses of redirect
    and submit actions. As an example, let’s see how to add two buttons to the `Some
    Buttons` region of the `Item Sampler` page: a `Cancel` button with the action
    `Redirect to page 8` and a `Submit` button with the action `Submit`.


    There are two ways to create a button in a region. The first way is to right-click
    the region’s node in the rendering tree and select the `Create Button` operation.
    Alternatively, you can drag a button icon from the page designer gallery to the
    region (in a way similar to dragging items). In either case, APEX will create
    a node for the button in a subtree of its region node named `Region Buttons`.
    Figure [5-25](#335103_3_En_5_Chapter.xhtml#Fig25) shows the rendering tree of
    `Item Sampler` after the two buttons have been created.


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig25_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig25_HTML.jpg)


    Figure 5-25

    Adding buttons to the rendering tree


    To configure a button, you need to specify four things: its name, label, action,
    and position. The button’s name and label are specified in the `Identification`
    section; see Figure [5-26](#335103_3_En_5_Chapter.xhtml#Fig26). The name of the
    button is an internal value that APEX uses to identify the button and cannot have
    spaces. The button’s label is an arbitrary HTML string that is displayed with
    the button when the page is rendered.


