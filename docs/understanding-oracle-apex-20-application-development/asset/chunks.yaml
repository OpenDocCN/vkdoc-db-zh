    ## 总结：项目


    项目是保存值的页面元素。有许多项目类型，它们在页面上显示值的方式以及帮助用户指定该值的方式上有所不同。最重要的是区分基于文本的项目和基于列表的项目。


    基于文本的项目在其输入框中显示其值，用户可以通过在输入框中键入来指定值。基于文本的项目类型支持输入特殊值（如颜色和日期）、辅助数据输入（如自动完成）以及限制允许的值（如数字字段）。


    基于列表的项目强制用户从给定的值列表中选择。该列表可以通过 SQL 查询动态定义，也可以通过显式值静态定义。在任何情况下，都存在显示值（呈现给用户的值）和返回值（项目实际持有的值）之间的区别。各种基于列表的项目类型主要区别在于它们如何在页面上呈现显示值。


    项目的目的是允许用户向服务器发送一个值。第 [6](#335103_3_En_6_Chapter.xhtml) 章将研究这个问题，并提供展示项目在 Web
    应用程序中典型用法的示例。


    ## 会话状态


    用户与应用程序的交互称为 *会话*。一个会话可以包含多个页面请求。例如，在电子商务应用程序中，一个会话可能涉及浏览待售商品、将其中一些添加到购物车、输入付款和运输信息以及完成交易。


    在会话期间，用户为页面项目赋值，可能涉及多个页面，并将这些值发送到服务器进行处理。给定会话的项目值构成其 *会话状态*。在本章中，您将研究应用程序可以修改和访问会话状态的各种方式，并了解一些利用此状态的常见页面设计技术。


    ## 会话 ID


    在 Web 应用程序中构建会话功能是有问题的，因为浏览器请求是匿名的。服务器没有内置方法来知道两个浏览器请求是否属于同一个会话。APEX 通过为每个会话分配一个标识符来解决此问题。浏览器请求通过将会话
    ID 添加到请求中来指示其会话。


    回想一下，APEX URL 由字符串 `f?p=` 后跟冒号分隔的值字符串组成。前两个值是应用程序 ID 和页面 ID；第三个值是会话 ID。要查看实际操作中的会话
    ID，请登录 APEX 并浏览其屏幕。查看与您访问的每个屏幕关联的 URL。您应该会发现每个 URL 都具有相同的会话 ID 值。现在从 APEX 注销。当您重新登录时，APEX
    将为此次交互分配一个新的会话 ID。您访问的每个屏幕的 URL 现在都将具有这个新的会话 ID。


    您也可以在您自己的应用程序中观察会话 ID。从 APEX 注销并运行您的 `Employee Demo` 应用程序。APEX 将分配一个会话 ID，该 ID
    将出现在每个页面的 URL 中。您可以通过提交会话 ID 为 0 的请求来请求新的会话。（实际上，任何随机 ID 值都可以。）例如，我可以通过提交以下 URL
    在新会话中查看我的应用程序的主页：


    ```

    apex.oracle.com/pls/apex/f?p=91392:1:0

    ```


    当页面加载时，URL 将包含一个新的会话 ID。'
  raw: "The button’s action is specified in\nits `Behavior`\nsection. The `Action`\
    \ property has\nthe five possible values shown in Figure [5-27](#335103_3_En_5_Chapter.xhtml#Fig27).\
    \ The most\ncommon options are `Submit Page` and `Redirect to Page in this Application`.\
    \ The `Target` property,\nwhich is applicable to redirect actions, lets you specify\
    \ the target\npage.\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig27_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig27_HTML.jpg)\n\
    \nFigure 5-27\nPossible button actions\n\nThe position of a button is determined\
    \ by its `Button Position`\nproperty in the `Layout` section.\nFigure [5-28](#335103_3_En_5_Chapter.xhtml#Fig28)\
    \ shows the\npossible values.\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig28_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig28_HTML.jpg)\n\
    \nFigure 5-28\nPossible button positions\n\nAlthough there are many possible positions,\
    \ they fall into four basic\ncategories:\n\n*   In the region’s header\n\n*  \
    \ At the top or bottom of the region\n\n*   At predefined locations in the region\n\
    \n*   In the region body\n\nThe values `Left of Title` and `Right of Title` place\
    \ the button in the region’s header, to the left or\nright of the title. If several\
    \ buttons are in the same position, their\nrelative position is determined by\
    \ their sequence numbers.\nThe values `Top of Region`, `Top and Bottom of Region`,\
    \ `Above Region`, `Below Region`, and\n`Bottom of Region` display buttons at the\
    \ top or bottom of the region. When\nyou choose one of these values, the property\
    \ editor displays the `Horizontal Alignment`\nproperty, which lets you specify\
    \ whether the button should appear at the\nleft or right side of the region. The\
    \ buttons in Figure [5-2](#335103_3_En_5_Chapter.xhtml#Fig2) are positioned\n\
    at the top of the region, aligned to the right.\nMany page templates have specially\
    \ designated positions for certain\nbuttons. Their purpose is to ensure that buttons\
    \ common to multiple\nregions are located in the same place in those regions.\
    \ The button\npositions `Copy`,\n`Edit`, `Previous`, `Next`, `Close`, `Help`,\
    \ `Delete`, `Change`, and `Create` correspond to\nthese special-purpose buttons,\
    \ although you are free to use them for any\nbutton. Of particular note are the\
    \ positions `Copy` and `Edit`, which display\nthe button at the far right of the\
    \ header.\nThe `Region Body` position\n is different from the others because it\
    \ places the button among\nthe region’s items. When you choose this value, a `Layout`\
    \ section\nappears for you to specify the position of the button relative to the\n\
    other items in the region. Moreover, the button’s node in the rendering\ntree\
    \ shows up in the subtree for the region’s items.\n\nThe two buttons in Figure\
    \ [5-2](#335103_3_En_5_Chapter.xhtml#Fig2) are colored\ndifferently: the `Cancel`\
    \ button has the\nsame color scheme as the page items, whereas the `Submit` button\
    \ is\nblue. The color of the `Submit` button is\nintended to draw the user’s attention\
    \ to it; APEX calls it a *hot\nbutton*. A button’s Appearance section has a property\
    \ named Hot,\nwhich enables you to specify whether the button is hot or not. Figure\n\
    [5-29](#335103_3_En_5_Chapter.xhtml#Fig29) shows this\nsection for the `Submit`\
    \ button.\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig29_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig29_HTML.jpg)\n\
    \nFigure 5-29\nSpecifying a hot button\n\nSummary\nAn item is a page element that\
    \ holds a value. There are many item\ntypes, which differ in the way in which\
    \ they display their value on the\npage and how they help users specify that value.\
    \ Of primary importance\nis the distinction between text-based items and list-based\
    \ items.\nA text-based item displays its value in an input box, and users can\n\
    specify a value by typing it into the input box. The text-based item\ntypes support\
    \ the entry of unusual values (such as colors and dates),\naid in data entry (such\
    \ as autocompletion), and restrict allowable\nvalues (such as number fields).\n\
    A list-based item forces a user to choose from a given list of\nvalues. This list\
    \ can be defined dynamically, via an SQL query, or\nstatically via explicit values.\
    \ In every case, there is a distinction\nbetween the display values (the values\
    \ presented to the user) and the\nreturn values (the value that is actually held\
    \ by the item). The various\nlist-based item types differ primarily in how they\
    \ present the display\nvalues on the page.\nThe purpose of an item is to allow\
    \ a user to send a value to the\nserver. Chapter [6](#335103_3_En_6_Chapter.xhtml)\
    \ examines this issue and provides\nexamples that show typical uses of items in\
    \ web applications.\n\n6. Session State\n\nA user’s interaction with an application\
    \ is called a\n*session*. A session can encompass\nseveral page requests. For\
    \ example, in an ecommerce application, a\nsession can involve browsing the products\
    \ for sale, adding some of them\nto a shopping cart, entering payment and shipping\
    \ information, and\nfinalizing the transaction.\nDuring a session, the user assigns\
    \ values to page items, encompassing\nperhaps several pages, and sends these values\
    \ to the server for\nprocessing. The item values for a given session comprise\
    \ what is called\nits *session state*\n. In this chapter, you will examine the\
    \ various ways that an\napplication can modify and access the session state and\
    \ look at some\ncommon page design techniques that make use of this state.\n\n\
    Session IDs\nBuilding session capability into a web application is problematic\n\
    because browser requests are anonymous. There is no\nbuilt-in way for a server\
    \ to know whether two browser requests are part\nof the same session. APEX solves\
    \ this problem by assigning an identifier\nto each session. A browser request\
    \ indicates its session by adding the\nsession’s ID to the request.\nRecall that\
    \ an APEX URL consists of the `f?p=` string followed\nby a colon-delimited string\
    \ of values. The first two values are the\napplication ID and page ID; the third\
    \ value is the session ID. To see\nsession IDs in action, log in to APEX and browse\
    \ its screens. Look at\nthe URL associated with each screen you visit. You should\
    \ discover that\nevery URL has the same session ID value. Now log out of APEX.\
    \ When you\nlog back in, APEX will assign a new session ID to the interaction.\
    \ The\nURL of each screen you visit will now have this new session ID.\n\nYou\
    \ can also observe the session IDs in your own applications. Log out\nof APEX\
    \ and run your `Employee Demo`\napplication. APEX will assign a session ID that\
    \ will appear in the URL\nof each page. You can request a new session by submitting\
    \ a request\nhaving a session ID of 0\\. (Actually, any random ID value will do.)\
    \ For\nexample, I can view the home page of my application in a new session by\n\
    submitting the following URL:\n\n```\napex.oracle.com/pls/apex/f?p=91392:1:0\n\
    ```\n\nWhen the page loads, the URL will contain a new session ID."
