  trans: '

    图 10-33 展示了此操作的`Link Builder`界面。JavaScript 函数`apex.confirm`会显示一个确认窗口；点击`Yes`将使用名为`DELETE`的请求提交页面。换句话说，`DELETE`按钮实际上确实执行了提交操作，尽管是通过
    JavaScript 间接完成的。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig33_HTML.jpg](img/335103_3_En_10_Fig33_HTML.jpg)


    图 10-33

    DELETE 按钮的链接构建器界面


    表单页面的`Processing`选项卡包含两个组件：所有表单区域共有的 ARP 进程和一个分支。当点击 CREATE、SAVE 或 DELETE 按钮时，该进程会触发。由于这些按钮是页面上唯一执行提交操作的组件，因此该进程不需要设置为条件执行。该分支在提交处理后无条件重定向到报表页面，这就解释了为什么从表单页面每次点击按钮都会返回到报表页面。


    ## 自定义报表和表单


    尽管`Report with Form`向导能生成功能完整的页面，但这些页面是原始且未加修饰的。在实际应用中，你不太可能直接使用它们。相反，你应该将其视为构建更广阔、可定制化应用的基础。这些定制化主要分为三类：外观定制、功能定制和组织结构定制。


    外观定制可改善应用的外观和布局。例如，你可以使用第 3 章的技术来改进报表及其列的格式，以及使用第 5 章的技术来优化按钮和项的外观与布局。你还可以更改默认的区域标题、按钮文本和项标签。


    另一个外观问题涉及表单项的可见性。回想图 10-25，`Report with Form`向导要求你指定应在表单页面中显示的项。问题在于，表单页面同时用于插入和更新操作，而这两种操作有不同的需求。例如，插入操作需要为所有列设置项，但你可能希望隐藏那些接收默认值的列的项。此外，更新操作应仅显示可更新列的项。因此，为每个项提供一个`Server-side
    Condition`表达式，指定该项何时可见，将是一个好主意。


    或者，你可以选择禁用项而不是隐藏它。每个项都有一个`Read Only`属性部分，你可以像`Server-side Condition`部分那样指定一个条件。`Server-side
    Condition`会隐藏项，而`Read Only`则使其不可修改。因此，例如，在更新模式下，显示整个记录但将不可修改的项（如`EName`）格式化为只读，可能是一个好主意。


    功能定制为向导生成的页面添加功能。例如，你可以向表单页面添加`Previous`和`Next`按钮。你也可以修改插入和更新操作，使其在更改数据库后保留在表单页面，如图
    7-24 的`Single Row Update`页面所示。


    与组织结构相关的定制涉及添加或删除页面和区域，以及在它们之间移动现有的页面组件。例如，可以将报表和表单区域移动到同一个页面。或者，你可以将表单区域拆分为两个区域——一个用于插入，一个用于更新/删除——如`Single
    Row Update`页面所示。你甚至可以有三个表单区域，如图 7-5 的`Employee Data Entry`页面所示。


    ## 表单页面


    `Report with Form`向导创建的两个页面连接非常松散。它们唯一的交互是当点击报表页面上的链接或其`Create`按钮时，这两者都会设置表单页面上`P32_EMPNO`项的值。因此，表单页面可以与其他类型的页面结合使用，唯一的前提是其他页面能向表单页面提供员工编号。


    在本节中，我不打算将报表与表单连接，而是想将树与表单连接。树以层次结构描绘表中的记录，当表中存在可以作为层次结构基础的字段时，这是可能的。例如，`EMP`表的`Mgr`字段确定了一个层次结构，在商业中称为管理层次结构。没有经理的总裁是层次结构的根。其他每个员工都是其经理的子节点。


    `Employee Demo`应用程序的第 33 页以树形显示员工记录。该页面名为`Management Hierarchy Tree`，如图 10-34
    所示。树的每个节点显示一个员工姓名。点击姓名会重定向到一个名为`Management Hierarchy Form`的表单页面，该页面显示该员工的其他值，并提供更新这些值或删除员工记录的机会。图
    10-35 显示了点击`ADAMS`后得到的表单页面。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig35_HTML.jpg](img/335103_3_En_10_Fig35_HTML.jpg)


    图 10-35

    管理层次结构表单页面


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig34_HTML.jpg](img/335103_3_En_10_Fig34_HTML.jpg)


    图 10-34

    管理层次结构树页面


    ### 实现树页面


    尽管 APEX 有一个页面向导来创建树，但自己创建页面更具指导性（也更简单！）。因此，将第 33 页创建为一个名为`Management Hierarchy
    Tree`的空白页面，并创建一个类型为`Tree`的区域。其数据源应为`EMP`表。


    配置树的属性位于该区域的`Settings`部分，你可以从渲染树中的`Attributes`节点进入。图 10-36 显示了图 10-34 中树的`Settings`属性。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig36_HTML.jpg](img/335103_3_En_10_Fig36_HTML.jpg)


    图 10-36

    树区域设置


    名为`Hierarchy`的属性应设置为`Computed with SQL`，这指示 APEX 根据以下设置计算层次结构：


    *   `Node Label Column`是其值作为树节点标签的字段。

    *   `Node Id Column`是主键字段。

    *   `Parent Key Column`是定义层次结构的字段。记录的此字段值指定其父记录的主键。

    *   `Start Tree With`指定层次结构的根。设置`Value is NULL`断言层次结构的根是父键列值为`null`的记录。


    此时运行你的页面，并探索树。如果一个节点有子节点，其左侧将有一个箭头。点击这些箭头将展开或收缩其子节点列表。


    最后的配置步骤是指定当用户点击树中的节点时发生什么。你需要的属性是`Link`，它位于`Settings`部分更靠下的位置。点击其框会弹出`Link Builder`向导。图
    10-37 显示了我如何配置该链接。它指定点击节点将重定向到第 34 页，并将`P34_EMPNO`的值设置为该节点的`EMPNO`值。请注意，这里使用了替换字符串语法来引用节点字段的值。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig37_HTML.jpg](img/335103_3_En_10_Fig37_HTML.jpg)

