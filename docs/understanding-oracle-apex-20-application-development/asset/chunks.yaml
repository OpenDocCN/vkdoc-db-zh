    ## 基于显示的项目


    还有另外两种有用的项目类型未出现在`项目示例器`页面中：`仅显示`项目和`隐藏`项目。这些项目与你已见过的其他项目不同，因为用户无法为它们赋值；它们的值只能由
    APEX 服务器分配。一个仅显示的项目有一个标签和一个文本值，类似于文本字段；不同之处在于该值不在输入框中且不可编辑。例如，再次参考图 5-1；标有`模式`和`表`的字段就是仅显示的。隐藏项目不可见，用户不知道它们的存在。它们通常用于保存操作的值，以便另一个操作可以使用它。你将在第
    6 章中看到此技术的示例。


    ## 项目的初始值


    当 APEX 渲染一个页面时，它会为页面上的每个项目分配一个初始值。如果项目是基于文本的，APEX 会将该值放入该项目的输入框中；如果项目是基于列表的，APEX
    会使用该值来确定相应的初始显示值。APEX 通过两种方式之一确定此初始值：它可以计算项目的`源表达式`，或者可以使用先前存储在会话状态中的值。由于尚未介绍会话状态的概念，现在假设会话状态值始终为`null`。


    你在属性编辑器的`源`部分指定项目的源表达式。图 5-24 显示了此部分的两个重要属性`类型`和`用法`，以及它们的默认值。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig24_HTML.jpg](img/335103_3_En_5_Fig24_HTML.jpg)


    图 5-24

    项目的源属性


    `类型`属性指定了源表达式的类型；图 5-24 显示了所有可能的源类型。三个常见的选择是`Null`（默认值）、`静态值`和`SQL 查询（返回单个值）`。选择`Null`以外的类型将导致属性编辑器显示一个用于输入源表达式的区域。`用法`属性指定了源表达式适用的时间。默认选择（如图
    5-24 所示）是：如果会话状态不为`null`则使用它，否则使用源表达式。另一个选择（图中未显示）是始终使用源表达式。这些选择将在第 6 章中讨论。


    如果你使用 SQL 查询作为源类型，则该查询必须返回单行单列；项目的初始值即为该查询返回的值。例如，再次考虑`项目示例器`页面的基于文本的项目，如图 5-10
    所示。假设你希望`P8_EMPNO`的初始值是总裁的员工编号。你可以将其源类型设置为`SQL 查询（返回单个值）`，并将其源查询设置为以下查询：


    ```sql

    select EmpNo

    from EMP

    where Job = ''PRESIDENT''

    ```


    再举一个例子，假设你希望图 5-18 中每个项目的初始值是按字母顺序排列的第一个部门（如果有多个部门名称相同，则使用部门编号最小的来打破平局）。你可以为每个项目分配以下源表达式：


    ```sql

    select min(DeptNo)

    from DEPT

    where DName in (select min(DName) from DEPT)

    ```


    类型为`静态值`的源表达式通常是一个常量。例如，假设你希望图 5-18 中项目的初始值是销售部门。只需将每个项目的源表达式设置为`30`。如果你希望图 5-20
    中多值列表项目的初始值同时是运营部和销售部，请将这些项目的源表达式设置为`30:40`。列表类项目出现的一个问题是它们应如何响应不是其指定返回值之一的初始值。例如，假设你分配静态值`85`作为列表值项目的源。由于没有编号为
    85 的部门，项目应显示什么？有两种选择：接受该值并（临时）将其添加到列表中，或者拒绝该值并显示列表中的一个任意值。此选择由`值列表`部分中的`显示额外值`属性指定，如图
    5-12 所示。在大多数情况下，显示一个不是有效可选选项的值是没有意义的，因此通常应关闭`显示额外值`。


    ## 按钮


    按钮在点击时执行一个`操作`。APEX 按钮有两种基本操作：它可以`重定向`或`提交`。`重定向`一词简单地意味着转到另一个网页。在这方面，按钮的作用类似于
    HTML 链接。`提交`一词意味着让 Web 服务器处理当前页面。此处理可以涉及设置会话状态和在数据库上执行操作，以及移动到另一个页面。第 6 章到第 10
    章将详细涵盖重定向和提交操作的用途。作为一个例子，让我们看看如何在`项目示例器`页面的`一些按钮`区域添加两个按钮：一个操作是`重定向到页面 8`的`取消`按钮和一个操作是`提交`的`提交`按钮。


    在区域中创建按钮有两种方式。第一种方式是右键单击渲染树中区域的节点并选择`创建按钮`操作。或者，你可以将页面设计器库中的按钮图标拖放到区域中（类似于拖放项目的方式）。无论哪种情况，APEX
    都将在其区域节点下名为`区域按钮`的子树中为按钮创建一个节点。图 5-25 显示了创建两个按钮后`项目示例器`的渲染树。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig25_HTML.jpg](img/335103_3_En_5_Fig25_HTML.jpg)


    图 5-25

    向渲染树添加按钮


    要配置按钮，你需要指定四项内容：其名称、标签、操作和位置。按钮的名称和标签在`标识`部分指定；参见图 5-26。按钮的名称是 APEX 用于标识按钮的内部值，不能包含空格。按钮的标签是任意的
    HTML 字符串，在页面渲染时随按钮一起显示。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig26_HTML.jpg](img/335103_3_En_5_Fig26_HTML.jpg)


    图 5-26

    标识按钮'
