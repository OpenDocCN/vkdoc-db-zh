  trans: '

    启用 `覆盖用户界面级别` 属性后，将显示 `列表` 属性。随后，您可以选择一个列表作为页面的导航菜单，也可以选择不指定导航菜单。


    将链接存储在列表中，并在列表区域中显示，是一项重要的技术；它远比手动使用 HTML 格式化链接更优越，就像您在主页的 `引用` 区域所做的那样。其中一个原因是，列表区域的模板负责格式化列表条目；您只需选择所需的模板。换言之，列表区域将内容（源列表）与格式（列表模板）分离。编写
    HTML 代码来实现列表不仅繁琐，而且会将内容与格式混在一起。任何更改条目格式的决定都需要您重写 HTML 代码。


    使用列表区域的第二个优势是，它会随着列表的更改而自动更新。这对于显示 `桌面导航菜单` 列表的区域尤为重要。例如，每当您为一个新页面创建导航菜单条目时，图
    4-15 中的 `导航菜单` 区域就会相应地进行调整。


    ## 层级列表


    `员工演示` 应用程序当前的 `桌面导航菜单` 列表中有六个条目。由于条目数量较少，简单地将它们线性地显示在页面侧面（或顶部）是合理的。然而，随着条目数量的增加，一个长长的线性列表会变得难以管理。常见的解决方案是分层显示条目。


    APEX 导航栏（如图 1-3 所示）就是一个很好的例子。它的第一个选项卡（包含徽标）对应于 APEX 主屏幕；其他选项卡对应于 APEX 站点的通用类别。每个类别选项卡都有一个主目标页面，作为该类别的主屏幕。点击类别选项卡的主要部分会带您前往该页面。每个类别选项卡还有一个下拉箭头；点击它会显示该类别的次要选项卡菜单。这样就形成了一个功能齐全且界面整洁的效果，次要选项卡在需要时才会显示。


    在层级列表中，每个列表条目都可以有一个 `父级` 条目。没有父级的条目定义了一个层级结构，被称为该层级的 `根`。一个层级可以有多个级别，这意味着一个条目的父级也可能有其父级。例如，图
    4-20 展示了 APEX 导航栏的 `应用构建器` 条目。它的子级之一 `工作区实用工具` 也有自己的子级。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig20_HTML.png](img/335103_3_En_4_Fig20_HTML.png)

    *图 4-20：APEX 导航栏中的应用构建器菜单*


    让我们看看如何类似地重构 `员工演示` 应用程序。它的 `桌面导航菜单` 列表将包含主页以及两个层级结构：


    *   一个 `区域` 层级，包含页面 `区域练习`、`经典报表`、`图表` 和 `交互式报表`

    *   一个 `列表` 层级，包含页面 `列表练习`


    每个层级对应本书的一个章节——`区域` 层级包含在第 3 章开发的页面，`列表` 层级包含在第 4 章开发的页面。随着本书的进展，我将遵循此约定，为每章开发的页面创建一个新的层级结构。


    但在开始创建层级之前，您需要考虑如何配置每个根条目。显然，其 `父列表条目` 属性的值应为 `null`，表示它是一个根。但是，应该为其 `目标` 属性赋予什么值呢？有三种合理的策略：您可以创建一个专用的“主屏幕”作为目标；也可以将目标设置为其某个子级的目标；或者可以将目标设置为
    `null`。APEX 采用了第一种策略——它为应用构建器、SQL 工作坊等分别设置了主屏幕。采用第二种策略的效果是使所选目标成为该部分的默认页面。而采用第三种策略则无法选择父级，从而迫使用户选择一个子级。本书将遵循以下约定：拥有单个子级的根条目将把该子级作为其目标，而拥有多个子级的根条目将采用空目标。


    要创建此层级列表，请先转到 `桌面导航菜单` 的 `列表详细信息` 屏幕，该屏幕如图 4-2 所示。创建两个新的列表条目作为两个层级的根，并根据前述约定设置它们的目标页面：`区域`
    条目的目标应为空，`列表` 条目的目标应为 `列表练习` 页面。


    现在需要为五个子条目设置父级。直接的方法是转到每个条目的 `列表条目` 屏幕（如图 4-3 所示）并修改其 `父列表条目` 属性。不过，`列表详细信息` 屏幕有一个向导可以加速此过程。点击
    `列表详细信息` 屏幕右侧标题为 `重新分配此列表中的列表条目` 的链接。该链接会带您到一个 `重新分配列表条目` 屏幕，从那里您可以快速指定给定父条目的子级。无论您采用哪种方式，桌面导航菜单的最终条目应如图
    4-21 所示。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig21_HTML.jpg](img/335103_3_En_4_Fig21_HTML.jpg)

    *图 4-21：层级导航菜单的条目*


    图 4-22 显示了生成的导航菜单的截图，其中我点击了 `区域` 菜单以查看其子级。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig22_HTML.jpg](img/335103_3_En_4_Fig22_HTML.jpg)

    *图 4-22：层级导航菜单*


    每次创建新页面时，您都可以使用前述技术为其在 `桌面导航菜单` 列表中添加条目。然而，在创建页面时直接向列表中添加新条目通常更方便。请考虑创建页面向导的第三个屏幕，如图
    4-23 所示。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig23_HTML.jpg](img/335103_3_En_4_Fig23_HTML.jpg)

    *图 4-23：在页面创建过程中指定菜单层级*

