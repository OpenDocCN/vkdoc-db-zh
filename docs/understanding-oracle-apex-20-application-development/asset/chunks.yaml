    ## 修订GetEmpInfo进程


    清单7-7展示了清单7-4中`GetEmpInfo`进程的一个修订版（粗体行是新的）。在检索到指定员工的值后，它将这些值保存在新的隐藏项`P19_ORIGINAL_JOB`、`P19_ORIGINAL_SAL`和`P19_ORIGINAL_DEPTNO`中（您应该创建这些项）。


    ```

