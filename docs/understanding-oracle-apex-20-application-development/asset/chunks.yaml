- fmt: "# Implementing the Form Page\n\nPage 34 of the `Employee Demo` application\
    \ is the form page shown in Figure [10-35](#335103_3_En_10_Chapter.xhtml#Fig35).\
    \ It is easy enough to implement it by creating a blank page and adding a `Form`\
    \ region to it. However, it is even easier to use a wizard to create the form\
    \ page itself.\n\nLooking back at the `Create Page` screen of Figure [10-23](#335103_3_En_10_Chapter.xhtml#Fig23),\
    \ you can see an icon for a wizard named `Form`. Clicking it brings up the `Create\
    \ Form` screen of Figure [10-38](#335103_3_En_10_Chapter.xhtml#Fig38).\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig38_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig38_HTML.jpg)\n\
    \nFigure 10-38\nThe first screen of the Create Form wizard\n\nAfter asking for\
    \ the page number and name, the wizard requests two things: the page that the\
    \ form should branch to after a submit (i.e., the `Delete` and `Apply Changes`\
    \ buttons) and after a redirect (i.e., the `Cancel` button). The remaining screens\
    \ are similar to what you’ve seen before—a screen asking about the navigation\
    \ menu, a screen requesting the source, and a final screen requesting the primary\
    \ key.\n\nThe form page generated by the wizard should work seamlessly with the\
    \ tree page, without any additional configuration on your part—the tree redirects\
    \ to the form when a tree node is clicked, and the form redirects to the tree\
    \ when a button is clicked. My form page in Figure [10-35](#335103_3_En_10_Chapter.xhtml#Fig35)\
    \ is the result of simply changing the type and layout of the items generated\
    \ by the wizard.\n\nI want to stress that the form page generated by the `Form`\
    \ wizard is exactly the same as the form page generated by the `Report with Form`\
    \ wizard—the only difference between the two wizards is that `Report with Form`\
    \ also generates a page containing a `Create` button and a report. Moreover, the\
    \ page generated by the `Form` wizard is exactly the same as a blank page with\
    \ a `Form` region, plus a few buttons and property settings. The other form-based\
    \ wizards in Figure [10-23](#335103_3_En_10_Chapter.xhtml#Fig23) are similar to\
    \ `Report with Form`. Knowing this can help you decide, for any given task, whether\
    \ to use one of the wizards or to write the pages yourself.\n\n## Master-Detail\
    \ Forms\n\nChapter [6](#335103_3_En_6_Chapter.xhtml) discussed the creation of\
    \ master-detail reports. In a master-detail report, two reports are linked such\
    \ that selecting a row of the master report causes the detail report to display\
    \ only those rows associated with the selected master row. For example, the `Employees\
    \ by Department` page in Figure [6-8](#335103_3_En_6_Chapter.xhtml#Fig8) shows\
    \ an `EMP` report linked to the master `DEPT` report; clicking a `DEPT` record\
    \ causes the `EMP` report to show only those employees in the selected department.\n\
    \nIn this section, I want to consider how to expand a master-detail report to\
    \ include updates. A straightforward approach is to create two sets of `Report\
    \ with Form` pages, one for `DEPT` and one for `EMP`, and then link the `DEPT`\
    \ and `EMP` reports as in Chapter [6](#335103_3_En_6_Chapter.xhtml). Let’s see\
    \ how much effort this requires.\n\nBegin by using the `Report with Form` wizard\
    \ to create report and form pages for `DEPT`. The report page is named `Master\
    \ Report` and is page 35; the form page is named `Master Form` and is page 36.\
    \ The page source is `select * from DEPT`.\n\nThen use the wizard to create report\
    \ and form pages for `EMP`. The pages are numbered 37 and 38; the report page\
    \ is named `Detail Report` and the form page is named `Detail Form`. Their source\
    \ is `select * from EMP`.\n\nAt this point, you have two unrelated sets of pages.\
    \ Their report pages need to be related as follows:\n\n*   The master report needs\
    \ a link column that takes you to the detail report.\n*   The detail report needs\
    \ to display only the records associated with the selected detail row.\n*   The\
    \ detail report needs a button that returns you to the master report.\n\nFigures\
    \ [10-39](#335103_3_En_10_Chapter.xhtml#Fig39) and [10-40](#335103_3_En_10_Chapter.xhtml#Fig40)\
    \ show these two reports. Figure [10-40](#335103_3_En_10_Chapter.xhtml#Fig40)\
    \ shows the result of clicking “view emps” for the `ACCOUNTING` department. Note\
    \ that I changed the region titles on both pages from what the wizard generated.\
    \ In particular, the title of the detail region is customized with the department\
    \ name.\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig40_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig40_HTML.jpg)\n\
    \nFigure 10-40\nThe detail report\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig39_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig39_HTML.jpg)\n\
    \nFigure 10-39\nThe master report\n\nThe only change you need to make to the master\
    \ report is to create the additional “view emps” column. To do that, you should\
    \ create and configure a *virtual column* for the report, as follows:\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig41_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig41_HTML.jpg)\n\
    \nFigure 10-41\nLink builder for the View Emps link\n\n*   Right-click the `Columns`\
    \ node of the rendering tree, and select the *Create Virtual Column* menu item.\
    \ APEX will add a column named `DERIVED$01` to the report.\n*   Set the type of\
    \ this column to `Link`.\n*   Go to the `Settings` section, and click the box\
    \ for the `Target` property. This brings up the link builder.\n*   Configure the\
    \ link builder as shown in Figure [10-41](#335103_3_En_10_Chapter.xhtml#Fig41).\n\
    *   Set the Link Text property for the column to be `View Emps`.\n\nYou will then\
    \ need to make the following changes to the `Detail Report` page.\n\n*   Create\
    \ hidden items `P37_DEPTNO` and `P37_DNAME`.\n*   Change the source of the region\
    \ to\n    ```\n    select * from EMP\n    where DeptNo = :P37_DEPTNO\n    ```\n\
    *   Change the title of the region to\n    ```\n    Emps in &P37_DNAME.\n    ```\n\
    *   Create a button that has the label `All Depts` and redirects to page 35.\n\
    \nThat’s it! The advantage of using the page wizard is that you can quickly construct\
    \ fully functional web pages. You will probably want to configure the look and\
    \ feel of the regions, but that shouldn’t be too onerous.\n\nThe only problem\
    \ with using the page wizard is that it forces you into a particular page architecture—in\
    \ this case, the use of four single-region pages. There are many other possible\
    \ designs. In fact, APEX has a `Create Page` wizard that constructs master-detail\
    \ forms quite differently. Figure [10-42](#335103_3_En_10_Chapter.xhtml#Fig42)\
    \ shows its primary page.\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig42_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig42_HTML.jpg)\n\
    \nFigure 10-42\nA combined master-detail page\n\nThe page has five regions: a\
    \ region across the very top, named `Master-Detail` and having two buttons; a\
    \ region in the left column containing the search bar; a report region down the\
    \ left column listing the master rows; a report region (named `Dept`) at the top,\
    \ listing the selected master row; and a report region (named `Emp`) at the bottom,\
    \ listing the associated detail rows.\n\nThe rows of the master region in the\
    \ left column are links. When you click a row, it becomes the selected row and\
    \ the two regions to its right adjust themselves accordingly.\n\nA user can edit\
    \ this page in four ways:\n\n*   The `Create` button in the Master-Detail region\
    \ inserts a new row into the master table.\n*   The `Edit` button in the `Dept`\
    \ region edits the current master row.\n*   The “`+`” button in the `Emp` region\
    \ inserts a new row into the detail table.\n*   The edit links in the detail report\
    \ edit the selected detail row."
