    \n```\nbegin\ninsert into EMP(EName, Job, Mgr, Sal, DeptNo, HireDate, Comm, Offsite)\n\
    values (:P21_INSERT_ENAME,\n:P21_INSERT_JOB,\n:P21_INSERT_MGR,\n:P21_INSERT_SAL,\n\
    :P21_INSERT_DEPTNO,\ncurrent_date,  0,  'N');\n-- Clear the region's visible items.\n\
