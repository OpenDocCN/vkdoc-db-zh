- fmt: '## Date Format Masks


    The mask for `HIREDATE` was created similarly. An examination of the various date
    format masks shows that `DD` denotes the day, `Mon` the three-character abbreviation
    of the month, and `YYYY` the four-digit year. I combined these elements to create
    my desired format mask, which is shown in Figure [3-32](#335103_3_En_3_Chapter.xhtml#Fig32).


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig32_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig32_HTML.jpg)


    Figure 3-32

    My format mask for `HIREDATE`


    For a complete description of format mask syntax, search the Oracle SQL documentation
    for “format models.”


    ## Column Formatting


    Columns of type `Plain Text` have a section called `Column Formatting`, which
    has a property named `HTML Expression`. This property allows you to format a column
    value by wrapping it in an HTML expression. For an example, look back at the formatted
    `ENAME` column of Figure [3-24](#335103_3_En_3_Chapter.xhtml#Fig24). The name
    of each employee is in a large bold font, and the employee’s job appears after
    it. Figure [3-33](#335103_3_En_3_Chapter.xhtml#Fig33) shows the HTML expression
    corresponding to this format.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig33_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig33_HTML.jpg)


    Figure 3-33

    Formatting the `ENAME` column


    This expression requires some explanation. To begin, consider what HTML expression
    you would write for the employee named `FORD`. To make the name large and bold,
    you can place it inside `<b><big></big></b>` tags. The resulting expression would
    look like this:


    ```

    <b><big>FORD</big></b> the ANALYST

    ```


    This expression is almost what the `HTML Expression` value should be—the only
    difference is that the employee’s name and job need to vary for each row of the
    report. APEX makes this possible via the following convention: for a column named
    `X`, the term `#X#` denotes the value of `X` in the current row. Thus, you should
    replace `FORD` in the preceding expression by `#ENAME#` and `ANALYST` by `#JOB#`,
    resulting in the expression from Figure [3-33](#335103_3_En_3_Chapter.xhtml#Fig33):


    ```

    <b><big>#ENAME#</big></b> the #JOB#

    ```


    Note that the expression `#JOB#` makes sense, even though the `JOB` column is
    not visible in the report. In fact, one of the common reasons for having nonvisible
    columns in a report is so you can use their values elsewhere in the report.


    ## Link Columns


    The `HIREDATE` values in Figure [3-24](#335103_3_En_3_Chapter.xhtml#Fig24) are
    formatted as links. In particular, clicking a hire date (say, `Dec 03, 1981`)
    redirects the browser to the URL [`http://www.infoplease.com/year/1981.html`](http://www.infoplease.com/year/1981.html),
    which gives the current events of that year.


    One way to implement this functionality is to wrap the hire date in an appropriate
    HTML expression. For example, the link for Dec 03, 1981, would be the following:


    ```

    <a href="http://www.infoplease.com/year/1981.html" target="_blank">#HIREDATE#</a>

    ```


    Note that the second argument to the `<a>` tag is `target="_blank"`. This argument
    causes the target page to open in a new browser tab, which in this case seems
    reasonable. The problem with this HTML expression is that it always redirects
    to the page for 1981, regardless of the hire date. We need a way to extract the
    hire year from the hire date, which unfortunately is not possible in HTML.


    However, it is possible to extract the year from within an SQL query. The idea
    is to have the SQL source query compute a new column, whose value is the hire
    year. The following query does the job:


    ```sql

    select e.*, extract(year from e.HireDate) as HireYear

    from EMP e

    ```


    A consequence of using this new source query is that `HIREYEAR` will now be a
    column of the report. Since you don’t want to see it in the report, you should
    set its type to `Hidden Column`.


    After you modify the source of the `Formatted Report` region to be this query,
    you can format the `HIREDATE` column by using `#HIREYEAR#` in its `HTML Expression`
    property, as follows:


    ```

    <a href="http://www.infoplease.com/year/#HIREYEAR#.html" target="_blank">#HIREDATE#</a>

    ```


    Although this technique works, a better way to format a column as a link is to
    set its `Type` property to `Link`. Doing so causes the property editor to display
    a `Link` section. This section has the property `Target`, whose initial value
    is `No Link Defined`. Clicking that value opens a modal `Link Builder` page, in
    which you specify whether the target is a page of an APEX application or an arbitrary
    URL. In this case, select `URL` and enter the target URL into the text box that
    appears, as shown in Figure [3-34](#335103_3_En_3_Chapter.xhtml#Fig34). Then click
    the OK button to return to the property editor.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig34_HTML.png](images/335103_3_En_3_Chapter/335103_3_En_3_Fig34_HTML.png)


    Figure 3-34

    Using the `Link Builder` page


    You can then enter the appropriate values for `Link Text and Link Attributes`
    into the Link section, as shown in Figure [3-35](#335103_3_En_3_Chapter.xhtml#Fig35).
    Note that you need to enter the “http://” portion of the URL in the link builder,
    even though the `Target` property does not display it.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig35_HTML.png](images/335103_3_En_3_Chapter/335103_3_En_3_Fig35_HTML.png)


    Figure 3-35

    Link properties for the `HIREDATE` column


    ## Conditional Formatting


    Recall that Figure [3-24](#335103_3_En_3_Chapter.xhtml#Fig24) displays salaries
    in red if their value is over 2500. It is easy enough to use the `HTML Expression`
    property to format `SAL` values in a particular color. For example, the following
    expression makes all salary values red:


    ```

    <font color="red">#SAL#</font>

    ```


    But how do you write an expression to make only some of the values red? Because
    HTML by itself cannot perform calculations, you must again rely on SQL to do it
    for you. The idea is to have the SQL source query compute another new column,
    called `SalColor`, whose value is the color of the salary value. Here is the desired
    query (new code is in bold):


    ```sql

    select e.*, extract(year from e.HireDate) as HireYear,

    case when e.Sal>2500 then ''red'' else ''black'' end as SalColor

    from EMP e

    ```


    After you change the `Formatted Report` region to have this query as its source,
    you can format the `SAL` column by assigning the following code to its `HTML Expression`
    property:


    ```

    <font color="#SALCOLOR#">#SAL#</font>

    ```


    You can apply the same technique to the `OFFSITE` column. In the formatted report,
    an `Offsite` value shows an image of a green check mark if its value is **Y**
    and a red check mark otherwise. Assume that these two images have been saved to
    APEX as the application files `checkgreen.jpg` and `checkred.jpg`. (You can download
    these files from the Apress website.) Then a value of **Y** should be formatted
    as the following HTML expression:


    ```

    <img src="#IMAGE_PREFIX#checkgreen.jpg">

    ```


    The value of **N** should be formatted as follows:


    ```

    <img src="#IMAGE_PREFIX#checkred.jpg">

    ```


    The way to distinguish between these two file names is to extend the SQL source
    query so that it computes a new column, named `OffsiteImage`, whose value is either
    `''checkgreen.jpg''` or `''checkred.jpg''`. The SQL query now looks like this
    (new code is in bold):


    ```sql

    select e.*, extract(year from e.HireDate) as HireYear,

    case when e.Sal>2500 then ''red'' else ''black'' end as SalColor,

    case when e.Offsite = ''Y'' then ''checkgreen.jpg''

    else ''checkred.jpg'' end as OffsiteImage

    from EMP e

    ```


    After changing the source of the report to this query, you can format the `OFFSITE`
    column by assigning the following code to its `HTML Expression` property:


    ```

    <img src="#IMAGE_PREFIX##OFFSITEIMAGE#">

    ```


    Finally, you should set the type of columns `SALCOLOR` and `OFFSITEIMAGE` to `Hidden
    Column`.


    ## Report-Specific Properties


    It is now time to consider the report-specific properties of a classic report.
    These properties are associated with the region’s `Attributes` node in the rendering
    tree and handle issues such as pagination and record grouping. Figure [3-36](#335103_3_En_3_Chapter.xhtml#Fig36)
    shows the `Layout` and `Pagination` sections for the `Formatted Report` region.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig36_HTML.png](images/335103_3_En_3_Chapter/335103_3_En_3_Fig36_HTML.png)'
