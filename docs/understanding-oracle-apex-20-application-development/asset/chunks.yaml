- fmt: '# Navigation


    The item labeled `Parent Navigation Menu Entry` displays every entry in the navigation
    menu list. (You need to scroll through the list to see them all.) The default
    value is `-No parent selected-`, which causes the new menu entry to be a root.
    If you want the new entry to be a child of another entry, you must specify a parent.
    Ideally, you should be able to just select the entry you want from the list. However,
    some of the entries are grayed out and are not selectable. In particular, the
    selectable entries are the ones that either are already parents or are “potential
    parents” in the sense that they have no target. Most of the time, the parent you
    want will be selectable. But if you want your new entry to be a child of one of
    the grayed out entries, you must assign its parent via the list manager.


    ## Mega Menus


    Hierarchical navigation menus improve the user experience in two ways. First,
    they structure the menu entries, so that users can more easily understand what
    actions are available. Second, they reduce the amount of screen real estate that
    the menu requires.


    A more recent design idea is to keep the hierarchical organization but display
    all menu entries at once, in what is called a *mega menu*. For example, Figure
    4-24 shows what the employee demo application looks like with a mega menu. Clicking
    the icon to the left of the logo toggles the visibility of the menu. Each of the
    menu entries is a link to its target page.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig24_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig24_HTML.jpg)


    Figure 4-24 A mega menu


    APEX implements mega menus as just another navigation menu template. To create
    a mega menu, click the `Edit Application Properties` button on the application’s
    home page and then the `User Interface` tab. Find the `Navigation Menu` section
    and set its `Position` property to `Top` and its `List Template` property to `Top
    Navigation Mega Menu`, as shown in Figure 4-25.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig25_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig25_HTML.jpg)


    Figure 4-25 Specifying a mega navigation menu


    ## Page Hierarchy


    A large web application contains too many pages for all of them to be in the navigation
    menu. Instead, the navigation menu contains the application’s *landing pages*—those
    pages that denote the start of the most prominent tasks.


    Typically, the set of all pages in an application also has a hierarchical structure.
    An explicit rendering of this page hierarchy is called a *site map*. Consider,
    for example, the pages in an APEX site. Their root in the hierarchy is the APEX
    home page. The children of the root correspond to the various categories of the
    application, such as the app builder, the SQL workshop, and the team development
    tools. Each category has a “home page” that heads a subtree containing the pages
    of its category.


    Figure 4-26 lists a portion of the page hierarchy corresponding to the APEX app
    builder. Due to space limitations, the figure leaves out many pages.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig26_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig26_HTML.jpg)


    Figure 4-26 App builder’s page hierarchy


    It is worthwhile to compare this page hierarchy with the app builder’s navigation
    menu. The navigation menu covers most (but not all) of the pages at the first
    three levels of the tree. Prominently missing from the navigation menu are entries
    corresponding to the subtree for each application; these pages are instead accessed
    from icons and buttons on the app builder home page.


    ## Breadcrumbs


    You can describe the location of any page in an application by giving the sequence
    of pages in the path of the page hierarchy between it and the home page. For example,
    the location of the `Application Attributes` page is


    ```

    App Builder > Workspace Utilities > Cross Application Reports > Application Attributes

    ```


    This path is known as a *breadcrumb*. Not all APEX screens display their breadcrumbs,
    but if they do, they display them below the navigation bar. Note that the first
    entry in an APEX breadcrumb is displayed as a circled up arrow, which denotes
    the root page of the hierarchy.


    As an exercise, navigate to other pages on the APEX site and notice their breadcrumbs.
    In fact, see if you can find all of the pages listed in Figure 4-26. A breadcrumb
    is clickable. Clicking any portion of its path takes you to that corresponding
    page.


    The navigation menu and breadcrumb are complementary navigation tools. The navigation
    menu is the same for all pages, and its entries encompass the entire functionality
    of the application. By looking at the menu, a user can determine the appropriate
    starting page for any desired action. On the other hand, a page’s breadcrumb is
    specific to that page and provides context about where the page is located within
    the page hierarchy. For example, suppose that you are looking at the app builder’s
    `Application Attributes` page. Its breadcrumb tells you that the page is one of
    the cross-application reports. That information might motivate you to click the
    breadcrumb to explore other cross-application reports.


    In APEX, the entire page hierarchy is called a *breadcrumb object*. A breadcrumb
    object is essentially a hierarchical list—it contains an entry for each page in
    the hierarchy, with each entry (except the root) having a parent.


    APEX automatically creates a breadcrumb object (named `Breadcrumb`) with each
    application. The APEX *breadcrumb manager* lets you edit this object and create
    other breadcrumb objects. To get to the breadcrumb manager, begin at the application’s
    home screen and select the `Shared Components` button at the top of the page.
    Search for the `Navigation` section, click `Breadcrumbs`, and then click the `Breadcrumb`
    icon. You will be taken to the breadcrumb manager for that breadcrumb object.
    Figure 4-27 shows the breadcrumb manager for my `Employee Demo` application.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig27_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig27_HTML.jpg)


    Figure 4-27 Breadcrumb manager


    The figure shows that there is only one breadcrumb entry, which corresponds to
    the home page. This entry was created automatically when I created the application.
    Note that the entry still exists, even though I deleted its breadcrumb region
    from the home page.


    When I created the other pages, I told the wizard to not create a breadcrumb entry
    for the new page. Instead, I can use the breadcrumb manager to create the breadcrumb
    entries now. Click the `Create Breadcrumb Entry` button. Figure 4-28 shows the
    resulting screen.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig28_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig28_HTML.jpg)


    Figure 4-28 Breadcrumb Entry screen


    This screen lets you specify the page and its parent, as well as information about
    how the breadcrumb will be displayed on the page. In particular


    *   The `Page` property (in the `Breadcrumb` section) specifies the page.

    *   The `Parent Entry` property specifies the parent.

    *   The `Short Name` property specifies how the page will be displayed on the
    breadcrumb. Choosing the page’s name is often reasonable.

    *   The `Page` property (in the `Target` section) specifies what happens when
    a user clicks that breadcrumb entry. It typically has the same value as the earlier
    `Page` property.


    Let’s create a breadcrumb entry for page 7, the `List Practice` page, which will
    be a child of the home page. Enter 7 for the `Breadcrumb Page` and `Target Page`
    properties, `1` for the `Parent Entry` property, and `List Practice` for the `Short
    Name` property.'
