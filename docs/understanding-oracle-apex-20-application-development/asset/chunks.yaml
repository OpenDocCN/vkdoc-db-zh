    \ A screenshot\nof the logo appears in Figure [3-22](#335103_3_En_3_Chapter.xhtml#Fig22).\n\
    \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig22_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig22_HTML.jpg)\n\
    \nFigure 3-22\nLogo corresponding to Figure [3-21](#335103_3_En_3_Chapter.xhtml#Fig21)\n\
    \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig21_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig21_HTML.jpg)\n\
    \nFigure 3-21\nSpecifying an image logo\n\nClassic Report Regions\n\nEarlier in\
    \ this chapter, you had a brief encounter with a classic report\nregion, when\
    \ you created a report in the `Region Practice` page\nhaving the source query\
    \ **select * from DEPT**. This\nsection examines classic reports in more detail.\
    \ Page 3 of the `Employee Demo`\napplication contains two regions, titled `Default\
    \ Report` and\n`Formatted Report`. Figures [3-23](#335103_3_En_3_Chapter.xhtml#Fig23)\
    \ and [3-24](#335103_3_En_3_Chapter.xhtml#Fig24) display the\nreports from these\n\
    two regions.\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig24_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig24_HTML.jpg)\n\
    \nFigure 3-24\nThe formatted employee report\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig23_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig23_HTML.jpg)\n\
    \nFigure 3-23\nThe default employee report\n\nBoth reports have the same source,\
    \ which is the following SQL query:\n\n```\nselect EmpNo, EName, Job, HireDate,\
    \ Sal, DeptNo, Offsite\nfrom EMP\n```\n\nThe formatted report differs from the\
    \ default report in the following\nways:\n\n*   The columns `EmpNo` and `Job`\
    \ are not\n    displayed.\n\n*   The column headers for `EName` and `DeptNo` have\
    \ been\n    renamed, and the header for `Hiredate` is in\n    italics.\n\n*  \
    \ The records can only be sorted by employee name or\n    salary.\n\n*   Employee\
    \ names are accentuated by writing them in a larger font\n    and in bold and\
    \ include the employee’s job.\n\n*   Hire dates are formatted differently from\
    \ the default report and\n    are links.\n\n*   Salary values are formatted as\
    \ currency and aligned right, and\n    values over $2,500 are colored red.\n\n\
    *   Department values are shown as department names instead of\n    department\
    \ numbers.\n\n*   Values for the `Offsite` column are\n    displayed as images\
    \ instead of text.\n\n*   Fewer rows are displayed at a time, with pagination\n\
    \    controls.\n\nThis section will show you how to use the type-specific properties\n\
    of report regions (together with some additions to the SQL source query)\nto build\
    \ the formatted report. Begin by following these steps:\n\n*   Create a new blank\
    \ page named `Classic Reports` and\n    having page number 3\\. Tell the wizard\
    \ to create a navigation menu entry\n    for the page, also named `Classic Reports`.\n\
    \n*   Go to the page editor for this page and create two new regions.\n    Title\
    \ the regions `Default Report` and\n    `Formatted Report`, and place them in\
    \ the `Content Body` position\n    of the page.\n\n*   Set the type of each region\
    \ to be `Classic Report` having\n    the source query given earlier.\n\n*   Configure\
    \ their `Layout` properties so\n    that the `Formatted Report` region starts\
    \ a new row. (Or if you prefer to see the\n    reports side by side, set the properties\
    \ so that `Formatted Report` does\n    not start a new row.)\n\nAt this point,\
    \ your page should display two identical regions that look\nlike Figure [3-23](#335103_3_En_3_Chapter.xhtml#Fig23).\
    \ Figure [3-25](#335103_3_En_3_Chapter.xhtml#Fig25) depicts the\ntop of the resulting\
    \ rendering tree for this page, showing the\ncomponents for the `Default Report`\n\
    region. (The components for `the Formatted Report`\nregion are similar and thus\
    \ omitted.) Note that APEX created several\ncomponents for each report: a component\
    \ (labeled with the region name)\nthat contains the type-independent properties,\
    \ a component (labeled\n`Attributes`)\nthat contains report-specific properties,\
    \ and a component for each\ncolumn of the report that contains the column-specific\
    \ properties. The\nfollowing sections examine these column-specific and report-specific\n\
    properties.\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig25_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig25_HTML.jpg)\n\
    \nFigure 3-25\nRendering tree for a Classic Report\nregion\n\nColumn-Specific\
    \ Properties\nEach column in a report has its own set of properties. When you\n\
    select a column node in the rendering tree, the property editor shows\nyou its\
    \ column-specific properties. These properties are grouped into\nseveral sections,\
    \ which are discussed next.\n\nIdentification"
  trans: "\n## 引用本地图片\n\nHTML 的`<img>`标签用于显示图像；其参数是图像文件的 URL。如果 URL 是引用另一个网络服务器上的文件，使用绝对\
    \ URL 即可。但是，如果你计划将图像文件存储在 APEX 网络服务器上，则应使用相对 URL。此 URL 的格式按如下方式确定。\n\n首先要做的是将文件上传到服务器。转到应用程序的主页，点击`共享组件`按钮，并找到`文件`部分，如图\
    \ 3-20 所示。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig20_HTML.jpg](img/335103_3_En_3_Fig20_HTML.jpg)\n\
    \n**图 3-20** 共享组件屏幕的文件部分\n\n你有两个选项可供选择：`静态应用程序文件`或`静态工作区文件`。它们之间的区别在于可见性。应用程序文件只能被特定的应用程序引用，而工作区文件可以被工作区中的任何应用程序访问。无论你点击哪个选项，都将进入一个让你选择文件的屏幕。然后点击`上传`按钮进行上传。\n\
    \n要使用 HTML 的`<img>`标签显示你的图像文件，你必须指定其在服务器上的位置。然而，APEX 不会告诉你它存储图像文件的位置；相反，它为你提供了内置变量。有两个变量，`APP_IMAGES`和`WORKSPACE_IMAGES`，它们的值分别保存服务器上你的应用程序图像和工作区图像的路径。你使用**替换字符串**来访问这些变量的值。例如，我将员工照片上传到一个名为`employees.jpg`的文件，并将其在\
    \ APEX 中保存为应用程序文件。你也应该对你的图片做同样的操作。显示此文件的 HTML 标签是：\n\n```\n<img src=\"#APP_IMAGES#employees.jpg\"\
    \ alt=\"Employees\">\n```\n\n请注意此标签中句点字符的两种不同用法。第一个是替换字符串表示法的一部分，在页面渲染时将被替换为图像目录的路径；第二个是文件名的一部分。\n\
    \n考虑到这一点，看一下清单 3-4 中`快速链接`区域的源代码。\n\n```\n<a href=\"f?p=&APP_ID.:3:&SESSION.\"\
    >\n    <img src=\"#APP_IMAGES#employees.jpg\" alt=\"Employees\">\n</a>\n```\n\n\
    **清单 3-4** 快速链接区域的源代码\n\n此代码使用`<img>`标签显示`employees.jpg`图像，然后使用`<a>`和`</a>`标签将此图像包装在链接中。因此，点击图像会将用户带到应用程序的第\
    \ 3 页（这意味着在下一节创建第 3 页之前，该链接将不起作用）。\n\n第 2 章讨论了使用图像作为应用程序徽标的可能性。为了演示这种可能性，我创建了一个\"\
    Employee Demo\"文字的艺术化图像，将其保存在文件`Logo.jpg`中，并将其作为应用程序文件上传到 APEX。然后，我按照第 2 章的描述配置了应用程序的徽标。也就是说，我在应用程序主页点击了`编辑应用程序属性`按钮，点击了`用户界面`选项卡，并修改了`徽标`部分中的属性，如图\
    \ 3-21 所示。徽标的截图如图 3-22 所示。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig22_HTML.jpg](img/335103_3_En_3_Fig22_HTML.jpg)\n\
    \n**图 3-22** 对应图 3-21 的徽标\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig21_HTML.jpg](img/335103_3_En_3_Fig21_HTML.jpg)\n\
    \n**图 3-21** 指定图像徽标\n\n## 经典报表区域\n\n在本章前面，当你在`区域练习`页面创建了一个源查询为`select * from DEPT`的报表时，你已经简要接触过经典报表区域。本节将更详细地探讨经典报表。`员工演示`应用程序的第\
    \ 3 页包含两个区域，标题为`默认报表`和`格式化报表`。图 3-23 和图 3-24 显示了这两个区域的报表。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig24_HTML.jpg](img/335103_3_En_3_Fig24_HTML.jpg)\n\
    \n**图 3-24** 格式化的员工报表\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig23_HTML.jpg](img/335103_3_En_3_Fig23_HTML.jpg)\n\
    \n**图 3-23** 默认的员工报表\n\n这两个报表具有相同的来源，即以下 SQL 查询：\n\n```\nselect EmpNo, EName,\
    \ Job, HireDate, Sal, DeptNo, Offsite\nfrom EMP\n```\n\n格式化报表与默认报表的不同之处如下：\n\n\
    *   不显示`EmpNo`和`Job`列。\n*   `EName`和`DeptNo`的列标题已被重命名，`Hiredate`的标题为斜体。\n*   记录只能按员工姓名或工资排序。\n\
    *   员工姓名通过使用更大字体、加粗书写来突出显示，并包含员工的职位。\n*   雇佣日期的格式与默认报表不同，并且是链接。\n*   工资值被格式化为货币并右对齐，超过$2,500\
    \ 的值显示为红色。\n*   部门值显示为部门名称，而不是部门编号。\n*   `Offsite`列的值显示为图像而不是文本。\n*   一次显示的行数更少，带有分页控件。\n\
    \n本节将向你展示如何使用报表区域的特定类型属性（结合对 SQL 源查询的一些补充）来构建格式化报表。首先按照以下步骤操作：\n\n*   创建一个名为`经典报表`的新空白页面，页面编号为\
    \ 3。告诉向导也为该页面创建一个名为`经典报表`的导航菜单条目。\n*   转到此页面的页面编辑器并创建两个新区域。将区域标题命名为`默认报表`和`格式化报表`，并将它们放置在页面的`内容主体`位置。\n\
    *   将每个区域的类型设置为`经典报表`，源查询为前面给出的查询。\n*   配置它们的`布局`属性，使`格式化报表`区域开始一个新行。（或者，如果你希望报表并排显示，请设置属性使`格式化报表`不开始新行。）\n\
    \n此时，你的页面应该显示两个相同的区域，看起来像图 3-23。图 3-25 描绘了此页面最终渲染树的顶部，显示了`默认报表`区域的组件。（`格式化报表`区域的组件类似，因此省略。）请注意，APEX\
    \ 为每个报表创建了几个组件：一个包含与类型无关的属性的组件（标有区域名称），一个包含报表特定属性的组件（标为`属性`），以及为报表的每一列包含列特定属性的组件。以下各节将探讨这些列特定和报表特定的属性。\n\
    \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig25_HTML.jpg](img/335103_3_En_3_Fig25_HTML.jpg)\n\
    \n**图 3-25** 经典报表区域的渲染树\n\n## 列特定属性\n\n报表中的每一列都有自己的一组属性。当你在渲染树中选择一个列节点时，属性编辑器会显示其列特定属性。这些属性分为几个部分，接下来将进行讨论。\n\
    \n### 标识\n"
- fmt: 'Figure [3-26](#335103_3_En_3_Chapter.xhtml#Fig26) displays the two properties
    in the `Identification` section. The `Column Name` property is the name of the
    column. The column name comes directly from the source query, and therefore this
    value cannot be changed.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig26_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig26_HTML.jpg)


    Figure 3-26 Specifying the type of the ENAME column


    ## Identification


    The `Type` property specifies how APEX should display the column values. The possible
    type values are shown in Figure [3-26](#335103_3_En_3_Chapter.xhtml#Fig26). The
    type `Plain Text` is the default and says to display the value as is. The type
    `Link` says to display the value as a link, the type `Display Image` as an image,
    and the type `Percent Graph` graphically. The type `Hidden Column` says not to
    display the values at all.


    In the `Default Report` region, all columns are plain text. The columns of the
    `Formatted Report` region have the following types: `ENAME`, `SAL`, and `OFFSITE`
    are plain text, `EMPNO` and `JOB` are hidden, `HIREDATE` is a link, and `DEPTNO`
    is plain text based on a list of values. In your application, you can change the
    type of the two hidden columns now. However, you need to wait until later in the
    chapter before you can change the type of `HIREDATE` and `DEPTNO`.


    ## Column Heading


    A column’s `Heading` section contains two properties for customizing the column’s
    report header. The `Heading` property contains the value that is displayed in
    the column header. By default, this is the column name, but it can be changed.
    For example in my application, I changed the header for `ENAME` to be `Name` and
    the header for `DEPTNO` to be `Department`.


    In general, the value for `Heading` can include HTML code, such as formatted text
    or an image. For example, Figure [3-27](#335103_3_En_3_Chapter.xhtml#Fig27) shows
    my HTML code for the header of `HIREDATE`, which causes APEX to display the string
    `Hiredate` in italics.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig27_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig27_HTML.jpg)


    Figure 3-27 Specifying the header of the HIREDATE column


    By default, column headings are aligned in the center of the column. This is almost
    always what you want. However, the `Alignment` property lets you specify a different
    alignment if for some reason this seems appropriate.


    ## Column Layout


    The `Layout` section contains two properties for customizing the display of the
    columns. The `Sequence` property determines the order in which the columns appear
    in the report. The `Column Alignment` property specifies the alignment of the
    column values. By default, column values are aligned to the left. Figure [3-28](#335103_3_En_3_Chapter.xhtml#Fig28)
    shows the `Layout` section for the `SAL` column, in which the alignment is set
    to the right.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig28_HTML.png](images/335103_3_En_3_Chapter/335103_3_En_3_Fig28_HTML.png)


    Figure 3-28 Specifying the layout of the SAL column


    ## Sort Order


    APEX divides the issue of sorting into two aspects: how it sorts the records when
    it first renders the report and whether the user can interactively re-sort the
    report by clicking column headers. If a report’s source query has an `order by`
    clause, the records are sorted in that order and cannot be altered by the user.
    Otherwise, these aspects are determined by the properties in each column’s `Sorting`
    section. Figure [3-29](#335103_3_En_3_Chapter.xhtml#Fig29) shows the `Sorting`
    section for `ENAME`.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig29_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig29_HTML.jpg)


    Figure 3-29 Specifying the sort behavior of the ENAME column


    The `Default Sequence` property specifies the initial sort order. Each column
    that participates in the initial sort order will have a value for `Default Sequence`,
    with the primary sort column having value 1. In Figure [3-29](#335103_3_En_3_Chapter.xhtml#Fig29),
    `ENAME` has sequence 2. Not shown is the sequence property for `JOB, which` has
    sort sequence 1. Together, they imply that the report will be rendered with the
    rows sorted by job, and two employees having the same job will be listed alphabetically
    by name (as you can see in Figure [3-24](#335103_3_En_3_Chapter.xhtml#Fig24)).


    The `Sortable` property specifies whether a user is able to interactively sort
    on the column. By default, all columns are sortable. In the `Formatted Report`
    region, I turned off sortability for all columns except `ENAME` and `SAL`. The
    initial sort sequence is completely independent of sortability. For example, the
    `Formatted Report` region is initially sorted by the `JOB` column, even though
    the column is not even visible.


    ## List of Values


    Consider the `DEPTNO` column in the formatted report. It displays values from
    the `DEPT` table, even though the report mentions only the `EMP` table. How can
    this be? The answer is that the values in the column have not changed; they are
    still department numbers. However, you can set up a correspondence between department
    names and numbers and tell APEX to display the name corresponding to a given department
    number. This correspondence between the return value (the department number) and
    its display value (the department name) is called a *list of values*.


    Formally, a list of values is a two-column table. The first column holds the display
    values, and the second column holds the corresponding return values. One useful
    way to specify a list of values is to use an SQL query. For example, the list-of-values
    query for the `DEPTNO` column is simply this:


    ```sql

    select DName, DeptNo

    from DEPT

    ```


    When you assign a column to have the type `Plain Text (based on List of Values)`,
    the property editor displays a `List of Values` section. Figure [3-30](#335103_3_En_3_Chapter.xhtml#Fig30)
    shows the section with the property values filled in.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig30_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig30_HTML.jpg)


    Figure 3-30 Formatting the DEPTNO column using a list of values


    ## Format Masks


    You occasionally might want to display a number as a string having a particular
    format. For example, you might use a comma to separate every three digits, you
    might have a prescribed number of digits to the right of the decimal point, or
    you might prefix the number with a currency character. Date values can also be
    written in different formats. In each case, you can use a *format mask* to express
    your desired format.


    A column''s `Format Mask` property is in its `Appearance` section. Figure [3-31](#335103_3_En_3_Chapter.xhtml#Fig31)
    shows how I filled in the property for `SAL`. The icon to the right is a “quick
    pick” button. Clicking it brings up a list of common formats; selecting a format
    places its mask in the property’s text box. If you are not familiar with the Oracle
    format mask syntax, you can get a reasonable understanding by examining the various
    masks. For example, `9` denotes an optional digit, `0` a required digit, `G` a
    thousands’ separator, `D` the decimal point, and so on. Such an understanding
    makes it possible to modify the mask to fit your needs.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig31_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig31_HTML.jpg)


    Figure 3-31 My format mask for SAL


    For example, to get the mask for the `SAL` column, I chose the currency format
    $5,234.10 from the format list, which produced the mask `FML999G999G999G999G990D00`.
    However, because the `EMP` table stores salary values in whole dollars, I did
    not want to display the decimal point and the two digits to its right. So I removed
    the `D00` from the end of the mask.'
