    \ will have no way of knowing how to compute the correct value.\nSimilarly, a\
    \ user cannot create an item-saving URL from scratch because\nthere is no way\
    \ to determine its checksum. Thus, item modification is\nimpossible.\nThere are\
    \ two steps to enabling page access protection for a page.\nThe first step is\
    \ to enable the application’s `Session State Protection` property . Starting from\
    \ the\napplication’s home screen, click the `Edit Application Properties` button\
    \ and then click the `Security` tab. The\nproperty is in the `Session State Protection`\
    \ section. Most likely, the property is already enabled;\nif not, select `Enabled`.\
    \ The second\nstep is to go to the page properties for the page. The `Page Access\
    \ Protection` property is in the `Security` section;\nselect the option `Arguments\
    \ Must Have Checksum`.\n\nAs a test, set up page access protection for the `Employees\
    \ by Department` page. Then go to the page and click the link for the\naccounting\
    \ department. You should see a URL similar to this:\n\n```\nf?p=91392:12:98765::::P12_DEPTNO,P12_DNAME:10,ACCOUNTING&cs=10FzVgvoxRFQBVRnEe9Ww2QSzoVM\n\
    ```\n\nNote that this URL is the same as in Listing [13-11](#335103_3_En_13_Chapter.xhtml#PC35),\
    \ except for\nthe checksum information at the end. Now try to perform\nitem modification\
    \ on this URL (with or without changing the checksum\nvalue). APEX detects the\
    \ modification, returning the error message shown\nin Figure [13-25](#335103_3_En_13_Chapter.xhtml#Fig25).\n\
    \n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig25_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig25_HTML.jpg)\n\
    \nFigure 13-25\nDetecting an attempted item modification"
