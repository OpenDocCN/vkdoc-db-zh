- fmt: "## Implementing the `Select Table` region\n\nImplementing the `Select Table`\
    \ region is straightforward. Its checkbox item is named `P15_CHOICE`, and it contains\
    \ the two static values shown in Figure [6-20](#335103_3_En_6_Chapter.xhtml#Fig20).\
    \ The button performs a `Submit` action.\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig20_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig20_HTML.jpg)\n\
    Figure 6-20 The static values for `P15_CHOICE`\n\nThe page contains two other\
    \ regions, both of which are of type `Classic Report`. The `Employee Info` region\
    \ has the following source:\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig21_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig21_HTML.jpg)\n\
    Figure 6-21 Source properties of `P15_CHOICE`\n\n*   And the `Department Info`\
    \ region has the following source:\n    ```\n    select * from DEPT\n    ```\n\
    *   Both of these regions are displayed conditionally, depending on the value\
    \ of `P15_CHOICE`. The condition for `Employee Info` is the following SQL expression:\n\
    \    ```\n    InStr(:P15_CHOICE, 'Employee') > 0\n    ```\n*   And the condition\
    \ for `Department Info` is the following SQL expression:\n    ```\n    InStr(:P15_CHOICE,\
    \ 'Department') > 0\n    ```\n*   When the button is clicked, APEX creates a colon-delimited\
    \ string containing the values of the checked boxes and saves it in the session\
    \ state. When the page is then re-rendered, APEX uses the session state value\
    \ to initialize `P15_CHOICE` and evaluates each conditional expression to determine\
    \ which regions to display. Consequently, it is important that the `Source` properties\
    \ of `P15_CHOICE` be specified as in Figure [6-21](#335103_3_En_6_Chapter.xhtml#Fig21).\n\
    \    ```\n    select * from EMP\n    ```\n\n## Region Display Selectors\n\nRecall\
    \ from Chapter [2](#335103_3_En_2_Chapter.xhtml) (and Figure [2-6](#335103_3_En_2_Chapter.xhtml#Fig6))\
    \ that the `Application Properties` screen lets you manage application-wide properties,\
    \ such as the application logo and the location of the navigation menu. Figure\
    \ [6-22](#335103_3_En_6_Chapter.xhtml#Fig22) shows the top part of that screen.\n\
    \n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig22_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig22_HTML.jpg)\n\
    Figure 6-22 Part of the `Application Properties` screen\n\nNote in particular\
    \ the tab bar under the title, with tabs labeled `Show All`, `Name`, `Properties`,\
    \ and so on. This bar is a *region display selector*. If you click the `Show All`\
    \ tab, the page displays all its regions; if you click any of the other tabs,\
    \ the page displays only the chosen region.\n\nYou can add a region display selector\
    \ to your application. Let’s build a page similar to the `Display Table` page\
    \ of Figure [6-19](#335103_3_En_6_Chapter.xhtml#Fig19), but using a region display\
    \ selector instead of a radio group. This page, titled `Select Region`, will be\
    \ page 16 of the `Employee Demo` application. Figure [6-23](#335103_3_En_6_Chapter.xhtml#Fig23)\
    \ shows the page with the `Department Information` tab selected.\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig23_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig23_HTML.jpg)\n\
    Figure 6-23 Using a region display selector region\n\nThis page consists of two\
    \ classic report regions, one for each of the `EMP` and `DEPT` tables. Above it\
    \ is a `Region Display Selector` region. To create the display selector region,\
    \ create a region in the page designer and then change its type to `Region Display\
    \ Selector`. Unlike every other region you have encountered, this region has no\
    \ source; its sole purpose is to display a tab bar for the regions of the page.\n\
    The region display selector in Figure [6-23](#335103_3_En_6_Chapter.xhtml#Fig23)\
    \ is placed in the `Content Body` position with a small sequence number so that\
    \ it appears first. Its template is `Buttons Container`, which formats the region\
    \ without a title.\nBy default, the region display selector displays a tab for\
    \ every region on the page (provided that there is more than one region to display).\
    \ If you want to exclude a region, use its property `Region Display Selector`,\
    \ which is a switch in the `Advanced` section. Turning the property off excludes\
    \ that region from having a tab in the display selector.\n\n## Summary\n\nThe\
    \ APEX server maintains data about each user session; this data is called the\
    \ *session state*. In this chapter, you saw how the session state gets modified\
    \ and examined ways that an application developer can make use of it.\nThe session\
    \ state has a variable for each item in the application. These variable values\
    \ can get modified as the result of a submit or redirect action.\nWhen a page\
    \ is submitted, the values of all items on the page will be updated in the session\
    \ state. When a page redirects to a target page, the redirect operation can assign\
    \ values to specific items. In particular, when you configure a button, report\
    \ link, or chart to redirect, the property editor will display the `Link Builder`\
    \ wizard, which has a section for specifying session state values.\nOne common\
    \ use of session state is to enable users to customize reports. The idea is that\
    \ a user specifies some values, and those values affect which of the report records\
    \ are displayed. You saw examples of several ways that a user could specify those\
    \ values:\n\n*   The user can enter the values directly into items on the page.\n\
    *   The user can select a row from a master report.\n*   The user can select a\
    \ value by doing chart drill down.\n\nThis chapter also considered additional\
    \ uses of session state, such as *cascading lists*, in which the value chosen\
    \ for one select list determines the values displayed by another, and *conditional\
    \ rendering*, in which the value of an item determines whether a region should\
    \ be visible or hidden.\nSession state is an immensely important aspect of APEX.\
    \ Most of the examples in the rest of the book will make use of the techniques\
    \ mentioned in this chapter.\n\n## 7. Processes\n\nAs you have seen, it is possible\
    \ to write highly functional web pages using only items, reports, and charts.\
    \ But to implement anything more complex, you have to be able to perform calculations\
    \ and interact with the database more generally. The notion of a *process* addresses\
    \ both issues.\nThis chapter examines some typical situations that require the\
    \ use of processes and introduces the basics of PL/SQL so that you can write your\
    \ own code to implement these processes. It also examines the pitfalls you might\
    \ encounter when writing PL/SQL code, such as the possibility of lost updates.\n\
    \n### Stages of a Submit Action\n\nRecall that the left panel of the page designer\
    \ contains four tabs. This book so far has focused on the `Rendering` tab; it\
    \ is now time to move to the `Processing` tab. To get to this tab, click the circular-arrows\
    \ icon, third from the left at the top of the panel. Figure [7-1](#335103_3_En_7_Chapter.xhtml#Fig1)\
    \ shows the resulting screen.\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig1_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig1_HTML.jpg)\n\
    Figure 7-1 Processing tab of the page designer"
