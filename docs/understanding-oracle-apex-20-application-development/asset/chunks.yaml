    # APEX 导航与列表配置


    ## 修改导航菜单项


    这里相关的属性是 `Sequence`、`List Entry Label` 和 `Page`。

    作为实验，请更改这些属性的值——例如，将 `Sequence` 设置为 `60`，将 `List Entry Label` 设置为 `Fun with Regions`。然后运行应用程序。导航菜单现在应该如图
    4-4 所示。特别是，原先标题为 `Region Practice` 的条目现在标题为 `Fun with Regions` 并出现在最后。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig4_HTML.png](img/335103_3_En_4_Fig4_HTML.png)


    **图 4-4** 修改后的导航菜单


    ## 创建新的列表条目


    现在请关注 `Desktop Navigation Bar` 列表。APEX 应用程序中的导航栏横跨每个页面的顶部。默认情况下，导航栏左侧显示徽标，右侧显示当前用户名（如第
    2 章图 2-8 所示）。导航栏的总体意图是提供常用任务的快速链接。例如，徽标实际上是主页的链接，而用户名是一个菜单，其中包含一个链接到注销用户的存储过程。导航栏通常包含用于显示站点地图、在线帮助或联系信息的链接。


    要查看导航栏的实现方式，请转到 `Desktop Navigation Bar` 列表的 `List Details` 屏幕；如图 4-5 所示。该列表包含三个条目。第一个条目显示用户名，第二个是一个无趣的分隔符，第三个是注销存储过程的链接。这些条目是分层组织的，这正是创建菜单结构的方式。用户名条目是父项，因此显示为菜单。注销条目是其子项，因此显示为菜单条目。分层列表将在本章后面详细讨论。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig5_HTML.png](img/335103_3_En_4_Fig5_HTML.png)


    **图 4-5** Desktop Navigation Bar 列表的详细信息


    让我们修改导航栏，使其拥有两个新条目：一个指向本书网页的链接和一个指向 `Contact Info` 页面的链接。要创建其他条目，请单击 `Create Entry`
    按钮。然后将显示 `List Entry` 屏幕，如图 4-6 所示。请注意，此屏幕与图 4-3 基本相同，只是其按钮用于条目创建而非更新。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig6_HTML.jpg](img/335103_3_En_4_Fig6_HTML.jpg)


    **图 4-6** 用于创建列表条目的 List Entry 屏幕


    要创建指向本书网页的链接，您只需输入 `List Entry Label` 属性的值（我输入了 `Get the Book`）并设置目标。这里，目标是一个
    URL，因此您需要将 `Target type` 属性设置为 `URL`，并将其 `URL Target` 属性设置为 [`www.apress.com/9781484261651`](http://www.apress.com/9781484261651)。

    然后点击 `Create List Entry`。

    既然如此，您也可以立即创建指向 `Contact Info` 页面的链接，尽管该页面尚不存在。假设它将是第 6 页，创建一个新的列表条目，将其 `List
    Entry Label` 设置为 `Contact Us`，`Target type` 设置为 `Page in this Application`，`Page`
    值设置为 `6`。然后返回应用程序的主页。


    现在创建 `Contact Info` 页面。当然，您可以按照自己的意愿设计页面。但只需创建一个包含单个 `Static Content` 区域的空白页面，其源是简单的文本消息即可。为了多样化，我将页面定义为
    `modal dialog`，并将该区域的 `Template` 属性设置为 `Alert`。图 4-7 显示了单击 `Contact Us` 链接后的应用程序。请注意，`Contact
    Info` 页面不需要在导航菜单中有条目，因为它已在导航栏中有一个条目。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig7_HTML.jpg](img/335103_3_En_4_Fig7_HTML.jpg)


    **图 4-7** 在导航栏上使用 Contact Us 链接


    ## 创建新列表


    让我们创建一个列表来保存主页上 `References` 区域的三个链接。返回到图 4-1 的列表管理器屏幕。点击 `Create` 按钮将打开 APEX
    列表创建向导。此向导有四个屏幕。在第一个屏幕上，选择 `From Scratch` 创建列表。在第二个屏幕上，给列表起一个名字（例如，**References**），并将其类型设置为
    `Static`。


    第三个屏幕让您可以机会通过输入标签和 URL 来创建菜单条目。您可以在那里创建条目，也可以等待并像上一节那样单独创建每个条目。我发现现在创建条目更快。图 4-8
    显示了我如何填写屏幕。请注意，该图未显示完整的 URL，因为它们对于文本框来说太长了。供您参考，完整的 URL 出现在清单 3-3 中。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig8_HTML.jpg](img/335103_3_En_4_Fig8_HTML.jpg)


    **图 4-8** 第三个 Create List 屏幕


    最后一个屏幕询问您是否要为该列表创建一个区域。

    由于您尚未了解列表区域，请选择 `No`。然后点击 `Create List` 来创建该列表。列表管理器现在应该显示新列表的条目。


    ## 修改导航界面


    默认情况下，`Desktop Navigation Menu` 列表显示在页面左侧，而 `Desktop Navigation Bar` 列表显示在顶部。您可以通过修改应用程序的属性来更改这些默认值。


    第 2 章讨论了如何获取应用程序的属性。回顾一下，转到应用程序的主屏幕（图 2-5）并单击右上角的 `Edit Application Properties`
    按钮。您将进入应用程序的属性屏幕（图 2-6），它有四个选项卡：`Definition`、`Security`、`Globalization` 和 `User
    Interface`。

    选择 `User Interface` 选项卡将显示用户界面属性；图 4-9 显示了该屏幕的顶部。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig9_HTML.jpg](img/335103_3_En_4_Fig9_HTML.jpg)


    **图 4-9** 应用程序的用户界面属性


    请注意图底部列出属性部分的选择条。您可能还记得第 3 章中的 `Logo` 属性（参见图 3-21）。然而，现在您感兴趣的是 `Navigation Menu`
    和 `Navigation Bar` 部分。它们的属性允许您配置导航菜单和导航栏。


    ## 配置导航菜单


    图 4-10 显示了 `Navigation Menu` 属性。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig10_HTML.jpg](img/335103_3_En_4_Fig10_HTML.jpg)


    **图 4-10** 应用程序的 Navigation Menu 属性

    '
- fmt: 'The `Navigation Menu List` property lets you specify the list that will appear
    as the navigation menu. You can choose from any existing list. For example, choosing
    the `References` list results in the navigation menu shown in Figure 4-11.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig11_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig11_HTML.jpg)


    Figure 4-11: `References` list is now the navigation menu


    You can also choose the value `-Select Navigation Menu List-` as the navigation
    menu. Doing so sets the `Navigation Menu List` property to `null`, which causes
    APEX to not render the navigation menu area at all.


    The `Position` property can have the value `Side` or `Top`. Choosing `Top` tells
    APEX to render the navigation menu along the top of the page, below the navigation
    bar. It also causes the value of the `List Template` property to change to `Top
    Navigation Menu`. Figure 4-12 shows the result of displaying the `Desktop Navigation
    Menu` list along the top.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig12_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig12_HTML.jpg)


    Figure 4-12: Navigation menu now appears along the top


    ## Configuring the Navigation Bar


    Figure 4-13 shows the `Navigation Bar` properties.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig13_HTML.png](images/335103_3_En_4_Chapter/335103_3_En_4_Fig13_HTML.png)


    Figure 4-13: The application’s Navigation Bar properties


    The `Navigation Bar List` property lets you specify the list that will appear
    in the navigation bar. As with the navigation menu, it can be any list, although
    it cannot be `null`. For example, Figure 4-14 shows the result of placing the
    `Desktop Navigation Menu` list in the navigation bar.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig14_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig14_HTML.jpg)


    Figure 4-14: Navigation menu now appears in the navigation bar


    ## List Regions


    For the contents of a list to be visible on a page, the list must be assigned
    to a location on that page. The navigation bar and navigation menu locations are
    predefined. If you want a list to appear anywhere else, you must place it in a
    region that you create. The region should be of type `List`, and its source should
    be the name of the list.


    As an example, Figure 4-15 shows the `List Practice` page, which is page 7 of
    the demo application. This page contains four regions, all of type `List`. The
    top three regions display the `References` list (in three different ways), and
    the bottom untitled region displays the `Desktop Navigation Menu` list.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig15_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig15_HTML.jpg)


    Figure 4-15: List Practice page


    To build this page, you should create a new page and add four new regions to it.
    I titled these regions `References Using Cards`, `References Using Links`, `References
    as a Navigation Bar`, and `Navigation Menu`. The first region has a column span
    of 7; the second region begins a new column of the same row; and the other two
    regions begin new rows.


    Set the type of each region to `List`. The source of a `List` region must be a
    list. The property editor lets you choose from the existing lists, as shown in
    Figure 4-16. Select the list `References` for the first three regions and `Desktop
    Navigation Menu` for the `Navigation Menu` region.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig16_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig16_HTML.jpg)


    Figure 4-16: Selecting the source of a list region


    At this point you have the list regions you want, but they are all formatted as
    links. This is appropriate for the `References Using Links` region, but the other
    regions need to be different. To change the way a list is displayed, you must
    change its template. A region of type `List` has a property called `List Template`,
    which is accessed by selecting its `Attributes` node in the rendering tree and
    looking for the `Appearance` section in the property editor. Figure 4-17 shows
    the possible values for this property.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig17_HTML.png](images/335103_3_En_4_Chapter/335103_3_En_4_Fig17_HTML.png)


    Figure 4-17: Possible list template values


    To produce the page shown in Figure 4-15, you should set the template of the `References
    Using Cards` region to `Cards`, the template of the `References as a Navigation
    Bar` region to `Menu Bar`, and the template of the `Navigation Menu` region to
    `Navigation Bar`. For fun, you also might want to experiment with assigning other
    templates to these regions, such as `Badge List`, `Media List`, and `Tabs`.


    For further customization, several list templates have options that can be set
    via the `Template Options` property. For example, the `References Using Cards`
    region uses the options shown in Figure 4-18. In general, the best way to understand
    the purpose of the various template options is to experiment with them on your
    regions.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig18_HTML.png](images/335103_3_En_4_Chapter/335103_3_En_4_Fig18_HTML.png)


    Figure 4-18: Options for the Cards template


    In addition to choosing a list template, recall that you can also customize a
    region by choosing a region template. (Figure 3-10 in Chapter 3 showed the possible
    templates.) The top three regions of Figure 4-15 use the `Standard` template,
    which displays a header containing the region name. The bottom region uses the
    `Tabs Container` template. This template displays its contents with no additional
    border; in fact, it looks a lot like a menu bar. This region demonstrates how
    you can use a list region to mimic a menu bar that appears somewhere other than
    the default places on the page.


    Another feature of Figure 4-15 is that it does not display the navigation menu
    area. You saw earlier how to hide the navigation menu on all pages of an application
    by setting the global property `Navigation Menu List` to `null`. But what if you
    want the menu hidden on just a single page? The answer is to use the `Navigation
    Menu` properties of the page, as shown in Figure 4-19.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig19_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig19_HTML.jpg)


    Figure 4-19: Configuring the navigation menu for a single page'
