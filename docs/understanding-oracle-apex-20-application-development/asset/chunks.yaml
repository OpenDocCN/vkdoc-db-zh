    **清单 8-2**

    不合适但合法的 SQL 命令


    `EmpNo`、`DeptNo` 和 `Sal`（加粗）的指定值是有问题的，因为 `EmpNo` 和 `DeptNo` 列被定义为整数，而 `Sal` 被定义为小数点后最多两位数字。然而，当
    Oracle 被要求将一个值存储到超过该列精度的数值列时，它会先将该值四舍五入到最近的合法值，然后再保存。（一些数据库系统改为截断该值。）因此，前面的插入命令创建了一个新员工，员工号为
