- fmt: "## Row Protection in Action\n\nFigure 11-18 shows the result of running the\
    \ page. You can see the row for the president is grayed out, indicating that those\
    \ cells are not editable. (The cells in the `Ename` column are gray because of\
    \ the read-only specification shown in Figure 11-15.) Not shown are the row-action\
    \ menus for `CLARK` and `KING`, in which the `Delete Row` menu item is grayed\
    \ out.\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig18_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig18_HTML.jpg)\n\
    \n**Figure 11-18** Row protection in action\n\n## Grid Processes\n\nEach grid\
    \ region comes with its own ARP process, which implements the database modification\
    \ operations for that region. If you want your grid to have additional functionality,\
    \ then you need to create additional processes for it.\n\nThe processes discussed\
    \ in Chapters 7 and 10 execute once per submit request. Processes for an interactive\
    \ grid, however, need to execute once per modified row of the grid. For an example,\
    \ consider the `LogChanges` process from Listing 7-13. That process was used in\
    \ the `Revised Employee Data Entry` page—whenever a user clicked the `Delete`,\
    \ `Insert`, or `Update` button, the process inserted into the `EMPLOG` table a\
    \ record denoting the request, the user, and the date.\n\n## Revising the LogChanges\
    \ Process\n\nYou can easily re-create this process for the `Interactive Grids`\
    \ page. Figure 11-19 shows the relevant process properties. These property values\
    \ are exactly the same as for the Chapter 7 process, except for one—the `Editable\
    \ Region` property now has the value `Employees`. This value tells APEX that when\
    \ the process executes, its code should be applied to each changed row in the\
    \ `Employees` grid.\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig19_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig19_HTML.jpg)\n\
    \n**Figure 11-19** The LogChanges process\n\nTest your process by making some\
    \ changes to the `Employees` grid and then looking at the `EMPLOG` table from\
    \ the SQL Workshop. The table should have a record for each modification you made.\
    \ Unfortunately, all the records look the same—the `Request` values are either\
    \ `APEX_AJAX_DISPATCH` (if you used the built-in `SAVE` button on the toolbar)\
    \ or `SAVE` (if you used the `SAVE` button that you wrote for Figure 11-13). That\
    \ is not good enough; the value of the `Request` field ought to be more informative.\n\
    \nConsequently, let’s revise the process code so that the value of the `Request`\
    \ field contains the row status and `EmpNo` value of the modified row, as in \"\
    `update of 8830`\" or \"`insertion of 8200.`\" Listing 11-1 contains the revised\
    \ code. Note that it uses `APEX$ROW_STATUS` to determine which operation occurred.\n\
    \n```sql\ndeclare\n  v_request varchar(20);\nbegin\n  case :APEX$ROW_STATUS\n\
    \    when 'U' then v_request := 'Update ';\n    when 'C' then v_request := 'Insert\
    \ ';\n    when 'D' then v_request := 'Delete ';\n  end case;\n  v_request := v_request\
    \ || :EMPNO;\n  insert into EMPLOG (Request, UserName, RequestDate)\n  values\
    \ (v_request, :APP_USER, sysdate);\nend;\n```\n*Listing 11-1 PL/SQL Code for the\
    \ Revised LogChange Process*\n\n## Custom Insertion for Grids\n\nAnother situation\
    \ you may encounter is that the grid’s built-in database modification code does\
    \ not do what you want. In this case, APEX lets you write your own PL/SQL code\
    \ to replace it.\n\nFor a simple example, consider the problem of inserting a\
    \ new row into a grid that does not contain all the fields of the table. The built-in\
    \ insertion process will assign null values to the missing fields. But what if\
    \ this isn’t good enough? What if the new record needs non-null default values?\n\
    \nTo explore this issue, create a new region in the `Interactive Grids` page.\
    \ Name it `CustomEmps`, give it the type `Interactive Grid`, and set its template\
    \ to `Standard` (so that it matches the `Employees by Department` region above\
    \ it). Its source should be\n\n```sql\nselect EmpNo, EName, Job, Sal, DeptNo\n\
    from EMP\n```\n\nDon’t forget to turn on the `Primary Key` property of the `EMPNO`\
    \ column and turn off its `Validation Required` property. Then go to the `Attribute`\
    \ node’s `Edit` section and enable editing. Figure 11-20 shows the top of the\
    \ resulting region.\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig20_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig20_HTML.jpg)\n\
    \n**Figure 11-20** The Custom Emps grid region\n\nThe task at hand is to change\
    \ the region’s insertion code so that it places default values into the missing\
    \ fields. Here is how to do it.\n\nGo to the `Processing` tab of the page editor\
    \ and select the process node named `Custom Emps-Save Interactive Grid Data`.\
    \ This is the built-in ARP process for the `Custom Emps` grid region. Figure 11-21\
    \ shows its `Identification` and `Settings` properties. The critical property\
    \ here is `Target Type` in the `Settings` section. The default value, `Region\
    \ Source`, tells APEX to use the built-in modification process. To replace it\
    \ with your code, change the property value to `PL/SQL Code`. The property editor\
    \ will display a text box where you can enter the code.\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig21_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig21_HTML.jpg)\n\
    \n**Figure 11-21** Property settings for the grid ARP process\n\nYour custom PL/SQL\
    \ code must handle all three modification operations, even though you are only\
    \ changing insertion. Listing 11-2 shows my code. It uses a case statement to\
    \ determine the operation that needs to be performed. The code for deletion and\
    \ update are straightforward SQL commands, no different than what the ARP process\
    \ would do. The code for insertion determines the default values for the four\
    \ missing columns: the manager of a new employee is the president, the hire date\
    \ is today, initial commission is 0, and the employee does not work offsite. The\
    \ `returning` clause at the end of the `insert` statement causes the newly generated\
    \ employee number to be saved in the grid’s session state.\n\nNote that your process\
    \ only needs to handle a single row. APEX will loop over the grid, calling your\
    \ code for each changed row and handling lost update detection.\n\n```sql\nbegin\n\
    \  case :APEX$ROW_STATUS\n    when 'C' then\n      insert into EMP(EName, Job,\
    \ Sal, DeptNo,\n                      Mgr, HireDate, Comm, Offsite)\n      values\
    \ (:ENAME, :JOB, :SAL, :DEPTNO,\n              7839, sysdate, 0, 'N')\n      returning\
    \ EmpNo into :EMPNO;\n    when 'U' then\n      update emp\n      set EName  =\
    \ :ENAME,\n          Job    = :JOB,\n          Sal    = :SAL,\n          DeptNo\
    \ = :DEPTNO\n      where EmpNo  = :EMPNO;\n    when 'D' then\n      delete emp\n\
    \      where EmpNo = :EMPNO;\n  end case;\nend;\n```\n*Listing 11-2 Custom Interactive\
    \ Grid Modification Code*"
