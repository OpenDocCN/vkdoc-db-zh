- fmt: "# APEX 图表配置与自定义\n\n## 配置单个系列\n\n`Identification`（标识）部分允许您为系列选择一个名称。由于此系列将保存每个职位的最低工资，我将其命名为\
    \ `MinSal`。（您还需要创建另一个系列来保存最高工资，但现在还不需要。）\n\n`Source`（源）部分用于指定系列的数据源。由于您已经为该区域定义了一个源，因此应选择\
    \ `Region Source`（区域源）。另一个选项（此处不讨论）是让每个系列定义自己的源。这种灵活性在比较来自不同表的数据时很有用，但会导致复杂性超出本书讨论范围。\n\
    \n`Column Mapping`（列映射）部分要求您为属性 `Label`（标签）和 `Value`（值）指定值。`Label` 值将是保存标签的源列的名称，在本例中为\
    \ `JOB`。`Value` 值将是保存此系列值的源列的名称，在本例中为 `MINSAL`。\n\n在配置好 `Salary Info`（薪资信息）系列后，您应该参考图\
    \ [3-41](#335103_3_En_3_Chapter.xhtml#Fig41) 的模型来配置 `Salary Info` 图表的系列。完成后，错误指示应从您的页面中消失，您应该能够保存它。如果运行该页面，您应该获得如图\
    \ [3-42](#335103_3_En_3_Chapter.xhtml#Fig42) 所示的输出。这些图表相当不错，但需要进行自定义。接下来将讨论这个主题。\n\
    \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig42_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig42_HTML.jpg)\n\
    \n**图 3-42** 图表页面的初步效果\n\n## 多系列图表\n\n`Salary Info` 区域当前有一个系列，用于显示每个职位的最低工资。您可以轻松创建第二个系列来显示每个职位的最高工资，步骤如下。在区域的渲染树中右键单击\
    \ `Series`（系列）节点，然后选择 `Create Series`（创建系列）。然后像配置前一个系列一样配置该系列：将系列重命名为 `MaxSal`，并适当地设置其源和列映射。结果应如图\
    \ [3-43](#335103_3_En_3_Chapter.xhtml#Fig43) 所示的多系列图表。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig43_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig43_HTML.jpg)\n\
    \n**图 3-43** 向图表添加第二个系列\n\n虽然数据看起来不错，但请注意图表现在是按 `Job`（职位）排序，而不是按 `MinSal`（最低工资）排序。发生了什么？问题源于\
    \ APEX 允许每个系列定义自己的源，而这种灵活性会带来显著的复杂性。（如果源的标签集不同怎么办？如果它们的排序顺序不同怎么办？）因此，APEX 有两种图表渲染算法：一种是忽略这些复杂性的简单算法，另一种是需要单独定义的排序顺序来解决复杂性的复杂算法。图\
    \ [3-44](#335103_3_En_3_Chapter.xhtml#Fig44) 展示了相关属性。图表的 `Attributes`（属性）节点包含一个\
    \ `Multi-Series Chart Data`（多系列图表数据）部分，其中有两个属性。`Fill Gaps in Chart Data`（填充图表数据中的间隙）属性指示是使用简单算法还是复杂算法。其默认值为\
    \ `on`，表示使用复杂算法；将其关闭则指定简单算法。`Sort Order`（排序顺序）属性在 `Fill Gaps`（填充间隙）属性为 `on` 时可见，以便您可以指定图表的排序顺序。\n\
    \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig44_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig44_HTML.jpg)\n\
    \n**图 3-44** 多系列图表数据属性\n\n幸运的是，如果您的图表中所有系列都使用相同的源，这种复杂性就无关紧要了。您只需关闭 `Fill Gaps\
    \ in Chart Data` 属性，排序就会恢复正常。\n\n## 自定义图表\n\nAPEX 支持多种图表类型。新图表的默认类型是条形图，但您可以使用\
    \ `Chart`（图表）部分（来自渲染树的 `Attributes` 组件）进行更改。例如，转到您的 `Employee Counts`（员工计数）区域的\
    \ `Chart` 部分，将其图表类型更改为 `Pie`（饼图）。\n\nAPEX 会自动为条形图中的每个系列分配一种颜色。它在选择图表颜色方面做得相当不错，但有时您想自己选择。每个条形图系列在其\
    \ `Appearance`（外观）部分都有一个 `Color`（颜色）属性，如图 [3-45](#335103_3_En_3_Chapter.xhtml#Fig45)\
    \ 所示。您可以键入标准颜色的名称（如“maroon”），可以从右侧的快速选择菜单中选择常用颜色，或者可以使用颜色选择器从色轮中选择颜色。图 [3-37](#335103_3_En_3_Chapter.xhtml#Fig37)\
    \ 中的 `Salary Info` 图表指定了系列颜色 `MAROON`（栗色）和 `GOLD`（金色）。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig45_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig45_HTML.jpg)\n\
    \n**图 3-45** 指定条形图系列的颜色\n\nAPEX 还为饼图的每个标签值分配一种颜色，使用一组鲜艳的颜色。但假设您想要一个不同的调色板。如何使用图\
    \ [3-45](#335103_3_En_3_Chapter.xhtml#Fig45) 中的 `Color` 属性并不立即明了，因为它适用于整个系列。例如，如果将颜色设置为\
    \ `MAROON`，那么饼图中的每个段都将是栗色。您需要的是一种为每个标签指定颜色的方法。\n\n思路是更改图表的源代码，如下所示：\n\n```sql\n\
    select Job, count(*) as EmpCount,\ncase job when 'ANALYST'   then '#D6EAF8'\n\
    \         when 'CLERK'     then '#AED6F1'\n         when 'MANAGER'   then '#5DADE2'\n\
    \         when 'PRESIDENT' then '#3498DB'\n         when 'SALESMAN'  then '#1B4F72'\n\
    \         end as JobColor\nfrom EMP\ngroup by Job\norder by EmpCount desc;\n```\n\
    \n`JobColor` 列计算每个职位的颜色。指定的颜色值对应于图 [3-38](#335103_3_En_3_Chapter.xhtml#Fig38)\
    \ 所示的蓝色调色板。图 [3-46](#335103_3_En_3_Chapter.xhtml#Fig46) 显示了 `Salary Info` 图表修改后的\
    \ `Source` 部分。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig46_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig46_HTML.jpg)\n\
    \n**图 3-46** 修改饼图源代码以包含颜色\n\n`JobColor` 的值可以在 `Color` 属性中使用，如图 [3-47](#335103_3_En_3_Chapter.xhtml#Fig47)\
    \ 所示。请注意对 `JobColor` 的引用是作为替换字符串编写的。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig47_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig47_HTML.jpg)\n\
    \n**图 3-47** 指定饼图颜色\n\n自定义图表的另一种方法是显示图例（legend）。例如，图 [3-37](#335103_3_En_3_Chapter.xhtml#Fig37)\
    \ 在图表下方显示了一个图例。图例解释了图表上每种颜色的含义。多系列图表使用图例来传达每个系列的含义。饼图使用图例来标识各个段。因此，图 [3-38](#335103_3_En_3_Chapter.xhtml#Fig38)\
    \ 不需要图例，因为标签值直接显示在每个段旁边。\n\n在 APEX 中，指定图例的属性位于 `Legend`（图例）部分，该部分属于区域的 `Attributes`\
    \ 节点。图 [3-48](#335103_3_En_3_Chapter.xhtml#Fig48) 显示了该部分的顶部。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig48_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig48_HTML.jpg)\n\
    \n**图 3-48** 部分图表图例属性"
  raw: 'The Identification section allows you to choose a name for the

    series. Because this series will hold the minimum salaries per job, I

    named it MinSal. (You will also need to create another series to hold

    the maximum salaries, but not yet.)

    The `Source`

    section is where you specify the source of the series. Since you have

    already defined a source for the region, you should choose `Region Source`. Your

    other option, not discussed here, is to have each series define its own

    source. This flexibility is useful in situations where you are comparing

    data from different tables, but leads to complexity beyond the scope of

    this book.

    The `Column Mapping` section requires you to specify values for the properties

    `Label` and `Value`. The `Label` value will be

    the name of the source column that holds the labels, in this case `JOB`. The `Value`
    value will be

    the name of the source column holding the values for this series, in

    this case `MINSAL`.


    After configuring the `Salary Info` series,

    you should configure the series for the `Salary Info` chart,

    using Figure [3-41](#335103_3_En_3_Chapter.xhtml#Fig41) as a model.

    When you are done, the error indicators should have disappeared from

    your page and you should be able to save it. If you run the page, you

    should get the output shown in Figure [3-42](#335103_3_En_3_Chapter.xhtml#Fig42).
    These charts

    are pretty good, but are in need of customization. This topic is

    discussed next.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig42_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig42_HTML.jpg)


    Figure 3-42

    A first approximation to the Charts page


    Multi-Series Charts


    The `Salary Info`

    region currently has one series, which displays the minimum salary per

    job. You can easily create a second

    series to display the maximum salary per job, as follows. Right-click

    the `Series` node

    in the region’s rendering tree and select `Create Series`. Then

    configure that series like you did the previous ones: rename the series

    `MaxSal`, and set

    its source and column mappings appropriately. The result should be the

    multi-series chart shown in Figure [3-43](#335103_3_En_3_Chapter.xhtml#Fig43).


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig43_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig43_HTML.jpg)


    Figure 3-43

    Adding a second series to the chart


    Although the data looks good, note that the chart is now sorted by `Job` instead
    of `MinSal`. What

    happened? The problem arises from the fact that APEX allows each series

    to define its own source, and this flexibility entails significant

    complications. (What if the sources have different label sets? What if

    they have different sort orders?) APEX consequently has two

    chart-rendering algorithms: a simple one that ignores these

    complications and a sophisticated one that requires a separately defined

    sort order to resolve the complications. Figure [3-44](#335103_3_En_3_Chapter.xhtml#Fig44)
    illustrates

    the relevant properties. The `Attributes` node of

    the chart has a section `Multi-Series Chart Data`, having two properties. The
    `Fill Gaps in Chart Data` property indicates whether to use the simple or

    sophisticated algorithm. Its default value is `on`, which denotes the

    sophisticated algorithm; turning it off specifies the simple algorithm. The `Sort
    Order` property

    is visible when the `Fill Gaps` property is

    on, so that you can specify the chart’s sort order.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig44_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig44_HTML.jpg)


    Figure 3-44

    Multi-Series Chart Data properties


    Fortunately, this complexity is irrelevant if all the series in your

    chart use the same source. All you need to do is turn off the `Fill Gaps in Chart
    Data` property, and sorting goes back to normal.


    Customizing a Chart

    APEX supports several chart types. The default type of a new chart is

    a bar chart, but you can use the `Chart` section (from

    the `Attributes`

    component of the rendering tree) to change it. For example, go to the

    `Chart` section

    of your `Employee Counts` region and change its chart type to `Pie`.


    APEX automatically assigns a color to each

    series in a bar chart. It does a reasonable job of choosing chart

    colors, but sometimes you want to choose your own. Each bar chart series

    has a `Color`

    property in its `Appearance` section,

    as shown in Figure [3-45](#335103_3_En_3_Chapter.xhtml#Fig45). You can type

    the name of a standard color (such as “maroon”), you can choose a common

    color from the quick-pick menu on the right, or you can use the color

    picker to choose a color from the color wheel. The `Salary Info` chart of

    Figure [3-37](#335103_3_En_3_Chapter.xhtml#Fig37) specified  the series colors

    `MAROON` and

    `GOLD`.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig45_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig45_HTML.jpg)


    Figure 3-45

    Specifying the color of a bar chart series


    APEX also assigns a color to each label value of a pie chart, using a

    palette of bright colors. But suppose you want a different palette. It’s

    not immediately clear how to use the `Color` property in

    Figure [3-45](#335103_3_En_3_Chapter.xhtml#Fig45), because it

    applies to the entire series. For example, if you set the color to `MAROON`, then
    every

    segment in the pie chart would be maroon. What you need is a way to

    specify a color for each label.


    The idea is to change the chart’s source code, as follows:


    ```

    select Job, count(*) as EmpCount,

    case job when ''ANALYST''   then ''#D6EAF8''

    when ''CLERK''     then ''#AED6F1''

    when ''MANAGER''   then ''#5DADE2''

    when ''PRESIDENT'' then ''#3498DB''

    when ''SALESMAN''  then ''#1B4F72''

    end as JobColor

    from EMP

    group by Job

    order by EmpCount desc;

    ```


    The `JobColor`

    column calculates a color for each job. The specified color values

    correspond to the blue palette shown in Figure [3-38](#335103_3_En_3_Chapter.xhtml#Fig38).
    Figure [3-46](#335103_3_En_3_Chapter.xhtml#Fig46) shows the

    revised `Source`

    section for the `Salary Info` chart.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig46_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig46_HTML.jpg)


    Figure 3-46

    Modifying the pie chart source to include colors


    The value of `JobColor` can be used

    in the `Color`

    property, as shown in Figure [3-47](#335103_3_En_3_Chapter.xhtml#Fig47). Note
    how the

    reference to `JobColor` is written

    as a substitution string.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig47_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig47_HTML.jpg)


    Figure 3-47

    Specifying the pie chart colors


    Another way to customize a chart is to display a

    *legend*. For example, Figure [3-37](#335103_3_En_3_Chapter.xhtml#Fig37) displays
    a

    legend underneath the chart. A legend explains the meaning of each color

    on the chart. Multi-series charts use legends to convey the meaning of

    each series. Pie charts use legends to identify the segments.

    Consequently, Figure [3-38](#335103_3_En_3_Chapter.xhtml#Fig38) does not need

    a legend because the label values are displayed directly with each

    segment.


    In APEX, the properties to specify the legend are in the `Legend` section, which

    belongs to the region’s `Attributes` node.

    Figure [3-48](#335103_3_En_3_Chapter.xhtml#Fig48) shows the top

    part of this section.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig48_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig48_HTML.jpg)


    Figure 3-48

    Some chart legend properties'
  trans: "\n# APEX 图表配置与自定义\n\n## 配置单个系列\n\n`Identification`（标识）部分允许您为系列选择一个名称。由于此系列将保存每个职位的最低工资，我将其命名为\
    \ `MinSal`。（您还需要创建另一个系列来保存最高工资，但现在还不需要。）\n\n`Source`（源）部分用于指定系列的数据源。由于您已经为该区域定义了一个源，因此应选择\
    \ `Region Source`（区域源）。另一个选项（此处不讨论）是让每个系列定义自己的源。这种灵活性在比较来自不同表的数据时很有用，但会导致复杂性超出本书讨论范围。\n\
    \n`Column Mapping`（列映射）部分要求您为属性 `Label`（标签）和 `Value`（值）指定值。`Label` 值将是保存标签的源列的名称，在本例中为\
    \ `JOB`。`Value` 值将是保存此系列值的源列的名称，在本例中为 `MINSAL`。\n\n在配置好 `Salary Info`（薪资信息）系列后，您应该参考图\
    \ 3-41 的模型来配置 `Salary Info` 图表的系列。完成后，错误指示应从您的页面中消失，您应该能够保存它。如果运行该页面，您应该获得如图 3-42\
    \ 所示的输出。这些图表相当不错，但需要进行自定义。接下来将讨论这个主题。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig42_HTML.jpg](img/335103_3_En_3_Fig42_HTML.jpg)\n\
    \n**图 3-42** 图表页面的初步效果\n\n## 多系列图表\n\n`Salary Info` 区域当前有一个系列，用于显示每个职位的最低工资。您可以轻松创建第二个系列来显示每个职位的最高工资，步骤如下。在区域的渲染树中右键单击\
    \ `Series`（系列）节点，然后选择 `Create Series`（创建系列）。然后像配置前一个系列一样配置该系列：将系列重命名为 `MaxSal`，并适当地设置其源和列映射。结果应如图\
    \ 3-43 所示的多系列图表。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig43_HTML.jpg](img/335103_3_En_3_Fig43_HTML.jpg)\n\
    \n**图 3-43** 向图表添加第二个系列\n\n虽然数据看起来不错，但请注意图表现在是按 `Job`（职位）排序，而不是按 `MinSal`（最低工资）排序。发生了什么？问题源于\
    \ APEX 允许每个系列定义自己的源，而这种灵活性会带来显著的复杂性。（如果源的标签集不同怎么办？如果它们的排序顺序不同怎么办？）因此，APEX 有两种图表渲染算法：一种是忽略这些复杂性的简单算法，另一种是需要单独定义的排序顺序来解决复杂性的复杂算法。图\
    \ 3-44 展示了相关属性。图表的 `Attributes`（属性）节点包含一个 `Multi-Series Chart Data`（多系列图表数据）部分，其中有两个属性。`Fill\
    \ Gaps in Chart Data`（填充图表数据中的间隙）属性指示是使用简单算法还是复杂算法。其默认值为 `on`，表示使用复杂算法；将其关闭则指定简单算法。`Sort\
    \ Order`（排序顺序）属性在 `Fill Gaps`（填充间隙）属性为 `on` 时可见，以便您可以指定图表的排序顺序。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig44_HTML.jpg](img/335103_3_En_3_Fig44_HTML.jpg)\n\
    \n**图 3-44** 多系列图表数据属性\n\n幸运的是，如果您的图表中所有系列都使用相同的源，这种复杂性就无关紧要了。您只需关闭 `Fill Gaps\
    \ in Chart Data` 属性，排序就会恢复正常。\n\n## 自定义图表\n\nAPEX 支持多种图表类型。新图表的默认类型是条形图，但您可以使用\
    \ `Chart`（图表）部分（来自渲染树的 `Attributes` 组件）进行更改。例如，转到您的 `Employee Counts`（员工计数）区域的\
    \ `Chart` 部分，将其图表类型更改为 `Pie`（饼图）。\n\nAPEX 会自动为条形图中的每个系列分配一种颜色。它在选择图表颜色方面做得相当不错，但有时您想自己选择。每个条形图系列在其\
    \ `Appearance`（外观）部分都有一个 `Color`（颜色）属性，如图 3-45 所示。您可以键入标准颜色的名称（如“maroon”），可以从右侧的快速选择菜单中选择常用颜色，或者可以使用颜色选择器从色轮中选择颜色。图\
    \ 3-37 中的 `Salary Info` 图表指定了系列颜色 `MAROON`（栗色）和 `GOLD`（金色）。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig45_HTML.jpg](img/335103_3_En_3_Fig45_HTML.jpg)\n\
    \n**图 3-45** 指定条形图系列的颜色\n\nAPEX 还为饼图的每个标签值分配一种颜色，使用一组鲜艳的颜色。但假设您想要一个不同的调色板。如何使用图\
    \ 3-45 中的 `Color` 属性并不立即明了，因为它适用于整个系列。例如，如果将颜色设置为 `MAROON`，那么饼图中的每个段都将是栗色。您需要的是一种为每个标签指定颜色的方法。\n\
    \n思路是更改图表的源代码，如下所示：\n\n```sql\nselect Job, count(*) as EmpCount,\ncase job when\
    \ 'ANALYST'   then '#D6EAF8'\n         when 'CLERK'     then '#AED6F1'\n     \
    \    when 'MANAGER'   then '#5DADE2'\n         when 'PRESIDENT' then '#3498DB'\n\
    \         when 'SALESMAN'  then '#1B4F72'\n         end as JobColor\nfrom EMP\n\
    group by Job\norder by EmpCount desc;\n```\n\n`JobColor` 列计算每个职位的颜色。指定的颜色值对应于图\
    \ 3-38 所示的蓝色调色板。图 3-46 显示了 `Salary Info` 图表修改后的 `Source` 部分。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig46_HTML.jpg](img/335103_3_En_3_Fig46_HTML.jpg)\n\
    \n**图 3-46** 修改饼图源代码以包含颜色\n\n`JobColor` 的值可以在 `Color` 属性中使用，如图 3-47 所示。请注意对 `JobColor`\
    \ 的引用是作为替换字符串编写的。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig47_HTML.jpg](img/335103_3_En_3_Fig47_HTML.jpg)\n\
    \n**图 3-47** 指定饼图颜色\n\n自定义图表的另一种方法是显示图例（legend）。例如，图 3-37 在图表下方显示了一个图例。图例解释了图表上每种颜色的含义。多系列图表使用图例来传达每个系列的含义。饼图使用图例来标识各个段。因此，图\
    \ 3-38 不需要图例，因为标签值直接显示在每个段旁边。\n\n在 APEX 中，指定图例的属性位于 `Legend`（图例）部分，该部分属于区域的 `Attributes`\
    \ 节点。图 3-48 显示了该部分的顶部。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig48_HTML.jpg](img/335103_3_En_3_Fig48_HTML.jpg)\n\
    \n**图 3-48** 部分图表图例属性\n"
- fmt: '# 图表属性配置


    最重要的属性是 `Show`，它控制图例在页面上的可见性。通常其他属性使用默认值就足够了，但你应该尝试各个选项来看看效果。特别值得注意的是 `Hide and
    Show Behavior`。如果其值为 `None`，则点击图例没有任何作用。否则，在图例上点击某个系列名称会切换该系列在图表中的可见性，并相应地重新计算图表。这种行为对于饼图尤其有趣，因为图例标识的是扇区而非系列。作为一个实验，请启用
    `Salary Info` 图表的图例，并将 `Hide and Show Behavior` 的值设置为 `Rescale`。然后运行页面，点击一些图例值，观察图表如何自我调整。


    另一种图表定制方式是直接在图表中显示数据值。例如，在图[3-37]中，最低和最高薪资显示在其条形图的上方。在图[3-38]中，员工数量和标签名称显示在每个扇区的外部。相关属性位于系列属性的
    `Label` 部分。图[3-49]展示了我是如何为饼图填写这些属性的。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig49_HTML.png](images/335103_3_En_3_Chapter/335103_3_En_3_Fig49_HTML.png)


    图 3-49 饼图的标签属性


    最后，我想简要提一下控制条形图X轴和Y轴的属性。这些属性涉及轴的显示方式——多久显示一个刻度线、如何格式化显示的值、Y值的范围是多少等等。通常默认值就足够了，但有时需要定制。一个例子可以在图[3-42]的
    `Employee Counts` 图表中找到。请注意它的Y轴标签有重复。原因是网格标记以0.5递增，但标签只显示为整数。这种情况如图[3-50]和[3-51]所示。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig50_HTML.png](images/335103_3_En_3_Chapter/335103_3_En_3_Fig50_HTML.png)


    图 3-50 配置Y轴上的值


    图[3-50]中的 `Decimal Places` 属性值为 `0`，意味着APEX将把Y轴标签显示为整数。如果你将 `Decimal Places` 的值改为1，那么你会看到Y轴标签实际显示为0.0,
    0.5, 1.0等值。然而，这样的图表没有任何意义，因为计数必须是整数。一个更好的解决方案是更改图[3-51]中的 `Minimum Step` 属性。该属性告诉APEX刻度线之间可以有多近。默认情况下，该值为空，允许APEX选择任何步长值。你需要将该属性值设置为1，以便Y轴标签具有0,
    1, 2等值。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig51_HTML.png](images/335103_3_En_3_Chapter/335103_3_En_3_Fig51_HTML.png)


    图 3-51 配置何时显示Y轴刻度线


    APEX有许多图表配置属性。理解它们的最好方法是进行实验。通过以各种方式更改属性来编辑这两个图表。例如，移动图例位置、更改配色方案和背景、在图表上包含或移除标签或值等等。


    # 交互式报告区域


    前面的章节探讨了页面设计者如何使用属性来定制经典报表和图表，以改善用户体验。而*交互式报告*允许用户在查看页面时自行执行部分此类定制。


    图[3-52]展示了一个未经格式化的、原始的交互式报告区域。为了创建它，我创建了一个名为 `Interactive Reports` 的新空白页面，这是 `Employee
    Demo` 应用程序的第5页。然后我在其中创建了一个名为 `Employees` 的新区域，类型为 `Interactive Report`，并具有以下源查询：


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig52_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig52_HTML.jpg)


    图 3-52 基于EMP表的交互式报告区域


    ```sql

    select * from EMP

    ```


    交互式报告区域有一个默认模板，与你之前看到的其它报表类型不同。那些区域使用了 `Standard` 模板，而图[3-52]使用的是 `Interactive
    Report` 模板。最明显的区别是 `Interactive Report` 模板不会在顶部显示其标题。


    注意


    像往常一样，你可以从属性编辑器的 `Appearance` 部分更改区域的模板。


    除了区域模板，图[3-52]看起来很像经典报告区域。事实上，经典报告区域的所有属性也适用于交互式报告区域——你可以指定区域在页面上的位置、其源查询以及每列的格式。如果需要，你可以配置此区域，使其看起来与图[3-24]的格式化报告完全一样。然而，为了更好地关注交互式报告特有的定制功能，我将保持其未经格式化。


    图[3-52]中的一个新功能是报告上方的一行项目，称为*搜索栏*。搜索栏允许用户通过过滤行、隐藏列、排序、创建图表以及对其值执行简单计算来交互式地定制报告。虽然图中未显示，但交互式报告也可以显示一个*链接列*，允许用户单独检查报告行。


    接下来的章节将讨论与搜索栏和链接列相关的问题——特别是它们如何使用以及应用程序设计者如何配置它们的属性。


    # 使用搜索栏


    搜索栏包含四个项目：放大镜、文本框、`Go` 按钮和 `Actions` 按钮。前三个项目允许用户过滤报告的行。用户在文本框中输入搜索字符串，点击放大镜选择要搜索的列（也可以选择
    `All Columns`），然后点击 `Go`。不包含搜索文本的记录将从报告中过滤掉。


    例如，在文本框中输入 **82** 并选择 `Hiredate` 列，其效果是过滤出所有在1982年入职的员工。图[3-53]显示了生成的区域。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig53_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig53_HTML.jpg)


    图 3-53 过滤图[3-52]报告后的结果


    请注意，该区域现在在搜索栏下方有一行描述该过滤器。你可以点击左侧的复选框来启用/禁用它，或者点击右侧的X来永久删除它。


    可以同时使用多个过滤器。例如，要查找1982年入职且在外工作的员工，你需要为 `Offsite` 列添加另一个过滤器。结果如图[3-54]所示。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig54_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig54_HTML.jpg)


    图 3-54 在图[3-53]的报告中添加第二个过滤器


    通常，用户可以通过创建多个过滤器并有选择地启用各种过滤器子集来探索报告的内容。'
  raw: 'The most important property is `Show`, which toggles

    the visibility of the legend on the page. It usually suffices to use the

    default value for the other properties, although you should try out the

    options to see

    what happens. Especially notable is `Hide and Show Behavior`. If its value is
    `None`, then clicking

    the legend does nothing. Otherwise, clicking a series name on the legend

    toggles the visibility of that series in the chart and recomputes the

    chart accordingly. This behavior is especially interesting for a pie

    chart, where the legend identifies slices instead of series. As an

    experiment, enable the legend of the `Salary Info` chart and

    set the `Hide and Show Behavior` value to `Rescale`. Then run the

    page, click some legend values, and watch the chart adjust itself.


    Another chart customization is to explicitly display data values in the

    chart. For example, in Figure [3-37](#335103_3_En_3_Chapter.xhtml#Fig37), the
    min and

    max salaries are displayed above its bar. And in Figure [3-38](#335103_3_En_3_Chapter.xhtml#Fig38),
    the employee

    count and label name are displayed outside each segment. The relevant

    properties are in the `Label` section of the

    series properties. Figure [3-49](#335103_3_En_3_Chapter.xhtml#Fig49) shows how
    I

    filled the properties for the pie chart.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig49_HTML.png](images/335103_3_En_3_Chapter/335103_3_En_3_Fig49_HTML.png)


    Figure 3-49

    Label properties for the pie chart


    Finally, I would like to briefly mention the properties

    governing the x and y axes for bar charts. These properties concern how

    the axes are displayed—how often to display a tick mark, how to format

    the displayed values, what the range of y values are, and so on. Often,

    the default values suffice, but occasionally customization is required.

    One example can be found in the `Employee Counts` chart

    from Figure [3-42](#335103_3_En_3_Chapter.xhtml#Fig42). Note that its

    y-axis labels contain duplication. The reason is that the grid markings

    go up by 0.5, but the labels are displayed as integers only. This

    situation is depicted in Figures [3-50](#335103_3_En_3_Chapter.xhtml#Fig50) and
    [3-51](#335103_3_En_3_Chapter.xhtml#Fig51).


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig50_HTML.png](images/335103_3_En_3_Chapter/335103_3_En_3_Fig50_HTML.png)


    Figure 3-50

    Configuring the values along the y axis


    The `Decimal Places` property in Figure [3-50](#335103_3_En_3_Chapter.xhtml#Fig50)
    has the value

    0, meaning that APEX will display y-axis labels as integers. If you

    change the value of Decimal Places to 1, then you will see the y-axis

    labels actually have the value 0.0, 0.5, 1.0, and so on. However, such a

    chart doesn’t make any sense because counts must be integers. A better

    solution is to change the Minimum Step property in Figure [3-51](#335103_3_En_3_Chapter.xhtml#Fig51).
    This property

    tells APEX how close the ticks can be. By default, the value is blank,

    which allows APEX to choose any step value. You need to set the property

    value to 1, so

    that the y-axis labels have the values 0, 1, 2, and so on.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig51_HTML.png](images/335103_3_En_3_Chapter/335103_3_En_3_Fig51_HTML.png)


    Figure 3-51

    Configuring when y-axis ticks are displayed


    APEX has many chart-configuration properties. The best way to

    understand them is to experiment. Edit the two charts by changing their

    properties in various ways. For example, move the legend around, change

    the color scheme and background, include or remove labels or values on

    the chart, and so on.


    Interactive Report Regions

    The previous sections have examined how a page designer can use

    properties to customize classic reports and charts so as to improve the

    user experience. An *interactive report* enables users to perform

    some of this customization themselves, as they view the page.


    Figure [3-52](#335103_3_En_3_Chapter.xhtml#Fig52) displays a

    vanilla, unformatted, interactive report region. To create it, I created

    a new blank page named `Interactive Reports`,

    which is page 5 of the `Employee Demo` application.

    I then created a new region within it named `Employees`, of type

    `Interactive Report`, and having the source query:


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig52_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig52_HTML.jpg)


    Figure 3-52

    Interactive report region on the EMP table


    ```

    select * from EMP

    ```


    An interactive report region has a default template that is different

    from the other report types you have seen. Those regions used the `Standard` template,

    whereas Figure [3-52](#335103_3_En_3_Chapter.xhtml#Fig52) uses the `Interactive
    Report`

    template. The most obvious difference is that an `Interactive Report`

    template does not display its title across the top.


    Note


    As always, you can change a region’s template from its `Appearance` section in

    the property editor.


    Apart from its region template, Figure [3-52](#335103_3_En_3_Chapter.xhtml#Fig52)
    looks a lot

    like a classic report region. In fact, all the properties of classic

    report regions also apply to interactive report regions—you can specify

    the region’s position on the page, its source query, and the format of

    each column. If you want, you can configure this region so that it looks

    exactly like the formatted report of Figure [3-24](#335103_3_En_3_Chapter.xhtml#Fig24).
    However, I

    would like to keep it unformatted to better focus on the customization

    that is specific to interactive reports.

    The one new feature in Figure [3-52](#335103_3_En_3_Chapter.xhtml#Fig52) is the
    row of

    items above the report, which is called the *search bar*. The

    search bar lets users interactively customize the report, by filtering

    its rows, hiding columns, sorting, creating charts, and performing

    simple calculations on its values. Although not shown in the figure, an

    interactive report can also display a *link column* that allows

    users to examine the report rows individually.

    The following sections address issues surrounding the search bar and

    link column—in particular, how they are used and how an application

    designer can configure their properties.


    Using the Search Bar

    The search bar

    contains four items: the magnifying glass, text box, `Go` button, and `Actions`
    button. The

    first three items let a user filter the rows of the report. The user

    enters a search string in the box, clicks the magnifying glass to choose

    the column to search (`All Columns` can also

    be chosen), and clicks `Go`. The records not

    containing the search text will be filtered from the report.


    For example, entering **82** in the text box and selecting

    the column `Hiredate` has the

    effect of filtering for all employees hired in 1982\. Figure [3-53](#335103_3_En_3_Chapter.xhtml#Fig53)
    shows the

    resulting region.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig53_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig53_HTML.jpg)


    Figure 3-53

    Result of filtering the report of Figure [3-52](#335103_3_En_3_Chapter.xhtml#Fig52)


    Note that the region now has a row

    below the search bar that describes the filter. You can click the

    checkbox on the left to enable/disable it, or you can click the X on the

    right to permanently remove it.


    It is possible to have multiple concurrent filters. For example, to find

    employees hired in 1982 who work offsite, you would need to add another

    filter for the `Offsite` column. The

    result is shown in Figure [3-54](#335103_3_En_3_Chapter.xhtml#Fig54).


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig54_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig54_HTML.jpg)


    Figure 3-54

    Adding a second filter to the report of Figure [3-53](#335103_3_En_3_Chapter.xhtml#Fig53)


    In general, a user can explore the contents of a report by

    creating multiple filters and selectively enabling various subsets of

    them.'
  trans: '

    # 图表属性配置


    最重要的属性是 `Show`，它控制图例在页面上的可见性。通常其他属性使用默认值就足够了，但你应该尝试各个选项来看看效果。特别值得注意的是 `Hide and
    Show Behavior`。如果其值为 `None`，则点击图例没有任何作用。否则，在图例上点击某个系列名称会切换该系列在图表中的可见性，并相应地重新计算图表。这种行为对于饼图尤其有趣，因为图例标识的是扇区而非系列。作为一个实验，请启用
    `Salary Info` 图表的图例，并将 `Hide and Show Behavior` 的值设置为 `Rescale`。然后运行页面，点击一些图例值，观察图表如何自我调整。


    另一种图表定制方式是直接在图表中显示数据值。例如，在图[3-37]中，最低和最高薪资显示在其条形图的上方。在图[3-38]中，员工数量和标签名称显示在每个扇区的外部。相关属性位于系列属性的
    `Label` 部分。图[3-49]展示了我是如何为饼图填写这些属性的。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig49_HTML.png](img/335103_3_En_3_Fig49_HTML.png)


    图 3-49 饼图的标签属性


    最后，我想简要提一下控制条形图 X 轴和 Y 轴的属性。这些属性涉及轴的显示方式——多久显示一个刻度线、如何格式化显示的值、Y 值的范围是多少等等。通常默认值就足够了，但有时需要定制。一个例子可以在图[3-42]的
    `Employee Counts` 图表中找到。请注意它的 Y 轴标签有重复。原因是网格标记以 0.5 递增，但标签只显示为整数。这种情况如图[3-50]和[3-51]所示。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig50_HTML.png](img/335103_3_En_3_Fig50_HTML.png)


    图 3-50 配置 Y 轴上的值


    图[3-50]中的 `Decimal Places` 属性值为 `0`，意味着 APEX 将把 Y 轴标签显示为整数。如果你将 `Decimal Places`
    的值改为 1，那么你会看到 Y 轴标签实际显示为 0.0, 0.5, 1.0 等值。然而，这样的图表没有任何意义，因为计数必须是整数。一个更好的解决方案是更改图[3-51]中的
    `Minimum Step` 属性。该属性告诉 APEX 刻度线之间可以有多近。默认情况下，该值为空，允许 APEX 选择任何步长值。你需要将该属性值设置为
    1，以便 Y 轴标签具有 0, 1, 2 等值。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig51_HTML.png](img/335103_3_En_3_Fig51_HTML.png)


    图 3-51 配置何时显示 Y 轴刻度线


    APEX 有许多图表配置属性。理解它们的最好方法是进行实验。通过以各种方式更改属性来编辑这两个图表。例如，移动图例位置、更改配色方案和背景、在图表上包含或移除标签或值等等。


    # 交互式报告区域


    前面的章节探讨了页面设计者如何使用属性来定制经典报表和图表，以改善用户体验。而*交互式报告*允许用户在查看页面时自行执行部分此类定制。


    图[3-52]展示了一个未经格式化的、原始的交互式报告区域。为了创建它，我创建了一个名为 `Interactive Reports` 的新空白页面，这是 `Employee
    Demo` 应用程序的第 5 页。然后我在其中创建了一个名为 `Employees` 的新区域，类型为 `Interactive Report`，并具有以下源查询：


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig52_HTML.jpg](img/335103_3_En_3_Fig52_HTML.jpg)


    图 3-52 基于 EMP 表的交互式报告区域


    ```sql

    select * from EMP

    ```


    交互式报告区域有一个默认模板，与你之前看到的其它报表类型不同。那些区域使用了 `Standard` 模板，而图[3-52]使用的是 `Interactive
    Report` 模板。最明显的区别是 `Interactive Report` 模板不会在顶部显示其标题。


    注意


    像往常一样，你可以从属性编辑器的 `Appearance` 部分更改区域的模板。


    除了区域模板，图[3-52]看起来很像经典报告区域。事实上，经典报告区域的所有属性也适用于交互式报告区域——你可以指定区域在页面上的位置、其源查询以及每列的格式。如果需要，你可以配置此区域，使其看起来与图[3-24]的格式化报告完全一样。然而，为了更好地关注交互式报告特有的定制功能，我将保持其未经格式化。


    图[3-52]中的一个新功能是报告上方的一行项目，称为*搜索栏*。搜索栏允许用户通过过滤行、隐藏列、排序、创建图表以及对其值执行简单计算来交互式地定制报告。虽然图中未显示，但交互式报告也可以显示一个*链接列*，允许用户单独检查报告行。


    接下来的章节将讨论与搜索栏和链接列相关的问题——特别是它们如何使用以及应用程序设计者如何配置它们的属性。


    # 使用搜索栏


    搜索栏包含四个项目：放大镜、文本框、`Go` 按钮和 `Actions` 按钮。前三个项目允许用户过滤报告的行。用户在文本框中输入搜索字符串，点击放大镜选择要搜索的列（也可以选择
    `All Columns`），然后点击 `Go`。不包含搜索文本的记录将从报告中过滤掉。


    例如，在文本框中输入 **82** 并选择 `Hiredate` 列，其效果是过滤出所有在 1982 年入职的员工。图[3-53]显示了生成的区域。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig53_HTML.jpg](img/335103_3_En_3_Fig53_HTML.jpg)


    图 3-53 过滤图[3-52]报告后的结果


    请注意，该区域现在在搜索栏下方有一行描述该过滤器。你可以点击左侧的复选框来启用/禁用它，或者点击右侧的 X 来永久删除它。


    可以同时使用多个过滤器。例如，要查找 1982 年入职且在外工作的员工，你需要为 `Offsite` 列添加另一个过滤器。结果如图[3-54]所示。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig54_HTML.jpg](img/335103_3_En_3_Fig54_HTML.jpg)


    图 3-54 在图[3-53]的报告中添加第二个过滤器


    通常，用户可以通过创建多个过滤器并有选择地启用各种过滤器子集来探索报告的内容。

    '
- fmt: 'The `Actions` button allows a user to further customize the report. Clicking
    the button displays its menu of possible operations. This menu appears in Figure
    [3-55](#335103_3_En_3_Chapter.xhtml#Fig55), showing the submenu for the `Data`
    action. The following sections describe the more useful of these operations.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig55_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig55_HTML.jpg)


    Figure 3-55 Actions menu


    ## Columns


    Choosing the `Columns` operation brings up a modal dialog box that lets the user
    choose the columns to be displayed in the report and in what order; Figure [3-56](#335103_3_En_3_Chapter.xhtml#Fig56)
    illustrates an example that selects the columns `Ename`, `Job`, `Hiredate`, and
    `Sal` for display.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig56_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig56_HTML.jpg)


    Figure 3-56 Specifying the columns to display


    ## Filter


    Choosing the `Filter` operation brings up a modal dialog box that lets the user
    create a filter; see Figure [3-57](#335103_3_En_3_Chapter.xhtml#Fig57). It produces
    filters similar to the filters you created for Figures [3-53](#335103_3_En_3_Chapter.xhtml#Fig53)
    and [3-54](#335103_3_En_3_Chapter.xhtml#Fig54). The difference is that those earlier
    filters could check only for text containment, whereas this dialog box allows
    for many kinds of operations. For example, the filter specified in Figure [3-57](#335103_3_En_3_Chapter.xhtml#Fig57)
    is `Job!=''CLERK''`.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig57_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig57_HTML.jpg)


    Figure 3-57 Filter dialog box


    ## Sort


    Choosing the `Sort` operation brings up a modal dialog box that lets the user
    choose the desired sort order; see Figure [3-58](#335103_3_En_3_Chapter.xhtml#Fig58).
    The user selects the column(s) to be sorted and whether the sort direction is
    ascending or descending. The figure shows the menu to select a sort column. Note
    that the user can sort on both visible and hidden columns.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig58_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig58_HTML.jpg)


    Figure 3-58 Sort dialog box


    ## Highlight


    The `Highlight` operation is in the `Format` submenu. It allows the user to highlight
    rows or cells that satisfy a specified criterion. Recall that the formatted classic
    report of Figure [3-24](#335103_3_En_3_Chapter.xhtml#Fig24) displayed high salary
    values in red. This is a form of highlighting. The `Highlight` operation allows
    the user to express this and other forms of highlighting easily.


    Choosing the `Highlight` option brings up the modal dialog box of Figure [3-59](#335103_3_En_3_Chapter.xhtml#Fig59).
    The `Highlight Condition` values specify the values of interest. If the value
    of `Highlight Type` is `Cell`, those values are highlighted; if it is `Row`, the
    row containing those values is highlighted. Highlighting can involve the background
    color, text color, or both. The figure shows the highlighting corresponding to
    Figure [3-24](#335103_3_En_3_Chapter.xhtml#Fig24).


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig59_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig59_HTML.jpg)


    Figure 3-59 Highlight dialog box


    ## Rows Per Page


    The `Rows Per Page` operation is also in the Format submenu. It allows the user
    to change the report pagination at will. Clicking the menu item displays a submenu
    in which the user can choose from a list of possible rows per page.


    ## Chart


    Choosing the `Chart` operation brings up a modal dialog box that lets the user
    create charts based on the data in the report; see Figure [3-60](#335103_3_En_3_Chapter.xhtml#Fig60).


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig60_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig60_HTML.jpg)


    Figure 3-60 Chart dialog box


    From this dialog box, a user can create a single-series chart that aggregates
    over a single column. The figure specifies a bar chart that gives the minimum
    salary per job, similar to the bar chart shown in Figure [3-37](#335103_3_En_3_Chapter.xhtml#Fig37).
    The resulting chart appears in Figure [3-61](#335103_3_En_3_Chapter.xhtml#Fig61).


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig61_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig61_HTML.jpg)


    Figure 3-61 Interactive chart


    There are two things worth noting in this figure. First, many aspects of the chart
    are not customizable. For example, a chart can have only a single series and the
    color palette is fixed. Second, the search bar has been extended to include two
    report/chart buttons to the left of the `Action` button. The user can use these
    buttons to toggle between the interactive report and its chart.


    ## Configuring the Search Bar


    The search bar has a lot of functionality. However, not all applications need
    all the functionality. An interactive report region has properties that allow
    the application developer to limit this functionality. This section examines those
    properties.


    Figure [3-62](#335103_3_En_3_Chapter.xhtml#Fig62) shows the rendering tree for
    the `Interactive Reports` page and its interactive report region `Employees`.
    Note that this tree has the same structure as a classic report (refer to Figure
    [3-25](#335103_3_En_3_Chapter.xhtml#Fig25)), namely, that the `Attributes` component
    contains the report-specific properties and the `Columns` folder contains the
    properties for each column.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig62_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig62_HTML.jpg)


    Figure 3-62 Rendering tree for the Interactive Reports page


    The property editor for the `Attributes` node contains two relevant sections:
    `Search Bar` and `Actions Menu`. Figure [3-63](#335103_3_En_3_Chapter.xhtml#Fig63)
    shows the properties of the `Search Bar` section. These properties let you selectively
    display different portions of the search area. For example, turning off the `Include
    Search Bar` property completely disables the bar, turning off the `Search Field`
    enables only the `Action` button, and so on.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig63_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig63_HTML.jpg)


    Figure 3-63 Properties to configure the search area


    Figure [3-64](#335103_3_En_3_Chapter.xhtml#Fig64) shows the first several properties
    of the `Actions Menu` section. These properties let you specify which operations
    are displayed in the menu. (Not all the properties are shown due to lack of space.)


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig64_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig64_HTML.jpg)


    Figure 3-64 Some properties of the Actions Menu section


    Finally, each column of an interactive report has properties for configuring its
    specific capabilities. These properties appear in the `Enable Users To` section
    of that column and are shown in Figure [3-65](#335103_3_En_3_Chapter.xhtml#Fig65).
    (Again, not all properties are shown because of lack of space.)


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig65_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig65_HTML.jpg)


    Figure 3-65 Some properties of a column’s Enable Users To section


    ## Link Column


    An interactive report can display a special column, whose value is a link. Clicking
    this link shows the report in `single row view`. That is, the report changes to
    show the values of only that row; it also displays navigation buttons for the
    user to move to the next or previous row and a button to return to the original
    report. Figure [3-66](#335103_3_En_3_Chapter.xhtml#Fig66) shows the interactive
    report with the link column displayed. Figure [3-67](#335103_3_En_3_Chapter.xhtml#Fig67)
    shows the single row view of the report after the link for `BLAKE` is clicked.
    Note that this single row view displays all the columns, not just the ones displayed
    in the report.'
