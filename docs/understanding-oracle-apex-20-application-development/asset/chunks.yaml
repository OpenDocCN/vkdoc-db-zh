    # 导航


    标记为 `Parent Navigation Menu Entry` 的项会显示导航菜单列表中的每一个条目。（你需要滚动列表才能看到全部。）其默认值为 `-No
    parent selected-`，这将使新的菜单条目成为根条目。如果你希望新条目成为另一个条目的子项，就必须指定一个父项。理想情况下，你应该能够直接从列表中选择你想要的条目。然而，有些条目是灰显且不可选择的。具体来说，可选的条目是那些已经是父项的条目，或者是“潜在父项”（即没有目标的条目）。大多数情况下，你想要的父项是可选的。但如果你希望新条目是某个灰显条目的子项，你必须通过列表管理器为其分配父项。


    ## 巨型菜单


    分层导航菜单通过两种方式改善用户体验。首先，它们对菜单条目进行结构化，使用户更容易理解有哪些可用操作。其次，它们减少了菜单所需的屏幕空间占用。


    一个较新的设计思路是保持分层结构，但一次性显示所有菜单条目，这被称为 *巨型菜单*。例如，图 4-24 展示了带有巨型菜单的员工演示应用程序的外观。点击标志左侧的图标可以切换菜单的可见性。每个菜单条目都是指向其目标页面的链接。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig24_HTML.jpg](img/335103_3_En_4_Fig24_HTML.jpg)


    图 4-24 一个巨型菜单


    APEX 将巨型菜单实现为另一种导航菜单模板。要创建巨型菜单，请点击应用程序主页上的 `Edit Application Properties` 按钮，然后点击
    `User Interface` 选项卡。找到 `Navigation Menu` 部分，将其 `Position` 属性设置为 `Top`，将其 `List
    Template` 属性设置为 `Top Navigation Mega Menu`，如图 4-25 所示。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig25_HTML.jpg](img/335103_3_En_4_Fig25_HTML.jpg)


    图 4-25 指定一个巨型导航菜单


    ## 页面层级


    一个大型 Web 应用程序包含的页面太多，无法全部放入导航菜单。因此，导航菜单包含应用程序的 *着陆页*——那些标志着最突出任务开始的页面。


    通常，应用程序中的所有页面集合也具有层级结构。这种页面层级的显式呈现被称为 *站点地图*。例如，考虑一个 APEX 站点中的页面。它们在层级中的根是 APEX
    主页。根的子项对应于应用程序的各种类别，如应用构建器、SQL 工作室和团队开发工具。每个类别都有一个“主页”，它领导着包含其类别页面的子树。


    图 4-26 列出了对应于 APEX 应用构建器的部分页面层级。由于空间限制，该图省略了许多页面。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig26_HTML.jpg](img/335103_3_En_4_Fig26_HTML.jpg)


    图 4-26 应用构建器的页面层级


    将此页面层级与应用构建器的导航菜单进行比较是值得的。导航菜单涵盖了该树前三层中的大多数（但非全部）页面。导航菜单中明显缺少的是对应于每个应用程序子树的条目；这些页面改为通过应用构建器主页上的图标和按钮访问。


    ## 面包屑导航


    你可以通过给出页面层级中从该页面到主页路径上的页面序列，来描述应用程序中任何页面的位置。例如，`Application Attributes` 页面的位置是


    ```

    App Builder > Workspace Utilities > Cross Application Reports > Application Attributes

    ```


    此路径被称为 *面包屑导航*。并非所有 APEX 屏幕都显示其面包屑导航，但如果它们显示，通常会显示在导航栏下方。请注意，APEX 面包屑导航中的第一个条目显示为带圈的向上箭头，这表示层级的根页面。


    作为练习，导航到 APEX 站点的其他页面并注意它们的面包屑导航。事实上，看看你是否能找到图 4-26 中列出的所有页面。面包屑导航是可点击的。点击其路径的任何部分都会将你带到相应的页面。


    导航菜单和面包屑导航是互补的导航工具。导航菜单对所有页面都是一样的，其条目涵盖了应用程序的全部功能。通过查看菜单，用户可以确定任何所需操作的适当起始页面。另一方面，页面的面包屑导航特定于该页面，并提供有关该页面在页面层级中位置的上下文信息。例如，假设你正在查看应用构建器的
    `Application Attributes` 页面。它的面包屑导航告诉你该页面是跨应用程序报告之一。该信息可能会促使你点击面包屑导航来探索其他跨应用程序报告。


    在 APEX 中，整个页面层级被称为 *面包屑对象*。面包屑对象本质上是一个分层列表——它为层级中的每个页面包含一个条目，每个条目（根除外）都有一个父项。


    APEX 会自动为每个应用程序创建一个面包屑对象（名为 `Breadcrumb`）。APEX *面包屑管理器* 允许你编辑此对象并创建其他面包屑对象。要进入面包屑管理器，请从应用程序的主页开始，选择页面顶部的
    `Shared Components` 按钮。搜索 `Navigation` 部分，点击 `Breadcrumbs`，然后点击 `Breadcrumb` 图标。你将被带到该面包屑对象的面包屑管理器。图
    4-27 显示了我的 `Employee Demo` 应用程序的面包屑管理器。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig27_HTML.jpg](img/335103_3_En_4_Fig27_HTML.jpg)


    图 4-27 面包屑管理器


    该图显示只有一个面包屑条目，对应于主页。此条目是在我创建应用程序时自动创建的。请注意，即使我从主页删除了其面包屑区域，该条目仍然存在。


    当我创建其他页面时，我告诉向导不要为新页面创建面包屑条目。相反，我现在可以使用面包屑管理器来创建面包屑条目。点击 `Create Breadcrumb Entry`
    按钮。图 4-28 显示了生成的屏幕。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig28_HTML.jpg](img/335103_3_En_4_Fig28_HTML.jpg)


    图 4-28 面包屑条目屏幕


    此屏幕允许你指定页面及其父项，以及有关面包屑如何在页面上显示的信息。具体而言：


    *   `Page` 属性（在 `Breadcrumb` 部分中）指定页面。

    *   `Parent Entry` 属性指定父项。

    *   `Short Name` 属性指定页面在面包屑上的显示方式。选择页面的名称通常是合理的。

    *   `Page` 属性（在 `Target` 部分中）指定用户点击该面包屑条目时发生的情况。它通常与前面的 `Page` 属性值相同。


    让我们为第 7 页，即 `List Practice` 页面创建一个面包屑条目，它将是主页的子项。在 `Breadcrumb Page` 和 `Target
    Page` 属性中输入 7，在 `Parent Entry` 属性中输入 `1`，在 `Short Name` 属性中输入 `List Practice`。

    '
- fmt: '# 5. Items and Buttons


    This book has so far focused on how an application can display information to
    users. In this chapter and the next, you will examine the components that allow
    users to send information back to the application. These components, which are
    `items` and `buttons`, are known as `form controls` because they typically appear
    in web forms.

    APEX supports many types of items, which look and behave quite differently from
    each other. However, they all can be understood as variations of a few basic concepts.
    The main purpose of this chapter is to explore these concepts and examine how
    they are embodied in the different item types.


    ## Breadcrumb Regions


    If you want a page to display a breadcrumb object, you must create a region for
    it. The `Breadcrumb` region type is designed for this purpose. Although you can
    place a breadcrumb region anywhere on the page, it naturally goes in the `Breadcrumb
    Bar` position, which renders immediately below the navigation bar. In general,
    you need to follow these steps to add a breadcrumb region to a page.


    *   Add a new region to the page.

    *   Set the type of the region to be `Breadcrumb`.

    *   Set the source of the region to be the `Breadcrumb` object.

    *   Assign the region to the `Breadcrumb Bar` position.

    *   Set the region template to `Blank with Attributes`, so that it will display
    without a border or title.

    *   Set the region template options so that the breadcrumb is displayed with sufficient
    margins.


    By the way, if you had chosen to create a breadcrumb during page creation, your
    task would have been a bit simpler. Figure [4-29](#335103_3_En_4_Chapter.xhtml#Fig29)
    shows the second screen of the create page wizard, had you chosen to create a
    breadcrumb for the `List Practice` page when you created it. You only need to
    enter values for the `Parent Entry` and `Entry Name` items.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig29_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig29_HTML.jpg)


    Figure 4-29

    Creating a breadcrumb entry during page creation


    In your application, use these steps to add a breadcrumb region to the `List Practice`
    page. Figure [4-30](#335103_3_En_4_Chapter.xhtml#Fig30) shows the navigation bar
    and breadcrumb region of the resulting page. Note that unlike a list region, a
    breadcrumb region does not display its entire source object. Instead, it only
    displays the breadcrumb corresponding to the current page.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig30_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig30_HTML.jpg)


    Figure 4-30

    Breadcrumb object in a breadcrumb region


    ## Global Page


    The standard way to display a list or a breadcrumb object is by placing it in
    a region on a page. This technique provides for considerable flexibility—each
    page can display the list or breadcrumb in a different location and with a different
    template. However, you often don’t want this much flexibility. Suppose instead
    that you want every page to display a list or breadcrumb exactly the same way.
    The easiest way to enforce this uniformity is to use the `global page`.

    The global page is a special page whose contents are included in every other page
    of the application. If you place the breadcrumb region of Figure [4-30](#335103_3_En_4_Chapter.xhtml#Fig30)
    or the `Navigation Menu` region of Figure [4-15](#335103_3_En_4_Chapter.xhtml#Fig15)
    in the global page, those regions will appear uniformly on all pages of the application.
    APEX creates the global page during application creation; by convention, the global
    page has page number 0.

    One of the nice things about a breadcrumb region is that APEX will render it on
    a page only if the page has a breadcrumb. That is, if you put the breadcrumb region
    in the global page, it will appear only on those pages that actually have a breadcrumb.


    ## Summary


    The dominant navigational tool in APEX is the list of links, otherwise known as
    a `list`. The entries of the built-in `Desktop Navigation Bar` list are displayed
    in the application’s navigation bar, and the entries of the `Desktop Navigation
    Menu` list appear in the application’s navigation menu. The list manager allows
    you to edit the contents of these lists, and the application’s `User Interface`
    properties allow you to customize their location and style.

    You can also use the list manager to create lists of your own. You can display
    a list on a page by placing it in a region of type `List`. Each list region has
    a `Template` property that lets you customize how the list is displayed.

    A list can be hierarchical, in the sense that a list entry can be the parent of
    one or more subentries. This hierarchy provides a structure to the list entries.
    This structure is especially useful for the navigation menu list because it allows
    the menu to contain a large number of entries without overwhelming the user.

    Another navigational tool is the `breadcrumb`. To define a breadcrumb for a page,
    you must first understand how the page fits within the hierarchy of all application
    pages. A page’s breadcrumb is the path in the hierarchy from that page to the
    root. To display a breadcrumb on a page, you must place it in a region of type
    `Breadcrumb`. It is common to place the breadcrumb region in the application’s
    global page (page 0) so that it appears in the same place on every page.


    ## Items


    An `item` is an element of a web page that holds a value. Each item has a `type`,
    such as `Text Field`, `Checkbox`, or `Select List`. Each item type has a specific
    way of displaying its value and letting users modify that value.

    You have already encountered several item types during your use of APEX. For example,
    Figure [5-1](#335103_3_En_5_Chapter.xhtml#Fig1) shows the Object Browser screen
    for renaming a column of the `DEPT` table. This figure shows five items: two display-only
    items (labeled `Schema` and `Table`), a select list (`Current Column Name`), a
    text box (`New Column Name`), and a checkbox (`Preserve Case`). In general, each
    time you enter a value into an APEX screen, you do so via an item.


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig1_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig1_HTML.jpg)


    Figure 5-1

    Different item types in an APEX screen


    The APEX app builder supports 22 different item types. These item types can be
    grouped into three categories: `text-based` items let you specify a value by typing
    it, `list-based` items let you specify a value by choosing it from a list, and
    `display-based` items prevent you from specifying values. Figure [5-1](#335103_3_En_5_Chapter.xhtml#Fig1)
    contains examples of all three item categories. These categories and their item
    types will be discussed throughout this chapter.


    ## Item Sampler Page


    In this chapter, you will create the page shown in Figure [5-2](#335103_3_En_5_Chapter.xhtml#Fig2).
    This page, named `Item Sampler`, will be page 8 of the `Employee Demo` application.
    The page itself will not do anything interesting; its only purpose is to demonstrate
    the features of some common item types and show how to configure their properties.


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig2_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig2_HTML.jpg)'
