    \ region\n get populated by a process named `FetchRowForUpdate`,\nwhich executes\
    \ during page rendering and is conditional on the SQL\nexpression\n\n```\n:P21_MODE\
    \ = 'Update'\n```\n\nThe code for this process appears in Listing [7-20](#335103_3_En_7_Chapter.xhtml#PC39).\
    \ The code is\nessentially the same as the `FetchRow` process in\nListing [7-15](#335103_3_En_7_Chapter.xhtml#PC31),\
    \ except that it\nalso deals with the lost update problem. (This issue was not\
