    `Style` 属性设置为 `Remove UI Decoration` 会显示没有通常围绕按钮的矩形的图标。`Next` 按钮的属性设置与 `Previous`
    按钮相同，只是图标是向右的箭头。


    一旦构建了 `Emp Info` 区域，下一步就是编写一个进程来检索 `P20_EMPNO` 中指定的员工的值，并将它们放入 `Emp Info` 的项中。转到页面编辑器的
    `Processing` 选项卡，创建一个名为 `FetchRow` 的进程，其 PL/SQL 代码如清单 7-15 所示。此代码类似于清单 7-4，即 `Employee
    Data Entry` 页面上 `GetEmpInfo` 按钮关联的代码。


    ```sql

    begin

    if :P20_EMPNO is not null then

    select EName, Job, Sal, DeptNo

    into :P20_ENAME, :P20_JOB, :P20_SAL, :P20_DEPTNO

    from EMP

    where EmpNo = :P20_EMPNO;

    end if;

    end;

    ```


    清单 7-15 FetchRow 进程的 PL/SQL 代码


    尽管此进程代码正确，但它的执行点错误。`Processing` 执行点意味着进程在发生提交操作时执行。但 `Employees` 区域不执行提交；而是调用链接，而链接执行重定向。您需要的是进程在重定向发生后执行——即在页面渲染期间。


    在页面设计器中单击 `FetchRow` 的节点，并查看其 `Execution Options` 部分。`Point` 属性指定了进程的执行点。图 7-20
    向您展示了可能的值。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig20_HTML.jpg](img/335103_3_En_7_Fig20_HTML.jpg)


    图 7-20 可能的进程执行点


    如果一个进程的执行点是 `New Session`，它只会在会话开始时执行。从 `Before Header` 到 `After Footer` 的执行点表示页面渲染的六个阶段；分配到其中一个点的进程将在指定的渲染阶段执行。执行点
    `After Submit` 和 `Processing` 是提交操作的两个阶段。如果您希望进程在验证阶段之前执行，则将其分配给 `After Submit`
    点；如果您希望它在验证之后执行，则分配给 `Processing`。


    尽管这些选项对于高级应用程序很有用，但许多执行点之间的差异很微妙，并且在大多数情况下无关紧要。就我们的目的而言，唯一有趣的区别在于在提交期间执行的进程和在渲染期间执行的进程之间。特别是，本书中的所有进程在页面渲染期间执行时都具有
    `After Header` 执行点，而在提交期间执行时具有 `Processing` 执行点。


    现在将注意力转回 `FetchRow` 进程，并将其执行点更改为 `After Header`。您应该观察到该进程的节点将从处理树中消失并重新出现在渲染树中，如图
    7-21 所示。这是合理的，因为渲染树包含页面渲染期间发生的所有内容，其中包括进程。此图还显示 `After Header` 执行点是一个**预渲染**点——也就是说，它在区域渲染之前发生。这很重要，因为它确保
    `FetchRow` 将在页面项被渲染之前为它们赋值。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig21_HTML.jpg](img/335103_3_En_7_Fig21_HTML.jpg)


    图 7-21 FetchRow 现在是一个渲染进程'
- fmt: "`FetchRow` will get called each time the page is rendered. But it doesn’t\
    \ make sense for it to go to the database unless the user has selected a row—that\
    \ is, it should execute its SQL statement only when `P20_EMPNO` is non-null. That\
    \ is the purpose of the if-statement in Listing 7-15. (An equally good equivalent\
    \ solution is to remove the if-statement and change the `Server-side Condition`\
    \ properties of the process so that it executes only when `P20_EMPNO` is not null.)\n\
    Instead of creating `FetchRow` as a submit process and then changing its execution\
    \ point, it is easier to create it directly as a rendering process. You simply\
    \ need to right-click the `After Header` node in the rendering tree and select\
    \ `Create Process`.\n\n## Moving Between Regions\nAt this point in your application,\
    \ you should verify that clicking a link on the `Employees` report will correctly\
    \ place the values for the selected employee into the items of `Emp Info`. The\
    \ next issue is to work out a plan for how the regions can “take turns” rendering\
    \ themselves.\nThe key idea is to realize that a non-`null` value for `P20_EMPNO`\
    \ indicates that a row has been selected. So to “un-select” a row, it follows\
    \ that you should put a `null` value into `P20_EMPNO`. The two regions can thus\
    \ use the value of that item to determine their conditional rendering—the `Employees`\
    \ region should be visible when the item value is `null`, and the `Emp Info` region\
    \ should be visible when the value is not `null`. In other words, the value of\
    \ `P20_EMPNO` determines whether the page is in *report mode* or *single row mode*.\n\
    This reasoning also leads to a natural way to implement the `ReportView` button.\
    \ It should simply redirect to the same page, setting `P20_EMPNO` to `null`. Make\
    \ these changes, and test your page again. Clicking a row of the report should\
    \ display the `Emp Info` region for that employee, and clicking the `Report View`\
    \ button should display the report again.\n\n## Finding Previous and Next Rows\n\
    The final issue is how to implement the `Previous` and `Next` buttons so that\
    \ clicking them causes the region to display the previous (or next) row of the\
    \ report. This section considers two different ways to implement this functionality.\
    \ The first approach is easier to understand, but it has some limitations. The\
    \ second approach is a bit harder to understand but is much more elegant.\n\n\
    ### Approach 1: Different Processes for Previous and Next\nConsider the `Previous`\
    \ button, which needs to select the previous row. Assume for the moment that “previous\
    \ row” means the row having the next-lowest employee number. The PL/SQL code in\
    \ Listing 7-16 does the job.\n\n```sql\ndeclare\n  v_prevEmp number(4,0);\nbegin\n\
    \  select max(EmpNo) into v_prevEmp\n  from EMP\n  where EmpNo < :P20_EMPNO;\n\
    \  if v_prevEmp is not null then\n    :P20_EMPNO := v_prevEmp;\n  end if;\nend;\n\
    ```\n*Listing 7-16 Simplified Code for the Previous Button, Approach 1*\n\nThe\
    \ if-statement is necessary to handle the case when you try to get the previous\
    \ row of the first employee. In this case, the query would return a `null` value.\
    \ Without the if-statement, the button would put that `null` into `P20_EMPNO`,\
    \ effectively deselecting the row and returning to report mode. By using the if-statement,\
    \ clicking the `Previous` button from the first row will have no effect.\n\nNow\
    \ suppose that you want to use a different column to determine the previous row,\
    \ such as `EName`. The preceding query does not extend easily to this case. Instead,\
    \ you should use the SQL analytic function `lag`, which finds the previous value\
    \ based on a specified sort order. Listing 7-17 gives the resulting PL/SQL code.\n\
    \n```sql\ndeclare\n  v_prevEmp number(4,0);\nbegin\n  select PrevEmp into v_prevEmp\n\
    \  from (select EmpNo, lag(EmpNo) over (order by EName) as PrevEmp\n        from\
    \ EMP)\n  where EmpNo = :P20_EMPNO;\n  if v_prevEmp is not null then\n    :P20_EMPNO\
    \ := v_prevEmp;\n  end if;\nend;\n```\n*Listing 7-17 PL/SQL Code for the Previous\
    \ Button, Approach 1*\n\nThe inner query creates a two-column table of employee\
    \ numbers, in which each employee is paired with the employee appearing immediately\
    \ before in the sort order. The outer query then selects the row from that table\
    \ whose `EmpNo` value equals `P20_EMPNO` and returns the `PrevEmp` value of that\
    \ record.\nIn addition to the `lag` function, SQL also has the `lead` function\
    \ that behaves the same way, except that it returns the next-highest value in\
    \ the sort order. This function can be used in the implementation of the `Next`\
    \ button, and its PL/SQL code is similar to Listing 7-17 (and thus is omitted).\n\
    Because the `Previous` and `Next` buttons each have their own process, you should\
    \ set their actions to `submit`. You should also configure each process to execute\
    \ conditionally on its button. Although this is not the best solution to the problem,\
    \ it works well and is worth implementing just to see it in action.\n\n### Approach\
    \ 2: A Unified Previous/Next Process\nApproach 1 suffers from the fact the `Previous`\
    \ and `Next` buttons don’t have any visible effect when they get to the first\
    \ or last record; to the user, they seem to have stopped working. An alternative\
    \ idea is to hide the buttons when they are not applicable. To do this, the page\
    \ needs to “read ahead.” That is, in addition to keeping track of the current\
    \ employee number, the page also needs to keep track of the previous and next\
    \ values. This way, it can hide the `Previous` button if the previous value is\
    \ `null` and similarly for the `Next` button.\n\nTo implement this approach, create\
    \ the hidden items `P20_PREV` and `P20_NEXT` to hold the previous and next employee\
    \ numbers. Then, whenever a record is selected, a process can “read ahead” and\
    \ assign the appropriate values to these items. This process, called `FindPreviousNext`,\
    \ appears in Listing 7-18.\n\n```sql\nbegin\n  if :P20_EMPNO is not null then\n\
    \    select PrevEmp, NextEmp\n      into :P20_PREV, :P20_NEXT\n      from (select\
    \ EmpNo,\n                   lag(EmpNo)  over (order by EName) as PrevEmp,\n \
    \                  lead(EmpNo) over (order by EName) as NextEmp\n            \
    \  from EMP)\n     where EmpNo = :P20_EMPNO;\n  end if;\nend;\n```\n*Listing 7-18\
    \ PL/SQL Code to Find Previous and Next Values*\n\nThis code is similar to the\
    \ code in Listing 7-17, but differs in that it is not specific to any particular\
    \ button. In fact, it must execute whenever a row gets selected, regardless of\
    \ whether the selection is via a link from the report or via one of the `Previous`\
    \ or `Next` buttons. In other words, the `FindPreviousNext` process should execute\
    \ during page rendering, just like the `FetchRow` process.\n\nAs a consequence,\
    \ the `Previous` and `Next` buttons can be configured much more simply. Consider\
    \ the `Previous` button (the `Next` button is similar). Because `P20_PREV` holds\
    \ the `EmpNo` of the previous row, you can configure the button to redirect when\
    \ clicked, placing the value of `P20_PREV` into `P20_EMPNO`. See Figure 7-22.\n\
    \n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig22_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig22_HTML.jpg)\n\
    *Figure 7-22 Configuring the action of the Previous button*\n\nYou can also use\
    \ `P20_PREV` and `P20_NEXT` to customize when the `Previous` and `Next` buttons\
    \ get displayed. In particular, the `Previous` button should be displayed when\
    \ `P20_PREV` is not null, and the `Next` button should be displayed when `P20_NEXT`\
    \ is not null. These conditions can be expressed using conditional rendering.\
    \ For example, Figure 7-23 shows the `Server-side Condition` section for the `Previous`\
    \ button."
