- fmt: '# 3. Regions


    A page’s content is divided into rectangular areas called *regions*. Consider,
    for example, the APEX SQL Workshop home screen of Figure [1-3](#335103_3_En_1_Chapter.xhtml#Fig3),
    which shows seven regions. Six of these regions have titles: `Recently Created
    Tables`, `Recent SQL Commands`, `Recent SQL Scripts`, `About`, `Schema`, and `Create
    Object`. The seventh region, which contains the five large buttons, is untitled.


    Each region has a *type* that denotes what kind of content it can contain. The
    regions in Figure [1-3](#335103_3_En_1_Chapter.xhtml#Fig3) belong to three different
    region types:


    *   The `Recently Created Tables`, `Recent SQL Commands`, and `Recent SQL Scripts`
    regions contain reports and have the type `Classic Report`.

    *   The `Create Object` region contains a list of links and has type `List`.

    *   The `About`, `Schema`, and untitled regions have type `Static Content`.


    A region can also contain *controls* —that is, items and buttons. In Figure [1-3](#335103_3_En_1_Chapter.xhtml#Fig3),
    the `Schema` region contains a select list item and a button, and the untitled
    region contains five large buttons. Because APEX considers a region’s controls
    to be distinct from its content, any region, regardless of type, can contain controls.
    This chapter focuses on a region’s content; controls will be discussed in Chapters
    [5](#335103_3_En_5_Chapter.xhtml) and [6](#335103_3_En_6_Chapter.xhtml).


    APEX supports many different region types. This chapter covers four fundamental
    types: `Static Content`, `Classic Report`, `Chart`, and `Interactive Report`.
    Subsequent chapters introduce other region types: `Breadcrumb` and `List` in Chapter
    [4](#335103_3_En_4_Chapter.xhtml), `Region Display Selector` in Chapter [6](#335103_3_En_6_Chapter.xhtml),
    `Form` in Chapter [10](#335103_3_En_10_Chapter.xhtml), and `Interactive Grid`
    in Chapter [11](#335103_3_En_11_Chapter.xhtml).


    ## Creating and Deleting Regions


    To create a new region for a page, go to the page designer for that page. Right-click
    the `Regions` node of its rendering tree and select `Create Region`, as shown
    in Figure [3-1](#335103_3_En_3_Chapter.xhtml#Fig1). APEX will then add a region
    component (named `New`) to the rendering tree as a child of the `Content Body`
    folder. This component will also have a child of its own, named `Attributes`.
    See Figure [3-2](#335103_3_En_3_Chapter.xhtml#Fig2).


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig2_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig2_HTML.jpg)


    Figure 3-2


    APEX adds a new region to the page


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig1_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Right-click the Regions node to create a new region


    It might seem strange that APEX uses two components in the rendering tree to represent
    a single region. The reason is that the properties of these components have separate
    concerns. In particular, the region component (here labeled `New`) contains properties
    common to all regions, whereas the `Attributes` component contains properties
    specific to the region’s type. The type-independent properties will be discussed
    in the next section, with the type-specific properties following.


    If you want to delete a region, simply right-click its component in the rendering
    tree and select `Delete`. For example, the breadcrumb region that came with the
    home page is useless. Go to the page designer for page 1, find the `Breadcrumb`
    region in the rendering tree, and delete it. See Figure [3-3](#335103_3_En_3_Chapter.xhtml#Fig3).


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig3_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Deleting a region


    ## Type-Independent Region Properties


    To edit the type-independent properties of a region, first select the region’s
    node in the rendering tree. The property editor will then display all type-independent
    properties for that region and their values. These properties are grouped into
    *sections*, according to their purpose. Here, I will discuss four important sections:
    `Identification`, `Source`, `Layout`, and `Appearance`.


    ### Identification and Source Sections


    Figure [3-4](#335103_3_En_3_Chapter.xhtml#Fig4) shows the `Identification` and
    `Source` sections for the `New` region of the `Region Practice` page and their
    properties `Title`, `Type`, and `Text`. The `Title` property identifies the region
    and describes its purpose. This value is typically displayed in the region’s header
    when the page is rendered.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig4_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Identification and Source properties for a new region


    A new region is assigned the title `New` by default. The first thing you should
    do after creating a region is to assign it a more meaningful title. APEX accepts
    HTML formatting tags here. For example, go to the page designer for the `Region
    Practice` page, select the `New` region in the rendering tree, and change its
    `Title` property to this:


    ```

    My First Region

    ```


    Then, create two more regions on the page, having this title


    ```

    My Second Region

    ```


    and this title


    ```

    My Third Region

    ```


    Save and run the page. It should look like Figure [3-5](#335103_3_En_3_Chapter.xhtml#Fig5).
    Note that each title is displayed in the header of its region, in italics, bold,
    and red, respectively.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig5_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Three regions on the Region Practice page


    A region’s content is determined by its `Type` property and `Source` section.
    The type of a region specifies what kind of content it holds, and the `Source`
    section specifies the actual content. For example, if the region’s type is `Static
    Content`, then its `Source` section contains the text the region should display;
    if a region’s type is `Classic Report`, then its `Source` section specifies the
    table that the region should display.


    New regions are assigned the type `Static Content`, and its source text is empty.
    For fun, let’s assign some source text to the regions `My First Region` and `My
    Second Region`. I went for something simple, namely, `This is my first region`
    and `This is my second region`.


    You change a region’s `Type` property by selecting a type from its list of possible
    types. For example, change the type of `My Third Region` to `Classic Report`.
    When you do so, the `Source` section changes so that you can specify a report;
    see Figure [3-6](#335103_3_En_3_Chapter.xhtml#Fig6). By default, the property
    editor expects the report to display an entire table: the source type is `Table/View`
    and the `Table Name` property is empty, awaiting the name of a table. The property
    editor places a red error indicator next to the property name to remind you to
    enter the table name. It is quite insistent on this point—it will not let you
    save the page until the error is cleared up. So enter `DEPT` as the table name,
    and watch the error icon disappear.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig6_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig6_HTML.jpg)


    Figure 3-6


    The default Source properties of a classic report


    Alternatively, the source of a report can be an SQL query. To try it out, change
    the source type to `SQL Query`. This will cause the `Table Name` property to be
    replaced with the property `SQL Query`, again with a red error indicator. Enter
    the query `select * from DEPT` and watch the indicator disappear.


    Figure [3-7](#335103_3_En_3_Chapter.xhtml#Fig7) displays the result of running
    the revised page.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig7_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Each region has a non-empty source'
