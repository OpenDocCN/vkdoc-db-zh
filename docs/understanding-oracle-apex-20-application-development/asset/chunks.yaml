    ## Summary


    This chapter examined the object browser and SQL command tools in the APEX SQL
    Workshop. Both tools allow you to view and modify the database, but via very different
    interfaces. The object browser provides a visual interface, in which you perform
    tasks by clicking buttons and filling out forms. The SQL command tool provides
    a command-based interface, in which you perform tasks by executing SQL statements.


    The object browser is ideal for performing common and simple tasks. As its name
    implies, the object browser is also well suited for exploring the database. The
    point-and-click interface makes it easy to discover the various tables in the
    database and explore their columns. The object browser also does not require familiarity
