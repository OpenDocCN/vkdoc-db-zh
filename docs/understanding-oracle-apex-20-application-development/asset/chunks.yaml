    ## 基于静态列表的项


    现在考虑项 `P8_RADIO_NO`、`P8_SELECT_NO` 和 `P8_POPUP_NO` —— 也就是图 5-12 中每个区域的第二项。这些项具有相同的显示值和返回值。这里有趣的情况是显示值和返回值都是部门编号。如果你用直接的方式编写它们的
    SQL 查询，那么两个输出列的名称将会相同，这在 SQL 中是非法的。为了使查询合法，你需要至少重命名其中一个列。查询应该类似于这样：


    ```sql

    select DeptNo as DisplayVal, DeptNo as ReturnVal

    from DEPT

    order by DisplayVal

    ```


    **注意**


    列的名称可以是任何名称；SQL 只要求它们彼此不同。


    你应该类似地配置项 `P8_RADIO_NO`、`P8_SELECT_NO` 和 `P8_POPUP_NO`，方式与前三个项相同。将它们的 `Type` 属性分别设置为
    `Radio Group`、`Select List` 和 `Popup List`，并将它们的 `List of Values` 属性设置为前面的 SQL
    查询。你还应该将 `P8_RADIO_NO` 的 `Number of Columns` 属性设置为 `4`。


    项 `P8_RADIO_INFO`、`P8_SELECT_INFO` 和 `P8_POPUP_INFO` 的处理方式类似。它们的属性值与前几个项相同，只是查询不同。下面是该查询，它展示了如何创建复杂的显示值：


    ```sql

    select d.DName || '' ('' || count(e.EmpNo) || '' employees)'' as Display,

    d.DeptNo as ReturnVal

    from DEPT d left join EMP e on d.DeptNo = e.DeptNo

    group by d.DeptNo, d.DName

    order by Display

    ```


    查询中的左连接确保所有部门都被包含在内，即使是那些没有员工的部门。


    ## 多值列表项


    当你使用查询来指定基于列表的项的值时，APEX 会在每次渲染页面时执行该查询。如果查询的输出永远不会改变，那么你可以使用静态表达式来避免数据库调用。


    你指定静态表达式的方式与类型为 `Text Value with Autocomplete` 的项相同：首先，将 `List of Values` 部分中的
    `Type` 属性设置为 `Static Values`；然后点击 `Static Values` 属性以调出“静态值”屏幕。接着，你可以为列表的每个成员输入显示值和返回值。图
    5-19 展示了我如何为 `P8_RADIO_NAME`、`P8_SELECT_NAME` 和 `P8_POPUP_NAME` 填写值。


    ![Figure 5-19](img/335103_3_En_5_Fig19_HTML.jpg)

    *图 5-19: 基于列表项的静态值*


    基于列表的项只允许用户从其列表中选择一个值。多值列表项则允许用户从其列表中选择多个值。图 5-2 中的 `Multi-Value List Items` 区域包含四种类型的多值项，为清晰起见，该区域在图
    5-20 中重新打印。此区域中的每个项都选择了其 `operations` 和 `sales` 部门。


    ![Figure 5-20](img/335103_3_En_5_Fig20_HTML.jpg)

    *图 5-20: 多值列表项*


    多值列表项的配置方式与单值项相同。特别是，它们使用 SQL 查询或静态表达式来指明其显示值和返回值。例如，该区域中四个项的 SQL 查询是：


    ```sql

    select DName, DeptNo

    from DEPT

    order by DName

    ```


    主要问题是如何为一个选择了多个显示值的项分配单个返回值。APEX 使用约定：多值项的值是一个字符串，由所选的返回值用冒号分隔组成。如果没有选择显示值，则该项的值为
    `null`。例如，图 5-20 中的所有项的值都是 `40:30`。


    让我们看看这四种项类型。第一个项 `P8_M_SELECT` 是一个选择列表；也就是说，与 `Single-Value List` 区域中的项类型相同。要指定该项为多值选择列表，你需要将其
    `Settings` 部分中的 `Allow Multi Selection` 属性设置为 `Yes`。其 `Appearance` 部分中的 `Height`
    属性的值决定了显示多少行菜单。所有其他属性的配置方式相同。


    请注意，多值选择列表 `P8_M_SELECT` 的外观和行为与单值选择列表 `P8_SELECT_NAME` 不同。多值列表始终在页面上显示菜单，而不是按需显示。（并且如果列表中的项目多于页面上可以显示的数量，会出现滚动条，以便用户滚动浏览这些值。）用户可以通过按住
    Control 或 Command 键（取决于操作系统）并点击来从多值列表中选择其他菜单项。


    该区域中的第二个项 `P8_CHECKBOX` 是一个复选框组。复选框组的配置与单选按钮组完全相同。复选框组与单选按钮组的不同之处在于可以选择多个复选框，并且点击一个框会切换其值。


    第三个项 `P8_SHUTTLE` 是一个穿梭列表，它与多值选择列表非常相似，配置方式也相同。它们之间的区别是，多值选择列表通过高亮显示来表示选定的值，而穿梭列表则有单独的菜单来显示已选定和未选定的值。


    第四个项 `P8_LIST` 是一个列表管理器，它是自动完成文本框和弹出列表的交叉产物。与自动完成类似，用户可以在输入框中输入任何值，然后点击 `Add`
    按钮将其添加到选定值列表中。或者，用户可以点击弹出箭头以调出一个值菜单进行选择，选中的值会被添加到输入框中。然而，重要的是要注意，虽然弹出列表显示的是显示值，但它将返回值放入输入框。因此，图
    5-20 显示选择了部门编号 `30` 和 `40`，尽管弹出列表显示的是部门名称。


