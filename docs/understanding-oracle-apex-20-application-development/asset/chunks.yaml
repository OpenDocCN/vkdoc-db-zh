    网页经常需要向用户请求是/否信息。图 5-2 中的 `Yes/No Items` 区域展示了执行此任务的四种不同方法，为清晰起见，该区域在图 5-21 中重新打印。该区域包含四个基于列表的项，每个都表示用户希望被联系。


