    page assigns item values, that URL must also contain a checksum for\nthose values.\
    \ When the APEX server receives a request, it extracts the\nargument values, computes\
    \ their checksum, and compares it with the\nchecksum within the URL; the request\
    \ is rejected if they differ.\nThe idea is that the checksum function is known\
