    `操作`按钮允许用户进一步自定义报告。点击该按钮会显示其可执行操作的菜单。该菜单出现在图 3-55 中，展示了`数据`操作的子菜单。以下章节将描述这些操作中较为实用的部分。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig55_HTML.jpg](img/335103_3_En_3_Fig55_HTML.jpg)


    图 3-55 操作菜单


    ## 列


    选择`列`操作会弹出一个模态对话框，用户可以在其中选择要在报告中显示的列及其顺序；图 3-56 展示了一个选择显示`Ename`、`Job`、`Hiredate`和`Sal`列的示例。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig56_HTML.jpg](img/335103_3_En_3_Fig56_HTML.jpg)


    图 3-56 指定要显示的列


    ## 筛选器


    选择`筛选器`操作会弹出一个模态对话框，用户可以在其中创建筛选器；参见图 3-57。它产生的筛选器类似于您为图 3-53 和 3-54 创建的筛选器。不同之处在于，之前的筛选器只能检查文本包含关系，而此对话框允许使用多种操作类型。例如，图
    3-57 中指定的筛选器是 `Job!=''CLERK''`。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig57_HTML.jpg](img/335103_3_En_3_Fig57_HTML.jpg)


    图 3-57 筛选器对话框


    ## 排序


    选择`排序`操作会弹出一个模态对话框，用户可以在其中选择所需的排序顺序；参见图 3-58。用户选择要排序的列以及排序方向是升序还是降序。该图显示了选择排序列的菜单。请注意，用户可以对可见列和隐藏列进行排序。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig58_HTML.jpg](img/335103_3_En_3_Fig58_HTML.jpg)


    图 3-58 排序对话框


    ## 突出显示


    `突出显示`操作位于`格式`子菜单中。它允许用户突出显示满足指定条件的行或单元格。回想一下，图 3-24 中的格式化经典报告将高薪值显示为红色。这是一种突出显示的形式。`突出显示`操作允许用户轻松实现这种以及其他形式的突出显示。


    选择`突出显示`选项会弹出图 3-59 所示的模态对话框。`突出显示条件`的值指定了关注的数值。如果`突出显示类型`的值是`单元格`，则这些数值被突出显示；如果是`行`，则包含这些数值的行被突出显示。突出显示可以涉及背景色、文本色或两者。该图显示了与图
    3-24 对应的突出显示设置。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig59_HTML.jpg](img/335103_3_En_3_Fig59_HTML.jpg)


    图 3-59 突出显示对话框


    ## 每页行数


    `每页行数`操作也位于格式子菜单中。它允许用户随意更改报告的分页方式。点击菜单项会显示一个子菜单，用户可以从一系列可能的每页行数中进行选择。


    ## 图表


    选择`图表`操作会弹出一个模态对话框，用户可以在其中基于报告中的数据创建图表；参见图 3-60。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig60_HTML.jpg](img/335103_3_En_3_Fig60_HTML.jpg)


    图 3-60 图表对话框


    通过此对话框，用户可以创建对单个列进行聚合的单系列图表。该图指定了一个柱状图，显示每个职位的最低薪资，类似于图 3-37 中显示的柱状图。生成的图表出现在图
    3-61 中。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig61_HTML.jpg](img/335103_3_En_3_Fig61_HTML.jpg)


    图 3-61 交互式图表


    此图中有两点值得注意。首先，图表的许多方面是不可自定义的。例如，图表只能有一个系列，并且调色板是固定的。其次，搜索栏已扩展，在`操作`按钮左侧增加了两个报告/图表按钮。用户可以使用这些按钮在交互式报告及其图表之间切换。


    ## 配置搜索栏


    搜索栏具有许多功能。然而，并非所有应用程序都需要全部功能。交互式报告区域具有允许应用程序开发人员限制此功能的属性。本节将考察这些属性。


    图 3-62 显示了`交互式报告`页面及其交互式报告区域`Employees`的渲染树。请注意，此树具有与经典报告相同的结构（参考图 3-25），即`属性`组件包含报告特定的属性，而`列`文件夹包含每个列的属性。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig62_HTML.jpg](img/335103_3_En_3_Fig62_HTML.jpg)


    图 3-62 交互式报告页面的渲染树


    `属性`节点的属性编辑器包含两个相关部分：`搜索栏`和`操作菜单`。图 3-63 显示了`搜索栏`部分的属性。这些属性让您可以选择性地显示搜索区域的不同部分。例如，关闭`包含搜索栏`属性会完全禁用该栏，关闭`搜索字段`则仅启用`操作`按钮，依此类推。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig63_HTML.jpg](img/335103_3_En_3_Fig63_HTML.jpg)


    图 3-63 用于配置搜索区域的属性


    图 3-64 显示了`操作菜单`部分的前几个属性。这些属性让您可以指定菜单中显示的操作。（由于篇幅所限，并非所有属性均已显示。）


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig64_HTML.jpg](img/335103_3_En_3_Fig64_HTML.jpg)


    图 3-64 操作菜单部分的部分属性


    最后，交互式报告的每个列都有用于配置其特定功能的属性。这些属性出现在该列的`允许用户`部分中，如图 3-65 所示。（同样，由于篇幅所限，并非所有属性均已显示。）


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig65_HTML.jpg](img/335103_3_En_3_Fig65_HTML.jpg)


    图 3-65 某列“允许用户”部分的部分属性


    ## 链接列


    交互式报告可以显示一个特殊的列，其值是一个链接。点击此链接可在`单行视图`中显示报告。也就是说，报告会变为仅显示该行的值；它还显示供用户移至下一行或上一行的导航按钮以及一个返回原始报告的按钮。图
    3-66 显示了带有链接列的交互式报告。图 3-67 显示了点击 `BLAKE` 的链接后报告的单行视图。请注意，此单行视图显示所有列，而不仅仅是报告中显示的列。

