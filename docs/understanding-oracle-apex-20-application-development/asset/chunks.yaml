- fmt: '# Editing Interactive Grids


    ## Figure 11-5: Master-detail interactive grids


    In addition to behaving like a report, an interactive grid can also behave like
    a form. You enable editing in an interactive grid the same as you do in a form.
    In particular, go to the rendering tree for the interactive grid region, click
    its `Attributes` node, and look at the `Enabled` property in the `Edit` section.
    By default, this property is turned off. When you turn it on, additional properties
    will be displayed, as was shown in Figure 10-10. The checkboxes allow you to specify
    which editing operations the region should allow.


    As with a form, you will not be able to edit an interactive grid until you specify
    its primary key column. In the `Sample Interactive Grids` page, you already specified
    the primary key column for the `Departments` grid (to support the master-detail
    linkage); now you should specify that `EMPNO` is the primary key column for the
    `Employees` grid. You should also turn off the `Value Required` property for these
    key columns; otherwise, APEX will not be able to generate the key value for a
    newly inserted record.


    ## Editing Operations


    Figure 11-6 shows the edit-enabled interactive grid for the `Departments` region.
    (I hid the search menu and text box to save space.) When I enabled edit, APEX
    added two new columns to the left of the grid: a checkbox column (named `APEX$ROW_SELECTOR`)
    and a menu column (named `APEX$ROW_ACTION`). The toolbar also contains new buttons
    labeled `Edit`, `Save`, and `Add Row`.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig6_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig6_HTML.jpg)

    *Figure 11-6: An edit-enabled interactive grid*


    You edit an interactive grid as follows: the `Edit` button toggles between view
    mode and edit mode. Initially the button is white, as shown in Figure 11-6, denoting
    view mode. Clicking it turns the button gray, which denotes edit mode. When in
    edit mode, you can modify the value of cells. APEX denotes a modified cell by
    placing a small blue triangle in its top right corner.


    Clicking the `Add Row` button adds a new row to the grid. The initial value of
    its primary key is a placeholder. You can either replace it with a desired value,
    or leave it as is. If you leave it, then APEX will overwrite it with a generated
    value.


    ## Row-Action Menu


    Clicking a row’s `APEX$ROW_ACTION` icon brings up a menu of possible operations
    on that row. For example, Figure 11-7 shows the row-action menu for the accounting
    department row. In particular, selecting the `Delete Row` entry from this menu
    will delete its row.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig7_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig7_HTML.jpg)

    *Figure 11-7: The APEX row-action menu*


    Figure 11-8 shows the interactive grid after performing three operations: I changed
    the name of department 20 from `RESEARCH` to `OUTREACH`, I deleted the `SALES`
    department, and I inserted a new record for the `FINANCE` department. APEX uses
    color-coding to indicate these changes—edited rows are blue, deletions are gray,
    and new rows are green.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig8_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig8_HTML.jpg)

    *Figure 11-8: Changes to the interactive grid*


    None of these actions are permanent until you click the `Save` button. Until then,
    you can undo the change to a row by selecting the `Revert Changes` item from its
    row-action menu (as shown in Figure 11-7).


    The row-selection column of the grid is the leftmost column, containing checkboxes.
    This column is not used for basic editing operations. For example, clicking the
    `Save` button in Figure 11-8 will save the three changed rows even though their
    row-selection boxes were not checked.


    The purpose of the row-selection column is to support bulk operations, such as
    deletion. To use it, first select several records. Then, go to the row-action
    menu in the grid header, as shown in Figure 11-9. Choosing the `Delete Rows` menu
    item will flag the selected records for deletion. To finalize the deletion, you
    must then click the `Save` button.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig9_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig9_HTML.jpg)

    *Figure 11-9: Bulk deletion of records*


    An alternative way to perform bulk operations is to use the `Actions` button in
    the toolbar above the grid. It has a submenu named `Selection`, whose menu items
    are identical to the header’s row-action menu.


    ## Single Row View


    The action menu for each row has the item `Single Row View`, which you can see
    in Figure 11-7. Clicking it displays the selected row as if it were in a form.
    Figure 11-10 shows the single row view of the `ACCOUNTING` department. You can
    see the buttons to navigate to the next and previous row, as well as a button
    to return to the report. The other buttons work the same as in grid view.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig10_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig10_HTML.jpg)

    *Figure 11-10: Single row view*


    ## Cell Types and Defaults


    A cell in a grid lives a dual existence. Normally, it displays its value as text,
    just like in a report. But when the cell has been selected in edit mode, it turns
    into an item. The type of the item is determined by the `Type` property of the
    cell’s column. For example in the `Employees` grid, set the type of `Job` and
    `Mgr` to be `Select List`, the type of `Hiredate` to be `Date Picker`, and `Offsite`
    to be `Radio Group`. Figure 11-11 shows the list that pops up after clicking the
    `Job` cell for employee `MILLER`.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig11_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig11_HTML.jpg)

    *Figure 11-11: JOB formatted as a select list*


    Note that nonselected cells look like text fields, regardless of their type. For
    example, you cannot tell from the figure that each `Mgr` cell is a select list
    and each `Offsite` cell is a radio group. However, you can see that the `Mgr`
    cells show the display value of the column (the manager’s name) and not the return
    value (the manager’s employee number). Similarly, the `Offsite` cells show the
    display values of the column (‘`No`’) and not the return value (‘`N`’). The best
    way to learn about the different cell types is to experiment with them.


    Each column has a property section named `Default`, which is where you can specify
    default values for a new record. In the `Employees` region, you should specify
    default values for the columns `HIREDATE`, `COMM`, and `OFFSITE`. Figure 11-12
    shows the specification for `HIREDATE`, which is simply a call to the SQL function
    `current_date`. These default values will appear in the insert row, and the user
    can modify them before clicking the `Save` button.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig12_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig12_HTML.jpg)

    *Figure 11-12: Specifying the default value of a column*'
  raw: 'Figure 11-5

    Master-detail interactive grids


    Editing Interactive Grids

    In addition to behaving like a report, an interactive

    grid can also behave like a form. You enable editing in an interactive

    grid the same as you do in a form. In particular, go to the rendering

    tree for the interactive grid region, click its `Attributes` node, and

    look at the `Enabled` property in

    the `Edit`

    section. By default, this property is turned off. When you turn it on,

    additional properties will be displayed, as was shown in Figure [10-10](#335103_3_En_10_Chapter.xhtml#Fig10).
    The checkboxes allow you to

    specify which editing operations the region should allow.

    As with a form, you will not be able to edit an interactive grid

    until you specify its primary key column. In the `Sample Interactive Grids` page,
    you already specified the primary key column for the

    `Departments`

    grid (to support the master-detail linkage); now you should specify that

    `EMPNO` is the

    primary key column for the `Employees` grid. You

    should also turn off the `Value Required`

    property for these key columns; otherwise, APEX will not be able to

    generate the key value for a newly inserted record.


    Figure [11-6](#335103_3_En_11_Chapter.xhtml#Fig6) shows the

    edit-enabled interactive grid for the `Departments` region.

    (I hid the search menu and text box to save space.) When I enabled edit,

    APEX added two new columns to the left of the grid: a checkbox column

    (named `APEX$ROW_SELECTOR`)

    and a menu column (named `APEX$ROW_ACTION`). The

    toolbar also contains new buttons labeled `Edit`, `Save`, and `Add Row`.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig6_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig6_HTML.jpg)


    Figure 11-6

    An edit-enabled interactive grid


    You edit an interactive grid as follows: the `Edit` button toggles

    between view mode and edit mode. Initially the button is white, as shown

    in Figure [11-6](#335103_3_En_11_Chapter.xhtml#Fig6), denoting view

    mode. Clicking it turns the button gray, which denotes edit mode. When

    in edit mode, you can modify the value of cells. APEX denotes a modified

    cell by placing a small blue triangle in its top right corner.

    Clicking the `Add Row` button adds a new row to the grid. The initial value of
    its

    primary key is a placeholder. You can either replace it with a desired

    value, or leave it as is. If you leave it, then APEX will overwrite it

    with a generated value.


    Clicking a row’s `APEX$ROW_ACTION` icon

    brings up a menu of possible operations on that row. For example, Figure

    [11-7](#335103_3_En_11_Chapter.xhtml#Fig7) shows the

    row-action menu for the accounting department row. In particular,

    selecting the `Delete Row` entry from this menu will delete its row.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig7_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig7_HTML.jpg)


    Figure 11-7

    The APEX row-action menu


    Figure [11-8](#335103_3_En_11_Chapter.xhtml#Fig8) shows the

    interactive grid after performing three operations: I changed the name

    of department 20 from `RESEARCH` to `OUTREACH`, I deleted

    the `SALES`

    department, and I inserted a new record for the `FINANCE` department.

    APEX uses color-coding to indicate these changes—edited rows are blue,

    deletions are gray, and new rows are green.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig8_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig8_HTML.jpg)


    Figure 11-8

    Changes to the interactive grid


    None of these actions are permanent until you click the `Save` button. Until

    then, you can undo the change to a row by selecting the `Revert Changes` item

    from its row-action menu (as shown in Figure [11-7](#335103_3_En_11_Chapter.xhtml#Fig7)).

    The row-selection column of the grid is the leftmost

    column, containing checkboxes. This column is not used for basic editing

    operations. For example, clicking the `Save` button in Figure

    [11-8](#335103_3_En_11_Chapter.xhtml#Fig8) will save the

    three changed rows even though their row-selection boxes were not

    checked.


    The purpose of the row-selection column is to support bulk operations,

    such as deletion. To use it, first select several records. Then, go to

    the row-action menu in the grid header, as shown in Figure [11-9](#335103_3_En_11_Chapter.xhtml#Fig9).
    Choosing the

    `Delete Rows`

    menu item will flag the selected records for deletion. To finalize the

    deletion, you must then click the `Save` button.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig9_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig9_HTML.jpg)


    Figure 11-9

    Bulk deletion of records


    An alternative way to perform bulk operations is to use the `Actions` button in
    the

    toolbar above the grid. It has a submenu named `Selection`, whose menu

    items are identical to the header’s row-action menu.


    The action menu for each row has the item `Single Row View`,

    which you can see in Figure [11-7](#335103_3_En_11_Chapter.xhtml#Fig7). Clicking
    it

    displays the selected row as if it were in a form. Figure [11-10](#335103_3_En_11_Chapter.xhtml#Fig10)
    shows the

    single row view of the `ACCOUNTING`

    department. You can see the buttons to navigate to the next and previous

    row, as well as a button to return to the report. The other buttons work

    the same as in grid view.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig10_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig10_HTML.jpg)


    Figure 11-10

    Single row view


    A cell in a grid lives a dual existence. Normally, it displays its value

    as text, just like in a report. But when the cell has been selected

    in edit mode, it turns into an item. The type of the item is determined

    by the `Type`

    property of the cell’s column. For example in the `Employees` grid, set

    the type of `Job`

    and `Mgr` to be

    `Select List`,

    the type of `Hiredate` to be `Date Picker`, and

    `Offsite` to be

    `Radio Group`.

    Figure [11-11](#335103_3_En_11_Chapter.xhtml#Fig11) shows the

    list that pops up after clicking the `Job` cell for employee

    `MILLER`.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig11_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig11_HTML.jpg)


    Figure 11-11

    JOB formatted as a select list


    Note that nonselected cells look like text fields, regardless of

    their type. For example, you cannot tell from the figure that each `Mgr` cell
    is a select

    list and each `Offsite` cell is a

    radio group. However, you can see that the `Mgr` cells show the

    display value of the column (the manager’s name) and not the return

    value (the manager’s employee number). Similarly, the `Offsite` cells show

    the display values of the column (‘`No`’) and not the

    return value (‘`N`’). The best way to

    learn about the different cell types is to experiment with them.


    Each column has a property section named `Default`, which is

    where you can specify default values for a new record. In the `Employees` region,
    you

    should specify default values for the columns `HIREDATE`, `COMM`, and `OFFSITE`.
    Figure [11-12](#335103_3_En_11_Chapter.xhtml#Fig12) shows the

    specification for `HIREDATE`, which is

    simply a call to the SQL function current_date. These default values

    will appear in the insert row, and the user can modify them before

    clicking the `Save` button.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig12_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig12_HTML.jpg)


    Figure 11-12

    Specifying the default value of a column'
  trans: '

    # 编辑交互式网格


    ## 图 11-5：主-详细信息交互式网格


    除了能像报表一样运行外，交互式网格还能像表单一样运行。在交互式网格中启用编辑功能的方式与在表单中相同。具体来说，转到交互式网格区域的渲染树，点击其 `Attributes`
    节点，查看 `Edit` 部分中的 `Enabled` 属性。默认情况下，此属性是关闭的。当您将其开启时，会显示其他属性，如图 10-10 所示。这些复选框允许您指定该区域应允许哪些编辑操作。


    与表单一样，在您指定其主键列之前，将无法编辑交互式网格。在 `Sample Interactive Grids` 页面中，您已经为 `Departments`
    网格指定了主键列（以支持主-详细信息链接）；现在您应该指定 `EMPNO` 是 `Employees` 网格的主键列。您还应该关闭这些关键列的 `Value
    Required` 属性；否则，APEX 将无法为新插入的记录生成关键值。


    ## 编辑操作


    图 11-6 显示了为 `Departments` 区域启用编辑功能的交互式网格。（为节省空间，我隐藏了搜索菜单和文本框。）当我启用编辑时，APEX 在网格左侧添加了两列：一列复选框列（名为
    `APEX$ROW_SELECTOR`）和一列菜单列（名为 `APEX$ROW_ACTION`）。工具栏还包含标记为 `Edit`、`Save` 和 `Add
    Row` 的新按钮。


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig6_HTML.jpg](img/335103_3_En_11_Fig6_HTML.jpg)

    *图 11-6：已启用编辑功能的交互式网格*


    您按如下方式编辑交互式网格：`Edit` 按钮在视图模式和编辑模式之间切换。最初按钮为白色，如图 11-6 所示，表示视图模式。点击它会使按钮变为灰色，表示编辑模式。在编辑模式下，您可以修改单元格的值。APEX
    通过在单元格的右上角放置一个蓝色小三角形来表示已修改的单元格。


    点击 `Add Row` 按钮会向网格添加一个新行。其主键的初始值是一个占位符。您可以将其替换为所需的值，也可以保持原样。如果您保持原样，那么 APEX 将用生成的值覆盖它。


    ## 行操作菜单


    点击行的 `APEX$ROW_ACTION` 图标会弹出一个菜单，包含可对该行执行的操作。例如，图 11-7 显示了会计部门所在行的行操作菜单。特别是，从此菜单中选择
    `Delete Row` 项将删除该行。


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig7_HTML.jpg](img/335103_3_En_11_Fig7_HTML.jpg)

    *图 11-7：APEX 行操作菜单*


    图 11-8 显示了执行三个操作后的交互式网格：我将部门 20 的名称从 `RESEARCH` 更改为 `OUTREACH`，删除了 `SALES` 部门，并为
    `FINANCE` 部门插入了一条新记录。APEX 使用颜色编码来指示这些更改——已编辑的行为蓝色，删除的行为灰色，新增的行为绿色。


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig8_HTML.jpg](img/335103_3_En_11_Fig8_HTML.jpg)

    *图 11-8：对交互式网格的更改*


    在点击 `Save` 按钮之前，这些操作都不是永久的。在此之前，您可以通过从行操作菜单中选择 `Revert Changes` 项来撤销对某一行的更改（如图
    11-7 所示）。


    网格的行选择列是最左侧包含复选框的列。此列不用于基本编辑操作。例如，点击图 11-8 中的 `Save` 按钮将保存三行更改的行，即使它们的行选择框未被勾选。


    行选择列的目的是支持批量操作，例如删除。要使用它，首先选择多条记录。然后，转到网格标题中的行操作菜单，如图 11-9 所示。选择 `Delete Rows`
    菜单项将把选定的记录标记为待删除。要最终确定删除操作，您必须接着点击 `Save` 按钮。


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig9_HTML.jpg](img/335103_3_En_11_Fig9_HTML.jpg)

    *图 11-9：批量删除记录*


    执行批量操作的另一种方式是使用网格上方工具栏中的 `Actions` 按钮。它有一个名为 `Selection` 的子菜单，其菜单项与标题行的操作菜单相同。


    ## 单行视图


    每行的操作菜单中都有 `Single Row View` 项，您可以在图 11-7 中看到。点击它会以类似表单的方式显示所选行。图 11-10 显示了 `ACCOUNTING`
    部门的单行视图。您可以看到用于导航到下一行和上一行的按钮，以及一个返回到报表的按钮。其他按钮的工作方式与网格视图相同。


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig10_HTML.jpg](img/335103_3_En_11_Fig10_HTML.jpg)

    *图 11-10：单行视图*


    ## 单元格类型和默认值


    网格中的单元格具有双重存在形式。通常，它像在报表中一样以文本形式显示其值。但是当该单元格在编辑模式下被选中时，它就变成了一个项。该项的类型由该单元格所在列的
    `Type` 属性决定。例如，在 `Employees` 网格中，将 `Job` 和 `Mgr` 的类型设置为 `Select List`，将 `Hiredate`
    的类型设置为 `Date Picker`，将 `Offsite` 的类型设置为 `Radio Group`。图 11-11 显示了点击员工 `MILLER`
    的 `Job` 单元格后弹出的列表。


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig11_HTML.jpg](img/335103_3_En_11_Fig11_HTML.jpg)

    *图 11-11：格式化为选择列表的 JOB*


    请注意，未选中的单元格看起来像文本字段，无论其类型如何。例如，您无法从图中看出每个 `Mgr` 单元格是一个选择列表，每个 `Offsite` 单元格是一个单选按钮组。但是，您可以看到
    `Mgr` 单元格显示的是该列的显示值（经理的姓名），而不是返回值（经理的员工编号）。同样，`Offsite` 单元格显示的是该列的显示值（''`No`''），而不是返回值（''`N`''）。了解不同单元格类型的最好方法是亲自尝试它们。


    每列都有一个名为 `Default` 的属性部分，您可以在其中为新记录指定默认值。在 `Employees` 区域中，您应该为 `HIREDATE`、`COMM`
    和 `OFFSITE` 列指定默认值。图 11-12 显示了对 `HIREDATE` 的指定，它只是对 SQL 函数 `current_date` 的调用。这些默认值将出现在插入行中，用户可以在点击
    `Save` 按钮之前修改它们。


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig12_HTML.jpg](img/335103_3_En_11_Fig12_HTML.jpg)

    *图 11-12：指定列的默认值*

    '
- fmt: 'I would like to show you how to make one final improvement to the look and
    feel of the page. Currently, the page contains two grid regions, each with its
    own buttons. The `Edit` and `Add Row` buttons affect only their own grids. However,
    the `Save` buttons are redundant—each one saves the changes from both grids. This
    behavior is somewhat unexpected and could confuse users.

    The solution is to realize that the `Save` buttons do not have special functionality—their
    action is equivalent to a page-wide `Submit operation`. Therefore, it is possible
    to create your own `Save` button and display it anywhere you want on the page.
    My choice was to create a new static content region, titled `Employees by Department`,
    to be the parent of the two interactive grid regions. I then created a button
    in the new region labeled `Save`, set its position to `Edit`, turned on its `Hot`
    property (so that it is displayed in blue), and gave it the action `Submit Page`.
    You should do the same.


    After you verify that the button works, you can hide the `Save` buttons on the
    region toolbars. Go to the rendering subtree for the `Departments` region, click
    the `Attributes` node, and find the `Toolbar` section in the properties editor
    (as was shown in Figure [11-3](#335103_3_En_11_Chapter.xhtml#Fig3)). Uncheck the
    `Save Button` entry. Then repeat the process for the `Employees` region. Figure
    [11-13](#335103_3_En_11_Chapter.xhtml#Fig13) shows the resulting page.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig13_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig13_HTML.jpg)


    Figure 11-13

    The completed Interactive Grids page


    ## Ensuring Consistency

    Chapter [8](#335103_3_En_8_Chapter.xhtml) discussed ways that a page can preserve
    data consistency. One way was to use validations to check for inappropriate item
    values; another was to restrict the values that can get entered. The following
    subsections show how these solutions can be applied to interactive grids.


    ### Grid Validations

    A validation in an interactive grid is an assertion that must be true for each
    row of the grid. You define an interactive grid validation the same as an item-based
    validation; the only difference is that it will apply to every row in the grid
    instead of just one.


    As an example, consider how to create a validation to ensure that the manager
    of an employee is either the president or an employee in the same department.
    To create this validation, go to the `Processing` tab of the page editor, right-click
    the `Validating` node, and select `Create Validation`. Figure [11-14](#335103_3_En_11_Chapter.xhtml#Fig14)
    shows the relevant property values you should specify:


    *   Set the name of the validation to `Mgr in Same Dept`.

    *   Set the editable region to `Employees`.

    *   Set the validation type to `Rows returned`, having the query


    ```

    select * from EMP

    where EmpNo = :MGR

    and (DeptNo = :DEPTNO or Job = ''PRESIDENT'')

    ```


    *   Give an appropriate error message.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig14_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig14_HTML.jpg)


    Figure 11-14

    Properties of a grid validation


    The critical property here is `Editable Region`. By providing a value for this
    property, you are specifying that this is an interactive grid validation and not
    an item-based validation. So when a submit action occurs (such as by clicking
    the `Save` button), APEX will apply the validation to each changed row of the
    grid.

    Given an employee row, the validation query returns the employee’s manager, provided
    that the manager is either the president or in the same department as the employee.
    In other words, if an output record exists, then the row has a proper manager
    and thus satisfies the `Rows returned` validation type. Note that the query references
    the values of the modified row using bound variable syntax; that is, it treats
    the cells of the modified row as if they were items.


    ### Restricting Interactive Grid Input

    One problem with using an interactive grid for update is that you might want a
    cell to be updatable for some operations but not others. For example, consider
    the `EName` column in the `Employees` grid. Suppose that a user should be able
    to enter an employee name during insertion, but should not be able to edit it
    subsequently. How to enforce this restriction?

    The idea is to make use of the column’s `Read Only` properties. In particular,
    you want to specify that the column’s cells should be read-only for all rows except
    update rows. To express this specification, you will need to know the update status
    of each row.


    APEX has a built-in variable named `APEX$ROW_STATUS` for this purpose. It has
    a value for each row of the grid, which can be one of four values:


    *   If the row has been edited, then the status is ‘`U`’.

    *   If the row is an insert row, then the status is ‘`C`’ (for “created”).

    *   If the row is flagged for deletion, then the status is ‘`D`’.

    *   If the row has not been changed, then the status is `null`.


    Figure [11-15](#335103_3_En_11_Chapter.xhtml#Fig15) shows how to use `APEX$ROW_STATUS`
    to specify the `Read Only` SQL expression for the `EName` column. Note also that
    the value of the `Execute` property is `For Each Row`, which tells APEX to apply
    this expression to each row in the grid.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig15_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig15_HTML.jpg)


    Figure 11-15

    Specifying when EName values can be entered


    The preceding example shows how to protect column values. The next example shows
    how to protect row values. Suppose that you want users of this page to not be
    able to delete managers and to not be able to edit or delete the president. The
    idea here is to make use of a grid’s `Allowed Row Operations Column` property.
    This property appears in the `Edit` section of the grid region and is shown in
    Figure [11-16](#335103_3_En_11_Chapter.xhtml#Fig16).


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig16_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig16_HTML.jpg)


    Figure 11-16

    Enabling row-specific updates and deletes


    This property also exists for forms (see, e.g., Figure [10-2](#335103_3_En_10_Chapter.xhtml#Fig2)),
    but until now none of the pages you created needed it. Its purpose is to indicate
    the column of the source query whose values denote allowable row operations, if
    one exists. In such a column, the value ‘`U`’ denotes that the row is update-only,
    ‘`D`’ denotes delete-only, and ‘`UD`’ denotes that both update and delete are
    allowed. Any other value denotes that no operations are allowed on the row. For
    example, here is my revised source query for the Employees region:


    ```

    select EMP.*,

    case Job

    when ''PRESIDENT'' then ''''

    when ''MANAGER'' then ''U''

    else ''UD''

    end as Status

    from EMP

    ```


    The `Status` column values are determined by the employee’s job. The value for
    the president will be the empty string, denoting that it cannot be changed; the
    value for a manager will be ‘U’, denoting that managers can be updated only; and
    the value for all other employees will be ‘UD’, denoting that updates and deletes
    are allowed. Figure [11-17](#335103_3_En_11_Chapter.xhtml#Fig17) shows the revised
    `Source` section for the region.


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig17_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig17_HTML.jpg)


    Figure 11-17

    Adding a row operations column to the grid’s source


    By default, this new source column will be displayed in the grid as a text field.
    This column can be a useful debugging aid. But eventually, you will want to set
    its type to `Hidden`.'
