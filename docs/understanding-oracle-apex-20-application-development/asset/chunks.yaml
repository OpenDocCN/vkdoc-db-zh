    图 13-3 第二个“创建认证”向导屏幕


    每次创建新的认证方案时，APEX 都会使其成为当前方案。如果您想切换到不同的方案，请返回方案列表，单击与方案对应的图标，然后单击 `Make Current
    Scheme` 按钮。如果您想删除一个方案，请确保它不是当前方案，单击其图标，然后单击 `Delete` 按钮。为了体验一下，创建一个 `No Authentication`
    方案并将其设为当前方案。当您运行应用程序时，您将直接进入第一个页面，而无需经过 `Login` 页面。如果您有 Oracle 数据库账户，请创建一个 `Database
    Accounts` 方案，将其设为当前方案，并以这种方式登录。如果您可以访问 LDAP 服务器，可以尝试创建一个 `LDAP Directory` 方案。您需要将必要的配置信息（例如
    LDAP 服务器的主机名和可分辨名称字符串）输入到创建屏幕中。但请注意，LDAP 服务器通常位于防火墙内部。如果 APEX 服务器运行在与 LDAP 服务器不同的域中，您可能会遇到防火墙问题，导致此方案无法使用。


    最后，创建一个 `Custom` 认证方案。当您在图 13-3 中选择方案类型 `Custom` 时，向导将显示名为 `Settings` 和 `Source`
    的附加部分。图 13-4 显示了这些部分，并填写了关键属性。


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig4_HTML.jpg](img/335103_3_En_13_Fig4_HTML.jpg)

    图 13-4 自定义认证方案的属性


    `Settings` 部分允许您指定四个函数，但通常只使用 `Authentication Function Name` 属性。每次尝试登录时都会调用认证函数。其返回值将为
    `true` 或 `false`，指示登录是否应成功。`Settings` 部分只要求提供函数的名称；APEX 期望该函数在其他地方定义。通常，该函数将作为存储过程在数据库中定义，但如果不是，`Source`
    部分提供了一个位置供您输入所需的代码。认证函数必须具有名为 `p_username` 和 `p_password` 的参数。当用户提交 `Login` 页面时，APEX
    会调用认证函数，并将指定的用户名和密码分配给这些参数。图 13-4 中给出的认证函数是最简单的认证函数——它忽略用户名和密码，并始终返回 true。您可以自己尝试一下。创建一个具有
    `alwaysTrue` 认证函数的自定义认证方案，并使其成为当前的认证方案。当您运行应用程序时，`Login` 页面会要求您输入用户名和密码，但会接受您输入的任何内容。


    ### 编写认证函数


    既然您了解了自定义认证的工作原理，是时候实现一个更有用的认证函数了。以下部分讨论了三个重要问题：如何存储用户名和密码信息、如何管理用户账户以及如何对用户进行认证。


    #### 存储用户名/密码信息


    存储用户名/密码信息的标准方法是创建一个表；我们称这个表为 `USERS`。`USERS` 表将有三列：`UserName`、`Password` 和 `IsAdministrator`。这第三列指示用户是否具有管理权限。此外，您应该创建两个“内置”用户：一个用户
    `ADMIN`，他是密码为 `1234` 的管理员；以及一个用户 `GUEST`，他不是管理员且密码为 `null`。这些任务都可以在 SQL 命令工具中执行。代码清单
    13-1 给出了相应的 SQL 语句，应单独执行。


    ```

    create table USERS (UserName varchar2(12), Password varchar2(1000),

    IsAdministrator char(1));

    insert into USERS (UserName, Password, IsAdministrator)

    values (''ADMIN'',

    apex_util.get_hash(apex_t_varchar2(''ADMIN'',''1234''), null),

    ''Y'');

    insert into USERS (UserName, Password, IsAdministrator)

    values (''GUEST'',

    apex_util.get_hash(apex_t_varchar2(''GUEST'',null), null),

    ''N'');

    ```

    代码清单 13-1 USERS 表的 SQL 语句

