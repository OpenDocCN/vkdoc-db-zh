    record, save it to the item `P20_EMPNO`, and\nredirect, thereby causing the two\
    \ processes to execute. Everything works\nwithout any submit operations.\n\nSingle\
    \ Row Update\n\nAnother use for the report mode/single row mode idea is to support\
    \ data\nentry. The `Single Row Update` page illustrates this idea. It is page\
