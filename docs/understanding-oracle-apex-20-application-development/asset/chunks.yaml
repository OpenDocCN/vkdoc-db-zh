  trans: "\n# 向导的最终页面是 `确认员工信息` 页面（见图 9-9），用于显示为新员工选择的值。当所有必要值都已知时，向导将分支到此页面。这个分支可能来自之前三个向导页面中的任何一个。如果新员工不是职员且选中了雇佣日期复选框，`基本信息`\
    \ 页面可以直接分支到确认页面；如果选中了复选框，`经理信息` 页面可以直接分支到确认页面；而 `雇佣日期信息` 页面总是分支到确认页面。\n\n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig9_HTML.jpg](img/335103_3_En_9_Fig9_HTML.jpg)\n\
    \n**图 9-9** 确认员工的信息\n\n`确认员工信息` 页面有标为 `确定` 和 `取消` 的按钮。点击 `取消` 按钮将重定向到 `基本信息` 页面，并清除每个向导页面的会话状态。点击\
    \ `确定` 按钮会将新记录插入 `EMP` 表，清除每个页面的会话状态，并分支到 `基本信息` 页面。现在您已经了解了向导中的控制流，让我们来看看如何实现其各个页面。以下小节将讨论相关问题。\n\
    \n## 实现进度条\n\n向导页面顶部包含彩色圆圈的区域称为进度条。进度条区域只是显示页面编号列表的一种花哨方式。这些向导页面中的每一个进度条都显示相同的列表，即包含页面编号\
    \ [25, 26, 27, 28] 的列表。进度条中的步骤名称是与这些页面编号关联的标签。\n\n要在 `新员工向导` 页面中创建进度条，您首先需要创建它们的公共列表。然后可以在每个页面上创建一个进度条区域。将该列表命名为\
    \ `新员工向导`；要创建它，请使用您在第 4 章学到的技术。该列表将为四个（尚未创建的）向导页面各包含一个条目，如图 9-10 所示。\n\n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig10_HTML.jpg](img/335103_3_En_9_Fig10_HTML.jpg)\n\
    \n**图 9-10** 新员工向导列表的条目\n\n然后创建向导页面。首先创建四个编号为 25–28 的空白页面。然后为每个页面创建一个类型为 `列表`\
    \ 的区域，其源是列表 `新员工向导`。图 9-11 显示了该区域的 `属性` 属性。特别是，要将列表区域显示为进度条，您只需将其 `列表模板` 属性设置为\
    \ `向导进度`。\n\n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig11_HTML.jpg](img/335103_3_En_9_Fig11_HTML.jpg)\n\
    \n**图 9-11** 列表区域属性\n\n将列表区域添加到所有四个页面后，从页面编辑器单独运行每个页面。您应该会观察到，根据页面在列表中的位置，页面显示进度条的方式会有所不同。\n\
    \n### 自定义进度条\n\n您可以通过点击图 9-11 中的 `模板选项` 属性来自定义向导进度条的外观。图 9-12 显示了生成的对话框。`使向导步骤可点击`\
    \ 复选框配置进度条，使其每个圆圈都是一个链接——点击圆圈将分支到与其步骤对应的页面。另一个选项是 `标签显示`，它允许您指定进度条是应显示所有步骤的标签还是仅当前步骤的标签（或不显示标签）。例如，图\
    \ 9-6 到 9-8 中的进度条仅显示当前步骤，而图 9-9 显示了所有步骤。默认情况下，进度条显示所有步骤，如图 9-12 所示。\n\n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig12_HTML.jpg](img/335103_3_En_9_Fig12_HTML.jpg)\n\
    \n**图 9-12** 进度列表的模板选项\n\n## 基本信息页面\n\n`基本信息` 页面有五个项目：`P25_NAME` 是文本字段，`P25_SAL`\
    \ 是数字字段，`P25_JOB` 和 `P25_DEPTNO` 是选择列表。这些选择列表的值列表查询与之前的页面相同：`P25_JOB` 的列表是\n\n\
    ```sql\nselect distinct Job as DisplayVal, Job as ResultVal\nfrom EMP\norder by\
    \ DisplayVal\n```\n\n而 `P25_DEPTNO` 的列表是\n\n```sql\nselect DName, DeptNo\nfrom\
    \ DEPT\norder by DName\n```\n\n项目 `P25_HIRED_TODAY` 是一个复选框组，具有单一静态值 [, `Yes`]。也就是说，显示值是一个空格，返回值是\
    \ `Yes`。回想一下，复选框组是一个多值项目，因此如果选中，其值将为 `Yes`，否则为 `null`。\n\n`继续` 按钮执行提交操作。在此提交过程中，需要发生几件事：\n\
    \n*   如果新员工不是职员，页面需要计算该员工的经理。\n*   如果雇佣日期复选框被选中，页面需要将员工的雇佣日期设置为今天。\n*   页面需要确定它应该分支到其他三个向导页面中的哪一个。\n\
    \n### 计算经理（ComputeManager 进程）\n\n第一个要点要求您编写一个进程来计算非职员的经理。将此进程命名为 `ComputeManager`。其\
    \ PL/SQL 代码如清单 9-2 所示。\n\n```plsql\nbegin\ncase :P25_JOB\nwhen 'PRESIDENT' then\
    \   -- the president has no manager\n    :P26_MGR := null;\nwhen 'MANAGER' then\
    \   -- a manager's manager is the president\n    select EmpNo into :P26_MGR\n\
    \    from EMP\n    where Job = 'PRESIDENT';\nelse   -- the employee's manager\
    \ is the manager of the dept\n    select EmpNo into :P26_MGR\n    from EMP\n \
    \   where DeptNo = :P25_DEPTNO and Job = 'MANAGER';\nend case;\nend;\n```\n\n\
    **清单 9-2** ComputeManager 进程的 PL/SQL 代码\n\n`ComputeManager` 进程根据 `P25_JOB` 的值以三种方式之一计算其值。在每种情况下，它都将计算出的值赋给\
    \ `P26_MGR`，这将是 `经理信息` 页面上的一个项目。换句话说，此进程将值赋给 `经理信息` 页面上的项目，这样用户就不必手动输入。（编写引用尚不存在的项目的代码是可以的；您只是在该物品存在之前无法运行它。）\n\
    \n`ComputeManager` 进程与 `继续` 按钮相关联，并且应仅在新员工不是职员时执行。也就是说，该进程基于以下 SQL 表达式是有条件的：\n\
    \n```sql\n:P25_JOB != 'CLERK'\n```\n\n### 计算雇佣日期（ComputeHiredate 进程）\n\n第二个要点也要求您编写一个进程；称其为\
    \ `ComputeHiredate`。此进程需要计算当前日期并将其赋给项目 `P27_HIREDATE`，该项目将位于 `雇佣日期信息` 页面。其 PL/SQL\
    \ 代码使用 Oracle 的内置函数 `sysdate`，如清单 9-3 所示。\n\n```plsql\nbegin\n:P27_HIREDATE :=\
    \ sysdate;\nend;\n```\n\n**清单 9-3** ComputeHiredate 进程的 PL/SQL 代码\n"
- fmt: '# 分支对象与表单区域


    ## ComputeHiredate进程与分支逻辑


    `ComputeHiredate`进程也与`Continue`按钮关联。它应仅在`P25_HIRED_TODAY`框被选中时执行。也就是说，它依赖于以下SQL表达式的条件：


    ```sql

    :P25_HIRED_TODAY = ''Yes''

    ```


    第三点要求您创建三个分支对象，每个对应一个可能的目标。将这些分支命名为`GoToPage26`、`GoToPage27`和`GoToPage28`。每个分支的目标设定都很直接：目标页面分别是第26、27和28页。每个分支也与`Continue`按钮相关联。唯一的难点在于指定它们各自的条件。


    `GoToPage26`分支应在用户需要选择经理时触发，因此其条件是这个SQL表达式：


    ```sql

    :P25_JOB = ''CLERK''

    ```


    `GoToPage27`分支应在用户不需要选择经理但需要选择雇佣日期时触发；因此，它的条件是这个SQL表达式：


    ```sql

    :P25_JOB <> ''CLERK'' and :P25_HIRED_TODAY is null

    ```


    最后，`GoToPage28`分支应在既不需要选择经理也不需要选择雇佣日期时触发；因此，它的条件是这个SQL表达式：


    ```sql

    :P25_JOB <> ''CLERK'' and :P25_HIRED_TODAY = ''Yes''

    ```


    ## Manager Info页面


    现在考虑`Manager Info`页面，它有一个单独的项目`P26_MGR`。这个项目是一个选择列表，其值表示所有有资格管理文员的员工。假设文员的经理必须在同一个部门且不能是另一个文员，该项目的值列表将由以下查询定义：


    ```sql

    select EName, EmpNo

    from EMP

    where DeptNo = :P25_DEPTNO and Job <> ''CLERK''

    ```


    该页面还有一个操作是提交的`Continue`按钮。此页面不需要计算任何值，因此无需进程。但它需要决定是分支到`Hiredate Info`页面还是确认页面。因此，您需要两个分支对象，称为`GoToPage27`和`GoToPage28`。这些分支都与`Continue`按钮关联。


    `GoToPage27`分支应在`P25_HIREDATE`未被选中时触发；因此，它的条件是这个SQL表达式：


    ```sql

    :P25_HIRED_TODAY is null

    ```


    反之，`GoToPage28`分支应在`P25_HIREDATE`被选中时触发；因此，它的条件是这个SQL表达式：


    ```sql

    :P25_HIRED_TODAY = ''Yes''

    ```


    ## Hiredate Info页面


    现在考虑`Hiredate Info`页面。它有一个名为`P27_HIREDATE`的`Date-Picker`项目用于存放雇佣日期，一个操作是提交的`Continue`按钮，以及一个基于该按钮条件的指向`Confirm
    Employee Info`页面的分支。提交页面会使APEX将所选日期保存在会话状态中并执行分支。


    ## Confirm Employee Info页面


    最后，考虑`Confirm Employee Info`页面。它的六个项目都是`Display Only`类型，其值只是从其他页面的项目中复制而来。例如，考虑员工的姓名，它位于项目`P28_NAME`中。其源类型是`PL/SQL
    Expression`，并具有以下值：


    ```sql

    :P25_NAME

    ```


    项目`P28_SAL`和`P28_JOB`的源表达式类似。`P28_HIREDATE`的源表达式是


    ```sql

    :P27_HIREDATE

    ```


    指定`P28_MGR`和`P28_DEPTNO`的源表达式需要多做一点工作。考虑`P28_MGR`。如果它的源仅仅是`P26_MGR`的值，页面将显示经理的员工编号。然而，回顾图[9-9](#335103_3_En_9_Chapter.xhtml#Fig9)，可以看到页面显示的是经理的姓名，这对用户来说更容易理解。类似地，`P28_DEPTNO`显示部门名称，尽管`P25_DEPTNO`的值是部门编号。


    要使`P28_MGR`显示经理的姓名，请将其源设置为`SQL query (return single value)`，并使用以下查询：


    ```sql

    select EName

    from EMP

    where EmpNo = :P26_MGR

    ```


    类似地，`P28_DEPTNO`的源是这个SQL查询：


    ```sql

    select DName

    from DEPT

    where DeptNo = :P25_DEPTNO

    ```


    ### 按钮与InsertRecord进程


    `Confirm Employee Info`页面有两个按钮。`Cancel`按钮重定向到`Basic Info`页面并清除四个向导页面的缓存。点击该按钮的Target属性会打开链接构建器，您可以在其中指定重定向的详细信息。图[9-13](#335103_3_En_9_Chapter.xhtml#Fig13)显示了我的`Cancel`按钮的链接构建器值。`Clear
    Cache`属性包含应清除其项目值的那些页面的页面编号。


    ![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig13_HTML.jpg](images/335103_3_En_9_Chapter/335103_3_En_9_Fig13_HTML.jpg)

    *图 9-13 取消按钮的链接构建器值*


    `Continue`按钮执行提交操作。该按钮有一个关联的进程，称为`InsertRecord`，它将把新的员工记录插入到`EMP`表中。此进程的代码与第[7](#335103_3_En_7_Chapter.xhtml)章的代码类似，并出现在清单[9-4](#335103_3_En_9_Chapter.xhtml#PC23)中。


    ```plsql

    begin

    insert into EMP (EName, Job, Sal, DeptNo,

    Mgr, HireDate, Comm, Offsite)

    values (:P25_NAME, :P25_JOB, :P25_SAL, :P25_DEPTNO,

    :P26_MGR, :P27_HIREDATE, 0, ''N'');

    end;

    ```

    *清单 9-4 InsertRecord进程的PL/SQL代码*


    回想一下，插入发生后，页面应清除这四个向导页面并重定向到第一个页面。为此，创建一个名为`GoToPage25`的分支对象，它以`OK`按钮为条件。使用链接构建器指定分支的操作，其外观将与图[9-13](#335103_3_En_9_Chapter.xhtml#Fig13)完全相同。


    ## 总结


    本章探讨了分支对象并给出了一些使用示例。分支在提交操作期间执行，在验证和进程之后。分支有两个重要组成部分：其目标和条件。


    分支的目标指定要重定向到的页面（或URL）。您使用链接构建器指定目标，就像为按钮或链接配置重定向一样。因此，分支也可以将会话状态中的项目值赋给页面上的项目，或清除页面上的项目值。


    分支的条件指定分支何时相关。一个页面根据其会话状态可能有几个目标页面。您通过为每个目标页面创建一个分支并为每个分支分配一个条件来处理这种情况。分支条件应该是非重叠的，以便在任何提交操作期间最多只有一个分支能够触发。


    # 10. 表单


    第[7](#335103_3_En_7_Chapter.xhtml)章中的许多进程都涉及某些基本任务，例如根据键检索单条记录的值、查找给定记录的前后记录、更新表中的记录以及修改会话状态。


    APEX有一个区域类型，称为`Form`，它使得无需任何PL/SQL编程即可执行这些任务。表单区域包含两个通用进程——一个在渲染期间执行，一个在处理期间执行——您可以配置它们以满足您的许多需求。


    本章探讨表单区域的使用、其进程以及APEX内置的一些相关进程。它还评估了一些用于创建基于表单的页面的APEX向导。了解如何以及何时使用APEX表单区域和向导，可以免除您为更常见的页面开发任务编写PL/SQL代码的需要。'
