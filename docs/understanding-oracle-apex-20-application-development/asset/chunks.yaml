    \ fact, gives a false sense of security) unless there is a way to\nprohibit item\
    \ modification.\n\nGuarding Against Item Modification\nAPEX has functionality\
    \ called *page access\nprotection* \n, whose sole purpose is to prevent item modification\
    \ attacks.\nThere are several levels of protection. This section will discuss\
    \ only\nthe most general-purpose one: `Arguments Must Have Checksum`. It works\
