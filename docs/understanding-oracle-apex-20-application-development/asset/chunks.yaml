    中止进程的代码需要解释。`raise_application_error`函数使 APEX 中止进程并在页面上显示错误消息。该函数接受两个参数：第一个参数是错误代码，可以是–20,000
    到–20,999 之间的任何数字；第二个参数是错误消息。


    请注意，查询包含`for update`子句。该进程需要锁定指定的 EMP 记录，直到它可以执行`update`语句，以确保在此期间记录无法被修改。


    ## 测试修订后的代码


    您可以像上一节那样测试此代码，从两个私密浏览器窗口运行该页面。在每个窗口中，选择相同的员工并点击`GetInfo`按钮。然后修改每个窗口中的项值，并点击`Update`按钮。第二次更新操作将不起作用；相反，APEX
    将显示如图 7-10 所示的错误消息。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig10_HTML.jpg](img/335103_3_En_7_Fig10_HTML.jpg)


    图 7-10 避免丢失更新时出现的错误消息


    ## 使用哈希函数


    尽管此修订代码有效，但该技术扩展性不佳。需要保存和比较所有原始值很繁琐，并且随着保存值数量的增加会变得更加繁琐。一种更简单的方法是将所有原始值组合成一个值；然后您可以保存并比较该单一值。首选技术是使用`hash
    function`，它将一组值转换为一个单一的固定长度值，称为`checksum`。哈希函数还会混淆其输入，这使其可用于编码用户密码——如第 13 章将看到的。


    APEX 有一个内置的哈希函数，名为`apex_util.get_hash`。该函数的输入是一个包含您想要哈希的值的集合。您应该使用 APEX 内置类型`apex_t_varchar2`来保存此集合。作为一个说明性示例，考虑以下代码：


    ```

    v_vals   apex_t_varchar2 := apex_t_varchar2(''CLERK'', 20);

    v_result varchar2(1000)  := apex_util.get_hash(v_vals);

    ```


    代码的第一行声明了一个类型为`apex_t_varchar2`的变量`v_vals`，并为其分配了由该类型的构造函数函数（也称为`apex_t_varchar2`）创建的集合。构造函数函数的参数是值`''CLERK''`和`20`。代码的第二行声明了一个类型为`varchar2(1000)`的变量`v_result`，并为其分配了`apex_util.get_hash`函数的结果。换句话说，变量`v_result`将包含值[''CLERK'',
    20]的哈希值。

