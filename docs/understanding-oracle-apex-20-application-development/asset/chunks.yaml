  trans: '另一个相关的自动补全属性是 `Search`（搜索），它位于 `Settings`（设置）部分。此属性有如图 5-14 所示的四种可能设置。这些设置涵盖了两个问题：用户输入的文本是否区分大小写，以及用户输入的文本是否可以在建议值的任意位置匹配，还是必须从字符串开头匹配。图中显示了
    `P8_JOB` 的设置，它被配置为不区分大小写，并且仅从开头匹配。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig14_HTML.jpg](img/335103_3_En_5_Fig14_HTML.jpg)


    图 5-14：自动补全项的可能搜索值


    ## 颜色选择器


    项目 `P8_COLOR` 的类型是 `Color Picker`（颜色选择器）。计算机上的颜色通常由其红、绿、蓝分量值表示，每个分量值的范围是 0 到 255。例如，在图
    5-10 中，为 `P8_COLOR` 选择的值具有 (`50`, `53`, `235`) 的 (`red`, `green`, `blue`) 分量值。该颜色主要是蓝色，带有一点绿色和红色。


    这些分量值可以紧凑地表示为一个十六进制数。因为一个两位的十六进制数可以表示 256 个不同的值，所以一个六位数可以表示所有可能的颜色。在图 5-10 中，该颜色由数字
    `#3235EB` 表示。注意，`32` 是 50 的十六进制值，`35` 是 53 的十六进制值，`EB` 是 235 的十六进制值。


    APEX 颜色选择器项允许您在已知颜色值时直接输入。或者，您可以点击滴管图标从颜色轮中选择所需的颜色，APEX 会在输入框中显示相应的数字值。颜色选择器下方的链接是
    *快速选择*，稍后将进行讨论。


    ## 日期选择器


    项目 `P8_HIREDATE` 的类型是 `Date Picker`（日期选择器）。日期选择器项由一个输入框和一个日历图标组成。与所有基于文本的项一样，用户可以自由地将所需日期输入到输入框中。但用户也可以点击图标调出日历，然后浏览日历选择一个日期，这会使日期的文本表示出现在输入框中。


    日期选择器的相关属性出现在其 `Settings`（设置）部分。图 5-15 显示了 `P8_HIREDATE` 的这些值。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig15_HTML.jpg](img/335103_3_En_5_Fig15_HTML.jpg)


    图 5-15：与日期选择器项相关的属性


    `Highlighted Date`（高亮日期）属性指定日历初始选择的日期；默认情况下是当前日期。`Minimum Date`（最小日期）和 `Maximum
    Date`（最大日期）属性值可以通过多种方式指定。在图 5-15 中，值 `-5y` 和 `+5y` 分别指定 5 年前和 5 年后。`Show`（显示）属性允许您配置日历何时显示。日历可以在点击图标时显示（如图
    5-10 所示），在鼠标悬停时显示，或始终在页面上显示。


    `Navigation List for`（导航列表）属性允许您配置日历以便更快地访问日期。默认情况下，日历只有按钮可以导航到上一个月和下一个月。您可以设置该属性，以便还有直接跳转到指定月份、年份或两者的菜单。最后，`Year
    Range`（年份范围）属性是另一种指定最大和最小日期的方法，您可以在其中给出允许的年份范围。例如，输入值 `2018:2025` 将只允许 2018 至
    2025 年之间的日期。


    ## 所有基于文本的项的通用属性


    某些属性是所有基于文本的项所共有的，无论其类型如何。其中三个这样的属性是 `Width`（宽度）和 `Format Mask`（格式掩码）（均在 `Appearance`（外观）部分）以及
    `Maximum Length`（最大长度）（在 `Validation`（验证）部分）。图 5-16 显示了项目 `P8_HIREDATE` 的这两个部分。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig16_HTML.jpg](img/335103_3_En_5_Fig16_HTML.jpg)


    图 5-16：所有基于文本的项的通用属性


    `Format Mask`（格式掩码）属性的工作方式与报表中相同。该属性的值是一个描述项值如何显示的表达式。在图 5-16 中，`Hire Date`（雇佣日期）项的格式掩码为
    `Month DD, YYYY`。


    `Width`（宽度）属性以字符为单位指定输入框的大小。`P8_HIREDATE` 的宽度为 18，因为这足以容纳所有日期。对于图 5-10 中的其他项，`P8_EMPNO`
    和 `P8_SALARY` 的宽度为 6，`P8_JOB` 和 `P8_COLOR` 的宽度为 10。


    `Maximum Length`（最大长度）属性指定用户可以输入到输入框中的最大字符数，而不考虑其宽度。项宽度和最大长度之间的区别如下。用户可以输入一个比输入框宽度更长的值——如果是这样，APEX
    将在框内滚动该值。但如果用户试图输入一个比最大长度更长的值，那么 APEX 将拒绝接受额外的字符。


    例如，在图 5-16 中，`P8_HIREDATE` 的 `Width`（宽度）和 `Maximum Length`（最大长度）值相同，这意味着用户无法输入比输入框大小更长的值。再举一个例子，尝试将
    `P8_EMPNO` 的最大长度设置为 4；您会发现，即使输入框有空间，您也无法输入超过四个数字。


    默认情况下，最大长度为空，表示没有上限。一个好的设计规则是为所有基于文本的项指定一个最大长度。在第 13 章中，您将看到没有最大长度（或不切实际的大长度）的项如何可能导致严重的安全漏洞。


    基于文本的项的另一个通用部分是 `Quick Picks`（快速选择），它使您能够为该项指定常用值。例如，图 5-10 中的 `Favorite Color`（喜爱颜色）项有三个快速选择值，显示为该项下方的链接。其文本框中显示的值是我点击
    `Royal Blue`（宝蓝）链接的结果。


    图 5-17 显示了 `Favorite Color`（喜爱颜色）项的 `Quick Picks`（快速选择）部分。


    启用 `Show Quick Picks`（显示快速选择）属性会显示标签/值文本框。请注意，您需要为每个选择指定两个值：链接中显示的值，以及点击链接时输入到文本框中的值。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig17_HTML.jpg](img/335103_3_En_5_Fig17_HTML.jpg)


    图 5-17：指定项的快速选择'
- fmt: 'Quick picks are useful because they enable users to quickly enter item values.
    In fact, many items in APEX screens contain quick picks. For example, the properties
    `CSS Classes` and `Format Mask` in Figure [5-16](#335103_3_En_5_Chapter.xhtml#Fig16)
    have a context menu to the right of their text box, as does the `Type` property
    in Figure [5-5](#335103_3_En_5_Chapter.xhtml#Fig5). Clicking the context menu
    displays a list of quick-pick values for that item. Sadly, although APEX screens
    have multiple ways to implement quick picks (such as context menus or links),
    applications that you can write using APEX are limited to just one way (namely,
    as links beneath the item).

    Items having quick picks are similar in spirit to autocomplete items. Both enable
    a user to eliminate (or reduce) typing by choosing from suggested values. The
    difference is that the autocompletion menu gets filtered as the user types, whereas
    quick picks are presented to the user all at once. Consequently, an item can have
    arbitrarily many autocompletion values, whereas APEX limits an item to ten quick
    picks.


    ## List-Based Items

    Unlike a text-based item, a list-based item does not have an input box. Instead,
    a list-based item presents the user with a list of possibilities to choose from.
    Moreover, the value that a user chooses is not necessarily the value assigned
    to the item. That is, the item presents a list of display values to the user;
    when the user selects a display value, a corresponding return value is assigned
    to the item.


    For example, consider the three subregions of `Single-Value List Items` in Figure
    [5-2](#335103_3_En_5_Chapter.xhtml#Fig2), which are reprinted in Figure [5-18](#335103_3_En_5_Chapter.xhtml#Fig18).
    Each region is devoted to one of the three common list-based item types—radio
    groups, select lists, and pop-up lists—and contains three items of that type.
    Although you cannot tell from the figure, all nine of these items have the same
    set of possible return values, namely, the set {10, 20, 30, 40} of department
    numbers. Moreover, the selections shown in the figure are such that every item
    has the same value, namely, 30.


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig18_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig18_HTML.jpg)

    **Figure 5-18** Single-value list items


    These nine items have identical functionality: a user selects a department, and
    the corresponding department number is assigned to the item. The items differ
    only in what their display values are and how they present those values to the
    user.

    Consider first the radio groups. In a radio group, all the display values appear
    on the page, and the user selects a desired value by clicking it. Each radio group
    in the `Radio Groups` region has different display values: the first group displays
    the list of department names, the second displays the list of department numbers,
    and the third displays each department name with the count of its employees in
    parentheses.

    Now consider the select lists. When a user clicks a select list, a menu of display
    values appears. The display values in the first select list are identical to those
    of the first radio group, and similarly for the other two select lists.

    Finally, consider the pop-up lists. When a user clicks the arrow to the right
    of the item, a menu of display values appears for the user to pick from. The display
    values of the three pop-up lists are the same as the corresponding display values
    of the other two regions.

    A pop-up list differs from a select list in that it also has a search box. The
    user can type a prefix of the desired value into the search box and click the
    magnifying glass; the displayed list of values will be filtered to include only
    the values having that prefix. Pop-up lists make it possible to select from a
    lengthy value list without a lot of scrolling.

    The `Settings` section of a radio group item has the property `Number of Columns`.
    This property specifies the placement of the radio buttons on the page. In Figure
    [5-18](#335103_3_En_5_Chapter.xhtml#Fig18), you can see that the first radio group
    has two columns, the second group has four columns, and the third group has one
    column.

    The most important issue for a list-based item is how to specify its display values
    and return values. You can specify these values dynamically, via an SQL query,
    or statically, via explicit values. All nine items in Figure [5-18](#335103_3_En_5_Chapter.xhtml#Fig18)
    are specified dynamically, so I shall begin the discussion there.


    ## Dynamic List–Based Items

    An SQL query to specify the correspondence between display values and return values
    will have two columns: the first column gives the display values, and the second
    column gives the return values. The names of these columns are not important.


    For an example, consider the radio group item `P8_RADIO_NAME`. Its query should
    have department names in its first column and department numbers in its second
    column. Moreover, the items `P8_SELECT_NAME` and `P8_POPUP_NAME` will also have
    these same display and return values. Thus, the values for all three items can
    be specified by the following query:


    ```

    select DName, DeptNo

    from DEPT

    order by DName

    ```


    This query is specified in the item’s `List of Values` section. This is the same
    section as in Figure [5-12](#335103_3_En_5_Chapter.xhtml#Fig12), which specified
    the value list for autocomplete text items; the only difference is that list-based
    items require a two-column query.

    You are now ready to configure the items `P8_RADIO_NAME`, `P8_SELECT_NAME`, and
    `P8_POPUP_NAME`. Set their `Type` property to `Radio Group`, `Select List`, and
    `Popup List`, respectively, and set their `List of Values` properties to the preceding
    SQL query. You should also set the `Number of Columns` property for `P8_RADIO_NAME`
    to `2`.'
