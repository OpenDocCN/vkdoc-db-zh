- fmt: 'Third, change the `When Button Pressed` property in the process’s `Server-side
    Condition` section, as shown in Figure [7-6](#335103_3_En_7_Chapter.xhtml#Fig6).
    Doing so specifies that the process will execute only when the `Delete` button
    is pressed. Otherwise, the process would execute each time a submit action occurs,
    regardless of how the submit occurred. This would be a problem for the `Employee
    Data Entry` page because it has four buttons, all doing a submit. You want the
    `DeleteEmp` process to execute only when the `Delete` button is pressed, which
    is the purpose of the `When Button Pressed` property.


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig6_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig6_HTML.jpg)

    Figure 7-6: Setting the When Button Pressed property


    ## Insert Employee Region


    The `Insert Employee` region contains five items and a button. The items correspond
    to columns of the `EMP` table and have the names `P17_INSERT_ENAME`, `P17_INSERT_JOB`,
    and so on. Item `P17_INSERT_ENAME` is a text field and `P17_INSERT_SAL` is a number
    field. The other three items are select lists, whose values are defined via the
    following list-of-values queries.


    The values of `P17_INSERT_JOB` are defined by the query:

    ```sql

    select distinct Job as DisplayVal, Job as ResultVal

    from EMP

    ```


    The values of `P17_INSERT_MGR` are defined by the query:

    ```sql

    select EName, EmpNo

    from EMP

    where Job = ''MANAGER''

    ```


    The values of `P17_INSERT_DEPTNO` are defined by the query:

    ```sql

    select DName, DeptNo

    from DEPT

    ```


    The button is named `Insert`, and its action is `Submit`. A user enters values
    for the items and clicks the `Insert` button. The process associated with the
    button will then insert a new record into the `EMP` table, using the specified
    item values for five of the columns and computing the following values for the
    other four columns:

    *   `EmpNo` automatically gets the next value in the sequence determined by `EMP`''s
    built-in insertion trigger.

    *   `HireDate` gets the current date.

    *   `Comm` gets `0`.

    *   `Offsite` gets `''N''`.


    The steps to create this process are the same as for the `DeleteEmp` process.
    Call the process `InsertEmp`. Its `When Button Pressed` property should have the
    value `Insert`. Its PL/SQL code consists of the single SQL command shown in Listing
    [7-2](#335103_3_En_7_Chapter.xhtml#PC7).

    ```sql

    begin

    insert into EMP (EName, Job, Mgr, Sal, DeptNo,

    HireDate, Comm, Offsite)

    values (:P17_INSERT_ENAME,

    :P17_INSERT_JOB,

    :P17_INSERT_MGR,

    :P17_INSERT_SAL,

    :P17_INSERT_DEPTNO,

    current_date,  0,  ''N'');

    end;

    ```

    *Listing 7-2: PL/SQL Code for the InsertEmp Process*


    At this point, you might want to test your page as it stands. Insert a record
    and make sure it appears correctly in the report. Then delete it, and watch the
    report return to its original state.


    ## Update Employee Region


    The `Update Employee` region has four items and two buttons. The items are named
    `P17_UPDATE_EMPNO`, `P17_UPDATE_JOB`, and so on. The select list values are defined
    the same as in the other regions. The buttons are named `GetInfo` and `Update`,
    and both have the action `Submit`.


    Two steps are required to use this region. First, a user selects the desired employee
    from `P17_UPDATE_EMPNO` and clicks the `GetInfo` button. The process associated
    with this button populates the items `P17_UPDATE_JOB`, `P17_UPDATE_SAL`, and `P17_UPDATE_DEPTNO`
    with the corresponding values from that employee''s `EMP` record. The user then
    changes those items as desired. When the user clicks the `Update` button, the
    process associated with that button updates the record with the new values.


    Each button will have its own process. The process for the `Update` button is
    called `UpdateEmp`. Its PL/SQL code is as shown in Listing [7-3](#335103_3_En_7_Chapter.xhtml#PC8),
    and its `When Button Pressed` property has the value `Update`.

    ```sql

    begin

    update EMP

    set Job    =  :P17_UPDATE_JOB,

    Sal    =  :P17_UPDATE_SAL,

    DeptNo =  :P17_UPDATE_DEPTNO

    where EmpNo  =  :P17_UPDATE_EMPNO;

    end;

    ```

    *Listing 7-3: PL/SQL Code for the UpdateEmp Process*


    The process for the `GetInfo` button is named `GetEmpInfo`. It differs from the
    other processes on the page in that it reads from the database instead of writing
    to it. The technique is to write an SQL query that places its output directly
    into items on the page. The PL/SQL code in Listing [7-4](#335103_3_En_7_Chapter.xhtml#PC9)
    does just that.

    ```sql

    begin

    select Job, Sal, DeptNo

    into :P17_UPDATE_JOB, :P17_UPDATE_SAL, :P17_UPDATE_DEPTNO

    from EMP

    where EmpNo = :P17_UPDATE_EMPNO;

    end;

    ```

    *Listing 7-4: PL/SQL Code for the GetEmpInfo Process*


    The critical part of the query is the clause beginning with the keyword `into`.
    This clause indicates that the query''s three output values will be placed into
    the three specified items. In other words, the `into` clause turns an SQL query
    into a PL/SQL statement that extracts values from the database and assigns them
    to items. Note that the `into` clause makes sense only if the SQL query returns
    exactly one row. A process that executes a multi-row SQL query needs to do something
    totally different with the query output, as you will see later in the next section.


    ## PL/SQL to Compute Values


    This section considers the programming-language aspects of PL/SQL. At its heart,
    PL/SQL is a traditional programming language with variables, assignment statements,
    conditionals, and loops. In this regard, it is not much different from C, Java,
    Python, and similar languages. If you have experience with any of these languages,
    then the most difficult part of writing PL/SQL code will probably be figuring
    out the appropriate syntax.


    As an example, let''s build the `Sales Commission` page shown in Figure [7-7](#335103_3_En_7_Chapter.xhtml#Fig7),
    which will be page 18 of the `Employee Demo` application.


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig7_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig7_HTML.jpg)

    Figure 7-7: Page to calculate sales commissions


    This page will get used each time a salesman makes a sale. Assume that salesmen
    receive 15 percent commission on the first $100 of a sale and 10 percent on the
    remaining amount; if several salesmen collaborate on a sale, they split the commission
    equally. The page has two outer regions. The top region, titled `Solo Commission`,
    is for entering an individual sale. The bottom region, titled `Shared Commission`,
    is for entering a collaborative sale.


    The `Solo Commission` region works as follows. A user selects the salesman''s
    name and enters the amount of the sale into the `Enter Sale` region. Clicking
    the `Submit` button submits the page and causes a process to execute. This process
    does several things: It calculates the commission based on the sale amount, retrieves
    the salesman''s previous commission from the `EMP` table, calculates the new commission
    amount by summing the two values, and places those three values into the three
    corresponding items of the `Commission Info` region. It also updates the `EMP`
    table with the new commission value.


    The `Shared Commission` region works similarly, except that several salesmen can
    be chosen from the select list. Its process calculates the total commission on
    the sale and the prorated amount, updates the `EMP` table, and writes the new
    commissions of the collaborating salesmen into the text area.


    This section considers the implementation of the `Solo Commission` region. (The
    `Shared Commission` region will be examined in the section “Handling Multi-Row
    SQL Queries”.) The two items in the `Enter Sale Info` region are named `P18_SOLO_SALESMAN`
    and `P18_SOLO_AMOUNT`. Item `P18_SOLO_AMOUNT` is a number field, and `P18_SOLO_SALESMAN`
    is a select list with values defined by the following SQL query:

    ```sql

    select EName, EmpNo

    from EMP

    where Job = ''SALESMAN''

    ```'
