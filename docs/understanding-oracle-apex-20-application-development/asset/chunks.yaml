    ## 发送电子邮件


    回顾第 7 章，`Revised Employee Data Entry` 页面有一个名为 `SendSuspiciousEmail` 的过程，其作用是在发生可疑的数据库删除和更新时发送电子邮件。该过程的代码出现在代码清单
    7-14 中。它是用 PL/SQL 编写的，并利用了 `apex_mail.send` 库函数。

    APEX 提供了 `Send E-Mail` 过程类型，使您无需编写 PL/SQL 代码即可发送电子邮件。本节将展示如何使用此过程实现与代码清单 7-14
    相同的功能。


    为页面 30 创建一个新过程。将其命名为 `SendSuspiciousEmail`，类型设置为 `Send E-Mail`。在属性编辑器中，找到 `Settings`
    部分。您需要为属性 `From`、`To`、`Subject` 和 `Body Plain Text` 指定值。图 10-21 展示了我如何输入这些值。（如果您想测试该过程，请务必使用您自己的电子邮件地址作为收件人。）

    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig21_HTML.jpg](img/335103_3_En_10_Fig21_HTML.jpg)

    图 10-21 Send E-Mail 过程的属性


    正文文本利用了 `APP_USER` 变量和项 `P30_EMPNO` 来标识用户和受影响的员工编号。此行为与代码清单 7-14 中的相同，除了一点——邮件正文没有指明操作是删除还是更新。代码清单
    7-14 通过 PL/SQL 代码内的 if 语句实现了此功能。当您使用 `Send E-Mail` 类型的过程时，如何实现相同的功能呢？


    技巧是首先创建一个隐藏项来保存您需要计算的值，然后为其创建一个计算。例如，我的隐藏项名为 `P30_EMAIL_OP`。图 10-22 展示了其计算的相关属性。然后，我将
    `SendSuspiciousEmail` 过程中的 `Body Plain Text` 属性的值更改为以下表达式：

    ```

    &APP_USER. &P30_EMAIL_OP. employee &P30_EMPNO.''s record.

    ```

    例如，由此表达式可能生成的电子邮件消息可能是

    ```

    boris@secret.org deleted employee 7839''s record.

    ```

    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig22_HTML.jpg](img/335103_3_En_10_Fig22_HTML.jpg)

    图 10-22 用于识别请求的计算


    最后，您需要指定 `SendSuspiciousEmail` 过程何时执行。其服务器端条件应指定何谓对数据库的“可疑”更改。我选择使用与图 7-16 所示的相同条件。此外，必须选择该过程的序列号，使其在数据库操作之后执行，但在
    `ClearEmpNo` 过程从 `P30_EMPNO` 中清除已删除的员工编号之前执行。


    ## 包含表单的报表页面


    APEX 的 `Form` 区域自动为您生成项，并提供了两个强大的内置过程，这比您必须编写可比的项和 PL/SQL 过程节省时间。然而，您仍然需要创建和配置额外的按钮和项。为了进一步简化您的工作，APEX
    提供了用于创建预制表单页面的向导。您将信息输入向导，它会创建必要的区域、项、按钮和过程。如果您需要这些向导生成的内容，它们可以成为有效的捷径。


    这些向导的列表可以从图 2-9 的初始 `Create Page` 屏幕开始找到。不要点击通常的 `Blank Page` 图标，而是选择 `Form` 图标。APEX
    将显示如图 10-23 所示的屏幕，其中包含与表单相关的向导图标。`Report with Form` 向导是一个很好的说明性示例，所以我们从它开始。

    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig23_HTML.jpg](img/335103_3_En_10_Fig23_HTML.jpg)

    图 10-23 用于创建表单页面的 APEX 向导


    一个 `Report with Form` 页面实际上是两个页面——一个报表页面和一个表单页面。它的工作方式类似于图 7-24 中的 `Single Row
    Update` 页面，但报表和表单位于两个单独的页面上，而不是位于同一页面的不同区域中。'
- fmt: '# 使用报表与表单向导


    ## 向导界面


    点击图 [10-23](#335103_3_En_10_Chapter.xhtml#Fig23) 中的 `Next` 按钮，将显示第一个 `Report with
    Form` 向导屏幕，如图 [10-24](#335103_3_En_10_Chapter.xhtml#Fig24) 所示。`Report Type` 属性要求您指定报表应为交互式报表、交互式网格（将在第
    [11](#335103_3_En_11_Chapter.xhtml) 章讨论）还是经典报表；我选择了 `Classic Report`。


    接下来的四个属性要求您提供报表页面和表单页面的页码和名称。在我的应用程序中，报表在第 31 页，表单在第 32 页。最后，您需要指定表单页面是正常显示还是作为模态对话框显示。（模态页面在第
    [2](#335103_3_En_2_Chapter.xhtml) 章末尾讨论过；参见图 [2-15](#335103_3_En_2_Chapter.xhtml#Fig15)。）我在图中选择了
    `Normal`，但 `Modal Dialog` 也很有趣且值得尝试。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig24_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig24_HTML.jpg)


    **图 10-24 创建包含表单页面的报表**


    点击 `Next` 按钮将带您进入第二个向导屏幕，如图 [10-25](#335103_3_En_10_Chapter.xhtml#Fig25) 所示。此屏幕要求您提供一个同时用于报表和表单的数据源。如果您打算使用表单进行插入，那么源将需要包含整个表，如图所示。在这种情况下，向导屏幕还允许您指定要在报表中显示的列。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig25_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig25_HTML.jpg)


    **图 10-25 输入报表和表单的源查询**


    第三个屏幕（未显示）是您指定报表页面的导航菜单项的地方。请注意，表单页面没有菜单项，因为它应该只能通过其报表页面访问。


    第四个屏幕，如图 [10-26](#335103_3_En_10_Chapter.xhtml#Fig26) 所示，允许您指定要在表单中显示的源列。它还强制您指定主键列。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig26_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig26_HTML.jpg)


    **图 10-26 指定主键列**


    当您最终点击 `Create` 按钮时，APEX 将创建两个功能齐全的页面。图 [10-27](#335103_3_En_10_Chapter.xhtml#Fig27)
    显示了运行报表页面的结果。（我截掉了底部以节省空间。）


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig27_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig27_HTML.jpg)


    **图 10-27 报表与表单的报表页面**


    有两种方式可以从报表页面转到表单页面。点击 `CREATE` 按钮会以插入模式打开表单页面，如图 [10-28](#335103_3_En_10_Chapter.xhtml#Fig28)
    所示。或者，点击行开头的链接会以更新/删除模式打开表单页面，并填充所选员工的值。图 [10-29](#335103_3_En_10_Chapter.xhtml#Fig29)
    显示了点击 `WARD` 的链接后的表单页面。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig29_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig29_HTML.jpg)


    **图 10-29 处于更新/删除模式的表单页面**


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig28_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig28_HTML.jpg)


    **图 10-28 处于插入模式的表单页面**


    请注意，表单页面上的按钮根据其模式而不同。在插入模式下，页面显示一个 `Create` 按钮，它向 `EMP` 表插入一条新记录。在更新/删除模式下，`Delete`
    按钮删除所选记录，`Apply Changes` 按钮更新它。所有三个按钮在更改表后都会返回到报表页面。`Cancel` 按钮在两种模式下都通用；它只是不改变表而直接返回到报表页面。


    以下小节探讨了向导是如何实现这些页面的。


    ## 报表页面


    报表页面（图 [10-27](#335103_3_En_10_Chapter.xhtml#Fig27)）有一个区域，我选择将其设置为经典报表。它的实现完全
    straightforward。唯一有趣的特性是 `EMPNO` 列，其类型为 `Link`（如第 [3](#335103_3_En_3_Chapter.xhtml)
    章所述）。图 [10-30](#335103_3_En_10_Chapter.xhtml#Fig30) 显示了它的 `Link Builder` 屏幕。它指定链接将重定向到第
    32 页（表单页面），并将 `P32_EMPNO` 项设置为所选行的员工编号。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig30_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig30_HTML.jpg)


    **图 10-30 EMPNO 列的 Link Builder 屏幕**


    `Create` 按钮的操作是重定向到表单页面并清除其会话状态，如图 [10-31](#335103_3_En_10_Chapter.xhtml#Fig31)
    的 `Link Builder` 屏幕所示。比较这两张图。它们都重定向到表单页面；它们的区别在于，行链接为 `P32_EMPNO` 分配一个值，而 `Create`
    按钮则清除 `P32_EMPNO`（以及页面上所有其他项）的值。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig31_HTML.png](images/335103_3_En_10_Chapter/335103_3_En_10_Fig31_HTML.png)


    **图 10-31 Create 按钮的 Link Builder 屏幕。**


    `P32_EMPNO` 的值因此决定了表单页面是处于插入模式还是更新/删除模式。在插入模式下，页面项的值都将为 `null`，因为 `Create` 按钮清除了它们。在删除模式下，页面项的值都将有一个值，这是由初始化过程的操作决定的。


    `Create` 按钮被渲染为蓝色，以表明它是一个“热”按钮。相关属性名为 `Hot`，位于按钮的 `Appearance` 部分，如图 [5-29](#335103_3_En_5_Chapter.xhtml#Fig29)
    所示。


    ## 表单页面


    表单页面（图 [10-28](#335103_3_En_10_Chapter.xhtml#Fig28) 和 [10-29](#335103_3_En_10_Chapter.xhtml#Fig29)）有一个区域，类型为
    `Form`。图 [10-32](#335103_3_En_10_Chapter.xhtml#Fig32) 显示了它的渲染树。与所有表单区域一样，它有一个初始化过程，以及每个源值对应的项。（为了节省空间，图中未显示这些项。）与标准表单区域的主要区别在于它还有四个按钮。`CANCEL`
    按钮重定向到报表页面。另外三个按钮被配置为具有 `Database Action` 值，分别为 `SQL INSERT action`、`SQL DELETE
    action` 和 `SQL UPDATE action`。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig32_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig32_HTML.jpg)


    **图 10-32 表单页面的渲染树**


    回顾一下，`DELETE` 和 `SAVE` 按钮仅在页面处于更新/删除模式时才呈现，而 `CREATE` 按钮仅在插入模式下才呈现。表单使用 `P32_EMPNO`
    的值来决定条件渲染。如果它是 `null`，则渲染 `CREATE`；否则，渲染 `DELETE` 和 `SAVE`。


    表单页面还包含一个分支，在提交处理完成后重定向到报表页面。


    `CREATE` 和 `SAVE` 按钮的操作是 `Submit Page`。有趣的是，`DELETE` 按钮的操作是 `Redirect to URL`，其中
    URL 是：


    ```

    javascript:apex.confirm(htmldb_delete_message,''DELETE'');

    ```'
  raw: 'Clicking the `Next` button in Figure

    [10-23](#335103_3_En_10_Chapter.xhtml#Fig23) displays the

    first `Report with Form` wizard screen, shown in Figure [10-24](#335103_3_En_10_Chapter.xhtml#Fig24).
    The `Report Type`

    property   asks you to specify

    whether the report should be an interactive report, an interactive grid

    (to be discussed in Chapter [11](#335103_3_En_11_Chapter.xhtml)), or a classic
    report; I chose

    `Classic Report`.

    The next four properties ask you to provide a page number and name for

    the report and form pages. In my application, the report is on page 31

    and the form is on page 32\. Finally, you are asked to specify whether

    the form page should display normally or as a modal dialog box. (Modal

    pages were discussed at the end of Chapter [2](#335103_3_En_2_Chapter.xhtml);
    see Figure [2-15](#335103_3_En_2_Chapter.xhtml#Fig15).) I chose `Normal` in the
    figure,

    but `Modal Dialog` is also interesting and worthwhile.


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig24_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig24_HTML.jpg)


    Figure 10-24

    Creating report with form pages


    Clicking the `Next` button  brings you to the

    second wizard screen, shown in Figure [10-25](#335103_3_En_10_Chapter.xhtml#Fig25).
    This screen

    asks you to supply a data source to be used for both the report and the

    form. If you are planning to use the form for insertion then the source

    will need to contain the entire table, as shown in the figure. In this

    case, the wizard screen also lets you specify the columns that you want

    displayed in the report.


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig25_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig25_HTML.jpg)


    Figure 10-25

    Entering the source query for the report and form


    The third screen (not shown) is where you specify the navigation menu

    entry for the report page. Note that the form page does not get a menu

    entry because it should only be accessed via its report page.


    The fourth screen, shown in Figure [10-26](#335103_3_En_10_Chapter.xhtml#Fig26),
    lets you

    specify the source columns you want displayed in the form. It also

    forces you to specify the primary key column.


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig26_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig26_HTML.jpg)


    Figure 10-26

    Specifying the primary key column


    When at last you click the `Create` button, APEX

    will create two fully functional pages. Figure [10-27](#335103_3_En_10_Chapter.xhtml#Fig27)
    shows the

    result of running the report page. (I chopped off the bottom to save

    space.)


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig27_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig27_HTML.jpg)


    Figure 10-27

    The Report with Form report page


    There are two ways to get from the report page to the form page.

    Clicking the `CREATE` button brings

    up the form page in insert mode, as shown in Figure [10-28](#335103_3_En_10_Chapter.xhtml#Fig28).

    Alternatively, clicking the link at the beginning of a row brings up the

    form page in update/delete mode, populated with the values for the

    selected employee. Figure [10-29](#335103_3_En_10_Chapter.xhtml#Fig29) shows the

    form page after clicking the link for `WARD`.


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig29_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig29_HTML.jpg)


    Figure 10-29

    The form page in update/delete mode


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig28_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig28_HTML.jpg)


    Figure 10-28

    The form page in insert mode


    Note that the buttons on the form page differ according to its mode.

    In insert mode, the page displays a `Create` button, which

    inserts a new record into the `EMP` table. In

    update/delete mode, the `Delete` button deletes

    the selected record and the `Apply Changes` button

    updates it. All three buttons return to the report page after changing

    the table. The `Cancel` button is

    common to both modes; it simply returns to the report page without

    changing the table.

    The following subsections investigate how the wizard implemented

    these pages.


    The Report Page


    The report page

    (Figure [10-27](#335103_3_En_10_Chapter.xhtml#Fig27)) has one

    region, which I chose to be a classic report. Its implementation is

    completely straightforward. The only interesting feature is the `EMPNO` column,
    which

    has the type `Link` (as described in

    Chapter [3](#335103_3_En_3_Chapter.xhtml)). Figure [10-30](#335103_3_En_10_Chapter.xhtml#Fig30)
    shows its

    `Link Builder`

    screen. It specifies that the link will redirect to page 32 (the form

    page) and will set the item `P32_EMPNO` to the

    employee number of the selected row.


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig30_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig30_HTML.jpg)


    Figure 10-30

    The Link Builder screen for the EMPNO column


    The action of the `Create` button is to

    redirect to the form page and clear its session state, as shown by the

    `Link Builder`

    screen of Figure [10-31](#335103_3_En_10_Chapter.xhtml#Fig31). Compare

    these two figures. They both redirect to the form page; their difference

    is that a row link assigns a value to `P32_EMPNO`, whereas

    the `Create`

    button clears the value of `P32_EMPNO` (as well as

    all other items on the page).


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig31_HTML.png](images/335103_3_En_10_Chapter/335103_3_En_10_Fig31_HTML.png)


    Figure 10-31

    The Link Builder screen for the Create button.


    The value of `P32_EMPNO` therefore

    determines whether the form page is in insert mode or update/delete

    mode. In insert mode, the values of the page items will all be `null` because
    the

    `Create` button

    cleared them. In delete mode, the values of the page items will all have

    a value, due to the action of the initialization process.

    The `Create`

    button is rendered in blue to indicate that it is a “hot” button. The

    relevant property is named `Hot` and is in the

    button’s `Appearance` section,

    as shown in Figure [5-29](#335103_3_En_5_Chapter.xhtml#Fig29).


    The Form Page


    The form page (Figures [10-28](#335103_3_En_10_Chapter.xhtml#Fig28) and [10-29](#335103_3_En_10_Chapter.xhtml#Fig29)) has
    a

    single region, of type `Form`. Figure [10-32](#335103_3_En_10_Chapter.xhtml#Fig32)
    shows its

    rendering tree. As with all form regions, it has an initialization

    process, as well as an item for each source value. (Those items are not

    shown in the figure to save space.) The main difference from a standard

    form region is that it also has four buttons. The `CANCEL` button

    redirects to the report page. The other three buttons are configured to

    have a `Database Action` value of `SQL INSERT action`,

    `SQL DELETE action`, and `SQL UPDATE action`.


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig32_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig32_HTML.jpg)


    Figure 10-32

    The rendering tree for the form page


    Recall that the `DELETE` and `SAVE` buttons are

    rendered only when the page is in update/delete mode and the `CREATE` button is

    rendered only in insert mode. The form uses the value of `P32_EMPNO` to

    determine the conditional rendering. If it is `null`, then `CREATE` is rendered;

    otherwise, `DELETE` and `SAVE` are rendered.

    The form page also contains a branch that redirects to the report page

    after the submit processing has finished.


    The action of the `CREATE` and `SAVE` buttons is `Submit Page`.

    Interestingly, the action of the `DELETE` button is

    `Redirect to URL`, where the URL is


    ```

    javascript:apex.confirm(htmldb_delete_message,''DELETE'');

    ```'
