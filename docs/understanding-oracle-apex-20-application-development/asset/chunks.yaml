    \nFigure 13-23\nThe Update Employees region\n\n```\nf?p=91392:30:98765::::P30_EMPNO:7698\n\
    ```\n\nThis URL redirects to page 30, setting the session state value for\nthe\
    \ select list to 7698, the employee number for BLAKE. Once\nI understand this,\
    \ I can modify this URL to retrieve the information for\nany employee. For example,\
    \ if I enter the same URL into my browser,\nchanging the last four characters\
