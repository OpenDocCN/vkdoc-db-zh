    \ SQL expression:\n\n```\n:P21_MODE = ‘Report’ or :P21_MODE is null\n```\n\nImplementing\
    \ the Insert Region\n\nA new `EMP`\nrecord has nine values, but only five need\
    \ be specified by the user. The `Insert Employee`\nregion has an item for each\
    \ of these five values. The items are named\n`P21_INSERT_ENAME`,\n`P21_INSERT_JOB`,\n\
    and so on. The region also has two buttons, named `Create` and `CancelInsert`.\
