  trans: '

    将值更改为`Page is Public`并保存页面。要测试更改，请注销应用程序。你会发现 APEX 允许你访问应用程序的主页，但如果你尝试访问任何其他页面，系统将要求你登录。


    ## 授权


    认证方案规定了哪些用户被允许访问应用程序的非公开页面。这是一个良好的开端，但往往还不够。一个 Web 应用程序可以有多种类型的用户，而某些页面（或页面的部分内容）只适合特定类型的用户。因此，你需要一种方法来指定哪些用户可以访问什么信息。安全的这一方面被称为`授权`。


    APEX 通过允许每个页面或页面组件关联一个`授权方案`来实现授权，该方案指定了一组允许的用户。如果一个页面（或组件）有关联的授权方案，那么它将只对方案指定的用户可见。


    ## 创建授权方案


    回想一下，内置变量`APP_USER`保存着当前用户的用户名。一个 APEX 授权方案由一个布尔表达式定义，通常涉及`APP_USER`的值；当表达式返回`true`时，用户即被授权。


    授权表达式与验证表达式类似，它们的类型也相似。例如，`Exists SQL Query`类型在查询输出至少包含一条记录时返回`true`。`PL/SQL function
    returning Boolean`类型是明确返回`true`或`false`的 PL/SQL 代码。


    举个例子，让我们为`Employee Demo`应用程序创建三个授权方案：


    *   `Administrators`，如果当前用户拥有管理权限则返回`true`。

    *   `Guests`，如果当前用户名为`GUEST`则返回`true`。

    *   `Built-in Users`，如果当前用户名为`GUEST`或`ADMIN`则返回`true`。


    `Administrators`方案可以通过以下`Exists SQL`查询定义：


    ```sql

    select *

    from USERS

    where UserName = :APP_USER and IsAdministrator = ''Y''

    ```


    `Guests`方案可以通过以下 PL/SQL 函数定义：


    ```sql

    return :APP_USER = ''GUEST'';

    ```


    `Built-in Users`方案可以通过以下 PL/SQL 函数定义：


    ```sql

    return :APP_USER = ''GUEST'' or :APP_USER = ''ADMIN'';

    ```


    要创建一个授权方案，请转到应用程序的主页，点击`Shared Components`按钮，然后从`Security`部分选择`Authorization Schemes`。你将进入一个列出了为你的应用程序创建的授权方案的屏幕；我的初始屏幕如图
    13-7 所示。我的 APEX 服务器会自动为我创建的每个应用程序创建`Administration Rights`方案。我的`Employee Demo`应用程序不需要它，所以我选择删除它。如果你的应用程序也有一个，请随意删除你的。


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig7_HTML.jpg](img/335103_3_En_13_Fig7_HTML.jpg)


    *图 13-7 初始的授权方案屏幕*


    点击`Create`按钮会打开授权方案向导的第一个屏幕，如图 13-8 所示。指定你想“从头开始”创建方案。点击`Next`按钮将打开向导的第二页。在此屏幕上，给方案命名，选择其类型，并在适当的框中输入规范；图
    13-9 展示了`Administrators`方案的这些规范。


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig9_HTML.jpg](img/335103_3_En_13_Fig9_HTML.jpg)


    *图 13-9 创建授权向导的第二个屏幕*


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig8_HTML.jpg](img/335103_3_En_13_Fig8_HTML.jpg)


    *图 13-8 创建授权向导的第一个屏幕*


    向导的第二个屏幕还要求你提供一条错误消息（例如`Administrator access only`）并指定授权方案应多久验证一次。两个常见的选择是`Once
    per session`和`Once per page view`。每个会话评估一次方案效率要高得多，并且是默认设置。只有当授权条件可能在会话期间发生变化时，你才会选择每次页面视图评估一次。


    例如，考虑由以下 PL/SQL 函数定义的授权方案：


    ```sql

    return :APP_USER = ''ADMIN''

    and extract(hour from current_timestamp) >= 9

    and extract(hour from current_timestamp) < 17;

    ```


    此方案仅对`ADMIN`用户返回`true`，且仅在上午 9 点到下午 5 点之间。如果授权方案的目的是将访问限制在这些时间，其评估点需要设置为`Once
    per page view`。


    创建了`Administrator`授权方案后，你还应使用前面描述的条件为`Guest`和`Built-In Users`创建授权方案。假设你删除了预先构建的管理员权限方案，你的`Authorization
    Schemes`屏幕现在应该如图 13-10 所示。


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig10_HTML.jpg](img/335103_3_En_13_Fig10_HTML.jpg)


    *图 13-10 当前的授权方案屏幕*


    ## 组件授权


    每个页面组件都有一个属性`Authorization Scheme`，它出现在其`Security`部分。你通过从一个选择列表中选择来为组件分配授权方案。图
    13-11 描绘了我的`Employee Demo`应用程序的这个选择列表。


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig11_HTML.jpg](img/335103_3_En_13_Fig11_HTML.jpg)


    *图 13-11 为组件分配授权方案*

    '
- fmt: '# 授权方案选项与应用


    第一个选项是`–Select–`，表示不需要授权。接下来的三个选项是我创建的三种授权方案。最后三个是它们的否定形式，由APEX自动生成。`Must Not
    Be Public User`方案是APEX内置的，将在后面讨论。


    例如，考虑图7-5中的`Employee Data Entry`页面。回想一下，这个页面有四个区域：一个显示`EMP`表报告的区域，以及用于删除、插入和更新表行的区域。假设任何人都可以查看员工报告，但不允许访客修改。在这种情况下，你会将授权方案`Not
    Guests`分配给删除、插入和更新区域，并将`–Select–`分配给报告区域。结果是，以`GUEST`身份验证的用户将只看到报告区域；其他三个区域对他们将是隐藏的。


    再举一个例子，再次考虑图13-5中的`Manage Users`页面。如果你希望页面上的两个区域只能由管理员访问，请为每个区域分配授权方案`Administrators`。结果是，管理员将看到如图所示的页面；非管理员将看到一个只有导航栏和菜单但没有内容的页面。


    因为向用户显示一个基本空白的页面是尴尬的，所以页面应该向非管理员显示一些内容。一个解决方案是创建一个显示消息“此页面仅供管理员使用”的区域，并为其分配授权方案`Not
    Administrators`。另一个解决方案是将授权方案分配给整个页面，稍后讨论。


    将授权方案分配给组件会导致该组件根据当前用户显示或隐藏。这种行为与你在第6章研究的条件渲染非常相似。所以问题是：为什么要使用组件授权——为什么不使用条件渲染来完成所有操作？


    答案是，是的，可以使用条件渲染来执行授权。如果你创建一个与授权方案定义相同的条件，该区域的行为将完全相同。然而，使用显式授权有三个更好的理由：


    *   一个授权方案可以用于多个组件，确保一致性。

    *   每个授权方案都有一个名称，这使应用程序开发人员更容易理解授权条件的效果。

    *   授权和条件渲染在应用程序中有着完全不同的目的，将它们分开会更清晰。


    ## 页面授权


    你可以将授权方案分配给页面本身，而不是分配给页面的组件。每个页面在其`Security`部分都有属性`Authorization Scheme`，其选项与图13-11中的相同。


    例如，让我们构建一个名为`Change Password`的页面，允许用户更改自己的密码。此页面如图13-12所示，将是`Employee Demo`的第47页。


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig12_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig12_HTML.jpg)


    **图13-12 更改密码页面**


    此页面由一个静态内容区域组成，包含两个`Password`类型的项目：`P47_PASSWORD`和`P47_CONFIRM`。点击提交按钮会调用一个验证和一个过程。验证使用以下SQL表达式确保输入的两个密码相同：


    ```

    :P47_PASSWORD = :P47_CONFIRM

    ```


    该过程通过以下PL/SQL代码更新`USERS`表：


    ```

    declare

    v_valuesToHash apex_t_varchar2 :=

    apex_t_varchar2(:APP_USER, :P47_PASSWORD);

    begin

    update USERS

    set Password = apex_util.get_hash(v_valuesToHash, null)

    where UserName = :APP_USER;

    end;

    ```


    这个页面应该如何授权？假设除了内置用户`GUEST`和`ADMIN`之外，每个人都应该被允许更改自己的密码。因此，页面的授权方案应该是`Not Built-In
    Users`。


    将授权方案分配给页面会使未经授权的用户无法访问该页面。特别是，如果未经授权的用户尝试呈现该页面，APEX将显示错误消息。图13-13显示了当内置用户尝试访问`Change
    Password`页面时出现的错误消息。点击消息上的“确定”按钮将用户返回到上一页。


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig13_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig13_HTML.jpg)


    **图13-13 未经授权访问页面的结果**


    这个错误消息完成了任务，但不是很好。错误消息有些生硬。（事实上，消息是反的——APEX使用为`Built-in Users`方案定义的错误消息，因为被否定的方案是自动生成的，没有错误消息。）一个更用户友好的方法是简单地向未经授权的用户隐藏页面。对于`Change
    Password`页面，这相当于不向未经授权的用户显示其导航菜单条目。这可以通过更改列表条目的`Authorization Scheme`属性轻松完成。


    要找到该属性，请从应用程序的`Shared Components`屏幕开始，导航到`Desktop Navigation Menu`列表，如图4-2所示。向下滚动到其`Change
    Password`条目；点击该条目将调出如图4-3所示的`List Entry`屏幕。你要的属性在`Authorization`部分；选择`Not Built-in
    Users`授权方案，然后点击`Apply Changes`按钮。


    然后运行你的应用程序。请注意，如果你以`ADMIN`或`GUEST`身份登录，导航菜单中将缺少`Change Password`页面的条目。一个好的经验法则是：如果一个页面有授权方案，其关联的导航菜单条目应该具有相同的授权方案。


    ## 非公共用户方案


    授权方案`Not Public User`是APEX内置的。它对任何已登录用户返回`true`，如果用户未登录则返回`false`。它的主要用途是有选择地隐藏公共页面上的组件。


    例如，假设你应用程序的主页是一个公共页面。然而，并非页面的所有部分都应该是公共的；特别是，`Quick Link`区域应该只对登录用户可见。这种情况可以通过将该区域的授权设置为`Not
    Public User`来处理。'
  raw: "The first option is `–Select–`, which\ndenotes that no authorization is required.\
    \ The next three options are\nthe three authorization schemes I created. The last\
    \ three options are\nthe negations of these, which are\nautomatically generated\
    \ by APEX. The `Must Not Be Public User` scheme is built in to APEX and will be\
    \ discussed later.\nFor an example, consider the `Employee Data Entry`\npage from\
    \ Figure [7-5](#335103_3_En_7_Chapter.xhtml#Fig5). Recall that this page has four\n\
    regions: a region to display a report of the `EMP` table, plus\nregions to delete,\
    \ insert, and update table rows. Assume that anyone can\nview the employee report,\
    \ but guests are not allowed to modify it. In\nthis case, you would assign the\
    \ authorization scheme `Not Guests` to the\ndelete, insert, and update regions\
    \ and assign `–Select–` to the\nreport region. The result is that users authenticated\
    \ as `GUEST` will see only\nthe report region; the other three regions will be\
    \ hidden from them.\nFor a second example, consider again the `Manage Users` page\
    \ of\nFigure [13-5](#335103_3_En_13_Chapter.xhtml#Fig5). If you want\nthe two\
    \ regions on the page to be accessible only to administrators,\nassign the authorization\
    \ scheme `Administrators` to\neach of them. As a result, administrators will see\
    \ the page as shown in\nthe figure; non-administrators will see a page having\
    \ a navigation bar\nand menu, but no content.\nBecause displaying an essentially\
    \ blank page to a user is awkward,\nthe page ought to display something to the\
    \ non-administrators. One\nsolution is to create a region that displays the message\
    \ **This\npage is for administrators only** and assign the authorization\nscheme\
    \ `Not Administrators` to it. Another solution is to assign an\nauthorization\
    \ scheme to the entire page, as discussed later.\nAssigning an authorization scheme\
    \ to a component causes that\ncomponent to be displayed or hidden, depending on\
    \ the current user. This\nbehavior is very similar to the conditional rendering\
    \ that you examined\nin Chapter [6](#335103_3_En_6_Chapter.xhtml). So the question\
    \ is this: why use\ncomponent authorization at all—why not do everything using\
    \ conditional\nrendering?\n\nThe answer is that yes, it is possible to use conditional\
    \ rendering to\nperform authorization. If you\ncreate a condition having the same\
    \ definition as the authorization\nscheme, the region will behave exactly the\
    \ same. However, using explicit\nauthorization is better for three reasons:\n\n\
    *   A single authorization scheme can be used for several components,\n    ensuring\
    \ consistency.\n\n*   Each authorization scheme has a name, which makes it easier\
    \ for\n    the application developer to understand the effect of the authorization\n\
    \    condition.\n\n*   Authorization and conditional rendering have entirely different\n\
    \    purposes in an application, and it is clearer if they are kept\n    separate.\n\
    \nPage Authorization\nInstead of assigning an authorization scheme to the components\
    \ of a\npage, you can assign it to the page itself. Each page has the property\n\
    `Authorization Scheme` in its `Security` section,\nwith the same options as in\
    \ Figure [13-11](#335103_3_En_13_Chapter.xhtml#Fig11).\n\nFor an example,\nlet’s\
    \ build a page named `Change Password`,\nwhich will allow users to change their\
    \ own password. This page is shown\nin Figure [13-12](#335103_3_En_13_Chapter.xhtml#Fig12)\
    \ and will be\npage 47 of `Employee Demo`.\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig12_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig12_HTML.jpg)\n\
    \nFigure 13-12\nChange Password page\n\nThis page consists of a static content\
    \ region having\ntwo items of type `Password`: `P47_PASSWORD` and\n`P47_CONFIRM`.\n\
    Clicking the submit button invokes a validation and a process. The\nvalidation\
    \ uses the following SQL expression to ensure that the two\nentered passwords\
    \ are identical:\n\n```\n:P47_PASSWORD = :P47_CONFIRM\n```\n\nThe process updates\
    \ the `USERS` table via the\nfollowing PL/SQL code:\n\n```\ndeclare\nv_valuesToHash\
    \ apex_t_varchar2 :=\napex_t_varchar2(:APP_USER, :P47_PASSWORD);\nbegin\nupdate\
    \ USERS\nset Password = apex_util.get_hash(v_valuesToHash, null)\nwhere UserName\
    \ = :APP_USER;\nend;\n```\n\nHow should this page be authorized? Assume that everyone\
    \ should be\nallowed to change their own password except for the built-in users\
    \ `GUEST` and `ADMIN`. Thus, the\nauthorization scheme for the page should be\
    \ `Not Built-In Users`.\n\nAssigning an authorization scheme to a page makes it\
    \ inaccessible to\nunauthorized users. In particular, if an unauthorized user\
    \ attempts to\nrender the page, APEX instead displays an error message. Figure\
    \ [13-13](#335103_3_En_13_Chapter.xhtml#Fig13) shows the\nerror message that results\
    \ when a built-in user tries to access the\n`Change Password`\npage. Clicking\
    \ the OK button on the message returns the user to the\nprevious page.\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig13_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig13_HTML.jpg)\n\
    \nFigure 13-13\nResult of unauthorized page access\n\nThis error message does\
    \ the job, but not very well. The error message\nis somewhat harsh. (In fact,\
    \ the message is backward—APEX uses the error\nmessage defined for the `Built-in\
    \ Users` scheme\nbecause the negated scheme, being automatically generated, has\
    \ no error\nmessage.) A much more user-friendly approach is to simply hide the\
    \ page\nfrom an unauthorized user. In the case of the `Change Password` page,\n\
    this amounts to not displaying its navigation menu entry to an\nunauthorized user.\
    \ This is easily done by changing the `Authorization Scheme`\nproperty of the\
    \ list entry.\nTo find the property, start at the\napplication’s `Shared Components`\
    \ screen and navigate to the `Desktop Navigation Menu` list, as shown in Figure\
    \ [4-2](#335103_3_En_4_Chapter.xhtml#Fig2). Scroll down to its `Change Password`\n\
    entry; clicking that entry will bring up its `List Entry` screen as\nshown in\
    \ Figure [4-3](#335103_3_En_4_Chapter.xhtml#Fig3). The property you want is in\
    \ the\n`Authorization`\nsection; choose the `Not Built-in Users`\nauthorization\
    \ scheme and click the `Apply Changes` button.\nThen run your application. Note\
    \ that if you are logged in as `ADMIN` or `GUEST`, the entry for\nthe `Change\
    \ Password` page will be missing from the navigation menu.\nA good rule of thumb\
    \ is this: if a page has an authorization scheme,\nits associated navigation menu\
    \ entry should have the same authorization\nscheme.\n\nNot Public User Scheme\n\
    The authorization scheme `Not Public User`  is built into APEX.\nIt returns `true`\n\
    for any logged in user and `false` if the user has\nnot logged in. Its primary\
    \ use is to selectively hide components on\npublic pages.\nFor example, suppose\
    \ that your application’s home page is a public\npage. However, suppose that not\
    \ all of the page should be public; in\nparticular, the `Quick Link` region should\
    \ be visible only to logged in users. This\nsituation can be handled by setting\
    \ the authorization for that region to\n`Not Public User`."
