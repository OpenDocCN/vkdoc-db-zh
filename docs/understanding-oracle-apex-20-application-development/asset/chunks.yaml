    考虑到这一点，让我们使用向导来创建这些主从页面，然后检查它们的实现。从图 2-9 中的初始 `Create Page` 屏幕开始。单击 `Master Detail`
    图标时，APEX 会显示图 10-44 所示的屏幕。从那里，单击 `Side by Side` 图标将得到图 10-45 所示的屏幕。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig45_HTML.jpg](img/335103_3_En_10_Fig45_HTML.jpg)


    图 10-45 第一个主从屏幕


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig44_HTML.jpg](img/335103_3_En_10_Fig44_HTML.jpg)


    图 10-44 选择所需的主从向导


    此屏幕要求您输入主页面（即图 10-42 中显示的页面）的名称和页码。向导还将创建另外两个页面来存放主表单和明细表单，但您无法选择它们的页码。单击 `Next`
    按钮将带您进入指定导航菜单项的屏幕。您之前已经见过此屏幕，因此这里省略了。最后一个屏幕（如图 10-46 所示）要求您提供主表和明细表。`Primary Display
    Column` 和 `Secondary Display Column` 属性表示要在主记录中显示的两个值。单击 `Create` 按钮会生成功能完整的三个页面。在我的应用程序中，这些页面是
    39、40 和 41。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig46_HTML.jpg](img/335103_3_En_10_Fig46_HTML.jpg)


    图 10-46 第三个主从屏幕


    页面 40 和 41 是表单页面，与您通过调用 `Create Form` 向导获得的结果相同。因此，主要问题是如何实现报表页面。


    这三个报表区域，也许令人惊讶，是 `Classic Report` 区域。它们外观不同是因为使用了不同的区域模板。主报表模板是 `Media List`。此模板显示两个值，分别称为
    `List_Title` 和 `List_Text`。如果您希望报表行成为链接，则源查询还必须有一个 Link 字段，其值是要重定向到的 URL。向导生成的源查询很复杂，但其本质如下：


    ```sql

    select DeptNo, DName as List_Title, Loc as List_Text,

    apex_page.get_url(p_items  => ''P39_DEPTNO'',

    p_values => DEPTNO) as Link

    from DEPT

    ```


    函数 `apex_page.get_url` 返回一个指向 APEX 页面的 URL。默认情况下，URL 会重定向到当前页面。参数 `p_items` 和
    `p_values` 指定了应如何更改会话状态。

    图 10-42 中标题为 `Dept` 的区域使用了模板 `Value Attribute Pairs – Column`。此模板将每个值显示在其自己的行上，并在前面加上列名。在图中，该区域的源有一行两列，因此其报告显示两行。

    标题为 `Emp` 的区域使用了 `Standard` 模板，因此其报告以标准方式显示。

    除了外观不同，`Dept` 和 `Emp` 报表以通常的方式与其表单页面交互，即通过让它们的按钮和链接重定向到相应的表单页面。

    底线是，即使是像 `Master-Detail` 这样复杂的向导，也只是创建了一个包含三个报表区域的页面，其中两个区域链接到表单页面。如果您愿意，可以自定义这些区域以满足您的需求。


    ### 小结


    本章的第一部分探讨了 APEX 表单区域。一个表单区域包含两个进程——一个初始化进程和一个 ARP 进程——它们允许您的页面访问数据库，而无需编写 PL/SQL
    代码。APEX 还为一些常见任务提供了内置进程，这些进程与两个表单进程配合使用。几个例子展示了这些进程相对于相应 PL/SQL 进程的优点和局限性。

    本章的第二部分探讨了一些创建表单的 APEX 页面创建向导。这些向导各不相同，从创建旨在与其他页面结合使用的单页面的 `Form` 向导，到将 `Form`
    页面与简单报表页面配对的 `Report with Form` 向导，再到将两个 `Form` 页面与一个包含三个报表区域的页面匹配的复杂 `Master-Detail`
    向导。在每种情况下，重点都是揭开这些向导的神秘面纱，使您能够自信地创建所需的页面，无论是否使用它们。


    ### 11. 交互式网格


    报表是只读的。如果您正在查看报表并想要更改其内容，则必须使用表单。例如，考虑图 10-27 中的 `Report with Form 1` 页面。假设用户想要修改员工报表中的一行。会发生以下步骤：

    *   用户单击所需行的链接，这会重定向到 `Report with Form 2` 页面（图 10-29），并将选定的员工号放入该页面的一个项中。

    *   然后，表单的初始化进程从数据库中检索该员工的信息，并将其存储在相应的项中。

    *   然后用户修改这些项的内容，并单击 `Apply Changes` 按钮执行更新。


    这些步骤的奇特之处在于，第二步没有利用员工报表。相反，初始化进程重新从数据库中检索所需的员工记录，即使这些值就在报表中。

    *交互式网格* 的概念通过允许用户直接更新报表值来解决这种情况。交互式网格本质上是一个“可更新的报表”，在一个区域中结合了报表和表单的功能。本章探讨了构建和自定义交互式网格所需的技术。

    '
- fmt: '# 只读交互网格


    APEX 交互式网格本质上是一个可以像表单一样编辑的交互式报表。本节将探讨交互式网格的类报表特性；本章的后续部分将涵盖与表单相关的问题。`Employee
    Demo` 应用程序的第42页名为 `Interactive Grids`，将在本章中作为一个贯穿使用的示例。


    ## 创建交互式网格区域


    要创建此页面，首先创建一个空白页面。添加一个名为 `Departments` 的区域，并将其类型设置为 `Interactive Grid`。系统会要求你提供一个数据源，这里应该是查询语句
    `select * from DEPT`。图 11-1 展示了 APEX 生成的渲染树及其相关属性。你应该注意到它与任何报表区域看起来没什么不同。


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig1_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig1_HTML.jpg)


    **图 11-1** 创建交互式网格区域


    图 11-2 展示了生成的区域。请注意报表上方的工具栏，其中包含搜索字段和操作菜单。这个工具栏与交互式报表中的相同，并且功能几乎一样。例如，交互式网格的操作菜单允许你隐藏和重排序列、创建图表、过滤记录等等，就像交互式报表一样。交互式网格还提供诸如调整列宽和冻结列等操作，并对操作菜单进行了一些重组。`Reset`
    按钮将报表恢复为其默认设置。


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig2_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig2_HTML.jpg)


    **图 11-2** 一个交互式网格区域


    要自定义交互式网格的工具栏，你使用与自定义交互式报表相同的属性；参见图 11-3。一个区别是交互式网格没有用于自定义操作菜单的属性。


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig3_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig3_HTML.jpg)


    **图 11-3** 用于自定义工具栏的属性


    ## 创建主从关系


    与交互式报表不同，交互式网格具有属性，可以在两个网格之间创建主从关系。要在你的 `Interactive Grids` 页面中实现此功能，请遵循以下步骤：


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig4_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig4_HTML.jpg)


    **图 11-4** “主从关系”属性部分


    1.  创建一个新的交互式网格区域，命名为 `Employees`，其数据源为 `select * from EMP`。

    2.  在 `Departments` 区域中，点击渲染树中的 `DEPTNO` 节点，并在属性编辑器中找到其 `Source` 部分（如图 10-4 所示）。打开
    `Primary Key` 属性。

    3.  在你的新 `Employees` 区域中，转到 `DEPTNO` 列的 `Master Detail` 属性部分，并将其 `Master Column`
    属性设置为 `DEPTNO`，如图 11-4 所示。


    最后两步在两个网格之间建立了键-外键关系。`Departments` 网格中的 `DEPTNO` 列是主键，而 `Employees` 网格中的 `DEPTNO`
    列是外键。APEX 将确保每当用户从 `Departments` 网格中选择一行时，`Employees` 网格将只显示具有相应 `DEPTNO` 值的行。


    图 11-5 展示了生成的主从网格。花些时间探索它们在你的应用程序中的行为。你应该观察到每次选择另一个主行时，明细网格是如何变化的。同时注意 `Employees`
    网格不再显示 `DeptNo` 列，因为它的值可以从所选的 `Departments` 行中推断出来。


    ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig5_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig5_HTML.jpg)'
  raw: "Read-Only Interactive Grids\nAn APEX interactive grid is essentially an\n\
    interactive report that can be edited like a form. This section examines\nthe\
    \ report-like features of interactive grids; the remainder of the\nchapter will\
    \ cover the form-related issues. Page 42 of the `Employee Demo`\napplication is\
    \ called `Interactive Grids` and\nwill be used as a running example throughout\
    \ the chapter.\n\nTo create this page, begin by creating a blank page. Add a region\
    \ named\n`Departments`,\nand give it the type `Interactive Grid`. You\nwill be\
    \ asked for a source, which should be the query `select * from DEPT`.\nFigure\
    \ [11-1](#335103_3_En_11_Chapter.xhtml#Fig1) shows the\nrendering tree generated\
    \ by APEX and its relevant properties. You should\nnote that it looks no different\
    \ from any report region.\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig1_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig1_HTML.jpg)\n\
    \nFigure 11-1\nCreating an interactive grid region\n\nFigure [11-2](#335103_3_En_11_Chapter.xhtml#Fig2)\
    \ shows the\nresulting region. Note the toolbar above the report, containing the\n\
    search field and action menu. This bar looks the same as in an\ninteractive report\
    \ and has nearly the same functionality. For example,\nthe action menu of an interactive\
    \ grid lets you hide and reorder\ncolumns, create charts, filter records, and\
    \ so on, just like an\ninteractive report. An interactive grid also provides operations\
    \ such as\nresizing and freezing columns and reorganizes the action menu somewhat.\n\
    The `Reset`\nbutton restores the report to its default settings.\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig2_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig2_HTML.jpg)\n\
    \nFigure 11-2\nAn interactive grid region\n\nTo customize the toolbar of an interactive\
    \ grid, you use the same\nproperties you would use to customize an interactive\
    \ report; see Figure [11-3](#335103_3_En_11_Chapter.xhtml#Fig3). One\ndifference\
    \ is that interactive grids do not have properties to customize\nthe action menu.\n\
    \n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig3_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig3_HTML.jpg)\n\
    \nFigure 11-3\nProperties to customize the toolbar\n\nUnlike interactive reports,\
    \ interactive grids have properties to create\na master-detail relationship between\
    \ two grids. To implement this\nfeature in your `Interactive Grids`\npage, follow\
    \ these steps:\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig4_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig4_HTML.jpg)\n\
    \nFigure 11-4\nThe Master Detail property section\n\n*   Create a new interactive\
    \ grid region named `Employees`, having the\n    source `select * from EMP`.\n\
    \n*   In the `Departments` region,\n    click the `DEPTNO` node in the\n    rendering\
    \ tree and find its `Source` section in the\n    property editor (as shown in\
    \ Figure [10-4](#335103_3_En_10_Chapter.xhtml#Fig4)). Turn on the `Primary Key`\n\
    \    property.\n\n*   In your new `Employees` region, go\n    to the `Master Detail`\
    \ property section of the `DEPTNO` column, and\n    set its `Master Column` property\
    \ to `DEPTNO`, as shown in\n    Figure [11-4](#335103_3_En_11_Chapter.xhtml#Fig4).\n\
    \nThese last two steps establish the key-foreign key relationship\nbetween the\
    \ two grids. The column `DEPTNO` in the `Departments` grid is\nthe key, and the\
    \ column `DEPTNO` in the `Employees` grid is the\nforeign key. APEX will ensure\
    \ that whenever a user selects a row from\nthe `Departments`\ngrid, the `Employees`\
    \ grid will\nshow only the rows having corresponding `DEPTNO` values.\n\nFigure\
    \ [11-5](#335103_3_En_11_Chapter.xhtml#Fig5) shows the\nresulting master-detail\
    \ grids. Take some time to explore how they behave\nin your application. You should\
    \ observe how the detail grid changes each\ntime you select another master row.\
    \ Also note that the `Employees` grid no\nlonger shows the `DeptNo` column because\n\
    its value can be inferred from the selected `Departments` row.\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig5_HTML.jpg](images/335103_3_En_11_Chapter/335103_3_En_11_Fig5_HTML.jpg)"
