  trans: '

    快速选择项非常实用，因为它们能让用户快速输入项目值。事实上，APEX 界面中的许多项目都包含快速选择功能。例如，图 5-16 中的 `CSS Classes`
    和 `Format Mask` 属性，其文本框右侧就有一个上下文菜单，图 5-5 中的 `Type` 属性也是如此。点击上下文菜单会显示该项目的快速选择值列表。遗憾的是，尽管
    APEX 界面提供了多种实现快速选择的方式（如上下文菜单或链接），但使用 APEX 开发的应用程序却仅限于一种方式（即显示在项目下方的链接）。

    具有快速选择功能的项目在理念上类似于自动完成项。两者都允许用户通过从建议值中选择来消除（或减少）输入。不同之处在于，自动完成菜单会随着用户的输入进行过滤，而快速选择则是一次性全部呈现给用户。因此，一个项目可以拥有任意多个自动完成值，而
    APEX 将一个项目的快速选择限制为十个。


    ## 基于列表的项目

    与基于文本的项目不同，基于列表的项目没有输入框。相反，它向用户呈现一个可供选择的可能性列表。此外，用户选择的值不一定是分配给该项目的值。也就是说，该项目向用户展示一个显示值列表；当用户选择一个显示值时，一个对应的返回值会被分配给该项目。


    例如，考虑图 5-2 中 `单值列表项` 的三个子区域，这些区域在图 5-18 中重新打印。每个区域专用于三种常见的基于列表的项目类型之一——单选按钮组、选择列表和弹出列表——并且包含三个该类型的项目。虽然从图中无法看出，但这九个项目都具有相同的可能返回值集合，即部门编号集合
    {10, 20, 30, 40}。此外，图中显示的选择使得每个项目的值都相同，即 30。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig18_HTML.jpg](img/335103_3_En_5_Fig18_HTML.jpg)

    **图 5-18** 单值列表项


    这九个项目具有相同的功能：用户选择一个部门，相应的部门编号就被分配给该项目。这些项目的区别仅在于其显示值是什么以及如何向用户呈现这些值。

    首先考虑单选按钮组。在单选按钮组中，所有显示值都出现在页面上，用户通过点击来选择所需值。`单选按钮组` 区域中的每个单选按钮组都有不同的显示值：第一个组显示部门名称列表，第二个组显示部门编号列表，第三个组在括号中显示每个部门名称及其员工数量。

    现在考虑选择列表。当用户点击选择列表时，会出现一个显示值菜单。第一个选择列表的显示值与第一个单选按钮组的显示值相同，另外两个选择列表也是如此。

    最后，考虑弹出列表。当用户点击项目右侧的箭头时，会出现一个显示值菜单供用户选择。三个弹出列表的显示值与另外两个区域的相应显示值相同。

    弹出列表与选择列表的不同之处在于它还有一个搜索框。用户可以在搜索框中输入所需值的前缀，然后点击放大镜；显示的值列表将被过滤，只包含具有该前缀的值。弹出列表使得从冗长的值列表中进行选择成为可能，而无需大量滚动。

    单选按钮组项目的 `设置` 部分有一个 `列数` 属性。此属性指定单选按钮在页面上的排列方式。在图 5-18 中，你可以看到第一个单选按钮组有两列，第二个有四列，第三个有一列。

    基于列表的项目最重要的问题是如何指定其显示值和返回值。你可以通过 SQL 查询动态指定这些值，或通过显式值静态指定。图 5-18 中的所有九个项目都是动态指定的，因此我将从这里开始讨论。


    ## 动态基于列表的项目

    用于指定显示值和返回值之间对应关系的 SQL 查询应有两列：第一列给出显示值，第二列给出返回值。这些列的名称并不重要。


    例如，考虑单选按钮组项目 `P8_RADIO_NAME`。它的查询应在第一列中包含部门名称，在第二列中包含部门编号。此外，项目 `P8_SELECT_NAME`
    和 `P8_POPUP_NAME` 也将具有相同的显示值和返回值。因此，所有三个项目的值都可以通过以下查询指定：


    ```

    select DName, DeptNo

    from DEPT

    order by DName

    ```


    此查询在项目的 `值列表` 部分中指定。这与图 5-12 中指定自动完成文本项目的值列表的部分相同；唯一的区别是基于列表的项目需要一个两列查询。

    现在你已经准备好配置项目 `P8_RADIO_NAME`、`P8_SELECT_NAME` 和 `P8_POPUP_NAME`。将它们的 `类型` 属性分别设置为
    `单选按钮组`、`选择列表` 和 `弹出列表`，并将它们的 `值列表` 属性设置为前面的 SQL 查询。你还应该将 `P8_RADIO_NAME` 的 `列数`
    属性设置为 `2`。

    '
- fmt: '## Static List–Based Items


    Now consider the items `P8_RADIO_NO`, `P8_SELECT_NO`, and `P8_POPUP_NO`—that is,
    the second items of each region of Figure 5-12. Each of these items has the same
    display and return values. The interesting situation here is that the display
    and return values are both department numbers. If you wrote their SQL query in
    a straightforward way, then the names of the two output columns would be identical,
    which is illegal in SQL. To make the query legal, you need to rename at least
    one of its columns. The query should look something like this:


    ```sql

    select DeptNo as DisplayVal, DeptNo as ReturnVal

    from DEPT

    order by DisplayVal

    ```


    **Note**


    The names of the columns can be anything; SQL requires only that they be different
    from each other.


    You should configure the items `P8_RADIO_NO`, `P8_SELECT_NO`, and `P8_POPUP_NO`
    analogously to the preceding three items. Set their `Type` property to `Radio
    Group`, `Select List`, and `Popup List`, respectively, and their `List of Values`
    properties to the preceding SQL query. You should also set the `Number of Columns`
    property for `P8_RADIO_NO` to `4`.


    The treatment of the items `P8_RADIO_INFO`, `P8_SELECT_INFO`, and `P8_POPUP_INFO`
    is similar. Their property values are the same as for the previous items, except
    that they have a different query. Here is the query, which shows how to create
    complex display values:


    ```sql

    select d.DName || '' ('' || count(e.EmpNo) || '' employees)'' as Display,

    d.DeptNo as ReturnVal

    from DEPT d left join EMP e on d.DeptNo = e.DeptNo

    group by d.DeptNo, d.DName

    order by Display

    ```


    The left join in the query ensures that all departments are included, even those
    with no employees.


    ## Multi-Value List Items


    When you use a query to specify the values of a list-based item, APEX will execute
    that query each time it renders the page. If the output of the query will never
    change, then you can use a static expression to avoid the call to the database.


    You specify a static expression the same as you would for an item of type `Text
    Value with Autocomplete`: First, set the `Type` property in the `List of Values`
    section to `Static Values`; then click the `Static Values` property to bring up
    the Static Values screen. You can then enter the display and return values for
    each member of the list. Figure 5-19 shows how I could have filled in the values
    for `P8_RADIO_NAME`, `P8_SELECT_NAME`, and `P8_POPUP_NAME`.


    ![Figure 5-19](images/335103_3_En_5_Chapter/335103_3_En_5_Fig19_HTML.jpg)

    *Figure 5-19: Static values for a list-based item*


    A list-based item allows a user to choose only one value from its list. A multi-value
    list item lets a user choose multiple values from its list. The `Multi-Value List
    Items` region of Figure 5-2 contains four types of multi-value item, and is reprinted
    for clarity in Figure 5-20. Each of the items in this region has its `operations`
    and `sales` departments chosen.


    ![Figure 5-20](images/335103_3_En_5_Chapter/335103_3_En_5_Fig20_HTML.jpg)

    *Figure 5-20: Multi-value list items*


    Multi-value list items are configured the same way as single-value items. In particular,
    they use an SQL query or static expression to indicate their display values and
    return values. For example, the SQL query for each of the four items in the region
    is this:


    ```sql

    select DName, DeptNo

    from DEPT

    order by DName

    ```


    The main issue is how to assign a single return value to an item that has multiple
    display values selected. APEX uses the convention that the value of a multi-value
    item is a string consisting of the selected return values separated by colons.
    If no display values are selected, then the item’s value is `null`. For example,
    the items in Figure 5-20 all have the value `40:30`.


    Let’s examine these four item types. The first item, `P8_M_SELECT`, is a select
    list; that is, the same item type as in the `Single-Value List` region. To specify
    that the item is to be a multi-value select list, you set its `Allow Multi Selection`
    property (in the `Settings` section) to `Yes`. The value of its `Height` property
    (in the `Appearance` section) determines how many menu rows to display. All other
    properties are configured the same.


    Note that the multi-value select list `P8_M_SELECT` looks and behaves differently
    from the single-value select list `P8_SELECT_NAME`. The multi-value list displays
    the menu on the page at all times, instead of on demand. (And if the list has
    more items than can be displayed on the page, a scrollbar appears so that the
    user can scroll through the values.) A user can choose additional menu items from
    the multi-value list by holding the control or command key while clicking, depending
    on the operating system.


    The second item in the region, `P8_CHECKBOX`, is a checkbox group. Checkbox groups
    are configured exactly the same as radio groups. Checkbox groups behave differently
    from radio groups in that multiple checkboxes can be selected, and clicking a
    box toggles its value.


    The third item, `P8_SHUTTLE`, is a shuttle list, which is very similar to a multi-value
    select list and is configured the same way. The difference between them is that
    a multi-value select list denotes selected values by highlighting them, whereas
    a shuttle has separate menus for displaying the selected and unselected values.


    The fourth item, `P8_LIST`, is a list manager, which is a cross between an autocompletion
    text box and a pop-up list. Similar to autocompletion, a user can enter any value
    into the input box and click the `Add` button to add it to the selected value
    list. Alternatively, the user can click the pop-up arrow to bring up a menu of
    values to choose from, with the selected value getting added to the input box.
    It is important to note, however, that although the pop-up list shows display
    values, it places return values in the input box. Thus, Figure 5-20 shows that
    the department numbers `30` and `40` are selected, even though the pop-up list
    displays department names.


    ## Yes/No Items


    A web page often needs to request yes/no information from users. The `Yes/No Items`
    region of Figure 5-2 illustrates four different ways to perform this task, and
    is reprinted for clarity in Figure 5-21. The region contains four list-based items,
    each denoting that the user wants to be contacted.


