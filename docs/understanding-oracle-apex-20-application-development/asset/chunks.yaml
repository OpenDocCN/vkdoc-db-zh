    ## 多用途进程

    无法利用 `按下按钮时` 属性的另一种情况是，一个进程适用于多个按钮时。本节包含两个与 `修订后的员工数据录入` 页面相关的示例。


    对于第一个示例，假设您想要记录对 `EMP` 表所做的所有更改。具体而言，每次点击 `删除`、`插入` 或 `更新` 按钮时，都应向名为 `EMPLOG`
    的表中插入一条相应的记录。


    用于创建 `EMPLOG` 的 SQL 语句出现在代码清单 7-12 中。您应该通过转到 SQL 工作坊并提交该语句来创建此表。请注意，表中的记录将描述更改请求、提出请求者以及请求时间。


    ```

    create table EMPLOG(Request varchar2(20),

    UserName varchar2(20),

    RequestDate Date)

    ```

    代码清单 7-12

    用于创建 `EMPLOG` 表的 SQL 代码


    设 `LogChanges` 为向 `EMPLOG` 插入记录的进程的名称。您应在 `修订后的员工数据录入` 页面中创建此进程，并为其提供代码清单 7-13
    中的 PL/SQL 代码。


    ```

    begin

    insert into EMPLOG (Request, UserName, RequestDate)

    values (:REQUEST, :APP_USER, sysdate);

    end;

    ```

    代码清单 7-13

    `LogChanges` 进程的 PL/SQL 代码


    此代码引用了内置变量 `APP_USER` 和 `REQUEST`，这两个变量您之前都见过。变量 `APP_USER` 保存已登录用户的名称，而 `REQUEST`
    保存执行提交操作的按钮或项的名称。因此，`LogChanges` 进程向 `EMPLOG` 表插入一条记录，其中包含提交操作的来源、执行该操作的用户以及操作发生的日期。


    每次点击 `插入`、`删除` 或 `更新` 按钮时，此进程都需要执行，但从项 `P19_UPDATE_EMPNO` 中选择值时则不需要执行。显然，`按下按钮时`
    属性在这里毫无用处，因为它只允许您选择单个按钮。


    解决方案是将进程的服务器端条件设置为图 7-15 所示的 SQL 表达式。此表达式确保仅当点击名为 `插入`、`删除` 或 `更新` 的按钮时，进程才会触发。由于这些按钮中的每一个也都有自己的专用进程，因此点击其中任何一个按钮都将导致两个进程执行。进程将按其序列号顺序执行。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig15_HTML.jpg](img/335103_3_En_7_Fig15_HTML.jpg)


    ### 图 7-15

    `LogChanges` 进程的条件部分


    您可能在想，不需要一个单独的进程来执行日志记录；相反，您可以将日志记录代码附加到每个按钮的专用进程中。此策略有效，但不建议采用。问题在于这样做会复制日志记录代码，这意味着如果您想更改日志记录的工作方式（例如，向
    `EMPLOG` 表添加新列或将 `RequestDate` 列更改为同时保存时间和日期），您将需要在三个地方进行更新。此外，如果您决定向页面添加新按钮，则必须记住从现有按钮中提取此日志记录代码，并将其添加到新按钮的进程中。采用一个可由多个按钮调用的独立进程要优雅和实用得多。


    无法利用 `按下按钮时` 属性的进程的第二个示例涉及发送电子邮件。具体来说，假设您希望 `修订后的员工数据录入` 页面在检测到可疑修改时向数据库管理员发送电子邮件。让我们将可疑修改定义为在正常工作时间上午
    9 点至下午 5 点之外发生的删除或更新。要实现此功能，您需要做两件事：创建一个进程（称其为 `SendSuspiciousEmail`）来发送电子邮件，并指定其触发条件。


    要创建该进程，您可以使用 APEX 的电子邮件发送函数 `apex_mail.send`。此函数可以接受多个参数，分别表示（除其他外）发件人和收件人地址、主题和邮件正文。进程的代码只需计算这些参数值并调用该函数。代码清单
    7-14 显示了我的代码。（当然，如果您想亲自尝试此代码，应将收件人更改为您自己的电子邮件地址。）


    ```

    declare

    v_action varchar2(40);

    begin

    if :REQUEST = ''Delete'' then

    v_action := '' deleted the record for emp ''  || :P19_DELETE_EMPNO;

    else

    v_action := '' modified the record for emp '' || :P19_UPDATE_EMPNO;

    end if;

    apex_mail.send(

    p_from => ''EmployeeDemo@MyCompany.com'',

    p_to   => ''dba@MyCompany.com'',

    p_subj => ''Suspicious changes to EMP'',

    p_body => :APP_USER || v_action);

    end;

    ```

    代码清单 7-14

    `SendSuspiciousEmail` 进程的代码


    此代码唯一值得注意的部分是它使用 `REQUEST` 变量来定制邮件正文，以提及执行的操作和受影响的员工记录。例如，如果用户 `boris@secret.org`
    修改了总裁 `KING` 的记录内容，邮件正文将显示：


    ```

    boris@secret.org modified the record for emp 7839

    ```


    当点击 `删除` 或 `更新` 按钮，并且当前时间（由 `current_timestamp` 函数确定）早于上午 9 点或晚于下午 5 点时，此代码应执行。图
    7-16 显示了此条件的 SQL 表达式。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig16_HTML.jpg](img/335103_3_En_7_Fig16_HTML.jpg)


    ### 图 7-16

    `SendSuspiciousEmail` 进程的条件


    ## 页面渲染进程

    到目前为止，本章中的所有进程都是在提交时执行的。本章的剩余部分将考虑在页面渲染期间执行的进程。当页面使用重定向而不是提交时，这种情况经常出现，例如从报告的行进行链接时。


    例如，回顾第 3 章，交互式报告可以有一个链接列，点击行的链接列会在 `单行视图` 中显示该行的值（请参阅图 3-66 和 3-67）。`单行视图` 具有用于移动到表中上一行和下一行的按钮，以及另一个用于返回到报告视图的按钮。

    '
- fmt: '# Single Row View 页面


    员工演示应用程序的第 20 页被称为 `Single Row View`，如图 7-17 所示。该页面包含两个区域，其工作方式类似于交互式报表的单行视图。`Employees`
    区域是 `EMP` 记录的经典报表。用户可以通过点击其第一列中的链接来选择一行；APEX 会将该行的值放入 `Emp Info` 区域的项中。`Emp Info`
    区域有三个按钮：底部的箭头按钮选择上一个或下一个记录，顶部的 `Report View` 按钮将控制权传回报表。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig17_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig17_HTML.jpg)


    图 7-17 单行视图页面


    尽管图 7-17 同时显示了 `Employees` 和 `Emp Info` 区域，但它们实际上永远不会以这种方式显示。`Employees` 区域仅在没有选定记录时显示，而
    `Emp Info` 区域仅在有选定记录时显示。


    当您尝试实现此页面时，会出现几个问题：`Emp Info` 区域中的项如何获取其值？页面如何知道是显示 `Employees` 区域还是 `Emp Info`
    区域？箭头按钮是如何实现的？这些问题将在以下各节中讨论。


    ## 无需提交即可执行进程


    让我们首先考虑如何构建 `Employees` 区域。它是一个经典报表区域，具有以下源查询：


    ```sql

    select EmpNo, EName, Job, Sal, DeptNo

    from EMP

    order by EName

    ```


    您应将 `EmpNo` 列的类型设置为 `Link`。要配置此链接，请单击该列的 `Target` 属性以调出 `Link Builder` 向导屏幕。图
    7-18 显示了我填写后的屏幕。它指定当选择链接时，APEX 将把名为 `P20_EMPNO` 的项设置为选定的员工编号，并重定向到同一页面。为此，您当然需要将
    `P20_EMPNO` 创建为隐藏项。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig18_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig18_HTML.jpg)


    图 7-18 为 EmpNo 列配置链接


    现在考虑 `Emp Info` 区域。它应该有四个项和三个按钮。这些项命名为 `P20_ENAME`、`P20_JOB`、`P20_SAL` 和 `P20_DEPTNO`。它们的类型均为
    `Display Only`，因此无法修改。按钮命名为 `ReportView`、`Previous` 和 `Next`。`ReportView` 定位在
    `Above Region`，而 `Previous` 和 `Next` 定位在 `Below Region`；所有三个按钮都左对齐。


    `Previous` 和 `Next` 按钮使用与交互式报表的单行模式中使用的按钮相同的图标。我选择在本区域中使用它们只是为了说明如何实现。图 7-19 显示了
    `Previous` 按钮的 `Appearance` 属性。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig19_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig19_HTML.jpg)


    图 7-19 “上一个”按钮的外观部分


    要指定按钮应显示为图标，您可以将 `Button Template` 属性的值设置为 `Icon`，并将 `Icon` 属性的值设置为所需图标文件的名称。您可以通过单击
    `Icon` 属性右侧的快速选择符号并从显示的大量图标中选择来获取此文件名。单击 `Template Options` 属性可以让您自定义按钮的外观。特别是，将
    `Style` 属性设置为 `Remove UI Decoration` 会显示没有通常围绕按钮的矩形的图标。`Next` 按钮的属性设置与 `Previous`
    按钮相同，只是图标是向右的箭头。


    一旦构建了 `Emp Info` 区域，下一步就是编写一个进程来检索 `P20_EMPNO` 中指定的员工的值，并将它们放入 `Emp Info` 的项中。转到页面编辑器的
    `Processing` 选项卡，创建一个名为 `FetchRow` 的进程，其 PL/SQL 代码如清单 7-15 所示。此代码类似于清单 7-4，即 `Employee
    Data Entry` 页面上 `GetEmpInfo` 按钮关联的代码。


    ```sql

    begin

    if :P20_EMPNO is not null then

    select EName, Job, Sal, DeptNo

    into :P20_ENAME, :P20_JOB, :P20_SAL, :P20_DEPTNO

    from EMP

    where EmpNo = :P20_EMPNO;

    end if;

    end;

    ```


    清单 7-15 FetchRow 进程的 PL/SQL 代码


    尽管此进程代码正确，但它的执行点错误。`Processing` 执行点意味着进程在发生提交操作时执行。但 `Employees` 区域不执行提交；而是调用链接，而链接执行重定向。您需要的是进程在重定向发生后执行——即在页面渲染期间。


    在页面设计器中单击 `FetchRow` 的节点，并查看其 `Execution Options` 部分。`Point` 属性指定了进程的执行点。图 7-20
    向您展示了可能的值。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig20_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig20_HTML.jpg)


    图 7-20 可能的进程执行点


    如果一个进程的执行点是 `New Session`，它只会在会话开始时执行。从 `Before Header` 到 `After Footer` 的执行点表示页面渲染的六个阶段；分配到其中一个点的进程将在指定的渲染阶段执行。执行点
    `After Submit` 和 `Processing` 是提交操作的两个阶段。如果您希望进程在验证阶段之前执行，则将其分配给 `After Submit`
    点；如果您希望它在验证之后执行，则分配给 `Processing`。


    尽管这些选项对于高级应用程序很有用，但许多执行点之间的差异很微妙，并且在大多数情况下无关紧要。就我们的目的而言，唯一有趣的区别在于在提交期间执行的进程和在渲染期间执行的进程之间。特别是，本书中的所有进程在页面渲染期间执行时都具有
    `After Header` 执行点，而在提交期间执行时具有 `Processing` 执行点。


    现在将注意力转回 `FetchRow` 进程，并将其执行点更改为 `After Header`。您应该观察到该进程的节点将从处理树中消失并重新出现在渲染树中，如图
    7-21 所示。这是合理的，因为渲染树包含页面渲染期间发生的所有内容，其中包括进程。此图还显示 `After Header` 执行点是一个**预渲染**点——也就是说，它在区域渲染之前发生。这很重要，因为它确保
    `FetchRow` 将在页面项被渲染之前为它们赋值。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig21_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig21_HTML.jpg)


    图 7-21 FetchRow 现在是一个渲染进程'
  raw: 'Page 20 of the employee demo application is called `Single Row View`, and

    is shown in Figure [7-17](#335103_3_En_7_Chapter.xhtml#Fig17). The page

    contains two regions that work similar to the single row view of an

    interactive report. The `Employees` region is a

    classic report of `EMP` records. A user

    can select a row by clicking the link in its first column; APEX responds

    by placing that row’s values into the items of the `Emp Info` region. The

    `Emp Info` region

    has three buttons: the arrow buttons at the bottom select the previous

    or next record, and the `Report View` button at

    the top transfers control back to the report.


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig17_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig17_HTML.jpg)


    Figure 7-17

    Single Row View page


    Although Figure [7-17](#335103_3_En_7_Chapter.xhtml#Fig17) shows the

    `Employees` and

    `Emp Info`

    regions together, they actually are never displayed this way. The `Employees`
    region is

    displayed only when there is no selected record, and the `Emp Info` region is

    displayed only when there is a selected record.

    Several issues arise when you try to implement this page. How and

    when do the items in the `Emp Info` region get

    their values? How does the page know whether to display the `Employees` region
    or

    the `Emp Info`

    region? How are the arrow buttons implemented? These issues are

    discussed in the following sections.


    Executing a Process Without a Submit


    Let’s first consider how to build the `Employees` region . It is a classic

    report region having the following source query:


    ```

    select EmpNo, EName, Job, Sal, DeptNo

    from EMP

    order by EName

    ```


    You should set the type of the `EmpNo` column to be

    `Link`. To

    configure this link, click the column’s `Target` property to

    bring up the `Link Builder` wizard screen. Figure [7-18](#335103_3_En_7_Chapter.xhtml#Fig18)
    shows the

    screen as I filled it in. It specifies that when a link is chosen, APEX

    will set an item named `P20_EMPNO` to the

    selected employee number and redirect to the same page. For this to be

    meaningful, you will of course need to create `P20_EMPNO` as a hidden

    item.


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig18_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig18_HTML.jpg)


    Figure 7-18

    Configuring the link for the EmpNo column


    Now consider the `Emp Info` region . It should have four

    items and three buttons. The items are named `P20_ENAME`, `P20_JOB`, `P20_SAL`,
    and `P20_DEPTNO`. They all

    have the type `Display Only` so that they cannot be modified. The buttons are
    named `ReportView`, `Previous`, and `Next`. `ReportView` is

    positioned `Above Region`, and `Previous` and `Next` are positioned

    `Below Region`;

    all three buttons are aligned left.


    The `Previous`

    and `Next`

    buttons use the same icons as the buttons used in the single row mode of

    an interactive report. I chose to use them in this region just to

    illustrate how it’s done. Figure [7-19](#335103_3_En_7_Chapter.xhtml#Fig19) shows
    the

    `Appearance`

    properties for the `Previous` button.


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig19_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig19_HTML.jpg)


    Figure 7-19

    Appearance section for the previous button


    To specify that the button should be displayed as an icon, you set

    the value of the `Button Template`

    property to `Icon` and the value of

    the `Icon`

    property to the name of the desired icon file. You can get this file

    name by clicking the quick-pick symbol to the right of the `Icon` property and

    choosing from the large number of icons displayed. Clicking the `Template Options`

    property  lets you

    customize the button’s appearance. In particular, setting the `Style` property
    to

    `Remove UI Decoration` displays the icon without the rectangle that typically

    outlines the button. The property settings for the `Next` button are the

    same as for the `Previous` button,

    except that the icon is a right-facing arrow.


    Once you have constructed the `Emp Info` region, the

    next step is to write a process to retrieve the values for the employee

    specified in `P20_EMPNO` and place

    them into the items of `Emp Info`. Go to the

    `Processing` tab

    of the page editor and create a process named `FetchRow`, having the

    PL/SQL code shown in Listing [7-15](#335103_3_En_7_Chapter.xhtml#PC31). This code
    is

    similar to Listing [7-4](#335103_3_En_7_Chapter.xhtml#PC9), which was the

    code associated with the `GetEmpInfo` button on

    the `Employee Data Entry` page.


    ```

    begin

    if :P20_EMPNO is not null then

    select EName, Job, Sal, DeptNo

    into :P20_ENAME, :P20_JOB, :P20_SAL, :P20_DEPTNO

    from EMP

    where EmpNo = :P20_EMPNO;

    end if;

    end;

    Listing 7-15

    PL/SQL Code for the FetchRow Process

    ```


    Although this process has the correct code, it has the wrong

    execution point. The `Processing` execution

    point means that the process executes when a submit action occurs. But

    the `Employees`

    region does not perform a submit; instead, it invokes a link, and links

    perform a redirect. What you need is for the process to execute after

    the redirection occurs—that is, during page rendering.


    Click the node for `FetchRow` in the page

    designer and look at its `Execution Options`

    section. The `Point` property

    specifies the execution point of the process. Figure [7-20](#335103_3_En_7_Chapter.xhtml#Fig20)
    shows you the

    possible values.


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig20_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig20_HTML.jpg)


    Figure 7-20

    Possible process execution points


    If a process has the execution point `New Session`, it will

    execute only when a session begins. The execution points from `Before Header`
    to

    `After Footer`

    denote the six stages of page rendering; a process assigned to one of

    these points will execute during the specified rendering stage. The

    execution points `After Submit` and `Processing` are two

    stages of a submit action. You assign the process to the `After Submit` point
    if

    you want it to execute before the validation stage and to `Processing` if you

    want it to execute after validation.

    Although these options can be useful for advanced applications, the

    differences between many of the execution points are subtle and in most

    cases irrelevant. For our purposes, the only interesting distinction is

    between processes that execute during submit and those that execute

    during rendering. In particular, all processes in this book have the

    execution point `After Header` when they execute during page rendering, and `Processing`
    when they

    execute during submit.


    Turn your attention back to the `FetchRow` process, and

    change its execution point to `After Header`. You

    should observe that the node for the process will vanish from the

    processing tree and reappear in the rendering tree, as shown in Figure

    [7-21](#335103_3_En_7_Chapter.xhtml#Fig21). This makes

    sense, because the rendering tree contains everything that occurs during

    page rendering, which includes processes. This figure also shows that

    the `After Header` execution point is a *pre-rendering* point —that is, it occurs

    before the regions are rendered. This is important, as it ensures that

    `FetchRow` will

    assign values to the page items before they are rendered.


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig21_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig21_HTML.jpg)


    Figure 7-21

    FetchRow is now a rendering process'
