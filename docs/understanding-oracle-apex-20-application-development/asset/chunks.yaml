    ## 局部变量

    PL/SQL 块可以在 `begin` 关键字之前有一个 `变量声明部分`。声明部分以关键字 `declare` 开头，后跟一系列变量声明。清单 7-5 的代码声明了四个局部变量：`v_amount`、`v_saleCommission`、`v_prevCommission`
    和 `v_newCommission`。每个声明的语法类似于 SQL 中声明表列的语法，可能的变量类型也相同。例如，后三个变量的类型为 `number(7,2)`，这与
    `EMP` 表中 `Comm` 列的类型相同。

    局部变量和项引用可以在 PL/SQL 块中互换使用。区别在于，局部变量按原样引用，而项引用需要前置冒号。例如，步骤 3 中的 SQL `update` 命令同时引用了局部变量
    `v_newCommission` 和项 `P18_SOLO_SALESMAN`。

    由于项是使用绑定变量语法引用的，因此很容易识别。但是，SQL 命令中的局部变量引用很难与列名或函数调用区分开来。为避免混淆，应始终为局部变量命名，以便人们知道它们是变量。这里采用的一个常见约定是，每个局部变量名以
    `v_` 开头。


    ## 注释

    与 SQL 一样，PL/SQL 用两个连续的减号表示注释。跟在两个减号之后的所有字符直到行尾都会被忽略。


    ## 赋值语句

    PL/SQL 中的赋值语句使用 `:=` 作为赋值运算符。赋值也可以在 `declare` 部分中使用，以为局部变量分配初始值。


    ## 条件语句

    PL/SQL 支持多种形式的条件语句；清单 7-5 步骤 1 中出现的形式适用于通用目的。请注意，关键字充当部分边界：条件表达式出现在 `if` 和 `then`
    之间，当条件为 `true` 时要执行的语句出现在 `then` 和 `else` 之间，当条件为 `false` 时要执行的语句出现在 `else` 和
    `end if` 之间。通常，如果在 `else` 和 `end if` 关键字之间没有语句，则可以省略 `else` 关键字。


    ## 处理多行 SQL 查询

    现在让我们看看如何构建 `Shared Commission` 区域。其 `Enter Sale` 区域与 `Solo Commission` 区域基本相同。它的项名称是
    `P18_SHARED_SALESMAN` 和 `P18_SHARED_AMOUNT`。

    `Commission Info` 区域中的项被命名为 `P18_SHARED_SALE_COMMISSION`、`P18_SHARED_COMMISSION_EACH`
    和 `P18_SHARED_NEW_COMMISSIONS`。

    选择列表 `P18_SHARED_SALESMAN` 的属性值与 `P18_SOLO_SALESMAN` 相同；不同之处在于其 `Allow Multi Selection`
    属性设置为 `Yes`，`Height` 值为 `4`。回顾第 5 章，此类项的值是一个字符串，其中包含以冒号分隔的返回值。例如，如果从多值选择列表 `P18_SHARED_SALESMAN`
    中选择了 `ALLEN` 和 `TURNER`。由于他们对应的员工编号是 7499 和 7844，因此该项的值是字符串 `"7499:7844"`。

    从该字符串中提取所需信息并不特别容易，因此需要一些巧妙的方法。你需要做两件事：确定所选员工的数量，并从 `EMP` 表中提取他们的记录。

    请注意，所选员工的数量比字符串中的冒号数量多一。你可以通过使用 SQL `replace` 函数创建一个新字符串（其中冒号被替换为空字符串，从而有效地移除了冒号），然后比较两个字符串的长度，来确定冒号的数量。也就是说，如果
    `P18_SHARED_SALESMAN` 包含该字符串，则员工数量由以下表达式给出：

    ```

    1 + length(:P18_SHARED_SALESMAN) - length(replace(:P18_SHARED_SALESMAN, '':'',
    ''''))

    ```

    要提取每个所选员工的记录，请使用 `instr` 函数，就像你为 `Filter by Possible Department` 页面所做的那样。以下查询将检索所有选定员工的
    `EMP` 记录：

    ```

    select *

    from EMP

    where instr( '':''|| :P18_SHARED_SALESMAN||'':'',  '':''||EmpNo||'':'' ) > 0

    ```

    解决了这些问题后，你现在可以为该区域的 `Submit` 按钮编写处理过程。PL/SQL 代码如清单 7-6 所示。

    ```

    declare

    v_saleCommission number(7,2);

    v_amount         int := :P18_SHARED_AMOUNT;

    v_empCount       int;

    v_commissionEach number(7,2);

    v_empInfo        varchar2(25);

    v_output         varchar2(250) := '''';

    begin

    -- 步骤 1：计算新佣金，前 100 美元按 15%计算，

    -- 剩余销售价格按 10%计算。

    if v_amount > 100 then

    v_amount := v_amount - 100;

    v_saleCommission := 15 + (v_amount * 0.1);

    else

    v_saleCommission := v_amount * 0.15;

    end if;

    -- 步骤 2：确定共享佣金。

    v_empcount := 1 + length(:P18_SHARED_SALESMAN) - length(replace(:P18_SHARED_SALESMAN,
    '':'', '''' ));

    v_commissionEach := v_saleCommission / v_empcount;

    -- 步骤 3：更新 EMP 表。

    update EMP

    set Comm = Comm + v_commissionEach

    where instr( '':''||:P18_SHARED_SALESMAN||'':'',  '':''||EmpNo||'':'' ) > 0;

    -- 步骤 4：使用循环收集员工信息。

    for row in (

    select EName, Comm

    from EMP

    where instr( '':''||:P18_EMPNO_SHARED||'':'',  '':''||EmpNo||'':'' ) > 0 )

    loop

    v_empInfo := row.EName || '': '' || row.Comm || chr(13);

    v_output  := v_output || v_empInfo;

    end loop;

    -- 步骤 5：写入项值。

    :P18_SHARED_SALE_COMMISSION  := v_saleCommission;

    :P18_SHARED_COMMISSION_EACH  := v_commissionEach;

    :P18_SHARED_NEW_COMMISSIONS  := v_output;

    end;

    ```

    清单 7-6 处理共享佣金的 PL/SQL 代码

