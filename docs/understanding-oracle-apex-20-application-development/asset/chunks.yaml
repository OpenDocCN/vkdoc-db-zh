    ## 图 3-36 经典报表区域的报表特定属性


    `行数`属性指定一次显示报表的多少行。默认值为`15`，但我在`格式化报表`区域中将其改为了`5`。分页`类型`属性允许您选择分页控件的格式。图中所示的选项用于图
    3-24 中的`格式化报表`区域。理解其他选项的最佳方式是在你的报表上逐一尝试，观察其效果。


    ## 使用源查询进行格式化


    尽管前面的章节重点介绍了如何使用 APEX 格式化源查询的行，但重要的是要意识到，通过使用更精确的源查询，你也可以获得许多相同的功能。以下是`格式化报表`演示区域的一些示例。


    与其隐藏一列，不如直接在查询中不包含它可能更合适。特别是，`EmpNo`列在格式化报表中没有作用，最好完全排除在其源查询之外。另一方面，`Job`、`SalColor`、`OffsiteImage`和`HireYear`列是格式化其他列所必需的，因此它们必须出现在源查询中，并且必须是`隐藏列`类型。


    与其在属性编辑器中更改列的标题，不如在源查询中更改列的名称。一个例子是`EName`列，它被重命名为`Name`。替代方法是在源查询中使用`AS`关键字，如下所示：


    ```

    select EName as Name, ...

    from EMP

    ```


    如果你不希望用户能够以交互方式更改记录的排序顺序，在源查询中指定排序顺序比单独设置每个列的可排序性属性更容易。


    与其使用值列表来格式化`DeptNo`列，你可以修改源查询，使其成为`EMP`和`DEPT`表的连接，如下所示：


    ```

    select e.EName as Name, ..., d.DName, ...

    from EMP e join DEPT d

    on e.DeptNo = d.DeptNo

    ```


    在这种情况下，很难说这两种方法哪个更好。值列表方法需要 APEX 为报表的每一行搜索值列表，这可能比直接进行连接的开销更大。另一方面，值列表方法更简单，更直接地传达了设计者的意图。


    经验法则是，源查询应指定你想要显示的*内容*，而列属性应指定你想要显示的*方式*。在某些情况下（例如隐藏列），这种区分是明确的。在其他情况下（例如使用值列表），则不那么明确。


    ## 图表区域


    *图表*是显示数据点的可视化方式。一个数据点由两个值组成：x 坐标（称为*标签*）和 y 坐标（称为*值*）。例如，让我们构建一个名为`Charts`的页面，它将是应用程序的第
    4 页。此页面包含两个图表区域，如图 3-37 和 3-38 所示。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig38_HTML.png](img/335103_3_En_3_Fig38_HTML.png)


    图 3-38 员工计数图表区域


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig37_HTML.png](img/335103_3_En_3_Fig37_HTML.png)


    图 3-37 薪资信息图表区域


    柱状图由十个数据点组成，给出了每种职位员工的最低和最高工资。这些点被组织成两个*系列*，每个系列五个点。


    饼图由五个数据点组成，每种职位一个。每个点的标签是职位的名称，值是拥有该职位的员工数量。图表为每个标签显示一个饼图扇区，其大小与其值成比例。例如，十四名员工中有两名是分析师，因此`ANALYST`扇区的大小是整个饼图大小的十四分之二。


    ## 创建图表区域


    要构建此页面，首先创建一个名为`Charts`的新空白页面，并向其添加两个类型为`图表`的区域。将第一个区域命名为`薪资信息`，第二个区域命名为`员工计数`。图
    3-39 显示了这些区域最终的渲染树。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig39_HTML.jpg](img/335103_3_En_3_Fig39_HTML.jpg)


    图 3-39 两个图表区域的渲染树


    从该图中，你可以看到图表有四种属性：类型无关属性（由区域名称表示）、图表特定属性（由`属性`表示）、每个图表系列特定的属性（由`系列`表示）以及与图表轴相关的属性（由`轴`表示）。默认情况下，创建图表时带有一个系列（名为`新建`），但你可以重命名该系列并添加其他系列。


    图 3-39 中的每个系列都标有红色错误指示器，告诉你图表需要进一步配置。接下来将讨论此配置的细节。


    ### 配置图表


    每个图表都需要一个*源*，这是一个指定图表数据点的表达式。常见的源是 SQL 查询。


    如果图表有 N 个系列，那么查询将有 N+1 列——一列包含标签，其他列包含每个系列的值。例如，`薪资信息`系列的源查询如下：


    ```

    select Job, min(Sal) as MinSal, max(Sal) as MaxSal

    from EMP

    group by Job

    order by MinSal

    ```


    你指定图表源的方式类似于指定报表源的方式。图表的`源`部分包含你需要的三个属性。图 3-40 显示了`薪资信息`区域这些属性的值。


    你还应该对你的`员工计数`区域进行类似的更改，使用以下源查询：


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig40_HTML.jpg](img/335103_3_En_3_Fig40_HTML.jpg)


    图 3-40 指定薪资信息图表的源


    ```

    select Job, count(*) as EmpCount

    from EMP

    group by Job

    order by EmpCount desc

    ```


    ### 配置图表系列


    配置图表的源之后，你可以配置它的每个系列。系列的相关属性位于其`标识`、`源`和`列映射`部分。图 3-41 显示了为`薪资信息`创建的系列的这些部分。


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig41_HTML.jpg](img/335103_3_En_3_Fig41_HTML.jpg)


    图 3-41 为薪资信息图表指定一个系列

