    is `COL01` even though it contains `EmpNo` values. So select `COL01` from the
    rendering tree and set its type to `Link`. Click its `Link Target` property and
    configure the `Link Builder` wizard as shown in Figure [12-6](#335103_3_En_12_Chapter.xhtml#Fig6).
    Then set the column''s `Link Text` property to `View`.


    ![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig6_HTML.jpg](images/335103_3_En_12_Chapter/335103_3_En_12_Fig6_HTML.jpg)


    Figure 12-6

    Specifying the behavior of the column link


    You also need to configure the sortability of the report''s columns. Recall from
    Chapter [3](#335103_3_En_3_Chapter.xhtml) that each column in a classic report
    has a property named `Sortable`—turning on its value enables users to sort on
    that column by clicking its header, and turning it off disables sorting on that
    column. The issue is how APEX should handle sortability when the source query
    also has an `order by` clause. APEX resolves this issue differently, depending
    on whether columns are generic or not. If columns are not generic, then the `order
    by` clause takes precedence—the `Sortable` property of each column will be turned
    off and cannot be turned on. On the other hand, if the columns are generic, then
    their `Sortable` properties take precedence—they are turned on by default, and
    the `order by` clause of the source query is ignored. APEX will only recognize
    the `order by` clause when the `Sortable` property of each column has been turned
    off. In other words, if you want your report to be sorted according to the value
    of `P45_SORTFIELD`, then you must turn off the `Sortable` property for each of
    the five generic columns in the `Employees` report.


    You should now have a working sortable report. Test it out. Selecting a sort field
    should cause the report to re-render with the new sort order, and clicking the
    link for a row should display the `Emp Info` region for the selected row.


    The remaining issue is that the `Previous` and `Next` buttons still use `EName`
    as the sort field. You need to modify the process that underlies those buttons
    so that it refers to `P45_SORTFIELD` instead of `EName`. This process was called
    `FindPreviousNext` in Chapter [7](#335103_3_En_7_Chapter.xhtml), and its code
    appeared in Listing [7-18](#335103_3_En_7_Chapter.xhtml#PC34). For reference,
    Listing [12-8](#335103_3_En_12_Chapter.xhtml#PC17) reprints that code.


    ```

    begin

    if :P20_EMPNO is not null then

    select PrevEmp, NextEmp

    into :P20_PREV, :P20_NEXT

    from (select EmpNo, lag(EmpNo)  over (order by EName) as PrevEmp,

    lead(EmpNo) over (order by EName) as NextEmp

    from EMP)

    where EmpNo = :P20_EMPNO;

    end if;

    end;

    ```


    Listing 12-8

    Original Code for the FindPreviousNext Process


    The revised code appears in Listing [12-9](#335103_3_En_12_Chapter.xhtml#PC18).
    Although this code seems complex, it is essentially the original code broken into
    pieces and translated into dynamic SQL. The initial if-statement handles the case
    in which no sort field has been chosen.


    ```

    declare

    v_subquery varchar2(200);

    v_query    varchar2(250);

    v_sort     varchar2(20);

    begin

    if :P45_EMPNO is not null then

    if :P45_SORTFIELD is null then

    v_sort := ''EName'';

    else

    v_sort := :P45_SORTFIELD;

    end if;

    v_subquery :=

    ''select EmpNo, '' ||

    ''lag(EmpNo)  over (order by '' || v_sort || '') as PrevEmp, '' ||

    ''lead(EmpNo) over (order by '' || v_sort || '') as NextEmp '' ||

    ''from EMP'';

    v_query := ''select PrevEmp, NextEmp '' ||

    ''from ('' || v_subquery || '') '' ||

    ''where EmpNo = :1'';

    execute immediate v_query

    into :P45_PREV, :P45_NEXT

    using :P45_EMPNO;

    end if;

    end;

    ```


