  trans: "\n## 密码处理\n\n密码的处理方式需要一些说明。出于安全考虑，密码应始终以编码形式存储，而非明文。清单 13-1 使用了函数 `apex_util.get_hash`\
    \ 来执行编码。该函数在第 7 章中介绍，并曾用于丢失更新检测。回想一下，该函数接受一个值集合作为输入，并生成一个字符串作为输出。构造函数 `apex_t_varchar2`\
    \ 从其参数创建值集合。例如，`ADMIN` 的编码密码是调用哈希函数时以集合 `['ADMIN','1234']` 作为输入的输出结果。\n\n使用哈希函数进行密码编码的原因在于它能混淆输入值——仅凭函数的输出，他人实际上无法确定其输入。因此，您可以放心，即使数据库系统遭到入侵（例如，硬盘被盗），入侵者也无法轻易利用已编码的密码信息。\n\
    \n清单 13-1 中的哈希密码将用户名作为哈希值的一部分。这种技术通过挫败以下攻击，在一定程度上提高了安全性：入侵者创建一个账户，然后为其创建一系列密码，并记下每个密码的哈希值。然后，入侵者可以将这些哈希密码与从\
    \ `USERS` 表中窃取的密码进行比较。假设检测到匹配项。如果用户名不是哈希值的一部分，那么入侵者很可能发现了某个用户的密码。但是，如果用户名是哈希值的一部分，那么检测到匹配项对入侵者来说毫无意义。\n\
    \n`apex_util.get_hash` 函数有两个参数：第一个是要哈希的值集合，第二个参数是一个布尔值。清单 13-1 中的第二个参数是 `null`，这被视为\
    \ `false`。在第 7 章中，该函数仅使用一个参数调用，这意味着第二个参数值为 `true`。第二个参数指示函数是否应将会话 ID 添加到输入值中。如果哈希值包含会话\
    \ ID，安全性会更高，但这样它就只能在该会话的范围内使用。因为丢失更新检测发生在一个会话内，所以使用 `true` 作为第二个参数是合理的，这正是第 7\
    \ 章中的情况。然而，密码编码是跨会话的，因此必须使用 `false`（或 `null`）作为第二个参数。\n\n## 添加用户账户\n\n您的 `Employee\
    \ Demo` 应用程序需要一种方法向 `USERS` 表添加其他行。图 13-5 展示了一个名为 `管理用户` 的页面，用于此目的；它将是应用程序的第 46\
    \ 页。该页面有两个区域：`所有用户` 区域列出来自 `USERS` 的记录，而 `创建用户` 区域允许您向该表添加用户。（请注意，截图截断了 `所有用户`\
    \ 区域中的密码值以节省空间。）\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig5_HTML.jpg](img/335103_3_En_13_Fig5_HTML.jpg)\n\
    *图 13-5 演示应用程序的管理用户页面*\n\n`所有用户` 区域是一个经典报表，其数据源是 SQL 查询：\n\n```sql\nselect UserName,\
    \ IsAdministrator, Password\nfrom USERS\n```\n\n我将编码后的密码放在报表中仅用于演示目的。在真实的应用程序中，不应显示编码后的密码——这些值没有有用的管理用途，显示它们会增加密码被破解的可能性。\n\
    \n`创建用户` 区域包含四个项目和一个提交按钮。这些项目定义如下：\n\n*   `P46_NAME` 的类型为 `纯文本`。\n*   `P46_ADMIN`\
    \ 的类型为 `开关`。\n*   `P46_PASSWORD` 和 `P46_CONFIRM` 的类型为 `密码`。\n\n图 13-5 显示了在添加名为\
    \ `JOE` 的非管理员用户（密码为“`joe`”）之前此页面的内容。虽然此用户名是以小写输入的，但为了确保用户名不区分大小写，它将在表中以大写保存。当然，密码将使用哈希函数保存为编码字符串。\n\
    \n当您点击提交按钮创建新用户账户时，将执行两项验证和一个处理过程。一项验证确保所选用户名尚未出现在 `USERS` 表中。此验证的类型为 `未返回行`，并由以下查询定义：\n\
    \n```sql\nselect * from USERS\nwhere UserName = upper(:P46_NAME)\n```\n\n另一项验证确保两个密码相同。此验证的类型为\
    \ `SQL 表达式`，并由以下代码定义：\n\n```sql\n(:P46_PASSWORD = :P46_CONFIRM) or\n(:P46_PASSWORD\
    \ is null and :P46_CONFIRM is null)\n```\n\n验证的第二行考虑了密码可能为 `null` 的情况。\n\n该处理过程将用户名转换为大写，对密码进行哈希处理，然后向\
    \ `USERS` 表插入一条记录。其代码见清单 13-2。\n\n```sql\ndeclare\n    v_username     varchar2(20)\
    \ := upper(:P46_NAME);\n    v_valuesToHash apex_t_varchar2 :=\n        apex_t_varchar2(v_username,\
    \ :P46_PASSWORD);\nbegin\n    insert into USERS (UserName, Password, IsAdministrator)\n\
    \    values (v_username,\n            apex_util.get_hash(v_valuesToHash, null),\n\
    \            :P46_ADMIN);\nend;\n```\n*清单 13-2 用于创建新用户的代码*\n\n## 用户身份验证\n\n既然您有了创建用户的方法，就需要创建一个方案来对他们进行身份验证。返回到应用程序的\
    \ `身份验证方案` 屏幕，创建一个新的 `自定义` 方案，其身份验证函数如清单 13-3 所示。\n\n```sql\nfunction custom_authentication\
    \ (p_username in varchar2,\n                                p_password in varchar2)\
    \ return boolean\nis\n    v_userName     varchar2(20) := upper(p_username);\n\
    \    v_valuesToHash apex_t_varchar2 :=\n        apex_t_varchar2(v_username, p_password);\n\
    \    v_userCount    int;\nbegin\n    select count(*) into v_userCount\n    from\
    \ USERS\n    where UserName = v_userName\n    and   Password = apex_util.get_hash(v_valuesToHash,\
    \ null);\n    return v_userCount = 1;\nend;\n```\n*清单 13-3 自定义身份验证函数*\n\n此身份验证函数将提供的用户名转换为大写，以确保用户名不区分大小写。然后它执行一个查询，检查\
    \ `USERS` 表中是否存在具有该用户名和编码密码的记录。如果存在，则返回 `true`。创建此身份验证方案后，请将其设为当前方案。然后运行您的应用程序。练习以\
    \ `ADMIN`、`GUEST` 和 `JOE` 的身份登录。转到 `管理用户` 页面创建另一个用户，然后注销并以该用户身份重新登录。\n\n## 公开页面\n\
    \n考虑一个身份验证方案不是 `无身份验证` 的应用程序。当未经身份验证的用户尝试访问应用程序的任何页面时，该用户将被定向到 `登录` 页面，并且在通过身份验证之前不允许继续。然而，Web\
    \ 应用程序通常包含无需身份验证的公开页面，以及需要身份验证的私有页面。APEX 属性 `身份验证` 允许您指定哪些页面应为公开页面。\n\n例如，假设您希望\
    \ `Employee Demo` 应用程序的主页是公开的。转到该页面的属性编辑器，向下滚动直到找到 `安全` 部分。其 `身份验证` 属性有两个值：`页面需要身份验证`（默认值）和\
    \ `页面是公开的`。参见图 13-6。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig6_HTML.jpg](img/335103_3_En_13_Fig6_HTML.jpg)\n\
    *图 13-6 指定公开页面*\n"
- fmt: 'Change the value to `Page is Public` and save the page. To test the change,
    log out of the application. You will find that APEX enables you to visit the application’s
    home page, but if you try to access any other page, you will be requested to log
    in.


    ## Authorization


    An authentication scheme specifies which users are allowed to access the non-public
    pages of an application. It is a good start, but often is not sufficient. A web
    application can have several types of users, with certain pages (or parts of pages)
    appropriate only for certain types. So you need a way to specify which users can
    access what information. This aspect of security is called `authorization`.


    APEX implements authorization by allowing each page or page component to have
    an associated `authorization scheme`, which specifies a set of allowed users.
    If a page (or component) has an authorization scheme, it will be visible only
    to the users specified by that scheme.


    ## Creating an Authorization Scheme


    Recall that the built-in variable `APP_USER` holds the username of the current
    user. An APEX authorization scheme is defined by a Boolean expression, typically
    involving the value of `APP_USER`; a user is authorized when the expression returns
    `true`.


    Authorization expressions are similar to validation expressions, and their types
    are similar. For example, the `Exists SQL Query` type returns `true` if the query
    output contains at least one record. The type `PL/SQL function returning Boolean`
    is PL/SQL code that explicitly returns `true` or `false`.


    As an example, let’s create three authorization schemes for the `Employee Demo`
    application:


    *   `Administrators`, which returns `true` if the current user has administrative
    privileges.

    *   `Guests`, which returns `true` if the current username is `GUEST`.

    *   `Built-in Users`, which returns `true` if the current username is `GUEST`
    or `ADMIN`.


    The `Administrators` scheme can be defined by the following `Exists SQL` query:


    ```sql

    select *

    from USERS

    where UserName = :APP_USER and IsAdministrator = ''Y''

    ```


    The `Guests` scheme can be defined by the following PL/SQL function:


    ```sql

    return :APP_USER = ''GUEST'';

    ```


    The `Built-in Users` scheme can be defined by the following PL/SQL function:


    ```sql

    return :APP_USER = ''GUEST'' or :APP_USER = ''ADMIN'';

    ```


    To create an authorization scheme, go to the home page for the application, click
    the `Shared Components` button, and then select `Authorization Schemes` from the
    `Security` section. You are taken to a screen that lists the authorization schemes
    that have been created for your application; my initial screen is shown in Figure
    13-7. My APEX server automatically creates the `Administration Rights` scheme
    for each application I create. My `Employee Demo` application doesn’t need it,
    so I chose to delete it. Feel free to delete yours if your application also has
    one.


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig7_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig7_HTML.jpg)


    *Figure 13-7 The initial Authorization Schemes screen*


    Clicking the `Create` button brings up the first screen of the authorization scheme
    wizard, which is shown in Figure 13-8. Specify that you want to create the scheme
    “from scratch.” Clicking the `Next` button will bring up the second page of the
    wizard. On this screen, give the scheme a name, select its type, and enter the
    specification in the appropriate box; Figure 13-9 shows these specifications for
    the `Administrators` scheme.


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig9_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig9_HTML.jpg)


    *Figure 13-9 Second screen of the Create Authorization wizard*


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig8_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig8_HTML.jpg)


    *Figure 13-8 First screen of the Create Authorization wizard*


    The second wizard screen also asks you to provide an error message (such as `Administrator
    access only`) and to specify how often the authorization scheme should be validated.
    Two common choices are `Once per session` and `Once per page view`. Evaluating
    the scheme once per session is far more efficient and is the default. You would
    choose to evaluate once per page view only if the authorization condition is likely
    to change within the session.


    For example, consider the authorization scheme defined by the following PL/SQL
    function:


    ```sql

    return :APP_USER = ''ADMIN''

    and extract(hour from current_timestamp) >= 9

    and extract(hour from current_timestamp) < 17;

    ```


    This scheme returns `true` only for the `ADMIN` user and only between the hours
    of 9 a.m. and 5 p.m. If the purpose of the authorization scheme is to restrict
    access to those times, its evaluation point needs to be `Once per page view`.


    After creating the `Administrator` authorization scheme, you should also create
    authorization schemes for `Guest` and `Built-In Users` using the conditions described
    earlier. Assuming that you deleted the pre-built Administrator Rights scheme,
    your `Authorization Schemes` screen should now look like Figure 13-10.


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig10_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig10_HTML.jpg)


    *Figure 13-10 The current Authorization Schemes screen*


    ## Component Authorization


    Every page component has a property `Authorization Scheme`, which appears in its
    `Security` section. You assign an authorization scheme to the component by choosing
    from a select list. Figure 13-11 depicts this select list for my `Employee Demo`
    application.


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig11_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig11_HTML.jpg)


    *Figure 13-11 Assigning an authorization scheme to a component*'
