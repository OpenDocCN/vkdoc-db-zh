    清单 8-3

    用于检测丢失更新的验证代码

    ```


    该验证以 `更新` 按钮为条件，其错误消息是 “`记录已过期。请重新获取`”。结果是，只有当验证成功时，`更新` 过程才会执行。如果验证失败，错误消息将显示在
    `员工数据录入` 页面上。


    ## 总结


    本章探讨了防止用户无意中误用 Web 应用程序的方法。首先考虑了数据库约束。您看到了如何通过适当选择的项类型来避免潜在问题。例如，基于列表的项类型可以避免外键约束违规。您还研究了诸如必填值、最小/最大数值等项属性，这些可以避免或检测约束违规。

    接着，本章讨论了 APEX 验证的使用。验证是一种 APEX 组件，其目的是中止不适当的提交操作。验证提供了一种灵活、通用的约束处理方式。它们可以为约束违规显示自定义错误消息，并可用于有选择地检查约束违规。除了约束违规检查外，它们还可用于检查不适当的用户活动。

    最后，本章重新审视了 第 7 章中用于检查潜在丢失更新的代码。您看到了如何使用验证将丢失更新测试代码与更新数据库的代码分离开来，这带来了更清晰的设计和更好的错误处理。


    # 9. 分支


    当 APEX 服务器从浏览器接收到提交请求时，它会执行与该请求关联的验证和处理。其最终任务是选择要发送到浏览器的目标页面。默认情况下，APEX 选择被提交的页面，但也可以通过创建
    *分支* 来指定另一个页面。

    到目前为止，您在不使用分支的情况下就能完成本书的学习，是因为在页面上创建多个区域非常容易，并且这些区域可以有条件地渲染，从而产生多个页面的效果。但在许多情况下，应用程序将使用多个页面来实现用户活动。本章将研究使用分支来支持这些情况。


    ## 将输入与输出分离


    一种常见的应用程序设计技术是为输入和输出使用单独的页面。用户在一个页面上输入内容并单击按钮；然后应用程序分支到另一个显示输出的页面。

    作为此技术的示例，考虑图 9-1 和 9-2 所示的两个页面。这两个页面各有一个区域，其工作方式类似于第 6 章中的双区域 `按职位和部门筛选` 页面。具体来说，用户从图
    9-1 所示的 `筛选与分支` 页面开始，从选择列表中选择职位和部门，然后单击按钮。系统随后分支到图 9-2 的 `筛选后的员工` 页面，该页面显示具有该职位且属于该部门的员工报告。


    ![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig2_HTML.jpg](img/335103_3_En_9_Fig2_HTML.jpg)


    图 9-2

    筛选后的员工页面


    ![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig1_HTML.jpg](img/335103_3_En_9_Fig1_HTML.jpg)


    图 9-1

    筛选与分支页面


    让我们研究如何实现这些页面。`筛选与分支` 页面将是 `员工演示` 应用程序的第 22 页。其区域标题为 `选择值`，类型为 `静态内容`。它有两个选择列表，分别名为
    `P22_JOB` 和 `P22_DEPTNO`。这些选择列表的值列表由与第 6 章相同的 SQL 查询指定。具体来说，`P22_JOB` 的查询是


    ```

    select distinct Job as DisplayVal, Job as ResultVal

    from EMP

    order by DisplayVal

    ```


    而 `P22_DEPTNO` 的查询是


    ```

    select DName, DeptNo

    from DEPT

    order by DName

    ```


    `筛选后的员工` 页面是演示的第 23 页，其区域是一个经典报告。其源查询（与您在 第 6 章看到的也相似）如下：


    ```

    select EmpNo, EName, Job, Sal, DeptNo

    from EMP

    where (:P22_JOB is null  or  Job = :P22_JOB)

    and   (:P22_DEPTNO is null  or  DeptNo = :P22_DEPTNO)

    order by EName

    ```


    每个页面都有一个按钮。`筛选与分支` 页面上的 `提交` 按钮将执行提交操作，以将其两个项值保存在会话状态中。`筛选后的员工` 页面上的 `返回` 按钮可以直接重定向回第
    22 页，因为它不需要提交。

    `筛选与分支` 页面将在导航菜单中有一个条目。而 `筛选后的员工` 页面则不会，因为访问该页面的唯一方式应该是通过 `筛选与分支` 页面。这种情况是普遍存在的——当一个交互被分解到多个页面时，通常只有交互的第一页可以从导航菜单访问。

    还有两个尚未讨论的实现问题：如何自定义 `筛选后的员工` 页面的区域标题，以及如何让第 22 页在提交时重定向到第 23 页？每个问题将依次讨论。

    首先考虑 `筛选后的员工` 区域。使用单独页面进行输出的一个缺点是输入不再可见。图 9-2 中的设计策略是在区域的标题栏中重述输入。让我们研究如何实现此功能。

    回想一下，区域的 `标题` 属性是 HTML 代码。虽然 HTML 代码无法执行计算，但它可以引用项的值。因此，技术是编写一个过程来计算区域标题并将其保存在一个隐藏项中。清单
    9-1 给出了该过程的代码。此代码考虑了两个项为空或不为空的四种情况，适当地计算区域标题，并将其保存在隐藏项 `P23_REGION_TITLE` 中。

    '
- fmt: '# 9.1 分支


    ## 代码清单 9-1

    自定义“筛选的员工”区域的标题


    ```

    declare

    v_title varchar(100);

    begin

    if :P22_JOB is not null and :P22_DEPTNO is not null

    then

    v_title := ''Job='' || :P22_JOB  || '' and Dept='' || :P22_DEPTNO;

    elsif :P22_JOB is not null then

    v_title := ''Job='' || :P22_JOB;

    elsif :P22_DEPTNO is not null then

    v_title := ''Dept='' || :P22_DEPTNO;

    else

    v_title := ''All Employees'';

    end if;

    :P23_REGION_TITLE := ''Filter by '' ||  v_title;

    end;

    ```


    这个过程属于页面22，并且取决于`Submit`按钮。`Filtered Employees`区域的HTML表达式随后变为对那个隐藏项目的引用。具体来说，区域标题是HTML表达式“`&P23_REGION_TITLE.`”。注意，该表达式使用替换字符串语法来引用该项目。


    ## 创建分支


    要让页面22重定向到页面23，你需要创建一个*分支*对象。分支对象类似于过程，因为它也是响应提交而执行操作。区别在于过程执行代码，而分支重定向到某个页面。分支通常在所有过程执行完毕后最后执行。


    创建分支与创建过程类似。首先转到页面设计器的`Processing`选项卡。右键单击标记为`After Processing`的节点，然后选择`Create
    Branch`。APEX将创建一个未命名的分支，其属性如图9-3所示。


    ![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig3_HTML.jpg](images/335103_3_En_9_Chapter/335103_3_En_9_Fig3_HTML.jpg)

    图9-3

    新创建分支的属性


    你应该为分支命名。但还需要做什么呢？图9-3中显示的两个重要属性是`Point`和`Type`；它们的默认值指定该分支将在所有进程之后执行，并重定向到指定的页面或URL。这些默认值几乎总是你想要的，你应该保持它们不变。


    唯一需要你关注的属性是`Target`。此属性显示错误，表明你需要指定分支的目标。点击该属性的`Target`属性会打开`Link Builder`向导。图9-4显示了该向导，配置为重定向到页面23。


    ![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig4_HTML.jpg](images/335103_3_En_9_Chapter/335103_3_En_9_Fig4_HTML.jpg)

    图9-4

    使用链接构建器指定分支目标


    分支还有一个`Server-side Condition`部分，用于指定何时执行分支。与过程类似，每个分支通常关联一个按钮，你在`When Button Pressed`属性中指定该按钮。`Filter
    and Branch`演示页面中的分支应该与`Submit`按钮关联，并且没有其他条件。


    ## 条件分支


    在第7章中，你创建了`Employee Data Entry`页面（如图7-5所示）和`Single Row Update`页面（如图7-24所示）。这些页面具有相似的功能——它们都允许用户插入、删除和更新`EMP`表——但它们使用截然不同的界面来实现。特别是，`Employee
    Data Entry`页面非常宽泛；它同时显示所有报告和更新区域。另一方面，`Single Row Update`页面很紧凑，一次只显示一个区域。


    让我们构建一个帮助用户决定使用哪个页面的页面。这个页面称为`Preference Chooser`，是演示应用程序的第24页，如图9-5所示。该页面有一个区域，向用户提出两个问题。用户回答这些问题并点击按钮；如果第一个答案是`No`或第二个答案是`Yes`，按钮将分支到页面17（`Employee
    Data Entry`页面），否则分支到页面21（`Single Row Update`页面）。


    ![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig5_HTML.jpg](images/335103_3_En_9_Chapter/335103_3_En_9_Fig5_HTML.jpg)

    图9-5

    带有条件分支的页面


    你可以如下实现此页面：两个单选按钮组名为`P24_COMPACT`和`P24_SEE_TABLE`，具有静态值列表{`No`, `Yes`}。


    该按钮执行提交操作。直观上，你可能会认为按钮决定分支到哪个页面。但分支的工作方式并非如此；相反，你需要创建两个分支对象，每个对象都以该按钮为条件。每个分支还将有一个额外的条件。重定向到页面17的分支对象具有以下条件：


    ```

    :P24_COMPACT = ''No'' or :P24_SEE_TABLE = ''Yes''

    ```


    重定向到页面21的分支对象具有以下条件：


    ```

    :P24_COMPACT = ''Yes'' and :P24_SEE_TABLE = ''No''

    ```


    当按钮执行提交时，只有一个条件会被满足。满足条件的分支将执行其重定向。


    ## 向导式界面


    分支的最后一个例子也与数据输入问题相关。在第7章的每个数据输入页面中，用户通过在某些项目中输入所需值然后点击插入按钮来创建新记录。这样的设计假设用户手头有这些值。另一种设计是创建一系列页面，引导用户完成数据输入过程，就像APEX中的向导一样。该设计将包含四个页面。


    用户将从`Basic Info`页面开始（参见图9-6），输入新员工的姓名、职位、部门和工资。最常见的情况是员工在当天被雇用，因此有一个针对该情况的复选框。然后用户点击`Continue`按钮提交页面。


    ![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig6_HTML.jpg](images/335103_3_En_9_Chapter/335103_3_En_9_Fig6_HTML.jpg)

    图9-6

    输入基本信息


    下一步是确定员工的经理。假设公司按如下方式为员工分配经理：总裁没有经理，职位为`MANAGER`的员工向总裁汇报，其他员工（职员除外）向其部门的经理汇报。例外情况是职员。职员的经理可以是同一部门中除另一名职员外的任何员工，因此用户需要明确指定新职员的经理。


    如果新员工是职员，点击`Continue`按钮将分支到`Manager Info`页面（参见图9-7），用户在其中从选择列表中选择员工的经理。


    ![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig7_HTML.jpg](images/335103_3_En_9_Chapter/335103_3_En_9_Fig7_HTML.jpg)

    图9-7

    选择经理


    如果`Basic Info`页面上的`hiredate`复选框未选中，应用程序将分支到`Hiredate Info`页面（参见图9-8），让用户选择一个日期。此分支可能来自`Manager
    Info`页面或`Basic Info`页面，具体取决于员工是否是职员。选择日期后，用户点击`Continue`按钮。


    ![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig8_HTML.jpg](images/335103_3_En_9_Chapter/335103_3_En_9_Fig8_HTML.jpg)

    图9-8

    选择员工的雇佣日期'
