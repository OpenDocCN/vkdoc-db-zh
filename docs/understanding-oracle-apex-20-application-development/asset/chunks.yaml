- fmt: 'Turning on the `Override User Interface Level` property causes the `List`
    property to be displayed. You can then choose the list that will be the navigation
    menu for the page, or you can choose to not specify the navigation menu.


    Storing links in a list and displaying them in a list region is an important technique;
    it is far superior to manually formatting the links in HTML, as you did on the
    `References` region of the home page. One reason is that the template of a list
    region takes responsibility for formatting the list entries; you just need to
    choose the template you want. In other words, a list region separates the content
    (the source list) from the formatting (the list template). Writing HTML code to
    implement a list is not only tedious, but it also intermixes content and formatting.
    Any decision to change the format of the entries would require you to rewrite
    the HTML.


    A second advantage of using a list region is that it will automatically be updated
    as the list changes. This is especially important for regions that display the
    `Desktop Navigation Menu` list. For example, whenever you create a navigation
    menu entry for a new page, the `Navigation Menu` region of Figure [4-15](#335103_3_En_4_Chapter.xhtml#Fig15)
    will adjust accordingly.


    ## Hierarchical Lists


    The `Employee Demo` application currently has six entries in its `Desktop Navigation
    Menu` list. Because there are so few entries, it is reasonable to simply display
    them linearly along the side (or top) of the page. However, as the number of entries
    grows, a long linear list becomes unwieldy. The common solution is to display
    the entries hierarchically.


    The APEX navigation bar (shown in Figure [1-3](#335103_3_En_1_Chapter.xhtml#Fig3))
    is a case in point. Its first tab (containing the logo) corresponds to the APEX
    home screen; the other tabs correspond to general categories of the APEX site.
    Each category tab has a primary target page, which acts as the home screen for
    that category. Clicking the main portion of a category tab takes you to that page.
    Each category tab also has a down arrow; clicking it displays a menu of secondary
    tabs for that category. The result is a functional but clean interface, with the
    secondary tabs hidden until needed.


    In a hierarchical list, each list entry can have a `parent` entry. A list entry
    without a parent defines a hierarchy and is called the `root` of that hierarchy.
    A hierarchy can have several levels, in the sense that the parent of an entry
    may also have a parent. For example, Figure [4-20](#335103_3_En_4_Chapter.xhtml#Fig20)
    shows the `App Builder` entry of the APEX navigation bar. One of its children,
    `Workspace Utilities`, has its own children.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig20_HTML.png](images/335103_3_En_4_Chapter/335103_3_En_4_Fig20_HTML.png)

    *Figure 4-20: App Builder menu in the APEX navigation bar*


    Let''s see how to restructure the `Employee Demo` application similarly. Its `Desktop
    Navigation Menu` list will consist of the home page plus two hierarchies:


    *   A `Regions` hierarchy that contains the pages `Region Practice`, `Classic
    Reports`, `Charts`, and `Interactive Reports`

    *   A `Lists` hierarchy that contains the page `List Practice`


    Each hierarchy corresponds to a chapter of the book—the `Regions` hierarchy contains
    the pages developed in Chapter [3](#335103_3_En_3_Chapter.xhtml), and the `Lists`
    hierarchy contains the page from Chapter [4](#335103_3_En_4_Chapter.xhtml). As
    the book progresses, I shall keep to this convention, creating a new hierarchy
    for the pages developed in each chapter.


    But before you begin to create the hierarchies, you need to consider how you will
    configure each root entry. Clearly, the value of its `Parent List Entry` property
    should be `null`, denoting that it is a root. However, what value should you give
    to its `Target` properties? There are three reasonable strategies: you can create
    a dedicated "home screen" to be the target, or you can set the target to be the
    same as the target of one of its children, or you can set the target to be `null`.
    APEX adopts the first strategy—it has a home screen for the application builder,
    one for the SQL workshop, and so on. Adopting the second strategy has the effect
    of making the chosen target be the default page for that section. And adopting
    the third strategy makes it impossible to choose the parent, thereby forcing the
    user to select one of the children. This book shall follow the convention that
    a root having a single child will have that child be its target, whereas a root
    having several children will have a null target.


    To create this hierarchical list, begin at the `List Details` screen for the `Desktop
    Navigation Menu`, which appeared in Figure [4-2](#335103_3_En_4_Chapter.xhtml#Fig2).
    Create two new list entries to be the roots of the two hierarchies, and set their
    target pages according to the preceding convention: the target of the `Regions`
    entry should be null, and the target of the `Lists` entry should be the `List
    Practice` page.


    You now need to set the parents of the five child entries. The straightforward
    way is to go to the `List Entry` screen for each entry (as shown in Figure [4-3](#335103_3_En_4_Chapter.xhtml#Fig3))
    and modify its `Parent List Entry` property. However, the `List Details` screen
    has a wizard to expedite this process. Click the link titled `Reparent List Entries
    Within this List` at the right side of the `List Details` screen. The link brings
    you to a `Reparent List Entries` screen, from which you can quickly specify the
    children of a given parent entry. Whichever way you do it, the resulting entries
    for the desktop navigation menu should look like Figure [4-21](#335103_3_En_4_Chapter.xhtml#Fig21).


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig21_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig21_HTML.jpg)

    *Figure 4-21: Entries for a hierarchical navigation menu*


    Figure [4-22](#335103_3_En_4_Chapter.xhtml#Fig22) shows a screenshot of the resulting
    navigation menu, where I clicked the `Regions` menu to see its children.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig22_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig22_HTML.jpg)

    *Figure 4-22: Hierarchical navigation menu*


    Each time you create a new page, you could use the preceding techniques to add
    an entry for it to the `Desktop Navigation Menu` list. However, it is often more
    convenient to add a new entry into the list as the page is created. Consider the
    third screen of the create page wizard, shown in Figure [4-23](#335103_3_En_4_Chapter.xhtml#Fig23).


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig23_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig23_HTML.jpg)

    *Figure 4-23: Specifying the menu hierarchy during page creation*'
