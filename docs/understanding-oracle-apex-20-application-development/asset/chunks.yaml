    Figure 3-67 Interactive report in single row view


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig66_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig66_HTML.jpg)

    Figure 3-66 Interactive report with its link column


    The property editor for the region’s `Attributes` component has two sections—`Link`
    and `Single Row View`—that let you enable the link column and configure its behavior.
    The properties for the `Link` section appear in Figure [3-68](#335103_3_En_3_Chapter.xhtml#Fig68).


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig68_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig68_HTML.jpg)

    Figure 3-68 Properties to enable single-record view


    To enable the link column, set the value of the `Link Column` property to `Link
    to Single Row View`. (You can also set it to link to an arbitrary URL, but this
    choice is less interesting.) You then have to specify which row is to be selected
    when the link is clicked. The value `ROWID` says to use the row that was clicked,
    which is the most natural.


    Figure [3-69](#335103_3_En_3_Chapter.xhtml#Fig69) shows the `Single Row View`
    section. The interesting property here is `Only Displayed Columns`: turning it
    on specifies that the single row view should display the same columns as the report;
    turning it off specifies that it should display all the columns.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig69_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig69_HTML.jpg)

    Figure 3-69 Single Row View properties


    ## Summary


    This chapter focused on the design and use of APEX regions. You began by examining
    different ways to create a region, the properties needed to specify its location
    on a page, and its look and feel. You then explored four common region types:
    `Static Content`, `Classic Report`, `Chart`, and `Interactive Report`. You looked
    at how regions of each type are used and how to take advantage of their type-specific
    properties to format them effectively.


    A static content region is used primarily to display HTML code. You examined the
    APEX-specific nuances associated with relative references—in particular, how to
    refer to an image stored on the APEX server and how to link to a page of the current
    application. These relative references relied on the value of certain APEX built-in
    variables, such as `APP_IMAGES` and `APP_ID`. You saw how to use `substitution
    strings` to access the value of these variables.


    A classic report region displays the output of an SQL query. You saw how to use
    APEX properties to customize the way the region is displayed. Of particular interest
    is a column’s `HTML Expression` property, which lets you format a column value
    by wrapping it in an HTML expression. You also saw how to perform conditional
    formatting by modifying the report’s source query.


    A chart region displays a chart. You saw how to use an SQL query to specify the
    content of the chart and how to take advantage of the properties that configure
    the way the chart looks.


    An interactive report region displays a report, similar to a classic report region.
    The interactive report differs in two ways. First, its search bar enables users
    to customize the report interactively. Second, its link column allows users to
    view the report in single-record mode. You examined the functionality provided
    by these features and compared them with what is possible using classic report
    and chart regions. You also saw how an application developer can enable only parts
    of this functionality by setting the properties of the interactive report region,
    as desired.


    ## 4. Navigation


    The user of a web application should be able to easily navigate through its pages.
    You have already encountered three navigational features in your use of APEX:
    links, breadcrumbs, and the navigation menu. This chapter examines these features
    in detail and shows you different ways to use them in your applications.


    ### Lists


    In common parlance, a `list` is simply a collection of things. In APEX, however,
    a list is a collection of links. A list is a useful navigation tool, for the obvious
    reason that clicking a link takes you to a new page.


    For a good example of an APEX list, consider again the SQL Workshop home screen,
    as shown in Figure [1-3](#335103_3_En_1_Chapter.xhtml#Fig3). Its `Create Object`
    region is a list that enables quick access to the various object–creation wizard
    pages. That list has an entry for each kind of SQL object, with its link taking
    you to the creation wizard for that object.


    For another example, recall the home page of the `Employee Demo` application,
    as shown in Figure [3-17](#335103_3_En_3_Chapter.xhtml#Fig17). Its `References`
    region is a list with links that take you to selected web pages.


    Perhaps the most notable example of a list is the navigation menu. Each of its
    entries is a link that takes you to the specified page of the application.


    The APEX `list manager` lets you view, edit, and create lists. To get to the list
    manager, begin at the application’s home screen and click the large `Shared Components`
    button at the top of the page. Search for the `Navigation` section and click `Lists`.
    You will be taken to the main screen of the list manager, which is shown in Figure
    [4-1](#335103_3_En_4_Chapter.xhtml#Fig1).


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig1_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig1_HTML.jpg)

    Figure 4-1 List manager


    The figure shows that the application already has two lists: `Desktop Navigation
    Bar` and `Desktop Navigation Menu`. APEX treats these lists in a special way—their
    respective entries are displayed in the navigation bar (which runs across the
    top of the page) and the navigation menu (which runs down the left side of the
    page).


    ### Viewing List Details


    Clicking the name of a list (or selecting the `List Details` link at the top of
    the screen) brings you to the `List Details` screen. Figure [4-2](#335103_3_En_4_Chapter.xhtml#Fig2)
    shows this screen for the `Desktop Navigation Menu` list.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig2_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig2_HTML.jpg)

    Figure 4-2 Details of the Desktop Navigation Menu list


    The screen displays information about each entry in the selected list. The most
    relevant values are `Sequence`, `Name`, and `Target`.


    *   The sequence numbers determine the order in which the entries appear in the
    list.

    *   The name of an entry specifies how it is displayed in the list.

    *   The target of an entry is the URL that is called when the link is clicked.


    Note in the figure that each target URL refers to a page of the current application,
    using the syntax described in Chapter [2](#335103_3_En_2_Chapter.xhtml). One new
    aspect of that syntax is the string "`&DEBUG.`", which appears as the fifth argument
    to each URL. This portion of the URL specifies that the application should continue
    to use the current debug mode (which is an issue of minor concern, and is ignored
    in this book).


    ### Editing List Entries


    The name of each entry in the `List Details` screen is a link. Clicking the link
    for an entry takes you to a `List Entry` screen, in which you can edit the entry’s
    values. Figure [4-3](#335103_3_En_4_Chapter.xhtml#Fig3) shows a portion of this
    screen that results from clicking the `Region Practice` entry.


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig3_HTML.jpg](images/335103_3_En_4_Chapter/335103_3_En_4_Fig3_HTML.jpg)

    Figure 4-3 List Entry screen for the Region Practice page'
