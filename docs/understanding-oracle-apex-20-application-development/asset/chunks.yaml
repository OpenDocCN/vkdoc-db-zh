    # 清除会话状态


    花些时间运行你的 `Form Update` 页面。选择一条记录，修改其值，然后点击 `Update` 按钮。一切应该正常工作。但是，你将发现 `Delete`
    按钮存在一个问题。当你点击它时，APEX 会显示一条错误信息。问题在于删除操作后，项 `P30_EMPNO` 仍然包含被删除的员工编号。因此，在页面渲染期间，初始化过程将尝试从该不存在的记录中获取值，从而产生错误。解决方案是在删除操作发生后将
    `P30_EMPNO` 设置为 null。事实上，这正是你在 Listing 7-21 所示的 `DeleteEmp` 过程的 PL/SQL 代码中所做的。


    但是如何让第 30 页上的 `Delete` 按钮设置一个项的值呢？由于你无法触及内置的 ARP 进程，你唯一的选择是创建另一个进程，该进程将在删除操作发生后执行。我们称这个进程为
    `ClearEmpNo`。


    实现 `ClearEmpNo` 的一种方法是使用以下代码作为 PL/SQL 进程：


    ```

    begin

    :P30_EMPNO := null;

    end;

    ```


    我们这些熟悉 PL/SQL 编码的人意识到这是一个直接、简单的解决方案。但 APEX 为那些不熟悉 PL/SQL 的人提供了另一种解决方案，即 `Clear
    Session State` 进程类型。以下是使用方法。


    将你的进程 `ClearEmpNo` 的类型更改为 `Clear Session State`。图 10-14 显示了其初始属性。`Settings` 部分的
    `Type` 属性指定要清除哪些项。默认情况下，其值为 `Clear all items on the Current Page`。该属性的其他值允许你清除单个项、指定页面上的所有项或所有页面上的所有项。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig14_HTML.jpg](img/335103_3_En_10_Fig14_HTML.jpg)


    图 10-14：清除会话状态进程的属性


    虽然默认值完全没问题，但将类型更改为 `Clear Items` 也是合理的。如果你这样做，那么你将能够为 `Item(s)` 属性输入明确的项名称，如图
    10-15 所示。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig15_HTML.jpg](img/335103_3_En_10_Fig15_HTML.jpg)


    图 10-15：配置进程以清除 P30_EMPNO


    无论你如何创建 `ClearEmpNo` 进程，你必须执行以下两个步骤以确保它仅在删除操作后执行：


    *   你必须将其 `When Button Pressed` 属性的值设置为 `Delete`。

    *   你必须将其序列值（如图 10-14 所示）设置为大于 ARP 进程的值。


    # 插入记录


    图 10-9 中 `Form Update` 页面的第二个区域称为 `Insert Employees`。其工作方式如下：用户将值输入到该区域的五个项中，然后点击
    `Insert` 按钮。APEX 随后会将一条记录插入到 EMP 表中，对于未提及的字段使用默认值。


    一个 ARP 进程只能插入出现在页面项中的值。因此，重要的是 `Insert Employees` 区域要为 `EMP` 的每个字段都有一个项。换句话说，表单的数据源应该是查询
    `select * from EMP`。然后你可以隐藏那些将接收默认值的项。


    当你创建具有前述数据源的表单区域时，APEX 会立即通知你一个问题。问题是其生成的几个项名称重复。生成的项的名称完全基于其对应字段的名称，因此出现在页面上多个表单中的字段名将会有多个同名的项。


    幸运的是，解决方案很简单；只需重命名有问题的项。图 10-16 显示了我的策略，即为 `Insert Employees` 区域中的所有项（无论是否重复）添加“`INSERT`”。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig16_HTML.jpg](img/335103_3_En_10_Fig16_HTML.jpg)


    图 10-16：重命名重复项


    两个初始化进程也有重复的名称。为了解决这个问题，我将每个进程重命名为其区域的名称，如图 10-17 所示。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig17_HTML.jpg](img/335103_3_En_10_Fig17_HTML.jpg)


    图 10-17：重命名重复的初始化进程


    你现在已解决了该区域的所有问题，因此 APEX 最终将允许你保存更改。你剩余的任务与你对 `Update Employees` 表单所做的类似：


    *   在 `P30_INSERT_EMPNO` 的 `Source` 部分打开 `Primary Key` 属性。

    *   在 `Insert Employee Attributes` 的 `Edit` 部分打开 `Enabled` 属性。然后确保只勾选了 `Add Row`
    操作。

    *   创建一个名为 `Insert` 的按钮。将其 `Action` 属性配置为 `Submit Page`，并将其 `Database Action`
    属性配置为 `SQL INSERT action`。

    *   转到名为 `Process form Insert Employees` 的 ARP 进程的属性编辑器，并将其 `When Button Pressed`
    属性的值设为 `Insert`。

    *   根据你的喜好设置项的格式和布局。


    如果你尝试使用新的区域，你将发现另一个问题，即表单期望你始终为 `P30_EMPNO` 和 `P30_INSERT_EMPNO` 提供值。当 `Update
    Employees` 是唯一区域时，这个要求是合适的，因为没有员工编号，`Delete` 和 `Update` 操作没有意义。但当按下 `Insert` 按钮时，`P30_EMPNO`
    可以（也应该）是 `null`。同样，当按下 `Delete` 和 `Update` 按钮时，`P30_INSERT_EMPNO` 应该为 null。因此，你需要禁用这两个项在
    `Validation` 部分的 `Value Required` 属性。


    `Insert` 操作将新员工编号放入 `P30_INSERT_EMPNO`。尽管该项是隐藏的，但其值可以作为 ARP 进程的 `Success Message`
    属性的一部分，如图 10-18 所示。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig18_HTML.jpg](img/335103_3_En_10_Fig18_HTML.jpg)


    图 10-18：改进 Insert 按钮的成功消息


    # 计算


    图 10-9 所示的 `Insert Employees` 区域仅显示 `EName`、`Job`、`Salary` 和 `DeptNo` 列的项；`HireDate`、`Comm`
    和 `Offsite` 的项是隐藏的。其想法是这些隐藏项将包含默认值——特别是，`P30_INSERT_HIREDATE` 将包含当前日期，`P30_INSERT_COMM`
    将为 `0`，`P30_INSERT_OFFSITE` 将为 `''N''`。ARP 进程在执行插入操作时将使用这些项的值。


    那么，问题是如何将默认值放入隐藏项中。答案是使用 APEX *计算*。计算是一种页面组件，它为某个项赋值。其思路是为每个需要默认值的项创建一个计算，并安排这些计算在
    ARP 进程执行之前执行。这样，计算出的值将成为会话状态的一部分，ARP 进程在创建新记录时将使用它们。

    '
- fmt: '## Form Update 页面的计算


    The `Form Update` page has a computation for each of the three items that needs
    a default value. Figure [10-19](#335103_3_En_10_Chapter.xhtml#Fig19) shows the
    `Processing` tab of the page designer with the three computations listed. Note
    that the execution point of the computations is `After Submit`, which means that
    they will execute before any of the processes.

    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig19_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig19_HTML.jpg)

    Figure 10-19 Adding three computations to the Form Update page


    To create a new computation, right-click the `After Submit` node of Figure [10-19](#335103_3_En_10_Chapter.xhtml#Fig19)
    and select `Create Computation`. You will then need to specify properties for
    its `Identification` and `Computation` sections. Figure [10-20](#335103_3_En_10_Chapter.xhtml#Fig20)
    shows the property values for the `P30_INSERT_HIREDATE` computation. The `Identification`
    section has the property `Item Name`, in which you specify the target item. The
    `Computation` section has the property `Type`, in which you specify how the item’s
    value is computed. In Figure [10-20](#335103_3_En_10_Chapter.xhtml#Fig20), the
    type is `SQL Expression`, and the expression is simply a call to the SQL function
    `current_date`.

    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig20_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig20_HTML.jpg)

    Figure 10-20 Properties for the HireDate computation


    The other two computations are created similarly. The simplest way to specify
    a constant is to use the type `Static Value`, but you can also specify it using
    an SQL expression.


    Instead of creating three computations, you could achieve the same effect using
    a single PL/SQL process, as shown in Listing [10-1](#335103_3_En_10_Chapter.xhtml#PC8).
    The execution point of the process would be `After Submit`, the same as the computations.

    ```

    begin

    P30_INSERT_HIREDATE := current_date;

    P30_INSERT_COMM := 0;

    P30_INSERT_OFFSITE := ''N'';

    end;

    ```

    Listing 10-1 PL/SQL Code Equivalent to Three Computations


    I intentionally hid the items `P30_INSERT_HIREDATE`, `P30_INSERT_COMM`, and `P30_INSERT_OFFSITE`
    in Figure [10-9](#335103_3_En_10_Chapter.xhtml#Fig9) to keep users from changing
    their default values. Another design option is to display these items with their
    default values already filled in. The user can then treat these values as suggestions
    and modify them if desired. This option implies that the computed values should
    be assigned to the items during page rendering, instead of after submission. Implementing
    this option is straightforward. All you need to do is unhide the items and change
    the execution point of the three computations (or their equivalent PL/SQL process)
    to `After Header`.


    ## 发送电子邮件


    Recall from Chapter [7](#335103_3_En_7_Chapter.xhtml) that the `Revised Employee
    Data Entry` page has a process `SendSuspiciousEmail`, whose job is to send email
    messages when suspicious database deletions and updates occur. The code for this
    process appeared in Listing [7-14](#335103_3_En_7_Chapter.xhtml#PC28). It is written
    in PL/SQL and makes use of the `apex_mail.send` library function.

    APEX has the process type `Send E-Mail`, which gives you the ability to send email
    without having to write PL/SQL code. This section will show how to use this process
    to achieve the same functionality as in Listing [7-14](#335103_3_En_7_Chapter.xhtml#PC28).


    Create a new process for page 30. Call it `SendSuspiciousEmail`, and give it the
    type `Send E-Mail`. In the property editor, look for the `Settings` section. You
    will need to specify values for the properties `From`, `To`, `Subject`, and `Body
    Plain Text`. Figure [10-21](#335103_3_En_10_Chapter.xhtml#Fig21) shows how I entered
    these values. (If you want to test the process, be sure to use your own email
    address as the recipient.)

    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig21_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig21_HTML.jpg)

    Figure 10-21 Properties for a Send E-Mail process


    The body text makes use of the `APP_USER` variable and the item `P30_EMPNO` to
    identify the user and the affected employee number. This behavior is the same
    as in Listing [7-14](#335103_3_En_7_Chapter.xhtml#PC28), except for one feature—the
    body of the email does not indicate whether the operation was a delete or an update.
    Listing 7-14 implemented this feature by an if-statement inside the PL/SQL code.
    How can you do the same thing when you use a process of type `Send E-Mail`?


    The trick is to first create a hidden item to hold the value you need to compute
    and then create a computation for it. For example, my hidden item is called `P30_EMAIL_OP`.
    Figure [10-22](#335103_3_En_10_Chapter.xhtml#Fig22) shows the relevant properties
    of its computation. I then changed the value of the `Body Plain Text` property
    in the `SendSuspiciousEmail` process to be the following expression:

    ```

    &APP_USER. &P30_EMAIL_OP. employee &P30_EMPNO.''s record.

    ```

    For example, a possible email message arising from this expression could be

    ```

    boris@secret.org deleted employee 7839''s record.

    ```

    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig22_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig22_HTML.jpg)

    Figure 10-22 A computation to identify the request


    Finally, you need to specify when the `SendSuspiciousEmail` process executes.
    Its server-side condition should specify what is meant by a “suspicious” change
    to the database. I chose to use the same condition shown in Figure [7-16](#335103_3_En_7_Chapter.xhtml#Fig16).
    In addition, the sequence number of the process must be chosen such that it executes
    after the database operation but before the `ClearEmpNo` process clears the deleted
    employee number from `P30_EMPNO`.


    ## 包含表单的报表页面


    An APEX `Form` region automatically generates items for you and provides two powerful
    built-in processes, which save you time over having to write comparable items
    and PL/SQL processes. However, you still need to create and configure additional
    buttons and items. To simplify your work further, APEX provides wizards for creating
    prebuilt form pages. You enter your information into the wizard and it creates
    the necessary regions, items, buttons, and processes. Such wizards can be effective
    shortcuts if you want what they produce.


    A list of these wizards can be found starting from the initial `Create Page` screen
    of Figure [2-9](#335103_3_En_2_Chapter.xhtml#Fig9). Instead of clicking the usual
    `Blank Page` icon, select the `Form` icon. APEX will display the screen shown
    in Figure [10-23](#335103_3_En_10_Chapter.xhtml#Fig23), which contains icons for
    the form-related wizards. The `Report with Form` wizard is a good illustrative
    example, so let’s begin with that.

    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig23_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig23_HTML.jpg)

    Figure 10-23 APEX wizards to create form pages


    A `Report with Form` page is actually two pages—a report page and a form page.
    It works similarly to the `Single Row Update` page in Figure [7-24](#335103_3_En_7_Chapter.xhtml#Fig24),
    but the report and form are on two separate pages instead of being on separate
    regions of the same page.'
