    创建分支与创建过程类似。首先转到页面设计器的`Processing`选项卡。右键单击标记为`After Processing`的节点，然后选择`Create
    Branch`。APEX 将创建一个未命名的分支，其属性如图 9-3 所示。


    ![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig3_HTML.jpg](img/335103_3_En_9_Fig3_HTML.jpg)

    图 9-3

    新创建分支的属性


    你应该为分支命名。但还需要做什么呢？图 9-3 中显示的两个重要属性是`Point`和`Type`；它们的默认值指定该分支将在所有进程之后执行，并重定向到指定的页面或
    URL。这些默认值几乎总是你想要的，你应该保持它们不变。


    唯一需要你关注的属性是`Target`。此属性显示错误，表明你需要指定分支的目标。点击该属性的`Target`属性会打开`Link Builder`向导。图
    9-4 显示了该向导，配置为重定向到页面 23。


    ![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig4_HTML.jpg](img/335103_3_En_9_Fig4_HTML.jpg)

    图 9-4

    使用链接构建器指定分支目标


    分支还有一个`Server-side Condition`部分，用于指定何时执行分支。与过程类似，每个分支通常关联一个按钮，你在`When Button Pressed`属性中指定该按钮。`Filter
    and Branch`演示页面中的分支应该与`Submit`按钮关联，并且没有其他条件。


    ## 条件分支


    在第 7 章中，你创建了`Employee Data Entry`页面（如图 7-5 所示）和`Single Row Update`页面（如图 7-24 所示）。这些页面具有相似的功能——它们都允许用户插入、删除和更新`EMP`表——但它们使用截然不同的界面来实现。特别是，`Employee
    Data Entry`页面非常宽泛；它同时显示所有报告和更新区域。另一方面，`Single Row Update`页面很紧凑，一次只显示一个区域。


    让我们构建一个帮助用户决定使用哪个页面的页面。这个页面称为`Preference Chooser`，是演示应用程序的第 24 页，如图 9-5 所示。该页面有一个区域，向用户提出两个问题。用户回答这些问题并点击按钮；如果第一个答案是`No`或第二个答案是`Yes`，按钮将分支到页面
    17（`Employee Data Entry`页面），否则分支到页面 21（`Single Row Update`页面）。


    ![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig5_HTML.jpg](img/335103_3_En_9_Fig5_HTML.jpg)

    图 9-5

    带有条件分支的页面


    你可以如下实现此页面：两个单选按钮组名为`P24_COMPACT`和`P24_SEE_TABLE`，具有静态值列表{`No`, `Yes`}。


    该按钮执行提交操作。直观上，你可能会认为按钮决定分支到哪个页面。但分支的工作方式并非如此；相反，你需要创建两个分支对象，每个对象都以该按钮为条件。每个分支还将有一个额外的条件。重定向到页面
    17 的分支对象具有以下条件：


    ```

    :P24_COMPACT = ''No'' or :P24_SEE_TABLE = ''Yes''

    ```


    重定向到页面 21 的分支对象具有以下条件：


    ```

    :P24_COMPACT = ''Yes'' and :P24_SEE_TABLE = ''No''

    ```


    当按钮执行提交时，只有一个条件会被满足。满足条件的分支将执行其重定向。


    ## 向导式界面


    分支的最后一个例子也与数据输入问题相关。在第 7 章的每个数据输入页面中，用户通过在某些项目中输入所需值然后点击插入按钮来创建新记录。这样的设计假设用户手头有这些值。另一种设计是创建一系列页面，引导用户完成数据输入过程，就像
    APEX 中的向导一样。该设计将包含四个页面。


    用户将从`Basic Info`页面开始（参见图 9-6），输入新员工的姓名、职位、部门和工资。最常见的情况是员工在当天被雇用，因此有一个针对该情况的复选框。然后用户点击`Continue`按钮提交页面。


    ![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig6_HTML.jpg](img/335103_3_En_9_Fig6_HTML.jpg)

    图 9-6

    输入基本信息


    下一步是确定员工的经理。假设公司按如下方式为员工分配经理：总裁没有经理，职位为`MANAGER`的员工向总裁汇报，其他员工（职员除外）向其部门的经理汇报。例外情况是职员。职员的经理可以是同一部门中除另一名职员外的任何员工，因此用户需要明确指定新职员的经理。


    如果新员工是职员，点击`Continue`按钮将分支到`Manager Info`页面（参见图 9-7），用户在其中从选择列表中选择员工的经理。


    ![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig7_HTML.jpg](img/335103_3_En_9_Fig7_HTML.jpg)

    图 9-7

    选择经理


    如果`Basic Info`页面上的`hiredate`复选框未选中，应用程序将分支到`Hiredate Info`页面（参见图 9-8），让用户选择一个日期。此分支可能来自`Manager
    Info`页面或`Basic Info`页面，具体取决于员工是否是职员。选择日期后，用户点击`Continue`按钮。


    ![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig8_HTML.jpg](img/335103_3_En_9_Fig8_HTML.jpg)

    图 9-8

    选择员工的雇佣日期

