    `CancelInsert` 按钮进行重定向，将 `P21_MODE` 设置为 `Report`。


    ### 实现更新/删除区域


    `Update/Delete Employee` 区域中的各项由一个名为 `FetchRowForUpdate` 的过程填充，该过程在页面呈现时执行，并基于
    SQL 表达式进行条件判断。


    ```

    :P21_MODE = ''Update''

    ```


    该过程的代码见清单 7-20。该代码与清单 7-15 中的 `FetchRow` 过程基本相同，只是它还处理了丢失更新的问题。（此问题与 `Single Row
    View` 页面无关，因为该页面不执行任何更新。）它计算三个可修改项的哈希值，并将其保存在隐藏项 `P21_HASH` 中。


    ```

    declare

    v_valuesToHash apex_t_varchar2;

    begin

    if :P21_EMPNO is not null then

    -- First, fetch the employee record and save its values.

    select EName, Job, Sal, DeptNo

    into :P21_UPDATE_ENAME,

    :P21_UPDATE_JOB,

    :P21_UPDATE_SAL,

    :P21_UPDATE_DEPTNO

    from EMP

    where EmpNo = :P21_EMPNO;

    -- Then save the hash of the updatable values.

    v_valuesToHash := apex_t_varchar2(:P21_UPDATE_JOB,

    :P21_UPDATE_SAL, :P21_UPDATE_DEPTNO);

    :P21_HASH := apex_util.get_hash(v_valuesToHash);

    end if;

    end;

    ```

