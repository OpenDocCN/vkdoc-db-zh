- fmt: '# Chart drill down


    Chart drill down is very similar to master detail. The chart is the master, and
    the report is the detail. In fact, the implementation strategy is essentially
    the same as for master-detail reports:


    1.  Create a hidden item, here called `P13_JOB`.

    2.  Create the detail report customized by that item.

    3.  Create the chart, configuring it to assign the selected job to the hidden
    item when clicked.


    The source query for the detail report is essentially the same as in `Employees
    by Department`. The only difference is that the query does a join so that the
    report can display the department name. The SQL code is as follows:


    ```sql

    select e.EmpNo, e.EName, d.DName, e.Sal

    from EMP e join DEPT d

    on    e.DeptNo = d.DeptNo

    where e.Job = :P13_JOB

    order by EName

    ```


    The source code for a pie chart is an SQL query having two output columns. The
    following query creates a pie section for each job, whose value is the number
    of employees having that job:


    ```sql

    select Job, count(*) as EmpCount

    from EMP

    group by Job

    order by EmpCount desc

    ```


    The only remaining issue is how to specify the chart’s behavior when it is clicked.
    This behavior is determined by the `Link` properties of the chart’s series; see
    Figure [6-11](#335103_3_En_6_Chapter.xhtml#Fig11).


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig11_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig11_HTML.jpg)


    Figure 6-11: Link properties for a chart series


    The `Type` property has the value `Link to Page in this Application`. Choosing
    it exposes the `Target` property, from which you can use the `Link Builder` screen
    to specify the target page. Figure [6-12](#335103_3_En_6_Chapter.xhtml#Fig12)
    shows that screen as it was configured for the chart. You use the same technique
    that you used for the master report of Figure [6-9](#335103_3_En_6_Chapter.xhtml#Fig9):
    choose the target to be the current page, and set the value of the hidden item.
    The only difference is how you refer to the selected value. When that value comes
    from column `X` of a report, you write `#X#`. When it comes from column `X` of
    a chart, you write `&X.`—that is, you reference the column name as a substitution
    string.


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig12_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig12_HTML.jpg)


    Figure 6-12: Configuring a chart for drill down


    # Customized Titles and Labels


    In Chapter [3](#335103_3_En_3_Chapter.xhtml), you saw how to use HTML tags to
    format a region title. In fact, you can use HTML tags to format any property whose
    value is displayed on the page, such as page and region titles, item labels, and
    button text. Moreover, these properties can also be customized by item values.


    For example, looking back at the master-detail and chart drill-down pages, I can
    see a small problem: the detail reports do not indicate which master record (or
    chart slice) was selected. A good solution to this problem is to customize the
    title of the detail region. For example, Figure [6-13](#335103_3_En_6_Chapter.xhtml#Fig13)
    shows the revised detail region for the `Employees by Department` page. Note that
    the region title contains the selected department name.


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig13_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig13_HTML.jpg)


    Figure 6-13: Employee detail report with a customized title bar


    Similarly, Figure [6-14](#335103_3_En_6_Chapter.xhtml#Fig14) shows the revised
    detail region for the `Employees by Job` page. Its title bar shows the selected
    job.


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig14_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig14_HTML.jpg)


    Figure 6-14: Another customized title bar


    The technique for implementing these title bars is relatively straightforward.
    Let’s begin with Figure [6-14](#335103_3_En_6_Chapter.xhtml#Fig14), which involves
    changes to the `Employee Count by Job` page. The region’s `Title` property simply
    needs to be changed to have the following expression:


    ```

    Employee Details: &P13_JOB.

    ```'
