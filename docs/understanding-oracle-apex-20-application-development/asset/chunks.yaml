    \nFigure 6-5\nFilter by Job and Department page\n\nThis page has two regions:\
    \ `Select Values` and\n`Matching Employees`. The `Select Values` region\nis a\
    \ static content region that contains two select lists, `P9_JOB` and `P9_DEPTNO`,\
    \ both of\nwhose values are defined by SQL queries. The\nlist-of-values query\
    \ for `P9_JOB` is as follows:\n\n```\nselect distinct Job as DisplayVal, Job as\
    \ ResultVal\nfrom EMP\norder by DisplayVal\n```\n\nThe list-of-values query for\
    \ `P9_DEPTNO` is as\nfollows:\n\n```\nselect DName, DeptNo\nfrom DEPT\norder by\
    \ DName\n```\n\nThe action of the button is `Submit` and its\nposition is `Edit`.\n\
    \nThe `Matching Employees` region is a report region. For the report to display\n\
    the `EMP` records\nhaving the selected job and department number, its source query\
    \ needs to\nreference the value of the two items. The following query does the\n\
    trick; note how it uses bind variable syntax to refer to the two items.\n\n```\n\
    select EmpNo, EName, Job, Sal, DeptNo\nfrom EMP\nwhere Job = :P9_JOB  and  DeptNo\
    \ = :P9_DEPTNO\norder by EName\n```\n\nYou can improve the functionality of this\
    \ region by allowing a user to\nselect a `null`\nvalue for `P9_JOB` or `P9_DEPTNO`.\
    \ The intent\nis that a `null`\nvalue for `P9_JOB` (or `P9_DEPTNO`) should\nmean\
    \ that the query will not use that item for filtering. For example,\nif both items\
    \ were `null`, the report\nwould display all employees. To enable this functionality,\
    \ revise the\nsource query to explicitly test for `null` item values, as\nfollows:\n\
    \n```\nselect EmpNo, EName, Job, Sal, DeptNo\nfrom EMP\nwhere (:P9_JOB is null\
    \  or  Job = :P9_JOB)\nand   (:P9_DEPTNO is null  or  DeptNo = :P9_DEPTNO)\norder\
    \ by EName\n```\n\nI would like to point out that there was no particular need\
    \ to use\ntwo regions on this page. In fact, it is easy to modify this page to\
    \ use\na single region. First, go to the `Layout` section for\nthe item `P9_JOB`\n\
    and change its `Region` property to\n`Matching Employees`. Then do the same thing\
    \ for `P9_DEPTNO` and the\n`Submit` button.\nFinally, go to the `Appearance` section\
    \ of\n`Matching Employees` and set its `Item Display Position`\nproperty  to `Above\
    \ Content`, so\nthat the two items appear above the report. (You can also\ndelete\
    \ the `Select Valu`es region if you like.) Now run the page. You should discover\n\
    that its behavior has not changed. That is, the decision to use one or\ntwo (or\
    \ even three!) regions is based purely on aesthetics.\n\nFilter by Possible Department\
    \ Page\n\nThe second custom report page, titled `Filter by Possible Department`\
    \ , is page 10 of the demo and appears in Figure\n[6-6](#335103_3_En_6_Chapter.xhtml#Fig6).\
    \ This page has a\nstructure similar to the previous one. The top region is used\
    \ for\ninput—the user selects departments from a checkbox item and clicks the\n\
    `Submit` button.\nThe bottom region displays a report of the employees in the\
    \ selected\ndepartments. For example, the `ACCOUNTING` and `RESEARCH` boxes are\n\
    checked in Figure [6-6](#335103_3_En_6_Chapter.xhtml#Fig6), which means\nthat\
    \ the report lists those employees in either the accounting or\nresearch departments.\
    \ If no boxes are checked, the report will display\nno records.\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig6_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6\nFilter by Possible Department page\n\nThe `Select Some Departments`\
    \ region\n is a static content region containing a checkbox item and a\nbutton.\
    \ The checkbox item is named `P10_DEPTNO`, its\ntemplate is `Hidden`, and its\n\
    values are defined by the query\n\n```\nselect DName, DeptNo\nfrom DEPT\norder\
    \ by DName\n```\n\nRecall that the value of a multi-value item is a string containing\n\
    the selected checkbox values separated by colons. For example, the value\nof `P10_DEPTNO`\n\
    in Figure [6-5](#335103_3_En_6_Chapter.xhtml#Fig5) is `10:30`. If all four\ndepartments\
    \ were checked, the value would be `10:40:20:30`. (The\norder of the selected\
    \ values in the string is based on the sort order of\nthe item’s list-of-values\
    \ query, which in this case is by department\nname.)\n\nThe `Matching Employees`\
    \ region is a classic report. The task is to come up with\na source query for\
    \ the report that will filter the records based on this\nitem value. One approach\
    \ is to test each `EMP` record to see if\nits `DeptNo`\nvalue is a substring of\
    \ `P10_DEPTNO`. This\napproach leads to the following query, which almost works:\n\
    \n```\nselect EmpNo, EName, Job, Sal, DeptNo\nfrom EMP\nwhere InStr(:P10_DEPTNO,\
    \  DeptNo) > 0\norder by EName\n```"
  trans: '

    假设你希望 `取消` 按钮能清除页面上所有项目的会话状态。APEX 将此称为 `清除缓存`，并在链接构建器中提供了 `清除缓存` 属性来实现此功能。例如，在图
    6-3 中，向 `清除缓存` 输入框键入 `3,4,8` 将清除第 3、4 和 8 页上所有项目的会话状态。如果你还在 `设置项目` 部分指定了项目，APEX
    将在清除缓存后为这些项目赋值。


    请注意，这种修改会话状态的方式与提交操作完全不同，因为它不（且不能）使用浏览器中显示的值。也就是说，来自按钮的重定向可以将项目的会话状态值设置为常量或计算值，但无法将其设置为用户输入的浏览器值。


    ## 引用会话状态变量


    既然你已了解如何设置会话状态变量的值，接下来需要知道如何让页面访问该值。主要有两种技术。如果你想在 SQL 代码中引用该变量，请在项目名称前加上冒号。这种引用称为
    `绑定变量`。如果你想在 HTML 表达式中引用项目，请在项目名称前加上 `&` 符号，并在末尾加上句点。后一种引用称为 `替换字符串`，已在第 3 章介绍过。


    例如，考虑 `Item Sampler` 页面上的项目 `P8_EMPNO`。要将其作为替换字符串引用，请写作 `&P8_EMPNO.`。要将其作为绑定变量引用，请写作
    `:P8_EMPNO`。


    在本书中，你已经看到了 SQL 查询的几种用途，例如作为报表或图表的源、项目的初始值，以及基于列表的项目的值定义。你也看到了 HTML 表达式的几种用途，例如页面或区域的标题，以及项目的标签。本章剩余部分将举例说明如何通过在这些
    SQL 查询和 HTML 表达式中使用项目引用，来极大增强页面的功能。


    在构建本章的任何页面之前，你可能需要转到 `桌面导航菜单` 的 `列表详情` 页面（如图 4-21 所示），并添加一个名为 `会话状态` 的根条目。然后，每次创建页面时，你都可以将其导航菜单条目的父项设置为
    `会话状态`。


    ## 自定义报表


    `自定义报表` 是其内容受一个或多个项目值影响的报表。用户在页面上为某些项目输入值并点击 `提交` 按钮。然后，页面将根据这些输入值显示一个报表。在本节中，你将构建三个自定义报表页面来阐述此技术。


    ### 按职位和部门筛选页面


    第一个页面名为 `按职位和部门筛选`，是演示应用的第 9 页，见图 6-5。其思路是用户为 `职位` 和 `部门` 项目选择值，然后点击 `提交` 按钮。随后，报表将显示具有所选职位且属于所选部门的员工。例如，图
    6-5 显示了研究部门中的办事员。


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig5_HTML.jpg](img/335103_3_En_6_Fig5_HTML.jpg)


    图 6-5 按职位和部门筛选页面


    此页面有两个区域：`选择值` 和 `匹配的员工`。`选择值` 区域是一个静态内容区域，包含两个选择列表 `P9_JOB` 和 `P9_DEPTNO`，它们的值都由
    SQL 查询定义。`P9_JOB` 的值列表查询如下：


    ```sql

    select distinct Job as DisplayVal, Job as ResultVal

    from EMP

    order by DisplayVal

    ```


    `P9_DEPTNO` 的值列表查询如下：


    ```sql

    select DName, DeptNo

    from DEPT

    order by DName

    ```


    按钮的操作是 `提交`，其位置为 `编辑`。


    `匹配的员工` 区域是一个报表区域。为了让报表显示具有所选职位和部门编号的 `EMP` 记录，其源查询需要引用两个项目的值。以下查询实现了这一点；请注意它如何使用绑定变量语法来引用这两个项目。


    ```sql

    select EmpNo, EName, Job, Sal, DeptNo

    from EMP

    where Job = :P9_JOB  and  DeptNo = :P9_DEPTNO

    order by EName

    ```


    你可以通过允许用户为 `P9_JOB` 或 `P9_DEPTNO` 选择 `空` 值来增强此区域的功能。意图是，`P9_JOB`（或 `P9_DEPTNO`）的
    `空` 值应表示查询不会使用该项目进行筛选。例如，如果两个项目都是 `空`，报表将显示所有员工。要实现此功能，请修改源查询以显式测试 `空` 项目值，如下所示：


    ```sql

    select EmpNo, EName, Job, Sal, DeptNo

    from EMP

    where (:P9_JOB is null  or  Job = :P9_JOB)

    and   (:P9_DEPTNO is null  or  DeptNo = :P9_DEPTNO)

    order by EName

    ```


    我想指出，此页面并非必须使用两个区域。事实上，很容易修改此页面以使用单个区域。首先，转到项目 `P9_JOB` 的 `布局` 部分，将其 `区域` 属性更改为
    `匹配的员工`。然后对 `P9_DEPTNO` 和 `提交` 按钮执行相同操作。最后，转到 `匹配的员工` 的 `外观` 部分，将其 `项目显示位置` 属性设置为
    `内容上方`，以便这两个项目显示在报表上方。（你也可以根据需要删除 `选择值` 区域。）现在运行该页面。你会发现其行为没有改变。也就是说，使用一个还是两个（甚至三个！）区域的决定纯粹基于美观。


    ### 按可能部门筛选页面


    第二个自定义报表页面名为 `按可能部门筛选`，是演示应用的第 10 页，见图 6-6。此页面的结构与上一个类似。顶部区域用于输入——用户从一个复选框项目中选择部门，然后点击
    `提交` 按钮。底部区域显示所选部门中员工的报表。例如，在图 6-6 中，`会计` 和 `研究` 框被选中，这意味着报表列出了会计或研究部门的员工。如果没有选中任何框，报表将不显示任何记录。


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig6_HTML.jpg](img/335103_3_En_6_Fig6_HTML.jpg)


    图 6-6 按可能部门筛选页面


    `选择一些部门` 区域是一个静态内容区域，包含一个复选框项目和一个按钮。复选框项目名为 `P10_DEPTNO`，其模板是 `隐藏`，其值由查询定义：


    ```sql

    select DName, DeptNo

    from DEPT

    order by DName

    ```


    回想一下，多值项目的值是一个字符串，其中包含用冒号分隔的所选复选框值。例如，在图 6-5 中，`P10_DEPTNO` 的值是 `10:30`。如果选中所有四个部门，值将为
    `10:40:20:30`。（字符串中所选值的顺序基于项目值列表查询的排序顺序，在本例中是按部门名称排序。）


    `匹配的员工` 区域是一个经典报表。任务是为报表设计一个源查询，该查询将根据此项目值筛选记录。一种方法是测试每条 `EMP` 记录，看其 `DeptNo`
    值是否是 `P10_DEPTNO` 的子字符串。这种方法会产生以下查询，它几乎可以工作：


    ```sql

    select EmpNo, EName, Job, Sal, DeptNo

    from EMP

    where InStr(:P10_DEPTNO,  DeptNo) > 0

    order by EName

    ```

    '
- fmt: '## 按薪资范围筛选页面


    第三个定制的报表页面名为 `Filter by Salary Range`，在演示应用中是第 11 页，如图 [6-7](#335103_3_En_6_Chapter.xhtml#Fig7)
    所示。用户输入最低和最高薪资值，然后点击 `Submit` 按钮。页面随后会为指定薪资范围内的员工定制一个按职位分类的员工图表。


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig7_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig7_HTML.jpg)


    图 6-7 “按薪资范围筛选”页面


    该页面包含一个类型为 `chart` 的区域。该区域的 `Item Display Position` 属性（在其 `Appearance` 部分中）值为
    `Above Contents`，这就是为什么两个项目项和 `Submit` 按钮位于图表上方。这两个名为 `P11_MINSAL` 和 `P11_MAXSAL`
    的项目项是数字字段，其 `Width` 值为 `5`。按钮的位置是 `Edit`。


    当然，此页面定制的是图表而非报表，但技术完全相同。回顾第 [3](#335103_3_En_3_Chapter.xhtml) 章，该图表的源查询将有两个输出列：一个标签（此处为
    `Job` 的值）和一个系列值（此处为该职位的记录数）。要定制图表以仅考虑指定薪资范围内的员工，只需将该限制添加到查询的 `where` 子句中。源查询变为：


    ```

    select Job, count(*) as EmpCount

    from EMP

    where (:P11_MINSAL is null  or  :P11_MINSAL = Sal)

    group by Job

    order by EmpCount

    ```


    与“按职位和部门筛选”页面一样，此查询确保 `null` 项目项值不会参与筛选。您也应该清楚，如果您决定将两个项目项和按钮移到单独的区域中，图表的源查询将是相同的。如果不清楚，可以尝试一下看看效果。


    ## 主从报表


    主从报表由两份报表组成。这两份报表是*链接*的，意味着明细报表的每一行在主报表中都有关联行。用户通过选择主报表中的一行来进行交互；明细报表则通过仅显示与所选主记录关联的明细行来响应。


    在本节中，您将构建一个名为 `Employees by Department` 的主从页面，它是 `Employee Demo` 应用程序的第 12 页。其主报表包含每个部门的一行。单击某个部门行会导致明细报表显示该部门的员工列表。图
    [6-8](#335103_3_En_6_Chapter.xhtml#Fig8) 显示了单击会计部门链接后的页面。'
  raw: 'The `InStr`

    function  tests

    whether the second argument is a substring of the first one. If so, it

    returns the character position of the match; otherwise, it returns `0`. Thus,
    the query

    returns those `EMP` records whose

    `DeptNo` value

    appears somewhere in the item. This query is almost what you want, but

    not quite. For example, suppose that the value of the item is `10:30`. The `EMP`
    records having a

    `DeptNo` value of

    `10` and `30` will match, and

    those having a value of `20` and `40` will not match.

    This is correct, but look at what happens if a new department is created

    with the department number `3`. The employees in

    this department will match, which is incorrect.


    The solution is to not only test for the `DeptNo` value but to

    also test for the colons on either side of it. You should add a colon to

    each end of the item value, so that all components of the value are

    surrounded by colons. The query thus

    becomes this:


    ```

    select EmpNo, EName, Job, Sal, DeptNo

    from EMP

    where InStr('':'' || :P10_DEPTNO || '':'','':'' || DeptNo || '':'')  >  0

    order by EName

    ```


    Note


    Many people (including me) have difficulty coming to terms with this

    query; if you feel the same, try working out an example. In particular,

    note the two different uses of the colon: the colon outside of quotes

    denotes a bind variable, whereas a colon inside the quotes is a

    delimiter character.


    Filter by Salary Range Page


    The third customized report page, titled `Filter by Salary Range` , is page 11
    of the demo and appears in Figure [6-7](#335103_3_En_6_Chapter.xhtml#Fig7). A
    user enters

    the minimum and maximum salary values and clicks the `Submit` button. The

    page then customizes an employees-per-job chart for those employees in

    the specified salary range.


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig7_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig7_HTML.jpg)


    Figure 6-7

    Filter by Salary Range page


    This page contains a single region, which is of type

    `chart`. The

    region’s `Item Display Position` property (in its `Appearance` section)

    has the value `Above Contents`, which is why the two items and `Submit` button
    are

    located above the chart. The two items, named `P11_MINSAL` and `P11_MAXSAL`, are

    number fields having a `Width` value of `5`. The button’s

    position is `Edit`.


    Of course, this page customizes a chart, not a report, but the technique

    is exactly the same. Recall from Chapter [3](#335103_3_En_3_Chapter.xhtml) that
    the source query for this

    chart will have two output columns: a label, which here is the value of

    `Job`, and the

    series value, which here is the count of records for that job. To

    customize the chart to consider only employees in the specified salary

    range, simply add that restriction to the where clause of the query. The

    source query becomes this:


    ```

    select Job, count(*) as EmpCount

    from EMP

    where (:P11_MINSAL is null  or  :P11_MINSAL = Sal)

    group by Job

    order by EmpCount

    ```


    As with the `Filter by Job and Department` page , this query ensures

    that a `null`

    item value will not contribute to the filter.

    It should also be clear to you that the chart’s source query would be

    the same if you decided to move the two items and button to a separate

    region. If not, try it and see.


    Master-Detail Reports

    A *master-detail report* is a set of two reports. These

    reports are *linked*, in the sense that each row of the detail

    report has an associated row in the master report. A user interacts with the

    reports by choosing one of the master rows; the detail report responds

    by displaying just the detail rows associated with the chosen master

    record.


    In this section, you will build a master-detail page titled `Employees by Department`,
    which is page 12 of the `Employee Demo`

    application. Its master report contains one row for each department.

    Clicking a department row causes the detail report to display the list

    of employees in that department. Figure [6-8](#335103_3_En_6_Chapter.xhtml#Fig8)
    shows the page

    after clicking the link for the accounting department.'
