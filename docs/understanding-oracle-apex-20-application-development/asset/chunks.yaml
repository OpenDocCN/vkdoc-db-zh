- fmt: "## Password Handling\n\nThe treatment of passwords requires some explanation.\
    \ For security, passwords should always be stored in an encoded form, not in plaintext.\
    \ Listing [13-1](#335103_3_En_13_Chapter.xhtml#PC1) uses the function `apex_util.get_hash`\
    \ to perform the encoding. This function was introduced in Chapter [7](#335103_3_En_7_Chapter.xhtml)\
    \ and used for lost update detection. Recall that the function takes a collection\
    \ of values as input and produces a string as output. The constructor function\
    \ `apex_t_varchar2` creates the collection of values from its arguments. For example,\
    \ the encoded password for `ADMIN` is the output of calling the hash function\
    \ with the collection `['ADMIN','1234']` as input.\n\nThe reason to use a hash\
    \ function for password encoding is that it obfuscates its input value—given the\
    \ output of the function, there is no practical way for someone to determine its\
    \ input. So you can feel safe knowing that even if the database system were compromised\
    \ (e.g., if the hard drive were stolen), the intruder could not easily make use\
    \ of the encoded password information.\n\nThe hashed passwords in Listing [13-1](#335103_3_En_13_Chapter.xhtml#PC1)\
    \ include the username as part of the hash value. This technique increases safety\
    \ somewhat by thwarting the following attack: An intruder creates an account and\
    \ then creates a sequence of passwords for it, noting the hash value of each one.\
    \ The intruder can then compare these hashed passwords with the passwords stolen\
    \ from the `USERS` table. Suppose that a match is detected. If the username is\
    \ not part of the hash value, the intruder has most likely discovered a user’s\
    \ password. However, if the username is part of the hash value, detecting a match\
    \ tells the intruder nothing.\n\nThe `apex_util.get_hash` function has two arguments:\
    \ the first is the collection of values to be hashed, and the second argument\
    \ is a Boolean value. The second argument in Listing [13-1](#335103_3_En_13_Chapter.xhtml#PC1)\
    \ is `null`, which is treated as `false`. In Chapter [7](#335103_3_En_7_Chapter.xhtml),\
    \ the function was called with only one argument, which implied a second argument\
    \ value of `true`. The second argument indicates whether the function should add\
    \ the session ID to the input values. The hash value will be more secure if it\
    \ includes the session ID, but it then will be of use only within the scope of\
    \ that session. Because lost update detection occurs within a single session,\
    \ it was reasonable to use a second argument of `true`, which is what occurred\
    \ in Chapter [7](#335103_3_En_7_Chapter.xhtml). However, password encoding spans\
    \ sessions, and so a second argument of `false` (or `null`) is mandatory.\n\n\
    ## Adding User Accounts\n\nYour `Employee Demo` application needs a way to add\
    \ other rows to the `USERS` table. Figure [13-5](#335103_3_En_13_Chapter.xhtml#Fig5)\
    \ shows a page called `Manage Users` that serves this purpose; it will be page\
    \ 46 of the application. The page has two regions: the `All Users` region lists\
    \ the records from `USERS`, and the `Create User` region lets you add a user to\
    \ that table. (Note that the screenshot cuts off the password values in the `All\
    \ Users` region to save space.)\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig5_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig5_HTML.jpg)\n\
    *Figure 13-5 Manage Users page of the demo application*\n\nThe `All Users` region\
    \ is a classic report whose source is the SQL query:\n\n```sql\nselect UserName,\
    \ IsAdministrator, Password\nfrom USERS\n```\n\nI put the encoded passwords in\
    \ the report for demonstration purposes only. In a real application, encoded passwords\
    \ should not be displayed—the values serve no useful administrative purpose, and\
    \ displaying them increases the probability of their being cracked.\n\nThe `Create\
    \ User` region contains four items and a submit button. The items are defined\
    \ as follows:\n\n*   `P46_NAME` has the type `Plain Text`.\n*   `P46_ADMIN` has\
    \ the type `Switch`.\n*   `P46_PASSWORD` and `P46_CONFIRM` have the type `Password`.\n\
    \nFigure [13-5](#335103_3_En_13_Chapter.xhtml#Fig5) shows the contents of this\
    \ page just prior to adding a non-administrator user named `JOE` having the password\
    \ “`joe`”. Although this username was entered in lowercase, it will get saved\
    \ in the table in uppercase to ensure that usernames are case insensitive. And,\
    \ of course, the password will be saved as an encoded string using the hash function.\n\
    \nWhen you click the submit button to create the new user account, two validations\
    \ and a process get executed. One validation ensures that the chosen username\
    \ does not already appear in the `USERS` table. This validation has the type `No\
    \ Rows returned` and is defined by the following query:\n\n```sql\nselect * from\
    \ USERS\nwhere UserName = upper(:P46_NAME)\n```\n\nThe other validation ensures\
    \ that the two passwords are identical. This validation has the type `SQL Expression`\
    \ and is defined by the following code:\n\n```sql\n(:P46_PASSWORD = :P46_CONFIRM)\
    \ or\n(:P46_PASSWORD is null and :P46_CONFIRM is null)\n```\n\nThe second line\
    \ of the validation accounts for the possibility that the password can be `null`.\n\
    \nThe process converts the username to uppercase, hashes the password, and inserts\
    \ a record into the `USERS` table. Its code appears in Listing [13-2](#335103_3_En_13_Chapter.xhtml#PC5).\n\
    \n```sql\ndeclare\n    v_username     varchar2(20) := upper(:P46_NAME);\n    v_valuesToHash\
    \ apex_t_varchar2 :=\n        apex_t_varchar2(v_username, :P46_PASSWORD);\nbegin\n\
    \    insert into USERS (UserName, Password, IsAdministrator)\n    values (v_username,\n\
    \            apex_util.get_hash(v_valuesToHash, null),\n            :P46_ADMIN);\n\
    end;\n```\n*Listing 13-2 Code to Create a New User*\n\n## Authenticating Users\n\
    \nNow that you have a way to create users, you need to create a scheme to authenticate\
    \ them. Return to your application’s `Authentication Schemes` screen and create\
    \ a new `Custom` scheme having the authentication function shown in Listing [13-3](#335103_3_En_13_Chapter.xhtml#PC6).\n\
    \n```sql\nfunction custom_authentication (p_username in varchar2,\n          \
    \                      p_password in varchar2) return boolean\nis\n    v_userName\
    \     varchar2(20) := upper(p_username);\n    v_valuesToHash apex_t_varchar2 :=\n\
    \        apex_t_varchar2(v_username, p_password);\n    v_userCount    int;\nbegin\n\
    \    select count(*) into v_userCount\n    from USERS\n    where UserName = v_userName\n\
    \    and   Password = apex_util.get_hash(v_valuesToHash, null);\n    return v_userCount\
    \ = 1;\nend;\n```\n*Listing 13-3 Custom Authentication Function*\n\nThis authentication\
    \ function converts the provided username to uppercase to ensure that usernames\
    \ are case insensitive. It then executes a query that sees whether there is a\
    \ record in the `USERS` table having that username and encoded password. If so,\
    \ it returns `true`. After you have created this authentication scheme, make it\
    \ current. Then run your application. Practice logging in as `ADMIN`, `GUEST`,\
    \ and `JOE`. Go to the `Manage Users` page and create another user, and then log\
    \ out and log back in as that user.\n\n## Public Pages\n\nConsider an application\
    \ whose authentication scheme is something other than `No Authentication`. When\
    \ an unauthenticated user attempts to access any page of the application, that\
    \ user will be directed to the `Login` page and will not be allowed to proceed\
    \ until authenticated. However, web applications often contain public pages that\
    \ require no authentication, as well as the private pages that do. The APEX property\
    \ `Authentication` lets you specify the pages that should be public.\n\nFor example,\
    \ suppose that you want the home page of the `Employee Demo` application to be\
    \ public. Go to the property editor for the page and scroll down until you find\
    \ the `Security` section. Its `Authentication` property has two values: `Page\
    \ Requires Authentication` (the default) and `Page is Public`. See Figure [13-6](#335103_3_En_13_Chapter.xhtml#Fig6).\n\
    \n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig6_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig6_HTML.jpg)\n\
    *Figure 13-6 Specifying a public page*"
