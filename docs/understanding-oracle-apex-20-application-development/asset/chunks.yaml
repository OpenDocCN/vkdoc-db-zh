    你还需要配置报表列的可排序性。回顾第 3 章，经典报表中的每个列都有一个名为`Sortable`的属性——将其值开启可使用户通过点击列标题对该列进行排序，关闭则会禁用对该列的排序。问题在于，当源查询也有`order
    by`子句时，APEX 应如何处理可排序性。APEX 对此问题的解决方案因列是否为通用列而异。如果列不是通用的，那么`order by`子句优先——每个列的`Sortable`属性将被关闭且无法开启。另一方面，如果列是通用的，那么它们的`Sortable`属性优先——默认情况下是开启的，并且源查询的`order
    by`子句会被忽略。APEX 仅在每个列的`Sortable`属性被关闭时才会识别`order by`子句。换句话说，如果你希望报表按照`P45_SORTFIELD`的值排序，那么你必须关闭`Employees`报表中五个通用列的`Sortable`属性。


    现在你应该拥有一个可以工作的可排序报表了。测试一下。选择一个排序字段应会导致报表以新的排序顺序重新渲染，点击某一行的链接应显示所选行的`Emp Info`区域。


    剩下的问题是`Previous`和`Next`按钮仍在使用`EName`作为排序字段。你需要修改支撑这些按钮的过程，使其引用`P45_SORTFIELD`而不是`EName`。这个过程在第
    7 章中被称为`FindPreviousNext`，其代码出现在清单 7-18 中。作为参考，清单 12-8 重新打印了该代码。


    ```

    begin

    if :P20_EMPNO is not null then

    select PrevEmp, NextEmp

    into :P20_PREV, :P20_NEXT

    from (select EmpNo, lag(EmpNo)  over (order by EName) as PrevEmp,

    lead(EmpNo) over (order by EName) as NextEmp

    from EMP)

    where EmpNo = :P20_EMPNO;

    end if;

    end;

    ```


