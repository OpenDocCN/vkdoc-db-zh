    ### Figure 7-14

    The revised condition for the `GetEmpInfo` process


    When you are done, you can delete the `GetInfo` button from the page.


    ## Multiple-Use Processes

    Another situation that cannot make use of the `When Button Pressed` property is
    when a process is applicable to more than one button. This section contains two
    examples related to the `Revised Employee Data Entry` page.


    For the first example, suppose that you want to log all changes made to the `EMP`
    table. In particular, each click of the `Delete`, `Insert`, or `Update` button
    should cause an appropriate record to be inserted into a table named `EMPLOG`.


    The SQL statement to create `EMPLOG` appears in Listing [7-12](#335103_3_En_7_Chapter.xhtml#PC26).
    You should create this table by going to the SQL Workshop and submitting that
    statement. Note that the records in the table will describe the change request,
    who made it, and when.


    ```

    create table EMPLOG(Request varchar2(20),

    UserName varchar2(20),

    RequestDate Date)

    ```

    Listing 7-12

    SQL Code to Create the `EMPLOG` Table


    Let `LogChanges` be the name of the process that inserts records into `EMPLOG`.
    You should create this process in the `Revised Employee Data Entry` page, giving
    it the PL/SQL code of Listing [7-13](#335103_3_En_7_Chapter.xhtml#PC27).


    ```

    begin

    insert into EMPLOG (Request, UserName, RequestDate)

    values (:REQUEST, :APP_USER, sysdate);

    end;

    ```

    Listing 7-13

    PL/SQL Code for the `LogChanges` Process


    This code refers to the built-in variables `APP_USER` and `REQUEST`, both of which
    you have seen before. The variable `APP_USER` holds the name of the logged in
    user, and `REQUEST` holds the name of the button or item that performed the submit
    action. Thus, the `LogChanges` process inserts a record into the `EMPLOG` table
    containing the source of the submit action, the user who performed it, and the
    date it occurred.


    This process needs to execute each time the `Insert`, `Delete`, or `Update` button
    is clicked, but not when a value is chosen from the item `P19_UPDATE_EMPNO`. Clearly,
    the `When Button Pressed` property is of no use here because it lets you choose
    only a single button.


    The solution is to set the server-side condition of the process to be the SQL
    expression shown in Figure [7-15](#335103_3_En_7_Chapter.xhtml#Fig15). This expression
    ensures that the process will fire only when the button named `Insert`, `Delete`,
    or `Update` is clicked. Because each of these buttons also has its own dedicated
    process, clicking any of these buttons will cause two processes to execute. The
    processes will execute in order of their sequence number.


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig15_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig15_HTML.jpg)


    ### Figure 7-15

    Condition section for the `LogChanges` process


    You might be thinking that you don’t need a separate process to do the logging;
    instead, you could append the logging code to each of the button-specific processes
    for these buttons. This strategy works, but is not advisable. The problem is that
    doing so would duplicate the logging code, which means that if you want to change
    the way the logging works (such as by adding a new column to the `EMPLOG` table
    or changing the `RequestDate` column to hold the time as well as the date), you
    will need to update it in three places. Moreover, if you decide to add a new button
    to the page, you must remember to extract this logging code from an existing button
    and add it to the process for the new button. It is much more elegant and practical
    to have a separate process that can be called by multiple buttons.


    A second example of a process that cannot make use of the `When Button Pressed`
    property involves the sending of email. In particular, suppose that you want the
    `Revised Employee Data Entry` page to send an email to the database administrator
    when it detects a suspicious modification. Let’s define a suspicious modification
    as a deletion or update that occurs outside of normal 9 a.m. to 5 p.m. working
    hours. To implement this feature, you will need to do two things: create a process
    (call it `SendSuspiciousEmail`) to send the email, and specify a condition for
    when it will fire.


    To create the process, you can use the APEX email-sending function called `apex_mail.send`.
    This function can take several arguments, denoting (among others) the sender and
    recipient addresses, the subject, and the message body. The code for the process
    simply has to calculate these argument values and call the function. Listing [7-14](#335103_3_En_7_Chapter.xhtml#PC28)
    shows my code. (Of course, if you want to try this code for yourself, you should
    change the recipient to be your own email address.)


    ```

    declare

    v_action varchar2(40);

    begin

    if :REQUEST = ''Delete'' then

    v_action := '' deleted the record for emp ''  || :P19_DELETE_EMPNO;

    else

    v_action := '' modified the record for emp '' || :P19_UPDATE_EMPNO;

    end if;

    apex_mail.send(

    p_from => ''EmployeeDemo@MyCompany.com'',

    p_to   => ''dba@MyCompany.com'',

    p_subj => ''Suspicious changes to EMP'',

    p_body => :APP_USER || v_action);

    end;

    ```

    Listing 7-14

    Code for the `SendSuspiciousEmail` process


    The only notable part of this code is its use of the `REQUEST` variable to customize
    the message body so that it mentions the operation performed and the affected
    employee record. For example if the user `boris@secret.org` modified the contents
    of president `KING`’s record, the body of the email would say:


    ```

    boris@secret.org modified the record for emp 7839

    ```


    This code should execute when the `Delete` or `Update` button is pressed and the
    current time (as determined by the `current_timestamp` function) is earlier than
    9 a.m. or later than 5 p.m. Figure [7-16](#335103_3_En_7_Chapter.xhtml#Fig16)
    shows the SQL expression for this condition.


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig16_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig16_HTML.jpg)


    ### Figure 7-16

    Condition for the `SendSuspiciousEmail` process


    ## Page Rendering Processes

    So far, all the processes in this chapter have executed during submit. The remainder
    of the chapter considers processes that execute during page rendering. This situation
    often arises when a page uses redirection instead of submit, such as when linking
    from a row of a report.


    For an example, recall from Chapter [3](#335103_3_En_3_Chapter.xhtml) how an interactive
    report can have a link column, such that clicking a row’s link column displays
    the values for that row in `single row view` (refer to Figures [3-66](#335103_3_En_3_Chapter.xhtml#Fig66)
    and [3-67](#335103_3_En_3_Chapter.xhtml#Fig67)). The `single row view` has buttons
    to move to the previous and next rows of the table and another button to move
    back to report view.'
