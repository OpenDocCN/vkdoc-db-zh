- fmt: '# Form Regions


    A form region is similar to a report region, in that both have a source query.
    Their difference is in how they display their output records. A report displays
    several output records at a time tabularly, whereas a form displays one record
    at a time, with each value in an item. Reports are read-only, but forms can modify
    the database.


    Looking back at Chapter [7](#335103_3_En_7_Chapter.xhtml), the `Emp Info` region
    of the `Single Row View` page (refer to Figure [7-17](#335103_3_En_7_Chapter.xhtml#Fig17))
    is used as a form, as are the `Insert Employee` and `Update/Delete Employee` regions
    of the `Single Row Update` page (refer to Figure [7-24](#335103_3_En_7_Chapter.xhtml#Fig24)).
    Those regions had the type `static content` and used PL/SQL code to implement
    their functionality. This section introduces the `Form` region type and shows
    how the same functionality can be obtained without any PL/SQL coding.


    Figure [10-1](#335103_3_En_10_Chapter.xhtml#Fig1) shows page 29 of the `Employee
    Demo` application, titled `Form View`. This page has a single region, called `Browse
    Employees`, that lets a user browse the `EMP` table one record at a time. The
    region has five items. The first four items display the values of four fields
    of an `EMP` record. Selecting an employee name populates the other three items
    with values from the selected record. Clicking the `Previous` (or `Next`) button
    moves to the previous (or next) record in the table. The fifth item displays the
    string `6 of 14`, indicating the record’s position in the table.


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig1_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig1_HTML.jpg)


    Figure 10-1 The Form View page


    To build this page, create a new blank page titled `Form View`. Then create a
    region named `Browse Employees`, assign it the type `Form`, and give it the source
    query shown in Figure [10-2](#335103_3_En_10_Chapter.xhtml#Fig2).


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig2_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig2_HTML.jpg)


    Figure 10-2 Source of the Browse Employees region


    When you create a `Form` region, APEX will automatically create an associated
    rendering process for it, plus an item for each column in the source query. Figure
    [10-3](#335103_3_En_10_Chapter.xhtml#Fig3) shows the rendering tree immediately
    after creating the `Browse Employees` region and setting its source.


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig3_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig3_HTML.jpg)


    Figure 10-3 The rendering tree for a form region


    The name and type of each item are taken from the corresponding column definitions.
    For example, the item corresponding to the column `EmpNo` is named `P29_EMPNO`,
    and its type is `Number Field`. The item type for a character field is `Text Field`,
    the type for a date field is `Date Picker`, and so on.


    An item’s `Source` section has properties that specify the correspondence between
    the item and its column. Figure [10-4](#335103_3_En_10_Chapter.xhtml#Fig4) shows
    the `Source` section for `P29_EMPNO`.


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig4_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig4_HTML.jpg)


    Figure 10-4 Source properties of a form item


    These items and their property values were created for you when you specified
    the source of the form region. However, there is one property value that you must
    specify yourself, and that is the `Primary Key` property shown in Figure [10-4](#335103_3_En_10_Chapter.xhtml#Fig4).
    The rendering process that comes with the form needs to know which item corresponds
    to the primary key. So you should turn on the `Primary Key` property for `P29_EMPNO`.
    If you forget to specify a primary key item, APEX will display an error message
    to remind you.


    You are now able to run the page. Figure [10-5](#335103_3_En_10_Chapter.xhtml#Fig5)
    shows what gets displayed. Admittedly, this is not very impressive. To get this
    form to do anything, you need to make use of its rendering process.


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig5_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig5_HTML.jpg)


    Figure 10-5 The default form region


    Figure [10-6](#335103_3_En_10_Chapter.xhtml#Fig6) shows the `Identification` section
    for the rendering process. The default name for the process is `Initialize form
    P`, where `P` is the name of the page. The type of the process is `Form-Initialization`,
    which suggests that its purpose is to initialize the form’s items. In fact, the
    initialization process has similar functionality to the `GetEmpInfo` process of
    Listing [7-9](#335103_3_En_7_Chapter.xhtml#PC9). If the session state value for
    `P29_EMPNO` is not null when the page is rendered, then the process will fetch
    the EMP record having that employee number and use it to initialize the other
    items.


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig6_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig6_HTML.jpg)


    Figure 10-6 Identification properties for the initialization process


    However, the form region does not provide you a way to place a value for `P29_EMPNO`
    into the session state; you will need to implement your own way to do that. The
    approach I took was to change the type of `P29_EMPNO` to be a select list whose
    list-of-values query is


    ```

    select EName, EmpNo

    from EMP

    order by EName

    ```


    I then set the action of the select list to `Redirect and Set Value`. Consequently,
    when an employee name is chosen from the list, the corresponding employee number
    will be assigned to the item `P29_EMPNO`. You should verify this in your page.
    Select an employee name from the list and watch the corresponding employee values
    appear in the items.


    The initialization process also contains previous/next functionality. It works
    the same as the `FindPreviousNext` process of Figure [7-18](#335103_3_En_7_Chapter.xhtml#Fig18),
    with the added feature that it also keeps track of the record’s position in the
    table. To configure it, you need to perform the following steps:


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig7_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig7_HTML.jpg)


    Figure 10-7 Configuring the form’s initialization process


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig8_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig8_HTML.jpg)


    Figure 10-8 Configuring the action of the Previous button


    *   Create two hidden items to hold the previous and next employee numbers. I
    called these items `P29_PREV` and `P29_NEXT`.

    *   Create a text field item to hold the string that displays the position of
    the current record. I called this item `P29_COUNT`.

    *   Go to the `Settings` section for the initialization process, and set its `Next
    Primary Key Item`, `Previous Primary Key Item`, and `Current Row/Total Item` properties
    as shown in Figure [10-7](#335103_3_En_10_Chapter.xhtml#Fig7).

    *   Create two buttons, called `Previous` and `Next`. The `Previous` button should
    redirect, setting the value of `P29_EMPNO` to `&P29_PREV.`, as shown in Figure
    [10-8](#335103_3_En_10_Chapter.xhtml#Fig8). Configure the `Next` button similarly.

    *   Optionally, go to the `Server-side Condition` section for the `Previous` button,
    and set its condition to the SQL expression `:P29_PREV is not null`. Configure
    the `Next` button similarly. This causes the buttons to be rendered only when
    appropriate.


    At this point, your page should be fully functional. If you are like me, however,
    you will want to change how it looks. This is where the techniques of Chapter
    [5](#335103_3_En_5_Chapter.xhtml) become useful. I invite you to explore different
    item type, layout, and appearance properties. Here is what I did to get to Figure
    [10-1](#335103_3_En_10_Chapter.xhtml#Fig1):'
