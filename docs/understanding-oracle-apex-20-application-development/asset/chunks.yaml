    the object browser.


    # 2. Applications and Pages


    This chapter begins an examination of the APEX app builder. You will learn about
    the basic tools for creating applications and pages—notably, the Create Application
    wizard and Create Page wizard—and use them to build a multi-page application that
    can be run from any browser. You will also see how to use the APEX page designer
    to modify the properties of the pages in your application. Although these pages
    will have no content to speak of, the techniques in this chapter provide the basis
    for the content-creation techniques of subsequent chapters.'
  trans: '## SQL 命令工具


    你在对象浏览器中可以执行的大多数操作都对应着一条或多条 SQL 语句。实际上，对象浏览器只是一种用于编写和执行较简单 SQL 语句的便捷方式。如果你想要执行更复杂的活动，请使用
    SQL 命令工具。


    SQL 命令工具将屏幕分为两部分。你可以在顶部区域输入 SQL 语句或 PL/SQL 块，结果则显示在底部。图 1-11 展示了执行 SQL 语句 `select
    * from EMP` 后的屏幕。


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig11_HTML.jpg](img/335103_3_En_1_Fig11_HTML.jpg)

    图 1-11


    使用 SQL 命令工具


    APEX 仅显示了 14 条员工记录中的 10 条。原因在于图中顶部标记为 `行` 的选择列表，其值指定了要显示的最大行数。默认情况下，该值设置为 10；如果你希望显示更多行，必须先选择一个更大的数字。这个特性是故意设计的。通过强制你显式指定查询的输出规模，APEX
    保护你免受自身失误的影响。例如，假设你执行一个多表查询，却忘了包含连接条件。产生的输出可能轻易达到数十亿条记录，如果不加以截断，将导致你的 APEX 会话无法使用。


    该选择列表右侧是一个 `查找表` 按钮，当你需要提醒自己有哪些表及其列时，这个按钮很有用。点击此按钮会显示一个类似于对象浏览器的窗口。你可以滚动浏览可用的表；选择一个表会显示其列信息。图
    1-12 显示了使用 `表查找器` 窗口显示 `DEPT` 表列的结果。


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig12_HTML.jpg](img/335103_3_En_1_Fig12_HTML.jpg)

    图 1-12


    使用表查找器窗口


    你可能已经从图 1-11 注意到，`EMP` 记录仍然没有 `出差` 字段的值。在介绍中，我提到除了 `SCOTT`、`ALLEN`、`WARD` 和 `TURNER`，所有员工都在现场工作。处理这个问题的简便方法是执行两条更新命令：第一条将每个人的
    `出差` 值设置为 `N`，第二条将选定的四条记录设置为 `Y`。你可以在命令工具中单独运行每条语句，也可以将它们合并成一个 PL/SQL 块来执行。后一种选项的代码如代码清单
    1-1 所示。


    ```

    begin

    update EMP

    set OffSite = ''N'';

    update EMP

    set OffSite = ''Y''

    where EName in (''SCOTT'', ''ALLEN'', ''WARD'', ''TURNER'');

    end;

    ```

    代码清单 1-1：用于分配出差值的 PL/SQL 块


    ## 总结


    本章探讨了 APEX SQL 工作坊中的对象浏览器和 SQL 命令工具。这两种工具都允许你查看和修改数据库，但通过的是截然不同的界面。对象浏览器提供了一个可视化界面，你通过点击按钮和填写表单来执行任务。SQL
    命令工具则提供了一个基于命令的界面，你通过执行 SQL 语句来执行任务。


    对象浏览器非常适合执行常见和简单的任务。顾名思义，对象浏览器也非常适合探索数据库。点击式的界面使得发现数据库中的各种表并探索其列变得很容易。对象浏览器也不要求用户熟悉
    SQL，因此特别适合临时用户。


    而 SQL 命令工具则假设用户既熟悉数据库结构又精通 SQL。因此，该命令工具适合有经验的数据库用户。如果你了解相应的 SQL，那么从 SQL 命令工具执行许多任务会比从对象浏览器容易得多。


    # 2. 应用程序与页面


    本章开始介绍 APEX 应用程序构建器。你将学习创建应用程序和页面的基本工具——特别是“创建应用程序”向导和“创建页面”向导——并使用它们来构建一个可以从任何浏览器运行的多页面应用程序。你还将看到如何使用
    APEX 页面设计器来修改应用程序中页面的属性。虽然这些页面目前没有实质内容，但本章介绍的技术为后续章节的内容创建技术提供了基础。'
- fmt: '# Creating an Application


    ## Accessing the App Builder


    To use the app builder, you need to get to its home screen. Figure 1-2 illustrated
    two ways to do it: you can click the `App Builder` tab in the APEX menu bar, or
    you can click the large `App Builder` button on the APEX home screen. Either way
    leads you to the screen shown in Figure 2-1.


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig1_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig1_HTML.jpg)


    *Figure 2-1: App builder home screen*


    ## Creating a New Application


    Figure 2-1 shows the two buttons you can use to create a new application: a large
    `Create` button at the top left and a smaller green `Create` button on the far
    right of the search bar. Clicking either button brings up the `Create Application`
    wizard.


    ## Selecting Application Type


    The first screen of the wizard is shown in Figure 2-2. It asks you to select an
    application type. You are creating a new application, so click `New Application`.
    The middle button lets you create an application from an existing spreadsheet
    (or similar) file, and the rightmost button lets you import a prebuilt application
    from the APEX application gallery. Later, after you have become comfortable with
    APEX, you should explore the application gallery. It contains many interesting
    applications—some provide solutions for typical database tasks, and others illustrate
    advanced features of APEX.


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig2_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig2_HTML.jpg)


    *Figure 2-2: First screen of the Create Application wizard*


    ## Configuring Application Details


    The second wizard screen is shown in Figure 2-3. You should enter the name of
    your desired application in the text field at the top left of the page; I chose
    `Employee Demo`. The remainder of the page shows the default configuration of
    the application and invites you to customize it. For example, the `Appearance`
    property asserts that the new application will use the `Vita` theme and display
    its navigation menu on the left side. You can change this appearance if you wish
    by clicking the “set appearance” button at the right. A screen will appear that
    shows you other themes to choose from and gives you the option to change the location
    of the navigation menu. You can also choose the icon that the app builder uses
    to identify your application.


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig3_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig3_HTML.jpg)


    *Figure 2-3: Second screen of the Create Application wizard*


    ## Configuring Pages, Features, and Settings


    The `Pages` section of the screen asserts that the new application will have a
    single blank page, named `Home`. You can edit that page by clicking the `Edit`
    button, and you can add additional pages. Although this ability can be useful
    for experienced developers, it is not necessary—you can easily add and edit pages
    after the application has been created. It is simplest to leave the default pages
    as they are.


    The `Features` section allows you to specify several useful features common to
    typical websites. These features can be added at a later point, so there is no
    need to specify them now.


    The `Settings` section contains some additional settings. The `Application ID`
    value is assigned by the wizard, and uniquely identifies your application on the
    APEX server. My `Employee Demo` application was assigned the number 91392; yours
    will be different. The other property worth mentioning here is `Authentication`.
    The value of this property determines how people log in to your application. The
    default is `Application Express Accounts`, which will allow users to log in only
    if they have an account on your workspace. The other option is `Database`, which
    will only allow users of the underlying database to log in. For the moment, keep
    the default. Chapter 13 will revisit this choice when it examines the various
    authentication options.


    ## Finalizing Creation


    When you are ready for APEX to create your application, click the green `Create
    Application` button. You will be taken back to the app builder home screen, which
    should now display an entry for your application. Figure 2-4 shows that screen
    after I created `Employee Demo`. In general, the app builder home screen has an
    entry for each application you create. These entries can be displayed either as
    rows in a report (as in Figure 2-4) or as icons. Look at the two toggle buttons
    to the right of the `Go` button in Figure 2-4. The leftmost toggle displays the
    entries as icons, and the rightmost one displays them as a report. Try them out.


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig4_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig4_HTML.jpg)


    *Figure 2-4: An updated app builder home screen*'
