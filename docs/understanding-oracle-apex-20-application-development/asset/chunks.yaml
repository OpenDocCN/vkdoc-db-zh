    \nFigure 7-23\nCustomizing when the Previous button is displayed\n\nTo summarize,\
    \ approach 2 implements previous/next functionality as\nfollows. You first create\
    \ hidden items `P20_PREV` and `P20_NEXT`. You then\ncreate the process `FindPreviousNex`t,\n\
    which calculates the value of these two items using the code of Listing\n[7-18](#335103_3_En_7_Chapter.xhtml#PC34)\
    \ and executes\nduring page rendering.\nFinally, you configure the `Previous`\
