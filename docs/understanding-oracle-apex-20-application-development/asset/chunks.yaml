    \ and then clears the items in\nanticipation of another insertion. The `Cancel`\
    \ button returns\nto report mode.\nThe page displays the `Update/Delete Employee`\
    \ region\n when in update mode. The region’s items are initially populated\nwith\
    \ the chosen employee’s information. The user can change item values\nin the region\
    \ and click the `Update` button, which\nupdates the database. Alternatively, clicking\
    \ the `Delete` button deletes\nthe chosen record. Deleting a record also returns\
    \ to report mode because\nthere is no longer a record to display. Clicking the\
    \ `Cancel` button simply\nreturns to report mode.\nNow that you know how the page\
    \ should work, you can consider how to\nimplement each region. The following subsections\
    \ examine these\nissues.\n\nImplementing the Report Region\nThe implementation\
    \ of the report region is\nessentially the same as in the `Single Row View` page\n\
    of Figure [7-17](#335103_3_En_7_Chapter.xhtml#Fig17). One\ndifference is that\
    \ it also has a hidden item, called `P21_MODE`, to\ndistinguish between the three\
    \ modes. The item will have the values `Report`, `Insert`, and `Update`, as\n\
    appropriate, with a `null` value indicating\nreport mode.\n\nThe `EmpNo`\ncolumn\
