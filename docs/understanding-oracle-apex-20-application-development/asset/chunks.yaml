  trans: '

    # 创建新页面


    有几种方法可以为你的应用程序创建新页面，但最直接的方式是在应用主屏幕上点击 `创建页面` 按钮（参见图 2-5）。这样会打开 `创建页面` 向导。你应该使用这个向导为你的应用程序创建第二个页面。


    向导的第一个屏幕（如图 2-9 所示）要求你选择页面类型。目前，我建议你只创建空白页面；其他页面类型是为有经验的开发者（或毫无头绪的初学者）准备的快捷方式。例如，一个
    `报告` 页面实际上就是一个包含报告区域的空白页面。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig9_HTML.jpg](img/335103_3_En_2_Fig9_HTML.jpg)


    图 2-9：“创建页面”向导的第一个屏幕


    向导的第二个屏幕要求输入页面的名称、编号和模式；参见图 2-10。你可以自由使用向导建议的页面编号。在页面名称中输入 `区域实践`，并将模式设置为 `常规`。（其他模式将在“属性编辑器”部分讨论。）`面包屑`
    属性指定页面是否应显示面包屑导航。面包屑导航将在第 4 章讨论；目前，将 `面包屑` 属性设置为 `不在页面上使用面包屑`。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig10_HTML.jpg](img/335103_3_En_2_Fig10_HTML.jpg)


    图 2-10：“创建页面”向导的第二个屏幕


    图 2-11 显示了向导的第三个屏幕，它要求你指定页面是否应该有一个导航菜单条目。选择 `创建新的导航菜单条目` 选项会使屏幕显示项目，供你指定条目名称及其父级。这些选项将在第
    4 章更详细地讨论；目前，使用如图所示的 `区域实践` 和 `未选择父级` 这两个值。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig11_HTML.jpg](img/335103_3_En_2_Fig11_HTML.jpg)


    图 2-11：“创建页面”向导的第三个屏幕


    向导的第四个屏幕（未显示）要求确认。当你点击其 `完成` 按钮时，APEX 会带你进入新页面的页面设计器。但在你深入探究页面设计器及其用法之前，你应该先看看你刚刚创建的页面。


    回到你的应用程序主屏幕（图 2-4），可以通过点击页面设计器面包屑上的链接，或者点击 `App Builder` 选项卡，然后选择你的应用程序图标。屏幕现在应该包含页面
    2 的图标。运行你的应用程序，观察导航菜单现在有两个条目。点击 `区域实践` 条目查看你的新页面。请注意，此页面的内容甚至比主页还少，因为它缺少面包屑导航。还要注意，你可以通过点击它们的导航菜单条目在页面之间移动。


    # 页面设计器


    APEX 页面设计器屏幕让你管理页面的属性和内容。因为一个页面可以有多种组件，每个组件又有众多属性，所以页面设计器极其密集，对初学者来说可能令人生畏。在本书中，你将根据需要，逐步了解页面设计器的不同部分。每次介绍一个新的
    APEX 功能时，你也会看到它与页面设计器的关系。本节介绍页面设计器的基本功能。


    要进入某个页面的页面设计器，从应用程序主屏幕开始，点击所需页面的名称（或图标）。图 2-12 显示了你的主页页面设计器的顶部。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig12_HTML.jpg](img/335103_3_En_2_Fig12_HTML.jpg)


    图 2-12：主页的页面设计器


    在图 2-12 的顶部，面包屑导航的右侧，是一个由几个按钮组成的工具栏。以下是一些立即可用的按钮：


    *   `撤销` 和 `重做` 按钮（在锁定图标右侧）以常规方式将页面恢复到之前的状态。

    *   `实用工具` 按钮（标有扳手图标）有一个菜单项，允许你删除页面。

    *   `保存` 按钮保存你对页面的更改。

    *   `运行` 按钮（在保存按钮右侧）保存页面并运行它。


    页面设计器支持一种迭代的页面开发方法。其理念是在页面设计器内编辑页面内容，然后运行该页面。检查输出后，你返回页面设计器并重复此过程，直到页面令人满意。


    工具栏下方是三个垂直面板，构成了页面设计器的核心。左侧面板显示页面上的组件。右侧面板指定所选组件的属性，称为 `属性编辑器`。中间面板提供实用功能。


    中间面板有三个选项卡，分别对应 `布局`、`页面搜索` 和 `帮助` 这些实用功能。在图 2-12 中被选中的 `布局` 选项卡，以可视化方式显示页面布局。你可以通过拖动中间面板的左右边框来改变其大小，并且可以点击面板顶部的图标在选项卡之间切换。


    左侧面板显示页面的组件，有四个选项卡：`呈现`、`动态操作`、`处理` 和 `页面共享组件`。该面板一次只能显示一个选项卡的内容。你可以通过点击面板顶部的四个图标之一来选择你想要的选项卡。本书重点介绍
    `呈现` 和 `处理` 选项卡，并从 `呈现` 选项卡开始。`处理` 选项卡将在第 7 章介绍。


    `呈现` 选项卡显示决定页面外观的组件。这些组件以树状结构显示。树的根节点表示页面。它有三个子节点，对应页面呈现的三个阶段：`预呈现`（组件初始化的阶段）、`区域`（组件被呈现的阶段）和
    `后呈现`（执行清理活动的阶段）。为了便于阅读，图 2-13 复制了页面 1 的呈现树。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig13_HTML.jpg](img/335103_3_En_2_Fig13_HTML.jpg)


    图 2-13：主页的呈现树


    页面上绝大多数组件位于 `区域` 子树中，所以让我们更仔细地探索它。


    页面的空间被划分为 `位置`。例如，`面包屑栏` 位置横跨页面顶部，而 `内容主体` 位置涵盖了页面中央的主要区域。页面中的每个区域都被分配到一个位置。

