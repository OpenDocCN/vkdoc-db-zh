    中止进程的代码需要解释。`raise_application_error`函数使APEX中止进程并在页面上显示错误消息。该函数接受两个参数：第一个参数是错误代码，可以是–20,000到–20,999之间的任何数字；第二个参数是错误消息。


    请注意，查询包含`for update`子句。该进程需要锁定指定的EMP记录，直到它可以执行`update`语句，以确保在此期间记录无法被修改。


