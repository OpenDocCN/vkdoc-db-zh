- fmt: '## 避免恶意使用


    一个Web应用的认证和授权方案详细规定了谁被允许访问哪些页面的哪些组件。每个经过认证的用户都对数据拥有一个明确定义的、有限的接口——当然，前提是用户以预期的方式访问页面。


    问题在于，用户有各种方式来破坏Web应用的预期功能。本节重点介绍三种此类技术：SQL注入、跨站脚本攻击和URL篡改。在**SQL注入**中，用户提交一个伪装成输入数据的SQL代码片段，并更改正在处理这个伪造“数据”的查询。在**跨站脚本攻击**中，用户将恶意的JavaScript代码片段保存为表数据值的一部分；当另一个用户随后显示该值时，JavaScript代码也会执行。在**URL篡改**中，用户以服务器期望的形式向服务器发送一个URL；然而，该URL请求的操作是用户本不应执行的。


    APEX具有若干特性，可帮助你防范恶意使用。事实上，利用这些特性构建一个防篡改的应用程序相对简单。但要利用它们，你需要了解威胁是什么以及APEX如何防范它们。


    ## SQL注入


    回顾图[12-1](#335103_3_En_12_Chapter.xhtml#Fig1)中的`Report Builder`演示页面。此页面的意图是根据输入到`Enter
    Condition`文本区域的条件，显示`EMP`表或`DEPT`表的子集。然而，恶意用户可能输入一个条件，导致页面以相当意外的方式显示其他表中的数据。例如，图[13-14](#335103_3_En_13_Chapter.xhtml#Fig14)显示了一个显示`USERS`表内容的条件。


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig14_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig14_HTML.jpg)


    图 13-14 Report Builder页面的意外使用


    请注意，输入到`Enter Condition`项中的字符串不是一个合法的SQL条件。相反，它由一个合法条件`EmpNo<0`加上一些额外的SQL代码组成。要理解输入的目的，你必须了解清单[12-1](#335103_3_En_12_Chapter.xhtml#PC4)中的PL/SQL函数如何构建报告的源查询。回想一下，该代码生成了一个针对`EMP`的查询开头，然后将指定的条件附加到其末尾。因此，为图[13-14](#335103_3_En_13_Chapter.xhtml#Fig14)生成的源查询变成如下形式：


    ```sql

    select EName, Job, Offsite

    from EMP where EmpNo < 0

    union

    select UserName, substr(Password,1,9), IsAdministrator

    from USERS

    ```


    请注意，用户利用了`union`关键字来扩大查询的范围。原本针对`EMP`表的预期查询现在只是整个查询的一个子查询。此外，条件`EmpNo<0`导致该子查询不返回任何记录，这意味着整个查询的输出完全来自第二个子查询。


    第二个子查询可以是任意的，但受限于它必须与第一个子查询具有相同的列数，并且每个输出值必须匹配第一个子查询对应列的类型。这一限制解释了为什么第二个子查询只提取密码的前九个字符——`Job`列被定义为`varchar2(9)`，因此尝试选择更多字符会产生SQL错误。


    恶意用户可能利用此漏洞获取用户的编码密码，以便随后破解它们并获得对应用的未授权访问。当然，仅拥有编码密码的前九个字符是不够的。然而，恶意用户可以多次运行此漏洞，每次获取密码的接下来九个字符，从而发现剩余字符。


    这种技术被称为**SQL注入**。当恶意用户在基于文本的项中输入SQL以改变查询的预期目的时，就发生了SQL注入。前面的例子表明SQL注入可能产生严重后果。因此，应用程序开发者必须意识到SQL注入的可能性，并不惜一切代价避免它。


    从某种意义上说，`Report Builder`页面是在自找麻烦，因为`Enter Condition`项期望SQL代码。SQL注入的真正危害在于，即使一个项期望一个值，它也可能成功。例如，让我们构建一个名为`SQL
    Injection`的页面，它将是`Employee Demo`的第48页。图[13-15](#335103_3_En_13_Chapter.xhtml#Fig15)显示了此页面的预期用途。


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig15_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig15_HTML.jpg)


    图 13-15 SQL Injection页面的预期用途


    该页面包含两个区域。`Show Employee Values`区域的输入是`EMP`表的一个列名；点击`Submit`按钮后，将显示该列不同值的报告。在图[13-15](#335103_3_En_13_Chapter.xhtml#Fig15)中，报告显示了`EMP`表中出现的五个职位。


    `Get Employee Info`区域类似。它的输入是一个列名和一个员工编号；点击提交按钮将显示所选员工该列的值。在图[13-15](#335103_3_En_13_Chapter.xhtml#Fig15)中，该区域告诉你Blake是一名经理。


    我们首先考虑如何实现`Show Employee Values`区域。它将有一个项：一个名为`P48_COLUMN1`的文本字段。该区域的类型将是`Classic
    Report`，并将使用如第[12](#335103_3_En_12_Chapter.xhtml)章所述的动态SQL。也就是说，其源将具有`PL/SQL Function
    Body returning SQL Query`类型，并包含清单[13-4](#335103_3_En_13_Chapter.xhtml#PC14)中所示的代码。


    ```sql

    return ''select distinct '' || :P48_COLUMN1 || '' from EMP'';

    ```

    清单 13-4 用于“显示员工值”报告的PL/SQL代码


    由于报告使用动态SQL，你还需要配置一些报告属性，如下所示：


    *   启用通用列名。

    *   指定列数为1。

    *   将列标题类型设置为`PL/SQL Function Body`，表达式为`return :P48_COLUMN1;`。


    现在让我们考虑如何实现`Get Employee Info`区域。它是一个静态内容区域，包含三个项：`P48_COLUMN2`是一个文本字段，`P48_EMPNO2`是一个显示员工姓名并返回员工编号的选择列表，`P48_VALUE2`是一个只读显示项。'
  raw: "Avoiding Malicious Use\nA web application’s authentication and authorization\
    \ schemes form a\ndetailed specification of who is allowed to access what components\
    \ of\nwhich pages. Each authenticated user has a\nwell-defined, limited interface\
    \ to the data—provided, of course, that\nthe user accesses the pages in the intended\
    \ manner.\nThe problem is that there are various ways for users to subvert the\n\
    intended functionality of a web application. This section focuses on\nthree such\
    \ techniques: SQL injection, cross-site scripting, and URL\nmodification. With\
    \ *SQL injection*, a user submits an SQL code\nfragment that masquerades as input\
    \ data and alters the query that is\nprocessing this pretend “data.” With *cross-site\
    \ scripting*, a\nuser saves a malicious JavaScript code fragment as part of a\
    \ table’s\ndata value; when another user subsequently displays that value, the\n\
    JavaScript code also executes. With *URL modification*, a user\nsends a URL to\
    \ the server in a form that the server expects; however,\nthe action requested\
    \ by that URL is something that the user is not\nsupposed to do.\nAPEX has several\
    \ properties to help you guard against malicious use.\nIn fact, it is relatively\
    \ straightforward to use these properties to\nbuild a tamper-proof application.\
    \ To take advantage of them, however,\nyou need to understand what the threats\
    \ are and how APEX can guard\nagainst them.\n\nSQL Injection\n\nRecall the `Report\
    \ Builder` demo page from Figure [12-1](#335103_3_En_12_Chapter.xhtml#Fig1). The\
    \ intent of this page is to\ndisplay a subset of either the `EMP` or `DEPT` table\
    \ based on a\ncondition entered into the `Enter Condition` text\narea. However,\
    \ it\nis possible for a malicious user to enter a condition that causes the\n\
    page to display data from other tables in quite unintended ways. For\nexample,\
    \ Figure [13-14](#335103_3_En_13_Chapter.xhtml#Fig14) shows a\ncondition that\
    \ displays the contents of the `USERS` table.\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig14_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig14_HTML.jpg)\n\
    \nFigure 13-14\nUnintended use of the Report Builder page\n\nNote that the string\
    \ typed into the `Enter Condition` item\nis not a legal SQL condition. Instead,\
    \ it consists of a legal condition,\n`EmpNo<0`,\nplus some additional SQL code.\
    \ To understand the purpose of the input,\nyou have to know how the PL/SQL function\
    \ of Listing [12-1](#335103_3_En_12_Chapter.xhtml#PC4) constructs the report’s\
    \ source\nquery. Recall that the code generates the beginning of a query for `EMP`\
    \ and then appends\nthe specified condition to the end of it. So the source query\
    \ generated\nfor Figure [13-14](#335103_3_En_13_Chapter.xhtml#Fig14) becomes the\n\
    following:\n\n```\nselect EName, Job, Offsite\nfrom EMP where EmpNo < 0\nunion\n\
    select UserName, substr(Password,1,9), IsAdministrator\nfrom USERS\n```\n\nNote\
    \ that the user has taken advantage of the `union` keyword  to broaden the scope\n\
    of the query. The intended query on the `EMP` table is now just\na subquery of\
    \ the overall query. Moreover, the condition `EmpNo<0` causes\nthat subquery to\
    \ return no output records, which means that the output\nof the overall query\
    \ comes entirely from the second subquery.\nThis second subquery can be arbitrary,\
    \ subject only to the\nrestriction that it must have the same number of columns\
    \ as the first\nsubquery, and each output value must match the type of the corresponding\n\
    column of the first subquery. This restriction explains why the second\nsubquery\
    \ extracts only the first nine characters of the password—the\n`Job` column is\n\
    defined as `varchar2(9)`, so\nattempting to select additional characters would\
    \ generate an SQL\nerror.\nA malicious user might use this exploit to obtain the\
    \ encoded\npasswords of users, in order to subsequently crack them and gain\n\
    unauthorized access to the application. Of course, having only the first\nnine\
    \ characters of the encoded passwords is not sufficient. The\nmalicious user could,\
    \ however, discover the remaining characters by\nrunning the exploit several more\
    \ times, each time grabbing the next nine\ncharacters of the password.\nThis technique\
    \ is called *SQL injection*. SQL injection occurs\nwhen a malicious user enters\
    \ SQL into a text-based item to change a\nquery from its intended purpose. The\
    \ preceding example shows that SQL\ninjection can have serious consequences. Thus,\
    \ application developers\nmust be aware of the possibility of SQL injection and\
    \ avoid it at all\ncosts.\n\nIn a sense, the `Report Builder` page was asking\
    \ for trouble because the `Enter Condition` item\nexpected SQL code. The real\
    \ perniciousness of SQL injection is that it\ncan succeed even when an item expects\
    \ a value. For example, let’s build\na page titled `SQL Injection`, which will\
    \ be page 48 of `Employee Demo`. Figure\n[13-15](#335103_3_En_13_Chapter.xhtml#Fig15)\
    \ shows an\nintended use of this page.\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig15_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig15_HTML.jpg)\n\
    \nFigure 13-15\nIntended use of the SQL Injection page\n\nThe page contains two\
    \ regions. The input to the `Show Employee Values`\nregion is a column name from\
    \ the `EMP` table; clicking\nthe `Submit`\nbutton then displays a report of the\
    \ distinct values for that column. In\nFigure [13-15](#335103_3_En_13_Chapter.xhtml#Fig15),\
    \ the report\ndisplays the five jobs appearing in the `EMP` table.\nThe `Get Employee\
    \ Info` region is similar. Its input is a\ncolumn name and employee number; clicking\
    \ the submit button displays the\nvalue of that column for the selected employee.\
    \ In Figure [13-15](#335103_3_En_13_Chapter.xhtml#Fig15), the region\ntells you\
    \ that Blake is a manager.\n\nLet’s first consider how to implement the `Show\
    \ Employee Values`\nregion. It will have a single item: a text field named `P48_COLUMN1`.\
    \ The\nregion will have the type `Classic Report` and\nwill use dynamic SQL as\
    \ described in Chapter [12](#335103_3_En_12_Chapter.xhtml). That is, its source\
    \ will have\nthe type `PL/SQL Function Body returning SQL Query` and have the\
    \ code shown in\nListing [13-4](#335103_3_En_13_Chapter.xhtml#PC14).\n\n```\n\
    return 'select distinct ' || :P48_COLUMN1 || ' from EMP';\nListing 13-4\nPL/SQL\
    \ Code for the Show Employee Values Report\n```\n\nBecause the report uses dynamic\
    \ SQL, you will also need to configure\nsome of the report properties, as follows:\n\
    \n*   Enable generic column names.\n\n*   Specify a column count of 1.\n\n*  \
    \ Set the column heading type to `PL/SQL Function Body`,\n    having the expression\
    \ `return :P48_COLUMN1;`.\n\nNow let’s consider how to implement the `Get Employee\
    \ Info`\nregion. It is a static content region having three items: `P48_COLUMN2`\
    \ is a text\nfield, `P48_EMPNO2` is a\nselect list that displays employee names\
    \ and returns employee numbers,\nand `P48_VALUE2`\nis a display-only item."
  trans: '## 避免恶意使用


    一个 Web 应用的认证和授权方案详细规定了谁被允许访问哪些页面的哪些组件。每个经过认证的用户都对数据拥有一个明确定义的、有限的接口——当然，前提是用户以预期的方式访问页面。


    问题在于，用户有各种方式来破坏 Web 应用的预期功能。本节重点介绍三种此类技术：SQL 注入、跨站脚本攻击和 URL 篡改。在**SQL 注入**中，用户提交一个伪装成输入数据的
    SQL 代码片段，并更改正在处理这个伪造“数据”的查询。在**跨站脚本攻击**中，用户将恶意的 JavaScript 代码片段保存为表数据值的一部分；当另一个用户随后显示该值时，JavaScript
    代码也会执行。在**URL 篡改**中，用户以服务器期望的形式向服务器发送一个 URL；然而，该 URL 请求的操作是用户本不应执行的。


    APEX 具有若干特性，可帮助你防范恶意使用。事实上，利用这些特性构建一个防篡改的应用程序相对简单。但要利用它们，你需要了解威胁是什么以及 APEX 如何防范它们。


    ## SQL 注入


    回顾图 12-1 中的`Report Builder`演示页面。此页面的意图是根据输入到`Enter Condition`文本区域的条件，显示`EMP`表或`DEPT`表的子集。然而，恶意用户可能输入一个条件，导致页面以相当意外的方式显示其他表中的数据。例如，图
    13-14 显示了一个显示`USERS`表内容的条件。


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig14_HTML.jpg](img/335103_3_En_13_Fig14_HTML.jpg)


    图 13-14 Report Builder 页面的意外使用


    请注意，输入到`Enter Condition`项中的字符串不是一个合法的 SQL 条件。相反，它由一个合法条件`EmpNo<0`加上一些额外的 SQL 代码组成。要理解输入的目的，你必须了解清单
    12-1 中的 PL/SQL 函数如何构建报告的源查询。回想一下，该代码生成了一个针对`EMP`的查询开头，然后将指定的条件附加到其末尾。因此，为图 13-14
    生成的源查询变成如下形式：


    ```sql

    select EName, Job, Offsite

    from EMP where EmpNo < 0

    union

    select UserName, substr(Password,1,9), IsAdministrator

    from USERS

    ```


    请注意，用户利用了`union`关键字来扩大查询的范围。原本针对`EMP`表的预期查询现在只是整个查询的一个子查询。此外，条件`EmpNo<0`导致该子查询不返回任何记录，这意味着整个查询的输出完全来自第二个子查询。


    第二个子查询可以是任意的，但受限于它必须与第一个子查询具有相同的列数，并且每个输出值必须匹配第一个子查询对应列的类型。这一限制解释了为什么第二个子查询只提取密码的前九个字符——`Job`列被定义为`varchar2(9)`，因此尝试选择更多字符会产生
    SQL 错误。


    恶意用户可能利用此漏洞获取用户的编码密码，以便随后破解它们并获得对应用的未授权访问。当然，仅拥有编码密码的前九个字符是不够的。然而，恶意用户可以多次运行此漏洞，每次获取密码的接下来九个字符，从而发现剩余字符。


    这种技术被称为**SQL 注入**。当恶意用户在基于文本的项中输入 SQL 以改变查询的预期目的时，就发生了 SQL 注入。前面的例子表明 SQL 注入可能产生严重后果。因此，应用程序开发者必须意识到
    SQL 注入的可能性，并不惜一切代价避免它。


    从某种意义上说，`Report Builder`页面是在自找麻烦，因为`Enter Condition`项期望 SQL 代码。SQL 注入的真正危害在于，即使一个项期望一个值，它也可能成功。例如，让我们构建一个名为`SQL
    Injection`的页面，它将是`Employee Demo`的第 48 页。图 13-15 显示了此页面的预期用途。


    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig15_HTML.jpg](img/335103_3_En_13_Fig15_HTML.jpg)


    图 13-15 SQL Injection 页面的预期用途


    该页面包含两个区域。`Show Employee Values`区域的输入是`EMP`表的一个列名；点击`Submit`按钮后，将显示该列不同值的报告。在图
    13-15 中，报告显示了`EMP`表中出现的五个职位。


    `Get Employee Info`区域类似。它的输入是一个列名和一个员工编号；点击提交按钮将显示所选员工该列的值。在图 13-15 中，该区域告诉你 Blake
    是一名经理。


    我们首先考虑如何实现`Show Employee Values`区域。它将有一个项：一个名为`P48_COLUMN1`的文本字段。该区域的类型将是`Classic
    Report`，并将使用如第 12 章所述的动态 SQL。也就是说，其源将具有`PL/SQL Function Body returning SQL Query`类型，并包含清单
    13-4 中所示的代码。


    ```sql

    return ''select distinct '' || :P48_COLUMN1 || '' from EMP'';

    ```

    清单 13-4 用于“显示员工值”报告的 PL/SQL 代码


    由于报告使用动态 SQL，你还需要配置一些报告属性，如下所示：


    *   启用通用列名。

    *   指定列数为 1。

    *   将列标题类型设置为`PL/SQL Function Body`，表达式为`return :P48_COLUMN1;`。


    现在让我们考虑如何实现`Get Employee Info`区域。它是一个静态内容区域，包含三个项：`P48_COLUMN2`是一个文本字段，`P48_EMPNO2`是一个显示员工姓名并返回员工编号的选择列表，`P48_VALUE2`是一个只读显示项。'
- fmt: "# SQL注入\n\n该区域有一个与提交按钮关联的过程；该过程的代码出现在清单[13-5](#335103_3_En_13_Chapter.xhtml#PC15)中。代码首先构造一个查询字符串以检索指定的员工值。然后使用`execute\
    \ immediate`来检索员工`P48_EMPNO2`的指定值，并将其放入只显示项`P48_VALUE2`中。\n\n```\ndeclare\n  v_query\
    \ varchar2(100);\nbegin\n  v_query := 'select ' || :P48_COLUMN2 || ' from EMP\
    \ where EmpNo = :1';\n  execute immediate v_query\n                into  :P48_VALUE2\n\
    \              using :P48_EMPNO2;\nend;\nListing 13-5\nProcess Code for the Get\
    \ Employee Info Region\n```\n\n尽管此页面上的区域看起来无害，但它们容易受到SQL注入攻击。图[13-16](#335103_3_En_13_Chapter.xhtml#Fig16)显示了如何利用页面的任一区域来显示`ADMIN`用户的完整编码密码。（截图截断了编码密码以节省空间。）\n\
    \n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig16_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig16_HTML.jpg)\n\
    图 13-16\nSQL注入页面的恶意使用\n\n图[13-16](#335103_3_En_13_Chapter.xhtml#Fig16)中`P48_COLUMN1`的值如下：\n\
    \n```\nPassword from USERS where UserName = 'ADMIN' --\n```\n\n当APEX使用此字符串构造报表源时，它会得到以下SQL查询：\n\
    \n```\nselect distinct Password from USERS where UserName = 'ADMIN' -- from EMP\n\
    ```\n\n回想一下，字符“`--`”在PL/SQL中表示注释。因此，SQL代码中的`from EMP`部分被完全忽略。换句话说，SQL注入将针对`EMP`表的查询转变成了针对`USERS`表的查询。\n\
    \n`Get Employee Info`区域使用了本质上相同的注入技巧。图[13-16](#335103_3_En_13_Chapter.xhtml#Fig16)中`P48_COLUMN2`的值如下：\n\
    \n```\nPassword from USERS where UserName = 'ADMIN' or :1 < 0 --\n```\n\n当APEX使用此字符串构造报表源时，它会得到以下SQL查询：\n\
    \n```\nselect Password from USERS\n    where UserName = 'ADMIN' or :1 < 0 --from\
    \ EMP where EmpNo = :1\n```\n\n同样，注释字符之后的所有内容都被忽略，因此注入最终创建了一个对`USERS`表而非`EMP`表的查询。请注意，恶意用户必须仔细构造注入代码，以使生成的SQL字符串合法。考虑`Get\
    \ Employee Info`示例。`execute immediate`语句将员工号传递给SQL查询；虽然恶意查询不会使用此值，但它仍然需要一个形式参数来接收它。表达式`:1<0`实现了这个目标。指定的员工号被赋值给参数`:1`。因为员工号总是正数，这个表达式总是求值为`false`，所以它不会影响查询的输出。\n\
    \n一般来说，只要查询字符串是从原始的、未检查的用户输入构造的，就可能发生SQL注入。在这种情况下，恶意用户可能能够输入一个代码片段作为输入，从而改变构造查询的目的。因此，应用程序开发人员应始终检查用户输入，以确保其符合预期的格式。这里有三种策略：\n\
    \n*   避免基于文本的输入。请注意，如果用户被迫从列表中选择一个列，图[13-16](#335103_3_En_13_Chapter.xhtml#Fig16)的SQL注入技术将不起作用（尽管URL修改技术可以规避此策略，稍后会看到）。\n\
    *   为输入编写一个APEX验证，以检测可能的代码片段。例如，在图[13-16](#335103_3_En_13_Chapter.xhtml#Fig16)中，你可以拒绝接受包含空格或注释字符的列名。\n\
    *   将输入转换为“净化”形式。也就是说，编写一个函数将用户值转换为可接受的值。在图[13-16](#335103_3_En_13_Chapter.xhtml#Fig16)中，该函数可能会删除输入中的所有空格，或者将每个空格转换为转义的HTML字符`&nbsp;`。\n\
    \n让我们看看如何使用这些策略来改进图[13-14](#335103_3_En_13_Chapter.xhtml#Fig14)所示的`Report Builder`页面。问题当然是，基于文本的项`Enter\
    \ Condition`要求用户输入SQL代码。第一种策略建议你尝试一种非基于文本的方式来指定条件。`Count and Delete`演示页面的`Version\
    \ 2`区域（如图[12-4](#335103_3_En_12_Chapter.xhtml#Fig4)所示）展示了如何做到这一点，至少对于简单条件是这样。APEX\
    \ *query builder*提供了一个更复杂的解决方案。\n\n注意\n如果你从未使用过查询构建器，你应该试一试。从APEX SQL Workshop开始，点击`Utilities`，然后点击`Query\
    \ Builder`。点击一个表名以将其包含在查询中，然后进行探索。\n\n第二种策略建议你编写一个验证，拒绝包含可疑关键字（如`union`或`select`）的条件字符串。这个策略在这里似乎是合理的。\n\
    \n第三种策略对于期望SQL代码作为输入的项效果不佳，如图[13-14](#335103_3_En_13_Chapter.xhtml#Fig14)所示。然而，对于期望值的项，如图[13-15](#335103_3_En_13_Chapter.xhtml#Fig15)中的`SQL\
    \ Injection`页面，它是有用的。特别是，对于`Show Employee Values`区域的一个好策略是从报表源的`P48_COLUMN1`中删除所有空格，如清单[13-6](#335103_3_En_13_Chapter.xhtml#PC20)所示。\n\
    \n```\nreturn 'select distinct ' || replace(:P48_COLUMN1, ' ', '') || ' from EMP';\n\
    Listing 13-6\nRevising Listing 13-4 to Avoid SQL Injection\n```\n\n类似地，你可以通过从提交过程代码的`P48_COLUMN2`中删除所有空格来改进`Get\
    \ Employee Info`区域。\n\n## 防护策略\n*   避免基于文本的输入。请注意，如果用户被迫从列表中选择一个列，图[13-16](#335103_3_En_13_Chapter.xhtml#Fig16)的SQL注入技术将不起作用（尽管URL修改技术可以规避此策略，稍后会看到）。\n\
    *   为输入编写一个APEX验证，以检测可能的代码片段。例如，在图[13-16](#335103_3_En_13_Chapter.xhtml#Fig16)中，你可以拒绝接受包含空格或注释字符的列名。\n\
    *   将输入转换为“净化”形式。也就是说，编写一个函数将用户值转换为可接受的值。在图[13-16](#335103_3_En_13_Chapter.xhtml#Fig16)中，该函数可能会删除输入中的所有空格，或者将每个空格转换为转义的HTML字符`&nbsp;`。\n\
    \n# 跨站脚本\n\n在*cross-site scripting*技术中，恶意用户将JavaScript代码作为数据库值的一部分保存。这段代码就像一个陷阱：当另一个用户显示包含该值的页面时，用户的浏览器会在用户不知情的情况下执行JavaScript代码。JavaScript代码可能会做诸如将用户的会话信息通过电子邮件发送给攻击者（从而让攻击者冒充用户）或让APEX服务器执行指定函数等事情。\n\
    \n跨站脚本之所以如此邪恶，是因为JavaScript代码是*以受害者的授权级别*执行的。因此，如果管理员成为跨站脚本攻击的受害者，攻击者将获得数据库的管理员级访问权限。\n\
    \n成功的跨站脚本攻击有三个要求：首先，某个表必须有一个类型为`varchar2(N)`的列，其中`N`足够大以容纳JavaScript代码；其次，应用程序的某个页面必须有一个用于向该字段输入数据的基于文本的项；第三，应用程序的某个页面必须配置为以“原始”未转义形式显示被污染的值。\n\
    \n就目前情况而言，`Employee Demo`应用程序不易受到跨站脚本攻击，因为`EMP`和`DEPT`都没有足够大的列。因此，为了本示例的目的，你应该通过将`DEPT`表的`Loc`列扩展为`varchar2(80)`来修改它。所需的SQL如下：\n\
    \n```\nalter table DEPT\nmodify Loc varchar2(80)\n```\n\n现在，你可以构建一个页面来演示跨站脚本攻击。`Cross-Site\
    \ Scripting`页面是`Employee Demo`的第49页，如图[13-17](#335103_3_En_13_Chapter.xhtml#Fig17)所示。\n\
    \n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig17_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig17_HTML.jpg)\n\
    图 13-17\n跨站脚本页面"
  raw: "The region has a process associated with the submit button; the code for\n\
    this process appears in Listing [13-5](#335103_3_En_13_Chapter.xhtml#PC15). The\
    \ code\nfirst constructs a query string to retrieve the value of the specified\n\
    employee. It then uses `execute immediate` to\nretrieve the specified value for\
    \ the employee `P48_EMPNO2` and place\nit in the display-only item `P48_VALUE2`.\n\
    \n```\ndeclare\nv_query varchar2(100);\nbegin\nv_query := 'select ' || :P48_COLUMN2\
    \ || ' from EMP where EmpNo = :1';\nexecute immediate v_query\ninto  :P48_VALUE2\n\
    using :P48_EMPNO2;\nend;\nListing 13-5\nProcess Code for the Get Employee Info\
    \ Region\n```\n\nAlthough the regions on this page seem innocuous enough, they\
    \ are\nvulnerable to SQL injection. Figure [13-16](#335103_3_En_13_Chapter.xhtml#Fig16)\
    \ shows how\neither region of the page can be used to display the entire encoded\n\
    password of the `ADMIN` user. (The\nscreenshot cuts off the encoded passwords\
    \ to save space.)\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig16_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig16_HTML.jpg)\n\
    \nFigure 13-16\nMalicious use of the SQL Injection page\n\nThe value for `P48_COLUMN1`\
    \ in Figure\n[13-16](#335103_3_En_13_Chapter.xhtml#Fig16) is this:\n\n```\nPassword\
    \ from USERS where UserName = 'ADMIN' --\n```\n\nWhen APEX uses this string to\
    \ construct the source of the report, it\ngets the following SQL query:\n\n```\n\
    select distinct Password from USERS where UserName = 'ADMIN' -- from EMP\n```\n\
    \nRecall that the character “`--`” denotes a comment\nin PL/SQL. Thus, the `from\
    \ EMP` part of the\nSQL code is totally ignored. In other words, the SQL injection\n\
    transformed a query on the `EMP` table into a\nquery on the `USERS` table.\n\n\
    The `Get Employee Info` region uses essentially the same injection trick. The\
    \ value\nfor `P48_COLUMN2`\nin Figure [13-16](#335103_3_En_13_Chapter.xhtml#Fig16)\
    \ is the\nfollowing:\n\n```\nPassword from USERS where UserName = 'ADMIN' or :1\
    \ < 0 --\n```\n\nWhen APEX uses this string to construct the source of the report,\
    \ it\ngets the following SQL query:\n\n```\nselect Password from USERS\nwhere\
    \ UserName = 'ADMIN' or :1 < 0 --from EMP where EmpNo = :1\n```\n\nAgain, everything\
    \ after the comment characters is ignored, so the\ninjection winds up creating\
    \ a query on the `USERS` table  instead of the `EMP` table.\nNote that the malicious\
    \ user must carefully craft the injected code\nso that the resulting SQL string\
    \ is legal. Consider the `Get Employee Info`\nexample. The `execute immediate`\
    \ statement passes an employee number to the SQL query;\nalthough the malicious\
    \ query will not use this value, it still needs to\nhave a formal parameter to\
    \ receive it. The expression `:1<0` achieves this\ngoal. The specified employee\
    \ number is assigned to the parameter `:1`. Because employee\nnumbers are always\
    \ positive, this expression always evaluates to `false`, so it does not\naffect\
    \ the output of the query.\n\nIn general, SQL injection is possible whenever a\
    \ query string is\nconstructed from raw, unchecked user input. In such cases,\
    \ a malicious\nuser might be able to enter a code fragment as input that changes\
    \ the\npurpose of the constructed query. Therefore, an application developer\n\
    should always check user input to ensure that it is in the intended\nformat. Here\
    \ are three strategies:\n\n*   *Avoid text-based input*. Note that the SQL injection\n\
    \    technique of Figure [13-16](#335103_3_En_13_Chapter.xhtml#Fig16) would not\n\
    \    work if the user were forced to choose a column from a list (although\n \
    \   the URL modification technique could circumvent this strategy, as you\n  \
    \  will see later).\n\n*   *Write an APEX validation for the input that detects\
    \ possible\n    code fragments*. For example, in Figure [13-16](#335103_3_En_13_Chapter.xhtml#Fig16),\
    \ you might\n    refuse to accept column names that contain spaces or comment\n\
    \    characters.\n\n*   *Translate the input into a “cleansed” form*. That is,\n\
    \    write a function to transform a user value into an acceptable one. In\n \
    \   Figure [13-16](#335103_3_En_13_Chapter.xhtml#Fig16), the\n    function might\
    \ remove all spaces from the input or it might convert each\n    space into the\
    \ escaped HTML character `& nbsp;`.\n\nLet’s see how these strategies can be used\
    \ to improve the `Report Builder` page\nshown in Figure\n[13-14](#335103_3_En_13_Chapter.xhtml#Fig14).\
    \ The issue,\nof course, is that the text-based item `Enter Condition`\nrequires\
    \ the user to enter SQL code. The first strategy suggests that\nyou try a non-text-based\
    \ way to specify the condition. The `Version 2` region of\nthe `Count and Delete`\
    \ demo page (shown in Figure [12-4](#335103_3_En_12_Chapter.xhtml#Fig4)) showed\
    \ how this could be done,\nat least for simple conditions. The APEX *query builder*\
    \ provides\na more complex solution.\n\nNote\n\nIf you have never used the query\
    \ builder, you should try it. Starting\nfrom the APEX SQL Workshop, click `Utilities`\
    \ and then\n`Query Builder`.\nClick a table name to include it in the query, and\
    \ explore.\n\nThe second strategy suggests you write a validation that rejects\n\
    condition strings that contain suspicious keywords such as `union` or `select`.\
    \ This strategy\nseems reasonable here.\n\nThe third strategy won’t work well\
    \ for an item that expects SQL code as\ninput, as in Figure [13-14](#335103_3_En_13_Chapter.xhtml#Fig14).\
    \ However, it is useful\nfor items that expect values, as in the `SQL Injection`\
    \ page of\nFigure [13-15](#335103_3_En_13_Chapter.xhtml#Fig15). In\nparticular,\
    \ a good strategy for the `Show Employee Values`\nregion is to remove all spaces\
    \ from `P48_COLUMN1` in the\nsource of the report, as shown in Listing [13-6](#335103_3_En_13_Chapter.xhtml#PC20).\n\
    \n```\nreturn 'select distinct ' || replace(:P48_COLUMN1, ' ', '') || ' from EMP';\n\
    Listing 13-6\nRevising Listing 13-4 to Avoid SQL Injection\n```\n\nSimilarly,\
    \ you can improve the `Get Employee Info`\nregion by removing all spaces from\
    \ `P48_COLUMN2` in the\ncode for the submit process.\n\nCross-Site Scripting\n\
    In the *cross-site\nscripting* \n technique, a malicious user saves JavaScript\
    \ code as part of a\ndatabase value. The code acts like a booby trap: when another\
    \ user\ndisplays a page containing that value, the user’s browser executes the\n\
    JavaScript code without the user’s knowledge. The JavaScript code might\ndo things\
    \ like emailing the user’s session information to the attacker\n(thereby letting\
    \ the attacker pretend to be the user) or having the APEX\nserver execute a specified\
    \ function.\nWhat makes cross-site scripting so evil is that the JavaScript code\n\
    gets executed *with the victim's level of authorization*. So if\nan administrator\
    \ falls prey to a cross-site scripting attack, the\nattacker would obtain administrator-level\
    \ access to the database.\nA successful cross-site scripting attack has three\n\
    requirements: first, some table must have a column of type `varchar2(N),` where\n\
    `N` is large\nenough to hold the JavaScript code; second, some page of the application\n\
    must have a text-based item used for data entry into this field; and\nthird, some\
    \ page of the application must be configured to display the\ntainted value in\
    \ “raw” unescaped form.\n\nAs it stands, the `Employee Demo`\napplication is not\
    \ susceptible to cross-site scripting because neither\n`EMP` nor `DEPT` has a\n\
    sufficiently large column. So for the purpose of this example, you\nshould alter\
    \ the `DEPT` table by\nexpanding the column `Loc` to `varchar2(80)`. The\nrequired\
    \ SQL is this:\n\n```\nalter table DEPT\nmodify Loc varchar2(80)\n```\n\nNow you\
    \ can build a page to demonstrate cross-site scripting attacks.\nThe `Cross-Site\
    \ Scripting` page is page 49 of `Employee Demo` and is\nshown in Figure [13-17](#335103_3_En_13_Chapter.xhtml#Fig17).\n\
    \n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig17_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig17_HTML.jpg)\n\
    \nFigure 13-17\nCross-Site Scripting page"
  trans: "\n# SQL 注入\n\n该区域有一个与提交按钮关联的过程；该过程的代码出现在清单 13-5 中。代码首先构造一个查询字符串以检索指定的员工值。然后使用`execute\
    \ immediate`来检索员工`P48_EMPNO2`的指定值，并将其放入只显示项`P48_VALUE2`中。\n\n```\ndeclare\n  v_query\
    \ varchar2(100);\nbegin\n  v_query := 'select ' || :P48_COLUMN2 || ' from EMP\
    \ where EmpNo = :1';\n  execute immediate v_query\n                into  :P48_VALUE2\n\
    \              using :P48_EMPNO2;\nend;\nListing 13-5\n获取员工信息区域的过程代码\n```\n\n\
    尽管此页面上的区域看起来无害，但它们容易受到 SQL 注入攻击。图 13-16 显示了如何利用页面的任一区域来显示`ADMIN`用户的完整编码密码。（截图截断了编码密码以节省空间。）\n\
    \n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig16_HTML.jpg](img/335103_3_En_13_Fig16_HTML.jpg)\n\
    图 13-16\nSQL 注入页面的恶意使用\n\n图 13-16 中`P48_COLUMN1`的值如下：\n\n```\nPassword from USERS\
    \ where UserName = 'ADMIN' --\n```\n\n当 APEX 使用此字符串构造报表源时，它会得到以下 SQL 查询：\n\n```\n\
    select distinct Password from USERS where UserName = 'ADMIN' -- from EMP\n```\n\
    \n回想一下，字符“`--`”在 PL/SQL 中表示注释。因此，SQL 代码中的`from EMP`部分被完全忽略。换句话说，SQL 注入将针对`EMP`表的查询转变成了针对`USERS`表的查询。\n\
    \n`获取员工信息`区域使用了本质上相同的注入技巧。图 13-16 中`P48_COLUMN2`的值如下：\n\n```\nPassword from USERS\
    \ where UserName = 'ADMIN' or :1 < 0 --\n```\n\n当 APEX 使用此字符串构造报表源时，它会得到以下 SQL\
    \ 查询：\n\n```\nselect Password from USERS\n    where UserName = 'ADMIN' or :1 <\
    \ 0 --from EMP where EmpNo = :1\n```\n\n同样，注释字符之后的所有内容都被忽略，因此注入最终创建了一个对`USERS`表而非`EMP`表的查询。请注意，恶意用户必须仔细构造注入代码，以使生成的\
    \ SQL 字符串合法。考虑`获取员工信息`示例。`execute immediate`语句将员工号传递给 SQL 查询；虽然恶意查询不会使用此值，但它仍然需要一个形式参数来接收它。表达式`:1<0`实现了这个目标。指定的员工号被赋值给参数`:1`。因为员工号总是正数，这个表达式总是求值为`false`，所以它不会影响查询的输出。\n\
    \n一般来说，只要查询字符串是从原始的、未检查的用户输入构造的，就可能发生 SQL 注入。在这种情况下，恶意用户可能能够输入一个代码片段作为输入，从而改变构造查询的目的。因此，应用程序开发人员应始终检查用户输入，以确保其符合预期的格式。这里有三种策略：\n\
    \n*   避免基于文本的输入。请注意，如果用户被迫从列表中选择一个列，图 13-16 的 SQL 注入技术将不起作用（尽管 URL 修改技术可以规避此策略，稍后会看到）。\n\
    *   为输入编写一个 APEX 验证，以检测可能的代码片段。例如，在图 13-16 中，你可以拒绝接受包含空格或注释字符的列名。\n*   将输入转换为“净化”形式。也就是说，编写一个函数将用户值转换为可接受的值。在图\
    \ 13-16 中，该函数可能会删除输入中的所有空格，或者将每个空格转换为转义的 HTML 字符`&nbsp;`。\n\n让我们看看如何使用这些策略来改进图\
    \ 13-14 所示的`报表生成器`页面。问题当然是，基于文本的项`输入条件`要求用户输入 SQL 代码。第一种策略建议你尝试一种非基于文本的方式来指定条件。`计数和删除`演示页面的`版本\
    \ 2`区域（如图 12-4 所示）展示了如何做到这一点，至少对于简单条件是这样。APEX *query builder*提供了一个更复杂的解决方案。\n\n\
    注意\n如果你从未使用过查询构建器，你应该试一试。从 APEX SQL Workshop 开始，点击`实用程序`，然后点击`查询构建器`。点击一个表名以将其包含在查询中，然后进行探索。\n\
    \n第二种策略建议你编写一个验证，拒绝包含可疑关键字（如`union`或`select`）的条件字符串。这个策略在这里似乎是合理的。\n\n第三种策略对于期望\
    \ SQL 代码作为输入的项效果不佳，如图 13-14 所示。然而，对于期望值的项，如图 13-15 中的`SQL 注入`页面，它是有用的。特别是，对于`显示员工值`区域的一个好策略是从报表源的`P48_COLUMN1`中删除所有空格，如清单\
    \ 13-6 所示。\n\n```\nreturn 'select distinct ' || replace(:P48_COLUMN1, ' ', '')\
    \ || ' from EMP';\nListing 13-6\n修改清单 13-4 以避免 SQL 注入\n```\n\n类似地，你可以通过从提交过程代码的`P48_COLUMN2`中删除所有空格来改进`获取员工信息`区域。\n\
    \n## 防护策略\n*   避免基于文本的输入。请注意，如果用户被迫从列表中选择一个列，图 13-16 的 SQL 注入技术将不起作用（尽管 URL 修改技术可以规避此策略，稍后会看到）。\n\
    *   为输入编写一个 APEX 验证，以检测可能的代码片段。例如，在图 13-16 中，你可以拒绝接受包含空格或注释字符的列名。\n*   将输入转换为“净化”形式。也就是说，编写一个函数将用户值转换为可接受的值。在图\
    \ 13-16 中，该函数可能会删除输入中的所有空格，或者将每个空格转换为转义的 HTML 字符`&nbsp;`。\n\n# 跨站脚本\n\n在*跨站脚本*技术中，恶意用户将\
    \ JavaScript 代码作为数据库值的一部分保存。这段代码就像一个陷阱：当另一个用户显示包含该值的页面时，用户的浏览器会在用户不知情的情况下执行 JavaScript\
    \ 代码。JavaScript 代码可能会做诸如将用户的会话信息通过电子邮件发送给攻击者（从而让攻击者冒充用户）或让 APEX 服务器执行指定函数等事情。\n\
    \n跨站脚本之所以如此邪恶，是因为 JavaScript 代码是*以受害者的授权级别*执行的。因此，如果管理员成为跨站脚本攻击的受害者，攻击者将获得数据库的管理员级访问权限。\n\
    \n成功的跨站脚本攻击有三个要求：首先，某个表必须有一个类型为`varchar2(N)`的列，其中`N`足够大以容纳 JavaScript 代码；其次，应用程序的某个页面必须有一个用于向该字段输入数据的基于文本的项；第三，应用程序的某个页面必须配置为以“原始”未转义形式显示被污染的值。\n\
    \n就目前情况而言，`员工演示`应用程序不易受到跨站脚本攻击，因为`EMP`和`DEPT`都没有足够大的列。因此，为了本示例的目的，你应该通过将`DEPT`表的`Loc`列扩展为`varchar2(80)`来修改它。所需的\
    \ SQL 如下：\n\n```\nalter table DEPT\nmodify Loc varchar2(80)\n```\n\n现在，你可以构建一个页面来演示跨站脚本攻击。`跨站脚本`页面是`员工演示`的第\
    \ 49 页，如图 13-17 所示。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig17_HTML.jpg](img/335103_3_En_13_Fig17_HTML.jpg)\n\
    图 13-17\n跨站脚本页面\n"
- fmt: "This page has two regions. The `Departments` region is a classic report having\
    \ the source query\n\n```sql\nselect * from DEPT\norder by DName\n```\n\nThe `Update\
    \ Location` region is a form having the source\n\n```sql\nselect DeptNo, Loc\n\
    from DEPT\n```\n\nYou should customize the form region using the techniques of\
    \ Chapter [10](#335103_3_En_10_Chapter.xhtml). In particular:\n\n- Turn on the\
    \ form's `Edit Enabled` property, and select `Update Row` as the only allowed\
    \ operation.\n- Create a button whose action is `Submit` and whose database action\
    \ is `SQL UPDATE action`.\n- Specify that the item `P49_DEPTNO` is the primary\
    \ key. Also, change its type to be `Select List`, having the list-of-values query.\n\
    \n```sql\nselect DName, DeptNo\nfrom DEPT\n```\n\nThe page needs one further configuration\
    \ to match Figure [13-17](#335103_3_En_13_Chapter.xhtml#Fig17), namely that the\
    \ values in the `Loc` column should be formatted in bold. Chapter [3](#335103_3_En_3_Chapter.xhtml)\
    \ showed how to use the column's `HTML Expression` property to wrap a column value\
    \ inside HTML tags. For example, you could use the HTML expression for the `LOC`\
    \ column to be this:\n\n```html\n<b>#LOC#</b>\n```\n\nFor the purposes of this\
    \ example I want to use a different technique, which is to use the report's source\
    \ query to format the column. In particular, change the source of the report to\
    \ this:\n\n```sql\nselect DeptNo, DName, '<b>' || Loc || '</b>' as Loc\nfrom DEPT\n\
    order by DName\n```\n\nNote that the query wraps HTML tags around the department\
    \ name, meaning that the value of `LOC` is the HTML expression. The idea is that\
    \ when I display the report, the LOC values should be formatted in bold. However,\
    \ it doesn't quite work. If you run the page, the HTML tags appear as part of\
    \ the value, as shown in Figure [13-12](#335103_3_En_13_Chapter.xhtml#Fig12).\n\
    \n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig18_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig18_HTML.jpg)\n\
    *Figure 13-18 Report displays the HTML tags*\n\nIf you think about it, this result\
    \ makes some sense—after all, the report is just displaying the output of the\
    \ query. However, the situation is actually more complex than that. Consider how\
    \ APEX renders a report: it generates an HTML table and places the output values\
    \ within it. So, for example, the HTML code to display the first row of the report\
    \ would look like this:\n\n```html\n<tr>\n  <td>ACCOUNTING</td>\n  <td><b>NEW\
    \ YORK</b></td>\n</tr>\n```\n\nAlthough the `<b>` and `</b>` tags were entered\
    \ into the table as data, the browser will wind up treating them as HTML. In order\
    \ for APEX to display the tags in the report, it must do extra work. In particular,\
    \ it transforms the `<` and `>` characters into different characters that happen\
    \ to display the same. This transformation is called *escaping the special characters*.\
    \ In particular, the character `<` is replaced by `&lt;` and the character `>`\
    \ is replaced by `&gt;`. Each report column has the property `Escape special characters`\
    \ in its `Security` section. By default it is turned on, which causes APEX to\
    \ escape the special characters and display the HTML tags as in Figure [13-18](#335103_3_En_13_Chapter.xhtml#Fig18).\
    \ Now go to the `Loc` column and turn off the property. The tags in the `Loc`\
    \ values will not be escaped, and will thus be treated as HTML. The report will\
    \ now look like Figure [13-17](#335103_3_En_13_Chapter.xhtml#Fig17).\n\nThis ability\
    \ to format data within the SQL source query is quite powerful and lets you do\
    \ things that are not possible via the `HTML Expression` property. For example,\
    \ you can choose to format certain values in a column as text, and other values\
    \ as a link or an image. This power, however, comes with a price. As soon as you\
    \ turn off a column's `Escape special characters` property, you open yourself\
    \ up to a cross-site scripting attack. The help screen for this property is particularly\
    \ vehement on this point; see Figure [13-19](#335103_3_En_13_Chapter.xhtml#Fig19).\n\
    \n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig19_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig19_HTML.jpg)\n\
    *Figure 13-19 Help text for the Escape Special Characters property*\n\nTo demonstrate,\
    \ let's see how easy it is to use this page to compromise the application. From\
    \ the `Update Location` region, choose any department, such as `OPERATIONS`. The\
    \ `Location` field should show the current value, which is `BOSTON`. Change that\
    \ value to this:\n\n```text\nBOSTON<script>alert('Your application has been compromised')</script>\n\
    ```\n\nThis new value is a string consisting of the location, followed by a script\
    \ that calls the JavaScript function `alert`. When a browser renders this string,\
    \ it will display \"`BOSTON`\" and then call the script. In other words, the update\
    \ will have no visible effect on the report. However, the script will run each\
    \ time someone renders the page.\n\nClick the `Submit Changes` button. Before\
    \ the page reloads, your browser will display an alert similar to Figure [13-20](#335103_3_En_13_Chapter.xhtml#Fig20).\
    \ Now navigate to a different page and come back to this one—the alert will again\
    \ be displayed. It is a bit chilling to realize that without this alert, you would\
    \ have had no idea that your application was already seriously compromised.\n\n\
    ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig20_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig20_HTML.jpg)\n\
    *Figure 13-20 Cross-site scripting attack succeeded*\n\nThe preceding JavaScript\
    \ code is not malicious. The `alert` function just displays an alert window in\
    \ the user's browser. A malicious JavaScript string will almost certainly not\
    \ throw an alert and will do something far more sophisticated and nasty. In all\
    \ likelihood, you will not discover the problem until it is too late. It is therefore\
    \ up to you to ensure that this cannot happen.\n\nThe only way for an application\
    \ to eliminate cross-site scripting is to ensure that a page does not display\
    \ unescaped data. Three approaches are possible, which will be considered in turn:\n\
    \n- Reject inappropriate data\n- Escape the data before saving it in the database\n\
    - Escape the data before it is displayed\n\n## Reject Inappropriate Data\n\nIn\
    \ any data entry page, it is good practice to keep inappropriate data from being\
    \ entered into the database. This is what database constraints and APEX validations\
    \ are all about. The act of checking input data for unexpected HTML follows the\
    \ same principle. There are two approaches you can take.\n\nThe first approach\
    \ is to use the property `Restricted Characters`, found in an item's `Security`\
    \ section. This property lets you specify which characters are allowed in the\
    \ input. Figure [13-21](#335103_3_En_13_Chapter.xhtml#Fig21) shows the possible\
    \ choices. You can require that the input be only alphanumeric, or you can restrict\
    \ the use of certain special characters.\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig21_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig21_HTML.jpg)\n\
    *Figure 13-21 Choices for the Restricted Characters property*\n\nIn the current\
    \ example, suppose that department locations are alphanumeric; in that case, it\
    \ would make sense to set the `Restricted Characters` property for `P49_LOC` to\
    \ be `Whitelist for a–Z, 0–9, and space`. If not, then you should at least set\
    \ it to `Blacklist HTML command characters`.\n\nThe second approach is to write\
    \ an APEX validation to perform the restriction. APEX provides a function called\
    \ `apex_escape.html`, which takes any input string and turns it into a visibly\
    \ identical string that contains no HTML characters. For example, Listing [13-7](#335103_3_En_13_Chapter.xhtml#PC29)\
    \ shows the PL/SQL code for a validation that returns `false` if the input to\
    \ `P49_LOC` contains HTML characters.\n\n```plsql\ndeclare\n  v_LocEscaped varchar2(100);\n\
    begin\n  v_LocEscaped := apex_escape.html(:P49_LOC);\n  if :P49_LOC = v_LocEscaped\
    \ then\n    return true;\n  else\n    return false;\n  end if;\nend;\n```\n*Listing\
    \ 13-7 Validation to Guard Against Unwanted HTML Input*\n\n## Escape Data Before\
    \ Saving It"
