- fmt: "# The final page of the wizard is the `Confirm Employee Info` page (see Figure\
    \ 9-9), which displays the selected values for the new employee. The wizard branches\
    \ to this page when all the necessary values are known. This branch can occur\
    \ from any of the three earlier wizard pages. The `Basic Info` page can branch\
    \ directly to the confirmation page when the new employee is not a clerk and the\
    \ hiredate checkbox is selected, the `Manager Info` page can branch directly to\
    \ the confirmation page when the checkbox was selected, and the `Hiredate Info`\
    \ page always branches to the confirmation page.\n\n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig9_HTML.jpg](images/335103_3_En_9_Chapter/335103_3_En_9_Fig9_HTML.jpg)\n\
    \n**Figure 9-9** Confirming the employee's information\n\nThe `Confirm Employee\
    \ Info` page has buttons labeled `OK` and `Cancel`. Clicking the `Cancel` button\
    \ redirects to the `Basic Info` page and clears the session state of each wizard\
    \ page. Clicking the `OK` button inserts the new record into the `EMP` table,\
    \ clears the session state of each page, and branches to the `Basic Info` page.\
    \ Now that you understand the flow of control through the wizard, let’s examine\
    \ how to implement its pages. The following subsections address the issues.\n\n\
    ## Implementing the Progress Bar\n\nThe region containing the colored circles\
    \ along the top of the wizard pages is called a progress bar. A progress bar region\
    \ is simply a fancy way to display a list of page numbers. The progress bar in\
    \ each of these wizard pages displays the same list, namely, a list containing\
    \ the page numbers [25, 26, 27, 28]. The step names in the progress bar are the\
    \ labels associated with these page numbers.\n\nTo create the progress bars in\
    \ the `New Employee Wizard` pages, you first need to create their common list.\
    \ Then you can create a progress bar region on each page. Call the list `New Employee\
    \ Wizard`; to create it, use the techniques you learned in Chapter 4. The list\
    \ will have an entry for each of the four (not yet created) wizard pages, as shown\
    \ in Figure 9-10.\n\n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig10_HTML.jpg](images/335103_3_En_9_Chapter/335103_3_En_9_Fig10_HTML.jpg)\n\
    \n**Figure 9-10** Entries for the New Employee Wizard list\n\nThen create the\
    \ wizard pages. Start by creating four blank pages, numbered 25–28. Then create\
    \ a region for each page, of type `List`, whose source is the list `New Employee\
    \ Wizard`. Figure 9-11 shows the `Attribute` properties for the region. In particular,\
    \ to display a list region as a progress bar, you only need to set its `List Template`\
    \ property to be `Wizard Progress`.\n\n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig11_HTML.jpg](images/335103_3_En_9_Chapter/335103_3_En_9_Fig11_HTML.jpg)\n\
    \n**Figure 9-11** List region properties\n\nWhen you have added the list region\
    \ to all four pages, run each page individually from the page editor. You should\
    \ observe that the pages display the progress bar differently, based on the location\
    \ of the page in the list.\n\n### Customizing the Progress Bar\n\nYou can customize\
    \ the look and feel of the wizard progress bar by clicking the `Template Options`\
    \ property in Figure 9-11. Figure 9-12 shows the resulting dialog box. The `Make\
    \ Wizard Steps Clickable` checkbox configures the progress bar so that each of\
    \ its circles is a link—clicking a circle branches to the page corresponding to\
    \ its step. Another option is `Label Display`, which lets you specify whether\
    \ the progress bar should display labels for all steps or just the current one\
    \ (or no labels). For example, the progress bar in Figures 9-6 through 9-8 show\
    \ only the current step, whereas Figure 9-9 shows all steps. By default, the progress\
    \ bar displays all steps, as shown in Figure 9-12.\n\n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig12_HTML.jpg](images/335103_3_En_9_Chapter/335103_3_En_9_Fig12_HTML.jpg)\n\
    \n**Figure 9-12** Template options for a progress list\n\n## Basic Info Page\n\
    \nThe `Basic Info` page has five items: `P25_NAME` is a text field, `P25_SAL`\
    \ is a number field, `P25_JOB` and `P25_DEPTNO` are select lists. The list-of-values\
    \ queries for these select lists are the same as in earlier pages: the list for\
    \ `P25_JOB` is\n\n```sql\nselect distinct Job as DisplayVal, Job as ResultVal\n\
    from EMP\norder by DisplayVal\n```\n\nAnd the list for `P25_DEPTNO` is\n\n```sql\n\
    select DName, DeptNo\nfrom DEPT\norder by DName\n```\n\nThe item `P25_HIRED_TODAY`\
    \ is a checkbox group having the single static value [, `Yes`]. That is, the display\
    \ value is a space and the return value is `Yes`. Recall that a checkbox group\
    \ is a multi-value item, so its value will be `Yes` if checked and `null` otherwise.\n\
    \nThe `Continue` button performs a submit operation. During this submit, several\
    \ things need to happen:\n\n*   If the new employee is not a clerk, the page needs\
    \ to calculate the employee’s manager.\n*   If the hiredate box is checked, the\
    \ page needs to set the employee’s hire date to be today.\n*   The page needs\
    \ to determine which of the other three wizard pages it should branch to.\n\n\
    ### Computing the Manager (ComputeManager Process)\n\nThe first bullet point requires\
    \ that you write a process to calculate the manager of a non-clerk. Call this\
    \ process `ComputeManager`. Its PL/SQL code appears in Listing 9-2.\n\n```plsql\n\
    begin\ncase :P25_JOB\nwhen 'PRESIDENT' then   -- the president has no manager\n\
    \    :P26_MGR := null;\nwhen 'MANAGER' then   -- a manager's manager is the president\n\
    \    select EmpNo into :P26_MGR\n    from EMP\n    where Job = 'PRESIDENT';\n\
    else   -- the employee's manager is the manager of the dept\n    select EmpNo\
    \ into :P26_MGR\n    from EMP\n    where DeptNo = :P25_DEPTNO and Job = 'MANAGER';\n\
    end case;\nend;\n```\n\n**Listing 9-2** PL/SQL Code for the ComputeManager Process\n\
    \nThe `ComputeManager` process calculates its value in one of three ways, depending\
    \ on the value of `P25_JOB`. In each case, it assigns the computed value to `P26_MGR`,\
    \ which will be an item on the `Manager Info` page. In other words, this process\
    \ assigns a value to the item on the `Manager Info` page so that the user doesn’t\
    \ have to. (It is ok to write code that references a not-yet-existing item; you\
    \ will just not be able to run it until the item exists.)\n\nThe `ComputeManager`\
    \ process is associated with the `Continue` button and should execute only when\
    \ the new employee is not a clerk. That is, the process is conditional on the\
    \ following SQL expression:\n\n```sql\n:P25_JOB != 'CLERK'\n```\n\n### Computing\
    \ the Hiredate (ComputeHiredate Process)\n\nThe second bullet point also requires\
    \ you to write a process; call it `ComputeHiredate`. This process needs to calculate\
    \ the current date and assign it to the item `P27_HIREDATE`, which will be on\
    \ the `Hiredate Info` page. Its PL/SQL code uses Oracle’s built-in function `sysdate`\
    \ and appears in Listing 9-3.\n\n```plsql\nbegin\n:P27_HIREDATE := sysdate;\n\
    end;\n```\n\n**Listing 9-3** PL/SQL Code for the ComputeHiredate Process"
