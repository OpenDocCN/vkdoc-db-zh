    本节考虑`Solo Commission`区域的实现。（`Shared Commission`区域将在“处理多行 SQL 查询”一节中讨论。）`Enter
    Sale Info`区域中的两个项目名为`P18_SOLO_SALESMAN`和`P18_SOLO_AMOUNT`。项目`P18_SOLO_AMOUNT`是一个数字字段，`P18_SOLO_SALESMAN`是一个选择列表，其值由以下
    SQL 查询定义：

    ```sql

    select EName, EmpNo

    from EMP

    where Job = ''SALESMAN''

    ```'
- fmt: 'The items in the `Commission Info` region are named `P18_SOLO_PREV_COMMISSION`,
