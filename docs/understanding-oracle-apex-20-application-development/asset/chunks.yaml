    总而言之，“单行更新”页面包含四个过程。其中三个过程在提交时执行；它们的职责是运行各自的插入、删除和更新 SQL 语句。第四个过程负责运行 SQL 查询以初始化区域的项；它在页面呈现时执行。


    # 总结


    过程是一种页面组件，它使您能够访问数据库并执行计算。本章探讨了过程在应用程序中所扮演的角色。例如，执行提交操作的按钮通常有一个关联的过程，该过程将在按钮被点击时执行。过程也可以配置为在页面呈现时执行，并计算项的初始值。


    本章完全集中于 PL/SQL 过程。要指定 PL/SQL 过程的行为，您需要编写 PL/SQL 代码。PL/SQL 将 SQL 命令直接集成到通用编程语言中，这使得编写数据库感知代码变得容易。第
    10 章将探讨其他过程类型。


    尽管 PL/SQL 过程可能非常有用，但它们需要谨慎编码。本章探讨了一个常见的陷阱，称为**丢失更新问题**。您学习了如何识别该问题以及如何编写必要的 PL/SQL
    代码来避免它。


    # 8. 数据验证


    当一个过程写入数据库时，它通常从会话状态中获取其值。因此，应用程序开发人员必须验证会话状态值是否有效，以确保过程被适当使用并保持数据库的完整性。本章探讨了有效会话状态的三个方面——约束保持、输入验证和过程验证——并展示了如何在
    APEX 应用程序中实现它们。


    ## 约束保持


    数据库的完整性很重要。不正确记录的存在不仅会降低涉及该记录的任何查询的价值；它还会降低整个数据库的价值——因为如果一个记录是错误的，用户会怀疑其他记录可能也是错误的。这样的数据库可能很快变得毫无用处。


    数据库系统用来保护自身的主要机制是约束。数据库管理员通常在创建表时指定约束。例如，`EMP` 表为其定义了以下四个约束：


    *   `EmpNo` 列是一个键，这确保没有两个员工具有相同的 `EmpNo` 值。

    *   `DeptNo` 列是 `DEPT` 的外键，这确保 `DeptNo` 的每个非 `null` 值都对应一个现有的 `DEPT` 记录。

    *   `Mgr` 列是 `EMP` 的外键，这确保 `Mgr` 的每个非 `null` 值都对应一个现有的 `EMP` 记录。

    *   `EmpNo` 值不能为空，这确保每个员工都有一个编号。


    让我们向数据库再添加两个约束：


    *   `EName` 值不能为空，这确保每个员工都有一个名字。

    *   `Sal` 值必须至少为 0，这可以防止出现无意义的薪资。


    您可以通过在 APEX SQL 工作坊中分别执行清单 8-1 中的两条 SQL 命令来定义这些约束。


    ```

    alter table EMP

    add constraint ValidName

    check (EName is not null)

    alter table EMP

    add constraint ValidSalary

    check (Sal >= 0)

    清单 8-1

    EMP 表的两个附加约束

    ```


    每当您编写一个更新数据库的 APEX 页面时，都必须注意其约束。为了研究这些问题，本章将使用“修订版员工数据录入”页面作为一个贯穿始终的例子。该页面在第 7
    章讨论过，是“员工演示”应用程序的第 19 页。


    使用此页面，尝试插入一个没有 `EName` 值的新员工。您将无法做到——数据库将拒绝插入，因为新记录将违反 `null` 值约束。APEX 会显示如图 8-1
    所示的错误消息。


    ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig1_HTML.jpg](img/335103_3_En_8_Fig1_HTML.jpg)


    图 8-1

    尝试违反约束的结果


    尽管数据库能够强制执行约束，但其错误消息并不令人满意。该消息没有帮助，给出了关于哪里出错的晦涩的系统级细节。它也没有告诉您是什么导致了错误或如何修复它。实际上，该消息留下了问题可能是由于系统错误（您无法控制）造成的可能性。


    因此，APEX 页面应始终预见到可能的约束违反尝试并自行处理。理想情况下，数据库永远不需要抛出其晦涩的约束违反消息，因为 APEX 会首先检测并处理违规。APEX
    有几个功能可以在这方面帮助您。让我们看看它们如何应用于前面的每个约束。


    如果允许用户为新员工选择 `EmpNo` 值，则可能发生对键约束的违反。处理此约束的最佳方法是不给用户这种选择。例如，“修订版员工数据录入”页面没有供用户输入员工编号的地方。相反，SQL
    插入命令从插入触发器自动获取新的 `EmpNo` 值，从而保证选择一个唯一的值。


    如果用户能够为 `DeptNo` 或 `Mgr` 输入不适当的值，则可能发生对外键约束的违反。“修订版员工数据录入”页面采用的解决方案是使用基于列表的项。基于列表的项的优势在于，您可以用您想要的确切值填充它，这意味着用户无法选择不合适的值。（注意：此说法适用于得到适当保护的应用程序。第
    13 章讨论了恶意用户如何从未受保护的基于列表的项中选择任意值。）


    如果用户没有向项 `P19_INSERT_ENAME` 中输入值，则可能发生对 `EName` 的 `null` 值约束的违反。此问题的解决方案是使用该项的
    `值必需` 属性，该属性位于其 `验证` 部分。如果您将此属性设置为 `开`，那么只要该项值为 `null`，APEX 就会拒绝提交页面。相反，APEX 将重新显示页面，并在该项下方显示错误消息，如图
    8-2 所示。此错误消息比图 8-1 中的好得多。


    ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig2_HTML.jpg](img/335103_3_En_8_Fig2_HTML.jpg)


    图 8-2

    处理尝试违反约束的更好方式


    最后，考虑 `Sal` 上的约束。项 `P19_INSERT_SAL` 是一个数字字段，其 `设置` 部分具有 `最小值` 和 `最大值` 属性。将最小值设置为
    `0`，并尝试插入一个薪资为负数的记录。APEX 将显示如图 8-3 所示的错误消息。

