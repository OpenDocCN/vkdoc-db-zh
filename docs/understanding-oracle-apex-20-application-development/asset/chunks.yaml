  trans: '

    # 5. 项目与按钮


    本书迄今为止一直专注于应用程序如何向用户显示信息。在本章及下一章中，你将研究那些允许用户向应用程序发送回信息的组件。这些组件，即 `项目`（items）和
    `按钮`（buttons），被称为 `窗体控件`（form controls），因为它们通常出现在网页表单中。

    APEX 支持多种类型的项目，它们的外观和行为差异很大。然而，它们都可以被理解为几个基本概念的变体。本章的主要目的是探讨这些概念，并研究它们如何在不同的项目类型中得以体现。


    ## 面包屑区域


    如果你想让一个页面显示面包屑对象，你必须为其创建一个区域。`Breadcrumb` 区域类型就是为此目的而设计的。虽然你可以将面包屑区域放置在页面上的任何位置，但它自然应该放在
    `面包屑栏`（Breadcrumb Bar）位置，该位置位于导航栏正下方。通常，你需要遵循以下步骤向页面添加面包屑区域。


    *   向页面添加一个新区域。

    *   将区域的类型设置为 `Breadcrumb`。

    *   将区域的源设置为 `Breadcrumb` 对象。

    *   将该区域分配到 `面包屑栏`（Breadcrumb Bar）位置。

    *   将区域模板设置为 `带属性的空白`（Blank with Attributes），这样它将在没有边框或标题的情况下显示。

    *   设置区域模板选项，使面包屑显示时有足够边距。


    顺便提一下，如果你在创建页面时选择创建面包屑，你的任务会稍微简单一些。图 4-29 展示了创建页面向导的第二个屏幕，假设你在创建 `列表练习`（List Practice）页面时就为其创建了面包屑。你只需要为
    `父条目`（Parent Entry）和 `条目名称`（Entry Name）项输入值。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig29_HTML.jpg](img/335103_3_En_4_Fig29_HTML.jpg)


    图 4-29

    在创建页面时创建面包屑条目


    在你的应用程序中，使用这些步骤向 `列表练习` 页面添加一个面包屑区域。图 4-30 显示了结果页面的导航栏和面包屑区域。请注意，与列表区域不同，面包屑区域并不显示其完整的源对象。它只显示与当前页面对应的面包屑。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig30_HTML.jpg](img/335103_3_En_4_Fig30_HTML.jpg)


    图 4-30

    面包屑区域中的面包屑对象


    ## 全局页面


    显示列表或面包屑对象的标准方式是将其放置在页面上的一个区域中。这种技术提供了相当大的灵活性——每个页面可以在不同位置、使用不同模板来显示列表或面包屑。然而，你通常不需要这么大的灵活性。假设你希望每个页面都以完全相同的方式显示列表或面包屑。实现这种统一性最简单的方法是使用
    `全局页面`（global page）。

    全局页面是一个特殊的页面，其内容会包含在应用程序的每一个其他页面中。如果你将图 4-30 中的面包屑区域或图 4-15 中的 `导航菜单`（Navigation
    Menu）区域放在全局页面中，这些区域将统一出现在应用程序的所有页面上。APEX 在应用程序创建时会创建全局页面；按照惯例，全局页面的页面编号为 0。

    面包屑区域的一个优点是，APEX 只会在页面确实有面包屑时才在页面上渲染它。也就是说，如果你把面包屑区域放在全局页面中，它将只出现在那些实际拥有面包屑的页面上。


    ## 小结


    APEX 中主要的导航工具是链接列表，也称为 `列表`（list）。内置的 `桌面导航栏`（Desktop Navigation Bar）列表的条目显示在应用程序的导航栏中，而
    `桌面导航菜单`（Desktop Navigation Menu）列表的条目则出现在应用程序的导航菜单中。列表管理器允许你编辑这些列表的内容，应用程序的 `用户界面`（User
    Interface）属性则允许你自定义它们的位置和样式。

    你也可以使用列表管理器来创建自己的列表。你可以通过将列表放置在类型为 `List` 的区域中来在页面上显示它。每个列表区域都有一个 `模板`（Template）属性，让你可以自定义列表的显示方式。

    列表可以是分层的，即一个列表条目可以是一个或多个子条目的父级。这种层次结构为列表条目提供了结构。这种结构对于导航菜单列表尤其有用，因为它允许菜单包含大量条目而不会让用户不知所措。

    另一种导航工具是 `面包屑`（breadcrumb）。要为页面定义面包屑，你必须首先了解该页面如何适应所有应用程序页面的层次结构中。页面的面包屑是从该页面到根节点的层次结构中的路径。要在页面上显示面包屑，你必须将其放置在类型为
    `Breadcrumb` 的区域中。通常将面包屑区域放在应用程序的全局页面（页面 0）中，以便它在每个页面的相同位置出现。


    ## 项目


    一个 `项目`（item）是网页中保存值的元素。每个项目都有一个 `类型`（type），例如 `文本字段`（Text Field）、`复选框`（Checkbox）或
    `选择列表`（Select List）。每种项目类型都有特定的方式来显示其值并让用户修改该值。

    你在使用 APEX 的过程中已经遇到了几种项目类型。例如，图 5-1 显示了用于重命名 `DEPT` 表某一列的对象浏览器屏幕。此图显示了五个项目：两个只读项目（标记为
    `Schema` 和 `Table`）、一个选择列表（`当前列名`（Current Column Name））、一个文本框（`新列名`（New Column
    Name））和一个复选框（`保留大小写`（Preserve Case））。通常，每次你在 APEX 屏幕中输入一个值，都是通过一个项目来完成的。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig1_HTML.jpg](img/335103_3_En_5_Fig1_HTML.jpg)


    图 5-1

    APEX 屏幕中的不同项目类型


    APEX 应用程序构建器支持 22 种不同的项目类型。这些项目类型可以分为三类：`基于文本`（text-based）的项目允许你通过键入来指定值，`基于列表`（list-based）的项目允许你从列表中选择来指定值，而`基于显示`（display-based）的项目则不允许你指定值。图
    5-1 包含了所有三个项目类别的示例。本章将讨论这些类别及其项目类型。


    ## 项目示例页面


    在本章中，你将创建如图 5-2 所示的页面。这个名为 `项目示例`（Item Sampler）的页面将成为 `员工演示`（Employee Demo）应用程序的第
    8 页。页面本身不会做任何有趣的事情；其唯一目的是展示一些常见项目类型的功能，并展示如何配置它们的属性。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig2_HTML.jpg](img/335103_3_En_5_Fig2_HTML.jpg)

    '
- fmt: '# Item Sampler page


    构建`Item Sampler`页面的第一步是创建一个空白页面和八个静态内容区域。使用每个区域的`Layout`属性将它们定位在页面上，如第3章所述（参见图[3-8](#335103_3_En_3_Chapter.xhtml#Fig8)和[3-12](#335103_3_En_3_Chapter.xhtml#Fig12)）。具体而言：


    *   `Text-Based Items`开始一个新行。

    *   `Single-Value List Items`位于同一行和列，这导致它被放置在`Text-Based Items`下方。

    *   `Radio Groups`、`Select Lists`和`Popup Lists`的父区域都是`Single-Value List Items`，并且各自开始一个新行。

    *   `Multi-Value List Items`在同一行开始一个新列。

    *   `Yes/No Items`和`Some Buttons`位于同一行和列。


    因此，这些区域形成了一个包含两列的单行。图[5-3](#335103_3_En_5_Chapter.xhtml#Fig3)显示了生成的空白区域。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig3_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig3_HTML.jpg)


    **图 5-3 Item Sampler页面的结构**


    ## Creating and Deleting Items


    页面上的每个项在页面的渲染树中都有一个对应的节点，位于与该项区域对应的子树中。例如，图[5-4](#335103_3_En_5_Chapter.xhtml#Fig4)显示了已完成的`Text-Based
    Items`区域的`rendering`子树。它有一个名为`Items`的子节点，该节点下有该区域内每个项对应的子节点。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig4_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig4_HTML.jpg)


    **图 5-4 Text-Based Items区域的渲染子树**


    要为区域创建项，请在渲染树中右键单击该区域的条目并选择`Create Page Item`。APEX随后会将一个节点插入到该区域的`Items`子树中。当您单击该节点时，该属性的属性将显示在属性编辑器中。


    APEX为新项的`Name`和`Type`属性分配默认值。这些属性显示在属性编辑器的`Identification`部分中，如图[5-5](#335103_3_En_5_Chapter.xhtml#Fig5)所示。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig5_HTML.png](images/335103_3_En_5_Chapter/335103_3_En_5_Fig5_HTML.png)


    **图 5-5 项的识别部分**


    这个新项的名称是`P8_NEW`。前缀表示包含该项的页面，在本例中是第8页。创建项时，您应将后缀从`NEW`重命名为更有意义的名称，但保留前缀。APEX社区强烈建议使用页码作为项名称的前缀，没有理由不遵循此建议。

    `Type`属性指定项的类型。默认情况下，类型是`Text Field`，但您可以单击选择列表，从APEX支持的22种不同项类型中选择。


    创建项的另一种方法是使用拖放。回想一下，页面设计器有一个库部分，位于其中间面板的`Layout`选项卡底部。该库为每种项类型都有一个图标，如图[5-6](#335103_3_En_5_Chapter.xhtml#Fig6)所示。您可以通过将其中一个图标拖到您选择的页面区域来创建新项。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig6_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig6_HTML.jpg)


    **图 5-6 项库**


    每个项还有一个关联的*标签*，即您希望与项一起显示的字符串。此字符串在属性编辑器的`Label`部分中指定。例如，图[5-7](#335103_3_En_5_Chapter.xhtml#Fig7)显示了`Item
    Sampler`页面左上角项的标签规范。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig7_HTML.png](images/335103_3_En_5_Chapter/335103_3_En_5_Fig7_HTML.png)


    **图 5-7 指定项的标签**


    图[5-8](#335103_3_En_5_Chapter.xhtml#Fig8)显示了项的`Template`属性，该属性位于其`Appearance`部分。此属性指定标签相对于其项的呈现方式。有七种可能的值。`Hidden`值会隐藏标签，三种`Optional`值正常显示标签，三种`Required`值会用红色星号格式化标签。关键字`Above`指定标签放置在项上方，`Floating`指定标签出现在项内及其值旁边。如果未指定任何关键字，则标签放置在项的左侧。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig8_HTML.png](images/335103_3_En_5_Chapter/335103_3_En_5_Fig8_HTML.png)


    **图 5-8 指定项的外观**


    `Item Sampler`页面中的项大多使用`Optional`模板。右列中两个较大的项使用`Optional-Above`，以节省水平空间。左列顶部标记为`Job`的项使用`Required`模板。`Required`模板的目的是警告用户必须填写此项的值。该项的`Value
    Required`属性（位于其`Validation`部分）强制实施此限制，将在第[8](#335103_3_En_8_Chapter.xhtml)章讨论。

    要删除项，请在渲染树中右键单击其条目并选择`Delete`选项。

    您现在可以创建`Item Sampler`页面的所有22个项，将它们放置在具有适当标签的适当区域中。具体来说，`Text-Based Items`区域有五个项，`Single-Value
    Items`区域各有三个项，`Multi-Value Items`区域有四个项，`Yes/No Items`区域有四个项。


    目前，您只需要为每个项指定名称和标签。表[5-1](#335103_3_En_5_Chapter.xhtml#Tab1)为您列出了这些值。项类型目前还不重要；现在，您应将每个项类型保留为`Text
    Field`。创建完项后，您可以随意尝试不同的标签模板。


    **表 5-1 Item Sampler页面中的项**


    | Region | Name | Label |

    | :--- | :--- | :--- |

    | Text-Based Items | `P8_EMPNO` | Emp No |

    | | `P8_JOB` | Job |

    | | `P8_SALARY` | Salary |

    | | `P8_HIREDATE` | Hire Date |

    | | `P8_COLOR` | Favorite Color |

    | Radio Groups | `P8_RADIO_NAME` | Dept Name |

    | | `P8_RADIO_NO` | Dept No |

    | | `P8_RADIO_INFO` | Dept Info |

    | Select Lists | `P8_SELECT_NAME` | Dept Name |

    | | `P8_SELECT_NO` | Dept No |

    | | `P8_SELECT_INFO` | Dept Info |

    | Popup Lists | `P8_POPUP_NAME` | Dept Name |

    | | `P8_POPUP_NO` | Dept No |

    | | `P8_POPUP_INFO` | Dept Info |

    | Multi-Value List Items | `P8_M_SELECT` | Depts |

    | | `P8_CHECKBOX` | Depts |

    | | `P8_SHUTTLE` | Depts |

    | | `P8_LIST` | Depts |

    | Yes/No Items | `P8_YN_SELECT` | Email Me |

    | | `P8_YN_RADIO` | Email Me |

    | | `P8_YN_CHECKBOX` | Email Me |

    | | `P8_YN_SWITCH` | Email Me |


    ## Positioning an Item


    您的下一个任务是将其项定位在其区域内。APEX以行的形式显示区域的项，位于区域的顶部或底部。区域的`Item Display Position`属性（在区域的`Appearance`部分中）可让您指定其项是出现在其内容上方还是下方。此属性对于`Item
    Sampler`页面无关紧要，因为其区域没有其他内容，但对于下一章的页面将变得有用。

    项的`Layout`部分决定了其在区域内的位置。APEX在区域内定位项的方式类似于在页面内定位区域的方式。项根据其`Sequence`属性的值从左到右放置到行中，每当其`Start
    New Row`属性被选中时，就移动到新行。区域的宽度被划分为12个网格点。每个项（包括其标签，如果显示在项的左侧）有一个起始网格点和一个以网格点为单位的宽度。'
  raw: "Figure 5-2\nItem Sampler\npage\n\nThe first step in building the `Item Sampler`\
    \ page is\nfor you to create a blank page and eight static content regions. Use\
    \ the\n`Layout`\nproperties of each region to locate them on the page, as described\
    \ in\nChapter [3](#335103_3_En_3_Chapter.xhtml) (refer to Figures [3-8](#335103_3_En_3_Chapter.xhtml#Fig8)\
    \ and [3-12](#335103_3_En_3_Chapter.xhtml#Fig12)). In particular\n\n*   `Text-Based\
    \ Items` begins a new row.\n\n*   `Single-Value List Items` is in the same row\
    \ and column, which causes it to be\n    placed underneath `Text-Based Items`.\n\
    \n*   `Radio Groups`, `Select Lists`, and `Popup Lists` each have\n    the parent\
    \ region `Single-Value List Items` and begin a new row.\n\n*   `Multi-Value List\
    \ Items` begins a new column of the same row.\n\n*   `Yes/No Items` and `Some\
    \ Buttons` are in the same row and column.\n\nAs a result, the regions form a\
    \ single row of two\ncolumns. Figure [5-3](#335103_3_En_5_Chapter.xhtml#Fig3)\
    \ shows the\nresulting empty regions.\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig3_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3\nStructure of the Item Sampler page\n\nCreating and Deleting Items\n\
    \nEach item on a page has a corresponding node in the\npage’s rendering tree,\
    \ located in the subtree corresponding to the\nitem’s region. For example, Figure\
    \ [5-4](#335103_3_En_5_Chapter.xhtml#Fig4) shows the `rendering` subtree for\n\
    the completed `Text-Based Items region`. It has a child named `Items` , which\n\
    has a child node for each item in the region.\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig4_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4\nThe rendering subtree for the Text-Based Items region\n\nTo create\
    \ an item for a region, right-click the region’s entry in the\nrendering subtree\
    \ and select `Create Page Item`.\nAPEX will then insert a node into the `Items`\
    \ subtree for\nthat region. When you click that node, the properties for the item\
    \ are\ndisplayed in the property editor.\n\nAPEX assigns default values to a new\
    \ item’s `Name` and `Type` properties.\nThese properties appear in the `Identification`\n\
    section  of the\nproperty editor, as shown in Figure [5-5](#335103_3_En_5_Chapter.xhtml#Fig5).\n\
    \n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig5_HTML.png](images/335103_3_En_5_Chapter/335103_3_En_5_Fig5_HTML.png)\n\
    \nFigure 5-5\nItem’s identification section\n\nThe name of this new item is `P8_NEW`.\
    \ The prefix\ndenotes the page containing the item, which in this case is page\
    \ 8\\. When\ncreating an item, you should rename the suffix from `NEW` to something\
    \ more\nmeaningful, but keep the prefix. The APEX community strongly suggests\n\
    using the page number as the prefix of an item’s name, and there is no\nreason\
    \ not to follow along.\nThe `Type`\nproperty specifies the type of the item. By\
    \ default, the type is `Text Field`, but you\ncan click the select list to choose\
    \ from the 22 different item types\nsupported by APEX.\n\nAn alternative way to\
    \ create an item is to use drag and drop. Recall\nthat the page designer has a\
    \ gallery section, located at the bottom of\nthe `Layout` tab\nof its middle panel.\
    \ The gallery has an icon for each item type, as\nshown in Figure [5-6](#335103_3_En_5_Chapter.xhtml#Fig6).\
    \ You can create\na new item by dragging one of these icons to your chosen region\
    \ of the\npage.\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig6_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig6_HTML.jpg)\n\
    \nFigure 5-6\nItem gallery\n\nEach item also has an associated *label*, which\
    \ is the string\nthat you want displayed with the item. This string is\nspecified\
    \ in the `Label` section of the\nproperty editor. For example, Figure [5-7](#335103_3_En_5_Chapter.xhtml#Fig7)\
    \ shows the label\nspecification for the top left item of the `Item Sampler` page.\n\
    \n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig7_HTML.png](images/335103_3_En_5_Chapter/335103_3_En_5_Fig7_HTML.png)\n\
    \nFigure 5-7\nSpecifying the label of an item\n\nFigure [5-8](#335103_3_En_5_Chapter.xhtml#Fig8)\
    \ shows the `Template` property of\nan item, which is in its `Appearance` section.\n\
    This property specifies how the label is rendered in relation to its\nitem. There\
    \ are seven possible values. The value `Hidden` hides the\nlabel, the three `Optional`\
    \ values\ndisplay the label normally, and the three `Required` values\nformat\
    \ the label with a red asterisk. The keyword `Above` specifies that\nthe label\
    \ is placed above the item, and `Floating` specifies\nthat the label appears inside\
    \ the item with its value. If neither\nkeyword is specified, then the label is\
    \ placed to the left of the item.\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig8_HTML.png](images/335103_3_En_5_Chapter/335103_3_En_5_Fig8_HTML.png)\n\
    \nFigure 5-8\nSpecifying the appearance of an item\n\nThe items in the `Item Sampler`\n\
    page  mostly use\nthe `Optional`\ntemplate. The two larger items in the right\
    \ column use `Optional-Above`, to\nconserve horizontal space. And the item labeled\
    \ `Job` at the top of the\nleft column uses the `Required` template.\nThe purpose\
    \ of the `Required` template is\nto warn the user that this item value must be\
    \ filled in. The item’s\n`Value Required`\nproperty (which is in its `Validation`\
    \ section)\nenforces this restriction and will be discussed in Chapter [8](#335103_3_En_8_Chapter.xhtml).\n\
    To delete an item, right-click its entry in the rendering tree and\nselect the\
    \ `Delete` option.\nYou are now ready to create all 22 items of the `Item Sampler`\
    \ page,\nplacing them in the appropriate regions with appropriate labels. In\n\
    particular, the `Text-Based Items`\nregion has five items, the `Single-Value Items`\n\
    regions have three items each, the `Multi-Value Items`\nregion has four items,\
    \ and the `Yes/No Items` region\nhas four items.\n\nAt the moment, you only need\
    \ to specify the name and label for each\nitem. Table [5-1](#335103_3_En_5_Chapter.xhtml#Tab1)\
    \ lists these\nvalues for you. The item types are not yet important; for now,\
    \ you\nshould leave each item type as `Text Field`. When you\nhave finished creating\
    \ the items, feel free to experiment with different\nlabel templates.\n\nTable\
    \ 5-1\nItems in the Item Sampler page\n\nRegion |\n Name |\n Label |\n\n| ---\
    \ | --- | --- | --- | --- | --- | --- |\n\nText-Based Items |\n P8_EMPNO |\n Emp\
    \ No |\n\n|\n P8_JOB |\n Job |\n\n|\n P8_SALARY |\n Salary |\n\n|\n P8_HIREDATE\
    \ |\n Hire Date |\n\n|\n P8_COLOR |\n Favorite Color |\n\nRadio Groups |\n P8_RADIO_NAME\
    \ |\n Dept Name |\n\n|\n P8_RADIO_NO |\n Dept No |\n\n|\n P8_RADIO_INFO |\n Dept\
    \ Info |\n\nSelect Lists |\n P8_SELECT_NAME |\n Dept Name |\n\n|\n P8_SELECT_NO\
    \ |\n Dept No |\n\n|\n P8_SELECT_INFO |\n Dept Info |\n\nPopup Lists |\n P8_POPUP_NAME\
    \ |\n Dept Name |\n\n|\n P8_POPUP_NO |\n Dept No |\n\n|\n P8_POPUP_INFO |\n Dept\
    \ Info |\n\nMulti-Value List Items |\n P8_M_SELECT |\n Depts |\n\n|\n P8_CHECKBOX\
    \ |\n Depts |\n\n|\n P8_SHUTTLE |\n Depts |\n\n|\n P8_LIST |\n Depts |\n\nYes/No\
    \ Items |\n P8_YN_SELECT |\n Email Me |\n\n|\n P8_YN_RADIO |\n Email Me |\n\n\
    |\n P8_YN_CHECKBOX |\n Email Me |\n\n|\n P8_YN_SWITCH |\n Email Me |\n\nPositioning\
    \ an Item\nYour next task is to position the items\nwithin their region. APEX\
    \ displays a region’s items in rows, either at\nthe top or bottom of the region.\
    \ The region’s `Item Display Position`\nproperty (in the region’s `Appearance`\
    \ section)\nlets you specify whether its items appear above or below its content.\n\
    This property is irrelevant for the `Item Sampler` page\nbecause its regions have\
    \ no other content, but will become useful for\nthe pages of the next chapter.\n\
    An item’s `Layout` section\ndetermines its position within its region. APEX positions\
    \ items within a\nregion similar to how it positions regions within a page. Items\
    \ are\nplaced into rows from left to right according to the value of their\n`Sequence`\n\
    property, moving to a new row whenever its `Start New Row`\nproperty is selected.\
    \ The width of the region is divided into 12 grid\npoints. Each item (including\
    \ its label, if it is displayed to the left\nof the item) has a starting grid\
    \ point and a width in grid points."
  trans: '# Item Sampler 页面


    构建 `Item Sampler` 页面的第一步是创建一个空白页面和八个静态内容区域。使用每个区域的 `Layout` 属性将它们定位在页面上，如第 3 章所述（参见图
    3-8 和 3-12）。具体而言：


    *   `Text-Based Items` 开始一个新行。

    *   `Single-Value List Items` 位于同一行和列，这导致它被放置在 `Text-Based Items` 下方。

    *   `Radio Groups`、`Select Lists` 和 `Popup Lists` 的父区域都是 `Single-Value List Items`，并且各自开始一个新行。

    *   `Multi-Value List Items` 在同一行开始一个新列。

    *   `Yes/No Items` 和 `Some Buttons` 位于同一行和列。


    因此，这些区域形成了一个包含两列的单行。图 5-3 显示了生成的空白区域。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig3_HTML.jpg](img/335103_3_En_5_Fig3_HTML.jpg)


    **图 5-3 Item Sampler 页面的结构**


    ## 创建和删除项


    页面上的每个项在页面的渲染树中都有一个对应的节点，位于与该项区域对应的子树中。例如，图 5-4 显示了已完成的 `Text-Based Items` 区域的
    `rendering` 子树。它有一个名为 `Items` 的子节点，该节点下有该区域内每个项对应的子节点。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig4_HTML.jpg](img/335103_3_En_5_Fig4_HTML.jpg)


    **图 5-4 Text-Based Items 区域的渲染子树**


    要为区域创建项，请在渲染树中右键单击该区域的条目并选择 `Create Page Item`。APEX 随后会将一个节点插入到该区域的 `Items` 子树中。当您单击该节点时，该属性的属性将显示在属性编辑器中。


    APEX 为新项的 `Name` 和 `Type` 属性分配默认值。这些属性显示在属性编辑器的 `Identification` 部分中，如图 5-5 所示。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig5_HTML.png](img/335103_3_En_5_Fig5_HTML.png)


    **图 5-5 项的识别部分**


    这个新项的名称是 `P8_NEW`。前缀表示包含该项的页面，在本例中是第 8 页。创建项时，您应将后缀从 `NEW` 重命名为更有意义的名称，但保留前缀。APEX
    社区强烈建议使用页码作为项名称的前缀，没有理由不遵循此建议。

    `Type` 属性指定项的类型。默认情况下，类型是 `Text Field`，但您可以单击选择列表，从 APEX 支持的 22 种不同项类型中选择。


    创建项的另一种方法是使用拖放。回想一下，页面设计器有一个库部分，位于其中间面板的 `Layout` 选项卡底部。该库为每种项类型都有一个图标，如图 5-6
    所示。您可以通过将其中一个图标拖到您选择的页面区域来创建新项。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig6_HTML.jpg](img/335103_3_En_5_Fig6_HTML.jpg)


    **图 5-6 项库**


    每个项还有一个关联的*标签*，即您希望与项一起显示的字符串。此字符串在属性编辑器的 `Label` 部分中指定。例如，图 5-7 显示了 `Item Sampler`
    页面左上角项的标签规范。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig7_HTML.png](img/335103_3_En_5_Fig7_HTML.png)


    **图 5-7 指定项的标签**


    图 5-8 显示了项的 `Template` 属性，该属性位于其 `Appearance` 部分。此属性指定标签相对于其项的呈现方式。有七种可能的值。`Hidden`
    值会隐藏标签，三种 `Optional` 值正常显示标签，三种 `Required` 值会用红色星号格式化标签。关键字 `Above` 指定标签放置在项上方，`Floating`
    指定标签出现在项内及其值旁边。如果未指定任何关键字，则标签放置在项的左侧。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig8_HTML.png](img/335103_3_En_5_Fig8_HTML.png)


    **图 5-8 指定项的外观**


    `Item Sampler` 页面中的项大多使用 `Optional` 模板。右列中两个较大的项使用 `Optional-Above`，以节省水平空间。左列顶部标记为
    `Job` 的项使用 `Required` 模板。`Required` 模板的目的是警告用户必须填写此项的值。该项的 `Value Required` 属性（位于其
    `Validation` 部分）强制实施此限制，将在第 8 章讨论。

    要删除项，请在渲染树中右键单击其条目并选择 `Delete` 选项。

    您现在可以创建 `Item Sampler` 页面的所有 22 个项，将它们放置在具有适当标签的适当区域中。具体来说，`Text-Based Items`
    区域有五个项，`Single-Value Items` 区域各有三个项，`Multi-Value Items` 区域有四个项，`Yes/No Items`
    区域有四个项。


    目前，您只需要为每个项指定名称和标签。表 5-1 为您列出了这些值。项类型目前还不重要；现在，您应将每个项类型保留为 `Text Field`。创建完项后，您可以随意尝试不同的标签模板。


    **表 5-1 Item Sampler 页面中的项**


    | 区域 | 名称 | 标签 |

    | :--- | :--- | :--- |

    | Text-Based Items | `P8_EMPNO` | 员工编号 |

    | | `P8_JOB` | 职位 |

    | | `P8_SALARY` | 薪资 |

    | | `P8_HIREDATE` | 入职日期 |

    | | `P8_COLOR` | 喜爱颜色 |

    | Radio Groups | `P8_RADIO_NAME` | 部门名称 |

    | | `P8_RADIO_NO` | 部门编号 |

    | | `P8_RADIO_INFO` | 部门信息 |

    | Select Lists | `P8_SELECT_NAME` | 部门名称 |

    | | `P8_SELECT_NO` | 部门编号 |

    | | `P8_SELECT_INFO` | 部门信息 |

    | Popup Lists | `P8_POPUP_NAME` | 部门名称 |

    | | `P8_POPUP_NO` | 部门编号 |

    | | `P8_POPUP_INFO` | 部门信息 |

    | Multi-Value List Items | `P8_M_SELECT` | 部门 |

    | | `P8_CHECKBOX` | 部门 |

    | | `P8_SHUTTLE` | 部门 |

    | | `P8_LIST` | 部门 |

    | Yes/No Items | `P8_YN_SELECT` | 给我发邮件 |

    | | `P8_YN_RADIO` | 给我发邮件 |

    | | `P8_YN_CHECKBOX` | 给我发邮件 |

    | | `P8_YN_SWITCH` | 给我发邮件 |


    ## 定位项


    您的下一个任务是将其项定位在其区域内。APEX 以行的形式显示区域的项，位于区域的顶部或底部。区域的 `Item Display Position` 属性（在区域的
    `Appearance` 部分中）可让您指定其项是出现在其内容上方还是下方。此属性对于 `Item Sampler` 页面无关紧要，因为其区域没有其他内容，但对于下一章的页面将变得有用。

    项的 `Layout` 部分决定了其在区域内的位置。APEX 在区域内定位项的方式类似于在页面内定位区域的方式。项根据其 `Sequence` 属性的值从左到右放置到行中，每当其
    `Start New Row` 属性被选中时，就移动到新行。区域的宽度被划分为 12 个网格点。每个项（包括其标签，如果显示在项的左侧）有一个起始网格点和一个以网格点为单位的宽度。'
- fmt: '## 布局示例


    例如，图 5-9 展示了 `P8_EMPNO` 项的 `Layout` 部分。这些值指定了该项将占据区域的前三分之一（以便 `P8_JOB` 有足够的空间占据剩余的三分之二）。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig9_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig9_HTML.jpg)


    图 5-9 在其区域中指定项的位置


    当项的标签显示在其左侧时，APEX 需要决定将多少项宽度分配给标签，多少分配给项本身。图 5-9 所示的 `Label Column Span` 属性指定了分配给标签的网格点数。默认值通常非常合适。但如果标签过长或需要特殊处理，显式指定标签跨度（或指定
    `Floating` 或 `Above` 标签模板）可能更好。


    现在，你能够将你的 `Item Sampler` 项定位在其区域中了。大多数项可以使用其默认布局属性，唯一的例外是 `Text-Based Items` 区域中的项。项
    `P8_EMPNO` 和 `P8_SALARY` 各自开始一个新行，列跨度为 4；项 `P8_JOB` 和 `P8_HIREDATE` 各自开始一个新列。项
    `P8_COLOR` 开始一个新行。


    你页面上的项现在结构正确，但它们仍然是默认的 `Text Field` 类型。这个问题将在接下来处理。


    ## Text-Based Items


    基于文本的项以其输入框为特征，用户可以在其中键入值。APEX 提供了多种基于文本的项，其中五种显示在图 5-2 的 `Text-Based Items` 区域中。为了可读性，该区域在图
    5-10 中重印。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig10_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig10_HTML.jpg)


    图 5-10 图 5-2 的 Text-Based Items 区域


    以下小节将介绍各种基于文本的项类型及其属性，然后讨论所有基于文本项共有的一些属性。


    ### Text Fields


    `Text Field` 是默认的项类型。它也是最简单的项类型，因为对输入框中可以输入的值没有限制。项的值就是你输入到输入框中的内容。


    ### Number Fields


    项 `P8_EMPNO` 是一个数字字段；它与文本字段的不同之处在于其值只能是数字。数字字段项的 `Settings` 部分有几个特定于数字的属性。图 5-11
    显示了 `P8_EMPNO` 的这些属性。`Minimum Value` 和 `Maximum Value` 属性允许你以明显的方式限制允许的项值。`Number
    Alignment` 属性允许你指定数字在输入框内的对齐方式。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig11_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig11_HTML.jpg)


    图 5-11 与数字字段相关的属性


    ### Password Items


    项 `P8_SALARY` 是一个密码字段；它与文本字段的不同之处在于其值不会显示在页面上。输入时，其字符会被圆圈替代，页面渲染时也以这种方式显示。


    ### Text Fields with Autocomplete


    自动完成的文本字段是一个带有相关建议值列表的文本字段。当你在输入框中键入时，页面会显示一个匹配值的菜单。如果你点击一个显示的值，APEX 会自动将该值输入到输入框中。例如，项
    `P8_JOB` 是一个自动完成的文本字段，其关联列表由五个当前的职位名称组成。当我在框中输入 `a` 时，APEX 显示了职位名称 `ANALYST`（因为它是唯一以
    `a` 开头的职位）；然后我就可以点击该标题而无需进一步输入。


    自动完成字段使用户可以轻松输入最常见的值，但不强制他们从这些值中选择。即使从列表中选择了一个建议值，用户也可以通过继续输入来自由更改该值。


    你可以在项的 `List of Values` 部分指定自动完成值列表。图 5-12 显示了 `P8_JOB` 的这个部分。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig12_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig12_HTML.jpg)


    图 5-12 指定自动完成列表


    有两种方式指定该列表。图 5-12 演示了第一种方式，即通过 SQL 查询。查询包含一列，其输出值构成列表。这种表达列表的方式是动态的，因为列表会随着数据库中职位标题的变化而变化。


    指定值列表的另一种方式是使用静态值。为此，将图 5-12 中的 `Type` 属性设置为 `Static Values`。属性编辑器随后将显示一个名为 `Static
    Values` 的属性；点击它会弹出一个可以输入值的屏幕。图 5-13 显示了如果我使用静态值指定 `P8_JOB`，该屏幕的样子。`Sort at Runtime`
    属性指定 APEX 是否应对多个匹配值进行排序呈现。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig13_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig13_HTML.jpg)


    图 5-13 自动完成列表的静态规范


    当值列表是固定且众所周知时，静态规范更可取。例如，在图 5-13 中，静态规范使得 `INTERN` 可以在列表上，即使当前没有具有该职位的员工。


    你可能会从第 3 章回忆起，报表列可以具有 `Plain Text (based on List of Values)` 类型，它使用值列表将实际列值转换为其显示值。该值列表也是通过
    SQL 查询在 `List of Values` 属性部分中指定的。该机制类似于如何指定自动完成值。例如，比较图 3-30 和图 5-12；唯一的区别是自动完成
    SQL 查询有一个输出列，而不是两个。


    这种相似性解释了为什么图 5-13 中的 `Static Values` 屏幕有一个用于显示值和返回值的列——该屏幕在定义执行转换的值列表时也会用到。值列表的后一种用法将在本章讨论基于列表的项类型时再次出现。'
  raw: 'For example, Figure [5-9](#335103_3_En_5_Chapter.xhtml#Fig9) shows the `Layout`
    section for

    the item `P8_EMPNO`. These

    values specify that the item will span the first third of the region (so

    that `P8_JOB`

    will have room to span the remaining two thirds).


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig9_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig9_HTML.jpg)


    Figure 5-9

    Specifying an item’s position in its region


    When an item’s label is displayed to its left, APEX needs to decide

    how much of the item width to devote to the label and

    how much to the item. The property `Label Column Span`,

    shown in Figure [5-9](#335103_3_En_5_Chapter.xhtml#Fig9), specifies how

    many grid points to devote to the label. The default value is usually

    very good. But if a label is excessively long or requires special

    treatment, it might be better to specify the label span explicitly (or

    to specify a `Floating` or `Above` label

    template).

    You are now able to position your `Item Sampler` items in

    their regions. Most items can use their default layout properties, the

    only exception being the items in the `Text-Based Items`

    region. Items `P8_EMPNO` and `P8_SALARY` each begin

    a new row and have a column span of 4; items `P8_JOB` and `P8_HIREDATE` each

    begin a new column. The item `P8_COLOR` begins a new

    row.

    The items on your page now have the proper structure, but they still

    have the default type `Text Field`. This

    situation is addressed next.


    Text-Based Items


    A text-based item

    is characterized by its input box, into which a user can type a value.

    APEX supplies several kinds of text-based items, five of which are shown

    in the `Text-Based Items` region of Figure [5-2](#335103_3_En_5_Chapter.xhtml#Fig2).
    For

    readability, this region is reprinted in Figure [5-10](#335103_3_En_5_Chapter.xhtml#Fig10).


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig10_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig10_HTML.jpg)


    Figure 5-10

    The Text-Based Items region of Figure [5-2](#335103_3_En_5_Chapter.xhtml#Fig2)


    The following subsections consider the various text-based item types

    and their properties, followed by a discussion of some properties common

    to all text-based items.


    Text Fields

    `Text Field`  is

    the default item type. It is also the simplest item type, in that there

    is no restriction on what values you can enter into the input box. The

    value of the item is whatever you type into the input box.


    Number Fields


    The item `P8_EMPNO` is a

    *number field*; it differs from a text field in that its value

    can only be numeric. The `Settings` section of a

    number field item has several number-specific properties. Figure [5-11](#335103_3_En_5_Chapter.xhtml#Fig11)
    shows these

    properties for `P8_EMPNO`. The `Minimum Value` and

    `Maximum Value`

    properties  allow

    you to restrict the allowable item values in the obvious way. The `Number Alignment`

    property allows you to specify the alignment of the number within the

    input box.


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig11_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig11_HTML.jpg)


    Figure 5-11

    Properties relevant to number fields


    Password Items

    The item `P8_SALARY` is a

    *password field*, which differs from a text field in that its

    value is not displayed on the page. Instead, its characters

    are replaced by circles when the value is being entered and are

    displayed that way when the page is rendered.


    Text Fields with Autocomplete

    A *text field with autocomplete* is a text field with an

    associated list of suggested values. As you type into the input box, the page
    displays a

    menu of matching values. If you click a displayed value, then APEX

    automatically enters that value into the input box. For example, the

    item `P8_JOB` is

    a text field with autocomplete, whose associated list consists of the

    five current job titles. When I typed **a** into the box,

    APEX displayed the job title `ANALYST` (because it

    was the only job beginning with *a*); I was then able to click

    that title without the need for further typing.

    Autocomplete fields make it easy for users to enter the most common

    values, but do not require them to pick from those values. Even after

    selecting a suggested value from the list, a user is free to alter that

    value via continued typing.


    You specify the list of autocompletion values in the item’s

    `List of Values`

    section. Figure [5-12](#335103_3_En_5_Chapter.xhtml#Fig12) shows this

    section for `P8_JOB`.


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig12_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig12_HTML.jpg)


    Figure 5-12

    Specifying the autocompletion list


    There are two ways to specify the list. Figure [5-12](#335103_3_En_5_Chapter.xhtml#Fig12)
    demonstrates

    the first way, which is via an SQL query. The query contains one column,

    and its output values constitute the list. This method of expressing the

    list is *dynamic* because the list changes as the job titles in

    the database change.


    An alternative way to specify the list of values is to use *static

    values*. To do so, set the `Type` property in

    Figure [5-12](#335103_3_En_5_Chapter.xhtml#Fig12) to `Static Values`. The

    property editor will then display a property called `Static Values`;

    clicking it brings up a screen where you can enter the values. Figure

    [5-13](#335103_3_En_5_Chapter.xhtml#Fig13) shows what the

    screen would look like if I specified `P8_JOB` using static

    values. The `Sort at Runtime` property specifies whether APEX should present multiple

    matching values in sorted order or as listed.


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig13_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig13_HTML.jpg)


    Figure 5-13

    Static specification of the autocompletion list


    A static specification is

    preferable when the value list is fixed and well-known. In Figure [5-13](#335103_3_En_5_Chapter.xhtml#Fig13),
    for example,

    the static specification enables `INTERN` to be on the

    list, even though there are no current employees having that job.

    You might recall from Chapter [3](#335103_3_En_3_Chapter.xhtml) that report columns
    can have the

    type `Plain Text (based on List of Values)`, which used a list of values to translate

    actual column values to their displayed values. That list of values was

    also specified in a `List of Values`

    property section, via an SQL query. The mechanism is similar to how

    autocompletion values are specified. For example, compare Figure [3-30](#335103_3_En_3_Chapter.xhtml#Fig30)
    with Figure [5-12](#335103_3_En_5_Chapter.xhtml#Fig12); the only

    difference is that an autocompletion SQL query has one output column

    instead of two.

    This similarity explains why the `Static Values` screen

    in Figure [5-13](#335103_3_En_5_Chapter.xhtml#Fig13) has a column

    for display values and return values—the screen is also used when

    defining value lists that perform translation. This latter use of value

    lists will come up again in this chapter, during the discussion of

    list-based item types.'
  trans: '## 布局示例


    例如，图 5-9 展示了 `P8_EMPNO` 项的 `Layout` 部分。这些值指定了该项将占据区域的前三分之一（以便 `P8_JOB` 有足够的空间占据剩余的三分之二）。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig9_HTML.jpg](img/335103_3_En_5_Fig9_HTML.jpg)


    图 5-9 在其区域中指定项的位置


    当项的标签显示在其左侧时，APEX 需要决定将多少项宽度分配给标签，多少分配给项本身。图 5-9 所示的 `Label Column Span` 属性指定了分配给标签的网格点数。默认值通常非常合适。但如果标签过长或需要特殊处理，显式指定标签跨度（或指定
    `Floating` 或 `Above` 标签模板）可能更好。


    现在，你能够将你的 `Item Sampler` 项定位在其区域中了。大多数项可以使用其默认布局属性，唯一的例外是 `Text-Based Items` 区域中的项。项
    `P8_EMPNO` 和 `P8_SALARY` 各自开始一个新行，列跨度为 4；项 `P8_JOB` 和 `P8_HIREDATE` 各自开始一个新列。项
    `P8_COLOR` 开始一个新行。


    你页面上的项现在结构正确，但它们仍然是默认的 `Text Field` 类型。这个问题将在接下来处理。


    ## Text-Based Items


    基于文本的项以其输入框为特征，用户可以在其中键入值。APEX 提供了多种基于文本的项，其中五种显示在图 5-2 的 `Text-Based Items` 区域中。为了可读性，该区域在图
    5-10 中重印。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig10_HTML.jpg](img/335103_3_En_5_Fig10_HTML.jpg)


    图 5-10 图 5-2 的 Text-Based Items 区域


    以下小节将介绍各种基于文本的项类型及其属性，然后讨论所有基于文本项共有的一些属性。


    ### Text Fields


    `Text Field` 是默认的项类型。它也是最简单的项类型，因为对输入框中可以输入的值没有限制。项的值就是你输入到输入框中的内容。


    ### Number Fields


    项 `P8_EMPNO` 是一个数字字段；它与文本字段的不同之处在于其值只能是数字。数字字段项的 `Settings` 部分有几个特定于数字的属性。图 5-11
    显示了 `P8_EMPNO` 的这些属性。`Minimum Value` 和 `Maximum Value` 属性允许你以明显的方式限制允许的项值。`Number
    Alignment` 属性允许你指定数字在输入框内的对齐方式。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig11_HTML.jpg](img/335103_3_En_5_Fig11_HTML.jpg)


    图 5-11 与数字字段相关的属性


    ### Password Items


    项 `P8_SALARY` 是一个密码字段；它与文本字段的不同之处在于其值不会显示在页面上。输入时，其字符会被圆圈替代，页面渲染时也以这种方式显示。


    ### Text Fields with Autocomplete


    自动完成的文本字段是一个带有相关建议值列表的文本字段。当你在输入框中键入时，页面会显示一个匹配值的菜单。如果你点击一个显示的值，APEX 会自动将该值输入到输入框中。例如，项
    `P8_JOB` 是一个自动完成的文本字段，其关联列表由五个当前的职位名称组成。当我在框中输入 `a` 时，APEX 显示了职位名称 `ANALYST`（因为它是唯一以
    `a` 开头的职位）；然后我就可以点击该标题而无需进一步输入。


    自动完成字段使用户可以轻松输入最常见的值，但不强制他们从这些值中选择。即使从列表中选择了一个建议值，用户也可以通过继续输入来自由更改该值。


    你可以在项的 `List of Values` 部分指定自动完成值列表。图 5-12 显示了 `P8_JOB` 的这个部分。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig12_HTML.jpg](img/335103_3_En_5_Fig12_HTML.jpg)


    图 5-12 指定自动完成列表


    有两种方式指定该列表。图 5-12 演示了第一种方式，即通过 SQL 查询。查询包含一列，其输出值构成列表。这种表达列表的方式是动态的，因为列表会随着数据库中职位标题的变化而变化。


    指定值列表的另一种方式是使用静态值。为此，将图 5-12 中的 `Type` 属性设置为 `Static Values`。属性编辑器随后将显示一个名为 `Static
    Values` 的属性；点击它会弹出一个可以输入值的屏幕。图 5-13 显示了如果我使用静态值指定 `P8_JOB`，该屏幕的样子。`Sort at Runtime`
    属性指定 APEX 是否应对多个匹配值进行排序呈现。


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig13_HTML.jpg](img/335103_3_En_5_Fig13_HTML.jpg)


    图 5-13 自动完成列表的静态规范


    当值列表是固定且众所周知时，静态规范更可取。例如，在图 5-13 中，静态规范使得 `INTERN` 可以在列表上，即使当前没有具有该职位的员工。


    你可能会从第 3 章回忆起，报表列可以具有 `Plain Text (based on List of Values)` 类型，它使用值列表将实际列值转换为其显示值。该值列表也是通过
    SQL 查询在 `List of Values` 属性部分中指定的。该机制类似于如何指定自动完成值。例如，比较图 3-30 和图 5-12；唯一的区别是自动完成
    SQL 查询有一个输出列，而不是两个。


    这种相似性解释了为什么图 5-13 中的 `Static Values` 屏幕有一个用于显示值和返回值的列——该屏幕在定义执行转换的值列表时也会用到。值列表的后一种用法将在本章讨论基于列表的项类型时再次出现。'
- fmt: 'Another relevant autocompletion property is `Search`, which appears in the
    `Settings` section. This property has the four possible settings shown in Figure
    [5-14](#335103_3_En_5_Chapter.xhtml#Fig14). These settings cover two issues: whether
    the text typed by the user is case sensitive and whether the text typed by the
    user can match anywhere within a suggested value or must it match only from the
    beginning of the string. The figure shows the setting for `P8_JOB`, which is configured
    to be case insensitive and to match from the beginning only.


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig14_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig14_HTML.jpg)


    Figure 5-14: Possible Search values for an autocomplete item


    ## Color Pickers


    Item `P8_COLOR` has the type `Color Picker`. Colors on the computer are typically
    represented by their red, green, and blue component values, with each component
    having a value from 0 to 255. For example in Figure [5-10](#335103_3_En_5_Chapter.xhtml#Fig10),
    the value chosen for `P8_COLOR` has (`red`, `green`, `blue`) component values
    of (`50`, `53`, `235`). That color is mostly blue, with a little green and red.


    These component values can be represented compactly as a hexadecimal number. Because
    a two-digit hexadecimal number can represent 256 different values, a six-digit
    number can represent every possible color. In Figure [5-10](#335103_3_En_5_Chapter.xhtml#Fig10),
    that color is represented by the number `#3235EB`. Note that `32` is the hexadecimal
    value of 50, `35` is the hexadecimal value of 53, and `EB` is the hexadecimal
    value of 235.


    An APEX color picker item lets you type the value of the color if it is known.
    Or you can click the eyedropper icon to choose the desired color from a color
    wheel, and APEX will display the corresponding numeric value in the input box.
    The links under the color picker are *quick picks*, which will be discussed a
    bit later.


    ## Date Pickers


    The item `P8_HIREDATE` has the type `Date Picker`. Date picker items consist of
    an input box and a calendar icon. As with all text-based items, the user is free
    to type the desired date into the input box. But the user can also click the icon
    to bring up a calendar and then navigate the calendar to select a date, which
    causes the textual representation of the date to appear in the input box.


    The properties relevant to a date picker appear in its `Settings` section. Figure
    [5-15](#335103_3_En_5_Chapter.xhtml#Fig15) shows these values for `P8_HIREDATE`.


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig15_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig15_HTML.jpg)


    Figure 5-15: Properties relevant to Date Picker items


    The `Highlighted Date` property specifies the date that the calendar initially
    selects; by default, it is the current date. The `Minimum Date` and `Maximum Date`
    property values can be specified in several ways. In Figure [5-15](#335103_3_En_5_Chapter.xhtml#Fig15),
    the values `-5y` and `+5y` specify 5 years ago and 5 years in the future, respectively.
    The property `Show` allows you to configure when the calendar is displayed. The
    calendar can be shown when the icon is clicked (as in Figure [5-10](#335103_3_En_5_Chapter.xhtml#Fig10)),
    shown on mouse rollover, or always displayed on the page.


    The `Navigation List for` property allows you to configure the calendar for quicker
    access to dates. By default, the calendar has buttons to navigate only to the
    previous and next months. You can set the property so that there are also menus
    for moving directly to a specified month, year, or both. Finally, the `Year Range`
    property is an alternative way to specify the maximum and minimum dates, in which
    you give the allowable range of years. For example, entering the value `2018:2025`
    would allow only dates between the years 2018–2025.


    ## Properties of All Text-Based Items


    Certain properties are common to all text-based items, regardless of their type.
    Three such properties are `Width` and `Format Mask` (both in the `Appearance`
    section) and `Maximum Length` (in the `Validation` section). Figure [5-16](#335103_3_En_5_Chapter.xhtml#Fig16)
    shows these two sections for the item `P8_HIREDATE`.


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig16_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig16_HTML.jpg)


    Figure 5-16: Properties common to all text-based items


    The `Format Mask` property works the same way as in reports. The value of the
    property is an expression that describes how the item value gets displayed. In
    Figure [5-16](#335103_3_En_5_Chapter.xhtml#Fig16), the `Hire Date` item has a
    format mask of `Month DD, YYYY`.


    The `Width` property specifies the size of the input box in characters. `P8_HIREDATE`
    has a width of 18, as that is large enough to hold all dates. For the other items
    in Figure [5-10](#335103_3_En_5_Chapter.xhtml#Fig10), `P8_EMPNO` and `P8_SALARY`
    have widths of 6, and `P8_JOB` and `P8_COLOR` have widths of 10.


    The `Maximum Length` property specifies the maximum number of characters that
    a user can type into the input box, regardless of its width. The difference between
    item width and maximum length is as follows. A user can enter a value that is
    longer than the width of the input box—if so, APEX will scroll the value within
    the box. But if a user tries to enter a value that is longer than the maximum
    length, then APEX will refuse to accept the extra characters.


    For example, in Figure [5-16](#335103_3_En_5_Chapter.xhtml#Fig16), `P8_HIREDATE`
    has the same values for `Width` and `Maximum Length`, meaning that a user cannot
    enter a value longer than the size of the input box. For another example, try
    setting the maximum length of `P8_EMPNO` to 4; you will discover that you simply
    cannot enter more than four digits into the input box, even though there is room.


    By default, the maximum length is blank, denoting no maximum. A good design rule
    is to specify a maximum length for all text-based items. In Chapter [13](#335103_3_En_13_Chapter.xhtml),
    you will see how an item with no maximum length (or an unreasonably large one)
    can contribute to serious security loopholes.


    Another section common to text-based items is `Quick Picks`, which enables you
    to specify commonly used values for the item. For example, the `Favorite Color`
    item in Figure [5-10](#335103_3_En_5_Chapter.xhtml#Fig10) has three quick-pick
    values, which display as links below the item. The value shown in its text box
    is the result of my clicking the link for `Royal Blue`.


    Figure [5-17](#335103_3_En_5_Chapter.xhtml#Fig17) shows the `Quick Picks` section
    for the `Favorite Color` item.


    Enabling the `Show Quick Picks` property displays the label/value text boxes.
    Note that you need to specify two values for each pick: the value displayed in
    the link and the value to be entered into the text box when the link is clicked.


    ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig17_HTML.jpg](images/335103_3_En_5_Chapter/335103_3_En_5_Fig17_HTML.jpg)


    Figure 5-17: Specifying an item’s quick picks'
