    \n尽管此代码实现了所需的功能，但它有些笨拙。本章末尾将重新审视此代码，届时您将看到如何使用验证来改进它。\n\n## 成功与错误消息\n\n更改数据库的进程应显示一条指示发生了什么的消息。再次考虑“修订后的员工数据录入”页面。如果员工报表仅包含少量记录，用户可以通过查看报表的变化来验证更新是否成功。但是，如果报表包含数千条记录，确定发生了什么就会困难得多。最好让进程显示诸如\
    \ **您的记录已被删除** 之类的消息。APEX 进程具有 `成功消息` 和 `错误消息` 属性，正是用于此目的。图 7-11 显示了 `Delete`\
    \ 进程的这些属性值。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig11_HTML.jpg](img/335103_3_En_7_Fig11_HTML.jpg)\n\
    \n图 7-11 成功和错误消息属性\n\n转到属性编辑器，为您的“销售佣金”和“修订后的员工数据录入”页面中的进程添加成功和错误消息。运行一个页面并进行一些更改。当页面重新呈现时，您指定的成功消息将被显示。（如果您有兴趣查看错误消息的实际效果，请修改进程的\
    \ PL/SQL 代码，使其引用一个不存在的表。）\n\n成功和错误消息可以包含 HTML 代码和项目引用。例如，假设您希望图 7-11 中的成功消息像 APEX\
    \ SQL 工作室中的 SQL 命令窗口那样，指明受影响的记录数。如何将受影响的记录数放入进程的成功消息中？\n\n解决方案是使用内置的 PL/SQL 函数\
    \ `SQL%RowCount`。如果您在执行 SQL 命令后调用此函数，它将返回受影响的记录数。因此，您应该修改 `DeleteEmp` 进程，将该值分配给一个隐藏项（称之为\
    \ `P19_DELETE_COUNT`），然后在消息正文中引用该项。`DeleteEmp` 进程修订后的 PL/SQL 代码如清单 7-11 所示（粗体行是新增的）。\n\
    \n```sql\nbegin\n  delete from EMP\n  where  EmpNo = :P19_DELETE_EMPNO;\n\n  :P19_DELETE_COUNT\
    \ := SQL%RowCount;\nend;\n```\n清单 7-11 修订清单 7-1 的 `DeleteEmp` 进程\n\n然后，您可以将图 7-11\
    \ 中的成功消息文本更改为：\n\n```\n已删除 &P19_DELETE_COUNT. 条记录。\n```\n\n请注意，对 `P19_DELETE_COUNT`\
    \ 的引用在 PL/SQL 进程中使用了绑定变量语法，而在 HTML 消息中使用了替换字符串语法。\n\n## 条件进程\n\n到目前为止，您编写的每个进程都有一个关联的按钮，您使用其\
    \ `按下按钮时` 属性来指定进程与其按钮之间的关联。这是使用进程的自然且典型的方式，通常也是您所需要的。\n\n有两种情况下 `按下按钮时` 属性是不够的：当提交操作不是由按钮引起时，以及当进程与多个按钮相关时。以下小节将考虑这些情况。\n\
    \n### 通过项目提交\n\n回想一下，某些类型的项目（即，单选组、选择列表、文本字段和密码字段）可以配置为执行提交操作。此类项目应该能够拥有一个关联的进程。问题在于，`按下按钮时`\
    \ 属性没有提供选择项目的选项。\n\n解决此难题的方法是放弃 `服务器端条件` 部分中的 `按下按钮时` 属性，转而使用其下方名为 `类型` 的属性（请参阅图\
    \ 7-6）。该属性允许您显式指定进程应何时执行的条件。其选项与条件渲染的选项相同，在第 6 章中描述。\n\n例如，让我们更改“修订后的员工数据录入”页面的“更新员工”区域，使其不再使用\
    \ `GetInfo` 按钮。图 7-12 显示了新区域的外观。现在，只需从选择列表中选择一名员工，就足以使所选员工的职位、薪水和部门自动显示。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig12_HTML.jpg](img/335103_3_En_7_Fig12_HTML.jpg)\n\
    \n图 7-12 使用选择列表调用 `GetEmpInfo` 进程\n\n实现此行为的方法是首先修改选择列表，使其在更改时提交页面，然后修改 `GetEmpInfo`\
    \ 进程，使其在该提交发生时执行。对于第一个任务，将选择列表 `P19_UPDATE_EMPNO` 的操作修改为 `提交页面`，如图 7-13 所示。\n\n\
    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig13_HTML.jpg](img/335103_3_En_7_Fig13_HTML.jpg)\n\
    \n图 7-13 选择列表现在在更改时提交\n\n对于第二个任务，如图 7-14 所示，更改 `GetEmpInfo` 进程的 `服务器端条件` 属性。请注意，其\
    \ SQL 表达式利用了 APEX 变量 `REQUEST`，该变量保存执行提交操作的项目的名称。因为表达式是 SQL 表达式，所以它使用绑定变量符号引用该变量。该表达式将变量值与字符串\
    \ `'P19_UPDATE_EMPNO'`（不带冒号）进行比较，因为表达式感兴趣的是该项的*名称*，而不是它所持有的*值*。"
