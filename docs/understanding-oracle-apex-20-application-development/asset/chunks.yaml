  trans: "# 实现表单页面\n\n`Employee Demo` 应用的第 34 页是如图 10-35 所示的表单页面。通过创建一个空白页面并向其添加一个\
    \ `表单` 区域，实现起来已经足够简单。然而，使用向导来创建表单页面本身则更加容易。\n\n回顾图 10-23 的 `创建页面` 屏幕，你可以看到一个名为\
    \ `Form` 的向导图标。点击它会弹出图 10-38 的 `创建表单` 屏幕。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig38_HTML.jpg](img/335103_3_En_10_Fig38_HTML.jpg)\n\
    \n图 10-38\n创建表单向导的第一个屏幕\n\n在询问了页面编号和名称之后，向导会要求提供两样东西：表单在提交后（即 `删除` 和 `应用更改` 按钮）应跳转到的页面，以及重定向后（即\
    \ `取消` 按钮）应跳转到的页面。其余的屏幕与你之前见过的类似——一个屏幕询问导航菜单，一个屏幕请求数据源，以及最后一个屏幕请求主键。\n\n向导生成的表单页面应该能与树页面无缝协作，无需你进行任何额外的配置——当点击树节点时，树会重定向到表单；当点击按钮时，表单会重定向到树。图\
    \ 10-35 中我的表单页面，仅仅是更改了向导生成的项的类型和布局后的结果。\n\n我想强调一点，由 `Form` 向导生成的表单页面与由 `Report\
    \ with Form` 向导生成的表单页面完全相同——这两个向导之间的唯一区别是，`Report with Form` 还会生成一个包含 `创建` 按钮和报表的页面。此外，由\
    \ `Form` 向导生成的页面与一个带有 `表单` 区域的空白页面加上几个按钮和属性设置也完全相同。图 10-23 中的其他基于表单的向导与 `Report\
    \ with Form` 类似。了解这一点可以帮助你决定，对于任何给定的任务，是使用其中一个向导还是自己编写页面。\n\n## 主从表单\n\n第 6 章讨论了主从报表的创建。在主从报表中，两个报表是链接的，当选择主报表中的一行时，从报表只显示与所选主行关联的行。例如，图\
    \ 6-8 中的 `按部门查看员工` 页面显示了一个与主 `DEPT` 报表链接的 `EMP` 报表；点击一个 `DEPT` 记录会使 `EMP` 报表仅显示所选部门中的员工。\n\
    \n在本节中，我想考虑如何扩展主从报表以包含更新功能。一个直接的方法是创建两套 `带表单的报表` 页面，一套用于 `DEPT`，一套用于 `EMP`，然后像第\
    \ 6 章那样链接 `DEPT` 和 `EMP` 报表。让我们看看这需要多少工作量。\n\n首先，使用 `带表单的报表` 向导为 `DEPT` 创建报表和表单页面。报表页面命名为\
    \ `主报表`，页码为 35；表单页面命名为 `主表单`，页码为 36。页面数据源是 `select * from DEPT`。\n\n然后使用向导为 `EMP`\
    \ 创建报表和表单页面。页码为 37 和 38；报表页面命名为 `从报表`，表单页面命名为 `从表单`。它们的数据源是 `select * from EMP`。\n\
    \n此时，你有两套互不关联的页面。它们的报表页面需要按如下方式关联起来：\n\n*   主报表需要一个链接列，带你跳转到从报表。\n*   从报表需要仅显示与所选从行关联的记录。\n\
    *   从报表需要一个按钮，带你返回主报表。\n\n图 10-39 和 10-40 展示了这两个报表。图 10-40 显示了为 `ACCOUNTING` 部门点击“查看员工”后的结果。请注意，我修改了两个页面上向导生成的区域标题。特别是，从区域的标题是用部门名称自定义的。\n\
    \n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig40_HTML.jpg](img/335103_3_En_10_Fig40_HTML.jpg)\n\
    \n图 10-40\n从报表\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig39_HTML.jpg](img/335103_3_En_10_Fig39_HTML.jpg)\n\
    \n图 10-39\n主报表\n\n你需要对主报表做的唯一改动是创建额外的“查看员工”列。为此，你应该为报表创建并配置一个 *虚拟列*，步骤如下：\n\n\
    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig41_HTML.jpg](img/335103_3_En_10_Fig41_HTML.jpg)\n\
    \n图 10-41\n查看员工链接的链接构造器\n\n*   右键单击渲染树的 `列` 节点，然后选择 *创建虚拟列* 菜单项。APEX 会向报表添加一个名为\
    \ `DERIVED$01` 的列。\n*   将此列的类型设置为 `链接`。\n*   转到 `设置` 部分，点击 `目标` 属性的选框。这会打开链接构造器。\n\
    *   如图 10-41 所示配置链接构造器。\n*   将该列的链接文本属性设置为 `查看员工`。\n\n然后你需要对 `从报表` 页面进行以下更改。\n\
    \n*   创建隐藏项 `P37_DEPTNO` 和 `P37_DNAME`。\n*   将区域的数据源更改为\n    ```\n    select *\
    \ from EMP\n    where DeptNo = :P37_DEPTNO\n    ```\n*   将区域的标题更改为\n    ```\n\
    \    &P37_DNAME. 中的员工\n    ```\n*   创建一个标签为 `所有部门` 并重定向到第 35 页的按钮。\n\n就是这样！使用页面向导的优势在于，你可以快速构建功能齐全的网页。你可能需要配置区域的外观和感觉，但这应该不会太麻烦。\n\
    \n使用页面向导的唯一问题是，它迫使你采用特定的页面架构——在本例中，是使用四个单区域页面。其实还有许多其他可能的设计。事实上，APEX 有一个 `创建页面`\
    \ 向导，它构建主从表单的方式非常不同。图 10-42 显示了它的主页面。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig42_HTML.jpg](img/335103_3_En_10_Fig42_HTML.jpg)\n\
    \n图 10-42\n组合式主从页面\n\n该页面有五个区域：一个横跨顶部的区域，名为 `主-从`，包含两个按钮；左侧列中的一个区域包含搜索栏；左侧列中的一个报表区域列出主行；顶部的一个报表区域（名为\
    \ `部门`）列出所选的主行；以及底部的一个报表区域（名为 `员工`）列出关联的从行。\n\n左侧列中主区域的行是链接。当你点击一行时，它会成为选定行，其右侧的两个区域会相应地调整。\n\
    \n用户可以通过四种方式编辑此页面：\n\n*   `主-从` 区域中的 `创建` 按钮向主表插入一个新行。\n*   `部门` 区域中的 `编辑` 按钮编辑当前的主行。\n\
    *   `员工` 区域中的 “`+`” 按钮向从表插入一个新行。\n*   从报表中的编辑链接编辑所选的从行。"
- fmt: '## 交互式网格


    单击按钮或链接会在模态对话框页面中显示一个表单。例如，图 [10-43](#335103_3_En_10_Chapter.xhtml#Fig43) 显示了单击
    `Edit` 按钮后的结果。用户可以修改主记录、删除它，或者在不执行任何操作的情况下返回到主从页面。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig43_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig43_HTML.jpg)


    图 10-43 编辑当前主记录


    从设计角度来看，将此主从页面与之前的解决方案进行比较是值得的。此页面在同一页面上显示主报表和明细报表，类似于图 [6-8](#335103_3_En_6_Chapter.xhtml#Fig8)
    中的 `Employees by Department` 页面。此页面是主要的，用户永远不会与它失去联系。当需要编辑时，会以模态方式显示相应的表单，编辑完成后该表单便会消失。相比之下，之前的解决方案由四个页面组成。用户根据手头的任务（“查看主报表”、“编辑主行”、“查看明细报表”或“编辑明细行”）从一个页面切换到另一个页面，并且没有哪个页面比其他页面更重要。

    关键点不在于一种方法比另一种更好，而在于解决问题的方法有很多种。你需要足够熟练地使用 APEX 来构建你设想中的页面，而不是被迫根据向导生成的页面进行设计。


    考虑到这一点，让我们使用向导来创建这些主从页面，然后检查它们的实现。从图 [2-9](#335103_3_En_2_Chapter.xhtml#Fig9)
    中的初始 `Create Page` 屏幕开始。单击 `Master Detail` 图标时，APEX 会显示图 [10-44](#335103_3_En_10_Chapter.xhtml#Fig44)
    所示的屏幕。从那里，单击 `Side by Side` 图标将得到图 [10-45](#335103_3_En_10_Chapter.xhtml#Fig45)
    所示的屏幕。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig45_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig45_HTML.jpg)


    图 10-45 第一个主从屏幕


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig44_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig44_HTML.jpg)


    图 10-44 选择所需的主从向导


    此屏幕要求您输入主页面（即图 [10-42](#335103_3_En_10_Chapter.xhtml#Fig42) 中显示的页面）的名称和页码。向导还将创建另外两个页面来存放主表单和明细表单，但您无法选择它们的页码。单击
    `Next` 按钮将带您进入指定导航菜单项的屏幕。您之前已经见过此屏幕，因此这里省略了。最后一个屏幕（如图 [10-46](#335103_3_En_10_Chapter.xhtml#Fig46)
    所示）要求您提供主表和明细表。`Primary Display Column` 和 `Secondary Display Column` 属性表示要在主记录中显示的两个值。单击
    `Create` 按钮会生成功能完整的三个页面。在我的应用程序中，这些页面是 39、40 和 41。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig46_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig46_HTML.jpg)


    图 10-46 第三个主从屏幕


    页面 40 和 41 是表单页面，与您通过调用 `Create Form` 向导获得的结果相同。因此，主要问题是如何实现报表页面。


    这三个报表区域，也许令人惊讶，是 `Classic Report` 区域。它们外观不同是因为使用了不同的区域模板。主报表模板是 `Media List`。此模板显示两个值，分别称为
    `List_Title` 和 `List_Text`。如果您希望报表行成为链接，则源查询还必须有一个 Link 字段，其值是要重定向到的 URL。向导生成的源查询很复杂，但其本质如下：


    ```sql

    select DeptNo, DName as List_Title, Loc as List_Text,

    apex_page.get_url(p_items  => ''P39_DEPTNO'',

    p_values => DEPTNO) as Link

    from DEPT

    ```


    函数 `apex_page.get_url` 返回一个指向 APEX 页面的 URL。默认情况下，URL 会重定向到当前页面。参数 `p_items` 和
    `p_values` 指定了应如何更改会话状态。

    图 [10-42](#335103_3_En_10_Chapter.xhtml#Fig42) 中标题为 `Dept` 的区域使用了模板 `Value Attribute
    Pairs – Column`。此模板将每个值显示在其自己的行上，并在前面加上列名。在图中，该区域的源有一行两列，因此其报告显示两行。

    标题为 `Emp` 的区域使用了 `Standard` 模板，因此其报告以标准方式显示。

    除了外观不同，`Dept` 和 `Emp` 报表以通常的方式与其表单页面交互，即通过让它们的按钮和链接重定向到相应的表单页面。

    底线是，即使是像 `Master-Detail` 这样复杂的向导，也只是创建了一个包含三个报表区域的页面，其中两个区域链接到表单页面。如果您愿意，可以自定义这些区域以满足您的需求。


    ### 小结


    本章的第一部分探讨了 APEX 表单区域。一个表单区域包含两个进程——一个初始化进程和一个 ARP 进程——它们允许您的页面访问数据库，而无需编写 PL/SQL
    代码。APEX 还为一些常见任务提供了内置进程，这些进程与两个表单进程配合使用。几个例子展示了这些进程相对于相应 PL/SQL 进程的优点和局限性。

    本章的第二部分探讨了一些创建表单的 APEX 页面创建向导。这些向导各不相同，从创建旨在与其他页面结合使用的单页面的 `Form` 向导，到将 `Form`
    页面与简单报表页面配对的 `Report with Form` 向导，再到将两个 `Form` 页面与一个包含三个报表区域的页面匹配的复杂 `Master-Detail`
    向导。在每种情况下，重点都是揭开这些向导的神秘面纱，使您能够自信地创建所需的页面，无论是否使用它们。


    ### 11. 交互式网格


    报表是只读的。如果您正在查看报表并想要更改其内容，则必须使用表单。例如，考虑图 [10-27](#335103_3_En_10_Chapter.xhtml#Fig27)
    中的 `Report with Form 1` 页面。假设用户想要修改员工报表中的一行。会发生以下步骤：

    *   用户单击所需行的链接，这会重定向到 `Report with Form 2` 页面（图 [10-29](#335103_3_En_10_Chapter.xhtml#Fig29)），并将选定的员工号放入该页面的一个项中。

    *   然后，表单的初始化进程从数据库中检索该员工的信息，并将其存储在相应的项中。

    *   然后用户修改这些项的内容，并单击 `Apply Changes` 按钮执行更新。


    这些步骤的奇特之处在于，第二步没有利用员工报表。相反，初始化进程重新从数据库中检索所需的员工记录，即使这些值就在报表中。

    *交互式网格* 的概念通过允许用户直接更新报表值来解决这种情况。交互式网格本质上是一个“可更新的报表”，在一个区域中结合了报表和表单的功能。本章探讨了构建和自定义交互式网格所需的技术。'
  raw: "Clicking a button or link displays a form in a modal dialog page. For\nexample,\
    \ Figure [10-43](#335103_3_En_10_Chapter.xhtml#Fig43) shows the\nresult of clicking\
    \ the `Edit` button. The user\ncan modify the master record, delete it, or return\
    \ to the master-detail\npage without doing anything.\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig43_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig43_HTML.jpg)\n\
    \nFigure 10-43\nEditing the current master record\n\nFrom a design point of view,\
    \ it is worth comparing this master-detail\npage with the previous solution. This\
    \ page displays the master and\ndetail reports on the same page, similar to the\
    \ `Employees by Department` page of Figure [6-8](#335103_3_En_6_Chapter.xhtml#Fig8).\
    \ This page is primary, and the\nuser never loses contact with it. When an edit\
    \ is required, the\nappropriate form is displayed modally and then disappears\
    \ when the edit\nis complete. In comparison, the previous solution consisted of\
    \ four\npages. The user switches from one page to the other according to the\n\
    task at hand (“view the master report,” “edit a master row,” “view the\ndetail\
    \ report,” or “edit a detail row”), and no page is more important\nthan any other\
    \ page.\nThe point is not that one approach is better than the other, but that\n\
    there are many ways to approach a problem. You need to be facile enough\nwith\
    \ APEX to produce the pages you envision, instead of being forced\ninto a design\
    \ based on the pages that the wizards produce.\n\nWith that in mind, let’s use\
    \ the wizard to create these master-detail\npages and then examine their implementation.\
    \ Start from the initial\n`Create Page`\nscreen of Figure [2-9](#335103_3_En_2_Chapter.xhtml#Fig9).\
    \ When you click the `Master Detail` icon,\nAPEX displays the screen shown in\
    \ Figure [10-44](#335103_3_En_10_Chapter.xhtml#Fig44). From there,\nclicking the\
    \ `Side by Side` icon results in the screen of Figure [10-45](#335103_3_En_10_Chapter.xhtml#Fig45).\n\
    \n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig45_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig45_HTML.jpg)\n\
    \nFigure 10-45\nThe first master-detail screen\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig44_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig44_HTML.jpg)\n\
    \nFigure 10-44\nSelecting the desired master-detail wizard\n\nThis screen asks\
    \ you for the name and page number of the primary page\n(i.e., the page shown\
    \ in Figure [10-42](#335103_3_En_10_Chapter.xhtml#Fig42)). The wizard\nwill also\
    \ create two more pages to hold the master and detail forms, but\nyou don’t get\
    \ to choose their numbers. Clicking the `Next` button takes you\nto the screen\
    \ where you specify the navigation menu entry. You’ve seen\nthis screen before,\
    \ so I am omitting it here. The final screen, shown in\nFigure [10-46](#335103_3_En_10_Chapter.xhtml#Fig46),\
    \ asks you\nfor the master and detail tables. The properties for `Primary Display\
    \ Column` and `Secondary Display Column` denote the two values to be displayed\
    \ in the master\nrecords. Clicking the `Create` button\nproduces the three fully\
    \ functioning pages. In my application, those\npages are 39, 40, and 41.\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig46_HTML.jpg](images/335103_3_En_10_Chapter/335103_3_En_10_Fig46_HTML.jpg)\n\
    \nFigure 10-46\nThe third master-detail screen\n\nPages 40 and 41 are form pages\
    \ and are the same as what you would get\nby calling the `Create Form` wizard.\
    \ So the main issue is how the report page is\nimplemented.\n\nThe three report\
    \ regions are, perhaps surprisingly, `Classic Report`\nregions. Their different\
    \ appearance is due to their region templates.\nThe master report template is\
    \ `Media List`. This\ntemplate displays two values, which it calls `List_Title`\
    \ and `List_Text`. If you\nwant the report rows to be links, then the source query\
    \ must also have a\nfield Link, whose value is the URL to redirect to. The source\
    \ query\ngenerated by the wizard is complex, but it essentially is this:\n\n```\n\
    select DeptNo, DName as List_Title, Loc as List_Text,\napex_page.get_url(p_items\
    \  => 'P39_DEPTNO',\np_values => DEPTNO) as Link\nfrom DEPT\n```\n\nThe function\
    \ `apex_page.get_url`\nreturns a URL to an APEX page. By default, the URL redirects\
    \ to the\ncurrent page. The parameters `p_items` and `p_values` specify how\n\
    the session state should be changed.\nThe region titled `Dept` in Figure [10-42](#335103_3_En_10_Chapter.xhtml#Fig42)\
    \ has the\ntemplate `Value Attribute Pairs – Column`. This template displays each\
    \ value on\nits own line, prepended by the column name. In the figure, the region’s\n\
    source has one row with two columns, so its report displays two\nrows.\nThe region\
    \ titled `Emp` has the `Standard` template, so\nits report is displayed in the\
    \ standard way.\nApart from their different appearances, the `Dept` and `Emp`\
    \ reports interact\nwith their form pages in the usual way, by having their buttons\
    \ and\nlinks redirect to the appropriate form page.\nThe bottom line is that even\
    \ a sophisticated wizard like `Master-Detail` is just\ncreating a page containing\
    \ three report regions, two of which are linked\nto form pages. If you wish, you\
    \ can then customize those regions to fit\nyour needs.\n\nSummary\nThe first part\
    \ of this chapter examined APEX form regions. A form\nregion contains two processes—an\
    \ initialization process and an ARP\nprocess—that allow your pages to access the\
    \ database without having to\nwrite PL/SQL code. APEX also provides built-in processes\
    \ for some common\ntasks, which work smoothly with the two form processes. Several\
    \ examples\ndemonstrated both the advantages and limitations that these processes\n\
    have over corresponding PL/SQL processes.\nThe second part of the chapter examined\
    \ some APEX page-creation\nwizards that create forms. These varied from the single-page\
    \ `Form` wizard, which\ncreates a page that is intended to be used in conjunction\
    \ with other\npages, to the `Report with Form` wizard, which pairs the `Form`\
    \ page with a\nsimple report page, to the sophisticated Master-Detail wizard,\
    \ which\nmatches two `Form` pages with a\npage containing three report regions.\
    \ In each case, the focus was to\nuncover the mystery of these wizards, so that\
    \ you feel empowered to\ncreate the pages you need, with or without them.\n\n\
    11. Interactive Grids\n\nReports are read-only. If you are looking at a report\
    \ and want to change\nits contents, then you must use a form. For example, consider\
    \ the `Report with Form 1`\npage of Figure [10-27](#335103_3_En_10_Chapter.xhtml#Fig27).\
    \ Suppose a user wants to\nmodify a row of the employee report. The following\
    \ steps occur:\n\n*   The user clicks the link of the desired row, which redirects\
    \ to\n    the `Report with Form 2` page (Figure [10-29](#335103_3_En_10_Chapter.xhtml#Fig29))\
    \ and places the selected\n    employee number into an item on that page.\n\n\
    *   The initialization process for the form then retrieves that\n    employee’s\
    \ information from the database and stores it in the\n    appropriate items.\n\
    \n*   The user then modifies the content of those items and clicks the\n    `Apply\
    \ Changes`\n    button to perform the update.\n\nThe peculiar thing about these\
    \ steps is that the second step doesn’t\nmake use of the employee report. Instead,\
    \ the initialization process\nre-retrieves the desired employee record from the\
    \ database, even though\nits values are right there in the report.\nThe concept\
    \ of an *interactive grid* addresses this situation\nby allowing users to update\
    \ report values directly. An interactive grid\nis essentially an “updatable report,”\
    \ combining the features of a report\nand a form in a single region. This chapter\
    \ examines the techniques\nneeded to build and customize interactive grids."
