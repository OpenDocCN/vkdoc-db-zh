    ## 本章小结


    本章重点介绍了 APEX 区域的设计与使用。您首先研究了创建区域的不同方法、指定其在页面上位置所需的属性以及其外观和感觉。然后，您探索了四种常见的区域类型：`静态内容`、`经典报表`、`图表`和`交互式报表`。您了解了如何使用每种类型的区域，以及如何利用其类型特定的属性来有效地进行格式化。


    静态内容区域主要用于显示 HTML 代码。您研究了与 APEX 相关的相对引用的细微差别——特别是如何引用存储在 APEX 服务器上的图像以及如何链接到当前应用程序的页面。这些相对引用依赖于某些
    APEX 内置变量的值，如`APP_IMAGES`和`APP_ID`。您了解了如何使用`替换字符串`来访问这些变量的值。


    经典报表区域显示 SQL 查询的输出。您了解了如何使用 APEX 属性来自定义区域的显示方式。其中，列的`HTML 表达式`属性尤为有用，它允许您通过将列值包装在
    HTML 表达式中来进行格式化。您还了解了如何通过修改报表的源查询来执行条件格式化。


    图表区域显示图表。您了解了如何使用 SQL 查询来指定图表内容，以及如何利用属性来配置图表的外观。


    交互式报表区域显示报表，类似于经典报表区域。交互式报表在两个方面有所不同。首先，其搜索栏使用户能够以交互方式自定义报表。其次，其链接列允许用户以单记录模式查看报表。您研究了这些功能提供的功能，并将其与使用经典报表和图表区域可能实现的功能进行了比较。您还了解了应用程序开发人员如何根据需要，通过设置交互式报表区域的属性来仅启用部分功能。


    ## 4. 导航


    Web 应用程序的用户应能轻松地在其页面间导航。您在使用 APEX 时已经遇到过三种导航功能：链接、面包屑和导航菜单。本章将详细研究这些功能，并向您展示在应用程序中使用它们的不同方式。


    ### 列表


    在通常的表述中，`列表`就是事物的集合。然而，在 APEX 中，列表是链接的集合。列表是一个有用的导航工具，原因显而易见：单击链接会带您进入新页面。


    以 APEX 列表的一个好例子来说，再次考虑 SQL Workshop 主屏幕，如图 1-3 所示。它的`创建对象`区域是一个列表，可快速访问各种对象创建向导页面。该列表为每种
    SQL 对象类型设有一个条目，其链接将带您进入该对象的创建向导。


    另一个例子是`员工演示`应用程序的主页，如图 3-17 所示。它的`参考`区域是一个包含链接的列表，这些链接将带您访问选定的网页。


    也许列表最显著的例子是导航菜单。它的每个条目都是一个链接，可带您进入应用程序的指定页面。


    APEX `列表管理器`让您可以查看、编辑和创建列表。要访问列表管理器，请从应用程序的主屏幕开始，单击页面顶部的大`共享组件`按钮。搜索`导航`部分并单击`列表`。您将被带到列表管理器的主屏幕，如图
    4-1 所示。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig1_HTML.jpg](img/335103_3_En_4_Fig1_HTML.jpg)

    图 4-1 列表管理器


    该图显示应用程序已有两个列表：`桌面导航栏`和`桌面导航菜单`。APEX 以特殊方式处理这些列表——它们的条目分别显示在导航栏（横跨页面顶部）和导航菜单（沿页面左侧向下）中。


    ### 查看列表详情


    单击列表的名称（或选择屏幕顶部的`列表详细信息`链接）将带您进入`列表详细信息`屏幕。图 4-2 显示了`桌面导航菜单`列表的此屏幕。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig2_HTML.jpg](img/335103_3_En_4_Fig2_HTML.jpg)

    图 4-2 桌面导航菜单列表的详细信息


    该屏幕显示了所选列表中每个条目的信息。最相关的值是`序列`、`名称`和`目标`。


    *   序列号决定条目在列表中出现的顺序。

    *   条目的名称指定其在列表中的显示方式。

    *   条目的目标是单击链接时调用的 URL。


    请注意图中每个目标 URL 都指向当前应用程序的一个页面，使用了第 2 章描述的语法。该语法的一个新方面是字符串`&DEBUG.`，它作为每个 URL 的第五个参数出现。URL
    的这一部分指定应用程序应继续使用当前的调试模式（这是一个次要问题，本书中忽略）。


    ### 编辑列表条目


    `列表详细信息`屏幕中每个条目的名称都是一个链接。单击某个条目的链接将带您进入`列表条目`屏幕，您可以在其中编辑该条目的值。图 4-3 显示了单击`区域实践`条目后出现的此屏幕的一部分。


    ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig3_HTML.jpg](img/335103_3_En_4_Fig3_HTML.jpg)

    图 4-3 区域实践页面的列表条目屏幕'
