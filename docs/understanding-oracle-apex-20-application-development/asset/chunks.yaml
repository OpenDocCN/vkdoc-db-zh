- fmt: '## Figure 3-36 Report-specific properties of a classic report region


    The `Number of Rows` property specifies how many rows of the report to display
    at a time. By default, the value is `15`, but I changed it to `5` in the `Formatted
    Report` region. The pagination `Type` property allows you to select the format
    of the pagination controls. The option shown in the figure was used for the `Formatted
    Report` region in Figure [3-24](#335103_3_En_3_Chapter.xhtml#Fig24). The best
    way to understand the other options is to try each one on your report to see its
    effect.


    ## Using the Source Query for Formatting


    Although the previous sections have focused on how to use APEX to format the rows
    of a source query, it is important to realize that you can get many of these same
    features by using a more precise source query. Here are some examples for the
    `Formatted Report` demo region.


    Instead of hiding a column, it might be more appropriate to simply not include
    it in the query. In particular, the `EmpNo` column serves no purpose in the formatted
    report and is better off being left out of its source query entirely. On the other
    hand, the columns `Job`, `SalColor`, `OffsiteImage`, and `HireYear` are needed
    for the formatting of other columns, so they must appear in the source query and
    therefore must be of type `Hidden Column`.


    Instead of changing a column’s heading in the property editor, you could change
    the column’s name in the source query. An example is the `EName` column, which
    was renamed as `Name`. The alternative is to use the `AS` keyword in the source
    query, like this:


    ```

    select EName as Name, ...

    from EMP

    ```


    If you don’t want the user to be able to change the sort order of the records
    interactively, it is easier to specify the sort order in the source query than
    to set the sortability property of each column individually.


    Instead of using a list of values to format the `DeptNo` column, you can modify
    the source query to be a join of the `EMP` and `DEPT` tables like this:


    ```

    select e.EName as Name, ..., d.DName, ...

    from EMP e join DEPT d

    on e.DeptNo = d.DeptNo

    ```


    In this case, it is hard to say which of these two approaches is better than the
    other. The list-of-values approach requires that APEX search the list of values
    for each row of the report, which is potentially more expensive than simply doing
    the join in one shot. On the other hand, the list-of-values approach is simpler
    and more directly conveys the intent of the designer.


    The rule of thumb is that the source query should specify *what* you want displayed,
    whereas the column properties should specify *how* you want them displayed. In
    some cases (such as hidden columns), this distinction is clear. In others (such
    as using a list of values), it is less so.


    ## Chart Regions


    A *chart* is a visual way to display data points. A data point consists of two
    values: the x coordinate, called the *label*, and the y coordinate, called the
    *value*. As an example, let’s build a page named `Charts`, which will be page
    4 of the application. This page contains two chart regions, which are shown in
    Figures [3-37](#335103_3_En_3_Chapter.xhtml#Fig37) and [3-38](#335103_3_En_3_Chapter.xhtml#Fig38).


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig38_HTML.png](images/335103_3_En_3_Chapter/335103_3_En_3_Fig38_HTML.png)


    Figure 3-38 The Employee Counts chart region


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig37_HTML.png](images/335103_3_En_3_Chapter/335103_3_En_3_Fig37_HTML.png)


    Figure 3-37 The Salary Info chart region


    The bar chart consists of ten data points, giving the minimum and maximum salaries
    of employees at each job. These points are organized into two *series* of five
    points each.


    The pie chart consists of five data points, one for each job. The label of each
    point is the name of the job, and the value is the number of employees having
    that job. The chart displays a section of the pie for each label in proportion
    to its value. For example, two of the fourteen employees are analysts, so the
    size of the `ANALYST` section is two-fourteenths the size of the pie.


    ## Creating a Chart Region


    To build this page, begin by creating a new blank page named `Charts`, and add
    to it two regions of type `Chart`. Name the first region `Salary Info` and the
    second region `Employee Counts`. Figure [3-39](#335103_3_En_3_Chapter.xhtml#Fig39)
    shows the resulting rendering tree for these regions.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig39_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig39_HTML.jpg)


    Figure 3-39 Rendering tree for the two chart regions


    From this figure, you can see that a chart has four kinds of properties: type-independent
    properties (denoted by the region name), chart-specific properties (denoted by
    `Attributes`), properties specific to each chart series (denoted by `Series`),
    and properties associated with the chart axes (denoted by `Axes`). By default,
    a chart is created with one series (named `New`), but you can rename the series
    and add others.


    Each series in Figure [3-39](#335103_3_En_3_Chapter.xhtml#Fig39) is flagged with
    a red error indicator to tell you that the chart needs further configuration.
    Details of this configuration are discussed next.


    ### Configuring a Chart


    Every chart needs a *source*, which is an expression that specifies the chart’s
    data points. A common source is an SQL query.


    If the chart has N series, then the query will have N+1 columns—one column contains
    the labels, and the other columns contain the values for each series. For example,
    the series for `Salary Info` has the following source query:


    ```

    select Job, min(Sal) as MinSal, max(Sal) as MaxSal

    from EMP

    group by Job

    order by MinSal

    ```


    You specify the source of a chart similar to how you would specify the source
    of a report. The chart’s `Source` section contains the three properties you need.
    Figure [3-40](#335103_3_En_3_Chapter.xhtml#Fig40) shows the values of these properties
    for the `Salary info` region.


    You should also make similar changes to your `Employee Counts` region, using the
    following source query:


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig40_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig40_HTML.jpg)


    Figure 3-40 Specifying the source of the Salary Info chart


    ```

    select Job, count(*) as EmpCount

    from EMP

    group by Job

    order by EmpCount desc

    ```


    ### Configuring a Chart Series


    After you have configured the source of a chart, you can configure each of its
    series. The relevant properties for a series are in its `Identification`, `Source`,
    and `Column Mapping` sections. Figure [3-41](#335103_3_En_3_Chapter.xhtml#Fig41)
    shows these sections for the series created for `Salary Info`.


    ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig41_HTML.jpg](images/335103_3_En_3_Chapter/335103_3_En_3_Fig41_HTML.jpg)


    Figure 3-41 Specifying a series for the Salary Info chart'
