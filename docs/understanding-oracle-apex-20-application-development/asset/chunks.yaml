    ## Summary

    This chapter examined some situations in which it was necessary to customize the
    table names and column names in an SQL query. You saw how to handle such situations
    by using dynamic SQL to construct and execute an SQL query string at runtime.
    In the case of customizing a report, you learned how to use a PL/SQL function
    to generate the source of the report. In the case of customizing a PL/SQL process,
    you learned how to use its `execute immediate` command. Dynamic SQL forces APEX
    to validate and process the query string at runtime; this additional overhead
    increases the time it takes to process the page. Moreover, in the next chapter,
    you shall see that the use of dynamic SQL can open a window for potential security
    breaches. Consequently, dynamic SQL should be used only of necessity. Such situations
    occur rarely, but it is good to know how to handle them when they do occur.


    # 13. Security

    When you created your `Employee Demo` application, you chose to restrict access
    to those who have an account on your workspace. This restriction is one of several
    APEX facilities for limiting access. These facilities can be divided into *authentication*,
    which identifies the legal users, and *authorization*, which specifies what information
    each legal user is allowed to see. This chapter will examine these facilities,
    as well as the related issue of how to protect the data from malicious users.


    ## Authentication

    Authentication is the ability to identify the current user of an application.
    APEX users identify themselves by providing a username and password. APEX supports
    several possible *authentication schemes*, which maintain the user/password list
    in different ways and at different organizational levels.


    Here are four common authentication schemes, in order from the most general to
    least general:


    *   *LDAP Directory scheme*: The user/password list is maintained within an organization''s
    LDAP directory. This scheme allows an organization to assign a single account
    to each person to be used for all systems that it maintains. The resulting ease
    of administration often makes LDAP the authentication scheme of choice for many
    organizations.

    *   *Database Accounts scheme*: The user/password list is maintained within the
    Oracle database system. This scheme allows a user to have a single account for
    multiple Oracle-based systems (including APEX applications). The downside of this
    scheme is that users will also have direct access to the Oracle database, which
    might not be desirable.

    *   *Application Express Accounts scheme*: This is the current authorization scheme
    for the `Employee Demo` application. The user/password list is maintained within
    the application''s workspace. The APEX administrator for a workspace manages the
    list for that workspace. If a person needs to access applications from different
    workspaces, the person needs an account for each workspace.

    *   *Custom scheme*: The owner of the application maintains the user/password
    list. A person will need a separate account for each such application. Custom
    schemes are often used by applications that allow people to create and manage
    their own accounts.


    In addition, there is the scheme in which the application does not perform any
    authentication. APEX considers this to be a *No Authentication* authentication
    scheme.


    ### Managing Authentication Schemes

    An APEX application can contain multiple authentication schemes, but only one
    scheme can be current at a time. To create a scheme, go to the home page for the
    application, click the `Shared Components` button, look for the `Security` section,
    and select `Authentication Schemes`.


    You are taken to a screen that lists the authentication schemes that have been
    created for your application. You should have one scheme listed, which is the
    scheme that you selected when you created the application; see Figure [13-1](#335103_3_En_13_Chapter.xhtml#Fig1).'
