- fmt: 'The `Regions` subtree is structured as follows: its child nodes denote page
    positions, and each position node has a child node for each region assigned to
    that position. Thus in Figure [2-13](#335103_3_En_2_Chapter.xhtml#Fig13), the
    two children of `Regions` correspond to the positions `Breadcrumb Bar` and `Content
    Body`. The position `Breadcrumb Bar` has a child that denotes the region `Employee
    Demo`, and the position `Content Body` has no regions, and thus no children.


    In addition, each region node has a child node named `Attributes`, and it may
    have other children, depending on its type. The purpose of these nodes will be
    covered in Chapter [3](#335103_3_En_3_Chapter.xhtml).


    If a node in the rendering tree has children, then it will have a collapse/expand
    arrow to its left. Clicking an arrow expands the node to show its children; clicking
    it again collapses the node to hide the children. You can also right-click a node
    to recursively collapse or expand the node’s subtree.


    ## Property Editor


    The property editor is the right panel of the page designer. Its role is to display
    the properties of whatever component is selected in the left panel.


    For example, go to the page designer for the home page and click the root component
    of the rendering tree, which is labeled `Page 1: Home`. The right panel will then
    display the page-level properties for that page. Figure [2-14](#335103_3_En_2_Chapter.xhtml#Fig14)
    displays the top portion of the property editor for the home page, showing the
    properties for the page’s `Identification` and `Appearance` sections. There are
    three properties worth mentioning at this point: `Name`, `Title`, and `Page Mode`.


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig14_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig14_HTML.jpg)

    *Figure 2-14: The property editor for the home page*


    The `Name` property identifies the page from within the app builder. You gave
    the page a name when you created it, and you can change the name here if you decide
    on a better one.


    The `Title` property identifies the page to a user. Browsers typically display
    the page title in a browser tab. The property currently has the value `Employee
    Demo`. For fun, change its value to `This is my home page`, rerun the page, and
    observe the change in the browser tab.


    The `Page Mode` property specifies how the page is to be used. There are three
    possible values: `Normal`, `Modal Dialog`, and `Non-Modal Dialog`.


    Most pages in a web application are normal. A browser displays a normal page by
    simply replacing whatever page was previously there. The history of a browser
    tab (or window) can be thought of as the sequence of accesses to normal pages.


    A non-modal dialog page opens in a new browser window. Such pages are typically
    used as auxiliary pages, peripheral to the primary flow of normal pages. You saw
    an example of a non-modal page when you examined the SQL command tool in Chapter
    [1](#335103_3_En_1_Chapter.xhtml). Its screen, shown in Figure [1-11](#335103_3_En_1_Chapter.xhtml#Fig11),
    is a normal page. But when you click its `Find Tables` button, the `Table Finder`
    window pops up, as shown in Figure [1-12](#335103_3_En_1_Chapter.xhtml#Fig12).
    The content of that window is a non-modal dialog page. You can keep it open for
    as long as you want, move it around on the screen however you like, and transfer
    control between it and the current normal page whenever you want.


    A modal dialog page corresponds to a dialog box. It opens on top of the current
    normal page and will not let the user do anything else until it is closed. The
    app builder’s `Create Page` wizard, shown in Figures [2-9](#335103_3_En_2_Chapter.xhtml#Fig9)
    through [2-11](#335103_3_En_2_Chapter.xhtml#Fig11), is composed of modal pages.
    Although you cannot tell from those figures, the wizard screens appear on top
    of the application’s home screen. All components of the underlying screen (such
    as buttons, links, and tabs) are disabled until the user exits the wizard.


    As a side note, not all wizards in APEX are modal. One example is the `Create
    Application` wizard, whose screens appeared in Figures [2-2](#335103_3_En_2_Chapter.xhtml#Fig2)
    and [2-3](#335103_3_En_2_Chapter.xhtml#Fig3). These screens are normal pages that
    masquerade as modal dialog boxes. You can tell this in two ways: they do not sit
    on top of a previous normal page, and you can escape from the wizard at any point
    by clicking a menu bar tab.


    It is good practice to try out the different page modes. Go to the page designer
    for the `Region Practice` page and set its page mode to `Modal Dialog`. You cannot
    run the page directly (because a modal page can be displayed only on top of another
    page), so instead run the home page and then click the `Region Practice` menu
    entry. You should observe the modal nature of the page, as shown in Figure [2-15](#335103_3_En_2_Chapter.xhtml#Fig15).
    Then re-edit the page in the page designer, set the page mode to `Non-Modal Dialog`,
    and repeat the experiment. Observe that the page still cannot be run directly.
    When you run the home page and click the `Region Practice` menu entry, the Region
    Practice page will open in a new independent browser window, as shown in Figure
    [2-16](#335103_3_En_2_Chapter.xhtml#Fig16). When you are done, set the page’s
    mode back to `Normal`.


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig16_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig16_HTML.jpg)

    *Figure 2-16: Region Practice as a non-modal dialog page*


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig15_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig15_HTML.jpg)

    *Figure 2-15: Region Practice as a modal dialog page*


    ## Accessing Built-in Help


    So far, you have seen two different ways to edit properties: the Application Properties
    screen of Figure [2-6](#335103_3_En_2_Chapter.xhtml#Fig6) (for editing the properties
    of an application) and the property editor in Figure [2-12](#335103_3_En_2_Chapter.xhtml#Fig12)
    (for editing the properties of a specified page). One interesting difference between
    these two interfaces is the way they provide built-in help. To read the help text
    for an application property, you click the question mark icon to its right. To
    read the help text for a page property, you use the `Help` section of the page
    designer.


    Recall that the top of the middle panel of the page designer has three tabs: `Layout`,
    `Search`, and `Help`. When you select `Help`, the middle panel will display help
    text for the currently selected property of the property editor. As you move from
    one property to the next in the property editor, the middle panel displays the
    help text for that property. For example, Figure [2-17](#335103_3_En_2_Chapter.xhtml#Fig17)
    shows the help text for the page’s `Name` property.


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig17_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig17_HTML.jpg)

    *Figure 2-17: Using built-in help*


    ## Summary


    In this chapter, you began your journey through the APEX app builder. You saw
    how to create an application, populate it with pages, and run them from a browser.
    You also saw how to use the APEX page designer to view and change the properties
    of a page.


    So far, the pages in your application are devoid of content. The remaining chapters
    of this book examine the different types of content you can add to your pages.
    Chapter [3](#335103_3_En_3_Chapter.xhtml) introduces regions.'
