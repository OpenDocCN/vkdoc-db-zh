- fmt: 'Suppose that you want the `Cancel` button to clear the session state of all
    items in the page. APEX calls this `clearing the cache` and provides the `Clear
    Cache` property in the link builder to do so. For example, in Figure [6-3](#335103_3_En_6_Chapter.xhtml#Fig3),
    typing `3,4,8` into the `Clear Cache` input box will clear the session state for
    all items on pages 3, 4, and 8. If you have also specified items in the `Set Items`
    section, APEX will assign values to those items after clearing the cache.


    Note that this way of modifying the session state is totally unlike the submit
    action, because it does not (and cannot) use values displayed in the browser.
    That is, a redirect from a button can set the session state value of an item to
    a constant or computed value, but it cannot set it to a browser value entered
    by the user.


    ## Referring to Session State Variables


    Now that you know how to set the value of a session state variable, you need to
    know how to get a page to access that value. There are two primary techniques.
    If you want to reference the variable from within SQL code, prepend a colon in
    front of the item name. Such a reference is called a `bind variable`. If you want
    to reference an item from within an HTML expression, prepend an ampersand in front
    of the item name and append a period at its end. This latter reference, which
    is called a `substitution string`, was introduced in Chapter [3](#335103_3_En_3_Chapter.xhtml).


    For example, consider the item `P8_EMPNO` on the `Item Sampler` page. To refer
    to it as a substitution string, write `&P8_EMPNO.`. To refer to it as a bind variable,
    write `:P8_EMPNO`.


    In this book, you have seen several uses for SQL queries, such as the source of
    a report or chart, the initial value of an item, and the definition of the values
    of a list-based item. You have also seen several uses for HTML expressions, such
    as the title of a page or region and the label of an item. The remaining sections
    of this chapter give examples of how you can greatly increase the functionality
    of your pages by using item references within these SQL queries and HTML expressions.


    Before building any of the pages in this chapter, you might want to go to the
    `List Details` page for the `DeskTop Navigation Menu` (as shown in Figure [4-21](#335103_3_En_4_Chapter.xhtml#Fig21)),
    and add a root entry named `Session State`. Then, each time you create a page,
    you can assign the parent of its navigation menu entry to be `Session State`.


    ## Customized Reports


    A `customized report` is a report whose contents are affected by the values of
    one or more items. A user enters values for some items on the page and clicks
    a `Submit` button. The page then displays a report based on those input values.
    In this section, you will build three customized report pages to illustrate this
    technique.


    ### Filter by Job and Department Page


    The first page, which is titled `Filter by Job and Department`, is page 9 of the
    demo and appears in Figure [6-5](#335103_3_En_6_Chapter.xhtml#Fig5). The idea
    is that a user chooses values for the `Job` and `Dept` items and clicks the `Submit`
    button. The report then shows the employees who have the selected job and are
    in the selected department. For example, Figure [6-5](#335103_3_En_6_Chapter.xhtml#Fig5)
    shows the clerks who work in the research department.


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig5_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig5_HTML.jpg)


    Figure 6-5 Filter by Job and Department page


    This page has two regions: `Select Values` and `Matching Employees`. The `Select
    Values` region is a static content region that contains two select lists, `P9_JOB`
    and `P9_DEPTNO`, both of whose values are defined by SQL queries. The list-of-values
    query for `P9_JOB` is as follows:


    ```sql

    select distinct Job as DisplayVal, Job as ResultVal

    from EMP

    order by DisplayVal

    ```


    The list-of-values query for `P9_DEPTNO` is as follows:


    ```sql

    select DName, DeptNo

    from DEPT

    order by DName

    ```


    The action of the button is `Submit` and its position is `Edit`.


    The `Matching Employees` region is a report region. For the report to display
    the `EMP` records having the selected job and department number, its source query
    needs to reference the value of the two items. The following query does the trick;
    note how it uses bind variable syntax to refer to the two items.


    ```sql

    select EmpNo, EName, Job, Sal, DeptNo

    from EMP

    where Job = :P9_JOB  and  DeptNo = :P9_DEPTNO

    order by EName

    ```


    You can improve the functionality of this region by allowing a user to select
    a `null` value for `P9_JOB` or `P9_DEPTNO`. The intent is that a `null` value
    for `P9_JOB` (or `P9_DEPTNO`) should mean that the query will not use that item
    for filtering. For example, if both items were `null`, the report would display
    all employees. To enable this functionality, revise the source query to explicitly
    test for `null` item values, as follows:


    ```sql

    select EmpNo, EName, Job, Sal, DeptNo

    from EMP

    where (:P9_JOB is null  or  Job = :P9_JOB)

    and   (:P9_DEPTNO is null  or  DeptNo = :P9_DEPTNO)

    order by EName

    ```


    I would like to point out that there was no particular need to use two regions
    on this page. In fact, it is easy to modify this page to use a single region.
    First, go to the `Layout` section for the item `P9_JOB` and change its `Region`
    property to `Matching Employees`. Then do the same thing for `P9_DEPTNO` and the
    `Submit` button. Finally, go to the `Appearance` section of `Matching Employees`
    and set its `Item Display Position` property to `Above Content`, so that the two
    items appear above the report. (You can also delete the `Select Values` region
    if you like.) Now run the page. You should discover that its behavior has not
    changed. That is, the decision to use one or two (or even three!) regions is based
    purely on aesthetics.


    ### Filter by Possible Department Page


    The second custom report page, titled `Filter by Possible Department`, is page
    10 of the demo and appears in Figure [6-6](#335103_3_En_6_Chapter.xhtml#Fig6).
    This page has a structure similar to the previous one. The top region is used
    for input—the user selects departments from a checkbox item and clicks the `Submit`
    button. The bottom region displays a report of the employees in the selected departments.
    For example, the `ACCOUNTING` and `RESEARCH` boxes are checked in Figure [6-6](#335103_3_En_6_Chapter.xhtml#Fig6),
    which means that the report lists those employees in either the accounting or
    research departments. If no boxes are checked, the report will display no records.


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig6_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig6_HTML.jpg)


    Figure 6-6 Filter by Possible Department page


    The `Select Some Departments` region is a static content region containing a checkbox
    item and a button. The checkbox item is named `P10_DEPTNO`, its template is `Hidden`,
    and its values are defined by the query


    ```sql

    select DName, DeptNo

    from DEPT

    order by DName

    ```


    Recall that the value of a multi-value item is a string containing the selected
    checkbox values separated by colons. For example, the value of `P10_DEPTNO` in
    Figure [6-5](#335103_3_En_6_Chapter.xhtml#Fig5) is `10:30`. If all four departments
    were checked, the value would be `10:40:20:30`. (The order of the selected values
    in the string is based on the sort order of the item’s list-of-values query, which
    in this case is by department name.)


    The `Matching Employees` region is a classic report. The task is to come up with
    a source query for the report that will filter the records based on this item
    value. One approach is to test each `EMP` record to see if its `DeptNo` value
    is a substring of `P10_DEPTNO`. This approach leads to the following query, which
    almost works:


    ```sql

    select EmpNo, EName, Job, Sal, DeptNo

    from EMP

    where InStr(:P10_DEPTNO,  DeptNo) > 0

    order by EName

    ```'
