  trans: "## 实现 `选择表` 区域\n\n实现 `选择表` 区域很简单。其复选框项名为 `P15_CHOICE`，包含图 6-20 所示的两个静态值。按钮执行的是\
    \ `提交` 操作。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig20_HTML.jpg](img/335103_3_En_6_Fig20_HTML.jpg)\n\
    图 6-20 `P15_CHOICE` 的静态值\n\n该页面还包含另外两个区域，均为 `经典报表` 类型。`员工信息` 区域具有以下数据源：\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig21_HTML.jpg](img/335103_3_En_6_Fig21_HTML.jpg)\n\
    图 6-21 `P15_CHOICE` 的数据源属性\n\n*   而 `部门信息` 区域具有以下数据源：\n    ```\n    select * from\
    \ DEPT\n    ```\n*   这两个区域都是条件显示的，具体取决于 `P15_CHOICE` 的值。`员工信息` 的显示条件是以下 SQL 表达式：\n\
    \    ```\n    InStr(:P15_CHOICE, 'Employee') > 0\n    ```\n*   `部门信息` 的显示条件是以下\
    \ SQL 表达式：\n    ```\n    InStr(:P15_CHOICE, 'Department') > 0\n    ```\n*   当按钮被点击时，APEX\
    \ 会创建一个包含已勾选复选框值的、以冒号分隔的字符串，并将其保存在会话状态中。然后当页面重新渲染时，APEX 会使用该会话状态值来初始化 `P15_CHOICE`，并评估每个条件表达式以确定要显示的区域。因此，必须如图\
    \ 6-21 所示，指定 `P15_CHOICE` 的 `数据源` 属性。\n    ```\n    select * from EMP\n    ```\n\
    \n## 区域显示选择器\n\n回顾第 2 章（以及图 2-6），`应用程序属性` 屏幕允许你管理应用程序范围内的属性，例如应用程序徽标和导航菜单位置。图\
    \ 6-22 显示了该屏幕的上半部分。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig22_HTML.jpg](img/335103_3_En_6_Fig22_HTML.jpg)\n\
    图 6-22 `应用程序属性` 屏幕的一部分\n\n请特别注意标题下方的选项卡栏，其选项卡标记为 `显示全部`、`名称`、`属性` 等。此栏就是一个 *区域显示选择器*。如果你点击\
    \ `显示全部` 选项卡，页面将显示其所有区域；如果你点击任何其他选项卡，页面将仅显示所选区域。\n\n你可以向应用程序添加一个区域显示选择器。让我们构建一个类似于图\
    \ 6-19 中 `显示表` 页面的页面，但使用区域显示选择器代替单选按钮组。这个名为 `选择区域` 的页面将是 `员工演示` 应用程序的第 16 页。图\
    \ 6-23 显示了选中 `部门信息` 选项卡时的页面。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig23_HTML.jpg](img/335103_3_En_6_Fig23_HTML.jpg)\n\
    图 6-23 使用区域显示选择器区域\n\n此页面由两个经典报表区域组成，分别对应 `EMP` 和 `DEPT` 表。其上方是一个 `区域显示选择器` 区域。要创建此显示选择器区域，只需在页面设计器中创建一个区域，然后将其类型更改为\
    \ `区域显示选择器`。与你迄今为止遇到的所有其他区域不同，该区域没有数据源；其唯一目的是为页面的区域显示一个选项卡栏。\n图 6-23 中的区域显示选择器被放置在\
    \ `内容正文` 位置，并设置了一个较小的序列号，以便它首先显示。其模板是 `按钮容器`，该模板格式化区域时不显示标题。\n默认情况下，区域显示选择器会为页面上的每个区域显示一个选项卡（前提是需要显示的区域多于一个）。如果你想排除某个区域，请使用其\
    \ `区域显示选择器` 属性，该属性位于 `高级` 部分。关闭此属性会将该区域从显示选择器中排除。\n\n## 小结\n\nAPEX 服务器维护着每个用户会话的数据；这些数据被称为\
    \ *会话状态*。在本章中，你了解了会话状态如何被修改，并探讨了应用程序开发者利用它的几种方式。\n会话状态为应用程序中的每个项都维护一个变量。这些变量的值会因为提交或重定向操作而被修改。\n\
    当页面被提交时，页面上所有项的值都将在会话状态中得到更新。当页面重定向到目标页面时，重定向操作可以为特定项赋值。特别是，当你配置按钮、报表链接或图表进行重定向时，属性编辑器将显示\
    \ `链接构建器` 向导，其中包含一个用于指定会话状态值的部分。\n会话状态的一个常见用途是使用户能够自定义报表。其思路是用户指定一些值，这些值会影响报表显示哪些记录。你看到了用户指定这些值的几种方式示例：\n\
    \n*   用户可以直接将值输入到页面上的项中。\n*   用户可以从主报表中选择一行。\n*   用户可以通过图表向下钻取来选择一个值。\n\n本章还探讨了会话状态的其他用途，例如\
    \ *级联列表*（其中为一个选择列表选择的值决定了另一个列表显示的值）和 *条件渲染*（其中一项的值决定了某个区域应该显示还是隐藏）。\n会话状态是 APEX\
    \ 中极其重要的一个方面。本书余下部分的大部分示例都将运用本章提到的技术。\n\n## 7. 进程\n\n正如你所见，仅使用项、报表和图表就可以编写功能强大的网页。但要实现更复杂的功能，你必须能够执行计算并与数据库进行更一般化的交互。*进程*\
    \ 这个概念正是为了解决这两个问题。\n本章将探讨一些需要使用进程的典型情况，并介绍 PL/SQL 的基础知识，以便你可以编写自己的代码来实现这些进程。本章还将探讨编写\
    \ PL/SQL 代码时可能遇到的陷阱，例如丢失更新的可能性。\n\n### 提交操作的阶段\n\n回想一下，页面设计器的左侧面板包含四个选项卡。到目前为止，本书主要关注的是\
    \ `渲染` 选项卡；现在是时候转向 `处理` 选项卡了。要进入此选项卡，请点击面板顶部从左数第三个圆形箭头图标。图 7-1 显示了该选项卡的界面。\n\n\
    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig1_HTML.jpg](img/335103_3_En_7_Fig1_HTML.jpg)\n\
    图 7-1 页面设计器的处理选项卡"
- fmt: '# APEX 执行点与进程创建


    图中显示了五个节点。前四个对应于提交操作期间可能发生的四种活动阶段；APEX 将这些阶段称为 **执行点**。这些阶段具有以下目的：


    *   在 **After Submit** 阶段，服务器计算额外的会话状态值，为主要处理活动做准备。这种计算偶尔有用，在第 [10](#335103_3_En_10_Chapter.xhtml)
    章中有简要讨论。


    *   在 **Validation** 阶段，服务器运行验证检查，以确保提交请求是使用适当的数据调用的。如果检测到问题，服务器将中止进一步处理。验证是第
    [8](#335103_3_En_8_Chapter.xhtml) 章的主题。


    *   在 **Processing** 阶段，服务器执行与提交请求相关联的进程。这些进程的定义和使用是本章及第 [10](#335103_3_En_10_Chapter.xhtml)
    章的主题。


    *   在 **After Processing** 阶段，服务器使用分支来决定将哪个页面发送到浏览器。分支是第 [9](#335103_3_En_9_Chapter.xhtml)
    章的主题。


    图 [7-1](#335103_3_En_7_Chapter.xhtml#Fig1) 中的第五个节点名为 `Ajax Callback`，它不是一个执行点；其目的是保存可以从
    JavaScript 函数调用的代码。由于 APEX 中 JavaScript 的使用超出了本书的范围，我将不再进一步提及此节点。


    ## 创建进程


    本节使用员工演示应用中的 `Item Sampler` 页面（第 8 页）快速介绍 APEX 进程。转到其页面编辑器并点击 `Processing` 选项卡；您应该看到图
    [7-1](#335103_3_En_7_Chapter.xhtml#Fig1) 的屏幕。要创建新进程，请右键单击 `Processing` 节点并选择 `Create
    Process`。应用构建器将创建一个标题为 `New` 的进程，并将其节点添加到 `Processing` 子树中，如图 [7-2](#335103_3_En_7_Chapter.xhtml#Fig2)
    所示。请注意，新节点的父节点是 `Processes` 节点，而后者又是 `Processing` 的子节点。`Processes` 节点的目的是将所有与
    `Processing` 执行点关联的进程组件分组。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig2_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig2_HTML.jpg)


    图 7-2 处理组件树


    单击新进程的节点并查看其属性。`Identification` 部分指定了进程的名称和类型。默认情况下，新创建的进程名称为 `New`，类型为 `PL/SQL
    Code`。图 [7-3](#335103_3_En_7_Chapter.xhtml#Fig3) 显示我将进程重命名为 `SampleProcess` 并保留了默认的类型值。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig3_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig3_HTML.jpg)


    图 7-3 指定进程的名称和类型


    单击“类型”属性的选择列表，查看可用的其他进程类型。这些类型便于特殊用途的操作，例如修改表、发送电子邮件或清除会话状态，是第 [10](#335103_3_En_10_Chapter.xhtml)
    章的主题。本章专门关注 `PL/SQL Code` 进程类型，它使您能够编写自己的通用操作。


    PL/SQL 进程的代码在其 `Source` 部分由 `PL/SQL Code` 属性指定。查看新进程的 `Source` 部分——您会看到它没有代码，这就是为什么图
    [7-2](#335103_3_En_7_Chapter.xhtml#Fig2) 中的节点被标记为有错误。让我们来修复它。


    PL/SQL 代码块最基本的形式是由关键字 `begin` 和 `end` 包围的一条或多条语句。例如，图 [7-4](#335103_3_En_7_Chapter.xhtml#Fig4)
    显示了包含最简单可能的 PL/SQL 块的 `Source` 部分。执行它会运行 `null` 语句，该语句（正如您可能想象的那样）绝对什么也不做。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig4_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig4_HTML.jpg)


    图 7-4 一个什么也不做的 PL/SQL 代码块


    注意分号。每条语句后必须跟一个分号，`end` 关键字后也必须跟一个分号。如果您忘记了这样做（您可能在某个时候会忘记），APEX 将显示错误消息。如有疑问，请检查是否遗漏了分号。


    将此代码添加到您的进程中将移除错误标志。当您运行页面时，每次单击 `Submit` 按钮都会执行该进程。当然，您无法知道这一点，因为代码什么也没做。本章的其余部分将探讨如何为进程添加有意义的内容。


    ## 使用 PL/SQL 访问数据库


    PL/SQL 进程通常用于访问数据库。SQL 数据修改命令可以用作 PL/SQL 语句，这意味着修改数据库的进程可以仅由那一条语句组成。例如，以下 PL/SQL
    块将部门 10 中每个人的工资增加 100。


    ```

    begin

    update EMP

    set Sal = Sal + 100

    where DeptNo = 10;

    end;

    ```


    对于一个更全面的示例，考虑图 [7-5](#335103_3_En_7_Chapter.xhtml#Fig5) 中显示的 `Employee Data Entry`
    页面，它是 `Employee Demo` 应用的第 17 页。此页面说明了 PL/SQL 修改数据库的能力。它包含用于删除指定员工、插入新员工和更新指定员工列的区域。这些区域上方是一个报表区域，显示员工表，因此您可以看到修改的效果。


    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig5_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig5_HTML.jpg)


    图 7-5 员工数据录入页面


    要创建此页面，首先创建一个空白页面和四个区域。`Employees` 区域是一个经典报表区域，其数据源是整个 `EMP` 表。其他三个区域是静态内容区域，位置如下：`Delete
    Employee` 开始新的一行，其余两个区域开始该行的新列。以下小节讨论这三个区域的内容。


    ### 删除员工区域


    `Delete Employee` 区域包含一个选择列表和一个按钮。选择列表名为 `P17_DELETE_EMPNO`，在选择时执行无操作，其值由以下查询定义：


    ```

    select EName, EmpNo

    from EMP

    order by EName

    ```


    按钮名为 `Delete`，其操作是 `Submit`。其想法是用户从列表中选择一名员工，然后单击 `Delete` 按钮提交页面；在提交期间，APEX 服务器将执行一个进程来删除该员工的记录。以下步骤说明了如何创建此进程并将其与按钮关联。


    首先，转到页面设计器的 `Processing` 选项卡，右键单击 `Processes` 节点，然后选择 `Create Process`。给新进程一个名称，例如
    `DeleteEmp`。


    其次，转到 `Source` 属性部分，在其 `PL/SQL Code` 区域中输入清单 [7-1](#335103_3_En_7_Chapter.xhtml#PC3)
    中所示的 PL/SQL 块。注意代码如何使用绑定变量语法来引用所选的员工编号。


    ```

    begin

    delete from EMP

    where EmpNo = :P17_DELETE_EMPNO;

    end;

    ```

    清单 7-1 DeleteEmp 进程的 PL/SQL 代码'
  raw: "The figure shows five nodes. The first four correspond to the four\nstages\
    \ of activity that can occur during a submit action; APEX calls\nthese stages\
    \ *execution\npoints* . These stages have the following purposes:\n\n*   During\
    \ the *After Submit* stage, the server computes\n    additional session state\
    \ values in preparation for the main processing\n    activity. Such computations\
    \ are occasionally useful and are briefly\n    discussed in Chapter [10](#335103_3_En_10_Chapter.xhtml).\n\
    \n*   During the *Validation* stage, the server runs validation\n    checks to\
    \ ensure that the submit request has been called with\n    appropriate data. The\
    \ server will abort further processing if it detects\n    a problem. Validation\
    \ is the subject of Chapter [8](#335103_3_En_8_Chapter.xhtml).\n\n*   During the\
    \ *Processing* stage, the server executes the\n    processes that have been associated\
    \ with the submit request. The\n    definition and use of these processes is the\
    \ subject of this chapter and\n    Chapter [10](#335103_3_En_10_Chapter.xhtml).\n\
    \n*   During the *After Processing* stage, the server uses\n    branches to decide\
    \ which page to send to the browser. Branching is the\n    subject of Chapter\
    \ [9](#335103_3_En_9_Chapter.xhtml).\n\nThe fifth node in Figure [7-1](#335103_3_En_7_Chapter.xhtml#Fig1),\
    \ named `Ajax Callback`, is not\nan execution point; instead, its purpose is to\
    \ hold code that can be\ncalled from JavaScript functions. As the use of\nJavaScript\
    \ in APEX is beyond the scope of this book, I shall not mention\nthis node further.\n\
    \nCreating a Process\n\nThis section provides a quick introduction to APEX processes,\
    \ using the\n`Item Sampler`\npage (page 8) of your employee demo application.\
    \ Go to its page editor\nand click the `Processing` tab; you\nshould see the screen\
    \ of Figure [7-1](#335103_3_En_7_Chapter.xhtml#Fig1). To create a new\nprocess,\
    \ right-click the `Processing` node and\nselect `Create Process`. The app builder\
    \ will create a process, titled `New`, and add a node\nfor it to the `Processing`\
    \ subtree as\nshown in Figure [7-2](#335103_3_En_7_Chapter.xhtml#Fig2). Note that\
    \ the\nparent of the new node is the node `Processes`, which in\nturn is a child\
    \ of `Processing`. The\npurpose of the `Processes` node is to\ngroup together\
    \ all process components associated with the `Processing` execution\npoint.\n\n\
    ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig2_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2\nThe Processing component tree\n\nClick the node for your new process\
    \ and look at its properties. The\n`Identification`\nsection specifies the name\
    \ and type of the process. By default, a newly\ncreated process has the name `New`\
    \ and the type\n`PL/SQL Code`.\nFigure [7-3](#335103_3_En_7_Chapter.xhtml#Fig3)\
    \ shows that I\nrenamed my process `SampleProcess` and\nkept the default type\
    \ value.\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig3_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3\nSpecifying the name and type of a process\n\nClick the select list\
    \ for the Type property and look at the other\nprocess types that are available.\
    \ These types facilitate special purpose\nactions, such as modifying a table,\
    \ sending email, or clearing the\nsession state, and are the subject of Chapter\
    \ [10](#335103_3_En_10_Chapter.xhtml). This chapter focuses exclusively\non the\
    \ `PL/SQL Code` process type, which enables you to write your own\ngeneral-purpose\
    \ actions.\nThe code for a PL/SQL process is specified in its `Source` section\
    \ by the\nproperty `PL/SQL Code`. Look at the `Source` section for\nyour new process—you\
    \ will see that it has no code, which is why the node\nin Figure [7-2](#335103_3_En_7_Chapter.xhtml#Fig2)\
    \ is flagged as\nhaving an error. Let’s fix that.\n\nIn its most basic form, a\
    \ PL/SQL code block consists of one or more\nstatements surrounded by the keywords\
    \ `begin` and `end`. For example,\nFigure [7-4](#335103_3_En_7_Chapter.xhtml#Fig4)\
    \ shows the `Source` section\ncontaining the simplest possible PL/SQL block. Performing\
    \ it executes\nthe `null`\nstatement, which (as you might imagine) does absolutely\
    \ nothing.\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig4_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4\nA PL/SQL code block to do nothing\n\nNote the semicolons. Each statement\
    \ must be followed by a semicolon,\nas must the `end`\nkeyword. If you forget\
    \ to do this (and you probably will at some point),\nAPEX will display an error\
    \ message. When in doubt, check for forgotten\nsemicolons.\nAdding this code to\
    \ your process will remove the error flag. When you run\nthe page, the process\
    \ will execute every time you click the `Submit` button. Of\ncourse, you have\
    \ no way of knowing this because the code does nothing.\nThe remainder of this\
    \ chapter examines how you can add meaningful\ncontent to your processes.\n\n\
    PL/SQL to Access the Database\n\nPL/SQL processes\nare commonly used to access\
    \ the database. An SQL data modification command\ncan be used as a PL/SQL statement,\
    \ which means that a process that\nmodifies the database can consist of just that\
    \ one statement. For\nexample, the following PL/SQL block increases the salary\
    \ of everyone in\ndepartment 10.\n\n```\nbegin\nupdate EMP\nset Sal = Sal + 100\n\
    where DeptNo = 10;\nend;\n```\n\nFor a more comprehensive example, consider the\
    \ `Employee Data Entry`\npage  shown in\nFigure [7-5](#335103_3_En_7_Chapter.xhtml#Fig5),\
    \ which is page\n17 of the `Employee Demo` application. This page illustrates\
    \ the ability of PL/SQL to\nmodify the database. It has regions to delete a specified\
    \ employee,\ninsert a new employee, and update the columns of a specified employee.\n\
    Above these regions is a report region that displays the employee table,\nso you\
    \ can see the effect of your modifications.\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig5_HTML.jpg](images/335103_3_En_7_Chapter/335103_3_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5\nThe Employee Data\nEntry page\n\nTo create this page, begin by creating\
    \ a blank page and four regions.\nThe `Employees`\nregion is a classic report\
    \ region whose source is the entire `EMP` table. The other\nthree regions are\
    \ static content regions, positioned as follows: `Delete Employee`\nbegins a new\
    \ row, and the remaining two regions begin a new column of\nthat row. The following\
    \ subsections discuss the content of these three\nregions.\n\nDelete Employee\
    \ Region\n\nThe `Delete Employee` region\n contains a select list and a button.\
    \ The select list is named\n`P17_DELETE_EMPNO`,\nwhich performs no action on selection\
    \ and whose values are defined by\nthe query:\n\n```\nselect EName, EmpNo\nfrom\
    \ EMP\norder by EName\n```\n\nThe button is named `Delete`, and its\naction is\
    \ `Submit`. The idea is\nthat a user chooses an employee from the list and clicks\
    \ the `Delete` button to\nsubmit the page; during the submit, the APEX server\
    \ will execute a\nprocess to delete that employee’s record. The following steps\
    \ explain\nhow to create this process and associate it with the button.\nFirst,\
    \ go to the `Processing` tab of the\npage designer, right-click the `Processes`\
    \ node, and\nchoose `Create Process`. Give the new process a name, such as `DeleteEmp`.\n\
    \nSecond, go to the `Source` property\nsection, and enter into its `PL/SQL Code`\
    \ area the\nPL/SQL block shown in Listing [7-1](#335103_3_En_7_Chapter.xhtml#PC3).\
    \ Note how the\ncode uses bind variable syntax to reference the chosen employee\
    \ number.\n\n```\nbegin\ndelete from EMP\nwhere EmpNo = :P17_DELETE_EMPNO;\nend;\n\
    Listing 7-1\nPL/SQL Code for the DeleteEmp Process\n```"
