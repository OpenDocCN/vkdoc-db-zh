- fmt: '# Security


    ## Page Access Protection Complication


    There is one additional complication: if you want page access protection, you
    will need to enable it for every page of your application because a URL for one
    page can set the items for another.


    For example, suppose that the `Employees by Department` page (page 12 of the demo,
    Figure [13-22](#335103_3_En_13_Chapter.xhtml#Fig22)) has been protected. Now consider
    the home page of the application, which is page 1. Because it does not have any
    items, you might assume that there is no need to require a checksum. But a clever
    user could issue this URL request:


    ```

    f?p=91392:1:98765::::P12_DEPTNO,P12_DNAME:10,ACCOUNTING

    ```


    This request sets the session state value for `P12_DEPTNO` and `P12_DNAME` before
    loading the home page. The user can then navigate normally from the home page
    to the `Employees by Department` page. If those items get their source from the
    current session state value (as is typical), the page will be rendered with the
    user-specified values. In other words, the user will have successfully performed
    item modification despite your good intentions.


    ## Summary


    This chapter focused on the question of how to ensure the security of an application.
    It discussed how to configure the application so that each user can do only what
    that user should be able to do—no more and no less. There are three aspects to
    the security issue: authentication, authorization, and establishing safeguards.


    Authentication ensures that an application knows the identity of its users. Users
    identify themselves by supplying a username and password; the application’s authentication
    scheme is responsible for matching the username/password against a master list.
    APEX supports several authentication schemes, which differ according to the part
    of the organization that manages the user/password list. You saw how to build
    a custom authentication scheme in which the application itself is responsible
    for the list.


    Authorization specifies what each authenticated user can do. The fundamental authorization
    mechanism is the authorization scheme. Each authorization scheme specifies a set
    of users. By associating an authorization scheme with a page (or page component),
    you restrict access to that page (or component) to the users specified by its
    authorization scheme.


    Safeguards are necessary to keep users from doing things they are not authorized
    to do. This chapter covered three well-known techniques: SQL injection, cross-site
    scripting, and URL modification. In SQL injection, a user submits an SQL code
    fragment as “data” in a way that causes the underlying process to execute the
    wrong query. In cross-site scripting, a user saves a malicious JavaScript code
    fragment as “data”; the malicious code then executes when another user attempts
    to display that data. With URL modification, a user sends a URL to the APEX server
    in a form that the server expects; however, the action requested by that URL is
    something that the user is not authorized to ask for. You examined ways to guard
    against each of these techniques. The bottom line is that if you are aware of
    the risks, it is relatively straightforward to ensure the complete security of
    your application.


