    from EMP

    where EmpNo = :P19_UPDATE_EMPNO;

    -- Then use hidden items to save a copy of the data.

    :P19_ORIGINAL_JOB  := :P19_UPDATE_JOB;

    :P19_ORIGINAL_SAL  := :P19_UPDATE_SAL;

