    \ this modification seems like no big deal. After all,\nwhy should I go out of\
    \ my way to type a value into the URL when I can\nuse the select list to do it\
    \ for me instead? The real point of this\ntechnique is that it works regardless\
    \ of how the item is implemented on\nthe page.\nIn Figure [13-23](#335103_3_En_13_Chapter.xhtml#Fig23),\
    \ `P30_EMPNO` is a select\nlist that displays all employees. But suppose instead\
    \ that it displays\nonly the employees in the sales department, because the application\n\
    developer wants users to be able to modify the records of only those\nemployees.\
    \ It doesn’t matter, because I can bypass the select list by\nentering any employee\
    \ number directly into the URL. It makes absolutely\nno difference what the type\
    \ of `P30_EMPNO` is or even\nif it is visible.\n\nItem modification can also be\
    \ applied to pages that use submit instead\nof redirect. That is, you can use\
    \ item modification to change the value\nof items that are passed via POST and\
    \ don’t even appear in the URL.\nConsider again the `Filter by Job and Department`\
    \ page of Figure [6-5](#335103_3_En_6_Chapter.xhtml#Fig5), which appears in Figure\
    \ [13-24](#335103_3_En_13_Chapter.xhtml#Fig24). Suppose\nthat you choose `Job`\
    \ and `Dept` values (say,\n`CLERK` and `RESEARCH`) from the\nselect lists and\
    \ then submit. The URL will be\n\n```\nf?p=91392:9:98765:::::\n```\n\nThat is,\
    \ the values for items `P9_JOB` and `P9_DEPTNO` do not\nappear in the URL because\
    \ the input is being sent via a POST request.\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig24_HTML.jpg](images/335103_3_En_13_Chapter/335103_3_En_13_Fig24_HTML.jpg)\n\
    \nFigure 13-24\nFilter by Job and Department page\n\nSuppose now that I modify\
    \ the URL by adding item names and values to the\nlast two arguments, as follows:\n\
    \n```\nf?p=91392:9:98765::::P9_JOB,P9_DEPTNO:MANAGER,10.\n```\n\nAPEX executes\
    \ the request as follows. It first performs the submit by\ncopying the item values\
    \ from the browser to the session state; it then\ncopies the specified values\
    \ from the URL to the two specified items and\nrenders the page. Thus, the values\
