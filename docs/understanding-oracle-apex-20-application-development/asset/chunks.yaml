    以下小节探讨了向导是如何实现这些页面的。


    ## 报表页面


    报表页面（图 10-27）有一个区域，我选择将其设置为经典报表。它的实现完全 straightforward。唯一有趣的特性是 `EMPNO` 列，其类型为
    `Link`（如第 3 章所述）。图 10-30 显示了它的 `Link Builder` 屏幕。它指定链接将重定向到第 32 页（表单页面），并将 `P32_EMPNO`
    项设置为所选行的员工编号。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig30_HTML.jpg](img/335103_3_En_10_Fig30_HTML.jpg)


    **图 10-30 EMPNO 列的 Link Builder 屏幕**


    `Create` 按钮的操作是重定向到表单页面并清除其会话状态，如图 10-31 的 `Link Builder` 屏幕所示。比较这两张图。它们都重定向到表单页面；它们的区别在于，行链接为
    `P32_EMPNO` 分配一个值，而 `Create` 按钮则清除 `P32_EMPNO`（以及页面上所有其他项）的值。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig31_HTML.png](img/335103_3_En_10_Fig31_HTML.png)


    **图 10-31 Create 按钮的 Link Builder 屏幕。**


    `P32_EMPNO` 的值因此决定了表单页面是处于插入模式还是更新/删除模式。在插入模式下，页面项的值都将为 `null`，因为 `Create` 按钮清除了它们。在删除模式下，页面项的值都将有一个值，这是由初始化过程的操作决定的。


    `Create` 按钮被渲染为蓝色，以表明它是一个“热”按钮。相关属性名为 `Hot`，位于按钮的 `Appearance` 部分，如图 5-29 所示。


    ## 表单页面


    表单页面（图 10-28 和 10-29）有一个区域，类型为 `Form`。图 10-32 显示了它的渲染树。与所有表单区域一样，它有一个初始化过程，以及每个源值对应的项。（为了节省空间，图中未显示这些项。）与标准表单区域的主要区别在于它还有四个按钮。`CANCEL`
    按钮重定向到报表页面。另外三个按钮被配置为具有 `Database Action` 值，分别为 `SQL INSERT action`、`SQL DELETE
    action` 和 `SQL UPDATE action`。


    ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig32_HTML.jpg](img/335103_3_En_10_Fig32_HTML.jpg)


    **图 10-32 表单页面的渲染树**


    回顾一下，`DELETE` 和 `SAVE` 按钮仅在页面处于更新/删除模式时才呈现，而 `CREATE` 按钮仅在插入模式下才呈现。表单使用 `P32_EMPNO`
    的值来决定条件渲染。如果它是 `null`，则渲染 `CREATE`；否则，渲染 `DELETE` 和 `SAVE`。


    表单页面还包含一个分支，在提交处理完成后重定向到报表页面。


    `CREATE` 和 `SAVE` 按钮的操作是 `Submit Page`。有趣的是，`DELETE` 按钮的操作是 `Redirect to URL`，其中
    URL 是：


    ```

    javascript:apex.confirm(htmldb_delete_message,''DELETE'');

    ```

