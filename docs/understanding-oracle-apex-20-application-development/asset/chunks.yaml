    \ PL/SQL process, you learned how to\nuse its `execute immediate` command.\nDynamic\
    \ SQL forces APEX to validate and process the query string at\nruntime; this additional\
    \ overhead increases the time it takes to process\nthe page. Moreover, in the\
    \ next chapter, you shall see that the use of\ndynamic SQL can open a window for\
    \ potential security breaches.\nConsequently, dynamic SQL should be used only\
    \ of necessity. Such\nsituations occur rarely, but it is good to know how to handle\
    \ them when\nthey do occur.\n\n13. Security\n\nWhen you created your `Employee\
    \ Demo`\napplication, you chose to restrict access to those who have an account\n\
    on your workspace. This restriction is one of several APEX facilities\nfor limiting\
    \ access. These facilities can be divided into\n*authentication*, which identifies\
    \ the legal users, and\n*authorization*, which specifies what information each\
    \ legal user\nis allowed to see. This chapter will examine these facilities, as\
    \ well\nas the related issue of how to protect the data from malicious\nusers.\n\
    \nAuthentication\nAuthentication\nis the ability to identify the current user\
    \ of an application. APEX\nusers identify themselves by providing a username and\
    \ password. APEX\nsupports several possible *authentication schemes*, which\n\
    maintain the user/password list in different ways and at different\norganizational\
    \ levels.\n\nHere are four common authentication schemes, in order from\nthe most\
    \ general to least general:\n\n*   *LDAP Directory scheme*: The user/password\
    \ list is\n    maintained within an organization’s LDAP directory. This scheme\
    \ allows\n    an organization to assign a single account to each person to be\
    \ used for\n    all systems that it maintains. The resulting ease of administration\n\
    \    often makes LDAP the authentication scheme of choice for many\n    organizations.\n\
    \n*   *Database Accounts scheme*: The user/password list is\n    maintained within\
    \ the Oracle database system. This scheme allows a user\n    to have a single\
    \ account for multiple Oracle-based systems (including\n    APEX applications).\
    \ The downside of this scheme is that users will also\n    have direct access\
    \ to the Oracle database, which might not be\n    desirable.\n\n*   *Application\
    \ Express Accounts scheme*: This is the current\n    authorization scheme for\
    \ the `Employee Demo`\n    application  . The user/password\n    list is maintained\
    \ within the application’s workspace. The APEX\n    administrator for a workspace\
    \ manages the list for that workspace. If a\n    person needs to access applications\
    \ from different workspaces, the\n    person needs an account for each workspace.\n\
    \n*   *Custom scheme*: The owner of the application maintains\n    the user/password\
    \ list. A person will need a separate account for each\n    such application.\
    \ Custom schemes are often used by applications that\n    allow people to create\
    \ and manage their own accounts.\n\nIn addition, there is the scheme in which\
    \ the application does not\nperform any authentication. APEX considers this to\
    \ be a *No\nAuthentication* authentication scheme.\n\nManaging Authentication\
    \ Schemes\nAn APEX application can contain multiple authentication schemes, but\n\
    only one scheme can be current at a time. To create a scheme, go to the\nhome\
    \ page for the application, click the `Shared Components`\nbutton, look for the\
    \ `Security` section, and\nselect `Authentication Schemes`.\n\nYou are taken to\
    \ a screen that lists the\nauthentication schemes that have been created for your\
    \ application. You\nshould have one scheme listed, which is the scheme that you\
    \ selected\nwhen you created the application; see Figure [13-1](#335103_3_En_13_Chapter.xhtml#Fig1)."
