    ## 按薪资范围筛选页面


    第三个定制的报表页面名为 `Filter by Salary Range`，在演示应用中是第 11 页，如图 6-7 所示。用户输入最低和最高薪资值，然后点击
    `Submit` 按钮。页面随后会为指定薪资范围内的员工定制一个按职位分类的员工图表。


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig7_HTML.jpg](img/335103_3_En_6_Fig7_HTML.jpg)


    图 6-7 “按薪资范围筛选”页面


    该页面包含一个类型为 `chart` 的区域。该区域的 `Item Display Position` 属性（在其 `Appearance` 部分中）值为
    `Above Contents`，这就是为什么两个项目项和 `Submit` 按钮位于图表上方。这两个名为 `P11_MINSAL` 和 `P11_MAXSAL`
    的项目项是数字字段，其 `Width` 值为 `5`。按钮的位置是 `Edit`。


    当然，此页面定制的是图表而非报表，但技术完全相同。回顾第 3 章，该图表的源查询将有两个输出列：一个标签（此处为 `Job` 的值）和一个系列值（此处为该职位的记录数）。要定制图表以仅考虑指定薪资范围内的员工，只需将该限制添加到查询的
    `where` 子句中。源查询变为：


    ```

    select Job, count(*) as EmpCount

    from EMP

    where (:P11_MINSAL is null  or  :P11_MINSAL = Sal)

    group by Job

    order by EmpCount

    ```


    与“按职位和部门筛选”页面一样，此查询确保 `null` 项目项值不会参与筛选。您也应该清楚，如果您决定将两个项目项和按钮移到单独的区域中，图表的源查询将是相同的。如果不清楚，可以尝试一下看看效果。


    ## 主从报表


    主从报表由两份报表组成。这两份报表是*链接*的，意味着明细报表的每一行在主报表中都有关联行。用户通过选择主报表中的一行来进行交互；明细报表则通过仅显示与所选主记录关联的明细行来响应。


    在本节中，您将构建一个名为 `Employees by Department` 的主从页面，它是 `Employee Demo` 应用程序的第 12 页。其主报表包含每个部门的一行。单击某个部门行会导致明细报表显示该部门的员工列表。图
    6-8 显示了单击会计部门链接后的页面。

    '
- fmt: '![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig8_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig8_HTML.jpg)


    Figure 6-8

    Employees by

    Department page


    Consider how to implement this page. The main issue is that the master report
    needs to let the detail report know which row was selected. The standard technique
    is to use a hidden item, whose value is the key of the selected row. Let’s name
    this item `P12_DEPTNO`. The master report will assign to `P12_DEPTNO` the `DeptNo`
    value of the selected row. The detail report will then use this value to customize
    itself.


    Implementing the customized detail report is straightforward and has the following
    source query:


    ```

    select EmpNo, EName, Job, Sal

    from EMP

    where DeptNo = :P12_DEPTNO

    order by EName

    ```


    The hard part is implementing the master report. You have three questions to answer:
    What is the source query of the report? How do you get its fourth column to display
    a link? And how do you assign the appropriate value to `P12_DEPTNO`?


    The master report has four columns. The first three are the department name, location,
    and employee count; the fourth contains the link to the detail table. Because
    the purpose of the link is to select a department number, it makes sense for the
    value of that column to be `DeptNo`. You therefore have the following source query
    (which is a right join so that the master report can display departments having
    no employees):


    ```

    select d.DName, d.Loc, count(e.EmpNo) as EmpCount, d.DeptNo

    from EMP e right join DEPT d

    on  e.DeptNo = d.DeptNo

    group by d.DeptNo, d.DName, d.Loc

    order by DName

    ```


    Chapter [3](#335103_3_En_3_Chapter.xhtml) described how to specify a link for
    a report column. To review, go to the page designer and click the `DEPTNO` column
    in the rendering tree. Set the type of the column to `Link`. Find the `Link` section
    in the property editor (refer to Figure [3-35](#335103_3_En_3_Chapter.xhtml#Fig35)
    in Chapter [3](#335103_3_En_3_Chapter.xhtml)) and set the link text to `Click
    for details`. Clicking the `Target` box will take you to the `Link Builder` page,
    in which you can set the target to page 12 (the current page).


    Wait a minute. A redirect to the current page doesn’t do anything, so what is
    the point of the link? Its real purpose is to change the session state. Recall
    that the `Link Builder` page also has a `Set Items` section, in which you can
    set the hidden item `P12_DEPTNO` to the selected department number. Recall from
    Chapter [3](#335103_3_En_3_Chapter.xhtml) that you refer to the value of column
    `X` in the current row by writing `#X#`. Thus, you should set `P12_DEPTNO` to
    `#DEPTNO#`, as shown in Figure [6-9](#335103_3_En_6_Chapter.xhtml#Fig9).


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig9_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig9_HTML.jpg)


    Figure 6-9

    Configuring the master report’s column link


    Finally, you have to actually create the item `P12_DEPTNO`. You know that it should
    be a hidden type, but where should it be placed? Because the item is hidden, it
    doesn’t really matter which region on the page it goes in. I chose to place it
    in the master region because that is where its value is assigned.


    ## Chart Drill Down


    The next page, `Employees by Job`, is page 13 of the `Employee Demo` application
    and is shown in Figure [6-10](#335103_3_En_6_Chapter.xhtml#Fig10). The page has
    two regions: a pie chart and an employee report. The chart gives the employee
    count per job. Clicking a pie segment customizes the report so that it displays
    the employees having that job. Figure [6-10](#335103_3_En_6_Chapter.xhtml#Fig10)
    shows the page after clicking the `MANAGER` slice.


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig10_HTML.jpg](images/335103_3_En_6_Chapter/335103_3_En_6_Fig10_HTML.jpg)


    Figure 6-10

    Employees by Job page


    This technique of clicking a chart to see more detail is called `chart drill down`.
    Here, clicking the chart selects a category value, which is then used to customize
    the report.'
