    ## 引言


    Application Express（也称为 APEX）是一个与 Oracle 数据库紧密耦合的 Web 应用程序。它有多种用途：你可以使用它的 `SQL
    Workshop` 工具来查询和修改数据库；你可以使用它的 `App Builder` 工具来创建你自己的、与数据库交互的 Web 应用程序；你还可以运行由你或他人创建的
    Web 应用程序。


    其中，应用程序构建器（App Builder）尤为有趣，因为它提供了一种简单且非传统的方式来构建网页。你无需直接为页面编写代码；相反，你可以从一组内置模板中选择。有用于整体页面的模板，也有用于你想在页面上放置的每种组件（例如报表、按钮等）的模板。每个模板都有一组属性，这些属性的值决定了每个组件在页面上的位置、外观和行为。你只需为你想要的组件选择模板并为其属性赋值，即可创建一个页面。


    APEX 应用程序构建器会将每个组件的属性值保存在其自己的数据库中。当浏览器请求你的应用程序的某个页面时，APEX 服务器会从其数据库中提取与该页面相关的属性值，构建与这些值对应的
    HTML 代码，并将该代码返回给浏览器。这个过程被称为 `渲染`（rendering）页面，而 APEX 被称为一个 `HTML 生成器`（HTML generator）。


    使用像 APEX 这样的 HTML 生成器的优势在于，你可以在没有任何 HTML（或 CSS、JavaScript、PHP）知识的情况下构建网页。此外，由于
    APEX 与 Oracle 数据库紧密耦合，它自动处理了数据库交互的复杂性。APEX 使得仅凭基本的 SQL 知识就能轻松创建美观、功能强大且能感知数据库的页面成为可能。


    ## 为何需要本书？


    使用 APEX 设计页面似乎很简单——你只需选择你想要的组件，然后为它们的属性分配合适的值即可。选择组件是直接的，但为属性赋值却并非如此。一个页面及其组件拥有众多属性，你必须了解这些属性的用途才能知道该赋什么值。这些属性的范围从必不可少的（例如报表的
    `source query`（源查询））到难以理解的（例如报表的 `static ID`（静态 ID））。有些属性（例如报表列的 `HTML expression`（HTML
    表达式））是挂钩，允许你在生成的网页中插入自定义的 HTML 或 JavaScript 代码。


    本书旨在温和地引导你穿越这片属性的宝库。为此，本书将开发一个演示 Web 应用程序，用以说明构建典型网页功能的各种 APEX 技术。该应用程序的页面起初很简单，然后逐渐增加其复杂程度。对于每一个页面，我会引入几个新属性，讨论它们的用途，并展示其效用。到本书结束时，你将深深沉浸在
    APEX 属性的世界里，从而有足够的自信去应对你自己的任何网站项目。如果你的项目需要比这里展示的更复杂的功能，你也应该能够自如地使用未涵盖的属性，或许通过查阅文档、查看
    Oracle 提供的众多预打包应用程序、浏览网络论坛，甚至自己摸索出来。


    在 APEX 中构建网页的另一种方法是依靠向导（wizards）。APEX 提供向导来生成常见组件，例如报表页面和数据录入表单。每个向导会询问你一系列问题（例如“页面的名称是什么？”“你想显示哪个表？”“页面是否应在导航菜单中有条目？”），然后利用你的回答生成具有相应属性的合适组件。其优势当然是你不需要了解任何关于属性的知识。缺点是向导往往会产生“一刀切”的页面，无论是在外观还是功能上。


    向导只能带你走这么远。如果你想要对页面的外观、感觉和行为进行任何形式的控制，你就需要参与到其属性中来。本书提供了你所需的指导。

    '
- fmt: '# APEX 应用开发指南


    ## 示例应用


    随着本书讲解 APEX 应用构建器的各个部分，它将指导你开发一个名为`Employee Demo`的小型应用。我鼓励你在阅读的同时构建自己的应用版本。你可以通过访问
    URL `apex.oracle.com/pls/apex/f?p=91392:1` 来运行我的应用版本。你也可以从 Apress 网站下载应用源代码并将其导入到你自己的工作区。


    与许多书中的示例应用不同，这个应用本身并没有做什么特别有趣的事情。相反，每个页面的构建都是为了说明一种或多种技术。有些页面具有相似的功能，旨在展示不同实现技术之间的权衡。


    `Employee Demo` 应用使用了每个 APEX 工作区都可用的 `DEPT` 和 `EMP` 数据库表。`DEPT` 表列出了公司的部门，而 `EMP`
    表列出了这些部门中的员工。它们的列如下所示：


    ```

    DEPT(DeptNo, DName, Loc)

    EMP (EmpNo, EName, Job, Mgr, HireDate, Sal, Comm, DeptNo)

    ```


    `DEPT` 表的键是 `DeptNo`，`EMP` 表的键是 `EmpNo`。每个表都有一个内置序列用于为这些键生成唯一值，以及一个关联的插入触发器。如果你向其中一个表插入记录时省略了键值，触发器将自动从相应的序列生成一个键值。


    `Employee Demo` 应用假设 `EMP` 表已被修改，增加了一个类型为 `char(1)` 的额外列 `OffSite`。如果员工在部门办公室工作，该列的值将为
    ''N''，如果员工在异地工作，则为 ''Y''。供你参考，以下是向 `EMP` 表添加此新列所需的 SQL 代码。


    ```

    alter table EMP

    add OffSite char(1);

    ```


    修改表结构后，你还需要为每个现有员工分配一个 `OffSite` 值。在我的 `Employee Demo` 应用中，员工 SCOTT、ALLEN、WARD
    和 TURNER 在异地工作；其他员工在办公室工作。第 1 章描述了如何在工作区中导入这些表（如果它们尚不存在），并讨论了进行这些修改所需的 APEX 工具。


    ## 必备背景知识


    本书适用于熟悉数据库系统并希望学习如何在 APEX 中编写具有一定复杂度的 Web 应用的人。编写 APEX 页面所使用的许多技术都涉及以下数据库和 Web
    设计语言与技术中的各种技能。


    ### SQL


    你需要掌握的最重要的技能是编写 SQL 查询的能力。APEX 中的所有数据访问都通过 SQL 语句执行，并且许多属性的值都以某种方式涉及 SQL。你对 SQL
    越熟练，你的报表和表单就可以越复杂。本书假设你对 SQL 已经比较熟悉。在大多数情况下，`Employee Demo` 应用使用的是相对简单的 SQL 语句，但偶尔我也会包含一些更复杂的语句（如外连接或嵌套查询）来说明可以实现什么。


    ### HTML


    本书还假设你对 HTML 有基本的了解——特别是如何使用 `<p>`、`<b>`、`<a>` 和 `<img>` 等标签来格式化文本和显示图像。我将忽略 JavaScript
    和 CSS 等高级特性。


    ### PL/SQL


    APEX 使用 PL/SQL 来指定行为。PL/SQL 是 Oracle 的编程语言；其主要特点是嵌入了 SQL 语法，使得编写与数据库交互的存储过程变得容易。你应该具备基本的编程知识，尽管事先了解
    PL/SQL 并非必需。本书在第 7 章介绍了 PL/SQL，并且只使用了该语言的基础特性。


    ### APEX


    最后，本书不要求你有使用 APEX 的经验。尽管不实际使用 APEX 也能跟着本书学习，但这样做似乎没什么意义。因此，你应该获得一个 APEX 账户。获得账户最简单也是最好的方法是访问
    `apex.oracle.com` 站点。由于我是从那里创建我的 `Employee Demo` 应用的，所以你应该会看到与本书中出现的相同的屏幕。


    ## 区分屏幕与页面


    APEX 是一个用于创建其他 Web 应用的 Web 应用。因此，APEX 有一个主页，并且它的各种工具都有自己的一组页面。在本书中，我描述了如何使用 APEX
    来构建应用的一个页面。这可能会导致一些奇怪的句子，例如“从应用的 APEX 主页单击运行按钮会运行它的主页”。为了避免这种混淆，我将所有 APEX 页面称为“屏幕”。前一句就变成了“从应用的
    APEX 主屏幕单击运行按钮会运行它的主页”，这样就不那么别扭，希望也不那么令人困惑了。


    ## 本版更新内容


    尽管 APEX 是一个成熟且功能丰富的应用，但它（并且一直是）一个进行中的作品。APEX 开发人员一直在不懈地改进系统，并且对 APEX 及其用户界面的功能进行重大修改也毫不迟疑。


    本书的前一版写于 2015 年，当时 APEX 5 刚刚推出。从那时起，用户界面经历了一系列重大变化。事实上，当我最近重读我的 APEX 5 书籍时，我沮丧地发现它的截图和说明常常不准确，有时甚至毫无意义。许多
    APEX 属性现在位于不同的位置，有时名称也不同。新的组件类型（特别是*表单*和*交互式网格*）取代了旧的组件，并且具有不同的功能。显然，是时候修订这本书了。


    本书最重要的新增内容是关于表单和交互式网格的两个新章节。在 APEX 5 中，“表单”是一个静态内容区域，包含一套复杂配置的项和内置流程。现在 APEX 有一个专用的
    `Form` 区域，它会自动为你生成预配置的项和流程，并提供一组易于理解的属性来管理它们。


    交互式网格区域取代了 APEX 5 中的“表格窗体”区域。它们提供了与表格窗体相同的基本功能——即就地更新报表值的能力——但交互式网格更易于使用、功能更强大，并且具有更清晰的语义。事实上，本书的交互式网格章节（第
    11 章）比旧的表格窗体章节短得多，因为交互式网格所需的解释要少得多。


    ## 致谢


    首先，我要感谢 APEX 用户社区。许多人定期、慷慨地通过撰写博客、创建 APEX 演示站点以及在 APEX 论坛上回答各种问题来分享他们的 APEX 知识。我从他们那里学到了很多。这本书是我尝试回馈的一种方式。


    我还要感谢我的 Apress 编辑，Jonathan Gennick 和 Jill Balzano。Jonathan 说服我写这本书，然后又修订它。他在每一步都提供了指导和鼓励。Jill
    总是给予支持，并抚平了道路上不可避免的坎坷。


    最重要的是，我要感谢我的妻子 Amy。她陪伴我经历了所有三个版本，倾听我的想法，帮助我解决技术问题，研究 APEX 示例，并指出书中需要澄清的段落。她是一位不知疲倦的校对者。没有她，我也可以写这本书，但质量绝不会如此出色。谢谢。


    **关于作者** **关于技术审阅者**'
  raw: '## Demo Application


    As this book explains each part of the APEX app builder, it guides you through
    the development of a small application, named `Employee Demo`. I encourage you
    to build your own version of the application as you follow along. You can run
    my version of the application by going to the URL `apex.oracle.com/pls/apex/f?p=91392:1`.
    You can also download the source code for the application from the Apress website
    and import it into your own workspace.


    Unlike demo applications in many books, this application does not “do” anything
    particularly interesting. Instead, each page is constructed to illustrate one
    or more techniques. Some of the pages have similar functionality, to illustrate
    the trade-offs between different implementation techniques.


    The `Employee Demo` application uses the `DEPT` and `EMP` database tables available
    to every APEX workspace. The `DEPT` table lists the departments of a company,
    and the EMP table lists the employees in those departments. Their columns are
    as follows:


    ```

    DEPT(DeptNo, DName, Loc)

    EMP (EmpNo, EName, Job, Mgr, HireDate, Sal, Comm, DeptNo)

    ```


    The key of `DEPT` is `DeptNo`, and the key of `EMP` is `EmpNo`. Each table has
    a built-in sequence for generating unique values for these keys, as well as an
    associated insertion trigger. If you insert a record into one of the tables and
    omit a value for the key, the trigger will automatically generate a key value
    from the appropriate sequence.


    The `Employee Demo` application assumes that the `EMP` table has been modified
    to have an additional column `OffSite` of type `char(1)`. An employee will have
    the value ‘N’ for this column if the employee works in the department office and
    ‘Y’ if the employee works offsite. For your reference, here is the SQL code you
    will need to add this new column to your `EMP` table.


    ```

    alter table EMP

    add OffSite char(1);

    ```


    After altering the table, you will also need to assign an `Offsite` value for
    each existing employee. In my `Employee Demo` application, the employees SCOTT,
    ALLEN, WARD, and TURNER work offsite; the others work onsite. Chapter [1](#335103_3_En_1_Chapter.xhtml)
    describes how to import the tables if they are not already in your workspace and
    discusses the APEX tools needed to make these modifications to them.


    ## Required Background


    This book is for people who are comfortable using a database system and want to
    learn how to write nontrivial web applications in APEX. Many of the techniques
    used to write APEX pages involve various skills in the following database and
    web design languages and technologies.


    ### SQL


    The most important skill you need is the ability to write SQL queries. All data
    access in APEX is performed via SQL statements, and the value of many properties
    involves SQL in some way. The more fluent you are in SQL, the more sophisticated
    your reports and forms can be. This book assumes that you are comfortable with
    SQL. For the most part, the `Employee Demo` application uses relatively simple
    SQL statements, but occasionally I include something more complex (such as an
    outer join or nested query) to illustrate what is possible.


    ### HTML


    This book also assumes that you have a basic familiarity with HTML—in particular,
    how tags such as `<p>`, `<b>`, `<a>`, and `<img>` can be used to format text and
    display images. I will ignore advanced features such as JavaScript and CSS.


    ### PL/SQL


    APEX uses PL/SQL to specify behavior. PL/SQL is Oracle’s programming language;
    its main feature is an embedded SQL syntax that makes it easy to write procedures
    that interact with the database You should have a rudimentary understanding of
    programming, although prior knowledge of PL/SQL is not necessary. This book introduces
    PL/SQL in Chapter [7](#335103_3_En_7_Chapter.xhtml) and uses only basic features
    of the language.


    ### APEX


    Finally, this book does not require you to have prior experience with APEX. Although
    it is possible to follow the book without actually using APEX, doing so seems
    rather pointless. So you should get an APEX account. The easiest and best way
    to get an account is by going to the `apex.oracle.com` site. Because I created
    my `Employee Demo` application from there, you should see the same screens that
    appear in this book.


    ## Distinguishing Screens from Pages


    APEX is a web application that is used to create other web applications. Thus,
    APEX has a home page, and its various tools have their own sets of pages. Throughout
    this book, I describe how to use APEX to build a page of an application. This
    can lead to some strange sentences, such as “Clicking the Run button from the
    application’s APEX home page runs its home page.” To avoid such confusion, I denote
    all APEX pages as “screens.” The previous sentence becomes “Clicking the Run button
    from the application’s home screen runs its home page,” which is less awkward
    and hopefully less confusing.


    ## New to This Edition


    Although APEX is a polished and highly functional application, it is (and always
    has been) a work in progress. The APEX developers have been relentless in their
    quest to improve the system and have not been shy about making large changes to
    the functionality of APEX and its user interface.


    The previous edition of this book was written in 2015, just as APEX 5 was introduced.
    Since then, the user interface has undergone a series of significant changes.
    In fact, when I recently read through my APEX 5 book, I was dismayed to discover
    that its screenshots and instructions were often inaccurate and occasionally meaningless.
    Many APEX properties are now in different locations, sometimes with different
    names. New component types (in particular *forms* and *interactive grids*) have
    replaced old ones and have different functionality. Clearly it was time to revise
    the book.


    The most significant additions to this book are the two new chapters on Forms
    and Interactive Grids. In APEX 5, a “form” was a static content region containing
    an intricately configured set of items and built-in processes. Now APEX has a
    dedicated `Form` region, which automatically generates the preconfigured items
    and processes for you and provides an easily understood set of properties for
    managing them.


    Interactive grid regions have replaced the “tabular form” regions of APEX 5\.
    They provide the same basic functionality as tabular forms—namely, the ability
    to update a report’s values in place—but interactive grids are easier to use,
    more powerful, and have a cleaner semantics. In fact, the Interactive Grids chapter
    (Chapter [11](#335103_3_En_11_Chapter.xhtml)) of this book is much shorter than
    the older Tabular Forms chapter because interactive grids require much less explanation.


    Acknowledgments


    First and foremost, I would like to thank the APEX user community. Numerous people
    routinely and generously share their APEX knowledge by writing blogs, creating
    demonstration APEX sites, and answering all kinds of questions on the APEX web
    forums. I learned much from them. This book is my attempt to give something back.


    I also want to thank my Apress editors, Jonathan Gennick and Jill Balzano. Jonathan
    convinced me to write the book, and then to revise it. He provided guidance and
    encouragement every step of the way. Jill was always supportive and smoothed out
    the inevitable bumps in the road.


    Most importantly, I want to acknowledge my wife Amy. She has accompanied me through
    all three editions, listening to my ideas, helping me resolve technical issues,
    working through the APEX examples, and pointing out passages in the book that
    needed clarification. She is a relentless proofreader. I could have written the
    book without her, but it would not have been anywhere near as good. Thanks.


    About the Author About the Technical Reviewer'
  trans: '# APEX 应用开发指南


    ## 示例应用


    随着本书讲解 APEX 应用构建器的各个部分，它将指导你开发一个名为`Employee Demo`的小型应用。我鼓励你在阅读的同时构建自己的应用版本。你可以通过访问
    URL `apex.oracle.com/pls/apex/f?p=91392:1` 来运行我的应用版本。你也可以从 Apress 网站下载应用源代码并将其导入到你自己的工作区。


    与许多书中的示例应用不同，这个应用本身并没有做什么特别有趣的事情。相反，每个页面的构建都是为了说明一种或多种技术。有些页面具有相似的功能，旨在展示不同实现技术之间的权衡。


    `Employee Demo` 应用使用了每个 APEX 工作区都可用的 `DEPT` 和 `EMP` 数据库表。`DEPT` 表列出了公司的部门，而 `EMP`
    表列出了这些部门中的员工。它们的列如下所示：


    ```

    DEPT(DeptNo, DName, Loc)

    EMP (EmpNo, EName, Job, Mgr, HireDate, Sal, Comm, DeptNo)

    ```


    `DEPT` 表的键是 `DeptNo`，`EMP` 表的键是 `EmpNo`。每个表都有一个内置序列用于为这些键生成唯一值，以及一个关联的插入触发器。如果你向其中一个表插入记录时省略了键值，触发器将自动从相应的序列生成一个键值。


    `Employee Demo` 应用假设 `EMP` 表已被修改，增加了一个类型为 `char(1)` 的额外列 `OffSite`。如果员工在部门办公室工作，该列的值将为
    ''N''，如果员工在异地工作，则为 ''Y''。供你参考，以下是向 `EMP` 表添加此新列所需的 SQL 代码。


    ```

    alter table EMP

    add OffSite char(1);

    ```


    修改表结构后，你还需要为每个现有员工分配一个 `OffSite` 值。在我的 `Employee Demo` 应用中，员工 SCOTT、ALLEN、WARD
    和 TURNER 在异地工作；其他员工在办公室工作。第 1 章描述了如何在工作区中导入这些表（如果它们尚不存在），并讨论了进行这些修改所需的 APEX 工具。


    ## 必备背景知识


    本书适用于熟悉数据库系统并希望学习如何在 APEX 中编写具有一定复杂度的 Web 应用的人。编写 APEX 页面所使用的许多技术都涉及以下数据库和 Web
    设计语言与技术中的各种技能。


    ### SQL


    你需要掌握的最重要的技能是编写 SQL 查询的能力。APEX 中的所有数据访问都通过 SQL 语句执行，并且许多属性的值都以某种方式涉及 SQL。你对 SQL
    越熟练，你的报表和表单就可以越复杂。本书假设你对 SQL 已经比较熟悉。在大多数情况下，`Employee Demo` 应用使用的是相对简单的 SQL 语句，但偶尔我也会包含一些更复杂的语句（如外连接或嵌套查询）来说明可以实现什么。


    ### HTML


    本书还假设你对 HTML 有基本的了解——特别是如何使用 `<p>`、`<b>`、`<a>` 和 `<img>` 等标签来格式化文本和显示图像。我将忽略 JavaScript
    和 CSS 等高级特性。


    ### PL/SQL


    APEX 使用 PL/SQL 来指定行为。PL/SQL 是 Oracle 的编程语言；其主要特点是嵌入了 SQL 语法，使得编写与数据库交互的存储过程变得容易。你应该具备基本的编程知识，尽管事先了解
    PL/SQL 并非必需。本书在第 7 章介绍了 PL/SQL，并且只使用了该语言的基础特性。


    ### APEX


    最后，本书不要求你有使用 APEX 的经验。尽管不实际使用 APEX 也能跟着本书学习，但这样做似乎没什么意义。因此，你应该获得一个 APEX 账户。获得账户最简单也是最好的方法是访问
    `apex.oracle.com` 站点。由于我是从那里创建我的 `Employee Demo` 应用的，所以你应该会看到与本书中出现的相同的屏幕。


    ## 区分屏幕与页面


    APEX 是一个用于创建其他 Web 应用的 Web 应用。因此，APEX 有一个主页，并且它的各种工具都有自己的一组页面。在本书中，我描述了如何使用 APEX
    来构建应用的一个页面。这可能会导致一些奇怪的句子，例如“从应用的 APEX 主页单击运行按钮会运行它的主页”。为了避免这种混淆，我将所有 APEX 页面称为“屏幕”。前一句就变成了“从应用的
    APEX 主屏幕单击运行按钮会运行它的主页”，这样就不那么别扭，希望也不那么令人困惑了。


    ## 本版更新内容


    尽管 APEX 是一个成熟且功能丰富的应用，但它（并且一直是）一个进行中的作品。APEX 开发人员一直在不懈地改进系统，并且对 APEX 及其用户界面的功能进行重大修改也毫不迟疑。


    本书的前一版写于 2015 年，当时 APEX 5 刚刚推出。从那时起，用户界面经历了一系列重大变化。事实上，当我最近重读我的 APEX 5 书籍时，我沮丧地发现它的截图和说明常常不准确，有时甚至毫无意义。许多
    APEX 属性现在位于不同的位置，有时名称也不同。新的组件类型（特别是*表单*和*交互式网格*）取代了旧的组件，并且具有不同的功能。显然，是时候修订这本书了。


    本书最重要的新增内容是关于表单和交互式网格的两个新章节。在 APEX 5 中，“表单”是一个静态内容区域，包含一套复杂配置的项和内置流程。现在 APEX 有一个专用的
    `Form` 区域，它会自动为你生成预配置的项和流程，并提供一组易于理解的属性来管理它们。


    交互式网格区域取代了 APEX 5 中的“表格窗体”区域。它们提供了与表格窗体相同的基本功能——即就地更新报表值的能力——但交互式网格更易于使用、功能更强大，并且具有更清晰的语义。事实上，本书的交互式网格章节（第
    11 章）比旧的表格窗体章节短得多，因为交互式网格所需的解释要少得多。


    ## 致谢


    首先，我要感谢 APEX 用户社区。许多人定期、慷慨地通过撰写博客、创建 APEX 演示站点以及在 APEX 论坛上回答各种问题来分享他们的 APEX 知识。我从他们那里学到了很多。这本书是我尝试回馈的一种方式。


    我还要感谢我的 Apress 编辑，Jonathan Gennick 和 Jill Balzano。Jonathan 说服我写这本书，然后又修订它。他在每一步都提供了指导和鼓励。Jill
    总是给予支持，并抚平了道路上不可避免的坎坷。


    最重要的是，我要感谢我的妻子 Amy。她陪伴我经历了所有三个版本，倾听我的想法，帮助我解决技术问题，研究 APEX 示例，并指出书中需要澄清的段落。她是一位不知疲倦的校对者。没有她，我也可以写这本书，但质量绝不会如此出色。谢谢。


    **关于作者** **关于技术审阅者**'
- fmt: '# 1. The SQL Workshop


    Congratulations! You are on the brink of learning how to build APEX web applications.
    But before you can begin, you need an APEX account. There are several ways to
    obtain an account: you can register for a free account through the `apex.oracle.com`
    website, you might be given an account to an APEX server at your job, or you can
    even install an APEX server yourself and create your own account to it.


    No matter the circumstance, your APEX server will have an associated URL. Invoking
    the URL from your browser takes you to a login screen. Figure [1-1](#335103_3_En_1_Chapter.xhtml#Fig1)
    shows the login screen used by the `apex.oracle.com` server.


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig1_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig1_HTML.jpg)


    Figure 1-1


    APEX login screen


    Entering your credentials then takes you to the APEX home screen, the top of which
    is shown in Figure [1-2](#335103_3_En_1_Chapter.xhtml#Fig2).


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig2_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig2_HTML.jpg)


    Figure 1-2


    APEX home screen


    The APEX development environment contains several tools. Of primary importance
    is the `App Builder` tool, which will be covered in depth starting in Chapter
    [2](#335103_3_En_2_Chapter.xhtml). We begin here by looking at two tools in the
    APEX `SQL Workshop`: the `object browser` and the `SQL command` tool. These tools
    allow you to directly access the database—the `object browser` lets you manipulate
    a graphical user interface, and the `SQL command` tool lets you execute SQL statements
    and PL/SQL code blocks.


    Although the `SQL Workshop` tools are not essential for application development,
    using them can make your life much easier. Here are five ways that they can help:


    *   The `object browser` reminds you of the database objects and their structures.
    For example, a typical application involves several tables, each of which can
    have numerous columns. It is often impractical to memorize the details of each
    one. When building a page that references a table, you can use these tools to
    help refresh your memory.

    *   To modify the structure of the database. For example, these tools are the
    easiest way to execute the `alter table` command given in the introduction.

    *   To modify the contents of the database. For example, you might want to insert
    or modify records to test the behavior of a page with new or altered data, or
    to reset the database after testing the page.

    *   To examine the contents of the database tables. After running a page, you
    can verify that the database updated correctly.

    *   To debug an SQL statement or PL/SQL block. By executing code in the `SQL commands`
    tool first, you can verify that it produces the expected result before you actually
    assign it as the value of some property on a page.


    To get to the `SQL Workshop`, click the `SQL Workshop` button on the APEX home
    screen. Figure [1-3](#335103_3_En_1_Chapter.xhtml#Fig3) shows the resulting screen.
    From this screen, you can click the `Object Browser` or `SQL Commands` button
    to get to the desired tool.


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig3_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig3_HTML.jpg)


    Figure 1-3


    SQL Workshop home screen


    ## Downloading Tables


    This book makes frequent use of the sample tables `EMP` and `DEPT`. If your workspace
    does not contain these tables, here is how to load them. Click the arrow of the
    `SQL Workshop` tab, select `Utilities`, and then `Sample Datasets`; see Figure
    [1-4](#335103_3_En_1_Chapter.xhtml#Fig4). Figure [1-5](#335103_3_En_1_Chapter.xhtml#Fig5)
    shows the resulting screen, which lists the available tables. Click the `Install`
    button for the `EMP/DEPT` dataset, and follow directions.


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig5_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig5_HTML.jpg)


    Figure 1-5


    The Sample Datasets screen


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig4_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Getting to the sample datasets


    To verify that the tables have been installed, return to the `SQL Workshop` home
    screen (as shown in Figure [1-3](#335103_3_En_1_Chapter.xhtml#Fig3)). Entries
    for `EMP` and `DEPT` should now appear in the `Recently Created Tables` region.


    ## Object Browser


    The `object browser` lets you interact with your tables quickly and easily. From
    it, you can examine the description of each table—that is, the types and properties
    of its columns and its constraints, indexes, and triggers—as well as its contents.
    You can also use the `object browser` to make simple changes to the description
    or contents of a table.


    The home screen for the `object browser` displays a list of table names along
    its left side. Clicking a table name displays information about that table. For
    example, the screen for the `EMP` table appears in Figure [1-6](#335103_3_En_1_Chapter.xhtml#Fig6).


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig6_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Viewing the EMP table from the object browser


    The main portion of the screen displays information about each column of the table.
    Above this information is a series of buttons that let you modify it. As an example,
    recall that the introduction discussed the need for an `Offsite` column; let’s
    add that column to the table now. Clicking the `Add Column` button displays a
    form for you to fill in the details of the new column. Figure [1-7](#335103_3_En_1_Chapter.xhtml#Fig7)
    shows how I filled in this form.


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig7_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Adding a new column to EMP


    Clicking the `Next` button takes you to a confirmation screen; from there, click
    `Finish` to complete the action. The `EMP` screen should now display the new column.


    Returning to Figure [1-6](#335103_3_En_1_Chapter.xhtml#Fig6), observe the tab
    bar above the row of modification buttons. The `Table` tab is currently selected,
    which displays column information for the table. The other tabs show you other
    kinds of information and provide appropriate ways to view and modify that information.
    For example, clicking the `Indexes` tab displays the current indexes for the table.
    Figure [1-8](#335103_3_En_1_Chapter.xhtml#Fig8) shows the three indexes for `EMP`.
    Clicking the name of an index displays additional detail about that index.


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig8_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Browsing the indexes of EMP


    Finally, consider the `Data` tab, which displays the contents of the table. The
    top of this table appears in Figure [1-9](#335103_3_En_1_Chapter.xhtml#Fig9).
    Note that there is a button to insert a new row and an edit link at the beginning
    of each row.


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig9_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Viewing the contents of EMP


    Clicking a row’s edit link displays a form for modifying it. Figure [1-10](#335103_3_En_1_Chapter.xhtml#Fig10)
    shows this form for employee 7698. Clicking the `Apply Changes` button performs
    any modifications that may have been made to the column values; clicking the `Delete`
    button deletes the record.


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig10_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig10_HTML.jpg)


    Figure 1-10


    Editing the contents of employee 7698


    If you wish, you can edit this record, setting the value for `Offsite` to `N`.
    You can then proceed to edit the other records, setting their column value to
    `Y` or `N` as desired. Given the tediousness of this approach, however, it is
    easier to use the `SQL command` tool, which is discussed in the next section.'
  raw: '# 1. The SQL Workshop


    Congratulations! You are on the brink of learning how to build APEX web applications.
    But before you can begin, you need an APEX account. There are several ways to
    obtain an account: you can register for a free account through the `apex.oracle.com`
    website, you might be given an account to an APEX server at your job, or you can
    even install an APEX server yourself and create your own account to it.


    No matter the circumstance, your APEX server will have an associated URL. Invoking
    the URL from your browser takes you to a login screen. Figure [1-1](#335103_3_En_1_Chapter.xhtml#Fig1)
    shows the login screen used by the `apex.oracle.com` server.


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig1_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig1_HTML.jpg)


    Figure 1-1


    APEX login screen


    Entering your credentials then takes you to the APEX home screen, the top of which
    is shown in Figure [1-2](#335103_3_En_1_Chapter.xhtml#Fig2).


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig2_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig2_HTML.jpg)


    Figure 1-2


    APEX home screen


    The APEX development environment contains several tools. Of primary importance
    is the App Builder tool, which will be covered in depth starting in Chapter [2](#335103_3_En_2_Chapter.xhtml).
    We begin here by looking at two tools in the APEX SQL Workshop: the object browser
    and the SQL command tool. These tools allow you to directly access the database—the
    object browser lets you manipulate a graphical user interface, and the SQL command
    tool lets you execute SQL statements and PL/SQL code blocks.


    Although the SQL Workshop tools are not essential for application development,
    using them can make your life much easier. Here are five ways that they can help:


    *   *The object browser reminds you of the database objects and their structures*.
    For example, a typical application involves several tables, each of which can
    have numerous columns. It is often impractical to memorize the details of each
    one. When building a page that references a table, you can use these tools to
    help refresh your memory.


    *   *To modify the structure of the database*. For example, these tools are the
    easiest way to execute the `alter table` command given in the introduction.


    *   *To modify the contents of the database*. For example, you might want to insert
    or modify records to test the behavior of a page with new or altered data, or
    to reset the database after testing the page.


    *   *To examine the contents of the database tables*. After running a page, you
    can verify that the database updated correctly.


    *   *To debug an SQL statement or PL/SQL block*. By executing code in the SQL
    commands tool first, you can verify that it produces the expected result before
    you actually assign it as the value of some property on a page.


    To get to the SQL Workshop, click the `SQL Workshop` button on the APEX home screen.
    Figure [1-3](#335103_3_En_1_Chapter.xhtml#Fig3) shows the resulting screen. From
    this screen, you can click the `Object Browser` or `SQL Commands` button to get
    to the desired tool.


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig3_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig3_HTML.jpg)


    Figure 1-3


    SQL Workshop home screen


    ## Downloading Tables


    This book makes frequent use of the sample tables `EMP` and `DEPT`. If your workspace
    does not contain these tables, here is how to load them. Click the arrow of the
    `SQL Workshop` tab, select `Utilities`, and then `Sample Datasets`; see Figure
    [1-4](#335103_3_En_1_Chapter.xhtml#Fig4). Figure [1-5](#335103_3_En_1_Chapter.xhtml#Fig5)
    shows the resulting screen, which lists the available tables. Click the `Install`
    button for the `EMP/DEPT` dataset, and follow directions.


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig5_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig5_HTML.jpg)


    Figure 1-5


    The Sample Datasets screen


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig4_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Getting to the sample datasets


    To verify that the tables have been installed, return to the SQL Workshop home
    screen (as shown in Figure [1-3](#335103_3_En_1_Chapter.xhtml#Fig3)). Entries
    for `EMP` and `DEPT` should now appear in the `Recently Created Tables` region.


    ## Object Browser


    The object browser lets you interact with your tables quickly and easily. From
    it, you can examine the description of each table—that is, the types and properties
    of its columns and its constraints, indexes, and triggers—as well as its contents.
    You can also use the object browser to make simple changes to the description
    or contents of a table.


    The home screen for the object browser displays a list of table names along its
    left side. Clicking a table name displays information about that table. For example,
    the screen for the `EMP` table appears in Figure [1-6](#335103_3_En_1_Chapter.xhtml#Fig6).


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig6_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Viewing the EMP table from the object browser


    The main portion of the screen displays information about each column of the table.
    Above this information is a series of buttons that let you modify it. As an example,
    recall that the introduction discussed the need for an `Offsite` column; let’s
    add that column to the table now. Clicking the `Add Column` button displays a
    form for you to fill in the details of the new column. Figure [1-7](#335103_3_En_1_Chapter.xhtml#Fig7)
    shows how I filled in this form.


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig7_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Adding a new column to EMP


    Clicking the `Next` button takes you to a confirmation screen; from there, click
    `Finish` to complete the action. The `EMP` screen should now display the new column.


    Returning to Figure [1-6](#335103_3_En_1_Chapter.xhtml#Fig6), observe the tab
    bar above the row of modification buttons. The `Table` tab is currently selected,
    which displays column information for the table. The other tabs show you other
    kinds of information and provide appropriate ways to view and modify that information.
    For example, clicking the `Indexes` tab displays the current indexes for the table.
    Figure [1-8](#335103_3_En_1_Chapter.xhtml#Fig8) shows the three indexes for `EMP`.
    Clicking the name of an index displays additional detail about that index.


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig8_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Browsing the indexes of EMP


    Finally, consider the `Data` tab, which displays the contents of the table. The
    top of this table appears in Figure [1-9](#335103_3_En_1_Chapter.xhtml#Fig9).
    Note that there is a button to insert a new row and an edit link at the beginning
    of each row.


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig9_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig9_HTML.jpg)


    Figure 1-9


    Viewing the contents of EMP


    Clicking a row’s edit link displays a form for modifying it. Figure [1-10](#335103_3_En_1_Chapter.xhtml#Fig10)
    shows this form for employee 7698\. Clicking the `Apply Changes` button performs
    any modifications that may have been made to the column values; clicking the `Delete`
    button deletes the record.


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig10_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig10_HTML.jpg)


    Figure 1-10


    Editing the contents of employee 7698


    If you wish, you can edit this record, setting the value for `Offsite` to **N**.
    You can then proceed to edit the other records, setting their column value to
    **Y** or **N** as desired. Given the tediousness of this approach, however, it
    is easier to use the SQL command tool, which is discussed in the next section.'
  trans: '

    # 1. SQL 工作坊


    恭喜！你即将开始学习如何构建 APEX Web 应用程序。但在开始之前，你需要一个 APEX 账户。获取账户的方式有几种：你可以通过 `apex.oracle.com`
    网站注册一个免费账户；你可能会在工作中被分配到一个 APEX 服务器的账户；或者你甚至可以自己安装一个 APEX 服务器并为其创建你自己的账户。


    无论哪种情况，你的 APEX 服务器都会有一个关联的 URL。在浏览器中访问该 URL 会带你进入登录界面。图 1-1 显示了 `apex.oracle.com`
    服务器使用的登录界面。


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig1_HTML.jpg](img/335103_3_En_1_Fig1_HTML.jpg)


    图 1-1


    APEX 登录界面


    输入你的凭证后，你将进入 APEX 主屏幕，其顶部如图 1-2 所示。


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig2_HTML.jpg](img/335103_3_En_1_Fig2_HTML.jpg)


    图 1-2


    APEX 主屏幕


    APEX 开发环境包含多种工具。其中最重要的是 `App Builder` 工具，这将从第 2 章开始深入介绍。我们在这里首先了解 APEX `SQL 工作坊`
    中的两个工具：`对象浏览器` 和 `SQL 命令` 工具。这些工具允许你直接访问数据库——`对象浏览器` 让你通过图形用户界面进行操作，而 `SQL 命令`
    工具让你执行 SQL 语句和 PL/SQL 代码块。


    虽然 `SQL 工作坊` 工具对于应用程序开发并非必不可少，但使用它们可以让你的工作轻松许多。以下是它们能提供帮助的五个方面：


    *   `对象浏览器` 可以帮你回想数据库对象及其结构。例如，一个典型的应用程序涉及多个表，每个表又可能有众多的列。要记住每个表的详细信息通常是不切实际的。当构建一个引用某个表的页面时，你可以使用这些工具来帮助你刷新记忆。

    *   用于修改数据库结构。例如，这些工具是执行导言中提到的 `alter table` 命令的最简单方法。

    *   用于修改数据库内容。例如，你可能需要插入或修改记录，以测试页面在新数据或修改后数据下的行为，或者在测试页面后重置数据库。

    *   用于检查数据库表的内容。运行页面后，你可以验证数据库是否已正确更新。

    *   用于调试 SQL 语句或 PL/SQL 代码块。通过先在 `SQL 命令` 工具中执行代码，你可以在实际将其赋值为页面上某个属性的值之前，验证它是否产生了预期的结果。


    要进入 `SQL 工作坊`，请在 APEX 主屏幕上点击 `SQL 工作坊` 按钮。图 1-3 显示了结果屏幕。从这个屏幕，你可以点击 `对象浏览器` 或
    `SQL 命令` 按钮进入所需的工具。


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig3_HTML.jpg](img/335103_3_En_1_Fig3_HTML.jpg)


    图 1-3


    SQL 工作坊主屏幕


    ## 下载数据表


    本书会频繁使用示例表 `EMP` 和 `DEPT`。如果你的工作区中没有这些表，以下是加载它们的方法。点击 `SQL 工作坊` 选项卡旁边的箭头，选择 `实用工具`，然后选择
    `示例数据集`；参见图 1-4。图 1-5 显示了结果屏幕，其中列出了可用的数据表。点击 `EMP/DEPT` 数据集的 `安装` 按钮，并按照指示操作。


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig5_HTML.jpg](img/335103_3_En_1_Fig5_HTML.jpg)


    图 1-5


    示例数据集屏幕


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig4_HTML.jpg](img/335103_3_En_1_Fig4_HTML.jpg)


    图 1-4


    进入示例数据集


    要验证这些表是否已安装，请返回到 `SQL 工作坊` 主屏幕（如图 1-3 所示）。`EMP` 和 `DEPT` 的条目现在应出现在 `最近创建的表` 区域。


    ## 对象浏览器


    `对象浏览器` 让你能够快速轻松地与你的表进行交互。通过它，你可以查看每个表的描述——即其列的类型和属性，以及其约束、索引和触发器——以及其内容。你也可以使用
    `对象浏览器` 对表的描述或内容进行简单的更改。


    `对象浏览器` 的主屏幕在其左侧显示一个表名列表。点击一个表名会显示有关该表的信息。例如，`EMP` 表的屏幕如图 1-6 所示。


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig6_HTML.jpg](img/335103_3_En_1_Fig6_HTML.jpg)


    图 1-6


    在对象浏览器中查看 EMP 表


    屏幕的主要部分显示有关表的每一列的信息。在此信息上方是一系列按钮，允许你修改它。举个例子，回想一下导言中讨论的添加 `Offsite` 列的必要性；现在让我们将该列添加到表中。点击
    `添加列` 按钮会显示一个表单，供你填写新列的详细信息。图 1-7 显示了我如何填写此表单。


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig7_HTML.jpg](img/335103_3_En_1_Fig7_HTML.jpg)


    图 1-7


    向 EMP 添加新列


    点击 `下一步` 按钮会带你进入确认屏幕；从那里，点击 `完成` 以完成操作。`EMP` 屏幕现在应该显示新列。


    回到图 1-6，观察修改按钮行上方的标签栏。当前选中了 `表` 标签，它显示表的列信息。其他标签向你显示其他类型的信息，并提供查看和修改该信息的适当方式。例如，点击
    `索引` 标签会显示该表的当前索引。图 1-8 显示了 `EMP` 的三个索引。点击索引的名称会显示该索引的更多详细信息。


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig8_HTML.jpg](img/335103_3_En_1_Fig8_HTML.jpg)


    图 1-8


    浏览 EMP 的索引


    最后，考虑 `数据` 标签，它显示表的内容。该表的顶部如图 1-9 所示。注意，有一个用于插入新行的按钮，并且在每行的开头都有一个编辑链接。


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig9_HTML.jpg](img/335103_3_En_1_Fig9_HTML.jpg)


    图 1-9


    查看 EMP 的内容


    点击某行的编辑链接会显示一个用于修改它的表单。图 1-10 显示了员工 7698 的此表单。点击 `应用更改` 按钮会执行对列值所做的任何修改；点击 `删除`
    按钮则会删除该记录。


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig10_HTML.jpg](img/335103_3_En_1_Fig10_HTML.jpg)


    图 1-10


    编辑员工 7698 的内容


    如果你愿意，可以编辑此记录，将 `Offsite` 的值设置为 `N`。然后你可以继续编辑其他记录，根据需要将它们的列值设置为 `Y` 或 `N`。然而，考虑到这种方法的繁琐性，使用
    `SQL 命令` 工具会更容易，这将在下一节讨论。

    '
- fmt: '## SQL Command Tool


    Most of the actions that you can perform in the object browser correspond to one
    or more SQL statements. In effect, the object browser is merely a convenient way
    to formulate and execute simpler SQL statements. If you want to perform more complex
    activities, use the SQL command tool.


    The SQL command tool divides the screen into two sections. You type an SQL statement
    or PL/SQL block into the top section, and the result appears at the bottom. Figure
    [1-11](#335103_3_En_1_Chapter.xhtml#Fig11) shows the screen after executing the
    SQL statement `select * from EMP`.


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig11_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig11_HTML.jpg)

    Figure 1-11


    Using the SQL command tool


    APEX displays only 10 of the 14 employee records. The reason is due to the select
    list labeled `Rows` at the top of the figure, whose value specifies the maximum
    number of rows to display. By default, its value is set to 10; if you want more
    rows displayed, you must first select a larger number. This feature is intentional.
    By forcing you to explicitly specify the output size of your query, APEX protects
    you from yourself. Suppose, for example, that you execute a multi-table query
    in which you forgot to include the join conditions. The resulting output could
    easily have billions of records that, if not truncated, would cause your APEX
    session to be unusable.


    To the right of that select list is a `Find Tables` button, which is useful if
    you need to be reminded about the tables and their columns. Clicking this button
    displays a window similar to the object browser. You can scroll through the available
    tables; selecting a table shows its column information. Figure [1-12](#335103_3_En_1_Chapter.xhtml#Fig12)
    shows the result of using the `Table Finder` window to display the `DEPT` columns.


    ![../images/335103_3_En_1_Chapter/335103_3_En_1_Fig12_HTML.jpg](images/335103_3_En_1_Chapter/335103_3_En_1_Fig12_HTML.jpg)

    Figure 1-12


    Using the Table Finder window


    You might have noticed from Figure [1-11](#335103_3_En_1_Chapter.xhtml#Fig11)
    that the `EMP` records still do not have values for `Offsite`. In the introduction,
    I stated that all employees work onsite except `SCOTT`, `ALLEN`, `WARD`, and `TURNER`.
    The easy way to handle this is to execute two update commands: the first one sets
    everybody’s `Offsite` value to `N`, and the second sets the four chosen records
    to `Y`. You can either run each statement individually in the command tool or
    combine them into a single PL/SQL block and execute it. The code for the latter
    option appears in Listing [1-1](#335103_3_En_1_Chapter.xhtml#PC1).


    ```

    begin

    update EMP

    set OffSite = ''N'';

    update EMP

    set OffSite = ''Y''

    where EName in (''SCOTT'', ''ALLEN'', ''WARD'', ''TURNER'');

    end;

    ```

    Listing 1-1: A PL/SQL Block to Assign Offsite Values


    ## Summary


    This chapter examined the object browser and SQL command tools in the APEX SQL
    Workshop. Both tools allow you to view and modify the database, but via very different
    interfaces. The object browser provides a visual interface, in which you perform
    tasks by clicking buttons and filling out forms. The SQL command tool provides
    a command-based interface, in which you perform tasks by executing SQL statements.


    The object browser is ideal for performing common and simple tasks. As its name
    implies, the object browser is also well suited for exploring the database. The
    point-and-click interface makes it easy to discover the various tables in the
    database and explore their columns. The object browser also does not require familiarity
    with SQL, so it is especially suitable for casual users.


    The SQL command tool, on the other hand, assumes that the user is both familiar
    with the database structure and proficient in SQL. The command tool is therefore
    suitable for experienced users of the database. If you know the appropriate SQL,
    you can perform many tasks much more easily from the SQL command tool than from
    the object browser.


    # 2. Applications and Pages


    This chapter begins an examination of the APEX app builder. You will learn about
    the basic tools for creating applications and pages—notably, the Create Application
    wizard and Create Page wizard—and use them to build a multi-page application that
    can be run from any browser. You will also see how to use the APEX page designer
    to modify the properties of the pages in your application. Although these pages
    will have no content to speak of, the techniques in this chapter provide the basis
    for the content-creation techniques of subsequent chapters.'
