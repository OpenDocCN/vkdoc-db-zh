    This chapter focused on interactive grids—what they are, what they

    can do, and how to build them. It began by examining their report-like

    characteristics. In this aspect, they look and behave a lot like

    interactive reports. Interactive grids also have some additional

    features, most importantly the ability to link two grid regions in a

    master-detail relationship.

    The chapter then considered the issue of how to use an interactive

    grid to update the database. Interactive grids have a sophisticated,

    easy-to-use interface, in which you can tentatively edit values in

    place, add rows and initialize their values, and delete existing rows,

    and then undo or save these changes when desired.

    Ineractive grids have validations to ensure appropriate user input.

    You specify these validations the same as in Chapter [8](#335103_3_En_8_Chapter.xhtml).
    The difference is that APEX

    applies the validation code to each modified row of the grid. You can

    also use the `Read Only` properties of a grid to restrict users from changing
    the

    value of specified rows or columns.

    Each interactive grid has a built-in process that handles the

    database insert, delete, and update operations. If you need additional

    functionality, you can write your own processes. As with validations,

    the code of the process refers to just one row of the grid; APEX applies

    the process to each modified row of the grid. In fact, you can even swap

    out the default database processing code and replace it with your

    own.


    12. Dynamic SQL


    In this book, you have seen many ways to use session state values to

    customize a page. For example, the SQL source query of a report is a

    good candidate for customization, as is an SQL statement in a process

    that accesses the database. Much of this customization involves bound

    variable references in SQL statements.

    However, there are limits to what can be customized. A reference to a

    session state variable can replace a constant in the SQL query, but it

    is not allowed to replace a table name or a column name. This chapter

    examines a technique called *dynamic SQL*, which overcomes this

    limitation by using PL/SQL code to construct and execute an SQL

    statement at runtime. You will see how to use dynamic SQL as the source

    of a report or the contents of a process and look at three examples that

    require dynamic SQL.


    Dynamic Reports


    Consider the `Report Builder` page shown in Figure [12-1](#335103_3_En_12_Chapter.xhtml#Fig1),
    which is page

    43 of the `Employee Demo` application. The items in the top region enable a user
    to

    specify a report. A user chooses the desired

    table, selects the columns to display, and then enters the text of the

    filtering condition. Clicking the submit button displays the report in

    the bottom region.


    ![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig1_HTML.jpg](images/335103_3_En_12_Chapter/335103_3_En_12_Fig1_HTML.jpg)


    Figure 12-1

    Report Builder page


    What does it take to implement these two

    regions? The `Specify Your Report` region is relatively straightforward. The region
    has

    three items and a button. The `Select Table` item is

    named `P43_TABLE`. It is a

    select list that displays the names of relevant tables and has no action

    when selected. When I built the page, I specified the list of table

    names as the

    static values [`EMP, DEPT].` Another possibility is to specify the list via the

    following query, which makes use of Oracle’s `User_Tables` table:


    ```

    select Table_Name as DisplayVal, Table_Name as ResultVal

    from User_Tables

    order by DisplayVal

    ```


    The `Select Columns` item is named `P43_COLS`. It is a

    checkbox group that displays a checkbox for each column of the selected

    table. Its values are defined by the following query, which makes use of

    Oracle’s `User_Tab_Cols` table:


    ```

    select Column_Name as DisplayVal, Column_Name as ResultVal

    from User_Tab_Cols

    where Table_Name = :P43_TABLE

    order by DisplayVal

    ```


    This query references `P43_TABLE`, which

    means that its list of displayed columns will vary according to what

    table is selected. To get this list to update when `P43_TABLE` changes,

    use the cascading lists technique of Chapter [6](#335103_3_En_6_Chapter.xhtml).
    That is, go to the `Cascading List of Values section` for `P43_COLS` and set its

    `Parent Item(s)`

    property to `P43_TABLE`.

    The item `P43_WHERE` is a text

    area in which the user enters the filtering condition. This condition

    will be used as the `where` clause of the

    report’s source query.

    Finally, the button in the `Specify your Report`

    region executes a submit action when pressed. This action causes the

    values of the three items to be saved in the session state.


    The `Your Report Is` region displays a report customized by the values of these

    items. This region is not so straightforward to implement. Suppose that

    you tried to create the region as a classic report; its source query

    would look something like this:


    ```

    select :P43_COLS

    from   :P43_TABLE

    where  :P43_WHERE

    ```


    The problem is that such a query is not syntactically legal. The rule is

    that a bind variable can be used only to reference a constant, and this

    query is trying to reference columns, tables, and SQL code. To solve

    this problem, set the source type of the report to be `PL/SQL Function Body returning
    SQL Query`. The source of such a report is a PL/SQL

    function that computes the desired SQL query and returns it

    as a string. Listing [12-1](#335103_3_En_12_Chapter.xhtml#PC4) shows the code

    for the `Your Report is` report.


    ```

    declare

    v_table varchar2(20)  := :P43_TABLE;

    v_cols  varchar2(100) := replace(:P43_COLS, '':'', '','');

    v_where varchar2(100) := '''';

    begin

    if :P43_WHERE is not null then

    v_where := '' where '' || :P43_WHERE;

    end if;

    return ''select '' || v_cols || '' from '' || v_table || v_where;

    end;

    Listing 12-1

    PL/SQL Code to Generate an SQL Query

    ```


    This code constructs the desired SQL query string piece by piece. The

    construction of the column list is perhaps the only nonobvious part.

    Recall that `P43_COLS` is a

    multi-value list item, which means that its value will be a string

    containing the selected column names separated by colons. In the query,

    however, the column names need to be separated by commas. So all you

    need to do is use the `replace` function to

    replace each colon by a comma and then assign that string to the

    variable `v_cols`.


    The technique of using code to construct the source query is called

    *dynamic SQL* because the query is computed dynamically at

    runtime. Dynamic SQL is appropriate whenever the source query can vary

    in ways that go beyond simple customization by constants. Figure [12-2](#335103_3_En_12_Chapter.xhtml#Fig2)
    depicts the

    `Identification`

    and `Source`

    properties for the `Your Report Is`

    region.


    ![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig2_HTML.jpg](images/335103_3_En_12_Chapter/335103_3_En_12_Fig2_HTML.jpg)


    Figure 12-2

    Implementing the Report Builder report region


    One of the consequences of using dynamic SQL is that the

    columns of the report may not be known until runtime. In this case, you

    must tell APEX to define *generic* column names for the report.

    You do so via the property `Use Generic Column Names`, which can be seen at the
    bottom of Figure [12-2](#335103_3_En_12_Chapter.xhtml#Fig2). When that

    property is turned on, the property `Generic Column Count`

    appears for you to specify how many generic columns to create.

    Figure [12-2](#335103_3_En_12_Chapter.xhtml#Fig2) specifies a

    column count of 9, which means that APEX will generate 9 columns for the

    report. The names of these columns will be `COL01`, `COL02`, and up to

    `COL09`. This

    specified count is a maximum; if the report happens to use fewer columns

    (as shown in Figure [12-1](#335103_3_En_12_Chapter.xhtml#Fig1)), the others

    will be ignored.'
  trans: "\n# 总结\n\n本章重点介绍了交互式网格——它们是什么、能做什么以及如何构建。首先探讨了其类报表的特性。在这方面，它们的外观和行为与交互式报表非常相似。交互式网格还具有一些额外的功能，最重要的是能够将两个网格区域链接成主从关系。\n\
    \n随后，本章讨论了如何使用交互式网格来更新数据库的问题。交互式网格拥有一个复杂且易于使用的界面，你可以在其中临时就地编辑值、添加行并初始化其值、删除现有行，然后根据需要撤销或保存这些更改。\n\
    \n交互式网格具有验证功能，以确保用户输入的适当性。你指定这些验证的方式与第 8 章相同。区别在于，APEX 会将验证代码应用于网格的每一行已修改行。你还可以使用网格的\
    \ `只读` 属性来限制用户更改指定行或列的值。\n\n每个交互式网格都有一个内置进程来处理数据库的插入、删除和更新操作。如果你需要额外的功能，可以编写自己的进程。与验证类似，进程的代码仅引用网格中的一行；APEX\
    \ 会将该进程应用于网格的每一行已修改行。实际上，你甚至可以替换掉默认的数据库处理代码，用自己的代码来代替。\n\n# 12. 动态 SQL\n\n在本书中，你已经看到了许多使用会话状态值来定制页面的方法。例如，报表的\
    \ SQL 源查询是定制的一个很好的候选对象，访问数据库的进程中的 SQL 语句也是如此。这种定制大部分涉及 SQL 语句中的绑定变量引用。\n\n然而，可以定制的内容是有限制的。对会话状态变量的引用可以替换\
    \ SQL 查询中的常量，但不允许替换表名或列名。本章探讨一种称为 `动态 SQL` 的技术，它通过使用 PL/SQL 代码在运行时构建并执行 SQL 语句来克服这一限制。你将学习如何将\
    \ `动态 SQL` 用作报表的来源或进程的内容，并查看三个需要 `动态 SQL` 的示例。\n\n## 动态报表\n\n考虑图 12-1 所示的 `报表构建器`\
    \ 页面，这是 `员工演示` 应用程序的第 43 页。顶部区域中的项目使用户能够指定一个报表。用户选择所需的表，选择要显示的列，然后输入筛选条件的文本。点击提交按钮将在底部区域显示报表。\n\
    \n![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig1_HTML.jpg](img/335103_3_En_12_Fig1_HTML.jpg)\n\
    *图 12-1 报表构建器页面*\n\n实现这两个区域需要什么？`指定您的报表` 区域相对简单。该区域有三个项目和一个按钮。`选择表` 项目名为 `P43_TABLE`。它是一个选择列表，显示相关表的名称，选中时不执行任何操作。在构建页面时，我将表名列表指定为静态值\
    \ `[EMP, DEPT]`。另一种可能性是通过以下查询指定列表，该查询利用了 Oracle 的 `User_Tables` 表：\n\n```sql\n\
    select Table_Name as DisplayVal, Table_Name as ResultVal\nfrom User_Tables\norder\
    \ by DisplayVal\n```\n\n`选择列` 项目名为 `P43_COLS`。它是一个复选框组，为所选表的每一列显示一个复选框。其值由以下查询定义，该查询利用了\
    \ Oracle 的 `User_Tab_Cols` 表：\n\n```sql\nselect Column_Name as DisplayVal, Column_Name\
    \ as ResultVal\nfrom User_Tab_Cols\nwhere Table_Name = :P43_TABLE\norder by DisplayVal\n\
    ```\n\n此查询引用了 `P43_TABLE`，这意味着其显示的列列表将根据所选的表而变化。为了在 `P43_TABLE` 更改时更新此列表，请使用第\
    \ 6 章的级联列表技术。也就是说，转到 `P43_COLS` 的 `值的级联列表` 部分，并将其 `父项` 属性设置为 `P43_TABLE`。\n\n\
    项目 `P43_WHERE` 是一个文本区域，用户可在其中输入筛选条件。此条件将用作报表源查询的 `where` 子句。\n\n最后，`指定您的报表` 区域中的按钮在按下时执行提交操作。此操作会将这三个项目的值保存在会话状态中。\n\
    \n`您的报表是` 区域显示一个由这些项目的值定制的报表。实现该区域不那么直接。假设你尝试将其创建为经典报表；其源查询将类似于：\n\n```sql\nselect\
    \ :P43_COLS\nfrom   :P43_TABLE\nwhere  :P43_WHERE\n```\n\n问题在于这样的查询在语法上是不合法的。规则是绑定变量只能用于引用常量，而此查询试图引用列、表和\
    \ SQL 代码。为了解决这个问题，请将报表的源类型设置为 `返回 SQL 查询的 PL/SQL 函数体`。此类报表的源是一个 PL/SQL 函数，它计算所需的\
    \ SQL 查询并将其作为字符串返回。代码清单 12-1 显示了 `您的报表是` 报表的代码。\n\n```sql\ndeclare\n  v_table\
    \ varchar2(20)  := :P43_TABLE;\n  v_cols  varchar2(100) := replace(:P43_COLS,\
    \ ':', ',');\n  v_where varchar2(100) := '';\nbegin\n  if :P43_WHERE is not null\
    \ then\n    v_where := ' where ' || :P43_WHERE;\n  end if;\n  return 'select '\
    \ || v_cols || ' from ' || v_table || v_where;\nend;\n```\n*代码清单 12-1 用于生成 SQL\
    \ 查询的 PL/SQL 代码*\n\n此代码逐段构建所需的 SQL 查询字符串。列列表的构建可能是唯一不那么直观的部分。回想一下，`P43_COLS` 是一个多值列表项，这意味着其值将是一个包含以冒号分隔的所选列名的字符串。然而，在查询中，列名需要用逗号分隔。因此，你需要做的就是使用\
    \ `replace` 函数将每个冒号替换为逗号，然后将该字符串赋值给变量 `v_cols`。\n\n使用代码构建源查询的技术被称为 `动态 SQL`，因为查询是在运行时动态计算的。只要源查询的变化超出了简单的常量定制范围，`动态\
    \ SQL` 就是合适的。图 12-2 描绘了 `您的报表是` 区域的 `标识` 和 `源` 属性。\n\n![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig2_HTML.jpg](img/335103_3_En_12_Fig2_HTML.jpg)\n\
    *图 12-2 实现报表构建器报表区域*\n\n使用 `动态 SQL` 的后果之一是，报表的列可能直到运行时才知晓。在这种情况下，你必须告诉 APEX 为报表定义\
    \ `通用` 列名。你可以通过属性 `使用通用列名` 来实现，该属性可在图 12-2 的底部看到。启用该属性后，会出现 `通用列数` 属性，供你指定要创建的通用列数。图\
    \ 12-2 指定了列数为 9，这意味着 APEX 将为报表生成 9 列。这些列的名称将是 `COL01`、`COL02`，一直到 `COL09`。此指定的计数是最大值；如果报表恰好使用了更少的列（如图\
    \ 12-1 所示），则其他列将被忽略。\n"
- fmt: "回顾一下，列的默认标题是其名称。因此，你应该为每个通用列赋予一个更合适的标题。通常，你会直接在列的 `Heading` 部分指定其标题。但由于你只有在运行时才能知道每一列的含义，因此需要使用不同的方法。这正是报表的\
    \ `Heading` 部分的用途。该部分可以在报表渲染树的 `Attributes` 节点中找到。图 12-3 展示了五种可能的标题类型。前三种类型基于列名创建标题，这在这里不合适；最后一种类型不指定任何标题。因此，处理通用列的最佳选择是使用\
    \ `PL/SQL Function Body` 这种标题类型。\n\n![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig3_HTML.jpg](images/335103_3_En_12_Chapter/335103_3_En_12_Fig3_HTML.jpg)\n\
    \n**图 12-3**\n为通用列指定标题\n\n当你选择该标题类型时，APEX 将显示一个用于输入 PL/SQL 代码的文本区域；该代码应返回一个包含以冒号分隔的列标题列表的字符串。在此示例中，复选框组\
    \ `P43_COLS` 恰好包含你需要的内容，因此你的代码可以简单地返回其值，如图 12-3 底部所示。在更复杂的情况下，你可以编写一个 PL/SQL 块来计算所需的字符串。\n\
    \n当你运行页面时，在你至少选择一列之前，报表将显示以下错误信息：\n\n```\nfailed to parse SQL query: ORA-00936:\
    \ missing expression\n```\n\n原因是当 `P43_COLS` 为空时，图 12-2 中生成的 SQL 字符串以“`select\
    \ from ...`”开头，这不是合法的 SQL。避免这种情况的一个好方法是条件渲染报表区域。具体来说，将其 `Condition Type` 属性设置为：\n\
    \n```\nP43_COLS is not null\n```\n\n## 动态进程\n\n第 7 章演示了从 PL/SQL 块执行 SQL 语句是多么简单：你只需将该语句直接放在块内，并使用绑定变量对其进行参数化。然而，该语法对于动态\
    \ SQL 来说并不足够。本节将探讨相关问题及其解决方案。\n\n以图 12-4 所示的 `Count and Delete` 页面为例，它是 `Employee\
    \ Demo` 应用的第 44 页。此页面包含两个功能基本相同的区域。在每种情况下，用户选择一个表并为其指定一个过滤条件。每个区域都有两个相同的按钮：`Count`\
    \ 按钮显示满足条件的记录数量的消息，`Delete` 按钮从表中删除这些记录。图 12-4 显示了在两个区域中单击 `Count` 按钮后的结果。\n\n\
    ![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig4_HTML.jpg](images/335103_3_En_12_Chapter/335103_3_En_12_Fig4_HTML.jpg)\n\
    \n**图 12-4**\nCount and Delete 页面\n\n图 12-4 中的两个区域显示了相同的过滤条件：职位是分析师的员工。这两个区域仅在用户指定条件的方式上有所不同。在\
    \ `Version 1` 区域中，用户可以输入任意条件，类似于 `Report Builder` 页面。在 `Version 2` 区域中，用户通过选择特定列、运算符和值来组合条件。这第二种指定条件的方式不需要\
    \ SQL 语法知识，可能对用户更友好，但它限制了可以表达的条件类型。\n\n此页面上的项目和按钮的创建是直截了当的。`Version 1` 区域有三个项目：项目\
    \ `P44_TABLE1` 是一个选择列表，具有静态值 [`DEPT, EMP]`；项目 `P44_WHERE1` 是一个文本区域；`P44_RESULT1`\
    \ 是只读显示项。其按钮名为 `Count1` 和 `Delete1`，它们的操作是 `Submit Page`。\n\n`Version 2` 区域有五个项目。项目\
    \ `P44_TABLE2` 的定义与 `P44_TABLE1` 相同。项目 `P44_COLUMN2` 是一个选择列表，其级联父项为 `P44_TABLE2`；其值由此\
    \ SQL 查询定义：\n\n```\nselect Column_Name as DisplayVal, Column_Name as ResultVal\n\
    from User_Tab_Cols\nwhere Table_Name = :P44_TABLE2\norder by DisplayVal\n```\n\
    \n项目 `P44_VALUE2` 是一个文本字段，`P44_RESULT2` 是一个只读显示项。项目 `P44_OP2` 是一个单选按钮组，具有三个静态值\
    \ `[<, =, >]`。其 `Template` 属性是 `Optional-Above`，以便标签可以显示在单选按钮组上方。该区域的按钮名为 `Count2`\
    \ 和 `Delete2`，它们的操作是 `Submit Page`。\n\n此页面最有趣的方面是如何为四个按钮编写进程。每个进程执行相同的三个任务：\n\n\
    *   它构建一个包含适当 SQL 命令的字符串。\n*   它执行该字符串。\n*   它使用执行结果来制定输出消息。\n\n动态报表的源代码只需要执行第一项任务，因为\
    \ APEX 在渲染报表时会执行查询字符串。而进程则没有这种便利，它必须显式地执行 SQL 字符串。\n\n执行 SQL 字符串的 PL/SQL 命令称为\
    \ `execute immediate`。该命令的使用有些复杂——事实上，四个按钮进程中的每一个使用它的方式都略有不同。让我们依次检查每个进程。\n\n\
    首先，考虑按钮 `Delete1`。它的进程也名为 `Delete1`，需要执行一个 SQL 删除命令。大多数时候，你可以直接将命令写为 PL/SQL 语句；但在这种情况下，你直到运行时才会知道表及其\
    \ `where` 子句。因此，你需要使用 `execute immediate` 命令，如清单 12-2 所示。\n\n```\ndeclare\n  v_cmd\
    \ varchar2(100);\nbegin\n  v_cmd := 'delete from ' || :P44_TABLE1 || ' where '\
    \ || :P44_WHERE1;\n  execute immediate v_cmd;\n  :P44_RESULT1 := SQL%rowcount\
    \ || ' records were deleted.';\nend;\n```\n**清单 12-2**\nDelete1 进程的代码\n\n第一条语句使用所选表和指定条件将\
    \ SQL 删除命令构建为一个字符串。第二条语句以最基本的形式使用 `execute immediate` 命令：你只需将 SQL 字符串传递给它。第三条语句通过使用\
    \ `SQL%rowcount` 函数（在清单 7-11 中介绍过）为结果项目赋值。\n\n现在考虑按钮 `Count1`。它的进程名为 `Count1`，需要执行一个查询来计算记录数，并将检索到的值保存在一个变量中。清单\
    \ 7-4 展示了如何使用 SQL 查询的 `into` 子句来实现此目的。例如，如果你不必使用动态 SQL，你可以像这样编写对应于图 12-4 的查询：\n\
    \n```\nselect count(*) into v_count\nfrom EMP\nwhere Job = 'ANALYST'\n```"
  raw: "Recall that a column’s default heading is its name. Therefore, you\nshould\
    \ give each generic column a more appropriate heading. Typically\nyou would specify\
    \ a column’s heading directly in its `Heading` section . But since you won’t\n\
    know the meaning of each column until runtime, you need to use a\ndifferent approach.\
    \ This is the purpose of the report’s `Heading` section. This\nsection can be\
    \ found in the `Attributes` node of\nthe report’s rendering tree. Figure [12-3](#335103_3_En_12_Chapter.xhtml#Fig3)\
    \ shows the five\npossible heading types. The first three types create headings\
    \ based on\nthe column names, which is not appropriate here, and the last type\n\
    specifies no headings. Thus, the best choice for handling generic\ncolumns is\
    \ to use the heading type `PL/SQL Function Body`.\n\n![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig3_HTML.jpg](images/335103_3_En_12_Chapter/335103_3_En_12_Fig3_HTML.jpg)\n\
    \nFigure 12-3\nSpecifying headings for generic columns\n\nWhen you select that\
    \ heading type, APEX will display a text area for\nentering PL/SQL code; that\
    \ code should return a string containing a\ncolon-separated list of the column\
    \ headings. In this example, the\ncheckbox group `P43_COLS` contains\nexactly\
    \ what you need, so your code can simply return its value, as\nshown at the bottom\
    \ of Figure [12-3](#335103_3_En_12_Chapter.xhtml#Fig3). In more\ncomplex situations,\
    \ you can write a PL/SQL block to compute the desired\nstring.\n\nWhen you run\
    \ your page, the report will display the following error\nmessage until you choose\
    \ at least one column:\n\n```\nfailed to parse SQL query: ORA-00936: missing expression\n\
    ```\n\nThe reason is that when `P43_COLS` is empty,\nthe SQL string generated\
    \ in Figure [12-2](#335103_3_En_12_Chapter.xhtml#Fig2) begins \"`select from ...`\"\
    ,\nwhich is not legal SQL. A good way to avoid this unpleasantness is to\nrender\
    \ the report region conditionally. In particular, set its `Condition Type`\nproperty\
    \ to\n\n```\nP43_COLS is not null\n```\n\nDynamic Processes\nChapter [7](#335103_3_En_7_Chapter.xhtml)\
    \ demonstrated how easy it is to\nexecute an SQL statement from a PL/SQL block:\
    \ you simply place the statement directly\nwithin the block and parameterize it\
    \ using bind variables. However, that\nsyntax is not sufficient for dynamic SQL.\
    \ This section explores the\nissues and their solution.\n\nFor an example, consider\
    \ the `Count and Delete` page\nshown in Figure [12-4](#335103_3_En_12_Chapter.xhtml#Fig4),\
    \ which is page\n44 of the `Employee Demo` application. This page contains two\
    \ regions that have\nessentially the same functionality. In each case, a user\
    \ chooses a table\nand specifies a filtering condition on it. Each region has\
    \ the same two\nbuttons: the `Count` button displays\na message giving the number\
    \ of records satisfying the condition, and the\n`Delete` button\ndeletes those\
    \ records from the table. Figure [12-4](#335103_3_En_12_Chapter.xhtml#Fig4) shows\
    \ the\nresult of clicking the `Count` button in both\nregions.\n\n![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig4_HTML.jpg](images/335103_3_En_12_Chapter/335103_3_En_12_Fig4_HTML.jpg)\n\
    \nFigure 12-4\nCount and Delete page\n\nBoth regions in Figure [12-4](#335103_3_En_12_Chapter.xhtml#Fig4)\
    \ display the\nsame filtering condition: employees who are analysts. These two\
    \ regions\ndiffer only in how the user specifies the condition. In the `Version\
    \ 1` region, the\nuser can enter an arbitrary condition, similar to\nthe `Report\
    \ Builder` page. In the `Version 2` region, the\nuser composes the condition by\
    \ choosing a specific column, operator, and\nvalue. This second way of specifying\
    \ the condition doesn’t require\nknowledge of SQL syntax and is perhaps more user-friendly,\
    \ but it limits\nthe kinds of conditions that can be expressed.\nThe creation\
    \ of the items and buttons on this page is\nstraightforward. The `Version 1` region\
    \ has\nthree items: item `P44_TABLE1` is a\nselect list having the static values\
    \ [`DEPT, EMP]`, item\n`P44_WHERE1` is a\ntext area, and `P44_RESULT`1 is\ndisplay-only.\
    \ Its buttons are named `Count1` and `Delete1`, and their\nactions are `Submit\
    \ Page`.\n\nThe `Version 2`\nregion has five items. The item `P44_TABLE2` has\
    \ the\nsame definition as `P44_TABLE1`. The item\n`P44_COLUMN2` is\na select list\
    \ having `P44_TABLE2` as its\ncascading parent; its values are defined by this\
    \ SQL query:\n\n```\nselect Column_Name as DisplayVal, Column_Name as ResultVal\n\
    from User_Tab_Cols\nwhere Table_Name = :P44_TABLE2\norder by DisplayVal\n```\n\
    \nThe item `P44_VALUE2` is a text\nfield, and `P44_RESULT2` is a\ndisplay-only\
    \ item. Item `P44_OP2` is a radio\ngroup with the three static values `[<,=,>]`.\
    \ Its\n`Template`\nproperty is `Optional-Above`, so\nthat the label can appear\
    \ above the radio group. The region’s buttons\nare named `Count2` and `Delete2`,\
    \ and their\nactions are `Submit Page`.\n\nThe most interesting aspect of the\
    \ page is how to write the processes\nfor the four buttons. Each process performs\
    \ the same three tasks:\n\n*   It constructs a string containing the appropriate\
    \ SQL\n    command.\n\n*   It executes that string.\n\n*   It uses the result\
    \ of the execution to formulate the output\n    message.\n\nThe source code for\
    \ a dynamic report needs to perform only the first\ntask because APEX executes\
    \ the query string when it renders the report.\nA process, on the other hand,\
    \ does not have this luxury and it has to\nexplicitly execute the SQL string.\n\
    The PL/SQL command to execute an SQL string is called *execute\nimmediate*. This\
    \ command is somewhat intricate to use—in fact, each\nof the four button processes\
    \ uses it slightly differently. Let’s examine\neach process in turn.\n\nFirst,\
    \ consider the button `Delete1`. Its process,\nalso named `Delete1`, needs to\n\
    execute an SQL deletion command. Most of the time, you can write the\ncommand\
    \ directly as a PL/SQL statement; but in this case you won’t know\nthe table and\
    \ its `where` clause until\nruntime. Thus, you need to use the `execute immediate`\n\
    command  , as shown in Listing\n[12-2](#335103_3_En_12_Chapter.xhtml#PC8).\n\n\
    ```\ndeclare\nv_cmd varchar2(100);\nbegin\nv_cmd := 'delete from ' || :P44_TABLE1\
    \ || ' where ' || :P44_WHERE1;\nexecute immediate v_cmd;\n:P44_RESULT1 := SQL%rowcount\
    \ || ' records were deleted.';\nend;\nListing 12-2\nCode for the Delete1 Process\n\
    ```\n\nThe first statement constructs the SQL deletion command as a string\nusing\
    \ the chosen table and specified condition. The second statement\nuses the `execute\
    \ immediate` command in its most basic form: you simply pass the SQL\nstring to\
    \ it. The third statement assigns a value to the result item by\nusing the `SQL%rowcount`\
    \ function\n(which was introduced in Listing [7-11](#335103_3_En_7_Chapter.xhtml#PC24)).\n\
    \nNow consider the button `Count1`. Its process,\nnamed `Count1`,\nneeds to execute\
    \ a query to calculate the record count and save the\nretrieved value in a variable.\
    \ Listing [7-4](#335103_3_En_7_Chapter.xhtml#PC9) showed how to use the `into`\
    \ clause of an SQL\nquery for that purpose. For example, if you did not have to\
    \ use dynamic\nSQL, you could write the query corresponding to Figure [12-4](#335103_3_En_12_Chapter.xhtml#Fig4)\
    \ like this:\n\n```\nselect count(*) into v_count\nfrom EMP\nwhere Job = 'ANALYST'\n\
    ```"
  trans: "回顾一下，列的默认标题是其名称。因此，你应该为每个通用列赋予一个更合适的标题。通常，你会直接在列的 `Heading` 部分指定其标题。但由于你只有在运行时才能知道每一列的含义，因此需要使用不同的方法。这正是报表的\
    \ `Heading` 部分的用途。该部分可以在报表渲染树的 `Attributes` 节点中找到。图 12-3 展示了五种可能的标题类型。前三种类型基于列名创建标题，这在这里不合适；最后一种类型不指定任何标题。因此，处理通用列的最佳选择是使用\
    \ `PL/SQL Function Body` 这种标题类型。\n\n![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig3_HTML.jpg](img/335103_3_En_12_Fig3_HTML.jpg)\n\
    \n**图 12-3**\n为通用列指定标题\n\n当你选择该标题类型时，APEX 将显示一个用于输入 PL/SQL 代码的文本区域；该代码应返回一个包含以冒号分隔的列标题列表的字符串。在此示例中，复选框组\
    \ `P43_COLS` 恰好包含你需要的内容，因此你的代码可以简单地返回其值，如图 12-3 底部所示。在更复杂的情况下，你可以编写一个 PL/SQL 块来计算所需的字符串。\n\
    \n当你运行页面时，在你至少选择一列之前，报表将显示以下错误信息：\n\n```\nfailed to parse SQL query: ORA-00936:\
    \ missing expression\n```\n\n原因是当 `P43_COLS` 为空时，图 12-2 中生成的 SQL 字符串以“`select\
    \ from ...`”开头，这不是合法的 SQL。避免这种情况的一个好方法是条件渲染报表区域。具体来说，将其 `Condition Type` 属性设置为：\n\
    \n```\nP43_COLS is not null\n```\n\n## 动态进程\n\n第 7 章演示了从 PL/SQL 块执行 SQL 语句是多么简单：你只需将该语句直接放在块内，并使用绑定变量对其进行参数化。然而，该语法对于动态\
    \ SQL 来说并不足够。本节将探讨相关问题及其解决方案。\n\n以图 12-4 所示的 `Count and Delete` 页面为例，它是 `Employee\
    \ Demo` 应用的第 44 页。此页面包含两个功能基本相同的区域。在每种情况下，用户选择一个表并为其指定一个过滤条件。每个区域都有两个相同的按钮：`Count`\
    \ 按钮显示满足条件的记录数量的消息，`Delete` 按钮从表中删除这些记录。图 12-4 显示了在两个区域中单击 `Count` 按钮后的结果。\n\n\
    ![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig4_HTML.jpg](img/335103_3_En_12_Fig4_HTML.jpg)\n\
    \n**图 12-4**\nCount and Delete 页面\n\n图 12-4 中的两个区域显示了相同的过滤条件：职位是分析师的员工。这两个区域仅在用户指定条件的方式上有所不同。在\
    \ `Version 1` 区域中，用户可以输入任意条件，类似于 `Report Builder` 页面。在 `Version 2` 区域中，用户通过选择特定列、运算符和值来组合条件。这第二种指定条件的方式不需要\
    \ SQL 语法知识，可能对用户更友好，但它限制了可以表达的条件类型。\n\n此页面上的项目和按钮的创建是直截了当的。`Version 1` 区域有三个项目：项目\
    \ `P44_TABLE1` 是一个选择列表，具有静态值 [`DEPT, EMP]`；项目 `P44_WHERE1` 是一个文本区域；`P44_RESULT1`\
    \ 是只读显示项。其按钮名为 `Count1` 和 `Delete1`，它们的操作是 `Submit Page`。\n\n`Version 2` 区域有五个项目。项目\
    \ `P44_TABLE2` 的定义与 `P44_TABLE1` 相同。项目 `P44_COLUMN2` 是一个选择列表，其级联父项为 `P44_TABLE2`；其值由此\
    \ SQL 查询定义：\n\n```\nselect Column_Name as DisplayVal, Column_Name as ResultVal\n\
    from User_Tab_Cols\nwhere Table_Name = :P44_TABLE2\norder by DisplayVal\n```\n\
    \n项目 `P44_VALUE2` 是一个文本字段，`P44_RESULT2` 是一个只读显示项。项目 `P44_OP2` 是一个单选按钮组，具有三个静态值\
    \ `[<, =, >]`。其 `Template` 属性是 `Optional-Above`，以便标签可以显示在单选按钮组上方。该区域的按钮名为 `Count2`\
    \ 和 `Delete2`，它们的操作是 `Submit Page`。\n\n此页面最有趣的方面是如何为四个按钮编写进程。每个进程执行相同的三个任务：\n\n\
    *   它构建一个包含适当 SQL 命令的字符串。\n*   它执行该字符串。\n*   它使用执行结果来制定输出消息。\n\n动态报表的源代码只需要执行第一项任务，因为\
    \ APEX 在渲染报表时会执行查询字符串。而进程则没有这种便利，它必须显式地执行 SQL 字符串。\n\n执行 SQL 字符串的 PL/SQL 命令称为\
    \ `execute immediate`。该命令的使用有些复杂——事实上，四个按钮进程中的每一个使用它的方式都略有不同。让我们依次检查每个进程。\n\n\
    首先，考虑按钮 `Delete1`。它的进程也名为 `Delete1`，需要执行一个 SQL 删除命令。大多数时候，你可以直接将命令写为 PL/SQL 语句；但在这种情况下，你直到运行时才会知道表及其\
    \ `where` 子句。因此，你需要使用 `execute immediate` 命令，如清单 12-2 所示。\n\n```\ndeclare\n  v_cmd\
    \ varchar2(100);\nbegin\n  v_cmd := 'delete from ' || :P44_TABLE1 || ' where '\
    \ || :P44_WHERE1;\n  execute immediate v_cmd;\n  :P44_RESULT1 := SQL%rowcount\
    \ || ' records were deleted.';\nend;\n```\n**清单 12-2**\nDelete1 进程的代码\n\n第一条语句使用所选表和指定条件将\
    \ SQL 删除命令构建为一个字符串。第二条语句以最基本的形式使用 `execute immediate` 命令：你只需将 SQL 字符串传递给它。第三条语句通过使用\
    \ `SQL%rowcount` 函数（在清单 7-11 中介绍过）为结果项目赋值。\n\n现在考虑按钮 `Count1`。它的进程名为 `Count1`，需要执行一个查询来计算记录数，并将检索到的值保存在一个变量中。清单\
    \ 7-4 展示了如何使用 SQL 查询的 `into` 子句来实现此目的。例如，如果你不必使用动态 SQL，你可以像这样编写对应于图 12-4 的查询：\n\
    \n```\nselect count(*) into v_count\nfrom EMP\nwhere Job = 'ANALYST'\n```"
- fmt: "In dynamic SQL, however, the `into` clause is associated with the `execute\
    \ immediate` command instead of with the SQL query. Listing 12-3 shows the proper\
    \ code.\n\n```sql\ndeclare\n  v_query varchar2(100);\n  v_count integer;\nbegin\n\
    \  v_query := 'select count(*) from ' || :P44_TABLE1 ||\n             ' where\
    \ ' || :P44_WHERE1;\n  execute immediate v_query\n    into v_count;\n  :P44_RESULT1\
    \ := 'There are ' || v_count || ' records.';\nend;\nListing 12-3\nCode for the\
    \ Count1 Process\n```\n\nNow consider the process for the button `Delete2`, which\
    \ is also named `Delete2`. The main issue with writing this process is how to\
    \ handle string constants. Note that the value `ANALYST` in Figure 12-4 is not\
    \ in quotes. Thus, the straightforward approach, shown in Listing 12-4, will not\
    \ work.\n\n```sql\ndeclare\n  v_cmd varchar2(100);\nbegin\n  v_cmd := 'delete\
    \ from ' || :P44_TABLE2 ||\n           ' where ' || :P44_COLUMN2 || :P44_OP2 ||\
    \ :P44_VALUE2;\n  execute immediate v_cmd;\nend;\nListing 12-4\nIncorrect Code\
    \ for the Delete2 Process\n```\n\nThe issue is how to get a query to place quotes\
    \ around the value if it is a string, but not if it is a number. The solution,\
    \ as you saw in Chapter 3, is to use a bind variable reference. For example, the\
    \ query you would like to generate for the `Delete2` process should look like\
    \ this:\n\n```sql\nselect count(*) from EMP into v_count\nwhere Job = :P44_VALUE\n\
    ```\n\nHowever, the `execute immediate` command is fussy about bind variables.\
    \ In particular, the command does not allow bind variables in the generated query;\
    \ instead, it has a `using` clause especially for this purpose. Listing 12-5 gives\
    \ the correct code for the `Delete2` process.\n\n```sql\ndeclare\n  v_cmd varchar2(100);\n\
    begin\n  v_cmd := 'delete from ' || :P44_TABLE2 ||\n           ' where ' || :P44_COLUMN2\
    \ || :P44_OP2 || ' :1';\n  execute immediate v_cmd\n    using :P44_VALUE2;\n \
    \ :P44_RESULT2 := SQL%rowcount || ' records were deleted.';\nend;\nListing 12-5\n\
    Correct Code for the Delete2 Process\n```\n\nNote that the generated query has\
    \ the expression \"`:1`\" where the bind variable belongs. This expression is\
    \ a placeholder. When the `execute immediate` command runs, it will replace the\
    \ placeholder with the value in its `using` clause. If the query requires more\
    \ than one bind variable, then it uses multiple placeholders and the bind variables\
    \ in the using clause are separated by commas.\n\nIn Listing 12-5, there is only\
    \ one placeholder, namely, `:1`. A placeholder has the same function as the formal\
    \ parameter of a procedure. In effect, the `execute immediate` statement \"calls\"\
    \ the SQL statement, passing it the value of each bind variable reference. The\
    \ names of the placeholders are irrelevant. APEX will assign the values from the\
    \ `using` clause to the placeholders in the order in which the placeholders appear\
    \ in the SQL statement.\n\nFinally, the process for the button `Count2`, also\
    \ named `Count2`, appears in Listing 12-6. Note that the constructed string is\
    \ a query and uses a bind variable; thus, the `execute immediate` command will\
    \ use both the `into` and `using` clauses.\n\n```sql\ndeclare\n  v_query varchar2(100);\n\
    \  v_count int;\nbegin\n  v_query := 'select count(*) from ' || :P44_TABLE2 ||\n\
    \             ' where ' || :P44_COLUMN2 || :P44_OP2 || ' :1';\n  execute immediate\
    \ v_query\n    into v_count\n    using :P44_VALUE2;\n  :P44_RESULT2 := 'There\
    \ are ' || v_count || ' records.';\nend;\nListing 12-6\nCode for the Count2 Process\n\
    ```\n\n## Combining Dynamic Reports and Processes\n\nFor a final example, I want\
    \ to reconsider the `Single Row View` page from Figure 7-17, which is page 20\
    \ of the `Employee Demo` application. Recall that this page displays a report\
    \ of all employees, sorted by `EName`. When a user selects an employee, the page\
    \ turns into single row mode, displaying the data of the selected row and providing\
    \ buttons to navigate to the previous and next row in sorted order.\n\nThe task\
    \ is to modify the page so that a user can dynamically change the sort order of\
    \ the rows. Figure 12-5 illustrates the new page, called `Sortable Single Row\
    \ View`, which is page 45 of the demo application. The page is identical to the\
    \ Single Row View page except that it also has a select list for specifying the\
    \ desired sort field. Selecting a sort field will cause the report to be redisplayed\
    \ in that sort order; in addition, clicking the `Previous` or `Next` button will\
    \ use that sort order to determine the new current row.\n\n![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig5_HTML.jpg](images/335103_3_En_12_Chapter/335103_3_En_12_Fig5_HTML.jpg)\n\
    \nFigure 12-5\nSortable Single Row View page\n\nAs with Figure 7-17, Figure 12-5\
    \ shows both the `Employees` and `Emp Info` regions, even though only one of them\
    \ is displayed at a time.\n\nThe easiest way to create this page is to copy page\
    \ 20. This operation was discussed in Chapter 7 (see Figure 7-8). To review, go\
    \ to the page designer for any page, click the **+** icon near the top, and select\
    \ `Page as Copy` to initiate the `Page Copy` wizard. If you have trouble following\
    \ the wizard, refer back to Chapter 7.\n\nWhen copying a page, you must ensure\
    \ that its various item references are updated. It turns out that item references\
    \ within the PL/SQL code get updated, but references produced by the link builder\
    \ do not. Thus, the target of the link for the `EMPNO` column incorrectly redirects\
    \ to page 20 and sets the value of `P20_EMPNO`. In general, you should correct\
    \ these values, but in this case there is no need because you are about to replace\
    \ these columns with new ones.\n\nAfter you have successfully copied the page,\
    \ you can modify it. The first modification is to add a select list to the `Employees`\
    \ region so users can choose the sort field. This select list is named `P45_SORTFIELD`\
    \ and has the static values `[EName, Job, Sal, DeptNo]`. Its action should be\
    \ `Redirect and Set Value`.\n\nThe presence of a changeable sort field affects\
    \ two parts of the page: the source query for the report and the process that\
    \ computes the next/previous records in single-record mode. You need to use dynamic\
    \ SQL in both cases. The report’s source query is generated by the PL/SQL code\
    \ of Listing 12-7.\n\n```sql\ndeclare\n  v_sort varchar2(20);\nbegin\n  if :P45_SORTFIELD\
    \ is null then\n    v_sort := 'EName';\n  else\n    v_sort := :P45_SORTFIELD;\n\
    \  end if;\n  return 'select EmpNo, EName, Job, Sal, DeptNo from EMP ' ||\n  \
    \       'order by ' || v_sort;\nend;\nListing 12-7\nPL/SQL Source Code for the\
    \ Employees Report\n```\n\nThis query uses dynamic SQL to construct the appropriate\
    \ query, based on the selected sort field. If no sort field has been selected,\
    \ `EName` is the default. Because you are using dynamic SQL, you should enable\
    \ the `Use Generic Column Names` property and specify a `Generic Column Count`\
    \ of `5`. APEX will create five columns, named `COL01` through `COL05`. Because\
    \ the column headings in this report will be the same regardless of the sort field,\
    \ you can hardcode them into the report’s `Heading` section. In particular, the\
    \ value of the `PL/SQL Function Body` property will be:\n\n```sql\nreturn ':EName:Job:Sal:DeptNo';\n\
    ```\n\nThis string begins with a colon because the heading of the first column\
    \ is empty."
