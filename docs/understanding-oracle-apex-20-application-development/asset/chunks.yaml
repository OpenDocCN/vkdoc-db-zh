  trans: '

    # 创建应用程序


    ## 访问应用构建器


    要使用应用构建器，您需要进入其主屏幕。图 1-2 展示了两种方法：您可以点击 APEX 菜单栏中的 `App Builder` 选项卡，也可以点击 APEX
    主屏幕上的大型 `App Builder` 按钮。两种方式都会带您进入如图 2-1 所示的屏幕。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig1_HTML.jpg](img/335103_3_En_2_Fig1_HTML.jpg)


    *图 2-1：应用构建器主屏幕*


    ## 创建新应用程序


    图 2-1 显示了可用于创建新应用程序的两个按钮：左上角的大型 `Create` 按钮，以及搜索栏最右侧的较小绿色 `Create` 按钮。点击任一按钮都会打开
    `创建应用程序` 向导。


    ## 选择应用程序类型


    向导的第一个屏幕如图 2-2 所示。它要求您选择一个应用程序类型。您正在创建一个新应用程序，因此点击 `新建应用程序`。中间的按钮允许您从现有的电子表格（或类似）文件创建应用程序，而最右侧的按钮则允许您从
    APEX 应用程序库中导入预先构建好的应用程序。在您熟悉 APEX 之后，可以探索应用程序库。它包含许多有趣的应用程序——有些为典型的数据库任务提供了解决方案，另一些则展示了
    APEX 的高级功能。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig2_HTML.jpg](img/335103_3_En_2_Fig2_HTML.jpg)


    *图 2-2：创建应用程序向导的第一个屏幕*


    ## 配置应用程序详细信息


    向导的第二个屏幕如图 2-3 所示。您应在页面左上角的文本字段中输入所需应用程序的名称；我选择了 `员工演示`。页面其余部分显示了应用程序的默认配置，并邀请您进行自定义。例如，`外观`
    属性声明新应用程序将使用 `Vita` 主题，并在左侧显示其导航菜单。如果您愿意，可以通过点击右侧的“设置外观”按钮来更改此外观。将出现一个屏幕，向您展示其他可供选择的主题，并允许您更改导航菜单的位置。您还可以选择应用构建器用来标识您的应用程序的图标。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig3_HTML.jpg](img/335103_3_En_2_Fig3_HTML.jpg)


    *图 2-3：创建应用程序向导的第二个屏幕*


    ## 配置页面、功能和设置


    屏幕的 `页面` 部分声明新应用程序将包含一个名为 `Home` 的空白页面。您可以通过点击 `编辑` 按钮来编辑该页面，也可以添加其他页面。尽管此功能对于有经验的开发者可能很有用，但并非必需——您可以在应用程序创建后轻松地添加和编辑页面。保持默认页面不变是最简单的。


    `功能` 部分允许您指定典型网站共有的几个有用功能。这些功能可以在以后添加，因此现在无需指定。


    `设置` 部分包含一些其他设置。`应用程序 ID` 值由向导分配，并在 APEX 服务器上唯一标识您的应用程序。我的 `员工演示` 应用程序被分配了编号 91392；您的将会不同。这里另一个值得一提的属性是
    `认证`。此属性的值决定了人们如何登录到您的应用程序。默认值为 `Application Express 账户`，这将仅允许在您工作区拥有账户的用户登录。另一个选项是
    `数据库`，这将只允许底层数据库的用户登录。目前，请保持默认设置。第 13 章在探讨各种认证选项时，将重新审视这个选择。


    ## 完成创建


    当您准备好让 APEX 创建您的应用程序时，点击绿色的 `创建应用程序` 按钮。您将被带回应用构建器主屏幕，该屏幕现在应该会显示您应用程序的一个条目。图 2-4
    显示了我创建 `员工演示` 后的该屏幕。通常，应用构建器主屏幕包含您创建的每个应用程序的条目。这些条目既可以显示为报表中的行（如图 2-4 所示），也可以显示为图标。查看图
    2-4 中 `Go` 按钮右侧的两个切换按钮。最左侧的切换按钮以图标形式显示条目，最右侧的则以报表形式显示它们。请试试看。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig4_HTML.jpg](img/335103_3_En_2_Fig4_HTML.jpg)


    *图 2-4：更新后的应用构建器主屏幕*

    '
- fmt: '## Editing Application Properties


    点击应用程序条目的名称将带你进入该应用程序的主屏幕，其中包含该应用程序每个页面的条目。例如，我的应用程序的初始主屏幕如图[2-5](#335103_3_En_2_Chapter.xhtml#Fig5)所示。该屏幕包含三个页面的条目：一个全局页面、一个主页和一个登录页面。请注意，图中的条目显示为图标。也可以使用与图[2-4](#335103_3_En_2_Chapter.xhtml#Fig4)中相同的切换按钮，将它们显示为报告中的行。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig5_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig5_HTML.jpg)


    **图 2-5**


    **新创建的应用程序主屏幕**


    每个应用程序都有许多可定制的属性。点击主屏幕右上角的`Edit Application Properties`按钮，会显示一个属性屏幕，其顶部如图[2-6](#335103_3_En_2_Chapter.xhtml#Fig6)所示。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig6_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig6_HTML.jpg)


    **图 2-6**


    **编辑应用程序的属性**


    该屏幕为了便于管理，将应用程序的属性组织成`sections`。图[2-6](#335103_3_En_2_Chapter.xhtml#Fig6)显示了`Name`部分及其五个属性。第一个属性`Application`保存分配给该应用程序的ID，且不可修改。其他属性是可修改的；只需在文本框中键入所需值（或者在`Application
    Group`的情况下从下拉列表中选择一个值），然后点击`Apply Changes`按钮。对我们来说，唯一有趣的属性是`Name`，它允许你更改应用程序名称。


    某些属性的标签包含一个红色星号。该星号意味着该属性必须具有非空值。


    每个属性的右侧都有一个小问号图标。点击该图标会显示该属性的帮助文本，当某个属性你不熟悉并且想要了解其用途时，这尤其有用。作为一个实验，点击`Name`部分中每个属性的帮助图标，看看它们的用途是否符合你的预期。


    再看图[2-6](#335103_3_En_2_Chapter.xhtml#Fig6)，注意`Name`部分上方的标签行。第一个标签为`Show All`，并且当前被选中；其他标签则按部分名称标注。`Show
    All`标签在一个屏幕上显示所有部分的属性。点击某个部分标签会显示该部分的属性。再次强调，点击每个部分属性的帮助图标是一个有用的练习，哪怕只是为了了解可以进行何种自定义。大多数属性可能看起来晦涩难懂，因为你还没有深入研究APEX。当然，目前（除了`Name`之外）它们都不怎么有趣。


    你的应用程序还有更多属性。看图[2-6](#335103_3_En_2_Chapter.xhtml#Fig6)顶部的四个链接，分别标记为`Definition`、`Security`、`Globalization`和`User
    Interface`。注意`Definition`是被选中的，这意味着你到目前为止只看到了定义属性。点击其他三个链接可以快速查看其他属性。安全属性管理各种安全限制，是第[13](#335103_3_En_13_Chapter.xhtml)章的主题。全球化属性允许你修改时间/日期设置。用户界面属性则管理某些页面显示问题。这里，`Logo`部分很有趣——它可以让你管理出现在应用程序每个页面左上角的logo。默认情况下，logo是应用程序的名称，但你可以指定任何想要的文本甚至图像。例如，你可能已经注意到APEX屏幕都有一个基于图像的Oracle
    logo。我们将在第[3](#335103_3_En_3_Chapter.xhtml)章回到`Logo`属性。


    ## Deleting an Application


    有两种方法可以删除应用程序。应用程序主屏幕的右侧包含一个名为`Delete This Application`的任务；点击该链接即可执行删除操作。或者，在应用程序的全局属性屏幕（参见图[2-6](#335103_3_En_2_Chapter.xhtml#Fig6)）上，你可以点击`Apply
    Changes`按钮左侧的`Delete`按钮；该按钮在显示`Definition`属性时出现。


    ## Running an Application Page


    Web应用程序是Web页面的集合。通过`running a page`，你是在请求APEX在你的浏览器中呈现它。术语`running an application`是运行其主页的简写。有两种方法可以运行一个页面：从APEX内部（作为开发者）和从APEX外部（作为用户）。接下来的章节将分别考虑这两种方式。'
  raw: '## Editing Application Properties


    Clicking the name of an application''s entry takes you to the home screen for
    that application, which has an entry for each of the application’s pages. For
    example, the initial home screen for my application appears in Figure [2-5](#335103_3_En_2_Chapter.xhtml#Fig5).
    The screen has entries for three pages: a global page, the home page, and a login
    page. Note that the entries in the figure are displayed as icons. It is also possible
    to display them as rows in a report, using the same toggle buttons as in Figure
    [2-4](#335103_3_En_2_Chapter.xhtml#Fig4).


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig5_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Home screen of a newly created application


    Each application has numerous customization properties. Clicking the `Edit Application
    Properties` button at the top right of the home screen displays a screen of properties,
    the top of which is shown in Figure [2-6](#335103_3_En_2_Chapter.xhtml#Fig6).


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig6_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Editing an application’s properties


    The screen organizes the application’s properties into *sections* for manageability.
    Figure [2-6](#335103_3_En_2_Chapter.xhtml#Fig6) displays the `Name` section and
    its five properties. The first property, `Application`, holds the ID assigned
    to that application and cannot be modified. The other properties are modifiable;
    simply type the desired value into the text box (or select a value from the select
    list in the case of `Application Group`) and click the `Apply Changes` button.
    For us, the only interesting property is `Name`, which lets you change the application
    name.


    The label of some properties contains a red asterisk. The asterisk means that
    the property must have a non-null value.


    To the right of each property is a small question mark icon. Clicking that icon
    displays help text for that property, which is especially useful when a property
    is unfamiliar to you and you want to understand its purpose. As an experiment,
    click the help icon for each of the properties in the `Name` section and see if
    their purpose is what you expected.


    Looking again at Figure [2-6](#335103_3_En_2_Chapter.xhtml#Fig6), notice the row
    of tabs above the `Name` section. The first tab is labeled `Show All`, and is
    currently selected; the others are labeled by section names. The `Show All` tab
    displays the properties of all sections in a single screen. Clicking one of the
    section tabs displays the properties for that section. Again, clicking the help
    icon for the properties in each section is a useful exercise, if only to get a
    sense of what kind of customization is possible. Most of the properties will seem
    obscure because you have not delved very deeply into APEX. Certainly none of them
    (apart from `Name`) is interesting at this point.


    Your application has still more properties. Look at the four links at the top
    of Figure [2-6](#335103_3_En_2_Chapter.xhtml#Fig6), labeled `Definition`, `Security`,
    `Globalization`, and `User Interface`. Note that `Definition` is selected, meaning
    that you have so far seen only the definition properties. Click the other three
    links to get a quick look at the other properties. The security properties govern
    various security restrictions and are the subject of Chapter [13](#335103_3_En_13_Chapter.xhtml).
    The globalization properties allow you to modify the time/date settings. And the
    user interface properties govern certain page display issues. Here, the `Logo`
    section is of interest—it lets you manage the logo that appears at the top left
    of each page of the application. By default, the logo is the name of the application,
    but you can specify any desired text or even an image. For example, you may have
    noticed that the APEX screens all have an image-based Oracle logo. We will return
    to the `Logo` properties in Chapter [3](#335103_3_En_3_Chapter.xhtml).


    ## Deleting an Application


    There are two ways to delete an application. The right side of the application’s
    home screen contains a task labeled `Delete This Application` ; clicking the link
    performs the deletion. Alternatively, on the application’s global properties screen
    (refer to Figure [2-6](#335103_3_En_2_Chapter.xhtml#Fig6)), you can click the
    `Delete` button to the left of the `Apply Changes` button; this button appears
    when the `Definition` properties are shown.


    ## Running an Application Page


    A web application is a collection of web pages. By *running a page*, you are asking
    APEX to render it in your browser. The term *running an application* is shorthand
    for running its home page. There are two ways to run a page: from within APEX
    (as a developer) and from outside of APEX (as a user). Each is considered in the
    following sections.'
  trans: '## 编辑应用程序属性


    点击应用程序条目的名称将带你进入该应用程序的主屏幕，其中包含该应用程序每个页面的条目。例如，我的应用程序的初始主屏幕如图 2-5 所示。该屏幕包含三个页面的条目：一个全局页面、一个主页和一个登录页面。请注意，图中的条目显示为图标。也可以使用与图
    2-4 中相同的切换按钮，将它们显示为报告中的行。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig5_HTML.jpg](img/335103_3_En_2_Fig5_HTML.jpg)


    **图 2-5**


    **新创建的应用程序主屏幕**


    每个应用程序都有许多可定制的属性。点击主屏幕右上角的`Edit Application Properties`按钮，会显示一个属性屏幕，其顶部如图 2-6
    所示。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig6_HTML.jpg](img/335103_3_En_2_Fig6_HTML.jpg)


    **图 2-6**


    **编辑应用程序的属性**


    该屏幕为了便于管理，将应用程序的属性组织成`sections`。图 2-6 显示了`Name`部分及其五个属性。第一个属性`Application`保存分配给该应用程序的
    ID，且不可修改。其他属性是可修改的；只需在文本框中键入所需值（或者在`Application Group`的情况下从下拉列表中选择一个值），然后点击`Apply
    Changes`按钮。对我们来说，唯一有趣的属性是`Name`，它允许你更改应用程序名称。


    某些属性的标签包含一个红色星号。该星号意味着该属性必须具有非空值。


    每个属性的右侧都有一个小问号图标。点击该图标会显示该属性的帮助文本，当某个属性你不熟悉并且想要了解其用途时，这尤其有用。作为一个实验，点击`Name`部分中每个属性的帮助图标，看看它们的用途是否符合你的预期。


    再看图 2-6，注意`Name`部分上方的标签行。第一个标签为`Show All`，并且当前被选中；其他标签则按部分名称标注。`Show All`标签在一个屏幕上显示所有部分的属性。点击某个部分标签会显示该部分的属性。再次强调，点击每个部分属性的帮助图标是一个有用的练习，哪怕只是为了了解可以进行何种自定义。大多数属性可能看起来晦涩难懂，因为你还没有深入研究
    APEX。当然，目前（除了`Name`之外）它们都不怎么有趣。


    你的应用程序还有更多属性。看图 2-6 顶部的四个链接，分别标记为`Definition`、`Security`、`Globalization`和`User
    Interface`。注意`Definition`是被选中的，这意味着你到目前为止只看到了定义属性。点击其他三个链接可以快速查看其他属性。安全属性管理各种安全限制，是第
    13 章的主题。全球化属性允许你修改时间/日期设置。用户界面属性则管理某些页面显示问题。这里，`Logo`部分很有趣——它可以让你管理出现在应用程序每个页面左上角的
    logo。默认情况下，logo 是应用程序的名称，但你可以指定任何想要的文本甚至图像。例如，你可能已经注意到 APEX 屏幕都有一个基于图像的 Oracle
    logo。我们将在第 3 章回到`Logo`属性。


    ## 删除应用程序


    有两种方法可以删除应用程序。应用程序主屏幕的右侧包含一个名为`Delete This Application`的任务；点击该链接即可执行删除操作。或者，在应用程序的全局属性屏幕（参见图
    2-6）上，你可以点击`Apply Changes`按钮左侧的`Delete`按钮；该按钮在显示`Definition`属性时出现。


    ## 运行应用程序页面


    Web 应用程序是 Web 页面的集合。通过`running a page`，你是在请求 APEX 在你的浏览器中呈现它。术语`running an application`是运行其主页的简写。有两种方法可以运行一个页面：从
    APEX 内部（作为开发者）和从 APEX 外部（作为用户）。接下来的章节将分别考虑这两种方式。'
- fmt: '### 在 APEX 中运行页面


    在 APEX 中运行应用程序最简单的方法是点击应用程序主页左上角的大号 `Run Application` 按钮（参考图 [2-5](#335103_3_En_2_Chapter.xhtml#Fig5)）。或者，你可以转到应用程序构建器主页中该应用程序的条目（图
    [2-4](#335103_3_En_2_Chapter.xhtml#Fig4)）并点击其 `Run` 按钮。


    要运行应用程序的任意页面，你必须为该页面打开页面设计器。（页面设计器将在本章后面讨论，你可以在图 [2-12](#335103_3_En_2_Chapter.xhtml#Fig12)
    中找到其截图。）点击设计器右上角的绿色箭头按钮来运行该页面。


    无论你以哪种方式运行新创建的应用程序，你都会发现应用程序会要求你输入姓名和密码，如图 [2-7](#335103_3_En_2_Chapter.xhtml#Fig7)
    所示。这是你在创建应用程序时指定的授权方案的结果。回想一下，你指定了通过 `Application Express Accounts` 进行授权，这意味着只有拥有应用程序工作区账户的人才能运行该应用程序。换句话说，图
    [2-7](#335103_3_En_2_Chapter.xhtml#Fig7) 的窗口向你询问的是与你登录 APEX 所使用的相同用户名/密码。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig7_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig7_HTML.jpg)

    图 2-7

    登录到你的应用程序


    如果你是工作区的管理员（当你注册 `apex.oracle.com` 账户时就会发生），那么你很可能是该工作区中唯一拥有账户的人。如果你希望其他人能够使用你的应用程序，那么你有两个选择：你可以在你的工作区中创建额外的账户，或者你可以使用另一种身份验证方法。这些选项将在第
    [13](#335103_3_En_13_Chapter.xhtml) 章中讨论。


    成功登录后，APEX 将显示请求的页面。图 [2-8](#335103_3_En_2_Chapter.xhtml#Fig8) 显示了你应用程序的主页及其当前状态。*导航栏*
    沿着顶部运行。其左侧是徽标，默认情况下是应用程序的名称。其右侧是你的用户名；点击它可以注销。*导航菜单* 沿着页面左侧向下运行。它当前包含一个标记为 `Home`
    的条目。点击徽标左侧的图标可切换此菜单的可见性。该页面包含一个名为 `Employee Demo` 的面包屑区域，除此之外是空的。该页面没有其他内容，因为你当然尚未指定任何内容。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig8_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig8_HTML.jpg)

    图 2-8

    从 APEX 内部运行的新创建的主页


    图 [2-8](#335103_3_En_2_Chapter.xhtml#Fig8) 还显示了页面底部的一行按钮。这些按钮称为 *开发人员工具栏*，每当从
    APEX 内部运行页面时就会出现。有三个按钮对于构建和调试你的应用程序特别有用。`Edit Page` 按钮将你带到当前页面的页面设计器以便编辑。`Application`
    按钮将你带到当前应用程序的主页以便处理其他页面。而 `Session` 按钮会弹出一个窗口，显示应用程序的当前状态，以便你可以验证其行为是否正确。后一个主题将在第
    [6](#335103_3_En_6_Chapter.xhtml) 章中讨论。


    如果你愿意，可以从你的应用程序中移除工具栏。再次查看图 [2-6](#335103_3_En_2_Chapter.xhtml#Fig6) 的 `Application
    Properties` 页面，并注意其中有一个名为 `Availability` 的部分。此部分具有属性 `Status`，用于指定如何访问应用程序。默认值通常是
    `Available with Developer Toolbar`，它指定工具栏对开发人员可见。如果你不想要该工具栏，请将值更改为 `Available`。


    ### 从 APEX 外部运行页面


    APEX 的 `Create Application` 向导为每个新应用程序分配一个 ID 号。从图 [2-3](#335103_3_En_2_Chapter.xhtml#Fig3)
    可以看到，我的 `Employee Demo` 应用程序被分配了 ID 91392。这个数字在应用程序构建器中处处显示；事实上，自那时起除了图 [2-7](#335103_3_En_2_Chapter.xhtml#Fig7)
    之外的每个图形中它都出现了。APEX 也会为应用程序的每个页面分配一个 ID 号。默认情况下，主页的 ID 是 1，全局页面（将在第 [4](#335103_3_En_4_Chapter.xhtml)
    章讨论）是 0，登录页面是 9999。


    要从 APEX 外部运行一个页面，你需要其 URL。此 URL 包含一些标识 APEX 服务器的字符，后跟应用程序 ID 和页面 ID。例如，我的 `Employee
    Demo` 主页的 URL 是


    [`https://apex.oracle.com/pls/apex/f?p=91392:1`](https://apex.oracle.com/pls/apex/f%253Fp%253D91392:1.)


    直到字符 `f?p=` 为止，此 URL 对于由 `apex.oracle.com` 服务器托管的每个 APEX 应用程序都是相同的。等号后的字符是应用程序
    ID 和页面 ID，用冒号分隔。如果你在 URL 中省略页面 ID，APEX 会假定你指的是页面 1。


    如果你在提交此 URL 时已登录到应用程序的工作区，那么开发人员工具栏将显示在屏幕底部，就像你从 APEX 内部运行应用程序一样。否则，你将看到没有它的页面，就像普通用户看到的那样。'
  raw: '### Running a Page from Within APEX


    The easiest way to run an application from within APEX is to click the big `Run
    Application` button on the top left of the application’s home screen (refer to
    Figure [2-5](#335103_3_En_2_Chapter.xhtml#Fig5)). Alternatively, you can go to
    the entry for the application in the app builder’s home screen (Figure [2-4](#335103_3_En_2_Chapter.xhtml#Fig4))
    and click its `Run` button.


    To run an arbitrary page of an application, you must open the page designer for
    that page. (The page designer will be discussed later in this chapter, but you
    can find a screenshot of it in Figure [2-12](#335103_3_En_2_Chapter.xhtml#Fig12).)
    Click the green arrow button on the top right of the designer to run the page.


    Whichever way you run your newly created application, you will discover that the
    application asks you for your name and password, as shown in Figure [2-7](#335103_3_En_2_Chapter.xhtml#Fig7).
    This is a consequence of the authorization scheme that you specified when you
    created the application. Recall that you specified authorization by “Application
    Express Accounts,” which means that people can run the application only if they
    have an account in the application’s workspace. In other words, the window of
    Figure [2-7](#335103_3_En_2_Chapter.xhtml#Fig7) is asking you for the same username/password
    that you use to log into APEX.


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig7_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig7_HTML.jpg)


    Figure 2-7


    Logging into your application


    If you are the administrator of the workspace (which occurs when you register
    for an apex.oracle.com account), then you are likely to be the only person having
    an account in the workspace. If you would like others to be able to use your application,
    then you have two choices: you can create additional accounts in your workspace,
    or you can use another authentication method. These options will be discussed
    in Chapter [13](#335103_3_En_13_Chapter.xhtml).


    Once you have logged in successfully, APEX will display the requested page. Figure
    [2-8](#335103_3_En_2_Chapter.xhtml#Fig8) shows the home page for your application
    as it currently stands. The *navigation bar* runs along the top. At its left is
    the logo, which by default is the name of the application. At its right is your
    username; clicking it lets you sign out. The *navigation menu* runs down the left
    side of the page. It currently contains a single entry labeled `Home`. Clicking
    the icon to the left of the logo toggles the visibility of this menu. The page
    contains a breadcrumb region titled `Employee Demo` that is otherwise empty. The
    page has no other content because, of course, you have not yet specified any.


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig8_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig8_HTML.jpg)


    Figure 2-8


    Newly created home page run from within APEX


    Figure [2-8](#335103_3_En_2_Chapter.xhtml#Fig8) also shows a row of buttons along
    the bottom of the page. These buttons, known as the *developer toolbar* , appear
    whenever you run a page from within APEX. Three buttons are particularly useful
    for building and debugging your application. The `Edit Page` button takes you
    to the page designer for the current page so that you can edit it. The `Application`
    button takes you to the home page for the current application so that you can
    work on a different page. And the `Session` button pops up a window that displays
    the current state of the application so that you can verify that it is behaving
    correctly. This latter topic will be discussed in Chapter [6](#335103_3_En_6_Chapter.xhtml).


    If you wish, you can remove the toolbar from your application. Look again at the
    `Application Properties` page of Figure [2-6](#335103_3_En_2_Chapter.xhtml#Fig6),
    and note that it has a section named `Availability`. This section has the property
    `Status`, which specifies how the application is accessed. The default value is
    usually `Available with Developer Toolbar`, which specifies that the toolbar will
    be visible to developers. If you don’t want the toolbar, change the value to `Available`.


    ### Running a Page from Outside APEX


    The APEX `Create Application` wizard assigns an ID number to each new application.
    You can see from Figure [2-3](#335103_3_En_2_Chapter.xhtml#Fig3) that my `Employee
    Demo` application was assigned the ID 91392\. This number is displayed throughout
    the app builder; in fact, it has appeared in every figure since then (except Figure
    [2-7](#335103_3_En_2_Chapter.xhtml#Fig7)). APEX also assigns an ID number to every
    page of an application. By default, the ID of the home page is 1, the global page
    (to be discussed in Chapter [4](#335103_3_En_4_Chapter.xhtml)) is 0, and the login
    page is 9999.


    To run a page from outside of APEX, you need its URL. This URL consists of some
    characters that identify the APEX server, followed by the application ID and page
    ID. For example, the URL for my `Employee Demo` home page is


    [`https://apex.oracle.com/pls/apex/f?p=91392:1`](https://apex.oracle.com/pls/apex/f%253Fp%253D91392:1.)


    Up through the characters `f?p=`, this URL is the same for every APEX application
    hosted by the `apex.oracle.com` server. The characters following the equals sign
    are the application ID and page ID, separated by a colon. If you omit the page
    ID from the URL, APEX assumes that you mean page 1.


    If you are logged into the application’s workspace when you submit this URL, then
    the developer toolbar will be displayed at the bottom of the screen just as if
    you had run the application from within APEX. Otherwise, you will see the page
    without it, exactly as a regular user does.'
  trans: '### 在 APEX 中运行页面


    在 APEX 中运行应用程序最简单的方法是点击应用程序主页左上角的大号 `Run Application` 按钮（参考图 2-5）。或者，你可以转到应用程序构建器主页中该应用程序的条目（图
    2-4）并点击其 `Run` 按钮。


    要运行应用程序的任意页面，你必须为该页面打开页面设计器。（页面设计器将在本章后面讨论，你可以在图 2-12 中找到其截图。）点击设计器右上角的绿色箭头按钮来运行该页面。


    无论你以哪种方式运行新创建的应用程序，你都会发现应用程序会要求你输入姓名和密码，如图 2-7 所示。这是你在创建应用程序时指定的授权方案的结果。回想一下，你指定了通过
    `Application Express Accounts` 进行授权，这意味着只有拥有应用程序工作区账户的人才能运行该应用程序。换句话说，图 2-7 的窗口向你询问的是与你登录
    APEX 所使用的相同用户名/密码。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig7_HTML.jpg](img/335103_3_En_2_Fig7_HTML.jpg)

    图 2-7

    登录到你的应用程序


    如果你是工作区的管理员（当你注册 `apex.oracle.com` 账户时就会发生），那么你很可能是该工作区中唯一拥有账户的人。如果你希望其他人能够使用你的应用程序，那么你有两个选择：你可以在你的工作区中创建额外的账户，或者你可以使用另一种身份验证方法。这些选项将在第
    13 章中讨论。


    成功登录后，APEX 将显示请求的页面。图 2-8 显示了你应用程序的主页及其当前状态。*导航栏* 沿着顶部运行。其左侧是徽标，默认情况下是应用程序的名称。其右侧是你的用户名；点击它可以注销。*导航菜单*
    沿着页面左侧向下运行。它当前包含一个标记为 `Home` 的条目。点击徽标左侧的图标可切换此菜单的可见性。该页面包含一个名为 `Employee Demo`
    的面包屑区域，除此之外是空的。该页面没有其他内容，因为你当然尚未指定任何内容。


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig8_HTML.jpg](img/335103_3_En_2_Fig8_HTML.jpg)

    图 2-8

    从 APEX 内部运行的新创建的主页


    图 2-8 还显示了页面底部的一行按钮。这些按钮称为 *开发人员工具栏*，每当从 APEX 内部运行页面时就会出现。有三个按钮对于构建和调试你的应用程序特别有用。`Edit
    Page` 按钮将你带到当前页面的页面设计器以便编辑。`Application` 按钮将你带到当前应用程序的主页以便处理其他页面。而 `Session` 按钮会弹出一个窗口，显示应用程序的当前状态，以便你可以验证其行为是否正确。后一个主题将在第
    6 章中讨论。


    如果你愿意，可以从你的应用程序中移除工具栏。再次查看图 2-6 的 `Application Properties` 页面，并注意其中有一个名为 `Availability`
    的部分。此部分具有属性 `Status`，用于指定如何访问应用程序。默认值通常是 `Available with Developer Toolbar`，它指定工具栏对开发人员可见。如果你不想要该工具栏，请将值更改为
    `Available`。


    ### 从 APEX 外部运行页面


    APEX 的 `Create Application` 向导为每个新应用程序分配一个 ID 号。从图 2-3 可以看到，我的 `Employee Demo`
    应用程序被分配了 ID 91392。这个数字在应用程序构建器中处处显示；事实上，自那时起除了图 2-7 之外的每个图形中它都出现了。APEX 也会为应用程序的每个页面分配一个
    ID 号。默认情况下，主页的 ID 是 1，全局页面（将在第 4 章讨论）是 0，登录页面是 9999。


    要从 APEX 外部运行一个页面，你需要其 URL。此 URL 包含一些标识 APEX 服务器的字符，后跟应用程序 ID 和页面 ID。例如，我的 `Employee
    Demo` 主页的 URL 是


    [`https://apex.oracle.com/pls/apex/f?p=91392:1`](https://apex.oracle.com/pls/apex/f%253Fp%253D91392:1.)


    直到字符 `f?p=` 为止，此 URL 对于由 `apex.oracle.com` 服务器托管的每个 APEX 应用程序都是相同的。等号后的字符是应用程序
    ID 和页面 ID，用冒号分隔。如果你在 URL 中省略页面 ID，APEX 会假定你指的是页面 1。


    如果你在提交此 URL 时已登录到应用程序的工作区，那么开发人员工具栏将显示在屏幕底部，就像你从 APEX 内部运行应用程序一样。否则，你将看到没有它的页面，就像普通用户看到的那样。'
- fmt: '# Creating a New Page


    There are several ways to create a new page for your application, but the most
    direct way is to click the `Create Page` button on the application’s home screen
    (refer to Figure [2-5](#335103_3_En_2_Chapter.xhtml#Fig5)). Doing so brings up
    the `Create Page` wizard. You should use this wizard to create a second page for
    your application.


    The first screen of the wizard, shown in Figure [2-9](#335103_3_En_2_Chapter.xhtml#Fig9),
    asks you to choose the page type. For now, I suggest that you create only blank
    pages; the other page types are shortcuts intended for experienced developers
    (or clueless beginners). For example, a `Report` page is simply a blank page containing
    a report region.


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig9_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig9_HTML.jpg)


    Figure 2-9: First screen of the Create Page wizard


    The second wizard screen asks for the name, number, and mode of the page; see
    Figure [2-10](#335103_3_En_2_Chapter.xhtml#Fig10). Feel free to use the page number
    suggested by the wizard. Enter `Region Practice` for the page name, and set the
    mode to `Normal`. (The other modes will be discussed in the “Property Editor”
    section.) The `Breadcrumb` property specifies whether the page should display
    a breadcrumb. Breadcrumbs will be discussed in Chapter [4](#335103_3_En_4_Chapter.xhtml);
    for now, set the `Breadcrumb` property to `don''t use breadcrumbs on page`.


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig10_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig10_HTML.jpg)


    Figure 2-10: Second screen of the Create Page wizard


    Figure [2-11](#335103_3_En_2_Chapter.xhtml#Fig11) shows the third wizard screen,
    which asks you to specify whether the page should have a navigation menu entry.
    Selecting the `Create A New Navigation Menu Entry` option causes the screen to
    display items for you to specify the name of the entry and its parent. These options
    will be discussed in more detail in Chapter [4](#335103_3_En_4_Chapter.xhtml);
    for now, use the values `Region Practice` and `No parent selected`, as shown in
    the figure.


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig11_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig11_HTML.jpg)


    Figure 2-11: Third screen of the Create Page wizard


    The fourth wizard screen (not shown) asks for confirmation. When you click its
    `Finish` button, APEX will bring you to the page designer for your new page. But
    before you delve into the page designer and its use, you should take a look at
    the page you just created.


    Return to your application’s home screen (Figure [2-4](#335103_3_En_2_Chapter.xhtml#Fig4)),
    either by clicking the link on the page designer’s breadcrumb or by clicking the
    `App Builder` tab and then selecting the icon for your application. The screen
    should now contain an icon for page 2. Run your application and observe that the
    navigation menu now has two entries. Click the `Region Practice` entry to see
    your new page. Note that this page has even less content than the home page, because
    it is missing the breadcrumb. Also note that you can move between the pages by
    clicking their navigation menu entries.


    # Page Designer


    The APEX page designer screen lets you manage the properties and content of your
    pages. Because a page can have several kinds of component and each component can
    have numerous properties, the page designer is extremely dense and can be daunting
    for beginners. In this book, you will learn about the different parts of the page
    designer gradually, on an as-needed basis. Each time a new APEX feature is introduced,
    you will also see how it relates to the page designer. This section introduces
    the basic functionality of the page designer.


    To get to the page designer for a page, begin at the application’s home screen
    and click the name (or icon) for the desired page. Figure [2-12](#335103_3_En_2_Chapter.xhtml#Fig12)
    shows the top of the page designer screen for your home page.


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig12_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig12_HTML.jpg)


    Figure 2-12: Page designer for the home page


    At the top of Figure [2-12](#335103_3_En_2_Chapter.xhtml#Fig12), to the right
    of the breadcrumb, is a toolbar that consists of several buttons. Here are some
    immediately useful ones:


    *   The `undo` and `redo` buttons (to the right of the lock) restore the page
    to a previous state in the typical way.

    *   The `utilities` button (labeled with a wrench) has a menu item that lets you
    delete the page.

    *   The `save` button saves your changes to the page.

    *   The `run` button (on the right of the save button) saves the page and then
    runs it.


    The page designer supports an iterative page development methodology. The idea
    is to edit the contents of a page from within the page designer and then run the
    page. After examining the output, you return to the page designer and repeat the
    process until the page is satisfactory.


    Below the toolbar are three vertical panels that form the heart of the page designer.
    The left panel displays the components on the page. The right panel specifies
    the properties of a selected component and is called the `property editor`. The
    middle panel provides utility functions.


    The middle panel has three tabs, which correspond to the utility functions `layout`,
    `page search`, and `help`. The `layout` tab, which is selected in Figure [2-12](#335103_3_En_2_Chapter.xhtml#Fig12),
    displays a visual representation of the page layout. You can change the size of
    the middle panel by dragging its left and right borders, and you can click the
    icons at the top of the panel to move between the tabs.


    The left panel, which shows the page’s components, has four tabs: `Rendering`,
    `Dynamic Actions`, `Processing`, and `Page Shared Components`. The panel can display
    the contents of only one tab at a time. You select the tab you want by clicking
    one of the four icons at the top of the panel. This book focuses on the `Rendering`
    and `Processing` tabs and begins with the `Rendering` tab. The `Processing` tab
    will be introduced in Chapter [7](#335103_3_En_7_Chapter.xhtml).


    The `Rendering` tab displays the components that determine the page’s appearance.
    These components are displayed as a tree. The root of the tree denotes the page.
    It has three child nodes, corresponding to the three stages of rendering the page:
    `pre-rendering`, in which components are initialized; `regions`, in which the
    components are rendered; and `post-rendering`, when cleanup activities occur.
    For readability, the rendering tree for page 1 is reproduced in Figure [2-13](#335103_3_En_2_Chapter.xhtml#Fig13).


    ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig13_HTML.jpg](images/335103_3_En_2_Chapter/335103_3_En_2_Fig13_HTML.jpg)


    Figure 2-13: The rendering tree for the home page


    The vast majority of components on a page are in the `Regions` subtree, so let’s
    explore it more closely.


    The real estate of a page is divided into `positions`. For example, the `Breadcrumb
    Bar` position runs along the top of the page, and the `Content Body` position
    encompasses the main central area of the page. Each region in a page is assigned
    to a position.'
