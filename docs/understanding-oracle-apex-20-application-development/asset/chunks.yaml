    \ 展示了正确的代码。\n\n```sql\ndeclare\n  v_query varchar2(100);\n  v_count integer;\n\
    begin\n  v_query := 'select count(*) from ' || :P44_TABLE1 ||\n             '\
    \ where ' || :P44_WHERE1;\n  execute immediate v_query\n    into v_count;\n  :P44_RESULT1\
    \ := 'There are ' || v_count || ' records.';\nend;\nListing 12-3\nCount1 进程的代码\n\
    ```\n\n现在考虑按钮 `Delete2`（进程也命名为 `Delete2`）的处理过程。编写此进程的主要问题在于如何处理字符串常量。请注意，图 12-4\
    \ 中的值 `ANALYST` 没有加引号。因此，如清单 12-4 所示的简单方法将不起作用。\n\n```sql\ndeclare\n  v_cmd varchar2(100);\n\
    begin\n  v_cmd := 'delete from ' || :P44_TABLE2 ||\n           ' where ' || :P44_COLUMN2\
    \ || :P44_OP2 || :P44_VALUE2;\n  execute immediate v_cmd;\nend;\nListing 12-4\n\
    Delete2 进程的不正确代码\n```\n\n问题在于，如何让查询在值是字符串时给它加上引号，而在值是数字时不加。解决方案（正如你在第 3 章看到的）是使用绑定变量引用。例如，你希望为\
    \ `Delete2` 进程生成的查询应该像这样：\n\n```sql\nselect count(*) from EMP into v_count\nwhere\
    \ Job = :P44_VALUE\n```\n\n然而，`execute immediate` 命令对绑定变量很挑剔。具体来说，该命令不允许在生成的查询中使用绑定变量；相反，它专门为此目的提供了一个\
    \ `using` 子句。清单 12-5 给出了 `Delete2` 进程的正确代码。\n\n```sql\ndeclare\n  v_cmd varchar2(100);\n\
    begin\n  v_cmd := 'delete from ' || :P44_TABLE2 ||\n           ' where ' || :P44_COLUMN2\
    \ || :P44_OP2 || ' :1';\n  execute immediate v_cmd\n    using :P44_VALUE2;\n \
    \ :P44_RESULT2 := SQL%rowcount || ' records were deleted.';\nend;\nListing 12-5\n\
    Delete2 进程的正确代码\n```\n\n请注意，生成的查询中，绑定变量所在的位置是表达式 \"`:1`\"。这个表达式是一个占位符。当 `execute\
    \ immediate` 命令运行时，它将用其 `using` 子句中的值替换这个占位符。如果查询需要多个绑定变量，则使用多个占位符，`using` 子句中的绑定变量用逗号分隔。\n\
    \n在清单 12-5 中，只有一个占位符 `:1`。占位符的功能与过程的形式参数相同。实际上，`execute immediate` 语句“调用”了 SQL\
    \ 语句，并向其传递每个绑定变量引用的值。占位符的名称无关紧要。APEX 会按照占位符在 SQL 语句中出现的顺序，将 `using` 子句中的值分配给它们。\n\
    \n最后，按钮 `Count2`（进程也命名为 `Count2`）的处理过程如清单 12-6 所示。请注意，构造的字符串是一个查询并使用了绑定变量；因此，`execute\
    \ immediate` 命令将同时使用 `into` 和 `using` 子句。\n\n```sql\ndeclare\n  v_query varchar2(100);\n\
    \  v_count int;\nbegin\n  v_query := 'select count(*) from ' || :P44_TABLE2 ||\n\
    \             ' where ' || :P44_COLUMN2 || :P44_OP2 || ' :1';\n  execute immediate\
    \ v_query\n    into v_count\n    using :P44_VALUE2;\n  :P44_RESULT2 := 'There\
    \ are ' || v_count || ' records.';\nend;\nListing 12-6\nCount2 进程的代码\n```\n\n\
    ## 结合动态报表和进程\n\n作为最后一个例子，我想重新考虑图 7-17 中的 `单行视图` 页面，它是 `员工演示` 应用的第 20 页。回想一下，该页面显示一个所有员工的报表，按\
    \ `EName` 排序。当用户选择一名员工时，页面切换到单行模式，显示所选行的数据，并提供按钮以按排序顺序导航到上一行和下一行。\n\n任务是修改此页面，使用户能够动态更改行的排序顺序。图\
    \ 12-5 展示了名为 `可排序单行视图` 的新页面，它是演示应用的第 45 页。该页面与单行视图页面相同，只是多了一个用于指定所需排序字段的选择列表。选择排序字段将导致报表按该顺序重新显示；此外，点击\
    \ `上一个` 或 `下一个` 按钮将使用该排序顺序来确定新的当前行。\n\n![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig5_HTML.jpg](img/335103_3_En_12_Fig5_HTML.jpg)\n\
    \n图 12-5\n可排序单行视图页面\n\n与图 7-17 一样，图 12-5 同时显示了 `员工` 和 `员工信息` 区域，尽管一次只显示其中一个。\n\
    \n创建此页面的最简单方法是复制第 20 页。此操作在第 7 章讨论过（见图 7-8）。回顾一下，转到任意页面的页面设计器，点击顶部的 **+** 图标，然后选择\
    \ `复制页面` 以启动 `页面复制` 向导。如果操作向导有困难，请回顾第 7 章。\n\n复制页面时，必须确保更新其各种项目引用。事实证明，PL/SQL\
    \ 代码内的项目引用会被更新，但由链接生成器产生的引用不会。因此，`EMPNO` 列的链接目标会错误地重定向到第 20 页并设置 `P20_EMPNO` 的值。通常，你应该更正这些值，但在这种情况下没有必要，因为你即将用新列替换它们。\n\
    \n成功复制页面后，就可以对其进行修改。第一个修改是在 `员工` 区域添加一个选择列表，以便用户可以选择排序字段。此选择列表命名为 `P45_SORTFIELD`，其静态值为\
    \ `[EName, Job, Sal, DeptNo]`。其操作应设置为 `重定向并设置值`。\n\n可更改的排序字段会影响页面的两个部分：报表的源查询和在单记录模式下计算下一条/上一条记录的进程。在这两种情况下，你都需要使用动态\
    \ SQL。报表的源查询由清单 12-7 的 PL/SQL 代码生成。\n\n```sql\ndeclare\n  v_sort varchar2(20);\n\
    begin\n  if :P45_SORTFIELD is null then\n    v_sort := 'EName';\n  else\n    v_sort\
    \ := :P45_SORTFIELD;\n  end if;\n  return 'select EmpNo, EName, Job, Sal, DeptNo\
    \ from EMP ' ||\n         'order by ' || v_sort;\nend;\nListing 12-7\n员工报表的 PL/SQL\
    \ 源代码\n```\n\n此查询使用动态 SQL 根据所选的排序字段构建适当的查询。如果未选择排序字段，则默认为 `EName`。由于使用了动态 SQL，你应该启用\
    \ `使用通用列名` 属性，并将 `通用列数` 指定为 `5`。APEX 将创建五个列，命名为 `COL01` 到 `COL05`。由于无论排序字段如何，此报表中的列标题都相同，你可以将它们硬编码到报表的\
    \ `标题` 部分。具体来说，`PL/SQL 函数体` 属性的值将为：\n\n```sql\nreturn ':EName:Job:Sal:DeptNo';\n\
    ```\n\n此字符串以冒号开头，因为第一列的标题为空。\n"
