    # 提交与重定向


    假设你修改了网页上某个项目的值，可能是通过选择单选按钮或在文本字段中输入。你的浏览器知道如何直接显示这一更改，而无需请求服务器重新渲染页面。因此，服务器将对你对该值所做的更改一无所知，从而无法使用新值。


    如果你希望应用程序知道页面上各项的值，你必须先将这些值上传到服务器。此操作称为 `提交`。服务器为你的应用程序的每个项目都持有一个变量。当你提交页面时，该页面上每个项目的值都会保存在对应的变量中。实际上，提交操作将会话状态与当前页面同步。


    回顾一下，按钮的操作要么是 `提交`，要么是 `重定向`。这两种操作都会导致 APEX 服务器渲染一个目标页面并将其发送到浏览器。对于重定向，你在重定向操作中指定目标页面。对于提交，你通过单独的
    `分支` 组件指定目标页面——如果未指定分支，则重新加载当前页面。分支在第 9 章中讨论，因此目前你可以假设提交操作总是重新加载当前页面。


    提交和重定向的主要区别在于，提交会将页面的项目值上传到服务器，而重定向不会。如果用户更改了页面上某些项目的值，然后执行重定向，这些更改将会丢失——即使重定向到的是同一个页面。


    为了看到这种差异的示例，考虑第 5 章中的 `项目采样器` 演示页面，如图 5-2 所示。回顾第 5 章，项目的初始值由其 `源` 属性决定。默认是使用会话状态值（如果它不为空）。这意味着如果你为项目分配一个非空值并提交，那么当页面重新加载时，该值将成为该项目的初始值。你可以通过更改页面上的一些值并点击
    `取消` 按钮来验证这一事实。因为该按钮执行的是重定向，你的更改会丢失。现在再次修改这些值并点击 `提交` 按钮。项目值保持选择后的状态，因为提交操作将这些更改写入了会话状态，并在页面重新加载时检索了它们。如果你导航到不同的页面再返回，这些值仍然会存在。


    回顾一下，当你在 APEX 中运行页面时，开发者工具栏会出现在屏幕底部。标记为 `会话` 的工具栏按钮显示当前的会话状态。点击它会打开一个窗口，显示所有项目及其当前的会话值。在调试页面时，这个窗口非常有用。在示例中，打开会话窗口并查看会话状态。然后更改一些项目并提交。再次打开会话窗口，验证项目值是否已更改。


    重要的是要理解，指定项目的初始值会影响浏览器中的项目值，但绝不会改变其在会话状态中的值。你可以在 `项目采样器` 页面上进行一些实验来验证这一事实。转到属性编辑器，将项目
    `P8_JOB` 的源设置为静态表达式 `CLERK`，并将其使用设置为 `始终，替换会话状态中的任何现有值`。运行页面，将项目的值更改为 `ANALYST`，然后点击
    `提交` 按钮，检查每一步的会话状态。会话状态值在页面提交之前一直保持空白，在提交时变为 `ANALYST`。然而，当页面渲染时，浏览器会显示 `CLERK`。现在回到属性编辑器，将该项目的
    `源使用` 属性更改为 `仅当会话状态中的当前值为空时` 并重复实验。（首先将项目值设为空白并点击 `提交` 按钮以清除会话状态。）你应该观察到会话状态值的行为与之前相同。然而，浏览器会显示
    `CLERK`，直到你提交一个新值，之后它将显示该值。


    # 使用项目提交页面


    提交页面的主要方式是使用按钮。然而，某些项目类型也可以执行提交。文本字段或密码字段的 `设置` 部分有一个属性 `按下回车键时提交`。启用此属性会使该项目在用户按下
    `Enter` 键时提交页面。


    选择列表或单选按钮组的 `设置` 部分有一个属性 `选择时的页面操作`。该属性在图 6-1 中针对选择列表显示。该属性的默认值是 `无`。如果你将其设置为
    `提交页面`，则每当用户更改项目值时，页面都会被提交。


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig1_HTML.jpg](img/335103_3_En_6_Fig1_HTML.jpg)


    *图 6-1 选择列表可能的操作*


    该图还显示了此属性的另外三个值。这些值对应于不同形式的重定向。`重定向并设置值` 选项将该项目的值保存在会话状态中，然后重定向到同一页面。也就是说，它的行为类似提交，但仅针对一个项目，而不是页面上的所有项目。


    `重定向到页面` 和 `重定向到 URL` 选项具有不同的意图。`重定向到页面` 操作使项目充当导航列表——其值被解释为页码，选择一个值会导致 APEX 重定向到该页面。例如，考虑一个选择列表，其静态值如图
    6-2 所示，且其操作为 `重定向到页面`。该项目显示三个选项（`主页`、`员工报告`、`图表`）；选择一个选项会重定向到相应的页码。


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig2_HTML.jpg](img/335103_3_En_6_Fig2_HTML.jpg)


    *图 6-2 用于重定向到页面操作的静态值*


    `重定向到 URL` 选项类似，只是项目值被假定为 URL。这两个选项都不会改变会话状态。


    # 重定向可以设置会话状态


    考虑一个按钮的重定向操作。尽管该操作不提交页面，但它仍然可以修改会话状态。


    当你将按钮的操作设置为 `重定向到此应用程序中的页面` 时，属性编辑器中会出现 `目标` 属性。点击该属性的输入框会弹出图 6-3 所示的 `链接构建器`
    向导页面。


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig3_HTML.jpg](img/335103_3_En_6_Fig3_HTML.jpg)


    *图 6-3 链接构建器向导页面*


    除了将 `页面` 属性设置为所需的目标外，你还可以使用 `设置项目` 部分来设置任意多个项目的值。在 `名称` 框中输入项目名称，在 `值` 框中输入其所需的会话状态值。每次你填完一行，就会出现另一行，从而允许你输入任意多的名称/值对。


    例如，再次考虑图 5-2 的 `项目采样器` 页面。假设你希望 `取消` 按钮将项目 `P8_EMPNO` 的值设置为 `9999`，将 `P8_JOB`
    的值设置为 `CLERK`，并清除 `P8_SALARY` 中的值。那么链接构建器的 `设置项目` 部分将如图 6-4 所示。


    ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig4_HTML.jpg](img/335103_3_En_6_Fig4_HTML.jpg)


    *图 6-4 在重定向时指定项目值*

