    \ := apex_t_varchar2(:P21_UPDATE_JOB,\n:P21_UPDATE_SAL, :P21_UPDATE_DEPTNO);\n\
    :P21_HASH := apex_util.get_hash(v_valuesToHash);\nend if;\nend;\nListing 7-20\n\
    PL/SQL Code for the FetchRowForUpdate Process\n```\n\nThe PL/SQL code for the\
