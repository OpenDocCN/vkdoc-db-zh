  - 向导的最终页面是 `确认员工信息` 页面（见图 9-9），用于显示为新员工选择的值。当所有必要值都已知时，向导将分支到此页面。这个分支可能来自之前三个向导页面中的任何一个。如果新员工不是职员且选中了雇佣日期复选框，`基本信息`
    页面可以直接分支到确认页面；如果选中了复选框，`经理信息` 页面可以直接分支到确认页面；而 `雇佣日期信息` 页面总是分支到确认页面。
