  \n## 实现进度条\n\n向导页面顶部包含彩色圆圈的区域称为进度条。进度条区域只是显示页面编号列表的一种花哨方式。这些向导页面中的每一个进度条都显示相同的列表，即包含页面编号\
  \ [25, 26, 27, 28] 的列表。进度条中的步骤名称是与这些页面编号关联的标签。\n\n要在 `新员工向导` 页面中创建进度条，您首先需要创建它们的公共列表。然后可以在每个页面上创建一个进度条区域。将该列表命名为\
  \ `新员工向导`；要创建它，请使用您在第 4 章学到的技术。该列表将为四个（尚未创建的）向导页面各包含一个条目，如图 9-10 所示。\n\n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig10_HTML.jpg](img/335103_3_En_9_Fig10_HTML.jpg)\n\
  \n**图 9-10** 新员工向导列表的条目\n\n然后创建向导页面。首先创建四个编号为 25–28 的空白页面。然后为每个页面创建一个类型为 `列表` 的区域，其源是列表\
  \ `新员工向导`。图 9-11 显示了该区域的 `属性` 属性。特别是，要将列表区域显示为进度条，您只需将其 `列表模板` 属性设置为 `向导进度`。\n\n\
  ![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig11_HTML.jpg](img/335103_3_En_9_Fig11_HTML.jpg)\n\
  \n**图 9-11** 列表区域属性\n\n将列表区域添加到所有四个页面后，从页面编辑器单独运行每个页面。您应该会观察到，根据页面在列表中的位置，页面显示进度条的方式会有所不同。\n\
  \n### 自定义进度条\n\n您可以通过点击图 9-11 中的 `模板选项` 属性来自定义向导进度条的外观。图 9-12 显示了生成的对话框。`使向导步骤可点击`\
  \ 复选框配置进度条，使其每个圆圈都是一个链接——点击圆圈将分支到与其步骤对应的页面。另一个选项是 `标签显示`，它允许您指定进度条是应显示所有步骤的标签还是仅当前步骤的标签（或不显示标签）。例如，图\
  \ 9-6 到 9-8 中的进度条仅显示当前步骤，而图 9-9 显示了所有步骤。默认情况下，进度条显示所有步骤，如图 9-12 所示。\n\n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig12_HTML.jpg](img/335103_3_En_9_Fig12_HTML.jpg)\n\
  \n**图 9-12** 进度列表的模板选项\n\n### 基本信息页面\n\n`基本信息` 页面有五个项目：`P25_NAME` 是文本字段，`P25_SAL`\
  \ 是数字字段，`P25_JOB` 和 `P25_DEPTNO` 是选择列表。这些选择列表的值列表查询与之前的页面相同：`P25_JOB` 的列表是\n\n```sql\n\
  select distinct Job as DisplayVal, Job as ResultVal\nfrom EMP\norder by DisplayVal\n\
  ```\n\n而 `P25_DEPTNO` 的列表是\n\n```sql\nselect DName, DeptNo\nfrom DEPT\norder by\
  \ DName\n```\n\n项目 `P25_HIRED_TODAY` 是一个复选框组，具有单一静态值 [, `Yes`]。也就是说，显示值是一个空格，返回值是\
  \ `Yes`。回想一下，复选框组是一个多值项目，因此如果选中，其值将为 `Yes`，否则为 `null`。\n\n`继续` 按钮执行提交操作。在此提交过程中，需要发生几件事：\n\
  \n*   如果新员工不是职员，页面需要计算该员工的经理。\n*   如果雇佣日期复选框被选中，页面需要将员工的雇佣日期设置为今天。\n*   页面需要确定它应该分支到其他三个向导页面中的哪一个。\n\
  \n#### 计算经理（ComputeManager 进程）\n\n第一个要点要求您编写一个进程来计算非职员的经理。将此进程命名为 `ComputeManager`。其\
  \ PL/SQL 代码如清单 9-2 所示。\n\n```plsql\nbegin\ncase :P25_JOB\nwhen 'PRESIDENT' then\
  \   -- the president has no manager\n    :P26_MGR := null;\nwhen 'MANAGER' then\
  \   -- a manager's manager is the president\n    select EmpNo into :P26_MGR\n  \
  \  from EMP\n    where Job = 'PRESIDENT';\nelse   -- the employee's manager is the\
  \ manager of the dept\n    select EmpNo into :P26_MGR\n    from EMP\n    where DeptNo\
  \ = :P25_DEPTNO and Job = 'MANAGER';\nend case;\nend;\n```\n\n**清单 9-2** ComputeManager\
  \ 进程的 PL/SQL 代码\n\n`ComputeManager` 进程根据 `P25_JOB` 的值以三种方式之一计算其值。在每种情况下，它都将计算出的值赋给\
  \ `P26_MGR`，这将是 `经理信息` 页面上的一个项目。换句话说，此进程将值赋给 `经理信息` 页面上的项目，这样用户就不必手动输入。（编写引用尚不存在的项目的代码是可以的；您只是在该物品存在之前无法运行它。）\n\
  \n`ComputeManager` 进程与 `继续` 按钮相关联，并且应仅在新员工不是职员时执行。也就是说，该进程基于以下 SQL 表达式是有条件的：\n\n\
  ```sql\n:P25_JOB != 'CLERK'\n```\n\n#### 计算雇佣日期（ComputeHiredate 进程）\n\n第二个要点也要求您编写一个进程；称其为\
  \ `ComputeHiredate`。此进程需要计算当前日期并将其赋给项目 `P27_HIREDATE`，该项目将位于 `雇佣日期信息` 页面。其 PL/SQL\
  \ 代码使用 Oracle 的内置函数 `sysdate`，如清单 9-3 所示。\n\n```plsql\nbegin\n:P27_HIREDATE := sysdate;\n\
  end;\n```\n\n**清单 9-3** ComputeHiredate 进程的 PL/SQL 代码\n\n\n\n## 分支对象与表单区域\n\n###\
  \ ComputeHiredate 进程与分支逻辑\n\n`ComputeHiredate`进程也与`Continue`按钮关联。它应仅在`P25_HIRED_TODAY`框被选中时执行。也就是说，它依赖于以下\
  \ SQL 表达式的条件：\n\n```sql\n:P25_HIRED_TODAY = 'Yes'\n```\n\n第三点要求您创建三个分支对象，每个对应一个可能的目标。将这些分支命名为`GoToPage26`、`GoToPage27`和`GoToPage28`。每个分支的目标设定都很直接：目标页面分别是第\
  \ 26、27 和 28 页。每个分支也与`Continue`按钮相关联。唯一的难点在于指定它们各自的条件。\n\n`GoToPage26`分支应在用户需要选择经理时触发，因此其条件是这个\
  \ SQL 表达式：\n\n```sql\n:P25_JOB = 'CLERK'\n```\n\n`GoToPage27`分支应在用户不需要选择经理但需要选择雇佣日期时触发；因此，它的条件是这个\
  \ SQL 表达式：\n\n```sql\n:P25_JOB <> 'CLERK' and :P25_HIRED_TODAY is null\n```\n\n\
  最后，`GoToPage28`分支应在既不需要选择经理也不需要选择雇佣日期时触发；因此，它的条件是这个 SQL 表达式：\n\n```sql\n:P25_JOB\
  \ <> 'CLERK' and :P25_HIRED_TODAY = 'Yes'\n```\n\n### Manager Info 页面\n\n现在考虑`Manager\
  \ Info`页面，它有一个单独的项目`P26_MGR`。这个项目是一个选择列表，其值表示所有有资格管理文员的员工。假设文员的经理必须在同一个部门且不能是另一个文员，该项目的值列表将由以下查询定义：\n\
  \n```sql\nselect EName, EmpNo\nfrom EMP\nwhere DeptNo = :P25_DEPTNO and Job <> 'CLERK'\n\
  ```\n\n该页面还有一个操作是提交的`Continue`按钮。此页面不需要计算任何值，因此无需进程。但它需要决定是分支到`Hiredate Info`页面还是确认页面。因此，您需要两个分支对象，称为`GoToPage27`和`GoToPage28`。这些分支都与`Continue`按钮关联。\n\
  \n`GoToPage27`分支应在`P25_HIREDATE`未被选中时触发；因此，它的条件是这个 SQL 表达式：\n\n```sql\n:P25_HIRED_TODAY\
  \ is null\n```\n\n反之，`GoToPage28`分支应在`P25_HIREDATE`被选中时触发；因此，它的条件是这个 SQL 表达式：\n\n\
  ```sql\n:P25_HIRED_TODAY = 'Yes'\n```\n\n### Hiredate Info 页面\n\n现在考虑`Hiredate Info`页面。它有一个名为`P27_HIREDATE`的`Date-Picker`项目用于存放雇佣日期，一个操作是提交的`Continue`按钮，以及一个基于该按钮条件的指向`Confirm\
  \ Employee Info`页面的分支。提交页面会使 APEX 将所选日期保存在会话状态中并执行分支。\n\n### Confirm Employee Info\
  \ 页面\n\n最后，考虑`Confirm Employee Info`页面。它的六个项目都是`Display Only`类型，其值只是从其他页面的项目中复制而来。例如，考虑员工的姓名，它位于项目`P28_NAME`中。其源类型是`PL/SQL\
  \ Expression`，并具有以下值：\n\n```sql\n:P25_NAME\n```\n\n项目`P28_SAL`和`P28_JOB`的源表达式类似。`P28_HIREDATE`的源表达式是\n\
  \n```sql\n:P27_HIREDATE\n```\n\n指定`P28_MGR`和`P28_DEPTNO`的源表达式需要多做一点工作。考虑`P28_MGR`。如果它的源仅仅是`P26_MGR`的值，页面将显示经理的员工编号。然而，回顾图\
  \ 9-9，可以看到页面显示的是经理的姓名，这对用户来说更容易理解。类似地，`P28_DEPTNO`显示部门名称，尽管`P25_DEPTNO`的值是部门编号。\n\
  \n要使`P28_MGR`显示经理的姓名，请将其源设置为`SQL query (return single value)`，并使用以下查询：\n\n```sql\n\
  select EName\nfrom EMP\nwhere EmpNo = :P26_MGR\n```\n\n类似地，`P28_DEPTNO`的源是这个 SQL\
  \ 查询：\n\n```sql\nselect DName\nfrom DEPT\nwhere DeptNo = :P25_DEPTNO\n```\n\n####\
  \ 按钮与 InsertRecord 进程\n\n`Confirm Employee Info`页面有两个按钮。`Cancel`按钮重定向到`Basic Info`页面并清除四个向导页面的缓存。点击该按钮的\
  \ Target 属性会打开链接构建器，您可以在其中指定重定向的详细信息。图 9-13 显示了我的`Cancel`按钮的链接构建器值。`Clear Cache`属性包含应清除其项目值的那些页面的页面编号。\n\
  \n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig13_HTML.jpg](img/335103_3_En_9_Fig13_HTML.jpg)\n\
  *图 9-13 取消按钮的链接构建器值*\n\n`Continue`按钮执行提交操作。该按钮有一个关联的进程，称为`InsertRecord`，它将把新的员工记录插入到`EMP`表中。此进程的代码与第\
  \ 7 章的代码类似，并出现在清单 9-4 中。\n\n```plsql\nbegin\ninsert into EMP (EName, Job, Sal, DeptNo,\n\
  Mgr, HireDate, Comm, Offsite)\nvalues (:P25_NAME, :P25_JOB, :P25_SAL, :P25_DEPTNO,\n\
  :P26_MGR, :P27_HIREDATE, 0, 'N');\nend;\n```\n*清单 9-4 InsertRecord 进程的 PL/SQL 代码*\n\
  \n回想一下，插入发生后，页面应清除这四个向导页面并重定向到第一个页面。为此，创建一个名为`GoToPage25`的分支对象，它以`OK`按钮为条件。使用链接构建器指定分支的操作，其外观将与图\
  \ 9-13 完全相同。\n\n## 总结\n\n本章探讨了分支对象并给出了一些使用示例。分支在提交操作期间执行，在验证和进程之后。分支有两个重要组成部分：其目标和条件。\n\
  \n分支的目标指定要重定向到的页面（或 URL）。您使用链接构建器指定目标，就像为按钮或链接配置重定向一样。因此，分支也可以将会话状态中的项目值赋给页面上的项目，或清除页面上的项目值。\n\
  \n分支的条件指定分支何时相关。一个页面根据其会话状态可能有几个目标页面。您通过为每个目标页面创建一个分支并为每个分支分配一个条件来处理这种情况。分支条件应该是非重叠的，以便在任何提交操作期间最多只有一个分支能够触发。\n\
  \n"
- "# 10. 表单\n\n第 7 章中的许多进程都涉及某些基本任务，例如根据键检索单条记录的值、查找给定记录的前后记录、更新表中的记录以及修改会话状态。\n\n\
  APEX 有一个区域类型，称为`Form`，它使得无需任何 PL/SQL 编程即可执行这些任务。表单区域包含两个通用进程——一个在渲染期间执行，一个在处理期间执行——您可以配置它们以满足您的许多需求。\n\
  \n本章探讨表单区域的使用、其进程以及 APEX 内置的一些相关进程。它还评估了一些用于创建基于表单的页面的 APEX 向导。了解如何以及何时使用 APEX 表单区域和向导，可以免除您为更常见的页面开发任务编写\
  \ PL/SQL 代码的需要。\n\n\n\n## 表单区域\n\n表单区域与报表区域类似，两者都有一个源查询。它们的区别在于输出记录的显示方式。报表以表格形式一次显示多条输出记录，而表单一次只显示一条记录，每个值位于一个项中。报表是只读的，但表单可以修改数据库。\n\
  \n回顾第 7 章，`单行视图`页面的`员工信息`区域（参考图 7-17）被用作表单，`单行更新`页面的`插入员工`和`更新/删除员工`区域（参考图 7-24）也是如此。这些区域当时的类型是`静态内容`，并使用\
  \ PL/SQL 代码来实现其功能。本节将介绍`表单`区域类型，并展示如何无需任何 PL/SQL 编码即可实现相同的功能。\n\n图 10-1 显示了`员工演示`应用程序的第\
  \ 29 页，标题为`表单视图`。该页面有一个名为`浏览员工`的区域，允许用户一次一条记录地浏览`EMP`表。该区域包含五个项。前四个项显示一个`EMP`记录的四个字段值。选择一个员工姓名会用选定记录中的值填充其他三个项。单击`上一条`（或`下一条`）按钮会移动到表中的上一条（或下一条）记录。第五个项显示字符串`6\
  \ of 14`，指示该记录在表中的位置。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig1_HTML.jpg](img/335103_3_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1 表单视图页面\n\n要构建此页面，请创建一个新的空白页面，标题为`表单视图`。然后创建一个名为`浏览员工`的区域，将其类型指定为`表单`，并赋予其如图\
  \ 10-2 所示的源查询。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig2_HTML.jpg](img/335103_3_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2 浏览员工区域的源\n\n当您创建`表单`区域时，APEX 会自动为其创建一个关联的渲染过程，并为源查询中的每一列创建一个项。图 10-3 显示了创建`浏览员工`区域并设置其源之后的渲染树。\n\
  \n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig3_HTML.jpg](img/335103_3_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3 表单区域的渲染树\n\n每个项的名称和类型取自相应的列定义。例如，对应于列`EmpNo`的项被命名为`P29_EMPNO`，其类型为`数字字段`。字符字段的项类型为`文本字段`，日期字段的类型为`日期选择器`，依此类推。\n\
  \n项的`源`部分包含指定项与其列之间对应关系的属性。图 10-4 显示了`P29_EMPNO`的`源`部分。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig4_HTML.jpg](img/335103_3_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4 表单项的源属性\n\n这些项及其属性值是在您指定表单区域的源时为您创建的。但是，有一个属性值您必须自己指定，那就是图 10-4 中显示的`主键`属性。随表单提供的渲染过程需要知道哪个项对应于主键。因此，您应该为`P29_EMPNO`开启`主键`属性。如果您忘记指定主键项，APEX\
  \ 将显示错误消息提醒您。\n\n现在您可以运行该页面了。图 10-5 显示了显示的内容。诚然，这并不十分令人印象深刻。要使此表单能够执行任何操作，您需要利用其渲染过程。\n\
  \n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig5_HTML.jpg](img/335103_3_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5 默认表单区域\n\n图 10-6 显示了该渲染过程的`标识`部分。该过程的默认名称是`初始化表单 P`，其中`P`是页面名称。该过程的类型是`表单初始化`，这表明其目的是初始化表单的项。实际上，初始化过程的功能类似于清单\
  \ 7-9 中的`GetEmpInfo`过程。如果页面渲染时`P29_EMPNO`的会话状态值不为空，则该过程将获取具有该员工编号的 EMP 记录，并用其初始化其他项。\n\
  \n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig6_HTML.jpg](img/335103_3_En_10_Fig6_HTML.jpg)\n\
  \n图 10-6 初始化过程的标识属性\n\n然而，表单区域没有为您提供将`P29_EMPNO`的值放入会话状态的方法；您需要自己实现一种方法。我采用的方法是，将`P29_EMPNO`的类型更改为选择列表，其值列表查询是：\n\
  \n```\nselect EName, EmpNo\nfrom EMP\norder by EName\n```\n\n然后，我将选择列表的操作设置为`重定向并设置值`。因此，当从列表中选择员工姓名时，相应的员工编号将被分配给项`P29_EMPNO`。您应在您的页面中验证这一点。从列表中选择一个员工姓名，观察相应的员工值出现在各个项中。\n\
  \n初始化过程还包含上一条/下一条功能。其工作原理与图 7-18 中的`FindPreviousNext`过程相同，并增加了跟踪记录在表中位置的功能。要配置它，您需要执行以下步骤：\n\
  \n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig7_HTML.jpg](img/335103_3_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7 配置表单的初始化过程\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig8_HTML.jpg](img/335103_3_En_10_Fig8_HTML.jpg)\n\
  \n图 10-8 配置“上一条”按钮的操作\n\n*   创建两个隐藏项来保存上一个和下一个员工编号。我将这些项命名为`P29_PREV`和`P29_NEXT`。\n\
  *   创建一个文本字段项来保存显示当前记录位置的字符串。我将此项命名为`P29_COUNT`。\n*   转到初始化过程的`设置`部分，并如图 10-7 所示设置其`下一个主键项`、`上一个主键项`和`当前行/总计项`属性。\n\
  *   创建两个按钮，分别称为`上一条`和`下一条`。`上一条`按钮应重定向，将`P29_EMPNO`的值设置为`&P29_PREV.`，如图 10-8 所示。类似地配置`下一条`按钮。\n\
  *   （可选）转到`上一条`按钮的`服务器端条件`部分，并将其条件设置为 SQL 表达式`：P29_PREV is not null`。类似地配置`下一条`按钮。这会使按钮仅在适当的时候被渲染。\n\
  \n至此，您的页面应该已完全可用。但是，如果您像我一样，您会希望更改它的外观。这时第 5 章的技术就派上用场了。我邀请您探索不同的项类型、布局和外观属性。以下是我为达到图\
  \ 10-1 效果所做的工作：\n\n\n\n## 表单更新\n\n表单同样可以利用其项值来修改数据库。`Employee Demo`应用程序的第 30 页将阐述相关主题。该页面名为**表单更新**，如图\
  \ 10-9 所示。此页面包含两个表单区域：一个用于删除/修改现有记录，另一个用于插入新记录。以下小节将分别讨论这两个区域。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig9_HTML.jpg](img/335103_3_En_10_Fig9_HTML.jpg)\n\
  \n图 10-9  “表单更新”页面\n\n### 更新记录\n\n`更新员工`区域的工作原理如下：用户从选择列表中选取一名员工。该员工的`EMP`记录将被提取，其值用于初始化该区域的各项。随后，用户可以根据需要修改项值。点击`更新`按钮将使用这些值修改该记录。点击`删除`按钮将删除该记录。\n\
  \n要创建此区域，首先创建一个新的空白页面，命名为`表单更新`，页面编号为 30。然后创建一个类型为`表单`的新区域，并将其命名为`更新员工`。将数据源设置为\
  \ SQL 查询：\n\n```sql\nselect EmpNo, Job, Sal, DeptNo\nfrom EMP\n```\n\n查看生成的渲染树。APEX\
  \ 已为查询中的每个字段创建了一个项，以及一个初始化过程。这与你在`表单视图`页面中遇到的情况相同。趁还未忘记，请转到`P30_EMPNO`的`数据源`属性（如图\
  \ 10-4 所示），并开启其`主键`属性。\n\n现在，你需要自定义表单以匹配图 10-9。具体而言，将`P30_EMPNO`的模板更改为`可选`，将其他三个项的模板更改为`可选-上方`。将`P30_EMPNO`、`P30_JOB`和`P30_DEPTNO`的类型更改为`选择列表`。`P30_EMPNO`的值列表查询应为：\n\
  \n```sql\nselect EName, EmpNo\nfrom EMP\n```\n\n`P30_JOB`的查询应为：\n\n```sql\nselect\
  \ distinct Job as DisplayVal, Job as ResultVal\nfrom EMP\n```\n\n而`P30_DEPTNO`的查询应为：\n\
  \n```sql\nselect DName, DeptNo\nfrom DEPT\n```\n\n你还需要创建两个按钮，分别命名为`删除`和`更新`。它们的位置是`编辑`，操作是`提交`。此时，你的表单应能成功检索所选员工的信息。你剩下的任务是让按钮执行预期的数据库修改操作。这个结果出乎意料地简单。\n\
  \n表单区域修改数据库的能力默认是禁用的。要启用它，请转到表单区域的渲染树，点击其`属性`节点，并查看`编辑`部分中的`启用`属性。默认情况下，此属性是关闭的。当你开启它时，将显示其他属性，如图\
  \ 10-10 所示。这些复选框允许你指定该区域应允许哪些编辑操作。`更新员工`区域执行更新和删除操作，因此你应确保只勾选了`更新行`和`删除行`。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig10_HTML.jpg](img/335103_3_En_10_Fig10_HTML.jpg)\n\
  \n图 10-10 表单区域的编辑属性\n\n顺便提一下，请注意图 10-10 底部的`丢失更新类型`属性。此属性允许你指定进程应如何实现丢失更新检测。其默认值为`行值`，这对应于清单\
  \ 7-10 中的丢失更新检测算法。\n\n当你在表单区域中启用编辑时，APEX 会在`处理`选项卡中添加一个进程。此进程的类型为`表单-自动行处理 (DML)`，被称为*ARP\
  \ 进程*。该进程的默认名称是`处理表单 R`，其中`R`是表单区域的名称。图 10-11 显示了`更新员工`进程的`标识`属性。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig11_HTML.jpg](img/335103_3_En_10_Fig11_HTML.jpg)\n\
  \n图 10-11 ARP 进程属性\n\nARP 进程可以响应提交操作执行插入、删除或更新操作。但给定一个特定的提交请求，它如何知道要执行哪个操作呢？\n\n\
  期望的操作是由发出请求的按钮的`行为`属性决定的。图 10-12 显示了`更新`按钮的这些属性。`数据库操作`属性指定了要执行三个操作中的哪一个。在图中，该值是`SQL\
  \ UPDATE 操作`。`删除`按钮的设置类似——其`操作`值应为`提交页面`，其`数据库操作`值应为`SQL DELETE 操作`。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig12_HTML.jpg](img/335103_3_En_10_Fig12_HTML.jpg)\n\
  \n图 10-12 配置“更新”按钮的行为\n\nARP 进程可以有条件地执行，就像任何其他进程一样。`更新员工`区域的 ARP 进程应在点击`更新`或`删除`按钮时触发。图\
  \ 10-13 显示了其`服务器端条件`属性，其中指定的 SQL 表达式是：\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig13_HTML.jpg](img/335103_3_En_10_Fig13_HTML.jpg)\n\
  \n图 10-13 指定进程的条件\n\n```sql\n:REQUEST = 'Update' or :REQUEST = 'Delete'\n```\n\n\
  \n\n## 清除会话状态\n\n花些时间运行你的 `Form Update` 页面。选择一条记录，修改其值，然后点击 `Update` 按钮。一切应该正常工作。但是，你将发现\
  \ `Delete` 按钮存在一个问题。当你点击它时，APEX 会显示一条错误信息。问题在于删除操作后，项 `P30_EMPNO` 仍然包含被删除的员工编号。因此，在页面渲染期间，初始化过程将尝试从该不存在的记录中获取值，从而产生错误。解决方案是在删除操作发生后将\
  \ `P30_EMPNO` 设置为 null。事实上，这正是你在 Listing 7-21 所示的 `DeleteEmp` 过程的 PL/SQL 代码中所做的。\n\
  \n但是如何让第 30 页上的 `Delete` 按钮设置一个项的值呢？由于你无法触及内置的 ARP 进程，你唯一的选择是创建另一个进程，该进程将在删除操作发生后执行。我们称这个进程为\
  \ `ClearEmpNo`。\n\n实现 `ClearEmpNo` 的一种方法是使用以下代码作为 PL/SQL 进程：\n\n```\nbegin\n:P30_EMPNO\
  \ := null;\nend;\n```\n\n我们这些熟悉 PL/SQL 编码的人意识到这是一个直接、简单的解决方案。但 APEX 为那些不熟悉 PL/SQL\
  \ 的人提供了另一种解决方案，即 `Clear Session State` 进程类型。以下是使用方法。\n\n将你的进程 `ClearEmpNo` 的类型更改为\
  \ `Clear Session State`。图 10-14 显示了其初始属性。`Settings` 部分的 `Type` 属性指定要清除哪些项。默认情况下，其值为\
  \ `Clear all items on the Current Page`。该属性的其他值允许你清除单个项、指定页面上的所有项或所有页面上的所有项。\n\n\
  ![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig14_HTML.jpg](img/335103_3_En_10_Fig14_HTML.jpg)\n\
  \n图 10-14：清除会话状态进程的属性\n\n虽然默认值完全没问题，但将类型更改为 `Clear Items` 也是合理的。如果你这样做，那么你将能够为 `Item(s)`\
  \ 属性输入明确的项名称，如图 10-15 所示。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig15_HTML.jpg](img/335103_3_En_10_Fig15_HTML.jpg)\n\
  \n图 10-15：配置进程以清除 P30_EMPNO\n\n无论你如何创建 `ClearEmpNo` 进程，你必须执行以下两个步骤以确保它仅在删除操作后执行：\n\
  \n*   你必须将其 `When Button Pressed` 属性的值设置为 `Delete`。\n*   你必须将其序列值（如图 10-14 所示）设置为大于\
  \ ARP 进程的值。\n\n## 插入记录\n\n图 10-9 中 `Form Update` 页面的第二个区域称为 `Insert Employees`。其工作方式如下：用户将值输入到该区域的五个项中，然后点击\
  \ `Insert` 按钮。APEX 随后会将一条记录插入到 EMP 表中，对于未提及的字段使用默认值。\n\n一个 ARP 进程只能插入出现在页面项中的值。因此，重要的是\
  \ `Insert Employees` 区域要为 `EMP` 的每个字段都有一个项。换句话说，表单的数据源应该是查询 `select * from EMP`。然后你可以隐藏那些将接收默认值的项。\n\
  \n当你创建具有前述数据源的表单区域时，APEX 会立即通知你一个问题。问题是其生成的几个项名称重复。生成的项的名称完全基于其对应字段的名称，因此出现在页面上多个表单中的字段名将会有多个同名的项。\n\
  \n幸运的是，解决方案很简单；只需重命名有问题的项。图 10-16 显示了我的策略，即为 `Insert Employees` 区域中的所有项（无论是否重复）添加“`INSERT`”。\n\
  \n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig16_HTML.jpg](img/335103_3_En_10_Fig16_HTML.jpg)\n\
  \n图 10-16：重命名重复项\n\n两个初始化进程也有重复的名称。为了解决这个问题，我将每个进程重命名为其区域的名称，如图 10-17 所示。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig17_HTML.jpg](img/335103_3_En_10_Fig17_HTML.jpg)\n\
  \n图 10-17：重命名重复的初始化进程\n\n你现在已解决了该区域的所有问题，因此 APEX 最终将允许你保存更改。你剩余的任务与你对 `Update Employees`\
  \ 表单所做的类似：\n\n*   在 `P30_INSERT_EMPNO` 的 `Source` 部分打开 `Primary Key` 属性。\n*   在\
  \ `Insert Employee Attributes` 的 `Edit` 部分打开 `Enabled` 属性。然后确保只勾选了 `Add Row` 操作。\n\
  *   创建一个名为 `Insert` 的按钮。将其 `Action` 属性配置为 `Submit Page`，并将其 `Database Action` 属性配置为\
  \ `SQL INSERT action`。\n*   转到名为 `Process form Insert Employees` 的 ARP 进程的属性编辑器，并将其\
  \ `When Button Pressed` 属性的值设为 `Insert`。\n*   根据你的喜好设置项的格式和布局。\n\n如果你尝试使用新的区域，你将发现另一个问题，即表单期望你始终为\
  \ `P30_EMPNO` 和 `P30_INSERT_EMPNO` 提供值。当 `Update Employees` 是唯一区域时，这个要求是合适的，因为没有员工编号，`Delete`\
  \ 和 `Update` 操作没有意义。但当按下 `Insert` 按钮时，`P30_EMPNO` 可以（也应该）是 `null`。同样，当按下 `Delete`\
  \ 和 `Update` 按钮时，`P30_INSERT_EMPNO` 应该为 null。因此，你需要禁用这两个项在 `Validation` 部分的 `Value\
  \ Required` 属性。\n\n`Insert` 操作将新员工编号放入 `P30_INSERT_EMPNO`。尽管该项是隐藏的，但其值可以作为 ARP 进程的\
  \ `Success Message` 属性的一部分，如图 10-18 所示。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig18_HTML.jpg](img/335103_3_En_10_Fig18_HTML.jpg)\n\
  \n图 10-18：改进 Insert 按钮的成功消息\n\n## 计算\n\n图 10-9 所示的 `Insert Employees` 区域仅显示 `EName`、`Job`、`Salary`\
  \ 和 `DeptNo` 列的项；`HireDate`、`Comm` 和 `Offsite` 的项是隐藏的。其想法是这些隐藏项将包含默认值——特别是，`P30_INSERT_HIREDATE`\
  \ 将包含当前日期，`P30_INSERT_COMM` 将为 `0`，`P30_INSERT_OFFSITE` 将为 `'N'`。ARP 进程在执行插入操作时将使用这些项的值。\n\
  \n那么，问题是如何将默认值放入隐藏项中。答案是使用 APEX *计算*。计算是一种页面组件，它为某个项赋值。其思路是为每个需要默认值的项创建一个计算，并安排这些计算在\
  \ ARP 进程执行之前执行。这样，计算出的值将成为会话状态的一部分，ARP 进程在创建新记录时将使用它们。\n\n\n### Form Update 页面的计算\n\
  \n`Form Update` 页面对三个需要默认值的项分别进行了计算。图 10-19 展示了页面设计器中的 `Processing` 选项卡，其中列出了这三项计算。请注意，计算的执行点是\
  \ `After Submit`，这意味着它们将在任何其他过程之前执行。\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig19_HTML.jpg](img/335103_3_En_10_Fig19_HTML.jpg)\n\
  图 10-19 为 Form Update 页面添加三项计算\n\n要创建新计算，请右键单击图 10-19 中的 `After Submit` 节点，然后选择\
  \ `Create Computation`。接着，您需要为其 `Identification` 和 `Computation` 部分指定属性。图 10-20\
  \ 展示了 `P30_INSERT_HIREDATE` 计算的属性值。`Identification` 部分包含属性 `Item Name`，您需要在此指定目标项。`Computation`\
  \ 部分包含属性 `Type`，您需要在此指定如何计算项的值。在图 10-20 中，类型是 `SQL Expression`，而表达式仅仅是调用了 SQL 函数\
  \ `current_date`。\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig20_HTML.jpg](img/335103_3_En_10_Fig20_HTML.jpg)\n\
  图 10-20 HireDate 计算的属性\n\n另外两项计算的创建方式类似。指定常量的最简单方法是使用 `Static Value` 类型，但您也可以使用\
  \ SQL 表达式来指定。\n\n除了创建三项计算，您也可以通过一个 PL/SQL 过程实现相同的效果，如代码清单 10-1 所示。该过程的执行点与计算一样，都是\
  \ `After Submit`。\n```\nbegin\nP30_INSERT_HIREDATE := current_date;\nP30_INSERT_COMM\
  \ := 0;\nP30_INSERT_OFFSITE := 'N';\nend;\n```\n代码清单 10-1 等同于三项计算的 PL/SQL 代码\n\n\
  我特意在图 10-9 中隐藏了项 `P30_INSERT_HIREDATE`、`P30_INSERT_COMM` 和 `P30_INSERT_OFFSITE`，以防止用户更改其默认值。另一种设计选项是显示这些项，并已填入默认值。用户可以将这些值视为建议，如果需要可以进行修改。此选项意味着计算值应在页面渲染期间分配给这些项，而不是在提交之后。实现此选项非常简单。您只需取消隐藏这些项，并将三项计算（或其等效的\
  \ PL/SQL 过程）的执行点更改为 `After Header`。\n\n### 发送电子邮件\n\n回顾第 7 章，`Revised Employee Data\
  \ Entry` 页面有一个名为 `SendSuspiciousEmail` 的过程，其作用是在发生可疑的数据库删除和更新时发送电子邮件。该过程的代码出现在代码清单\
  \ 7-14 中。它是用 PL/SQL 编写的，并利用了 `apex_mail.send` 库函数。\nAPEX 提供了 `Send E-Mail` 过程类型，使您无需编写\
  \ PL/SQL 代码即可发送电子邮件。本节将展示如何使用此过程实现与代码清单 7-14 相同的功能。\n\n为页面 30 创建一个新过程。将其命名为 `SendSuspiciousEmail`，类型设置为\
  \ `Send E-Mail`。在属性编辑器中，找到 `Settings` 部分。您需要为属性 `From`、`To`、`Subject` 和 `Body Plain\
  \ Text` 指定值。图 10-21 展示了我如何输入这些值。（如果您想测试该过程，请务必使用您自己的电子邮件地址作为收件人。）\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig21_HTML.jpg](img/335103_3_En_10_Fig21_HTML.jpg)\n\
  图 10-21 Send E-Mail 过程的属性\n\n正文文本利用了 `APP_USER` 变量和项 `P30_EMPNO` 来标识用户和受影响的员工编号。此行为与代码清单\
  \ 7-14 中的相同，除了一点——邮件正文没有指明操作是删除还是更新。代码清单 7-14 通过 PL/SQL 代码内的 if 语句实现了此功能。当您使用 `Send\
  \ E-Mail` 类型的过程时，如何实现相同的功能呢？\n\n技巧是首先创建一个隐藏项来保存您需要计算的值，然后为其创建一个计算。例如，我的隐藏项名为 `P30_EMAIL_OP`。图\
  \ 10-22 展示了其计算的相关属性。然后，我将 `SendSuspiciousEmail` 过程中的 `Body Plain Text` 属性的值更改为以下表达式：\n\
  ```\n&APP_USER. &P30_EMAIL_OP. employee &P30_EMPNO.'s record.\n```\n例如，由此表达式可能生成的电子邮件消息可能是\n\
  ```\nboris@secret.org deleted employee 7839's record.\n```\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig22_HTML.jpg](img/335103_3_En_10_Fig22_HTML.jpg)\n\
  图 10-22 用于识别请求的计算\n\n最后，您需要指定 `SendSuspiciousEmail` 过程何时执行。其服务器端条件应指定何谓对数据库的“可疑”更改。我选择使用与图\
  \ 7-16 所示的相同条件。此外，必须选择该过程的序列号，使其在数据库操作之后执行，但在 `ClearEmpNo` 过程从 `P30_EMPNO` 中清除已删除的员工编号之前执行。\n\
  \n## 包含表单的报表页面\n\nAPEX 的 `Form` 区域自动为您生成项，并提供了两个强大的内置过程，这比您必须编写可比的项和 PL/SQL 过程节省时间。然而，您仍然需要创建和配置额外的按钮和项。为了进一步简化您的工作，APEX\
  \ 提供了用于创建预制表单页面的向导。您将信息输入向导，它会创建必要的区域、项、按钮和过程。如果您需要这些向导生成的内容，它们可以成为有效的捷径。\n\n这些向导的列表可以从图\
  \ 2-9 的初始 `Create Page` 屏幕开始找到。不要点击通常的 `Blank Page` 图标，而是选择 `Form` 图标。APEX 将显示如图\
  \ 10-23 所示的屏幕，其中包含与表单相关的向导图标。`Report with Form` 向导是一个很好的说明性示例，所以我们从它开始。\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig23_HTML.jpg](img/335103_3_En_10_Fig23_HTML.jpg)\n\
  图 10-23 用于创建表单页面的 APEX 向导\n\n一个 `Report with Form` 页面实际上是两个页面——一个报表页面和一个表单页面。它的工作方式类似于图\
  \ 7-24 中的 `Single Row Update` 页面，但报表和表单位于两个单独的页面上，而不是位于同一页面的不同区域中。\n\n\n## 使用报表与表单向导\n\
  \n### 向导界面\n\n点击图 10-23 中的 `Next` 按钮，将显示第一个 `Report with Form` 向导屏幕，如图 10-24 所示。`Report\
  \ Type` 属性要求您指定报表应为交互式报表、交互式网格（将在第 11 章讨论）还是经典报表；我选择了 `Classic Report`。\n\n接下来的四个属性要求您提供报表页面和表单页面的页码和名称。在我的应用程序中，报表在第\
  \ 31 页，表单在第 32 页。最后，您需要指定表单页面是正常显示还是作为模态对话框显示。（模态页面在第 2 章末尾讨论过；参见图 2-15。）我在图中选择了\
  \ `Normal`，但 `Modal Dialog` 也很有趣且值得尝试。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig24_HTML.jpg](img/335103_3_En_10_Fig24_HTML.jpg)\n\
  \n**图 10-24 创建包含表单页面的报表**\n\n点击 `Next` 按钮将带您进入第二个向导屏幕，如图 10-25 所示。此屏幕要求您提供一个同时用于报表和表单的数据源。如果您打算使用表单进行插入，那么源将需要包含整个表，如图所示。在这种情况下，向导屏幕还允许您指定要在报表中显示的列。\n\
  \n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig25_HTML.jpg](img/335103_3_En_10_Fig25_HTML.jpg)\n\
  \n**图 10-25 输入报表和表单的源查询**\n\n第三个屏幕（未显示）是您指定报表页面的导航菜单项的地方。请注意，表单页面没有菜单项，因为它应该只能通过其报表页面访问。\n\
  \n第四个屏幕，如图 10-26 所示，允许您指定要在表单中显示的源列。它还强制您指定主键列。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig26_HTML.jpg](img/335103_3_En_10_Fig26_HTML.jpg)\n\
  \n**图 10-26 指定主键列**\n\n当您最终点击 `Create` 按钮时，APEX 将创建两个功能齐全的页面。图 10-27 显示了运行报表页面的结果。（我截掉了底部以节省空间。）\n\
  \n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig27_HTML.jpg](img/335103_3_En_10_Fig27_HTML.jpg)\n\
  \n**图 10-27 报表与表单的报表页面**\n\n有两种方式可以从报表页面转到表单页面。点击 `CREATE` 按钮会以插入模式打开表单页面，如图 10-28\
  \ 所示。或者，点击行开头的链接会以更新/删除模式打开表单页面，并填充所选员工的值。图 10-29 显示了点击 `WARD` 的链接后的表单页面。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig29_HTML.jpg](img/335103_3_En_10_Fig29_HTML.jpg)\n\
  \n**图 10-29 处于更新/删除模式的表单页面**\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig28_HTML.jpg](img/335103_3_En_10_Fig28_HTML.jpg)\n\
  \n**图 10-28 处于插入模式的表单页面**\n\n请注意，表单页面上的按钮根据其模式而不同。在插入模式下，页面显示一个 `Create` 按钮，它向 `EMP`\
  \ 表插入一条新记录。在更新/删除模式下，`Delete` 按钮删除所选记录，`Apply Changes` 按钮更新它。所有三个按钮在更改表后都会返回到报表页面。`Cancel`\
  \ 按钮在两种模式下都通用；它只是不改变表而直接返回到报表页面。\n\n以下小节探讨了向导是如何实现这些页面的。\n\n### 报表页面\n\n报表页面（图 10-27）有一个区域，我选择将其设置为经典报表。它的实现完全\
  \ straightforward。唯一有趣的特性是 `EMPNO` 列，其类型为 `Link`（如第 3 章所述）。图 10-30 显示了它的 `Link Builder`\
  \ 屏幕。它指定链接将重定向到第 32 页（表单页面），并将 `P32_EMPNO` 项设置为所选行的员工编号。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig30_HTML.jpg](img/335103_3_En_10_Fig30_HTML.jpg)\n\
  \n**图 10-30 EMPNO 列的 Link Builder 屏幕**\n\n`Create` 按钮的操作是重定向到表单页面并清除其会话状态，如图 10-31\
  \ 的 `Link Builder` 屏幕所示。比较这两张图。它们都重定向到表单页面；它们的区别在于，行链接为 `P32_EMPNO` 分配一个值，而 `Create`\
  \ 按钮则清除 `P32_EMPNO`（以及页面上所有其他项）的值。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig31_HTML.png](img/335103_3_En_10_Fig31_HTML.png)\n\
  \n**图 10-31 Create 按钮的 Link Builder 屏幕。**\n\n`P32_EMPNO` 的值因此决定了表单页面是处于插入模式还是更新/删除模式。在插入模式下，页面项的值都将为\
  \ `null`，因为 `Create` 按钮清除了它们。在删除模式下，页面项的值都将有一个值，这是由初始化过程的操作决定的。\n\n`Create` 按钮被渲染为蓝色，以表明它是一个“热”按钮。相关属性名为\
  \ `Hot`，位于按钮的 `Appearance` 部分，如图 5-29 所示。\n\n### 表单页面\n\n表单页面（图 10-28 和 10-29）有一个区域，类型为\
  \ `Form`。图 10-32 显示了它的渲染树。与所有表单区域一样，它有一个初始化过程，以及每个源值对应的项。（为了节省空间，图中未显示这些项。）与标准表单区域的主要区别在于它还有四个按钮。`CANCEL`\
  \ 按钮重定向到报表页面。另外三个按钮被配置为具有 `Database Action` 值，分别为 `SQL INSERT action`、`SQL DELETE\
  \ action` 和 `SQL UPDATE action`。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig32_HTML.jpg](img/335103_3_En_10_Fig32_HTML.jpg)\n\
  \n**图 10-32 表单页面的渲染树**\n\n回顾一下，`DELETE` 和 `SAVE` 按钮仅在页面处于更新/删除模式时才呈现，而 `CREATE`\
  \ 按钮仅在插入模式下才呈现。表单使用 `P32_EMPNO` 的值来决定条件渲染。如果它是 `null`，则渲染 `CREATE`；否则，渲染 `DELETE`\
  \ 和 `SAVE`。\n\n表单页面还包含一个分支，在提交处理完成后重定向到报表页面。\n\n`CREATE` 和 `SAVE` 按钮的操作是 `Submit\
  \ Page`。有趣的是，`DELETE` 按钮的操作是 `Redirect to URL`，其中 URL 是：\n\n```\njavascript:apex.confirm(htmldb_delete_message,'DELETE');\n\
  ```\n\n\n\n图 10-33 展示了此操作的`Link Builder`界面。JavaScript 函数`apex.confirm`会显示一个确认窗口；点击`Yes`将使用名为`DELETE`的请求提交页面。换句话说，`DELETE`按钮实际上确实执行了提交操作，尽管是通过\
  \ JavaScript 间接完成的。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig33_HTML.jpg](img/335103_3_En_10_Fig33_HTML.jpg)\n\
  \n图 10-33\nDELETE 按钮的链接构建器界面\n\n表单页面的`Processing`选项卡包含两个组件：所有表单区域共有的 ARP 进程和一个分支。当点击\
  \ CREATE、SAVE 或 DELETE 按钮时，该进程会触发。由于这些按钮是页面上唯一执行提交操作的组件，因此该进程不需要设置为条件执行。该分支在提交处理后无条件重定向到报表页面，这就解释了为什么从表单页面每次点击按钮都会返回到报表页面。\n\
  \n## 自定义报表和表单\n\n尽管`Report with Form`向导能生成功能完整的页面，但这些页面是原始且未加修饰的。在实际应用中，你不太可能直接使用它们。相反，你应该将其视为构建更广阔、可定制化应用的基础。这些定制化主要分为三类：外观定制、功能定制和组织结构定制。\n\
  \n外观定制可改善应用的外观和布局。例如，你可以使用第 3 章的技术来改进报表及其列的格式，以及使用第 5 章的技术来优化按钮和项的外观与布局。你还可以更改默认的区域标题、按钮文本和项标签。\n\
  \n另一个外观问题涉及表单项的可见性。回想图 10-25，`Report with Form`向导要求你指定应在表单页面中显示的项。问题在于，表单页面同时用于插入和更新操作，而这两种操作有不同的需求。例如，插入操作需要为所有列设置项，但你可能希望隐藏那些接收默认值的列的项。此外，更新操作应仅显示可更新列的项。因此，为每个项提供一个`Server-side\
  \ Condition`表达式，指定该项何时可见，将是一个好主意。\n\n或者，你可以选择禁用项而不是隐藏它。每个项都有一个`Read Only`属性部分，你可以像`Server-side\
  \ Condition`部分那样指定一个条件。`Server-side Condition`会隐藏项，而`Read Only`则使其不可修改。因此，例如，在更新模式下，显示整个记录但将不可修改的项（如`EName`）格式化为只读，可能是一个好主意。\n\
  \n功能定制为向导生成的页面添加功能。例如，你可以向表单页面添加`Previous`和`Next`按钮。你也可以修改插入和更新操作，使其在更改数据库后保留在表单页面，如图\
  \ 7-24 的`Single Row Update`页面所示。\n\n与组织结构相关的定制涉及添加或删除页面和区域，以及在它们之间移动现有的页面组件。例如，可以将报表和表单区域移动到同一个页面。或者，你可以将表单区域拆分为两个区域——一个用于插入，一个用于更新/删除——如`Single\
  \ Row Update`页面所示。你甚至可以有三个表单区域，如图 7-5 的`Employee Data Entry`页面所示。\n\n### 表单页面\n\n\
  `Report with Form`向导创建的两个页面连接非常松散。它们唯一的交互是当点击报表页面上的链接或其`Create`按钮时，这两者都会设置表单页面上`P32_EMPNO`项的值。因此，表单页面可以与其他类型的页面结合使用，唯一的前提是其他页面能向表单页面提供员工编号。\n\
  \n在本节中，我不打算将报表与表单连接，而是想将树与表单连接。树以层次结构描绘表中的记录，当表中存在可以作为层次结构基础的字段时，这是可能的。例如，`EMP`表的`Mgr`字段确定了一个层次结构，在商业中称为管理层次结构。没有经理的总裁是层次结构的根。其他每个员工都是其经理的子节点。\n\
  \n`Employee Demo`应用程序的第 33 页以树形显示员工记录。该页面名为`Management Hierarchy Tree`，如图 10-34\
  \ 所示。树的每个节点显示一个员工姓名。点击姓名会重定向到一个名为`Management Hierarchy Form`的表单页面，该页面显示该员工的其他值，并提供更新这些值或删除员工记录的机会。图\
  \ 10-35 显示了点击`ADAMS`后得到的表单页面。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig35_HTML.jpg](img/335103_3_En_10_Fig35_HTML.jpg)\n\
  \n图 10-35\n管理层次结构表单页面\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig34_HTML.jpg](img/335103_3_En_10_Fig34_HTML.jpg)\n\
  \n图 10-34\n管理层次结构树页面\n\n#### 实现树页面\n\n尽管 APEX 有一个页面向导来创建树，但自己创建页面更具指导性（也更简单！）。因此，将第\
  \ 33 页创建为一个名为`Management Hierarchy Tree`的空白页面，并创建一个类型为`Tree`的区域。其数据源应为`EMP`表。\n\n\
  配置树的属性位于该区域的`Settings`部分，你可以从渲染树中的`Attributes`节点进入。图 10-36 显示了图 10-34 中树的`Settings`属性。\n\
  \n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig36_HTML.jpg](img/335103_3_En_10_Fig36_HTML.jpg)\n\
  \n图 10-36\n树区域设置\n\n名为`Hierarchy`的属性应设置为`Computed with SQL`，这指示 APEX 根据以下设置计算层次结构：\n\
  \n*   `Node Label Column`是其值作为树节点标签的字段。\n*   `Node Id Column`是主键字段。\n*   `Parent\
  \ Key Column`是定义层次结构的字段。记录的此字段值指定其父记录的主键。\n*   `Start Tree With`指定层次结构的根。设置`Value\
  \ is NULL`断言层次结构的根是父键列值为`null`的记录。\n\n此时运行你的页面，并探索树。如果一个节点有子节点，其左侧将有一个箭头。点击这些箭头将展开或收缩其子节点列表。\n\
  \n最后的配置步骤是指定当用户点击树中的节点时发生什么。你需要的属性是`Link`，它位于`Settings`部分更靠下的位置。点击其框会弹出`Link Builder`向导。图\
  \ 10-37 显示了我如何配置该链接。它指定点击节点将重定向到第 34 页，并将`P34_EMPNO`的值设置为该节点的`EMPNO`值。请注意，这里使用了替换字符串语法来引用节点字段的值。\n\
  \n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig37_HTML.jpg](img/335103_3_En_10_Fig37_HTML.jpg)\n\
  \n\n## 实现表单页面\n\n`Employee Demo` 应用的第 34 页是如图 10-35 所示的表单页面。通过创建一个空白页面并向其添加一个 `表单`\
  \ 区域，实现起来已经足够简单。然而，使用向导来创建表单页面本身则更加容易。\n\n回顾图 10-23 的 `创建页面` 屏幕，你可以看到一个名为 `Form`\
  \ 的向导图标。点击它会弹出图 10-38 的 `创建表单` 屏幕。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig38_HTML.jpg](img/335103_3_En_10_Fig38_HTML.jpg)\n\
  \n图 10-38\n创建表单向导的第一个屏幕\n\n在询问了页面编号和名称之后，向导会要求提供两样东西：表单在提交后（即 `删除` 和 `应用更改` 按钮）应跳转到的页面，以及重定向后（即\
  \ `取消` 按钮）应跳转到的页面。其余的屏幕与你之前见过的类似——一个屏幕询问导航菜单，一个屏幕请求数据源，以及最后一个屏幕请求主键。\n\n向导生成的表单页面应该能与树页面无缝协作，无需你进行任何额外的配置——当点击树节点时，树会重定向到表单；当点击按钮时，表单会重定向到树。图\
  \ 10-35 中我的表单页面，仅仅是更改了向导生成的项的类型和布局后的结果。\n\n我想强调一点，由 `Form` 向导生成的表单页面与由 `Report with\
  \ Form` 向导生成的表单页面完全相同——这两个向导之间的唯一区别是，`Report with Form` 还会生成一个包含 `创建` 按钮和报表的页面。此外，由\
  \ `Form` 向导生成的页面与一个带有 `表单` 区域的空白页面加上几个按钮和属性设置也完全相同。图 10-23 中的其他基于表单的向导与 `Report\
  \ with Form` 类似。了解这一点可以帮助你决定，对于任何给定的任务，是使用其中一个向导还是自己编写页面。\n\n### 主从表单\n\n第 6 章讨论了主从报表的创建。在主从报表中，两个报表是链接的，当选择主报表中的一行时，从报表只显示与所选主行关联的行。例如，图\
  \ 6-8 中的 `按部门查看员工` 页面显示了一个与主 `DEPT` 报表链接的 `EMP` 报表；点击一个 `DEPT` 记录会使 `EMP` 报表仅显示所选部门中的员工。\n\
  \n在本节中，我想考虑如何扩展主从报表以包含更新功能。一个直接的方法是创建两套 `带表单的报表` 页面，一套用于 `DEPT`，一套用于 `EMP`，然后像第\
  \ 6 章那样链接 `DEPT` 和 `EMP` 报表。让我们看看这需要多少工作量。\n\n首先，使用 `带表单的报表` 向导为 `DEPT` 创建报表和表单页面。报表页面命名为\
  \ `主报表`，页码为 35；表单页面命名为 `主表单`，页码为 36。页面数据源是 `select * from DEPT`。\n\n然后使用向导为 `EMP`\
  \ 创建报表和表单页面。页码为 37 和 38；报表页面命名为 `从报表`，表单页面命名为 `从表单`。它们的数据源是 `select * from EMP`。\n\
  \n此时，你有两套互不关联的页面。它们的报表页面需要按如下方式关联起来：\n\n*   主报表需要一个链接列，带你跳转到从报表。\n*   从报表需要仅显示与所选从行关联的记录。\n\
  *   从报表需要一个按钮，带你返回主报表。\n\n图 10-39 和 10-40 展示了这两个报表。图 10-40 显示了为 `ACCOUNTING` 部门点击“查看员工”后的结果。请注意，我修改了两个页面上向导生成的区域标题。特别是，从区域的标题是用部门名称自定义的。\n\
  \n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig40_HTML.jpg](img/335103_3_En_10_Fig40_HTML.jpg)\n\
  \n图 10-40\n从报表\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig39_HTML.jpg](img/335103_3_En_10_Fig39_HTML.jpg)\n\
  \n图 10-39\n主报表\n\n你需要对主报表做的唯一改动是创建额外的“查看员工”列。为此，你应该为报表创建并配置一个 *虚拟列*，步骤如下：\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig41_HTML.jpg](img/335103_3_En_10_Fig41_HTML.jpg)\n\
  \n图 10-41\n查看员工链接的链接构造器\n\n*   右键单击渲染树的 `列` 节点，然后选择 *创建虚拟列* 菜单项。APEX 会向报表添加一个名为\
  \ `DERIVED$01` 的列。\n*   将此列的类型设置为 `链接`。\n*   转到 `设置` 部分，点击 `目标` 属性的选框。这会打开链接构造器。\n\
  *   如图 10-41 所示配置链接构造器。\n*   将该列的链接文本属性设置为 `查看员工`。\n\n然后你需要对 `从报表` 页面进行以下更改。\n\n\
  *   创建隐藏项 `P37_DEPTNO` 和 `P37_DNAME`。\n*   将区域的数据源更改为\n    ```\n    select * from\
  \ EMP\n    where DeptNo = :P37_DEPTNO\n    ```\n*   将区域的标题更改为\n    ```\n    &P37_DNAME.\
  \ 中的员工\n    ```\n*   创建一个标签为 `所有部门` 并重定向到第 35 页的按钮。\n\n就是这样！使用页面向导的优势在于，你可以快速构建功能齐全的网页。你可能需要配置区域的外观和感觉，但这应该不会太麻烦。\n\
  \n使用页面向导的唯一问题是，它迫使你采用特定的页面架构——在本例中，是使用四个单区域页面。其实还有许多其他可能的设计。事实上，APEX 有一个 `创建页面`\
  \ 向导，它构建主从表单的方式非常不同。图 10-42 显示了它的主页面。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig42_HTML.jpg](img/335103_3_En_10_Fig42_HTML.jpg)\n\
  \n图 10-42\n组合式主从页面\n\n该页面有五个区域：一个横跨顶部的区域，名为 `主-从`，包含两个按钮；左侧列中的一个区域包含搜索栏；左侧列中的一个报表区域列出主行；顶部的一个报表区域（名为\
  \ `部门`）列出所选的主行；以及底部的一个报表区域（名为 `员工`）列出关联的从行。\n\n左侧列中主区域的行是链接。当你点击一行时，它会成为选定行，其右侧的两个区域会相应地调整。\n\
  \n用户可以通过四种方式编辑此页面：\n\n*   `主-从` 区域中的 `创建` 按钮向主表插入一个新行。\n*   `部门` 区域中的 `编辑` 按钮编辑当前的主行。\n\
  *   `员工` 区域中的 “`+`” 按钮向从表插入一个新行。\n*   从报表中的编辑链接编辑所选的从行。\n\n\n### 交互式网格\n\n单击按钮或链接会在模态对话框页面中显示一个表单。例如，图\
  \ 10-43 显示了单击 `Edit` 按钮后的结果。用户可以修改主记录、删除它，或者在不执行任何操作的情况下返回到主从页面。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig43_HTML.jpg](img/335103_3_En_10_Fig43_HTML.jpg)\n\
  \n图 10-43 编辑当前主记录\n\n从设计角度来看，将此主从页面与之前的解决方案进行比较是值得的。此页面在同一页面上显示主报表和明细报表，类似于图 6-8\
  \ 中的 `Employees by Department` 页面。此页面是主要的，用户永远不会与它失去联系。当需要编辑时，会以模态方式显示相应的表单，编辑完成后该表单便会消失。相比之下，之前的解决方案由四个页面组成。用户根据手头的任务（“查看主报表”、“编辑主行”、“查看明细报表”或“编辑明细行”）从一个页面切换到另一个页面，并且没有哪个页面比其他页面更重要。\n\
  关键点不在于一种方法比另一种更好，而在于解决问题的方法有很多种。你需要足够熟练地使用 APEX 来构建你设想中的页面，而不是被迫根据向导生成的页面进行设计。\n\
  \n考虑到这一点，让我们使用向导来创建这些主从页面，然后检查它们的实现。从图 2-9 中的初始 `Create Page` 屏幕开始。单击 `Master Detail`\
  \ 图标时，APEX 会显示图 10-44 所示的屏幕。从那里，单击 `Side by Side` 图标将得到图 10-45 所示的屏幕。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig45_HTML.jpg](img/335103_3_En_10_Fig45_HTML.jpg)\n\
  \n图 10-45 第一个主从屏幕\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig44_HTML.jpg](img/335103_3_En_10_Fig44_HTML.jpg)\n\
  \n图 10-44 选择所需的主从向导\n\n此屏幕要求您输入主页面（即图 10-42 中显示的页面）的名称和页码。向导还将创建另外两个页面来存放主表单和明细表单，但您无法选择它们的页码。单击\
  \ `Next` 按钮将带您进入指定导航菜单项的屏幕。您之前已经见过此屏幕，因此这里省略了。最后一个屏幕（如图 10-46 所示）要求您提供主表和明细表。`Primary\
  \ Display Column` 和 `Secondary Display Column` 属性表示要在主记录中显示的两个值。单击 `Create` 按钮会生成功能完整的三个页面。在我的应用程序中，这些页面是\
  \ 39、40 和 41。\n\n![../images/335103_3_En_10_Chapter/335103_3_En_10_Fig46_HTML.jpg](img/335103_3_En_10_Fig46_HTML.jpg)\n\
  \n图 10-46 第三个主从屏幕\n\n页面 40 和 41 是表单页面，与您通过调用 `Create Form` 向导获得的结果相同。因此，主要问题是如何实现报表页面。\n\
  \n这三个报表区域，也许令人惊讶，是 `Classic Report` 区域。它们外观不同是因为使用了不同的区域模板。主报表模板是 `Media List`。此模板显示两个值，分别称为\
  \ `List_Title` 和 `List_Text`。如果您希望报表行成为链接，则源查询还必须有一个 Link 字段，其值是要重定向到的 URL。向导生成的源查询很复杂，但其本质如下：\n\
  \n```sql\nselect DeptNo, DName as List_Title, Loc as List_Text,\napex_page.get_url(p_items\
  \  => 'P39_DEPTNO',\np_values => DEPTNO) as Link\nfrom DEPT\n```\n\n函数 `apex_page.get_url`\
  \ 返回一个指向 APEX 页面的 URL。默认情况下，URL 会重定向到当前页面。参数 `p_items` 和 `p_values` 指定了应如何更改会话状态。\n\
  图 10-42 中标题为 `Dept` 的区域使用了模板 `Value Attribute Pairs – Column`。此模板将每个值显示在其自己的行上，并在前面加上列名。在图中，该区域的源有一行两列，因此其报告显示两行。\n\
  标题为 `Emp` 的区域使用了 `Standard` 模板，因此其报告以标准方式显示。\n除了外观不同，`Dept` 和 `Emp` 报表以通常的方式与其表单页面交互，即通过让它们的按钮和链接重定向到相应的表单页面。\n\
  底线是，即使是像 `Master-Detail` 这样复杂的向导，也只是创建了一个包含三个报表区域的页面，其中两个区域链接到表单页面。如果您愿意，可以自定义这些区域以满足您的需求。\n\
  \n#### 小结\n\n本章的第一部分探讨了 APEX 表单区域。一个表单区域包含两个进程——一个初始化进程和一个 ARP 进程——它们允许您的页面访问数据库，而无需编写\
  \ PL/SQL 代码。APEX 还为一些常见任务提供了内置进程，这些进程与两个表单进程配合使用。几个例子展示了这些进程相对于相应 PL/SQL 进程的优点和局限性。\n\
  本章的第二部分探讨了一些创建表单的 APEX 页面创建向导。这些向导各不相同，从创建旨在与其他页面结合使用的单页面的 `Form` 向导，到将 `Form` 页面与简单报表页面配对的\
  \ `Report with Form` 向导，再到将两个 `Form` 页面与一个包含三个报表区域的页面匹配的复杂 `Master-Detail` 向导。在每种情况下，重点都是揭开这些向导的神秘面纱，使您能够自信地创建所需的页面，无论是否使用它们。\n\
  \n## 11. 交互式网格\n\n报表是只读的。如果您正在查看报表并想要更改其内容，则必须使用表单。例如，考虑图 10-27 中的 `Report with\
  \ Form 1` 页面。假设用户想要修改员工报表中的一行。会发生以下步骤：\n*   用户单击所需行的链接，这会重定向到 `Report with Form\
  \ 2` 页面（图 10-29），并将选定的员工号放入该页面的一个项中。\n*   然后，表单的初始化进程从数据库中检索该员工的信息，并将其存储在相应的项中。\n\
  *   然后用户修改这些项的内容，并单击 `Apply Changes` 按钮执行更新。\n\n这些步骤的奇特之处在于，第二步没有利用员工报表。相反，初始化进程重新从数据库中检索所需的员工记录，即使这些值就在报表中。\n\
  *交互式网格* 的概念通过允许用户直接更新报表值来解决这种情况。交互式网格本质上是一个“可更新的报表”，在一个区域中结合了报表和表单的功能。本章探讨了构建和自定义交互式网格所需的技术。\n\
  \n\n## 只读交互网格\n\nAPEX 交互式网格本质上是一个可以像表单一样编辑的交互式报表。本节将探讨交互式网格的类报表特性；本章的后续部分将涵盖与表单相关的问题。`Employee\
  \ Demo` 应用程序的第 42 页名为 `Interactive Grids`，将在本章中作为一个贯穿使用的示例。\n\n### 创建交互式网格区域\n\n\
  要创建此页面，首先创建一个空白页面。添加一个名为 `Departments` 的区域，并将其类型设置为 `Interactive Grid`。系统会要求你提供一个数据源，这里应该是查询语句\
  \ `select * from DEPT`。图 11-1 展示了 APEX 生成的渲染树及其相关属性。你应该注意到它与任何报表区域看起来没什么不同。\n\n\
  ![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig1_HTML.jpg](img/335103_3_En_11_Fig1_HTML.jpg)\n\
  \n**图 11-1** 创建交互式网格区域\n\n图 11-2 展示了生成的区域。请注意报表上方的工具栏，其中包含搜索字段和操作菜单。这个工具栏与交互式报表中的相同，并且功能几乎一样。例如，交互式网格的操作菜单允许你隐藏和重排序列、创建图表、过滤记录等等，就像交互式报表一样。交互式网格还提供诸如调整列宽和冻结列等操作，并对操作菜单进行了一些重组。`Reset`\
  \ 按钮将报表恢复为其默认设置。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig2_HTML.jpg](img/335103_3_En_11_Fig2_HTML.jpg)\n\
  \n**图 11-2** 一个交互式网格区域\n\n要自定义交互式网格的工具栏，你使用与自定义交互式报表相同的属性；参见图 11-3。一个区别是交互式网格没有用于自定义操作菜单的属性。\n\
  \n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig3_HTML.jpg](img/335103_3_En_11_Fig3_HTML.jpg)\n\
  \n**图 11-3** 用于自定义工具栏的属性\n\n### 创建主从关系\n\n与交互式报表不同，交互式网格具有属性，可以在两个网格之间创建主从关系。要在你的\
  \ `Interactive Grids` 页面中实现此功能，请遵循以下步骤：\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig4_HTML.jpg](img/335103_3_En_11_Fig4_HTML.jpg)\n\
  \n**图 11-4** “主从关系”属性部分\n\n1.  创建一个新的交互式网格区域，命名为 `Employees`，其数据源为 `select * from\
  \ EMP`。\n2.  在 `Departments` 区域中，点击渲染树中的 `DEPTNO` 节点，并在属性编辑器中找到其 `Source` 部分（如图\
  \ 10-4 所示）。打开 `Primary Key` 属性。\n3.  在你的新 `Employees` 区域中，转到 `DEPTNO` 列的 `Master\
  \ Detail` 属性部分，并将其 `Master Column` 属性设置为 `DEPTNO`，如图 11-4 所示。\n\n最后两步在两个网格之间建立了键-外键关系。`Departments`\
  \ 网格中的 `DEPTNO` 列是主键，而 `Employees` 网格中的 `DEPTNO` 列是外键。APEX 将确保每当用户从 `Departments`\
  \ 网格中选择一行时，`Employees` 网格将只显示具有相应 `DEPTNO` 值的行。\n\n图 11-5 展示了生成的主从网格。花些时间探索它们在你的应用程序中的行为。你应该观察到每次选择另一个主行时，明细网格是如何变化的。同时注意\
  \ `Employees` 网格不再显示 `DeptNo` 列，因为它的值可以从所选的 `Departments` 行中推断出来。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig5_HTML.jpg](img/335103_3_En_11_Fig5_HTML.jpg)\n\
  \n\n## 编辑交互式网格\n\n### 图 11-5：主-详细信息交互式网格\n\n除了能像报表一样运行外，交互式网格还能像表单一样运行。在交互式网格中启用编辑功能的方式与在表单中相同。具体来说，转到交互式网格区域的渲染树，点击其\
  \ `Attributes` 节点，查看 `Edit` 部分中的 `Enabled` 属性。默认情况下，此属性是关闭的。当您将其开启时，会显示其他属性，如图 10-10\
  \ 所示。这些复选框允许您指定该区域应允许哪些编辑操作。\n\n与表单一样，在您指定其主键列之前，将无法编辑交互式网格。在 `Sample Interactive\
  \ Grids` 页面中，您已经为 `Departments` 网格指定了主键列（以支持主-详细信息链接）；现在您应该指定 `EMPNO` 是 `Employees`\
  \ 网格的主键列。您还应该关闭这些关键列的 `Value Required` 属性；否则，APEX 将无法为新插入的记录生成关键值。\n\n### 编辑操作\n\
  \n图 11-6 显示了为 `Departments` 区域启用编辑功能的交互式网格。（为节省空间，我隐藏了搜索菜单和文本框。）当我启用编辑时，APEX 在网格左侧添加了两列：一列复选框列（名为\
  \ `APEX$ROW_SELECTOR`）和一列菜单列（名为 `APEX$ROW_ACTION`）。工具栏还包含标记为 `Edit`、`Save` 和 `Add\
  \ Row` 的新按钮。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig6_HTML.jpg](img/335103_3_En_11_Fig6_HTML.jpg)\n\
  *图 11-6：已启用编辑功能的交互式网格*\n\n您按如下方式编辑交互式网格：`Edit` 按钮在视图模式和编辑模式之间切换。最初按钮为白色，如图 11-6\
  \ 所示，表示视图模式。点击它会使按钮变为灰色，表示编辑模式。在编辑模式下，您可以修改单元格的值。APEX 通过在单元格的右上角放置一个蓝色小三角形来表示已修改的单元格。\n\
  \n点击 `Add Row` 按钮会向网格添加一个新行。其主键的初始值是一个占位符。您可以将其替换为所需的值，也可以保持原样。如果您保持原样，那么 APEX 将用生成的值覆盖它。\n\
  \n### 行操作菜单\n\n点击行的 `APEX$ROW_ACTION` 图标会弹出一个菜单，包含可对该行执行的操作。例如，图 11-7 显示了会计部门所在行的行操作菜单。特别是，从此菜单中选择\
  \ `Delete Row` 项将删除该行。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig7_HTML.jpg](img/335103_3_En_11_Fig7_HTML.jpg)\n\
  *图 11-7：APEX 行操作菜单*\n\n图 11-8 显示了执行三个操作后的交互式网格：我将部门 20 的名称从 `RESEARCH` 更改为 `OUTREACH`，删除了\
  \ `SALES` 部门，并为 `FINANCE` 部门插入了一条新记录。APEX 使用颜色编码来指示这些更改——已编辑的行为蓝色，删除的行为灰色，新增的行为绿色。\n\
  \n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig8_HTML.jpg](img/335103_3_En_11_Fig8_HTML.jpg)\n\
  *图 11-8：对交互式网格的更改*\n\n在点击 `Save` 按钮之前，这些操作都不是永久的。在此之前，您可以通过从行操作菜单中选择 `Revert Changes`\
  \ 项来撤销对某一行的更改（如图 11-7 所示）。\n\n网格的行选择列是最左侧包含复选框的列。此列不用于基本编辑操作。例如，点击图 11-8 中的 `Save`\
  \ 按钮将保存三行更改的行，即使它们的行选择框未被勾选。\n\n行选择列的目的是支持批量操作，例如删除。要使用它，首先选择多条记录。然后，转到网格标题中的行操作菜单，如图\
  \ 11-9 所示。选择 `Delete Rows` 菜单项将把选定的记录标记为待删除。要最终确定删除操作，您必须接着点击 `Save` 按钮。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig9_HTML.jpg](img/335103_3_En_11_Fig9_HTML.jpg)\n\
  *图 11-9：批量删除记录*\n\n执行批量操作的另一种方式是使用网格上方工具栏中的 `Actions` 按钮。它有一个名为 `Selection` 的子菜单，其菜单项与标题行的操作菜单相同。\n\
  \n### 单行视图\n\n每行的操作菜单中都有 `Single Row View` 项，您可以在图 11-7 中看到。点击它会以类似表单的方式显示所选行。图\
  \ 11-10 显示了 `ACCOUNTING` 部门的单行视图。您可以看到用于导航到下一行和上一行的按钮，以及一个返回到报表的按钮。其他按钮的工作方式与网格视图相同。\n\
  \n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig10_HTML.jpg](img/335103_3_En_11_Fig10_HTML.jpg)\n\
  *图 11-10：单行视图*\n\n### 单元格类型和默认值\n\n网格中的单元格具有双重存在形式。通常，它像在报表中一样以文本形式显示其值。但是当该单元格在编辑模式下被选中时，它就变成了一个项。该项的类型由该单元格所在列的\
  \ `Type` 属性决定。例如，在 `Employees` 网格中，将 `Job` 和 `Mgr` 的类型设置为 `Select List`，将 `Hiredate`\
  \ 的类型设置为 `Date Picker`，将 `Offsite` 的类型设置为 `Radio Group`。图 11-11 显示了点击员工 `MILLER`\
  \ 的 `Job` 单元格后弹出的列表。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig11_HTML.jpg](img/335103_3_En_11_Fig11_HTML.jpg)\n\
  *图 11-11：格式化为选择列表的 JOB*\n\n请注意，未选中的单元格看起来像文本字段，无论其类型如何。例如，您无法从图中看出每个 `Mgr` 单元格是一个选择列表，每个\
  \ `Offsite` 单元格是一个单选按钮组。但是，您可以看到 `Mgr` 单元格显示的是该列的显示值（经理的姓名），而不是返回值（经理的员工编号）。同样，`Offsite`\
  \ 单元格显示的是该列的显示值（'`No`'），而不是返回值（'`N`'）。了解不同单元格类型的最好方法是亲自尝试它们。\n\n每列都有一个名为 `Default`\
  \ 的属性部分，您可以在其中为新记录指定默认值。在 `Employees` 区域中，您应该为 `HIREDATE`、`COMM` 和 `OFFSITE` 列指定默认值。图\
  \ 11-12 显示了对 `HIREDATE` 的指定，它只是对 SQL 函数 `current_date` 的调用。这些默认值将出现在插入行中，用户可以在点击\
  \ `Save` 按钮之前修改它们。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig12_HTML.jpg](img/335103_3_En_11_Fig12_HTML.jpg)\n\
  *图 11-12：指定列的默认值*\n\n\n\n我想向您展示如何对页面的外观和感觉进行最终改进。目前，页面包含两个网格区域，每个区域都有自己的按钮。`编辑`和`添加行`按钮只影响它们各自的网格。然而，`保存`按钮是冗余的——每个按钮都会保存两个网格的更改。这种行为有些出乎意料，可能会让用户感到困惑。\n\
  \n解决方案是认识到`保存`按钮并没有特殊功能——它们的操作等同于一个全页面的`提交操作`。因此，您可以创建自己的`保存`按钮，并将其显示在页面上任何您想要的位置。我的选择是创建一个新的静态内容区域，标题为`按部门查看员工`，作为那两个交互式网格区域的父级。然后，我在新区域中创建了一个标记为`保存`的按钮，将其位置设置为`编辑`，打开其`热键`属性（以便以蓝色显示），并为其分配`提交页面`操作。您也应该这样做。\n\
  \n在验证按钮有效后，您可以隐藏区域工具栏上的`保存`按钮。转到`部门`区域的渲染子树，单击`属性`节点，并在属性编辑器中找到`工具栏`部分（如图 11-3 所示）。取消勾选`保存按钮`条目。然后对`员工`区域重复此过程。图\
  \ 11-13 显示了最终的页面效果。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig13_HTML.jpg](img/335103_3_En_11_Fig13_HTML.jpg)\n\
  \n图 11-13\n完成的交互式网格页面\n\n### 确保一致性\n第 8 章讨论了页面如何保持数据一致性的方法。一种方法是使用验证来检查不合适的项值；另一种方法是限制可输入的值。以下小节展示了如何将这些解决方案应用于交互式网格。\n\
  \n#### 网格验证\n交互式网格中的验证是一个必须对网格的每一行都为真的断言。您定义交互式网格验证的方式与定义基于项的验证相同；唯一的区别是它将应用于网格中的每一行，而不仅仅是一行。\n\
  \n例如，考虑如何创建一个验证，以确保员工的经理要么是总裁，要么是同一部门的员工。要创建此验证，请转到页面编辑器的`处理`选项卡，右键单击`验证`节点，然后选择`创建验证`。图\
  \ 11-14 显示了您应该指定的相关属性值：\n\n*   将验证名称设置为`同一部门经理`。\n*   将可编辑区域设置为`员工`。\n*   将验证类型设置为`返回的行`，查询为\n\
  \n```\nselect * from EMP\nwhere EmpNo = :MGR\nand (DeptNo = :DEPTNO or Job = 'PRESIDENT')\n\
  ```\n\n*   给出适当的错误消息。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig14_HTML.jpg](img/335103_3_En_11_Fig14_HTML.jpg)\n\
  \n图 11-14\n网格验证的属性\n\n这里的`可编辑区域`属性至关重要。通过为此属性提供值，您指定了这是一个交互式网格验证，而不是基于项的验证。因此，当发生提交操作时（例如通过单击`保存`按钮），APEX\
  \ 将对网格的每个已更改行应用该验证。\n给定一个员工行，如果经理是总裁或与该员工在同一部门，验证查询会返回该员工的经理。换句话说，如果存在输出记录，则该行有一个合适的经理，从而满足`返回的行`验证类型。请注意，该查询使用绑定变量语法引用修改行的值；也就是说，它将修改行的单元格视为项。\n\
  \n#### 限制交互式网格输入\n使用交互式网格进行更新的一个问题是，您可能希望某个单元格对于某些操作是可更新的，而对于其他操作则不可更新。例如，考虑`员工`网格中的`员工姓名`列。假设用户应该能够在插入时输入员工姓名，但随后不应能够编辑它。如何强制执行此限制？\n\
  \n想法是利用该列的`只读`属性。特别是，您需要指定该列的单元格对于除更新行之外的所有行都是只读的。要表达此规范，您需要知道每行的更新状态。\n\nAPEX 有一个名为`APEX$ROW_STATUS`的内置变量用于此目的。它对网格的每一行都有一个值，该值可以是四个值之一：\n\
  \n*   如果该行已被编辑，则状态为‘`U`’。\n*   如果该行是插入行，则状态为‘`C`’（表示“已创建”）。\n*   如果该行被标记为删除，则状态为‘`D`’。\n\
  *   如果该行未被更改，则状态为`null`。\n\n图 11-15 展示了如何使用`APEX$ROW_STATUS`来指定`员工姓名`列的`只读` SQL\
  \ 表达式。另请注意，`执行`属性的值为`每一行`，这告诉 APEX 将此表达式应用于网格中的每一行。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig15_HTML.jpg](img/335103_3_En_11_Fig15_HTML.jpg)\n\
  \n图 11-15\n指定何时可以输入员工姓名值\n\n前面的示例展示了如何保护列值。下一个示例展示了如何保护行值。假设您希望此页面的用户不能删除经理，并且不能编辑或删除总裁。这里的想法是利用网格的`允许的行操作列`属性。此属性出现在网格区域的`编辑`部分，如图\
  \ 11-16 所示。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig16_HTML.jpg](img/335103_3_En_11_Fig16_HTML.jpg)\n\
  \n图 11-16\n启用特定行的更新和删除\n\n此属性也存在于表单中（例如，参见图 10-2），但到目前为止，您创建的页面都不需要它。它的目的是指示源查询中其值表示允许的行操作的列（如果存在的话）。在这样的列中，值‘`U`’表示该行只能更新，‘`D`’表示只能删除，‘`UD`’表示更新和删除都允许。任何其他值都表示该行不允许任何操作。例如，这是我为员工区域修订后的源查询：\n\
  \n```\nselect EMP.*,\ncase Job\nwhen 'PRESIDENT' then ''\nwhen 'MANAGER' then 'U'\n\
  else 'UD'\nend as Status\nfrom EMP\n```\n\n`状态`列的值由员工的工作决定。总裁的值将为空字符串，表示其无法更改；经理的值将为'U'，表示经理只能被更新；所有其他员工的值将为'UD'，表示允许更新和删除。图\
  \ 11-17 显示了该区域修订后的`源`部分。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig17_HTML.jpg](img/335103_3_En_11_Fig17_HTML.jpg)\n\
  \n图 11-17\n向网格的源添加一个行操作列\n\n默认情况下，这个新的源列将在网格中显示为文本字段。此列可以作为一个有用的调试辅助工具。但最终，您需要将其类型设置为`隐藏`。\n\
  \n\n\n### 行保护实战\n\n图 11-18 展示了页面的运行结果。可以看到，`president`（总裁）所在的行变为灰色，表明这些单元格不可编辑。（`Ename`列的单元格变灰是因为图\
  \ 11-15 所示的只读规范。）图中未显示`CLARK`和`KING`的行操作菜单，其中`Delete Row`（删除行）菜单项是灰色的。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig18_HTML.jpg](img/335103_3_En_11_Fig18_HTML.jpg)\n\
  \n**图 11-18** 行保护实战\n\n### 网格进程\n\n每个网格区域都有自己的 ARP 进程，该进程为该区域实现数据库修改操作。如果你希望网格具备额外功能，则需要为其创建额外的进程。\n\
  \n第 7 章和第 10 章讨论的进程在每次提交请求时执行一次。然而，交互式网格的进程需要针对网格中每一行被修改的行执行一次。举个例子，考虑代码清单 7-13\
  \ 中的`LogChanges`进程。该进程用于`修订后的员工数据录入`页面——每当用户单击`Delete`（删除）、`Insert`（插入）或`Update`（更新）按钮时，该进程就会向`EMPLOG`表中插入一条记录，标明请求、用户和日期。\n\
  \n### 修订 LogChanges 进程\n\n你可以轻松地为`交互式网格`页面重新创建此进程。图 11-19 显示了相关的进程属性。除了一个属性外，这些属性值与第\
  \ 7 章的进程完全相同——`可编辑区域`属性的值现在是`Employees`（员工）。这个值告诉 APEX，当进程执行时，其代码应应用于`Employees`网格中每个被更改的行。\n\
  \n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig19_HTML.jpg](img/335103_3_En_11_Fig19_HTML.jpg)\n\
  \n**图 11-19** LogChanges 进程\n\n通过修改`Employees`网格的一些数据，然后查看 SQL Workshop 中的`EMPLOG`表来测试你的进程。该表应该为你所做的每次修改都有一条记录。不幸的是，所有记录看起来都一样——`Request`（请求）值要么是`APEX_AJAX_DISPATCH`（如果你使用了工具栏上的内置`SAVE`按钮），要么是`SAVE`（如果你使用了为图\
  \ 11-13 编写的`SAVE`按钮）。这还不够好；`Request`字段的值应该更具信息性。\n\n因此，让我们修改进程代码，使得`Request`字段的值包含行状态和被修改行的`EmpNo`值，例如\"\
  `update of 8830`\"（8830 的更新）或\"`insertion of 8200.`\"（8200 的插入）。代码清单 11-1 包含了修订后的代码。注意，它使用`APEX$ROW_STATUS`来确定发生了哪种操作。\n\
  \n```sql\ndeclare\n  v_request varchar(20);\nbegin\n  case :APEX$ROW_STATUS\n  \
  \  when 'U' then v_request := 'Update ';\n    when 'C' then v_request := 'Insert\
  \ ';\n    when 'D' then v_request := 'Delete ';\n  end case;\n  v_request := v_request\
  \ || :EMPNO;\n  insert into EMPLOG (Request, UserName, RequestDate)\n  values (v_request,\
  \ :APP_USER, sysdate);\nend;\n```\n*代码清单 11-1 修订后的 LogChange 进程的 PL/SQL 代码*\n\n\
  ### 网格的自定义插入\n\n你可能遇到的另一种情况是，网格内置的数据库修改代码不能满足你的需求。在这种情况下，APEX 允许你编写自己的 PL/SQL 代码来替换它。\n\
  \n举个简单的例子，考虑向一个不包含表所有字段的网格中插入新行的问题。内置的插入进程会给缺失的字段赋空值。但如果这还不够好呢？如果新记录需要非空的默认值怎么办？\n\
  \n要探索这个问题，请在`交互式网格`页面中创建一个新区域。将其命名为`CustomEmps`，类型设置为`交互式网格`，并将其模板设置为`标准`（以便与其上方的`按部门划分的员工`区域匹配）。其源应为：\n\
  \n```sql\nselect EmpNo, EName, Job, Sal, DeptNo\nfrom EMP\n```\n\n别忘了打开`EMPNO`列的`主键`属性，并关闭其`需要验证`属性。然后转到`属性`节点的`编辑`部分并启用编辑。图\
  \ 11-20 显示了生成区域的顶部。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig20_HTML.jpg](img/335103_3_En_11_Fig20_HTML.jpg)\n\
  \n**图 11-20** Custom Emps 网格区域\n\n手头的任务是修改该区域的插入代码，以便将默认值放入缺失的字段中。操作方法如下。\n\n转到页面编辑器的`处理`选项卡，选择名为`Custom\
  \ Emps-Save Interactive Grid Data`的进程节点。这是`Custom Emps`网格区域的内置 ARP 进程。图 11-21 显示了其`标识`和`设置`属性。这里的关键属性是`设置`部分中的`目标类型`。默认值`区域源`告诉\
  \ APEX 使用内置的修改进程。要将其替换为你的代码，请将该属性值更改为`PL/SQL 代码`。属性编辑器将显示一个文本框，你可以在其中输入代码。\n\n![../images/335103_3_En_11_Chapter/335103_3_En_11_Fig21_HTML.jpg](img/335103_3_En_11_Fig21_HTML.jpg)\n\
  \n**图 11-21** 网格 ARP 进程的属性设置\n\n你的自定义 PL/SQL 代码必须处理所有三种修改操作，即使你只更改了插入操作。代码清单 11-2\
  \ 展示了我的代码。它使用 case 语句来确定需要执行的操作。删除和更新的代码是直接的 SQL 命令，与 ARP 进程的操作没有不同。插入的代码为四个缺失的列确定默认值：新员工的经理是总裁，雇佣日期是今天，初始佣金为\
  \ 0，且员工不在外地工作。`insert`语句末尾的`returning`子句导致新生成的员工编号被保存在网格的会话状态中。\n\n请注意，你的进程只需要处理单行。APEX\
  \ 将遍历网格，为每个更改的行调用你的代码，并处理丢失的更新检测。\n\n```sql\nbegin\n  case :APEX$ROW_STATUS\n  \
  \  when 'C' then\n      insert into EMP(EName, Job, Sal, DeptNo,\n             \
  \         Mgr, HireDate, Comm, Offsite)\n      values (:ENAME, :JOB, :SAL, :DEPTNO,\n\
  \              7839, sysdate, 0, 'N')\n      returning EmpNo into :EMPNO;\n    when\
  \ 'U' then\n      update emp\n      set EName  = :ENAME,\n          Job    = :JOB,\n\
  \          Sal    = :SAL,\n          DeptNo = :DEPTNO\n      where EmpNo  = :EMPNO;\n\
  \    when 'D' then\n      delete emp\n      where EmpNo = :EMPNO;\n  end case;\n\
  end;\n```\n*代码清单 11-2 自定义交互式网格修改代码*\n\n\n\n## 总结\n\n本章重点介绍了交互式网格——它们是什么、能做什么以及如何构建。首先探讨了其类报表的特性。在这方面，它们的外观和行为与交互式报表非常相似。交互式网格还具有一些额外的功能，最重要的是能够将两个网格区域链接成主从关系。\n\
  \n随后，本章讨论了如何使用交互式网格来更新数据库的问题。交互式网格拥有一个复杂且易于使用的界面，你可以在其中临时就地编辑值、添加行并初始化其值、删除现有行，然后根据需要撤销或保存这些更改。\n\
  \n交互式网格具有验证功能，以确保用户输入的适当性。你指定这些验证的方式与第 8 章相同。区别在于，APEX 会将验证代码应用于网格的每一行已修改行。你还可以使用网格的\
  \ `只读` 属性来限制用户更改指定行或列的值。\n\n每个交互式网格都有一个内置进程来处理数据库的插入、删除和更新操作。如果你需要额外的功能，可以编写自己的进程。与验证类似，进程的代码仅引用网格中的一行；APEX\
  \ 会将该进程应用于网格的每一行已修改行。实际上，你甚至可以替换掉默认的数据库处理代码，用自己的代码来代替。\n\n"
- "# 12. 动态 SQL\n\n在本书中，你已经看到了许多使用会话状态值来定制页面的方法。例如，报表的 SQL 源查询是定制的一个很好的候选对象，访问数据库的进程中的\
  \ SQL 语句也是如此。这种定制大部分涉及 SQL 语句中的绑定变量引用。\n\n然而，可以定制的内容是有限制的。对会话状态变量的引用可以替换 SQL 查询中的常量，但不允许替换表名或列名。本章探讨一种称为\
  \ `动态 SQL` 的技术，它通过使用 PL/SQL 代码在运行时构建并执行 SQL 语句来克服这一限制。你将学习如何将 `动态 SQL` 用作报表的来源或进程的内容，并查看三个需要\
  \ `动态 SQL` 的示例。\n\n## 动态报表\n\n考虑图 12-1 所示的 `报表构建器` 页面，这是 `员工演示` 应用程序的第 43 页。顶部区域中的项目使用户能够指定一个报表。用户选择所需的表，选择要显示的列，然后输入筛选条件的文本。点击提交按钮将在底部区域显示报表。\n\
  \n![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig1_HTML.jpg](img/335103_3_En_12_Fig1_HTML.jpg)\n\
  *图 12-1 报表构建器页面*\n\n实现这两个区域需要什么？`指定您的报表` 区域相对简单。该区域有三个项目和一个按钮。`选择表` 项目名为 `P43_TABLE`。它是一个选择列表，显示相关表的名称，选中时不执行任何操作。在构建页面时，我将表名列表指定为静态值\
  \ `[EMP, DEPT]`。另一种可能性是通过以下查询指定列表，该查询利用了 Oracle 的 `User_Tables` 表：\n\n```sql\nselect\
  \ Table_Name as DisplayVal, Table_Name as ResultVal\nfrom User_Tables\norder by\
  \ DisplayVal\n```\n\n`选择列` 项目名为 `P43_COLS`。它是一个复选框组，为所选表的每一列显示一个复选框。其值由以下查询定义，该查询利用了\
  \ Oracle 的 `User_Tab_Cols` 表：\n\n```sql\nselect Column_Name as DisplayVal, Column_Name\
  \ as ResultVal\nfrom User_Tab_Cols\nwhere Table_Name = :P43_TABLE\norder by DisplayVal\n\
  ```\n\n此查询引用了 `P43_TABLE`，这意味着其显示的列列表将根据所选的表而变化。为了在 `P43_TABLE` 更改时更新此列表，请使用第 6\
  \ 章的级联列表技术。也就是说，转到 `P43_COLS` 的 `值的级联列表` 部分，并将其 `父项` 属性设置为 `P43_TABLE`。\n\n项目 `P43_WHERE`\
  \ 是一个文本区域，用户可在其中输入筛选条件。此条件将用作报表源查询的 `where` 子句。\n\n最后，`指定您的报表` 区域中的按钮在按下时执行提交操作。此操作会将这三个项目的值保存在会话状态中。\n\
  \n`您的报表是` 区域显示一个由这些项目的值定制的报表。实现该区域不那么直接。假设你尝试将其创建为经典报表；其源查询将类似于：\n\n```sql\nselect\
  \ :P43_COLS\nfrom   :P43_TABLE\nwhere  :P43_WHERE\n```\n\n问题在于这样的查询在语法上是不合法的。规则是绑定变量只能用于引用常量，而此查询试图引用列、表和\
  \ SQL 代码。为了解决这个问题，请将报表的源类型设置为 `返回 SQL 查询的 PL/SQL 函数体`。此类报表的源是一个 PL/SQL 函数，它计算所需的\
  \ SQL 查询并将其作为字符串返回。代码清单 12-1 显示了 `您的报表是` 报表的代码。\n\n```sql\ndeclare\n  v_table varchar2(20)\
  \  := :P43_TABLE;\n  v_cols  varchar2(100) := replace(:P43_COLS, ':', ',');\n  v_where\
  \ varchar2(100) := '';\nbegin\n  if :P43_WHERE is not null then\n    v_where :=\
  \ ' where ' || :P43_WHERE;\n  end if;\n  return 'select ' || v_cols || ' from '\
  \ || v_table || v_where;\nend;\n```\n*代码清单 12-1 用于生成 SQL 查询的 PL/SQL 代码*\n\n此代码逐段构建所需的\
  \ SQL 查询字符串。列列表的构建可能是唯一不那么直观的部分。回想一下，`P43_COLS` 是一个多值列表项，这意味着其值将是一个包含以冒号分隔的所选列名的字符串。然而，在查询中，列名需要用逗号分隔。因此，你需要做的就是使用\
  \ `replace` 函数将每个冒号替换为逗号，然后将该字符串赋值给变量 `v_cols`。\n\n使用代码构建源查询的技术被称为 `动态 SQL`，因为查询是在运行时动态计算的。只要源查询的变化超出了简单的常量定制范围，`动态\
  \ SQL` 就是合适的。图 12-2 描绘了 `您的报表是` 区域的 `标识` 和 `源` 属性。\n\n![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig2_HTML.jpg](img/335103_3_En_12_Fig2_HTML.jpg)\n\
  *图 12-2 实现报表构建器报表区域*\n\n使用 `动态 SQL` 的后果之一是，报表的列可能直到运行时才知晓。在这种情况下，你必须告诉 APEX 为报表定义\
  \ `通用` 列名。你可以通过属性 `使用通用列名` 来实现，该属性可在图 12-2 的底部看到。启用该属性后，会出现 `通用列数` 属性，供你指定要创建的通用列数。图\
  \ 12-2 指定了列数为 9，这意味着 APEX 将为报表生成 9 列。这些列的名称将是 `COL01`、`COL02`，一直到 `COL09`。此指定的计数是最大值；如果报表恰好使用了更少的列（如图\
  \ 12-1 所示），则其他列将被忽略。\n\n\n回顾一下，列的默认标题是其名称。因此，你应该为每个通用列赋予一个更合适的标题。通常，你会直接在列的 `Heading`\
  \ 部分指定其标题。但由于你只有在运行时才能知道每一列的含义，因此需要使用不同的方法。这正是报表的 `Heading` 部分的用途。该部分可以在报表渲染树的 `Attributes`\
  \ 节点中找到。图 12-3 展示了五种可能的标题类型。前三种类型基于列名创建标题，这在这里不合适；最后一种类型不指定任何标题。因此，处理通用列的最佳选择是使用\
  \ `PL/SQL Function Body` 这种标题类型。\n\n![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig3_HTML.jpg](img/335103_3_En_12_Fig3_HTML.jpg)\n\
  \n**图 12-3**\n为通用列指定标题\n\n当你选择该标题类型时，APEX 将显示一个用于输入 PL/SQL 代码的文本区域；该代码应返回一个包含以冒号分隔的列标题列表的字符串。在此示例中，复选框组\
  \ `P43_COLS` 恰好包含你需要的内容，因此你的代码可以简单地返回其值，如图 12-3 底部所示。在更复杂的情况下，你可以编写一个 PL/SQL 块来计算所需的字符串。\n\
  \n当你运行页面时，在你至少选择一列之前，报表将显示以下错误信息：\n\n```\nfailed to parse SQL query: ORA-00936:\
  \ missing expression\n```\n\n原因是当 `P43_COLS` 为空时，图 12-2 中生成的 SQL 字符串以“`select from\
  \ ...`”开头，这不是合法的 SQL。避免这种情况的一个好方法是条件渲染报表区域。具体来说，将其 `Condition Type` 属性设置为：\n\n```\n\
  P43_COLS is not null\n```\n\n## 动态进程\n\n第 7 章演示了从 PL/SQL 块执行 SQL 语句是多么简单：你只需将该语句直接放在块内，并使用绑定变量对其进行参数化。然而，该语法对于动态\
  \ SQL 来说并不足够。本节将探讨相关问题及其解决方案。\n\n以图 12-4 所示的 `Count and Delete` 页面为例，它是 `Employee\
  \ Demo` 应用的第 44 页。此页面包含两个功能基本相同的区域。在每种情况下，用户选择一个表并为其指定一个过滤条件。每个区域都有两个相同的按钮：`Count`\
  \ 按钮显示满足条件的记录数量的消息，`Delete` 按钮从表中删除这些记录。图 12-4 显示了在两个区域中单击 `Count` 按钮后的结果。\n\n![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig4_HTML.jpg](img/335103_3_En_12_Fig4_HTML.jpg)\n\
  \n**图 12-4**\nCount and Delete 页面\n\n图 12-4 中的两个区域显示了相同的过滤条件：职位是分析师的员工。这两个区域仅在用户指定条件的方式上有所不同。在\
  \ `Version 1` 区域中，用户可以输入任意条件，类似于 `Report Builder` 页面。在 `Version 2` 区域中，用户通过选择特定列、运算符和值来组合条件。这第二种指定条件的方式不需要\
  \ SQL 语法知识，可能对用户更友好，但它限制了可以表达的条件类型。\n\n此页面上的项目和按钮的创建是直截了当的。`Version 1` 区域有三个项目：项目\
  \ `P44_TABLE1` 是一个选择列表，具有静态值 [`DEPT, EMP]`；项目 `P44_WHERE1` 是一个文本区域；`P44_RESULT1`\
  \ 是只读显示项。其按钮名为 `Count1` 和 `Delete1`，它们的操作是 `Submit Page`。\n\n`Version 2` 区域有五个项目。项目\
  \ `P44_TABLE2` 的定义与 `P44_TABLE1` 相同。项目 `P44_COLUMN2` 是一个选择列表，其级联父项为 `P44_TABLE2`；其值由此\
  \ SQL 查询定义：\n\n```\nselect Column_Name as DisplayVal, Column_Name as ResultVal\n\
  from User_Tab_Cols\nwhere Table_Name = :P44_TABLE2\norder by DisplayVal\n```\n\n\
  项目 `P44_VALUE2` 是一个文本字段，`P44_RESULT2` 是一个只读显示项。项目 `P44_OP2` 是一个单选按钮组，具有三个静态值 `[<,\
  \ =, >]`。其 `Template` 属性是 `Optional-Above`，以便标签可以显示在单选按钮组上方。该区域的按钮名为 `Count2` 和\
  \ `Delete2`，它们的操作是 `Submit Page`。\n\n此页面最有趣的方面是如何为四个按钮编写进程。每个进程执行相同的三个任务：\n\n* \
  \  它构建一个包含适当 SQL 命令的字符串。\n*   它执行该字符串。\n*   它使用执行结果来制定输出消息。\n\n动态报表的源代码只需要执行第一项任务，因为\
  \ APEX 在渲染报表时会执行查询字符串。而进程则没有这种便利，它必须显式地执行 SQL 字符串。\n\n执行 SQL 字符串的 PL/SQL 命令称为 `execute\
  \ immediate`。该命令的使用有些复杂——事实上，四个按钮进程中的每一个使用它的方式都略有不同。让我们依次检查每个进程。\n\n首先，考虑按钮 `Delete1`。它的进程也名为\
  \ `Delete1`，需要执行一个 SQL 删除命令。大多数时候，你可以直接将命令写为 PL/SQL 语句；但在这种情况下，你直到运行时才会知道表及其 `where`\
  \ 子句。因此，你需要使用 `execute immediate` 命令，如清单 12-2 所示。\n\n```\ndeclare\n  v_cmd varchar2(100);\n\
  begin\n  v_cmd := 'delete from ' || :P44_TABLE1 || ' where ' || :P44_WHERE1;\n \
  \ execute immediate v_cmd;\n  :P44_RESULT1 := SQL%rowcount || ' records were deleted.';\n\
  end;\n```\n**清单 12-2**\nDelete1 进程的代码\n\n第一条语句使用所选表和指定条件将 SQL 删除命令构建为一个字符串。第二条语句以最基本的形式使用\
  \ `execute immediate` 命令：你只需将 SQL 字符串传递给它。第三条语句通过使用 `SQL%rowcount` 函数（在清单 7-11 中介绍过）为结果项目赋值。\n\
  \n现在考虑按钮 `Count1`。它的进程名为 `Count1`，需要执行一个查询来计算记录数，并将检索到的值保存在一个变量中。清单 7-4 展示了如何使用\
  \ SQL 查询的 `into` 子句来实现此目的。例如，如果你不必使用动态 SQL，你可以像这样编写对应于图 12-4 的查询：\n\n```\nselect\
  \ count(*) into v_count\nfrom EMP\nwhere Job = 'ANALYST'\n```\n\n\n然而，在动态 SQL 中，`into`\
  \ 子句是与 `execute immediate` 命令关联的，而不是与 SQL 查询关联。清单 12-3 展示了正确的代码。\n\n```sql\ndeclare\n\
  \  v_query varchar2(100);\n  v_count integer;\nbegin\n  v_query := 'select count(*)\
  \ from ' || :P44_TABLE1 ||\n             ' where ' || :P44_WHERE1;\n  execute immediate\
  \ v_query\n    into v_count;\n  :P44_RESULT1 := 'There are ' || v_count || ' records.';\n\
  end;\nListing 12-3\nCount1 进程的代码\n```\n\n现在考虑按钮 `Delete2`（进程也命名为 `Delete2`）的处理过程。编写此进程的主要问题在于如何处理字符串常量。请注意，图\
  \ 12-4 中的值 `ANALYST` 没有加引号。因此，如清单 12-4 所示的简单方法将不起作用。\n\n```sql\ndeclare\n  v_cmd\
  \ varchar2(100);\nbegin\n  v_cmd := 'delete from ' || :P44_TABLE2 ||\n         \
  \  ' where ' || :P44_COLUMN2 || :P44_OP2 || :P44_VALUE2;\n  execute immediate v_cmd;\n\
  end;\nListing 12-4\nDelete2 进程的不正确代码\n```\n\n问题在于，如何让查询在值是字符串时给它加上引号，而在值是数字时不加。解决方案（正如你在第\
  \ 3 章看到的）是使用绑定变量引用。例如，你希望为 `Delete2` 进程生成的查询应该像这样：\n\n```sql\nselect count(*) from\
  \ EMP into v_count\nwhere Job = :P44_VALUE\n```\n\n然而，`execute immediate` 命令对绑定变量很挑剔。具体来说，该命令不允许在生成的查询中使用绑定变量；相反，它专门为此目的提供了一个\
  \ `using` 子句。清单 12-5 给出了 `Delete2` 进程的正确代码。\n\n```sql\ndeclare\n  v_cmd varchar2(100);\n\
  begin\n  v_cmd := 'delete from ' || :P44_TABLE2 ||\n           ' where ' || :P44_COLUMN2\
  \ || :P44_OP2 || ' :1';\n  execute immediate v_cmd\n    using :P44_VALUE2;\n  :P44_RESULT2\
  \ := SQL%rowcount || ' records were deleted.';\nend;\nListing 12-5\nDelete2 进程的正确代码\n\
  ```\n\n请注意，生成的查询中，绑定变量所在的位置是表达式 \"`:1`\"。这个表达式是一个占位符。当 `execute immediate` 命令运行时，它将用其\
  \ `using` 子句中的值替换这个占位符。如果查询需要多个绑定变量，则使用多个占位符，`using` 子句中的绑定变量用逗号分隔。\n\n在清单 12-5\
  \ 中，只有一个占位符 `:1`。占位符的功能与过程的形式参数相同。实际上，`execute immediate` 语句“调用”了 SQL 语句，并向其传递每个绑定变量引用的值。占位符的名称无关紧要。APEX\
  \ 会按照占位符在 SQL 语句中出现的顺序，将 `using` 子句中的值分配给它们。\n\n最后，按钮 `Count2`（进程也命名为 `Count2`）的处理过程如清单\
  \ 12-6 所示。请注意，构造的字符串是一个查询并使用了绑定变量；因此，`execute immediate` 命令将同时使用 `into` 和 `using`\
  \ 子句。\n\n```sql\ndeclare\n  v_query varchar2(100);\n  v_count int;\nbegin\n  v_query\
  \ := 'select count(*) from ' || :P44_TABLE2 ||\n             ' where ' || :P44_COLUMN2\
  \ || :P44_OP2 || ' :1';\n  execute immediate v_query\n    into v_count\n    using\
  \ :P44_VALUE2;\n  :P44_RESULT2 := 'There are ' || v_count || ' records.';\nend;\n\
  Listing 12-6\nCount2 进程的代码\n```\n\n## 结合动态报表和进程\n\n作为最后一个例子，我想重新考虑图 7-17 中的 `单行视图`\
  \ 页面，它是 `员工演示` 应用的第 20 页。回想一下，该页面显示一个所有员工的报表，按 `EName` 排序。当用户选择一名员工时，页面切换到单行模式，显示所选行的数据，并提供按钮以按排序顺序导航到上一行和下一行。\n\
  \n任务是修改此页面，使用户能够动态更改行的排序顺序。图 12-5 展示了名为 `可排序单行视图` 的新页面，它是演示应用的第 45 页。该页面与单行视图页面相同，只是多了一个用于指定所需排序字段的选择列表。选择排序字段将导致报表按该顺序重新显示；此外，点击\
  \ `上一个` 或 `下一个` 按钮将使用该排序顺序来确定新的当前行。\n\n![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig5_HTML.jpg](img/335103_3_En_12_Fig5_HTML.jpg)\n\
  \n图 12-5\n可排序单行视图页面\n\n与图 7-17 一样，图 12-5 同时显示了 `员工` 和 `员工信息` 区域，尽管一次只显示其中一个。\n\n\
  创建此页面的最简单方法是复制第 20 页。此操作在第 7 章讨论过（见图 7-8）。回顾一下，转到任意页面的页面设计器，点击顶部的 **+** 图标，然后选择\
  \ `复制页面` 以启动 `页面复制` 向导。如果操作向导有困难，请回顾第 7 章。\n\n复制页面时，必须确保更新其各种项目引用。事实证明，PL/SQL 代码内的项目引用会被更新，但由链接生成器产生的引用不会。因此，`EMPNO`\
  \ 列的链接目标会错误地重定向到第 20 页并设置 `P20_EMPNO` 的值。通常，你应该更正这些值，但在这种情况下没有必要，因为你即将用新列替换它们。\n\
  \n成功复制页面后，就可以对其进行修改。第一个修改是在 `员工` 区域添加一个选择列表，以便用户可以选择排序字段。此选择列表命名为 `P45_SORTFIELD`，其静态值为\
  \ `[EName, Job, Sal, DeptNo]`。其操作应设置为 `重定向并设置值`。\n\n可更改的排序字段会影响页面的两个部分：报表的源查询和在单记录模式下计算下一条/上一条记录的进程。在这两种情况下，你都需要使用动态\
  \ SQL。报表的源查询由清单 12-7 的 PL/SQL 代码生成。\n\n```sql\ndeclare\n  v_sort varchar2(20);\n\
  begin\n  if :P45_SORTFIELD is null then\n    v_sort := 'EName';\n  else\n    v_sort\
  \ := :P45_SORTFIELD;\n  end if;\n  return 'select EmpNo, EName, Job, Sal, DeptNo\
  \ from EMP ' ||\n         'order by ' || v_sort;\nend;\nListing 12-7\n员工报表的 PL/SQL\
  \ 源代码\n```\n\n此查询使用动态 SQL 根据所选的排序字段构建适当的查询。如果未选择排序字段，则默认为 `EName`。由于使用了动态 SQL，你应该启用\
  \ `使用通用列名` 属性，并将 `通用列数` 指定为 `5`。APEX 将创建五个列，命名为 `COL01` 到 `COL05`。由于无论排序字段如何，此报表中的列标题都相同，你可以将它们硬编码到报表的\
  \ `标题` 部分。具体来说，`PL/SQL 函数体` 属性的值将为：\n\n```sql\nreturn ':EName:Job:Sal:DeptNo';\n\
  ```\n\n此字符串以冒号开头，因为第一列的标题为空。\n\n\n\n你还需要为第一列指定链接。回想一下，它的名称是`COL01`，即使它包含的是`EmpNo`值。因此，从渲染树中选择`COL01`，并将其类型设置为`Link`。点击它的`Link\
  \ Target`属性，并按照图 12-6 所示配置`Link Builder`向导。然后，将该列的`Link Text`属性设置为`View`。\n\n![../images/335103_3_En_12_Chapter/335103_3_En_12_Fig6_HTML.jpg](img/335103_3_En_12_Fig6_HTML.jpg)\n\
  \n图 12-6\n指定列链接的行为\n\n你还需要配置报表列的可排序性。回顾第 3 章，经典报表中的每个列都有一个名为`Sortable`的属性——将其值开启可使用户通过点击列标题对该列进行排序，关闭则会禁用对该列的排序。问题在于，当源查询也有`order\
  \ by`子句时，APEX 应如何处理可排序性。APEX 对此问题的解决方案因列是否为通用列而异。如果列不是通用的，那么`order by`子句优先——每个列的`Sortable`属性将被关闭且无法开启。另一方面，如果列是通用的，那么它们的`Sortable`属性优先——默认情况下是开启的，并且源查询的`order\
  \ by`子句会被忽略。APEX 仅在每个列的`Sortable`属性被关闭时才会识别`order by`子句。换句话说，如果你希望报表按照`P45_SORTFIELD`的值排序，那么你必须关闭`Employees`报表中五个通用列的`Sortable`属性。\n\
  \n现在你应该拥有一个可以工作的可排序报表了。测试一下。选择一个排序字段应会导致报表以新的排序顺序重新渲染，点击某一行的链接应显示所选行的`Emp Info`区域。\n\
  \n剩下的问题是`Previous`和`Next`按钮仍在使用`EName`作为排序字段。你需要修改支撑这些按钮的过程，使其引用`P45_SORTFIELD`而不是`EName`。这个过程在第\
  \ 7 章中被称为`FindPreviousNext`，其代码出现在清单 7-18 中。作为参考，清单 12-8 重新打印了该代码。\n\n```\nbegin\n\
  if :P20_EMPNO is not null then\nselect PrevEmp, NextEmp\ninto :P20_PREV, :P20_NEXT\n\
  from (select EmpNo, lag(EmpNo)  over (order by EName) as PrevEmp,\nlead(EmpNo) over\
  \ (order by EName) as NextEmp\nfrom EMP)\nwhere EmpNo = :P20_EMPNO;\nend if;\nend;\n\
  ```\n\n清单 12-8\nFindPreviousNext 过程的原始代码\n\n修改后的代码出现在清单 12-9 中。尽管这段代码看起来很复杂，但它本质上是将原始代码拆分成片段并转化为动态\
  \ SQL。初始的 if 语句处理了未选择排序字段的情况。\n\n```\ndeclare\nv_subquery varchar2(200);\nv_query\
  \    varchar2(250);\nv_sort     varchar2(20);\nbegin\nif :P45_EMPNO is not null\
  \ then\nif :P45_SORTFIELD is null then\nv_sort := 'EName';\nelse\nv_sort := :P45_SORTFIELD;\n\
  end if;\nv_subquery :=\n'select EmpNo, ' ||\n'lag(EmpNo)  over (order by ' || v_sort\
  \ || ') as PrevEmp, ' ||\n'lead(EmpNo) over (order by ' || v_sort || ') as NextEmp\
  \ ' ||\n'from EMP';\nv_query := 'select PrevEmp, NextEmp ' ||\n'from (' || v_subquery\
  \ || ') ' ||\n'where EmpNo = :1';\nexecute immediate v_query\ninto :P45_PREV, :P45_NEXT\n\
  using :P45_EMPNO;\nend if;\nend;\n```\n\n清单 12-9\nFindPreviousNext 过程的修订代码\n\n##\
  \ 总结\n本章探讨了一些需要在 SQL 查询中自定义表名和列名的情况。你学习了如何使用动态 SQL 在运行时构造并执行 SQL 查询字符串来处理此类情况。在自定义报表的案例中，你学习了如何使用\
  \ PL/SQL 函数生成报表的源。在自定义 PL/SQL 过程的案例中，你学习了如何使用其 `execute immediate` 命令。动态 SQL 迫使\
  \ APEX 在运行时验证和处理查询字符串；这种额外的开销增加了处理页面的时间。此外，在下一章中，你将看到动态 SQL 的使用可能为潜在的安全漏洞打开一扇窗。因此，动态\
  \ SQL 应仅在必要时使用。这种情况很少发生，但了解如何处理它们是好的。\n\n"
- "# 13. 安全\n当你创建 `Employee Demo` 应用程序时，你选择将访问权限限制为那些在你工作区拥有账户的人。此限制是 APEX 用于限制访问的几种功能之一。这些功能可分为\
  \ *认证* 和 *授权*：认证用于识别合法用户，授权则指定每个合法用户被允许查看哪些信息。本章将探讨这些功能，以及如何保护数据免受恶意用户侵害的相关问题。\n\
  \n## 认证\n认证是识别应用程序当前用户的能力。APEX 用户通过提供用户名和密码来表明身份。APEX 支持几种可能的 *认证方案*，它们以不同的方式并在不同的组织级别维护用户/密码列表。\n\
  \n以下是四种常见的认证方案，从最通用到最不通用排序：\n\n*   *LDAP 目录方案*：用户/密码列表在组织的 LDAP 目录中维护。此方案允许组织为每个人分配一个账户，用于该组织维护的所有系统。由此带来的管理便利性通常使\
  \ LDAP 成为许多组织的首选认证方案。\n*   *数据库账户方案*：用户/密码列表在 Oracle 数据库系统中维护。此方案允许用户为多个基于 Oracle\
  \ 的系统（包括 APEX 应用程序）使用一个账户。此方案的缺点是用户也将拥有直接访问 Oracle 数据库的权限，这可能不是期望的。\n*   *Application\
  \ Express 账户方案*：这是当前 `Employee Demo` 应用程序的授权方案。用户/密码列表在应用程序的工作区内维护。工作区的 APEX 管理员管理该列表。如果一个人需要访问不同工作区的应用程序，则需要为每个工作区拥有一个账户。\n\
  *   *自定义方案*：应用程序所有者维护用户/密码列表。每个人需要为每个此类应用程序拥有一个独立的账户。自定义方案常用于允许人们创建和管理自己账户的应用程序。\n\
  \n此外，还有一种方案是应用程序不执行任何认证。APEX 将其视为 *无认证* 认证方案。\n\n### 管理认证方案\n一个 APEX 应用程序可以包含多个认证方案，但一次只能有一个方案是当前的。要创建一个方案，请转到应用程序的主页，点击\
  \ `Shared Components` 按钮，找到 `Security` 部分，并选择 `Authentication Schemes`。\n\n你将进入一个屏幕，其中列出了为你的应用程序创建的认证方案。你应该看到列出了一个方案，即你在创建应用程序时选择的方案；参见图\
  \ 13-1。\n\n\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig1_HTML.jpg](img/335103_3_En_13_Fig1_HTML.jpg)\n\
  图 13-1 认证方案屏幕\n\n要创建其他方案，请单击 `Create` 按钮。创建向导的第一个屏幕如图 13-2 所示。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig2_HTML.jpg](img/335103_3_En_13_Fig2_HTML.jpg)\n\
  图 13-2 第一个“创建认证”向导屏幕\n\n选择选项 `Based on a pre-configured scheme from the gallery`\
  \ 并单击 `Next`，进入第二个向导屏幕，如图 13-3 所示。该屏幕要求您为新方案命名并选择方案类型。根据类型的不同，您可能需要填写其他信息。然后单击 `Create\
  \ Authentication Scheme` 按钮来创建方案。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig3_HTML.jpg](img/335103_3_En_13_Fig3_HTML.jpg)\n\
  图 13-3 第二个“创建认证”向导屏幕\n\n每次创建新的认证方案时，APEX 都会使其成为当前方案。如果您想切换到不同的方案，请返回方案列表，单击与方案对应的图标，然后单击\
  \ `Make Current Scheme` 按钮。如果您想删除一个方案，请确保它不是当前方案，单击其图标，然后单击 `Delete` 按钮。为了体验一下，创建一个\
  \ `No Authentication` 方案并将其设为当前方案。当您运行应用程序时，您将直接进入第一个页面，而无需经过 `Login` 页面。如果您有 Oracle\
  \ 数据库账户，请创建一个 `Database Accounts` 方案，将其设为当前方案，并以这种方式登录。如果您可以访问 LDAP 服务器，可以尝试创建一个\
  \ `LDAP Directory` 方案。您需要将必要的配置信息（例如 LDAP 服务器的主机名和可分辨名称字符串）输入到创建屏幕中。但请注意，LDAP 服务器通常位于防火墙内部。如果\
  \ APEX 服务器运行在与 LDAP 服务器不同的域中，您可能会遇到防火墙问题，导致此方案无法使用。\n\n最后，创建一个 `Custom` 认证方案。当您在图\
  \ 13-3 中选择方案类型 `Custom` 时，向导将显示名为 `Settings` 和 `Source` 的附加部分。图 13-4 显示了这些部分，并填写了关键属性。\n\
  \n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig4_HTML.jpg](img/335103_3_En_13_Fig4_HTML.jpg)\n\
  图 13-4 自定义认证方案的属性\n\n`Settings` 部分允许您指定四个函数，但通常只使用 `Authentication Function Name`\
  \ 属性。每次尝试登录时都会调用认证函数。其返回值将为 `true` 或 `false`，指示登录是否应成功。`Settings` 部分只要求提供函数的名称；APEX\
  \ 期望该函数在其他地方定义。通常，该函数将作为存储过程在数据库中定义，但如果不是，`Source` 部分提供了一个位置供您输入所需的代码。认证函数必须具有名为\
  \ `p_username` 和 `p_password` 的参数。当用户提交 `Login` 页面时，APEX 会调用认证函数，并将指定的用户名和密码分配给这些参数。图\
  \ 13-4 中给出的认证函数是最简单的认证函数——它忽略用户名和密码，并始终返回 true。您可以自己尝试一下。创建一个具有 `alwaysTrue` 认证函数的自定义认证方案，并使其成为当前的认证方案。当您运行应用程序时，`Login`\
  \ 页面会要求您输入用户名和密码，但会接受您输入的任何内容。\n\n### 编写认证函数\n\n既然您了解了自定义认证的工作原理，是时候实现一个更有用的认证函数了。以下部分讨论了三个重要问题：如何存储用户名和密码信息、如何管理用户账户以及如何对用户进行认证。\n\
  \n#### 存储用户名/密码信息\n\n存储用户名/密码信息的标准方法是创建一个表；我们称这个表为 `USERS`。`USERS` 表将有三列：`UserName`、`Password`\
  \ 和 `IsAdministrator`。这第三列指示用户是否具有管理权限。此外，您应该创建两个“内置”用户：一个用户 `ADMIN`，他是密码为 `1234`\
  \ 的管理员；以及一个用户 `GUEST`，他不是管理员且密码为 `null`。这些任务都可以在 SQL 命令工具中执行。代码清单 13-1 给出了相应的 SQL\
  \ 语句，应单独执行。\n\n```\ncreate table USERS (UserName varchar2(12), Password varchar2(1000),\n\
  IsAdministrator char(1));\ninsert into USERS (UserName, Password, IsAdministrator)\n\
  values ('ADMIN',\napex_util.get_hash(apex_t_varchar2('ADMIN','1234'), null),\n'Y');\n\
  insert into USERS (UserName, Password, IsAdministrator)\nvalues ('GUEST',\napex_util.get_hash(apex_t_varchar2('GUEST',null),\
  \ null),\n'N');\n```\n代码清单 13-1 USERS 表的 SQL 语句\n\n\n\n## 密码处理\n\n密码的处理方式需要一些说明。出于安全考虑，密码应始终以编码形式存储，而非明文。清单\
  \ 13-1 使用了函数 `apex_util.get_hash` 来执行编码。该函数在第 7 章中介绍，并曾用于丢失更新检测。回想一下，该函数接受一个值集合作为输入，并生成一个字符串作为输出。构造函数\
  \ `apex_t_varchar2` 从其参数创建值集合。例如，`ADMIN` 的编码密码是调用哈希函数时以集合 `['ADMIN','1234']` 作为输入的输出结果。\n\
  \n使用哈希函数进行密码编码的原因在于它能混淆输入值——仅凭函数的输出，他人实际上无法确定其输入。因此，您可以放心，即使数据库系统遭到入侵（例如，硬盘被盗），入侵者也无法轻易利用已编码的密码信息。\n\
  \n清单 13-1 中的哈希密码将用户名作为哈希值的一部分。这种技术通过挫败以下攻击，在一定程度上提高了安全性：入侵者创建一个账户，然后为其创建一系列密码，并记下每个密码的哈希值。然后，入侵者可以将这些哈希密码与从\
  \ `USERS` 表中窃取的密码进行比较。假设检测到匹配项。如果用户名不是哈希值的一部分，那么入侵者很可能发现了某个用户的密码。但是，如果用户名是哈希值的一部分，那么检测到匹配项对入侵者来说毫无意义。\n\
  \n`apex_util.get_hash` 函数有两个参数：第一个是要哈希的值集合，第二个参数是一个布尔值。清单 13-1 中的第二个参数是 `null`，这被视为\
  \ `false`。在第 7 章中，该函数仅使用一个参数调用，这意味着第二个参数值为 `true`。第二个参数指示函数是否应将会话 ID 添加到输入值中。如果哈希值包含会话\
  \ ID，安全性会更高，但这样它就只能在该会话的范围内使用。因为丢失更新检测发生在一个会话内，所以使用 `true` 作为第二个参数是合理的，这正是第 7 章中的情况。然而，密码编码是跨会话的，因此必须使用\
  \ `false`（或 `null`）作为第二个参数。\n\n## 添加用户账户\n\n您的 `Employee Demo` 应用程序需要一种方法向 `USERS`\
  \ 表添加其他行。图 13-5 展示了一个名为 `管理用户` 的页面，用于此目的；它将是应用程序的第 46 页。该页面有两个区域：`所有用户` 区域列出来自 `USERS`\
  \ 的记录，而 `创建用户` 区域允许您向该表添加用户。（请注意，截图截断了 `所有用户` 区域中的密码值以节省空间。）\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig5_HTML.jpg](img/335103_3_En_13_Fig5_HTML.jpg)\n\
  *图 13-5 演示应用程序的管理用户页面*\n\n`所有用户` 区域是一个经典报表，其数据源是 SQL 查询：\n\n```sql\nselect UserName,\
  \ IsAdministrator, Password\nfrom USERS\n```\n\n我将编码后的密码放在报表中仅用于演示目的。在真实的应用程序中，不应显示编码后的密码——这些值没有有用的管理用途，显示它们会增加密码被破解的可能性。\n\
  \n`创建用户` 区域包含四个项目和一个提交按钮。这些项目定义如下：\n\n*   `P46_NAME` 的类型为 `纯文本`。\n*   `P46_ADMIN`\
  \ 的类型为 `开关`。\n*   `P46_PASSWORD` 和 `P46_CONFIRM` 的类型为 `密码`。\n\n图 13-5 显示了在添加名为 `JOE`\
  \ 的非管理员用户（密码为“`joe`”）之前此页面的内容。虽然此用户名是以小写输入的，但为了确保用户名不区分大小写，它将在表中以大写保存。当然，密码将使用哈希函数保存为编码字符串。\n\
  \n当您点击提交按钮创建新用户账户时，将执行两项验证和一个处理过程。一项验证确保所选用户名尚未出现在 `USERS` 表中。此验证的类型为 `未返回行`，并由以下查询定义：\n\
  \n```sql\nselect * from USERS\nwhere UserName = upper(:P46_NAME)\n```\n\n另一项验证确保两个密码相同。此验证的类型为\
  \ `SQL 表达式`，并由以下代码定义：\n\n```sql\n(:P46_PASSWORD = :P46_CONFIRM) or\n(:P46_PASSWORD\
  \ is null and :P46_CONFIRM is null)\n```\n\n验证的第二行考虑了密码可能为 `null` 的情况。\n\n该处理过程将用户名转换为大写，对密码进行哈希处理，然后向\
  \ `USERS` 表插入一条记录。其代码见清单 13-2。\n\n```sql\ndeclare\n    v_username     varchar2(20)\
  \ := upper(:P46_NAME);\n    v_valuesToHash apex_t_varchar2 :=\n        apex_t_varchar2(v_username,\
  \ :P46_PASSWORD);\nbegin\n    insert into USERS (UserName, Password, IsAdministrator)\n\
  \    values (v_username,\n            apex_util.get_hash(v_valuesToHash, null),\n\
  \            :P46_ADMIN);\nend;\n```\n*清单 13-2 用于创建新用户的代码*\n\n## 用户身份验证\n\n既然您有了创建用户的方法，就需要创建一个方案来对他们进行身份验证。返回到应用程序的\
  \ `身份验证方案` 屏幕，创建一个新的 `自定义` 方案，其身份验证函数如清单 13-3 所示。\n\n```sql\nfunction custom_authentication\
  \ (p_username in varchar2,\n                                p_password in varchar2)\
  \ return boolean\nis\n    v_userName     varchar2(20) := upper(p_username);\n  \
  \  v_valuesToHash apex_t_varchar2 :=\n        apex_t_varchar2(v_username, p_password);\n\
  \    v_userCount    int;\nbegin\n    select count(*) into v_userCount\n    from\
  \ USERS\n    where UserName = v_userName\n    and   Password = apex_util.get_hash(v_valuesToHash,\
  \ null);\n    return v_userCount = 1;\nend;\n```\n*清单 13-3 自定义身份验证函数*\n\n此身份验证函数将提供的用户名转换为大写，以确保用户名不区分大小写。然后它执行一个查询，检查\
  \ `USERS` 表中是否存在具有该用户名和编码密码的记录。如果存在，则返回 `true`。创建此身份验证方案后，请将其设为当前方案。然后运行您的应用程序。练习以\
  \ `ADMIN`、`GUEST` 和 `JOE` 的身份登录。转到 `管理用户` 页面创建另一个用户，然后注销并以该用户身份重新登录。\n\n## 公开页面\n\
  \n考虑一个身份验证方案不是 `无身份验证` 的应用程序。当未经身份验证的用户尝试访问应用程序的任何页面时，该用户将被定向到 `登录` 页面，并且在通过身份验证之前不允许继续。然而，Web\
  \ 应用程序通常包含无需身份验证的公开页面，以及需要身份验证的私有页面。APEX 属性 `身份验证` 允许您指定哪些页面应为公开页面。\n\n例如，假设您希望\
  \ `Employee Demo` 应用程序的主页是公开的。转到该页面的属性编辑器，向下滚动直到找到 `安全` 部分。其 `身份验证` 属性有两个值：`页面需要身份验证`（默认值）和\
  \ `页面是公开的`。参见图 13-6。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig6_HTML.jpg](img/335103_3_En_13_Fig6_HTML.jpg)\n\
  *图 13-6 指定公开页面*\n\n\n\n将值更改为`Page is Public`并保存页面。要测试更改，请注销应用程序。你会发现 APEX 允许你访问应用程序的主页，但如果你尝试访问任何其他页面，系统将要求你登录。\n\
  \n## 授权\n\n认证方案规定了哪些用户被允许访问应用程序的非公开页面。这是一个良好的开端，但往往还不够。一个 Web 应用程序可以有多种类型的用户，而某些页面（或页面的部分内容）只适合特定类型的用户。因此，你需要一种方法来指定哪些用户可以访问什么信息。安全的这一方面被称为`授权`。\n\
  \nAPEX 通过允许每个页面或页面组件关联一个`授权方案`来实现授权，该方案指定了一组允许的用户。如果一个页面（或组件）有关联的授权方案，那么它将只对方案指定的用户可见。\n\
  \n## 创建授权方案\n\n回想一下，内置变量`APP_USER`保存着当前用户的用户名。一个 APEX 授权方案由一个布尔表达式定义，通常涉及`APP_USER`的值；当表达式返回`true`时，用户即被授权。\n\
  \n授权表达式与验证表达式类似，它们的类型也相似。例如，`Exists SQL Query`类型在查询输出至少包含一条记录时返回`true`。`PL/SQL function\
  \ returning Boolean`类型是明确返回`true`或`false`的 PL/SQL 代码。\n\n举个例子，让我们为`Employee Demo`应用程序创建三个授权方案：\n\
  \n*   `Administrators`，如果当前用户拥有管理权限则返回`true`。\n*   `Guests`，如果当前用户名为`GUEST`则返回`true`。\n\
  *   `Built-in Users`，如果当前用户名为`GUEST`或`ADMIN`则返回`true`。\n\n`Administrators`方案可以通过以下`Exists\
  \ SQL`查询定义：\n\n```sql\nselect *\nfrom USERS\nwhere UserName = :APP_USER and IsAdministrator\
  \ = 'Y'\n```\n\n`Guests`方案可以通过以下 PL/SQL 函数定义：\n\n```sql\nreturn :APP_USER = 'GUEST';\n\
  ```\n\n`Built-in Users`方案可以通过以下 PL/SQL 函数定义：\n\n```sql\nreturn :APP_USER = 'GUEST'\
  \ or :APP_USER = 'ADMIN';\n```\n\n要创建一个授权方案，请转到应用程序的主页，点击`Shared Components`按钮，然后从`Security`部分选择`Authorization\
  \ Schemes`。你将进入一个列出了为你的应用程序创建的授权方案的屏幕；我的初始屏幕如图 13-7 所示。我的 APEX 服务器会自动为我创建的每个应用程序创建`Administration\
  \ Rights`方案。我的`Employee Demo`应用程序不需要它，所以我选择删除它。如果你的应用程序也有一个，请随意删除你的。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig7_HTML.jpg](img/335103_3_En_13_Fig7_HTML.jpg)\n\
  \n*图 13-7 初始的授权方案屏幕*\n\n点击`Create`按钮会打开授权方案向导的第一个屏幕，如图 13-8 所示。指定你想“从头开始”创建方案。点击`Next`按钮将打开向导的第二页。在此屏幕上，给方案命名，选择其类型，并在适当的框中输入规范；图\
  \ 13-9 展示了`Administrators`方案的这些规范。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig9_HTML.jpg](img/335103_3_En_13_Fig9_HTML.jpg)\n\
  \n*图 13-9 创建授权向导的第二个屏幕*\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig8_HTML.jpg](img/335103_3_En_13_Fig8_HTML.jpg)\n\
  \n*图 13-8 创建授权向导的第一个屏幕*\n\n向导的第二个屏幕还要求你提供一条错误消息（例如`Administrator access only`）并指定授权方案应多久验证一次。两个常见的选择是`Once\
  \ per session`和`Once per page view`。每个会话评估一次方案效率要高得多，并且是默认设置。只有当授权条件可能在会话期间发生变化时，你才会选择每次页面视图评估一次。\n\
  \n例如，考虑由以下 PL/SQL 函数定义的授权方案：\n\n```sql\nreturn :APP_USER = 'ADMIN'\nand extract(hour\
  \ from current_timestamp) >= 9\nand extract(hour from current_timestamp) < 17;\n\
  ```\n\n此方案仅对`ADMIN`用户返回`true`，且仅在上午 9 点到下午 5 点之间。如果授权方案的目的是将访问限制在这些时间，其评估点需要设置为`Once\
  \ per page view`。\n\n创建了`Administrator`授权方案后，你还应使用前面描述的条件为`Guest`和`Built-In Users`创建授权方案。假设你删除了预先构建的管理员权限方案，你的`Authorization\
  \ Schemes`屏幕现在应该如图 13-10 所示。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig10_HTML.jpg](img/335103_3_En_13_Fig10_HTML.jpg)\n\
  \n*图 13-10 当前的授权方案屏幕*\n\n## 组件授权\n\n每个页面组件都有一个属性`Authorization Scheme`，它出现在其`Security`部分。你通过从一个选择列表中选择来为组件分配授权方案。图\
  \ 13-11 描绘了我的`Employee Demo`应用程序的这个选择列表。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig11_HTML.jpg](img/335103_3_En_13_Fig11_HTML.jpg)\n\
  \n*图 13-11 为组件分配授权方案*\n\n\n\n## 授权方案选项与应用\n\n第一个选项是`–Select–`，表示不需要授权。接下来的三个选项是我创建的三种授权方案。最后三个是它们的否定形式，由\
  \ APEX 自动生成。`Must Not Be Public User`方案是 APEX 内置的，将在后面讨论。\n\n例如，考虑图 7-5 中的`Employee\
  \ Data Entry`页面。回想一下，这个页面有四个区域：一个显示`EMP`表报告的区域，以及用于删除、插入和更新表行的区域。假设任何人都可以查看员工报告，但不允许访客修改。在这种情况下，你会将授权方案`Not\
  \ Guests`分配给删除、插入和更新区域，并将`–Select–`分配给报告区域。结果是，以`GUEST`身份验证的用户将只看到报告区域；其他三个区域对他们将是隐藏的。\n\
  \n再举一个例子，再次考虑图 13-5 中的`Manage Users`页面。如果你希望页面上的两个区域只能由管理员访问，请为每个区域分配授权方案`Administrators`。结果是，管理员将看到如图所示的页面；非管理员将看到一个只有导航栏和菜单但没有内容的页面。\n\
  \n因为向用户显示一个基本空白的页面是尴尬的，所以页面应该向非管理员显示一些内容。一个解决方案是创建一个显示消息“此页面仅供管理员使用”的区域，并为其分配授权方案`Not\
  \ Administrators`。另一个解决方案是将授权方案分配给整个页面，稍后讨论。\n\n将授权方案分配给组件会导致该组件根据当前用户显示或隐藏。这种行为与你在第\
  \ 6 章研究的条件渲染非常相似。所以问题是：为什么要使用组件授权——为什么不使用条件渲染来完成所有操作？\n\n答案是，是的，可以使用条件渲染来执行授权。如果你创建一个与授权方案定义相同的条件，该区域的行为将完全相同。然而，使用显式授权有三个更好的理由：\n\
  \n*   一个授权方案可以用于多个组件，确保一致性。\n*   每个授权方案都有一个名称，这使应用程序开发人员更容易理解授权条件的效果。\n*   授权和条件渲染在应用程序中有着完全不同的目的，将它们分开会更清晰。\n\
  \n### 页面授权\n\n你可以将授权方案分配给页面本身，而不是分配给页面的组件。每个页面在其`Security`部分都有属性`Authorization Scheme`，其选项与图\
  \ 13-11 中的相同。\n\n例如，让我们构建一个名为`Change Password`的页面，允许用户更改自己的密码。此页面如图 13-12 所示，将是`Employee\
  \ Demo`的第 47 页。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig12_HTML.jpg](img/335103_3_En_13_Fig12_HTML.jpg)\n\
  \n**图 13-12 更改密码页面**\n\n此页面由一个静态内容区域组成，包含两个`Password`类型的项目：`P47_PASSWORD`和`P47_CONFIRM`。点击提交按钮会调用一个验证和一个过程。验证使用以下\
  \ SQL 表达式确保输入的两个密码相同：\n\n```\n:P47_PASSWORD = :P47_CONFIRM\n```\n\n该过程通过以下 PL/SQL\
  \ 代码更新`USERS`表：\n\n```\ndeclare\nv_valuesToHash apex_t_varchar2 :=\napex_t_varchar2(:APP_USER,\
  \ :P47_PASSWORD);\nbegin\nupdate USERS\nset Password = apex_util.get_hash(v_valuesToHash,\
  \ null)\nwhere UserName = :APP_USER;\nend;\n```\n\n这个页面应该如何授权？假设除了内置用户`GUEST`和`ADMIN`之外，每个人都应该被允许更改自己的密码。因此，页面的授权方案应该是`Not\
  \ Built-In Users`。\n\n将授权方案分配给页面会使未经授权的用户无法访问该页面。特别是，如果未经授权的用户尝试呈现该页面，APEX 将显示错误消息。图\
  \ 13-13 显示了当内置用户尝试访问`Change Password`页面时出现的错误消息。点击消息上的“确定”按钮将用户返回到上一页。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig13_HTML.jpg](img/335103_3_En_13_Fig13_HTML.jpg)\n\
  \n**图 13-13 未经授权访问页面的结果**\n\n这个错误消息完成了任务，但不是很好。错误消息有些生硬。（事实上，消息是反的——APEX 使用为`Built-in\
  \ Users`方案定义的错误消息，因为被否定的方案是自动生成的，没有错误消息。）一个更用户友好的方法是简单地向未经授权的用户隐藏页面。对于`Change Password`页面，这相当于不向未经授权的用户显示其导航菜单条目。这可以通过更改列表条目的`Authorization\
  \ Scheme`属性轻松完成。\n\n要找到该属性，请从应用程序的`Shared Components`屏幕开始，导航到`Desktop Navigation\
  \ Menu`列表，如图 4-2 所示。向下滚动到其`Change Password`条目；点击该条目将调出如图 4-3 所示的`List Entry`屏幕。你要的属性在`Authorization`部分；选择`Not\
  \ Built-in Users`授权方案，然后点击`Apply Changes`按钮。\n\n然后运行你的应用程序。请注意，如果你以`ADMIN`或`GUEST`身份登录，导航菜单中将缺少`Change\
  \ Password`页面的条目。一个好的经验法则是：如果一个页面有授权方案，其关联的导航菜单条目应该具有相同的授权方案。\n\n### 非公共用户方案\n\n\
  授权方案`Not Public User`是 APEX 内置的。它对任何已登录用户返回`true`，如果用户未登录则返回`false`。它的主要用途是有选择地隐藏公共页面上的组件。\n\
  \n例如，假设你应用程序的主页是一个公共页面。然而，并非页面的所有部分都应该是公共的；特别是，`Quick Link`区域应该只对登录用户可见。这种情况可以通过将该区域的授权设置为`Not\
  \ Public User`来处理。\n\n\n### 避免恶意使用\n\n一个 Web 应用的认证和授权方案详细规定了谁被允许访问哪些页面的哪些组件。每个经过认证的用户都对数据拥有一个明确定义的、有限的接口——当然，前提是用户以预期的方式访问页面。\n\
  \n问题在于，用户有各种方式来破坏 Web 应用的预期功能。本节重点介绍三种此类技术：SQL 注入、跨站脚本攻击和 URL 篡改。在**SQL 注入**中，用户提交一个伪装成输入数据的\
  \ SQL 代码片段，并更改正在处理这个伪造“数据”的查询。在**跨站脚本攻击**中，用户将恶意的 JavaScript 代码片段保存为表数据值的一部分；当另一个用户随后显示该值时，JavaScript\
  \ 代码也会执行。在**URL 篡改**中，用户以服务器期望的形式向服务器发送一个 URL；然而，该 URL 请求的操作是用户本不应执行的。\n\nAPEX 具有若干特性，可帮助你防范恶意使用。事实上，利用这些特性构建一个防篡改的应用程序相对简单。但要利用它们，你需要了解威胁是什么以及\
  \ APEX 如何防范它们。\n\n## SQL 注入\n\n回顾图 12-1 中的`Report Builder`演示页面。此页面的意图是根据输入到`Enter\
  \ Condition`文本区域的条件，显示`EMP`表或`DEPT`表的子集。然而，恶意用户可能输入一个条件，导致页面以相当意外的方式显示其他表中的数据。例如，图\
  \ 13-14 显示了一个显示`USERS`表内容的条件。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig14_HTML.jpg](img/335103_3_En_13_Fig14_HTML.jpg)\n\
  \n图 13-14 Report Builder 页面的意外使用\n\n请注意，输入到`Enter Condition`项中的字符串不是一个合法的 SQL 条件。相反，它由一个合法条件`EmpNo<0`加上一些额外的\
  \ SQL 代码组成。要理解输入的目的，你必须了解清单 12-1 中的 PL/SQL 函数如何构建报告的源查询。回想一下，该代码生成了一个针对`EMP`的查询开头，然后将指定的条件附加到其末尾。因此，为图\
  \ 13-14 生成的源查询变成如下形式：\n\n```sql\nselect EName, Job, Offsite\nfrom EMP where EmpNo\
  \ < 0\nunion\nselect UserName, substr(Password,1,9), IsAdministrator\nfrom USERS\n\
  ```\n\n请注意，用户利用了`union`关键字来扩大查询的范围。原本针对`EMP`表的预期查询现在只是整个查询的一个子查询。此外，条件`EmpNo<0`导致该子查询不返回任何记录，这意味着整个查询的输出完全来自第二个子查询。\n\
  \n第二个子查询可以是任意的，但受限于它必须与第一个子查询具有相同的列数，并且每个输出值必须匹配第一个子查询对应列的类型。这一限制解释了为什么第二个子查询只提取密码的前九个字符——`Job`列被定义为`varchar2(9)`，因此尝试选择更多字符会产生\
  \ SQL 错误。\n\n恶意用户可能利用此漏洞获取用户的编码密码，以便随后破解它们并获得对应用的未授权访问。当然，仅拥有编码密码的前九个字符是不够的。然而，恶意用户可以多次运行此漏洞，每次获取密码的接下来九个字符，从而发现剩余字符。\n\
  \n这种技术被称为**SQL 注入**。当恶意用户在基于文本的项中输入 SQL 以改变查询的预期目的时，就发生了 SQL 注入。前面的例子表明 SQL 注入可能产生严重后果。因此，应用程序开发者必须意识到\
  \ SQL 注入的可能性，并不惜一切代价避免它。\n\n从某种意义上说，`Report Builder`页面是在自找麻烦，因为`Enter Condition`项期望\
  \ SQL 代码。SQL 注入的真正危害在于，即使一个项期望一个值，它也可能成功。例如，让我们构建一个名为`SQL Injection`的页面，它将是`Employee\
  \ Demo`的第 48 页。图 13-15 显示了此页面的预期用途。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig15_HTML.jpg](img/335103_3_En_13_Fig15_HTML.jpg)\n\
  \n图 13-15 SQL Injection 页面的预期用途\n\n该页面包含两个区域。`Show Employee Values`区域的输入是`EMP`表的一个列名；点击`Submit`按钮后，将显示该列不同值的报告。在图\
  \ 13-15 中，报告显示了`EMP`表中出现的五个职位。\n\n`Get Employee Info`区域类似。它的输入是一个列名和一个员工编号；点击提交按钮将显示所选员工该列的值。在图\
  \ 13-15 中，该区域告诉你 Blake 是一名经理。\n\n我们首先考虑如何实现`Show Employee Values`区域。它将有一个项：一个名为`P48_COLUMN1`的文本字段。该区域的类型将是`Classic\
  \ Report`，并将使用如第 12 章所述的动态 SQL。也就是说，其源将具有`PL/SQL Function Body returning SQL Query`类型，并包含清单\
  \ 13-4 中所示的代码。\n\n```sql\nreturn 'select distinct ' || :P48_COLUMN1 || ' from EMP';\n\
  ```\n清单 13-4 用于“显示员工值”报告的 PL/SQL 代码\n\n由于报告使用动态 SQL，你还需要配置一些报告属性，如下所示：\n\n*   启用通用列名。\n\
  *   指定列数为 1。\n*   将列标题类型设置为`PL/SQL Function Body`，表达式为`return :P48_COLUMN1;`。\n\n\
  现在让我们考虑如何实现`Get Employee Info`区域。它是一个静态内容区域，包含三个项：`P48_COLUMN2`是一个文本字段，`P48_EMPNO2`是一个显示员工姓名并返回员工编号的选择列表，`P48_VALUE2`是一个只读显示项。\n\
  \n\n## SQL 注入\n\n该区域有一个与提交按钮关联的过程；该过程的代码出现在清单 13-5 中。代码首先构造一个查询字符串以检索指定的员工值。然后使用`execute\
  \ immediate`来检索员工`P48_EMPNO2`的指定值，并将其放入只显示项`P48_VALUE2`中。\n\n```\ndeclare\n  v_query\
  \ varchar2(100);\nbegin\n  v_query := 'select ' || :P48_COLUMN2 || ' from EMP where\
  \ EmpNo = :1';\n  execute immediate v_query\n                into  :P48_VALUE2\n\
  \              using :P48_EMPNO2;\nend;\nListing 13-5\n获取员工信息区域的过程代码\n```\n\n尽管此页面上的区域看起来无害，但它们容易受到\
  \ SQL 注入攻击。图 13-16 显示了如何利用页面的任一区域来显示`ADMIN`用户的完整编码密码。（截图截断了编码密码以节省空间。）\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig16_HTML.jpg](img/335103_3_En_13_Fig16_HTML.jpg)\n\
  图 13-16\nSQL 注入页面的恶意使用\n\n图 13-16 中`P48_COLUMN1`的值如下：\n\n```\nPassword from USERS\
  \ where UserName = 'ADMIN' --\n```\n\n当 APEX 使用此字符串构造报表源时，它会得到以下 SQL 查询：\n\n```\n\
  select distinct Password from USERS where UserName = 'ADMIN' -- from EMP\n```\n\n\
  回想一下，字符“`--`”在 PL/SQL 中表示注释。因此，SQL 代码中的`from EMP`部分被完全忽略。换句话说，SQL 注入将针对`EMP`表的查询转变成了针对`USERS`表的查询。\n\
  \n`获取员工信息`区域使用了本质上相同的注入技巧。图 13-16 中`P48_COLUMN2`的值如下：\n\n```\nPassword from USERS\
  \ where UserName = 'ADMIN' or :1 < 0 --\n```\n\n当 APEX 使用此字符串构造报表源时，它会得到以下 SQL 查询：\n\
  \n```\nselect Password from USERS\n    where UserName = 'ADMIN' or :1 < 0 --from\
  \ EMP where EmpNo = :1\n```\n\n同样，注释字符之后的所有内容都被忽略，因此注入最终创建了一个对`USERS`表而非`EMP`表的查询。请注意，恶意用户必须仔细构造注入代码，以使生成的\
  \ SQL 字符串合法。考虑`获取员工信息`示例。`execute immediate`语句将员工号传递给 SQL 查询；虽然恶意查询不会使用此值，但它仍然需要一个形式参数来接收它。表达式`:1<0`实现了这个目标。指定的员工号被赋值给参数`:1`。因为员工号总是正数，这个表达式总是求值为`false`，所以它不会影响查询的输出。\n\
  \n一般来说，只要查询字符串是从原始的、未检查的用户输入构造的，就可能发生 SQL 注入。在这种情况下，恶意用户可能能够输入一个代码片段作为输入，从而改变构造查询的目的。因此，应用程序开发人员应始终检查用户输入，以确保其符合预期的格式。这里有三种策略：\n\
  \n*   避免基于文本的输入。请注意，如果用户被迫从列表中选择一个列，图 13-16 的 SQL 注入技术将不起作用（尽管 URL 修改技术可以规避此策略，稍后会看到）。\n\
  *   为输入编写一个 APEX 验证，以检测可能的代码片段。例如，在图 13-16 中，你可以拒绝接受包含空格或注释字符的列名。\n*   将输入转换为“净化”形式。也就是说，编写一个函数将用户值转换为可接受的值。在图\
  \ 13-16 中，该函数可能会删除输入中的所有空格，或者将每个空格转换为转义的 HTML 字符`&nbsp;`。\n\n让我们看看如何使用这些策略来改进图 13-14\
  \ 所示的`报表生成器`页面。问题当然是，基于文本的项`输入条件`要求用户输入 SQL 代码。第一种策略建议你尝试一种非基于文本的方式来指定条件。`计数和删除`演示页面的`版本\
  \ 2`区域（如图 12-4 所示）展示了如何做到这一点，至少对于简单条件是这样。APEX *query builder*提供了一个更复杂的解决方案。\n\n\
  注意\n如果你从未使用过查询构建器，你应该试一试。从 APEX SQL Workshop 开始，点击`实用程序`，然后点击`查询构建器`。点击一个表名以将其包含在查询中，然后进行探索。\n\
  \n第二种策略建议你编写一个验证，拒绝包含可疑关键字（如`union`或`select`）的条件字符串。这个策略在这里似乎是合理的。\n\n第三种策略对于期望\
  \ SQL 代码作为输入的项效果不佳，如图 13-14 所示。然而，对于期望值的项，如图 13-15 中的`SQL 注入`页面，它是有用的。特别是，对于`显示员工值`区域的一个好策略是从报表源的`P48_COLUMN1`中删除所有空格，如清单\
  \ 13-6 所示。\n\n```\nreturn 'select distinct ' || replace(:P48_COLUMN1, ' ', '') ||\
  \ ' from EMP';\nListing 13-6\n修改清单 13-4 以避免 SQL 注入\n```\n\n类似地，你可以通过从提交过程代码的`P48_COLUMN2`中删除所有空格来改进`获取员工信息`区域。\n\
  \n### 防护策略\n*   避免基于文本的输入。请注意，如果用户被迫从列表中选择一个列，图 13-16 的 SQL 注入技术将不起作用（尽管 URL 修改技术可以规避此策略，稍后会看到）。\n\
  *   为输入编写一个 APEX 验证，以检测可能的代码片段。例如，在图 13-16 中，你可以拒绝接受包含空格或注释字符的列名。\n*   将输入转换为“净化”形式。也就是说，编写一个函数将用户值转换为可接受的值。在图\
  \ 13-16 中，该函数可能会删除输入中的所有空格，或者将每个空格转换为转义的 HTML 字符`&nbsp;`。\n\n## 跨站脚本\n\n在*跨站脚本*技术中，恶意用户将\
  \ JavaScript 代码作为数据库值的一部分保存。这段代码就像一个陷阱：当另一个用户显示包含该值的页面时，用户的浏览器会在用户不知情的情况下执行 JavaScript\
  \ 代码。JavaScript 代码可能会做诸如将用户的会话信息通过电子邮件发送给攻击者（从而让攻击者冒充用户）或让 APEX 服务器执行指定函数等事情。\n\n\
  跨站脚本之所以如此邪恶，是因为 JavaScript 代码是*以受害者的授权级别*执行的。因此，如果管理员成为跨站脚本攻击的受害者，攻击者将获得数据库的管理员级访问权限。\n\
  \n成功的跨站脚本攻击有三个要求：首先，某个表必须有一个类型为`varchar2(N)`的列，其中`N`足够大以容纳 JavaScript 代码；其次，应用程序的某个页面必须有一个用于向该字段输入数据的基于文本的项；第三，应用程序的某个页面必须配置为以“原始”未转义形式显示被污染的值。\n\
  \n就目前情况而言，`员工演示`应用程序不易受到跨站脚本攻击，因为`EMP`和`DEPT`都没有足够大的列。因此，为了本示例的目的，你应该通过将`DEPT`表的`Loc`列扩展为`varchar2(80)`来修改它。所需的\
  \ SQL 如下：\n\n```\nalter table DEPT\nmodify Loc varchar2(80)\n```\n\n现在，你可以构建一个页面来演示跨站脚本攻击。`跨站脚本`页面是`员工演示`的第\
  \ 49 页，如图 13-17 所示。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig17_HTML.jpg](img/335103_3_En_13_Fig17_HTML.jpg)\n\
  图 13-17\n跨站脚本页面\n\n\n\n此页面包含两个区域。`Departments` 区域是一个经典报表，其源查询为\n\n```sql\nselect\
  \ * from DEPT\norder by DName\n```\n\n`Update Location` 区域是一个表单，其源查询为\n\n```sql\n\
  select DeptNo, Loc\nfrom DEPT\n```\n\n你应该使用第 10 章的技术来自定义表单区域。具体来说：\n\n-   开启表单的\
  \ `Edit Enabled` 属性，并选择 `Update Row` 作为唯一允许的操作。\n-   创建一个按钮，其操作为 `Submit`，其数据库操作为\
  \ `SQL UPDATE action`。\n-   指定项目 `P49_DEPTNO` 是主键。同时，将其类型更改为 `Select List`，并配置值列表查询。\n\
  \n```sql\nselect DName, DeptNo\nfrom DEPT\n```\n\n此页面还需要一个额外的配置来匹配图 13-17，即 `Loc`\
  \ 列中的值应该以粗体格式显示。第 3 章展示了如何使用列的 `HTML Expression` 属性将列值包裹在 HTML 标签中。例如，你可以将 `LOC`\
  \ 列的 HTML 表达式设置为：\n\n```html\n<b>#LOC#</b>\n```\n\n出于本示例的目的，我想使用一种不同的技术，即利用报表的源查询来格式化该列。具体来说，将报表的源查询更改为：\n\
  \n```sql\nselect DeptNo, DName, '<b>' || Loc || '</b>' as Loc\nfrom DEPT\norder\
  \ by DName\n```\n\n请注意，该查询在部门名称周围包裹了 HTML 标签，这意味着 `LOC` 的值就是 HTML 表达式。其思路是，当显示报表时，LOC\
  \ 的值应该以粗体格式化。然而，这并不完全奏效。如果你运行该页面，HTML 标签会作为值的一部分显示出来，如图 13-12 所示。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig18_HTML.jpg](img/335103_3_En_13_Fig18_HTML.jpg)\n\
  *图 13-18 报表显示了 HTML 标签*\n\n如果你仔细想想，这个结果是有一定道理的——毕竟，报表只是显示查询的输出。然而，实际情况比这更复杂。考虑 APEX\
  \ 如何渲染报表：它生成一个 HTML 表格，并将输出值放入其中。因此，例如，显示报表第一行的 HTML 代码可能如下所示：\n\n```html\n<tr>\n\
  \  <td>ACCOUNTING</td>\n  <td><b>NEW YORK</b></td>\n</tr>\n```\n\n尽管 `<b>` 和 `</b>`\
  \ 标签是作为数据输入到表格中的，但浏览器最终会将它们视为 HTML。为了使 APEX 能在报表中显示这些标签，它必须做额外的工作。具体来说，它会将 `<` 和\
  \ `>` 字符转换为恰好显示相同的其他字符。这种转换称为 *转义特殊字符*。具体来说，字符 `<` 被替换为 `&lt;`，字符 `>` 被替换为 `&gt;`。每个报表列在其\
  \ `Security` 部分都有一个 `Escape special characters` 属性。默认情况下它是开启的，这会导致 APEX 转义特殊字符，并如\
  \ 13-18 图所示显示 HTML 标签。现在转到 `Loc` 列并关闭此属性。`Loc` 值中的标签将不会被转义，因此将被作为 HTML 处理。报表现在将看起来像图\
  \ 13-17。\n\n这种在 SQL 源查询中格式化数据的能力非常强大，可以让你完成通过 `HTML Expression` 属性无法实现的事情。例如，你可以选择将一列中的某些值格式化为文本，而将其他值格式化为链接或图像。然而，这种强大功能是有代价的。一旦你关闭了一列的\
  \ `Escape special characters` 属性，你就使自己面临跨站脚本攻击的风险。该属性的帮助屏幕对此点特别强调；参见图 13-19。\n\n\
  ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig19_HTML.jpg](img/335103_3_En_13_Fig19_HTML.jpg)\n\
  *图 13-19 Escape Special Characters 属性的帮助文本*\n\n为了演示，让我们看看利用此页面危害应用程序是多么容易。从 `Update\
  \ Location` 区域，选择任何部门，例如 `OPERATIONS`。`Location` 字段应显示当前值，即 `BOSTON`。将该值更改为：\n\n\
  ```text\nBOSTON<script>alert('Your application has been compromised')</script>\n\
  ```\n\n这个新值是一个字符串，由位置信息后跟一个调用 JavaScript 函数 `alert` 的脚本组成。当浏览器渲染此字符串时，它将显示 \"BOSTON\"\
  ，然后调用脚本。换句话说，此次更新对报表没有可见的影响。但是，脚本将在每次有人渲染页面时运行。\n\n单击 `Submit Changes` 按钮。在页面重新加载之前，你的浏览器将显示一个类似于图\
  \ 13-20 的警报。现在导航到其他页面再返回此页面——警报将再次显示。意识到如果没有这个警报，你根本不会知道你的应用程序已经被严重入侵，这有点令人不寒而栗。\n\
  \n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig20_HTML.jpg](img/335103_3_En_13_Fig20_HTML.jpg)\n\
  *图 13-20 跨站脚本攻击成功*\n\n前面的 JavaScript 代码并无恶意。`alert` 函数只是在用户浏览器中显示一个警告窗口。恶意的 JavaScript\
  \ 字符串几乎肯定不会弹出警报，而是会做一些更复杂和恶意的事情。很可能，当你发现问题时，为时已晚。因此，你需要确保这种情况不会发生。\n\n消除跨站脚本攻击的唯一方法是确保页面不显示未转义的数据。有三种方法可行，我们将依次考虑：\n\
  \n-   拒绝不适当的数据\n-   在将数据保存到数据库之前对其进行转义\n-   在显示数据之前对其进行转义\n\n### 拒绝不适当的数据\n\n在任何数据录入页面中，防止不适当的数据被输入数据库是良好的实践。这就是数据库约束和\
  \ APEX 验证的用途。检查输入数据是否包含意外 HTML 的行为遵循相同的原理。你可以采取两种方法。\n\n第一种方法是使用项目 `Security` 部分中的\
  \ `Restricted Characters` 属性。此属性允许你指定输入中允许哪些字符。图 13-21 显示了可能的选项。你可以要求输入只能是字母数字，或者可以限制使用某些特殊字符。\n\
  \n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig21_HTML.jpg](img/335103_3_En_13_Fig21_HTML.jpg)\n\
  *图 13-21 Restricted Characters 属性的选项*\n\n在当前示例中，假设部门位置是字母数字；在这种情况下，将 `P49_LOC` 的\
  \ `Restricted Characters` 属性设置为 `Whitelist for a–Z, 0–9, and space` 是合理的。如果不是，那么你至少应该将其设置为\
  \ `Blacklist HTML command characters`。\n\n第二种方法是编写一个 APEX 验证来执行限制。APEX 提供了一个名为 `apex_escape.html`\
  \ 的函数，它接受任何输入字符串，并将其转换为视觉上相同但不包含 HTML 字符的字符串。例如，代码清单 13-7 显示了一个验证的 PL/SQL 代码，如果\
  \ `P49_LOC` 的输入包含 HTML 字符，则该验证返回 `false`。\n\n```plsql\ndeclare\n  v_LocEscaped varchar2(100);\n\
  begin\n  v_LocEscaped := apex_escape.html(:P49_LOC);\n  if :P49_LOC = v_LocEscaped\
  \ then\n    return true;\n  else\n    return false;\n  end if;\nend;\n```\n*代码清单\
  \ 13-7 防范不需要的 HTML 输入的验证*\n\n### 在保存数据之前转义数据\n\n\n## 防止恶意攻击\n\n### 转义 HTML 输入\n\
  与其拒绝基于 HTML 的输入，不如将其转换为不含 HTML 字符的版本。`apex_escape.html` 函数在此同样非常实用。例如，在《跨站脚本攻击》章节中，表单生成了更新数据库的流程。您可以将该流程替换为一个\
  \ PL/SQL 流程，该流程先对值进行转义，然后再保存。此类流程的代码如代码清单 13-8 所示。\n\n```\nbegin\nupdate DEPT\n\
  set Loc = apex_escape.html(:P44_LOC)\nwhere DeptNo = :P44_DEPTNO;\nend;\n代码清单 13-8\n\
  转义不需要的 HTML 输入\n```\n\n### 显示前转义数据\n应用程序可能无法保证数据库中不包含任何 HTML 代码，因为用户可能有其他输入数据的方式。因此，为了防止跨站脚本攻击，在将数据呈现在页面之前对其进行转义是一个好习惯。这正是\
  \ `Escape Special Characters` 属性的用途（请参考图 13-19）。如果您报表中的每一列都启用了此属性，那么您的报表就能对跨站脚本攻击免疫。\n\
  \n然而，如果您报表中的某一列需要关闭此属性，您就必须转义必要的字符。同样，`apex_escape.html` 函数非常实用。例如，代码清单 13-9 给出了示例报表的原始来源，而代码清单\
  \ 13-10 展示了一个经过修订的版本，其中的数据已经被转义。\n\n```\nselect DeptNo, DName, '' || apex_escape.html(Loc)\
  \ || '' as Loc\nfrom DEPT\norder by DName\n代码清单 13-10\n修订后的源查询\n```\n\n```\nselect\
  \ DeptNo, DName, '' || Loc || '' as Loc\nfrom DEPT\norder by Dname\n代码清单 13-9\n\
  原始源查询\n```\n\n## URL 修改\n第三种恶意攻击利用了网页的访问方式。在一个典型的非恶意场景中，用户将应用程序主页的 URL 输入浏览器。从此之后，URL\
  \ 在很大程度上就不重要了；用户通过点击标签、链接和按钮导航到其他页面。\n这个场景对应于应用程序的预期用途。页面上的导航链接旨在帮助用户决定接下来要查看哪些页面。事实上，衡量应用程序质量的一个标准是导航在多大程度上有助于形成连贯的用户体验。\n\
  当然，用户不一定遵循这个场景。了解应用程序 URL 结构的用户可以通过简单地构造一个有效的 URL 来访问任意页面。这种可能性给 APEX 开发人员带来了几个困难。以下小节将探讨这些困难及其解决方案。\n\
  \n### APEX URL 结构\nAPEX 应用程序支持两种不同的 URL 格式：一种是旧版语法，另一种是更新的“友好”语法。本书中使用的语法一直是旧版语法，其中应用程序和页面通过其编号来指定。例如，我的\
  \ `Employee Demo` 应用程序的编号是 91392，主页的编号是 1。因此，我的主页的旧版 URL 是\n\n```\napex.oracle.com/pls/apex/f?p=91392:1\n\
  ```\n\n友好 URL 语法则通过名称来指定工作区、应用程序和页面，而不是编号。例如，我的主页的友好 URL 是\n\n```\napex.oracle.com/pls/apex/understanding_apex/r/employee-demo/home\n\
  ```\n\n尽管在本章中我将继续使用旧版 URL，但大多数概念也适用于友好 URL。（即使您偏好友好 URL，您仍然需要了解恶意用户如何滥用旧版 URL。）\n\
  一个旧版 URL 支持九个冒号分隔的参数；如果某个参数的值缺失，则使用默认值。您已经知道了前三个参数：应用程序 ID、页面 ID 和会话 ID。另外两个相关的参数是第七个和第八个，它们用于设置会话状态。\n\
  \n关于这些参数的示例，请考虑第 6 章中的 `Employees by Department` 页面，该页面再次出现在图 13-22 中。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig22_HTML.jpg](img/335103_3_En_13_Fig22_HTML.jpg)\n\
  \n图 13-22\nEmployees by Department 页面\n\n回想一下，当您点击 `Click for Details` 链接时，会发生重定向，设置\
  \ `P12_DEPTNO` 和 `P12_DNAME` 的会话状态值，然后页面会重新渲染。代码清单 13-11 显示了点击 `ACCOUNTING` 对应的链接所产生的旧版\
  \ URL，假设会话 ID 是 98765。（为了节省空间，我省略了 URL 的通用前缀。）\n\n```\nf?p=91392:12:98765::::P12_DEPTNO,P12_DNAME:10,ACCOUNTING\n\
  代码清单 13-11\nEmployees by Department 页面的 URL\n```\n\n此清单说明了 URL 第七个和第八个参数的用途。第七个参数是一个逗号分隔的列表，包含了要设置其值的项（`P12_DEPTNO`\
  \ 和 `P12_DNAME`），而第八个参数是这些项将被设置成的值的列表（`10` 和 `ACCOUNTING`）。\n\n### GET 与 POST\n\
  浏览器向 Web 服务器发出的请求可以是不同类型。最常见的两种类型是 GET 和 POST，它们在向服务器传递信息的方式上有所不同。POST 请求将信息放置在请求数据包内的一个特定区域。而\
  \ GET 请求则通过其 URL 将信息传递给服务器。\n在 APEX 中，POST 请求由提交操作发出。为了处理一个提交，浏览器提取页面项的值，将它们打包到\
  \ POST 请求中，然后将其发送到服务器。服务器随后使用这些值来更改会话状态。如果您想验证这一点，请转到任何带有提交按钮的页面（例如 `Filter by Job\
  \ and Department`）。点击提交按钮，并观察 URL 没有改变。这证明了计算的输入不是所提交 URL 的一部分，这也是您无法将提交操作的结果加入书签的原因。\n\
  另一方面，APEX 中的重定向操作发出的是 GET 请求。重定向由多种 APEX 组件执行，例如按钮、基于列表的项、列链接和分支。作为重定向的一部分，APEX\
  \ 允许您将会话状态中的指定项设置为特定值。例如，在图 13-22 的 `Employees by Department` 页面中，`Click for Details`\
  \ 列链接将 `P12_DEPTNO` 和 `P12_DNAME` 分别设置为当前记录的部门编号和名称。浏览器通过将此信息编码在 URL 内将其发送到服务器，如代码清单\
  \ 13-11 所示。\n由于 APEX URL 的结构是众所周知的，一个经过身份验证的用户有可能构造一个 URL，以应用程序开发人员未曾意图的方式访问应用程序。接下来的章节将考虑两种技术。\n\
  \n### 页面扫描\n第一种技术称为 **页面扫描**。用户构造一系列 URL 来访问每一个可能的页面，只是为了看看会显示什么页面（如果有的话）。页面扫描的可能性意味着您不能仅仅通过隐藏页面来使其不可访问。例如，考虑图\
  \ 13-12 中的 `Change Password` 页面，它是 `Employee Demo` 的第 47 页。在那一节中，您看到了如何通过为其导航菜单项分配授权方案来隐藏该页面。尽管这是一个良好的设计策略，但它并不能使页面不可访问，因为任何用户都可以通过\
  \ URL 访问该页面\n\n```\napex.oracle.com/pls/apex/f?p=91392:47。\n```\n\n\n由于缺乏明确的标题结构，以下根据内容逻辑对文档进行层级划分和格式优化：\n\
  \n## 页面扫描与项目修改安全\n\n由于没有好的方法来消除页面扫描，开发者的唯一对策是使用授权来限制可访问性。换句话说，页面扫描的可能性意味着为每个页面定义授权方案至关重要，无论其在导航菜单中的可见性如何。\n\
  \n### 项目修改\n\n第二种技术，*项目修改*，可用于攻击那些通过 URL 设置项目值的页面。用户获取该页面的现有合法 URL，修改其赋值，并提交修改后的\
  \ URL。\n\n例如，假设公司有第五个部门，其部门编号为 50，名称为 `SECRET`。假设你不希望该部门的成员公开，因此你将图 13-22 中 `Departments`\
  \ 报告的数据源设置为排除该部门。不幸的是，很容易使用 URL 修改来获取此隐藏信息。用户只需修改清单 13-11 中的 URL，使其请求第 50 号部门的内容，如下所示：\n\
  \n```\nf?p=91392:12:98765::::P12_DEPTNO,P12_DNAME:50,SECRET\n```\n\n再举一个例子，考虑图 10-9\
  \ 的 `Form Update` 页面。图 13-23 显示了我在 `Choose Employee` 项目中选择 BLAKE 后，其 `Update Employees`\
  \ 区域的情况。这个名为 `P30_EMPNO` 的项目执行了一个 `Redirect and Set Value` 操作。重定向操作生成的 URL 是：\n\n\
  ![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig23_HTML.jpg](img/335103_3_En_13_Fig23_HTML.jpg)\n\
  \n**图 13-23** 更新员工区域\n\n```\nf?p=91392:30:98765::::P30_EMPNO:7698\n```\n\n此 URL\
  \ 重定向到第 30 页，并将选择列表的会话状态值设置为 7698，即 BLAKE 的员工编号。一旦我理解这一点，我就可以修改此 URL 来检索任何员工的信息。例如，如果我在浏览器中输入相同的\
  \ URL，将最后四个字符改为 `7782`，我将看到员工 CLARK 的信息。\n\n乍一看，这种修改似乎没什么大不了的。毕竟，我为什么要费力地在 URL 中输入值，而不是使用选择列表来为我完成呢？这项技术的关键在于，无论项目在页面上如何实现，它都有效。\n\
  \n在图 13-23 中，`P30_EMPNO` 是一个显示所有员工的选择列表。但假设它只显示销售部门的员工，因为应用程序开发人员希望用户只能修改这些员工的记录。这无关紧要，因为我可以通过\
  \ URL 直接输入任何员工号来绕过选择列表。`P30_EMPNO` 的类型是什么，甚至它是否可见，都绝对没有影响。\n\n项目修改也可以应用于使用提交而非重定向的页面。也就是说，你可以使用项目修改来更改通过\
  \ POST 传递且甚至不出现在 URL 中的项目的值。再次考虑图 6-5 的 `Filter by Job and Department` 页面，它显示在图\
  \ 13-24 中。假设你从选择列表中选择了 `Job` 和 `Dept` 值（例如 `CLERK` 和 `RESEARCH`）然后提交。URL 将是：\n\n\
  ```\nf?p=91392:9:98765:::::\n```\n\n也就是说，项目 `P9_JOB` 和 `P9_DEPTNO` 的值不会出现在 URL 中，因为输入是通过\
  \ POST 请求发送的。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig24_HTML.jpg](img/335103_3_En_13_Fig24_HTML.jpg)\n\
  \n**图 13-24** 按工作和部门筛选页面\n\n现在假设我通过向最后两个参数添加项目名和值来修改 URL，如下所示：\n\n```\nf?p=91392:9:98765::::P9_JOB,P9_DEPTNO:MANAGER,10.\n\
  ```\n\nAPEX 执行请求的过程如下。它首先通过将项目值从浏览器复制到会话状态来执行提交；然后，它将 URL 中指定的值复制到两个指定的项目中，并呈现页面。因此，页面上选择的\
  \ `P9_JOB` 和 `P9_DEPTNO` 的值将被 URL 中的值覆盖。也就是说，生成的报告将列出会计部门的经理，而不管选择列表中显示的值是什么！\n\n\
  项目修改的可能性意味着你不能依赖基于列表的项目来对输入数据施加任何类型的限制。这对 SQL 注入和跨站脚本攻击有影响。回想一下，对这些技术的讨论指出，攻击者需要足够长的基于文本的项目进行数据输入，因此建议使用基于列表的项目。然而，攻击者可以使用项目修改直接将攻击代码输入到\
  \ URL 中。因此，除非有办法禁止项目修改，否则使用基于列表的项目无法提供安全性（并且实际上会给人一种虚假的安全感）。\n\n### 防范项目修改\n\nAPEX\
  \ 有一项名为 *页面访问保护* 的功能，其唯一目的是防止项目修改攻击。有多个保护级别。本节将仅讨论最通用的一种：`Arguments Must Have Checksum`。它的工作原理如下。\n\
  \n假设一个页面在此级别受到保护。如果该页面的 URL 分配了项目值，则该 URL 还必须包含这些值的校验和。当 APEX 服务器收到请求时，它会提取参数值，计算它们的校验和，并将其与\
  \ URL 中的校验和进行比较；如果不同，则拒绝该请求。\n\n其理念是校验和函数只有 APEX 知道。当 APEX 为重定向操作生成 URL 时，它会计算校验和并将其添加到\
  \ URL 中。如果用户以任何方式修改了项目值，现有的校验和将不再正确；此外，用户将无法知道如何计算正确的值。同样，用户无法从零开始创建保存项目的 URL，因为无法确定其校验和。因此，项目修改是不可能的。\n\
  \n为页面启用页面访问保护有两个步骤。第一步是启用应用程序的 `Session State Protection` 属性。从应用程序的主屏幕开始，单击 `Edit\
  \ Application Properties` 按钮，然后单击 `Security` 选项卡。该属性位于 `Session State Protection`\
  \ 部分。很可能，该属性已经启用；如果未启用，请选择 `Enabled`。第二步是转到该页面的页面属性。`Page Access Protection` 属性位于\
  \ `Security` 部分；选择选项 `Arguments Must Have Checksum`。\n\n作为测试，为 `Employees by Department`\
  \ 页面设置页面访问保护。然后转到该页面并单击会计部门的链接。你应该看到一个类似以下的 URL：\n\n```\nf?p=91392:12:98765::::P12_DEPTNO,P12_DNAME:10,ACCOUNTING&cs=10FzVgvoxRFQBVRnEe9Ww2QSzoVM\n\
  ```\n\n请注意，此 URL 与清单 13-11 中的 URL 相同，只是末尾多了校验和信息。现在尝试对此 URL 执行项目修改（无论是否更改校验和值）。APEX\
  \ 会检测到修改，并返回图 13-25 中显示的错误消息。\n\n![../images/335103_3_En_13_Chapter/335103_3_En_13_Fig25_HTML.jpg](img/335103_3_En_13_Fig25_HTML.jpg)\n\
  \n**图 13-25** 检测到尝试进行项目修改\n\n\n\n## 安全性\n\n### 页面访问保护的复杂性\n\n还有一个额外的复杂情况：如果你想启用页面访问保护，就需要为应用程序的每一个页面都启用它，因为一个页面的\
  \ URL 可以设置另一个页面的项。\n\n例如，假设`按部门查看员工`页面（演示应用的第 12 页，图 13-22）已受到保护。现在考虑一下应用程序的首页，即第\
  \ 1 页。由于它没有任何项，你可能会认为没有必要要求校验和。但是，一个聪明的用户可以发出如下 URL 请求：\n\n```\nf?p=91392:1:98765::::P12_DEPTNO,P12_DNAME:10,ACCOUNTING\n\
  ```\n\n这个请求在加载首页之前，就设置了`P12_DEPTNO`和`P12_DNAME`的会话状态值。然后用户可以从首页正常导航到`按部门查看员工`页面。如果这些项的值来源于当前的会话状态值（通常情况如此），页面将使用用户指定的值进行渲染。换句话说，尽管你本意良好，用户还是成功修改了项。\n\
  \n## 总结\n\n本章重点讨论了如何确保应用程序的安全性。它讨论了如何配置应用程序，使得每个用户只能执行他们应该执行的操作——不多也不少。安全性问题涉及三个方面：认证、授权和建立防护措施。\n\
  \n认证确保应用程序知道其用户的身份。用户提供用户名和密码来表明自己的身份；应用程序的认证方案负责将用户名/密码与主列表进行匹配。APEX 支持多种认证方案，它们根据管理用户/密码列表的组织部分不同而有所区别。你学习了如何构建一个自定义认证方案，其中应用程序本身负责维护该列表。\n\
  \n授权指定了每个已认证的用户可以做什么。基本的授权机制是授权方案。每个授权方案指定了一组用户。通过将授权方案与页面（或页面组件）关联，你可以将该页面（或组件）的访问权限限制在方案指定的用户。\n\
  \n防护措施对于防止用户执行他们未被授权的操作是必要的。本章涵盖了三种众所周知的技术：SQL 注入、跨站脚本和 URL 修改。在 SQL 注入中，用户将 SQL\
  \ 代码片段作为“数据”提交，导致底层过程执行错误的查询。在跨站脚本攻击中，用户将恶意的 JavaScript 代码片段作为“数据”保存；当另一个用户试图显示该数据时，恶意代码就会执行。在\
  \ URL 修改中，用户向 APEX 服务器发送一个服务器期望的 URL 形式；然而，该 URL 请求的操作却是用户未被授权请求的。你研究了防范这些技术的方法。关键在于，如果你意识到这些风险，确保应用程序的整体安全性就相对直接了。\n\
  \n"
