- '# 引言


  Application Express（也称为 APEX）是一个与 Oracle 数据库紧密耦合的 Web 应用程序。它有多种用途：你可以使用它的 `SQL Workshop`
  工具来查询和修改数据库；你可以使用它的 `App Builder` 工具来创建你自己的、与数据库交互的 Web 应用程序；你还可以运行由你或他人创建的 Web
  应用程序。


  其中，应用程序构建器（App Builder）尤为有趣，因为它提供了一种简单且非传统的方式来构建网页。你无需直接为页面编写代码；相反，你可以从一组内置模板中选择。有用于整体页面的模板，也有用于你想在页面上放置的每种组件（例如报表、按钮等）的模板。每个模板都有一组属性，这些属性的值决定了每个组件在页面上的位置、外观和行为。你只需为你想要的组件选择模板并为其属性赋值，即可创建一个页面。


  APEX 应用程序构建器会将每个组件的属性值保存在其自己的数据库中。当浏览器请求你的应用程序的某个页面时，APEX 服务器会从其数据库中提取与该页面相关的属性值，构建与这些值对应的
  HTML 代码，并将该代码返回给浏览器。这个过程被称为 `渲染`（rendering）页面，而 APEX 被称为一个 `HTML 生成器`（HTML generator）。


  使用像 APEX 这样的 HTML 生成器的优势在于，你可以在没有任何 HTML（或 CSS、JavaScript、PHP）知识的情况下构建网页。此外，由于 APEX
  与 Oracle 数据库紧密耦合，它自动处理了数据库交互的复杂性。APEX 使得仅凭基本的 SQL 知识就能轻松创建美观、功能强大且能感知数据库的页面成为可能。


  '
- '# 为何需要本书？


  使用 APEX 设计页面似乎很简单——你只需选择你想要的组件，然后为它们的属性分配合适的值即可。选择组件是直接的，但为属性赋值却并非如此。一个页面及其组件拥有众多属性，你必须了解这些属性的用途才能知道该赋什么值。这些属性的范围从必不可少的（例如报表的
  `source query`（源查询））到难以理解的（例如报表的 `static ID`（静态 ID））。有些属性（例如报表列的 `HTML expression`（HTML
  表达式））是挂钩，允许你在生成的网页中插入自定义的 HTML 或 JavaScript 代码。


  本书旨在温和地引导你穿越这片属性的宝库。为此，本书将开发一个演示 Web 应用程序，用以说明构建典型网页功能的各种 APEX 技术。该应用程序的页面起初很简单，然后逐渐增加其复杂程度。对于每一个页面，我会引入几个新属性，讨论它们的用途，并展示其效用。到本书结束时，你将深深沉浸在
  APEX 属性的世界里，从而有足够的自信去应对你自己的任何网站项目。如果你的项目需要比这里展示的更复杂的功能，你也应该能够自如地使用未涵盖的属性，或许通过查阅文档、查看
  Oracle 提供的众多预打包应用程序、浏览网络论坛，甚至自己摸索出来。


  在 APEX 中构建网页的另一种方法是依靠向导（wizards）。APEX 提供向导来生成常见组件，例如报表页面和数据录入表单。每个向导会询问你一系列问题（例如“页面的名称是什么？”“你想显示哪个表？”“页面是否应在导航菜单中有条目？”），然后利用你的回答生成具有相应属性的合适组件。其优势当然是你不需要了解任何关于属性的知识。缺点是向导往往会产生“一刀切”的页面，无论是在外观还是功能上。


  向导只能带你走这么远。如果你想要对页面的外观、感觉和行为进行任何形式的控制，你就需要参与到其属性中来。本书提供了你所需的指导。



  '
- '# APEX 应用开发指南


  '
- '# 示例应用


  随着本书讲解 APEX 应用构建器的各个部分，它将指导你开发一个名为`Employee Demo`的小型应用。我鼓励你在阅读的同时构建自己的应用版本。你可以通过访问
  URL `apex.oracle.com/pls/apex/f?p=91392:1` 来运行我的应用版本。你也可以从 Apress 网站下载应用源代码并将其导入到你自己的工作区。


  与许多书中的示例应用不同，这个应用本身并没有做什么特别有趣的事情。相反，每个页面的构建都是为了说明一种或多种技术。有些页面具有相似的功能，旨在展示不同实现技术之间的权衡。


  `Employee Demo` 应用使用了每个 APEX 工作区都可用的 `DEPT` 和 `EMP` 数据库表。`DEPT` 表列出了公司的部门，而 `EMP`
  表列出了这些部门中的员工。它们的列如下所示：


  ```

  DEPT(DeptNo, DName, Loc)

  EMP (EmpNo, EName, Job, Mgr, HireDate, Sal, Comm, DeptNo)

  ```


  `DEPT` 表的键是 `DeptNo`，`EMP` 表的键是 `EmpNo`。每个表都有一个内置序列用于为这些键生成唯一值，以及一个关联的插入触发器。如果你向其中一个表插入记录时省略了键值，触发器将自动从相应的序列生成一个键值。


  `Employee Demo` 应用假设 `EMP` 表已被修改，增加了一个类型为 `char(1)` 的额外列 `OffSite`。如果员工在部门办公室工作，该列的值将为
  ''N''，如果员工在异地工作，则为 ''Y''。供你参考，以下是向 `EMP` 表添加此新列所需的 SQL 代码。


  ```

  alter table EMP

  add OffSite char(1);

  ```


  修改表结构后，你还需要为每个现有员工分配一个 `OffSite` 值。在我的 `Employee Demo` 应用中，员工 SCOTT、ALLEN、WARD 和
  TURNER 在异地工作；其他员工在办公室工作。第 1 章描述了如何在工作区中导入这些表（如果它们尚不存在），并讨论了进行这些修改所需的 APEX 工具。


  '
- '# 必备背景知识


  本书适用于熟悉数据库系统并希望学习如何在 APEX 中编写具有一定复杂度的 Web 应用的人。编写 APEX 页面所使用的许多技术都涉及以下数据库和 Web 设计语言与技术中的各种技能。


  ### SQL


  你需要掌握的最重要的技能是编写 SQL 查询的能力。APEX 中的所有数据访问都通过 SQL 语句执行，并且许多属性的值都以某种方式涉及 SQL。你对 SQL
  越熟练，你的报表和表单就可以越复杂。本书假设你对 SQL 已经比较熟悉。在大多数情况下，`Employee Demo` 应用使用的是相对简单的 SQL 语句，但偶尔我也会包含一些更复杂的语句（如外连接或嵌套查询）来说明可以实现什么。


  ### HTML


  本书还假设你对 HTML 有基本的了解——特别是如何使用 `<p>`、`<b>`、`<a>` 和 `<img>` 等标签来格式化文本和显示图像。我将忽略 JavaScript
  和 CSS 等高级特性。


  ### PL/SQL


  APEX 使用 PL/SQL 来指定行为。PL/SQL 是 Oracle 的编程语言；其主要特点是嵌入了 SQL 语法，使得编写与数据库交互的存储过程变得容易。你应该具备基本的编程知识，尽管事先了解
  PL/SQL 并非必需。本书在第 7 章介绍了 PL/SQL，并且只使用了该语言的基础特性。


  ### APEX


  最后，本书不要求你有使用 APEX 的经验。尽管不实际使用 APEX 也能跟着本书学习，但这样做似乎没什么意义。因此，你应该获得一个 APEX 账户。获得账户最简单也是最好的方法是访问
  `apex.oracle.com` 站点。由于我是从那里创建我的 `Employee Demo` 应用的，所以你应该会看到与本书中出现的相同的屏幕。


  '
- '# 区分屏幕与页面


  APEX 是一个用于创建其他 Web 应用的 Web 应用。因此，APEX 有一个主页，并且它的各种工具都有自己的一组页面。在本书中，我描述了如何使用 APEX
  来构建应用的一个页面。这可能会导致一些奇怪的句子，例如“从应用的 APEX 主页单击运行按钮会运行它的主页”。为了避免这种混淆，我将所有 APEX 页面称为“屏幕”。前一句就变成了“从应用的
  APEX 主屏幕单击运行按钮会运行它的主页”，这样就不那么别扭，希望也不那么令人困惑了。


  '
- '# 本版更新内容


  尽管 APEX 是一个成熟且功能丰富的应用，但它（并且一直是）一个进行中的作品。APEX 开发人员一直在不懈地改进系统，并且对 APEX 及其用户界面的功能进行重大修改也毫不迟疑。


  本书的前一版写于 2015 年，当时 APEX 5 刚刚推出。从那时起，用户界面经历了一系列重大变化。事实上，当我最近重读我的 APEX 5 书籍时，我沮丧地发现它的截图和说明常常不准确，有时甚至毫无意义。许多
  APEX 属性现在位于不同的位置，有时名称也不同。新的组件类型（特别是*表单*和*交互式网格*）取代了旧的组件，并且具有不同的功能。显然，是时候修订这本书了。


  本书最重要的新增内容是关于表单和交互式网格的两个新章节。在 APEX 5 中，“表单”是一个静态内容区域，包含一套复杂配置的项和内置流程。现在 APEX 有一个专用的
  `Form` 区域，它会自动为你生成预配置的项和流程，并提供一组易于理解的属性来管理它们。


  交互式网格区域取代了 APEX 5 中的“表格窗体”区域。它们提供了与表格窗体相同的基本功能——即就地更新报表值的能力——但交互式网格更易于使用、功能更强大，并且具有更清晰的语义。事实上，本书的交互式网格章节（第
  11 章）比旧的表格窗体章节短得多，因为交互式网格所需的解释要少得多。


  '
