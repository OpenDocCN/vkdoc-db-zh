  ### 创建新应用程序


  图 2-1 显示了可用于创建新应用程序的两个按钮：左上角的大型 `Create` 按钮，以及搜索栏最右侧的较小绿色 `Create` 按钮。点击任一按钮都会打开
  `创建应用程序` 向导。


  ### 选择应用程序类型


  向导的第一个屏幕如图 2-2 所示。它要求您选择一个应用程序类型。您正在创建一个新应用程序，因此点击 `新建应用程序`。中间的按钮允许您从现有的电子表格（或类似）文件创建应用程序，而最右侧的按钮则允许您从
  APEX 应用程序库中导入预先构建好的应用程序。在您熟悉 APEX 之后，可以探索应用程序库。它包含许多有趣的应用程序——有些为典型的数据库任务提供了解决方案，另一些则展示了
  APEX 的高级功能。


  ![../images/335103_3_En_2_Chapter/335103_3_En_2_Fig2_HTML.jpg](img/335103_3_En_2_Fig2_HTML.jpg)


