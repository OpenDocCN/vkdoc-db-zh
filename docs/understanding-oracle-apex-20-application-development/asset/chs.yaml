  ### 配置页面、功能和设置


  屏幕的 `页面` 部分声明新应用程序将包含一个名为 `Home` 的空白页面。您可以通过点击 `编辑` 按钮来编辑该页面，也可以添加其他页面。尽管此功能对于有经验的开发者可能很有用，但并非必需——您可以在应用程序创建后轻松地添加和编辑页面。保持默认页面不变是最简单的。


  `功能` 部分允许您指定典型网站共有的几个有用功能。这些功能可以在以后添加，因此现在无需指定。


  `设置` 部分包含一些其他设置。`应用程序 ID` 值由向导分配，并在 APEX 服务器上唯一标识您的应用程序。我的 `员工演示` 应用程序被分配了编号 91392；您的将会不同。这里另一个值得一提的属性是
  `认证`。此属性的值决定了人们如何登录到您的应用程序。默认值为 `Application Express 账户`，这将仅允许在您工作区拥有账户的用户登录。另一个选项是
  `数据库`，这将只允许底层数据库的用户登录。目前，请保持默认设置。第 13 章在探讨各种认证选项时，将重新审视这个选择。


