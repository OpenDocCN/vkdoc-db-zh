  \ 3-6。默认情况下，属性编辑器期望报表显示整个表：源类型是 `Table/View`，而 `Table Name` 属性为空，等待输入表名。属性编辑器在属性名称旁边放置一个红色错误指示符，以提醒您输入表名。它在这一点上非常坚持——在错误被清除之前，它不会让您保存页面。因此，输入\
  \ `DEPT` 作为表名，并观察错误图标消失。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig6_HTML.jpg](img/335103_3_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6\n\n经典报表的默认“来源”属性\n\n或者，报表的来源可以是 SQL 查询。为了尝试一下，将源类型更改为 `SQL Query`。这将导致 `Table\
  \ Name` 属性被 `SQL Query` 属性替换，同样带有红色错误指示符。输入查询 `select * from DEPT` 并观察指示符消失。\n\n\
  图 3-7 显示了运行修改后页面的结果。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig7_HTML.jpg](img/335103_3_En_3_Fig7_HTML.jpg)\n\
  \n图 3-7\n\n每个区域都有一个非空的来源\n\n\n## 布局部分\n\n一个区域的 `Layout`（布局）部分包含指定该区域在其页面上位置的属性。这些属性如图\
  \ 3-8 所示。\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig8_HTML.jpg](img/335103_3_En_3_Fig8_HTML.jpg)\n\
  图 3-8\n区域的默认布局部分\n\n`Parent Region`（父区域）和 `Position`（位置）属性提供了两种不同的方式来指定区域在页面上的位置。这两个属性中只能有一个有值。`Parent\
  \ Region` 有值意味着该区域应位于一个指定的区域（称为其 `parent`，父区域）内。`Position` 有值意味着该区域应位于页面上的一个特定位置。默认情况下，新区域位于\
  \ `Content Body`（内容主体）位置，如图 3-8 所示。您可以通过从其下拉列表中选择来更改位置，如图 3-9 所示。\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig9_HTML.jpg](img/335103_3_En_3_Fig9_HTML.jpg)\n\
  图 3-9\n可能的区域位置\n\n这些位置按它们在页面上从上到下的出现顺序列出。大多数位置都有特定的用途。例如，`Content Body` 位置是通用区域的主要放置位置，`Page\
  \ Navigation`（页面导航）位置用于页面左侧的导航菜单，而 `Breadcrumb Bar`（面包屑栏）用于面包屑区域。\n\n注意：其中一些位置（即\
  \ `After Header`、`Body 1`、`Body 2`、`Body 3`、`Footer` 和 `Before Footer`）是 `legacy`（遗留）位置。也就是说，它们仅用于支持使用旧版\
  \ APEX 编写的应用程序。新应用程序不应使用它们。\n\n可能的区域位置集合由页面的 `template`（模板）决定。创建页面时，会为其分配应用程序主题定义的默认模板。例如，`Universal`\
  \ 主题的默认页面模板称为 `Standard`。\n\n可以更改页面的模板。在渲染树中选择页面组件，然后查看 `Appearance`（外观）部分中的 `Page\
  \ Template`（页面模板）属性。当前，模板设置为 `Theme Default`（主题默认）。您可以通过点击该属性的选择列表来更改模板。例如，将 `Region\
  \ Practice`（区域练习）页面的模板更改为 `Right Side Column`（右侧栏），如图 3-10 所示。\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig10_HTML.jpg](img/335103_3_En_3_Fig10_HTML.jpg)\n\
  图 3-10\n页面模板选项\n\n现在选择一个区域（例如 `My Second Region`，我的第二个区域）并重新检查其 `Position` 值列表；您会发现除了图\
  \ 3-9 中的值外，还有一个值 `Right Column`（右栏）。将 `My Second Region` 的位置设置为 `Right Column` 并重新运行页面。该区域现在应显示为右侧栏，如图\
  \ 3-11 所示。（我为第二个区域的源添加了更多文本以使其更像侧边栏。）请注意，侧边栏区域在其左上角有一个箭头图标。点击该图标可在显示和隐藏侧边栏之间切换。\n\
  ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig11_HTML.jpg](img/335103_3_En_3_Fig11_HTML.jpg)\n\
  图 3-11\n向右侧栏添加区域\n\n`Layout` 部分还有一个 `Sequence`（序列）属性，可以在图 3-8 中看到。如果两个区域位于页面的同一位置，它们的\
  \ `Sequence` 值决定了它们在该位置中的放置顺序。区域在创建时按顺序分配序列号，但您只需为 `Sequence` 分配不同的值即可更改该顺序。例如，`My\
  \ First Region`（我的第一个区域）和 `My Third Region`（我的第三个区域）都位于 `Content Body` 位置，序列号分别为\
  \ `10` 和 `30`。如果您将 `My Third Region` 的序列号更改为 `5`，则渲染后的页面将类似于图 3-11，只不过 `My Third\
  \ Region` 将出现在 `My First Region` 上方。\n\n尽管尝试将区域放置在页面上的不同位置是很好的，但页面上的大多数区域通常位于同一位置（特别是\
  \ `Content Body`）。在这种情况下，`Layout` 部分的其余属性决定了区域在该位置内的相对位置。\n\n一个位置中的区域被组织在网格中；每个区域被分配给该网格的一行和一列。APEX\
  \ 根据区域的序列号来定位它们。第一个区域被放置在网格第一行的第一列。然后，每个后续区域按以下方式之一放置：\n\n*   与前一个区域位于同一行和同一列（在这种情况下，它显示在前一个区域下方）\n\
  *   在当前行的下一列\n*   在新行的第一列\n\n`Layout` 部分的 `Start New Row`（开始新行）和 `New Column`（新列）属性允许您指定使用哪个选项。图\
  \ 3-12 显示了一个被放置在同一行新列中的区域的这些属性。图 3-8 显示了一个区域开始新行的情况；请注意，在这种情况下，`New Column` 属性是不必要的，因此没有出现。\n\
  ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig12_HTML.jpg](img/335103_3_En_3_Fig12_HTML.jpg)\n\
  图 3-12\n指定行和列的区域定位\n\n在将每个区域分配给一行和一列之后，APEX 会确定这些区域内位置中的大小和位置。为此，APEX 使用 `Column`（列）和\
  \ `Column Span`（列跨度）属性的值（如图 3-12 所示）来确定行中每个区域的偏移量和宽度。\n\n`Column` 属性指定区域在其行内的偏移量。APEX\
  \ 将一个位置的宽度划分为 12 个“网格点”；`Column` 的值是一个从 1 到 12 的数字，表示其中一个点。值为 `1` 表示区域从位置的极左侧开始；值为\
  \ `7` 表示区域从位置的中心开始。`Column Span` 属性指定列的宽度。其值也是一个从 1 到 12 的数字，表示以网格点为单位的宽度。\n\n例如，图\
  \ 3-13 显示了 `Region Practice` 区域的另一种配置。以下是如何从图 3-11 开始创建该配置：首先将页面模板改回 `Theme Default`，将\
  \ `My Second Region` 移回 `Content Body` 位置与其他区域在一起，并将 `My Third Region` 的序列号设为最小。然后按如下方式设置它们的\
  \ `Grid`（网格）属性：\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig13_HTML.png](img/335103_3_En_3_Fig13_HTML.png)\n\
  图 3-13\n显示 Region Practice 区域的另一种方式\n\n*   `My Third Region` 开始一个新行，其 `Column` 值为\
  \ `3`，`Column Span` 值为 `8`。也就是说，其宽度是位置宽度的三分之二，并且居中显示。\n\n\n\n### 外观部分\n\n图 3-10\
  \ 展示了页面的 `Appearance` 部分，其属性允许你配置页面的模板。类似地，每个区域也有一个模板，该模板由区域 `Appearance` 部分中的 `Template`\
  \ 属性指定。图 3-14 展示了该属性的各种可选值。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig14_HTML.jpg](img/335103_3_En_3_Fig14_HTML.jpg)\n\
  \n图 3-14\n\n区域 `Template` 属性的选项\n\n最常见的是 `Standard` 模板，它在顶部的边框中显示区域的标题。其他许多模板都有特殊用途，例如\
  \ `Alert`、`Inline Dialog`、`Login`、`Title Bar` 和 `Wizard Container`。\n\n`Collapsible`\
  \ 模板与 `Standard` 类似，只是在左上角增加了一个小按钮。点击该按钮可以在隐藏区域主体和显示区域主体之间切换。使用 `Buttons Container`\
  \ 或 `Blank with Attributes` 模板的区域没有标题；这两个模板的主要区别在于按钮区域有边框，而空白区域没有。\n\n## 拖放操作\n\n\
  将注意力转向页面设计器的中间面板，特别是 `Layout` 选项卡。点击此选项卡会使中间面板显示页面内容的样式化表示。该面板有一个与每个区域位置对应的区域，每个区域包含分配给该位置的区域的表示。\n\
  \n例如，考虑图 3-13 中所示的 `Region Practice` 页面；其网格布局如图 3-15 所示。从中你可以看到 `Content Body` 位置中的三个区域，它们的显示方式与页面呈现时的大致相同。\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig15_HTML.jpg](img/335103_3_En_3_Fig15_HTML.jpg)\n\
  \n图 3-15\n\n页面布局区域\n\n网格布局在设计时为你提供了渲染页面布局的视觉近似。当你更改区域的 `Position` 和 `Layout` 属性值时，网格布局也会相应改变。\n\
  \n如果在网格布局中点击区域的标题栏，该区域的属性将出现在属性编辑器中。你还可以将区域拖动到网格布局上的其他位置。拖动时，可用位置会以黄色高亮显示，这些区域内的放置点会由一个轮廓矩形指示。你可以将区域放置到空位置、另一个区域的\
  \ `Sub Regions` 部分（使该区域成为另一个区域的子区域），或者另一个区域的上方、下方、左侧或右侧（将该区域添加到该位置的网格中）。当你这样做时，你会看到区域的\
  \ `Layout` 属性相应地发生变化。\n\n在页面设计器中下部中央区域，网格布局下方，有一个称为 `gallery` 的区域。该区域默认最小化。要展开它，请点击网格布局底部中间的手柄。你可以使用此区域通过拖放来创建页面组件。具体来说，点击图库的\
  \ `Regions` 按钮将显示每种可能区域类型的图标，如图 3-16 所示。要创建特定类型的区域，请点击其图标并将其拖到网格布局上的所需位置。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig16_HTML.jpg](img/335103_3_En_3_Fig16_HTML.jpg)\n\
  \n图 3-16\n\n区域图库\n\n使用图库是创建区域的一种便捷方式，额外的好处是 APEX 会自动为其类型和位置属性分配适当的值。但一旦创建，这样的区域就与其他任何区域相同。特别是，区域的属性（包括其类型和位置）可以随时修改，不受限制，无论它是如何创建的。\n\
  \n## 静态内容区域\n\n一个 `static content region` 可以显示文本或格式化的 HTML 代码。APEX 屏幕包含几个静态区域的示例。例如，再次考虑图\
  \ 1-3 中的 SQL Workshop 主屏幕。页面右侧标题为 `About` 的区域是一个静态内容区域，其源是显示的文本。源中包含 HTML 标签，使 `Learn\
  \ More...` 被格式化为一个链接。\n\n你可以对你的演示应用程序做类似的事情。让我们充实主页，使其包含四个静态内容区域。图 3-17 展示了页面的最终样子。本节的目标是学习创建此页面所需的概念。\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig17_HTML.jpg](img/335103_3_En_3_Fig17_HTML.jpg)\n\
  \n图 3-17\n\n包含四个静态内容区域的主页（照片由美国国会图书馆印刷品与照片部提供，编号 LC-H261-4562）\n\n第一步是在分配任何内容之前在页面上创建并定位这些区域。为此，请执行以下任务：\n\
  \n*   转到主页的页面设计器并创建四个新区域。这些区域默认类型将是 `Static Content`，这正是你想要的。\n*   依次将标题 `Demo Application`、`Sample\
  \ Database`、`References` 和 `Quick Link` 分配给这些区域。\n*   将区域放置在 `Content Body` 位置，并使用它们的\
  \ `Layout` 属性指定其在页面上的位置。具体来说，`Demo Application` 和 `Sample Database` 区域开始新行，其他两个区域开始新列。`Sample\
  \ Database`、`References` 和 `Quick Link` 区域的列跨度应分别为 5、3 和 4。\n\n此时，你可以运行你的主页并验证其是否具有预期的结构。页面应如图\
  \ 3-18 所示。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig18_HTML.jpg](img/335103_3_En_3_Fig18_HTML.jpg)\n\
  \n图 3-18\n\n主页的结构\n\n下一步是向这些区域添加内容。以下各节将讨论相关问题。\n\n\n### 格式化文本与非格式化文本\n\n静态内容区域的来源是要显示的文本。APEX\
  \ 可以以两种方式解释此文本：一种是按书写原样显示的字符，另一种是需要格式化的 HTML 代码。指定此选项的属性称为 `输出为`，它出现在页面渲染树中区域 `属性`\
  \ 节点的 `设置` 部分。图 3-19 展示了此部分以及 `输出为` 属性的两个可能值。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig19_HTML.jpg](img/335103_3_En_3_Fig19_HTML.jpg)\n\
  图 3-19：静态内容区域的类型特定属性\n\n`输出为` 的值为 `HTML` 指定该区域的源包含 HTML 代码。APEX 在渲染页面时会按原样将此代码发送到浏览器，以便浏览器可以相应地格式化源。\n\
  \n另一方面，值 `文本（转义特殊字符）` 指定应按原样显示源。在这种情况下，APEX 需要转换文本，以便浏览器没有可执行的 HTML 标签。它通过将某些字符（例如\
  \ `<` 和 `>`）替换为碰巧打印效果相同的不同字符（例如 `<` 和 `>`）来实现。这种转换称为 `转义` 字符。结果是看起来像 HTML 代码但实际并非如此的文本。\n\
  \n图 3-17 中的 `示例数据库` 区域说明了几种格式：\n\n*   `EMP` 和 `DEPT` 表的描述使用了粗体、斜体和下划线标签。\n*   为了使\
  \ `EMP` 的字段在两行中对齐，它使用了一个包含两列的无边框表格：第一行由一列中的“`EMP(`”和第二列中的字段组成，第二行由第一列中的空内容和第二列中的剩余字段组成。\n\
  *   项目符号列表在 HTML 中实现为无序列表，每个项目符号点是一个列表项。\n\n因此，该区域的 `输出为` 属性需要设置为 `HTML`。该区域的源代码如代码清单\
  \ 3-1 所示。\n\n```\nDEPT(DeptNo, DName, Loc)\n\nEMP(\nEmpNo, EName, Job, Mgr, HireDate,\
  \ \n\nSal, Comm, DeptNo, Offsite) \n\n 下划线字段 DeptNo 和 EmpNo 是主键。\n 斜体字段 DeptNo 是\
  \ DEPT 的外键。\n\n代码清单 3-1：示例数据库区域的源\n```\n\n现在考虑 `演示应用` 区域。它的内容是非格式化的，实际上包含不应格式化的\
  \ HTML 标签。因此，此区域的 `输出为` 属性应设置为 `文本（转义特殊字符）`。其源如代码清单 3-2 所示。\n\n```\n欢迎, &APP_USER.!\
  \ 本应用程序的目的是演示 APEX 应用程序中使用的各种技术。请随意浏览其页面。\n本页上的区域展示了静态内容区域的使用方式。大多数区域使用 HTML 标签（如\
  \ <b>、<i> 和 <u>）格式化其内容。本区域不这样做。\n代码清单 3-2：演示应用区域的源\n```\n\n此清单开头提到了“`&APP_USER`.”。此字符串称为替换字符串，APEX\
  \ 将其解释为用户名。接下来将讨论此主题。\n\n### 替换字符串\n\nAPEX 服务器有几个内置变量，其中包含有用的信息。以下是三个有用的变量：\n\n\
  *   变量 `APP_USER` 保存当前登录用户的用户名。如果应用程序不要求用户登录，则该变量的值为 `APEX_PUBLIC_USER`。\n*   变量\
  \ `APP_ID` 保存当前应用程序的 ID。\n*   变量 `APP_SESSION` 保存当前会话的 ID。\n\n要从 HTML 文本中引用变量的值，您在变量名前添加字符\
  \ `&` 并在后附加句点字符 (`.`)。这样的表达式称为替换字符串。换句话说，名为 `X` 的变量的替换字符串写作 “`&X`.” 。当 APEX 服务器渲染页面时，它会用该变量的值文本替换该替换字符串。\n\
  \n例如，替换字符串 `&APP_USER.` 出现在 `演示应用` 区域的源中。当 APEX 服务器渲染页面时，它会用变量 `APP_USER` 的值（在本例中为\
  \ `SCIORE@BC.EDU`）文本替换该替换字符串。\n\n### 引用 APEX 页面\n\n`参考资料` 区域包含一个包含三个条目的项目符号列表。前两个条目包含指向外部网页的链接；第三个条目是指向应用程序的\
  \ `区域实践` 页面的链接。该区域的源如代码清单 3-3 所示。\n\n```\nAPEX 应用构建器指南\n\nAsk Tom: 一个 Oracle 帮助站点\n\
  \n区域实践页面\n\n代码清单 3-3：参考资料区域的源\n```\n\nHTML `<a>` 标签指定一个链接；其参数是目标位置的 URL。清单中的第一个链接是一个典型链接，它引用外部网站上的一个页面。第二个链接引用另一个\
  \ APEX 应用程序的一个页面——特别是 `asktom.oracle.com` 上 APEX 服务器中应用程序 100 的第 1 页。请注意该链接如何使用“f?p=”表示法，如第\
  \ 2 章所述。\n\n清单中的第三个链接引用当前应用程序的第 2 页；因此，它可以写为相对引用。它使用内置变量 `APP_ID` 和 `APP_SESSION`\
  \ 来引用当前应用程序 ID 和会话 ID。引用如下所示：\n\n```\nf?p=&APP_ID.:2:&APP_SESSION.\n```\n\n会话的概念将在第\
  \ 6 章中介绍。目前，只需知道 APEX 使用会话标识符来指示相关的页面访问。通过将会话 ID 传递到 URL 中，您可以确保在跟踪链接时当前会话将继续。请注意，区域中的第二个链接没有包含会话标识符。这是合适的，因为该链接开始了一个与\
  \ Ask Tom 应用程序的新会话。\n\n\n## 引用本地图片\n\nHTML 的`<img>`标签用于显示图像；其参数是图像文件的 URL。如果 URL\
  \ 是引用另一个网络服务器上的文件，使用绝对 URL 即可。但是，如果你计划将图像文件存储在 APEX 网络服务器上，则应使用相对 URL。此 URL 的格式按如下方式确定。\n\
  \n首先要做的是将文件上传到服务器。转到应用程序的主页，点击`共享组件`按钮，并找到`文件`部分，如图 3-20 所示。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig20_HTML.jpg](img/335103_3_En_3_Fig20_HTML.jpg)\n\
  \n**图 3-20** 共享组件屏幕的文件部分\n\n你有两个选项可供选择：`静态应用程序文件`或`静态工作区文件`。它们之间的区别在于可见性。应用程序文件只能被特定的应用程序引用，而工作区文件可以被工作区中的任何应用程序访问。无论你点击哪个选项，都将进入一个让你选择文件的屏幕。然后点击`上传`按钮进行上传。\n\
  \n要使用 HTML 的`<img>`标签显示你的图像文件，你必须指定其在服务器上的位置。然而，APEX 不会告诉你它存储图像文件的位置；相反，它为你提供了内置变量。有两个变量，`APP_IMAGES`和`WORKSPACE_IMAGES`，它们的值分别保存服务器上你的应用程序图像和工作区图像的路径。你使用**替换字符串**来访问这些变量的值。例如，我将员工照片上传到一个名为`employees.jpg`的文件，并将其在\
  \ APEX 中保存为应用程序文件。你也应该对你的图片做同样的操作。显示此文件的 HTML 标签是：\n\n```\n<img src=\"#APP_IMAGES#employees.jpg\"\
  \ alt=\"Employees\">\n```\n\n请注意此标签中句点字符的两种不同用法。第一个是替换字符串表示法的一部分，在页面渲染时将被替换为图像目录的路径；第二个是文件名的一部分。\n\
  \n考虑到这一点，看一下清单 3-4 中`快速链接`区域的源代码。\n\n```\n<a href=\"f?p=&APP_ID.:3:&SESSION.\">\n\
  \    <img src=\"#APP_IMAGES#employees.jpg\" alt=\"Employees\">\n</a>\n```\n\n**清单\
  \ 3-4** 快速链接区域的源代码\n\n此代码使用`<img>`标签显示`employees.jpg`图像，然后使用`<a>`和`</a>`标签将此图像包装在链接中。因此，点击图像会将用户带到应用程序的第\
  \ 3 页（这意味着在下一节创建第 3 页之前，该链接将不起作用）。\n\n第 2 章讨论了使用图像作为应用程序徽标的可能性。为了演示这种可能性，我创建了一个\"\
  Employee Demo\"文字的艺术化图像，将其保存在文件`Logo.jpg`中，并将其作为应用程序文件上传到 APEX。然后，我按照第 2 章的描述配置了应用程序的徽标。也就是说，我在应用程序主页点击了`编辑应用程序属性`按钮，点击了`用户界面`选项卡，并修改了`徽标`部分中的属性，如图\
  \ 3-21 所示。徽标的截图如图 3-22 所示。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig22_HTML.jpg](img/335103_3_En_3_Fig22_HTML.jpg)\n\
  \n**图 3-22** 对应图 3-21 的徽标\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig21_HTML.jpg](img/335103_3_En_3_Fig21_HTML.jpg)\n\
  \n**图 3-21** 指定图像徽标\n\n## 经典报表区域\n\n在本章前面，当你在`区域练习`页面创建了一个源查询为`select * from DEPT`的报表时，你已经简要接触过经典报表区域。本节将更详细地探讨经典报表。`员工演示`应用程序的第\
  \ 3 页包含两个区域，标题为`默认报表`和`格式化报表`。图 3-23 和图 3-24 显示了这两个区域的报表。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig24_HTML.jpg](img/335103_3_En_3_Fig24_HTML.jpg)\n\
  \n**图 3-24** 格式化的员工报表\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig23_HTML.jpg](img/335103_3_En_3_Fig23_HTML.jpg)\n\
  \n**图 3-23** 默认的员工报表\n\n这两个报表具有相同的来源，即以下 SQL 查询：\n\n```\nselect EmpNo, EName, Job,\
  \ HireDate, Sal, DeptNo, Offsite\nfrom EMP\n```\n\n格式化报表与默认报表的不同之处如下：\n\n*   不显示`EmpNo`和`Job`列。\n\
  *   `EName`和`DeptNo`的列标题已被重命名，`Hiredate`的标题为斜体。\n*   记录只能按员工姓名或工资排序。\n*   员工姓名通过使用更大字体、加粗书写来突出显示，并包含员工的职位。\n\
  *   雇佣日期的格式与默认报表不同，并且是链接。\n*   工资值被格式化为货币并右对齐，超过$2,500 的值显示为红色。\n*   部门值显示为部门名称，而不是部门编号。\n\
  *   `Offsite`列的值显示为图像而不是文本。\n*   一次显示的行数更少，带有分页控件。\n\n本节将向你展示如何使用报表区域的特定类型属性（结合对\
  \ SQL 源查询的一些补充）来构建格式化报表。首先按照以下步骤操作：\n\n*   创建一个名为`经典报表`的新空白页面，页面编号为 3。告诉向导也为该页面创建一个名为`经典报表`的导航菜单条目。\n\
  *   转到此页面的页面编辑器并创建两个新区域。将区域标题命名为`默认报表`和`格式化报表`，并将它们放置在页面的`内容主体`位置。\n*   将每个区域的类型设置为`经典报表`，源查询为前面给出的查询。\n\
  *   配置它们的`布局`属性，使`格式化报表`区域开始一个新行。（或者，如果你希望报表并排显示，请设置属性使`格式化报表`不开始新行。）\n\n此时，你的页面应该显示两个相同的区域，看起来像图\
  \ 3-23。图 3-25 描绘了此页面最终渲染树的顶部，显示了`默认报表`区域的组件。（`格式化报表`区域的组件类似，因此省略。）请注意，APEX 为每个报表创建了几个组件：一个包含与类型无关的属性的组件（标有区域名称），一个包含报表特定属性的组件（标为`属性`），以及为报表的每一列包含列特定属性的组件。以下各节将探讨这些列特定和报表特定的属性。\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig25_HTML.jpg](img/335103_3_En_3_Fig25_HTML.jpg)\n\
  \n**图 3-25** 经典报表区域的渲染树\n\n## 列特定属性\n\n报表中的每一列都有自己的一组属性。当你在渲染树中选择一个列节点时，属性编辑器会显示其列特定属性。这些属性分为几个部分，接下来将进行讨论。\n\
  \n## 标识\n\n\n\n图 3-26 展示了 `Identification`（标识）部分中的两个属性。`Column Name`（列名）属性是列的名称。列名直接来源于源查询，因此该值无法更改。\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig26_HTML.jpg](img/335103_3_En_3_Fig26_HTML.jpg)\n\
  \n图 3-26 指定 ENAME 列的类型\n\n## 标识\n\n`Type`（类型）属性指定了 APEX 应如何显示列值。可能的类型值如图 3-26 所示。`Plain\
  \ Text`（纯文本）类型是默认类型，表示按原样显示值。`Link`（链接）类型表示将值显示为链接，`Display Image`（显示图像）类型显示为图像，`Percent\
  \ Graph`（百分比图）类型以图形方式显示。`Hidden Column`（隐藏列）类型表示完全不显示值。\n\n在 `Default Report`（默认报表）区域中，所有列都是纯文本。`Formatted\
  \ Report`（格式化报表）区域的列具有以下类型：`ENAME`、`SAL` 和 `OFFSITE` 是纯文本，`EMPNO` 和 `JOB` 是隐藏列，`HIREDATE`\
  \ 是链接，而 `DEPTNO` 是基于值列表的纯文本。在你的应用程序中，你现在可以更改这两个隐藏列的类型。但是，你需要等到本章后面才能更改 `HIREDATE`\
  \ 和 `DEPTNO` 的类型。\n\n## 列标题\n\n列的 `Heading`（标题）部分包含两个用于自定义列报表头的属性。`Heading` 属性包含在列标题中显示的值。默认情况下，这是列名，但可以更改。例如，在我的应用程序中，我将\
  \ `ENAME` 的标题更改为 `Name`（姓名），将 `DEPTNO` 的标题更改为 `Department`（部门）。\n\n通常，`Heading`\
  \ 的值可以包含 HTML 代码，例如格式化文本或图像。例如，图 3-27 屾示了我为 `HIREDATE` 标题编写的 HTML 代码，它使 APEX 以斜体显示字符串\
  \ `Hiredate`。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig27_HTML.jpg](img/335103_3_En_3_Fig27_HTML.jpg)\n\
  \n图 3-27 指定 HIREDATE 列的标题\n\n默认情况下，列标题在列中居中对齐。这几乎总是你想要的。但是，如果出于某种原因这看起来合适，`Alignment`（对齐）属性允许你指定不同的对齐方式。\n\
  \n## 列布局\n\n`Layout`（布局）部分包含两个用于自定义列显示的属性。`Sequence`（序列）属性决定了列在报表中出现的顺序。`Column\
  \ Alignment`（列对齐）属性指定了列值的对齐方式。默认情况下，列值左对齐。图 3-28 显示了 `SAL` 列的 `Layout` 部分，其中对齐方式设置为右对齐。\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig28_HTML.png](img/335103_3_En_3_Fig28_HTML.png)\n\
  \n图 3-28 指定 SAL 列的布局\n\n## 排序顺序\n\nAPEX 将排序问题分为两个方面：首次渲染报表时如何排序记录，以及用户是否可以通过单击列标题进行交互式重新排序。如果报表的源查询包含\
  \ `order by` 子句，则记录按该顺序排序，且用户无法更改。否则，这些方面由每个列的 `Sorting`（排序）部分中的属性决定。图 3-29 显示了\
  \ `ENAME` 的 `Sorting` 部分。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig29_HTML.jpg](img/335103_3_En_3_Fig29_HTML.jpg)\n\
  \n图 3-29 指定 ENAME 列的排序行为\n\n`Default Sequence`（默认序列）属性指定了初始排序顺序。参与初始排序顺序的每一列都将有一个\
  \ `Default Sequence` 值，主排序列的值为 1。在图 3-29 中，`ENAME` 的序列是 2。图中未显示的是 `JOB` 的序列属性，其排序序列值为\
  \ 1。它们共同意味着报表将按职位排序后呈现，而职位相同的两个员工将按姓名字母顺序列出（如你在图 3-24 中所见）。\n\n`Sortable`（可排序）属性指定用户是否能够对列进行交互式排序。默认情况下，所有列都是可排序的。在\
  \ `Formatted Report` 区域中，我关闭了除 `ENAME` 和 `SAL` 之外所有列的可排序性。初始排序序列与可排序性完全无关。例如，`Formatted\
  \ Report` 区域最初是按 `JOB` 列排序的，尽管该列甚至是不可见的。\n\n## 值列表\n\n考虑格式化报表中的 `DEPTNO` 列。它显示来自\
  \ `DEPT` 表的值，尽管报表只提到了 `EMP` 表。这是怎么回事？答案是列中的值没有改变；它们仍然是部门编号。但是，你可以建立部门名称与编号之间的对应关系，并告诉\
  \ APEX 显示给定部门编号对应的名称。返回值（部门编号）与其显示值（部门名称）之间的这种对应关系称为 *值列表*。\n\n形式上，值列表是一个两列的表。第一列保存显示值，第二列保存相应的返回值。指定值列表的一种有用方式是使用\
  \ SQL 查询。例如，`DEPTNO` 列的值列表查询很简单：\n\n```sql\nselect DName, DeptNo\nfrom DEPT\n```\n\
  \n当你将列的类型分配为 `Plain Text (based on List of Values)`（纯文本（基于值列表））时，属性编辑器会显示一个 `List\
  \ of Values`（值列表）部分。图 3-30 显示了填入属性值后的该部分。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig30_HTML.jpg](img/335103_3_En_3_Fig30_HTML.jpg)\n\
  \n图 3-30 使用值列表格式化 DEPTNO 列\n\n## 格式掩码\n\n有时你可能希望将数字显示为具有特定格式的字符串。例如，你可能使用逗号分隔每三位数字，你可能规定小数点后的位数，或者你可能在数字前添加货币符号。日期值也可以用不同的格式书写。在每种情况下，你都可以使用\
  \ *格式掩码* 来表达你想要的格式。\n\n列的 `Format Mask`（格式掩码）属性位于其 `Appearance`（外观）部分。图 3-31 显示了我如何为\
  \ `SAL` 填写该属性。右侧的图标是一个“快速选择”按钮。单击它会弹出一个常用格式列表；选择一种格式会将其掩码放入属性的文本框中。如果你不熟悉 Oracle\
  \ 格式掩码语法，通过检查各种掩码可以获得相当的了解。例如，`9` 表示一个可选数字，`0` 表示一个必需数字，`G` 表示千位分隔符，`D` 表示小数点，等等。这样的理解使得可以修改掩码以满足你的需求。\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig31_HTML.jpg](img/335103_3_En_3_Fig31_HTML.jpg)\n\
  \n图 3-31 我为 SAL 设置的格式掩码\n\n例如，为了获得 `SAL` 列的掩码，我从格式列表中选择了货币格式 $5,234.10，这产生了掩码 `FML999G999G999G999G990D00`。然而，由于\
  \ `EMP` 表以整美元存储工资值，我不想显示小数点及其右边的两位数字。所以我从掩码末尾删除了 `D00`。\n\n\n\n## 日期格式掩码\n\n`HIREDATE`的掩码创建方式类似。对各种日期格式掩码的检查表明，`DD`表示日期，`Mon`是月份的三字母缩写，`YYYY`是四位数的年份。我将这些元素组合起来，创建了所需格式的掩码，如图\
  \ 3-32 所示。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig32_HTML.jpg](img/335103_3_En_3_Fig32_HTML.jpg)\n\
  \n图 3-32\n我为`HIREDATE`设置的格式掩码\n\n关于格式掩码语法的完整描述，请在 Oracle SQL 文档中搜索“format models”。\n\
  \n## 列格式化\n\n`纯文本`类型的列有一个名为`列格式化`的部分，其中包含一个名为`HTML 表达式`的属性。此属性允许您通过将列值包装在 HTML 表达式中来对其进行格式化。有关示例，请回顾图\
  \ 3-24 中已格式化的`ENAME`列。每个员工的名字都以大号粗体显示，其后是该员工的职位。图 3-33 显示了与此格式对应的 HTML 表达式。\n\n\
  ![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig33_HTML.jpg](img/335103_3_En_3_Fig33_HTML.jpg)\n\
  \n图 3-33\n格式化`ENAME`列\n\n这个表达式需要一些解释。首先，考虑一下您会为名为`FORD`的员工编写什么样的 HTML 表达式。要使名字变成大号粗体，可以将其放在`<b><big></big></b>`标签内。生成的表达式如下所示：\n\
  \n```\n<b><big>FORD</big></b> the ANALYST\n```\n\n这个表达式几乎就是`HTML 表达式`值应有的样子——唯一的区别是员工的姓名和职位需要根据报表的每一行而变化。APEX\
  \ 通过以下约定使其成为可能：对于名为`X`的列，术语`#X#`表示当前行中`X`的值。因此，您应该将上述表达式中的`FORD`替换为`#ENAME#`，将`ANALYST`替换为`#JOB#`，从而得到图\
  \ 3-33 中的表达式：\n\n```\n<b><big>#ENAME#</big></b> the #JOB#\n```\n\n请注意，表达式`#JOB#`是有意义的，即使`JOB`列在报表中不可见。实际上，在报表中设置不可见列的常见原因之一，就是为了能在报表的其他地方使用它们的值。\n\
  \n### 链接列\n\n图 3-24 中的`HIREDATE`值被格式化为链接。具体来说，点击一个雇佣日期（例如`Dec 03, 1981`）会将浏览器重定向到\
  \ URL [`http://www.infoplease.com/year/1981.html`](http://www.infoplease.com/year/1981.html)，该页面提供了当年的时事信息。\n\
  \n实现此功能的一种方法是用适当的 HTML 表达式包装雇佣日期。例如，1981 年 12 月 3 日的链接将是：\n\n```\n<a href=\"http://www.infoplease.com/year/1981.html\"\
  \ target=\"_blank\">#HIREDATE#</a>\n```\n\n请注意，`<a>`标签的第二个参数是`target=\"_blank\"\
  ``。这个参数导致目标页面在新的浏览器标签页中打开，这在本例中似乎是合理的。这个 HTML 表达式的问题在于，无论雇佣日期是什么，它总是重定向到 1981 年的页面。我们需要一种方法从雇佣日期中提取雇佣年份，不幸的是，这在\
  \ HTML 中无法实现。\n\n然而，在 SQL 查询中提取年份是可行的。思路是让 SQL 源查询计算一个新列，其值为雇佣年份。以下查询可以完成这项工作：\n\
  \n```sql\nselect e.*, extract(year from e.HireDate) as HireYear\nfrom EMP e\n```\n\
  \n使用这个新的源查询的一个结果是，`HIREYEAR`现在将成为报表的一列。由于您不希望它在报表中显示，您应该将其类型设置为`隐藏列`。\n\n将`格式化报表`区域的源修改为此查询后，您可以通过在其`HTML\
  \ 表达式`属性中使用`#HIREYEAR#`来格式化`HIREDATE`列，如下所示：\n\n```\n<a href=\"http://www.infoplease.com/year/#HIREYEAR#.html\"\
  \ target=\"_blank\">#HIREDATE#</a>\n```\n\n尽管此技术有效，但将列格式化为链接的更好方法是将其`类型`属性设置为`链接`。这样做会使属性编辑器显示一个`链接`部分。此部分包含`目标`属性，其初始值为`未定义链接目标`。点击该值会打开一个模态的`链接生成器`页面，在其中您可以指定目标是\
  \ APEX 应用程序的页面还是任意 URL。在本例中，选择`URL`并在出现的文本框中输入目标 URL，如图 3-34 所示。然后单击确定按钮返回属性编辑器。\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig34_HTML.png](img/335103_3_En_3_Fig34_HTML.png)\n\
  \n图 3-34\n使用`链接生成器`页面\n\n然后，您可以在链接部分输入`链接文本和链接属性`的适当值，如图 3-35 所示。请注意，您需要在链接生成器中输入\
  \ URL 的“http://”部分，即使`目标`属性不显示它。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig35_HTML.png](img/335103_3_En_3_Fig35_HTML.png)\n\
  \n图 3-35\n`HIREDATE`列的链接属性\n\n## 条件格式化\n\n回想一下，图 3-24 将超过 2500 的薪资显示为红色。使用`HTML\
  \ 表达式`属性将`SAL`值格式化为特定颜色是相当容易的。例如，以下表达式使所有薪资值变为红色：\n\n```\n<font color=\"red\">#SAL#</font>\n\
  ```\n\n但是，如何编写一个表达式使得只有部分值变为红色呢？因为 HTML 本身无法执行计算，您必须再次依赖 SQL 来完成。思路是让 SQL 源查询计算另一个新列，名为`SalColor`，其值为薪资值的颜色。以下是所需的查询（新代码以粗体显示）：\n\
  \n```sql\nselect e.*, extract(year from e.HireDate) as HireYear,\ncase when e.Sal>2500\
  \ then 'red' else 'black' end as SalColor\nfrom EMP e\n```\n\n将`格式化报表`区域的源更改为使用此查询后，您可以通过将以下代码分配给`SAL`列的`HTML\
  \ 表达式`属性来格式化该列：\n\n```\n<font color=\"#SALCOLOR#\">#SAL#</font>\n```\n\n您可以对`OFFSITE`列应用相同的技术。在格式化报表中，`Offsite`值如果其值为**Y**则显示绿色对勾图片，否则显示红色对勾图片。假设这两张图片已保存为\
  \ APEX 应用程序文件`checkgreen.jpg`和`checkred.jpg`。（您可以从 Apress 网站下载这些文件。）那么，值为**Y**时应格式化为以下\
  \ HTML 表达式：\n\n```\n<img src=\"#IMAGE_PREFIX#checkgreen.jpg\">\n```\n\n值为**N**时应格式化为：\n\
  \n```\n<img src=\"#IMAGE_PREFIX#checkred.jpg\">\n```\n\n区分这两个文件名的方法是扩展 SQL 源查询，使其计算一个新列，名为`OffsiteImage`，其值为`'checkgreen.jpg'`或`'checkred.jpg'`。SQL\
  \ 查询现在如下所示（新代码以粗体显示）：\n\n```sql\nselect e.*, extract(year from e.HireDate) as HireYear,\n\
  case when e.Sal>2500 then 'red' else 'black' end as SalColor,\ncase when e.Offsite\
  \ = 'Y' then 'checkgreen.jpg'\nelse 'checkred.jpg' end as OffsiteImage\nfrom EMP\
  \ e\n```\n\n将报表的源更改为该查询后，您可以通过将以下代码分配给`OFFSITE`列的`HTML 表达式`属性来格式化该列：\n\n```\n<img\
  \ src=\"#IMAGE_PREFIX##OFFSITEIMAGE#\">\n```\n\n最后，您应该将`SALCOLOR`和`OFFSITEIMAGE`列的类型设置为`隐藏列`。\n\
  \n## 报表特定属性\n\n现在是考虑经典报表特定属性的时候了。这些属性与渲染树中区域的`属性`节点相关联，并处理分页和记录分组等问题。图 3-36 显示了`格式化报表`区域的`布局`和`分页`部分。\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig36_HTML.png](img/335103_3_En_3_Fig36_HTML.png)\n\
  \n\n\n## 图 3-36 经典报表区域的报表特定属性\n\n`行数`属性指定一次显示报表的多少行。默认值为`15`，但我在`格式化报表`区域中将其改为了`5`。分页`类型`属性允许您选择分页控件的格式。图中所示的选项用于图\
  \ 3-24 中的`格式化报表`区域。理解其他选项的最佳方式是在你的报表上逐一尝试，观察其效果。\n\n## 使用源查询进行格式化\n\n尽管前面的章节重点介绍了如何使用\
  \ APEX 格式化源查询的行，但重要的是要意识到，通过使用更精确的源查询，你也可以获得许多相同的功能。以下是`格式化报表`演示区域的一些示例。\n\n与其隐藏一列，不如直接在查询中不包含它可能更合适。特别是，`EmpNo`列在格式化报表中没有作用，最好完全排除在其源查询之外。另一方面，`Job`、`SalColor`、`OffsiteImage`和`HireYear`列是格式化其他列所必需的，因此它们必须出现在源查询中，并且必须是`隐藏列`类型。\n\
  \n与其在属性编辑器中更改列的标题，不如在源查询中更改列的名称。一个例子是`EName`列，它被重命名为`Name`。替代方法是在源查询中使用`AS`关键字，如下所示：\n\
  \n```\nselect EName as Name, ...\nfrom EMP\n```\n\n如果你不希望用户能够以交互方式更改记录的排序顺序，在源查询中指定排序顺序比单独设置每个列的可排序性属性更容易。\n\
  \n与其使用值列表来格式化`DeptNo`列，你可以修改源查询，使其成为`EMP`和`DEPT`表的连接，如下所示：\n\n```\nselect e.EName\
  \ as Name, ..., d.DName, ...\nfrom EMP e join DEPT d\non e.DeptNo = d.DeptNo\n```\n\
  \n在这种情况下，很难说这两种方法哪个更好。值列表方法需要 APEX 为报表的每一行搜索值列表，这可能比直接进行连接的开销更大。另一方面，值列表方法更简单，更直接地传达了设计者的意图。\n\
  \n经验法则是，源查询应指定你想要显示的*内容*，而列属性应指定你想要显示的*方式*。在某些情况下（例如隐藏列），这种区分是明确的。在其他情况下（例如使用值列表），则不那么明确。\n\
  \n## 图表区域\n\n*图表*是显示数据点的可视化方式。一个数据点由两个值组成：x 坐标（称为*标签*）和 y 坐标（称为*值*）。例如，让我们构建一个名为`Charts`的页面，它将是应用程序的第\
  \ 4 页。此页面包含两个图表区域，如图 3-37 和 3-38 所示。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig38_HTML.png](img/335103_3_En_3_Fig38_HTML.png)\n\
  \n图 3-38 员工计数图表区域\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig37_HTML.png](img/335103_3_En_3_Fig37_HTML.png)\n\
  \n图 3-37 薪资信息图表区域\n\n柱状图由十个数据点组成，给出了每种职位员工的最低和最高工资。这些点被组织成两个*系列*，每个系列五个点。\n\n饼图由五个数据点组成，每种职位一个。每个点的标签是职位的名称，值是拥有该职位的员工数量。图表为每个标签显示一个饼图扇区，其大小与其值成比例。例如，十四名员工中有两名是分析师，因此`ANALYST`扇区的大小是整个饼图大小的十四分之二。\n\
  \n## 创建图表区域\n\n要构建此页面，首先创建一个名为`Charts`的新空白页面，并向其添加两个类型为`图表`的区域。将第一个区域命名为`薪资信息`，第二个区域命名为`员工计数`。图\
  \ 3-39 显示了这些区域最终的渲染树。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig39_HTML.jpg](img/335103_3_En_3_Fig39_HTML.jpg)\n\
  \n图 3-39 两个图表区域的渲染树\n\n从该图中，你可以看到图表有四种属性：类型无关属性（由区域名称表示）、图表特定属性（由`属性`表示）、每个图表系列特定的属性（由`系列`表示）以及与图表轴相关的属性（由`轴`表示）。默认情况下，创建图表时带有一个系列（名为`新建`），但你可以重命名该系列并添加其他系列。\n\
  \n图 3-39 中的每个系列都标有红色错误指示器，告诉你图表需要进一步配置。接下来将讨论此配置的细节。\n\n### 配置图表\n\n每个图表都需要一个*源*，这是一个指定图表数据点的表达式。常见的源是\
  \ SQL 查询。\n\n如果图表有 N 个系列，那么查询将有 N+1 列——一列包含标签，其他列包含每个系列的值。例如，`薪资信息`系列的源查询如下：\n\n\
  ```\nselect Job, min(Sal) as MinSal, max(Sal) as MaxSal\nfrom EMP\ngroup by Job\n\
  order by MinSal\n```\n\n你指定图表源的方式类似于指定报表源的方式。图表的`源`部分包含你需要的三个属性。图 3-40 显示了`薪资信息`区域这些属性的值。\n\
  \n你还应该对你的`员工计数`区域进行类似的更改，使用以下源查询：\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig40_HTML.jpg](img/335103_3_En_3_Fig40_HTML.jpg)\n\
  \n图 3-40 指定薪资信息图表的源\n\n```\nselect Job, count(*) as EmpCount\nfrom EMP\ngroup by\
  \ Job\norder by EmpCount desc\n```\n\n### 配置图表系列\n\n配置图表的源之后，你可以配置它的每个系列。系列的相关属性位于其`标识`、`源`和`列映射`部分。图\
  \ 3-41 显示了为`薪资信息`创建的系列的这些部分。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig41_HTML.jpg](img/335103_3_En_3_Fig41_HTML.jpg)\n\
  \n图 3-41 为薪资信息图表指定一个系列\n\n\n\n## APEX 图表配置与自定义\n\n### 配置单个系列\n\n`Identification`（标识）部分允许您为系列选择一个名称。由于此系列将保存每个职位的最低工资，我将其命名为\
  \ `MinSal`。（您还需要创建另一个系列来保存最高工资，但现在还不需要。）\n\n`Source`（源）部分用于指定系列的数据源。由于您已经为该区域定义了一个源，因此应选择\
  \ `Region Source`（区域源）。另一个选项（此处不讨论）是让每个系列定义自己的源。这种灵活性在比较来自不同表的数据时很有用，但会导致复杂性超出本书讨论范围。\n\
  \n`Column Mapping`（列映射）部分要求您为属性 `Label`（标签）和 `Value`（值）指定值。`Label` 值将是保存标签的源列的名称，在本例中为\
  \ `JOB`。`Value` 值将是保存此系列值的源列的名称，在本例中为 `MINSAL`。\n\n在配置好 `Salary Info`（薪资信息）系列后，您应该参考图\
  \ 3-41 的模型来配置 `Salary Info` 图表的系列。完成后，错误指示应从您的页面中消失，您应该能够保存它。如果运行该页面，您应该获得如图 3-42\
  \ 所示的输出。这些图表相当不错，但需要进行自定义。接下来将讨论这个主题。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig42_HTML.jpg](img/335103_3_En_3_Fig42_HTML.jpg)\n\
  \n**图 3-42** 图表页面的初步效果\n\n### 多系列图表\n\n`Salary Info` 区域当前有一个系列，用于显示每个职位的最低工资。您可以轻松创建第二个系列来显示每个职位的最高工资，步骤如下。在区域的渲染树中右键单击\
  \ `Series`（系列）节点，然后选择 `Create Series`（创建系列）。然后像配置前一个系列一样配置该系列：将系列重命名为 `MaxSal`，并适当地设置其源和列映射。结果应如图\
  \ 3-43 所示的多系列图表。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig43_HTML.jpg](img/335103_3_En_3_Fig43_HTML.jpg)\n\
  \n**图 3-43** 向图表添加第二个系列\n\n虽然数据看起来不错，但请注意图表现在是按 `Job`（职位）排序，而不是按 `MinSal`（最低工资）排序。发生了什么？问题源于\
  \ APEX 允许每个系列定义自己的源，而这种灵活性会带来显著的复杂性。（如果源的标签集不同怎么办？如果它们的排序顺序不同怎么办？）因此，APEX 有两种图表渲染算法：一种是忽略这些复杂性的简单算法，另一种是需要单独定义的排序顺序来解决复杂性的复杂算法。图\
  \ 3-44 展示了相关属性。图表的 `Attributes`（属性）节点包含一个 `Multi-Series Chart Data`（多系列图表数据）部分，其中有两个属性。`Fill\
  \ Gaps in Chart Data`（填充图表数据中的间隙）属性指示是使用简单算法还是复杂算法。其默认值为 `on`，表示使用复杂算法；将其关闭则指定简单算法。`Sort\
  \ Order`（排序顺序）属性在 `Fill Gaps`（填充间隙）属性为 `on` 时可见，以便您可以指定图表的排序顺序。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig44_HTML.jpg](img/335103_3_En_3_Fig44_HTML.jpg)\n\
  \n**图 3-44** 多系列图表数据属性\n\n幸运的是，如果您的图表中所有系列都使用相同的源，这种复杂性就无关紧要了。您只需关闭 `Fill Gaps in\
  \ Chart Data` 属性，排序就会恢复正常。\n\n### 自定义图表\n\nAPEX 支持多种图表类型。新图表的默认类型是条形图，但您可以使用 `Chart`（图表）部分（来自渲染树的\
  \ `Attributes` 组件）进行更改。例如，转到您的 `Employee Counts`（员工计数）区域的 `Chart` 部分，将其图表类型更改为 `Pie`（饼图）。\n\
  \nAPEX 会自动为条形图中的每个系列分配一种颜色。它在选择图表颜色方面做得相当不错，但有时您想自己选择。每个条形图系列在其 `Appearance`（外观）部分都有一个\
  \ `Color`（颜色）属性，如图 3-45 所示。您可以键入标准颜色的名称（如“maroon”），可以从右侧的快速选择菜单中选择常用颜色，或者可以使用颜色选择器从色轮中选择颜色。图\
  \ 3-37 中的 `Salary Info` 图表指定了系列颜色 `MAROON`（栗色）和 `GOLD`（金色）。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig45_HTML.jpg](img/335103_3_En_3_Fig45_HTML.jpg)\n\
  \n**图 3-45** 指定条形图系列的颜色\n\nAPEX 还为饼图的每个标签值分配一种颜色，使用一组鲜艳的颜色。但假设您想要一个不同的调色板。如何使用图\
  \ 3-45 中的 `Color` 属性并不立即明了，因为它适用于整个系列。例如，如果将颜色设置为 `MAROON`，那么饼图中的每个段都将是栗色。您需要的是一种为每个标签指定颜色的方法。\n\
  \n思路是更改图表的源代码，如下所示：\n\n```sql\nselect Job, count(*) as EmpCount,\ncase job when\
  \ 'ANALYST'   then '#D6EAF8'\n         when 'CLERK'     then '#AED6F1'\n       \
  \  when 'MANAGER'   then '#5DADE2'\n         when 'PRESIDENT' then '#3498DB'\n \
  \        when 'SALESMAN'  then '#1B4F72'\n         end as JobColor\nfrom EMP\ngroup\
  \ by Job\norder by EmpCount desc;\n```\n\n`JobColor` 列计算每个职位的颜色。指定的颜色值对应于图 3-38\
  \ 所示的蓝色调色板。图 3-46 显示了 `Salary Info` 图表修改后的 `Source` 部分。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig46_HTML.jpg](img/335103_3_En_3_Fig46_HTML.jpg)\n\
  \n**图 3-46** 修改饼图源代码以包含颜色\n\n`JobColor` 的值可以在 `Color` 属性中使用，如图 3-47 所示。请注意对 `JobColor`\
  \ 的引用是作为替换字符串编写的。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig47_HTML.jpg](img/335103_3_En_3_Fig47_HTML.jpg)\n\
  \n**图 3-47** 指定饼图颜色\n\n自定义图表的另一种方法是显示图例（legend）。例如，图 3-37 在图表下方显示了一个图例。图例解释了图表上每种颜色的含义。多系列图表使用图例来传达每个系列的含义。饼图使用图例来标识各个段。因此，图\
  \ 3-38 不需要图例，因为标签值直接显示在每个段旁边。\n\n在 APEX 中，指定图例的属性位于 `Legend`（图例）部分，该部分属于区域的 `Attributes`\
  \ 节点。图 3-48 显示了该部分的顶部。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig48_HTML.jpg](img/335103_3_En_3_Fig48_HTML.jpg)\n\
  \n**图 3-48** 部分图表图例属性\n\n\n\n## 图表属性配置\n\n最重要的属性是 `Show`，它控制图例在页面上的可见性。通常其他属性使用默认值就足够了，但你应该尝试各个选项来看看效果。特别值得注意的是\
  \ `Hide and Show Behavior`。如果其值为 `None`，则点击图例没有任何作用。否则，在图例上点击某个系列名称会切换该系列在图表中的可见性，并相应地重新计算图表。这种行为对于饼图尤其有趣，因为图例标识的是扇区而非系列。作为一个实验，请启用\
  \ `Salary Info` 图表的图例，并将 `Hide and Show Behavior` 的值设置为 `Rescale`。然后运行页面，点击一些图例值，观察图表如何自我调整。\n\
  \n另一种图表定制方式是直接在图表中显示数据值。例如，在图[3-37]中，最低和最高薪资显示在其条形图的上方。在图[3-38]中，员工数量和标签名称显示在每个扇区的外部。相关属性位于系列属性的\
  \ `Label` 部分。图[3-49]展示了我是如何为饼图填写这些属性的。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig49_HTML.png](img/335103_3_En_3_Fig49_HTML.png)\n\
  \n图 3-49 饼图的标签属性\n\n最后，我想简要提一下控制条形图 X 轴和 Y 轴的属性。这些属性涉及轴的显示方式——多久显示一个刻度线、如何格式化显示的值、Y\
  \ 值的范围是多少等等。通常默认值就足够了，但有时需要定制。一个例子可以在图[3-42]的 `Employee Counts` 图表中找到。请注意它的 Y 轴标签有重复。原因是网格标记以\
  \ 0.5 递增，但标签只显示为整数。这种情况如图[3-50]和[3-51]所示。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig50_HTML.png](img/335103_3_En_3_Fig50_HTML.png)\n\
  \n图 3-50 配置 Y 轴上的值\n\n图[3-50]中的 `Decimal Places` 属性值为 `0`，意味着 APEX 将把 Y 轴标签显示为整数。如果你将\
  \ `Decimal Places` 的值改为 1，那么你会看到 Y 轴标签实际显示为 0.0, 0.5, 1.0 等值。然而，这样的图表没有任何意义，因为计数必须是整数。一个更好的解决方案是更改图[3-51]中的\
  \ `Minimum Step` 属性。该属性告诉 APEX 刻度线之间可以有多近。默认情况下，该值为空，允许 APEX 选择任何步长值。你需要将该属性值设置为\
  \ 1，以便 Y 轴标签具有 0, 1, 2 等值。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig51_HTML.png](img/335103_3_En_3_Fig51_HTML.png)\n\
  \n图 3-51 配置何时显示 Y 轴刻度线\n\nAPEX 有许多图表配置属性。理解它们的最好方法是进行实验。通过以各种方式更改属性来编辑这两个图表。例如，移动图例位置、更改配色方案和背景、在图表上包含或移除标签或值等等。\n\
  \n## 交互式报告区域\n\n前面的章节探讨了页面设计者如何使用属性来定制经典报表和图表，以改善用户体验。而*交互式报告*允许用户在查看页面时自行执行部分此类定制。\n\
  \n图[3-52]展示了一个未经格式化的、原始的交互式报告区域。为了创建它，我创建了一个名为 `Interactive Reports` 的新空白页面，这是 `Employee\
  \ Demo` 应用程序的第 5 页。然后我在其中创建了一个名为 `Employees` 的新区域，类型为 `Interactive Report`，并具有以下源查询：\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig52_HTML.jpg](img/335103_3_En_3_Fig52_HTML.jpg)\n\
  \n图 3-52 基于 EMP 表的交互式报告区域\n\n```sql\nselect * from EMP\n```\n\n交互式报告区域有一个默认模板，与你之前看到的其它报表类型不同。那些区域使用了\
  \ `Standard` 模板，而图[3-52]使用的是 `Interactive Report` 模板。最明显的区别是 `Interactive Report`\
  \ 模板不会在顶部显示其标题。\n\n注意\n\n像往常一样，你可以从属性编辑器的 `Appearance` 部分更改区域的模板。\n\n除了区域模板，图[3-52]看起来很像经典报告区域。事实上，经典报告区域的所有属性也适用于交互式报告区域——你可以指定区域在页面上的位置、其源查询以及每列的格式。如果需要，你可以配置此区域，使其看起来与图[3-24]的格式化报告完全一样。然而，为了更好地关注交互式报告特有的定制功能，我将保持其未经格式化。\n\
  \n图[3-52]中的一个新功能是报告上方的一行项目，称为*搜索栏*。搜索栏允许用户通过过滤行、隐藏列、排序、创建图表以及对其值执行简单计算来交互式地定制报告。虽然图中未显示，但交互式报告也可以显示一个*链接列*，允许用户单独检查报告行。\n\
  \n接下来的章节将讨论与搜索栏和链接列相关的问题——特别是它们如何使用以及应用程序设计者如何配置它们的属性。\n\n## 使用搜索栏\n\n搜索栏包含四个项目：放大镜、文本框、`Go`\
  \ 按钮和 `Actions` 按钮。前三个项目允许用户过滤报告的行。用户在文本框中输入搜索字符串，点击放大镜选择要搜索的列（也可以选择 `All Columns`），然后点击\
  \ `Go`。不包含搜索文本的记录将从报告中过滤掉。\n\n例如，在文本框中输入 **82** 并选择 `Hiredate` 列，其效果是过滤出所有在 1982\
  \ 年入职的员工。图[3-53]显示了生成的区域。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig53_HTML.jpg](img/335103_3_En_3_Fig53_HTML.jpg)\n\
  \n图 3-53 过滤图[3-52]报告后的结果\n\n请注意，该区域现在在搜索栏下方有一行描述该过滤器。你可以点击左侧的复选框来启用/禁用它，或者点击右侧的\
  \ X 来永久删除它。\n\n可以同时使用多个过滤器。例如，要查找 1982 年入职且在外工作的员工，你需要为 `Offsite` 列添加另一个过滤器。结果如图[3-54]所示。\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig54_HTML.jpg](img/335103_3_En_3_Fig54_HTML.jpg)\n\
  \n图 3-54 在图[3-53]的报告中添加第二个过滤器\n\n通常，用户可以通过创建多个过滤器并有选择地启用各种过滤器子集来探索报告的内容。\n\n\n\n\
  `操作`按钮允许用户进一步自定义报告。点击该按钮会显示其可执行操作的菜单。该菜单出现在图 3-55 中，展示了`数据`操作的子菜单。以下章节将描述这些操作中较为实用的部分。\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig55_HTML.jpg](img/335103_3_En_3_Fig55_HTML.jpg)\n\
  \n图 3-55 操作菜单\n\n### 列\n\n选择`列`操作会弹出一个模态对话框，用户可以在其中选择要在报告中显示的列及其顺序；图 3-56 展示了一个选择显示`Ename`、`Job`、`Hiredate`和`Sal`列的示例。\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig56_HTML.jpg](img/335103_3_En_3_Fig56_HTML.jpg)\n\
  \n图 3-56 指定要显示的列\n\n### 筛选器\n\n选择`筛选器`操作会弹出一个模态对话框，用户可以在其中创建筛选器；参见图 3-57。它产生的筛选器类似于您为图\
  \ 3-53 和 3-54 创建的筛选器。不同之处在于，之前的筛选器只能检查文本包含关系，而此对话框允许使用多种操作类型。例如，图 3-57 中指定的筛选器是\
  \ `Job!='CLERK'`。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig57_HTML.jpg](img/335103_3_En_3_Fig57_HTML.jpg)\n\
  \n图 3-57 筛选器对话框\n\n### 排序\n\n选择`排序`操作会弹出一个模态对话框，用户可以在其中选择所需的排序顺序；参见图 3-58。用户选择要排序的列以及排序方向是升序还是降序。该图显示了选择排序列的菜单。请注意，用户可以对可见列和隐藏列进行排序。\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig58_HTML.jpg](img/335103_3_En_3_Fig58_HTML.jpg)\n\
  \n图 3-58 排序对话框\n\n### 突出显示\n\n`突出显示`操作位于`格式`子菜单中。它允许用户突出显示满足指定条件的行或单元格。回想一下，图 3-24\
  \ 中的格式化经典报告将高薪值显示为红色。这是一种突出显示的形式。`突出显示`操作允许用户轻松实现这种以及其他形式的突出显示。\n\n选择`突出显示`选项会弹出图\
  \ 3-59 所示的模态对话框。`突出显示条件`的值指定了关注的数值。如果`突出显示类型`的值是`单元格`，则这些数值被突出显示；如果是`行`，则包含这些数值的行被突出显示。突出显示可以涉及背景色、文本色或两者。该图显示了与图\
  \ 3-24 对应的突出显示设置。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig59_HTML.jpg](img/335103_3_En_3_Fig59_HTML.jpg)\n\
  \n图 3-59 突出显示对话框\n\n### 每页行数\n\n`每页行数`操作也位于格式子菜单中。它允许用户随意更改报告的分页方式。点击菜单项会显示一个子菜单，用户可以从一系列可能的每页行数中进行选择。\n\
  \n### 图表\n\n选择`图表`操作会弹出一个模态对话框，用户可以在其中基于报告中的数据创建图表；参见图 3-60。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig60_HTML.jpg](img/335103_3_En_3_Fig60_HTML.jpg)\n\
  \n图 3-60 图表对话框\n\n通过此对话框，用户可以创建对单个列进行聚合的单系列图表。该图指定了一个柱状图，显示每个职位的最低薪资，类似于图 3-37 中显示的柱状图。生成的图表出现在图\
  \ 3-61 中。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig61_HTML.jpg](img/335103_3_En_3_Fig61_HTML.jpg)\n\
  \n图 3-61 交互式图表\n\n此图中有两点值得注意。首先，图表的许多方面是不可自定义的。例如，图表只能有一个系列，并且调色板是固定的。其次，搜索栏已扩展，在`操作`按钮左侧增加了两个报告/图表按钮。用户可以使用这些按钮在交互式报告及其图表之间切换。\n\
  \n### 配置搜索栏\n\n搜索栏具有许多功能。然而，并非所有应用程序都需要全部功能。交互式报告区域具有允许应用程序开发人员限制此功能的属性。本节将考察这些属性。\n\
  \n图 3-62 显示了`交互式报告`页面及其交互式报告区域`Employees`的渲染树。请注意，此树具有与经典报告相同的结构（参考图 3-25），即`属性`组件包含报告特定的属性，而`列`文件夹包含每个列的属性。\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig62_HTML.jpg](img/335103_3_En_3_Fig62_HTML.jpg)\n\
  \n图 3-62 交互式报告页面的渲染树\n\n`属性`节点的属性编辑器包含两个相关部分：`搜索栏`和`操作菜单`。图 3-63 显示了`搜索栏`部分的属性。这些属性让您可以选择性地显示搜索区域的不同部分。例如，关闭`包含搜索栏`属性会完全禁用该栏，关闭`搜索字段`则仅启用`操作`按钮，依此类推。\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig63_HTML.jpg](img/335103_3_En_3_Fig63_HTML.jpg)\n\
  \n图 3-63 用于配置搜索区域的属性\n\n图 3-64 显示了`操作菜单`部分的前几个属性。这些属性让您可以指定菜单中显示的操作。（由于篇幅所限，并非所有属性均已显示。）\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig64_HTML.jpg](img/335103_3_En_3_Fig64_HTML.jpg)\n\
  \n图 3-64 操作菜单部分的部分属性\n\n最后，交互式报告的每个列都有用于配置其特定功能的属性。这些属性出现在该列的`允许用户`部分中，如图 3-65 所示。（同样，由于篇幅所限，并非所有属性均已显示。）\n\
  \n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig65_HTML.jpg](img/335103_3_En_3_Fig65_HTML.jpg)\n\
  \n图 3-65 某列“允许用户”部分的部分属性\n\n### 链接列\n\n交互式报告可以显示一个特殊的列，其值是一个链接。点击此链接可在`单行视图`中显示报告。也就是说，报告会变为仅显示该行的值；它还显示供用户移至下一行或上一行的导航按钮以及一个返回原始报告的按钮。图\
  \ 3-66 显示了带有链接列的交互式报告。图 3-67 显示了点击 `BLAKE` 的链接后报告的单行视图。请注意，此单行视图显示所有列，而不仅仅是报告中显示的列。\n\
  \n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig67_HTML.jpg](img/335103_3_En_3_Fig67_HTML.jpg)\n\
  图 3-67 单行视图下的交互式报表\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig66_HTML.jpg](img/335103_3_En_3_Fig66_HTML.jpg)\n\
  图 3-66 带有链接列的交互式报表\n\n该区域的`属性`组件的属性编辑器包含两个部分——`链接`和`单行视图`——用于启用链接列并配置其行为。`链接`部分的属性如图\
  \ 3-68 所示。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig68_HTML.jpg](img/335103_3_En_3_Fig68_HTML.jpg)\n\
  图 3-68 用于启用单记录视图的属性\n\n要启用链接列，请将`链接列`属性的值设置为`链接到单行视图`。（您也可以将其设置为链接到任意 URL，但这个选项通常不那么常用。）然后，您必须指定单击链接时应选择哪一行。值`ROWID`表示使用被点击的行，这是最自然的选择。\n\
  \n图 3-69 展示了`单行视图`部分。这里一个有趣的属性是`仅显示的列`：启用它表示单行视图应显示与报表相同的列；禁用它则表示应显示所有列。\n\n![../images/335103_3_En_3_Chapter/335103_3_En_3_Fig69_HTML.jpg](img/335103_3_En_3_Fig69_HTML.jpg)\n\
  图 3-69 单行视图属性\n\n## 本章小结\n\n本章重点介绍了 APEX 区域的设计与使用。您首先研究了创建区域的不同方法、指定其在页面上位置所需的属性以及其外观和感觉。然后，您探索了四种常见的区域类型：`静态内容`、`经典报表`、`图表`和`交互式报表`。您了解了如何使用每种类型的区域，以及如何利用其类型特定的属性来有效地进行格式化。\n\
  \n静态内容区域主要用于显示 HTML 代码。您研究了与 APEX 相关的相对引用的细微差别——特别是如何引用存储在 APEX 服务器上的图像以及如何链接到当前应用程序的页面。这些相对引用依赖于某些\
  \ APEX 内置变量的值，如`APP_IMAGES`和`APP_ID`。您了解了如何使用`替换字符串`来访问这些变量的值。\n\n经典报表区域显示 SQL 查询的输出。您了解了如何使用\
  \ APEX 属性来自定义区域的显示方式。其中，列的`HTML 表达式`属性尤为有用，它允许您通过将列值包装在 HTML 表达式中来进行格式化。您还了解了如何通过修改报表的源查询来执行条件格式化。\n\
  \n图表区域显示图表。您了解了如何使用 SQL 查询来指定图表内容，以及如何利用属性来配置图表的外观。\n\n交互式报表区域显示报表，类似于经典报表区域。交互式报表在两个方面有所不同。首先，其搜索栏使用户能够以交互方式自定义报表。其次，其链接列允许用户以单记录模式查看报表。您研究了这些功能提供的功能，并将其与使用经典报表和图表区域可能实现的功能进行了比较。您还了解了应用程序开发人员如何根据需要，通过设置交互式报表区域的属性来仅启用部分功能。\n\
  \n## 4. 导航\n\nWeb 应用程序的用户应能轻松地在其页面间导航。您在使用 APEX 时已经遇到过三种导航功能：链接、面包屑和导航菜单。本章将详细研究这些功能，并向您展示在应用程序中使用它们的不同方式。\n\
  \n### 列表\n\n在通常的表述中，`列表`就是事物的集合。然而，在 APEX 中，列表是链接的集合。列表是一个有用的导航工具，原因显而易见：单击链接会带您进入新页面。\n\
  \n以 APEX 列表的一个好例子来说，再次考虑 SQL Workshop 主屏幕，如图 1-3 所示。它的`创建对象`区域是一个列表，可快速访问各种对象创建向导页面。该列表为每种\
  \ SQL 对象类型设有一个条目，其链接将带您进入该对象的创建向导。\n\n另一个例子是`员工演示`应用程序的主页，如图 3-17 所示。它的`参考`区域是一个包含链接的列表，这些链接将带您访问选定的网页。\n\
  \n也许列表最显著的例子是导航菜单。它的每个条目都是一个链接，可带您进入应用程序的指定页面。\n\nAPEX `列表管理器`让您可以查看、编辑和创建列表。要访问列表管理器，请从应用程序的主屏幕开始，单击页面顶部的大`共享组件`按钮。搜索`导航`部分并单击`列表`。您将被带到列表管理器的主屏幕，如图\
  \ 4-1 所示。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig1_HTML.jpg](img/335103_3_En_4_Fig1_HTML.jpg)\n\
  图 4-1 列表管理器\n\n该图显示应用程序已有两个列表：`桌面导航栏`和`桌面导航菜单`。APEX 以特殊方式处理这些列表——它们的条目分别显示在导航栏（横跨页面顶部）和导航菜单（沿页面左侧向下）中。\n\
  \n### 查看列表详情\n\n单击列表的名称（或选择屏幕顶部的`列表详细信息`链接）将带您进入`列表详细信息`屏幕。图 4-2 显示了`桌面导航菜单`列表的此屏幕。\n\
  \n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig2_HTML.jpg](img/335103_3_En_4_Fig2_HTML.jpg)\n\
  图 4-2 桌面导航菜单列表的详细信息\n\n该屏幕显示了所选列表中每个条目的信息。最相关的值是`序列`、`名称`和`目标`。\n\n*   序列号决定条目在列表中出现的顺序。\n\
  *   条目的名称指定其在列表中的显示方式。\n*   条目的目标是单击链接时调用的 URL。\n\n请注意图中每个目标 URL 都指向当前应用程序的一个页面，使用了第\
  \ 2 章描述的语法。该语法的一个新方面是字符串`&DEBUG.`，它作为每个 URL 的第五个参数出现。URL 的这一部分指定应用程序应继续使用当前的调试模式（这是一个次要问题，本书中忽略）。\n\
  \n### 编辑列表条目\n\n`列表详细信息`屏幕中每个条目的名称都是一个链接。单击某个条目的链接将带您进入`列表条目`屏幕，您可以在其中编辑该条目的值。图\
  \ 4-3 显示了单击`区域实践`条目后出现的此屏幕的一部分。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig3_HTML.jpg](img/335103_3_En_4_Fig3_HTML.jpg)\n\
  图 4-3 区域实践页面的列表条目屏幕\n\n\n## APEX 导航与列表配置\n\n### 修改导航菜单项\n\n这里相关的属性是 `Sequence`、`List\
  \ Entry Label` 和 `Page`。\n作为实验，请更改这些属性的值——例如，将 `Sequence` 设置为 `60`，将 `List Entry\
  \ Label` 设置为 `Fun with Regions`。然后运行应用程序。导航菜单现在应该如图 4-4 所示。特别是，原先标题为 `Region Practice`\
  \ 的条目现在标题为 `Fun with Regions` 并出现在最后。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig4_HTML.png](img/335103_3_En_4_Fig4_HTML.png)\n\
  \n**图 4-4** 修改后的导航菜单\n\n### 创建新的列表条目\n\n现在请关注 `Desktop Navigation Bar` 列表。APEX 应用程序中的导航栏横跨每个页面的顶部。默认情况下，导航栏左侧显示徽标，右侧显示当前用户名（如第\
  \ 2 章图 2-8 所示）。导航栏的总体意图是提供常用任务的快速链接。例如，徽标实际上是主页的链接，而用户名是一个菜单，其中包含一个链接到注销用户的存储过程。导航栏通常包含用于显示站点地图、在线帮助或联系信息的链接。\n\
  \n要查看导航栏的实现方式，请转到 `Desktop Navigation Bar` 列表的 `List Details` 屏幕；如图 4-5 所示。该列表包含三个条目。第一个条目显示用户名，第二个是一个无趣的分隔符，第三个是注销存储过程的链接。这些条目是分层组织的，这正是创建菜单结构的方式。用户名条目是父项，因此显示为菜单。注销条目是其子项，因此显示为菜单条目。分层列表将在本章后面详细讨论。\n\
  \n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig5_HTML.png](img/335103_3_En_4_Fig5_HTML.png)\n\
  \n**图 4-5** Desktop Navigation Bar 列表的详细信息\n\n让我们修改导航栏，使其拥有两个新条目：一个指向本书网页的链接和一个指向\
  \ `Contact Info` 页面的链接。要创建其他条目，请单击 `Create Entry` 按钮。然后将显示 `List Entry` 屏幕，如图 4-6\
  \ 所示。请注意，此屏幕与图 4-3 基本相同，只是其按钮用于条目创建而非更新。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig6_HTML.jpg](img/335103_3_En_4_Fig6_HTML.jpg)\n\
  \n**图 4-6** 用于创建列表条目的 List Entry 屏幕\n\n要创建指向本书网页的链接，您只需输入 `List Entry Label` 属性的值（我输入了\
  \ `Get the Book`）并设置目标。这里，目标是一个 URL，因此您需要将 `Target type` 属性设置为 `URL`，并将其 `URL Target`\
  \ 属性设置为 [`www.apress.com/9781484261651`](http://www.apress.com/9781484261651)。\n\
  然后点击 `Create List Entry`。\n既然如此，您也可以立即创建指向 `Contact Info` 页面的链接，尽管该页面尚不存在。假设它将是第\
  \ 6 页，创建一个新的列表条目，将其 `List Entry Label` 设置为 `Contact Us`，`Target type` 设置为 `Page\
  \ in this Application`，`Page` 值设置为 `6`。然后返回应用程序的主页。\n\n现在创建 `Contact Info` 页面。当然，您可以按照自己的意愿设计页面。但只需创建一个包含单个\
  \ `Static Content` 区域的空白页面，其源是简单的文本消息即可。为了多样化，我将页面定义为 `modal dialog`，并将该区域的 `Template`\
  \ 属性设置为 `Alert`。图 4-7 显示了单击 `Contact Us` 链接后的应用程序。请注意，`Contact Info` 页面不需要在导航菜单中有条目，因为它已在导航栏中有一个条目。\n\
  \n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig7_HTML.jpg](img/335103_3_En_4_Fig7_HTML.jpg)\n\
  \n**图 4-7** 在导航栏上使用 Contact Us 链接\n\n### 创建新列表\n\n让我们创建一个列表来保存主页上 `References` 区域的三个链接。返回到图\
  \ 4-1 的列表管理器屏幕。点击 `Create` 按钮将打开 APEX 列表创建向导。此向导有四个屏幕。在第一个屏幕上，选择 `From Scratch`\
  \ 创建列表。在第二个屏幕上，给列表起一个名字（例如，**References**），并将其类型设置为 `Static`。\n\n第三个屏幕让您可以机会通过输入标签和\
  \ URL 来创建菜单条目。您可以在那里创建条目，也可以等待并像上一节那样单独创建每个条目。我发现现在创建条目更快。图 4-8 显示了我如何填写屏幕。请注意，该图未显示完整的\
  \ URL，因为它们对于文本框来说太长了。供您参考，完整的 URL 出现在清单 3-3 中。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig8_HTML.jpg](img/335103_3_En_4_Fig8_HTML.jpg)\n\
  \n**图 4-8** 第三个 Create List 屏幕\n\n最后一个屏幕询问您是否要为该列表创建一个区域。\n由于您尚未了解列表区域，请选择 `No`。然后点击\
  \ `Create List` 来创建该列表。列表管理器现在应该显示新列表的条目。\n\n### 修改导航界面\n\n默认情况下，`Desktop Navigation\
  \ Menu` 列表显示在页面左侧，而 `Desktop Navigation Bar` 列表显示在顶部。您可以通过修改应用程序的属性来更改这些默认值。\n\n\
  第 2 章讨论了如何获取应用程序的属性。回顾一下，转到应用程序的主屏幕（图 2-5）并单击右上角的 `Edit Application Properties`\
  \ 按钮。您将进入应用程序的属性屏幕（图 2-6），它有四个选项卡：`Definition`、`Security`、`Globalization` 和 `User\
  \ Interface`。\n选择 `User Interface` 选项卡将显示用户界面属性；图 4-9 显示了该屏幕的顶部。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig9_HTML.jpg](img/335103_3_En_4_Fig9_HTML.jpg)\n\
  \n**图 4-9** 应用程序的用户界面属性\n\n请注意图底部列出属性部分的选择条。您可能还记得第 3 章中的 `Logo` 属性（参见图 3-21）。然而，现在您感兴趣的是\
  \ `Navigation Menu` 和 `Navigation Bar` 部分。它们的属性允许您配置导航菜单和导航栏。\n\n### 配置导航菜单\n\n\
  图 4-10 显示了 `Navigation Menu` 属性。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig10_HTML.jpg](img/335103_3_En_4_Fig10_HTML.jpg)\n\
  \n**图 4-10** 应用程序的 Navigation Menu 属性\n\n\n\n`导航菜单列表`属性让你指定将作为导航菜单显示的列表。你可以从任何现有列表中选择。例如，选择`References`列表会导致显示如图\
  \ 4-11 所示的导航菜单。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig11_HTML.jpg](img/335103_3_En_4_Fig11_HTML.jpg)\n\
  \n图 4-11：`References` 列表现在成为导航菜单\n\n你也可以选择值`-Select Navigation Menu List-`作为导航菜单。这样做会将`导航菜单列表`属性设置为`null`，这会导致\
  \ APEX 完全不渲染导航菜单区域。\n\n`位置`属性的值可以是`Side`或`Top`。选择`Top`会告诉 APEX 在页面顶部、导航栏下方渲染导航菜单。它还会导致`列表模板`属性的值变为`Top\
  \ Navigation Menu`。图 4-12 显示了在顶部显示`Desktop Navigation Menu`列表的结果。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig12_HTML.jpg](img/335103_3_En_4_Fig12_HTML.jpg)\n\
  \n图 4-12：导航菜单现在出现在顶部\n\n### 配置导航栏\n\n图 4-13 展示了`导航栏`属性。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig13_HTML.png](img/335103_3_En_4_Fig13_HTML.png)\n\
  \n图 4-13：应用程序的导航栏属性\n\n`导航栏列表`属性让你指定将出现在导航栏中的列表。与导航菜单一样，它可以是任何列表，但不能是`null`。例如，图\
  \ 4-14 显示了将`Desktop Navigation Menu`列表放置在导航栏中的结果。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig14_HTML.jpg](img/335103_3_En_4_Fig14_HTML.jpg)\n\
  \n图 4-14：导航菜单现在出现在导航栏中\n\n### 列表区域\n\n为了让列表的内容在页面上可见，该列表必须被分配到该页面的某个位置。导航栏和导航菜单的位置是预定义的。如果你希望列表出现在其他任何地方，你必须将其放置在你创建的区域中。该区域的类型应为`列表`，并且其源应为列表的名称。\n\
  \n例如，图 4-15 展示了`列表练习`页面，这是演示应用程序的第 7 页。该页面包含四个区域，类型均为`列表`。前三个区域以三种不同的方式显示`References`列表，底部未命名的区域则显示`Desktop\
  \ Navigation Menu`列表。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig15_HTML.jpg](img/335103_3_En_4_Fig15_HTML.jpg)\n\
  \n图 4-15：列表练习页面\n\n要构建此页面，你应该新建一个页面并向其添加四个新区域。我将这些区域命名为`使用卡片的引用`、`使用链接的引用`、`作为导航栏的引用`和`导航菜单`。第一个区域的列跨度为\
  \ 7；第二个区域在新行的同一列开始；另外两个区域则开始新的行。\n\n将每个区域的类型设置为`列表`。一个`列表`区域的源必须是一个列表。属性编辑器让你从现有列表中选择，如图\
  \ 4-16 所示。为前三个区域选择`References`列表，为`导航菜单`区域选择`Desktop Navigation Menu`列表。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig16_HTML.jpg](img/335103_3_En_4_Fig16_HTML.jpg)\n\
  \n图 4-16：选择列表区域的源\n\n此时，你已拥有所需的列表区域，但它们都被格式化为链接。这对于`使用链接的引用`区域是合适的，但其他区域需要不同。要更改列表的显示方式，必须更改其模板。类型为`列表`的区域有一个名为`列表模板`的属性，可以通过在渲染树中选择其`属性`节点并在属性编辑器中查找`外观`部分来访问。图\
  \ 4-17 显示了此属性的可能值。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig17_HTML.png](img/335103_3_En_4_Fig17_HTML.png)\n\
  \n图 4-17：可能的列表模板值\n\n要生成图 4-15 所示的页面，你应该将`使用卡片的引用`区域的模板设置为`卡片`，将`作为导航栏的引用`区域的模板设置为`菜单栏`，并将`导航菜单`区域的模板设置为`导航栏`。为了有趣，你也可以尝试将其他模板分配给这些区域，例如`徽章列表`、`媒体列表`和`选项卡`。\n\
  \n为了进一步自定义，一些列表模板具有可通过`模板选项`属性设置的选项。例如，`使用卡片的引用`区域使用了图 4-18 所示的选项。通常，理解各种模板选项用途的最佳方法是在你的区域上进行实验。\n\
  \n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig18_HTML.png](img/335103_3_En_4_Fig18_HTML.png)\n\
  \n图 4-18：卡片模板的选项\n\n除了选择列表模板，还记得你也可以通过选择区域模板来自定义区域。（第 3 章的图 3-10 展示了可能的模板。）图 4-15\
  \ 的前三个区域使用了`标准`模板，该模板显示一个包含区域名称的标题。底部区域使用了`选项卡容器`模板。该模板在没有额外边框的情况下显示其内容；实际上，它看起来很像一个菜单栏。这个区域展示了如何使用列表区域来模拟出现在页面默认位置之外的菜单栏。\n\
  \n图 4-15 的另一个特点是它没有显示导航菜单区域。你之前已经看到了如何通过将全局属性`导航菜单列表`设置为`null`来隐藏应用程序所有页面的导航菜单。但如果你只想在单个页面上隐藏菜单呢？答案是使用页面的`导航菜单`属性，如图\
  \ 4-19 所示。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig19_HTML.jpg](img/335103_3_En_4_Fig19_HTML.jpg)\n\
  \n图 4-19：为单个页面配置导航菜单\n\n\n\n启用 `覆盖用户界面级别` 属性后，将显示 `列表` 属性。随后，您可以选择一个列表作为页面的导航菜单，也可以选择不指定导航菜单。\n\
  \n将链接存储在列表中，并在列表区域中显示，是一项重要的技术；它远比手动使用 HTML 格式化链接更优越，就像您在主页的 `引用` 区域所做的那样。其中一个原因是，列表区域的模板负责格式化列表条目；您只需选择所需的模板。换言之，列表区域将内容（源列表）与格式（列表模板）分离。编写\
  \ HTML 代码来实现列表不仅繁琐，而且会将内容与格式混在一起。任何更改条目格式的决定都需要您重写 HTML 代码。\n\n使用列表区域的第二个优势是，它会随着列表的更改而自动更新。这对于显示\
  \ `桌面导航菜单` 列表的区域尤为重要。例如，每当您为一个新页面创建导航菜单条目时，图 4-15 中的 `导航菜单` 区域就会相应地进行调整。\n\n###\
  \ 层级列表\n\n`员工演示` 应用程序当前的 `桌面导航菜单` 列表中有六个条目。由于条目数量较少，简单地将它们线性地显示在页面侧面（或顶部）是合理的。然而，随着条目数量的增加，一个长长的线性列表会变得难以管理。常见的解决方案是分层显示条目。\n\
  \nAPEX 导航栏（如图 1-3 所示）就是一个很好的例子。它的第一个选项卡（包含徽标）对应于 APEX 主屏幕；其他选项卡对应于 APEX 站点的通用类别。每个类别选项卡都有一个主目标页面，作为该类别的主屏幕。点击类别选项卡的主要部分会带您前往该页面。每个类别选项卡还有一个下拉箭头；点击它会显示该类别的次要选项卡菜单。这样就形成了一个功能齐全且界面整洁的效果，次要选项卡在需要时才会显示。\n\
  \n在层级列表中，每个列表条目都可以有一个 `父级` 条目。没有父级的条目定义了一个层级结构，被称为该层级的 `根`。一个层级可以有多个级别，这意味着一个条目的父级也可能有其父级。例如，图\
  \ 4-20 展示了 APEX 导航栏的 `应用构建器` 条目。它的子级之一 `工作区实用工具` 也有自己的子级。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig20_HTML.png](img/335103_3_En_4_Fig20_HTML.png)\n\
  *图 4-20：APEX 导航栏中的应用构建器菜单*\n\n让我们看看如何类似地重构 `员工演示` 应用程序。它的 `桌面导航菜单` 列表将包含主页以及两个层级结构：\n\
  \n*   一个 `区域` 层级，包含页面 `区域练习`、`经典报表`、`图表` 和 `交互式报表`\n*   一个 `列表` 层级，包含页面 `列表练习`\n\
  \n每个层级对应本书的一个章节——`区域` 层级包含在第 3 章开发的页面，`列表` 层级包含在第 4 章开发的页面。随着本书的进展，我将遵循此约定，为每章开发的页面创建一个新的层级结构。\n\
  \n但在开始创建层级之前，您需要考虑如何配置每个根条目。显然，其 `父列表条目` 属性的值应为 `null`，表示它是一个根。但是，应该为其 `目标` 属性赋予什么值呢？有三种合理的策略：您可以创建一个专用的“主屏幕”作为目标；也可以将目标设置为其某个子级的目标；或者可以将目标设置为\
  \ `null`。APEX 采用了第一种策略——它为应用构建器、SQL 工作坊等分别设置了主屏幕。采用第二种策略的效果是使所选目标成为该部分的默认页面。而采用第三种策略则无法选择父级，从而迫使用户选择一个子级。本书将遵循以下约定：拥有单个子级的根条目将把该子级作为其目标，而拥有多个子级的根条目将采用空目标。\n\
  \n要创建此层级列表，请先转到 `桌面导航菜单` 的 `列表详细信息` 屏幕，该屏幕如图 4-2 所示。创建两个新的列表条目作为两个层级的根，并根据前述约定设置它们的目标页面：`区域`\
  \ 条目的目标应为空，`列表` 条目的目标应为 `列表练习` 页面。\n\n现在需要为五个子条目设置父级。直接的方法是转到每个条目的 `列表条目` 屏幕（如图\
  \ 4-3 所示）并修改其 `父列表条目` 属性。不过，`列表详细信息` 屏幕有一个向导可以加速此过程。点击 `列表详细信息` 屏幕右侧标题为 `重新分配此列表中的列表条目`\
  \ 的链接。该链接会带您到一个 `重新分配列表条目` 屏幕，从那里您可以快速指定给定父条目的子级。无论您采用哪种方式，桌面导航菜单的最终条目应如图 4-21 所示。\n\
  \n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig21_HTML.jpg](img/335103_3_En_4_Fig21_HTML.jpg)\n\
  *图 4-21：层级导航菜单的条目*\n\n图 4-22 显示了生成的导航菜单的截图，其中我点击了 `区域` 菜单以查看其子级。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig22_HTML.jpg](img/335103_3_En_4_Fig22_HTML.jpg)\n\
  *图 4-22：层级导航菜单*\n\n每次创建新页面时，您都可以使用前述技术为其在 `桌面导航菜单` 列表中添加条目。然而，在创建页面时直接向列表中添加新条目通常更方便。请考虑创建页面向导的第三个屏幕，如图\
  \ 4-23 所示。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig23_HTML.jpg](img/335103_3_En_4_Fig23_HTML.jpg)\n\
  *图 4-23：在页面创建过程中指定菜单层级*\n\n\n\n## 导航\n\n标记为 `Parent Navigation Menu Entry` 的项会显示导航菜单列表中的每一个条目。（你需要滚动列表才能看到全部。）其默认值为\
  \ `-No parent selected-`，这将使新的菜单条目成为根条目。如果你希望新条目成为另一个条目的子项，就必须指定一个父项。理想情况下，你应该能够直接从列表中选择你想要的条目。然而，有些条目是灰显且不可选择的。具体来说，可选的条目是那些已经是父项的条目，或者是“潜在父项”（即没有目标的条目）。大多数情况下，你想要的父项是可选的。但如果你希望新条目是某个灰显条目的子项，你必须通过列表管理器为其分配父项。\n\
  \n### 巨型菜单\n\n分层导航菜单通过两种方式改善用户体验。首先，它们对菜单条目进行结构化，使用户更容易理解有哪些可用操作。其次，它们减少了菜单所需的屏幕空间占用。\n\
  \n一个较新的设计思路是保持分层结构，但一次性显示所有菜单条目，这被称为 *巨型菜单*。例如，图 4-24 展示了带有巨型菜单的员工演示应用程序的外观。点击标志左侧的图标可以切换菜单的可见性。每个菜单条目都是指向其目标页面的链接。\n\
  \n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig24_HTML.jpg](img/335103_3_En_4_Fig24_HTML.jpg)\n\
  \n图 4-24 一个巨型菜单\n\nAPEX 将巨型菜单实现为另一种导航菜单模板。要创建巨型菜单，请点击应用程序主页上的 `Edit Application\
  \ Properties` 按钮，然后点击 `User Interface` 选项卡。找到 `Navigation Menu` 部分，将其 `Position`\
  \ 属性设置为 `Top`，将其 `List Template` 属性设置为 `Top Navigation Mega Menu`，如图 4-25 所示。\n\n\
  ![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig25_HTML.jpg](img/335103_3_En_4_Fig25_HTML.jpg)\n\
  \n图 4-25 指定一个巨型导航菜单\n\n### 页面层级\n\n一个大型 Web 应用程序包含的页面太多，无法全部放入导航菜单。因此，导航菜单包含应用程序的\
  \ *着陆页*——那些标志着最突出任务开始的页面。\n\n通常，应用程序中的所有页面集合也具有层级结构。这种页面层级的显式呈现被称为 *站点地图*。例如，考虑一个\
  \ APEX 站点中的页面。它们在层级中的根是 APEX 主页。根的子项对应于应用程序的各种类别，如应用构建器、SQL 工作室和团队开发工具。每个类别都有一个“主页”，它领导着包含其类别页面的子树。\n\
  \n图 4-26 列出了对应于 APEX 应用构建器的部分页面层级。由于空间限制，该图省略了许多页面。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig26_HTML.jpg](img/335103_3_En_4_Fig26_HTML.jpg)\n\
  \n图 4-26 应用构建器的页面层级\n\n将此页面层级与应用构建器的导航菜单进行比较是值得的。导航菜单涵盖了该树前三层中的大多数（但非全部）页面。导航菜单中明显缺少的是对应于每个应用程序子树的条目；这些页面改为通过应用构建器主页上的图标和按钮访问。\n\
  \n### 面包屑导航\n\n你可以通过给出页面层级中从该页面到主页路径上的页面序列，来描述应用程序中任何页面的位置。例如，`Application Attributes`\
  \ 页面的位置是\n\n```\nApp Builder > Workspace Utilities > Cross Application Reports >\
  \ Application Attributes\n```\n\n此路径被称为 *面包屑导航*。并非所有 APEX 屏幕都显示其面包屑导航，但如果它们显示，通常会显示在导航栏下方。请注意，APEX\
  \ 面包屑导航中的第一个条目显示为带圈的向上箭头，这表示层级的根页面。\n\n作为练习，导航到 APEX 站点的其他页面并注意它们的面包屑导航。事实上，看看你是否能找到图\
  \ 4-26 中列出的所有页面。面包屑导航是可点击的。点击其路径的任何部分都会将你带到相应的页面。\n\n导航菜单和面包屑导航是互补的导航工具。导航菜单对所有页面都是一样的，其条目涵盖了应用程序的全部功能。通过查看菜单，用户可以确定任何所需操作的适当起始页面。另一方面，页面的面包屑导航特定于该页面，并提供有关该页面在页面层级中位置的上下文信息。例如，假设你正在查看应用构建器的\
  \ `Application Attributes` 页面。它的面包屑导航告诉你该页面是跨应用程序报告之一。该信息可能会促使你点击面包屑导航来探索其他跨应用程序报告。\n\
  \n在 APEX 中，整个页面层级被称为 *面包屑对象*。面包屑对象本质上是一个分层列表——它为层级中的每个页面包含一个条目，每个条目（根除外）都有一个父项。\n\
  \nAPEX 会自动为每个应用程序创建一个面包屑对象（名为 `Breadcrumb`）。APEX *面包屑管理器* 允许你编辑此对象并创建其他面包屑对象。要进入面包屑管理器，请从应用程序的主页开始，选择页面顶部的\
  \ `Shared Components` 按钮。搜索 `Navigation` 部分，点击 `Breadcrumbs`，然后点击 `Breadcrumb` 图标。你将被带到该面包屑对象的面包屑管理器。图\
  \ 4-27 显示了我的 `Employee Demo` 应用程序的面包屑管理器。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig27_HTML.jpg](img/335103_3_En_4_Fig27_HTML.jpg)\n\
  \n图 4-27 面包屑管理器\n\n该图显示只有一个面包屑条目，对应于主页。此条目是在我创建应用程序时自动创建的。请注意，即使我从主页删除了其面包屑区域，该条目仍然存在。\n\
  \n当我创建其他页面时，我告诉向导不要为新页面创建面包屑条目。相反，我现在可以使用面包屑管理器来创建面包屑条目。点击 `Create Breadcrumb Entry`\
  \ 按钮。图 4-28 显示了生成的屏幕。\n\n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig28_HTML.jpg](img/335103_3_En_4_Fig28_HTML.jpg)\n\
  \n图 4-28 面包屑条目屏幕\n\n此屏幕允许你指定页面及其父项，以及有关面包屑如何在页面上显示的信息。具体而言：\n\n*   `Page` 属性（在 `Breadcrumb`\
  \ 部分中）指定页面。\n*   `Parent Entry` 属性指定父项。\n*   `Short Name` 属性指定页面在面包屑上的显示方式。选择页面的名称通常是合理的。\n\
  *   `Page` 属性（在 `Target` 部分中）指定用户点击该面包屑条目时发生的情况。它通常与前面的 `Page` 属性值相同。\n\n让我们为第 7\
  \ 页，即 `List Practice` 页面创建一个面包屑条目，它将是主页的子项。在 `Breadcrumb Page` 和 `Target Page` 属性中输入\
  \ 7，在 `Parent Entry` 属性中输入 `1`，在 `Short Name` 属性中输入 `List Practice`。\n\n\n\n"
- "# 5. 项目与按钮\n\n本书迄今为止一直专注于应用程序如何向用户显示信息。在本章及下一章中，你将研究那些允许用户向应用程序发送回信息的组件。这些组件，即\
  \ `项目`（items）和 `按钮`（buttons），被称为 `窗体控件`（form controls），因为它们通常出现在网页表单中。\nAPEX 支持多种类型的项目，它们的外观和行为差异很大。然而，它们都可以被理解为几个基本概念的变体。本章的主要目的是探讨这些概念，并研究它们如何在不同的项目类型中得以体现。\n\
  \n## 面包屑区域\n\n如果你想让一个页面显示面包屑对象，你必须为其创建一个区域。`Breadcrumb` 区域类型就是为此目的而设计的。虽然你可以将面包屑区域放置在页面上的任何位置，但它自然应该放在\
  \ `面包屑栏`（Breadcrumb Bar）位置，该位置位于导航栏正下方。通常，你需要遵循以下步骤向页面添加面包屑区域。\n\n*   向页面添加一个新区域。\n\
  *   将区域的类型设置为 `Breadcrumb`。\n*   将区域的源设置为 `Breadcrumb` 对象。\n*   将该区域分配到 `面包屑栏`（Breadcrumb\
  \ Bar）位置。\n*   将区域模板设置为 `带属性的空白`（Blank with Attributes），这样它将在没有边框或标题的情况下显示。\n* \
  \  设置区域模板选项，使面包屑显示时有足够边距。\n\n顺便提一下，如果你在创建页面时选择创建面包屑，你的任务会稍微简单一些。图 4-29 展示了创建页面向导的第二个屏幕，假设你在创建\
  \ `列表练习`（List Practice）页面时就为其创建了面包屑。你只需要为 `父条目`（Parent Entry）和 `条目名称`（Entry Name）项输入值。\n\
  \n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig29_HTML.jpg](img/335103_3_En_4_Fig29_HTML.jpg)\n\
  \n图 4-29\n在创建页面时创建面包屑条目\n\n在你的应用程序中，使用这些步骤向 `列表练习` 页面添加一个面包屑区域。图 4-30 显示了结果页面的导航栏和面包屑区域。请注意，与列表区域不同，面包屑区域并不显示其完整的源对象。它只显示与当前页面对应的面包屑。\n\
  \n![../images/335103_3_En_4_Chapter/335103_3_En_4_Fig30_HTML.jpg](img/335103_3_En_4_Fig30_HTML.jpg)\n\
  \n图 4-30\n面包屑区域中的面包屑对象\n\n## 全局页面\n\n显示列表或面包屑对象的标准方式是将其放置在页面上的一个区域中。这种技术提供了相当大的灵活性——每个页面可以在不同位置、使用不同模板来显示列表或面包屑。然而，你通常不需要这么大的灵活性。假设你希望每个页面都以完全相同的方式显示列表或面包屑。实现这种统一性最简单的方法是使用\
  \ `全局页面`（global page）。\n全局页面是一个特殊的页面，其内容会包含在应用程序的每一个其他页面中。如果你将图 4-30 中的面包屑区域或图 4-15\
  \ 中的 `导航菜单`（Navigation Menu）区域放在全局页面中，这些区域将统一出现在应用程序的所有页面上。APEX 在应用程序创建时会创建全局页面；按照惯例，全局页面的页面编号为\
  \ 0。\n面包屑区域的一个优点是，APEX 只会在页面确实有面包屑时才在页面上渲染它。也就是说，如果你把面包屑区域放在全局页面中，它将只出现在那些实际拥有面包屑的页面上。\n\
  \n#### 小结\n\nAPEX 中主要的导航工具是链接列表，也称为 `列表`（list）。内置的 `桌面导航栏`（Desktop Navigation Bar）列表的条目显示在应用程序的导航栏中，而\
  \ `桌面导航菜单`（Desktop Navigation Menu）列表的条目则出现在应用程序的导航菜单中。列表管理器允许你编辑这些列表的内容，应用程序的 `用户界面`（User\
  \ Interface）属性则允许你自定义它们的位置和样式。\n你也可以使用列表管理器来创建自己的列表。你可以通过将列表放置在类型为 `List` 的区域中来在页面上显示它。每个列表区域都有一个\
  \ `模板`（Template）属性，让你可以自定义列表的显示方式。\n列表可以是分层的，即一个列表条目可以是一个或多个子条目的父级。这种层次结构为列表条目提供了结构。这种结构对于导航菜单列表尤其有用，因为它允许菜单包含大量条目而不会让用户不知所措。\n\
  另一种导航工具是 `面包屑`（breadcrumb）。要为页面定义面包屑，你必须首先了解该页面如何适应所有应用程序页面的层次结构中。页面的面包屑是从该页面到根节点的层次结构中的路径。要在页面上显示面包屑，你必须将其放置在类型为\
  \ `Breadcrumb` 的区域中。通常将面包屑区域放在应用程序的全局页面（页面 0）中，以便它在每个页面的相同位置出现。\n\n## 项目\n\n一个 `项目`（item）是网页中保存值的元素。每个项目都有一个\
  \ `类型`（type），例如 `文本字段`（Text Field）、`复选框`（Checkbox）或 `选择列表`（Select List）。每种项目类型都有特定的方式来显示其值并让用户修改该值。\n\
  你在使用 APEX 的过程中已经遇到了几种项目类型。例如，图 5-1 显示了用于重命名 `DEPT` 表某一列的对象浏览器屏幕。此图显示了五个项目：两个只读项目（标记为\
  \ `Schema` 和 `Table`）、一个选择列表（`当前列名`（Current Column Name））、一个文本框（`新列名`（New Column\
  \ Name））和一个复选框（`保留大小写`（Preserve Case））。通常，每次你在 APEX 屏幕中输入一个值，都是通过一个项目来完成的。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig1_HTML.jpg](img/335103_3_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1\nAPEX 屏幕中的不同项目类型\n\nAPEX 应用程序构建器支持 22 种不同的项目类型。这些项目类型可以分为三类：`基于文本`（text-based）的项目允许你通过键入来指定值，`基于列表`（list-based）的项目允许你从列表中选择来指定值，而`基于显示`（display-based）的项目则不允许你指定值。图\
  \ 5-1 包含了所有三个项目类别的示例。本章将讨论这些类别及其项目类型。\n\n## 项目示例页面\n\n在本章中，你将创建如图 5-2 所示的页面。这个名为\
  \ `项目示例`（Item Sampler）的页面将成为 `员工演示`（Employee Demo）应用程序的第 8 页。页面本身不会做任何有趣的事情；其唯一目的是展示一些常见项目类型的功能，并展示如何配置它们的属性。\n\
  \n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig2_HTML.jpg](img/335103_3_En_5_Fig2_HTML.jpg)\n\
  \n\n## Item Sampler 页面\n\n构建 `Item Sampler` 页面的第一步是创建一个空白页面和八个静态内容区域。使用每个区域的 `Layout`\
  \ 属性将它们定位在页面上，如第 3 章所述（参见图 3-8 和 3-12）。具体而言：\n\n*   `Text-Based Items` 开始一个新行。\n\
  *   `Single-Value List Items` 位于同一行和列，这导致它被放置在 `Text-Based Items` 下方。\n*   `Radio\
  \ Groups`、`Select Lists` 和 `Popup Lists` 的父区域都是 `Single-Value List Items`，并且各自开始一个新行。\n\
  *   `Multi-Value List Items` 在同一行开始一个新列。\n*   `Yes/No Items` 和 `Some Buttons` 位于同一行和列。\n\
  \n因此，这些区域形成了一个包含两列的单行。图 5-3 显示了生成的空白区域。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig3_HTML.jpg](img/335103_3_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3 Item Sampler 页面的结构**\n\n## 创建和删除项\n\n页面上的每个项在页面的渲染树中都有一个对应的节点，位于与该项区域对应的子树中。例如，图\
  \ 5-4 显示了已完成的 `Text-Based Items` 区域的 `rendering` 子树。它有一个名为 `Items` 的子节点，该节点下有该区域内每个项对应的子节点。\n\
  \n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig4_HTML.jpg](img/335103_3_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4 Text-Based Items 区域的渲染子树**\n\n要为区域创建项，请在渲染树中右键单击该区域的条目并选择 `Create Page\
  \ Item`。APEX 随后会将一个节点插入到该区域的 `Items` 子树中。当您单击该节点时，该属性的属性将显示在属性编辑器中。\n\nAPEX 为新项的\
  \ `Name` 和 `Type` 属性分配默认值。这些属性显示在属性编辑器的 `Identification` 部分中，如图 5-5 所示。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig5_HTML.png](img/335103_3_En_5_Fig5_HTML.png)\n\
  \n**图 5-5 项的识别部分**\n\n这个新项的名称是 `P8_NEW`。前缀表示包含该项的页面，在本例中是第 8 页。创建项时，您应将后缀从 `NEW`\
  \ 重命名为更有意义的名称，但保留前缀。APEX 社区强烈建议使用页码作为项名称的前缀，没有理由不遵循此建议。\n`Type` 属性指定项的类型。默认情况下，类型是\
  \ `Text Field`，但您可以单击选择列表，从 APEX 支持的 22 种不同项类型中选择。\n\n创建项的另一种方法是使用拖放。回想一下，页面设计器有一个库部分，位于其中间面板的\
  \ `Layout` 选项卡底部。该库为每种项类型都有一个图标，如图 5-6 所示。您可以通过将其中一个图标拖到您选择的页面区域来创建新项。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig6_HTML.jpg](img/335103_3_En_5_Fig6_HTML.jpg)\n\
  \n**图 5-6 项库**\n\n每个项还有一个关联的*标签*，即您希望与项一起显示的字符串。此字符串在属性编辑器的 `Label` 部分中指定。例如，图 5-7\
  \ 显示了 `Item Sampler` 页面左上角项的标签规范。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig7_HTML.png](img/335103_3_En_5_Fig7_HTML.png)\n\
  \n**图 5-7 指定项的标签**\n\n图 5-8 显示了项的 `Template` 属性，该属性位于其 `Appearance` 部分。此属性指定标签相对于其项的呈现方式。有七种可能的值。`Hidden`\
  \ 值会隐藏标签，三种 `Optional` 值正常显示标签，三种 `Required` 值会用红色星号格式化标签。关键字 `Above` 指定标签放置在项上方，`Floating`\
  \ 指定标签出现在项内及其值旁边。如果未指定任何关键字，则标签放置在项的左侧。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig8_HTML.png](img/335103_3_En_5_Fig8_HTML.png)\n\
  \n**图 5-8 指定项的外观**\n\n`Item Sampler` 页面中的项大多使用 `Optional` 模板。右列中两个较大的项使用 `Optional-Above`，以节省水平空间。左列顶部标记为\
  \ `Job` 的项使用 `Required` 模板。`Required` 模板的目的是警告用户必须填写此项的值。该项的 `Value Required` 属性（位于其\
  \ `Validation` 部分）强制实施此限制，将在第 8 章讨论。\n要删除项，请在渲染树中右键单击其条目并选择 `Delete` 选项。\n您现在可以创建\
  \ `Item Sampler` 页面的所有 22 个项，将它们放置在具有适当标签的适当区域中。具体来说，`Text-Based Items` 区域有五个项，`Single-Value\
  \ Items` 区域各有三个项，`Multi-Value Items` 区域有四个项，`Yes/No Items` 区域有四个项。\n\n目前，您只需要为每个项指定名称和标签。表\
  \ 5-1 为您列出了这些值。项类型目前还不重要；现在，您应将每个项类型保留为 `Text Field`。创建完项后，您可以随意尝试不同的标签模板。\n\n**表\
  \ 5-1 Item Sampler 页面中的项**\n\n| 区域 | 名称 | 标签 |\n| :--- | :--- | :--- |\n| Text-Based\
  \ Items | `P8_EMPNO` | 员工编号 |\n| | `P8_JOB` | 职位 |\n| | `P8_SALARY` | 薪资 |\n| |\
  \ `P8_HIREDATE` | 入职日期 |\n| | `P8_COLOR` | 喜爱颜色 |\n| Radio Groups | `P8_RADIO_NAME`\
  \ | 部门名称 |\n| | `P8_RADIO_NO` | 部门编号 |\n| | `P8_RADIO_INFO` | 部门信息 |\n| Select Lists\
  \ | `P8_SELECT_NAME` | 部门名称 |\n| | `P8_SELECT_NO` | 部门编号 |\n| | `P8_SELECT_INFO`\
  \ | 部门信息 |\n| Popup Lists | `P8_POPUP_NAME` | 部门名称 |\n| | `P8_POPUP_NO` | 部门编号 |\n\
  | | `P8_POPUP_INFO` | 部门信息 |\n| Multi-Value List Items | `P8_M_SELECT` | 部门 |\n\
  | | `P8_CHECKBOX` | 部门 |\n| | `P8_SHUTTLE` | 部门 |\n| | `P8_LIST` | 部门 |\n| Yes/No\
  \ Items | `P8_YN_SELECT` | 给我发邮件 |\n| | `P8_YN_RADIO` | 给我发邮件 |\n| | `P8_YN_CHECKBOX`\
  \ | 给我发邮件 |\n| | `P8_YN_SWITCH` | 给我发邮件 |\n\n## 定位项\n\n您的下一个任务是将其项定位在其区域内。APEX 以行的形式显示区域的项，位于区域的顶部或底部。区域的\
  \ `Item Display Position` 属性（在区域的 `Appearance` 部分中）可让您指定其项是出现在其内容上方还是下方。此属性对于 `Item\
  \ Sampler` 页面无关紧要，因为其区域没有其他内容，但对于下一章的页面将变得有用。\n项的 `Layout` 部分决定了其在区域内的位置。APEX 在区域内定位项的方式类似于在页面内定位区域的方式。项根据其\
  \ `Sequence` 属性的值从左到右放置到行中，每当其 `Start New Row` 属性被选中时，就移动到新行。区域的宽度被划分为 12 个网格点。每个项（包括其标签，如果显示在项的左侧）有一个起始网格点和一个以网格点为单位的宽度。\n\
  \n## 布局示例\n\n例如，图 5-9 展示了 `P8_EMPNO` 项的 `Layout` 部分。这些值指定了该项将占据区域的前三分之一（以便 `P8_JOB`\
  \ 有足够的空间占据剩余的三分之二）。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig9_HTML.jpg](img/335103_3_En_5_Fig9_HTML.jpg)\n\
  \n图 5-9 在其区域中指定项的位置\n\n当项的标签显示在其左侧时，APEX 需要决定将多少项宽度分配给标签，多少分配给项本身。图 5-9 所示的 `Label\
  \ Column Span` 属性指定了分配给标签的网格点数。默认值通常非常合适。但如果标签过长或需要特殊处理，显式指定标签跨度（或指定 `Floating`\
  \ 或 `Above` 标签模板）可能更好。\n\n现在，你能够将你的 `Item Sampler` 项定位在其区域中了。大多数项可以使用其默认布局属性，唯一的例外是\
  \ `Text-Based Items` 区域中的项。项 `P8_EMPNO` 和 `P8_SALARY` 各自开始一个新行，列跨度为 4；项 `P8_JOB`\
  \ 和 `P8_HIREDATE` 各自开始一个新列。项 `P8_COLOR` 开始一个新行。\n\n你页面上的项现在结构正确，但它们仍然是默认的 `Text\
  \ Field` 类型。这个问题将在接下来处理。\n\n## Text-Based Items\n\n基于文本的项以其输入框为特征，用户可以在其中键入值。APEX\
  \ 提供了多种基于文本的项，其中五种显示在图 5-2 的 `Text-Based Items` 区域中。为了可读性，该区域在图 5-10 中重印。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig10_HTML.jpg](img/335103_3_En_5_Fig10_HTML.jpg)\n\
  \n图 5-10 图 5-2 的 Text-Based Items 区域\n\n以下小节将介绍各种基于文本的项类型及其属性，然后讨论所有基于文本项共有的一些属性。\n\
  \n### Text Fields\n\n`Text Field` 是默认的项类型。它也是最简单的项类型，因为对输入框中可以输入的值没有限制。项的值就是你输入到输入框中的内容。\n\
  \n### Number Fields\n\n项 `P8_EMPNO` 是一个数字字段；它与文本字段的不同之处在于其值只能是数字。数字字段项的 `Settings`\
  \ 部分有几个特定于数字的属性。图 5-11 显示了 `P8_EMPNO` 的这些属性。`Minimum Value` 和 `Maximum Value` 属性允许你以明显的方式限制允许的项值。`Number\
  \ Alignment` 属性允许你指定数字在输入框内的对齐方式。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig11_HTML.jpg](img/335103_3_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11 与数字字段相关的属性\n\n### Password Items\n\n项 `P8_SALARY` 是一个密码字段；它与文本字段的不同之处在于其值不会显示在页面上。输入时，其字符会被圆圈替代，页面渲染时也以这种方式显示。\n\
  \n### Text Fields with Autocomplete\n\n自动完成的文本字段是一个带有相关建议值列表的文本字段。当你在输入框中键入时，页面会显示一个匹配值的菜单。如果你点击一个显示的值，APEX\
  \ 会自动将该值输入到输入框中。例如，项 `P8_JOB` 是一个自动完成的文本字段，其关联列表由五个当前的职位名称组成。当我在框中输入 `a` 时，APEX\
  \ 显示了职位名称 `ANALYST`（因为它是唯一以 `a` 开头的职位）；然后我就可以点击该标题而无需进一步输入。\n\n自动完成字段使用户可以轻松输入最常见的值，但不强制他们从这些值中选择。即使从列表中选择了一个建议值，用户也可以通过继续输入来自由更改该值。\n\
  \n你可以在项的 `List of Values` 部分指定自动完成值列表。图 5-12 显示了 `P8_JOB` 的这个部分。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig12_HTML.jpg](img/335103_3_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12 指定自动完成列表\n\n有两种方式指定该列表。图 5-12 演示了第一种方式，即通过 SQL 查询。查询包含一列，其输出值构成列表。这种表达列表的方式是动态的，因为列表会随着数据库中职位标题的变化而变化。\n\
  \n指定值列表的另一种方式是使用静态值。为此，将图 5-12 中的 `Type` 属性设置为 `Static Values`。属性编辑器随后将显示一个名为 `Static\
  \ Values` 的属性；点击它会弹出一个可以输入值的屏幕。图 5-13 显示了如果我使用静态值指定 `P8_JOB`，该屏幕的样子。`Sort at Runtime`\
  \ 属性指定 APEX 是否应对多个匹配值进行排序呈现。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig13_HTML.jpg](img/335103_3_En_5_Fig13_HTML.jpg)\n\
  \n图 5-13 自动完成列表的静态规范\n\n当值列表是固定且众所周知时，静态规范更可取。例如，在图 5-13 中，静态规范使得 `INTERN` 可以在列表上，即使当前没有具有该职位的员工。\n\
  \n你可能会从第 3 章回忆起，报表列可以具有 `Plain Text (based on List of Values)` 类型，它使用值列表将实际列值转换为其显示值。该值列表也是通过\
  \ SQL 查询在 `List of Values` 属性部分中指定的。该机制类似于如何指定自动完成值。例如，比较图 3-30 和图 5-12；唯一的区别是自动完成\
  \ SQL 查询有一个输出列，而不是两个。\n\n这种相似性解释了为什么图 5-13 中的 `Static Values` 屏幕有一个用于显示值和返回值的列——该屏幕在定义执行转换的值列表时也会用到。值列表的后一种用法将在本章讨论基于列表的项类型时再次出现。\n\
  \n另一个相关的自动补全属性是 `Search`（搜索），它位于 `Settings`（设置）部分。此属性有如图 5-14 所示的四种可能设置。这些设置涵盖了两个问题：用户输入的文本是否区分大小写，以及用户输入的文本是否可以在建议值的任意位置匹配，还是必须从字符串开头匹配。图中显示了\
  \ `P8_JOB` 的设置，它被配置为不区分大小写，并且仅从开头匹配。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig14_HTML.jpg](img/335103_3_En_5_Fig14_HTML.jpg)\n\
  \n图 5-14：自动补全项的可能搜索值\n\n## 颜色选择器\n\n项目 `P8_COLOR` 的类型是 `Color Picker`（颜色选择器）。计算机上的颜色通常由其红、绿、蓝分量值表示，每个分量值的范围是\
  \ 0 到 255。例如，在图 5-10 中，为 `P8_COLOR` 选择的值具有 (`50`, `53`, `235`) 的 (`red`, `green`,\
  \ `blue`) 分量值。该颜色主要是蓝色，带有一点绿色和红色。\n\n这些分量值可以紧凑地表示为一个十六进制数。因为一个两位的十六进制数可以表示 256 个不同的值，所以一个六位数可以表示所有可能的颜色。在图\
  \ 5-10 中，该颜色由数字 `#3235EB` 表示。注意，`32` 是 50 的十六进制值，`35` 是 53 的十六进制值，`EB` 是 235 的十六进制值。\n\
  \nAPEX 颜色选择器项允许您在已知颜色值时直接输入。或者，您可以点击滴管图标从颜色轮中选择所需的颜色，APEX 会在输入框中显示相应的数字值。颜色选择器下方的链接是\
  \ *快速选择*，稍后将进行讨论。\n\n## 日期选择器\n\n项目 `P8_HIREDATE` 的类型是 `Date Picker`（日期选择器）。日期选择器项由一个输入框和一个日历图标组成。与所有基于文本的项一样，用户可以自由地将所需日期输入到输入框中。但用户也可以点击图标调出日历，然后浏览日历选择一个日期，这会使日期的文本表示出现在输入框中。\n\
  \n日期选择器的相关属性出现在其 `Settings`（设置）部分。图 5-15 显示了 `P8_HIREDATE` 的这些值。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig15_HTML.jpg](img/335103_3_En_5_Fig15_HTML.jpg)\n\
  \n图 5-15：与日期选择器项相关的属性\n\n`Highlighted Date`（高亮日期）属性指定日历初始选择的日期；默认情况下是当前日期。`Minimum\
  \ Date`（最小日期）和 `Maximum Date`（最大日期）属性值可以通过多种方式指定。在图 5-15 中，值 `-5y` 和 `+5y` 分别指定\
  \ 5 年前和 5 年后。`Show`（显示）属性允许您配置日历何时显示。日历可以在点击图标时显示（如图 5-10 所示），在鼠标悬停时显示，或始终在页面上显示。\n\
  \n`Navigation List for`（导航列表）属性允许您配置日历以便更快地访问日期。默认情况下，日历只有按钮可以导航到上一个月和下一个月。您可以设置该属性，以便还有直接跳转到指定月份、年份或两者的菜单。最后，`Year\
  \ Range`（年份范围）属性是另一种指定最大和最小日期的方法，您可以在其中给出允许的年份范围。例如，输入值 `2018:2025` 将只允许 2018 至\
  \ 2025 年之间的日期。\n\n## 所有基于文本的项的通用属性\n\n某些属性是所有基于文本的项所共有的，无论其类型如何。其中三个这样的属性是 `Width`（宽度）和\
  \ `Format Mask`（格式掩码）（均在 `Appearance`（外观）部分）以及 `Maximum Length`（最大长度）（在 `Validation`（验证）部分）。图\
  \ 5-16 显示了项目 `P8_HIREDATE` 的这两个部分。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig16_HTML.jpg](img/335103_3_En_5_Fig16_HTML.jpg)\n\
  \n图 5-16：所有基于文本的项的通用属性\n\n`Format Mask`（格式掩码）属性的工作方式与报表中相同。该属性的值是一个描述项值如何显示的表达式。在图\
  \ 5-16 中，`Hire Date`（雇佣日期）项的格式掩码为 `Month DD, YYYY`。\n\n`Width`（宽度）属性以字符为单位指定输入框的大小。`P8_HIREDATE`\
  \ 的宽度为 18，因为这足以容纳所有日期。对于图 5-10 中的其他项，`P8_EMPNO` 和 `P8_SALARY` 的宽度为 6，`P8_JOB` 和\
  \ `P8_COLOR` 的宽度为 10。\n\n`Maximum Length`（最大长度）属性指定用户可以输入到输入框中的最大字符数，而不考虑其宽度。项宽度和最大长度之间的区别如下。用户可以输入一个比输入框宽度更长的值——如果是这样，APEX\
  \ 将在框内滚动该值。但如果用户试图输入一个比最大长度更长的值，那么 APEX 将拒绝接受额外的字符。\n\n例如，在图 5-16 中，`P8_HIREDATE`\
  \ 的 `Width`（宽度）和 `Maximum Length`（最大长度）值相同，这意味着用户无法输入比输入框大小更长的值。再举一个例子，尝试将 `P8_EMPNO`\
  \ 的最大长度设置为 4；您会发现，即使输入框有空间，您也无法输入超过四个数字。\n\n默认情况下，最大长度为空，表示没有上限。一个好的设计规则是为所有基于文本的项指定一个最大长度。在第\
  \ 13 章中，您将看到没有最大长度（或不切实际的大长度）的项如何可能导致严重的安全漏洞。\n\n基于文本的项的另一个通用部分是 `Quick Picks`（快速选择），它使您能够为该项指定常用值。例如，图\
  \ 5-10 中的 `Favorite Color`（喜爱颜色）项有三个快速选择值，显示为该项下方的链接。其文本框中显示的值是我点击 `Royal Blue`（宝蓝）链接的结果。\n\
  \n图 5-17 显示了 `Favorite Color`（喜爱颜色）项的 `Quick Picks`（快速选择）部分。\n\n启用 `Show Quick Picks`（显示快速选择）属性会显示标签/值文本框。请注意，您需要为每个选择指定两个值：链接中显示的值，以及点击链接时输入到文本框中的值。\n\
  \n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig17_HTML.jpg](img/335103_3_En_5_Fig17_HTML.jpg)\n\
  \n图 5-17：指定项的快速选择\n\n\n快速选择项非常实用，因为它们能让用户快速输入项目值。事实上，APEX 界面中的许多项目都包含快速选择功能。例如，图\
  \ 5-16 中的 `CSS Classes` 和 `Format Mask` 属性，其文本框右侧就有一个上下文菜单，图 5-5 中的 `Type` 属性也是如此。点击上下文菜单会显示该项目的快速选择值列表。遗憾的是，尽管\
  \ APEX 界面提供了多种实现快速选择的方式（如上下文菜单或链接），但使用 APEX 开发的应用程序却仅限于一种方式（即显示在项目下方的链接）。\n具有快速选择功能的项目在理念上类似于自动完成项。两者都允许用户通过从建议值中选择来消除（或减少）输入。不同之处在于，自动完成菜单会随着用户的输入进行过滤，而快速选择则是一次性全部呈现给用户。因此，一个项目可以拥有任意多个自动完成值，而\
  \ APEX 将一个项目的快速选择限制为十个。\n\n## 基于列表的项目\n与基于文本的项目不同，基于列表的项目没有输入框。相反，它向用户呈现一个可供选择的可能性列表。此外，用户选择的值不一定是分配给该项目的值。也就是说，该项目向用户展示一个显示值列表；当用户选择一个显示值时，一个对应的返回值会被分配给该项目。\n\
  \n例如，考虑图 5-2 中 `单值列表项` 的三个子区域，这些区域在图 5-18 中重新打印。每个区域专用于三种常见的基于列表的项目类型之一——单选按钮组、选择列表和弹出列表——并且包含三个该类型的项目。虽然从图中无法看出，但这九个项目都具有相同的可能返回值集合，即部门编号集合\
  \ {10, 20, 30, 40}。此外，图中显示的选择使得每个项目的值都相同，即 30。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig18_HTML.jpg](img/335103_3_En_5_Fig18_HTML.jpg)\n\
  **图 5-18** 单值列表项\n\n这九个项目具有相同的功能：用户选择一个部门，相应的部门编号就被分配给该项目。这些项目的区别仅在于其显示值是什么以及如何向用户呈现这些值。\n\
  首先考虑单选按钮组。在单选按钮组中，所有显示值都出现在页面上，用户通过点击来选择所需值。`单选按钮组` 区域中的每个单选按钮组都有不同的显示值：第一个组显示部门名称列表，第二个组显示部门编号列表，第三个组在括号中显示每个部门名称及其员工数量。\n\
  现在考虑选择列表。当用户点击选择列表时，会出现一个显示值菜单。第一个选择列表的显示值与第一个单选按钮组的显示值相同，另外两个选择列表也是如此。\n最后，考虑弹出列表。当用户点击项目右侧的箭头时，会出现一个显示值菜单供用户选择。三个弹出列表的显示值与另外两个区域的相应显示值相同。\n\
  弹出列表与选择列表的不同之处在于它还有一个搜索框。用户可以在搜索框中输入所需值的前缀，然后点击放大镜；显示的值列表将被过滤，只包含具有该前缀的值。弹出列表使得从冗长的值列表中进行选择成为可能，而无需大量滚动。\n\
  单选按钮组项目的 `设置` 部分有一个 `列数` 属性。此属性指定单选按钮在页面上的排列方式。在图 5-18 中，你可以看到第一个单选按钮组有两列，第二个有四列，第三个有一列。\n\
  基于列表的项目最重要的问题是如何指定其显示值和返回值。你可以通过 SQL 查询动态指定这些值，或通过显式值静态指定。图 5-18 中的所有九个项目都是动态指定的，因此我将从这里开始讨论。\n\
  \n## 动态基于列表的项目\n用于指定显示值和返回值之间对应关系的 SQL 查询应有两列：第一列给出显示值，第二列给出返回值。这些列的名称并不重要。\n\n\
  例如，考虑单选按钮组项目 `P8_RADIO_NAME`。它的查询应在第一列中包含部门名称，在第二列中包含部门编号。此外，项目 `P8_SELECT_NAME`\
  \ 和 `P8_POPUP_NAME` 也将具有相同的显示值和返回值。因此，所有三个项目的值都可以通过以下查询指定：\n\n```\nselect DName,\
  \ DeptNo\nfrom DEPT\norder by DName\n```\n\n此查询在项目的 `值列表` 部分中指定。这与图 5-12 中指定自动完成文本项目的值列表的部分相同；唯一的区别是基于列表的项目需要一个两列查询。\n\
  现在你已经准备好配置项目 `P8_RADIO_NAME`、`P8_SELECT_NAME` 和 `P8_POPUP_NAME`。将它们的 `类型` 属性分别设置为\
  \ `单选按钮组`、`选择列表` 和 `弹出列表`，并将它们的 `值列表` 属性设置为前面的 SQL 查询。你还应该将 `P8_RADIO_NAME` 的 `列数`\
  \ 属性设置为 `2`。\n\n\n\n## 基于静态列表的项\n\n现在考虑项 `P8_RADIO_NO`、`P8_SELECT_NO` 和 `P8_POPUP_NO`\
  \ —— 也就是图 5-12 中每个区域的第二项。这些项具有相同的显示值和返回值。这里有趣的情况是显示值和返回值都是部门编号。如果你用直接的方式编写它们的 SQL\
  \ 查询，那么两个输出列的名称将会相同，这在 SQL 中是非法的。为了使查询合法，你需要至少重命名其中一个列。查询应该类似于这样：\n\n```sql\nselect\
  \ DeptNo as DisplayVal, DeptNo as ReturnVal\nfrom DEPT\norder by DisplayVal\n```\n\
  \n**注意**\n\n列的名称可以是任何名称；SQL 只要求它们彼此不同。\n\n你应该类似地配置项 `P8_RADIO_NO`、`P8_SELECT_NO`\
  \ 和 `P8_POPUP_NO`，方式与前三个项相同。将它们的 `Type` 属性分别设置为 `Radio Group`、`Select List` 和 `Popup\
  \ List`，并将它们的 `List of Values` 属性设置为前面的 SQL 查询。你还应该将 `P8_RADIO_NO` 的 `Number of\
  \ Columns` 属性设置为 `4`。\n\n项 `P8_RADIO_INFO`、`P8_SELECT_INFO` 和 `P8_POPUP_INFO` 的处理方式类似。它们的属性值与前几个项相同，只是查询不同。下面是该查询，它展示了如何创建复杂的显示值：\n\
  \n```sql\nselect d.DName || ' (' || count(e.EmpNo) || ' employees)' as Display,\n\
  d.DeptNo as ReturnVal\nfrom DEPT d left join EMP e on d.DeptNo = e.DeptNo\ngroup\
  \ by d.DeptNo, d.DName\norder by Display\n```\n\n查询中的左连接确保所有部门都被包含在内，即使是那些没有员工的部门。\n\
  \n## 多值列表项\n\n当你使用查询来指定基于列表的项的值时，APEX 会在每次渲染页面时执行该查询。如果查询的输出永远不会改变，那么你可以使用静态表达式来避免数据库调用。\n\
  \n你指定静态表达式的方式与类型为 `Text Value with Autocomplete` 的项相同：首先，将 `List of Values` 部分中的\
  \ `Type` 属性设置为 `Static Values`；然后点击 `Static Values` 属性以调出“静态值”屏幕。接着，你可以为列表的每个成员输入显示值和返回值。图\
  \ 5-19 展示了我如何为 `P8_RADIO_NAME`、`P8_SELECT_NAME` 和 `P8_POPUP_NAME` 填写值。\n\n![Figure\
  \ 5-19](img/335103_3_En_5_Fig19_HTML.jpg)\n*图 5-19: 基于列表项的静态值*\n\n基于列表的项只允许用户从其列表中选择一个值。多值列表项则允许用户从其列表中选择多个值。图\
  \ 5-2 中的 `Multi-Value List Items` 区域包含四种类型的多值项，为清晰起见，该区域在图 5-20 中重新打印。此区域中的每个项都选择了其\
  \ `operations` 和 `sales` 部门。\n\n![Figure 5-20](img/335103_3_En_5_Fig20_HTML.jpg)\n\
  *图 5-20: 多值列表项*\n\n多值列表项的配置方式与单值项相同。特别是，它们使用 SQL 查询或静态表达式来指明其显示值和返回值。例如，该区域中四个项的\
  \ SQL 查询是：\n\n```sql\nselect DName, DeptNo\nfrom DEPT\norder by DName\n```\n\n主要问题是如何为一个选择了多个显示值的项分配单个返回值。APEX\
  \ 使用约定：多值项的值是一个字符串，由所选的返回值用冒号分隔组成。如果没有选择显示值，则该项的值为 `null`。例如，图 5-20 中的所有项的值都是 `40:30`。\n\
  \n让我们看看这四种项类型。第一个项 `P8_M_SELECT` 是一个选择列表；也就是说，与 `Single-Value List` 区域中的项类型相同。要指定该项为多值选择列表，你需要将其\
  \ `Settings` 部分中的 `Allow Multi Selection` 属性设置为 `Yes`。其 `Appearance` 部分中的 `Height`\
  \ 属性的值决定了显示多少行菜单。所有其他属性的配置方式相同。\n\n请注意，多值选择列表 `P8_M_SELECT` 的外观和行为与单值选择列表 `P8_SELECT_NAME`\
  \ 不同。多值列表始终在页面上显示菜单，而不是按需显示。（并且如果列表中的项目多于页面上可以显示的数量，会出现滚动条，以便用户滚动浏览这些值。）用户可以通过按住\
  \ Control 或 Command 键（取决于操作系统）并点击来从多值列表中选择其他菜单项。\n\n该区域中的第二个项 `P8_CHECKBOX` 是一个复选框组。复选框组的配置与单选按钮组完全相同。复选框组与单选按钮组的不同之处在于可以选择多个复选框，并且点击一个框会切换其值。\n\
  \n第三个项 `P8_SHUTTLE` 是一个穿梭列表，它与多值选择列表非常相似，配置方式也相同。它们之间的区别是，多值选择列表通过高亮显示来表示选定的值，而穿梭列表则有单独的菜单来显示已选定和未选定的值。\n\
  \n第四个项 `P8_LIST` 是一个列表管理器，它是自动完成文本框和弹出列表的交叉产物。与自动完成类似，用户可以在输入框中输入任何值，然后点击 `Add`\
  \ 按钮将其添加到选定值列表中。或者，用户可以点击弹出箭头以调出一个值菜单进行选择，选中的值会被添加到输入框中。然而，重要的是要注意，虽然弹出列表显示的是显示值，但它将返回值放入输入框。因此，图\
  \ 5-20 显示选择了部门编号 `30` 和 `40`，尽管弹出列表显示的是部门名称。\n\n## 是/否项\n\n网页经常需要向用户请求是/否信息。图 5-2\
  \ 中的 `Yes/No Items` 区域展示了执行此任务的四种不同方法，为清晰起见，该区域在图 5-21 中重新打印。该区域包含四个基于列表的项，每个都表示用户希望被联系。\n\
  \n![Figure 5-21](img/335103_3_En_5_Fig21_HTML.jpg)\n*图 5-21: 是/否项*\n\n第一个项名为 `P8_YN_SELECT`，类型为\
  \ `Select List`，第二个项名为 `P8_YN_RADIO`，类型为 `Radio Group`。它们具有相同的值列表，即 {`No`, `Yes`}，并且它们的显示值与返回值相同。图\
  \ 5-22 展示了它们的 `Static Values` 屏幕。请注意，当返回值与显示值相同时，你无需指定返回值。\n\n![Figure 5-22](img/335103_3_En_5_Fig22_HTML.jpg)\n\
  *图 5-22: 是/否选择列表和单选按钮的静态值*\n\n\n第三个项目`P8_YN_CHECKBOX`，其类型为`Checkbox`。图 5-23 显示了其`静态值`屏幕。它包含一个条目，其显示值为空格，返回值为`Yes`。因此，如果选中该框，项目的值即为`Yes`；如果未选中（与所有多值项目一样），其值则为`null`。\n\
  \n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig23_HTML.jpg](img/335103_3_En_5_Fig23_HTML.jpg)\n\
  \n图 5-23\n是/否复选框的静态值\n\n第四个项目`P8_YN_SWITCH`，其类型为`Switch`。它不需要配置。默认情况下，它没有显示值，但有两个预定义的返回值：如果开关打开则为`Y`，如果关闭则为`N`。\n\
  \n## 基于显示的项目\n\n还有另外两种有用的项目类型未出现在`项目示例器`页面中：`仅显示`项目和`隐藏`项目。这些项目与你已见过的其他项目不同，因为用户无法为它们赋值；它们的值只能由\
  \ APEX 服务器分配。一个仅显示的项目有一个标签和一个文本值，类似于文本字段；不同之处在于该值不在输入框中且不可编辑。例如，再次参考图 5-1；标有`模式`和`表`的字段就是仅显示的。隐藏项目不可见，用户不知道它们的存在。它们通常用于保存操作的值，以便另一个操作可以使用它。你将在第\
  \ 6 章中看到此技术的示例。\n\n## 项目的初始值\n\n当 APEX 渲染一个页面时，它会为页面上的每个项目分配一个初始值。如果项目是基于文本的，APEX\
  \ 会将该值放入该项目的输入框中；如果项目是基于列表的，APEX 会使用该值来确定相应的初始显示值。APEX 通过两种方式之一确定此初始值：它可以计算项目的`源表达式`，或者可以使用先前存储在会话状态中的值。由于尚未介绍会话状态的概念，现在假设会话状态值始终为`null`。\n\
  \n你在属性编辑器的`源`部分指定项目的源表达式。图 5-24 显示了此部分的两个重要属性`类型`和`用法`，以及它们的默认值。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig24_HTML.jpg](img/335103_3_En_5_Fig24_HTML.jpg)\n\
  \n图 5-24\n项目的源属性\n\n`类型`属性指定了源表达式的类型；图 5-24 显示了所有可能的源类型。三个常见的选择是`Null`（默认值）、`静态值`和`SQL\
  \ 查询（返回单个值）`。选择`Null`以外的类型将导致属性编辑器显示一个用于输入源表达式的区域。`用法`属性指定了源表达式适用的时间。默认选择（如图 5-24\
  \ 所示）是：如果会话状态不为`null`则使用它，否则使用源表达式。另一个选择（图中未显示）是始终使用源表达式。这些选择将在第 6 章中讨论。\n\n如果你使用\
  \ SQL 查询作为源类型，则该查询必须返回单行单列；项目的初始值即为该查询返回的值。例如，再次考虑`项目示例器`页面的基于文本的项目，如图 5-10 所示。假设你希望`P8_EMPNO`的初始值是总裁的员工编号。你可以将其源类型设置为`SQL\
  \ 查询（返回单个值）`，并将其源查询设置为以下查询：\n\n```sql\nselect EmpNo\nfrom EMP\nwhere Job = 'PRESIDENT'\n\
  ```\n\n再举一个例子，假设你希望图 5-18 中每个项目的初始值是按字母顺序排列的第一个部门（如果有多个部门名称相同，则使用部门编号最小的来打破平局）。你可以为每个项目分配以下源表达式：\n\
  \n```sql\nselect min(DeptNo)\nfrom DEPT\nwhere DName in (select min(DName) from\
  \ DEPT)\n```\n\n类型为`静态值`的源表达式通常是一个常量。例如，假设你希望图 5-18 中项目的初始值是销售部门。只需将每个项目的源表达式设置为`30`。如果你希望图\
  \ 5-20 中多值列表项目的初始值同时是运营部和销售部，请将这些项目的源表达式设置为`30:40`。列表类项目出现的一个问题是它们应如何响应不是其指定返回值之一的初始值。例如，假设你分配静态值`85`作为列表值项目的源。由于没有编号为\
  \ 85 的部门，项目应显示什么？有两种选择：接受该值并（临时）将其添加到列表中，或者拒绝该值并显示列表中的一个任意值。此选择由`值列表`部分中的`显示额外值`属性指定，如图\
  \ 5-12 所示。在大多数情况下，显示一个不是有效可选选项的值是没有意义的，因此通常应关闭`显示额外值`。\n\n## 按钮\n\n按钮在点击时执行一个`操作`。APEX\
  \ 按钮有两种基本操作：它可以`重定向`或`提交`。`重定向`一词简单地意味着转到另一个网页。在这方面，按钮的作用类似于 HTML 链接。`提交`一词意味着让\
  \ Web 服务器处理当前页面。此处理可以涉及设置会话状态和在数据库上执行操作，以及移动到另一个页面。第 6 章到第 10 章将详细涵盖重定向和提交操作的用途。作为一个例子，让我们看看如何在`项目示例器`页面的`一些按钮`区域添加两个按钮：一个操作是`重定向到页面\
  \ 8`的`取消`按钮和一个操作是`提交`的`提交`按钮。\n\n在区域中创建按钮有两种方式。第一种方式是右键单击渲染树中区域的节点并选择`创建按钮`操作。或者，你可以将页面设计器库中的按钮图标拖放到区域中（类似于拖放项目的方式）。无论哪种情况，APEX\
  \ 都将在其区域节点下名为`区域按钮`的子树中为按钮创建一个节点。图 5-25 显示了创建两个按钮后`项目示例器`的渲染树。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig25_HTML.jpg](img/335103_3_En_5_Fig25_HTML.jpg)\n\
  \n图 5-25\n向渲染树添加按钮\n\n要配置按钮，你需要指定四项内容：其名称、标签、操作和位置。按钮的名称和标签在`标识`部分指定；参见图 5-26。按钮的名称是\
  \ APEX 用于标识按钮的内部值，不能包含空格。按钮的标签是任意的 HTML 字符串，在页面渲染时随按钮一起显示。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig26_HTML.jpg](img/335103_3_En_5_Fig26_HTML.jpg)\n\
  \n图 5-26\n标识按钮\n\n\n## 按钮行为与位置\n\n按钮的动作在其 `Behavior` 部分中指定。`Action` 属性有五个可能的值，如图\
  \ 5-27 所示。最常见的选项是 `Submit Page` 和 `Redirect to Page in this Application`。适用于重定向动作的\
  \ `Target` 属性允许您指定目标页面。\n\n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig27_HTML.jpg](img/335103_3_En_5_Fig27_HTML.jpg)\n\
  *图 5-27：可能的按钮动作*\n\n按钮的位置由 `Layout` 部分中的 `Button Position` 属性决定。图 5-28 显示了可能的值。\n\
  \n![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig28_HTML.jpg](img/335103_3_En_5_Fig28_HTML.jpg)\n\
  *图 5-28：可能的按钮位置*\n\n尽管有多种可能的位置，但它们可分为四个基本类别：\n\n*   在区域的标题中\n*   在区域的顶部或底部\n*  \
  \ 在区域的预定义位置\n*   在区域体中\n\n值 `Left of Title` 和 `Right of Title` 将按钮放置在区域的标题中，位于标题的左侧或右侧。如果多个按钮位于同一位置，它们的相对位置由它们的序号决定。\n\
  \n值 `Top of Region`、`Top and Bottom of Region`、`Above Region`、`Below Region` 和 `Bottom\
  \ of Region` 将按钮显示在区域的顶部或底部。当您选择这些值之一时，属性编辑器会显示 `Horizontal Alignment` 属性，该属性允许您指定按钮应出现在区域的左侧还是右侧。图\
  \ 5-2 中的按钮位于区域顶部，并向右对齐。\n\n许多页面模板为某些按钮指定了特殊位置。其目的是确保跨多个区域通用的按钮位于这些区域中的相同位置。按钮位置\
  \ `Copy`、`Edit`、`Previous`、`Next`、`Close`、`Help`、`Delete`、`Change` 和 `Create` 对应于这些特殊用途的按钮，尽管您可以自由地将它们用于任何按钮。特别值得注意的是\
  \ `Copy` 和 `Edit` 位置，它们将按钮显示在标题的最右侧。\n\n`Region Body` 位置与其他位置不同，因为它将按钮放置在区域的项目之中。当您选择此值时，会出现一个\
  \ `Layout` 部分，供您指定按钮相对于区域中其他项目的位置。此外，按钮在渲染树中的节点会出现在区域项目的子树中。\n\n图 5-2 中的两个按钮颜色不同：`Cancel`\
  \ 按钮与页面项目具有相同的颜色方案，而 `Submit` 按钮是蓝色的。`Submit` 按钮的颜色旨在吸引用户的注意；APEX 称其为 *热按钮*。按钮的\
  \ `Appearance` 部分有一个名为 `Hot` 的属性，可让您指定按钮是否为热按钮。图 5-29 显示了 `Submit` 按钮的这个部分。\n\n\
  ![../images/335103_3_En_5_Chapter/335103_3_En_5_Fig29_HTML.jpg](img/335103_3_En_5_Fig29_HTML.jpg)\n\
  *图 5-29：指定热按钮*\n\n## 总结：项目\n\n项目是保存值的页面元素。有许多项目类型，它们在页面上显示值的方式以及帮助用户指定该值的方式上有所不同。最重要的是区分基于文本的项目和基于列表的项目。\n\
  \n基于文本的项目在其输入框中显示其值，用户可以通过在输入框中键入来指定值。基于文本的项目类型支持输入特殊值（如颜色和日期）、辅助数据输入（如自动完成）以及限制允许的值（如数字字段）。\n\
  \n基于列表的项目强制用户从给定的值列表中选择。该列表可以通过 SQL 查询动态定义，也可以通过显式值静态定义。在任何情况下，都存在显示值（呈现给用户的值）和返回值（项目实际持有的值）之间的区别。各种基于列表的项目类型主要区别在于它们如何在页面上呈现显示值。\n\
  \n项目的目的是允许用户向服务器发送一个值。第 6 章将研究这个问题，并提供展示项目在 Web 应用程序中典型用法的示例。\n\n## 会话状态\n\n用户与应用程序的交互称为\
  \ *会话*。一个会话可以包含多个页面请求。例如，在电子商务应用程序中，一个会话可能涉及浏览待售商品、将其中一些添加到购物车、输入付款和运输信息以及完成交易。\n\
  \n在会话期间，用户为页面项目赋值，可能涉及多个页面，并将这些值发送到服务器进行处理。给定会话的项目值构成其 *会话状态*。在本章中，您将研究应用程序可以修改和访问会话状态的各种方式，并了解一些利用此状态的常见页面设计技术。\n\
  \n## 会话 ID\n\n在 Web 应用程序中构建会话功能是有问题的，因为浏览器请求是匿名的。服务器没有内置方法来知道两个浏览器请求是否属于同一个会话。APEX\
  \ 通过为每个会话分配一个标识符来解决此问题。浏览器请求通过将会话 ID 添加到请求中来指示其会话。\n\n回想一下，APEX URL 由字符串 `f?p=`\
  \ 后跟冒号分隔的值字符串组成。前两个值是应用程序 ID 和页面 ID；第三个值是会话 ID。要查看实际操作中的会话 ID，请登录 APEX 并浏览其屏幕。查看与您访问的每个屏幕关联的\
  \ URL。您应该会发现每个 URL 都具有相同的会话 ID 值。现在从 APEX 注销。当您重新登录时，APEX 将为此次交互分配一个新的会话 ID。您访问的每个屏幕的\
  \ URL 现在都将具有这个新的会话 ID。\n\n您也可以在您自己的应用程序中观察会话 ID。从 APEX 注销并运行您的 `Employee Demo` 应用程序。APEX\
  \ 将分配一个会话 ID，该 ID 将出现在每个页面的 URL 中。您可以通过提交会话 ID 为 0 的请求来请求新的会话。（实际上，任何随机 ID 值都可以。）例如，我可以通过提交以下\
  \ URL 在新会话中查看我的应用程序的主页：\n\n```\napex.oracle.com/pls/apex/f?p=91392:1:0\n```\n\n\
  当页面加载时，URL 将包含一个新的会话 ID。\n\n\n\n## 提交与重定向\n\n假设你修改了网页上某个项目的值，可能是通过选择单选按钮或在文本字段中输入。你的浏览器知道如何直接显示这一更改，而无需请求服务器重新渲染页面。因此，服务器将对你对该值所做的更改一无所知，从而无法使用新值。\n\
  \n如果你希望应用程序知道页面上各项的值，你必须先将这些值上传到服务器。此操作称为 `提交`。服务器为你的应用程序的每个项目都持有一个变量。当你提交页面时，该页面上每个项目的值都会保存在对应的变量中。实际上，提交操作将会话状态与当前页面同步。\n\
  \n回顾一下，按钮的操作要么是 `提交`，要么是 `重定向`。这两种操作都会导致 APEX 服务器渲染一个目标页面并将其发送到浏览器。对于重定向，你在重定向操作中指定目标页面。对于提交，你通过单独的\
  \ `分支` 组件指定目标页面——如果未指定分支，则重新加载当前页面。分支在第 9 章中讨论，因此目前你可以假设提交操作总是重新加载当前页面。\n\n提交和重定向的主要区别在于，提交会将页面的项目值上传到服务器，而重定向不会。如果用户更改了页面上某些项目的值，然后执行重定向，这些更改将会丢失——即使重定向到的是同一个页面。\n\
  \n为了看到这种差异的示例，考虑第 5 章中的 `项目采样器` 演示页面，如图 5-2 所示。回顾第 5 章，项目的初始值由其 `源` 属性决定。默认是使用会话状态值（如果它不为空）。这意味着如果你为项目分配一个非空值并提交，那么当页面重新加载时，该值将成为该项目的初始值。你可以通过更改页面上的一些值并点击\
  \ `取消` 按钮来验证这一事实。因为该按钮执行的是重定向，你的更改会丢失。现在再次修改这些值并点击 `提交` 按钮。项目值保持选择后的状态，因为提交操作将这些更改写入了会话状态，并在页面重新加载时检索了它们。如果你导航到不同的页面再返回，这些值仍然会存在。\n\
  \n回顾一下，当你在 APEX 中运行页面时，开发者工具栏会出现在屏幕底部。标记为 `会话` 的工具栏按钮显示当前的会话状态。点击它会打开一个窗口，显示所有项目及其当前的会话值。在调试页面时，这个窗口非常有用。在示例中，打开会话窗口并查看会话状态。然后更改一些项目并提交。再次打开会话窗口，验证项目值是否已更改。\n\
  \n重要的是要理解，指定项目的初始值会影响浏览器中的项目值，但绝不会改变其在会话状态中的值。你可以在 `项目采样器` 页面上进行一些实验来验证这一事实。转到属性编辑器，将项目\
  \ `P8_JOB` 的源设置为静态表达式 `CLERK`，并将其使用设置为 `始终，替换会话状态中的任何现有值`。运行页面，将项目的值更改为 `ANALYST`，然后点击\
  \ `提交` 按钮，检查每一步的会话状态。会话状态值在页面提交之前一直保持空白，在提交时变为 `ANALYST`。然而，当页面渲染时，浏览器会显示 `CLERK`。现在回到属性编辑器，将该项目的\
  \ `源使用` 属性更改为 `仅当会话状态中的当前值为空时` 并重复实验。（首先将项目值设为空白并点击 `提交` 按钮以清除会话状态。）你应该观察到会话状态值的行为与之前相同。然而，浏览器会显示\
  \ `CLERK`，直到你提交一个新值，之后它将显示该值。\n\n## 使用项目提交页面\n\n提交页面的主要方式是使用按钮。然而，某些项目类型也可以执行提交。文本字段或密码字段的\
  \ `设置` 部分有一个属性 `按下回车键时提交`。启用此属性会使该项目在用户按下 `Enter` 键时提交页面。\n\n选择列表或单选按钮组的 `设置` 部分有一个属性\
  \ `选择时的页面操作`。该属性在图 6-1 中针对选择列表显示。该属性的默认值是 `无`。如果你将其设置为 `提交页面`，则每当用户更改项目值时，页面都会被提交。\n\
  \n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig1_HTML.jpg](img/335103_3_En_6_Fig1_HTML.jpg)\n\
  \n*图 6-1 选择列表可能的操作*\n\n该图还显示了此属性的另外三个值。这些值对应于不同形式的重定向。`重定向并设置值` 选项将该项目的值保存在会话状态中，然后重定向到同一页面。也就是说，它的行为类似提交，但仅针对一个项目，而不是页面上的所有项目。\n\
  \n`重定向到页面` 和 `重定向到 URL` 选项具有不同的意图。`重定向到页面` 操作使项目充当导航列表——其值被解释为页码，选择一个值会导致 APEX 重定向到该页面。例如，考虑一个选择列表，其静态值如图\
  \ 6-2 所示，且其操作为 `重定向到页面`。该项目显示三个选项（`主页`、`员工报告`、`图表`）；选择一个选项会重定向到相应的页码。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig2_HTML.jpg](img/335103_3_En_6_Fig2_HTML.jpg)\n\
  \n*图 6-2 用于重定向到页面操作的静态值*\n\n`重定向到 URL` 选项类似，只是项目值被假定为 URL。这两个选项都不会改变会话状态。\n\n##\
  \ 重定向可以设置会话状态\n\n考虑一个按钮的重定向操作。尽管该操作不提交页面，但它仍然可以修改会话状态。\n\n当你将按钮的操作设置为 `重定向到此应用程序中的页面`\
  \ 时，属性编辑器中会出现 `目标` 属性。点击该属性的输入框会弹出图 6-3 所示的 `链接构建器` 向导页面。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig3_HTML.jpg](img/335103_3_En_6_Fig3_HTML.jpg)\n\
  \n*图 6-3 链接构建器向导页面*\n\n除了将 `页面` 属性设置为所需的目标外，你还可以使用 `设置项目` 部分来设置任意多个项目的值。在 `名称` 框中输入项目名称，在\
  \ `值` 框中输入其所需的会话状态值。每次你填完一行，就会出现另一行，从而允许你输入任意多的名称/值对。\n\n例如，再次考虑图 5-2 的 `项目采样器`\
  \ 页面。假设你希望 `取消` 按钮将项目 `P8_EMPNO` 的值设置为 `9999`，将 `P8_JOB` 的值设置为 `CLERK`，并清除 `P8_SALARY`\
  \ 中的值。那么链接构建器的 `设置项目` 部分将如图 6-4 所示。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig4_HTML.jpg](img/335103_3_En_6_Fig4_HTML.jpg)\n\
  \n*图 6-4 在重定向时指定项目值*\n\n\n\n假设你希望 `取消` 按钮能清除页面上所有项目的会话状态。APEX 将此称为 `清除缓存`，并在链接构建器中提供了\
  \ `清除缓存` 属性来实现此功能。例如，在图 6-3 中，向 `清除缓存` 输入框键入 `3,4,8` 将清除第 3、4 和 8 页上所有项目的会话状态。如果你还在\
  \ `设置项目` 部分指定了项目，APEX 将在清除缓存后为这些项目赋值。\n\n请注意，这种修改会话状态的方式与提交操作完全不同，因为它不（且不能）使用浏览器中显示的值。也就是说，来自按钮的重定向可以将项目的会话状态值设置为常量或计算值，但无法将其设置为用户输入的浏览器值。\n\
  \n### 引用会话状态变量\n\n既然你已了解如何设置会话状态变量的值，接下来需要知道如何让页面访问该值。主要有两种技术。如果你想在 SQL 代码中引用该变量，请在项目名称前加上冒号。这种引用称为\
  \ `绑定变量`。如果你想在 HTML 表达式中引用项目，请在项目名称前加上 `&` 符号，并在末尾加上句点。后一种引用称为 `替换字符串`，已在第 3 章介绍过。\n\
  \n例如，考虑 `Item Sampler` 页面上的项目 `P8_EMPNO`。要将其作为替换字符串引用，请写作 `&P8_EMPNO.`。要将其作为绑定变量引用，请写作\
  \ `:P8_EMPNO`。\n\n在本书中，你已经看到了 SQL 查询的几种用途，例如作为报表或图表的源、项目的初始值，以及基于列表的项目的值定义。你也看到了\
  \ HTML 表达式的几种用途，例如页面或区域的标题，以及项目的标签。本章剩余部分将举例说明如何通过在这些 SQL 查询和 HTML 表达式中使用项目引用，来极大增强页面的功能。\n\
  \n在构建本章的任何页面之前，你可能需要转到 `桌面导航菜单` 的 `列表详情` 页面（如图 4-21 所示），并添加一个名为 `会话状态` 的根条目。然后，每次创建页面时，你都可以将其导航菜单条目的父项设置为\
  \ `会话状态`。\n\n## 自定义报表\n\n`自定义报表` 是其内容受一个或多个项目值影响的报表。用户在页面上为某些项目输入值并点击 `提交` 按钮。然后，页面将根据这些输入值显示一个报表。在本节中，你将构建三个自定义报表页面来阐述此技术。\n\
  \n### 按职位和部门筛选页面\n\n第一个页面名为 `按职位和部门筛选`，是演示应用的第 9 页，见图 6-5。其思路是用户为 `职位` 和 `部门` 项目选择值，然后点击\
  \ `提交` 按钮。随后，报表将显示具有所选职位且属于所选部门的员工。例如，图 6-5 显示了研究部门中的办事员。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig5_HTML.jpg](img/335103_3_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5 按职位和部门筛选页面\n\n此页面有两个区域：`选择值` 和 `匹配的员工`。`选择值` 区域是一个静态内容区域，包含两个选择列表 `P9_JOB`\
  \ 和 `P9_DEPTNO`，它们的值都由 SQL 查询定义。`P9_JOB` 的值列表查询如下：\n\n```sql\nselect distinct Job\
  \ as DisplayVal, Job as ResultVal\nfrom EMP\norder by DisplayVal\n```\n\n`P9_DEPTNO`\
  \ 的值列表查询如下：\n\n```sql\nselect DName, DeptNo\nfrom DEPT\norder by DName\n```\n\n\
  按钮的操作是 `提交`，其位置为 `编辑`。\n\n`匹配的员工` 区域是一个报表区域。为了让报表显示具有所选职位和部门编号的 `EMP` 记录，其源查询需要引用两个项目的值。以下查询实现了这一点；请注意它如何使用绑定变量语法来引用这两个项目。\n\
  \n```sql\nselect EmpNo, EName, Job, Sal, DeptNo\nfrom EMP\nwhere Job = :P9_JOB \
  \ and  DeptNo = :P9_DEPTNO\norder by EName\n```\n\n你可以通过允许用户为 `P9_JOB` 或 `P9_DEPTNO`\
  \ 选择 `空` 值来增强此区域的功能。意图是，`P9_JOB`（或 `P9_DEPTNO`）的 `空` 值应表示查询不会使用该项目进行筛选。例如，如果两个项目都是\
  \ `空`，报表将显示所有员工。要实现此功能，请修改源查询以显式测试 `空` 项目值，如下所示：\n\n```sql\nselect EmpNo, EName,\
  \ Job, Sal, DeptNo\nfrom EMP\nwhere (:P9_JOB is null  or  Job = :P9_JOB)\nand  \
  \ (:P9_DEPTNO is null  or  DeptNo = :P9_DEPTNO)\norder by EName\n```\n\n我想指出，此页面并非必须使用两个区域。事实上，很容易修改此页面以使用单个区域。首先，转到项目\
  \ `P9_JOB` 的 `布局` 部分，将其 `区域` 属性更改为 `匹配的员工`。然后对 `P9_DEPTNO` 和 `提交` 按钮执行相同操作。最后，转到\
  \ `匹配的员工` 的 `外观` 部分，将其 `项目显示位置` 属性设置为 `内容上方`，以便这两个项目显示在报表上方。（你也可以根据需要删除 `选择值` 区域。）现在运行该页面。你会发现其行为没有改变。也就是说，使用一个还是两个（甚至三个！）区域的决定纯粹基于美观。\n\
  \n### 按可能部门筛选页面\n\n第二个自定义报表页面名为 `按可能部门筛选`，是演示应用的第 10 页，见图 6-6。此页面的结构与上一个类似。顶部区域用于输入——用户从一个复选框项目中选择部门，然后点击\
  \ `提交` 按钮。底部区域显示所选部门中员工的报表。例如，在图 6-6 中，`会计` 和 `研究` 框被选中，这意味着报表列出了会计或研究部门的员工。如果没有选中任何框，报表将不显示任何记录。\n\
  \n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig6_HTML.jpg](img/335103_3_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6 按可能部门筛选页面\n\n`选择一些部门` 区域是一个静态内容区域，包含一个复选框项目和一个按钮。复选框项目名为 `P10_DEPTNO`，其模板是\
  \ `隐藏`，其值由查询定义：\n\n```sql\nselect DName, DeptNo\nfrom DEPT\norder by DName\n```\n\
  \n回想一下，多值项目的值是一个字符串，其中包含用冒号分隔的所选复选框值。例如，在图 6-5 中，`P10_DEPTNO` 的值是 `10:30`。如果选中所有四个部门，值将为\
  \ `10:40:20:30`。（字符串中所选值的顺序基于项目值列表查询的排序顺序，在本例中是按部门名称排序。）\n\n`匹配的员工` 区域是一个经典报表。任务是为报表设计一个源查询，该查询将根据此项目值筛选记录。一种方法是测试每条\
  \ `EMP` 记录，看其 `DeptNo` 值是否是 `P10_DEPTNO` 的子字符串。这种方法会产生以下查询，它几乎可以工作：\n\n```sql\n\
  select EmpNo, EName, Job, Sal, DeptNo\nfrom EMP\nwhere InStr(:P10_DEPTNO,  DeptNo)\
  \ > 0\norder by EName\n```\n\n\n\n## 按薪资范围筛选页面\n\n第三个定制的报表页面名为 `Filter by Salary\
  \ Range`，在演示应用中是第 11 页，如图 6-7 所示。用户输入最低和最高薪资值，然后点击 `Submit` 按钮。页面随后会为指定薪资范围内的员工定制一个按职位分类的员工图表。\n\
  \n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig7_HTML.jpg](img/335103_3_En_6_Fig7_HTML.jpg)\n\
  \n图 6-7 “按薪资范围筛选”页面\n\n该页面包含一个类型为 `chart` 的区域。该区域的 `Item Display Position` 属性（在其\
  \ `Appearance` 部分中）值为 `Above Contents`，这就是为什么两个项目项和 `Submit` 按钮位于图表上方。这两个名为 `P11_MINSAL`\
  \ 和 `P11_MAXSAL` 的项目项是数字字段，其 `Width` 值为 `5`。按钮的位置是 `Edit`。\n\n当然，此页面定制的是图表而非报表，但技术完全相同。回顾第\
  \ 3 章，该图表的源查询将有两个输出列：一个标签（此处为 `Job` 的值）和一个系列值（此处为该职位的记录数）。要定制图表以仅考虑指定薪资范围内的员工，只需将该限制添加到查询的\
  \ `where` 子句中。源查询变为：\n\n```\nselect Job, count(*) as EmpCount\nfrom EMP\nwhere (:P11_MINSAL\
  \ is null  or  :P11_MINSAL = Sal)\ngroup by Job\norder by EmpCount\n```\n\n与“按职位和部门筛选”页面一样，此查询确保\
  \ `null` 项目项值不会参与筛选。您也应该清楚，如果您决定将两个项目项和按钮移到单独的区域中，图表的源查询将是相同的。如果不清楚，可以尝试一下看看效果。\n\
  \n## 主从报表\n\n主从报表由两份报表组成。这两份报表是*链接*的，意味着明细报表的每一行在主报表中都有关联行。用户通过选择主报表中的一行来进行交互；明细报表则通过仅显示与所选主记录关联的明细行来响应。\n\
  \n在本节中，您将构建一个名为 `Employees by Department` 的主从页面，它是 `Employee Demo` 应用程序的第 12 页。其主报表包含每个部门的一行。单击某个部门行会导致明细报表显示该部门的员工列表。图\
  \ 6-8 显示了单击会计部门链接后的页面。\n\n\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig8_HTML.jpg](img/335103_3_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8\n按部门查看员工页面\n\n思考如何实现此页面。主要问题在于，主报表需要让明细报表知道选择了哪一行。标准技术是使用一个隐藏项，其值就是所选行的键值。我们将此项命名为\
  \ `P12_DEPTNO`。主报表会将选中行的 `DeptNo` 值赋给 `P12_DEPTNO`。然后明细报表将使用此值来自行定制显示内容。\n\n实现定制的明细报表很直接，其源查询如下：\n\
  \n```\nselect EmpNo, EName, Job, Sal\nfrom EMP\nwhere DeptNo = :P12_DEPTNO\norder\
  \ by EName\n```\n\n难点在于实现主报表。你需要回答三个问题：报表的源查询是什么？如何让它的第四列显示一个链接？以及如何将合适的值赋给 `P12_DEPTNO`？\n\
  \n主报表有四列。前三列是部门名称、位置和员工数；第四列包含指向明细表的链接。由于链接的目的是选择一个部门编号，因此该列的值为 `DeptNo` 是合理的。因此，你有以下源查询（这是一个右连接，以便主报表能显示没有员工的部门）：\n\
  \n```\nselect d.DName, d.Loc, count(e.EmpNo) as EmpCount, d.DeptNo\nfrom EMP e right\
  \ join DEPT d\non  e.DeptNo = d.DeptNo\ngroup by d.DeptNo, d.DName, d.Loc\norder\
  \ by DName\n```\n\n第 3 章描述了如何为报表列指定链接。回顾一下，转到页面设计器并单击渲染树中的 `DEPTNO` 列。将列的类型设置为 `Link`。在属性编辑器中找到\
  \ `Link` 部分（参见第 3 章中的图 3-35），并将链接文本设置为 `Click for details`。单击 `Target` 框将进入 `Link\
  \ Builder` 页面，你可以在其中将目标设置为第 12 页（当前页）。\n\n等等。重定向到当前页面没有任何作用，那么链接的意义何在？它的真正目的是更改会话状态。回想一下，`Link\
  \ Builder` 页面还有一个 `Set Items` 部分，你可以在其中将隐藏项 `P12_DEPTNO` 设置为所选的部门编号。回顾第 3 章，要引用当前行中列\
  \ `X` 的值，需写作 `#X#`。因此，你应该将 `P12_DEPTNO` 设置为 `#DEPTNO#`，如图 6-9 所示。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig9_HTML.jpg](img/335103_3_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9\n配置主报表的列链接\n\n最后，你必须实际创建项目 `P12_DEPTNO`。你知道它应该是一个隐藏类型，但它应该放在哪里？因为该项目是隐藏的，所以它放在页面上的哪个区域并不重要。我选择将其放在主区域中，因为那是它的值被赋值的地方。\n\
  \n## 图表钻取\n\n下一页 `Employees by Job` 是 `Employee Demo` 应用的第 13 页，如图 6-10 所示。该页面有两个区域：一个饼图和一个员工报表。该图表给出了每个职位的员工数量。单击饼图的一个部分会定制报表，以显示具有该职位的员工。图\
  \ 6-10 显示了单击 `MANAGER` 切片后的页面。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig10_HTML.jpg](img/335103_3_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10\n按职位查看员工页面\n\n这种点击图表以查看更多细节的技术称为 `chart drill down`（图表钻取）。在这里，点击图表会选择一个类别值，然后用于定制报表。\n\
  \n\n\n## 图表下钻\n\n图表下钻与主从关系非常相似。图表是主项，报表是从项。实际上，其实现策略与主从报表的本质相同：\n\n1.  创建一个隐藏项，此处名为\
  \ `P13_JOB`。\n2.  创建由该隐藏项定制的明细报表。\n3.  创建图表，并配置其在被点击时将所选职位分配给该隐藏项。\n\n明细报表的源查询与\
  \ `按部门查看员工` 中的查询本质相同。唯一的区别是该查询执行了一个连接（join），以便报表能够显示部门名称。SQL 代码如下：\n\n```sql\nselect\
  \ e.EmpNo, e.EName, d.DName, e.Sal\nfrom EMP e join DEPT d\non    e.DeptNo = d.DeptNo\n\
  where e.Job = :P13_JOB\norder by EName\n```\n\n饼图的源代码是一个具有两个输出列的 SQL 查询。以下查询为每个职位创建一个饼图扇区，其值是拥有该职位的员工数量：\n\
  \n```sql\nselect Job, count(*) as EmpCount\nfrom EMP\ngroup by Job\norder by EmpCount\
  \ desc\n```\n\n剩下的唯一问题是如何指定图表被点击时的行为。此行为由图表系列的 `链接` 属性决定；参见图 6-11。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig11_HTML.jpg](img/335103_3_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11：图表系列的链接属性\n\n`类型` 属性的值为 `链接到此应用程序中的页面`。选择它会显示 `目标` 属性，你可以使用 `链接生成器` 屏幕来指定目标页面。图\
  \ 6-12 显示了为该图表配置时的屏幕。你使用与图 6-9 的主报表相同的技术：选择目标为当前页面，并设置隐藏项的值。唯一的区别在于你如何引用所选值。当该值来自报表的\
  \ `X` 列时，你写 `#X#`。当它来自图表的 `X` 列时，你写 `&X.`——即将列名作为替换字符串引用。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig12_HTML.jpg](img/335103_3_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12：为下钻配置图表\n\n## 自定义标题和标签\n\n在第 3 章中，你了解了如何使用 HTML 标签来设置区域标题的格式。实际上，你可以使用\
  \ HTML 标签来设置任何在页面上显示其值的属性的格式，例如页面和区域标题、项目标签以及按钮文本。此外，这些属性也可以通过项目值来自定义。\n\n例如，回顾主从关系和图表下钻页面，我注意到一个小问题：明细报表没有指明选择了哪个主记录（或图表扇区）。解决这个问题的一个好方法是自定义明细区域的标题。例如，图\
  \ 6-13 显示了 `按部门查看员工` 页面修订后的明细区域。请注意，区域标题包含了所选部门的名称。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig13_HTML.jpg](img/335103_3_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13：带有自定义标题栏的员工明细报表\n\n类似地，图 6-14 显示了 `按职位查看员工` 页面修订后的明细区域。它的标题栏显示了所选职位。\n\n\
  ![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig14_HTML.jpg](img/335103_3_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14：另一个自定义标题栏\n\n实现这些标题栏的技术相对简单。让我们从图 6-14 开始，它涉及对 `按职位统计员工数` 页面的修改。该区域的 `标题`\
  \ 属性只需更改为以下表达式：\n\n```\n员工详情: &P13_JOB.\n```\n\n\n\n就这样！你已经完成了。请注意，你使用了替换字符串表示法，因为标题是一个\
  \ HTML 表达式。\n\n现在考虑图 6-13，它是 `按部门查看员工` 页面的一部分。该区域的 `标题` 属性具有以下表达式：\n\n```\nEmployee\
  \ Details: &P12_DNAME. department\n```\n\n这个表达式只有一个问题：当前页面没有名为 `P12_DNAME` 的项。为了使这个表达式有意义，你必须创建该项并将所选的部门名称分配给它。幸运的是，你已经知道如何做这些事情了。首先，创建一个隐藏项\
  \ `P12_DNAME`。然后，回到主报表，进入 `部门编号` 列的链接生成器，并在 `设置项` 属性中添加一行。参见图 6-15。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig15_HTML.jpg](img/335103_3_En_6_Fig15_HTML.jpg)\n\
  \n图 6-15：在链接生成器中设置两个隐藏项的值\n\n## 级联列表\n\n下一个任务是构建一个页面，使用户能够从选择列表中选择员工姓名，然后显示包含该员工信息的报表。该页面名为\
  \ `级联列表`，是 `员工演示` 应用的第 14 页，如图 6-16 所示。该页面有两个区域，每个区域都提供了一种解决方案。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig16_HTML.jpg](img/335103_3_En_6_Fig16_HTML.jpg)\n\
  \n图 6-16：级联列表\n\n### 顶部区域\n\n顶部区域有一个名为 `P14_EMPNO` 的项。这是一个选择列表，显示所有员工的姓名，并将员工编号作为结果值。也就是说，它的值列表查询如下：\n\
  \n```\nselect EName, EmpNo\nfrom EMP\norder by EName\n```\n\n顶部区域没有按钮。相反，选择列表的操作是\
  \ `重定向并设置值`，这意味着从选择列表中选择一个员工姓名会导致该项的值在会话状态中被更改。\n\n顶部区域的类型是 `经典报表`。它的源查询由 `P14_EMPNO`\
  \ 的值定制，如下所示：\n\n```\nselect e.EmpNo, d.DName, e.Job, e.Sal, d.Loc\nfrom EMP e join\
  \ DEPT d\non    e.DeptNo = d.DeptNo\nwhere e.EmpNo = :P14_EMPNO\norder by EmpNo\n\
  ```\n\n如果你尝试这个区域，你应该会发现，由于员工数量较少，浏览姓名列表很容易。然而，假设 `EMP` 表很大，有数千名员工可供选择。即使姓名已排序，滚动浏览选择列表也会很麻烦且耗时。解决此问题的常见方法是让用户通过一系列选择列表分步选择姓名。\n\
  \n### 底部区域\n\n图 6-16 的底部区域使用两个选择列表来选择一名员工。第一个选择列表显示每个员工姓名的首字母，第二个选择列表显示姓名以该字母开头的员工姓名。这种技术称为\
  \ *级联列表*，其中第二个选择列表的显示值会根据为第一个列表选择的值而变化。这种技术可以扩展到多个选择列表——除第一个之外的每个选择列表的值都会根据其前面选择列表的值而变化。这种方法的优点是用户可以滚动浏览几个小的选择列表，而不是一个大列表。\n\
  \n底部区域中的两个选择列表名为 `P14_FIRST_LETTER` 和 `P14_EMPNO_CASCADE`。它们的定义如下。\n\n选择列表 `P14_FIRST_LETTER`\
  \ 不依赖于任何其他项，因此其查询很简单：\n\n```\nselect FirstLetter as DisplayVal, FirstLetter as ResultVal\n\
  from  (select distinct substr(EName, 1, 1) as FirstLetter\nfrom EMP)\norder by DisplayVal\n\
  ```\n\n列表 `P14_EMPNO_CASCADE` 依赖于 `P14_FIRST_LETTER` 的值，其查询如下：\n\n```\nselect EName,\
  \ EmpNo\nfrom EMP\nwhere substr(EName, 1, 1) = :P14_FIRST_LETTER\norder by EName\n\
  ```\n\n底部报表的源与顶部报表完全相同，只是 `P14_EMPNO` 被 `P14_EMPNO_CASCADE` 取代。如果你将这两个选择列表的操作都设置为\
  \ `重定向并设置值`，那么选择首字母会导致姓名列表更新，而选择姓名会导致报表更新。\n\n### 在 APEX 中实现级联列表\n\n级联列表的概念非常普遍，因此\
  \ APEX 有一个特定的属性来处理它，称为 `父项`，它位于选择列表的 `级联值列表` 部分。图 6-17 显示了 `P14_EMPNO_CASCADE` 列表的规范。\n\
  \n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig17_HTML.jpg](img/335103_3_En_6_Fig17_HTML.jpg)\n\
  \n图 6-17：指定级联父项\n\n此图指定 `P14_EMPNO_CASCADE` 依赖于 `P14_FIRST_LETTER` 的值；也就是说，它监视 `P14_FIRST_LETTER`\
  \ 的行为，并在 `P14_FIRST_LETTER` 的值发生变化时刷新自身。因此，`P14_FIRST_LETTER` 的操作现在应设置为 `无`。`P14_EMPNO_CASCADE`\
  \ 的操作应像以前一样设置为 `重定向并设置值`。`级联值列表` 属性使 APEX 能够使用 JavaScript 和 Ajax 刷新选择列表，而无需重新渲染整个页面。这是实现级联最有效的方法。\n\
  \n## 条件渲染\n\n在使用应用程序构建器的过程中，你遇到过无数次这样的情况：在属性编辑器中选择一个特定值会导致编辑器突然显示其他属性。图 6-15 所示的\
  \ `链接生成器` 页面就是一个例子——如果你选择目标类型 `URL`，那么 `设置项` 属性会突然消失，如果你将其值改回 `此应用程序中的页面`，那么那些项会重新出现。这是怎么回事？\n\
  \n虽然看起来这些项是当场创建和删除的，但事实并非如此；相反，这些项始终存在。当你在链接生成器中并选择值 `此应用程序中的页面` 时，APEX 会显示额外的项；当你选择值\
  \ `URL` 时，APEX 会隐藏它们。这种动态显示或隐藏项的能力称为 *条件渲染*。\n\n可以为项、按钮和区域定义条件渲染。每个在属性编辑器中都有一个 `服务器端条件`\
  \ 部分，让你可以从选择列表中选择一个条件类型。尽管有许多条件类型，但这里的重点是 `SQL 表达式` 类型。该类型的值是一个返回 `true`/`false`\
  \ 的 SQL 表达式。表达式的值决定了项、按钮或区域是否被渲染。\n\n### 示例 1：员工详情区域\n\n举个例子，让我们回到图 6-8 所示的 `按部门查看员工`\
  \ 页面。请注意，在从主报表中选择一个值之前，详细报表区域将是空的。如果你不希望页面显示一个空的报表区域，那么你可以使用条件渲染，仅当项 `P12_DEPTNO`\
  \ 不为 `null` 时才显示该区域。该区域的条件 SQL 表达式如图 6-18 所示。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig18_HTML.jpg](img/335103_3_En_6_Fig18_HTML.jpg)\n\
  \n图 6-18：有条件地显示员工详情区域\n\n### 示例 2：显示表页面\n\n再举一个例子，考虑图 6-19 所示的 `显示表` 页面，它将是 `员工演示`\
  \ 应用的第 15 页。`选择表` 区域包含两个复选框和一个按钮。单击按钮会导致显示已勾选的表。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig19_HTML.jpg](img/335103_3_En_6_Fig19_HTML.jpg)\n\
  \n图 6-19：条件区域渲染\n\n\n## 实现 `选择表` 区域\n\n实现 `选择表` 区域很简单。其复选框项名为 `P15_CHOICE`，包含图 6-20\
  \ 所示的两个静态值。按钮执行的是 `提交` 操作。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig20_HTML.jpg](img/335103_3_En_6_Fig20_HTML.jpg)\n\
  图 6-20 `P15_CHOICE` 的静态值\n\n该页面还包含另外两个区域，均为 `经典报表` 类型。`员工信息` 区域具有以下数据源：\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig21_HTML.jpg](img/335103_3_En_6_Fig21_HTML.jpg)\n\
  图 6-21 `P15_CHOICE` 的数据源属性\n\n*   而 `部门信息` 区域具有以下数据源：\n    ```\n    select * from\
  \ DEPT\n    ```\n*   这两个区域都是条件显示的，具体取决于 `P15_CHOICE` 的值。`员工信息` 的显示条件是以下 SQL 表达式：\n\
  \    ```\n    InStr(:P15_CHOICE, 'Employee') > 0\n    ```\n*   `部门信息` 的显示条件是以下 SQL\
  \ 表达式：\n    ```\n    InStr(:P15_CHOICE, 'Department') > 0\n    ```\n*   当按钮被点击时，APEX\
  \ 会创建一个包含已勾选复选框值的、以冒号分隔的字符串，并将其保存在会话状态中。然后当页面重新渲染时，APEX 会使用该会话状态值来初始化 `P15_CHOICE`，并评估每个条件表达式以确定要显示的区域。因此，必须如图\
  \ 6-21 所示，指定 `P15_CHOICE` 的 `数据源` 属性。\n    ```\n    select * from EMP\n    ```\n\
  \n## 区域显示选择器\n\n回顾第 2 章（以及图 2-6），`应用程序属性` 屏幕允许你管理应用程序范围内的属性，例如应用程序徽标和导航菜单位置。图 6-22\
  \ 显示了该屏幕的上半部分。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig22_HTML.jpg](img/335103_3_En_6_Fig22_HTML.jpg)\n\
  图 6-22 `应用程序属性` 屏幕的一部分\n\n请特别注意标题下方的选项卡栏，其选项卡标记为 `显示全部`、`名称`、`属性` 等。此栏就是一个 *区域显示选择器*。如果你点击\
  \ `显示全部` 选项卡，页面将显示其所有区域；如果你点击任何其他选项卡，页面将仅显示所选区域。\n\n你可以向应用程序添加一个区域显示选择器。让我们构建一个类似于图\
  \ 6-19 中 `显示表` 页面的页面，但使用区域显示选择器代替单选按钮组。这个名为 `选择区域` 的页面将是 `员工演示` 应用程序的第 16 页。图 6-23\
  \ 显示了选中 `部门信息` 选项卡时的页面。\n\n![../images/335103_3_En_6_Chapter/335103_3_En_6_Fig23_HTML.jpg](img/335103_3_En_6_Fig23_HTML.jpg)\n\
  图 6-23 使用区域显示选择器区域\n\n此页面由两个经典报表区域组成，分别对应 `EMP` 和 `DEPT` 表。其上方是一个 `区域显示选择器` 区域。要创建此显示选择器区域，只需在页面设计器中创建一个区域，然后将其类型更改为\
  \ `区域显示选择器`。与你迄今为止遇到的所有其他区域不同，该区域没有数据源；其唯一目的是为页面的区域显示一个选项卡栏。\n图 6-23 中的区域显示选择器被放置在\
  \ `内容正文` 位置，并设置了一个较小的序列号，以便它首先显示。其模板是 `按钮容器`，该模板格式化区域时不显示标题。\n默认情况下，区域显示选择器会为页面上的每个区域显示一个选项卡（前提是需要显示的区域多于一个）。如果你想排除某个区域，请使用其\
  \ `区域显示选择器` 属性，该属性位于 `高级` 部分。关闭此属性会将该区域从显示选择器中排除。\n\n#### 小结\n\nAPEX 服务器维护着每个用户会话的数据；这些数据被称为\
  \ *会话状态*。在本章中，你了解了会话状态如何被修改，并探讨了应用程序开发者利用它的几种方式。\n会话状态为应用程序中的每个项都维护一个变量。这些变量的值会因为提交或重定向操作而被修改。\n\
  当页面被提交时，页面上所有项的值都将在会话状态中得到更新。当页面重定向到目标页面时，重定向操作可以为特定项赋值。特别是，当你配置按钮、报表链接或图表进行重定向时，属性编辑器将显示\
  \ `链接构建器` 向导，其中包含一个用于指定会话状态值的部分。\n会话状态的一个常见用途是使用户能够自定义报表。其思路是用户指定一些值，这些值会影响报表显示哪些记录。你看到了用户指定这些值的几种方式示例：\n\
  \n*   用户可以直接将值输入到页面上的项中。\n*   用户可以从主报表中选择一行。\n*   用户可以通过图表向下钻取来选择一个值。\n\n本章还探讨了会话状态的其他用途，例如\
  \ *级联列表*（其中为一个选择列表选择的值决定了另一个列表显示的值）和 *条件渲染*（其中一项的值决定了某个区域应该显示还是隐藏）。\n会话状态是 APEX\
  \ 中极其重要的一个方面。本书余下部分的大部分示例都将运用本章提到的技术。\n\n## 7. 进程\n\n正如你所见，仅使用项、报表和图表就可以编写功能强大的网页。但要实现更复杂的功能，你必须能够执行计算并与数据库进行更一般化的交互。*进程*\
  \ 这个概念正是为了解决这两个问题。\n本章将探讨一些需要使用进程的典型情况，并介绍 PL/SQL 的基础知识，以便你可以编写自己的代码来实现这些进程。本章还将探讨编写\
  \ PL/SQL 代码时可能遇到的陷阱，例如丢失更新的可能性。\n\n### 提交操作的阶段\n\n回想一下，页面设计器的左侧面板包含四个选项卡。到目前为止，本书主要关注的是\
  \ `渲染` 选项卡；现在是时候转向 `处理` 选项卡了。要进入此选项卡，请点击面板顶部从左数第三个圆形箭头图标。图 7-1 显示了该选项卡的界面。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig1_HTML.jpg](img/335103_3_En_7_Fig1_HTML.jpg)\n\
  图 7-1 页面设计器的处理选项卡\n\n\n## APEX 执行点与进程创建\n\n图中显示了五个节点。前四个对应于提交操作期间可能发生的四种活动阶段；APEX\
  \ 将这些阶段称为 **执行点**。这些阶段具有以下目的：\n\n*   在 **提交后** 阶段，服务器计算额外的会话状态值，为主要处理活动做准备。这种计算偶尔有用，在第\
  \ 10 章中有简要讨论。\n\n*   在 **验证** 阶段，服务器运行验证检查，以确保提交请求是使用适当的数据调用的。如果检测到问题，服务器将中止进一步处理。验证是第\
  \ 8 章的主题。\n\n*   在 **处理** 阶段，服务器执行与提交请求相关联的进程。这些进程的定义和使用是本章及第 10 章的主题。\n\n*   在\
  \ **处理后** 阶段，服务器使用分支来决定将哪个页面发送到浏览器。分支是第 9 章的主题。\n\n图 7-1 中的第五个节点名为 `Ajax Callback`，它不是一个执行点；其目的是保存可以从\
  \ JavaScript 函数调用的代码。由于 APEX 中 JavaScript 的使用超出了本书的范围，我将不再进一步提及此节点。\n\n### 创建进程\n\
  \n本节使用员工演示应用中的 `Item Sampler` 页面（第 8 页）快速介绍 APEX 进程。转到其页面编辑器并点击 `Processing` 选项卡；您应该看到图\
  \ 7-1 的屏幕。要创建新进程，请右键单击 `Processing` 节点并选择 `Create Process`。应用构建器将创建一个标题为 `New` 的进程，并将其节点添加到\
  \ `Processing` 子树中，如图 7-2 所示。请注意，新节点的父节点是 `Processes` 节点，而后者又是 `Processing` 的子节点。`Processes`\
  \ 节点的目的是将所有与 `Processing` 执行点关联的进程组件分组。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig2_HTML.jpg](img/335103_3_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2 处理组件树\n\n单击新进程的节点并查看其属性。`Identification` 部分指定了进程的名称和类型。默认情况下，新创建的进程名称为 `New`，类型为\
  \ `PL/SQL Code`。图 7-3 显示我将进程重命名为 `SampleProcess` 并保留了默认的类型值。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig3_HTML.jpg](img/335103_3_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3 指定进程的名称和类型\n\n单击“类型”属性的选择列表，查看可用的其他进程类型。这些类型便于特殊用途的操作，例如修改表、发送电子邮件或清除会话状态，是第\
  \ 10 章的主题。本章专门关注 `PL/SQL Code` 进程类型，它使您能够编写自己的通用操作。\n\nPL/SQL 进程的代码在其 `Source` 部分由\
  \ `PL/SQL Code` 属性指定。查看新进程的 `Source` 部分——您会看到它没有代码，这就是为什么图 7-2 中的节点被标记为有错误。让我们来修复它。\n\
  \nPL/SQL 代码块最基本的形式是由关键字 `begin` 和 `end` 包围的一条或多条语句。例如，图 7-4 显示了包含最简单可能的 PL/SQL 块的\
  \ `Source` 部分。执行它会运行 `null` 语句，该语句（正如您可能想象的那样）绝对什么也不做。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig4_HTML.jpg](img/335103_3_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4 一个什么也不做的 PL/SQL 代码块\n\n注意分号。每条语句后必须跟一个分号，`end` 关键字后也必须跟一个分号。如果您忘记了这样做（您可能在某个时候会忘记），APEX\
  \ 将显示错误消息。如有疑问，请检查是否遗漏了分号。\n\n将此代码添加到您的进程中将移除错误标志。当您运行页面时，每次单击 `Submit` 按钮都会执行该进程。当然，您无法知道这一点，因为代码什么也没做。本章的其余部分将探讨如何为进程添加有意义的内容。\n\
  \n### 使用 PL/SQL 访问数据库\n\nPL/SQL 进程通常用于访问数据库。SQL 数据修改命令可以用作 PL/SQL 语句，这意味着修改数据库的进程可以仅由那一条语句组成。例如，以下\
  \ PL/SQL 块将部门 10 中每个人的工资增加 100。\n\n```\nbegin\nupdate EMP\nset Sal = Sal + 100\n\
  where DeptNo = 10;\nend;\n```\n\n对于一个更全面的示例，考虑图 7-5 中显示的 `Employee Data Entry` 页面，它是\
  \ `Employee Demo` 应用的第 17 页。此页面说明了 PL/SQL 修改数据库的能力。它包含用于删除指定员工、插入新员工和更新指定员工列的区域。这些区域上方是一个报表区域，显示员工表，因此您可以看到修改的效果。\n\
  \n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig5_HTML.jpg](img/335103_3_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5 员工数据录入页面\n\n要创建此页面，首先创建一个空白页面和四个区域。`Employees` 区域是一个经典报表区域，其数据源是整个 `EMP`\
  \ 表。其他三个区域是静态内容区域，位置如下：`Delete Employee` 开始新的一行，其余两个区域开始该行的新列。以下小节讨论这三个区域的内容。\n\n\
  #### 删除员工区域\n\n`Delete Employee` 区域包含一个选择列表和一个按钮。选择列表名为 `P17_DELETE_EMPNO`，在选择时执行无操作，其值由以下查询定义：\n\
  \n```\nselect EName, EmpNo\nfrom EMP\norder by EName\n```\n\n按钮名为 `Delete`，其操作是\
  \ `Submit`。其想法是用户从列表中选择一名员工，然后单击 `Delete` 按钮提交页面；在提交期间，APEX 服务器将执行一个进程来删除该员工的记录。以下步骤说明了如何创建此进程并将其与按钮关联。\n\
  \n首先，转到页面设计器的 `Processing` 选项卡，右键单击 `Processes` 节点，然后选择 `Create Process`。给新进程一个名称，例如\
  \ `DeleteEmp`。\n\n其次，转到 `Source` 属性部分，在其 `PL/SQL Code` 区域中输入清单 7-1 中所示的 PL/SQL 块。注意代码如何使用绑定变量语法来引用所选的员工编号。\n\
  \n```\nbegin\ndelete from EMP\nwhere EmpNo = :P17_DELETE_EMPNO;\nend;\n```\n清单 7-1\
  \ DeleteEmp 进程的 PL/SQL 代码\n\n\n第三，更改流程的`Server-side Condition`部分中的`When Button Pressed`属性，如图\
  \ 7-6 所示。这样做指定了流程仅在按下`Delete`按钮时才会执行。否则，每次发生提交操作时，该流程都会执行，而不管提交是如何发生的。这对于`Employee\
  \ Data Entry`页面来说将是一个问题，因为它有四个按钮，全部执行提交操作。你希望`DeleteEmp`流程仅在按下`Delete`按钮时执行，这正是`When\
  \ Button Pressed`属性的用途。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig6_HTML.jpg](img/335103_3_En_7_Fig6_HTML.jpg)\n\
  图 7-6：设置 When Button Pressed 属性\n\n### 插入员工区域\n\n`Insert Employee`区域包含五个项目和一个按钮。这些项目对应于`EMP`表的列，名称分别为`P17_INSERT_ENAME`、`P17_INSERT_JOB`等。项目`P17_INSERT_ENAME`是一个文本字段，`P17_INSERT_SAL`是一个数字字段。另外三个项目是选择列表，其值通过以下值列表查询定义。\n\
  \n`P17_INSERT_JOB`的值由以下查询定义：\n```sql\nselect distinct Job as DisplayVal, Job as\
  \ ResultVal\nfrom EMP\n```\n\n`P17_INSERT_MGR`的值由以下查询定义：\n```sql\nselect EName,\
  \ EmpNo\nfrom EMP\nwhere Job = 'MANAGER'\n```\n\n`P17_INSERT_DEPTNO`的值由以下查询定义：\n\
  ```sql\nselect DName, DeptNo\nfrom DEPT\n```\n\n该按钮名为`Insert`，其操作为`Submit`。用户输入各项的值并单击`Insert`按钮。然后，与该按钮关联的流程将使用指定的项目值作为五列的值，并为其他四列计算以下值，将一条新记录插入到`EMP`表中：\n\
  *   `EmpNo`自动获取由`EMP`的内置插入触发器确定的序列中的下一个值。\n*   `HireDate`获取当前日期。\n*   `Comm`获取`0`。\n\
  *   `Offsite`获取`'N'`。\n\n创建此流程的步骤与`DeleteEmp`流程相同。将该流程命名为`InsertEmp`。其`When Button\
  \ Pressed`属性的值应为`Insert`。其 PL/SQL 代码由清单 7-2 中显示的单个 SQL 命令组成。\n```sql\nbegin\ninsert\
  \ into EMP (EName, Job, Mgr, Sal, DeptNo,\nHireDate, Comm, Offsite)\nvalues (:P17_INSERT_ENAME,\n\
  :P17_INSERT_JOB,\n:P17_INSERT_MGR,\n:P17_INSERT_SAL,\n:P17_INSERT_DEPTNO,\ncurrent_date,\
  \  0,  'N');\nend;\n```\n*清单 7-2：InsertEmp 流程的 PL/SQL 代码*\n\n此时，你可能想要测试当前页面的状态。插入一条记录并确保它在报表中正确显示。然后删除它，并观察报表恢复到其原始状态。\n\
  \n### 更新员工区域\n\n`Update Employee`区域有四个项目和两个按钮。项目名为`P17_UPDATE_EMPNO`、`P17_UPDATE_JOB`等。选择列表值的定义方式与其他区域相同。按钮名为`GetInfo`和`Update`，两者操作均为`Submit`。\n\
  \n使用此区域需要两个步骤。首先，用户从`P17_UPDATE_EMPNO`中选择所需的员工并单击`GetInfo`按钮。与此按钮关联的流程使用该员工的`EMP`记录中的相应值填充项目`P17_UPDATE_JOB`、`P17_UPDATE_SAL`和`P17_UPDATE_DEPTNO`。然后用户根据需要更改这些项目。当用户单击`Update`按钮时，与该按钮关联的流程会使用新值更新记录。\n\
  \n每个按钮都将有自己的流程。`Update`按钮的流程名为`UpdateEmp`。其 PL/SQL 代码如清单 7-3 所示，其`When Button Pressed`属性的值为`Update`。\n\
  ```sql\nbegin\nupdate EMP\nset Job    =  :P17_UPDATE_JOB,\nSal    =  :P17_UPDATE_SAL,\n\
  DeptNo =  :P17_UPDATE_DEPTNO\nwhere EmpNo  =  :P17_UPDATE_EMPNO;\nend;\n```\n*清单\
  \ 7-3：UpdateEmp 流程的 PL/SQL 代码*\n\n`GetInfo`按钮的流程名为`GetEmpInfo`。它与页面上其他流程的不同之处在于，它从数据库读取数据而不是写入数据。该技术是编写一个\
  \ SQL 查询，将其输出直接放入页面上的项目中。清单 7-4 中的 PL/SQL 代码正是这样做的。\n```sql\nbegin\nselect Job,\
  \ Sal, DeptNo\ninto :P17_UPDATE_JOB, :P17_UPDATE_SAL, :P17_UPDATE_DEPTNO\nfrom EMP\n\
  where EmpNo = :P17_UPDATE_EMPNO;\nend;\n```\n*清单 7-4：GetEmpInfo 流程的 PL/SQL 代码*\n\
  \n该查询的关键部分是关键字`into`开头的子句。该子句表明查询的三个输出值将被放入三个指定的项目中。换句话说，`into`子句将 SQL 查询转换为一个 PL/SQL\
  \ 语句，该语句从数据库中提取值并将它们分配给项目。请注意，`into`子句仅在 SQL 查询恰好返回一行时才有意义。执行多行 SQL 查询的流程需要对查询输出进行完全不同的处理，正如你将在下一节中看到的那样。\n\
  \n### 用于计算值的 PL/SQL\n\n本节探讨 PL/SQL 的编程语言方面。PL/SQL 的核心是一种传统的编程语言，具有变量、赋值语句、条件语句和循环。在这方面，它与\
  \ C、Java、Python 和类似语言没有太大区别。如果你有使用这些语言中的任何一种的经验，那么编写 PL/SQL 代码最困难的部分可能是找出合适的语法。\n\
  \n例如，让我们构建如图 7-7 所示的`Sales Commission`页面，这将是`Employee Demo`应用程序的第 18 页。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig7_HTML.jpg](img/335103_3_En_7_Fig7_HTML.jpg)\n\
  图 7-7：用于计算销售佣金的页面\n\n每次销售人员完成销售时都会使用此页面。假设销售人员在销售额的前 100 美元获得 15%的佣金，在剩余金额上获得 10%的佣金；如果多名销售人员合作完成一笔销售，他们平均分配佣金。该页面有两个外部区域。顶部区域名为`Solo\
  \ Commission`，用于输入个人销售。底部区域名为`Shared Commission`，用于输入协作销售。\n\n`Solo Commission`区域的工作方式如下：用户选择销售人员的姓名，并将销售金额输入到`Enter\
  \ Sale`区域。单击`Submit`按钮提交页面并导致流程执行。该流程执行多项操作：它根据销售额计算佣金，从`EMP`表中检索该销售人员之前的佣金，通过将两个值相加来计算新的佣金金额，并将这三个值放入`Commission\
  \ Info`区域的三个相应项目中。它还用新的佣金值更新`EMP`表。\n\n`Shared Commission`区域的工作方式类似，只是可以从选择列表中选择多名销售人员。其流程计算销售的总佣金和按比例分配的金额，更新`EMP`表，并将合作销售人员的新佣金写入文本区域。\n\
  \n本节考虑`Solo Commission`区域的实现。（`Shared Commission`区域将在“处理多行 SQL 查询”一节中讨论。）`Enter\
  \ Sale Info`区域中的两个项目名为`P18_SOLO_SALESMAN`和`P18_SOLO_AMOUNT`。项目`P18_SOLO_AMOUNT`是一个数字字段，`P18_SOLO_SALESMAN`是一个选择列表，其值由以下\
  \ SQL 查询定义：\n```sql\nselect EName, EmpNo\nfrom EMP\nwhere Job = 'SALESMAN'\n```\n\
  \n\n`Commission Info`区域中的项被命名为 `P18_SOLO_PREV_COMMISSION`、`P18_SOLO_SALE_COMMISSION`\
  \ 和 `P18_SOLO_NEW_COMMISSION`。清单 7-5 包含了当点击 `Submit` 按钮时执行的 PL/SQL 代码。此代码阐释了 PL/SQL\
  \ 的几个方面，将在以下小节中描述。\n\n```\ndeclare\nv_amount int := :P18_SOLO_AMOUNT;\nv_saleCommission\
  \ number(7,2);\nv_prevCommission number(7,2);\nv_newCommission  number(7,2);\nbegin\n\
  -- 步骤 1：计算新佣金，前 100 美元按 15%计算，\n-- 剩余销售价格按 10%计算。\nif v_amount > 100 then\nv_amount\
  \ := v_amount - 100;\nv_saleCommission := 15 + (v_amount * 0.1);\nelse\nv_saleCommission\
  \ := v_amount * 0.15;\nend if;\n-- 步骤 2：从 EMP 表中检索之前的佣金\n-- 并计算新的佣金。\nselect Comm\
  \ into v_prevCommission\nfrom EMP\nwhere EmpNo = :P18_SOLO_SALESMAN;\nv_newCommission\
  \ := v_prevCommission + v_saleCommission;\n-- 步骤 3：更新员工记录。\nupdate EMP\nset Comm\
  \ = v_newCommission\nwhere EmpNo = :P18_SOLO_SALESMAN;\n-- 步骤 4：计算各项的值。\n:P18_SOLO_SALE_COMMISSION\
  \ := v_saleCommission;\n:P18_SOLO_PREV_COMMISSION := v_prevCommission;\n:P18_SOLO_NEW_COMMISSION\
  \  := v_newCommission;\nend;\n```\n清单 7-5 处理单独佣金的 PL/SQL 代码\n\n### 局部变量\nPL/SQL\
  \ 块可以在 `begin` 关键字之前有一个 `变量声明部分`。声明部分以关键字 `declare` 开头，后跟一系列变量声明。清单 7-5 的代码声明了四个局部变量：`v_amount`、`v_saleCommission`、`v_prevCommission`\
  \ 和 `v_newCommission`。每个声明的语法类似于 SQL 中声明表列的语法，可能的变量类型也相同。例如，后三个变量的类型为 `number(7,2)`，这与\
  \ `EMP` 表中 `Comm` 列的类型相同。\n局部变量和项引用可以在 PL/SQL 块中互换使用。区别在于，局部变量按原样引用，而项引用需要前置冒号。例如，步骤\
  \ 3 中的 SQL `update` 命令同时引用了局部变量 `v_newCommission` 和项 `P18_SOLO_SALESMAN`。\n由于项是使用绑定变量语法引用的，因此很容易识别。但是，SQL\
  \ 命令中的局部变量引用很难与列名或函数调用区分开来。为避免混淆，应始终为局部变量命名，以便人们知道它们是变量。这里采用的一个常见约定是，每个局部变量名以 `v_`\
  \ 开头。\n\n### 注释\n与 SQL 一样，PL/SQL 用两个连续的减号表示注释。跟在两个减号之后的所有字符直到行尾都会被忽略。\n\n### 赋值语句\n\
  PL/SQL 中的赋值语句使用 `:=` 作为赋值运算符。赋值也可以在 `declare` 部分中使用，以为局部变量分配初始值。\n\n### 条件语句\nPL/SQL\
  \ 支持多种形式的条件语句；清单 7-5 步骤 1 中出现的形式适用于通用目的。请注意，关键字充当部分边界：条件表达式出现在 `if` 和 `then` 之间，当条件为\
  \ `true` 时要执行的语句出现在 `then` 和 `else` 之间，当条件为 `false` 时要执行的语句出现在 `else` 和 `end if`\
  \ 之间。通常，如果在 `else` 和 `end if` 关键字之间没有语句，则可以省略 `else` 关键字。\n\n### 处理多行 SQL 查询\n现在让我们看看如何构建\
  \ `Shared Commission` 区域。其 `Enter Sale` 区域与 `Solo Commission` 区域基本相同。它的项名称是 `P18_SHARED_SALESMAN`\
  \ 和 `P18_SHARED_AMOUNT`。\n`Commission Info` 区域中的项被命名为 `P18_SHARED_SALE_COMMISSION`、`P18_SHARED_COMMISSION_EACH`\
  \ 和 `P18_SHARED_NEW_COMMISSIONS`。\n选择列表 `P18_SHARED_SALESMAN` 的属性值与 `P18_SOLO_SALESMAN`\
  \ 相同；不同之处在于其 `Allow Multi Selection` 属性设置为 `Yes`，`Height` 值为 `4`。回顾第 5 章，此类项的值是一个字符串，其中包含以冒号分隔的返回值。例如，如果从多值选择列表\
  \ `P18_SHARED_SALESMAN` 中选择了 `ALLEN` 和 `TURNER`。由于他们对应的员工编号是 7499 和 7844，因此该项的值是字符串\
  \ `\"7499:7844\"`。\n从该字符串中提取所需信息并不特别容易，因此需要一些巧妙的方法。你需要做两件事：确定所选员工的数量，并从 `EMP` 表中提取他们的记录。\n\
  请注意，所选员工的数量比字符串中的冒号数量多一。你可以通过使用 SQL `replace` 函数创建一个新字符串（其中冒号被替换为空字符串，从而有效地移除了冒号），然后比较两个字符串的长度，来确定冒号的数量。也就是说，如果\
  \ `P18_SHARED_SALESMAN` 包含该字符串，则员工数量由以下表达式给出：\n```\n1 + length(:P18_SHARED_SALESMAN)\
  \ - length(replace(:P18_SHARED_SALESMAN, ':', ''))\n```\n要提取每个所选员工的记录，请使用 `instr`\
  \ 函数，就像你为 `Filter by Possible Department` 页面所做的那样。以下查询将检索所有选定员工的 `EMP` 记录：\n```\n\
  select *\nfrom EMP\nwhere instr( ':'|| :P18_SHARED_SALESMAN||':',  ':'||EmpNo||':'\
  \ ) > 0\n```\n解决了这些问题后，你现在可以为该区域的 `Submit` 按钮编写处理过程。PL/SQL 代码如清单 7-6 所示。\n```\n\
  declare\nv_saleCommission number(7,2);\nv_amount         int := :P18_SHARED_AMOUNT;\n\
  v_empCount       int;\nv_commissionEach number(7,2);\nv_empInfo        varchar2(25);\n\
  v_output         varchar2(250) := '';\nbegin\n-- 步骤 1：计算新佣金，前 100 美元按 15%计算，\n--\
  \ 剩余销售价格按 10%计算。\nif v_amount > 100 then\nv_amount := v_amount - 100;\nv_saleCommission\
  \ := 15 + (v_amount * 0.1);\nelse\nv_saleCommission := v_amount * 0.15;\nend if;\n\
  -- 步骤 2：确定共享佣金。\nv_empcount := 1 + length(:P18_SHARED_SALESMAN) - length(replace(:P18_SHARED_SALESMAN,\
  \ ':', '' ));\nv_commissionEach := v_saleCommission / v_empcount;\n-- 步骤 3：更新 EMP\
  \ 表。\nupdate EMP\nset Comm = Comm + v_commissionEach\nwhere instr( ':'||:P18_SHARED_SALESMAN||':',\
  \  ':'||EmpNo||':' ) > 0;\n-- 步骤 4：使用循环收集员工信息。\nfor row in (\nselect EName, Comm\n\
  from EMP\nwhere instr( ':'||:P18_EMPNO_SHARED||':',  ':'||EmpNo||':' ) > 0 )\nloop\n\
  v_empInfo := row.EName || ': ' || row.Comm || chr(13);\nv_output  := v_output ||\
  \ v_empInfo;\nend loop;\n-- 步骤 5：写入项值。\n:P18_SHARED_SALE_COMMISSION  := v_saleCommission;\n\
  :P18_SHARED_COMMISSION_EACH  := v_commissionEach;\n:P18_SHARED_NEW_COMMISSIONS \
  \ := v_output;\nend;\n```\n清单 7-6 处理共享佣金的 PL/SQL 代码\n\n\n## 并发数据库更新\n\n### 丢失更新问题\n\
  \n步骤 1 计算销售佣金，与之前相同。步骤 2 计算每位员工的按比例佣金，即用佣金总额除以员工数量。步骤 3 更新所选员工的记录。步骤 5 将一个值写入`Commission`区域的每个项目。\n\
  \n最有趣的代码出现在步骤 4 中，您在此处理每个所选员工。问题在于，检索员工信息的 SQL 查询会返回多行，因此您不能像之前那样使用`into`子句。取而代之的技术是遍历查询中的记录，每次循环处理一行。\n\
  \n循环的基本结构如下：\n\n```\nfor r in (  )\nloop\n-- 用于处理行 r 的语句\nend loop;\n```\n\n变量`r`无需声明。每次循环时，它将保存查询的下一行。如果`C`是查询的一个输出列，那么表达式`r.C`将返回当前行的`C`值。例如，在清单\
  \ 7-6 中，行变量名为`row`，查询的两个输出列是`EName`和`Comm`。因此，循环代码引用的是`row.EName`和`row.Comm`。\n\n\
  循环体处理每个所选员工。其任务是构建一个字符串，总结该员工的新佣金。代码通过将员工姓名与新的佣金值拼接来创建摘要字符串。表达式`chr(13)`表示一个换行符。\n\
  \n一个经常遇到的情况称为*丢失更新问题*。当两个用户在大约相同的时间更新同一条数据库记录，并且更新的时序导致数据库系统丢失了其中一个更新时，就会出现此问题。以下两种场景说明了该问题。\n\
  \n对于第一种场景，考虑图 7-5 的`员工数据录入`页面。假设两个用户使用`更新员工`区域来更新 Allen 的记录——用户 A 希望将工资改为`1800`，用户\
  \ B 希望将职位改为`ANALYST`。如果两个用户大约同时点击`GetInfo`按钮，那么他们都将从`EMP`表中检索到相同的记录，该记录显示 Allen\
  \ 是一名工资为 1600 的销售员。当用户 A 更改工资并点击`Update`按钮时，该记录将被替换为一条记录，显示 Allen 是一名工资为 1800 的销售员。然而，用户\
  \ B 看不到更新后的工资。当用户 B 更改职位并点击`Update`按钮时，该记录将被替换为一条记录，显示 Allen 是一名分析师，工资为 1600。\n\n\
  无论谁先写入，此场景都会出现问题。如果用户 A 先修改，用户 B 将用其先前值覆盖新工资；如果用户 B 先修改，用户 A 将用其先前值覆盖新职位。无论发生什么，数据库系统都会丢失其中一个更新。\n\
  \n您可以自行验证此场景。在两个私密浏览器窗口中打开`员工数据录入`页面（使用私密窗口可防止 APEX 识别出两个窗口都属于您）。在每个窗口中选择同一个员工并点击`GetInfo`按钮。然后在每个窗口中进行一次更新并点击其`Update`按钮。现在查看报告中修改后的记录——您会发现您的第一次更新丢失了。\n\
  \n对于第二种场景，考虑图 7-7 的`销售佣金`页面。假设 Allen 独立销售了 100 美元和 200 美元，分别获得 15 美元和 25 美元的佣金。用户\
  \ A 和用户 B 各自将其中一笔销售输入页面的`单独佣金`区域，并同时点击其`提交`按钮。假设他们的 PL/SQL 进程执行几乎同时到达清单 7-5 的步骤\
  \ 2，这意味着两个进程都会看到当前佣金为 300 美元。用户 A 的进程将在步骤 3 计算出 315 美元的新佣金，用户 B 的进程将计算出 325 美元的新佣金。后更新的进程将覆盖先更新进程的佣金。被覆盖的更新将会丢失。\n\
  \n您也可以自行验证此场景。这次，在您的两个私密浏览器窗口中打开`销售佣金`页面。在每个窗口中，选择同一个销售员，选择不同的销售额，然后点击`提交`按钮。很可能，两个更新都不会丢失。原因是，丢失更新场景只有在\
  \ APEX 服务器恰好在步骤 2 之后立即推迟执行第一个进程时才会发生，这种情况可能发生但概率较低。您可以通过在步骤 2 之后立即向进程中引入一条*休眠*语句来大幅提高概率，如下所示：\n\
  \n```\n...\nv_newCommission := v_prevCommission + v_saleCommission;\ndbms_session.sleep(10);\n\
  -- 步骤 3：更新员工记录。\n...\n```\n\n此语句使进程在开始步骤 3 之前休眠 10 秒。现在重复实验。如果您在 10 秒内点击两个`提交`按钮，则会出现问题场景，并且您提交的第一个佣金将会丢失。\n\
  \n在这两种场景中，丢失更新的发生完全取决于用户请求的时序。这种对时序的依赖意味着丢失更新往往在看似随机的时间点发生。例如，一个应用程序很可能运行数月（或数年）而没有发生丢失更新，然后却在短时间内连续发生几次。\n\
  \n丢失更新显然是非常糟糕的事情。丢失更新可能在发生很久后才被发现，到那时可能为时已晚。应用程序开发人员必须确保它们永远不会发生。其不可预测的性质使得通过测试难以发现问题。因此，任何更新数据库的\
  \ PL/SQL 进程都必须专门编写以避免丢失更新。\n\n### 避免丢失更新\n\n当两个并发进程读取相同数据然后对其进行冲突更新时，就会发生丢失更新。避免此问题的方法是强制冲突进程按顺序交互，以便第二个进程读取第一个进程写入的数据。\n\
  \nOracle 数据库系统使用*写锁*来确保这种顺序性。您通过向 SQL 查询添加`for update`子句来指定写锁。当您的进程执行包含该子句的查询时，数据库系统会锁定该查询的输出记录，使其不能被任何其他进程读取或修改。然后，您的进程可以安全地修改这些记录而无需担心冲突。当您的进程完成时，数据库系统会释放锁。\n\
  \n例如，考虑前面的第二种场景，其中两个用户并发地更新`单独佣金`区域。清单 7-5 的步骤 2 包含有问题的 SQL 查询：\n\n```\nselect Comm\
  \ into v_prevCommission\nfrom EMP\nwhere EmpNo = :P18_EMPNO;\n```\n\n此查询的输出是指定`EMP`记录的`Comm`值，该值将在步骤\
  \ 3 中稍后修改。为防止其他进程访问此记录，您可以通过将查询更改为以下形式来锁定它：\n\n```\nselect Comm into v_prevCommission\n\
  from EMP\nwhere EmpNo = :P18_EMPNO for update;\n```\n\n\n如果另一个进程试图访问此记录，而该记录已被锁定，数据库系统将延迟该进程，直到您的进程完成。因此，您进程的第\
  \ 3 步可以修改该记录，确信不会覆盖另一个进程的修改。\n\n转到`Employee Demo`应用程序的第 18 页，按此策略修改`Solo Commission`区域的进程。然后使用两个私密浏览器窗口验证其是否有效，如前一节所述。即使在进程的第\
  \ 3 步之前添加`sleep`语句，页面也应永远不会丢失已更新的佣金。\n\n### 并发更新场景\n\n现在考虑第一个场景，即两个用户同时更新一个员工记录。在此场景中，更新记录的活动需要两个进程：`GetEmpInfo`进程从指定记录读取值，而`UpdateEmp`进程修改该记录。仅让`GetEmpInfo`锁定其记录是不够的，因为锁会在`GetEmpInfo`完成时释放（因此，在`UpdateEmp`开始之前）。\n\
  \n因此，这两个进程之间需要显式的协作。以下是一个好的策略：\n\n`GetEmpInfo`进程读取所选记录的值，在页面上显示它们，并保存原始值以备将来参考。`UpdateEmp`进程从数据库重新读取值，并将其与保存的值进行比较。如果它们匹配，则进程可以执行更新。如果不匹配，则必定有另一个进程更新了该记录，这意味着`UpdateEmp`必须拒绝执行更新。\n\
  \n`Employee Demo`应用程序的第 19 页名为`Revised Employee Data Entry`，包含此策略的实现。它看起来与第 17 页相同，行为也相同。唯一的（目前）区别是其`GetEmpInfo`和`UpdateEmp`进程已修订，因此它们不会丢失更新。\n\
  \n### 创建修订页面\n\n由于此页面与第 17 页基本相同，实现它的最佳方式是从第 17 页的副本开始。为此，转到任意页面的设计者视图，在其顶行找到`insert`图标（标有`+`的图标）。然后选择其`Page\
  \ as Copy`菜单项，如图 7-8 所示。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig8_HTML.jpg](img/335103_3_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8 选择“页面作为副本”向导\n\n此项目将打开 APEX 页面复制向导。其第一个屏幕询问要复制的页面位置；选择`Page in this application`。第二个屏幕要求您指定源页面和目标页面；图\
  \ 7-9 显示了我如何填写。在第三个屏幕上，您应以通常的方式设置导航菜单项。第四个屏幕告知您复制页面组件是否存在困难；忽略该屏幕并点击`Create`按钮。\n\
  \n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig9_HTML.jpg](img/335103_3_En_7_Fig9_HTML.jpg)\n\
  \n图 7-9 复制页面\n\n### 修订 GetEmpInfo 进程\n\n清单 7-7 展示了清单 7-4 中`GetEmpInfo`进程的一个修订版（粗体行是新的）。在检索到指定员工的值后，它将这些值保存在新的隐藏项`P19_ORIGINAL_JOB`、`P19_ORIGINAL_SAL`和`P19_ORIGINAL_DEPTNO`中（您应该创建这些项）。\n\
  \n```\nbegin\n-- First retrieve the data.\nselect Job, Sal, DeptNo\ninto :P19_UPDATE_JOB,\
  \ :P19_UPDATE_SAL, :P19_UPDATE_DEPTNO\nfrom EMP\nwhere EmpNo = :P19_UPDATE_EMPNO;\n\
  -- Then use hidden items to save a copy of the data.\n:P19_ORIGINAL_JOB  := :P19_UPDATE_JOB;\n\
  :P19_ORIGINAL_SAL  := :P19_UPDATE_SAL;\n:P19_ORIGINAL_DEPTNO := :P19_UPDATE_DEPTNO;\n\
  end;\n```\n\n清单 7-7 修订清单 7-4 中的 GetEmpInfo 代码\n\n### 修订 UpdateEmp 进程\n\n清单 7-8 展示了清单\
  \ 7-3 中`UpdateEmp`进程的相应修订（粗体行是新的）。该代码从数据库重新读取值，并将其与隐藏项中的原始值进行比较。\n\n```\ndeclare\n\
  v_newjob  varchar2(9);\nv_newsal  number(7,2);\nv_newdept number(4,0);\nbegin\n\
  -- First re-read the data.\nselect Job, Sal, DeptNo\ninto v_newjob, v_newsal, v_newdept\n\
  from EMP\nwhere EmpNo = :P19_UPDATE_EMPNO for update;\n-- Then compare it with the\
  \ original data.\nif :P19_ORIGINAL_JOB = v_newjob and\n:P19_ORIGINAL_SAL  = v_newsal\
  \ and\n:P19_ORIGINAL_DEPTNO = v_newdept\nthen\n-- The record hasn't changed, so\
  \ update it.\nupdate EMP\nset Job    = :P19_UPDATE_JOB,\nSal    = :P19_UPDATE_SAL,\n\
  DeptNo = :P19_UPDATE_DEPTNO\nwhere EmpNo = :P19_UPDATE_EMPNO;\nelse\n-- The record\
  \ has changed, so abort.\nraise_application_error(-20000,\n'The record is out of\
  \ date. Get it again.');\nend if;\nend;\n```\n\n清单 7-8 修订清单 7-3 中的 UpdateEmp 代码\n\
  \n中止进程的代码需要解释。`raise_application_error`函数使 APEX 中止进程并在页面上显示错误消息。该函数接受两个参数：第一个参数是错误代码，可以是–20,000\
  \ 到–20,999 之间的任何数字；第二个参数是错误消息。\n\n请注意，查询包含`for update`子句。该进程需要锁定指定的 EMP 记录，直到它可以执行`update`语句，以确保在此期间记录无法被修改。\n\
  \n### 测试修订后的代码\n\n您可以像上一节那样测试此代码，从两个私密浏览器窗口运行该页面。在每个窗口中，选择相同的员工并点击`GetInfo`按钮。然后修改每个窗口中的项值，并点击`Update`按钮。第二次更新操作将不起作用；相反，APEX\
  \ 将显示如图 7-10 所示的错误消息。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig10_HTML.jpg](img/335103_3_En_7_Fig10_HTML.jpg)\n\
  \n图 7-10 避免丢失更新时出现的错误消息\n\n### 使用哈希函数\n\n尽管此修订代码有效，但该技术扩展性不佳。需要保存和比较所有原始值很繁琐，并且随着保存值数量的增加会变得更加繁琐。一种更简单的方法是将所有原始值组合成一个值；然后您可以保存并比较该单一值。首选技术是使用`hash\
  \ function`，它将一组值转换为一个单一的固定长度值，称为`checksum`。哈希函数还会混淆其输入，这使其可用于编码用户密码——如第 13 章将看到的。\n\
  \nAPEX 有一个内置的哈希函数，名为`apex_util.get_hash`。该函数的输入是一个包含您想要哈希的值的集合。您应该使用 APEX 内置类型`apex_t_varchar2`来保存此集合。作为一个说明性示例，考虑以下代码：\n\
  \n```\nv_vals   apex_t_varchar2 := apex_t_varchar2('CLERK', 20);\nv_result varchar2(1000)\
  \  := apex_util.get_hash(v_vals);\n```\n\n代码的第一行声明了一个类型为`apex_t_varchar2`的变量`v_vals`，并为其分配了由该类型的构造函数函数（也称为`apex_t_varchar2`）创建的集合。构造函数函数的参数是值`'CLERK'`和`20`。代码的第二行声明了一个类型为`varchar2(1000)`的变量`v_result`，并为其分配了`apex_util.get_hash`函数的结果。换句话说，变量`v_result`将包含值['CLERK',\
  \ 20]的哈希值。\n\n\n### 使用哈希函数增强数据完整性\n\n您应该使用此哈希函数来修订 `GetEmpInfo` 进程的代码，以便将三个可更新的值编码为单个哈希值。此哈希值随后保存在隐藏项\
  \ `P19_HASH`（您需要创建此项）中。此代码出现在清单 7-9 中（粗体行是新增的）。\n\n```sql\ndeclare\n  v_valuesToHash\
  \ apex_t_varchar2;\nbegin\n  -- 首先检索数据。\n  select Job, Sal, DeptNo\n  into :P19_UPDATE_JOB,\n\
  \       :P19_UPDATE_SAL,\n       :P19_UPDATE_DEPTNO\n  from EMP\n  where EmpNo =\
  \ :P19_UPDATE_EMPNO;\n\n  -- 然后保存这些值的哈希值。\n  v_valuesToHash := apex_t_varchar2(:P19_UPDATE_JOB,\n\
  \                                    :P19_UPDATE_SAL,\n                        \
  \            :P19_UPDATE_DEPTNO);\n  :P19_HASH := apex_util.get_hash(v_valuesToHash);\n\
  end;\n```\n清单 7-9 清单 7-4 的 `GetEmpInfo` 进程的第二次修订\n\n`UpdateEmp` 进程的代码也应进行重新修订，使其重新从数据库读取可更新值，计算其哈希值，并将该哈希值与保存的哈希值进行比较。此代码出现在清单\
  \ 7-10 中（粗体行是新增的）。\n\n```sql\ndeclare\n  v_valuesToHash apex_t_varchar2;\nbegin\n\
  \  -- 首先重新读取数据。\n  select apex_t_varchar2(Job, Sal, DeptNo)\n  into v_valuesToHash\n\
  \  from EMP\n  where EmpNo = :P19_UPDATE_EMPNO for update;\n\n  -- 然后将其与原始数据进行比较。\n\
  \  if :P19_HASH = apex_util.get_hash(v_valuesToHash)\n  then\n    -- 记录未更改，因此进行更新。\n\
  \    update EMP\n    set    Job    = :P19_UPDATE_JOB,\n           Sal    = :P19_UPDATE_SAL,\n\
  \           DeptNo = :P19_UPDATE_DEPTNO\n    where  EmpNo = :P19_UPDATE_EMPNO;\n\
  \  else\n    -- 记录已更改，因此中止。\n    raise_application_error(-20000,\n             \
  \               '记录已过期。请重新获取。');\n  end if;\nend;\n```\n清单 7-10 清单 7-3 的更新代码的第二次修订\n\
  \n尽管此代码实现了所需的功能，但它有些笨拙。本章末尾将重新审视此代码，届时您将看到如何使用验证来改进它。\n\n### 成功与错误消息\n\n更改数据库的进程应显示一条指示发生了什么的消息。再次考虑“修订后的员工数据录入”页面。如果员工报表仅包含少量记录，用户可以通过查看报表的变化来验证更新是否成功。但是，如果报表包含数千条记录，确定发生了什么就会困难得多。最好让进程显示诸如\
  \ **您的记录已被删除** 之类的消息。APEX 进程具有 `成功消息` 和 `错误消息` 属性，正是用于此目的。图 7-11 显示了 `Delete` 进程的这些属性值。\n\
  \n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig11_HTML.jpg](img/335103_3_En_7_Fig11_HTML.jpg)\n\
  \n图 7-11 成功和错误消息属性\n\n转到属性编辑器，为您的“销售佣金”和“修订后的员工数据录入”页面中的进程添加成功和错误消息。运行一个页面并进行一些更改。当页面重新呈现时，您指定的成功消息将被显示。（如果您有兴趣查看错误消息的实际效果，请修改进程的\
  \ PL/SQL 代码，使其引用一个不存在的表。）\n\n成功和错误消息可以包含 HTML 代码和项目引用。例如，假设您希望图 7-11 中的成功消息像 APEX\
  \ SQL 工作室中的 SQL 命令窗口那样，指明受影响的记录数。如何将受影响的记录数放入进程的成功消息中？\n\n解决方案是使用内置的 PL/SQL 函数 `SQL%RowCount`。如果您在执行\
  \ SQL 命令后调用此函数，它将返回受影响的记录数。因此，您应该修改 `DeleteEmp` 进程，将该值分配给一个隐藏项（称之为 `P19_DELETE_COUNT`），然后在消息正文中引用该项。`DeleteEmp`\
  \ 进程修订后的 PL/SQL 代码如清单 7-11 所示（粗体行是新增的）。\n\n```sql\nbegin\n  delete from EMP\n  where\
  \  EmpNo = :P19_DELETE_EMPNO;\n\n  :P19_DELETE_COUNT := SQL%RowCount;\nend;\n```\n\
  清单 7-11 修订清单 7-1 的 `DeleteEmp` 进程\n\n然后，您可以将图 7-11 中的成功消息文本更改为：\n\n```\n已删除 &P19_DELETE_COUNT.\
  \ 条记录。\n```\n\n请注意，对 `P19_DELETE_COUNT` 的引用在 PL/SQL 进程中使用了绑定变量语法，而在 HTML 消息中使用了替换字符串语法。\n\
  \n### 条件进程\n\n到目前为止，您编写的每个进程都有一个关联的按钮，您使用其 `按下按钮时` 属性来指定进程与其按钮之间的关联。这是使用进程的自然且典型的方式，通常也是您所需要的。\n\
  \n有两种情况下 `按下按钮时` 属性是不够的：当提交操作不是由按钮引起时，以及当进程与多个按钮相关时。以下小节将考虑这些情况。\n\n#### 通过项目提交\n\
  \n回想一下，某些类型的项目（即，单选组、选择列表、文本字段和密码字段）可以配置为执行提交操作。此类项目应该能够拥有一个关联的进程。问题在于，`按下按钮时` 属性没有提供选择项目的选项。\n\
  \n解决此难题的方法是放弃 `服务器端条件` 部分中的 `按下按钮时` 属性，转而使用其下方名为 `类型` 的属性（请参阅图 7-6）。该属性允许您显式指定进程应何时执行的条件。其选项与条件渲染的选项相同，在第\
  \ 6 章中描述。\n\n例如，让我们更改“修订后的员工数据录入”页面的“更新员工”区域，使其不再使用 `GetInfo` 按钮。图 7-12 显示了新区域的外观。现在，只需从选择列表中选择一名员工，就足以使所选员工的职位、薪水和部门自动显示。\n\
  \n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig12_HTML.jpg](img/335103_3_En_7_Fig12_HTML.jpg)\n\
  \n图 7-12 使用选择列表调用 `GetEmpInfo` 进程\n\n实现此行为的方法是首先修改选择列表，使其在更改时提交页面，然后修改 `GetEmpInfo`\
  \ 进程，使其在该提交发生时执行。对于第一个任务，将选择列表 `P19_UPDATE_EMPNO` 的操作修改为 `提交页面`，如图 7-13 所示。\n\n\
  ![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig13_HTML.jpg](img/335103_3_En_7_Fig13_HTML.jpg)\n\
  \n图 7-13 选择列表现在在更改时提交\n\n对于第二个任务，如图 7-14 所示，更改 `GetEmpInfo` 进程的 `服务器端条件` 属性。请注意，其\
  \ SQL 表达式利用了 APEX 变量 `REQUEST`，该变量保存执行提交操作的项目的名称。因为表达式是 SQL 表达式，所以它使用绑定变量符号引用该变量。该表达式将变量值与字符串\
  \ `'P19_UPDATE_EMPNO'`（不带冒号）进行比较，因为表达式感兴趣的是该项的*名称*，而不是它所持有的*值*。\n\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig14_HTML.jpg](img/335103_3_En_7_Fig14_HTML.jpg)\n\
  \n#### 图 7-14\n`GetEmpInfo` 进程的修订后条件\n\n完成后，您可以从页面中删除 `GetInfo` 按钮。\n\n### 多用途进程\n\
  无法利用 `按下按钮时` 属性的另一种情况是，一个进程适用于多个按钮时。本节包含两个与 `修订后的员工数据录入` 页面相关的示例。\n\n对于第一个示例，假设您想要记录对\
  \ `EMP` 表所做的所有更改。具体而言，每次点击 `删除`、`插入` 或 `更新` 按钮时，都应向名为 `EMPLOG` 的表中插入一条相应的记录。\n\n\
  用于创建 `EMPLOG` 的 SQL 语句出现在代码清单 7-12 中。您应该通过转到 SQL 工作坊并提交该语句来创建此表。请注意，表中的记录将描述更改请求、提出请求者以及请求时间。\n\
  \n```\ncreate table EMPLOG(Request varchar2(20),\nUserName varchar2(20),\nRequestDate\
  \ Date)\n```\n代码清单 7-12\n用于创建 `EMPLOG` 表的 SQL 代码\n\n设 `LogChanges` 为向 `EMPLOG` 插入记录的进程的名称。您应在\
  \ `修订后的员工数据录入` 页面中创建此进程，并为其提供代码清单 7-13 中的 PL/SQL 代码。\n\n```\nbegin\ninsert into\
  \ EMPLOG (Request, UserName, RequestDate)\nvalues (:REQUEST, :APP_USER, sysdate);\n\
  end;\n```\n代码清单 7-13\n`LogChanges` 进程的 PL/SQL 代码\n\n此代码引用了内置变量 `APP_USER` 和 `REQUEST`，这两个变量您之前都见过。变量\
  \ `APP_USER` 保存已登录用户的名称，而 `REQUEST` 保存执行提交操作的按钮或项的名称。因此，`LogChanges` 进程向 `EMPLOG`\
  \ 表插入一条记录，其中包含提交操作的来源、执行该操作的用户以及操作发生的日期。\n\n每次点击 `插入`、`删除` 或 `更新` 按钮时，此进程都需要执行，但从项\
  \ `P19_UPDATE_EMPNO` 中选择值时则不需要执行。显然，`按下按钮时` 属性在这里毫无用处，因为它只允许您选择单个按钮。\n\n解决方案是将进程的服务器端条件设置为图\
  \ 7-15 所示的 SQL 表达式。此表达式确保仅当点击名为 `插入`、`删除` 或 `更新` 的按钮时，进程才会触发。由于这些按钮中的每一个也都有自己的专用进程，因此点击其中任何一个按钮都将导致两个进程执行。进程将按其序列号顺序执行。\n\
  \n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig15_HTML.jpg](img/335103_3_En_7_Fig15_HTML.jpg)\n\
  \n#### 图 7-15\n`LogChanges` 进程的条件部分\n\n您可能在想，不需要一个单独的进程来执行日志记录；相反，您可以将日志记录代码附加到每个按钮的专用进程中。此策略有效，但不建议采用。问题在于这样做会复制日志记录代码，这意味着如果您想更改日志记录的工作方式（例如，向\
  \ `EMPLOG` 表添加新列或将 `RequestDate` 列更改为同时保存时间和日期），您将需要在三个地方进行更新。此外，如果您决定向页面添加新按钮，则必须记住从现有按钮中提取此日志记录代码，并将其添加到新按钮的进程中。采用一个可由多个按钮调用的独立进程要优雅和实用得多。\n\
  \n无法利用 `按下按钮时` 属性的进程的第二个示例涉及发送电子邮件。具体来说，假设您希望 `修订后的员工数据录入` 页面在检测到可疑修改时向数据库管理员发送电子邮件。让我们将可疑修改定义为在正常工作时间上午\
  \ 9 点至下午 5 点之外发生的删除或更新。要实现此功能，您需要做两件事：创建一个进程（称其为 `SendSuspiciousEmail`）来发送电子邮件，并指定其触发条件。\n\
  \n要创建该进程，您可以使用 APEX 的电子邮件发送函数 `apex_mail.send`。此函数可以接受多个参数，分别表示（除其他外）发件人和收件人地址、主题和邮件正文。进程的代码只需计算这些参数值并调用该函数。代码清单\
  \ 7-14 显示了我的代码。（当然，如果您想亲自尝试此代码，应将收件人更改为您自己的电子邮件地址。）\n\n```\ndeclare\nv_action varchar2(40);\n\
  begin\nif :REQUEST = 'Delete' then\nv_action := ' deleted the record for emp ' \
  \ || :P19_DELETE_EMPNO;\nelse\nv_action := ' modified the record for emp ' || :P19_UPDATE_EMPNO;\n\
  end if;\napex_mail.send(\np_from => 'EmployeeDemo@MyCompany.com',\np_to   => 'dba@MyCompany.com',\n\
  p_subj => 'Suspicious changes to EMP',\np_body => :APP_USER || v_action);\nend;\n\
  ```\n代码清单 7-14\n`SendSuspiciousEmail` 进程的代码\n\n此代码唯一值得注意的部分是它使用 `REQUEST` 变量来定制邮件正文，以提及执行的操作和受影响的员工记录。例如，如果用户\
  \ `boris@secret.org` 修改了总裁 `KING` 的记录内容，邮件正文将显示：\n\n```\nboris@secret.org modified\
  \ the record for emp 7839\n```\n\n当点击 `删除` 或 `更新` 按钮，并且当前时间（由 `current_timestamp`\
  \ 函数确定）早于上午 9 点或晚于下午 5 点时，此代码应执行。图 7-16 显示了此条件的 SQL 表达式。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig16_HTML.jpg](img/335103_3_En_7_Fig16_HTML.jpg)\n\
  \n#### 图 7-16\n`SendSuspiciousEmail` 进程的条件\n\n### 页面渲染进程\n到目前为止，本章中的所有进程都是在提交时执行的。本章的剩余部分将考虑在页面渲染期间执行的进程。当页面使用重定向而不是提交时，这种情况经常出现，例如从报告的行进行链接时。\n\
  \n例如，回顾第 3 章，交互式报告可以有一个链接列，点击行的链接列会在 `单行视图` 中显示该行的值（请参阅图 3-66 和 3-67）。`单行视图` 具有用于移动到表中上一行和下一行的按钮，以及另一个用于返回到报告视图的按钮。\n\
  \n\n## 单行视图页面\n\n员工演示应用程序的第 20 页被称为 `Single Row View`，如图 7-17 所示。该页面包含两个区域，其工作方式类似于交互式报表的单行视图。`Employees`\
  \ 区域是 `EMP` 记录的经典报表。用户可以通过点击其第一列中的链接来选择一行；APEX 会将该行的值放入 `Emp Info` 区域的项中。`Emp Info`\
  \ 区域有三个按钮：底部的箭头按钮选择上一个或下一个记录，顶部的 `Report View` 按钮将控制权传回报表。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig17_HTML.jpg](img/335103_3_En_7_Fig17_HTML.jpg)\n\
  \n图 7-17 单行视图页面\n\n尽管图 7-17 同时显示了 `Employees` 和 `Emp Info` 区域，但它们实际上永远不会以这种方式显示。`Employees`\
  \ 区域仅在没有选定记录时显示，而 `Emp Info` 区域仅在有选定记录时显示。\n\n当您尝试实现此页面时，会出现几个问题：`Emp Info` 区域中的项如何获取其值？页面如何知道是显示\
  \ `Employees` 区域还是 `Emp Info` 区域？箭头按钮是如何实现的？这些问题将在以下各节中讨论。\n\n### 无需提交即可执行进程\n\n\
  让我们首先考虑如何构建 `Employees` 区域。它是一个经典报表区域，具有以下源查询：\n\n```sql\nselect EmpNo, EName, Job,\
  \ Sal, DeptNo\nfrom EMP\norder by EName\n```\n\n您应将 `EmpNo` 列的类型设置为 `Link`。要配置此链接，请单击该列的\
  \ `Target` 属性以调出 `Link Builder` 向导屏幕。图 7-18 显示了我填写后的屏幕。它指定当选择链接时，APEX 将把名为 `P20_EMPNO`\
  \ 的项设置为选定的员工编号，并重定向到同一页面。为此，您当然需要将 `P20_EMPNO` 创建为隐藏项。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig18_HTML.jpg](img/335103_3_En_7_Fig18_HTML.jpg)\n\
  \n图 7-18 为 EmpNo 列配置链接\n\n现在考虑 `Emp Info` 区域。它应该有四个项和三个按钮。这些项命名为 `P20_ENAME`、`P20_JOB`、`P20_SAL`\
  \ 和 `P20_DEPTNO`。它们的类型均为 `Display Only`，因此无法修改。按钮命名为 `ReportView`、`Previous` 和 `Next`。`ReportView`\
  \ 定位在 `Above Region`，而 `Previous` 和 `Next` 定位在 `Below Region`；所有三个按钮都左对齐。\n\n`Previous`\
  \ 和 `Next` 按钮使用与交互式报表的单行模式中使用的按钮相同的图标。我选择在本区域中使用它们只是为了说明如何实现。图 7-19 显示了 `Previous`\
  \ 按钮的 `Appearance` 属性。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig19_HTML.jpg](img/335103_3_En_7_Fig19_HTML.jpg)\n\
  \n图 7-19 “上一个”按钮的外观部分\n\n要指定按钮应显示为图标，您可以将 `Button Template` 属性的值设置为 `Icon`，并将 `Icon`\
  \ 属性的值设置为所需图标文件的名称。您可以通过单击 `Icon` 属性右侧的快速选择符号并从显示的大量图标中选择来获取此文件名。单击 `Template Options`\
  \ 属性可以让您自定义按钮的外观。特别是，将 `Style` 属性设置为 `Remove UI Decoration` 会显示没有通常围绕按钮的矩形的图标。`Next`\
  \ 按钮的属性设置与 `Previous` 按钮相同，只是图标是向右的箭头。\n\n一旦构建了 `Emp Info` 区域，下一步就是编写一个进程来检索 `P20_EMPNO`\
  \ 中指定的员工的值，并将它们放入 `Emp Info` 的项中。转到页面编辑器的 `Processing` 选项卡，创建一个名为 `FetchRow` 的进程，其\
  \ PL/SQL 代码如清单 7-15 所示。此代码类似于清单 7-4，即 `Employee Data Entry` 页面上 `GetEmpInfo` 按钮关联的代码。\n\
  \n```sql\nbegin\nif :P20_EMPNO is not null then\nselect EName, Job, Sal, DeptNo\n\
  into :P20_ENAME, :P20_JOB, :P20_SAL, :P20_DEPTNO\nfrom EMP\nwhere EmpNo = :P20_EMPNO;\n\
  end if;\nend;\n```\n\n清单 7-15 FetchRow 进程的 PL/SQL 代码\n\n尽管此进程代码正确，但它的执行点错误。`Processing`\
  \ 执行点意味着进程在发生提交操作时执行。但 `Employees` 区域不执行提交；而是调用链接，而链接执行重定向。您需要的是进程在重定向发生后执行——即在页面渲染期间。\n\
  \n在页面设计器中单击 `FetchRow` 的节点，并查看其 `Execution Options` 部分。`Point` 属性指定了进程的执行点。图 7-20\
  \ 向您展示了可能的值。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig20_HTML.jpg](img/335103_3_En_7_Fig20_HTML.jpg)\n\
  \n图 7-20 可能的进程执行点\n\n如果一个进程的执行点是 `New Session`，它只会在会话开始时执行。从 `Before Header` 到 `After\
  \ Footer` 的执行点表示页面渲染的六个阶段；分配到其中一个点的进程将在指定的渲染阶段执行。执行点 `After Submit` 和 `Processing`\
  \ 是提交操作的两个阶段。如果您希望进程在验证阶段之前执行，则将其分配给 `After Submit` 点；如果您希望它在验证之后执行，则分配给 `Processing`。\n\
  \n尽管这些选项对于高级应用程序很有用，但许多执行点之间的差异很微妙，并且在大多数情况下无关紧要。就我们的目的而言，唯一有趣的区别在于在提交期间执行的进程和在渲染期间执行的进程之间。特别是，本书中的所有进程在页面渲染期间执行时都具有\
  \ `After Header` 执行点，而在提交期间执行时具有 `Processing` 执行点。\n\n现在将注意力转回 `FetchRow` 进程，并将其执行点更改为\
  \ `After Header`。您应该观察到该进程的节点将从处理树中消失并重新出现在渲染树中，如图 7-21 所示。这是合理的，因为渲染树包含页面渲染期间发生的所有内容，其中包括进程。此图还显示\
  \ `After Header` 执行点是一个**预渲染**点——也就是说，它在区域渲染之前发生。这很重要，因为它确保 `FetchRow` 将在页面项被渲染之前为它们赋值。\n\
  \n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig21_HTML.jpg](img/335103_3_En_7_Fig21_HTML.jpg)\n\
  \n图 7-21 FetchRow 现在是一个渲染进程\n\n\n`FetchRow` 进程会在页面每次渲染时被调用。但是，除非用户已选择了一行，否则让它去查询数据库是没有意义的——也就是说，它应该仅当\
  \ `P20_EMPNO` 非空时才执行其 SQL 语句。这正是清单 7-15 中 if 语句的目的。（一个同样好的等效解决方案是移除 if 语句，并更改进程的\
  \ `服务器端条件` 属性，使其仅在 `P20_EMPNO` 不为空时执行。）\n与其将 `FetchRow` 创建为提交进程然后再更改其执行点，不如直接将其创建为渲染进程更为简便。你只需在渲染树中右键单击\
  \ `After Header` 节点，然后选择 `创建进程`。\n\n### 在区域间切换\n在你应用程序的这个阶段，你应该验证点击 `Employees`\
  \ 报表上的链接是否能正确地将所选员工的值放入 `Emp Info` 的各项中。接下来的问题是要制定一个计划，让这些区域如何能“轮流”渲染自身。\n关键思路是认识到\
  \ `P20_EMPNO` 的非 `空` 值表示已选择了一行。因此，要“取消选择”一行，自然地应该将 `空` 值放入 `P20_EMPNO`。这样，两个区域便可以利用该项的值来决定它们的条件渲染——当该项值为\
  \ `空` 时，`Employees` 区域应可见；当值不为 `空` 时，`Emp Info` 区域应可见。换句话说，`P20_EMPNO` 的值决定了页面是处于\
  \ *报表模式* 还是 *单行模式*。\n这一思路也引出了实现 `ReportView` 按钮的自然方式。它应该简单地重定向到同一页面，并将 `P20_EMPNO`\
  \ 设置为 `空`。进行这些更改，并再次测试你的页面。点击报表中的一行应显示该员工的 `Emp Info` 区域，而点击 `Report View` 按钮应再次显示报表。\n\
  \n### 查找上一条和下一条记录\n最后一个问题是实现 `Previous` 和 `Next` 按钮，使得点击它们时，区域会显示报表中的上一条（或下一条）记录。本节考虑两种不同的实现此功能的方法。第一种方法更容易理解，但有一些局限性。第二种方法理解起来稍难一些，但优雅得多。\n\
  \n#### 方法一：分别为上一条和下一条使用不同进程\n考虑 `Previous` 按钮，它需要选择上一条记录。我们暂时假设“上一条记录”意味着拥有次低员工编号的记录。清单\
  \ 7-16 中的 PL/SQL 代码可以完成这项工作。\n\n```sql\ndeclare\n  v_prevEmp number(4,0);\nbegin\n\
  \  select max(EmpNo) into v_prevEmp\n  from EMP\n  where EmpNo < :P20_EMPNO;\n \
  \ if v_prevEmp is not null then\n    :P20_EMPNO := v_prevEmp;\n  end if;\nend;\n\
  ```\n*清单 7-16 方法一的“上一条”按钮简化代码*\n\nif 语句对于处理尝试获取第一个员工的上一条记录的情况是必需的。在这种情况下，查询将返回一个\
  \ `空` 值。如果没有 if 语句，按钮会将该 `空` 值放入 `P20_EMPNO`，这会导致取消选择行并返回到报表模式。通过使用 if 语句，从第一行点击\
  \ `Previous` 按钮将不会有任何效果。\n\n现在假设你想使用不同的列来确定上一条记录，例如 `EName`。前面的查询不容易扩展到这种情况。相反，你应该使用\
  \ SQL 分析函数 `lag`，它根据指定的排序顺序查找前一个值。清单 7-17 给出了相应的 PL/SQL 代码。\n\n```sql\ndeclare\n\
  \  v_prevEmp number(4,0);\nbegin\n  select PrevEmp into v_prevEmp\n  from (select\
  \ EmpNo, lag(EmpNo) over (order by EName) as PrevEmp\n        from EMP)\n  where\
  \ EmpNo = :P20_EMPNO;\n  if v_prevEmp is not null then\n    :P20_EMPNO := v_prevEmp;\n\
  \  end if;\nend;\n```\n*清单 7-17 方法一的“上一条”按钮 PL/SQL 代码*\n\n内部查询创建了一个包含两列员工编号的表，其中每个员工都与排序中紧接在其前面的员工配对。外部查询然后从该表中选择\
  \ `EmpNo` 值等于 `P20_EMPNO` 的行，并返回该记录的 `PrevEmp` 值。\n除了 `lag` 函数，SQL 还有 `lead` 函数，其行为方式相同，只是它返回排序顺序中的下一个更高值。此函数可用于实现\
  \ `Next` 按钮，其 PL/SQL 代码与清单 7-17 类似（因此省略）。\n因为 `Previous` 和 `Next` 按钮各自有自己的进程，你应该将它们的动作设置为\
  \ `提交`。你还应将每个进程配置为根据其按钮有条件地执行。虽然这不是此问题的最佳解决方案，但它运行良好，值得实现以查看其实际效果。\n\n#### 方法二：统一的“上一条/下一条”进程\n\
  方法一的缺点是，当 `Previous` 和 `Next` 按钮到达第一条或最后一条记录时，它们没有任何可见效果；对用户来说，它们似乎停止工作了。另一个想法是在按钮不适用时将其隐藏。为此，页面需要“向前查看”。也就是说，除了跟踪当前员工编号外，页面还需要跟踪上一个和下一个值。这样，如果上一个值为\
  \ `空`，它就可以隐藏 `Previous` 按钮，对 `Next` 按钮同理。\n\n要实现此方法，创建隐藏项 `P20_PREV` 和 `P20_NEXT`\
  \ 来保存上一个和下一个员工编号。然后，每当选择一条记录时，一个进程可以“向前查看”并将适当的值赋给这些项。这个名为 `FindPreviousNext` 的进程如清单\
  \ 7-18 所示。\n\n```sql\nbegin\n  if :P20_EMPNO is not null then\n    select PrevEmp,\
  \ NextEmp\n      into :P20_PREV, :P20_NEXT\n      from (select EmpNo,\n        \
  \           lag(EmpNo)  over (order by EName) as PrevEmp,\n                   lead(EmpNo)\
  \ over (order by EName) as NextEmp\n              from EMP)\n     where EmpNo =\
  \ :P20_EMPNO;\n  end if;\nend;\n```\n*清单 7-18 用于查找上一条和下一条值的 PL/SQL 代码*\n\n此代码与清单\
  \ 7-17 中的代码相似，区别在于它不特定于任何特定按钮。实际上，它必须在选择一行时执行，无论该选择是通过报表中的链接还是通过 `Previous` 或 `Next`\
  \ 按钮之一进行的。换句话说，`FindPreviousNext` 进程应该在页面渲染期间执行，就像 `FetchRow` 进程一样。\n\n因此，`Previous`\
  \ 和 `Next` 按钮的配置可以简单得多。考虑 `Previous` 按钮（`Next` 按钮类似）。因为 `P20_PREV` 保存着上一条记录的 `EmpNo`，你可以将按钮配置为在被点击时重定向，将\
  \ `P20_PREV` 的值放入 `P20_EMPNO`。参见图 7-22。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig22_HTML.jpg](img/335103_3_En_7_Fig22_HTML.jpg)\n\
  *图 7-22 配置“上一条”按钮的动作*\n\n你也可以使用 `P20_PREV` 和 `P20_NEXT` 来自定义何时显示 `Previous` 和 `Next`\
  \ 按钮。具体来说，当 `P20_PREV` 不为空时应显示 `Previous` 按钮，当 `P20_NEXT` 不为空时应显示 `Next` 按钮。这些条件可以使用条件渲染来表达。例如，图\
  \ 7-23 显示了 `Previous` 按钮的 `服务器端条件` 部分。\n\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig23_HTML.jpg](img/335103_3_En_7_Fig23_HTML.jpg)\n\
  \n**图 7-23**\n自定义“上一个”按钮的显示时机\n\n### 方案总结\n\n总结来说，方案 2 的实现“上一个/下一个”功能的方式如下：首先创建隐藏项\
  \ `P20_PREV` 和 `P20_NEXT`。然后创建名为 `FindPreviousNext` 的过程，它使用清单 7-18 的代码计算这两个项的值，并在页面呈现时执行。\n\
  \n最后，配置 `Previous` 和 `Next` 按钮，使其重定向到当前页面，并为 `P20_EMPNO` 赋值。`Previous` 按钮使用 `P20_PREV`\
  \ 的值，而 `Next` 按钮使用 `P20_NEXT` 的值。每个按钮都使用条件渲染，仅当其关联的项值不为 `null` 时才显示。\n\n结果是，整个页面由两个相对较小的过程组成：一个获取所选行的值，另一个计算上一条和下一条记录的雇员号。两个过程都在页面呈现时执行。用户可以通过点击报表链接或\
  \ `Previous`/`Next` 按钮来选择一行。无论哪种情况，页面都会确定所选记录的雇员号，将其保存到项 `P20_EMPNO` 中，并进行重定向，从而触发这两个过程的执行。整个过程无需任何提交操作。\n\
  \n## 单行更新\n\n报表模式/单行模式思想的另一个用途是支持数据录入。`Single Row Update` 页面阐述了这一思想。它是示例应用程序的第 21\
  \ 页，如图 7-24 所示。图中的三个区域是同时显示的，但实际上一次只显示一个区域。根据可见区域的不同，页面将处于报表模式、更新模式或插入模式。\n\n![../images/335103_3_En_7_Chapter/335103_3_En_7_Fig24_HTML.jpg](img/335103_3_En_7_Fig24_HTML.jpg)\n\
  \n**图 7-24**\n单行更新页面\n\n最初，页面以报表模式显示 `Employees` 区域。从那里，用户可以点击 `Insert` 按钮进入插入模式，或者点击某个\
  \ `Edit` 链接进入更新模式。\n\n在插入模式下，页面显示 `Insert Employee` 区域。该区域与 `Employee Data Entry`\
  \ 页面中的相应区域基本相同。它的 `Create` 按钮创建一个具有指定值的新 `EMP` 记录，然后清除各项的值，为下一次插入做准备。`Cancel` 按钮返回到报表模式。\n\
  \n在更新模式下，页面显示 `Update/Delete Employee` 区域。该区域的各项最初填充了所选雇员的信息。用户可以更改区域中的项值，然后点击 `Update`\
  \ 按钮来更新数据库。或者，点击 `Delete` 按钮会删除所选记录。删除记录后也会返回到报表模式，因为没有记录可再显示。点击 `Cancel` 按钮只是简单地返回到报表模式。\n\
  \n现在你了解了页面的工作原理，可以考虑如何实现每个区域了。以下小节将探讨这些问题。\n\n### 实现报表区域\n\n报表区域的实现与图 7-17 的 `Single\
  \ Row View` 页面基本相同。一个区别是它还有一个名为 `P21_MODE` 的隐藏项，用于区分三种模式。该项的值将是 `Report`、`Insert`\
  \ 和 `Update`（视情况而定），`null` 值表示报表模式。\n\n`EmpNo` 列被实现为一个链接。该链接重定向到第 21 页，并在重定向时设置两个项的值：`P21_EMPNO`\
  \ 设置为所选雇员号，`P21_MODE` 设置为 `Update`。`Insert` 按钮也会进行重定向，将 `P21_MODE` 设置为 `Insert`。该区域根据以下\
  \ SQL 表达式进行条件渲染：\n\n```\n:P21_MODE = ‘Report’ or :P21_MODE is null\n```\n\n### 实现插入区域\n\
  \n一条新的 `EMP` 记录有九个值，但用户只需指定其中五个。`Insert Employee` 区域为这五个值各设置了一个项。这些项被命名为 `P21_INSERT_ENAME`、`P21_INSERT_JOB`\
  \ 等。该区域还有两个按钮，分别名为 `Create` 和 `CancelInsert`。区域根据以下 SQL 表达式进行条件渲染：\n\n```\n:P21_MODE\
  \ = 'Insert'\n```\n\n`Create` 按钮执行提交操作。它有一个关联的过程，名为 `InsertEmp`，该过程执行两件事：执行一条 SQL\
  \ 插入命令，并将其项设置为 `null`。它对 `HireDate`、`Comm` 和 `Office` 使用默认值。其代码见清单 7-19。\n\n```\n\
  begin\ninsert into EMP(EName, Job, Mgr, Sal, DeptNo, HireDate, Comm, Offsite)\n\
  values (:P21_INSERT_ENAME,\n:P21_INSERT_JOB,\n:P21_INSERT_MGR,\n:P21_INSERT_SAL,\n\
  :P21_INSERT_DEPTNO,\ncurrent_date,  0,  'N');\n-- Clear the region's visible items.\n\
  :P21_INSERT_ENAME   := null;\n:P21_INSERT_JOB     := null;\n:P21_INSERT_MGR    \
  \ := null;\n:P21_INSERT_SAL     := null;\n:P21_INSERT_DEPTNO  := null;\n-- But do\
  \ not change the mode.\nend;\n```\n**清单 7-19**\nInsertEmp 过程的 PL/SQL 代码\n\n`CancelInsert`\
  \ 按钮进行重定向，将 `P21_MODE` 设置为 `Report`。\n\n### 实现更新/删除区域\n\n`Update/Delete Employee`\
  \ 区域中的各项由一个名为 `FetchRowForUpdate` 的过程填充，该过程在页面呈现时执行，并基于 SQL 表达式进行条件判断。\n\n```\n\
  :P21_MODE = 'Update'\n```\n\n该过程的代码见清单 7-20。该代码与清单 7-15 中的 `FetchRow` 过程基本相同，只是它还处理了丢失更新的问题。（此问题与\
  \ `Single Row View` 页面无关，因为该页面不执行任何更新。）它计算三个可修改项的哈希值，并将其保存在隐藏项 `P21_HASH` 中。\n\n\
  ```\ndeclare\nv_valuesToHash apex_t_varchar2;\nbegin\nif :P21_EMPNO is not null\
  \ then\n-- First, fetch the employee record and save its values.\nselect EName,\
  \ Job, Sal, DeptNo\ninto :P21_UPDATE_ENAME,\n:P21_UPDATE_JOB,\n:P21_UPDATE_SAL,\n\
  :P21_UPDATE_DEPTNO\nfrom EMP\nwhere EmpNo = :P21_EMPNO;\n-- Then save the hash of\
  \ the updatable values.\nv_valuesToHash := apex_t_varchar2(:P21_UPDATE_JOB,\n:P21_UPDATE_SAL,\
  \ :P21_UPDATE_DEPTNO);\n:P21_HASH := apex_util.get_hash(v_valuesToHash);\nend if;\n\
  end;\n```\n**清单 7-20**\nFetchRowForUpdate 过程的 PL/SQL 代码\n\n该区域的 `Delete` 按钮的 PL/SQL\
  \ 代码名为 `DeleteEmp`。它执行一条 SQL `delete` 命令，类似于清单 7-1，然后返回到报表模式。其代码见清单 7-21。\n\n```\n\
  begin\n-- First, delete the record.\ndelete from EMP\nwhere EmpNo = :P21_EMPNO;\n\
  -- Then return to report mode.\n:P21_EMPNO := null;\n:P21_MODE  := 'Report';\nend;\n\
  ```\n**清单 7-21**\nDeleteEmp 过程的代码\n\n`Update` 按钮的代码名为 `UpdateEmp`。它在确保没有丢失更新后，执行一条\
  \ SQL `update` 命令。该代码与 `Revised Employee Data Entry` 页面的更新代码基本相同（参考清单 7-10）。代码见清单\
  \ 7-22。\n\n\n```\ndeclare\nv_valuesToHash apex_t_varchar2;\nbegin\n-- 首先重新读取数据。\n\
  select apex_t_varchar2(Job, Sal, DeptNo)\ninto v_valuesToHash\nfrom EMP\nwhere EmpNo\
  \ = :P21_EMPNO for update;\n-- 然后与原始数据进行比较。\nif :P21_HASH = apex_util.get_hash(v_valuesToHash)\
  \ then\n-- 记录未更改，因此进行更新。\nupdate EMP\nset Job    = :P21_UPDATE_JOB,\nSal    = :P21_UPDATE_SAL,\n\
  DeptNo = :P21_UPDATE_DEPTNO\nwhere EmpNo = :P21_EMPNO;\nelse\n-- 记录已更改，因此中止。\nraise_application_error(-20000,\n\
  '记录已过期。请重新获取。');\nend if;\nend;\n清单 7-22\nUpdateEmp 过程的代码\n```\n\n总而言之，“单行更新”页面包含四个过程。其中三个过程在提交时执行；它们的职责是运行各自的插入、删除和更新\
  \ SQL 语句。第四个过程负责运行 SQL 查询以初始化区域的项；它在页面呈现时执行。\n\n## 总结\n\n过程是一种页面组件，它使您能够访问数据库并执行计算。本章探讨了过程在应用程序中所扮演的角色。例如，执行提交操作的按钮通常有一个关联的过程，该过程将在按钮被点击时执行。过程也可以配置为在页面呈现时执行，并计算项的初始值。\n\
  \n本章完全集中于 PL/SQL 过程。要指定 PL/SQL 过程的行为，您需要编写 PL/SQL 代码。PL/SQL 将 SQL 命令直接集成到通用编程语言中，这使得编写数据库感知代码变得容易。第\
  \ 10 章将探讨其他过程类型。\n\n尽管 PL/SQL 过程可能非常有用，但它们需要谨慎编码。本章探讨了一个常见的陷阱，称为**丢失更新问题**。您学习了如何识别该问题以及如何编写必要的\
  \ PL/SQL 代码来避免它。\n\n"
- '# 8. 数据验证


  当一个过程写入数据库时，它通常从会话状态中获取其值。因此，应用程序开发人员必须验证会话状态值是否有效，以确保过程被适当使用并保持数据库的完整性。本章探讨了有效会话状态的三个方面——约束保持、输入验证和过程验证——并展示了如何在
  APEX 应用程序中实现它们。


  ## 约束保持


  数据库的完整性很重要。不正确记录的存在不仅会降低涉及该记录的任何查询的价值；它还会降低整个数据库的价值——因为如果一个记录是错误的，用户会怀疑其他记录可能也是错误的。这样的数据库可能很快变得毫无用处。


  数据库系统用来保护自身的主要机制是约束。数据库管理员通常在创建表时指定约束。例如，`EMP` 表为其定义了以下四个约束：


  *   `EmpNo` 列是一个键，这确保没有两个员工具有相同的 `EmpNo` 值。

  *   `DeptNo` 列是 `DEPT` 的外键，这确保 `DeptNo` 的每个非 `null` 值都对应一个现有的 `DEPT` 记录。

  *   `Mgr` 列是 `EMP` 的外键，这确保 `Mgr` 的每个非 `null` 值都对应一个现有的 `EMP` 记录。

  *   `EmpNo` 值不能为空，这确保每个员工都有一个编号。


  让我们向数据库再添加两个约束：


  *   `EName` 值不能为空，这确保每个员工都有一个名字。

  *   `Sal` 值必须至少为 0，这可以防止出现无意义的薪资。


  您可以通过在 APEX SQL 工作坊中分别执行清单 8-1 中的两条 SQL 命令来定义这些约束。


  ```

  alter table EMP

  add constraint ValidName

  check (EName is not null)

  alter table EMP

  add constraint ValidSalary

  check (Sal >= 0)

  清单 8-1

  EMP 表的两个附加约束

  ```


  每当您编写一个更新数据库的 APEX 页面时，都必须注意其约束。为了研究这些问题，本章将使用“修订版员工数据录入”页面作为一个贯穿始终的例子。该页面在第 7 章讨论过，是“员工演示”应用程序的第
  19 页。


  使用此页面，尝试插入一个没有 `EName` 值的新员工。您将无法做到——数据库将拒绝插入，因为新记录将违反 `null` 值约束。APEX 会显示如图 8-1
  所示的错误消息。


  ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig1_HTML.jpg](img/335103_3_En_8_Fig1_HTML.jpg)


  图 8-1

  尝试违反约束的结果


  尽管数据库能够强制执行约束，但其错误消息并不令人满意。该消息没有帮助，给出了关于哪里出错的晦涩的系统级细节。它也没有告诉您是什么导致了错误或如何修复它。实际上，该消息留下了问题可能是由于系统错误（您无法控制）造成的可能性。


  因此，APEX 页面应始终预见到可能的约束违反尝试并自行处理。理想情况下，数据库永远不需要抛出其晦涩的约束违反消息，因为 APEX 会首先检测并处理违规。APEX
  有几个功能可以在这方面帮助您。让我们看看它们如何应用于前面的每个约束。


  如果允许用户为新员工选择 `EmpNo` 值，则可能发生对键约束的违反。处理此约束的最佳方法是不给用户这种选择。例如，“修订版员工数据录入”页面没有供用户输入员工编号的地方。相反，SQL
  插入命令从插入触发器自动获取新的 `EmpNo` 值，从而保证选择一个唯一的值。


  如果用户能够为 `DeptNo` 或 `Mgr` 输入不适当的值，则可能发生对外键约束的违反。“修订版员工数据录入”页面采用的解决方案是使用基于列表的项。基于列表的项的优势在于，您可以用您想要的确切值填充它，这意味着用户无法选择不合适的值。（注意：此说法适用于得到适当保护的应用程序。第
  13 章讨论了恶意用户如何从未受保护的基于列表的项中选择任意值。）


  如果用户没有向项 `P19_INSERT_ENAME` 中输入值，则可能发生对 `EName` 的 `null` 值约束的违反。此问题的解决方案是使用该项的 `值必需`
  属性，该属性位于其 `验证` 部分。如果您将此属性设置为 `开`，那么只要该项值为 `null`，APEX 就会拒绝提交页面。相反，APEX 将重新显示页面，并在该项下方显示错误消息，如图
  8-2 所示。此错误消息比图 8-1 中的好得多。


  ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig2_HTML.jpg](img/335103_3_En_8_Fig2_HTML.jpg)


  图 8-2

  处理尝试违反约束的更好方式


  最后，考虑 `Sal` 上的约束。项 `P19_INSERT_SAL` 是一个数字字段，其 `设置` 部分具有 `最小值` 和 `最大值` 属性。将最小值设置为
  `0`，并尝试插入一个薪资为负数的记录。APEX 将显示如图 8-3 所示的错误消息。




  ## 图片说明与约束错误


  ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig3_HTML.jpg](img/335103_3_En_8_Fig3_HTML.jpg)


  ### 图 8-3

  尝试违反数值约束的结果


  请注意，应用程序开发者无法指定这些错误消息。相反，APEX 使用一条标准消息，通过其标签引用有问题的项目。要指定你自己的错误消息，你可以使用验证，这将在下一节中讨论。


  除了显式约束外，数据库还有从每列类型产生的隐式约束。例如，`EName` 列的类型为 `varchar2(50)`，这意味着如果用户尝试存储一个超过 50 个字符的名字，就会发生约束违反。图
  8-4 显示了尝试插入一个具有 52 个字符名字的新员工时产生的错误消息。


  ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig4_HTML.jpg](img/335103_3_En_8_Fig4_HTML.jpg)


  ### 图 8-4

  向列值中塞入过多字符的结果


  同样，这样的错误消息是向用户提供反馈的一种不令人满意的方式。黑客经常尝试生成约束违反，并非因为他们期望它奏效，而是因为他们对错误消息感兴趣。图 8-4 中的消息泄露了存在一个
  `EMP` 表，该表有一个类型为 `varchar2(50)` 的 `ENAME` 列。


  幸运的是，有一个简单的方法可以避免这个问题。通过将文本字段的 `Maximum Length` 属性设置为 `50`，你可以保证文本字段无法容纳超过 50 个字符。如果用户尝试在文本字段中输入过多字符，APEX
  将忽略多余的字符。


  类似地，如果用户尝试为 `Sal` 或 `Comm` 插入非数值，也会发生约束违反。这个问题可以通过将它们实现为数字字段来避免。如果在页面提交时数字字段包含非数值，APEX
  将捕获错误并生成错误消息，而不是由数据库生成。图 8-5 和 8-6 显示了尝试插入具有非数字薪水的新记录时产生的错误消息。在图 8-5 中，我将项目 `P19_INSERT_SAL`
  更改为文本字段，因此约束错误由数据库捕获。在图 8-6 中，项目是一个数字字段，这允许 APEX 捕获错误。请注意，APEX 生成的错误消息要好得多。


  ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig6_HTML.jpg](img/335103_3_En_8_Fig6_HTML.jpg)


  ### 图 8-6

  APEX 为无效数字输入生成的错误消息


  ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig5_HTML.jpg](img/335103_3_En_8_Fig5_HTML.jpg)


  ### 图 8-5

  数据库为无效数字输入生成的错误消息


  虽然数字字段可以检查非数字输入，但它无法检查特定类型的数字。原因是 SQL 对于不准确的数字输入非常宽容。例如，清单 8-2 中的 SQL 命令是完全合法的。


  ```sql

  insert into EMP (EmpNo, DeptNo, Sal,

  EName, Job, Mgr, HireDate, Comm,  Offsite)

  values (8090.4, 29.6, 130.678,

  ''FRANK'', ''SALES'', 7839, current_date, 0, ''N'')

  ```

  **清单 8-2**

  不合适但合法的 SQL 命令


  `EmpNo`、`DeptNo` 和 `Sal`（加粗）的指定值是有问题的，因为 `EmpNo` 和 `DeptNo` 列被定义为整数，而 `Sal` 被定义为小数点后最多两位数字。然而，当
  Oracle 被要求将一个值存储到超过该列精度的数值列时，它会先将该值四舍五入到最近的合法值，然后再保存。（一些数据库系统改为截断该值。）因此，前面的插入命令创建了一个新员工，员工号为
  8090，部门为 30，薪水为 130.68。同样，在 `Revised Employee Data Entry` 页面中，如果用户输入 `130.678` 作为新记录的薪水值，APEX
  将顺利处理输入，而不会产生约束错误。


  ## 输入验证


  让我们重新思考 APEX 处理数字输入的方式。它的行为在技术上是正确的，但相当误导人。很可能用户输入带有小数点后超过两位数字的薪水，要么是打错了字（比如输入了
  `130.678` 而不是 `1306.78`），要么是不理解该字段的目的。无论哪种情况，如果 APEX 告知用户问题所在，而不是做出可能不正确的假设，那将会更好。


  通常，你希望 APEX 阻止用户输入不合适的值，即使它们是合法的。这里是 `Revised Employee Data Entry` 页面的三个更多例子：


  *   用户不应能够删除或修改职位为 `PRESIDENT` 的员工的记录。（假设此功能以其他方式执行。）

  *   用户不应能够输入高于总裁薪水的工资。

  *   对数据库的更改只应在上午 9 点到下午 5 点之间进行。


  APEX 应拒绝违反这些条件的请求，并告知用户该请求为何不合适。


  强制执行这些有效性检查的方法是在 APEX 中创建一个 *验证*。验证是在页面提交时执行的代码。如果验证失败，提交处理将停止，并且页面会重新显示，每个失败的验证都会有一条错误消息。如果所有验证都成功，则提交处理正常继续。


  要创建验证，请转到页面设计器的 `Processing` 选项卡，右键单击 `Validating` 节点，然后选择 `Create Validation`。APEX
  将创建一个名为 `New` 的默认验证，类型为 `PL/SQL Expression`。


  图 8-7 显示了一些可能的验证类型。`PL/SQL Expression` 验证在指定的 PL/SQL 表达式返回 `true` 时成功，`SQL Expression`
  验证同样如此。另外两个有用的验证类型是 `Rows returned` 和 `No Rows returned`。你通过一个 SQL 查询来指定这些验证。`Rows
  returned` 验证在查询至少返回一行时成功；`No Rows returned` 验证在查询不返回任何行时成功。


  ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig7_HTML.jpg](img/335103_3_En_8_Fig7_HTML.jpg)


  ### 图 8-7

  一些验证类型




  ## 验证


  无论您选择哪种验证类型，属性编辑器都会显示指定验证所需的属性。例如，`PL/SQL Expression` 类型有一个对应的文本区域用于输入表达式，这在图 8-7
  中可以部分看到。`Rows returned` 或 `No Rows returned` 验证有一个用于指定查询的文本区域。验证可以有条件地执行，这由其 `Server-side
  Condition` 属性决定。通常，验证以按钮为条件，因此您可以使用 `When Button Pressed` 属性，但也可以通过选择 `Type` 属性来指定任意条件。


  每个验证都必须有一个指定的错误消息。`Error` 部分包含相关属性。`Error Message` 属性包含错误消息的文本。`Display Location`
  指定消息将显示的位置：在错误通知中、在指定项目下方，或两者兼而有之。


  为了说明这些概念，让我们为本节开头提到的问题编写验证。图 8-8 显示了名为 `DontDeleteThePresident` 的验证的属性，该验证用于验证总统记录不被删除。此验证的类型为
  `No Rows returned`，其查询为：


  ```sql

  select * from EMP

  where EmpNo = :P19_DELETE_EMPNO

  and Job = ''PRESIDENT''

  ```


  此查询仅在所选员工的工作为 `PRESIDENT` 时才会返回一条记录，这意味着如果所选员工的工作不是 `PRESIDENT`，则验证将成功。


  ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig8_HTML.jpg](img/335103_3_En_8_Fig8_HTML.jpg)


  图 8-8 DontDeleteThePresident 验证


  类似地，您可以使用以下 `No Rows returned` 查询来编写验证 `InsertedSalaryNotTooLarge`，该验证确保 `P19_INSERT_SAL`
  中的值不大于总统的薪水：


  ```sql

  select * from EMP

  where Job = ''PRESIDENT'' and :P19_INSERT_SAL > Sal

  ```


  `DontDeleteThePresident` 验证应用于 `DELETE` 请求，而 `InsertedSalaryNotTooLarge` 应用于 `INSERT`
  请求。您还应该为 `UPDATE` 请求创建两个类似的验证，分别称为 `DontUpdateThePresident` 和 `UpdatedSalaryNotTooLarge`。这些验证的代码被省略了。


  为了验证数据库的更改只在标准工作时间内发生，您可以创建验证 `WorkingHoursOnly`，如图 8-9 所示。


  ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig9_HTML.jpg](img/335103_3_En_8_Fig9_HTML.jpg)


  图 8-9 WorkingHoursOnly 验证


  此验证使用 SQL 表达式来计算所需的时间间隔。请注意，此表达式独立于会话状态，因此错误消息将仅随通知一起显示。该验证以 `Insert`、`Delete` 和
  `Update` 按钮为条件。


  本节的最后一个示例涉及如何强制特定的数字格式。例如，`Sal` 列被定义为 `NUMBER(7,2)` 类型，这意味着工资值总共不超过七位数字，小数点右侧不超过两位数字。验证此条件的最佳方法是使用*正则表达式*，这是一种表示合法值集合的模式。在这种情况下，以下正则表达式将起作用：


  ```regex

  ^\d{0,5}\.{0,1}\d{0,2}$

  ```


  这里不深入探讨正则表达式，您应该知道字符 `^` 匹配字符串的开头，`\d` 匹配任何数字字符，`\.` 匹配小数点，`$` 匹配字符串的结尾。符号 `{m,n}`
  表示至少匹配 *m* 次、最多匹配 *n* 次前面的模式。因此，该正则表达式匹配最多 5 位数字，后跟 0 或 1 个小数点，再后跟 0 到 2 位数字。


  Oracle SQL 有内置函数 `regexp_like`，如果值匹配正则表达式，则返回 `true`。因此，验证可以通过图 8-10 中所示的 SQL 表达式来定义。


  ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig10_HTML.jpg](img/335103_3_En_8_Fig10_HTML.jpg)


  图 8-10 表达正则表达式验证的一种方式


  APEX 也有 `regular expression` 验证类型，它提供了一个直接输入正则表达式的地方。图 8-11 展示了它的用法。


  ![../images/335103_3_En_8_Chapter/335103_3_En_8_Fig11_HTML.jpg](img/335103_3_En_8_Fig11_HTML.jpg)


  图 8-11 表达正则表达式验证的另一种方式


  ## 约束验证


  本章开头讨论了 APEX 属性如何帮助强制执行约束。然而，在有些情况下这些属性并不足够。例如，图 8-2 展示了如何使用项目的 `Value Required`
  属性来强制执行 `null` 值约束。但是，如果页面包含多个区域，每个区域都有自己的提交按钮，则此技术将无法正常工作。`Revised Employee Data
  Entry` 页面就是一个例子。如果 `P19_INSERT_ENAME` 的 `Value Required` 值为 `Yes`，那么即使点击 `Delete`
  或 `Update` 按钮，该限制也会被执行。因此，您将无法在不向 `P19_INSERT_ENAME` 输入虚拟值的情况下删除或更新记录。


  这个问题可以通过使用验证来强制执行 `null` 值约束来解决。该验证将以 `Insert` 按钮为条件，并具有以下 SQL 表达式：


  ```sql

  :P19_INSERT_ENAME is not null

  ```


  您还可以使用验证来验证外键约束。例如，`Revised Employee Data Entry` 页面使用选择列表来限制新员工的可能部门。假设相反，您希望用户在数字字段中输入部门编号。为了强制执行外键约束，您只需确保指定的数字在
  `DEPT` 表中。解决方案是创建一个具有以下 `Rows returned` 查询的验证，该查询以 `Insert` 按钮为条件：


  ```sql

  select * from DEPTNO

  where DeptNo = :P19_INSERT_DEPTNO

  ```


  最后，每当您希望 APEX 显示自定义错误消息时，都应该使用验证。例如，当您尝试为 `EName` 插入 `null` 值时，APEX 会显示标准错误消息“`Fill
  out this field`”，如图 8-2 所示。如果您使用验证来测试约束，它可以显示您想要的任何错误消息，例如“`An employee must have
  a name`”。


  ## 过程验证


  第 7 章研究了以下避免丢失数据库更新的算法：在更新操作更改数据库之前，它首先检查相关值是否已更改；如果是，则操作中止。该部分开发的代码通过调用函数 `raise_application_error`
  来中止操作，该函数显示了图 7-10 中的错误消息。鉴于验证提供了一种更简洁的方式来处理错误场景，很自然会想验证是否也可以在这种情况下使用。答案是肯定的。


  回想一下清单 7-10 中 `Update` 按钮的代码。该代码可以分为两部分：第一部分重新读取数据并与原始值进行比较，第二部分根据比较结果执行更新或中止。第一部分本质上是一个验证。第二部分中的更新是一个以验证成功为条件的过程。




  因此，您可以重写 `更新` 过程的代码，将第一部分移至验证中。该过程的代码就变成一个简单的更新，如同最初在 清单 7-3 中编写的那样：


  ```

  begin

  update EMP

  set Job    = :P19_UPDATE_JOB,

  Sal    = :P19_UPDATE_SAL,

  DeptNo = :P19_UPDATE_DEPTNO

  where EmpNo = :P19_UPDATE_EMPNO;

  end;

  ```


  然后，您创建一个验证来体现前半部分代码。由于该验证需要执行 PL/SQL 代码，其类型需要是 `PL/SQL 函数体（返回布尔值）` —— 即，返回 `TRUE`
  或 `FALSE` 的 PL/SQL 代码。此代码出现在 清单 8-3 中。


  ```

  declare

  v_valuesToHash apex_t_varchar2;

  begin

  -- first re-read the data

  select apex_t_varchar2(Job, Sal, DeptNo)

  into v_valuesToHash

  from EMP

  where EmpNo = :P19_UPDATE_EMPNO for update;

  -- then compare it with the original data

  if :P19_HASH = apex_util.get_hash(v_valuesToHash) then

  return TRUE;

  else

  return FALSE;

  end if;

  end;

  清单 8-3

  用于检测丢失更新的验证代码

  ```


  该验证以 `更新` 按钮为条件，其错误消息是 “`记录已过期。请重新获取`”。结果是，只有当验证成功时，`更新` 过程才会执行。如果验证失败，错误消息将显示在
  `员工数据录入` 页面上。


  ## 总结


  本章探讨了防止用户无意中误用 Web 应用程序的方法。首先考虑了数据库约束。您看到了如何通过适当选择的项类型来避免潜在问题。例如，基于列表的项类型可以避免外键约束违规。您还研究了诸如必填值、最小/最大数值等项属性，这些可以避免或检测约束违规。

  接着，本章讨论了 APEX 验证的使用。验证是一种 APEX 组件，其目的是中止不适当的提交操作。验证提供了一种灵活、通用的约束处理方式。它们可以为约束违规显示自定义错误消息，并可用于有选择地检查约束违规。除了约束违规检查外，它们还可用于检查不适当的用户活动。

  最后，本章重新审视了 第 7 章中用于检查潜在丢失更新的代码。您看到了如何使用验证将丢失更新测试代码与更新数据库的代码分离开来，这带来了更清晰的设计和更好的错误处理。


