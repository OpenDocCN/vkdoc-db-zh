- "# 9. 分支\n\n当 APEX 服务器从浏览器接收到提交请求时，它会执行与该请求关联的验证和处理。其最终任务是选择要发送到浏览器的目标页面。默认情况下，APEX\
  \ 选择被提交的页面，但也可以通过创建 *分支* 来指定另一个页面。\n到目前为止，您在不使用分支的情况下就能完成本书的学习，是因为在页面上创建多个区域非常容易，并且这些区域可以有条件地渲染，从而产生多个页面的效果。但在许多情况下，应用程序将使用多个页面来实现用户活动。本章将研究使用分支来支持这些情况。\n\
  \n## 将输入与输出分离\n\n一种常见的应用程序设计技术是为输入和输出使用单独的页面。用户在一个页面上输入内容并单击按钮；然后应用程序分支到另一个显示输出的页面。\n\
  作为此技术的示例，考虑图 9-1 和 9-2 所示的两个页面。这两个页面各有一个区域，其工作方式类似于第 6 章中的双区域 `按职位和部门筛选` 页面。具体来说，用户从图\
  \ 9-1 所示的 `筛选与分支` 页面开始，从选择列表中选择职位和部门，然后单击按钮。系统随后分支到图 9-2 的 `筛选后的员工` 页面，该页面显示具有该职位且属于该部门的员工报告。\n\
  \n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig2_HTML.jpg](img/335103_3_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2\n筛选后的员工页面\n\n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig1_HTML.jpg](img/335103_3_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1\n筛选与分支页面\n\n让我们研究如何实现这些页面。`筛选与分支` 页面将是 `员工演示` 应用程序的第 22 页。其区域标题为 `选择值`，类型为\
  \ `静态内容`。它有两个选择列表，分别名为 `P22_JOB` 和 `P22_DEPTNO`。这些选择列表的值列表由与第 6 章相同的 SQL 查询指定。具体来说，`P22_JOB`\
  \ 的查询是\n\n```\nselect distinct Job as DisplayVal, Job as ResultVal\nfrom EMP\norder\
  \ by DisplayVal\n```\n\n而 `P22_DEPTNO` 的查询是\n\n```\nselect DName, DeptNo\nfrom DEPT\n\
  order by DName\n```\n\n`筛选后的员工` 页面是演示的第 23 页，其区域是一个经典报告。其源查询（与您在 第 6 章看到的也相似）如下：\n\
  \n```\nselect EmpNo, EName, Job, Sal, DeptNo\nfrom EMP\nwhere (:P22_JOB is null\
  \  or  Job = :P22_JOB)\nand   (:P22_DEPTNO is null  or  DeptNo = :P22_DEPTNO)\n\
  order by EName\n```\n\n每个页面都有一个按钮。`筛选与分支` 页面上的 `提交` 按钮将执行提交操作，以将其两个项值保存在会话状态中。`筛选后的员工`\
  \ 页面上的 `返回` 按钮可以直接重定向回第 22 页，因为它不需要提交。\n`筛选与分支` 页面将在导航菜单中有一个条目。而 `筛选后的员工` 页面则不会，因为访问该页面的唯一方式应该是通过\
  \ `筛选与分支` 页面。这种情况是普遍存在的——当一个交互被分解到多个页面时，通常只有交互的第一页可以从导航菜单访问。\n还有两个尚未讨论的实现问题：如何自定义\
  \ `筛选后的员工` 页面的区域标题，以及如何让第 22 页在提交时重定向到第 23 页？每个问题将依次讨论。\n首先考虑 `筛选后的员工` 区域。使用单独页面进行输出的一个缺点是输入不再可见。图\
  \ 9-2 中的设计策略是在区域的标题栏中重述输入。让我们研究如何实现此功能。\n回想一下，区域的 `标题` 属性是 HTML 代码。虽然 HTML 代码无法执行计算，但它可以引用项的值。因此，技术是编写一个过程来计算区域标题并将其保存在一个隐藏项中。清单\
  \ 9-1 给出了该过程的代码。此代码考虑了两个项为空或不为空的四种情况，适当地计算区域标题，并将其保存在隐藏项 `P23_REGION_TITLE` 中。\n\
  \n\n\n## 9.1 分支\n\n## 代码清单 9-1\n自定义“筛选的员工”区域的标题\n\n```\ndeclare\nv_title varchar(100);\n\
  begin\nif :P22_JOB is not null and :P22_DEPTNO is not null\nthen\nv_title := 'Job='\
  \ || :P22_JOB  || ' and Dept=' || :P22_DEPTNO;\nelsif :P22_JOB is not null then\n\
  v_title := 'Job=' || :P22_JOB;\nelsif :P22_DEPTNO is not null then\nv_title := 'Dept='\
  \ || :P22_DEPTNO;\nelse\nv_title := 'All Employees';\nend if;\n:P23_REGION_TITLE\
  \ := 'Filter by ' ||  v_title;\nend;\n```\n\n这个过程属于页面 22，并且取决于`Submit`按钮。`Filtered\
  \ Employees`区域的 HTML 表达式随后变为对那个隐藏项目的引用。具体来说，区域标题是 HTML 表达式“`&P23_REGION_TITLE.`”。注意，该表达式使用替换字符串语法来引用该项目。\n\
  \n## 创建分支\n\n要让页面 22 重定向到页面 23，你需要创建一个*分支*对象。分支对象类似于过程，因为它也是响应提交而执行操作。区别在于过程执行代码，而分支重定向到某个页面。分支通常在所有过程执行完毕后最后执行。\n\
  \n创建分支与创建过程类似。首先转到页面设计器的`Processing`选项卡。右键单击标记为`After Processing`的节点，然后选择`Create\
  \ Branch`。APEX 将创建一个未命名的分支，其属性如图 9-3 所示。\n\n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig3_HTML.jpg](img/335103_3_En_9_Fig3_HTML.jpg)\n\
  图 9-3\n新创建分支的属性\n\n你应该为分支命名。但还需要做什么呢？图 9-3 中显示的两个重要属性是`Point`和`Type`；它们的默认值指定该分支将在所有进程之后执行，并重定向到指定的页面或\
  \ URL。这些默认值几乎总是你想要的，你应该保持它们不变。\n\n唯一需要你关注的属性是`Target`。此属性显示错误，表明你需要指定分支的目标。点击该属性的`Target`属性会打开`Link\
  \ Builder`向导。图 9-4 显示了该向导，配置为重定向到页面 23。\n\n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig4_HTML.jpg](img/335103_3_En_9_Fig4_HTML.jpg)\n\
  图 9-4\n使用链接构建器指定分支目标\n\n分支还有一个`Server-side Condition`部分，用于指定何时执行分支。与过程类似，每个分支通常关联一个按钮，你在`When\
  \ Button Pressed`属性中指定该按钮。`Filter and Branch`演示页面中的分支应该与`Submit`按钮关联，并且没有其他条件。\n\
  \n## 条件分支\n\n在第 7 章中，你创建了`Employee Data Entry`页面（如图 7-5 所示）和`Single Row Update`页面（如图\
  \ 7-24 所示）。这些页面具有相似的功能——它们都允许用户插入、删除和更新`EMP`表——但它们使用截然不同的界面来实现。特别是，`Employee Data\
  \ Entry`页面非常宽泛；它同时显示所有报告和更新区域。另一方面，`Single Row Update`页面很紧凑，一次只显示一个区域。\n\n让我们构建一个帮助用户决定使用哪个页面的页面。这个页面称为`Preference\
  \ Chooser`，是演示应用程序的第 24 页，如图 9-5 所示。该页面有一个区域，向用户提出两个问题。用户回答这些问题并点击按钮；如果第一个答案是`No`或第二个答案是`Yes`，按钮将分支到页面\
  \ 17（`Employee Data Entry`页面），否则分支到页面 21（`Single Row Update`页面）。\n\n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig5_HTML.jpg](img/335103_3_En_9_Fig5_HTML.jpg)\n\
  图 9-5\n带有条件分支的页面\n\n你可以如下实现此页面：两个单选按钮组名为`P24_COMPACT`和`P24_SEE_TABLE`，具有静态值列表{`No`,\
  \ `Yes`}。\n\n该按钮执行提交操作。直观上，你可能会认为按钮决定分支到哪个页面。但分支的工作方式并非如此；相反，你需要创建两个分支对象，每个对象都以该按钮为条件。每个分支还将有一个额外的条件。重定向到页面\
  \ 17 的分支对象具有以下条件：\n\n```\n:P24_COMPACT = 'No' or :P24_SEE_TABLE = 'Yes'\n```\n\n\
  重定向到页面 21 的分支对象具有以下条件：\n\n```\n:P24_COMPACT = 'Yes' and :P24_SEE_TABLE = 'No'\n\
  ```\n\n当按钮执行提交时，只有一个条件会被满足。满足条件的分支将执行其重定向。\n\n## 向导式界面\n\n分支的最后一个例子也与数据输入问题相关。在第\
  \ 7 章的每个数据输入页面中，用户通过在某些项目中输入所需值然后点击插入按钮来创建新记录。这样的设计假设用户手头有这些值。另一种设计是创建一系列页面，引导用户完成数据输入过程，就像\
  \ APEX 中的向导一样。该设计将包含四个页面。\n\n用户将从`Basic Info`页面开始（参见图 9-6），输入新员工的姓名、职位、部门和工资。最常见的情况是员工在当天被雇用，因此有一个针对该情况的复选框。然后用户点击`Continue`按钮提交页面。\n\
  \n![../images/335103_3_En_9_Chapter/335103_3_En_9_Fig6_HTML.jpg](img/335103_3_En_9_Fig6_HTML.jpg)\n\
