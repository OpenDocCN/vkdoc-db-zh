- '# 2. 应用程序与页面


  本章开始介绍 APEX 应用程序构建器。你将学习创建应用程序和页面的基本工具——特别是“创建应用程序”向导和“创建页面”向导——并使用它们来构建一个可以从任何浏览器运行的多页面应用程序。你还将看到如何使用
  APEX 页面设计器来修改应用程序中页面的属性。虽然这些页面目前没有实质内容，但本章介绍的技术为后续章节的内容创建技术提供了基础。



  ## 创建应用程序


  ### 访问应用构建器


  要使用应用构建器，您需要进入其主屏幕。图 1-2 展示了两种方法：您可以点击 APEX 菜单栏中的 `App Builder` 选项卡，也可以点击 APEX 主屏幕上的大型
  `App Builder` 按钮。两种方式都会带您进入如图 2-1 所示的屏幕。


