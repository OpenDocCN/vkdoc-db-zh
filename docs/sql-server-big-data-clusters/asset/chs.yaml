  ## 箱线图解读


  与直方图类似，箱线图以图形方式展示数据的分布情况。箱线图（也称为箱须图）相比直方图能提供更多关于数据分布的细节。箱线图的“箱体”称为四分位距（IQR），包含了我们数据中间的
  50%。在我们的例子中，可以看到价格数据中间的 50%大约在 7,500 到 17,500 之间。IQR 下方的线（或须）显示了数据底部的 25%，而 IQR
  上方的须则显示了顶部的 25%。顶部须上方的圆圈显示了数据集中的离群值，在本例中用于标示价格高于 `1.5 * IQR` 的汽车。离群值可能对平均价格产生巨大影响，值得调查以确保它们不是错误。最后，IQR
  内部的绿色条表示 `price` 列的平均值。


  ## 比较多个箱线图


  箱线图常用于比较多个数据集之间的数据分布。我们也可以在 PySpark 笔记本中通过设置 `matplotlib` 库的 `subplot()` 函数来实现这一点。我们为
  `subplot()` 设置的参数决定了 `subplot()` 函数之后的图应显示的位置（以行和列表示）。在清单 6-37 的例子中，`price` 列的箱线图显示在位置
  `1,2,1`，即 1 行、2 列、第一列。马力的图显示在 1 行、2 列、第二列的位置，从而有效地将两个箱线图并排绘制（图 6-38）。


  ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig38_HTML.jpg](img/480532_2_En_6_Fig38_HTML.jpg)


  图 6-38：两个不同的箱线图并排显示


  ```python

  %matplotlib inline

  # Boxplots are frequently used to compare the distribution of datasets

  # We can plot multiple boxplots together and return them as one image using the
  following code

  import matplotlib.pyplot as plt

  plt.subplot(1, 2, 1)

  pd_data frame.price.plot.box()

  plt.subplot(1, 2, 2)

