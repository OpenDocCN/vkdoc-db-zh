  到目前为止，我们一直专注于从数据框中获取数据。然而，也可能存在你想要从数据框中删除一行，或者更新某个特定值的情况。一般来说，在 Spark 数据框中更新值并不像，例如，在
  SQL 中写一条 UPDATE 语句那样直接，后者会直接更新实际表中的值。在大多数情况下，在数据框内部更新行涉及创建某种映射数据框，并将原始数据框与该映射数据框连接，然后将其存储为一个新的数据框。这样，你的最终数据框就包含了更新。


  简单来说，你对要更新的数据执行选择（如图 `6-13` 所示），并返回要更新的行的更新值，然后将其保存到一个新的数据框中，如代码清单 `6-13` 的示例代码所示。


  ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig13_HTML.jpg](img/480532_2_En_6_Fig13_HTML.jpg)


  图 6-13

  将值从 Jackson 更新为 Cody


  ```

  '
- '# 更新一行

  '
- '# 我们需要从 pyspark.sql.functions 导入 col 和 when 函数

  from pyspark.sql.functions import col, when

  '
- '# 选择整个数据框，但在 IATA_CODE = "COD" 的地方，将 CITY 值设置为 "Cody" 而不是 "Jackson"

  '
- '# 将结果存储在新的 df_airports_updated 数据框中

  df_airports_updated = df_airports.withColumn("CITY", when(col("IATA_CODE") == "COD",
  "Jackson"))

  '
- '# 返回结果，过滤 IATA_CODE == "COD" 的行

  df_airports_updated = df_airports_updated.filter(df_airports_updated.IATA_CODE ==
  ''COD'').show()

  代码清单 6-13

  在数据框上执行多个操作

  ```


