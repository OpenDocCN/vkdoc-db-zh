  ## 使用 Spark 数据框


  现在我们有了数据，也有了一个 notebook，我们要做的是将 CSV 数据加载到一个数据框（data frame）中。可以将数据框想象为在 Spark 内部创建的一种类似表格的结构。从概念上讲，数据框等同于
  SQL Server 中的表格，但与通常存储在单台计算机上的表格不同，数据框由分布在（潜在地）Spark 集群中所有节点上的数据组成。


  将“airports.csv”文件中的数据加载到 Spark 数据框中的代码见清单 6-3。您可以将代码复制到 notebook 的一个单元格中。本章中展示的所有示例代码最好作为
  notebook 中独立的单元格使用。包含所有代码的完整示例笔记本可在本书的 GitHub 页面上找到。


  ```python

  '
- '# 从 HDFS 导入 airports.csv 文件 (PySpark)

  df_airports = spark.read.format(''csv'').options(header=''true'', inferSchema="true").load(''/Flight_Delays/airports.csv'')

  ```


  **清单 6-3** 将 CSV 数据导入数据框


  如果一切顺利，您应该会得到一个包含来自 airports.csv 文件数据的 Spark 数据框。


  从示例代码中可以看出，我们向 `spark.read.format` 命令提供了许多选项。最重要的一个是我们正在读取的文件类型；在我们的例子中，这是一个 CSV
  文件。我们提供的其他选项告诉 Spark 如何处理该 CSV 文件。通过设置选项 `header=''true''`，我们指定 CSV 文件有一个包含列名的标题行。选项
  `inferSchema=''true''` 帮助我们自动检测每一列中使用的数据类型。如果我们不指定此选项，或者将其设置为 false，所有列都将被设置为字符串数据类型，而不是我们期望的数据类型（例如，数值数据的整数数据类型）。如果您不使用
  `inferSchema=''true''` 选项，或者 `inferSchema` 配置了错误的数据类型，则必须在导入 CSV 文件之前定义模式，并将其作为选项提供给
  `spark.read.format` 命令，如清单 6-4 的示例代码所示。


  ```python

  '
- '# 手动设置模式并提供给 spark.read 函数

  '
- "# 我们需要导入 pyspark.sql.types 库\nfrom pyspark.sql.types import *\ndf_schema = StructType([\n\
  \    StructField(\"IATA_CODE\", StringType(), True),\n    StructField(\"AIRPORT\"\
  , StringType(), True),\n    StructField(\"CITY\", StringType(), True),\n    StructField(\"\
  STATE\", StringType(), True),\n    StructField(\"COUNTRY\", StringType(), True),\n\
  \    StructField(\"LATITUDE\", DoubleType(), True),\n    StructField(\"LONGITUDE\"\
  , DoubleType(), True)\n])\n"
- '# 模式声明后，我们可以将其提供给 spark.read 函数

  df_airports = spark.read.format(''csv'').options(header=''true'').schema(df_schema).load(''/Flight_Delays/airports.csv'')

  ```


