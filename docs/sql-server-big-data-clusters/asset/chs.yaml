  \ 200 个分区。在“任务：成功/总计（Tasks: Succeeded/Total）”列中，你可以看到返回的那个数字。\n如果我们进一步深入这个阶段的详细信息，点击“描述”列中的链接，我们会收到另一个页面，该页面向我们确切展示了该特定阶段的数据处理方式。虽然这个页面提供了丰富的信息，包括事件时间线、另一个\
  \ `DAG` 可视化图，以及所有 200 个步骤（在此级别上也称为任务）的摘要指标，但我主要想关注页面底部的表格，该表格返回了此阶段下 200 个任务的处理信息。\n\
  如果我们按“洗牌读取/记录数（Shuffle Read / Records）”列对表格进行降序排序，我们就可以确切地看到每个任务从每个分区读取了多少条记录，以及从哪台主机读取的，如图\
  \ 6-57 所示。该图显示了处理行的总共 14 个任务中的前几个任务（其余 186 个分区是空的；因此没有从它们处理行）。\n\n![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig57_HTML.jpg](img/480532_2_En_6_Fig57_HTML.jpg)\n\
  图 6-57\n计数步骤下发生的任务，按洗牌读取大小/记录数排序\n\n从图 6-57 的结果中，我们立即也能看出按列值设置分区的一个缺点。最大的分区包含的行数（1,261,855）远多于最小的分区（61,903），这意味着我们将执行的大多数操作都会发生在包含最大分区的\
  \ Spark 工作节点上。理想情况下，你应该使分区尽可能均匀，并以这种方式分布，使得工作能均匀地分散在你的 Spark 工作节点上。\n\n## 总结\n\n\
  在本章中，我们详细探讨了在 SQL Server 大数据集群中可用的 Spark 架构内处理数据的方法。\n\n除了探索用于在 Spark 内处理数据帧的编程语言\
  \ PySpark，我们还研究了像数据可视化这样的更高级方法。最后，通过查看执行计划、缓存和分区，我们浅析了 Spark 数据帧处理的内部机制，同时介绍了能提供关于\
  \ Spark 如何处理数据帧的丰富信息的 Yarn Web 界面。\n\n现在，所有这些数据都已存放在我们的大数据集群中，让我们继续学习第 7 章，来看看大数据集群环境中的机器学习吧！\n\
  \n## 7. 大数据集群上的机器学习\n\n在之前的章节中，我们花了大量时间探讨如何通过 Spark 查询存储在 SQL Server 实例或 HDFS 中的数据。能够访问不同格式存储的数据的一个优势在于，它允许你在大规模、分布式的环境中进行数据分析。我们可以在大数据集群中利用的一个更强大的选项是，能够在我们的数据上实施机器学习解决方案。因为大数据集群允许我们以各种格式和大小存储海量数据，所以跨所有这些数据来训练和使用机器学习模型变得容易得多。\n\
  \n在许多涉及机器学习的工作场景中，将构建模型所需的所有数据汇集到一处的挑战占据了大部分工作。如果你能直接访问所需的所有数据，而无需将其从不同数据源移动到一个地方，那么构建机器学习模型（在数据科学领域通常称为训练）就会变得容易得多。除了能从单点访问数据外，大数据集群还允许你在数据驻留的同一位置将你的机器学习模型投入实际运营。这意味着，从技术上讲，你可以使用你的机器学习模型来为存储在大数据集群内的新数据进行评分。这极大地提升了在组织内部实施机器学习的能力，因为大数据集群让你能够在一个解决方案中训练、利用和存储机器学习模型，而无需为执行组织高级分析平台中的特定操作而部署各种平台。\n\
  \n在本章中，我们将更深入地研究大数据集群中可用的各种选项，用于训练、存储和部署机器学习模型。一般来说，我们将涵盖两个方向：SQL Server 内置的数据库内机器学习服务，以及基于\
  \ Spark 平台的机器学习。这两个领域涵盖不同的用例，但也存在重叠。正如你在前一章所见，如果需要，我们可以轻松地将存储在 SQL Server 实例中的数据引入\
  \ Spark，反之亦然。在这种情况下，选择在哪个领域执行你的机器学习过程，更多地基于你个人偏好使用哪种解决方案。我们将在本章的各个章节中讨论大数据集群内这两个机器学习平台的各种技术优势和劣势。这将使你更好地理解每个解决方案的工作原理，并希望能帮助你选择最适合你需求的方案。\n\
  \n## SQL Server 内置数据库内机器学习服务\n\n随着 SQL Server 2016 的发布，微软引入了一项名为“数据库内 R 服务”的新功能。这项新功能允许你使用新的\
  \ `sp_execute_external_script` 存储过程或 `sp_rxPredict` CLR 过程，在 SQL Server 查询中直接执行\
  \ R 编程代码。数据库内 R 服务的引入是一个新的方向，它允许组织通过让用户直接在 SQL Server 内部训练、评分和存储模型，将机器学习模型直接集成到他们的\
  \ SQL Server 数据库中。虽然 R 是 SQL Server 2016 中唯一可用于 `sp_execute_external_script` 的语言，但随着\
  \ SQL Server 2017 的发布，Python 被添加进来，这也导致该功能被重命名为“机器学习服务”。随着大数据集群所基于的 SQL Server 2019\
  \ 的发布，Java 也被添加为第三种可直接从 T-SQL 代码访问的编程语言。\n\n虽然数据库内机器学习服务存在一些限制（例如，某些可用功能如 `PREDICT`\
  \ 只接受由 Revolution Analytics 机器学习模型开发的算法），但如果你想在非常接近数据存储位置的地方训练和评分你的机器学习模型，这是一个非常有用的功能。这也是我们认为数据库内机器学习服务大放异彩的领域。通过利用该功能，数据移动几乎为零（考虑到你的机器学习模型所需的数据也可直接在\
  \ SQL Server 实例中获得），模型管理通过将模型存储在 SQL Server 表中得到解决，并且它为（接近）实时的模型评分打开了大门——方法是在数据存储到数据库表中之前，就将其传递给你的机器学习模型。\n\
  \n本章中的所有示例代码均可在本书的 GitHub 页面上以 T-SQL notebook 的形式获取。对于本节中的示例，我们选择使用 R 作为首选语言，而不是我们在前一章中使用的\
  \ Python。\n\n## 在 SQL Server 主实例中训练机器学习模型\n\n在 SQL Server 大数据集群的主实例中开始训练机器学习模型之前，我们必须先启用允许使用\
  \ `sp_execute_external_script` 函数的选项。如果在 SQL 实例中没有启用运行外部脚本的选项，数据库内机器学习服务的大部分功能将被禁用。\n\
  \n即使禁用了外部脚本，部分数据库内机器学习功能仍然可用。例如，你仍然可以结合预训练的机器学习模型使用 `PREDICT` 函数对数据进行评分。然而，你将无法运行训练模型所需的代码，因为这通常需要通过外部脚本功能来实现。\n\
  \n如果未启用外部脚本，并尝试使用 `sp_execute_external_script` 运行一段 R 代码，你将遇到如下错误消息（图 7-1）。\n\n\
  ![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig1_HTML.jpg](img/480532_2_En_7_Fig1_HTML.jpg)\n\
  \n**图 7-1**\n禁用外部脚本时运行 `sp_execute_external_script` 出错\n\n启用 `sp_execute_external_script`\
  \ 简单直接。连接到你的 SQL Server 主实例，并运行代码清单 7-1 中的代码以立即启用该选项。\n\n```\n-- 在开始之前，我们需要启用外部脚本\n\
  EXEC sp_configure 'external scripts enabled',1\nRECONFIGURE WITH OVERRIDE\nGO\n\
  ```\n**代码清单 7-1**\n启用外部脚本\n\n在启用外部脚本后，我们可以直接通过 `sp_execute_external_script` 存储过程运行\
  \ R、Python 或 Java 代码。正如本节引言中提到的，我们选择 R 作为本书本节部分的语言，代码清单 7-2 展示了一个简单的 R 命令，用于返回 R\
  \ 的版本信息。\n\n```\nEXEC sp_execute_external_script\n@language =N'R',\n@script=N'print\
  \ (version)'\n```\n**代码清单 7-2**\n使用 `sp_execute_external_script` 的示例 R 代码\n\n运行代码清单\
  \ 7-2 中的代码，应返回如图 7-2 所示的结果。\n\n![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig2_HTML.jpg](img/480532_2_En_7_Fig2_HTML.jpg)\n\
  \n**图 7-2**\n通过 `sp_execute_external_script` 返回的 R 版本结果\n\n从代码中可以看到，`sp_execute_external_script`\
  \ 存储过程接受多个参数。我们的示例展示了调用该过程时需要提供的最小参数集，即 `@language` 和 `@script`。`@language` 参数设置在\
  \ `@script` 部分中使用的语言。在我们的例子中，这是 R。通过 `@script` 参数，我们可以运行要执行的 R 代码，本例中是 `print (version)`\
  \ 命令。\n\n虽然 `sp_execute_external_script` 总是返回有关其执行机器的信息，但 `print (version)` R 命令的输出从第\
  \ 5 行的 `_ platform x86_64` 开始。\n\n虽然我们直接在消息窗口中处理 R 输出是可以的，但也可以向 `sp_execute_external_script`\
  \ 提供额外的参数，将 R 生成的输出以表格格式返回。我们通过将 R 中定义的变量（使用下面所示的 `@output_data_1_name` 参数）映射到 T-SQL\
  \ 中定义的变量，并在调用存储过程时使用 `WITH RESULT SETS` 语句来实现这一点，如代码清单 7-3 中的示例所示。\n\n```\nEXEC\
  \ sp_execute_external_script\n@language =N'R',\n@script=N'\nr_hi <- \"Hello World!\"\
  \nr_hello <- as.data.frame(r_hi)',\n@output_data_1_name = N'r_hello'\nWITH RESULT\
  \ SETS (([hello] nvarchar(250)));\nGO\n```\n**代码清单 7-3**\n使用 `WITH RESULT SETS`\
  \ 返回数据\n\n运行代码清单 7-3 中的代码，你应获得文本 \"Hello World!\"，并以表格结果返回，如图 7-3 所示。\n\n![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig3_HTML.jpg](img/480532_2_En_7_Fig3_HTML.jpg)\n\
  \n**图 7-3**\n以表格格式返回的输出\n\n正如我们可以通过 `sp_execute_external_script` 存储过程定义和映射输出结果一样，我们也可以定义输入数据集。这当然非常有用，因为它允许我们将查询定义为\
  \ R 会话的输入数据集，并将其映射到 R 变量。能够将存储在 SQL Server 数据库中的数据用于数据库内机器学习服务功能，为执行高级分析（如训练或评分机器学习模型）打开了大门。\n\
  \n我们将在 “Iris” 数据集上训练一个机器学习模型。该数据集在 R 中直接可用，展示了鸢尾花的各种特征以及特定鸢尾花所属的种类。我们可以使用这些数据创建一个分类机器学习模型，用于预测鸢尾花属于哪个种类。\n\
  \n由于数据集已经在 R 中存在，我们可以使用一些 R 脚本结合 `sp_execute_external_script` 存储过程将该数据集作为 SQL 表返回。代码清单\
  \ 7-4 创建了一个名为 “InDBML” 的新数据库和一个名为 “Iris” 的新表，并从 R 会话中的 Iris 数据集填充该表。\n\n```\n--\
  \ 创建一个新数据库来保存 Iris 数据\nCREATE DATABASE InDBML\nGO\nUSE [InDBML]\nGO\n-- 创建一个表来保存\
  \ Iris 数据\nCREATE TABLE Iris\n(\nSepal_Length FLOAT,\nSepal_Width FLOAT,\nPetal_Length\
  \ FLOAT,\nPetal_Width FLOAT,\nSpecies VARCHAR(50)\n)\n-- 从 R 会话获取 Iris 数据集并插入到我们的表中\n\
  INSERT INTO Iris\nEXEC sp_execute_external_script\n@language =N'R',\n@script=N'\n\
  r_iris <- iris',\n@output_data_1_name = N'r_iris'\n-- 从新表中获取数据\nSELECT * FROM Iris\n\
  ```\n**代码清单 7-4**\n创建新数据库并用测试数据填充\n\n如果一切处理正确，你将收到如图 7-4 所示的结果，其中显示了存储在 Iris 表中的值。\n\
  \n![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig4_HTML.jpg](img/480532_2_En_7_Fig4_HTML.jpg)\n\
  \n**图 7-4**\nIris 表中的值\n\n现在我们有了一些数据来创建机器学习模型，我们可以开始训练模型了。但在那之前，我们将执行两个额外的任务。我们将创建一个\
  \ “Model” 表。数据库内机器学习服务的一个非常有用的功能是能够将模型“序列化”为二进制字符串，然后将其存储在 SQL 表中。当模型存储在表中时，我们可以通过\
  \ SQL 查询在任何需要的时候检索它。代码清单 7-5 在 InDBML 数据库中创建一个模型表。\n\n```\n-- 创建一个表来保存我们训练好的 ML\
  \ 模型\nCREATE TABLE models\n(\nmodel_name nvarchar(100) not null,\nmodel_version\
  \ nvarchar(100) not null,\nmodel_object varbinary(max) not null\n)\nGO\n```\n**代码清单\
  \ 7-5**\n创建模型表\n\n除了将存储序列化模型的 `model_object` 列，我们还创建了另外两个列来存储模型的名称和版本。这在你将多个模型存储在\
  \ SQL Server 数据库中并希望选择特定模型版本或名称的情况下非常有用。\n\n## 数据集分割：训练集与测试集\n\n接下来我们要做的是将鸢尾花数据集分割为训练集和测试集。在训练机器学习模型时，分割数据集是一项常见的任务。训练集是用来喂给你正在训练的模型的数据；测试集是你在模型训练过程中“隐藏”起来的一部分数据。这样一来，模型从未接触过测试数据，这意味着我们可以使用测试集内的数据来验证模型在面对从未见过的数据时表现如何。因此，确保训练集和测试集都能很好地代表完整数据集非常重要。例如，如果我们仅在数据集中“Setosa”鸢尾花品种的特征上训练模型，然后通过测试集向它展示另一个品种的数据，它就会预测错误（预测为\
  \ Setosa），因为它在训练过程中从未见过另一个品种。\n\n代码清单 7-6 从鸢尾花表中随机选取 80%的行，并将它们插入一个新的 `Iris_train`\
  \ 表中。另外 20%的数据则进入一个新的 `Iris_test` 表。\n\n```sql\n-- 随机选择 80%的数据到单独的训练表\nSELECT TOP\
  \ 80 PERCENT *\nINTO Iris_train\nFROM Iris\nORDER BY NEWID()\n-- 选择剩余的行到测试表\nSELECT\
  \ *\nINTO Iris_test\nFROM Iris\nEXCEPT\nSELECT * FROM Iris_train\n代码清单 7-6\n将数据集分割为训练集和测试集\n\
  ```\n\n## 训练并存储机器学习模型\n\n现在我们有了模型表，并且已经将训练和测试数据分开了，我们准备好训练我们的机器学习模型，并在训练后将其存储到模型表中。这正是代码清单\
  \ 7-7 所做的。\n\n```sql\nDECLARE @model VARBINARY(MAX)\n-- 基于我们的训练数据集训练一个决策树\nEXEC\
  \ sp_execute_external_script\n@language = N'R',\n@script = N'\niris.dtree <- rxDTree(Species\
  \ ~ Sepal_Length + Sepal_Width + Petal_Length + Petal_Width, data = iris_sqldata)\n\
  trained_model <- rxSerializeModel(iris.dtree, realtimeScoringOnly = FALSE)',\n@input_data_1\
  \ = N'SELECT * FROM Iris_train',\n@input_data_1_name = N'iris_sqldata',\n@params\
  \ = N'@trained_model VARBINARY(MAX) OUTPUT',\n@trained_model = @model OUTPUT\n--\
  \ 将模型插入到我们的模型表中\nINSERT INTO models\n(\nmodel_name,\nmodel_version,\nmodel_object\n\
  )\nVALUES\n(\n'iris.dtree',\n'v1.0',\n@model\n)\n代码清单 7-7\n使用 sp_execute_external_script\
  \ 训练机器学习模型\n```\n\n## 代码步骤详解\n\n前面的代码执行了一系列步骤来训练和存储机器学习模型。为了确保你理解如何使用 `sp_execute_external_script`\
  \ 在你的 SQL Server 主实例中训练和存储模型，我们将描述前面代码中执行的每个步骤。\n\n1.  脚本的第一行 `DECLARE @model VARBINARY(MAX)`\
  \ 声明了一个 `VARBINARY` 数据类型的 T-SQL 变量，该变量将在训练后保存我们的模型。\n\n2.  在第二步中，我们执行 `sp_execute_external_script`\
  \ 存储过程，并提供训练模型所需的 R 代码。注意我们使用了一个名为 `rxDTree` 的算法。`rxDTree` 是由 Revolution Analytics（微软于\
  \ 2015 年收购的一家公司）构建的决策树算法，为机器学习提供并行和基于分块的算法。模型训练的语法非常直观；我们根据训练数据集的其他列（或称为：特征）来预测品种。\n\
  \n    代码行 `trained_model <- rxSerializeModel(iris.dtree, realtimeScoringOnly = FALSE)`\
  \ 是用来序列化我们的模型并将其存储到 R 变量 `trained_model` 中的命令。在调用 `sp_execute_external_script` 存储过程时，我们将该变量映射为\
  \ T-SQL 变量 `@model` 的输出参数。我们将从训练数据集中选择所有记录的查询映射为 R 的输入变量，以供算法使用。\n\n3.  最后，在最后一步中，我们将训练好的模型插入到之前创建的模型表中。我们提供了一些附加数据，如名称和版本，以便在下一步使用该模型预测鸢尾花品种时能够轻松地选择它。\n\
  \n## 训练结果\n\n运行这段代码（应该只需要几秒钟）后，我们应该会得到一个以二进制字符串形式存储在模型表中的模型，如图 7-5 所示。\n\n![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig5_HTML.jpg](img/480532_2_En_7_Fig5_HTML.jpg)\n\
  \n**图 7-5**\n模型表中的已训练决策树模型\n\n\n"
- '# 使用数据库内机器学习模型为数据评分


  既然我们已经训练好了模型，就可以用它来对存储在 `Iris_test` 表中的数据进行评分或预测。为此，我们可以采用两种方法：一种是使用我们之前用于训练模型的
  `sp_execute_external_script` 存储过程；另一种是使用 SQL Server 中可用的 `PREDICT` 函数。


  清单 7-8 展示了第一种方法；请注意其语法与该方法之前的示例基本相同，但这次我们是将训练好的模型作为输入参数，连同从 `Iris_test` 表中选择数据的查询一起提供的。


  ```sql

  -- 从模型表中检索模型

  DECLARE @model VARBINARY(MAX) = (SELECT model_object FROM models WHERE model_name
  = ''iris.dtree'')

  -- 使用 Iris_test 数据作为输入运行预测

  -- 返回所有列，包括每个物种的概率

  EXEC sp_execute_external_script

  @language = N''R'',

  @script = N''

  model = rxUnserializeModel(model);

  Iris_prediction = rxPredict(model, data=Iris_test)

  Iris_pred_results <- cbind(Iris_test, Iris_prediction)

  str(Iris_pred_results)

  '',

  @input_data_1 = N''

  SELECT

  Sepal_Length,

  Sepal_Width,

  Petal_Length,

  Petal_Width,

  Species

  FROM Iris_test'',

  @input_data_1_name = N''Iris_test'',

  @output_data_1_name = N''Iris_pred_results'',

  @params = N''@model varbinary(max)'',

  @model = @model

  WITH RESULT SETS (("Sepal_Length" FLOAT, "Sepal_Width" FLOAT, "Petal_Length" FLOAT,
  "Petal_Width" FLOAT, Species VARCHAR(50), setosa_Pred FLOAT, versicolor_Pred FLOAT,
  verginica_Pred FLOAT))

  清单 7-8

  使用数据库内存储的模型运行预测

  ```


  在 `sp_execute_external_script` 代码中，R 脚本的第一部分，我们必须再次使用 `rxUnserializeModel` 来反序列化我们的模型。模型反序列化后，我们就可以对输入数据进行预测。R
  代码的最后一行将每个鸢尾花物种的概率列添加到了输入数据集中。这意味着我们最终得到一个包含所有输入列以及评分过程生成的列的输出表。


  本书不会深入探讨机器学习或机器学习算法，但我们在此案例中尝试使用机器学习解决的问题称为**分类**。机器学习算法基本上可以分为三类：回归、分类和聚类。回归尝试预测一个数值，例如汽车的价格。分类通常处理预测分类值，就像我们在本章中所经历的示例：这是什么物种的鸢尾花？聚类算法尝试通过根据特征将类别分组在一起来预测结果。在鸢尾花示例中，我们也可以选择使用聚类算法，因为可能存在基于物种而趋于分组在一起的明显鸢尾花物种特征。


  运行清单 7-8 中的代码后，我们看到如图 7-6 所示的结果。如果您自己运行代码，可能会看到一些不同的结果，因为我们是基于随机选择的行来分割训练和测试数据的。


  ![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig6_HTML.jpg](img/480532_2_En_7_Fig6_HTML.jpg)


  **图 7-6**


  使用我们训练的机器学习模型对 `Iris_test` 表中的数据进行评分的结果


  使用 `sp_execute_external_script` 方法执行预测效果很好，并且在您可以使用 R 代码执行的操作方面提供了最大的灵活性。然而，它确实会导致相当多的代码行数。我们在
  SQL Server 中可用的另一种方法是使用 `PREDICT` 函数；`PREDICT` 使用起来要容易得多，语法更简单，并且通常比 `sp_execute_external_script`
  执行得更快。但它也有缺点，例如，您不能编写自定义 R 代码来对数据执行额外步骤，并且您必须使用通过 Revolution Analytics 算法训练的序列化模型（而通过使用
  `sp_execute_external_script`，您基本上可以使用 R 或 R 库中可用的每种算法）。


  我们在清单 7-9 的代码中使用 `PREDICT` 函数对 `Iris_test` 表中的数据执行了相同的评分。


  ```sql

  DECLARE @model VARBINARY(MAX) = (SELECT model_object FROM models WHERE model_name
  = ''iris.dtree'')

  -- 另一种方法是使用 PREDICT 函数

  SELECT

  Iris_test.*,

  pred.*

  FROM PREDICT(MODEL = @model, DATA = dbo.Iris_test as Iris_test)

  WITH(setosa_Pred FLOAT, versicolor_Pred FLOAT, virginica_Pred FLOAT) AS pred

  清单 7-9

  使用 PREDICT 函数运行模型预测

  ```


  正如您可以直接看到的，`PREDICT` 比 `sp_execute_external_script` 可读性更高，对于那些更熟悉 T-SQL 的人来说，也更容易理解。在某种意义上，我们是在将模型及其输出连接到
  `Iris_test` 表中的数据。我们需要在 `WITH` 子句中提供预测输出的列名和数据类型，并可以使用 `SELECT` 语句选择我们想要返回的内容。在本例中，我们选择了
  `Iris_test` 表的所有列以及预测返回的所有列，结果应如图 7-7 所示。


  ![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig7_HTML.jpg](img/480532_2_En_7_Fig7_HTML.jpg)


  **图 7-7**


  使用 PREDICT 进行鸢尾花物种预测


  现在我们已经在 SQL Server 机器学习服务中训练了一个机器学习模型并使用它对数据进行了评分，您应该对这些方法的功能有了一个大致的了解。总的来说，我们认为数据库内机器学习服务在您的所有或大部分数据都存储在
  SQL Server 数据库中时特别有用。模型也存储在 SQL Server 数据库中，您可以构建能够（近）实时对存储在 SQL Server 数据库中的数据进行评分的解决方案（例如，通过使用调用
  `PREDICT` 函数的触发器）。如果您愿意，您并不局限于仅使用 SQL Server 表。正如您在前面的章节中所看到的，我们可以使用外部表映射存储在 Spark
  集群（或其他系统）中的数据，并将该数据传递给数据库内机器学习服务。


  然而，在某些情况下，您无法使用数据库内机器学习服务，可能是因为您的数据不适合放入 SQL Server（无论是大小还是数据类型），或者您更熟悉在 Spark 上工作。在任何这些情况下，我们总是可以选择在
  Spark 部分的大数据集群上执行机器学习任务，我们将在下一节中更详细地探讨这一点。



  ## Spark 中的机器学习


  ### Spark 机器学习概述


  由于大数据集群由 SQL Server 和 Spark 节点组成，我们可以轻松选择在 Spark 平台内运行从训练到评分的机器学习流程。我们可以列出许多选择 Spark
  而非 SQL 作为机器学习平台的原因（反之亦然）。然而，当您拥有一个非常大的数据集，将其加载到数据库中并不合理时，您或多或少只能使用 Spark，因为 Spark
  能很好地处理大型数据集，并且可以以与处理数据相同的*分布式特性*来训练各种机器学习算法。


  正如在一个开放、分布式数据处理平台上所期望的那样，有许多库可用于满足您的机器学习需求。在本书中，我们决定使用内置的 Spark ML 库，这些库提供了大量不同的算法选择，应该能满足您的大多数高级分析需求。


  ### 准备数据：加载 Iris 数据集


  就像我们为 SQL Server 的数据库内机器学习服务部分所做的那样，我们需要将一些数据导入 Spark 中以供使用。为了简单起见，我们决定重用在 SQL Server
  部分也使用过的 Iris 数据集。就像我们在上一章中所做的那样，我们在 Spark 中进行的所有数据处理、整理和操作都发生在数据框上。假设您已经完成了前一章 SQL
  Server 部分的示例，我们将使用代码清单 7-10 中的代码从 SQL Server 主实例中提取 Iris 数据集，并将其加载到 Spark 的数据框中。如果您不熟悉通过
  Spark 连接到 SQL Server 主实例，建议阅读上一章的最后一节，其中详细介绍了如何实现此场景。


