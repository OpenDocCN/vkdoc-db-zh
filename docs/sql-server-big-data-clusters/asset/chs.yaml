- "# 大数据集群故障排除、升级与删除\n\n## 故障排除大数据集群\n\n在某个时刻，您的**大数据集群**很可能会遇到问题——从磁盘空间不足到组件故障。Azure\
  \ Data Studio 也提供了关于如何查找并可能修复此类错误原因的指导和工具。\n\n如果您返回到大数据集群的概览页面，您将看到一个“**故障排除**”按钮，如图\
  \ 9-10 所示。\n\n![图 9-10](img/480532_2_En_9_Fig10_HTML.jpg)\n*图 9-10：ADS 中的故障排除链接*\n\
  \n该按钮背后是一系列用于排查集群中每个组件的笔记本。首先打开的笔记本是“**TSG100 – 大数据集群故障排除程序**”，它将引导您完成对大数据集群的全面调试。如果您已经缩小了导致问题的服务范围，也可以直接在左侧导航到该特定组件的分析器笔记本，如图\
  \ 9-11 所示。\n\n![图 9-11](img/480532_2_En_9_Fig11_HTML.jpg)\n*图 9-11：ADS 中的故障排除*\n\
  \n这些笔记本按类别分组，如图 9-12 所示，当您遇到大数据集群问题时，它们始终是您的第一个起点。\n\n![图 9-12](img/480532_2_En_9_Fig12_HTML.jpg)\n\
  *图 9-12：ADS 中的故障排除类别*\n\n## 升级大数据集群\n\n就像任何其他版本的 SQL Server 一样，大数据集群在其版本的维护时间框架内会接收定期的累积更新（CU）。要检查您的安装版本，您只需在\
  \ SQL Server Management Studio 或 Azure Data Studio 中运行 `SELECT @@VERSION`。让我们假设您当前的版本是\
  \ CU1，如图 9-13 所示。\n\n![图 9-13](img/480532_2_En_9_Fig13_HTML.jpg)\n*图 9-13：`SELECT\
  \ @@VERSION` 的输出*\n\n如果您想将大数据集群升级到新版本，请首先确保您拥有最新版本的 `azdata`。为此，请运行清单 9-1 中的代码，就像您首次安装\
  \ `azdata` 时一样。\n\n```\npip3 install -r https://aka.ms/azdata\n```\n*清单 9-1：将 azdata\
  \ 更新到最新版本*\n\n现在您可以使用 `azdata` 来升级您的集群。命令是 `azdata bdc upgrade`，后面至少跟上您的集群名称和目标版本。\n\
  \n例如，要升级到大数据集群 2019 CU3，您将使用清单 9-2 中显示的命令。\n\n```\nazdata bdc upgrade --name mybdc\
  \ --tag 2019-CU3-ubuntu-16.04\n```\n*清单 9-2：使用 azdata 将 BDC 升级到 CU3*\n\n这将需要一些时间，因为首先需要拉取所有单独的镜像，然后升级集群中的每个组件。就像安装过程一样，升级过程会持续为您提供它当前正在处理的组件的状态更新，直到升级过程完成（参见图\
  \ 9-14）。\n\n![图 9-14](img/480532_2_En_9_Fig14_HTML.jpg)\n*图 9-14：`azdata bdc upgrade`\
  \ 的输出*\n\n如果您遇到超时问题（这被报告为一个常见问题），您可以在运行 `azdata bdc upgrade` 时添加可选参数 `controller-timeout`\
  \ 和 `component-timeout`。它们的值以分钟为单位，因此如果您将它们都设置为 60，应该绰绰有余。\n\n如果您现在再次运行 `SELECT\
  \ @@VERSION`，您将看到您的大数据集群的当前版本反映为 CU3，如图 9-15 所示。\n\n![图 9-15](img/480532_2_En_9_Fig15_HTML.jpg)\n\
  *图 9-15：升级后的 `SELECT @@VERSION` 输出*\n\n## 删除大数据集群实例\n\n如果您想删除大数据集群的一个实例，您只需再次使用\
  \ `azdata`。您只需提供实例的名称，如清单 9-3 所示，集群组件就会被删除。\n\n```\nazdata bdc delete –-name <instance-name>\n\
  ```\n*清单 9-3：删除大数据集群实例*\n\n您可以跟踪进度，直到实例被完全删除，如图 9-16 所示。\n\n![图 9-16](img/480532_2_En_9_Fig16_HTML.jpg)\n\
  *图 9-16：`azdata bdc delete` 的输出*\n\n就这样——您的实例现在已被删除。这只会删除大数据集群组件，因此如果您部署到 Azure\
  \ Kubernetes Service，您可能还需要考虑删除该集群，除非您需要它用于其他应用程序，以避免其产生费用。\n\n## 总结\n\n在这最后一章中，我们探讨了获取大数据集群健康状况快速状态的选项、当某些功能未按预期工作时该怎么办的选项，以及如何将现有集群升级到更高版本。\n\
