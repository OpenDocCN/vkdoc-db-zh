  \ 安装了。\n\n## 使用 `Azure Data Studio` 处理大数据群集\n\n作为微软 `SQL 客户端工具` 战略的一部分，处理大数据群集所需的大部分任务通过\
  \ `Azure Data Studio (ADS)` 而非 `SQL Server Management Studio` 或其他工具完成，这可能并不令您感到惊讶。对于那些不熟悉此工具的读者，我们将从简要介绍开始，包括如何获取此工具。\n\
  \n### 什么是 `Azure Data Studio`？\n\n`Azure Data Studio` 是一个跨平台（Windows、MacOS 和 Linux）、可扩展且可定制的工具，可用于经典的\
  \ `T-SQL` 查询和命令，以及诸如笔记本等多种新功能。后者可以通过扩展来启用，这些扩展通常通过 `VSIX` 文件安装，您在处理 `Visual Studio`\
  \ 或 `Visual Studio Code`^(²) 的其他扩展时可能对此很熟悉。\n\n它最初于 2017 年以 `SQL Operations Studio`\
  \ 的名称公开，但在 2018 年正式发布前进行了品牌重塑。虽然产品名称有点误导性，但它不仅适用于云（Azure）服务，也适用于本地解决方案和需求。\n\n例如，它没有为\
  \ `SQL Server Agent` 提供开箱即用的界面，但作为交换提供了内置的图表功能，这表明它与其说是替代品，不如说是对 `SQL Server Management\
  \ Studio (SSMS)` 的补充工具。`SSMS` 针对的是管理和运维群体（数据库管理员），而 `Azure Data Studio` 更适合各种数据专业人员，包括数据科学家。\n\
  \n### 获取并安装 `Azure Data Studio`\n\n您可以直接从微软获取免费的 `Azure Data Studio` 副本： [`https://docs.microsoft.com/en-us/sql/azure-data-studio/download`](https://docs.microsoft.com/en-us/sql/azure-data-studio/download)。为您选择的平台下载安装程序并运行。\n\
  \n或者，只需运行此 `Chocolatey` 命令（清单 3-4），它将为您安装最新版本。\n\n```\nchoco install azure-data-studio\
  \ -y\n```\n\n清单 3-4\n通过 `choco` 安装 `ADS`\n\n## 安装“真正的”大数据群集\n\n如果您想充分利用完整的大数据群集功能集，则需要一个包含所有不同角色和池的完整安装。\n\
  \n### 在 Linux 上使用 kubeadm\n\n一个非常简单的大数据集群部署方法是在一个全新安装的 Ubuntu 16.04 或 18.04 虚拟机或物理机上使用\
  \ kubeadm。\n\n微软提供了一个能完成所有工作的脚本，因此除了 Linux 安装本身，您几乎不需要做太多事情，这可能是让您第一个大数据集群启动并运行的最简单方法。\n\
  \n首先，运行列表 3-5 中的命令，确保您的 Linux 机器是最新的。\n\n```\nsudo apt update&&apt upgrade -y\n\
  sudo systemctl reboot\n列表 3-5\n为 Ubuntu 打补丁\n```\n\n然后，下载脚本，使其可执行，并以 root 权限运行它，如列表\
  \ 3-6 所示。\n\n```\ncurl --output setup-bdc.sh https://raw.githubusercontent.com/microsoft/sql-server-samples/master/samples/features/sql-big-data-cluster/deployment/kubeadm/ubuntu-single-node-vm/setup-bdc.sh\n\
  chmod +x setup-bdc.sh\nsudo ./setup-bdc.sh\n列表 3-6\n下载并执行部署脚本\n```\n\n如图 3-18 所示，脚本会要求您输入密码，然后自动开始准备步骤。\n\
  \n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig18_HTML.jpg](img/480532_2_En_3_Fig18_HTML.jpg)\n\
  图 3-18\n在 Linux 上使用 kubeadm 进行部署\n\n在预取镜像、配置 Kubernetes 以及所有其他必需步骤之后，大数据集群的部署将开始，如图\
  \ 3-19 所示。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig19_HTML.jpg](img/480532_2_En_3_Fig19_HTML.jpg)\n\
  图 3-19\n在 Linux 上使用 kubeadm 进行部署\n\n一旦整个脚本执行完毕，您就完成了！如图 3-20 所示，脚本还将提供在部署过程中创建的所有端点。\n\
  \n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig20_HTML.jpg](img/480532_2_En_3_Fig20_HTML.jpg)\n\
  图 3-20\n在 Linux 上使用 kubeadm 成功部署\n\n您的集群现已完全部署并准备就绪！\n\n### Azure Kubernetes Service\
  \ (AKS)\n\n另一个直接部署集群的方法是使用 Azure Kubernetes Service，其中 Kubernetes 集群在 Microsoft\
  \ Azure 云中设置并提供。虽然部署是从任何机器（您的本地 PC 或 VM）启动和控制的，但集群本身将在 Azure 中运行，因此这意味着部署需要一个 Azure\
  \ 帐户，并且会在您的 Azure 订阅上产生费用。\n\n您可以通过 Azure Data Studio 中的向导或通过一个名为 `azdata` 的工具（在\
  \ Linux 上部署前一个集群的脚本也调用了它）手动部署。两种方法都需要先安装一些先决条件。一个完整的安装实际上需要几个工具和助手：\n\n*   Python\n\
  *   Curl 和 SQL Server 命令行工具，这样我们才能与集群通信并向其上传数据。\n*   Kubernetes CLI\n*   `azdata`，这将创建、维护和删除大数据集群。\n\
  *   Notepad++ 和 7Zip，这些不是实际要求，但如果您想调试安装，可能会得到一个包含可能很大的文本文件的 tar.gz 文件。Windows 默认不处理这些。\n\
  \n列表 3-7 中的脚本会将这些安装到您的本地机器（或您运行脚本的任何机器）上，因为部署是从这里控制和触发的。我们将通过 Chocolatey 安装这些先决条件。\n\
  \n```\nchoco install python3 -y\nchoco install sqlserver-cmdlineutils -y\n$env:Path\
  \ = [System.Environment]::GetEnvironmentVariable(\"Path\",\"Machine\") + \";\" +\
  \ [System.Environment]::GetEnvironmentVariable(\"Path\",\"User\")\npython -m pip\
  \ install --upgrade pip\npython -m pip install requests\npython -m pip install requests\
  \ --upgrade\nchoco install curl -y\nchoco install kubernetes-cli -y\nchoco install\
  \ notepadplusplus -y\nchoco install 7zip -y\nchoco install visualcpp-build-tools\
  \ -y\npip3 install kubernetes\npip3 install -r https://aka.ms/azdata\n列表 3-7\n大数据集群先决条件的安装脚本\n\
  ```\n\n虽然相关供应商显然为大多数工具提供了可视化/手动安装程序，但脚本化方法使整个体验变得容易得多。\n\n此外，由于我们想使用脚本部署到 Azure，我们需要列表\
  \ 3-8 中所示的 `azure-cli` 包，以便能够连接到我们的 Azure 订阅。\n\n```\nchoco install azure-cli -y\n\
  列表 3-8\n安装 azure-cli\n```\n\n虽然您技术上可以在 Azure 门户中或通过手动 PowerShell 脚本准备所有内容（我们需要一个资源组、Kubernetes\
  \ 集群等），但有一个更简单的方法：从 [`https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/deployment/aks`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/deployment/aks)\
  \ 获取 Python 脚本，它会自动为您处理整个过程和设置。\n\n将脚本下载到您的桌面或其他合适的位置，并打开命令提示符。导航到保存脚本的文件夹。您也可以如列表\
  \ 3-9 所示使用命令提示符下载。\n\n```\ncurl --output deploy-sql-big-data-aks.py https://raw.githubusercontent.com/microsoft/sql-server-samples/master/samples/features/sql-big-data-cluster/deployment/aks/deploy-sql-big-data-aks.py\n\
  列表 3-9\n下载部署脚本\n```\n\n当然，您也可以根据需要修改和审查脚本，例如，将一些参数（如 VM 大小）设为静态而非变量，或更改某些值的默认值。\n\
  \n首先，我们需要登录 Azure，这将使用列表 3-10 中所示的命令完成。\n\n```\naz login\n列表 3-10\n从命令提示符触发登录到 azure\n\
  ```\n\n"
- "# 在 Azure 上部署\n\n一个网站将打开；请使用你的 Azure 凭据登录，如图 3-21 所示。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig21_HTML.jpg](img/480532_2_En_3_Fig21_HTML.jpg)\n\
  \n**图 3-21** Azure 登录屏幕\n\n该网站将确认你已登录；你可以关闭浏览器，如图 3-22 所示。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig22_HTML.jpg](img/480532_2_En_3_Fig22_HTML.jpg)\n\
  \n**图 3-22** Azure 登录确认\n\n你的命令提示符，如图 3-23 所示，显示了与你刚使用的凭据关联的所有订阅。复制你要使用的订阅 ID 并执行\
  \ Python 脚本，该脚本将询问从订阅 ID 到 Kubernetes 集群中节点数量的所有信息。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig23_HTML.jpg](img/480532_2_En_3_Fig23_HTML.jpg)\n\
  \n**图 3-23** Python 部署脚本中的参数输入\n\n脚本现在开始运行所有必需的步骤。同样，这可能需要几分钟到几小时，具体取决于虚拟机大小、节点数量等因素。\n\
  \n该脚本会像在 Linux 上安装时的脚本一样，在过程中进行报告。它使用了相同的工具(`azdata`)，因此创建实际大数据集群时的输出非常相似，如图 3-24\
  \ 所示。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig24_HTML.jpg](img/480532_2_En_3_Fig24_HTML.jpg)\n\
  \n**图 3-24** Python 部署脚本的输出\n\n脚本还会使用`azdata bdc config`来创建你的 JSON 文件。\n\n由于此 SQL\
  \ Server 2019 大数据集群是部署到 Azure 上的，与本地安装时可以直接使用`localhost`地址访问不同，你将需要有关安装的 IP 地址和端口信息。因此，IP\
  \ 地址和端口会在最后提供，如图 3-25 所示。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig25_HTML.jpg](img/480532_2_En_3_Fig25_HTML.jpg)\n\
  \n**图 3-25** Python 部署脚本的最终输出（包括 IP 地址）\n\n如果你忘记了 IP 地址是什么，可以运行这个简单的脚本，如清单 3-11\
  \ 所示。\n\n```\nkubectl get service -n \n```\n\n**清单 3-11** 使用`kubectl`检索 Kubernetes\
  \ 服务 IP\n\n如果你也忘记了集群的名称，试试清单 3-12。\n\n```\nkubectl get namespaces\n```\n\n**清单 3-12**\
  \ 使用`kubectl`检索 Kubernetes 命名空间\n\n如果你同时运行多个集群，清单 3-13 中的脚本也可能很有帮助。只需将其保存为`IP.py`，你就可以如图\
  \ 3-26 所示运行它。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig26_HTML.jpg](img/480532_2_En_3_Fig26_HTML.jpg)\n\
  \n**图 3-26** `IP.py`的输出\n\n```\nCLUSTER_NAME=\"myfirstbigdatacluster\"\nfrom subprocess\
  \ import check_output, CalledProcessError, STDOUT, Popen, PIPE\nimport os\nimport\
  \ getpass\ndef executeCmd (cmd):\nif os.name==\"nt\":\nprocess = Popen(cmd.split(),stdin=PIPE,\
  \ shell=True)\nelse:\nprocess = Popen(cmd.split(),stdin=PIPE)\nstdout, stderr =\
  \ process.communicate()\nif (stderr is not None):\nraise Exception(stderr)\nprint(\"\
  \")\nprint(\"SQL Server big data cluster connection endpoints: \")\nprint(\"SQL\
  \ Server master instance:\")\ncommand=\"kubectl get service master-svc-external\
  \ -o=custom-columns=\"\"IP:.status.loadBalancer.ingress[0].ip,PORT:.spec.ports[0].port\"\
  \" -n \"+CLUSTER_NAME\nexecuteCmd(command)\nprint(\"\")\nprint(\"HDFS/KNOX:\")\n\
  command=\"kubectl get service gateway-svc-external -o=custom-columns=\"\"IP:status.loadBalancer.ingress[0].ip,PORT:.spec.ports[0].port\"\
  \" -n \"+CLUSTER_NAME\nexecuteCmd(command)\nprint(\"\")\nprint(\"Cluster administration\
  \ portal (https://:):\")\ncommand=\"kubectl get service mgmtproxy-svc-external -o=custom-columns=\"\
  \"IP:status.loadBalancer.ingress[0].ip,PORT:.spec.ports[0].port\"\" -n \"+CLUSTER_NAME\n\
  executeCmd(command)\nprint(\"\")\n```\n\n**清单 3-13** 检索大数据集群端点的 Python 脚本\n\n你已经完成了！你在\
  \ Azure Kubernetes 服务中的大数据集群现已启动并运行。\n\n> **注意** 无论你是否使用，这个集群都会根据虚拟机数量及其大小产生费用，所以最好不要让它闲置着！\n\
  \n"
- "# 通过 Azure Data Studio 部署大数据集群\n\n如果你更喜欢使用图形化向导进行部署，那么答案就是 Azure Data Studio (ADS)！ADS\
  \ 为你提供了部署 SQL Server 的多种选项，而 **大数据集群** 就在其中。在 ADS 中，可以在欢迎屏幕上找到“新建部署”的链接，也可以在活动连接旁边的上下文菜单中找到，如图\
  \ 3-27 所示。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig27_HTML.jpg](img/480532_2_En_3_Fig27_HTML.jpg)\n\
  \n图 3-27 ADS 中的新建部署\n\n在接下来的屏幕上，选择“`SQL Server Big Data Cluster`”。向导将要求你接受许可条款、选择一个版本，并选择一个部署目标。此向导当前支持的目标包括新的\
  \ Azure Kubernetes Service (AKS) 集群、现有的 AKS 集群或现有的 `kubeadm` 集群。如果你计划部署到现有集群，Kubernetes\
  \ 上下文/连接需要存在于你的 Kubernetes 配置中。如果 Kubernetes 集群不是在同一台机器上创建的，那么它很可能还缺失。在这种情况下，你可以将\
  \ `*.kube` 文件复制到本地机器，或者按照 [`https://kubernetes.io/docs/tasks/access-application-cluster/access-cluster/`](https://kubernetes.io/docs/tasks/access-application-cluster/access-cluster/)\
  \ 中的描述手动配置 Kubernetes。\n\n在屏幕的下方，向导还会再次列出所需的工具，并确认它们是否已安装合适的版本，如图 3-28 所示。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig28_HTML.jpg](img/480532_2_En_3_Fig28_HTML.jpg)\n\
  \n图 3-28 通过 ADS 部署 BDC – 介绍\n\n让我们尝试使用一个新的 AKS 集群进行另一次部署（这也是默认选项）。单击“`Select`”，向导将带你进入第一步。它将为你提供与目标环境匹配的部署模板。不同的模板在大小以及功能（如身份验证类型和高可用性）上有所不同，如图\
  \ 3-29 所示。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig29_HTML.jpg](img/480532_2_En_3_Fig29_HTML.jpg)\n\
  \n图 3-29 通过 ADS 部署 BDC – 步骤 1\n\n接下来的屏幕将取决于你的目标。由于我们选择部署到 Azure 并包含一个新集群，我们需要提供订阅、资源组名称、位置、集群名称，以及底层虚拟机的数量和大小（参见图\
  \ 3-30）。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig30_HTML.jpg](img/480532_2_En_3_Fig30_HTML.jpg)\n\
  \n图 3-30 通过 ADS 部署 BDC – 步骤 2\n\n在步骤 3 中，如图 3-31 所示，我们定义大数据集群的名称（这与之前设置 Kubernetes\
  \ 集群名称的步骤不同！）以及身份验证类型。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig31_HTML.jpg](img/480532_2_En_3_Fig31_HTML.jpg)\n\
  \n图 3-31 通过 ADS 部署 BDC – 步骤 3\n\n在最后的配置屏幕（如图 3-32 所示）中，你可以修改每个池的实例数量，以及为数据和日志声明的存储大小和存储类。\n\
  \n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig32_HTML.jpg](img/480532_2_En_3_Fig32_HTML.jpg)\n\
  \n图 3-32 通过 ADS 部署 BDC – 步骤 4\n\n如图 3-33 所示的最终屏幕会给你一个配置摘要。如果你希望继续，请点击“`Script to\
  \ Notebook`”；否则，你可以使用“`Previous`”按钮返回，进行任何必要的更改和调整。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig33_HTML.jpg](img/480532_2_En_3_Fig33_HTML.jpg)\n\
  \n图 3-33 通过 ADS 部署 BDC – 摘要\n\n除非你之前已经安装过，否则 ADS 会提示你为 Notebook 安装 Python，如图 3-34\
  \ 所示。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig34_HTML.jpg](img/480532_2_En_3_Fig34_HTML.jpg)\n\
  \n图 3-34 通过 ADS 部署 BDC – 安装 Python\n\n等待安装完成。你的所有设置都已填充到一个 Python Notebook 中，你可以保存起来稍后使用，也可以立即运行。要执行\
  \ Notebook，只需单击“`Run Cells`”，如图 3-35 所示。请确保 Python 安装已完成。内核组合框应显示为“`Python 3`”。如果它仍然显示“`Loading\
  \ kernels…`”，请耐心等待。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Figa_HTML.gif](img/480532_2_En_3_Figa_HTML.gif)\n\
  \n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig35_HTML.jpg](img/480532_2_En_3_Fig35_HTML.jpg)\n\
  \n图 3-35 通过 ADS 部署 BDC – 预部署 Notebook\n\n一旦你点击“`Run Cells`”，部署过程就会运行，并且——如果中途没有任何问题——最终会报告回集群的端点，如图\
  \ 3-36 所示。你还会获得一个用于连接到主实例的直接链接。使用与脚本化部署选项相同的参数，部署所需的时间将与之相同。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig36_HTML.jpg](img/480532_2_En_3_Fig36_HTML.jpg)\n\
  \n图 3-36 通过 ADS 部署 BDC – 部署后 Notebook\n\n## 什么是 azdata？\n\n如前所述，无论你选择哪种部署路径，大数据集群的部署始终通过一个名为\
  \ `azdata` 的工具来控制。这是一个命令行工具，将帮助你创建大数据集群配置、部署你的大数据集群，并且之后可能删除或升级你现有的集群。\n\n合乎逻辑的第一步（在之前的脚本中以某种方式在后台发生）是创建一个配置，如清单\
  \ 3-14 所示。\n\n```\nazdata bdc config init [--target -t] [--src -s]\n```\n*清单 3-14*\n\
  使用 `azdata` 创建集群配置\n\n`Target` 只是你配置文件（`bdc.json` 和 `control.json`）的文件夹名称。`src`\
  \ 是你可以开始使用的现有基础模板之一。\n\n可能的取值如下（在撰写本文时）\n*   `aks-dev-test`\n*   `aks-dev-test-ha`\n\
  *   `kubeadm-dev-test`\n*   `kubeadm-prod`\n\n这些与你在 Azure Data Studio 中部署时看到的选项相匹配。你总是可以通过运行\
  \ `azdata bdc config init -t <yourtarget>` 而不指定源来获取所有有效选项。请记住，这些只是模板。如果你首选的环境没有作为一个选项提供，这并不一定意味着它不受支持，只是你需要对现有模板进行一些调整，以使其匹配你的目标。输出如图\
  \ 3-37 所示。\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig37_HTML.jpg](img/480532_2_En_3_Fig37_HTML.jpg)\n\
  *图 3-37*\n未指定源时运行 `azdata bdc config init` 的输出\n\n选择的源将取决于你的部署类型。\n\n运行 `azdata\
  \ bdc config init` 会在一个以你的 `target` 命名的子文件夹中创建两个 `.JSON` 文件——`bdc.json` 和 `control.json`。这将基于默认值，因此我们需要对配置进行一些更改。这可以使用任何文本编辑器完成，也可以再次使用\
  \ `azdata` 的 `config replace` 选项完成，如清单 3-15 所示，我们用它来修改 `bdc.json` 文件中的大数据集群名称。\n\
  \n```\nazdata bdc config replace -c myfirstbigdatacluster/bdc.json -j metadata.name=myfirstbigdatacluster\n\
  ```\n*清单 3-15*\n使用 `azdata` 修改集群配置\n\n`control` 文件定义了更通用的设置，例如你希望使用哪个版本、仓库等，而 `bdc`\
  \ 文件配置了你的大数据集群环境的实际设置，例如每个角色的副本数量等，如清单 3-16 和 3-17 所示。\n\n```\n{\n\"apiVersion\"\
  : \"v1\",\n\"metadata\": {\n\"kind\": \"Cluster\",\n\"name\": \"mssql-cluster\"\n\
  },\n\"spec\": {\n\"docker\": {\n\"registry\": \"mcr.microsoft.com\",\n\"repository\"\
  : \"mssql/bdc\",\n\"imageTag\": \"2019-CU2-ubuntu-16.04\",\n\"imagePullPolicy\"\
  : \"Always\"\n},\n\"storage\": {\n\"data\": {\n\"className\": \"\",\n\"accessMode\"\
  : \"ReadWriteOnce\",\n\"size\": \"15Gi\"\n},\n\"logs\": {\n\"className\": \"\",\n\
  \"accessMode\": \"ReadWriteOnce\",\n\"size\": \"10Gi\"\n}\n},\n\"endpoints\": [\n\
  {\n\"name\": \"Controller\",\n\"dnsName\": \"\",\n\"serviceType\": \"NodePort\"\
  ,\n\"port\": 30080\n},\n{\n\"name\": \"ServiceProxy\",\n\"dnsName\": \"\",\n\"serviceType\"\
  : \"NodePort\",\n\"port\": 30777\n}\n],\n\"settings\": {\n\"controller\": {\n\"\
  logs.rotation.size\": \"5000\",\n\"logs.rotation.days\": \"7\"\n}\n}\n},\n\"security\"\
  : {\n\"activeDirectory\": {\n\"ouDistinguishedName\": \"\",\n\"dnsIpAddresses\"\
  : [],\n\"domainControllerFullyQualifiedDns\": [],\n\"domainDnsName\": \"\",\n\"\
  clusterAdmins\": [],\n\"clusterUsers\": []\n}\n}\n}\n```\n*清单 3-16*\n`control.json`\
  \ 示例\n\n```\n{\n\"apiVersion\": \"v1\",\n\"metadata\": {\n\"kind\": \"BigDataCluster\"\
  ,\n\"name\": \"mssql-cluster\"\n},\n\"spec\": {\n\"resources\": {\n\"nmnode-0\"\
  : {\n\"spec\": {\n\"replicas\": 2\n}\n},\n\"sparkhead\": {\n\"spec\": {\n\"replicas\"\
  : 2\n}\n},\n\"zookeeper\": {\n\"spec\": {\n\"replicas\": 3\n}\n},\n\"gateway\":\
  \ {\n\"spec\": {\n\"replicas\": 1,\n\"endpoints\": [\n{\n\"name\": \"Knox\",\n\"\
  dnsName\": \"\",\n\"serviceType\": \"NodePort\",\n\"port\": 30443\n}\n]\n}\n},\n\
  \"appproxy\": {\n\"spec\": {\n\"replicas\": 1,\n\"endpoints\": [\n{\n\"name\": \"\
  AppServiceProxy\",\n\"dnsName\": \"\",\n\"serviceType\": \"NodePort\",\n\"port\"\
  : 30778\n}\n]\n}\n},\n\"master\": {\n\"metadata\": {\n\"kind\": \"Pool\",\n\"name\"\
  : \"default\"\n},\n\"spec\": {\n\"type\": \"Master\",\n\"replicas\": 3,\n\"endpoints\"\
  : [\n{\n\"name\": \"Master\",\n\"dnsName\": \"\",\n\"serviceType\": \"NodePort\"\
  ,\n\"port\": 31433\n},\n{\n\"name\": \"MasterSecondary\",\n\"dnsName\": \"\",\n\"\
  serviceType\": \"NodePort\",\n\"port\": 31436\n}\n],\n\"settings\": {\n\"sql\":\
  \ {\n\"hadr.enabled\": \"true\"\n}\n}\n}\n},\n\"compute-0\": {\n\"metadata\": {\n\
  \"kind\": \"Pool\",\n\"name\": \"default\"\n},\n\"spec\": {\n\"type\": \"Compute\"\
  ,\n\"replicas\": 1\n}\n},\n\"data-0\": {\n\"metadata\": {\n\"kind\": \"Pool\",\n\
  \"name\": \"default\"\n},\n\"spec\": {\n\"type\": \"Data\",\n\"replicas\": 2\n}\n\
  },\n\"storage-0\": {\n\"metadata\": {\n\"kind\": \"Pool\",\n\"name\": \"default\"\
  \n},\n\"spec\": {\n\"type\": \"Storage\",\n\"replicas\": 3,\n\"settings\": {\n\"\
  spark\": {\n\"includeSpark\": \"true\"\n}\n}\n}\n}\n},\n\"services\": {\n\"sql\"\
  : {\n\"resources\": [\n\"master\",\n\"compute-0\",\n\"data-0\",\n\"storage-0\"\n\
  ]\n},\n\"hdfs\": {\n\"resources\": [\n\"nmnode-0\",\n\"zookeeper\",\n\"storage-0\"\
  ,\n\"sparkhead\"\n],\n\"settings\": {\n\"hdfs-site.dfs.replication\": \"3\"\n}\n\
  },\n\"spark\": {\n\"resources\": [\n\"sparkhead\",\n\"storage-0\"\n],\n\"settings\"\
  : {\n\"spark-defaults-conf.spark.driver.memory\": \"2g\",\n\"spark-defaults-conf.spark.driver.cores\"\
  : \"1\",\n\"spark-defaults-conf.spark.executor.instances\": \"3\",\n\"spark-defaults-conf.spark.executor.memory\"\
  : \"1536m\",\n\"spark-defaults-conf.spark.executor.cores\": \"1\",\n\"yarn-site.yarn.nodemanager.resource.memory-mb\"\
  : \"18432\",\n\"yarn-site.yarn.nodemanager.resource.cpu-vcores\": \"6\",\n\"yarn-site.yarn.scheduler.maximum-allocation-mb\"\
  : \"18432\",\n\"yarn-site.yarn.scheduler.maximum-allocation-vcores\": \"6\",\n\"\
  yarn-site.yarn.scheduler.capacity.maximum-am-resource-percent\": \"0.3\"\n}\n}\n\
  }\n}\n}\n```\n*清单 3-17*\n`bdc.json` 示例\n\n如你所见，该文件允许你更改相当多的设置。虽然你可能将许多设置保留为其默认值，但这在存储方面尤其方便。你可以更改磁盘大小以及存储类型。有关\
  \ Kubernetes 中存储的更多信息，我们建议阅读 [`https://kubernetes.io/docs/concepts/storage/`](https://kubernetes.io/docs/concepts/storage/)。\n\
  \n所有部署默认使用持久化存储。除非你有充分的理由更改这一点，否则应保持原样，因为在重启等情况下，非持久化存储可能会使你的集群处于无法工作的状态。\n\n在已设置环境变量的命令提示符中运行以下命令（清单\
  \ 3-18）。\n\n```\nazdata bdc create -c myfirstbigdatacluster --accept-eula yes\n\
  ```\n*清单 3-18*\n使用 `azdata` 创建集群\n\n现在，请坐下来放松一下，跟随 `azdata` 的输出（如图 3-38 所示），等待部署完成。\n\
  \n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig38_HTML.jpg](img/480532_2_En_3_Fig38_HTML.jpg)\n\
  *图 3-38*\n`azdata bdc create` 的输出\n\n根据你的机器大小，这可能需要几分钟到几小时不等。\n\n### 其他环境\n\n还有其他多种\
  \ Kubernetes 环境可用——从树莓派到 VMWare。其中许多（但并非全部）支持 SQL Server 2019 大数据集群。支持的平台数量会随着时间的推移而增长，但没有完整的兼容环境列表。如果你正在研究一个特定的设置，最好也是最简单的方法就是亲自尝试一下！\n\
  \n## 高级部署选项\n\n除了前面提到的配置选项外，我们还想提请你注意另外两个可以充分利用你的大数据集群的机会：Active Directory 身份验证和\
  \ HDFS 分层。\n\n\n### 大数据集群的 Active Directory 身份验证\n\n如果您希望使用 Active Directory (AD)\
  \ 集成而非基本身份验证，这可以通过在您的 `control.json` 和 `bdc.json` 文件中提供额外信息来实现。虽然 `bdc.json` 只需要将\
  \ `nameservers` 设置为域控制器的 DNS，但 `control.json` 需要一些额外的参数，如清单 3-19 所示。\n\n```json\n\
  \"security\": {\n\"activeDirectory\": {\n\"ouDistinguishedName\": \"\",\n\"dnsIpAddresses\"\
  : [],\n\"domainControllerFullyQualifiedDns\": [],\n\"domainDnsName\": \"\",\n\"\
  clusterAdmins\": [],\n\"clusterUsers\": []\n}\n```\n**清单 3-19** `control.json` 中的\
  \ AD 参数\n\n截至撰写本文时，仍存在不少限制。例如，AD 身份验证仅在 `kubeadm` 上受支持，在 AKS 部署中则不行，并且每个域只能有一个大数据集群。在部署大数据集群之前，您还需要在\
  \ AD 中设置一些非常具体的对象。有关如何启用此功能的详细步骤，请参阅官方文档 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-active-directory?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-active-directory%253Fview%253Dsql-server-ver15)。\n\
  \n### 大数据集群中的 HDFS 分层\n\n如果您已有存储在 Azure Data Lake Store Gen2 或 Amazon S3 中的 HDFS，您可以将此存储挂载为大数据集群\
  \ HDFS 的子目录。这将通过环境变量、`kubectl` 和 `azdata` 命令的组合来实现。由于过程因源类型略有不同，我们建议您参考官方文档，可在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/hdfs-tiering?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/big-data-cluster/hdfs-tiering%253Fview%253Dsql-server-ver15)\
  \ 找到。\n\n与在部署时启用 AD 身份验证不同，HDFS 分层将在现有的大数据集群上进行配置。\n\n## 总结\n\n在本章中，我们使用各种方法并安装了\
  \ SQL Server 2019 大数据集群的不同组件。\n\n既然我们的大数据集群已经运行并准备好处理一些工作负载，让我们继续到第 4 章，我们将展示并讨论如何查询和使用该集群。\n\
  \n脚注 1\n\n## 4. 将数据加载到大数据集群中\n\n有了我们的第一个 SQL Server 大数据集群后，我们应该看看如何使用它。因此，我们将从向其添加一些数据开始。\n\
  \n## 为您的大数据集群全面准备好 Azure Data Studio\n\n虽然 Azure Data Studio 默认可以连接到任何大数据集群（也可以管理和部署它），但我们建议您安装\
  \ Data Virtualization 扩展，该扩展为您提供向导，帮助创建外部（虚拟）表。\n\n要安装该扩展，首先导航到 Azure Data Studio\
  \ 中的扩展菜单，如图 4-1 所示。\n\n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig1_HTML.jpg](img/480532_2_En_4_Fig1_HTML.jpg)\n\
  **图 4-1** 在 ADS 中从 VSIX 包安装扩展\n\n在扩展市场中，它可能已经作为首要推荐之一显示。否则，您也可以如图 4-2 所示进行搜索。\n\n\
  ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig2_HTML.jpg](img/480532_2_En_4_Fig2_HTML.jpg)\n\
  **图 4-2** Azure Data Studio 中的扩展\n\n单击该扩展的绿色“安装”按钮，安装将立即触发，如图 4-3 所示。\n\n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig3_HTML.jpg](img/480532_2_En_4_Fig3_HTML.jpg)\n\
  **图 4-3** Azure Data Studio 中正在进行的扩展安装\n\n安装通常需要几分钟，最终您会看到扩展的状态变为“已安装”，如图 4-4 所示。\n\
  \n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig4_HTML.jpg](img/480532_2_En_4_Fig4_HTML.jpg)\n\
  **图 4-4** Azure Data Studio 中已安装的扩展\n\n该扩展现在可以使用了！\n\n## 将一些示例文件导入安装中\n\n一切准备就绪后，在我们真正开始使用新功能之前，我们需要的只是一些示例数据！\n\
  \n### 空数据库\n\n要将一些外部 SQL Server 表链接到您的本地 SQL Server 实例，最简单的方法是简单地创建一个空白数据库。只需通过\
  \ SQL Server Management Studio 或 Azure Data Studio 连接到您的 SQL Server 2019 实例，并创建一个名为\
  \ `BDC_Empty` 的新数据库。您可以通过向导完成此操作，或者简单地运行如清单 4-1 所示的 T-SQL。\n\n```sql\nUSE master\n\
  GO\nCREATE DATABASE BDC_Empty\n```\n**清单 4-1** 通过 T-SQL 创建空数据库\n\n就是这样。\n\n### 大数据集群内的示例数据\n\
  \n如果您选择了包含 Kubernetes 集群的完整安装，有一些简单的方法和技术可以推送一些示例数据。如果您只部署了启用 PolyBase 但没有 Kubernetes\
  \ 集群的本地安装，您可以跳过这部分——它无论如何也无法工作。\n\n#### 将任何 SQL Server 备份还原到您的主实例\n\n假设空数据库对您来说不够，您可能想知道如何将现有数据库还原到您的主实例。让我们用\
  \ `AdventureWorks2014` 尝试一下。\n\n如果您手头没有 `AdventureWorks2014` 的备份，您可以通过 `curl` 从\
  \ GitHub 获取，例如（清单 4-2）。\n\n```bash\ncurl -L -G \"https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks2014.bak\"\
  \ -o AdventureWorks2014.bak\n```\n**清单 4-2** 使用 `curl` 从 GitHub 下载 `AdventureWorks2014`\n\
  \n现在我们有了一个实际要还原的文件，我们需要先将其推送到主实例的文件系统。此任务将通过 `kubectl` 完成（清单 4-3）；您需要相应地替换集群的命名空间和主\
  \ Pod 名称。\n\n```bash\nkubectl cp AdventureWorks2014.bak /:var/opt/mssql/data/ -c\
  \ mssql-server\n```\n**清单 4-3** 使用 `kubectl` 将 `AdventureWorks2014` 复制到主实例\n\n最后但同样重要的是，我们需要从\
  \ `.bak` 文件还原数据库。这可以通过常规的 T-SQL 实现。在本例中，只需连接到您的主实例并运行脚本。当然，对于更复杂的场景，您可以使用带输入文件的\
  \ `sqlcmd` 或您熟悉的任何其他 SQL Server 机制。这里包括使用 SQL Server Management Studio 中的还原向导（清单\
  \ 4-4）。\n\n```sql\nUSE [master]\nRESTORE DATABASE [AdventureWorks2014] FROM  DISK\
  \ = N'/var/opt/mssql/data/AdventureWorks2014.bak' WITH  FILE = 1,  MOVE N'AdventureWorks2014_Data'\
  \ TO N'/var/opt/mssql/data/AdventureWorks2014_Data.mdf',  MOVE N'AdventureWorks2014_Log'\
  \ TO N'/var/opt/mssql/data/AdventureWorks2014_Log.ldf',  NOUNLOAD,  STATS = 5\n\
  ```\n**清单 4-4** 将 `AdventureWorks2014` 还原到主实例\n\n\n\n## Microsoft 示例数据\n\n我们将从 Microsoft\
  \ 在其 GitHub 页面上提供的示例数据开始，[`https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster)。请下载文件\
  \ `bootstrap-sample-db.sql`，并根据你的操作系统，下载 `bootstrap-sample-db.cmd`（适用于 Windows）或\
  \ `bootstrap-sample-db.sh`（适用于 Linux）。\n\n然后，你可以使用以下参数运行 `.cmd` 或 `.sh` 文件（参见列表\
  \ 4-5）。\n\n```\n用法: bootstrap-sample-db.cmd    [--install-extra-samples] [SQL_MASTER_PORT]\
  \ [KNOX_PORT]\n要使用基本身份验证，请设置 AZDATA_USERNAME 和 AZDATA_PASSWORD 环境变量。\n要使用集成身份验证，请提供端点的\
  \ DNS 名称。\n如果使用非默认值，可以单独指定端口。\n列表 4-5\n安装默认的 Microsoft 示例\n```\n\n只需传递你在安装集群时使用或提供的（IP、密码、命名空间）信息，脚本就会自动运行，并将一些示例数据导入到你的安装中。\n\
  \n此脚本的要求是：\n\n*   `sqlcmd`\n*   `bcp`\n*   `kubectl`\n*   `curl`\n\n如果你在初始安装所用的同一台机器上运行此脚本，这些要求应该已经满足。\n\
  \n## 航班延误示例数据集\n\n除了 Microsoft 示例，让我们再添加一些外部数据。寻找免费数据集的一个好地方是 `kaggle.com`（图 4-5）。\n\
  \n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig5_HTML.jpg](img/480532_2_En_4_Fig5_HTML.jpg)\n\
  \n**图 4-5** Kaggle.com 登录\n\n如果你还没有账户，只需注册一个免费账户。否则，直接登录你的账户。\n\n登录后，导航到“数据集”并搜索“Flight\
  \ Delays”，这应该会显示出来自美国交通部的“2015 航班延误和取消”数据集，如图 4-6 所示。\n\n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig6_HTML.jpg](img/480532_2_En_4_Fig6_HTML.jpg)\n\
  \n**图 4-6** Kaggle.com 数据集\n\n或者，你也可以直接导航到 [`www.kaggle.com/usdot/flight-delays`](http://www.kaggle.com/usdot/flight-delays)。\n\
  \n该数据集包含三个文件：航空公司、机场和航班。你可以通过点击“下载”一次性下载所有文件，这将触发一个包含所有文件的 ZIP 文件下载，如图 4-7 所示。\n\
  \n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig7_HTML.jpg](img/480532_2_En_4_Fig7_HTML.jpg)\n\
  \n**图 4-7** Kaggle.com 下载航班延误数据集\n\n虽然这个数据集的大小并非不合理，但它提供了很多选项来探索和处理数据。下载文件后，我们仍然需要将这些数据导入到我们的大数据集群中。由于只有三个文件，我们将通过\
  \ Azure Data Studio 手动上传它们来完成。\n\n因此，在 Azure Data Studio 中连接到你的大数据集群，导航到“数据服务”，打开\
  \ HDFS 根文件夹，并创建一个名为“Flight_Delays”的新目录，如图 4-8 所示。\n\n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig8_HTML.jpg](img/480532_2_En_4_Fig8_HTML.jpg)\n\
  \n**图 4-8** 在 ADS 的 HDFS 上创建新目录\n\n然后，你可以选择此目录，点击鼠标右键，选择“上传文件”，并上传这三个 CSV 文件。你可以多选，因此无需逐个上传。如果点击鼠标右键并刷新文件夹，文件应该可见，如图\
  \ 4-9 所示。\n\n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig9_HTML.jpg](img/480532_2_En_4_Fig9_HTML.jpg)\n\
  \n**图 4-9** ADS 中新文件夹内文件的显示\n\n上传进度也会在 Azure Data Studio 的页脚显示。\n\n通过前端上传的另一种方法是使用命令提示符下的\
  \ `curl`。你可以使用它来创建目标目录和上传实际文件。\n\n对于仅 `airlines.csv`，如列表 4-6 所示（你需要替换你的 IP 地址和密码）。第一行将创建一个名为“Flight_Delays”的目录，而第二行将文件“airlines.csv”上传到其中。\n\
  \n```\ncurl -i -L -k -u root: -X PUT \"https:// /gateway/default/webhdfs/v1/Flight_Delays?op=MKDIRS\"\
  \ncurl -i -L -k -u root: -X PUT \"https:///gateway/default/webhdfs/v1/Flight_Delays\
  \ /airlines.csv?op=create&overwrite=true\" -H \"Content-Type: application/octet-stream\"\
  \ -T \"airlines.csv\"\n列表 4-6\n使用 curl 上传数据到 HDFS\n\n\n### Azure SQL Database\n\n\
  正如第 1 章用例中所述，使用大数据集群 PolyBase 实现的一种方式是将数据延伸到 Azure（或任何其他基于云的 SQL Server）。为了更好地理解这一点，除非您已经在另一台\
  \ SQL Server 或 Azure SQL DB 上拥有数据库，否则我们建议您在 Azure 中设置一个包含 AdventureWorks 数据库的小型数据库。\n\
  \n为此，请再次登录 Azure 门户（图 4-10），就像您在第 3 章中所做的那样。\n\n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig10_HTML.jpg](img/480532_2_En_4_Fig10_HTML.jpg)\n\
  \n图 4-10 在 Azure 门户中创建资源\n\n然后，在左侧面板的顶部选择“创建资源”，从列表中选取或搜索“SQL 数据库”。\n\n在下一个屏幕上，直接点击“创建”（图\
  \ 4-11）。\n\n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig11_HTML.jpg](img/480532_2_En_4_Fig11_HTML.jpg)\n\
  \n图 4-11 在 Azure 门户中创建 SQL 数据库\n\n将数据库名称设为“AdventureWorks”，选择合适的订阅，创建新的资源组或选择现有的，并将“示例\
  \ (AdventureWorksLT)”选择为源（图 4-12）。\n\n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig12_HTML.jpg](img/480532_2_En_4_Fig12_HTML.jpg)\n\
  \n图 4-12 通过 Azure 门户配置要创建的 SQL 数据库\n\n您还需要配置一个服务器（图 4-13），因此请展开“服务器”子菜单。通过提供名称（必须是唯一的）、用户名和密码来设置服务器。同样，选择离您最近的位置，并保持“允许\
  \ Azure 服务访问服务器”复选框为选中状态。这将允许您从其他 Azure 虚拟机或服务访问此数据库，而无需担心防火墙设置。根据您的设置，您可能仍然需要允许从本地计算机访问——我们稍后会讲到这一点。\n\
  \n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig13_HTML.jpg](img/480532_2_En_4_Fig13_HTML.jpg)\n\
  \n图 4-13 在 Azure 门户中为新的 SQL 数据库配置服务器\n\n您现在可以将“定价层”更改为“基本”，这是最便宜的选项，但完全足以满足我们此处的目标。\n\
  \n点击“创建”确认您的选择；这将触发服务器和数据库的部署，可能需要几分钟时间。您已完成——您刚刚创建了 AdventureWorksLT 数据库，我们可以用它来进行远程查询。\n\
  \n尝试通过 Azure Data Studio 连接到数据库（图 4-14）。\n\n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig14_HTML.jpg](img/480532_2_En_4_Fig14_HTML.jpg)\n\
  \n图 4-14 ADS 中的连接对话框\n\n如果您不在 Azure 虚拟机上，或者取消选中了允许从 Azure 连接的框，您可能会看到图 4-15 中所示的错误。\n\
  \n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig15_HTML.jpg](img/480532_2_En_4_Fig15_HTML.jpg)\n\
  \n图 4-15 Azure Data Studio – 连接错误\n\n如果发生这种情况，请返回 Azure 门户（图 4-16），导航到包含数据库服务器的资源组，并选择该服务器（确保点击的是\
  \ SQL Server，而不是 SQL 数据库）。\n\n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig16_HTML.jpg](img/480532_2_En_4_Fig16_HTML.jpg)\n\
  \n图 4-16 Azure SQL 数据库配置\n\n在左侧，向下滚动到“安全性”，并选择“防火墙和虚拟网络”，如图 4-17 所示。\n\n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig17_HTML.jpg](img/480532_2_En_4_Fig17_HTML.jpg)\n\
  \n图 4-17 Azure 门户防火墙设置\n\n点击“添加客户端 IP”或手动添加您的 IP 地址。\n\n保存您的更改。\n\n现在，尝试在 Azure\
  \ Data Studio 中再次连接到数据库。您应该能够看到 AdventureWorks 数据库，包括图 4-18 中所示的表。\n\n![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig18_HTML.jpg](img/480532_2_En_4_Fig18_HTML.jpg)\n\
  \n图 4-18 ADS 中显示的 AdventureWorksLT 表结构\n\n## 总结\n\n在本章中，我们将一些数据加载到了先前部署的 SQL Server\
  \ 大数据集群中。现在是时候看看如何使用这些数据了！\n\n### 通过 T-SQL 查询大数据集群\n\n既然我们有一些数据可以操作了，让我们看看如何通过 Azure\
  \ Data Studio 提供的多种选项来处理和查询这些数据。\n\n## 外部表\n\n查询大数据集群（Big Data Cluster）使用的是 T-SQL\
  \ 通过 *外部表*（external tables）实现的，这个概念最初是在 SQL Server 2016 中随着 PolyBase 的出现而引入的。\n\n\
  我们将通过向一个新的空数据库 `BDC_Empty`（该数据库最初位于我们的 Azure `AdventureWorksLT` 数据库中）添加一些外部表，来开始查询我们的大数据集群。\n\
  \n首先，如图 5-1 所示，通过 Azure Data Studio 连接到你的 SQL Server 主实例（或任何其他启用了 PolyBase 的 SQL\
  \ Server 2019 实例）。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig1_HTML.jpg](img/480532_2_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1\n连接到主实例\n\n你的连接类型将是 `Microsoft SQL Server`。服务器地址将是服务器的 IP（或 DNS 名称）（如果使用了实例名，可能需要追加实例名）以及实例的端口（用逗号分隔），除非是运行在标准端口\
  \ `1433` 上的本地安装。\n\n展开你的连接、数据库、`BDC_Empty` 数据库以及其中的表（图 5-2）。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig2_HTML.jpg](img/480532_2_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2\nADS 中的空数据库\n\n正如预期，目前没有任何表。让我们来改变这一点！\n\n如果你在数据库上右键单击，你会看到一个名为 `Create\
  \ External Table` 的选项。这将打开相应的向导。\n\n在第一步中，它会要求你确认要在其中创建外部表的数据库，并选择一个数据源类型。此时（图 5-3），该向导支持\
  \ `SQL Server` 和 `Oracle`；除了 `CSV` 文件（它们有自己的向导）之外，所有其他源都需要手动编写脚本。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig3_HTML.jpg](img/480532_2_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3\nADS 中的外部表向导 – 选择数据源\n\n选择 `SQL Server` 并单击 `Next`。\n\n在下一个对话框中（图 5-4），向导将要求你为此数据库设置一个主密钥密码。这是必需的，因为我们将把凭据存储在数据库中，这些凭据需要被加密。如果你在已设有主密钥密码的数据库上运行向导，此步骤将被跳过。\n\
  \n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig4_HTML.jpg](img/480532_2_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4\nADS 中的外部表向导 – 创建数据库主密钥\n\n输入并确认密码，然后单击 `Next`。\n\n下一个屏幕（图 5-5）要求你提供连接的名称（别名）、连接的服务器名称以及数据库名称。如果你之前配置过，也可以选择使用现有的连接。\n\
  \n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig5_HTML.jpg](img/480532_2_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5\nADS 中的外部表向导 – 连接和凭据\n\n此外，系统会提供一个已存在的凭据列表（如果有的话）以及创建新凭据的选项。\n\n使用 `AW`\
  \ 作为你的数据源名称和 `New Credential Name`，`AdventureWorks` 作为你的 `Database Name`，并提供你在上一步中配置的\
  \ `Server Name`、`Username` 和 `Password`。点击 `Next`。\n\n向导现在将加载源数据库中的所有表和视图，你可以展开并浏览它们，如图\
  \ 5-6 所示。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig6_HTML.jpg](img/480532_2_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6\nADS 中的外部表向导 – 对象映射\n\n你可以选择整个数据库、所有表或所有视图，或者选择一定数量的单个对象。\n\n你将无法更改任何列定义，并且必须始终“创建”源中存在的所有列。由于没有实际移动数据，而只是对外部模式的引用，这不是问题。\n\
  \n唯一可以更改的两件事（如图 5-7 所示屏幕的右上角部分）是目标模式（target schema）和目标表名（target table name），因为你可能希望将所有外部表创建在一个单独的模式中，或者为它们添加前缀。\n\
  \n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig7_HTML.jpg](img/480532_2_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7\nADS 中的外部表向导 – 表映射\n\n现在，选择表 `Address`、`Customer` 和 `CustomerAddress`，并保持其他所有表未选中以及所有设置不变。点击\
  \ `Next`。\n\n你已到达最后一步，这是一个摘要页面，如图 5-8 所示。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig8_HTML.jpg](img/480532_2_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8\nADS 中的外部表向导 – 摘要\n\n你现在可以选择生成脚本，或者直接通过向导创建所有对象。\n\n让我们来看一下脚本（清单 5-1），所以点击\
  \ `Generate Script`，然后点击 `Cancel` 关闭向导。你将看到脚本，它将启动一个事务，然后以正确的顺序创建所有对象：从密钥开始，然后是凭据和数据源，最后是我们的三个表。\n\
  \n\n# 从 Azure SQL 数据库创建外部表\n\n以下 T-SQL 脚本用于从 Azure SQL 数据库生成外部表。\n\n```sql\nBEGIN\
  \ TRY\nBEGIN TRANSACTION Tcfc2da095679401abd1ae9deb0e6eae\nUSE [BDC_Empty];\nCREATE\
  \ MASTER KEY ENCRYPTION BY PASSWORD = '';\nCREATE DATABASE SCOPED CREDENTIAL [AW]\n\
  WITH IDENTITY = 'bigdata', SECRET = '';\nCREATE EXTERNAL DATA SOURCE [AW]\nWITH\
  \ (LOCATION = 'sqlserver:// .database.windows.net', CREDENTIAL = [AW]);\nCREATE\
  \ EXTERNAL TABLE [dbo].[Address]\n(\n[AddressID] INT NOT NULL,\n[AddressLine1] NVARCHAR(60)\
  \ COLLATE SQL_Latin1_General_CP1_CI_AS NOT NULL,\n[AddressLine2] NVARCHAR(60) COLLATE\
  \ SQL_Latin1_General_CP1_CI_AS,\n[City] NVARCHAR(30) COLLATE SQL_Latin1_General_CP1_CI_AS\
  \ NOT NULL,\n[StateProvince] NVARCHAR(50) COLLATE SQL_Latin1_General_CP1_CI_AS NOT\
  \ NULL,\n[CountryRegion] NVARCHAR(50) COLLATE SQL_Latin1_General_CP1_CI_AS NOT NULL,\n\
  [PostalCode] NVARCHAR(15) COLLATE SQL_Latin1_General_CP1_CI_AS NOT NULL,\n[rowguid]\
  \ UNIQUEIDENTIFIER NOT NULL,\n[ModifiedDate] DATETIME2(3) NOT NULL\n)\nWITH (LOCATION\
  \ = '[AdventureWorks].[SalesLT].[Address]', DATA_SOURCE = [AW]);\nCREATE EXTERNAL\
  \ TABLE [dbo].[Customer]\n(\n[CustomerID] INT NOT NULL,\n[NameStyle] BIT NOT NULL,\n\
  [Title] NVARCHAR(8) COLLATE SQL_Latin1_General_CP1_CI_AS,\n[FirstName] NVARCHAR(50)\
  \ COLLATE SQL_Latin1_General_CP1_CI_AS NOT NULL,\n[MiddleName] NVARCHAR(50) COLLATE\
  \ SQL_Latin1_General_CP1_CI_AS,\n[LastName] NVARCHAR(50) COLLATE SQL_Latin1_General_CP1_CI_AS\
  \ NOT NULL,\n[Suffix] NVARCHAR(10) COLLATE SQL_Latin1_General_CP1_CI_AS,\n[CompanyName]\
  \ NVARCHAR(128) COLLATE SQL_Latin1_General_CP1_CI_AS,\n[SalesPerson] NVARCHAR(256)\
  \ COLLATE SQL_Latin1_General_CP1_CI_AS,\n[EmailAddress] NVARCHAR(50) COLLATE SQL_Latin1_General_CP1_CI_AS,\n\
  [Phone] NVARCHAR(25) COLLATE SQL_Latin1_General_CP1_CI_AS,\n[PasswordHash] VARCHAR(128)\
  \ COLLATE SQL_Latin1_General_CP1_CI_AS NOT NULL,\n[PasswordSalt] VARCHAR(10) COLLATE\
  \ SQL_Latin1_General_CP1_CI_AS NOT NULL,\n[rowguid] UNIQUEIDENTIFIER NOT NULL,\n\
  [ModifiedDate] DATETIME2(3) NOT NULL\n)\nWITH (LOCATION = '[AdventureWorks].[SalesLT].[Customer]',\
  \ DATA_SOURCE = [AW]);\nCREATE EXTERNAL TABLE [dbo].[CustomerAddress]\n(\n[CustomerID]\
  \ INT NOT NULL,\n[AddressID] INT NOT NULL,\n[AddressType] NVARCHAR(50) COLLATE SQL_Latin1_General_CP1_CI_AS\
  \ NOT NULL,\n[rowguid] UNIQUEIDENTIFIER NOT NULL,\n[ModifiedDate] DATETIME2(3) NOT\
  \ NULL\n)\nWITH (LOCATION = '[AdventureWorks].[SalesLT].[CustomerAddress]', DATA_SOURCE\
  \ = [AW]);\nCOMMIT TRANSACTION Tcfc2da095679401abd1ae9deb0e6eae\nEND TRY\nBEGIN\
  \ CATCH\nIF @@TRANCOUNT > 0\nROLLBACK TRANSACTION Tcfc2da095679401abd1ae9deb0e6eae\n\
  DECLARE @ErrorMessage NVARCHAR(4000) = ERROR_MESSAGE();\nDECLARE @ErrorSeverity\
  \ INT = ERROR_SEVERITY();\nDECLARE @ErrorState INT = ERROR_STATE();\nRAISERROR(@ErrorMessage,\
  \ @ErrorSeverity, @ErrorState);\nEND CATCH;\n```\n\n**清单 5-1** 用于从 Azure SQL 数据库生成外部表的\
  \ T-SQL\n\n一旦运行该脚本（点击屏幕左上角的“Run”或直接按`F5`），它将执行并在您的数据库中创建这些对象。\n\n刷新表后，这三个新表就会显示出来，看起来如\
  \ **图 5-9** 所示。通过表名后面的提示，您可以很容易地识别出它们是外部表。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig9_HTML.jpg](img/480532_2_En_5_Fig9_HTML.jpg)\n\
  \n**图 5-9** 在 ADS 中创建后显示的外部表\n\n在 SSMS 中，它们可以通过位于自己的文件夹中来识别，如 **图 5-10** 所示。\n\n\
  ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig10_HTML.jpg](img/480532_2_En_5_Fig10_HTML.jpg)\n\
  \n**图 5-10** 在 SSMS 中创建后显示的外部表\n\n从客户端角度来看，这些表的行为类似于本地表。在 Azure Data Studio 中右键单击\
  \ `Address` 表（**图 5-11**）并点击 “Select Top 1000”。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig11_HTML.jpg](img/480532_2_En_5_Fig11_HTML.jpg)\n\
  \n**图 5-11** 在 ADS 中针对外部表执行 `SELECT` 语句的输出\n\n您可以看到查询基本上是 `SELECT TOP 1000 * FROM\
  \ dbo.Address`，尽管数据位于外部数据库中。您可以将此数据与本地表或任何其他类型的本地数据源进行连接。在研究来自 CSV 文件的外部表时，我们会进一步探讨这一点。\n\
  \n让我们从运行一个针对所有三个外部表的查询开始（**清单 5-2**），以获取总部位于爱达荷州的所有公司。\n\n```sql\nSELECT CompanyName\n\
  FROM [Address] ADDR\nINNER JOIN CustomerAddress CADDR ON ADDR.AddressID = CADDR.AddressID\n\
  INNER JOIN Customer CUST ON CUST.CustomerID = CADDR.CustomerID\nWHERE\nAddressType\
  \ = 'Main Office'\nAND StateProvince = 'Idaho'\n```\n\n**清单 5-2** 连接两个外部表的 `SELECT`\
  \ 语句\n\n同样，这看起来像是针对某些本地表的常规查询，如 **图 5-12** 所示。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig12_HTML.jpg](img/480532_2_En_5_Fig12_HTML.jpg)\n\
  \n**图 5-12** 在 ADS 中连接 `SELECT` 语句的输出\n\n只有当您点击右上角的 **Explain** 按钮时，您才会看到执行计划（**图\
  \ 5-13**），它揭示了查询正在远程运行（`Remote Query` 和 `External Select` 操作符）的事实。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig13_HTML.jpg](img/480532_2_En_5_Fig13_HTML.jpg)\n\
  \n**图 5-13** 在 ADS 中针对两个外部表的执行计划\n\n\n\n### 使用 Biml 自动化创建外部表\n\n如你所见，这个向导有其局限性，但其底层的\
  \ T-SQL 相当直接明了。因此，它是自动化的绝佳候选对象，而自动化可以通过多种方式实现，其中之一便是使用商业智能标记语言 (`Biml`)。\n\n如果你之前未曾接触过\
  \ `Biml`，互联网上有大量资源^(³,⁴,⁵)，《The Biml Book》^(⁶) 一书内部也提供了许多资料。如果你只想使用这个具体示例，你需要做的仅仅是：\n\
  \n*   获取免费的 `BimlExpress`^(⁷) 副本，这是一个完全集成于 Visual Studio 的免费 `Biml` 前端工具。\n*   从本书网站获取下文提供的源代码。\n\
  *   按下文描述创建一个小型元数据存储库，并用你的元数据填充它。\n*   调整解决方案中的连接字符串。\n*   运行解决方案（只需在解决方案中右键单击 `11_Polybase_C.biml`\
  \ 并选择 `Generate SSIS Package`）。尽管标题令人困惑，但这会将所有必需的 `.SQL` 文件写入到 `C:\\Temp\\Polybase`\
  \ 目录。\n\n如前所述，我们将使用一个小型元数据表来管理数据源。在此示例中，我们将再次让 `Biml` 指向我们在 Azure 中的 `AdventureWorksLT`\
  \ 数据库——你可以随意在此处添加你自己的数据源进行尝试。\n\n首先，创建一个名为 `Datasources` 的表（代码清单 5-3），例如，在你先前创建的数据库\
  \ `BDC_Empty` 中。显然，这个表可以按你希望的任何方式命名，可以放在你偏好的任何架构或数据库中——但为了简单起见，我们先保持这样。\n\n```sql\n\
  CREATE TABLE [dbo].Datasources NULL,\n    [Server] nvarchar NULL,\n    [UserID]\
  \ nvarchar NULL,\n    [Password] nvarchar NULL,\n    [SRC_DB] nvarchar NULL,\n \
  \   [SRC_Schema] nvarchar NULL,\n    [DEST_Schema] nvarchar NULL\n) ON [PRIMARY]\n\
  ```\n*代码清单 5-3. 用于创建数据源元表的 T-SQL。*\n\n同时，只需向此表添加一条记录，指向你的 `AWLT` 数据库（根据需要修改你的 DNS\
  \ 名称、用户名和密码），使用代码清单 5-4 中的代码。\n\n```sql\nINSERT INTO Datasources VALUES\n('AW','.database.windows.net','','','AdventureWorks','SalesLT','dbo')\n\
  ```\n*代码清单 5-4. 填充你的数据源元表。*\n\n此解决方案要求主密钥已经设置好——这是一项一次性任务，完全没有必要或理由去自动化这一步。如果你在之前的练习中跳过了手动创建表的步骤，你可能需要在继续之前手动完成此步骤。\n\
  \n我们的解决方案包含两个 `Biml` 文件（实际上是四个——分别对应 C# 和 VB.NET 的两个文件）：\n\n*   `11_Polybase_C.biml`\n\
  \    这是控制文件，其中包含指向我们元数据以及目标数据库的连接字符串。它将遍历元数据，并为每一个条目调用另一个 `Biml` 文件（使用名为 `CallBimlScript()`\
  \ 的函数），将一个 `.SQL` 文件写入到 `C:\\temp\\polybase`（因此，如果你的 `Datasources` 表中有十个条目，你最终会得到十个文件）。\n\
  *   `12_PolybaseWriter_C.biml`\n    此文件将生成每个源架构的内容。\n\n如果你查看第一个文件，你会注意到它以声明两个（在此情况下是相同的）连接字符串开始。一个指向存放你元数据的数据库；另一个指向你希望在其中创建或更新外部表的\
  \ PolyBase 数据库（代码清单 5-5）。\n\n```biml\n<Biml xmlns=\"http://schemas.varigence.com/biml.xsd\"\
  >\n    <Connections>\n        <Connection Name=\"Metadata\" ConnectionString=\"\
  Data Source=.;Initial Catalog=BDC;Provider=SQLNCLI10.1;Integrated Security=SSPI;\"\
  />\n        <Connection Name=\"Target\" ConnectionString=\"Data Source=.;Initial\
  \ Catalog=BDC;Provider=SQLNCLI10.1;Integrated Security=SSPI;\"/>\n    </Connections>\n\
  \    <Packages>\n        <Package Name=\"11_Polybase_C\" AutoCreateConnections=\"\
  false\" AutoCreateVariables=\"false\">\n            <Tasks>\n                <ForEachLoop\
  \ Name=\"Loop Through Metadata\" CollectionName=\"Metadata.Objects[SELECT [DataSource],[Server],[UserID],[Password],[SRC_DB],[SRC_Schema],[DEST_Schema]\
  \ FROM [dbo].[Datasources]]\">\n                    <Tasks>\n                  \
  \      <ExecuteCallBimlScript Name=\"Generate SQL File\">\n                    \
  \        <BimlScript File=\"12_PolybaseWriter_C.biml\" />\n                    \
  \        <InputBindings>\n                                <Directory Path=\"C:\\\
  temp\\polybase\\\" />\n                            </InputBindings>\n          \
  \                  <OutputBindings>\n                                <Directory\
  \ Path=\"C:\\temp\\polybase\\\" />\n                            </OutputBindings>\n\
  \                        </ExecuteCallBimlScript>\n                    </Tasks>\n\
  \                </ForEachLoop>\n            </Tasks>\n        </Package>\n    </Packages>\n\
  </Biml>\n```\n*代码清单 5-5. 用于遍历数据源元表的 Biml 代码。*\n\n真正的魔法发生在第二个文件中。它将包含元数据的 `DataRow`\
  \ 以及目标数据库的连接字符串作为其参数。然后它将生成 T-SQL 来：\n\n1.  `CREATE`（创建）或 `ALTER`（修改）连接凭据\n2.  `CREATE`（创建）或\
  \ `ALTER`（修改）外部数据源\n3.  `DROP`（删除）目标数据库中每一个现有的外部表\n4.  `CREATE`（创建）源架构中每一个表对应的外部表\n\
  \n对于前三步，它使用简单的 SQL 查询或半静态的 T-SQL。对于第四部分，它利用了 `Biml` 读取和解释数据库架构并将其存储在 `Biml` 对象模型中的能力（代码清单\
  \ 5-6）。\n\n```sql\n-- Syncing schema <#=Target.Name#> in <#=Target.ConnectionString#>\n\
  -- This script assumes that a master key has been set\n\n-- CREATE/ALTER CREDENTIAL\n\
  IF NOT EXISTS(select * from sys.database_credentials WHERE NAME = '<#=Row[\"DataSource\"\
  ]#>')\nBEGIN\n    CREATE DATABASE SCOPED CREDENTIAL [<#=Row[\"DataSource\"]#>]\n\
  \    WITH IDENTITY = '<#=Row[\"UserID\"]#>', SECRET = '<#=Row[\"Password\"]#>';\n\
  END\nELSE\nBEGIN\n    ALTER DATABASE SCOPED CREDENTIAL [<#=Row[\"DataSource\"]#>]\n\
  \    WITH IDENTITY = '<#=Row[\"UserID\"]#>', SECRET = '<#=Row[\"Password\"]#>';\n\
  END\nGO\n\n-- CREATE DATASOURCE\nIF NOT EXISTS(SELECT * FROM sys.external_data_sources\
  \ WHERE NAME = '<#=Row[\"DataSource\"]#>')\nBEGIN\n    CREATE EXTERNAL DATA SOURCE\
  \ [<#=Row[\"DataSource\"]#>]\n    WITH (LOCATION = 'sqlserver://<#=Row[\"Server\"\
  ]#>', CREDENTIAL = [<#=Row[\"DataSource\"]#>]);\nEND\nELSE\nBEGIN\n    ALTER EXTERNAL\
  \ DATA SOURCE [<#=Row[\"DataSource\"]#>] SET LOCATION = N'sqlserver://<#=Row[\"\
  Server\"]#>', CREDENTIAL = [<#=Row[\"DataSource\"]#>]\nEND\nGO\n\n-- DROP EXISTING\
  \ TABLES\n<#\nforeach (AstTableNode tbl in RootNode.Tables.Where(t => t.Database.Name\
  \ == Row[\"SRC_DB\"].ToString() && t.Schema.Name == Row[\"SRC_Schema\"].ToString()))\
  \ {\n    string targetTable = \"[\" + Row[\"DEST_Schema\"].ToString() + \"].[\"\
  \ + tbl.Name + \"]\";\n#>\nIF EXISTS(select * from sys.external_tables WHERE object_id\
  \ = OBJECT_ID('<#=targetTable#>'))\nBEGIN\n    DROP EXTERNAL TABLE <#=targetTable#>\n\
  END\nGO\n<#\n}\n#>\n\n-- CREATE TABLES\n<#\nforeach (AstTableNode tbl in RootNode.Tables.Where(t\
  \ => t.Database.Name == Row[\"SRC_DB\"].ToString() && t.Schema.Name == Row[\"SRC_Schema\"\
  ].ToString())) {\n    string targetTable = \"[\" + Row[\"DEST_Schema\"].ToString()\
  \ + \"].[\" + tbl.Name + \"]\";\n#>\nIF NOT EXISTS(SELECT * FROM sys.external_tables\
  \ WHERE NAME = '<#=tbl.Name#>')\nBEGIN\n    CREATE EXTERNAL TABLE <#=targetTable#>\
  \ (\n    <#=String.Join(\",\" + Environment.NewLine, tbl.Columns.Where(c => !c.IsComputed).Select(i\
  \ => \"    \" + i.Name + \" \" + TSqlTypeTranslator.Translate(i.DataType, i.Length,\
  \ i.Precision, i.Scale, i.CustomType) + (i.IsNullable ? \" NULL\" : \" NOT NULL\"\
  )))#>\n    )\n    WITH (LOCATION = '[<#=Row[\"SRC_Schema\"]#>].<# =tbl.Name#>',\
  \ DATA_SOURCE = [<#=Row[\"DataSource\"]#>]);\nEND\nGO\n<#\n}\n#>\n```\n*代码清单 5-6.\
  \ 被前一个 Biml 脚本调用的 Biml `12_PolybaseWriter_C.biml`。*\n\n由于本书的重点是大数据集群，而非 `Biml`，因此我们不会深入探讨这个小助手的更多细节。主要目的是向你展示多种自动化处理外部表的方法之一。\n\
  \n顺便说一下，调整此代码以适用于其他关系型数据源（如 Teradata 或 Oracle）并自动化这些源上的外部表也会非常容易！\n\n\n# 来自 HDFS\
  \ 中 CSV 文件的外部表\n\n正如您已经了解到的，除了其他关系型数据库外，您还可以使用 T-SQL 和 PolyBase 查询平面文件。由于分隔符等原因，平面文件没有一种“放之四海而皆准”的通用格式，因此我们至少需要定义一种格式。这个定义驻留在您的数据库中，因此同一个定义可以被多个文件共享，但您需要为希望该格式可用的每个数据库重新创建此定义。\n\
  \n让我们从 `sales` 数据库（包含在 Microsoft 示例中）的一个简单示例（清单 5-7）开始。\n\n```sql\nCREATE EXTERNAL\
  \ FILE FORMAT csv_file\nWITH (\nFORMAT_TYPE = DELIMITEDTEXT,\nFORMAT_OPTIONS(\n\
  FIELD_TERMINATOR = ',',\nSTRING_DELIMITER = '\"',\nFIRST_ROW = 2,\nUSE_TYPE_DEFAULT\
  \ = TRUE)\n);\n```\n**清单 5-7** 创建外部文件格式的 T-SQL 代码\n\n此 T-SQL 代码将创建一个名为 `csv_file`\
  \ 的格式；该文件将是一个以双引号作为文本限定符、逗号作为分隔符的分隔文本文件。第一行将被跳过。参数 `USE_TYPE_DEFAULT` 将决定如何处理缺失的字段。如果为\
  \ `false`，文件中缺失的字段将为 `NULL`；否则，数值型字段为 `0`，基于字符的列为空字符串，任何日期列为 `01/01/1900`。\n\n在本例中，我们将使用\
  \ `StoragePool`，它是大数据集群内置的 HDFS 存储。要能够访问 `StoragePool`，您需要创建一个指向它的外部数据源，如清单 5-8\
  \ 所示。\n\n```sql\nIF NOT EXISTS(SELECT * FROM sys.external_data_sources WHERE name\
  \ = 'SqlStoragePool')\nCREATE EXTERNAL DATA SOURCE SqlStoragePool\nWITH (LOCATION\
  \ = 'sqlhdfs://controller-svc/default');\n```\n**清单 5-8** 创建指向存储池指针的 T-SQL 代码\n\n\
  格式和数据源准备就绪后，我们现在可以创建一个引用此格式以及文件位置的外部表（清单 5-9）。\n\n```sql\nCREATE EXTERNAL TABLE\
  \ [web_clickstreams_hdfs_csv]\n(\"wcs_click_date_sk\" BIGINT , \"wcs_click_time_sk\"\
  \ BIGINT , \"wcs_sales_sk\" BIGINT , \"wcs_item_sk\" BIGINT , \"wcs_web_page_sk\"\
  \ BIGINT , \"wcs_user_sk\" BIGINT)\nWITH\n(\nDATA_SOURCE = SqlStoragePool,\nLOCATION\
  \ = '/clickstream_data',\nFILE_FORMAT = csv_file\n);\n```\n**清单 5-9** 基于 CSV 文件创建外部表的\
  \ T-SQL 代码\n\n与基于 SQL Server 的外部表一样，第一步是定义列，包括其名称和数据类型。此外，我们需要提供一个 `DATA_SOURCE`，即我们的\
  \ `SqlStoragePool`，基本上就是我们大数据集群的 HDFS（之前我们也在此上传了航班延误样本）；该源内的一个 `LOCATION`（在本例中是\
  \ `clickstream_data` 子文件夹）；以及一个 `FILE_FORMAT`，即我们在上一步创建的 `csv_file` 格式。\n\n同样，此时没有传输任何数据。我们所做的只是创建了对驻留在其他地方的数据的引用——在本例中是存储池内。\n\
  \n我们现在可以通过一个简单的查询实时查询此文件，如清单 5-10 所示。\n\n```sql\nSELECT * FROM [dbo].[web_clickstreams_hdfs_csv]\n\
  ```\n**清单 5-10** 针对基于 CSV 的外部表的 SELECT 语句\n\n但是，我们也可以将来自 CSV 的数据与此数据库中常规表中的数据进行连接，如清单\
  \ 5-11 所示。\n\n```sql\nSELECT\nwcs_user_sk,\nSUM( CASE WHEN i_category = 'Books'\
  \ THEN 1 ELSE 0 END) AS book_category_clicks,\nSUM( CASE WHEN i_category_id = 1\
  \ THEN 1 ELSE 0 END) AS [Home & Kitchen],\nSUM( CASE WHEN i_category_id = 2 THEN\
  \ 1 ELSE 0 END) AS [Music],\nSUM( CASE WHEN i_category_id = 3 THEN 1 ELSE 0 END)\
  \ AS [Books],\nSUM( CASE WHEN i_category_id = 4 THEN 1 ELSE 0 END) AS [Clothing\
  \ & Accessories],\nSUM( CASE WHEN i_category_id = 5 THEN 1 ELSE 0 END) AS [Electronics],\n\
  SUM( CASE WHEN i_category_id = 6 THEN 1 ELSE 0 END) AS [Tools & Home Improvement],\n\
  SUM( CASE WHEN i_category_id = 7 THEN 1 ELSE 0 END) AS [Toys & Games],\nSUM( CASE\
  \ WHEN i_category_id = 8 THEN 1 ELSE 0 END) AS [Movies & TV],\nSUM( CASE WHEN i_category_id\
  \ = 9 THEN 1 ELSE 0 END) AS [Sports & Outdoors]\nFROM [dbo].[web_clickstreams_hdfs_csv]\n\
  INNER JOIN item it ON (wcs_item_sk = i_item_sk\nAND wcs_user_sk IS NOT NULL)\nGROUP\
  \ BY  wcs_user_sk;\n```\n**清单 5-11** 将常规表与基于 CSV 的外部表连接的 SELECT 语句\n\n让我们看一下这个查询的执行计划（图\
  \ 5-14）。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig14_HTML.jpg](img/480532_2_En_5_Fig14_HTML.jpg)\n\
  **图 5-14** ADS 中前一个 SELECT 语句的执行计划\n\n如您所见，正如预期的那样，这是熟悉的操作（如聚集列存储索引扫描）与新功能（如最终合并在一起的外部选择）的组合。\n\
  \n当然，我们也可以连接来自多个 CSV 的数据。为此，我们首先为每个航班延误 CSV 文件创建一个外部表。为此，有另一个向导（图 5-15）。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig15_HTML.jpg](img/480532_2_En_5_Fig15_HTML.jpg)\n\
  **图 5-15** ADS 中的“从 CSV 创建外部表”菜单\n\n在 Azure Data Studio 中右键单击文件 `\"airlines.csv\"\
  `，然后选择 `\"Create External Table From CSV Files\"`。\n\n这将启动向导。\n\n在第一个屏幕（图 5-16）中，它将要求您输入\
  \ SQL Server 主实例的连接详细信息，如果您当前已连接到该实例，也可以从活动连接下拉列表中选择。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig16_HTML.jpg](img/480532_2_En_5_Fig16_HTML.jpg)\n\
  **图 5-16** ADS 中的创建外部表向导 (CSV) – 选择主实例\n\n填写它们或选择您的连接，然后单击 `\"Next\"`。\n\n在下一步（图\
  \ 5-17）中，向导将建议目标数据库以及外部表的名称和架构。如果需要，所有三项都可以修改。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig17_HTML.jpg](img/480532_2_En_5_Fig17_HTML.jpg)\n\
  **图 5-17** ADS 中的创建外部表向导 (CSV) – 目标表详细信息\n\n目前，只需点击 `\"Next\"` 确认。\n\n下一个屏幕（图 5-18）为您提供了表中数据的预览（前\
  \ 50 行），以便您了解文件所表示的内容。显然，对于较宽的文件，这并不是特别有用。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig18_HTML.jpg](img/480532_2_En_5_Fig18_HTML.jpg)\n\
  **图 5-18** ADS 中的创建外部表向导 (CSV) – 预览数据\n\n此屏幕上实际上无法执行任何操作，因此只需再次单击 `\"Next\"`。\n\n\
  在第四步（图 5-19）中，向导会建议列名和数据类型。两者都可以覆盖。除非您有充分的理由，否则在许多情况下，实际上建议保持不变，因为目前的检测机制相当可靠。\n\
  \n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig19_HTML.jpg](img/480532_2_En_5_Fig19_HTML.jpg)\n\
  **图 5-19** ADS 中的创建外部表向导 (CSV) – 修改列\n\n## 使用向导创建 CSV 外部表\n\n点击“下一步”（`Next`）后，我们会看到一个如图\
  \ 5-20 所示的摘要界面，这与 SQL Server 表向导之后的情况类似。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig20_HTML.jpg](img/480532_2_En_5_Fig20_HTML.jpg)\n\
  \n**图 5-20** ADS 中创建外部表向导（CSV）- 摘要\n\n选择“生成脚本”（`Generate Script`）并点击“取消”（`Cancel`）。查看生成的脚本（清单\
  \ 5-12）。\n\n```sql\nBEGIN TRY\nBEGIN TRANSACTION Td436a09bbb9a472298de35f6f88d889\n\
  USE [sales];\nCREATE EXTERNAL FILE FORMAT [FileFormat_dbo_airlines]\nWITH (FORMAT_TYPE\
  \ = DELIMITEDTEXT, FORMAT_OPTIONS (FIELD_TERMINATOR = ',', STRING_DELIMITER = '\"\
  ', FIRST_ROW = 2));\nCREATE EXTERNAL TABLE [dbo].[airlines]\n(\n[IATA_CODE] nvarchar(50)\
  \ NOT NULL,\n[AIRLINE] nvarchar(50) NOT NULL\n)\nWITH (LOCATION = '/Flight_Delays/airlines.csv',\
  \ DATA_SOURCE = [SqlStoragePool], FILE_FORMAT = [FileFormat_dbo_airlines]);\nCOMMIT\
  \ TRANSACTION Td436a09bbb9a472298de35f6f88d889\nEND TRY\nBEGIN CATCH\nIF @@TRANCOUNT\
  \ > 0\nROLLBACK TRANSACTION Td436a09bbb9a472298de35f6f88d889\nDECLARE @ErrorMessage\
  \ NVARCHAR(4000) = ERROR_MESSAGE();\nDECLARE @ErrorSeverity INT = ERROR_SEVERITY();\n\
  DECLARE @ErrorState INT = ERROR_STATE();\nRAISERROR(@ErrorMessage, @ErrorSeverity,\
  \ @ErrorState);\nEND CATCH;\n```\n**清单 5-12** ADS 中创建外部表向导（CSV）的 T-SQL 输出\n\n如你所见，该向导不会复用相同的文件格式，而是为每个文件创建一个格式。这显然有利有弊。最大的好处是，你最终不会得到数百个格式。最大的缺点是你可能开始在不需要的地方构建文件之间的依赖关系。是否要修改脚本以使用之前创建的`csv_file`格式，或者仅为本次练习继续创建新格式，这取决于你。\n\
  \n对另外两个文件重复这些步骤。\n\n然后，我们就可以像查询 SQL 表一样查询并连接它们（见清单 5-13），以获取取消次数最高的十个航空公司/目的地城市组合。\n\
  \n```sql\nSELECT TOP 10 ap.CITY, al.AIRLINE, COUNT(*)\nFROM flights fl\nINNER JOIN\
  \ airlines al\nON fl.AIRLINE = al.IATA_CODE\nINNER JOIN airports ap\nON fl.DESTINATION_AIRPORT\
  \ = ap.IATA_CODE\nWHERE cancelled = 1\nGROUP BY ap.CITY,\nal.AIRLINE\nORDER BY COUNT(*)\
  \ DESC;\n```\n**清单 5-13** 针对先前创建的外部表的`SELECT`语句\n\n这将导致一个错误。\n\n原因是该向导只查看你数据的前 50\
  \ 行，所以如果你的数据在这些行中没有显示某种模式，它就不会被检测到。不过，错误信息（图 5-21）清楚地告诉了我们问题所在。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig21_HTML.png](img/480532_2_En_5_Fig21_HTML.png)\n\
  \n**图 5-21** 查询外部表时的错误信息\n\n在第 14500 行（远超过前 50 行），`AIR_SYSTEM_DELAY`列发生了溢出。\n\n\
  如果我们查看该表的脚本（清单 5-14），会注意到此列被检测为`tinyint`。\n\n```sql\nCREATE EXTERNAL TABLE [dbo].[flights]\n\
  (\n[YEAR] smallint NOT NULL,\n[MONTH] tinyint NOT NULL,\n[DAY] tinyint NOT NULL,\n\
  [DAY_OF_WEEK] tinyint NOT NULL,\n[AIRLINE] nvarchar(50) NOT NULL,\n[FLIGHT_NUMBER]\
  \ smallint NOT NULL,\n[TAIL_NUMBER] nvarchar(50),\n[ORIGIN_AIRPORT] nvarchar(50)\
  \ NOT NULL,\n[DESTINATION_AIRPORT] nvarchar(50) NOT NULL,\n[SCHEDULED_DEPARTURE]\
  \ time NOT NULL,\n[DEPARTURE_TIME] time,\n[DEPARTURE_DELAY] smallint,\n[TAXI_OUT]\
  \ tinyint,\n[WHEELS_OFF] time,\n[SCHEDULED_TIME] smallint NOT NULL,\n[ELAPSED_TIME]\
  \ smallint,\n[AIR_TIME] smallint,\n[DISTANCE] smallint NOT NULL,\n[WHEELS_ON] time,\n\
  [TAXI_IN] tinyint,\n[SCHEDULED_ARRIVAL] time NOT NULL,\n[ARRIVAL_TIME] time,\n[ARRIVAL_DELAY]\
  \ smallint,\n[DIVERTED] bit NOT NULL,\n[CANCELLED] bit NOT NULL,\n[CANCELLATION_REASON]\
  \ nvarchar(50),\n[AIR_SYSTEM_DELAY] tinyint,\n[SECURITY_DELAY] tinyint,\n[AIRLINE_DELAY]\
  \ smallint,\n[LATE_AIRCRAFT_DELAY] smallint,\n[WEATHER_DELAY] tinyint\n)\nWITH (LOCATION\
  \ = N'/Flight_Delays/flights.csv', DATA_SOURCE = [SqlStoragePool], FILE_FORMAT =\
  \ [FileFormat_flights]);\n```\n**清单 5-14** 外部表`flights`的原始`CREATE`语句\n\n让我们将其改为`int`（或`bigint`），同时，一并修改其他延迟列（清单\
