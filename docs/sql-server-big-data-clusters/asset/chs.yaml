  \n**图 5-22** 查询外部表时的不同错误信息\n\n一个好的做法是将所有平面文件列设为可为空（`nullable`）。\n\n因此，让我们再次重新创建我们的表（清单\
  \ 5-18），这次不使用任何“`NOT NULL`”提示。\n\n## 查询外部表与问题修复\n\n# 访问 Azure Blob 存储中的数据\n\n如果您将数据存储在\
  \ Azure Blob 存储中，除了可能的网络延迟外，无需将数据复制到您的 `SqlStoragePool` 中。您还可以通过将其定义为外部数据源来访问 Blob\
  \ 存储（清单 5-20）。\n\n```sql\nCREATE EXTERNAL DATA SOURCE AzureStorage with (\nTYPE\
  \ = HADOOP,\nLOCATION ='wasbs://@.blob.core.windows.net',\nCREDENTIAL = AzureStorageCredential\n\
  );\n```\n清单 5-20\n使用 Azure Blob 存储创建外部数据源\n\n# 来自其他数据源的外部表\n\n## 基于文件的数据源\n\n其他基于文件的数据源变体包括\
  \ Parquet、Hive RCFile 和 Hive ORC；但是，如果您使用的是存储池，目前仅支持分隔符文件和 Parquet 文件。\n\n由于这些是压缩文件类型，我们需要提供\
  \ `DATA_COMPRESSION`，对于 RCFile，还需要提供 `SERDE_METHOD`（清单 5-21）。\n\n```sql\n-- 为 PARQUET\
  \ 文件创建外部文件格式。\nCREATE EXTERNAL FILE FORMAT file_format_name\nWITH (\nFORMAT_TYPE\
  \ = PARQUET\n[ , DATA_COMPRESSION = {\n'org.apache.hadoop.io.compress.SnappyCodec'\n\
  | 'org.apache.hadoop.io.compress.GzipCodec'      }\n]);\n--为 ORC 文件创建外部文件格式。\nCREATE\
  \ EXTERNAL FILE FORMAT file_format_name\nWITH (\nFORMAT_TYPE = ORC\n[ , DATA_COMPRESSION\
  \ = {\n'org.apache.hadoop.io.compress.SnappyCodec'\n| 'org.apache.hadoop.io.compress.DefaultCodec'\
  \      }\n]);\n--为 RCFILE 创建外部文件格式。\nCREATE EXTERNAL FILE FORMAT file_format_name\n\
  WITH (\nFORMAT_TYPE = RCFILE,\nSERDE_METHOD = {\n'org.apache.hadoop.hive.serde2.columnar.LazyBinaryColumnarSerDe'\n\
  | 'org.apache.hadoop.hive.serde2.columnar.ColumnarSerDe'\n}\n[ , DATA_COMPRESSION\
  \ = 'org.apache.hadoop.io.compress.DefaultCodec' ]);\n```\n清单 5-21\n其他外部表类型的 CREATE\
  \ 语句示例\n\n（摘自官方 Microsoft 文档，[`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-file-format-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-file-format-transact-sql)）\n\
  \n## ODBC\n\n当尝试通过通用 ODBC 连接到外部数据源时，您需要提供服务器（以及可选的端口），就像添加 SQL Server 一样，但此外，您还需要指定驱动程序（清单\
  \ 5-22），以便 SQL Server 知道如何连接到该源。\n\n```sql\nCREATE EXTERNAL DATA SOURCE \nWITH (\n\
  LOCATION = odbc://[:],\nCONNECTION_OPTIONS = 'Driver={};\nServerNode = :',\nPUSHDOWN\
  \ = ON,\nCREDENTIAL = credential_name\n);\n```\n清单 5-22\n针对 ODBC 源创建外部数据源\n\n`PUSHDOWN`\
  \ 标志定义是否将计算下推到源，默认值为 `ON`。\n\n## 其他\n\n对于其他内置连接器，语法遵循通用模式（清单 5-23）。\n\n```sql\n\
  CREATE EXTERNAL DATA SOURCE \nWITH (\nLOCATION = ://[:],\nCREDENTIAL = credential_name\n\
  );\n```\n清单 5-23\n外部数据源的通用 CREATE 语句\n\n其中，您将 `<vendor>` 替换为您尝试使用的内置连接器的供应商名称。\n\
  \n对于 Oracle，将如清单 5-24 所示。\n\n```sql\nCREATE EXTERNAL DATA SOURCE \nWITH (\nLOCATION\
  \ = oracle://[:],\nCREDENTIAL = credential_name\n```\n清单 5-24\n针对 Oracle 中的外部数据源的\
  \ CREATE 语句\n\n相同的逻辑适用于 Teradata 和 MongoDB，我们期望所有未来的供应商都将以相同的方式实现。\n\n\n### SqlDataPool\n\
  \n`SqlDataPool` 是用于处理大数据集群的数据池，它允许你将来自 SQL 表的数据分布到整个池中。\n\n就像存储池一样，首先需要在你想要使用的每个数据库中创建一个相应的指针，如清单\
  \ 5-25 所示。\n\n```sql\nIF NOT EXISTS(SELECT * FROM sys.external_data_sources WHERE\
  \ name = 'SqlDataPool')\nCREATE EXTERNAL DATA SOURCE SqlDataPool\nWITH (LOCATION\
  \ = 'sqldatapool://controller-svc/default');\n-- 清单 5-25\n-- 用于创建指向 SQL 数据池指针的 T-SQL\
  \ 代码\n```\n\n我们将在销售数据库中再次执行此操作。\n\n首先，我们再次创建一个外部表（清单 5-26）。请注意，与之前的示例不同，之前我们指定的是特定文件或位置，而在这里，我们只提供提示，表明此表应存储在\
  \ `SqlDataPool` 中并使用轮询（`ROUND_ROBIN`）方式进行分布。\n\n```sql\nCREATE EXTERNAL TABLE [web_clickstream_clicks_data_pool]\n\
  (\"wcs_user_sk\" BIGINT , \"i_category_id\" BIGINT , \"clicks\" BIGINT)\nWITH\n\
  (\nDATA_SOURCE = SqlDataPool,\nDISTRIBUTION = ROUND_ROBIN\n);\n-- 清单 5-26\n-- 在\
  \ SqlDataPool 上为外部表创建的 CREATE 语句\n```\n\n你现在可以使用常规的 `INSERT INTO` 语句将数据插入此表，如清单\
  \ 5-27 所示。\n\n```sql\nINSERT INTO web_clickstream_clicks_data_pool\nSELECT wcs_user_sk,\
  \ i_category_id, COUNT_BIG(*) as clicks\nFROM sales.dbo.web_clickstreams_hdfs_parquet\n\
  INNER JOIN sales.dbo.item it ON (wcs_item_sk = i_item_sk\nAND wcs_user_sk IS NOT\
  \ NULL)\nGROUP BY wcs_user_sk, i_category_id\n-- 清单 5-27\n-- 从 SQL 查询填充 SqlDataPool\
  \ 中的表\n```\n\n与之前的所有示例一样，这个外部表现在可以像任何其他表一样进行查询和联接（清单 5-28）。\n\n```sql\nSELECT count(*)\
  \ FROM [dbo].[web_clickstream_clicks_data_pool]\nSELECT TOP 10 * FROM [dbo].[web_clickstream_clicks_data_pool]\n\
  SELECT TOP (100)\nw.wcs_user_sk,\nSUM( CASE WHEN i.i_category = 'Books' THEN 1 ELSE\
  \ 0 END) AS book_category_clicks,\nSUM( CASE WHEN w.i_category_id = 1 THEN 1 ELSE\
  \ 0 END) AS [Home & Kitchen],\nSUM( CASE WHEN w.i_category_id = 2 THEN 1 ELSE 0\
  \ END) AS [Music],\nSUM( CASE WHEN w.i_category_id = 3 THEN 1 ELSE 0 END) AS [Books],\n\
  SUM( CASE WHEN w.i_category_id = 4 THEN 1 ELSE 0 END) AS [Clothing & Accessories],\n\
  SUM( CASE WHEN w.i_category_id = 5 THEN 1 ELSE 0 END) AS [Electronics],\nSUM( CASE\
  \ WHEN w.i_category_id = 6 THEN 1 ELSE 0 END) AS [Tools & Home Improvement],\nSUM(\
  \ CASE WHEN w.i_category_id = 7 THEN 1 ELSE 0 END) AS [Toys & Games],\nSUM( CASE\
  \ WHEN w.i_category_id = 8 THEN 1 ELSE 0 END) AS [Movies & TV],\nSUM( CASE WHEN\
  \ w.i_category_id = 9 THEN 1 ELSE 0 END) AS [Sports & Outdoors]\nFROM [dbo].[web_clickstream_clicks_data_pool]\
  \ as w\nINNER JOIN (SELECT DISTINCT i_category_id, i_category FROM item) as i\n\
  ON i.i_category_id = w.i_category_id\nGROUP BY w.wcs_user_sk;\n-- 清单 5-28\n-- 对\
  \ SqlDataPool 中的表执行 SELECT（独立查询及与其他表联接）\n```\n\n执行计划（图 5-23）与我们之前查询存储池时看到的情况类似。\n\
  \n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig23_HTML.jpg](img/480532_2_En_5_Fig23_HTML.jpg)\n\
  \n**图 5-23**\n\n**在 ADS 中的执行计划**\n\n请注意，与 `SqlStoragePool` 不同，位于数据池中的数据在 Azure Data\
  \ Studio 的 HDFS 文件夹中不显示为文件，因为其数据存储在常规的 SQL 表中！\n\n### SqlDataPool 上的索引\n\n`SqlDataPool`\
  \ 与其他外部数据源的一个主要区别在于它由常规的 SQL Server 表组成，这意味着你可以直接控制这些表上的索引。\n\n默认情况下，`SqlDataPool`\
  \ 中的每个表都会使用聚集列存储索引创建。由于扩展（scale out）以及数据池的主要使用场景是分析工作负载，这很可能开箱即用地满足许多查询需求。\n\n如果你仍然想创建或更改索引，这需要在数据池内部进行，可以使用\
  \ `EXECUTE AT` 开关来实现，如清单 5-29 所示。\n\n```sql\nexec () AT Data_Source SqlDataPool\n\
  -- 清单 5-29\n-- 带有 EXECUTE AT 的 EXEC\n```\n\n你可以使用它在数据池上运行任何类型的查询，它将为数据池中的每个节点返回一个结果网格。例如，要获取数据池中所有表的列表，运行清单\
  \ 5-30。\n\n```sql\nexec ('SELECT * FROM sys.tables') AT Data_Source SqlDataPool\n\
  -- 清单 5-30\n-- 获取数据池中的表列表\n```\n\n结果如图 5-24 所示。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig24_HTML.jpg](img/480532_2_En_5_Fig24_HTML.jpg)\n\
  \n**图 5-24**\n\n**数据池中表列表的结果**\n\n你可能会感到有点惊讶，因为你可能期望不同的表。原因在于，就像你的主实例一样，数据池也会有多个数据库，因此上下文很重要。让我们通过切换当前数据库上下文再试一次，如清单\
  \ 5-31 所示。这仅适用于在 `SqlDataPool` 中至少有一个表的数据库，因为数据库是在那时创建的。\n\n```sql\nexec ('USE sales;\
  \ SELECT * FROM sys.tables') AT Data_Source SqlDataPool\n-- 清单 5-31\n-- 从销售数据库获取数据池中的表列表\n\
  ```\n\n这次的结果（见图 5-25）看起来更符合我们的预期。\n\n![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig25_HTML.jpg](img/480532_2_En_5_Fig25_HTML.jpg)\n\
  \n**图 5-25**\n\n**从销售数据库查询数据池中表列表的结果**\n\n要添加索引，你只需在 `EXEC` 语句中添加相应的 `CREATE INDEX`\
  \ 语句，如清单 5-32 所示。\n\n```sql\nEXEC ('USE Sales; CREATE NONCLUSTERED INDEX [CI_wcs_user_sk]\
  \ ON [dbo].[web_clickstream_clicks_data_pool] ([wcs_user_sk] ASC)') AT DATA_SOURCE\
  \ SqlDataPool\n-- 清单 5-32\n-- 在数据池中创建索引\n```\n\n## 总结\n\n在本章中，我们使用了先前加载的数据，并通过多种技术对其进行了查询，包括使用\
  \ T-SQL、从另一个 SQL Server 查询以及查询平面文件。我们还了解了如何自动化该方面的某些任务。\n\n正如你之前所学的，T-SQL 并不是查询大数据集群的唯一方式：另一种方式是\
  \ Spark。第 6 章将引导你完成该过程！\n\n脚注 1   2   3   4   5\n\n\n\n# 第 6 章 在大数据集群中使用 Spark\n\
  \n到目前为止，我们一直在使用外部表和 T-SQL 代码查询 SQL Server 大数据集群中的数据。然而，我们还有另一种方法可用于查询存储在大数据集群 HDFS\
  \ 文件系统中的数据。正如你在第[2]章中所读到的，大数据集群的架构中也包含了 Spark，这意味着我们可以利用 Spark 的强大功能来查询存储在大数据集群中的数据。\n\
  \nSpark 是分析和查询大数据集群内部数据的一个非常强大的选项，主要是因为 Spark 是作为一个分布式和并行框架构建的，这意味着它在处理超大规模数据集时速度非常快，当你需要处理大型数据集时，它比\
  \ SQL Server 高效得多。Spark 在支持的编程语言方面也提供了很大的灵活性，最突出的是 `Scala` 和 `PySpark`（尽管 Spark\
  \ 也支持 `R` 和 `Java`）。\n\n在大多数我们示例中使用的命令中，`PySpark` 和 `Scala` 的语法非常相似。不过，也有一些细微的差别。\n\
  \n代码清单 [6-1] 和 [6-2] 展示了如何使用 `PySpark` 和 `Scala` 将 CSV 文件读入数据帧（不用担心，我们很快会详细介绍数据帧）。\n\
  \n```scala\n// 从 HDFS 导入 airports.csv 文件 (Scala)\nval df_airports = spark.read.format(\"\
  csv\").option(\"header\", \"true\").option(\"inferSchema\", \"true\").load(\"/Flight_Delays/airports.csv\"\
  )\n清单 6-2\n使用 Scala 从 HDFS 导入 CSV\n```\n\n```python\n"
- '# 从 HDFS 导入 airports.csv 文件 (PySpark)

  df_airports = spark.read.format(''csv'').options(header=''true'', inferSchema="true").load(''/Flight_Delays/airports.csv'')

  清单 6-1

  使用 PySpark 从 HDFS 导入 CSV

  ```


  如你所见，`PySpark` 和 `Scala` 的示例代码看起来非常相似，但也存在一些小差异。例如，用于注释的字符，在 `PySpark` 中注释用 `#`
  号标记，而在 `Scala` 中我们使用 `//`。另一个区别在于引号。在 `PySpark` 代码中，我们可以同时使用单引号和双引号，而 `Scala` 则更挑剔，只接受双引号。此外，在
  `PySpark` 中我们不需要显式定义变量（在 `Scala` 中称为值），但在使用 `Scala` 时，我们需要明确指定这一点。


  尽管本书的重点是大数据集群，但我们相信，介绍如何编写 `PySpark` 对于使用 SQL Server 大数据集群将非常有用，因为它为你提供了除了 SQL 之外，处理大数据集群内部数据的不同方法。


