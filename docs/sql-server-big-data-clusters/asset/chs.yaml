  ## 引言


  当我们最初开始讨论撰写一本关于 SQL Server 大数据群集的书籍时，该产品仍处于早期迭代阶段。我们俩都对其中包含的所有技术以及它可能改变数据处理和分析领域的方式感到非常兴奋。我们当时几乎不知道，在我们写作期间，该产品将经历多少变化。最终，这导致我们几乎每个月都要重写整本书。虽然这是一项艰巨的任务，但它也让我们能够跟踪并记录该产品在其开发过程中所经历的一切。现在最终产品已经发布，我们认为是时候提供一个反映大数据群集如今一切的更新版本了；结果就是您现在面前的这本书！


  SQL Server 大数据群集是一个令人难以置信的激动人心的新平台。如前所述，它由多种使其运作的不同技术组成。Kubernetes、HDFS、Spark 和
  Linux 上的 SQL Server 只是大数据群集内部的一些主要组成部分。除了所有这些不同的产品组合成一个单一产品外，您还可以根据您的用例将其部署在本地或
  Azure 云中。正如您可以想象的那样，一本书几乎不可能深入讨论所有这些不同的产品（事实上，有很多书籍确实深入探讨了构成大数据群集的每个独立产品的所有微小细节，例如
  Spark 或 Linux 上的 SQL Server）。因此，我们为本书选择了一种不同的方法，将更侧重于大数据群集的整体架构以及如何利用大数据群集提供的不同数据处理和分析方法的实用示例。


  通过这种方法，我们相信在您阅读本书时，您将能够理解大数据群集的运作原理、它们的用例，以及如何开始部署、管理和使用大数据群集。这样，本书旨在提供有用的信息，可用于处理
  `数据` 的各种工作角色——从希望了解大数据群集如何作为集中式数据枢纽的数据架构师，到想要知道如何将数据库管理和部署到集群的数据库管理员，再到希望在大数据群集上训练和操作化机器学习模型的数据科学家，以及许多其他角色。如果您以任何方式处理数据，这本书都应该有些东西能让您思考！


  ## 书籍布局


  我们将本书分为九个独立的章节，每章重点介绍大数据群集的一个特定领域或功能：


  ### 第 1 章：“什么是大数据群集？”

  在本章中，我们将概述 SQL Server 大数据群集及其各种用例。


  ### 第 2 章：“大数据群集架构。”

  在本章中，我们将更深入地探讨构成大数据群集的内容，描述大数据群集内的各个逻辑区域，并了解所有不同部分如何协同工作。


  ### 第 3 章：“大数据群集的部署。”

  本章将引导您完成使用本地或云环境部署大数据群集的第一步，并描述如何连接到您的集群，最后介绍可用于管理和监控大数据群集的管理选项。


  ### 第 4 章：“将数据加载到大数据群集。”

  本章将重点介绍从各种源到大数据群集的数据摄入。


  ### 第 5 章：“通过 `T-SQL` 查询大数据群集。”

  本章重点介绍通过 `PolyBase` 使用外部表，并使用 `T-SQL` 语句查询您的数据。


  ### 第 6 章：“在大数据群集中使用 Spark。”

  虽然前一章主要侧重于使用 `T-SQL` 处理大数据群集上的数据，但本章将重点放在使用 Spark 进行数据探索和分析。


  ### 第 7 章：“大数据群集上的机器学习。”

  大数据群集的主要功能之一是能够在单一平台内训练、评分和操作化机器学习模型。在本章中，我们将重点介绍通过 SQL Server 内置机器学习服务和 Spark 来构建和利用机器学习模型。


  ### 第 8 章：“创建和使用大数据群集应用。”

  在本书倒数第二章中，我们将仔细研究如何通过大数据群集平台部署和使用自定义应用程序。这些应用程序的范围可以涵盖从管理任务到提供用于执行机器学习模型评分的 REST
  API。


  ### 第 9 章：“大数据群集的维护。”

  为了完成您的大数据群集体验，我们将探讨管理和维护大数据群集需要做什么。


