  我们可以做的另一件事是存储模型。在这个领域，我们比在 SQL Server 内置机器学习服务中灵活得多，在那里模型必须被序列化并存储在表中。对于 Spark，我们可以选择不同的方法和库来存储我们的模型。例如，我们可以使用一个名为
  `Pickle` 的库将模型存储在文件系统上，或者使用模型变量上的 `.save` 函数将其存储在我们选择的 HDFS 位置。每当我们需要使用训练好的模型对新数据进行评分时，我们可以直接从文件系统加载它并用于评分新数据。


  ## 总结


  在本章中，我们探讨了在 SQL Server 大数据集群中执行机器学习任务的各种可用方法。我们研究了 SQL Server 内置机器学习服务，它允许我们使用 T-SQL
  查询和新的 `sp_execute_external_script` 存储过程的组合，在 SQL Server 主实例中直接训练、利用和存储机器学习模型。在 Spark
  方面，我们也有广泛的机器学习能力可供使用。我们使用了 Spark ML 库在数据帧上训练模型，并用它来对新数据进行评分。这两种方法各有优缺点，但在单个解决方案中提供这两种选择，为我们所有的机器学习需求提供了最佳的灵活性。


  ## 8. 创建和消费大数据集群应用


  SQL Server 大数据集群的功能之一是能够在它上面构建和运行自定义应用程序。这实际上是一个非常强大的功能，因为它允许你在大数据集群上编写和运行各种解决方案的脚本。例如，你可以创建一个应用程序（或简称
  app，在本章剩余部分我们将这样称呼它）来执行各种数据维护任务，比如数据库备份。另一个例子是能够通过 REST API 为你的机器学习过程创建一个入口点，这个用例我们将在本章后面探讨。


  在撰写本书时，在大数据集群上创建的应用程序可以用 R 和 Python 编写，此外还有一个额外的选项可以运行 SQL Server 集成服务（SSIS）包。通过创建应用程序，你可以利用大数据集群内所有可用的计算资源，并访问存储在其中的所有数据。


  大数据集群中的应用程序在专用容器中运行，并且可以在集群中复制和扩展。这意味着你可以让你的应用程序处理并行工作负载，成为高性能的解决方案。


  在本章中，我们将创建一个应用程序，它将使用一个预训练的机器学习模型对鸢尾花植物的物种进行分类，这与我们在上一章中专注于在大数据集群内开发机器学习解决方案时所做的非常相似。通过构建一个应用程序来使用机器学习解决方案对数据进行评分，我们可以通过
  REST API 轻松地将该模型投入运营。这意味着你使用或自己构建的应用程序可以直接通过 JSON 消息从大数据集群接收预测，从而实现从你的应用程序直接进行近实时评分，而无需先在大数据集群内存储和处理数据。




  ## 创建大数据集群应用


  有两种方法可以将应用部署到大数据集群：通过 Visual Studio Code 的应用部署扩展，或者通过 `azdata` 命令行工具。我们将专注于使用后一种方法来创建和部署我们的应用。


  在部署应用之前，我们首先需要编写它。正如本章引言中提到的，应用可以用 R 或 Python 编写，我们选择了 R 作为应用的编程语言。虽然要跟随本章的示例，严格来说并不需要访问
  R，但如果你想自己训练应用内部使用的机器学习模型，那将会很有用。无论如何，预训练的模型以及应用部署所需的其他文件都可以在本书的 GitHub 页面下载。


  由于我们将创建一个使用机器学习模型为新数据评分的大数据集群应用，我们需要先创建并存储模型。清单 8-1 中的代码将使用内置的 Iris 数据集通过决策树创建一个机器学习模型，并将其存储在一个
  `.RDS` 文件中（运行代码前请确保设置好目录路径）。我们稍后将使用存储在 `.RDS` 文件中的模型为新数据评分。你可以从本地计算机的 R 会话中执行以下代码。你可以从
  [`www.r-project.org/`](http://www.r-project.org/) 下载并安装 R。


  ```r

  # Read the Iris data into a new dataframe

  Iris_Data <- iris

  # Change the column names

  colnames(Iris_Data) <- c(''Sepal_Length'', ''Sepal_Width'', ''Petal_Length'', ''Petal_Width'',
  ''Species'')

  # Sample a number of rows for splitting training and testing datasets

  sample_size <- floor(0.75 ∗ nrow(Iris_Data))

  set.seed(1234)

  train_id <- sample(seq_len(nrow(Iris_Data)), size = sample_size)

  Iris_train <- Iris_Data[train_id, ]

  Iris_test <- Iris_Data[-train_id, ]

  # Train the model, a decision tree, on the training data

  Iris_Dtree <- rpart(Species~., data = Iris_train, method = ''class'')

  # Save the model to disk

  saveRDS(Iris_Dtree, "[folder path]/iris_dtree.rds")

  ```

  **清单 8-1** 在 R 中构建预测模型


  如清单 8-1 所示，我们增加了将数据拆分为训练集和测试集的步骤。然而，在前面的代码中，我们只使用训练数据集来训练模型，并未使用测试数据集来测试其准确性。本章中我们并不特别关注模型性能，而是关注使用预训练模型通过我们的大数据集群应用为新数据评分的能力。如果你想查看模型训练的效果，可以运行清单
  8-2 中的代码行，它将基于我们训练好的模型进行 Iris 品种预测，并将这些预测与原始测试数据集结合起来。


  ```r

  Iris_Predict <- predict(Iris_Dtree, Iris_test, method = ''class'')

  Prediction_results <- cbind(Iris_test, Iris_Predict)

  ```

  **清单 8-2** 使用我们训练好的模型进行预测


  现在我们有了一个存储在 RDS 文件中的预训练模型，可以来看看创建大数据集群应用所需的实际代码了。


  一个大数据集群应用至少包含两个文件：我们将在应用内部运行的实际代码，以及一个保存应用配置的 YAML 文件。这两个文件，以及任何你想上传到应用容器的附加文件（例如我们的预训练机器学习模型），都必须全部存储在一个单独的目录中，如图
  8-1 所示。


  ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig1_HTML.jpg](img/480532_2_En_8_Fig1_HTML.jpg)

  **图 8-1** 应用文件


  除了 “`spec.yaml`” 文件，你可以自由地以任何你想要的方式命名其他文件。


  首先让我们看看 “`Predict_Iris.R`” 文件的内容。该文件将包含从 “`iris_dtree.rds`” 文件加载预训练模型，并根据我们传递给脚本文件的输入变量执行预测所需的代码。该文件的内容见清单
  8-3。


  ```r

  library(rpart)

  runpredict <- function(SepalLength, SepalWidth, PetalLength, PetalWidth) {

  input_dataframe = data.frame(Sepal_Length = SepalLength, Sepal_Width = SepalWidth,
  Petal_Length = PetalLength, Petal_Width = PetalWidth)

  Iris_Dtree <- readRDS("iris_dtree.rds")

  Iris_Predict <- predict(Iris_Dtree, input_dataframe, method = ''class'')

  result <- as.data.frame(Iris_Predict)

  }

  ```

  **清单 8-3** Predict_Iris.R 文件的内容


  在前面的代码中，我们首先加载了基于决策树进行预测所需的 R 库。我们最初也是使用 `rpart` 库来训练模型的；因此，当我们想要执行预测时，也需要加载该库。


  通过脚本文件的整个处理过程由一个 R 函数处理。这是必要的，因为我们将在 `spec.yaml` 文件中定义一个入口点，该入口点在运行应用时会被调用。在函数定义中，我定义了四个输入变量：`SepalLength`、`SepalWidth`、`PetalLength`
  和 `PetalWidth`。当我们调用应用时，会将这些变量作为输入参数提供给模型以执行预测。在函数内的第一行代码中，我将输入变量分组并将它们存储在一个名为 `input_dataframe`
  的 R 数据框中，同时注意将列名重命名为与我们训练模型时使用的格式相同。这是必需的，否则预测将不知道哪一列是哪种数据。


  下一步，我们从 RDS 文件加载预训练模型，该文件我们也上传到了应用容器，之后调用 R 的 `predict` 函数，使用模型和输入数据框执行预测。最后，我们将预测结果转换为数据框格式并映射到
  `result` 变量。


  现在我们已经完成了应用程序脚本，必须创建 `spec.yaml` 文件。对于本章中我们要部署到大数据集群的示例应用，`spec.yaml` 文件内容如清单 8-4
  所示。


  ```yaml

  name: predictiris

  version: v1

  runtime: R

  src: ./Predict_Iris.R

  entrypoint: runpredict

  replicas: 1

  poolsize: 1

  inputs:

  SepalLength: numeric

  SepalWidth: numeric

  PetalLength: numeric

  PetalWidth: numeric

  output:

  out: data.frame

  ```

  **清单 8-4** spec.yaml 文件的内容


  `spec.yaml` 文件的大部分内容是不言自明的。我们提供了应用的名称和版本、运行时语言，以及运行应用时调用的文件。在底部部分，我们定义了输入参数（与我们在
  R 函数中定义的参数相同）及其数据类型，以及输出参数的数据类型。在这种情况下，我们没有显式设置输出参数名称。这是因为 R 在调用函数时自动使用最后设置的变量（在我们的例子中是
  `result`）作为输出。




  '
- '# YAML 参数配置与应用部署


  ## 1. 理解关键参数

  YAML 文件中比较有趣的参数是 `replicas` 和 `poolsize`。这些是我们可以配置以实现应用副本和伸缩的参数。`replicas` 参数的输入值决定了应为应用部署多少个
  Pod，而 `poolsize` 则配置了一个 Pod 内应存在多少个应用实例。您的应用能够执行的并行操作数量是 `replicas x poolsize` 的计算结果。例如，将
  `replicas` 配置为 4，`poolsize` 设置为 2，将使您的应用能够处理 8 个并行请求。在我们的 `spec.yaml` 中，我们将这两个设置都配置为
  1，意味着我们一次只能处理一个请求。


  ## 2. 部署前的准备

  所有应用部署所需的文件都已准备就绪并存储在一个文件夹中，我们已经可以将应用部署到大数据集群。如前所述，我们使用 `azdata` 程序来执行部署。


  在连接到大数据集群之前，我们需要获取 `controller-svc-external` 服务的外部 IP。为此，您可以运行以下命令：`kubectl get
  svc controller-svc-external -n [clustername]`，其中 `[clustername]` 是您的集群名称。如果您使用 AKS
  托管大数据集群，则需要先使用 `az` 命令登录到 Azure。


  ## 3. 连接到管理服务

  现在我们有了管理服务的 IP 和端口号，需要使用管理员用户名和密码通过 `azdata` 连接到它。您在部署大数据集群时提供了这两者。下面的代码（清单 8-5）用于建立到大数据集群的连接。请务必将
  `[ ]` 之间的变量替换为您的集群对应的值。


  ```

  azdata login –-controller-endpoint https://[IP address]:30080 –-controller-username
  [username]

  ```

  *清单 8-5：登录到控制器端点*


  系统会要求您输入管理员用户的密码。如果一切顺利，您应该会收到一条成功登录的消息。


  ## 4. 部署应用程序

  现在我们通过 `azdata` 连接到了大数据集群，可以部署我们的应用程序了。为此，我们可以使用清单 8-6 所示的代码。请务必将 `[directory path]`
  更改为存放您的应用程序文件（如 `spec.yaml`）的目录路径。


  ```

  azdata app create --spec [directory path]

  ```

  *清单 8-6：部署大数据集群应用*


  在我们的例子中，我们调用了以下命令（清单 8-7）。


  ```

  azdata app create --spec /Users/enricovandelaar/Documents/BDC.

  ```

  *清单 8-7：部署我们的大数据集群应用*


  运行上述命令时，会发生一系列验证，以检查 `spec.yaml` 文件是否存在以及输入是否正确。如果一切正确，您应该会收到如图 8-2 所示的消息。


  ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig2_HTML.jpg](img/480532_2_En_8_Fig2_HTML.jpg)

  *图 8-2：大数据集群应用已创建*


  ## 5. 检查应用状态

  即使您收到应用已成功创建的消息，它也不会立即可用。创建应用后，通常需要大约一分钟才能实际运行您的应用程序。如果您想了解应用创建的状态，可以运行清单 8-8 中的命令。


  ```

  azdata app list -n predictiris

  ```

  *清单 8-8：通过 `azdata` 检索应用状态*


  这将返回应用部署的当前状态，如图 8-3 所示。


  ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig3_HTML.jpg](img/480532_2_En_8_Fig3_HTML.jpg)

  *图 8-3：应用创建状态*


  大约一分钟后，我们再次运行该命令，收到了“就绪”状态（如图 8-4 所示），这意味着我们可以继续下一步来测试我们的应用。


  ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig4_HTML.jpg](img/480532_2_En_8_Fig4_HTML.jpg)

  *图 8-4：应用部署完成，应用处于就绪状态*


  ## 6. 测试应用功能

  当应用处于“就绪”状态时，我们可以通过 `azdata` 程序测试其功能。如果我们定义了任何参数，则需要在调用应用时提供它们，同时提供我们在 `spec.yaml`
  文件中提供的应用名称和版本。清单 8-9 中的命令调用我们的 `predictiris` 应用，并附带了一些我们在 R 脚本和 YAML 文件中定义的输入参数。


  ```

  azdata app run -n predictiris -v v1 --inputs PetalLength=1.4,PetalWidth=0.2,SepalLength=5.1,SepalWidth=3.5

  ```

  *清单 8-9：通过 `azdata` 运行应用*


  如果一切顺利完成，我们应该会得到图 8-5 所示的 JSON 格式结果。


  ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig5_HTML.jpg](img/480532_2_En_8_Fig5_HTML.jpg)

  *图 8-5：应用预测结果*


  由于我们从 R 脚本文件中返回的输出位于一个数据框中，因此输出会自动转换为 JSON 数组。在 `predictiris` 应用的例子中，预测返回三个输出参数，其中包含每种可能的鸢尾花物种的概率。在这种情况下，考虑到我们提供的输入参数值，`virginica`
  物种似乎是最可能的，其确定性为 0.97 或 97%。


  当您的应用出现问题时，在大多数情况下，您可以在返回的 JSON 的 “errorMessage” 或 “consoleOutput” 部分看到错误。在我们的例子中，应用成功执行，我们没有遇到任何错误。


  ## 7. 后续使用

  现在我们的应用已经部署并测试完毕，我们可以继续使用 `azdata` 方法来按需或以编程方式调用该应用。另一种执行应用的方法（我认为更加优雅）是通过部署应用时自动创建的
  REST API。



  ## 通过 REST API 使用大数据集群应用


  当我们部署应用时，会创建一个专用的容器，其中包含我们的应用以及通过应用文件夹提供的所有附加文件。在部署过程中，容器内还会创建一个 RESTful Web 服务，作为调用应用的附加方法。RESTful
  API 使用 HTTP 请求来执行任务。在我们的案例中，可以使用 REST API 来调用我们创建的应用，并在 JSON 消息中返回输出。这在您创建了大数据集群上的应用并希望从（例如）您的应用程序直接访问时非常有用。由于所有代码和数据都驻留在大数据集群上，您的应用程序只需要能够发送
  REST API 调用并处理返回的消息，即可立即将数据返回到您的应用程序中。


  为了利用我们应用的 REST API，我们需要执行一系列步骤。其中最重要的是我们需要生成一个令牌以安全地调用 REST API。其中一些步骤需要通过一个可以发送
  REST API 调用并处理其结果的工具来执行。在我们的案例中，我们使用 Postman ([`www.getpostman.com/`](http://www.getpostman.com/))
  作为我们的首选工具。


  在能够连接到属于我们应用的 REST API 之前，我们需要做的第一件事是生成一个所谓的“持有者令牌”。只有在我们的 REST API 调用中提供此令牌，我们才能访问应用。


  要生成持有者令牌，我们需要连接到令牌 URL。您可以通过运行清单 8-10 中的命令找到需要连接的 URL 和端口号。


  ```

  azdata app describe --name predictiris -v v1

  ```


  清单 8-10

  通过 `azdata` 检索应用 URL 和端口号


  运行前面的命令会返回有关您应用的信息，在我们的案例中是 `predictiris` 应用，如图 8-6 所示。我们需要的那一行信息在“links”部分返回，是“swagger”属性的
  URL 和端口号。


  ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig6_HTML.jpg](img/480532_2_En_8_Fig6_HTML.jpg)


  图 8-6

  `predictiris` 应用的 `app describe` 命令输出


  现在，请复制或记下 URL 和端口号，然后启动 Postman（或您喜欢的任何其他 REST API 调用应用）。Postman 启动后，我们必须更改一个设置以避免错误。由于大数据集群在其端点上配置了自签名证书，当我们在之后执行
  REST API 调用时，可能会遇到安全问题。在 Postman 中，您可以在“首选项”菜单项中找到 SSL 证书验证，如图 8-7 所示。请确保在向大数据集群执行
  REST API 调用之前禁用此设置。


