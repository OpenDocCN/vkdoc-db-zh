  URL 后追加 `/api/v1/token`，然后将方法更改为 POST。最后，打开 Authorization（授权）选项卡，将 Type（类型）更改为“Basic
  Auth”（基本身份验证），并在正确的字段中输入您的大数据集群管理员用户名和密码。图 8-8 显示了 Postman 的截图，其中为我们大数据集群和应用 URL
  填写了所有这些项目。


