  trans: '

    # 第 6 章 在大数据集群中使用 Spark


    到目前为止，我们一直在使用外部表和 T-SQL 代码查询 SQL Server 大数据集群中的数据。然而，我们还有另一种方法可用于查询存储在大数据集群 HDFS
    文件系统中的数据。正如你在第[2]章中所读到的，大数据集群的架构中也包含了 Spark，这意味着我们可以利用 Spark 的强大功能来查询存储在大数据集群中的数据。


    Spark 是分析和查询大数据集群内部数据的一个非常强大的选项，主要是因为 Spark 是作为一个分布式和并行框架构建的，这意味着它在处理超大规模数据集时速度非常快，当你需要处理大型数据集时，它比
    SQL Server 高效得多。Spark 在支持的编程语言方面也提供了很大的灵活性，最突出的是 `Scala` 和 `PySpark`（尽管 Spark
    也支持 `R` 和 `Java`）。


    在大多数我们示例中使用的命令中，`PySpark` 和 `Scala` 的语法非常相似。不过，也有一些细微的差别。


    代码清单 [6-1] 和 [6-2] 展示了如何使用 `PySpark` 和 `Scala` 将 CSV 文件读入数据帧（不用担心，我们很快会详细介绍数据帧）。


    ```scala

    // 从 HDFS 导入 airports.csv 文件 (Scala)

    val df_airports = spark.read.format("csv").option("header", "true").option("inferSchema",
    "true").load("/Flight_Delays/airports.csv")

    清单 6-2

    使用 Scala 从 HDFS 导入 CSV

    ```


    ```python

    # 从 HDFS 导入 airports.csv 文件 (PySpark)

    df_airports = spark.read.format(''csv'').options(header=''true'', inferSchema="true").load(''/Flight_Delays/airports.csv'')

    清单 6-1

    使用 PySpark 从 HDFS 导入 CSV

    ```


    如你所见，`PySpark` 和 `Scala` 的示例代码看起来非常相似，但也存在一些小差异。例如，用于注释的字符，在 `PySpark` 中注释用 `#`
    号标记，而在 `Scala` 中我们使用 `//`。另一个区别在于引号。在 `PySpark` 代码中，我们可以同时使用单引号和双引号，而 `Scala`
    则更挑剔，只接受双引号。此外，在 `PySpark` 中我们不需要显式定义变量（在 `Scala` 中称为值），但在使用 `Scala` 时，我们需要明确指定这一点。


    尽管本书的重点是大数据集群，但我们相信，介绍如何编写 `PySpark` 对于使用 SQL Server 大数据集群将非常有用，因为它为你提供了除了 SQL
    之外，处理大数据集群内部数据的不同方法。


    ## 加载数据并创建 Spark 笔记本


    如果你按照第[4]章的“将一些示例文件导入安装”部分的步骤操作，你应该已经将 Kaggle 的“2015 Flight Delays and Cancellations”数据集导入到了大数据集群的
    HDFS 文件系统中。如果你还没有这样做，并且想跟随本节中的示例操作，我们建议你按照“将一些示例文件导入安装”部分概述的步骤进行操作，然后再继续。如果你正确导入了数据集，你应该能够通过
    Azure Data Studio 在 HDFS 文件系统中看到“Flight_Delays”文件夹及其内部的三个 CSV 文件，如图 6-1 所示。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig1_HTML.jpg](img/480532_2_En_6_Fig1_HTML.jpg)

    图 6-1

    HDFS 存储中的航班延误文件


    随着我们的示例数据集在 HDFS 上可用，让我们开始探索一下数据。


    我们需要做的第一件事是通过 SQL 大数据集群选项卡中的“任务”窗口（图 6-2）中的“新建笔记本”选项创建一个新的笔记本。


