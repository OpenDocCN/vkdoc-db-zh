    ### 其他环境


    还有其他多种 Kubernetes 环境可用——从树莓派到 VMWare。其中许多（但并非全部）支持 SQL Server 2019 大数据集群。支持的平台数量会随着时间的推移而增长，但没有完整的兼容环境列表。如果你正在研究一个特定的设置，最好也是最简单的方法就是亲自尝试一下！


    ## 高级部署选项


    除了前面提到的配置选项外，我们还想提请你注意另外两个可以充分利用你的大数据集群的机会：Active Directory 身份验证和 HDFS 分层。'
- fmt: '### Active Directory Authentication for Big Data Clusters


    If you want to use Active Directory (AD) integration rather than basic authentication,
    this can be achieved through additional information provided in your `control.json`
    and `bdc.json` files. While `bdc.json` only requires the `nameservers` to be set
    to the domain controller’s DNS, `control.json` needs a couple of additional parameters,
    which are shown in Listing 3-19.


    ```json

    "security": {

    "activeDirectory": {

    "ouDistinguishedName": "",

    "dnsIpAddresses": [],

    "domainControllerFullyQualifiedDns": [],

    "domainDnsName": "",

    "clusterAdmins": [],

    "clusterUsers": []

    }

    ```

    **Listing 3-19** AD parameters in `control.json`


    At the time of writing, there are quite a few limitations though. For example,
    AD authentication is only supported on `kubeadm`, not on AKS deployments, and
    you can only have one Big Data Cluster per domain. You will also need to set up
    a few very specific objects in your AD before deploying the Big Data Cluster.
    Please see the official documentation at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-active-directory?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-active-directory%253Fview%253Dsql-server-ver15)
    for detailed steps on how to enable this.


    ### HDFS Tiering in Big Data Clusters


    Should you already have an existing HDFS stored in either Azure Data Lake Store
    Gen2 or Amazon S3, you can mount this storage as a subdirectory of your Big Data
    Cluster’s HDFS. This will be achieved through a combination of environment variables,
    `kubectl` and `azdata` command. As the process differs slightly per source type,
    we refer you to the official documentation which can be found at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/hdfs-tiering?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/big-data-cluster/hdfs-tiering%253Fview%253Dsql-server-ver15).


    Unlike enabling AD authentication, which happens at deployment, HDFS tiering will
    be configured on an existing Big Data Cluster.


    ## Summary


    In this chapter, we’ve installed SQL Server 2019 Big Data Clusters using various
    methods and to different extents.


    Now that we have our Big Data Cluster running and ready for some workload, let’s
    move on to Chapter [4](#480532_2_En_4_Chapter.xhtml) where we’ll show and discuss
    how the cluster can be queried and used.


    Footnotes [1](#480532_2_En_3_Chapter.xhtml#Fn1_source)


    # 4. Loading Data into Big Data Clusters


    With our first SQL Server Big Data Cluster in place, we should have a look at
    how we can use it. Therefore, we will start by adding some data to it.


    ## Getting Azure Data Studio Fully Ready for Your Big Data Clusters


    While Azure Data Studio can connect to any Big Data Cluster (and also manage and
    deploy it) by default, we would recommend you install the Data Virtualization
    extension which provides you wizards helping with the creation on external (virtual)
    tables.


    To install that extension, first navigate to the Extensions menu in Azure Data
    Studio as shown in Figure 4-1.


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig1_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig1_HTML.jpg)

    **Figure 4-1** Install extension from VSIX package in ADS


    Within the extensions marketplace, it should probably already be visible as one
    of the top recommendations. Otherwise you can also search for it as illustrated
    in Figure 4-2.


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig2_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig2_HTML.jpg)

    **Figure 4-2** Extensions in Azure Data Studio


    Click the green “Install” button of the extension and the installation will immediately
    be triggered as shown in Figure 4-3.


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig3_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig3_HTML.jpg)

    **Figure 4-3** Extension installation in progress in Azure Data Studio


    The installation usually takes a few minutes and eventually you will see the status
    of the extension change to “Installed” as shown in Figure 4-4.


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig4_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig4_HTML.jpg)

    **Figure 4-4** Installed extension in Azure Data Studio


    The extension is now ready to be used!


    ## Getting Some Sample Files into the Installation


    With everything in place and ready, all we need before we can really get our hands
    on the new features is some sample data!


    ### Empty Database


    To link some external SQL Server tables into your local instance of SQL Server,
    the easiest way is to simply create a blank database. Just connect to your SQL
    Server 2019 instance through either SQL Server Management Studio or Azure Data
    Studio and create a new database named `BDC_Empty`. You can do this through the
    wizard or by simply running T-SQL as shown in Listing 4-1.


    ```sql

    USE master

    GO

    CREATE DATABASE BDC_Empty

    ```

    **Listing 4-1** Create empty database through T-SQL


    That’s it.


    ### Sample Data Within Your Big Data Cluster


    If you went for a full installation including the Kubernetes cluster, there are
    some easy ways and techniques to push some samples to that. In case you only deployed
    a local installation with PolyBase enabled but without a Kubernetes cluster, you
    can skip this part – it wouldn’t work anyway.


    #### Restoring Any SQL Server Backup to Your Master Instance


    Assuming an empty database is not enough for you, you may wonder how to restore
    an existing database to your Master Instance. Let’s give that a try with `AdventureWorks2014`.


    If you don’t have a backup of `AdventureWorks2014` on hand, you can just get it
    from GitHub, for example, through `curl` (Listing 4-2).


    ```bash

    curl -L -G "https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks2014.bak"
    -o AdventureWorks2014.bak

    ```

    **Listing 4-2** Download `AdventureWorks2014` from GitHub using `curl`


    Now that we have an actual file to be restored, we need to push that to the Master
    Instance’s filesystem first. This task will be achieved through `kubectl` (Listing
    4-3); you will need to replace your cluster’s namespace and master pod name accordingly.


    ```bash

    kubectl cp AdventureWorks2014.bak /:var/opt/mssql/data/ -c mssql-server

    ```

    **Listing 4-3** Copy `AdventureWorks2014` to the Master Instance using `kubectl`


    Last but not least, we need to restore the database from the `.bak` file. This
    can be achieved through regular T-SQL. In this case, just connect to your master
    instance and run the script. Of course, for more complex scenarios, you could
    use `sqlcmd` with an input file or any other SQL Server mechanism you’re comfortable
    with. Here this includes using the restore wizard in SQL Server Management Studio
    (Listing 4-4).


    ```sql

    USE [master]

    RESTORE DATABASE [AdventureWorks2014] FROM  DISK = N''/var/opt/mssql/data/AdventureWorks2014.bak''
    WITH  FILE = 1,  MOVE N''AdventureWorks2014_Data'' TO N''/var/opt/mssql/data/AdventureWorks2014_Data.mdf'',  MOVE
    N''AdventureWorks2014_Log'' TO N''/var/opt/mssql/data/AdventureWorks2014_Log.ldf'',  NOUNLOAD,  STATS
    = 5

    ```

    **Listing 4-4** Restore `AdventureWorks2014` to the Master Instance'
  raw: '### Active Directory Authentication for Big Data Clusters


    If you want to use Active Directory (AD) integration rather than basic authentication,
    this can be achieved through additional information provided in your *control.json*
    and *bdc.json* files. While *bdc.json* only requires the nameservers to be set
    to the domain controller’s DNS, *control.json* needs a couple of additional parameters,
    which are shown in Listing [3-19](#480532_2_En_3_Chapter.xhtml#PC20).


    ```

    "security": {

    "activeDirectory": {

    "ouDistinguishedName": "",

    "dnsIpAddresses": [],

    "domainControllerFullyQualifiedDns": [],

    "domainDnsName": "",

    "clusterAdmins": [],

    "clusterUsers": []

    }

    Listing 3-19

    AD parameters in control.json

    ```


    At the time of writing, there are quite a few limitations though. For example,
    AD authentication is only supported on kubeadm, not on AKS deployments , and you
    can only have one Big Data Cluster per domain. You will also need to set up a
    few very specific objects in your AD before deploying the Big Data Cluster. Please
    see the official documentation at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-active-directory?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-active-directory%253Fview%253Dsql-server-ver15)
    for detailed steps on how to enable this.


    ### HDFS Tiering in Big Data Clusters


    Should you already have an existing HDFS stored in either Azure Data Lake Store
    Gen2 or Amazon S3, you can mount this storage as a subdirectory of your Big Data
    Cluster’s HDFS. This will be achieved through a combination of environment variables,
    kubectl and azdata command. As the process differs slightly per source type, we
    refer you to the official documentation which can be found at [`https://docs.microsoft.com/en-us/sql/big-data-cluster/hdfs-tiering?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/big-data-cluster/hdfs-tiering%253Fview%253Dsql-server-ver15).


    Unlike enabling AD authentication, which happens at deployment, HDFS tiering will
    be configured on an existing Big Data Cluster.


    ## Summary


    In this chapter, we’ve installed SQL Server 2019 Big Data Clusters using various
    methods and to different extents.


    Now that we have our Big Data Cluster running and ready for some workload, let’s
    move on to Chapter [4](#480532_2_En_4_Chapter.xhtml) where we’ll show and discuss
    how the cluster can be queried and used.


    Footnotes [1](#480532_2_En_3_Chapter.xhtml#Fn1_source)


    # 4. Loading Data into Big Data Clusters


    With our first SQL Server Big Data Cluster in place, we should have a look at
    how we can use it. Therefore, we will start by adding some data to it.


    ## Getting Azure Data Studio Fully Ready for Your Big Data Clusters


    While Azure Data Studio can connect to any Big Data Cluster (and also manage and
    deploy it) by default, we would recommend you install the Data Virtualization
    extension which provides you wizards helping with the creation on external (virtual)
    tables.


    To install that extension, first navigate to the Extensions menu in Azure Data
    Studio as shown in Figure [4-1](#480532_2_En_4_Chapter.xhtml#Fig1).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig1_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Install extension from VSIX package in ADS


    Within the extensions marketplace, it should probably already be visible as one
    of the top recommendations. Otherwise you can also search for it as illustrated
    in Figure [4-2](#480532_2_En_4_Chapter.xhtml#Fig2).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig2_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Extensions in Azure Data Studio


    Click the green “Install” button of the extension and the installation will immediately
    be triggered as shown in Figure [4-3](#480532_2_En_4_Chapter.xhtml#Fig3).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig3_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Extension installation in progress in Azure Data Studio


    The installation usually takes a few minutes and eventually you will see the status
    of the extension change to “Installed” as shown in Figure [4-4](#480532_2_En_4_Chapter.xhtml#Fig4).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig4_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Installed extension in Azure Data Studio


    The extension is now ready to be used!


    ## Getting Some Sample Files into the Installation


    With everything in place and ready, all we need before we can really get our hands
    on the new features is some sample data!


    ### Empty Database


    To link some external SQL Server tables into your local instance of SQL Server,
    the easiest way is to simply create a blank database. Just connect to your SQL
    Server 2019 instance through either SQL Server Management Studio or Azure Data
    Studio and create a new database named “BDC_Empty”. You can do this through the
    wizard or by simply running T-SQL as shown in Listing [4-1](#480532_2_En_4_Chapter.xhtml#PC1).


    ```

    USE master

    GO

    CREATE DATABASE BDC_Empty

    Listing 4-1

    Create empty database through T-SQL

    ```


    That’s it.


    ### Sample Data Within Your Big Data Cluster


    If you went for a full installation including the Kubernetes cluster, there are
    some easy ways and techniques to push some samples to that. In case you only deployed
    a local installation with PolyBase enabled but without a Kubernetes cluster, you
    can skip this part – it wouldn’t work anyway.


    #### Restoring Any SQL Server Backup to Your Master Instance


    Assuming an empty database is not enough for you, you may wonder how to restore
    an existing database to your Master Instance. Let’s give that a try with AdventureWorks2014.


    If you don’t have a backup of AdventureWorks2014 on hand, you can just get it
    from GitHub, for example, through curl (Listing [4-2](#480532_2_En_4_Chapter.xhtml#PC2)).


    ```

    curl -L -G "https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks2014.bak"
    -o AdventureWorks2014.bak

    Listing 4-2

    Download AdventureWorks2014 from GitHub using curl

    ```


    Now that we have an actual file to be restored, we need to push that to the Master
    Instance’s filesystem first. This task will be achieved through kubectl (Listing
    [4-3](#480532_2_En_4_Chapter.xhtml#PC3)); you will need to replace your cluster’s
    namespace and master pod name accordingly.


    ```

    kubectl cp AdventureWorks2014.bak /:var/opt/mssql/data/ -c mssql-server

    Listing 4-3

    Copy AdventureWorks2014 to the Master Instance using kubectl

    ```


    Last but not least, we need to restore the database from the .bak file. This can
    be achieved through regular T-SQL. In this case, just connect to your master instance
    and run the script. Of course, for more complex scenarios, you could use sqlcmd
    with an input file or any other SQL Server mechanism you’re comfortable with.
    Here this includes using the restore wizard in SQL Server Management Studio (Listing
    [4-4](#480532_2_En_4_Chapter.xhtml#PC4)).


    ```

    USE [master]

    RESTORE DATABASE [AdventureWorks2014] FROM  DISK = N''/var/opt/mssql/data/AdventureWorks2014.bak''
    WITH  FILE = 1,  MOVE N''AdventureWorks2014_Data'' TO N''/var/opt/mssql/data/AdventureWorks2014_Data.mdf'',  MOVE
    N''AdventureWorks2014_Log'' TO N''/var/opt/mssql/data/AdventureWorks2014_Log.ldf'',  NOUNLOAD,  STATS
    = 5

    Listing 4-4

    Restore AdventureWorks2014 to the Master Instance

    ```'
  trans: '

    ### 大数据集群的 Active Directory 身份验证


    如果您希望使用 Active Directory (AD) 集成而非基本身份验证，这可以通过在您的 `control.json` 和 `bdc.json`
    文件中提供额外信息来实现。虽然 `bdc.json` 只需要将 `nameservers` 设置为域控制器的 DNS，但 `control.json` 需要一些额外的参数，如清单
    3-19 所示。


    ```json

    "security": {

    "activeDirectory": {

    "ouDistinguishedName": "",

    "dnsIpAddresses": [],

    "domainControllerFullyQualifiedDns": [],

    "domainDnsName": "",

    "clusterAdmins": [],

    "clusterUsers": []

    }

    ```

    **清单 3-19** `control.json` 中的 AD 参数


    截至撰写本文时，仍存在不少限制。例如，AD 身份验证仅在 `kubeadm` 上受支持，在 AKS 部署中则不行，并且每个域只能有一个大数据集群。在部署大数据集群之前，您还需要在
    AD 中设置一些非常具体的对象。有关如何启用此功能的详细步骤，请参阅官方文档 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-active-directory?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/big-data-cluster/deploy-active-directory%253Fview%253Dsql-server-ver15)。


    ### 大数据集群中的 HDFS 分层


    如果您已有存储在 Azure Data Lake Store Gen2 或 Amazon S3 中的 HDFS，您可以将此存储挂载为大数据集群 HDFS 的子目录。这将通过环境变量、`kubectl`
    和 `azdata` 命令的组合来实现。由于过程因源类型略有不同，我们建议您参考官方文档，可在 [`https://docs.microsoft.com/en-us/sql/big-data-cluster/hdfs-tiering?view=sql-server-ver15`](https://docs.microsoft.com/en-us/sql/big-data-cluster/hdfs-tiering%253Fview%253Dsql-server-ver15)
    找到。


    与在部署时启用 AD 身份验证不同，HDFS 分层将在现有的大数据集群上进行配置。


    ## 总结


    在本章中，我们使用各种方法并安装了 SQL Server 2019 大数据集群的不同组件。


    既然我们的大数据集群已经运行并准备好处理一些工作负载，让我们继续到第 4 章，我们将展示并讨论如何查询和使用该集群。


    脚注 1


    # 4. 将数据加载到大数据集群中


    有了我们的第一个 SQL Server 大数据集群后，我们应该看看如何使用它。因此，我们将从向其添加一些数据开始。


    ## 为您的大数据集群全面准备好 Azure Data Studio


    虽然 Azure Data Studio 默认可以连接到任何大数据集群（也可以管理和部署它），但我们建议您安装 Data Virtualization 扩展，该扩展为您提供向导，帮助创建外部（虚拟）表。


    要安装该扩展，首先导航到 Azure Data Studio 中的扩展菜单，如图 4-1 所示。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig1_HTML.jpg](img/480532_2_En_4_Fig1_HTML.jpg)

    **图 4-1** 在 ADS 中从 VSIX 包安装扩展


    在扩展市场中，它可能已经作为首要推荐之一显示。否则，您也可以如图 4-2 所示进行搜索。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig2_HTML.jpg](img/480532_2_En_4_Fig2_HTML.jpg)

    **图 4-2** Azure Data Studio 中的扩展


    单击该扩展的绿色“安装”按钮，安装将立即触发，如图 4-3 所示。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig3_HTML.jpg](img/480532_2_En_4_Fig3_HTML.jpg)

    **图 4-3** Azure Data Studio 中正在进行的扩展安装


    安装通常需要几分钟，最终您会看到扩展的状态变为“已安装”，如图 4-4 所示。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig4_HTML.jpg](img/480532_2_En_4_Fig4_HTML.jpg)

    **图 4-4** Azure Data Studio 中已安装的扩展


    该扩展现在可以使用了！


    ## 将一些示例文件导入安装中


    一切准备就绪后，在我们真正开始使用新功能之前，我们需要的只是一些示例数据！


    ### 空数据库


    要将一些外部 SQL Server 表链接到您的本地 SQL Server 实例，最简单的方法是简单地创建一个空白数据库。只需通过 SQL Server Management
    Studio 或 Azure Data Studio 连接到您的 SQL Server 2019 实例，并创建一个名为 `BDC_Empty` 的新数据库。您可以通过向导完成此操作，或者简单地运行如清单
    4-1 所示的 T-SQL。


    ```sql

    USE master

    GO

    CREATE DATABASE BDC_Empty

    ```

    **清单 4-1** 通过 T-SQL 创建空数据库


    就是这样。


    ### 大数据集群内的示例数据


    如果您选择了包含 Kubernetes 集群的完整安装，有一些简单的方法和技术可以推送一些示例数据。如果您只部署了启用 PolyBase 但没有 Kubernetes
    集群的本地安装，您可以跳过这部分——它无论如何也无法工作。


    #### 将任何 SQL Server 备份还原到您的主实例


    假设空数据库对您来说不够，您可能想知道如何将现有数据库还原到您的主实例。让我们用 `AdventureWorks2014` 尝试一下。


    如果您手头没有 `AdventureWorks2014` 的备份，您可以通过 `curl` 从 GitHub 获取，例如（清单 4-2）。


    ```bash

    curl -L -G "https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks2014.bak"
    -o AdventureWorks2014.bak

    ```

    **清单 4-2** 使用 `curl` 从 GitHub 下载 `AdventureWorks2014`


    现在我们有了一个实际要还原的文件，我们需要先将其推送到主实例的文件系统。此任务将通过 `kubectl` 完成（清单 4-3）；您需要相应地替换集群的命名空间和主
    Pod 名称。


    ```bash

    kubectl cp AdventureWorks2014.bak /:var/opt/mssql/data/ -c mssql-server

    ```

    **清单 4-3** 使用 `kubectl` 将 `AdventureWorks2014` 复制到主实例


    最后但同样重要的是，我们需要从 `.bak` 文件还原数据库。这可以通过常规的 T-SQL 实现。在本例中，只需连接到您的主实例并运行脚本。当然，对于更复杂的场景，您可以使用带输入文件的
    `sqlcmd` 或您熟悉的任何其他 SQL Server 机制。这里包括使用 SQL Server Management Studio 中的还原向导（清单
    4-4）。


    ```sql

    USE [master]

    RESTORE DATABASE [AdventureWorks2014] FROM  DISK = N''/var/opt/mssql/data/AdventureWorks2014.bak''
    WITH  FILE = 1,  MOVE N''AdventureWorks2014_Data'' TO N''/var/opt/mssql/data/AdventureWorks2014_Data.mdf'',  MOVE
    N''AdventureWorks2014_Log'' TO N''/var/opt/mssql/data/AdventureWorks2014_Log.ldf'',  NOUNLOAD,  STATS
    = 5

    ```

    **清单 4-4** 将 `AdventureWorks2014` 还原到主实例

