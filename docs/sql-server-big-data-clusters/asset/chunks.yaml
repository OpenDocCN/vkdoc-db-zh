- fmt: '# 通过 Azure Data Studio 部署大数据集群


    如果你更喜欢使用图形化向导进行部署，那么答案就是 Azure Data Studio (ADS)！ADS 为你提供了部署 SQL Server 的多种选项，而大数据集群
    (Big Data Clusters) 就在其中。在 ADS 中，可以在欢迎屏幕上找到“新建部署”的链接，也可以在活动连接旁边的上下文菜单中找到，如图 [3-27](#480532_2_En_3_Chapter.xhtml#Fig27)
    所示。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig27_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig27_HTML.jpg)


    图 3-27 ADS 中的新建部署


    在接下来的屏幕上，选择“`SQL Server Big Data Cluster`”。向导将要求你接受许可条款、选择一个版本，并选择一个部署目标。此向导当前支持的目标包括新的
    Azure Kubernetes Service (AKS) 集群、现有的 AKS 集群或现有的 `kubeadm` 集群。如果你计划部署到现有集群，Kubernetes
    上下文/连接需要存在于你的 Kubernetes 配置中。如果 Kubernetes 集群不是在同一台机器上创建的，那么它很可能还缺失。在这种情况下，你可以将
    `*.kube` 文件复制到本地机器，或者按照 [`https://kubernetes.io/docs/tasks/access-application-cluster/access-cluster/`](https://kubernetes.io/docs/tasks/access-application-cluster/access-cluster/)
    中的描述手动配置 Kubernetes。


    在屏幕的下方，向导还会再次列出所需的工具，并确认它们是否已安装合适的版本，如图 [3-28](#480532_2_En_3_Chapter.xhtml#Fig28)
    所示。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig28_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig28_HTML.jpg)


    图 3-28 通过 ADS 部署 BDC – 介绍


    让我们尝试使用一个新的 AKS 集群进行另一次部署（这也是默认选项）。单击“`Select`”，向导将带你进入第一步。它将为你提供与目标环境匹配的部署模板。不同的模板在大小以及功能（如身份验证类型和高可用性）上有所不同，如图
    [3-29](#480532_2_En_3_Chapter.xhtml#Fig29) 所示。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig29_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig29_HTML.jpg)


    图 3-29 通过 ADS 部署 BDC – 步骤 1


    接下来的屏幕将取决于你的目标。由于我们选择部署到 Azure 并包含一个新集群，我们需要提供订阅、资源组名称、位置、集群名称，以及底层虚拟机的数量和大小（参见图
    [3-30](#480532_2_En_3_Chapter.xhtml#Fig30)）。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig30_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig30_HTML.jpg)


    图 3-30 通过 ADS 部署 BDC – 步骤 2


    在步骤 3 中，如图 [3-31](#480532_2_En_3_Chapter.xhtml#Fig31) 所示，我们定义大数据集群的名称（这与之前设置 Kubernetes
    集群名称的步骤不同！）以及身份验证类型。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig31_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig31_HTML.jpg)


    图 3-31 通过 ADS 部署 BDC – 步骤 3


    在最后的配置屏幕（如图 [3-32](#480532_2_En_3_Chapter.xhtml#Fig32) 所示）中，你可以修改每个池的实例数量，以及为数据和日志声明的存储大小和存储类。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig32_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig32_HTML.jpg)


    图 3-32 通过 ADS 部署 BDC – 步骤 4


    如图 [3-33](#480532_2_En_3_Chapter.xhtml#Fig33) 所示的最终屏幕会给你一个配置摘要。如果你希望继续，请点击“`Script
    to Notebook`”；否则，你可以使用“`Previous`”按钮返回，进行任何必要的更改和调整。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig33_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig33_HTML.jpg)


    图 3-33 通过 ADS 部署 BDC – 摘要


    除非你之前已经安装过，否则 ADS 会提示你为 Notebook 安装 Python，如图 [3-34](#480532_2_En_3_Chapter.xhtml#Fig34)
    所示。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig34_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig34_HTML.jpg)


    图 3-34 通过 ADS 部署 BDC – 安装 Python


    等待安装完成。你的所有设置都已填充到一个 Python Notebook 中，你可以保存起来稍后使用，也可以立即运行。要执行 Notebook，只需单击“`Run
    Cells`”，如图 [3-35](#480532_2_En_3_Chapter.xhtml#Fig35) 所示。请确保 Python 安装已完成。内核组合框应显示为“`Python
    3`”。如果它仍然显示“`Loading kernels…`”，请耐心等待。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Figa_HTML.gif](images/480532_2_En_3_Chapter/480532_2_En_3_Figa_HTML.gif)


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig35_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig35_HTML.jpg)


    图 3-35 通过 ADS 部署 BDC – 预部署 Notebook


    一旦你点击“`Run Cells`”，部署过程就会运行，并且——如果中途没有任何问题——最终会报告回集群的端点，如图 [3-36](#480532_2_En_3_Chapter.xhtml#Fig36)
    所示。你还会获得一个用于连接到主实例的直接链接。使用与脚本化部署选项相同的参数，部署所需的时间将与之相同。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig36_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig36_HTML.jpg)


    图 3-36 通过 ADS 部署 BDC – 部署后 Notebook'
  raw: '### Deploy Your Big Data Cluster Through Azure Data Studio


    If you prefer a graphical wizard for your deployment, the answer is Azure Data
    Studio (ADS)! ADS provides you multiple options to deploy SQL Server, and Big
    Data Clusters are among them. In ADS, locate the link “New Deployment” which can
    be found on the welcome screen as well as in a context menu next to your active
    connections as shown in Figure [3-27](#480532_2_En_3_Chapter.xhtml#Fig27).


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig27_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig27_HTML.jpg)


    Figure 3-27


    New Deployment in ADS


    On the following screen, select “SQL Server Big Data Cluster.” The wizard will
    ask you to accept the license terms, select a version, and also pick a deployment
    target. Supported targets for this wizard are currently a new Azure Kubernetes
    Service (AKS) cluster, an existing AKS cluster, or an existing kubeadm cluster.
    If you plan to deploy toward an existing cluster, the Kubernetes contexts/connections
    need to be present in your Kubernetes configuration. If the Kubernetes cluster
    was not created from the same machine, it’s probably still missing. In this case,
    you can either copy the *.kube* file to your local machine or configure Kubernetes
    manually as described at [`https://kubernetes.io/docs/tasks/access-application-cluster/access-cluster/`](https://kubernetes.io/docs/tasks/access-application-cluster/access-cluster/).


    On the lower end of the screen, the wizard will also list the required tools again
    and confirm whether all of them are installed in the appropriate version as shown
    in Figure [3-28](#480532_2_En_3_Chapter.xhtml#Fig28).


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig28_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig28_HTML.jpg)


    Figure 3-28


    Deploy a BDC through ADS – intro


    Let’s try another deployment using a new AKS cluster (which is also the default).
    Click “Select” and the wizard will take you to the first step. It will provide
    you the matching deployment templates for your target environment. The different
    templates differ by size as well as features, like authentication type and high
    availability, as you can see in Figure [3-29](#480532_2_En_3_Chapter.xhtml#Fig29).


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig29_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig29_HTML.jpg)


    Figure 3-29


    Deploy a BDC through ADS – Step 1


    The following screen will depend on your target. As we chose to deploy to Azure
    including a new cluster, we need to provide a subscription, resource group name,
    location, cluster name, as well as the number and size of the underlying VMs (see
    Figure [3-30](#480532_2_En_3_Chapter.xhtml#Fig30)).


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig30_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig30_HTML.jpg)


    Figure 3-30


    Deploy a BDC through ADS – Step 2


    In Step 3, as illustrated in Figure [3-31](#480532_2_En_3_Chapter.xhtml#Fig31),
    we define the name of the Big Data Cluster (unlike in the previous step where
    we’ve set the name for the Kubernetes cluster!) as well as the authentication
    type.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig31_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig31_HTML.jpg)


    Figure 3-31


    Deploy a BDC through ADS – Step 3


    In the last configuration screen which we show in Figure [3-32](#480532_2_En_3_Chapter.xhtml#Fig32),
    you can modify the number of instances per pool as well as claim sizes and storage
    classes for data and logs.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig32_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig32_HTML.jpg)


    Figure 3-32


    Deploy a BDC through ADS – Step 4


    The final screen as shown in Figure [3-33](#480532_2_En_3_Chapter.xhtml#Fig33)
    gives you a summary of your configuration. If you want to proceed, hit “Script
    to Notebook”; otherwise, you can navigate back using the “Previous” button to
    make any necessary changes and adjustments.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig33_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig33_HTML.jpg)


    Figure 3-33


    Deploy a BDC through ADS – Summary


    Unless you did so before, ADS will prompt you to install Python for notebooks
    as shown in Figure [3-34](#480532_2_En_3_Chapter.xhtml#Fig34).


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig34_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig34_HTML.jpg)


    Figure 3-34


    Deploy a BDC through ADS – install Python


    Wait for the installation to complete. All your settings have been populated to
    a Python notebook which you could either save and store for later or run right
    away. To execute the notebook, simply click “Run Cells” as shown in Figure [3-35](#480532_2_En_3_Chapter.xhtml#Fig35).
    Just make sure that the Python installation has finished. The kernel combo box
    should read “Python 3”. If it’s still showing “Loading kernels…”, be patient.![../images/480532_2_En_3_Chapter/480532_2_En_3_Figa_HTML.gif](images/480532_2_En_3_Chapter/480532_2_En_3_Figa_HTML.gif)


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig35_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig35_HTML.jpg)


    Figure 3-35


    Deploy a BDC through ADS – notebook predeployment


    Once you click “Run Cells,” the deployment process will run through and – unless
    there are any problems on the way – will report back with the cluster’s endpoints
    at the end, as you can see in Figure [3-36](#480532_2_En_3_Chapter.xhtml#Fig36).
    You will also get a direct link to connect to the master instance. The deployment
    will take as long as it would with the same parameters using the scripted deployment
    option.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig36_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig36_HTML.jpg)


    Figure 3-36


    Deploy a BDC through ADS – notebook postdeployment'
  trans: '# 通过 Azure Data Studio 部署大数据集群


    如果你更喜欢使用图形化向导进行部署，那么答案就是 Azure Data Studio (ADS)！ADS 为你提供了部署 SQL Server 的多种选项，而
    **大数据集群** 就在其中。在 ADS 中，可以在欢迎屏幕上找到“新建部署”的链接，也可以在活动连接旁边的上下文菜单中找到，如图 3-27 所示。


