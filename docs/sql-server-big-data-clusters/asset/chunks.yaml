    到目前为止，我们一直专注于从数据框中获取数据。然而，也可能存在你想要从数据框中删除一行，或者更新某个特定值的情况。一般来说，在 Spark 数据框中更新值并不像，例如，在
    SQL 中写一条 UPDATE 语句那样直接，后者会直接更新实际表中的值。在大多数情况下，在数据框内部更新行涉及创建某种映射数据框，并将原始数据框与该映射数据框连接，然后将其存储为一个新的数据框。这样，你的最终数据框就包含了更新。


    简单来说，你对要更新的数据执行选择（如 Figure `6-13` 所示），并返回要更新的行的更新值，然后将其保存到一个新的数据框中，如 Listing `6-13`
    的示例代码所示。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig13_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig13_HTML.jpg)


    Figure 6-13

    将值从 Jackson 更新为 Cody


    ```

    # Update a row

    # We need to import the col and when function from pyspark.sql.functions

    from pyspark.sql.functions import col, when

    # Select the entire data frame but set the CITY value to "Cody" instead of "Jackson"
    where the IATA_CODE = "COD"

    # Store the results in the new df_airports_updated data frame

    df_airports_updated = df_airports.withColumn("CITY", when(col("IATA_CODE") ==
    "COD", "Jackson"))

    # Return the results, filter on IATA_CODE == "COD"

    df_airports_updated = df_airports_updated.filter(df_airports_updated.IATA_CODE
    == ''COD'').show()

    Listing 6-13

    Perform multiple actions on the data frame

    ```


    如果我们有兴趣删除行，同样的推理也适用，我们不是从数据框中物理删除行；而是执行一个不包含要删除行的选择，并将其存储为一个单独的数据框（Figure `6-14`
    展示了使用 Listing `6-14` 的结果）。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig14_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig14_HTML.jpg)


