    Failures and warnings as shown in Figure [3-8](#480532_2_En_3_Chapter.xhtml#Fig8)
    must be corrected before the Setup can be completed.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig8_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig8_HTML.jpg)

