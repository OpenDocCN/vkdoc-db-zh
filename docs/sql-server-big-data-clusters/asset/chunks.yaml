    ## 绘制图表


    到目前为止，我们主要处理的是在 PySpark notebook 中执行代码时以文本类格式返回的结果。然而，在执行诸如数据探索等任务时，以更图形化的方式查看数据往往要有用得多。例如，绘制数据框的直方图可以提供关于数据分布的丰富信息，而散点图可以帮助你直观地理解不同列之间如何相互关联。


    幸运的是，我们可以轻松地通过 Azure Data Studio 安装和管理软件包，这些包能帮助我们绘制存储在 Spark 集群内部数据的图表，并将这些图表显示在
    notebook 中。这并不是说绘制存储在数据框中的数据的图表是件容易的事。事实上，在我们开始绘制数据之前，有许多事情需要考虑。


    首先，也是最重要的一点，数据框是我们数据的逻辑表示。实际的物理数据本身分布在构成 Spark 集群的工作节点上。这意味着，如果我们想通过数据框绘制数据，事情会很快变得复杂，因为我们需要将来自各个节点的数据组合成一个单一的数据集，才能在其上创建图表。这不仅会导致非常糟糕的性能，因为我们基本上移除了数据的分布式特性，而且还可能因为需要将所有数据装入单个节点的内存中而导致错误。虽然这些问题在小数据集上可能不会出现，但数据集越大，你遇到这些问题的速度就越快。


    为了解决这些问题，我们通常采用不同的数据分析方法。例如，我们不是分析整个数据集，而是从数据集中抽取一个样本——它能代表整个数据集——并在这个较小的样本数据集上绘制图表。另一种方法可以是只过滤出你需要的数据，也许预先对其进行一些计算，然后将其另存为一个独立、较小的数据集，再进行绘制。


    无论你选择哪种方法来创建用于图形探索的较小数据集，我们都必须做的一件事是，将数据集传输到我们提交代码的主要 Spark 主节点上。Spark 主节点需要能够将数据集加载到内存中，这意味着主节点需要有足够的物理内存来加载数据集，而不会因内存不足而崩溃。实现这一点的一种方法是将我们的
    Spark 数据框转换为 Pandas 数据框。Pandas 是 `pan`el `da`ta 的缩写，在统计学界是一个用于描述多维数据集的术语。Pandas
    是一个为数据分析和操作而编写的 Python 库，如果你曾在 Python 中处理过数据，那你肯定使用过它。Pandas 还通过 `matplotlib`
    库引入了一些绘图功能。虽然 Pandas 默认包含在大数据集群的库中，但 `matplotlib` 并不包含。不过，通过使用连接到你的大数据集群的 notebook
    中的“管理包”选项，安装 `matplotlib` 包是非常直接和容易实现的（图 6-32）。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig32_HTML.jpg](img/480532_2_En_6_Fig32_HTML.jpg)


    图 6-32


    Notebook 标题栏中的“管理包”选项


    点击“管理包”按钮后，我们可以看到已安装的软件包，并可以通过“新建”选项卡来安装额外的包（图 6-33）。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig33_HTML.jpg](img/480532_2_En_6_Fig33_HTML.jpg)


    图 6-33


    管理包


    在本例中，我们将安装 `matplotlib` 包，以便我们能继续学习本章后续的示例。在图 6-34 中，我在“新建软件包”选项卡中搜索了 `matplotlib`
    包，并选择了当前可用的最新稳定版本。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig34_HTML.jpg](img/480532_2_En_6_Fig34_HTML.jpg)


    图 6-34


    Matplotlib 包安装


    选择好软件包和正确版本后，你可以点击“安装”按钮，将该包安装到你的大数据集群上。安装过程可以通过 Azure Data Studio 底部区域的“任务”控制台查看，如图
    6-35 所示。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig35_HTML.jpg](img/480532_2_En_6_Fig35_HTML.jpg)


    图 6-35


    Matplotlib 安装任务


    安装好 `matplotlib` 库后，我们就准备好为数据框创建一些图表了！


    当我们想要绘制数据框中的数据时，第一件需要做的事就是将数据框转换为 Pandas 数据框。这移除了 Spark 数据框的分布式特性，并在 Spark 主节点的内存中创建一个数据框。我没有转换现有的数据框，而是使用了另一种方法来获取数据到我们的
    Pandas 数据框中。为了创建一些更有趣的图表，我从一个 GitHub 仓库中可用的 CSV 文件中读取数据，并将其加载到 Pandas 数据框中。该数据集本身包含了汽车的各种特性，包括价格，并且经常被用作机器学习数据集，以根据重量、马力、品牌等特征来预测汽车价格。


    我想指出的另一件事是清单 6-34 中示例代码的第一行。如果你想返回图表，`%matplotlib inline` 命令必须是 notebook 单元格中的第一条命令。这个命令是一个所谓的“魔法”命令，它会影响
    `matplotlib` 库的行为以返回图表。如果我们不包含这个命令，Pandas 库在被要求绘制图表时会返回错误，我们将看不到图像本身。


    ```python

    %matplotlib inline

    import pandas as pd

    # 通过 URL 从 csv 创建本地 Pandas 数据框

    pd_data_frame = pd.read_csv("https://github.com/Evdlaar/Presentations/raw/master/Advanced%20Analytics%20in%20the%20Cloud/automobiles.csv")

