  trans: '

    ### HDFS


    HDFS，即 Hadoop 分布式文件系统，是 Spark 架构中存储数据的主要方法。HDFS 在如何存储和处理文件系统上的数据方面具有许多优势，例如容错能力以及将数据分布在组成
    HDFS 集群的多个节点上。


    HDFS 的工作方式是将数据拆分成独立的块（称为数据块），并在数据存储到文件系统时，将这些块分布到组成 HDFS 环境的各个节点上。这些数据块（默认大小为
    64 MB）随后会在多个节点上进行复制，以实现容错。如果一个节点发生故障，数据块的副本在其他节点上仍然可用，这意味着文件系统可以轻松地从单个节点的数据丢失中恢复。


    图 2-6 展示了 HDFS 架构的简化概览。


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig6_HTML.jpg](img/480532_2_En_2_Fig6_HTML.jpg)


    图 2-6


    HDFS 架构


    在许多方面，HDFS 映射了 Hadoop 的架构，从这个意义上说，也映射了我们在上一节中展示的 Spark 架构。由于文件系统中存储的数据具有分布式特性，数据分布在也负责处理该数据的
    Spark 架构节点上是可能的，实际上也是预期的。这种数据分布带来了巨大的性能优势；由于数据驻留在负责处理该数据的同一节点上，因此无需在存储架构中移动数据。再加上在
    Spark 工作节点内进行数据缓存的额外好处，数据确实可以非常高效地处理。


    需要指出的一点是，与 Hadoop 不同，Spark 并不一定局限于驻留在 HDFS 中的数据。Spark 可以通过 API 和原生支持访问存储在各种来源的数据。例子包括各种云存储平台，如
    Azure Blob Storage，或关系型数据源，如 `SQL Server`。


    ### 将物理基础设施部分整合起来


    现在是时候看看全局了。图 2-7 完整地展示了前几节讨论的技术如何在 `SQL Server Big Data Clusters` 内协同工作。


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig7_HTML.jpg](img/480532_2_En_2_Fig7_HTML.jpg)


    图 2-7


    包含 Spark、HDFS 和 Kubernetes 的 `SQL Server Big Data Cluster` 架构


    从图 2-7 可以看出，`SQL Server Big Data Clusters` 在 Kubernetes 部署的容器内整合了多种不同的角色。将 `SQL
    Server` 和 Spark 与 HDFS 数据节点一起放在同一个容器中，允许这两种产品以性能优化的方式访问存储在 HDFS 中的数据。在 `SQL Server`
    中，这种数据访问将通过 `PolyBase` 发生，而 Spark 则可以原生查询驻留在 HDFS 中的数据。


    图 2-7 中的架构还为我们提供了处理和查询数据的两条不同路径。我们可以选择使用可用的 `SQL Server` 实例将数据以关系格式存储，或者我们可以使用
    HDFS 文件系统并在其中存储（非关系）数据。当数据存储在 HDFS 中时，我们可以以任何我们喜欢的方式访问和处理该数据。如果你的用户更熟悉编写 `T-SQL`
    查询来检索数据，你可以使用 `PolyBase` 将 HDFS 存储的数据通过外部表引入 `SQL Server`。另一方面，如果用户更喜欢使用 Spark，他们可以编写直接从
    HDFS 访问数据的 Spark 应用程序。然后，如果需要，用户可以调用 Spark API 来将存储在 `SQL Server` 中的关系数据与存储在 HDFS
    中的非关系数据结合起来。


    ## 逻辑大数据集群架构


    如本章引言所述，大数据集群可以分为四个逻辑区域。将这些区域视为各种基础设施和管理部分的集合，它们在集群内执行特定功能。每个区域又包含一个或多个它所执行的角色。例如，在数据池区域中，有两个角色：存储池和
    SQL 数据池。


    图 2-8 展示了四个逻辑区域以及作为每个区域一部分的各种角色的概览。


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig8_HTML.jpg](img/480532_2_En_2_Fig8_HTML.jpg)


    图 2-8


    大数据集群架构


    你可以立即推断出这四个逻辑区域：控制区域（内部命名为控制平面）以及计算、数据和应用程序区域。在接下来的章节中，我们将分别深入探讨这些逻辑区域中的每一个，描述其功能以及其中执行的角色。在我们开始仔细研究控制平面之前，你可能已经注意到图
    2-8 中还显示了一个额外的角色：`SQL Server Master Instance`。


    `SQL Server master instance` 是 Kubernetes 节点内的一个 `SQL Server on Linux` 部署。`SQL
    Server master instance` 就像通往你的大数据集群的入口点，并通过 `Azure Data Studio` (`ADS`)（见图 2-9）或其他工具（如
    `SQL Server Management Studio`）提供外部连接端点。


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig9_HTML.jpg](img/480532_2_En_2_Fig9_HTML.jpg)


    图 2-9


    通过 `Azure Data Studio` 连接到 `SQL Server master instance`


    在许多方面，`SQL Server master instance` 的行为就像一个普通的 `SQL Server` 实例。你可以使用 `Azure Data
    Studio` 访问它并浏览该实例，查询存储在其中的系统数据库和用户数据库。与传统的 `SQL Server` 实例相比，一个重大变化是 `SQL Server
    master instance` 将把你的查询分发到计算池中的所有 `SQL Server` 节点，并通过 `PolyBase` 访问存储在数据平面内 HDFS
    上的数据。


    默认情况下，`SQL Server master instance` 还启用了 `Machine Learning Services`。这使你可以直接从查询中运行使用
    `R`、`Python` 或 `Java` 的数据库内分析。使用 `SQL Server Big Data Cluster` 提供的数据虚拟化选项，`Machine
    Learning Services` 也可以访问存储在 HDFS 文件系统内的非关系数据。这意味着你的数据分析师或科学家可以选择使用 Spark 或 `SQL
    Server Machine Learning Services` 来分析或操作化存储在大数据集群中的数据。我们将在第 7 章中更详细地探讨这些选项。

    '
- fmt: '### Control Plane


    The Control Plane shown in Figure [2-10](#480532_2_En_2_Chapter.xhtml#Fig10) is
    your entry into the Big Data Cluster management environment. It provides various
    management and log tools like Grafana and is the centralized place where you perform
    all your Big Data Cluster management. Also, security inside the Big Data Cluster
    is managed and controlled through the Control Plane.


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig10_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig10_HTML.jpg)


    Figure 2-10 Big Data Cluster Control Plane


    In terms of managing Big Data Clusters, we are going to discuss the various management
    tools we can use to manage Big Data Clusters in Chapter [3](#480532_2_En_3_Chapter.xhtml).


    Next to providing a centralized location where you can perform all your Big Data
    Cluster management tasks, the Control Plane also plays a very important part in
    the coordination of tasks to the underlying Compute and Data areas. The access
    to the Control Plane is available through the controller endpoint.


    The controller endpoint is used for the Big Data Cluster management in terms of
    deployment and configuration of the cluster. The endpoint is accessed through
    REST APIs, and some services inside the Big Data Cluster, as well as the command-line
    tool we use to deploy and configure our Big Data Cluster, access those APIs.


    You are going to get very familiar with the controller endpoint in the next chapter,
    in which we will deploy and configure a Big Data Cluster using `azdata`.


    ### Compute Area


    The Compute area (see Figure [2-11](#480532_2_En_2_Chapter.xhtml#Fig11)) is made
    up from one or more Compute Pools. A Compute Pool is a collection Kubernetes Pods
    which contain SQL Server on Linux. Using a Compute Pool, you can access various
    data sources through PolyBase in a distributed manner. For instance, a Compute
    Pool can access data stored inside HDFS on the Big Data Cluster itself or access
    data through any of the PolyBase connectors like Oracle or MongoDB.


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig11_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig11_HTML.jpg)


    Figure 2-11 Big Data Cluster Compute area


    The main advantage of having a Compute Pool is that it opens up options to distribute,
    or scale out, queries across multiple nodes inside each Compute Pool, boosting
    the performance of PolyBase queries.


    By default, you will have access to a single Compute Pool inside the Compute logical
    area. You can, however, add multiple Compute Pools in situations where, for instance,
    you want to dedicate resources to access a specific data source. All management
    and configuration of each Kubernetes Pod inside the Compute Pool is handled by
    the SQL Server Master Instance.


    ### Data Area


    The Data area (Figure [2-12](#480532_2_En_2_Chapter.xhtml#Fig12)) is used to persist
    and cache data inside your Big Data Cluster, and it is split into two different
    roles, the Storage Pool and the SQL Data Pool, which both have different functionalities
    inside the Big Data Cluster.


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig12_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig12_HTML.jpg)


    Figure 2-12 Data Plane architecture


    #### Storage Pool


    The Storage Pool consists of Kubernetes Pods that combine Spark, SQL Server on
    Linux, and a HDFS Data Node. Figure [2-13](#480532_2_En_2_Chapter.xhtml#Fig13)
    illustrates the pod contents.


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig13_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig13_HTML.jpg)


    Figure 2-13 Storage Node inside the Storage Pool


    The HDFS Data Nodes are combined into a single HDFS cluster that is present inside
    your Big Data Cluster. The main function of the Storage Pool is to provide a HDFS
    storage cluster to store data on what is ingested through, for instance, Spark.
    By creating a HDFS cluster, you basically have access to a data lake inside the
    Big Data Cluster where you can store a wide variety of nonrelational data, like
    Parquet or CSV files.


    The HDFS cluster automatically arranges data persistence since the data you import
    into the Storage Pool is automatically spread across all the Storage Nodes inside
    the Storage Pool. This spreading of data across nodes also allows you to quickly
    analyze large volumes of data, since the load of analysis is spread across the
    multiple nodes. One advantage of this architecture is that you can either use
    the local storage present in the Data Node or add your own persistent storage
    subsystem to the nodes.


    Just like the Compute Pool, the SQL Server instances that are present in the Storage
    Node are accessed through the SQL Server master instance. Because the Storage
    Node combines SQL Server and Spark, all data residing on or managed by the Storage
    Nodes can also be directly accessed through Spark. That means you do not have
    to use PolyBase to access the data inside the HDFS environment. This allows more
    flexibility in terms of data analysis or data engineering.


    #### SQL Data Pool


    Another area of the Data Plane is the SQL Data Pool. This collection of pods is
    different compared to the Storage Pool in that it doesn’t combine Spark or HDFS
    together into the node. Instead, the SQL Data Pool consists of one, or multiple,
    SQL Server on Linux instances. These instances are termed as shards, and you can
    see them illustrated in Figure [2-14](#480532_2_En_2_Chapter.xhtml#Fig14).


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig14_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig14_HTML.jpg)


    Figure 2-14 Scaling and caching of external data sources inside the SQL Data Pool


    The main role of the SQL Data Pool is to optimize access to external sources using
    PolyBase. The SQL Data Pool can than partition and cache data from those external
    sources inside the SQL Server instances and ultimately provide parallel and distributed
    queries against the external data sources. To provide this parallel and distributed
    functionality, datasets inside the SQL Data Pool are divided into shards across
    the nodes inside the SQL Data Pool.


    ## Summary


    In this chapter, we’ve looked at the SQL Server Big Data Cluster architecture
    in two manners: physical and logical. In the physical architecture, we focused
    on the technologies that make up the Big Data Cluster like containers, SQL-on-Linux
    and Spark. In the logical architecture, we discussed the different logical areas
    inside Big Data Clusters that each perform a specific role or task inside the
    cluster.


    For each of the technologies used in Big Data Clusters, we gave a brief introduction
    in its origins as well as what part the technology plays inside Big Data Clusters.
    Because of the wide variety of technologies and solutions used in SQL Server Big
    Data Clusters, we tried to be as thorough as possible in describing the various
    technologies; however, we also realize we cannot describe each of these technologies
    in as much detail as we would have liked. For instance, just on Spark, there have
    been dozens of books written and published describing how it works and how you
    can leverage the technology. In the area of SQL-on-Linux, HDFS, and Kubernetes,
    the situation isn’t much different. For that reason, it is best to consider this
    chapter a simple and brief introduction to the technology or solution, enough
    to get you started on understanding and using SQL Server Big Data Clusters.'
