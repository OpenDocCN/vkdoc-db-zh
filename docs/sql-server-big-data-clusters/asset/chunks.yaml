    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig9_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig9_HTML.jpg)


    Figure 9-9


    Kibana Portal – overview


    Kibana is part of the elastic stack. It also provides options to create visualizations
    and dashboard on top of your log files. If you want to learn more about it, its
    website [`www.elastic.co/products/kibana`](http://www.elastic.co/products/kibana)
    is a great starting point!'
  trans: '

    ## 本章摘要


    在本章中，我们了解了如何创建和访问大数据集群应用程序。大数据集群应用是一种在**大数据集群**内部运行容器化自定义代码的方法，例如，可作为访问点来对存储在大数据集群内部的模型执行机器学习评分。我们创建了自己的应用，它能够预测鸢尾花植物的种类，将其上传到大数据集群，并使用
    `azdata` 来执行该应用。然而，应用并非只能通过 `azdata` 访问；通过使用 RESTful Web 服务，我们能够访问该应用并向其发送数据，应用会使用我们训练的机器学习模型，以
    JSON 消息的形式返回一个评分结果。


    在本书接下来的最后一章中，我们将探讨如何管理和维护一个现有的大数据集群。


    # 9. 大数据集群的维护


    最后但同样重要的是，我们将探讨如何检查大数据集群的健康状况、如何将现有大数据集群升级到更新的版本，以及如果不再需要，如何删除一个大数据集群实例。


    ## 检查大数据集群的状态


    大数据集群为您提供了两个不同的门户来了解其当前状态和健康状况。这些门户提供有关节点状态以及相关日志文件的指标和见解。除了显示信息外，`azdata` 还能为您提供集群健康状况的高级概览。


    ### 使用 azdata 检索大数据集群的状态


    要从命令行检查集群状态，请使用命令 `azdata login` 登录到您的集群。如图 9-1 所示，`azdata` 将询问您的命名空间（您的集群名称）、用户名和密码。使用部署期间提供的值。


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig1_HTML.jpg](img/480532_2_En_9_Fig1_HTML.jpg)

    *图 9-1 `azdata login` 的输出*


    成功登录后，您可以运行命令 `azdata bdc status show`。这将为您提供所有服务的概览，希望它们都报告为“健康”。示例输出如图 9-2 所示。


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig2_HTML.jpg](img/480532_2_En_9_Fig2_HTML.jpg)

    *图 9-2 `azdata bdc status show` 的输出*


    之后，您可以使用 `azdata logout` 退出集群登录。


    ### 使用 ADS 管理大数据集群


    Azure Data Studio (ADS) 为您提供了大数据集群状态和布局的更广泛视图。首先，您需要连接到集群的控制器端点，该端点在部署时已提供给您。


    为此，请在 ADS 连接中找到“大数据集群”部分，然后点击如图 9-3 中指示的“+”符号。


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig3_HTML.jpg](img/480532_2_En_9_Fig3_HTML.jpg)

    *图 9-3 ADS 中的大数据集群连接*


    在下一步中，提供端点 URL 以及您的凭据以登录集群，如图 9-4 所示。


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig4_HTML.jpg](img/480532_2_En_9_Fig4_HTML.jpg)

    *图 9-4 在 ADS 中添加新的大数据集群连接*


    这将带您进入大数据集群概览页面，该页面将显示每个服务的状态和运行状况以及您的端点，如图 9-5 所示。


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig5_HTML.jpg](img/480532_2_En_9_Fig5_HTML.jpg)

    *图 9-5 ADS 中的大数据集群概览*


    虽然端点更多是用作参考，但概览本身对于检索集群内每个服务和实例的更多详细信息非常有用。


    例如，如果您点击 `SQL Server` 服务，这将带您进入所有 SQL 实例（主实例、计算、数据和存储）的概览页面，如图 9-6 所示。


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig6_HTML.jpg](img/480532_2_En_9_Fig6_HTML.jpg)

    *图 9-6 ADS 中大数据集群 SQL Server 实例的详细信息*


    这还将为您提供指向每个组件的指标和日志的具体链接。


    ### 指标 (Grafana)


    Grafana 门户提供有关节点本身状态的指标和见解，以及在适用时提供更多与 SQL 相关的指标。登录门户的凭据与您在 Azure Data Studio
    中连接集群所使用的凭据相同。


    #### 节点指标


    节点指标是典型的性能指标，如 CPU、RAM 和磁盘使用率，如图 9-7 所示。


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig7_HTML.jpg](img/480532_2_En_9_Fig7_HTML.jpg)

    *图 9-7 Grafana 门户 – 节点指标*


    除了“全局概览”外，您还可以获取每个单独组件（如特定磁盘或网络接口）的详细信息。


    当遇到性能问题时，这总是一个很好的起点。显然，这也是判断您是否过度配置集群的一个重要指标。


    #### SQL 指标


    节点指标侧重于节点的物理层面，而 SQL 指标（如图 9-8 所示）则提供诸如按等待类型划分的等待时间或等待任务数、每秒事务数和请求数等信息，以及其他有价值的指标，以帮助您更深入地了解集群内
    SQL 组件的状态。


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig8_HTML.jpg](img/480532_2_En_9_Fig8_HTML.jpg)

    *图 9-8 Grafana 门户 – SQL 指标*


    除了主实例（也可以通过 SSMS 或 Azure Data Studio 访问）之外，您通常不会直接连接到任何其他节点，因此请将这些指标视为您替代活动监视器的工具。


    ### 日志搜索分析 (Kibana)


    另一方面，如图 9-9 所示的 Kibana 仪表板让您能够深入了解所选 Pod/节点的日志文件。


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig9_HTML.jpg](img/480532_2_En_9_Fig9_HTML.jpg)

    *图 9-9 Kibana 门户 – 概览*


    Kibana 是 Elastic Stack 的一部分。它还提供选项，可在您的日志文件基础上创建可视化效果和仪表板。如果您想了解更多关于它的信息，其网站 [`www.elastic.co/products/kibana`](http://www.elastic.co/products/kibana)
    是一个很好的起点！

    '
- fmt: '# 大数据集群故障排除、升级与删除


    ## 故障排除大数据集群


    在某个时刻，您的**大数据集群**很可能会遇到问题——从磁盘空间不足到组件故障。Azure Data Studio 还提供了关于如何查找并可能修复此类错误原因的指导和工具。


    如果您返回到大数据集群的概览页面，您将看到一个“**Troubleshoot**”按钮，如图 9-10 所示。


    ![图 9-10](images/480532_2_En_9_Chapter/480532_2_En_9_Fig10_HTML.jpg)

    *图 9-10：ADS 中的故障排除链接*


    该按钮背后是一系列用于排查集群中每个组件的笔记本。首先打开的笔记本是“**TSG100 – The Big Data Cluster troubleshooter**”，它将引导您完成对大数据集群的全面调试。如果您已经缩小了导致问题的服务范围，也可以直接在左侧导航到该特定组件的分析器笔记本，如图
    9-11 所示。


    ![图 9-11](images/480532_2_En_9_Chapter/480532_2_En_9_Fig11_HTML.jpg)

    *图 9-11：ADS 中的故障排除*


    这些笔记本按类别分组，如图 9-12 所示，当您遇到大数据集群问题时，它们始终是您的第一个起点。


    ![图 9-12](images/480532_2_En_9_Chapter/480532_2_En_9_Fig12_HTML.jpg)

    *图 9-12：ADS 中的故障排除类别*


    ## 升级大数据集群


    就像任何其他版本的 SQL Server 一样，大数据集群在其版本的维护时间框架内会接收定期的累积更新（CU）。要检查您的安装版本，您只需在 SQL Server
    Management Studio 或 Azure Data Studio 中运行 `SELECT @@VERSION`。让我们假设您当前的版本是 CU1，如图
    9-13 所示。


    ![图 9-13](images/480532_2_En_9_Chapter/480532_2_En_9_Fig13_HTML.jpg)

    *图 9-13：`SELECT @@VERSION` 的输出*


    如果您想将大数据集群升级到新版本，请首先确保您拥有最新版本的 `azdata`。为此，请运行清单 9-1 中的代码，就像您首次安装 `azdata` 时一样。


    ```

    pip3 install -r https://aka.ms/azdata

    ```

    *清单 9-1：将 azdata 更新到最新版本*


    现在您可以使用 `azdata` 来升级您的集群。命令是 `azdata bdc upgrade`，后面至少跟上您的集群名称和目标版本。


    例如，要升级到大数据集群 2019 CU3，您将使用清单 9-2 中显示的命令。


    ```

    azdata bdc upgrade --name mybdc --tag 2019-CU3-ubuntu-16.04

    ```

    *清单 9-2：使用 azdata 将 BDC 升级到 CU3*


    这将需要一些时间，因为首先需要拉取所有单独的镜像，然后升级集群中的每个组件。就像安装过程一样，升级过程会持续为您提供它当前正在处理的组件的状态更新，直到升级过程完成（参见图
    9-14）。


    ![图 9-14](images/480532_2_En_9_Chapter/480532_2_En_9_Fig14_HTML.jpg)

    *图 9-14：`azdata bdc upgrade` 的输出*


    如果您遇到超时问题（这被报告为一个常见问题），您可以在运行 `azdata bdc upgrade` 时添加可选参数 `controller-timeout`
    和 `component-timeout`。它们的值以分钟为单位，因此如果您将它们都设置为 60，应该绰绰有余。


    如果您现在再次运行 `SELECT @@VERSION`，您将看到您的大数据集群的当前版本反映为 CU3，如图 9-15 所示。


    ![图 9-15](images/480532_2_En_9_Chapter/480532_2_En_9_Fig15_HTML.jpg)

    *图 9-15：升级后的 `SELECT @@VERSION` 输出*


    ## 删除大数据集群实例


    如果您想删除大数据集群的一个实例，您只需再次使用 `azdata`。您只需提供实例的名称，如清单 9-3 所示，集群组件就会被删除。


    ```

    azdata bdc delete –-name <instance-name>

    ```

    *清单 9-3：删除大数据集群实例*


    您可以跟踪进度，直到实例被完全删除，如图 9-16 所示。


    ![图 9-16](images/480532_2_En_9_Chapter/480532_2_En_9_Fig16_HTML.jpg)

    *图 9-16：`azdata bdc delete` 的输出*


    就这样——您的实例现在已被删除。这只会删除大数据集群组件，因此如果您部署到 Azure Kubernetes Service，您可能还需要考虑删除该集群，除非您需要它用于其他应用程序，以避免其产生费用。


    ## 总结


    在这最后一章中，我们探讨了获取大数据集群健康状况快速状态的选项、当某些功能未按预期工作时该怎么办的选项，以及如何将现有集群升级到更高版本。'
  raw: "## Troubleshooting Big Data Clusters\n\nAt some point, your Big Data Cluster\
    \ will probably run into a problem – from insufficient disk space to a faulty\
    \ component. Azure Data Studio also provides guidance and tools on how to find\
    \ and potentially fix the cause of such an error.\n\nIf you navigate back to the\
    \ Big Data Cluster overview, you will see a button “Troubleshoot” as pointed out\
    \ in Figure [9-10](#480532_2_En_9_Chapter.xhtml#Fig10).\n\n![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig10_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig10_HTML.jpg)\n\
    \nFigure 9-10\n\nLink to troubleshooting in ADS\n\nBehind this button is a collection\
    \ of notebooks to troubleshoot every single component of your cluster. The first\
    \ notebook to open is “TSG100 – The Big Data Cluster troubleshooter” which will\
    \ guide you through a full debugging of your Big Data Cluster. If you have already\
    \ narrowed down which service is causing issues, you can also navigate directly\
    \ to the analyzer notebook for that specific component on the left as shown in\
    \ Figure [9-11](#480532_2_En_9_Chapter.xhtml#Fig11).\n\n![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig11_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig11_HTML.jpg)\n\
    \nFigure 9-11\n\nTroubleshooting in ADS\n\nThe notebooks are grouped by category\
    \ as illustrated in Figure [9-12](#480532_2_En_9_Chapter.xhtml#Fig12) and are\
    \ always your first starting point when you’re experiencing problems with a Big\
    \ Data Cluster.\n\n![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig12_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig12_HTML.jpg)\n\
    \nFigure 9-12\n\nTroubleshooting categories in ADS\n\n## Upgrading Big Data Clusters\n\
    \nJust like any other version of SQL Server, Big Data Clusters receive regular\
    \ cumulative updates (CU) during the version’s maintenance time frame. To check\
    \ your installation’s version, you can just run *SELECT @@VERSION* in either SQL\
    \ Server Management Studio or Azure Data Studio. Let’s assume your current version\
    \ is CU1 as shown in Figure [9-13](#480532_2_En_9_Chapter.xhtml#Fig13).\n\n![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig13_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig13_HTML.jpg)\n\
    \nFigure 9-13\n\nOutput of SELECT @@VERSION\n\nIf you want to upgrade your Big\
    \ Data Cluster to a new version, first make sure that you have the latest version\
    \ of azdata installed. To do so, run the code in Listing [9-1](#480532_2_En_9_Chapter.xhtml#PC1)\
    \ just like when you first installed azdata.\n\n```\npip3 install -r https://aka.ms/azdata\n\
    Listing 9-1\nUpdate azdata to the latest version\n```\n\nNow you can use *azdata*\
    \ to upgrade your cluster. The command for this is *azdata bdc upgrade*, followed\
    \ by at least your cluster’s name and the target version.\n\nTo upgrade to Big\
    \ Data Clusters 2019 CU3, for example, you would use the command shown in Listing\
    \ [9-2](#480532_2_En_9_Chapter.xhtml#PC2).\n\n```\nazdata bdc upgrade --name mybdc\
    \ --tag 2019-CU3-ubuntu-16.04\nListing 9-2\nUpgrade your BDC to CU3 using azdata\n\
    ```\n\nThis will take some time as all the individual images will need to be pulled\
    \ first followed by an upgrade of every single component in your cluster. Just\
    \ like during the installation process, the upgrade process will give you a continuous\
    \ status update on which component it is currently working at up to the point\
    \ where the upgrade process is complete (see Figure [9-14](#480532_2_En_9_Chapter.xhtml#Fig14)).\n\
    \n![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig14_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig14_HTML.jpg)\n\
    \nFigure 9-14\n\nOutput of azdata bdc upgrade\n\nShould you run into timeout issues,\
    \ which has been reported as a common problem, you can run *azdata bdc upgrade*\
    \ with the additional, optional parameters *controller-timeout* and *component-timeout*.\
    \ Their value will be in minutes, so if you set them both to 60, it should be\
    \ more than sufficient.\n\nIf you now run *SELECT @@VERSION* again, you will see\
    \ that your Big Data Cluster reflects CU3 as its current version as shown in Figure\
    \ [9-15](#480532_2_En_9_Chapter.xhtml#Fig15).\n\n![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig15_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig15_HTML.jpg)\n\
    \nFigure 9-15\n\nOutput of SELECT @@VERSION after upgrade\n\n## Removing a Big\
    \ Data Cluster Instance\n\nIf you want to delete an instance of your Big Data\
    \ Cluster, all you need to do is use *azdata* again. You will just need to provide\
    \ the name of your instance as shown in Listing [9-3](#480532_2_En_9_Chapter.xhtml#PC3)\
    \ and the cluster components will be deleted.\n\n```\nazdata bdc delete –-name\
    \ \nListing 9-3\nInstall script for Chocolatey in PowerShell\n```\n\nYou can follow\
    \ the progress until the instance is fully removed as shown in Figure [9-16](#480532_2_En_9_Chapter.xhtml#Fig16).\n\
    \n![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig16_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig16_HTML.jpg)\n\
    \nFigure 9-16\n\nOutput of azdata bdc delete\n\nThat’s it – your instance is now\
    \ removed. This will only remove the Big Data Cluster components, so if you deployed\
    \ to Azure Kubernetes Services, you may want to consider deleting that cluster\
    \ as well, unless you need it for other applications, to avoid it accumulating\
    \ costs.\n\n## Summary\n\nIn this last chapter, we’ve explored the options of\
    \ getting a quick status of your Big Data Cluster’s health, options on what to\
    \ do if something is not working as desired, as well as how to upgrade an existing\
    \ cluster to a later version."
