- fmt: '## Microsoft Sample Data


    We’ll start with the sample data provided by Microsoft on their GitHub page, [`https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster).
    Download the files `bootstrap-sample-db.sql` and, depending on your operating
    system, either `bootstrap-sample-db.cmd` (for Windows) or `bootstrap-sample-db.sh`
    (for Linux).


    You can then run the `.cmd` or `.sh` file with the following parameters (Listing
    [4-5](#480532_2_En_4_Chapter.xhtml#PC5)).


    ```

    USAGE: bootstrap-sample-db.cmd    [--install-extra-samples] [SQL_MASTER_PORT]
    [KNOX_PORT]

    To use basic authentication please set AZDATA_USERNAME and AZDATA_PASSWORD environment
    variables.

    To use integrated authentication, provide the DNS names for the endpoints.

    Port can be specified separately if using non-default values.

    Listing 4-5

    Install default Microsoft samples

    ```


    Just pass the information (IPs, password, namespace) you used or were provided
    during installation of your cluster, and the script will run automatically and
    pump some sample data to your installation.


    The requirements of this script are:


    *   `sqlcmd`

    *   `bcp`

    *   `kubectl`

    *   `curl`


    If you are running this script from the same box that you used for the initial
    installation, those requirements should already be satisfied.


    ## Flight Delay Sample Dataset


    In addition to the Microsoft samples, let’s also add some more external data.
    A great place to find free datasets is `kaggle.com` (Figure [4-5](#480532_2_En_4_Chapter.xhtml#Fig5)).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig5_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig5_HTML.jpg)


    **Figure 4-5** Kaggle.com login


    If you don’t have an account with them yet, just sign up for a free account. Otherwise,
    just log in to your account.


    Once signed in, navigate to Datasets and search for "Flight Delays," which should
    bring up the "2015 Flight Delays and Cancellations" Dataset from the Department
    of Transportation as shown in Figure [4-6](#480532_2_En_4_Chapter.xhtml#Fig6).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig6_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig6_HTML.jpg)


    **Figure 4-6** Kaggle.com Datasets


    Alternatively, you can also navigate directly to [`www.kaggle.com/usdot/flight-delays`](http://www.kaggle.com/usdot/flight-delays).


    The Datasets consist of three files: Airlines, Airports, and Flights. You can
    download them all at once by clicking "Download," which will trigger one ZIP file
    containing all files as shown in Figure [4-7](#480532_2_En_4_Chapter.xhtml#Fig7).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig7_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig7_HTML.jpg)


    **Figure 4-7** Kaggle.com download Flight Delays Datasets


    While not unreasonably big, this dataset provides a lot of options to explore
    and work with the data. Once you’ve downloaded the file, we still need to get
    that data into our Big Data Cluster. Since these are only three files, we will
    do this by manually uploading them through Azure Data Studio.


    Therefore, connect to your Big Data Cluster in Azure Data Studio, navigate to
    Data Services, open the HDFS root folder, and create a new directory called "Flight_Delays"
    as shown in Figure [4-8](#480532_2_En_4_Chapter.xhtml#Fig8).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig8_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig8_HTML.jpg)


    **Figure 4-8** Create new directory on HDFS in ADS


    You can then select this directory, do a right-mouse-click, choose "Upload files,"
    and upload the three CSV files. You can multiselect them so there is no need to
    upload them one by one. If you do a right-mouse-click and refresh the folder,
    the files should be visible as shown in Figure [4-9](#480532_2_En_4_Chapter.xhtml#Fig9).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig9_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig9_HTML.jpg)


    **Figure 4-9** Display of files in the new folder in ADS


    The upload progress will also be visible in the footer of Azure Data Studio.


    An alternative to the upload through the front end would be to use `curl` from
    a command prompt. You can use it both to create the target directory and to upload
    the actual file.


    For just the `airlines.csv`, this would look like as shown in Listing [4-6](#480532_2_En_4_Chapter.xhtml#PC6)
    (you would need to replace your IP address and password). The first line will
    create a directory called "Flight_Delays", while the second line will upload the
    file "airlines.csv" to it.


    ```

    curl -i -L -k -u root: -X PUT "https:// /gateway/default/webhdfs/v1/Flight_Delays?op=MKDIRS"

    curl -i -L -k -u root: -X PUT "https:///gateway/default/webhdfs/v1/Flight_Delays
    /airlines.csv?op=create&overwrite=true" -H "Content-Type: application/octet-stream"
    -T "airlines.csv"

    Listing 4-6

    Upload data to HDFS using curl

    ```'
  raw: '#### Microsoft Sample Data


    We’ll start with the sample data provided by Microsoft on their GitHub page, [`https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster).
    Download the files “bootstrap-sample-db.sql” and, depending on your operating
    system, either “bootstrap-sample-db.cmd” (for Windows) or “bootstrap-sample-db.sh”
    (for Linux).


    You can then run the .cmd or .sh file with the following parameters (Listing [4-5](#480532_2_En_4_Chapter.xhtml#PC5)).


    ```

    USAGE: bootstrap-sample-db.cmd    [--install-extra-samples] [SQL_MASTER_PORT]
    [KNOX_PORT]

    To use basic authentication please set AZDATA_USERNAME and AZDATA_PASSWORD environment
    variables.

    To use integrated authentication, provide the DNS names for the endpoints.

    Port can be specified separately if using non-default values.

    Listing 4-5

    Install default Microsoft samples

    ```


    Just pass the information (IPs, password, namespace) you used or were provided
    during installation of your cluster, and the script will run automatically and
    pump some sample data to your installation.


    The requirements of this script are


    *   sqlcmd


    *   bcp


    *   kubectl


    *   curl


    If you are running this script from the same box that you used for the initial
    installation, those requirements should already be satisfied.


    #### Flight Delay Sample Dataset


    In addition to the Microsoft samples, let’s also add some more external data.
    A great place to find free datasets is kaggle.com (Figure [4-5](#480532_2_En_4_Chapter.xhtml#Fig5)).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig5_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Kaggle.com login


    If you don’t have an account with them yet, just sign up for a free account. Otherwise,
    just log in to your account.


    Once signed in, navigate to Datasets and search for “Flight Delays,” which should
    bring up the “2015 Flight Delays and Cancellations” Dataset from the Department
    of Transportation as shown in Figure [4-6](#480532_2_En_4_Chapter.xhtml#Fig6).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig6_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Kaggle.com Datasets


    Alternatively, you can also navigate directly to [`www.kaggle.com/usdot/flight-delays`](http://www.kaggle.com/usdot/flight-delays).


    The Datasets consist of three files: Airlines, Airports, and Flights. You can
    download them all at once by clicking “Download,” which will trigger one ZIP file
    containing all files as shown in Figure [4-7](#480532_2_En_4_Chapter.xhtml#Fig7).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig7_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig7_HTML.jpg)


    Figure 4-7


    Kaggle.com download Flight Delays Datasets


    While not unreasonably big, this dataset provides a lot of options to explore
    and work with the data. Once you’ve downloaded the file, we still need to get
    that data into our Big Data Cluster. Since these are only three files, we will
    do this by manually uploading them through Azure Data Studio.


    Therefore, connect to your Big Data Cluster in Azure Data Studio, navigate to
    Data Services, open the HDFS root folder, and create a new directory called “Flight_Delays”
    as shown in Figure [4-8](#480532_2_En_4_Chapter.xhtml#Fig8).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig8_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Create new directory on HDFS in ADS


    You can then select this directory, do a right-mouse-click, choose “Upload files,”
    and upload the three CSV files. You can multiselect them so there is no need to
    upload them one by one. If you do a right-mouse-click and refresh the folder,
    the files should be visible as shown in Figure [4-9](#480532_2_En_4_Chapter.xhtml#Fig9).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig9_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig9_HTML.jpg)


    Figure 4-9


    Display of files in the new folder in ADS


    The upload progress will also be visible in the footer of Azure Data Studio.


    An alternative to the upload through the front end would be to use curl from a
    command prompt. You can use it both to create the target directory and to upload
    the actual file.


    For just the airlines.csv, this would look like as shown in Listing [4-6](#480532_2_En_4_Chapter.xhtml#PC6)
    (you would need to replace your IP address and password). The first line will
    create a directory called “Flight_Delays”, while the second line will upload the
    file “airlines.csv” to it.


    ```

    curl -i -L -k -u root: -X PUT "https:// /gateway/default/webhdfs/v1/Flight_Delays?op=MKDIRS"

    curl -i -L -k -u root: -X PUT "https:///gateway/default/webhdfs/v1/Flight_Delays
    /airlines.csv?op=create&overwrite=true" -H "Content-Type: application/octet-stream"
    -T "airlines.csv"

    Listing 4-6

    Upload data to HDFS using curl

    ```'
  trans: '

    ## Microsoft 示例数据


    我们将从 Microsoft 在其 GitHub 页面上提供的示例数据开始，[`https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster)。请下载文件
    `bootstrap-sample-db.sql`，并根据你的操作系统，下载 `bootstrap-sample-db.cmd`（适用于 Windows）或
    `bootstrap-sample-db.sh`（适用于 Linux）。


    然后，你可以使用以下参数运行 `.cmd` 或 `.sh` 文件（参见列表 4-5）。


    ```

    用法: bootstrap-sample-db.cmd    [--install-extra-samples] [SQL_MASTER_PORT] [KNOX_PORT]

    要使用基本身份验证，请设置 AZDATA_USERNAME 和 AZDATA_PASSWORD 环境变量。

    要使用集成身份验证，请提供端点的 DNS 名称。

    如果使用非默认值，可以单独指定端口。

    列表 4-5

    安装默认的 Microsoft 示例

    ```


    只需传递你在安装集群时使用或提供的（IP、密码、命名空间）信息，脚本就会自动运行，并将一些示例数据导入到你的安装中。


    此脚本的要求是：


    *   `sqlcmd`

    *   `bcp`

    *   `kubectl`

    *   `curl`


    如果你在初始安装所用的同一台机器上运行此脚本，这些要求应该已经满足。


    ## 航班延误示例数据集


    除了 Microsoft 示例，让我们再添加一些外部数据。寻找免费数据集的一个好地方是 `kaggle.com`（图 4-5）。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig5_HTML.jpg](img/480532_2_En_4_Fig5_HTML.jpg)


    **图 4-5** Kaggle.com 登录


    如果你还没有账户，只需注册一个免费账户。否则，直接登录你的账户。


    登录后，导航到“数据集”并搜索“Flight Delays”，这应该会显示出来自美国交通部的“2015 航班延误和取消”数据集，如图 4-6 所示。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig6_HTML.jpg](img/480532_2_En_4_Fig6_HTML.jpg)


    **图 4-6** Kaggle.com 数据集


    或者，你也可以直接导航到 [`www.kaggle.com/usdot/flight-delays`](http://www.kaggle.com/usdot/flight-delays)。


    该数据集包含三个文件：航空公司、机场和航班。你可以通过点击“下载”一次性下载所有文件，这将触发一个包含所有文件的 ZIP 文件下载，如图 4-7 所示。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig7_HTML.jpg](img/480532_2_En_4_Fig7_HTML.jpg)


    **图 4-7** Kaggle.com 下载航班延误数据集


    虽然这个数据集的大小并非不合理，但它提供了很多选项来探索和处理数据。下载文件后，我们仍然需要将这些数据导入到我们的大数据集群中。由于只有三个文件，我们将通过
    Azure Data Studio 手动上传它们来完成。


    因此，在 Azure Data Studio 中连接到你的大数据集群，导航到“数据服务”，打开 HDFS 根文件夹，并创建一个名为“Flight_Delays”的新目录，如图
    4-8 所示。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig8_HTML.jpg](img/480532_2_En_4_Fig8_HTML.jpg)


    **图 4-8** 在 ADS 的 HDFS 上创建新目录


    然后，你可以选择此目录，点击鼠标右键，选择“上传文件”，并上传这三个 CSV 文件。你可以多选，因此无需逐个上传。如果点击鼠标右键并刷新文件夹，文件应该可见，如图
    4-9 所示。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig9_HTML.jpg](img/480532_2_En_4_Fig9_HTML.jpg)


    **图 4-9** ADS 中新文件夹内文件的显示


    上传进度也会在 Azure Data Studio 的页脚显示。


    通过前端上传的另一种方法是使用命令提示符下的 `curl`。你可以使用它来创建目标目录和上传实际文件。


    对于仅 `airlines.csv`，如列表 4-6 所示（你需要替换你的 IP 地址和密码）。第一行将创建一个名为“Flight_Delays”的目录，而第二行将文件“airlines.csv”上传到其中。


    ```

    curl -i -L -k -u root: -X PUT "https:// /gateway/default/webhdfs/v1/Flight_Delays?op=MKDIRS"

    curl -i -L -k -u root: -X PUT "https:///gateway/default/webhdfs/v1/Flight_Delays
    /airlines.csv?op=create&overwrite=true" -H "Content-Type: application/octet-stream"
    -T "airlines.csv"

    列表 4-6

    使用 curl 上传数据到 HDFS

    '
- fmt: '### Azure SQL Database


    正如第[1](#480532_2_En_1_Chapter.xhtml)章用例中所述，使用大数据集群 PolyBase 实现的一种方式是将数据延伸到 Azure（或任何其他基于云的
    SQL Server）。为了更好地理解这一点，除非您已经在另一台 SQL Server 或 Azure SQL DB 上拥有数据库，否则我们建议您在 Azure
    中设置一个包含 AdventureWorks 数据库的小型数据库。


    为此，请再次登录 Azure 门户（图[4-10](#480532_2_En_4_Chapter.xhtml#Fig10)），就像您在第[3](#480532_2_En_3_Chapter.xhtml)章中所做的那样。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig10_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig10_HTML.jpg)


    图 4-10 在 Azure 门户中创建资源


    然后，在左侧面板的顶部选择“创建资源”，从列表中选取或搜索“SQL 数据库”。


    在下一个屏幕上，直接点击“创建”（图[4-11](#480532_2_En_4_Chapter.xhtml#Fig11)）。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig11_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig11_HTML.jpg)


    图 4-11 在 Azure 门户中创建 SQL 数据库


    将数据库名称设为“AdventureWorks”，选择合适的订阅，创建新的资源组或选择现有的，并将“示例 (AdventureWorksLT)”选择为源（图[4-12](#480532_2_En_4_Chapter.xhtml#Fig12)）。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig12_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig12_HTML.jpg)


    图 4-12 通过 Azure 门户配置要创建的 SQL 数据库


    您还需要配置一个服务器（图[4-13](#480532_2_En_4_Chapter.xhtml#Fig13)），因此请展开“服务器”子菜单。通过提供名称（必须是唯一的）、用户名和密码来设置服务器。同样，选择离您最近的位置，并保持“允许
    Azure 服务访问服务器”复选框为选中状态。这将允许您从其他 Azure 虚拟机或服务访问此数据库，而无需担心防火墙设置。根据您的设置，您可能仍然需要允许从本地计算机访问——我们稍后会讲到这一点。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig13_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig13_HTML.jpg)


    图 4-13 在 Azure 门户中为新的 SQL 数据库配置服务器


    您现在可以将“定价层”更改为“基本”，这是最便宜的选项，但完全足以满足我们此处的目标。


    点击“创建”确认您的选择；这将触发服务器和数据库的部署，可能需要几分钟时间。您已完成——您刚刚创建了 AdventureWorksLT 数据库，我们可以用它来进行远程查询。


    尝试通过 Azure Data Studio 连接到数据库（图[4-14](#480532_2_En_4_Chapter.xhtml#Fig14)）。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig14_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig14_HTML.jpg)


    图 4-14 ADS 中的连接对话框


    如果您不在 Azure 虚拟机上，或者取消选中了允许从 Azure 连接的框，您可能会看到图[4-15](#480532_2_En_4_Chapter.xhtml#Fig15)中所示的错误。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig15_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig15_HTML.jpg)


    图 4-15 Azure Data Studio – 连接错误


    如果发生这种情况，请返回 Azure 门户（图[4-16](#480532_2_En_4_Chapter.xhtml#Fig16)），导航到包含数据库服务器的资源组，并选择该服务器（确保点击的是
    SQL Server，而不是 SQL 数据库）。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig16_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig16_HTML.jpg)


    图 4-16 Azure SQL 数据库配置


    在左侧，向下滚动到“安全性”，并选择“防火墙和虚拟网络”，如图[4-17](#480532_2_En_4_Chapter.xhtml#Fig17)所示。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig17_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig17_HTML.jpg)


    图 4-17 Azure 门户防火墙设置


    点击“添加客户端 IP”或手动添加您的 IP 地址。


    保存您的更改。


    现在，尝试在 Azure Data Studio 中再次连接到数据库。您应该能够看到 AdventureWorks 数据库，包括图[4-18](#480532_2_En_4_Chapter.xhtml#Fig18)中所示的表。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig18_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig18_HTML.jpg)


    图 4-18 ADS 中显示的 AdventureWorksLT 表结构


    ## 总结


    在本章中，我们将一些数据加载到了先前部署的 SQL Server 大数据集群中。现在是时候看看如何使用这些数据了！


    ### 通过 T-SQL 查询大数据集群


    既然我们有一些数据可以操作了，让我们看看如何通过 Azure Data Studio 提供的多种选项来处理和查询这些数据。'
  raw: '### Azure SQL Database


    As described within the use cases in Chapter [1](#480532_2_En_1_Chapter.xhtml),
    one way of using the Big Data Cluster PolyBase implementation is to stretch out
    data to Azure (or any other cloud-based SQL Server for that matter). To get a
    better feeling of this, unless you already have a database on either another SQL
    Server or in Azure SQL DB, we recommend to just set up a small database in Azure
    containing the AdventureWorks Database.


    To do so, log on again to the Azure Portal (Figure [4-10](#480532_2_En_4_Chapter.xhtml#Fig10))
    as you did in Chapter [3](#480532_2_En_3_Chapter.xhtml).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig10_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig10_HTML.jpg)


    Figure 4-10


    Create resource in Azure Portal


    Then pick “Create a resource” on the upper end of your panel on the left and either
    pick “SQL Database” from the list or search for it.


    On the next screen, just click “Create” (Figure [4-11](#480532_2_En_4_Chapter.xhtml#Fig11)).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig11_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig11_HTML.jpg)


    Figure 4-11


    Create SQL Database in Azure Portal


    As the name for your database, just use “AdventureWorks,” pick the appropriate
    subscription, create a new resource group or pick an existing, and choose “Sample
    (AdventureWorksLT)” as your source (Figure [4-12](#480532_2_En_4_Chapter.xhtml#Fig12)).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig12_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig12_HTML.jpg)


    Figure 4-12


    Configure the SQL Database to be created through Azure Portal


    You will also need to configure a Server (Figure [4-13](#480532_2_En_4_Chapter.xhtml#Fig13)),
    therefore expand the Server submenu. Set up the server by providing a name (this
    has to be unique), a username, and a password. Again, pick the location closest
    to you and keep the “Allow Azure services to access server” box ticked. This will
    allow you to access this database from other Azure VMs or services without having
    to worry about firewall settings. Depending on your setup, you may still need
    to allow access from your on-premises box – we’ll get to that later.


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig13_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig13_HTML.jpg)


    Figure 4-13


    Configure the Server for the new SQL Database in Azure Portal


    You can now change the “Pricing tier” to “Basic” which is the cheapest option
    but totally sufficient for what we’re trying to achieve here.


    Confirm your selections by clicking “Create”; this triggers the deployment of
    the server and the database which should take a couple of minutes. You’re done –
    you have just created the AdventureWorksLT database which we can use for remote
    queries.


    Try connecting to the database through Azure Data Studio (Figure [4-14](#480532_2_En_4_Chapter.xhtml#Fig14)).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig14_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig14_HTML.jpg)


    Figure 4-14


    Connection dialog in ADS


    If you are not on an Azure VM or have unticked the box to allow connections from
    Azure, you will likely get the error shown in Figure [4-15](#480532_2_En_4_Chapter.xhtml#Fig15).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig15_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig15_HTML.jpg)


    Figure 4-15


    Azure Data Studio – Connection error


    If this happens, go back to the Azure Portal (Figure [4-16](#480532_2_En_4_Chapter.xhtml#Fig16)),
    navigate to your resource group containing the database server, and select the
    server (make sure to click the SQL Server, not the SQL Database).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig16_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig16_HTML.jpg)


    Figure 4-16


    Azure SQL Database configuration


    On the left, scroll down to “Security” and pick “Firewalls and virtual networks”
    as shown in Figure [4-17](#480532_2_En_4_Chapter.xhtml#Fig17).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig17_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig17_HTML.jpg)


    Figure 4-17


    Azure Portal Firewall Settings


    Either click “Add client IP” or manually add your IP address.


    Save your changes.


    Now, try connecting to the database again in Azure Data Studio. You should be
    able to see the AdventureWorks Database including the tables shown in Figure [4-18](#480532_2_En_4_Chapter.xhtml#Fig18).


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig18_HTML.jpg](images/480532_2_En_4_Chapter/480532_2_En_4_Fig18_HTML.jpg)


    Figure 4-18


    Table structure of AdventureWorksLT shown in ADS


    ## Summary


    In this chapter, we loaded some data into the previously deployed SQL Server Big
    Data Cluster. Now it’s time to look on how to consume that data!


    # 5. Querying Big Data Clusters Through T-SQL


    Now that we have some data to play with, let’s look at how we can process and
    query that data through the multiple options provided through Azure Data Studio.'
  trans: '### Azure SQL Database


    正如第 1 章用例中所述，使用大数据集群 PolyBase 实现的一种方式是将数据延伸到 Azure（或任何其他基于云的 SQL Server）。为了更好地理解这一点，除非您已经在另一台
    SQL Server 或 Azure SQL DB 上拥有数据库，否则我们建议您在 Azure 中设置一个包含 AdventureWorks 数据库的小型数据库。


    为此，请再次登录 Azure 门户（图 4-10），就像您在第 3 章中所做的那样。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig10_HTML.jpg](img/480532_2_En_4_Fig10_HTML.jpg)


    图 4-10 在 Azure 门户中创建资源


    然后，在左侧面板的顶部选择“创建资源”，从列表中选取或搜索“SQL 数据库”。


    在下一个屏幕上，直接点击“创建”（图 4-11）。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig11_HTML.jpg](img/480532_2_En_4_Fig11_HTML.jpg)


    图 4-11 在 Azure 门户中创建 SQL 数据库


    将数据库名称设为“AdventureWorks”，选择合适的订阅，创建新的资源组或选择现有的，并将“示例 (AdventureWorksLT)”选择为源（图
    4-12）。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig12_HTML.jpg](img/480532_2_En_4_Fig12_HTML.jpg)


    图 4-12 通过 Azure 门户配置要创建的 SQL 数据库


    您还需要配置一个服务器（图 4-13），因此请展开“服务器”子菜单。通过提供名称（必须是唯一的）、用户名和密码来设置服务器。同样，选择离您最近的位置，并保持“允许
    Azure 服务访问服务器”复选框为选中状态。这将允许您从其他 Azure 虚拟机或服务访问此数据库，而无需担心防火墙设置。根据您的设置，您可能仍然需要允许从本地计算机访问——我们稍后会讲到这一点。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig13_HTML.jpg](img/480532_2_En_4_Fig13_HTML.jpg)


    图 4-13 在 Azure 门户中为新的 SQL 数据库配置服务器


    您现在可以将“定价层”更改为“基本”，这是最便宜的选项，但完全足以满足我们此处的目标。


    点击“创建”确认您的选择；这将触发服务器和数据库的部署，可能需要几分钟时间。您已完成——您刚刚创建了 AdventureWorksLT 数据库，我们可以用它来进行远程查询。


    尝试通过 Azure Data Studio 连接到数据库（图 4-14）。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig14_HTML.jpg](img/480532_2_En_4_Fig14_HTML.jpg)


    图 4-14 ADS 中的连接对话框


    如果您不在 Azure 虚拟机上，或者取消选中了允许从 Azure 连接的框，您可能会看到图 4-15 中所示的错误。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig15_HTML.jpg](img/480532_2_En_4_Fig15_HTML.jpg)


    图 4-15 Azure Data Studio – 连接错误


    如果发生这种情况，请返回 Azure 门户（图 4-16），导航到包含数据库服务器的资源组，并选择该服务器（确保点击的是 SQL Server，而不是 SQL
    数据库）。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig16_HTML.jpg](img/480532_2_En_4_Fig16_HTML.jpg)


    图 4-16 Azure SQL 数据库配置


    在左侧，向下滚动到“安全性”，并选择“防火墙和虚拟网络”，如图 4-17 所示。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig17_HTML.jpg](img/480532_2_En_4_Fig17_HTML.jpg)


    图 4-17 Azure 门户防火墙设置


    点击“添加客户端 IP”或手动添加您的 IP 地址。


    保存您的更改。


    现在，尝试在 Azure Data Studio 中再次连接到数据库。您应该能够看到 AdventureWorks 数据库，包括图 4-18 中所示的表。


    ![../images/480532_2_En_4_Chapter/480532_2_En_4_Fig18_HTML.jpg](img/480532_2_En_4_Fig18_HTML.jpg)


    图 4-18 ADS 中显示的 AdventureWorksLT 表结构


    ## 总结


    在本章中，我们将一些数据加载到了先前部署的 SQL Server 大数据集群中。现在是时候看看如何使用这些数据了！


    ### 通过 T-SQL 查询大数据集群


    既然我们有一些数据可以操作了，让我们看看如何通过 Azure Data Studio 提供的多种选项来处理和查询这些数据。'
- fmt: '## External Tables


    查询大数据集群（Big Data Cluster）使用的是 T-SQL 通过 *外部表* （external tables）实现的，这个概念最初是在 SQL
    Server 2016 中随着 PolyBase 的出现而引入的。


    我们将通过向一个新的空数据库 `BDC_Empty`（该数据库最初位于我们的 Azure `AdventureWorksLT` 数据库中）添加一些外部表，来开始查询我们的大数据集群。


    首先，如图 [5-1](#480532_2_En_5_Chapter.xhtml#Fig1) 所示，通过 Azure Data Studio 连接到你的 SQL
    Server 主实例（或任何其他启用了 PolyBase 的 SQL Server 2019 实例）。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig1_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig1_HTML.jpg)


    图 5-1


    连接到主实例


    你的连接类型将是 `Microsoft SQL Server`。服务器地址将是服务器的 IP（或 DNS 名称）（如果使用了实例名，可能需要追加实例名）以及实例的端口（用逗号分隔），除非是运行在标准端口
    `1433` 上的本地安装。


    展开你的连接、数据库、`BDC_Empty` 数据库以及其中的表（图 [5-2](#480532_2_En_5_Chapter.xhtml#Fig2)）。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig2_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig2_HTML.jpg)


    图 5-2


    ADS 中的空数据库


    正如预期，目前没有任何表。让我们来改变这一点！


    如果你在数据库上右键单击，你会看到一个名为 `Create External Table` 的选项。这将打开相应的向导。


    在第一步中，它会要求你确认要在其中创建外部表的数据库，并选择一个数据源类型。此时（图 [5-3](#480532_2_En_5_Chapter.xhtml#Fig3)），该向导支持
    `SQL Server` 和 `Oracle`；除了 `CSV` 文件（它们有自己的向导）之外，所有其他源都需要手动编写脚本。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig3_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig3_HTML.jpg)


    图 5-3


    ADS 中的外部表向导 – 选择数据源


    选择 `SQL Server` 并单击 `Next`。


    在下一个对话框中（图 [5-4](#480532_2_En_5_Chapter.xhtml#Fig4)），向导将要求你为此数据库设置一个主密钥密码。这是必需的，因为我们将把凭据存储在数据库中，这些凭据需要被加密。如果你在已设有主密钥密码的数据库上运行向导，此步骤将被跳过。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig4_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig4_HTML.jpg)


    图 5-4


    ADS 中的外部表向导 – 创建数据库主密钥


    输入并确认密码，然后单击 `Next`。


    下一个屏幕（图 [5-5](#480532_2_En_5_Chapter.xhtml#Fig5)）要求你提供连接的名称（别名）、连接的服务器名称以及数据库名称。如果你之前配置过，也可以选择使用现有的连接。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig5_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig5_HTML.jpg)


    图 5-5


    ADS 中的外部表向导 – 连接和凭据


    此外，系统会提供一个已存在的凭据列表（如果有的话）以及创建新凭据的选项。


    使用 `AW` 作为你的数据源名称和 `New Credential Name`，`AdventureWorks` 作为你的 `Database Name`，并提供你在上一步中配置的
    `Server Name`、`Username` 和 `Password`。点击 `Next`。


    向导现在将加载源数据库中的所有表和视图，你可以展开并浏览它们，如图 [5-6](#480532_2_En_5_Chapter.xhtml#Fig6) 所示。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig6_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig6_HTML.jpg)


    图 5-6


    ADS 中的外部表向导 – 对象映射


    你可以选择整个数据库、所有表或所有视图，或者选择一定数量的单个对象。


    你将无法更改任何列定义，并且必须始终“创建”源中存在的所有列。由于没有实际移动数据，而只是对外部模式的引用，这不是问题。


    唯一可以更改的两件事（如图 [5-7](#480532_2_En_5_Chapter.xhtml#Fig7) 所示屏幕的右上角部分）是目标模式（target
    schema）和目标表名（target table name），因为你可能希望将所有外部表创建在一个单独的模式中，或者为它们添加前缀。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig7_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig7_HTML.jpg)


    图 5-7


    ADS 中的外部表向导 – 表映射


    现在，选择表 `Address`、`Customer` 和 `CustomerAddress`，并保持其他所有表未选中以及所有设置不变。点击 `Next`。


    你已到达最后一步，这是一个摘要页面，如图 [5-8](#480532_2_En_5_Chapter.xhtml#Fig8) 所示。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig8_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig8_HTML.jpg)


    图 5-8


    ADS 中的外部表向导 – 摘要


    你现在可以选择生成脚本，或者直接通过向导创建所有对象。


    让我们来看一下脚本（清单 [5-1](#480532_2_En_5_Chapter.xhtml#PC1)），所以点击 `Generate Script`，然后点击
    `Cancel` 关闭向导。你将看到脚本，它将启动一个事务，然后以正确的顺序创建所有对象：从密钥开始，然后是凭据和数据源，最后是我们的三个表。'
  raw: '## External Tables


    Querying a Big Data Cluster using T-SQL happens through *external tables* , a
    concept that was introduced in SQL Server 2016 with the first appearance of PolyBase.


    We will start to query our Big Data Cluster by adding some external tables to
    our new empty database BDC_Empty which originally resides in our AdventureWorksLT
    database in Azure.


    To get started, connect to your SQL Server master instance (or any other SQL Server
    2019 instance with PolyBase enabled) through Azure Data Studio as shown in Figure
    [5-1](#480532_2_En_5_Chapter.xhtml#Fig1).


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig1_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Connection to the Master Instance


    Your Connection type will be Microsoft SQL Server. The server will be the IP (or
    DNS name) of your server (potentially adding the name of the instance if you used
    one) and the port of the instance (separated by a comma), unless it’s a local
    installation that runs on the standard port 1433.


    Expand your Connection, Databases, the BDC_Empty database, as well as the tables
    in it (Figure [5-2](#480532_2_En_5_Chapter.xhtml#Fig2)).


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig2_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Empty database in ADS


    As expected, there are none so far. Let’s change that!


    If you right-mouse-click the database, you will see an option called “Create External
    Table.” This will open up the corresponding wizard.


    In the first step, it will ask you to confirm the database in which you want the
    external tables to be created as well as to choose a data source type. At this
    point, the wizard (Figure [5-3](#480532_2_En_5_Chapter.xhtml#Fig3)) supports SQL
    Server and Oracle; all other sources except CSV files (which have their own wizard)
    need to be scripted manually.


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig3_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig3_HTML.jpg)


    Figure 5-3


    External Table Wizard in ADS – Select a Data Source


    Select “SQL Server” and click Next.


    In the next dialog (Figure [5-4](#480532_2_En_5_Chapter.xhtml#Fig4)), the wizard
    will ask you to set a master key password for this database. This is required,
    as we’ll store credentials in the database which need to be encrypted. If you
    run the wizard on a database that already has a master key password, this step
    will be skipped.


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig4_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig4_HTML.jpg)


    Figure 5-4


    External Table Wizard in ADS – Create Database Master Key


    Enter and confirm a password and click Next.


    The next screen (Figure [5-5](#480532_2_En_5_Chapter.xhtml#Fig5)) asks you for
    a name (an alias) for your connection, the connection’s server name, as well as
    the database name. You can also use select an existing connection, if you’ve configured
    it previously.


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig5_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig5_HTML.jpg)


    Figure 5-5


    External Table Wizard in ADS – connection and credentials


    In addition, you are provided with a list of credentials that already exist (if
    any) as well as the option to create a new credential.


    Use “AW” for your data source name as well as the “New Credential Name,” AdventureWorks
    as your Database Name, and provide the Server Name, Username, and Password that
    you’ve configured in the previous step. Click Next.


    The wizard will now load all the tables and views in the source database which
    you can expand and browse as shown in Figure [5-6](#480532_2_En_5_Chapter.xhtml#Fig6).


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig6_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig6_HTML.jpg)


    Figure 5-6


    External Table Wizard in ADS – object mapping


    You can either select the whole database, all tables or all views, or a variable
    number of single objects.


    You won’t be able to change any column definitions and you will always have to
    “create” all columns that exist within the source. As no data is actually moved
    but is only a reference to a foreign schema, this is not an issue.


    The only two things that can be changed (in the upper-right section of the screen
    as shown in Figure [5-7](#480532_2_En_5_Chapter.xhtml#Fig7)) are the target schema
    and the target table name, as you may want to create all external tables in a
    separate schema or add a prefix to them.


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig7_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig7_HTML.jpg)


    Figure 5-7


    External Table Wizard in ADS – table mapping


    For now, pick the tables Address, Customer, and CustomerAddress and leave all
    other tables unticked as well as all settings unchanged. Click Next.


    You have reached the last step, which is a summary as shown in Figure [5-8](#480532_2_En_5_Chapter.xhtml#Fig8).


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig8_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig8_HTML.jpg)


    Figure 5-8


    External Table Wizard in ADS – Summary


    You can now choose to either generate a script or simply create all Objects from
    the wizard.


    Let us take a look at the script (Listing [5-1](#480532_2_En_5_Chapter.xhtml#PC1)),
    so click “Generate Script” and then “Cancel” to close the wizard. You will see
    the script which will start a transaction and then create all the objects in the
    right order, starting with the key, followed by the credential and the data source
    and finally our three tables.'
