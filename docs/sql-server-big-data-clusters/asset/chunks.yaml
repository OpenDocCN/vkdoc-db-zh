  trans: '

    # 数据框执行


    在本章中，我多次提到数据框只是对您导入数据的逻辑表示。在数据框的底层，实际的物理数据存储在大数据集群的 Spark 节点上。因为数据框是一种逻辑表示，所以处理数据框内的数据或修改数据框本身的操作方式可能与您的预期有所不同。


    Spark 在处理任何命令之前，会使用一种称为“惰性求值”的方法。就 Spark 处理而言，惰性求值的基本含义是，Spark 会延迟对数据框执行几乎所有操作，直到触发一个动作。这些操作被称为转换，例如连接数据框。我们在
    Spark 数据框上执行的每个转换都会被添加到一个执行计划中，但不会直接执行。执行计划只会在针对数据框执行动作时才会运行。动作包括诸如 `count()`
    或 `top()` 之类的操作。


    简单来说，我们对数据框执行的所有转换，如连接、排序等，都会以执行计划的形式添加到转换列表中。每当我们在数据框上执行像 `count()` 这样的动作时，执行计划就会被处理，并显示
    `count()` 的结果。


    从性能角度来看，Spark 使用的惰性求值模型在处理大型数据集时非常有效。通过将转换分组在一起，执行所需操作所需的数据遍历次数更少。此外，将转换分组在一起还为优化创造了空间。如果
    Spark 知道需要对数据执行的所有操作，它就可以决定执行最终结果所需动作的最佳方法，也许某些操作可以避免，或者可以将其他操作合并在一起。


    在我们的 PySpark notebook 内部，我们可以非常轻松地使用 `explain()` 命令查看执行计划。在清单 6-39 的示例中，我们将把航班和机场信息导入两个独立的数据框，并查看其中一个数据框的执行计划（图
    6-40）。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig40_HTML.jpg](img/480532_2_En_6_Fig40_HTML.jpg)


    图 6-40：新导入数据框的执行计划


    ```python

    # 如果尚未导入，请再次导入航班和航空公司数据

    df_flights = spark.read.format(''csv'').options(header=''true'', inferSchema="true").load(''/Flight_Delays/flights.csv'')

    df_airlines = spark.read.format(''csv'').options(header=''true'', inferSchema="true").load(''/Flight_Delays/airlines.csv'')

    # 与 SQL Server 类似，Spark 使用执行计划，您可以通过 .explain() 查看

    df_flights.explain()

    清单 6-39：解释单表数据框的执行计划

    ```


    如图 6-40 所示，目前只有一个操作，即 FileScan，它负责将 CSV 内容读取到 `df_flights` 数据框中。事实上，当我们执行该命令时，数据并未加载到数据框中；但每当我们执行动作以触发实际加载数据时，它将是执行计划中的第一步。


    为了展示执行计划发生的变化，我们将把之前创建的两个数据框连接在一起（清单 6-40）并查看该计划（图 6-41）。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig41_HTML.jpg](img/480532_2_En_6_Fig41_HTML.jpg)


    图 6-41：数据框连接的执行计划


    ```python

    # 让我们再次连接两个数据框，看看计划发生了什么变化

    from pyspark.sql.functions import *

    df_flightinfo = df_flights.join(df_airlines, df_flights.AIRLINE == df_airlines.IATA_CODE,
    how="inner").drop(df_flights.AIRLINE)

    df_flightinfo.explain()

    清单 6-40：解释多表数据框的执行计划

    ```


    从执行计划中，我们可以看到两个 FileScan 操作，它们将读取两个源 CSV 文件的内容到各自的数据框中。然后我们可以看到，Spark 决定基于我们在前面代码中提供的关键列，对两个数据框执行哈希连接。


    再次强调，我们针对数据框执行的动作并未实际执行。我们可以通过执行一个简单的 `count()` 动作（清单 6-41）来触发执行。


    ```python

    # 即使我们连接了数据框并看到这反映在执行计划中，

    # 该计划也尚未被执行。

    # 执行计划仅在执行 count() 或 top() 等动作时才会执行。

    df_flightinfo.count()

    清单 6-41：执行一个动作以运行执行计划

    ```


    执行计划仍将附加在数据框上，我们随后执行的任何转换都将被添加到其中。无论何时我们在后续时间点执行动作，执行计划连同其包含的所有转换都将被执行。

    '
- fmt: '## Data Frame Caching


    One method to optimize the performance of working with data frames is to cache
    them. By caching a data frame, we place it inside the memory of the Spark worker
    nodes and thus avoid the cost of reading the data from disk whenever we perform
    an action against a data frame. When you need to cache a data frame is depended
    on a large number of factors, but generally speaking whenever you perform multiple
    actions against a data frame in a single script, it is often a good idea to cache
    the data frame to speed up performance of subsequent actions.


    We can retrieve information about whether or not our data frame is cached by calling
    the `storageLevel` function as shown in Figure 6-42 and Listing 6-42.


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig42_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig42_HTML.jpg)

    *Figure 6-42: Caching information of the `df_flightinfo` data frame*


    ```

    df_flightinfo.storageLevel

    ```

    *Listing 6-42: Retrieve the data frame’s storage level*


    The function returns a number of Boolean values on the level of caching that is
    active for this data frame: `Disk`, `Memory`, `OffHeap`, and `Deserialized`. By
    default, whenever we cache a data frame, it will be cached to both `Disk` and
    `Memory`.


    As you can see in Figure 6-43, the `df_flightinfo` data frame is not cached at
    this point. We can change that by calling the `cache()` function as shown in the
    code in Listing 6-43.


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig43_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig43_HTML.jpg)

    *Figure 6-43: Caching information of the `df_flightinfo` data frame*


    ```python

    # To cache our data frame, we just have to use the .cache() function

    # The default cache level is Disk and Memory

    df_flightinfo.cache()

    df_flightinfo.storageLevel

    ```

    *Listing 6-43: Enable caching on a data frame*


    If we look at the results of the `storageLevel` function, shown in Figure 6-43,
    we can see the data frame is now cached.


    Even though the `storageLevel` function returns that the data frame is cached,
    it actually isn’t yet. We still need to perform an action before the actual data
    that makes up the data frame is retrieved and can be cached. One example of an
    action is a `count()`, which is shown in the code of Listing 6-44.


    ```python

    # Even though we get info back that the data frame is cached, we have to

    # perform an action before it actually is cached

    df_flightinfo.count()

    ```

    *Listing 6-44: Initialize cache by performing a count on the data frame*


    Besides the `storageLevel()` command which returns limited information about the
    caching of a data frame, we can expose far more detail through the Yarn portal.


