- fmt: '## Plotting Graphs


    So far, we have mostly dealt with results that are returned in a text like format
    whenever we execute a piece of code inside our PySpark notebook. However, when
    performing tasks like data exploration, it is often far more useful to look at
    the data in a more graphical manner. For instance, plotting histograms of your
    data frame can provide a wealth of information regarding the distribution of your
    data, while a scatter plot can help you visually understand how different columns
    can correlate with each other.


    Thankfully, we can easily install and manage packages through Azure Data Studio
    that can help us plot graphs of the data that is stored inside our Spark cluster
    and display those graphs inside notebooks. That’s not to say that plotting graphs
    of data that is stored inside data frames is easy. As a matter of fact, there
    are a number of things we need to consider before we can start plotting our data.


    The first, and most important one, is that a data frame is a logical representation
    of our data. The actual, physical data itself is distributed across the worker
    nodes that make up our Spark cluster. This means that if we want to plot data
    through a data frame, things get complex very fast since we need to combine the
    data from the various nodes into a single dataset on which we can create our graph.
    Not only would this lead to very bad performance since we are basically removing
    the distributed nature of our data, but it can also potentially lead to errors
    since we would need to fit all of our data inside the memory of a single node.
    While these issues might not occur on small datasets, the larger your dataset
    gets, the faster you will run into these issues.


    To work around these problems, we usually resort to different methods of analyzing
    the data. For instance, instead of analyzing the entire dataset, we can draw a
    sample from the dataset, which is a representation of the dataset as a whole,
    and plot our graphs on this smaller sample dataset. Another method can be to filter
    out only the data that you need, and perhaps do some calculations on it in advance,
    and save that as a separate, smaller, dataset before plotting it.


    Whichever method you choose to create a smaller dataset for graphical exploration,
    one thing we will be required to do is to bring the dataset to our main Spark
    master node on which we submit our code. The Spark master node needs to be able
    to load the dataset in memory, meaning that the master node needs enough physical
    memory to load the dataset and not run out-of-memory and crash. One way we can
    do this is by converting our Spark data frame to a Pandas data frame. Pandas ,
    which is an abbreviation for `pan`el `da`ta, is a term that is used in the world
    of statistics to describe multidimensional datasets. Pandas is a Python library
    written for data analysis and manipulation, and if you have ever done anything
    with data inside Python, you are bound to have worked with it. Pandas also brings
    in some plotting capabilities by using the `matplotlib` library . While Pandas
    is, by default, included inside the libraries of Big Data Clusters, `matplotlib`
    isn’t. The installation of the `matplotlib` package is however very straightforward
    and easy to achieve by using the "Manage Packages" option inside a notebook that
    is connected to your Big Data Cluster (Figure [6-32](#480532_2_En_6_Chapter.xhtml#Fig32)).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig32_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig32_HTML.jpg)


    Figure 6-32


    Manage Packages option inside the notebook header


    After clicking the Manage Packages button, we can see what packages are already
    installed and are presented an option to install additional packages through the
    “Add new” tab (Figure [6-33](#480532_2_En_6_Chapter.xhtml#Fig33)).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig33_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig33_HTML.jpg)


    Figure 6-33


    Manage Packages


    In this case we are going to install the `matplotlib` packages so we can work
    through the examples further on in this chapter. In Figure [6-34](#480532_2_En_6_Chapter.xhtml#Fig34)
    I searched for the `matplotlib` package inside the Add new packages tab and selected
    the latest stable build of `matplotlib` currently available.


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig34_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig34_HTML.jpg)


    Figure 6-34


    Matplotlib package installation


    After selecting the package and the correct version, you can click the “Install”
    button to perform the installation of the package unto your Big Data Cluster.
    The installation process is visible through the “TASKS” console at the bottom
    area of Azure Data Studio as shown in Figure [6-35](#480532_2_En_6_Chapter.xhtml#Fig35).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig35_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig35_HTML.jpg)


    Figure 6-35


    Matplotlib installation task


    After installing the `matplotlib` library, we are ready to create some graphs
    of our data frames!


    The first thing we need to do when we want to plot data from a data frame is to
    convert the data frame to a Pandas data frame. This removes the distributed nature
    of the Spark data frame and creates a data frame in-memory of the Spark master
    node. Instead of converting an existing data frame, I used a different method
    to get data inside our Pandas data frame. To create some more interesting graphs,
    I read data from a CSV file that is available on a GitHub repository and load
    that into the Pandas data frame. The dataset itself contains a wide variety of
    characteristics of cars, including the price, and is frequently used as a machine
    learning dataset to predict the price of a car based on characteristics like weight,
    horsepower, brand, and so on.


    Another thing that I would like to point out is the first line of the example
    code shown in Listing [6-34](#480532_2_En_6_Chapter.xhtml#PC34). The `%matplotlib
    inline` command needs to be the first command inside a notebook cell if you want
    to return graphs. This command is a so-called “magic” command that influences
    the behavior of the `matplotlib` library to return the graphs. If we do not include
    this command, the Pandas library will return errors when asked to plot a graph
    and we would not see the image itself.


    ```python

    %matplotlib inline

    import pandas as pd

    # Create a local Pandas data frame from a csv through a URL

    pd_data_frame = pd.read_csv("https://github.com/Evdlaar/Presentations/raw/master/Advanced%20Analytics%20in%20the%20Cloud/automobiles.csv")

    ```

    Listing 6-34

