    ## 在 Spark 数据帧上使用 SQL 查询


    到目前为止，在本章中我们已经使用了与数据帧处理相关的函数来执行操作，例如选择特定列、排序和分组数据。我们在数据帧内部处理数据的另一个选项是直接在 Spark
    中通过 SQL 查询来访问它。对于熟悉编写 SQL 代码的人来说，这种方法可能比学习所有之前介绍的新函数（以及我们尚未涉及的更多函数）要简单得多。


    在我们可以针对数据帧编写 SQL 查询之前，必须先将其注册为一个表结构，这可以通过清单 6-28 中的代码完成。


    ```python

    # 将 df_flightinfo 数据帧注册为（临时）表，以便我们可以对其运行 SQL 查询

    df_flightinfo.registerTempTable("FlightInfoTable")

    ```


    *清单 6-28 注册一个临时表*


    既然我们已经将数据帧注册为（临时）表，就可以使用 `sqlContext` 命令（清单 6-29）针对它运行 SQL 查询了，该命令会调用 Spark 引擎中包含的
    Spark SQL 模块（图 6-27）。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig27_HTML.jpg](img/480532_2_En_6_Fig27_HTML.jpg)


    *图 6-27 使用 Spark SQL 查询的 FlightInfoTable 前十行*


    ```python

    # 从 FlightInfoTable 中选择前十个选定列的数据行

    sqlContext.sql("SELECT FLIGHT_NUMBER, ORIGIN_AIRPORT, DESTINATION_AIRPORT, ELAPSED_TIME
    FROM FlightInfoTable").show(10)

    ```


    *清单 6-29 使用 SQL 选择表的前十行*


    正如你在前面的示例中所见，我们执行了一个简单的 SELECT SQL 查询，指定了想要返回的若干列。Spark SQL 模块处理 SQL 查询，并针对我们之前创建的表结构执行它。就像我们之前展示的示例一样，我们仍然需要提供
    `.show()` 函数以表格形式返回结果。


    几乎所有你使用 SQL 代码能做的事情，在 Spark 中同样可以应用。例如，上一节中的最后一个示例（清单 6-30）展示了如何对数据进行分组并计算平均值。我们可以使用
    SQL 查询进行相同的处理，如图 6-28 中的示例所示。


