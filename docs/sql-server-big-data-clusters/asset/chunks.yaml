    您的集群现已完全部署并准备就绪！


    ### Azure Kubernetes Service (AKS)


    另一个直接部署集群的方法是使用 Azure Kubernetes Service，其中 Kubernetes 集群在 Microsoft Azure 云中设置并提供。虽然部署是从任何机器（您的本地
    PC 或 VM）启动和控制的，但集群本身将在 Azure 中运行，因此这意味着部署需要一个 Azure 帐户，并且会在您的 Azure 订阅上产生费用。


    您可以通过 Azure Data Studio 中的向导或通过一个名为 `azdata` 的工具（在 Linux 上部署前一个集群的脚本也调用了它）手动部署。两种方法都需要先安装一些先决条件。一个完整的安装实际上需要几个工具和助手：


    *   Python

    *   Curl 和 SQL Server 命令行工具，这样我们才能与集群通信并向其上传数据。

    *   Kubernetes CLI

    *   `azdata`，这将创建、维护和删除大数据集群。

    *   Notepad++ 和 7Zip，这些不是实际要求，但如果您想调试安装，可能会得到一个包含可能很大的文本文件的 tar.gz 文件。Windows
    默认不处理这些。


    列表 3-7 中的脚本会将这些安装到您的本地机器（或您运行脚本的任何机器）上，因为部署是从这里控制和触发的。我们将通过 Chocolatey 安装这些先决条件。


    ```

    choco install python3 -y

    choco install sqlserver-cmdlineutils -y

    $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";"
    + [System.Environment]::GetEnvironmentVariable("Path","User")

    python -m pip install --upgrade pip

    python -m pip install requests

    python -m pip install requests --upgrade

    choco install curl -y

    choco install kubernetes-cli -y

    choco install notepadplusplus -y

    choco install 7zip -y

    choco install visualcpp-build-tools -y

    pip3 install kubernetes

    pip3 install -r https://aka.ms/azdata

    列表 3-7

    大数据集群先决条件的安装脚本

    ```


    虽然相关供应商显然为大多数工具提供了可视化/手动安装程序，但脚本化方法使整个体验变得容易得多。


    此外，由于我们想使用脚本部署到 Azure，我们需要列表 3-8 中所示的 `azure-cli` 包，以便能够连接到我们的 Azure 订阅。


    ```

    choco install azure-cli -y

    列表 3-8

    安装 azure-cli

    ```


    虽然您技术上可以在 Azure 门户中或通过手动 PowerShell 脚本准备所有内容（我们需要一个资源组、Kubernetes 集群等），但有一个更简单的方法：从
    [`https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/deployment/aks`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/deployment/aks)
    获取 Python 脚本，它会自动为您处理整个过程和设置。


    将脚本下载到您的桌面或其他合适的位置，并打开命令提示符。导航到保存脚本的文件夹。您也可以如列表 3-9 所示使用命令提示符下载。


    ```

    curl --output deploy-sql-big-data-aks.py https://raw.githubusercontent.com/microsoft/sql-server-samples/master/samples/features/sql-big-data-cluster/deployment/aks/deploy-sql-big-data-aks.py

    列表 3-9

    下载部署脚本

    ```


    当然，您也可以根据需要修改和审查脚本，例如，将一些参数（如 VM 大小）设为静态而非变量，或更改某些值的默认值。


    首先，我们需要登录 Azure，这将使用列表 3-10 中所示的命令完成。


    ```

    az login

    列表 3-10

    从命令提示符触发登录到 azure

    ```'
- fmt: "# 在Azure上部署\n\n一个网站将打开；使用你的Azure凭据登录，如图[3-21](#480532_2_En_3_Chapter.xhtml#Fig21)所示。\n\
    \n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig21_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig21_HTML.jpg)\n\
    \n**图 3-21** Azure登录屏幕\n\n网站将确认你已登录；你可以关闭浏览器，如图[3-22](#480532_2_En_3_Chapter.xhtml#Fig22)所示。\n\
    \n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig22_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig22_HTML.jpg)\n\
    \n**图 3-22** Azure登录确认\n\n你的命令提示符，如图[3-23](#480532_2_En_3_Chapter.xhtml#Fig23)所示，显示了与你刚使用的凭据关联的所有订阅。复制你要使用的订阅ID并执行Python脚本，该脚本将询问从订阅ID到Kubernetes集群中节点数量的所有信息。\n\
    \n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig23_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig23_HTML.jpg)\n\
    \n**图 3-23** Python部署脚本中的参数输入\n\n脚本现在运行所有必需的步骤。同样，这可能需要几分钟到几小时，具体取决于虚拟机大小、节点数量等因素。\n\
    \n脚本会像在Linux上安装时的脚本一样，在过程中进行报告。它使用了相同的工具(`azdata`)，因此创建实际大数据集群时的输出非常相似，如图[3-24](#480532_2_En_3_Chapter.xhtml#Fig24)所示。\n\
    \n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig24_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig24_HTML.jpg)\n\
    \n**图 3-24** Python部署脚本的输出\n\n脚本还会使用`azdata bdc config`来创建你的JSON文件。\n\n由于此SQL\
    \ Server 2019大数据集群是部署到Azure上的，与本地安装时可以直接使用`localhost`地址访问不同，你将需要有关安装的IP地址和端口信息。因此，IP地址和端口会在最后提供，如图[3-25](#480532_2_En_3_Chapter.xhtml#Fig25)所示。\n\
    \n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig25_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig25_HTML.jpg)\n\
    \n**图 3-25** Python部署脚本的最终输出（包括IP地址）\n\n如果你忘记了IP地址是什么，可以运行这个简单的脚本，如清单[3-11](#480532_2_En_3_Chapter.xhtml#PC12)所示。\n\
    \n```\nkubectl get service -n \n```\n\n**清单 3-11** 使用`kubectl`检索Kubernetes服务IP\n\
    \n如果你也忘记了集群的名称，试试清单[3-12](#480532_2_En_3_Chapter.xhtml#PC13)。\n\n```\nkubectl\
    \ get namespaces\n```\n\n**清单 3-12** 使用`kubectl`检索Kubernetes命名空间\n\n如果你同时运行多个集群，清单[3-13](#480532_2_En_3_Chapter.xhtml#PC14)中的脚本也可能很有帮助。只需将其保存为`IP.py`，你就可以如图[3-26](#480532_2_En_3_Chapter.xhtml#Fig26)所示运行它。\n\
    \n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig26_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig26_HTML.jpg)\n\
    \n**图 3-26** `IP.py`的输出\n\n```\nCLUSTER_NAME=\"myfirstbigdatacluster\"\nfrom subprocess\
    \ import check_output, CalledProcessError, STDOUT, Popen, PIPE\nimport os\nimport\
    \ getpass\ndef executeCmd (cmd):\nif os.name==\"nt\":\nprocess = Popen(cmd.split(),stdin=PIPE,\
    \ shell=True)\nelse:\nprocess = Popen(cmd.split(),stdin=PIPE)\nstdout, stderr\
    \ = process.communicate()\nif (stderr is not None):\nraise Exception(stderr)\n\
    print(\"\")\nprint(\"SQL Server big data cluster connection endpoints: \")\nprint(\"\
    SQL Server master instance:\")\ncommand=\"kubectl get service master-svc-external\
    \ -o=custom-columns=\"\"IP:.status.loadBalancer.ingress[0].ip,PORT:.spec.ports[0].port\"\
    \" -n \"+CLUSTER_NAME\nexecuteCmd(command)\nprint(\"\")\nprint(\"HDFS/KNOX:\"\
    )\ncommand=\"kubectl get service gateway-svc-external -o=custom-columns=\"\"IP:status.loadBalancer.ingress[0].ip,PORT:.spec.ports[0].port\"\
    \" -n \"+CLUSTER_NAME\nexecuteCmd(command)\nprint(\"\")\nprint(\"Cluster administration\
    \ portal (https://:):\")\ncommand=\"kubectl get service mgmtproxy-svc-external\
    \ -o=custom-columns=\"\"IP:status.loadBalancer.ingress[0].ip,PORT:.spec.ports[0].port\"\
    \" -n \"+CLUSTER_NAME\nexecuteCmd(command)\nprint(\"\")\n```\n\n**清单 3-13** 检索大数据集群端点的Python脚本\n\
    \n你已经完成了！你在Azure Kubernetes服务中的大数据集群现已启动并运行。\n\n> **注意** 无论你是否使用，这个集群都会根据虚拟机数量及其大小产生费用，所以最好不要让它闲置着！"
  raw: "A website will open; log on using your Azure credentials as shown in Figure\
    \ [3-21](#480532_2_En_3_Chapter.xhtml#Fig21).\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig21_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig21_HTML.jpg)\n\
    \nFigure 3-21\n\nAzure logon screen\n\nThe website will confirm that you are logged\
    \ on; you can close the browser as shown in Figure [3-22](#480532_2_En_3_Chapter.xhtml#Fig22).\n\
    \n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig22_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig22_HTML.jpg)\n\
    \nFigure 3-22\n\nAzure logon confirmation\n\nYour command prompt, as shown in\
    \ Figure [3-23](#480532_2_En_3_Chapter.xhtml#Fig23), shows all subscriptions linked\
    \ to the credentials you just used. Copy the ID of the subscription you want to\
    \ use and execute the Python script, which will ask for everything ranging from\
    \ subscription ID to the number of nodes inside the Kubernetes cluster.\n\n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig23_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig23_HTML.jpg)\n\
    \nFigure 3-23\n\nInput of parameters in Python deployment script\n\nThe script\
    \ now runs through all the required steps. Again, this can take from a couple\
    \ of minutes to hours, depending on the size of VM, number of nodes, and so on.\n\
    \nThe script will report back in between just like the script during the installation\
    \ on Linux. It is using the same tool (azdata), so the output when creating the\
    \ actual Big Data Cluster is very similar as you can see in Figure [3-24](#480532_2_En_3_Chapter.xhtml#Fig24).\n\
    \n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig24_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig24_HTML.jpg)\n\
    \nFigure 3-24\n\nOutput of Python deployment script\n\nThe script will also use\
    \ *azdata bdc config* to create your JSON file.\n\nAs this SQL Server 2019 Big\
    \ Data Cluster is being deployed to Azure, unlike during your local install which\
    \ you could just reach it using the localhost address, you will need information\
    \ about the IP addresses and ports of the installation. Therefore, IP addresses\
    \ and ports are provided at the end as shown in Figure [3-25](#480532_2_En_3_Chapter.xhtml#Fig25).\n\
    \n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig25_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig25_HTML.jpg)\n\
    \nFigure 3-25\n\nFinal output of Python deployment script including IP addresses\n\
    \nIf you ever forget what your IPs were, you can run this simple script as shown\
    \ in Listing [3-11](#480532_2_En_3_Chapter.xhtml#PC12).\n\n```\nkubectl get service\
    \ -n \nListing 3-11\nRetrieve Kubernetes service IPs using kubectl\n```\n\nAnd\
    \ if you forgot the name of your cluster as well, try Listing [3-12](#480532_2_En_3_Chapter.xhtml#PC13).\n\
    \n```\nkubectl get namespaces\nListing 3-12\nRetrieve Kubernetes namespaces using\
    \ kubectl\n```\n\nIf you are running more than one cluster at a time, the script\
    \ in Listing [3-13](#480532_2_En_3_Chapter.xhtml#PC14) might also become helpful.\
    \ Just save it as IP.py and you can run it as shown in Figure [3-26](#480532_2_En_3_Chapter.xhtml#Fig26).\n\
    \n![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig26_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig26_HTML.jpg)\n\
    \nFigure 3-26\n\nOutput of IP.py\n\n```\nCLUSTER_NAME=\"myfirstbigdatacluster\"\
    \nfrom subprocess import check_output, CalledProcessError, STDOUT, Popen, PIPE\n\
    import os\nimport getpass\ndef executeCmd (cmd):\nif os.name==\"nt\":\nprocess\
    \ = Popen(cmd.split(),stdin=PIPE, shell=True)\nelse:\nprocess = Popen(cmd.split(),stdin=PIPE)\n\
    stdout, stderr = process.communicate()\nif (stderr is not None):\nraise Exception(stderr)\n\
    print(\"\")\nprint(\"SQL Server big data cluster connection endpoints: \")\nprint(\"\
    SQL Server master instance:\")\ncommand=\"kubectl get service master-svc-external\
    \ -o=custom-columns=\"\"IP:.status.loadBalancer.ingress[0].ip,PORT:.spec.ports[0].port\"\
    \" -n \"+CLUSTER_NAME\nexecuteCmd(command)\nprint(\"\")\nprint(\"HDFS/KNOX:\"\
    )\ncommand=\"kubectl get service gateway-svc-external -o=custom-columns=\"\"IP:status.loadBalancer.ingress[0].ip,PORT:.spec.ports[0].port\"\
    \" -n \"+CLUSTER_NAME\nexecuteCmd(command)\nprint(\"\")\nprint(\"Cluster administration\
    \ portal (https://:):\")\ncommand=\"kubectl get service mgmtproxy-svc-external\
    \ -o=custom-columns=\"\"IP:status.loadBalancer.ingress[0].ip,PORT:.spec.ports[0].port\"\
    \" -n \"+CLUSTER_NAME\nexecuteCmd(command)\nprint(\"\")\nListing 3-13\nPython\
    \ script to retrieve endpoints of a Big Data Cluster\n```\n\nYou’re done! Your\
    \ Big Data Cluster in Azure Kubernetes Service is now up and running.\n\nNote Whether\
    \ you use it or not, this cluster will accumulate cost based on the number of\
    \ VMs and their size so it’s a good idea not to leave it idling around!"
