    Azure Kubernetes Service (AKS) 集群、现有的 AKS 集群或现有的 `kubeadm` 集群。如果你计划部署到现有集群，Kubernetes
    上下文/连接需要存在于你的 Kubernetes 配置中。如果 Kubernetes 集群不是在同一台机器上创建的，那么它很可能还缺失。在这种情况下，你可以将
