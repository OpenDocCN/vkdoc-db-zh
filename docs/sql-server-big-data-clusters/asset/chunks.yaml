- fmt: '## Working with Spark Data Frames


    现在我们有了数据，也有一个 notebook，我们要做的是将 CSV 数据加载到一个数据框（data frame）中。可以将数据框想象为在 Spark 内部创建的一种类似表格的结构。从概念上讲，数据框等同于
    SQL Server 中的表格，但与通常存储在单台计算机上的表格不同，数据框由分布在（潜在地）Spark 集群中所有节点上的数据组成。


    将“airports.csv”文件中的数据加载到 Spark 数据框中的代码见清单 [6-3](#480532_2_En_6_Chapter.xhtml#PC3)。您可以将代码复制到
    notebook 的一个单元格中。本章中展示的所有示例代码最好作为 notebook 中独立的单元格使用。包含所有代码的完整示例笔记本可在本书的 GitHub
    页面上找到。


    ```python

    # Import the airports.csv file from HDFS (PySpark)

    df_airports = spark.read.format(''csv'').options(header=''true'', inferSchema="true").load(''/Flight_Delays/airports.csv'')

    ```


    **清单 6-3** 将 CSV 数据导入数据框


    如果一切顺利，您应该会得到一个包含来自 airports.csv 文件数据的 Spark 数据框。


    从示例代码中可以看出，我们向 `spark.read.format` 命令提供了许多选项。最重要的一个是我们正在读取的文件类型；在我们的例子中，这是一个 CSV
    文件。我们提供的其他选项告诉 Spark 如何处理该 CSV 文件。通过设置选项 `header=''true''`，我们指定 CSV 文件有一个包含列名的标题行。选项
    `inferSchema=''true''` 帮助我们自动检测每一列中使用的数据类型。如果我们不指定此选项，或者将其设置为 false，所有列都将被设置为字符串数据类型，而不是我们期望的数据类型（例如，数值数据的整数数据类型）。如果您不使用
    `inferSchema=''true''` 选项，或者 `inferSchema` 配置了错误的数据类型，则必须在导入 CSV 文件之前定义模式，并将其作为选项提供给
    `spark.read.format` 命令，如清单 [6-4](#480532_2_En_6_Chapter.xhtml#PC4) 的示例代码所示。


    ```python

    # Manually set the schema and supply it to the spark.read function

    # We need to import the pyspark.sql.types library

    from pyspark.sql.types import *

    df_schema = StructType([

    StructField("IATA_CODE", StringType(), True),

    StructField("AIRPORT", StringType(), True),

    StructField("CITY", StringType(), True),

    StructField("STATE", StringType(), True),

    StructField("COUNTRY", StringType(), True),

    StructField("LATITUDE", DoubleType(), True),

    StructField("LONGITUDE", DoubleType(), True)

    ])

    # With the schema declared, we can supply it to the spark.read function

    df_airports = spark.read.format(''csv'').options(header=''true'').schema(df_schema).load(''/Flight_Delays/airports.csv'')

    ```


    **清单 6-4** 定义模式并提供给 `spark.read.format`


    如果这是您对 Spark 集群执行的第一个 notebook 命令，您将收到一些关于创建 Spark 会话的信息，如图 [6-4](#480532_2_En_6_Chapter.xhtml#Fig4)
    所示。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig4_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig4_HTML.jpg)


    **图 6-4** `spark.read.format` 的输出


    Spark 会话（Spark session）是与 Spark 函数交互的入口点。过去，我们必须定义一个 Spark 上下文（Spark context）来连接到
    Spark 集群，并且根据我们需要的功能，我们必须为该特定功能（如 Spark SQL 或流功能）创建单独的上下文。从 Spark 2.0 开始，Spark
    会话作为入口点可用，它默认包含了过去我们必须为其创建单独上下文的所有各种功能，使使用它们变得更加容易。当我们在 notebook 中运行第一个针对 Spark
    集群的命令时，需要创建一个 Spark 会话，以便我们能够向集群发送命令。运行后续命令将使用最初创建的 Spark 会话。


    现在我们的 CSV 数据已经加载到数据框中，我们可以运行各种命令来获取有关数据框的信息。例如，清单 [6-5](#480532_2_En_6_Chapter.xhtml#PC5)
    中的示例返回数据框中的行数。


    ```python

    # Display the amount of rows inside the df_airports data frame

    df_airports.count()

    ```


    **清单 6-5** 检索数据框的行数


    结果应该是 322 行，如图 [6-5](#480532_2_En_6_Chapter.xhtml#Fig5) 所示，它返回了行数。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig5_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig5_HTML.jpg)


    **图 6-5** 行数输出


    另一个非常有用的命令是返回数据框的模式（schema）。这向我们展示了哪些列组成了数据框以及它们的数据类型。清单 [6-6](#480532_2_En_6_Chapter.xhtml#PC6)
    中的代码获取 `df_airports` 数据框的模式并将其作为输出返回（图 [6-6](#480532_2_En_6_Chapter.xhtml#Fig6)）。


    ```python

    # Display the schema of the df_flights data frame (PySpark)

    df_airports.printSchema()

    ```


    **清单 6-6** 检索数据框的模式


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig6_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig6_HTML.jpg)


    **图 6-6** `df_airports` 数据框的模式输出


    现在我们知道了数据框的模式，让我们从中返回一些数据。一种简单的方法是使用 `head()` 函数。此函数将从数据框中返回前 *n* 行。在以下示例中，我们将返回数据框的第一行。命令的输出显示在示例下方（清单
    [6-7](#480532_2_En_6_Chapter.xhtml#PC7) 后面是图 [6-7](#480532_2_En_6_Chapter.xhtml#Fig7)）。


    ```python

    # Let''s return the first row

    df_airports.head(1)

    ```


    **清单 6-7** 检索数据框的第一行


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig7_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig7_HTML.jpg)


    **图 6-7** `df_airports` 数据框的第一行


    如图 [6-7](#480532_2_En_6_Chapter.xhtml#Fig7) 所示，默认情况下结果不是以类似表格的结构返回的。这是因为 `head()`
    仅以类似字符串的结构返回输出。


    要从数据集中获取数据时以表格结构返回，您可以使用 `show()` 函数，如下面的示例所示。`show()` 接受一个整数作为参数，以指示应返回多少行。在示例中（清单
    [6-8](#480532_2_En_6_Chapter.xhtml#PC8)），我们提供了一个值为 10，表示我们希望该函数返回前十行（图 [6-8](#480532_2_En_6_Chapter.xhtml#Fig8)）。


    ```python

    # Select top ten rows, return as a table structure

    df_airports.show(10)

    ```


    **清单 6-8** 以表格结构检索数据框的前十行


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig8_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig8_HTML.jpg)


    **图 6-8** 显示 `df_airports` 数据框的前十行'
  raw: '## Working with Spark Data Frames


    Now that we have access to our data, and we have a notebook, what we want to do
    is load our CSV data inside a data frame. Think of a data frame as a table-like
    structure that is created inside Spark. Conceptually speaking, a data frame is
    equal to a table inside SQL Server, but unlike a table that is generally stored
    on a single computer, a data frame consists of data distributed across (potentially)
    all the nodes inside your Spark cluster.


    The code to load the data inside the “airports.csv” file into a Spark data frame
    can be seen in Listing [6-3](#480532_2_En_6_Chapter.xhtml#PC3). You can copy the
    code inside a cell of the notebook. All of the example code shown inside this
    chapter is best used as a separate cell inside a notebook. The full example notebook
    that contains all the code is available at this book’s GitHub page.


    ```

    # Import the airports.csv file from HDFS (PySpark)

    df_airports = spark.read.format(''csv'').options(header=''true'', inferSchema="true").load(''/Flight_Delays/airports.csv'')

    Listing 6-3

    Import CSV data into data frame

    ```


    If everything worked, you should end up with a Spark data frame that contains
    the data from the airports.csv file.


    As you can see from the example code, we provided a number of options to the `spark.read.format`
    command . The most important one is the type of file we are reading; in our case
    this is a CSV file. The other options we provide tell Spark how to handle the
    CSV file. By setting the option `header=''true''`, we specify that the CSV file
    has a header row which contains the column names. The option `inferSchema=''true''`
    helps us with automatically detecting what datatypes we are dealing with in each
    column. If we do not specify this option, or set it to false instead, all the
    columns will be set to a string datatype instead of the datatype we would expect
    our data to be (e.g., an integer datatype for numerical data). If you do not use
    the `inferSchema=''true''` option, or inferSchema configures the wrong datatypes,
    you have to define the schema before importing the CSV file and supply it as an
    option to the `spark.read.format` command as shown in the example code of Listing
    [6-4](#480532_2_En_6_Chapter.xhtml#PC4).


    ```

    # Manually set the schema and supply it to the spark.read function

    # We need to import the pyspark.sql.types library

    from pyspark.sql.types import *

    df_schema = StructType([

    StructField("IATA_CODE", StringType(), True),

    StructField("AIRPORT", StringType(), True),

    StructField("CITY", StringType(), True),

    StructField("STATE", StringType(), True),

    StructField("COUNTRY", StringType(), True),

    StructField("LATITUDE", DoubleType(), True),

    StructField("LONGITUDE", DoubleType(), True)

    ])

    # With the schema declared, we can supply it to the spark.read function

    df_airports = spark.read.format(''csv'').options(header=''true'').schema(df_schema).load(''/Flight_Delays/airports.csv'')

    Listing 6-4

    Define schema and supply it to spark.read.format

    ```


    If this was your first notebook command against the Spark cluster, you will get
    some information back regarding the creation of a Spark session as you can see
    in Figure [6-4](#480532_2_En_6_Chapter.xhtml#Fig4).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig4_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Output of spark.read.format


    A Spark session represents your entry point to interact with the Spark functions.
    In the past, we would have to define a Spark context to connect to the Spark cluster,
    and depending on what functionality we needed, we would have to create a separate
    context for that specific functionality (like Spark SQL, or streaming functionalities).
    Starting from Spark 2.0, Spark sessions became available as entry point, and it,
    by default, includes all kinds of different functions that we had to create a
    separate context for in the past, making it easier to work with them. When we
    run the first command inside a notebook against the Spark cluster, a Spark session
    needs to be created so we are able to send commands to the cluster. Running subsequent
    commands will make use of the initially created Spark session.


    Now that we have our CSV data inside a data frame we can run all kind of commands
    to retrieve information about our data frame. For instance, the example of Listing
    [6-5](#480532_2_En_6_Chapter.xhtml#PC5) returns the number of rows that are inside
    the data frame.


    ```

    # Display the amount of rows inside the df_airports data frame

    df_airports.count()

    Listing 6-5

    Retrieve row count of the data frame

    ```


    The result should be 322 rows as shown in Figure [6-5](#480532_2_En_6_Chapter.xhtml#Fig5)
    which returns the number of rows.


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig5_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Output of row count


    Another very useful command is to return the schema of the data frame. This shows
    us which columns make up the data frame and their datatypes. The code of Listing
    [6-6](#480532_2_En_6_Chapter.xhtml#PC6) gets the schema of the `df_airports` data
    frame and returns it as output (Figure [6-6](#480532_2_En_6_Chapter.xhtml#Fig6)).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig6_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Schema output of the df_airports data frame


    ```

    # Display the schema of the df_flights data frame (PySpark)

    df_airports.printSchema()

    Listing 6-6

    Retrieve the schema of the data frame

    ```


    Now that we know the schema of the data frame, let’s return some data from it.
    One easy way to do that is to use the `head()` function. This function will return
    the top *n* rows from the data frame. In the following example, we will return
    the first row of the data frame. The output of the command is shown below the
    example (Listing [6-7](#480532_2_En_6_Chapter.xhtml#PC7) is followed by Figure
    [6-7](#480532_2_En_6_Chapter.xhtml#Fig7)).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig7_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig7_HTML.jpg)


    Figure 6-7


    First row of the df_airports data frame


    ```

    # Let''s return the first row

    df_airports.head(1)

    Listing 6-7

    Retrieve first row of data frame

    ```


    As you can see in Figure [6-7](#480532_2_En_6_Chapter.xhtml#Fig7), the results
    aren’t by default returned in a table-like structure. This is because `head()`
    only returns the output as a string-like structure.


    To return a table structure when getting data from a dataset, you can use the
    `show()` function as shown in the following example. Show() accepts an integer
    as a parameter to indicate how many rows should be returned. In the example (Listing
    [6-8](#480532_2_En_6_Chapter.xhtml#PC8)), we supplied a value of 10, indicating
    we want the top ten rows returned by the function (Figure [6-8](#480532_2_En_6_Chapter.xhtml#Fig8)).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig8_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Show the top ten rows of the df_airports data frame


    ```

    # Select top ten rows, return as a table structure

    df_airports.show(10)

    Listing 6-8

    Retrieve first row of data frame as a table structure

    ```'
