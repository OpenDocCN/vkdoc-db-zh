    We have been focusing on getting data out of the data frame so far. However, there
    might also be situations where you want to remove a row from the data frame, or
    perhaps, update a specific value. Generally speaking, updating values inside Spark
    data frames is not as straightforward as, for instance, writing an UPDATE statement
    in SQL, which updates the value in the actual table. In most situations, updating
    rows inside data frames revolves around creating a sort of mapping data frame
    and joining your original data frame to the mapping data frame and storing that
    as a new data frame. This way your final data frame contains the updates.


    Simply speaking, you perform a selection on the data you want to update (as shown
    in Figure [6-13](#480532_2_En_6_Chapter.xhtml#Fig13)) and return the updated value
    for the row you want to update and save that to a new data frame as shown in the
    example code of Listing [6-13](#480532_2_En_6_Chapter.xhtml#PC13).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig13_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Updated value to Jackson instead of Cody


    ```

    # Update a row

    # We need to import the col and when function from pyspark.sql.functions

    from pyspark.sql.functions import col, when

    # Select the entire data frame but set the CITY value to "Cody" instead of "Jackson"
    where the IATA_CODE = "COD"

    # Store the results in the new df_airports_updated data frame

    df_airports_updated = df_airports.withColumn("CITY", when(col("IATA_CODE") ==
    "COD", "Jackson"))

    # Return the results, filter on IATA_CODE == "COD"

    df_airports_updated = df_airports_updated.filter(df_airports_updated.IATA_CODE
    == ''COD'').show()

    Listing 6-13

    Perform multiple actions on the data frame

    ```


    If we are interested in removing rows the same reasoning applies, we do not physically
    delete rows from the data frame; instead, we perform a selection that does not
    include the rows we want removed and store that as a separate data frame (Figure
    [6-14](#480532_2_En_6_Chapter.xhtml#Fig14) shows the result of using Listing [6-14](#480532_2_En_6_Chapter.xhtml#PC14)).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig14_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig14_HTML.jpg)


    Figure 6-14


    No data is present where IATA_CODE == “COD”


    ```

    # Remove a row

    # Select the entire data frame except where the IATA_CODE = "COD"

    # Store the results in the new df_airports_removed data frame

    df_airports_removed = df_airports.filter(df_airports.IATA_CODE  "COD")

    # Return the results, filter on IATA_CODE == "COD"

    df_airports_removed.filter(df_airports_removed.IATA_CODE == "COD").show()

    Listing 6-14

    Remove a row from a data frame

    ```


    The concept of no deleting or updating the physical data itself but rather working
    through selections to perform update or delete operations (and then store them
    in new data frames) is very important when working with data frames inside Spark
    and has everything to do with the fact that a data frame is only a logical representation
    of the data stored inside your Spark cluster. A data frame behaves more like a
    view to the data stored in one or multiple files inside your Spark cluster. While
    we can filter and modify the way the view returns the data, we cannot modify the
    data through the view itself.


    One final example we want to show before we continue with a number of more advanced
    data frame processing examples is grouping data. Grouping data based on columns
    in a data frame is very useful when you want to perform aggregations or calculations
    based on the data inside the data frame column. For instance, in the following
    example code (Listing [6-15](#480532_2_En_6_Chapter.xhtml#PC15)), we perform a
    count of how many airports a distinct city has in the `df_airports` data frame
    (Figure [6-15](#480532_2_En_6_Chapter.xhtml#Fig15)).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig15_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig15_HTML.jpg)


    Figure 6-15


    Count the number of airports for each unique city'
