    集群内存储数据的逻辑表示这一事实密切相关。数据框的行为更像是对存储在 Spark 集群中一个或多个文件内的数据的视图。虽然我们可以过滤和修改视图返回数据的方式，但我们无法通过视图本身来修改数据。


    在继续介绍一些更高级的数据框处理示例之前，我们想展示的最后一个例子是数据分组。当你想要基于数据框列内的数据执行聚合或计算时，根据数据框中的列对数据进行分组非常有用。例如，在以下示例代码（代码清单
    `6-15`）中，我们计算了 `df_airports` 数据框中每个不同城市拥有的机场数量（图 `6-15`）。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig15_HTML.jpg](img/480532_2_En_6_Fig15_HTML.jpg)


    图 6-15

    计算每个唯一城市的机场数量

    '
- fmt: '```

    # Count the number of airports of each city and sort on the count descending

    df_airports.groupby("City").count().sort(col("count").desc()).show(10)

    ```

