    df_airports_removed = df_airports.filter(df_airports.IATA_CODE  "COD")

    # Return the results, filter on IATA_CODE == "COD"

    df_airports_removed.filter(df_airports_removed.IATA_CODE == "COD").show()

    Listing 6-14

    Remove a row from a data frame

    ```


    不删除或更新物理数据本身，而是通过选择来执行更新或删除操作（然后将它们存储在新数据框中）的概念在使用 Spark 中的数据框时非常重要，这与数据框只是 Spark
    集群内存储数据的逻辑表示这一事实密切相关。数据框的行为更像是对存储在 Spark 集群中一个或多个文件内的数据的视图。虽然我们可以过滤和修改视图返回数据的方式，但我们无法通过视图本身来修改数据。


