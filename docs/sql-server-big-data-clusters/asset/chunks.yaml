    to the URL. If everything processed correctly, you should receive a return message
    that contains the bearer token inside the “access_token” property of the JSON
    response as shown in Figure [8-9](#480532_2_En_8_Chapter.xhtml#Fig9) (we’ve removed
    the contents of the access_token and token_id properties in Figure [8-9](#480532_2_En_8_Chapter.xhtml#Fig9)).


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig9_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig9_HTML.jpg)


    Figure 8-9


    JSON return message that contains the bearer token


    Now that we generated a bearer token, we can use it to actually call the REST
    API of the app itself. The URL of the app REST API is hidden by default and can
    be found in the swagger.json file which we can open by visiting the URL inside
    the “swagger” property that we received when running the `azdata app describe
    --name predictiris -v v1` command.


    When you open the URL (in our case [`https://104.46.56.134:30080/docs/swagger.json`](https://104.46.56.134:30080/docs/swagger.json)),
    you can find a property in the JSON file called “host” as shown in Figure [8-10](#480532_2_En_8_Chapter.xhtml#Fig10).


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig10_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig10_HTML.jpg)


    Figure 8-10


    Host property of the swagger.json file


    Copy or write down the value of the “host” property and start a new session inside
    Postman. Change the request method to “POST” and copy the contents of the “host”
    property inside the request URL field preceding it with HTTPS://. After the port
    number of the URL, we can copy the contents of the “basePath” property shown in
    Figure [8-10](#480532_2_En_8_Chapter.xhtml#Fig10) and, as a last step to make
    the URL complete, add a /run.


    Go to the Authorization tab and this time select the option “Bearer Token” and
    add the token we received in the previous step inside the token field.


    We now have one step left, generate the body content of our REST API call and
    supply the input parameters needed to perform the Iris species prediction. Inside
    Postman, click the Body tab, check the option “raw,” and from the drop-down button,
    select “JSON (application/json).” Copy the contents of the code section in Listing
    [8-11](#480532_2_En_8_Chapter.xhtml#PC11) inside the body textarea to supply the
    input parameters needed for the predictiris app.


    ```

    {

    "PetalLength": 1.4,

    "PetalWidth": 0.2,

    "SepalLength": 5.1,

    "SepalWidth": 3.5

    }

    Listing 8-11

    Input parameters for predictiris app (JSON)

    ```


    With all of these areas filled in, the Postman screen should look like Figure
    [8-11](#480532_2_En_8_Chapter.xhtml#Fig11).


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig11_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig11_HTML.jpg)


    Figure 8-11


    Body of the REST API call to the predictiris app


    Now all that is left to do is to click the “Send” button to send the JSON message
    to the predictiris Big Data Cluster app.


    If everything was configured correctly, we should receive a return message that
    resembles the same output as when we executed the predictiris app using azdata
    containing the predicted probabilities for each species of Iris plant. The return
    message we received can be seen in Figure [8-12](#480532_2_En_8_Chapter.xhtml#Fig12).


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig12_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig12_HTML.jpg)


    Figure 8-12


    REST API response body with the probabilities of each Iris plant species'
  trans: '## 通过 REST API 使用大数据集群应用


    当我们部署应用时，会创建一个专用的容器，其中包含我们的应用以及通过应用文件夹提供的所有附加文件。在部署过程中，容器内还会创建一个 RESTful Web 服务，作为调用应用的附加方法。RESTful
    API 使用 HTTP 请求来执行任务。在我们的案例中，可以使用 REST API 来调用我们创建的应用，并在 JSON 消息中返回输出。这在您创建了大数据集群上的应用并希望从（例如）您的应用程序直接访问时非常有用。由于所有代码和数据都驻留在大数据集群上，您的应用程序只需要能够发送
    REST API 调用并处理返回的消息，即可立即将数据返回到您的应用程序中。


    为了利用我们应用的 REST API，我们需要执行一系列步骤。其中最重要的是我们需要生成一个令牌以安全地调用 REST API。其中一些步骤需要通过一个可以发送
    REST API 调用并处理其结果的工具来执行。在我们的案例中，我们使用 Postman ([`www.getpostman.com/`](http://www.getpostman.com/))
    作为我们的首选工具。


    在能够连接到属于我们应用的 REST API 之前，我们需要做的第一件事是生成一个所谓的“持有者令牌”。只有在我们的 REST API 调用中提供此令牌，我们才能访问应用。


    要生成持有者令牌，我们需要连接到令牌 URL。您可以通过运行清单 8-10 中的命令找到需要连接的 URL 和端口号。


    ```

    azdata app describe --name predictiris -v v1

    ```


    清单 8-10

    通过 `azdata` 检索应用 URL 和端口号


    运行前面的命令会返回有关您应用的信息，在我们的案例中是 `predictiris` 应用，如图 8-6 所示。我们需要的那一行信息在“links”部分返回，是“swagger”属性的
    URL 和端口号。


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig6_HTML.jpg](img/480532_2_En_8_Fig6_HTML.jpg)


    图 8-6

    `predictiris` 应用的 `app describe` 命令输出


    现在，请复制或记下 URL 和端口号，然后启动 Postman（或您喜欢的任何其他 REST API 调用应用）。Postman 启动后，我们必须更改一个设置以避免错误。由于大数据集群在其端点上配置了自签名证书，当我们在之后执行
    REST API 调用时，可能会遇到安全问题。在 Postman 中，您可以在“首选项”菜单项中找到 SSL 证书验证，如图 8-7 所示。请确保在向大数据集群执行
    REST API 调用之前禁用此设置。


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig7_HTML.jpg](img/480532_2_En_8_Fig7_HTML.jpg)


    图 8-7

    Postman 中的请求选项


    禁用设置后，您可以在 Postman 中打开一个新标签页。将我们从 `app describe` 命令收到的 URL 和端口字符串粘贴或输入到请求 URL
    字段中，并在 URL 后追加 `/api/v1/token`，然后将方法更改为 POST。最后，打开 Authorization（授权）选项卡，将 Type（类型）更改为“Basic
    Auth”（基本身份验证），并在正确的字段中输入您的大数据集群管理员用户名和密码。图 8-8 显示了 Postman 的截图，其中为我们大数据集群和应用 URL
    填写了所有这些项目。


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig8_HTML.jpg](img/480532_2_En_8_Fig8_HTML.jpg)


    图 8-8

    用于生成持有者令牌的 Postman 设置


    在 Postman 中配置好所有内容后，单击 Send（发送）按钮将请求发送到该 URL。如果一切处理正确，您应该会收到一条返回消息，其中包含 JSON 响应的
    `access_token` 属性中的持有者令牌，如图 8-9 所示（我们在图 8-9 中删除了 `access_token` 和 `token_id` 属性的内容）。


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig9_HTML.jpg](img/480532_2_En_8_Fig9_HTML.jpg)


    图 8-9

    包含持有者令牌的 JSON 返回消息


    现在我们已经生成了持有者令牌，我们可以用它来实际调用应用本身的 REST API。应用 REST API 的 URL 默认是隐藏的，可以在 `swagger.json`
    文件中找到，我们可以通过访问运行 `azdata app describe --name predictiris -v v1` 命令时收到的“swagger”属性中的
    URL 来打开该文件。


    当您打开 URL（在我们的案例中是 `https://104.46.56.134:30080/docs/swagger.json`）时，可以在 JSON 文件中找到一个名为“host”的属性，如图
    8-10 所示。


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig10_HTML.jpg](img/480532_2_En_8_Fig10_HTML.jpg)


    图 8-10

    `swagger.json` 文件的 Host 属性


    复制或记下“host”属性的值，并在 Postman 中启动一个新的会话。将请求方法更改为“POST”，并将“host”属性的内容复制到请求 URL 字段中，前面加上
    `HTTPS://`。在 URL 的端口号之后，我们可以复制图 8-10 所示的“basePath”属性的内容，最后为了使 URL 完整，添加一个 `/run`。


    转到 Authorization（授权）选项卡，这次选择“Bearer Token”（持有者令牌）选项，并在令牌字段中添加我们在上一步中收到的令牌。


    现在我们还剩一步，即生成 REST API 调用的正文内容，并提供执行鸢尾花物种预测所需的输入参数。在 Postman 中，单击 Body（正文）选项卡，选中“raw”（原始）选项，并从下拉按钮中选择“JSON
    (application/json)”。将清单 8-11 中的代码部分的内容复制到正文文本区域中，以提供 `predictiris` 应用所需的输入参数。


    ```

    {

    "PetalLength": 1.4,

    "PetalWidth": 0.2,

    "SepalLength": 5.1,

    "SepalWidth": 3.5

    }

    ```


    清单 8-11

    `predictiris` 应用的输入参数（JSON）


    填写完所有这些区域后，Postman 屏幕应如图 8-11 所示。


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig11_HTML.jpg](img/480532_2_En_8_Fig11_HTML.jpg)


    图 8-11

    调用 `predictiris` 应用的 REST API 的正文


    现在剩下的就是单击“Send”按钮，将 JSON 消息发送到 `predictiris` 大数据集群应用。


    如果一切配置正确，我们应该会收到一条返回消息，其输出类似于我们使用 `azdata` 执行 `predictiris` 应用时的结果，其中包含每种鸢尾花植物的预测概率。我们收到的返回消息如图
    8-12 所示。


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig12_HTML.jpg](img/480532_2_En_8_Fig12_HTML.jpg)


    图 8-12

    包含每种鸢尾花植物物种概率的 REST API 响应正文'
- fmt: '## Summary


    In this chapter, we took a look at creating and accessing Big Data Cluster applications.
    Big Data Cluster apps are a method to run containerized custom code inside the
    Big Data Cluster, for instance, to serve as an access point to perform machine
    learning scoring on a model that is stored inside the Big Data Cluster. We have
    created our own app that was able to predict the species of an Iris plant, uploaded
    it to the Big Data Cluster, and used `azdata` to execute the app. Apps are not
    only accessible through `azdata` though; by using a RESTful web service, we were
    able to access the app and send data to it of which it returned a scored result,
    using the machine learning model we trained, inside a JSON message.


    In the upcoming last chapter of the book, we will be taking a look at how you
    can manage and administer an existing Big Data Cluster.


    # 9. Maintenance of Big Data Clusters


    Last but not least, we want to look at how you can check the health of your Big
    Data Cluster, how an existing Big Data Cluster can be upgraded to a newer version,
    and how you can remove a Big Data Cluster instance, if it’s no longer needed.


    ## Checking the Status of a Big Data Cluster


    Big Data Clusters provide you with two different portals from which to learn more
    about their current state and health. These portals provide metrics and insights
    on the status of the nodes as well as relating to log files. In addition to show,
    `azdata` can also provide you a high-level overview of your cluster’s health.


    ### Retrieving a Big Data Cluster’s Status Using azdata


    To check your cluster’s status from the command line, log in to your cluster using
    the command `azdata login`. As you can see in Figure [9-1](#480532_2_En_9_Chapter.xhtml#Fig1),
    `azdata` will ask you for your namespace (your cluster’s name), username, and
    password. Use the values provided during deployment.


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig1_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig1_HTML.jpg)

    *Figure 9-1 Output of `azdata login`*


    Once you’ve successfully logged in, you can run the command `azdata bdc status
    show`. This will give you an overview of all your services, hopefully reporting
    them all as “healthy.” A sample output is illustrated in Figure [9-2](#480532_2_En_9_Chapter.xhtml#Fig2).


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig2_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig2_HTML.jpg)

    *Figure 9-2 Output of `azdata bdc status show`*


    After this, you can log out of the cluster by using `azdata logout`.


    ### Manage a Big Data Cluster Using ADS


    Azure Data Studio (ADS) gives you a more extensive view of your Big Data Cluster’s
    status and layout. First, you need to connect to the cluster’s controller endpoint,
    which you were provided at deployment.


    To do so, look for the Big Data Clusters section in your ADS connections and click
    the “+” symbol as pointed out in Figure [9-3](#480532_2_En_9_Chapter.xhtml#Fig3).


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig3_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig3_HTML.jpg)

    *Figure 9-3 Big Data Clusters Connections in ADS*


    In the next step, provide the endpoint URL as well as your credentials to log
    in to the cluster as shown in Figure [9-4](#480532_2_En_9_Chapter.xhtml#Fig4).


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig4_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig4_HTML.jpg)

    *Figure 9-4 Add new Big Data Clusters Connection in ADS*


    This will take you to your Big Data Cluster overview, which will show you the
    state and health status of every service as well as your endpoints as shown in
    Figure [9-5](#480532_2_En_9_Chapter.xhtml#Fig5).


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig5_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig5_HTML.jpg)

    *Figure 9-5 Big Data Cluster overview in ADS*


    While the endpoints are more to be used as a reference, the overview itself can
    be very useful to retrieve more details about every single service and instance
    within your cluster.


    If you click your `SQL Server` Service, for example, this will take you to an
    overview of all your SQL instances (master, compute, data, and storage) as shown
    in Figure [9-6](#480532_2_En_9_Chapter.xhtml#Fig6).


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig6_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig6_HTML.jpg)

    *Figure 9-6 Big Data Cluster details on SQL Server instances in ADS*


    This will also provide you specific links toward the metrics and logs of each
    component.


    ### Metrics (Grafana)


    The Grafana Portal provides metrics and insights on the status on the node itself
    as well as more SQL-specific metrics where applicable. The credentials to log
    in to the portal will be the same ones you also used to connect to your cluster
    in Azure Data Studio.


    #### Node Metrics


    Node metrics are typical performance indicators like CPU, RAM, and disk usage
    as shown in Figure [9-7](#480532_2_En_9_Chapter.xhtml#Fig7).


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig7_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig7_HTML.jpg)

    *Figure 9-7 Grafana Portal – node metrics*


    In addition to the “big picture,” you can also get detailed information for every
    single component like a specific disk or network interface.


    When running into performance issues, this is always a good starting point. Obviously,
    this can also be a great indicator whether you overprovisioned your cluster.


    #### SQL Metrics


    While the node metrics were focused on the physical side of the node, the SQL
    metrics as shown in Figure [9-8](#480532_2_En_9_Chapter.xhtml#Fig8) provide information
    like wait time or number of waiting tasks by wait type, transactions, and requests
    per second and other valuable metrics to understand more about the status of the
    SQL components within the cluster.


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig8_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig8_HTML.jpg)

    *Figure 9-8 Grafana Portal – SQL metrics*


    Except for the master instance, which could also be reached through SSMS or Azure
    Data Studio, you usually don’t connect to any of the other nodes directly, so
    think of these metrics as your replacement for activity monitor.


    ### Log Search Analytics (Kibana)


    The Kibana dashboard as shown in Figure [9-9](#480532_2_En_9_Chapter.xhtml#Fig9)
    on the other hand provides you an insight into the log files of the selected pod/node.


    ![../images/480532_2_En_9_Chapter/480532_2_En_9_Fig9_HTML.jpg](images/480532_2_En_9_Chapter/480532_2_En_9_Fig9_HTML.jpg)

    *Figure 9-9 Kibana Portal – overview*


    Kibana is part of the elastic stack. It also provides options to create visualizations
    and dashboard on top of your log files. If you want to learn more about it, its
    website [`www.elastic.co/products/kibana`](http://www.elastic.co/products/kibana)
    is a great starting point!'
