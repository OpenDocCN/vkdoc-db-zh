    ### Azure Kubernetes Service (AKS)


    另一个直接部署集群的方法是使用 Azure Kubernetes Service，其中 Kubernetes 集群在 Microsoft Azure 云中设置并提供。虽然部署是从任何机器（您的本地
    PC 或 VM）启动和控制的，但集群本身将在 Azure 中运行，因此这意味着部署需要一个 Azure 帐户，并且会在您的 Azure 订阅上产生费用。


    您可以通过 Azure Data Studio 中的向导或通过一个名为 `azdata` 的工具（在 Linux 上部署前一个集群的脚本也调用了它）手动部署。两种方法都需要先安装一些先决条件。一个完整的安装实际上需要几个工具和助手：


    *   Python

    *   Curl 和 SQL Server 命令行工具，这样我们才能与集群通信并向其上传数据。

    *   Kubernetes CLI

    *   `azdata`，这将创建、维护和删除大数据集群。

    *   Notepad++ 和 7Zip，这些不是实际要求，但如果您想调试安装，可能会得到一个包含可能很大的文本文件的 tar.gz 文件。Windows
    默认不处理这些。


    列表 [3-7](#480532_2_En_3_Chapter.xhtml#PC8) 中的脚本会将这些安装到您的本地机器（或您运行脚本的任何机器）上，因为部署是从这里控制和触发的。我们将通过
    Chocolatey 安装这些先决条件。


    ```

    choco install python3 -y

    choco install sqlserver-cmdlineutils -y

    $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";"
    + [System.Environment]::GetEnvironmentVariable("Path","User")

    python -m pip install --upgrade pip

    python -m pip install requests

    python -m pip install requests --upgrade

    choco install curl -y

    choco install kubernetes-cli -y

    choco install notepadplusplus -y

    choco install 7zip -y

    choco install visualcpp-build-tools -y

    pip3 install kubernetes

    pip3 install -r https://aka.ms/azdata

    Listing 3-7

    大数据集群先决条件的安装脚本

    ```


    虽然相关供应商显然为大多数工具提供了可视化/手动安装程序，但脚本化方法使整个体验变得容易得多。


    此外，由于我们想使用脚本部署到 Azure，我们需要列表 [3-8](#480532_2_En_3_Chapter.xhtml#PC9) 中所示的 `azure-cli`
    包，以便能够连接到我们的 Azure 订阅。


    ```

    choco install azure-cli -y

    Listing 3-8

    安装 azure-cli

    ```


    虽然您技术上可以在 Azure 门户中或通过手动 PowerShell 脚本准备所有内容（我们需要一个资源组、Kubernetes 集群等），但有一个更简单的方法：从
    [`https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/deployment/aks`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/deployment/aks)
    获取 Python 脚本，它会自动为您处理整个过程和设置。


    将脚本下载到您的桌面或其他合适的位置，并打开命令提示符。导航到保存脚本的文件夹。您也可以如列表 [3-9](#480532_2_En_3_Chapter.xhtml#PC10)
    所示使用命令提示符下载。


    ```

    curl --output deploy-sql-big-data-aks.py https://raw.githubusercontent.com/microsoft/sql-server-samples/master/samples/features/sql-big-data-cluster/deployment/aks/deploy-sql-big-data-aks.py

    Listing 3-9

    下载部署脚本

    ```


    当然，您也可以根据需要修改和审查脚本，例如，将一些参数（如 VM 大小）设为静态而非变量，或更改某些值的默认值。


    首先，我们需要登录 Azure，这将使用列表 [3-10](#480532_2_En_3_Chapter.xhtml#PC11) 中所示的命令完成。


    ```

    az login

    Listing 3-10

    从命令提示符触发登录到 azure

    ```'
  raw: '### kubeadm on Linux


    A very easy way to deploy a Big Data Cluster is using kubeadm on a vanilla (freshly
    installed) Ubuntu 16.04 or 18.04 virtual or physical machine.


    Microsoft provides a script for you that does all the work, so besides the Linux
    installation itself, there is not much to do for you, which makes this probably
    the easiest way to get your first Big Data Cluster up and running.


    First, make sure your Linux machine is up to date by running the commands in Listing
    [3-5](#480532_2_En_3_Chapter.xhtml#PC6).


    ```

    sudo apt update&&apt upgrade -y

    sudo systemctl reboot

    Listing 3-5

    Patch Ubuntu

    ```


    Then, download the script, make it executable, and run it with root permissions
    as shown in Listing [3-6](#480532_2_En_3_Chapter.xhtml#PC7).


    ```

    curl --output setup-bdc.sh https://raw.githubusercontent.com/microsoft/sql-server-samples/master/samples/features/sql-big-data-cluster/deployment/kubeadm/ubuntu-single-node-vm/setup-bdc.sh

    chmod +x setup-bdc.sh

    sudo ./setup-bdc.sh

    Listing 3-6

    Download and execute the deployment script

    ```


    As you can see in Figure [3-18](#480532_2_En_3_Chapter.xhtml#Fig18), the script
    will ask you for a password and automatically start preparational steps afterward.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig18_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig18_HTML.jpg)


    Figure 3-18


    Deployment on Linux with kubeadm


    After pre-fetching the images, provisioning Kubernetes, and all other required
    steps, the deployment of the Big Data Cluster is started as shown in Figure [3-19](#480532_2_En_3_Chapter.xhtml#Fig19).


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig19_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig19_HTML.jpg)


    Figure 3-19


    Deployment on Linux with kubeadm


    Once the whole script completes, you are done! As demonstrated in Figure [3-20](#480532_2_En_3_Chapter.xhtml#Fig20),
    the script will also provide all the endpoints that were created during the deployment.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig20_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig20_HTML.jpg)


    Figure 3-20


    Successful deployment on Linux with kubeadm


    Your cluster is now fully deployed and ready!


    ### Azure Kubernetes Service (AKS)


    Another straightforward way to deploy your cluster is to use Azure Kubernetes
    Service, in which the Kubernetes cluster is set up and provided in the Microsoft
    Azure cloud. While the deployment is started and controlled through any machine
    (either your local PC or a VM), the cluster itself will run in Azure, so this
    means that deployment requires an Azure account and will result in cost on your
    Azure subscription.


    You can deploy either through a wizard in Azure Data Studio or manually through
    a tool called azdata (which was also called by the script deploying your previous
    cluster on Linux). Both methods have some prerequisites that need to be installed
    first. A full installation actually requires several tools and helpers:


    *   Python


    *   Curl and the SQL Server command-line utilities


    So we can communicate with the cluster and upload data to it.


    *   The Kubernetes CLI


    *   azdata


    This will create, maintain, and delete a big data cluster.


    *   Notepad++ and 7Zip


    These are not actual requirements, but if you want to debug your installation,
    you will get a tar.gz file with potentially huge text files. Windows does not
    handle these out of the box.


    The script in Listing [3-7](#480532_2_En_3_Chapter.xhtml#PC8) will install those
    to your local machine (or whichever machine you are running the script on), as
    this is where the deployment is controlled and triggered from. We will be installing
    those prerequisites through Chocolatey.


    ```

    choco install python3 -y

    choco install sqlserver-cmdlineutils -y

    $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";"
    + [System.Environment]::GetEnvironmentVariable("Path","User")

    python -m pip install --upgrade pip

    python -m pip install requests

    python -m pip install requests --upgrade

    choco install curl -y

    choco install kubernetes-cli -y

    choco install notepadplusplus -y

    choco install 7zip -y

    choco install visualcpp-build-tools -y

    pip3 install kubernetes

    pip3 install -r https://aka.ms/azdata

    Listing 3-7

    Install script for Big Data Cluster prerequisites

    ```


    While the respective vendors obviously supply visual/manual installation routines
    for most of these tools, the scripted approach just makes the whole experience
    a lot easier.


    In addition, as we want to deploy to Azure using a script, we need the azure-cli
    package shown in Listing [3-8](#480532_2_En_3_Chapter.xhtml#PC9) to be able to
    connect to our Azure subscription.


    ```

    choco install azure-cli -y

    Listing 3-8

    Install azure-cli

    ```


    While you technically could prepare everything (we need a resource group, the
    Kubernetes cluster, etc.) in the Azure Portal or through manual PowerShell scripts,
    there is a much easier way: get the Python script from [`https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/deployment/aks`](https://github.com/Microsoft/sql-server-samples/tree/master/samples/features/sql-big-data-cluster/deployment/aks),
    which will automatically take care of the whole process and setup for you.


    Download the script to your desktop or another suitable location and open a command
    prompt. Navigate to the folder where you’ve saved the script. You can also download
    using a command prompt as shown in Listing [3-9](#480532_2_En_3_Chapter.xhtml#PC10).


    ```

    curl --output deploy-sql-big-data-aks.py https://raw.githubusercontent.com/microsoft/sql-server-samples/master/samples/features/sql-big-data-cluster/deployment/aks/deploy-sql-big-data-aks.py

    Listing 3-9

    Download deployment script

    ```


    Of course, you can also modify and review the script as per your needs, for example,
    to make some parameters like the VM size static rather than a variable or to change
    the defaults for some of the values.


    First, we need to log on to Azure which will be done with the command shown in
    Listing [3-10](#480532_2_En_3_Chapter.xhtml#PC11).


    ```

    az login

    Listing 3-10

    Trigger login to azure from command prompt

    ```'
