  raw: '### The SqlDataPool


    The *SqlDataPool* is used to address the data pool of the Big Data Cluster which
    allows you to distribute data from a SQL table among the whole pool.


    Just like with the storage pool, a respective pointer needs to be created first
    in each database that you want to use as shown in Listing [5-25](#480532_2_En_5_Chapter.xhtml#PC25).


    ```

    IF NOT EXISTS(SELECT * FROM sys.external_data_sources WHERE name = ''SqlDataPool'')

    CREATE EXTERNAL DATA SOURCE SqlDataPool

    WITH (LOCATION = ''sqldatapool://controller-svc/default'');

    Listing 5-25

    T-SQL code to create pointer to the SQL Data Pool

    ```


    We will do this again in the sales database.


    First of all, we start by creating an external table (Listing [5-26](#480532_2_En_5_Chapter.xhtml#PC26))
    again. Notice that unlike in previous samples, where we were addressing a specific
    file or location, in this instance, we only provide the hint that this table is
    to be stored in the SqlDataPool and is to be distributed using round robin.


    ```

    CREATE EXTERNAL TABLE [web_clickstream_clicks_data_pool]

    ("wcs_user_sk" BIGINT , "i_category_id" BIGINT , "clicks" BIGINT)

    WITH

    (

    DATA_SOURCE = SqlDataPool,

    DISTRIBUTION = ROUND_ROBIN

    );

    Listing 5-26

    CREATE statement for external table on SqlDataPool

    ```


    You can now insert data into this table using a regular INSERT INTO statement
    as shown in Listing [5-27](#480532_2_En_5_Chapter.xhtml#PC27).


    ```

    INSERT INTO web_clickstream_clicks_data_pool

    SELECT wcs_user_sk, i_category_id, COUNT_BIG(*) as clicks

    FROM sales.dbo.web_clickstreams_hdfs_parquet

    INNER JOIN sales.dbo.item it ON (wcs_item_sk = i_item_sk

    AND wcs_user_sk IS NOT NULL)

    GROUP BY wcs_user_sk, i_category_id

    Listing 5-27

    Populate table in SqlDataPool from SQL Query

    ```


    Just as in all previous examples, this external table can now be queried and joined
    like any other table (Listing [5-28](#480532_2_En_5_Chapter.xhtml#PC28)).


    ```

    SELECT count(*) FROM [dbo].[web_clickstream_clicks_data_pool]

    SELECT TOP 10 * FROM [dbo].[web_clickstream_clicks_data_pool]

    SELECT TOP (100)

    w.wcs_user_sk,

    SUM( CASE WHEN i.i_category = ''Books'' THEN 1 ELSE 0 END) AS book_category_clicks,

    SUM( CASE WHEN w.i_category_id = 1 THEN 1 ELSE 0 END) AS [Home & Kitchen],

    SUM( CASE WHEN w.i_category_id = 2 THEN 1 ELSE 0 END) AS [Music],

    SUM( CASE WHEN w.i_category_id = 3 THEN 1 ELSE 0 END) AS [Books],

    SUM( CASE WHEN w.i_category_id = 4 THEN 1 ELSE 0 END) AS [Clothing & Accessories],

    SUM( CASE WHEN w.i_category_id = 5 THEN 1 ELSE 0 END) AS [Electronics],

    SUM( CASE WHEN w.i_category_id = 6 THEN 1 ELSE 0 END) AS [Tools & Home Improvement],

    SUM( CASE WHEN w.i_category_id = 7 THEN 1 ELSE 0 END) AS [Toys & Games],

    SUM( CASE WHEN w.i_category_id = 8 THEN 1 ELSE 0 END) AS [Movies & TV],

    SUM( CASE WHEN w.i_category_id = 9 THEN 1 ELSE 0 END) AS [Sports & Outdoors]

    FROM [dbo].[web_clickstream_clicks_data_pool] as w

    INNER JOIN (SELECT DISTINCT i_category_id, i_category FROM item) as i

    ON i.i_category_id = w.i_category_id

    GROUP BY w.wcs_user_sk;

    Listing 5-28

    SELECT against table in SqlDataPool (stand-alone and joined against other tables)

    ```


    The execution plan (Figure [5-23](#480532_2_En_5_Chapter.xhtml#Fig23)) looks similar
    to what we saw before when querying against the storage pool.


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig23_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig23_HTML.jpg)


    Figure 5-23


    Execution plan in ADS


    Notice that unlike in the SqlStoragePool, the data that sits in the data pool
    is not visible as a file in the HDFS folder in Azure Data Studio, as its data
    is stored in regular SQL tables!


    ### Indexes on the SqlDataPool


    One big difference between the SqlDataPool and other external data sources is
    that it consists of regular SQL Server tables, which means you can directly control
    indexes on those tables.


    By default, every table in the SqlDataPool will be created with a clustered columnstore
    index. As the main use case for scale out and therefore the data pool are analytics
    workloads, this will probably satisfy many query needs out of the box.


    If you still want to create or change an index, this needs to happen within the
    data pool itself, which can be achieved using the EXECUTE AT switch as shown in
    Listing [5-29](#480532_2_En_5_Chapter.xhtml#PC29).


    ```

    exec () AT Data_Source SqlDataPool

    Listing 5-29

    EXEC with EXECUTE AT

    ```


    You can use this to run any kind of query on the data pool and it will return
    one result grid for every node in the data pool. To get a list of all tables in
    the data pool, for example, run Listing [5-30](#480532_2_En_5_Chapter.xhtml#PC30).


    ```

    exec (''SELECT * FROM sys.tables'') AT Data_Source SqlDataPool

    Listing 5-30

    Get a list of tables in data pool

    ```


    The result is shown in Figure [5-24](#480532_2_En_5_Chapter.xhtml#Fig24).


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig24_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig24_HTML.jpg)


    Figure 5-24


    Result from a list of tables in data pool


    It may surprise you a little bit as you were maybe expecting different tables.
    The reason for that is that just like your master instance, the data pool will
    have multiple databases, so context is important. Let’s try that again by switching
    the current database context as shown in Listing [5-31](#480532_2_En_5_Chapter.xhtml#PC31).
    This will only work for databases that have at least one table in SqlDataPool,
    as the database is created at that point.


    ```

    exec (''USE sales; SELECT * FROM sys.tables'') AT Data_Source SqlDataPool

    Listing 5-31

    Get a list of tables in data pool from sales database

    ```


    This time the result (see Figure [5-25](#480532_2_En_5_Chapter.xhtml#Fig25)) looks
    more as we would have expected.


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig25_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig25_HTML.jpg)


    Figure 5-25


    Result from a list of tables in data pool from sales database


    To add an index, you would simply add the respective CREATE INDEX statement within
    the EXEC statement as illustrated in Listing [5-32](#480532_2_En_5_Chapter.xhtml#PC32).


    ```

    EXEC (''USE Sales; CREATE NONCLUSTERED INDEX [CI_wcs_user_sk] ON [dbo].[web_clickstream_clicks_data_pool]
    ([wcs_user_sk] ASC)'') AT DATA_SOURCE SqlDataPool

    Listing 5-32

    CREATE INDEX in data pool

    ```


    ## Summary


    In this chapter, we used the previously loaded data and queried it using multiple
    techniques using T-SQL, from another SQL Server to flat files. We also took a
    look on how certain tasks in that aspect can be automated.


    As you’ve learned before, T-SQL isn’t the only way to query a Big Data Cluster:
    another way of doing so is Spark. Chapter [6](#480532_2_En_6_Chapter.xhtml) will
    guide you through that process!


    Footnotes [1](#480532_2_En_5_Chapter.xhtml#Fn1_source)   [2](#480532_2_En_5_Chapter.xhtml#Fn2_source)
      [3](#480532_2_En_5_Chapter.xhtml#Fn3_source)   [4](#480532_2_En_5_Chapter.xhtml#Fn4_source)
      [5](#480532_2_En_5_Chapter.xhtml#Fn5_source)'
  trans: '

    ### SqlDataPool


    `SqlDataPool` 是用于处理大数据集群的数据池，它允许你将来自 SQL 表的数据分布到整个池中。


    就像存储池一样，首先需要在你想要使用的每个数据库中创建一个相应的指针，如清单 5-25 所示。


    ```sql

    IF NOT EXISTS(SELECT * FROM sys.external_data_sources WHERE name = ''SqlDataPool'')

    CREATE EXTERNAL DATA SOURCE SqlDataPool

    WITH (LOCATION = ''sqldatapool://controller-svc/default'');

    -- 清单 5-25

    -- 用于创建指向 SQL 数据池指针的 T-SQL 代码

    ```


    我们将在销售数据库中再次执行此操作。


    首先，我们再次创建一个外部表（清单 5-26）。请注意，与之前的示例不同，之前我们指定的是特定文件或位置，而在这里，我们只提供提示，表明此表应存储在 `SqlDataPool`
    中并使用轮询（`ROUND_ROBIN`）方式进行分布。


    ```sql

    CREATE EXTERNAL TABLE [web_clickstream_clicks_data_pool]

    ("wcs_user_sk" BIGINT , "i_category_id" BIGINT , "clicks" BIGINT)

    WITH

    (

    DATA_SOURCE = SqlDataPool,

    DISTRIBUTION = ROUND_ROBIN

    );

    -- 清单 5-26

    -- 在 SqlDataPool 上为外部表创建的 CREATE 语句

    ```


    你现在可以使用常规的 `INSERT INTO` 语句将数据插入此表，如清单 5-27 所示。


    ```sql

    INSERT INTO web_clickstream_clicks_data_pool

    SELECT wcs_user_sk, i_category_id, COUNT_BIG(*) as clicks

    FROM sales.dbo.web_clickstreams_hdfs_parquet

    INNER JOIN sales.dbo.item it ON (wcs_item_sk = i_item_sk

    AND wcs_user_sk IS NOT NULL)

    GROUP BY wcs_user_sk, i_category_id

    -- 清单 5-27

    -- 从 SQL 查询填充 SqlDataPool 中的表

    ```


    与之前的所有示例一样，这个外部表现在可以像任何其他表一样进行查询和联接（清单 5-28）。


    ```sql

    SELECT count(*) FROM [dbo].[web_clickstream_clicks_data_pool]

    SELECT TOP 10 * FROM [dbo].[web_clickstream_clicks_data_pool]

    SELECT TOP (100)

    w.wcs_user_sk,

    SUM( CASE WHEN i.i_category = ''Books'' THEN 1 ELSE 0 END) AS book_category_clicks,

    SUM( CASE WHEN w.i_category_id = 1 THEN 1 ELSE 0 END) AS [Home & Kitchen],

    SUM( CASE WHEN w.i_category_id = 2 THEN 1 ELSE 0 END) AS [Music],

    SUM( CASE WHEN w.i_category_id = 3 THEN 1 ELSE 0 END) AS [Books],

    SUM( CASE WHEN w.i_category_id = 4 THEN 1 ELSE 0 END) AS [Clothing & Accessories],

    SUM( CASE WHEN w.i_category_id = 5 THEN 1 ELSE 0 END) AS [Electronics],

    SUM( CASE WHEN w.i_category_id = 6 THEN 1 ELSE 0 END) AS [Tools & Home Improvement],

    SUM( CASE WHEN w.i_category_id = 7 THEN 1 ELSE 0 END) AS [Toys & Games],

    SUM( CASE WHEN w.i_category_id = 8 THEN 1 ELSE 0 END) AS [Movies & TV],

    SUM( CASE WHEN w.i_category_id = 9 THEN 1 ELSE 0 END) AS [Sports & Outdoors]

    FROM [dbo].[web_clickstream_clicks_data_pool] as w

    INNER JOIN (SELECT DISTINCT i_category_id, i_category FROM item) as i

    ON i.i_category_id = w.i_category_id

    GROUP BY w.wcs_user_sk;

    -- 清单 5-28

    -- 对 SqlDataPool 中的表执行 SELECT（独立查询及与其他表联接）

    ```


    执行计划（图 5-23）与我们之前查询存储池时看到的情况类似。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig23_HTML.jpg](img/480532_2_En_5_Fig23_HTML.jpg)


    **图 5-23**


    **在 ADS 中的执行计划**


    请注意，与 `SqlStoragePool` 不同，位于数据池中的数据在 Azure Data Studio 的 HDFS 文件夹中不显示为文件，因为其数据存储在常规的
    SQL 表中！


    ### SqlDataPool 上的索引


    `SqlDataPool` 与其他外部数据源的一个主要区别在于它由常规的 SQL Server 表组成，这意味着你可以直接控制这些表上的索引。


    默认情况下，`SqlDataPool` 中的每个表都会使用聚集列存储索引创建。由于扩展（scale out）以及数据池的主要使用场景是分析工作负载，这很可能开箱即用地满足许多查询需求。


    如果你仍然想创建或更改索引，这需要在数据池内部进行，可以使用 `EXECUTE AT` 开关来实现，如清单 5-29 所示。


    ```sql

    exec () AT Data_Source SqlDataPool

    -- 清单 5-29

    -- 带有 EXECUTE AT 的 EXEC

    ```


    你可以使用它在数据池上运行任何类型的查询，它将为数据池中的每个节点返回一个结果网格。例如，要获取数据池中所有表的列表，运行清单 5-30。


    ```sql

    exec (''SELECT * FROM sys.tables'') AT Data_Source SqlDataPool

    -- 清单 5-30

    -- 获取数据池中的表列表

    ```


    结果如图 5-24 所示。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig24_HTML.jpg](img/480532_2_En_5_Fig24_HTML.jpg)


    **图 5-24**


    **数据池中表列表的结果**


    你可能会感到有点惊讶，因为你可能期望不同的表。原因在于，就像你的主实例一样，数据池也会有多个数据库，因此上下文很重要。让我们通过切换当前数据库上下文再试一次，如清单
    5-31 所示。这仅适用于在 `SqlDataPool` 中至少有一个表的数据库，因为数据库是在那时创建的。


    ```sql

    exec (''USE sales; SELECT * FROM sys.tables'') AT Data_Source SqlDataPool

    -- 清单 5-31

    -- 从销售数据库获取数据池中的表列表

    ```


    这次的结果（见图 5-25）看起来更符合我们的预期。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig25_HTML.jpg](img/480532_2_En_5_Fig25_HTML.jpg)


    **图 5-25**


    **从销售数据库查询数据池中表列表的结果**


    要添加索引，你只需在 `EXEC` 语句中添加相应的 `CREATE INDEX` 语句，如清单 5-32 所示。


    ```sql

    EXEC (''USE Sales; CREATE NONCLUSTERED INDEX [CI_wcs_user_sk] ON [dbo].[web_clickstream_clicks_data_pool]
    ([wcs_user_sk] ASC)'') AT DATA_SOURCE SqlDataPool

    -- 清单 5-32

    -- 在数据池中创建索引

    ```


    ## 总结


    在本章中，我们使用了先前加载的数据，并通过多种技术对其进行了查询，包括使用 T-SQL、从另一个 SQL Server 查询以及查询平面文件。我们还了解了如何自动化该方面的某些任务。


    正如你之前所学的，T-SQL 并不是查询大数据集群的唯一方式：另一种方式是 Spark。第 6 章将引导你完成该过程！


    脚注 1   2   3   4   5

    '
- fmt: '# 6. Working with Spark in Big Data Clusters


    So far, we have been querying data inside our SQL Server Big Data Cluster using
    external tables and T-SQL code. We do, however, have another method available
    to query data that is stored inside the HDFS filesystem of your Big Data Cluster.
    As you have read in Chapter [2](#480532_2_En_2_Chapter.xhtml), Big Data Clusters
    also have Spark included in the architecture, meaning we can leverage the power
    of Spark to query data stored inside our Big Data Cluster.


    Spark is a very powerful option of analyzing and querying the data inside your
    Big Data Cluster, mostly because Spark is built as a distributed and parallel
    framework, meaning it is very fast at processing very large datasets making it
    far more efficient when you want to process large datasets than SQL Server. Spark
    also allows a large flexibility in terms of programming languages that it supports,
    the most prominent ones being `Scala` and `PySpark` (though Spark also supports
    `R` and `Java`).


    The `PySpark` and `Scala` syntax are both very similar in the majority of commands
    we are using in the examples. There are some subtle nuances though.


    The example code of Listings [6-1](#480532_2_En_6_Chapter.xhtml#PC1) and [6-2](#480532_2_En_6_Chapter.xhtml#PC2)
    shows how to read a CSV file into a data frame in both `PySpark` and `Scala` (don’t
    worry we will get into more detail on data frames soon).


    ```scala

    // Import the airports.csv file from HDFS (Scala)

    val df_airports = spark.read.format("csv").option("header", "true").option("inferSchema",
    "true").load("/Flight_Delays/airports.csv")

    Listing 6-2

    Import CSV from HDFS using Scala

    ```


    ```python

    # Import the airports.csv file from HDFS (PySpark)

    df_airports = spark.read.format(''csv'').options(header=''true'', inferSchema="true").load(''/Flight_Delays/airports.csv'')

    Listing 6-1

    Import CSV from HDFS using PySpark

    ```


    As you can see, the code of the example looks very similar for `PySpark` and `Scala`,
    but there are some small differences. For instance, the character used for comments,
    in `PySpark` a comment is marked with a `#` sign, while in `Scala` we use `//`.
    Another difference is in the quotes. While we can use both a single quote and
    a double quote in the `PySpark` code, `Scala` is pickier accepting only double
    quotes. Also, where we don’t need to specifically define a variable in `PySpark`
    (which is called a value in `Scala`), we do need to explicitly specify this when
    using `Scala`.


    While this book is focused on Big Data Clusters, we believe an introduction to
    writing `PySpark` will be very useful when working with SQL Server Big Data Clusters
    since it allows you different method to work with the data inside your Big Data
    Cluster besides SQL.


    ## Loading Data and Creating a Spark Notebook


    If you followed the steps in the “Getting Some Sample Files into the Installation”
    section of Chapter [4](#480532_2_En_4_Chapter.xhtml), you should have already
    imported the “2015 Flight Delays and Cancellations” dataset from Kaggle to the
    HDFS filesystem of your Big Data Cluster. If you haven’t done so already, and
    want to follow along with the examples in this section, we recommend following
    the steps outlined in the “Getting Some Sample Files into the Installation” section
    before continuing. If you imported the dataset correctly, you should be able to
    see the “Flight_Delays” folder and the three CSV files inside the HDFS filesystem
    through Azure Data Studio as shown in Figure [6-1](#480532_2_En_6_Chapter.xhtml#Fig1).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig1_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig1_HTML.jpg)

    Figure 6-1

    Flight delay files in HDFS store


    With our sample dataset available on HDFS, let’s start with exploring the data
    a bit.


    The first thing we need to do is to create a new notebook through the “New Notebook”
    option inside the Tasks window of our SQL Big Data Cluster tab (Figure [6-2](#480532_2_En_6_Chapter.xhtml#Fig2)).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig2_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig2_HTML.jpg)

    Figure 6-2

    Tasks in Azure Data Studio


    After creating a new notebook, we can select what language we want to use by selecting
    it through the “Kernel” drop-down box at the top of the notebook as shown in Figure
    [6-3](#480532_2_En_6_Chapter.xhtml#Fig3).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig3_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig3_HTML.jpg)

    Figure 6-3

    Kernel selection in ADS notebook


    During the remainder of this chapter, we will be using `PySpark` as the language
    of all the examples. If you want to follow along with the examples in this chapter,
    we recommend selecting the “`PySpark`” language.


    With our notebook created and our language configured, let’s look at our flight
    delay sample data!'
