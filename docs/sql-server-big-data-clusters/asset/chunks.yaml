- fmt: '### Containers


    一个 *容器* 是一种独立的包，它包含在隔离或沙盒环境中运行应用程序所需的一切。容器经常被拿来与虚拟机（VM）比较，因为两种方案都存在虚拟化层。然而，容器比虚拟机提供了更大的灵活性。一个显著体现灵活性的领域是可移植性。


    使用容器的主要优势之一是它们避免了在容器内部实现操作系统。虚拟机需要在每个虚拟机内部安装自己的操作系统，而对于容器，每个容器都使用其运行所在的宿主机的操作系统（通过隔离的进程）。像
    `Docker` 这样的工具，通过运行一个虚拟机来作为容器的宿主机，可以在单台宿主机机器上实现多种操作系统，例如让你在 Windows 上运行一个 Linux
    容器。


    你立刻就能看到一个优势：运行多个虚拟机时，你还有额外的负担来维护每个虚拟机上的操作系统——打补丁、配置并确保一切按预期运行。使用容器，你则没有这些额外的管理层级。相反，你维护一份操作系统副本，由所有容器共享。


    容器相对于虚拟机的另一个优势是，容器可以被定义为一种“基础设施即代码”形式。这意味着你可以在构建文件或镜像中，通过脚本定义容器的整个创建过程。这意味着当你使用相同的镜像或构建文件部署多个容器时，它们是
    100% 相同的。确保 100% 一致的部署在使用虚拟机时可能非常具有挑战性，但使用容器则很容易实现。


    图 [2-1](#480532_2_En_2_Chapter.xhtml#Fig1) 展示了容器和虚拟机在资源分配和隔离方面的一些差异。你可以看到容器如何减少了对多个客户操作系统的需求。


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig1_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig1_HTML.jpg)


    图 2-1


    虚拟机 vs. 容器


    我们想提到的容器的最后一个优势（还有很多其他优势，但已超出本书范围）是容器可以部署为“无状态”应用。本质上这意味着容器不会改变，并且它们自身不存储数据。


    例如，考虑一种情况：你使用容器部署了多个应用服务。在这种情况下，每个容器都将以与其他容器完全相同的运行方式和状态来运行你的应用。当一个容器崩溃时，使用相同的构建文件部署一个新的容器来接替崩溃容器的角色是很容易的，因为容器在运行期间内部没有存储或更改任何数据。


    你的应用数据的存储可以由基础设施中的其他角色来处理，例如，一个 `SQL Server` 保存着由你的应用容器处理的数据，或者，作为另一个例子，一个文件共享存储着容器内应用使用的数据。此外，当你有新的应用服务器软件构建可用时，你可以轻松地创建一个新的容器镜像或构建文件，将该镜像或构建文件映射到你的应用容器，并几乎在瞬间切换构建版本。


    `SQL Server Big Data Clusters` 使用容器部署，为大数据集群中可用的各种角色和功能创建一个可扩展、一致且灵活的环境。`Microsoft`
    选择使用 `Kubernetes` 来部署所有容器。`Kubernetes` 是容器基础设施中的一个额外层，它充当协调器。通过使用 `Kubernetes`（或通常称为
    `K8s`），你在处理容器时能获得若干优势。例如，`Kubernetes` 可以在性能需要时自动部署新容器，或者在其他容器失败时部署新容器。


    因为大数据集群构建在 `Kubernetes` 之上，你在部署大数据集群的位置上有一定的灵活性。`Azure` 能够使用托管的 Kubernetes 服务（`AKS`），你也可以选择在其中部署大数据集群。其他本地选项可以使用
    `Docker` 或 `Minikube` 作为容器协调器。我们将在第 [3](#480532_2_En_3_Chapter.xhtml) 章更深入地探讨在
    `AKS`、`Docker` 或 `Minikube` 内部部署大数据集群。


    使用 `Kubernetes` 也引入了几个特定的术语，我们将在本书中持续使用。我们已经讨论了容器的概念和定义。然而，`Kubernetes`（以及大数据集群）也经常使用另一个术语，叫做“`pods`”。`Kubernetes`
    不直接运行容器；相反，它将容器包裹在一个称为 `pod` 的结构中。一个 `pod` 组合了一个或多个容器、存储资源、网络配置以及一个管理容器如何在 `pod`
    内运行的特定配置。


    图 [2-2](#480532_2_En_2_Chapter.xhtml#Fig2) 展示了 `Kubernetes` 内部的 `node` - `pods`
    - 容器架构的简单表示。


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig2_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig2_HTML.jpg)


    图 2-2


    `Kubernetes` 中容器、`pods` 和 `nodes` 的表示


    通常，`pods` 有两种使用方式：每个 `pod` 一个容器，或者一个 `pod` 内有多个容器。后者用于当你的多个容器需要以某种方式协同工作时——例如，在多个容器之间分配负载时。`pods`
    也是为容器分配更多系统资源的管理单位。例如，要增加容器可用的内存，对 `pod` 配置的更改将导致 `pod` 内所有容器都能访问增加的内存。关于这一点，在
    `Kubernetes` 集群中，你主要是在管理和扩展 `pods`，而不是容器。


    `Pods` 运行在 `Kubernetes` 的 `nodes` 上。一个 `node` 是 `Kubernetes` 集群内部最小的计算硬件单元。大多数时候，一个
    `node` 是一台安装了 `Kubernetes` 集群软件的物理或虚拟机，但理论上任何具有 CPU 和内存的机器/设备都可以成为一个 `Kubernetes`
    `node`。因为这些机器只作为 `Kubernetes` `pods` 的宿主机，它们可以轻松地被替换、添加或从 `Kubernetes` 架构中移除，使得底层的物理（或虚拟）机基础设施非常灵活。'
  raw: '### Containers


    A *container* is a kind of stand-alone package that contains everything you need
    to run an application in an isolated or sandbox environment. Containers are frequently
    compared to virtual machines (VMs) because of the virtualization layers that are
    present in both solutions. However, containers provide far more flexibility than
    virtual machines. A notable area of increased flexibility is the area of portability.


    One of the main advantages of using containers is that they avoid the implementation
    of an operating system inside the container. Virtual machines require the installation
    of their own operating system inside each virtual machine, whereas with containers,
    the operating system of the host on which the containers are being run is used
    by each container (through isolated processes). Tools like Docker enable multiple
    operating systems on a single host machine by running a virtual machine that becomes
    the host for your containers, allowing you to run a Linux container on Windows,
    for example.


    You can immediately see an advantage here: when running several virtual machines,
    you also have an additional workload of maintaining the operating system on each
    virtual machine with patches, configuring it, and making sure everything is running
    the way it is supposed to be. With containers, you do not have those additional
    levels of management. Instead, you maintain one copy of the operating system that
    is shared among all containers.


    Another advantage for containers over virtual machines is that containers can
    be defined as a form of “infrastructure-as-code.” This means you can script out
    the entire creation of a container inside a build file or image. This means that
    when you deploy multiple containers with the same image or build file, they are
    100% identical. Ensuring 100% identical deployment is something that can be very
    challenging when using virtual machines, but is easily done using containers.


    Figure [2-1](#480532_2_En_2_Chapter.xhtml#Fig1) shows some differences between
    containers and virtual machines around resource allocation and isolation. You
    can see how containers reduce the need for multiple guest operating systems.


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig1_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Virtual machine vs. containers


    A final advantage of containers we would like to mention (there are many more
    to name, however, that would go beyond the scope of this book) is that containers
    can be deployed as “stateless” applications. Essentially this means that containers
    won’t change, and they do not store data inside themselves.


    Consider, for instance, a situation in which you have a number of application
    services deployed using containers. In this situation, each of the containers
    would run the application in the exact same manner and state as the other containers
    in your infrastructure. When one container crashes, it is easy to deploy a new
    container with the same build file filling in the role of the crashed container,
    since no data inside the containers is stored or changed for the time they are
    running.


    The storage of your application data could be handled by other roles in your infrastructure,
    for instance, a SQL Server that holds the data that is being processed by your
    application containers, or, as a different example, a file share that stores the
    data that is being used by the applications inside your containers. Also, when
    you have a new software build available for your application servers, you can
    easily create a new container image or build file, map that image or build file
    to your application containers, and switch between build versions practically
    on the fly.


    SQL Server Big Data Clusters are deployed using containers to create a scalable,
    consistent, and elastic environment for all the various roles and functions that
    are available in Big Data Clusters. Microsoft has chosen to deploy all the containers
    using Kubernetes. Kubernetes is an additional layer in the container infrastructure
    that acts like an orchestrator. By using Kubernetes (or K8s as it is often called),
    you get several advantages when dealing with containers. For instance, Kubernetes
    can automatically deploy new containers whenever it is required from a performance
    perspective, or deploy new containers whenever others fail.


    Because Big Data Clusters are built on top of Kubernetes, you have some flexibility
    in where you deploy Big Data Clusters. Azure has the ability to use a managed
    Kubernetes Service (AKS) where you can also choose to deploy Big Data Clusters
    if you so want to. Other, on-premises options are Docker or Minikube as container
    orchestrators. We will take a more in-depth look at the deployment of Big Data
    Clusters inside AKS, Docker, or Minikube in Chapter [3](#480532_2_En_3_Chapter.xhtml).


    Using Kubernetes also introduces a couple of specific terms that we will be using
    throughout this book. We’ve already discussed the idea and definition of containers.
    However, Kubernetes (and also Big Data Clusters) also frequently uses another
    term called “pods.” Kubernetes does not run containers directly; instead it wraps
    a container in a structure called a pod. A pod combines one or multiple containers,
    storage resources, networking configurations, and a specific configuration governing
    how the container should run inside the pod.


    Figure [2-2](#480532_2_En_2_Chapter.xhtml#Fig2) shows a simple representation
    of the node – pods – container architecture inside Kubernetes.


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig2_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Representation of containers, pods, and nodes in Kubernetes


    Generally, pods are used in two manners: a single container per pod or multiple
    containers inside a single pod. The latter is used when you have multiple containers
    that need to work together in one way or the other `–` for instance, when distributing
    a load across various containers. Pods are also the resource managed to allocate
    more system resources to containers. For example, to increase the available memory
    for your containers, a change in the pod’s configuration will result in access
    to the added memory for all containers inside the pod. On that note, you are mostly
    managing and scaling pods instead of containers inside a Kubernetes cluster.


    Pods run on Kubernetes nodes. A node is the smallest unit of computing hardware
    inside the Kubernetes cluster. Most of the time, a node is a single physical or
    virtual machine on which the Kubernetes cluster software is installed, but in
    theory every machine/device with a CPU and memory can be a Kubernetes node. Because
    these machines only function as hosts of Kubernetes pods, they can easily be replaced,
    added, or removed from the Kubernetes architecture, making the underlying physical
    (or virtual) machine infrastructure very flexible.'
