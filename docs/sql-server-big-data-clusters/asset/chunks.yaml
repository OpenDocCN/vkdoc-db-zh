    impact on the model accuracy and there are a hundred more things we could do to
    optimize our model even further if we wanted to (even selecting a different algorithm
    to see if that predicts better than the current one).


    Another thing we could do is store the model. We are way more flexible in that
    area than inside SQL Server In-Database Machine Learning Services where the model
    had to be serialized and stored inside a table. In the case of Spark, we can choose
    different methods and libraries to store our models. For instance, we can use
    a library called Pickle to store our model on the filesystem, or use the `.save`
    function on the model variable to store it on an HDFS location of our choosing.
    Whenever we need our trained model to score new data, we can simply load it from
    the filesystem and use it to score the new data.


    ## Summary


    In this chapter we explored the various methods available to perform machine learning
    tasks inside SQL Server Big Data Clusters. We looked at SQL Server In-Database
    Machine Learning Services which allowed us to train, utilize, and store machine
    learning models directly inside the SQL Server Master Instance using a combination
    of T-SQL queries and the new `sp_execute_external_script` procedure. In the Spark
    department, we also have a wide variety of machine learning capabilities available
    to use. We used the Spark ML library to train a model on a dataframe and used
    it to score new data. Both of the methods have their strengths and weaknesses,
    but having both of these solutions available inside a single box allows optimal
    flexibility for all our machine learning needs.


    # 8. Create and Consume Big Data Cluster Apps


    One of the capabilities of SQL Server Big Data Clusters is the ability to build
    and run custom applications on its surface. This is actually a very powerful feature,
    since it allows you to script and run a wide variety of solutions on top of your
    Big Data Cluster. For instance, you can create an application, or app as we will
    call it in the remainder of this chapter, to perform various maintenance tasks
    on top of your data like a database backup. Another example is the ability to
    create an entry point for your machine learning processes through a REST API,
    a use case which we will explore later in this chapter.


    Apps that you create on your Big Data Cluster can, at the moment of writing this
    book, be written in R and Python, and there is an additional option to run SQL
    Server Integration Services (SSIS) packages as well. By creating apps, you can
    utilize all the computational resources available inside the Big Data Cluster
    as well as access all the data that is stored inside of it.


    Apps inside Big Data Clusters are run inside a dedicated container and can be
    replicated and scaled across the cluster. This means that you can make your apps
    handle parallel workloads and be high-performant solutions.


    In this chapter we are going to create an app that will use a pretrained machine
    learning model to classify the species of Iris plants, much like we have done
    in the previous chapter which focused on developing machine learning solutions
    inside Big Data Clusters. By building an app to score data using a machine learning
    solution, we can easily operationalize that model through a REST API. This means
    that applications that you use or build yourself can receive a prediction directly
    from the Big Data Cluster through JSON messages, allowing near real-time scoring
    directly from your application without the need to store and process the data
    first inside the Big Data Cluster.'
