  raw: 'After clicking “Next” again, we end up with a summary as shown in Figure [5-20](#480532_2_En_5_Chapter.xhtml#Fig20)
    just like after the SQL Server table wizard.


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig20_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig20_HTML.jpg)


    Figure 5-20


    Create External Table Wizard (CSV) in ADS `–` Summary


    Choose “Generate Script” and click “Cancel.” Take a look at the generated script
    (Listing [5-12](#480532_2_En_5_Chapter.xhtml#PC12)).


    ```

    BEGIN TRY

    BEGIN TRANSACTION Td436a09bbb9a472298de35f6f88d889

    USE [sales];

    CREATE EXTERNAL FILE FORMAT [FileFormat_dbo_airlines]

    WITH (FORMAT_TYPE = DELIMITEDTEXT, FORMAT_OPTIONS (FIELD_TERMINATOR = '','', STRING_DELIMITER
    = ''"'', FIRST_ROW = 2));

    CREATE EXTERNAL TABLE [dbo].[airlines]

    (

    [IATA_CODE] nvarchar(50) NOT NULL,

    [AIRLINE] nvarchar(50) NOT NULL

    )

    WITH (LOCATION = ''/Flight_Delays/airlines.csv'', DATA_SOURCE = [SqlStoragePool],
    FILE_FORMAT = [FileFormat_dbo_airlines]);

    COMMIT TRANSACTION Td436a09bbb9a472298de35f6f88d889

    END TRY

    BEGIN CATCH

    IF @@TRANCOUNT > 0

    ROLLBACK TRANSACTION Td436a09bbb9a472298de35f6f88d889

    DECLARE @ErrorMessage NVARCHAR(4000) = ERROR_MESSAGE();

    DECLARE @ErrorSeverity INT = ERROR_SEVERITY();

    DECLARE @ErrorState INT = ERROR_STATE();

    RAISERROR(@ErrorMessage, @ErrorSeverity, @ErrorState);

    END CATCH;

    Listing 5-12

    T-SQL output from the Create External Table Wizard (CSV) in ADS

    ```


    As you can see, the wizard does not recycle identical file formats but rather
    creates one format per file. This has obviously pros and cons. The big pro is
    obviously that you won’t end up with hundreds of formats. The big con is that
    you potentially start building dependencies between files where you don’t want
    any. It is up to you whether you change the script to use the previously created
    csv_file format or just keep creating new formats for this exercise.


    Repeat these steps for the other two files.


    Then, we can query and join them (see Listing [5-13](#480532_2_En_5_Chapter.xhtml#PC13))
    as if they were SQL tables to get the ten Airline/Destination City combinations
    with the highest number of cancellations.


    ```

    SELECT TOP 10 ap.CITY, al.AIRLINE, COUNT(*)

    FROM flights fl

    INNER JOIN airlines al

    ON fl.AIRLINE = al.IATA_CODE

    INNER JOIN airports ap

    ON fl.DESTINATION_AIRPORT = ap.IATA_CODE

    WHERE cancelled = 1

    GROUP BY ap.CITY,

    al.AIRLINE

    ORDER BY COUNT(*) DESC;

    Listing 5-13

    SELECT statement against previously created external tables

    ```


    This will result in an error.


    The reason for that is the fact that the wizard only looks at the first 50 lines
    of your data, so if your data does not show a certain pattern in those rows, it
    won’t be detected. The error message (Figure [5-21](#480532_2_En_5_Chapter.xhtml#Fig21))
    clearly tells us what the issue is though.


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig21_HTML.png](images/480532_2_En_5_Chapter/480532_2_En_5_Fig21_HTML.png)


    Figure 5-21


    Error message when querying the external tables


    In row 14500 (so way beyond the first 50), there is an overflow in the AIR_SYSTEM_DELAY
    column.


    If we look at the script (Listing [5-14](#480532_2_En_5_Chapter.xhtml#PC14)) for
    this table, we notice that this was detected as a tinyint.


    ```

