    sqlContext.sql("SELECT AIRLINE, AVG(DISTANCE) FROM FlightInfoTable GROUP BY AIRLINE
    ORDER BY ''avg(Distance)'' DESC").show()

    ```


    *清单 6-30 使用 SQL 按另一列分组对列进行聚合*


    ## 从 SQL Server 主实例读取数据


    SQL Server 大数据集群的一个巨大优势是，我们可以访问存储在 SQL Server 实例和 HDFS 中的数据。到目前为止，我们主要处理的是存储在
    HDFS 文件系统上的数据集，通过 Spark 直接访问它们，或者在 SQL Server 内部使用 PolyBase 创建外部表。然而，我们也可以直接从
    Spark 访问存储在大数据集群内 SQL Server 数据库中的数据。这在数据一部分存储在 SQL Server 中、另一部分存储在 HDFS 上，并且希望将两者结合起来的情况下非常有用。或者，也许你希望利用
    Spark 的分布式处理能力，从性能角度处理你的 SQL 表数据。


    获取存储在你大数据集群的 SQL Server 主实例中的数据相对简单，因为我们可以使用 Spark 原生支持的 SQL Server JDBC 驱动程序进行连接。我们可以使用
    `master-0.master-svc` 服务器名称来指示我们要连接到 SQL Server 主实例（清单 6-31）。


    ```python

    # 连接到大数据集群内的 SQL Server 主实例

    # 并将表中的数据读入数据帧

    df_sqldb_sales = spark.read.format("jdbc") \

    .option("url", "jdbc:sqlserver://master-0.master-svc;databaseName=AdventureWorks2014")
    \

    .option("dbtable", "Sales.SalesOrderDetail") \

    .option("user", "sa") \

    .option("password", "[your SA password]").load()

    ```


    *清单 6-31 针对主实例执行 SQL 查询*


    前面的代码建立了与我们的 SQL Server 主实例的连接，并连接到了我们在本书前面创建的 `AdventureWorks2014` 数据库。使用 “dbtable”
    选项，我们可以直接将 SQL 表映射到使用前面代码将要创建的数据帧。


    执行代码后，我们就有了 SQL 表数据的副本，它存储在我们 Spark 集群内的一个数据帧中，我们可以像之前展示的那样访问它（清单 6-31 导致图 6-30）。


    要仅检索前十行，请运行清单 6-32。这将产生图 6-29 的结果。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig29_HTML.jpg](img/480532_2_En_6_Fig29_HTML.jpg)


    *图 6-29 从 SQL Server 主实例中的表创建的数据帧*


    ```python

    df_sqldb_sales.show(10)

    ```


    *清单 6-32 检索前十行*


    关于这个过程需要指出的一个有趣之处是，Spark 会自动将每列的数据类型设置为与 SQL Server 数据库中配置的类型相同（在数据类型命名上有一些例外，SQL
    中的 `datetime` 在 Spark 中是 `timestamp`，以及 Spark 不直接支持的数据类型，如 `uniqueidentifier`），你可以在图
    6-30 所示的数据帧模式中看到这一点。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig30_HTML.jpg](img/480532_2_En_6_Fig30_HTML.jpg)


    *图 6-30 我们从 SQL Server 主实例导入的数据帧的模式*


    除了从 SQL 表创建数据帧之外，我们还可以提供查询来仅选择我们关心的列，或者执行一些其他的 SQL 函数，比如对数据进行分组。清单 6-33 中的示例展示了如何使用
    SQL 查询加载数据帧（图 6-31）。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig31_HTML.jpg](img/480532_2_En_6_Fig31_HTML.jpg)


    *图 6-31 df_sqldb_query 数据帧的模式*


    ```python

    # 虽然我们可以将表映射到数据帧，但也可以执行 SQL 查询

    df_sqldb_query = spark.read.format("jdbc") \

    .option("url", "jdbc:sqlserver://master-0.master-svc;databaseName=AdventureWorks2014")
    \

    .option("query", "SELECT SalesOrderID, OrderQty, UnitPrice, UnitPriceDiscount
    FROM Sales.SalesOrderDetail") \

    .option("user", "sa") \

    .option("password", "[your SA password]").load()

    df_sqldb_query.printSchema()

    ```


    *清单 6-33 使用 SQL 查询代替映射表来创建数据帧*

