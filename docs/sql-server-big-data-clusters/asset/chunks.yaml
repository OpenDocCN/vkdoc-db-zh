  raw: '# 3. Deployment of Big Data Clusters


    Now it is time to install your very own SQL Server 2019 Big Data Cluster! We will
    be handling three different scenarios in detail and we will be using a fresh machine
    for each of those scenarios:


    *   Stand-alone PolyBase installation on Windows


    *   Big Data Cluster using kubeadm on Linux


    *   Big Data Cluster using Azure Kubernetes Service (AKS)


    It is perfectly fine to run all options from the same box. But as it is likely
    that you will not be using all of them, we figured it would make sense to start
    fresh each time.


    We will be covering the installation using the Microsoft Windows operating system.
    The goal of this guide is to get your Big Data Cluster up and running as quick
    as possible, so we will configure some options that may not be best practice (like
    leaving all the service accounts and directories on default). Feel free to modify
    those as it may fit your needs.


    If you opt for the AKS installation, you will need an active Azure subscription.
    If you do not already have an Azure subscription, you can create one for free
    which includes credits which you can spend free of charge.


    ## A Little Helper: Chocolatey


    Before we get started, we’d like to point your attention to Chocolatey `–` or
    choco. In case you haven’t heard about it, choco is a free package manager for
    Windows which will allow us to install many of our prerequisites with a single
    line in PowerShell or a command prompt. You can find more information on [`http://chocolatey.org`](http://chocolatey.org)
    (see Figure [3-1](#480532_2_En_3_Chapter.xhtml#Fig1)) and you can even create
    an account and provide your own packages there.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig1_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Home page of Chocolatey


    From a simple user perspective though, there is no need to create an account or
    to download any installer.


    To make choco available on your system, open a PowerShell window in Administrative
    mode and run the script shown in Listing [3-1](#480532_2_En_3_Chapter.xhtml#PC1).


    ```

    Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol
    = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object
    System.Net.WebClient).DownloadString(''https://chocolatey.org/install.ps1''))

    Listing 3-1

    Install script for Chocolatey in PowerShell

    ```


    Once the respective command has completed, choco is installed and ready to be
    used.


    ## Installation of an On-Premises PolyBase Instance


    In case you’re only interested in the data virtualization feature of SQL Server
    2019 Big Data Clusters, the installation is actually much easier and lightweight
    than for a full environment. The PolyBase feature, which enabled the data virtualization
    feature, can be installed during the regular setup routine of SQL Server 2019
    on any platform.


    If you want to use Teradata through PolyBase, the C++ Redistributable 2012 is
    required to actually communicate with our SQL Server instance. Having SQL Server
    Management Studio (SSMS) may be helpful in either case and is nice to have it
    installed and ready to replay the examples we are showing throughout this book.


    Let’s install the packages we mentioned earlier through Chocolatey. Just run the
    three commands from Listing [3-2](#480532_2_En_3_Chapter.xhtml#PC2) and choco
    will take care of the rest.


    ```

    choco install sql-server-management-studio -y

    choco install vcredist2012 -y

    Listing 3-2

    Install script for PolyBase prerequisites

    ```


    With our prerequisites installed, we can get to the actual SQL Server installation.
    Navigate to [`www.microsoft.com/en-us/evalcenter/evaluate-sql-server-2019`](http://www.microsoft.com/en-us/evalcenter/evaluate-sql-server-2019)
    and follow the instructions to download.


    Run the downloaded file, as shown in Figure [3-2](#480532_2_En_3_Chapter.xhtml#Fig2).


    Select “Download Media” as the installation type.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig2_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig2_HTML.jpg)


    Figure 3-2


    SQL Server 2019 installer – Installation type selection


    Then confirm language and directory as shown in Figure [3-3](#480532_2_En_3_Chapter.xhtml#Fig3).


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig3_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig3_HTML.jpg)


    Figure 3-3


    SQL Server 2019 installer – Download Media dialog


    When the download is complete and successful, you will see the message in Figure
    [3-4](#480532_2_En_3_Chapter.xhtml#Fig4).


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig4_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig4_HTML.jpg)


    Figure 3-4


    SQL Server 2019 installer – Download Media successful


    Now navigate to the folder in which you have placed the download. Mount the image
    as shown in Figure [3-5](#480532_2_En_3_Chapter.xhtml#Fig5).


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig5_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig5_HTML.jpg)


    Figure 3-5


    SQL Server 2019 installer – mount ISO


    The installation can be run unattended, but for a first install, it probably makes
    more sense to explore your options. Run setup.exe, go to the Installation tab,
    and pick “New SQL Server stand-alone installation,” as shown in Figure [3-6](#480532_2_En_3_Chapter.xhtml#Fig6).


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig6_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig6_HTML.jpg)


    Figure 3-6


    SQL Server 2019 installer – main screen


    Pick the evaluation edition as shown in Figure [3-7](#480532_2_En_3_Chapter.xhtml#Fig7),
    confirm the License Terms, and the check the “Check for updates” check box on
    the subsequent screens.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig7_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig7_HTML.jpg)


    Figure 3-7


    SQL Server 2019 installer – edition selection


    Setup rules identify potential problems that might occur while running the Setup.
    Failures and warnings as shown in Figure [3-8](#480532_2_En_3_Chapter.xhtml#Fig8)
    must be corrected before the Setup can be completed.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig8_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig8_HTML.jpg)


    Figure 3-8


    SQL Server 2019 installer – Install Rules


    From the feature selection dialog shown in Figure [3-9](#480532_2_En_3_Chapter.xhtml#Fig9),
    tick the “PolyBase Query Service for External Data.” Also tick its child node
    “Java connector for HDFS data sources.”'
  trans: '

    # 3. 大数据集群的部署


    现在是时候安装属于您自己的 `SQL Server 2019 大数据集群` 了！我们将详细处理三种不同的场景，并且会为每个场景使用一台全新的机器：


    *   在 `Windows` 上独立安装 `PolyBase`

    *   在 `Linux` 上使用 `kubeadm` 部署大数据集群

    *   使用 `Azure Kubernetes Service (AKS)` 部署大数据集群


    从同一台机器运行所有选项是完全可以的。但考虑到您可能不会用到全部方案，我们认为每次都从头开始会更合理。


    我们将介绍使用 `Microsoft Windows` 操作系统的安装过程。本指南的目标是让您的 `大数据集群` 尽快启动并运行，因此我们会配置一些可能并非最佳实践的选项（比如将所有服务账户和目录都保留为默认设置）。请根据您的需求随意修改这些设置。


    如果您选择 `AKS` 安装，则需要一个有效的 `Azure` 订阅。如果您还没有 `Azure` 订阅，可以免费创建一个，其中包含可免费使用的额度。


    ## 一个小助手：`Chocolatey`


    在开始之前，我们想请您关注 `Chocolatey`（或称 `choco`）。如果您没听说过它，`choco` 是一个适用于 `Windows` 的免费软件包管理器，它允许我们通过在
    `PowerShell` 或 `命令提示符` 中执行一行命令来安装许多先决条件。您可以在 [`http://chocolatey.org`](http://chocolatey.org)
    找到更多信息（参见图 3-1），您甚至可以在那里创建账户并提供自己的软件包。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig1_HTML.jpg](img/480532_2_En_3_Fig1_HTML.jpg)

    图 3-1

    `Chocolatey` 主页


    不过，从一个简单用户的角度来看，无需创建账户或下载任何安装程序。


    要在您的系统上启用 `choco`，请以管理员模式打开一个 `PowerShell` 窗口，并运行清单 3-1 中所示的脚本。


    ```

    Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol
    = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object
    System.Net.WebClient).DownloadString(''https://chocolatey.org/install.ps1''))

    ```

    清单 3-1

    在 `PowerShell` 中安装 `Chocolatey` 的脚本


    相应的命令执行完成后，`choco` 即安装完毕并可以使用了。


    ## 安装本地 `PolyBase` 实例


    如果您只对 `SQL Server 2019 大数据集群` 的数据虚拟化功能感兴趣，那么安装过程实际上比完整环境要简单和轻量得多。实现数据虚拟化功能的 `PolyBase`
    特性，可以在任何平台的常规 `SQL Server 2019` 安装过程中安装。


    如果您想通过 `PolyBase` 使用 `Teradata`，则需要安装 `C++ Redistributable 2012` 才能与我们的 `SQL Server`
    实例进行实际通信。在任何情况下，安装 `SQL Server Management Studio (SSMS)` 都可能会有所帮助，并且安装好它以便重现我们在本书中展示的示例是件好事。


    让我们通过 `Chocolatey` 安装前面提到的软件包。只需运行清单 3-2 中的三个命令，`choco` 就会处理其余的事情。


    ```

    choco install sql-server-management-studio -y

    choco install vcredist2012 -y

    ```

    清单 3-2

    安装 `PolyBase` 先决条件的脚本


    安装好先决条件后，我们就可以开始实际的 `SQL Server` 安装了。导航到 [`www.microsoft.com/en-us/evalcenter/evaluate-sql-server-2019`](http://www.microsoft.com/en-us/evalcenter/evaluate-sql-server-2019)
    并按照说明进行下载。


    运行下载的文件，如图 3-2 所示。


    选择“下载媒体”作为安装类型。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig2_HTML.jpg](img/480532_2_En_3_Fig2_HTML.jpg)

    图 3-2

    `SQL Server 2019` 安装程序 - 安装类型选择


    然后确认语言和目录，如图 3-3 所示。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig3_HTML.jpg](img/480532_2_En_3_Fig3_HTML.jpg)

    图 3-3

    `SQL Server 2019` 安装程序 - 下载媒体对话框


    下载完成并成功后，您将看到图 3-4 中的消息。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig4_HTML.jpg](img/480532_2_En_3_Fig4_HTML.jpg)

    图 3-4

    `SQL Server 2019` 安装程序 - 下载媒体成功


    现在导航到您保存下载文件的文件夹。挂载映像，如图 3-5 所示。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig5_HTML.jpg](img/480532_2_En_3_Fig5_HTML.jpg)

    图 3-5

    `SQL Server 2019` 安装程序 - 挂载 ISO


    安装可以无人值守运行，但对于第一次安装，可能更有意义的是探索您的选项。运行 `setup.exe`，转到“安装”选项卡，然后选择“新建 `SQL Server`
    独立安装”，如图 3-6 所示。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig6_HTML.jpg](img/480532_2_En_3_Fig6_HTML.jpg)

    图 3-6

    `SQL Server 2019` 安装程序 - 主屏幕


    选择评估版，如图 3-7 所示，确认许可条款，并在后续屏幕上勾选“检查更新”复选框。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig7_HTML.jpg](img/480532_2_En_3_Fig7_HTML.jpg)

    图 3-7

    `SQL Server 2019` 安装程序 - 版本选择


    安装程序规则会识别在运行安装程序时可能出现的潜在问题。如图 3-8 所示的失败和警告必须在安装完成前得到纠正。


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig8_HTML.jpg](img/480532_2_En_3_Fig8_HTML.jpg)

    图 3-8

    `SQL Server 2019` 安装程序 - 安装规则


    从图 3-9 所示的功能选择对话框中，勾选“`PolyBase 查询对外部数据`”。同时勾选其子节点“用于 HDFS 数据源的 Java 连接器”。

    '
