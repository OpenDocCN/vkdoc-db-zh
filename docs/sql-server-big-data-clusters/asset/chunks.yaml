    *   `kubeadm-prod`


    这些与你在 Azure Data Studio 中部署时看到的选项相匹配。你总是可以通过运行 `azdata bdc config init -t <yourtarget>`
    而不指定源来获取所有有效选项。请记住，这些只是模板。如果你首选的环境没有作为一个选项提供，这并不一定意味着它不受支持，只是你需要对现有模板进行一些调整，以使其匹配你的目标。输出如图
