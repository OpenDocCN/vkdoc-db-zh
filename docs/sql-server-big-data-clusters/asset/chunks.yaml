    # Create a new df_flightinfo_times data frame from df_flightinfo

    # with a new column that does a calculation between the scheduled and elapsed
    time

    df_flightinfo_times = df_flightinfo.withColumn("Time_diff", df_flightinfo.ELAPSED_TIME
    - df_flightinfo.SCHEDULED_TIME).select("FLIGHT_NUMBER", "AIRLINE", "SCHEDULED_TIME",
    "ELAPSED_TIME", "Time_diff")

    # Return the first ten rows

    df_flightinfo_times.show(10)

