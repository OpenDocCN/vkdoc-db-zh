- fmt: "# Accessing Data in an Azure Blob Storage\n\nIf you are storing data in an\
    \ Azure Blob Storage, there is no need (apart from maybe network latency) to copy\
    \ that data into your `SqlStoragePool`. You can also access a Blob Storage by\
    \ defining it as an external data source (Listing 5-20).\n\n```sql\nCREATE EXTERNAL\
    \ DATA SOURCE AzureStorage with (\nTYPE = HADOOP,\nLOCATION ='wasbs://@.blob.core.windows.net',\n\
    CREDENTIAL = AzureStorageCredential\n);\n```\nListing 5-20\nCreate external data\
    \ source using an Azure Blob Storage\n\n# External Tables from Other Data Sources\n\
    \n## File-Based Data Sources\n\nOther variations of file-based data sources are\
    \ Parquet, Hive RCFile, and Hive ORC; however, if you are using the storage pool,\
    \ only delimited and Parquet files are supported at this point.\n\nAs these are\
    \ compressed file types, we need to provide the `DATA_COMPRESSION` as well as,\
    \ for RCFile, the `SERDE_METHOD` (Listing 5-21).\n\n```sql\n-- Create an external\
    \ file format for PARQUET files.\nCREATE EXTERNAL FILE FORMAT file_format_name\n\
    WITH (\nFORMAT_TYPE = PARQUET\n[ , DATA_COMPRESSION = {\n'org.apache.hadoop.io.compress.SnappyCodec'\n\
    | 'org.apache.hadoop.io.compress.GzipCodec'      }\n]);\n--Create an external\
    \ file format for ORC files.\nCREATE EXTERNAL FILE FORMAT file_format_name\nWITH\
    \ (\nFORMAT_TYPE = ORC\n[ , DATA_COMPRESSION = {\n'org.apache.hadoop.io.compress.SnappyCodec'\n\
    | 'org.apache.hadoop.io.compress.DefaultCodec'      }\n]);\n--Create an external\
    \ file format for RCFILE.\nCREATE EXTERNAL FILE FORMAT file_format_name\nWITH\
    \ (\nFORMAT_TYPE = RCFILE,\nSERDE_METHOD = {\n'org.apache.hadoop.hive.serde2.columnar.LazyBinaryColumnarSerDe'\n\
    | 'org.apache.hadoop.hive.serde2.columnar.ColumnarSerDe'\n}\n[ , DATA_COMPRESSION\
    \ = 'org.apache.hadoop.io.compress.DefaultCodec' ]);\n```\nListing 5-21\nSample\
    \ CREATE statements for other external table types\n\n(taken from the official\
    \ Microsoft Docs, [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-file-format-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-file-format-transact-sql))\n\
    \n## ODBC\n\nWhen trying to connect to an external data source through a generic\
    \ ODBC, you need to provide the server (and optionally a port) just like when\
    \ adding a SQL Server, but in addition, you will need to specify the driver as\
    \ well (Listing 5-22), so SQL Server knows how to connect to the source.\n\n```sql\n\
    CREATE EXTERNAL DATA SOURCE \nWITH (\nLOCATION = odbc://[:],\nCONNECTION_OPTIONS\
    \ = 'Driver={};\nServerNode = :',\nPUSHDOWN = ON,\nCREDENTIAL = credential_name\n\
    );\n```\nListing 5-22\nCreate external data source against an ODBC source\n\n\
    The `PUSHDOWN` flag defines whether computation will be pushed down to the source\
    \ and is `ON` by default.\n\n## Others\n\nFor the other built in, the syntax follows\
    \ the generic schema (Listing 5-23).\n\n```sql\nCREATE EXTERNAL DATA SOURCE \n\
    WITH (\nLOCATION = ://[:],\nCREDENTIAL = credential_name\n);\n```\nListing 5-23\n\
    Generic CREATE statement for an external data source\n\nwhere you replace `<vendor>`\
    \ by the name of the vendor of the built-in connector you’re trying to use.\n\n\
    For Oracle, that would look like Listing 5-24.\n\n```sql\nCREATE EXTERNAL DATA\
    \ SOURCE \nWITH (\nLOCATION = oracle://[:],\nCREDENTIAL = credential_name\n```\n\
    Listing 5-24\nCREATE statement for an external data source in Oracle\n\nThe same\
    \ logic applies for Teradata and MongoDB, and we expect all future vendors to\
    \ be implemented in the same way."
  raw: "```\nDROP EXTERNAL TABLE [dbo].[flights]\nGO\nCREATE EXTERNAL TABLE [dbo].[flights]\n\
    (\n[YEAR] smallint,\n[MONTH] tinyint,\n[DAY] tinyint,\n[DAY_OF_WEEK] tinyint,\n\
    [AIRLINE] nvarchar(50),\n[FLIGHT_NUMBER] smallint,\n[TAIL_NUMBER] nvarchar(50),\n\
    [ORIGIN_AIRPORT] nvarchar(50),\n[DESTINATION_AIRPORT] nvarchar(50),\n[SCHEDULED_DEPARTURE]\
    \ time,\n[DEPARTURE_TIME] time,\n[DEPARTURE_DELAY] smallint,\n[TAXI_OUT] tinyint,\n\
    [WHEELS_OFF] time,\n[SCHEDULED_TIME] smallint,\n[ELAPSED_TIME] smallint,\n[AIR_TIME]\
    \ smallint,\n[DISTANCE] smallint,\n[WHEELS_ON] time,\n[TAXI_IN] tinyint,\n[SCHEDULED_ARRIVAL]\
    \ time,\n[ARRIVAL_TIME] time,\n[ARRIVAL_DELAY] smallint,\n[DIVERTED] bit,\n[CANCELLED]\
    \ bit,\n[CANCELLATION_REASON] nvarchar(50),\n[AIR_SYSTEM_DELAY] bigint,\n[SECURITY_DELAY]\
    \ bigint,\n[AIRLINE_DELAY] bigint,\n[LATE_AIRCRAFT_DELAY] bigint,\n[WEATHER_DELAY]\
    \ bigint\n)\nWITH (LOCATION = N'/Flight_Delays/flights.csv', DATA_SOURCE = [SqlStoragePool],\
    \ FILE_FORMAT = [FileFormat_flights]);\nListing 5-18\nDROP and CREATE external\
    \ table flights again with all columns allowing NULLS\n```\n\nNow, both queries\
    \ run smoothly! You will notice though that performance is not great which is\
    \ mainly due to the lookup against the other two, rather small, flat files.\n\n\
    In such cases, we recommend to either store that data in a persisted or temporary\
    \ SQL table (Listing [5-19](#480532_2_En_5_Chapter.xhtml#PC19)).\n\n```\nSELECT\
    \ * into #al FROM airlines\nSELECT * into #ap FROM airports\nSELECT TOP 10 *\n\
    FROM flights fl\nINNER JOIN #al al\nON fl.AIRLINE = al.IATA_CODE\nINNER JOIN #ap\
    \ ap\nON fl.DESTINATION_AIRPORT = ap.IATA_CODE;\nDROP TABLE #al\nDROP TABLE #ap\n\
    Listing 5-19\nStore data from CSV in temp tables instead of direct queries\n```\n\
    \nThis improves performance tremendously without wasting too many system resources\
    \ as the large dataset stays within the CSV.\n\nOne of the biggest challenges\
    \ in such an environment is finding a good trade-off between data redundancy and\
    \ performance.\n\n### Accessing Data in an Azure Blob Storage\n\nIf you are storing\
    \ data in an Azure Blob Storage, there is no need (apart from maybe network latency)\
    \ to copy that data into your SqlStoragePool. You can also access a Blob Storage\
    \ by defining it as an external data source (Listing [5-20](#480532_2_En_5_Chapter.xhtml#PC20)).\n\
    \n```\nCREATE EXTERNAL DATA SOURCE AzureStorage with (\nTYPE = HADOOP,\nLOCATION\
    \ ='wasbs://@.blob.core.windows.net',\nCREDENTIAL = AzureStorageCredential\n);\n\
    Listing 5-20\nCreate external data source using an Azure Blob Storage\n```\n\n\
    ## External Tables from Other Data Sources\n\n### File-Based Data Sources\n\n\
    Other variations of file-based data sources are Parquet, Hive RCFile, and Hive\
    \ ORC; however, if you are using the storage pool, only delimited and Parquet\
    \ files are supported at this point.\n\nAs these are compressed file types, we\
    \ need to provide the DATA_COMPRESSION as well as, for RCFile, the SERDE_METHOD\
    \ (Listing [5-21](#480532_2_En_5_Chapter.xhtml#PC21)).\n\n```\n-- Create an external\
    \ file format for PARQUET files.\nCREATE EXTERNAL FILE FORMAT file_format_name\n\
    WITH (\nFORMAT_TYPE = PARQUET\n[ , DATA_COMPRESSION = {\n'org.apache.hadoop.io.compress.SnappyCodec'\n\
    | 'org.apache.hadoop.io.compress.GzipCodec'      }\n]);\n--Create an external\
    \ file format for ORC files.\nCREATE EXTERNAL FILE FORMAT file_format_name\nWITH\
    \ (\nFORMAT_TYPE = ORC\n[ , DATA_COMPRESSION = {\n'org.apache.hadoop.io.compress.SnappyCodec'\n\
    | 'org.apache.hadoop.io.compress.DefaultCodec'      }\n]);\n--Create an external\
    \ file format for RCFILE.\nCREATE EXTERNAL FILE FORMAT file_format_name\nWITH\
    \ (\nFORMAT_TYPE = RCFILE,\nSERDE_METHOD = {\n'org.apache.hadoop.hive.serde2.columnar.LazyBinaryColumnarSerDe'\n\
    | 'org.apache.hadoop.hive.serde2.columnar.ColumnarSerDe'\n}\n[ , DATA_COMPRESSION\
    \ = 'org.apache.hadoop.io.compress.DefaultCodec' ]);\nListing 5-21\nSample CREATE\
    \ statements for other external table types\n```\n\n(taken from the official Microsoft\
    \ Docs, [`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-file-format-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-file-format-transact-sql))\n\
    \n### ODBC\n\nWhen trying to connect to an external data source through a generic\
    \ ODBC, you need to provide the server (and optionally a port) just like when\
    \ adding a SQL Server, but in addition, you will need to specify the driver as\
    \ well (Listing [5-22](#480532_2_En_5_Chapter.xhtml#PC22)), so SQL Server knows\
    \ how to connect to the source.\n\n```\nCREATE EXTERNAL DATA SOURCE \nWITH (\n\
    LOCATION = odbc://[:],\nCONNECTION_OPTIONS = 'Driver={};\nServerNode = :',\nPUSHDOWN\
    \ = ON,\nCREDENTIAL = credential_name\n);\nListing 5-22\nCreate external data\
    \ source against an ODBC source\n```\n\nThe PUSHDOWN flag defines whether computation\
    \ will be pushed down to the source and is ON by default.\n\n### Others\n\nFor\
    \ the other built in, the syntax follows the generic schema (Listing [5-23](#480532_2_En_5_Chapter.xhtml#PC23)).\n\
    \n```\nCREATE EXTERNAL DATA SOURCE \nWITH (\nLOCATION = ://[:],\nCREDENTIAL =\
    \ credential_name\n);\nListing 5-23\nGeneric CREATE statement for an external\
    \ data source\n```\n\nwhere you replace <vendor> by the name of the vendor of\
    \ the built-in connector you’re trying to use.\n\nFor Oracle, that would look\
    \ like Listing [5-24](#480532_2_En_5_Chapter.xhtml#PC24).\n\n```\nCREATE EXTERNAL\
    \ DATA SOURCE \nWITH (\nLOCATION = oracle://[:],\nCREDENTIAL = credential_name\n\
    Listing 5-24\nCREATE statement for an external data source in Oracle\n```\n\n\
    The same logic applies for Teradata and MongoDB, and we expect all future vendors\
    \ to be implemented in the same way."
  trans: "# 访问 Azure Blob 存储中的数据\n\n如果您将数据存储在 Azure Blob 存储中，除了可能的网络延迟外，无需将数据复制到您的\
    \ `SqlStoragePool` 中。您还可以通过将其定义为外部数据源来访问 Blob 存储（清单 5-20）。\n\n```sql\nCREATE EXTERNAL\
    \ DATA SOURCE AzureStorage with (\nTYPE = HADOOP,\nLOCATION ='wasbs://@.blob.core.windows.net',\n\
    CREDENTIAL = AzureStorageCredential\n);\n```\n清单 5-20\n使用 Azure Blob 存储创建外部数据源\n\
    \n# 来自其他数据源的外部表\n\n## 基于文件的数据源\n\n其他基于文件的数据源变体包括 Parquet、Hive RCFile 和 Hive ORC；但是，如果您使用的是存储池，目前仅支持分隔符文件和\
    \ Parquet 文件。\n\n由于这些是压缩文件类型，我们需要提供 `DATA_COMPRESSION`，对于 RCFile，还需要提供 `SERDE_METHOD`（清单\
    \ 5-21）。\n\n```sql\n-- 为 PARQUET 文件创建外部文件格式。\nCREATE EXTERNAL FILE FORMAT file_format_name\n\
    WITH (\nFORMAT_TYPE = PARQUET\n[ , DATA_COMPRESSION = {\n'org.apache.hadoop.io.compress.SnappyCodec'\n\
    | 'org.apache.hadoop.io.compress.GzipCodec'      }\n]);\n--为 ORC 文件创建外部文件格式。\n\
    CREATE EXTERNAL FILE FORMAT file_format_name\nWITH (\nFORMAT_TYPE = ORC\n[ , DATA_COMPRESSION\
    \ = {\n'org.apache.hadoop.io.compress.SnappyCodec'\n| 'org.apache.hadoop.io.compress.DefaultCodec'\
    \      }\n]);\n--为 RCFILE 创建外部文件格式。\nCREATE EXTERNAL FILE FORMAT file_format_name\n\
    WITH (\nFORMAT_TYPE = RCFILE,\nSERDE_METHOD = {\n'org.apache.hadoop.hive.serde2.columnar.LazyBinaryColumnarSerDe'\n\
    | 'org.apache.hadoop.hive.serde2.columnar.ColumnarSerDe'\n}\n[ , DATA_COMPRESSION\
    \ = 'org.apache.hadoop.io.compress.DefaultCodec' ]);\n```\n清单 5-21\n其他外部表类型的 CREATE\
    \ 语句示例\n\n（摘自官方 Microsoft 文档，[`https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-file-format-transact-sql`](https://docs.microsoft.com/en-us/sql/t-sql/statements/create-external-file-format-transact-sql)）\n\
    \n## ODBC\n\n当尝试通过通用 ODBC 连接到外部数据源时，您需要提供服务器（以及可选的端口），就像添加 SQL Server 一样，但此外，您还需要指定驱动程序（清单\
    \ 5-22），以便 SQL Server 知道如何连接到该源。\n\n```sql\nCREATE EXTERNAL DATA SOURCE \nWITH\
    \ (\nLOCATION = odbc://[:],\nCONNECTION_OPTIONS = 'Driver={};\nServerNode = :',\n\
    PUSHDOWN = ON,\nCREDENTIAL = credential_name\n);\n```\n清单 5-22\n针对 ODBC 源创建外部数据源\n\
    \n`PUSHDOWN` 标志定义是否将计算下推到源，默认值为 `ON`。\n\n## 其他\n\n对于其他内置连接器，语法遵循通用模式（清单 5-23）。\n\
    \n```sql\nCREATE EXTERNAL DATA SOURCE \nWITH (\nLOCATION = ://[:],\nCREDENTIAL\
    \ = credential_name\n);\n```\n清单 5-23\n外部数据源的通用 CREATE 语句\n\n其中，您将 `<vendor>`\
    \ 替换为您尝试使用的内置连接器的供应商名称。\n\n对于 Oracle，将如清单 5-24 所示。\n\n```sql\nCREATE EXTERNAL\
    \ DATA SOURCE \nWITH (\nLOCATION = oracle://[:],\nCREDENTIAL = credential_name\n\
    ```\n清单 5-24\n针对 Oracle 中的外部数据源的 CREATE 语句\n\n相同的逻辑适用于 Teradata 和 MongoDB，我们期望所有未来的供应商都将以相同的方式实现。"
- fmt: '### The SqlDataPool


    `SqlDataPool` 用于处理大数据集群的数据池，它允许你将来自 SQL 表的数据分布到整个池中。


    就像存储池一样，首先需要在你想要使用的每个数据库中创建一个相应的指针，如清单 [5-25](#480532_2_En_5_Chapter.xhtml#PC25)
    所示。


    ```sql

    IF NOT EXISTS(SELECT * FROM sys.external_data_sources WHERE name = ''SqlDataPool'')

    CREATE EXTERNAL DATA SOURCE SqlDataPool

    WITH (LOCATION = ''sqldatapool://controller-svc/default'');

    -- Listing 5-25

    -- T-SQL code to create pointer to the SQL Data Pool

    ```


    我们将在销售数据库中再次执行此操作。


    首先，我们再次创建一个外部表（清单 [5-26](#480532_2_En_5_Chapter.xhtml#PC26)）。请注意，与之前的示例不同，之前我们指定的是特定文件或位置，而在这里，我们只提供提示，表明此表应存储在
    `SqlDataPool` 中并使用轮询（`ROUND_ROBIN`）方式进行分布。


    ```sql

    CREATE EXTERNAL TABLE [web_clickstream_clicks_data_pool]

    ("wcs_user_sk" BIGINT , "i_category_id" BIGINT , "clicks" BIGINT)

    WITH

    (

    DATA_SOURCE = SqlDataPool,

    DISTRIBUTION = ROUND_ROBIN

    );

    -- Listing 5-26

    -- CREATE statement for external table on SqlDataPool

    ```


    你现在可以使用常规的 `INSERT INTO` 语句将数据插入此表，如清单 [5-27](#480532_2_En_5_Chapter.xhtml#PC27)
    所示。


    ```sql

    INSERT INTO web_clickstream_clicks_data_pool

    SELECT wcs_user_sk, i_category_id, COUNT_BIG(*) as clicks

    FROM sales.dbo.web_clickstreams_hdfs_parquet

    INNER JOIN sales.dbo.item it ON (wcs_item_sk = i_item_sk

    AND wcs_user_sk IS NOT NULL)

    GROUP BY wcs_user_sk, i_category_id

    -- Listing 5-27

    -- Populate table in SqlDataPool from SQL Query

    ```


    与之前的所有示例一样，这个外部表现在可以像任何其他表一样进行查询和联接（清单 [5-28](#480532_2_En_5_Chapter.xhtml#PC28)）。


    ```sql

    SELECT count(*) FROM [dbo].[web_clickstream_clicks_data_pool]

    SELECT TOP 10 * FROM [dbo].[web_clickstream_clicks_data_pool]

    SELECT TOP (100)

    w.wcs_user_sk,

    SUM( CASE WHEN i.i_category = ''Books'' THEN 1 ELSE 0 END) AS book_category_clicks,

    SUM( CASE WHEN w.i_category_id = 1 THEN 1 ELSE 0 END) AS [Home & Kitchen],

    SUM( CASE WHEN w.i_category_id = 2 THEN 1 ELSE 0 END) AS [Music],

    SUM( CASE WHEN w.i_category_id = 3 THEN 1 ELSE 0 END) AS [Books],

    SUM( CASE WHEN w.i_category_id = 4 THEN 1 ELSE 0 END) AS [Clothing & Accessories],

    SUM( CASE WHEN w.i_category_id = 5 THEN 1 ELSE 0 END) AS [Electronics],

    SUM( CASE WHEN w.i_category_id = 6 THEN 1 ELSE 0 END) AS [Tools & Home Improvement],

    SUM( CASE WHEN w.i_category_id = 7 THEN 1 ELSE 0 END) AS [Toys & Games],

    SUM( CASE WHEN w.i_category_id = 8 THEN 1 ELSE 0 END) AS [Movies & TV],

    SUM( CASE WHEN w.i_category_id = 9 THEN 1 ELSE 0 END) AS [Sports & Outdoors]

    FROM [dbo].[web_clickstream_clicks_data_pool] as w

    INNER JOIN (SELECT DISTINCT i_category_id, i_category FROM item) as i

    ON i.i_category_id = w.i_category_id

    GROUP BY w.wcs_user_sk;

    -- Listing 5-28

    -- SELECT against table in SqlDataPool (stand-alone and joined against other tables)

    ```


    执行计划（图 [5-23](#480532_2_En_5_Chapter.xhtml#Fig23)）与我们之前查询存储池时看到的情况类似。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig23_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig23_HTML.jpg)


    **图 5-23**


    **在 ADS 中的执行计划**


    请注意，与 `SqlStoragePool` 不同，位于数据池中的数据在 Azure Data Studio 的 HDFS 文件夹中不显示为文件，因为其数据存储在常规的
    SQL 表中！


    ### Indexes on the SqlDataPool


    `SqlDataPool` 与其他外部数据源的一个主要区别在于它由常规的 SQL Server 表组成，这意味着你可以直接控制这些表上的索引。


    默认情况下，`SqlDataPool` 中的每个表都会使用聚集列存储索引创建。由于扩展（scale out）以及数据池的主要使用场景是分析工作负载，这很可能开箱即用地满足许多查询需求。


    如果你仍然想创建或更改索引，这需要在数据池内部进行，可以使用 `EXECUTE AT` 开关来实现，如清单 [5-29](#480532_2_En_5_Chapter.xhtml#PC29)
    所示。


    ```sql

    exec () AT Data_Source SqlDataPool

    -- Listing 5-29

    -- EXEC with EXECUTE AT

    ```


    你可以使用它在数据池上运行任何类型的查询，它将为数据池中的每个节点返回一个结果网格。例如，要获取数据池中所有表的列表，运行清单 [5-30](#480532_2_En_5_Chapter.xhtml#PC30)。


    ```sql

    exec (''SELECT * FROM sys.tables'') AT Data_Source SqlDataPool

    -- Listing 5-30

    -- Get a list of tables in data pool

    ```


    结果如图 [5-24](#480532_2_En_5_Chapter.xhtml#Fig24) 所示。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig24_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig24_HTML.jpg)


    **图 5-24**


    **数据池中表列表的结果**


    你可能会感到有点惊讶，因为你可能期望不同的表。原因在于，就像你的主实例一样，数据池也会有多个数据库，因此上下文很重要。让我们通过切换当前数据库上下文再试一次，如清单
    [5-31](#480532_2_En_5_Chapter.xhtml#PC31) 所示。这仅适用于在 `SqlDataPool` 中至少有一个表的数据库，因为数据库是在那时创建的。


    ```sql

    exec (''USE sales; SELECT * FROM sys.tables'') AT Data_Source SqlDataPool

    -- Listing 5-31

    -- Get a list of tables in data pool from sales database

    ```


    这次的结果（见图 [5-25](#480532_2_En_5_Chapter.xhtml#Fig25)）看起来更符合我们的预期。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig25_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig25_HTML.jpg)


    **图 5-25**


    **从销售数据库查询数据池中表列表的结果**


    要添加索引，你只需在 `EXEC` 语句中添加相应的 `CREATE INDEX` 语句，如清单 [5-32](#480532_2_En_5_Chapter.xhtml#PC32)
    所示。


    ```sql

    EXEC (''USE Sales; CREATE NONCLUSTERED INDEX [CI_wcs_user_sk] ON [dbo].[web_clickstream_clicks_data_pool]
    ([wcs_user_sk] ASC)'') AT DATA_SOURCE SqlDataPool

    -- Listing 5-32

    -- CREATE INDEX in data pool

    ```


    ## Summary


    在本章中，我们使用了先前加载的数据，并通过多种技术对其进行了查询，包括使用 T-SQL、从另一个 SQL Server 查询以及查询平面文件。我们还了解了如何自动化该方面的某些任务。


    正如你之前所学的，T-SQL 并不是查询大数据集群的唯一方式：另一种方式是 Spark。第 [6](#480532_2_En_6_Chapter.xhtml)
    章将引导你完成该过程！


