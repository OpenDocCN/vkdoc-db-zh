    Group a data frame


    In this example, we used the `sort` function instead of the `orderBy` we used
    earlier in this section to sort the results. Both functions are essentially identical
    (`orderBy` is actually an alias for `sort`) and there is no difference in terms
    of functionality between both functions.


    ## More Advanced Data Frame Handling


    So far, we’ve looked at – relatively – simple operations we can perform on data
    frames like selecting specific rows, grouping data, and ordering data frames.


    However, there are far more things we can do in Spark when it comes to data frames,
    for instance, joining multiple data frames together into a new data frame. In
    this section, we are going to focus on doing some more advanced data frame wrangling.


    To start off, so far, we have been working with a single dataset which we imported
    into a data frame that contains information of the various airports in America.
    In many situations you do not have a single dataset that contains everything you
    need, meaning you will end up with multiple data frames. Using PySpark we can
    join these data frames together on a key the data frames share and build a new,
    joined, data frame.


    Before we can get started on joining data frames together, we will need to import
    the other sample datasets from the 2015 Flight Delays and Cancellations examples
    we are working with. If you are following along with the examples in this chapter,
    you should already have a data frame called `df_airports` that contains the data
    of the `airports.csv` file. If you haven’t, you can run the following code (Listing
    6-16) to import the data from the file into a data frame.


    ```

    df_airports = spark.read.format(''csv'').options(header=''true'', inferSchema="true").load(''/Flight_Delays/airports.csv'')

    ```

    Listing 6-16

    Import airports.csv into data frame


    We can use the same command (Listing 6-17) to import the other two CSV files:
    `airlines.csv` and `flights.csv`.


    ```

    # Importing the other CSV files into data frames as well

    df_airlines = spark.read.format(''csv'').options(header=''true'', inferSchema="true").load(''/Flight_Delays/airlines.csv'')

    df_flights = spark.read.format(''csv'').options(header=''true'', inferSchema="true").load(''/Flight_Delays/flights.csv'')

    ```

    Listing 6-17

    Import airlines.csv and flights.csv into data frames


    After executing Listing 6-17, we should have three separate data frames available
    to us in the PySpark notebook: `df_airports`, `df_airlines`, and `df_flights`.


    To join two data frames, we have to supply the key on which we are joining the
    two data frames on. If this key is identical on both data frames, we do not have
    to explicitly set the mapping in the join (and we only need to supply the column
    name as a parameter). However, we believe it is always good practice to describe
    the join mapping to make the code easier to understand. Also, in the sample dataset
    we are using, the data frame columns have different column names on which we need
    to join requiring an explicit join mapping.


    The code example of Listing 6-18 will join the `df_flights` and `df_airlines`
    data frames together using an inner join and output a new data frame called `df_flightinfo`.
    We return the schema of the newly created data frame to see how the two data frames
    are joined together (Figure 6-16).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig16_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig16_HTML.jpg)

    Figure 6-16

    Schema of the df_flightinfo data frame which is a join between df_flights and
    df_airlines


    ```

    from pyspark.sql.functions import *

    # Let''s join the df_airlines and df_flights data frames using an inner join on
    the airline code

    df_flightinfo = df_flights.join(df_airlines, df_flights.AIRLINE == df_airlines.IATA_CODE,
    how="inner")

    # Print the schema of the joined data frame

    df_flightinfo.printSchema()

    ```

    Listing 6-18

    Join two data frames and retrieve the schema of the result


    As you can see in Figure 6-16, the two columns (`IATA_CODE` and `AIRLINE`) that
    make up the `df_airlines` data frame are added to the right side of the new `df_flightinfo`
    data frame. Because we already have the `IATA_CODE` in the `df_flights` data frame,
    we end up having duplicate columns in the new data frame (to make matters more
    interesting: in this sample dataset the `df_flights` data frame uses the column
    “AIRLINE” to denote the IATA code on which we join the `df_airlines` data frame.
    The `df_airlines` data frame also has the `AIRLINE` column but it shows the full
    airline name. Essentially this means both `AIRLINE` columns in the `df_flightinfo`
    data frame contain different data).


    We can easily drop the duplicate column when joining both data frames by specifying
    it in the join command (Listing 6-19 and Figure 6-17).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig17_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig17_HTML.jpg)

    Figure 6-17

    df_flightinfo schema without the duplicate AIRLINE column


    ```

    from pyspark.sql.functions import *

    # We will join both data frames again but this time drop the AIRLINE column of
    the df_flights data frame

    df_flightinfo = df_flights.join(df_airlines, df_flights.AIRLINE == df_airlines.IATA_CODE,
    how="inner").drop(df_flights.AIRLINE)

    # Print the schema of the joined data frame

    df_flightinfo.printSchema()

    ```

    Listing 6-19

    Joining two data frames while dropping a column


    As you can see from the schema shown in Figure 6-17, we now end up with only one
    `AIRLINE` column which contains the data we are after (the full airline name).


    With the duplicate column removed, let’s select some information from the new
    `df_flightinfo` data frame. For this example, let’s say we are interested in seeing
    the scheduled and actual elapsed travel times for each flight together with the
    airline that performed the flight. We can simply select the columns we are interested
    in just as we did a number of times already in this chapter. This time using the
    code shown in Listing 6-20 results in the table shown in Figure 6-18.


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig18_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig18_HTML.jpg)

    Figure 6-18

    Scheduled and elapsed flight time for each flight number


    ```

    # Select a number of columns from the joined data frame

    df_flightinfo.select("FLIGHT_NUMBER", "AIRLINE", "SCHEDULED_TIME", "ELAPSED_TIME").show()

    ```

    Listing 6-20

    Select a number of columns from the joined data frame


    Now let’s say we are analyzing this data since we are interested in the differences
    between the scheduled time for a flight and the actual time the flight took. While
    we can manually look at each of the rows in the data frame to figure out what
    the difference between both of the time columns is, it is far easier to let Spark
    perform this calculation for you. For this scenario, we are using the following
    code (Listing 6-21) to create a new data frame that selects a subset of the columns
    of the original `df_flightinfo` data frame and does a simple calculation between
    the `SCHEDULE_TIME` and the `ELAPSED_TIME` columns (Figure 6-19).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig19_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig19_HTML.jpg)

    Figure 6-19

    df_flightinfo_times data frames that show travel time information'
