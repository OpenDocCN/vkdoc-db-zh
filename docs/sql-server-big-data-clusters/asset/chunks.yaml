    ## 箱线图解读


    与直方图类似，箱线图以图形方式展示数据的分布情况。箱线图（也称为箱须图）相比直方图能提供更多关于数据分布的细节。箱线图的“箱体”称为四分位距（IQR），包含了我们数据中间的50%。在我们的例子中，可以看到价格数据中间的50%大约在
    7,500 到 17,500 之间。IQR 下方的线（或须）显示了数据底部的25%，而 IQR 上方的须则显示了顶部的25%。顶部须上方的圆圈显示了数据集中的离群值，在本例中用于标示价格高于
    `1.5 * IQR` 的汽车。离群值可能对平均价格产生巨大影响，值得调查以确保它们不是错误。最后，IQR 内部的绿色条表示 `price` 列的平均值。


    ## 比较多个箱线图


    箱线图常用于比较多个数据集之间的数据分布。我们也可以在 PySpark 笔记本中通过设置 `matplotlib` 库的 `subplot()` 函数来实现这一点。我们为
    `subplot()` 设置的参数决定了 `subplot()` 函数之后的图应显示的位置（以行和列表示）。在清单 [6-37](#480532_2_En_6_Chapter.xhtml#PC37)
    的例子中，`price` 列的箱线图显示在位置 `1,2,1`，即 1 行、2 列、第一列。马力的图显示在 1 行、2 列、第二列的位置，从而有效地将两个箱线图并排绘制（图
    [6-38](#480532_2_En_6_Chapter.xhtml#Fig38)）。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig38_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig38_HTML.jpg)


    图 6-38：两个不同的箱线图并排显示


    ```python

    %matplotlib inline

    # Boxplots are frequently used to compare the distribution of datasets

    # We can plot multiple boxplots together and return them as one image using the
    following code

    import matplotlib.pyplot as plt

    plt.subplot(1, 2, 1)

    pd_data frame.price.plot.box()

    plt.subplot(1, 2, 2)

    pd_data frame.horsepower.plot.box()

    plt.show()

    Listing 6-37

    Generate multiple boxplots to compare two values

    ```


    我们不会深入探讨箱线图的更多细节，因为它们超出了本书的范围。但如果您有兴趣了解更多，网上有大量关于如何解读箱线图的资源。


    ## 散点矩阵图示例


    最后一个示例展示了 Pandas 图形功能的强大之处。使用清单 [6-38](#480532_2_En_6_Chapter.xhtml#PC38) 中的代码，我们将创建一个所谓的散点矩阵图（图
    [6-39](#480532_2_En_6_Chapter.xhtml#Fig39)）。散点矩阵由许多不同的图表组合成一个大的单一图表。散点矩阵会为我们提供的列之间每一次交互返回一个散点图；如果交互发生在相同的列上，则返回直方图。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig39_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig39_HTML.jpg)


    图 6-39：在 `pd_data` 数据框的各种列上绘制的散点矩阵图


    ```python

    %matplotlib inline

    import matplotlib.pyplot as plt

    from pandas.plotting import scatter_matrix

    # Only select a number of numerical columns from our data frame

    pd_num_columns = pd_data frame[[''length'',''width'',''height'',''curb-weight'',''horsepower'',''price'']]

    # More advanced plots, like a scatter matrix plot

    scatter_matrix(pd_num_columns, alpha=0.5, figsize=(10, 10), diagonal="hist")

    plt.show()

    Listing 6-38

    Create scatter matrix

    ```


    ## 散点矩阵图解读


    当您想要检测数据集中各列之间的相关性时，散点矩阵图非常有用。每个散点图都在 X 轴（例如 `length`）和 Y 轴（例如 `price`）上为每个值绘制一个点。如果这些点倾向于聚集在一起，如上图中形成较深的点，则这些列内的数据可能相互相关，这意味着如果一个值较高或较低，另一个值通常也会朝相同方向移动。一个更实际的例子是
    `price`（前图左下角）和 `curb weight`（前图右数第四）之间的图。随着 Y 轴上显示的 `price` 上升，汽车的 `curb weight`
    也趋于增加。这是非常有用的信息，特别是如果我们有兴趣根据代表汽车特征的列值来预测汽车价格时。如果一辆车的 `curb weight` 很高，那么它的价格很可能也会很高。'
  raw: 'Next to histograms we can basically create any graph type we are interested
    in. Pandas supports many different graph types and also many options to customize
    how your graphs look like. A good reference for what you can do can be found on
    the Pandas documentation page at [`https://pandas.pydata.org/pandas-docs/stable/user_guide/visualization.html`](https://pandas.pydata.org/pandas-docs/stable/user_guide/visualization.html).


    To give you another example of the syntax, the code of Listing [6-36](#480532_2_En_6_Chapter.xhtml#PC36)
    creates a boxplot of the price column inside our Pandas data frame (Figure [6-37](#480532_2_En_6_Chapter.xhtml#Fig37)).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig37_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig37_HTML.jpg)


    Figure 6-37


    Boxplot of the price column inside the pd_data frame


    ```

    %matplotlib inline

    # Also other graphs like boxplots are supported

    # In this case we create a boxplot for the "price" column

    pd_data_frame.price.plot.box()

    Listing 6-36

    Generate a boxplot based on a single column

    ```


    Just like histograms, boxplots graphically tell us information about how our data
    is distributed. Boxplots, or box-and-whisker plots as they are also called, show
    us a bit more detail regarding the distribution of the data compared to a histogram.
    The “box” of the boxplot is called the interquartile range (IQR) and contains
    the middle 50% of our data. In our case we can see that the middle 50% of our
    price data is somewhere between 7,500 and 17,500\. The line, or whisker, beneath
    the IQR shows the bottom 25% of our data and the whisker above the IQR the top
    25%. The circles above the top whisker show the outliers of our dataset, in the
    case of this example dataset, to indicate cars that are priced higher than 1.5
    ∗ IQR. Outliers have a potentially huge impact on the average price and are worth
    investigating to make sure they are not errors. Finally, the green bar inside
    the IQR indicates the mean, or average, price for the price column.


    Boxplots are frequently used to compare the data distribution of multiple datasets
    against each other. Something we can also do inside our PySpark notebook by setting
    the `subplot()` function of the `matplotlib` library . The parameters we set for
    `subplot()` dictate the location, expressed in rows and columns, the plot following
    the `subplot()` function should be displayed in. In the example in Listing [6-37](#480532_2_En_6_Chapter.xhtml#PC37),
    the boxplot for the price column is shown in location `1,2,1` which means 1 row,
    2 columns, first column. The plot for the horsepower is shown in location 1 row,
    2 columns, second column effectively plotting both boxplots next to each other
    (Figure [6-38](#480532_2_En_6_Chapter.xhtml#Fig38)).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig38_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig38_HTML.jpg)


    Figure 6-38


    Two different boxplots plotted next to each other


    ```

    %matplotlib inline

    # Boxplots are frequently used to compare the distribution of datasets

    # We can plot multiple boxplots together and return them as one image using the
    following code

    import matplotlib.pyplot as plt

    plt.subplot(1, 2, 1)

    pd_data frame.price.plot.box()

    plt.subplot(1, 2, 2)

    pd_data frame.horsepower.plot.box()

    plt.show()

    Listing 6-37

    Generate multiple boxplots to compare two values

    ```


    We won’t go into further detail about boxplots since they are outside the scope
    of this book, but if you are interested in learning more about them, there are
    plenty of resources available online about how to interpret them.


    One final example we would like to show displays how powerful the graphical capabilities
    of Pandas is. Using the code of Listing [6-38](#480532_2_En_6_Chapter.xhtml#PC38),
    we will create a so-called scatter matrix (Figure [6-39](#480532_2_En_6_Chapter.xhtml#Fig39)).
    A scatter matrix consists of many different graphs all combined into a single,
    large, graph. The scatter matrix returns a scatter plot for each interaction between
    the columns we provide and a histogram if the interaction is on an identical column.


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig39_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig39_HTML.jpg)


    Figure 6-39


    Scatter matrix plot on various columns inside the pd_data frame


    ```

    %matplotlib inline

    import matplotlib.pyplot as plt

    from pandas.plotting import scatter_matrix

    # Only select a number of numerical columns from our data frame

    pd_num_columns = pd_data frame[[''length'',''width'',''height'',''curb-weight'',''horsepower'',''price'']]

    # More advanced plots, like a scatter matrix plot

    scatter_matrix(pd_num_columns, alpha=0.5, figsize=(10, 10), diagonal="hist")

    plt.show()

    Listing 6-38

    Create scatter matrix

    ```


    A scatter matrix plot is incredibly useful when you want to detect correlations
    between the various columns inside your dataset. Each of the scatter plots draws
    a dot for each value on the x axis (for instance, length) and the y axis (for
    instance, price). If these dots tend to group together, making up a darker dot
    in the case of the plot above, the data inside the columns could potentially be
    correlated to each other, meaning that if one has a higher or lower value, the
    other generally moves in the same direction. A more practical example of this
    is the plot between price (bottom left of the preceding graph) and curb weight
    (fourth from the right in the preceding graph). As the price, displayed on the
    y axis, goes up, the curb weight of the car also tends to increase. This is very
    useful information to know, especially if we were interested in predicting the
    price of a car based on the column values that hold the characteristics of the
    car. If a car has a high curb weight, chances are the price will be high as well.'
  trans: '## Pandas 可视化概览


    除了直方图，我们基本上可以创建任何感兴趣的图表类型。Pandas 支持多种不同的图表类型，并提供了许多自定义图表外观的选项。关于可实现功能的详细参考，可以在
    Pandas 文档页面找到：[`https://pandas.pydata.org/pandas-docs/stable/user_guide/visualization.html`](https://pandas.pydata.org/pandas-docs/stable/user_guide/visualization.html)。


    ## 箱线图示例


    为了展示另一种语法示例，清单 6-36 中的代码在 Pandas 数据框（`pd_data_frame`）中创建了 `price` 列的箱线图（图 6-37）。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig37_HTML.jpg](img/480532_2_En_6_Fig37_HTML.jpg)


    图 6-37：`pd_data` 数据框中 `price` 列的箱线图


    ```python

    %matplotlib inline

    # Also other graphs like boxplots are supported

    # In this case we create a boxplot for the "price" column

    pd_data_frame.price.plot.box()

    Listing 6-36

    Generate a boxplot based on a single column

    ```


    ## 箱线图解读


    与直方图类似，箱线图以图形方式展示数据的分布情况。箱线图（也称为箱须图）相比直方图能提供更多关于数据分布的细节。箱线图的“箱体”称为四分位距（IQR），包含了我们数据中间的
    50%。在我们的例子中，可以看到价格数据中间的 50%大约在 7,500 到 17,500 之间。IQR 下方的线（或须）显示了数据底部的 25%，而 IQR
    上方的须则显示了顶部的 25%。顶部须上方的圆圈显示了数据集中的离群值，在本例中用于标示价格高于 `1.5 * IQR` 的汽车。离群值可能对平均价格产生巨大影响，值得调查以确保它们不是错误。最后，IQR
    内部的绿色条表示 `price` 列的平均值。


    ## 比较多个箱线图


    箱线图常用于比较多个数据集之间的数据分布。我们也可以在 PySpark 笔记本中通过设置 `matplotlib` 库的 `subplot()` 函数来实现这一点。我们为
    `subplot()` 设置的参数决定了 `subplot()` 函数之后的图应显示的位置（以行和列表示）。在清单 6-37 的例子中，`price` 列的箱线图显示在位置
    `1,2,1`，即 1 行、2 列、第一列。马力的图显示在 1 行、2 列、第二列的位置，从而有效地将两个箱线图并排绘制（图 6-38）。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig38_HTML.jpg](img/480532_2_En_6_Fig38_HTML.jpg)


    图 6-38：两个不同的箱线图并排显示


    ```python

    %matplotlib inline

    # Boxplots are frequently used to compare the distribution of datasets

    # We can plot multiple boxplots together and return them as one image using the
    following code

    import matplotlib.pyplot as plt

    plt.subplot(1, 2, 1)

    pd_data frame.price.plot.box()

    plt.subplot(1, 2, 2)

    pd_data frame.horsepower.plot.box()

    plt.show()

    Listing 6-37

    Generate multiple boxplots to compare two values

    ```


    我们不会深入探讨箱线图的更多细节，因为它们超出了本书的范围。但如果您有兴趣了解更多，网上有大量关于如何解读箱线图的资源。


    ## 散点矩阵图示例


    最后一个示例展示了 Pandas 图形功能的强大之处。使用清单 6-38 中的代码，我们将创建一个所谓的散点矩阵图（图 6-39）。散点矩阵由许多不同的图表组合成一个大的单一图表。散点矩阵会为我们提供的列之间每一次交互返回一个散点图；如果交互发生在相同的列上，则返回直方图。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig39_HTML.jpg](img/480532_2_En_6_Fig39_HTML.jpg)


    图 6-39：在 `pd_data` 数据框的各种列上绘制的散点矩阵图


    ```python

    %matplotlib inline

    import matplotlib.pyplot as plt

    from pandas.plotting import scatter_matrix

    # Only select a number of numerical columns from our data frame

    pd_num_columns = pd_data frame[[''length'',''width'',''height'',''curb-weight'',''horsepower'',''price'']]

    # More advanced plots, like a scatter matrix plot

    scatter_matrix(pd_num_columns, alpha=0.5, figsize=(10, 10), diagonal="hist")

    plt.show()

    Listing 6-38

    Create scatter matrix

    ```


    ## 散点矩阵图解读


    当您想要检测数据集中各列之间的相关性时，散点矩阵图非常有用。每个散点图都在 X 轴（例如 `length`）和 Y 轴（例如 `price`）上为每个值绘制一个点。如果这些点倾向于聚集在一起，如上图中形成较深的点，则这些列内的数据可能相互相关，这意味着如果一个值较高或较低，另一个值通常也会朝相同方向移动。一个更实际的例子是
    `price`（前图左下角）和 `curb weight`（前图右数第四）之间的图。随着 Y 轴上显示的 `price` 上升，汽车的 `curb weight`
    也趋于增加。这是非常有用的信息，特别是如果我们有兴趣根据代表汽车特征的列值来预测汽车价格时。如果一辆车的 `curb weight` 很高，那么它的价格很可能也会很高。'
- fmt: '# Data Frame Execution


    In this chapter I have mentioned a number of times that a data frame is just a
    logical representation of the data you imported to the data frame. Underneath
    the hood of the data frame, the actual, physical data is stored on the Spark nodes
    of your Big Data Clusters. Because the data frame is a logical representation,
    processing the data inside a data frame, or modifying the data frame itself, happens
    differently than you might expect.


    Spark uses a method called “lazy evaluation” before processing any commands. What
    lazy evaluation basically means in terms of Spark processing is that Spark will
    delay just about every operation that occurs on a data frame until an action is
    triggered. These operations, called transformations, are actions like joining
    data frames. Every transformation we perform on a Spark data frame gets added
    to an execution plan, but not executed directly. An execution plan will only be
    executed whenever an action is performed against the data frame. Actions include
    operations like `count()` or `top()`.


    Simply speaking, all the transformations we do on a data frame, like joining,
    sorting, and so on, are being added to a list of transformations in the shape
    of an execution plan. Whenever we perform an action like a `count()` on the data
    frame, the execution plan will be processed and the resulting `count()` result
    will be displayed.


    From a performance perspective, the lazy evaluation model Spark uses is very effective
    on big datasets. By grouping transformations together, less passes over the data
    are required to perform the requested operations. Also, grouping the transformations
    together creates room for optimization. If Spark knows all operations it needs
    to perform on the data, it can decide on the optimal method to perform the actions
    required for the end result, perhaps some operations can be avoided or others
    can be combined together.


    From inside our PySpark notebook, we can very easily see the execution plan by
    using the `explain()` command. In the example in Listing [6-39](#480532_2_En_6_Chapter.xhtml#PC39),
    we are going to import flight and airport information into two separate data frames
    and look at the execution plan of one of the two data frames (Figure [6-40](#480532_2_En_6_Chapter.xhtml#Fig40)).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig40_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig40_HTML.jpg)


    Figure 6-40: Execution plan of a newly imported data frame


    ```python

    # Import the flights and airlines data again if you haven''t already

    df_flights = spark.read.format(''csv'').options(header=''true'', inferSchema="true").load(''/Flight_Delays/flights.csv'')

    df_airlines = spark.read.format(''csv'').options(header=''true'', inferSchema="true").load(''/Flight_Delays/airlines.csv'')

    # Just like SQL Server, Spark uses execution plans which you can see through .explain()

    df_flights.explain()

    Listing 6-39: Explain the execution plan of a single table data frame

    ```


    As you can see in Figure [6-40](#480532_2_En_6_Chapter.xhtml#Fig40), there is
    only a single operation so far, a FileScan, which is responsible for reading the
    CSV contents into the `df_flights` data frame. As a matter of fact, the data is
    not already loaded into the data frame when we execute the command, but it will
    be the first step in the execution plan whenever we perform an action to trigger
    the actual load of the data.


    To show changes occurring to the execution plan, we are going to join both the
    data frames we created earlier together (Listing [6-40](#480532_2_En_6_Chapter.xhtml#PC40))
    and look at the plan (Figure [6-41](#480532_2_En_6_Chapter.xhtml#Fig41)).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig41_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig41_HTML.jpg)


    Figure 6-41: Execution plan of a data frame join


    ```python

    # Let''s join both data frames again and see what happens to the plan

    from pyspark.sql.functions import *

    df_flightinfo = df_flights.join(df_airlines, df_flights.AIRLINE == df_airlines.IATA_CODE,
    how="inner").drop(df_flights.AIRLINE)

    df_flightinfo.explain()

    Listing 6-40: Explain the execution plan of a multitable data frame

    ```


    From the execution plan, we can see two FileScan operations that will read the
    contents of both source CSV files into their data frames. Then we can see that
    Spark decided on performing a hash join on both data frames on the key columns
    we supplied in the preceding code.


    Again, the actions we performed against the data frame have not been actually
    executed. We can trigger this by performing an action like a simple `count()`
    (Listing [6-41](#480532_2_En_6_Chapter.xhtml#PC41)).


    ```python

    # Even though we joined the data frames and see that reflected in the

    # execution plan, the plan hasn''t been executed yet

    # Execution plans only get executed when performing actions like count() or top()

    df_flightinfo.count()

    Listing 6-41: Perform an action to execute the execution plan

    ```


    The execution plan will still be attached to the data frame, and any subsequent
    transformations we perform will be added to it. Whenever we perform an action
    at a later point in time, the execution plan will be executed with all the transformations
    that are part of it.'
