    ## 使用 `Azure Data Studio` 处理大数据群集


    作为微软 `SQL 客户端工具` 战略的一部分，处理大数据群集所需的大部分任务通过 `Azure Data Studio (ADS)` 而非 `SQL Server
    Management Studio` 或其他工具完成，这可能并不令您感到惊讶。对于那些不熟悉此工具的读者，我们将从简要介绍开始，包括如何获取此工具。


    ### 什么是 `Azure Data Studio`？


    `Azure Data Studio` 是一个跨平台（Windows、MacOS 和 Linux）、可扩展且可定制的工具，可用于经典的 `T-SQL` 查询和命令，以及诸如笔记本等多种新功能。后者可以通过扩展来启用，这些扩展通常通过
    `VSIX` 文件安装，您在处理 `Visual Studio` 或 `Visual Studio Code`^(²) 的其他扩展时可能对此很熟悉。


    它最初于 2017 年以 `SQL Operations Studio` 的名称公开，但在 2018 年正式发布前进行了品牌重塑。虽然产品名称有点误导性，但它不仅适用于云（Azure）服务，也适用于本地解决方案和需求。


    例如，它没有为 `SQL Server Agent` 提供开箱即用的界面，但作为交换提供了内置的图表功能，这表明它与其说是替代品，不如说是对 `SQL Server
    Management Studio (SSMS)` 的补充工具。`SSMS` 针对的是管理和运维群体（数据库管理员），而 `Azure Data Studio`
    更适合各种数据专业人员，包括数据科学家。


    ### 获取并安装 `Azure Data Studio`


    您可以直接从微软获取免费的 `Azure Data Studio` 副本： [`https://docs.microsoft.com/en-us/sql/azure-data-studio/download`](https://docs.microsoft.com/en-us/sql/azure-data-studio/download)。为您选择的平台下载安装程序并运行。


    或者，只需运行此 `Chocolatey` 命令（清单 3-4），它将为您安装最新版本。


    ```

    choco install azure-data-studio -y

    ```


    清单 3-4

    通过 `choco` 安装 `ADS`


    ## 安装“真正的”大数据群集


    如果您想充分利用完整的大数据群集功能集，则需要一个包含所有不同角色和池的完整安装。'
