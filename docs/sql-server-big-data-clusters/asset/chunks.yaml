- fmt: '# 7. 机器学习模型训练与评估


    现在我们的数据集已经准备好用于训练，可以开始实际的机器学习阶段了。首先需要做的是初始化机器学习算法（见清单 [7-15](#480532_2_En_7_Chapter.xhtml#PC15)）。在这一步中，我们可以指定要使用的算法以及在机器学习模型训练阶段配置的各种参数（也称为超参数）。


    ```python

    # Initiate the classifier, in this case LogisticRegression

    lr = LogisticRegression(maxIter=10, tol=1E-6, fitIntercept=True)

    Listing 7-15

    Initiate the classifier

    ```


    在这个例子中，我们选择了逻辑回归算法，试图根据植物的特征预测它属于哪种鸢尾花。我们现在将忽略算法参数。当你处于尝试优化和调整模型的阶段时，你会经常返回去修改参数（手动或通过程序），以找到最优设置。


    训练模型实际上非常简单直接，并且在本例中，可以通过一行 PySpark 代码实现（见清单 [7-16](#480532_2_En_7_Chapter.xhtml#PC16)）。


    ```python

    # Train the multiclass model

    model = lr.fit(Iris_train)

    Listing 7-16

    Train the model

    ```


    在前面的代码（清单 [7-16](#480532_2_En_7_Chapter.xhtml#PC16)）运行完成后，我们就获得了一个训练好的机器学习模型，其形式是变量
    `model`。然后我们可以使用这个训练好的模型在测试数据集上进行预测，以分析其表现如何。使用清单 [7-17](#480532_2_En_7_Chapter.xhtml#PC17)
    中的代码，我们将把训练好的模型“拟合”到我们的测试数据集上，并返回前20个结果，这些结果如图 [7-10](#480532_2_En_7_Chapter.xhtml#Fig10)
    所示。


    ![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig10_HTML.jpg](images/480532_2_En_7_Chapter/480532_2_En_7_Fig10_HTML.jpg)


    图 7-10

    测试数据集上的预测结果


    ```python

    # Predict on our test dataset using the model we trained

    # and return the predictions

    Iris_pred = model.transform(Iris_test)

    Iris_pred.show(20)

    Listing 7-17

    Perform a prediction

    ```


    如图 [7-10](#480532_2_En_7_Chapter.xhtml#Fig10) 所示，我们的模型在测试数据集上表现良好。在返回的前20行中，只有一行预测的物种与实际物种不同（我们预测的是
    virginica，但实际应该是 versicolor）。虽然我们可以逐行分析实际物种和预测物种之间的差异，但查看模型性能的一个更快的方法是使用我们之前加载的
    Spark ML 评估库。


    清单 [7-18](#480532_2_En_7_Chapter.xhtml#PC18) 中的代码针对我们的测试数据集评估了模型性能，并在性能指标“准确率”上进行了度量。准确率常用于衡量分类模型的表现，它是正确预测的数量与总预测数量的比值。


    ```python

    # How good did our model perform?

    evaluator = MulticlassClassificationEvaluator(metricName=''accuracy'')

    accuracy = evaluator.evaluate(Iris_pred)

    print("Accuracy: " + format(accuracy))

    Listing 7-18

    Measuring model performance

    ```


    前面代码返回的结果每次运行时可能会有所不同。这是因为我们使用的数据集相当小，并且我们进行了随机拆分，这意味着最终进入训练和测试数据集的唯一物种数量对模型性能有很大影响。我们得到的结果如图
    [7-11](#480532_2_En_7_Chapter.xhtml#Fig11) 所示，这是一个相当不错的准确率水平。


    ![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig11_HTML.jpg](images/480532_2_En_7_Chapter/480532_2_En_7_Fig11_HTML.jpg)


    图 7-11

    训练后模型的准确率


    我们的模型经过训练和测试后，可以根据我们计划用模型做什么来采取进一步的步骤。如果我们对进一步优化模型性能感兴趣，可以返回去调整算法参数，然后再次训练模型。也许在这种情况下，查看训练集和测试集之间的拆分质量也是有用的，因为这对模型准确率有很大影响。如果我们愿意，还有一百多件事情可以做来进一步优化我们的模型（甚至可以选择不同的算法，看看是否比当前算法预测得更好）。


    我们可以做的另一件事是存储模型。在这个领域，我们比在 SQL Server 内置机器学习服务中灵活得多，在那里模型必须被序列化并存储在表中。对于 Spark，我们可以选择不同的方法和库来存储我们的模型。例如，我们可以使用一个名为
    `Pickle` 的库将模型存储在文件系统上，或者使用模型变量上的 `.save` 函数将其存储在我们选择的 HDFS 位置。每当我们需要使用训练好的模型对新数据进行评分时，我们可以直接从文件系统加载它并用于评分新数据。


    ## 总结


    在本章中，我们探讨了在 SQL Server 大数据集群中执行机器学习任务的各种可用方法。我们研究了 SQL Server 内置机器学习服务，它允许我们使用
    T-SQL 查询和新的 `sp_execute_external_script` 存储过程的组合，在 SQL Server 主实例中直接训练、利用和存储机器学习模型。在
    Spark 方面，我们也有广泛的机器学习能力可供使用。我们使用了 Spark ML 库在数据帧上训练模型，并用它来对新数据进行评分。这两种方法各有优缺点，但在单个解决方案中提供这两种选择，为我们所有的机器学习需求提供了最佳的灵活性。


    # 8. 创建和消费大数据集群应用


    SQL Server 大数据集群的功能之一是能够在它上面构建和运行自定义应用程序。这实际上是一个非常强大的功能，因为它允许你在大数据集群上编写和运行各种解决方案的脚本。例如，你可以创建一个应用程序（或简称
    app，在本章剩余部分我们将这样称呼它）来执行各种数据维护任务，比如数据库备份。另一个例子是能够通过 REST API 为你的机器学习过程创建一个入口点，这个用例我们将在本章后面探讨。


    在撰写本书时，在大数据集群上创建的应用程序可以用 R 和 Python 编写，此外还有一个额外的选项可以运行 SQL Server 集成服务（SSIS）包。通过创建应用程序，你可以利用大数据集群内所有可用的计算资源，并访问存储在其中的所有数据。


    大数据集群中的应用程序在专用容器中运行，并且可以在集群中复制和扩展。这意味着你可以让你的应用程序处理并行工作负载，成为高性能的解决方案。


    在本章中，我们将创建一个应用程序，它将使用一个预训练的机器学习模型对鸢尾花植物的物种进行分类，这与我们在上一章中专注于在大数据集群内开发机器学习解决方案时所做的非常相似。通过构建一个应用程序来使用机器学习解决方案对数据进行评分，我们可以通过
    REST API 轻松地将该模型投入运营。这意味着你使用或自己构建的应用程序可以直接通过 JSON 消息从大数据集群接收预测，从而实现从你的应用程序直接进行近实时评分，而无需先在大数据集群内存储和处理数据。'
