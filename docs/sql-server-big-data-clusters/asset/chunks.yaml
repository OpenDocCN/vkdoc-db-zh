- fmt: "### Automated External Tables with Biml\n\nAs you can see, this wizard has\
    \ its limitations, but the underlying T-SQL is pretty straightforward. It is therefore\
    \ a prime candidate for automation which can be achieved, among others, through\
    \ the Business Intelligence Markup Language (`Biml`).\n\nIf you have not been\
    \ exposed to `Biml` so far, there are numerous resources on the Internet^([³](#fn3),[⁴](#fn4),[⁵](#fn5))\
    \ as well as within `The Biml Book`.^([⁶](#fn6)) If you just want to use this\
    \ specific example, all you need to do is:\n\n*   Get your free copy of `BimlExpress`,^([⁷](#fn7))\
    \ a free `Biml` Frontend that fully integrates with Visual Studio.\n*   Get the\
    \ source code provided in the following text from this book’s website.\n*   Create\
    \ the mini-metadata repository as described in the following text and populate\
    \ it with your metadata.\n*   Adjust the connection strings in the solution.\n\
    *   Run the solution (just right-mouse-click `11_Polybase_C.biml` in the solution\
    \ and select `Generate SSIS Package`). Despite the confusing title, this will\
    \ write all the required `.SQL` files to `C:\\Temp\\Polybase`.\n\nAs mentioned\
    \ before, we will use a small metadata table to manage our data sources. In this\
    \ example, we will just point `Biml` toward our `AdventureWorksLT` database in\
    \ Azure again – feel free to play with that and add your own data sources here.\n\
    \nTo get started, create a table called `Datasources` (Listing 5-3), for example,\
    \ in your previously created database `BDC_Empty`. Obviously, this table can be\
    \ named in whichever way you want, be put in any schema or database you prefer\
    \ – but let’s just keep it simple for now.\n\n```sql\nCREATE TABLE [dbo].[Datasources](\n\
    \    [DataSource] [nvarchar](50) NULL,\n    [Server] [nvarchar](50) NULL,\n  \
    \  [UserID] [nvarchar](50) NULL,\n    [Password] [nvarchar](50) NULL,\n    [SRC_DB]\
    \ [nvarchar](50) NULL,\n    [SRC_Schema] [nvarchar](50) NULL,\n    [DEST_Schema]\
    \ [nvarchar](50) NULL\n) ON [PRIMARY]\n```\n*Listing 5-3. T-SQL to create datasources\
    \ metatable.*\n\nAlso, just add one record to this table pointing to your `AWLT`\
    \ database (modify your DNS name, username, and password as needed) using the\
    \ code in Listing 5-4.\n\n```sql\nINSERT INTO Datasources VALUES\n('AW','.database.windows.net','','','AdventureWorks','SalesLT','dbo')\n\
    ```\n*Listing 5-4. Populate your datasources metatable.*\n\nThis solution expects\
    \ the master key to be set up already – this being a one-time task, there is simply\
    \ no need or justification to automate that step. If you skipped the manual table\
    \ creation in the previous exercise, you may want to fulfill this step manually\
    \ before continuing.\n\nOur solution contains two `Biml` files (actually four\
    \ – two files in C# and VB.NET, respectively):\n\n*   `11_Polybase_C.biml`\nThis\
    \ is the control file which will hold the connection strings to our metadata as\
    \ well as the target database. It will loop through the metadata and call the\
    \ other `Biml` file (using a function called `CallBimlScript()`) for every single\
    \ entry, writing a `.SQL` file to `C:\\temp\\polybase` (so if you have ten entries\
    \ in your `Datasources` table, you will end up with ten files).\n*   `12_PolybaseWriter_C.biml`\n\
    This file will generate the contents of each source schema.\n\nIf you take a look\
    \ at the first file, you will notice that it starts with the declaration of two\
    \ (in this case identical) connection strings. One points to your database that\
    \ holds your metadata; the other one points to the PolyBase database in which\
    \ you want the external tables to be created or updated (Listing 5-5).\n\n```biml\n\
    <Biml xmlns=\"http://schemas.varigence.com/biml.xsd\">\n    <Connections>\n  \
    \      <Connection Name=\"Metadata\" ConnectionString=\"Data Source=.;Initial\
    \ Catalog=BDC;Provider=SQLNCLI10.1;Integrated Security=SSPI;\"/>\n        <Connection\
    \ Name=\"Target\" ConnectionString=\"Data Source=.;Initial Catalog=BDC;Provider=SQLNCLI10.1;Integrated\
    \ Security=SSPI;\"/>\n    </Connections>\n    <Packages>\n        <Package Name=\"\
    11_Polybase_C\" AutoCreateConnections=\"false\" AutoCreateVariables=\"false\"\
    >\n            <Tasks>\n                <ForEachLoop Name=\"Loop Through Metadata\"\
    \ CollectionName=\"Metadata.Objects[SELECT [DataSource],[Server],[UserID],[Password],[SRC_DB],[SRC_Schema],[DEST_Schema]\
    \ FROM [dbo].[Datasources]]\">\n                    <Tasks>\n                \
    \        <ExecuteCallBimlScript Name=\"Generate SQL File\">\n                \
    \            <BimlScript File=\"12_PolybaseWriter_C.biml\" />\n              \
    \              <InputBindings>\n                                <Directory Path=\"\
    C:\\temp\\polybase\\\" />\n                            </InputBindings>\n    \
    \                        <OutputBindings>\n                                <Directory\
    \ Path=\"C:\\temp\\polybase\\\" />\n                            </OutputBindings>\n\
    \                        </ExecuteCallBimlScript>\n                    </Tasks>\n\
    \                </ForEachLoop>\n            </Tasks>\n        </Package>\n  \
    \  </Packages>\n</Biml>\n```\n*Listing 5-5. Biml code to loop over the datasources\
    \ metatable.*\n\nThe actual magic happens in the second file. It takes the `DataRow`\
    \ containing the metadata as well as the connection string from the target database\
    \ as its parameters. It will then generate T-SQL to:\n\n1.  `CREATE` or `ALTER`\
    \ the credentials for the connection\n2.  `CREATE` or `ALTER` the external data\
    \ source\n3.  `DROP` every existing external table in the target database\n4.\
    \  `CREATE` a corresponding external table for every single table in the source\
    \ scheme\n\nFor the first three steps, it uses simple SQL Selects or semistatic\
    \ T-SQL. For the fourth part, it makes use of `Biml`’s ability to read and interpret\
    \ a database’s schema and store it in the `Biml` object model (Listing 5-6).\n\
    \n```sql\n-- Syncing schema <#=Target.Name#> in <#=Target.ConnectionString#>\n\
    -- This script assumes that a master key has been set\n\n-- CREATE/ALTER CREDENTIAL\n\
    IF NOT EXISTS(select * from sys.database_credentials WHERE NAME = '<#=Row[\"DataSource\"\
    ]#>')\nBEGIN\n    CREATE DATABASE SCOPED CREDENTIAL [<#=Row[\"DataSource\"]#>]\n\
    \    WITH IDENTITY = '<#=Row[\"UserID\"]#>', SECRET = '<#=Row[\"Password\"]#>';\n\
    END\nELSE\nBEGIN\n    ALTER DATABASE SCOPED CREDENTIAL [<#=Row[\"DataSource\"\
    ]#>]\n    WITH IDENTITY = '<#=Row[\"UserID\"]#>', SECRET = '<#=Row[\"Password\"\
    ]#>';\nEND\nGO\n\n-- CREATE DATASOURCE\nIF NOT EXISTS(SELECT * FROM sys.external_data_sources\
    \ WHERE NAME = '<#=Row[\"DataSource\"]#>')\nBEGIN\n    CREATE EXTERNAL DATA SOURCE\
    \ [<#=Row[\"DataSource\"]#>]\n    WITH (LOCATION = 'sqlserver://<#=Row[\"Server\"\
    ]#>', CREDENTIAL = [<#=Row[\"DataSource\"]#>]);\nEND\nELSE\nBEGIN\n    ALTER EXTERNAL\
    \ DATA SOURCE [<#=Row[\"DataSource\"]#>] SET LOCATION = N'sqlserver://<#=Row[\"\
    Server\"]#>', CREDENTIAL = [<#=Row[\"DataSource\"]#>]\nEND\nGO\n\n-- DROP EXISTING\
    \ TABLES\n<#\nforeach (AstTableNode tbl in RootNode.Tables.Where(t => t.Database.Name\
    \ == Row[\"SRC_DB\"].ToString() && t.Schema.Name == Row[\"SRC_Schema\"].ToString()))\
    \ {\n    string targetTable = \"[\" + Row[\"DEST_Schema\"].ToString() + \"].[\"\
    \ + tbl.Name + \"]\";\n#>\nIF EXISTS(select * from sys.external_tables WHERE object_id\
    \ = OBJECT_ID('<#=targetTable#>'))\nBEGIN\n    DROP EXTERNAL TABLE <#=targetTable#>\n\
    END\nGO\n<#\n}\n#>\n\n-- CREATE TABLES\n<#\nforeach (AstTableNode tbl in RootNode.Tables.Where(t\
    \ => t.Database.Name == Row[\"SRC_DB\"].ToString() && t.Schema.Name == Row[\"\
    SRC_Schema\"].ToString())) {\n    string targetTable = \"[\" + Row[\"DEST_Schema\"\
    ].ToString() + \"].[\" + tbl.Name + \"]\";\n#>\nIF NOT EXISTS(SELECT * FROM sys.external_tables\
    \ WHERE NAME = '<#=tbl.Name#>')\nBEGIN\n    CREATE EXTERNAL TABLE <#=targetTable#>\
    \ (\n    <#=String.Join(\",\" + Environment.NewLine, tbl.Columns.Where(c => !c.IsComputed).Select(i\
    \ => \"    \" + i.Name + \" \" + TSqlTypeTranslator.Translate(i.DataType, i.Length,\
    \ i.Precision, i.Scale, i.CustomType) + (i.IsNullable ? \" NULL\" : \" NOT NULL\"\
    )))#>\n    )\n    WITH (LOCATION = '[<#=Row[\"SRC_Schema\"]#>].<# =tbl.Name#>',\
    \ DATA_SOURCE = [<#=Row[\"DataSource\"]#>]);\nEND\nGO\n<#\n}\n#>\n```\n*Listing\
    \ 5-6. Biml `12_PolybaseWriter_C.biml` called by previous Biml script.*\n\nAs\
    \ the focus of this book is Big Data Clusters, not `Biml`, we won’t go into any\
    \ more details of this little helper. The main idea was to show you one of multiple\
    \ ways on how you can automate your way through external tables.\n\nBy the way,\
    \ it would be super easy to adjust this code to work for other relational sources\
    \ such as Teradata or Oracle and automate external tables on these as well!"
  raw: "### Automated External Tables with Biml\n\nAs you can see, this wizard has\
    \ its limitations, but the underlying T-SQL is pretty straightforward. It is therefore\
    \ a prime candidate for automation which can be achieved, among others, through\
    \ the Business Intelligence Markup Language (Biml).\n\nIf you have not been exposed\
    \ to Biml so far, there are numerous resources on the Internet^([³](#fn3),[⁴](#fn4),[⁵](#fn5))\
    \ as well as within *The Biml Book*.^([⁶](#fn6)) If you just want to use this\
    \ specific example, all you need to do is\n\n*   Get your free copy of BimlExpress,^([⁷](#fn7))\
    \ a free Biml Frontend that fully integrates with Visual Studio.\n\n*   Get the\
    \ source code provided in the following text from this book’s website.\n\n*  \
    \ Create the mini-metadata repository as described in the following text and populate\
    \ it with your metadata.\n\n*   Adjust the connection strings in the solution.\n\
    \n*   Run the solution (just right-mouse-click “11_Polybase_C.biml” in the solution\
    \ and select “Generate SSIS Package”). Despite the confusing title, this will\
    \ write all the required .SQL files to C:\\Temp\\Polybase.\n\nAs mentioned before,\
    \ we will use a small metadata table to manage our data sources. In this example,\
    \ we will just point Biml toward our AdventureWorksLT database in Azure again –\
    \ feel free to play with that and add your own data sources here.\n\nTo get started,\
    \ create a table called Datasources (Listing [5-3](#480532_2_En_5_Chapter.xhtml#PC3)),\
    \ for example, in your previously created database BDC_Empty. Obviously, this\
    \ table can be named in whichever way you want, be put in any schema or database\
    \ you prefer – but let’s just keep it simple for now.\n\n```\nCREATE TABLE [dbo].[Datasources](\n\
    [DataSource] [nvarchar](50) NULL,\n[Server] [nvarchar](50) NULL,\n[UserID] [nvarchar](50)\
    \ NULL,\n[Password] [nvarchar](50) NULL,\n[SRC_DB] [nvarchar](50) NULL,\n[SRC_Schema]\
    \ [nvarchar](50) NULL,\n[DEST_Schema] [nvarchar](50) NULL\n) ON [PRIMARY]\nListing\
    \ 5-3\nT-SQL to create datasources metatable\n```\n\nAlso, just add one record\
    \ to this table pointing to your AWLT database (modify your DNS name, username,\
    \ and password as needed) using the code in (Listing [5-4](#480532_2_En_5_Chapter.xhtml#PC4)).\n\
    \n```\nINSERT INTO Datasources VALUES\n('AW','.database.windows.net','','','AdventureWorks','SalesLT','dbo')\n\
    Listing 5-4\nPopulate your datasources metatable\n```\n\nThis solution expects\
    \ the master key to be set up already – this being a one-time task, there is simply\
    \ no need or justification to automate that step. If you skipped the manual table\
    \ creation in the previous exercise, you may want to fulfill this step manually\
    \ before continuing.\n\nOur solution contains two Biml files (actually four –\
    \ two files in C# and VB.NET, respectively):\n\n*   11_Polybase_C.biml\n\nThis\
    \ is the control file which will hold the connection strings to our metadata as\
    \ well as the target database. It will loop through the metadata and call the\
    \ other Biml file (using a function called CallBimlScript) for every single entry,\
    \ writing a .SQL file to C:\\temp\\polybase (so if you have ten entries in your\
    \ Datasources table, you will end up with ten files).\n\n*   12_PolybaseWriter_C.biml\n\
    \nThis file will generate the contents of each source schema.\n\nIf you take a\
    \ look at the first file, you will notice that it starts with the declaration\
    \ of two (in this case identical) connection strings. One points to your database\
    \ that holds your metadata; the other one points to the PolyBase database in which\
    \ you want the external tables to be created or updated (Listing [5-5](#480532_2_En_5_Chapter.xhtml#PC5)).\n\
    \n```\n\nListing 5-5\nBiml code to loop over the datasources metatable\n```\n\n\
    The actual magic happens in the second file. It takes the DataRow containing the\
    \ metadata as well as the connection string from the target database as its parameters.\
    \ It will then generate T-SQL to\n\n*   CREATE or ALTER the credentials for the\
    \ connection\n\n*   CREATE or ALTER the external data source\n\n*   DROP every\
    \ existing external table in the target database\n\n*   CREATE a corresponding\
    \ external table for every single table in the source scheme\n\nFor the first\
    \ three steps, it uses simple SQL Selects or semistatic T-SQL. For the fourth\
    \ part, it makes use of Biml’s ability to read and interpret a database’s schema\
    \ and store it in the Biml object model (Listing [5-6](#480532_2_En_5_Chapter.xhtml#PC6)).\n\
    \n```\n\n-- Syncing schema  in  to \n-- This script assumes that a master key\
    \ has been set\n-- CREATE/ALTER CREDENTIAL\nIF NOT EXISTS(select * from sys.database_credentials\
    \ WHERE NAME = '')\nBEGIN\nCREATE DATABASE SCOPED CREDENTIAL []\nWITH IDENTITY\
    \ = '', SECRET = '';\nEND\nELSE\nBEGIN\nALTER DATABASE SCOPED CREDENTIAL []\n\
    WITH IDENTITY = '', SECRET = '';\nEND\nGO\n-- CREATE DATASOURCE\nIF NOT EXISTS(SELECT\
    \ * FROM sys.external_data_sources WHERE NAME = '')\nBEGIN\nCREATE EXTERNAL DATA\
    \ SOURCE []\nWITH (LOCATION = 'sqlserver://', CREDENTIAL = []);\nEND\nELSE\nBEGIN\n\
    ALTER EXTERNAL DATA SOURCE [] SET LOCATION = N'sqlserver://', CREDENTIAL = []\n\
    END\nGO\n-- DROP EXISTING TABLES\n\nIF EXISTS(select * from sys.external_tables\
    \ WHERE object_id = )\nBEGIN\nDROP EXTERNAL TABLE [].[]\nEND\nGO\n\n-- CREATE\
    \ TABLES\n c.DataType == DbType.Xml)) {\ncol.DataType = DbType.AnsiString;\ncol.Length\
    \ = 8000;\n}\nforeach (AstTableColumnNode col in tbl.Columns.Where(c => (c.DataType\
    \ == DbType.String) && (c.Length == -1))) {\ncol.Length = 4000;\n}\nforeach (AstTableColumnNode\
    \ col in tbl.Columns.Where(c => (c.DataType == DbType.AnsiString || c.DataType\
    \ ==  DbType.Binary) & c.Length == -1)) {\ncol.Length = 8000;\n} #>\nIF NOT EXISTS(SELECT\
    \ * FROM sys.external_tables WHERE NAME = '')\nBEGIN\nCREATE EXTERNAL TABLE [].[]\
    \ (\n i.Name + \" \" + TSqlTypeTranslator.Translate(i.DataType, i.Length, i.Precision,\
    \ i.Scale, i.CustomType) + (i.IsNullable ? \" NULL\" : \" NOT NULL\")))#>\n)\n\
    WITH (LOCATION = '[].', DATA_SOURCE = []);\nEND\nGO\n\nListing 5-6\nBiml “12_PolybaseWriter_C.biml”\
    \ called by previous Biml script\n```\n\nAs the focus of this book is Big Data\
    \ Clusters, not Biml, we won’t go into any more details of this little helper.\
    \ The main idea was to show you one of multiple ways on how you can automate your\
    \ way through external tables.\n\nBy the way, it would be super easy to adjust\
    \ this code to work for other relational sources such as Teradata or Oracle and\
    \ automate external tables on these as well!"
  trans: "\n### 使用 Biml 自动化创建外部表\n\n如你所见，这个向导有其局限性，但其底层的 T-SQL 相当直接明了。因此，它是自动化的绝佳候选对象，而自动化可以通过多种方式实现，其中之一便是使用商业智能标记语言\
    \ (`Biml`)。\n\n如果你之前未曾接触过 `Biml`，互联网上有大量资源^(³,⁴,⁵)，《The Biml Book》^(⁶) 一书内部也提供了许多资料。如果你只想使用这个具体示例，你需要做的仅仅是：\n\
    \n*   获取免费的 `BimlExpress`^(⁷) 副本，这是一个完全集成于 Visual Studio 的免费 `Biml` 前端工具。\n* \
    \  从本书网站获取下文提供的源代码。\n*   按下文描述创建一个小型元数据存储库，并用你的元数据填充它。\n*   调整解决方案中的连接字符串。\n*\
    \   运行解决方案（只需在解决方案中右键单击 `11_Polybase_C.biml` 并选择 `Generate SSIS Package`）。尽管标题令人困惑，但这会将所有必需的\
    \ `.SQL` 文件写入到 `C:\\Temp\\Polybase` 目录。\n\n如前所述，我们将使用一个小型元数据表来管理数据源。在此示例中，我们将再次让\
    \ `Biml` 指向我们在 Azure 中的 `AdventureWorksLT` 数据库——你可以随意在此处添加你自己的数据源进行尝试。\n\n首先，创建一个名为\
    \ `Datasources` 的表（代码清单 5-3），例如，在你先前创建的数据库 `BDC_Empty` 中。显然，这个表可以按你希望的任何方式命名，可以放在你偏好的任何架构或数据库中——但为了简单起见，我们先保持这样。\n\
    \n```sql\nCREATE TABLE [dbo].Datasources NULL,\n    [Server] nvarchar NULL,\n\
    \    [UserID] nvarchar NULL,\n    [Password] nvarchar NULL,\n    [SRC_DB] nvarchar\
    \ NULL,\n    [SRC_Schema] nvarchar NULL,\n    [DEST_Schema] nvarchar NULL\n) ON\
    \ [PRIMARY]\n```\n*代码清单 5-3. 用于创建数据源元表的 T-SQL。*\n\n同时，只需向此表添加一条记录，指向你的 `AWLT`\
    \ 数据库（根据需要修改你的 DNS 名称、用户名和密码），使用代码清单 5-4 中的代码。\n\n```sql\nINSERT INTO Datasources\
    \ VALUES\n('AW','.database.windows.net','','','AdventureWorks','SalesLT','dbo')\n\
    ```\n*代码清单 5-4. 填充你的数据源元表。*\n\n此解决方案要求主密钥已经设置好——这是一项一次性任务，完全没有必要或理由去自动化这一步。如果你在之前的练习中跳过了手动创建表的步骤，你可能需要在继续之前手动完成此步骤。\n\
    \n我们的解决方案包含两个 `Biml` 文件（实际上是四个——分别对应 C# 和 VB.NET 的两个文件）：\n\n*   `11_Polybase_C.biml`\n\
    \    这是控制文件，其中包含指向我们元数据以及目标数据库的连接字符串。它将遍历元数据，并为每一个条目调用另一个 `Biml` 文件（使用名为 `CallBimlScript()`\
    \ 的函数），将一个 `.SQL` 文件写入到 `C:\\temp\\polybase`（因此，如果你的 `Datasources` 表中有十个条目，你最终会得到十个文件）。\n\
    *   `12_PolybaseWriter_C.biml`\n    此文件将生成每个源架构的内容。\n\n如果你查看第一个文件，你会注意到它以声明两个（在此情况下是相同的）连接字符串开始。一个指向存放你元数据的数据库；另一个指向你希望在其中创建或更新外部表的\
    \ PolyBase 数据库（代码清单 5-5）。\n\n```biml\n<Biml xmlns=\"http://schemas.varigence.com/biml.xsd\"\
    >\n    <Connections>\n        <Connection Name=\"Metadata\" ConnectionString=\"\
    Data Source=.;Initial Catalog=BDC;Provider=SQLNCLI10.1;Integrated Security=SSPI;\"\
    />\n        <Connection Name=\"Target\" ConnectionString=\"Data Source=.;Initial\
    \ Catalog=BDC;Provider=SQLNCLI10.1;Integrated Security=SSPI;\"/>\n    </Connections>\n\
    \    <Packages>\n        <Package Name=\"11_Polybase_C\" AutoCreateConnections=\"\
    false\" AutoCreateVariables=\"false\">\n            <Tasks>\n                <ForEachLoop\
    \ Name=\"Loop Through Metadata\" CollectionName=\"Metadata.Objects[SELECT [DataSource],[Server],[UserID],[Password],[SRC_DB],[SRC_Schema],[DEST_Schema]\
    \ FROM [dbo].[Datasources]]\">\n                    <Tasks>\n                \
    \        <ExecuteCallBimlScript Name=\"Generate SQL File\">\n                \
    \            <BimlScript File=\"12_PolybaseWriter_C.biml\" />\n              \
    \              <InputBindings>\n                                <Directory Path=\"\
    C:\\temp\\polybase\\\" />\n                            </InputBindings>\n    \
    \                        <OutputBindings>\n                                <Directory\
    \ Path=\"C:\\temp\\polybase\\\" />\n                            </OutputBindings>\n\
    \                        </ExecuteCallBimlScript>\n                    </Tasks>\n\
    \                </ForEachLoop>\n            </Tasks>\n        </Package>\n  \
    \  </Packages>\n</Biml>\n```\n*代码清单 5-5. 用于遍历数据源元表的 Biml 代码。*\n\n真正的魔法发生在第二个文件中。它将包含元数据的\
    \ `DataRow` 以及目标数据库的连接字符串作为其参数。然后它将生成 T-SQL 来：\n\n1.  `CREATE`（创建）或 `ALTER`（修改）连接凭据\n\
    2.  `CREATE`（创建）或 `ALTER`（修改）外部数据源\n3.  `DROP`（删除）目标数据库中每一个现有的外部表\n4.  `CREATE`（创建）源架构中每一个表对应的外部表\n\
    \n对于前三步，它使用简单的 SQL 查询或半静态的 T-SQL。对于第四部分，它利用了 `Biml` 读取和解释数据库架构并将其存储在 `Biml` 对象模型中的能力（代码清单\
    \ 5-6）。\n\n```sql\n-- Syncing schema <#=Target.Name#> in <#=Target.ConnectionString#>\n\
    -- This script assumes that a master key has been set\n\n-- CREATE/ALTER CREDENTIAL\n\
    IF NOT EXISTS(select * from sys.database_credentials WHERE NAME = '<#=Row[\"DataSource\"\
    ]#>')\nBEGIN\n    CREATE DATABASE SCOPED CREDENTIAL [<#=Row[\"DataSource\"]#>]\n\
    \    WITH IDENTITY = '<#=Row[\"UserID\"]#>', SECRET = '<#=Row[\"Password\"]#>';\n\
    END\nELSE\nBEGIN\n    ALTER DATABASE SCOPED CREDENTIAL [<#=Row[\"DataSource\"\
    ]#>]\n    WITH IDENTITY = '<#=Row[\"UserID\"]#>', SECRET = '<#=Row[\"Password\"\
    ]#>';\nEND\nGO\n\n-- CREATE DATASOURCE\nIF NOT EXISTS(SELECT * FROM sys.external_data_sources\
    \ WHERE NAME = '<#=Row[\"DataSource\"]#>')\nBEGIN\n    CREATE EXTERNAL DATA SOURCE\
    \ [<#=Row[\"DataSource\"]#>]\n    WITH (LOCATION = 'sqlserver://<#=Row[\"Server\"\
    ]#>', CREDENTIAL = [<#=Row[\"DataSource\"]#>]);\nEND\nELSE\nBEGIN\n    ALTER EXTERNAL\
    \ DATA SOURCE [<#=Row[\"DataSource\"]#>] SET LOCATION = N'sqlserver://<#=Row[\"\
    Server\"]#>', CREDENTIAL = [<#=Row[\"DataSource\"]#>]\nEND\nGO\n\n-- DROP EXISTING\
    \ TABLES\n<#\nforeach (AstTableNode tbl in RootNode.Tables.Where(t => t.Database.Name\
    \ == Row[\"SRC_DB\"].ToString() && t.Schema.Name == Row[\"SRC_Schema\"].ToString()))\
    \ {\n    string targetTable = \"[\" + Row[\"DEST_Schema\"].ToString() + \"].[\"\
    \ + tbl.Name + \"]\";\n#>\nIF EXISTS(select * from sys.external_tables WHERE object_id\
    \ = OBJECT_ID('<#=targetTable#>'))\nBEGIN\n    DROP EXTERNAL TABLE <#=targetTable#>\n\
    END\nGO\n<#\n}\n#>\n\n-- CREATE TABLES\n<#\nforeach (AstTableNode tbl in RootNode.Tables.Where(t\
    \ => t.Database.Name == Row[\"SRC_DB\"].ToString() && t.Schema.Name == Row[\"\
    SRC_Schema\"].ToString())) {\n    string targetTable = \"[\" + Row[\"DEST_Schema\"\
    ].ToString() + \"].[\" + tbl.Name + \"]\";\n#>\nIF NOT EXISTS(SELECT * FROM sys.external_tables\
    \ WHERE NAME = '<#=tbl.Name#>')\nBEGIN\n    CREATE EXTERNAL TABLE <#=targetTable#>\
    \ (\n    <#=String.Join(\",\" + Environment.NewLine, tbl.Columns.Where(c => !c.IsComputed).Select(i\
    \ => \"    \" + i.Name + \" \" + TSqlTypeTranslator.Translate(i.DataType, i.Length,\
    \ i.Precision, i.Scale, i.CustomType) + (i.IsNullable ? \" NULL\" : \" NOT NULL\"\
    )))#>\n    )\n    WITH (LOCATION = '[<#=Row[\"SRC_Schema\"]#>].<# =tbl.Name#>',\
    \ DATA_SOURCE = [<#=Row[\"DataSource\"]#>]);\nEND\nGO\n<#\n}\n#>\n```\n*代码清单 5-6.\
    \ 被前一个 Biml 脚本调用的 Biml `12_PolybaseWriter_C.biml`。*\n\n由于本书的重点是大数据集群，而非 `Biml`，因此我们不会深入探讨这个小助手的更多细节。主要目的是向你展示多种自动化处理外部表的方法之一。\n\
    \n顺便说一下，调整此代码以适用于其他关系型数据源（如 Teradata 或 Oracle）并自动化这些源上的外部表也会非常容易！\n"
- fmt: '# External Tables from CSV Files in HDFS


    As you’ve learned already, besides other relational databases, you can also query
    flat files using T-SQL and PolyBase. As flat files do not have a “one-size-fits-all”
    format due to different delimiters and so on, we need to define at least one format
    definition. This definition resides in your database, so the same definition can
    be shared by multiple files, but you need to re-create the definition for every
    database you want the format to be available in.


    Let’s start with a simple example (Listing [5-7](#480532_2_En_5_Chapter.xhtml#PC7))
    in the `sales` database that was included in the Microsoft samples.


    ```sql

    CREATE EXTERNAL FILE FORMAT csv_file

    WITH (

    FORMAT_TYPE = DELIMITEDTEXT,

    FORMAT_OPTIONS(

    FIELD_TERMINATOR = '','',

    STRING_DELIMITER = ''"'',

    FIRST_ROW = 2,

    USE_TYPE_DEFAULT = TRUE)

    );

    ```

    **Listing 5-7** T-SQL code to create external file format


    This T-SQL code will create a format called `csv_file`; the file will be a delimited
    text file with double quotes as your text qualifier and a comma as your delimiter.
    The first row will be skipped. The parameter `USE_TYPE_DEFAULT` will determine
    how to handle missing fields. If it’s false, a missing field in the file will
    be `NULL`; otherwise, it will be `0` for numeric, an empty string for character-based
    columns, and `01/01/1900` for any date columns.


    In this case, we will use the `StoragePool` which is the HDFS storage that is
    built into Big Data Clusters. To be able to access the `StoragePool`, you will
    need to create an external data source that points to it as shown in Listing [5-8](#480532_2_En_5_Chapter.xhtml#PC8).


    ```sql

    IF NOT EXISTS(SELECT * FROM sys.external_data_sources WHERE name = ''SqlStoragePool'')

    CREATE EXTERNAL DATA SOURCE SqlStoragePool

    WITH (LOCATION = ''sqlhdfs://controller-svc/default'');

    ```

    **Listing 5-8** T-SQL code to create pointer to the storage pool


    With the format and data source in place, we can now create an external table
    that references this format as well as a file location (Listing [5-9](#480532_2_En_5_Chapter.xhtml#PC9)).


    ```sql

    CREATE EXTERNAL TABLE [web_clickstreams_hdfs_csv]

    ("wcs_click_date_sk" BIGINT , "wcs_click_time_sk" BIGINT , "wcs_sales_sk" BIGINT
    , "wcs_item_sk" BIGINT , "wcs_web_page_sk" BIGINT , "wcs_user_sk" BIGINT)

    WITH

    (

    DATA_SOURCE = SqlStoragePool,

    LOCATION = ''/clickstream_data'',

    FILE_FORMAT = csv_file

    );

    ```

    **Listing 5-9** T-SQL code to create an external table based on a CSV file


    Just as with the SQL Server–based external tables, the first step is to define
    the columns including their names and datatypes. In addition, we need to provide
    a `DATA_SOURCE` which is our `SqlStoragePool`, so basically the HDFS of our Big
    Data Cluster (where we also uploaded the flight delay samples earlier); a `LOCATION`
    within that source (in this case, the `clickstream_data` subfolder); and a `FILE_FORMAT`
    which is our `csv_file` format we’ve created in the previous step.


    Again, no data is transferred at this point. All we did was to create references
    to data residing somewhere else – in this case within the storage pool.


    We can now live-query this file by a simple query like this (Listing [5-10](#480532_2_En_5_Chapter.xhtml#PC10)).


    ```sql

    SELECT * FROM [dbo].[web_clickstreams_hdfs_csv]

    ```

    **Listing 5-10** SELECT statement against csv-based external table


    But we can also join the data from the CSV with data that sits in a regular table
    within this database (Listing [5-11](#480532_2_En_5_Chapter.xhtml#PC11)).


    ```sql

    SELECT

    wcs_user_sk,

    SUM( CASE WHEN i_category = ''Books'' THEN 1 ELSE 0 END) AS book_category_clicks,

    SUM( CASE WHEN i_category_id = 1 THEN 1 ELSE 0 END) AS [Home & Kitchen],

    SUM( CASE WHEN i_category_id = 2 THEN 1 ELSE 0 END) AS [Music],

    SUM( CASE WHEN i_category_id = 3 THEN 1 ELSE 0 END) AS [Books],

    SUM( CASE WHEN i_category_id = 4 THEN 1 ELSE 0 END) AS [Clothing & Accessories],

    SUM( CASE WHEN i_category_id = 5 THEN 1 ELSE 0 END) AS [Electronics],

    SUM( CASE WHEN i_category_id = 6 THEN 1 ELSE 0 END) AS [Tools & Home Improvement],

    SUM( CASE WHEN i_category_id = 7 THEN 1 ELSE 0 END) AS [Toys & Games],

    SUM( CASE WHEN i_category_id = 8 THEN 1 ELSE 0 END) AS [Movies & TV],

    SUM( CASE WHEN i_category_id = 9 THEN 1 ELSE 0 END) AS [Sports & Outdoors]

    FROM [dbo].[web_clickstreams_hdfs_csv]

    INNER JOIN item it ON (wcs_item_sk = i_item_sk

    AND wcs_user_sk IS NOT NULL)

    GROUP BY  wcs_user_sk;

    ```

    **Listing 5-11** SELECT statement joining a regular table with a csv-based external
    table


    Let’s take a look at the execution plan of this query (Figure [5-14](#480532_2_En_5_Chapter.xhtml#Fig14)).


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig14_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig14_HTML.jpg)

    **Figure 5-14** Execution plan of previous SELECT statement in ADS


    As you can see, this is – as expected – a combination of well-known operations
    like a clustered columnstore index scan as well as new features like the external
    select which are eventually merged together.


    Of course, we can also join data from multiple CSVs. Therefore, we create an external
    table for each of our flight delay CSV files first. To help with that, there is
    another wizard (Figure [5-15](#480532_2_En_5_Chapter.xhtml#Fig15)).


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig15_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig15_HTML.jpg)

    **Figure 5-15** Create external table from CSV menu in ADS


    Right-click the file `“airlines.csv”` in Azure Data Studio and select `“Create
    External Table From CSV Files.”`


    This will launch the wizard.


    In the first screen (Figure [5-16](#480532_2_En_5_Chapter.xhtml#Fig16)), it will
    ask you for the connection details to your SQL Server Master Instance which you
    can also choose from a drop-down list of active connections, if you’re currently
    connected to the instance.


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig16_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig16_HTML.jpg)

    **Figure 5-16** Create External Table Wizard (CSV) in ADS – select master instance


    Fill them in or select your connection and click `“Next.”`


    In the next step (Figure [5-17](#480532_2_En_5_Chapter.xhtml#Fig17)), the wizard
    will propose a target database as well as the name and the schema of the external
    table. All three can be modified if needed.


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig17_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig17_HTML.jpg)

    **Figure 5-17** Create External Table Wizard (CSV) in ADS – target table details


    For now, just confirm with `“Next.”`


    The next screen (Figure [5-18](#480532_2_En_5_Chapter.xhtml#Fig18)) gives you
    a preview of the data in the table (first 50 rows) so you can get a feeling about
    what the file is representing. Obviously, for rather wide files, this is not super
    helpful.


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig18_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig18_HTML.jpg)

    **Figure 5-18** Create External Table Wizard (CSV) in ADS – Preview Data


    There is nothing that can actually be done on this screen so just click `“Next”`
    again.


    In step four (Figure [5-19](#480532_2_En_5_Chapter.xhtml#Fig19)), the wizard is
    proposing column names and data types. Both can be overridden. Unless you have
    a good reason to, in many cases it’s actually a good advice to leave it unchanged
    as the detection mechanisms are rather solid so far.


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig19_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig19_HTML.jpg)

    **Figure 5-19** Create External Table Wizard (CSV) in ADS – Modify Columns'
  raw: '### External Tables from CSV Files in HDFS


    As you’ve learned already, besides other relational databases, you can also query
    flat files using T-SQL and PolyBase. As flat files do not have a “one-size-fits-all”
    format due to different delimiters and so on, we need to define at least one format
    definition. This definition resides in your database, so the same definition can
    be shared by multiple files, but you need to re-create the definition for every
    database you want the format to be available in.


    Let’s start with a simple example (Listing [5-7](#480532_2_En_5_Chapter.xhtml#PC7))
    in the sales database that was included in the Microsoft samples.


    ```

    CREATE EXTERNAL FILE FORMAT csv_file

    WITH (

    FORMAT_TYPE = DELIMITEDTEXT,

    FORMAT_OPTIONS(

    FIELD_TERMINATOR = '','',

    STRING_DELIMITER = ''"'',

    FIRST_ROW = 2,

    USE_TYPE_DEFAULT = TRUE)

    );

    Listing 5-7

    T-SQL code to create external file format

    ```


    This T-SQL code will create a format called csv_file; the file will be a delimited
    text file with double quotes as your text qualifier and a comma as your delimiter.
    The first row will be skipped. The parameter USE_TYPE_DEFAULT will determine how
    to handle missing fields. If it’s false, a missing field in the file will be NULL;
    otherwise, it will be 0 for numeric, an empty string for character-based columns,
    and 01/01/1900 for any date columns.


    In this case, we will use the *StoragePool* which is the HDFS storage that is
    built into Big Data Clusters. To be able to access the StoragePool, you will need
    to create an external data source that points to it as shown in Listing [5-8](#480532_2_En_5_Chapter.xhtml#PC8).


    ```

    IF NOT EXISTS(SELECT * FROM sys.external_data_sources WHERE name = ''SqlStoragePool'')

    CREATE EXTERNAL DATA SOURCE SqlStoragePool

    WITH (LOCATION = ''sqlhdfs://controller-svc/default'');

    Listing 5-8

    T-SQL code to create pointer to the storage pool

    ```


    With the format and data source in place, we can now create an external table
    that references this format as well as a file location (Listing [5-9](#480532_2_En_5_Chapter.xhtml#PC9)).


    ```

    CREATE EXTERNAL TABLE [web_clickstreams_hdfs_csv]

    ("wcs_click_date_sk" BIGINT , "wcs_click_time_sk" BIGINT , "wcs_sales_sk" BIGINT
    , "wcs_item_sk" BIGINT , "wcs_web_page_sk" BIGINT , "wcs_user_sk" BIGINT)

    WITH

    (

    DATA_SOURCE = SqlStoragePool,

    LOCATION = ''/clickstream_data'',

    FILE_FORMAT = csv_file

    );

    Listing 5-9

    T-SQL code to create an external table based on a CSV file

    ```


    Just as with the SQL Server`–`based external tables, the first step is to define
    the columns including their names and datatypes. In addition, we need to provide
    a DATA_SOURCE which is our SqlStoragePool, so basically the HDFS of our Big Data
    Cluster (where we also uploaded the flight delay samples earlier); a LOCATION
    within that source (in this case, the clickstream_data subfolder); and a FILE_FORMAT
    which is our csv_file format we’ve created in the previous step.


    Again, no data is transferred at this point. All we did was to create references
    to data residing somewhere else – in this case within the storage pool.


    We can now live-query this file by a simple query like this (Listing [5-10](#480532_2_En_5_Chapter.xhtml#PC10)).


    ```

    SELECT * FROM [dbo].[web_clickstreams_hdfs_csv]

    Listing 5-10

    SELECT statement against csv-based external table

    ```


    But we can also join the data from the CSV with data that sits in a regular table
    within this database (Listing [5-11](#480532_2_En_5_Chapter.xhtml#PC11)).


    ```

    SELECT

    wcs_user_sk,

    SUM( CASE WHEN i_category = ''Books'' THEN 1 ELSE 0 END) AS book_category_clicks,

    SUM( CASE WHEN i_category_id = 1 THEN 1 ELSE 0 END) AS [Home & Kitchen],

    SUM( CASE WHEN i_category_id = 2 THEN 1 ELSE 0 END) AS [Music],

    SUM( CASE WHEN i_category_id = 3 THEN 1 ELSE 0 END) AS [Books],

    SUM( CASE WHEN i_category_id = 4 THEN 1 ELSE 0 END) AS [Clothing & Accessories],

    SUM( CASE WHEN i_category_id = 5 THEN 1 ELSE 0 END) AS [Electronics],

    SUM( CASE WHEN i_category_id = 6 THEN 1 ELSE 0 END) AS [Tools & Home Improvement],

    SUM( CASE WHEN i_category_id = 7 THEN 1 ELSE 0 END) AS [Toys & Games],

    SUM( CASE WHEN i_category_id = 8 THEN 1 ELSE 0 END) AS [Movies & TV],

    SUM( CASE WHEN i_category_id = 9 THEN 1 ELSE 0 END) AS [Sports & Outdoors]

    FROM [dbo].[web_clickstreams_hdfs_csv]

    INNER JOIN item it ON (wcs_item_sk = i_item_sk

    AND wcs_user_sk IS NOT NULL)

    GROUP BY  wcs_user_sk;

    Listing 5-11

    SELECT statement joining a regular table with a csv-based external table

    ```


    Let’s take a look at the execution plan of this query (Figure [5-14](#480532_2_En_5_Chapter.xhtml#Fig14)).


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig14_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Execution plan of previous SELECT statement in ADS


    As you can see, this is – as expected – a combination of well-known operations
    like a clustered columnstore index scan as well as new features like the external
    select which are eventually merged together.


    Of course, we can also join data from multiple CSVs. Therefore, we create an external
    table for each of our flight delay CSV files first. To help with that, there is
    another wizard (Figure [5-15](#480532_2_En_5_Chapter.xhtml#Fig15)).


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig15_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Create external table from CSV menu in ADS


    Right-click the file “airlines.csv” in Azure Data Studio and select “Create External
    Table From CSV Files.”


    This will launch the wizard.


    In the first screen (Figure [5-16](#480532_2_En_5_Chapter.xhtml#Fig16)), it will
    ask you for the connection details to your SQL Server Master Instance which you
    can also choose from a drop-down list of active connections, if you’re currently
    connected to the instance.


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig16_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig16_HTML.jpg)


    Figure 5-16


    Create External Table Wizard (CSV) in ADS – select master instance


    Fill them in or select your connection and click “Next.”


    In the next step (Figure [5-17](#480532_2_En_5_Chapter.xhtml#Fig17)), the wizard
    will propose a target database as well as the name and the schema of the external
    table. All three can be modified if needed.


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig17_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig17_HTML.jpg)


    Figure 5-17


    Create External Table Wizard (CSV) in ADS – target table details


    For now, just confirm with “Next.”


    The next screen (Figure [5-18](#480532_2_En_5_Chapter.xhtml#Fig18)) gives you
    a preview of the data in the table (first 50 rows) so you can get a feeling about
    what the file is representing. Obviously, for rather wide files, this is not super
    helpful.


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig18_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig18_HTML.jpg)


    Figure 5-18


    Create External Table Wizard (CSV) in ADS – Preview Data


    There is nothing that can actually be done on this screen so just click “Next”
    again.


    In step four (Figure [5-19](#480532_2_En_5_Chapter.xhtml#Fig19)), the wizard is
    proposing column names and data types. Both can be overridden. Unless you have
    a good reason to, in many cases it’s actually a good advice to leave it unchanged
    as the detection mechanisms are rather solid so far.


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig19_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig19_HTML.jpg)


    Figure 5-19


    Create External Table Wizard (CSV) in ADS – Modify Columns'
  trans: '# 来自 HDFS 中 CSV 文件的外部表


    正如您已经了解到的，除了其他关系型数据库外，您还可以使用 T-SQL 和 PolyBase 查询平面文件。由于分隔符等原因，平面文件没有一种“放之四海而皆准”的通用格式，因此我们至少需要定义一种格式。这个定义驻留在您的数据库中，因此同一个定义可以被多个文件共享，但您需要为希望该格式可用的每个数据库重新创建此定义。


    让我们从 `sales` 数据库（包含在 Microsoft 示例中）的一个简单示例（清单 5-7）开始。


    ```sql

    CREATE EXTERNAL FILE FORMAT csv_file

    WITH (

    FORMAT_TYPE = DELIMITEDTEXT,

    FORMAT_OPTIONS(

    FIELD_TERMINATOR = '','',

    STRING_DELIMITER = ''"'',

    FIRST_ROW = 2,

    USE_TYPE_DEFAULT = TRUE)

    );

    ```

    **清单 5-7** 创建外部文件格式的 T-SQL 代码


    此 T-SQL 代码将创建一个名为 `csv_file` 的格式；该文件将是一个以双引号作为文本限定符、逗号作为分隔符的分隔文本文件。第一行将被跳过。参数
    `USE_TYPE_DEFAULT` 将决定如何处理缺失的字段。如果为 `false`，文件中缺失的字段将为 `NULL`；否则，数值型字段为 `0`，基于字符的列为空字符串，任何日期列为
    `01/01/1900`。


    在本例中，我们将使用 `StoragePool`，它是大数据集群内置的 HDFS 存储。要能够访问 `StoragePool`，您需要创建一个指向它的外部数据源，如清单
    5-8 所示。


    ```sql

    IF NOT EXISTS(SELECT * FROM sys.external_data_sources WHERE name = ''SqlStoragePool'')

    CREATE EXTERNAL DATA SOURCE SqlStoragePool

    WITH (LOCATION = ''sqlhdfs://controller-svc/default'');

    ```

    **清单 5-8** 创建指向存储池指针的 T-SQL 代码


    格式和数据源准备就绪后，我们现在可以创建一个引用此格式以及文件位置的外部表（清单 5-9）。


    ```sql

    CREATE EXTERNAL TABLE [web_clickstreams_hdfs_csv]

    ("wcs_click_date_sk" BIGINT , "wcs_click_time_sk" BIGINT , "wcs_sales_sk" BIGINT
    , "wcs_item_sk" BIGINT , "wcs_web_page_sk" BIGINT , "wcs_user_sk" BIGINT)

    WITH

    (

    DATA_SOURCE = SqlStoragePool,

    LOCATION = ''/clickstream_data'',

    FILE_FORMAT = csv_file

    );

    ```

    **清单 5-9** 基于 CSV 文件创建外部表的 T-SQL 代码


    与基于 SQL Server 的外部表一样，第一步是定义列，包括其名称和数据类型。此外，我们需要提供一个 `DATA_SOURCE`，即我们的 `SqlStoragePool`，基本上就是我们大数据集群的
    HDFS（之前我们也在此上传了航班延误样本）；该源内的一个 `LOCATION`（在本例中是 `clickstream_data` 子文件夹）；以及一个 `FILE_FORMAT`，即我们在上一步创建的
    `csv_file` 格式。


    同样，此时没有传输任何数据。我们所做的只是创建了对驻留在其他地方的数据的引用——在本例中是存储池内。


    我们现在可以通过一个简单的查询实时查询此文件，如清单 5-10 所示。


    ```sql

    SELECT * FROM [dbo].[web_clickstreams_hdfs_csv]

    ```

    **清单 5-10** 针对基于 CSV 的外部表的 SELECT 语句


    但是，我们也可以将来自 CSV 的数据与此数据库中常规表中的数据进行连接，如清单 5-11 所示。


    ```sql

    SELECT

    wcs_user_sk,

    SUM( CASE WHEN i_category = ''Books'' THEN 1 ELSE 0 END) AS book_category_clicks,

    SUM( CASE WHEN i_category_id = 1 THEN 1 ELSE 0 END) AS [Home & Kitchen],

    SUM( CASE WHEN i_category_id = 2 THEN 1 ELSE 0 END) AS [Music],

    SUM( CASE WHEN i_category_id = 3 THEN 1 ELSE 0 END) AS [Books],

    SUM( CASE WHEN i_category_id = 4 THEN 1 ELSE 0 END) AS [Clothing & Accessories],

    SUM( CASE WHEN i_category_id = 5 THEN 1 ELSE 0 END) AS [Electronics],

    SUM( CASE WHEN i_category_id = 6 THEN 1 ELSE 0 END) AS [Tools & Home Improvement],

    SUM( CASE WHEN i_category_id = 7 THEN 1 ELSE 0 END) AS [Toys & Games],

    SUM( CASE WHEN i_category_id = 8 THEN 1 ELSE 0 END) AS [Movies & TV],

    SUM( CASE WHEN i_category_id = 9 THEN 1 ELSE 0 END) AS [Sports & Outdoors]

    FROM [dbo].[web_clickstreams_hdfs_csv]

    INNER JOIN item it ON (wcs_item_sk = i_item_sk

    AND wcs_user_sk IS NOT NULL)

    GROUP BY  wcs_user_sk;

    ```

    **清单 5-11** 将常规表与基于 CSV 的外部表连接的 SELECT 语句


    让我们看一下这个查询的执行计划（图 5-14）。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig14_HTML.jpg](img/480532_2_En_5_Fig14_HTML.jpg)

    **图 5-14** ADS 中前一个 SELECT 语句的执行计划


    如您所见，正如预期的那样，这是熟悉的操作（如聚集列存储索引扫描）与新功能（如最终合并在一起的外部选择）的组合。


    当然，我们也可以连接来自多个 CSV 的数据。为此，我们首先为每个航班延误 CSV 文件创建一个外部表。为此，有另一个向导（图 5-15）。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig15_HTML.jpg](img/480532_2_En_5_Fig15_HTML.jpg)

    **图 5-15** ADS 中的“从 CSV 创建外部表”菜单


    在 Azure Data Studio 中右键单击文件 `"airlines.csv"`，然后选择 `"Create External Table From
    CSV Files"`。


    这将启动向导。


    在第一个屏幕（图 5-16）中，它将要求您输入 SQL Server 主实例的连接详细信息，如果您当前已连接到该实例，也可以从活动连接下拉列表中选择。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig16_HTML.jpg](img/480532_2_En_5_Fig16_HTML.jpg)

    **图 5-16** ADS 中的创建外部表向导 (CSV) – 选择主实例


    填写它们或选择您的连接，然后单击 `"Next"`。


    在下一步（图 5-17）中，向导将建议目标数据库以及外部表的名称和架构。如果需要，所有三项都可以修改。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig17_HTML.jpg](img/480532_2_En_5_Fig17_HTML.jpg)

    **图 5-17** ADS 中的创建外部表向导 (CSV) – 目标表详细信息


    目前，只需点击 `"Next"` 确认。


    下一个屏幕（图 5-18）为您提供了表中数据的预览（前 50 行），以便您了解文件所表示的内容。显然，对于较宽的文件，这并不是特别有用。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig18_HTML.jpg](img/480532_2_En_5_Fig18_HTML.jpg)

    **图 5-18** ADS 中的创建外部表向导 (CSV) – 预览数据


    此屏幕上实际上无法执行任何操作，因此只需再次单击 `"Next"`。


    在第四步（图 5-19）中，向导会建议列名和数据类型。两者都可以覆盖。除非您有充分的理由，否则在许多情况下，实际上建议保持不变，因为目前的检测机制相当可靠。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig19_HTML.jpg](img/480532_2_En_5_Fig19_HTML.jpg)

    **图 5-19** ADS 中的创建外部表向导 (CSV) – 修改列'
- fmt: '## 使用向导创建CSV外部表


    点击“下一步”（`Next`）后，我们会看到一个如图[5-20](#480532_2_En_5_Chapter.xhtml#Fig20)所示的摘要界面，这与
    SQL Server 表向导之后的情况类似。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig20_HTML.jpg](images/480532_2_En_5_Chapter/480532_2_En_5_Fig20_HTML.jpg)


    **图 5-20** ADS 中创建外部表向导（CSV）- 摘要


    选择“生成脚本”（`Generate Script`）并点击“取消”（`Cancel`）。查看生成的脚本（清单[5-12](#480532_2_En_5_Chapter.xhtml#PC12)）。


    ```sql

    BEGIN TRY

    BEGIN TRANSACTION Td436a09bbb9a472298de35f6f88d889

    USE [sales];

    CREATE EXTERNAL FILE FORMAT [FileFormat_dbo_airlines]

    WITH (FORMAT_TYPE = DELIMITEDTEXT, FORMAT_OPTIONS (FIELD_TERMINATOR = '','', STRING_DELIMITER
    = ''"'', FIRST_ROW = 2));

    CREATE EXTERNAL TABLE [dbo].[airlines]

    (

    [IATA_CODE] nvarchar(50) NOT NULL,

    [AIRLINE] nvarchar(50) NOT NULL

    )

    WITH (LOCATION = ''/Flight_Delays/airlines.csv'', DATA_SOURCE = [SqlStoragePool],
    FILE_FORMAT = [FileFormat_dbo_airlines]);

    COMMIT TRANSACTION Td436a09bbb9a472298de35f6f88d889

    END TRY

    BEGIN CATCH

    IF @@TRANCOUNT > 0

    ROLLBACK TRANSACTION Td436a09bbb9a472298de35f6f88d889

    DECLARE @ErrorMessage NVARCHAR(4000) = ERROR_MESSAGE();

    DECLARE @ErrorSeverity INT = ERROR_SEVERITY();

    DECLARE @ErrorState INT = ERROR_STATE();

    RAISERROR(@ErrorMessage, @ErrorSeverity, @ErrorState);

    END CATCH;

    ```

    **清单 5-12** ADS 中创建外部表向导（CSV）的 T-SQL 输出


    如你所见，该向导不会复用相同的文件格式，而是为每个文件创建一个格式。这显然有利有弊。最大的好处是，你最终不会得到数百个格式。最大的缺点是你可能开始在不需要的地方构建文件之间的依赖关系。是否要修改脚本以使用之前创建的`csv_file`格式，或者仅为本次练习继续创建新格式，这取决于你。


    对另外两个文件重复这些步骤。


    然后，我们就可以像查询 SQL 表一样查询并连接它们（见清单[5-13](#480532_2_En_5_Chapter.xhtml#PC13)），以获取取消次数最高的十个航空公司/目的地城市组合。


    ```sql

    SELECT TOP 10 ap.CITY, al.AIRLINE, COUNT(*)

    FROM flights fl

    INNER JOIN airlines al

    ON fl.AIRLINE = al.IATA_CODE

    INNER JOIN airports ap

    ON fl.DESTINATION_AIRPORT = ap.IATA_CODE

    WHERE cancelled = 1

    GROUP BY ap.CITY,

    al.AIRLINE

    ORDER BY COUNT(*) DESC;

    ```

    **清单 5-13** 针对先前创建的外部表的`SELECT`语句


    这将导致一个错误。


    原因是该向导只查看你数据的前 50 行，所以如果你的数据在这些行中没有显示某种模式，它就不会被检测到。不过，错误信息（图[5-21](#480532_2_En_5_Chapter.xhtml#Fig21)）清楚地告诉了我们问题所在。


    ![../images/480532_2_En_5_Chapter/480532_2_En_5_Fig21_HTML.png](images/480532_2_En_5_Chapter/480532_2_En_5_Fig21_HTML.png)


    **图 5-21** 查询外部表时的错误信息


    在第 14500 行（远超过前 50 行），`AIR_SYSTEM_DELAY`列发生了溢出。


    如果我们查看该表的脚本（清单[5-14](#480532_2_En_5_Chapter.xhtml#PC14)），会注意到此列被检测为`tinyint`。


    ```sql

    CREATE EXTERNAL TABLE [dbo].[flights]

    (

    [YEAR] smallint NOT NULL,

    [MONTH] tinyint NOT NULL,

    [DAY] tinyint NOT NULL,

    [DAY_OF_WEEK] tinyint NOT NULL,

    [AIRLINE] nvarchar(50) NOT NULL,

    [FLIGHT_NUMBER] smallint NOT NULL,

    [TAIL_NUMBER] nvarchar(50),

    [ORIGIN_AIRPORT] nvarchar(50) NOT NULL,

    [DESTINATION_AIRPORT] nvarchar(50) NOT NULL,

    [SCHEDULED_DEPARTURE] time NOT NULL,

