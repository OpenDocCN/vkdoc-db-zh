- fmt: '## Working with SQL Queries on Spark Data Frames


    So far in this chapter, we have used functions related to data frame handling
    to perform actions like selecting a specific column, sorting, and grouping data.
    Another option we have to work with the data inside data frame is by accessing
    it through SQL queries directly in Spark. For those who are familiar with writing
    SQL code, this method might prove far easier to use than learning all the new
    functions (and many more we haven’t touched) earlier.


    Before we can write SQL queries against a data frame, we have to register it as
    a table structure which we can do through the code in Listing [6-28](#480532_2_En_6_Chapter.xhtml#PC28).


    ```python

    # Register the df_flightinfo data frame as a (temporary) table so we can run SQL
    queries against it

    df_flightinfo.registerTempTable("FlightInfoTable")

    ```


    *Listing 6-28 Registering a temporary table*


    Now that we have registered our data frame as a (temporary) table, we can run
    SQL queries against it using the `sqlContext` command (Listing [6-29](#480532_2_En_6_Chapter.xhtml#PC29))
    which calls the Spark SQL module which is included in the Spark engine (Figure
    [6-27](#480532_2_En_6_Chapter.xhtml#Fig27)).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig27_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig27_HTML.jpg)


    *Figure 6-27 Top ten rows of the FlightInfoTable queried using Spark SQL*


    ```python

    # Select the top ten rows from the FlightInfoTable for a selection of columns

    sqlContext.sql("SELECT FLIGHT_NUMBER, ORIGIN_AIRPORT, DESTINATION_AIRPORT, ELAPSED_TIME
    FROM FlightInfoTable").show(10)

    ```


    *Listing 6-29 Select first ten rows of a table using SQL*


    As you can see in the preceding example, we executed a simple SELECT SQL query
    in which we supplied a number of columns we want to return. The Spark SQL modules
    process the SQL query and execute it against the table structure we created earlier.
    Just like the example we’ve shown before, we still need to supply the `.show()`
    function to return the results in a table-like structure.


    Practically everything you can do using SQL code can be applied in Spark as well.
    For instance, the last example (Listing [6-30](#480532_2_En_6_Chapter.xhtml#PC30))
    in the previous section showed how to group data and calculate an average. We
    can do identical processing using a SQL query as shown in the example in Figure
    [6-28](#480532_2_En_6_Chapter.xhtml#Fig28).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig28_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig28_HTML.jpg)


    *Figure 6-28 Average flight distance grouped for each airline*


    ```python

    # Group the flight distance for each airline and return the average flight distance
    for each flight

    sqlContext.sql("SELECT AIRLINE, AVG(DISTANCE) FROM FlightInfoTable GROUP BY AIRLINE
    ORDER BY ''avg(Distance)'' DESC").show()

    ```


    *Listing 6-30 Aggregate a column grouped by another column with SQL*


    ## Reading Data from the SQL Server Master Instance


    A huge advantage of SQL Server Big Data Clusters is that we have access to data
    stored in SQL Server instances and HDFS. So far, we have mostly worked with datasets
    that are stored on the HDFS filesystem, accessing them directly through Spark
    or creating external tables using PolyBase inside SQL Server. However, we can
    also access data stored inside a SQL Server database inside the Big Data Cluster
    directly from Spark. This can be very useful in situations where you have a part
    of the data stored in SQL Server and the rest on HDFS and you want to bring both
    together. Or perhaps you want to use the distributed processing capabilities of
    Spark to work with your SQL table data from a performance perspective.


    Getting data stored inside the SQL Server Master Instance of your Big Data Cluster
    is relatively straightforward since we can connect using the SQL Server JDBC driver
    that is natively supported in Spark. We can use the `master-0.master-svc` server
    name to indicate we want to connect to the SQL Server Master Instance (Listing
    [6-31](#480532_2_En_6_Chapter.xhtml#PC31)).


    ```python

    # Connect to the SQL Server master instance inside the Big Data Cluster

    # and read data from a table into a data frame

    df_sqldb_sales = spark.read.format("jdbc") \

    .option("url", "jdbc:sqlserver://master-0.master-svc;databaseName=AdventureWorks2014")
    \

    .option("dbtable", "Sales.SalesOrderDetail") \

    .option("user", "sa") \

    .option("password", "[your SA password]").load()

    ```


    *Listing 6-31 Execute SQL Query against Master Instance*


    The preceding code sets up a connection to our SQL Server Master Instance and
    connects to the `AdventureWorks2014` database we created there earlier in this
    book. Using the “dbtable” option, we can directly map a SQL table to the data
    frame we are going to create using the preceding code.


    After executing the code, we have a copy of the SQL table data stored inside a
    data frame inside our Spark cluster and we can access it like we’ve shown earlier
    (Listing [6-31](#480532_2_En_6_Chapter.xhtml#PC31) leads to Figure [6-30](#480532_2_En_6_Chapter.xhtml#Fig30)).


    To only retrieve the first ten rows, run Listing [6-32](#480532_2_En_6_Chapter.xhtml#PC32).
    This will result in Figure [6-29](#480532_2_En_6_Chapter.xhtml#Fig29).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig29_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig29_HTML.jpg)


    *Figure 6-29 Data frame created from a table inside the SQL Server Master Instance*


    ```python

    df_sqldb_sales.show(10)

    ```


    *Listing 6-32 Retrieve first ten rows*


    Something that is interesting to point out for this process is the fact that Spark
    automatically sets the datatypes for each column to the same type as it is configured
    inside the SQL Server database (with some exceptions in datatype naming, `datetime`
    in SQL is `timestamp` in Spark, and datatypes that are not directly supported
    in Spark, like `uniqueidentifier`) which you can see in the schema of the data
    frame shown in Figure [6-30](#480532_2_En_6_Chapter.xhtml#Fig30).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig30_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig30_HTML.jpg)


    *Figure 6-30 Data frame schema of our imported data frame from the SQL Server
    Master Instance*


    Next to creating a data frame from a SQL table, we can also supply a query to
    select only the columns we are after, or perhaps perform some other SQL functions
    like grouping the data. The example in Listing [6-33](#480532_2_En_6_Chapter.xhtml#PC33)
    shows how we can load a data frame using a SQL query (Figure [6-31](#480532_2_En_6_Chapter.xhtml#Fig31)).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig31_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig31_HTML.jpg)


    *Figure 6-31 Schema of the df_sqldb_query data frame*


    ```python

    # While we can map a table to a data frame, we can also execute a SQL query

    df_sqldb_query = spark.read.format("jdbc") \

    .option("url", "jdbc:sqlserver://master-0.master-svc;databaseName=AdventureWorks2014")
    \

    .option("query", "SELECT SalesOrderID, OrderQty, UnitPrice, UnitPriceDiscount
    FROM Sales.SalesOrderDetail") \

    .option("user", "sa") \

    .option("password", "[your SA password]").load()

    df_sqldb_query.printSchema()

    ```


    *Listing 6-33 Use SQL Query instead of mapping a table for a data frame*'
