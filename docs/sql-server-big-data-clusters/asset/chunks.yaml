- fmt: '# SQL Server on Linux


    In March 2016, Microsoft announced that the next edition of SQL Server, which
    turned out to be SQL Server 2017, would be available not only on Windows operating
    systems but on Linux as well – something that seemed impossible for as long as
    Microsoft has been building software suddenly became a reality and, needless to
    say, the entire IT world freaked out.


    In hindsight, Microsoft had perfect timing in announcing the strategic decision
    to make one of its flagship products available on Linux. The incredible adaptation
    of new technologies concerning containers, which we discussed in the previous
    section, was mostly based on Linux distributions. We believe that without the
    capability’s containers, and thus the Linux operating system those containers
    provide, there would never have been a SQL Server Big Data Cluster product.


    Thankfully Microsoft pushed through on their adoption of Linux, and with the latest
    SQL Server 2019 release, many of the issues that plagued the SQL Server 2017 release
    on Linux are now resolved and many capabilities that were possible on the Windows
    version have been brought to Linux as well.


    So how did Microsoft manage to run an application designed for the Windows operating
    system on Linux? Did they rewrite all the code inside SQL Server to make it run
    on Linux? As it turns out, things are far more complicated than a rewrite of the
    code base to make it Linux compatible.


    To make SQL Server run on Linux, Microsoft introduced a concept called a `Platform
    Abstraction Layer` (or `PAL` for short). The idea of a `PAL` is to separate the
    code needed to run, in this case, SQL Server from the code needed to interact
    with the operating system. Because SQL Server has never run on anything other
    than Windows, SQL Server is full of operating system references inside its code.
    This would mean that getting SQL Server to run on Linux would end up taking enormous
    amounts of time because of all the operating system dependencies.


    The SQL Server team looked for different approaches to resolve this issue of operating
    system dependencies and found their answer in a Microsoft research project called
    `Drawbridge`. The definition of `Drawbridge` can be found on its project page
    at [`www.microsoft.com/en-us/research/project/drawbridge/`](http://www.microsoft.com/en-us/research/project/drawbridge/)
    and states:


    > *Drawbridge is a research prototype of a new form of virtualization for application
    sandboxing. Drawbridge combines two core technologies: First, a picoprocess, which
    is a process-based isolation container with a minimal kernel API surface. Second,
    a library OS, which is a version of Windows enlightened to run efficiently within
    a picoprocess.*


    The main part that attracted the SQL Server team to the `Drawbridge` project was
    the library OS technology. This new technology could handle a very wide variety
    of Windows operating system calls and translate them to the operating system of
    the host, which in this case is Linux.


    Now, the SQL Server team did not adapt the `Drawbridge` technology one-on-one
    as there were some challenges involved with the research project. One of the challenges
    was that the research project was officially completed which means that there
    was no support on the project. Another challenge was a large overlap of technologies
    inside the SQL Server OS (`SOS`) and `Drawbridge`. Both solutions, for example,
    have their own functionalities to handle memory management and threading/scheduling.


    What eventually was decided was to merge the SQL Server OS and `Drawbridge` into
    a new platform layer called the `SQLPAL` (`SQL Platform Abstraction Layer`). Using
    `SQLPAL`, the SQL Server team can develop code as they have always done and leave
    the translation of operating system calls to the `SQLPAL`. Figure [2-3](#480532_2_En_2_Chapter.xhtml#Fig3)
    shows the interaction between the various layers while running SQL Server on Linux.


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig3_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Interaction between the various layers of SQL Server on Linux


    There is a lot more information available on various Microsoft blogs that cover
    more of the functionality and the design choices of the `SQLPAL`. If you want
    to know more about the `SQLPAL`, or how it came to life, we would recommend the
    article “SQL Server on Linux: How? Introduction” available at [`https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction/`](https://cloudblogs.microsoft.com/sqlserver/2016/12/16/sql-server-on-linux-how-introduction/).


    Next to the use of containers, SQL Server 2019 on Linux is at the heart of the
    Big Data Cluster product. Almost everything that happens inside the Big Data Cluster
    in terms of data access, manipulation, and the distribution of queries occurs
    through SQL Server on Linux instances which are running inside containers.


    When deploying a Big Data Cluster, the deployment script will take care of the
    full SQL Server on Linux installation inside the containers. This means there
    is no need to manually install SQL Server on Linux, or even to keep everything
    updated. All of this is handled by the Big Data Cluster deployment and management
    tools.'
