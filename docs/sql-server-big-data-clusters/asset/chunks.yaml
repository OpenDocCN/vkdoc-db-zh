- fmt: '# 1. What Are Big Data Clusters?


    SQL Server 2019 Big Data Clusters – or just Big Data Clusters – are a new feature
    set within SQL Server 2019 with a broad range of functionality around data virtualization,
    data mart scale out, and artificial intelligence (AI).


    SQL Server 2019 Big Data Clusters are only available as part of the box-product
    SQL Server. This is despite Microsoft’s “cloud-first” strategy to release new
    features and functionality to Azure first and eventually roll it over to the on-premises
    versions later (if at all).


    Major parts of Big Data Clusters run only on Linux. Let that sink in and travel
    back a few years in time. If somebody had told you in early 2016 that you would
    be able to run SQL Server on Linux, you probably would not have believed them.
    Then SQL Server on Linux was announced, but it was only delivering a subset of
    what it’s “big brother” – SQL Server on Windows – actually contained. And now
    we have a feature that actually `requires us to run SQL Server on Linux`.


    Oh, and by the way, the name is a bit misleading. Some parts of SQL Server Big
    Data Clusters don’t really form a cluster – but more on that later.


    Speaking of parts, Big Data Clusters is not a single feature but a huge `feature
    set` serving a whole lot of different purposes, so it is unlikely that you will
    be embracing every single piece of it. Depending on your role, specific parts
    may be more useful to you than others. Over the course of this book, we will guide
    you through all capabilities to allow you to pick those functions that will help
    you and ignore those that wouldn’t add any value for you.


    ## What Is a SQL Server 2019 Big Data Cluster Really?


    SQL Server 2019 Big Data Clusters are essentially a combination of SQL Server,
    Apache Spark, and the HDFS filesystem running in a Kubernetes environment. As
    mentioned before, Big Data Clusters is not a single feature. Figure 1-1 categorizes
    the different parts of the feature set into different groups to help you better
    understand what is being provided. The overall idea is, through virtualization
    and scale out, SQL Server 2019 becomes your data hub for all your data, even if
    that data is not physically sitting in SQL Server.


    ![../images/480532_2_En_1_Chapter/480532_2_En_1_Fig1_HTML.jpg](images/480532_2_En_1_Chapter/480532_2_En_1_Fig1_HTML.jpg)


    Figure 1-1

    Feature overview of SQL Server 2019 Big Data Clusters


    The major aspects of Big Data Clusters are shown from left to right in Figure
    1-1. You have support for data virtualization, then a managed data platform, and
    finally an artificial intelligence (AI) platform. Each of these aspects is described
    in more detail in the remainder of this chapter.


    ## Data Virtualization


    The first feature within a SQL Server 2019 Big Data Cluster is data virtualization.
    Data virtualization – unlike data integration – retains your data at the source
    instead of duplicating it. Figure 1-2 illustrates this distinction between data
    integration and data virtualization. The dotted rectangles in the data virtualization
    target represent virtual data sources that always resolve back to a single instance
    of the data at the original source. In the world of Microsoft, this resolution
    of data to its original source is done via a SQL Server feature named PolyBase,
    allowing you to virtualize all or parts of your data mart.


    ![../images/480532_2_En_1_Chapter/480532_2_En_1_Fig2_HTML.jpg](images/480532_2_En_1_Chapter/480532_2_En_1_Fig2_HTML.jpg)


    Figure 1-2

    Data virtualization vs. data integration


    One obvious upside to data virtualization is that you get rid of redundant data
    as you don’t copy it from the source but read it directly from there. Especially
    in cases where you only read a big flat file once to aggregate it, there may be
    little to no use to that duplicate and redundant data. Also, with PolyBase, your
    query is real time, whereas integrated data will always carry some lag.


    On the other hand, you can’t put indexes on an external table. Thus if you have
    data that you frequently query with different workloads than on the original source,
    which means that you require another indexing strategy, it might still make sense
    to integrate the data rather than virtualize it. That decision may also be driven
    by the question on whether you can accept the added workload to your source that
    would result from more frequent reporting queries and so on.


    Note

    While data virtualization solves a couple of issues that come with data integration,
    it won’t be able to replace data integration. This is NOT the end of SSIS or ETL.


    Technically, PolyBase has been around since SQL Server 2016, but so far only supported
    very limited types of data sources. In SQL Server 2019, PolyBase has been greatly
    enhanced by support for multiple relational data sources such as SQL Server or
    Oracle and NoSQL sources like MongoDB, HDFS, and all other kinds of data as we
    illustrate in Figure 1-3.


    ![../images/480532_2_En_1_Chapter/480532_2_En_1_Fig3_HTML.jpg](images/480532_2_En_1_Chapter/480532_2_En_1_Fig3_HTML.jpg)


    Figure 1-3

    PolyBase sources and capabilities in SQL Server 2019


    Effectively, you can query a table in another database or even on a completely
    different machine as if it were a local table.


    The use of PolyBase for virtualization may remind you of a linked server and there
    definitely are some similarities. One big difference is that the query toward
    a linked server tends to be longer and more involved than a PolyBase query. For
    example, here is a typical query against a remote table:


    ```

    SELECT * FROM MyOtherServer.MyDatabase.DBO.MyTable

    ```


    Using PolyBase, you would write the same query more simply, as if the table were
    in your local database. For example:


    ```

    SELECT * FROM MyTable

    ```


    PolyBase will know that the table is in a different database because you will
    have created a definition in PolyBase indicating where the table can be found.


    An advantage of using PolyBase is that you can move `MyDatabase` to another server
    without having to rewrite your queries. Simply change your PolyBase data source
    definition to redirect to the new data source. You can do that easily, without
    harming or affecting your existing queries or views.


    There are more differences between the use of linked servers and PolyBase. Table
    1-1 describes some that you should be aware of.


    Table 1-1

    Comparison of linked servers and PolyBase


    | Linked Server | PolyBase |

    | --- | --- |

    | − Instance scoped− OLEDB providers− Read/write and pass-through statements−
    Single-threaded− Separate configuration needed for each instance in Always On
    Availability Group | − Database scoped− ODBC drivers− Read-only operations− Queries
    can be scaled out− No separate configuration needed for Always On Availability
    Group |


    ### Outsource Your Data


    You may have heard of “Stretch Database,”^([¹](#fn1)) a feature introduced in
    SQL Server 2016, which allows you to offload parts of your data to Azure. The
    idea is to use the feature for “cold data” – meaning data that you don’t access
    as frequently because it’s either old (but still needed for some queries) or simply
    for business areas that require less attention.


    The rationale behind cold data is that it should be cheaper to store that data
    in Azure than on premise. Unfortunately, the service may not be right for everyone
    as even its entry tier provides significant storage performance which obviously
    comes at a cost.


    With PolyBase, you can now, for example, offload data to an Azure SQL Database
    and build your own very low-level outsourcing functionality.'
  raw: '# 1. What Are Big Data Clusters?


    SQL Server 2019 Big Data Clusters – or just Big Data Clusters `–` are a new feature
    set within SQL Server 2019 with a broad range of functionality around data virtualization,
    data mart scale out, and artificial intelligence (AI).


    SQL Server 2019 Big Data Clusters are only available as part of the box-product
    SQL Server. This is despite Microsoft’s “cloud-first” strategy to release new
    features and functionality to Azure first and eventually roll it over to the on-premises
    versions later (if at all).


    Major parts of Big Data Clusters run only on Linux. Let that sink in and travel
    back a few years in time. If somebody had told you in early 2016 that you would
    be able to run SQL Server on Linux, you probably would not have believed them.
    Then SQL Server on Linux was announced, but it was only delivering a subset of
    what it’s “big brother” – SQL Server on Windows – actually contained. And now
    we have a feature that actually *requires* us to run SQL Server on Linux.


    Oh, and by the way, the name is a bit misleading. Some parts of SQL Server Big
    Data Clusters don’t really form a cluster `–` but more on that later.


    Speaking of parts, Big Data Clusters is not a single feature but a huge *feature
    set* serving a whole lot of different purposes, so it is unlikely that you will
    be embracing every single piece of it. Depending on your role, specific parts
    may be more useful to you than others. Over the course of this book, we will guide
    you through all capabilities to allow you to pick those functions that will help
    you and ignore those that wouldn’t add any value for you.


    ## What Is a SQL Server 2019 Big Data Cluster Really?


    SQL Server 2019 Big Data Clusters are essentially a combination of SQL Server,
    Apache Spark, and the HDFS filesystem running in a Kubernetes environment. As
    mentioned before, Big Data Clusters is not a single feature. Figure [1-1](#480532_2_En_1_Chapter.xhtml#Fig1)
    categorizes the different parts of the feature set into different groups to help
    you better understand what is being provided. The overall idea is, through virtualization
    and scale out, SQL Server 2019 becomes your data hub for all your data, even if
    that data is not physically sitting in SQL Server.


    ![../images/480532_2_En_1_Chapter/480532_2_En_1_Fig1_HTML.jpg](images/480532_2_En_1_Chapter/480532_2_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Feature overview of SQL Server 2019 Big Data Clusters


    The major aspects of Big Data Clusters are shown from left to right in Figure
    [1-1](#480532_2_En_1_Chapter.xhtml#Fig1). You have support for data virtualization,
    then a managed data platform, and finally an artificial intelligence (AI) platform
    . Each of these aspects is described in more detail in the remainder of this chapter.


    ## Data Virtualization


    The first feature within a SQL Server 2019 Big Data Cluster is data virtualization.
    Data virtualization – unlike data integration – retains your data at the source
    instead of duplicating it. Figure [1-2](#480532_2_En_1_Chapter.xhtml#Fig2) illustrates
    this distinction between data integration and data virtualization. The dotted
    rectangles in the data virtualization target represent virtual data sources that
    always resolve back to a single instance of the data at the original source. In
    the world of Microsoft, this resolution of data to its original source is done
    via a SQL Server feature named PolyBase, allowing you to virtualize all or parts
    of your data mart.


    ![../images/480532_2_En_1_Chapter/480532_2_En_1_Fig2_HTML.jpg](images/480532_2_En_1_Chapter/480532_2_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Data virtualization vs. data integration


    One obvious upside to data virtualization is that you get rid of redundant data
    as you don’t copy it from the source but read it directly from there. Especially
    in cases where you only read a big flat file once to aggregate it, there may be
    little to no use to that duplicate and redundant data. Also, with PolyBase, your
    query is real time, whereas integrated data will always carry some lag.


    On the other hand, you can’t put indexes on an external table. Thus if you have
    data that you frequently query with different workloads than on the original source,
    which means that you require another indexing strategy, it might still make sense
    to integrate the data rather than virtualize it. That decision may also be driven
    by the question on whether you can accept the added workload to your source that
    would result from more frequent reporting queries and so on.


    Note


    While data virtualization solves a couple of issues that come with data integration,
    it won’t be able to replace data integration. This is NOT the end of SSIS or ETL.![../images/480532_2_En_1_Chapter/480532_2_En_1_Figa_HTML.gif](images/480532_2_En_1_Chapter/480532_2_En_1_Figa_HTML.gif)


    Technically, PolyBase has been around since SQL Server 2016, but so far only supported
    very limited types of data sources. In SQL Server 2019, PolyBase has been greatly
    enhanced by support for multiple relational data sources such as SQL Server or
    Oracle and NoSQL sources like MongoDB, HDFS, and all other kinds of data as we
    illustrate in Figure [1-3](#480532_2_En_1_Chapter.xhtml#Fig3).


    ![../images/480532_2_En_1_Chapter/480532_2_En_1_Fig3_HTML.jpg](images/480532_2_En_1_Chapter/480532_2_En_1_Fig3_HTML.jpg)


    Figure 1-3


    PolyBase sources and capabilities in SQL Server 2019


    Effectively, you can query a table in another database or even on a completely
    different machine as if it were a local table.


    The use of PolyBase for virtualization may remind you of a linked server and there
    definitely are some similarities. One big difference is that the query toward
    a linked server tends to be longer and more involved than a PolyBase query. For
    example, here is a typical query against a remote table:


    ```

    SELECT * FROM MyOtherServer.MyDatabase.DBO.MyTable

    ```


    Using PolyBase, you would write the same query more simply, as if the table were
    in your local database. For example:


    ```

    SELECT * FROM MyTable

    ```


    PolyBase will know that the table is in a different database because you will
    have created a definition in PolyBase indicating where the table can be found.


    An advantage of using PolyBase is that you can move *MyDatabase* to another server
    without having to rewrite your queries. Simply change your PolyBase data source
    definition to redirect to the new data source. You can do that easily, without
    harming or affecting your existing queries or views.


    There are more differences between the use of linked servers and PolyBase. Table
    [1-1](#480532_2_En_1_Chapter.xhtml#Tab1) describes some that you should be aware
    of.


    Table 1-1


    Comparison of linked servers and PolyBase


    | Linked Server | PolyBase |

    | --- | --- |

    | − Instance scoped− OLEDB providers− Read/write and pass-through statements−
    Single-threaded− Separate configuration needed for each instance in Always On
    Availability Group | − Database scoped− ODBC drivers− Read-only operations− Queries
    can be scaled out− No separate configuration needed for Always On Availability
    Group |


    ### Outsource Your Data


    You may have heard of “Stretch Database,”^([¹](#fn1)) a feature introduced in
    SQL Server 2016, which allows you to offload parts of your data to Azure. The
    idea is to use the feature for “cold data” – meaning data that you don’t access
    as frequently because it’s either old (but still needed for some queries) or simply
    for business areas that require less attention.


    The rationale behind cold data is that it should be cheaper to store that data
    in Azure than on premise. Unfortunately, the service may not be right for everyone
    as even its entry tier provides significant storage performance which obviously
    comes at a cost.


    With PolyBase, you can now, for example, offload data to an Azure SQL Database
    and build your own very low-level outsourcing functionality.'
  trans: '

    # 1. 什么是大数据集群？


    SQL Server 2019 大数据集群——或简称大数据集群——是 SQL Server 2019 中的一套新功能集，围绕数据虚拟化、数据集市横向扩展和人工智能（AI）提供了广泛的功能。


    SQL Server 2019 大数据集群仅作为盒装产品 SQL Server 的一部分提供。尽管微软采取“云优先”策略，先向 Azure 发布新功能和特性，最终（如果有的话）才推广到本地版本。


    大数据集群的主要组件只能在 Linux 上运行。请细品这一点，并回想一下几年前的情景。如果在 2016 年初有人告诉你，你将能够在 Linux 上运行 SQL
    Server，你大概率是不会相信的。后来，Linux 版 SQL Server 宣布了，但它最初只提供了其“老大哥”——Windows 版 SQL Server——实际包含功能的一个子集。而现在，我们拥有了一项实际上**要求我们在
    Linux 上运行 SQL Server** 的功能。


    哦，顺便说一句，这个名字有点误导性。SQL Server 大数据集群的某些部分并不真正构成一个集群——不过后面会详细讲到。


    说到组成部分，大数据集群并非单一功能，而是一个庞大的 `功能集`，服务于多种不同目的，因此你不太可能用到它的每一部分。根据你的角色，某些特定部分可能对你更有用。在本书的整个过程中，我们将引导你了解所有功能，让你能够选择那些对你有帮助的功能，而忽略那些对你没有价值的功能。


    ## SQL Server 2019 大数据集群究竟是什么？


    SQL Server 2019 大数据集群本质上是在 Kubernetes 环境中运行的 SQL Server、Apache Spark 和 HDFS 文件系统的组合。如前所述，大数据集群并非单一功能。图
    1-1 将该功能集的不同部分进行了分类，以帮助你更好地理解所提供的内容。其总体思路是，通过虚拟化和横向扩展，SQL Server 2019 成为你的数据枢纽，用于管理你所有的数据，即使这些数据并不物理存储在
    SQL Server 中。


    ![../images/480532_2_En_1_Chapter/480532_2_En_1_Fig1_HTML.jpg](img/480532_2_En_1_Fig1_HTML.jpg)


    图 1-1

    SQL Server 2019 大数据集群功能概览


    图 1-1 从左到右展示了大数据集群的主要方面。你拥有数据虚拟化支持，然后是托管数据平台，最后是人工智能（AI）平台。这些方面的每一个都将在本章剩余部分进行更详细的描述。


    ## 数据虚拟化


    SQL Server 2019 大数据集群中的第一个功能是数据虚拟化。数据虚拟化——与数据集成不同——将你的数据保留在源位置，而不是复制它。图 1-2 说明了数据集成和数据虚拟化之间的区别。数据虚拟化目标中的虚线矩形代表虚拟数据源，这些数据源总是解析回原始源数据的单个实例。在微软的世界里，这种数据到其原始源的解析是通过一个名为
    PolyBase 的 SQL Server 功能完成的，它允许你虚拟化数据集市的全部或部分。


    ![../images/480532_2_En_1_Chapter/480532_2_En_1_Fig2_HTML.jpg](img/480532_2_En_1_Fig2_HTML.jpg)


    图 1-2

    数据虚拟化 vs. 数据集成


    数据虚拟化的一个明显好处是，你消除了冗余数据，因为你不是从源复制数据，而是直接从那里读取。特别是在你只是读取一个大的平面文件一次进行汇总的情况下，那个重复和冗余的数据可能没什么用。此外，使用
    PolyBase，你的查询是实时的，而集成的数据总会存在一些延迟。


    另一方面，你无法在外部表上创建索引。因此，如果你的数据经常需要以与原始源不同的工作负载进行查询，这意味着你需要另一种索引策略，那么集成数据可能仍然比虚拟化更有意义。这个决策也可能取决于你是否能接受更频繁的报告查询等给源系统带来的额外负载。


    注意

    虽然数据虚拟化解决了数据集成带来的一些问题，但它无法取代数据集成。这**不是** SSIS 或 ETL 的终结。


    从技术上讲，PolyBase 自 SQL Server 2016 就已存在，但迄今为止只支持非常有限的数据源类型。在 SQL Server 2019 中，PolyBase
    得到了极大的增强，支持多种关系型数据源，如 SQL Server 或 Oracle，以及 NoSQL 数据源，如 MongoDB、HDFS 和其他各种数据，如图
    1-3 所示。


    ![../images/480532_2_En_1_Chapter/480532_2_En_1_Fig3_HTML.jpg](img/480532_2_En_1_Fig3_HTML.jpg)


    图 1-3

    SQL Server 2019 中的 PolyBase 源和能力


    实际上，你可以查询另一个数据库中，甚至在一台完全不同的机器上的表，就好像它是本地表一样。


    使用 PolyBase 进行虚拟化可能让你想起链接服务器，它们之间肯定有一些相似之处。一个很大的区别是，针对链接服务器的查询往往比 PolyBase 查询更长、更复杂。例如，这是一个针对远程表的典型查询：


    ```

    SELECT * FROM MyOtherServer.MyDatabase.DBO.MyTable

    ```


    使用 PolyBase，你可以更简单地编写相同的查询，就好像表在你的本地数据库中一样。例如：


    ```

    SELECT * FROM MyTable

    ```


    PolyBase 会知道该表在不同的数据库中，因为你将在 PolyBase 中创建一个定义，指明表可以在哪里找到。


    使用 PolyBase 的一个优点是，你可以将 `MyDatabase` 移动到另一台服务器，而无需重写你的查询。只需更改你的 PolyBase 数据源定义，重定向到新的数据源即可。你可以轻松完成，而不会损害或影响你现有的查询或视图。


    链接服务器和 PolyBase 的使用还有更多不同之处。表 1-1 描述了一些你应该了解的区别。


    表 1-1

    链接服务器与 PolyBase 比较


    | 链接服务器 | PolyBase |

    | --- | --- |

    | − 实例作用域− OLEDB 提供程序− 读/写和直通语句− 单线程− Always On 可用性组中每个实例都需要单独配置 | − 数据库作用域− ODBC
    驱动程序− 只读操作− 查询可以横向扩展− Always On 可用性组无需单独配置 |


    ### 将你的数据外包


    你可能听说过“伸缩数据库”(Stretch Database)，^(¹) 这是 SQL Server 2016 中引入的一个功能，它允许你将部分数据卸载到
    Azure。其理念是将此功能用于“冷数据”——指的是你不经常访问的数据，因为它们要么是旧的（但某些查询仍然需要），要么仅仅是对于关注度较低的业务领域。


    冷数据背后的基本原理是，在 Azure 中存储这些数据应该比在本地更便宜。不幸的是，该服务可能并不适合所有人，因为即使是其入门级也提供了显著的存储性能，这显然需要付出成本。


    借助 PolyBase，你现在可以将数据卸载到 Azure SQL 数据库等，从而构建自己的非常底层的外包功能。

    '
- fmt: '# Reduce Data Redundancy and Development Time


    Besides offloading data, the reason to virtualize it instead of integrating it
    is obviously the potentially tremendous reduction of data redundancy. As data
    virtualization keeps the data at its original source and the data is therefore
    not persisted at the destination, you basically cut your storage needs in half
    compared to a traditional `ETL`-based staging process.


    **Note**


    Our “cut in half” assertion may not be super accurate as you may not have staged
    the full dataset anyway (reducing the savings) or you may have used different
    datatypes (potentially even increasing the savings even more).


    Think of this: You want to track the number of page requests on your website per
    hour which is logging to text files. In a traditional environment, you would have
    written a `SQL Server Integration Services` (`SSIS`) package to load the text
    file into a table, then run a query on it to group the data, and then store or
    use its result. In this then new virtualization approach, you would still run
    the query to group the data but you’d run it right on your flat file, saving the
    time it would have taken to develop the `SSIS` package and also the storage for
    the staging table holding the log data which would otherwise have coexisted in
    the file as well as the staging table in `SQL Server`.


    ## A Combined Data Platform Environment


    One of the big use cases of `SQL Server Big Data Clusters` is the ability to create
    an environment that stores, manages, and analyzes data in different formats, types,
    and sizes. Most notably, you get the ability to store both relational data inside
    the `SQL Server` component and nonrelational data inside the `HDFS` storage subsystem.
    Using `Big Data Clusters` allows you to create a data lake environment that can
    answer all your data needs without a huge layer of complexity that comes with
    managing, updating, and configuring various parts that make up a data lake.


    `Big Data Clusters` completely take care of the installation and management of
    your `Big Data Cluster` straight from the installation of the product. Since `Big
    Data Clusters` is being pushed as a stand-alone product with full support from
    `Microsoft`, this means `Microsoft` is going to handle updates for all the technologies
    that make up `Big Data Clusters` through service packs and updates.


    So why would you be interested in a data lake? As it turns out, many organizations
    have a wide variety of data stored in different formats. In many situations, a
    large portion of data comes from the use of applications that store their data
    inside relational databases like `SQL Server`. By using a relational database,
    we can easily query the data inside of it and use it for all kinds of things like
    dashboards, `KPIs`, or even machine learning tasks to predict future sales, for
    instance.


    A relational database must follow a number of rules, and one of the most important
    of those rules is that a relational database always stores data in a `schema-on-write`
    manner. This means that if you want to insert data into a relational database,
    you have to make sure the data complies to the structure of the table being written
    to. Figure [1-4](#480532_2_En_1_Chapter.xhtml#Fig4) illustrates `schema-on-write`.


    For instance, a table with the columns `OrderID`, `OrderCustomer`, and `OrderAmount`
    dictates that data you are inserting into that table will also need to contain
    those same columns. This means that when you want to write a new row in this table,
    you will have to define an `OrderID`, `OrderCustomer`, and `OrderAmount` for the
    insert to be successful. There is no room for adding additional columns on the
    fly, and in many cases, the data you are inserting needs to be the same datatype
    as specified in the table (for inside integers for numbers and strings for text).


    ```

    ../images/480532_2_En_1_Chapter/480532_2_En_1_Fig4_HTML.jpg

    ```


    Figure 1-4

    Scheme-on-write


    Now in many situations the `schema-on-write` approach is perfectly fine. You make
    sure all your data is formatted in the way the relational databases expect it
    to be, and you can store all your data inside of it. But what happens when you
    decide to add new datasets that do not necessarily have a fixed schema? Or, you
    want to process data that is very large (multiple terabytes) in terms of size?
    In those situations, it is frequently advised to look for another technology to
    store and process your data since a relational database has difficulties handling
    data with those characteristics.


    Solutions like `Hadoop` and `HDFS` were created to solve some of the limitations
    around relational databases. Big Data platforms are able to process large volumes
    of data in a distributed manner by spreading the data across different machines
    (called nodes) that make up a cluster architecture. Using a technology like `Hadoop`,
    or as we will use in this book `Spark`, allows you to store and process data in
    any format. This means we can store huge `CSV` (comma-separated values) files,
    video files, `Word` documents, `PDF`s, or whatever we please without having to
    worry about complying to a predefined schema like we’d have to when storing data
    inside a relational database.'
