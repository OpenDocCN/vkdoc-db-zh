    ## 更高级的数据框处理


    到目前为止，我们已经研究了可以对数据框执行的——相对——简单的操作，例如选择特定行、对数据分组以及对数据框进行排序。


    然而，当涉及到数据框时，在 Spark 中我们可以做的远不止于此，例如，将多个数据框连接在一起形成一个新的数据框。在本节中，我们将重点进行一些更高级的数据框处理。


    首先，到目前为止，我们一直在处理导入到数据框中的单个数据集，该数据框包含美国各个机场的信息。在许多情况下，你并不会拥有一个包含所有所需内容的单一数据集，这意味着你最终会得到多个数据框。使用
    PySpark，我们可以根据数据框共享的键将这些数据框连接起来，并构建一个新的、连接后的数据框。


    在开始连接数据框之前，我们需要从正在使用的 2015 年航班延误和取消示例中导入其他示例数据集。如果你正在跟随本章中的示例操作，你应该已经拥有一个名为 `df_airports`
    的数据框，其中包含 `airports.csv` 文件的数据。如果还没有，你可以运行以下代码（代码清单 6-16）将文件中的数据导入到数据框中。


    ```

    df_airports = spark.read.format(''csv'').options(header=''true'', inferSchema="true").load(''/Flight_Delays/airports.csv'')

    ```

    代码清单 6-16

    将 airports.csv 导入数据框


    我们可以使用相同的命令（代码清单 6-17）导入另外两个 CSV 文件：`airlines.csv` 和 `flights.csv`。


    ```

    # 同样将其他 CSV 文件导入数据框

    df_airlines = spark.read.format(''csv'').options(header=''true'', inferSchema="true").load(''/Flight_Delays/airlines.csv'')

    df_flights = spark.read.format(''csv'').options(header=''true'', inferSchema="true").load(''/Flight_Delays/flights.csv'')

    ```

    代码清单 6-17

    将 airlines.csv 和 flights.csv 导入数据框


    执行代码清单 6-17 后，我们应该在 PySpark 笔记本中拥有三个独立的数据框：`df_airports`、`df_airlines` 和 `df_flights`。


    要连接两个数据框，我们必须提供用于连接这两个数据框的键。如果此键在两个数据框上相同，我们不必在连接中显式设置映射（我们只需要将列名作为参数提供）。然而，我们认为始终描述连接映射是一个好习惯，以使代码更易于理解。另外，在我们使用的示例数据集中，我们需要连接的列在数据框上具有不同的列名，这就需要显式的连接映射。


    代码清单 6-18 的示例代码将使用内连接将 `df_flights` 和 `df_airlines` 数据框连接在一起，并输出一个名为 `df_flightinfo`
    的新数据框。我们返回新创建数据框的模式，以查看两个数据框是如何连接在一起的（图 6-16）。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig16_HTML.jpg](img/480532_2_En_6_Fig16_HTML.jpg)

    图 6-16

    df_flightinfo 数据框的模式，它是 df_flights 和 df_airlines 的连接结果


    ```

    from pyspark.sql.functions import *

    # 让我们使用内连接在航空公司代码上连接 df_airlines 和 df_flights 数据框

    df_flightinfo = df_flights.join(df_airlines, df_flights.AIRLINE == df_airlines.IATA_CODE,
    how="inner")

    # 打印连接后数据框的模式

    df_flightinfo.printSchema()

    ```

    代码清单 6-18

    连接两个数据框并获取结果的模式


    如图 6-16 所示，组成 `df_airlines` 数据框的两个列（`IATA_CODE` 和 `AIRLINE`）被添加到了新的 `df_flightinfo`
    数据框的右侧。由于我们在 `df_flights` 数据框中已经有了 `IATA_CODE`，我们最终在新数据框中有了重复的列（更有趣的是：在这个示例数据集中，`df_flights`
    数据框使用列“AIRLINE”来表示我们连接 `df_airlines` 数据框所依据的 IATA 代码。`df_airlines` 数据框也有 `AIRLINE`
    列，但它显示的是完整的航空公司名称。这实质上意味着 `df_flightinfo` 数据框中的两个 `AIRLINE` 列包含不同的数据）。


    我们可以在连接两个数据框时轻松地删除重复列，通过在连接命令中指定它（代码清单 6-19 和图 6-17）。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig17_HTML.jpg](img/480532_2_En_6_Fig17_HTML.jpg)

    图 6-17

    删除重复 AIRLINE 列后的 df_flightinfo 模式


    ```

    from pyspark.sql.functions import *

    # 我们将再次连接两个数据框，但这次删除 df_flights 数据框的 AIRLINE 列

    df_flightinfo = df_flights.join(df_airlines, df_flights.AIRLINE == df_airlines.IATA_CODE,
    how="inner").drop(df_flights.AIRLINE)

    # 打印连接后数据框的模式

    df_flightinfo.printSchema()

    ```

    代码清单 6-19

    连接两个数据框的同时删除一列


    从图 6-17 所示的模式可以看出，我们现在只剩下一个 `AIRLINE` 列，其中包含我们想要的数据（完整的航空公司名称）。


    删除重复列后，让我们从新的 `df_flightinfo` 数据框中选择一些信息。对于此示例，假设我们有兴趣查看每个航班的计划和实际已用旅行时间，以及执行该航班的航空公司。我们可以像本章前面已经做过多次的那样，简单地选择我们感兴趣的列。这次使用代码清单
    6-20 所示的代码，会得到如图 6-18 所示的表格。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig18_HTML.jpg](img/480532_2_En_6_Fig18_HTML.jpg)

    图 6-18

    每个航班号的计划和已用飞行时间


    ```

    # 从连接后的数据框中选择若干列

    df_flightinfo.select("FLIGHT_NUMBER", "AIRLINE", "SCHEDULED_TIME", "ELAPSED_TIME").show()

    ```

    代码清单 6-20

    从连接后的数据框中选择若干列


    现在假设我们正在分析这些数据，因为我们对航班的计划时间和航班实际花费时间之间的差异感兴趣。虽然我们可以手动查看数据框中的每一行来弄清楚两个时间列之间的差异是什么，但让
    Spark 为你执行这个计算要容易得多。对于此场景，我们使用以下代码（代码清单 6-21）创建一个新的数据框，该数据框选择原始 `df_flightinfo`
    数据框列的子集，并在 `SCHEDULE_TIME` 和 `ELAPSED_TIME` 列之间进行简单的计算（图 6-19）。


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig19_HTML.jpg](img/480532_2_En_6_Fig19_HTML.jpg)

    图 6-19

    显示旅行时间信息的 df_flightinfo_times 数据框

