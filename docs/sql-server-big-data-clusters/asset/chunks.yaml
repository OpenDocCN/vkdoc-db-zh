    清单 6-35 中的代码将使用 Pandas 的 `hist()` 函数创建我们 Pandas 数据框中 `horsepower` 列的直方图（图 6-36）。直方图对于查看数据的分布情况极其有用。在进行任何形式的数据探索时，数据分布都非常重要，因为你可以看到，例如，影响你平均值的数据中的异常值。


