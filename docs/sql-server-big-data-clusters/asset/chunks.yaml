    \ 是由 Revolution Analytics（微软于 2015 年收购的一家公司）构建的决策树算法，为机器学习提供并行和基于分块的算法。模型训练的语法非常直观；我们根据训练数据集的其他列（或称为：特征）来预测品种。\n\
    \n    代码行 `trained_model <- rxSerializeModel(iris.dtree, realtimeScoringOnly =\
    \ FALSE)` 是用来序列化我们的模型并将其存储到 R 变量 `trained_model` 中的命令。在调用 `sp_execute_external_script`\
    \ 存储过程时，我们将该变量映射为 T-SQL 变量 `@model` 的输出参数。我们将从训练数据集中选择所有记录的查询映射为 R 的输入变量，以供算法使用。\n\
    \n3.  最后，在最后一步中，我们将训练好的模型插入到之前创建的模型表中。我们提供了一些附加数据，如名称和版本，以便在下一步使用该模型预测鸢尾花品种时能够轻松地选择它。\n\
    \n## 训练结果\n\n运行这段代码（应该只需要几秒钟）后，我们应该会得到一个以二进制字符串形式存储在模型表中的模型，如图 7-5 所示。\n\n![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig5_HTML.jpg](img/480532_2_En_7_Fig5_HTML.jpg)\n\
    \n**图 7-5**\n模型表中的已训练决策树模型"
- fmt: '# 使用数据库内机器学习模型评分数据


    现在我们已经训练好模型，可以使用它来对存储在 `Iris_test` 表中的数据进行评分或预测。为此，我们可以使用两种方法：一种是使用我们之前也用于训练模型的
    `sp_execute_external_script` 存储过程；另一种是使用 SQL Server 中可用的 `PREDICT` 函数。


    清单 [7-8](#480532_2_En_7_Chapter.xhtml#PC8) 展示了第一种方法；注意其语法与本方法之前的示例基本相同，但这次我们将训练好的模型作为输入参数，连同从
    `Iris_test` 表中选择数据的查询一起提供。


    ```sql

    -- Retrieve the model from the model table

    DECLARE @model VARBINARY(MAX) = (SELECT model_object FROM models WHERE model_name
    = ''iris.dtree'')

    -- Run a prediction using the Iris_test data as input

    -- Return all columns, including the probability for each species

    EXEC sp_execute_external_script

    @language = N''R'',

    @script = N''

    model = rxUnserializeModel(model);

    Iris_prediction = rxPredict(model, data=Iris_test)

    Iris_pred_results <- cbind(Iris_test, Iris_prediction)

    str(Iris_pred_results)

    '',

    @input_data_1 = N''

    SELECT

    Sepal_Length,

    Sepal_Width,

    Petal_Length,

    Petal_Width,

    Species

    FROM Iris_test'',

    @input_data_1_name = N''Iris_test'',

    @output_data_1_name = N''Iris_pred_results'',

    @params = N''@model varbinary(max)'',

    @model = @model

    WITH RESULT SETS (("Sepal_Length" FLOAT, "Sepal_Width" FLOAT, "Petal_Length" FLOAT,
    "Petal_Width" FLOAT, Species VARCHAR(50), setosa_Pred FLOAT, versicolor_Pred FLOAT,
    verginica_Pred FLOAT))

    Listing 7-8

    Run a prediction using the in-database stored model

    ```


    在 `sp_execute_external_script` 代码中，R 脚本的第一部分，我们必须再次使用 `rxUnserializeModel` 来反序列化我们的模型。模型反序列化后，我们可以对输入数据进行预测。R
    代码的最后一行将每个鸢尾花物种的概率列添加到输入数据集中。这意味着我们最终得到一个包含所有输入列以及评分过程生成的列的输出表。


    本书不会深入探讨机器学习或机器学习算法，但我们在此案例中尝试使用机器学习解决的问题称为分类。机器学习算法基本上可以分为三类：回归、分类和聚类。回归尝试预测一个数值，例如汽车的价格。分类通常处理预测分类值，就像我们在本章中所经历的示例：这是什么物种的鸢尾花？聚类算法尝试通过根据特征将类别分组在一起来预测结果。在鸢尾花示例中，我们也可以选择使用聚类算法，因为可能存在基于物种而趋于分组在一起的明显鸢尾花物种特征。


    运行清单 [7-8](#480532_2_En_7_Chapter.xhtml#PC8) 中的代码后，我们看到如图 [7-6](#480532_2_En_7_Chapter.xhtml#Fig6)
    所示的结果。如果您自己运行代码，可能会看到一些不同的结果，因为我们基于随机选择的行来分割训练和测试数据。


    ![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig6_HTML.jpg](images/480532_2_En_7_Chapter/480532_2_En_7_Fig6_HTML.jpg)


    **图 7-6**


    使用我们训练的机器学习模型对 `Iris_test` 表中的数据进行评分的结果


    使用 `sp_execute_external_script` 方法执行预测效果很好，并且在您可以使用 R 代码执行的操作方面提供了最大的灵活性。然而，它确实会导致相当多的代码行数。我们在
    SQL Server 中可用的另一种方法是使用 `PREDICT` 函数；`PREDICT` 使用起来要容易得多，语法更简单，并且通常比 `sp_execute_external_script`
    执行得更快。但它也有缺点，例如，您不能编写自定义 R 代码来对数据执行额外步骤，并且您必须使用通过 Revolution Analytics 算法训练的序列化模型（通过使用
    `sp_execute_external_script`，您基本上可以使用 R 或 R 库中可用的每种算法）。


    我们在清单 [7-9](#480532_2_En_7_Chapter.xhtml#PC9) 的代码中使用 `PREDICT` 函数对 `Iris_test`
    表中的数据执行了相同的评分。


    ```sql

    DECLARE @model VARBINARY(MAX) = (SELECT model_object FROM models WHERE model_name
    = ''iris.dtree'')

    -- Alternative method is using the PREDICT function

    SELECT

    Iris_test.*,

    pred.*

    FROM PREDICT(MODEL = @model, DATA = dbo.Iris_test as Iris_test)

    WITH(setosa_Pred FLOAT, versicolor_Pred FLOAT, virginica_Pred FLOAT) AS pred

    Listing 7-9

    Running a model prediction using the PREDICT function

    ```


    正如您可以直接看到的，`PREDICT` 比 `sp_execute_external_script` 可读性更高，对于那些更熟悉 T-SQL 的人来说，也更容易理解。在某种意义上，我们是在将模型及其输出连接到
    `Iris_test` 表中的数据。我们需要在 `WITH` 子句中提供预测输出的列名和数据类型，并可以使用 `SELECT` 语句选择我们想要返回的内容。在本例中，我们选择了
    `Iris_test` 表的所有列以及预测返回的所有列，结果应如图 [7-7](#480532_2_En_7_Chapter.xhtml#Fig7) 所示。


    ![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig7_HTML.jpg](images/480532_2_En_7_Chapter/480532_2_En_7_Fig7_HTML.jpg)


    **图 7-7**


    使用 PREDICT 进行鸢尾花物种预测


    现在我们已经在 SQL Server 机器学习服务中训练了一个机器学习模型并使用它对数据进行了评分，您应该对这些方法的功能有了一个大致的了解。总的来说，我们认为数据库内机器学习服务在您的所有或大部分数据都存储在
    SQL Server 数据库中时特别有用。模型也存储在 SQL Server 数据库中，您可以构建能够（近）实时对存储在 SQL Server 数据库中的数据进行评分的解决方案（例如，通过使用调用
    `PREDICT` 函数的触发器）。如果您愿意，您并不局限于仅使用 SQL Server 表。正如您在前面的章节中所看到的，我们可以使用外部表映射存储在 Spark
    集群（或其他系统）中的数据，并将该数据传递给数据库内机器学习服务。


    然而，在某些情况下，您无法使用数据库内机器学习服务，可能是因为您的数据不适合放入 SQL Server（无论是大小还是数据类型），或者您更熟悉在 Spark
    上工作。在任何这些情况下，我们总是可以选择在 Spark 部分的大数据集群上执行机器学习任务，我们将在下一节中更详细地探讨这一点。'
  raw: '### Scoring Data Using In-Database Machine Learning Models


    Now that we have trained our model, we can use it to score, or predict, the data
    we stored in the Iris_test table. To do that we can use two methods, one using
    the `sp_execute_external_script` procedure which we have also used to train our
    model and the other by using the `PREDICT` function that is available in SQL Server.


    The code of Listing [7-8](#480532_2_En_7_Chapter.xhtml#PC8) shows the first approach;
    notice that the syntax is mostly the same as the earlier examples of this method,
    but this time we supply the trained model as an input parameter together with
    a query to select the data from the Iris_test table.


    ```

    -- Retrieve the model from the model table

    DECLARE @model VARBINARY(MAX) = (SELECT model_object FROM models WHERE model_name
    = ''iris.dtree'')

    -- Run a prediction using the Iris_test data as input

    -- Return all columns, including the probability for each species

    EXEC sp_execute_external_script

    @language = N''R'',

    @script = N''

    model = rxUnserializeModel(model);

    Iris_prediction = rxPredict(model, data=Iris_test)

    Iris_pred_results <- cbind(Iris_test, Iris_prediction)

    str(Iris_pred_results)

    '',

    @input_data_1 = N''

    SELECT

    Sepal_Length,

    Sepal_Width,

    Petal_Length,

    Petal_Width,

    Species

    FROM Iris_test'',

    @input_data_1_name = N''Iris_test'',

    @output_data_1_name = N''Iris_pred_results'',

    @params = N''@model varbinary(max)'',

    @model = @model

    WITH RESULT SETS (("Sepal_Length" FLOAT, "Sepal_Width" FLOAT, "Petal_Length" FLOAT,
    "Petal_Width" FLOAT, Species VARCHAR(50), setosa_Pred FLOAT, versicolor_Pred FLOAT,
    verginica_Pred FLOAT))

    Listing 7-8

    Run a prediction using the in-database stored model

    ```


    In the first part of the R script inside the `sp_execute_external_script` code,
    we have to unserialize our model again using `rxUnserializeModel`. With the model
    unserialized, we can perform a prediction of the input data. The last line of
    R code adds the probability columns for each Iris species to the input dataset.
    This means we end up with a single table as output that contains all the input
    columns as well as the columns generated by the scoring process.


    We won’t go into details about machine learning or machine learning algorithms
    in this book, but the problem we are trying to solve using machine learning in
    this case is one called classification. Machine learning algorithms can basically
    be grouped into three different categories: regression, classification, and clustering.
    With regression we are trying to predict a numerical value, for instance, the
    price of a car. Classification usually deals with predicting a categorical value,
    like the example we went through in this chapter: What species of Iris plant is
    this? Clustering algorithms try to predict a result by trying to group categories
    together based on their characteristics. In the Iris example we could also have
    chosen to use a clustering algorithm since there might be clear Iris species characteristics
    that tend to group together based on the species.


    After running the code in Listing [7-8](#480532_2_En_7_Chapter.xhtml#PC8), we
    see the results shown in Figure [7-6](#480532_2_En_7_Chapter.xhtml#Fig6). If you
    ran the code yourself, you might see some different results since we split our
    training and test data based on randomly selected rows.


    ![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig6_HTML.jpg](images/480532_2_En_7_Chapter/480532_2_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Scored results for the data inside the Iris_test table using our trained machine
    learning model


    Performing a prediction using the `sp_execute_external_script` method works perfectly
    fine and gives you maximum flexibility in terms of what you can do using R code.
    However, it does result in quite a lot of lines of code. Another method we have
    available inside SQL Server is using the `PREDICT` function; `PREDICT` is far
    easier to use, has a simpler syntax, and, in general, performs faster than `sp_execute_external_script`.
    It does have its drawbacks though, for instance, you cannot write custom R code
    to perform additional steps on the data and you are required to use a serialized
    model that was trained using a Revolution Analytics algorithm (by using `sp_execute_external_script`
    you can basically use every algorithm available in R or R libraries).


    We performed the same scoring on our data inside the Iris_test table using the
    `PREDICT` function in the code of Listing [7-9](#480532_2_En_7_Chapter.xhtml#PC9).


    ```

    DECLARE @model VARBINARY(MAX) = (SELECT model_object FROM models WHERE model_name
    = ''iris.dtree'')

    -- Alternative method is using the PREDICT function

    SELECT

    Iris_test.*,

    pred.*

    FROM PREDICT(MODEL = @model, DATA = dbo.Iris_test as Iris_test)

    WITH(setosa_Pred FLOAT, versicolor_Pred FLOAT, virginica_Pred FLOAT) AS pred

    Listing 7-9

    Running a model prediction using the PREDICT function

    ```


    As you can directly see, `PREDICT` is far more readable than `sp_execute_external_script`
    and, for those more familiar with T-SQL, far easier to understand. In a sense,
    we are joining the model, and its outputs, to the data inside the Iris_test table.
    We need to supply the column names and datatypes of the prediction output inside
    the `WITH` clause and can select what we want to return using the `SELECT` statement.
    In this case we are selecting all the columns of the Iris_test table together
    with all the columns that are returned by the prediction, and the results should
    look like those shown in Figure [7-7](#480532_2_En_7_Chapter.xhtml#Fig7).


    ![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig7_HTML.jpg](images/480532_2_En_7_Chapter/480532_2_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Iris species prediction using PREDICT


    Now that we have trained a machine learning model, and scored data using it, inside
    SQL Server Machine Learning Services, you should have a general idea of the capabilities
    of these methods. In general, we believe In-Database Machine Learning Services
    is especially useful when all, or the largest part, of your data is stored inside
    SQL Server databases. With the model stored inside a SQL Server database as well,
    you can build solutions that are able to (near) real-time score data as soon as
    it is stored inside your SQL Server database (for instance, by using triggers
    that call the `PREDICT` function). If you want to, you are not limited to just
    SQL Server tables however. As you have seen in earlier chapters, we can map data
    stored inside the Spark cluster (or on other systems all together) using external
    tables and pass that data to the In-Database Machine Learning Services.


    In some situations, however, you cannot use In-Database Machine Learning Services,
    perhaps because your data doesn’t fit inside SQL Server, either by size or by
    data type, or you are more familiar with working on Spark. In any of those cases,
    we always have the option of performing machine learning tasks on the Spark portion
    of the Big Data Cluster which we are going to explore in more detail in the next
    section.'
