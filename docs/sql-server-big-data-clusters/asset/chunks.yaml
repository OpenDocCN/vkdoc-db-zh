    ## Introduction


    When we first started talking about writing a book about SQL Server Big Data Clusters,
    it was still in one of its first iterations. We both were very excited about all
    the technologies included in the product and the way it could potentially change
    the field of data processing and analytics. Little did we know how much changes
    the product was going to receive while we were writing this. Ultimately this resulted
    in us almost rewriting the entire book on a monthly basis. While this was a massive
    endeavor, it also allowed us to follow, and document, everything the product went
    through during its development. Now that the final product has shipped, we thought
    it was about time to provide an updated version that reflects everything that
    Big Data Clusters is today; the result is the book in front of you right now!


    SQL Server Big Data Clusters is an incredibly exciting new platform. As mentioned
    earlier, it consists of a wide variety of different technologies that make it
    work. Kubernetes, HDFS, Spark, and SQL Server on Linux are just some of the major
    players inside a Big Data Cluster. Besides all these different products combined
    into a single product, you can also deploy it on-premises or in the Azure cloud
    depending on your use case. As you can imagine, it is near impossible for a single
    book to discuss all these different products in depth (as a matter of fact, there
    are plenty of books available that do go into all the tiny details for each individual
    product that is part of a Big Data Cluster like Spark or SQL Server on Linux).
    For this reason, we have opted for a different approach for this book and will
    focus more on the architecture of Big Data Clusters in general and practical examples
    on how to leverage the different approaches on data processing and analytics Big
    Data Clusters offer.


    With this approach, we believe that while you read this book, you will be able
    to understand what makes Big Data Clusters tick, what their use cases are, and
    how to get started with deploying, managing, and working with a Big Data Cluster.
    In that manner this book tries to deliver useful information that can be used
    for the various job roles that deal with `data` – from data architects that would
    like more information on how Big Data Clusters can serve as a centralized data
    hub to database administrators that want to know how to manage and deploy databases
    to the cluster, data scientists that want to train and operationalize machine
    learning models on the Big Data Cluster, and many more different roles. If you
    are working with data in any way, this book should have something for you to think
    about!


    ## Book Layout


    We split this book into nine separate chapters that each highlight a specific
    area, or feature, of Big Data Clusters:


    ### Chapter 1: "What Are Big Data Clusters?"

    In this chapter we will describe a high-level overview of SQL Server Big Data
    Clusters and their various use cases.


    ### Chapter 2: "Big Data Cluster Architecture."

    We will go into more depth about what makes up a Big Data Cluster in this chapter,
    describing the various logical areas inside a Big Data Cluster and looking at
    how all the different parts work together.


    ### Chapter 3: "Deployment of Big Data Clusters."

    This chapter will walk you through the first steps of deploying a Big Data Cluster
    using an on-premises or cloud environment and describe how to connect to your
    cluster and finally what management options are available to manage and monitor
    your Big Data Cluster.


    ### Chapter 4: "Loading Data into Big Data Clusters."

    This chapter will focus on data ingression from various sources unto a Big Data
    Cluster.


    ### Chapter 5: "Querying Big Data Clusters Through `T-SQL`."

    This chapter focuses on working with external tables through `PolyBase` and querying
    your data using `T-SQL` statements.


    ### Chapter 6: "Working with Spark in Big Data Clusters."

    While the previous chapter focused mostly on using `T-SQL` to work with the data
    on Big Data Clusters, this chapter puts the focus on using Spark to perform data
    exploration and analysis.


    ### Chapter 7: "Machine Learning on Big Data Clusters."

    One of the main features of Big Data Clusters is the ability to train, score,
    and operationalize machine learning models inside a single platform. In this chapter
    we will focus on building and exploiting machine learning models through SQL Server
    In-Database Machine Learning Services and Spark.


    ### Chapter 8: "Create and Consume Big Data Cluster Apps."

    In the second to last chapter of this book, we are going to take a close look
    at how you can deploy and use custom applications through the Big Data Cluster
    platform. These applications can range from management tasks to providing a REST
    API to perform machine learning model scoring.


    ### Chapter 9: "Maintenance of Big Data Clusters."

    To finish off your Big Data Cluster experience, we’ll look at what it takes to
    manage and maintain a Big Data Cluster.


    ## Acknowledgments


    As with every publication, a big THANK YOU goes to our families for the support
    they gave us during this time-consuming process!


    Also, thank you very much to Mohammad for his support by reviewing this book!


    We would also like to thank the Microsoft SQL Server product team for helping
    us out whenever we had a question or ran into situations we didn’t quite understand.
    JRJ, Travis, Buck, Mihaela, and all the others – you rock!


    Last but not least, thank you #sqlfamily – your ongoing support, feedback, and
    motivation is what keeps us going when it comes to exploring and talking about
    exciting technologies like Big Data Clusters!


    ## About the Authors

