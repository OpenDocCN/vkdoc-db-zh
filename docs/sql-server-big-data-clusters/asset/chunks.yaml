  trans: '

    ### 控制平面


    图 2-10 所示的控制平面是您进入大数据集群管理环境的入口。它提供了如 Grafana 等各种管理和日志工具，是您执行所有大数据集群管理的集中地。此外，大数据集群内部的安全性也是通过控制平面来管理和控制的。


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig10_HTML.jpg](img/480532_2_En_2_Fig10_HTML.jpg)


    图 2-10 大数据集群控制平面


    关于大数据集群的管理，我们将在第 3 章讨论可用于管理大数据集群的各种管理工具。


    除了提供一个可执行所有大数据集群管理任务的集中位置外，控制平面在协调向底层计算和数据区域分发任务方面也扮演着非常重要的角色。访问控制平面是通过控制器端点进行的。


    控制器端点用于大数据集群的部署和配置管理。该端点通过 REST API 进行访问，大数据集群内部的一些服务以及我们用于部署和配置大数据集群的命令行工具都会访问这些
    API。


    在下一章中，您将非常熟悉控制器端点，我们将使用 `azdata` 来部署和配置一个大数据集群。


    ### 计算区域


    计算区域（见图 2-11）由一个或多个计算池组成。一个计算池是一组 Kubernetes Pod 的集合，这些 Pod 包含运行在 Linux 上的 SQL
    Server。使用计算池，您可以通过 PolyBase 以分布式方式访问各种数据源。例如，计算池可以访问大数据集群本身 HDFS 内部存储的数据，或者通过任何
    PolyBase 连接器（如 Oracle 或 MongoDB）访问数据。


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig11_HTML.jpg](img/480532_2_En_2_Fig11_HTML.jpg)


    图 2-11 大数据集群计算区域


    拥有计算池的主要优势在于，它提供了将查询分布式或横向扩展到每个计算池内部多个节点的选项，从而提升了 PolyBase 查询的性能。


    默认情况下，在计算逻辑区域内您可以访问一个计算池。但是，在某些情况下，例如当您希望将资源专用于访问特定数据源时，您可以添加多个计算池。计算池内部每个 Kubernetes
    Pod 的所有管理和配置都由 SQL Server 主实例处理。


    ### 数据区域


    数据区域（图 2-12）用于在您的大数据集群中持久化和缓存数据，它分为两种不同的角色：存储池和 SQL 数据池，它们在大数据集群中具有不同的功能。


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig12_HTML.jpg](img/480532_2_En_2_Fig12_HTML.jpg)


    图 2-12 数据平面架构


    #### 存储池


    存储池由结合了 Spark、运行在 Linux 上的 SQL Server 和 HDFS 数据节点的 Kubernetes Pod 组成。图 2-13 展示了
    Pod 的内容。


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig13_HTML.jpg](img/480532_2_En_2_Fig13_HTML.jpg)


    图 2-13 存储池内部的存储节点


    HDFS 数据节点被组合成一个存在于您大数据集群内部的单一 HDFS 集群。存储池的主要功能是提供一个 HDFS 存储集群，用于存储通过例如 Spark 导入的数据。通过创建一个
    HDFS 集群，您基本上可以在大数据集群内部访问一个数据湖，用于存储各种非关系型数据，如 Parquet 或 CSV 文件。


    HDFS 集群会自动安排数据持久化，因为您导入存储池的数据会自动分散到存储池内部的所有存储节点上。这种跨节点的数据分布也使您能够快速分析大量数据，因为分析的负载分布在多个节点上。这种架构的一个优势是，您可以使用数据节点上的本地存储，也可以向节点添加自己的持久存储子系统。


    与计算池类似，存储节点中存在的 SQL Server 实例是通过 SQL Server 主实例访问的。因为存储节点结合了 SQL Server 和 Spark，所以驻留在存储节点上或由存储节点管理的所有数据也可以直接通过
    Spark 访问。这意味着您不必使用 PolyBase 来访问 HDFS 环境内部的数据。这为数据分析或数据工程提供了更大的灵活性。


    #### SQL 数据池


    数据平面的另一个区域是 SQL 数据池。这组 Pod 与存储池的不同之处在于，它没有将 Spark 或 HDFS 一起组合到节点中。相反，SQL 数据池由一个或多个运行在
    Linux 上的 SQL Server 实例组成。这些实例被称为分片，您可以在图 2-14 中看到它们的示意图。


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig14_HTML.jpg](img/480532_2_En_2_Fig14_HTML.jpg)


    图 2-14 SQL 数据池内部对外部数据源的横向扩展和缓存


    SQL 数据池的主要角色是优化使用 PolyBase 对外部源的访问。SQL 数据池随后可以对外部源的数据进行分区和缓存，并最终提供针对外部数据源的并行和分布式查询。为了提供这种并行和分布式功能，SQL
    数据池内部的数据集被划分为跨 SQL 数据池内部节点的分片。


    ## 总结


    在本章中，我们从物理和逻辑两个角度探讨了 SQL Server 大数据集群的架构。在物理架构中，我们重点关注了构成大数据集群的技术，如容器、SQL-on-Linux
    和 Spark。在逻辑架构中，我们讨论了大数据集群内部执行特定角色或任务的不同逻辑区域。


    对于大数据集群中使用的每种技术，我们都简要介绍了其起源以及该技术在大数据集群中扮演的角色。由于 SQL Server 大数据集群中使用了广泛的技术和解决方案，我们尽可能全面地描述了各种技术；然而，我们也意识到，我们无法像希望的那样详细描述每一种技术。例如，仅
    Spark 一项，就已经出版发行了数十本描述其工作原理以及如何利用该技术的书籍。在 SQL-on-Linux、HDFS 和 Kubernetes 领域，情况也并无太大不同。因此，最好将本章视为对这些技术或解决方案的简单而简要的介绍，足以让您开始理解和使用
    SQL Server 大数据集群。

    '
- fmt: '# 3. Deployment of Big Data Clusters


    Now it is time to install your very own `SQL Server 2019 Big Data Cluster`! We
    will be handling three different scenarios in detail and we will be using a fresh
    machine for each of those scenarios:


    *   Stand-alone `PolyBase` installation on `Windows`

    *   Big Data Cluster using `kubeadm` on `Linux`

    *   Big Data Cluster using `Azure Kubernetes Service (AKS)`


    It is perfectly fine to run all options from the same box. But as it is likely
    that you will not be using all of them, we figured it would make sense to start
    fresh each time.


    We will be covering the installation using the `Microsoft Windows` operating system.
    The goal of this guide is to get your `Big Data Cluster` up and running as quick
    as possible, so we will configure some options that may not be best practice (like
    leaving all the service accounts and directories on default). Feel free to modify
    those as it may fit your needs.


    If you opt for the `AKS` installation, you will need an active `Azure` subscription.
    If you do not already have an `Azure` subscription, you can create one for free
    which includes credits which you can spend free of charge.


    ## A Little Helper: `Chocolatey`


    Before we get started, we’d like to point your attention to `Chocolatey` – or
    `choco`. In case you haven’t heard about it, `choco` is a free package manager
    for `Windows` which will allow us to install many of our prerequisites with a
    single line in `PowerShell` or a `command prompt`. You can find more information
    on [`http://chocolatey.org`](http://chocolatey.org) (see Figure [3-1](#480532_2_En_3_Chapter.xhtml#Fig1))
    and you can even create an account and provide your own packages there.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig1_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig1_HTML.jpg)

    Figure 3-1

    Home page of `Chocolatey`


    From a simple user perspective though, there is no need to create an account or
    to download any installer.


    To make `choco` available on your system, open a `PowerShell` window in Administrative
    mode and run the script shown in Listing [3-1](#480532_2_En_3_Chapter.xhtml#PC1).


    ```

    Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol
    = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object
    System.Net.WebClient).DownloadString(''https://chocolatey.org/install.ps1''))

    ```

    Listing 3-1

    Install script for `Chocolatey` in `PowerShell`


    Once the respective command has completed, `choco` is installed and ready to be
    used.


    ## Installation of an On-Premises `PolyBase` Instance


    In case you’re only interested in the data virtualization feature of `SQL Server
    2019 Big Data Clusters`, the installation is actually much easier and lightweight
    than for a full environment. The `PolyBase` feature, which enabled the data virtualization
    feature, can be installed during the regular setup routine of `SQL Server 2019`
    on any platform.


    If you want to use `Teradata` through `PolyBase`, the `C++ Redistributable 2012`
    is required to actually communicate with our `SQL Server` instance. Having `SQL
    Server Management Studio (SSMS)` may be helpful in either case and is nice to
    have it installed and ready to replay the examples we are showing throughout this
    book.


    Let’s install the packages we mentioned earlier through `Chocolatey`. Just run
    the three commands from Listing [3-2](#480532_2_En_3_Chapter.xhtml#PC2) and `choco`
    will take care of the rest.


    ```

    choco install sql-server-management-studio -y

    choco install vcredist2012 -y

    ```

    Listing 3-2

    Install script for `PolyBase` prerequisites


    With our prerequisites installed, we can get to the actual `SQL Server` installation.
    Navigate to [`www.microsoft.com/en-us/evalcenter/evaluate-sql-server-2019`](http://www.microsoft.com/en-us/evalcenter/evaluate-sql-server-2019)
    and follow the instructions to download.


    Run the downloaded file, as shown in Figure [3-2](#480532_2_En_3_Chapter.xhtml#Fig2).


    Select “Download Media” as the installation type.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig2_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig2_HTML.jpg)

    Figure 3-2

    `SQL Server 2019` installer – Installation type selection


    Then confirm language and directory as shown in Figure [3-3](#480532_2_En_3_Chapter.xhtml#Fig3).


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig3_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig3_HTML.jpg)

    Figure 3-3

    `SQL Server 2019` installer – Download Media dialog


    When the download is complete and successful, you will see the message in Figure
    [3-4](#480532_2_En_3_Chapter.xhtml#Fig4).


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig4_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig4_HTML.jpg)

    Figure 3-4

    `SQL Server 2019` installer – Download Media successful


    Now navigate to the folder in which you have placed the download. Mount the image
    as shown in Figure [3-5](#480532_2_En_3_Chapter.xhtml#Fig5).


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig5_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig5_HTML.jpg)

    Figure 3-5

    `SQL Server 2019` installer – mount ISO


    The installation can be run unattended, but for a first install, it probably makes
    more sense to explore your options. Run `setup.exe`, go to the Installation tab,
    and pick “New `SQL Server` stand-alone installation,” as shown in Figure [3-6](#480532_2_En_3_Chapter.xhtml#Fig6).


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig6_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig6_HTML.jpg)

    Figure 3-6

    `SQL Server 2019` installer – main screen


    Pick the evaluation edition as shown in Figure [3-7](#480532_2_En_3_Chapter.xhtml#Fig7),
    confirm the License Terms, and the check the “Check for updates” check box on
    the subsequent screens.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig7_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig7_HTML.jpg)

