    Click “Restart” in the Object Explorer menu as shown in Figure [3-17](#480532_2_En_3_Chapter.xhtml#Fig17)
    to restart the SQL Server Instance.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig17_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig17_HTML.jpg)


    Figure 3-17


    Restart SQL Server Instance


    You’re done – you do now have access to a PolyBase-enabled SQL Server 2019 installation.


    ## Using Azure Data Studio to Work with Big Data Clusters


    As part of Microsoft’s SQL Client tool strategy, it may not surprise you that
    most of the tasks necessary to work with a Big Data Cluster are achieved through
    Azure Data Studio (ADS) rather than SQL Server Management Studio or other tools.
    For those of you who are not familiar with this tool, we’re going to start with
    a little introduction including how to get your hands on this tool.


    ### What Is Azure Data Studio?


    Azure Data Studio is a cross-platform (Windows, MacOS, and Linux), extendable,
    and customizable tool which can be used for classic T-SQL queries and commands,
    as well as multiple new functions like notebooks. The latter can be enabled through
    extensions which are usually installed through a VSIX file, which you might be
    familiar with from working with other extensions for Visual Studio or Visual Studio
    Code.^([²](#fn2))


    It was originally made public in 2017 as SQL Operations Studio but was rebranded
    before its official release in 2018\. While the product name is a bit misleading,
    it is not only for cloud (Azure)-based services but for on-premises solutions
    and needs as well.


    The fact that it, for example, does not come with an out-of-the-box interface
    for SQL Server Agent, but in exchange offers built-in charting, shows that it
    is not so much a replacement but more of a complimenting tool for SQL Server Management
    Studio (SSMS). SSMS is targeting an administrating and managing group (database
    administrators), whereas Azure Data Studio is more suitable for data professionals
    of all kinds, including data scientists.


    ### Getting and Installing Azure Data Studio


    You can get your free copy of Azure Data Studio directly from Microsoft at [`https://docs.microsoft.com/en-us/sql/azure-data-studio/download`](https://docs.microsoft.com/en-us/sql/azure-data-studio/download).
    Download the installer of your choice for your platform and run it.


    Alternatively, simply run this Chocolatey command (Listing [3-4](#480532_2_En_3_Chapter.xhtml#PC5))
    which will install the latest version for you.


    ```

    choco install azure-data-studio -y

    Listing 3-4

    Install ADS via choco

    ```


    ## Installation of a “Real” Big Data Cluster


    If you want to make use of the full Big Data Cluster feature set, you will need
    a full installation including all the different roles and pools.'
