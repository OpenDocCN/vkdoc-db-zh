- fmt: "# Spark\n\nWith the capability to run `SQL Server` on `Linux`, a load of new\
    \ possibilities became available regarding the integration of `SQL Server` with\
    \ various open source and `Linux`-based products and technologies. One of the\
    \ most exciting combinations that became a reality inside `SQL Server Big Data\
    \ Clusters` is the inclusion of `Apache Spark`.\n\n`SQL Server` is a platform\
    \ for relational databases. While technologies like `PolyBase` enable the reading\
    \ of nonrelational data (or relational data from another relational platform like\
    \ `Oracle` or `Teradata`) into the relational format `SQL Server` requires, in\
    \ its heart `SQL Server` never dealt much with unstructured or nonrelational data.\
    \ `Spark` is a game changer in this regard.\n\nThe inclusion of `Spark` inside\
    \ the product means you can now easily process and analyze enormous amounts of\
    \ data of various types inside your `SQL Server Big Data Cluster` using either\
    \ `Spark` or `SQL Server`, depending on your preferences. This ability to process\
    \ large volumes of data allows for maximum flexibility and makes parallel and\
    \ distributed processing of datasets a reality.\n\n## MapReduce\n\n`Apache Spark`\
    \ was created at the University of Berkeley in 2009 mostly as an answer to the\
    \ limitations of a technology called `MapReduce`. The `MapReduce` programming\
    \ model was developed by `Google` and was the underlying technology used to index\
    \ all the web pages on the Internet (and might be familiar to you in the `Hadoop\
    \ MapReduce` form). `MapReduce` is best described as a framework for the parallel\
    \ processing of huge datasets using a (large) number of computers known as nodes.\
    \ This parallel processing across multiple nodes is important since datasets reached\
    \ such sizes that they could no longer efficiently be processed by single machines.\
    \ By spreading the work, and data, across multiple machines, parallelism could\
    \ be achieved which results in the faster processing of those big datasets.\n\n\
    Running a query on a `MapReduce` framework usually results in going through four\
    \ steps of execution:\n\n1.  `Input splits`\n\n    The input to a `MapReduce`\
    \ job is split into logical distribution of the data stored in file blocks. The\
    \ `MapReduce` job calculates which records fit inside a logical block, or “`splits`,”\
    \ and decides on the number of mappers that are required to process the job.\n\
    \n2.  `Mapping`\n\n    During mapping our query is being performed on each of\
    \ the “`splits`” separately and produces the output for the specific query on\
    \ the specific split. The output is always a form of key/value pairs that are\
    \ returned by the mapping process.\n\n3.  `Shuffling`\n\n    The `shuffling` process\
    \ is, simply said, the process of sorting and consolidating the data that was\
    \ returned by the mapping process.\n\n4.  `Reducing`\n\n    The final step, `reducing`,\
    \ aggregates the results returned by the shuffling process and returns a single\
    \ output.\n\nThe best way to explain the `MapReduce` process is by looking at\
    \ a visual example. Figure [2-4](#480532_2_En_2_Chapter.xhtml#Fig4) shows an example\
    \ of a `MapReduce` task that calculates word occurrences inside a dataset. To\
    \ keep things simple and visually easy to display, we use a simple, short sentence\
    \ that acts as a dataset: “`SQL Server` is no longer just `SQL` but it is much\
    \ more.”\n\n![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig4_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig4_HTML.jpg)\n\
    \nFigure 2-4\nMapReduce example job\n\nWhat happens in the example is that the\
    \ dataset that contains the input for our job (the sentence “`SQL Server` is no\
    \ longer just `SQL` but is also much more”) is split up into three different `splits`.\
    \ These `splits` are processed in the `mapping` phase, resulting in the word counts\
    \ for each split. The results are sent to the `shuffling` step which places all\
    \ the results in order. Finally, the `reduce` step calculates the total occurrences\
    \ for each individual word and returns it as the final output.\n\nAs you can see\
    \ from the (simple) example in Figure [2-4](#480532_2_En_2_Chapter.xhtml#Fig4),\
    \ `MapReduce` is very efficient in distributing and coordinating the processing\
    \ of data across a parallel environment. However, the `MapReduce` framework also\
    \ had a number of drawbacks, the most notable being the difficulty of writing\
    \ large programs that require multiple passes over the data (for instance, machine\
    \ learning algorithms). For each pass over a dataset, a separate `MapReduce` job\
    \ had to be written, each one loading the data it required from scratch again.\
    \ Because of this, and the way `MapReduce` accesses data, processing data inside\
    \ the `MapReduce` framework can be rather slow.\n\n## Spark: Improving on MapReduce\n\
    \n`Spark` was created to address these problems and make big data analytics more\
    \ flexible and better performing. It does so by implementing in-memory technologies\
    \ that allow sharing of data between processing steps and by allowing ad hoc data\
    \ processing instead of having to write complex `MapReduce` jobs to process data.\
    \ Also, `Spark` supports a wide variety of libraries that can enhance or expand\
    \ the capabilities of `Spark`, like processing streaming data or performing machine\
    \ learning tasks, and even query data through the `SQL` language.\n\n`Spark` looks\
    \ and acts a lot like the `MapReduce` framework in that `Spark` is also a coordinator,\
    \ and manager, of tasks that process data. Just like `MapReduce`, `Spark` uses\
    \ workers to perform the actual processing of data. These workers get told what\
    \ to do through a so-called `Spark` application which is defined as a `driver\
    \ process`. The `driver process` is essentially the heart of a `Spark` application,\
    \ and it keeps track of the state of your `Spark` application, responds to input\
    \ or output, and schedules and distributes work to the workers. One advantage\
    \ of the `driver process` is that it can be “driven” from different programming\
    \ languages, like `Python` or `R`, through language APIs. `Spark` handles the\
    \ translation of the commands in the various languages to `Spark` code that gets\
    \ processed on the workers.\n\nFigure [2-5](#480532_2_En_2_Chapter.xhtml#Fig5)\
    \ shows an overview of the `logical` `Spark` architecture.\n\n![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig5_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig5_HTML.jpg)\n\
    \nFigure 2-5\nSpark logical architecture\n\nThere is a reason why we specifically\
    \ mentioned the word “`logical`” in connection with `Spark`’s architecture. Even\
    \ though Figure [2-5](#480532_2_En_2_Chapter.xhtml#Fig5) implies that `worker\
    \ nodes` are separate machines that are part of a cluster, it is in fact possible\
    \ in `Spark` to run as many `worker nodes` on a machine as you please. As a matter\
    \ of fact, both the `driver process` and `worker nodes` can be run on a single\
    \ machine in `local mode` for testing and development tasks.\n\nFigure [2-5](#480532_2_En_2_Chapter.xhtml#Fig5)\
    \ also shows how a `Spark` application coordinates work across the cluster. The\
    \ code you write as a user is translated by the `driver process` to a language\
    \ your `worker nodes` understand; it distributes the work to the various `worker\
    \ nodes` which handle the data processing. In the illustration, we specifically\
    \ highlighted the `cache` inside the `worker node`. The `cache` is one part of\
    \ why `Spark` is so efficient in performing data processing since it can store\
    \ intermediate processing results in the memory of the node, instead of on disk\
    \ like, for example, `Hadoop MapReduce`.\n\n## Spark in SQL Server Big Data Clusters\n\
    \nInside `SQL Server Big Data Clusters`, `Spark` is included inside a separate\
    \ container that shares a pod together with a `SQL Server on Linux` container.\n\
    \nOne thing we haven’t touched upon yet is the way nonrelational data outside\
    \ `SQL Server` is stored inside `Big Data Clusters`. If you are familiar with\
    \ `Spark`- or `Hadoop`-based big data infrastructure, the next section should\
    \ not come as a surprise."
  raw: '### Spark


    With the capability to run SQL Server on Linux, a load of new possibilities became
    available regarding the integration of SQL Server with various open source and
    Linux-based products and technologies. One of the most exciting combinations that
    became a reality inside SQL Server Big Data Clusters is the inclusion of Apache
    Spark.


    SQL Server is a platform for relational databases. While technologies like PolyBase
    enable the reading of nonrelational data (or relational data from another relational
    platform like Oracle or Teradata) into the relational format SQL Server requires,
    in its heart SQL Server never dealt much with unstructured or nonrelational data.
    Spark is a game changer in this regard.


    The inclusion of Spark inside the product means you can now easily process and
    analyze enormous amounts of data of various types inside your SQL Server Big Data
    Cluster using either Spark or SQL Server, depending on your preferences. This
    ability to process large volumes of data allows for maximum flexibility and makes
    parallel and distributed processing of datasets a reality.


    Apache Spark was created at the University of Berkeley in 2009 mostly as an answer
    to the limitations of a technology called MapReduce. The MapReduce programming
    model was developed by Google and was the underlying technology used to index
    all the web pages on the Internet (and might be familiar to you in the Hadoop
    MapReduce form). MapReduce is best described as a framework for the parallel processing
    of huge datasets using a (large) number of computers known as nodes. This parallel
    processing across multiple nodes is important since datasets reached such sizes
    that they could no longer efficiently be processed by single machines. By spreading
    the work, and data, across multiple machines, parallelism could be achieved which
    results in the faster processing of those big datasets.


    Running a query on a MapReduce framework usually results in going through four
    steps of execution:


    1.  Input splits


    The input to a MapReduce job is split into logical distribution of the data stored
    in file blocks. The MapReduce job calculates which records fit inside a logical
    block, or “splits,” and decides on the number of mappers that are required to
    process the job.


    2.  Mapping


    During mapping our query is being performed on each of the “splits” separately
    and produces the output for the specific query on the specific split. The output
    is always a form of key/value pairs that are returned by the mapping process.


    3.  Shuffling


    The shuffling process is, simply said, the process of sorting and consolidating
    the data that was returned by the mapping process.


    4.  Reducing


    The final step, reducing, aggregates the results returned by the shuffling process
    and returns a single output.


    The best way to explain the MapReduce process is by looking at a visual example.
    Figure [2-4](#480532_2_En_2_Chapter.xhtml#Fig4) shows an example of a MapReduce
    task that calculates word occurrences inside a dataset. To keep things simple
    and visually easy to display, we use a simple, short sentence that acts as a dataset:
    “SQL Server is no longer just SQL but it is much more.”


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig4_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig4_HTML.jpg)


    Figure 2-4


    MapReduce example job


    What happens in the example is that the dataset that contains the input for our
    job (the sentence “SQL Server is no longer just SQL but is also much more”) is
    split up into three different splits. These splits are processed in the mapping
    phase, resulting in the word counts for each split. The results are sent to the
    shuffling step which places all the results in order. Finally, the reduce step
    calculates the total occurrences for each individual word and returns it as the
    final output.


    As you can see from the (simple) example in Figure [2-4](#480532_2_En_2_Chapter.xhtml#Fig4),
    MapReduce is very efficient in distributing and coordinating the processing of
    data across a parallel environment. However, the MapReduce framework also had
    a number of drawbacks, the most notable being the difficulty of writing large
    programs that require multiple passes over the data (for instance, machine learning
    algorithms). For each pass over a dataset, a separate MapReduce job had to be
    written, each one loading the data it required from scratch again. Because of
    this, and the way MapReduce accesses data, processing data inside the MapReduce
    framework can be rather slow.


    Spark was created to address these problems and make big data analytics more flexible
    and better performing. It does so by implementing in-memory technologies that
    allow sharing of data between processing steps and by allowing ad hoc data processing
    instead of having to write complex MapReduce jobs to process data. Also, Spark
    supports a wide variety of libraries that can enhance or expand the capabilities
    of Spark, like processing streaming data or performing machine learning tasks,
    and even query data through the SQL language.


    Spark looks and acts a lot like the MapReduce framework in that Spark is also
    a coordinator, and manager, of tasks that process data. Just like MapReduce, Spark
    uses workers to perform the actual processing of data. These workers get told
    what to do through a so-called Spark application which is defined as a driver
    process. The driver process is essentially the heart of a Spark application, and
    it keeps track of the state of your Spark application, responds to input or output,
    and schedules and distributes work to the workers. One advantage of the driver
    process is that it can be “driven” from different programming languages, like
    Python or R, through language APIs. Spark handles the translation of the commands
    in the various languages to Spark code that gets processed on the workers.


    Figure [2-5](#480532_2_En_2_Chapter.xhtml#Fig5) shows an overview of the *logical*
    Spark architecture.


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig5_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Spark logical architecture


    There is a reason why we specifically mentioned the word “logical” in connection
    with Spark’s architecture. Even though Figure [2-5](#480532_2_En_2_Chapter.xhtml#Fig5)
    implies that worker nodes are separate machines that are part of a cluster, it
    is in fact possible in Spark to run as many worker nodes on a machine as you please.
    As a matter of fact, both the driver process and worker nodes can be run on a
    single machine in local mode for testing and development tasks.


    Figure [2-5](#480532_2_En_2_Chapter.xhtml#Fig5) also shows how a Spark application
    coordinates work across the cluster. The code you write as a user is translated
    by the driver process to a language your worker nodes understand; it distributes
    the work to the various worker nodes which handle the data processing. In the
    illustration, we specifically highlighted the cache inside the worker node. The
    cache is one part of why Spark is so efficient in performing data processing since
    it can store intermediate processing results in the memory of the node, instead
    of on disk like, for example, Hadoop MapReduce.


    Inside SQL Server Big Data Clusters, Spark is included inside a separate container
    that shares a pod together with a SQL Server on Linux container.


    One thing we haven’t touched upon yet is the way nonrelational data outside SQL
    Server is stored inside Big Data Clusters. If you are familiar with Spark- or
    Hadoop-based big data infrastructure, the next section should not come as a surprise.'
  trans: "\n# Spark\n\n随着能够在`Linux`上运行`SQL Server`的能力出现，将`SQL Server`与各种开源及基于`Linux`的产品和技术集成开启了诸多新的可能性。其中最令人兴奋的组合之一，是在`SQL\
    \ Server 大数据集群`中实现了对`Apache Spark`的集成。\n\n`SQL Server`是一个关系型数据库平台。虽然像`PolyBase`这样的技术能够将非关系型数据（或来自另一个关系型平台如`Oracle`或`Teradata`的关系型数据）读入`SQL\
    \ Server`所需的关系型格式中，但本质上，`SQL Server`过去并不擅长处理非结构化或非关系型数据。在这方面，`Spark`是一个改变游戏规则的存在。\n\
    \n在产品中集成`Spark`意味着，您现在可以根据自己的偏好，轻松地在`SQL Server 大数据集群`内部使用`Spark`或`SQL Server`来处理和分析海量的、各种类型的数据。这种处理大量数据的能力提供了最大的灵活性，并使数据集的并行和分布式处理成为现实。\n\
    \n## MapReduce\n\n`Apache Spark`于 2009 年在加州大学伯克利分校创建，主要是为了解决一种名为`MapReduce`技术的局限性。`MapReduce`编程模型由`Google`开发，是用于为互联网上所有网页建立索引的基础技术（您可能更熟悉其`Hadoop\
    \ MapReduce`形式）。简而言之，`MapReduce`是一个框架，用于在大量被称为节点的计算机上并行处理海量数据集。这种跨多个节点的并行处理至关重要，因为数据集的规模已经增长到无法再由单台机器高效处理的地步。通过将工作（和数据）分布到多台机器上，可以实现并行性，从而更快地处理这些大数据集。\n\
    \n在`MapReduce`框架上运行一个查询通常需要经历四个执行步骤：\n\n1.  `输入分片`\n\n    `MapReduce`任务的输入被分割成逻辑上的数据分布，这些数据存储在文件块中。`MapReduce`任务会计算哪些记录适合放入一个逻辑块或“分片”，并决定处理该任务所需的映射器数量。\n\
    \n2.  `映射`\n\n    在映射阶段，我们的查询在每个“分片”上分别执行，并为该特定分片生成针对该特定查询的输出。输出始终是由映射过程返回的某种形式的键/值对。\n\
    \n3.  `混洗`\n\n    `混洗`过程，简单来说，就是对映射过程返回的数据进行排序和合并的过程。\n\n4.  `归约`\n\n    最后一步，`归约`，汇总混洗过程返回的结果，并返回一个单一的输出。\n\
    \n解释`MapReduce`过程的最佳方式是查看一个可视化示例。图 2-4 展示了一个计算数据集中单词出现次数的`MapReduce`任务示例。为了简单且便于可视化展示，我们使用一个简短的句子作为数据集：\"\
    `SQL Server` is no longer just `SQL` but it is much more.\"\n\n![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig4_HTML.jpg](img/480532_2_En_2_Fig4_HTML.jpg)\n\
    \n图 2-4\nMapReduce 示例任务\n\n在该示例中，包含我们任务输入的数据集（句子“`SQL Server` is no longer just\
    \ `SQL` but is also much more”）被分割成三个不同的`分片`。这些`分片`在`映射`阶段被处理，得出每个分片的单词计数。结果被发送到`混洗`步骤，该步骤将所有结果按顺序排列。最后，`归约`步骤计算每个单词的总出现次数，并将其作为最终输出返回。\n\
    \n从图 2-4 中的（简单）示例可以看出，`MapReduce`在跨并行环境分发和协调数据处理方面非常高效。然而，`MapReduce`框架也有一些缺点，最显著的是编写需要多次遍历数据（例如，机器学习算法）的大型程序很困难。对于数据集的每一次遍历，都必须编写一个独立的`MapReduce`任务，每个任务都需要从头开始重新加载它所需的数据。由于这一点，以及`MapReduce`访问数据的方式，在`MapReduce`框架内处理数据可能相当缓慢。\n\
    \n## Spark：改进 MapReduce\n\n创建`Spark`是为了解决这些问题，并使大数据分析更加灵活和高性能。它通过实现内存技术来实现这一点，该技术允许在处理步骤之间共享数据，并允许进行临时数据处理，而不必编写复杂的`MapReduce`任务来处理数据。此外，`Spark`支持广泛的库，这些库可以增强或扩展`Spark`的功能，例如处理流数据、执行机器学习任务，甚至通过`SQL`语言查询数据。\n\
    \n`Spark`在外观和行为上与`MapReduce`框架非常相似，因为`Spark`也是一个协调和管理处理数据的任务的协调器。与`MapReduce`一样，`Spark`使用工作节点来执行实际的数据处理。这些工作节点通过所谓的`Spark`应用程序（定义为`驱动器进程`）来获知要做什么。`驱动器进程`本质上是`Spark`应用程序的核心，它跟踪`Spark`应用程序的状态，响应输入或输出，并调度工作并将其分配给工作节点。`驱动器进程`的一个优点是，它可以通过语言\
    \ API（如`Python`或`R`）从不同的编程语言“驱动”。`Spark`负责将各种语言中的命令转换为在工作节点上处理的`Spark`代码。\n\n\
    图 2-5 展示了`逻辑上的``Spark`架构概览。\n\n![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig5_HTML.jpg](img/480532_2_En_2_Fig5_HTML.jpg)\n\
    \n图 2-5\nSpark 逻辑架构\n\n我们特意在提及`Spark`架构时使用了“`逻辑上`”这个词是有原因的。尽管图 2-5 暗示`工作节点`是集群中独立的机器，但实际上在`Spark`中，您可以在一台机器上运行任意多的`工作节点`。事实上，出于测试和开发任务的考虑，`驱动器进程`和`工作节点`都可以在单台机器上以`本地模式`运行。\n\
    \n图 2-5 还展示了`Spark`应用程序如何在集群上协调工作。您作为用户编写的代码由`驱动器进程`翻译成您的`工作节点`能够理解的语言；它将工作分发给各个`工作节点`，由它们处理数据。在图中，我们特别突出了`工作节点`内部的`缓存`。`缓存`是`Spark`能够如此高效地执行数据处理的原因之一，因为它可以将中间处理结果存储在节点的内存中，而不是像`Hadoop\
    \ MapReduce`那样存储在磁盘上。\n\n## SQL Server 大数据集群中的 Spark\n\n在`SQL Server 大数据集群`内部，`Spark`被包含在一个独立的容器中，该容器与一个`SQL\
    \ Server on Linux`容器共享一个 Pod。\n\n我们尚未触及的一个方面是，`SQL Server`外部的非关系型数据在`大数据集群`内部是如何存储的。如果您熟悉基于`Spark`或`Hadoop`的大数据基础架构，下一节内容应该不会让您感到意外。\n"
- fmt: '### HDFS


    HDFS, or the Hadoop Distributed File System, is the primary method of storing
    data inside a Spark architecture. HDFS has many advantages in how it stores and
    processes data stored on the filesystem, like fault tolerance and distribution
    of data across multiple nodes that make up the HDFS cluster.


    The way HDFS works is it breaks up the data in separate blocks (called chunks)
    and distributes them across the nodes that make up the HDFS environment when data
    is stored inside the filesystem. The chunks, with a default size of 64 MB, are
    then replicated across multiple nodes to enable fault tolerance. If one node fails,
    copies of data chunks are also available on other nodes, which means the filesystem
    can easily recover from data loss on single nodes.


    Figure [2-6](#480532_2_En_2_Chapter.xhtml#Fig6) shows a simplified overview of
    the HDFS architecture.


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig6_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig6_HTML.jpg)


    Figure 2-6


    HDFS architecture


    In many aspects, HDFS mirrors the architecture of Hadoop and, in that sense, of
    Spark as we have shown in the previous section. Because of the distributed nature
    of data stored inside the filesystem, it is possible, and in fact expected, that
    data is distributed across the nodes that also handle the data processing inside
    the Spark architecture. This distribution of data brings a tremendous advantage
    in performance; since data resides on the same node that is responsible for the
    processing of that data, it is unnecessary to move data across a storage architecture.
    With the added benefit of data caching inside of the Spark worker nodes, data
    can be processed very efficiently indeed.


    One thing that requires pointing out is that unlike with Hadoop, Spark is not
    necessarily restricted to data residing in HDFS. Spark can access data that is
    stored in a variety of sources through APIs and native support. Examples include
    various cloud storage platforms like Azure Blob Storage or relational sources
    like `SQL Server`.


    ### Tying the Physical Infrastructure Parts Together


    Now it’s time to look at the big picture. Figure [2-7](#480532_2_En_2_Chapter.xhtml#Fig7)
    shows a complete overview of how the technologies discussed in the previous sections
    work together inside `SQL Server Big Data Clusters`.


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig7_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig7_HTML.jpg)


    Figure 2-7


    `SQL Server Big Data Cluster` architecture with Spark, HDFS, and Kubernetes


    As you can see from Figure [2-7](#480532_2_En_2_Chapter.xhtml#Fig7), `SQL Server
    Big Data Clusters` combine a number of different roles inside the containers that
    are deployed by Kubernetes. Placing both `SQL Server` and Spark together in a
    container with the HDFS Data Node allows both products to access data that is
    stored inside HDFS in a performance-optimized manner. In `SQL Server` this data
    access will occur through `PolyBase`, while Spark can natively query data residing
    in HDFS.


    The architecture in Figure [2-7](#480532_2_En_2_Chapter.xhtml#Fig7) also gives
    us two distinct different paths in how we can process and query our data. We can
    decide on storing data inside a relational format using the `SQL Server` instances
    available to us, or we can use the HDFS filesystem and store (nonrelational) data
    in it. When the data is stored in HDFS, we can access and process that data in
    whichever manner we prefer. If your users are more familiar with writing `T-SQL`
    queries to retrieve data, you can use `PolyBase` to bring the HDFS-stored data
    inside `SQL Server` using an external table. On the other hand, if users prefer
    to use Spark, they can write Spark applications that access the data directly
    from HDFS. Then if needed, users can invoke a Spark API to combine relational
    data stored in `SQL Server` with the nonrelational data stored in HDFS.


    ## Logical Big Data Cluster Architecture


    As mentioned in the introduction of this chapter, Big Data Clusters can be divided
    into four logical areas. Consider these areas as a collection of various infrastructure
    and management parts that perform a specific function inside the cluster. Each
    of the areas in turn has one or more roles it performs. For instance, inside the
    Data Pool area, there are two roles: the Storage Pool and the SQL Data Pool.


    Figure [2-8](#480532_2_En_2_Chapter.xhtml#Fig8) shows an overview of the four
    logical areas and the various roles that are part of each area.


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig8_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig8_HTML.jpg)


    Figure 2-8


    Big Data Cluster architecture


    You can immediately infer the four logical areas: the Control area (which internally
    is named the Control Plane) and the Compute, Data, and App areas. In the following
    sections, we are going to dive into each of these logical areas individually and
    describe their function and what roles are being performed in it. Before we start
    taking a closer look at the Control Plane, you might have noticed there is an
    additional role displayed in Figure [2-8](#480532_2_En_2_Chapter.xhtml#Fig8),
    the `SQL Server Master Instance`.


    The `SQL Server master instance` is a `SQL Server on Linux` deployment inside
    a Kubernetes node. The `SQL Server master instance` acts like an entry point toward
    your Big Data Cluster and provides the external endpoint to connect to through
    `Azure Data Studio` (`ADS`) (see Figure [2-9](#480532_2_En_2_Chapter.xhtml#Fig9))
    or from other tools like `SQL Server Management Studio`.


    ![../images/480532_2_En_2_Chapter/480532_2_En_2_Fig9_HTML.jpg](images/480532_2_En_2_Chapter/480532_2_En_2_Fig9_HTML.jpg)


    Figure 2-9


    Connection to the `SQL Server master instance` through `Azure Data Studio`


    In many ways the `SQL Server master instance` acts like a normal `SQL Server`
    instance. You can access it and browse through the instance using `Azure Data
    Studio` and query the system and user databases that are stored inside of it.
    One of the big changes compared to a traditional `SQL Server` instance is that
    the `SQL Server master instance` will distribute your queries across all `SQL
    Server` nodes inside the Compute Pool(s) and access data that is stored, through
    `PolyBase`, on HDFS inside the Data Plane.


    By default, the `SQL Server master instance` also has `Machine Learning Services`
    enabled. This allows you to run in-database analytics using `R`, `Python`, or
    `Java` straight from your queries. Using the data virtualization options provided
    in `SQL Server Big Data Cluster`, `Machine Learning Services` can also access
    nonrelational data that is stored inside the HDFS filesystem. This means that
    your data analysists or scientists can choose to use either Spark or `SQL Server
    Machine Learning Services` to analyze, or operationalize, the data that is stored
    in the Big Data Cluster. We are going to explore these options in a more detailed
    manner in Chapter [7](#480532_2_En_7_Chapter.xhtml).'
