- fmt: '# Storage usage of our data frame across Spark nodes


    We can see our data frame is actually cached across three Spark worker nodes,
    each of which cached a different amount of data. We can also see how our data
    frame is partitioned and how those partitions are distributed across the worker
    nodes. Partitioning is something that Spark handles automatically and it is essential
    for the distributed processing of the platform.


    ## Data Frame Partitioning


    Like we mentioned at the end of the previous section, Spark handles the partitioning
    of your data frame automatically. As soon as we create a data frame, it automatically
    gets partitioned and those partitions are distributed across the worker nodes.

    We can see in how many partitions a data frame is partitioned through the function
    shown in Listing 6-45.


    ```

    # Spark cuts our data into partitions

    # We can see the number of partitions for a data frame by using the following
    command

    df_flightinfo.rdd.getNumPartitions()

    Listing 6-45

    Retrieve the number of partitions of a data frame

    ```


    In our case, the `df_flightinfo` data frame we’ve been using throughout this chapter
    has been partitioned into five partitions `–` something we also noticed in the
    previous section where we looked at how the data is distributed across the Spark
    nodes that make up our cluster through the Yarn web portal.

    If we want to, we can also set the amount of partitions ourselves (Listing 6-46).
    One simple way to do this is by supplying the number of partitions you want to
    the `repartition()` function.


    ```

    # If we want to, we can repartition the data frame to more or less partitions

    df_flightinfo = df_flightinfo.repartition(1)

    Listing 6-46

    Repartition a data frame

    ```


    In the example code of Listing 6-46, we would repartition the `df_flightinfo`
    data frame to a single partition. Generally speaking, this isn’t the best idea,
    since only having a single partition would mean that all the processing of the
    data frame would end up on one single worker node. Ideally you want to partition
    your data frame in as equally sized partitions as possible. Whenever an action
    is performed against the data frame, it can get split up into equally large operations,
    having maximum computing efficiency.

    To make sure your data frame is as efficiently partitioned as possible, it is
    in many cases not very efficient in just supplying the number of partitions you
    are interested in. In most cases you would like to partition your data on a specific
    key/value, making sure all rows inside your data frame that have the same key/value
    are partitioned together. Spark also allows partitioning on a specific column
    as we show in the example code of Listing 6-47.


    ```

    df_flights_partitioned = df_flightinfo.repartition("AIRLINE")

    Listing 6-47

    Created partitioned data frame

    ```


    In this specific example, we are partitioning the `df_flights_partitioned` data
    frame on the `AIRLINE` column. Even though there are only 14 distinct airlines
    inside our data frame, we still end up with 200 partitions if we look at the partition
    count of the newly created data frame. That is because, by default, Spark uses
    a minimum partition count of 200 whenever we partition on a column. For our example,
    this would mean that 14 of the 200 partitions actually contain data, while the
    rest is empty.

    Let’s take a look at how the data is being partitioned and processed. Before we
    can do that, however, we need to perform an action against the data frame so that
    it actually gets partitioned (Listing 6-48).


    ```

    # Let''s run a count so we can get some partition information back through the
    web portal

    df_flights_partitioned.count()

    Listing 6-48

    Retrieved count from partitioned data frame

    ```


    After running this command, we are going to return to the Yarn web portal which
    we visited in the previous section when we looked at data frame caching. If you
    do not have it opened, you need to navigate to the Yarn web portal and open the
    currently running application and finally clicking the `ApplicationMaster` URL
    to view the jobs inside your application as shown in Figure 6-53.


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig53_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig53_HTML.jpg)

    Figure 6-53

    Spark jobs inside our active application


    We are going to focus at the topmost job (Figure 6-54) of the list shown in Figure
    6-53. This is the count we performed after manually partitioning our data frame
    on the `AIRLINE` column which you can also see in the name of the operation that
    was performed.


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig54_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig54_HTML.jpg)

    Figure 6-54

    Spark job for our `count()` operation


    By clicking the link in the Description, we are brought to a page that shows more
    information about that specific job which is shown in Figure 6-55.


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig55_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig55_HTML.jpg)

    Figure 6-55

    Spark Job details


    What is very interesting to see is that the jobs themselves are also divided into
    substeps called “Stages.” Each stage inside a job performs a specific function.
    To show how our partitioning was handled, the most interesting stage is the middle
    one on which we zoom in in Figure 6-56.


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig56_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig56_HTML.jpg)

    Figure 6-56

    Stage inside a Spark job


    In this stage, the actual count was performed across all the partitions of the
    data frame; remember, there were 200 partitions that were created when we created
    our partition key on the `AIRLINE` column. In the “Tasks: Succeeded/Total” column,
    you see that number being returned.

    If we go down even deeper in the details of this stage, by clicking the link inside
    the Description column, we receive another page that shows us exactly how the
    data was processed for this specific stage. While this page provides a wealth
    of information, including an event timeline, another `DAG` visualization, and
    summary metrics for all the 200 steps (which are again called tasks on this level),
    I mostly want to focus on the table at the bottom of the page that returns processing
    information about the 200 tasks beneath this stage.

    If we sort the table on the column “Shuffle Read / Records” in a descending manner,
    we can exactly see how many records were read from each partition for that task
    and from which host they were read as shown in Figure 6-57, which shows the first
    couple of tasks that processed rows of the total of 14 tasks that actually handled
    rows (the other 186 partitions are empty; thus no rows are processed from them).


    ![../images/480532_2_En_6_Chapter/480532_2_En_6_Fig57_HTML.jpg](images/480532_2_En_6_Chapter/480532_2_En_6_Fig57_HTML.jpg)

    Figure 6-57

    Tasks that occurred beneath our count step, sorted on Shuffle Read Size / Records


    From the results in Figure 6-57, we can immediately also see a drawback of setting
    our partitioning on a column value. The biggest partition contains far more rows
    (1,261,855) than the smallest one (61,903), meaning most of the actions we perform
    will occur on the Spark worker that contains our largest partition. Ideally, you
    want to make your partitions as even as possible and distributed in such a way
    that work is spread evenly across your Spark worker nodes.'
