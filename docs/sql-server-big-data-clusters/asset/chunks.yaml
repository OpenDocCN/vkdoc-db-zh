    [SECURITY_DELAY] tinyint,

    [AIRLINE_DELAY] smallint,

    [LATE_AIRCRAFT_DELAY] smallint,

    [WEATHER_DELAY] tinyint

    )

    WITH (LOCATION = N''/Flight_Delays/flights.csv'', DATA_SOURCE = [SqlStoragePool],
    FILE_FORMAT = [FileFormat_flights]);

    Listing 5-14

    Original CREATE statement for external table flights

    ```


    Let’s just change that to an int (or bigint) and, while we’re at it, do the same
    for the other delay columns (Listing [5-15](#480532_2_En_5_Chapter.xhtml#PC15)).


    ```

