- fmt: '## 创建大数据集群应用


    有两种方法可以将应用部署到大数据集群：通过 Visual Studio Code 的应用部署扩展，或者通过 `azdata` 命令行工具。我们将专注于使用后一种方法来创建和部署我们的应用。


    在部署应用之前，我们首先需要编写它。正如本章引言中提到的，应用可以用 R 或 Python 编写，我们选择了 R 作为应用的编程语言。虽然要跟随本章的示例，严格来说并不需要访问
    R，但如果你想自己训练应用内部使用的机器学习模型，那将会很有用。无论如何，预训练的模型以及应用部署所需的其他文件都可以在本书的 GitHub 页面下载。


    由于我们将创建一个使用机器学习模型为新数据评分的大数据集群应用，我们需要先创建并存储模型。清单 [8-1](#480532_2_En_8_Chapter.xhtml#PC1)
    中的代码将使用内置的 Iris 数据集通过决策树创建一个机器学习模型，并将其存储在一个 `.RDS` 文件中（运行代码前请确保设置好目录路径）。我们稍后将使用存储在
    `.RDS` 文件中的模型为新数据评分。你可以从本地计算机的 R 会话中执行以下代码。你可以从 [`www.r-project.org/`](http://www.r-project.org/)
    下载并安装 R。


    ```r

    # Read the Iris data into a new dataframe

    Iris_Data <- iris

    # Change the column names

    colnames(Iris_Data) <- c(''Sepal_Length'', ''Sepal_Width'', ''Petal_Length'',
    ''Petal_Width'', ''Species'')

    # Sample a number of rows for splitting training and testing datasets

    sample_size <- floor(0.75 ∗ nrow(Iris_Data))

    set.seed(1234)

    train_id <- sample(seq_len(nrow(Iris_Data)), size = sample_size)

    Iris_train <- Iris_Data[train_id, ]

    Iris_test <- Iris_Data[-train_id, ]

    # Train the model, a decision tree, on the training data

    Iris_Dtree <- rpart(Species~., data = Iris_train, method = ''class'')

    # Save the model to disk

    saveRDS(Iris_Dtree, "[folder path]/iris_dtree.rds")

    ```

    **清单 8-1** 在 R 中构建预测模型


    如清单 [8-1](#480532_2_En_8_Chapter.xhtml#PC1) 所示，我们增加了将数据拆分为训练集和测试集的步骤。然而，在前面的代码中，我们只使用训练数据集来训练模型，并未使用测试数据集来测试其准确性。本章中我们并不特别关注模型性能，而是关注使用预训练模型通过我们的大数据集群应用为新数据评分的能力。如果你想查看模型训练的效果，可以运行清单
    [8-2](#480532_2_En_8_Chapter.xhtml#PC2) 中的代码行，它将基于我们训练好的模型进行 Iris 品种预测，并将这些预测与原始测试数据集结合起来。


    ```r

    Iris_Predict <- predict(Iris_Dtree, Iris_test, method = ''class'')

    Prediction_results <- cbind(Iris_test, Iris_Predict)

    ```

    **清单 8-2** 使用我们训练好的模型进行预测


    现在我们有了一个存储在 RDS 文件中的预训练模型，可以来看看创建大数据集群应用所需的实际代码了。


    一个大数据集群应用至少包含两个文件：我们将在应用内部运行的实际代码，以及一个保存应用配置的 YAML 文件。这两个文件，以及任何你想上传到应用容器的附加文件（例如我们的预训练机器学习模型），都必须全部存储在一个单独的目录中，如图
    [8-1](#480532_2_En_8_Chapter.xhtml#Fig1) 所示。


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig1_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig1_HTML.jpg)

    **图 8-1** 应用文件


    除了 “`spec.yaml`” 文件，你可以自由地以任何你想要的方式命名其他文件。


    首先让我们看看 “`Predict_Iris.R`” 文件的内容。该文件将包含从 “`iris_dtree.rds`” 文件加载预训练模型，并根据我们传递给脚本文件的输入变量执行预测所需的代码。该文件的内容见清单
    [8-3](#480532_2_En_8_Chapter.xhtml#PC3)。


    ```r

    library(rpart)

    runpredict <- function(SepalLength, SepalWidth, PetalLength, PetalWidth) {

    input_dataframe = data.frame(Sepal_Length = SepalLength, Sepal_Width = SepalWidth,
    Petal_Length = PetalLength, Petal_Width = PetalWidth)

    Iris_Dtree <- readRDS("iris_dtree.rds")

    Iris_Predict <- predict(Iris_Dtree, input_dataframe, method = ''class'')

    result <- as.data.frame(Iris_Predict)

    }

    ```

    **清单 8-3** Predict_Iris.R 文件的内容


    在前面的代码中，我们首先加载了基于决策树进行预测所需的 R 库。我们最初也是使用 `rpart` 库来训练模型的；因此，当我们想要执行预测时，也需要加载该库。


    通过脚本文件的整个处理过程由一个 R 函数处理。这是必要的，因为我们将在 `spec.yaml` 文件中定义一个入口点，该入口点在运行应用时会被调用。在函数定义中，我定义了四个输入变量：`SepalLength`、`SepalWidth`、`PetalLength`
    和 `PetalWidth`。当我们调用应用时，会将这些变量作为输入参数提供给模型以执行预测。在函数内的第一行代码中，我将输入变量分组并将它们存储在一个名为
    `input_dataframe` 的 R 数据框中，同时注意将列名重命名为与我们训练模型时使用的格式相同。这是必需的，否则预测将不知道哪一列是哪种数据。


    下一步，我们从 RDS 文件加载预训练模型，该文件我们也上传到了应用容器，之后调用 R 的 `predict` 函数，使用模型和输入数据框执行预测。最后，我们将预测结果转换为数据框格式并映射到
    `result` 变量。


    现在我们已经完成了应用程序脚本，必须创建 `spec.yaml` 文件。对于本章中我们要部署到大数据集群的示例应用，`spec.yaml` 文件内容如清单
    [8-4](#480532_2_En_8_Chapter.xhtml#PC4) 所示。


    ```yaml

    name: predictiris

    version: v1

    runtime: R

    src: ./Predict_Iris.R

    entrypoint: runpredict

    replicas: 1

    poolsize: 1

    inputs:

    SepalLength: numeric

    SepalWidth: numeric

    PetalLength: numeric

    PetalWidth: numeric

    output:

    out: data.frame

    ```

    **清单 8-4** spec.yaml 文件的内容


    `spec.yaml` 文件的大部分内容是不言自明的。我们提供了应用的名称和版本、运行时语言，以及运行应用时调用的文件。在底部部分，我们定义了输入参数（与我们在
    R 函数中定义的参数相同）及其数据类型，以及输出参数的数据类型。在这种情况下，我们没有显式设置输出参数名称。这是因为 R 在调用函数时自动使用最后设置的变量（在我们的例子中是
    `result`）作为输出。'
  raw: '## Create a Big Data Cluster App


    There are two methods we can use to deploy apps to the Big Data Cluster, Visual
    Studio Code through the App Deploy Extension and through the azdata command-line
    utility. We are going to focus on the latter method to create and deploy our app.


    Before we can deploy our app, we first have to write it. As mentioned in the introduction
    of this chapter, apps can be written in R or Python and we have selected R as
    the language of choice for our app. While it is not strictly necessary to have
    access to R if you want to follow the examples in this chapter, it can be useful
    if you want to train the machine learning model we are using inside our app yourself.
    In any case, the pretrained model and the other files that are required for app
    deployment are available for download at this book’s GitHub page.


    Since we are going to create a Big Data Cluster app that is going to score new
    data using a machine learning model, we need to create and store the model first.
    The code in Listing [8-1](#480532_2_En_8_Chapter.xhtml#PC1) will use the built-in
    Iris dataset to create a machine learning model through a decision tree and store
    it inside an .RDS file (make sure to set a directory path before running the code).
    We will use the model stored inside the .RDS file later to score new data. You
    can execute the following code from an R session on your local computer. You can
    download and install R from [`www.r-project.org/`](http://www.r-project.org/).


    ```

    # Read the Iris data into a new dataframe

    Iris_Data <- iris

    # Change the column names

    colnames(Iris_Data) <- c(''Sepal_Length'', ''Sepal_Width'', ''Petal_Length'',
    ''Petal_Width'', ''Species'')

    # Sample a number of rows for splitting training and testing datasets

    sample_size <- floor(0.75 ∗ nrow(Iris_Data))

    set.seed(1234)

    train_id <- sample(seq_len(nrow(Iris_Data)), size = sample_size)

    Iris_train <- Iris_Data[train_id, ]

    Iris_test <- Iris_Data[-train_id, ]

    # Train the model, a decision tree, on the training data

    Iris_Dtree <- rpart(Species~., data = Iris_train, method = ''class'')

    # Save the model to disk

    saveRDS(Iris_Dtree, "[folder path]/iris_dtree.rds")

    Listing 8-1

    Building a prediction model in R

    ```


    As you can see in Listing [8-1](#480532_2_En_8_Chapter.xhtml#PC1), we went through
    the additional steps of splitting our data into a training and testing dataset.
    However, in the preceding code, we only use the training dataset to train the
    model and do not test its accuracy using the test dataset. We aren’t necessarily
    interested in the model performance in this chapter, but rather the ability to
    use the pretrained model to score new data through our Big Data Cluster app. If
    you want to see how the model training performed, you can run the lines of the
    code in Listing [8-2](#480532_2_En_8_Chapter.xhtml#PC2), which will perform an
    Iris species prediction based on the model we trained and combine those predictions
    with the original testing dataset.


    ```

    Iris_Predict <- predict(Iris_Dtree, Iris_test, method = ''class'')

    Prediction_results <- cbind(Iris_test, Iris_Predict)

    Listing 8-2

    Predict using our trained model

    ```


    Now that we have a pretrained model available to us inside and RDS file, we can
    take a look at the actual code required to create a Big Data Cluster app.


    A Big Data Cluster app consists a minimum of two files: the actual code we are
    going to run inside the app and a YAML file that holds the configuration of our
    app. Both of these files, and any additional files you want to upload to the app
    container like our pretrained machine learning model, must all be stored inside
    a single directory as shown in Figure [8-1](#480532_2_En_8_Chapter.xhtml#Fig1).


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig1_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig1_HTML.jpg)


    Figure 8-1


    App files


    With the exception of the “spec.yaml” file, you are free to name your files in
    whichever way you want.


    Let’s first look at the contents of the “Predict_Iris.R” file. This file will
    contain the code necessary to load the pretrained model from the “iris_dtree.rds”
    file and perform a prediction based on the input variables we pass to the script
    file. The contents of the file can be seen in Listing [8-3](#480532_2_En_8_Chapter.xhtml#PC3).


    ```

    library(rpart)

    runpredict <- function(SepalLength, SepalWidth, PetalLength, PetalWidth) {

    input_dataframe = data.frame(Sepal_Length = SepalLength, Sepal_Width = SepalWidth,
    Petal_Length = PetalLength, Petal_Width = PetalWidth)

    Iris_Dtree <- readRDS("iris_dtree.rds")

    Iris_Predict <- predict(Iris_Dtree, input_dataframe, method = ''class'')

    result <- as.data.frame(Iris_Predict)

    }

    Listing 8-3

    Contents of the Predict_Iris.R file

    ```


    In the preceding code, we firstly load the R library needed to perform a prediction
    based on a decision tree. We also used the rpart library to train the model in
    the first place; hence, it is also required to load the library when we want to
    perform a prediction.


    The entire processing through our script file is handled through an R function.
    This is necessary since we are going to define an entry point inside the spec.yaml
    file which is called whenever we run the app. In the function definition, I am
    defining four input variables, `SepalLength`, `SepalWidth`, `PetalLength`, and
    `PetalWidth`. When we are going to call our app, we are supplying these variables
    as input parameters for the model to perform a prediction. In the first line of
    code inside the function, I am grouping the input variables and storing them inside
    an R dataframe called `input_dataframe` , taking care to rename the columns to
    the identical format we also used when training the model. This is required, else
    the prediction would not know which data is residing in which column.


    In the next step, we are loading the pretrained model from the RDS file which
    we also upload to the app container, after which we call the R predict function
    to perform a prediction using the model and the input dataframe. Finally, we convert
    the result of the prediction into a dataframe format and map it to the `result`
    variable.


    Now that we have actually completed our application script, we have to create
    the `spec.yaml` file. For the example app we are deploying to our Big Data Cluster
    inside this chapter, the `spec.yaml` file looks like Listing [8-4](#480532_2_En_8_Chapter.xhtml#PC4).


    ```

    name: predictiris

    version: v1

    runtime: R

    src: ./Predict_Iris.R

    entrypoint: runpredict

    replicas: 1

    poolsize: 1

    inputs:

    SepalLength: numeric

    SepalWidth: numeric

    PetalLength: numeric

    PetalWidth: numeric

    output:

    out: data.frame

    Listing 8-4

    Contents of the spec.yaml file

    ```


    Most of the contents of the `spec.yaml` file are pretty much self-explanatory.
    We supply a name and a version of the app, the runtime language, and the file
    that is called whenever we run our app. In the bottom section, we define our input
    parameters (which are identical to the ones we defined in the R function) and
    their datatypes, as well as the datatype of our output parameter. In this case
    we didn’t explicitly set an output parameter name. This is because R automatically
    uses the last set variable (in our case `result`) as output when you call a function.'
