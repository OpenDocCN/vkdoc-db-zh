- fmt: '## Machine Learning in Spark


    ### Spark机器学习概述


    由于大数据集群由SQL Server和Spark节点组成，我们可以轻松选择在Spark平台内运行从训练到评分的机器学习流程。我们可以列出许多选择Spark而非SQL作为机器学习平台的原因（反之亦然）。然而，当您拥有一个非常大的数据集，将其加载到数据库中并不合理时，您或多或少只能使用Spark，因为Spark能很好地处理大型数据集，并且可以以与处理数据相同的分布式特性来训练各种机器学习算法。


    正如在一个开放、分布式数据处理平台上所期望的那样，有许多库可用于满足您的机器学习需求。在本书中，我们决定使用内置的Spark ML库，这些库提供了大量不同的算法选择，应该能满足您的大多数高级分析需求。


    ### 准备数据：加载Iris数据集


    就像我们为SQL Server的数据库内机器学习服务部分所做的那样，我们需要将一些数据导入Spark中以供使用。为了简单起见，我们决定重用在SQL Server部分也使用过的Iris数据集。就像我们在上一章中所做的那样，我们在Spark中进行的所有数据处理、整理和操作都发生在数据框上。假设您已经完成了前一章SQL
    Server部分的示例，我们将使用代码清单[7-10](#480532_2_En_7_Chapter.xhtml#PC10)中的代码从SQL Server主实例中提取Iris数据集，并将其加载到Spark的数据框中。如果您不熟悉通过Spark连接到SQL
    Server主实例，建议阅读上一章的最后一节，其中详细介绍了如何实现此场景。


    ```

    # Before we get started, let''s get the Iris data from the database/table we

    # created in the previous section

    df_Iris = spark.read.format("jdbc") \

    .option("url", "jdbc:sqlserver://master-0.master-svc;databaseName=InDBMl") \

    .option("dbtable", "dbo.Iris") \

    .option("user", "[username]") \

    .option("password", "[password]").load()

    ```


    清单 7-10 从SQL Server主实例读取数据


    如果我们查看`df_Iris`数据框的部分内容，使用`df_Iris.show(10)`命令，我们应该能看到所有鸢尾花物种的特征以及物种本身都存在于数据框中（图[7-8](#480532_2_En_7_Chapter.xhtml#Fig8)）。


    ![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig8_HTML.jpg](images/480532_2_En_7_Chapter/480532_2_En_7_Fig8_HTML.jpg)


    图 7-8 df_Iris数据框的前10行


    ### 导入机器学习库


    数据位于Spark的数据框中后，我们几乎准备好开始进行一些机器学习了。但首先我们需要处理的是加载一些Spark ML库，如代码清单[7-11](#480532_2_En_7_Chapter.xhtml#PC11)所示。


    ```

    # To perform machine learning tasks, we need to import a number of libraries

    # In this case we are going to perform classification

    from pyspark.ml.classification import *

    from pyspark.ml.evaluation import *

    from pyspark.ml.feature import *

    ```


    清单 7-11 加载机器学习库


    在这种情况下，由于我们正在处理一个所谓的分类问题，我们只需要导入`pyspark.ml.classification`库，以及我们需要对数据框特征（在此上下文中是数据框列的另一个名称）进行一些修改和评估模型性能所需的库。


    ### 数据处理：特征工程


    加载库之后，我们将对数据框进行一些修改，使其适合我们的机器学习算法使用。不同的机器学习算法对数据有不同的要求，例如，有些算法只适用于数值输入，就像我们正在使用的分类算法一样。代码清单[7-12](#480532_2_En_7_Chapter.xhtml#PC12)在我们的`df_Iris`数据框上执行了一系列任务。


    ```

    # We are going to combine all the features we need to predict the Iris species

    # into a single vector feature

    feature_cols = df_Iris.columns[:-1]

    assembler = VectorAssembler(inputCols=feature_cols, outputCol="features")

    df_Iris = assembler.transform(df_Iris)

    df_Iris = df_Iris.select("features", "Species")

    # Since we are going to perform logistic regression, we are going to convert

    # the string values inside species to a numerical value

    label_indexer = StringIndexer(inputCol="Species", outputCol="label").fit(df_Iris)

    df_Iris = label_indexer.transform(df_Iris)

    ```


    清单 7-12 处理数据以使其适合机器学习


    第一部分代码将不同的特征组合到一个名为`"features"`的新列中。所有这些特征都是鸢尾花物种的特征，它们被组合成一种称为向量的单一格式（我们将在本书稍后部分直观地了解其外观）。代码行`feature_cols
    = df_Iris.columns[:-1]`选择了数据框除最右侧一列（即鸢尾花实际物种）之外的所有列。


    在第二部分中，我们将不同的鸢尾花物种映射到一个数值。我们用来预测鸢尾花物种的算法需要数值输入，这意味着我们必须执行转换。这在机器学习和数据科学领域并不罕见。在许多情况下，您必须将字符串值转换为数值，以便算法能够处理它。从字符串转换为数值后，我们添加了一个名为`"label"`的新列，其中包含物种的数值。


    在下一步中，我们只从`df_Iris`数据框中选择特征和标签列，并返回前10行（代码清单[7-13](#480532_2_En_7_Chapter.xhtml#PC13)的结果如图[7-9](#480532_2_En_7_Chapter.xhtml#Fig9)所示），让您了解我们在前一段代码中执行转换后的数据是什么样子。


    ![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig9_HTML.jpg](images/480532_2_En_7_Chapter/480532_2_En_7_Fig9_HTML.jpg)


    图 7-9 修改后的`df_Iris`数据框


    ```

    # We only need the feature column and the label column

    df_Iris = df_Iris.select("features", "label")

    df_Iris.show(10)

    ```


    清单 7-13 仅选择数据框的特征和标签列


    从图[7-9](#480532_2_En_7_Chapter.xhtml#Fig9)中可以看出，所有特征（`Petal_Length`、`Petal_Width`等）都已被转换到数据框单个列内的一个向量中。`label`列现在返回物种的数值，2.0代表山鸢尾，1.0代表维吉尼亚鸢尾，0.0代表变色鸢尾。


    ### 数据分割：训练集与测试集


    现在我们的整个数据框已经转换成适合机器学习分类算法的格式，我们可以像上一节一样将数据分割为训练数据框和测试数据框。代码清单[7-14](#480532_2_En_7_Chapter.xhtml#PC14)处理了分割，其中80%的数据进入`Iris_train`数据框，剩余的20%进入`Iris_test`数据框。


    ```

    # Split the dataset

    (Iris_train, Iris_test) = df_Iris.randomSplit([0.8, 0.2])

    ```


    清单 7-14 将数据框分割为训练和测试数据框'
  raw: '## Machine Learning in Spark


    Since Big Data Clusters are made up from SQL Server and Spark nodes, we can easily
    choose to run our machine learning processes, from training to scoring, inside
    the Spark platform. There are many reasons we can come up with why you would choose
    Spark over SQL for a machine learning platform (and vice versa). However, when
    you have a very large dataset that doesn’t make sense to load into a database,
    you are more or less stuck on using Spark since Spark can handle large datasets
    very well and can train various machine learning algorithms in the same distributed
    nature as it handles data processing.


    As expected on an open, distributed, data processing platform, there are many
    libraries available which you can use to satisfy your machine learning needs.
    In this book we decided on using the built-in Spark ML libraries which provide
    a large selection of different algorithms and should cover most of your advanced
    analytical needs.


    Just like we did for the In-Database Machine Learning Services for SQL Server
    section, we need to get some data inside Spark to work with. For the sake of simplicity,
    we decided on reusing the Iris dataset we also used for the SQL Server section.
    Just like we did in the previous chapter, all the data processing, wrangling,
    and analysis we are doing in Spark happen on a dataframe. Assuming you worked
    through the examples in the previous SQL Server section, we are going to extract
    the Iris dataset from inside the SQL Server Master Instance and load it into a
    dataframe in Spark using the code of Listing [7-10](#480532_2_En_7_Chapter.xhtml#PC10).
    If you are unfamiliar with connecting to the SQL Server Master Instance through
    Spark, we suggest reading the last section of the previous chapter where we go
    into detail how you can make this scenario work.


    ```

    # Before we get started, let''s get the Iris data from the database/table we

    # created in the previous section

    df_Iris = spark.read.format("jdbc") \

    .option("url", "jdbc:sqlserver://master-0.master-svc;databaseName=InDBMl") \

    .option("dbtable", "dbo.Iris") \

    .option("user", "[username]") \

    .option("password", "[password]").load()

    Listing 7-10

    Reading data from the SQL Server Master Instance

    ```


    If we look at some of the contents of the `df_Iris` dataframe , using the `df_Iris.show(10)`
    command, we should see that all the Iris species characteristics, as well as the
    species itself, are present in the dataframe (Figure [7-8](#480532_2_En_7_Chapter.xhtml#Fig8)).


    ![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig8_HTML.jpg](images/480532_2_En_7_Chapter/480532_2_En_7_Fig8_HTML.jpg)


    Figure 7-8


    df_Iris dataframe top ten rows


    With our data inside a dataframe in Spark, we are almost ready to start to do
    some machine learning. First thing we need to handle though is the loading of
    a number of Spark ML libraries as shown in the code in Listing [7-11](#480532_2_En_7_Chapter.xhtml#PC11).


    ```

    # To perform machine learning tasks, we need to import a number of libraries

    # In this case we are going to perform classification

    from pyspark.ml.classification import *

    from pyspark.ml.evaluation import *

    from pyspark.ml.feature import *

    Listing 7-11

    Loading machine learning libraries

    ```


    In this case, since we are doing a so-called classification problem, we only need
    to import the `pyspark.ml.classification` libraries together with the libraries
    we need to perform some modification to the features (which is another name for
    the columns of our dataframe in this case) of the dataframe and evaluate our model
    performance.


    After the libraries are loaded, we are going to perform some modifications on
    our dataframe to make it suitable to work for our machine learning algorithm.
    Different machine learning algorithms have different requirements in terms of
    your data, for instance, some algorithms only work on numerical values as input,
    just like the classification algorithm we are using. The code of Listing [7-12](#480532_2_En_7_Chapter.xhtml#PC12)
    performs a number of tasks on our df_Iris dataframe.


    ```

    # We are going to combine all the features we need to predict the Iris species

    # into a single vector feature

    feature_cols = df_Iris.columns[:-1]

    assembler = VectorAssembler(inputCols=feature_cols, outputCol="features")

    df_Iris = assembler.transform(df_Iris)

    df_Iris = df_Iris.select("features", "Species")

    # Since we are going to perform logistic regression, we are going to convert

    # the string values inside species to a numerical value

    label_indexer = StringIndexer(inputCol="Species", outputCol="label").fit(df_Iris)

    df_Iris = label_indexer.transform(df_Iris)

    Listing 7-12

    Process the data so it is suitable for machine learning

    ```


    The first code section combines the different features inside a new column called
    “features.” All of these features are Iris species characteristics and they are
    combined into a single format called a vector (we will take a look at how this
    visually looks a bit further down in the book). The line `feature_cols = df_Iris.columns[:-1]`
    selects all the columns of the dataframe except the rightmost column which is
    the actual species of the Iris plant.


    In the second section, we are mapping the different Iris species to a numerical
    value. The algorithm we are going to use to predict the Iris species requires
    numerical input, which means we have to perform a conversion. This is not unusual
    in the realm of machine learning and data science. In many cases you have to convert
    a string value to a numerical value so the algorithm can work with it. After the
    conversion from string to numerical, we add a new column called “label” which
    contains the species in a numerical value.


    In the next step, we are only selecting the features and the label column from
    the `df_Iris` dataframe and return the top ten rows (code of Listing [7-13](#480532_2_En_7_Chapter.xhtml#PC13)
    results in Figure [7-9](#480532_2_En_7_Chapter.xhtml#Fig9)) to give you an idea
    how the data looks after the transformations we’ve performed in the previous code
    segment.


    ![../images/480532_2_En_7_Chapter/480532_2_En_7_Fig9_HTML.jpg](images/480532_2_En_7_Chapter/480532_2_En_7_Fig9_HTML.jpg)


    Figure 7-9


    modified df_Iris dataframe


    ```

    # We only need the feature column and the label column

    df_Iris = df_Iris.select("features", "label")

    df_Iris.show(10)

    Listing 7-13

    Only select the features and label dataframe columns

    ```


    As you can see from Figure [7-9](#480532_2_En_7_Chapter.xhtml#Fig9), all of the
    features (Petal_Length, Petal_Width, etc.) have been transformed inside a single
    vector inside a single column of our dataframe. The label column now returns a
    number for the species, 2.0 being Setosa, 1.0 virginica, and 0.0 versicolor.


    Now that we have our entire dataframe converted into a format that is workable
    for our machine learning classification algorithm, we can split our data into
    a training dataframe and a testing dataframe like we did in the previous section
    as well. The code of Listing [7-14](#480532_2_En_7_Chapter.xhtml#PC14) handles
    the split in which 80% of the data goes into the `Iris_train` dataframe and the
    remaining 20% in the `Iris_test` dataframe.


    ```

    # Split the dataset

    (Iris_train, Iris_test) = df_Iris.randomSplit([0.8, 0.2])

    Listing 7-14

    Split the dataframe into a training and testing dataframe

    ```'
