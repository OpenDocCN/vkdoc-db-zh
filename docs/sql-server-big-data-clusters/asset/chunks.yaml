    relational databases. Big Data platforms are able to process large volumes of
    data in a distributed manner by spreading the data across different machines (called
    nodes) that make up a cluster architecture. Using a technology like Hadoop, or
    as we will use in this book Spark, allows you to store and process data in any
    format. This means we can store huge CSV (comma-separated values) files, video
    files, Word documents, PDFs, or whatever we please without having to worry about
    complying to a predefined schema like we’d have to when storing data inside a
    relational database.'
  trans: '

    # 减少数据冗余与开发时间


    除了卸载数据，虚拟化数据而非集成数据的一个明显好处是它可能大幅减少数据冗余。因为数据虚拟化将数据保留在其原始源，因此数据不会持久化到目标位置。与传统的基于
    `ETL` 的暂存过程相比，这基本上将存储需求**减半**。


    **注意**


    我们“减半”的说法可能并不十分准确，因为你可能没有暂存完整的数据集（从而减少了节省空间），或者你可能使用了不同的数据类型（甚至可能进一步增加节省空间）。


    试想一下：你想要跟踪网站上每小时的页面请求数量，这些数据被记录到文本文件中。在传统环境中，你可能需要编写一个 `SQL Server Integration
    Services` (`SSIS`) 包来将文本文件加载到表中，然后在其上运行查询以对数据进行分组，最后存储或使用其结果。而在这种新的虚拟化方法中，你仍然会运行查询来对数据分组，但你会直接在原始文本文件上运行它，这样就节省了开发
    `SSIS` 包所需的时间，也节省了用于暂存日志数据的暂存表的存储空间——否则，这些数据会同时存在于文件中以及 `SQL Server` 的暂存表中。


    ## 综合数据平台环境


    `SQL Server 大数据集群`的一个重要用例是能够创建一个环境，以存储、管理和分析不同格式、类型和大小的数据。最显著的是，你可以同时在 `SQL Server`
    组件内存储关系型数据，以及在 `HDFS` 存储子系统内存储非关系型数据。使用 `大数据集群` 使你能够创建一个数据湖环境，满足你所有的数据需求，而无需承担管理、更新和配置构成数据湖的各个部分所带来的巨大复杂性。


    `大数据集群`从产品安装开始就完全负责你 `大数据集群` 的安装和管理。由于 `大数据集群` 作为一个独立的产品推出，并得到 `Microsoft` 的全面支持，这意味着
    `Microsoft` 将通过服务包和更新来处理构成 `大数据集群` 的所有技术的更新。


    那么，为什么你会对数据湖感兴趣呢？事实证明，许多组织都有大量以不同格式存储的数据。在许多情况下，很大一部分数据来自应用程序的使用，这些应用程序将其数据存储在像
    `SQL Server` 这样的关系型数据库中。通过使用关系型数据库，我们可以轻松地查询其中的数据，并将其用于各种用途，例如仪表板、`KPI`（关键绩效指标），甚至是用于预测未来销售的机器学习任务。


    关系型数据库必须遵循若干规则，其中最重要的规则之一是关系型数据库总是以 **写入时模式** 的方式存储数据。这意味着如果你想向关系型数据库插入数据，你必须确保该数据符合要写入到的表的结构。图
    1-4 说明了 **写入时模式**。


    例如，一个包含 `OrderID`、`OrderCustomer` 和 `OrderAmount` 列的表规定，你插入到该表的数据也需要包含相同的列。这意味着当你想在该表中写入新行时，你必须为插入操作定义一个
    `OrderID`、`OrderCustomer` 和 `OrderAmount` 才能成功。没有临时添加额外列的空间，并且在许多情况下，你插入的数据需要与表中指定的数据类型相同（例如，整数用于数字，字符串用于文本）。


    ```

    ../images/480532_2_En_1_Chapter/480532_2_En_1_Fig4_HTML.jpg

    ```


    图 1-4

    写入时模式


    在许多情况下，**写入时模式** 的方法是完全可行的。你确保所有数据都按照关系型数据库期望的方式进行格式化，并将所有数据存储在其中。但是，当你决定添加不一定具有固定模式的新数据集时，会发生什么？或者，你想处理体积非常大（数
    TB）的数据？在这些情况下，通常建议寻找另一种技术来存储和处理你的数据，因为关系型数据库在处理具有这些特征的数据时存在困难。


    像 `Hadoop` 和 `HDFS` 这样的解决方案就是为了解决关系型数据库的一些局限性而创建的。大数据平台能够以分布式方式处理海量数据，方法是将数据分散在组成集群架构的不同机器（称为节点）上。使用像
    `Hadoop` 这样的技术，或者如我们将在本书中使用的 `Spark`，可以让你以任何格式存储和处理数据。这意味着我们可以存储巨大的 `CSV`（逗号分隔值）文件、视频文件、`Word`
    文档、`PDF` 或任何我们想要的东西，而不必像将数据存储在关系型数据库中那样，担心是否符合预定义的模式。

    '
- fmt: '# 2. 大数据集群架构


    Apache 的 Spark 技术确保我们的数据被切分成更小的块，并存储在构成 Spark 集群的节点的文件系统上。我们只在准备读取和处理数据时才需要关心模式，这被称为`schema-on-read`。当我们加载
    CSV 文件以检查其内容时，必须定义它是什么类型的数据，对于 CSV 文件而言，还要定义数据的列是什么。在读取时指定这些细节为我们处理这些数据提供了极大的灵活性，因为我们可以添加或删除列或转换数据类型，而无需在写回数据前担心模式问题。由于像
    Spark 这样的技术具有分布式架构，我们可以非常快速地在大型数据集上执行所有这些数据操作和查询步骤，这一点我们将在第[2]章中更详细地解释。


    现实世界中你会看到，在许多情况下，组织既拥有关系数据库，又拥有 Hadoop/Spark 集群来存储和处理他们的数据。这些解决方案是彼此独立实施的，并且在许多情况下并不“互通”。数据是关系型的吗？把它存进数据库！是非关系型的，比如
    CSV、IoT 数据或其他格式？扔到 Hadoop/Spark 集群上！我们之所以对 SQL Server 大数据集群的发布感到如此兴奋，一个原因就是它将这两种解决方案结合到了一个产品中，这个产品同时包含了
    Spark 集群和 SQL Server 的功能。虽然你仍然需要选择是将某些数据直接存储在 SQL Server 数据库中还是存储在 HDFS 文件系统上，但你总是可以从这两种技术中访问它！想要将关系数据与存储在
    HDFS 上的 CSV 文件结合起来？没问题，使用本章前面描述的数据虚拟化，你可以从 HDFS 读取 CSV 文件的内容，并使用 T-SQL 查询将其与关系数据合并，产生一个单一的结果集！


    从这个意义上说，SQL Server 大数据集群由非常互补的技术组成，使你能够弥合因数据存储方式不同而在数据处理上受到的限制。大数据集群最终让你能够创建一个可扩展且灵活的数据湖环境，在其中你可以存储和处理任何格式、形状或大小的数据，甚至允许你在使用
    SQL Server 或 Spark 处理数据之间进行选择，根据你想要执行的任务选择你更偏好的那个。


    大数据集群架构还能够优化数据分析方面的性能。将所有你需要的数据存储在一个集群中，无论是否是关系型数据，都意味着你可以在需要时立即访问它。你避免了跨不同系统或网络的数据移动，这在一个我们不断尝试寻找更快分析数据的解决方案的世界里是一个巨大的优势。


    如果你问我们 SQL Server 大数据集群的终极优势是什么，我们坚信是在单一解决方案中存储、处理和分析任何形状、大小或类型数据的能力。


    ## 集中化 AI 平台


    正如我们在前一节所述，SQL Server 大数据集群允许你创建一个可以处理所有类型和格式数据的数据湖环境。除了在处理方面具有巨大优势外，它自然在处理高级分析（如机器学习）方面也具有巨大优势。由于你所有的数据本质上都存储在一个地方，你可以在大数据集群上对所有可用数据执行机器学习模型训练等任务，而不必从组织内的多个系统收集数据。


    通过结合 SQL Server 和 Spark，我们在处理机器学习时也有多种选择。我们可以选择通过 Spark 直接在存储于 HDFS 文件系统上的数据上训练和评分机器学习模型，或者使用通过
    SQL Server 可用的内置机器学习服务。这两种选项都提供了广泛的语言和库供你或你的数据科学团队使用，例如，对于 SQL Server 机器学习服务可以使用
    R、Python 和 Java，而对于通过 Spark 集群运行机器学习工作负载则可以使用 PySpark 和 Scala。


    在用例方面，大数据集群几乎可以处理任何机器学习流程，从处理实时评分到结合 TensorFlow 使用 GPU 来优化处理 CPU 密集型工作负载，或者例如执行图像分类任务。


    脚注 [1]


    ## 物理大数据集群基础设施


    大数据集群的物理基础设施由容器组成，在这些容器上部署了主要的软件组件。这些主要组件是 Linux 上的 SQL Server、Apache Spark 和
    HDFS 文件系统。以下是对这些基础设施元素的介绍，从容器开始，依次介绍其他部分，为你提供这些组件如何协同工作的全景图。'
  raw: 'Apache’s Spark technology makes sure our data is cut up into smaller blocks
    and stored on the filesystem of the nodes that make up a Spark cluster. We only
    have to worry about the schema when we are going to read in and process the data,
    something that is called *schema-on-read* . When we load in our CSV file to check
    its contents, we have to define what type of data it is and, in the case of a
    CSV file, what the columns are of the data. Specifying these details on read allows
    us a lot of flexibility when dealing with this data, since we can add or remove
    columns or transform datatypes without having to worry about a schema before we
    write the data back again. Because a technology like Spark has a distributed architecture,
    we can perform all these data manipulation and querying steps very quickly on
    large datasets, something we are explaining in more detail in Chapter [2](#480532_2_En_2_Chapter.xhtml).


    What you see in the real world is that in many situations organizations have both
    relational databases and a Hadoop/Spark cluster to store and process their data.
    These solutions are implemented separately from each other and, in many cases,
    do not “talk” to each other. Is the data relational? Store it in the database!
    Is it nonrelational like CSV, IoT data, or other formats? Throw it on the Hadoop/Spark
    cluster! One reason why we are so excited over the release of SQL Server Big Data
    Clusters is that it combines both these solutions into a single product, a product
    that contains both the capabilities of a Spark cluster together with SQL Server.
    And while you still must choose whether you are going to store something directly
    in the SQL Server database or store it on the HDFS filesystem, you can always
    access it from both technologies! Want to combine relational data with a CSV file
    that is stored on HDFS? No problem, using data virtualization we described earlier
    in this chapter, you can read the contents from the CSV file from HDFS and merge
    it with your relational data using a T-SQL query producing a single result!


    In this sense, SQL Server Big Data Clusters are made up from technologies that
    complement each other very well, allowing you to bridge the gap on how limited
    you are in processing data based on the manner in which it is stored. Big Data
    Clusters ultimately let you create a scalable and flexible data lake environment
    in which you can store and process data in any format, shape, or size, even allowing
    you to choose between processing the data using SQL Server or Spark, whichever
    you prefer for the tasks you want to perform.


    The Big Data Cluster architecture will also be able to optimize performance in
    terms of data analytics. Having all data you require stored inside a single cluster,
    whether it is relational or not, means that you can access it immediately whenever
    you require it. You avoid data movement across different systems or networks,
    which is a huge advantage in a world where we are constantly trying to find solutions
    to analyze data faster and faster.


    If you ask us what the ultimate advantage of SQL Server Big Data Clusters is,
    we firmly believe it is the ability to store, process, and analyze data in any
    shape, size, or type inside a single solution.


    ## Centralized AI Platform


    As we described in the preceding section, SQL Server Big Data Clusters allow you
    to create a data lake environment that can handle all types and formats of data.
    Next to having huge advantages when processing, it naturally also has immense
    advantages when dealing with advanced analytics like machine learning. Since all
    your data is essentially stored in one place, you can perform tasks like machine
    learning model training on all the data that is available on the Big Data Cluster,
    instead of having to gather data from multiple systems across your organization.


    By combining SQL Server and Spark, we also have multiple options available when
    working with machine learning. We can choose to train and score machine learning
    models through Spark directly by accessing data that is stored on the HDFS filesystem,
    or use the In-Database Machine Learning Services available to us through SQL Server.
    Both these options allow a wide variety in languages and libraries you, or your
    data science team, can use, for instance, R, Python, and Java for SQL Server Machine
    Learning Services, or PySpark and Scala when running your machine learning workload
    through the Spark cluster.


    In terms of use cases, Big Data Clusters can handle just about any machine learning
    process , from handling real-time scoring to using GPUs in combination with TensorFlow
    to optimize the handling of CPU-intensive workloads or, for instance, perform
    image classification tasks.


    Footnotes [1](#480532_2_En_1_Chapter.xhtml#Fn1_source)


    # 2. Big Data Cluster Architecture


    SQL Server Big Data Clusters are made up from a variety of technologies all working
    together to create a centralized, distributed data environment. In this chapter,
    we are going to look at the various technologies that make up Big Data Clusters
    through two different views.


    First, we are evaluating the more-or-less physical architecture of Big Data Clusters.
    We are going to explore the use of containers, the Linux operating system, Spark,
    and the HDFS storage subsystem that make up the storage layer of Big Data Clusters.


    In the second part of this chapter, we are going to look at the logical architecture
    which is made up of four different logical areas. These areas combine several
    technologies to provide a specific function, or role(s), inside the Big Data Cluster.


    ## Physical Big Data Cluster Infrastructure


    The physical infrastructure of Big Data Clusters is made up from containers on
    which you deploy the major software components. These major components are SQL
    Server on Linux, Apache Spark, and the HDFS filesystem. The following is an introduction
    to these infrastructure elements, beginning with containers and moving through
    the others to provide you with the big picture of how the components fit together.'
