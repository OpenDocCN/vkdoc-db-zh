- fmt: '# YAML 参数配置与应用部署


    ## 1. 理解关键参数

    YAML 文件中比较有趣的参数是 `replicas` 和 `poolsize`。这些是我们可以配置以实现应用副本和伸缩的参数。`replicas` 参数的输入值决定了应为应用部署多少个
    Pod，而 `poolsize` 则配置了一个 Pod 内应存在多少个应用实例。您的应用能够执行的并行操作数量是 `replicas x poolsize`
    的计算结果。例如，将 `replicas` 配置为 4，`poolsize` 设置为 2，将使您的应用能够处理 8 个并行请求。在我们的 `spec.yaml`
    中，我们将这两个设置都配置为 1，意味着我们一次只能处理一个请求。


    ## 2. 部署前的准备

    所有应用部署所需的文件都已准备就绪并存储在一个文件夹中，我们已经可以将应用部署到大数据集群。如前所述，我们使用 `azdata` 程序来执行部署。


    在连接到大数据集群之前，我们需要获取 `controller-svc-external` 服务的外部 IP。为此，您可以运行以下命令：`kubectl get
    svc controller-svc-external -n [clustername]`，其中 `[clustername]` 是您的集群名称。如果您使用
    AKS 托管大数据集群，则需要先使用 `az` 命令登录到 Azure。


    ## 3. 连接到管理服务

    现在我们有了管理服务的 IP 和端口号，需要使用管理员用户名和密码通过 `azdata` 连接到它。您在部署大数据集群时提供了这两者。下面的代码（清单 8-5）用于建立到大数据集群的连接。请务必将
    `[ ]` 之间的变量替换为您的集群对应的值。


    ```

    azdata login –-controller-endpoint https://[IP address]:30080 –-controller-username
    [username]

    ```

    *清单 8-5：登录到控制器端点*


    系统会要求您输入管理员用户的密码。如果一切顺利，您应该会收到一条成功登录的消息。


    ## 4. 部署应用程序

    现在我们通过 `azdata` 连接到了大数据集群，可以部署我们的应用程序了。为此，我们可以使用清单 8-6 所示的代码。请务必将 `[directory
    path]` 更改为存放您的应用程序文件（如 `spec.yaml`）的目录路径。


    ```

    azdata app create --spec [directory path]

    ```

    *清单 8-6：部署大数据集群应用*


    在我们的例子中，我们调用了以下命令（清单 8-7）。


    ```

    azdata app create --spec /Users/enricovandelaar/Documents/BDC.

    ```

    *清单 8-7：部署我们的大数据集群应用*


    运行上述命令时，会发生一系列验证，以检查 `spec.yaml` 文件是否存在以及输入是否正确。如果一切正确，您应该会收到如图 8-2 所示的消息。


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig2_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig2_HTML.jpg)

    *图 8-2：大数据集群应用已创建*


    ## 5. 检查应用状态

    即使您收到应用已成功创建的消息，它也不会立即可用。创建应用后，通常需要大约一分钟才能实际运行您的应用程序。如果您想了解应用创建的状态，可以运行清单 8-8
    中的命令。


    ```

    azdata app list -n predictiris

    ```

    *清单 8-8：通过 `azdata` 检索应用状态*


    这将返回应用部署的当前状态，如图 8-3 所示。


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig3_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig3_HTML.jpg)

    *图 8-3：应用创建状态*


    大约一分钟后，我们再次运行该命令，收到了“就绪”状态（如图 8-4 所示），这意味着我们可以继续下一步来测试我们的应用。


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig4_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig4_HTML.jpg)

    *图 8-4：应用部署完成，应用处于就绪状态*


    ## 6. 测试应用功能

    当应用处于“就绪”状态时，我们可以通过 `azdata` 程序测试其功能。如果我们定义了任何参数，则需要在调用应用时提供它们，同时提供我们在 `spec.yaml`
    文件中提供的应用名称和版本。清单 8-9 中的命令调用我们的 `predictiris` 应用，并附带了一些我们在 R 脚本和 YAML 文件中定义的输入参数。


    ```

    azdata app run -n predictiris -v v1 --inputs PetalLength=1.4,PetalWidth=0.2,SepalLength=5.1,SepalWidth=3.5

    ```

    *清单 8-9：通过 `azdata` 运行应用*


    如果一切顺利完成，我们应该会得到图 8-5 所示的 JSON 格式结果。


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig5_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig5_HTML.jpg)

    *图 8-5：应用预测结果*


    由于我们从 R 脚本文件中返回的输出位于一个数据框中，因此输出会自动转换为 JSON 数组。在 `predictiris` 应用的例子中，预测返回三个输出参数，其中包含每种可能的鸢尾花物种的概率。在这种情况下，考虑到我们提供的输入参数值，`virginica`
    物种似乎是最可能的，其确定性为 0.97 或 97%。


    当您的应用出现问题时，在大多数情况下，您可以在返回的 JSON 的 “errorMessage” 或 “consoleOutput” 部分看到错误。在我们的例子中，应用成功执行，我们没有遇到任何错误。


    ## 7. 后续使用

    现在我们的应用已经部署并测试完毕，我们可以继续使用 `azdata` 方法来按需或以编程方式调用该应用。另一种执行应用的方法（我认为更加优雅）是通过部署应用时自动创建的
    REST API。'
  raw: 'The more interesting parameters of the YAML file are the `replicas` and `poolsize`
    parameters . These are the parameters we can configure to replicate and scale
    our app. The input of the `replicas` parameter dictates how many pods should be
    deployed for the application and the `poolsize` configures how many occurrences
    of the app should be present inside a pod. The number of parallel operations your
    app is able to perform is the product of the calculation *replicas x poolsize*
    . For instance, having `replicas` configured to a value of 4 and the `poolsize`
    set to 2 will result in your app being able to handle 8 parallel requests. In
    our `spec.yaml,` we configured both these settings to be 1, meaning we will be
    able to handle one single request at a time.


    With all the files we require for our app deployment ready and stored inside a
    single folder, we are ready to deploy the app to the Big Data Cluster. As we mentioned
    earlier, we are using the `azdata` program to perform the deployment.


    Before we can connect to the Big Data Cluster, we need to retrieve the external
    IP of the `controller-svc-external` service . To do that, you can run the following
    command: `kubectl get svc controller-svc-external -n [clustername]`, where `[clustername]`
    is the name of your cluster. If you are using AKS to host your Big Data Cluster,
    you will first need to log on to Azure using the `az login` command.


    Now that we have the IP and port number of the management service, we need to
    connect to it through azdata using our admin username and password. You supplied
    both of these during the deployment of your Big Data Clusters. The code of Listing
    [8-5](#480532_2_En_8_Chapter.xhtml#PC5) sets up a connection to your Big Data
    Cluster. Make sure to change the variables between [ ] to the values you have
    for your cluster.


    ```

    azdata login –-controller-endpoint https://[IP address]:30080 –-controller-username
    [username]

    Listing 8-5

    Login to the controller endpoint

    ```


    You will be asked to enter the password of the admin user. If everything went
    well, you should get a logged in successfully message.


    Now that we are connected through azdata to our Big Data Cluster, we can deploy
    our application. To do that, we can use the code shown in Listing [8-6](#480532_2_En_8_Chapter.xhtml#PC6).
    Make sure to change the `[directory path]` to the path of the directory that holds
    your application files like the spec.yaml.


    ```

    azdata app create --spec [directory path]

    Listing 8-6

    Deploy Big Data Cluster app

    ```


    In our case we called the following command (Listing [8-7](#480532_2_En_8_Chapter.xhtml#PC7)).


    ```

    azdata app create --spec /Users/enricovandelaar/Documents/BDC.

    Listing 8-7

    Deploying our Big Data Cluster app

    ```


    When running the preceding command, a number of validations will occur to check
    if the spec.yaml file is present and the input is correct. If everything is correct,
    you should receive the message shown in Figure [8-2](#480532_2_En_8_Chapter.xhtml#Fig2).


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig2_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Big Data Cluster app created


    Even though you receive a message that the app was created successfully, it isn’t
    directly available. It usually takes around a minute before you can actually run
    your application after you create it. If you want to know the status of application
    creation, you can run the command in Listing [8-8](#480532_2_En_8_Chapter.xhtml#PC8).


    ```

    azdata app list -n predictiris

    Listing 8-8

    Retrieving App status through azdata

    ```


    This returns the current status of the app deployment as shown in Figure [8-3](#480532_2_En_8_Chapter.xhtml#Fig3).


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig3_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig3_HTML.jpg)


    Figure 8-3


    App creation status


    After a minute or so, we ran the command again and received a state of “Ready,”
    shown in Figure [8-4](#480532_2_En_8_Chapter.xhtml#Fig4), meaning we can continue
    with the next step to test our app.


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig4_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig4_HTML.jpg)


    Figure 8-4


    App deployment completed and app is in the ready state


    When the app is in the “Ready” state, we can test it’s functionality through the
    azdata program. If we defined any parameters, we need to supply them when calling
    the app, together with the name and version of the app which we supplied in the
    spec.yaml file. The command in Listing [8-9](#480532_2_En_8_Chapter.xhtml#PC9)
    calls our predictiris app together with a number of input parameters which we
    defined in the R script and YAML file.


    ```

    azdata app run -n predictiris -v v1 --inputs PetalLength=1.4,PetalWidth=0.2,SepalLength=5.1,SepalWidth=3.5

    Listing 8-9

    Run the app through azdata

    ```


    If everything completed successfully, we should get the results, in a JSON format,
    shown in Figure [8-5](#480532_2_En_8_Chapter.xhtml#Fig5).


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig5_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig5_HTML.jpg)


    Figure 8-5


    App prediction results


    Since we are returning the output from the R script file inside a dataframe, the
    output is automatically converted to a JSON array. The prediction in the case
    of the predictiris app returns three output parameters which contain the probability
    for each possible Iris species. In this case, the virginica species seems to be
    the most likely giving the values of the input parameters we supplied with a certainty
    of 0.97 or 97%.


    Whenever there is an issue with your app, you can in most cases see the error
    inside the “errorMessage” or “consoleOutput” sections of the returned JSON. In
    our case the app was executed successfully and we didn’t run into any errors.


    Now that we have our app deployed and tested, we can keep using the azdata method
    to call the app programmatically or on demand whenever we need to. Another method
    to execute the app, which I find far more elegantly, is through the REST API that
    is automatically created when we deploy our app.'
  trans: '

    # YAML 参数配置与应用部署


    ## 1. 理解关键参数

    YAML 文件中比较有趣的参数是 `replicas` 和 `poolsize`。这些是我们可以配置以实现应用副本和伸缩的参数。`replicas` 参数的输入值决定了应为应用部署多少个
    Pod，而 `poolsize` 则配置了一个 Pod 内应存在多少个应用实例。您的应用能够执行的并行操作数量是 `replicas x poolsize`
    的计算结果。例如，将 `replicas` 配置为 4，`poolsize` 设置为 2，将使您的应用能够处理 8 个并行请求。在我们的 `spec.yaml`
    中，我们将这两个设置都配置为 1，意味着我们一次只能处理一个请求。


    ## 2. 部署前的准备

    所有应用部署所需的文件都已准备就绪并存储在一个文件夹中，我们已经可以将应用部署到大数据集群。如前所述，我们使用 `azdata` 程序来执行部署。


    在连接到大数据集群之前，我们需要获取 `controller-svc-external` 服务的外部 IP。为此，您可以运行以下命令：`kubectl get
    svc controller-svc-external -n [clustername]`，其中 `[clustername]` 是您的集群名称。如果您使用
    AKS 托管大数据集群，则需要先使用 `az` 命令登录到 Azure。


    ## 3. 连接到管理服务

    现在我们有了管理服务的 IP 和端口号，需要使用管理员用户名和密码通过 `azdata` 连接到它。您在部署大数据集群时提供了这两者。下面的代码（清单 8-5）用于建立到大数据集群的连接。请务必将
    `[ ]` 之间的变量替换为您的集群对应的值。


    ```

    azdata login –-controller-endpoint https://[IP address]:30080 –-controller-username
    [username]

    ```

    *清单 8-5：登录到控制器端点*


    系统会要求您输入管理员用户的密码。如果一切顺利，您应该会收到一条成功登录的消息。


    ## 4. 部署应用程序

    现在我们通过 `azdata` 连接到了大数据集群，可以部署我们的应用程序了。为此，我们可以使用清单 8-6 所示的代码。请务必将 `[directory
    path]` 更改为存放您的应用程序文件（如 `spec.yaml`）的目录路径。


    ```

    azdata app create --spec [directory path]

    ```

    *清单 8-6：部署大数据集群应用*


    在我们的例子中，我们调用了以下命令（清单 8-7）。


    ```

    azdata app create --spec /Users/enricovandelaar/Documents/BDC.

    ```

    *清单 8-7：部署我们的大数据集群应用*


    运行上述命令时，会发生一系列验证，以检查 `spec.yaml` 文件是否存在以及输入是否正确。如果一切正确，您应该会收到如图 8-2 所示的消息。


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig2_HTML.jpg](img/480532_2_En_8_Fig2_HTML.jpg)

    *图 8-2：大数据集群应用已创建*


    ## 5. 检查应用状态

    即使您收到应用已成功创建的消息，它也不会立即可用。创建应用后，通常需要大约一分钟才能实际运行您的应用程序。如果您想了解应用创建的状态，可以运行清单 8-8
    中的命令。


    ```

    azdata app list -n predictiris

    ```

    *清单 8-8：通过 `azdata` 检索应用状态*


    这将返回应用部署的当前状态，如图 8-3 所示。


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig3_HTML.jpg](img/480532_2_En_8_Fig3_HTML.jpg)

    *图 8-3：应用创建状态*


    大约一分钟后，我们再次运行该命令，收到了“就绪”状态（如图 8-4 所示），这意味着我们可以继续下一步来测试我们的应用。


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig4_HTML.jpg](img/480532_2_En_8_Fig4_HTML.jpg)

    *图 8-4：应用部署完成，应用处于就绪状态*


    ## 6. 测试应用功能

    当应用处于“就绪”状态时，我们可以通过 `azdata` 程序测试其功能。如果我们定义了任何参数，则需要在调用应用时提供它们，同时提供我们在 `spec.yaml`
    文件中提供的应用名称和版本。清单 8-9 中的命令调用我们的 `predictiris` 应用，并附带了一些我们在 R 脚本和 YAML 文件中定义的输入参数。


    ```

    azdata app run -n predictiris -v v1 --inputs PetalLength=1.4,PetalWidth=0.2,SepalLength=5.1,SepalWidth=3.5

    ```

    *清单 8-9：通过 `azdata` 运行应用*


    如果一切顺利完成，我们应该会得到图 8-5 所示的 JSON 格式结果。


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig5_HTML.jpg](img/480532_2_En_8_Fig5_HTML.jpg)

    *图 8-5：应用预测结果*


    由于我们从 R 脚本文件中返回的输出位于一个数据框中，因此输出会自动转换为 JSON 数组。在 `predictiris` 应用的例子中，预测返回三个输出参数，其中包含每种可能的鸢尾花物种的概率。在这种情况下，考虑到我们提供的输入参数值，`virginica`
    物种似乎是最可能的，其确定性为 0.97 或 97%。


    当您的应用出现问题时，在大多数情况下，您可以在返回的 JSON 的 “errorMessage” 或 “consoleOutput” 部分看到错误。在我们的例子中，应用成功执行，我们没有遇到任何错误。


    ## 7. 后续使用

    现在我们的应用已经部署并测试完毕，我们可以继续使用 `azdata` 方法来按需或以编程方式调用该应用。另一种执行应用的方法（我认为更加优雅）是通过部署应用时自动创建的
    REST API。

    '
- fmt: '## Consume Big Data Cluster Apps Through REST API


    When we deploy our app, a dedicated container is created that holds our app and
    all additional files we supplied through the application folder. During the deployment,
    a RESTful web service is also created inside the container as an additional method
    to call the app. RESTful APIs use HTTP requests to perform tasks. In our case,
    we can use the REST API to call the app we created and return the outputs inside
    a JSON message. This can be very useful in situations where you create apps on
    your Big Data Cluster that you want to directly access from, for instance, your
    applications. Since all the code, and the data, resides on the Big Data Cluster,
    your application only needs to be able to send REST API calls and process the
    return messages returning data immediately into your application.


    To make use of the REST API for our app, we need to perform a number of steps.
    The most important one being that we need to generate a token to securely call
    the REST API. A number of these steps need to be performed through a tool that
    can send REST API calls and process their results. In our case we used Postman
    ([`www.getpostman.com/`](http://www.getpostman.com/)) as the tool of our choice.


    The first thing we need to do before we are able to connect to the REST API that
    belongs to our app is to generate a so-called “bearer token”. Only by supplying
    this token in our REST API call can we access the app.


    To generate a bearer token, we need to connect to the token URL. You can find
    the URL and port number you need to connect to by running the command in Listing
    8-10.


    ```

    azdata app describe --name predictiris -v v1

    ```


    Listing 8-10

    Retrieve app URL and port number through `azdata`


    Running the preceding command returns information about your app, in our case
    the `predictiris` app which is shown in Figure 8-6. The line we are after is returned
    in the “links” section and is the URL and port number of the “swagger” property.


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig6_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig6_HTML.jpg)


    Figure 8-6

    Output of the `app describe` command for the `predictiris` app


    Copy the URL and port number, or write them down, for now and start Postman (or
    any other REST API call app you prefer). When Postman is started, we must change
    a setting to avoid an error. Since the Big Data Cluster is configuring self-signed
    certificates on its endpoint, we can potentially run into a security issue when
    we perform the REST API calls later on. Inside Postman you can find the SSL certificate
    verification inside the Preferences menu item as shown in Figure 8-7. Make sure
    to disable this setting before performing the REST API calls to your Big Data
    Cluster.


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig7_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig7_HTML.jpg)


    Figure 8-7

    Request options inside Postman


    With the setting disabled, you can open a new tab inside Postman. Paste or enter
    the URL and port string we received from the `app describe` command into the request
    URL field and expand the URL with `/api/v1/token` and change the method to POST.
    Finally open the Authorization tab, change the Type to “Basic Auth,” and enter
    your Big Data Cluster administrator username and password in the correct fields.
    Figure 8-8 shows a screenshot of Postman with all these items filled in for our
    Big Data Cluster and app URL.


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig8_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig8_HTML.jpg)


    Figure 8-8

    Postman setting to generate the bearer token


    With everything configured in Postman, click the Send button to send the request
    to the URL. If everything processed correctly, you should receive a return message
    that contains the bearer token inside the `access_token` property of the JSON
    response as shown in Figure 8-9 (we’ve removed the contents of the `access_token`
    and `token_id` properties in Figure 8-9).


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig9_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig9_HTML.jpg)


    Figure 8-9

    JSON return message that contains the bearer token


    Now that we generated a bearer token, we can use it to actually call the REST
    API of the app itself. The URL of the app REST API is hidden by default and can
    be found in the `swagger.json` file which we can open by visiting the URL inside
    the “swagger” property that we received when running the `azdata app describe
    --name predictiris -v v1` command.


    When you open the URL (in our case `https://104.46.56.134:30080/docs/swagger.json`),
    you can find a property in the JSON file called “host” as shown in Figure 8-10.


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig10_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig10_HTML.jpg)


    Figure 8-10

    Host property of the `swagger.json` file


    Copy or write down the value of the “host” property and start a new session inside
    Postman. Change the request method to “POST” and copy the contents of the “host”
    property inside the request URL field preceding it with `HTTPS://`. After the
    port number of the URL, we can copy the contents of the “basePath” property shown
    in Figure 8-10 and, as a last step to make the URL complete, add a `/run`.


    Go to the Authorization tab and this time select the option “Bearer Token” and
    add the token we received in the previous step inside the token field.


    We now have one step left, generate the body content of our REST API call and
    supply the input parameters needed to perform the Iris species prediction. Inside
    Postman, click the Body tab, check the option “raw,” and from the drop-down button,
    select “JSON (application/json).” Copy the contents of the code section in Listing
    8-11 inside the body textarea to supply the input parameters needed for the `predictiris`
    app.


    ```

    {

    "PetalLength": 1.4,

    "PetalWidth": 0.2,

    "SepalLength": 5.1,

    "SepalWidth": 3.5

    }

    ```


    Listing 8-11

    Input parameters for `predictiris` app (JSON)


    With all of these areas filled in, the Postman screen should look like Figure
    8-11.


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig11_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig11_HTML.jpg)


    Figure 8-11

    Body of the REST API call to the `predictiris` app


    Now all that is left to do is to click the “Send” button to send the JSON message
    to the `predictiris` Big Data Cluster app.


    If everything was configured correctly, we should receive a return message that
    resembles the same output as when we executed the `predictiris` app using `azdata`
    containing the predicted probabilities for each species of Iris plant. The return
    message we received can be seen in Figure 8-12.


    ![../images/480532_2_En_8_Chapter/480532_2_En_8_Fig12_HTML.jpg](images/480532_2_En_8_Chapter/480532_2_En_8_Fig12_HTML.jpg)


    Figure 8-12

    REST API response body with the probabilities of each Iris plant species'
