    和 `control.json`。这将基于默认值，因此我们需要对配置进行一些更改。这可以使用任何文本编辑器完成，也可以再次使用 `azdata` 的 `config
    replace` 选项完成，如清单 3-15 所示，我们用它来修改 `bdc.json` 文件中的大数据集群名称。


    ```

    azdata bdc config replace -c myfirstbigdatacluster/bdc.json -j metadata.name=myfirstbigdatacluster

    ```

    *清单 3-15*

    使用 `azdata` 修改集群配置


