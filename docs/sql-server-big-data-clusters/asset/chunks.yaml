- fmt: '## What Is azdata?


    As mentioned before, no matter which path of deployment you choose, the deployment
    of your Big Data Cluster will always be controlled through a tool called `azdata`.
    It’s a command-line tool that will help you to create a Big Data Cluster configuration,
    deploy your Big Data Cluster, and later potentially delete or upgrade your existing
    cluster.


    The logical first step (which is somehow happening behind the scenes in the previous
    scripts) is to create a configuration as shown in Listing 3-14.


    ```

    azdata bdc config init [--target -t] [--src -s]

    ```

    *Listing 3-14*

    Create cluster config using `azdata`


    `Target` is just the folder name for your config files (`bdc.json` and `control.json`).
    The `src` is one of the existing base templates to start with.


    Possible values are (at the time of writing)

    *   `aks-dev-test`

    *   `aks-dev-test-ha`

    *   `kubeadm-dev-test`

    *   `kubeadm-prod`


    These match the options that you saw when deploying in Azure Data Studio. You
    can always get all valid options by running `azdata bdc config init -t <yourtarget>`
    without specifying a source. Keep in mind that these are just templates. If your
    preferred environment is not offered as a choice, this doesn’t necessarily imply
    that it’s not supported, just that you will need to make some adjustments to an
    existing template to make it match your target. The output is shown in Figure
    3-37.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig37_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig37_HTML.jpg)

    *Figure 3-37*

    Output of `azdata bdc config init` without specifying a source


    The source to choose will depend on your deployment type.


    Running `azdata bdc config init` results in two `.JSON` files – `bdc.json` and
    `control.json` – to be created in a subfolder which is named after your `target`.
    This will be based on defaults, so we need to make some changes to the configuration.
    This can be done either using any text editor or using `azdata` again using the
    `config replace` option, as shown in Listing 3-15, where we use it to modify the
    name of the Big Data Cluster in the `bdc.json` file.


    ```

    azdata bdc config replace -c myfirstbigdatacluster/bdc.json -j metadata.name=myfirstbigdatacluster

    ```

    *Listing 3-15*

    Modify cluster config using `azdata`


    The `control` file defines more general settings like which version, repository,
    and so on you want to use, whereas the `bdc` file configures the actual setup
    of your Big Data Cluster environment like the number of replicas per role and
    so on, as shown in Listings 3-16 and 3-17.


    ```

    {

    "apiVersion": "v1",

    "metadata": {

    "kind": "Cluster",

    "name": "mssql-cluster"

    },

    "spec": {

    "docker": {

    "registry": "mcr.microsoft.com",

    "repository": "mssql/bdc",

    "imageTag": "2019-CU2-ubuntu-16.04",

    "imagePullPolicy": "Always"

    },

    "storage": {

    "data": {

    "className": "",

    "accessMode": "ReadWriteOnce",

    "size": "15Gi"

    },

    "logs": {

    "className": "",

    "accessMode": "ReadWriteOnce",

    "size": "10Gi"

    }

    },

    "endpoints": [

    {

    "name": "Controller",

    "dnsName": "",

    "serviceType": "NodePort",

    "port": 30080

    },

    {

    "name": "ServiceProxy",

    "dnsName": "",

    "serviceType": "NodePort",

    "port": 30777

    }

    ],

    "settings": {

    "controller": {

    "logs.rotation.size": "5000",

    "logs.rotation.days": "7"

    }

    }

    },

    "security": {

    "activeDirectory": {

    "ouDistinguishedName": "",

    "dnsIpAddresses": [],

    "domainControllerFullyQualifiedDns": [],

    "domainDnsName": "",

    "clusterAdmins": [],

    "clusterUsers": []

    }

    }

    }

    ```

    *Listing 3-16*

    Sample `control.json`


    ```

    {

    "apiVersion": "v1",

    "metadata": {

    "kind": "BigDataCluster",

    "name": "mssql-cluster"

    },

    "spec": {

    "resources": {

    "nmnode-0": {

    "spec": {

    "replicas": 2

    }

    },

    "sparkhead": {

    "spec": {

    "replicas": 2

    }

    },

    "zookeeper": {

    "spec": {

    "replicas": 3

    }

    },

    "gateway": {

    "spec": {

    "replicas": 1,

    "endpoints": [

    {

    "name": "Knox",

    "dnsName": "",

    "serviceType": "NodePort",

    "port": 30443

    }

    ]

    }

    },

    "appproxy": {

    "spec": {

    "replicas": 1,

    "endpoints": [

    {

    "name": "AppServiceProxy",

    "dnsName": "",

    "serviceType": "NodePort",

    "port": 30778

    }

    ]

    }

    },

    "master": {

    "metadata": {

    "kind": "Pool",

    "name": "default"

    },

    "spec": {

    "type": "Master",

    "replicas": 3,

    "endpoints": [

    {

    "name": "Master",

    "dnsName": "",

    "serviceType": "NodePort",

    "port": 31433

    },

    {

    "name": "MasterSecondary",

    "dnsName": "",

    "serviceType": "NodePort",

    "port": 31436

    }

    ],

    "settings": {

    "sql": {

    "hadr.enabled": "true"

    }

    }

    }

    },

    "compute-0": {

    "metadata": {

    "kind": "Pool",

    "name": "default"

    },

    "spec": {

    "type": "Compute",

    "replicas": 1

    }

    },

    "data-0": {

    "metadata": {

    "kind": "Pool",

    "name": "default"

    },

    "spec": {

    "type": "Data",

    "replicas": 2

    }

    },

    "storage-0": {

    "metadata": {

    "kind": "Pool",

    "name": "default"

    },

    "spec": {

    "type": "Storage",

    "replicas": 3,

    "settings": {

    "spark": {

    "includeSpark": "true"

    }

    }

    }

    }

    },

    "services": {

    "sql": {

    "resources": [

    "master",

    "compute-0",

    "data-0",

    "storage-0"

    ]

    },

    "hdfs": {

    "resources": [

    "nmnode-0",

    "zookeeper",

    "storage-0",

    "sparkhead"

    ],

    "settings": {

    "hdfs-site.dfs.replication": "3"

    }

    },

    "spark": {

    "resources": [

    "sparkhead",

    "storage-0"

    ],

    "settings": {

    "spark-defaults-conf.spark.driver.memory": "2g",

    "spark-defaults-conf.spark.driver.cores": "1",

    "spark-defaults-conf.spark.executor.instances": "3",

    "spark-defaults-conf.spark.executor.memory": "1536m",

    "spark-defaults-conf.spark.executor.cores": "1",

    "yarn-site.yarn.nodemanager.resource.memory-mb": "18432",

    "yarn-site.yarn.nodemanager.resource.cpu-vcores": "6",

    "yarn-site.yarn.scheduler.maximum-allocation-mb": "18432",

    "yarn-site.yarn.scheduler.maximum-allocation-vcores": "6",

    "yarn-site.yarn.scheduler.capacity.maximum-am-resource-percent": "0.3"

    }

    }

    }

    }

    }

    ```

    *Listing 3-17*

    Sample `bdc.json`


    As you can see, the file allows you to change quite a lot of settings. While you
    may leave many of them at their default, this comes in quite handy, especially
    in terms of storage. You can change the disk sizes as well as the storage type.
    For more information on storage in Kubernetes, we recommend reading [`https://kubernetes.io/docs/concepts/storage/`](https://kubernetes.io/docs/concepts/storage/).


    All deployments use persistent storage by default. Unless you have a good reason
    to change that, you should keep it that way as nonpersistent storage can leave
    your cluster in a nonfunctioning state in case of restarts, for example.


    Run the following command (Listing 3-18) in a command prompt where you’ve set
    the environment variables before.


    ```

    azdata bdc create -c myfirstbigdatacluster --accept-eula yes

    ```

    *Listing 3-18*

    Create cluster using `azdata`


    Now sit back, relax, follow the output of `azdata` as shown in Figure 3-38, and
    wait for the deployment to finish.


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig38_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig38_HTML.jpg)

    *Figure 3-38*

    Output of `azdata bdc create`


    Depending on the size of your machine, this may take anywhere from minutes to
    hours.


    ### Others


    There are multiple other Kubernetes environments available – from Raspberry Pi
    to VMWare. Many but not all of them support SQL Server 2019 Big Data Clusters.
    The number of supported platforms will grow over time, but there is no complete
    list of compatible environments. If you are looking at a specific setup, the best
    and easiest way is to just give it a try!


    ## Advanced Deployment Options


    Besides the configuration options mentioned earlier, we would like to point your
    attention to two additional opportunities to make more out of your Big Data Cluster:
    Active Directory authentication and HDFS tiering.'
  raw: '### What Is azdata?


    As mentioned before, no matter which path of deployment you choose, the deployment
    of your Big Data Cluster will always be controlled through a tool call azdata.
    It’s a command-line tool that will help you to create a Big Data Cluster configuration,
    deploy your Big Data Cluster, and later potentially delete or upgrade your existing
    cluster.


    The logical first step (which is somehow happening behind the scenes in the previous
    scripts) is to create a configuration as shown in Listing [3-14](#480532_2_En_3_Chapter.xhtml#PC15).


    ```

    azdata bdc config init [--target -t] [--src -s]

    Listing 3-14

    Create cluster config using azdata

    ```


    Target is just the folder name for your config files (*bdc.json* and *control.json*).
    The src is one of the existing base templates to start with.


    Possible values are (at the time of writing)


    *   aks-dev-test


    *   aks-dev-test-ha


    *   kubeadm-dev-test


    *   kubeadm-prod


    These match the options that you saw when deploying in Azure Data Studio. You
    can always get all valid options by running *azdata bdc config init -t <yourtarget>*
    without specifying a source. Keep in mind that these are just templates. If your
    preferred environment is not offered as a choice, this doesn’t necessarily imply
    that it’s not supported, just that you will need to make some adjustments to an
    existing template to make it match your target. The output is shown is Figure
    [3-37](#480532_2_En_3_Chapter.xhtml#Fig37).


    ![../images/480532_2_En_3_Chapter/480532_2_En_3_Fig37_HTML.jpg](images/480532_2_En_3_Chapter/480532_2_En_3_Fig37_HTML.jpg)


    Figure 3-37


    Output of azdata bdc config init without specifying a source


    The source to choose will depend on your deployment type.


    Running *azdata bdc config init* results in two .JSON files – bdc.json and control.json –
    to be created in a subfolder which is named after your target. This will be based
    on defaults, so we need to make some changes to the configuration. This can be
    done either using any text editor or using *azdata* again using the *config replace*
    option, as shown in Listing [3-15](#480532_2_En_3_Chapter.xhtml#PC16), where we
    use it to modify the name of the Big Data Cluster in the bdc.json file.


    ```

    azdata bdc config replace -c myfirstbigdatacluster/bdc.json -j metadata.name=myfirstbigdatacluster

    Listing 3-15

    Modify cluster config using azdata

    ```


    The *control* file defines more general settings like which version, repository,
    and so on you want to use, whereas the *bdc* file configures the actual setup
    of your Big Data Cluster environment like the number of replicas per role and
    so on, as shown in Listings [3-16](#480532_2_En_3_Chapter.xhtml#PC17) and [3-17](#480532_2_En_3_Chapter.xhtml#PC18).


    ```

    {

    "apiVersion": "v1",

    "metadata": {

    "kind": "BigDataCluster",

    "name": "mssql-cluster"

    },

    "spec": {

    "resources": {

    "nmnode-0": {

    "spec": {

    "replicas": 2

    }

    },

    "sparkhead": {

    "spec": {

    "replicas": 2

    }

    },

    "zookeeper": {

    "spec": {

    "replicas": 3

    }

    },

    "gateway": {

    "spec": {

    "replicas": 1,

    "endpoints": [

    {

    "name": "Knox",

    "dnsName": "",

    "serviceType": "NodePort",

    "port": 30443

    }

    ]

    }

    },

    "appproxy": {

    "spec": {

    "replicas": 1,

    "endpoints": [

    {

    "name": "AppServiceProxy",

    "dnsName": "",

    "serviceType": "NodePort",

    "port": 30778

    }

    ]

    }

    },

    "master": {

    "metadata": {

    "kind": "Pool",

    "name": "default"

    },

    "spec": {

    "type": "Master",

    "replicas": 3,

    "endpoints": [

    {

    "name": "Master",

    "dnsName": "",

    "serviceType": "NodePort",

    "port": 31433

    },

    {

    "name": "MasterSecondary",

    "dnsName": "",

    "serviceType": "NodePort",

    "port": 31436

    }

    ],

    "settings": {

    "sql": {

    "hadr.enabled": "true"

    }

    }

    }

    },

    "compute-0": {

    "metadata": {

    "kind": "Pool",

    "name": "default"

    },

    "spec": {

    "type": "Compute",

    "replicas": 1

    }

    },

    "data-0": {

    "metadata": {

    "kind": "Pool",

    "name": "default"

    },

    "spec": {

    "type": "Data",

    "replicas": 2

    }

    },

    "storage-0": {

    "metadata": {

    "kind": "Pool",

    "name": "default"

    },

    "spec": {

    "type": "Storage",

    "replicas": 3,

    "settings": {

    "spark": {

    "includeSpark": "true"

    }

    }

    }

    }

    },

    "services": {

    "sql": {

    "resources": [

    "master",

    "compute-0",

    "data-0",

    "storage-0"

    ]

    },

    "hdfs": {

    "resources": [

    "nmnode-0",

    "zookeeper",

    "storage-0",

    "sparkhead"

    ],

    "settings": {

    "hdfs-site.dfs.replication": "3"

    }

    },

    "spark": {

    "resources": [

    "sparkhead",

    "storage-0"

    ],

    "settings": {

    "spark-defaults-conf.spark.driver.memory": "2g",

    "spark-defaults-conf.spark.driver.cores": "1",

    "spark-defaults-conf.spark.executor.instances": "3",

    "spark-defaults-conf.spark.executor.memory": "1536m",

    "spark-defaults-conf.spark.executor.cores": "1",

    "yarn-site.yarn.nodemanager.resource.memory-mb": "18432",

    "yarn-site.yarn.nodemanager.resource.cpu-vcores": "6",

    "yarn-site.yarn.scheduler.maximum-allocation-mb": "18432",

    "yarn-site.yarn.scheduler.maximum-allocation-vcores": "6",

    "yarn-site.yarn.scheduler.capacity.maximum-am-resource-percent": "0.3"

    }

    }

    }

    }

    }

    Listing 3-17

    Sample bdc.json

    ```


    ```

    {

    "apiVersion": "v1",

    "metadata": {

    "kind": "Cluster",

