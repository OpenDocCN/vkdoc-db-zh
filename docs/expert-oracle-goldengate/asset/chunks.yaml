    Oracle GoldenGate 失败的常见操作系统问题以及如何解决它们。


    **缺少系统库**


    首先是操作系统配置缺少系统库。对于 UNIX 和 Linux 操作系统，如果您在 Oracle GoldenGate 中看到报错抱怨缺少库，您应该在 shell
    窗口中执行 `env` 命令，检查 `LD_LIBRARY_PATH` 和 `PATH` 变量的设置，以确保它们设置正确。如果这些变量不正确，请纠正情况，并在
    Oracle GoldenGate 主目录中的 `.profile` 启动文件中将这些值设置为正确的路径。


    **函数堆栈大小**


    错误报告也可能显示一条消息，指出需要增加函数堆栈。要增加分配给堆栈的内存，您可以使用 `FUNCTIONSTACKSIZE` 参数。


    ![images](img/square.jpg)`Note` 谨慎使用 `FUNCTIONSTACKSIZE` 参数，因为它可能对 Oracle GoldenGate
    性能产生不利影响。在进行更改时，请务必首先在非生产环境中进行测试。


    **文件访问问题**


    文件访问问题也可能导致操作系统级别的失败。在操作系统级别，Extract 和 Replicat 用户帐户都需要对 Oracle GoldenGate 目录中的所有文件具有完全的读写权限。如果您收到错误消息“错误参数：组名无效”，这表示进程无法打开检查点文件。您应该执行
    GGSCI 命令 `INFO *` 来查看组名，然后发出命令 `VIEW PARAMS <group>`，以确保 `INFO *` 命令的 GGSCI 输出中的组名与
    `EXTRACT` 或 `REPLICAT` 参数中的组名匹配。


