  trans: '

    ### 设计监控策略


    要设计一个全面的监控策略，您需要掌握两个因素：


    *   *内部因素：* 您需要理解 `GoldenGate` 的内部工作原理。作为 `GoldenGate` 管理员，您应该拥有完全的控制权。如果 `GoldenGate`
    系统内部出现问题，您应该能够识别并自行解决。

    *   *外部因素：* 这些是 `GoldenGate` 所依赖的系统。在大型组织中，您可能无法完全访问这些系统，例如复杂的网络、服务器和存储监控工具及实用程序。在某些情况下，如果您不是
    `DBA`，甚至无法访问数据库监控工具。但您无需完全访问这些系统即可监控您的 `GoldenGate` 进程。本章将讨论 `GoldenGate` 管理员可用的监控技术。


    除了这些因素，您还需要识别 `GoldenGate` 所有可能出现故障的方式。一个简单的 `GoldenGate` 配置可能的监控点如图 8-1 所示；本章将涵盖其中的每一个。如果您能管理一个简单的配置，就能管理一个复杂的配置。`GoldenGate`
    系统中移动部件的数量并不重要——您只需为每个额外的组件增加更多的监控。例如，对于一个双活配置，您需要将图 8-1 中监控点 1 至 7 的监控活动从源端复制到目标端。您还需要在目标端对监控点
    7 至 13 执行相同的操作。如果您添加了一个额外的数据泵进程，那么您就需要在源端为点 2、3、4 和 7 添加监控，并在目标端对应的位置进行监控。然而，这是逻辑视图。实际脚本数量可能有所不同。例如，一个脚本可能提供
    `GoldenGate` 整体健康状况的鸟瞰视图。


    ![images](img/0801.jpg)


    **图 8-1.** 潜在的 `GoldenGate` 监控点


    每个 `Extract` 进程都有一个数据库连接，用于查询数据字典以检查是否有任何更改。如果发生更改，`Extract` 进程会读取在线重做日志以捕获更改，并写入到跟踪文件。如果数据不在在线重做日志中，它会读取归档日志。如果数据不在归档日志中，并且您在
    `Extract` 参数文件中指定了 `ALTARCHIVELOGDEST <路径名>`，`Extract` 进程会读取备用的归档日志。如果 `Extract`
    进程仍然无法找到具有正确提交序列号（`CSN`）的事务，`Extract` 进程将异常终止，并告知您丢失的文件序列号。


    ![images](img/square.jpg) **注意** `CSN` 是 `GoldenGate` 特有的；每个数据库系统都有自己跟踪提交序列的方式。Oracle
    使用系统更改号（`SCN`），`DB2 z/OS` 使用相对字节地址（`RBA`），MySQL 使用 `LogNum`，等等。


    #### 为何监控抽取进程至关重要


    在 Oracle 中，`Extract` 依赖于 Oracle 重做日志工作。对于处于归档日志模式的数据库，在最后一个条目写入后，在线重做日志会被转换为归档日志。在某些系统中，`DBA`
    可能会压缩归档日志并将其移动到 `GoldenGate` 无法访问的其他位置。如果 `Extract` 长时间宕机且归档日志无法访问，您就会丢失数据。在关键业务环境中，您需要密切监控您的
    `Extract` 进程。


    在正常的数据库系统中，`GoldenGate` 跟踪文件通常只占用整个重做日志文件的 30%或更少。另外 70%的重做数据是系统相关的日志，`GoldenGate`
    并不需要。因此，例如，如果您为了应对灾难而保留两周的跟踪文件，那么两周的总跟踪文件大小为 `<每日总重做日志大小> × 0.3 × 14`。您需要大约四倍于每日总重做日志大小的存储空间来保存整整两周的变更日志数据。在大型数据库系统上，连续宕机两周是非常罕见的。因此，只要
    `Extract` 进程能够生成跟踪文件，`Replicat` 就会加载它们。


    #### 获取最大阈值


    获取 `GoldenGate` 通过网络能传输的最大阈值非常重要。例如，如果 `GoldenGate` 因计划停机需要关闭 5 小时，您需要知道 `GoldenGate`
    追赶至零延迟需要多长时间。为此，您可以停止数据泵几小时，然后重新启动它。您可以在 `GoldenGate` 软件命令界面（`GGSCI`）提示符下使用 `stats`
    命令来计算操作数。此外，您可以检查累积的文件大小和消耗速率。您将在本章后面看到如何执行此操作。


    ### 在 GoldenGate 环境中应监控哪些进程


    本章使用 `Extract EXTGGS1`、`Data Pump DPGGS1` 和 `Replicat REPGGS1` 进行演示。这是一个简单的单向抽取。`GoldenGate`
    进程使用 `CSN`、`seqno` 和 `RBA` 来连接并序列化每个进程。`CSN`、`seqno` 和 `RBA` 是识别 `GoldenGate`
    环境中延迟的工具。如果您确切知道延迟出现在哪里，就可以在该进程中增加更多监控。


    如前所述，Oracle `GoldenGate` 使用 `CSN` 来跟踪提交顺序。每个数据库系统都有其独特的序列号；有关 `CSN` 的完整列表，请参阅
    Oracle `GoldenGate` 管理指南。`CSN` 也与时间戳相关联。


    ![images](img/square.jpg) **注意** 在真正应用集群（`RAC`）环境中，确保所有集群服务器具有完全相同的时间戳至关重要。否则，您会收到“`SCN`
    不匹配的不兼容记录”错误。如果收到此错误，您可能会丢失数据，或者需要使用 `Logdump` 实用程序来识别有问题的记录并手动修补数据。


    除了 `CSN`，`seqno` 在监控和故障排除中也起着重要作用。`Seqno` 是跟踪文件的序列号；每种类型的跟踪文件都有自己的序列号。例如，`Extract`
    跟踪文件中的 `seqno=100` 可能与 `Replicate` 或数据泵中的序列号 100 不同，即使它们处于同一传播过程中。跟踪文件的命名约定是 `aannnnnn`，其中
    `aa` 是两个字符的跟踪文件前缀，六个 `n` 是 `seqno`。如果 `GoldenGate` 用完了所有可用的 `seqno` 值，它会从 `000000`
    重新开始。从技术上讲，您最多可以拥有一百万个跟踪文件。因此，如果您需要保留大量跟踪文件，请正确设置跟踪文件大小。


    最后一个关键指标是重做日志序列号。每当您发出 `alter extract begin [now]|[timestamp]` 命令时，`GoldenGate`
    会搜索 Oracle 数据字典以确定从哪个重做日志开始读取。如果未提供时间戳，`GoldenGate` 会从上一个检查点文件开始。因此，启动 `Extract`
    可能需要一段时间，尤其是在使用 `NODYNAMICRESOLUTION` 参数时。


    #### 监控所有运行中的进程


    `GGSCI` 提示符下的 `info all` 命令可以很好地指示 `GoldenGate` 的整体健康状况。如下所示，在正常操作中，`Lag`（延迟）应为
    0，`Time Since Chkpt`（自上次检查点以来的时间）应小于 10 秒。如果您的 `Extract` 存在较大延迟，`Lag` 列中的值会很大或不会减少：


    ```

    GGSCI  28> info all

    Program        Status           Group            Lag              Time Since Chkpt

    MANAGER    RUNNING

    EXTRACT     RUNNING     DPGGS1       00:00:00      00:00:00

    EXTRACT     RUNNING     EXTGGS1     00:00:00      00:00:04

    REPLICAT    RUNNING     REPGGS1     00:00:00      00:00:09

    ```

    '
- fmt: "## 监控提取详情\n\n要了解当前提取的状态，可以像下面这样在 `info` GGSCI 命令中添加 `detail` 参数：\n\n```bash\n\
    GGSCI> Info extract extggs1, detail\nEXTRACT    EXTGGS1   Last Started 2011-04-09\
    \ 22:36   Status RUNNING\nCheckpoint Lag       00:00:00 (updated 00:00:02 ago)\n\
    Log Read Checkpoint  Oracle Redo Logs\n                     2011-04-10 00:16:47\
    \  Seqno 175, RBA 36263936\n  Target Extract Trails:\n  Remote Trail Name    \
    \                                    Seqno        RBA        Max MB\n  C:\\ggs\\\
    dirdat\\C1                                                9         2964     \
    \    5\n\n  Extract Source                                  Begin            \
    \ End\n\n  C:\\APP\\ORADATA\\ORCL\\REDO01.LOG                 2011-04-09 22:02\
    \  2011-04-10 00:16\n  C:\\APP\\ORADATA\\ORCL\\REDO03.LOG                 2011-04-09\
    \ 20:14  2011-04-09 22:02\n  C:\\APP\\ORADATA\\ORCL\\REDO01.LOG              \
    \   * Initialized *   2011-04-09 20:14\n\nCurrent directory    C:\\ggs\n\nReport\
    \ file             C:\\ggs\\dirrpt\\EXTGGS1.rpt\nParameter file         C:\\ggs\\\
    dirprm\\EXTGGS1.prm\nCheckpoint file        C:\\ggs\\dirchk\\EXTGGS1.cpe\nProcess\
    \ file           C:\\ggs\\dirpcs\\EXTGGS1.pce\nError log              C:\\ggs\\\
    ggserr.log\n```\n\n根据这些结果，GoldenGate 正在读取序列号 (`seqno`) 为 175 的重做日志。在 RAC 环境中，你会看到每个节点的序列号。序列号\
    \ (`Seqno`) 9 是远程跟踪文件的序列号。\n\n`send` 命令提供了关于源端和目标端序列号 (`seqno`) 的类似信息：\n\n```bash\n\
    GGSCI  32> Send extract extggs1 status\nSending STATUS request to EXTRACT EXTGGS1\
    \ ...\nEXTRACT EXTGGS1 (PID 7220)\n  Current status: Recovery complete: At EOF\n\
    \n  Current read position:\n  Sequence #: 175\n  RBA: 36263936\n  Timestamp: 2011-04-10\
    \ 00:27:47.000000\n\n  Current write position:\n  Sequence #: 9\n  RBA: 2964\n\
    \  Timestamp: 2011-04-10 00:27:53.063000\n  Extract Trail: C:\\ggs\\dirdat\\C1\n\
    ```\n\n## 检查当前 Oracle 联机重做日志\n\n根据上一节我们知道提取进程 `EXTGGS1` 正在读取序列号 (`sequence#`)\
    \ 175，我们想知道这个序列号 175 是否是当前最新的。以下查询可以告诉我们 Oracle 正在处理哪个重做日志文件序列号。\n\n```sql\nSELECT\n\
    \  A.MEMBER,\n  B.SEQUENCE#,\n  B.STATUS,\n  B.FIRST_CHANGE#,\n  B.NEXT_CHANGE#,\n\
    \  B.ARCHIVED\nFROM   V$LOGFILE A, V$LOG B\nWHERE  A.GROUP# = B.GROUP#\n```\n\n\
    ```\nMEMBER                          SEQUENCE#   STATUS      FIRST_CHANGE#  NEXT_CHANGE#\n\
    C:\\ORCL\\REDO03.LOG              174         INACTIVE    6591047        6621440\n\
    C:\\ORCL\\REDO02.LOG              173         INACTIVE    6560323        6591047\n\
    C:\\ORCL\\REDO01.LOG              175         CURRENT     6621440        281474976710655\n\
    ```\n\n`first_change#` 和 `next_change#` 是 Oracle 的 SCN 号。当前重做日志的序列号 (`sequence#`)\
    \ 是 175。`EXTGGS1` 的序列号也是 175。两者都是 175，说明它们是同步的。因此，GoldenGate 提取进程没有延迟。序列号 (`sequence#`)\
    \ 为 174 及更小的重做日志位于归档日志区。\n\n## 检查归档日志\n\n要找出 GoldenGate 正在读取联机重做日志还是归档重做日志，可以使用以下\
    \ GGSCI 命令：\n\n```bash\nGGSCI> Info extract extggs1, detail\nEXTRACT    EXTGGS1\
    \   Last Started 2011-04-09 22:36   Status RUNNING\nCheckpoint Lag       00:00:00\
    \ (updated 00:00:02 ago)\nLog Read Checkpoint  Oracle Redo Logs\n            \
    \         2011-04-10 00:16:47  Seqno 175, RBA 36263936\n```\n\n序列号 (`Seqno`) 是\
    \ 175，因为它当前正在读取联机重做日志。如果提取进程没有读取联机重做日志并已落后，那么它的序列号 (`seqno`) 会小于 175。你可以按照以下方式检查它正在读取哪个归档日志：\n\
    \n```sql\nSELECT  SEQUENCE#,\n        NAME,\n        FIRST_CHANGE#,\n        NEXT_CHANGE#\n\
    FROM   V$ARCHIVED_LOG\n```\n\n```\nSEQUENCE#  NAME                           \
    \               FIRST_CHANGE#  NEXT_CHANGE#\n171        C:\\ARC0000000171_0718807864.0001\
    \              6527997        6542114\n172        C:\\ARC0000000172_0718807864.0001\
    \              6542114        6560323\n173        C:\\ARC0000000173_0718807864.0001\
    \              6560323        6591047\n174        C:\\ARC0000000174_0718807864.0001\
    \              6591047        6621440\n```\n\n默认的归档日志命名约定包含了日志序列号 (`sequence#`)。如果\
    \ DBA 更改了命名约定，你可以使用序列号 (`sequence#`) 来找出 GoldenGate 正在读取哪个归档重做日志文件。在正常操作期间，最大序列号\
    \ (`sequence#`) +1 应该是当前重做日志的序列号 (`seqno`)——本例中为 175。如果不是，则说明提取进程已落后。要确定提取进程是否在写入跟踪文件，请检查跟踪文件的大小。在“监控提取详情”部分，跟踪文件是\
    \ `c1000009`，其中 9 是跟踪文件的序列号 (`seqno`)。跟踪文件的 `RBA` 是 2964，因此你可以多次使用 `info extract\
    \ extggs1, detail` 命令来检查 `RBA` 是否增长。或者，你可以在 Unix/Linux 中使用 `ls -ls` 命令或在 Windows\
    \ 中使用 `dir` 命令多次检查跟踪文件的大小。\n\n## 监控 GoldenGate 速率和重做日志消耗速率\n\n默认情况下，`stats` 命令会列出所有有事务的表。你可以使用\
    \ `totalsonly`、`by table` 和 `reportrate` 来限制显示。你也可以重置统计信息。\n\n```bash\nGGSCI \
    \ 30> stats extggs1\nSending STATS request to EXTRACT EXTGGS1 ...\nStart of Statistics\
    \ at 2011-04-10 00:05:46.\nOutput to C:\\ggs\\dirdat\\C1:\nExtracting from GGS.SOURCE_TABLE\
    \ to GGS.SOURCE_TABLE:\n*** Total statistics since 2011-04-09 22:36:18 ***\n \
    \       Total inserts                                     0.00\n        Total\
    \ updates                                    12.00\n        Total deletes    \
    \                                 0.00\n        Total discards               \
    \                     0.00\n        Total operations                         \
    \        12.00\n*** Daily statistics since 2011-04-10 00:00:00 ***\n        No\
    \ database operations have been performed.\n*** Hourly statistics since 2011-04-10\
    \ 00:00:00 ***\n        No database operations have been performed.\n*** Latest\
    \ statistics since 2011-04-09 22:36:18 ***\n        Total inserts            \
    \                         0.00\n        Total updates                        \
    \            12.00\n        Total deletes                                    \
    \ 0.00\n        Total discards                                    0.00\n     \
    \   Total operations                                 12.00\nEnd of Statistics.\n\
    ```\n\n如果你执行以下命令，如果在映射中没有特殊过滤器，它们应该给出相似的操作数量：\n\n在源端：\n```bash\nGGSCI> stats dpggs1\
    \ totalsonly *\nGGSCI> stats extggs1 totalsonly *\n```\n\n在目标端：\n```bash\nGGSCI>\
    \ stats repggs1 totalsonly *\n```\n\n如果你看到不同的操作数量，那么过程中可能有数据丢失或被过滤。例如，在单向复制中，提取端\
    \ (`Extract`) 和复制端 (`Replicate`) 的所有统计信息应该匹配。如果你在源表中插入了 10 条记录，但目标表中只有 9 条，那一定是有问题了。\n\
    \n## 监控各组的延迟\n\n有多种方法可以找出 GoldenGate 进程中的延迟。所有方法都类似，你可以使用一种或全部方法来验证延迟。"
  raw: '#### Monitoring the Detail Extract


    To understand the current status of the Extract, you can add `detail` to the info
    GGSIC command as follows:


    `GGSCI> Info extract extggs1, detail`

    `EXTRACT    EXTGGS1   Last Started 2011-04-09 22:36   Status RUNNING`

    `Checkpoint Lag       00:00:00 (updated 00:00:02 ago)`

    `Log Read Checkpoint  Oracle Redo Logs`

    `                     2011-04-10 00:16:47  Seqno 175, RBA 36263936`

    `  Target Extract Trails:`

    `  Remote Trail Name                                Seqno               RBA           Max
    MB`

    `  C:\ggs\dirdat\C1                                     9                   2964          5`


    `  Extract Source                          Begin             End`


    `  C:\APP\ORADATA\ORCL\REDO01.LOG  2011-04-09 22:02  2011-04-10 00:16`

    `  C:\APP\ORADATA\ORCL\REDO03.LOG  2011-04-09 20:14  2011-04-09 22:02`

    `  C:\APP\ORADATA\ORCL\REDO01.LOG  * Initialized *   2011-04-09 20:14`


    `Current directory    C:\ggs`


    `Report file             C:\ggs\dirrpt\EXTGGS1.rpt`

    `Parameter file       C:\ggs\dirprm\EXTGGS1.prm`

    `Checkpoint file      C:\ggs\dirchk\EXTGGS1.cpe`

    `Process file           C:\ggs\dirpcs\EXTGGS1.pce`

    `Error log                C:\ggs\ggserr.log`


    According to these results, Golden Gate is reading the redo log `seqno` 175\.
    In RAC, you see the sequence number for each node. `Seqno` 9 is the remote trail
    file sequence number.


    The `send` command gives you similar information about the source and target `seqno`s:


    `GGSCI  32> Send extract extggs1 status`

    `Sending STATUS request to EXTRACT EXTGGS1 ...`

    `EXTRACT EXTGGS1 (PID 7220)`

    `  Current status: Recovery complete: At EOF`


    `  Current read position:`

    `  Sequence #: 175`

    `  RBA: 36263936`

    `  Timestamp: 2011-04-10 00:27:47.000000`


    `  Current write position:`

    *`Sequence #: 9`*

    *`  RBA: 2964`*

    `  Timestamp: 2011-04-10 00:27:53.063000`

    `  Extract Trail: C:\ggs\dirdat\C1`


    #### Checking the Current Oracle Online Redo Log


    As we know from previous section that extract EXTGGS1 is reading the sequence#
    175, and we would like to know if the sequence# 175 is the most current or not.
    The following query tells us which redo log file sequence# Oracle is processing.


    `SELECT`

    `A.MEMBER,`

    `         B.SEQUENCE#,`

    `         B.STATUS,`

    `         B.FIRST_CHANGE#,`

    `         B.NEXT_CHANGE#,`

    `         B.ARCHIVED`

    `  FROM   V$LOGFILE A, V$LOG B`

    ` WHERE   A.GROUP# = B.GROUP#`


    `MEMBER                           SEQUENCE#     STATUS     FIRST_CHANGE#  NEXT_CHANGE#`

    `C:\ORCL\REDO03.LOG    174                     INACTIVE   6591047                  6621440`

    `C:\ORCL\REDO02.LOG    173                     INACTIVE   6560323                  6591047`

    `C:\ORCL\REDO01.LOG    175                     URRENT     6621440                  281474976710655`


    `first_change#` and `next_change#` are the Oracle SCN numbers. The current redo
    log `sequence#` is 175. EXTGGS1 is also on sequence number 175\. Both sequence#
    are 175 and they are in sync. So there is no lag in Golden Gate extract process.
    Redo logs with `sequence#` 174 and lower are in the archived log area.


    #### Checking the Archived Log


    To find out if GoldenGate is reading the online or archived redo log, you can
    use the following GGSCI command:


    `G``GSCI> Info extract extggs1, detail`

    `EXTRACT    EXTGGS1   Last Started 2011-04-09 22:36   Status RUNNING`

    `Checkpoint Lag       00:00:00 (updated 00:00:02 ago)`

    `Log Read Checkpoint  Oracle Redo Logs`

    `                     2011-04-10 00:16:47  Seqno 175, RBA 36263936`


    `Seqno` is 175, because it''s the current online redo log. If the extract isn''t
    reading the online redo log and behind, then the `seqno` is less than 175\. You
    can check which archived log it''s reading as follows:


    `SELECT   SEQUENCE#,`

    `         NAME,`

    `         FIRST_CHANGE#,`

    `         NEXT_CHANGE#`

    `  FROM   V$ARCHIVED_LOG`


    `SEQUENCE#     NAME                                            FIRST_CHANGE#    NEXT_CHANGE#`

    `171        C:\ARC0000000171_0718807864.0001    6527997                    6542114`

    `172        C:\ARC0000000172_0718807864.0001    6542114                    6560323`

    `173        C:\ARC0000000173_0718807864.0001    6560323                    6591047`

    `174        C:\ARC0000000174_0718807864.0001    6591047                    6621440`


    The default archived log naming convention includes the log `sequence#`. If the
    DBA changed the naming convention, you can use `sequence#` to find out which archived
    redo log file GoldenGate is reading. During normal operations, max(`sequence#`)+1
    should be the current redo `seqno`—175 in this case. If not, the Extract process
    is behind. To determine whether the Extract is writing to the trail file, check
    the trail file size. In ”Monitoring The Detail Extract” section, the trail file
    is c1000009, where 9 is the trail file `seqno`. The trail file RBA is 2964, so
    you can use `info extract extggs1, detail` a few times to check if the RBA increases.
    Or you can use `ls -ls` in Unix/Linux or `dir` in Windows a few times to check
    the trail file size.


    #### Monitoring the GoldenGate Rate and Redo Log Consumption Rate


    By default, the `stats` command lists all the tables that have transactions. You
    can limit the display using `totalsonly`, `by table`, and `reportrate`. You can
    also reset the stats.


    `GGSCI  30> stats extggs1`

    `Sending STATS request to EXTRACT EXTGGS1 ...`

    `Start of Statistics at 2011-04-10 00:05:46.`

    `Output to C:\ggs\dirdat\C1:`

    `Extracting from GGS.SOURCE_TABLE to GGS.SOURCE_TABLE:`

    `*** Total statistics since 2011-04-09 22:36:18 ***`

    `        Total inserts                                0.00`

    `        Total updates                               12.00`

    `        Total deletes                                0.00`

    `        Total discards                               0.00`

    `        Total operations                            12.00`

    `*** Daily statistics since 2011-04-10 00:00:00 ***`

    `        No database operations have been performed.`

    `*** Hourly statistics since 2011-04-10 00:00:00 ***`

    `        No database operations have been performed.`

    `*** Latest statistics since 2011-04-09 22:36:18 ***`

    `        Total inserts                                0.00`

    `        Total updates                               12.00`

    `        Total deletes                                0.00`

    `        Total discards                               0.00`

    `        Total operations                            12.00`

    `End of Statistics.`


    If you execute the following commands, they should give a similar number of operations
    if there is no special filter in the mappings:


    `On Source:`

    `GGSCI> stats dpggs1 totalsonly *`

    `GGSCI> stats extggs1 totalsonly *`


    `On Target`

    `GGSCI> stats repggs1 totalsonly *`


    If you see different numbers of operations, then there may be data lost or filtered
    in the process. For example, in one-way replication, all the stats from the Extract
    and Replicate side should match. If you have 10 records inserted into the source
    table but only 9 in target, there must be something wrong.


    #### Monitoring Lags for Each Group


    There are different ways to find out the lags in the GoldenGate process. All the
    approaches are similar, and you can use one or all of them to validate the lags.'
