    从 SQL Server 到 Oracle 的复制，其执行方式与前面展示的从 Oracle 复制到 SQL Server 的方式类似。主要区别在于，您将在源
    SQL Server 系统上创建 Extract 进程组，而在 Oracle 目标系统上创建 Replicat 进程组。


    #### MySQL 到 Oracle 复制


    MySQL 是一个流行的 RDBMS 平台，被互联网初创公司、媒体公司和互联网服务提供商 (ISP) 广泛采用，是开放标准 LAMP（Linux Apache
    MySQL PHP）技术栈的一部分。根据我们使用 Oracle GoldenGate 客户的经验，随着他们扩展到更大规模的环境并迁移到 Oracle 环境，他们有复制和迁移其
    MySQL 数据的需求，如 表 6-2 所示。


    ![images](img/t0602.jpg)


    有关如何配置 MySQL 到 Oracle 复制的详细信息，请参阅可在 [`http://otn.oracle.com`](http://otn.oracle.com)
    获取的 Oracle GoldenGate 在线文档指南。


    #### Teradata 到 Oracle 复制


    Teradata 是企业数据仓库和商业智能市场的关键参与者之一。它扩展性良好且性能稳健。然而，缺乏内置的原生复制功能一直是 Teradata 的“阿喀琉斯之踵”。因此，它需要
    Oracle GoldenGate 软件来执行数据库复制任务。许多客户有业务需求，需要将数据从 Teradata 复制到 Oracle 环境，而 GoldenGate
    完美地完成了这项任务。


    表 6-3 提供了 Teradata 与 Oracle GoldenGate 当前支持的配置。


    ![images](img/t0603.jpg)


    有关如何配置 Teradata 到 Oracle 复制的详细信息，请参阅可在 [`http://otn.oracle.com`](http://otn.oracle.com)
    获取的 Oracle GoldenGate 在线文档指南。


    #### Sybase 到 Oracle 复制


    Sybase 最初是 Microsoft 和 Sybase Corporation 的合资企业，后来 SQL Server 从 Sybase 和 Microsoft
    中分离出来，成为两个不同的数据库产品。Sybase 有两个数据库产品：Sybase IQ 和 Sybase SQL Server。目前，尚不支持 Sybase
    IQ 与 Oracle GoldenGate 进行复制。但是，支持从 Sybase SQL Server 到 Oracle GoldenGate 的复制。表
    6-4 提供了 Sybase 与 Oracle GoldenGate 当前支持的版本。


    ![images](img/t0604.jpg)


    有关如何配置 Sybase 到 Oracle 复制的详细信息，请参阅可在 [`http://download.oracle.com/docs/cd/E18101_01/doc.1111/e17806.pdf`](http://download.oracle.com/docs/cd/E18101_01/doc.1111/e17806.pdf)
    获取的 Oracle GoldenGate 在线文档指南。


    #### IBM DB2 UDB 到 Oracle 复制


    IBM DB2 UDB 为 Windows、UNIX、Linux 和大型机平台提供企业数据仓库和 OLTP（在线事务处理）数据库平台。随着 Oracle Fusion
    Middleware 的普及和 Oracle 数据仓库功能的出现，许多 IBM 客户有业务需求，希望在维护其 Oracle 数据库环境的同时，也保留其当前的
    IBM DB2 数据库环境。因此，他们需要一个异构复制解决方案来保持所有数据库环境的同步。Oracle GoldenGate 满足了这一关键需求。Oracle
    11g GoldenGate 支持以下版本的 IBM DB2 UDB 与 Oracle 数据库环境，如 表 6-5 所示。


    ![images](img/t0605.jpg)


    有关如何配置 IBM DB2 UDB 到 Oracle 复制的详细信息，请参阅可在 [`http://download.oracle.com/docs/cd/E18101_01/doc.1111/e17795.pdf`](http://download.oracle.com/docs/cd/E18101_01/doc.1111/e17795.pdf)
    获取的 Oracle GoldenGate 在线文档指南。


    ### 验证操作就绪性


    现在，我们已经设置了多个使用第三方数据库到 Oracle 的复制环境来传输数据，是时候测试和验证新的 Oracle GoldenGate 环境是否正常运行了。我们还需要测试和测量基本性能，以确保有足够的资源来从不同的源系统向
    Oracle 传输数据。操作就绪性可以通过使用脚本来生成初始加载、执行 DML 和 DDL 事务（如更新、删除和插入）来验证，也可以使用 Oracle GoldenGate
    Veridata 来检查使用 Oracle GoldenGate 的源和目标异构环境之间的数据同步状态。另一种衡量 Oracle GoldenGate 环境操作就绪性的方法是使用
    Oracle GoldenGate Director 产品来检查源和目标环境之间复制的状态。


    ### 本章小结


    我们通过一个案例研究，介绍了使用 Oracle GoldenGate 从第三方数据库平台到 Oracle 的异构实时数据复制。我们从一些基本的安装指南开始，并提供了示例配置步骤以及所需的命令，以便以最少的时间和精力启动并运行。在具有复杂转换的大型生产环境中，您很可能需要通过更高级的功能（如令牌和过滤器）以及宏库来构建这些简单的示例，以满足复制环境的业务需求。


    ## 第 7 章


    ## 调优


    GoldenGate 是一款久经考验的高性能产品，为世界上一些最繁忙、高吞吐量的应用程序复制数据。为了使 GoldenGate 在此类环境中高效运行，您需要扎实掌握如何调优
    GoldenGate。调优 GoldenGate 的过程与许多软件调优实践类似；然而，调优工具和机制却大不相同。您还应记住，尽管 GoldenGate 有自己的调优方法，但其性能取决于底层数据库、服务器、网络和存储的性能。本章将深入探讨如何调优
    GoldenGate 复制。


    本章回顾了一种用于调优 GoldenGate 复制的结构化方法，并深入探讨了该方法的每个步骤。然后，您将重点关注一些具体的调优策略和示例，这些策略和示例可用于改善
    GoldenGate 复制环境的性能。

