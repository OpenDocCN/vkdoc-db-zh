  trans: '### 下载软件


    对于 Oracle GoldenGate 11g，第一步是通过在线方式或 DVD 介质获取软件。根据您的互联网连接带宽，我们建议现有 Oracle 客户从
    Oracle E-Delivery (`http://edelivery.oracle.com`) 下载 Oracle GoldenGate 软件。出于教育和非商业学习目的，Oracle
    通过 Oracle 技术网（OTN）`http://otn.oracle.com` 免费提供该软件下载。在本章中，我们将从 `http://edelivery.oracle.com`
    下载 Oracle GoldenGate 软件。


    我们建议您在 OTN 站点注册一个免费账户，以获取用于试用目的的免费软件、Oracle 白皮书和网络直播。我们还建议您在线查阅 Oracle GoldenGate
    的文档（`http://download.oracle.com/docs/cd/E18101_01/index.htm`），以熟悉针对您的数据库和操作系统平台的特定发行说明。虽然本章主要关注
    Oracle 数据库平台与 GoldenGate，但我们将针对其他 RDBMS 平台（如 MySQL 和 Teradata）提供 Oracle GoldenGate
    的安装要求和指南。


    #### 从 Oracle E-Delivery 下载


    让我们开始吧，从 `edelivery.oracle.com` 下载 Oracle GoldenGate 软件。如果您更愿意从 OTN 下载，请跳至下一节，我们将展示如何使用
    `http://otn.oracle.com`。


    图 2-1 展示了介质搜索的结果。如图所示，选择适合您操作系统平台和版本的 Oracle GoldenGate 软件。选择 Oracle Fusion Middleware
    作为您的平台。然后指定您的操作系统。


    ![images](img/0201.jpg)


    **图 2-1.** 用于获取 Oracle Goldengate 软件的 E-Delivery 网站


    选择正确的平台后，您将看到可供下载的 Oracle GoldenGate 软件选项，如图 2-2 所示。


    ![images](img/0202.jpg)


    **图 2-2.** 从 E-Delivery 下载 Oracle Goldengate 软件


    选择了正确的 Oracle Goldengate 软件后（在我们的示例中是针对 Windows 平台的），您将进入图 2-3 所示的下载屏幕。


    ![images](img/0203.jpg)


    **图 2-3.** 用于获取 Oracle Goldengate 软件的 E-Delivery 网站


    此时，我们建议您查看自述文件和发行说明，为安装过程做好最佳准备。投入几个小时阅读，可以避免在安装和配置阶段出现大多数错误。


    由于我们将使用带有 Goldengate 的 Oracle 11g，因此我们将选择适用于 Windows XP 平台上 Oracle 11g 的 Oracle
    GoldenGate 11.1.1.0.0 软件进行下载。


    ![images](img/square.jpg) **注意** 如果您计划在 Linux 上使用 Oracle GoldenGate，您还需要下载适用于
    Linux 平台的 Oracle GoldenGate 软件。


    图 2-4 提供了 Oracle GoldenGate 介质包的自述说明。


    ![images](img/0204.jpg)


    **图 2-4.** Oracle Goldengate 软件安装的 README 说明


    #### 从 OTN 下载


    对于希望建立测试演示环境以学习如何使用 Oracle Goldengate 软件的读者，我们建议您如下所示从 `http://otn.oracle.com`
    的 OTN 下载软件。Oracle 允许您将 GoldenGate 软件用于教育目的，无需购买许可证。如果要在生产环境中使用，您应从 E-Delivery
    站点下载软件。图 2-5 显示了 Oracle 技术网（OTN）网站。


    ![images](img/0205.jpg)


    **图 2-5.** OTN 网站


    由于 OTN 是一个庞大的网站，找到实际获取 Oracle Goldengate 软件的位置可能有点棘手。别担心——向下滚动页面，您会在左侧找到文档和软件列表。图
    2-6 显示了 Oracle GoldenGate 可用的软件下载和文档链接。


    ![images](img/0206.jpg)


    **图 2-6.** 从 OTN 网站下载 Oracle Goldengate


    点击 OTN 上的下载链接后，您将看到图 2-7 所示的 Oracle 软件下载列表。


    ![images](img/0207.jpg)


    **图 2-7.** 从 OTN 网站下载 Oracle Goldengate


    在 OTN 网站的软件下载标题下，您需要先接受许可协议才能下载。接受后，您可以下载适用于您平台的 Goldengate 软件，用于试用、教育和非生产用途。请务必导航到中间件软件标题下，如图
    2-8 所示，因为 Oracle 将 Goldengate 归类为 Oracle 融合中间件产品家族的一部分。


    ![images](img/0208.jpg)


    **图 2-8.** 从 OTN 网站下载 Oracle Goldengate


    点击 GoldenGate 超链接，您可以下载 Oracle Goldengate 所需的所有软件包，包括 Director 和 Veridata（图 2-9）。


    ![images](img/0209.jpg)


    **图 2-9.** 从 OTN 网站下载 Oracle Goldengate


    现在您已经了解了如何获取和下载 Oracle Goldengate 软件及文档，是时候为我们的测试环境执行安装和配置了。


    ### 了解您的环境


    在安装之前，您应该充分了解您的目标环境。例如，您可能希望为 Oracle 11g 数据库环境同时安装 Linux 和 Windows。在表 2-1 中，我们展示了一个可用作
    Oracle GoldenGate 沙盒环境的测试配置。我们还建议您安装 Oracle 11g 附带的示例模式，以便在使用 GoldenGate 时拥有示例测试数据。我们的测试平台将包括表
    2-1 中的配置。


    ![images](img/t0201.jpg)


    在本书中，我们还将使用来自 Linux 平台的示例，因此如果您愿意，可以跟随使用 Windows、Linux 或两种设置。表 2-2 显示了将使用的测试 Linux
    配置。


    ![images](img/t0202.jpg)


    表 2-3 显示了我们即将在关于异构复制的章节中使用的配置。此处的“异构”指的是跨数据库品牌的复制。


    ![images](img/t0203.jpg)


    我们建议您从 OTN 或 Oracle E-Delivery 下载适用于 MySQL 和 Microsoft SQL Server 平台的 Oracle Goldengate
    11g 软件，为我们在第 6 章中关于使用 Goldengate 进行异构复制的练习做好准备。


    如果您需要 MySQL 数据库软件，可以从 `www.mysql.com/downloads/enterprise/` 下载。Microsoft SQL Server
    2008 Personal Express Edition 数据库软件可从 `www.microsoft.com/express/Database/` 获取，或者，您也可以使用
    Microsoft SQL Server 2008 Enterprise Edition 的试用许可证版本来执行本书中的练习。您可以从 `www.microsoft.com/sqlserver/2008/en/us/trial-software.aspx`
    下载为期 180 天的试用版许可证。


    现在，让我们深入了解在安装 Oracle Goldengate 软件之前必须完成的系统和数据库先决条件。'
- fmt: "### Reviewing the Install Instructions\n\nThe Oracle GoldenGate documentation\
    \ provides a multitude of installation and configuration guides that are available\
    \ from OTN at [`www.oracle.com/technetwork/middleware/goldengate/documentation/index.html`](http://www.oracle.com/technetwork/middleware/goldengate/documentation/index.html).\
    \ [Figure 2-10](#Chapter02.html#fig_2_10) shows a list of guides that explain\
    \ the installation, configuration, and support procedures for Oracle Goldengate.\n\
    \n![images](images/0210.jpg)\n\n`Figure 2-10. Oracle GoldenGate documentation\
    \ repository`\n\nBased on your specific platform and infrastructure design, you\
    \ will need to consult the appropriate guides shown above. As a first stop, we\
    \ advise you to review all release notes to avoid potential issues in terms of\
    \ errors before, during, and after the installation is completed. With each release\
    \ for Oracle Goldengate software, new bugs are discovered and patches provided\
    \ by the development team in time to address known issues.\n\n![images](images/square.jpg)\
    \ `Note` Always consult the Release Notes before you install Oracle Goldengate\
    \ software.\n\n### Installing Goldengate\n\nBefore you install the Oracle Goldengate\
    \ software for Windows and Linux platforms, be sure to verify that both the source\
    \ and target Oracle database servers are online and available. This means that\
    \ in addition to checking to ensure that these Oracle instances and databases\
    \ are online, you need to also test network connectivity between both server hosts.\
    \ If Goldengate cannot access the hosts via TCP/IP network connection, the software\
    \ will not function correctly. You can use the `ping` network utility to check\
    \ for network connectivity. In the event that a network timeout problem exists\
    \ between the source and target environments, you will need to work with your\
    \ network administrator to address this issue before installing the Oracle Goldengate\
    \ software.\n\n#### General System Requirements\n\nThe basic installation requirements\
    \ using Oracle with Goldengate are standard across Windows, Linux, and UNIX platforms\
    \ in terms of supported Oracle database versions, memory requirements, disk space\
    \ allocation, network requirements, and operating-system support. We cover all\
    \ of those areas in this section.\n\n##### Database Server Versions\n\nThe following\
    \ Oracle database versions are supported for Oracle 11g Goldengate:\n\n*   Oracle\
    \ 9iR2 (9.2)\n*   Oracle 10gR1/R2 (10.1/10.2)\n*   Oracle 11gR1/R2 (11.1/11.2)\n\
    \nAs of Oracle Goldengate 11g, both DML and DDL replication are supported for\
    \ the above Oracle releases. Support for legacy versions of Oracle such as Oracle\
    \ v7 and Oracle 8i is not provided. We recommend that you upgrade your database\
    \ to Oracle 11g if you plan to implement Goldengate with your Oracle database\
    \ environments.\n\n#### Memory Requirements\n\nAt least between 25 and 55 Mb of\
    \ RAM memory is required for each GoldenGate `Replicat` and `Extract` process.\
    \ Oracle Goldengate supports up to 300 concurrent processes for `Extract` and\
    \ `Replicat` per Goldengate instance.\n\nAs a rule of thumb, you will need to\
    \ take into consideration that at least 1–2 `Extract` processes and multiple `Replicat`\
    \ processes will be required in addition to `manager` processes for a basic Oracle\
    \ Goldengate installation. The best way to assess total memory requirement is\
    \ to run the `GGSCI` command to view the current report file and to examine the\
    \ `PROCESS AVAIL VM FROM OS (min)` to determine if you have sufficient swap memory\
    \ for your platform.\n\nNext let's consider the disk requirements to install Oracle\
    \ Goldengate.\n\n#### Disk Space Requirements\n\nFollowing are some things you\
    \ should do to ensure having enough disk space to support your Goldengate replication\
    \ needs:\n\n*   Allocate at least 50–150 MB of disk space for the Oracle GoldenGate\
    \ software binaries.\n*   Allocate 40 MB of disk space per instance of Goldengate\
    \ for working directories and files per server. For a basic configuration with\
    \ Oracle Goldengate, you will need to allocate 40 MB on the source and 40 MB on\
    \ the target system for a total requirement of 80 MB of disk space.\n*   Allocate\
    \ sufficient disk space to temporary files to accommodate GoldenGate operations.\
    \ By default, Goldengate stores temporary files in the `dirtmp` directory under\
    \ the default installation directory. A good rule of thumb to use for temp file\
    \ space is around 10 GB of disk space.\n*   Plan on at least 10 MB per trail file.\
    \ As a rule of thumb, we recommend that you start with at least 1 GB of disk space\
    \ allocated per system for trail files. Alternatively, use the following formula\
    \ that Oracle provides to determine the amount of disk space to set aside:\n \
    \   ```\n    [log volume in one hour] x [number of hours downtime] x 0.4 = trail\
    \ disk space.\n    ```\n    One way to calculate the total amount required for\
    \ trail file space is by querying the `V$ARCHIVED_LOG` view from within the source\
    \ Oracle database. The following query shows you how to do so:\n    ```\n    select\
    \ trunc(COMPLETION_TIME),count(*)*100 size_in_MB\n    from v$archived_log\n  \
    \  group by  trunc(COMPLETION_TIME);\n    TRUNC(COM SIZE_IN_MB\n    ---------\
    \ ----------\n    15-MAY-11        500\n    ```\n    Run tests after installing\
    \ Goldengate to measure your specific transaction mix and load, and to gauge the\
    \ total disk space required for trail files.\n\n#### Network Requirements\n\n\
    Since Oracle Goldengate software operates between source and target systems over\
    \ networks, you must configure TCP/IP networking to accommodate all hosts within\
    \ DNS to include host names that will be included in the Oracle Goldengate infrastructure\
    \ deployed. In the event of firewalls, hosts must be allowed to send and receive\
    \ data for open ports that the `manager`, `Extract`, and `Replicat` processes\
    \ require access to in order to send and receive data. This range of ports must\
    \ be allocated for the Goldengate environments.\n\nAlso allocate ports for Goldengate\
    \ `manager`, `Extract`, and `Replicat` processes. By default, `manager` uses port\
    \ `7840`. We recommend that you keep this port available. In addition, keep a\
    \ record of ports allocated to Goldengate processes to avoid port conflicts.\n\
    \n#### Operating System Requirements\n\nFollowing are some requirements when running\
    \ under Windows:\n\n*   You must use the Administrator account to install the\
    \ Oracle Goldengate software.\n*   You must Install the Microsoft Visual C ++\
    \ 2005 SP1 Redistributable Package. You must use SP1 for these libraries. You\
    \ can obtain the correct version for your specific Windows platform at [`www.microsoft.com`](http://www.microsoft.com).\n\
    \nUnder Linux or UNIX, you should do the following:\n\n*   Grant read and write\
    \ privileges for the operating system (OS) account used to install the Oracle\
    \ Goldengate software.\n*   Place the Oracle Goldengate software on a shared disk\
    \ in a clustered environment, or on a shared clustered filesystem that all cluster\
    \ nodes have access to.\n*   Install from an operating and database system account\
    \ that has read/write access to Oracle database software, as well as to the Oracle\
    \ online redo log files.\n\n![images](images/square.jpg) `Note` For Itanium you\
    \ must install the `vcredist_IA64.exe` runtime library package which provides\
    \ the mandatory Visual Studio DLL libraries required for running Oracle Goldengate\
    \ on the Windows Itanium platform.\n\n#### Requirements for Microsoft Windows\
    \ Clustered Environments\n\nGoldengate has some unique requirements that apply\
    \ to Windows environments using Microsoft Clusters. Execute the following steps\
    \ before performing your install:\n\n1.  As administrator privileged account,\
    \ log on to one of the cluster nodes.\n2.  Select a drive that has resource membership\
    \ within the same Microsoft Windows Cluster group.\n3.  Make sure that the disk\
    \ group has cluster node ownership.\n4.  Place the Oracle Goldengate software\
    \ on a shared drive accessible by all nodes in the cluster."
