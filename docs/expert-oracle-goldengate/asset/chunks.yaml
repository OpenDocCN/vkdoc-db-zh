    \ GoldenGate 数据库用户连接到它。第 11 章 更详细地介绍了故障排除。\n\n让我们对 Replicat RHREMD1 执行一个 `INFO`\
    \ 命令来检查状态：\n\n```shell\nGGSCI (targetserver) 2> info replicat RHREMD1\n\nREPLICAT\
    \   RHREMD1   Last Started 2011-01-22 22:40   Status RUNNING\nCheckpoint Lag \
    \      00:00:00 (updated 00:00:09 ago)\nLog Read Checkpoint  File dirdat/l2000003\n\
    \                     2011-01-20 14:04:28.998416  RBA 3695\n```\n\n从 `INFO` 命令的输出可以看出，Replicat\
    \ RHREMD1 正在 `RUNNING`。检查点延迟是指写入跟踪文件的最后一个检查点与 GoldenGate 处理该记录的时间之间的时间延迟。你当前没有任何检查点延迟。如果检查点延迟很高，可能表明存在性能问题，或者\
    \ Replicat 正在追赶大量的变更。你还可以看到跟踪文件 `l2000003` 是 Replicat 的数据源，包括最后一次日志读取检查点时间和该记录在跟踪文件中的\
    \ RBA。GoldenGate 也将跟踪文件号称为外部序列号 (`EXTSEQNO`)。本例中，`EXTSEQNO` 是 3。如果需要，你可以从特定的 `EXTSEQNO`\
    \ 开始 GoldenGate Replicat 的处理。\n\n你可以在 `INFO` 命令中添加 `DETAIL` 选项以查看关于 Replicat 的更多信息。详细显示可能有助于查看\
    \ Replicat 的重要文件位置，例如参数文件和报告文件。以下示例对 Replicat RHREMD1 执行带有详细选项的 `INFO` 命令：\n\n\
    ```shell\nGGSCI (targetserver) 3> info replicat RHREMD1, detail\n\nREPLICAT  \
