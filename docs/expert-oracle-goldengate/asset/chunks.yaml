- fmt: "#### Oracle GoldenGate Extract Process Failures\n\nOracle GoldenGate Extract\
    \ process failures can occur either on the source systems or on the intermediate\
    \ systems that use a data pump Extract process. Because the Extract process communicates\
    \ with the source database, Manager process, and target Replicat processes, if\
    \ there is a failure with these Oracle GoldenGate processes, then Extract either\
    \ hangs or abends and fail. When you’re dealing with an Extract failure, you should\
    \ first run the Oracle GoldenGate GGSCI `VIEW REPORT` command to examine the current\
    \ status of your Oracle GoldenGate environment. If the Extract process fails on\
    \ the source system, run the following command:\n\n```\nGGSCI> VIEW REPORT <extract\
    \ name>\n```\n\nExamine the output from the `VIEW REPORT` command in GGSCI; the\
    \ details provide clues to further investigation for resolving the Extract failure.\
    \ After you’ve resolved the issue, you need to restart the Extract process by\
    \ executing the GGSCI `START EXTRACT <extract name>` command. Issue the command\
    \ with the `DETAIL` option, as shown here:\n\n```\nGGSCI> START EXTRACT <extract\
    \ name>, DETAIL\n```\n\nNow, let’s look with an example of an Extract process\
    \ failing on an Oracle 11g source database server. To view a report from GoldenGate,\
    \ execute the command `GGSCI` to enter the GoldenGate command-line interface,\
    \ and then enter `VIEW REPORT EATAA`, which references the name of the sample\
    \ Extract process group:\n\n```\nGGSCI (oracledba) 3> view report eataa\n***********************************************************************\n\
    \                 Oracle GoldenGate Capture for Oracle\n                     Version\
    \ 11.1.1.0.0 Build 078\n        Windows (optimized), Oracle 11 on Jul 28 2010\
    \ 18:00:34\n\nCopyright (C) 1995, 2010, Oracle and/or its affiliates. All rights\
    \ reserved.\n                    Starting at 2011-03-14 00:00:32\n***********************************************************************\n\
    Operating System Version:\nMicrosoft Windows Vista Business Edition, on x86\n\
    Version 6.0 (Build 6002: Service Pack 2)\nProcess id: 2524\nDescription:\n***********************************************************************\n\
    **            Running with the following parameters                  **\n***********************************************************************\n\
    --Example Extract Parameter File\nSOURCEISTABLE\n2011-03-14 00:00:33  INFO   \
    \ OGG-01017  Wildcard resolution set to IMMEDIATE bec\nause SOURCEISTABLE is used.\n\
    USERID ggs, PASSWORD *****\nSource Context :\n  SourceModule            : [ggdb.ora.sess]\n\
    \  SourceID                : [../gglib/ggdbora/ocisess.c]\n  SourceFunction  \
    \        : [OCISESS_try]\n  SourceLine              : [498]\n2011-03-14 00:00:33\
    \  ERROR   OGG-00664  OCI Error during OCIServerAttach (status\n = 12560-ORA-12560:\
    \ TNS:protocol adapter error).\n2011-03-14 00:00:33  ERROR   OGG-01668  PROCESS\
    \ ABENDING.\n```\n\nIn this case, Extract fails to run due to an Oracle protocol\
    \ network error on the source database server. The network error is caused by\
    \ a failed Oracle 11g network listener (TNS) failing to start correctly. You troubleshoot\
    \ the error by examining the `listener.ora` and `tnsnames.ora` network configuration\
    \ and correcting any errors. Then, restart both the Oracle listener and GoldenGate\
    \ processes. By correcting the source Oracle 11g listener protocol error, you\
    \ can successfully restart the Extract process.\n\nAnother useful way to investigate\
    \ Extract failure problems is to run the GGSCI command `INFO <extract name>, DETAIL`\
    \ to obtain a listing of the current Extract file locations for additional analysis:\n\
    \n```\nGGSCI (oracledba) 26> info extora, detail\nEXTRACT    EXTORA    Initialized\
    \   2011-03-13 23:45   Status STOPPED\nCheckpoint Lag       00:00:00 (updated\
    \ 00:22:24 ago)\nLog Read Checkpoint  Oracle Redo Logs\n                     2011-03-13\
    \ 23:45:30  Seqno 0, RBA 0\n  Target Extract Trails:\n  Remote Trail Name    \
    \                            Seqno        RBA     Max MB\n  AA               \
    \                                    0          0         10\n\n  Extract Source\
    \                                  Begin             End\n  Not Available    \
    \                               * Initialized *   2011-03-13 23:45\nCurrent directory\
    \    C:\\ggs_src\nReport file          C:\\ggs_src\\dirrpt\\EXTORA.rpt\nParameter\
    \ file       C:\\ggs_src\\dirprm\\EXTORA.prm\nCheckpoint file      C:\\ggs_src\\\
    dirchk\\EXTORA.cpe\nProcess file         C:\\ggs_src\\dirpcs\\EXTORA.pce\nError\
    \ log            C:\\ggs_src\\ggserr.log\n```\n\nNext, let’s look at more difficult\
    \ situations that occur when an Oracle GoldenGate process fails without providing\
    \ you with a report.\n\n#### Oracle GoldenGate Process Failures Without Report\
    \ Diagnostics\n\nIf an Oracle GoldenGate process fails before first writing out\
    \ a report file to standard screen output, you can run it from the operating system’s\
    \ command shell (not GGSCI) to send process information to the terminal. To investigate,\
    \ you can issue the startup by using the syntax `<process> paramfile <path name>.prm`\
    \ at the operating-system level where `<process>` indicates either the Extract\
    \ or Replicat process for Oracle GoldenGate and `paramfile` is the fully qualified\
    \ file name of the parameter file for the Extract or Replicat. Here’s an example:\n\
    \n```\nC:\\ggs_src>extract paramfile C:\\ggs_src\\dirprm\\extora.prm\nVersion\
    \ 6.0 (Build 6002: Service Pack 2)\nProcess id: 6056\nDescription:\n2011-03-14\
    \ 00:19:46  ERROR   OGG-00664  OCI Error beginning session (status = 10\n17-ORA-01017:\
    \ invalid username/password; logon denied).\n2011-03-14 00:19:46  ERROR   OGG-01668\
    \  PROCESS ABENDING.\n```\n\nOn UNIX and Linux platforms, you need to look for\
    \ a core dump file located under the Oracle GoldenGate home directory where you’ve\
    \ installed the Oracle GoldenGate software.\n\n### Oracle GoldenGate Trail File\
    \ Problems\n\nRecall from earlier chapters that Oracle GoldenGate process groups\
    \ write and read data to special flat files called *trail files* on the source\
    \ and target systems. Failure in processing these trail files halts correct operations\
    \ of the Oracle GoldenGate software. This section looks at the following problems\
    \ that can occur with trail files:\n\n*   Trail files that don’t empty\n*   Trail\
    \ files that don’t roll over\n*   Trail file purging issues\n\n#### Trail Files\
    \ that Don’t Empty\n\nSometimes you encounter a problem with trail files that\
    \ don’t empty and remain full of data. You should check to identify whether the\
    \ trail file in question is a local or remote trail file. If the problem is with\
    \ a local trail file that fails to empty, check for TCP/IP network latency issues\
    \ between the source, intermediate, and target systems. If the remote trail file\
    \ on the target system fails to empty on a regular basis, check to see if your\
    \ Replicat process groups are available, running, and processing data from the\
    \ remote trail files.\n\nIf the Replicat processes are running correctly without\
    \ errors, the cause may be large transactions being processed by the Replicat\
    \ on the target system. In this case, you can split up the tables and partition\
    \ them to break out the large transactions into multiple trail files with additional\
    \ Replicat process groups to process the transactions in parallel. To do so, use\
    \ the Oracle GoldenGate `Replicat` parameter `FILTER` option with the `@RANGE`\
    \ function in the `MAP` statement for the Replicat."
