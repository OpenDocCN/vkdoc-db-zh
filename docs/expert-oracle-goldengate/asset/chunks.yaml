    ### 调优方法论


    在调优 GoldenGate 时，遵循一套标准的性能与调优方法论对您来说至关重要。否则，您可能无法及时察觉性能问题，或者发现自己在解决错误的问题。本章推荐了一套标准方法论，但严格遵循它并非关键。您可以创建自己的方法论，或根据特定环境调整此方法论。最重要的考虑因素是，您确实遵循了一个结构化的方法，该方法预先定义了需求，并指定了后续的测量与验证。采用结构化方法有助于确保您能恰当地响应性能问题，并满足用户的期望。


    以下是 GoldenGate 性能与调优方法论中建议的步骤。步骤 1 和 2 应在项目早期完成：

    1.  定义性能需求。

    2.  创建性能基线。


    步骤 3 至 6 应在识别出调优问题时执行：

    3.  评估当前性能。

    4.  确定问题。

    5.  设计并实施解决方案。

    6.  根据需要重复步骤 3 到 5。


    如果您曾进行过数据库性能与调优，这些步骤看起来可能很熟悉。但在 GoldenGate 复制环境中，每个步骤都有特定的考量。本章将随着您的进度解释并扩展这些步骤。现在，让我们来审视方法论中的第一步：定义性能需求。


    ### 定义性能需求


    成功满足业务用户性能期望的关键在于正确地定义性能需求。没有性能需求，您永远无法知道是否成功达到了用户的期望。当需求被定义并达成一致后，您就可以将调优工作集中在不符合要求的领域。


    您应该在项目早期，甚至在 GoldenGate 安装和配置之前，就定义好 GoldenGate 复制性能需求。之所以这样做，是因为这些需求会对 GoldenGate
    的设置和配置方式产生重大影响。


    复制最重要的性能需求是应用程序可以容忍的延迟量。在收集复制需求时，您应将延迟视为从源到目标复制的整体延迟。稍后，您会将延迟细分为 GoldenGate 环境中具体的
    Extract 和 Replicat 延迟。


    在第 4 章中，您了解了一些驱动复制技术设计的需求。以下两个领域特别与复制的性能和调优相关：


    > *数据时效性*：数据需要多快、多频繁地更新？数据复制中能否容忍任何延迟？如果完全不能容忍延迟且变更量很大，您可能需要在项目中投入更多时间来设计和调优复制，以避免任何延迟。请记住，通常报告系统可以容忍延迟，目标数据无需与源数据完全同步。

    >

    > *数据量*：需要复制多少数据？更新频率如何？您可以检查现有的数据库事务日志文件，以确定源数据库中发生的数据变更量。数据变更量会影响源和目标之间的网络带宽要求，以及跟踪文件所需的磁盘空间量。


    在与业务用户和利益相关者协作解答了这些问题之后，您就可以开始制定您的复制性能需求了。最好保持需求简单易懂。让我们看几个性能需求的例子。


    第一个例子涉及一个重要的高吞吐量在线事务处理数据库，该数据库参与了一个双活复制拓扑。对业务而言，源和目标数据库始终保持近乎同步至关重要。与业务用户协商后，您就以下性能需求达成一致：


    > *复制延迟必须在至少 80%的时间内少于 1 分钟。如果复制延迟超过 1 分钟，应发出警告并密切监控复制状态。如果复制延迟超过 5 分钟，应发出严重警报，并需要立即处理该问题。*


    让我们再看一个不那么关键的复制例子。在此示例中，您正从一个 OLTP 数据库向一个报告数据库运行复制。报告数据库运行在另一个资源利用率很高的服务器上，只有有限的服务器资源可用于确保复制正常运行。该报告用于离线分析目的，数据是否保持最新对业务而言并非至关重要。在这种情况下，您的需求可能如下所示：


    > *从 OLTP 数据库到报告数据库的复制延迟必须在至少 80%的时间内少于 1 小时。如果复制延迟超过 8 小时，应发出警告。如果复制延迟超过 24 小时，应发出严重警报，并需要在次日内解决该问题。*


    您可以看到，这些复制场景各自有非常不同的性能需求。如果未预先正确定义需求，您可能会在调优报告复制上花费所有时间，而实际上双活复制才是最关键的。接下来，让我们看看如何创建性能基线。

    '
- fmt: '## Creating a Performance Baseline


    You should capture a baseline of the performance of your replication environment
    as soon as possible after your environment goes live. A `baseline` is simply a
    set of performance metrics you can capture when your replication is running under
    normal conditions. Normal conditions mean you don''t want to collect your baseline
    metrics while any special or unusual processing is running or if there are any
    existing performance problems. You don''t want to capture the baseline when a
    performance spike is occurring.


    After you''ve captured the baseline, you can use the baseline metrics for comparison
    purposes to identify possible performance problems. You should also capture new
    baselines periodically, particularly when there are major changes in your environment.
    For example, if a new server is added to your database cluster, you should capture
    new baseline metrics because the old metrics are no longer valid.


    Let''s look at a sample of the metrics you should collect for your performance
    baseline:


    > *Server statistics*: For the servers where you have replication running, you
    should collect CPU utilization, disk utilization, and memory usage. How you collect
    these statistics varies by platform. For example, on Linux you may use `SAR` or
    `IOSTAT`, and on Windows you can use `perfmon`. You may even have your own custom
    tools to collect these metrics.

    >

    > *Extract and Replicat statistics*: For each Extract and Replicat, you should
    capture the following metrics:

    >

    > *   *Name and status of each processing group:* You can capture the output of
    the GoldenGate Software Command Interface (GGSCI) `info *` command.

    > *   *Processing statistics:* You can use the `stats` command and get an aggregate
    processing rate for your Extracts and Replicats using a command such as `STATS
    RHREMD1, TOTALSONLY *, REPORTRATE MIN`. You can use this command, for example,
    to get the total operations per minute processed by the Replicat.

    > *   *Processing rate:* [Chapter 5](#Chapter05.html#ch5) showed how to add reporting
    parameters to the Extract and Replicat to automatically report performance statistics.
    You can now view the report file for each Extract and Replicat and record the
    statistics. From the report file, you can record the number of records processed,
    the rate, and the delta.

    > *   *Processing lag:* You can get the approximate lag from the `info` command
    and also the specific lag by running the `lag` command for each Extract and Replicat.

    > *   *Server process statistics:* You can collect server statistics, such as
    memory and CPU usage, specifically for the Extract and Replicat processes. For
    example, on Linux, if you have the `top` command available, you can use a command
    like `top –U gger` to monitor just the GoldenGate gger operating system user processes.

    >

    > *Database performance statistics*: As part of your baseline, you should include
    statistical reports on the source and target database usage, such as an Oracle
    AWR report or a SQL Server dashboard report. This gives you an indication of how
    much database activity is happening during your normal baseline.

    >

    > *Network performance statistics*: You should capture some statistics to indicate
    the network throughput and utilization. You can use tools such as the Windows
    System Monitor or the `netstat` command on Linux to gather these statistics.


    When you''ve collected a solid set of baseline statistics, you''re well-armed
    to deal with any performance issue that may arise. Don''t forget to update these
    baseline statistics periodically.


    The next question you''re probably asking is, what metrics should I collect, and
    for how long? This section offers guidelines for metrics you should collect in
    your performance baseline. Keep in mind that these are only suggestions, and you
    should collect any metrics that can have an influence on the performance of your
    particular replication environment. Collect the metrics for at least for one hour.
    You can collect them for a week or even a month if that makes sense for your particular
    environment. You can also capture metrics for special situations. For example,
    you may have some month-end processing that causes your replication volume to
    increase. You can capture a baseline for this activity when you consider it to
    be running normally and then use the baseline to compare to subsequent months.


    Let''s assume that you''ve done a good job of collecting your baseline statistics,
    and a few weeks later you get a report that the replication is running slowly.
    That triggers you to move to the next step in your process: evaluating the current
    performance.


    ## Evaluating the Current Performance


    When a potential GoldenGate replication performance problem has been reported,
    the next step in the process is to evaluate the current performance against the
    baseline that you recorded earlier. You should follow the exact same steps to
    collect the `current` statistics during the performance problem conditions as
    when you collected the `baseline` performance statistics under normal conditions.


    Let''s look at a sample of some baseline and current processing statistics collected
    for HR Extracts and Replicats as shown in [Table 7-1](#Chapter07.html#tab_7_1).


    `Table 7-1. Extract and Replicat Performance Statistics`


    | **Statistics** | **Baseline** | **Current** |

    | --- | --- | --- |

    | Source CPU % Utilization | 12 | 15 |

    | Target CPU % Utilization | 17 | 73 |

    | Source Disk Reads/sec | 2.1 | 2.9 |

    | Source Disk Writes/sec | 10.1 | 10.6 |

    | Source Disk Service Time | 3.4 | 3.2 |

    | Target Disk Reads/sec | 2.1 | 2.8 |

    | Target Disk Writes/sec | 10.1 | 10.9 |

    | Target Disk Service Time | 3.4 | 3.2 |

    | Local Extract LHREMD1 Status | RUNNING | RUNNING |

    | Data Pump PHREMD1 Status | RUNNING | RUNNING |

    | Replicat RHREMD1 Status | RUNNING | RUNNING |

    | Local Extract LHREMD1 Rate/Delta | 20/21 | 20/19 |

    | Data Pump PHREMD1 Rate/Delta | 20/21 | 20/19 |

    | Replicat RHREMD1 Rate/Delta | 15/16 | 9/6 |

    | Replicat RHREMD1 Operations/Min | 1948 | 1232 |

    | Local Extract LHREMD1 Secs Lag | 12 | 11 |

    | Data Pump PHREMD1 Sec Lag | 8 | 9 |

    | Replicat RHREMD1 Secs Lag | 15 | 127 |


    You probably notice some major differences when comparing the baseline statistics
    to the current performance statistics. They may indicate a performance problem,
    but you should be careful not to jump to conclusions. Let''s move on to the next
    step in the tuning process to determine the problem.'
