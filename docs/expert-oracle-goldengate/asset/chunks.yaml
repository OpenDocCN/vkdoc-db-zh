  trans: "\n#### 提取 `tranlogoptions`\n\n默认情况下，Director 不包含 `tranlogoptions`。`tranlogoptions`\
    \ 参数控制 Oracle GoldenGate 与事务日志的交互方式；它是特定于数据库的。要添加 `tranlogoptions`，请在 图 10-22\
    \ 所示的参数列表中选中它，然后单击“插入”。要访问以下对话框，请单击任意映射图标的“参数”选项卡上的“插入”按钮。\n\n![images](img/1022.jpg)\n\
    \n`图 10-22.` 提取 `tranlogoptions` 参数\n\nDirector 不验证参数。它会将属性追加到单个 `tranlogoptions`\
    \ 行中，并且不会为您进行“去重”。您可以每行插入一个 `tranlogoptions` 项，如下所示：\n\n```\nTRANLOGOPTIONS ASMUSER\
    \ SYS@ASM, ASMPASSWORD AEBIZD,ENCRYPTKEY DEFAULT\nTRANLOGOPTIONS ALTARCHIVELOGDEST\
    \ /ggs/gg_archive\nTRANLOGOPTIONS CONVERTUCS2CLOBS\n```\n\n#### 生成定义文件\n\n生成定义文件与添加\
    \ trandata 选项类似。若没有 Director，您需要使用 `DEFGEN` 实用程序来创建定义文件。要在 Director 中创建定义文件，请在图中选择数据源对象，然后选择\
    \ 控制 ![images](img/U001.jpg) 查看详细信息。接着，单击“定义文件”选项卡，如 图 10-23 所示。\n\n![images](img/1023.jpg)\n\
    \n`图 10-23.` 源定义和目标定义文件的生成\n\n为您需要添加到源/目标定义文件的每个表输入数据库访问信息。在“选择表”框中选中一个或多个表，完成后单击“传输定义”。表将通过\
    \ Manager 进程自动传输到目标/源位置。您可能在源或目标端为每个模式拥有多个定义文件；如果是这样，请连接这些文件，或者将它们追加到现有的 `sourcedef`\
    \ 文件中，如 图 10-24 所示。\n\n![images](img/1024.jpg)\n\n`图 10-24.` 将源或目标定义插入参数文件\n\n\
    请务必将 `sourcedef`/`targetdef` 文件添加到提取或复制进程的参数文件中。使用提取或复制进程的“参数”选项卡上的“插入参数”选项来执行此操作。\n\
    \n#### 在 Director 中查找参数或属性\n\nDirector 并未在 GUI 界面中实现所有参数，包括 `TRANSMEMORY` 等许多参数。您必须使用“编辑参数”功能手动添加这些参数。在某些情况下，属性也会缺失，例如\
    \ `FETCHOPTIONS NOUSESNAPSHOT`。为了解决这种情况，您可以添加 `FETCHOPTIONS` 并在文本框中手动输入 `NOUSESNAPSHOT`。\n\
    \nOracle GoldenGate 还会压缩参数。`nocompressupdates` 参数不会出现在列表中，但如果您选择了 `compressupdates`，则可以在下拉列表中选择\
    \ `nocompressupdates`，如 图 10-25 所示。\n\n![images](img/1025.jpg)\n\n`图 10-25.` `Nocompressupdates`\
    \ 位于下拉列表中，而不是参数列表面板中。\n\n如您在 图 10-25 中所见，`compressdeletes` 参数不在列表中；`nocompressdeletes`\
    \ 也不在。如果您需要在跟踪文件中获取被删除行的完整值，这些参数就非常重要。您必须使用“编辑参数”功能来添加它们。\n\n#### 高级映射\n\n在图中选择\
    \ `EXTGGS1` 的映射图标，然后单击“参数”选项卡上的“更改”按钮（如果需要添加新映射则单击“插入”）；将打开如 图 10-26 所示的对话框。请注意，如果您在“更改映射”对话框中更改了“映射类型”，对话框中的*所有*属性都将消失；它们仍在参数文件中，但您必须重新打开此对话框才能使它们重新出现。\n\
    \n![images](img/1026.jpg)\n\n`图 10-26.` 映射类型具有许多属性。\n\n图 10-27 显示了 `SQL Exec`\
    \ 参数编辑器。如果没有 Director Client 界面，调试 `SQL Exec` 语句会非常困难，并且会导致许多语法错误。因为没有好的 IDE 用于编辑参数文件，您必须使用\
    \ `vi` 或其他通用文本编辑器。\n\n![images](img/1027.jpg)\n\n`图 10-27.` 用于查询和 PL/SQL 的 `SQL\
    \ Exec` 编辑器\n\n在您单击“确定”按钮后，Director 会自动为您创建以下参数代码。没有 Director Client，您必须在文本编辑器中逐字输入这些内容，并确保语法完全一致。\n\
    \n```\nextract EXTGGS1\nuserid gg_director2, password gg_director2\ndiscardfile\
    \ C:\\ggs\\dirrpt\\EXTGGS1.dsc, purge\n\nexttrail C:\\ggs\\dirdat\\C1\ntable GG_DIRECTOR2.ACCOUNTB,\
    \ colmap (usedefaults,\nphone=@strext(phone,2,6)), fetchcolsexcept (userid), where\
    \ (userid=\"hello\"),\nkeycols (userid), sqlexec (spname GG_DIRECTOR2.ggs_test.MyFunction,\
    \ id get_userid,\n params (param1=userid), allparams required), tokens (DBUSERID\
    \ = @GETENV (\"ORAENVIRONMENT\", \"DBLOGINUSER\"), SYSDATE = @GETENV (\"ORATRANSACTION\"\
    , \"TIMESTAMP\"), OPERATION = @GETENV(\"GGHEADER\",\"OPTYPE\"));\n```\n\n####\
    \ 警报\n\nOracle GoldenGate 没有任何内置警报功能。如果任何进程失败或挂起，如果您不监控系统，您将不会知道。您必须手动编写警报脚本，如第\
    \ 8 章所述，或者您可以使用 Director。使用 Director，设置警报非常容易。为此，请单击主屏幕上的“我的警报”选项卡。\n\n只有两种类型的警报：检查点延迟和\
    \ `ggserr.log` 文件中的事件文本。让我们看两个例子。\n\n首先，假设您希望设置一个事件文本警报，用于检查任何包含 *ABEND* 的消息。此类消息也应出现在\
    \ `/var/log/messages` 和 Windows 事件日志中。“AbendAlert”警报条目应类似于 图 10-28。\n\n![images](img/1028.jpg)\n\
    \n`图 10-28.` 事件文本警报\n\n以下是添加此警报的步骤：\n\n1.  在“警报类型”下拉列表中，选择“事件文本”。\n2.  在“数据源”下拉列表中，选择\
    \ `localhost_gg` 或您拥有运行 Manager 进程的数据源。\n3.  在“进程名称”文本框中，输入 ***** 表示所有进程。或者，要使用单个进程，请键入其名称，例如\
    \ `EXTGGS1`。\n4.  在“当事件类型是”下拉列表中，选择“仅错误”。您正在创建一个 *ABEND* 警报，而 abend 是一种错误。\n5.\
    \  在“并且事件文本包含”文本框中，输入 **ABEND**。这是实际出现在 `ggserr.log` 和 `/var/log/` 消息中的文本。\n6.\
    \  在“msgFrom 值”字段中，输入您想要的任何内容，以便您知道是谁发送的警报。\n7.  在“smtphost”字段中，输入任何 SMTP 邮件中继服务器。\n\
    8.  在“subjectline”字段中，输入类似 **EXTGGS1 has abended** 的内容。\n9.  在“reciplist”字段中，输入警报接收者的电子邮件地址。\n\
    \n接下来，让我们设置一个延迟警报。为此，输入如 图 10-29 所示的信息。\n\n![images](img/1029.jpg)\n\n`图 10-29.`\
    \ 提取进程 `EXTGGS1` 的延迟警报\n\nDirector 不需要服务器登录，因为它通过服务器端的 Manager 进程处理所有请求。因此，如果\
    \ Manager 宕机，您将不会收到任何警报。有关更高级的主题，请参阅第 8 章。\n\n### 总结\n\n至此，您应该熟悉了 Director 的进程。Director\
    \ 是一个跨平台工具，因此您可以通过一些微小的更改将其用于其他数据库和平台。这些差异由 Director 在后台处理。\n\n本篇涵盖所有场景超出了范围，但您应该能够使用\
    \ Director 完成以下附加任务：\n\n*   使用 `DDL` 和 `DDLOPTIONS` 参数执行 DDL 同步\n*   使用 `IGNOREREPLICATES`、`GETAPPLOPS`\
    \ 和 `TRANLOGOPTIONS EXCLUDEUSER` 参数进行冲突处理，执行活动-活动同步\n*   使用 `INSERTALLRECORDS`\
    \ 和 `GETUPDATEBEFORES` 更改日志捕获\n*   使用 Director Client 对大多数常见的 Oracle GoldenGate\
    \ 错误进行故障排除和修复\n"
- fmt: '## Troubleshooting Oracle GoldenGate


    As database professionals, one of the most difficult aspects of working with Oracle
    GoldenGate is how to troubleshoot and resolve errors that occur throughout the
    lifecycle of the implementation. Due to the nature of Oracle GoldenGate functionality
    and operations as enterprise software, it involves all layers of the technology
    stack from source to target database to network issues and more. The goal of this
    chapter is to provide you with the best possible overall framework to identify
    and resolve problems that occur within the Oracle GoldenGate ecosystem.


    ### Common Problems and Solutions


    In order to equip you with the best possible approach to solving issues that arise
    with Oracle GoldenGate, you look first into the most commonly found problems by
    using a holistic approach to troubleshooting Oracle GoldenGate environments. Because
    Oracle GoldenGate touches multiple areas including database, network, storage,
    and operating systems, the chapter in turn addresses these areas as related to
    Oracle GoldenGate problem resolution. In preparation for this discussion, it’s
    useful to take a visual approach to Oracle GoldenGate root-cause analysis, as
    shown in [Figure 11-1](#Chapter11.html#fig_11_1).


    ![images](images/1101.jpg)


    **Figure 11-1.** Holistic approach to troubleshooting Oracle Goldengate software


    This chapter examines the following areas that can cause grief in Oracle GoldenGate
    environments:


    *   Process failures

    *   Trail-file issues

    *   Synchronization problems

    *   Startup problems on source and target systems

    *   Database configuration and availability issues


    As part of your journey into troubleshooting Oracle GoldenGate, this chapter provides
    tips and techniques you can use to trace and identify the source of problems so
    you can quickly solve them. Let’s get started!


    ### Oracle GoldenGate Process Failures


    The first type of problem you may encounter within Oracle GoldenGate environments
    are process failures. These may occur on the source, on the target, or on both
    environments for one or more of the Oracle GoldenGate processes.


    Recall from earlier chapters that an Oracle GoldenGate environment consists of
    many different background processes on the source and target database systems,
    such as Extract, Data Pump, Replicat, Collector, and Manager processes. If any
    of these critical processes fail, then replication activities will most likely
    come to a screeching halt, thus impacting data integrity and the operation of
    real-time data transfer between your Oracle GoldenGate environments.


    This section looks first into process failures that occur during normal Oracle
    GoldenGate operations as well as methods to resolve these types of process failures.
    The preliminary task to perform if you find an Oracle GoldenGate process failure
    is to investigate the details by using the GoldenGate Software Command Interface
    (`GGSCI`) command `INFO ALL`:


    ```

    C:\ggs_src>ggsci

    Oracle GoldenGate Command Interpreter for Oracle

    Version 11.1.1.0.0 Build 078

    Windows (optimized), Oracle 11 on Jul 28 2010 17:20:29

    Copyright (C) 1995, 2010, Oracle and/or its affiliates. All rights reserve

    GGSCI (oracledba) 1> info all

    Program     Status      Group       Lag           Time Since Chkpt

    MANAGER     STOPPED

    ```


    In many cases, the `Manager` process fails when network issues occur on either
    the source or target environment for Oracle GoldenGate. You should check to make
    sure the `Manager` process is up and running. If the `Manager` process isn’t running,
    then you need to restart it by executing the following command from within `GGSCI`:


    ```

    GGSCI> START MANAGER

    ```


    To verify that `Manager` has started successfully, issue the Oracle GoldenGate
    `GGSCI` command again after you start it. The following example makes sure `Manager`
    has started correctly and without errors:


    ```

    GGSCI (oracledba) 7> start manager

    Manager started.

    GGSCI (oracledba) 8> info all

    Program     Status      Group       Lag           Time Since Chkpt

    MANAGER     RUNNING

    ```


    As one of the key Oracle GoldenGate processes, the `Manager` process abends or
    fails if network ports are blocked by a firewall. You can check by using the `ping`
    command to verify whether there is a network problem with ports. You should work
    closely with your network or system administrator to ensure that the ports allocated
    by the `Manager` process are open and available so that `Manager` can communicate
    with both the source and target systems for Oracle GoldenGate.'
