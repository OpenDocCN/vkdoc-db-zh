    \       RBA: 0\n           File Size: 10M\n```\n\n## SEND\n\nGGSCI 命令`SEND`用于更新消息传递工具以刷新状态报告实用程序。此外，您可以使用它向\
    \ Oracle GoldenGate 处理组发送处理指令——例如，指示 Extract 或 Replicat 执行特定任务。\n\n示例：\n\n```bash\n\
    GGSCI (oracledba) 37> send mgr, getlag\n```\n\n## STATUS\n\n`STATUS`命令允许您检查当前\
    \ Oracle GoldenGate 环境中处理组（如 Replicat 和 Manager）的当前状态。\n\n示例：\n\n```bash\nGGSCI\
    \ (oracledba) 40> status mgr\n```\n\n```text\nManager is running (IP port oracledba.50001).\n\
    ```\n\n您可以在 Oracle GoldenGate 文档中在线提供的参考指南中找到完整的命令列表。\n\n### 用于故障排除的 Logdump 命令和语法\n\
    \nOracle GoldenGate Logdump 实用程序是分析和故障排除的瑞士军刀。您应该理解并学会使用它，因为它是您工具库中的一个强大工具。通过使用\
