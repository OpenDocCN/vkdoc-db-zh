    \      73236\n```\n\n## Using Vericom Command Line\n\nVericom command-line scripts\
    \ are usually used to automate the scheduled jobs. It can be used to override\
    \ the settings in groups, compare pairs, and profiles. For example, you can override\
    \ the `sql-predicates` with system dates to compare the most recent data only.\
    \ Set up number of threads depending on the day or night jobs.\n\nBy default,\
    \ Vericom will run the job in the background and it will not wait for the job\
    \ to finish before returning the prompt.\n\n```\nC:\\Veridata\\server\\bin>vericom\
    \ -j job_big_table\nConnecting to: localhost:4150\nRun ID: (1035, 0, 0)\n```\n\
    \nThe exit code will be zero if the job started successfully, but it will not\
    \ tell you if any compares fail.\n\nIf you want to kick off the job to capture\
    \ the detail messages and status, you can use either `–w` or `–wp` arguments.\
    \ `–wp <number>` is poll interval in minutes.\n\n```\nC:\\Veridata\\server\\bin>vericom\
    \ -j job_big_table -w\nConnecting to: localhost:4150\nRun ID: (1035, 0, 0)\n \
    \                             Job Start Time: 2011-05-01 22:12:57\n          \
    \                     Job Stop Time: 2011-05-01 22:13:02\n                   \
    \  Job Report Filename: C:\\00001035\\job_big_table.rpt\n                 Number\
    \ of Compare Pairs: 1\n     Number of Compare Pairs With Errors: 0\n        Number\
    \ of Compare Pairs With OOS: 0\n     Number of Compare Pairs With No OOS: 1\n\
    \       Number of Compare Pairs Cancelled: 0\n                   Job Completion\
    \ Status: IN SYNC\n```\n\nYou can also redirect the output to a file and email\
    \ to the monitoring team. The `–w` or `–wp` arguments will return the correct\
    \ Exit codes.\n\n```\nThere are six exit statues from the GoldenGate manuals.\n\
    \n0: The Vericom command finished successfully.  If –w or –wp was not specified,\
    \ the exit status is 0 if the job started successfully.  The actual compare errors\
    \ will not be captured.\n1: Invalid vericom syntax was used.\n2: Vericom could\
    \ not find the connection information by looking in the veridata.loc or veridata.cfg,\
    \ and the connection parameter “{ -url | -u } <url>” is not specified with the\
    \ command arguments.\n3: Syntax is correct, but missing required flags.  For example,\
    \ if –j or –c is specified, then –g <group> input is required.\n4: Job ran successfully,\
    \ but the compare status has something other than in–sync.\n5: Communication error\
    \ with Oracle Veridata Server.\n```\n\nFor a full list of the Vericom command\
    \ arguments, type `vericom –helprun`.\n\n## Setting Up Role-Based Security\n\n\
    Veridata role-based security is very easy to set up. It already defines a fixed\
    \ number of roles. You just need to add users or groups to the pre-defined roles,\
    \ then Veridata will apply the security for you.\n\nTo configure the security\
    \ role, use the following link to get to the Tomcat Web Server Administration\
    \ Tool screen as shown in [Figure 9-8](#Chapter09.html#fig_9_8): `http://<hostname>:<port>/admin`.\n\
    \nThe default Apache Tomcat Web Server port is 8830. To change the default port,\
    \ modify the `server.xml` file in the `<Veridata_install_dir>/server/web/conf`\
    \ directory. Search for 8830 and replace it with another port number.\n\n![images](images/0908.jpg)\n\
    \n**Figure 9-8.** User definition roles in Tomcat Web Server Administration Tool\n\
    \nHere are the descriptions of the role names:\n\n*   `Administrator`: This is\
    \ the admin id that you use for the login initially. This role can perform all\
    \ functions.\n*   `DetailReportView`: This is the `ReportViewer` role, but it\
    \ can also view the out-of-sync report information through the Web interface or\
    \ at the file level. Some business-sensitive information may be in the detail\
    \ reports.\n*   `PowerUser`: As with the admin role, you can do everything except\
    \ any configuration function on the server side.\n*   `ReportViewer`: With this\
    \ role, you only can view the reports, jobs, and configurations.\n\n## Summary\n\
    \nOracle GoldenGate Veridata is a comparison tool that enables the comparison\
    \ to be performed on changing data, something that is impossible with any other\
    \ tool. It has very good security built-in, so it can be used by both IT and business\
    \ users to protect business-sensitive data.\n\nVeridata can be used in both the\
    \ command-line and Web-based client. It is flexible enough to integrate with the\
    \ existing Extract Transform and Load (ETL) and monitoring processes.\n\nThe performance\
    \ of Veridata is impressive; it has the right architecture to compare data between\
    \ two databases with “compressed” row hash values. With proper setup, there is\
    \ no other data-comparison tool that can perform better than Veridata."
