    \n![images](images/square.jpg)\n## 索引\n\n## 关于作者\n\n![image](images/ben_prusinski.jpg)\
    \ ![images](images/square.jpg)`Ben Prusinski` 是一名 `Oracle` 认证专家（`OCP`）和数据库架构师，拥有超过\
    \ `14` 年的 `Oracle` 数据仓库和 `Oracle E-Business` 应用程序经验。作为企业数据库顾问，`Ben` 已为数十家财富 `500`\
    \ 强客户提供服务。他是 `Oracle` 高可用性、性能调优、数据库安全和 `ERP` 实施方面的国际公认专家。作为顶级 `Oracle` 专家，`Ben`\
    \ 于 `2009` 年获得了著名的 `Oracle ACE` 奖，以表彰他对 `Oracle` 社区的贡献。作为 `Oracle GoldenGate`\
    \ 认证助理，`Ben` 是 `Oracle OpenWorld`、拉丁美洲智利 `Oracle` 用户组（`CLOUG`）、独立 `Oracle` 用户组（`IOUG`）和\
    \ `Oracle Collaborate OAUG`（`Oracle` 应用程序用户组）等主要会议上的热门演讲者。除了为客户提供 `Oracle` 咨询服务外，`Ben`\
    \ 还定期更新他的 `Oracle` 博客 [`http://oracle-magician.blogspot.com`](http://oracle-magician.blogspot.com)，分享最新的数据库技术技巧和信息。`Ben`\
    \ 也是一位多语言者，精通西班牙语、法语、韩语和英语，他喜欢去异国他乡旅行。在空闲时间，`Ben` 喜欢参加汽车障碍赛、打高尔夫、练习武术、阅读和烹饪。\n\
    \n![image](images/steve_phillips.jpg) ![images](images/square.jpg)`Steve Phillips`\
    \ 是 `Hewlett-Packard Enterprise Services` 的信息系统架构师，拥有超过二十五年的计算机数据库工作经验。`Steve`\
    \ 是 `Oracle` 认证专家，曾在 `Oracle Openworld` 和 `IOUG` 上演讲。`Steve` 拥有德克萨斯大学达拉斯分校的信息系统硕士学位，目前居住在德克萨斯州的普莱诺。在业余时间，`Steve`\
    \ 喜欢打网球、指导棒球和观看体育比赛。\n\n![image](images/richard_chung.jpg) ![images](images/square.jpg)`Richard\
    \ Chung` 拥有 `19` 年的 `IT` 环境各方面实践经验。他近期专注于商业智能领域，如报表、`ETL` 和数据架构。`Richard` 是喜达屋酒店及度假村国际集团的首席\
    \ `BI` 和系统架构师，他在那里构建了当前的数据仓库和报表应用程序；他还编写了高度复杂的搜索引擎，并设计了 `ETL` 来近实时地填充活动数据仓库。`Golden\
    \ Gate` 用于同步美国不同城市的关键业务数据。在加入喜达屋之前，他曾在一家初创公司 [dot.com](http://dot.com)、`JP Morgan\
