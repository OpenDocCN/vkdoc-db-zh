    ### Using Vericom Command Line


    Vericom command-line scripts are usually used to automate the scheduled jobs.
    It can be used to override the settings in groups, compare pairs, and profiles.
    For example, you can override the sql-predicates with system dates to compare
    the most recent data only. Set up number of threads depending on the day or night
    jobs.


    By default, Vericom will run the job in the background and it will not wait for
    the job to finish before returning the prompt.


    `C:\Veridata\server\bin>vericom -j job_big_table`

    `Connecting to: localhost:4150`

    `Run ID: (1035, 0, 0)`


    The exit code will be zero if the job started successfully, but it will not tell
    you if any compares fail.


    If you want to kick off the job to capture the detail messages and status, you
    can use either `–w` or `–wp` arguments. `–wp <number>` is poll interval in minutes.


    `C:\Veridata\server\bin>vericom -j job_big_table -w`

    `Connecting to: localhost:4150`

    `Run ID: (1035, 0, 0)`

    `                          Job Start Time: 2011-05-01 22:12:57`

    `                           Job Stop Time: 2011-05-01 22:13:02`

    `                     Job Report Filename: C:\00001035\job_big_table.rpt`

    `                 Number of Compare Pairs: 1`

    `     Number of Compare Pairs With Errors: 0`

    `        Number of Compare Pairs With OOS: 0`

    `     Number of Compare Pairs With No OOS: 1`

    `       Number of Compare Pairs Cancelled: 0`

    `                   Job Completion Status: IN SYNC`


    You can also redirect the output to a file and email to the monitoring team. The
    `–w` or `–wp` arguments will return the correct Exit codes.


    `There are six exit statues from the GoldenGate manuals.`


    `0: The Vericom command finished successfully.  If –w or –wp was not specified,
    the exit status is 0 if the job started successfully.  The actual compare errors
    will not be captured.`

    `1: Invalid vericom syntax was used.`

    `2: Vericom could not find the connection information by looking in the veridata.loc
    or veridata.cfg, and the connection parameter “{ -url | -u } <url>” is not specified
    with the command arguments.`

    `3: Syntax is correct, but missing required flags.  For example, if –j or –c is
    specified, then –g <group> input is required.`

    `4: Job ran successfully, but the compare status has something other than in–sync.`

    `5: Communication error with Oracle Veridata Server.`


    For a full list of the Vericom command arguments, type **vericom –helprun**.


    ### Setting Up Role-Based Security


    Veridata role-based security is very easy to set up. It already defines a fixed
    number of roles. You just need to add users or groups to the pre-defined roles,
    then Veridata will apply the security for you.


    To configure the security role, use the following link to get to the Tomcat Web
    Server Administration Tool screen as shown in [Figure 9-8](#Chapter09.html#fig_9_8):
    [`http://<hostname>:<port>/admin`](http://%3Chostname%3E:%3Cport%3E/admin)`.`


    The default Apache Tomcat Web Server port is 8830\. To change the default port,
    modify the server.xml file in the `<Veridata_install_dir>/server/web/conf` directory.
    Search for 8830 and replace it with another port number.


    ![images](images/0908.jpg)


    ***Figure 9-8.** User definition roles in Tomcat Web Server Administration Tool*


    Here are the descriptions of the role names:


    *   *Administrator*: This is the admin id that you use for the login initially.
    This role can perform all functions.

    *   *DetailReportView*: This is the ReportViewer role, but it can also view the
    out-of-sync report information through the Web interface or at the file level.
    Some business-sensitive information may be in the detail reports.

    *   *PowerUser*: As with the admin role, you can do everything except any configuration
    function on the server side.

    *   *ReportViewer*: With this role, you only can view the reports, jobs, and configurations.


    ### Summary


    Oracle GoldenGate Veridata is a comparison tool that enables the comparison to
    be performed on changing data, something that is impossible with any other tool.
    It has very good security built-in, so it can be used by both IT and business
    users to protect business-sensitive data.


    Veridata can be used in both the command-line and Web-based client. It is flexible
    enough to integrate with the existing Extract Transform and Load (ETL) and monitoring
    processes.


    The performance of Veridata is impressive; it has the right architecture to compare
    data between two databases with “compressed” row hash values. With proper setup,
    there is no other data-comparison tool that can perform better than Veridata.


    ## C H A P T E R  10'
  trans: "\n# 第 10 章\n\n## 使用性能统计\n\nVeridata 会为每次运行保留一些性能统计信息；它们位于“已完成作业”面板中，如图 9-7\
    \ 所示。您可以利用这些统计信息为生产环境运行做准备；例如，计算每个作业的运行时间并进行性能调优。\n\n![images](img/0907.jpg)\n\
    \n**图 9-7.** 性能统计\n\n您还可以通过在同一屏幕中单击“报告”链接，在“比较对报告”中查看详细的性能信息。以下是“比较对报告”的示例：\n\n\
    ```\nProcessing first rowhash block from source at 2011-04-23 19:01:09.\nProcessing\
    \ first rowhash block from target at 2011-04-23 19:01:10.\n\nPerformance Statistics\
    \ for source Rowhash at 2011-04-23 19:01:10.\n\n                     rows: 73236\n\
    \          duration (secs): 00:00:01\n                 rows/sec: 73236.00\n  \
    \              row bytes: 7937097\n            row bytes/sec: 7937097\n      \
    \          bytes/row: 108\n             rh bytes/row: 4\n             rows skipped:\
    \ 333760\n           blocks skipped: 0\n           hash comp rate: 0.04\n    \
    \      total comp rate: 0.02\n        pct time fetching: 0.00\n         pct time\
    \ waiting: 0.00\n     time until first row: 00:00:00\n                 ipc msgs:\
    \ 12\n                ipc bytes: 2337393\n                bytes/msg: 194782\n\
    \     compressed bytes/msg: 72710\n                bytes/sec: 2337393\n     compressed\
    \ bytes/sec: 872521\n    msg compression ratio: 0.37\n\nNSORT statistics:\nNsort\
    \ version 3.4.29 (Windows-x86 32-bit) using 49M of memory out of 50M\nPointer\
    \ sort performed Sat Apr 23 19:01:08 2011\n      Input Phase       Output Phase\
    \          Overall\nElapsed     2.03               0.08               2.11\nI/O\
    \ Busy    2.02   100%        0.01   100%        2.03\nAction  User   Sys Busy\
    \    User   Sys Busy    User   Sys Busy\nmain    0.00  0.00   0%    0.00  0.00\
    \   0%    0.00  0.00   0%\n  1     0.14  0.00   7%    0.00  0.00   0%    0.14\
    \  0.00   7%\n  2     0.12  0.00   6%    0.02  0.00  25%    0.14  0.00   7%\n\
    All     0.26  0.00  13%    0.02  0.00  25%    0.28  0.00  13%\n    Majflt    Minflt\
    \  Sort Procs Aio Procs/QueueSize RegionKB\n     0/0           0           2 \
    \         0/0              512\nFile Name                   I/O Mode Busy   Wait\
    \ MB/sec  Xfers        Bytes     Records\nInput Reads\n  <release records>   \
    \      buffered 100%   1.08   1.08      9      2186324       73236\nOutput Writes\n\
    \  <return records>          buffered 100%   0.00 218.63      9      2186324 \
    \      73236\n```\n\n## 使用 Vericom 命令行\n\nVericom 命令行脚本通常用于自动化计划作业。它可以用来覆盖组、比较对和配置文件中的设置。例如，您可以使用系统日期覆盖\
    \ `sql-predicates`，以仅比较最新数据。根据白天或晚上的作业设置线程数。\n\n默认情况下，Vericom 会在后台运行作业，并且在返回命令提示符之前不会等待作业完成。\n\
    \n```\nC:\\Veridata\\server\\bin>vericom -j job_big_table\nConnecting to: localhost:4150\n\
    Run ID: (1035, 0, 0)\n```\n\n如果作业成功启动，退出代码将为零，但它不会告知您是否有任何比较失败。\n\n如果您希望启动作业以捕获详细消息和状态，可以使用\
    \ `–w` 或 `–wp` 参数。`–wp <number>` 是以分钟为单位的轮询间隔。\n\n```\nC:\\Veridata\\server\\\
    bin>vericom -j job_big_table -w\nConnecting to: localhost:4150\nRun ID: (1035,\
    \ 0, 0)\n                              Job Start Time: 2011-05-01 22:12:57\n \
    \                              Job Stop Time: 2011-05-01 22:13:02\n          \
    \           Job Report Filename: C:\\00001035\\job_big_table.rpt\n           \
    \      Number of Compare Pairs: 1\n     Number of Compare Pairs With Errors: 0\n\
    \        Number of Compare Pairs With OOS: 0\n     Number of Compare Pairs With\
    \ No OOS: 1\n       Number of Compare Pairs Cancelled: 0\n                   Job\
    \ Completion Status: IN SYNC\n```\n\n您还可以将输出重定向到文件并通过电子邮件发送给监控团队。使用 `–w` 或 `–wp`\
    \ 参数将返回正确的退出代码。\n\n```\nThere are six exit statues from the GoldenGate manuals.\n\
    \n0: The Vericom command finished successfully.  If –w or –wp was not specified,\
    \ the exit status is 0 if the job started successfully.  The actual compare errors\
    \ will not be captured.\n1: Invalid vericom syntax was used.\n2: Vericom could\
    \ not find the connection information by looking in the veridata.loc or veridata.cfg,\
    \ and the connection parameter “{ -url | -u } <url>” is not specified with the\
    \ command arguments.\n3: Syntax is correct, but missing required flags.  For example,\
    \ if –j or –c is specified, then –g <group> input is required.\n4: Job ran successfully,\
    \ but the compare status has something other than in–sync.\n5: Communication error\
    \ with Oracle Veridata Server.\n```\n\n有关 Vericom 命令参数的完整列表，请输入 `vericom –helprun`。\n\
    \n## 设置基于角色的安全性\n\nVeridata 基于角色的安全性设置非常简单。它已经定义了固定数量的角色。您只需将用户或组添加到预定义的角色中，然后\
    \ Veridata 就会为您应用安全性。\n\n要配置安全角色，请使用以下链接进入 Tomcat Web 服务器管理工具屏幕，如图 9-8 所示：`http://<hostname>:<port>/admin`。\n\
    \n默认的 Apache Tomcat Web 服务器端口是 8830。要更改默认端口，请修改 `<Veridata_install_dir>/server/web/conf`\
    \ 目录中的 `server.xml` 文件。搜索 8830 并将其替换为其他端口号。\n\n![images](img/0908.jpg)\n\n**图\
    \ 9-8.** Tomcat Web 服务器管理工具中的用户定义角色\n\n以下是角色名称的描述：\n\n*   `Administrator`：这是您最初用于登录的管理员\
    \ ID。此角色可以执行所有功能。\n*   `DetailReportView`：这是 `ReportViewer` 角色，但它还可以通过 Web 界面或在文件级别查看不同步报告信息。详细报告中可能包含一些业务敏感信息。\n\
    *   `PowerUser`：与管理员角色一样，您可以执行除服务器端任何配置功能之外的所有操作。\n*   `ReportViewer`：拥有此角色，您只能查看报告、作业和配置。\n\
    \n## 总结\n\nOracle GoldenGate Veridata 是一种比较工具，能够对变化的数据执行比较，这是任何其他工具都无法做到的。它内置了非常好的安全性，因此可以由\
    \ IT 和业务用户使用，以保护业务敏感数据。\n\nVeridata 可以在命令行和基于 Web 的客户端中使用。它足够灵活，可以与现有的提取转换和加载（ETL）以及监控流程集成。\n\
    \nVeridata 的性能令人印象深刻；它具有正确的架构，可以通过“压缩”的行哈希值来比较两个数据库之间的数据。通过适当设置，没有其他数据比较工具的性能可以优于\
    \ Veridata。\n"
- fmt: '## GoldenGate Director


    Oracle GoldenGate Director 是一个多层 GUI 应用程序，支持开发和监控几乎所有的 Oracle GoldenGate 进程。有了
    Director，你无需记忆参数和参数语法。在参数文件中，代码的顺序很重要。Director 会为你处理好这个顺序。不过，你始终可以使用 `Param File
    Editor` 手动覆盖参数。它还提供上下文相关的帮助，为你提供有关参数作用的高级指导。


    为了管理 Oracle GoldenGate，你通常需要为每个运行 GoldenGate 的服务器打开许多 SSH 窗口。有了 Director，你不再需要登录到所有服务器。你只需要登录到
    Director Client；然后就可以管理 Director 存储库中设置的所有 Oracle GoldenGate 服务器。GoldenGate 开发人员/管理员甚至无需知道
    `UNIX/Windows` 登录信息。如果你的 GoldenGate 服务器位于不同的平台和数据库上，无需登录到每个系统是一个非常好的特性——Director
    会为你处理数据库版本和平台特定的命令与参数。


    GoldenGate 软件命令接口 (`GGSCI`) 命令行没有自动化的监控和告警功能。Director 显示每个进程近乎实时的滞后情况。你还可以在几分钟内设置好滞后和异常结束报告，而无需编写任何自定义脚本。


    凭借所有这些功能，Director 能够加速大多数 Oracle GoldenGate 任务的开发、缩短学习曲线并加快测试速度。设置一个初始加载任务只需两分钟，设置一个简单的
    `Extract` 和 `Replicat` 大约需要五分钟。


    本章将介绍 Director 的关键组件。然后，你将逐步完成设置初始加载、单向复制和数据泵过程。最后，本章将讨论 Director 的一些高级功能。


    ### Director 组件


    Director 由五个组件组成，如图 10-1 所示。它们分别是：运行着 `Manager` 进程的 GoldenGate `GGSCI` 实例；用于配置
    GoldenGate Director 的 Director Administrator；管理所有作业的 Director Server/数据库；用于执行简单监控和管理的
    Director Web；以及最后用于执行所有 Director 任务的 Desktop Client。


    ![images](images/1001.jpg)


    `Figure 10-1. Director components`


    #### GoldenGate GGSCI 实例


    GoldenGate Director 可以链接到 Director Client 应用程序中的许多 `Manager` 进程或称为数据源。Director
    Server 连接到 `GGSCI` 实例所需的唯一参数是 `Manager` 的 IP 地址和端口号。


    #### Director Administrator


    Director Administrator 用于设置所有 `GGSCI` 实例配置。所有这些信息都存储在 Director 存储库数据库中。


    #### Director Server 和数据库


    Director Server 作为一个 WebLogic 域运行。启动 Director Server 时，无需运行默认的 WebLogic 域。但是，你需要安装
    WebLogic 服务器组件。Director Monitor Agent 是 Director Server 的一部分，因此在安装过程中你无需执行任何操作。Director
    存储库数据库以明文格式存储所有配置和统计信息，因此我们可以查询表以进行临时报告。


    #### Director Web


    Director Web 监控和控制 Oracle GoldenGate `Extract` 和 `Replicat` 进程。它通常由监控软件的生产支持团队使用。Director
    Web 允许你启动和停止进程；但你无法更改参数文件，因此无法使用 Director Web 进行高级编程。它有一个有限的 `GGSCI` 接口，可用于管理
    `Extract` 和 `Replicat` 进程。请参阅 Oracle GoldenGate 管理员指南以获取支持的 `GGSCI` 命令。


    要使用 Director Web，请在 Web 浏览器中输入以下 URL：


    `http:/dirhost.abc.com:7001/acon`


    将 `dirhost.abc.com` 更改为你 Director Server 的 IP 或主机名。`7001` 是默认的 WebLogic 端口；要将默认端口更改为其他端口，你需要在
    Director 域中更改 `config.xml` 文件：


    `<listen-port>80</listen-port>`

    `<listen-port-enabled>true</listen-port-enabled>`


    使用 Director Web，你甚至可以从任何兼容的浏览器管理和监控 Oracle GoldenGate 任务，包括 Blackberry、iPhone
    和 iPad，如图 10-2 所示。


    ![images](images/1002.jpg)


    `Figure 10-2. Oracle GoldenGate Director Web on iPad`


    #### Director Client


    在桌面上，Director Client 可以创建/更改/删除参数和跟踪文件。它还显示可用的 Oracle GoldenGate 参数的在线帮助。


    在使用 Director 桌面客户端或 Web 应用程序之前，你必须在 `GGSCI` 实例中设置 `Manager` 进程并启动它——如果没有启动并运行
    `Manager`，你将无法执行任何操作。Director Web 和 Director Client 都依赖于 `Manager` 进程来控制 `Extract`
    和 `Replicat`。因此，你无法使用 Director Client 或 Web 修改 `Manager` 参数文件。


    本书中你将使用 Director Client。你在 Director Web 中可以做的任何事情，在 Director Client 中也可以做。它们的界面相似。


    本章向你展示如何使用桌面上的 Director Client 设置一些基本和高级的 Oracle GoldenGate 映射。你跳过了一些 Oracle GoldenGate
    概念，因为它们在前面的章节、管理员指南、参考指南和 Director 在线帮助中有所介绍。


    Director Client 是一个 GUI 应用程序。本章包含许多截图，因此在按照示例操作时，你可以确保与书中内容一致。在 Director Client
    中，相同的菜单栏或按钮的行为可能因你高亮显示的对象而异。例如，当你高亮显示提取对象、数据源和跟踪文件时，“查看详细信息”菜单项会显示不同的对话框。


    遵循本章开头的步骤很重要；后面的一些基础说明可以跳过。当你熟悉了 Director 界面后，有些任务比单独使用 `GGSCI` 更简单、更快捷。在 Oracle
    GoldenGate `Manager` 运行的情况下，你甚至无需接触 `vi` 或记事本来执行大多数常见的开发任务。'
  raw: '## GoldenGate Director


    Oracle GoldenGate Director is a multi-tiered GUI application that enables the
    development and monitoring of almost all Oracle GoldenGate processes. With Director,
    you don’t need to remember the parameter and argument syntax. In parameter files,
    the order of the codes is important. Director takes care of the order for you.
    However, you always can use Param File Editor to overwrite parameters manually.
    It also offers context-sensitive help that gives you high-level assistance on
    what the parameters do.


    In order to administer Oracle GoldenGate, you have to open many SSH windows for
    each server on which GoldenGate is running. With Director, you no longer need
    to log in to all the servers. You only need to log in to the Director Client;
    then you can administer all the Oracle GoldenGate servers that are set up in the
    Director repository. GoldenGate developers/administrators don’t even need to know
    the UNIX/Windows login. Not having to log in to each system is a very nice feature
    if your GoldenGate servers are on different platforms and databases—Director handles
    the database versions and platform-specific commands and parameters for you.


    The GoldenGate Software Command Interface (GGSCI) command line doesn’t have an
    automated monitoring and alert feature. Director displays the near real-time lag
    on each process. You can also set up lag and abend reports in a few minutes without
    writing any custom scripts.


    With all these features, Director enables rapid development, a faster learning
    curve, and quicker testing for most Oracle GoldenGate tasks. It only takes two
    minutes to set up an initial load task and about five minutes to set up a simple
    Extract and Replicat.


    This chapter goes over the key components the Director. Then you walk through
    the process of setting up the initial load, one-way replication, and the data-pump
    process. At the end, the chapter discusses some of Director’s advanced features.


    ### Director Components


    Director consists of five components, as shown in [Figure 10-1](#Chapter10.html#fig_10_1).
    They are GoldenGate GGSCI instances that have Manager processes running, Director
    Administrator that is used to configure the GoldenGate Director, Director Server/database
    that manages all the jobs, Director Web that is used to do some simple monitoring
    and administrations, and lastly, Desktop Client that is used to do all the Director
    tasks.


    ![images](images/1001.jpg)


    ***Figure 10-1.** Director components*


    #### GoldenGate GGSCI Instances


    GoldenGate director can link to many Manager processes or referred data source
    in the Director Client application. The Manager IP address and port number are
    the only required parameters required for Director Server to connect to the GGSCI
    instances.


    #### Director Administrator


    Director Administrator is used to set up all the GGSCI instance configurations.
    All of this information is stored in the Director repository database.


    #### Director Server and Database


    Director Server runs as a WebLogic domain. There is no need to run the default
    WebLogic domain when you start up Director Server. However, you need to install
    the WebLogic server components. Director Monitor Agent is part of Director Server,
    so you don’t need to do anything during the installation process. Director Repository
    database stores all the configurations and the statistics in clear text format,
    so we can query the tables for our ad-hoc reporting.


    #### Director Web


    Director Web monitors and controls the Oracle GoldenGate Extract and Replicat
    processes. It’s usually used by the production support team that is monitoring
    the software. Director Web allows you to start and stop the process; but you can’t
    change the parameter files, so you can’t do advanced programming with Director
    Web. It has a limited GGSCI interface that you can use to manage the Extract and
    Replicat processes. Refer to the Oracle GoldenGate Administrator’s Guide for the
    supported GGSCI commands.


    To use Director Web, type this URL in your web browser:


    `http:/dirhost.abc.com:7001/acon`


    Change `dirhost.abc.com` to your Director Server IP or hostname. 7001 is default
    WebLogic port; to change the default port to something else, you need to change
    the `config.xml` file in the Director domain:


    `<listen-port>80</listen-port>`

    `<listen-port-enabled>true</listen-port-enabled>`


    With Director Web, you can even administer and monitor Oracle GoldenGate tasks
    from any compatible browser, including Blackberry, iPhone, and iPad, as shown
    in [Figure 10-2](#Chapter10.html#fig_10_2).


    ![images](images/1002.jpg)


    ***Figure 10-2.** Oracle GoldenGate Director Web on iPad*


    #### Director Client


    On the desktop, Director Client can create/change/delete the parameter and trail
    files. It also displays online help for the available Oracle GoldenGate parameters.


    Before using the Director desktop client or web application, you have to set up
    the Manager process in a GGSCI instance and start it—you can’t do anything without
    Manager started and running. Both Director Web and Director Client depend on the
    Manager process to control the Extract and Replicat. Therefore, you can’t modify
    the Manager parameter files using either Director Client or Web.


    You use the Director Client in this book. Anything you can do in Director Web,
    you also can do in Director Client. Their interfaces are similar.


    This chapter shows you how to set up some basic and advanced Oracle GoldenGate
    mappings using Director Client on the desktop. You skip some Oracle GoldenGate
    concepts because they’re covered in previous chapters, the Administrator’s Guide,
    the Reference Guides, and Director Online Help.


    Director Client is a GUI application. This chapter includes a number of screenshots
    so you can be sure you’re on the same page as you follow along with the examples.
    In Director Client, the same menu bar or button may behave differently depending
    on which object you’ve highlighted. For example, the View Detail menu item displays
    different dialogs when you highlight Extract Object, Data Source, and Trail Files.


    It’s important to follow the steps at the beginning of the chapter; you skip some
    basic instructions later. When you’re familiar with the Director interfaces, some
    tasks are easier and faster than the GGSCI alone. With Oracle GoldenGate Manager
    running, you don’t even need to touch vi or Notepad to perform most common development
    tasks.'
