    Next, let''s review the `HANDLECOLLISIONS` parameter.'
  trans: '#### 配置 Replicat


    在开始配置 Replicat 之前，您应返回并仔细检查目标服务器上的先决条件，正如章节“设置复制的先决条件”中所涵盖的内容。当您确认满足所有先决条件后，即可开始配置
    Replicat。为此，您首先需要为 Replicat 创建一个参数文件。请记住，您正在配置 Replicat 以应用来自 HR 模式的所有 DML 更改。


    ![images](img/square.jpg) **注意** 您可以直接从 GGSCI 编辑 GoldenGate 参数，或使用 GGSCI 外部的原生操作系统文本编辑器进行编辑，任选最方便的方式即可。要在
    GGSCI 中编辑，您输入 `EDIT PARAMS` *`参数文件名`*。GGSCI 会在默认文本编辑器中打开参数文件，对于 Windows 是记事本，对于
    UNIX 和 Linux 是 vi。您可以使用 GGSCI 中的 `SET EDITOR` 命令更改默认编辑器。如果您直接从操作系统编辑，请将参数文件保存在
    GoldenGate 软件安装目录下的 `/dirprm` 子目录中。在本例中，该目录为 `/gger/ggs/dirprm`。


    让我们首先看一下以下示例中 RHREMD1 的 Replicat 参数：


    ```

    GGSCI (targetserver) 1> edit params RHREMD1


    Replicat RHREMD1

    -------------------------------------------------------------------

    -- 用于 HR 模式的 Replicat

    -------------------------------------------------------------------


    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)

    USERID GGER@TargetDB, PASSWORD userpw


    HandleCollisions


    AssumeTargetDefs


    Map HR.*, Target HR.* ;

    ```


    让我们更详细地检查这些参数。请记住，GoldenGate 的配置参数比示例中使用的要多得多。您可以参考 *Oracle GoldenGate Reference
    Guide* 以获取所有参数的详细描述。我通常会查阅 *Oracle GoldenGate Reference Guide* 中的“字母顺序参考”部分，以便快速找到参数及其含义和各种选项。


    ![images](img/square.jpg) **提示** 您可以在参数文件中一行的开头使用双破折号 (`--`) 来添加注释。


    让我们从回顾下一节中的 `Replicat` 参数开始。


    ##### Replicat


    与初始加载 Replicat 一样，使用 `Replicat` 参数来定义 GoldenGate 持续更改 Replicat 组。您应遵循前面介绍的命名标准。


    在示例中，Replicat 组被命名为 RHREMD1。其中 *R* 表示这是持续更改的 Replicat。*HREM* 表示您将此 Replicat 组用于人力资源员工应用程序和
    HR 模式。*D* 表示您在开发环境中运行。最后，*1* 表示这是此模式和应用程序的第一个 Replicat 组。您可以添加额外的并行 Replicat 组以提高性能，如
    第 7 章 所述。


    ##### SETENV


    正如我们在初始加载 Replicat 中所示，您可以使用 `SETENV` 参数来覆盖默认的环境变量设置。在示例中，您将 `NLS_LANG` 显式设置为
    `AMERICAN_AMERICA.AL32UTF8`。设置 `NLS_LANG` 而不让其默认使用环境设置是一个好习惯。因为本地 Extract 和 Replicat
    的 `NLS_LANG` 可能不同。如果 `NLS_LANG` 不正确，可能会导致复制失败或复制不正确的数据。对于 Replicat，`NLS_LANG`
    需要与其正在读取的跟踪文件中数据的 NLS 字符集相匹配，该跟踪文件源自源数据库。


    除了 `NLS_LANG`，您还可以使用 `SETENV` 参数设置其他环境变量。例如，您可以如以下所示设置 `ORACLE_HOME` 和 `ORACLE_SID`。在示例中，我选择使用
    Oracle 网络 TNS 别名 `TargetDB` 来设置 Oracle 环境，而不是使用 `SETENV`。您也可以在进入 GGSCI 之前设置 `ORACLE_HOME`
    和 `ORACLE_SID`，而不使用 TNS 别名或 `SETENV`。只要变量值有效，这些方法中的任何一种都可以工作：


    ```

    SETENV (ORACLE_HOME = "/u01/app/oracle/product/11.1.0")

    SETENV (ORACLE_SID = "TargetDB")

    ```


    接下来，让我们查看 `USERID` 参数。


    ##### USERID


    使用 `USERID` 参数，您可以指定用于连接到目标数据库的 GoldenGate 数据库用户 ID 和密码。GoldenGate 密码可以加密。第 5
    章 讨论了加密。


    对于 SQL Server，您可以将 `SOURCEDB` 参数与 `USERID` 选项一起使用，如下所示：


    ```

    SOURCEDB sqlserver, userid sa, PASSWORD userpw

    ```


    `SOURCEDB` 指定 SQL Server ODBC 数据源，`USERID` 指定数据库用户 ID。如果您使用 Windows 身份验证，则可以省略
    `USERID` 和 `PASSWORD` 选项。


    ![images](img/square.jpg) **注意** 所列参数的顺序很重要。例如，`REPLICAT` 参数必须是参数文件中的第一个条目。


    接下来，让我们查看 `HANDLECOLLISIONS` 参数。'
- fmt: '## HANDLECOLLISIONS


    你可以使用`HANDLECOLLISIONS`参数让Replicat在目标端应用更改时尝试解析数据错误或冲突。当目标行缺失或重复时，就可能发生冲突。GoldenGate的默认处理方式是不自动处理冲突，这可以通过使用`NOHANDLECOLLISIONS`参数来设置。


    `HANDLECOLLISIONS`主要用于初始加载，但也可以在其他时候谨慎地用于错误解析。在初始加载期间，你可能会遇到由加载过程中持续发生的更改导致的重复或缺失数据错误。例如，如果某一行在初始加载期间被更新然后被删除，GoldenGate可能会尝试将更新应用到从未加载的已删除行上。另一个例子是在需要将Replicat通过向后重新定位在跟踪文件中来重新处理事务的问题情况下。如果你添加了`HANDLECOLLISIONS`参数，GoldenGate会尝试自动解析这些错误。


    `HANDLECOLLISIONS`在处理更改时执行以下操作：


    -   对缺失行的更新操作将被忽略。

    -   对缺失行的删除操作将被忽略。

    -   重复的插入操作会被更改为更新操作。


    在GoldenGate处理完初始数据加载点或问题情况后，你应该尽快关闭`HANDLECOLLISIONS`。你可以通过移除Replicat参数文件中的`HANDLECOLLISIONS`参数（或添加`NOHANDLECOLLISIONS`参数）并重新启动Replicat来实现这一点。另一种关闭`HANDLECOLLISIONS`的方法是使用`SEND`命令，如下所示，直接与正在运行的Replicat通信。如果你选择这种方法，别忘了之后也要从Replicat参数文件中移除`HANDLECOLLISIONS`参数，以免下次重新启动Replicat时无意中再次启用它。以下示例将RHREMD1
    Replicat设置为使用`NOHANDLECOLLISIONS`：


    ```

    GGSCI (targetserver)> send replicat RHREMD1 NOHANDLECOLLISIONS HR.*

    Sending NOHANDLECOLLISIONS request to REPLICAT RHREMD1 ...

    RHREMD1 NOHANDLECOLLISIONS set for 1 tables and 1 wildcard entries

    ```


    关闭`HANDLECOLLISIONS`的原因是，在正常的处理条件下，你希望GoldenGate在发生冲突时创建错误条件并停止处理。可能存在需要调查的严重问题。在这些情况下，你需要研究问题的根本原因，而不是让`HANDLECOLLISIONS`掩盖问题并让GoldenGate继续处理。


    你可以使用`STATS REPLICAT`命令查看Replicat是否遇到了任何冲突。它会显示是否有冲突以及每种DML语句类型的冲突数量。有关输出示例，请参阅“验证Replicat”部分。


    ![images](images/square.jpg) **提示** 特定加载实用程序提供了可避免使用`HANDLECOLLISIONS`参数的技术。例如，你可以将Oracle
    RMAN克隆过程用于初始加载，并启动GoldenGate Replicat定位到跟踪文件中与来自RMAN的Oracle系统更改号（SCN）相对应的特定提交序列号（CSN）之后。有关更多详细信息，请下载白皮书*Oracle
    GoldenGate最佳实践：从Oracle源进行实例化*。你可以在`support.oracle.com`找到该白皮书，文章ID 1276058.1。


    接下来，让我们回顾一下`ASSUMETARGETDEFS`参数。


    ## ASSUMETARGETDEFS


    当源表和目标表相同时，你可以使用`ASSUMETARGETDEFS`参数。在示例中，源和目标上的HR模式是相同的。为了让GoldenGate认为这些表相同，它们必须具有相同的列名、数据类型、大小和语义，并且以相同的顺序出现。如果你在源和目标上使用的数据库表不同，你需要生成一个数据定义文件。[第5章](#Chapter05.html#ch5)介绍了如何使用数据定义文件。


    ## MAP


    你使用`MAP`参数来指定从源表到目标表的映射。这些源表是你之前在Extract中使用`TABLE`参数指定的。在示例中，你使用通配符将源数据库上HR模式中的所有表映射到目标数据库上的HR模式。


    与`TABLE`参数类似，`MAP`参数是一个复杂的参数，有许多选项，允许你过滤行、映射列、转换数据等。[第5章](#Chapter05.html#ch5)介绍了其中一些选项。现在，让我们保持简单，只指示GoldenGate复制HR模式的所有更改。你可以通过使用通配符`HR.*`轻松完成此操作，这告诉GoldenGate复制HR模式中的*所有*表。你也可以逐个列出每个表，但使用通配符要容易得多。你还假设源模式和目标模式是匹配的。如果它们不匹配，你可以使用`MAP`参数选项（如`COLMAP`）来映射不同的源列和目标列。


    ![images](images/square.jpg) **注意** 请注意，`MAP`参数必须以分号结尾。


    接下来，让我们看看如何添加Replicat组。


    ### 添加Replicat


    现在你已经设置了Replicat配置参数，下一步是添加Replicat组。以下示例将RHREMD1 Replicat添加到GoldenGate配置中：


    ```

    GGSCI (targetserver) > ADD REPLICAT RHREMD1, EXTTRAIL dirdat/l2

    ```


    让我们更详细地查看每个命令。


    第一个命令`ADD REPLICAT`，使用上一节中定义的配置参数添加Replicat。添加Replicat后，它会在跟踪文件中建立检查点以跟踪处理进度。`ADD
    REPLICAT`命令的`EXTTRAIL`参数告诉GoldenGate使用特定的跟踪文件供Replicat处理。该示例使用跟踪文件`l2`作为Replicat的源。这是由你的数据泵Extract写入的跟踪文件。在示例中，我们采用默认值并从第一个跟踪文件的开头开始处理。你还可以告诉Replicat在特定时间戳或使用特定的跟踪文件编号开始应用更改。


    ![images](images/square.jpg) **提示** 你应该将`ADD REPLICAT`等命令存储在`diroby`目录中的一个obey文件中。你可以使用`obey`
    *`filename`*命令从GGSCI命令提示符执行这些命令。这是一个很好的做法，因为这些命令可以随时作为未来的参考，或者如果你需要在某个时候重复这些命令。[第14章](#Chapter14.html#ch14)更详细地介绍了obey文件。


    现在你可以继续启动Replicat。


    ### 启动和停止Replicat


    添加Extract后，你需要启动它才能真正开始向目标数据库应用更改。以下示例启动Replicat RHREMD1：


    ```

    GGSCI (targetserver) > START REPLICAT RHREMD1

    ```


    如果需要，你可以使用类似的方法停止Replicat。例如，你可能需要更改GoldenGate Replicat参数。为此，你停止Replicat，对参数文件进行更改，然后重新启动Replicat以使新更改生效。以下示例展示了如何停止Replicat
    RHREMD1：


    ```

    GGSCI (targetserver) > STOP REPLICAT RHREMD1

    ```


    下一节将介绍如何验证Replicat。'
  raw: '##### HANDLECOLLISIONS


    You can use the `HANDLECOLLISIONS` parameter to have the Replicat attempt to resolve
    data errors or collisions when applying changes on the target. A collision can
    happen when the target row is either missing or a duplicate. The default processing
    for GoldenGate is not to automatically handle collisions, which can be set using
    the `NOHANDLECOLLISIONS` parameter.


    `HANDLECOLLISIONS` is used mostly during initial loads, but it can also be used
    with care at other times for error resolution. During the initial load, you may
    run into errors with duplicate or missing data caused by the ongoing changes during
    the load. For example, if a row was updated and then deleted during the initial
    load, GoldenGate may try to apply the update to the deleted row that was never
    loaded. Another example is in problem situations where you need to have the Replicat
    reprocess transactions by repositioning it backward in the trail file. If you
    add the `HANDLECOLLISIONS` parameter, GoldenGate tries to resolve these errors
    automatically.


    `HANDLECOLLISIONS` does the following when processing changes:


    *   Updates to rows that are missing are ignored.

    *   Deletes to rows that are missing are ignored.

    *   Inserts that are duplicated are changed to updates.


    You should turn off `HANDLECOLLISIONS` as soon as possible after GoldenGate has
    completed processing past the point of the initial data load or past the problem
    situation. You can do this by removing the `HANDLECOLLISIONS` parameter in the
    Replicat parameter file (or adding the `NOHANDLECOLLISIONS` parameter) and restarting
    the Replicat. Another way to turn off `HANDLECOLLISIONS` is to use the `SEND`
    command, as shown next, to communicate directly with the running Replicat. If
    you choose this method, don''t forget to also go back and remove the `HANDLECOLLISIONS`
    parameter from your Replicat parameter file so you don''t inadvertently turn it
    on again the next time the Replicat is restarted. The following example sets the
    RHREMD1 Replicat to use `NOHANDLECOLLISIONS`:


    `GGSCI (targetserver)> send replicat RHREMD1 NOHANDLECOLLISIONS HR.*`

    `Sending NOHANDLECOLLISIONS request to REPLICAT RHREMD1 ...`

    `RHREMD1 NOHANDLECOLLISIONS set for 1 tables and 1 wildcard entries`


    The reason for turning off `HANDLECOLLISIONS` is that under normal processing
    conditions, you want GoldenGate to create an error condition if a collision occurs
    and to stop processing. There may be a serious problem that needs to be investigated.
    In those cases, you need to research the root cause of the problem rather than
    have `HANDLECOLLISIONS` mask the problem and GoldenGate continue processing.


    You can see if the Replicat encountered any collisions by using the `STATS REPLICAT`
    command. It shows you if there were any collisions and how many for each type
    of DML statement. See the section “Verifying the Replicat” for an example of the
    output.


    ![images](images/square.jpg) **Tip** Techniques are available with specific load
    utilities that allow you to avoid using the `HANDLECOLLISIONS` parameter. For
    example, you can use the Oracle RMAN clone process for the initial load and start
    the GoldenGate Replicat to position after a specific Commit Sequence Number (CSN)
    in the trail corresponding to the Oracle System Change Number (SCN) from RMAN.
    For more details, download the white paper *Oracle GoldenGate Best Practices:
    Instantiation from an Oracle Source*. You can find the white paper at `support.oracle.com`,
    Article ID 1276058.1.


    Next, let''s review at the `ASSUMETARGETDEFS` parameter.


    ##### ASSUMETARGETDEFS


    You can use the `ASSUMETARGETDEFS` parameter when your source and target tables
    are identical. In the example, the HR schema on the source and target is identical.
    For GoldenGate to consider the tables identical, they must have the same column
    names, data types, sizes, and semantics, and appear in the same order. If the
    database tables being used on the source and target are different, you need to
    generate a data-definitions file instead. [Chapter 5](#Chapter05.html#ch5) covers
    using a data-definitions file.


    ##### MAP


    You use the `MAP` parameter to specify the mapping from your source tables to
    the target tables. The source tables you specified previously in the Extract with
    the `TABLE` parameter. In the example, you use wildcarding to map all the tables
    in the HR schema on the source database to the HR schema on the target database.


    Similar to the `TABLE` parameter, the `MAP` parameter is a complex parameter that
    has many options that allow you to filter rows, map columns, transform data, and
    so on. [Chapter 5](#Chapter05.html#ch5) covers some of these options. For now,
    let''s keep it simple and just instruct GoldenGate to replicate all the changes
    for the HR schema. You can do this easily by using wildcarding with `HR.*`, which
    tells GoldenGate to replicate *all* of the tables in the HR schema. You could
    also list each of the tables individually, but using the wildcard is much easier.
    You also assume that your source and target schemas match. If they didn''t, you
    could use `MAP` parameter options such as `COLMAP` to map the different source
    and target columns.


    ![images](images/square.jpg) **Note** Notice that the `MAP` parameter must end
    in a semicolon.


    Next, let''s look at adding the Replicat group.


    #### Adding the Replicat


    Now that you''ve set up the Replicat configuration parameters, the next step is
    to add the Replicat group. The following example adds the RHREMD1 Replicat to
    the GoldenGate configuration:


    `GGSCI (targetserver) > ADD REPLICAT RHREMD1, EXTTRAIL dirdat/l2`


    Let''s look at each of the commands in more detail.


    The first command, `ADD REPLICAT`, adds the Replicat using the configuration parameters
    defined in the last section. After the Replicat is added, it establishes checkpoints
    in the trail file to keep track of processing. The `EXTTRAIL` parameter of the
    `ADD REPLICAT` command tells GoldenGate to use a specific trail file for the Replicat
    to process. The example uses trail file `l2` as the source for the Replicat. This
    is the trail file that was written by your data-pump Extract. In the example,
    you take the defaults and start processing at the beginning of the first trail
    file. You can also tell Replicat to begin applying changes at a specific timestamp
    or using a specific trail-file number.


    ![images](images/square.jpg) **Tip** You should store commands such as `ADD REPLICAT`
    in an obey file in the `diroby` directory. You can execute these from the GGSCI
    command prompt using the `obey` *`filename`* command. This is good practice because
    the commands are readily available as a future reference or if you need to repeat
    the commands at some point. [Chapter 14](#Chapter14.html#ch14) covers obey files
    in more detail.


    Now you can proceed with starting the Replicat.


    #### Starting and Stopping the Replicat


    After adding the Extract, you need to start it to actually begin applying changes
    to the target database. The following example starts the Replicat RHREMD1:


    `GGSCI (targetserver) > START REPLICAT RHREMD1`


    If needed, you can stop the Replicat using a similar method. For example, you
    may need to make a change to the GoldenGate Replicat parameters. To do that, you
    stop the Replicat, make the changes to the parameter file, and then start the
    Replicat for the new changes to take effect. The following example shows how to
    stop the Replicat RHREMD1:


    `GGSCI (targetserver) > STOP REPLICAT RHREMD1`


    The next section looks at verifying the Replicat.'
  trans: '

    ## 处理冲突


    你可以使用`HANDLECOLLISIONS`参数，使 Replicat 在目标端应用更改时尝试解析数据错误或冲突。当目标行缺失或重复时，就可能发生冲突。GoldenGate
    的默认处理方式是不自动处理冲突，这可以通过使用`NOHANDLECOLLISIONS`参数来设置。


    `HANDLECOLLISIONS`主要用于初始加载，但也可以在其他时候谨慎地用于错误解析。在初始加载期间，你可能会遇到由加载过程中持续发生的更改导致的重复或缺失数据错误。例如，如果某一行在初始加载期间被更新然后被删除，GoldenGate
    可能会尝试将更新应用到从未加载的已删除行上。另一个例子是在需要将 Replicat 通过向后重新定位在跟踪文件中来重新处理事务的问题情况下。如果你添加了`HANDLECOLLISIONS`参数，GoldenGate
    会尝试自动解析这些错误。


    `HANDLECOLLISIONS`在处理更改时执行以下操作：


    -   对缺失行的更新操作将被忽略。

    -   对缺失行的删除操作将被忽略。

    -   重复的插入操作会被更改为更新操作。


    在 GoldenGate 处理完初始数据加载点或问题情况后，你应该尽快关闭`HANDLECOLLISIONS`。你可以通过移除 Replicat 参数文件中的`HANDLECOLLISIONS`参数（或添加`NOHANDLECOLLISIONS`参数）并重新启动
    Replicat 来实现这一点。另一种关闭`HANDLECOLLISIONS`的方法是使用`SEND`命令，如下所示，直接与正在运行的 Replicat 通信。如果你选择这种方法，别忘了之后也要从
    Replicat 参数文件中移除`HANDLECOLLISIONS`参数，以免下次重新启动 Replicat 时无意中再次启用它。以下示例将 RHREMD1
    Replicat 设置为使用`NOHANDLECOLLISIONS`：


    ```

    GGSCI (targetserver)> send replicat RHREMD1 NOHANDLECOLLISIONS HR.*

    Sending NOHANDLECOLLISIONS request to REPLICAT RHREMD1 ...

    RHREMD1 NOHANDLECOLLISIONS set for 1 tables and 1 wildcard entries

    ```


    关闭`HANDLECOLLISIONS`的原因是，在正常的处理条件下，你希望 GoldenGate 在发生冲突时创建错误条件并停止处理。可能存在需要调查的严重问题。在这些情况下，你需要研究问题的根本原因，而不是让`HANDLECOLLISIONS`掩盖问题并让
    GoldenGate 继续处理。


    你可以使用`STATS REPLICAT`命令查看 Replicat 是否遇到了任何冲突。它会显示是否有冲突以及每种 DML 语句类型的冲突数量。有关输出示例，请参阅“验证
    Replicat”部分。


    ![images](img/square.jpg) **提示** 特定加载实用程序提供了可避免使用`HANDLECOLLISIONS`参数的技术。例如，你可以将
    Oracle RMAN 克隆过程用于初始加载，并启动 GoldenGate Replicat 定位到跟踪文件中与来自 RMAN 的 Oracle 系统更改号（SCN）相对应的特定提交序列号（CSN）之后。有关更多详细信息，请下载白皮书*Oracle
    GoldenGate 最佳实践：从 Oracle 源进行实例化*。你可以在`support.oracle.com`找到该白皮书，文章 ID 1276058.1。


    接下来，让我们回顾一下`ASSUMETARGETDEFS`参数。


    ## ASSUMETARGETDEFS


    当源表和目标表相同时，你可以使用`ASSUMETARGETDEFS`参数。在示例中，源和目标上的 HR 模式是相同的。为了让 GoldenGate 认为这些表相同，它们必须具有相同的列名、数据类型、大小和语义，并且以相同的顺序出现。如果你在源和目标上使用的数据库表不同，你需要生成一个数据定义文件。第
    5 章介绍了如何使用数据定义文件。


    ## MAP


    你使用`MAP`参数来指定从源表到目标表的映射。这些源表是你之前在 Extract 中使用`TABLE`参数指定的。在示例中，你使用通配符将源数据库上 HR
    模式中的所有表映射到目标数据库上的 HR 模式。


    与`TABLE`参数类似，`MAP`参数是一个复杂的参数，有许多选项，允许你过滤行、映射列、转换数据等。第 5 章介绍了其中一些选项。现在，让我们保持简单，只指示
    GoldenGate 复制 HR 模式的所有更改。你可以通过使用通配符`HR.*`轻松完成此操作，这告诉 GoldenGate 复制 HR 模式中的*所有*表。你也可以逐个列出每个表，但使用通配符要容易得多。你还假设源模式和目标模式是匹配的。如果它们不匹配，你可以使用`MAP`参数选项（如`COLMAP`）来映射不同的源列和目标列。


    ![images](img/square.jpg) **注意** 请注意，`MAP`参数必须以分号结尾。


    接下来，让我们看看如何添加 Replicat 组。


    ### 添加 Replicat


    现在你已经设置了 Replicat 配置参数，下一步是添加 Replicat 组。以下示例将 RHREMD1 Replicat 添加到 GoldenGate
    配置中：


    ```

    GGSCI (targetserver) > ADD REPLICAT RHREMD1, EXTTRAIL dirdat/l2

    ```


    让我们更详细地查看每个命令。


    第一个命令`ADD REPLICAT`，使用上一节中定义的配置参数添加 Replicat。添加 Replicat 后，它会在跟踪文件中建立检查点以跟踪处理进度。`ADD
    REPLICAT`命令的`EXTTRAIL`参数告诉 GoldenGate 使用特定的跟踪文件供 Replicat 处理。该示例使用跟踪文件`l2`作为 Replicat
    的源。这是由你的数据泵 Extract 写入的跟踪文件。在示例中，我们采用默认值并从第一个跟踪文件的开头开始处理。你还可以告诉 Replicat 在特定时间戳或使用特定的跟踪文件编号开始应用更改。


    ![images](img/square.jpg) **提示** 你应该将`ADD REPLICAT`等命令存储在`diroby`目录中的 obey 文件中。你可以使用`obey`
    *`filename`*命令从 GGSCI 命令提示符执行这些命令。这是一个很好的做法，因为这些命令可以随时作为未来的参考，或者如果你需要在某个时候重复这些命令。第
    14 章更详细地介绍了 obey 文件。


    现在你可以继续启动 Replicat。


    ### 启动和停止 Replicat


    添加 Extract 后，你需要启动它才能真正开始向目标数据库应用更改。以下示例启动 Replicat RHREMD1：


    ```

    GGSCI (targetserver) > START REPLICAT RHREMD1

    ```


    如果需要，你可以使用类似的方法停止 Replicat。例如，你可能需要更改 GoldenGate Replicat 参数。为此，你停止 Replicat，对参数文件进行更改，然后重新启动
    Replicat 以使新更改生效。以下示例展示了如何停止 Replicat RHREMD1：


    ```

    GGSCI (targetserver) > STOP REPLICAT RHREMD1

    ```


    下一节将介绍如何验证 Replicat。

    '
- fmt: "## Verifying the Replicat\n\n当 Replicat 启动后，你可以使用 `INFO REPLICAT` 命令来验证其是否正在运行。你应该能看到状态为\
    \ `RUNNING`。如果状态是 `STOPPED` 或 `ABENDED`，则可能存在问题。你可以查阅 GoldenGate 错误日志文件并尝试解决问题。通常，错误可能很简单，比如拼写错误。错误文件名为\
    \ `ggserr.log`，位于 GoldenGate 软件安装目录下。示例中，Linux 系统上的错误日志路径是 `/gger/ggs/ggserr.log`。在\
    \ Windows 上，基于示例的 GoldenGate 错误日志位于 `c:\\gger\\ggs\\ggserr.log`。\n\n如果你的 Replicat\
    \ 无法启动，首先要检查一些明显的问题，例如错误的 GoldenGate 数据库用户 ID 和密码，或者参数文件中的拼写错误。你还应该确认目标数据库是否在线，以及是否可以使用\
    \ GoldenGate 数据库用户连接到它。[第 11 章](#Chapter11.html#ch11) 更详细地介绍了故障排除。\n\n让我们对 Replicat\
    \ RHREMD1 执行一个 `INFO` 命令来检查状态：\n\n```shell\nGGSCI (targetserver) 2> info replicat\
    \ RHREMD1\n\nREPLICAT   RHREMD1   Last Started 2011-01-22 22:40   Status RUNNING\n\
    Checkpoint Lag       00:00:00 (updated 00:00:09 ago)\nLog Read Checkpoint  File\
    \ dirdat/l2000003\n                     2011-01-20 14:04:28.998416  RBA 3695\n\
    ```\n\n从 `INFO` 命令的输出可以看出，Replicat RHREMD1 正在 `RUNNING`。Checkpoint lag 是写入跟踪文件的最后一个检查点与\
    \ GoldenGate 处理该记录的时间之间的时间延迟。你当前没有任何检查点延迟。如果检查点延迟很高，可能表明存在性能问题，或者 Replicat 正在追赶大量的变更。你还可以看到跟踪文件\
    \ `l2000003` 是 Replicat 的数据源，包括最后一次日志读取检查点时间和该记录在跟踪文件中的 RBA。GoldenGate 也将跟踪文件号称为外部序列号\
    \ (`EXTSEQNO`)。本例中，`EXTSEQNO` 是 3。如果需要，你可以从特定的 `EXTSEQNO` 开始 GoldenGate Replicat\
    \ 的处理。\n\n你可以在 `INFO` 命令中添加 `DETAIL` 选项以查看关于 Replicat 的更多信息。详细显示可能有助于查看 Replicat\
    \ 的重要文件位置，例如参数文件和报告文件。以下示例对 Replicat RHREMD1 执行带有详细选项的 `INFO` 命令：\n\n```shell\n\
    GGSCI (targetserver) 3> info replicat RHREMD1, detail\n\nREPLICAT   RHREMD1  \
    \ Last Started 2011-01-22 22:40   Status RUNNING\nCheckpoint Lag       00:00:00\
    \ (updated 00:00:07 ago)\nLog Read Checkpoint  File dirdat/l2000003\n        \
    \             2011-01-20 14:04:28.998416  RBA 3695\n\n  Extract Source       \
    \                           Begin             End\n\n  dirdat/l2000003       \
    \                          2011-01-20 13:57  2011-01-20 14:04\n  dirdat/l2000003\
    \                                 2011-01-20 13:57  2011-01-20 13:57\n  dirdat/l2000003\
    \                                 2011-01-20 13:57  2011-01-20 13:57\n  dirdat/l2000003\
    \                                 2011-01-12 10:59  2011-01-20 13:57\n  dirdat/l2000001\
    \                                 2011-01-07 08:38  2011-01-12 10:59\n  dirdat/l2000000\
    \                                 * Initialized *   2011-01-07 08:38\n  dirdat/l2000000\
    \                                 * Initialized *   First Record\n  dirdat/l2000000\
    \                                 * Initialized *   First Record\n\nCurrent directory\
    \    /gger/ggs\n\nReport file          /gger/ggs/dirrpt/RHREMD1.rpt\nParameter\
    \ file       /gger/ggs/dirprm/RHREMD1.prm\nCheckpoint file      /gger/ggs/dirchk/RHREMD1.cpr\n\
    Process file         /gger/ggs/dirpcs/RHREMD1.pcr\nStdout file          /gger/ggs/dirout/RHREMD1.out\n\
    Error log            /gger/ggs/ggserr.log\n```\n\n最后，你可以对 Replicat 运行 `STATS`\
    \ 命令。这显示了 Replicat 是否实际处理了任何 DML 活动。在示例中，Replicat 自启动以来已处理了四次插入和两次删除。你可能还会注意到\
    \ Replicat 处理了两次插入冲突，因为你必须打开 `HANDLECOLLISIONS` 参数来解决错误。\n\n让我们在以下示例中对 Replicat\
    \ RHREMD1 执行 `STATS` 命令，以查看是否有数据已被处理：\n\n```shell\nGGSCI (targetserver) 2> stats\
    \ rep RHREMD1\n\nSending STATS request to REPLICAT RHREMD1 ...\n\nStart of Statistics\
    \ at 2011-01-18 18:50:38.\n\nReplicating from HR.EMPLOYEES to HR.EMPLOYEES:\n\n\
    *** Total statistics since 2011-01-15 13:54:52 ***\n        Total inserts    \
    \                            4.00\n        Total updates                     \
    \           0.00\n        Total deletes                                2.00\n\
    \        Total discards                               0.00\n        Total operations\
    \                             6.00\n        Total insert collisions          \
    \            2.00\n```\n\n你现在已经完成了基本复制的设置。让我们总结一下你学到的内容。\n\n### Summary\n\n本章介绍了如何设置、配置和验证基本的\
    \ GoldenGate 复制。你了解了如何配置、添加和启动本地 Extract、数据泵 Extract 和 Replicat。你还研究了使用 Oracle\
    \ GoldenGate 直接加载方法以及使用供应商 DBMS 加载实用程序进行初始数据加载的过程。下一章将扩展这些基本概念，并介绍一些高级技术，以使你的复制环境更安全、更易于管理和监控。\n\
    \n## C H A P T E R  5\n\n## Advanced Features\n\n本章深入介绍 GoldenGate 复制的一些高级功能。这些功能通常对于使你的复制能够处理真实世界的生产环境是必要的。此外，你将学习如何配置\
    \ GoldenGate 双向复制，以在主动-主动复制配置中充分利用你的两个数据库服务器。\n\n在[第 4 章](#Chapter04.html#ch4)中，你学习了如何设置和配置基本的\
    \ GoldenGate 复制。在本章中，你将在基本复制的基础上进行扩展，添加功能以使复制更加健壮，并更易于管理和监控。你还将了解一些特定的更改，以使复制在诸如\
    \ Oracle 真应用集群 (RAC) 等专门环境中工作。本章稍后，你将把基本的单向复制扩展为双向复制拓扑。"
  raw: '#### Verifying the Replicat


    When the Replicat has started, you can verify that it''s running using the `INFO
    REPLICAT` command. You should see a status of `RUNNING`. If you see a status of
    `STOPPED` or `ABENDED`, there may be a problem. You can review the GoldenGate
    error log file and try to resolve the problem. Often, the error is something simple
    like incorrect spelling. The error file is named `ggserr.log` and is located in
    the GoldenGate software installation location. In the example, the error log on
    Linux is `/gger/ggs/ggserr.log`. On Windows, the GoldenGate error log based on
    the example is located in `c:\gger\ggs\ggserr.log`.


    If your Replicat won''t start, first check for obvious problems such as the wrong
    GoldenGate database user ID and password or typographical errors in your parameter
    file. You should also verify that the target database is online and that you can
    connect to it using the GoldenGate database user. [Chapter 11](#Chapter11.html#ch11)
    goes more into more detail on troubleshooting.


    Let''s do an `INFO` command on the Replicat RHREMD1 to check the status:


    `GGSCI (targetserver) 2> info replicat RHREMD1`


    `REPLICAT   RHREMD1   Last Started 2011-01-22 22:40   Status RUNNING`

    `Checkpoint Lag       00:00:00 (updated 00:00:09 ago)`

    `Log Read Checkpoint  File dirdat/l2000003`

    `                     2011-01-20 14:04:28.998416  RBA 3695`


    You can see from the `INFO` command that the Replicat RHREMD1 is `RUNNING`. Checkpoint
    lag is the time delay between the last checkpoint written to the trail and the
    time when the record was processed by GoldenGate. You currently don''t have any
    checkpoint lag. If you had a high checkpoint lag it could indicate a performance
    problem or the Replicat catching up on a large volume of changes. You can also
    see that trail file `l2000003` is the source for your Replicat, the last log-read
    checkpoint time, and the RBA of the record in the trail file. GoldenGate also
    refers to the trail-file number as the external sequence number (`EXTSEQNO`).
    In this case, `EXTSEQNO` is 3\. You can start the GoldenGate Replicat processing
    at a specific `EXTSEQNO` if needed.


    You can add the `DETAIL` option to the `INFO` command to see even more information
    about the Replicat. You may find the detail display helpful to see where the important
    files for the Replicat are located, such as the parameter and report files. The
    following example performs an `INFO` command on the Replicat RHREMD1 with the
    detail option:


    `GGSCI (targetserver) 3> info replicat RHREMD1, detail`


    `REPLICAT   RHREMD1   Last Started 2011-01-22 22:40   Status RUNNING`

    `Checkpoint Lag       00:00:00 (updated 00:00:07 ago)`

    `Log Read Checkpoint  File dirdat/l2000003`

    `                     2011-01-20 14:04:28.998416  RBA 3695`


    `  Extract Source                          Begin             End`


    `  dirdat/l2000003                         2011-01-20 13:57  2011-01-20 14:04`

    `  dirdat/l2000003                         2011-01-20 13:57  2011-01-20 13:57`

    `  dirdat/l2000003                         2011-01-20 13:57  2011-01-20 13:57`

    `  dirdat/l2000003                         2011-01-12 10:59  2011-01-20 13:57`

    `  dirdat/l2000001                         2011-01-07 08:38  2011-01-12 10:59`

    `dirdat/l2000000                         * Initialized *   2011-01-07 08:38`

    `  dirdat/l2000000                         * Initialized *   First Record`

    `  dirdat/l2000000                         * Initialized *   First Record`


    `Current directory    /gger/ggs`


    `Report file          /gger/ggs/dirrpt/RHREMD1.rpt`

    `Parameter file       /gger/ggs/dirprm/RHREMD1.prm`

    `Checkpoint file      /gger/ggs/dirchk/RHREMD1.cpr`

    `Process file         /gger/ggs/dirpcs/RHREMD1.pcr`

    `Stdout file          /gger/ggs/dirout/RHREMD1.out`

    `Error log            /gger/ggs/ggserr.log`


    Finally, you can run the `STATS` command on your Replicat. This shows if the Replicat
    has actually processed any DML activity. In the example, the Replicat has processed
    four inserts and two deletes since it was started. You may also notice the Replicat
    has handled two insert collisions, because you had to turn on the `HANDLECOLLISIONS`
    parameter to resolve errors.


    Let''s do a `STATS` command in the following example on the Replicat RHREMD1 to
    see if any data has been processed:


    `GGSCI (targetserver) 2> stats rep RHREMD1`


    `Sending STATS request to REPLICAT RHREMD1 ...`


    `Start of Statistics at 2011-01-18 18:50:38.`


    `Replicating from HR.EMPLOYEES to HR.EMPLOYEES:`


    `*** Total statistics since 2011-01-15 13:54:52 ***`

    `        Total inserts                                4.00`

    `        Total updates                                0.00`

    `        Total deletes                                2.00`

    `        Total discards                               0.00`

    `        Total operations                             6.00`

    `        Total insert collisions                      2.00`


    You''re now finished with setting up the basic replication. Let''s summarize what
    you''ve learned.


    ### Summary


    This chapter covered how to set up, configure, and verify basic GoldenGate replication.
    You saw how to configure, add, and start a local Extract, a data-pump Extract,
    and a Replicat. You also examined the process for doing an initial data load using
    the Oracle GoldenGate direct-load method and using the vendor DBMS load utilities.
    The next chapter expands on these basic concepts and covers some advanced techniques
    to make your replication environment more secure and easier to manage and monitor.


    ## C H A P T E R  5


    ## Advanced Features


    This chapter gives you an in-depth understanding of some advanced features of
    GoldenGate replication. These features are often necessary to make your replication
    ready to handle a real-world production environment. In addition, you learn how
    to configure GoldenGate bidirectional replication to fully utilize both of your
    database servers in an active-active replication configuration.


    In [Chapter 4](#Chapter04.html#ch4), you learned how to set up and configure basic
    GoldenGate replication. In this chapter, you build on the basic replication and
    add features to make the replication more robust and easier to manage and monitor.
    You also learn about some specific changes needed to make your replication work
    in specialized environments like Oracle Real Application Clusters (RAC). Later
    in the chapter, you expand the basic one-way replication into a bidirectional
    replication topology.'
  trans: "\n## 验证 Replicat\n\n当 Replicat 启动后，你可以使用 `INFO REPLICAT` 命令来验证其是否正在运行。你应该能看到状态为\
    \ `RUNNING`。如果状态是 `STOPPED` 或 `ABENDED`，则可能存在问题。你可以查阅 GoldenGate 错误日志文件并尝试解决问题。通常，错误可能很简单，比如拼写错误。错误文件名为\
    \ `ggserr.log`，位于 GoldenGate 软件安装目录下。示例中，Linux 系统上的错误日志路径是 `/gger/ggs/ggserr.log`。在\
    \ Windows 上，基于示例的 GoldenGate 错误日志位于 `c:\\gger\\ggs\\ggserr.log`。\n\n如果你的 Replicat\
