    \                                 2011-01-20 13:57  2011-01-20 13:57\n  dirdat/l2000003\
    \                                 2011-01-20 13:57  2011-01-20 13:57\n  dirdat/l2000003\
    \                                 2011-01-12 10:59  2011-01-20 13:57\n  dirdat/l2000001\
    \                                 2011-01-07 08:38  2011-01-12 10:59\n  dirdat/l2000000\
    \                                 * Initialized *   2011-01-07 08:38\n  dirdat/l2000000\
    \                                 * Initialized *   First Record\n  dirdat/l2000000\
    \                                 * Initialized *   First Record\n\nCurrent directory\
    \    /gger/ggs\n\nReport file          /gger/ggs/dirrpt/RHREMD1.rpt\nParameter\
    \ file       /gger/ggs/dirprm/RHREMD1.prm\nCheckpoint file      /gger/ggs/dirchk/RHREMD1.cpr\n\
    Process file         /gger/ggs/dirpcs/RHREMD1.pcr\nStdout file          /gger/ggs/dirout/RHREMD1.out\n\
    Error log            /gger/ggs/ggserr.log\n```\n\n最后，你可以对 Replicat 运行 `STATS`\
    \ 命令。这显示了 Replicat 是否实际处理了任何 DML 活动。在示例中，Replicat 自启动以来已处理了四次插入和两次删除。你可能还会注意到\
    \ Replicat 处理了两次插入冲突，因为你必须打开 `HANDLECOLLISIONS` 参数来解决错误。\n\n让我们在以下示例中对 Replicat\
    \ RHREMD1 执行 `STATS` 命令，以查看是否有数据已被处理：\n\n```shell\nGGSCI (targetserver) 2> stats\
    \ rep RHREMD1\n\nSending STATS request to REPLICAT RHREMD1 ...\n\nStart of Statistics\
    \ at 2011-01-18 18:50:38.\n\nReplicating from HR.EMPLOYEES to HR.EMPLOYEES:\n\n\
    *** Total statistics since 2011-01-15 13:54:52 ***\n        Total inserts    \
    \                            4.00\n        Total updates                     \
    \           0.00\n        Total deletes                                2.00\n\
    \        Total discards                               0.00\n        Total operations\
    \                             6.00\n        Total insert collisions          \
    \            2.00\n```\n\n你现在已经完成了基本复制的设置。让我们总结一下你学到的内容。\n\n### 总结\n\n本章介绍了如何设置、配置和验证基本的\
    \ GoldenGate 复制。你了解了如何配置、添加和启动本地 Extract、数据泵 Extract 和 Replicat。你还研究了使用 Oracle\
    \ GoldenGate 直接加载方法以及使用供应商 DBMS 加载实用程序进行初始数据加载的过程。下一章将扩展这些基本概念，并介绍一些高级技术，以使你的复制环境更安全、更易于管理和监控。\n\
    \n## 第 5 章\n\n## 高级功能\n\n本章深入介绍 GoldenGate 复制的一些高级功能。这些功能通常对于使你的复制能够处理真实世界的生产环境是必要的。此外，你将学习如何配置\
    \ GoldenGate 双向复制，以在主动-主动复制配置中充分利用你的两个数据库服务器。\n\n在第 4 章中，你学习了如何设置和配置基本的 GoldenGate\
    \ 复制。在本章中，你将在基本复制的基础上进行扩展，添加功能以使复制更加健壮，并更易于管理和监控。你还将了解一些特定的更改，以使复制在诸如 Oracle 真应用集群\
    \ (RAC) 等专门环境中工作。本章稍后，你将把基本的单向复制扩展为双向复制拓扑。\n"
- fmt: '### Enhancing the Replication Configuration


    This section covers some recommended enhancements to your replication configuration.
    It begins with enhancements to the basic reporting configuration. Next, it covers
    the purging of old trail files and adding restartability to your Extracts and
    Replicats. Finally, you see how to add a checkpoint table in your database to
    make the replication more robust.


    Before you get started, let''s review the basic replication configuration parameters
    from [Chapter 4](#Chapter04.html#ch4). First, here''s the basic Extract parameter
    file:


    ```

    GGSCI (sourceserver) 1> edit params LHREMD1

    Extract LHREMD1

    -------------------------------------------------------------------

    -- Local extract for HR schema

    -------------------------------------------------------------------

    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)

    USERID GGER@SourceDB, PASSWORD userpw

    ExtTrail /gger/ggs/dirdat/l1

    Table HR.*;

    ```


    Next is the basic Replicat parameter file:


    ```

    GGSCI (targetserver) 1> edit params RHREMD1

    Replicat RHREMD1

    -------------------------------------------------------------------

    -- Replicat for HR Schema

    -------------------------------------------------------------------

    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)

    USERID GGER@TargetDB, PASSWORD userpw

    HandleCollisions

    AssumeTargetDefs

    Map HR.*, Target HR.* ;

    ```


    Finally, the Manager parameter file is as follows.


    ```

    GGSCI (sourceserver) 1> edit params MGR

    -------------------------------------------------------------------

    -- GoldenGate Manager

    -------------------------------------------------------------------

    port 7840

    ```


    You expand on these basic parameters throughout this chapter and see where to
    make changes and additions as you go along. Now, let''s move on to enhancing your
    reporting configuration.


    #### Enhancing Extract and Replicat Reporting


    By default, the Extracts and Replicats generate a standard startup report every
    time they''re started. The startup report contains a lot of useful information
    about the Extract or Replicat, such as the operating system, database version,
    character sets, and parameters used. For an example, let''s look at the report
    for the human resources or HR schema Replicat you set up in [Chapter 4](#Chapter04.html#ch4),
    named `RHREMD1`:


    ```

    ***********************************************************************

                     Oracle GoldenGate Delivery for Oracle

                         Version 11.1.1.0.0 Build 078

       Linux, x64, 64bit (optimized), Oracle 10 on Jul 28 2010 15:58:11


    Copyright (C) 1995, 2010, Oracle and/or its affiliates. All rights reserved.


                        Starting at 2011-01-28 23:19:11

    ***********************************************************************


    Operating System Version:

    Linux

    Version #1 SMP Tue Jan 23 12:49:51 EST 2007, Release 2.6.9-42.0.8.ELsmp

    Node: targetserver

    Machine: x86_64

                             soft limit   hard limit

    Address Space Size   :    unlimited    unlimited

    Heap Size            :    unlimited    unlimited

    File Size            :    unlimited    unlimited

    CPU Time             :    unlimited    unlimited


    Process id: 15874

    Description:


    ***********************************************************************

    **            Running with the following parameters                  **

    ***********************************************************************

    Replicat RHREMD1


    -------------------------------------------------------------------

    -- Replicat for HR Schema

    -------------------------------------------------------------------


    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)


    USERID GGER@TargetDB, PASSWORD userpw


    HandleCollisions


    AssumeTargetDefs


    Map HR.*, Target HR.* ;


    CACHEMGR virtual memory values (may have been adjusted)

    CACHEBUFFERSIZE:                         64K

    CACHESIZE:                              512M

    CACHEBUFFERSIZE (soft max):               4M

    CACHEPAGEOUTSIZE (normal):                4M

    PROCESS VM AVAIL FROM OS (min):           1G

    CACHESIZEMAX (strict force to disk):    881M


    Database Version:

    Oracle Database 10g Enterprise Edition Release 10.2.0.4.0 - 64bi

    PL/SQL Release 10.2.0.4.0 - Production

    CORE    10.2.0.4.0      Production

    TNS for Linux: Version 10.2.0.4.0 - Production

    NLSRTL Version 10.2.0.4.0 - Production


    Database Language and Character Set:

    NLS_LANG = "AMERICAN_AMERICA.AL32UTF8"

    NLS_LANGUAGE     = "AMERICAN"

    NLS_TERRITORY    = "AMERICA"

    NLS_CHARACTERSET = "AL32UTF8"


    For further information on character set settings, please refer to user manual.


    ***********************************************************************

    **                     Run Time Messages                             **

    ***********************************************************************


    Opened trail file dirdat/l2000006 at 2011-01-28 23:19:11

    Switching to next trail file dirdat/l2000007 at 2011-01-28 23:20:02 due

    to EOF, with current RBA 1281

    Opened trail file dirdat/l2000007 at 2011-01-28 23:20:02


    Processed extract process graceful restart record at seq 7, rba 1191.

    Processed extract process graceful restart record at seq 7, rba 1253.

    ```


    In addition to the standard reports, you can add parameters to instruct the Extract
    or Replicat to periodically add more information to the reports. As shown in the
    example, add the following parameters to your Extracts and Replicats to enhance
    the default reporting:


    ```

    ReportCount Every 30 Minutes, Rate

    Report at 01:00

    ReportRollover at 01:15

    ```


    The following sections look at each of these parameters in more detail.


    ##### REPORTCOUNT


    You can use the `REPORTCOUNT` parameter to have the Extract or Replicat automatically
    add a count of the records GoldenGate has processed since startup. In the example,
    you request a record count every 30 minutes. Here is an example of what the reporting
    output looks like:


    ```

    1000 records processed as of 2010-01-28 11:30:40 (rate 154,delta 215)

    ```


    Since the Extract process started, it has processed 1,000 records as of the time
    displayed (11:30:40). You also asked for `RATE` information to be printed in the
    report. The rate calculations are as follows:


    > Rate = # of records processed since startup / total time since startup

    >

    > Delta = # of records since last report / time since last report


    In the example, the processing rate is 154 and the delta is 215. The delta is
    higher, which indicates that you''re processing more records in the latest reporting
    period. You can compare the rate over time to see if it changes. Changes in rate
    could be due to more or less processing volume or perhaps performance issues with
    your Extract or Replicat or even the database itself.


    ##### REPORT


    You can use the `REPORT` parameter to have the Extract or Replicat insert runtime
    statistics into your report, such as the following:


    ```

    ***********************************************************************

    *                   ** Run Time Statistics **                         *

    ***********************************************************************


    Report at 2011-01-15 13:53:30 (activity since 2011-01-13 23:23:10)


    Output to /gger/ggs/dirdat/l2:

    From Table HR.EMPLOYEES:

           #                   inserts:         6

           #                   updates:         2

           #                   deletes:         1

           #                  discards:         0

    ```


    The example told the Extract or Replicat to generate statistics every day at 1
    a.m. You can also pick a specific day of the week and generate statistics only
    once a week.


    **Tip** You can also manually add runtime statistics to your report using the
    `SEND EXTRACT xxx REPORT` or `SEND REPLICAT xxx REPORT`, where `xxx` is your Extract
    or Replicat name. Remember to update your parameter file if you want to see the
    statistics reported permanently.'
