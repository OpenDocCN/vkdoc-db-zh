    ## Installation


    The installation process for Oracle GoldenGate is simple compared to most of the
    other product suites available from the Oracle Fusion Middleware family, of which
    GoldenGate is a part. In this chapter, we will provide you with details on how
    to prepare for and perform a complete installation of the following Oracle GoldenGate
    products:


    *   Oracle GoldenGate 11g

    *   Oracle GoldenGate Director 11g

    *   Oracle GoldenGate Veridata 11g'
  trans: '

    ## 引言


    甲骨文公司于 2009 年收购了 GoldenGate，作为其在未来数据仓库和实时事务管理产品套件中实施高级复制技术战略的一部分。在 Oracle GoldenGate
    技术出现之前，数据复制是使用 Oracle Streams 和第三方复制解决方案（如 Quest SharePlex）来完成的。本章将讨论各类数据库复制方法及其所使用的技术，以说明
    Oracle GoldenGate 如何成为面向当前及未来基于 Oracle 数据库系统的实时数据事务复制技术的逻辑终点。


    在本章讨论 Oracle GoldenGate 软件的基础知识之前，有必要简要回顾一下数据库复制技术的历史。在 GoldenGate 软件出现之前，对于非关系型数据库，数据事务的复制是通过文件传输协议（`FTP`）进行简单的文件传输来跨网络实现的。随着
    UNIX 操作系统的普及和客户端-服务器计算的出现，在 Oracle 数据库软件的第 8 版中，通过 Oracle 基础和高级复制软件实现了数据复制。


    ### 分布式处理与复制


    Oracle 第 5 版以数据库链接的形式引入了分布式处理查询。数据库链接提供了跨网络执行 SQL 查询的能力，是实现复制解决方案的首次真正尝试。图 1-1
    展示了如何通过数据库链接在源和目标数据库环境之间建立连接。


    ![images](img/0101.jpg)


    **图 1-1.** 用于分布式系统的数据库链接


    数据复制发展的下一步出现在 Oracle 第 8 版中，它使数据库专业人员能够设置基于日志和基于触发器的复制解决方案。


    ### Oracle 基础复制


    Oracle 基础复制有两种形式：基于日志和基于触发器。使用基于日志的复制时，必须在源和目标数据库环境之间设置快照模式和数据库链接。数据从 Oracle 的联机重做日志中提取，以捕获变更并通过网络传播，将数据事务从源数据库（又称主数据库）发送到目标数据库。模式也必须在源和目标数据库上进行配置。此外，还必须配置刷新组以使目标环境与源系统上的主数据库保持同步。可以想象，这种设计在建立成功的冲突解决和制衡系统方面是粗糙且容易出错的。


    ### Oracle 高级复制


    Oracle 高级复制增加了更强大的功能，支持在多环境中进行多主复制，并采用基于触发器的方法来建立冲突解决规则集，以提高数据可靠性并保持源和目标系统之间的准确数据同步。然而，高级复制也有其缺点和缺陷，特别是对某些数据类型缺乏支持，以及基于触发器的冲突处理会发生失败。此外，在保持目标系统与源主系统同步方面，延迟也是一个问题。


    图 1-2 展示了在 Oracle 环境中如何为基本和高级复制设置冲突解决。


    ![images](img/0102.jpg)


    **图 1-2.** Oracle 复制的冲突解决


    ### Oracle Streams 复制


    Oracle 在 9.2 版中引入了 Streams 复制解决方案。Streams 解决了困扰先前版本中旧复制方法的缺陷。它建立了一个基于日志的复制解决方案，从源系统的联机重做日志中挖掘已提交的事务，以将数据移动到下游目标系统。此外，Streams
    引入了新的后台进程来维护 Oracle 生态系统内复制活动的通信和操作。


    Streams 通过使用高级队列技术来提升复制性能，进一步增强了先前的 Oracle 复制技术。Oracle 高级队列（`AQ`）是随 Streams 以及其他
    Oracle 技术（包括 Oracle Data Guard 逻辑数据库）一起设计的一项技术。`AQ`提供了一个基于订阅者和发布者模型的入队和出队系统，用于数据库通信。它允许在源和目标环境之间进行健壮的数据事务消息传递和处理，是
    Oracle Streams 处理的核心。


    有关如何设置和管理`AQ`的更多详细信息，可在线访问 Oracle 参考文档： [`http://tahiti.oracle.com`](http://tahiti.oracle.com)。


    ### 演进与 Oracle GoldenGate


    随着来自 Oracle 和 Quest SharePlex 的真正基于日志的复制技术的出现，技术进步使得最终能够执行基于实时的复制。在大型机和中型系统领域之外，基于实时事务的复制技术发展领域升起了一颗耀眼的明星。在
    20 世纪 80 年代末，一家名为 GoldenGate 的小型软件公司提出了一种在不同数据库平台之间复制数据的不同方法。在 GoldenGate 出现之前，跨平台和跨供应商的数据复制充其量是存在问题的。例如，需要复杂的软件开发才能利用
    Oracle 的力量连接到非 Oracle 数据库环境，这需要通过`Pro-C`和软件开发`API`来实现，以允许事务在环境之间移动。


    GoldenGate 发明了一种强大且新颖的数据复制方法，同时实现了高性能和准确性。GoldenGate 没有使用不同的格式，而是通过一个名为 GoldenGate
    软件命令接口（`GGSCI`）的命令行界面来实施统一格式以执行数据复制操作。`GGSCI`命令用于创建新的 GoldenGate 复制配置以及执行管理任务。已提交的事务存储在源和目标系统文件系统上的称为`trail
    files`（跟踪文件）的平面文件中。此外，GoldenGate 提供了一种无缝且透明的方法，可以在异构环境之间执行实时数据复制，并保证事务一致性，而无需开发复杂的例程或代码。


    ### 总结


    本引言提供了一个关于数据库复制技术如何演变为强大的 Oracle GoldenGate 技术的历史课程。下一章将向您展示如何安装 Oracle GoldenGate
    产品套件。


    ## 第 2 章


    ## 安装


    与 Oracle 融合中间件（GoldenGate 是其一部分）家族中大多数其他产品套件相比，Oracle GoldenGate 的安装过程是简单的。在本章中，我们将为您提供有关如何准备和执行以下
    Oracle GoldenGate 产品完整安装的详细信息：


    *   Oracle GoldenGate 11g

    *   Oracle GoldenGate Director 11g

    *   Oracle GoldenGate Veridata 11g

    '
- fmt: '### Downloading the Software


    For Oracle GoldenGate 11g, the first step is to obtain the software either online
    or from DVD media. Depending on the bandwidth of your Internet connection, we
    recommend that current Oracle customers download the Oracle GoldenGate software
    from Oracle E-Delivery at `http://edelivery.oracle.com`. For educational and non-business
    learning purposes, Oracle provides the software free for download from the Oracle
    Technology Network (OTN) at `http://otn.oracle.com`. In this chapter, we will
    download the Oracle GoldenGate software from `http://edelivery.oracle.com`.


    We recommend that you register for a free account at the OTN site to receive access
    to free software for trial purposes, white papers, and webcasts from Oracle. We
    also advise that you review the documentation for Oracle GoldenGate online at
    `http://download.oracle.com/docs/cd/E18101_01/index.htm` to become familiar with
    the particular release notes for your database and operating system platform.
    While the primary focus of this chapter will concentrate on Oracle database platform
    with GoldenGate, we will provide coverage for additional RDBMS platforms such
    as MySQL and Teradata in terms of the installation requirements and guidelines
    for Oracle GoldenGate.


    #### Downloading from Oracle E-Delivery


    Let''s get started and download the Oracle GoldenGate software from `edelivery.oracle.com`.
    If you prefer to download from OTN, then skip ahead to the next section where
    we show the use of `http://otn.oracle.com`.


    [Figure 2-1](#Chapter02.html#fig_2_1) shows the results from a media search. Choose
    the platform and version for your operating system to obtain the Oracle GoldenGate
    software as shown in the figure. Choose Oracle Fusion Middleware as your platform.
    Then specify your operating system.


    ![images](images/0201.jpg)


    **Figure 2-1.** E-Delivery website for obtaining Oracle Goldengate software


    Once you have chosen the correct platform, you will see choices for the Oracle
    GoldenGate software to download, as shown in [Figure 2-2](#Chapter02.html#fig_2_2).


    ![images](images/0202.jpg)


    **Figure 2-2.** Downloading Oracle Goldengate software from E-Delivery


    Once you have chosen the correct Oracle Goldengate software—which, in our example,
    is for the Windows platform—you will be taken to the download screen shown in
    [Figure 2-3](#Chapter02.html#fig_2_3).


    ![images](images/0203.jpg)


    **Figure 2-3.** E-Delivery website for obtaining Oracle Goldengate software


    At this point, we recommend that you review the readme file and release notes
    to best prepare for the installation process. By investing a couple of hours,
    you will avoid most errors during the installation and configuration phase.


    Since we will use Oracle 11g with Goldengate, we will choose the Oracle GoldenGate
    11.1.1.0.0 for Oracle 11g on Windows XP software to download.


    ![images](images/square.jpg) **Note** If you plan to use Oracle GoldenGate with
    Linux, you will also need to download the Oracle GoldenGate software for the Linux
    platform.


    [Figure 2-4](#Chapter02.html#fig_2_4) provides the readme instructions for the
    Oracle GoldenGate media pack.


    ![images](images/0204.jpg)


    **Figure 2-4.** README instructions for Oracle Goldengate software installation


    #### Downloading from OTN


    For readers who want to set up a test demo environment to learn how to work with
    Oracle Goldengate software, we recommend that you download the software from OTN
    as shown below at `http://otn.oracle.com`. Oracle allows you to use the GoldenGate
    software for educational purposes without a purchased license. For use within
    a production environment, you would download the software from the E-Delivery
    site. [Figure 2-5](#Chapter02.html#fig_2_5) shows the Oracle Technology Network
    (OTN) website.


    ![images](images/0205.jpg)


    **Figure 2-5.** OTN website


    Since OTN is a massive site, it can be a little tricky to find where you actually
    obtain the Oracle Goldengate software. Never fear—when you scroll down the page
    you will find the list of documentation and software on the left side. [Figure
    2-6](#Chapter02.html#fig_2_6) shows the links to software downloads and documentation
    available for Oracle GoldenGate.


    ![images](images/0206.jpg)


    **Figure 2-6.** Download Oracle Goldengate from OTN website


    Once you click the Downloads link from OTN, you will be shown the list of Oracle
    software for download shown in [Figure 2-7](#Chapter02.html#fig_2_7).


    ![images](images/0207.jpg)


    **Figure 2-7.** Download Oracle Goldengate from OTN website


    On the Software Downloads heading on the OTN website, you will need to accept
    the license agreement before downloading. Once you do so, you can download the
    Goldengate software for your platform to use on a trial educational and non-production
    basis. Be sure to navigate to the heading for Middleware software as shown in
    [Figure 2-8](#Chapter02.html#fig_2_8) since Oracle classifies Goldengate as part
    of the Oracle Fusion Middleware product family.


    ![images](images/0208.jpg)


    **Figure 2-8.** Download Oracle Goldengate from OTN website


    Click the GoldenGate hyperlink and you can download all of the required software
    packages for Oracle Goldengate including Director and Veridata ([Figure 2-9](#Chapter02.html#fig_2_9)).


    ![images](images/0209.jpg)


    **Figure 2-9.** Download Oracle Goldengate from OTN website


    Now that you understand how to obtain and download the Oracle Goldengate software
    and documentation, it''s time for us to perform the installation and configuration
    for our test environments.


    ### Understanding Your Environment


    Before installing, you should have a good grasp of your target environment. For
    example, you may want to install both Linux and Windows for the Oracle 11g database
    environments. In [Table 2-1](#Chapter02.html#tab_2_1), we show a test configuration
    that can be used for working with Oracle GoldenGate as a sandbox environment.
    We also recommend that you install the sample schemas included with Oracle 11g
    to have sample test data while working with GoldenGate. Our test platform will
    include the configuration in [Table 2-1](#Chapter02.html#tab_2_1).


    ![images](images/t0201.jpg)


    We will also use examples from the Linux platform in this book so you can follow
    along with either Windows, Linux, or both setups if you desire. [Table 2-2](#Chapter02.html#tab_2_2)
    shows the test Linux configuration that will be used.


    ![images](images/t0202.jpg)


    [Table 2-3](#Chapter02.html#tab_2_3) shows the configuration that we''ll use in
    our upcoming chapter on heterogeneous replication. The term “hetergenous” refers
    in this case to replication across database brands.


    ![images](images/t0203.jpg)


    We recommend that you download the Oracle Goldengate 11g software for MySQL and
    Microsoft SQL Server platforms from either OTN or Oracle E-Delivery in preparation
    for the exercises we have planned in [Chapter 6](#Chapter06.html#ch6) on heterogeneous
    replication with Goldengate.


    If you need the MySQL database software, you can download it from `www.mysql.com/downloads/enterprise/.`
    Microsoft SQL Server 2008 Personal Express Edition database software is available
    from `www.microsoft.com/express/Database/` or, alternatively, you can use the
    trial license version of Microsoft SQL Server 2008 Enterprise Edition to perform
    the exercises in this book. You can download a 180-day license for the trial version
    from `www.microsoft.com/sqlserver/2008/en/us/trial-software.aspx`.


    Now let''s take a voyage into the system and database prerequisites that must
    be performed before installing Oracle Goldengate software.'
