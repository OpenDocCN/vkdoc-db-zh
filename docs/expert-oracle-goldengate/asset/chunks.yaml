    `First Record RBA 8144`\n\n8.  添加新的`Replicat` `RHREMD2`，并告诉`GoldenGate`使用来自数据泵`Extract\
    \ PHREMD2`的新`l3`轨迹文件进行处理。因为`l3`是一个新轨迹文件，你可以接受默认设置，即从第一个`l3`轨迹文件的开头开始处理。运行`info`命令以验证`Replicat`是否已正确添加：\n\
