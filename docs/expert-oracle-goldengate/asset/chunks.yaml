- fmt: "#### Extracting `tranlogoptions`\n\nBy default, Director doesn’t include `tranlogoptions`.\
    \ The `tranlogoptions` parameter controls the way Oracle GoldenGate interacts\
    \ with the transaction logs; it’s database specific. To add `tranlogoptions`,\
    \ select it in the list of parameters shown in [Figure 10-22](#Chapter10.html#fig_10_22),\
    \ and then click Insert. To get to the following dialog, click on the Insert button\
    \ on the Parameter tab on any mapping icons.\n\n![images](images/1022.jpg)\n\n\
    `Figure 10-22.` Extract `tranlogoptions` parameter\n\nDirector doesn’t validate\
    \ the parameters. It appends the attributes to a single `tranlogoptions` line\
    \ and doesn’t “dedupe” for you. You can insert one `tranlogoptions` item per line,\
    \ as shown here:\n\n```\nTRANLOGOPTIONS ASMUSER SYS@ASM, ASMPASSWORD AEBIZD,ENCRYPTKEY\
    \ DEFAULT\nTRANLOGOPTIONS ALTARCHIVELOGDEST /ggs/gg_archive\nTRANLOGOPTIONS CONVERTUCS2CLOBS\n\
    ```\n\n#### Generating Definition Files\n\nGenerating definition files is similar\
    \ to adding trandata options. Without Director, you need to use the `DEFGEN` utility\
    \ to create a definition file. To create a definition file in Director, select\
    \ the data source object in the diagram, and choose Control ![images](images/U001.jpg)\
    \ View Details. Then, click the Definitions Files tab, as shown in [Figure 10-23](#Chapter10.html#fig_10_23).\n\
    \n![images](images/1023.jpg)\n\n`Figure 10-23.` Sourcedef and Targetdef file generation\n\
    \nEnter the Database Access information for each table you need to add to the\
    \ source/target definition files. Select one or more tables in the Select Table\
    \ box, and click Transfer Definitions when you’re finished. The tables automatically\
    \ transfer to the target/source location via the Manager process. You may have\
    \ more than one definition files for each schema on either the source or target;\
    \ if so, concatenate the files, or append them to the existing `sourcedef` file,\
    \ as shown in [Figure 10-24](#Chapter10.html#fig_10_24).\n\n![images](images/1024.jpg)\n\
    \n`Figure 10-24.` Inserting a source or target definition into the parameter file\n\
    \nBe sure to add the `sourcedef`/`targetdef` file to the Extract or Replicat parameter\
    \ file. Use the Insert Parameter option on the Parameters tab in the Extract or\
    \ Replicat to do this.\n\n#### Finding Parameters or Attributes in Director\n\n\
    Director doesn’t implement all the parameters in its GUI interface, including\
    \ `TRANSMEMORY` and many others. You have to use Edit Param feature to add these\
    \ parameters manually. In some cases, attributes are also missing, such as `FETCHOPTIONS\
    \ NOUSESNAPSHOT`. To remedy this situation, you can add `FETCHOPTIONS` and manually\
    \ enter `NOUSESNAPSHOT` in the text box.\n\nOracle GoldenGate also compresses\
    \ parameters. The `nocompressupdates` parameter doesn’t appear in the list, but\
    \ if you choose `compressupdates`, you can then pick `nocompressupdates` in the\
    \ drop-down list, as shown in [Figure 10-25](#Chapter10.html#fig_10_25).\n\n![images](images/1025.jpg)\n\
    \n`Figure 10-25.` `Nocompressupdates` is in the drop-down list instead of the\
    \ parameter list panel.\n\nAs you can see in [Figure 10-25](#Chapter10.html#fig_10_25),\
    \ the `compressdeletes` parameter isn’t in the list; neither is `nocompressdeletes`.\
    \ These are important parameters if you need to get full values of the deleted\
    \ rows in the trail file. You have to add them using the Edit Param feature.\n\
    \n#### Advanced Mapping\n\nSelect the Map for `EXTGGS1` icon in the diagram, and\
    \ then click the Change button on the parameter tab or Insert if you need to add\
    \ a new mapping; the dialog shown in [Figure 10-26](#Chapter10.html#fig_10_26)\
    \ opens. Note that if you change the Mapping Type in the Change Mapping dialog,\
    \ *all* attributes will disappear from the dialog; they’re still in the parameters\
    \ file, but you have to reopen this dialog to get them to reappear.\n\n![images](images/1026.jpg)\n\
    \n`Figure 10-26.` Mapping Type has a lot of attributes.\n\n[Figure 10-27](#Chapter10.html#fig_10_27)\
    \ shows the `SQL Exec` parameter editor. Without the Director Client interface,\
    \ it is very difficult to debug the `SQL Exec` statement and lead to many syntax\
    \ errors. Because there is no good IDE for editing parameter files, you have to\
    \ use `vi` or another generic text editor.\n\n![images](images/1027.jpg)\n\n`Figure\
    \ 10-27.` `SQL Exec` editor for queries and PL/SQL\n\nDirector creates the following\
    \ parameter code for you automatically after you click on the Ok button. Without\
    \ Director Client, you have to type this word by word in a text editor in the\
    \ exact same syntax.\n\n```\nextract EXTGGS1\nuserid gg_director2, password gg_director2\n\
    discardfile C:\\ggs\\dirrpt\\EXTGGS1.dsc, purge\n\nexttrail C:\\ggs\\dirdat\\\
    C1\ntable GG_DIRECTOR2.ACCOUNTB, colmap (usedefaults,\nphone=@strext(phone,2,6)),\
    \ fetchcolsexcept (userid), where (userid=\"hello\"),\nkeycols (userid), sqlexec\
    \ (spname GG_DIRECTOR2.ggs_test.MyFunction, id get_userid,\n params (param1=userid),\
    \ allparams required), tokens (DBUSERID = @GETENV (\"ORAENVIRONMENT\", \"DBLOGINUSER\"\
    ), SYSDATE = @GETENV (\"ORATRANSACTION\", \"TIMESTAMP\"), OPERATION = @GETENV(\"\
    GGHEADER\",\"OPTYPE\"));\n```\n\n#### Alerts\n\nOracle GoldenGate doesn’t have\
    \ any built-in alerts. If anything fails or hangs, you won’t know it if you aren’t\
    \ watching the system. You have to write alert scripts manually, as discussed\
    \ in [Chapter 8](#Chapter08.html#ch8), or you can use Director. With Director,\
    \ it’s very easy to set up an alert. To do so, click the My Alerts tab on the\
    \ main screen.\n\nThere are only two types of alerts: Checkpoint Lag and Event\
    \ Text in the `ggserr.log` file. Let’s look at two examples.\n\nFirst, suppose\
    \ you want an Event Text alert to check for any message containing *ABEND*. Such\
    \ messages should also appear in `/var/log/messages` and the Windows Event log.\
    \ The “AbendAlert” alert entry should be similar to [Figure 10-28](#Chapter10.html#fig_10_28).\n\
    \n![images](images/1028.jpg)\n\n`Figure 10-28.` Event Text alert\n\nHere are the\
    \ steps to add this alert:\n\n1.  In the Alert Type drop-down list, choose Event\
    \ Text.\n2.  In the Data Source drop-down list, choose `localhost_gg` or your\
    \ data source that has the Manager process running.\n3.  In the Process Name text\
    \ box, enter ***** for all processes. Or, to use one process, type its name, such\
    \ as `EXTGGS1`.\n4.  In the When Event Type Is drop-down list, choose Errors Only.\
    \ You’re creating an *ABEND* alert, and abend is an error.\n5.  In the And Event\
    \ Text Contains text box, enter **ABEND**. This is the actual text that appears\
    \ in the `ggserr.log` and `/var/log/` messages.\n6.  In the msgFrom Value field,\
    \ enter anything you want, so you know who sent the alert.\n7.  In the smtphost\
    \ field, enter any SMTP mail-relay server.\n8.  In the subjectline field, enter\
    \ something like **EXTGGS1 has abended**.\n9.  In the reciplist field, enter the\
    \ e-mail addresses of the alert recipients.\n\nNext, let’s set up a Lag alert.\
    \ To do so, enter the information shown in [Figure 10-29](#Chapter10.html#fig_10_29).\n\
    \n![images](images/1029.jpg)\n\n`Figure 10-29.` Lag alert for Extract `EXTGGS1`\n\
    \nDirector doesn’t need a server login because it handles all the requests via\
    \ the Manager process on the server side. So if the Manager is down, you don’t\
    \ get any alerts. Refer to the [chapter 8](#Chapter08.html#ch8) for more advanced\
    \ topics.\n\n### Summary\n\nBy now, you should be familiar with the Director processes.\
    \ Director is a cross-platform tool, so you can use it for other databases and\
    \ platforms with some minor changes. The differences are handled by Director behind\
    \ the scenes.\n\nIt’s out of this chapter’s scope to go over every scenario, but\
    \ you should be able to use Director to do the following additional tasks:\n\n\
    *   Perform DDL synchronization with the `DDL` and `DDLOPTIONS` parameters\n*\
    \   Perform Active-Active synchronization with collision handling using the `IGNOREREPLICATES`,\
    \ `GETAPPLOPS`, and `TRANLOGOPTIONS EXCLUDEUSER` parameters\n*   Change log captures\
    \ with `INSERTALLRECORDS` and `GETUPDATEBEFORES`\n*   Troubleshoot and fix most\
    \ common Oracle GoldenGate errors using Director Client"
  raw: '#### Extracting Tranlogoptions


    By default, Director doesn’t include `tranlogoptions`. The `tranlogoptions` parameter
    controls the way Oracle GoldenGate interacts with the transaction logs; it’s database
    specific. To add `tranlogoptions`, select it in the list of parameters shown in
    [Figure 10-22](#Chapter10.html#fig_10_22), and then click Insert. To get to the
    following dialog, click on the Insert button on the Parameter tab on any mapping
    icons.


    ![images](images/1022.jpg)


    ***Figure 10-22.** Extract `tranlogoptions` parameter*


    Director doesn’t validate the parameters. It appends the attributes to a single
    `tranlogoptions` line and doesn’t “dedupe” for you. You can insert one `tranlogoptions`
    item per line, as shown here:


    `TRANLOGOPTIONS ASMUSER SYS@ASM, ASMPASSWORD AEBIZD,ENCRYPTKEY DEFAULT`

    `TRANLOGOPTIONS ALTARCHIVELOGDEST /ggs/gg_archive`

    `TRANLOGOPTIONS CONVERTUCS2CLOBS`


    #### Generating Definition Files


    Generating definition files is similar to adding trandata options. Without Director,
    you need to use the DEFGEN utility to create a definition file. To create a definition
    file in Director, select the data source object in the diagram, and choose Control
    ![images](images/U001.jpg) View Details. Then, click the Definitions Files tab,
    as shown in [Figure 10-23](#Chapter10.html#fig_10_23).


    ![images](images/1023.jpg)


    ***Figure 10-23.** Sourcedef and Targetdef file generation*


    Enter the Database Access information for each table you need to add to the source/target
    definition files. Select one or more tables in the Select Table box, and click
    Transfer Definitions when you’re finished. The tables automatically transfer to
    the target/source location via the Manager process. You may have more than one
    definition files for each schema on either the source or target; if so, concatenate
    the files, or append them to the existing `sourcedef` file, as shown in [Figure
    10-24](#Chapter10.html#fig_10_24).


    ![images](images/1024.jpg)


    ***Figure 10-24.** Inserting a source or target definition into the parameter
    file*


    Be sure to add the `sourcedef`/`targetdef` file to the Extract or Replicat parameter
    file. Use the Insert Parameter option on the Parameters tab in the Extract or
    Replicat to do this.


    #### Finding Parameters or Attributes in Director


    Director doesn’t implement all the parameters in its GUI interface, including
    `TRANSMEMORY` and many others. You have to use Edit Param feature to add these
    parameters manually. In some cases, attributes are also missing, such as `FETCHOPTIONS
    NOUSESNAPSHOT`. To remedy this situation, you can add `FETCHOPTIONS` and manually
    enter `NOUSESNAPSHOT` in the text box.


    Oracle GoldenGate also compresses parameters. The `nocompressupdates` parameter
    doesn’t appear in the list, but if you choose `compressupdates`, you can then
    pick `nocompressupdates` in the drop-down list, as shown in [Figure 10-25](#Chapter10.html#fig_10_25).


    ![images](images/1025.jpg)


    ***Figure 10-25.** `Nocompressupdates` is in the drop-down list instead of the
    parameter list panel.*


    As you can see in [Figure 10-25](#Chapter10.html#fig_10_25), the `compressdeletes`
    parameter isn’t in the list; neither is `nocompressdeletes`. These are important
    parameters if you need to get full values of the deleted rows in the trail file.
    You have to add them using the Edit Param feature.


    #### Advanced Mapping


    Select the Map for EXTGGS1 icon in the diagram, and then click the Change button
    on the parameter tab or Insert if you need to add a new mapping; the dialog shown
    in [Figure 10-26](#Chapter10.html#fig_10_26) opens. Note that if you change the
    Mapping Type in the Change Mapping dialog, *all* attributes will disappear from
    the dialog; they’re still in the parameters file, but you have to reopen this
    dialog to get them to reappear.


    ![images](images/1026.jpg)


    ***Figure 10-26.** Mapping Type has a lot of attributes.*


    Figure 10-27 shows the SQL Exec parameter editor. Without the Director Client
    interface, it is very difficult to debug the SQL Exec statement and lead to many
    syntax errors. Because there is no good IDE for editing parameter files, you have
    to use vi or another generic text editor.


    ![images](images/1027.jpg)


    ***Figure 10-27.** SQL Exec editor for queries and PL/SQL*


    Director creates the following parameter code for you automatically after you
    click on the Ok button. Without Director Client, you have to type this word by
    word in a text editor in the exact same syntax.


    `extract EXTGGS1`

    `userid gg_director2, password gg_director2`

    `discardfile C:\ggs\dirrpt\EXTGGS1.dsc, purge`


    `exttrail C:\ggs\dirdat\C1`

    `table GG_DIRECTOR2.ACCOUNTB, colmap (usedefaults,`

    `phone=@strext(phone,2,6)), fetchcolsexcept (userid), where (userid="hello"),`

    `keycols (userid), sqlexec (spname GG_DIRECTOR2.ggs_test.MyFunction, id get_userid,`

    ` params (param1=userid), allparams required), tokens (DBUSERID = @GETENV ("ORAENVIRONMENT",
    "DBLOGINUSER"), SYSDATE = @GETENV ("ORATRANSACTION", "TIMESTAMP"), OPERATION =
    @GETENV("GGHEADER","OPTYPE"));`


    #### Alerts


    Oracle GoldenGate doesn’t have any built-in alerts. If anything fails or hangs,
    you won’t know it if you aren’t watching the system. You have to write alert scripts
    manually, as discussed in [Chapter 8](#Chapter08.html#ch8), or you can use Director.
    With Director, it’s very easy to set up an alert. To do so, click the My Alerts
    tab on the main screen.


    There are only two types of alerts: Checkpoint Lag and Event Text in the `ggserr.log`
    file. Let’s look at two examples.


    First, suppose you want an Event Text alert to check for any message containing
    *ABEND*. Such messages should also appear in `/var/log/messages` and the Windows
    Event log. The “AbendAlert” alert entry should be similar to [Figure 10-28](#Chapter10.html#fig_10_28).


    ![images](images/1028.jpg)


    ***Figure 10-28.** Event Text alert*


    Here are the steps to add this alert:


    1.  In the Alert Type drop-down list, choose Event Text.

    2.  In the Data Source drop-down list, choose `localhost_gg` or your data source
    that has the Manager process running.

    3.  In the Process Name text box, enter ***** for all processes. Or, to use one
    process, type its name, such as **EXTGGS1**.

    4.  In the When Event Type Is drop-down list, choose Errors Only. You’re creating
    an *ABEND* alert, and abend is an error.

    5.  In the And Event Text Contains text box, enter **ABEND**. This is the actual
    text that appears in the `ggserr.log` and `/var/log/` messages.

    6.  In the msgFrom Value field, enter anything you want, so you know who sent
    the alert.

    7.  In the smtphost field, enter any SMTP mail-relay server.

    8.  In the subjectline field, enter something like **EXTGGS1 has abended**.

    9.  In the reciplist field, enter the e-mail addresses of the alert recipients.


    Next, let’s set up a Lag alert. To do so, enter the information shown in [Figure
    10-29](#Chapter10.html#fig_10_29).


    ![images](images/1029.jpg)


    ***Figure 10-29.** Lag alert for Extract EXTGGS1*


    Director doesn’t need a server login because it handles all the requests via the
    Manager process on the server side. So if the Manager is down, you don’t get any
    alerts. Refer to the [chapter 8](#Chapter08.html#ch8) for more advanced topics.


    ### Summary


    By now, you should be familiar with the Director processes. Director is a cross-platform
    tool, so you can use it for other databases and platforms with some minor changes.
    The differences are handled by Director behind the scenes.


    It’s out of this chapter’s scope to go over every scenario, but you should be
    able to use Director to do the following additional tasks:


    *   Perform DDL synchronization with the `DDL` and `DDLOPTIONS` parameters

    *   Perform Active-Active synchronization with collision handling using the `IGNOREREPLICATES`,
    `GETAPPLOPS`, and `TRANLOGOPTIONS EXCLUDEUSER` parameters

    *   Change log captures with `INSERTALLRECORDS` and `GETUPDATEBEFORES`

    *   Troubleshoot and fix most common Oracle GoldenGate errors using Director Client


