  trans: '

    # 设置


    一旦前提条件完成，零停机迁移复制的设置可以分为两个部分共七个步骤来完成，如图 13-2 和 13-3 所示。这些步骤与第 4 章（Chapter 4）中介绍的基本单向复制设置类似。第一部分包括前四个步骤，用于设置从旧数据库到新数据库的复制。这些步骤包括初始数据加载，以及在初始加载后保持数据同步。第二部分包括最后三个步骤，用于配置从新数据库返回旧数据库的复制，以备回退时使用。由于第
    4 章（Chapter 4）已经介绍了 Oracle GoldenGate 参数文件，本节仅根据需要解释新概念。


    ![images](img/1302.jpg)


    *图 13-2.* 零停机迁移复制设置，第一部分


    该示例将`PAYROLL`数据库迁移到新的数据库软件版本。在 Oracle GoldenGate 参数文件中，你可以使用`PR`缩写来表示薪资应用。此外，有两个表包含无需迁移的数据，因此你需要将它们从复制中排除。该示例可适用于许多不同的具体迁移场景，例如从
    Sun Solaris 平台上的 Oracle 9i 数据库迁移到 Red Hat Linux 平台上的 Oracle 11g 数据库。请记住，无论你迁移的是什么数据库或应用，其概念和步骤都与此示例类似。如果你在迁移异构数据库或进行复杂的应用迁移，情况可能会变得更加复杂。在这种情况下，你可能需要更复杂的
    Oracle GoldenGate 映射或转换过滤器和参数，但总体流程是相同的。如前面章节所示，Oracle GoldenGate 可以处理这些映射和转换。由于第
    4 章（Chapter 4）已经详细介绍了步骤 1-4，让我们继续看第二部分的详细步骤。


    在初始设置的第二部分中，你需要配置但不启动从新数据库返回旧数据库的复制，如图 13-3（Figure 13-3）所示。这些步骤对于在需要时设置迁移回退复制是必要的。这三个步骤包括设置和配置本地抽取（Local
    Extract）、数据泵抽取（data-pump Extract）和复制（Replicat）。这些抽取和复制将用于后续的回退场景。


    ![images](img/1303.jpg)


    *图 13-3.* 零停机迁移复制设置，第二部分


    以下是图 13-3（Figure 13-3）中所示步骤 5-7 的描述：


    1.  配置并添加回退抽取。回退抽取稍后启动，用于捕获迁移切换后的变更，并在需要时用于回退。

    2.  配置并添加回退数据泵抽取，该抽取稍后在迁移切换后启动，并在需要时用于回退。

    3.  添加回退复制，该复制稍后在迁移切换后启动，并在需要时用于回退。


    在下一节中，我们将详细查看零停机迁移复制的每个步骤，首先从设置并启动本地抽取开始。


    ## 为零停机迁移配置本地抽取


    验证前提条件完成后，设置零停机迁移复制的第一步是配置、添加并启动本地抽取。请记住，你应该首先启动抽取，以便在初始数据加载运行时开始捕获所做的变更。如果你能承受应用停机，并在初始加载运行期间停止源数据库上的所有变更活动，那么你可以在初始加载完成后启动抽取。


    请参阅第 4 章（Chapter 4）了解启动抽取的详细步骤。本节仅涵盖针对零停机迁移抽取的特定配置。


    让我们从配置本地抽取开始。为此，你首先需要为抽取创建一个参数文件。记住，你正在配置本地抽取以捕获示例`PAYROLL`模式中的所有 SQL DML 变更。


    让我们看以下示例中本地抽取的参数：


    ```

    GGSCI (oldserver) 1> edit params LPREMP1


    Extract LPREMP1

    -------------------------------------------------------------------

    -- PAYROLL 数据库的本地抽取

    -------------------------------------------------------------------


    USERID GGER, PASSWORD userpw


    ExtTrail dirdat/p1


    ReportCount Every 10000 Records, Rate

    Report at 00:30


    DiscardFile dirrpt/LPREMP1.dsc, Append

    DiscardRollover at 02:00


    Table PAYROLL.*;

    TableExclude PAYROLL.EXCLUDETABLE1;

    TableExclude PAYROLL.EXCLUDETABLE2;

    ```


    请记住 Oracle GoldenGate 本地抽取组的命名约定，`L`用于指定本地抽取。因为你正在复制`PAYROLL`数据库，所以可以在本地抽取名称中使用`PR`作为`PAYROLL`的缩写。你可以使用`EM`表示`PAYROLL`数据库是员工应用的一部分。你使用`TableExclude`参数排除了两个不需要复制的表`EXCLUDETABLE1`和`EXCLUDETABLE2`。请注意，你使用星号作为通配符复制了`PAYROLL`数据库中的所有表，然后*仅*排除了你不想复制的那两个表。


    现在你已经在旧服务器上设置了抽取配置参数，下一步是添加抽取组。你可以使用 GoldenGate 软件命令界面（`GGSCI`）的以下命令来完成：


    ```

    GGSCI (oldserver) > ADD EXTRACT LPREMP1, TRANLOG, BEGIN NOW

    GGSCI (oldserver) > ADD EXTTRAIL dirdat/p1, EXTRACT LPREMP1, MEGABYTES 500

    ```


    你可以使用`p1`作为本地抽取跟踪文件名。由于薪资应用的数据变更量很大，你将跟踪文件大小设为`500MB`。


    添加抽取后，你需要启动它以真正开始捕获变更，如下例所示：


    ```

    GGSCI (oldserver) > START EXTRACT LPREMP1

    ```


    接下来，让我们使用`INFO`命令检查抽取是否运行正常：


    ```

    GGSCI (oldserver) 2> INFO EXTRACT LPREMP1

    ```


    如果抽取没有运行，你可以查看 Oracle GoldenGate 错误日志和报告文件，并尝试解决问题。


    你还应该在抽取上运行`STATS`命令。这显示了抽取是否处理了任何 DML 变更：


    ```

    GGSCI (oldserver) 2> STATS EXT LPREMP1

    ```


    现在你已经完成了添加、启动和验证本地抽取，让我们继续下一步：启动数据泵抽取。

    '
- fmt: '## Configuring the Data Pump for Zero-Downtime Migration


    When the Local Extract is started, you can proceed with configuring, adding, and
    starting the data pump. In this example, you configure the data pump to read the
    `p1` trail file written out by the Local Extract named `LPREMP1` on the old server
    and pump it over the TCP/IP network to the target server to be processed by the
    Replicat on the new server.


    From `GGSCI`, you can edit the parameters for the data pump as shown in this example:


    `GGSCI (oldserver) 1> edit params PPREMP1`

    ```

    Extract PPREMP1

    -------------------------------------------------------------------

    -- Data-pump Extract for PAYROLL database

    -------------------------------------------------------------------


    PassThru


    ReportCount Every 10000 Records, Rate

    Report at 00:30


    DiscardFile dirrpt/PPREMP1.dsc, Append

    DiscardRollover at 02:00


    RmtHost newserver, MgrPort 7809

    RmtTrail dirdat/p2


    Table PAYROLL.*;

    TableExclude PAYROLL.EXCLUDETABLE1;

    TableExclude PAYROLL.EXCLUDETABLE2;

    ```


    Now that you''ve set up your data-pump Extract configuration parameters, the next
    step is to add the data-pump Extract group on the old server. You can do that
    using the commands shown in the following example:


    `GGSCI (oldserver) > ADD EXTRACT PPREMP1, EXTTRAILSOURCE dirdat/p1`

    `GGSCI (oldserver) > ADD RMTTRAIL dirdat/p2, EXTRACT PPREMP1, MEGABYTES 500`


    After adding the data-pump Extract, you need to start it to begin processing records
    from the source trail file:


    `GGSCI (oldserver) > START EXTRACT PPREMP1`


    Next, you can verify that the data-pump Extract has started using the `INFO EXTRACT`
    command:


    `GGSCI (oldserver) 2> INFO EXTRACT PPREMP1`


    You should see a `Status` of `RUNNING`. If you see a `Status` of `STOPPED` or
    `ABENDED`, there may be a problem.


    You should also run the `STATS` command on the data-pump Extract to confirm it''s
    processing data:


    `GGSCI (oldserver) 2> STATS EXT PPREMP1`


    Now that the Local Extract and Data-pump Extract are started, you can begin the
    initial data load.


    You learned about the different methods for initially loading data in [Chapter
    4](#Chapter04.html#ch4). These methods also work for the initial data load for
    the zero-downtime migration replication. Remember that the initial load process
    is happening during the period prior to the actual application migration cutover.
    This period can be a few days, weeks, or even months before the actual cutover.
    You can perform the initial load and have the data synchronized, waiting for the
    scheduled cutover window. You can use either Oracle GoldenGate itself or the DBMS
    vendor load utilities to do the initial data load. Refer to [Chapter 4](#Chapter04.html#ch4)
    for more details on the initial load process.


    ## Configuring the Replicat for Zero-Downtime Migration


    After you''ve loaded your data, you can start the Replicat to apply the changes
    that have been captured by the Extract while the initial data load was running.
    These changes have been queued up in the trail files while the load was running
    and are waiting to be applied by the Replicat. After you''ve configured, added,
    and successfully started the Replicat, the changes from the trail are applied
    to the target tables.


    When the initial changes have been applied and there is no Oracle GoldenGate lag
    left, the databases are fully synchronized. At this point, the Local and data-pump
    Extracts and Replicat can continue to run and keep the old and new databases synchronized
    in real time with the ongoing changes. The new database is ready and waiting for
    the application to cutover for the migration.


    This section covers the various ongoing change Replicat configuration settings
    and options. After that, it discusses how to start the Replicat and verify that
    it''s properly applying changes to the target. Let''s begin with configuring the
    Replicat.


    Before you start to configure the Replicat, you should go back and double check
    the Oracle GoldenGate prerequisites on the target server, as covered in the earlier
    section “Prerequisites.” Then you can begin configuring the Replicat. In order
    to do this, you first need to create a parameter file for the Replicat. Remember,
    you''re configuring the Replicat to apply all the SQL DML changes from the `PAYROLL`
    database, except for the two tables you''re excluding.


    Let''s look at the Replicat parameters for `RPREMP1` on the new server, as shown
    in the following example:


    `GGSCI (newserver) 1> edit params RPREMP1`

    ```

    Replicat RPREMP1

    -------------------------------------------------------------------

    -- Replicat for PAYROLL database

    -------------------------------------------------------------------


    USERID GGER, PASSWORD userpw


    ReportCount Every 10000 Records, Rate

    Report at 00:30


    DiscardFile dirrpt/RPREMP1.dsc, Append

    DiscardRollover at 02:00


    -- HandleCollisions should be turned off after the initial load synchronization.

    HandleCollisions


    AssumeTargetDefs


    Map PAYROLL.*, Target PAYROLL.* ;

    ```


    You may wonder why you don''t exclude the two tables that you excluded in the
    Extracts. The reason is that the tables were already excluded in the Extracts,
    so the data isn''t included in the trail files being processed by the Replicat.
    You can simply tell Oracle GoldenGate to apply all the data in the trail file
    for the `PAYROLL` database, which doesn''t include the two excluded tables.


    Now that you''ve set up the Replicat configuration parameters, the next step is
    to add the Replicat group. The following example adds the `RPREMP1` Replicat to
    the Oracle GoldenGate configuration:


    `GGSCI (newserver) > ADD REPLICAT RPREMP1, EXTTRAIL dirdat/p2`


    Tip: When adding your Replicat, you can use a specific checkpoint table name in
    the database or use the default database checkpoint table specified in the `GLOBALS`
    file, as discussed in [Chapter 5](#Chapter05.html#ch5). You can also specify `NODBCHECKPOINT`
    to indicate that the Replicat will only write checkpoints to a file on disk.


    After adding the Replicat, you need to start it to actually begin applying changes
    to the target database. The following example starts the Replicat `RPREMP1` on
    the new server:


    `GGSCI (newserver) > START REPLICAT RPREMP1`


    You can verify that the Replicat is running using the `INFO REPLICAT` command.
    You should see a `Status` of `RUNNING`. If you see a `Status` of `STOPPED` or
    `ABENDED`, there may be a problem.


    Let''s do an `INFO` command on the Replicat `RPREMP1` to check the status:


    `GGSCI (newserver) 2> INFO REPLICAT RPREMP1`


    After verifying that the Replicat is running, you should also confirm that the
    Replicat is processing data using the `STATS` command.


    Note: When you''re finished synchronizing the old and the new databases, you should
    perform data validation. There may be cases where the data isn''t replicated properly,
    or perhaps there is an error in the configuration. You can do data validation
    manually with SQL queries for row counts and some selected data values, or use
    an automated tool such as Oracle GoldenGate Veridata. Refer to [Chapter 9](#Chapter09.html#ch9)
    for more information on Veridata.


    Next, let''s add the Oracle GoldenGate processes for the replication from the
    new database back to the old database.'
  raw: '#### Configuring the Data Pump for Zero-Downtime Migration


    When the Local Extract is started, you can proceed with configuring, adding, and
    starting the data pump. In this example, you configure the data pump to read the
    `p1` trail file written out by the Local Extract named LPREMP1 on the old server
    and pump it over the TCP/IP network to the target server to be processed by the
    Replicat on the new server.


    From GGSCI, you can edit the parameters for the data pump as shown in this example:


    `GGSCI (oldserver) 1> edit params PPREMP1`


    `Extract PPREMP1`


    `-------------------------------------------------------------------`

    `-- Data-pump Extract for PAYROLL database`

    `-------------------------------------------------------------------`


    `PassThru`


    `ReportCount Every 10000 Records, Rate`

    `Report at 00:30`


    `DiscardFile dirrpt/PPREMP1.dsc, Append`

    `DiscardRollover at 02:00`


    `RmtHost newserver, MgrPort 7809`

    `RmtTrail dirdat/p2`


    `Table PAYROLL.*;`

    `TableExclude PAYROLL.EXCLUDETABLE1;`

    `TableExclude PAYROLL.EXCLUDETABLE2;`


    Now that you''ve set up your data-pump Extract configuration parameters, the next
    step is to add the data-pump Extract group on the old server. You can do that
    using the commands shown in the following example:


    `GGSCI (oldserver) > ADD EXTRACT PPREMP1, EXTTRAILSOURCE dirdat/p1`

    `GGSCI (oldserver) > ADD RMTTRAIL dirdat/p2, EXTRACT PPREMP1, MEGABYTES 500`


    After adding the data-pump Extract, you need to start it to begin processing records
    from the source trail file:


    `GGSCI (oldserver) > START EXTRACT PPREMP1`


    Next, you can verify that the data-pump Extract has started using the `INFO EXTRACT`
    command:


    `GGSCI (oldserver) 2> INFO EXTRACT PPREMP1`


    You should see a `Status` of `RUNNING`. If you see a `Status` of `STOPPED` or
    `ABENDED`, there may be a problem.


    You should also run the `STATS` command on the data-pump Extract to confirm it''s
    processing data:


    `GGSCI (oldserver) 2> STATS EXT PPREMP1`


    Now that the Local Extract and Data-pump Extract are started, you can begin the
    initial data load.


    You learned about the different methods for initially loading data in [Chapter
    4](#Chapter04.html#ch4). These methods also work for the initial data load for
    the zero-downtime migration replication. Remember that the initial load process
    is happening during the period *prior* to the actual application migration cutover.
    This period can be a few days, weeks, or even months before the actual cutover.
    You can perform the initial load and have the data synchronized, waiting for the
    scheduled cutover window. You can use either Oracle GoldenGate itself or the DBMS
    vendor load utilities to do the initial data load. Refer to [Chapter 4](#Chapter04.html#ch4)
    for more details on the initial load process.


    #### Configuring the Replicat for Zero-Downtime Migration


    After you''ve loaded your data, you can start the Replicat to apply the changes
    that have been captured by the Extract while the initial data load was running.
    These changes have been queued up in the trail files while the load was running
    and are waiting to be applied by the Replicat. After you''ve configured, added,
    and successfully started the Replicat, the changes from the trail are applied
    to the target tables.


    When the initial changes have been applied and there is no Oracle GoldenGate lag
    left, the databases are fully synchronized. At this point, the Local and data-pump
    Extracts and Replicat can continue to run and keep the old and new databases synchronized
    in real time with the ongoing changes. The new database is ready and waiting for
    the application to cutover for the migration.


    This section covers the various ongoing change Replicat configuration settings
    and options. After that, it discusses how to start the Replicat and verify that
    it''s properly applying changes to the target. Let''s begin with configuring the
    Replicat.


    Before you start to configure the Replicat, you should go back and double check
    the Oracle GoldenGate prerequisites on the target server, as covered in the earlier
    section “Prerequisites.” Then you can begin configuring the Replicat. In order
    to do this, you first need to create a parameter file for the Replicat. Remember,
    you''re configuring the Replicat to apply all the SQL DML changes from the PAYROLL
    database, except for the two tables you''re excluding.


    Let''s look at the Replicat parameters for RPREMP1 on the new server, as shown
    in the following example:


    `GGSCI (newserver) 1> edit params RPREMP1`


    `Replicat RPREMP1`


    `-------------------------------------------------------------------`

    `-- Replicat for PAYROLL database`

    `-------------------------------------------------------------------`


    `USERID GGER, PASSWORD userpw`


    `ReportCount Every 10000 Records, Rate`

    `Report at 00:30`


    `DiscardFile dirrpt/RPREMP1.dsc, Append`

    `DiscardRollover at 02:00`


    `-- HandleCollisions should be turned off after the initial load synchronization.`

    `HandleCollisions`


    `AssumeTargetDefs`


    `Map PAYROLL.*, Target PAYROLL.* ;`


    You may wonder why you don''t exclude the two tables that you excluded in the
    Extracts. The reason is that the tables were already excluded in the Extracts,
    so the data isn''t included in the trail files being processed by the Replicat.
    You can simply tell Oracle GoldenGate to apply all the data in the trail file
    for the PAYROLL database, which doesn''t include the two excluded tables.


    Now that you''ve set up the Replicat configuration parameters, the next step is
    to add the Replicat group. The following example adds the RPREMP1 Replicat to
    the Oracle GoldenGate configuration:


    `GGSCI (newserver) > ADD REPLICAT RPREMP1, EXTTRAIL dirdat/p2`


    ![images](images/square.jpg) **Tip** When adding your Replicat, you can use a
    specific checkpoint table name in the database or use the default database checkpoint
    table specified in the `GLOBALS` file, as discussed in [Chapter 5](#Chapter05.html#ch5).
    You can also specify `NODBCHECKPOINT` to indicate that the Replicat will only
    write checkpoints to a file on disk.


    After adding the Replicat, you need to start it to actually begin applying changes
    to the target database. The following example starts the Replicat RPREMP1 on the
    new server:


    `GGSCI (newserver) > START REPLICAT RPREMP1`


    You can verify that the Replicat is running using the `INFO REPLICAT` command.
    You should see a `Status` of `RUNNING`. If you see a `Status` of `STOPPED` or
    `ABENDED`, there may be a problem.


    Let''s do an `INFO` command on the Replicat RPREMP1 to check the status:


    `GGSCI (newserver) 2> INFO REPLICAT RPREMP1`


    After verifying that the Replicat is running, you should also confirm that the
    Replicat is processing data using the `STATS` command.


    ![images](images/square.jpg) **Note** When you''re finished synchronizing the
    old and the new databases, you should perform data validation. There may be cases
    where the data isn''t replicated properly, or perhaps there is an error in the
    configuration. You can do data validation manually with SQL queries for row counts
    and some selected data values, or use an automated tool such as Oracle GoldenGate
    Veridata. Refer to [Chapter 9](#Chapter09.html#ch9) for more information on Veridata.


    Next, let''s add the Oracle GoldenGate processes for the replication from the
    new database back to the old database.'
  trans: '

    ## 配置数据泵以实现零停机迁移


    当本地 Extract 启动后，您就可以继续配置、添加并启动数据泵了。在本示例中，您将配置数据泵，用于读取旧服务器上名为`LPREMP1`的本地 Extract
    写出的`p1`跟踪文件，并通过 TCP/IP 网络将其泵送至目标服务器，由新服务器上的复制进程进行处理。


    从`GGSCI`中，您可以按此示例所示编辑数据泵的参数：


    `GGSCI (oldserver) 1> edit params PPREMP1`

    ```

    Extract PPREMP1

    -------------------------------------------------------------------

    -- PAYROLL 数据库的数据泵 Extract

    -------------------------------------------------------------------


    PassThru


    ReportCount Every 10000 Records, Rate

    Report at 00:30


    DiscardFile dirrpt/PPREMP1.dsc, Append

    DiscardRollover at 02:00


    RmtHost newserver, MgrPort 7809

    RmtTrail dirdat/p2


    Table PAYROLL.*;

    TableExclude PAYROLL.EXCLUDETABLE1;

    TableExclude PAYROLL.EXCLUDETABLE2;

    ```


    既然您已设置好数据泵 Extract 的配置参数，下一步是在旧服务器上添加数据泵 Extract 组。您可以使用以下示例中的命令来完成：


    `GGSCI (oldserver) > ADD EXTRACT PPREMP1, EXTTRAILSOURCE dirdat/p1`

    `GGSCI (oldserver) > ADD RMTTRAIL dirdat/p2, EXTRACT PPREMP1, MEGABYTES 500`


    添加数据泵 Extract 后，您需要启动它以开始处理源跟踪文件中的记录：


    `GGSCI (oldserver) > START EXTRACT PPREMP1`


    接下来，您可以使用`INFO EXTRACT`命令来验证数据泵 Extract 是否已启动：


    `GGSCI (oldserver) 2> INFO EXTRACT PPREMP1`


    您应该看到`Status`为`RUNNING`。如果看到`Status`为`STOPPED`或`ABENDED`，则可能存在问题。


    您还应该在数据泵 Extract 上运行`STATS`命令，以确认它正在处理数据：


    `GGSCI (oldserver) 2> STATS EXT PPREMP1`


    现在，本地 Extract 和数据泵 Extract 均已启动，您可以开始初始数据加载了。


    您在第 4 章中了解了不同的初始数据加载方法。这些方法同样适用于零停机迁移复制的初始数据加载。请记住，初始加载过程发生在实际应用切换之前的这段时间内。这段时间可能是实际切换前的几天、几周甚至几个月。您可以执行初始加载并使数据保持同步，等待预定的切换窗口。您可以使用
    Oracle GoldenGate 本身或数据库厂商的加载工具来完成初始数据加载。有关初始加载过程的更多详情，请参阅第 4 章。


    ## 配置复制进程以实现零停机迁移


    加载数据后，您可以启动复制进程，以应用在初始数据加载期间由 Extract 捕获的更改。这些更改在加载期间已被排入跟踪文件队列，等待复制进程应用。在您配置、添加并成功启动复制进程后，跟踪文件中的更改便会被应用到目标表。


    当初始更改应用完毕，且不存在 Oracle GoldenGate 延迟时，数据库即完全同步。此时，本地和数据泵 Extract 以及复制进程可以继续运行，使新旧数据库与持续的更改保持实时同步。新数据库已准备就绪，等待应用程序切换以完成迁移。


    本节将介绍各种持续更改的复制进程配置设置和选项。之后，将讨论如何启动复制进程并验证其是否正确地将更改应用到目标。让我们从配置复制进程开始。


    在开始配置复制进程之前，您应返回并再次检查目标服务器上的 Oracle GoldenGate 先决条件，如前面“先决条件”部分所述。然后，您就可以开始配置复制进程了。为此，首先需要为复制进程创建一个参数文件。请记住，您正在配置复制进程以应用来自`PAYROLL`数据库的所有
    SQL DML 更改，但您排除的那两个表除外。


    让我们看一下新服务器上`RPREMP1`的复制进程参数，如下例所示：


    `GGSCI (newserver) 1> edit params RPREMP1`

    ```

    Replicat RPREMP1

    -------------------------------------------------------------------

    -- PAYROLL 数据库的复制进程

    -------------------------------------------------------------------


    USERID GGER, PASSWORD userpw


    ReportCount Every 10000 Records, Rate

    Report at 00:30


    DiscardFile dirrpt/RPREMP1.dsc, Append

    DiscardRollover at 02:00


    -- 初始加载同步后应关闭 HandleCollisions。

    HandleCollisions


    AssumeTargetDefs


    Map PAYROLL.*, Target PAYROLL.* ;

    ```


    您可能想知道为什么不像在 Extract 中那样排除那两个表。原因是这些表已经在 Extract 中被排除，因此其数据不包含在复制进程正在处理的跟踪文件中。您只需告诉
    Oracle GoldenGate 应用跟踪文件中`PAYROLL`数据库的所有数据即可，其中不包含被排除的两个表。


    既然您已设置好复制进程的配置参数，下一步是添加复制进程组。以下示例将`RPREMP1`复制进程添加到 Oracle GoldenGate 配置中：


    `GGSCI (newserver) > ADD REPLICAT RPREMP1, EXTTRAIL dirdat/p2`


    提示：添加复制进程时，您可以使用数据库中的特定检查点表名，也可以使用`GLOBALS`文件中指定的默认数据库检查点表，如第 5 章所述。您还可以指定`NODBCHECKPOINT`，表示复制进程仅将检查点写入磁盘上的文件。


    添加复制进程后，您需要启动它才能开始实际向目标数据库应用更改。以下示例在新服务器上启动复制进程`RPREMP1`：


    `GGSCI (newserver) > START REPLICAT RPREMP1`


    您可以使用`INFO REPLICAT`命令验证复制进程是否正在运行。您应该看到`Status`为`RUNNING`。如果看到`Status`为`STOPPED`或`ABENDED`，则可能存在问题。


    让我们对复制进程`RPREMP1`执行一个`INFO`命令来检查状态：


    `GGSCI (newserver) 2> INFO REPLICAT RPREMP1`


    验证复制进程正在运行后，您还应使用`STATS`命令确认其正在处理数据。


    注意：当您完成新旧数据库的同步后，应执行数据验证。在某些情况下，数据可能未正确复制，或者配置中可能存在错误。您可以使用 SQL 查询手动进行数据验证，检查行数和一些选定的数据值，也可以使用自动化工具，如
    Oracle GoldenGate Veridata。有关 Veridata 的更多信息，请参阅第 9 章。


    接下来，让我们添加用于从新数据库复制回旧数据库的 Oracle GoldenGate 进程。

    '
- fmt: '#### Configuring the Fallback Local Extract for Zero-Downtime Migration


    When you''re successfully replicating from the old database to the new database,
    the next part is to add the fallback Extract. For now, you''re only *adding* the
    Extract. Later, you *start* it after the application cutover activities.


    Let''s begin by configuring the fallback Local Extract. In the example, you''re
    configuring the Local Extract to capture all the SQL DML changes from the `PAYROLL`
    database on the new database, except two tables that are being excluded. Because
    you''ve already used trail files `p1` and `p2`, you can use trail files `p3` and
    `p4` for replication from the new database back to the old database.


    ##### Reviewing Local Extract Parameters


    Begin by reviewing the parameters for the Local Extract on the new server, as
    shown in the following example:


    ```

    GGSCI (newserver) 1> edit params LPREMP2


    Extract LPREMP2


    -------------------------------------------------------------------

    -- Local extract for PAYROLL database

    -------------------------------------------------------------------


    USERID GGER, PASSWORD userpw


    ExtTrail dirdat/p3


    ReportCount Every 10000 Records, Rate

    Report at 00:30


    DiscardFile dirrpt/LPREMP2.dsc, Append

    DiscardRollover at 02:00


    Table PAYROLL.*;

    TableExclude PAYROLL.EXCLUDETABLE1;

    TableExclude PAYROLL.EXCLUDETABLE2;

    ```


    ##### Adding the Fallback Extract


    Next, add the fallback Extract to the Oracle GoldenGate configuration so you''re
    ready to start it after the application migration cutover. You can do that using
    the following commands from `GGSCI`:


    ```

    GGSCI (newserver) > ADD EXTRACT LPREMP2, TRANLOG, BEGIN NOW

    GGSCI (newserver) > ADD EXTTRAIL dirdat/p3, EXTRACT LPREMP2, MEGABYTES 500

    ```


    You start the fallback Local Extract later after the application cutover. Next,
    let''s add the fallback data pump.


    #### Configuring the Fallback Data-Pump for Zero-Downtime Migration


    With the fallback Local Extract added, you can configure and add the fallback
    data pump. In this example, you configure the data pump to read the `p3` trail
    file written out by the fallback Local Extract named `LPREMP2` and pump it over
    the TCP/IP network to the old server to be processed by the `Replicat`.


    ##### Reviewing Data-Pump Parameters


    From `GGSCI`, you can edit and review the parameters for the data pump as shown
    here:


    ```

    GGSCI (newserver) 1> edit params PPREMP2


    Extract PPREMP2


    -------------------------------------------------------------------

    -- Data-pump Extract for PAYROLL database

    -------------------------------------------------------------------


    PassThru


    ReportCount Every 10000 Records, Rate

    Report at 00:30


    DiscardFile dirrpt/PPREMP2.dsc, Append

    DiscardRollover at 02:00


    RmtHost oldserver, MgrPort 7809

    RmtTrail dirdat/p4


    Table PAYROLL.*;

    TableExclude PAYROLL.EXCLUDETABLE1;

    TableExclude PAYROLL.EXCLUDETABLE2;

    ```


    ##### Adding the Data-Pump Extract Group


    The next step is to add the data-pump Extract group. You can do that using the
    following commands:


    ```

    GGSCI (newserver) > ADD EXTRACT PPREMP2, EXTTRAILSOURCE dirdat/p3

    GGSCI (newserver) > ADD RMTTRAIL dirdat/p4, EXTRACT PPREMP2, MEGABYTES 500

    ```


    You don''t start the data pump until later, so let''s move on to adding the fallback
    `Replicat`.


    #### Configuring the Fallback Replicat for Zero-Downtime Migration


    Next you should add a fallback `Replicat` that will be ready to apply any changes
    to your old database after the application migration cutover. By adding it now,
    before it''s needed, you''re ready to start it when needed.


    ##### Creating the Replicat Parameter File


    First create a parameter file for the `Replicat`. You''re configuring the `Replicat`
    to apply all the DML changes from the newly migrated `PAYROLL` database back to
    the old database in case of fallback. Notice that you removed the `HANDLECOLLISIONS`
    parameter from the fallback `Replicat`. You shouldn''t have any collisions at
    this point because the databases are already synchronized.


    Let''s look at the `Replicat` parameters for `RPREMP2`, as shown in the following
    example:


    ```

    GGSCI (newserver) 1> edit params RPREMP2


    Replicat RPREMP2


    -------------------------------------------------------------------

    -- Replicat for PAYROLL database

    -------------------------------------------------------------------


    USERID GGER, PASSWORD userpw


    ReportCount Every 10000 Records, Rate

    Report at 00:30


    DiscardFile dirrpt/RPREMP2.dsc, Append

    DiscardRollover at 02:00


    AssumeTargetDefs


    Map PAYROLL.*, Target PAYROLL.* ;

    ```


    ##### Adding the Replicat Group


    The next step is to add the `Replicat` group. Here''s you''re adding the `RPREMP2`
    `Replicat` to the Oracle GoldenGate configuration:


    ```

    GGSCI (oldserver) > ADD REPLICAT RPREMP2, EXTTRAIL dirdat/p4

    ```


    Remember, you won''t start the fallback `Replicat` until after the application
    migration cutover to the new database.


    You''re now finished with the initial setup for the zero-downtime migration replication.
    All the steps you''ve completed so far are in preparation for the application
    cutover. With old and the new databases synchronized, you''re prepared for the
    cutover to the new database during your migration window.'
