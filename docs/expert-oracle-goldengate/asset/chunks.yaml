    \ 00:27:53.063000\n  提取跟踪文件：C:\\ggs\\dirdat\\C1\n```\n\n## 检查当前 Oracle 联机重做日志\n\
    \n根据上一节我们知道提取进程 `EXTGGS1` 正在读取序列号 (`sequence#`) 175，我们想知道这个序列号 175 是否是当前最新的。以下查询可以告诉我们\
    \ Oracle 正在处理哪个重做日志文件序列号。\n\n```sql\nSELECT\n  A.MEMBER,\n  B.SEQUENCE#,\n  B.STATUS,\n\
    \  B.FIRST_CHANGE#,\n  B.NEXT_CHANGE#,\n  B.ARCHIVED\nFROM   V$LOGFILE A, V$LOG\
    \ B\nWHERE  A.GROUP# = B.GROUP#\n```\n\n```\nMEMBER                          序列号\
    \   状态      首次变更号  下次变更号\nC:\\ORCL\\REDO03.LOG              174         非活动  \
    \  6591047        6621440\nC:\\ORCL\\REDO02.LOG              173         非活动 \
    \   6560323        6591047\nC:\\ORCL\\REDO01.LOG              175         当前 \
    \     6621440        281474976710655\n```\n\n`first_change#` 和 `next_change#`\
    \ 是 Oracle 的 SCN 号。当前重做日志的序列号 (`sequence#`) 是 175。`EXTGGS1` 的序列号也是 175。两者都是 175，说明它们是同步的。因此，GoldenGate\
    \ 提取进程没有延迟。序列号 (`sequence#`) 为 174 及更小的重做日志位于归档日志区。\n\n## 检查归档日志\n\n要找出 GoldenGate\
    \ 正在读取联机重做日志还是归档重做日志，可以使用以下 GGSCI 命令：\n\n```bash\nGGSCI> Info extract extggs1,\
    \ detail\nEXTRACT    EXTGGS1   上次启动时间 2011-04-09 22:36   状态：运行中\n检查点延迟       00:00:00\
    \ (更新于 00:00:02 前)\n日志读取检查点  Oracle 重做日志\n                     2011-04-10 00:16:47\
    \  序列号 175，RBA 36263936\n```\n\n序列号 (`Seqno`) 是 175，因为它当前正在读取联机重做日志。如果提取进程没有读取联机重做日志并已落后，那么它的序列号\
    \ (`seqno`) 会小于 175。你可以按照以下方式检查它正在读取哪个归档日志：\n\n```sql\nSELECT  SEQUENCE#,\n  \
    \      NAME,\n        FIRST_CHANGE#,\n        NEXT_CHANGE#\nFROM   V$ARCHIVED_LOG\n\
    ```\n\n```\n序列号  名称                                          首次变更号  下次变更号\n171\
    \        C:\\ARC0000000171_0718807864.0001              6527997        6542114\n\
    172        C:\\ARC0000000172_0718807864.0001              6542114        6560323\n\
    173        C:\\ARC0000000173_0718807864.0001              6560323        6591047\n\
    174        C:\\ARC0000000174_0718807864.0001              6591047        6621440\n\
    ```\n\n默认的归档日志命名约定包含了日志序列号 (`sequence#`)。如果 DBA 更改了命名约定，你可以使用序列号 (`sequence#`)\
    \ 来找出 GoldenGate 正在读取哪个归档重做日志文件。在正常操作期间，最大序列号 (`sequence#`) +1 应该是当前重做日志的序列号 (`seqno`)——本例中为\
    \ 175。如果不是，则说明提取进程已落后。要确定提取进程是否在写入跟踪文件，请检查跟踪文件的大小。在“监控提取详情”部分，跟踪文件是 `c1000009`，其中\
    \ 9 是跟踪文件的序列号 (`seqno`)。跟踪文件的 `RBA` 是 2964，因此你可以多次使用 `info extract extggs1, detail`\
    \ 命令来检查 `RBA` 是否增长。或者，你可以在 Unix/Linux 中使用 `ls -ls` 命令或在 Windows 中使用 `dir` 命令多次检查跟踪文件的大小。\n\
    \n## 监控 GoldenGate 速率和重做日志消耗速率\n\n默认情况下，`stats` 命令会列出所有有事务的表。你可以使用 `totalsonly`、`by\
    \ table` 和 `reportrate` 来限制显示。你也可以重置统计信息。\n\n```bash\nGGSCI  30> stats extggs1\n\
    正在向 EXTRACT EXTGGS1 发送 STATS 请求 ...\n统计信息开始于 2011-04-10 00:05:46.\n输出到 C:\\ggs\\\
    dirdat\\C1：\n从 GGS.SOURCE_TABLE 提取到 GGS.SOURCE_TABLE：\n*** 自 2011-04-09 22:36:18\
    \ 以来的总计统计信息 ***\n        插入总数                                     0.00\n     \
    \   更新总数                                    12.00\n        删除总数              \
    \                       0.00\n        丢弃总数                                   \
    \  0.00\n        操作总数                                 12.00\n*** 自 2011-04-10\
    \ 00:00:00 以来的每日统计信息 ***\n        未执行任何数据库操作。\n*** 自 2011-04-10 00:00:00 以来的每小时统计信息\
    \ ***\n        未执行任何数据库操作。\n*** 自 2011-04-09 22:36:18 以来的最新统计信息 ***\n        插入总数\
    \                                     0.00\n        更新总数                     \
    \               12.00\n        删除总数                                     0.00\n\
    \        丢弃总数                                     0.00\n        操作总数         \
    \                        12.00\n统计信息结束。\n```\n\n如果你执行以下命令，如果在映射中没有特殊过滤器，它们应该给出相似的操作数量：\n\
    \n在源端：\n```bash\nGGSCI> stats dpggs1 totalsonly *\nGGSCI> stats extggs1 totalsonly\
    \ *\n```\n\n在目标端：\n```bash\nGGSCI> stats repggs1 totalsonly *\n```\n\n如果你看到不同的操作数量，那么过程中可能有数据丢失或被过滤。例如，在单向复制中，提取端\
    \ (`Extract`) 和复制端 (`Replicate`) 的所有统计信息应该匹配。如果你在源表中插入了 10 条记录，但目标表中只有 9 条，那一定是有问题了。\n\
    \n## 监控各组的延迟\n\n有多种方法可以找出 GoldenGate 进程中的延迟。所有方法都类似，你可以使用一种或全部方法来验证延迟。\n\n监控延迟对于确保数据实时同步至关重要。你可以使用\
    \ `lag extract` 或 `lag replicat` 命令直接查看延迟时间，或者通过比较源端和目标端的序列号（如前所述）、检查点时间戳以及 `stats`\
    \ 命令报告的速率来进行综合判断。如果发现延迟持续增长，需要检查网络、系统资源或 GoldenGate 进程本身是否有瓶颈。"
- fmt: "## 监控GoldenGate进程\n\n#### 使用 `getlag` 命令\n\n第一种方法使用 `getlag` 命令：\n\n```\n\
    GGSCI> lag extract extggs1\n```\n\n或者\n\n```\nGGSCI> send extract extggs1, getlag\n\
    ```\n```\nSending GETLAG request to EXTRACT EXTGGS1 ...\nLast record lag: 1 seconds.\n\
    ```\n\n你会得到以下三种状态之一：\n\n*   `\"At EOF, no more records to process\"`：Extract、数据泵或Replicat没有延迟。如果数据仍然没有被复制，请检查跟踪文件名或数据库连接，确保它们设置正确。\n\
    *   `\"Waiting for data to process\"`：在Extract中，Extract进程正在等待重做日志。在数据泵中，Extract正在等待Extract跟踪文件。在Replicat中，Replicate进程正在等待数据泵或Extract跟踪文件。延迟可能是网络或磁盘I/O问题导致的。\n\
    *   `\"Processing data\"`：Extract、数据泵或Replicat正忙于处理数据。其中一个进程可能是瓶颈。如果这个状态是暂时的并在几秒钟后消失，这是正常的。\n\
    \n#### 使用 `Write Checkpoint` 命令\n\n下一种方法使用 `Write Checkpoint #`*`n`* 命令来验证延迟：\n\
    \n```\nGGSCI> info extract extggs1, showch 10\n```\n```\nWrite Checkpoint #1\n\
    \n  GGS Log Trail\n\n  Current Checkpoint (current write position):\n    Sequence\
    \ #: 7\n    RBA: 1411\n    Timestamp: 2011-04-11 22:00:53.446000\nExtract Trail:\
    \ C:\\ggs\\dirdat\\C2\n\nWrite Checkpoint #1\n\n  GGS Log Trail\n\n  Current Checkpoint\
    \ (current write position):\n    Sequence #: 6\n    RBA: 4994\n    Timestamp:\
    \ 2011-04-10 22:51:25.477000\n    Extract Trail: C:\\ggs\\dirdat\\C2\n```\n\n\
    在数据泵进程上执行上述命令，并比较 `Sequence#`、RBA和时间戳。如果我们期望Extract进程捕获数据，那么序列号和RBA应该在Extract、数据泵和Replicat进程中递增。如果序列号或RBA停滞或比其他进程增长得慢，那么该进程可能存在延迟问题。\n\
    \n#### 使用跟踪文件生成速率\n\n另一种监控延迟的方法是记录Extract、数据泵和Replicat进程当前的 `Sequence#` 和文件大小。本章使用`c1*nnnnnn*`表示数据泵，使用`c2*nnnnnn*`表示Replicat（`c1`和`c2`中的六个*`n`*并不相同——每个都有自己的序列号）。\n\
    \n我们可以通过列出目录文件（Linux/Unix中使用`ls –l`，Windows中使用`dir`）来获取`c1`和`c2`的最大序列号。最大序列号就是该进程当前的跟踪文件。例如，Extract正在写入`C1000011`文件，但如果数据泵进程正在读取`C1000011`以外的任何文件，那么数据泵进程就存在延迟。`C1000011`连接在Extract和数据泵进程之间。而`C200008`连接在数据泵和Replicat进程之间。\n\
    \n如以下所示，检查每个跟踪文件的最大`Sequence#`：\n\n```\nGGSCI (STRICHCHUT61) 21> shell dir dirdat\n\
    ```\n```\nDirectory of C:\\ggs\\dirdat\n\n04/12/2011  06:28 PM               994\
    \ C1000010\n04/12/2011  06:28 PM               994 C1000011\n04/12/2011  06:29\
    \ PM             1,411 C2000007\n04/12/2011  06:29 PM             1,455 C2000008\n\
    ```\n\n如上所示，`c1`的最大`Sequence#`是11，`C2`的最大`Sequence#`是8。\n\n要确认Extract是否正在无延迟地写入当前跟踪文件，我们可以使用以下GGSCI命令：\n\
    \n```\nGGSCI> info extggs1, detail\n```\n```\nEXTRACT    EXTGGS1   Last Started\
    \ 2011-04-12 18:28   Status RUNNING\nCheckpoint Lag       00:00:00 (updated 00:00:05\
    \ ago)\nLog Read Checkpoint  Oracle Redo Logs\n                     2011-04-12\
    \ 19:13:40  Seqno 187, RBA 33210880\n\n  Target Extract Trails:\n  Remote Trail\
    \ Name                               Seqno       RBA     Max MB\n  C:\\ggs\\dirdat\\\
    C1                                    11         994          5\n```\n\nExtract正在读取重做日志`seqno`\
    \ 187。你可以使用本章“检查当前Oracle联机重做日志”一节中的查询来确定`seqno` 187是当前的还是旧的。如果当前的Oracle重做日志`seqno`是187，那么Extract没有延迟。如果它大于187，那么延迟发生在源数据库端，Extract跟不上重做日志的生成速度。这种延迟情况可能是暂时的——例如，在大型更新期间。但如果延迟持续存在，你需要调整Extract。还要注意，Extract正在为跟踪文件`c1`写入`seqno`\
    \ 11。\n\n要确认数据泵是否也在读取`seqno` 11，请执行以下GGSCI命令：\n\n```\nGGSCI> info dpggs1, detail\n\
    ```\n```\nEXTRACT    DPGGS1    Last Started 2011-04-12 18:29   Status RUNNING\n\
    Checkpoint Lag       00:00:00 (updated 00:00:04 ago)\nLog Read Checkpoint  File\
    \ c:\\ggs\\dirdat\\c1000011\n                     2011-04-12 18:28:41.860000 \
    \ RBA 994\n\n  Target Extract Trails:\n  Remote Trail Name                   \
    \             Seqno      RBA     Max MB\n  C:\\ggs\\dirdat\\C2               \
    \                      8        1455          5\n```\n\n数据泵也在读取`c1000011` (`seqno`\
    \ 11)，所以没有延迟。如果数据泵读取的`seqno`小于11，那么数据泵跟不上Extract。这可能是网络问题导致的，这种情况下你需要调整数据泵进程。注意，数据泵正在远程跟踪文件`c2`上写入`seqno`\
    \ 8。要检查Replicat是否与数据泵同步，请运行以下GGSCI命令：\n\n```\nGGSCI 22> info repggs1, detail\n\
    ```\n```\nREPLICAT   REPGGS1   Last Started 2011-04-12 18:28   Status RUNNING\n\
    Checkpoint Lag       00:00:00 (updated 00:00:06 ago)\nLog Read Checkpoint  File\
    \ c:\\ggs\\dirdat\\c2000008\n                     2011-04-12 18:28:41.860000 \
    \ RBA 1455\n```\n\n在这种情况下，Replicat正在读取和处理`c2`上的`seqno` 8。数据泵也在`C2`上写入`seqno` 8，所以没有延迟。然而，如果该Replicat正在读取小于8的`seqno`，那么目标数据库端可能存在数据库问题。\n\
    \n#### 在 `ggserr.log` 文件中记录延迟状态\n\n你还可以在Manager参数文件中设置延迟报告频率：\n\n```\nLAGINFO[MINUTES|SECONDS|HOURS],\
    \ example. LAGINFOSECONDS 30\nLAGREPORT[MINUTES|HOURS], example LAGREPORTMINUTES\
    \ 1\n```\n\nManager每30秒将延迟信息报告到`ggserr.log`文件，并且每分钟检查一次延迟。在`ggserr`中查看延迟报告。\n\n\
    ### 查看事件和错误日志\n\n`view reports <group_name>` 命令显示最近发生于各组的错误和事件：\n\n```\nGGSCI\
    \ > view report extggs1\nGGSCI > view report mgr\nGGSCI >  view report repggs1\n\
    ```\n\n详细历史记录在`ggserr.log`中。GoldenGate也会在Windows的`/var/log/messages`和事件日志中记录错误。\n\
    \n### 自动化监控\n\n现在你知道如何手动监控GoldenGate进程，是时候自动化它们了。本节介绍几个监控脚本。所有脚本都可扩展到多个Extract和Replicat。作为最佳实践，监控脚本应位于不同的系统上，因为如果监控服务器宕机，你将无法收到在该服务器上运行的任何警报。将所有监控脚本放在不同的地方，你可以在不遗漏任何警报的情况下承受任何系统中断。"
  raw: '##### Using getlag


    The first approach uses the `getlag` command:


    `GGSCI> lag extract extggs1`


    Or


    `GGSCI> send extract extggs1, getlag`


    `Sending GETLAG request to EXTRACT EXTGGS1 ...`

    `Last record lag: 1 seconds.`


    You get one of the three statuses:


    *   “At EOF, no more records to process”: There is no lag in the Extract, data
    pump, or Replicat. If the data still isn''t replicating, check the trail file
    names or the database connection to make sure they''re set up properly.

    *   “Waiting for data to process”: In the Extract, Extract process is waiting
    for the redo log. In the data pump, Extract is waiting for the Extract trail files.
    In the Replicat, Replicate process is waiting for the Data Pump or Extract trail
    files. The lag may be the network or disk I/O issues.

    *   “Processing data”: The Extract, data pump, or Replicat is busy grinding the
    data. One of these processes may be the bottleneck. It''s normal if this status
    is temporary and goes away after a few seconds.


    ##### Using Write Checkpoint


    The next approach uses the `Write Checkpoint #`*`n`* command to validate the lag:


    `GGSCI> info extract extggs1, showch 10`


    `Write Checkpoint #1`


    `  GGS Log Trail`


    `  Current Checkpoint (current write position):`

    `    Sequence #: 7`

    `    RBA: 1411`

    `    Timestamp: 2011-04-11 22:00:53.446000`

    `Extract Trail: C:\ggs\dirdat\C2`


    `Write Checkpoint #1`


    `  GGS Log Trail`


    `  Current Checkpoint (current write position):`

    `    Sequence #: 6`

    `    RBA: 4994`

    `    Timestamp: 2011-04-10 22:51:25.477000`

    `    Extract Trail: C:\ggs\dirdat\C2`


    Execute the above command on the data pump process, and compare the `Sequence#`,
    RBA, and timestamp. If we expect the extract process to capture the data, the
    sequence# and RBA should increase in Extract, Data Pump and Replicat processes.
    If the sequence# or RBA are stuck or increased slower than other process, then
    that process may have lag issue.


    ##### Using the Trail File Generation Rate


    Another approach to monitor the lag is to note the current `Sequence#` and file
    size for the Extract, data pump, and Replicat processes. This chapter uses c1*nnnnnn*
    for the data pump and c2*nnnnnn* for the Replicat (the six *`n`*s in c1 and c2
    aren''t the same—each has its own sequence number).


    We can get the maxiumum sequence# for c1 and c2 by listing the directory files
    (`ls –l` in Linux/Unix or `dir` in Windows). The maximum sequence# is the current
    trail file for the process. For examples, Extract is writing the C1000011 file,
    but if the Data Pump process is reading anything other than C1000011 file, then
    we have lag in the Data Pump process. C1000011 is connected between Extract and
    Data Pump processes. Whereas C200008 is connected between Data Pump and Replicat
    processes.


    Check the maximum `Sequence#` for each trail file as shown here:


    `GGSCI (STRICHCHUT61) 21> shell dir dirdat`


    `Directory of C:\ggs\dirdat`


    `04/12/2011  06:28 PM               994 C1000010`

    `04/12/2011  06:28 PM               994 C10000`***`11`***

    `04/12/2011  06:29 PM             1,411 C2000007`

    `04/12/2011  06:29 PM             1,455 C20000`***`08`***


    The maximum `Sequence#` for c1 is 11 and for C2 is 8 as shown above.


    To confirm if the extract is writing to the current trail file without any lag,
    we can use the following GGSCI command:


    `GGSCI> info extggs1, detail`


    `EXTRACT    EXTGGS1   Last Started 2011-04-12 18:28   Status RUNNING`

    `Checkpoint Lag       00:00:00 (updated 00:00:05 ago)`

    `Log Read Checkpoint  Oracle Redo Logs`

    `                     2011-04-12 19:13:40  Seqno 187, RBA 33210880`


    `  Target Extract Trails:`

    `  Remote Trail Name                               Seqno       RBA     Max MB`

    `  C:\ggs\dirdat\C1                                    11              994          5`


    The Extract is reading the redo log `seqno` 187\. You can use the query in the
    “Checking the Current Oracle Online Redo Log” section of this chapter to find
    out if `seqno` 187 is current or old. If the current Oracle redo log `seqno` is
    187, then there is no lag in the Extract. If it''s larger than 187, then the lag
    is on the source database side and the Extract can''t keep up with the redo log
    generation. This lag situation may be temporary—for example, during large updates.
    But if the lag persists, you need to tune the Extract. Also note that the extract
    is writing to `seqno` 11 for the trail file c1.


    To confirm if the Data Pump is also reading the seqno 11, do the following GGSCI
    command:


    `GGSCI> info dpggs1, detail`


    `EXTRACT    DPGGS1    Last Started 2011-04-12 18:29   Status RUNNING`

    `Checkpoint Lag       00:00:00 (updated 00:00:04 ago)`

    `Log Read Checkpoint  File c:\ggs\dirdat\c10000`***`11`***

    `                     2011-04-12 18:28:41.860000  RBA 994`


    `  Target Extract Trails:`

    `  Remote Trail Name                                Seqno      RBA     Max MB`

    `  C:\ggs\dirdat\C2                                     8              1455          5`


    The data pump is also reading c1000011 (`seqno` 11), so there is no lag. If the
    data dump is reading a `seqno` less than 11, then the data pump can''t keep up
    with the Extract. This may be due to a network issue, in which case you need to
    tune the Data Pump process. Note that the data pump is writing `seqno` 8 on remote
    trail file c2\. To check the replicat is in-sync with the data dump, run the following
    GGSCI command:


    `GGSCI 22> info repggs1, detail`


    `REPLICAT   REPGGS1   Last Started 2011-04-12 18:28   Status RUNNING`

    `Checkpoint Lag       00:00:00 (updated 00:00:06 ago)`

    `Log Read Checkpoint  File c:\ggs\dirdat\c2000008`

    `                     2011-04-12 18:28:41.860000  RBA 1455`


    In this case, the Replicat is reading and processing `seqno` 8 on c2\. The data
    pump is also writing `seqno` 8 on C2, so there is no lag. However, if that Replicat
    was reading a `seqno` less than 8, then there might be a database issue on the
    target database.


    ##### Recording the Lag Status in the ggserr.log File


    You also can set the lag report frequency in the Manager parameter file:


    `LAGINFO[MINUTES|SECONDS|HOURS], example. LAGINFOSECONDS 30`

    `LAGREPORT[MINUTES|HOURS], example LAGREPORTMINUTES 1`


    The Manager reports the lag information to the `ggserr.log` file every 30 seconds,
    and it checks the lag every minute. Check `ggserr` for the lag reports.


    #### Viewing Event and Error Logs


    The `view reports <group_name>` command shows the most recent errors and events
    occurring to groups:


    `GGSCI > view report extggs1`

    `GGSCI > view report mgr`

    `GGSCI >  view report repggs1`


    The detailed history is in `ggserr.log`. GoldenGate also logs errors in `/var/log/messages`
    and to the Event Log in Windows.


    ### Automating Monitoring


    Now that you know how to monitor GoldenGate processes manually, it''s time to
    automate them. This section goes over a few monitoring scripts. All the scripts
    are scalable to multiple Extracts and Replicats. As a best practice, the monitoring
    scripts should be in different systems, because if the monitoring server is down,
    you don''t get any alerts that are running on that server. With all your monitoring
    scripts in different places, you can endure any system outages without missing
    any alerts.'
  trans: "\n## 监控 GoldenGate 进程\n\n#### 使用 `getlag` 命令\n\n第一种方法使用 `getlag` 命令：\n\n\
    ```\nGGSCI> lag extract extggs1\n```\n\n或者\n\n```\nGGSCI> send extract extggs1,\
    \ getlag\n```\n```\nSending GETLAG request to EXTRACT EXTGGS1 ...\nLast record\
    \ lag: 1 seconds.\n```\n\n你会得到以下三种状态之一：\n\n*   `\"At EOF, no more records to process\"\
    `：Extract、数据泵或 Replicat 没有延迟。如果数据仍然没有被复制，请检查跟踪文件名或数据库连接，确保它们设置正确。\n*   `\"Waiting\
    \ for data to process\"`：在 Extract 中，Extract 进程正在等待重做日志。在数据泵中，Extract 正在等待 Extract\
    \ 跟踪文件。在 Replicat 中，Replicate 进程正在等待数据泵或 Extract 跟踪文件。延迟可能是网络或磁盘 I/O 问题导致的。\n\
    *   `\"Processing data\"`：Extract、数据泵或 Replicat 正忙于处理数据。其中一个进程可能是瓶颈。如果这个状态是暂时的并在几秒钟后消失，这是正常的。\n\
    \n#### 使用 `Write Checkpoint` 命令\n\n下一种方法使用 `Write Checkpoint #`*`n`* 命令来验证延迟：\n\
    \n```\nGGSCI> info extract extggs1, showch 10\n```\n```\nWrite Checkpoint #1\n\
    \n  GGS Log Trail\n\n  Current Checkpoint (current write position):\n    Sequence\
    \ #: 7\n    RBA: 1411\n    Timestamp: 2011-04-11 22:00:53.446000\nExtract Trail:\
    \ C:\\ggs\\dirdat\\C2\n\nWrite Checkpoint #1\n\n  GGS Log Trail\n\n  Current Checkpoint\
    \ (current write position):\n    Sequence #: 6\n    RBA: 4994\n    Timestamp:\
    \ 2011-04-10 22:51:25.477000\n    Extract Trail: C:\\ggs\\dirdat\\C2\n```\n\n\
    在数据泵进程上执行上述命令，并比较 `Sequence#`、RBA 和时间戳。如果我们期望 Extract 进程捕获数据，那么序列号和 RBA 应该在 Extract、数据泵和\
    \ Replicat 进程中递增。如果序列号或 RBA 停滞或比其他进程增长得慢，那么该进程可能存在延迟问题。\n\n#### 使用跟踪文件生成速率\n\n\
    另一种监控延迟的方法是记录 Extract、数据泵和 Replicat 进程当前的 `Sequence#` 和文件大小。本章使用`c1*nnnnnn*`表示数据泵，使用`c2*nnnnnn*`表示\
    \ Replicat（`c1`和`c2`中的六个*`n`*并不相同——每个都有自己的序列号）。\n\n我们可以通过列出目录文件（Linux/Unix 中使用`ls\
    \ –l`，Windows 中使用`dir`）来获取`c1`和`c2`的最大序列号。最大序列号就是该进程当前的跟踪文件。例如，Extract 正在写入`C1000011`文件，但如果数据泵进程正在读取`C1000011`以外的任何文件，那么数据泵进程就存在延迟。`C1000011`连接在\
    \ Extract 和数据泵进程之间。而`C200008`连接在数据泵和 Replicat 进程之间。\n\n如以下所示，检查每个跟踪文件的最大`Sequence#`：\n\
    \n```\nGGSCI (STRICHCHUT61) 21> shell dir dirdat\n```\n```\nDirectory of C:\\\
    ggs\\dirdat\n\n04/12/2011  06:28 PM               994 C1000010\n04/12/2011  06:28\
    \ PM               994 C1000011\n04/12/2011  06:29 PM             1,411 C2000007\n\
    04/12/2011  06:29 PM             1,455 C2000008\n```\n\n如上所示，`c1`的最大`Sequence#`是\
    \ 11，`C2`的最大`Sequence#`是 8。\n\n要确认 Extract 是否正在无延迟地写入当前跟踪文件，我们可以使用以下 GGSCI 命令：\n\
    \n```\nGGSCI> info extggs1, detail\n```\n```\nEXTRACT    EXTGGS1   Last Started\
    \ 2011-04-12 18:28   Status RUNNING\nCheckpoint Lag       00:00:00 (updated 00:00:05\
    \ ago)\nLog Read Checkpoint  Oracle Redo Logs\n                     2011-04-12\
    \ 19:13:40  Seqno 187, RBA 33210880\n\n  Target Extract Trails:\n  Remote Trail\
    \ Name                               Seqno       RBA     Max MB\n  C:\\ggs\\dirdat\\\
    C1                                    11         994          5\n```\n\nExtract\
    \ 正在读取重做日志`seqno` 187。你可以使用本章“检查当前 Oracle 联机重做日志”一节中的查询来确定`seqno` 187 是当前的还是旧的。如果当前的\
    \ Oracle 重做日志`seqno`是 187，那么 Extract 没有延迟。如果它大于 187，那么延迟发生在源数据库端，Extract 跟不上重做日志的生成速度。这种延迟情况可能是暂时的——例如，在大型更新期间。但如果延迟持续存在，你需要调整\
    \ Extract。还要注意，Extract 正在为跟踪文件`c1`写入`seqno` 11。\n\n要确认数据泵是否也在读取`seqno` 11，请执行以下\
    \ GGSCI 命令：\n\n```\nGGSCI> info dpggs1, detail\n```\n```\nEXTRACT    DPGGS1  \
    \  Last Started 2011-04-12 18:29   Status RUNNING\nCheckpoint Lag       00:00:00\
    \ (updated 00:00:04 ago)\nLog Read Checkpoint  File c:\\ggs\\dirdat\\c1000011\n\
    \                     2011-04-12 18:28:41.860000  RBA 994\n\n  Target Extract\
    \ Trails:\n  Remote Trail Name                                Seqno      RBA \
    \    Max MB\n  C:\\ggs\\dirdat\\C2                                     8     \
    \   1455          5\n```\n\n数据泵也在读取`c1000011` (`seqno` 11)，所以没有延迟。如果数据泵读取的`seqno`小于\
    \ 11，那么数据泵跟不上 Extract。这可能是网络问题导致的，这种情况下你需要调整数据泵进程。注意，数据泵正在远程跟踪文件`c2`上写入`seqno`\
    \ 8。要检查 Replicat 是否与数据泵同步，请运行以下 GGSCI 命令：\n\n```\nGGSCI 22> info repggs1, detail\n\
    ```\n```\nREPLICAT   REPGGS1   Last Started 2011-04-12 18:28   Status RUNNING\n\
    Checkpoint Lag       00:00:00 (updated 00:00:06 ago)\nLog Read Checkpoint  File\
    \ c:\\ggs\\dirdat\\c2000008\n                     2011-04-12 18:28:41.860000 \
    \ RBA 1455\n```\n\n在这种情况下，Replicat 正在读取和处理`c2`上的`seqno` 8。数据泵也在`C2`上写入`seqno`\
    \ 8，所以没有延迟。然而，如果该 Replicat 正在读取小于 8 的`seqno`，那么目标数据库端可能存在数据库问题。\n\n#### 在 `ggserr.log`\
    \ 文件中记录延迟状态\n\n你还可以在 Manager 参数文件中设置延迟报告频率：\n\n```\nLAGINFO[MINUTES|SECONDS|HOURS],\
    \ example. LAGINFOSECONDS 30\nLAGREPORT[MINUTES|HOURS], example LAGREPORTMINUTES\
    \ 1\n```\n\nManager 每 30 秒将延迟信息报告到`ggserr.log`文件，并且每分钟检查一次延迟。在`ggserr`中查看延迟报告。\n\
    \n### 查看事件和错误日志\n\n`view reports <group_name>` 命令显示最近发生于各组的错误和事件：\n\n```\nGGSCI\
    \ > view report extggs1\nGGSCI > view report mgr\nGGSCI >  view report repggs1\n\
    ```\n\n详细历史记录在`ggserr.log`中。GoldenGate 也会在 Windows 的`/var/log/messages`和事件日志中记录错误。\n\
    \n### 自动化监控\n\n现在你知道如何手动监控 GoldenGate 进程，是时候自动化它们了。本节介绍几个监控脚本。所有脚本都可扩展到多个 Extract\
    \ 和 Replicat。作为最佳实践，监控脚本应位于不同的系统上，因为如果监控服务器宕机，你将无法收到在该服务器上运行的任何警报。将所有监控脚本放在不同的地方，你可以在不遗漏任何警报的情况下承受任何系统中断。\n"
- fmt: "## Checking GoldenGate Process Scripts\n\nThis monitoring script is low overhead;\
    \ you can run it every 5 minutes to check whether any GoldenGate process is up.\
    \ The script doesn't include a restart because most Manager parameters should\
    \ include an auto-restart. Copy the block for each new process you want to monitor:\n\
    \n```ksh\n#!/bin/ksh\nEMAIL_LIST=\"shingchung@aol.com 5555555555@vtext.com\"\n\
    host=`hostname`\ngghome=/ggs\n\ncheck=`ps -ef|grep extggs1|grep -v \"grep extggs1\"\
    |wc -l`;\ncheck_num=`expr $check`\n\nif [ $check_num -le 0 ]\nthen\n    echo \"\
    GoldenGate Extract EXTGGS1 is down on $host.\" > $gghome/extggs1.out\n    tail\
    \ -200 $gghome/dirrpt/eextggs1.rpt >> $gghome/extggs1.out\n    mailx -s \"GoldenGate\
    \ EXTGGS1 Down on $host\" $EMAIL_LIST < $gghome/extggs1.out\nfi\n\ncheck=`ps -ef|grep\
    \ dpggs1|grep -v \"grep dpggs1\"|wc -l`;\ncheck_num=`expr $check`\n\nif [ $check_num\
    \ -le 0 ]\nthen\n    echo \"GoldenGate Extract DPGGS1 is down on $host.\" > $gghome/dpggs1.out\n\
    \    tail -200 $gghome/dirrpt/dpggs1.rpt >>$gghome/dpggs1.out\n    mailx -s \"\
    GoldenGate Extract DPGGS1 Down on $host\" $EMAIL_LIST < $gghome/dpggs1.out\nfi\n\
    ```\n\nIf there is any abend or even an inadvertent stop, you get an alert e-mail\
    \ or page. If a network issue or temporary database issue causes an abend, it\
    \ should fix it; then the alert will go away. However, in rare cases, if GoldenGate\
    \ hangs, this script won't catch the error. You can use the lag-alert script in\
    \ the next section to catch almost all GoldenGate issues.\n\n## Monitoring Lag\
    \ Scripts\n\nThis lag-monitoring script reports the overall lag from the source\
    \ database to target database. It's all on PL/SQL and is easy to port to other\
    \ databases.\n\nYou must run this script on the target database. You can use a\
    \ table with the most frequent transactions, or you can use a dummy table, `source_table`,\
    \ and `target_table` to track the lag. If you use a dummy table, you can update\
    \ the same column with a timestamp every second using `dbms_job` or a scheduled\
    \ job. Then, calculate the time difference for the same table on the target side.\
    \ The difference is the lag value.\n\nYou can use two different schedules for\
    \ this script:\n\n*   Run `GGS.GET_LAG` every 5 seconds to update the `LAG_HISTORY`\
    \ table.\n*   Run `GGS.GET_LAG` every hour to send information about the lag value\
    \ to you, so you know the alert is running. If you don't get hourly information\
    \ alert, then you know something is wrong.\n\nThis script is an independent monitoring\
    \ process that doesn't tie to any GoldenGate process. So, it alerts us if any\
    \ of the monitor points are broken in [Figure 8-1](#Chapter08.html#fig_8_1). Some\
    \ of the scenarios are as following:\n\n*   The GoldenGate administrator stops\
    \ the Extract inadvertently, so GoldenGate is in the `STOP` state rather than\
    \ `ABEND`.\n*   Someone deletes the Extract by mistake.\n*   The Extract process\
    \ hangs.\n*   The source server goes down.\n*   Someone accidentally turns off\
    \ the monitoring shell scripts on the source/target side.\n\nIf there are any\
    \ issues with the CPU, memory, locks, and so on that cause the database to slow\
    \ down, you get a high lag alert.\n\n`GG_LAG_HISOTRY` table stores all the historical\
    \ lag values. You can use this table for reporting and integrating with other\
    \ monitoring tools and ETLs. Sample lag charts are shown in [Figure 8-2](#Chapter08.html#fig_8_2)\
    \ and [Figure 8-3](#Chapter08.html#fig_8_3):\n\n```sql\nCREATE TABLE GGS.GG_LAG_HISTORY\n\
    (\n  AUDIT_TIME  DATE,\n  LAG         NUMBER\n);\n\n---- Dummy Source table. Map\
    \ this table in the extract that you are monitoring\nCREATE TABLE GGS.SOURCE_TABLE\n\
    (\n  UPDATE_DATE  DATE,\n  UPDATE_ID    NUMBER\n);\n\n---- Dummy Target table.\
    \ Map this in the replicat that you are replicating\nCREATE TABLE GGS.TARGET_TABLE\n\
    (\n  UPDATE_DATE  DATE,\n  UPDATE_ID    NUMBER\n);\n\n---- Schedule this to run\
    \ every one or five seconds.\nCREATE OR REPLACE PROCEDURE GGS.GET_LAG\nIS\n  \
    \ L_MAX_TIME   DATE;\n   L_LAG        NUMBER;\nBEGIN\n\n   SELECT   MAX (UPDATE_DATE)\
    \ INTO L_MAX_TIME FROM TARGET_TABLE;\n---- if target and source are in different\
    \ timezone, add timezone offset value in this calculation.\n   SELECT   (SYSDATE\
    \ - UPDATE_DATE) * 24 * 60 * 60\n     INTO   L_LAG\n     FROM   GGS.TARGET_TABLE;\n\
    \n   INSERT INTO GGS.GG_LAG_HISTORY (AUDIT_TIME, LAG)\n     VALUES   (SYSDATE,\
    \ L_LAG);\n\n   COMMIT;\n\n------ email alerts if the lag is more than 5 minutes.\n\
    \   IF L_LAG > 300\n   THEN\n\n---- if you want Oracle to send email alert, you\
    \ can use this.\n      GGS.SEND_EMAIL ('shingchung@aol.com.com, 5555555555@vtext.com',\n\
    \                      'Golden Gate Admin',\n                      'ggs@somecompany.com',\n\
    \                      'Golden Gate Data Is Behind',\n                      'The\
    \ Lag Is ' || L_LAG || ' Seconds');\n   END IF;\n\n---- if you want use kick this\
    \ off from shell script, this dbms output will return the lag value\n   DBMS_OUTPUT.PUT_LINE\
    \ (L_LAG);\nEXCEPTION\n   WHEN OTHERS\n   THEN\n      NULL;\nEND GET_LAG;\n/\n\
    \n---- this is the send_email procedure for Oracle for your reference, you can\
    \ use your own.\nCREATE OR REPLACE PROCEDURE GGS.SEND_EMAIL (I_TO_EMAIL     IN\
    \ VARCHAR2,\n                                            I_FROM_NAME    IN VARCHAR2,\n\
    \                                            I_FROM_EMAIL   IN VARCHAR2,\n   \
    \                                         I_SUBJECT      IN VARCHAR2,\n      \
    \                                      I_MESSEGE      IN VARCHAR2)\nIS\n   C \
    \                  UTL_SMTP.CONNECTION;\n   L_EMAIL_START_POS   NUMBER (5) :=\
    \ 1;\n   L_EMAIL_END_POS     NUMBER (5) := 0;\n   L_EMAIL_CNT         NUMBER (5)\
    \ := 0;\n   L_EMAIL             VARCHAR2 (250);\n   L_LAST_EMAIL_ADDR   BOOLEAN\
    \ := FALSE;\n\n   PROCEDURE SEND_HEADER (NAME IN VARCHAR2, HEADER IN VARCHAR2)\n\
    \   AS\n   BEGIN\n      UTL_SMTP.WRITE_DATA (C, NAME || ': ' || HEADER || UTL_TCP.CRLF);\n\
    \   END;\nBEGIN\n   C := UTL_SMTP.OPEN_CONNECTION ('your.mail.relay.server');\n\
    \   UTL_SMTP.HELO (C, 'foo.com');\n   UTL_SMTP.MAIL (C, I_FROM_EMAIL);\n\n   LOOP\n\
    \      L_EMAIL_CNT := L_EMAIL_CNT + 1;\n\n      L_EMAIL_END_POS :=\n         INSTR\
    \ (STR1   => I_TO_EMAIL,\n                STR2   => ',',\n                POS\
    \    => 1,\n                NTH    => L_EMAIL_CNT);\n\n      L_LAST_EMAIL_ADDR\
    \ := (L_EMAIL_END_POS <= 0);\n\n      L_EMAIL_END_POS :=\n         CASE\n    \
    \        WHEN (L_EMAIL_END_POS <= 0) THEN LENGTH (I_TO_EMAIL) + 1\n          \
    \  WHEN (L_EMAIL_START_POS = 0) THEN L_EMAIL_END_POS - 1\n            ELSE L_EMAIL_END_POS\n\
    \         END;\n\n      L_EMAIL :=\n         SUBSTR (STR1   => I_TO_EMAIL,\n \
    \                POS    => L_EMAIL_START_POS,\n                 LEN    => (L_EMAIL_END_POS\
    \ - L_EMAIL_START_POS));\n\n      UTL_SMTP.RCPT (C, L_EMAIL);\n\n      EXIT WHEN\
    \ L_LAST_EMAIL_ADDR;\n\n      L_EMAIL_START_POS := L_EMAIL_END_POS + 1;\n   END\
    \ LOOP;\n\n   UTL_SMTP.OPEN_DATA (C);\n   SEND_HEADER ('From', '\"' || I_FROM_NAME\
    \ || '\" <' || I_FROM_EMAIL || '>');\n   SEND_HEADER ('To', '\"Recipient\" <'\
    \ || I_TO_EMAIL || '>');\n   SEND_HEADER ('Subject', I_SUBJECT);\n   UTL_SMTP.WRITE_DATA\
    \ (C, UTL_TCP.CRLF || I_MESSEGE);\n   UTL_SMTP.CLOSE_DATA (C);\n   UTL_SMTP.QUIT\
    \ (C);\nEXCEPTION\n   WHEN UTL_SMTP.TRANSIENT_ERROR OR UTL_SMTP.PERMANENT_ERROR\n\
    \   THEN\n      BEGIN\n         UTL_SMTP.QUIT (C);\n      EXCEPTION\n        \
    \ WHEN UTL_SMTP.TRANSIENT_ERROR OR UTL_SMTP.PERMANENT_ERROR\n         THEN\n \
    \           NULL;\n      END;\n\n      RAISE_APPLICATION_ERROR (\n         -20000,\n\
    \         'Failed: ' || SQLERRM\n      );\nEND SEND_EMAIL;\n/\n```\n\n![images](images/0802.jpg)\n\
    \n***Figure 8-2.** Average lag in seconds by day of week*\n\n![images](images/0803.jpg)\n\
    \n***Figure 8-3.** Average lag in seconds by hour*"
  raw: '#### Checking GoldenGate Process Scripts


    This monitoring script is low overhead; you can run it every 5 minutes to check
    whether any GoldenGate process is up. The script doesn''t include a restart because
    most Manager parameters should include an auto-restart. Copy the block for each
    new process you want to monitor:


    `#!/bin/ksh`


    `EMAIL_LIST="shingchung@aol.com 5555555555@vtext.com"`


    `` host=`hostname` ``

    `gghome=/ggs`


    ``check=`ps -ef|grep extggs1|grep -v "grep extggs1"|wc -l`;``

    `` check_num=`expr $check` ``


    `if [ $check_num -le 0 ]`

    `then`

    `echo "GoldenGate Extract EXTGGS1 is down on $host." > $gghome/extggs1.out`

    `tail -200 $gghome/dirrpt/eextggs1.rpt >> $gghome/extggs1.out`

    `    mailx -s "GoldenGate EXTGGS1 Down on $host" $EMAIL_LIST < $gghome/extggs1.out`

    `fi`


    ``check=`ps -ef|grep dpggs1|grep -v "grep dpggs1"|wc -l`;``

    `` check_num=`expr $check` ``


    `if [ $check_num -le 0 ]`

    `then`

    `echo "GoldenGate Extract DPGGS1 is down on $host." > $gghome/dpggs1.out`

    `   tail -200 $gghome/dirrpt/dpggs1.rpt >>$gghome/dpggs1.out`

    `    mailx -s "GoldenGate Extract DPGGS1 Down on $host" $EMAIL_LIST < $gghome/dpggs1.out`

    `fi`


    If there is any abend or even an inadvertent stop, you get an alert e-mail or
    page. If a network issue or temporary database issue causes an abend, a should
    fix it; then the alert will go away. However, in rare cases, if GoldenGate hangs,
    this script won''t catch the error. You can use the lag-alert script in the next
    section to catch almost all GoldenGate issues.


    #### Monitoring Lag Scripts


    This lag-monitoring script reports the overall lag from the source database to
    target database. It''s all on PL/SQL and is easy to port to other databases.


    You must run this script on the target database. You can use a table with the
    most frequent transactions, or you can use a dummy table, source_table, and target_table
    to track the lag. If you use a dummy table, you can update the same column with
    a timestamp every second using `dbms_job` or a scheduled job. Then, calculate
    the time difference for the same table on the target side. The difference is the
    lag value.


    You can use two different schedules for this script:


    *   Run `GGS.GET_LAG` every 5 seconds to update the LAG_HISTORY table.

    *   Run `GGS.GET_LAG` every hour to send information about the lag value to you,
    so you know the alert is running. If you don''t get hourly information alert,
    then you know something is wrong.


    This script is an independent monitoring process that doesn''t tie to any GoldenGate
    process. So, it alerts us if any of the monitor points are broken in [Figure 8-1](#Chapter08.html#fig_8_1).
    Some of the scenarios are as following:


    *   The GoldenGate administrator stops the Extract inadvertently, so GoldenGate
    is in the `STOP` state rather than `ABEND`.

    *   Someone deletes the Extract by mistake.

    *   The Extract process hangs.

    *   The source server goes down.

    *   Someone accidentally turns off the monitoring shell scripts on the source/target
    side.


    If there are any issues with the CPU, memory, locks, and so on that cause the
    database to slow down, you get a high lag alert.


    GG_LAG_HISOTRY table stores all the historical lag values. You can use this table
    for reporting and integrating with other monitoring tools and ETLs. Sample lag
    charts are shown in [Figure 8-2](#Chapter08.html#fig_8_2) and [Figure 8-3](#Chapter08.html#fig_8_3):


    `CREATE TABLE GGS.GG_LAG_HISTORY`

    `(`

    `  AUDIT_TIME  DATE,`

    `  LAG         NUMBER`

    `)`


    `---- Dummy Source table. Map this table in the extract that you are monitoring`

    `CREATE TABLE GGS.SOURCE_TABLE`

    `(`

    `  UPDATE_DATE  DATE,`

    `  UPDATE_ID    NUMBER`

    `)`


    `---- Dummy Target table. Map this in the replicat that you are replicating`

    `CREATE TABLE GGS.TARGET_TABLE`

    `(`

    `  UPDATE_DATE  DATE,`

    `  UPDATE_ID    NUMBER`

    `)`


    `---- Schedule this to run every one or five seconds.`

    `CREATE OR REPLACE PROCEDURE GGS.GET_LAG`

    `IS`

    `   L_MAX_TIME   DATE;`

    `   L_LAG        NUMBER;`

    `BEGIN`


    `   SELECT   MAX (UPDATE_DATE) INTO L_MAX_TIME FROM TARGET_TABLE;`

    `---- if target and source are in different timezone, add timezone offset value
    in this calculation.`

    `   SELECT   (SYSDATE - UPDATE_DATE) * 24 * 60 * 60`

    `     INTO   L_LAG`

    `     FROM   GGS.TARGET_TABLE;`


    `   INSERT INTO GGS.GG_LAG_HISTORY (AUDIT_TIME, LAG)`

    `     VALUES   (SYSDATE, L_LAG);`


    `   COMMIT;`


    `------ email alerts if the lag is more than 5 minutes.`

    `   IF L_LAG > 300`

    `   THEN`


    `---- if you want Oracle to send email alert, you can use this.`

    `      GGS.SEND_EMAIL (''shingchung@aol.com.com, 5555555555@vtext.com'',`

    `                      ''Golden Gate Admin'',`

    `                      ''ggs@somecompany.com'',`

    `                      ''Golden Gate Data Is Behind'',`

    `                      ''The Lag Is '' || L_LAG || '' Seconds'');`

    `   END IF;`


    `---- if you want use kick this off from shell script, this dbms output will return
    the lag`

    `value`

    `   DBMS_OUTPUT.PUT_LINE (L_LAG);`

    `EXCEPTION`

    `   WHEN OTHERS`

    `   THEN`

    `      NULL;`

    `END GET_LAG;`

    `/`


    `---- this is the send_email procedure for Oracle for your reference, you can
    use your own.`

    `CREATE OR REPLACE PROCEDURE GGS.SEND_EMAIL (I_TO_EMAIL     IN VARCHAR2,`

    `                                            I_FROM_NAME    IN VARCHAR2,`

    `                                            I_FROM_EMAIL   IN VARCHAR2,`

    `                                            I_SUBJECT      IN VARCHAR2,`

    `                                            I_MESSEGE      IN VARCHAR2)`

    `IS`

    `   C                   UTL_SMTP.CONNECTION;`

    `   L_EMAIL_START_POS   NUMBER (5) := 1;`

    `   L_EMAIL_END_POS     NUMBER (5) := 0;`

    `   L_EMAIL_CNT         NUMBER (5) := 0;`

    `   L_EMAIL             VARCHAR2 (250);`

    `   L_LAST_EMAIL_ADDR   BOOLEAN := FALSE;`


    `   PROCEDURE SEND_HEADER (NAME IN VARCHAR2, HEADER IN VARCHAR2)`

    `   AS`

    `   BEGIN`

    `      UTL_SMTP.WRITE_DATA (C, NAME || '': '' || HEADER || UTL_TCP.CRLF);`

    `   END;`

    `BEGIN`

    `   C := UTL_SMTP.OPEN_CONNECTION (''your.mail.relay.server'');`

    `   UTL_SMTP.HELO (C, ''foo.com'');`

    `   UTL_SMTP.MAIL (C, I_FROM_EMAIL);`


    `   LOOP`

    `      L_EMAIL_CNT := L_EMAIL_CNT + 1;`


    `      L_EMAIL_END_POS :=`

    `         INSTR (STR1   => I_TO_EMAIL,`

    `                STR2   => '','',`

    `                POS    => 1,`

    `                NTH    => L_EMAIL_CNT);`


    `      L_LAST_EMAIL_ADDR := (L_EMAIL_END_POS <= 0);`


    `      L_EMAIL_END_POS :=`

    `         CASE`

    `            WHEN (L_EMAIL_END_POS <= 0) THEN LENGTH (I_TO_EMAIL) + 1`

    `            WHEN (L_EMAIL_START_POS = 0) THEN L_EMAIL_END_POS - 1`

    `            ELSE L_EMAIL_END_POS`

    `         END;`


    `      L_EMAIL :=`

    `         SUBSTR (STR1   => I_TO_EMAIL,`

    `                 POS    => L_EMAIL_START_POS,`

    `                 LEN    => (L_EMAIL_END_POS - L_EMAIL_START_POS));`


    `      UTL_SMTP.RCPT (C, L_EMAIL);`


    `      EXIT WHEN L_LAST_EMAIL_ADDR;`


    `      L_EMAIL_START_POS := L_EMAIL_END_POS + 1;`

    `   END LOOP;`


    `   UTL_SMTP.OPEN_DATA (C);`

    `   SEND_HEADER (''From'', ''"'' || I_FROM_NAME || ''" <'' || I_FROM_EMAIL ||
    ''>'');`

    `   SEND_HEADER (''To'', ''"Recipient" <'' || I_TO_EMAIL || ''>'');`

    `   SEND_HEADER (''Subject'', I_SUBJECT);`

    `   UTL_SMTP.WRITE_DATA (C, UTL_TCP.CRLF || I_MESSEGE);`

    `   UTL_SMTP.CLOSE_DATA (C);`

    `   UTL_SMTP.QUIT (C);`

    `EXCEPTION`

    `   WHEN UTL_SMTP.TRANSIENT_ERROR OR UTL_SMTP.PERMANENT_ERROR`

    `   THEN`

    `      BEGIN`

    `         UTL_SMTP.QUIT (C);`

    `      EXCEPTION`

    `         WHEN UTL_SMTP.TRANSIENT_ERROR OR UTL_SMTP.PERMANENT_ERROR`

    `         THEN`

    `            NULL;`

    `      END;`


    `      RAISE_APPLICATION_ERROR (`

    `         -20000,`

    `         ''Failed: '' || SQLERRM`

    `      );`

    `END SEND_EMAIL;`

    `/` ![images](images/0802.jpg)


    ***Figure 8-2.** Average lag in seconds by day of week*


    ![images](images/0803.jpg)


    ***Figure 8-3.** Average lag in seconds by hour*'
  trans: "\n## 检查 GoldenGate 进程脚本\n\n此监控脚本开销低；您可以每 5 分钟运行一次，以检查任何 GoldenGate 进程是否在运行。脚本不包括重启功能，因为大多数管理器参数应已包含自动重启。为您要监控的每个新进程复制以下代码块：\n\
    \n```ksh\n#!/bin/ksh\nEMAIL_LIST=\"shingchung@aol.com 5555555555@vtext.com\"\n\
    host=`hostname`\ngghome=/ggs\n\ncheck=`ps -ef|grep extggs1|grep -v \"grep extggs1\"\
    |wc -l`;\ncheck_num=`expr $check`\n\nif [ $check_num -le 0 ]\nthen\n    echo \"\
    GoldenGate Extract EXTGGS1 is down on $host.\" > $gghome/extggs1.out\n    tail\
    \ -200 $gghome/dirrpt/eextggs1.rpt >> $gghome/extggs1.out\n    mailx -s \"GoldenGate\
    \ EXTGGS1 Down on $host\" $EMAIL_LIST < $gghome/extggs1.out\nfi\n\ncheck=`ps -ef|grep\
    \ dpggs1|grep -v \"grep dpggs1\"|wc -l`;\ncheck_num=`expr $check`\n\nif [ $check_num\
    \ -le 0 ]\nthen\n    echo \"GoldenGate Extract DPGGS1 is down on $host.\" > $gghome/dpggs1.out\n\
    \    tail -200 $gghome/dirrpt/dpggs1.rpt >>$gghome/dpggs1.out\n    mailx -s \"\
    GoldenGate Extract DPGGS1 Down on $host\" $EMAIL_LIST < $gghome/dpggs1.out\nfi\n\
    ```\n\n如果出现任何异常终止（abend）甚至意外停止，您将收到警报电子邮件或页面。如果是网络问题或临时数据库问题导致异常终止，它应该会自行修复；然后警报会消失。然而，在极少数情况下，如果\
    \ GoldenGate 挂起，此脚本将无法捕获错误。您可以使用下一节中的延迟警报脚本来捕获几乎所有 GoldenGate 问题。\n\n## 监控延迟脚本\n\
    \n此延迟监控脚本报告从源数据库到目标数据库的整体延迟。它完全使用 PL/SQL 编写，易于移植到其他数据库。\n\n您必须在目标数据库上运行此脚本。您可以使用一个具有最频繁事务的表，或者您可以使用一个虚拟表，`source_table`\
    \ 和 `target_table` 来跟踪延迟。如果使用虚拟表，您可以通过 `dbms_job` 或计划作业每秒使用时间戳更新同一列。然后，在目标端计算相同表的时间差。该差值即为延迟值。\n\
    \n您可以为此脚本使用两种不同的调度：\n\n*   每 5 秒运行一次 `GGS.GET_LAG` 以更新 `LAG_HISTORY` 表。\n*   每小时运行一次\
    \ `GGS.GET_LAG` 以将有关延迟值的信息发送给您，以便您知道警报正在运行。如果您没有收到每小时的信息警报，那么您就知道出了问题。\n\n此脚本是一个独立的监控进程，不绑定到任何\
    \ GoldenGate 进程。因此，如果 图 8-1 中的任何监控点出现故障，它会向我们发出警报。部分场景如下：\n\n*   GoldenGate 管理员意外停止了\
    \ Extract，因此 GoldenGate 处于 `STOP` 状态而非 `ABEND` 状态。\n*   有人误删了 Extract。\n*   Extract\
    \ 进程挂起。\n*   源服务器宕机。\n*   有人意外关闭了源/目标端的监控 Shell 脚本。\n\n如果 CPU、内存、锁等出现任何问题导致数据库变慢，您将收到高延迟警报。\n\
    \n`GG_LAG_HISOTRY` 表存储所有历史延迟值。您可以将此表用于报告以及与其他监控工具和 ETL 集成。示例延迟图表如 图 8-2 和 图 8-3\
    \ 所示：\n\n```sql\nCREATE TABLE GGS.GG_LAG_HISTORY\n(\n  AUDIT_TIME  DATE,\n  LAG\
    \         NUMBER\n);\n\n---- 虚拟源表。将此表映射到您正在监控的 Extract 中\nCREATE TABLE GGS.SOURCE_TABLE\n\
    (\n  UPDATE_DATE  DATE,\n  UPDATE_ID    NUMBER\n);\n\n---- 虚拟目标表。将此映射到您正在复制的 Replicat\
    \ 中\nCREATE TABLE GGS.TARGET_TABLE\n(\n  UPDATE_DATE  DATE,\n  UPDATE_ID    NUMBER\n\
    );\n\n---- 调度此过程每秒或每五秒运行一次。\nCREATE OR REPLACE PROCEDURE GGS.GET_LAG\nIS\n   L_MAX_TIME\
    \   DATE;\n   L_LAG        NUMBER;\nBEGIN\n\n   SELECT   MAX (UPDATE_DATE) INTO\
    \ L_MAX_TIME FROM TARGET_TABLE;\n---- 如果目标和源在不同时区，请在此计算中添加时区偏移值。\n   SELECT  \
    \ (SYSDATE - UPDATE_DATE) * 24 * 60 * 60\n     INTO   L_LAG\n     FROM   GGS.TARGET_TABLE;\n\
    \n   INSERT INTO GGS.GG_LAG_HISTORY (AUDIT_TIME, LAG)\n     VALUES   (SYSDATE,\
    \ L_LAG);\n\n   COMMIT;\n\n------ 如果延迟超过 5 分钟，则发送电子邮件警报。\n   IF L_LAG > 300\n\
    \   THEN\n\n---- 如果您希望 Oracle 发送电子邮件警报，可以使用此功能。\n      GGS.SEND_EMAIL ('shingchung@aol.com.com,\
    \ 5555555555@vtext.com',\n                      'Golden Gate Admin',\n       \
    \               'ggs@somecompany.com',\n                      'Golden Gate Data\
    \ Is Behind',\n                      'The Lag Is ' || L_LAG || ' Seconds');\n\
    \   END IF;\n\n---- 如果您想从 Shell 脚本启动此过程，此 dbms 输出将返回延迟值\n   DBMS_OUTPUT.PUT_LINE\
    \ (L_LAG);\nEXCEPTION\n   WHEN OTHERS\n   THEN\n      NULL;\nEND GET_LAG;\n/\n\
    \n---- 以下是供您参考的 Oracle 发送电子邮件过程，您可以使用自己的版本。\nCREATE OR REPLACE PROCEDURE GGS.SEND_EMAIL\
    \ (I_TO_EMAIL     IN VARCHAR2,\n                                            I_FROM_NAME\
    \    IN VARCHAR2,\n                                            I_FROM_EMAIL  \
    \ IN VARCHAR2,\n                                            I_SUBJECT      IN\
    \ VARCHAR2,\n                                            I_MESSEGE      IN VARCHAR2)\n\
    IS\n   C                   UTL_SMTP.CONNECTION;\n   L_EMAIL_START_POS   NUMBER\
    \ (5) := 1;\n   L_EMAIL_END_POS     NUMBER (5) := 0;\n   L_EMAIL_CNT         NUMBER\
    \ (5) := 0;\n   L_EMAIL             VARCHAR2 (250);\n   L_LAST_EMAIL_ADDR   BOOLEAN\
    \ := FALSE;\n\n   PROCEDURE SEND_HEADER (NAME IN VARCHAR2, HEADER IN VARCHAR2)\n\
    \   AS\n   BEGIN\n      UTL_SMTP.WRITE_DATA (C, NAME || ': ' || HEADER || UTL_TCP.CRLF);\n\
    \   END;\nBEGIN\n   C := UTL_SMTP.OPEN_CONNECTION ('your.mail.relay.server');\n\
    \   UTL_SMTP.HELO (C, 'foo.com');\n   UTL_SMTP.MAIL (C, I_FROM_EMAIL);\n\n   LOOP\n\
    \      L_EMAIL_CNT := L_EMAIL_CNT + 1;\n\n      L_EMAIL_END_POS :=\n         INSTR\
    \ (STR1   => I_TO_EMAIL,\n                STR2   => ',',\n                POS\
    \    => 1,\n                NTH    => L_EMAIL_CNT);\n\n      L_LAST_EMAIL_ADDR\
    \ := (L_EMAIL_END_POS <= 0);\n\n      L_EMAIL_END_POS :=\n         CASE\n    \
    \        WHEN (L_EMAIL_END_POS <= 0) THEN LENGTH (I_TO_EMAIL) + 1\n          \
    \  WHEN (L_EMAIL_START_POS = 0) THEN L_EMAIL_END_POS - 1\n            ELSE L_EMAIL_END_POS\n\
    \         END;\n\n      L_EMAIL :=\n         SUBSTR (STR1   => I_TO_EMAIL,\n \
    \                POS    => L_EMAIL_START_POS,\n                 LEN    => (L_EMAIL_END_POS\
    \ - L_EMAIL_START_POS));\n\n      UTL_SMTP.RCPT (C, L_EMAIL);\n\n      EXIT WHEN\
    \ L_LAST_EMAIL_ADDR;\n\n      L_EMAIL_START_POS := L_EMAIL_END_POS + 1;\n   END\
    \ LOOP;\n\n   UTL_SMTP.OPEN_DATA (C);\n   SEND_HEADER ('From', '\"' || I_FROM_NAME\
    \ || '\" <' || I_FROM_EMAIL || '>');\n   SEND_HEADER ('To', '\"Recipient\" <'\
    \ || I_TO_EMAIL || '>');\n   SEND_HEADER ('Subject', I_SUBJECT);\n   UTL_SMTP.WRITE_DATA\
    \ (C, UTL_TCP.CRLF || I_MESSEGE);\n   UTL_SMTP.CLOSE_DATA (C);\n   UTL_SMTP.QUIT\
    \ (C);\nEXCEPTION\n   WHEN UTL_SMTP.TRANSIENT_ERROR OR UTL_SMTP.PERMANENT_ERROR\n\
    \   THEN\n      BEGIN\n         UTL_SMTP.QUIT (C);\n      EXCEPTION\n        \
    \ WHEN UTL_SMTP.TRANSIENT_ERROR OR UTL_SMTP.PERMANENT_ERROR\n         THEN\n \
    \           NULL;\n      END;\n\n      RAISE_APPLICATION_ERROR (\n         -20000,\n\
    \         'Failed: ' || SQLERRM\n      );\nEND SEND_EMAIL;\n/\n```\n\n![images](img/0802.jpg)\n\
    \n***图 8-2.** 按星期划分的平均延迟（秒）*\n\n![images](img/0803.jpg)\n\n***图 8-3.** 按小时划分的平均延迟（秒）*\n"
- fmt: '#### Checking Memory and CPU Scripts


    如果内存和CPU是系统中的薄弱环节，那么这个脚本会很方便，它能每小时报告内存和CPU使用情况。它会通过电子邮件发送所有GoldenGate Extract进程的内存和CPU使用率，以及总空闲内存量。注意，`goldengate`是Unix/Linux用户ID。


    以下是脚本：


    ```ksh

    #!/bin/ksh


    EMAIL_LIST="shingchung@aol.com 5555555555@vtext.com"


    host=`hostname`

    cd /ggs/scripts

    rm top.log

    rm top.rpt

    top -h -f top.log -n 50

    cat top.log | grep extract > top.rpt

    echo "" >> top.rpt

    echo "Free Memory: " >> top.rpt

    vmstat 1 2 | tail -1 | awk ''{printf "%d%s\n", ($5*4)/1024, "MB" }'' >> top.rpt


    mailx -s "GoldenGate Memory Usage on $host" $EMAIL_LIST < /ggs/scripts/top.rpt

    ```


    输出：

    ```

    19   ?    14000 goldengate 152 20  2331M  1201M run    602:09 31.64 31.59 extract

    10   ?    13655 goldengate 137 20 80912K 16432K sleep 1568:25  5.97  5.96 extract


    Free Memory:

    47610MB

    ```


    Extract进程使用了31.59%的单个CPU，数据泵使用了5.96%。Extract通常比数据泵消耗更多CPU。Extract的内存使用总量约为2331MB，常驻内存为1201MB。整个服务器内存为47GB，因此您仍有大量空闲内存。GoldenGate
    Extract进程通常消耗整体CPU利用率的1%到5%。


    #### Checking Disk Space


    即使磁盘空间目前不是问题，运行一个监控脚本也是有益的。您永远不知道：您的磁盘空间可能在几年内不知不觉地被填满。如果跟踪文件磁盘空间是您的薄弱环节，那么您绝对需要这个脚本。许多脚本可在线获取，适用于各种系统，因此本节不列出具体脚本。请搜索“check
    disk space scripts”以获取适合您操作系统的脚本。


    您可以根据需要编写任意多的监控脚本，但您不希望给系统增加负担。本章中的所有脚本都是轻量级的，因此可以安全使用。


    ### Summary


    本章向您展示了如何为您的Extract、数据泵和Replicat设置一个非常好的监控系统。如果您有其他许多需要监控的GoldenGate进程，那么您只需将它们添加到您现有的脚本中即可。[图
    8-1](#Chapter08.html#fig_8_1)包含GoldenGate进程中的13个链接，但您的配置可能有更多。


    GoldenGate可能出现的故障比您想象的要多，但本章介绍的自动化PL/SQL延迟监控脚本可以通知您问题，有时甚至在发生重大问题之前。只要目标数据库处于启动状态，它就是一个独立的进程。如果目标数据库关闭，您将不会收到每小时的延迟状态电子邮件，因此您会知道出了问题。该警报无法确切告诉您出了什么问题，但本章的其他脚本可以为您精确定位确切的问题。


    本章还向您展示了如何监控整个GoldenGate系统的健康状况。在实施GoldenGate监控流程之前，了解系统中可能出现什么问题非常重要，这样您才能在问题恶化之前识别它们。


    ![images](images/square.jpg) **Note** GoldenGate的管理包（也称为GoldenGate Director）可以执行一些基本的监控和警报。Director还将延迟和事件信息存储到其专有表中，因此您可以从中创建报告。但风险自负，因为Oracle可能会在不同版本之间更改其表结构。有关Director的更多信息，请参见[第10章](#Chapter10.html#ch10)。


    ## Chapter 9 Oracle GoldenGate Veridata


    Oracle GoldenGate Veridata是一种高性能的跨平台数据比较工具，支持在源和目标数据在线且正在更新时进行大规模比较。Veridata的三层架构将负载分散到不同的服务器上，而不会影响源和目标数据库系统的性能。


    Veridata使用压缩的行哈希数据进行比较，这减少了比较数据所需的CPU周期和网络带宽，但它不仅仅是一个数据比较工具。Veridata可以跟踪变化的数据并在数据更新时执行比较——这是当今任何其他工具都无法实现的壮举。


    在本章中，我们将介绍Veridata的关键组件，以便您了解它为何如此独特，以及为什么目前没有其他产品能与之竞争。然后，我们将介绍一些关键特性和优势，并展示Veridata如何与您的数据项目配合工作并帮助提高您组织的效率。一旦您了解了Veridata是什么以及它如何提供帮助，我们将通过一个快速教程介绍如何设置它。（设置一个比较作业实际上只需要几分钟——这就是该工具的高效之处。）最后，我们将介绍一些提示和技巧，以帮助您完成一些复杂的数据比较场景。


    ### Veridata Components


    为了使Veridata启动并运行，您需要设置五个Veridata组件，如[图 9-1](#Chapter09.html#fig_9_1)所示。


    ![images](images/0901.jpg)


    图 9-1. Oracle GoldenGate Veridata组件


    #### GoldenGate Veridata Server


    Veridata Server是整个Veridata系统的关键组件。没有它，比较将需要在源或目标数据库上执行，这将对服务器的性能产生负面影响。这是因为任何比较作业都是CPU和I/O密集型的。


    Veridata Server执行以下功能：


    *   与代理协调Oracle GoldenGate Veridata执行任务的所有方面。

    *   在Veridata Server上对行进行排序。默认是在安装代理的数据库上进行排序。

    *   比较从GoldenGate Veridata代理收集的数据。

    *   对不同步数据执行确认比较（稍后解释）。

    *   生成不同步、确认和性能报告。


    #### GoldenGate Veridata Web


    Oracle GoldenGate Web是Veridata服务器的基于Web的客户端。这是我们用于配置大多数Veridata任务的工具。它执行以下功能：


    *   配置所有比较对象和规则，包括连接、组、作业等。

    *   启动和停止比较作业。

    *   提供作业状态的实时状态。

    *   查看比较和不同步数据报告。


    #### GoldenGate Veridata Repository


    Veridata Repository存储所有比较对象和规则的配置。元数据以明文形式存储在存储库数据库的表中，因此您可以查询它们以创建自己的自定义报告。它还存储作业状态，因此您可以将其与您的ETL和监控工具无缝集成。


    #### GoldenGate Veridata Agent， Java和C-Code


    Veridata Agent执行SQL以获取数据块并将其返回给服务器进行比较。它还将不同步行的详细信息提取到服务器以用于报告目的。Java代理不需要GoldenGate
    Manager，但基于C代码的代理需要GoldenGate Manager进程。


    #### GoldenGate Veridata CLI（Vericom）


    Vericom是一个命令行界面，用于调度比较作业。它可以覆盖一些配置文件设置、分区SQL谓词、关闭Veridata服务器以及生成/查看不同步报告。但是，它不能配置比较设置和规则，这些只能在Veridata
    Web客户端上完成。'
  raw: '#### Checking Memory and CPU Scripts


    If memory and CPU are the weakest links in your system, then this script will
    be handy to report memory and CPU usage every hour. It e-mails you the memory
    and CPU usage for all the GoldenGate Extract processes, as well as the total free
    memory. Note that `goldengate` is the Unix/Linux user id.


    Here''s the script:


    `#!/bin/ksh`


    `EMAIL_LIST="shingchung@aol.com 5555555555@vtext.com"`


    `` host=`hostname` ``

    `cd /ggs/scripts`

    `rm top.log`

    `rm top.rpt`

    `top -h -f top.log -n 50`

    `cat top.log | grep extract > top.rpt`

    `echo "" >> top.rpt`

    `echo "Free Memory: " >> top.rpt`

    `vmstat 1 2 | tail -1 | awk ''{printf "%d%s\n", ($5*4)/1024, "MB" }'' >> top.rpt`


    `mailx -s "GoldenGate Memory Usage on $host" $EMAIL_LIST < /ggs/scripts/top.rpt`


    `Output:`

    `19   ?    14000 goldengate 152 20  2331M  1201M run    602:09 31.64 31.59 extract`

    `10   ?    13655 goldengate 137 20 80912K 16432K sleep 1568:25  5.97  5.96 extract`


    `Free Memory:`

    `47610MB`


    The Extract process is using 31.59% of one CPU, and the data pump is using 5.96%.
    The Extract usually consumes more CPU than the data pump. Memory usage for the
    Extract is around 2331MB total and 1201MB in resident memory. The entire server
    memory is 47GB, so you still have plenty of memory free. The GoldenGate Extract
    process usually consumes 1% to 5% of overall CPU utilization.


    #### Checking Disk Space


    Even if disk space isn''t an issue for you, it''s nice have a script running that
    monitors it. You never know: your disk space space may fill up in the next few
    years without your noticing. You definitely need this script if trail file disk
    space is your weakest link. Many scripts are available online for various systems,
    so this section doesn''t list one. Google “check disk space scripts” to get the
    correct scripts for you operating systems.


    You can write as many monitoring scripts as you want, but you don''t want to tax
    your systems. All the scripts in this chapter are lightweight, so they''re safe
    to use.


    ### Summary


    This chapter has shown you how to set up a very good monitoring system for your
    Extract, data dump, and Replicat. If you have many other GoldenGate processes
    that need to monitor, then you just need to add them to your existing scripts.
    [Figure 8-1](#Chapter08.html#fig_8_1) includes 13 links in the GoldenGate processes,
    but your configuration may have many more.


    There are more ways that GoldenGate can break that you can imagine, but the automated
    PL/SQL lag-monitoring script presented in this chapter can notify you about issues,
    sometimes even before something major happens. It''s an independent process as
    long as the target database is up. If the target database is down, you don''t
    get the hourly lag status e-mail, so you know something is wrong. The alert can''t
    tell you exactly what went wrong, but the other scripts in this chapter can pinpoint
    for you the exact issues.


    This chapter also showed you how to monitor the health of your overall GoldenGate
    systems. Before you implement a GoldenGate monitoring process, it''s important
    to know what can go wrong in your systems so you can identify problems before
    they get worse.


    ![images](images/square.jpg) **Note** The Management Pack for GoldenGate (also
    called GoldenGate Director) can do some basic monitoring and alerts. Director
    also stores the lags and events information to its proprietary tables, so you
    can create reports from them. But use it at your own risk, because Oracle may
    change its table structures from version to version. See [Chapter 10](#Chapter10.html#ch10)
    for more information about Director.


    ## C H A P T E R  9


    ## Oracle GoldenGate Veridata


    GoldenGate Veridata is a high-performance cross-platform data comparison tool
    that supports high-volume compares while both source and target data are online
    and the data is being updated. Veridata three-tiered architecture spreads out
    the loads among different servers without compromising the performance of the
    source and target database systems.


    Veridata uses compressed row hash data to do a comparison that reduces the CPU
    cycles and network bandwidth required for comparing the data,.but it’s not merely
    a data comparison tool. Veridata can keep track of changing data and perform comparisons
    when the data is being updated—a feat impossible with any other tool today.


    In this chapter, we will go over the key components of Veridata so you will learn
    why it is unique, and why no other product can compete with it right now. Then
    we will go over some of the key features and benefits and show how Veridata will
    work with your data projects and help your organization’s efficiency. Once you
    understand what Veridata is and how it can help you, we will go through a quick
    tutorial on how to set it up. (It will literally take only a few minutes to set
    up a comparison job—that is how efficient this tool is.) Finally, we will go over
    tips and tricks to help you archive some complex data comparison scenarios.


    ### Veridata Components


    In order to get Veridata up and running, you need to set up five Veridata components,
    as shown in [Figure 9-1](#Chapter09.html#fig_9_1).


    ![images](images/0901.jpg)


    ***Figure 9-1.** Oracle GoldenGate Veridata components*


    #### GoldenGate Veridata Server


    Veridata Server is the key component of the entire Veridata system. Without it,
    the comparison will need to perform on either source or target databases, which
    will negatively impact the performance of the server. This is because any comparison
    jobs are both CPU and I/O intensive.


    Veridata Server performs the following functions:


    *   Coordinates all aspect of the Oracle GoldenGate Veridata execution tasks with
    the agents.

    *   Sorts rows on Veridata Server. The default is to sort on the database that
    the agent is installed on.

    *   Compares the data collected from the GoldenGate Veridata Agents.

    *   Conducts the confirmation comparisons of out-of-sync data (to be explained
    later).

    *   Produces out-of-sync, confirmation, and performance reports.


    #### GoldenGate Veridata Web


    Oracle GoldenGate Web is a web-based client to the Veridata server. This is the
    tool that we will be using to configure most of the Veridata tasks. It performs
    the following functions:


    *   Configures all comparison objects and rules, including connections, groups,
    jobs, etc

    *   Starts and stops the comparison jobs

    *   Provides real-time status on the job status

    *   Reviews the comparisons and out-of-sync data reports


    #### GoldenGate Veridata Repository


    Veridata Repository stores all the configurations for all the comparison objects
    and rules. The metadata is stored as clear text in the database tables in the
    repository database, so you can query them to create your own custom reports.
    It also stores the job status, so you can integrate it with your ETL and monitoring
    tools seamlessly.


    #### GoldenGate Veridata Agent, Java, and C-Code


    Veridata Agent executes the SQL to fetch and return blocks of data to the Server
    to compare. It also extracts the out-of-sync rows detail to the Server for reporting
    purposes. Java agent doesn’t require GoldenGate Manager, but C-code based agent
    requires GoldenGate Manager Process.


    #### GoldenGate Veridata CLI (Vericom)


    Vericom is a command-line interface to schedule the compare jobs. It can override
    some profiles settings, partition sql-predicates, shut down Veridata Server and
    generate/review the out-of-sync reports. However, it cannot configure the comparison
    settings and rules that only can be done on the Veridata Web client.'
