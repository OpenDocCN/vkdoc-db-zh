    for now.


    ![images](images/0902.jpg)


    ***Figure 9-2.** Connection configuration*


    #### Setting Up Tables and Data Scripts.


    The following tables and data are used in this tutorial, so you can follow this
    guide. You can also use your own tables. I have created the table using `dba_objects`
    50 times in the scripts. If your system is fast, you can add more loops in the
    code, so you can see the Running Jobs option in the left panel.


    `create table big_table_source as select 0 seqno, a.* from dba_objects a where
    0=1;`

    `create table big_table_target as select 0 seqno, a.* from dba_objects a where
    0=1;`


    The following script populates the sample tables on the same database. If you
    want to test the comparison on different data, you have to copy the data to another
    database.


    `CREATE OR REPLACE PROCEDURE populate_big_table IS`

    `BEGIN`

    `   FOR i IN 1..50`


    `    LOOP    `

    `        insert into big_source select i, a.* from dba_objects a;`

    `        insert into big_target select i, a.* from dba_objects a;`

    `        commit;`

    `    END LOOP;`

    `END populate_big_table;`


    #### Creating a Group


    In Group Configuration, add the source and target connections to the group. One
    Group can have many compare pairs and one job has many groups. For example, you
    can break down the group by subject areas, or by schedules.


    #### Creating Compare Pairs


    GoldenGate Compare Pairs is what we need to compare. We can compare tables, materialized
    views, and views. This is the heart of Veridata, where the business rules are.
    It is part of the Group Configurations. You can follow the steps below to set
    up the tables that we want to compare.


    ![images](images/0903.jpg)


    ***Figure 9-3.** GoldenGate Group Configuration*


    Click the Go to Compare Pair Configuration . . . link on the GoldenGate Group
    Configuration screen as shown in [Figure 9-3](#Chapter09.html#fig_9_3). It will
    take you to the Compare Pair Mapping screen as shown in [Figure 9-4](#Chapter09.html#fig_9_4).


    ![images](images/0904.jpg)


    ***Figure 9-4.** Compare Pair Mapping*


    In the Compare Pair Mapping screen, you can use Manual Mapping to add the compare
    pairs. After you pick up the compare pair, make sure your compare name is in the
    Compare Pair Detail section. In the example shown, BIG_TABLE_SOURCE=BIG_TABLE_TARGET
    is the compare pair name. Click the Preview tab to confirm the settings.


    #### Creating a Job


    Jobs are like shell scripts, they are used to run a series of compare groups.
    There is no built-in scheduler in Veridata, so you use the OS schedulers (crontab,
    Windows schedulers) to run “vericom” command-line jobs. A job name and a group
    are the only required parameters. You can check the group name big_group_table
    that you just created in the previous section.


    #### Creating a Profile


    Creating a profile is optional; you can use the default profile for now. We will
    go over this in detail later in the chapter.'
  trans: "\n# Veridata 比较工作原理\n\n默认情况下，Veridata 比较活动分为两个步骤：初始比较和确认比较。如果数据在比较期间预计不会更改，或者数据已通过分区\
    \ SQL 谓词进行筛选，则确认比较是可选的。初始比较会生成一份不同步报告 (`OOS`)。确认不同步报告 (`COOS`) 则是在确认比较过程中创建的。\n\
    \n默认情况下，Veridata 会对所有主键列进行逐字（值对值）比较。对于所有非键列，它使用哈希值进行比较。行哈希值是一种压缩的唯一数字签名，用于比较两个源值。例如，一个\
    \ 2000 字节的行长度可以转换为 12 字节的哈希值。这并非绝对，但两个原始值相同的概率非常高。这减少了从 Veridata 代理到 Veridata\
    \ 服务器的网络流量。比较方法可以在“列映射”屏幕中更改。\n\n# Veridata 如何为您提供帮助\n\n您可以通过多种不同方式使用 Veridata，我无法在此一一列举。以下是一些关键特性和优势：\n\
    \n*   它与数据复制工具（如 GoldenGate 单向复制和双向同步）无缝协作。GoldenGate 仅捕获和传送数据，但除非您添加一些自定义代码进行验证，否则它不会为您检查数据。Veridata\
    \ 可以进行两阶段比较，报告关于不良数据以及 GoldenGate 跳过的任何数据的数据差异。\n*   在所有系统中增强企业数据质量，避免不良数据导致决策失误、服务级别协议失败，并最终带来运营、财务和法律风险。借助\
    \ Veridata 持续验证所有关键业务数据，您可以在业务用户报告之前识别出不良数据。Veridata 支持 Oracle 物化视图、视图以及 Veridata\
    \ 特定的分区，使其能够比较不同粒度和基数的数据。\n*   由于高性能，减少了数据比较时间。Veridata 通过在代理的提取层使用哈希值来优化比较，然后在单独的服务器中比较数据。因此，它消除了源数据库和目标数据库上的开销。\n\
    *   它是无侵入性的，因此可以在数据变更时实现实时数据比较，且零停机。我们可以在两个 OLTP 系统的数据正在变更时比较它们之间的数据。Veridata\
    \ 将对数据同步进行两阶段确认。\n*   支持数据或数据库迁移项目中的初始复制和实时同步阶段，以确保数据准确性。我们可以使用 GoldenGate 进行不停机迁移，但通过在后台运行\
    \ Veridata 来交叉检查源数据库和迁移后数据库之间的数据，我们无需在迁移的任何阶段编写昂贵的查询来进行数据比较。\n*   支持 Oracle、SQL\
    \ Server、Teradata、HP Enscribe 和 HP SQL/MP 数据库之间的跨数据库比较。\n*   易于使用。IT 和业务用户均可使用。我们无需编写单个\
    \ SQL 语句即可设置大多数比较。\n*   它是一个独立工具，不依赖于 Oracle GoldenGate。您完全无需安装 GoldenGate 即可运行\
    \ Veridata。\n*   它具有基于角色的安全性，以控制访问权限并保护敏感数据。\n*   选择性比较可比较选定的列。通过适当设置，还可以进行增量比较。\n\
    *   它具有灵活的命令行界面，可用于自动化和调度比较作业。\n\n# 设置 Veridata 比较\n\n安装 Veridata 后，您可以使用以下指南来使用您自己的数据或本章中我们使用的数据。高级步骤如下：\n\
    \n1.  创建数据库连接，包括源和目标。\n2.  创建组，即一组比较对。\n3.  创建比较对，指定要比较哪些表。\n4.  创建作业，用于运行一个或多个组。\n\
    5.  创建配置文件（指定您希望其运行的方式）。这是可选的，因为您可以使用默认配置文件。\n6.  运行作业。\n\n## 创建数据库连接\n\n登录 GoldenGate\
    \ Veridata Web 后，点击左侧面板中的“连接配置”，如图 9-2 所示，然后为源和目标填写以下信息。确保 GoldenGate Veridata\
    \ 代理已安装在两个数据库实例上。\n\n您可以使用向导设置连接，也可以使用如图 9-2 所示的设置屏幕。目前其他选项使用默认值。\n\n![images](img/0902.jpg)\n\
    \n***图 9-2.** 连接配置*\n\n## 设置表和数据脚本\n\n本教程中使用了以下表和数据，以便您能跟随指南操作。您也可以使用自己的表。我在脚本中使用\
    \ `dba_objects` 创建了表 50 次。如果您的系统速度够快，可以在代码中添加更多循环，这样您就可以在左侧面板中看到“正在运行的作业”选项。\n\
    \n`create table big_table_source as select 0 seqno, a.* from dba_objects a where\
    \ 0=1;`\n`create table big_table_target as select 0 seqno, a.* from dba_objects\
    \ a where 0=1;`\n\n以下脚本在同一个数据库中填充示例表。如果您想在不同数据上测试比较，则必须将数据复制到另一个数据库。\n\n```sql\n\
    CREATE OR REPLACE PROCEDURE populate_big_table IS\nBEGIN\n   FOR i IN 1..50\n\
    \    LOOP    \n        insert into big_source select i, a.* from dba_objects a;\n\
    \        insert into big_target select i, a.* from dba_objects a;\n        commit;\n\
    \    END LOOP;\nEND populate_big_table;\n```\n\n## 创建组\n\n在“组配置”中，将源连接和目标连接添加到该组。一个组可以包含多个比较对，一个作业可以包含多个组。例如，您可以按主题区域或按计划来划分组。\n\
    \n## 创建比较对\n\nGoldenGate 比较对是我们需要比较的对象。我们可以比较表、物化视图和视图。这是 Veridata 的核心，是业务规则所在之处。它是组配置的一部分。您可以按照以下步骤设置我们要比较的表。\n\
    \n![images](img/0903.jpg)\n\n***图 9-3.** GoldenGate 组配置*\n\n点击如图 9-3 所示的 GoldenGate\
    \ 组配置屏幕中的“转到比较对配置...”链接。它将带您进入如图 9-4 所示的“比较对映射”屏幕。\n\n![images](img/0904.jpg)\n\
    \n***图 9-4.** 比较对映射*\n\n在“比较对映射”屏幕中，您可以使用“手动映射”来添加比较对。选择比较对后，请确保您的比较名称位于“比较对详细信息”部分。在示例中，`BIG_TABLE_SOURCE=BIG_TABLE_TARGET`\
    \ 是比较对名称。点击“预览”选项卡以确认设置。\n\n## 创建作业\n\n作业类似于 shell 脚本，用于运行一系列比较组。Veridata 没有内置的调度程序，因此您需要使用操作系统调度程序（crontab、Windows\
    \ 调度程序）来运行 `vericom` 命令行作业。作业名称和组是唯一必需的参数。您可以检查上一节中刚刚创建的组名称 `big_group_table`。\n\
    \n## 创建配置文件\n\n创建配置文件是可选的；您目前可以使用默认配置文件。我们将在本章后面详细讨论这一点。\n"
- fmt: "## Running the Veridata Job\n\n你可以通过在Veridata主屏幕的左侧面板上点击`Run/Execute job`标签页来运行比较作业。或者，你也可以使用命令`vericon.exe\
    \ –job job_big_table`。\n\n![images](images/0905.jpg)\n\n**Figure 9-5.** Veridata运行作业\n\
    \n此作业的命令行也在[Figure 9-5](#Chapter09.html#fig_9_5)中展示，对于Windows系统，命令为`vericon.exe\
    \ –job job_big_table`。点击`Run Job`按钮来运行作业。如果作业正在运行，`Run Job`按钮的文本会变为`Stop Job`。如果你想停止作业，可以点击它。你也可以前往`Running\
    \ Jobs`或`Finished Jobs`面板查看状态。如果出现任何错误，你可以深入查看组和比较对以获取详细的错误信息。\n\n## Improving\
    \ Performance and Reducing Overhead\n\nVeridata进程可能非常消耗CPU，有时也消耗I/O。如果你需要Veridata以最小的资源占用完成大量工作，你应该尽一切努力减少系统利用率以提升性能。因为默认选项不一定是最优的，有一些技巧可以改善性能并减少不必要的开销。\n\
    \n### Excluding Columns\n\n在`Column Mapping`中，你可以使用`User Defined`来从映射中移除列。被移除的列可以稍后添加回来。主键不能从映射中移除，因为Veridata使用它们进行比较。默认情况下，Veridata会查询源和目标中的每一列进行比较。\n\
    \n### Tuning Profiles Settings\n\n有两种排序方法：数据库排序和Veridata服务器上的`NSort`。如果数据库服务器有空闲的CPU或I/O，那么使用默认的“sort\
    \ on database”选项。如果数据库是一个需要尽可能利用所有资源以达成高服务等级协议（SLA）的创收环境，那么我们可以使用“sort on server”选项。请注意，Veridata服务器也在执行实际的比较和其他任务；如果在排序期间其CPU占用率达到100%，你可能希望将数据排序放在数据库服务器上进行，或者为Veridata服务器增加更多CPU。\n\
    \n### Disabling the Confirm Out of Sync Step\n\n如果你不期望数据在比较期间发生变化，例如每日/每周/每月的ETL、通过分区过滤的数据，或在所有数据复制完成后立即运行比较，你可以在配置文件设置中禁用`Confirm-Out-Of-Sync`步骤。\n\
    \n### Increasing the Number of Threads\n\n你可以增加Veridata服务器上的线程数。默认的CPU数量为四。由于所有的比较都在服务器端进行，Veridata比较非常消耗CPU。在增加线程数之前，请验证比较期间的CPU使用率。这可以在`Initial\
    \ Compares`和`Confirmation Compares`的配置文件设置中完成。\n\n### Compares Methods\n\n使用哈希（hash）进行比较通常更快。哈希是默认方法，但如果你必须使用字面量（literal）比较以获得100%的准确性，你可以在`Column\
    \ Mapping`中更改比较方法。字面量比较是逐值执行的，这与使用哈希的比较相反。\n\n### Right Trim on Character Fields\n\
    \n默认情况下，Veridata在字符字段上启用了`RTRIM`，因此你的查询看起来像下面的示例。你可以在`Edit Database Connection`设置中的`Truncate\
    \ Trailing Spaces When Comparing Values`选项中关闭`RTRIM`。这减少了修剪每一行中所有`varchar`列所消耗的CPU周期。\n\
    \n```sql\nSELECT   \"SEQNO\",\n         RTRIM (\"OWNER\"),\n         RTRIM (\"\
    OBJECT_NAME\"),\n         RTRIM (\"SUBOBJECT_NAME\"),\n         \"OBJECT_ID\"\
    ,\n         \"DATA_OBJECT_ID\",\n         RTRIM (\"OBJECT_TYPE\"),\n         TO_CHAR\
    \ (\"CREATED\", 'yyyy-MM-DD:hh24:mi:ss'),\n         TO_CHAR (\"LAST_DDL_TIME\"\
    , 'yyyy-MM-DD:hh24:mi:ss'),\n         RTRIM (\"TIMESTAMP\"),\n         RTRIM (\"\
    STATUS\"),\n         RTRIM (\"TEMPORARY\"),\n         RTRIM (\"GENERATED\"),\n\
    \         RTRIM (\"SECONDARY\"),\n         \"NAMESPACE\",\n         RTRIM (\"\
    EDITION_NAME\")\n  FROM   \"VERIDATA2\".\"BIG_TABLE_TARGET\" X\n```\n\n### Comparing\
    \ Incremental Data for Large Tables\n\n如果你有一个包含数十亿行的表，你无法承担每次比较都进行全表扫描。相反，你可以使用行分区功能进行比较（Veridata行分区，而非数据库分区）。这只需要在`WHERE`子句中添加一个SQL谓词，如果添加正确，将在性能方面产生巨大差异。例如，你可以在`Compare\
    \ Pair Configuration Screen`中为源和目标行分区都添加`SEQNO=1`，Veridata将生成如下SQL：\n\n```sql\n\
    SELECT   \"SEQNO\",\n         \"OWNER\",\n         \"OBJECT_NAME\",\n        \
    \ \"SUBOBJECT_NAME\",\n         \"OBJECT_ID\",\n         \"DATA_OBJECT_ID\",\n\
    \         \"OBJECT_TYPE\",\n         TO_CHAR (\"CREATED\", 'yyyy-MM-DD:hh24:mi:ss'),\n\
    \         TO_CHAR (\"LAST_DDL_TIME\", 'yyyy-MM-DD:hh24:mi:ss'),\n         \"TIMESTAMP\"\
    ,\n         \"STATUS\",\n         \"TEMPORARY\",\n         \"GENERATED\",\n  \
    \       \"SECONDARY\",\n         \"NAMESPACE\",\n         \"EDITION_NAME\"\n \
    \ FROM   \"VERIDATA2\".\"BIG_TABLE_TARGET\" X\n WHERE   SEQNO = 1\n```\n\n如果你需要比较一天内复制的数据——例如，`change_date`是你用来跟踪更改的列——那么你可以将此放入源和目标的SQL谓词语句中。\n\
    \n```sql\nChange_date between sysdate-1 and sysdate\n```\n\nVeridata将比较自昨天以来发生变化的数据。\n\
    \n## Comparing GoldenGate Real-Time Replication Data\n\n如果你的表中没有时间戳，那么`confirm\
    \ out-of-sync`选项是确保数据一致性的唯一选择。确认步骤有三种状态：\n\n*   `In-flight`：在初始比较步骤中行不同步，但它已发生变化。Veridata目前无法确认它是否已同步。\n\
    *   `In-sync`：在初始比较步骤中行不同步；现在已同步。\n*   `Persistently out of sync`：在初始比较步骤中行不同步，在确认步骤后仍然不同步。\n\
    \n默认情况下，初始比较和确认步骤并行运行。两个步骤之间等待60秒。这个值可以在配置文件设置中更改。\n\n## Comparing Different Column\
    \ Types and Compare Formats\n\n你可以覆盖默认的`Column Mapping`名称、类型甚至格式。在`Compare Pair\
    \ Configuration`中，点击列名超链接；你将看到[Figure 9-6](#Chapter09.html#fig_9_6)中的对话框。你可以覆盖`Source\
    \ Column`名称、`Source Datatype`及其比较格式。这在源和目标具有不同列名甚至不同数据类型（尽管它们实际上是相同的数据）时非常有用。\n\
    \n![images](images/0906.jpg)\n\n**Figure 9-6.** 更改默认数据类型和比较格式"
  raw: '#### Running the Veridata Job


    You can run the compare job by clicking the Run/Execute job tab in the left panel
    on the Veridata Main screen. Or you can use the command `vericon.exe –job job_big_table`.


    ![images](images/0905.jpg)


    ***Figure 9-5.** Veridata Run Job*


    The command line for this job is also shown in [Figure 9-5](#Chapter09.html#fig_9_5),
    `vericon.exe –job job_big_table` for Windows. Click the Run Job button to run
    the job. The Run Job button text will change to Stop Job if it is running. Click
    it if you want to stop the job. You can also go to the Running Jobs or Finished
    Jobs panels to check the status. If you get any error, you can drill down the
    group and compare pairs to get the detail error messages.


    ### Improving Performance and Reducing Overhead


    Veridata processes can be very CPU intensive, and sometimes I/O intensive. If
    you need Veridata to do a lot of work with a minimum footprint, you should make
    every effort to reduce the system utilization to help the performance. Because
    the default options are not necessarily the best options, there are a few tricks
    that can improve performance and reduce unnecessary overhead.


    #### Excluding Columns


    In Column Mapping, you can use User Defined to remove the column(s) from the mapping.
    The removed columns can be added back later on. The primary keys can’t be removed
    from the mapping as Veridata uses them to compare. By default, Veridata queries
    every column in both source and target to compare.


    #### Tuning Profiles Settings


    There are two types of sorting methods: database sorting and NSort on the Veridata
    Server. If database servers have spare CPU or IO, then use the default option
    of “sort on database”. If the database is a revenue-generating environment that
    needs every single resource possible to get high Service Level Agreement (SLA),
    then we can use the “sort on server” option. Please note, Veridata server is also
    doing actual compares and other tasks; if it peaks out 100% CPU during sort, you
    may wish to sort the data on the database server or add more CPUs to the Veridata
    Server.


    #### Disabling the Confirm Out of Sync Step


    If you don’t expect the data to change during the compare, such as daily/weekly/monthly
    ETL, filtered data via partitioning, or running the compare right after all the
    data is copied, you can disable the Confirm-Out-Of-Sync step in the profile settings.


    #### Increasing the Number of Threads


    You can increase the number of threads on Veridata servers. The default number
    of CPUs is four. Since all comparisons take place on the server side, Veridata
    compares are quite CPU intensive. Verify the CPU usage during the compares before
    you increase the number of threads. This can be set in both the Initial Compares
    and Confirmation Compares profile settings.


    #### Compares Methods


    Using hash to compare is generally faster. Hash is the default, but if you have
    to use literally to get 100% accuracy, you can change the compare method in the
    Column Mapping. Literal comparison is performed value for value, as opposed to
    a comparison that uses a hash.


    #### Right Trim on Character Fields


    By default, Veridata has RTRIM on character fields on, so your queries look like
    the following example. You can turn RTRIM off in the Edit Database Connection
    setting, Truncate Trailing Spaces When Comparing Values. This reduces some CPU
    cycles to trim all the varchar columns in every single row.


    `SELECT   "SEQNO",`

    `         RTRIM ("OWNER"),`

    `         RTRIM ("OBJECT_NAME"),`

    `         RTRIM ("SUBOBJECT_NAME"),`

    `         "OBJECT_ID",`

    `         "DATA_OBJECT_ID",`

    `         RTRIM ("OBJECT_TYPE"),`

    `         TO_CHAR ("CREATED", ''yyyy-MM-DD:hh24:mi:ss''),`

    `         TO_CHAR ("LAST_DDL_TIME", ''yyyy-MM-DD:hh24:mi:ss''),`

    `         RTRIM ("TIMESTAMP"),`

    `         RTRIM ("STATUS"),`

    `         RTRIM ("TEMPORARY"),`

    `         RTRIM ("GENERATED"),`

    `         RTRIM ("SECONDARY"),`

    `         "NAMESPACE",`

    `         RTRIM ("EDITION_NAME")`

    `  FROM   "VERIDATA2"."BIG_TABLE_TARGET" X`


    #### Comparing Incremental Data for Large Tables


    If you have a table with billions of rows, you cannot afford to do a full table
    scan every time you need to compare. Instead, you can use row partition features
    to compare (Veridata row partition, not the database partition). This requires
    nothing more than adding a sql-predicate to the WHERE clause which, if added correctly,
    will make a big difference in terms of performance. For example, you can add SEQNO=1
    to both the source and target row partition in the Compare Pair Configuration
    Screen, and the Veridata will generate the SQL as follows:


    `SELECT   "SEQNO",`

    `         "OWNER",`

    `         "OBJECT_NAME",`

    `         "SUBOBJECT_NAME",`

    `         "OBJECT_ID",`

    `         "DATA_OBJECT_ID",`

    `         "OBJECT_TYPE",`

    `         TO_CHAR ("CREATED", ''yyyy-MM-DD:hh24:mi:ss''),`

    `         TO_CHAR ("LAST_DDL_TIME", ''yyyy-MM-DD:hh24:mi:ss''),`

    `         "TIMESTAMP",`

    `         "STATUS",`

    `         "TEMPORARY",`

    `         "GENERATED",`

    `         "SECONDARY",`

    `         "NAMESPACE",`

    `         "EDITION_NAME"`

    `  FROM   "VERIDATA2"."BIG_TABLE_TARGET" X`

    ` WHERE   SEQNO = 1`


    If you need to compare the data replicated in one day—for example, change_date
    is the column that you use to track the change—then you can put this to the sql-predicate
    statement in both source and target.


    `Change_date between sysdate-1 and sysdate`


    Veridata will compare the data that has changed since yesterday.


    ### Comparing GoldenGate Real-Time Replication Data


    If there is no timestamp in your table, then the confirm out-of-sync option is
    the only option to make sure the data is consistent. There are three statuses
    for confirmation:


    *   In-flight: row was out-of-sync in the initial compares step, but it has changed.
    Veridata cannot confirm it is in-sync yet.

    *   In-sync: row was out-of-sync in the initial compares step; it is in-sync now.

    *   Persistently out of sync: row was out-of-sync in the initial compares step,
    but is still out-of-sync after the confirmation step.


    By default, the initial compares and confirmation steps are running in parallel.
    It waits for 60 seconds between two steps. This value can be changed in the profile
    setting.


    ### Comparing Different Column Types and Compare Formats


    You can override the default Column Mapping name, type, and even format. In Compare
    Pair Configuration, click the column name hyperlink; you will see the dialog in
    [Figure 9-6](#Chapter09.html#fig_9_6). You can type over the Source Column name,
    Source Datatype and their compare formats. This is useful if source and target
    have different column names and even different data types, although they are actually
    the same data.


    ![images](images/0906.jpg)


    ***Figure 9-6.** Change default data type and compare format*'
  trans: "## 运行 Veridata 作业\n\n你可以通过在 Veridata 主屏幕的左侧面板上点击 `Run/Execute job` 标签页来运行比较作业。或者，你也可以使用命令\
    \ `vericon.exe –job job_big_table`。\n\n![images](img/0905.jpg)\n\n**图 9-5.** Veridata\
    \ 运行作业\n\n此作业的命令行也在 图 9-5 中展示，对于 Windows 系统，命令为 `vericon.exe –job job_big_table`。点击\
    \ `Run Job` 按钮来运行作业。如果作业正在运行，`Run Job` 按钮的文本会变为 `Stop Job`。如果你想停止作业，可以点击它。你也可以前往\
    \ `Running Jobs` 或 `Finished Jobs` 面板查看状态。如果出现任何错误，你可以深入查看组和比较对以获取详细的错误信息。\n\n\
    ## 提升性能并减少开销\n\nVeridata 进程可能非常消耗 CPU，有时也消耗 I/O。如果你需要 Veridata 以最小的资源占用完成大量工作，你应该尽一切努力减少系统利用率以提升性能。因为默认选项不一定是最优的，有一些技巧可以改善性能并减少不必要的开销。\n\
    \n### 排除列\n\n在 `Column Mapping` 中，你可以使用 `User Defined` 来从映射中移除列。被移除的列可以稍后添加回来。主键不能从映射中移除，因为\
    \ Veridata 使用它们进行比较。默认情况下，Veridata 会查询源和目标中的每一列进行比较。\n\n### 调优配置文件设置\n\n有两种排序方法：数据库排序和\
    \ Veridata 服务器上的 `NSort`。如果数据库服务器有空闲的 CPU 或 I/O，那么使用默认的“sort on database”选项。如果数据库是一个需要尽可能利用所有资源以达成高服务等级协议（SLA）的创收环境，那么我们可以使用“sort\
    \ on server”选项。请注意，Veridata 服务器也在执行实际的比较和其他任务；如果在排序期间其 CPU 占用率达到 100%，你可能希望将数据排序放在数据库服务器上进行，或者为\
    \ Veridata 服务器增加更多 CPU。\n\n### 禁用“确认不同步”步骤\n\n如果你不期望数据在比较期间发生变化，例如每日/每周/每月的 ETL、通过分区过滤的数据，或在所有数据复制完成后立即运行比较，你可以在配置文件设置中禁用\
    \ `Confirm-Out-Of-Sync` 步骤。\n\n### 增加线程数\n\n你可以增加 Veridata 服务器上的线程数。默认的 CPU 数量为四。由于所有的比较都在服务器端进行，Veridata\
    \ 比较非常消耗 CPU。在增加线程数之前，请验证比较期间的 CPU 使用率。这可以在 `Initial Compares` 和 `Confirmation\
    \ Compares` 的配置文件设置中完成。\n\n### 比较方法\n\n使用哈希（hash）进行比较通常更快。哈希是默认方法，但如果你必须使用字面量（literal）比较以获得\
    \ 100% 的准确性，你可以在 `Column Mapping` 中更改比较方法。字面量比较是逐值执行的，这与使用哈希的比较相反。\n\n### 字符字段上的右截断\n\
    \n默认情况下，Veridata 在字符字段上启用了 `RTRIM`，因此你的查询看起来像下面的示例。你可以在 `Edit Database Connection`\
    \ 设置中的 `Truncate Trailing Spaces When Comparing Values` 选项中关闭 `RTRIM`。这减少了修剪每一行中所有\
    \ `varchar` 列所消耗的 CPU 周期。\n\n```sql\nSELECT   \"SEQNO\",\n         RTRIM (\"OWNER\"\
    ),\n         RTRIM (\"OBJECT_NAME\"),\n         RTRIM (\"SUBOBJECT_NAME\"),\n\
    \         \"OBJECT_ID\",\n         \"DATA_OBJECT_ID\",\n         RTRIM (\"OBJECT_TYPE\"\
    ),\n         TO_CHAR (\"CREATED\", 'yyyy-MM-DD:hh24:mi:ss'),\n         TO_CHAR\
    \ (\"LAST_DDL_TIME\", 'yyyy-MM-DD:hh24:mi:ss'),\n         RTRIM (\"TIMESTAMP\"\
    ),\n         RTRIM (\"STATUS\"),\n         RTRIM (\"TEMPORARY\"),\n         RTRIM\
    \ (\"GENERATED\"),\n         RTRIM (\"SECONDARY\"),\n         \"NAMESPACE\",\n\
    \         RTRIM (\"EDITION_NAME\")\n  FROM   \"VERIDATA2\".\"BIG_TABLE_TARGET\"\
    \ X\n```\n\n### 比较大表的增量数据\n\n如果你有一个包含数十亿行的表，你无法承担每次比较都进行全表扫描。相反，你可以使用行分区功能进行比较（Veridata\
    \ 行分区，而非数据库分区）。这只需要在 `WHERE` 子句中添加一个 SQL 谓词，如果添加正确，将在性能方面产生巨大差异。例如，你可以在 `Compare\
    \ Pair Configuration Screen` 中为源和目标行分区都添加 `SEQNO=1`，Veridata 将生成如下 SQL：\n\n```sql\n\
    SELECT   \"SEQNO\",\n         \"OWNER\",\n         \"OBJECT_NAME\",\n        \
    \ \"SUBOBJECT_NAME\",\n         \"OBJECT_ID\",\n         \"DATA_OBJECT_ID\",\n\
    \         \"OBJECT_TYPE\",\n         TO_CHAR (\"CREATED\", 'yyyy-MM-DD:hh24:mi:ss'),\n\
    \         TO_CHAR (\"LAST_DDL_TIME\", 'yyyy-MM-DD:hh24:mi:ss'),\n         \"TIMESTAMP\"\
    ,\n         \"STATUS\",\n         \"TEMPORARY\",\n         \"GENERATED\",\n  \
    \       \"SECONDARY\",\n         \"NAMESPACE\",\n         \"EDITION_NAME\"\n \
    \ FROM   \"VERIDATA2\".\"BIG_TABLE_TARGET\" X\n WHERE   SEQNO = 1\n```\n\n如果你需要比较一天内复制的数据——例如，`change_date`\
    \ 是你用来跟踪更改的列——那么你可以将此放入源和目标的 SQL 谓词语句中。\n\n```sql\nChange_date between sysdate-1\
    \ and sysdate\n```\n\nVeridata 将比较自昨天以来发生变化的数据。\n\n## 比较 GoldenGate 实时复制数据\n\n\
    如果你的表中没有时间戳，那么 `confirm out-of-sync` 选项是确保数据一致性的唯一选择。确认步骤有三种状态：\n\n*   `In-flight`：在初始比较步骤中行不同步，但它已发生变化。Veridata\
    \ 目前无法确认它是否已同步。\n*   `In-sync`：在初始比较步骤中行不同步；现在已同步。\n*   `Persistently out of sync`：在初始比较步骤中行不同步，在确认步骤后仍然不同步。\n\
    \n默认情况下，初始比较和确认步骤并行运行。两个步骤之间等待 60 秒。这个值可以在配置文件设置中更改。\n\n## 比较不同的列类型和比较格式\n\n你可以覆盖默认的\
    \ `Column Mapping` 名称、类型甚至格式。在 `Compare Pair Configuration` 中，点击列名超链接；你将看到 图 9-6\
    \ 中的对话框。你可以覆盖 `Source Column` 名称、`Source Datatype` 及其比较格式。这在源和目标具有不同列名甚至不同数据类型（尽管它们实际上是相同的数据）时非常有用。\n\
    \n![images](img/0906.jpg)\n\n**图 9-6.** 更改默认数据类型和比较格式"
- fmt: "# C H A P T E R 10\n\n## Using Performance Statistics\n\nVeridata keeps a\
    \ few performance statistics for each run; they are in the Finished Job panel\
    \ as shown in [Figure 9-7](#Chapter09.html#fig_9_7). You can use these statistics\
    \ to prepare for the production run; for example, to calculate the run time for\
    \ each job and conduct performance tunings.\n\n![images](images/0907.jpg)\n\n\
    **Figure 9-7.** Performance statistics\n\nYou also can view detail performance\
    \ in the Compare Pair Reports in the same screen by clicking the Report link.\
