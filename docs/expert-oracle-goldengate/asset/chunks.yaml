  trans: "## 设置数据源\n\n在使用 Director 应用程序之前，您必须使用 Oracle GoldenGate Director 管理工具设置数据源。请确保\
    \ `Director 服务器` 已在运行，然后按照以下步骤操作：\n\n1.  输入 `用户名` 和 `密码`，如图 10-3 所示。默认情况下，`用户名`\
    \ 和 `密码` 均为 `admin`。\n    ![images](img/1003.jpg)\n    **图 10-3.** Director 登录界面\n\
    \n2.  从下拉菜单中，选择带有 TCP 端口号的服务器名称。\n3.  点击 `登录`。账户页面将会出现。\n4.  在账户页面上，创建一个新用户或使用\
    \ `admin` 账户。\n5.  点击 `监控代理` 选项卡，并确认您正在监控您的数据源。\n\nDirector 客户端中只有两种角色：`所有者` 和\
    \ `观察者`。您可以在 `数据源` 选项卡上定义它们。此外，用户活动会记录在 Director WebLogic 域下的 `access.log` 文件中。\n\
    \n`所有者` 拥有对此数据源的完全控制权。如果您将 `所有者` 字段留空，那么所有用户都可以看到并访问与此数据源关联的进程。如果选择了 `主机可被观察`\
    \ 选项，则所有非所有者用户对于此数据源将处于只读模式。\n\nDirector 按用户存储用户特定的配置。因此，如果您共享相同的用户 ID，您看到的屏幕将与其他用户看到的完全相同，例如图表和警报。\n\
    \n继续创建一个已运行有管理器的数据源。在 Director 术语中，数据源也称为 `管理器进程`。它与 GoldenGate 用于管理所有抽取和复制的 `管理器`\
    \ 进程是同一个。请注意，您必须创建一个带有必需端口号的 `管理器` 参数文件，桌面客户端才能工作。使用 `检查连接` 来确认管理器是否正在运行。您无法使用\
    \ Director 客户端创建 `管理器` 参数文件。您可以在 Director 客户端中运行 `GGSCI`，但它不支持 `编辑` 命令。有关 Director\
    \ 某个对话框的 `GGSCI` 选项卡中不支持的特性列表，请参阅 Director 管理员指南。\n\n在 `监控代理` 选项卡上，请确保为您的数据源开启监控。\n\
    \n## 修改管理器参数文件\n\n现在您可以启动 Director 客户端了。从菜单栏中，选择 `文件` > `登录`，如果您想使用默认密码，请输入 `admin/admin`，或者输入您在\
    \ Oracle GDSC 管理工具中创建的登录凭据。点击 `数据源` 选项卡，然后将您在管理工具中创建的数据源拖放到图表区域。现在，您应该看到一个 `数据源`\
    \ 图标，如图 10-4 所示。\n\n### 使用内置编辑器修改参数文件\n\n在图表面板中右键单击数据源图标，然后选择 `高级` > `编辑参数文件`，如图\
    \ 10-4 所示。您在此内置编辑器中拥有对参数文件的完全控制权。您通常会用它来编辑那些尚未在 Director 图形用户界面中实现的参数。\n![images](img/1004.jpg)\n\
    **图 10-4.** 编辑管理器参数文件\n\n### 使用图形用户界面修改参数文件\n\n您也可以使用 Director 界面修改 `管理器` 参数文件。例如，要将\
    \ `purgeoldextracts` 参数添加到参数文件中，请高亮显示数据源，然后点击 `插入` 按钮。图 10-5 所示的对话框会打开。这个对话框的一个非常好的特点是，它显示了所有可用的\
    \ `管理器` 参数和属性及其在线帮助。\n![images](img/1005.jpg)\n**图 10-5.** 向管理器参数文件中插入参数\n\n从左侧列表中选择\
    \ `purgeoldextracts`，并输入您的 `dirdat` 完整路径及两字符的追踪文件前缀。然后点击 `插入`。如果需要，您可以添加其他参数；如果已完成，点击\
    \ `完成` 按钮。\n\n右键单击数据源，选择 `重新启动` 以刷新 `管理器`。您也可以转到 `GGSCI` 并输入 `refresh mgr`。\n\n\
    接下来，您将使用 Director 客户端完成几项任务。\n\n## 设置初始加载\n\nOracle GoldenGate 初始加载任务在 Director\
    \ 中设置起来非常简单。它有一个菜单项来自动化此过程；您只需要映射表即可。\n\n### 添加初始加载任务\n\n点击数据源并选择 `操作` > `添加新任务`\
    \ > `初始加载任务`，如图 10-6 所示。\n![images](img/1006.jpg)\n**图 10-6.** 选择初始加载任务\n\n您可以在初始加载任务对话框中填写\
    \ `捕获名称` 和 `投递名称`。确保源数据库和目标数据库的登录信息正确。点击 `确定`。Director 会为您创建所有必要的文件，如图 10-7 所示。接下来，您告诉\
    \ Oracle GoldenGate 您需要通过初始加载复制哪些表。\n![images](img/1007.jpg)\n**图 10-7.** 为初始加载任务创建的文件。\n\
    \n*映射* 告诉 Oracle GoldenGate 您需要复制到目标数据库的内容。因此，您需要创建映射规则。创建映射规则的指导原则如下：\n\n*  \
    \ 为 `捕获` 对象配置映射语句时，不要指定目标表或列映射。\n*   为 `投递` 对象配置映射语句时，请指定源表和目标表。如果需要，请将源列映射到目标列并指定列转换函数。\n\
    \n在图表上，点击 `EXTINIT` 对应的 `映射`，然后点击底部的 `插入` 按钮。`插入新映射` 对话框打开。目前，请使用 `映射类型` 值 `表`，如图\
    \ 10-8 所示。在 `表名` 文本框中输入表名。每个新映射都要点击 `插入`。\n![images](img/1008.jpg)\n**图 10-8.**\
    \ 抽取的“插入新映射”对话框\n\n您映射的表会在 `参数` 选项卡的第一列被勾选，如图 10-9 所示。如果看不到它们，请点击 `显示表` 按钮。您也可以在表列表面板中选择表，如图\
    \ 10-9 所示。\n![images](img/1009.jpg)\n**图 10-9.** 抽取的映射表列表\n\n要查看或编辑您的抽取参数文件，请右键单击\
    \ `EXTINIT` 的 `抽取`，然后选择 `高级` > `编辑参数`。图 10-10 所示的对话框将会打开。\n![images](img/1010.jpg)\n\
    **图 10-10.** 在运行参数文件之前进行验证是良好的做法。\n\n对 `REPINIT` 的 `映射` 执行同样的操作。高亮显示已映射的表，然后点击\
    \ `更改`。在 `属性` 框中输入 `目标` 表名，如图 10-8 所示。\n\n现在，右键单击 `EXTINIT` `抽取`，并选择 `启动`，如图 10-11\
    \ 所示。这样做会启动一个 `GGSCI` 进程来开始 `抽取`。请注意，在 Windows 版 Director 中，启动的 `GGSCI` 进程窗口有时不会正常退出；如果发生这种情况，请转到启动的\
    \ `GGSCI` 窗口并输入 `Exit`。或者，您可以在 `GGSCI` 中启动 `EXTINIT`。图表会实时刷新状态。\n![images](img/1011.jpg)\n\
    **图 10-11.** 从抽取对象启动抽取。"
- fmt: '## Creating a One-Way Replication


    When you create an Extract for the first time, you need to do the following database
    tasks that Director Client can’t do for you:


    *   Enable Supplemental Logging Minimum at the database level on the source database

    *   Grant the proper privileges for Oracle GoldenGate users on the source and
    target


    If you want to log additional column change data, you need to add trandata for
    the Extract tables. To do so, right-click the data source again, and choose View
    Details. The dialog shown in [Figure 10-12](#Chapter10.html#fig_10_12) opens.
    Click the Tran/Redo Log Data tab, and then click Get Info. Director inserts default
    login information; if you need other schema, change the login information in the
    Database Access section and click Get Info to refresh the table list. Highlight
    the tables, and click the Add Trandata (you can hold the Shift key to select multiple
    tables).


    ![images](images/1012.jpg)


    **Figure 10-12.** Adding trandata.


    After you click Add Trandata, you have the option to choose the trandata columns.
    If you want to capture all columns, select all the columns and click OK.


    Now you can create the Extract. Right-click the data source on which you want
    the Extract to run, and select New Capture. The only required field is Capture
    Name; all the other fields are filled by Director. Enter the Extract name ``EXTGGS1``.
    Change the database access information to your own.


    If your capture is on Oracle Real Application Clusters (RAC), you need to alter
    the Extract with the `threads` attribute as shown here in GGSCI (`4` indicates
    four-node RAC):


    ```

    GGSCI> alter extract extggs1, translog, threads 4, begin now

    EXTRACT altered.

    ```


    When the Extract ``EXTGGS1`` has been created, right-click the ``EXTGGS1`` icon
    in the diagram and select New Trail. Enter the trail-file options shown in [Figure
    10-13](#Chapter10.html#fig_10_13), and then click OK. The diagram in your panel
    should look like the one in the [Figure 10-14](#Chapter10.html#fig_10_14).


    ![images](images/1013.jpg)


    **Figure 10-13.** Add trail-file options.


    ![images](images/1014.jpg)


    **Figure 10-14.** Complete Extract tasks diagram


    Right-click the Trail icon, and select New Delivery. Use ``REPGGS1`` as the Replicat
    name, and enter the full path for the `dirdat` directory. Click OK. You now have
    a total of six icons in your diagram, as shown in [Figure 10-15](#Chapter10.html#fig_10_15).


    ![images](images/1015.jpg)


    **Figure 10-15.** Complete Extract and Replicat diagram


    Similar to the initial load mapping, add the table in which you want to replicate
    using the Map icons. Finally, check your Extract and Replicat parameter files
    using Param File Editor. Make sure your parameter files are similar to [Figure
    10-16](#Chapter10.html#fig_10_16) and [Figure 10-17](#Chapter10.html#fig_10_17).


    ![images](images/1016.jpg)


    **Figure 10-16.** Extract parameter file


    ![images](images/1017.jpg)


    **Figure 10-17.** Replicat parameter file


    In GGSCI, type `info all` to make sure Director has created two groups for you:


    ```

    GGSCI> info all

    Program     Status      Group       Lag           Time Since Chkpt


    MANAGER     RUNNING

    EXTRACT     STOPPED     EXTGGS1     00:00:00      01:18:10

    REPLICAT    STOPPED     REPGGS1     00:00:00      01:12:13

    ```


    When everything is set, you can start the extract and replicat from the Director
    Extract and Replicat icons or GGSCI.


    After you start the Extract and Replicat, the Xs on them should be gone. The lines
    between the icons change from grey to green. The lag values are also displayed
    on the icons. You can go to the GGSCI tab to check their status, as shown in [Figure
    10-18](#Chapter10.html#fig_10_18). Click the Trail icon; it also shows the current
    relative byte address (RBA) and seqno. Feel free to add a new table to the Extract
    and Replicat; make sure you restart them after any changes.


    ![images](images/1018.jpg)


    **Figure 10-18.** Running the Extract and Replicat


    ## Adding a Data Pump Process


    It’s a best practice to use an Oracle GoldenGate Data Pump process when two systems
    aren’t on the same server, so the GoldenGate process can survive a long outage
    without losing data. To add a Data Pump process, add a new Capture from the data
    source, and name it ``DPGGS1``. Click OK. Then, add a trail file from the Extract
    ``DPGGS1`` object. The prefix for the data-pump trail file is `C2`, as shown in
    [Figure 10-19](#Chapter10.html#fig_10_19). Trail Access is TCP/IP now, because
    Data Pump process sends the trail files directly to the server at the Replicat
    side.


    ![images](images/1019.jpg)


    **Figure 10-19.** Adding a trail file for the Data Pump process


    Using the Param File Editor, remove the login information, because you don’t need
    it for this data pump, and add the `passthru` parameter as shown in [Figure 10-20](#Chapter10.html#fig_10_20).
    You can also add the mapping table here or use the Map for ``DPGGS1`` parameter
    interface to add it.


    ![images](images/1020.jpg)


    **Figure 10-20.** Data pump parameter file


    Stop the Extract ``EXTGGS1``, wait for the lag to become zero, and then stop the
    Replicat ``REPGGS1``. In GGSCI, change the Extract/Replicat to point to the new
    trail files, as shown here:


    ```

    GGSCI> alter extract dpggs1, exttrailsource c:\ggs\dirdat\c1

    EXTRACT altered.


    GGSCI> alter replicat repggs1, exttrail c:\ggs\dirdat\c2

    REPLICAT altered.

    ```


    Note that the `exttrail` path must exactly match in both the Replicat and Extract.
    For example, `.\dirdat\c1` isn’t equal to `c:\ggs\dirdat\c1` from Director’s perspective.
    However, the Oracle GoldenGate processes treat them the same and run them fine—you
    just don’t get the correct diagram, as shown in [Figure 10-21](#Chapter10.html#fig_10_21).


    ![images](images/1021.jpg)


    **Figure 10-21.** Complete flow with the Data Pump process


    Start the Extract, data pump, and Replicat. You may need to restart the Oracle
    GoldenGate client in order to see the diagram with the proper green lines. The
    Refresh Diagram feature doesn’t work sometimes.


    Now that everything is running, it’s a good time to check out the View Detail
    features for the Extract, Replicat, and data source icons. Right-click each icon,
    and select View Detail. Doing so executes some GGSCI commands for you, such as
    `View report <group name>`, `info <group name>`, `lag extract <group name>`, `send
    <group name>`, and so on.


    ## Additional Director Features and Tricks


    There are many other Director features that aren’t covered in the previous sections.
    This section goes over some key features and tricks. After reading this section,
    you’ll know what Director can do for you compared to the Oracle GoldenGate GGSCI
    command line.


    ### Alter Extract or Replicat RUN Options


    Director allows you to alter the Extract/Replicat `RUN` options. For example,
    suppose you want to reset the Extract begin timestamp or Replicat seqno/RBA. To
    do so, click the Extract/Replicat object in the diagram, and choose Controls ![images](images/U001.jpg)
    Run Options. The Extract/Replicat must be stopped in order for you to adjust these
    options. It’s important to understand the process before doing this in production,
    or the data will be lost if you skip the records inadvertently.


    ### Changing the Trail-File Size


    If Oracle GoldenGate generates too many trail files, it’s difficult to maintain
    them. A trail file that’s too big is also risky: if a large trail file is corrupted,
    then you lose a lot of data. You need to monitor and adjust the trail-file size
    if the source activity changes and affects the trail-file generation rate. To
    change the trail-file size, click the Trail object in the diagram, and choose
    Controls ![images](images/U001.jpg) Run Options. Then you can enter the new trail
    file size.'
