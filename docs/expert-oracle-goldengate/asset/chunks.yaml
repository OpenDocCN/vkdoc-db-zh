    GGSCI (primaryserver) > ADD EXTTRAIL dirdat/l3, EXTRACT LHREMP2, MEGABYTES 100

    ```


    添加抽取后，您需要启动它以开始捕获更改，如下例所示：


    ```

    GGSCI (primaryserver) > START EXTRACT LHREMP2

    ```


    启动后，您应确保抽取正常运行。如果看到`STOPPED`或`ABENDED`状态，则可能存在问题。如果正在处理数据，您应该看到`RUNNING`状态和不断增长的`RBA`值。您可以使用`INFO`命令并验证本地抽取`LHREMP2`的状态：


    ```

    GGSCI (primaryserver) 2> INFO EXTRACT LHREMP2

    ```


    如果抽取未运行，您可以查看 GoldenGate 错误日志文件并尝试解决问题。您还应该运行如下的`stats`命令（针对`LHREMP2`）：


    ```

    GGSCI (primaryserver) 2> STATS EXT LHREMP2

    ```


    您现在已经完成了本地抽取的启动，让我们进入下一步：启动数据泵抽取。


    ## 配置用于灾难恢复的数据泵


    现在本地抽取已启动，您可以继续配置、添加和启动用于灾难恢复的数据泵。在我们的示例中，您将配置数据泵以读取由名为`LHREMP2`的本地抽取写出的`l3`跟踪文件，并通过
    TCP/IP 网络将其泵送到目标备用服务器的`l4`跟踪文件，以供复制进程处理。灾难恢复的一个考虑是，您可能会将跟踪文件长距离发送到远程备用站点。您应验证您是否有足够的网络容量和性能来支持您的
    GoldenGate 灾难恢复网络需求。如果需要，您可以调整 GoldenGate 的网络参数，我们在第 7 章中回顾过这些参数。


    从 GGSCI 开始，让我们编辑数据泵的参数，如下例所示：


    ```

    GGSCI (primaryserver) 1> edit params PHREMP2


    Extract PHREMP2

    -------------------------------------------------------------------

    -- Data-pump Extract for HR schema

    -------------------------------------------------------------------


    PassThru


    ReportCount Every 10000 Records, Rate

    Report at 00:30


    DiscardFile dirrpt/PHREMP2.dsc, Append

    DiscardRollover at 02:00


    RmtHost standbyserver, MgrPort 7809

    RmtTrail dirdat/l4


    Table HR.* ;

    ```


    现在您已经设置了灾难恢复数据泵抽取的配置参数，下一步是在主服务器上添加数据泵抽取组。您可以使用以下示例中的命令来完成此操作：


    ```

    GGSCI (primaryserver) > ADD EXTRACT PHREMP2, EXTTRAILSOURCE dirdat/l3

    GGSCI (primaryserver) > ADD RMTTRAIL dirdat/l4, EXTRACT PHREMP2, MEGABYTES 100

    ```


    添加数据泵抽取后，您可以启动它以开始处理源跟踪文件中的记录，如下例所示：


    ```

    GGSCI (primaryserver) > START EXTRACT PHREMP2

    ```


    一旦数据泵抽取启动，您可以使用与本地抽取相同的`INFO EXTRACT`命令来验证其是否正在运行。您还应该在数据泵抽取上运行`STATS`命令以确保它正在处理更改。


    现在，用于灾难恢复的本地抽取和数据泵抽取都已启动，您可以开始初始数据加载。您在第 4 章中学习了初始加载数据的不同方法。这些方法同样适用于灾难恢复复制的初始数据加载。您可以使用
    GoldenGate 本身或 DBMS 供应商的加载实用程序来进行初始数据加载。有关初始加载过程的更多详细信息，请参阅第 4 章。'
- fmt: '# Configuring the Replicat for Disaster Recovery


    After the initial data load, you can start the Replicat to apply the changes that
    have been captured by the Extract while the load was running. If needed, turn
    on the `HANDLECOLLISIONS` parameter to resolve any errors with missing or duplicate
    data. It will take some time for the Replicat to catch up with applying all the
    changes made during the load, particularly for a large database with heavy change
    volume and a long load time.


    Once the initial data load changes have been applied by the Replicat and there
    is no GoldenGate lag left, the primary and standby databases will be fully synchronized.
    At this point, the Local and data-pump Extracts and Replicat can continue to run
    and keep the databases synchronized in real time with the ongoing changes.


    Before starting to configure the Replicat, you should go back and double-check
    the GoldenGate prerequisites have been met on the target standby server. We covered
    those at the beginning of the chapter in the section “Prerequisites.” Once you
    have confirmed the prerequisites are met, let''s begin configuring the Replicat.
    Remember, you''re configuring the Replicat to apply all the DML changes from the
    `HR` schema based on our disaster recovery requirements to replicate all the data.
    If you wanted to filter or transform data you could also do that here by adding
    the appropriate parameters.


    Since you already used `RHREMP1` for a Replicat name earlier, you can name this
    replicat `RHREMP2`. Let''s begin by taking a look at the Replicat parameters for
    `RHREMP2` on the standby server.


    ```

    GGSCI (standbyserver) 1> edit params RHREMP2

    Replicat RHREMP2

    -------------------------------------------------------------------

    -- Replicat for HR Schema

    -------------------------------------------------------------------

    USERID GGER, PASSWORD userpw

    ReportCount Every 10000 Records, Rate

    Report at 00:30

    DiscardFile dirrpt/RHREMP2.dsc, Append

    DiscardRollover at 02:00

    -- HandleCollisions should be turned off after the initial load synchronization.

    HandleCollisions

    AssumeTargetDefs

    Map HR.*, Target HR.* ;

    ```


    Now that you''ve set up the Replicat configuration parameters, the next step is
    to add the Replicat group. In the following example you are adding the `RHREMP2`
    replicat to the GoldenGate configuration. The Replicat will process the `l4` trail
    which was pumped over by the disaster recovery data pump.


    ```

    GGSCI (standbyserver) > ADD REPLICAT RHREMP2, EXTTRAIL dirdat/l4

    ```


    Now let''s start the `RHREMP2` replicat.


    ```

    GGSCI (standbyserver) > START REPLICAT RHREMP2

    ```


    Once the Replicat has started, you can verify it is running using the `INFO REPLICAT`
    command. You should see a Status of `RUNNING`. If you see a Status of `STOPPED`
    or `ABENDED` there may be a problem.


    Let''s do an `INFO` command on our Replicat `RHREMP1` to check the status as follows:


    ```

    GGSCI (standbyserver) 2> INFO REPLICAT RHREMP2

    ```


    You should also run the `STATS` command on your Replicat to make sure it is processing
    changes as in the following example for Replicat `RHREMP2`:


    ```

    GGSCI (standbyserver) 2> STATS REP RHREMP2

    ```


    Next, let''s add the GoldenGate processes for the replication from the standby
    database back to the primary database.


    # Configuring the Standby Extract


    Once Part 1 of your disaster recovery replication is complete and you are successfully
    replicating from the primary database to the standby database, the next part is
    to add the standby Extract. The standby Extract is similar to the primary Extract
    except it will be used to extract data to replicate from the standby database
    back to the primary database if needed. For now you''re only `adding` the Extract.
    Later you''ll `start` it during switchover and failover activities.


    Let''s begin by configuring the parameter file for the standby Local Extract.
    In our example you''re configuring the Local Extract to capture all the SQL DML
    changes from the sample `HR` schema on the standby database. Since you''ve already
    used trails `l3` and `l4`, let''s use trails `l5` and `l6` for replication from
    the standby database back to the primary database.


    Let''s start by taking a look at the parameters for the Local Extract on the standby
    server.


    ```

    GGSCI (standbyserver) 1> edit params LHREMP3

    Extract LHREMP3

    -------------------------------------------------------------------

    -- Local extract for HR schema

    -------------------------------------------------------------------

    USERID GGER, PASSWORD userpw

    ExtTrail dirdat/l5

    ReportCount Every 10000 Records, Rate

    Report at 00:30

    DiscardFile dirrpt/LHREMP3.dsc, Append

    DiscardRollover at 02:00

    Table HR.*;

    ```


    Next you will add the standby Extract to the GoldenGate configuration so you will
    be ready to start it later during a database switchover or failover. You can do
    that using the following commands from `GGSCI`:


    ```

    GGSCI (standbyserver) > ADD EXTRACT LHREMP3, TRANLOG, BEGIN NOW

    GGSCI (standbyserver) > ADD EXTTRAIL dirdat/l5, EXTRACT LHREMP3, MEGABYTES 100

    ```


    Next, let''s configure the standby data pump.


    # Configuring the Standby Data Pump


    Now that the standby Local Extract is added, you can proceed with configuring
    and adding the standby data pump. The standby data pump is similar to the primary
    data pump except it will be used to pump the trails back from the standby database
    to the primary database if needed. In our example, you''ll configure the data
    pump to read the `l5` trail file written out by the standby Local Extract named
    `LHREMP3` and pump it over the TCP/IP network to the target server to be processed
    by the standby Replicat.


    From `GGSCI`, let''s edit the parameters for our data pump as shown in this example.


    ```

    GGSCI (standbyserver) 1> edit params PHREMP3

    Extract PHREMP3

    -------------------------------------------------------------------

    -- Data-pump Extract for HR schema

    -------------------------------------------------------------------

    PassThru

    ReportCount Every 10000 Records, Rate

    Report at 00:30

    DiscardFile dirrpt/PHREMP3.dsc, Append

    DiscardRollover at 02:00

    RmtHost standbyserver, MgrPort 7809

    RmtTrail dirdat/l6

    Table HR.* ;

    ```


    Since you''ve reviewed these parameters previously in Chapters 4 and 5, let''s
    proceed with adding the data pump. You can add the data-pump Extract using the
    commands shown in the following example.


    ```

    GGSCI (standbyserver) > ADD EXTRACT PHREMP3, EXTTRAILSOURCE dirdat/l5

    GGSCI (standbyserver) > ADD RMTTRAIL dirdat/l6, EXTRACT PHREMP3, MEGABYTES 100

    ```


    You won''t be starting the data pump until later, so let''s move on to configuring
    the standby Replicat.'
