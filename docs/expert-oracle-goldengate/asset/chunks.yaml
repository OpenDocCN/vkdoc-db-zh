  trans: '

    ## 需求


    你需要深入理解那些将驱动灾难恢复复制技术设计的具体需求。以下是一些典型的灾难恢复复制需求与考量。我们将把你正在复制的源数据库称为 `主数据库`，远程目标数据库称为
    `备用` 或 `灾难恢复数据库`。`主数据库`，也被称为可信源，是在正常情况下应用程序连接并处于活动状态的数据库。


    一旦你定义了需求，就需要确保可以使用 `Oracle GoldenGate` 灾难恢复复制来满足这些要求。


    *   使 `备用数据库` 与 `主数据库` 保持同步。

    *   `主数据库` 将积极处理变更。在本章中，我们将假设 `备用数据库` 用于只读查询；但请记住，借助 `GoldenGate`，你可以在双向配置中允许对
    `备用数据库` 进行写入。如果你允许对 `备用` 进行写入，那么你需要处理任何数据冲突，正如 第 5 章 中所讨论的。

    *   为了实现最快的恢复时间，通常你希望 `备用数据库` 中的数据库结构和数据与 `主数据库` 完全相同。然而，通过使用 `GoldenGate`，你可以灵活地允许你的
    `主` 数据库和 `备用` 数据库存在差异。例如，你可能决定只为灾难恢复目的保留数据的关键子集，而不是整个数据库。你可以通过 `GoldenGate` 过滤功能来实现这一点，这在
    第 5 章 中有介绍。对于 `Oracle` 数据库，你还可以使用 `GoldenGate DDL 复制` 功能来保持数据库表以及数据的同步。

    *   通常，你会希望 `主数据库` 中的数据与灾难恢复站点保持高度同步，最多只有几秒的差异，以便在发生故障切换时应对。例如，如果你正在处理金融交易，`主`
    和 `备用` 数据之间的任何滞后差异都可能代价高昂。这将根据你的具体应用而有所不同。对于某些应用，你可能能够容忍 `备用` 数据库落后于 `主数据库` 一段时间。此外，可能有些数据库不需要保持最新，只需要定期刷新即可。在这种情况下，你仍然可以设置本章将介绍的相同
    `GoldenGate` 配置，但仅在需要时才启用它。

    *   无论是计划内还是计划外停机，都能快速从 `主数据库` 切换到 `备用灾难恢复数据库`。

    *   故障切换或切换到 `备用数据库` 后，数据库角色互换，它成为 `主数据库`。根据需要，数据库角色可以在稍后时间恢复到原始配置。

    *   故障切换或切换后，必须捕获对 `备用数据库` 的更改，以便在 `主数据库` 返回配置后进行同步。


    在本章中，我们将展示如何使用 `GoldenGate` 来满足这些需求。对于示例，我们将使用与前面章节相同的 `HR 模式`。


    ## 灾难恢复复制拓扑


    灾难恢复的基础拓扑是 `单向复制`，并进行了一些增强以支持灾难恢复，如 图 12-1 所示。你可能还记得 第 3 章 中，`单向复制` 是最简单的拓扑，通常用于报告或查询卸载目的。在我们的案例中，`单向复制`
    拓扑将用于灾难恢复目的。数据从单个源数据库（即 `主` 数据库）复制到单个目标数据库（即 `备用` 数据库），方向是单向的。数据库数据的更改仅在 `主数据库`
    进行，然后复制到 `备用数据库`。


    对于灾难恢复，需要对基本的 `单向复制` 拓扑进行一些增强。`主数据库` 通常处理应用活动，除非发生切换或故障切换。我们将切换称为计划内停机，例如软件维护。故障切换是计划外停机，此时
    `主数据库` 在一段时间内完全丢失。在切换或故障切换期间，`备用数据库` 将成为 `主数据库`。


    为了满足我们在上一节中介绍的灾难恢复需求，你必须确保能够快速准确地将应用活动从 `主数据库` 切换到 `备用数据库`，然后再切换回来。此外，你必须捕获在 `备用数据库`
    上进行的任何数据库更改，以便在 `主数据库` 重新上线后与之重新同步。我们在 图 12-1 的示意图中用虚线表示了这一点。


    ![images](img/1201.jpg)


    图 12-1. 灾难恢复复制拓扑


    现在让我们看看如何使用 `GoldenGate` 实现灾难恢复复制需求和拓扑。


    ## 设置


    先决条件完成后，设置从源到目标的灾难恢复复制可以通过两个部分、总共七个步骤完成，如 图 12-2 和 12-3 所示。


    ![images](img/1202.jpg)


    图 12-2. 灾难恢复复制设置，第 1 部分


    这些步骤与我们在 第 4 章 中介绍的基本 `单向复制` 设置类似。


    第 1 部分包括设置从 `主数据库` 到 `备用数据库` 复制的前四个步骤。这四个步骤包括初始加载数据，以及在初始加载后保持数据同步。由于我们已经在 第 4
    章 中介绍了这些步骤和概念，此处不再重复。在本章接下来的部分中，我们将提供 `GoldenGate 参数文件`，并且仅在适用的情况下解释灾难恢复的新概念。


    ![images](img/1203.jpg)


    图 12-3. 灾难恢复反向复制设置，第 2 部分


    第 2 部分，如 图 12-3 所示，包括最后三个步骤，用于配置从 `备用数据库` 回到 `主数据库` 的复制（如果需要）。你将配置但不启动从 `备用数据库`
    到 `主数据库` 的复制。设置从 `备用数据库` 到 `主数据库` 复制的三个步骤包括设置和配置 `本地 Extract`、`数据泵 Extract` 和
    `Replicat`。这些 `Extracts` 和 `Replicat` 将在后续的切换和故障切换场景中使用。图 12-3 中的步骤描述如下：


    1.  添加 `备用 Extract`。配置并添加 `备用 Extract`，为在切换或故障切换事件中捕获数据库更改做好准备。如果发生停机，`备用本地 Extract`
    将已就位并准备好开始捕获更改。

    2.  添加 `备用数据泵 Extract`。配置并添加 `备用数据泵`，为在 `主数据库` 发生停机事件时捕获来自 `备用数据库` 的更改做好准备。

    3.  添加 `备用 Replicat`。配置并添加 `备用 Replicat`，为在发生停机时开始将更改应用回 `主数据库` 做好准备。


    让我们从下一节配置 `本地 Extract` 开始，逐一了解每个灾难恢复复制步骤。

    '
- fmt: '## 配置用于灾难恢复的本地抽取


    让我们开始配置本地抽取。为此，您首先需要为抽取创建一个参数文件。请记住，我们正在配置本地抽取以捕获主数据库HR方案的所有SQL DML更改，以复制到备用数据库HR方案。我们将保持数据库数据的精确副本同步，以便用于切换或故障转移。


    让我们看一下主服务器上本地抽取的参数，如下例所示。由于我们在之前的章节中使用了LHREMD1，让我们将灾难恢复本地抽取命名为LHREMP2。


    ```

    GGSCI (primaryserver) 1> edit params LHREMP2


    Extract LHREMP2

    -------------------------------------------------------------------

    -- Local extract for HR schema

    -------------------------------------------------------------------


    USERID GGER, PASSWORD userpw


    ExtTrail dirdat/l3


    ReportCount Every 10000 Records, Rate

    Report at 00:30


    DiscardFile dirrpt/LHREMP2.dsc, Append

    DiscardRollover at 02:00


    Table HR.*;

    ```


    这些参数看起来应该很熟悉，因为我们在第4章和第5章中已经介绍过。下一步是将抽取添加到GoldenGate配置中。您应该选择一个新的未使用的跟踪文件名。在此示例中，您可以使用跟踪文件`l3`作为本地抽取的跟踪文件，因为跟踪文件`l1`和`l2`已在之前的示例中使用。您可以使用以下来自GGSCI的命令添加抽取：


    ```

    GGSCI (primaryserver) > ADD EXTRACT LHREMP2, TRANLOG, BEGIN NOW

    GGSCI (primaryserver) > ADD EXTTRAIL dirdat/l3, EXTRACT LHREMP2, MEGABYTES 100

    ```


    添加抽取后，您需要启动它以开始捕获更改，如下例所示：


    ```

    GGSCI (primaryserver) > START EXTRACT LHREMP2

    ```


    启动后，您应确保抽取正常运行。如果看到`STOPPED`或`ABENDED`状态，则可能存在问题。如果正在处理数据，您应该看到`RUNNING`状态和不断增长的`RBA`值。您可以使用`INFO`命令并验证本地抽取`LHREMP2`的状态：


    ```

    GGSCI (primaryserver) 2> INFO EXTRACT LHREMP2

    ```


    如果抽取未运行，您可以查看GoldenGate错误日志文件并尝试解决问题。您还应该运行如下的`stats`命令（针对`LHREMP2`）：


    ```

    GGSCI (primaryserver) 2> STATS EXT LHREMP2

    ```


    您现在已经完成了本地抽取的启动，让我们进入下一步：启动数据泵抽取。


    ## 配置用于灾难恢复的数据泵


    现在本地抽取已启动，您可以继续配置、添加和启动用于灾难恢复的数据泵。在我们的示例中，您将配置数据泵以读取由名为`LHREMP2`的本地抽取写出的`l3`跟踪文件，并通过TCP/IP网络将其泵送到目标备用服务器的`l4`跟踪文件，以供复制进程处理。灾难恢复的一个考虑是，您可能会将跟踪文件长距离发送到远程备用站点。您应验证您是否有足够的网络容量和性能来支持您的GoldenGate灾难恢复网络需求。如果需要，您可以调整GoldenGate的网络参数，我们在[第7章](#Chapter07.html#ch7)中回顾过这些参数。


    从GGSCI开始，让我们编辑数据泵的参数，如下例所示：


    ```

    GGSCI (primaryserver) 1> edit params PHREMP2


    Extract PHREMP2

    -------------------------------------------------------------------

    -- Data-pump Extract for HR schema

    -------------------------------------------------------------------


    PassThru


    ReportCount Every 10000 Records, Rate

    Report at 00:30


    DiscardFile dirrpt/PHREMP2.dsc, Append

    DiscardRollover at 02:00


    RmtHost standbyserver, MgrPort 7809

    RmtTrail dirdat/l4


    Table HR.* ;

    ```


    现在您已经设置了灾难恢复数据泵抽取的配置参数，下一步是在主服务器上添加数据泵抽取组。您可以使用以下示例中的命令来完成此操作：


    ```

    GGSCI (primaryserver) > ADD EXTRACT PHREMP2, EXTTRAILSOURCE dirdat/l3

    GGSCI (primaryserver) > ADD RMTTRAIL dirdat/l4, EXTRACT PHREMP2, MEGABYTES 100

    ```


    添加数据泵抽取后，您可以启动它以开始处理源跟踪文件中的记录，如下例所示：


    ```

    GGSCI (primaryserver) > START EXTRACT PHREMP2

    ```


    一旦数据泵抽取启动，您可以使用与本地抽取相同的`INFO EXTRACT`命令来验证其是否正在运行。您还应该在数据泵抽取上运行`STATS`命令以确保它正在处理更改。


    现在，用于灾难恢复的本地抽取和数据泵抽取都已启动，您可以开始初始数据加载。您在[第4章](#Chapter04.html#ch4)中学习了初始加载数据的不同方法。这些方法同样适用于灾难恢复复制的初始数据加载。您可以使用GoldenGate本身或DBMS供应商的加载实用程序来进行初始数据加载。有关初始加载过程的更多详细信息，请参阅[第4章](#Chapter04.html#ch4)。'
  raw: '#### Configuring the Local Extract for Disaster Recovery


    Let''s begin by configuring the Local Extract. In order to do this, you will first
    need to create a parameter file for the Extract. Remember, we''re configuring
    the Local Extract to capture all the SQL DML changes from the primary database
    HR schema for replication to the standby database HR schema. We will keep an exact
    copy of the database data synchronized so it can be used for switchover or failover.


    Let''s take a look at the parameters for the Local Extract on the primary server
    as shown in the following example. Since we used LHREMD1 in an earlier chapter,
    let''s name the disaster recovery Local Extract LHREMP2.


    `GGSCI (primaryserver) 1> edit params LHREMP2`


    `Extract LHREMP2`


    `-------------------------------------------------------------------`

    `-- Local extract for HR schema`

    `-------------------------------------------------------------------`


    `USERID GGER, PASSWORD userpw`


    `ExtTrail dirdat/l3`


    `ReportCount Every 10000 Records, Rate`

    `Report at 00:30`


    `DiscardFile dirrpt/LHREMP2.dsc, Append`

    `DiscardRollover at 02:00`


    `Table HR.*;`


    These parameters should look familiar as we covered them all in Chapters 4 and
    5\. The next step is to add the Extract to the GoldenGate configuration. You should
    pick a new unused trail file name. In this example, you can use trail file l3
    for the Local Extract trail, since trail files l1 and l2 were used in previous
    examples. You can add the extract using the following commands from GGSCI:


    `GGSCI (primaryserver) > ADD EXTRACT LHREMP2, TRANLOG, BEGIN NOW`

    `GGSCI (primaryserver) > ADD EXTTRAIL dirdat/l3, EXTRACT LHREMP2, MEGABYTES 100`


    After adding the Extract, you need to start it to begin capturing changes as shown
    in the following example:


    `GGSCI (primaryserver) > START EXTRACT LHREMP2`


    You should make sure the Extract is running properly after it is started. If you
    see a status of STOPPED or ABENDED there may be a problem. You should see a status
    of RUNNING and the RBA value increasing if you are processing data. You can use
    the INFO command and verify the status of the Local Extract LHREMP2:


    `GGSCI (primaryserver) 2> INFO EXTRACT LHREMP2`


    If the Extract is not running, you can review the GoldenGate error log file and
    try to resolve the problem. You should also run the stats command as shown here
    for LHREMP2:


    `GGSCI (primaryserver) 2> STATS EXT LHREMP2`


    You''re now finished starting the Local Extract, so let''s move on to the next
    step: starting the data-pump Extract.


    #### Configuring the Data Pump for Disaster Recovery


    Now that the Local Extract is started, you can proceed with configuring, adding,
    and starting the data pump for disaster recovery. In our example, you configure
    the data pump to read the l3 trail file written out by the Local Extract named
    LHREMP2 and pump it over the TCP/IP network to the target standby server to trail
    l4 to be processed by the Replicat. One consideration for disaster recovery is
    you may be sending your trail files over long distances to the remote standby
    site. You should verify you have the network capacity and performance to support
    your GoldenGate disaster recovery network requirements. If needed, you can tune
    the GoldenGate parameters for the network which we reviewed in [Chapter 7](#Chapter07.html#ch7).


    From GGSCI, let''s edit the parameters for the data pump as shown in this example:


    `GGSCI (primaryserver) 1> edit params PHREMP2`


    `Extract PHREMP2`


    `-------------------------------------------------------------------`

    `-- Data-pump Extract for HR schema`

    `-------------------------------------------------------------------`


    `PassThru`


    `ReportCount Every 10000 Records, Rate`

    `Report at 00:30`


    `DiscardFile dirrpt/PHREMP2.dsc, Append`

    `DiscardRollover at 02:00`


    `RmtHost standbyserver, MgrPort 7809`

    `RmtTrail dirdat/l4`


    `Table HR.* ;`


    Now that you''ve set up the disaster recovery data-pump Extract configuration
    parameters, the next step is to add the data-pump Extract group on the primary
    server. You can do that using the commands shown in the following example:


    `GGSCI (primaryserver) > ADD EXTRACT PHREMP2, EXTTRAILSOURCE dirdat/l3`

    `GGSCI (primaryserver) > ADD RMTTRAIL dirdat/l4, EXTRACT PHREMP2, MEGABYTES 100`


    After adding the data-pump Extract, you can start it to begin processing records
    from the source trail file as shown in this example:


    `GGSCI (primaryserver) > START EXTRACT PHREMP2`


    Once the data-pump Extract has started, you can verify it is running using the
    same INFO EXTRACT command that you used for the Local Extract. You should also
    run the STATS command on the data-pump Extract to make sure it is processing changes.


    Now that the Local Extract and data-pump Extract for disaster recovery are started,
    you can begin the initial data load. You learned about the different methods for
    initially loading data in [Chapter 4](#Chapter04.html#ch4). These methods will
    also work fine for the initial data load for your disaster recovery replication.
    You can use either GoldenGate itself, or the DBMS vendor load utilities to do
    the initial data load. Please refer to [Chapter 4](#Chapter04.html#ch4) for more
    details on the initial load process.'
  trans: '## 配置用于灾难恢复的本地抽取


    让我们开始配置本地抽取。为此，您首先需要为抽取创建一个参数文件。请记住，我们正在配置本地抽取以捕获主数据库 HR 方案的所有 SQL DML 更改，以复制到备用数据库
    HR 方案。我们将保持数据库数据的精确副本同步，以便用于切换或故障转移。


    让我们看一下主服务器上本地抽取的参数，如下例所示。由于我们在之前的章节中使用了 LHREMD1，让我们将灾难恢复本地抽取命名为 LHREMP2。


    ```

    GGSCI (primaryserver) 1> edit params LHREMP2


    Extract LHREMP2

    -------------------------------------------------------------------

    -- Local extract for HR schema

    -------------------------------------------------------------------


    USERID GGER, PASSWORD userpw


    ExtTrail dirdat/l3


    ReportCount Every 10000 Records, Rate

    Report at 00:30


    DiscardFile dirrpt/LHREMP2.dsc, Append

    DiscardRollover at 02:00


    Table HR.*;

    ```


    这些参数看起来应该很熟悉，因为我们在第 4 章和第 5 章中已经介绍过。下一步是将抽取添加到 GoldenGate 配置中。您应该选择一个新的未使用的跟踪文件名。在此示例中，您可以使用跟踪文件`l3`作为本地抽取的跟踪文件，因为跟踪文件`l1`和`l2`已在之前的示例中使用。您可以使用以下来自
    GGSCI 的命令添加抽取：


    ```

