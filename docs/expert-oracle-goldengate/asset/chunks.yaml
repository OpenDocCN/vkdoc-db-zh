- fmt: '# Using GGSCI Command Shortcuts


    By now you should be familiar with the GoldenGate Software Command Interface (`GGSCI`)
    and many of the basic `GGSCI` commands. Let’s look at some shortcuts that may
    not be as familiar. These can save you a lot of time (and typing!).


    You can use common abbreviations in your commands, such as `ext` for `Extract`,
    `rep` for `Replicat`, `mgr` for `Manager`, and `er` to refer to both Extracts
    and Replicats. Let’s look at a few examples using the `INFO` command on Extracts,
    Replicats, and, in the third example, both Extracts and Replicats.


    ```

    GGSCI (server) 1> info ext *

    GGSCI (server) 2> info rep *

    GGSCI (server) 3> info er *

    ```


    Now, let’s use the exclamation point (`!`) command to reexecute the last `INFO`
    command.


    ```

    GGSCI (server) 4> !

    info er *

    ```


    Notice that the `!` command reexecuted the `info er *` command. Next, let’s reexecute
    the second command `info rep *` by adding the specific command number `2` to the
    `!` as shown here.


    ```

    GGSCI (server) 5> ! 2

    info rep *

    ```


    Suppose you want to execute an operating-system command to display your current
    directory contents while you’re inside `GGSCI`. You can do this with the `SHELL`
    command, as shown in the following example.


    ```

    GGSCI (server) 6> shell dir

    ```


    You can quickly see information about your GoldenGate environment using the `SHOW`
    command. `SHOW` is especially helpful to get a quick listing of your GoldenGate
    directories.


    ```

    GGSCI (server) 7> show


    Parameter settings:


    SET SUBDIRS    ON

    SET DEBUG      OFF


    Current directory: /gger/ggs


    Using subdirectories for all process files


    Editor:  vi


    Reports (.rpt)                 /gger/ggs/dirrpt

    Parameters (.prm)              /gger/ggs/dirprm

    Stdout (.out)                  /gger/ggs/dirout

    Replicat Checkpoints (.cpr)    /gger/ggs/dirchk

    Extract Checkpoints (.cpe)     /gger/ggs/dirchk

    Process Status (.pcs)          /gger/ggs/dirpcs

    SQL Scripts (.sql)             /gger/ggs/dirsql

    Database Definitions (.def)    /gger/ggs/dirdef

    ```


    Now, let’s display the history of the commands you’ve executed by using the `HISTORY`
    command as shown in the following example.


    ```

    GGSCI (server) 8> history


    GGSCI Command History


        1: info ext *

        2: info rep *

        3: info er *

        4: info er *

        5: info rep *

        6: shell dir

        7: show

        8: history

    ```


    By using `HISTORY` combined with the `!` command, you can really save time. You
    can use the `! #` command to reexecute any command number contained in your history.
    For example, `! 7` reexecutes command number 7, which in this case is the `SHOW`
    command.


    Finally, you can use `HELP` to get help on any of the GoldenGate commands as shown
    here.


    ```

    GGSCI (server) 9> help

    ```


    Next, let’s look at `OBEY` files, which are another tool to make it even easier
    to manage GoldenGate.


    # Using OBEY Files


    You should store your frequently used commands in GoldenGate `OBEY` files. `OBEY`
    files are command files (similar to `.bat` files in Windows or shell scripts in
    UNIX) that you place in the `diroby` directory under your GoldenGate installation.
    You can name the `OBEY` files anything; but it’s a good idea to have a naming
    standard, such as using a standard filename extension like `.obey`.


    Let’s look at an example `OBEY` file. Assume you want to add an Extract for your
    production payroll data named `LPAYRP1` along with the corresponding trail file.
    You can create an `OBEY` file to add the Extract as shown in the following example.


    ```

    $ cat diroby/LPAYRP1.obey


    ADD EXTRACT LPAYRP1, TRANLOG, BEGIN NOW

    ADD EXTTRAIL /gger/dirdat/l1,  EXTRACT LPAYRP1,  MEGABYTES 25

    ```


    ```

    GGSCI (sourceserver) 1> obey ./dirdat/LPAYRP1.obey

    ```


    Using `OBEY` files gives the added advantage that your files are stored centrally
    as a good reference and can be reused. You can create a standard set of `OBEY`
    files and ensure a consistent, reusable, scripted process for your GoldenGate
    setup and maintenance. Anyone supporting the replication can easily find the files
    you used to set up the replication. In addition, if something goes wrong, you
    always have your scripts to use as a reference point.


    # Generating Interim Statistics


    By default, GoldenGate generates a report each time an Extract or Replicat process
    is started. In addition, you should include the `REPORT` parameter to generate
    interim runtime statistics at least on a daily basis. This information can be
    invaluable when you’re debugging or evaluating performance. You should also include
    the `REPORTCOUNT` parameter with the `RATE` argument to display the number of
    records being processed and the processing rate.


    In the following example, Extract or Replicat parameters are configured to report
    the number of records processed every 15 minutes, report the processing rate,
    and generate interim runtime statistics every day at 12:00.


    ```

    ReportCount Every 15 Minutes, Rate

    Report at 12:00

    ```


    Now let''s look at using a discard file for records GoldenGate can''t process.


    # Using a Discard File


    You should specify a discard file in the Extract and Replicat parameter files.
    GoldenGate uses this file to write any records that it can’t process along with
    the error code. You can use this file for debugging purposes in the event of failure.
    You should check the discard file for changes periodically and resolve any discards
    as soon as possible.


    Here is an example of using the discard file parameters in the Extract parameter.
    We reviewed this in [Chapter 5](#Chapter05.html#ch5), “Advanced and Bi-Directional
    Features”.


    ```

    DiscardFile dirrpt/LHREMD1.dsc, Append

    DiscardRollover at 02:00 ON SUNDAY

    ```


    Next let''s review reporting on the health of your GoldenGate processes.


    # Reporting Regularly on Process Health


    You can use the GoldenGate Manager process to report on the health of the Extract
    and Replicat processes. At a minimum, you should consider including the following
    parameters in your Manager parameter file:


    *   `DOWNREPORT`: Reports on down processes every user-specified number of hours
    or minutes.

    *   `DOWNCRITICAL`: Writes a critical message if the Extract or Replicat fails.

    *   `LAGCRITICAL`: Writes a warning message when the user-specified time period
    is exceeded.

    *   `LAGINFO`: Tells Manager to report lag info every user-specified time period.


    # Purging Old Trail Files Regularly


    Old trail files can accumulate and cause disk-space issues. Trail files can usually
    be purged after a couple days, but they can be kept for more or less time depending
    on your requirements and the amount of available disk space. You can specify automatic
    purge criteria in the Manager parameter file, as shown in the next example. Keep
    in mind that specifying the purge criteria using Manager applies to any Extracts
    and Replicats running under the Manager. This allows you to manage the purging
    criteria centrally.


    The following example tells Manager to purge any trail files older than two days.
    The `UseCheckPoints` option tells Manager not to purge the files until *after*
    they have been processed, as shown in the following example.


    ```

    PurgeOldExtracts dirdat/*, UseCheckPoints, MinKeepDays 2

    ```


    Next let''s look at some tips for automatically starting your GoldenGate processes.


    # Automatically Starting Processes


    Use the `AUTOSTART` Manager parameter to have the GoldenGate Manager automatically
    start your Extract and Replicat processes when Manager starts. Another parameter,
    `AUTORESTART`, is also available but should be used with caution. Sometimes a
    process fails due to a temporary resource issue or network problem and simply
    needs to be restarted. `AUTORESTART` automatically *attempts* to restart any failed
    processes. To be sure you are not unknowingly overlooking any problems, you may
    prefer to have an Extract or Replicat process fail and then resolve the issue
    manually instead of using `AUTORESTART`.'
  raw: '#### Using GGSCI Command Shortcuts


    By now you should be familiar with the GoldenGate Software Command Interface (GGSCI)
    and many of the basic GGSCI commands. Let’s look at some shortcuts that may not
    be as familiar. These can save you a lot of time (and typing!).


    You can use common abbreviations in your commands, such as *ext* for *Extract*,
    *rep* for *Replicat*, *mgr* for *Manager*, and *er* to refer to both Extracts
    and Replicats. Let’s look at a few examples using the `INFO` command on Extracts,
    Replicats, and, in the third example, both Extracts and Replicats.


    `GGSCI (server) 1> info ext *`

    `GGSCI (server) 2> info rep *`

    `GGSCI (server) 3> info er *`


    Now, let’s use the exclamation point (`!`) command to reexecute the last `INFO`
    command.


    `GGSCI (server) 4> !`

    `info er *`


    Notice that the `!` command reexecuted the `info er *` command. Next, let’s reexecute
    the second command `info rep *` by adding the specific command number `2` to the
    `!` as shown here.


    `GGSCI (server) 5> ! 2`

    `info rep *`


    Suppose you want to execute an operating-system command to display your current
    directory contents while you’re inside GGSCI. You can do this with the `SHELL`
    command, as shown in the following example.


    `GGSCI (server) 6> shell dir`


    You can quickly see information about your GoldenGate environment using the `SHOW`
    command. SHOW is especially helpful to get a quick listing of your GoldenGate
    directories.


    `GGSCI (server) 7> show`


    `Parameter settings:`


    `SET SUBDIRS    ON`

    `SET DEBUG      OFF`


    `Current directory: /gger/ggs`


    `Using subdirectories for all process files`


    `Editor:  vi`


    `Reports (.rpt)                 /gger/ggs/dirrpt`

    `Parameters (.prm)              /gger/ggs/dirprm`

    `Stdout (.out)                  /gger/ggs/dirout`

    `Replicat Checkpoints (.cpr)    /gger/ggs/dirchk`

    `Extract Checkpoints (.cpe)     /gger/ggs/dirchk`

    `Process Status (.pcs)          /gger/ggs/dirpcs`

    `SQL Scripts (.sql)             /gger/ggs/dirsql`

    `Database Definitions (.def)    /gger/ggs/dirdef`


    Now, let’s display the history of the commands you’ve executed by using the `HISTORY`
    command as shown in the following example.


    `GGSCI (server) 8> history`


    `GGSCI Command History`


    `    1: info ext *`

    `    2: info rep *`

    `    3: info er *`

    `    4: info er *`

    `    5: info rep *`

    `    6: shell dir`

    `    7: show`

    `    8: history`


    By using `HISTORY` combined with the `!` command, you can really save time. You
    can use the `! #` command to reexecute any command number contained in your history.
    For example, `! 7` reexecutes command number 7, which in this case is the `SHOW`
    command.


    Finally, you can use `HELP` to get help on any of the GoldenGate commands as shown
    here.


    `GGSCI (server) 9> help`


    Next, let’s look at OBEY files, which are another tool to make it even easier
    to manage GoldenGate.


    #### Using OBEY Files


    You should store your frequently used commands in GoldenGate OBEY files. OBEY
    files are command files (similar to `.bat` files in Windows or shell scripts in
    UNIX) that you OBEY files in the `/diroby` directory under your GoldenGate installation.
    You can name the OBEY files anything; but it’s a good idea to have a naming standard,
    such as using a standard filename extension like `.obey`.


    Let’s look at an example OBEY file. Assume you want to add an Extract for your
    production payroll data named LPAYRP1 along with the corresponding trail file.
    You can create an OBEY file to add the Extract as shown in the following example.


    `$ cat diroby/LPAYRP1.obey`


    `ADD EXTRACT LPAYRP1, TRANLOG, BEGIN NOW`

    `ADD EXTTRAIL /gger/dirdat/l1,  EXTRACT LPAYRP1,  MEGABYTES 25`


    `GGSCI (sourceserver) 1> obey ./dirdat/LPAYRP1.obey`


    Using OBEY files gives the added advantage that your files are stored centrally
    as a good reference and can be reused. You can create a standard set of OBEY files
    and ensure a consistent, reusable, scripted process for your GoldenGate setup
    and maintenance. Anyone supporting the replication can easily find the files you
    used to set up the replication. In addition, if something goes wrong, you always
    have your scripts to use as a reference point.


    #### Generating Interim Statistics


    By default, GoldenGate generates a report each time an Extract or Replicat process
    is started. In addition, you should include the `REPORT` parameter to generate
    interim runtime statistics at least on a daily basis. This information can be
    invaluable when you’re debugging or evaluating performance. You should also include
    the `REPORTCOUNT` parameter with the `RATE` argument to display the number of
    records being processed and the processing rate.


    In the following example, Extract or Replicat parameters are configured to report
    the number of records processed every 15 minutes, report the processing rate,
    and generate interim runtime statistics every day at 12:00.


    `ReportCount Every 15 Minutes, Rate`

    `Report at 12:00`


    Now let''s look at using a discard file for records GoldenGate can''t process.


    #### Using a Discard File


    You should specify a discard file in the Extract and Replicat parameter files.
    GoldenGate uses this file to write any records that it can’t process along with
    the error code. You can use this file for debugging purposes in the event of failure.
    You should check the discard file for changes periodically and resolve any discards
    as soon as possible.


    Here is an example of using the discard file parameters in the Extract parameter.
    We reviewed this in [Chapter 5](#Chapter05.html#ch5), “Advanced and Bi-Directional
    Features”.


    `DiscardFile dirrpt/LHREMD1.dsc, Append`

    `DiscardRollover at 02:00 ON SUNDAY`


    Next let''s review reporting on the health of your GoldenGate processes.


    #### Reporting Regularly on Process Health


    You can use the GoldenGate Manager process to report on the health of the Extract
    and Replicat processes. At a minimum, you should consider including the following
    parameters in your Manager parameter file:


    *   `DOWNREPORT`: Reports on down processes every user-specified number of hours
    or minutes.

    *   `DOWNCRITICAL`: Writes a critical message if the Extract or Replicat fails.

    *   `LAGCRITICAL`: Writes a warning message when the user-specified time period
    is exceeded.

    *   `LAGINFO`: Tells Manager to report lag info every user-specified time period.


    #### Purging Old Trail Files Regularly


    Old trail files can accumulate and cause disk-space issues. Trail files can usually
    be purged after a couple days, but they can be kept for more or less time depending
    on your requirements and the amount of available disk space. You can specify automatic
    purge criteria in the Manager parameter file, as shown in the next example. Keep
    in mind that specifying the purge criteria using Manager applies to any Extracts
    and Replicats running under the Manager. This allows you to manage the purging
    criteria centrally.


    The following example tells Manager to purge any trail files older than two days.
    The `UseCheckPoints` option tells Manager not to purge the files until *after*
    they have been processed, as shown in the following example.


    `PurgeOldExtracts dirdat/*, UseCheckPoints, MinKeepDays 2`


    Next let''s look at some tips for automatically starting your GoldenGate processes.


    #### Automatically Starting Processes


    Use the `AUTOSTART` Manager parameter to have the GoldenGate Manager automatically
    start your Extract and Replicat processes when Manager starts. Another parameter,
    AUTORESTART, is also available but should be used with caution. Sometimes a process
    fails due to a temporary resource issue or network problem and simply needs to
    be restarted. `AUTORESTART` automatically *attempts* to restart any failed processes.
    To be sure you are not unknowingly overlooking any problems, you may prefer to
    have an Extract or Replicat process fail and then resolve the issue manually instead
    of using AUTORESTART.'
  trans: '# 使用 GGSCI 命令快捷方式


    至此，您应该已经熟悉了 GoldenGate 软件命令接口（`GGSCI`）以及许多基本的 `GGSCI` 命令。让我们来看一些可能不太为人所知的快捷方式。它们可以为您节省大量时间（以及打字！）。


    您可以在命令中使用常见的缩写，例如用 `ext` 代替 `Extract`，用 `rep` 代替 `Replicat`，用 `mgr` 代替 `Manager`，以及用
    `er` 来指代 Extract 和 Replicat 两者。让我们看几个使用 `INFO` 命令查询 Extract、Replicat 以及在第三个例子中同时查询两者的示例。


    ```

    GGSCI (server) 1> info ext *

    GGSCI (server) 2> info rep *

    GGSCI (server) 3> info er *

    ```


    现在，让我们使用感叹号（`!`）命令来重新执行上一条 `INFO` 命令。


    ```

    GGSCI (server) 4> !

    info er *

    ```


    请注意，`!` 命令重新执行了 `info er *` 命令。接下来，我们通过向 `!` 添加特定的命令编号 `2` 来重新执行第二条命令 `info rep
    *`，如下所示。


    ```

    GGSCI (server) 5> ! 2

    info rep *

    ```


    假设您想在 `GGSCI` 内部执行一个操作系统命令来显示当前目录内容。您可以使用 `SHELL` 命令来完成，如下例所示。


    ```

    GGSCI (server) 6> shell dir

    ```


    您可以使用 `SHOW` 命令快速查看有关 GoldenGate 环境的信息。`SHOW` 在快速列出 GoldenGate 目录方面特别有用。


    ```

    GGSCI (server) 7> show


    Parameter settings:


    SET SUBDIRS    ON

    SET DEBUG      OFF


    Current directory: /gger/ggs


    Using subdirectories for all process files


    Editor:  vi


    Reports (.rpt)                 /gger/ggs/dirrpt

    Parameters (.prm)              /gger/ggs/dirprm

    Stdout (.out)                  /gger/ggs/dirout

    Replicat Checkpoints (.cpr)    /gger/ggs/dirchk

    Extract Checkpoints (.cpe)     /gger/ggs/dirchk

    Process Status (.pcs)          /gger/ggs/dirpcs

    SQL Scripts (.sql)             /gger/ggs/dirsql

    Database Definitions (.def)    /gger/ggs/dirdef

    ```


    现在，让我们使用 `HISTORY` 命令来显示您已执行的命令历史记录，如下例所示。


    ```

    GGSCI (server) 8> history


    GGSCI Command History


        1: info ext *

        2: info rep *

        3: info er *

        4: info er *

        5: info rep *

        6: shell dir

        7: show

        8: history

    ```


    通过将 `HISTORY` 与 `!` 命令结合使用，您确实可以节省时间。您可以使用 `! #` 命令重新执行历史记录中的任何命令编号。例如，`! 7` 会重新执行命令编号
    7，在本例中就是 `SHOW` 命令。


    最后，您可以使用 `HELP` 来获取任何 GoldenGate 命令的帮助，如下所示。


    ```

    GGSCI (server) 9> help

    ```


    接下来，让我们看看 `OBEY` 文件，这是另一个使 GoldenGate 管理更加容易的工具。


    # 使用 OBEY 文件


    您应将常用命令存储在 GoldenGate `OBEY` 文件中。`OBEY` 文件是命令文件（类似于 Windows 中的 `.bat` 文件或 UNIX
    中的 shell 脚本），您将它们放在 GoldenGate 安装目录下的 `diroby` 目录中。您可以为 `OBEY` 文件任意命名；但建议采用命名标准，例如使用像
    `.obey` 这样的标准文件扩展名。


    让我们看一个 `OBEY` 文件示例。假设您要为您的生产 payroll 数据添加一个名为 `LPAYRP1` 的 Extract 以及对应的 trail
    文件。您可以创建一个 `OBEY` 文件来添加该 Extract，如下例所示。


    ```

    $ cat diroby/LPAYRP1.obey


    ADD EXTRACT LPAYRP1, TRANLOG, BEGIN NOW

    ADD EXTTRAIL /gger/dirdat/l1,  EXTRACT LPAYRP1,  MEGABYTES 25

    ```


    ```

    GGSCI (sourceserver) 1> obey ./dirdat/LPAYRP1.obey

    ```


    使用 `OBEY` 文件还有一个额外优势，即您的文件被集中存储，作为良好的参考，并且可以重复使用。您可以创建一套标准的 `OBEY` 文件，为您的 GoldenGate
    设置和维护确保一个一致、可重用、脚本化的过程。任何支持复制的人员都可以轻松找到您用于设置复制的文件。此外，如果出现问题，您始终有脚本可以作为参考点。


    # 生成临时统计数据


    默认情况下，每次启动 Extract 或 Replicat 进程时，GoldenGate 都会生成一份报告。此外，您应至少每天包含 `REPORT` 参数来生成临时运行时统计数据。这些信息在调试或评估性能时非常宝贵。您还应包含带有
    `RATE` 参数的 `REPORTCOUNT` 参数，以显示正在处理的记录数和处理速率。


    在以下示例中，Extract 或 Replicat 参数配置为每 15 分钟报告一次处理的记录数，报告处理速率，并每天 12:00 生成临时运行时统计数据。


    ```

    ReportCount Every 15 Minutes, Rate

    Report at 12:00

    ```


    现在让我们看看如何为 GoldenGate 无法处理的记录使用废弃文件。


    # 使用废弃文件


    您应在 Extract 和 Replicat 参数文件中指定一个废弃文件。GoldenGate 使用此文件来写入任何无法处理的记录以及错误代码。在发生故障时，您可以将此文件用于调试目的。您应定期检查废弃文件是否有更改，并尽快解决任何被废弃的记录。


    以下是在 Extract 参数中使用废弃文件参数的示例。我们在第 5 章“高级和双向功能”中回顾过此内容。


    ```

    DiscardFile dirrpt/LHREMD1.dsc, Append

    DiscardRollover at 02:00 ON SUNDAY

    ```


    接下来让我们回顾一下如何报告 GoldenGate 进程的健康状况。


    # 定期报告进程健康状况


    您可以使用 GoldenGate Manager 进程来报告 Extract 和 Replicat 进程的健康状况。至少，您应考虑在 Manager 参数文件中包含以下参数：


    *   `DOWNREPORT`：每隔用户指定的小时或分钟数报告一次宕机进程。

    *   `DOWNCRITICAL`：如果 Extract 或 Replicat 失败，则写入关键消息。

    *   `LAGCRITICAL`：当超过用户指定的时间段时，写入警告消息。

    *   `LAGINFO`：指示 Manager 按照用户指定的时间段报告延迟信息。


    # 定期清除旧的 Trail 文件


    旧的 trail 文件会累积并导致磁盘空间问题。Trail 文件通常可以在几天后清除，但根据您的要求和可用磁盘空间量，它们可以保留更长或更短的时间。您可以在
    Manager 参数文件中指定自动清除标准，如下一个示例所示。请记住，在 Manager 中指定的清除标准适用于在其下运行的任何 Extract 和 Replicat。这使您能够集中管理清除标准。


    以下示例指示 Manager 清除超过两天的任何 trail 文件。`UseCheckPoints` 选项告诉 Manager 在文件被处理完毕*之后*再清除它们，如下例所示。


    ```

    PurgeOldExtracts dirdat/*, UseCheckPoints, MinKeepDays 2

    ```


    接下来让我们看一些自动启动 GoldenGate 进程的技巧。


    # 自动启动进程


    使用 `AUTOSTART` Manager 参数，可以在 Manager 启动时自动启动您的 Extract 和 Replicat 进程。另一个参数 `AUTORESTART`
    也可用，但应谨慎使用。有时进程失败是由于临时资源问题或网络问题，只需重新启动即可。`AUTORESTART` 会自动*尝试*重新启动任何失败的进程。为了确保您不会无意中忽视任何问题，您可能更希望让
    Extract 或 Replicat 进程失败，然后手动解决问题，而不是使用 `AUTORESTART`。'
- fmt: "### Performance\n\nThis section covers some tips and tricks for making your\
    \ GoldenGate setup achieve the best possible performance. Following these suggestions\
    \ early in your project will help ensure that you don’t experience performance\
    \ issues down the road.\n\n#### Running Performance Tests\n\nYou should always\
    \ test the performance of your GoldenGate setup by running tests that execute\
    \ or simulate the execution of your actual production-processing workload. This\
    \ is the single best insurance against future problems. Ideally, the tests should\
    \ be run on a system with hardware and software identical to the production system.\
    \ In addition, you should use a copy of the actual production data or at least\
    \ a realistic subset of the production data for testing against a typical production\
    \ workload.\n\nDuring the tests, you can capture statistics about GoldenGate performance\
    \ and measure the lag to determine if the configuration can handle the load. You\
    \ can also gather server, network, and database statistics and review them for\
    \ potential performance problems.\n\nYou can examine the lag and determine if\
    \ it’s too high to meet the business requirements. For example, suppose that during\
    \ testing you experience a peak lag of 15 minutes on a critical Replicat. Your\
    \ business requirement says that any lag over ten minutes for this Replicat is\
    \ a serious problem. In this case, additional tuning, hardware, or design changes\
    \ are required to bring down the lag.\n\n#### Limiting the Number of Extracts\n\
    \nYou should try to extract as much data as possible with a single Local Extract.\
    \ The Extract processes usually aren’t a performance bottleneck because they’re\
    \ reading the data. Performance lag usually occurs in the Replicats that are processing\
    \ changes, and not the Extracts. In addition, if the data needs to be filtered,\
    \ use the data pump to create separate streams to send to the Replicat.\n\nFor\
    \ example, let’s assume you’re extracting data from the `CUSTOMER` table and replicating\
    \ to two different databases: one for reporting and the second for high availability.\
    \ The `CUSTOMER` table should be extracted from the source database *only once*,\
    \ and you can use two data pumps to filter and send the data to each of the different\
    \ target databases.\n\n#### Using Passthru Mode for Data Pumps\n\nIf the data\
    \ pump is only passing the data on to the target system and not doing any filtering,\
    \ use the data pump Extract `PASSTHRU` parameter. This causes the data pump to\
    \ skip reading any data definitions from the database or a definitions file and\
    \ improves performance. Keep in mind the tables being replicated need to be identical\
    \ to use `PASSTHRU`.\n\n#### Using Parallel Replicats\n\nTo improve performance,\
    \ you can split the Replicats into parallel processing groups. Here are some considerations\
    \ for splitting your Replicats:\n\n*   You shouldn’t split tables involved in\
    \ referential integrity into different Replicats.\n*   One approach is to use\
    \ a different Replicat for each schema. If the schema is large, split it into\
    \ multiple Replicats.\n*   High-volume tables can be split into their own Replicats.\
    \ If further separation is needed, you can split these high-volume tables into\
    \ separate Replicats based on a key range within the table using the GoldenGate\
    \ `RANGE` function. For example, the `Orders` table can be split into two Replicats\
    \ based on the `ORDERID` key column, as shown in the following example.\n\n```\n\
    -- In the first Replicat parameter file\nMAP SCHEMA_OWNER.ORDERS, TARGET SCHEMA_OWNER.ORDERS_AVAILABILITY,\
    \ COLMAP (USEDEFAULTS), FILTER (@RANGE (1,2));\n\n-- In the second Replicat parameter\
    \ file\nMAP SCHEMA_OWNER.ORDERS, TARGET SCHEMA_OWNER.ORDERS_AVAILABILITY, COLMAP\
    \ (USEDEFAULTS), FILTER (@RANGE (2,2));\n```\n\n#### Using the Fastest Available\
    \ Storage\n\nWhere performance is a concern, you should always use the fastest\
    \ available storage for GoldenGate trail files. For best performance, store the\
    \ trail files on dedicated disk in separate mount points. Trail files should be\
    \ sized appropriately, based on the amount of data captured. Refer to [Chapter\
    \ 2](#Chapter02.html#ch2), ”Installation', for disk requirements and sizing formulas\
    \ based on your transaction-log activity.\n\n#### Tuning the Database\n\nOften,\
    \ GoldenGate performance issues aren’t really caused by GoldenGate but instead\
    \ by problems in the underlying DBMS. Before starting replication, you should\
    \ make sure the performance of your database is adequate. Then, while your replication\
    \ is running, execute DBMS performance-monitoring reports (such as AWR for Oracle)\
    \ and verify that there are no outstanding performance issues. If possible, make\
    \ sure your database tables have updated performance statistics and appropriate\
    \ indexing on key columns used by GoldenGate.\n\n### Summary\n\nYou can use the\
    \ following checklist of questions to verify that you’re taking advantage of the\
    \ tips and tricks presented in this chapter:\n\n*   Requirements and planning\n\
    \    *   Do you have a clear understanding of the business objectives, and have\
    \ they been approved by your stakeholders?\n    *   Do you have a solid understanding\
    \ of the requirements?\n    *   Did you determine the appropriate replication\
    \ topology?\n*   Installation and setup\n    *   Did you create dedicated GoldenGate\
    \ database and operating-system users?\n    *   Did you encrypt the passwords\
    \ in the GoldenGate parameter files?\n    *   Did you create a dedicated GoldenGate\
    \ installation directory?\n    *   Are you using a database checkpoint table?\n\
    \    *   Did you verify the source and target database character sets?\n    *\
    \   Are you following naming standards for your GoldenGate components?\n    *\
    \   Did you use a data pump?\n*   Management and monitoring\n    *   Have you\
    \ learned the `GGSCI` command shortcuts?\n    *   Did you use `OBEY` files for\
    \ your commands?\n    *   Are you generating interim reporting statistics for\
    \ your Extracts and Replicats?\n    *   Are you using a discard file?\n    * \
    \  Are you reporting on the health of the Extracts and Replicats?\n    *   Are\
    \ you purging the old trail files to keep the disk from filling up?\n    *   Do\
    \ you have the Extracts and Replicats set up to start automatically?\n*   Performance\n\
    \    *   Did you run adequate performance tests?\n    *   Did you limit the number\
    \ of local Extracts?\n    *   Are you using passthru mode for the data pumps?\n\
    \    *   Did you set up parallel Replicats if needed?\n    *   Did you use the\
    \ fastest storage possible for your trail files?\n    *   Did you tune the underlying\
    \ source and target databases?\n\nYou should review the checklist during your\
    \ GoldenGate project. Let your answers guide you to implement best practices that\
    \ you may be missing out on. Implementing those practices generally leads to an\
    \ efficiently running GoldenGate environment.\n\n## Appendix\n\n## Additional\
    \ Technical Resources for the Oracle GoldenGate Administrator\n\nNow that you\
    \ have read the book, we hope that you now have a solid foundation in your quest\
    \ to master Oracle GoldenGate. To aid you in your journeys, we have provided you\
    \ with a list of technical resources and command tips to use as a reference guide\
    \ as you work with the product. The appendix consists of the following three sections:\n\
    \n*   The first section provides you with a list of references to consult for\
    \ further reading and investigation of Oracle GoldenGate topics discussed in the\
    \ book.\n*   The second section provides you with a list of commonly used Oracle\
    \ GoldenGate commands with syntax and an example of how to use each.\n*   The\
    \ third section contains a listing of useful `Logdump` commands and syntax to\
    \ use for troubleshooting Oracle GoldenGate environments.\n\n### Quick Guide to\
    \ Oracle GoldenGate Commands\n\nFor the beginner who's new to Oracle GoldenGate\
    \ as well as the experienced practitioner, Oracle GoldenGate commands present\
    \ a complex jungle to master. This section shows you the commonly used commands\
    \ to aid you in your quest to perform tasks in Oracle GoldenGate. It will also\
    \ serve as a reference if you need to look up the syntax for a command."
  raw: "### Performance\n\nThis section covers some tips and tricks for making your\
    \ GoldenGate setup achieve the best possible performance. Following these suggestions\
    \ early in your project will help ensure that you don’t experience performance\
    \ issues down the road.\n\n#### Running Performance Tests\n\nYou should always\
    \ test the performance of your GoldenGate setup by running tests that execute\
    \ or simulate the execution of your actual production-processing workload. This\
    \ is the single best insurance against future problems. Ideally, the tests should\
    \ be run on a system with hardware and software identical to the production system.\
    \ In addition, you should use a copy of the actual production data or at least\
    \ a realistic subset of the production data for testing against a typical production\
    \ workload.\n\nDuring the tests, you can capture statistics about GoldenGate performance\
    \ and measure the lag to determine if the configuration can handle the load. You\
    \ can also gather server, network, and database statistics and review them for\
    \ potential performance problems.\n\nYou can examine the lag and determine if\
    \ it’s too high to meet the business requirements. For example, suppose that during\
    \ testing you experience a peak lag of 15 minutes on a critical Replicat. Your\
    \ business requirement says that any lag over ten minutes for this Replicat is\
    \ a serious problem. In this case, additional tuning, hardware, or design changes\
    \ are required to bring down the lag.\n\n#### Limiting the Number of Extracts\n\
    \nYou should try to extract as much data as possible with a single Local Extract.\
    \ The Extract processes usually aren’t a performance bottleneck because they’re\
    \ reading the data. Performance lag usually occurs in the Replicats that are processing\
    \ changes, and not the Extracts. In addition, if the data needs to be filtered,\
    \ use the data pump to create separate streams to send to the Replicat.\n\nFor\
    \ example, let’s assume you’re extracting data from the CUSTOMER table and replicating\
    \ to two different databases: one for reporting and the second for high availability.\
    \ The CUSTOMER table should be extracted from the source database *only once*,\
    \ and you can use two data pumps to filter and send the data to each of the different\
    \ target databases.\n\n#### Using Passthru Mode for Data Pumps\n\nIf the data\
    \ pump is only passing the data on to the target system and not doing any filtering,\
    \ use the data pump Extract `PASSTHRU` parameter. This causes the data pump to\
    \ skip reading any data definitions from the database or a definitions file and\
    \ improves performance. Keep in mind the tables being replicated need to be identical\
    \ to use PASSTHRU.\n\n#### Using Parallel Replicats\n\nTo improve performance,\
    \ you can split the Replicats into parallel processing groups. Here are some considerations\
    \ for splitting your Replicats:\n\n*   You shouldn’t split tables involved in\
    \ referential integrity into different Replicats.\n*   One approach is to use\
    \ a different Replicat for each schema. If the schema is large, split it into\
    \ multiple Replicats.\n*   High-volume tables can be split into their own Replicats.\
    \ If further separation is needed, you can split these high-volume tables into\
    \ separate Replicats based on a key range within the table using the GoldenGate\
    \ RANGE function. For example, the Orders table can be split into two Replicats\
    \ based on the ORDERID key column, as shown in the following example. `-- In the\
    \ first Replicat parameter file`\n    `MAP SCHEMA_OWNER.ORDERS, TARGET SCHEMA_OWNER.ORDERS_AVAILABILITY,\
    \ COLMAP (USEDEFAULTS), FILTER (@RANGE (1,2));`\n\n    `-- In the second Replicat\
    \ parameter file`\n    `MAP SCHEMA_OWNER.ORDERS, TARGET SCHEMA_OWNER.ORDERS_AVAILABILITY,\
    \ COLMAP (USEDEFAULTS), FILTER (@RANGE (2,2));`\n\n#### Using the Fastest Available\
    \ Storage\n\nWhere performance is a concern, you should always use the fastest\
    \ available storage for GoldenGate trail files. For best performance, store the\
    \ trail files on dedicated disk in separate mount points. Trail files should be\
    \ sized appropriately, based on the amount of data captured. Refer to [Chapter\
    \ 2](#Chapter02.html#ch2), ”Installation', for disk requirements and sizing formulas\
    \ based on your transaction-log activity.\n\n#### Tuning the Database\n\nOften,\
    \ GoldenGate performance issues aren’t really caused by GoldenGate but instead\
    \ by problems in the underlying DBMS. Before starting replication, you should\
    \ make sure the performance of your database is adequate. Then, while your replication\
    \ is running, execute DBMS performance-monitoring reports (such as AWR for Oracle)\
    \ and verify that there are no outstanding performance issues. If possible, make\
    \ sure your database tables have updated performance statistics and appropriate\
    \ indexing on key columns used by GoldenGate.\n\n### Summary\n\nYou can use the\
    \ following checklist of questions to verify that you’re taking advantage of the\
    \ tips and tricks presented in this chapter:\n\n*   Requirements and planning\n\
    \    *   Do you have a clear understanding of the business objectives, and have\
    \ they been approved by your stakeholders?\n    *   Do you have a solid understanding\
    \ of the requirements?\n    *   Did you determine the appropriate replication\
    \ topology?\n*   Installation and setup\n    *   Did you create dedicated GoldenGate\
    \ database and operating-system users?\n    *   Did you encrypt the passwords\
    \ in the GoldenGate parameter files?\n    *   Did you create a dedicated GoldenGate\
    \ installation directory?\n    *   Are you using a database checkpoint table?\n\
    \    *   Did you verify the source and target database character sets?\n    *\
    \   Are you following naming standards for your GoldenGate components?\n    *\
    \   Did you use a data pump?\n*   Management and monitoring\n    *   Have you\
    \ learned the GGSCI command shortcuts?\n    *   Did you use OBEY files for your\
    \ commands?\n    *   Are you generating interim reporting statistics for your\
    \ Extracts and Replicats?\n    *   Are you using a discard file?\n    *   Are\
    \ you reporting on the health of the Extracts and Replicats?\n    *   Are you\
    \ purging the old trail files to keep the disk from filling up?\n    *   Do you\
    \ have the Extracts and Replicats set up to start automatically?\n*   Performance\n\
    \    *   Did you run adequate performance tests?\n    *   Did you limit the number\
    \ of local Extracts?\n    *   Are you using passthru mode for the data pumps?\n\
    \    *   Did you set up parallel Replicats if needed?\n    *   Did you use the\
    \ fastest storage possible for your trail files?\n    *   Did you tune the underlying\
    \ source and target databases?\n\nYou should review the checklist during your\
    \ GoldenGate project. Let your answers guide you to implement best practices that\
    \ you may be missing out on. Implementing those practices generally leads to an\
    \ efficiently running GoldenGate environment.\n\n## A P P E N D I X\n\n## Additional\
    \ Technical Resources for the Oracle GoldenGate Administrator\n\nNow that you\
    \ have read the book, we hope that you now have a solid foundation in your quest\
    \ to master Oracle GoldenGate. To aid you in your journeys, we have provided you\
    \ with a list of technical resources and command tips to use as a reference guide\
    \ as you work with the product. The appendix consists of the following three sections:\n\
    \n*   The first section provides you with a list of references to consult for\
    \ further reading and investigation of Oracle GoldenGate topics discussed in the\
    \ book.\n*   The second section provides you with a list of commonly used Oracle\
    \ GoldenGate commands with syntax and an example of how to use each.\n*   The\
    \ third section contains a listing of useful Logdump commands and syntax to use\
    \ for troubleshooting Oracle GoldenGate environments.\n\n### Quick Guide to Oracle\
    \ GoldenGate Commands\n\nFor the beginner who's new to Oracle GoldenGate as well\
    \ as the experienced practitioner, Oracle GoldenGate commands present a complex\
    \ jungle to master. This section shows you the commonly used commands to aid you\
    \ in your quest to perform tasks in Oracle GoldenGate. It will also serve as a\
    \ reference if you need to look up the syntax for a command."
  trans: "\n### 性能\n\n本节涵盖了一些关于如何使您的 GoldenGate 配置达到最佳性能的提示和技巧。在项目初期遵循这些建议将有助于确保您日后不会遇到性能问题。\n\
    \n#### 运行性能测试\n\n您应始终通过执行或模拟执行实际生产处理工作负载的测试来检验您的 GoldenGate 配置的性能。这是防范未来问题的最佳保障。理想情况下，测试应在与生产系统硬件和软件相同的系统上进行。此外，您应使用实际生产数据的副本或至少是一个典型的生产工作负载下的生产数据的合理子集进行测试。\n\
    \n在测试期间，您可以捕获 GoldenGate 性能的统计数据并测量延迟，以确定配置是否能处理负载。您还可以收集服务器、网络和数据库的统计数据，并对其进行审查以发现潜在的性能问题。\n\
    \n您可以检查延迟并判断其是否过高而无法满足业务需求。例如，假设在测试期间，您在一个关键的 Replicat 上遇到了 15 分钟的峰值延迟。您的业务要求规定，对于此\
    \ Replicat，任何超过十分钟的延迟都是严重问题。在这种情况下，需要进行额外的调整、升级硬件或更改设计以降低延迟。\n\n#### 限制 Extract\
    \ 的数量\n\n您应尝试使用单个 Local Extract 尽可能多地提取数据。Extract 进程通常不是性能瓶颈，因为它们只是读取数据。性能延迟通常发生在处理更改的\
    \ Replicat 上，而非 Extract。此外，如果需要过滤数据，请使用数据泵创建单独的流发送给 Replicat。\n\n例如，假设您正在从 `CUSTOMER`\
    \ 表中提取数据，并复制到两个不同的数据库：一个用于报告，另一个用于高可用性。`CUSTOMER` 表应**仅从源数据库提取一次**，然后您可以使用两个数据泵来过滤数据并将其发送到各自不同的目标数据库。\n\
    \n#### 为数据泵使用 Passthru 模式\n\n如果数据泵仅是将数据传递到目标系统而不进行任何过滤，请使用数据泵 Extract 的 `PASSTHRU`\
    \ 参数。这会使数据泵跳过从数据库或定义文件读取任何数据定义，从而提高性能。请注意，要使用 `PASSTHRU`，被复制的表必须完全相同。\n\n####\
    \ 使用并行 Replicat\n\n为了提高性能，您可以将 Replicat 拆分为并行处理组。以下是拆分 Replicat 时的一些考虑因素：\n\n\
    *   您不应将涉及参照完整性约束的表拆分到不同的 Replicat 中。\n*   一种方法是，为每个模式使用不同的 Replicat。如果模式很大，则将其拆分为多个\
    \ Replicat。\n*   高容量表可以拆分为它们自己的 Replicat。如果需要进一步分离，您可以使用 GoldenGate 的 `RANGE`\
    \ 函数，基于表内的键范围将这些高容量表拆分到单独的 Replicat 中。例如，`Orders` 表可以根据 `ORDERID` 键列拆分为两个 Replicat，如下例所示。\n\
    \n```\n-- 在第一个 Replicat 参数文件中\nMAP SCHEMA_OWNER.ORDERS, TARGET SCHEMA_OWNER.ORDERS_AVAILABILITY,\
    \ COLMAP (USEDEFAULTS), FILTER (@RANGE (1,2));\n\n-- 在第二个 Replicat 参数文件中\nMAP\
    \ SCHEMA_OWNER.ORDERS, TARGET SCHEMA_OWNER.ORDERS_AVAILABILITY, COLMAP (USEDEFAULTS),\
    \ FILTER (@RANGE (2,2));\n```\n\n#### 使用最快的可用存储\n\n如果性能是关注点，您应始终为 GoldenGate 跟踪文件使用最快的可用存储。为了获得最佳性能，请将跟踪文件存储在独立挂载点的专用磁盘上。跟踪文件的大小应根据捕获的数据量进行适当调整。有关磁盘要求和基于您事务日志活动的容量计算公式，请参阅\
    \ 第 2 章 \"安装\"。\n\n#### 调优数据库\n\n通常，GoldenGate 性能问题并非真正由 GoldenGate 引起，而是底层 DBMS\
    \ 存在问题。在开始复制之前，您应确保数据库的性能是足够的。然后，在复制运行期间，执行 DBMS 性能监控报告（例如 Oracle 的 AWR），并确认没有突出的性能问题。如果可能，请确保您的数据库表拥有最新的性能统计信息，并在\
    \ GoldenGate 使用的关键列上建有适当的索引。\n\n### 总结\n\n您可以使用以下问题清单来确认您是否充分利用了本章介绍的提示和技巧：\n\n\
    *   需求与规划\n    *   您是否清楚地理解了业务目标，并且这些目标已得到利益相关者的批准？\n    *   您是否牢固理解了需求？\n   \
    \ *   您是否确定了适当的复制拓扑结构？\n*   安装与设置\n    *   您是否创建了专用的 GoldenGate 数据库和操作系统用户？\n\
    \    *   您是否对 GoldenGate 参数文件中的密码进行了加密？\n    *   您是否创建了专用的 GoldenGate 安装目录？\n\
    \    *   您是否使用了数据库检查点表？\n    *   您是否验证了源和目标数据库的字符集？\n    *   您是否遵循了 GoldenGate\
    \ 组件的命名标准？\n    *   您是否使用了数据泵？\n*   管理与监控\n    *   您是否掌握了 `GGSCI` 命令快捷方式？\n  \
    \  *   您是否为命令使用了 `OBEY` 文件？\n    *   您是否为您的 Extract 和 Replicat 生成了临时报告统计信息？\n\
    \    *   您是否使用了废弃文件？\n    *   您是否报告了 Extract 和 Replicat 的运行状况？\n    *   您是否清除了旧的跟踪文件以防止磁盘被填满？\n\
    \    *   您是否设置了 Extract 和 Replicat 自动启动？\n*   性能\n    *   您是否运行了足够的性能测试？\n   \
    \ *   您是否限制了本地 Extract 的数量？\n    *   您是否为数据泵使用了 passthru 模式？\n    *   如果需要，您是否设置了并行\
    \ Replicat？\n    *   您是否为您的跟踪文件使用了尽可能最快的存储？\n    *   您是否调优了底层的源和目标数据库？\n\n您应在\
    \ GoldenGate 项目期间审查此清单。让您的答案引导您实施可能遗漏的最佳实践。实施这些实践通常会带来高效运行的 GoldenGate 环境。\n\n\
    ## 附录\n\n## Oracle GoldenGate 管理员的附加技术资源\n\n既然您已经阅读完本书，我们希望您在掌握 Oracle GoldenGate\
    \ 的征途上奠定了坚实的基础。为助您一臂之力，我们为您提供了一份技术资源列表和命令技巧，可作为您使用该产品时的参考指南。本附录包含以下三个部分：\n\n*\
    \   第一部分为您提供了一个参考文献列表，以供进一步阅读和研究本书中讨论的 Oracle GoldenGate 主题。\n*   第二部分为您提供了一个常用\
    \ Oracle GoldenGate 命令的列表，包含语法和使用示例。\n*   第三部分包含了一系列有用的 `Logdump` 命令和语法，用于排查 Oracle\
    \ GoldenGate 环境问题。\n\n### Oracle GoldenGate 命令快速指南\n\n对于刚接触 Oracle GoldenGate\
    \ 的新手以及经验丰富的从业者来说，Oracle GoldenGate 命令宛如一片需要掌握的复杂丛林。本节向您展示常用命令，以助您完成 Oracle GoldenGate\
    \ 中的各项任务。当您需要查询某个命令的语法时，它也可作为参考。\n"
- fmt: "## ADD\n\n`ADD`命令的语法为：`ADD EXTRACT|REPLICAT`\n\n在GoldenGate软件命令接口（GGSCI）中执行的`ADD`命令，是向Oracle\
    \ GoldenGate添加新配置的方法。您可以使用它来添加新的Extract、Replicat或数据泵组，也可以在源或目标系统上为Oracle GoldenGate配置添加本地或远程跟踪文件。\n\
    \n示例：\n\n```bash\nADD EXTRACT extora, RMTHOST prod, MGRPORT 7800, RMTNAME prodfin\n\
    ADD REPLICAT repora, EXTTRAIL d:\\ggs\\dirdat\\rt\n```\n\n## GGSCI\n\n`GGSCI`是进入命令行界面的命令，用于执行Oracle\
    \ GoldenGate的大多数管理任务。最简单的形式是，您打开一个shell提示符，从Oracle GoldenGate基本安装目录中键入`GGSCI`。您还可以为Windows或UNIX/Linux设置`path`变量作为直接链接或别名，以简化`GGSCI`命令的使用。\n\
    \n示例：\n\n```bash\nC:\\ggs\\mssqlserver>ggsci\n```\n\n```text\nOracle GoldenGate\
    \ Command Interpreter for ODBC\nVersion 11.1.1.0.0 Build 078\nWindows (optimized),\
    \ Microsoft SQL Server on Jul 28 2010 18:55:52\n\nCopyright (C) 1995, 2010, Oracle\
    \ and/or its affiliates. All rights reserved.\n```\n\n## HELP\n\n`HELP`命令提供语法帮助，用于查找特定Oracle\
    \ GoldenGate命令的参数和详细信息。最基本的形式是，登录GGSCI界面后，从GGSCI命令shell提示符键入`HELP`命令，如下例所示：\n\n\
    ```text\nGGSCI (oracledba) 1> help\n\nGGSCI Command Summary:\n\nObject:      \
    \     Command:\nSUBDIRS           CREATE\nER                INFO, KILL, LAG, SEND,\
    \ STATUS, START, STATS, STOP\nEXTRACT           ADD, ALTER, CLEANUP, DELETE, INFO,\
    \ KILL,\n                  LAG, SEND, START, STATS, STATUS, STOP\nEXTTRAIL   \
    \       ADD, ALTER, DELETE, INFO\nGGSEVT            VIEW\nMANAGER           INFO,\
    \ SEND, START, STOP, STATUS\nMARKER            INFO\nPARAMS            EDIT, VIEW\n\
    REPLICAT          ADD, ALTER, CLEANUP, DELETE, INFO, KILL, LAG, SEND,\n      \
    \            START, STATS, STATUS, STOP\nREPORT            VIEW\nRMTTRAIL    \
    \      ADD, ALTER, DELETE, INFO\nTRACETABLE        ADD, DELETE, INFO\nTRANDATA\
    \          ADD, DELETE, INFO\nCHECKPOINTTABLE   ADD, DELETE, CLEANUP, INFO\n\n\
    Commands without an object:\n(Database)       DBLOGIN, LIST TABLES, ENCRYPT PASSWORD\n\
    (DDL)            DUMPDDL\n(Miscellaneous)  FC, HELP, HISTORY, INFO ALL, OBEY,\
    \ SET EDITOR, SHELL,\n                 SHOW, VERSIONS, ! (note: you must type\
    \ the word\n                 COMMAND after the ! to display the ! help topic.)\n\
    \                 i.e.: GGSCI (sys1)> help ! command\nFor help on a specific command,\
    \ type HELP <command> <object>.\n```\n\n例如：`HELP ADD REPLICAT`\n\n在下面的示例中，您需要查找`ADD\
    \ EXTRACT`命令的语法和描述：\n\n```text\nGGSCI (oracledba) 2> help add extract\n\nADD EXTRACT\n\
    \nUse ADD EXTRACT to create an Extract group. Unless a SOURCEISTABLE task\nor\
    \ an alias Extract is specified, ADD EXTRACT creates checkpoints so\nthat processing\
    \ continuity is maintained from run to run. Review the\nOracle GoldenGate Windows\
    \ and UNIX Administrator s Guide before\ncreating an Extract group.\n```\n\n##\
    \ INFO\n\n`INFO`命令提供当前Oracle GoldenGate配置的状态信息。一些示例如下。\n\n`INFO ALL`显示GoldenGate处理的完整概览：\n\
    \n```text\nGGSCI (oracledba) 11> info all allprocesses\n\nProgram     Status \
    \     Group       Lag         Time Since Chkpt\n\nMANAGER     RUNNING\nEXTRACT\
    \     STOPPED     EATAA       00:00:00    1435:43:49\n\nGGSCI (oracledba) 12>\
    \ info all\n\nProgram     Status      Group       Lag         Time Since Chkpt\n\
    \nMANAGER     RUNNING\nEXTRACT     STOPPED     EATAA       00:00:00     1435:43:52\n\
    ```\n\n`INFO EXTRACT {extract process group name}`显示Extract的状态报告，如下例所示：\n\n```text\n\
    GGSCI (oracledba) 15> info extract eataa\n\nEXTRACT    EATAA     Initialized \
    \  2011-03-15 21:50   Status STOPPED\nCheckpoint Lag       00:00:00 (updated 1435:45:44\
    \ ago)\nLog Read Checkpoint  Oracle Redo Logs\n                     2011-03-15\
    \ 21:50:47  Seqno 0, RBA 0\n```\n\n您也可以使用`*`通配符来显示所有Extract：\n\n```text\nGGSCI\
    \ (oracledba) 14> info extract *\n\nEXTRACT    EATAA     Initialized   2011-03-15\
    \ 21:50   Status STOPPED\nCheckpoint Lag       00:00:00 (updated 1435:45:09 ago)\n\
    Log Read Checkpoint  Oracle Redo Logs\n                     2011-03-15 21:50:47\
    \  Seqno 0, RBA 0\n```\n\n要查看本地和远程跟踪文件的状态和详细信息，您可以输入`INFO EXTTRAIL *`命令：\n\n```text\n\
    GGSCI (oracledba) 16> info exttrail *\n\n       Extract Trail: AA\n          \
    \   Extract: EATAA\n               Seqno: 0\n                 RBA: 0\n       \
    \    File Size: 10M\n```\n\n## SEND\n\nGGSCI命令`SEND`用于更新消息传递工具以刷新状态报告实用程序。此外，您可以使用它向Oracle\
    \ GoldenGate处理组发送处理指令——例如，指示Extract或Replicat执行特定任务。\n\n示例：\n\n```bash\nGGSCI (oracledba)\
    \ 37> send mgr, getlag\n```\n\n## STATUS\n\n`STATUS`命令允许您检查当前Oracle GoldenGate环境中处理组（如Replicat和Manager）的当前状态。\n\
    \n示例：\n\n```bash\nGGSCI (oracledba) 40> status mgr\n```\n\n```text\nManager is\
    \ running (IP port oracledba.50001).\n```\n\n您可以在Oracle GoldenGate文档中在线提供的参考指南中找到完整的命令列表。\n\
    \n### 用于故障排除的Logdump命令和语法\n\nOracle GoldenGate Logdump实用程序是分析和故障排除的瑞士军刀。您应该理解并学会使用它，因为它是您工具库中的一个强大工具。通过使用Logdump，您可以查看跟踪文件中存在的事务数据，识别丢失的事务，并复制问题（例如重复和丢失的数据事务）。让我们看看一些与Logdump一起使用的常见技术和命令。\n\
    \n#### 访问Logdump实用程序\n\nLogdump是一个操作系统实用程序，可从GGSCI界面外部访问。要启动新的Logdump会话，请导航到Oracle\
    \ GoldenGate基本安装目录，并键入命令`logdump`，如下所示：\n\n```bash\nC:\\ggs\\mssqlserver>logdump\n\
    ```\n\n```text\nOracle GoldenGate Log File Dump Utility\nVersion 11.1.1.0.0 Build\
    \ 078\n\nCopyright (C) 1995, 2010, Oracle and/or its affiliates. All rights reserved.\n\
    \nLogdump 8 >\n```\n\n默认情况下，Logdump本身不执行任何操作。它会打开一个唯一的提示会话，等待您的命令来执行任务。\n\n####\
    \ 获取Logdump语法帮助\n\nLogdump包含数十个命令，对新的甚至有经验的Oracle GoldenGate管理员都构成挑战。要获取其神秘语法的帮助，您可以输入help命令，如下所示：\n\
    \n```text\nLogdump 7 >help\n```"
  raw: '#### ADD


    Syntax: `ADD EXTRACT|REPLICAT`


    The `ADD` command performed in the GoldenGate Software Command Interface (GGSCI)
    is the method for adding new configurations to Oracle GoldenGate. You can use
    it to add new Extract, Replicat, or data-pump groups as well as to add local or
    remote trail files on the source or target system for an Oracle GoldenGate configuration.


    Examples:


    `ADD EXTRACT extora, RMTHOST prod, MGRPORT 7800, RMTNAME prodfin`

    `ADD REPLICAT repora, EXTTRAIL d:\ggs\dirdat\rt`


    #### GGSCI


    `GGSCI` is the command to enter the command-line interface used to perform most
    administrative tasks for Oracle GoldenGate. In the simplest form, you open a shell
    prompt and type `GGSCI` from the Oracle GoldenGate base installation directory.
    You can also set the `path` variable for Windows or UNIX/Linux as a direct link
    or alias to simplify use of the `GGSCI` command.


    Example:


    `C:\ggs\mssqlserver>ggsci`


    `Oracle GoldenGate Command Interpreter for ODBC`

    `Version 11.1.1.0.0 Build 078`

    `Windows (optimized), Microsoft SQL Server on Jul 28 2010 18:55:52`


    `Copyright (C) 1995, 2010, Oracle and/or its affiliates. All rights reserved.`


    #### HELP


    The `HELP` command provides syntax assistance to look up the parameters and details
    for a specific Oracle GoldenGate command. In its most basic form, after logging
    into the GGSCI interface, type the `HELP` command from a GGSCI command shell prompt
    as shown in the following example:


    `GGSCI (oracledba) 1> help`


    `GGSCI Command Summary:`


    `Object:           Command:`

    `SUBDIRS           CREATE`

    `ER                INFO, KILL, LAG, SEND, STATUS, START, STATS, STOP`

    `EXTRACT           ADD, ALTER, CLEANUP, DELETE, INFO, KILL,`

    `                  LAG, SEND, START, STATS, STATUS, STOP`

    `EXTTRAIL          ADD, ALTER, DELETE, INFO`

    `GGSEVT            VIEW`

    `MANAGER           INFO, SEND, START, STOP, STATUS`

    `MARKER            INFO`

    `PARAMS            EDIT, VIEW`

    `REPLICAT          ADD, ALTER, CLEANUP, DELETE, INFO, KILL, LAG, SEND,`

    `                  START, STATS, STATUS, STOP`

    `REPORT            VIEW`

    `RMTTRAIL          ADD, ALTER, DELETE, INFO`

    `TRACETABLE        ADD, DELETE, INFO`

    `TRANDATA          ADD, DELETE, INFO`

    `CHECKPOINTTABLE   ADD, DELETE, CLEANUP, INFO`


    `Commands without an object:`

    `(Database)       DBLOGIN, LIST TABLES, ENCRYPT PASSWORD`

    `(DDL)            DUMPDDL`

    `(Miscellaneous)  FC, HELP, HISTORY, INFO ALL, OBEY, SET EDITOR, SHELL,`

    `                 SHOW, VERSIONS, ! (note: you must type the word`

    `                 COMMAND after the ! to display the ! help topic.)`

    `                 i.e.: GGSCI (sys1)> help ! command`

    `For help on a specific command, type HELP <command> <object>.`


    Example: `HELP ADD REPLICAT`


    In the following example, you need to find the syntax and description for the
    ADD `EXTRACT` command:


    `GGSCI (oracledba) 2> help add extract`


    `ADD EXTRACT`


    `Use ADD EXTRACT to create an Extract group. Unless a SOURCEISTABLE task`

    `or an alias Extract is specified, ADD EXTRACT creates checkpoints so`

    `that processing continuity is maintained from run to run. Review the`

    `Oracle GoldenGate Windows and UNIX Administrator s Guide before`

    `creating an Extract group.`


    #### INFO


    The `INFO` command provides status information for the current Oracle GoldenGate
    configuration. Some examples follow.


    `INFO ALL` shows a complete overview of GoldenGate processing:


    `GGSCI (oracledba) 11> info all allprocesses`


    `Program     Status      Group       Lag         Time Since Chkpt`


    `MANAGER     RUNNING`

    `EXTRACT     STOPPED     EATAA       00:00:00    1435:43:49`


    `GGSCI (oracledba) 12> info all`


    `Program     Status      Group       Lag         Time Since Chkpt`


    `MANAGER     RUNNING`

    `EXTRACT     STOPPED     EATAA       00:00:00     1435:43:52`


    `INFO EXTRACT {extract process group name}` displays a status report for Extracts,
    as shown in the following example:


    `GGSCI (oracledba) 15> info extract eataa`


    `EXTRACT    EATAA     Initialized   2011-03-15 21:50   Status STOPPED`

    `Checkpoint Lag       00:00:00 (updated 1435:45:44 ago)`

    `Log Read Checkpoint  Oracle Redo Logs`

    `                     2011-03-15 21:50:47  Seqno 0, RBA 0`


    You can also use the * wildcard to show all Extracts:


    `GGSCI (oracledba) 14> info extract *`


    `EXTRACT    EATAA     Initialized   2011-03-15 21:50   Status STOPPED`

    `Checkpoint Lag       00:00:00 (updated 1435:45:09 ago)`

    `Log Read Checkpoint  Oracle Redo Logs`

    `                     2011-03-15 21:50:47  Seqno 0, RBA 0`


    To view status and details for local and remote trail files, you can enter the
    `INFO EXTTRAIL` * command:


    `GGSCI (oracledba) 16> info exttrail *`


    `       Extract Trail: AA`

    `             Extract: EATAA`

    `               Seqno: 0`

    `                 RBA: 0`

    `           File Size: 10M`


    #### SEND


    The GGSCI command `SEND` is used to update the messaging facility to refresh the
    status-reporting utilities. In addition, you can use it to send processing directives
    to an Oracle GoldenGate process group—for example, to instruct an Extract or a
    Replicat to perform a specific task.


    Example:


    `GGSCI (oracledba) 37> send mgr, getlag`


    #### STATUS


    The `STATUS` command allows you to check the current status for process groups
    such as Replicat and Manager in the current Oracle GoldenGate environment.


    Example:


    `GGSCI (oracledba) 40> status mgr`


    `Manager is running (IP port oracledba.50001).`


    You can find a complete list of commands in the Reference Guide available online
    as part of the Oracle GoldenGate documentation.


    ### Logdump Commands and Syntax for Troubleshooting


    The Oracle GoldenGate Logdump utility is the Swiss Army knife of analysis and
    troubleshooting. You should understand and learn to use it, because it''s a potent
    tool in your arsenal. By using Logdump, you can view data in transactions present
    for a trail file, identify missing transactions, and troubleshoot replication
    issues (such as duplicate and lost data transactions). Let''s look at some common
    techniques and commands to use with Logdump.


    #### Accessing the Logdump Utility


    Logdump is an operating system utility that is accessed from outside the GGSCI
    interface. To start a new Logdump session, navigate to the Oracle GoldenGate base
    installation directory, and type the command `logdump` as shown here:


    `C:\ggs\mssqlserver>logdump`


    `Oracle GoldenGate Log File Dump Utility`

    `Version 11.1.1.0.0 Build 078`


    `Copyright (C) 1995, 2010, Oracle and/or its affiliates. All rights reserved.`


    `Logdump 8 >`


    By default, Logdump doesn''t execute anything in and of itself. It opens a unique
    prompt session that waits for your commands to perform tasks.


    #### Getting Help with Logdump Syntax


    Logdump contains dozens of commands that present a challenge to new and even experienced
    Oracle GoldenGate administrators. To obtain help with its cryptic syntax, you
    can enter the help command as shown here:


    `Logdump 7 >help`'
