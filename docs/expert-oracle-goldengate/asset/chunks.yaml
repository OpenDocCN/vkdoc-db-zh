- fmt: '#### Capture (Local Extract) Process


    Capture 是提取从源数据库插入、更新或删除的数据的过程。在 GoldenGate 中，此捕获过程称为 Extract。在这种情况下，Extract 被称为
    **Local Extract**（有时也称为 **Primary Extract**），因为它从本地源数据库捕获数据更改。有几种类型的 Extract。另一种将在后面讨论的
    Extract 类型是数据泵 Extract，它将 Local Extract 的更改传递到目标服务器。你还可以拥有一个初始加载 Extract 来捕获数据库记录，以执行目标数据库的初始加载。你将在[第
    4 章](#Chapter04.html#ch4)“基本复制”中看到初始加载 Extract 的示例。


    Extract 是一个在源服务器上运行的操作系统进程，它从数据库事务日志中捕获更改。例如，在 Oracle 数据库中，Extract 从重做日志（在某些异常情况下，从归档重做日志）捕获更改，并将数据写入一个名为
    **Trail File** 的文件。对于 Microsoft SQL Server，Extract 从事务日志捕获更改。为了减少处理量，Extract 只捕获已提交的更改，并过滤掉其他活动，如回滚的更改。Extract
    也可以配置为将 Trail File 直接写入远程目标服务器，但这通常不是最佳配置。


    除了数据库数据操作语言（DML）数据外，如果配置得当，你还可以使用 Extract 捕获数据定义语言（DDL）更改和序列。你可以使用 Extract 来捕获数据以初始加载目标表，但这通常是使用
    DBMS 实用工具（如 Oracle 的 export/import 或 Data Pump）完成的。


    你可以根据需求将 Extract 配置为单个进程或多个并行进程。每个 Extract 进程可以独立地作用于不同的表。例如，单个 Extract 可以捕获模式中所有表的更改，或者你可以创建多个
    Extract 并将表分配给它们。在某些情况下，你可能需要创建多个并行 Extract 进程以提高性能，尽管这通常不是必需的。你可以独立地停止和启动每个 Extract
    进程。


    你可以设置 Extract 使用通配符捕获整个模式、单个表或表的部分行或列。此外，你可以使用 Extract 转换和过滤捕获的数据，仅提取符合特定条件的数据。例如，你可能希望过滤
    Customer 表，仅在客户姓名等于“Jones”时提取客户数据。


    你可以指示 Extract 将任何无法处理的记录写入一个丢弃文件，以便后续解决问题。并且你可以自动生成报告以显示 Extract 配置。你可以将它们设置为按用户定义的时间间隔定期更新，包含最新的
    Extract 处理统计信息。


    #### Source Trail


    Extract 进程按顺序将发生的已提交事务写入一个暂存文件，GoldenGate 称之为 **source trail**。数据以大块写入以实现高性能。写入
    trail 的数据会被排队，以便分发到目标服务器或另一个目的地，由另一个 GoldenGate 进程（如数据泵）处理。trail 文件中的数据也可以由 Extract
    加密，然后由数据泵或投递进程解密。


    你可以根据预期的数据量来设置 trail 文件的大小。当达到指定大小时，将创建一个新的 trail 文件。为了释放磁盘空间，你可以配置 GoldenGate
    根据文件年龄或 trail 文件总数自动清除 trail 文件。


    默认情况下，trail 文件中的数据以平台无关的 GoldenGate 专有格式存储。除了数据库数据，每个 trail 文件还包含一个文件头，每条记录也包含自己的头。每个
    GoldenGate 进程都使用检查点来跟踪其在 trail 文件中的位置，这些检查点存储在单独的文件中。


    ![images](images/square.jpg) **Note** GoldenGate 使用一个提交序列号（CSN）来标识和跟踪 GoldenGate
    处理的事务，并确保数据完整性。CSN 是 GoldenGate 平台无关的表示，对应于每个 DBMS 用来跟踪其已处理事务的唯一序列号。例如，在 Oracle
    数据库中，GoldenGate 使用 Oracle 系统更改号（SCN）来表示 CSN。对于 SQL Server 数据库，GoldenGate 使用虚拟日志文件号、虚拟日志内的段号和条目号的串联。Extract
    将 CSN 写入检查点和 trail 文件，你可以使用 **Logdump** 实用程序查看它们。你可以在启动 **Replicat** 时使用 CSN 从特定
    CSN 或之后开始处理。


    如果需要，你可以使用 GoldenGate **Logdump** 实用程序详细检查 trail 文件。这对于调试目的有时是必要的。你还可以使用 Logdump
    过滤记录并保存 trail 文件的子集以进行特殊处理。你将在[第 11 章](#Chapter11.html#ch11)“故障排除”中了解有关 **Logdump**
    实用程序的更多信息。'
  raw: '#### Capture (Local Extract) Process


    *Capture* is the process of extracting data that is inserted into, updated on,
    or deleted from the source database. In GoldenGate, the capture process is called
    the *Extract*. In this case, the Extract is called a *Local Extract* (sometimes
    called the *Primary Extract*) because it captures data changes from the local
    source database. There are several types of extracts. Another type of Extract
    that''s discussed later is the data-pump Extract, which passes the Local Extract
    changes to the target server. You can also have an initial-load Extract to capture
    database records to perform an initial load of the target database. You see an
    example of the initial-load Extract in [Chapter 4](#Chapter04.html#ch4), “Basic
    Replication.”


    Extract is an operating-system process that runs on the source server and captures
    changes from the database transaction logs. For example, in an Oracle database,
    Extract captures changes from the redo logs (and in some exceptional cases, the
    archived redo logs) and writes the data to a file called the *Trail File*. For
    Microsoft SQL Server, Extract captures changes from the transaction log. To reduce
    the amount of processing, Extract only captures committed changes and filters
    out other activity such as rolled-back changes. Extract can also be configured
    to write the Trail File directly to a remote target server, but this usually isn''t
    the optimum configuration.


    In addition to database data manipulation language (DML) data, you can also capture
    data definition language (DDL) changes and sequences using Extract if properly
    configured. You can use Extract to capture data to initially load the target tables,
    but this is typically done using DBMS utilities such as export/import or Data
    Pump for Oracle.


    You can configure Extract as a single process or multiple parallel processes depending
    on your requirements. Each Extract process can act independently on different
    tables. For example, a single Extract can capture all the changes for of the tables
    in a schema, or you can create multiple Extracts and divide the tables among the
    Extracts. In some cases, you may need to create multiple parallel Extract processes
    to improve performance, although this usually isn''t necessary. You can stop and
    start each Extract process independently.


    You can set up Extract to capture an entire schema using wildcarding, a single
    table, or a subset of rows or columns for a table. In addition, you can transform
    and filter captured data using the Extract to only extract data meeting certain
    criteria. For example, you may want to filter a Customer table to only extract
    customer data if the customer''s name is equal to “Jones”.


    You can instruct Extract to write any records that it''s unable to process to
    a discard file for later problem resolution. And you can generate reports automatically
    to show the Extract configuration. You can set these up to be updated periodically
    at user-defined intervals with the latest Extract processing statistics.


    #### Source Trail


    The Extract process sequentially writes committed transactions as they occur to
    a staging file that GoldenGate calls a *source trail*. Data is written in large
    blocks for high performance. Data that is written to the trail is queued for distribution
    to the target server or another destination to be processed by another GoldenGate
    process, such as a data pump. Data in the trail files can also be encrypted by
    the Extract and then unencrypted by the data pump or delivery process.


    You can size the trail files based on the expected data volume. When the specified
    size is reached, a new trail file is created. To free up disk space, you can configure
    GoldenGate to automatically purge trail files based on age or the total number
    of trail files.


    By default, data in the trail files is stored in a platform-independent, GoldenGate
    proprietary format. In addition to the database data, each trail file contains
    a file header, and each record also contains its own header. Each of the GoldenGate
    processes keeps track of its position in the trail files using checkpoints, which
    are stored in separate files.


    ![images](images/square.jpg) **Note** GoldenGate uses a Commit Sequence Number
    (CSN) to identify and keep track of transactions processed by GoldenGate and to
    ensure data integrity. The CSN is a GoldenGate platform-independent representation
    of unique serial numbers that each DBMS uses to track the transactions it has
    processed. For example, in an Oracle database, GoldenGate uses the Oracle System
    Change Number (SCN) to represent the CSN. For a SQL Server database, GoldenGate
    uses a concatenation of the virtual log-file number, a segment number within the
    virtual log, and the entry number. Extract writes the CSNs to the checkpoint and
    trail files that you can view using the Logdump utility. You can use the CSN when
    starting the Replicat to begin processing at or after a specific CSN.


    If needed, you can examine the trail files in detail using the GoldenGate Logdump
    utility. This is sometimes necessary for debugging purposes. You can also use
    Logdump to filter records and save a subset of your trail file for special processing.
    You learn more about the Logdump utility in [Chapter 11](#Chapter11.html#ch11),
    “Troubleshooting.”'
  trans: '#### 捕获（本地提取）过程


    捕获是从源数据库提取插入、更新或删除数据的过程。在 GoldenGate 中，此过程称为提取（Extract）。在此上下文中，提取被称为**本地提取**（有时也称为**主提取**），因为它从本地源数据库捕获数据更改。存在几种类型的提取。另一种将在后面讨论的提取类型是数据泵提取，它将本地提取的更改传递到目标服务器。你还可以拥有一个初始加载提取来捕获数据库记录，以执行目标数据库的初始加载。你将在第
    4 章“基本复制”中看到初始加载提取的示例。


    提取是在源服务器上运行的操作系统进程，它从数据库事务日志中捕获更改。例如，在 Oracle 数据库中，提取从重做日志（在某些异常情况下，从归档重做日志）捕获更改，并将数据写入一个名为**跟踪文件**的文件。对于
    Microsoft SQL Server，提取从事务日志捕获更改。为了减少处理量，提取只捕获已提交的更改，并过滤掉其他活动，如回滚的更改。提取也可以配置为将跟踪文件直接写入远程目标服务器，但这通常不是最佳配置。


    除了数据库数据操作语言（DML）数据外，如果配置得当，你还可以使用提取捕获数据定义语言（DDL）更改和序列。你可以使用提取来捕获数据以初始加载目标表，但这通常是使用
    DBMS 实用工具（如 Oracle 的导出/导入或数据泵）完成的。


    你可以根据需求将提取配置为单个进程或多个并行进程。每个提取进程可以独立地作用于不同的表。例如，单个提取可以捕获模式中所有表的更改，或者你可以创建多个提取并将表分配给它们。在某些情况下，你可能需要创建多个并行提取进程以提高性能，尽管这通常不是必需的。你可以独立地停止和启动每个提取进程。


    你可以设置提取使用通配符捕获整个模式、单个表或表的部分行或列。此外，你可以使用提取转换和过滤捕获的数据，仅提取符合特定条件的数据。例如，你可能希望过滤 Customer
    表，仅在客户姓名等于“Jones”时提取客户数据。


    你可以指示提取将任何无法处理的记录写入一个丢弃文件，以便后续解决问题。并且你可以自动生成报告以显示提取配置。你可以将它们设置为按用户定义的时间间隔定期更新，包含最新的提取处理统计信息。


    #### 源跟踪文件


    提取进程按顺序将发生的已提交事务写入一个暂存文件，GoldenGate 称之为**源跟踪文件**。数据以大块写入以实现高性能。写入跟踪文件的数据会被排队，以便分发到目标服务器或另一个目的地，由另一个
    GoldenGate 进程（如数据泵）处理。跟踪文件中的数据也可以由提取加密，然后由数据泵或投递进程解密。


    你可以根据预期的数据量来设置跟踪文件的大小。当达到指定大小时，将创建一个新的跟踪文件。为了释放磁盘空间，你可以配置 GoldenGate 根据文件年龄或跟踪文件总数自动清除跟踪文件。


    默认情况下，跟踪文件中的数据以平台无关的 GoldenGate 专有格式存储。除了数据库数据，每个跟踪文件还包含一个文件头，每条记录也包含自己的头。每个 GoldenGate
    进程都使用检查点来跟踪其在跟踪文件中的位置，这些检查点存储在单独的文件中。


    ![images](img/square.jpg) **注意** GoldenGate 使用一个提交序列号（CSN）来标识和跟踪 GoldenGate 处理的事务，并确保数据完整性。CSN
    是 GoldenGate 平台无关的表示，对应于每个 DBMS 用来跟踪其已处理事务的唯一序列号。例如，在 Oracle 数据库中，GoldenGate 使用
    Oracle 系统更改号（SCN）来表示 CSN。对于 SQL Server 数据库，GoldenGate 使用虚拟日志文件号、虚拟日志内的段号和条目号的串联。提取将
    CSN 写入检查点和跟踪文件，你可以使用 **Logdump** 实用程序查看它们。你可以在启动 **Replicat** 时使用 CSN 从特定 CSN
    或之后开始处理。


    如果需要，你可以使用 GoldenGate **Logdump** 实用程序详细检查跟踪文件。这对于调试目的有时是必要的。你还可以使用 Logdump 过滤记录并保存跟踪文件的子集以进行特殊处理。你将在第
    11 章“故障排除”中了解有关 **Logdump** 实用程序的更多信息。'
- fmt: '#### Data Pump


    The data pump is another type of GoldenGate Extract process. The data pump reads
    the records in the source trail written by the Local Extract, *pumps* or passes
    them over the TCP/IP network to the target, and creates a target or remote trail.
    Although the data pump can be configured for data filtering and transformation
    (just like the Local Extract), in many cases the data pump reads the records in
    the source trail and simply passes all of them on as is. In GoldenGate terminology,
    this is called *passthru* mode. If data filtering or transformation is required,
    it''s a good idea to do this with the data pump to reduce the amount of data sent
    across the network.


    Although technically a data pump isn''t necessary, you should usually configure
    a data pump anyway as good practice. As mentioned earlier, you could set up the
    Local Extract to send changes directly from the source server to the remote target
    without a data pump, as shown in [Figure 3-2](#Chapter03.html#fig_3_2).


    ![images](images/0302.jpg)


    ***Figure 3-2.** GoldenGate flow without a data pump*


    As you can see from [Figure 3-2](#Chapter03.html#fig_3_2), in this configuration
    the Extract process can be directly affected by the network. Adding a data pump
    to the configuration, however, introduces a layer to insulate the Local Extract
    from any disruptions caused by the network connection to the target or a problem
    with the target itself.


    For example, if there was a network issue between the source and the target, this
    could cause the Local Extract to fail. By having a data pump, the Local Extract
    can continue to extract changes, and *only the data pump is impacted*. This way,
    when the network issue is resolved, the data pump can be restarted and will quickly
    process the previously queued changes from the source trail that the Local Extract
    has already captured.


    You can configure a single data pump or multiple data pumps, depending on the
    requirements. For example, a data pump on the source system can pump data to an
    intermediate or middle-tier system. The data on the middle tier can be further
    filtered by multiple pumps running in parallel and passed on to multiple heterogeneous
    targets. In this case, no database is required on the middle tier, only the data
    pumps. [Figure 3-3](#Chapter03.html#fig_3_3) demonstrates multiple data pumps
    running in parallel. Data Pump #1 and Data Pump #2 can pump data on to another
    pump or to one or more Replicats.


    ![images](images/0303.jpg)


    ***Figure 3-3.** GoldenGate flow with multiple data pumps*


    Just as with the Local Extract, you can write any records the data pump is unable
    to process to a discard file for problem resolution. Reports can be automatically
    generated to show the data-pump configuration and updated periodically at user-defined
    intervals with the latest processing statistics.


    #### Network


    GoldenGate sends data from the source trail using the Local or data pump Extract
    over a TCP/IP network to a remote host and writes it to the remote trail file.
    The Local or data pump Extract communicates with another operating-system background
    Extract process called the *Collector* on the target. The Collector is started
    dynamically for each Extract process on the source that requires a network connection
    to the target. The Collector listens for connections on a port configured for
    GoldenGate. Although it can be configured, often the Collector process is ignored
    because it''s started dynamically and does its job without requiring changes or
    intervention on the target.


    During transmission from the source to the target, you can compress the data to
    reduce bandwidth. In addition, you can tune the TCP/IP socket buffer sizes and
    connection timeout parameters for the best performance across the network. If
    needed, you can also encrypt the GoldenGate data sent across the network from
    the source and automatically decrypt it on the target.


    #### Collector


    The `Collector` process is started automatically by the `Manager` as needed by
    the `Extract`. The `Collector` process runs in the background on the target system
    and writes records to the remote trail. The records are sent across the TCP/IP
    network connection from the `Extract` process on the source system (either by
    a data pump or a Local Extract process).


    #### Remote Trail


    The *remote trail* is similar to the *source trail*, except it is created on the
    remote server, which could be the target database server or some other middle
    tier server. The source trails and the remote trails are stored in a filesystem
    directory named `dirdat` by default. They are named with a two-character prefix
    followed by a six-digit sequence number. The same approach for sizing for the
    source trail applies to the remote trail. You should size the trail files based
    on the expected data volume. When the specified size is reached, a new trail file
    will be created. You can also configure GoldenGate to automatically purge the
    remote trail files based on age or the total number of trail files to free up
    disk space.


    Just like the source trail, data in the remote trail files is stored in platform-independent,
    GoldenGate-proprietary format. Each remote trail file contains a file header,
    and each record also contains its own header. The GoldenGate processes keep track
    of its position in the remote trail files using *checkpoints*, which are stored
    in separate GoldenGate files or optionally in a database table.


    You can also examine the remote trail files in detail, just like the source trails,
    by using the GoldenGate `Logdump` utility. You learn more about the `Logdump`
    utility in [Chapter 11](#Chapter11.html#ch11). One thing to keep in mind is you
    should never manually edit and change the trail files using a text editor.


    #### Delivery (Replicat)


    *Delivery* is the process of applying data changes to the target database. In
    GoldenGate, delivery is done by a process called the `Replicat` using the native
    database SQL. The `Replicat` applies data changes written to the trail file by
    the `Extract` process in the same order in which they were committed on the source
    database. This is done to maintain data integrity. `if (condVar > someVal) {console.log("xxx")}`
    In addition to replicating database DML data, you can also replicate DDL changes
    and sequences using the `Replicat`, if it''s properly configured. You can configure
    a special `Replicat` to apply data to initially load the target tables, but this
    is typically done using DBMS utilities such as `Data Pump` for Oracle.


    Just like the `Extract`, you can configure `Replicat` as a single process or multiple
    parallel processes depending on the requirements. Each `Replicat` process can
    act independently on different tables. For example, a single `Replicat` can apply
    all the changes for all the tables in a schema, or you can create multiple `Replicat`s
    and the divide the tables among them. In some cases, you may need to create multiple
    `Replicat` processes to improve performance. You can stop and start each `Replicat`
    process independently.


    `Replicat` can replicate data for an entire schema using wildcarding, a single
    table, or a subset of rows or columns for a table. You can configure the `Replicat`
    to map the data from the source to the target database, transform it, and filter
    it to only replicate data meeting certain criteria. For example, `Replicat` can
    filter the Customer table to only replicate customer data where the name is equal
    to “Jones”. Typically, filtering is done by the `Extract` process and not the
    `Replicat`, for performance reasons.


    You can write any records that `Replicat` is unable to process to a discard file
    for problem resolution. Reports can be automatically generated to show the `Replicat`
    configuration; these reports can be updated periodically at user-defined intervals
    with the latest processing statistics.'
