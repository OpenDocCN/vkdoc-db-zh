    Current directory    C:\\ggs_src\nReport file          C:\\ggs_src\\dirrpt\\EXTORA.rpt\n\
    Parameter file       C:\\ggs_src\\dirprm\\EXTORA.prm\nCheckpoint file      C:\\\
    ggs_src\\dirchk\\EXTORA.cpe\nProcess file         C:\\ggs_src\\dirpcs\\EXTORA.pce\n\
    Error log            C:\\ggs_src\\ggserr.log\n```\n\n接下来，让我们看看当 Oracle GoldenGate\
    \ 进程失败且未提供报告时发生的更棘手情况。\n\n#### 无报告诊断的 Oracle GoldenGate 进程失败\n\n如果 Oracle GoldenGate\
    \ 进程在首次将报告文件写入标准屏幕输出之前就失败了，您可以从操作系统的命令 shell（而非 GGSCI）运行它，以便将进程信息发送到终端。要进行调查，您可以在操作系统级别使用语法\
    \ `<process> paramfile <path name>.prm` 来启动，其中 `<process>` 表示 Oracle GoldenGate\
    \ 的 Extract 或 Replicat 进程，`paramfile` 是 Extract 或 Replicat 参数文件的完全限定文件名。以下是一个示例：\n\
    \n```\nC:\\ggs_src>extract paramfile C:\\ggs_src\\dirprm\\extora.prm\nVersion\
    \ 6.0 (Build 6002: Service Pack 2)\nProcess id: 6056\nDescription:\n2011-03-14\
    \ 00:19:46  ERROR   OGG-00664  OCI Error beginning session (status = 10\n17-ORA-01017:\
    \ invalid username/password; logon denied).\n2011-03-14 00:19:46  ERROR   OGG-01668\
    \  PROCESS ABENDING.\n```\n\n在 UNIX 和 Linux 平台上，您需要查找位于安装 Oracle GoldenGate 软件的主目录下的核心转储文件。\n\
    \n### Oracle GoldenGate 跟踪文件问题\n\n回顾前面的章节，Oracle GoldenGate 进程组在源和目标系统上向称为 *跟踪文件*\
    \ 的特殊平面文件写入和读取数据。处理这些跟踪文件失败会中止 Oracle GoldenGate 软件的正确操作。本节介绍跟踪文件可能发生的以下问题：\n\n\
    *   跟踪文件无法清空\n*   跟踪文件无法轮转\n*   跟踪文件清除问题\n\n#### 跟踪文件无法清空\n\n有时您会遇到跟踪文件无法清空并保持充满数据的问题。您应该检查以确定有问题的跟踪文件是本地跟踪文件还是远程跟踪文件。如果是本地跟踪文件无法清空，请检查源、中间和目标系统之间的\
    \ TCP/IP 网络延迟问题。如果目标系统上的远程跟踪文件经常无法清空，请检查您的 Replicat 进程组是否可用、是否正在运行以及是否正在处理来自远程跟踪文件的数据。\n\
    \n如果 Replicat 进程运行正常且没有错误，原因可能是目标系统上 Replicat 正在处理的大型事务。在这种情况下，您可以拆分表并对其进行分区，将大型事务分解到多个跟踪文件中，并使用额外的\
    \ Replicat 进程组并行处理事务。为此，请在 Replicat 的 `MAP` 语句中使用 Oracle GoldenGate `Replicat`\
    \ 参数 `FILTER` 选项和 `@RANGE` 函数。"
- fmt: "#### Trail Files that Don’t Roll Over\n\nAnother issue that plagues Oracle\
    \ GoldenGate trail-file operations occurs when a trail file fails to roll over\
    \ to a new trail file after it fills up completely. One thing to check here is\
    \ the maximum file size for the trail file in question. You can check this using\
    \ Oracle GoldenGate GGSCI command `INFO EXTTRAIL *` or `INFO RMTTRAIL *` as shown\
    \ in the following example:\n\n```\nGGSCI (oracledba) 1> info exttrail *\n   \
    \    Extract Trail: AA\n             Extract: EXTORA\n               Seqno: 0\n\
    \                 RBA: 0\n           File Size: 10M\n```\n\nYou can locate this\
    \ information by examining the `File Size` field. To change the trail-file size\
    \ with Oracle GoldenGate, issue the Oracle GoldenGate GGSCI command `ALTER EXTTRAIL`\
    \ or `ALTER RMTTRAIL` with the `MEGABYTES` option, as shown here:\n\n```\nGGSCI\
    \ (oracledba) 3> alter exttrail aa megabytes 20, extract extora\nEXTTRAIL altered.\n\
    GGSCI (oracledba) 4> info exttrail *\n       Extract Trail: AA\n             Extract:\
    \ EXTORA\n               Seqno: 0\n                 RBA: 0\n           File Size:\
    \ 20M\n```\n\n#### Trail File Purging Issues\n\nTrail files sometimes aren’t purged\
    \ correctly, thus causing errors during processing of data between the source\
    \ and target database environments. Probably the most common source of failed\
    \ purging operations with trail files occurs due to failure to use `PURGEOLDEXTRACTS`\
    \ to manage the trail files in use by Oracle GoldenGate. You should add this parameter\
    \ to the Manager parameter file to prevent old trail files from accumulating too\
    \ fast and thus causing problems with your Oracle GoldenGate configuration. Keep\
    \ in mind that you must grant the Oracle GoldenGate Manager user account the correct\
    \ level of access permissions to read from and write to the trail files and file\
    \ systems when using this.\n\nAnother cause of trail-file purging issues is an\
    \ obsolete Replicat group that may still be referencing the old trail file. Oracle\
    \ GoldenGate trail files aren’t purged if other processes still read them. If\
    \ an old Replicat group is referencing a trail file, you use the `DELETE REPLICAT`\
    \ command from GGSCI to delete the obsolete Replicat process group so that the\
    \ checkpoint records are deleted, thereby allowing the Manager process to purge\
    \ the trail files. Keep in mind that if a checkpoint table is still used for the\
    \ Replicat group, you need to log into the target database with the `DBLOGIN`\
    \ command before removing the checkpoint from the table and Replicat deletion.\
    \ You can use the following syntax to perform this task:\n\n```\nDBLOGIN USERID\
    \ <user>, PASSWORD <pw>\nDELETE REPLICAT <group>\n```\n\n#### Trail Files that\
    \ Purge Too Soon\n\nAnother painful situation with trail files occurs when the\
    \ trail files are purged too soon. This causes errors due to missing data between\
    \ the source and target systems. One root cause to check for to solve this problem\
    \ is multiple Replicats and data pumps reading from the same trail file.\n\nAlso\
    \ check to see if you’re using the `PURGEOLDEXTRACTS` parameter details. The key\
    \ thing is to realize that you should only use this parameter as a Manager parameter—you\
    \ shouldn’t use `PURGEOLDEXTRACTS` as an Extract or Replicat parameter. When you\
    \ use `PURGEOLDEXTRACTS` as a Manager parameter, you can use the option `USECHECKPOINTS`\
    \ to defer purging of the trail file until all of the Oracle GoldenGate processes\
    \ have finished processing data for the trail file. In addition, you can use the\
    \ `MIN` option to store the trail file for a set period of time. Whenever you\
    \ use the `MIN` option, you must also set the `MAX` option for `PURGEOLDEXTRACTS`\
    \ to denote the maximum amount of time to keep the trail file.\n\n### Oracle GoldenGate\
    \ Error Log Analysis\n\nFortunately, Oracle GoldenGate is a well instrumented\
    \ software product that provides a superb error log file that contains details\
    \ for all aspects of replication operations on both source and target systems.\
    \ If an error occurs during GoldenGate processing, it’s imperative that you review\
    \ the Oracle GoldenGate error logs located under the source and target base installation\
    \ directories. On Linux and UNIX systems, you can use the `tail` command to examine\
    \ the last few error messages contained in the error log file for Oracle GoldenGate.\n\
    \nLet’s look at the error log file for the Oracle 11g GoldenGate and Oracle 11g\
    \ Windows source system. The file is called `ggserr.log`; you can open it with\
    \ a text editor such as vi or Emacs on Linux and UNIX or Notepad on Windows platforms.\
    \ In addition, you can view the error log file with the GGSCI command `VIEW GGSEVT`\
    \ as shown here:\n\n```\nOracle:  PROCESS ABENDING.\n2011-03-14 00:19:46  INFO\
    \    OGG-00992  Oracle GoldenGate Capture for Oracle, extora.prm:  EXTRACT starting.\n\
    2011-03-14 00:19:46  INFO    OGG-01017  Oracle GoldenGate Capture for Oracle,\
    \ extora.prm:  Wildcard resolution set to IMMEDIATE because SOURCEISTABLE is used.\n\
    2011-03-14 00:19:46  ERROR   OGG-00664  Oracle GoldenGate Capture for Oracle,\
    \ extora.prm:  OCI Error beginning session (status = 1017-ORA-01017: invalid username/password;\
    \ logon denied).\n2011-03-14 00:19:46  ERROR   OGG-01668  Oracle GoldenGate Capture\
    \ for Oracle, extora.prm:  PROCESS ABENDING.\n```\n\n### Understanding the Oracle\
    \ GoldenGate Discard File\n\nRecall from earlier chapters that Oracle GoldenGate\
    \ creates a discard file whenever the `DISCARDFILE` parameter is used by either\
    \ the Extract or Replicat. If there is a problem during processing of data from\
    \ the source or target environments by either the Replicat or Extract, then the\
    \ rejected records are dumped into the discard file. You should review the contents\
    \ of the discard file on both the source and target database environments on a\
    \ regular basis as part of your due diligence to catch data issues encountered\
    \ by Oracle GoldenGate.\n\nThe discard file contains all column-level details\
    \ for database operations that Oracle GoldenGate processes couldn’t process successfully.\
    \ Each discard file contains the following useful details:\n\n*   Database error\
    \ message for the process, such as `ORA-00100` for “No Data Found” with Oracle\
    \ 11g\n*   The trail file sequence number for record(s) that the Extract or Replicat\
    \ attempted to be processed\n*   The relative byte address of the record in the\
    \ trail file\n*   Details of the discarded record that the Extract or Replicat\
    \ attempted to process\n\nTypically, a discard file is used by the Replicat to\
    \ log operations that couldn’t be reconstructed or applied, but you may find one\
    \ useful for the Extract as well. Check the discard error for messages such as\
    \ `ORA-1403` or duplicate and/or rejected records. Here is a sample Oracle GoldenGate\
    \ discard file:\n\n```\nORA-20017:  repora 724935\nORA-06512: at \"HR.REPORAINSERT\"\
    , line 41\nORA-04088: error during execution of trigger 'HR.REPORA_INSERT'\nOperation\
    \ failed at seqno 15 rba 28483311\nProblem replicating HR.EMP to HR.TRGTREP\n\
    Error occurred with insert record (target format)...\n*\nA_TIMESTAMP = 2011-03-09\
    \ 11:28:11\nOK = 1.0000\nNOTOK = -1.0000\n```\n\nDiscard records provide useful\
    \ clues for issues that occur during processing so you can identify and solve\
    \ the root cause quickly."
  raw: '#### Trail Files that Don’t Roll Over


    Another issue that plagues Oracle GoldenGate trail-file operations occurs when
    a trail file fails to roll over to a new trail file after it fills up completely.
    One thing to check here is the maximum file size for the trail file in question.
    You can check this using Oracle GoldenGate GGSCI command `INFO EXTTRAIL *` or
    `INFO RMTTRAIL *` as shown in the following example:


    `GGSCI (oracledba) 1> info exttrail *`

    `       Extract Trail: AA`

    `             Extract: EXTORA`

    `               Seqno: 0`

    `                 RBA: 0`

    `           File Size: 10M`


    You can locate this information by examining the File Size field. To change the
    trail-file size with Oracle GoldenGate, issue the Oracle GoldenGate GGSCI command
    `ALTER EXTTRAIL` or `ALTER RMTTRAIL` with the `MEGABYTES` option, as shown here:


    `GGSCI (oracledba) 3> alter exttrail aa megabytes 20, extract extora`

    `EXTTRAIL altered.`

    `GGSCI (oracledba) 4> info exttrail *`

    `       Extract Trail: AA`

    `             Extract: EXTORA`

    `               Seqno: 0`

    `                 RBA: 0`

    `           File Size: 20M`


    #### Trail File Purging Issues


    Trail files sometimes aren’t purged correctly, thus causing errors during processing
    of data between the source and target database environments. Probably the most
    common source of failed purging operations with trail files occurs due to failure
    to use `PURGEOLDEXTRACTS` to manage the trail files in use by Oracle GoldenGate.
    You should add this parameter to the Manager parameter file to prevent old trail
    files from accumulating too fast and thus causing problems with your Oracle GoldenGate
    configuration. Keep in mind that you must grant the Oracle GoldenGate Manager
    user account the correct level of access permissions to read from and write to
    the trail files and file systems when using this.


    Another cause of trail-file purging issues is an obsolete Replicat group that
    may still be referencing the old trail file. Oracle GoldenGate trail files aren’t
    purged if other processes still read them. If an old Replicat group is referencing
    a trail file, you use the `DELETE REPLICAT` command from GGSCI to delete the obsolete
    Replicat process group so that the checkpoint records are deleted, thereby allowing
    the Manager process to purge the trail files. Keep in mind that if a checkpoint
    table is still used for the Replicat group, you need to log into the target database
    with the `DBLOGIN` command before removing the checkpoint from the table and Replicat
    deletion. You can use the following syntax to perform this task:


    `DBLOGIN USERID <user>, PASSWORD <pw>`

    `DELETE REPLICAT <group>`


    #### Trail Files that Purge Too Soon


    Another painful situation with trail files occurs when the trail files are purged
    too soon. This causes errors due to missing data between the source and target
    systems. One root cause to check for to solve this problem is multiple Replicats
    and data pumps reading from the same trail file.


    Also check to see if you’re using the `PURGEOLDEXTRACTS` parameter details. The
    key thing is to realize that you should only use this parameter as a Manager parameter—you
    shouldn’t use `PURGEOLDEXTRACTS` as an Extract or Replicat parameter. When you
    use `PURGEOLDEXTRACTS` as a Manager parameter, you can use the option `USECHECKPOINTS`
    to defer purging of the trail file until all of the Oracle GoldenGate processes
    have finished processing data for the trail file. In addition, you can use the
    `MIN` option to store the trail file for a set period of time. Whenever you use
    the `MIN` option, you must also set the `MAX` option for `PURGEOLDEXTRACTS` to
    denote the maximum amount of time to keep the trail file.


    ### Oracle GoldenGate Error Log Analysis


    Fortunately, Oracle GoldenGate is a well instrumented software product that provides
    a superb error log file that contains details for all aspects of replication operations
    on both source and target systems. If an error occurs during GoldenGate processing,
    it’s imperative that you review the Oracle GoldenGate error logs located under
    the source and target base installation directories. On Linux and UNIX systems,
    you can use the `tail` command to examine the last few error messages contained
    in the error log file for Oracle GoldenGate.


    Let’s look at the error log file for the Oracle 11g GoldenGate and Oracle 11g
    Windows source system. The file is called `ggserr.log`; you can open it with a
    text editor such as vi or Emacs on Linux and UNIX or Notepad on Windows platforms.
    In addition, you can view the error log file with the GGSCI command `VIEW GGSEVT`
    as shown here:


    `Oracle:  PROCESS ABENDING.`

    `2011-03-14 00:19:46  INFO    OGG-00992  Oracle GoldenGate Capture for Oracle,
    extora.prm:  EXTRACT starting.`

    `2011-03-14 00:19:46  INFO    OGG-01017  Oracle GoldenGate Capture for Oracle,
    extora.prm:  Wildcard resolution set to IMMEDIATE because SOURCEISTABLE is used.`

    `2011-03-14 00:19:46  ERROR   OGG-00664  Oracle GoldenGate Capture for Oracle,
    extora.prm:  OCI Error beginning session (status = 1017-ORA-01017: invalid username/password;
    logon denied).`

    `2011-03-14 00:19:46  ERROR   OGG-01668  Oracle GoldenGate Capture for Oracle,
    extora.prm:  PROCESS ABENDING.`


    ### Understanding the Oracle GoldenGate Discard File


    Recall from earlier chapters that Oracle GoldenGate creates a discard file whenever
    the `DISCARDFILE` parameter is used by either the Extract or Replicat. If there
    is a problem during processing of data from the source or target environments
    by either the Replicat or Extract, then the rejected records are dumped into the
    discard file. You should review the contents of the discard file on both the source
    and target database environments on a regular basis as part of your due diligence
    to catch data issues encountered by Oracle GoldenGate.


    The discard file contains all column-level details for database operations that
    Oracle GoldenGate processes couldn’t process successfully. Each discard file contains
    the following useful details:


    *   Database error message for the process, such as `ORA-00100` for “No Data Found”
    with Oracle 11g

    *   The trail file sequence number for record(s) that the Extract or Replicat
    attempted to be processed

    *   The relative byte address of the record in the trail file

    *   Details of the discarded record that the Extract or Replicat attempted to
    process


    Typically, a discard file is used by the Replicat to log operations that couldn’t
    be reconstructed or applied, but you may find one useful for the Extract as well.
    Check the discard error for messages such as `ORA-1403` or duplicate and/or rejected
    records. Here is a sample Oracle GoldenGate discard file:


    `ORA-20017:  repora 724935`

    `ORA-06512: at "HR.REPORAINSERT", line 41`

    `ORA-04088: error during execution of trigger ''HR.REPORA_INSERT''`

    `Operation failed at seqno 15 rba 28483311`

    `Problem replicating HR.EMP to HR.TRGTREP`

    `Error occurred with insert record (target format)...`

    `*`

    `A_TIMESTAMP = 2011-03-09 11:28:11`

    `OK = 1.0000`

    `NOTOK = -1.0000`


    Discard records provide useful clues for issues that occur during processing so
    you can identify and solve the root cause quickly.'
  trans: "\n#### 不回滚的跟踪文件\n\n困扰 Oracle GoldenGate 跟踪文件操作的另一个问题是，当跟踪文件完全填满后，未能回滚（滚动）到一个新的跟踪文件。此处需要检查的一个事项是相关跟踪文件的最大文件大小。您可以使用\
    \ Oracle GoldenGate GGSCI 命令 `INFO EXTTRAIL *` 或 `INFO RMTTRAIL *` 来检查，如下例所示：\n\
    \n```\nGGSCI (oracledba) 1> info exttrail *\n       Extract Trail: AA\n      \
    \       Extract: EXTORA\n               Seqno: 0\n                 RBA: 0\n  \
    \         File Size: 10M\n```\n\n您可以通过检查 `File Size` 字段来定位此信息。要使用 Oracle GoldenGate\
    \ 更改跟踪文件大小，请发出带有 `MEGABYTES` 选项的 Oracle GoldenGate GGSCI 命令 `ALTER EXTTRAIL` 或\
    \ `ALTER RMTTRAIL`，如下所示：\n\n```\nGGSCI (oracledba) 3> alter exttrail aa megabytes\
    \ 20, extract extora\nEXTTRAIL altered.\nGGSCI (oracledba) 4> info exttrail *\n\
    \       Extract Trail: AA\n             Extract: EXTORA\n               Seqno:\
    \ 0\n                 RBA: 0\n           File Size: 20M\n```\n\n#### 跟踪文件清理问题\n\
    \n跟踪文件有时未能正确清理，从而导致在源和目标数据库环境之间处理数据时出错。跟踪文件清理操作失败最常见的原因，可能是未能使用 `PURGEOLDEXTRACTS`\
    \ 来管理 Oracle GoldenGate 正在使用的跟踪文件。您应将此参数添加到 Manager 参数文件中，以防止旧跟踪文件积累过快，从而导致 Oracle\
    \ GoldenGate 配置出现问题。请记住，使用此功能时，必须授予 Oracle GoldenGate Manager 用户帐户正确级别的访问权限，以读取和写入跟踪文件及文件系统。\n\
    \n跟踪文件清理问题的另一个原因可能是过时的 Replicat 组仍在引用旧的跟踪文件。如果其他进程仍在读取 Oracle GoldenGate 跟踪文件，则这些文件不会被清理。如果一个旧的\
    \ Replicat 组正在引用某个跟踪文件，您可以使用 GGSCI 中的 `DELETE REPLICAT` 命令来删除过时的 Replicat 进程组，从而删除检查点记录，使\
    \ Manager 进程能够清理跟踪文件。请记住，如果 Replicat 组仍在使用检查点表，则需要在删除表中的检查点和 Replicat 之前，使用 `DBLOGIN`\
    \ 命令登录到目标数据库。您可以使用以下语法执行此任务：\n\n```\nDBLOGIN USERID <user>, PASSWORD <pw>\nDELETE\
    \ REPLICAT <group>\n```\n\n#### 过早清理的跟踪文件\n\n跟踪文件的另一个棘手情况是文件被过早清理。这会导致由于源系统和目标系统之间数据缺失而引发错误。解决此问题需要检查的一个根本原因是多个\
    \ Replicat 和数据泵从同一个跟踪文件读取。\n\n同时，请检查您是否正确使用了 `PURGEOLDEXTRACTS` 参数的细节。关键是要认识到，您应该仅将此参数用作\
    \ Manager 参数——不应将 `PURGEOLDEXTRACTS` 用作 Extract 或 Replicat 参数。当您将 `PURGEOLDEXTRACTS`\
    \ 用作 Manager 参数时，可以使用 `USECHECKPOINTS` 选项来延迟清理跟踪文件，直到所有 Oracle GoldenGate 进程都完成对该跟踪文件的数据处理。此外，您可以使用\
    \ `MIN` 选项来将跟踪文件存储一段设定的时间。每当使用 `MIN` 选项时，还必须为 `PURGEOLDEXTRACTS` 设置 `MAX` 选项，以表示保留跟踪文件的最长时间。\n\
    \n### Oracle GoldenGate 错误日志分析\n\n幸运的是，Oracle GoldenGate 是一个监控完善的软件产品，它提供了一个出色的错误日志文件，其中包含源和目标系统上复制操作所有方面的详细信息。如果在\
    \ GoldenGate 处理过程中发生错误，您必须检查位于源和目标基本安装目录下的 Oracle GoldenGate 错误日志。在 Linux 和 UNIX\
    \ 系统上，您可以使用 `tail` 命令来检查 Oracle GoldenGate 错误日志文件中包含的最后几条错误消息。\n\n让我们看一下 Oracle\
    \ 11g GoldenGate 和 Oracle 11g Windows 源系统的错误日志文件。该文件名为 `ggserr.log`；您可以在 Linux\
    \ 和 UNIX 上使用 vi 或 Emacs 等文本编辑器，或在 Windows 平台上使用记事本打开它。此外，您还可以使用 GGSCI 命令 `VIEW\
    \ GGSEVT` 查看错误日志文件，如下所示：\n\n```\nOracle:  PROCESS ABENDING.\n2011-03-14 00:19:46\
    \  INFO    OGG-00992  Oracle GoldenGate Capture for Oracle, extora.prm:  EXTRACT\
    \ starting.\n2011-03-14 00:19:46  INFO    OGG-01017  Oracle GoldenGate Capture\
    \ for Oracle, extora.prm:  Wildcard resolution set to IMMEDIATE because SOURCEISTABLE\
    \ is used.\n2011-03-14 00:19:46  ERROR   OGG-00664  Oracle GoldenGate Capture\
    \ for Oracle, extora.prm:  OCI Error beginning session (status = 1017-ORA-01017:\
    \ invalid username/password; logon denied).\n2011-03-14 00:19:46  ERROR   OGG-01668\
    \  Oracle GoldenGate Capture for Oracle, extora.prm:  PROCESS ABENDING.\n```\n\
    \n### 理解 Oracle GoldenGate 丢弃文件\n\n回顾前面的章节，当 Extract 或 Replicat 使用了 `DISCARDFILE`\
    \ 参数时，Oracle GoldenGate 会创建一个丢弃文件。如果在 Replicat 或 Extract 处理来自源或目标环境的数据过程中出现问题，则被拒绝的记录会被转储到丢弃文件中。作为您尽职调查的一部分，您应定期检查源和目标数据库环境上的丢弃文件内容，以捕捉\
    \ Oracle GoldenGate 遇到的数据问题。\n\n丢弃文件包含 Oracle GoldenGate 进程未能成功处理的所有数据库操作的列级详细信息。每个丢弃文件包含以下有用细节：\n\
    \n*   进程的数据库错误消息，例如 Oracle 11g 中表示“未找到数据”的 `ORA-00100`\n*   Extract 或 Replicat\
    \ 尝试处理的记录所在的跟踪文件序列号\n*   记录在跟踪文件中的相对字节地址（RBA）\n*   Extract 或 Replicat 尝试处理的被丢弃记录的详细信息\n\
    \n通常，丢弃文件由 Replicat 用于记录无法重构或应用的操作，但您也可能发现它对 Extract 很有用。检查丢弃错误中的消息，例如 `ORA-1403`\
    \ 或重复的和/或被拒绝的记录。以下是一个 Oracle GoldenGate 丢弃文件示例：\n\n```\nORA-20017:  repora 724935\n\
    ORA-06512: at \"HR.REPORAINSERT\", line 41\nORA-04088: error during execution\
    \ of trigger 'HR.REPORA_INSERT'\nOperation failed at seqno 15 rba 28483311\nProblem\
    \ replicating HR.EMP to HR.TRGTREP\nError occurred with insert record (target\
    \ format)...\n*\nA_TIMESTAMP = 2011-03-09 11:28:11\nOK = 1.0000\nNOTOK = -1.0000\n\
    ```\n\n丢弃记录为处理过程中发生的问题提供了有用的线索，使您能够快速识别并解决根本原因。\n"
- fmt: '#### Discard File Not Created


    Sometimes you may encounter the frustrating issue that Oracle GoldenGate fails
    to create a discard file. One common cause is that the discard file’s location
    wasn’t provided in the parameter file for use with the `DISCARDFILE` parameter.
    GoldenGate doesn’t create a discard file by default, so you need to give a file
    name and location of the discard file—otherwise it won’t be created.


    A second cause of missing discard files occurs when the `DISCARDFILE` parameter
    doesn’t reference the correct directory on the file system. You need to verify
    that sufficient read and write access permissions are granted for the discard
    file and the directory that contains the discard file. In addition, make sure
    the user who accesses the discard file has the required security permissions to
    access, read, and write to and from the file location.


    #### Discard File Is Too Big


    Keep in mind that Oracle GoldenGate constantly writes to the discard file as processing
    takes place. If the discard file isn’t given sufficient disk space on the file
    system where it lives, then you may have errors with processing it. One recommendation
    is to adjust the size of the discard file by using the following parameters:


    *   `DISCARDROLLOVER`: Specifies the parameters for aging of the discard file.

    *   `MAXDISCARDRECS`: Limits the total number of errors written out to the discard
    file.

    *   `PURGE` `option for` `DISCARDFILE`: Purges the discard file before writing
    out new information

    *   `MEGABYTES` `option for` `DISCARDFILE`: Sets the maximum size of the discard
    file. The default size of the discard file is 1MB.


    #### Can’t Open the Discard File


    Oracle GoldenGate processes for the Extract and Replicat use the discard file
    during operational activities. If there is an error in the location of the discard
    file, the Extract or Replicat process will fail in GoldenGate, as shown in the
    following error:


    ```

    2011-03-16 00:54:08  ERROR   OGG-01091  Unable to open file "c:\win11trgt\dirrpt\report.dsc"
    (error 3, The system cannot find the path specified.).

    2011-03-16 00:54:08  ERROR   OGG-01668  PROCESS ABENDING.

    ```


    Check the read and write permissions of the `DISCARDFILE` parameter you’ve configured
    in the Extract and Replicat parameter file to ensure that the directory exists
    and has the correct permissions granted.


    ### Using Trace Commands with Oracle GoldenGate


    Oracle GoldenGate provides several useful parameters that you can use to trace
    processes that fail within the Oracle GoldenGate environment. This section shows
    you how to use these tracing tools to identify root cause of failures in Oracle
    GoldenGate. The following tracing tools are discussed along with an example that
    showcases how to run `TRACE`:


    *   `TLTRACE`

    *   `TRACE`

    *   `TRACE2`


    ![images](images/square.jpg) `Note` If you require the use of tracing in Oracle
    GoldenGate, you should first contact Oracle GoldenGate support while investigating
    failures within the Oracle GoldenGate environment so you can best deploy these
    tracing commands without adversely affecting your configuration.


    #### Oracle GoldenGate Process Tracing with TLTRACE


    The `TLTRACE` parameter allows you to run a trace for database transaction log
    activity. You can run a trace to show either basic or detailed information about
    records being processed. To enable a `TLTRACE` session, you need to add this parameter
    to the Extract or Replicat parameter file and restart the process.


    #### Using TRACE Parameters with Oracle GoldenGate


    The `TRACE` and `TRACE2` parameters allow you to grab all details regarding Extract
    and Replicat processing. The `TRACE` parameter provides detailed processing information
    for Oracle GoldenGate processes. In contrast, you use the `TRACE2` parameter to
    identify database code segments where either the Extract or Replicat is taking
    the most time to process.


    #### Troubleshooting Case Study with Oracle GoldenGate


    Let’s walk through a case study that shows how to use GGSCI commands and the error
    log to understand why a process failed in an Oracle database environment. First
    you use the `STATUS EXTRACT` command, which returns the following:


    ```

    GGSCI (ggs_src) 20> status extract extora

    EXTRACT EXTORA: ABENDED

    ```


    Next, use the `VIEW GGSEVT` command to drill deeper into the issue with the failed
    Extract process:


    ```

    GGSCI (ggs_src) 22> view ggsevt

    2011-03-11 10:28:11 GGS INFO 399 GoldenGate Command Interpreter

    for Oracle: GGSCI command (admin): start extract ggext.

    2011-03-11 10:38:15 GGS INFO 301 GoldenGate Manager for Oracle,

    mgr.prm: Command received from GGSCI on host oracledba(START

    EXTRACT GGEXT).

    2011-03-11 10:40:02 GGS INFO 310 GoldenGate Capture for Oracle,

    ggext.prm: EXTRACT EXTORA starting.

    2011-03-11 10:41:11 GGS ERROR 501 GoldenGate Capture for Oracle,

    extora.prm: Extract read, error 13 (Permission denied) opening redo

    log C:\oracle\arch\0001_000000568.arc for sequence

    258.

    2011-03-11 10:43:22 GGS ERROR 190 GoldenGate Capture for Oracle,

    extora.prm: PROCESS ABENDING.

    ```


    In this failure, error message 501 indicates that the Extract user doesn’t have
    the correct permissions to read the redo logs on the source Oracle database. To
    fix this issue, you grant read and write permissions on the source Oracle database
    so the Extract process can retrieve the redo log files. After you’ve granted these
    read and write permissions to the Extract user, you need to stop the Manager process
    and exit GGSCI. Log out from the terminal session you have open, and restart the
    Oracle GoldenGate processes.


    ### Oracle GoldenGate Configuration Issues


    Oracle GoldenGate configuration issues pose challenges because once the environment
    has been installed and configured, if the original DBA has left the company, the
    new DBA team doesn’t always have documentation from the past DBA to help them
    understand the configuration they’ve inherited. Configuration issues fall into
    the following areas:


    *   Incorrect software version installed for Oracle GoldenGate

    *   Database configuration issues on the source and/or target with Oracle GoldenGate

    *   Oracle GoldenGate parameter file configuration issues

    *   Operating system configuration issues

    *   Network configuration issues


    #### Incorrect Software Versions with Oracle GoldenGate


    Installing the wrong version and platform release for Oracle GoldenGate causes
    failures within the source and target environments. Oracle provides a unique build
    for the GoldenGate software based on platform, database, and version (32-bit versus
    64-bit) that requires the correct version to be installed for your platform. For
    instance, you can’t install 64-bit Oracle GoldenGate Linux software on an IBM
    AIX platform, or you’ll receive errors.


    The build name contains the operating system version, database version, GoldenGate
    release number, and GoldenGate build number, as shown in the following example
    for Oracle on Solaris:


    `ggs_Solaris_sparc_ora10g_64bit_v11_1_1___78.tar`


    To find out the GoldenGate version, change to the GoldenGate home directory and
    issue the GGSCI `–v` command from the operating system terminal shell window:


    ```

    C:\ggs_src>ggsci -v

    Oracle GoldenGate Command Interpreter for Oracle

    Version 11.1.1.0.0 Build 078

    Windows (optimized), Oracle 11 on Jul 28 2010 17:20:29

    Copyright (C) 1995, 2010, Oracle and/or its affiliates. All rights reserved.

    ```'
