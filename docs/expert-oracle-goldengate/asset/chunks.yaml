- fmt: "## Setting Up the Data Source\n\nBefore you use the Director application,\
    \ you have to set up the data source using Oracle GoldenGate Director Admin Tool.\
    \ Make sure `Director Server` is already running, and then follow these steps:\n\
    \n1.  Enter the `Username` and `Password`, as shown in [Figure 10-3](#Chapter10.html#fig_10_3).\
    \ The default is `admin` for both `Username` and `Password`.\n    ![images](images/1003.jpg)\n\
    \    **Figure 10-3.** Director login screen\n\n2.  From the drop-down menu, choose\
    \ the server name with the TCP port number.\n3.  Click `Login`. The Account page\
    \ appears.\n4.  On the Account page, create a new user or use the `admin` ID.\n\
    5.  Click the `Monitor Agent` tab, and confirm that you’re monitoring your data\
    \ source.\n\nThere are only two roles in Director Client: `Owner` and `Observer`.\
    \ You can define them on the `Data Source` tab. In addition, user activities are\
    \ logged in the `access.log` file under the Director WebLogic domain.\n\n`Owner`\
    \ has full control of this data source. If you leave the `Owner` field blank,\
    \ then all users can see and access the processes associated with this data source.\
    \ If the `Host Is Observable` option is selected, all non-owners are in read-only\
    \ mode for this data source.\n\nDirector stores user-specific configurations by\
    \ user. So if you share the same user id, you see the exact same screen that other\
    \ users see, such as diagrams and alerts.\n\nGo ahead and create a data source\
    \ that has a manager already running. In Director terms, a data source is also\
    \ referred to as a `Manager process`. It is the exact same `Manager` process that\
    \ GoldenGate uses to manage all the extracts and replicats. Note that you must\
    \ create a `Manager` parameter file with a required port number in order for the\
    \ desktop client to work. Use `Check Connection` to confirm if the manager is\
    \ running. You can’t create a `Manager` parameter file using Director Client.\
    \ You can run `GGSCI` in Director Client, but it doesn’t support the `Edit` command.\
    \ For a list of nonsupported features in the `GGSCI` tab in one of the Director\
    \ dialogs, refer to the Director Administrator’s Guide.\n\nOn the `Monitor Agent`\
    \ tab, be sure to turn on monitoring for your data source.\n\n## Modifying the\
    \ Manager Parameter file\n\nNow you can launch the Director Client. From the menu\
    \ bar, select `File` > `Login`, enter `admin/admin` if you want to use the default\
    \ password, or enter the login you created in the Oracle GDSC Admin Tool. Click\
    \ the `Data Source` tab, and then drag the data source you created in the Admin\
    \ Tool to the diagram area. Now, you should see a `Data Source` icon as shown\
    \ in [Figure 10-4](#Chapter10.html#fig_10_4).\n\n### Modifying the Parameter File\
    \ Using the Built-in Editor\n\nRight-click the data source icon in the diagram\
    \ panel, and select `Advanced` > `Edit Param File` as shown in [Figure 10-4](#Chapter10.html#fig_10_4).\
    \ You have full control of the parameter file in this built-in editor. You’ll\
    \ usually use it to edit parameters that haven’t been implemented in the Director\
    \ GUI.\n![images](images/1004.jpg)\n**Figure 10-4.** Editing the Manager parameter\
    \ file\n\n### Modifying the Parameter File Using the GUI\n\nYou also can modify\
    \ the `Manager` parameter file using the Director interface. For example, to add\
    \ the `purgeoldextracts` parameter to the parameter file, highlight the data source\
    \ and then click the `Insert` button. The dialog shown in [Figure 10-5](#Chapter10.html#fig_10_5)\
    \ opens. It’s a very nice feature that this dialog shows all the available `Manager`\
    \ parameters and attributes along with their online help.\n![images](images/1005.jpg)\n\
    **Figure 10-5.** Inserting a parameter into the Manager parameter file\n\nSelect\
    \ `purgeoldextracts` from the list at left, and enter your `dirdat` full path\
    \ with a two-character trail-file prefix. Then click `Insert`. You can add other\
    \ parameters if you wish, or click the `Done` button if you’re finished.\n\nRight-click\
    \ the data source, and choose `Restart` to refresh the `Manager`. You can also\
    \ go to `GGSCI` and enter `refresh mgr`.\n\nNext, you walk through several tasks\
    \ using Director Client.\n\n## Setting Up the Initial Load\n\nThe Oracle GoldenGate\
    \ Initial Load task is very easy to set up in Director. It has a menu item to\
    \ automate this; you only need to map the table(s).\n\n### Adding an Initial Load\
    \ Task\n\nClick the data source and choose `Actions` > `Add New` > `Initial Load\
    \ Task`, as shown in [Figure 10-6](#Chapter10.html#fig_10_6).\n![images](images/1006.jpg)\n\
    **Figure 10-6.** Choosing Initial Load Task\n\nYou can fill in the `Capture Name`\
    \ and `Delivery Name` in the Initial Load Task dialog. Make sure the source and\
    \ target database logins are correct. Click `OK`. Director creates all the necessary\
    \ files for you, as shown in [Figure 10-7](#Chapter10.html#fig_10_7). Next, you\
    \ tell Oracle GoldenGate what tables you need to replicate with the initial load.\n\
    ![images](images/1007.jpg)\n**Figure 10-7.** Files are created for the Initial\
    \ Load task.\n\n*Mappings* tell Oracle GoldenGate what you need to replicate over\
    \ to the target database. So, you need to create mapping rules. The guidelines\
    \ for creating mapping rules are as follows:\n\n*   When configuring a mapping\
    \ statement for a `Capture` object, don’t specify target tables or column mapping.\n\
    *   When configuring a mapping statement for a `Delivery` object, specify the\
    \ source and target tables. If needed, map source columns to target columns and\
    \ specify column-conversion functions.\n\nOn the diagram, click `Map` for `EXTINIT`\
    \ and then click the `Insert` button at the bottom. The `Insert New Mapping` dialog\
    \ opens. For now, use the `Mapping Type` value `Table`, as shown in the [Figure\
    \ 10-8](#Chapter10.html#fig_10_8). Enter the table name in the `Table Name` text\
    \ box. Click `Insert` for each new mapping.\n![images](images/1008.jpg)\n**Figure\
    \ 10-8.** Insert New Mapping dialog for the Extract\n\nYour mapped tables are\
    \ checked on the first column of the `Parameters` tab as shown in [Figure 10-9](#Chapter10.html#fig_10_9).\
    \ If you don’t see them, click the `Show Tables` button. You also can select tables\
    \ in the table list panel, as shown in the [Figure 10-9](#Chapter10.html#fig_10_9).\n\
    ![images](images/1009.jpg)\n**Figure 10-9.** Mapping table list for the Extract\n\
    \nTo view or edit your Extract parameter file, right-click `Extract` for `EXTINIT`\
    \ and choose `Advanced` > `Edit Param`. The dialog shown in [Figure 10-10](#Chapter10.html#fig_10_10)\
    \ opens.\n![images](images/1010.jpg)\n**Figure 10-10.** It’s good practice to\
    \ validate the parameter file before running it.\n\nDo the same map for `Map`\
    \ for `REPINIT`. Highlight the mapped table, and then click `Change`. Enter the\
    \ `Target` table name in the `Attributes` box as shown in [Figure 10-8](#Chapter10.html#fig_10_8).\n\
    \nNow, right-click the `EXTINIT` `Extract`, and choose `Start` as shown in [Figure\
    \ 10-11](#Chapter10.html#fig_10_11). Doing so spawns a `GGSCI` process to start\
    \ the `Extract`. Note that in Windows Director, the spawned `GGSCI` process window\
    \ sometimes doesn’t exit properly; if this happens, go to the spawned `GGSCI`\
    \ window and type `Exit`. Or, you can start `EXTINIT` in `GGSCI`. The diagram\
    \ refreshes the status in real time.\n![images](images/1011.jpg)\n**Figure 10-11.**\
    \ Start the Extract from the Extract object."
