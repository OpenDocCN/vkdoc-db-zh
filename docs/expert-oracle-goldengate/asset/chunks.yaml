    \ ABENDING.\n```\n\n在此案例中，由于源数据库服务器上的 Oracle 协议网络错误，Extract 未能运行。该网络错误是由 Oracle\
    \ 11g 网络监听器 (TNS) 启动失败引起的。您可以通过检查 `listener.ora` 和 `tnsnames.ora` 网络配置并纠正任何错误来排查此错误。然后，重新启动\
    \ Oracle 监听器和 GoldenGate 进程。通过纠正源 Oracle 11g 监听器协议错误，您可以成功重启 Extract 进程。\n\n调查\
