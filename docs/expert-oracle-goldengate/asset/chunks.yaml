    #### 检查内存和 CPU 的脚本


    如果内存和 CPU 是系统中的薄弱环节，那么这个脚本会很方便，它能每小时报告内存和 CPU 使用情况。它会通过电子邮件发送所有 GoldenGate Extract
    进程的内存和 CPU 使用率，以及总空闲内存量。注意，`goldengate`是 Unix/Linux 用户 ID。


    以下是脚本：


    ```ksh

    #!/bin/ksh


    EMAIL_LIST="shingchung@aol.com 5555555555@vtext.com"


    host=`hostname`

    cd /ggs/scripts

    rm top.log

    rm top.rpt

    top -h -f top.log -n 50

    cat top.log | grep extract > top.rpt

    echo "" >> top.rpt

    echo "Free Memory: " >> top.rpt

    vmstat 1 2 | tail -1 | awk ''{printf "%d%s\n", ($5*4)/1024, "MB" }'' >> top.rpt


    mailx -s "GoldenGate Memory Usage on $host" $EMAIL_LIST < /ggs/scripts/top.rpt

    ```


    输出：

    ```

    19   ?    14000 goldengate 152 20  2331M  1201M run    602:09 31.64 31.59 extract

    10   ?    13655 goldengate 137 20 80912K 16432K sleep 1568:25  5.97  5.96 extract


    Free Memory:

    47610MB

    ```


    Extract 进程使用了 31.59%的单个 CPU，数据泵使用了 5.96%。Extract 通常比数据泵消耗更多 CPU。Extract 的内存使用总量约为
    2331MB，常驻内存为 1201MB。整个服务器内存为 47GB，因此您仍有大量空闲内存。GoldenGate Extract 进程通常消耗整体 CPU
    利用率的 1%到 5%。


    #### 检查磁盘空间


    即使磁盘空间目前不是问题，运行一个监控脚本也是有益的。您永远不知道：您的磁盘空间可能在几年内不知不觉地被填满。如果跟踪文件磁盘空间是您的薄弱环节，那么您绝对需要这个脚本。许多脚本可在线获取，适用于各种系统，因此本节不列出具体脚本。请搜索“check
    disk space scripts”以获取适合您操作系统的脚本。


    您可以根据需要编写任意多的监控脚本，但您不希望给系统增加负担。本章中的所有脚本都是轻量级的，因此可以安全使用。


    ### 总结


    本章向您展示了如何为您的 Extract、数据泵和 Replicat 设置一个非常好的监控系统。如果您有其他许多需要监控的 GoldenGate 进程，那么您只需将它们添加到您现有的脚本中即可。图
    8-1 包含 GoldenGate 进程中的 13 个链接，但您的配置可能有更多。


    GoldenGate 可能出现的故障比您想象的要多，但本章介绍的自动化 PL/SQL 延迟监控脚本可以通知您问题，有时甚至在发生重大问题之前。只要目标数据库处于启动状态，它就是一个独立的进程。如果目标数据库关闭，您将不会收到每小时的延迟状态电子邮件，因此您会知道出了问题。该警报无法确切告诉您出了什么问题，但本章的其他脚本可以为您精确定位确切的问题。


    本章还向您展示了如何监控整个 GoldenGate 系统的健康状况。在实施 GoldenGate 监控流程之前，了解系统中可能出现什么问题非常重要，这样您才能在问题恶化之前识别它们。


    ![images](img/square.jpg) **注意** GoldenGate 的管理包（也称为 GoldenGate Director）可以执行一些基本的监控和警报。Director
    还将延迟和事件信息存储到其专有表中，因此您可以从中创建报告。但风险自负，因为 Oracle 可能会在不同版本之间更改其表结构。有关 Director 的更多信息，请参见第
    10 章。


    ## 第 9 章 Oracle GoldenGate Veridata


    Oracle GoldenGate Veridata 是一种高性能的跨平台数据比较工具，支持在源和目标数据在线且正在更新时进行大规模比较。Veridata
    的三层架构将负载分散到不同的服务器上，而不会影响源和目标数据库系统的性能。


    Veridata 使用压缩的行哈希数据进行比较，这减少了比较数据所需的 CPU 周期和网络带宽，但它不仅仅是一个数据比较工具。Veridata 可以跟踪变化的数据并在数据更新时执行比较——这是当今任何其他工具都无法实现的壮举。


    在本章中，我们将介绍 Veridata 的关键组件，以便您了解它为何如此独特，以及为什么目前没有其他产品能与之竞争。然后，我们将介绍一些关键特性和优势，并展示
    Veridata 如何与您的数据项目配合工作并帮助提高您组织的效率。一旦您了解了 Veridata 是什么以及它如何提供帮助，我们将通过一个快速教程介绍如何设置它。（设置一个比较作业实际上只需要几分钟——这就是该工具的高效之处。）最后，我们将介绍一些提示和技巧，以帮助您完成一些复杂的数据比较场景。


    ### Veridata 组件


    为了使 Veridata 启动并运行，您需要设置五个 Veridata 组件，如图 9-1 所示。


    ![images](img/0901.jpg)


    图 9-1. Oracle GoldenGate Veridata 组件


    #### GoldenGate Veridata 服务器


    Veridata 服务器是整个 Veridata 系统的关键组件。没有它，比较将需要在源或目标数据库上执行，这将对服务器的性能产生负面影响。这是因为任何比较作业都是
    CPU 和 I/O 密集型的。


    Veridata 服务器执行以下功能：


    *   与代理协调 Oracle GoldenGate Veridata 执行任务的所有方面。

    *   在 Veridata 服务器上对行进行排序。默认是在安装代理的数据库上进行排序。

    *   比较从 GoldenGate Veridata 代理收集的数据。

    *   对不同步数据执行确认比较（稍后解释）。

    *   生成不同步、确认和性能报告。


    #### GoldenGate Veridata Web


    Oracle GoldenGate Web 是 Veridata 服务器的基于 Web 的客户端。这是我们用于配置大多数 Veridata 任务的工具。它执行以下功能：


    *   配置所有比较对象和规则，包括连接、组、作业等。

    *   启动和停止比较作业。

    *   提供作业状态的实时状态。

    *   查看比较和不同步数据报告。


    #### GoldenGate Veridata 存储库


    Veridata 存储库存储所有比较对象和规则的配置。元数据以明文形式存储在存储库数据库的表中，因此您可以查询它们以创建自己的自定义报告。它还存储作业状态，因此您可以将其与您的
    ETL 和监控工具无缝集成。


    #### GoldenGate Veridata 代理，Java 和 C-Code


    Veridata 代理执行 SQL 以获取数据块并将其返回给服务器进行比较。它还将不同步行的详细信息提取到服务器以用于报告目的。Java 代理不需要 GoldenGate
    Manager，但基于 C 代码的代理需要 GoldenGate Manager 进程。


    #### GoldenGate Veridata CLI（Vericom）


    Vericom 是一个命令行界面，用于调度比较作业。它可以覆盖一些配置文件设置、分区 SQL 谓词、关闭 Veridata 服务器以及生成/查看不同步报告。但是，它不能配置比较设置和规则，这些只能在
    Veridata Web 客户端上完成。

