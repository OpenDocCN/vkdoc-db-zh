- fmt: '##### REPORTROLLOVER


    If an Extract or Replicat runs continuously for a long period, you may notice
    that the report file becomes rather large. To control the size of the report file,
    you can have GoldenGate automatically roll over the reports on a daily or weekly
    basis. The example rolls over the report file once a day at 1:15 a.m. Note that
    the report statistics continue to accumulate even after the reports are rolled
    over unless you specifically tell GoldenGate to reset them using the `STATOPTIONS`
    parameter with the `RESETREPORTSTATS` option.


    ## Reporting Discarded Records


    In some cases, you may notice that GoldenGate is unable to process particular
    records for one reason or another. These records are called discards by GoldenGate.
    For example, you may have changed a table layout and forgotten to update your
    GoldenGate configuration. In that case, GoldenGate may discard the records for
    that table because it doesn''t know about the new table layout.


    By default, GoldenGate won''t produce a discard file to show you which records
    have been discarded. If you want to see the discards, you can instruct GoldenGate
    to write them out to a file using the `DISCARDFILE` parameter. The following example
    tells GoldenGate to generate a discard file for the human resources schema Extract
    named `LHREMD1`. You also have any new records appended to the discard file with
    the `APPEND` parameter. To keep the discard file from getting too large, you roll
    it over every Sunday at 2 a.m. with the `DISCARDROLLOVER` parameter:


    ```

    DiscardFile dirrpt/LHREMD1.dsc, Append

    DiscardRollover at 02:00 ON SUNDAY

    ```


    You can choose to have GoldenGate report on discards for your local Extract, data-pump
    Extract, and Replicat.


    ## Purging Old Trail Files


    You can instruct GoldenGate to automatically purge your old trail files after
    they have been processed using the `PURGEOLDEXTRACTS` parameter. Although you
    can add this parameter to individual Extracts and Replicats, it''s best to add
    it to your Manager parameter file so purging can be managed centrally for all
    Extracts and Replicats.


    Here is an example of the parameter you can add to your Manager parameter file
    to purge old trail files:


    ```

    PurgeOldExtracts dirdat/*, UseCheckpoints, MinKeepDays 2

    ```


    Let''s take a closer look at the parameter and the options. First you tell GoldenGate
    to purge the extracts in your `dirdat` directory where the trail files are stored.
    The `USECHECKPOINTS` option tells GoldenGate to only delete the trail files after
    they have been fully processed by the Extracts and Replicats according to the
    checkpoint file. You should almost always specify the `USECHECKPOINTS` option
    along with `PURGEOLDEXTRACTS` because otherwise your trail files may be deleted
    before they''re processed. Finally, you keep the trail files for a minimum of
    two days after they have been processed per the `MINKEEPDAYS` option. The Manager
    process automatically deletes any trail files that have been fully processed that
    are older than two days.


    ## Adding Automatic Process Startup and Restart


    Now you can add a couple of parameters to the Manager parameter file to try to
    avoid downtime for the Extracts and Replicats. The `AUTOSTART` parameter, as shown
    in the following example, automatically starts all the Extracts and Replicats
    when the Manager starts. The example uses wildcarding to tell the Manager to restart
    all Extracts and Replicats. You can specify that you want to start only individual
    Extracts and Replicats if needed:


    ```

    AutoStart ER *

    ```


    In some cases, an Extract or Replicat fails due to a temporary or intermittent
    problem such as a brief network outage. The `AUTORESTART` parameter shown in the
    following example automatically tries to restart the Extracts and Replicats if
    they fail because of such a problem.


    ![images](images/square.jpg) **Note** Use the `AUTORESTART` parameter with caution.
    To be sure you aren''t unknowingly overlooking any problems, you may prefer to
    have an Extract or Replicat process fail and then resolve the issue manually instead
    of using `AUTORESTART`. `AUTORESTART` is best used as an exception for automatically
    resolving a known issue.


    By default with `AUTORESTART`, GoldenGate tries to restart the Extracts and Replicats
    two times after waiting two minutes between restarts. Every two hours, GoldenGate
    tries again. You can adjust these defaults if needed.


    Next, let''s add a checkpoint table to the database.


    ## Adding a Checkpoint Table


    By default, GoldenGate maintains a checkpoint file on disk to keep track of transaction
    processing. In addition, you can create a checkpoint table in your target database.
    Doing so lets the Replicat include the checkpoint itself as part of the transaction
    processing and allows for better recoverability in certain circumstances. Let''s
    add a checkpoint table in the target database.


    First you need to add an entry to your `GLOBALS` file to tell GoldenGate the checkpoint
    file name. By adding this entry to the `GLOBALS` file, you tell GoldenGate to
    use the same checkpoint table for all of your Replicats. You can also add a specific
    checkpoint table for an individual Replicat as part of the `ADD REPLICAT` command:


    ```

    CheckPointTable gger.chkpt

    ```


    ![images](images/square.jpg) **Tip** The `GLOBALS` file is used to specify GoldenGate
    parameters that apply to the entire GoldenGate instance, such as `CHECKPOINTTABLE`.
    The `GLOBALS` file is located in the GoldenGate software installation directory
    (in the example, `/gger/ggs`). This is different from the Extract and Replicat
    parameter files, which are located in the `dirprm` subdirectory. If the `GLOBALS`
    file doesn''t exist, you may need to create it the first time you use it.


    Next you create the checkpoint table in the target database:


    ```

    GGSCI (targetserver) 1> dblogin userid gger password userpw

    Successfully logged into database.


    GGSCI (targetserver) 2> add checkpointtable


    No checkpoint table specified, using GLOBALS specification (gger.chkpt)...


    Successfully created checkpoint table GGER.CHKPT.

    ```


    Now run another checkpoint command to verify that the checkpoint table exists:


    ```

    GGSCI (targetserver) 1> info checkpointtable gger.chkpt


    Checkpoint table GGER.CHKPT created 2011-01-30 22:02:03.

    ```


    Here are the basic Extract and Replicat parameter files along with the changes
    you''ve introduced in this section, shown in italics. First let''s look at the
    enhanced Extract parameter file:


    ```

    GGSCI (sourceserver) 1> edit params LHREMD1

    Extract LHREMD1

    -------------------------------------------------------------------

    -- Local extract for HR schema

    -------------------------------------------------------------------

    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)

    USERID GGER@SourceDB, PASSWORD userpw

    ReportCount Every 30 Minutes, Rate

    Report at 01:00

    ReportRollover at 01:15

    DiscardFile dirrpt/LHREMD1.dsc, Append

    DiscardRollover at 02:00 ON SUNDAY

    ExtTrail dirdat/l1

    Table HR.*;

    ```


    Next is the enhanced Replicat parameter file:


    ```

    GGSCI (targetserver) 1> edit params RHREMD1

    Replicat RHREMD1

    -------------------------------------------------------------------

    -- Replicat for HR Schema

    -------------------------------------------------------------------

    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)

    USERID GGER@TargetDB, PASSWORD userpw

    AssumeTargetDefs

    ReportCount Every 30 Minutes, Rate

    Report at 01:00

    ReportRollover at 01:15

    DiscardFile dirrpt/RHREMD1.dsc, Append

    DiscardRollover at 02:00 ON SUNDAY

    Map HR.*, Target HR.* ;

    ```


    Finally, the enhanced Manager parameter file is shown here:


    ```

    GGSCI (server) 1> edit params MGR

    -------------------------------------------------------------------

    -- GoldenGate Manager

    -------------------------------------------------------------------

    port 7840

    AutoStart ER *

    AutoRestart ER *

    PurgeOldExtracts /gger/ggs/dirdat/*, UseCheckpoints, MinKeepDays 2

    ```'
