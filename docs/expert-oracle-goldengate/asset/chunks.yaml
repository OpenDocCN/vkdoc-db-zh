    \ 已经从源数据库复制了触发器和级联删除操作的*结果*。如果您不禁用约束和触发器，GoldenGate 将复制这些更改；然后触发器和级联删除约束也会触发，导致目标数据库上出现重复更改。\n\
    \n有几种方法可用于禁用触发器和级联删除约束。第一种方法仅适用于较新的 Oracle 版本，涉及向 Replicat 添加参数。第二种方法只是通过 `ALTER\
    \ TABLE` 来禁用触发器和约束，并在复制关闭时重新启用它们。\n\n从 GoldenGate 版本 11 开始，作为 Replicat `DBOPTIONS`\
    \ 参数的一部分，提供了一个新的 `SUPPRESSTRIGGERS` 选项，用于自动阻止触发器在目标上执行。您可以使用它来避免手动禁用触发器。此选项适用于\
    \ Oracle 10.2.0.5 及更高版本数据库，以及 Oracle 11.2.0.2 及更高版本数据库。要禁用约束，如果您有 Oracle 9.2.0.7\
    \ 及更高版本数据库，可以使用带有 `DEFERREFCONST` 选项的 Replicat 参数 `DBOPTIONS`，将完整性约束的检查和执行延迟到\
    \ Replicat 事务提交时。\n\n您也可以使用 SQL 脚本（例如以下 Oracle 数据库示例）来自动为级联删除约束和触发器生成 `ALTER TABLE`\
    \ 启用和禁用命令。使用脚本从数据库动态生成命令可以节省时间并确保更高的准确性。在此示例中，脚本会提示输入方案所有者名称：\n\n```\nset echo\
    \ off\nset verify off\nset pagesize 2000\nset linesize 250\nset trim on\nset heading\
    \ off\nset feedback off\n\nspool &&SCHEMA..disable_cascade_delete_constraints.sql\n\
    \nselect 'alter table '||owner||'.'||table_name||\n' disable constraint '||constraint_name||';'\n\
    from all_constraints\nwhere delete_rule = 'CASCADE'\nand owner = '&SCHEMA';\n\
    spool off\n\nspool &SCHEMA..disable_triggers.sql\n\nselect 'alter trigger '||owner||'.'||trigger_name||\n\
    ' disable ;'\nfrom all_triggers\nwhere owner = '&SCHEMA';\n\nspool off\n\nspool\
    \ &SCHEMA..enable_cascade_delete_constraints.sql\n\nselect 'alter table '||owner||'.'||table_name||\n\
    ' enable constraint '||constraint_name||';'\nfrom all_constraints\nwhere delete_rule\
    \ = 'CASCADE'\nand owner = '&SCHEMA';\n\nspool off\n\nspool &SCHEMA..enable_triggers.sql\n\
    \nselect 'alter trigger '||owner||'.'||trigger_name||\n' enable;'\nfrom all_triggers\n\
    where owner = '&SCHEMA';\n\nspool off\n```\n\n该脚本生成四个假脱机文件，然后您可以在 SQLPLUS 中执行它们来禁用和启用触发器及级联删除约束。"
- fmt: '#### 验证 Manager 状态


    你可能还记得 [第 2 章](#Chapter02.html#ch2) 和 [第 3 章](#Chapter03.html#ch3) 中关于 GoldenGate
    Manager 进程的讨论，它管理着所有 GoldenGate 进程和资源。在启动 Extract 和 Replicat 进程之前，你需要验证源服务器和目标服务器上的
    GoldenGate Manager 进程是否正在运行。如果 Manager 没有运行，就无法启动复制。对于基本的复制配置，源和目标服务器上的 Manager
    参数文件需要包含端口号，如下例所示：


    ```plaintext

    GGSCI (server) 1> edit params MGR

    -------------------------------------------------------------------

    -- GoldenGate Manager

    -------------------------------------------------------------------

    port 7840

    ```


    [第 5 章](#Chapter05.html#ch5) 详细介绍了 Manager 参数的使用，但目前这样就可以了。你可以使用 `INFO MGR` 命令来验证
    Manager 是否正在运行：


    ```plaintext

    GGSCI (sourceserver) 1> info manager


    Manager is running (IP port sourceserver.7840).

    ```


    如果 GoldenGate Manager 没有运行，你可以使用以下命令启动它：


    ```plaintext

    GGSCI (sourceserver) 1> start manager

    ```


    > **提示** 许多 GoldenGate 命令都有缩写形式以节省时间和按键。例如，命令 `INFO MANAGER` 可以缩写为 `INFO MGR`。`REPLICAT`
    关键字可以缩写为 `REP`，`EXTRACT` 可以缩写为 `EXT`。


    接下来，让我们继续配置 GoldenGate 本地 Extract。


    #### 配置本地 Extract


    既然你已经确保 Manager 正在运行，让我们来配置本地 Extract。为此，你首先需要为 Extract 创建一个参数文件。记住，目前作为示例，你正在配置本地
    Extract 以捕获示例 HR 模式中的所有 SQL DML 更改。


    > **提示** 你可以直接从 GGSCI 编辑 GoldenGate 参数，也可以在 GGSCI 外部使用原生的操作系统文本编辑器进行编辑，哪种方式最方便就用哪种。要在
    GGSCI 中编辑，你需要输入 `EDIT PARAMS` *`参数文件名`*。GGSCI 会在默认的文本编辑器中打开参数文件，在 Windows 上是记事本，在
    UNIX 和 Linux 上是 vi。你可以使用 GGSCI 中的 `SET EDITOR` 命令更改默认编辑器。如果你直接从操作系统编辑，请将参数文件保存在
    GoldenGate 软件安装目录下的 `/dirprm` 子目录中。在示例中，参数文件目录是 `/gger/ggs/dirprm`。


    让我们从查看本地 Extract 的参数开始，如下例所示：


    ```plaintext

    GGSCI (sourceserver) 1> edit params LHREMD1


    Extract LHREMD1


    -------------------------------------------------------------------

    -- Local extract for HR schema

    -------------------------------------------------------------------

    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)


    USERID GGER@SourceDB, PASSWORD userpw


    ExtTrail dirdat/l1


    Table HR.*;

    ```


    这些参数和术语一开始可能看起来有点陌生，但随着时间的推移，你会逐渐习惯这种格式和用法。接下来的章节将更详细地介绍每个参数。


    > **提示** 你可以在参数文件中的一行开头使用两个短横线 (`--`) 添加注释。


    请记住，GoldenGate 拥有的配置参数比这些示例中使用的要多得多。你可以参考 *GoldenGate Reference Guide* 来获取所有参数的详细描述。我通常会参考
    *GoldenGate Reference Guide* 中的“按字母顺序参考”部分来快速查找某个参数、它的含义以及各种选项。接下来的章节也会指出适用于 SQL
    Server 的任何参数差异。


    ##### EXTRACT


    你可以使用 Extract 参数来定义 GoldenGate Extract 组。你应该为你的 Extract 组名制定命名标准。良好的命名标准将帮助你一眼就识别出
    Extract 的用途以及它在何处运行。这在需要快速恢复故障复制的问题解决场景中尤其重要。Extract 组名的当前限制是八个字符。以下是你应在命名标准中包含的一些项目：


    *   进程的类型，例如 Extract、Data Pump 或 Replicat

    *   使用该进程的应用程序，例如人力资源、薪资、销售或计费

    *   进程运行的环境，例如开发或生产

    *   用于指示是否存在多个 Extract 或 Replicat 的数字标识


    在示例中，Extract 组被命名为 `LHREMD1`。让我们回顾一下如何得出这个 Extract 名称。*L* 指定它是本地 Extract。*HREM*
    指定你将此 Extract 组用于 HR 模式中的人力资源员工应用程序。*D* 表示你在开发环境中运行。最后，*1* 表示这是此模式和应用程序的第一个 Extract
    组。你可以添加额外的并行 Extract 组来提高性能，如 [第 7 章](#Chapter07.html#ch7) 中进一步讨论的那样。


    ##### SETENV


    你可以使用 `SETENV` 参数来覆盖默认的环境变量设置。在示例中，你显式地将 `NLS_LANG` 设置为 `AMERICAN_AMERICA.AL32UTF8`。设置
    `NLS_LANG` 而不是让它在不知情的情况下默认为你环境的设置是一个好主意。如果 `NLS_LANG` 不正确，可能会导致你的复制失败或复制无效数据。对于本地
    Extract，`NLS_LANG` 需要与源数据库字符集匹配。你可以运行如下 SQL 查询（适用于 Oracle）来确定你的 NLS 字符集：


    ```sql

    SQL> select * from v$nls_parameters where parameter like ''%NLS_CHARACTERSET%'';


    PARAMETER          VALUE

    ----------------- ----------

    NLS_CHARACTERSET   US7ASCII

    ```


    除了 `NLS_LANG` 之外，你还可以使用 `SETENV` 参数设置其他环境变量。例如，对于 Oracle 数据库，你可以按如下所示设置 `ORACLE_HOME`
    和 `ORACLE_SID`。在示例中，我选择使用 Oracle 网络 TNS 别名 `SourceDB` 来设置 Oracle 环境，而不是使用 `SETENV`。你也可以在进入
    GGSCI 之前设置 `ORACLE_HOME` 和 `ORACLE_SID`，而不使用 TNS 别名或 `SETENV`。只要变量值有效，这些方法都可以：


    ```plaintext

    SETENV (ORACLE_HOME = "/u01/app/oracle/product/11.1.0")

    SETENV (ORACLE_SID = "SourceDB")

    ```


    对于 SQL Server，你可以使用 `SETENV` 来指定 GoldenGate 在中止前尝试读取事务日志的次数以及重试之间的延迟时间：


    ```plaintext

    SETENV (GGS_CacheRetryCount = 25)

    SETENV (GGS_CacheRetryDelay = 2000)

    ```


    前面的示例告诉 GoldenGate 尝试读取 SQL Server 事务日志 25 次（默认为 10 次），并在每次尝试之间等待 2000 毫秒（默认为
    1000 毫秒）后再中止。'
  raw: '#### Verifying the Manager Status


    You may remember from [Chapter 2](#Chapter02.html#ch2) and [Chapter 3](#Chapter03.html#ch3)
    the discussion of the GoldenGate Manager process, which manages all of the GoldenGate
    processes and resources. Before you can start the Extract and Replicat processes,
    you need to verify that the GoldenGate Manager process is running on the source
    and target servers. You can''t start replication if the Manager isn''t running.
    For the basic replication configuration, the Manager parameter file on the source
    and target servers needs to contain the port number, as shown in the following
    example:


    `GGSCI (server) 1> edit params MGR`

    `-------------------------------------------------------------------`

    `-- GoldenGate Manager`

    `-------------------------------------------------------------------`

    `port 7840`


    [Chapter 5](#Chapter05.html#ch5) significantly expands on the use of Manager parameters,
    but this is fine for now. You can use the `INFO MGR` command to verify that the
    Manager is running:


    `GGSCI (sourceserver) 1> info manager`


    `Manager is running (IP port sourceserver.7840).`


    If the GoldenGate Manager isn''t running, you can start it using the following
    command:


    `GGSCI (sourceserver) 1> start manager`


    ![images](images/square.jpg) **Tip** Many of the GoldenGate commands have abbreviations
    to save time and keystrokes. For example, instead of the command `INFO MANAGER`,
    you can abbreviate it as `INFO MGR`. The `REPLICAT` keyword can be abbreviated
    as `REP` and `EXTRACT` can be abbreviated as `EXT`.


    Next, let''s move on to configuring the GoldenGate Local Extract.


    #### Configuring the Local Extract


    Now that you''ve made sure the Manager is running, let''s configure the Local
    Extract. In order to do this, you first need to create a parameter file for the
    Extract. Remember, for now, as the example, you''re configuring the local Extract
    to capture all the SQL DML changes from the sample HR schema.


    ![images](images/square.jpg) **Tip** You can edit the GoldenGate parameters directly
    from the GGSCI or using the native OS text editor outside of GGSCI, whichever
    is most convenient. To edit in GGSCI, you enter `EDIT PARAMS` *`paramterfilename`*.
    GGSCI brings up the parameter file in the default text editor, which is Notepad
    for Windows and vi for UNIX and Linux. You can change the default editor using
    the `SET EDITOR` command in GGSCI. If you''re editing directly from the OS, save
    the parameter file in the `/dirprm` subdirectory under the GoldenGate software
    installation directory. In the example, the parameter file directory is `/gger/ggs/dirprm`.


    Let''s start by looking at the parameters for the Local Extract, as shown in the
    following example:


    `GGSCI (sourceserver) 1> edit params LHREMD1`


    `Extract LHREMD1`


    `-------------------------------------------------------------------`

    `-- Local extract for HR schema`

    `-------------------------------------------------------------------`

    `SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)`


    `USERID GGER@SourceDB, PASSWORD userpw`


    `ExtTrail dirdat/l1`


    `Table HR.*;`


    The parameters and terminology may seem a little strange to you at first, but
    over time you get used to the format and usage. The next sections look at each
    of the parameters in more detail.


    ![images](images/square.jpg) **Tip** You can use two dashes (`--`) at the beginning
    of a line in the parameter file for comments.


    Keep in mind that GoldenGate has many more configuration parameters than are used
    in these examples. You can refer to the *GoldenGate Reference Guide* for a detailed
    description of all the parameters. I usually refer to the “Alphabetical Reference”
    section in the *GoldenGate Reference Guide* to quickly find a parameter, its meaning,
    and its various options. The following sections also point out any applicable
    parameter differences for SQL Server.


    ##### EXTRACT


    You can use the Extract parameter to define the GoldenGate Extract group. You
    should develop naming standards for your Extract group names. Having good naming
    standards will help you identify, at a glance, what the Extract is used for and
    where it''s running. This is especially important in problem-solving situations
    where you need to get downed replication up and running again quickly. The current
    limit for Extract group names is eight characters. Here are some items you should
    include in your naming standard:


    *   The type of process, such as Extract, Data Pump, or Replicat

    *   The application that is using the process, such as human resources, payroll,
    sales, or billing

    *   The environment where the process is running, such as development or production

    *   A numeric indicator to show if there are multiple Extracts or Replicats


    In the example, the Extract group is named LHREMD1\. Let''s review how you arrive
    at that Extract name. The *L* specifies it''s the Local Extract. *HREM* specifies
    that you''re using this Extract group for the human resources employee application
    in the HR schema. The *D* signifies that you''re running in the development environment.
    And finally, the *1* indicates this is the first Extract group for this schema
    and application. You can add additional parallel Extract groups to improve performance,
    as discussed further in [Chapter 7](#Chapter07.html#ch7).


    ##### SETENV


    You can use the `SETENV` parameter to override your default environment variable
    settings. In the example, you explicitly set `NLS_LANG` to `AMERICAN_AMERICA.AL32UTF8`.
    It''s a good idea to set `NLS_LANG` and not let it unknowingly default to your
    environment setting. If `NLS_LANG` is incorrect, it could cause your replication
    to fail or replicate invalid data. For the Local Extract, `NLS_LANG` needs to
    match the source database character set. You can run a SQL query such as the following
    for Oracle to determine your NLS character set:


    `SQL> select * from v$nls_parameters where parameter like ''%NLS_CHARACTERSET%'';`


    `PARAMETER          VALUE`

    `----------------- ----------`

    `NLS_CHARACTERSET   US7ASCII`


    You can set other environment variables in addition to `NLS_LANG` using the `SETENV`
    parameter. For example, with an Oracle database, you can set `ORACLE_HOME` and
    `ORACLE_SID` as shown next. In the example, I chose instead to set the Oracle
    environment using the Oracle network TNS alias `SourceDB` instead of using `SETENV`.
    You can also set `ORACLE_HOME` and `ORACLE_SID` prior to entering GGSCI and not
    use a TNS alias or `SETENV`. Any of these methods will work, as long as the variable
    values are valid:


    `SETENV (ORACLE_HOME = "/u01/app/oracle/product/11.1.0")`

    `SETENV (ORACLE_SID = "SourceDB")`


    For SQL Server, you can use `SETENV` to specify the number of times GoldenGate
    will try to read the transaction log before abending the time to delay between
    retries:


    `SETENV (GGS_CacheRetryCount = 25)`

    `SETENV (GGS_CacheRetryDelay = 2000)`


    The preceding example tells GoldenGate to try reading the SQL Server transaction
    log 25 times (default is 10) and to wait 2000 milliseconds (default is 1000) between
    each try before abending.'
