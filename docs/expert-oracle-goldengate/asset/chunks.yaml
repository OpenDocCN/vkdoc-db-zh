  trans: '

    ## 创建单向复制


    首次创建抽取时，您需要执行以下数据库任务，这些是 Director 客户端无法自动完成的：


    *   在源数据库上至少启用数据库级别的补充日志记录

    *   为源和目标上的 Oracle GoldenGate 用户授予适当的权限


    如果要记录额外的列变更数据，需要为抽取表添加跟踪数据。为此，再次右键单击数据源，然后选择“查看详细信息”。将打开如图 10-12 所示的对话框。单击“事务/重做日志数据”选项卡，然后单击“获取信息”。Director
    会插入默认的登录信息；如果需要其他架构，请在“数据库访问”部分更改登录信息，然后单击“获取信息”以刷新表列表。高亮显示要添加的表，然后单击“添加跟踪数据”（您可以按住
    Shift 键选择多个表）。


    ![images](img/1012.jpg)


    **图 10-12.** 添加跟踪数据。


    单击“添加跟踪数据”后，您可以选择要跟踪的列。如果要捕获所有列，请选择所有列并单击“确定”。


    现在可以创建抽取。右键单击要在其上运行抽取的数据源，然后选择“新建捕获”。唯一必填字段是“捕获名称”；所有其他字段将由 Director 填写。输入抽取名称
    ``EXTGGS1``。将数据库访问信息更改为您的实际信息。


    如果您的捕获是在 Oracle 真正应用集群（RAC）上，则需要使用 `threads` 属性修改抽取，如下所示在 GGSCI 中（`4` 表示四节点 RAC）：


    ```

    GGSCI> alter extract extggs1, translog, threads 4, begin now

    EXTRACT altered.

    ```


    创建抽取 ``EXTGGS1`` 后，右键单击图中的 ``EXTGGS1`` 图标，然后选择“新建跟踪文件”。输入如图 10-13 所示的跟踪文件选项，然后单击“确定”。您面板中的图表应如图
    10-14 所示。


    ![images](img/1013.jpg)


    **图 10-13.** 添加跟踪文件选项。


    ![images](img/1014.jpg)


    **图 10-14.** 完成的抽取任务图


    右键单击“跟踪”图标，然后选择“新建投递”。使用 ``REPGGS1`` 作为复制名称，并输入 `dirdat` 目录的完整路径。单击“确定”。现在您的图中共有六个图标，如图
    10-15 所示。


    ![images](img/1015.jpg)


    **图 10-15.** 完成的抽取和复制图


    与初始加载映射类似，使用“映射”图标添加要复制的表。最后，使用“参数文件编辑器”检查您的抽取和复制参数文件。确保您的参数文件类似于图 10-16 和图 10-17。


    ![images](img/1016.jpg)


    **图 10-16.** 抽取参数文件


    ![images](img/1017.jpg)


    **图 10-17.** 复制参数文件


    在 GGSCI 中，键入 `info all` 以确保 Director 已为您创建了两个组：


    ```

    GGSCI> info all

    Program     Status      Group       Lag           Time Since Chkpt


    MANAGER     RUNNING

    EXTRACT     STOPPED     EXTGGS1     00:00:00      01:18:10

    REPLICAT    STOPPED     REPGGS1     00:00:00      01:12:13

    ```


    一切就绪后，您可以从 Director 的抽取和复制图标或 GGSCI 启动抽取和复制。


    启动抽取和复制后，它们上面的叉号应该会消失。图标之间的连线从灰色变为绿色。延迟值也会显示在图标上。您可以转到 GGSCI 选项卡检查它们的状态，如图 10-18
    所示。单击“跟踪”图标；它还会显示当前的相对字节地址（RBA）和序列号。您可以随意向抽取和复制中添加新表；但请确保在任何更改后重新启动它们。


    ![images](img/1018.jpg)


    **图 10-18.** 运行抽取和复制


    ## 添加数据泵进程


    当两个系统不在同一服务器上时，使用 Oracle GoldenGate 数据泵进程是一种最佳实践，这样即使发生长时间中断，GoldenGate 进程也能在不丢失数据的情况下继续运行。要添加数据泵进程，请从数据源添加一个新的捕获，并将其命名为
    ``DPGGS1``。单击“确定”。然后，从抽取 ``DPGGS1`` 对象添加一个跟踪文件。数据泵跟踪文件的前缀为 `C2`，如图 10-19 所示。跟踪访问方式现在是
    TCP/IP，因为数据泵进程直接将跟踪文件发送到复制端的服务器。


    ![images](img/1019.jpg)


    **图 10-19.** 为数据泵进程添加跟踪文件


    使用“参数文件编辑器”删除登录信息，因为此数据泵不需要它，并添加 `passthru` 参数，如图 10-20 所示。您也可以在此处添加映射表，或使用 ``DPGGS1``
    参数界面的“映射”功能来添加。


    ![images](img/1020.jpg)


    **图 10-20.** 数据泵参数文件


    停止抽取 ``EXTGGS1``，等待延迟变为零，然后停止复制 ``REPGGS1``。在 GGSCI 中，更改抽取/复制以指向新的跟踪文件，如下所示：


    ```

    GGSCI> alter extract dpggs1, exttrailsource c:\ggs\dirdat\c1

    EXTRACT altered.


    GGSCI> alter replicat repggs1, exttrail c:\ggs\dirdat\c2

    REPLICAT altered.

    ```


    请注意，`exttrail` 路径在复制和抽取中必须完全匹配。例如，从 Director 的角度看，`.\dirdat\c1` 不等于 `c:\ggs\dirdat\c1`。但是，Oracle
    GoldenGate 进程会将它们视为相同并无误运行——只是您无法得到正确的图表，如图 10-21 所示。


    ![images](img/1021.jpg)


    **图 10-21.** 包含数据泵进程的完整流程


    启动抽取、数据泵和复制。您可能需要重新启动 Oracle GoldenGate 客户端才能看到具有正确绿线的图表。“刷新图表”功能有时不起作用。


    现在一切都在运行，正是检查抽取、复制和数据源图标的“查看详情”功能的好时机。右键单击每个图标，然后选择“查看详情”。这将为您执行一些 GGSCI 命令，例如
    `View report <组名>`、`info <组名>`、`lag extract <组名>`、`send <组名>` 等。


    ## 其他 Director 功能和技巧


    除了前面章节介绍的功能外，Director 还有许多其他功能。本节将介绍一些关键功能和技巧。阅读本节后，您将了解 Director 与 Oracle GoldenGate
    GGSCI 命令行相比能为您做些什么。


    ### 更改抽取或复制的运行选项


    Director 允许您更改抽取/复制的 `RUN` 选项。例如，假设您想重置抽取开始时间戳或复制序列号/RBA。为此，请单击图中的抽取/复制对象，然后选择“控制”
    ![images](img/U001.jpg) “运行选项”。抽取/复制必须处于停止状态才能调整这些选项。在生产环境中执行此操作前了解其过程非常重要，否则如果不慎跳过记录，可能会导致数据丢失。


    ### 更改跟踪文件大小


    如果 Oracle GoldenGate 生成的跟踪文件过多，将难以维护。过大的跟踪文件也有风险：如果大型跟踪文件损坏，您将丢失大量数据。如果源活动发生变化并影响跟踪文件生成速率，您需要监控并调整跟踪文件大小。要更改跟踪文件大小，请单击图中的“跟踪”对象，然后选择“控制”
    ![images](img/U001.jpg) “运行选项”。然后您可以输入新的跟踪文件大小。

