  trans: "\n### 执行迁移切换\n\n在迁移切换过程中，您将数据库应用程序从旧数据库切换到新数据库。应用程序切换到新数据库后，复制关系会反转回旧数据库，以支持回退。\n\
    \n本节将介绍使用 Oracle GoldenGate 复制切换到新数据库的步骤。为简化起见，迁移切换分为两个部分，每个部分包含若干步骤（参见图 13-4）。让我们从第\
    \ 1 部分开始。\n\n![images](img/1304.jpg)\n\n*图 13-4. 零停机迁移切换，第 1 部分*\n\n以下是图 13-4\
    \ 中所示步骤 1-4 的说明：\n\n1.  停止连接到旧数据库的应用程序。\n2.  确认没有延迟后，停止本地提取（Local Extract），如下例所示：\n\
    \    ```\n    GGSCI (oldserver) > LAG EXTRACT LPREMP1\n    Sending GETLAG request\
    \ to EXTRACT LPREMP1 ...\n    Last record lag: 10 seconds.\n    At EOF, no more\
    \ records to process.\n    GGSCI (oldserver) > STOP EXTRACT LPREMP1\n    ```\n\
    3.  确认没有延迟后，停止数据泵提取（data-pump Extract），如下所示：\n    ```\n    GGSCI (oldserver) >\
    \ LAG EXTRACT PPREMP1\n    Sending GETLAG request to EXTRACT PPREMP1 ...\n   \
    \ Last record lag: 6 seconds.\n    At EOF, no more records to process.\n    GGSCI\
    \ (oldserver) > STOP EXTRACT PPREMP1\n    ```\n4.  确认没有更多记录需要处理后，停止复制（Replicat），如下所示：\n\
    \    ```\n    GGSCI (newserver) > LAG REPLICAT RPREMP1\n    Sending GETLAG request\
    \ to REPLICAT RPREMP1 ...\n    Last record lag: 7 seconds.\n    At EOF, no more\
    \ records to process.\n    GGSCI (newserver) > STOP REPLICAT RPREMP1\n    ```\n\
    \n现在，应用程序不再使用旧数据库，并且从旧数据库到新数据库的复制已停止。您可以继续第 2 部分（参见图 13-5），启动回退提取（fallback Extract）并将应用程序切换到使用新数据库。\n\
    \n![images](img/1305.jpg)\n\n*图 13-5. 零停机迁移切换，第 2 部分*\n\n以下是图 13-5 中所示步骤 1-4 的说明：\n\
    \n1.  为了在应用程序切换前开始捕获对新数据库的更改，修改新数据库的本地提取以开始捕获更改，然后如下启动它：\n    ```\n    GGSCI (newserver)\
    \ > ALTER EXTRACT LPREMP2\\. BEGIN NOW\n\n    GGSCI (newserver) > START EXTRACT\
    \ LPREMP2\n    ```\n2.  为应用程序准备好新数据库，并启动连接到新数据库的应用程序。在准备过程中，您可能需要在新数据库上为应用程序用户授予一些\
    \ SQL 权限。同时，记得启用您在新数据库作为复制目标时可能已禁用的任何触发器或级联删除约束。\n3.  在新数据库上启动数据泵提取，如下例所示：\n \
    \   ```\n    GGSCI (oldserver) > START EXTRACT PPREMP2\n    ```\n4.  在旧数据库上启动复制，如下所示。在处理来自新数据库的\
    \ Oracle GoldenGate 更改之前，请确保禁用旧数据库上的任何触发器或级联删除约束：\n    ```\n    GGSCI (newserver)\
    \ > START REPLICAT RPREMP2\n    ```\n\n### 执行迁移回退\n\n完成迁移后，您可能会因为问题或其他原因决定需要回退到原始数据库。本节介绍回退所需的步骤。这些步骤分为两个部分：在第\
    \ 1 部分中，停止从新数据库到旧数据库的复制（参见图 13-6）；在第 2 部分中，重新启动从旧数据库到新数据库的复制，为下一次切换尝试做准备。\n\n\
    ![images](img/1306.jpg)\n\n*图 13-6. 零停机迁移回退，第 1 部分*\n\n以下是图 13-6 中所示步骤 1-4 的说明：\n\
    \n1.  停止在新数据库上运行的应用程序。此时，请确保保持本地提取运行，以便它可以捕获任何剩余的数据库事务。\n2.  确认没有延迟后，停止新数据库上的本地提取，如下例所示：\n\
    \    ```\n    GGSCI (newserver) > LAG EXTRACT LPREMP2\n    Sending GETLAG request\
    \ to EXTRACT LPREMP2 ...\n    Last record lag: 5 seconds.\n    At EOF, no more\
    \ records to process.\n    GGSCI (newserver) > STOP EXTRACT LPREMP2\n    ```\n\
    3.  确认没有延迟后，停止新数据库上的数据泵提取：\n    ```\n    GGSCI (newserver) > LAG EXTRACT PHREMD2\n\
    \    Sending GETLAG request to EXTRACT PHREMD2 ...\n    Last record lag: 4 seconds.\n\
    \    At EOF, no more records to process.\n    GGSCI (newserver) > STOP EXTRACT\
    \ PHREMD2\n    ```\n4.  确认没有更多记录需要处理后，停止旧数据库上的复制：\n    ```\n    GGSCI (oldserver)\
    \ > LAG REPLICAT RHREMD2\n    Sending GETLAG request to REPLICAT RHREMD2 ...\n\
    \    Last record lag: 6 seconds.\n    At EOF, no more records to process.\n  \
    \  GGSCI (oldserver) > STOP REPLICAT RHREMD2\n    ```\n\n现在，从新数据库到旧数据库的复制已完成并停止，您可以继续第\
    \ 2 部分，重新启动从旧数据库到新数据库的原始复制，如图 13-7 所示。\n\n![images](img/1307.jpg)\n\n*图 13-7.\
    \ 零停机迁移回退，第 2 部分*\n\n以下是图 13-7 中所示步骤 1-4 的说明：\n\n1.  为了在应用程序切换回旧数据库前开始捕获更改，修改旧数据库的本地提取以开始捕获更改，然后如下启动提取：\n\
    \    ```\n    GGSCI (oldserver) > ALTER EXTRACT LPREMP1, BEGIN NOW\n\n    GGSCI\
    \ (oldserver) > START EXTRACT LPREMP1\n    ```\n2.  为应用程序准备好旧数据库，并启动连接到旧数据库的应用程序。在准备过程中，您可能需要为应用程序用户授予一些\
    \ SQL 权限。同时，记得启用您在旧数据库作为复制目标时可能已禁用的任何触发器或级联删除约束。\n3.  在旧数据库上启动数据泵提取，如下例所示：\n \
    \   ```\n    GGSCI (oldserver) > START EXTRACT PPREMP1\n    ```\n4.  在新数据库上启动复制。在处理来自旧数据库的\
    \ Oracle GoldenGate 更改之前，请确保禁用新数据库上的任何触发器或级联删除约束：\n    ```\n    GGSCI (newserver)\
    \ > START REPLICAT RPREMP1\n    ```\n\n数据库已恢复其原始配置，并在任何问题解决后准备好进行下一次切换尝试。\n\n\
    ### 总结\n\n本章介绍了如何设置和配置 Oracle GoldenGate 复制以支持零停机数据库迁移场景。首先，您设置了从旧数据库到新数据库的正向和反向复制的基本\
    \ Oracle GoldenGate 进程。然后，您了解了如何配置 Oracle GoldenGate 以支持切换到新数据库，并在需要时回退到旧数据库。关于零停机迁移的额外参考资料，Oracle\
    \ 在 Oracle 技术网络网站上提供了一份题为 *使用 Oracle GoldenGate 实现零停机数据库升级* 的白皮书，网址为 [`www.oracle.com/technetwork/middleware/goldengate/overview/ggzerodowntimedatabaseupgrades-174928.pdf`](http://www.oracle.com/technetwork/middleware/goldengate/overview/ggzerodowntimedatabaseupgrades-174928.pdf)。\n\
    \n下一章将介绍一些 Oracle GoldenGate 的技巧和窍门，帮助您以最佳方式设置和管理您的 Oracle GoldenGate 复制环境。\n\n\
    ## 第 14 章\n"
- fmt: '## Tips and Tricks


    Over the years of using `GoldenGate`, we’ve learned a number of helpful tips and
    tricks. This chapter looks at some that you can use when you’re setting up and
    managing `GoldenGate` replication. These suggestions should save you time in getting
    your environment up and running in the best possible fashion. Keep in mind that
    these tips are based on many different experiences, and they will generally give
    the best results. However, systems have different needs and requirements, so these
    shortcuts may not be applicable in your case. Also keep in mind that the tips
    and tricks will change over time as `GoldenGate` and the technology evolve. You
    should always consult the standard `Oracle GoldenGate` product documentation,
    which is the official guide for using the product.


    ### Requirements and Planning


    This section is focused on preparing for your `GoldenGate` replication setup.
    This process is often shortchanged or skipped altogether, which later results
    in mistakes that end up costing more in the long run. You should ensure that your
    project devotes proper time and focus to gathering and understanding requirements
    and that all the stakeholders approve of the requirements. As with all projects,
    carefully planning the replication project helps ensure its success.


    #### Knowing the Business Objectives


    It’s important for you to have a clear understanding of the business objectives
    for setting up `GoldenGate`. The business objectives drive many of the technical
    decisions around the replication setup. For example, if the business objectives
    can be achieved with one-way replication instead of bidirectional replication,
    the technical complexity is greatly reduced.


    You can start by having an informal whiteboard session with the key team members
    and review the proposed scope and objectives for the replication. You can even
    begin to sketch out the high-level replication scenarios and flow so everyone
    understands what’s involved. After that, you can formalize the rough-draft business
    objectives, share them with the team members, and ask for feedback. Finally, the
    project scope and objectives should be reviewed and approved by the major stakeholders.


    Here are just a few examples of business objectives you can achieve with `GoldenGate`:


    *   Minimize downtime while migrating from Oracle database 10g to Oracle 11g.

    *   Create an integrated database made up of sales, customer, and product data
    into a new, read-only database for analysis and reporting.

    *   Offload intensive query and reporting activity from the primary OLTP database.

    *   Keep a copy of the primary database synchronized at an offsite location for
    disaster-recovery purposes.

    *   Create an enterprise data warehouse for business users with near real time
    data integrated from multiple heterogeneous source databases.

    *   Minimize downtime while moving to a new platform and ensuring that a backout
    plan is available.


    #### Understanding the Requirements


    You need to gain a solid understanding of the specific requirements that will
    drive the replication technical design. Here are some of the factors that impact
    the replication design:


    *   `Source and target configurations:` Describe the existing or planned source
    and target databases. What are the software releases for the database and operating
    system? Are the servers stand-alone or clustered? How is the data storage configured?
    What are the character sets for the source and target databases?

    *   `Data currency`: How quickly and how often does the data need to be updated?
    Can any lag in the data replication be tolerated? If no lag can be tolerated and
    there is a high volume of changes, you may need to devote more time in the project
    to designing and tuning the replication to avoid any lag. Keep in mind that often,
    reporting systems can tolerate lag, and the target data doesn’t need to be completely
    up-to-date with the source.

    *   `Data volume`: How much data needs to be replicated? How often is it updated?
    You may be able to examine the existing database-transaction log files to determine
    the amount of data change that is occurring in the source database. The data-change
    volume impacts the network bandwidth requirements between the source and target
    and the amount of disk space required for trail files.

    *   `Data requirements`: You should understand any unique or special data requirements
    so they can be handled properly in `GoldenGate`. For example, if there are triggers,
    they may need to be disabled in the target database. Sequences need special parameters
    added if they need to be replicated. Certain data types may need special handling
    or may not be supported. For example, in `GoldenGate 11`, data types such as `BFILE`
    and `ANYDATA` aren’t supported. Other data types may be supported but with certain
    limitations. *(Be sure to check the `Oracle GoldenGate` product documentation
    for a list of data types supported.)*

    *   `Security requirements:` How much security is required? For example, is it
    necessary to encrypt the data `GoldenGate` is replicating? `GoldenGate` can encrypt
    both the data stored in trail files as well as the data being sent from the source
    to the target. Also, is the data in the database encrypted? For example, Oracle
    can encrypt database data using a feature called `Transparent Data Encryption
    (TDE)`. If the database is using `TDE`, `GoldenGate` needs special parameters
    to unencrypt the data for replication. Finally, `GoldenGate` itself requires security
    to install and own the `GoldenGate` software and execute the replication inside
    the database. You need to plan for this and ensure that your organization allows
    the new users and security access required for `GoldenGate`.

    *   `Network requirements:` Describe the network between the source and the target.
    Are there any firewalls that need to be opened for the replication? What is the
    distance? How much bandwidth is required for the replication, and how much is
    available?


    #### Determining the Topology


    As discussed in [Chapter 3](#Chapter03.html#ch3), “Architecture,” `GoldenGate`
    supports many different topologies. Each topology has its own unique requirements
    and complexities. Determining the topology as soon as possible can help drive
    the technical requirements and design. For example, a one-way replication topology
    is much simpler to set up than bidirectional replication. Replication involving
    a single source and target database is easier to set up than a single source and
    multiple target databases.


    ### Installation and Setup


    Now, let’s look at some tips and tricks related to `GoldenGate` installation and
    setup. These include suggestions for setting up users, specifying `Extract` and
    `Replicat` parameters, and naming standards.


    #### Creating Dedicated Users


    You may be tempted to simply use the existing database and operating-system users
    for `GoldenGate`. Instead, you should create dedicated operating-system and database
    users only for use with `GoldenGate`. Doing so ensures that any activity from
    `GoldenGate` users can be tracked separately. If there is a database performance
    issue, for example, you can isolate activity from the `GoldenGate` database user
    to determine if it’s causing a problem. Some example user names are `gger`, `gguser`,
    `ggate`, and so on.


    Depending on your platform, `GoldenGate` users may require some elevated privileges
    that often are reserved for the DBA team. For example, with `Microsoft SQL Server`,
    a user with the `System Administrators` role is required for the `Extract` process.
    You need to determine, based on your organization’s security requirements, whether
    the `GoldenGate` user should belong to the DBA team or a separate team. If the
    `GoldenGate` user ID isn’t owned by the DBA team, then the `GoldenGate` responsibilities
    need to be divided between the DBA team and the `GoldenGate` team based on security
    required.'
