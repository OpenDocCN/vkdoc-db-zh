- fmt: "### Performing the Migration Cutover\n\nDuring the migration cutover, you\
    \ switch your database application from the old database to the new database.\
    \ After the application is cutover to the new database, replication is reversed\
    \ back to the old database to allow for fallback.\n\nThis section goes through\
    \ the steps using Oracle GoldenGate replication to cutover to the new database.\
    \ To keep it simple, the migration cutover is divided into two parts, each with\
    \ several steps (see [Figure 13-4](#Chapter13.html#fig_13_4)). Let's begin with\
    \ part 1.\n\n![images](images/1304.jpg)\n\n*Figure 13-4. Zero-downtime migration\
    \ cutover, part 1*\n\nFollowing are descriptions for steps 1-4 as shown in [Figure\
    \ 13-4](#Chapter13.html#fig_13_4):\n\n1.  Stop the application connected to the\
    \ old database.\n2.  After verifying that there is no lag, stop the Local Extract\
    \ as shown in the following example:\n    ```\n    GGSCI (oldserver) > LAG EXTRACT\
    \ LPREMP1\n    Sending GETLAG request to EXTRACT LPREMP1 ...\n    Last record\
    \ lag: 10 seconds.\n    At EOF, no more records to process.\n    GGSCI (oldserver)\
    \ > STOP EXTRACT LPREMP1\n    ```\n3.  After verifying that there is no lag, stop\
    \ the data-pump Extract as shown here:\n    ```\n    GGSCI (oldserver) > LAG EXTRACT\
    \ PPREMP1\n    Sending GETLAG request to EXTRACT PPREMP1 ...\n    Last record\
    \ lag: 6 seconds.\n    At EOF, no more records to process.\n    GGSCI (oldserver)\
    \ > STOP EXTRACT PPREMP1\n    ```\n4.  After verifying that there are no more\
    \ records to process, stop the Replicat as shown here:\n    ```\n    GGSCI (newserver)\
    \ > LAG REPLICAT RPREMP1\n    Sending GETLAG request to REPLICAT RPREMP1 ...\n\
    \    Last record lag: 7 seconds.\n    At EOF, no more records to process.\n  \
    \  GGSCI (newserver) > STOP REPLICAT RPREMP1\n    ```\n\nNow the old database\
    \ is no longer being used by the application, and the replication from the old\
    \ database to the new database is stopped. You can proceed to part 2 (see [Figure\
    \ 13-5](#Chapter13.html#fig_13_5)) and start the fallback Extract and switch the\
    \ application to use the new database.\n\n![images](images/1305.jpg)\n\n*Figure\
    \ 13-5. Zero-downtime migration cutover, part 2*\n\nFollowing are descriptions\
    \ for steps 1-4 as shown in [Figure 13-5](#Chapter13.html#fig_13_5):\n\n1.  To\
    \ begin capturing changes made to the new database in preparation for the application\
    \ cutover, alter the Local Extract for the new database to begin capturing changes\
    \ and then start it as follows:\n    ```\n    GGSCI (newserver) > ALTER EXTRACT\
    \ LPREMP2\\. BEGIN NOW\n\n    GGSCI (newserver) > START EXTRACT LPREMP2\n    ```\n\
    2.  Prepare the new database for the application, and start the application connected\
    \ to the new database. In preparation, you may need to grant some SQL permissions\
    \ to your application users on the new database. Also remember to enable any triggers\
    \ or cascade-delete constraints you may have stopped while the new database was\
    \ the replication target.\n3.  Start the data-pump Extract on the new database\
    \ as shown in the following example:\n    ```\n    GGSCI (oldserver) > START EXTRACT\
    \ PPREMP2\n    ```\n4.  Start the Replicat on the old database as shown next.\
    \ Make sure to disable any triggers or cascade-delete constraints on the old database\
    \ before processing the Oracle GoldenGate changes from the new database:\n   \
    \ ```\n    GGSCI (newserver) > START REPLICAT RPREMP2\n    ```\n\n### Performing\
    \ the Migration Fallback\n\nAfter completing the migration, you may decide you\
    \ need to revert back to your original database due to problems or for other reasons.\
    \ This section covers the steps necessary to fall back. These steps are divided\
    \ into two parts: in part 1, you stop the replication from the new database back\
    \ to the old database (see [Figure 13-6](#Chapter13.html#fig_13_6)); and in part\
    \ 2, you start the replication back up again from the old database to the new\
    \ database in preparation for the next cutover attempt.\n\n![images](images/1306.jpg)\n\
    \n*Figure 13-6. Zero-downtime migration fallback, part 1*\n\nFollowing are descriptions\
    \ for steps 1-4 as shown in [Figure 13-6](#Chapter13.html#fig_13_6):\n\n1.  Stop\
    \ the application running against the new database. At this time, be sure to leave\
    \ the Local Extract running so it can capture any remaining database transactions.\n\
    2.  After verifying that there is no lag, stop the Local Extract on the new database\
    \ as shown in the following example:\n    ```\n    GGSCI (newserver) > LAG EXTRACT\
    \ LPREMP2\n    Sending GETLAG request to EXTRACT LPREMP2 ...\n    Last record\
    \ lag: 5 seconds.\n    At EOF, no more records to process.\n    GGSCI (newserver)\
    \ > STOP EXTRACT LPREMP2\n    ```\n3.  After verifying that there is no lag, stop\
    \ the data-pump Extract on the new database:\n    ```\n    GGSCI (newserver) >\
    \ LAG EXTRACT PHREMD2\n    Sending GETLAG request to EXTRACT PHREMD2 ...\n   \
    \ Last record lag: 4 seconds.\n    At EOF, no more records to process.\n    GGSCI\
    \ (newserver) > STOP EXTRACT PHREMD2\n    ```\n4.  After verifying that there\
    \ are no more records to process, stop the Replicat on the old database:\n   \
    \ ```\n    GGSCI (oldserver) > LAG REPLICAT RHREMD2\n    Sending GETLAG request\
    \ to REPLICAT RHREMD2 ...\n    Last record lag: 6 seconds.\n    At EOF, no more\
    \ records to process.\n    GGSCI (oldserver) > STOP REPLICAT RHREMD2\n    ```\n\
    \nNow that the replication from the new database to the old database is complete\
    \ and stopped, you can proceed with restarting the original replication from the\
    \ old database to the new database in part 2, as shown in [Figure 13-7](#Chapter13.html#fig_13_7).\n\
    \n![images](images/1307.jpg)\n\n*Figure 13-7. Zero-downtime migration fallback,\
    \ part 2*\n\nFollowing are descriptions for steps 1-4 as shown in [Figure 13-7](#Chapter13.html#fig_13_7):\n\
    \n1.  To begin capturing changes in preparation for the application switchover\
    \ back to the old database, alter the Local Extract for the old database to begin\
    \ capturing changes and then start the Extract as follows:\n    ```\n    GGSCI\
    \ (oldserver) > ALTER EXTRACT LPREMP1, BEGIN NOW\n\n    GGSCI (oldserver) > START\
    \ EXTRACT LPREMP1\n    ```\n2.  Prepare the old database for the application,\
    \ and start the application connected to the old database. In preparation, you\
    \ may need to grant some SQL permissions to your application users. Also remember\
    \ to enable any triggers or cascade-delete constraints you may have stopped while\
    \ the old database was the replication target.\n3.  Start the data-pump Extract\
    \ on the old database, as shown in the following example:\n    ```\n    GGSCI\
    \ (oldserver) > START EXTRACT PPREMP1\n    ```\n4.  Start the the Replicat on\
    \ the new database. Make sure to disable any triggers or cascade-delete constraints\
    \ on the new database before processing the Oracle GoldenGate changes from the\
    \ old database:\n    ```\n    GGSCI (newserver) > START REPLICAT RPREMP1\n   \
    \ ```\n\nThe databases are back to their original configuration and ready for\
    \ the next cutover attempt after any issues are resolved.\n\n### Summary\n\nThis\
    \ chapter covered how to set up and configure Oracle GoldenGate replication to\
    \ support a zero-downtime database migration scenario. First you set up the basic\
    \ Oracle GoldenGate processes for forward and reverse replication from the old\
    \ to the new databases. Then, you saw how to configure Oracle GoldenGate to support\
    \ the migration cutover to the new database and also fall back to the old database\
    \ if needed. For an additional reference on zero-downtime migrations, Oracle has\
    \ a whitepaper titled *Zero-Downtime Database Upgrades Using Oracle GoldenGate*\
    \ available on the Oracle Technology Network website, [`www.oracle.com/technetwork/middleware/goldengate/overview/ggzerodowntimedatabaseupgrades-174928.pdf`](http://www.oracle.com/technetwork/middleware/goldengate/overview/ggzerodowntimedatabaseupgrades-174928.pdf).\n\
    \nThe next chapter covers some Oracle GoldenGate tips and tricks to help you set\
    \ up and manage your Oracle GoldenGate replication environment in the best possible\
    \ manner.\n\n## Chapter 14"
