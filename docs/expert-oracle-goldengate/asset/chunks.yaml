    ## 第 6 章'
- fmt: '## Heterogeneous Replication


    In previous chapters we discussed how to install and configure basic replication
    for an Oracle 11g GoldenGate environment. Based on experiences in the field at
    customer sites, most implementations for Oracle 11g GoldenGate involve complex
    heterogeneous environments with multiple platforms and database vendors. For instance,
    while implementing a recent configuration for a large telecommunications customer,
    we had to install and configure Oracle GoldenGate to replicate data from a Microsoft
    SQL Server 2005 data warehouse running under Microsoft Windows 2003 Server to
    an Oracle 11g data warehouse system on Linux. Before Oracle GoldenGate existed,
    data replication between different platforms and RDBMS systems was problematic
    at best and nigh well impossible at worst. It involved hundreds of man hours to
    create custom scripts and development to take advantage of poorly documented system-level
    APIs, and even then it was a crapshoot. Well, fret no more! With Oracle GoldenGate,
    the challenge of replicating data in real time between different platforms and
    databases is a cake walk by comparison. It is more difficult than basic replication
    setups for Oracle GoldenGate that only require that the data be replicated between
    like platforms such as from Oracle 10g to Oracle 11g environments. However, we
    will show you how to set up heterogeneous environments in the easiest manner possible.
    You will learn how to prepare the environment from source to target database configurations
    as well as administration tasks involved with heterogeneous replication with Oracle
    GoldenGate environments.


    Since heterogeneous replication can involve a large variety of third-party database
    platforms, the amount of time and space to address each configuration would fill
    a volume in and of itself. As such, we have chosen to present a case study example
    of common platforms that we have implemented for customers in the field. Our case
    study will provide information on how to configure and implement heterogeneous
    replication for Oracle to Microsoft SQL Server. The first task in setting up heterogeneous
    replication for Oracle GoldenGate involves consultation of the Oracle GoldenGate
    documentation with a focus on review of the Oracle GoldenGate release notes to
    find up-to-date changes in heterogeneous replication with Oracle GoldenGate.


    ### Microsoft SQL Server to Oracle Replication


    Microsoft SQL Server is one of the most popular and widely known RDBMS platforms
    for small to mid-size corporate database environments for back-office operations.
    However, it does not scale well based on our experiences for large enterprise
    data warehouse environments that migrate to massive terabyte and even petabyte
    environments. As such, companies today look to migrating off of their smaller
    Microsoft SQL Server environments to Oracle for the robust performance that Oracle
    can provide. You can verify the currently supported third-party database platforms
    that Oracle 11g GoldenGate supports by logging into the My Oracle Support (MOS)
    site online at [`http://support.oracle.com`](http://support.oracle.com) with a
    valid customer account (CSI) number and checking the certification matrix as shown
    in [Figure 6-1](#Chapter06.html#fig_6_1).


    ![images](images/0601.jpg)


    **Figure 6-1.** My Oracle Support certification matrix


    Currently, Oracle GoldenGate replication from Microsoft SQL Server to Oracle is
    supported with the versions shown in [Table 6-1](#Chapter06.html#tab_6_1).


    ![images](images/t0601.jpg)


    #### Preparing the Oracle GoldenGate Environments


    You will first need to install the Oracle 11g GoldenGate software on the source
    Oracle and target Microsoft SQL Server environments. Be sure to install the sample
    database schemas and scripts included with GoldenGate and these database platforms.


    #### Initial Data Load Completion for Oracle GoldenGate Environments


    Before we can set up the Oracle GoldenGate process groups for Extract, data pump,
    and Replicat on the source and target environments, we need to load the sample
    data on both source and target systems. This is called the initial data load and,
    unfortunately, Oracle GoldenGate has no built-in procedure to automate this task.
    You can use a variety of vendor-supplied utilities for Oracle and Microsoft SQL
    Server. For Oracle, you can perform an export/import or data pump export and import.
    For Microsoft SQL Server, you can use the Microsoft native `BCP` and `DTS` bulk
    load utilities or perform a direct load with Replicat.


    #### Source Oracle Database Configuration


    Before you can replicate data to the target Micrososft SQL Server database environment,
    there are a number of preliminary setups that must be performed. Let’s walk through
    each of these procedures.


    Create the Manager parameter file on the source Oracle system and specify the
    port that it should use.


    ```

    $ cd /ggs/source

    $ ggsci

    GGSCI> EDIT PARAMS MGR

    ```


    ```

    --GoldenGate Manager parameter file

    PORT 50001

    ```


    Start the Manager process.


    ```

    GGSCI> START MGR

    ```


    Verify that the Manager process has started.


    ```

    GGSCI> INFO MGR

    Manager is running (IP port oracledba.50001).

    ```


    Log in to the Oracle source database as the `scott` user. Create and populate
    the `SCOTT.EMP` and `SCOTT.DEPT` tables with sample data. Perform a `CREATE TABLE
    AS SELECT` to copy the table data to the `GGS` user schema. Next, by using `GGSCI`,
    you will need to log in to the source Oracle database and turn on supplemental
    logging for the `EMP` and `DEPT` tables for the `SCOTT` user schema. Supplemental
    logging must be enabled within the database environment so that changes made to
    data in the tables are captured during DML operations such as whenever `Insert`
    or `Updates` are performed against the tables for Oracle.


    ```

    $ ggsci

    GGSCI> DBLOGIN USERID GGS

    GGSCI> ADD TRANDATA GGS.EMP

    GGSCI> ADD TRANDATA GGS.DEPT

    ```


    Next, you will need to verify that supplemental logging has been turned on for
    these tables.


    ```

    GGSCI> INFO TRANDATA GGS.*

    Logging of supplemental redo data enabled for table GGS.DEPT.


    2011-04-03 22:31:21  WARNING OGG-00869  No unique key is defined for table EMP.
    All viable columns will be used to represent the key, but may not guarantee uniqueness.  KEYCOLS
    may be used to define the key.


    Logging of supplemental redo data enabled for table GGS.EMP.

    ```


    This warning is very important to keep in mind when you set up the GoldenGate
    environment since GoldenGate requires either a primary or unique key to be defined
    for tables in order to identify unique key columns as part of replication processing.
    Otherwise, all of the columns will be used thereby affecting performance adversely.


    ##### Configure Source Definition on Source Oracle Database System


    The next step is to perform the source definition file creation mapping with the
    following commands on the source Oracle database system to create the `DEFGEN`
    parameter file and to add the additional parameters given below.


    ```

    $ cd /ggs/

    $ ggsci

    GGSCI> edit param defgen

    ```


    ```

    DEFSFILE dirdef/source.def, PURGE

    USERID GGS, PASSWORD xxxx

    TABLE GGS.EMP;

    TABLE GGS.DEPT;

    ```


    ```

    GGSCI> exit

    ```


    ##### Execute the Source Definition Generator on the Oracle Source System


    Execute the `defgen` commands on the source Oracle database system.


    ```

    $ defgen paramfile dirprm/defgen.prm

    ```


    ##### Transfer the Source Definition File to the Target Microsoft SQL Server System


    ```

    $ ftp mssql2k8

    Password: xxxxx

    ftp> ascii

    ftp> cd ggs/dirdef

    ftp> lcd ggs/dirdef

    ```


    Now that we have configured the Oracle source database system for Oracle GoldenGate,
    we will discuss how to set up the target environment to replicate data from Oracle
    to Microsoft SQL Server.'
  raw: '## Heterogeneous Replication


    In previous chapters we discussed how to install and configure basic replication
    for an Oracle 11g GoldenGate environment. Based on experiences in the field at
    customer sites, most implementations for Oracle 11g GoldenGate involve complex
    heterogeneous environments with multiple platforms and database vendors. For instance,
    while implementing a recent configuration for a large telecommunications customer,
    we had to install and configure Oracle GoldenGate to replicate data from a Microsoft
    SQL Server 2005 data warehouse running under Microsoft Windows 2003 Server to
    an Oracle 11g data warehouse system on Linux. Before Oracle GoldenGate existed,
    data replication between different platforms and RDBMS systems was problematic
    at best and nigh well impossible at worst. It involved hundreds of man hours to
    create custom scripts and development to take advantage of poorly documented system-level
    APIs, and even then it was a crapshoot. Well, fret no more! With Oracle GoldenGate,
    the challenge of replicating data in real time between different platforms and
    databases is a cake walk by comparison. It is more difficult than basic replication
    setups for Oracle GoldenGate that only require that the data be replicated between
    like platforms such as from Oracle 10g to Oracle 11g environments. However, we
    will show you how to set up heterogeneous environments in the easiest manner possible.
    You will learn how to prepare the environment from source to target database configurations
    as well as administration tasks involved with heterogeneous replication with Oracle
    GoldenGate environments.


    Since heterogeneous replication can involve a large variety of third-party database
    platforms, the amount of time and space to address each configuration would fill
    a volume in and of itself. As such, we have chosen to present a case study example
    of common platforms that we have implemented for customers in the field. Our case
    study will provide information on how to configure and implement heterogeneous
    replication for Oracle to Microsoft SQL Server. The first task in setting up heterogeneous
    replication for Oracle GoldenGate involves consultation of the Oracle GoldenGate
    documentation with a focus on review of the Oracle GoldenGate release notes to
    find up-to-date changes in heterogeneous replication with Oracle GoldenGate.


    ### Microsoft SQL Server to Oracle Replication


    Microsoft SQL Server is one of the most popular and widely known RDBMS platforms
    for small to mid-size corporate database environments for back-office operations.
    However, it does not scale well based on our experiences for large enterprise
    data warehouse environments that migrate to massive terabyte and even petabyte
    environments. As such, companies today look to migrating off of their smaller
    Microsoft SQL Server environments to Oracle for the robust performance that Oracle
    can provide. You can verify the currently supported third-party database platforms
    that Oracle 11g GoldenGate supports by logging into the My Oracle Support (MOS)
    site online at [`http://support.oracle.com`](http://support.oracle.com) with a
    valid customer account (CSI) number and checking the certification matrix as shown
    in [Figure 6-1](#Chapter06.html#fig_6_1).


    ![images](images/0601.jpg)


    ***Figure 6-1.** My Oracle Support certification matrix*


    Currently, Oracle GoldenGate replication from Microsoft SQL Server to Oracle is
    supported with the versions shown in [Table 6-1](#Chapter06.html#tab_6_1).


    ![images](images/t0601.jpg)


    #### Preparing the Oracle GoldenGate Environments


    You will first need to install the Oracle 11g GoldenGate software on the source
    Oracle and target Microsoft SQL Server environments. Be sure to install the sample
    database schemas and scripts included with GoldenGate and these database platforms.


    #### Initial Data Load Completion for Oracle GoldenGate Environments


    Before we can set up the Oracle GoldenGate process groups for Extract, data pump,
    and Replicat on the source and target environments, we need to load the sample
    data on both source and target systems. This is called the initial data load and,
    unfortunately, Oracle GoldenGate has no built-in procedure to automate this task.
    You can use a variety of vendor-supplied utilities for Oracle and Microsoft SQL
    Server. For Oracle, you can perform an export/import or data pump export and import.
    For Microsoft SQL Server, you can use the Microsoft native BCP and DTS bulk load
    utilities or perform a direct load with Replicat.


    #### Source Oracle Database Configuration


    Before you can replicate data to the target Micrososft SQL Server database environment,
    there are a number of preliminary setups that must be performed. Let’s walk through
    each of these procedures.


    Create the Manager parameter file on the source Oracle system and specify the
    port that it should use.


    `$ cd /ggs/source`

    `$ ggsci`

    `GGSCI> EDIT PARAMS MGR`


    `--GoldenGate Manager parameter file`

    `PORT 50001`


    Start the Manager process.


    `GGSCI> START MGR`


    Verify that the Manager process has started.


    `GGSCI> INFO MGR`

    `Manager is running (IP port oracledba.50001).`


    Log in to the Oracle source database as the scott user. Create and populate the
    `SCOTT.EMP` and `SCOTT.DEPT` tables with sample data. Perform a CREATE TABLE AS
    SELECT to copy the table data to the GGS user schema. Next, by using GGSCI, you
    will need to log in to the source Oracle database and turn on supplemental logging
    for the `EMP` and `DEPT` tables for the `SCOTT` user schema. Supplemental logging
    must be enabled within the database environment so that changes made to data in
    the tables are captured during DML operations such as whenever Insert or Updates
    are performed against the tables for Oracle.


    `$ ggsci`

    `GGSCI> DBLOGIN USERID GGS`

    `GGSCI> ADD TRANDATA GGS.EMP`

    `GGSCI> ADD TRANDATA GGS.DEPT`


    Next, you will need to verify that supplemental logging has been turned on for
    these tables.


    `GGSCI> INFO TRANDATA GGS.*`

    `Logging of supplemental redo data enabled for table GGS.DEPT.`


    `2011-04-03 22:31:21  WARNING OGG-00869  No unique key is defined for table EMP.
    All viable columns will be used to represent the key, but may not guarantee uniqueness.  KEYCOLS
    may be used to define the key.`


    `Logging of supplemental redo data enabled for table GGS.EMP.`

    `This warning is very important to keep in mind when you set up the GoldenGate
    environment since GoldenGate requires either a primary or unique key to be defined
    for tables in order to identify unique key columns as part of replication processing.
    Otherwise, all of the columns will be used thereby affecting performance adversely.`


    ##### Configure Source Definition on Source Oracle Database System


    The next step is to perform the source definition file creation mapping with the
    following commands on the source Oracle database system to create the DEFGEN parameter
    file and to add the additional parameters given below.


    `$ cd /ggs/$ ggsci`

    `GGSCI> edit param defgen`

    `DEFSFILE dirdef/source.def, PURGE`

    `USERID GGS, PASSWORD xxxx`

    `TABLE GGS.EMP;`

    `TABLE GGS.DEPT;`

    `GGSCI> exit`


    ##### Execute the Source Definition Generator on the Oracle Source System


    Execute the defgen commands on the source Oracle database system.


    `$ defgen paramfile dirprm/defgen.prm`


    ##### Transfer the Source Definition File to the Target Microsoft SQL Server System


    `$ ftp mssql2k8`

    `Password: xxxxx`

    `ftp> ascii`

    `ftp> cd ggs/dirdef`

    `ftp> lcd ggs/dirdef`


    Now that we have configured the Oracle source database system for Oracle GoldenGate,
    we will discuss how to set up the target environment to replicate data from Oracle
    to Microsoft SQL Server.'
  trans: '## 异构复制


    在之前的章节中，我们讨论了如何为 Oracle 11g GoldenGate 环境安装和配置基本复制。根据在客户现场的实践经验，大多数 Oracle 11g
    GoldenGate 的实施都涉及复杂的异构环境，其中包含多个平台和数据库供应商。例如，在为一个大型电信客户实施近期配置时，我们必须安装和配置 Oracle
    GoldenGate，以便将数据从运行于 Microsoft Windows 2003 Server 上的 Microsoft SQL Server 2005
    数据仓库，复制到运行于 Linux 上的 Oracle 11g 数据仓库系统。在 Oracle GoldenGate 出现之前，不同平台和 RDBMS 系统之间的数据复制往好了说问题重重，往坏了说几乎不可能。这需要耗费数百个工时来创建自定义脚本，并开发以利用那些文档匮乏的系统级
    API，即便如此，结果也难以预料。不过，现在无需再为此烦恼了！有了 Oracle GoldenGate，实现不同平台和数据库间实时数据复制的任务相比之下变得**轻而易举**。这当然比仅为类似平台（如从
    Oracle 10g 到 Oracle 11g 环境）之间复制数据的 Oracle GoldenGate 基本复制设置要复杂一些。然而，我们将向您展示如何以最简单的方式设置异构环境。您将学习如何从源数据库到目标数据库配置环境，以及与使用
    Oracle GoldenGate 进行异构复制相关的管理任务。


    由于异构复制可能涉及多种多样的第三方数据库平台，要逐一讨论每种配置所需的时间和篇幅本身就足以写成一本书。因此，我们选择呈现一个案例研究示例，涵盖我们在客户现场实施的常见平台。我们的案例研究将提供如何配置和实现从
    Oracle 到 Microsoft SQL Server 的异构复制的信息。为 Oracle GoldenGate 设置异构复制的第一项任务是查阅 Oracle
    GoldenGate 文档，重点审阅 Oracle GoldenGate 发行说明，以了解 Oracle GoldenGate 在异构复制方面的最新变化。


    ### Microsoft SQL Server 到 Oracle 复制


    Microsoft SQL Server 是中小型公司后台业务数据库环境中最流行且广为人知的 RDBMS 平台之一。然而，根据我们的经验，对于迁移到海量 TB
    甚至 PB 级别的大型企业数据仓库环境，其扩展性并不理想。因此，如今的公司倾向于将其较小的 Microsoft SQL Server 环境迁移到 Oracle，以获取
    Oracle 可以提供的强大性能。您可以登录 My Oracle Support (MOS) 网站（[`http://support.oracle.com`](http://support.oracle.com)），使用有效的客户账户
    (CSI) 号，并查看认证矩阵（如图 6-1 所示），来验证 Oracle 11g GoldenGate 当前支持的第三方数据库平台。


    ![images](img/0601.jpg)


    **图 6-1.** My Oracle Support 认证矩阵


    目前，从 Microsoft SQL Server 到 Oracle 的 Oracle GoldenGate 复制支持表 6-1 中所示的版本。


    ![images](img/t0601.jpg)


    #### 准备 Oracle GoldenGate 环境


    您首先需要在源 Oracle 环境和目标 Microsoft SQL Server 环境上安装 Oracle 11g GoldenGate 软件。请确保安装随
    GoldenGate 一起提供的示例数据库模式和脚本。


    #### 完成 Oracle GoldenGate 环境的初始数据加载


    在能够在源和目标环境中设置 Oracle GoldenGate 的 Extract、数据泵和 Replicat 进程组之前，我们需要在源系统和目标系统上加载示例数据。这被称为初始数据加载，不幸的是，Oracle
    GoldenGate 没有内置过程来自动执行此任务。您可以使用 Oracle 和 Microsoft SQL Server 提供的各种供应商实用程序。对于
    Oracle，您可以执行导出/导入或数据泵导出和导入。对于 Microsoft SQL Server，您可以使用 Microsoft 原生的 `BCP` 和
    `DTS` 批量加载实用程序，或使用 Replicat 执行直接加载。


    #### 源 Oracle 数据库配置


    在可以将数据复制到目标 Microsoft SQL Server 数据库环境之前，必须执行许多初步设置。让我们逐步完成这些过程。


    在源 Oracle 系统上创建 Manager 参数文件并指定其应使用的端口。


    ```

    $ cd /ggs/source

    $ ggsci

    GGSCI> EDIT PARAMS MGR

    ```


    ```

    --GoldenGate Manager 参数文件

    PORT 50001

    ```


    启动 Manager 进程。


    ```

    GGSCI> START MGR

    ```


    验证 Manager 进程是否已启动。


    ```

    GGSCI> INFO MGR

    Manager is running (IP port oracledba.50001).

    ```


    以 `scott` 用户身份登录到 Oracle 源数据库。创建并用示例数据填充 `SCOTT.EMP` 和 `SCOTT.DEPT` 表。执行 `CREATE
    TABLE AS SELECT` 以将表数据复制到 `GGS` 用户模式中。接下来，使用 `GGSCI`，您需要登录到源 Oracle 数据库，并为 `SCOTT`
    用户模式的 `EMP` 和 `DEPT` 表启用补充日志记录。必须在数据库环境中启用补充日志记录，以便在 DML 操作（例如对表执行 `Insert` 或
    `Update` 时）捕获对表中数据所做的更改。


    ```

    $ ggsci

    GGSCI> DBLOGIN USERID GGS

    GGSCI> ADD TRANDATA GGS.EMP

    GGSCI> ADD TRANDATA GGS.DEPT

    ```


    接下来，您需要验证这些表的补充日志记录是否已启用。


    ```

    GGSCI> INFO TRANDATA GGS.*

    Logging of supplemental redo data enabled for table GGS.DEPT.


    2011-04-03 22:31:21  WARNING OGG-00869  No unique key is defined for table EMP.
    All viable columns will be used to represent the key, but may not guarantee uniqueness.  KEYCOLS
    may be used to define the key.


    Logging of supplemental redo data enabled for table GGS.EMP.

    ```


    在设置 GoldenGate 环境时，请务必牢记此警告，因为 GoldenGate 要求表必须定义主键或唯一键，以便在复制处理过程中识别唯一键列。否则，将使用所有列，从而对性能产生不利影响。


    ##### 在源 Oracle 数据库系统上配置源定义


    下一步是在源 Oracle 数据库系统上执行源定义文件创建映射，使用以下命令创建 `DEFGEN` 参数文件并添加以下附加参数。


    ```

    $ cd /ggs/

    $ ggsci

    GGSCI> edit param defgen

    ```


    ```

    DEFSFILE dirdef/source.def, PURGE

    USERID GGS, PASSWORD xxxx

    TABLE GGS.EMP;

    TABLE GGS.DEPT;

    ```


    ```

    GGSCI> exit

    ```


    ##### 在 Oracle 源系统上执行源定义生成器


    在源 Oracle 数据库系统上执行 `defgen` 命令。


    ```

    $ defgen paramfile dirprm/defgen.prm

    ```


    ##### 将源定义文件传输到目标 Microsoft SQL Server 系统


    ```

    $ ftp mssql2k8

    Password: xxxxx

    ftp> ascii

    ftp> cd ggs/dirdef

    ftp> lcd ggs/dirdef

    ```


    既然我们已经为 Oracle GoldenGate 配置好了 Oracle 源数据库系统，接下来我们将讨论如何设置目标环境以将数据从 Oracle 复制到
    Microsoft SQL Server。'
- fmt: "# Target Microsoft SQL Server Database Configuration\n\nBefore you can replicate\
    \ data from the source Oracle database environment, there are a number of preliminary\
    \ setups that must be performed. Let's walk through each of these procedures.\n\
    \n1.  Configure ODBC source database connections.\n2.  Set up permissions and\
    \ security in source database.\n3.  Create Extract and data-pump processes and\
    \ parameter files.\n4.  Enable supplemental logging.\n5.  Add manager to Windows\
    \ as a service (optional).\n\nInstall the Oracle 11g GoldenGate software for Microsoft\
    \ SQL Server on the source Windows host.\n\nFor our case study, we will be using\
    \ Microsoft SQL Server 2008 Express Edition with Windows XP 32-bit OS.\n\n```bash\n\
    C:\\ggs\\mssqlserver>unzip V22241-01.zip\n```\n```\nArchive:  V22241-01.zip\n\
    \  inflating: mgr.exe\n  inflating: ggsci.exe\n  inflating: install.exe\n  inflating:\
    \ ggMessage.dat\n  inflating: help.txt\n  inflating: tcperrs\n  inflating: bcrypt.txt\n\
    \  inflating: libxml2.txt\n```\n\nAdd the manager as a Windows service to simplify\
    \ things and allow the manager process to run as a background Windows service.\
    \ We recommend this for production environments so that this critical process\
    \ always runs without stopping.\n\n```bash\nC:\\ggs\\mssqlserver> install addevents\
    \ addservice\n```\n\nCheck the Windows Event viewer to ensure that the Oracle\
    \ GoldenGate Manager process has been added to Windows as a service, as shown\
    \ in [Figure 6-2](#Chapter06.html#fig_6_2).\n\n![images](images/0602.jpg)\n\n\
    **Figure 6-2.** Adding the manager as a Windows Service\n\nIf the manager process\
    \ has not been started, click the option to start it as shown in [Figure 6-3](#Chapter06.html#fig_6_3).\n\
    \n![images](images/0603.jpg)\n\n**Figure 6-3.** Checking status for manager process\
    \ in Windows event viewer\n\nSince the manager process on the source system for\
    \ Microsoft SQL Server has not been started, we start the process. You can also\
    \ configure the manager process to run as a Windows service so that it starts\
    \ automatically upon server bootup or you can set it to require manual intervention\
    \ to start the manager. Log in to the GGSCI interface and create the subdirectories\
    \ for the Oracle GoldenGate software on the source system.\n\n```bash\nC:\\ggs\\\
    mssqlserver>ggsci\n```\n\n```\nOracle GoldenGate Command Interpreter for ODBC\n\
    Version 11.1.1.0.0 Build 078\nWindows (optimized), Microsoft SQL Server on Jul\
    \ 28 2010 18:55:52\n\nCopyright (C) 1995, 2010, Oracle and/or its affiliates.\
    \ All rights reserved\n```\n\n```bash\nGGSCI (oracledba) 1> create subdirs\n```\n\
    \n```\nCreating subdirectories under current directory C:\\ggs\\mssqlserver\n\n\
    Parameter files                C:\\ggs\\mssqlserver\\dirprm: created\nReport files\
    \                   C:\\ggs\\mssqlserver\\dirrpt: created\nCheckpoint files  \
    \             C:\\ggs\\mssqlserver\\dirchk: created\nProcess status files    \
    \       C:\\ggs\\mssqlserver\\dirpcs: created\nSQL script files              \
    \ C:\\ggs\\mssqlserver\\dirsql: created\nDatabase definitions files     C:\\ggs\\\
    mssqlserver\\dirdef: created\nExtract data files             C:\\ggs\\mssqlserver\\\
    dirdat: created\nTemporary files                C:\\ggs\\mssqlserver\\dirtmp:\
    \ created\nVeridata files                 C:\\ggs\\mssqlserver\\dirver: created\n\
    Veridata Lock files            C:\\ggs\\mssqlserver\\dirver\\lock: created\nVeridata\
    \ Out-Of-Sync files     C:\\ggs\\mssqlserver\\dirver\\oos: created\nVeridata Out-Of-Sync\
    \ XML files C:\\ggs\\mssqlserver\\dirver\\oosxml: created\nVeridata Parameter\
    \ files       C:\\ggs\\mssqlserver\\dirver\\params: created\nVeridata Report files\
    \          C:\\ggs\\mssqlserver\\dirver\\report: created\nVeridata Status files\
    \          C:\\ggs\\mssqlserver\\dirver\\status: created\nVeridata Trace files\
    \           C:\\ggs\\mssqlserver\\dirver\\trace: created\nStdout files       \
    \            C:\\ggs\\mssqlserver\\dirout: created\n```\n\n```bash\nGGSCI (oracledba)\
    \ 2>\n```\n\nWindows Vista and Windows 2008 security options need to be configured\
    \ to allow the manager and Extract processes to be started. Otherwise, you will\
    \ receive the following error message when you try to start manager:\n\n```bash\n\
    GGSCI (oracledba) 7> start mgr\n```\n\n```\nProcess creation error: WIN32 API\
    \ CALL CreateProcess failed 740 (The requested operation requires elevation.)\n\
    ```\n\nThe solution is simple: run the command `msconfig` utility from a Windows\
    \ shell prompt as shown in [Figure 6-4](#Chapter06.html#fig_6_4).\n\n![images](images/0604.jpg)\n\
    \n**Figure 6-4.** Security settings for manager on Windows and Microsoft SQL Server\n\
    \nNow you should be able to start the manager process on Windows for the source\
    \ system from the services menu as the Administrator account.\n\n```bash\nC:\\\
    ggs\\mssqlserver>ggsci\n```\n```\nOracle GoldenGate Command Interpreter for ODBC\n\
    Version 11.1.1.0.0 Build 078\nWindows (optimized), Microsoft SQL Server on Jul\
    \ 28 2010 18:55:52\nCopyright (C) 1995, 2010, Oracle and/or its affiliates. All\
    \ rights reserved.\n```\n\n```bash\nGGSCI (oracledba) 1> info all\n```\n```\n\
    Program     Status      Group       Lag           Time Since Chkpt\n\nMANAGER\
    \     RUNNING\n```\n\n```bash\nGGSCI (oracledba) 2> status mgr\n```\n```\nManager\
    \ is running (IP port oracledba.2000).\n```\n\n```bash\nGGSCI (oracledba) 3> view\
    \ params mgr\n```\n```\nPORT 2000\n```\n\n## Creating Sample Microsoft SQL Server\
    \ Database\n\nNow that we have the Oracle GoldenGate software installed on both\
    \ source and target systems, we need to create and populate the target Microsoft\
    \ SQL Server database. From Microsoft Windows, under the Start>Programs, run Microsoft\
    \ SQL Server Enterprise Manager. You will then need to expand out the console\
    \ navigation tree to the local SQL Server Instance. Right-click the Microsoft\
    \ SQL Server database instance as shown in [Figure 6-5](#Chapter06.html#fig_6_5)\
    \ and select Properties.\n\n![images](images/0605.jpg)\n\n**Figure 6-5.** Creating\
    \ the sample Microsoft SQL Server database\n\nIn the following Microsoft SQL Server\
    \ Window, select the Security tab and then choose authentication for SQL Server\
    \ and Windows as shown in [Figure 6-6](#Chapter06.html#fig_6_6).\n\n![images](images/0606.jpg)\n\
    \n**Figure 6-6**. Choosing the Security tab for Microsoft SQL Server database\n\
    \nCreate the sample database on the target Microsoft SQL Server environment as\
    \ well as the GGS user security account. Make sure to assign the correct level\
    \ of system and database privileges to the system and database account.\n\nSince\
    \ the Oracle GoldenGate Extract and Replicat process groups both connect to a\
    \ Microsoft SQL Server database via an ODBC (Open Database Connectivity) connection,\
    \ you will need to set up these Oracle GoldenGate components with a system data\
    \ source name (DSN). To do so, perform the following tasks on the Microsoft SQL\
    \ Server host:\n\n1.  Under Programs, select Start ![images](images/U001.jpg)\
    \ Settings ![images](images/U001.jpg) Control Panel.\n2.  Choose ![images](images/U001.jpg)\
    \ Administrative Tools.\n3.  Open the ODBC Data Source Administrator dialog box\
    \ by double-clicking the option for Data Sources (ODBC).\n4.  Next be sure to\
    \ click the System DSN tab, and then hit the Add button. The Create New Data Source\
    \ dialog box will then appear as shown in [Figure 6-7](#Chapter06.html#fig_6_7).\n\
    \n    ![images](images/0607.jpg)\n\n    **Figure 6-7**. Create New Data Source\
    \ for the Microsoft SQL Server database\n\n5.  Create the new data source on the\
