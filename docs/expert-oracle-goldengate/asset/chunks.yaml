    ```


    对于 SQL Server，您可以使用 `SETENV` 来指定 GoldenGate 在中止前尝试读取事务日志的次数以及重试之间的延迟时间：


    ```plaintext

    SETENV (GGS_CacheRetryCount = 25)

    SETENV (GGS_CacheRetryDelay = 2000)

    ```


    前面的示例告诉 GoldenGate 尝试读取 SQL Server 事务日志 25 次（默认为 10 次），并在每次尝试之间等待 2000 毫秒（默认为
    1000 毫秒）后再中止。'
- fmt: '## USERID


    在[第2章](#Chapter02.html#ch2)中，您创建了具有适当安全权限的GoldenGate数据库用户ID。使用`USERID`参数，可以指定用于连接源数据库的GoldenGate数据库用户ID和密码。GoldenGate密码也可以被加密，如[第5章](#Chapter05.html#ch5)所述。


    要连接到SQL Server，您可以使用带有`USERID`选项的`SOURCEDB`参数，如下例所示：


    `SOURCEDB sqlserver, userid sa, PASSWORD userpw`


    `SOURCEDB`指定SQL Server ODBC数据源，而`USERID`指定数据库用户ID。如果您使用Windows身份验证，则可以省略`USERID`和`PASSWORD`选项。


    ![images](images/square.jpg) `Tip` 所列Extract参数的顺序很重要。例如，`EXTRACT`参数必须是参数文件中的第一个条目，并且`EXTTRAIL`参数必须位于任何关联的`TABLE`语句之前。


    接下来，让我们看看`EXTTRAIL`参数。


    ## EXTTRAIL


    您可以使用`EXTTRAIL`参数来指定两个字符的本地Extract追踪文件名。如[第3章](#Chapter03.html#ch3)所述，追踪文件是用于存储已提交事务的暂存文件。在示例中，追踪文件保存了由本地Extract从事务日志中提取的HR事务。接下来，该追踪文件由数据泵处理，并通过网络发送到目标服务器。


    追踪文件通常写入GoldenGate软件安装目录下的`dirdat`目录。在本例中，您使用名为`l1`的追踪文件。GoldenGate会自动向追踪文件名追加六个字符用于老化目的。例如，第一个追踪文件在`dirdat`目录中被命名为`l1000000`。当此追踪文件写满时，GoldenGate将创建下一个新的追踪文件，命名为`l1000001`，然后是`l1000002`，依此类推。


    您可以在`EXTTRAIL`参数中指定`FORMAT RELEASE`选项，以指示GoldenGate以较旧的发行版格式写入追踪文件以实现向后兼容。例如，如果您在另一个系统上有较旧版本的GoldenGate需要处理使用较新版本GoldenGate生成的追踪文件，这可能很有用。


    对于SQL Server，您应该指定一个额外的参数，如下所示，以告诉GoldenGate如何管理辅助截断点：


    `TRANLOGOPTIONS MANAGESECONDARYTRUNCATIONPOINT`


    如果您希望GoldenGate维护辅助截断点，则可以指定`MANAGESECONDARYTRUNCATIONPOINT`。如果SQL Server复制未运行，您应指定此参数。如果SQL
    Server复制与GoldenGate并发运行，则应指定`NOMANAGESECONDARYTRUNCATIONPOINT`以允许SQL Server管理辅助截断点。


    ## TABLE


    使用`TABLE`参数来指定您希望GoldenGate从中提取更改的源数据库表。`TABLE`参数是一个复杂的参数；它有许多选项，允许您过滤行、映射列、转换数据等。[第5章](#Chapter05.html#ch5)涵盖了一些这些高级选项。现在，让我们保持简单，仅指示GoldenGate提取HR架构的所有表数据更改。您可以通过在架构名称后使用通配符星号（`*`）轻松完成此操作。在示例中，`HR.*`告诉GoldenGate提取HR架构中`all`的表。您也可以单独列出每个表，但使用通配符要快得多且容易得多。该示例还假设源和目标架构匹配。如果不匹配，您可以使用`TABLE`参数选项（例如`COLMAP`）来映射不同的源和目标列。


    ![images](images/square.jpg) `Tip` 请注意，`TABLE`参数必须以分号结尾。


    接下来，让我们看看如何将Extract添加到GoldenGate配置。


    ### Adding the Extract


    现在您已经设置了Extract配置参数，下一步是添加Extract组。您可以使用以下来自GGSCI的命令来完成此操作：


    ```

    GGSCI (sourceserver) > ADD EXTRACT LHREMD1, TRANLOG, BEGIN NOW

    GGSCI (sourceserver) > ADD EXTTRAIL dirdat/l1, EXTRACT LHREMD1, MEGABYTES 100

    ```


    第一个命令`ADD EXTRACT`使用上一节中定义的配置参数添加Extract。添加Extract后，它会在源追踪文件和数据库事务日志中建立检查点以跟踪处理进度。`ADD
    EXTRACT`命令的`TRANLOG`参数告诉GoldenGate使用数据库事务日志作为其源。在Oracle示例中，重做日志是源。`BEGIN NOW`告诉Extract在Extract启动后立即开始处理源数据库中的更改。另外，您还可以指示Extract在特定时间戳或使用特定追踪文件号开始捕获更改。


    `ADD EXTTRAIL`命令添加本地Extract追踪文件，将其分配给Extract LHREMD1，并将其大小设为100MB。追踪文件的默认大小为10MB。您应根据事务量将追踪文件调整得足够大，以便GoldenGate不会过于频繁地创建新追踪文件而降低性能。


    ![images](images/square.jpg) `Tip` 您应将诸如`ADD EXTRACT`之类的命令存储在`diroby`目录中的obey文件中。您可以使用`obey`
    `filename`命令从GGSCI命令提示符执行这些命令。这是一个很好的做法，因为这些命令可以随时作为未来参考使用，或者如果您需要在某个时间点重新执行这些命令。[第14章](#Chapter14.html#ch14)涵盖了更多关于obey文件的内容。


    现在，让我们看看如何启动和停止Extract。


    ### Starting and Stopping the Extract


    添加Extract后，您需要启动它以开始捕获更改，如下例所示：


    `GGSCI (sourceserver) > START EXTRACT LHREMD1`


    如果需要，您可以使用类似的方法停止Extract。例如，您可能需要更改GoldenGate参数。在这种情况下，您将停止Extract，对参数进行更改，然后重新启动Extract以使新更改生效。以下是停止LHREMD1
    Extract的示例：


    `GGSCI (sourceserver) > STOP EXTRACT LHREMD1`'
  raw: '##### USERID


    In [Chapter 2](#Chapter02.html#ch2), you created the GoldenGate database user
    ID with appropriate security privileges. Using the `USERID` parameter, you can
    specify the GoldenGate database user ID and password to connect to the source
    database. The GoldenGate password can also be encrypted, as covered in [Chapter
    5](#Chapter05.html#ch5).


    To connect to SQL Server, you can use the `SOURCEDB` parameter with the `USERID`
    option, as shown in the following example:


    `SOURCEDB sqlserver, userid sa, PASSWORD userpw`


    `SOURCEDB` specifies the SQL Server ODBC data source, and `USERID` specifies the
    database user ID. If you''re using Windows authentication, you can leave off the
    `USERID` and `PASSWORD` options.


    ![images](images/square.jpg) **Tip** The order of the Extract parameters listed
    is important. For example, the `EXTRACT` parameter must be the first entry in
    the parameter file, and the `EXTTRAIL` parameter must precede any associated `TABLE`
    statements.


    Next, let''s look at the `EXTTRAIL` parameter.


    ##### EXTTRAIL


    You can use the `EXTTRAIL` parameter to specify the two-character local Extract
    trail-file name. As discussed in [Chapter 3](#Chapter03.html#ch3), trail files
    are staging files used to store the committed transactions. In the example, the
    trail file holds the HR transactions extracted from the transaction log by the
    Local Extract. Next, the trail is processed by the data pump and sent across the
    network to the target server.


    Trail files are usually written to the `dirdat` directory underneath the GoldenGate
    software installation directory. In this case, you''re using a trail file named
    `l1`. GoldenGate automatically appends six characters to the trail-file name for
    aging purposes. For example, the first trail file is named `l1000000` in the `dirdat`
    directory. As this trail file fills up, GoldenGate will create the next new trail
    file, named `l1000001`, then `l1000002`, and so on.


    You can specify a `FORMAT RELEASE` option with the `EXTTRAIL` parameter to instruct
    GoldenGate to write the trail file in an older release format for backward compatibility.
    This may be useful, for example, if you have an older version of GoldenGate on
    another system that you need to process trail files using a more recent version
    of GoldenGate.


    For SQL Server, you should specify an additional parameter, as shown in the following
    example, to tell GoldenGate how to manage the secondary truncation points:


    `TRANLOGOPTIONS MANAGESECONDARYTRUNCATIONPOINT`


    You can specify `MANAGESECONDARYTRUNCATIONPOINT` If you want GoldenGate to maintain
    a secondary truncation point. You would specify this parameter if SQL Server replication
    wasn''t running. If SQL Server replication was running concurrently with GoldenGate,
    then you would specify `NOMANAGESECONDARYTRUNCATIONPOINT` to allow SQL Server
    to manage the secondary truncation point.


    ##### TABLE


    Use the `TABLE` parameter to specify from which source database tables you wish
    GoldenGate to extract changes. The `TABLE` parameter is a complex parameter; it
    has many options that allow you to filter rows, map columns, transform data, and
    so on. [Chapter 5](#Chapter05.html#ch5) covers some of these advanced options.
    For now, let''s keep it simple and just instruct GoldenGate to extract all of
    the table data changes for the HR schema. You can do this easily by using a wildcard
    character, the asterisk (`*`), after the schema name. In the example, `HR.*`,
    tells GoldenGate to extract *all* the tables in the HR schema. You could also
    list each of the tables individually, but using the wildcard is much quicker and
    easier. The example also assumes that the source and target schemas match. If
    they didn''t, you could use `TABLE` parameter options such as `COLMAP` to map
    the different source and target columns.


    ![images](images/square.jpg) **Tip** Notice that the `TABLE` parameter must end
    in a semicolon.


    Next, let''s look at adding the Extract to the GoldenGate configuration.


    #### Adding the Extract


    Now that you''ve set up your Extract configuration parameters, the next step is
    to add the Extract group. You can do that using the following commands from GGSCI:


    `GGSCI (sourceserver) > ADD EXTRACT LHREMD1, TRANLOG, BEGIN NOW`

    `GGSCI (sourceserver) > ADD EXTTRAIL dirdat/l1, EXTRACT LHREMD1, MEGABYTES 100`


    The first command, `ADD EXTRACT`, adds the Extract using the configuration parameters
    defined in the last section. After the Extract is added, it establishes checkpoints
    in the source trail file and on the database transaction log to keep track of
    processing. The `TRANLOG` parameter of the `ADD EXTRACT` command tells GoldenGate
    to use the database transaction log as its source. In the Oracle example, the
    redo logs are the source. `BEGIN NOW` tells Extract to begin processing changes
    from the source database as soon as the Extract is started. Optionally, you can
    also instruct Extract to begin capturing changes at a specific timestamp or using
    a specific trail-file number.


    The `ADD EXTTRAIL` command adds the local Extract trail file, assigns it to Extract
    LHREMD1, and gives it a size of 100MB. The default size of trail files is 10MB.
    You should size the trail files sufficiently large enough based on the transaction
    volume so that GoldenGate isn''t creating new trail files too often and slowing
    performance.


    ![images](images/square.jpg) **Tip** You should store your commands such as `ADD
    EXTRACT` in an obey file in the `diroby` directory. You can execute these from
    the GGSCI command prompt using the `obey` *`filename`* command. This is good practice
    because the commands are readily available as a future reference or if you need
    to re-execute the commands at some point. [Chapter 14](#Chapter14.html#ch14) covers
    more about obey files.


    Now, let''s look at how to start and stop the Extract.


    #### Starting and Stopping the Extract


    After adding the Extract, you need to start it to begin capturing changes, as
    shown in the following example:


    `GGSCI (sourceserver) > START EXTRACT LHREMD1`


    If needed, you can stop the Extract using a similar method. For example, you may
    need to make a change to the GoldenGate parameters. In this case, you would stop
    the Extract, make your changes to the parameters, and then start the Extract for
    the new changes to take effect. Here is an example of how to stop the LHREMD1
    Extract:


    `GGSCI (sourceserver) > STOP EXTRACT LHREMD1`'
