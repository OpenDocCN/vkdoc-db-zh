- fmt: "### Verifying the Initial Load\n\nYou can verify the initial load by viewing\
    \ the GoldenGate report file on the target server. Following is an excerpt from\
    \ the report file that shows the number of rows that have been loaded:\n\n```\n\
    GGSCI (targetserver) > VIEW REPORT DHREMD1\n\n...\n...\n...\n\n***********************************************************************\n\
    *                   ** Run Time Statistics **                         *\n***********************************************************************\n\
    Report at 2011-01-21 23:31:42 (activity since 2011-01-21 23:31:36)\n\nFrom Table\
    \ HR.COUNTRIES to HR.COUNTRIES:\n        #                     inserts:      \
    \  25\n        #                     updates:         0\n        #           \
    \          deletes:         0\n        #                     discards:       \
    \  0\nFrom Table HR.DEPARTMENTS to HR.DEPARTMENTS:\n        #                \
    \     inserts:        27\n        #                     updates:         0\n \
    \       #                     deletes:         0\n        #                  \
    \   discards:         0\nFrom Table HR.EMPLOYEES to HR.EMPLOYEES:\n        # \
    \                    inserts:       117\n        #                     updates:\
    \         0\n        #                     deletes:         0\n        #     \
    \                discards:         0\nFrom Table HR.JOBS to HR.JOBS:\n       \
    \ #                     inserts:        19\n        #                     updates:\
    \         0\n        #                     deletes:         0\n        #     \
    \                discards:         0\nFrom Table HR.JOB_HISTORY to HR.JOB_HISTORY:\n\
    \        #                     inserts:        10\n        #                 \
    \    updates:         0\n        #                     deletes:         0\n  \
    \      #                     discards:         0\nFrom Table HR.LOCATIONS to HR.LOCATIONS:\n\
    \        #                     inserts:        23\n        #                 \
    \    updates:         0\n        #                     deletes:         0\n  \
    \      #                     discards:         0\nFrom Table HR.REGIONS to HR.REGIONS:\n\
    \        #                     inserts:         4\n        #                 \
    \    updates:         0\n        #                     deletes:         0\n  \
    \      #                     discards:         0\n\n...\n...\n...\n```\n\nYou\
    \ need to wait until the initial load is completely finished before starting the\
    \ Replicat for ongoing change synchronization. Later, this chapter reviews starting\
    \ the ongoing synchronization Replicat. First, let's review the steps for loading\
    \ with DBMS vendor utilities.\n\n## Loading with DBMS Utilities\n\nThe DBMS vendor\
    \ load utilities are optimized to load the particular vendor database, so you\
    \ may find that they perform better than the GoldenGate load. For example, for\
    \ an Oracle database, you can choose from the original export/import, the Data\
    \ Pump export/import, RMAN copy, transportable tablespaces, and so on. You should\
    \ choose the load utility that works best for your particular needs. For example,\
    \ if you're using GoldenGate to replicate from Oracle 9i to Oracle 11g, the original\
    \ export/import may be your best option for the initial load. If you're replicating\
    \ from Oracle 10g to Oracle 11g, then you may decide to use Oracle Data Pump export/import.\
    \ You can refer to the specific DBMS manuals for requirements and instructions\
    \ on running the load utilities.\n\n### Prerequisites for Loading with DBMS Utilities\n\
    \nBefore starting the initial load using DBMS utilities, make sure the following\
    \ tasks have been completed:\n\n*   You should disable any foreign-key constraints\
    \ and triggers on the target tables to prevent data errors. Check constraints\
    \ can be disabled during the load to speed up performance. Remember, if you're\
    \ going to use GoldenGate to keep the data synchronized ongoing after the load,\
    \ delete-cascade constraints and triggers will need to remain disabled.\n*   You\
    \ may want to drop indexes on your target tables during the load to speed up performance.\
    \ You can add these back when the load is complete. This is optional.\n\n### Steps\
    \ for Loading with DBMS Utilities\n\nYou can use the following steps to load your\
    \ target database using DBMS utilities in preparation for GoldenGate replication:\n\
    \n1.  Make sure you've met the prerequisites described in the previous sections\
    \ for starting replication and loading with the DBMS utilities.\n2.  Start the\
    \ ongoing synchronization Local and data-pump Extracts to capture changes while\
    \ the load is running. See the previous sections on starting the local and data-pump\
    \ Extracts for details.\n3.  Execute the initial load using the DBMS utility you\
    \ have chosen. After the load is completely finished, proceed with the next step.\n\
    4.  Start the ongoing synchronization Replicat to apply changes made while the\
    \ initial data-load DBMS utility was running. This also begins to apply new changes\
    \ to keep the tables synchronized on an ongoing basis. The next section goes over\
    \ this.\n\n## Starting the Replicat\n\nAfter you've loaded your data, you can\
    \ start the Replicat to apply the changes that were captured by the Extract while\
    \ the load was running. These changes were queued up in the trail files while\
    \ the load was running and are waiting to be applied by the Replicat. After you've\
    \ configured, added, and successfully started the Replicat, the changes from the\
    \ trail are applied to the target tables.\n\nIn some cases, you may run into errors\
    \ with duplicate or missing data caused by the ongoing changes made during the\
    \ initial-load process. For example, if a row was updated and then deleted during\
    \ the initial load, GoldenGate may try to apply the update to the missing row\
    \ that was never loaded. You can make GoldenGate try to resolve these errors automatically\
    \ by adding the `HANDLECOLLISIONS` parameter to the Replicat. You may also notice\
    \ that it takes some time for the Replicat to catch up with applying all the changes\
    \ made during the load, particularly for a large database with heavy change volume\
    \ and a long load time.\n\nWhen the initial changes have been applied and there\
    \ is no GoldenGate lag left, the databases are fully synchronized. At this point,\
    \ the Local and data-pump Extracts and Replicat can continue to run and keep the\
    \ databases synchronized in real time with the ongoing changes.\n\nThis section\
    \ covers the various ongoing change Replicat configuration settings and options.\
    \ After that, you see how to start the Replicat and verify that it's properly\
    \ applying changes to the target. Let's begin with configuring the Replicat."
  raw: '#### Verifying the Initial Load


    You can verify the initial load by viewing the GoldenGate report file on the target
    server. Following is an excerpt from the report file that shows the number of
    rows that have been loaded:


    `GGSCI (targetserver) > VIEW REPORT DHREMD1`


    `...`

    `...`

    `...`


    `***********************************************************************`

    `*                   ** Run Time Statistics **                         *`

    `***********************************************************************`

    `Report at 2011-01-21 23:31:42 (activity since 2011-01-21 23:31:36)`


    `From Table HR.COUNTRIES to HR.COUNTRIES:`

    `       #                   inserts:        25`

    `       #                   updates:         0`

    `       #                   deletes:         0`

    `       #                  discards:         0`

    `From Table HR.DEPARTMENTS to HR.DEPARTMENTS:`

    `       #                   inserts:        27`

    `       #                   updates:         0`

    `       #                   deletes:         0`

    `       #                  discards:         0`

    `From Table HR.EMPLOYEES to HR.EMPLOYEES:`

    `       #                   inserts:       117`

    `       #                   updates:         0`

    `       #                   deletes:         0`

    `       #                  discards:         0`

    `From Table HR.JOBS to HR.JOBS:`

    `       #                   inserts:        19`

    `       #                   updates:         0`

    `       #                   deletes:         0`

    `       #                  discards:         0`

    `From Table HR.JOB_HISTORY to HR.JOB_HISTORY:`

    `       #                   inserts:        10`

    `       #                   updates:         0`

    `       #                   deletes:         0`

    `       #                  discards:         0`

    `From Table HR.LOCATIONS to HR.LOCATIONS:`

    `       #                   inserts:        23`

    `       #                   updates:         0`

    `       #                   deletes:         0`

    `       #                  discards:         0`

    `From Table HR.REGIONS to HR.REGIONS:`

    `       #                   inserts:         4`

    `       #                   updates:         0`

    `       #                   deletes:         0`

    `       #                  discards:         0`


    `...`

    `...`

    `...`


    You need to wait until the initial load is completely finished before starting
    the Replicat for ongoing change synchronization. Later, this chapter reviews starting
    the ongoing synchronization Replicat. First, let''s review the steps for loading
    with DBMS vendor utilities.


    ### Loading with DBMS Utilities


    The DBMS vendor load utilities are optimized to load the particular vendor database,
    so you may find that they perform better than the GoldenGate load. For example,
    for an Oracle database, you can choose from the original export/import, the Data
    Pump export/import, RMAN copy, transportable tablespaces, and so on. You should
    choose the load utility that works best for your particular needs. For example,
    if you''re using GoldenGate to replicate from Oracle 9i to Oracle 11g, the original
    export/import may be your best option for the initial load. If you''re replicating
    from Oracle 10g to Oracle 11g, then you may decide to use Oracle Data Pump export/import.
    You can refer to the specific DBMS manuals for requirements and instructions on
    running the load utilities.


    #### Prerequisites for Loading with DBMS Utilities


    Before starting the initial load using DBMS utilities, make sure the following
    tasks have been completed:


    *   You should disable any foreign-key constraints and triggers on the target
    tables to prevent data errors. Check constraints can be disabled during the load
    to speed up performance. Remember, if you''re going to use GoldenGate to keep
    the data synchronized ongoing after the load, delete-cascade constraints and triggers
    will need to remain disabled.

    *   You may want to drop indexes on your target tables during the load to speed
    up performance. You can add these back when the load is complete. This is optional.


    #### Steps for Loading with DBMS Utilities


    You can use the following steps to load your target database using DBMS utilities
    in preparation for GoldenGate replication:


    1.  Make sure you''ve met the prerequisites described in the previous sections
    for starting replication and loading with the DBMS utilities.

    2.  Start the ongoing synchronization Local and data-pump Extracts to capture
    changes while the load is running. See the previous sections on starting the local
    and data-pump Extracts for details.

    3.  Execute the initial load using the DBMS utility you have chosen. After the
    load is completely finished, proceed with the next step.

    4.  Start the ongoing synchronization Replicat to apply changes made while the
    initial data-load DBMS utility was running. This also begins to apply new changes
    to keep the tables synchronized on an ongoing basis. The next section goes over
    this.


    ### Starting the Replicat


    After you''ve loaded your data, you can start the Replicat to apply the changes
    that were captured by the Extract while the load was running. These changes were
    queued up in the trail files while the load was running and are waiting to be
    applied by the Replicat. After you''ve configured, added, and successfully started
    the Replicat, the changes from the trail are applied to the target tables.


    In some cases, you may run into errors with duplicate or missing data caused by
    the ongoing changes made during the initial-load process. For example, if a row
    was updated and then deleted during the initial load, GoldenGate may try to apply
    the update to the missing row that was never loaded. You can make GoldenGate try
    to resolve these errors automatically by adding the `HANDLECOLLISIONS` parameter
    to the Replicat. You may also notice that it takes some time for the Replicat
    to catch up with applying all the changes made during the load, particularly for
    a large database with heavy change volume and a long load time.


    When the initial changes have been applied and there is no GoldenGate lag left,
    the databases are fully synchronized. At this point, the Local and data-pump Extracts
    and Replicat can continue to run and keep the databases synchronized in real time
    with the ongoing changes.


    This section covers the various ongoing change Replicat configuration settings
    and options. After that, you see how to start the Replicat and verify that it''s
    properly applying changes to the target. Let''s begin with configuring the Replicat.'
  trans: "\n### 验证初始加载\n\n您可以通过查看目标服务器上的 GoldenGate 报告文件来验证初始加载。以下是报告文件的一个摘录，显示了已加载的行数：\n\
    \n```\nGGSCI (targetserver) > VIEW REPORT DHREMD1\n\n...\n...\n...\n\n***********************************************************************\n\
    *                   ** Run Time Statistics **                         *\n***********************************************************************\n\
    Report at 2011-01-21 23:31:42 (activity since 2011-01-21 23:31:36)\n\nFrom Table\
    \ HR.COUNTRIES to HR.COUNTRIES:\n        #                     inserts:      \
    \  25\n        #                     updates:         0\n        #           \
    \          deletes:         0\n        #                     discards:       \
    \  0\nFrom Table HR.DEPARTMENTS to HR.DEPARTMENTS:\n        #                \
    \     inserts:        27\n        #                     updates:         0\n \
    \       #                     deletes:         0\n        #                  \
    \   discards:         0\nFrom Table HR.EMPLOYEES to HR.EMPLOYEES:\n        # \
    \                    inserts:       117\n        #                     updates:\
    \         0\n        #                     deletes:         0\n        #     \
    \                discards:         0\nFrom Table HR.JOBS to HR.JOBS:\n       \
    \ #                     inserts:        19\n        #                     updates:\
    \         0\n        #                     deletes:         0\n        #     \
    \                discards:         0\nFrom Table HR.JOB_HISTORY to HR.JOB_HISTORY:\n\
    \        #                     inserts:        10\n        #                 \
    \    updates:         0\n        #                     deletes:         0\n  \
    \      #                     discards:         0\nFrom Table HR.LOCATIONS to HR.LOCATIONS:\n\
    \        #                     inserts:        23\n        #                 \
    \    updates:         0\n        #                     deletes:         0\n  \
    \      #                     discards:         0\nFrom Table HR.REGIONS to HR.REGIONS:\n\
    \        #                     inserts:         4\n        #                 \
    \    updates:         0\n        #                     deletes:         0\n  \
    \      #                     discards:         0\n\n...\n...\n...\n```\n\n您需要等待初始加载完全完成，然后再启动\
    \ Replicat 进行持续的更改同步。本章稍后将回顾启动持续同步 Replicat 的步骤。首先，让我们回顾使用 DBMS 供应商实用工具进行加载的步骤。\n\
    \n## 使用 DBMS 实用工具加载\n\nDBMS 供应商加载实用工具针对加载特定供应商的数据库进行了优化，因此您可能会发现它们比 GoldenGate\
    \ 加载的性能更好。例如，对于 Oracle 数据库，您可以从传统的 export/import、Data Pump export/import、RMAN\
    \ copy、可传输表空间等工具中选择。您应选择最适合您特定需求的加载实用工具。例如，如果您使用 GoldenGate 从 Oracle 9i 复制到 Oracle\
    \ 11g，传统的 export/import 可能是您初始加载的最佳选择。如果您是从 Oracle 10g 复制到 Oracle 11g，那么您可能会决定使用\
    \ Oracle Data Pump export/import。您可以查阅特定的 DBMS 手册以获取运行加载实用工具的要求和说明。\n\n### 使用\
    \ DBMS 实用工具加载的先决条件\n\n在使用 DBMS 实用工具开始初始加载之前，请确保已完成以下任务：\n\n*   您应禁用目标表上的任何外键约束和触发器，以防止数据错误。加载期间可以禁用检查约束以加快性能。请记住，如果您打算在加载后使用\
    \ GoldenGate 来持续保持数据同步，则删除级联约束和触发器需要保持禁用状态。\n*   您可能希望在加载期间删除目标表上的索引以加快性能。加载完成后可以重新添加这些索引。这是可选的。\n\
    \n### 使用 DBMS 实用工具加载的步骤\n\n您可以使用以下步骤，利用 DBMS 实用工具加载目标数据库，为 GoldenGate 复制做好准备：\n\
    \n1.  确保您已满足前面章节中描述的启动复制和使用 DBMS 实用工具加载的先决条件。\n2.  在加载运行时，启动持续同步的本地 Extract 和数据泵\
    \ Extract 以捕获更改。有关启动本地和数据泵 Extract 的详细信息，请参阅前面的章节。\n3.  执行您选择的 DBMS 实用工具进行初始加载。加载完全完成后，继续下一步。\n\
    4.  启动持续同步的 Replicat，以应用在初始数据加载 DBMS 实用工具运行期间所做的更改。这也开始应用新的更改以持续保持表同步。下一节将介绍这一点。\n\
    \n## 启动 Replicat\n\n加载数据后，您可以启动 Replicat 来应用在加载运行期间由 Extract 捕获的更改。这些更改在加载运行期间已排队到跟踪文件中，等待由\
    \ Replicat 应用。在配置、添加并成功启动 Replicat 后，来自跟踪文件的更改将被应用到目标表。\n\n在某些情况下，您可能会遇到由于初始加载过程中进行的持续更改而导致的数据重复或丢失错误。例如，如果在初始加载期间某一行被更新然后被删除，GoldenGate\
    \ 可能会尝试将更新应用到从未加载过的、已丢失的行。您可以通过向 Replicat 添加 `HANDLECOLLISIONS` 参数来让 GoldenGate\
    \ 尝试自动解决这些错误。您可能还会注意到，Replicat 需要一些时间才能赶上并应用所有在加载期间所做的更改，特别是对于更改量大、加载时间长的大型数据库。\n\
    \n当初始更改已应用且没有 GoldenGate 延迟时，数据库就完全同步了。此时，本地和数据泵 Extract 以及 Replicat 可以继续运行，并通过持续更改实时保持数据库同步。\n\
    \n本节介绍各种持续更改 Replicat 的配置设置和选项。之后，您将了解如何启动 Replicat 并验证它是否正在正确地向目标应用更改。让我们从配置\
    \ Replicat 开始。\n"
- fmt: '#### Configuring the Replicat


    Before starting to configure the Replicat, you should go back and double-check
    the prerequisites on the target server, as covered in the section, "Prerequisites
    for Setting Up Replication." When you''ve confirmed that the prerequisites are
    met, you can begin configuring the Replicat. In order to do this, you first need
    to create a parameter file for the Replicat. Remember, you''re configuring the
    Replicat to apply all the DML changes from the HR schema.


    ![images](images/square.jpg) **Note** You can edit the GoldenGate parameters directly
    from the GGSCI or using the native OS text editor outside of GGSCI, whichever
    is most convenient. To edit in GGSCI, you enter `EDIT PARAMS` *`paramterfilename`*.
    GGSCI brings up the parameter file in the default text editor, which is Notepad
    for Windows and vi for UNIX and Linux. You can change the default editor using
    the `SET EDITOR` command in GGSCI. If you''re editing directly from the OS, save
    the parameter file in the `/dirprm` subdirectory under the GoldenGate software
    installation directory. In the example, this is `/gger/ggs/dirprm`.


    Let''s begin by taking a look at the Replicat parameters for RHREMD1 as shown
    in the following example:


    ```

    GGSCI (targetserver) 1> edit params RHREMD1


    Replicat RHREMD1

    -------------------------------------------------------------------

    -- Replicat for HR Schema

    -------------------------------------------------------------------


    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)

    USERID GGER@TargetDB, PASSWORD userpw


    HandleCollisions


    AssumeTargetDefs


    Map HR.*, Target HR.* ;

    ```


    Let''s examine the parameters in more detail. Keep in mind that GoldenGate has
    many more configuration parameters than are used in the example. You can refer
    to the *Oracle GoldenGate Reference Guide* for a detailed description of all the
    parameters. I usually refer to the "Alphabetical Reference" section in the *Oracle
    GoldenGate Reference Guide* to quickly find a parameter and its meaning and various
    options.


    ![images](images/square.jpg) **Tip** You can use two dashes (`--`) at the beginning
    of a line in the parameter file for comments.


    Let''s start by reviewing the `Replicat` parameter in the next section.


    ##### Replicat


    As with the initial-load Replicat, use the `Replicat` parameter to define the
    GoldenGate ongoing change Replicat group. You should follow naming standards,
    as covered earlier.


    In the example, the Replicat group is named RHREMD1. The *R* specifies that it''s
    the ongoing change Replicat. *HREM* specifies that you''re using this Replicat
    group for the human resources employee application and the HR schema. The *D*
    signifies that you''re running in the development environment. Any finally, the
    *1* indicates this is the first Replicat group for this schema and application.
    You can add additional parallel Replicat groups to improve performance, as covered
    in [Chapter 7](#Chapter07.html#ch7).


    ##### SETENV


    As we showed in the initial-load Replicat, you can use the `SETENV` parameter
    to override default environment variable settings. In the example, you explicitly
    set `NLS_LANG` to `AMERICAN_AMERICA.AL32UTF8`. It''s a good idea to set `NLS_LANG`
    and not let it default to the environment setting. It is possible we could have
    a different `NLS_LANG` for the Local Extract and the Replicat. If `NLS_LANG` is
    incorrect, it can cause the replication to fail or replicate incorrect data. For
    the Replicat, `NLS_LANG` needs to match the NLS character set of the data in the
    trail file it''s reading, which was created from the source database.


    You can set other environment variables in addition to `NLS_LANG` using the `SETENV`
    parameter. For example, you can set `ORACLE_HOME` and `ORACLE_SID` as shown next.
    In the example, I chose instead to set the Oracle environment using the Oracle
    network TNS alias of `TargetDB` instead of using `SETENV`. You can also set `ORACLE_HOME`
    and `ORACLE_SID` prior to entering GGSCI and not use a TNS alias or `SETENV`.
    Any of these methods will work as long as the variable values are valid:


    ```

    SETENV (ORACLE_HOME = "/u01/app/oracle/product/11.1.0")

    SETENV (ORACLE_SID = "TargetDB")

    ```


    Next, let''s review the `USERID` parameter.


    ##### USERID


    Using the `USERID` parameter, you can specify the GoldenGate database user ID
    and password to connect to the target database. The GoldenGate password can be
    encrypted. [Chapter 5](#Chapter05.html#ch5) discusses encryption.


    For SQL Server, you can use the `SOURCEDB` parameter with the `USERID` option,
    as shown here:


    ```

    SOURCEDB sqlserver, userid sa, PASSWORD userpw

    ```


    `SOURCEDB` specifies the SQL Server ODBC data source, and `USERID` specifies the
    database user ID. If you''re using Windows authentication, you can leave off the
    `USERID` and `PASSWORD` options.


    ![images](images/square.jpg) **Note** The order of the parameters listed is important.
    For example, the `REPLICAT` parameter must be the first entry in the parameter
    file.


    Next, let''s review the `HANDLECOLLISIONS` parameter.'
