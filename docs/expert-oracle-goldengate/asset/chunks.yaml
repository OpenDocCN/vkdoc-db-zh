    \ an Extract group.\n```\n\n## INFO\n\n`INFO`命令提供当前 Oracle GoldenGate 配置的状态信息。一些示例如下。\n\
    \n`INFO ALL`显示 GoldenGate 处理的完整概览：\n\n```text\nGGSCI (oracledba) 11> info all\
    \ allprocesses\n\nProgram     Status      Group       Lag         Time Since Chkpt\n\
