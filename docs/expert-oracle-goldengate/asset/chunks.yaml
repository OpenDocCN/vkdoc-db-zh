    \ Lag       00:00:00 (updated 1435:45:44 ago)\nLog Read Checkpoint  Oracle Redo\
    \ Logs\n                     2011-03-15 21:50:47  Seqno 0, RBA 0\n```\n\n您也可以使用`*`通配符来显示所有\
