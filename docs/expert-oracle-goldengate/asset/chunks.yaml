  raw: '#### Opening GoldenGate Trail Files with Logdump


    The most common use for Logdump in Oracle GoldenGate is to open trail files for
    analysis and troubleshooting. After starting a Logdump session, you need to issue
    the `OPEN` command as shown here, specifying the path name and trail file name:


    `Logdump 1>open ./dirdat/aa00001`

    `Current LogTrail is /ggs/orasrc/dirdat/aa00001`


    After you open the trail file, you need to turn on some useful features to make
    full use of the Logdump utility. The first command is `GHDR ON`. It enables display
    of the record header for the transactions in the trail file for Oracle GoldenGate:


    `Logdump 2 >ghdr on`


    Next, you need to toggle the option for viewing the hex and ASCII values for trailfile
    data. To do so, execute the detail data command:


    `Logdump 3 >detail data`


    Now you can move to the next record in the trail file by using the next command
    in Logdump. When you issue the next command, Logdump moves forward one record:


    `Logdump 5>next`

    `___________________________________________________________________`

    `Hdr-Ind    :     E  (x45)     Partition  :     . (x00)`

    `UndoFlag   :     . (x00)     BeforeAfter:     A  (x41)`

    `RecLength  :     0  (x0000)   IO Time    : 2011/05/04 21:22:17.611.797`

    `IOType     :   151  (x97)     OrigNode   :     0  (x00)`

    `TransInd   :     . (x03)     FormatType :     R  (x52)`

    `SyskeyLen  :     0  (x00)     Incomplete :     . (x00)`

    `AuditRBA   :          0       AuditPos   : 0`

    `Continued  :     N  (x00)     RecCount   :     0  (x00)`


    `2010/08/04 21:22:17.611.797 RestartOK            Len     0 RBA 936`

    `Name:`

    `After  Image:                                             Partition 0   G  s`


    Here you can examine the before and after image of the transactions contained
    in the trail file as displayed by Logdump.


    For additional details on using the Logdump utility with Oracle GoldenGate, consult
    the Oracle GoldenGate Troubleshooting Guide, which contains a list of all Logdump
    commands, syntax, and usage. It''s available online at [`http://download.oracle.com/docs/cd/E15881_01/doc.104/gg_troubleshooting_v104.pdf`](http://download.oracle.com/docs/cd/E15881_01/doc.104/gg_troubleshooting_v104.pdf)
    for release 10.x and at [`http://download.oracle.com/docs/cd/E18101_01/doc.1111/e17792.pdf`](http://download.oracle.com/docs/cd/E18101_01/doc.1111/e17792.pdf)
    for release 11.1.


