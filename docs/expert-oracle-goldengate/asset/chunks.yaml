    to add the standby Extract. The standby Extract is similar to the primary Extract
    except it will be used to extract data to replicate from the standby database
    back to the primary database if needed. For now you''re only *adding* the Extract.
    Later you''ll *start* it during switchover and failover activities.


    Let''s begin by configuring the parameter file for the standby Local Extract.
    In our example you''re configuring the Local Extract to capture all the SQL DML
    changes from the sample HR schema on the standby database. Since you''ve already
    used trails l3 and l4, let''s use trails l5 and l6 for replication from the standby
    database back to the primary database.


    Let''s start by taking a look at the parameters for the Local Extract on the standby
    server.


    `GGSCI (standbyserver) 1> edit params LHREMP3`


    `Extract LHREMP3`


    `-------------------------------------------------------------------`

    `-- Local extract for HR schema`

    `-------------------------------------------------------------------`


    `USERID GGER, PASSWORD userpw`


    `ExtTrail dirdat/l5`


    `ReportCount Every 10000 Records, Rate`

    `Report at 00:30`


    `DiscardFile dirrpt/LHREMP3.dsc, Append`

    `DiscardRollover at 02:00`


    `Table HR.*;`


    Next you will add the standby Extract to the GoldenGate configuration so you will
    be ready to start it later during a database switchover or failover. You can do
    that using the following commands from GGSCI:


    `GGSCI (standbyserver) > ADD EXTRACT LHREMP3, TRANLOG, BEGIN NOW`

    `GGSCI (standbyserver) > ADD EXTTRAIL dirdat/l5, EXTRACT LHREMP3, MEGABYTES 100`


    Next, let''s configure the standby data pump.


    #### Configuring the Standby Data Pump


    Now that the standby Local Extract is added, you can proceed with configuring
    and adding the standby data pump. The standby data pump is similar to the primary
    data pump except it will be used to pump the trails back from the standby database
    to the primary database if needed. In our example, you''ll configure the data
    pump to read the l5 trail file written out by the standby Local Extract named
    LHREMP3 and pump it over the TCP/IP network to the target server to be processed
    by the standby Replicat.


    From GGSCI, let''s edit the parameters for our data pump as shown in this example.


    `GGSCI (standbyserver) 1> edit params PHREMP3`


    `Extract PHREMP3`


    `-------------------------------------------------------------------`

    `-- Data-pump Extract for HR schema`

    `-------------------------------------------------------------------`


    `PassThru`


    `ReportCount Every 10000 Records, Rate`

    `Report at 00:30`


    `DiscardFile dirrpt/PHREMP3.dsc, Append`

    `DiscardRollover at 02:00`


    `RmtHost standbyserver, MgrPort 7809`

    `RmtTrail dirdat/l6`


    `Table HR.* ;`


    Since you''ve reviewed these parameters previously in [Chapters 4](#Chapter04.html#ch4)
    and [5](#Chapter05.html#ch5), let''s proceed with adding the data pump. You can
    add the data-pump Extract using the commands shown in the following example.


    `GGSCI (standbyserver) > ADD EXTRACT PHREMP3, EXTTRAILSOURCE dirdat/l5`

    `GGSCI (standbyserver) > ADD RMTTRAIL dirdat/l6, EXTRACT PHREMP3, MEGABYTES 100`


    You won''t be starting the data pump until later, so let''s move on to configuring
    the standby Replicat.'
  trans: '

    # 配置用于灾难恢复的 Replicat


    初始数据加载完成后，你可以启动 Replicat，以应用在加载运行期间由 Extract 捕获的变更。如果需要，可以启用 `HANDLECOLLISIONS`
    参数来解决因数据缺失或重复而导致的任何错误。Replicat 需要一些时间才能赶上并应用加载期间所做的所有变更，特别是对于更改量大、加载时间长的大型数据库。


    一旦 Replicat 应用了所有初始数据加载变更，并且没有 GoldenGate 延迟，主数据库和备用数据库将完全同步。此时，本地 Extract、数据泵
    Extract 和 Replicat 可以继续运行，并通过持续的变更保持数据库的实时同步。


    在开始配置 Replicat 之前，你应该返回并再次确认目标备用服务器上的 GoldenGate 先决条件已满足。我们在本章开头的“先决条件”一节中已介绍过这些条件。确认先决条件满足后，我们就可以开始配置
    Replicat 了。请记住，你正在配置 Replicat，以根据我们的灾难恢复要求，应用来自 `HR` 模式的所有 DML 变更，以复制所有数据。如果你想在此处过滤或转换数据，也可以通过添加相应的参数来实现。


    既然你之前已经使用了 `RHREMP1` 作为 Replicat 名称，现在你可以将这个 Replicat 命名为 `RHREMP2`。让我们从查看备用服务器上
    `RHREMP2` 的 Replicat 参数开始。


    ```

    GGSCI (standbyserver) 1> edit params RHREMP2

    Replicat RHREMP2

    -------------------------------------------------------------------

    -- Replicat for HR Schema

    -------------------------------------------------------------------

    USERID GGER, PASSWORD userpw

    ReportCount Every 10000 Records, Rate

    Report at 00:30

    DiscardFile dirrpt/RHREMP2.dsc, Append

    DiscardRollover at 02:00

    -- HandleCollisions should be turned off after the initial load synchronization.

    HandleCollisions

    AssumeTargetDefs

    Map HR.*, Target HR.* ;

    ```


    现在你已经设置好 Replicat 的配置参数，下一步是添加 Replicat 组。在以下示例中，你将 `RHREMP2` replicat 添加到 GoldenGate
    配置中。该 Replicat 将处理由灾难恢复数据泵泵送过来的 `l4` 跟踪文件。


    ```

    GGSCI (standbyserver) > ADD REPLICAT RHREMP2, EXTTRAIL dirdat/l4

    ```


    现在让我们启动 `RHREMP2` replicat。


    ```

    GGSCI (standbyserver) > START REPLICAT RHREMP2

    ```


    Replicat 启动后，你可以使用 `INFO REPLICAT` 命令验证其是否正在运行。你应该看到状态为 `RUNNING`。如果看到状态为 `STOPPED`
    或 `ABENDED`，则可能存在问题。


    让我们对我们的 Replicat `RHREMP1` 执行一个 `INFO` 命令来检查状态，如下所示：


    ```

    GGSCI (standbyserver) 2> INFO REPLICAT RHREMP2

    ```


    你还应该在 Replicat 上运行 `STATS` 命令，以确保它正在处理变更，如下例所示，针对 Replicat `RHREMP2`：


    ```

    GGSCI (standbyserver) 2> STATS REP RHREMP2

    ```


    接下来，让我们添加用于从备用数据库复制回主数据库的 GoldenGate 进程。


    # 配置备用 Extract


    一旦你的灾难恢复复制的第一部分完成，并且你已成功地从主数据库复制到备用数据库，下一部分就是添加备用 Extract。备用 Extract 与主 Extract
    类似，只是它将在需要时用于提取数据，以从备用数据库复制回主数据库。目前你只是在 `添加` 这个 Extract。稍后你将在切换和故障转移活动中 `启动` 它。


    让我们从配置备用本地 Extract 的参数文件开始。在我们的示例中，你将配置本地 Extract，以捕获备用数据库上示例 `HR` 模式的所有 SQL DML
    变更。既然你已经使用了跟踪文件 `l3` 和 `l4`，让我们使用 `l5` 和 `l6` 来进行从备用数据库回主数据库的复制。


    让我们首先查看备用服务器上本地 Extract 的参数。


    ```

    GGSCI (standbyserver) 1> edit params LHREMP3

    Extract LHREMP3

    -------------------------------------------------------------------

    -- Local extract for HR schema

    -------------------------------------------------------------------

    USERID GGER, PASSWORD userpw

    ExtTrail dirdat/l5

    ReportCount Every 10000 Records, Rate

    Report at 00:30

    DiscardFile dirrpt/LHREMP3.dsc, Append

    DiscardRollover at 02:00

    Table HR.*;

    ```


    接下来，你将把备用 Extract 添加到 GoldenGate 配置中，以便稍后在数据库切换或故障转移时准备好启动它。你可以使用以下 `GGSCI` 命令来完成此操作：


    ```

    GGSCI (standbyserver) > ADD EXTRACT LHREMP3, TRANLOG, BEGIN NOW

    GGSCI (standbyserver) > ADD EXTTRAIL dirdat/l5, EXTRACT LHREMP3, MEGABYTES 100

    ```


    接下来，让我们配置备用数据泵。


    # 配置备用数据泵


    现在备用本地 Extract 已添加，你可以继续配置和添加备用数据泵。备用数据泵与主数据泵类似，只是它将在需要时用于将跟踪文件从备用数据库泵送回主数据库。在我们的示例中，你将配置数据泵，以读取由名为
    `LHREMP3` 的备用本地 Extract 写入的 `l5` 跟踪文件，并通过 TCP/IP 网络将其泵送到目标服务器，由备用 Replicat 进行处理。


    从 `GGSCI` 开始，让我们如本示例所示编辑数据泵的参数。


    ```

    GGSCI (standbyserver) 1> edit params PHREMP3

    Extract PHREMP3

    -------------------------------------------------------------------

    -- Data-pump Extract for HR schema

    -------------------------------------------------------------------

    PassThru

    ReportCount Every 10000 Records, Rate

    Report at 00:30

    DiscardFile dirrpt/PHREMP3.dsc, Append

    DiscardRollover at 02:00

    RmtHost standbyserver, MgrPort 7809

    RmtTrail dirdat/l6

    Table HR.* ;

    ```


    既然你已经在第 4 章和第 5 章中回顾过这些参数，让我们继续添加数据泵。你可以使用以下示例中的命令添加数据泵 Extract。


    ```

    GGSCI (standbyserver) > ADD EXTRACT PHREMP3, EXTTRAILSOURCE dirdat/l5

    GGSCI (standbyserver) > ADD RMTTRAIL dirdat/l6, EXTRACT PHREMP3, MEGABYTES 100

    ```


    你暂时不会启动数据泵，所以让我们继续配置备用 Replicat。

    '
- fmt: "#### Configuring the Standby Replicat\n\nNext you should add a standby Replicat\
    \ which will be ready to apply any changes back to your primary database after\
    \ a failover or switchover. This is similar to the primary replicat but will be\
    \ used to replicate back to the primary database from the standby database. By\
    \ adding it now before it is needed you will be ready to start it in the event\
    \ of an outage.\n\nFirst create a parameter file for Replicat `RHREMP3` as shown\
    \ in the following example:\n\n```\nGGSCI (primaryserver) 1> edit params RHREMP3\n\
    \nReplicat RHREMP3\n-------------------------------------------------------------------\n\
    -- Replicat for HR Schema\n-------------------------------------------------------------------\n\
    \nUSERID GGER, PASSWORD userpw\n\nReportCount Every 10000 Records, Rate\nReport\
    \ at 00:30\n\nDiscardFile dirrpt/RHREMP3.dsc, Append\nDiscardRollover at 02:00\n\
    \n-- HandleCollisions should be turned off after the initial load synchronization.\n\
    HandleCollisions\n\nAssumeTargetDefs\n\nMap HR.*, Target HR.* ;\n```\n\nThe next\
    \ step is to add the standby Replicat group. In the following example you are\
    \ adding the `RHREMP3` replicat to the GoldenGate configuration.\n\n```\nGGSCI\
    \ (primaryserver) > ADD REPLICAT RHREMP3, EXTTRAIL dirdat/l6\n```\n\nRemember\
    \ you won't be starting the standby Replicat until a switchover or failover. You\
    \ are now finished with the initial setup for the disaster recovery replication.\
    \ All of the steps you have completed so far are in preparation for a potential\
    \ switchover or failover situation. You are now prepared to perform a planned\
    \ switchover or an unplanned failover to your standby database.\n\n### Performing\
    \ a Planned Switchover\n\nEven though you are preparing your environment for a\
    \ complete unplanned disaster recovery scenario, there are many situations where\
    \ you may need to bring down your primary database for a planned outage. Using\
    \ GoldenGate replication, you can reduce these planned outage times to the bare\
    \ minimum of switching your applications from the primary database to the standby\
    \ database without losing any data during the process. You can have your application\
    \ processing against the standby database while the primary database is down for\
    \ maintenance and then switch back to the primary database after the maintenance\
    \ is complete.\n\nIn our example, let's assume you need to apply a database software\
    \ patch to the primary database which normally requires a four-hour outage. Now\
    \ let's go through the steps using GoldenGate replication and keep the application\
    \ outage window as short as possible. To keep it simple, we've divided the planned\
    \ switchover steps into five parts, each with several steps. Let's begin with\
    \ Part 1, as shown in [Figure 12-4](#Chapter12.html#fig_12_4).\n\n![images](images/1204.jpg)\n\
    \n**Figure 12-4.** Disaster recovery planned switchover, part 1\n\nFollowing are\
    \ descriptions for the steps in Part 1, as shown in [Figure 12-4](#Chapter12.html#fig_12_4).\n\
    \n1.  Stop the application connected to the primary database.\n2.  After verifying\
    \ there is no lag, stop the Local Extract as shown in the following example:\n\
    \    ```\n    GGSCI (primaryserver) > LAG EXTRACT LHREMD2\n    Sending GETLAG\
    \ request to EXTRACT LHREMD2 ...\n    Last record lag: 10 seconds.\n    At EOF,\
    \ no more records to process.\n\n    GGSCI (primaryserver) > STOP EXTRACT LHREMD2\n\
    \    ```\n3.  After verifying there is no lag, stop the data-pump Extract as shown\
    \ in the following example:\n    ```\n    GGSCI (primaryserver) > LAG EXTRACT\
    \ PHREMD2\n    Sending GETLAG request to EXTRACT PHREMD2 ...\n    Last record\
    \ lag: 6 seconds.\n    At EOF, no more records to process.\n\n    GGSCI (primaryserver)\
    \ > STOP EXTRACT PHREMD2\n    ```\n4.  After verifying there are no more records\
    \ to process, stop the Replicat as shown in the following example:\n    ```\n\
    \    GGSCI (standbyserver) > LAG REPLICAT RHREMD2\n    Sending GETLAG request\
    \ to REPLICAT RHREMD2 ...\n    Last record lag: 7 seconds.\n    At EOF, no more\
    \ records to process.\n\n    GGSCI (standbyserver) > STOP REPLICAT RHREMD2\n \
    \   ```\n\nNow you've completed part 1 of the switchover process. The primary\
    \ database is no longer being used by the application and the replication from\
    \ the primary database to the standby database is stopped. Now you can proceed\
    \ to part 2, as shown in [Figure 12-4](#Chapter12.html#fig_12_4), and start the\
    \ standby Extract and switch the application to use the standby database.\n\n\
    ![images](images/1205.jpg)\n\n**Figure 12-5.** Disaster recovery planned switchover\
    \ part 2\n\nFollowing are descriptions for the steps in part 2 as shown in [Figure\
    \ 12-5](#Chapter12.html#fig_12_5).\n\n1.  To begin capturing changes in preparation\
    \ for the application switchover, alter the Local Extract for the standby database\
    \ to begin capturing changes now and then start it as follows:\n    ```\n    GGSCI\
    \ (standbyserver) > ALTER EXTRACT LHREMD3, BEGIN NOW\n    GGSCI (standbyserver)\
    \ > START EXTRACT LHREMD3\n    ```\n2.  Prepare the standby database for the application\
    \ and start the application connected to the standby database. In preparation,\
    \ you may need to grant some SQL permissions to your application users on the\
    \ standby database. Also remember to enable any triggers or cascade delete constraints\
    \ you may have stopped while the standby was the replication target.\n3.  At this\
    \ time you should perform any maintenance required on the primary database while\
    \ there are no applications connected. In the example, we are going to bring down\
    \ the primary database and apply a database patch."
