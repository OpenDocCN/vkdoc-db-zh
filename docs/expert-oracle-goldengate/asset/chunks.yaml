  trans: '

    # 基本复制步骤


    当先决条件完成后，可以按四个步骤设置基本的单向复制，如图 4-2 所示。这些步骤包括初始加载数据以及初始加载后保持数据同步。接下来的章节将详细说明这些步骤。


    ![images](img/0402.jpg)


    **图 4-2.** 基本复制步骤


    以下是图中步骤的描述：


    1.  启动抽取（Extract）。配置并启动抽取，以开始捕获数据库更改。您需要*在*初始加载*之前*启动抽取，以便捕获加载过程中发生的任何 SQL 数据操作语言（DML）更改。抽取从源数据库事务日志中捕获数据库更改，并将其写入源端跟踪文件。

    2.  启动数据泵（data pump）。配置并启动数据泵，将本地抽取捕获的更改通过网络发送到目标服务器上的源端跟踪文件。在目标服务器上，这些更改将被写入远程跟踪文件。

    3.  执行初始加载。使用 GoldenGate 或厂商的 `DBMS` 实用程序加载数据。这样会为每个数据库创建一个同步的副本，但在加载过程中被抽取捕获的更改除外。这些更改将在下一步启动复制（Replicat）时应用。您只需要在首次设置复制时运行一次初始数据加载。之后，GoldenGate
    将使用抽取和复制进程持续保持数据同步。

    4.  启动复制（Replicat）。配置并启动复制，以开始应用来自远程跟踪文件的更改。在初始加载进程执行期间捕获的更改已经写入远程跟踪文件。根据数据量和在加载过程中捕获更改的时间长度，复制可能需要一些时间才能追赶上这些更改。此外，其中一些更改可能会导致数据冲突，因为在数据加载运行的同时，数据库中仍有活动发生。本章稍后将介绍一些
    GoldenGate 参数（例如 `HANDLECOLLISIONS`）来自动处理这些数据冲突。当复制追上并应用了所有更改后，数据库即同步。


    ![images](img/square.jpg) **注意** 这些步骤假设的是零停机时间复制配置。初始加载进程运行时，源数据库上将发生在线 DML 更改。这是当今环境中最可能的场景，因为通常需要避免停机。如果您能够在初始加载进行期间对源数据库静默或停止
    DML 活动，则*不需要*在初始加载*之前*启动抽取。


    让我们详细查看每个基本复制步骤，从设置并启动抽取开始。


    ## 启动抽取


    当您确认先决条件已完成后，设置复制需要完成的第一步是启动抽取。请记住，您应该首先启动抽取，以开始捕获初始数据加载运行期间发生的更改。如果您可以承受停机并在初始加载运行期间停止源数据库上的所有更改活动，那么您可以在初始加载之后启动抽取。


    本节涵盖各种抽取配置设置和选项。之后，您将看到如何启动抽取并验证其是否正确捕获更改。


    ### 验证数据库级别的补充日志记录


    从 Oracle 数据库进行复制时，需要在源数据库上启用数据库级别的补充日志记录。请记住，如果您使用双向复制，则需要在源和目标数据库上都启用补充日志记录。补充日志记录是必需的，以确保
    Oracle 在重做日志中添加 GoldenGate 所需的额外信息。


    首先，您可以通过运行以下 `SQLPLUS` 命令来验证 Oracle 数据库补充日志记录是否已启用：


    ```sql

    SQL> SELECT SUPPLEMENTAL_LOG_DATA_MIN FROM V$DATABASE;


    SUPPLEMENTAL_LOG_DATA_MIN

    -------------------------

    NO

    ```


    对于 Oracle 9i，`SUPPLEMENTAL_LOG_DATA_MIN` 必须为 `YES`。对于 Oracle 10g 及更高版本，`SUPPLEMENTAL_LOG_DATA`
    必须为 `YES` 或 `IMPLICIT`。既然您已验证当前未启用数据库级别的补充日志记录，您可以输入命令来启用它。


    ### 启用数据库级别的补充日志记录


    您可以使用具有 `ALTER SYSTEM` 权限的用户运行以下 `SQLPLUS` 命令来启用 Oracle 数据库级别的补充日志记录：


    ```sql

    SQL> ALTER DATABASE ADD SUPPLEMENTAL LOG DATA;


    --验证是否已启用。


    SQL> SELECT SUPPLEMENTAL_LOG_DATA_MIN FROM V$DATABASE;


    SUPPLEMENTAL_LOG_DATA_MIN

    -------------------------

    YES

    ```


    请记住，对于 Oracle 9i，`SUPPLEMENTAL_LOG_DATA` 必须为 `YES`。对于 Oracle 10g 及更高版本，`SUPPLEMENTAL_LOG_DATA`
    必须为 `YES` 或 `IMPLICIT`。

    '
- fmt: "## 启用表级补充日志\n\n通常，Oracle、DB2 和 SQL Server 等数据库不会在事务日志中记录足够的数据，使得 GoldenGate\
    \ 能够成功地将更改复制到目标数据库。GoldenGate 除了需要更改的数据外，还需要键值，以便 GoldenGate Replicat 能够将更改的数据应用到目标数据库。向源数据库表添加补充日志可确保数据库记录\
    \ GoldenGate 在目标数据库上正确应用更新所需的键值。\n\n您可以使用 GoldenGate `ADD TRANDATA` 命令，强制数据库记录源数据库上所有更新的主键列。对于单向复制，您不需要在目标数据库上启用补充日志。要为键列添加补充日志数据，请从\
    \ GoldenGate 命令接口（GGSCI）发出以下命令。\n\n```\nGGSCI (sourceserver) 1> dblogin userid\
    \ gger password userpw\nSuccessfully logged into database.\n```\n\n如果您登录到 SQL\
    \ Server，`DBLOGIN` 命令略有不同，如下例所示：\n\n```\nGGSCI (sourceserver) 24> dblogin sourcedb\
    \ sqlserver, userid sa, password userpw\nSuccessfully logged into database.\n\
    ```\n\n`SOURCEDB` 指定 SQL Server ODBC 数据源，`USERID` 指定数据库用户 ID。如果您使用 Windows 身份验证，可以省略\
    \ `USERID` 和 `PASSWORD` 选项。\n\n接下来，您可以使用 `ADD TRANDATA` 命令来启用 GoldenGate 所需的补充日志：\n\
    \n```\nGGSCI (sourceserver) 2> add trandata hr.employees\n\nLogging of supplemental\
    \ redo data enabled for table HR.EMPLOYEES.\n```\n\n`DBLOGIN` 命令为 `gger` 数据库用户建立数据库连接。`ADD\
    \ TRANDATA` 命令使数据库记录 `HR.EMPLOYEES` 表上所有更新操作的主键列。\n\n`ADD TRANDATA` 根据数据库的不同，在后台执行不同的数据库命令。在幕后，`ADD\
    \ TRANDATA` 命令等效于 Oracle 数据库中的以下命令：\n\n```\nALTER TABLE HR.EMPLOYEES\nADD SUPPLEMENTAL\
    \ LOG GROUP GGS_EMPLOYEES_19387 (EMPLOYEE_ID) ALWAYS;\n```\n\n对于 SQL Server 2008，您会注意到\
    \ `ADD TRANDATA` 启用了变更数据捕获（CDC）并设置了两个新作业，以允许 GoldenGate Extract 使用 CDC。GoldenGate\
    \ 将通过使用主键或最小的列来最小化 CDC 数据量。\n\n您应该使用如下 Oracle 查询来验证补充日志是否已成功启用：\n\n```\nSQL> select\
    \ owner, log_group_name, table_name\n     from dba_log_groups where owner = 'HR';\n\
    \nOWNER  LOG_GROUP_NAME       TABLE_NAME\n-----  -------------------  ----------\n\
    HR     GGS_EMPLOYEES_19387  EMPLOYEES\n```\n\n如果您有大量表，逐个输入所有 `ADD TRANDATA` 命令可能很耗时。作为替代方案，您可以使用脚本（例如以下\
    \ Oracle SQLPLUS 脚本）来自动生成大量表的 `ADD TRANDATA` 命令：\n\n```\nset echo off\nset verify\
    \ off\nset pagesize 2000\nset linesize 250\nset trim on\nset heading off\nset\
    \ feedback off\n\nspool &&SCHEMA..add_trandata.obey\n\nselect 'add trandata &SCHEMA..'||table_name\n\
    \  from dba_tables where owner = '&SCHEMA' ;\n\nspool off\n```\n\n前面的脚本生成一个 Oracle\
    \ 假脱机文件，然后您可以在 GGSCI 中使用 `OBEY` 命令处理它，如下所示：\n\n```\nGGSCI (sourceserver) 1> dblogin\
    \ userid gger password userpw\nSuccessfully logged into database.\n\nGGSCI (sourceserver)\
    \ 2> obey diroby/HR.add_trandata.obey\n```\n\n再次强调，良好的做法是在 `ADD TRANDATA` 命令完成后，您应在\
    \ SQLPLUS 中验证补充日志是否已成功启用。您可以使用如下查询来完成此操作：\n\n```\nSQL> select owner, log_group_name,\
    \ table_name\n     from dba_log_groups where owner = 'HR';\n\nOWNER  LOG_GROUP_NAME\
    \         TABLE_NAME\n-----  ---------------------  -----------\nHR     GGS_REGIONS_19375\
    \      REGIONS\nHR     GGS_COUNTRIES_19377    COUNTRIES\nHR     GGS_LOCATIONS_19379\
    \    LOCATIONS\nHR     GGS_DEPARTMENTS_19382  DEPARTMENTS\nHR     GGS_JOBS_19385\
    \         JOBS\nHR     GGS_EMPLOYEES_19387    EMPLOYEES\nHR     GGS_JOB_HISTORY_19391\
    \  JOB_HISTORY\n```\n\n对于 SQL Server 2008，您可以查询变更数据捕获表来确定是否已启用变更数据捕获，如下所示：\n\n\
    ```\nselect * from cdc.change_tables\n```\n\n下一步是禁用任何触发器或级联删除约束，这将在下一节中讨论。\n\n\
    ## 禁用触发器和级联删除约束\n\n您需要在*目标*表上禁用任何数据库触发器或级联删除引用完整性约束。原因是为了防止重复更改，因为 GoldenGate\
    \ 已经从源数据库复制了触发器和级联删除操作的*结果*。如果您不禁用约束和触发器，GoldenGate 将复制这些更改；然后触发器和级联删除约束也会触发，导致目标数据库上出现重复更改。\n\
    \n有几种方法可用于禁用触发器和级联删除约束。第一种方法仅适用于较新的 Oracle 版本，涉及向 Replicat 添加参数。第二种方法只是通过 `ALTER\
    \ TABLE` 来禁用触发器和约束，并在复制关闭时重新启用它们。\n\n从 GoldenGate 版本 11 开始，作为 Replicat `DBOPTIONS`\
    \ 参数的一部分，提供了一个新的 `SUPPRESSTRIGGERS` 选项，用于自动阻止触发器在目标上执行。您可以使用它来避免手动禁用触发器。此选项适用于\
    \ Oracle 10.2.0.5 及更高版本数据库，以及 Oracle 11.2.0.2 及更高版本数据库。要禁用约束，如果您有 Oracle 9.2.0.7\
    \ 及更高版本数据库，可以使用带有 `DEFERREFCONST` 选项的 Replicat 参数 `DBOPTIONS`，将完整性约束的检查和执行延迟到\
    \ Replicat 事务提交时。\n\n您也可以使用 SQL 脚本（例如以下 Oracle 数据库示例）来自动为级联删除约束和触发器生成 `ALTER TABLE`\
    \ 启用和禁用命令。使用脚本从数据库动态生成命令可以节省时间并确保更高的准确性。在此示例中，脚本会提示输入方案所有者名称：\n\n```\nset echo\
    \ off\nset verify off\nset pagesize 2000\nset linesize 250\nset trim on\nset heading\
    \ off\nset feedback off\n\nspool &&SCHEMA..disable_cascade_delete_constraints.sql\n\
    \nselect 'alter table '||owner||'.'||table_name||\n' disable constraint '||constraint_name||';'\n\
    from all_constraints\nwhere delete_rule = 'CASCADE'\nand owner = '&SCHEMA';\n\
    spool off\n\nspool &SCHEMA..disable_triggers.sql\n\nselect 'alter trigger '||owner||'.'||trigger_name||\n\
    ' disable ;'\nfrom all_triggers\nwhere owner = '&SCHEMA';\n\nspool off\n\nspool\
    \ &SCHEMA..enable_cascade_delete_constraints.sql\n\nselect 'alter table '||owner||'.'||table_name||\n\
    ' enable constraint '||constraint_name||';'\nfrom all_constraints\nwhere delete_rule\
    \ = 'CASCADE'\nand owner = '&SCHEMA';\n\nspool off\n\nspool &SCHEMA..enable_triggers.sql\n\
    \nselect 'alter trigger '||owner||'.'||trigger_name||\n' enable;'\nfrom all_triggers\n\
    where owner = '&SCHEMA';\n\nspool off\n```\n\n该脚本生成四个假脱机文件，然后您可以在 SQLPLUS 中执行它们来禁用和启用触发器及级联删除约束。"
  raw: '#### Enabling Table-Level Supplemental Logging


    Normally, databases such as Oracle, DB2, and SQL Server don''t log enough data
    in the transaction logs for GoldenGate to be able to successfully replicate the
    change to the target database. GoldenGate requires the key values in addition
    to the changed data in order for the GoldenGate Replicat to apply the changed
    data to the target database. Adding supplemental logging to the source database
    tables ensures that the database logs the key values that GoldenGate needs in
    order to properly apply the updates on the target database.


    You can use the GoldenGate `ADD TRANDATA` command to force the database to log
    primary-key columns for all updates on your source database. You don''t need to
    enable supplemental logging on the target database for one-way replication. To
    add supplemental log data for key columns, issue the following commands from the
    GoldenGate Command Interface (GGSCI).


    `GGSCI (sourceserver) 1> dblogin userid gger password userpw`

    `Successfully logged into database.`


    If you''re logging in to SQL Server, the `DBLOGIN` command is slightly different,
    as shown in the following example:


    `GGSCI (sourceserver) 24> dblogin sourcedb sqlserver, userid sa, password userpw`

    `Successfully logged into database.`


    `SOURCEDB` specifies the SQL Server ODBC data source, and `USERID` specifies the
    database user ID. If you''re using Windows authentication, you can leave off the
    `USERID` and `PASSWORD` options.


    Next you can use the `ADD TRANDATA` command to enable the supplemental logging
    required by GoldenGate:


    `GGSCI (sourceserver) 2> add trandata hr.employees`


    `Logging of supplemental redo data enabled for table HR.EMPLOYEES.`


    The `DBLOGIN` command establishes a database connection for the gger database
    user. The `ADD TRANDATA` command causes the database to log primary-key columns
    for all update operations on the HR.EMPLOYEES table.


    `ADD TRANDATA` performs different database commands in the background depending
    on the database. Behind the scenes, the `ADD TRANDATA` command is equivalent to
    the following command in an Oracle database:


    `ALTER TABLE HR.EMPLOYEES`

    `ADD SUPPLEMENTAL LOG GROUP GGS_EMPLOYEES_19387 (EMPLOYEE_ID) ALWAYS;`


    For SQL Server 2008, you notice that ADD TRANDATA enables Change Data Capture
    (CDC) and sets up two new jobs to allow the GoldenGate Extract to use CDC. GoldenGate
    will minimize the amount of CDC data by using primary key or the smallest columns
    available.


    You should verify the supplemental logging was successfully enabled with an Oracle
    query such as the following:


    `SQL> select owner, log_group_name, table_name`

    `     from dba_log_groups where owner = ''HR'';`


    `OWNER  LOG_GROUP_NAME       TABLE_NAME`

    `-----  -------------------  ----------`

    `HR     GGS_EMPLOYEES_19387  EMPLOYEES`


    If you have a large number of tables, it may be time consuming to enter all the
    `ADD TRANDATA` commands individually. As an alternative, you can use a script,
    such as the following Oracle SQLPLUS script, to automatically generate the `ADD
    TRANDATA` commands for a large number of tables:


    `set echo off`

    `set verify off`

    `set pagesize 2000`

    `set linesize 250`

    `set trim on`

    `set heading off`

    `set feedback off`


    `spool &&SCHEMA..add_trandata.obey`


    `select ''add trandata &SCHEMA..''||table_name`

    `  from dba_tables where owner = ''&SCHEMA'' ;`


    `spool off`


    The preceding script generates an Oracle spool file, which you can then process
    in GGSCI using an `OBEY` command as follows:


    `GGSCI (sourceserver) 1> dblogin userid gger password userpw`

    `Successfully logged into database.`


    `GGSCI (sourceserver) 2> obey diroby/HR.add_trandata.obey`


    Once again, it''s good practice that when the `ADD TRANDATA` commands complete,
    you should verify in SQLPLUS that the supplemental logging has been successfully
    enabled. You can do this with a query like the following:


    `SQL> select owner, log_group_name, table_name`

    `     from dba_log_groups where owner = ''HR'';`


    `OWNER  LOG_GROUP_NAME         TABLE_NAME`

    `-----  ---------------------  -----------`

    `HR     GGS_REGIONS_19375      REGIONS`

    `HR     GGS_COUNTRIES_19377    COUNTRIES`

    `HR     GGS_LOCATIONS_19379    LOCATIONS`

    `HR     GGS_DEPARTMENTS_19382  DEPARTMENTS`

    `HR     GGS_JOBS_19385         JOBS`

    `HR     GGS_EMPLOYEES_19387    EMPLOYEES`

    `HR     GGS_JOB_HISTORY_19391  JOB_HISTORY`


    For SQL Server 2008, you can query the Change Data Capture tables to determine
    if changed data capture has been enabled, as follows:


    `select * from cdc.change_tables`


    The next step is to disable any triggers or cascade-delete constraints, as discussed
    in the next section.


    #### Disabling Triggers and Cascade-Delete Constraints


    You need to disable any database triggers or cascade-delete referential integrity
    constraints on your *target* tables. The reason is to prevent duplicate changes,
    because GoldenGate is already replicating the *results* of the trigger and cascade-delete
    operations from the source database. If you didn''t disable the constraints and
    triggers, GoldenGate would replicate those changes; then the triggers and cascade-delete
    constraints would also fire, causing duplicate changes on the target database.


    Several methods are available for disabling the triggers and cascade-delete constraints.
    The first method is only available for newer Oracle versions and involves adding
    parameters to the Replicat. The second method is simply to alter the tables to
    disable the triggers and constraints and then enable them when replication is
    turned off.


    Starting with GoldenGate version 11, a new `SUPPRESSTRIGGERS` option is available
    as part of the Replicat `DBOPTIONS` parameter, to automatically suppress the triggers
    from firing on the target. You can use it to avoid having to manually disable
    the triggers. This option is available for Oracle 10.2.0.5 databases and later,
    and for Oracle 11.2.0.2 databases and later. To disable constraints, if you have
    Oracle 9.2.0.7 database and later, you can use the Replicat parameter `DBOPTIONS`
    with the `DEFERREFCONST` option to delay checking and enforcement of integrity
    constraints until the Replicat transaction commits.


    You can also use a SQL script such as the following Oracle database example to
    automatically generate your `ALTER TABLE` enable and disable commands for the
    cascade-delete constraints and triggers. Using a script to dynamically generate
    the commands from the database saves time and ensures more accuracy. In this example,
    the script prompts for the schema owner name:


    `set echo off`

    `set verify off`

    `set pagesize 2000`

    `set linesize 250`

    `set trim on`

    `set heading off`

    `set feedback off`


    `spool &&SCHEMA..disable_cascade_delete_constraints.sql`


    `select ''alter table ''||owner||''.''||table_name||`

    `'' disable constraint ''||constraint_name||'';''`

    `from all_constraints`

    `where delete_rule = ''CASCADE''`

    `and owner = ''&SCHEMA'';`

    `spool off`


    `spool &SCHEMA..disable_triggers.sql`


    `select ''alter trigger ''||owner||''.''||trigger_name||`

    `'' disable ;''`

    `from all_triggers`

    `where owner = ''&SCHEMA'';`


    `spool off`


    `spool &SCHEMA..enable_cascade_delete_constraints.sql`


    `select ''alter table ''||owner||''.''||table_name||`

    `'' enable constraint ''||constraint_name||'';''`

    `from all_constraints`

    `where delete_rule = ''CASCADE''`

    `and owner = ''&SCHEMA'';`


    `spool off`


    `spool &SCHEMA..enable_triggers.sql`


    `select ''alter trigger ''||owner||''.''||trigger_name||`

    `'' enable;''`

    `from all_triggers`

    `where owner = ''&SCHEMA'';`


    `spool off`


    The script generates four spool files, which you can then execute in SQLPLUS to
    disable and enable the triggers and cascade-delete constraints.'
