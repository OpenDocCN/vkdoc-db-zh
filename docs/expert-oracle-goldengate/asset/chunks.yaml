    `***********************************************************************`

    `                 Oracle GoldenGate Capture for Oracle`

    `                     Version 11.1.1.0.0 Build 078`

    `        Windows (optimized), Oracle 11 on Jul 28 2010 18:00:34`


    `Copyright (C) 1995, 2010, Oracle and/or its affiliates. All rights reserved.`

    `                    Starting at 2011-03-14 00:00:32`

    `***********************************************************************`

    `Operating System Version:`

    `Microsoft Windows Vista Business Edition, on x86`

    `Version 6.0 (Build 6002: Service Pack 2)`

    `Process id: 2524`

    `Description:`

    `***********************************************************************`

    `**            Running with the following parameters                  **`

    `***********************************************************************`

    `--Example Extract Parameter File`

    `SOURCEISTABLE`

    `2011-03-14 00:00:33  INFO    OGG-01017  Wildcard resolution set to IMMEDIATE
    bec`

    `ause SOURCEISTABLE is used.`

    `USERID ggs, PASSWORD *****`

    `Source Context :`

    `  SourceModule            : [ggdb.ora.sess]`

    `  SourceID                : [../gglib/ggdbora/ocisess.c]`

    `  SourceFunction          : [OCISESS_try]`

    `  SourceLine              : [498]`

    `2011-03-14 00:00:33  ERROR   OGG-00664  OCI Error during OCIServerAttach (status`

    ` = 12560-ORA-12560: TNS:protocol adapter error).`

    `2011-03-14 00:00:33  ERROR   OGG-01668  PROCESS ABENDING.`


    In this case, Extract fails to run due to an Oracle protocol network error on
    the source database server. The network error is caused by a failed Oracle 11g
    network listener (TNS) failing to start correctly. You troubleshoot the error
    by examining the `listener.ora` and `tnsnames.ora` network configuration and correcting
    any errors. Then, restart both the Oracle listener and GoldenGate processes. By
    correcting the source Oracle 11g listener protocol error, you can successfully
    restart the Extract process.


    Another useful way to investigate Extract failure problems is to run the GGSCI
    command `INFO <extract name>, DETAIL` to obtain a listing of the current Extract
    file locations for additional analysis:


    `GGSCI (oracledba) 26> info extora, detail`

    `EXTRACT    EXTORA    Initialized   2011-03-13 23:45   Status STOPPED`

    `Checkpoint Lag       00:00:00 (updated 00:22:24 ago)`

    `Log Read Checkpoint  Oracle Redo Logs`

    `                     2011-03-13 23:45:30  Seqno 0, RBA 0`

    `  Target Extract Trails:`

    `  Remote Trail Name                                Seqno        RBA     Max MB`

    `  AA                                                   0          0         10`


    `  Extract Source                          Begin             End`

    `  Not Available                           * Initialized *   2011-03-13 23:45`

    `Current directory    C:\ggs_src`

    `Report file          C:\ggs_src\dirrpt\EXTORA.rpt`

    `Parameter file       C:\ggs_src\dirprm\EXTORA.prm`

    `Checkpoint file      C:\ggs_src\dirchk\EXTORA.cpe`

    `Process file         C:\ggs_src\dirpcs\EXTORA.pce`

    `Error log            C:\ggs_src\ggserr.log`


    Next, let’s look at more difficult situations that occur when an Oracle GoldenGate
    process fails without providing you with a report.


    #### Oracle GoldenGate Process Failures Without Report Diagnostics


    If an Oracle GoldenGate process fails before first writing out a report file to
    standard screen output, you can run it from the operating system’s command shell
    (not GGSCI) to send process information to the terminal. To investigate, you can
    issue the startup by using the syntax `<process> paramfile <path name>.prm` at
    the operating-system level where `<process>` indicates either the Extract or Replicat
    process for Oracle GoldenGate and `paramfile` is the fully qualified file name
    of the parameter file for the Extract or Replicat. Here’s an example:


    `C:\ggs_src>extract paramfile C:\ggs_src\dirprm\extora.prm`

    `Version 6.0 (Build 6002: Service Pack 2)`

    `Process id: 6056`

    `Description:`

    `2011-03-14 00:19:46  ERROR   OGG-00664  OCI Error beginning session (status =
    10`

    `17-ORA-01017: invalid username/password; logon denied).`

    `2011-03-14 00:19:46  ERROR   OGG-01668  PROCESS ABENDING.`


    On UNIX and Linux platforms, you need to look for a core dump file located under
    the Oracle GoldenGate home directory where you’ve installed the Oracle GoldenGate
    software.


    ### Oracle GoldenGate Trail File Problems


    Recall from earlier chapters that Oracle GoldenGate process groups write and read
    data to special flat files called *trail files* on the source and target systems.
    Failure in processing these trail files halts correct operations of the Oracle
    GoldenGate software. This section looks at the following problems that can occur
    with trail files:


    *   Trail files that don’t empty

    *   Trail files that don’t roll over

    *   Trail file purging issues


    #### Trail Files that Don’t Empty


    Sometimes you encounter a problem with trail files that don’t empty and remain
    full of data. You should check to identify whether the trail file in question
    is a local or remote trail file. If the problem is with a local trail file that
    fails to empty, check for TCP/IP network latency issues between the source, intermediate,
    and target systems. If the remote trail file on the target system fails to empty
    on a regular basis, check to see if your Replicat process groups are available,
    running, and processing data from the remote trail files.


    If the Replicat processes are running correctly without errors, the cause may
    be large transactions being processed by the Replicat on the target system. In
    this case, you can split up the tables and partition them to break out the large
    transactions into multiple trail files with additional Replicat process groups
    to process the transactions in parallel. To do so, use the Oracle GoldenGate `Replicat`
    parameter `FILTER` option with the `@RANGE` function in the `MAP` statement for
    the Replicat.'
  trans: "#### Oracle GoldenGate Extract 进程失败\n\nOracle GoldenGate Extract 进程失败可能发生在源系统上，也可能发生在使用数据泵\
    \ Extract 进程的中间系统上。由于 Extract 进程与源数据库、Manager 进程以及目标 Replicat 进程进行通信，如果这些 Oracle\
    \ GoldenGate 进程中的任何一个出现问题，Extract 要么会挂起，要么会异常终止并失败。当您处理 Extract 失败时，应首先运行 Oracle\
    \ GoldenGate GGSCI `VIEW REPORT` 命令来检查当前 Oracle GoldenGate 环境的状态。如果 Extract 进程在源系统上失败，请运行以下命令：\n\
    \n```\nGGSCI> VIEW REPORT <extract name>\n```\n\n在 GGSCI 中检查 `VIEW REPORT` 命令的输出；其中的详细信息为解决\
