- fmt: "# Replicat Errors on the Oracle Database Target System\n\nThe Oracle Replicat\
    \ performs the critical task of reading data from the remote trail files on the\
    \ target database system. It uses SQL statements to apply the transactions to\
    \ the target database system. The following issues can occur with Replicat processing\
    \ and cause failures in Oracle GoldenGate:\n\n*   The Replicat hangs or fails\
    \ to process data against the target Oracle database.\n*   The Replicat abends\
    \ and fails on the target database system.\n*   Large transactions cause the Replicat\
    \ to fail.\n\nLet’s look into each of these issues with Replicats and how to resolve\
    \ them.\n\n## Replicat Hangs on the Target System\n\nSometimes the Replicat process\
    \ stalls and doesn’t continue to process data from the remote trail file on the\
    \ target system. If this issue occurs, check the status of the Replicat process\
    \ group by issuing the GGSCI command `INFO REPLICAT` and noting the trail file\
    \ name as well as the checkpoint information.\n\nMake sure you verify that the\
    \ Replicat is reading data from the same trail file the Extract process group\
    \ is writing to. If you discover that this isn’t the case, then you need to rectify\
    \ the situation by executing the GGSCI command `ALTER REPLICAT <group>, EXTTRAIL\
    \ <trail file name>`. Then, to verify that everything is correct, issue the GGSCI\
    \ command `INFO RMTTRAIL *` on the target system. In the event that the trail\
    \ file wasn’t created, you can create a new trail file by executing the GGSCI\
    \ command `ADD EXTTRAIL <trail file name>, EXTRACT <group>` on the source system.\n\
    \n## Replicat Experiences an Abend Failure on the Target System\n\nRecall from\
    \ earlier chapters that Replicat processes live on the target database system\
    \ and use a special database table called the `checkpoint table`. If this table\
    \ is accidentally deleted or corrupted, Replicat processing fails. One indication\
    \ of this is the abend condition shown here:\n\n```\n2011-03-16 01:13:58  ERROR\
    \   OGG-00446  Checkpoint table GGS.CHECKPOINT does not exist. Please create the\
    \ table or recreate the REPORA group using the correct table.\n2011-03-16 01:13:58\
    \  ERROR   OGG-01668  PROCESS ABENDING.\n```\n\nYou may also see errors on the\
    \ source system with the Extract such as GGS error 516, “Extract read, No data\
    \ found selecting position from checkpoint table.”\n\nThe solution to corrupted\
    \ checkpoint errors is to drop and re-create the checkpoint table on the target\
    \ system for the Replicat or to use the `convchk` utility and then restart the\
    \ Replicat. My Oracle Support Note 965703.1 ([`http://support.oracle.com`](http://support.oracle.com))\
    \ has tips on using the `convchk` utility.\n\nThe syntax for the `convchk` utility\
    \ is\n\n```\nconvchk <replicat group> <schema>.<checkpoint table name>\n```\n\n\
    Let’s look at how to use the `convchk` utility to repair a corrupted checkpoint\
    \ table for Oracle GoldenGate with a Replicat on Windows. You run this from a\
    \ Windows or UNIX/Linux shell prompt window and not from within the GGSCI interface:\n\
    \n```\nC:\\ggs_trgt>convchk repora ggs.checkpoint\n***********************************************************************\n\
    \            Oracle GoldenGate Checkpoint Conversion Utility\n               \
    \      Version 11.1.1.0.0 Build 078\n              Windows (optimized) on Jul\
    \ 28 2010 17:43:24\nCopyright (C) 1995, 2010, Oracle and/or its affiliates. All\
    \ rights reserved.\n                    Starting at 2011-03-16 01:23:18\n***********************************************************************\n\
    Operating System Version:\nMicrosoft Windows Vista Business Edition, on x86\n\
    Version 6.0 (Build 6002: Service Pack 2)\nProcess id: 4880\nOpening existing checkpoint\
    \ file C:\\ggs_trgt\\dirchk\\REPORA.cpr for group REPORA.\nCheckpoint C:\\ggs_trgt\\\
    dirchk\\REPORA.cpr backed up to C:\\ggs_trgt\\dirchk\\REPORA.cpr.1300252998.bak.\n\
    Updating checkpoint table in 8.0.2-compatible checkpoint file.\nSuccessfully converted\
    \ checkpoint to 8.0.2-compatible format.\nCheckpoint conversion successful for\
    \ group REPORA.\n```\n\nOnce you’ve fixed the checkpoint table for the Replicat,\
    \ you should be able to start the Replicat without errors as shown here:\n\n```\n\
    GGSCI (oracledba) 14>  info repora, detail\nREPLICAT   REPORA    Last Started\
    \ 2011-03-16 01:29   Status RUNNING\nCheckpoint Lag       00:00:00 (updated 00:00:07\
    \ ago)\nLog Read Checkpoint  File c:\\ggs_src\\trails\\aa000000\n            \
    \         First Record  RBA 0\n  Extract Source                          Begin\
    \             End\n  c:\\ggs_src\\trails\\aa000000              * Initialized\
    \ *   First Record\n  c:\\ggs_src\\trails\\aa000000              * Initialized\
    \ *   First Record\nCurrent directory    C:\\ggs_trgt\nReport file          C:\\\
    ggs_trgt\\dirrpt\\REPORA.rpt\nParameter file       C:\\ggs_trgt\\dirprm\\REPORA.prm\n\
    Checkpoint file      C:\\ggs_trgt\\dirchk\\REPORA.cpr\nCheckpoint table     GGS.CHECKPOINT\n\
    Process file         C:\\ggs_trgt\\dirpcs\\REPORA.pcr\nError log            C:\\\
    ggs_trgt\\ggserr.log\n```\n\n![images](images/square.jpg) `Note` The `convchk`\
    \ utility causes the checkpoint file to become the new master for Replicat checkpoints.\
    \ The Replicat resynchronizes the truncated checkpoint table with data from the\
    \ checkpoint file.\n\n## Replicat Fails on Large Transactions\n\nIf the target\
    \ system can’t support large transactions, the Replicat process groups will fail\
    \ with an out-of-memory condition. To solve this error, you can set the `MAXTRANSOPS`\
    \ parameter to split up the Replicat transactions into smaller transactions or\
    \ use multiple Replicat groups to process these in parallel.\n\n## Incompatible\
    \ Record Errors with a Replicat\n\nOne common problem during Replicat processing\
    \ on the target system occurs when incompatible records bring the Replicat to\
    \ its knees and failure. In the GGSCI logs, you see an error similar to the following:\n\
    \n```\n2011-03-09 11:00:22 GGS ERROR 509 GoldenGate Delivery for Oracle, REPORA.prm:\
    \ Extract read, Incompatible record in C:\\GGS_TRGT\\DIRDAT\\AA000000, rba 5466\
    \ (getting header).\n```\n\nThis occurs if the data gets corrupted in transit\
    \ from the source system to the target system. Another cause is a data format\
    \ that isn’t compatible with Replicat processing. If you use the `FORMATASCII`,\
    \ `FORMATSQL`, or `FORMATXML` parameter for the Extract during the initial load,\
    \ it will cause the failure to occur.\n\nIncompatible-record errors with the Replicat\
    \ also occur due to misconfiguration of trail files that are sent from the source\
    \ to the target system when the Extract is configured to overwrite an existing\
    \ trail file. For instance, if you have two Extract processes writing to the same\
    \ trail file, they will overwrite the one the Replicat is looking to use, thus\
    \ causing an incompatible-record error.\n\nThe Replicat needs complete records\
    \ to apply the data successfully from the trail file to the target system. Sometimes\
    \ the Extract and Replicat groups are dropped and rebuilt with the exact same\
    \ trail-file name. This causes the Extract process to begin writing again at the\
    \ first part of the same trail file, causing issues with stepping on the trail\
    \ file.\n\nYou can use the `Logdump` utility to investigate error 509 conditions\
    \ with Oracle and GoldenGate. In the event that you can’t salvage the data, the\
    \ best solution is to resynchronize the target database with a new initial load\
    \ and to add new trail files correctly to avoid future issues."
  raw: '#### Replicat Errors on the Oracle Database Target System


    The Oracle Replicat performs the critical task of reading data from the remote
    trail files on the target database system. It uses SQL statements to apply the
    transactions to the target database system. The following issues can occur with
    Replicat processing and cause failures in Oracle GoldenGate:


    *   The Replicat hangs or fails to process data against the target Oracle database.

    *   The Replicat abends and fails on the target database system.

    *   Large transactions cause the Replicat to fail.


    Let’s look into each of these issues with Replicats and how to resolve them.


    #### Replicat Hangs on the Target System


    Sometimes the Replicat process stalls and doesn’t continue to process data from
    the remote trail file on the target system. If this issue occurs, check the status
    of the Replicat process group by issuing the GGSCI command `INFO REPLICAT` and
    noting the trail file name as well as the checkpoint information.


    Make sure you verify that the Replicat is reading data from the same trail file
    the Extract process group is writing to. If you discover that this isn’t the case,
    then you need to rectify the situation by executing the GGSCI command `ALTER REPLICAT
    <group>, EXTTRAIL <trail file name>`. Then, to verify that everything is correct,
    issue the GGSCI command `INFO RMTTRAIL *` on the target system. In the event that
    the trail file wasn’t created, you can create a new trail file by executing the
    GGSCI command `ADD EXTTRAIL <trail file name>, EXTRACT <group>` on the source
    system.


    #### Replicat Experiences an Abend Failure on the Target System


    Recall from earlier chapters that Replicat processes live on the target database
    system and use a special database table called the *checkpoint table*. If this
    table is accidentally deleted or corrupted, Replicat processing fails. One indication
    of this is the abend condition shown here:


    `2011-03-16 01:13:58  ERROR   OGG-00446  Checkpoint table GGS.CHECKPOINT does
    not exist. Please create the table or recreate the REPORA group using the correct
    table.`

    `2011-03-16 01:13:58  ERROR   OGG-01668  PROCESS ABENDING.`


    You may also see errors on the source system with the Extract such as GGS error
    516, “Extract read, No data found selecting position from checkpoint table.”


    The solution to corrupted checkpoint errors is to drop and re-create the checkpoint
    table on the target system for the Replicat or to use the `convchk` utility and
    then restart the Replicat. My Oracle Support Note 965703.1 ([`http://support.oracle.com`](http://support.oracle.com))
    has tips on using the `convchk` utility.


    The syntax for the `convchk` utility is


    `convchk <replicat group> <schema>.<checkpoint table name>`


    Let’s look at how to use the `convchk` utility to repair a corrupted checkpoint
    table for Oracle GoldenGate with a Replicat on Windows. You run this from a Windows
    or UNIX/Linux shell prompt window and not from within the GGSCI interface:


    `C:\ggs_trgt>convchk repora ggs.checkpoint`

    `***********************************************************************`

    `            Oracle GoldenGate Checkpoint Conversion Utility`

    `                     Version 11.1.1.0.0 Build 078`

    `              Windows (optimized) on Jul 28 2010 17:43:24`

    `Copyright (C) 1995, 2010, Oracle and/or its affiliates. All rights reserved.`

    `                    Starting at 2011-03-16 01:23:18`

    `***********************************************************************`

    `Operating System Version:`

    `Microsoft Windows Vista Business Edition, on x86`

    `Version 6.0 (Build 6002: Service Pack 2)`

    `Process id: 4880`

    `Opening existing checkpoint file C:\ggs_trgt\dirchk\REPORA.cpr for group REPORA.`

    `Checkpoint C:\ggs_trgt\dirchk\REPORA.cpr backed up to C:\ggs_trgt\dirchk\REPORA.cpr.1300252998.bak.`

    `Updating checkpoint table in 8.0.2-compatible checkpoint file.`

    `Successfully converted checkpoint to 8.0.2-compatible format.`

    `Checkpoint conversion successful for group REPORA.`


    Once you’ve fixed the checkpoint table for the Replicat, you should be able to
    start the Replicat without errors as shown here:


    `GGSCI (oracledba) 14>  info repora, detail`

    `REPLICAT   REPORA    Last Started 2011-03-16 01:29   Status RUNNING`

    `Checkpoint Lag       00:00:00 (updated 00:00:07 ago)`

    `Log Read Checkpoint  File c:\ggs_src\trails\aa000000`

    `                     First Record  RBA 0`

    `  Extract Source                          Begin             End`

    `  c:\ggs_src\trails\aa000000              * Initialized *   First Record`

    `  c:\ggs_src\trails\aa000000              * Initialized *   First Record`

    `Current directory    C:\ggs_trgt`

    `Report file          C:\ggs_trgt\dirrpt\REPORA.rpt`

    `Parameter file       C:\ggs_trgt\dirprm\REPORA.prm`

    `Checkpoint file      C:\ggs_trgt\dirchk\REPORA.cpr`

    `Checkpoint table     GGS.CHECKPOINT`

    `Process file         C:\ggs_trgt\dirpcs\REPORA.pcr`

    `Error log            C:\ggs_trgt\ggserr.log`


    ![images](images/square.jpg) **Note** The `convchk` utility causes the checkpoint
    file to become the new master for Replicat checkpoints. The Replicat resynchronizes
    the truncated checkpoint table with data from the checkpoint file.


    #### Replicat Fails on Large Transactions


    If the target system can’t support large transactions, the Replicat process groups
    will fail with an out-of-memory condition. To solve this error, you can set the
    `MAXTRANSOPS` parameter to split up the Replicat transactions into smaller transactions
    or use multiple Replicat groups to process these in parallel.


    #### Incompatible Record Errors with a Replicat


    One common problem during Replicat processing on the target system occurs when
    incompatible records bring the Replicat to its knees and failure. In the GGSCI
    logs, you see an error similar to the following:


    `2011-03-09 11:00:22 GGS ERROR 509 GoldenGate Delivery for Oracle, REPORA.prm:
    Extract read, Incompatible record in C:\GGS_TRGT\DIRDAT\AA000000, rba 5466 (getting
    header).`


    This occurs if the data gets corrupted in transit from the source system to the
    target system. Another cause is a data format that isn’t compatible with Replicat
    processing. If you use the `FORMATASCII`, `FORMATSQL`, or `FORMATXML` parameter
    for the Extract during the initial load, it will cause the failure to occur.


    Incompatible-record errors with the Replicat also occur due to misconfiguration
    of trail files that are sent from the source to the target system when the Extract
    is configured to overwrite an existing trail file. For instance, if you have two
    Extract processes writing to the same trail file, they will overwrite the one
    the Replicat is looking to use, thus causing an incompatible-record error.


    The Replicat needs complete records to apply the data successfully from the trail
    file to the target system. Sometimes the Extract and Replicat groups are dropped
    and rebuilt with the exact same trail-file name. This causes the Extract process
    to begin writing again at the first part of the same trail file, causing issues
    with stepping on the trail file.


    You can use the `Logdump` utility to investigate error 509 conditions with Oracle
    and GoldenGate. In the event that you can’t salvage the data, the best solution
    is to resynchronize the target database with a new initial load and to add new
    trail files correctly to avoid future issues.'
  trans: "# 在 Oracle 数据库目标系统上复制 Replicat 错误\n\nOracle Replicat 执行着一项关键任务：从目标数据库系统上的远程跟踪文件中读取数据。它使用\
    \ SQL 语句将事务应用到目标数据库系统。Replicat 处理过程中可能出现以下问题，导致 Oracle GoldenGate 失败：\n\n*   Replicat\
    \ 挂起或无法处理目标 Oracle 数据库的数据。\n*   Replicat 在目标数据库系统上发生异常终止（abend）并失败。\n*   大型事务导致\
    \ Replicat 失败。\n\n让我们深入探讨这些 Replicat 问题及其解决方法。\n\n## Replicat 在目标系统上挂起\n\n有时，Replicat\
    \ 进程会停滞，无法继续处理目标系统上远程跟踪文件中的数据。如果出现此问题，请通过执行 GGSCI 命令 `INFO REPLICAT` 来检查 Replicat\
    \ 进程组的状态，并记下跟踪文件名以及检查点信息。\n\n请务必验证 Replicat 正在读取的数据与 Extract 进程组写入的是同一个跟踪文件。如果发现情况并非如此，则需要通过执行\
    \ GGSCI 命令 `ALTER REPLICAT <group>, EXTTRAIL <trail file name>` 来纠正此情况。然后，为了验证一切是否正确，在目标系统上执行\
    \ GGSCI 命令 `INFO RMTTRAIL *`。如果跟踪文件尚未创建，您可以通过在源系统上执行 GGSCI 命令 `ADD EXTTRAIL <trail\
    \ file name>, EXTRACT <group>` 来创建一个新的跟踪文件。\n\n## Replicat 在目标系统上遇到异常终止失败\n\n\
    回顾前面的章节可知，Replicat 进程驻留在目标数据库系统上，并使用一个名为 `checkpoint table`（检查点表）的特殊数据库表。如果此表被意外删除或损坏，Replicat\
    \ 处理就会失败。一个表现就是此处显示的异常终止（abend）状态：\n\n```\n2011-03-16 01:13:58  ERROR   OGG-00446\
    \  Checkpoint table GGS.CHECKPOINT does not exist. Please create the table or\
    \ recreate the REPORA group using the correct table.\n2011-03-16 01:13:58  ERROR\
    \   OGG-01668  PROCESS ABENDING.\n```\n\n您还可能在源系统上看到与 Extract 相关的错误，例如 GGS 错误\
    \ 516：“Extract read, No data found selecting position from checkpoint table.”\n\
    \n解决损坏的检查点错误的方法是：在目标系统上为 Replicat 删除并重新创建检查点表，或者使用 `convchk` 实用程序，然后重新启动 Replicat。我的\
    \ Oracle 支持说明 965703.1 ([`http://support.oracle.com`](http://support.oracle.com))\
    \ 提供了关于使用 `convchk` 实用程序的提示。\n\n`convchk` 实用程序的语法是：\n\n```\nconvchk <replicat\
    \ group> <schema>.<checkpoint table name>\n```\n\n让我们看看如何使用 `convchk` 实用程序来修复\
    \ Windows 上 Oracle GoldenGate（带有 Replicat）中损坏的检查点表。您需要从 Windows 或 UNIX/Linux shell\
    \ 提示符窗口运行此命令，而不是从 GGSCI 界面内运行：\n\n```\nC:\\ggs_trgt>convchk repora ggs.checkpoint\n\
    ***********************************************************************\n    \
    \        Oracle GoldenGate Checkpoint Conversion Utility\n                   \
    \  Version 11.1.1.0.0 Build 078\n              Windows (optimized) on Jul 28 2010\
    \ 17:43:24\nCopyright (C) 1995, 2010, Oracle and/or its affiliates. All rights\
    \ reserved.\n                    Starting at 2011-03-16 01:23:18\n***********************************************************************\n\
    Operating System Version:\nMicrosoft Windows Vista Business Edition, on x86\n\
    Version 6.0 (Build 6002: Service Pack 2)\nProcess id: 4880\nOpening existing checkpoint\
    \ file C:\\ggs_trgt\\dirchk\\REPORA.cpr for group REPORA.\nCheckpoint C:\\ggs_trgt\\\
    dirchk\\REPORA.cpr backed up to C:\\ggs_trgt\\dirchk\\REPORA.cpr.1300252998.bak.\n\
    Updating checkpoint table in 8.0.2-compatible checkpoint file.\nSuccessfully converted\
    \ checkpoint to 8.0.2-compatible format.\nCheckpoint conversion successful for\
    \ group REPORA.\n```\n\n一旦您修复了 Replicat 的检查点表，您应该能够无错误地启动 Replicat，如下所示：\n\n```\n\
    GGSCI (oracledba) 14>  info repora, detail\nREPLICAT   REPORA    Last Started\
    \ 2011-03-16 01:29   Status RUNNING\nCheckpoint Lag       00:00:00 (updated 00:00:07\
    \ ago)\nLog Read Checkpoint  File c:\\ggs_src\\trails\\aa000000\n            \
    \         First Record  RBA 0\n  Extract Source                          Begin\
    \             End\n  c:\\ggs_src\\trails\\aa000000              * Initialized\
    \ *   First Record\n  c:\\ggs_src\\trails\\aa000000              * Initialized\
    \ *   First Record\nCurrent directory    C:\\ggs_trgt\nReport file          C:\\\
    ggs_trgt\\dirrpt\\REPORA.rpt\nParameter file       C:\\ggs_trgt\\dirprm\\REPORA.prm\n\
    Checkpoint file      C:\\ggs_trgt\\dirchk\\REPORA.cpr\nCheckpoint table     GGS.CHECKPOINT\n\
    Process file         C:\\ggs_trgt\\dirpcs\\REPORA.pcr\nError log            C:\\\
    ggs_trgt\\ggserr.log\n```\n\n![images](img/square.jpg) `请注意` `convchk` 实用程序会使检查点文件成为\
    \ Replicat 检查点的新主控文件。Replicat 会使用检查点文件中的数据重新同步被截断的检查点表。\n\n## Replicat 在处理大型事务时失败\n\
    \n如果目标系统无法支持大型事务，Replicat 进程组将因内存不足情况而失败。要解决此错误，您可以设置 `MAXTRANSOPS` 参数，将 Replicat\
    \ 事务拆分为更小的事务，或者使用多个 Replicat 组并行处理这些事务。\n\n## Replicat 的不兼容记录错误\n\n目标系统上 Replicat\
    \ 处理期间的一个常见问题是，不兼容的记录会导致 Replicat 崩溃并失败。在 GGSCI 日志中，您会看到类似以下的错误：\n\n```\n2011-03-09\
    \ 11:00:22 GGS ERROR 509 GoldenGate Delivery for Oracle, REPORA.prm: Extract read,\
    \ Incompatible record in C:\\GGS_TRGT\\DIRDAT\\AA000000, rba 5466 (getting header).\n\
    ```\n\n如果数据在从源系统传输到目标系统的过程中损坏，就会发生这种情况。另一个原因是数据格式与 Replicat 处理不兼容。如果您在初始加载期间为\
    \ Extract 使用了 `FORMATASCII`、`FORMATSQL` 或 `FORMATXML` 参数，将导致此失败发生。\n\nReplicat\
    \ 的不兼容记录错误也可能由于跟踪文件配置错误而发生，这些跟踪文件是从源系统发送到目标系统的，同时 Extract 被配置为覆盖现有的跟踪文件。例如，如果您有两个\
    \ Extract 进程写入同一个跟踪文件，它们将覆盖 Replicat 试图使用的文件，从而导致不兼容记录错误。\n\nReplicat 需要完整的记录才能成功地将数据从跟踪文件应用到目标系统。有时，Extract\
    \ 和 Replicat 组会被删除并使用完全相同的跟踪文件名重建。这会导致 Extract 进程开始再次从同一个跟踪文件的起始部分写入，从而引发“覆盖跟踪文件”的问题。\n\
    \n您可以使用 `Logdump` 实用程序来调查 Oracle 和 GoldenGate 的错误 509 情况。如果无法挽救数据，最佳解决方案是通过新的初始加载重新同步目标数据库，并正确添加新的跟踪文件以避免将来出现问题。"
- fmt: '#### Data-Synchronization Issues


    As much as you might like Oracle GoldenGate to automate the data-verification
    process, it doesn’t perform these checks. However, you can implement conflict-resolution
    scripts and programs to check for data synchronization between source and target
    systems. Oracle GoldenGate performs basic checks by matching target rows from
    the source and target database primary key and unique-key columns, or substitute
    key columns if you define these with the `KEYCOLS` option for the `TABLE` and
    `MAP` statements in the Extract and Replicat.


    You should perform out-of-sync data checks on a regular basis as part of your
    database administration duties for Oracle GoldenGate to remediate synchronization
    issues. Veridata provides a suite of tools to check for data-synchronization issues
    with Oracle GoldenGate environments.


    What causes data-synchronization issues, you may ask? There are several key factors:


    *   Tables missing key constraints

    *   Character-set configuration issues

    *   Column-missing errors

    *   Fetch failures on source and target tables


    #### Tables Missing Key Constraints


    Oracle GoldenGate relies on table-key constraints to map source-to-target DDL
    and DML activities. Without these keys, Oracle GoldenGate uses all of the table
    columns as a key value. This may cause multiple rows of the table to be updated
    if they contain identical data. One way to address this issue to avoid data duplication
    is to set the `KEYCOLS` option for the `TABLE` and `MAP` statements in the Extract
    and Replicat parameter files along with the `LIMITROWS` option to prevent multiple
    rows from being updated.


    #### Character Set Configuration Issues


    Because Oracle GoldenGate uses the database character set to perform data-synchronization
    tasks, you need to make sure the Oracle source and target character sets are the
    same to avoid synchronization errors. If they’re different, then errors will result.
    You can check the character sets by looking at the `NLS_LANG` environment variable
    on both the source and target Oracle database systems. The source `NLS_LANG` value
    must be set to the same exact character set as the target system. In addition,
    the target Oracle database character set needs to be set as a superset of the
    source Oracle database system.


    #### Missing-Column Errors


    If columns are found to be missing between source and target, Oracle GoldenGate
    won’t replicate data correctly. This has its root cause in two areas. The first
    case arises if supplemental data hasn’t been enabled on the source and target
    Oracle database environments correctly. For Oracle, you use the `ADD TRANDATA`
    command to add the required supplemental log data either at the database level
    or on a table-by-table basis.


    Another cause of missing-column errors occurs when the `KEYCOLS` parameter is
    used to perform column-mapping transformations from the source to target environments.
    If there is a mismatch in source-to-target key-column mapping, errors occur. You
    need to make sure you include either an existing key or a unique column in the
    `KEYCOLS` definition to resolve this error.


    Filters and functions used in Extract and Replicat parameter files also cause
    these errors in the event that the correct existing key column isn’t specified
    and found between the source and target mapping transformations given in the Extract
    and Replicat parameter files.


    #### Fetch Failures


    Database fetch failures cause data-synchronization errors if source-row data is
    deleted during Oracle GoldenGate processing. Another root cause of fetch failures
    occurs when undo retention for the Oracle source and target environments expires.
    This causes the mandatory read-consistent image of the data that the Extract process
    is looking for to disappear, with the end result that the Oracle Snapshot Too
    Old message is displayed. You can resolve this issue by adding the `FETCHOPTIONS
    NOUSESNAPSHOT` parameter to the Extract process group configuration. This parameter
    makes the Extract fetch data from the table instead of going to the undo tablespace.


    After you’ve verified that Oracle GoldenGate has processed the record, you need
    to remove `FETCHOPTIONS` so the Extract returns to fetching data from the undo
    tablespace. You should also increase the amount of time that Oracle maintains
    data in the undo tablespace on the source and target Oracle databases.


    ### Summary


    This chapter provided you with tips and techniques for how to troubleshoot Oracle
    GoldenGate issues from a holistic perspective. You learned how to identify and
    resolve common issues that cause failures with Oracle GoldenGate processing due
    to database, operating system, and network configuration setups. In addition,
    the chapter discussed ways to enable tracing of the Oracle GoldenGate environment
    to isolate the root cause of operational issues. For more information, see My
    Oracle Support at [`http://support.oracle.com`](http://support.oracle.com).


    ## Disaster Recovery Replication


    There are many strategies available for maintaining a disaster recovery database.
    These range from simply keeping backup copies of the database at an offsite location
    to database-level replication and even storage mirroring. This chapter will give
    you a good understanding of how to set up up the GoldenGate replication solution
    for maintaining a disaster recovery database. The major advantage of using GoldenGate
    for disaster recovery replication is that it can become your organization''s universal
    database disaster recovery solution. GoldenGate works across many different databases
    and platforms. Using GoldenGate, you can develop standard disaster recovery processes
    and implement them across your organization, regardless of the specific DBMS being
    used.


    Earlier in [Chapter 4](#Chapter04.html#ch4) you set up basic replication. In this
    chapter you''ll build on that basic configuration and implement a specific replication
    configuration for disaster recovery purposes. In many ways, the GoldenGate configuration
    for disaster recovery is similar to basic replication, with a few enhancements.
    This chapter will cover setting up and configuring GoldenGate replication for
    disaster recovery. We''ll cover how to handle both planned and unplanned outage
    scenarios and how you can use GoldenGate to minimize downtime.


    ### Prerequisites


    You need to have the following prerequisites in place before you can start setting
    up replication for disaster recovery:


    *   The GoldenGate software installed on the source and target servers as described
    in [Chapter 2](#Chapter02.html#ch2)

    *   The GoldenGate database User ID created on the source and target databases

    *   The server name or IP address of the target database server

    *   The GoldenGate Manager process up and running on the source and the target

    *   TCP/IP network connectivity open from the source server to the target server''s
    GoldenGate manager port and vice versa

    *   An understanding of the business and technical replication requirements for
    the disaster recovery replication


    There are a few additional prerequisites that are important for disaster recovery
    replication:


    *   Backups of your GoldenGate software files and working directories on the source
    and target servers

    *   SQL scripts to grant any necessary object privileges required by your application
    during a switchover or failover

    *   Processes and scripts to move your application and users from the source to
    the target server and back again


    First, let''s review the requirements for disaster recovery replication. Understanding
    the requirements is probably the single most important factor in the success of
    any replication project.'
