  trans: '

    ## Oracle GoldenGate 故障排除


    作为数据库专业人员，使用 Oracle GoldenGate 时最困难的方面之一，是如何在整个实施生命周期中对出现的错误进行故障排查和解决。由于 Oracle
    GoldenGate 作为企业级软件的功能和操作特性，它涉及从源数据库到目标数据库，再到网络问题等整个技术栈的所有层面。本章的目标是为您提供最佳的整体框架，用以识别和解决
    Oracle GoldenGate 生态系统中发生的问题。


    ### 常见问题与解决方案


    为了使您掌握解决 Oracle GoldenGate 相关问题的最佳方法，我们首先采用一种整体方法来排查 Oracle GoldenGate 环境中最常见的问题。因为
    Oracle GoldenGate 涉及数据库、网络、存储和操作系统等多个领域，本章将依次讨论这些与 Oracle GoldenGate 问题解决相关的领域。为便于讨论，采用一种可视化方法来分析
    Oracle GoldenGate 的根本原因是有用的，如图 11-1 所示。


    ![images](img/1101.jpg)


    **图 11-1.** 排查 Oracle Goldengate 软件问题的整体方法


    本章将探讨以下可能给 Oracle GoldenGate 环境带来困扰的领域：


    *   进程失败

    *   跟踪文件问题

    *   同步问题

    *   源和目标系统上的启动问题

    *   数据库配置和可用性问题


    作为您探索 Oracle GoldenGate 故障排除之旅的一部分，本章提供了可用于追踪和识别问题根源的技巧和技术，以便您能快速解决问题。让我们开始吧！


    ### Oracle GoldenGate 进程失败


    您在 Oracle GoldenGate 环境中可能遇到的第一类问题是进程失败。这些问题可能发生在源端、目标端，或由于一个或多个 Oracle GoldenGate
    进程的问题在两个环境中同时发生。


    回顾前面的章节，Oracle GoldenGate 环境在源数据库和目标数据库系统上包含许多不同的后台进程，例如抽取（Extract）、数据泵（Data Pump）、复制（Replicat）、收集器（Collector）和管理器（Manager）进程。如果这些关键进程中的任何一个失败，那么复制活动很可能会戛然而止，从而影响数据的完整性以及
    Oracle GoldenGate 环境之间实时数据传输的操作。


    本节首先探讨在正常的 Oracle GoldenGate 操作期间发生的进程失败，以及解决这些类型进程失败的方法。如果您发现 Oracle GoldenGate
    进程失败，要执行的首要任务是使用 GoldenGate 软件命令接口（`GGSCI`）的 `INFO ALL` 命令来调查详细信息：


    ```

    C:\ggs_src>ggsci

    Oracle GoldenGate Command Interpreter for Oracle

    Version 11.1.1.0.0 Build 078

    Windows (optimized), Oracle 11 on Jul 28 2010 17:20:29

    Copyright (C) 1995, 2010, Oracle and/or its affiliates. All rights reserve

    GGSCI (oracledba) 1> info all

    Program     Status      Group       Lag           Time Since Chkpt

    MANAGER     STOPPED

    ```


    在许多情况下，当 Oracle GoldenGate 的源环境或目标环境出现网络问题时，`Manager` 进程会失败。您应检查以确保 `Manager`
    进程已启动并正在运行。如果 `Manager` 进程未运行，则需要通过在 `GGSCI` 内执行以下命令来重新启动它：


    ```

    GGSCI> START MANAGER

    ```


    要验证 `Manager` 是否已成功启动，请在启动后再次发出 Oracle GoldenGate `GGSCI` 命令。以下示例确保 `Manager`
    已正确启动且没有错误：


    ```

    GGSCI (oracledba) 7> start manager

    Manager started.

    GGSCI (oracledba) 8> info all

    Program     Status      Group       Lag           Time Since Chkpt

    MANAGER     RUNNING

    ```


    作为 Oracle GoldenGate 的关键进程之一，如果网络端口被防火墙阻止，`Manager` 进程会异常终止或失败。您可以使用 `ping` 命令进行检查，以验证端口是否存在网络问题。您应与您的网络或系统管理员密切合作，确保
    `Manager` 进程分配的端口是开放且可用的，以便 `Manager` 能够与 Oracle GoldenGate 的源系统和目标系统进行通信。

