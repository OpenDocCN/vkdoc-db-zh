  trans: '

    # 磁盘要求


    Teradata 版的 Oracle GoldenGate 有以下磁盘空间要求：


    *   50–150MB 的空间，加上为 Oracle GoldenGate 二进制文件和软件目录结构准备的 40 MB 额外磁盘空间。


    关于 Teradata 和 Oracle GoldenGate 的附加指南可参阅 Oracle® GoldenGate Teradata 安装与设置指南 11g
    第 1 版 (11.1.1)，可在线获取： [`http://download.oracle.com/docs/cd/E18101_01/index.htm`](http://download.oracle.com/docs/cd/E18101_01/index.htm)。


    ## 在 Windows 和 UNIX 上为 Sybase 安装 Goldengate


    与所有数据库平台一样，Sybase 对 Oracle GoldenGate 软件的安装提出了独特的要求。用于 Sybase 的 Oracle GoldenGate
    磁盘空间要求与用于 Oracle 的 GoldenGate 要求相同。除了磁盘空间存储要求外，您还需要根据 UNIX 或 Windows 权限授予操作系统级别的权限，以便
    Sybase 模式账户和 Oracle GoldenGate 操作系统级别账户能够在涉及 Sybase 和 Oracle GoldenGate 安装的源系统和目标系统之间，在数据库和操作系统级别进行读写操作。否则，当复制进程尝试执行其功能时会发生错误。以下数据库要求必须作为
    Sybase 和 Oracle GoldenGate 安装过程的一部分完成：


    *   在 Sybase 源数据库中配置 `DSQUERY` 变量。

    *   在启动 GoldenGate Extract 进程之前，暂停 Sybase RepServer。您需要这样做，因为 Oracle GoldenGate
    Extract 进程使用 Sybase LTM 从 Sybase 事务日志中读取数据。

    *   授予 Oracle GoldenGate Extract 进程权限，以允许管理辅助日志截断点。

    *   Sybase 源数据库必须是一个活动服务器。它不能处于温备模式。


    关于 Sybase 和 GoldenGate 安装过程的更多细节，请参阅 Oracle® GoldenGate Sybase 安装与设置指南 11g 第 1
    版 (11.1.1)，可在线获取： [`http://download.oracle.com/docs/cd/E18101_01/index.htm`](http://download.oracle.com/docs/cd/E18101_01/index.htm)。


    ## 在 Windows 和 UNIX 上为 IBM DB2 UDB 安装 GoldenGate


    我们将重点介绍在 Windows 和 UNIX 平台上，为 IBM DB2 UDB 数据库安装 Oracle 11g GoldenGate 的数据库要求。磁盘空间存储要求与前面讨论的通用
    Oracle GoldenGate 安装要求相同。此外，您还需要在源和目标 DB2 系统上为 Oracle GoldenGate 用户账户授予数据库和操作系统级别的读写权限。以下项目必须作为
    DB2 和 GoldenGate 安装的一部分进行配置：


    *   数据库和操作系统级别的读写权限，以访问 `DB2READLOG` 函数，从而使 Oracle GoldenGate Extract 进程能够读取 DB2
    UDB 事务日志。

    *   IBM DB2 UDB 命令行界面（CLI）必须在目标数据库环境中可用，因为 Oracle GoldenGate Replicat 进程使用此 CLI
    将数据应用到目标系统。

    *   强烈建议在源和目标 DB2 系统上安装并启用 IBM DB2 UDB 控制中心图形用户界面（GUI）和命令行界面（CLI）。


    在您确认了最小磁盘空间可用并已安装所需的 IBM DB2 UDB 系统工具后，您需要向 Oracle GoldenGate 用户授予特权。您需要将 `SYSADM`
    特权或 `DBADM` 数据库级别访问权限授予 Oracle GoldenGate 数据库模式账户和操作系统级别账户。


    ![images](img/square.jpg) 注意 对于 IBM DB2 UDB，您可以通过执行命令 `GRANT DBADM ON DATABASE
    TO USER <ggs_user>` 或使用 IBM DB2 UDB 控制中心实用程序来授予权限。


    在 IBM DB2 UDB 内向 Oracle GoldenGate 模式数据库用户授予以下特权：


    *   本地连接到目标 IBM DB2 UDB 数据库环境

    *   对 IBM DB2 UDB 系统目录视图的 SELECT 权限

    *   对目标 IBM DB2 UDB 表的 SELECT、INSERT、UPDATE 和 DELETE 权限


    关于 IBM DB2 UDB 与 GoldenGate 安装的更多信息，请参阅在线提供的 Oracle GoldenGate DB2 LUW 安装与设置指南
    11g 第 1 版 (11.1.1)： [`http://download.oracle.com/docs/cd/E18101_01/index.htm`](http://download.oracle.com/docs/cd/E18101_01/index.htm)。您也可以找到其他
    DB2 平台（如 IBM DB2 z/OS）的安装指南。


    ## 安装 Oracle GoldenGate Director 11g


    Oracle GoldenGate Director 是一个可选的软件模块，为 Oracle GoldenGate 环境提供端到端的管理和管理控制台。Director
    使用丰富的图形界面，类似于 Tivoli、HP OpenView 以及 Oracle Enterprise Manager（OEM）等网络监控工具中的界面。Director
    允许您启动和停止 GoldenGate 进程，以及执行自定义脚本。与基本的 Oracle GoldenGate 事务软件的安装过程相比，此产品的安装过程有很大不同。Oracle
    GoldenGate Director 软件的早期版本具有不同的架构和软件安装过程。本章我们将只讨论当前版本的 Oracle GoldenGate Director
    软件。


    关于如何配置 Oracle GoldenGate Director 的更多细节将在后续章节中讨论。此外，我们建议您查阅 Oracle GoldenGate
    Director 管理员指南 11g 第 1 版 (11.1.1)，可在线获取： [`http://download.oracle.com/docs/cd/E18101_01/doc.1111/e18482.pdf`](http://download.oracle.com/docs/cd/E18101_01/doc.1111/e18482.pdf)。


    Oracle 11g GoldenGate Director 的安装过程包括以下组件：


    *   Oracle 11g Director 服务器应用程序

    *   监控代理

    *   Director 客户端

    *   Director 管理员客户端

    *   将被监控的 Oracle GoldenGate 实例


    执行实际安装之前的第一步是审查 Oracle 11g GoldenGate Director 软件的系统要求。让我们看一下 Oracle GoldenGate
    Director 服务器的安装要求。


    ### 系统要求


    成功执行 Oracle 11g GoldenGate Director 安装需要以下系统配置：


    *   至少 1GB RAM（内存越多越好）。

    *   为 Director 软件分配最少 1–1.5 GB 的磁盘空间。

    *   Oracle GoldenGate Director 服务器的专用端口。默认使用的端口是 7001。

    *   存储库数据库中至少 200 MB 的磁盘空间，供 Oracle GoldenGate Director 服务器用于模式对象。


    接下来，您需要确保使用的特定平台是受支持的配置。以下是受支持的平台。


    #### 受支持的平台


    Oracle GoldenGate Director 在以下平台上可用并受支持：


    *   UNIX: Solaris, IBM AIX, HP-UX

    *   Linux: RedHat x86/x64, Oracle Enterprise Linux (OEL)

    *   Windows x86/x64


    对于 Oracle GoldenGate Director 服务器，您还需要在执行安装之前，验证以下软件已安装并可供 Oracle GoldenGate Director
    服务器使用。

    '
- fmt: '##### Software Requirements


    The following software must be installed prior to deploying Oracle GoldenGate
    Director:


    *   `Java Runtime Environment (JRE)` release `6` (`1.6` or later) required on
    the system that will house Oracle GoldenGate Director Server

    *   `Oracle Weblogic Server 11g (10.3.1/10.3.2/10.3.3)` Standard Edition Server


    ![images](images/square.jpg) **Note** Oracle `11g` Weblogic Server must be installed
    and configured prior to performing the Oracle `11g` GoldenGate Director Server
    installation. Please consult the Oracle `11g` Weblogic documentation for details
    on how to install Oracle `11g` Weblogic.


    In addition to the above software requirements, you will also need to install
    a new repository database for the Oracle `11g` GoldenGate Director Server during
    the installation process. The following `RDBMS` database platforms are supported
    as the repository database for Oracle GoldenGate Director Server:


    *   Oracle `9i` or later

    *   MS SQL Server `2000` or `2005`

    *   MySQL `5.×` Enterprise Edition


    For `UNIX` and `LINUX` platforms, a graphical (`GUI`) windowing environment such
    as `X-Windows` must be installed and configured.


    ##### GoldenGate Director Client Installation Requirements


    Before you install the client for Oracle GoldenGate Director, be advised that
    you will need to complete the following preparations:


    *   The monitor screen display resolution must be at a level of `1024 × 768` or
    higher on the client machine.

    *   `JRE` version `6` software for the `Java Runtime Environment` must be installed
    on the client machine.

    *   Client host must be on the same physical network as that for the Oracle GoldenGate
    Director Server.


    ##### GoldenGate Director Web Client Installation Guidelines


    The Oracle GoldenGate Director web client machine must contain a valid and supported
    Internet web browser. The following browsers are supported:


    *   Mozilla Firefox `1.4` or later

    *   Microsoft Internet Explorer `5.0` or later

    *   Apple Safari `1.2` or later


    ### Installing Oracle GoldenGate Director Server


    Once you have satisfied all of the above prerequisites, the installation for the
    Oracle GoldenGate Director Server can be performed. First you will need to create
    a new database schema account in the repository database on the Oracle GoldenGate
    Director Server. Then you can perform the installation of the Oracle GoldenGate
    Director software.


    #### Grant Database Privileges and Credentials to Oracle GoldenGate Director Server
    Schema


    If you choose to use Oracle for the repository database, you will need to create
    a schema user account and grant the `QUOTA UNLIMITED` privilege to the user''s
    default tablespace. For details on using other database platforms, such as `MySQL`
    and `Microsoft SQL Server`, as the Oracle GoldenGate Director repository database,
    please consult the Oracle GoldenGate Director Administrator''s Guide `11g` Release
    `1 (11.1.1)` documentation available online at [`http://download.oracle.com/docs/cd/E18101_01/doc.1111/e18482.pdf`](http://download.oracle.com/docs/cd/E18101_01/doc.1111/e18482.pdf).


    To perform the Oracle GoldenGate Director Server software installation, execute
    the setup script called `ggdirector-serverset_<version>` and follow the screen
    prompts.


    #### Install Oracle GoldenGate Director


    Now it is time to install the Oracle GoldenGate Director software. The following
    steps must be performed to ensure a successful installation of the Oracle GoldenGate
    Director software:


    1.  Download the Oracle `11g` GoldenGate Director software.

    2.  Download and install the Microsoft Visual `C++ 2005 SP1` Redistributable Package
    from [`http://microsoft.com`](http://microsoft.com)

    3.  Install and configure Oracle `11g` Weblogic Standard Server on the Oracle
    GoldenGate Director Server.

    4.  Download Oracle `11g` database software to the Oracle `11g` GoldenGate Director
    Server. This will be used for the repository database with the Director Server.


    ### Installing Oracle GoldenGate Veridata


    Oracle GoldenGate Veridata performs data synchronization functionality that allows
    you to ensure that all of the source and target Goldengate environments are in
    sync in terms of data replicated between source and target. Veridata uses the
    concept of a compare pare set of algorithms to measure synchronization changes
    between source and target Goldengate environments. Veridata consists of one or
    more agents and the repository server that houses the metadata objects for Oracle
    GoldenGate Veridata operations. For a standard Oracle GoldenGate Veridata installation,
    you will need to install and configure the following systems:


    *   Oracle GoldenGate Veridata Web

    *   Oracle GoldenGate Veridata Server

    *   Oracle GoldenGate Veridata Agent

    *   Oracle GoldenGate Veridata CLI

    *   Source and Target databases to be compared


    We will cover administration of these Oracle GoldenGate Veridata components in
    [Chapter 9](#Chapter09.html#ch9). For now, we will provide you with details on
    the installation process. First, we will discuss the requirements for the Oracle
    GoldenGate Veridata Agent.


    #### GoldenGate Veridata Agent System Requirements


    You will need to install an Oracle GoldenGate Veridata agent for each database
    instance to be compared in the comparison check. In addition, the following software
    is required for the Oracle GoldenGate Veridata Agent:


    *   `Java` is required for the agent to function. Install either the `Java Runtime
    Environment (JRE) 1.5`, `Java 6`, or the `Java Software Developer Kit (JSDK)`
    for `UNIX` and `LINUX` systems that will be used with the Veridata Agent.


    ![images](images/square.jpg) **Note** A `TCP/IP` network port must be available
    and configured for all database platforms that will interact with Veridata Agent
    and Server. For instance, with Oracle, you must have the Oracle listener configured
    and online.


    #### GoldenGate Veridata Agent Disk Requirements


    While there is no exact disk space requirement for the Oracle GoldenGate Veridata
    Agent, we recommend that at least `200MB` of disk space be granted for the software
    installation.


    #### GoldenGate Veridata Agent Memory Requirements


    *   `1GB` or more of `RAM` memory is required for the Oracle GoldenGate Veridata
    Agent software.


    #### GoldenGate Veridata Agent Database Privileges


    Depending on the specific database platform chosen for the Veridata comparison,
    you will need to grant database-level privileges to the Oracle GoldenGate Veridata
    Agent. For example, Oracle requires the following database privileges:


    *   `GRANT SELECT` on tables that will be compared by Veridata

    *   `GRANT CONNECT`

    *   `SELECT_CATALOG_ROLE`


    MS SQL Server requires the following database privileges for the Veridata Agent:


    *   `VIEW DEFINITION` for databases that are compared

    *   `db_datareader` on tables compared

    *   SQL Server authentication must be used


    For IBM `DB2` and Veridata agent, you need to configure the `SELECT` privileges
    for all tables used in the comparison. Teradata also requires `SELECT` privileges
    for tables used by Veridata as part of the comparison check.


    #### GoldenGate Veridata Server System Requirements


    ##### Disk Requirements


    Oracle GoldenGate Veridata has the following disk space requirements:


    *   `30MB` of disk storage for basic setup


    ##### Memory Requirements


    Oracle Veridata has the following memory requirements:


    *   `1GB` or more of available system memory is required for the Oracle GoldenGate
    Veridata Server.


    We recommend `64-bit` `OS` for best performance with Oracle GoldenGate Veridata
    processing operations. By using a `64-bit` operating system, you will be able
    to take advantage of additional memory for virtual memory requirements should
    you perform large sorting operations with Veridata.'
