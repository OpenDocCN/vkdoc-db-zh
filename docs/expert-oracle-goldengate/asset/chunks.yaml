  trans: '

    ## 目标数据库


    与源数据库类似，目标数据库实际上并非 GoldenGate 组件，而是您基础设施中的供应商数据库。GoldenGate 支持多种目标数据库。表 3-2 展示了截至
    11g 版本，GoldenGate 支持作为目标数据库的列表。


    ![images](img/square.jpg) `注意` 请务必查阅 GoldenGate 产品文档以获取最新的支持目标列表。


    *表 3-2. GoldenGate 11g 支持的目标数据库*


    | **目标数据库** |

    | --- |

    | c-tree |

    | DB2 for iSeries |

    | DB2 for Linux, UNIX, Windows |

    | DB2 for z/OS |

    | Generic ODBC |

    | MySQL |

    | Oracle |

    | SQL/MX |

    | SQL Server |

    | Sybase |

    | TimesTen |


    ## 管理器


    GoldenGate 管理器进程用于管理所有 GoldenGate 进程和资源。每个运行 GoldenGate 的服务器上都会运行一个单独的管理器进程，并处理来自
    GoldenGate 软件命令接口 (`GGSCI`) 的命令。管理器是启动的第一个 GoldenGate 进程。然后，管理器启动和停止其他各个 GoldenGate
    进程，管理跟踪文件，并生成日志文件和报告。


    ## 拓扑与用例


    既然您已熟悉 GoldenGate 架构组件，现在让我们讨论各种 GoldenGate 拓扑和用例。GoldenGate 支持广泛的复制拓扑，例如单向复制、双向复制、点对点复制、广播复制和集成复制。每种拓扑都可用于支持多种用例。以下各节将讨论这些拓扑及部分用例示例。


    ### 单向复制


    如图 3-4 所示，单向复制是最简单的拓扑，通常用于报告或查询卸载目的。数据从单个源以单向复制到单个目标。数据库数据的更改仅在源数据库进行。目标数据库是只读的。


    ![images](img/0304.jpg)


    *图 3-4. 单向复制*


    单向配置对于将密集型查询和报告从源数据库卸载非常有用。它也可用于维护一个热备数据库以实现故障切换。


    另一个您应牢记的概念是，源和目标数据库可以采用不同的数据库技术。例如，源数据库可以是用于 OLTP 处理的 `Oracle`，而目标数据库可以包含来自源数据库的经过筛选的表子集，使用
    `SQL Server` 数据库进行报告和分析。实施单向复制的典型 GoldenGate 配置如图 3-5 所示。


    ![images](img/0305.jpg)


    *图 3-5. 单向复制 GoldenGate 配置*


    下图描述了该流程的实现过程：


    1.  源服务器上运行的 `本地抽取` 进程提取数据并写入源端跟踪文件。

    2.  源服务器上运行一个数据泵。这是可选的，但建议配置。数据泵从源端跟踪文件读取数据，并通过网络将其传输到远程跟踪文件。

    3.  目标服务器上运行的 `复制` 进程更新目标数据库。如果需要提高性能，可以配置多个并行的 `复制` 进程。


    单向复制的一个特例是逐时单向复制，如图 3-6 所示。在此场景中，复制先从源数据库单向到目标数据库，然后反转方向从目标到源。这种复制并非像接下来讨论的双向复制那样同时进行。逐时单向复制可用于
    *零停机数据库升级或迁移*。零停机升级和迁移将在第 13 章“零停机迁移与升级”中有更详细的介绍。


    ![images](img/0306.jpg)


    *图 3-6. 逐时单向复制 GoldenGate 配置*


    使用以下流程实现图中所示的逐时单向复制：


    1.  启动从源数据库到目标数据库的单向复制，如图 3-6 下半部分所示。源服务器上运行的 `本地抽取` 进程提取数据并写入源端跟踪文件。

    2.  源服务器上运行一个数据泵。这是可选的，但建议配置。数据泵从源端跟踪文件读取数据，并通过网络将其传输到远程跟踪文件。

    3.  目标服务器上运行的 `复制` 进程更新目标数据库。如果需要提高性能，可以配置多个并行的 `复制` 进程。

    4.  从源到目标的复制可以根据需要持续任意长时间。例如，对于零停机数据库升级，您会持续从源复制到目标，直到准备好切换到新升级的数据库。此时，复制方向反转，目标数据库成为新的源数据库，如图
    3-6 上半部分所示。

    5.  新的源服务器（原目标）上运行的 `本地抽取` 进程提取数据并写入其源端跟踪文件。

    6.  新的源服务器上运行一个数据泵。这是可选的，但建议配置。数据泵从该源端跟踪文件读取数据，并通过网络将其传输到远程跟踪文件。

    7.  新的目标服务器（原源）上运行的 `复制` 进程更新其目标数据库。如果需要提高性能，可以配置多个并行的 `复制` 进程。


    ### 双向复制


    在如图 3-7 所示的双向复制中，数据的更改可以同时发生在任一数据库上，并被复制到另一个数据库。每个数据库都包含相同的数据集。双向复制有时被称为 `active-active`
    复制，因为复制的每一端都在*主动*处理数据更改。


    ![images](img/0307.jpg)


    *图 3-7. 双向复制*


    图 3-8 展示了一个典型的双向配置。这种配置常用于存在高吞吐量和高性能要求的环境。通过允许复制的两端都处于活动状态，可以充分利用数据库和硬件资源。


    ![images](img/0308.jpg)


    *图 3-8. 双向复制 GoldenGate 配置*


    图 3-8 中展示了一些关键组件：


    1.  *每个* 源服务器上都运行着一个 `本地抽取` 进程。

    2.  *每个* 源服务器上都运行着一个数据泵。这是可选的，但建议配置。如果需要减轻源服务器上的处理负载，也可以将数据泵移至中间层服务器。

    3.  *每个* 目标上都运行着一个 `复制` 进程。如果需要提高性能，可以配置多个并行的 `复制` 进程。


    双向复制的一个缺点是它可能变得复杂。必须制定处理冲突和避免键冲突的策略。例如，一种策略可能是每个数据库只能处理特定范围的键值以避免冲突。

    '
- fmt: '### Broadcast Replication


    Broadcast replication, as shown in [Figure 3-9](#Chapter03.html#fig_3_9), is used
    to replicate data from a single source to multiple targets. In this configuration,
    the target databases are read-only. [Figure 3-10](#Chapter03.html#fig_3_10) shows
    a typical GoldenGate configuration.


    Broadcast replication is often used in environments where a copy of the production
    data is needed in several different geographic locations. Distributing the data
    relieves the load on the primary database and gets the data closer to the end
    consumer of the data.


    ![images](images/0309.jpg)


    `Figure 3-9.` Broadcast replication


    ![images](images/0310.jpg)


    `Figure 3-10.` Broadcast replication GoldenGate configuration


    Following are the key components from [Figure 3-10](#Chapter03.html#fig_3_10)
    used to implement broadcast replication:


    1.  A Local Extract is running on the source servers.

    2.  Two data-pump Extracts are running on the source server, pumping data to each
    of the target databases in parallel. The data pumps can filter the data depending
    on the requirements of the target databases.

    3.  A Replicat is running on each target. Multiple Replicats can be configured
    if needed to improve performance.


    ### Integration Replication


    Integration replication, as shown in [Figure 3-11](#Chapter03.html#fig_3_11),
    is used to consolidate and integrate data from multiple source databases into
    a single target. The target database is read-only.


    Integration replication is often used in data-warehouse environments. Data is
    usually transformed and filtered, and only a subset of each of the source databases
    is needed for the data warehouse.


    ![images](images/0311.jpg)


    `Figure 3-11.` Integration replication


    A typical GoldenGate configuration to implement integration replication involves
    the components shown in [figure 3-12](#Chapter03.html#fig_3_12).


    ![images](images/0312.jpg)


    `Figure 3-12.` Integration replication GoldenGate configuration


    Here is a more detailed description of each of the process components in the figure:


    1.  A Local Extract is running on *each* of the source servers.

    2.  A data pump is running on *each* source server, each pumping data to the target
    database. The data pumps can do transformation and filtering as needed.

    3.  Two Replicats are running in parallel on the target, one to process each trail
    file coming from the source.


    ## Tools and Utilities


    Now that you have an understanding of the GoldenGate flow and processes, let''s
    take a quick look at some of the GoldenGate tools and utilities. The next sections
    provide a brief overview of the tools and utilities. You learn more about these
    in later chapters.


    #### GGSCI


    `GGSCI` is the GoldenGate Software Command Interface. `GGSCI` is delivered as
    part of the GoldenGate software and can be started from the software installation
    directory using the `ggsci` command. From the `GGSCI` command prompt, you can
    enter commands to manage all parts of the GoldenGate environment including Extracts,
    Replicats, trails, the Manager, and so on. The `Help` command is built into `GGSCI`
    to give information about each command and its syntax.


    #### DEFGEN


    You can use the GoldenGate `DEFGEN` utility to generate GoldenGate table-definition
    files when your source and target tables are different (if the source and target
    tables are identical, it isn''t necessary to run `DEFGEN`). You can also use `DEFGEN`
    to generate a data-definitions file for a data-pump Extract that is doing data
    transformations on a middle-tier server. `DEFGEN` is included as part of the regular
    GoldenGate installation and is available in the GoldenGate software-installation
    directory.


    #### Logdump


    You can use the GoldenGate `Logdump` utility to view records in the GoldenGate
    trail files. The `Logdump` utility is part of the regular GoldenGate software
    installation. `Logdump` lets you view the unstructured trail data in hex and ASCII
    format and count the number of records in the trail for debugging purposes. You
    can also filter the trail for desired records and save them to a new trail for
    reprocessing if needed.


    #### Reverse


    If you ever need to undo database changes, you can use the GoldenGate `Reverse`
    utility. `Reverse` uses a special Extract to capture the before images of changes
    and then reverses the order of the transactions and writes a new trail file for
    doing the reversal. A Replicat then processes the special reversed trail to undo
    database changes. `Reverse` can be useful for backing out unwanted changes to
    the database or quickly restoring a test database back to its original state.
    `Reverse` is another utility that is included with the GoldenGate software installation.


    #### Veridata


    `Veridata` is an additional product from GoldenGate that you can use to verify
    that your source and target databases match. For critical business applications,
    you should always verify that your source and target databases match when doing
    replication. If the databases being replicated are used for failover, this is
    especially important. Data verification is usually time consuming and difficult
    to accomplish for large amounts of data. `Veridata` reduces the amount of time
    verification takes and does high-speed data verification while the databases are
    online. Results are presented on a web interface. `Veridata` is covered in detail
    in [Chapter 9](#Chapter09.html#ch9), “Veridata.”


    #### Director


    Another add-on product available from GoldenGate is `Director`. `Director` is
    a graphical tool that you can use to centrally design, configure, manage, and
    monitor your entire GoldenGate environment. `Director` is made up of several components,
    including a centralized server and database repository, a client application,
    and a web browser interface. `Director` can also be integrated with third-party
    monitoring solutions. `Director` can manage all the databases and platforms that
    GoldenGate replication supports. It''s covered in [Chapter 10](#Chapter10.html#ch10),
    “Director.”


    ## Summary


    In this chapter, you learned about the GoldenGate replication flow and each of
    the components in detail. It''s important to understand the components because
    almost all GoldenGate scenarios use these same components.


    You also saw some typical replication topologies and how they can be implemented
    using GoldenGate. Specifically, you learned about the topologies listed in [Table
    3-3](#Chapter03.html#tab_3_3). As you move into the next chapters, you learn how
    to apply the GoldenGate architecture principles to implement GoldenGate replication.


    ![images](images/t0303.jpg)


    # Chapter 4


    ## Basic Replication


    This chapter provides a good understanding of basic GoldenGate replication, including
    an example of replicating a sample human resources schema. You learn how to set
    up, start, and verify the basic replication configuration, including the initial
    data-load process. You see examples in both Oracle Database on Linux and Microsoft
    SQL Server 2008 on Windows, but keep in mind that most of the same GoldenGate
    commands and concepts apply to all of the supported platforms. The chapter points
    out where a specific command or task applies only to an Oracle database or only
    to a SQL Server database.'
  raw: '#### Broadcast Replication


    Broadcast replication, as shown in [Figure 3-9](#Chapter03.html#fig_3_9), is used
    to replicate data from a single source to multiple targets. In this configuration,
    the target databases are read-only. [Figure 3-10](#Chapter03.html#fig_3_10) shows
    a typical GoldenGate configuration.


    Broadcast replication is often used in environments where a copy of the production
    data is needed in several different geographic locations. Distributing the data
    relieves the load on the primary database and gets the data closer to the end
    consumer of the data.


    ![images](images/0309.jpg)


    ***Figure 3-9.** Broadcast replication*


    ![images](images/0310.jpg)


    ***Figure 3-10.** Broadcast replication GoldenGate configuration*


    Following are the key components from [Figure 3-10](#Chapter03.html#fig_3_10)
    used to implement broadcast replication:


    1.  A Local Extract is running on the source servers.

    2.  Two data-pump Extracts are running on the source server, pumping data to each
    of the target databases in parallel. The data pumps can filter the data depending
    on the requirements of the target databases.

    3.  A Replicat is running on each target. Multiple Replicats can be configured
    if needed to improve performance.


    #### Integration Replication


    Integration replication, as shown in [Figure 3-11](#Chapter03.html#fig_3_11),
    is used to consolidate and integrate data from multiple source databases into
    a single target. The target database is read-only.


    Integration replication is often used in data-warehouse environments. Data is
    usually transformed and filtered, and only a subset of each of the source databases
    is needed for the data warehouse.


    ![images](images/0311.jpg)


    ***Figure 3-11.** Integration replication*


    A typical GoldenGate configuration to implement integration replication involves
    the components shown in [figure 3-12](#Chapter03.html#fig_3_12).


    ![images](images/0312.jpg)


    ***Figure 3-12.** Integration replication GoldenGate configuration*


    Here is a more detailed description of each of the process components in the figure:


    1.  A Local Extract is running on *each* of the source servers.

    2.  A data pump is running on *each* source server, each pumping data to the target
    database. The data pumps can do transformation and filtering as needed.

    3.  Two Replicats are running in parallel on the target, one to process each trail
    file coming from the source.


    ### Tools and Utilities


    Now that you have an understanding of the GoldenGate flow and processes, let''s
    take a quick look at some of the GoldenGate tools and utilities. The next sections
    provide a brief overview of the tools and utilities. You learn more about these
    in later chapters.


    #### GGSCI


    GGSCI is the GoldenGate Software Command Interface. GGSCI is delivered as part
    of the GoldenGate software and can be started from the software installation directory
    using the `ggsci` command. From the GGSCI command prompt, you can enter commands
    to manage all parts of the GoldenGate environment including Extracts, Replicats,
    trails, the Manager, and so on. The `Help` command is built into GGSCI to give
    information about each command and its syntax.


    #### DEFGEN


    You can use the GoldenGate DEFGEN utility to generate GoldenGate table-definition
    files when your source and target tables are different (if the source and target
    tables are identical, it isn''t necessary to run DEFGEN). You can also use DEFGEN
    to generate a data-definitions file for a data-pump Extract that is doing data
    transformations on a middle-tier server. DEFGEN is included as part of the regular
    GoldenGate installation and is available in the GoldenGate software-installation
    directory.


    #### Logdump


    You can use the GoldenGate Logdump utility to view records in the GoldenGate trail
    files. The Logdump utility is part of the regular GoldenGate software installation.
    Logdump lets you view the unstructured trail data in hex and ASCII format and
    count the number of records in the trail for debugging purposes. You can also
    filter the trail for desired records and save them to a new trail for reprocessing
    if needed.


    #### Reverse


    If you ever need to undo database changes, you can use the GoldenGate Reverse
    utility. Reverse uses a special Extract to capture the before images of changes
    and then reverses the order of the transactions and writes a new trail file for
    doing the reversal. A Replicat then processes the special reversed trail to undo
    database changes. Reverse can be useful for backing out unwanted changes to the
    database or quickly restoring a test database back to its original state. Reverse
    is another utility that is included with the GoldenGate software installation.


    #### Veridata


    Veridata is an additional product from GoldenGate that you can use to verify that
    your source and target databases match. For critical business applications, you
    should always verify that your source and target databases match when doing replication.
    If the databases being replicated are used for failover, this is especially important.
    Data verification is usually time consuming and difficult to accomplish for large
    amounts of data. Veridata reduces the amount of time verification takes and does
    high-speed data verification while the databases are online. Results are presented
    on a web interface. Veridata is covered in detail in [Chapter 9](#Chapter09.html#ch9),
    “Veridata.”


    #### Director


    Another add-on product available from GoldenGate is Director. Director is a graphical
    tool that you can use to centrally design, configure, manage, and monitor your
    entire GoldenGate environment. Director is made up of several components, including
    a centralized server and database repository, a client application, and a web
    browser interface. Director can also be integrated with third-party monitoring
    solutions. Director can manage all the databases and platforms that GoldenGate
    replication supports. It''s covered in [Chapter 10](#Chapter10.html#ch10), “Director.”


    ### Summary


    In this chapter, you learned about the GoldenGate replication flow and each of
    the components in detail. It''s important to understand the components because
    almost all GoldenGate scenarios use these same components.


    You also saw some typical replication topologies and how they can be implemented
    using GoldenGate. Specifically, you learned about the topologies listed in [Table
    3-3](#Chapter03.html#tab_3_3). As you move into the next chapters, you learn how
    to apply the GoldenGate architecture principles to implement GoldenGate replication.


    ![images](images/t0303.jpg)


    ## C H A P T E R  4


    ## Basic Replication


    This chapter provides a good understanding of basic GoldenGate replication, including
    an example of replicating a sample human resources schema. You learn how to set
    up, start, and verify the basic replication configuration, including the initial
    data-load process. You see examples in both Oracle Database on Linux and Microsoft
    SQL Server 2008 on Windows, but keep in mind that most of the same GoldenGate
    commands and concepts apply to all of the supported platforms. The chapter points
    out where a specific command or task applies only to an Oracle database or only
    to a SQL Server database.'
  trans: '### 广播复制


    广播复制（如图 3-9 所示）用于将数据从单一源复制到多个目标。在此配置中，目标数据库为只读。图 3-10 展示了一个典型的 GoldenGate 配置。


    广播复制常用于需要在多个不同地理位置拥有生产数据副本的环境中。分发数据减轻了主数据库的负载，并使数据更接近最终数据消费者。


    ![images](img/0309.jpg)


    `图 3-9.` 广播复制


    ![images](img/0310.jpg)


    `图 3-10.` 广播复制 GoldenGate 配置


    以下是实现广播复制所使用的图 3-10 中的关键组件：


    1.  源服务器上运行着一个本地 Extract。

    2.  源服务器上运行着两个数据泵 Extract，它们并行地将数据泵送到各个目标数据库。根据目标数据库的要求，数据泵可以对数据进行过滤。

    3.  每个目标上运行着一个 Replicat。如果需要提高性能，可以配置多个 Replicat。


    ### 集成复制


    集成复制（如图 3-11 所示）用于将来自多个源数据库的数据合并并集成到一个单一目标中。目标数据库为只读。


    集成复制常用于数据仓库环境。数据通常需要经过转换和过滤，并且数据仓库通常只需要每个源数据库的一个子集。


    ![images](img/0311.jpg)


    `图 3-11.` 集成复制


    一个典型的实现集成复制的 GoldenGate 配置涉及图 3-12 中所示的组件。


    ![images](img/0312.jpg)


    `图 3-12.` 集成复制 GoldenGate 配置


    以下是图中各处理组件的更详细描述：


    1.  *每个*源服务器上都运行着一个本地 Extract。

    2.  *每个*源服务器上都运行着一个数据泵，各自将数据泵送到目标数据库。数据泵可以根据需要进行转换和过滤。

    3.  目标上并行运行着两个 Replicat，一个处理来自源端的每个跟踪文件。


    ## 工具与实用程序


    现在您已经了解了 GoldenGate 的流程和过程，让我们快速看一下 GoldenGate 的一些工具和实用程序。接下来的部分将简要概述这些工具和实用程序。您将在后续章节中了解更多关于它们的信息。


    #### GGSCI


    `GGSCI`是 GoldenGate 软件命令接口。`GGSCI`作为 GoldenGate 软件的一部分提供，可以从软件安装目录使用`ggsci`命令启动。在`GGSCI`命令提示符下，您可以输入命令来管理
    GoldenGate 环境的所有部分，包括 Extract、Replicat、跟踪文件、Manager 等。`Help`命令内置于`GGSCI`中，用于提供每个命令及其语法的信息。


    #### DEFGEN


    当源表和目标表不同时，您可以使用 GoldenGate 的`DEFGEN`实用程序来生成 GoldenGate 表定义文件（如果源表和目标表完全相同，则无需运行`DEFGEN`）。您还可以使用`DEFGEN`为在中间层服务器上执行数据转换的数据泵
    Extract 生成数据定义文件。`DEFGEN`作为常规 GoldenGate 安装的一部分包含在内，可在 GoldenGate 软件安装目录中找到。


    #### Logdump


    您可以使用 GoldenGate 的`Logdump`实用程序查看 GoldenGate 跟踪文件中的记录。`Logdump`实用程序是常规 GoldenGate
    软件安装的一部分。`Logdump`允许您以十六进制和 ASCII 格式查看非结构化的跟踪数据，并统计跟踪文件中的记录数量以用于调试目的。您还可以过滤跟踪文件以查找所需记录，并在需要时将它们保存到新的跟踪文件中以便重新处理。


    #### Reverse


    如果您需要撤销数据库更改，可以使用 GoldenGate 的`Reverse`实用程序。`Reverse`使用特殊的 Extract 来捕获更改的前镜像，然后反转事务顺序，并写入一个新的跟踪文件来执行回滚操作。随后，一个
    Replicat 处理这个特殊的反转跟踪文件以撤销数据库更改。`Reverse`对于撤回数据库中不需要的更改或快速将测试数据库恢复到其原始状态非常有用。`Reverse`是另一个包含在
    GoldenGate 软件安装中的实用程序。


    #### Veridata


    `Veridata`是 GoldenGate 的一个附加产品，您可以用它来验证源数据库和目标数据库是否匹配。对于关键的业务应用程序，在进行复制时，您应始终验证源数据库和目标数据库是否匹配。如果被复制的数据库用于故障切换，这一点尤其重要。对于大量数据，数据验证通常耗时且难以完成。`Veridata`减少了验证所需的时间，并在数据库在线时进行高速数据验证。结果通过
    Web 界面呈现。`Veridata`将在第 9 章 “Veridata”中详细介绍。


    #### Director


    GoldenGate 提供的另一个附加产品是`Director`。`Director`是一个图形化工具，您可以使用它集中设计、配置、管理和监控整个 GoldenGate
    环境。`Director`由多个组件组成，包括一个集中式服务器和数据库存储库、一个客户端应用程序和一个 Web 浏览器界面。`Director`还可以与第三方监控解决方案集成。`Director`可以管理
    GoldenGate 复制支持的所有数据库和平台。它将在第 10 章 “Director”中介绍。


    ## 本章小结


    在本章中，您详细了解了 GoldenGate 复制流程及其每个组件。理解这些组件非常重要，因为几乎所有的 GoldenGate 场景都使用这些相同的组件。


    您还看到了一些典型的复制拓扑结构以及如何使用 GoldenGate 实现它们。具体来说，您了解了表 3-3 中列出的拓扑结构。随着您进入后续章节，您将学习如何应用
    GoldenGate 架构原则来实施 GoldenGate 复制。


    ![images](img/t0303.jpg)


    # 第 4 章


    ## 基础复制


    本章帮助您深入理解基础的 GoldenGate 复制，包括一个复制示例人力资源模式的示例。您将学习如何设置、启动和验证基础复制配置，包括初始数据加载过程。您将看到基于
    Linux 的 Oracle 数据库和基于 Windows 的 Microsoft SQL Server 2008 的示例，但请记住，大多数相同的 GoldenGate
    命令和概念适用于所有支持的平台。本章指出了特定命令或任务仅适用于 Oracle 数据库或仅适用于 SQL Server 数据库的情况。'
- fmt: "## Overview\n\nNow that you've learned how to install the GoldenGate software\
    \ and how the architectural components fit together, you can begin setting up\
    \ the replication. This chapter covers setting up and configuring basic one-way\
    \ GoldenGate replication. It discusses adding the local Extract, data-pump Extract,\
    \ and Replicat for ongoing change synchronization. You also review initial data-loading\
    \ methods, including using GoldenGate and native DBMS utilities.\n\nMore advanced\
    \ configurations are covered in later chapters, such as bidirectional replication\
    \ in [Chapter 5](#Chapter05.html#ch5), heterogeneous replication in [Chapter 6](#Chapter06.html#ch6),\
    \ and zero-downtime migrations in [Chapter 13](#Chapter13.html#ch13). Keep in\
    \ mind that the same concepts covered in this chapter are a foundation to build\
    \ on for those more advanced configurations. [Chapter 5](#Chapter05.html#ch5)\
    \ also builds on this basic replication configuration and adds some advanced features\
    \ that you can use to enhance the basic configuration.\n\n### Prerequisites for\
    \ Setting Up Replication\n\nYou need to have the following prerequisites in place\
    \ before you can start setting up replication:\n\n*   The GoldenGate software\
    \ installed on the source and target servers, as described in [Chapter 2](#Chapter02.html#ch2)\n\
    *   The GoldenGate database user ID created on the source and target databases\n\
    *   The server name or IP address of the target database server\n*   The GoldenGate\
    \ Manager process up and running on the source and the target\n*   TCP/IP network\
    \ connectivity open from the source server to the target server's GoldenGate manager\
    \ port\n*   An understanding of the business and technical replication requirements\n\
    \nLet's dig a little deeper on the last item in the next section about requirements.\
    \ Understanding the requirements is probably the single most important factor\
    \ in the success of a replication project.\n\n### Requirements\n\nYou need a solid\
    \ understanding of the specific requirements that drive the replication technical\
    \ design. Here are some of the factors that impact the replication design:\n\n\
    *Source and target configurations*: Describe the existing or planned source and\
    \ target databases. What are the software releases for the database and operating\
    \ system? Are the servers stand-alone or clustered? How is the data storage configured?\
    \ What are the character sets for the source and target databases?\n\n*Data currency*:\
    \ How quickly and how often does the data need to be updated? Can any lag in the\
    \ data replication be tolerated? If no lag can be tolerated and there is a high\
    \ volume of changes, you may need to devote more time in the project to designing\
    \ and tuning the replication to avoid any lag. Keep in mind that often, reporting\
    \ systems can tolerate lag, and the target data doesn't need to be completely\
    \ up to date with the source.\n\n*Data volume*: How much data needs to be replicated?\
    \ How often is it updated? You may be able to examine the existing database-transaction\
    \ log files to determine the amount of data change that is occurring in the source\
    \ database. The data-change volume will impact the network bandwidth requirements\
    \ between the source and target and the amount of disk space required for trail\
    \ files.\n\n*Data requirements*: You should understand any unique or special data\
    \ requirements so they can be handled properly in GoldenGate. For example, if\
    \ there are triggers, they may need to be disabled in the target database. Sequences\
    \ need special parameters added if they need to be replicated. Certain data types\
    \ may need special handling or may not be supported. For example, in GoldenGate\
    \ 11, data types such as BFILE and ANYDATA aren't supported. Other data types\
    \ may be supported but with certain limitations. Be sure to check the GoldenGate\
    \ product documentation for a list of data types supported.\n\n*Security requirements*:\
    \ How much security is required for the replication? For example, is it necessary\
    \ to encrypt the data that GoldenGate is replicating? GoldenGate can encrypt both\
    \ the data stored in trail files as well as the data being sent from the source\
    \ to the target. Also, is the data in the database encrypted? For example, Oracle\
    \ can encrypt database data using a feature called Transparent Data Encryption\
    \ (TDE). If the database is using TDE, GoldenGate needs special parameters defined\
    \ to unencrypt the data for replication.\n\n*Network requirements*: Describe the\
    \ network between the source and the target? Are there any firewalls that need\
    \ to be opened for the replication? What is the distance between the source and\
    \ target? How much bandwidth is required to handle the data volume, and how much\
    \ is available?\n\n[Table 4-1](#Chapter04.html#tab_4_1) describes the environment\
    \ used for discussion purposes in this chapter. Noted in parentheses are some\
    \ settings for Windows with a SQL Server database environment. Remember, though,\
    \ the sources and targets can be any platform and database supported by GoldenGate,\
    \ as reviewed in [Chapter 3](#Chapter03.html#ch3). You may want to set up a table\
    \ like this for your replication projects.\n\n**Table 4-1. Sample GoldenGate Replication\
    \ Environment**\n\n| **Configuration Item** | **Value** |\n| --- | --- |\n| GoldenGate\
    \ software location | `/gger/ggs` (or `c:\\gger\\ggs`) |\n| GoldenGate OS user\
    \ ID/password | gguser/userpw |\n| GoldenGate database user ID/password | gger/userpw\
    \ |\n| Source server name | sourceserver |\n| Source manager port | 7840 |\n|\
    \ Source server OS/release | Linux 5.3 or Windows |\n| Source database name |\
    \ SourceDB |\n| Source database vendor/release | Oracle 11.1 (or SQL Server 2008)\
    \ |\n| Source schema | HR |\n| Target server name | targetserver |\n| Target manager\
    \ port | 7840 |\n| Target server OS/release | Linux 5.3 (or Windows) |\n| Target\
    \ database vendor/release | Oracle 11.1 (or SQL Server 2008) |\n| Target database\
    \ name | TargetDB |\n| Target schema | HR |\n| Local extract name | `LHREMD1`\
    \ |\n| Data pump name | `PHREMD1` |\n| Replicat name | `RHREMD1` |\n| Local trail\
    \ file | `l1` |\n| Remote trail file | `l2` |\n\nThe source and target schema\
    \ used in the examples is the Human Resources or HR schema from the Oracle Database\
    \ Sample Schemas. Listed next is a description of the Employees table from the\
    \ HR schema, which is used in the examples:\n\n```\nTable EMPLOYEES\n Name   \
    \                                   Null?    Type\n -----------------------------------------\
    \ -------- ----------------------------\n EMPLOYEE_ID  (PK)                  \
    \       NOT NULL NUMBER(6)\n FIRST_NAME                                      \
    \    VARCHAR2(20)\n LAST_NAME                                  NOT NULL VARCHAR2(25)\n\
    \ EMAIL                                      NOT NULL VARCHAR2(25)\n PHONE_NUMBER\
    \                                        VARCHAR2(20)\n HIRE_DATE            \
    \                      NOT NULL DATE\n JOB_ID                                \
    \     NOT NULL VARCHAR2(10)\n SALARY                                         \
    \     NUMBER(8,2)\n COMMISSION_PCT                                      NUMBER(2,2)\n\
    \ MANAGER_ID                                          NUMBER(6)\n DEPARTMENT_ID\
    \                                       NUMBER(4)\n```\n\n### One-Way Replication\
    \ Topology\n\nThe topology covered in this chapter is one-way replication, as\
    \ shown in [Figure 4-1](#Chapter04.html#fig_4_1). You may remember from [Chapter\
    \ 3](#Chapter03.html#ch3) that one-way replication is the simplest topology and\
    \ is often used for reporting or query-offloading purposes. Data is replicated\
    \ from a single source database to a single target database in only one direction.\
    \ Changes to database data are only made at the source database and are then replicated\
    \ to the target database.\n\n![images](images/0401.jpg)\n\n**Figure 4-1. One-way\
    \ replication**"
