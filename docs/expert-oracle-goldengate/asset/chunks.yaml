    \ = +ASM1)\n      (INSTANCE_NAME = +ASM1)\n    )\n  )\n```\n\n此条目应与您之前在 GoldenGate\
    \ `ASMUser`参数中指定的别名匹配。该示例在 GoldenGate 参数文件中使用`sys@asm`作为`ASMUser`进行连接，这与您的 TNS\
    \ 条目相匹配。\n\n# 添加 Oracle DDL 复制\n\n除了复制 DML 语句外，GoldenGate 还可以为所有支持 DML 复制的 Oracle\
    \ 数据库版本复制 DDL 语句。您可以使用相同的 Extract 和 Replicat 参数文件配置 GoldenGate 仅复制 DDL、仅复制 DML\
    \ 或同时复制 DDL 和 DML 语句。在开始为 DDL 复制配置参数之前，您应该了解 GoldenGate DDL 复制的一些主要限制：\n\n*  \
    \ 在 Oracle 11gR1 之前的 Oracle 10g 及更高版本中，您必须关闭 Oracle 回收站。\n*   GoldenGate 只能自动复制长度小于\
    \ 2MB 的 DDL 语句。任何长于该长度的 DDL 必须使用 GoldenGate 提供的脚本手动处理。\n*   DDL 复制仅支持在*两个*系统之间进行复制。支持双向\
    \ DDL 复制。\n*   源和目标模式必须相同。这意味着您必须在 Replicat 上使用`ASSUMETARGETDEFS`参数。\n*   您必须对需要\
    \ DDL 复制的表在数据泵 Extract 上使用直通模式。\n*   您应将单个表和相关表组的 DML 和 DDL 复制保留在同一个 Extract 和\
    \ Replicat 组中。\n\n有关其他限制的详细信息，请参阅 Oracle *GoldenGate Windows and UNIX Administrator's\
    \ Guide*。现在，让我们逐步完成添加 Oracle DDL 复制的步骤。此示例使用 gger 用户模式来存储 DDL 表，但您也可以根据需要选择其他模式：\n\
    \n1.  授予 gger 用户在`UTL_FILE`上的执行权限：`SQL> grant execute on utl_file to gger;`\n\
    2.  将以下行添加到您的`GLOBALS`文件中。请记住，此文件位于您的 GoldenGate 软件安装目录中。如果它不存在，则需要在首次创建：`GGSCHEMA\
    \ GGER`\n3.  从 GoldenGate 软件安装目录运行`marker_setup.sql`脚本，如下所示。此脚本是 GoldenGate 软件安装的一部分。它会提示输入模式名称，在本例中为\
    \ gger：\n    ```\n    SQL> connect / as sysdba\n    Connected.\n    SQL> @marker_setup.sql\n\
    \n    Marker setup script\n\n    You will be prompted for the name of a schema\
    \ for the GoldenGate database objects.\n    NOTE: The schema must be created prior\
    \ to running this script.\n    NOTE: Stop all DDL replication before starting\
    \ this installation.\n\n    Enter GoldenGate schema name:gger\n\n    Marker setup\
    \ table script complete, running verification script...\n    Please enter the\
    \ name of a schema for the GoldenGate database objects:\n    Setting schema name\
    \ to GGER\n\n    MARKER TABLE\n    -------------------------------\n    OK\n\n\
    \    MARKER SEQUENCE\n    -------------------------------\n    OK\n\n    Script\
    \ complete.\n    ```\n4.  从 GoldenGate 软件安装目录运行`ddl_setup.sql`。此脚本是 GoldenGate\
    \ 软件安装的一部分：\n    ```\n    SQL> @ddl_setup.sql\n\n    GoldenGate DDL Replication\
    \ setup script\n\n    Verifying that current user has privileges to install DDL\
    \ Replication...\n    Checking user sessions...\n\n    Check complete.\n\n   \
    \ You will be prompted for the name of a schema for the GoldenGate database objects.\n\
    \    NOTE: For an Oracle 10g source, the system recycle bin must be disabled.\n\
    \    For Oracle 11g and later, it can be enabled.\n    NOTE: The schema must be\
    \ created prior to running this script.\n    NOTE: Stop all DDL replication before\
    \ starting this installation.\n\n    Enter GoldenGate schema name:gger\n\n   \
    \ You will be prompted for the mode of installation.\n    To install or reinstall\
    \ DDL replication, enter INITIALSETUP\n    To upgrade DDL replication, enter NORMAL\n\
    \    Enter mode of installation:INITIALSETUP\n    Working, please wait ...\n \
    \   Spooling to file ddl_setup_spool.txt\n\n    Using GGER as a GoldenGate schema\
    \ name, INITIALSETUP as a mode of installation.\n\n    Working, please wait ...\n\
    \n    ...\n    ```\n"
- fmt: '# STATUS OF DDL REPLICATION

    ---

    SUCCESSFUL installation of DDL Replication software components


    Script complete.


    ## 5. 配置角色

    运行角色设置脚本，为DDL同步设置所需的角色，并将该角色授予`gger`数据库用户：

    ```

    SQL> @role_setup.sql

    ```


    `GGS Role setup script`


    `This script will drop and recreate the role GGS_GGSUSER_ROLE`

    `To use a different role name, quit this script and then edit the params.sql script`

    `to change the gg_role parameter to the preferred name. (Do not run the script.)`


    `You will be prompted for the name of a schema for the GoldenGate database objects.`

    `NOTE: The schema must be created prior to running this script.`

    `NOTE: Stop all DDL replication before starting this installation.`


    `Enter GoldenGate schema name:gger`

    `Wrote file role_setup_set.txt`


    `PL/SQL procedure successfully completed.`


    `Role setup script complete`


    `Grant this role to each user assigned to the Extract, GGSCI, and Manager processes,`

    `by using the following SQL command:`


    ```

    GRANT GGS_GGSUSER_ROLE TO <loggedUser>

    ```


    `where <loggedUser> is the user assigned to the GoldenGate processes.`


    ```

    SQL> GRANT GGS_GGSUSER_ROLE TO gger;

    ```


    `Grant succeeded.`


    ## 6. 启用DDL触发器

    运行`ddl_enable.sql`脚本以启用DDL触发器：

    ```

    SQL> @ddl_enable.sql

    ```

    `Trigger altered.`


    ## 7. 更新抽取参数文件

    更新本地Extract参数文件以包含DDL参数，告知GoldenGate您希望复制DDL。在此示例中，您仅复制在复制场景中映射的DDL语句。您也可以选择使用不同的参数选项来`INCLUDE`其他表或`EXCLUDE`它们，使其不参与DDL复制：

    ```

    DDL Include Mapped

    ```


    至此，您应该已经在Oracle数据库之间复制了DDL变更。接下来，您将看到如何设置双向复制。


    # Adding Bidirectional Replication


    在[第4章](#Chapter04.html#ch4)中，您设置了基本的单向复制。现在，让我们扩展该基础配置以支持双向复制。首先，让我们回顾一下[第3章](#Chapter03.html#ch3)中双向复制的架构。


    在双向复制中，如[图5-2](#Chapter05.html#fig_5_2)所示，数据变更可以同时发生在任一数据库上，并被复制到另一个数据库。每个数据库包含相同的数据集。双向复制有时被称为**主动-主动复制**，因为复制的每一侧都在**主动**处理数据变更。


    ![images](images/0502.jpg)


    **图 5-2.** 双向复制


    [图5-3](#Chapter05.html#fig_5_3)展示了一个典型的GoldenGate双向复制配置。这种配置通常用于有高吞吐量和高性能要求的环境。通过允许复制的两侧都处于活动状态，可以充分利用数据库和硬件。


    ![images](images/0503.jpg)


    **图 5-3.** 双向复制GoldenGate配置


    以下是[图5-3](#Chapter05.html#fig_5_3)中说明的一些关键组件：


    *   在每个源服务器上运行的本地Extract。

    *   在每个源服务器上运行的数据泵。这是可选的，但推荐使用。如果需要减轻源服务器的处理负载，也可以将数据泵移动到中间层服务器。

    *   在每个目标上运行的Replicat。如果需要提高性能，可以配置多个并行的Replicat。


    双向复制的一个缺点是它可能变得极其复杂。您必须制定处理数据冲突和避免主键冲突的策略。例如，一种策略可能是每个数据库只能处理特定范围的主键值以避免冲突。


    接下来的章节将探讨这些主题，并使用本章一直在使用的示例`HR.EMPLOYEES`表。对于双向复制，`HR.EMPLOYEES`表在参与复制的每个数据库上**既是源又是目标**。


    在开始配置双向复制参数之前，您应该注意以下几点：


    *   您无法在双向复制中复制`TRUNCATE`操作。只要截断操作总是源自同一服务器，您可以通过将截断配置为单向复制来解决此限制。

    *   从实际角度来看，双向复制通常最多在两个相同的数据库之间进行。超过两个，配置将变得极难管理。

    *   在主动-主动配置中，无法禁用触发器，因此您应在触发器中添加代码以忽略由GoldenGate Replicat生成的DML。

    *   如果使用级联删除约束，则需要禁用这些约束并将其转换为触发器。

    *   您需要规划数据库生成的顺序键，确保不会跨数据库重叠。例如，可以让一个数据库生成奇数键值，另一个数据库生成偶数键值。另一种选择是让一个数据库使用特定的键范围，另一个数据库使用不同的键范围以避免重复。

    *   如果两个数据库共享相同的主键值，则必须开发一些冲突解决例程。例如，如果具有相同主键的同一行数据在两个数据库上都被更新，应该应用哪个更新？GoldenGate提供了用于识别和处理冲突的文档示例，但这通常取决于应用程序的业务规则。


    有关其他限制和注意事项的详细信息，请参阅Oracle *GoldenGate Windows and UNIX Administrator''s Guide*。现在，让我们开始配置双向复制的步骤。'
  raw: "`STATUS OF DDL REPLICATION`\n    `--------------------------------------------------------------------------------`\n\
    \    `SUCCESSFUL installation of DDL Replication software components`\n\n`Script\
    \ complete.`\n5.  Run the role-setup script to set up the roles needed for DDL\
    \ synchronization and grant the role to the gger database user: `SQL> @role_setup.sql`\n\
    \n`GGS Role setup script`\n\n`This script will drop and recreate the role GGS_GGSUSER_ROLE`\n\
    \    `To use a different role name, quit this script and then edit the params.sql\
    \ script`\n    `to change the gg_role parameter to the preferred name. (Do not\
    \ run the script.)`\n\n`You will be prompted for the name of a schema for the\
    \ GoldenGate database objects.`\n    `NOTE: The schema must be created prior to\
    \ running this script.`\n    `NOTE: Stop all DDL replication before starting this\
    \ installation.`\n\n`Enter GoldenGate schema name:gger`\n    `Wrote file role_setup_set.txt`\n\
    \n`PL/SQL procedure successfully completed.`\n\n`Role setup script complete`\n\
    \n`Grant this role to each user assigned to the Extract, GGSCI, and Manager processes,`\n\
    \    `by using the following SQL command:`\n\n`GRANT GGS_GGSUSER_ROLE TO <loggedUser>`\n\
    \n`where <loggedUser> is the user assigned to the GoldenGate processes.`\n\n`SQL>\
    \ GRANT GGS_GGSUSER_ROLE TO gger;`\n\n`Grant succeeded.`\n6.  Run the `ddl_enable.sql`\
    \ script to enable the DDL trigger: `SQL> @ddl_enable.sql`\n    `Trigger altered.`\n\
    7.  Update the local Extract parameter file to include the DDL parameter, to tell\
    \ GoldenGate you wish to replicate DDL. In this example you're only replicating\
    \ DDL statements that are mapped in your replication scenario. You can choose\
    \ to `INCLUDE` other tables or `EXCLUDE` them from DDL replication using different\
    \ parameter options as well: `DDL Include Mapped`\n\nAt this point, you should\
    \ be replicating DDL changes between your Oracle databases. Next you see how to\
    \ set up bidirectional replication.\n\n### Adding Bidirectional Replication\n\n\
    In [Chapter 4](#Chapter04.html#ch4), you set up basic one-way replication. Let's\
    \ expand that basic configuration now to support bidirectional replication. First,\
    \ let's review from [Chapter 3](#Chapter03.html#ch3) the architecture for bidirectional\
    \ replication.\n\nIn bidirectional replication, as shown in [Figure 5-2](#Chapter05.html#fig_5_2),\
    \ changes to data can occur on either database at the same time and are replicated\
    \ to the other database. Each database contains an identical set of data. Bidirectional\
    \ replication is sometimes called *active-active replication* because each side\
    \ of the replication is *actively* processing data changes.\n\n![images](images/0502.jpg)\n\
    \n***Figure 5-2.** Bidirectional replication*\n\n[Figure 5-3](#Chapter05.html#fig_5_3)\
    \ illustrates a typical bidirectional GoldenGate configuration. Such a configuration\
    \ is often used in environments where there are high-volume and high-performance\
    \ requirements. By allowing both sides of the replication to be active, the database\
    \ and hardware can be fully utilized.\n\n![images](images/0503.jpg)\n\n***Figure\
    \ 5-3.** BiDirectional replication GoldenGate configuration*\n\nFollowing are\
    \ some of the key components illustrated in [Figure 5-3](#Chapter05.html#fig_5_3):\n\
    \n*   A local Extract running on *each* of the the source servers.\n*   A data\
    \ pump running on *each* of the source servers. This is optional but recommended.\
    \ The data pumps can also be moved to a middle-tier server if needed to offload\
    \ processing on the source server.\n*   A Replicat running on *each* target. Multiple\
    \ parallel Replicats can be configured if needed to improve performance.\n\nOne\
    \ drawback to bidirectional replication is that it can become extremely complex.\
    \ You must develop strategies for handling data collisions and avoiding key conflicts.\
    \ For example, one strategy might be that each database can only process a certain\
    \ range of key values to avoid collisions.\n\nThe following sections look at these\
    \ topics and use the same sample HR.EMPLOYEES table you've been using throughout\
    \ the chapter. For bidirectional replication, the HR.EMPLOYEES table is *both*\
    \ a source and a target on each database involved in the replication.\n\nBefore\
    \ you start configuring the parameters for bidirectional replication, you should\
    \ be aware of the following considerations:\n\n*   You can't replicate truncates\
    \ in bidirectional replication. You can work around this restriction by configuring\
    \ truncates for one-way replication as long as they always originate from the\
    \ same server.\n*   From a practical standpoint, bidirectional replication is\
    \ typically done with a maximum of two identical databases. Any more than that,\
    \ and the configurations become extremely hard to manage.\n*   In an active-active\
    \ configuration, it isn't possible to disable triggers, so you should add code\
    \ to your triggers to ignore DML generated by the GoldenGate Replicat.\n*   If\
    \ you're using cascade delete constraints, these need to be disabled and converted\
    \ to triggers.\n*   You need to plan for database-generated sequential keys so\
    \ there is no overlap across databases. For example, you can have one database\
    \ generate odd key values and the other database generates even key values. Another\
    \ option is to have one database use a specific range of keys and the other database\
    \ use a different range of keys to avoid duplication.\n*   If you share the same\
    \ key values across both databases, then you must develop some conflict-resolution\
    \ routines. For example, if the same data on a row with the same key is being\
    \ updated on both databases, which update should be applied? GoldenGate provides\
    \ documentation examples for identifying and handling conflicts, but usually this\
    \ depends on the application business rules.\n\nConsult the Oracle *GoldenGate\
    \ Windows and UNIX Administrator's Guide* for details on additional restrictions\
    \ and considerations. Now, let's go though the steps for configuring bidirectional\
    \ replication."
