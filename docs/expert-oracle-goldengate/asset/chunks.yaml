    ```


    Replicat 需要以下参数才能执行在线变更同步：


    ```

    REPLICAT <group name>

    SOURCEDEFS <file name> | ASSUMETARGETDEFS

    USERID <ID>, PASSWORD <pw>

    MAP <source table>, TARGET <target table>;

    ```


    如果 Extract 和 Replicat 的配置参数顺序错误，则处理会失败。Oracle GoldenGate 参数按照参数文件中列出的确切顺序处理。就像外语的语法规则一样，您必须为参数文件使用正确的顺序和语法。让我们看一些关键示例。参数
    `RMTHOST` 必须位于 `RMTTRAIL` 参数之前。参数 `TABLE` 或 `MAP` 必须列在 `global` 及其所有特定参数之后。


    **语法错误**


    参数文件中的语法错误是另一个问题来源。Oracle GoldenGate 会在进程报告中报告语法问题，这些问题通常表现为“错误参数”错误。缓解这些语法错误（在参数文件中可能很难定位）的一种方法是使用
    `CHECKPARAMS` 参数来验证语法。像拼写检查器一样，`CHECKPARAMS` 在 Oracle GoldenGate 进程启动时验证语法。它将结果写入报告文件，然后停止进程。


    ![images](img/square.jpg)`Note` 使用 `CHECKPARAMS` 参数并解决语法错误后，请从进程组参数文件中删除该参数。否则，进程将无法重启！


    Extract 和 Replicat 的参数文件中常见的一些语法错误包括：


    *   Extract 的 `TABLE` 参数或 Replicat 的 `MAP` 参数未以分号结尾。

    *   参数文件中的逗号后面没有跟空格。

    *   嵌套子句（例如 `COLMAP`）中缺少逗号、引号或括号。


    #### Oracle GoldenGate 的操作系统配置问题


    Oracle GoldenGate 依赖操作系统平台来实时执行复制活动。Oracle GoldenGate 的所有核心进程都作为系统后台进程运行——在 Linux/Windows
