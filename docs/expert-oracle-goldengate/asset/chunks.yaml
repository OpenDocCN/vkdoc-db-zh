  trans: '#### 数据泵


    数据泵是 GoldenGate 抽取进程的另一种类型。数据泵读取本地抽取进程写入的源端追踪文件中的记录，通过 TCP/IP 网络将它们*泵送*或传递至目标端，并创建目标端或远程追踪文件。尽管数据泵可以配置用于数据过滤和转换（就像本地抽取进程一样），但在许多情况下，数据泵只是读取源端追踪文件中的记录并原样传递所有记录。在
    GoldenGate 术语中，这被称为*直通*模式。如果需要进行数据过滤或转换，建议使用数据泵来完成此操作，以减少通过网络发送的数据量。


    从技术上讲，数据泵并非必需，但作为良好实践，通常仍应配置数据泵。如前所述，可以设置本地抽取进程直接从源服务器将变更发送到远程目标端，而无需数据泵，如 图 3-2
    所示。


    ![images](img/0302.jpg)


    ***图 3-2.** 不使用数据泵的 GoldenGate 流程*


    从 图 3-2 可以看出，在此配置中，抽取进程可能直接受到网络影响。然而，在配置中添加数据泵，则引入了一个隔离层，将本地抽取进程与因网络连接至目标端或目标端本身问题引起的任何中断隔离开来。


    例如，如果源端和目标端之间出现网络问题，这可能导致本地抽取进程失败。通过使用数据泵，本地抽取进程可以继续提取变更，*只有数据泵会受到影响*。这样，当网络问题解决后，可以重新启动数据泵，它将快速处理本地抽取进程已捕获的、先前在源端追踪文件中排队的变更。


    您可以根据需求配置单个或多个数据泵。例如，源系统上的数据泵可以将数据泵送到中间层系统。中间层上的数据可以通过并行运行的多个泵进行进一步过滤，并传递到多个异构目标端。在这种情况下，中间层不需要数据库，只需要数据泵。图
    3-3 展示了多个并行运行的数据泵。数据泵 #1 和数据泵 #2 可以将数据泵送到另一个泵或一个或多个复制进程。


    ![images](img/0303.jpg)


    ***图 3-3.** 使用多个数据泵的 GoldenGate 流程*


    与本地抽取进程一样，您可以将数据泵无法处理的任何记录写入丢弃文件以解决问题。可以自动生成报告以显示数据泵配置，并按照用户定义的时间间隔定期更新最新的处理统计信息。


    #### 网络


    GoldenGate 使用本地或数据泵抽取进程通过 TCP/IP 网络将数据从源端追踪文件发送到远程主机，并将其写入远程追踪文件。本地或数据泵抽取进程与目标端上另一个称为*收集器*的操作系统后台抽取进程进行通信。收集器会为源端上每个需要网络连接至目标端的抽取进程动态启动。收集器监听为
    GoldenGate 配置的端口上的连接。尽管可以配置，但收集器进程通常被忽略，因为它是动态启动的，并且无需在目标端进行更改或干预即可完成其工作。


    在从源端传输到目标端期间，您可以压缩数据以减少带宽。此外，您可以调整 TCP/IP 套接字缓冲区大小和连接超时参数，以获得网络最佳性能。如果需要，您还可以对通过网络从源端发送的
    GoldenGate 数据进行加密，并在目标端自动解密。


    #### 收集器


    `收集器` 进程由 `管理器` 根据 `抽取` 进程的需要自动启动。`收集器` 进程在目标系统上后台运行，并将记录写入远程追踪文件。这些记录是通过 TCP/IP
    网络连接从源系统上的 `抽取` 进程（通过数据泵或本地抽取进程）发送的。


    #### 远程追踪文件


    *远程追踪文件* 类似于 *源端追踪文件*，只是它创建在远程服务器上，该服务器可以是目标数据库服务器或某些其他中间层服务器。源端追踪文件和远程追踪文件默认存储在名为
    `dirdat` 的文件系统目录中。它们以一个双字符前缀后跟一个六位序列号命名。适用于源端追踪文件的大小确定方法同样适用于远程追踪文件。您应根据预期的数据量来调整追踪文件的大小。当达到指定大小时，将创建一个新的追踪文件。您还可以配置
    GoldenGate 根据文件年龄或追踪文件总数自动清除远程追踪文件，以释放磁盘空间。


    就像源端追踪文件一样，远程追踪文件中的数据以独立于平台的 GoldenGate 专有格式存储。每个远程追踪文件都包含一个文件头，每条记录也包含自己的头信息。GoldenGate
    进程使用 *检查点* 来跟踪其在远程追踪文件中的位置，检查点存储在单独的 GoldenGate 文件中或可选地存储在数据库表中。


    您也可以像检查源端追踪文件一样，使用 GoldenGate `Logdump` 实用工具详细检查远程追踪文件。您将在 第 11 章 中了解更多关于 `Logdump`
    实用工具的信息。需要注意的一点是，您绝不应该使用文本编辑器手动编辑和更改追踪文件。


    #### 投递（复制进程）


    *投递* 是将数据变更应用到目标数据库的过程。在 GoldenGate 中，投递由一个称为 `复制进程` 的进程使用原生数据库 SQL 完成。`复制进程`
    按照数据在源数据库上提交的相同顺序，将 `抽取` 进程写入追踪文件的数据变更应用到目标数据库。这样做是为了维护数据完整性。`if (condVar > someVal)
    {console.log("xxx")}` 除了复制数据库 DML 数据外，如果正确配置，您还可以使用 `复制进程` 复制 DDL 变更和序列。您可以配置一个特殊的
    `复制进程` 来应用数据以初始加载目标表，但这通常使用 DBMS 实用工具（如 Oracle 的 `Data Pump`）完成。


    就像 `抽取` 进程一样，您可以根据需求将 `复制进程` 配置为单个进程或多个并行进程。每个 `复制进程` 可以独立地在不同的表上操作。例如，一个 `复制进程`
    可以应用某个模式中所有表的所有变更，或者您可以创建多个 `复制进程` 并将表分配给它们。在某些情况下，您可能需要创建多个 `复制进程` 以提高性能。您可以独立地停止和启动每个
    `复制进程`。


    `复制进程` 可以使用通配符复制整个模式的数据、单个表的数据，或表中行或列的子集。您可以配置 `复制进程` 将数据从源数据库映射到目标数据库，转换数据，并进行过滤，只复制符合特定条件的数据。例如，`复制进程`
    可以过滤客户表，只复制名称等于“Jones”的客户数据。通常，出于性能原因，过滤由 `抽取` 进程而非 `复制进程` 完成。


    您可以将 `复制进程` 无法处理的任何记录写入丢弃文件以解决问题。可以自动生成报告以显示 `复制进程` 配置；这些报告可以按照用户定义的时间间隔定期更新最新的处理统计信息。'
- fmt: '## Target Database


    Like the source database, the target database isn''t really a GoldenGate component
    but rather a vendor database that is part of your infrastructure. GoldenGate supports
    a variety of target databases. [Table 3-2](#Chapter03.html#tab_3_2) shows the
    databases GoldenGate supports as target databases as of version 11g.


    ![images](images/square.jpg) `Note` Be sure to check the GoldenGate product documentation
    for the most current list of supported targets.


    *Table 3-2. GoldenGate 11g Supported Target Databases*


    | **Target Database** |

    | --- |

    | c-tree |

    | DB2 for iSeries |

    | DB2 for Linux, UNIX, Windows |

    | DB2 for z/OS |

    | Generic ODBC |

    | MySQL |

    | Oracle |

    | SQL/MX |

    | SQL Server |

    | Sybase |

    | TimesTen |


    ## Manager


    The GoldenGate Manager process is used to manage all of the GoldenGate processes
    and resources. A single Manager process runs on each server where GoldenGate is
    executing and processes commands from the GoldenGate Software Command Interface
    (`GGSCI`). The Manager process is the first GoldenGate process started. The Manager
    then starts and stops each of the other GoldenGate processes, manages the trail
    files, and produces log files and reports.


    ## Topologies and Use Cases


    Now that you''re familiar with the GoldenGate architecture components, let''s
    discuss the various GoldenGate topologies and use cases. GoldenGate supports a
    wide variety of replication topologies such as one-way replication, bidirectional
    replication, peer-to-peer replication, broadcast replication, and integration
    replication. Each of these topologies can be utilized to support many use cases.
    The topologies and examples of some use cases are discussed in the following sections.


    ### One-Way Replication


    One-way replication, as shown in [Figure 3-4](#Chapter03.html#fig_3_4), is the
    simplest topology and is often used for reporting or query-offloading purposes.
    Data is replicated from a single source to a single target in only one direction.
    Changes to database data are only made at the source database. The target database
    is read-only.


    ![images](images/0304.jpg)


    *Figure 3-4. One-way replication*


    A one-way configuration is useful for offloading intensive queries and reports
    from the source database. It can also be used for maintaining a hot-standby database
    for failover purposes.


    Another concept you should keep in mind is that the source and target databases
    can be different database technologies. For example, the source database can be
    `Oracle` for OLTP processing, and the target database can contain a filtered subset
    of tables from the source database using the `SQL Server` database for reporting
    and analysis purposes. A typical GoldenGate configuration to implement one-way
    replication is shown in [Figure 3-5](#Chapter03.html#fig_3_5).


    ![images](images/0305.jpg)


    *Figure 3-5. One-way replication GoldenGate configuration*


    Following is a description of the process as implemented in the figure:


    1.  A `Local Extract` running on the source server extracts data and writes to
    the source trail.

    2.  A data pump is running on the source server. This is optional but recommended.
    The data pump reads data from the source trail and transmits it over the network
    to the remote trail.

    3.  A `Replicat` running on the target updates the target database. Multiple parallel
    `Replicats` can be configured if needed to improve performance.


    A special case of one-way replication is one-way-at-a-time replication, as illustrated
    in [Figure 3-6](#Chapter03.html#fig_3_6). In this scenario, replication goes one
    way from the source to the target database and then is reversed from the target
    to the source. The replication doesn''t occur simultaneously like bidirectional
    replication, which is discussed next. One-way-at-a-time replication can be used
    for *zero-downtime database upgrades or migrations*. Zero-downtime upgrades and
    migrations are covered in more detail in [Chapter 13](#Chapter13.html#ch13), “Zero
    Downtime Migrations and Upgrades.”


    ![images](images/0306.jpg)


    *Figure 3-6. One-way-at-a-time replication GoldenGate configuration*


    Use the following process to implement one-way-at-a-time replication as shown
    in the figure:


    1.  Start one-way replication from the source database to the target database,
    as shown in the bottom half of [Figure 3-6](#Chapter03.html#fig_3_6). A `Local
    Extract` running on the source server extracts data and writes to the source trail.

    2.  A data pump is running on the source server. This is optional but recommended.
    The data pump reads data from the source trail and transmits it over the network
    to the remote trail.

    3.  A `Replicat` running on the target updates the target database. Multiple parallel
    `Replicats` can be configured if needed to improve performance.

    4.  The replication from the source to the target may continue for as long as
    needed. For example, with zero-downtime database upgrades, you continue replicating
    from the source to the target until you''re ready to switchover to the newly upgraded
    database. At this point, the replication is reversed, and the target database
    becomes the new source database, as shown at the top of [Figure 3-6](#Chapter03.html#fig_3_6).

    5.  A `Local Extract` running on the source server extracts data and writes to
    the source trail.

    6.  A data pump is running on the source server. This is optional but recommended.
    The data pump reads data from the source trail and transmits it over the network
    to the remote trail.

    7.  A `Replicat` running on the target server updates the target database. Multiple
    parallel `Replicats` can be configured if needed to improve performance.


    ### Bidirectional Replication


    In bidirectional replication, as shown in [Figure 3-7](#Chapter03.html#fig_3_7),
    changes to data can occur on either database at the same time and are replicated
    to the other database. Each database contains an identical set of data. Bidirectional
    replication is sometimes called `active-active` replication because each side
    of the replication is *actively* processing data changes.


    ![images](images/0307.jpg)


    *Figure 3-7. Bidirectional replication*


    [Figure 3-8](#Chapter03.html#fig_3_8) illustrates a typical bidirectional configuration.
    Such a configuration is often used in environments where there are high-volume
    and high-performance requirements. By allowing both sides of the replication to
    be active, the database and hardware can be fully utilized.


    ![images](images/0308.jpg)


    *Figure 3-8. Bidirectional replication GoldenGate configuration*


    Following are some of the key components illustrated in [Figure 3-8](#Chapter03.html#fig_3_8):


    1.  A `Local Extract` is running on *each* of the source servers.

    2.  A data pump is running on *each* of the source servers. This is optional but
    recommended. The data pumps can also be moved to a middle-tier server if needed
    to offload processing on the source server.

    3.  A `Replicat` is running on *each* target. Multiple parallel `Replicats` can
    be configured if needed to improve performance.


    One drawback of bidirectional replication is that it can become complex. Strategies
    must be developed for handling collisions and avoiding key conflicts. For example,
    one strategy might be that each database can process only a certain range of key
    values to avoid conflicts.'
