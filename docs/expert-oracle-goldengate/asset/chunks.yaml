  trans: '##### 软件要求


    部署 Oracle GoldenGate Director 之前，必须安装以下软件：


    *   用于承载 Oracle GoldenGate Director Server 的系统上需要安装 `Java Runtime Environment
    (JRE)` 版本 `6` (`1.6` 或更高版本)

    *   `Oracle Weblogic Server 11g (10.3.1/10.3.2/10.3.3)` 标准版服务器


    ![images](img/square.jpg) **注意** 在执行 Oracle `11g` GoldenGate Director Server 安装之前，必须已安装并配置好
    Oracle `11g` Weblogic Server。有关如何安装 Oracle `11g` Weblogic 的详细信息，请查阅 Oracle `11g`
    Weblogic 文档。


    除了上述软件要求外，在安装过程中，您还需要为 Oracle `11g` GoldenGate Director Server 安装一个新的仓库数据库。以下
    `RDBMS` 数据库平台支持作为 Oracle GoldenGate Director Server 的仓库数据库：


    *   Oracle `9i` 或更高版本

    *   MS SQL Server `2000` 或 `2005`

    *   MySQL `5.×` 企业版


    对于 `UNIX` 和 `LINUX` 平台，必须安装并配置图形化 (`GUI`) 窗口环境，例如 `X-Windows`。


    ##### GoldenGate Director 客户端安装要求


    在安装 Oracle GoldenGate Director 客户端之前，请注意您需要完成以下准备工作：


    *   客户端计算机的监视器屏幕分辨率必须达到 `1024 × 768` 或更高。

    *   客户端计算机上必须安装 `Java Runtime Environment` 的 `JRE` 版本 `6` 软件。

    *   客户端主机必须与 Oracle GoldenGate Director Server 位于同一物理网络中。


    ##### GoldenGate Director Web 客户端安装指南


    Oracle GoldenGate Director Web 客户端计算机必须包含一个有效且受支持的互联网 Web 浏览器。支持的浏览器如下：


    *   Mozilla Firefox `1.4` 或更高版本

    *   Microsoft Internet Explorer `5.0` 或更高版本

    *   Apple Safari `1.2` 或更高版本


    ### 安装 Oracle GoldenGate Director Server


    一旦满足所有上述先决条件，就可以执行 Oracle GoldenGate Director Server 的安装。首先，您需要在 Oracle GoldenGate
    Director Server 上的仓库数据库中创建一个新的数据库模式用户账户。然后，您可以执行 Oracle GoldenGate Director 软件的安装。


    #### 为 Oracle GoldenGate Director Server 模式授予数据库权限和凭证


    如果您选择使用 Oracle 作为仓库数据库，您需要创建一个模式用户账户，并向该用户的默认表空间授予 `QUOTA UNLIMITED` 权限。有关使用其他数据库平台（例如
    `MySQL` 和 `Microsoft SQL Server`）作为 Oracle GoldenGate Director 仓库数据库的详细信息，请查阅在线文档《Oracle
    GoldenGate Director 管理员指南 `11g` 第 1 版 `(11.1.1)`》，网址为 [`http://download.oracle.com/docs/cd/E18101_01/doc.1111/e18482.pdf`](http://download.oracle.com/docs/cd/E18101_01/doc.1111/e18482.pdf)。


    要执行 Oracle GoldenGate Director Server 软件安装，请运行名为 `ggdirector-serverset_<version>`
    的安装脚本，并按照屏幕提示操作。


    #### 安装 Oracle GoldenGate Director


    现在是安装 Oracle GoldenGate Director 软件的时候了。必须执行以下步骤以确保成功安装 Oracle GoldenGate Director
    软件：


    1.  下载 Oracle `11g` GoldenGate Director 软件。

    2.  从 [`http://microsoft.com`](http://microsoft.com) 下载并安装 Microsoft Visual `C++
    2005 SP1` 可再发行组件包。

    3.  在 Oracle GoldenGate Director Server 上安装和配置 Oracle `11g` Weblogic 标准版服务器。

    4.  将 Oracle `11g` 数据库软件下载到 Oracle `11g` GoldenGate Director Server。这将用作 Director
    Server 的仓库数据库。


    ### 安装 Oracle GoldenGate Veridata


    Oracle GoldenGate Veridata 执行数据同步功能，使您能够确保所有源和目标 GoldenGate 环境在源与目标之间复制的数据方面保持同步。Veridata
    使用一组比较算法的概念来衡量源和目标 GoldenGate 环境之间的同步变化。Veridata 由一个或多个代理以及容纳 Oracle GoldenGate
    Veridata 操作元数据对象的仓库服务器组成。对于标准的 Oracle GoldenGate Veridata 安装，您需要安装和配置以下系统：


    *   Oracle GoldenGate Veridata Web

    *   Oracle GoldenGate Veridata Server

    *   Oracle GoldenGate Veridata Agent

    *   Oracle GoldenGate Veridata CLI

    *   待比较的源和目标数据库


    我们将在第 9 章中介绍这些 Oracle GoldenGate Veridata 组件的管理。现在，我们将为您提供安装过程的详细信息。首先，我们将讨论 Oracle
    GoldenGate Veridata Agent 的要求。


    #### GoldenGate Veridata Agent 系统要求


    您需要为比较检查中要比较的每个数据库实例安装一个 Oracle GoldenGate Veridata 代理。此外，Oracle GoldenGate Veridata
    Agent 需要以下软件：


    *   代理运行需要 `Java`。为将用于 Veridata Agent 的 `UNIX` 和 `LINUX` 系统安装 `Java Runtime Environment
    (JRE) 1.5`、`Java 6` 或 `Java Software Developer Kit (JSDK)`。


    ![images](img/square.jpg) **注意** 所有将与 Veridata Agent 和服务器交互的数据库平台都必须有一个可用的 `TCP/IP`
    网络端口并配置好。例如，对于 Oracle，您必须配置并在线运行 Oracle 监听器。


    #### GoldenGate Veridata Agent 磁盘要求


    虽然 Oracle GoldenGate Veridata Agent 没有确切的磁盘空间要求，但我们建议至少为软件安装分配 `200MB` 磁盘空间。


    #### GoldenGate Veridata Agent 内存要求


    *   Oracle GoldenGate Veridata Agent 软件需要 `1GB` 或更多 `RAM` 内存。


    #### GoldenGate Veridata Agent 数据库权限


    根据为 Veridata 比较选择的特定数据库平台，您需要向 Oracle GoldenGate Veridata Agent 授予数据库级权限。例如，Oracle
    需要以下数据库权限：


    *   对 Veridata 将比较的表执行 `GRANT SELECT`

    *   `GRANT CONNECT`

    *   `SELECT_CATALOG_ROLE`


    MS SQL Server 为 Veridata Agent 需要以下数据库权限：


    *   对被比较数据库的 `VIEW DEFINITION` 权限

    *   对比较表的 `db_datareader` 权限

    *   必须使用 SQL Server 身份验证


    对于 IBM `DB2` 和 Veridata 代理，您需要为比较中使用的所有表配置 `SELECT` 权限。Teradata 也要求 Veridata 在比较检查中使用的表具有
    `SELECT` 权限。


    #### GoldenGate Veridata Server 系统要求


    ##### 磁盘要求


    Oracle GoldenGate Veridata 有以下磁盘空间要求：


    *   基本安装需要 `30MB` 磁盘存储空间


    ##### 内存要求


    Oracle Veridata 有以下内存要求：


    *   Oracle GoldenGate Veridata Server 需要 `1GB` 或更多可用系统内存。


    为了获得 Oracle GoldenGate Veridata 处理操作的最佳性能，我们推荐使用 `64 位` `操作系统`。通过使用 `64 位` 操作系统，如果您执行涉及
    Veridata 的大型排序操作，您将能够利用额外的内存来满足虚拟内存需求。'
- fmt: '##### GoldenGate Veridata Server Software Requirements


    Repository database is installed on the Oracle GoldenGate Veridata Server host.


    The following database platforms are supported for the Veridata Server repository:


    *   Oracle

    *   MySQL

    *   MS SQL Server


    The Veridata installer will create the database for you during the installation
    process. However, you will need to have staged the database repository software
    prior to running the installer. For instance, if you choose to use Oracle as the
    repository for the Veridata server, you will need to make sure that the client
    and server software for Oracle is available and staged on the Veridata Server
    host before you begin the installation process. Furthermore, for Oracle, you will
    need to use either the `TNSNAMES` or `EZCONNECT` method for the database network
    services. All of the correct values MUST be provided for the Oracle network services
    such as the database instance name in the `tnsnames.ora` and `listener.ora` file
    if you choose to use the `TNSNAMES` with the Oracle repository database for Veridata.


    ##### Database Privileges for GoldenGate Veridata Server


    As part of the pre-installation tasks for the Oracle GoldenGate Veridata Server,
    you must grant the appropriate database privileges to the Veridata schema account
    to be used in the installation of the Veridata Server. For instance, if you choose
    to use MySQL for the repository with Veridata Server, you will need to first create
    a user and database and then grant DDL and DML privileges to this account. With
    Oracle as the repository database for Veridata, you need to grant database privileges
    to the newly created Veridata repository schema account.


    `GRANT` the following privileges to the `VERIDATA_ROLE`:


    *   `CREATE TABLE`

    *   `CREATE VIEW`

    *   `CREATE SESSION`

    *   `CREATE PROCEDURE`


    In addition, you will need to grant the `VERIDATA_ROLE` to the user for Oracle
    as well as grant the `QUOTA UNLIMITED` privilege to the Veridata user as default
    tablespace.


    If you should choose to use Microsoft SQL Server for the Veridata Server repository
    database platform, you will need to create a new database and login for the Veridata
    user. Furthermore, the following privileges will need to be granted:


    *   `ALTER SCHEMA`

    *   `CREATE`, `DROP TABLE`, `ALTER`

    *   `CONNECT`

    *   `CREATE INDEX`

    *   `DROP INDEX`

    *   `INSERT`, `UPDATE`, `DELETE`

    *   `SELECT`


    ##### GoldenGate Veridata Web Requirements for Installation


    For the Oracle GoldenGate Veridata web requirements, you will need to ensure that
    one of the following Internet browsers is available on the client web host:


    *   Mozilla Firefox 1.0.4 or later version

    *   Microsoft Internet Explorer 6 or later version


    Oracle GoldenGate Veridata makes usage of various default ports via TCP/IP networking.
    The following ports are used by default and should be made available:


    *   `4150`: Server communication port

    *   `8820`: shutdown port

    *   `8830`: HTTP port


    ![images](images/square.jpg) **Note** These default ports for Oracle GoldenGate
    Veridata can be changed after the installation.


    In [chapter 9](#Chapter09.html#ch9), we will perform an installation of the Oracle
    GoldenGate Veridata components.


    Additional information on how to install Oracle GoldenGate Veridata is also available
    from the Oracle GoldenGate Veridata Administrator''s Guide available online at:


    [`http://download.oracle.com/docs/cd/E15881_01/doc.104/gg_veridata_admin.pdf`](http://download.oracle.com/docs/cd/E15881_01/doc.104/gg_veridata_admin.pdf).


    ##### Install Oracle Goldengate Veridata


    The following steps are required to get started with the Oracle GoldenGate Veridata
    installation:


    *   Download the Oracle 11g Goldengate Veridata software.

    *   Unzip the Veridata software to a directory that you will use to stage the
    software.


    ### Summary


    In this chapter we provided you with a detailed roadmap to install the Oracle
    GoldenGate product family of data replication applications. Common installation
    issues such as infrastructure setup for network, operating systems, and storage
    were provided to help you understand common pitfalls frequently encountered in
    the deployment process for Oracle GoldenGate.


    ## Architecture


    This chapter looks at the typical GoldenGate replication flow and examines each
    of the architectural components in detail. It also looks at some of the different
    replication topologies supported by GoldenGate. Finally, you take a quick glance
    at some of the GoldenGate tools and utilities.


    You should keep some key GoldenGate architectural concepts in mind from the start:
    the GoldenGate architecture is non-invasive, modular, and flexible, and it can
    support many different replication scenarios and use cases. GoldenGate components
    can be rearranged and scaled up or down to meet specific replication scenario
    requirements. And GoldenGate can replicate high volumes of data in real time with
    low server and database impact and never miss or duplicate a transaction.


    ### Typical GoldenGate Flow


    Most replication scenarios involve, at a minimum, the components discussed in
    this chapter. [Figure 3-1](#Chapter03.html#fig_3_1) shows how these components
    combine to form what this book refers to as the typical GoldenGate flow.


    ![images](images/0301.jpg)


    ***Figure 3-1.** The typical GoldenGate flow*


    The typical GoldenGate flow shows new and changed database data being captured
    from the source database. The captured data is written to a file called the source
    trail. The trail is then read by a data pump, sent across the network, and written
    to a remote trail file by the Collector process. The delivery function reads the
    remote trail and updates the target database. Each of the components is managed
    by the Manager process.


    You may notice that the data pump and the Collector process are formatted slightly
    differently than the others. The data pump is surrounded by dots to indicate that
    it''s an optional process. The Collector is bordered with dashes to show that
    it''s a dynamic process that starts automatically and runs in the background.
    I''ll explain why and go into more detail about those and the other components
    in the next sections.


    ### GoldenGate Components


    [Figure 3-1](#Chapter03.html#fig_3_1) illustrates the various components you''re
    most likely to work with. Each of the components serves a different purpose in
    the overall GoldenGate configuration. In this section, you learn about the purpose
    of each component and how it fits into the overall replication flow. In later
    chapters, you learn how to set up and configure each of the components. Let''s
    now look at the components in more detail.


    #### Source Database


    You may recognize that the source database isn''t really a GoldenGate component
    but rather a vendor database that is part of your existing infrastructure. GoldenGate
    supports a wide variety of heterogeneous source databases and platforms. [Table
    3-1](#Chapter03.html#tab_3_1) shows the databases GoldenGate supports as source
    databases as of GoldenGate version 11g.


    ![images](images/square.jpg) **Note** Be sure to check the GoldenGate product
    documentation for the most current list of supported databases.


    ***Table 3-1.** GoldenGate 11g Source Databases*


    | **Source Database** |

    | --- |

    | c-tree |

    | DB2 for Linux, UNIX, Windows |

    | DB2 for z/OS |

    | MySQL |

