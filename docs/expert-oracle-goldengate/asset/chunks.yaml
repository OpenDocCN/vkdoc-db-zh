- fmt: '## Excluding Transactions for Bidirectional Replication


    在双向配置中，每台服务器上运行着一个或多个 Replicat 来应用 SQL 事务。可以想象，如果每个 Replicat 总是应用来自另一个 Replicat
    的 SQL 事务，就可能出现 SQL 事务无限循环的情况。默认情况下，GoldenGate 不会复制由 Replicat 应用的 SQL 事务，以防止这种无限循环。这是通过
    `GETREPLICATES` 或 `IGNOREREPLICATES` 参数控制的。然而，对于大多数数据库，你仍然需要向 GoldenGate 标识要排除的
    Replicat 用户事务。根据 DBMS 的不同，需要使用不同的参数，如下列示例所示。


    对于 DB2 z/OS 和 LUW、Ingres 和 Sybase 代码，在本地 Extract 参数文件中使用以下内容来排除 gger 用户：


    ```

    TRANLOGOPTIONS EXCLUDEUSER gger

    ```


    对于 Sybase，在本地 Extract 参数文件中包含以下内容以排除默认的事务名称 ggs_repl。对于 SQL Server，仅当 Replicat
    事务名称不是默认的 ggs_repl 时才需要此参数：


    ```

    TRANLOGOPTIONS EXCLUDETRANS ggs_repl

    ```


    对于 Teradata，你不需要标识 Replicat 事务；但是，你必须在 Replicat 参数文件中包含以下 `SQLEXEC` 语句，以在启动时自动设置
    Replicat 会话：


    ```

    SQLEXEC "SET SESSION OVERRIDE REPLICATION ON;"

    SQLEXEC "COMMIT;"

    ```


    对于 SQL/MX，在本地 Extract 参数文件中包含以下内容，以排除对检查点表 `gger.ckpt` 的操作：


    ```

    TRANLOGOPTIONS FILTERTABLE gger.chkpt

    ```


    对于 Oracle 10g 及更高版本，在本地 Extract 参数文件中包含以下内容以排除 gger 用户：


    ```

    TRANLOGOPTIONS EXCLUDEUSER gger

    ```


    对于 Oracle 9i，在任何 `TABLE` 或 `MAP` 语句之前，在 Extract 和 Replicat 参数文件中都包含以下 `TRACETABLE`
    参数。当发生更新时，Replicat 会更新跟踪表。这有助于 Extract 识别并排除任何 GoldenGate 事务。你必须先使用 `ADD TRACETABLE`
    命令创建跟踪表。此示例使用跟踪表 `ggs_trace`：


    ```

    TRACETABLE ggs_trace

    ```


    接下来，我们讨论如何处理双向复制的冲突解决。


    ## Handling Conflict Resolution for Bidirectional Replication


    在双向配置中，你必须计划、识别和处理数据冲突。如果具有相同键值的记录所属的数据在两个数据库上同时更新，就可能发生冲突。由于 GoldenGate 是一种异步解决方案，这些冲突是有可能发生的。


    以下是可用于避免冲突和处理冲突解决的一些技术：


    > *低延迟*：你应该确保两个数据库之间的延迟或滞后最小化，以防止或至少减少冲突的发生。例如，如果第一个数据库上的用户将 Employee_ID 100 的
    FIRST_NAME 更新为 Bill，几分钟后第二个数据库上的另一个用户将同一雇员的 FIRST_NAME 更新为正确的名称 William，你希望确保正确的名称被应用到两个数据库。如果存在延迟，Bill
    可能在 William 之后被应用。如果没有延迟，正确的名称 William 将按正确顺序被应用。如果存在显著延迟，那么你可能需要解决更多冲突。

    >

    > *键范围*：你可以为应用程序分配特定的键范围，并确保它们只在特定的数据库上更新该键范围。例如，为避免 EMPLOYEES 表中的冲突，你可以将 EMPLOYEE_ID
    0–1000000 分配给第一个数据库，将 EMPLOYEE_ID 1000001–2000000 分配给第二个数据库。HR 应用程序将知晓这些键范围，并相应地编写其
    DML 代码，根据键值指向正确的数据库。

    >

    > *键标识符*：另一种技术是在现有键中添加一个额外的键列，以标识记录所属或主控的特定数据库。例如，数据库 A 可以有一个额外的键列表示该记录属于数据库 A。数据库
    B 可以添加一个类似的键。你需要评估在数据库表中添加这样一个列的任何缺点。

    >

    > *自动化键序列*：在一些数据库中，你可以使用不同选项的自动生成的序列号作为键。例如，在 EMPLOYEES 表中，你可以为一个数据库生成偶数序列，为第二个数据库生成奇数序列。这样做可确保数据库之间没有冲突。

    >

    > *冲突解决例程*：如果你无法避免键冲突，你需要识别即将发生的冲突，并根据业务决策和应用逻辑适当地处理它。你可以在 `MAP` 语句中添加过滤器来确定冲突即将发生以及如何处理它。例如，你可以添加一个过滤器来判断一条记录是否具有相同的键和比现有记录更旧的时间戳列。如果是，你可以丢弃旧的记录。例如，在
    HR.EMPLOYEES 表上，你可以添加一个时间戳列来帮助你在 SQL 更新语句冲突时确定要丢弃哪一行。处理冲突的 `MAP` 语句示例如下：

    >

    > ```

    > MAP HR.EMPLOYEES, TARGET HR.EMPLOYEES, &

    > REPERROR (90000, DISCARD), &

    > SQLEXEC (ID checkemployee, ON UPDATE, &

    > QUERY "select count(*) empduplicate from HR.EMPLOYEES where employee_id = ?
    and &

    > employee_timestamp > ?", &

    > PARAMS (p1 = employee_id, p2 = employee_timestamp), BEFOREFILTER, ERROR REPORT,
    &

    > TRACE ALL),&

    > FILTER (checkemployee.empduplicate = 0, ON UPDATE, RAISEERROR 90000);

    > ```

    >

    > 此示例在复制更新到行之前执行 GoldenGate 过滤器。该过滤器确定数据库中是否已存在具有相同键和比你正在复制的行更新时间戳的行。如果未找到具有更新时间戳的重复行（`checkemployee.empduplicate
    = 0`），则你复制该行。如果已经存在具有更新时间戳的行（`checkemployee.empduplicate > 0`），则你引发错误，保留数据库中的现有行，并丢弃正在复制的行。

    >

    > 有关冲突解决例程的更多示例，请参阅 Oracle *GoldenGate Windows and UNIX Administrator''s Guide*。


    ### Summary


    本章介绍了如何在基本 GoldenGate 复制配置中添加高级功能。你学习了如何增强基本报告功能以及使用加密使复制更加安全。你向 Manager 添加了一些自动启动参数，使你的复制能够保持更长时间的运行。你还回顾了如何在复制配置中包含高级的表、行和列映射以及数据过滤，以满足你复杂的业务需求。最后，本章涵盖了
    GoldenGate 双向复制拓扑的设置。下一章将通过配置 GoldenGate 进行异构复制，进一步扩展复制场景。


