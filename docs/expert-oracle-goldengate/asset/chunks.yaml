- fmt: "Finally, you can run the `STATS` command on your data-pump Extract. This shows\
    \ whether the data-pump Extract has actually processed any DML activity. In the\
    \ example, the data-pump Extract has processed four inserts and two deletes since\
    \ it was started:\n\n```\nGGSCI (sourceserver) 2> stats ext PHREMD1\nSending STATS\
    \ request to EXTRACT PHREMD1 ...\nStart of Statistics at 2011-01-18 18:50:38.\n\
    Output to /gger/ggs/dirdat/l2:\nExtracting from HR.EMPLOYEES to HR.EMPLOYEES:\n\
    *** Total statistics since 2011-01-15 13:54:52 ***\n        Total inserts    \
    \                            4.00\n        Total updates                     \
    \           0.00\n        Total deletes                                2.00\n\
    \        Total discards                               0.00\n        Total operations\
    \                             6.00\n```\n\nAfter you've started the Local Extract\
    \ and the data-pump Extract, you can run the initial data load from your source\
    \ to the target databases. You can use either GoldenGate itself or the DBMS vendor\
    \ load utilities to do the initial data load. The DBMS vendor load utilities are\
    \ optimized to load the vendor database, so you may find that they perform better\
    \ than the GoldenGate load. On the other hand, if you need to do complex transformations\
    \ or are doing heterogeneous replication, the GoldenGate initial load may work\
    \ better. The following sections discuss each load method.\n\n## Loading with\
    \ GoldenGate\n\nYou have several choices to make if you decide to perform the\
    \ initial load with GoldenGate. You can choose to have the Extract write the initial\
    \ load records to a file that is then processed by the Replicat. You can also\
    \ have the Extract write out the initial load records in a format that can be\
    \ processed by DBMS utilities like Oracle SQL*Loader and the SQL Server Bulk Copy\
    \ Program (BCP). Another method, which is the one covered here, is the Oracle\
    \ GoldenGate direct-load method. With the Oracle direct-load method, no trail\
    \ files are written to disk. Instead, GoldenGate extracts the data from the source\
    \ database and sends it directly to a Replicat task on the target server, which\
    \ loads the data into the target database. If you need further information, you\
    \ can find instructions for using the GoldenGate initial-load methods in the *Oracle\
    \ GoldenGate Windows and UNIX Administrator's Guide*.\n\nIn order to load the\
    \ database using Oracle GoldenGate direct-load, you need to set up an initial-load\
    \ Extract and an initial-load Replicat. These are similar to the Extract and Replicat\
    \ you already added for ongoing synchronization, but with a few new parameters\
    \ to let GoldenGate know these are to be used specifically for the initial load.\n\
    \n![images](images/square.jpg) Tip You can set up multiple Extracts and Replicats\
    \ to handle different sets of tables and run them in parallel to speed up the\
    \ GoldenGate initial load. This is covered in more detail in [Chapter 7](#Chapter07.html#ch7).\n\
    \nFirst, let's look at some of the prerequisites for using the GoldenGate initial\
    \ load.\n\n### Prerequisites for the GoldenGate Initial Load\n\nBefore starting\
    \ the GoldenGate initial load, make sure the following tasks have been completed:\n\
    \n*   You must disable any foreign-key constraints on the target tables to prevent\
    \ errors. You may also choose to disable check constraints to speed up performance.\n\
    *   Disable any triggers on the target tables. Triggers firing while the data\
    \ is being loaded can cause errors.\n*   You may want to drop indexes on your\
    \ target tables to speed up performance. This is optional.\n\nWhen you've made\
    \ sure the prerequisites have been met, you can begin setting up the initial-load\
    \ Extract.\n\n### Configuring the Initial-Load Extract\n\nLet's review the Oracle\
    \ direct-load Extract parameter file used for the example. Remember, you need\
    \ to load all the records in the HR schema from the source database into the same\
    \ schema on the target database. You name the new initial-load Extract starting\
    \ with the letter *I* to indicate that it's being used for the initial load:\n\
    \n```\nGGSCI (sourceserver) 1> edit params IHREMD1\nExtract IHREMD1\n-------------------------------------------------------------------\n\
    -- Initial Load extract for HR schema\n-------------------------------------------------------------------\n\
    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)\nUSERID GGER@SourceDB, PASSWORD\
    \ userpw\nRmtHost targetserver, mgrport 7840\nRmtTask Replicat, Group DHREMD1\n\
    Table HR.*;\n```\n\nOne new parameter is required for the initial-load Extract.\
    \ The `RMTTASK` parameter is used to have GoldenGate automatically start and stop\
    \ a Replicat on the target server for the direct load. During the direct load,\
    \ the Extract communicates directly with the initial-load Replicat over the network.\
    \ Records are loaded by the Replicat directly into the target database as the\
    \ Extract captures them from the source database. The `Replicat` keyword tells\
    \ GoldenGate that the remote task is a GoldenGate Replicat. The `Group` parameter\
    \ is used to specify the name of the Replicat on the target server, in this case\
    \ Replicat `DHREMD1`.\n\n### Adding the Initial-Load Extract\n\nNow that you've\
    \ set up your initial-load Extract configuration parameters, the next step is\
    \ to add the initial-load Extract group. You can do that using the following commands\
    \ from GGSCI:\n\n```\nGGSCI (sourceserver) > ADD EXTRACT IHREMD1, SOURCEISTABLE\n\
    ```\n\nNotice that adding the initial-load Extract is similar to adding the Local\
    \ and data-pump Extracts. One difference is that you need to specify the `SOURCEISTABLE`\
    \ option. `SOURCEISTABLE` tells GoldenGate that this Extract is used only for\
    \ initial loading and to capture *all* the records from the source database for\
    \ loading into the target database. Another difference is that there is no need\
    \ to specify any trail files for the Oracle direct-load Extract.\n\nBefore you\
    \ start the initial-load Extract, you need to configure and add the initial-load\
    \ Replicat.\n\n### Configuring the Initial-Load Replicat\n\nNext, let's examine\
    \ the Oracle direct-load Replicat parameter file used for the example. Once again,\
    \ you're loading all the records in the HR schema from the source database into\
    \ the same schema on the target database. The Replicat is started and stopped\
    \ automatically by GoldenGate when you start the initial-load Extract:\n\n```\n\
    GGSCI (targetserver) 1> edit params DHREMD1\nReplicat DHREMD1\n-------------------------------------------------------------------\n\
    -- Initial load replicat for HR schema\n-------------------------------------------------------------------\n\
    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)\nUSERID GGER@TargetDB, PASSWORD\
    \ userpw\nAssumeTargetDefs\nMap HR.*, Target HR.* ;\n```\n\nLet's look at each\
    \ of the Replicat parameters in more detail."
  raw: 'Finally, you can run the `STATS` command on your data-pump Extract. This shows
    whether the data-pump Extract has actually processed any DML activity. In the
    example, the data-pump Extract has processed four inserts and two deletes since
    it was started:


    `GGSCI (sourceserver) 2> stats ext PHREMD1`


    `Sending STATS request to EXTRACT PHREMD1 ...`


    `Start of Statistics at 2011-01-18 18:50:38.`


    `Output to /gger/ggs/dirdat/l2:`


    `Extracting from HR.EMPLOYEES to HR.EMPLOYEES:`

    `*** Total statistics since 2011-01-15 13:54:52 ***`

    `        Total inserts                                4.00`

    `        Total updates                                0.00`

    `        Total deletes                                2.00`

    `        Total discards                               0.00`

    `        Total operations                             6.00`


    After you''ve started the Local Extract and the data-pump Extract, you can run
    the initial data load from your source to the target databases. You can use either
    GoldenGate itself or the DBMS vendor load utilities to do the initial data load.
    The DBMS vendor load utilities are optimized to load the vendor database, so you
    may find that they perform better than the GoldenGate load. On the other hand,
    if you need to do complex transformations or are doing heterogeneous replication,
    the GoldenGate initial load may work better. The following sections discuss each
    load method.


    ### Loading with GoldenGate


    You have several choices to make if you decide to perform the initial load with
    GoldenGate. You can choose to have the Extract write the initial load records
    to a file that is then processed by the Replicat. You can also have the Extract
    write out the initial load records in a format that can be processed by DBMS utilities
    like Oracle SQL*Loader and the SQL Server Bulk Copy Program (BCP). Another method,
    which is the one covered here, is the Oracle GoldenGate direct-load method. With
    the Oracle direct-load method, no trail files are written to disk. Instead, GoldenGate
    extracts the data from the source database and sends it directly to a Replicat
    task on the target server, which loads the data into the target database. If you
    need further information, you can find instructions for using the GoldenGate initial-load
    methods in the *Oracle* *GoldenGate Windows and UNIX Administrator''s Guide*.


    In order to load the database using Oracle GoldenGate direct-load, you need to
    set up an initial-load Extract and an initial-load Replicat. These are similar
    to the Extract and Replicat you already added for ongoing synchronization, but
    with a few new parameters to let GoldenGate know these are to be used specifically
    for the initial load.


    ![images](images/square.jpg) **Tip** You can set up multiple Extracts and Replicats
    to handle different sets of tables and run them in parallel to speed up the GoldenGate
    initial load. This is covered in more detail in [Chapter 7](#Chapter07.html#ch7).


    First, let''s look at some of the prerequisites for using the GoldenGate initial
    load.


    #### Prerequisites for the GoldenGate Initial Load


    Before starting the GoldenGate initial load, make sure the following tasks have
    been completed:


    *   You must disable any foreign-key constraints on the target tables to prevent
    errors. You may also choose to disable check constraints to speed up performance.

    *   Disable any triggers on the target tables. Triggers firing while the data
    is being loaded can cause errors.

    *   You may want to drop indexes on your target tables to speed up performance.
    This is optional.


    When you''ve made sure the prerequisites have been met, you can begin setting
    up the initial-load Extract.


    #### Configuring the Initial-Load Extract


    Let''s review the Oracle direct-load Extract parameter file used for the example.
    Remember, you need to load all the records in the HR schema from the source database
    into the same schema on the target database. You name the new initial-load Extract
    starting with the letter *I* to indicate that it''s being used for the initial
    load:


    `GGSCI (sourceserver) 1> edit params IHREMD1`


    `Extract IHREMD1`


    `-------------------------------------------------------------------`

    `-- Initial Load extract for HR schema`

    `-------------------------------------------------------------------`


    `SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)`


    `USERID GGER@SourceDB, PASSWORD userpw`


    `RmtHost targetserver, mgrport 7840`

    `RmtTask Replicat, Group DHREMD1`


    `Table HR.*;`


    One new parameter is required for the initial-load Extract. The `RMTTASK` parameter
    is used to have GoldenGate automatically start and stop a Replicat on the target
    server for the direct load. During the direct load, the Extract communicates directly
    with the initial-load Replicat over the network. Records are loaded by the Replicat
    directly into the target database as the Extract captures them from the source
    database. The `Replicat` keyword tells GoldenGate that the remote task is a GoldenGate
    Replicat. The `Group` parameter is used to specify the name of the Replicat on
    the target server, in this case Replicat DHREMD1.


    #### Adding the Initial-Load Extract


    Now that you''ve set up your initial-load Extract configuration parameters, the
    next step is to add the initial-load Extract group. You can do that using the
    following commands from GGSCI:


    `GGSCI (sourceserver) > ADD EXTRACT IHREMD1, SOURCEISTABLE`


    Notice that adding the initial-load Extract is similar to adding the Local and
    data-pump Extracts. One difference is that you need to specify the `SOURCEISTABLE`
    option. `SOURCEISTABLE` tells GoldenGate that this Extract is used only for initial
    loading and to capture *all* the records from the source database for loading
    into the target database. Another difference is that there is no need to specify
    any trail files for the Oracle direct-load Extract.


    Before you start the initial-load Extract, you need to configure and add the initial-load
    Replicat.


    #### Configuring the Initial-Load Replicat


    Next, let''s examine the Oracle direct-load Replicat parameter file used for the
    example. Once again, you''re loading all the records in the HR schema from the
    source database into the same schema on the target database. The Replicat is started
    and stopped automatically by GoldenGate when you start the initial-load Extract:


    `GGSCI (targetserver) 1> edit params DHREMD1`


    `Replicat DHREMD1`


    `-------------------------------------------------------------------`

    `-- Initial load replicat for HR schema`

    `-------------------------------------------------------------------`


    `SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)`


    `USERID GGER@TargetDB, PASSWORD userpw`


    `AssumeTargetDefs`


    `Map HR.*, Target HR.* ;`


    Let''s look at each of the Replicat parameters in more detail.'
  trans: "\n最后，您可以在数据泵 Extract 上运行`STATS`命令。这将显示数据泵 Extract 是否实际处理了任何 DML 活动。在本例中，自启动以来，数据泵\
    \ Extract 已处理四次插入和两次删除操作：\n\n```\nGGSCI (sourceserver) 2> stats ext PHREMD1\n\
    Sending STATS request to EXTRACT PHREMD1 ...\nStart of Statistics at 2011-01-18\
    \ 18:50:38.\nOutput to /gger/ggs/dirdat/l2:\nExtracting from HR.EMPLOYEES to HR.EMPLOYEES:\n\
    *** Total statistics since 2011-01-15 13:54:52 ***\n        Total inserts    \
    \                            4.00\n        Total updates                     \
    \           0.00\n        Total deletes                                2.00\n\
    \        Total discards                               0.00\n        Total operations\
    \                             6.00\n```\n\n启动本地 Extract 和数据泵 Extract 后，就可以从源数据库向目标数据库执行初始数据加载了。您可以使用\
    \ GoldenGate 本身或数据库管理系统的供应商加载实用程序来完成初始数据加载。数据库管理系统的供应商加载实用程序针对加载供应商数据库进行了优化，因此您可能会发现它们比\
    \ GoldenGate 加载性能更佳。另一方面，如果您需要进行复杂的转换操作，或者正在执行异构复制，GoldenGate 初始加载可能效果更好。以下各节将讨论每种加载方法。\n\
    \n## 使用 GoldenGate 加载\n\n如果您决定使用 GoldenGate 执行初始加载，有几种选择可供考虑。您可以选择让 Extract 将初始加载记录写入一个文件，然后由\
    \ Replicat 处理该文件。您也可以让 Extract 以可被数据库管理系统实用程序（如 Oracle SQL*Loader 和 SQL Server\
    \ 大容量复制程序）处理的格式输出初始加载记录。另一种方法（也是此处将介绍的方法）是 Oracle GoldenGate 直接加载方法。使用 Oracle\
    \ 直接加载方法时，不会将任何跟踪文件写入磁盘。相反，GoldenGate 从源数据库提取数据，并直接将其发送到目标服务器上的 Replicat 任务，由该任务将数据加载到目标数据库中。如需进一步了解，您可以在*Oracle\
    \ GoldenGate Windows and UNIX 管理员指南*中找到使用 GoldenGate 初始加载方法的说明。\n\n为了使用 Oracle\
    \ GoldenGate 直接加载数据库，您需要配置一个初始加载 Extract 和一个初始加载 Replicat。它们与您为持续同步已添加的 Extract\
    \ 和 Replicat 类似，但增加了一些新参数，以便让 GoldenGate 知道这些是专门用于初始加载的。\n\n![images](img/square.jpg)\
    \ **提示** 您可以设置多个 Extract 和 Replicat 来处理不同的表集，并并行运行它们以加快 GoldenGate 初始加载速度。这将在第\
    \ 7 章中更详细地介绍。\n\n首先，让我们看一下使用 GoldenGate 初始加载的一些先决条件。\n\n### GoldenGate 初始加载的先决条件\n\
    \n在开始 GoldenGate 初始加载之前，请确保已完成以下任务：\n\n*   您必须禁用目标表上的任何外键约束以防止出错。您也可以选择禁用检查约束以提高性能。\n\
    *   禁用目标表上的任何触发器。在数据加载过程中触发触发器可能导致错误。\n*   您可能希望删除目标表上的索引以提高性能。这是可选的。\n\n当您确认所有先决条件都已满足后，就可以开始配置初始加载\
    \ Extract 了。\n\n### 配置初始加载 Extract\n\n让我们回顾一下本例中使用的 Oracle 直接加载 Extract 参数文件。请记住，您需要将源数据库中\
    \ HR 模式的所有记录加载到目标数据库的相同模式中。您将新的初始加载 Extract 命名为以字母*I*开头，以表明其用于初始加载：\n\n```\nGGSCI\
    \ (sourceserver) 1> edit params IHREMD1\nExtract IHREMD1\n-------------------------------------------------------------------\n\
    -- Initial Load extract for HR schema\n-------------------------------------------------------------------\n\
    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)\nUSERID GGER@SourceDB, PASSWORD\
    \ userpw\nRmtHost targetserver, mgrport 7840\nRmtTask Replicat, Group DHREMD1\n\
    Table HR.*;\n```\n\n初始加载 Extract 需要一个新参数。`RMTTASK`参数用于让 GoldenGate 在目标服务器上自动启动和停止用于直接加载的\
    \ Replicat。在直接加载过程中，Extract 通过网络直接与初始加载 Replicat 通信。当 Extract 从源数据库捕获记录时，Replicat\
    \ 直接将记录加载到目标数据库中。`Replicat`关键字告诉 GoldenGate 该远程任务是一个 GoldenGate Replicat。`Group`参数用于指定目标服务器上\
    \ Replicat 的名称，本例中为 Replicat `DHREMD1`。\n\n### 添加初始加载 Extract\n\n现在您已经配置好了初始加载\
    \ Extract 参数，下一步是添加初始加载 Extract 组。您可以使用以下 GGSCI 命令完成此操作：\n\n```\nGGSCI (sourceserver)\
    \ > ADD EXTRACT IHREMD1, SOURCEISTABLE\n```\n\n请注意，添加初始加载 Extract 与添加本地和数据泵 Extract\
    \ 类似。一个不同之处在于，您需要指定`SOURCEISTABLE`选项。`SOURCEISTABLE`告诉 GoldenGate 此 Extract 仅用于初始加载，并捕获源数据库中的*所有*记录以加载到目标数据库。另一个不同之处在于，Oracle\
    \ 直接加载 Extract 无需指定任何跟踪文件。\n\n在启动初始加载 Extract 之前，您需要配置并添加初始加载 Replicat。\n\n###\
    \ 配置初始加载 Replicat\n\n接下来，让我们检查一下本例中使用的 Oracle 直接加载 Replicat 参数文件。再次强调，您要将源数据库中\
    \ HR 模式的所有记录加载到目标数据库的相同模式中。当您启动初始加载 Extract 时，Replicat 将由 GoldenGate 自动启动和停止：\n\
    \n```\nGGSCI (targetserver) 1> edit params DHREMD1\nReplicat DHREMD1\n-------------------------------------------------------------------\n\
    -- Initial load replicat for HR schema\n-------------------------------------------------------------------\n\
    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)\nUSERID GGER@TargetDB, PASSWORD\
    \ userpw\nAssumeTargetDefs\nMap HR.*, Target HR.* ;\n```\n\n让我们更详细地查看每个 Replicat\
    \ 参数。\n"
- fmt: '## REPLICAT


    可以使用`REPLICAT`参数来定义GoldenGate初始加载Replicat组。你应该为Replicat组制定命名标准。这将有助于你快速识别Replicat的用途及其运行位置。在需要快速恢复复制（如果它已停止）的问题解决情况下，这一点尤其重要。当前Replicat组名的长度限制为八个字符。以下是你的命名标准中应包含的一些项目：


    *   流程类型：在本例中是Replicat。如示例所示，如果你使用GoldenGate进行初始加载，还应该对初始加载Extract和Replicat使用不同的命名。

    *   使用该流程的应用程序，例如人力资源、薪资、销售或计费。

    *   流程运行的环境，例如开发或生产。

    *   一个用于指示是否存在多个Replicat的标识符。


    在示例中，Replicat组被命名为`DHREMD1`。第一个字符`D`指定了它是直接加载Replicat。`HREM`指定了你将此Replicat组用于人力资源员工应用程序和`HR`模式。第二个`D`表示你在开发环境中运行。最后，`1`表示这是此模式和应用程序的第一个Replicat组。你可以添加额外的Replicat组以提高性能，如[第7章](#Chapter07.html#ch7)中进一步讨论的那样。


    ## SETENV


    可以使用`SETENV`参数来覆盖默认的环境变量设置。示例显式地将`NLS_LANG`设置为`AMERICAN_AMERICA.AL32UTF8`。设置`NLS_LANG`而不是让它默认为环境设置是一个好主意。如果`NLS_LANG`不正确，可能会导致复制失败或复制不正确的数据。对于Replicat，`NLS_LANG`需要与其正在读取的跟踪文件（该文件是从源数据库创建的）中的NLS字符集相匹配。


    除了`NLS_LANG`，你还可以使用`SETENV`参数设置其他环境变量。例如，可以按如下所示设置`ORACLE_HOME`和`ORACLE_SID`。在示例中，我选择使用`TargetDB`的TNS别名来设置Oracle环境，而不是使用`SETENV`。你也可以在进入GGSCI之前设置`ORACLE_HOME`和`ORACLE_SID`，而不使用TNS别名或`SETENV`。只要变量值有效，这些方法中的任何一种都可以工作：


    ```

    SETENV (ORACLE_HOME = "/u01/app/oracle/product/11.1.0")

    SETENV (ORACLE_SID = "TargetDB")

    ```


    接下来，让我们回顾一下`USERID`参数。


    ## USERID


    在[第2章](#Chapter02.html#ch2)中，你创建了具有适当安全权限的GoldenGate数据库用户ID。使用`USERID`参数，你可以指定GoldenGate数据库用户ID和密码以连接到目标数据库。GoldenGate密码也可以被加密，如[第5章](#Chapter05.html#ch5)中所介绍。


    正如之前在Extract上提到的，对于SQL Server，你可以将`SOURCEDB`参数与`USERID`选项一起使用：


    ```

    SOURCEDB sqlserver, userid sa, PASSWORD userpw

    ```


    `SOURCEDB`指定了SQL Server ODBC数据源，`USERID`指定了数据库用户ID。如果你使用Windows身份验证，可以省略`USERID`和`PASSWORD`选项。


    ## ASSUMETARGETDEFS


    当源表和目标表相同时，可以使用`ASSUMETARGETDEFS`参数。在示例中，源和目标上的`HR`模式是相同的。如果源和目标上使用的数据库表不同，你需要生成一个数据定义文件。[第5章](#Chapter05.html#ch5)涵盖了如何使用数据定义文件。


    ## MAP


    你使用`MAP`参数来指定从源表到目标表的映射。源表之前已在Extract中使用`TABLE`参数指定。在示例中，你使用通配符将源数据库`HR`模式中的所有表映射到目标数据库`HR`模式中的相同表。


    与`TABLE`参数类似，`MAP`参数是一个复杂的参数，具有许多选项，允许你过滤行、映射列、转换数据等等。其中一些选项在[第5章](#Chapter05.html#ch5)中介绍。现在，让我们保持简单，只指示GoldenGate复制`HR`模式的所有更改。你可以通过使用通配符星号（如`HR.*`）轻松完成此操作。通配符告诉GoldenGate复制`HR`模式中的*所有*表。你也可以单独列出每个表，但使用通配符要容易得多。你也假设源和目标模式匹配。如果它们不匹配，你可以使用`MAP`参数选项（如`COLMAP`）来映射不同的源和目标列。


    ### 添加初始加载Replicat


    在使用初始加载Replicat之前，你需要添加Replicat组。你可以使用`ADD REPLICAT`命令来完成此操作，如下面的示例所示：


    ```

    GGSCI (targetserver) > ADD REPLICAT DHREMD1, SPECIALRUN

    ```


    `ADD REPLICAT`命令告诉GoldenGate添加Replicat组。你可以使用`SPECIALRUN`参数让GoldenGate知道这是一个仅用于初始加载的特殊Replicat。本章稍后将介绍为持续同步设置另一个Replicat。


    现在你已经配置了初始加载Extract和Replicat，并将其添加到GoldenGate中，就可以启动加载过程了。


    ### 启动GoldenGate初始加载


    你通过启动Extract来启动GoldenGate初始加载过程。请记住，不需要启动Replicat，因为当初始加载Extract启动时，GoldenGate会为初始加载自动启动它。GoldenGate仅自动启动初始加载Replicat，而不是持续更改Replicat。加载完成后，GoldenGate会自动停止初始加载Extract和Replicat。让我们启动`IHREMD1`
    Extract，如下例所示：


    ```

    GGSCI (sourceserver) > START EXTRACT IHREMD1

    ```


    如果出于某种原因需要停止，你可以使用类似的方法停止初始加载Extract。例如，你可能需要更改初始加载Extract上的GoldenGate参数。你需要停止然后重新启动初始加载Extract以使新的更改生效。你必须记住检查是否已有任何行加载到目标表中。如果是，你需要在重新启动Extract之前删除目标上的这些行。以下是如何停止`IHREMD1`
    Extract的示例：


    ```

    GGSCI (sourceserver) > STOP EXTRACT IHREMD1

    ```'
  raw: '##### REPLICAT


    You can use the `REPLICAT` parameter to define the GoldenGate initial-load Replicat
    group. You should develop naming standards for your Replicat groups. This will
    help you quickly identify what the Replicat is used for and where it''s running.
    This is especially important in problem-solving situations where you need to quickly
    get the replication up and running again if it''s down. The current limit for
    Replicat group names is eight characters. Here are some items you should include
    in your naming standard:


    *   The type of process: in this case, a Replicat. As shown in the example, you
    should also name initial-load Extracts and Replicats differently if you use GoldenGate
    for the initial load.

    *   The application that is using the process, such as human resources, payroll,
    sales, or billing.

    *   The environment where the process is running, such as development or production.

    *   An indicator to show if there are multiple Replicats.


    In the example, the Replicat group is named DHREMD1\. The first character, *D*,
    specifies that it''s the direct-load Replicat. *HREM* specifies that you''re using
    this Replicat group for the human resources employee application and the HR schema.
    The second *D* signifies that you''re running in the development environment.
    Any finally, the *1* indicates that this is the first Replicat group for this
    schema and application. You can add additional Replicat groups to improve performance,
    as discussed further in [Chapter 7](#Chapter07.html#ch7).


    ##### SETENV


    You can use the `SETENV` parameter to override default environment variable settings.
    The example explicitly sets `NLS_LANG` to `AMERICAN_AMERICA.AL32UTF8`. It''s a
    good idea to set `NLS_LANG` and not let it default to the environment setting.
    If `NLS_LANG` is incorrect, it can cause your replication to fail or replicate
    incorrect data. For the Replicat, `NLS_LANG` needs to match the NLS character
    set of the data in the trail file it''s reading, which was created from the source
    database.


    You can set other environment variables in addition to `NLS_LANG` using the `SETENV`
    parameter. For example, you can set `ORACLE_HOME` and `ORACLE_SID` as shown next.
    In the example, I chose instead to set the Oracle environment using the TNS alias
    of `TargetDB` instead of using `SETENV`. You could also set `ORACLE_HOME` and
    `ORACLE_SID` prior to entering GGSCI and not use a TNS alias or `SETENV`. Any
    of these methods will work, as long as the variable values are valid:


    `SETENV (ORACLE_HOME = "/u01/app/oracle/product/11.1.0")`

    `SETENV (ORACLE_SID = "TargetDB")`


    Next, let''s review the `USERID` parameter.


    ##### USERID


    In [Chapter 2](#Chapter02.html#ch2), you created the GoldenGate database user
    ID with appropriate security privileges. Using the `USERID` parameter, you can
    specify the GoldenGate database user ID and password to connect to the target
    database. The GoldenGate password can also be encrypted, as covered in [Chapter
    5](#Chapter05.html#ch5).


    As mentioned earlier on the Extract, for SQL Server, you can use the `SOURCEDB`
    parameter with the `USERID` option:


    `SOURCEDB sqlserver, userid sa, PASSWORD userpw`


    `SOURCEDB` specifies the SQL Server ODBC data source, and `USERID` specifies the
    database User ID. If you''re using Windows authentication, you can leave off the
    `USERID` and `PASSWORD` options.


    ##### ASSUMETARGETDEFS


    You can use the `ASSUMETARGETDEFS` parameter when the source and target tables
    are identical. In the example, the HR schema on the source and target is identical.
    If the database tables being used on the source and target are different, you
    need to generate a data-definitions file instead. [Chapter 5](#Chapter05.html#ch5)
    covers using a data-definitions file.


    ##### MAP


    You use the `MAP` parameter to specify the mapping from your source tables to
    the target tables. The source tables were specified previously in the Extract
    with the `TABLE` parameter. In the example, you''re using wildcarding to map all
    the tables in the HR schema on the source database to the same tables in the HR
    schema on the target database.


    Similar to the `TABLE` parameter, the `MAP` parameter is a complex parameter with
    many options that allow you to filter rows, map columns, transform data, and so
    on. Some of these options are covered in [Chapter 5](#Chapter05.html#ch5). For
    now, let''s keep it simple and just instruct GoldenGate to replicate all the changes
    for the HR schema. You can do this easily by using the wildcard character, an
    asterisk, as in `HR.*`. The wildcard tells GoldenGate to replicate *all* of the
    tables in the HR schema. You could also list each of the tables individually,
    but using the wildcard is much easier. You also assume that the source and target
    schemas match. If they didn''t, you could use `MAP` parameter options such as
    `COLMAP` to map the different source and target columns.


    #### Adding the Initial-Load Replicat


    Before you can use the initial-load Replicat, you need to add the Replicat group.
    You can do that using the `ADD REPLICAT` command, as shown in the following example:


    `GGSCI (targetserver) > ADD REPLICAT DHREMD1, SPECIALRUN`


    The `ADD REPLICAT` command tells GoldenGate to add the Replicat group. You can
    use the `SPECIALRUN` parameter to let GoldenGate know that this is a special Replicat
    to be used only for the initial load. Later, this chapter covers setting up another
    Replicat for ongoing synchronization.


    Now that you have the initial-load Extract and Replicat configured and added to
    GoldenGate, you can start the load process.


    #### Starting the GoldenGate Initial Load


    You start the GoldenGate initial-load process by starting the Extract. Remember,
    it isn''t necessary to start the Replicat, because GoldenGate does this automatically
    for the initial load when the initial-load Extract is started. GoldenGate only
    automatically starts the Replicat for an initial-load Replicat, not for the ongoing-change
    Replicat. When the load is complete, GoldenGate automatically stops the initial-load
    Extract and Replicat. Let''s start the IHREMD1 Extract, as shown in the following
    example:


    `GGSCI (sourceserver) > START EXTRACT IHREMD1`


    If needed for some reason, you can stop the initial-load Extract using a similar
    method. For example, you may need to make a change to the GoldenGate parameters
    on the initial-load Extract. You stop and then start the initial-load Extract
    for the new changes to take effect. You must remember to check whether any rows
    have already been loaded to the target table. If so, you need to delete those
    rows on the target before restarting the extract. Following is an example of stopping
    the IHREMD1 Extract:


    `GGSCI (sourceserver) > STOP EXTRACT IHREMD1`'
  trans: '

    ## REPLICAT


    可以使用 `REPLICAT` 参数来定义 GoldenGate 初始加载的 Replicat 组。你应该为 Replicat 组制定命名标准。这将有助于你快速识别
    Replicat 的用途及其运行位置。在需要快速恢复复制（如果它已停止）的问题解决情况下，这一点尤其重要。当前 Replicat 组名的长度限制为八个字符。以下是你的命名标准中应包含的一些项目：


    *   流程类型：在本例中是 Replicat。如示例所示，如果你使用 GoldenGate 进行初始加载，还应该对初始加载 Extract 和 Replicat
    使用不同的命名。

    *   使用该流程的应用程序，例如人力资源、薪资、销售或计费。

    *   流程运行的环境，例如开发或生产。

    *   一个用于指示是否存在多个 Replicat 的标识符。


    在示例中，Replicat 组被命名为 `DHREMD1`。第一个字符 `D` 指定了它是直接加载 Replicat。`HREM` 指定了你将此 Replicat
    组用于人力资源员工应用程序和 `HR` 模式。第二个 `D` 表示你在开发环境中运行。最后，`1` 表示这是此模式和应用程序的第一个 Replicat 组。你可以添加额外的
    Replicat 组以提高性能，如第 7 章中进一步讨论的那样。


    ## SETENV


    可以使用 `SETENV` 参数来覆盖默认的环境变量设置。示例显式地将 `NLS_LANG` 设置为 `AMERICAN_AMERICA.AL32UTF8`。设置
    `NLS_LANG` 而不是让它默认为环境设置是一个好主意。如果 `NLS_LANG` 不正确，可能会导致复制失败或复制不正确的数据。对于 Replicat，`NLS_LANG`
    需要与其正在读取的跟踪文件（该文件是从源数据库创建的）中的 NLS 字符集相匹配。


    除了 `NLS_LANG`，你还可以使用 `SETENV` 参数设置其他环境变量。例如，可以按如下所示设置 `ORACLE_HOME` 和 `ORACLE_SID`。在示例中，我选择使用
    `TargetDB` 的 TNS 别名来设置 Oracle 环境，而不是使用 `SETENV`。你也可以在进入 GGSCI 之前设置 `ORACLE_HOME`
    和 `ORACLE_SID`，而不使用 TNS 别名或 `SETENV`。只要变量值有效，这些方法中的任何一种都可以工作：


    ```

    SETENV (ORACLE_HOME = "/u01/app/oracle/product/11.1.0")

    SETENV (ORACLE_SID = "TargetDB")

    ```


    接下来，让我们回顾一下 `USERID` 参数。


    ## USERID


    在第 2 章中，你创建了具有适当安全权限的 GoldenGate 数据库用户 ID。使用 `USERID` 参数，你可以指定 GoldenGate 数据库用户
    ID 和密码以连接到目标数据库。GoldenGate 密码也可以被加密，如第 5 章中所介绍。


    正如之前在 Extract 上提到的，对于 SQL Server，你可以将 `SOURCEDB` 参数与 `USERID` 选项一起使用：


    ```

    SOURCEDB sqlserver, userid sa, PASSWORD userpw

    ```


    `SOURCEDB` 指定了 SQL Server ODBC 数据源，`USERID` 指定了数据库用户 ID。如果你使用 Windows 身份验证，可以省略
    `USERID` 和 `PASSWORD` 选项。


    ## ASSUMETARGETDEFS


    当源表和目标表相同时，可以使用 `ASSUMETARGETDEFS` 参数。在示例中，源和目标上的 `HR` 模式是相同的。如果源和目标上使用的数据库表不同，你需要生成一个数据定义文件。第
    5 章涵盖了如何使用数据定义文件。


    ## MAP


    你使用 `MAP` 参数来指定从源表到目标表的映射。源表之前已在 Extract 中使用 `TABLE` 参数指定。在示例中，你使用通配符将源数据库 `HR`
    模式中的所有表映射到目标数据库 `HR` 模式中的相同表。


    与 `TABLE` 参数类似，`MAP` 参数是一个复杂的参数，具有许多选项，允许你过滤行、映射列、转换数据等等。其中一些选项在第 5 章中介绍。现在，让我们保持简单，只指示
    GoldenGate 复制 `HR` 模式的所有更改。你可以通过使用通配符星号（如 `HR.*`）轻松完成此操作。通配符告诉 GoldenGate 复制 `HR`
    模式中的*所有*表。你也可以单独列出每个表，但使用通配符要容易得多。你也假设源和目标模式匹配。如果它们不匹配，你可以使用 `MAP` 参数选项（如 `COLMAP`）来映射不同的源和目标列。


    ### 添加初始加载 Replicat


    在使用初始加载 Replicat 之前，你需要添加 Replicat 组。你可以使用 `ADD REPLICAT` 命令来完成此操作，如下面的示例所示：


    ```

    GGSCI (targetserver) > ADD REPLICAT DHREMD1, SPECIALRUN

    ```


    `ADD REPLICAT` 命令告诉 GoldenGate 添加 Replicat 组。你可以使用 `SPECIALRUN` 参数让 GoldenGate
    知道这是一个仅用于初始加载的特殊 Replicat。本章稍后将介绍为持续同步设置另一个 Replicat。


    现在你已经配置了初始加载 Extract 和 Replicat，并将其添加到 GoldenGate 中，就可以启动加载过程了。


    ### 启动 GoldenGate 初始加载


    你通过启动 Extract 来启动 GoldenGate 初始加载过程。请记住，不需要启动 Replicat，因为当初始加载 Extract 启动时，GoldenGate
    会为初始加载自动启动它。GoldenGate 仅自动启动初始加载 Replicat，而不是持续更改 Replicat。加载完成后，GoldenGate 会自动停止初始加载
    Extract 和 Replicat。让我们启动 `IHREMD1` Extract，如下例所示：


    ```

    GGSCI (sourceserver) > START EXTRACT IHREMD1

    ```


    如果出于某种原因需要停止，你可以使用类似的方法停止初始加载 Extract。例如，你可能需要更改初始加载 Extract 上的 GoldenGate 参数。你需要停止然后重新启动初始加载
    Extract 以使新的更改生效。你必须记住检查是否已有任何行加载到目标表中。如果是，你需要在重新启动 Extract 之前删除目标上的这些行。以下是如何停止
    `IHREMD1` Extract 的示例：


    ```

    GGSCI (sourceserver) > STOP EXTRACT IHREMD1

    ```

