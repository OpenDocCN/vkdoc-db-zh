  trans: "\n完成第二部分后，您应已完成数据库维护，并准备好将数据库切换回其原始配置。为此，您必须将在备用数据库作为主数据库运行期间对其所做的任何更改，应用回原始主数据库。这些步骤如图\
    \ 12-6 所示。\n\n![images](img/1206.jpg)\n\n**图 12-6.** 灾难恢复计划切换，第三部分\n\n## 第三部分\n\
    \n现在让我们回顾第三部分的各个步骤，如图 12-6 所示。\n\n### 步骤说明\n\n1.  首先，您需要完成主数据库上的任何维护活动。在维护成功完成之前，备用数据库将充当主数据库。在处理来自备用数据库的\
    \ GoldenGate 更改之前，请务必禁用主数据库上的任何触发器或级联删除约束。\n2.  停止针对备用数据库运行的应用程序。此时请确保保持`Local\
    \ Extract`运行，以便它能捕获任何剩余的数据库事务。\n3.  在主数据库上启动`Replicat`，准备处理在备用数据库上进行的更改，如下例所示：\n\
    \    ```\n    GGSCI (primaryserver) > START REPLICAT RHREMD3\n    ```\n4.  在备用数据库上启动数据泵`Extract`，以发送更改事务供主数据库上的`Replicat`处理，如下例所示：\n\
    \    ```\n    GGSCI (standbyserver) > START EXTRACT PHREMD3\n    ```\n\n在第三部分中，您完成了数据库维护，然后处理了在备用数据库充当主数据库期间对其所做的所有更改。接下来，您需要在第四部分中关闭从备用数据库到主数据库的复制，如图\
    \ 12-7 所示。\n\n## 第四部分\n\n![images](img/1207.jpg)\n\n**图 12-7.** 灾难恢复计划切换，第四部分\n\
    \n以下是图 12-7 中第四部分各步骤的说明。\n\n### 步骤说明\n\n1.  验证没有延迟后，停止备用数据库上的`Local Extract`，如下例所示：\n\
    \    ```\n    GGSCI (standbyserver) > LAG EXTRACT LHREMD3\n    Sending GETLAG\
    \ request to EXTRACT LHREMD3 ...\n    Last record lag: 5 seconds.\n    At EOF,\
    \ no more records to process.\n    GGSCI (standbyserver) > STOP EXTRACT LHREMD3\n\
    \    ```\n2.  验证没有延迟后，停止备用数据库上的数据泵`Extract`，如下例所示：\n    ```\n    GGSCI (standbyserver)\
    \ > LAG EXTRACT PHREMD3\n    Sending GETLAG request to EXTRACT PHREMD3 ...\n \
    \   Last record lag: 4 seconds.\n    At EOF, no more records to process.\n   \
    \ GGSCI (standbyserver) > STOP EXTRACT PHREMD3\n    ```\n3.  验证没有更多记录需要处理后，停止主数据库上的`Replicat`，如下例所示：\n\
    \    ```\n    GGSCI (primaryserver) > LAG REPLICAT RHREMD3\n    Sending GETLAG\
    \ request to REPLICAT RHREMD3 ...\n    Last record lag: 6 seconds.\n    At EOF,\
    \ no more records to process.\n    GGSCI (primaryserver) > STOP REPLICAT RHREMD3\n\
    \    ```\n\n现在，从备用数据库到主数据库的复制已完成并停止，您可以继续在第五部分中重新启动从主数据库到备用数据库的原始复制，如图 12-8 所示。\n\
    \n## 第五部分\n\n![images](img/1208.jpg)\n\n**图 12-8.** 灾难恢复计划切换，第五部分\n\n第五部分的步骤，如图\
    \ 12-8 所示，如下：\n\n### 步骤说明\n\n1.  为了开始捕获更改，为应用程序切换回主数据库做准备，请修改主数据库的`Local Extract`，使其从*现在*开始捕获更改，然后启动`Extract`，如下所示：\n\
    \    ```\n    GGSCI (primaryserver) > ALTER EXTRACT LHREMD2, BEGIN NOW\n    GGSCI\
    \ (primaryserver) > START EXTRACT LHREMD2\n    ```\n2.  为主数据库准备应用程序，并启动连接到主数据库的应用程序。在准备过程中，您可能需要向应用程序用户授予一些\
    \ SQL 权限。同时，请记住启用在主数据库作为复制目标时可能已停止的任何触发器或级联删除约束。\n3.  在主数据库上启动数据泵`Extract`，如下例所示：\n\
    \    ```\n    GGSCI (primaryserver) > START EXTRACT PHREMD2\n    ```\n4.  在备用数据库上启动`Replicat`，如下例所示：\n\
    \    ```\n    GGSCI (standbyserver) > START REPLICAT RHREMD2\n    ```\n\n现在，您已完成复制切换过程的第五部分，数据库已恢复其原始配置。因此，您已将应用程序的停机时间从四小时降至将应用程序切换到备用数据库及其切回所需的最小时间。接下来，让我们介绍使用我们的灾难恢复复制来执行计划外故障切换的不同场景。\n"
- fmt: "### Performing an Unplanned Failover\n\nIn an unplanned failover scenario,\
    \ you lose your entire primary database server to a disaster. After the disaster\
    \ occurs, you can use GoldenGate to apply the last database transactions to bring\
    \ the standby database current and then the applications can use the standby database\
    \ until the primary database is repaired and brought back online. Once the primary\
    \ is back online, you will need to go through some steps to resynchronize it with\
    \ the standby.\n\nIn our example, let's assume that you've had a disaster and\
    \ your primary database server is destroyed. A new primary database server is\
    \ on its way from the vendor and will be delivered and operational within 24 hours.\
    \ Until that time, you will use the standby server as the primary database server.\
    \ Let's go through the steps using GoldenGate replication to failover from the\
    \ primary database to the standby database. After that, you will go through the\
    \ steps to fall back to the new primary database server after it gets installed\
    \ and is operational. Once again, to keep it simple, we've divided the unplanned\
    \ failover steps into five parts each with several steps. Let's begin with part\
    \ 1, as shown in [Figure 12-4](#Chapter12.html#fig_12_4).\n\n![images](images/1209.jpg)\n\
    \n*Figure 12-9. Disaster recovery unplanned failover, part 1*\n\nFollowing is\
    \ a description of the steps in part 1 as shown in [Figure 12-9](#Chapter12.html#fig_12_9).\n\
    \n1.  After verifying there is no lag, stop the `Replicat` as shown in the following\
    \ example:\n    ```\n    GGSCI (standbyserver) > LAG REPLICAT RHREMD2\n    Sending\
    \ GETLAG request to REPLICAT RHREMD2 ...\n    Last record lag: 7 seconds.\n  \
    \  At EOF, no more records to process.\n    GGSCI (standbyserver) > STOP REPLICAT\
    \ RHREMD2\n    ```\n\nNow you've completed part 1 of the failover process. The\
    \ standby database has caught up with all the changes that are available from\
    \ the primary database. Now you can proceed to part 2 and start the standby Extract\
    \ and switch the application to use the standby database as shown in [Figure 12-10](#Chapter12.html#fig_12_10).\n\
    \n![images](images/1210.jpg)\n\n*Figure 12-10. Disaster recovery unplanned failover,\
    \ part 2*\n\nLet's review the steps in part 2 from [Figure 12-10](#Chapter12.html#fig_12_10)\
    \ next.\n\n1.  To begin capturing changes in preparation for the application switchover,\
    \ alter the Local Extract for the standby database to begin capturing changes\
    \ *now* and then start it as follows:\n    ```\n    GGSCI (standbyserver) > ALTER\
    \ EXTRACT LHREMD3, BEGIN NOW\n    GGSCI (standbyserver) > START EXTRACT LHREMD3\n\
    \    ```\n2.  Prepare the standby database for the application and start the application\
    \ connected to the standby database. In preparation, you may need to grant some\
    \ SQL permissions to your application users. Also remember to enable any triggers\
    \ or cascade delete constraints you may have stopped while the standby was the\
    \ replication target.\n\nAfter completing part 2, you are done with the failover\
    \ to the standby database and the users can continue normal processing using the\
    \ standby database. Any database DML changes made to the standby database will\
    \ be accumulating in the GoldenGate source trail files on the standby server until\
    \ the primary database is repaired or replaced and brought back online.\n\nOnce\
    \ the primary database server is repaired or replaced and back online, you can\
    \ begin part 3 of the process of moving the applications and users back to the\
    \ primary database. The first steps of this process are shown in [Figure 12-11](#Chapter12.html#fig_12_11).\n\
    \n![images](images/1211.jpg)\n\n*Figure 12-11. Disaster recovery unplanned failover,\
    \ part 3*\n\nFollowing are descriptions of the part 3 steps in [Figure 12-11](#Chapter12.html#fig_12_11).\n\
    \n1.  Restore the GoldenGate software directories and files from your offline\
    \ server backups.\n2.  Delete the Local Extract and the source trails and then\
    \ add the Local Extract back as shown in the following example. Do not start the\
    \ Local Extract until later.\n    ```\n    GGSCI (primaryserver) > DELETE EXTRACT\
    \ LHREMD2\n    GGSCI (primaryserver) > DELETE EXTTRAIL dirdat/l3\n\n    GGSCI\
    \ (primaryserver) > ADD EXTRACT LHREMP2, TRANLOG, BEGIN NOW\n    GGSCI (primaryserver)\
    \ > ADD EXTTRAIL dirdat/l3, EXTRACT LHREMP2, MEGABYTES 100\n    ```\n    Deleting\
    \ the Local Extract and trails reinitializes them so you can start over with extracting\
    \ changes. The `delete exttrail` command only removes the GoldenGate checkpoints,\
    \ so you may also want to remove any leftover trail files from the operating system\
    \ directory using O/S commands to avoid any conflicts.\n3.  Start the GoldenGate\
    \ Manager as shown in the following example:\n    ```\n    GGSCI (primaryserver)\
    \ > START MANAGER\n    ```\n\nNow that you have your GoldenGate files restored\
    \ and the GoldenGate Local Extract ready on the primary database, you can begin\
    \ part 4. The next steps are to resynchronize the primary database from the standby\
    \ database as shown in [Figure 12-12](#Chapter12.html#fig_12_12).\n\n![images](images/1212.jpg)\n\
    \n*Figure 12-12. Disaster recovery unplanned failover, part 4*\n\nThe part 4 steps\
    \ for [Figure 12-12](#Chapter12.html#fig_12_12) are described next.\n\n1.  Disable\
    \ any triggers or cascade delete constraints on the primary database.\n2.  Perform\
    \ the initial data load from the standby to the primary database. This step can\
    \ be done in “hot” mode while the standby database is running, since the GoldenGate\
    \ Extract will be capturing any DML changes made while the load is running.\n\
    3.  Once the initial load is done from the standby to the primary database, stop\
    \ the application running against the standby database. At this time be sure to\
    \ leave the Local Extract running on the standby database so it can capture any\
    \ remaining database transactions.\n4.  Start the `Replicat` on the primary database\
    \ to prepare to process the changes that were made on the standby database as\
    \ shown in the following example:\n    ```\n    GGSCI (primaryserver) > START\
    \ REPLICAT RHREMD3\n    ```\n5.  Start the data-pump Extract to send database\
    \ change transactions to be processed by the Replicat. Once the replication is\
    \ complete and the lag is showing “At EOF, no more records to process”, you can\
    \ stop the Extracts and Replicats as shown in the following example:\n    ```\n\
    \    GGSCI (standbyserver) > START EXTRACT PHREMD3\n\n    GGSCI (primaryserver)\
    \ > LAG REPLICAT RHREMD3\n    Sending GETLAG request to REPLICAT RHREMD3 ...\n\
    \    Last record lag: 6 seconds.\n    At EOF, no more records to process.\n  \
    \  GGSCI (primaryserver) > STOP REPLICAT RHREMD3\n\n    GGSCI (standbyserver)\
    \ > STOP EXTRACT LHREMD3\n    GGSCI (standbyserver) > STOP EXTRACT PHREMD3\n \
    \   ```\n\n![images](images/square.jpg) **Note** Once you have finished synchronizing\
    \ the primary and standby databases, you should perform data validation. You can\
    \ do this manually with sql queries for row counts and selected data values, or\
    \ use an automated tool such as `Oracle GoldenGate Veridata`. Refer to [Chapter\
    \ 9](#Chapter09.html#ch9) for more information on `Veridata`.\n\nThe last part\
    \ is to move the users and the application back to the primary database and restart\
    \ the original replication configuration from the primary to the secondary database.\
    \ Let's review those steps in part 5, as shown in [Figure 12-13](#Chapter12.html#fig_12_13).\n\
    \n![images](images/1213.jpg)\n\n*Figure 12-13. Disaster recovery unplanned failover,\
    \ part 5*\n\nFollowing is a description of the steps in part 5 as shown in [Figure\
    \ 12-13](#Chapter12.html#fig_12_13)."
  raw: "### Performing an Unplanned Failover\n\nIn an unplanned failover scenario,\
    \ you lose your entire primary database server to a disaster. After the disaster\
    \ occurs, you can use GoldenGate to apply the last database transactions to bring\
    \ the standby database current and then the applications can use the standby database\
    \ until the primary database is repaired and brought back online. Once the primary\
    \ is back online, you will need to go through some steps to resynchronize it with\
    \ the standby.\n\nIn our example, let's assume that you've had a disaster and\
    \ your primary database server is destroyed. A new primary database server is\
    \ on its way from the vendor and will be delivered and operational within 24 hours.\
    \ Until that time, you will use the standby server as the primary database server.\
    \ Let's go through the steps using GoldenGate replication to failover from the\
    \ primary database to the standby database. After that, you will go through the\
    \ steps to fall back to the new primary database server after it gets installed\
    \ and is operational. Once again, to keep it simple, we've divided the unplanned\
    \ failover steps into five parts each with several steps. Let's begin with part\
    \ 1, as shown in [Figure 12-4](#Chapter12.html#fig_12_4).\n\n![images](images/1209.jpg)\n\
    \n***Figure 12-9.** Disaster recovery unplanned failover, part 1*\n\nFollowing\
    \ is a description of the steps in part 1 as shown in [Figure 12-9](#Chapter12.html#fig_12_9).\n\
    \n1.  After verifying there is no lag, stop the Replicat as shown in the following\
    \ example: `GGSCI (standbyserver) > LAG REPLICAT RHREMD2`\n    `Sending GETLAG\
    \ request to REPLICAT RHREMD2 ...`\n    `Last record lag: 7 seconds.`\n    `At\
    \ EOF, no more records to process.`\n    `GGSCI (standbyserver) > STOP REPLICAT\
    \ RHREMD2`\n\nNow you've completed part 1 of the failover process. The standby\
    \ database has caught up with all the changes that are available from the primary\
    \ database. Now you can proceed to part 2 and start the standby Extract and switch\
    \ the application to use the standby database as shown in [Figure 12-10](#Chapter12.html#fig_12_10).\n\
    \n![images](images/1210.jpg)\n\n***Figure 12-10.** Disaster recovery unplanned\
    \ failover, part 2*\n\nLet's review the steps in part 2 from [Figure 12-10](#Chapter12.html#fig_12_10)\
    \ next.\n\n1.  To begin capturing changes in preparation for the application switchover,\
    \ alter the Local Extract for the standby database to begin capturing changes\
    \ *now* and then start it as follows: `GGSCI (standbyserver) > ALTER EXTRACT LHREMD3,\
    \ BEGIN NOW`\n    `GGSCI (standbyserver) > START EXTRACT LHREMD3`\n2.  Prepare\
    \ the standby database for the application and start the application connected\
    \ to the standby database. In preparation, you may need to grant some SQL permissions\
    \ to your application users. Also remember to enable any triggers or cascade delete\
    \ constraints you may have stopped while the standby was the replication target.\n\
    \nAfter completing part 2, you are done with the failover to the standby database\
    \ and the users can continue normal processing using the standby database. Any\
    \ database DML changes made to the standby database will be accumulating in the\
    \ GoldenGate source trail files on the standby server until the primary database\
    \ is repaired or replaced and brought back online.\n\nOnce the primary database\
    \ server is repaired or replaced and back online, you can begin part 3 of the\
    \ process of moving the applications and users back to the primary database. The\
    \ first steps of this process are shown in [Figure 12-11](#Chapter12.html#fig_12_11).\n\
    \n![images](images/1211.jpg)\n\n***Figure 12-11.** Disaster recovery unplanned\
    \ failover, part 3*\n\nFollowing are descriptions of the part 3 steps in [Figure\
    \ 12-11](#Chapter12.html#fig_12_11).\n\n1.  Restore the GoldenGate software directories\
    \ and files from your offline server backups.\n2.  Delete the Local Extract and\
    \ the source trails and then add the Local Extract back as shown in the following\
    \ example. Do not start the Local Extract until later.\n\n`GGSCI (primaryserver)\
    \ > DELETE EXTRACT LHREMD2`\n    `GGSCI (primaryserver) > DELETE EXTTRAIL dirdat/l3`\n\
    \n`GGSCI (primaryserver) > ADD EXTRACT LHREMP2, TRANLOG, BEGIN NOW`\n    `GGSCI\
    \ (primaryserver) > ADD EXTTRAIL dirdat/l3, EXTRACT LHREMP2, MEGABYTES 100`\n\n\
    Deleting the Local Extract and trails reinitializes them so you can start over\
    \ with extracting changes. The delete exttrail command only removes the GoldenGate\
    \ checkpoints, so you may also want to remove any leftover trail files from the\
    \ operating system directory using O/S commands to avoid any conflicts.\n\n3.\
    \  Start the GoldenGate Manager as shown in the following example: `GGSCI (primaryserver)\
    \ > START MANAGER`\n\nNow that you have your GoldenGate files restored and the\
    \ GoldenGate Local Extract ready on the primary database, you can begin part 4\\\
    . The next steps are to resynchronize the primary database from the standby database\
    \ as shown in [Figure 12-12](#Chapter12.html#fig_12_12).\n\n![images](images/1212.jpg)\n\
    \n***Figure 12-12.** Disaster recovery unplanned failover, part 4*\n\nThe part\
    \ 4 steps for [Figure 12-12](#Chapter12.html#fig_12_12) are described next.\n\n\
    1.  Disable any triggers or cascade delete constraints on the primary database.\n\
    2.  Perform the initial data load from the standby to the primary database. This\
    \ step can be done in “hot” mode while the standby database is running, since\
    \ the GoldenGate Extract will be capturing any DML changes made while the load\
    \ is running.\n3.  Once the initial load is done from the standby to the primary\
    \ database, stop the application running against the standby database. At this\
    \ time be sure to leave the L¬¬ocal Extract running on the standby database so\
    \ it can capture any remaining database transactions.\n4.  Start the Replicat\
    \ on the primary database to prepare to process the changes that were made on\
    \ the standby database as shown in the following example: `GGSCI (primaryserver)\
    \ > START REPLICAT RHREMD3`\n5.  Start the data-pump Extract to send database\
    \ change transactions to be processed by the Replicat. Once the replication is\
    \ complete and the lag is showing “At EOF, no more records to process”, you can\
    \ stop the Extracts and Replicats as shown in the following example: `GGSCI (standbyserver)\
    \ > START EXTRACT PHREMD3`\n\n`GGSCI (primaryserver) > LAG REPLICAT RHREMD3`\n\
    \    `Sending GETLAG request to REPLICAT RHREMD3 ...`\n    `Last record lag: 6\
    \ seconds.`\n    `At EOF, no more records to process.`\n    `GGSCI (primaryserver)\
    \ > STOP REPLICAT RHREMD3`\n\n`GGSCI (standbyserver) > STOP EXTRACT LHREMD3`\n\
    \    `GGSCI (standbyserver) > STOP EXTRACT PHREMD3`\n\n![images](images/square.jpg)\
    \ **Note** Once you have finished synchronizing the primary and standby databases,\
    \ you should perform data validation. You can do this manually with sql queries\
    \ for row counts and selected data values, or use an automated tool such as Oracle\
    \ GoldenGate Veridata. Refer to [Chapter 9](#Chapter09.html#ch9) for more information\
    \ on Veridata.\n\nThe last part is to move the users and the application back\
    \ to the primary database and restart the original replication configuration from\
    \ the primary to the secondary database. Let's review those steps in part 5, as\
    \ shown in [Figure 12-13](#Chapter12.html#fig_12_13).\n\n![images](images/1213.jpg)\n\
    \n***Figure 12-13.** Disaster recovery unplanned failover, part 5*\n\nFollowing\
    \ is a description of the steps in part 5 as shown in [Figure 12-13](#Chapter12.html#fig_12_13)."
  trans: "### 执行计划外故障转移\n\n在计划外故障转移场景中，您会因灾难而丢失整个主数据库服务器。灾难发生后，您可以使用 GoldenGate 将最后的数据库事务应用到备用数据库，使其数据保持最新，然后应用程序可以使用该备用数据库，直到主数据库被修复并重新上线。一旦主数据库重新上线，您将需要执行一些步骤来将其与备用数据库重新同步。\n\
    \n在我们的示例中，假设您遭遇了灾难，主数据库服务器被毁。一台新的主数据库服务器正在供应商途中，预计将在 24 小时内交付并投入运行。在此之前，您将使用备用服务器作为主数据库服务器。让我们逐步介绍使用\
    \ GoldenGate 复制从主数据库故障转移到备用数据库的步骤。之后，您将逐步执行在新主数据库服务器安装并运行后回退的步骤。再次说明，为简单起见，我们将计划外故障转移步骤分为五个部分，每部分包含若干步骤。让我们从第\
    \ 1 部分开始，如 图 12-4 所示。\n\n![images](img/1209.jpg)\n\n*图 12-9. 灾难恢复计划外故障转移，第 1 部分*\n\
    \n以下是 图 12-9 中所示第 1 部分步骤的说明。\n\n1.  确认没有延迟后，停止 `Replicat`，如下例所示：\n    ```\n  \
    \  GGSCI (standbyserver) > LAG REPLICAT RHREMD2\n    Sending GETLAG request to\
    \ REPLICAT RHREMD2 ...\n    Last record lag: 7 seconds.\n    At EOF, no more records\
    \ to process.\n    GGSCI (standbyserver) > STOP REPLICAT RHREMD2\n    ```\n\n\
    现在，您已完成故障转移过程的第 1 部分。备用数据库已同步了主数据库的所有可用更改。现在您可以继续第 2 部分，启动备用数据库的 Extract 并将应用程序切换为使用备用数据库，如\
    \ 图 12-10 所示。\n\n![images](img/1210.jpg)\n\n*图 12-10. 灾难恢复计划外故障转移，第 2 部分*\n\n\
    接下来，我们回顾一下 图 12-10 中的第 2 部分步骤。\n\n1.  为准备应用程序切换，修改备用数据库的本地 Extract 以开始*立即*捕获更改，然后启动它，如下所示：\n\
    \    ```\n    GGSCI (standbyserver) > ALTER EXTRACT LHREMD3, BEGIN NOW\n    GGSCI\
    \ (standbyserver) > START EXTRACT LHREMD3\n    ```\n2.  为应用程序准备备用数据库，并启动连接到备用数据库的应用程序。在准备过程中，您可能需要为您的应用程序用户授予一些\
    \ SQL 权限。同时，请记住启用您可能在备用数据库作为复制目标时停止的任何触发器或级联删除约束。\n\n完成第 2 部分后，您就已完成到备用数据库的故障转移，用户可以继续使用备用数据库进行正常处理。对备用数据库所做的任何数据库\
    \ DML 更改，都将累积在备用服务器上的 GoldenGate 源跟踪文件中，直到主数据库被修复或更换并重新上线。\n\n一旦主数据库服务器被修复或更换并重新上线，您就可以开始过程的第\
    \ 3 部分，将应用程序和用户移回主数据库。此过程的前几个步骤如 图 12-11 所示。\n\n![images](img/1211.jpg)\n\n*图\
    \ 12-11. 灾难恢复计划外故障转移，第 3 部分*\n\n以下是 图 12-11 中第 3 部分步骤的说明。\n\n1.  从离线服务器备份中恢复 GoldenGate\
    \ 软件目录和文件。\n2.  删除本地 Extract 和源跟踪文件，然后重新添加本地 Extract，如下例所示。暂时不要启动本地 Extract。\n\
    \    ```\n    GGSCI (primaryserver) > DELETE EXTRACT LHREMD2\n    GGSCI (primaryserver)\
    \ > DELETE EXTTRAIL dirdat/l3\n\n    GGSCI (primaryserver) > ADD EXTRACT LHREMP2,\
    \ TRANLOG, BEGIN NOW\n    GGSCI (primaryserver) > ADD EXTTRAIL dirdat/l3, EXTRACT\
    \ LHREMP2, MEGABYTES 100\n    ```\n    删除本地 Extract 和跟踪文件会重新初始化它们，以便您可以重新开始提取更改。`delete\
    \ exttrail` 命令仅删除 GoldenGate 检查点，因此您可能还需要使用操作系统命令删除操作系统目录中遗留的跟踪文件，以避免任何冲突。\n3.\
    \  启动 GoldenGate Manager，如下例所示：\n    ```\n    GGSCI (primaryserver) > START MANAGER\n\
    \    ```\n\n现在，您已恢复 GoldenGate 文件并在主数据库上准备好了 GoldenGate 本地 Extract，可以开始第 4 部分了。接下来是从备用数据库重新同步主数据库，如\
    \ 图 12-12 所示。\n\n![images](img/1212.jpg)\n\n*图 12-12. 灾难恢复计划外故障转移，第 4 部分*\n\n\
    图 12-12 的第 4 部分步骤说明如下。\n\n1.  禁用主数据库上的任何触发器或级联删除约束。\n2.  从备用数据库向主数据库执行初始数据加载。此步骤可以在备用数据库运行时以“热”模式完成，因为\
    \ GoldenGate Extract 将捕获加载期间发生的任何 DML 更改。\n3.  从备用数据库到主数据库的初始加载完成后，停止在备用数据库上运行的应用程序。此时，请务必保持备用数据库上的本地\
    \ Extract 运行，以便它能捕获剩余的数据库事务。\n4.  在主数据库上启动 `Replicat`，以准备处理在备用数据库上所做的更改，如下例所示：\n\
    \    ```\n    GGSCI (primaryserver) > START REPLICAT RHREMD3\n    ```\n5.  启动数据泵\
    \ Extract 以发送数据库更改事务供 Replicat 处理。一旦复制完成且延迟显示为“At EOF, no more records to process”，您就可以停止\
    \ Extract 和 Replicat，如下例所示：\n    ```\n    GGSCI (standbyserver) > START EXTRACT\
    \ PHREMD3\n\n    GGSCI (primaryserver) > LAG REPLICAT RHREMD3\n    Sending GETLAG\
    \ request to REPLICAT RHREMD3 ...\n    Last record lag: 6 seconds.\n    At EOF,\
    \ no more records to process.\n    GGSCI (primaryserver) > STOP REPLICAT RHREMD3\n\
    \n    GGSCI (standbyserver) > STOP EXTRACT LHREMD3\n    GGSCI (standbyserver)\
    \ > STOP EXTRACT PHREMD3\n    ```\n\n![images](img/square.jpg) **注意** 完成主备数据库同步后，应执行数据验证。您可以使用\
    \ SQL 查询手动检查行数和选定的数据值，也可以使用自动化工具，如 `Oracle GoldenGate Veridata`。有关 `Veridata`\
    \ 的更多信息，请参阅 第 9 章。\n\n最后一步是将用户和应用程序移回主数据库，并重启从主数据库到辅助数据库的原始复制配置。让我们回顾第 5 部分的这些步骤，如\
    \ 图 12-13 所示。\n\n![images](img/1213.jpg)\n\n*图 12-13. 灾难恢复计划外故障转移，第 5 部分*\n\n\
    以下是 图 12-13 中所示第 5 部分步骤的说明。"
- fmt: "1.  为了开始捕获更改，为应用程序切回主数据库做准备，更改主数据库的本地提取（Local Extract），从*现在*开始捕获更改，然后按如下方式启动提取（Extract）：`GGSCI\
    \ (primaryserver) > ALTER EXTRACT LHREMD2, BEGIN NOW`\n    `GGSCI (primaryserver)\
    \ > START EXTRACT LHREMD2`\n2.  准备好主数据库以供应用程序使用，并启动连接到主数据库的应用程序。在准备过程中，您可能需要向应用程序用户授予一些\
    \ SQL 权限。同时，请记住启用您可能在主数据库作为复制目标时停止的任何触发器或级联删除约束。\n3.  在主数据库上启动数据泵提取（data-pump\
    \ Extract），如下例所示：`GGSCI (primaryserver) > START EXTRACT PHREMD2`\n4.  在备用数据库上启动复制（Replicat），如下例所示：`GGSCI\
    \ (standbyserver) > START REPLICAT RHREMD2`\n\n现在您已完成计划外故障切换过程的第 5 部分，数据库已恢复到其原始配置。备用数据库现已同步，并准备好进行下一次切换或故障转移。\n\
    \n### 总结\n\n在本章中，我们介绍了如何为灾难恢复目的设置和配置 GoldenGate 复制。我们展示了如何配置 GoldenGate 以支持计划内的切换场景，从而在数据库维护期间最小化应用程序停机时间窗口。我们还展示了如何配置\
    \ GoldenGate 以在计划外灾难期间故障转移到备用数据库并返回到主数据库。如果您想获取有关使用 GoldenGate 维护备用数据库的更多信息，也可以参考\
    \ `GoldenGate Windows and UNIX Administrator's Guide`。在下一章中，我们将介绍 GoldenGate 的另一个特定用途：零停机时间迁移和升级。\n\
    \n## 第 13 章\n\n### 零停机时间迁移复制\n\n如今，许多 IT 组织因无法忍受迁移到新软件版本和硬件平台所带来的停机时间，而长期被困在旧的软件版本和旧的数据库硬件平台上。即使对于繁忙的在线网站，计划内的数据库停机也可能导致收入损失并激怒客户。Oracle\
    \ GoldenGate 可以通过提供一种方法来帮助应对这些挑战，即提前实施新的、升级后的数据库平台，并使其准备好供应用程序切换使用。所需的唯一停机时间是应用程序切换并重新连接到新目标数据库所需的时间。此外，通过从新的升级后的目标复制回旧的源数据库，Oracle\
    \ GoldenGate 可以提供一种方法，以便在迁移出现问题时轻松回退到旧数据库。另外，Oracle GoldenGate 的优势在于可以在许多不同的异构数据库和硬件平台上工作。例如，您可以使用\
    \ Oracle GoldenGate 将数据从 NonStop SQL/MX 迁移到 Red Hat Linux 上最新版本的 Oracle 数据库。使用\
    \ Oracle GoldenGate，您可以开发标准的零停停机时间数据库迁移流程，并在整个组织中实施它们，无论使用的是何种特定的 DBMS 或平台。\n\n\
    本章介绍了 Oracle GoldenGate 复制的另一种应用，即实现用于零停机时间迁移目的的特定复制配置。本章涵盖为零停机时间迁移设置和配置 Oracle\
    \ GoldenGate 复制。它涵盖了如何处理切换到新数据库以及如果出现问题时从新数据库回退到旧数据库。本章将您正在迁移自的数据库称为`旧数据库`，将您正在迁移至的数据库称为`新数据库`。\n\
    \n### 先决条件\n\n在开始设置零停机时间迁移复制之前，您需要满足以下先决条件：\n\n*   按照[第 2 章](#Chapter02.html#ch2)中的描述，在源和目标服务器上安装\
    \ Oracle GoldenGate 软件。\n*   在源和目标数据库上创建 Oracle GoldenGate 数据库用户 ID。\n*   目标数据库服务器的服务器名称或\
    \ IP 地址。\n*   Oracle GoldenGate 管理器进程在源端和目标端启动并运行。\n*   从源服务器到目标服务器的 Oracle GoldenGate\
    \ 管理器端口以及反向的 TCP/IP 网络连接是开放的。\n*   理解计划迁移的业务和技术复制需求。\n\n对于零停机时间迁移复制，还有一些额外的重要先决条件：\n\
    \n*   在源和目标服务器上备份您的 Oracle GoldenGate 软件和工作目录。\n*   用于在切换或回退过程中授予应用程序所需的任何必要对象权限的\
    \ SQL 脚本。\n*   用于将您的应用程序和用户从旧数据库移动到新数据库以及再移回的流程和脚本。\n\n让我们首先回顾零停机时间迁移复制的需求。"
  raw: "1.  To begin capturing changes in preparation for the application switchback\
    \ to the primary database, alter the Local Extract for the primary database to\
    \ begin capturing changes beginning *now* and then start the Extract as follows:\
    \ `GGSCI (primaryserver) > ALTER EXTRACT LHREMD2, BEGIN NOW`\n    `GGSCI (primaryserver)\
    \ > START EXTRACT LHREMD2`\n2.  Prepare the primary database for the application\
    \ and start the application connected to the primary database. In preparation,\
    \ you may need to grant some SQL permissions to your application users. Also remember\
    \ to enable any triggers or cascade delete constraints you may have stopped while\
    \ the primary database was the replication target.\n3.  Start the data-pump Extract\
    \ on the primary database as shown in the following example: `GGSCI (primaryserver)\
    \ > START EXTRACT PHREMD2`\n4.  Start the the Replicat on the standby database\
    \ as shown in the following example: `GGSCI (standbyserver) > START REPLICAT RHREMD2`\n\
    \nNow you have completed Part 5 of the unplanned failover process and the databases\
    \ are back to their original configuration. The standby is now synchronized and\
    \ ready for the next switchover or failover.\n\n### Summary\n\nIn this chapter\
    \ we covered how to set up and configure GoldenGate replication for disaster recovery\
    \ purposes. We showed how to configure GoldenGate to support a planned switchover\
    \ scenario to minimize the application outage window during database maintenance.\
    \ We also showed how to configure GoldenGate to failover to the standby database\
    \ and back to the primary during unplanned disasters. If you want additional information\
    \ on using GoldenGate to maintain a standby database, you can also refer to the\
    \ *GoldenGate Windows and UNIX Administrator's Guide.* In the next chapter, we'll\
    \ cover another specific use of GoldenGate for zero downtime migrations and upgrades.\n\
    \n## C H A P T E R  13\n\n## Zero-Downtime Migration Replication\n\nMany IT organizations\
    \ today are trapped for too long with old releases of software and old database\
    \ hardware platforms because they can't tolerate the downtime involved with migrating\
    \ to new software releases and hardware platforms. Even planned database outages\
    \ for busy online websites can result in lost revenue and make customers angry.\
    \ Oracle GoldenGate can help with these challenges by providing a way to implement\
    \ the new, upgraded database platform ahead of time and have it ready and waiting\
    \ for the application to cutover. The only downtime needed is the time for the\
    \ application to cutover and reconnect to the new target database. Also, by replicating\
    \ from the new upgraded target back to the old source database, Oracle GoldenGate\
    \ can provide a way to easily fall back to the old database if there are problems\
    \ with the migration. In addition, Oracle GoldenGate has the advantage of working\
    \ across many different heterogeneous databases and hardware platforms. For example,\
    \ you can use Oracle GoldenGate to migrate from NonStop SQL/MX to the latest release\
    \ of an Oracle database on Red Hat Linux. Using Oracle GoldenGate, you can develop\
    \ standard zero-downtime database migration processes and implement them across\
    \ your organization, regardless of the specific DBMS or platform being used.\n\
    \nThis chapter introduces another application of Oracle GoldenGate replication\
    \ to implement a specific replication configuration for zero-downtime migration\
    \ purposes. This chapter covers setting up and configuring Oracle GoldenGate replication\
    \ for zero-downtime migrations. It covers how to handle both cutover to the new\
    \ database and fallback from the new database to the old database if there are\
    \ problems. This chapter refers to the database you're migrating from as the *old\
    \ database* and the database you're migrating to as the *new database*.\n\n###\
    \ Prerequisites\n\nYou need to have the following prerequisites in place before\
    \ you can start setting up replication for zero-downtime migration:\n\n*   The\
    \ Oracle GoldenGate software installed on the source and target servers as described\
    \ in [Chapter 2](#Chapter02.html#ch2)\n*   The Oracle GoldenGate database User\
    \ ID created on the source and target databases\n*   The server name or IP address\
    \ of the target database server\n*   The Oracle GoldenGate Manager process up\
    \ and running on the source and the target\n*   TCP/IP network connectivity open\
    \ from the source server to the target server's Oracle GoldenGate manager port\
    \ and visa versa\n*   An understanding of the business and technical replication\
    \ requirements of the planned migration\n\nA few additional prerequisites are\
    \ important for zero-downtime migration replication:\n\n*   Backups of your Oracle\
    \ GoldenGate software and working directories on the source and target servers\n\
    *   SQL scripts to grant any necessary object privileges required by your application\
    \ during the cutover or fallback procedure\n*   Processes and scripts to move\
    \ your application and users from the old to the new database and back again\n\
    \nLet's start by reviewing the requirements for zero-downtime migration replication."
  trans: "\n1.  为了开始捕获更改，为应用程序切换回主数据库做准备，更改主数据库的本地提取（Local Extract），从*现在*开始捕获更改，然后按如下方式启动提取（Extract）：\n\
    \    `GGSCI (primaryserver) > ALTER EXTRACT LHREMD2, BEGIN NOW`\n    `GGSCI (primaryserver)\
    \ > START EXTRACT LHREMD2`\n2.  准备好主数据库以供应用程序使用，并启动连接到主数据库的应用程序。在准备过程中，您可能需要向应用程序用户授予一些\
    \ SQL 权限。同时，请记住启用您可能在主数据库作为复制目标时停止的任何触发器或级联删除约束。\n3.  在主数据库上启动数据泵提取（data-pump\
    \ Extract），如下例所示：\n    `GGSCI (primaryserver) > START EXTRACT PHREMD2`\n4.  在备用数据库上启动复制（Replicat），如下例所示：\n\
    \    `GGSCI (standbyserver) > START REPLICAT RHREMD2`\n\n现在您已完成计划外故障切换过程的第 5 部分，数据库已恢复到其原始配置。备用数据库现已同步，并准备好进行下一次切换或故障转移。\n\
    \n### 总结\n\n在本章中，我们介绍了如何为灾难恢复目的设置和配置 GoldenGate 复制。我们展示了如何配置 GoldenGate 以支持计划内的切换场景，从而在数据库维护期间最小化应用程序停机时间窗口。我们还展示了如何配置\
    \ GoldenGate 以在计划外灾难期间故障转移到备用数据库并返回到主数据库。如果您想获取有关使用 GoldenGate 维护备用数据库的更多信息，也可以参考\
    \ `GoldenGate Windows and UNIX Administrator's Guide`。在下一章中，我们将介绍 GoldenGate 的另一个特定用途：零停机时间迁移和升级。\n\
    \n## 第 13 章\n\n### 零停机时间迁移复制\n\n如今，许多 IT 组织因无法忍受迁移到新软件版本和硬件平台所带来的停机时间，而长期被困在旧的软件版本和旧的数据库硬件平台上。即使对于繁忙的在线网站，计划内的数据库停机也可能导致收入损失并激怒客户。Oracle\
    \ GoldenGate 可以通过提供一种方法来帮助应对这些挑战，即提前实施新的、升级后的数据库平台，并使其准备好供应用程序切换使用。所需的唯一停机时间是应用程序切换并重新连接到新目标数据库所需的时间。此外，通过从新的升级后的目标复制回旧的源数据库，Oracle\
    \ GoldenGate 可以提供一种方法，以便在迁移出现问题时轻松回退到旧数据库。另外，Oracle GoldenGate 的优势在于可以在许多不同的异构数据库和硬件平台上工作。例如，您可以使用\
    \ Oracle GoldenGate 将数据从 NonStop SQL/MX 迁移到 Red Hat Linux 上最新版本的 Oracle 数据库。使用\
    \ Oracle GoldenGate，您可以开发标准的零停机时间数据库迁移流程，并在整个组织中实施它们，无论使用的是何种特定的 DBMS 或平台。\n\n\
    本章介绍了 Oracle GoldenGate 复制的另一种应用，即实现用于零停机时间迁移目的的特定复制配置。本章涵盖为零停机时间迁移设置和配置 Oracle\
    \ GoldenGate 复制。它涵盖了如何处理切换到新数据库以及如果出现问题时从新数据库回退到旧数据库。本章将您正在迁移自的数据库称为`旧数据库`，将您正在迁移至的数据库称为`新数据库`。\n\
    \n### 先决条件\n\n在开始设置零停机时间迁移复制之前，您需要满足以下先决条件：\n\n*   按照第 2 章中的描述，在源和目标服务器上安装 Oracle\
    \ GoldenGate 软件。\n*   在源和目标数据库上创建 Oracle GoldenGate 数据库用户 ID。\n*   目标数据库服务器的服务器名称或\
    \ IP 地址。\n*   Oracle GoldenGate 管理器进程在源端和目标端启动并运行。\n*   从源服务器到目标服务器的 Oracle GoldenGate\
    \ 管理器端口以及反向的 TCP/IP 网络连接是开放的。\n*   理解计划迁移的业务和技术复制需求。\n\n对于零停机时间迁移复制，还有一些额外的重要先决条件：\n\
    \n*   在源和目标服务器上备份您的 Oracle GoldenGate 软件和工作目录。\n*   用于在切换或回退过程中授予应用程序所需的任何必要对象权限的\
    \ SQL 脚本。\n*   用于将您的应用程序和用户从旧数据库移动到新数据库以及再移回的流程和脚本。\n\n让我们首先回顾零停机时间迁移复制的需求。\n"
- fmt: '### Requirements


    Before you begin to configure the replication, you must have a solid understanding
    of the specific requirements that drive the zero-downtime migration replication
    technical design. Here are some of the typical requirements. As a reminder, this
    section refers to the source database you''re migrating from as the `old database`
    and the target database you''re migrating to as the `new database`.


    You need to ensure that you can meet these requirements using `Oracle GoldenGate`
    zero-downtime migration replication:


    *   Keep the `old database` you''re migrating from synchronized with the `new
    database`. After the migration cutover, keep the `old database` synchronized for
    some period of time until you''re certain there will be no fallback to the `old
    database`.

    *   The `old database` will actively process SQL changes until the migration cutover.
    Typically the cutover occurs during a scheduled weekend maintenance window or
    during a slow period for the website or application.

    *   During the interim period until the migration cutover, the `new database`
    can be used for read-only queries as needed. Although supported by `Oracle GoldenGate`''s
    `bidirectional replication` feature, typically the data in the `new database`
    isn''t being updated until after the cutover. If updating data in the `new database`
    before the cutover is a requirement for your project, you need to configure `bidirectional
    replication` to keep both databases synchronized.

    *   Database data and structures in the `old database` can be different than the
    `new database`. This depends on the type and complexity of migration. For example,
    specific data types or structures may need to change if you''re migrating from
    a `SQL Server` database to an `Oracle` database. If you''re simply migrating from
    an `Oracle 10g` to an `Oracle 11g` database, you may have the exact same application
    data and data structures. You may also be using `Oracle GoldenGate` to migrate
    other types of applications from old to new releases, and the data structures
    in those cases may be different.

    *   Data in the `old database` must be kept current with the `new database`, and
    there should be no replication lag at the time of cutover or fallback. Before
    the cutover or fallback some lag can be tolerated, but the lag must be eventually
    eliminated prior to the application cutover or fallback. Any replication lag present
    at the time of cutover could cause a delay.

    *   Cutover to the `new database` and fallback from the `new database` to the
    `old database` must happen quickly to minimize any downtime. Keep in mind that
    `Oracle GoldenGate` is only one piece the greater migration project, and you need
    tested procedures in place for all parts of your migration project, such as switching
    your application connections.

    *   After cutover to the `new database`, the database roles are reversed and the
    `new database` becomes the replication source and the `old database` becomes the
    target. This allows for migration fallback to the `old database` if needed.

    *   The time period permitted for the cutover and fallback procedures should be
    well understood. For example, a two-hour window for cutover and fallback has much
    different requirements than if an entire weekend is allowed for the cutover.


    Now that you have an understanding of the replication requirements, let''s review
    the zero-downtime migration topology.


    ### Zero-Downtime Migration Topology


    The underlying topology for zero-downtime migration is `one-way replication`,
    with a few changes for zero-downtime migration, as shown in `Figure 13-1`. `Chapter
    3`, “Architecture,” covered the concepts of `one-way replication`. `One-way replication`
    is the simplest topology and is often used for reporting or query offloading purposes.
    In this chapter, `one-way replication` topology is used for zero-downtime migration
    purposes. Data is replicated from a single source database to a single target
    database in only one direction at a time. Changes to database data are only made
    at the source database and then replicated to the target database. The source
    database is the `old database` you''re migrating from prior to the migration.
    After the migration cutover to the `new database`, the replication is reversed
    and data is replicated back from the `new database` to the `old database` to allow
    for migration fallback. This backward replication can stay in place for as long
    as needed. Once you''re sure you''ll stay on the `new database` and fallback isn''t
    needed, you can turn off the backward replication. Usually this period is a few
    days to a few weeks, but it can be longer if needed.


    In order to meet the zero-downtime migration requirements covered in the last
    section, you have to ensure that you can quickly and accurately switch the application
    activity from the `old database` to the `new database` and back again. Also, you
    must be able to replicate back from the `new database` to the `old database` in
    case a fallback is needed from the migration due to problems. `Figure 13-1` indicates
    that with a dotted arrow.


    ![images](images/1301.jpg)


    `Figure 13-1. Zero-downtime migration replication topology`


    Now let''s look at how to implement the replication requirements and topology
    using `Oracle GoldenGate`.'
