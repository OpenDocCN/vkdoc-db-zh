    ### 总结


    本章介绍了如何在基本 GoldenGate 复制配置中添加高级功能。你学习了如何增强基本报告功能以及使用加密使复制更加安全。你向 Manager 添加了一些自动启动参数，使你的复制能够保持更长时间的运行。你还回顾了如何在复制配置中包含高级的表、行和列映射以及数据过滤，以满足你复杂的业务需求。最后，本章涵盖了
