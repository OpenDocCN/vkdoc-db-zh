    \ and ready to switch the databases back to their original configuration. In order\
    \ to do that, you must apply any changes made to the standby database, while it\
    \ was functioning as the primary database, back to the original primary database.\
    \ Those steps are shown in [Figure 12-6](#Chapter12.html#fig_12_6).\n\n![images](images/1206.jpg)\n\
    \n***Figure 12-6.** Disaster recovery planned switchover, part 3*\n\nNow let's\
    \ review each of the steps in part 3, as shown in [Figure 12-6](#Chapter12.html#fig_12_6).\n\
    \n1.  First you need to complete any maintenance activities on the primary database.\
    \ Until the maintenance is successfully completed, the standby database will act\
    \ as the primary. Make sure to disable any triggers or cascade delete constraints\
    \ on the primary before processing the GoldenGate changes from the standby.\n\
    2.  Stop the application running against the standby database. At this time be\
    \ sure to leave the Local Extract running so it can capture any remaining database\
    \ transactions.\n3.  Start the the Replicat on the primary database to prepare\
    \ to process the changes that were made on the standby database as shown in the\
    \ following example: `GGSCI (primaryserver) > START REPLICAT RHREMD3`\n4.  Start\
    \ the data-pump Extract on the standby to send change transactions to be processed\
    \ by the Replicat on the primary as shown in the following example: `GGSCI (standbyserver)\
    \ > START EXTRACT PHREMD3`\n\nIn part 3 you finished your database maintenance\
    \ and then processed all the changes that were made to the standby database while\
    \ it was acting as the primary database. Next you need to turn off the replication\
    \ from the standby database to the primary database in part 4 as shown in [Figure\
    \ 12-7](#Chapter12.html#fig_12_7).\n\n![images](images/1207.jpg)\n\n***Figure\
    \ 12-7.** Disaster recovery planned switchover, part 4*\n\nFollowing are the descriptions\
    \ of the steps for part 4 from [Figure 12-7](#Chapter12.html#fig_12_7).\n\n1.\
    \  After verifying there is no lag, stop the Local Extract on the standby database\
    \ as shown in the following example: `GGSCI (standbyserver) > LAG EXTRACT LHREMD3`\n\
    \    `Sending GETLAG request to EXTRACT LHREMD3 ...`\n    `Last record lag: 5\
    \ seconds.`\n    `At EOF, no more records to process.`\n    `GGSCI (standbyserver)\
    \ > STOP EXTRACT LHREMD3`\n2.  After verifying there is no lag, stop the data-pump\
    \ Extract on the standby database as shown in the following example: `GGSCI (standbyserver)\
    \ > LAG EXTRACT PHREMD3`\n    `Sending GETLAG request to EXTRACT PHREMD3 ...`\n\
    \    `Last record lag: 4 seconds.`\n    `At EOF, no more records to process.`\n\
    \    `GGSCI (standbyserver) > STOP EXTRACT PHREMD3`\n3.  After verifying there\
    \ are no more records to process, stop the Replicat on the primary database as\
    \ shown in the following example: `GGSCI (primaryserver) > LAG REPLICAT RHREMD3`\n\
    \    `Sending GETLAG request to REPLICAT RHREMD3 ...`\n    `Last record lag: 6\
    \ seconds.`\n    `At EOF, no more records to process.`\n    `GGSCI (primaryserver)\
    \ > STOP REPLICAT RHREMD3`\n\nNow that the replication from the standby to the\
    \ primary is complete and stopped, you can proceed with restarting the original\
    \ replication from the primary database to the standby database in part 5, as\
    \ shown in [Figure 12-8](#Chapter12.html#fig_12_8).\n\n![images](images/1208.jpg)\n\
    \n***Figure 12-8.** Disaster recovery planned switchover, part 5*\n\nThe steps\
    \ for Part 5, as shown in [Figure 12-8](#Chapter12.html#fig_12_8), are as follows:\n\
    \n1.  To being capturing changes in preparation for the application switchover\
    \ back to the primary database, alter the Local Extract for the primary database\
    \ to begin capturing changes beginning *now* and then start the Extract as follows:\
    \ `GGSCI (primaryserver) > ALTER EXTRACT LHREMD2, BEGIN NOW`\n    `GGSCI (primaryserver)\
    \ > START EXTRACT LHREMD2`\n2.  Prepare the primary database for the application\
    \ and start the application connected to the primary database. In preparation,\
    \ you may need to grant some SQL permissions to your application users. Also remember\
    \ to enable any triggers or cascade delete constraints you may have stopped while\
    \ the primary database was the replication target.\n3.  Start the data-pump Extract\
    \ on the primary database as shown in the following example: `GGSCI (primaryserver)\
    \ > START EXTRACT PHREMD2`\n4.  Start the the Replicat on the standby database\
    \ as shown in the following example: `GGSCI (standbyserver) > START REPLICAT RHREMD2`\n\
    \nNow you have completed Part 5 of your replication switchover process and the\
    \ databases are back to their original configuration. As a result, you have minimized\
