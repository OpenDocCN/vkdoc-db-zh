- fmt: '### Tuning Methodology


    When tuning GoldenGate, it''s important for you to follow a standard performance
    and tuning methodology. Otherwise, you may not know when there is a performance
    problem, or you may find yourself fixing the wrong problem. This chapter suggests
    a standard methodology, but it''s not important that you follow it precisely.
    You can create your own methodology or adapt this methodology to work in your
    particular environment. The most important consideration is that you do follow
    a structured approach that has requirements defined up front and measurements
    and verification specified afterward. Using a structured approach helps ensure
    that you can respond properly to performance issues and meet the expectations
    of your users.


    Here are the suggested steps in the GoldenGate performance and tuning methodology.
    Steps 1 and 2 should be completed early in the project:

    1.  Define the performance requirements.

    2.  Create a performance baseline.


    Steps 3 through 6 should be done as tuning issues are identified:

    3.  Evaluate current performance.

    4.  Determine the problem.

    5.  Design and implement a solution.

    6.  Repeat steps 3 thru 5 as needed.


    If you''ve ever performed database performance and tuning, these may look like
    familiar steps. But each step has specific considerations in a GoldenGate replication
    environment. This chapter explains and expands on the steps as you move along.
    Now, let''s examine the first step in the methodology: defining the performance
    requirements.


    ### Defining the Performance Requirements


    The key to successfully meeting the performance expectations of your business
    users is to properly define the performance requirements. Without performance
    requirements, you never know if you''ve successfully met the users'' expectations.
    When you have the requirements defined and agreed on, you can focus your tuning
    efforts on areas that don''t conform to the requirements.


    You should define the GoldenGate replication performance requirements early in
    the project, before GoldenGate is even installed and configured. You do this because
    these requirements can have a significant impact on how GoldenGate is set up and
    configured.


    The most important performance requirement for replication is the amount of lag
    the application can tolerate. As you gather your replication requirements, you
    should think of lag in terms of the overall delay in replicating from the source
    to the target. Later, you''ll break the lag down into specific Extract and Replicat
    lag for the GoldenGate environment.


    In [Chapter 4](#Chapter04.html#ch4), you looked at some of the requirements that
    drive your replication technical design. The following two areas relate specifically
    to performance and tuning of replication:


    > *Data currency*: How quickly and how often does the data need to be updated?
    Can any lag in the data replication be tolerated? If no lag can be tolerated and
    there is a high volume of changes, you may need to devote more time in the project
    to designing and tuning the replication to avoid any lag. Keep in mind that often,
    reporting systems can tolerate lag and the target data doesn''t need to be completely
    up to date with the source.

    >

    > *Data volume*: How much data needs to be replicated? How often is it updated?
    You may be able to examine the existing database transaction log files to determine
    the amount of data change that is occurring in the source database. The data-change
    volume impacts the network bandwidth requirements between the source and target
    and the amount of disk space required for trail files.


    After you''ve worked with your business users and stakeholders to answer these
    questions, you can begin to formulate your replication performance requirements.
    It''s best to keep the requirements simple and easy to understand. Let''s look
    at a few examples of performance requirements.


    The first example is for an important high-volume Online Transaction Processing
    (OLTP) database involved in an active-active replication topology. It''s critical
    to the business that the source and target databases be kept nearly synchronized
    all the time. After working with the business users, you''ve agreed on the following
    performance requirement:


    > *The replication lag must be less than 1 minute at least 80 percent of the time.
    If the replication lag exceeds 1 minute, a warning should be issued and the replication
    should be closely monitored. If the replication lag exceeds 5 minutes, a critical
    alert should be issued and the problem needs to be addressed immediately.*


    Let''s look at another example of replication that isn''t as critical. In this
    example, you''re running replication from an OLTP database to a reporting database.
    The reporting database is running on another highly utilized server with only
    limited server resources available to make the replication perform properly. The
    reporting is used for offline analytical purposes, and it isn''t as critical to
    the business that the data is kept up to date. In this case, your performance
    requirement might look like this:


    > *The replication lag from the OLTP database to the reporting database must be
    less than 1 hour at least 80 percent of the time. If the replication lag exceeds
    8 hours, a warning should be issued. If the replication lag exceeds 24 hours,
    a critical alert should be issued and the problem needs to be addressed within
    the following day.*


    You can see that each of these replication scenarios has very different performance
    requirements. If you don''t properly define the requirements up front, you may
    spend all your time tuning the reporting replication when the active-active replication
    is really the most critical. Next, let''s look at creating a performance baseline.'
