  trans: "\n#### 在 Windows 上安装 GoldenGate\n\n以下是在 Windows 系统上完整安装 GoldenGate 的逐步指南。流程从下载软件开始，接着解压下载文件，然后进入正式安装环节。\n\
    \n1.  下载适用于 Windows x86 平台的 Oracle 11g GoldenGate 软件。\n2.  从 [`http://microsoft.com`](http://microsoft.com)\
    \ 下载并安装 Microsoft Visual C++ 2005 SP1 可再发行组件包，如 `图 2-11` 所示。\n\n    ![images](img/0211.jpg)\n\
    \n    **图 2-11.** Windows 平台上 Oracle GoldenGate 安装所需的 Microsoft Visual C++包\n\n\
    \    下载 Microsoft Visual C++包后，保存文件，然后点击 `vcredist_x86.exe` 文件，如 `图 2-12` 所示。\n\
    \n    ![images](img/0212.jpg)\n\n    **图 2-12.** 安装 Microsoft Visual C++库\n\n\
    3.  为 Oracle GoldenGate 软件创建两个新目录，一个作为源目录，另一个作为目标目录：\n    ```\n    mkdir ggs_src\n\
    \    mkdir ggs_trgt\n    ```\n4.  使用 Winzip 或您喜欢的解压工具，将 Oracle 11g GoldenGate\
    \ 软件解压到源数据库服务器上的 `C:\\ggs_src` 目录和目标数据库服务器上的 `C:\\ggs_trgt` 目录。\n5.  在源和目标系统上执行命令\
    \ `ggsci`：\n    ```\n    ggsci\n    ```\n6.  在源和目标系统上执行命令 `CREATE SUBDIRS`：\n\
    \    ```\n    create subdirs\n    ```\n7.  最后，输入命令 `EXIT` 以离开 `ggsci` 环境，完成安装过程。在源和目标机器上都执行此操作。\n\
    \n#### 在 Linux 和 UNIX 上安装 GoldenGate 11g\n\n在开始在 Linux 和 UNIX 平台上为 Oracle GoldenGate\
    \ 进行安装之前，我们建议您对 Linux 和 UNIX 命令有基本的了解。基本的语法以及诸如 `cp`、`mv`、`tar` 和 `mkdir` 等复制和归档命令的知识对于在此环境中操作至关重要。Oracle\
    \ ACE Director Arup Nanda 为 Linux 和 UNIX 新手撰写了一系列关于 Oracle Linux 命令掌握的出色在线教程，可在\
    \ OTN 上获取：[`www.oracle.com/technetwork/articles/linux/index.html`](http://www.oracle.com/technetwork/articles/linux/index.html)。\n\
    \n![images](img/square.jpg) **注意** 确保所有系统、网络和数据库要求都已满足。\n\n您需要使用 `tar` 命令解压适用于\
    \ Linux 和 UNIX 平台的文件。解压文件后，如之前在 Windows 上所做的那样，运行 `ggsci` 命令 `CREATE SUBDIRS`。\n\
    \n#### Linux 和 UNIX 上 Oracle 与 GoldenGate 的环境设置\n\n由于 Linux 和 UNIX 平台使用环境变量来配置软件，您必须设置\
    \ `ORACLE_HOME` 和 `ORACLE_SID` 环境变量。对于包含 Extract 和 Replicat 的多个进程组，您需要通过添加 `SETENV`\
    \ 来配置参数文件，如下方的 extract 和 replicat 参数文件语法所示。\n\n```\nSETENV (ORACLE_HOME=\"<ORACLE_HOME\
    \ directory path>\")\nSETENV (ORACLE_SID=\"<ORACLE_SID>\")\n```\n\n如果您的系统上安装了多个\
    \ Oracle 数据库实例，并且运行了 Extract 和 Replicat 进程，则需要在每个 Extract 和 Replicat 进程组的参数文件中都添加一条\
    \ `SETENV` 语句。\n\n以下是一个 Extract 参数文件示例：\n\n```\nEXTRACT ext1\nSETENV (ORACLE_HOME=\"\
    /oracle/ora11g/product\")\nSETENV (ORACLE_SID=\"ora11src\")\n\nUSERID ggs, PASSWORD\
    \ ggs\nRMTHOST sdtarget\nRMTTRAIL /d1/oracle/ggs/dirdat/rt\nTABLE scott.emp;\n\
    ```\n\n对于拥有多个 Oracle 数据库实例的 Windows 服务器，您可以通过将这些设置添加到 Windows 注册表来设置 `ORACLE_HOME`\
    \ 和 `ORACLE_SID` 环境变量。具体操作路径为：打开“我的电脑” ![images](img/U001.jpg) “设置” ![images](img/U001.jpg)\
    \ “属性” ![images](img/U001.jpg) “高级”选项卡，然后选择“环境变量”和“系统变量”。\n\n#### GoldenGate 与\
    \ Oracle RAC 注意事项\n\nOracle RAC 已通过 Oracle 认证，支持 GoldenGate 软件。但是，在为 Oracle RAC\
    \ 环境安装 GoldenGate 时，您需要记住以下几点：\n\n*   所有 GoldenGate 软件二进制文件和可执行文件、轨迹文件和日志文件都应放在所有集群节点可访问的共享存储上。\n\
    *   使用 GoldenGate 软件的所有 RAC 节点的系统时钟必须同步。您可以设置网络时间协议（NTP）以确保集群节点保持同步。此外，您可以在 Extract\
    \ 和 Replicat 参数文件中使用 GoldenGate 的 `IOLATENCY` 选项配合 `THREADOPTIONS` 参数。\n\n####\
    \ 在 Windows 上为 Microsoft SQL Server 安装 GoldenGate\n\n为 Microsoft SQL Server 安装\
    \ Oracle GoldenGate 需要额外的配置设置，以确保其成功运行。Oracle GoldenGate 支持以下版本的 Microsoft SQL\
    \ Server：\n\n*   SQL Server 2000\n*   SQL Server 2005\n*   SQL Server 2008\n\n\
    要验证您的特定 Windows 平台和 MS SQL Server 版本是否受支持，您可以在线查看 My Oracle Support ([`http://support.oracle.com`](http://support.oracle.com))\
    \ 上的认证矩阵。\n\n非 Oracle 平台的软件可从 E-Delivery 站点 [`http://edelivery.oracle.com`](http://edelivery.oracle.com)\
    \ 在线获取。\n\n既然我们已经讨论了 Oracle RDBMS 与 GoldenGate 的安装过程，接下来我们将讨论如何为其他数据库平台准备 Oracle\
    \ GoldenGate。需要记住的一点是，对于其他 RDBMS 平台（如 Teradata 和 Sybase），Oracle GoldenGate 软件的安装步骤是相同的。然而，细微的差别在于为这些环境准备\
    \ Oracle GoldenGate。\n\n#### 在 Windows 和 UNIX 上为 Teradata 安装 GoldenGate\n\n遗憾的是，默认情况下，Teradata\
    \ RDBMS 平台内没有内置的复制功能。因此，Teradata 需要 GoldenGate 来执行复制活动。Teradata 通过 Teradata 访问模块（TAM）和源\
    \ Teradata 服务器上的 Teradata 变更数据捕获（CDC）与 Oracle GoldenGate 通信。Oracle GoldenGate\
    \ 作为复制服务器运行，并从 Teradata CDC 源服务器接收事务。\n\nOracle Teradata 有许多在安装 Oracle GoldenGate\
    \ 之前必须满足的要求。在为 Teradata 安装 Oracle GoldenGate 之前，必须配置并准备好以下项目：\n\n*   变更数据捕获（CDC）\n\
    *   复制组\n*   Teradata 访问模块（TAM）\n*   中继服务网关（RSG）\n\n为 Teradata 设置和配置这些任务超出了本章的范围。有关如何在\
    \ Teradata 上配置这些功能的详细信息，请参阅 Teradata 文档，可在线获取：[`www.info.teradata.com/`](http://www.info.teradata.com/)。\n\
    \n##### Teradata 与 Oracle GoldenGate 的系统要求\n\nOracle GoldenGate 在设置与 Teradata\
    \ 配合使用时有独特的要求。Oracle GoldenGate 复制服务器必须与源和目标 Teradata 系统（如果使用）的设置一起配置。\n\n######\
    \ Oracle GoldenGate 复制服务器\n\n在为 Teradata 部署 Oracle GoldenGate 时，请务必牢记以下几点：\n\n\
    *   将 Oracle 11g GoldenGate 安装在单独的物理服务器上。不要安装在任何 Teradata 服务器上。\n*   Teradata\
    \ 访问模块（TAM）必须安装在 Oracle GoldenGate 复制服务器上，位于 Oracle GoldenGate 安装目录的根目录下。TAM 通过一个称为供应商访问模块（VAM）的\
    \ Oracle GoldenGate API 进行通信。TAM 配置的详细信息在 Teradata 复制服务文档中提供，可在线获取：[`www.info.teradata.com/`](http://www.info.teradata.com/)。\n"
- fmt: '# Disk Requirements


    Teradata for Oracle GoldenGate has the following disk space requirements:


    *   50–150MB of space plus 40 MB of additional disk space for the Oracle GoldenGate
    binaries and directory structures for the Oracle GoldenGate software.


    Additional guidelines for Teradata and Oracle GoldenGate can be found in the Oracle®
    GoldenGate Teradata Installation and Setup Guide 11g Release 1 (11.1.1) available
    online at [`http://download.oracle.com/docs/cd/E18101_01/index.htm`](http://download.oracle.com/docs/cd/E18101_01/index.htm).


    ## Installing Goldengate for Sybase on Windows and UNIX


    Like all database platforms, Sybase presents unique requirements for installation
    of the Oracle GoldenGate software. Disk space requirements for Sybase with Oracle
    GoldenGate are the same as those for Oracle with GoldenGate. In addition to the
    disk space storage requirements, you will need to grant operating system–level
    privileges based on UNIX or Windows permissions so that the Sybase schema accounts
    and Oracle GoldenGate operating system–level accounts can read and write at the
    database and operating system level between source and target systems involved
    with the Sybase and Oracle GoldenGate installation. Otherwise, errors will occur
    when the replication processes attempt to perform their functions. The following
    database requirements must be completed as part of the Sybase and Oracle GoldenGate
    installation process:


    *   Configure `DSQUERY` variable in Sybase source database.

    *   Quiesce the Sybase RepServer before starting GoldenGate Extract process. You
    need to do so because Oracle GoldenGate Extract process uses Sybase LTM to read
    from the Sybase transaction log.

    *   Grant permission to Oracle GoldenGate Extract process to allow the ability
    to manage secondary log truncation point.

    *   The Sybase source database must be an active server. It cannot be in warm
    standby mode.


    Further details with respect to the Sybase and GoldenGate installation procedures
    are available in the Oracle® GoldenGate Sybase Installation and Setup Guide 11g
    Release 1 (11.1.1) available online at [`http://download.oracle.com/docs/cd/E18101_01/index.htm`](http://download.oracle.com/docs/cd/E18101_01/index.htm).


    ## Installing GoldenGate for IBM DB2 UDB on Windows and UNIX


    We will focus on the database requirements for the Oracle 11g GoldenGate installation
    with IBM DB2 UDB database with Windows and UNIX platforms. Disk space storage
    requirements are the same as for general Oracle GoldenGate installation, as already
    discussed. In addition, you will need to grant read and write permissions at both
    the database and operating system–level for the Oracle GoldenGate user accounts
    on source and target DB2 systems with GoldenGate. The following items must be
    configured as part of the DB2 and GoldenGate installation:


    *   Read and write permissions at database and operating system–level to access
    the `DB2READLOG` functions so that the Oracle GoldenGate Extract process can read
    the DB2 UDB transaction logs.

    *   IBM DB2 UDB command-line interface (CLI) must be available on the target database
    environment because the Oracle GoldenGate Replicat process uses this CLI to apply
    data to the target system.

    *   Both IBM DB2 UDB Control Center graphical user interface (GUI) and command-line
    interface (CLI) are highly recommended to be installed and available on source
    and target DB2 systems.


    After you have verified that the minimum disk space is available and that you
    have installed the required IBM DB2 UDB system tools, you need to grant privileges
    to the Oracle GoldenGate user. You will need to grant the `SYSADM` privilege or
    the `DBADM` database-level access to the Oracle GoldenGate database schema account
    and operating system–level account.


    ![images](images/square.jpg) Note For IBM DB2 UDB you can grant permissions by
    executing the command `GRANT DBADM ON DATABASE TO USER <ggs_user>` or by using
    the IBM DB2 UDB Control Center utility.


    Grant the following privileges to the Oracle GoldenGate schema database user within
    IBM DB2 UDB:


    *   Local CONNECT to the target IBM DB2 UDB database environment

    *   SELECT on the IBM DB2 UDB system catalog views

    *   SELECT, INSERT, UPDATE, and DELETE on the target IBM DB2 UDB tables


    Additional information regarding the IBM DB2 UDB installation with GoldenGate
    is available in the Oracle GoldenGate DB2 LUW Installation and Setup Guide 11g
    Release 1 (11.1.1) online at: [`http://download.oracle.com/docs/cd/E18101_01/index.htm`](http://download.oracle.com/docs/cd/E18101_01/index.htm).
    You can also find the installation guides for other DB2 platforms such as IBM
    DB2 z/OS.


    ## Installing Oracle GoldenGate Director 11g


    Oracle GoldenGate Director is an optional software module that provides an end-to-end
    management and administration console for Oracle GoldenGate environments. Director
    uses a rich graphical interface similar to that found in network monitoring tools
    such as Tivoli and HP OpenView as well as Oracle Enterprise Manager (OEM). Director
    allows you to start and stop GoldenGate processes and to execute custom scripts
    as well. The installation procedure is quite a bit different for this product
    in contrast to that used for the base Oracle GoldenGate transaction software.
    Previous releases of the Oracle GoldenGate Director software had a different architecture
    and software installation process. We will discuss only the current release of
    the Oracle GoldenGate Director software in this chapter.


    Further details regarding how to configure Oracle GoldenGate Director will be
    discussed in upcoming chapters. In addition, we recommend that you consult the
    Oracle GoldenGate Director Administrator''s Guide 11g Release 1 (11.1.1) available
    online at [`http://download.oracle.com/docs/cd/E18101_01/doc.1111/e18482.pdf`](http://download.oracle.com/docs/cd/E18101_01/doc.1111/e18482.pdf).


    The installation process for Oracle 11g GoldenGate Director includes the following
    components:


    *   Oracle 11g Director Server Application

    *   Monitor Agent

    *   Director Client

    *   Director Administrator Client

    *   Oracle GoldenGate instances that will be monitored


    The first step prior to performing the actual installation is to review the system
    requirements for the Oracle 11g GoldenGate Director software. Let''s take a look
    at the installation requirements for the Oracle GoldenGate Director Server.


    ### System Requirements


    The following system configurations are necessary for the Oracle 11g GoldenGate
    Director installation to be performed successfully:


    *   At least 1GB of RAM (more memory is always better).

    *   Minimum of 1–1.5 GB of disk space allocated for Director software.

    *   Dedicated port for Oracle GoldenGate Director Server. The default port used
    is 7001.

    *   At least 200 MB of disk space in the repository database for the Oracle GoldenGate
    Director Server to be used for schema objects.


    Next, you need to ensure that the particular platform used with Director is a
    supported configuration. Following are the supported platforms.


    #### Supported Platforms


    Oracle GoldenGate Director is available and supported on the following platforms:


    *   UNIX: Solaris, IBM AIX, HP-UX

    *   Linux: RedHat x86/x64, Oracle Enterprise Linux (OEL)

    *   Windows x86/x64


    For the Oracle GoldenGate Director Server, you will also need to verify the following
    software has been installed and available for the Oracle GoldenGate Director Server
    before you perform the installation.'
