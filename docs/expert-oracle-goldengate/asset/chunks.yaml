  trans: '

    ## 创建性能基线


    您的环境上线后，应尽快捕获复制环境性能的 `baseline`（基线）。`baseline` 本质上是一组在复制正常运行条件下捕获的性能指标。所谓正常条件，是指您不希望在任何特殊或异常处理运行期间，或者存在任何现有性能问题时收集基线指标。您不希望在性能峰值发生时捕获基线。


    捕获基线后，您可以使用基线指标进行比较，以识别可能的性能问题。您还应定期捕获新的基线，尤其是在环境发生重大变化时。例如，如果为数据库集群添加了新服务器，您应捕获新的基线指标，因为旧的指标已不再有效。


    让我们看一下您应为性能基线收集的指标示例：


    > *服务器统计信息*：对于运行复制的服务器，您应收集 CPU 利用率、磁盘利用率和内存使用情况。收集这些统计信息的方法因平台而异。例如，在 Linux 上，您可以使用
    `SAR` 或 `IOSTAT`，在 Windows 上，您可以使用 `perfmon`。您甚至可能有自己定制的工具来收集这些指标。

    >

    > *抽取和复制进程统计信息*：对于每个抽取和复制进程，您应捕获以下指标：

    >

    > *   *每个处理组的名称和状态：*您可以捕获 GoldenGate 软件命令接口 (GGSCI) 的 `info *` 命令的输出。

    > *   *处理统计信息：*您可以使用 `stats` 命令，并通过诸如 `STATS RHREMD1, TOTALSONLY *, REPORTRATE
    MIN` 之类的命令获取抽取和复制进程的聚合处理速率。例如，您可以使用此命令获取复制进程每分钟处理的总操作数。

    > *   *处理速率：*第 5 章 展示了如何向抽取和复制进程添加报告参数以自动报告性能统计信息。您现在可以查看每个抽取和复制进程的报告文件并记录统计信息。从报告文件中，您可以记录处理的记录数、速率和增量。

    > *   *处理延迟：*您可以从 `info` 命令获取近似延迟，也可以通过为每个抽取和复制进程运行 `lag` 命令获取具体延迟。

    > *   *服务器进程统计信息：*您可以收集专门针对抽取和复制进程的服务器统计信息，例如内存和 CPU 使用率。例如，在 Linux 上，如果 `top`
    命令可用，您可以使用类似 `top –U gger` 的命令来仅监控 GoldenGate 的 gger 操作系统用户进程。

    >

    > *数据库性能统计信息*：作为基线的一部分，您应包含关于源和目标数据库使用情况的统计报告，例如 Oracle AWR 报告或 SQL Server 仪表板报告。这使您能够了解在正常基线期间发生了多少数据库活动。

    >

    > *网络性能统计信息*：您应捕获一些统计信息以表明网络吞吐量和利用率。您可以使用诸如 Windows 系统监视器或 Linux 上的 `netstat`
    命令等工具来收集这些统计信息。


    当您收集到一组可靠的基线统计信息后，您就具备了应对可能出现的任何性能问题的充分准备。别忘了定期更新这些基线统计信息。


    您接下来可能会问的问题是，我应该收集哪些指标，收集多长时间？本节提供了您应在性能基线中收集哪些指标的指导原则。请记住，这些建议仅供参考，您应该收集任何可能影响您特定复制环境性能的指标。至少收集一小时的指标。如果这对于您的特定环境有意义，您可以收集一周甚至一个月的指标。您还可以捕获特殊情况的指标。例如，您可能有一些月末处理导致复制量增加。当您认为此活动运行正常时，可以为其捕获基线，然后将该基线用于与后续月份进行比较。


    假设您很好地完成了基线统计信息的收集，几周后，您收到一份报告称复制运行缓慢。这将促使您进入流程的下一步：评估当前性能。


    ## 评估当前性能


    当报告了潜在的 GoldenGate 复制性能问题后，流程的下一步是根据您先前记录的基线评估当前性能。您应遵循与在正常条件下收集 `baseline`（基线）性能统计信息完全相同的步骤，在性能问题条件下收集
    `current`（当前）统计信息。


    让我们看一下为 HR 抽取和复制进程收集的一些基线和当前处理统计信息示例，如表 7-1 所示。


    `表 7-1. 抽取和复制进程性能统计信息`


    | **统计信息** | **基线** | **当前** |

    | --- | --- | --- |

    | 源 CPU 利用率 % | 12 | 15 |

    | 目标 CPU 利用率 % | 17 | 73 |

    | 源磁盘读取/秒 | 2.1 | 2.9 |

    | 源磁盘写入/秒 | 10.1 | 10.6 |

    | 源磁盘服务时间 | 3.4 | 3.2 |

    | 目标磁盘读取/秒 | 2.1 | 2.8 |

    | 目标磁盘写入/秒 | 10.1 | 10.9 |

    | 目标磁盘服务时间 | 3.4 | 3.2 |

    | 本地抽取 LHREMD1 状态 | 运行中 | 运行中 |

    | 数据泵 PHREMD1 状态 | 运行中 | 运行中 |

    | 复制 RHREMD1 状态 | 运行中 | 运行中 |

    | 本地抽取 LHREMD1 速率/增量 | 20/21 | 20/19 |

    | 数据泵 PHREMD1 速率/增量 | 20/21 | 20/19 |

    | 复制 RHREMD1 速率/增量 | 15/16 | 9/6 |

    | 复制 RHREMD1 操作数/分钟 | 1948 | 1232 |

    | 本地抽取 LHREMD1 延迟秒数 | 12 | 11 |

    | 数据泵 PHREMD1 延迟秒数 | 8 | 9 |

    | 复制 RHREMD1 延迟秒数 | 15 | 127 |


    当您将基线统计信息与当前性能统计信息进行比较时，您可能会注意到一些重大差异。它们可能表明存在性能问题，但您应该谨慎，不要急于下结论。让我们继续进行调优流程的下一步以确定问题。

    '
- fmt: "### Determining the Problem\n\nAfter you've collected the current performance\
    \ statistics, you can move on to try to determine the actual performance problem.\
    \ Even though you're now armed with plenty of statistics, there are still many\
    \ unanswered questions. Let's look at some of the required tasks when going through\
    \ your analysis to determine the problem:\n\n1.  Analyze the baseline statistics\
    \ compared with the current statistics. Determine if there are significant differences.\
    \ In the example, you can see that the CPU utilization on the target server is\
    \ significantly higher. You can also see that the Replicat processing rate has\
    \ dropped and the lag has increased significantly. This points you in the direction\
    \ of a possible problem with the Replicat, but it could be something on the target\
    \ database or the server or even something else.\n2.  Conduct a short meeting\
    \ with the stakeholders to determine their perspective on what the current performance\
    \ problems are and establish their expectations for tuning results. It's important\
    \ to understand what they believe is their most significant problem. You can also\
    \ share the initial findings from your comparison of baseline to current performance\
    \ statistics. Here are some examples of questions you should ask during the meeting:\n\
    \n    *   What are the most significant performance problems?\n        *   What\
    \ business processes are being impacted?\n        *   What time of day does the\
    \ performance problem occur, or is it constant?\n        *   Does the performance\
    \ problem affect only one user or all users?\n        *   Is the performance problem\
    \ related to any specific database table or all tables?\n        *   Is the performance\
    \ problem the result of increased workload or a system change?\n        *   Can\
    \ the problem be consistently reproduced in a testing environment?\n\nYou may\
    \ be surprised at the answers to these questions. Perhaps the stakeholders consider\
    \ the replication slowdown a low priority. Maybe they're only seeing a slowdown\
    \ at certain times of the day. Or maybe the problem is the result of a system\
    \ change or new business volume. In any case, it's important to get the stakeholders'\
    \ perspective and expectations. You should document responses to the performance\
    \ questions and obtain agreement from the stakeholders on the scope, impact, and\
    \ expectations of the replication tuning effort.\n\n3.  Drill down on the GoldenGate\
    \ processes that appear to be running slowly. View the GoldenGate reports in the\
    \ `dirrpt` directory, and compare the processing rates to try to determine when\
    \ the problem began. Look at the `rate` and `delta` values and see when they started\
    \ to decrease, as shown in the following example from the Replicat report:\n\n\
    \    ```\n    RHREMD1.rpt:      98650000 records processed as of 2011-03-09 19:27:48\
    \ (rate 4728,delta 3969)\n    RHREMD1.rpt:      98660000 records processed as\
    \ of 2011-03-09 19:28:50 (rate 4728,delta 4439)\n    RHREMD1.rpt:      98670000\
    \ records processed as of 2011-03-09 19:29:53 (rate 3685,delta 4183)\n    RHREMD1.rpt:\
    \      98680000 records processed as of 2011-03-09 19:30:55 (rate 3247,delta 3366)\n\
    \    RHREMD1.rpt:      98690000 records processed as of 2011-03-09 19:31:57 (rate\
    \ 2327,delta 2630)\n    RHREMD1.rpt:      98700000 records processed as of 2011-03-09\
    \ 19:32:00 (rate 1727,delta 2257)\n    RHREMD1.rpt:      98710000 records processed\
    \ as of 2011-03-09 19:33:02 (rate 1135,delta 1736)\n    RHREMD1.rpt:      98720000\
    \ records processed as of 2011-03-09 19:34:04 (rate 768,delta 1125)\n    RHREMD1.rpt:\
    \      98730000 records processed as of 2011-03-09 19:35:06 (rate 436,delta 923)\n\
    \    ```\n\nIn the example, you're reporting on the Replicat processing rate every\
    \ 10,000 records. You can see from the Replicat report listing that the processing\
    \ rate began decreasing at 19:28 and continued to decrease.\n\n4.  Review the\
    \ GoldenGate `ggserr.log` file, and look for any errors or warnings. Sometimes\
    \ a warning message may be triggered that you may not be aware could be negatively\
    \ impacting performance.\n5.  Review the server system logs for any error messages\
    \ that could be contributing to the slow performance, such as a bad disk drive.\n\
    6.  Review the built-in database performance reports (such as AWR for Oracle or\
    \ the SQL Server dashboard), and compare them to the reports from the baseline\
    \ period. See if there are any significant changes that could be causing poor\
    \ performance.\n\nWhen you've finished analyzing the statistics, stakeholder communication,\
    \ and information about the performance problem, you should have a pretty good\
    \ idea of what is causing the problem. You may not know the exact solution yet,\
    \ but you should at least have some clear ideas to try to improve the performance.\
    \ The next step is to design and implement a solution.\n\n### Designing and Implementing\
    \ a Solution\n\nNow you're at the point where you can move forward to design and\
    \ implement a solution to tune the replication. At this point, you may have several\
    \ possible solutions to the problem. You need to go through some analysis to determine\
    \ which solution to implement first. One solution may be easier and have less\
    \ impact to implement, so you may try it first to see if it works or rule it out.\
    \ The important thing is to implement only one tuning change at a time and then\
    \ measure the impact. That way, you have a better indication that your solution\
    \ actually solved the problem and improved performance. If you implement multiple\
    \ solutions at once, it may be difficult to determine which one fixed the problem\
    \ (or made it worse).\n\nThe following sections go through some different tuning\
    \ strategies for Extracts and Replicats. Of course, these aren't the only strategies,\
    \ and you may discover your own based on your particular environment and experiences.\
    \ Because the scope of this book is GoldenGate, it only covers tuning of components\
    \ such as the database and servers as they relate to GoldenGate replication; but\
    \ it's important to rule out general performance issues with these components\
    \ before tuning GoldenGate.\n\n#### Using Parallel Extracts and Replicats\n\n\
    Typically, most tuning is focused on the Replicats and not the Extracts. The reason\
    \ is that the Extracts are usually reading from the database transaction log,\
    \ whereas the Replicats are executing single-threaded SQL commands to change data\
    \ in the database on the target. There may be situations, however, when an Extract\
    \ needs some tuning. For example, in certain situations an Extract may need to\
    \ fetch data from the database if there is a Large Object (LOB) column or if a\
    \ column isn't in the transaction log. In those cases, you may want to isolate\
    \ those tables into their own Extract group.\n\nOne common strategy for tuning\
    \ GoldenGate is to create multiple parallel Extract or Replicat processing groups\
    \ to balance the workload. GoldenGate supports up to 300 processing groups per\
    \ GoldenGate Manager. As an example, let's split the data-pump Extract and Replicat\
    \ for the HR schema. Before you get started, as a reminder, [Figure 7-1](#Chapter07.html#fig_7_1)\
    \ shows the basic replication configuration with no parallel groups.\n\n![images](images/0701.jpg)\n\
    \n**Figure 7-1.** One-way replication without parallel Extract or Replicat groups\n\
    \nNow let's look at the same replication with two parallel data-pump Extract and\
    \ Replicat groups, as shown in [Figure 7-2](#Chapter07.html#fig_7_2).\n\n![images](images/0702.jpg)\n\
    \n**Figure 7-2.** One-way replication with parallel data-pump Extract and Replicat\
    \ groups\n\nLet's look at a specific example of how to implement parallel Extracts\
    \ and Replicats on the HR schema."
