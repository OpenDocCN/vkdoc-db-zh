    \ the amount of disk space required for trail files.\n> \n> *Data requirements*:\
    \ You should understand any unique or special data requirements so they can be\
    \ handled properly in GoldenGate. For example, if there are triggers, they may\
    \ need to be disabled in the target database. Sequences need special parameters\
    \ added if they need to be replicated. Certain data types may need special handling\
    \ or may not be supported. For example, in GoldenGate 11, data types such as BFILE\
    \ and ANYDATA aren't supported. Other data types may be supported but with certain\
    \ limitations. *Be sure to check the GoldenGate product documentation for a list\
    \ of data types supported.*\n> \n> *Security requirements:* How much security\
    \ is required for the replication? For example, is it necessary to encrypt the\
    \ data that GoldenGate is replicating? GoldenGate can encrypt both the data stored\
    \ in trail files as well as the data being sent from the source to the target.\
    \ Also, is the data in the database encrypted? For example, Oracle can encrypt\
    \ database data using a feature called Transparent Data Encryption (TDE). If the\
    \ database is using TDE, GoldenGate needs special parameters defined to unencrypt\
    \ the data for replication.\n> \n> *Network requirements:* Describe the network\
    \ between the source and the target? Are there any firewalls that need to be opened\
    \ for the replication? What is the distance between the source and target? How\
    \ much bandwidth is required to handle the data volume, and how much is available?\n\
    \n[Table 4-1](#Chapter04.html#tab_4_1) describes the environment used for discussion\
    \ purposes in this chapter. Noted in parentheses are some settings for Windows\
    \ with a SQL Server database environment. Remember, though, the sources and targets\
    \ can be any platform and database supported by GoldenGate, as reviewed in [Chapter\
    \ 3](#Chapter03.html#ch3). You may want to set up a table like this for your replication\
    \ projects.\n\n***Table 4-1.** Sample GoldenGate Replication Environment*\n\n\
    | **Configuration Item** | **Value** |\n| --- | --- |\n| GoldenGate software location\
    \ | `/gger/ggs` (or `c:\\gger\\ggs`) |\n| GoldenGate OS user ID/password | gguser/userpw\
    \ |\n| GoldenGate database user ID/password | gger/userpw |\n| Source server name\
    \ | sourceserver |\n| Source manager port | 7840 |\n| Source server OS/release\
    \ | Linux 5.3 or Windows |\n| Source database name | SourceDB |\n| Source database\
    \ vendor/release | Oracle 11.1 (or SQL Server 2008) |\n| Source schema | HR |\n\
    | Target server name | targetserver |\n| Target manager port | 7840 |\n| Target\
    \ server OS/release | Linux 5.3 (or Windows) |\n| Target database vendor/release\
    \ | Oracle 11.1 (or SQL Server 2008) |\n| Target database name | TargetDB |\n\
    | Target schema | HR |\n| Local extract name | LHREMD1 |\n| Data pump name | PHREMD1\
    \ |\n| Replicat name | RHREMD1 |\n| Local trail file | `l1` |\n| Remote trail\
    \ file | `l2` |\n\nThe source and target schema used in the examples is the Human\
    \ Resources or HR schema from the Oracle Database Sample Schemas. Listed next\
    \ is a description of the Employees table from the HR schema, which is used in\
    \ the examples:\n\n`Table EMPLOYEES`\n` Name                                      Null?    Type`\n\
    ` ----------------------------------------- -------- ----------------------------`\n\
    ` EMPLOYEE_ID  (PK)                         NOT NULL NUMBER(6)`\n` FIRST_NAME                                         VARCHAR2(20)`\n\
    ` LAST_NAME                                 NOT NULL VARCHAR2(25)`\n` EMAIL                                     NOT\
    \ NULL VARCHAR2(25)`\n` PHONE_NUMBER                                       VARCHAR2(20)`\n\
    ` HIRE_DATE                                 NOT NULL DATE`\n` JOB_ID                                    NOT\
    \ NULL VARCHAR2(10)`\n` SALARY                                             NUMBER(8,2)`\n\
    ` COMMISSION_PCT                                     NUMBER(2,2)`\n` MANAGER_ID                                         NUMBER(6)`\n\
    ` DEPARTMENT_ID                                      NUMBER(4)`\n\n#### One-Way\
    \ Replication Topology\n\nThe topology covered in this chapter is one-way replication,\
    \ as shown in [Figure 4-1](#Chapter04.html#fig_4_1). You may remember from [Chapter\
    \ 3](#Chapter03.html#ch3) that one-way replication is the simplest topology and\
    \ is often used for reporting or query-offloading purposes. Data is replicated\
    \ from a single source database to a single target database in only one direction.\
    \ Changes to database data are only made at the source database and are then replicated\
    \ to the target database.\n\n![images](images/0401.jpg)\n\n***Figure 4-1.** One-way\
    \ replication*"
  trans: "## 概述\n\n现在您已经了解了如何安装 GoldenGate 软件以及架构组件如何协同工作，可以开始设置复制了。本章涵盖设置和配置基本的单向\
    \ GoldenGate 复制。它讨论了为持续更改同步添加本地抽取进程、数据泵抽取进程和复制进程。您还将回顾初始数据加载方法，包括使用 GoldenGate\
    \ 和原生 DBMS 实用程序。\n\n更高级的配置将在后续章节中介绍，例如第 5 章中的双向复制、第 6 章中的异构复制，以及第 13 章中的零停机迁移。请记住，本章介绍的基本概念是构建那些更高级配置的基础。第\
    \ 5 章也建立在这个基本复制配置之上，并添加了一些可用于增强基本配置的高级功能。\n\n### 设置复制的前提条件\n\n在开始设置复制之前，您需要满足以下前提条件：\n\
    \n*   如第 2 章所述，GoldenGate 软件已安装在源服务器和目标服务器上。\n*   在源数据库和目标数据库上创建了 GoldenGate 数据库用户\
    \ ID。\n*   目标数据库服务器的名称或 IP 地址。\n*   GoldenGate 管理器进程在源端和目标端均已启动并运行。\n*   从源服务器到目标服务器的\
    \ GoldenGate 管理器端口的 TCP/IP 网络连接是开放的。\n*   对业务和技术复制要求有透彻的理解。\n\n我们将在下一节关于要求的部分，更深入地探讨最后一项。理解需求可能是复制项目成功的唯一最重要的因素。\n\
    \n### 需求\n\n您需要扎实理解驱动复制技术设计的特定需求。以下是一些影响复制设计的因素：\n\n*源和目标配置*：描述现有或计划中的源和目标数据库。数据库和操作系统的软件版本是什么？服务器是独立的还是集群的？数据存储是如何配置的？源和目标数据库的字符集是什么？\n\
    \n*数据时效性*：数据需要多快、多频繁地更新？数据复制中的任何延迟是否可以容忍？如果不能容忍任何延迟并且更改量很大，您可能需要在项目中投入更多时间来设计和调优复制，以避免任何延迟。请记住，通常报告系统可以容忍延迟，目标数据不需要与源数据完全同步。\n\
    \n*数据量*：需要复制多少数据？更新频率如何？您可能可以检查现有的数据库事务日志文件，以确定源数据库中正在发生的数据更改量。数据更改量将影响源和目标之间的网络带宽要求，以及跟踪文件所需的磁盘空间量。\n\
    \n*数据要求*：您应该了解任何独特或特殊的数据要求，以便在 GoldenGate 中妥善处理。例如，如果存在触发器，可能需要在目标数据库中禁用它们。如果序列需要复制，则需要添加特殊的参数。某些数据类型可能需要特殊处理或可能不受支持。例如，在\
    \ GoldenGate 11 中，BFILE 和 ANYDATA 等数据类型不受支持。其他数据类型可能受支持，但有某些限制。请务必查阅 GoldenGate\
    \ 产品文档以获取支持的数据类型列表。\n\n*安全要求*：复制需要多高的安全性？例如，是否需要加密 GoldenGate 正在复制的数据？GoldenGate\
    \ 可以加密存储在跟踪文件中的数据以及从源发送到目标的数据。此外，数据库中的数据是否加密？例如，Oracle 可以使用称为透明数据加密（TDE）的功能加密数据库数据。如果数据库使用了\
    \ TDE，GoldenGate 需要定义特殊参数来解密数据以进行复制。\n\n*网络要求*：描述源和目标之间的网络？是否有防火墙需要为复制开放？源和目标之间的距离是多少？处理数据量需要多少带宽，又有多少可用？\n\
    \n表 4-1 描述了本章讨论中使用的环境。括号内注明了 Windows 上带有 SQL Server 数据库环境的一些设置。但请记住，源和目标可以是 GoldenGate\
    \ 支持的任何平台和数据库，如第 3 章所述。您可能希望为您的复制项目设置一个类似的表格。\n\n**表 4-1. GoldenGate 复制环境示例**\n\
    \n| **配置项** | **值** |\n| --- | --- |\n| GoldenGate 软件位置 | `/gger/ggs` (或 `c:\\\
    gger\\ggs`) |\n| GoldenGate 操作系统用户 ID/密码 | gguser/userpw |\n| GoldenGate 数据库用户\
    \ ID/密码 | gger/userpw |\n| 源服务器名称 | sourceserver |\n| 源管理器端口 | 7840 |\n| 源服务器操作系统/版本\
    \ | Linux 5.3 或 Windows |\n| 源数据库名称 | SourceDB |\n| 源数据库供应商/版本 | Oracle 11.1 (或\
    \ SQL Server 2008) |\n| 源模式 | HR |\n| 目标服务器名称 | targetserver |\n| 目标管理器端口 | 7840\
    \ |\n| 目标服务器操作系统/版本 | Linux 5.3 (或 Windows) |\n| 目标数据库供应商/版本 | Oracle 11.1 (或\
    \ SQL Server 2008) |\n| 目标数据库名称 | TargetDB |\n| 目标模式 | HR |\n| 本地抽取进程名称 | `LHREMD1`\
    \ |\n| 数据泵名称 | `PHREMD1` |\n| 复制进程名称 | `RHREMD1` |\n| 本地跟踪文件 | `l1` |\n| 远程跟踪文件\
    \ | `l2` |\n\n示例中使用的源模式和目标模式来自 Oracle 数据库示例模式中的人力资源（HR）模式。下面列出了 HR 模式中 Employees\
    \ 表的描述，该表在示例中使用：\n\n```\nTable EMPLOYEES\n Name                              \
    \        Null?    Type\n ----------------------------------------- -------- ----------------------------\n\
    \ EMPLOYEE_ID  (PK)                         NOT NULL NUMBER(6)\n FIRST_NAME  \
    \                                        VARCHAR2(20)\n LAST_NAME            \
    \                      NOT NULL VARCHAR2(25)\n EMAIL                         \
    \             NOT NULL VARCHAR2(25)\n PHONE_NUMBER                           \
    \             VARCHAR2(20)\n HIRE_DATE                                  NOT NULL\
    \ DATE\n JOB_ID                                     NOT NULL VARCHAR2(10)\n SALARY\
    \                                              NUMBER(8,2)\n COMMISSION_PCT  \
    \                                    NUMBER(2,2)\n MANAGER_ID                \
    \                          NUMBER(6)\n DEPARTMENT_ID                         \
    \              NUMBER(4)\n```\n\n### 单向复制拓扑\n\n本章介绍的拓扑是单向复制，如图 4-1 所示。您可能还记得第\
    \ 3 章中，单向复制是最简单的拓扑，通常用于报告或查询卸载目的。数据仅从单一源数据库复制到单一目标数据库，方向是单向的。对数据库数据的更改仅在源数据库进行，然后复制到目标数据库。\n\
    \n![images](img/0401.jpg)\n\n**图 4-1. 单向复制**"
- fmt: '# Basic Replication Steps


    When the prerequisites are complete, setting up basic one-way replication can
    be accomplished in four steps, as shown in [Figure 4-2](#Chapter04.html#fig_4_2).
    These steps include initially loading the data and then keeping the data synchronized
    after the initial load. The next sections cover each of these steps in detail.


    ![images](images/0402.jpg)


    **Figure 4-2.** Basic replication steps


    Following are descriptions of the steps in the figure:


    1.  Start the Extract. Configure and start the Extract to begin capturing database
    changes. You need to start the Extract *before* the initial load, so that any
    SQL data manipulation language (DML) changes made during the load process can
    be captured. The Extract captures the database changes from the source database-transaction
    log and writes them to the source trail file.

    2.  Start the data pump. Configure and start the data pump to send extracted changes
    captured by the local Extract into the source trail across the network to the
    target server. When on the target server, the changes are written to the remote
    trail file.

    3.  Perform the initial load. Load the data using either GoldenGate or vendor
    `DBMS` utilities. Doing so creates a synchronized copy of each database, except
    for changes that were captured during the load process by the Extract. These changes
    will be applied in the next step when the Replicat is started. You only need to
    run an initial data load the first time you setting up replication. After this,
    GoldenGate will keep the data synchronized on an ongoing basis using the Extract
    and Replicat processes.

    4.  Start the Replicat. Configure and start the Replicat to begin applying changes
    from the remote trail file. Changes that were captured while the initial-load
    process was executing have already been written to the remote trail file. It may
    take a Replicat some time to catch up with the changes, depending on the data
    volume and the length of time changes were captured during the load process. Also,
    some of these changes may cause data conflicts, because activity was occurring
    in the database at the same time the data load was running. Later, this chapter
    covers some GoldenGate parameters, such as `HANDLECOLLISIONS`, to automatically
    handle these data conflicts. When the Replicat has caught up and applied all the
    changes, the databases are synchronized.


    ![images](images/square.jpg) **Note** These steps assume a zero-downtime replication
    configuration. Online DML changes will be occurring in the source database while
    the initial-load process is running. This is the most likely scenario in today''s
    environments, where downtime usually needs to be avoided. If you can quiesce or
    stop DML activity against the source database *while* the initial load is occurring,
    it is *not* necessary to start the Extract *before* the initial load.


    Let''s look at each of the basic replication steps in detail, beginning with setting
    up and starting the Extract.


    ## Starting the Extract


    When you''ve verified that the prerequisites are complete, the first step you
    need to complete in setting up replication is to start the Extract. Remember that
    you should start the Extract first to begin capturing changes made while the initial
    data load is running. If you can afford to take an outage and stop all change
    activity on the source database while the initial load is running, then you can
    start the Extract after the initial load.


    This section covers the various Extract configuration settings and options. After
    that, you see how to start the Extract and verify that it''s properly capturing
    changes.


    ### Verifying Database-Level Supplemental Logging


    When replicating from Oracle databases, you need to enable database-level supplemental
    logging on the source database. Remember that if you''re using bidirectional replication,
    you need to enable supplemental logging on both the source and the target databases.
    The supplemental logging is required to ensure that Oracle adds additional information
    to the redo logs that is required by GoldenGate.


    First, you can verify whether Oracle database supplemental logging is already
    enabled by running the following `SQLPLUS` command:


    ```sql

    SQL> SELECT SUPPLEMENTAL_LOG_DATA_MIN FROM V$DATABASE;


    SUPPLEMENTAL_LOG_DATA_MIN

    -------------------------

    NO

    ```


    For Oracle 9i, `SUPPLEMENTAL_LOG_DATA_MIN` must be `YES`. For Oracle 10g and later,
    `SUPPLEMENTAL_LOG_DATA` must be `YES` or `IMPLICIT`. Now that you''ve verified
    that database-level supplemental logging isn''t currently enabled, you can enter
    the commands to make it enabled.


    ### Enabling Database-Level Supplemental Logging


    You can enable Oracle database-level supplemental logging by running the following
    `SQLPLUS` command as a user with the `ALTER SYSTEM` privilege:


    ```sql

    SQL> ALTER DATABASE ADD SUPPLEMENTAL LOG DATA;


    --Verify that it is enabled.


    SQL> SELECT SUPPLEMENTAL_LOG_DATA_MIN FROM V$DATABASE;


    SUPPLEMENTAL_LOG_DATA_MIN

    -------------------------

    YES

    ```


    Remember, for Oracle 9i, `SUPPLEMENTAL_LOG_DATA` must be `YES`. For Oracle 10g
    and later, `SUPPLEMENTAL_LOG_DATA` must be `YES` or `IMPLICIT`.'
