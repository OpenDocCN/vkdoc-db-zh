  trans: '### 需求


    在开始配置复制之前，你必须透彻理解驱动此次零停机迁移复制技术设计的具体需求。以下列出了一些典型需求。需要提醒的是，本节将你正在迁移的源数据库称为 `旧数据库`，将你迁移到的目标数据库称为
    `新数据库`。


    你需要确保能够使用 `Oracle GoldenGate` 零停机迁移复制来满足这些需求：


    *   保持你正在迁移的 `旧数据库` 与 `新数据库` 同步。迁移切换后，继续保持 `旧数据库` 同步一段时间，直到你确定不会再回退到 `旧数据库`。

    *   `旧数据库` 在迁移切换前将一直主动处理 SQL 变更。通常，切换发生在计划的周末维护窗口期间，或网站/应用的低流量时段。

    *   在迁移切换前的这段时间里，`新数据库` 可根据需要用于只读查询。尽管 `Oracle GoldenGate` 的 `双向复制` 功能支持此操作，但通常
    `新数据库` 中的数据在切换前不会被更新。如果你的项目需求是在切换前更新 `新数据库` 中的数据，则需要配置 `双向复制` 以保持两个数据库同步。

    *   `旧数据库` 中的数据库数据和结构可以与 `新数据库` 不同。这取决于迁移的类型和复杂度。例如，如果你是从 `SQL Server` 数据库迁移到
    `Oracle` 数据库，某些特定的数据类型或结构可能需要更改。如果你只是从 `Oracle 10g` 迁移到 `Oracle 11g` 数据库，你的应用数据和数据结构可能完全相同。你也可能使用
    `Oracle GoldenGate` 将其他类型的应用程序从旧版本迁移到新版本，在这些情况下，数据结构可能会有所不同。

    *   `旧数据库` 中的数据必须与 `新数据库` 保持最新，并且在切换或回退时不应存在复制延迟。在切换或回退之前可以容忍一定的延迟，但该延迟必须在应用切换或回退之前最终消除。切换时存在的任何复制延迟都可能导致延迟。

    *   切换到 `新数据库` 以及从 `新数据库` 回退到 `旧数据库` 的操作必须快速进行，以最大限度地减少任何停机时间。请记住，`Oracle GoldenGate`
    只是整个迁移项目中的一环，你需要为迁移项目的所有部分（例如切换应用程序连接）准备好经过测试的流程。

    *   切换到 `新数据库` 后，数据库角色将发生逆转，`新数据库` 成为复制源，`旧数据库` 成为目标。这允许在需要时迁移回退到 `旧数据库`。

    *   应充分理解允许执行切换和回退流程的时间窗口。例如，一个两小时的切换和回退窗口与允许整个周末进行切换相比，需求差异很大。


    现在你已经了解了复制需求，接下来让我们回顾一下零停机迁移拓扑。


    ### 零停机迁移拓扑


    零停机迁移的基础拓扑是 `单向复制`，并针对零停机迁移做了一些改动，如 `图 13-1` 所示。`第 3 章` “架构” 介绍了 `单向复制` 的概念。`单向复制`
    是最简单的拓扑结构，常用于报告或查询卸载目的。在本章中，`单向复制` 拓扑被用于零停机迁移目的。数据在单一时间点上从单个源数据库复制到单个目标数据库，且方向唯一。数据库数据的更改仅在源数据库进行，然后复制到目标数据库。源数据库是迁移前你正在迁移的
    `旧数据库`。切换到 `新数据库` 后，复制方向将反转，数据从 `新数据库` 复制回 `旧数据库`，以允许迁移回退。这种反向复制可以根据需要持续保持。一旦你确定将停留在
    `新数据库` 且不再需要回退，就可以关闭反向复制。通常这个周期是几天到几周，但也可以根据需要延长。


    为了满足上一节介绍的零停机迁移需求，你必须确保能够快速准确地将应用活动从 `旧数据库` 切换到 `新数据库`，并能再切换回来。此外，如果因出现问题需要从迁移中回退，你必须能够从
    `新数据库` 复制回 `旧数据库`。`图 13-1` 中用一条虚线箭头标示了这一点。


    ![images](img/1301.jpg)


    `图 13-1. 零停机迁移复制拓扑`


    现在让我们看看如何使用 `Oracle GoldenGate` 来实现这些复制需求和拓扑。'
- fmt: '# Setup


    Once the prerequisites are complete, setting up zero-downtime migration replication
    can be accomplished in two parts and seven total steps, as shown in Figure 13-2
    and 13-3. The steps are similar to setting up basic one-way replication, as covered
    in [Chapter 4](#Chapter04.html#ch4). Part 1 includes the first four steps for
    setting up replication from the old database to the new database. These steps
    include initially loading the data and then keeping the data synchronized after
    the initial load. Part 2 includes the last three steps for configuring replication
    back from the new database to the old should it be needed for fallback. Because
    [Chapter 4](#Chapter04.html#ch4) covered the Oracle GoldenGate parameter files,
    this section only explains new concepts as needed.


    ![images](images/1302.jpg)


    *Figure 13-2.* Zero-downtime migration replication setup, part 1


    The example migrates the `PAYROLL` database to a new database software release.
    In the Oracle GoldenGate parameter files, you can use the `PR` abbreviation to
    indicate the payroll application. In addition, there are two tables that contain
    data that doesn''t need to be migrated, so you exclude those tables from the replication.
    The example could apply in many different specific migration scenarios, such as
    migrating from an Oracle 9i database on a Sun Solaris platform to an Oracle 11g
    database on a Red Hat Linux platform. Keep in mind that whatever database or application
    you happen to be migrating, the concepts and steps are similar to this example.
    It can get more complicated if, for example, you''re migrating heterogeneous databases
    or doing complex application migrations. In that case, you may have more complex
    Oracle GoldenGate mapping or transformation filters and parameters, but the overall
    process is still the same. Oracle GoldenGate can handle those mappings and transformations
    as demonstrated in the previous chapters. Because [Chapter 4](#Chapter04.html#ch4)
    covered steps 1-4 in detail, let''s move on to the detailed steps for part 2.


    In part 2 of the initial setup, you configure, but don''t start, the replication
    back from the new database to the old database, as shown in [Figure 13-3](#Chapter13.html#fig_13_3).
    These steps are necessary to set up the replication for migration fallback if
    needed. The three steps include setting up and configuring the Local Extract,
    data-pump Extract, and Replicat. These Extracts and Replicats are used later for
    the fallback scenario.


    ![images](images/1303.jpg)


    *Figure 13-3.* Zero-downtime migration replication setup, part 2


    Following are descriptions for steps 5-7, as shown in [Figure 13-3](#Chapter13.html#fig_13_3):


    1.  Configure and add the fallback Extract. The fallback Extract is started later
    to capture changes after the migration cutover and used for fallback if needed.

    2.  Configure and add the fallback data-pump Extract, which is started later after
    the migration cutover and used for fallback if needed.

    3.  Add the fallback Replicat, which is started later after the migration cutover
    and used for fallback if needed.


    Let''s look at each of the zero-downtime migration replication steps in the next
    section, beginning with setting up and starting the Local Extract.


    ## Configuring the Local Extract for Zero-Downtime Migration


    After you''ve verified that the prerequisites are complete, the first step in
    setting up zero-downtime migration replication is to configure, add, and start
    the Local Extract. Remember that you should start the Extract first to begin capturing
    changes made while the initial data load is running. If you can afford to take
    an application outage and stop all change activity on the source database while
    the initial load is running, then you can start the Extract after the initial
    load.


    Refer to [Chapter 4](#Chapter04.html#ch4) for detailed steps for starting the
    Extract. This section covers only the specific configuration for the zero-downtime
    migration Extract.


    Let''s begin by configuring the Local Extract. In order to do this, you first
    need to create a parameter file for the Extract. Remember, you''re configuring
    the Local Extract to capture all the SQL DML changes from the example `PAYROLL`
    schema.


    Let''s look at the parameters for the Local Extract as shown in the following
    example:


    ```

    GGSCI (oldserver) 1> edit params LPREMP1


    Extract LPREMP1

    -------------------------------------------------------------------

    -- Local extract for PAYROLL database

    -------------------------------------------------------------------


    USERID GGER, PASSWORD userpw


    ExtTrail dirdat/p1


    ReportCount Every 10000 Records, Rate

    Report at 00:30


    DiscardFile dirrpt/LPREMP1.dsc, Append

    DiscardRollover at 02:00


    Table PAYROLL.*;

    TableExclude PAYROLL.EXCLUDETABLE1;

    TableExclude PAYROLL.EXCLUDETABLE2;

    ```


    Remember from the Oracle GoldenGate naming conventions for the Local Extract group
    name that the `L` is used to designate the Local Extract. Because you''re replicating
    the `PAYROLL` database, you can use `PR` as the abbreviation for `PAYROLL` in
    the Local Extract name. You can use `EM` to indicate that the `PAYROLL` database
    is part of the employee application. You exclude the two tables that don''t need
    to be replicated, `EXCLUDETABLE1` and `EXCLUDETABLE2`, with the `TableExclude`
    parameter. Notice that you''re replicating all of the tables in the `PAYROLL`
    database using the asterisk as a wildcard and then excluding *only* the two tables
    you don''t want to replicate.


    Now that you''ve set up the Extract configuration parameters on the old server,
    the next step is to add the Extract group. You can do that using the following
    commands from the GoldenGate Software Command Interface (`GGSCI`):


    ```

    GGSCI (oldserver) > ADD EXTRACT LPREMP1, TRANLOG, BEGIN NOW

    GGSCI (oldserver) > ADD EXTTRAIL dirdat/p1, EXTRACT LPREMP1, MEGABYTES 500

    ```


    You can use `p1` as the Local Extract trail file name. Because the payroll application
    has a high volume of data changes, you make the trail file size `500MB`.


    After adding the Extract, you need to start it to actually begin capturing changes
    as shown in the following example:


    ```

    GGSCI (oldserver) > START EXTRACT LPREMP1

    ```


    Next, let''s check to make sure the Extract is running properly, using the `INFO`
    command:


    ```

    GGSCI (oldserver) 2> INFO EXTRACT LPREMP1

    ```


    If the Extract isn''t running, you can review the Oracle GoldenGate error log
    and report file and try to resolve the problem.


    You should also run the `STATS` command on your Extract. This shows if the Extract
    has processed any DML changes:


    ```

    GGSCI (oldserver) 2> STATS EXT LPREMP1

    ```


    You''re now finished adding, starting, and verifying the Local Extract, so let''s
    move on to the next step: starting the data-pump Extract.'
  raw: '### Setup


    Once the prerequisites are complete, setting up zero-downtime migration replication
    can be accomplished in two parts and seven total steps, as shown in Figured 13-2
    and 13-3\. The steps are similar to setting up basic one-way replication, as covered
    in [Chapter 4](#Chapter04.html#ch4). Part 1 includes the first four steps for
    setting up replication from the old database to the new database. These steps
    include initially loading the data and then keeping the data synchronized after
    the initial load. Part 2 includes the last three steps for configuring replication
    back from the new database to the old should it be needed for fallback. Because
    [Chapter 4](#Chapter04.html#ch4) covered the Oracle GoldenGate parameter files,
    this section only explains new concepts as needed.


    ![images](images/1302.jpg)


    ***Figure 13-2.** Zero-downtime migration replication setup, part 1*


    The example migrates the PAYROLL database to a new database software release.
    In the Oracle GoldenGate parameter files, you can use the PR abbreviation to indicate
    the payroll application. In addition, there are two tables that contain data that
    doesn''t need to be migrated, so you exclude those tables from the replication.
    The example could apply in many different specific migration scenarios, such as
    migrating from an Oracle 9i database on a Sun Solaris platform to an Oracle 11g
    database on a Red Hat Linux platform. Keep in mind that whatever database or application
    you happen to be migrating, the concepts and steps are similar to this example.
    It can get more complicated if, for example, you''re migrating heterogeneous databases
    or doing complex application migrations. In that case, you may have more complex
    Oracle GoldenGate mapping or transformation filters and parameters, but the overall
    process is still the same. Oracle GoldenGate can handle those mappings and transformations
    as demonstrated in the previous chapters. Because [Chapter 4](#Chapter04.html#ch4)
    covered steps 1-4 in detail, let''s move on to the detailed steps for part 2.


    In part 2 of the initial setup, you configure, but don''t start, the replication
    back from the new database to the old database, as shown in [Figure 13-3](#Chapter13.html#fig_13_3).
    These steps are necessary to set up the replication for migration fallback if
    needed. The three steps include setting up and configuring the Local Extract,
