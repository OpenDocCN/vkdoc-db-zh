- fmt: "#### Using BATCHSQL\n\n`BATCHSQL` is another parameter you can add to your\
    \ Replicats to improve performance. According to the Oracle GoldenGate documentation,\
    \ `BATCHSQL` can improve the performance of Replicats by as much as 300 percent.\
    \ There are some usage restrictions for `BATCHSQL`, and it's only valid for Oracle,\
    \ SQL Server, DB2 LUW, DB2 on z/OS, and Teradata databases. You should check the\
    \ `Oracle GoldenGate Windows and UNIX Reference Guide` for the full list of restrictions.\n\
    \nIn normal processing, GoldenGate groups transactions together but preserves\
    \ transaction order from the source. With `BATCHSQL`, GoldenGate groups together\
    \ similar transactions into a high-performance array and processes them at a much\
    \ faster rate. To implement `BATCHSQL` using defaults, simply add the following\
    \ parameter to your Replicat parameter file:\n\n`BATCHSQL`\n\nYou can add several\
    \ optional parameters to `BATCHSQL` if you need to tune the amount of memory `BATCHSQL`\
    \ is consuming. You can refer to the GoldenGate Reference Guide for details on\
    \ those parameters. Typically, you should start with the default value and then\
    \ add the optional parameters if needed.\n\nLet's look at a few examples to illustrate\
    \ how `BATCHSQL` works. [Figure 7-5](#Chapter07.html#fig_7_5) shows GoldenGate\
    \ processing a remote trail normally. The remote trail has three transactions,\
    \ each with an insert and a delete to the `HR.EMPLOYEE` table. The GoldenGate\
    \ Replicat organizes those transactions into a larger Replicat transaction according\
    \ to the minimum value of the `GROUPTRANSOPS` parameter setting. For this example,\
    \ let's assume you're using the default `GROUPTRANSOPS` setting of a minimum of\
    \ 1,000 SQL operations per Replicat transaction. Notice that GoldenGate normally\
    \ preserves the order of SQL operations with inserts followed by deletes, just\
    \ as in the remote trail.\n\n![images](images/0705.jpg)\n\n**Figure 7-5.** Normal\
    \ GoldenGate transaction processing\n\n[Figure 7-6](#Chapter07.html#fig_7_6) shows\
    \ GoldenGate processing a remote trail using `BATCHSQL`. The remote trail has\
    \ three transactions, each with an insert and a delete to the `HR.EMPLOYEE` table.\
    \ The GoldenGate replicat organizes those transactions into a larger Replicat\
    \ transaction according to the `GROUPTRANSOPS` parameter setting. For this example,\
    \ let's assume you're using the default `GROUPTRANSOPS` setting of 1,000 SQL operations\
    \ per Replicat transaction. With `BATCHSQL`, notice that GoldenGate changes the\
    \ order of SQL operations and groups together the inserts, updates, and the deletes\
    \ for the same SQL table. `BATCHSQL` groups or batches together in a processing\
    \ array the same SQL operations operating on the same table with the same columns.\n\
    \n![images](images/0706.jpg)\n\n**Figure 7-6.** `BATCHSQL` GoldenGate transaction\
    \ processing\n\nYou may be asking yourself if using `BATCHSQL` causes any issues\
    \ with referential integrity. GoldenGate analyzes any foreign-key dependencies\
    \ before applying the batch and makes adjustments. According to the GoldenGate\
    \ documentation, in some cases, GoldenGate may need to apply more than one SQL\
    \ statement per batch to maintain the referential integrity.\n\n`BATCHSQL` also\
    \ creates a new section in your report file. Here is an example of the new statistics\
    \ you see in your report file when `BATCHSQL` is activated. Keep in mind that\
    \ these tiny sample numbers are based on the simple example in [Figure 7-6](#Chapter07.html#fig_7_6)\
    \ for illustration purposes:\n\n```\nBATCHSQL statistics:\n              Batch\
    \ operations:          9\n                       Batches:          3\n       \
    \       Batches executed:          2\n                        Queues:        \
    \  2\n              Batches in error:          1\n        Normal mode operations:\
    \          1\n    Immediate flush operations:          0\n                  PK\
    \ collisions:          0\n                  UK collisions:          0\n      \
    \            FK collisions:          0\n           Thread batch groups:      \
    \    0\n                       Commits:          2\n                     Rollbacks:\
    \          1\n              Queue flush calls:          2\n                  Ops\
    \ per batch:          3\n        Ops per batch executed:       4.5\n         \
    \         Ops per queue:       4.5\n           Parallel batch rate:       N/A\n\
    ```\n\nLet's review a couple of fields in the `BATCHSQL` report. Batch Operations\
    \ are the total number of operations executed. Batches are the number of batches\
    \ created. In this case you had three batches, which you can see by referring\
    \ to [Figure 7-6](#Chapter07.html#fig_7_6). Batches in Error was 1, which tells\
    \ you that you had an error while `BATCHSQL` was processing. Because of the error,\
    \ Normal Mode Operations equals 1 because `BATCHSQL` rolls back and reverts to\
    \ normal transaction-processing mode operations when there is an error.\n\nWhen\
    \ `BATCHSQL` encounters processing errors, you see the following type of messages\
    \ in your GoldenGate logs:\n\n```\n2011-03-22 17:12:14  WARNING OGG-00869  Aborting\
    \ BATCHSQL transaction.\nDatabase error 1 (ORA-00001: unique constraint (HR.PK_EMP_ID)\
    \ violated).\n\n2011-03-22 17:12:15  WARNING OGG-01137  BATCHSQL suspended, continuing\
    \ in\nnormal mode.\n\n2011-03-22 17:12:15  WARNING OGG-01003  Repositioning to\
    \ rba 231493300 in seqno 49.\n```\n\nWhen these errors occur, GoldenGate automatically\
    \ rolls back the `BATCHSQL` processing and attempts to process the transaction\
    \ in normal mode. This slows down the `BATCHSQL`, so if you're seeing a lot of\
    \ these errors you may find `BATCHSQL` won't improve your performance.\n\nWhen\
    \ you have `BATCHSQL` successfully enabled, you should review your Replicat report\
    \ file and compare the processing rates to your baseline reports and determine\
    \ if you're getting performance improvements.\n\n#### Using GROUPTRANSOPS\n\n\
    You can use `GROUPTRANSOPS` to tune the number of SQL operations in a GoldenGate\
    \ transaction. As you saw in [Figure 7-5](#Chapter07.html#fig_7_5), the GoldenGate\
    \ Replicat groups together source transactions into a GoldenGate transaction.\
    \ By default, the Replicat includes a minimum of 1,000 SQL operations in a transaction.\
    \ By setting `GROUPTRANSOPS` higher, say to 2,000, you may get increased performance.\
    \ In addition to having a larger transaction, a higher value for `GROUPTRANSOPS`\
    \ reduces the number of checkpoints written to the GoldenGate checkpoint table.\
    \ `GROUPTRANSOPS` can be set in your Replicat parameter file as shown in the following\
    \ example:\n\n`GROUPTRANSOPS 2000`\n\nBe careful not to set `GROUPTRANSOPS` too\
    \ high. Doing so can cause an increase in latency on the target because the target\
    \ transaction size is larger on the target than the source.\n\n#### Tuning Disk\
    \ Storage\n\nBy its very nature as a data-replication product, GoldenGate generates\
    \ a lot of disk I/O. Trails are written by the Local Extract, read and written\
    \ by the data-pump Extract, and finally read by the Replicat. As such, to achieve\
    \ the highest performance it's critical to place your trail files on the fastest\
    \ possible disk storage. Here are some suggestions for tuning disk storage for\
    \ GoldenGate to achieve the best performance:\n\n*   Place GoldenGate files on\
    \ the fastest available storage and storage controller. Although NAS is acceptable\
    \ for GoldenGate files, generally SAN storage has better performance than NAS\
    \ due to the NAS network overhead. Storage technology is constantly changing,\
    \ and performance should be evaluated at the time of your decision.\n*   Use RAID\
    \ 0+1 rather than RAID 5. RAID 5 maintains parity information that isn't needed\
    \ and slows down writing the trails.\n*   Always evaluate the performance of the\
    \ disks used to store your trail files. For example, on Linux use the `IOSTAT`\
    \ command to determine if any disk devices are a bottleneck.\n*   Use the `GROUPTRANSOPS`\
    \ parameter as described in the last section to reduce I/O."
  raw: '#### Using BATCHSQL


    `BATCHSQL` is another parameter you can add to your Replicats to improve performance.
    According to the Oracle GoldenGate documentation, `BATCHSQL` can improve the performance
    of Replicats by as much as 300 percent. There are some usage restrictions for
    `BATCHSQL`, and it''s only valid for Oracle, SQL Server, DB2 LUW, DB2 on z/OS,
    and Teradata databases. You should check the *Oracle GoldenGate Windows and UNIX
    Reference Guide* for the full list of restrictions.


    In normal processing, GoldenGate groups transactions together but preserves transaction
    order from the source. With `BATCHSQL`, GoldenGate groups together similar transactions
    into a high-performance array and processes them at a much faster rate. To implement
    `BATCHSQL` using defaults, simply add the following parameter to your Replicat
    parameter file:


    `BATCHSQL`


    You can add several optional parameters to `BATCHSQL` if you need to tune the
    amount of memory `BATCHSQL` is consuming. You can refer to the GoldenGate Reference
    Guide for details on those parameters. Typically, you should start with the default
    value and then add the optional parameters if needed.


    Let''s look at a few examples to illustrate how `BATCHSQL` works. [Figure 7-5](#Chapter07.html#fig_7_5)
    shows GoldenGate processing a remote trail normally. The remote trail has three
    transactions, each with an insert and a delete to the HR.EMPLOYEE table. The GoldenGate
    Replicat organizes those transactions into a larger Replicat transaction according
    to the minimum value of the `GROUPTRANSOPS` parameter setting. For this example,
    let''s assume you''re using the default `GROUPTRANSOPS` setting of a minimum of
    1,000 SQL operations per Replicat transaction. Notice that GoldenGate normally
    preserves the order of SQL operations with inserts followed by deletes, just as
    in the remote trail.


    ![images](images/0705.jpg)


    ***Figure 7-5.** Normal GoldenGate transaction processing*


    [Figure 7-6](#Chapter07.html#fig_7_6) shows GoldenGate processing a remote trail
    using `BATCHSQL`. The remote trail has three transactions, each with an insert
    and a delete to the HR.EMPLOYEE table. The GoldenGate replicat organizes those
    transactions into a larger Replicat transaction according to the `GROUPTRANSOPS`
    parameter setting. For this example, let''s assume you''re using the default `GROUPTRANSOPS`
    setting of 1,000 SQL operations per Replicat transaction. With `BATCHSQL`, notice
    that GoldenGate changes the order of SQL operations and groups together the inserts,
    updates, and the deletes for the same SQL table. `BATCHSQL` groups or batches
    together in a processing array the same SQL operations operating on the same table
    with the same columns.


    ![images](images/0706.jpg)


    ***Figure 7-6.** `BATCHSQL` GoldenGate transaction processing*


    You may be asking yourself if using `BATCHSQL` causes any issues with referential
    integrity. GoldenGate analyzes any foreign-key dependencies before applying the
    batch and makes adjustments. According to the GoldenGate documentation, in some
    cases, GoldenGate may need to apply more than one SQL statement per batch to maintain
    the referential integrity.


    `BATCHSQL` also creates a new section in your report file. Here is an example
    of the new statistics you see in your report file when `BATCHSQL` is activated.
    Keep in mind that these tiny sample numbers are based on the simple example in
    [Figure 7-6](#Chapter07.html#fig_7_6) for illustration purposes:


    `BATCHSQL statistics:`


    `              Batch operations:         9`

    `                       Batches:         3`

    `              Batches executed:         2`

    `                        Queues:         2`

    `              Batches in error:         1`

    `        Normal mode operations:         1`

    `    Immediate flush operations:         0`

    `                 PK collisions:         0`

    `                 UK collisions:         0`

    `                 FK collisions:         0`

    `           Thread batch groups:         0`

    `                       Commits:         2`

    `                     Rollbacks:         1`

    `             Queue flush calls:         2`


    `                 Ops per batch:         3`

    `        Ops per batch executed:       4.5`

    `                 Ops per queue:       4.5`

    `           Parallel batch rate:       N/A`


    Let''s review a couple of the fields in the `BATCHSQL` report. Batch Operations
    are the total number of operations executed. Batches are the number of batches
    created. In this case you had three batches, which you can see by referring to
    [Figure 7-6](#Chapter07.html#fig_7_6). Batches in Error was 1, which tells you
    that you had an error while `BATCHSQL` was processing. Because of the error, Normal
    Mode Operations equals 1 because `BATCHSQL` rolls back and reverts to normal transaction-processing
    mode operations when there is an error.


    When `BATCHSQL` encounters processing errors, you see the following type of messages
    in your GoldenGate logs:


    `2011-03-22 17:12:14  WARNING OGG-00869  Aborting BATCHSQL transaction.`

    `Database error 1 (ORA-00001: unique constraint (HR.PK_EMP_ID) violated).`


    `2011-03-22 17:12:15  WARNING OGG-01137  BATCHSQL suspended, continuing in`

    `normal mode.`


    `2011-03-22 17:12:15  WARNING OGG-01003  Repositioning to rba 231493300 in seqno
    49.`


    When these errors occur, GoldenGate automatically rolls back the `BATCHSQL` processing
    and attempts to process the transaction in normal mode. This slows down the `BATCHSQL`,
    so if you''re seeing a lot of these errors you may find `BATCHSQL` won''t improve
    your performance.


    When you have `BATCHSQL` successfully enabled, you should review your Replicat
    report file and compare the processing rates to your baseline reports and determine
    if you''re getting performance improvements.


    #### Using GROUPTRANSOPS


    You can use `GROUPTRANSOPS` to tune the number of SQL operations in a GoldenGate
    transaction. As you saw in [Figure 7-5](#Chapter07.html#fig_7_5), the GoldenGate
    Replicat groups together source transactions into a GoldenGate transaction. By
    default, the Replicat includes a minimum of 1,000 SQL operations in a transaction.
    By setting `GROUPTRANSOPS` higher, say to 2,000, you may get increased performance.
    In addition to having a larger transaction, a higher value for `GROUPTRANSOPS`
    reduces the number of checkpoints written to the GoldenGate checkpoint table.
    `GROUPTRANSOPS` can be set in your Replicat parameter file as shown in the following
    example:


    `GROUPTRANSOPS 2000`


    Be careful not to set `GROUPTRANSOPS` too high. Doing so can cause an increase
    in latency on the target because the target transaction size is larger on the
    target than the source.


    #### Tuning Disk Storage


    By its very nature as a data-replication product, GoldenGate generates a lot of
    disk I/O. Trails are written by the Local Extract, read and written by the data-pump
    Extract, and finally read by the Replicat. As such, to achieve the highest performance
    it''s critical to place your trail files on the fastest possible disk storage.
    Here are some suggestions for tuning disk storage for GoldenGate to achieve the
    best performance:


    *   Place GoldenGate files on the fastest available storage and storage controller.
    Although NAS is acceptable for GoldenGate files, generally SAN storage has better
    performance than NAS due to the NAS network overhead. Storage technology is constantly
    changing, and performance should be evaluated at the time of your decision.

    *   Use RAID 0+1 rather than RAID 5\. RAID 5 maintains parity information that
    isn''t needed and slows down writing the trails.

    *   Always evaluate the performance of the disks used to store your trail files.
    For example, on Linux use the `IOSTAT` command to determine if any disk devices
    are a bottleneck.

    *   Use the `GROUPTRANSOPS` parameter as described in the last section to reduce
    I/O.'
  trans: "#### 使用 BATCHSQL\n\n`BATCHSQ`L 是你可以添加到 Replicat 中以提升性能的另一个参数。根据 Oracle GoldenGate\
    \ 文档，`BATCHSQL` 最多可将 Replicat 的性能提升 **300%**。`BATCHSQL` 有一些使用限制，并且仅对 Oracle、SQL\
    \ Server、DB2 LUW、z/OS 上的 DB2 以及 Teradata 数据库有效。你应查阅 `Oracle GoldenGate Windows\
    \ and UNIX Reference Guide` 以获取完整的限制列表。\n\n在常规处理中，GoldenGate 会对事务进行分组，但会保留源自源端的事务顺序。使用\
    \ `BATCHSQL` 时，GoldenGate 会将相似的事务分组到一个高性能数组中，并以快得多的速度处理它们。要使用默认值实现 `BATCHSQL`，只需将以下参数添加到你的\
    \ Replicat 参数文件中即可：\n\n`BATCHSQL`\n\n如果你需要调整 `BATCHSQL` 消耗的内存量，可以为 `BATCHSQL`\
    \ 添加几个可选参数。你可以参考 GoldenGate 参考指南了解那些参数的详细信息。通常，你应该从默认值开始，然后在需要时添加可选参数。\n\n让我们看几个例子来说明\
    \ `BATCHSQL` 的工作原理。图 7-5 显示了 GoldenGate 正常处理远程 trail 的情况。该远程 trail 有三个事务，每个事务都包含对\
    \ `HR.EMPLOYEE` 表的一次插入和一次删除。GoldenGate Replicat 根据 `GROUPTRANSOPS` 参数设置的最小值，将这些事务组织成一个更大的\
    \ Replicat 事务。在这个例子中，我们假设你使用的是默认的 `GROUPTRANSOPS` 设置，即每个 Replicat 事务最少包含 1,000\
    \ 个 SQL 操作。请注意，GoldenGate 通常保留 SQL 操作的顺序，即插入后跟删除，正如在远程 trail 中一样。\n\n![images](img/0705.jpg)\n\
    \n**图 7-5.** GoldenGate 常规事务处理\n\n图 7-6 显示了使用 `BATCHSQL` 处理远程 trail 的 GoldenGate。该远程\
    \ trail 有三个事务，每个事务都包含对 `HR.EMPLOYEE` 表的一次插入和一次删除。GoldenGate Replicat 根据 `GROUPTRANSOPS`\
    \ 参数设置，将这些事务组织成一个更大的 Replicat 事务。在这个例子中，我们假设你使用的是默认的 `GROUPTRANSOPS` 设置，即每个 Replicat\
    \ 事务包含 1,000 个 SQL 操作。使用 `BATCHSQL` 时，请注意 GoldenGate 改变了 SQL 操作的顺序，并将对同一张 SQL\
    \ 表的插入、更新和删除操作分组在一起。`BATCHSQ`L 将对相同表格、相同列执行的相同 SQL 操作分组或批处理在一个处理数组中。\n\n![images](img/0706.jpg)\n\
    \n**图 7-6.** 使用 `BATCHSQL` 的 GoldenGate 事务处理\n\n你可能会问自己，使用 `BATCHSQL` 是否会导致任何引用完整性问题。GoldenGate\
    \ 会在应用批次之前分析任何外键依赖关系并做出调整。根据 GoldenGate 文档，在某些情况下，GoldenGate 可能需要在一个批次中应用多个 SQL\
    \ 语句来维护引用完整性。\n\n`BATCHSQL` 还会在你的报告文件中创建一个新部分。以下是当 `BATCHSQL` 激活时，你在报告文件中看到的新增统计信息的示例。请记住，这些微小的示例数字是基于图\
    \ 7-6 中的简单示例，仅用于说明目的：\n\n```\nBATCHSQL statistics:\n              Batch operations:\
    \          9\n                       Batches:          3\n              Batches\
    \ executed:          2\n                        Queues:          2\n         \
    \     Batches in error:          1\n        Normal mode operations:          1\n\
    \    Immediate flush operations:          0\n                  PK collisions:\
    \          0\n                  UK collisions:          0\n                  FK\
    \ collisions:          0\n           Thread batch groups:          0\n       \
    \                Commits:          2\n                     Rollbacks:        \
    \  1\n              Queue flush calls:          2\n                  Ops per batch:\
    \          3\n        Ops per batch executed:       4.5\n                  Ops\
    \ per queue:       4.5\n           Parallel batch rate:       N/A\n```\n\n让我们回顾一下\
    \ `BATCHSQL` 报告中的几个字段。批操作数是已执行的操作总数。批次数是创建的批次数量。在这个例子中你有三个批次，你可以通过参考图 7-6 看到。出错批次数是\
    \ 1，这告诉你 `BATCHSQL` 在处理时遇到了一个错误。由于这个错误，正常模式操作数等于 1，因为当出现错误时，`BATCHSQL` 会回滚并恢复为正常事务处理模式操作。\n\
    \n当 `BATCHSQL` 遇到处理错误时，你将在 GoldenGate 日志中看到以下类型的消息：\n\n```\n2011-03-22 17:12:14\
    \  WARNING OGG-00869  Aborting BATCHSQL transaction.\nDatabase error 1 (ORA-00001:\
    \ unique constraint (HR.PK_EMP_ID) violated).\n\n2011-03-22 17:12:15  WARNING\
    \ OGG-01137  BATCHSQL suspended, continuing in\nnormal mode.\n\n2011-03-22 17:12:15\
    \  WARNING OGG-01003  Repositioning to rba 231493300 in seqno 49.\n```\n\n当这些错误发生时，GoldenGate\
    \ 会自动回滚 `BATCHSQL` 处理，并尝试在正常模式下处理该事务。这会降低 `BATCHSQL` 的速度，因此如果你看到大量此类错误，你可能会发现\
    \ `BATCHSQL` 无法提升你的性能。\n\n当你成功启用 `BATCHSQL` 后，你应该检查你的 Replicat 报告文件，并将处理速率与你的基线报告进行比较，以确定是否获得了性能提升。\n\
    \n#### 使用 GROUPTRANSOPS\n\n你可以使用 `GROUPTRANSOPS` 来调整 GoldenGate 事务中的 SQL 操作数量。正如你在图\
    \ 7-5 中看到的，GoldenGate Replicat 将源端事务分组到一个 GoldenGate 事务中。默认情况下，Replicat 在一个事务中至少包含\
    \ 1,000 个 SQL 操作。通过设置更高的 `GROUPTRANSOPS` 值，比如 2,000，你可能会获得更高的性能。除了拥有更大的事务外，更高的\
    \ `GROUPTRANSOPS` 值还会减少写入 GoldenGate 检查点表的检查点数量。`GROUPTRANSOPS` 可以在你的 Replicat\
    \ 参数文件中设置，如下例所示：\n\n`GROUPTRANSOPS 2000`\n\n注意不要将 `GROUPTRANSOPS` 设置得过高。这样做会导致目标端延迟增加，因为目标端的事务大小比源端大。\n\
    \n#### 调优磁盘存储\n\n作为数据复制产品，GoldenGate 本质上会产生大量磁盘 I/O。Trail 文件由本地 Extract 写入，由数据泵\
    \ Extract 读写，最后由 Replicat 读取。因此，为了实现最高性能，将你的 trail 文件放置在尽可能快速的磁盘存储上至关重要。以下是一些建议，用于为\
    \ GoldenGate 调优磁盘存储以获得最佳性能：\n\n*   将 GoldenGate 文件放置在可用的最快存储和存储控制器上。虽然 NAS 对于\
    \ GoldenGate 文件来说是可以接受的，但由于 NAS 网络开销，通常 SAN 存储比 NAS 性能更好。存储技术在不断变化，在你做决定时应评估当时的性能。\n\
    *   使用 RAID 0+1 而不是 RAID 5。RAID 5 维护奇偶校验信息，这不仅不需要，还会减慢 trail 的写入速度。\n*   始终评估用于存储你的\
    \ trail 文件的磁盘的性能。例如，在 Linux 上使用 `IOSTAT` 命令来确定是否存在任何磁盘设备瓶颈。\n*   使用上一节中描述的 `GROUPTRANSOPS`\
    \ 参数来减少 I/O。"
- fmt: "## Chapter 8: Monitoring Oracle GoldenGate\n\n### Tuning the Network\n\nDepending\
    \ on the number of data changes in your replication environment, the Extract could\
    \ be sending large amounts of data over the network to be processed by the Replicat.\
    \ Network performance between your source and target is critical to overall GoldenGate\
    \ performance. As mentioned earlier, you can use tools such as the Windows System\
    \ Monitor or the `netstat` command on Linux to gather network statistics. You\
    \ can compare these to the baseline network statistics to determine if you're\
    \ experiencing an ongoing performance problem or just a temporary spike.\n\nIn\
    \ addition to server commands, you can also look at GoldenGate itself to see if\
    \ network issues may be causing a performance bottleneck. Let's walk through an\
    \ example of how to detect a network bottleneck using GoldenGate commands.\n\n\
    First let's run an `info` command on the Local Extract. A portion of the output\
    \ is shown in the following example:\n\n```\nGGSCI (sourceserver) > info ext LHREMD1,\
    \ showch 10\n...\nWrite Checkpoint #1\n\n  GGS Log Trail\n\n  Current Checkpoint\
    \ (current write position):\n    Sequence #: 11\n    RBA: 977\n    Timestamp:\
    \ 2011-01-28 23:19:46.828700\n    Extract Trail: dirdat/l1\n```\n\nYou should\
    \ run the `info` command several times and compare the output, specifically the\
    \ values for the Write Checkpoint. Look for the highest Write Checkpoint # in\
    \ each command output and make sure the RBA and timestamp are increasing. Run\
    \ the same commands for the data-pump Extracts.\n\nIf the Write Checkpoint values\
    \ are increasing for the Local Extract and *not* for the data-pump Extract, then\
    \ there is a network bottleneck for the data-pump Extract. The Local Extract is\
    \ able to process data, but the data pump is bottlenecked. Eventually the data-pump\
    \ Extract backs up with transactions due to the network bottleneck and runs out\
    \ of internal memory and then abends.\n\nYou can also run commands on the Replicat\
    \ to confirm there is a network bottleneck. The following example runs a `status`\
    \ command on the Replicat as shown in the following example:\n\n```\nGGSCI (targetserver)\
    \ > send replicat RHREMD1, status\n\nSending STATUS request to REPLICAT RHREMD1\
    \ ...\n  Current status: At EOF\n  Sequence #: 17\n  RBA: 2852\n  0 records in\
    \ current transaction\n```\n\nIn the example, the Replicat is in At EOF. If the\
    \ Replicat is At EOF and the Local Extract is processing data, you know there\
    \ is a bottleneck with the data pump and the network. The Local Extract is extracting\
    \ changes, but there is nothing for the Replicat to process because of the network\
    \ bottleneck. Keep in mind that the Replicat will continue processing normally\
    \ for a while if there is any leftover data in the target trail file until it\
    \ hits the end of file. Then it will stop processing because it isn't receiving\
    \ data over the network in the target trail file from the data pump.\n\nYou can\
    \ take several tuning approaches to help alleviate network performance issues.\
    \ The first approach is to create parallel data pumps, as covered earlier in this\
    \ chapter. Parallel data pumps alleviate any network bandwidth limitations caused\
    \ by using a single data-pump process. Second, you can adjust some additional\
    \ network tuning options on the `RMTHOST` parameter. You see those next.\n\n###\
    \ Tuning the RMTHOST Parameter\n\nThe default GoldenGate TCP socket buffer size\
    \ is 30,000 bytes. By increasing this buffer size, you can send larger packets\
    \ of data over the network. The *Oracle GoldenGate Windows and UNIX Reference\
    \ Guide* has a sample formula to help calculate the optimum TCP socket buffer\
    \ size. You should also check your specific server limitations for maximum TCP\
    \ buffer size. For example, on Linux you can check the following settings to determine\
    \ the maximum TCP transmit and receive buffer sizes:\n\n```\nnet.core.rmem_max\
    \ = 262144\nnet.core.wmem_max = 262144\n```\n\nIn this example, the transmit and\
    \ receive buffers are set to 256KB. You can check with your server and network\
    \ administrator to determine if these sizes can be adjusted higher, such as 4MB,\
    \ to allow GoldenGate to take advantage of higher TCP buffer sizes. GoldenGate\
    \ can utilize larger TCP buffer sizes if you add an option to the `RMTHOST` parameter\
    \ as shown in the following example:\n\n```\nRmtHost targetserver, MgrPort 7809,\
    \ TCPBUFSIZE 100000\n```\n\nThis example customizes the TCP buffer size to 100,000\
    \ bytes in the data-pump Extract to try to improve performance by sending larger\
    \ TCP packets. Another network tuning option of the `RMTHOST` parameter is the\
    \ `COMPRESS` option, as shown in the following example:\n\n```\nRmtHost targetserver,\
    \ MgrPort 7809, TCPBUFSIZE 100000, COMPRESS\n```\n\nUsing `COMPRESS`, GoldenGate\
    \ compresses outgoing blocks of data over the network and then decompresses the\
    \ data before writing it to the trail. According to the GoldenGate Reference manual,\
    \ compression ratios of 4:1 or greater are possible. Keep in mind, the compress\
    \ and uncompress add some CPU overhead to your servers.\n\n### Tuning the Database\n\
    \nThis book doesn't spend a great deal of time covering general database tuning,\
    \ but it's safe to say a poorly tuned database will negatively impact GoldenGate\
    \ performance. This is especially true on the Replicat side where GoldenGate is\
    \ executing actual database DML statements to change the data. You should ensure\
    \ that your database is tuned properly prior to turning on GoldenGate. There are\
    \ a few major areas you can check to help ensure proper Replicat performance on\
    \ the target database:\n\n*   Verify that the target tables used by GoldenGate\
    \ have unique keys and SQL indexes are created on those keys.\n*   Verify that\
    \ database optimizer statistics are kept up to date to ensure that the database\
    \ chooses the most efficient SQL execution plans.\n*   Make sure the database\
    \ tables that are the target of replication aren't overly fragmented. If so, they\
    \ should be reorganized to eliminate the fragmentation.\n*   Run database performance\
    \ reports such as AWR for Oracle database and verify there are no major performance\
    \ issues.\n\n### Summary\n\nThis chapter covered a basic methodology for tuning\
    \ GoldenGate replication. It reviewed capturing baselines of GoldenGate performance\
    \ statistics to help you determine when you have a performance issue and how it\
    \ can best be resolved. You then saw some specific approaches and examples of\
    \ tuning GoldenGate by using strategies such as parallel processing groups and\
    \ using GoldenGate parameters like `BATCHSQL` and `GROUPTRANSOPS`.\n\n## Monitoring\
    \ Oracle GoldenGate\n\nGoldenGate has a lot of moving parts that depend on other\
    \ systems to operate properly. The goal for replication is to replicate data from\
    \ source to target in real time without losing any data. Every system is different\
    \ and has different strengths and weaknesses. You can monitor the weak points,\
    \ but sometimes you may also want to monitor the strong points even though they\
    \ rarely break. As Murphy's Law says, “Anything that can go wrong, will go wrong.”\
    \ The cost of fixing a problem may be much more than the expense of implementing\
    \ a good monitoring system. With a good monitoring system, you can reduce downtime\
    \ due to errors, or even stop problems before they occur.\n\nThis chapter goes\
    \ over some scenarios that illustrate what can go wrong in the GoldenGate data-propagation\
    \ chain. Next, it discusses different ways to detect and identify errors. Finally,\
    \ it presents some automated scripts that can make your life easier. This chapter\
    \ teaches you how to identify issues and gives you some basic ideas on how to\
    \ resolve them. To learn about advanced troubleshooting, fixing issues, and using\
    \ tuning techniques, please refer the [chapter 7](#Chapter07.html#ch7), [11](#Chapter11.html#ch11)\
    \ and [14](#Chapter14.html#ch14) of this book."
  raw: '#### Tuning the Network


    Depending on the number of data changes in your replication environment, the Extract
    could be sending large amounts of data over the network to be processed by the
    Replicat. Network performance between your source and target is critical to overall
    GoldenGate performance. As mentioned earlier, you can use tools such as the Windows
    System Monitor or the `netstat` command on Linux to gather network statistics.
    You can compare these to the baseline network statistics to determine if you''re
    experiencing an ongoing performance problem or just a temporary spike.


    In addition to server commands, you can also look at GoldenGate itself to see
    if network issues may be causing a performance bottleneck. Let''s walk through
    an example of how to detect a network bottleneck using GoldenGate commands.


    First let''s run an `info` command on the Local Extract. A portion of the output
    is shown in the following example:


    `GGSCI (sourceserver) > info ext LHREMD1, showch 10`

    `...`

    `Write Checkpoint #1`


    `  GGS Log Trail`


    `  Current Checkpoint (current write position):`

    `    Sequence #: 11`

    `    RBA: 977`

    `    Timestamp: 2011-01-28 23:19:46.828700`

    `    Extract Trail: dirdat/l1`


    You should run the `info` command several times and compare the output, specifically
    the values for the Write Checkpoint. Look for the highest Write Checkpoint # in
    each command output and make sure the RBA and timestamp are increasing. Run the
    same commands for the data-pump Extracts.


    If the Write Checkpoint values are increasing for the Local Extract and *not*
    for the data-pump Extract, then there is a network bottleneck for the data-pump
    Extract. The Local Extract is able to process data, but the data pump is bottlenecked.
    Eventually the data-pump Extract backs up with transactions due to the network
    bottleneck and runs out of internal memory and then abends.


    You can also run commands on the Replicat to confirm there is a network bottleneck.
    The following example runs a `status` command on the Replicat as shown in the
    following example:


    `GGSCI (targetserver) > send replicat RHREMD1, status`


    `Sending STATUS request to REPLICAT RHREMD1 ...`

    `  Current status: At EOF`

    `  Sequence #: 17`

    `  RBA: 2852`

    `  0 records in current transaction`


    In the example, the Replicat is in At EOF. If the Replicat is At EOF and the Local
    Extract is processing data, you know there is a bottleneck with the data pump
    and the network. The Local Extract is extracting changes, but there is nothing
    for the Replicat to process because of the network bottleneck. Keep in mind that
    the Replicat will continue processing normally for a while if there is any leftover
    data in the target trail file until it hits the end of file. Then it will stop
    processing because it isn''t receiving data over the network in the target trail
    file from the data pump.


    You can take several tuning approaches to help alleviate network performance issues.
    The first approach is to create parallel data pumps, as covered earlier in this
    chapter. Parallel data pumps alleviate any network bandwidth limitations caused
    by using a single data-pump process. Second, you can adjust some additional network
    tuning options on the `RMTHOST` parameter. You see those next.


    #### Tuning the RMTHOST Parameter


    The default GoldenGate TCP socket buffer size is 30,000 bytes. By increasing this
    buffer size, you can send larger packets of data over the network. The *Oracle
    GoldenGate Windows and UNIX Reference Guide* has a sample formula to help calculate
    the optimum TCP socket buffer size. You should also check your specific server
    limitations for maximum TCP buffer size. For example, on Linux you can check the
    following settings to determine the maximum TCP transmit and receive buffer sizes:


    `net.core.rmem_max = 262144`

    `net.core.wmem_max = 262144`


    In this example, the transmit and receive buffers are set to 256KB. You can check
    with your server and network administrator to determine if these sizes can be
    adjusted higher, such as 4MB, to allow GoldenGate to take advantage of higher
    TCP buffer sizes. GoldenGate can utilize larger TCP buffer sizes if you add an
    option to the `RMTHOST` parameter as shown in the following example:


    `RmtHost targetserver, MgrPort 7809, TCPBUFSIZE 100000`


    This example customizes the TCP buffer size to 100,000 bytes in the data-pump
    Extract to try to improve performance by sending larger TCP packets. Another network
    tuning option of the `RMTHOST` parameter is the `COMPRESS` option, as shown in
    the following example:


    `RmtHost targetserver, MgrPort 7809, TCPBUFSIZE 100000, COMPRESS`


    Using `COMPRESS`, GoldenGate compresses outgoing blocks of data over the network
    and then decompresses the data before writing it to the trail. According to the
    GoldenGate Reference manual, compression ratios of 4:1 or greater are possible.
    Keep in mind, the compress and uncompress add some CPU overhead to your servers.


    #### Tuning the Database


    This book doesn''t spend a great deal of time covering general database tuning,
    but it''s safe to say a poorly tuned database will negatively impact GoldenGate
    performance. This is especially true on the Replicat side where GoldenGate is
    executing actual database DML statements to change the data. You should ensure
    that your database is tuned properly prior to turning on GoldenGate. There are
    a few major areas you can check to help ensure proper Replicat performance on
    the target database:


    *   Verify that the target tables used by GoldenGate have unique keys and SQL
    indexes are created on those keys.

    *   Verify that database optimizer statistics are kept up to date to ensure that
    the database chooses the most efficient SQL execution plans.

    *   Make sure the database tables that are the target of replication aren''t overly
    fragmented. If so, they should be reorganized to eliminate the fragmentation.

    *   Run database performance reports such as AWR for Oracle database and verify
    there are no major performance issues.


    ### Summary


    This chapter covered a basic methodology for tuning GoldenGate replication. It
    reviewed capturing baselines of GoldenGate performance statistics to help you
    determine when you have a performance issue and how it can best be resolved. You
    then saw some specific approaches and examples of tuning GoldenGate by using strategies
    such as parallel processing groups and using GoldenGate parameters like `BATCHSQL`
    and `GROUPTRANSOPS`.


    ## C H A P T E R  8


    ## **Monitoring Oracle GoldenGate**


    GoldenGate has a lot of moving parts that depend on other systems to operate properly.
    The goal for replication is to replicate data from source to target in real time
    without losing any data. Every system is different and has different strengths
    and weaknesses. You can monitor the weak points, but sometimes you may also want
    to monitor the strong points even though they rarely break. As Murphy''s Law says,
    “Anything that can go wrong, will go wrong.” The cost of fixing a problem may
    be much more than the expense of implementing a good monitoring system. With a
    good monitoring system, you can reduce downtime due to errors, or even stop problems
    before they occur.


    This chapter goes over some scenarios that illustrate what can go wrong in the
    GoldenGate data-propagation chain. Next, it discusses different ways to detect
    and identify errors. Finally, it presents some automated scripts that can make
    your life easier. This chapter teaches you how to identify issues and gives you
    some basic ideas on how to resolve them. To learn about advanced troubleshooting,
    fixing issues, and using tuning techniques, please refer the [chapter 7](#Chapter07.html#ch7),
    [11](#Chapter11.html#ch11) and [14](#Chapter14.html#ch14) of this book.'
  trans: "\n## 第 8 章：监控 Oracle GoldenGate\n\n### 调优网络\n\n根据你的复制环境中数据变更的数量，Extract（抽取进程）可能会通过网络向\
    \ Replicat（复制进程）发送大量数据以供处理。源端与目标端之间的网络性能对于 GoldenGate 的整体性能至关重要。如前所述，你可以使用诸如 Windows\
    \ 系统监视器或 Linux 上的 `netstat` 命令等工具来收集网络统计数据。你可以将这些数据与基线网络统计数据进行比较，以确定你遇到的是持续的性能问题还是仅仅是一个临时的峰值。\n\
    \n除了服务器命令，你也可以查看 GoldenGate 本身，看看是否是网络问题导致了性能瓶颈。让我们通过一个示例，了解如何使用 GoldenGate 命令检测网络瓶颈。\n\
    \n首先，让我们在本地 Extract 上运行一个 `info` 命令。输出的一部分如下例所示：\n\n```\nGGSCI (sourceserver)\
    \ > info ext LHREMD1, showch 10\n...\nWrite Checkpoint #1\n\n  GGS Log Trail\n\
    \n  Current Checkpoint (current write position):\n    Sequence #: 11\n    RBA:\
    \ 977\n    Timestamp: 2011-01-28 23:19:46.828700\n    Extract Trail: dirdat/l1\n\
    ```\n\n你应该多次运行 `info` 命令并比较输出，特别是 Write Checkpoint（写入检查点）的值。观察每次命令输出中的最高 Write\
    \ Checkpoint #，并确保 RBA 和时间戳是递增的。对数据泵 Extract（data-pump Extract）运行相同的命令。\n\n如果本地\
    \ Extract 的 Write Checkpoint 值在增加，而数据泵 Extract 的*没有*增加，那么说明数据泵 Extract 存在网络瓶颈。本地\
    \ Extract 能够处理数据，但数据泵遇到了瓶颈。最终，由于网络瓶颈，数据泵 Extract 会因事务积压而耗尽内部内存，然后异常终止（abends）。\n\
    \n你也可以在 Replicat 上运行命令来确认是否存在网络瓶颈。下例在 Replicat 上运行了一个 `status` 命令：\n\n```\nGGSCI\
    \ (targetserver) > send replicat RHREMD1, status\n\nSending STATUS request to\
    \ REPLICAT RHREMD1 ...\n  Current status: At EOF\n  Sequence #: 17\n  RBA: 2852\n\
    \  0 records in current transaction\n```\n\n在此示例中，Replicat 处于 At EOF（位于文件末尾）状态。如果\
    \ Replicat 处于 At EOF 状态，而本地 Extract 正在处理数据，那么你就知道瓶颈出在数据泵和网络上。本地 Extract 正在抽取变更数据，但由于网络瓶颈，Replicat\
    \ 没有数据可以处理。请记住，如果目标跟踪文件中遗留有任何数据，Replicat 会继续正常处理一段时间，直到它到达文件末尾。然后它将停止处理，因为它没有通过网络从数据泵接收到目标跟踪文件中的新数据。\n\
    \n你可以采取几种调优方法来帮助缓解网络性能问题。第一种方法是创建并行数据泵，如本章前面所述。并行数据泵可以缓解因使用单个数据泵进程而导致的任何网络带宽限制。其次，你可以在\
    \ `RMTHOST` 参数上调整一些额外的网络调优选项。我们接下来就来看看这些选项。\n\n### 调优 RMTHOST 参数\n\n默认的 GoldenGate\
    \ TCP 套接字缓冲区大小为 30,000 字节。通过增加此缓冲区大小，你可以通过网络发送更大的数据包。*《Oracle GoldenGate Windows\
    \ and UNIX 参考指南》* 提供了一个示例公式来帮助计算最佳的 TCP 套接字缓冲区大小。你还应该检查你的特定服务器对于最大 TCP 缓冲区大小的限制。例如，在\
    \ Linux 上，你可以检查以下设置来确定最大 TCP 发送和接收缓冲区大小：\n\n```\nnet.core.rmem_max = 262144\n\
    net.core.wmem_max = 262144\n```\n\n在此示例中，发送和接收缓冲区设置为 256KB。你可以与服务器和网络管理员确认这些大小是否可以调整得更高，例如\
    \ 4MB，以允许 GoldenGate 利用更大的 TCP 缓冲区大小。如果你向 `RMTHOST` 参数添加一个选项，GoldenGate 可以利用更大的\
    \ TCP 缓冲区大小，如下例所示：\n\n```\nRmtHost targetserver, MgrPort 7809, TCPBUFSIZE 100000\n\
    ```\n\n此示例将数据泵 Extract 中的 TCP 缓冲区大小自定义为 100,000 字节，试图通过发送更大的 TCP 数据包来提高性能。`RMTHOST`\
    \ 参数的另一个网络调优选项是 `COMPRESS` 选项，如下例所示：\n\n```\nRmtHost targetserver, MgrPort 7809,\
    \ TCPBUFSIZE 100000, COMPRESS\n```\n\n使用 `COMPRESS`，GoldenGate 会压缩通过网络发送的出站数据块，然后在写入跟踪文件之前解压缩数据。根据\
    \ GoldenGate 参考手册，压缩比可能达到 4:1 或更高。请注意，压缩和解压缩会增加服务器的一些 CPU 开销。\n\n### 调优数据库\n\n\
    本书不会花大量篇幅讨论通用的数据库调优，但可以肯定的是，调优不佳的数据库会对 GoldenGate 性能产生负面影响。在 Replicat 端尤其如此，因为\
    \ GoldenGate 在那里执行实际的数据库 DML 语句来更改数据。在启用 GoldenGate 之前，你应该确保数据库已得到适当调优。你可以检查几个主要方面，以帮助确保目标数据库上\
    \ Replicat 的性能良好：\n\n*   验证 GoldenGate 使用的目标表具有唯一键，并且已为这些键创建了 SQL 索引。\n*   验证数据库优化器统计信息是最新的，以确保数据库选择最高效的\
    \ SQL 执行计划。\n*   确保作为复制目标的数据库表没有过度碎片化。如果有，应进行重组以消除碎片。\n*   运行数据库性能报告，例如 Oracle\
    \ 数据库的 AWR，并验证没有重大的性能问题。\n\n### 总结\n\n本章介绍了调优 GoldenGate 复制的基本方法。它回顾了捕获 GoldenGate\
    \ 性能统计数据基线，以帮助你确定何时出现性能问题以及如何最好地解决问题。然后，你看到了一些具体的调优方法和示例，例如使用并行处理组策略以及使用 `BATCHSQL`\
    \ 和 `GROUPTRANSOPS` 等 GoldenGate 参数。\n\n### 监控 Oracle GoldenGate\n\nGoldenGate\
    \ 有很多依赖其他系统才能正常运行的组成部分。复制的目标是将数据从源端实时复制到目标端而不丢失任何数据。每个系统都是不同的，具有不同的优点和缺点。你可以监控薄弱点，但有时你可能也希望监控那些很少出问题的强点。正如墨菲定律所说：“凡是可能出错的事，就一定会出错。”\
    \ 解决问题的成本可能远高于实施一个良好监控系统的费用。拥有一个良好的监控系统，你可以减少因错误导致的停机时间，甚至可以在问题发生之前就阻止它们。\n\n\
    本章介绍了一些场景，说明了 GoldenGate 数据传播链中可能出现的问题。接着，讨论了检测和识别错误的不同方法。最后，提供了一些可以使你的工作更轻松的自动化脚本。本章教你如何识别问题，并为你提供一些关于如何解决问题的基本思路。要了解高级故障排除、问题修复和调优技术，请参阅本书的第\
    \ 7 章、第 11 章和第 14 章。\n"
- fmt: '### Designing a Monitoring Strategy


    You need to master two factors in order to design a comprehensive monitoring strategy:


    *   *Internal factor:* You need to understand how `GoldenGate` works internally.
    You should have full control as a `GoldenGate` administrator. If something wrong
    within the `GoldenGate` system, you should be able to identify the issue and fix
    it yourself.

    *   *External factor:* These are the systems that `GoldenGate` depends on. In
    large organizations, you may not have full access to these systems, such as sophisticated
    network-, server-, and storage-monitoring tools and utilities. In some cases,
    you can''t even access the database-monitoring tools if you aren''t a `DBA`. But
    you don''t need to have full access to these systems to monitor your `GoldenGate`
    processes. This chapter discusses the available monitoring techniques that are
    available to `GoldenGate` administrators.


    In addition to these factors, you also need to identify all the possible ways
    that `GoldenGate` can break. The possible monitoring points for a simple `GoldenGate`
    configuration are shown in [Figure 8-1](#Chapter08.html#fig_8_1); this chapter
    covers each of them. If you can manage a simple configuration, you can manage
    a complex configuration. The number of moving parts in the `GoldenGate` system
    doesn''t matter—you just need to add more monitoring to each additional component.
    For example, with an active-active configuration, you need to replicate the monitoring
    activities on monitor points 1 to 7 in [Figure 8-1](#Chapter08.html#fig_8_1) from
    the source side to the target side. You also need to do the same thing on the
    target side for monitor points 7 to 13. If you add an additional data-pump process,
    then you need to add a monitor to points 2, 3, 4, and 7 on the source side and
    the corresponding points at the target. However, this is the logical view. The
    actual number of scripts may vary. For example, one script may have a birds-eye
    view of `GoldenGate`''s overall health.


    ![images](images/0801.jpg)


    **Figure 8-1.** Potential `GoldenGate` monitor points


    Each `Extract` process has a database connection querying the database dictionary
    to check if there is any change. If changes occur, `Extract` process reads the
    online redo log to capture the changes and writes to the trail file. If the data
    isn''t in the online redo log, it reads the archived log. If the data isn''t in
    the archived log, `Extract` process reads the alternative archived log if you
    specify `ALTARCHIVELOGDEST <path name>` in the `Extract` parameter files. If `Extract`
    process still can''t find the transaction with the correct Commit Sequence Number
    (`CSN`), `Extract` process abends and tells you the missing file sequence number.


    ![images](images/square.jpg) **Note** The `CSN` is `GoldenGate` specific; each
    database system has its own way of tracking the commit sequence. Oracle uses the
    System Change Number (`SCN`), `DB2 z/OS` uses the relative byte address (`RBA`),
    MySQL uses `LogNum`, and so forth.


    #### Why Monitoring the Extract Is Important


    In Oracle, the `Extract` relies on the Oracle redo log to work. Online redo logs
    are converted to archived logs after the last entry is written, for a database
    in archivelog mode. In some systems, the `DBA` may compress and move the archived
    logs to other locations that aren''t accessible to `GoldenGate`. If the `Extract`
    is down for long period of time and the archived log isn''t accessible, then you
    lose data. In mission-critical environments, you need to monitor your `Extract`
    process closely.


    In normal database systems, `GoldenGate` trail files use only around 30% or less
    of the overall redo log file. The other 70% of the redo data are system-related
    logs that aren''t needed for `GoldenGate`. So, for example, if you store the trail
    files for two weeks in case of a disaster, the total trail files size for two
    weeks is `<daily total redo size> × 0.3 × 14`. You need around four times the
    total daily redo size to store the entire two weeks of change-log data. Two weeks
    of outage is very rare on major database systems. Therefore, as long as the `Extract`
    process can generate the trail files, the `Replicat` will load them.


    #### Getting the Maximum Threshold


    It''s important to get the maximum threshold for how much `GoldenGate` can transfer
    through the network. For example, if `GoldenGate` has to be down for 5 hours due
    to a scheduled outage, you need to know how long it will take `GoldenGate` to
    catch up to zero lag. To do this, you can stop the data pump for a few hours and
    then restart it. You can use the `stats` command at the `GoldenGate` Software
    Command Interface (`GGSCI`) prompt to calculate the number of operations. In addition,
    you can check the accumulated file size and consumption rates. You see how to
    do that later in this chapter.


    ### Which Processes to Monitor in the GoldenGate Environment


    This chapter uses `Extract EXTGGS1`, `Data Pump DPGGS1`, and `Replicat REPGGS1`
    for demonstration purposes. It''s a simple one-way extract. `GoldenGate` processes
    use `CSN`, `seqno` and `RBA` to connect and sequence each process together. `CSN`,
    `seqno` and `RBA` are the tools to identify the lag in `GoldenGate` Environments.
    If you know exactly where the lags are, then you can put more monitoring in that
    process.


    As mentioned earlier, Oracle `GoldenGate` uses `CSN`s to track the commit order.
    Each database system has its own unique serial number; refer to the Oracle `GoldenGate`
    Administration Guide for a complete list of `CSN`s. The `CSN` is also associated
    with the timestamp.


    ![images](images/square.jpg) **Note** In a Real Application Clusters (`RAC`) environment,
    it''s very important to have all the clustered servers in the exact same timestamp.
    Otherwise, you get an “incompatible records with `SCN` mismatch error.” If you
    get this error, either you lose the data or you need to use the `Logdump` utility
    to identify the problem records and patch the data manually.


    In addition to the `CSN`, `seqno` also plays an important role in monitoring and
    troubleshooting. `Seqno` is the sequence number for the trail files; each type
    of trail file has its own sequence number. For example, `seqno=100` in the `Extract`
    trail file may not be the same as sequence number 100 in the `Replicate` or data
    pump, even if they''re in the same propagation process. The naming convention
    for the trail file is `aannnnnn`, where `aa` is two characters trail file prefix
    and the six `n`s are the `seqno`. If `GoldenGate` uses up all the available `seqno`
    values, it starts over from `000000`. Technically, you can have a maximum of one
    million trail files. So, set up the trail file size properly if you need to keep
    a lot of trail files.


    The last key metric is the redo log sequence number. Whenever you issue an `alter
    extract begin [now]|[timestamp]` command, `GoldenGate` searches the Oracle data
    dictionary to find out which redo log to begin reading from. If no timestamp is
    given, `GoldenGate` starts from the last checkpoint file. Therefore, it may take
    a while to start up an `Extract`, especially with the `NODYNAMICRESOLUTION` parameter.


    #### Monitoring All Running Processes


    The `info all` `GGSCI` prompt command gives you a good indicator of `GoldenGate`''s
    overall health. As shown here, `Lag` should be 0 and the `Time Since Chkpt` should
    be less than 10 seconds on normal operations. If you have a long lag in your `Extract`,
    the value in the `Lag` column is large or doesn''t decrease:


    ```

    GGSCI  28> info all

    Program        Status           Group            Lag              Time Since Chkpt

    MANAGER    RUNNING

    EXTRACT     RUNNING     DPGGS1       00:00:00      00:00:00

    EXTRACT     RUNNING     EXTGGS1     00:00:00      00:00:04

    REPLICAT    RUNNING     REPGGS1     00:00:00      00:00:09

    ```'
