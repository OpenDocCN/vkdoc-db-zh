- fmt: "# How Veridata Comparison Works\n\nBy default, Veridata comparison activities\
    \ are divided into two steps: initial compares and confirmation compares. Confirmation\
    \ compare is optional if the data is not expected to change during the compare\
    \ or the data is filtered by the partition sql-predicates. Initial compare generates\
    \ an Out-Of-Sync report (`OOS`). The Confirmed-Out-Of-Sync (`COOS`) reports are\
    \ created during the confirmation compare process.\n\nBy default, Veridata compares\
    \ rows literally (value-for-value) for all primary key columns. It uses a hash\
    \ value for all non-key columns to compare. The row hash value is a compressed\
    \ unique digital signature that is used to compare two source values. For example,\
    \ a row length of 2000 bytes can be transposed to 12 bytes hashed value. It is\
    \ not absolute, but the likelihood that two original values are identical is very\
    \ high. This reduces the network traffic from Veridata Agent to Veridata Server.\
    \ Comparison methods can be changed in the Column Mapping screen.\n\n# How Veridata\
    \ Can Help You\n\nYou can use Veridata in so many different ways, it is impossible\
    \ for me to list all of them here. The following are some of the key features\
    \ and benefits:\n\n*   It works seamlessly with data replication tools, such as\
    \ GoldenGate one-way replication and two-way synchronization. GoldenGate just\
    \ captures and delivers the data, but it won’t check the data for you unless you\
    \ add some custom codes to do the validations. Veridata can do two-phase comparison\
    \ that will report the data discrepancies on the bad data and any data that GoldenGate\
    \ skips.\n*   Enhances enterprise data quality among all the systems, where bad\
    \ data can lead to poor decision-making; failed service-level agreements; and\
    \ ultimately, operational, financial, and legal risk. With Veridata validating\
    \ all your business-critical data constantly, you can identify the bad data before\
    \ business users report it. Veridata supports Oracle materialized views, views\
    \ and Veridata specific partition that make it feasible to compare the data in\
    \ different granularities and cardinalities.\n*   Reduces time in data comparison\
    \ because of the high performance. Veridata optimizes the comparison in Extract\
    \ layers in the Agent by using hashed values, then it compares the data in a separate\
    \ server. So it removes the overhead from the source and target databases.\n*\
    \   It is non-intrusive so it enables real-time data comparisons with zero downtime\
    \ on the changing data. We can compare the data between two OLTP systems while\
    \ their data is changing. Veridata will use two-phase confirmation on the data\
    \ synchronizations.\n*   Supports data or database migration projects in both\
    \ initial-copy and real-time sync phases to ensure the data accuracy. We can use\
    \ GoldenGate to do no-downtime migration, but with Veridata running on the background\
    \ to cross-check the data between the source and migrated databases, we don’t\
    \ need to write expensive queries to do the data comparison during any phases\
    \ of the migrations.\n*   Supports cross-database comparison between Oracle, SQL\
    \ Server, Teradata, HP Enscribe, and HP SQL/MP databases.\n*   Easy to use. It\
    \ can be used by both IT and business users. We can set up most of the compares\
    \ without writing a single SQL statement.\n*   It is a standalone tool that is\
    \ not dependent on Oracle GoldenGate. You don’t need to install GoldenGate at\
    \ all to run Veridata.\n*   It has role-based security to control access and protect\
    \ sensitive data.\n*   Selective comparison compares selected columns. It can\
    \ also do incremental compares with appropriate setup.\n*   It has a flexible\
    \ command-line interface to automate and schedule compare jobs.\n\n# Setting Up\
    \ the Veridata Compares\n\nAfter Veridata is installed, you can use the following\
    \ guide to use your own data or the data we use in this chapter. The high-level\
    \ steps are as follows:\n\n1.  Create database connections, source and target.\n\
    2.  Create group, a group of comparing pairs.\n3.  Create compare pairs, what\
    \ tables to compare.\n4.  Create job, to run one or more groups.\n5.  Create profile\
    \ (how you want it to run.) This is optional, as you can use the default profile.\n\
    6.  Run job.\n\n## Creating Database Connections\n\nAfter you log in to the GoldenGate\
    \ Veridata Web, click the Connection Configuration on the left panel as shown\
    \ in [Figure 9-2](#Chapter09.html#fig_9_2), then fill in the following information\
    \ for both source and target. Make sure GoldenGate Veridata agents are installed\
    \ on both database instances.\n\nYou can either use the Wizard to set up the connection\
    \ or use the setup screen as shown in [Figure 9-2](#Chapter09.html#fig_9_2). Use\
    \ defaults for other options for now.\n\n![images](images/0902.jpg)\n\n***Figure\
    \ 9-2.** Connection configuration*\n\n## Setting Up Tables and Data Scripts.\n\
    \nThe following tables and data are used in this tutorial, so you can follow this\
    \ guide. You can also use your own tables. I have created the table using `dba_objects`\
    \ 50 times in the scripts. If your system is fast, you can add more loops in the\
    \ code, so you can see the Running Jobs option in the left panel.\n\n`create table\
    \ big_table_source as select 0 seqno, a.* from dba_objects a where 0=1;`\n`create\
    \ table big_table_target as select 0 seqno, a.* from dba_objects a where 0=1;`\n\
    \nThe following script populates the sample tables on the same database. If you\
    \ want to test the comparison on different data, you have to copy the data to\
    \ another database.\n\n```sql\nCREATE OR REPLACE PROCEDURE populate_big_table\
    \ IS\nBEGIN\n   FOR i IN 1..50\n    LOOP    \n        insert into big_source select\
    \ i, a.* from dba_objects a;\n        insert into big_target select i, a.* from\
    \ dba_objects a;\n        commit;\n    END LOOP;\nEND populate_big_table;\n```\n\
    \n## Creating a Group\n\nIn Group Configuration, add the source and target connections\
    \ to the group. One Group can have many compare pairs and one job has many groups.\
    \ For example, you can break down the group by subject areas, or by schedules.\n\
    \n## Creating Compare Pairs\n\nGoldenGate Compare Pairs is what we need to compare.\
    \ We can compare tables, materialized views, and views. This is the heart of Veridata,\
    \ where the business rules are. It is part of the Group Configurations. You can\
    \ follow the steps below to set up the tables that we want to compare.\n\n![images](images/0903.jpg)\n\
    \n***Figure 9-3.** GoldenGate Group Configuration*\n\nClick the Go to Compare\
    \ Pair Configuration . . . link on the GoldenGate Group Configuration screen as\
    \ shown in [Figure 9-3](#Chapter09.html#fig_9_3). It will take you to the Compare\
    \ Pair Mapping screen as shown in [Figure 9-4](#Chapter09.html#fig_9_4).\n\n![images](images/0904.jpg)\n\
    \n***Figure 9-4.** Compare Pair Mapping*\n\nIn the Compare Pair Mapping screen,\
    \ you can use Manual Mapping to add the compare pairs. After you pick up the compare\
    \ pair, make sure your compare name is in the Compare Pair Detail section. In\
    \ the example shown, `BIG_TABLE_SOURCE=BIG_TABLE_TARGET` is the compare pair name.\
    \ Click the Preview tab to confirm the settings.\n\n## Creating a Job\n\nJobs\
    \ are like shell scripts, they are used to run a series of compare groups. There\
    \ is no built-in scheduler in Veridata, so you use the OS schedulers (crontab,\
    \ Windows schedulers) to run `vericom` command-line jobs. A job name and a group\
    \ are the only required parameters. You can check the group name `big_group_table`\
    \ that you just created in the previous section.\n\n## Creating a Profile\n\n\
    Creating a profile is optional; you can use the default profile for now. We will\
    \ go over this in detail later in the chapter."
