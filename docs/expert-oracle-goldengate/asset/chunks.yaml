  trans: '

    #### 数据同步问题


    尽管您可能希望 Oracle GoldenGate 能自动化数据验证过程，但它并不执行此类检查。不过，您可以实现冲突解决脚本和程序来检查源系统和目标系统之间的数据同步情况。Oracle
    GoldenGate 通过匹配源数据库和目标数据库的主键、唯一键列（或在 Extract 和 Replicat 参数文件的`TABLE`和`MAP`语句中使用`KEYCOLS`选项定义的替代键列）来执行基本检查。


    作为 Oracle GoldenGate 数据库管理职责的一部分，您应定期执行同步外数据检查，以修复同步问题。Veridata 提供了一套工具，用于检查 Oracle
    GoldenGate 环境中的数据同步问题。


    您可能会问，是什么导致了数据同步问题？有几个关键因素：


    *   表缺少键约束

    *   字符集配置问题

    *   列缺失错误

    *   源表和目标表上的提取失败


    #### 表缺少键约束


    Oracle GoldenGate 依赖表键约束来映射源到目标的 DDL 和 DML 活动。如果没有这些键，Oracle GoldenGate 会将所有表列用作键值。这可能导致表中包含相同数据的多行被更新。解决此问题以避免数据重复的一种方法是，在
    Extract 和 Replicat 参数文件的`TABLE`和`MAP`语句中设置`KEYCOLS`选项，并配合`LIMITROWS`选项，以防止更新多行。


    #### 字符集配置问题


    由于 Oracle GoldenGate 使用数据库字符集来执行数据同步任务，您需要确保 Oracle 源和目标字符集相同，以避免同步错误。如果它们不同，则会导致错误。您可以通过查看源和目标
    Oracle 数据库系统上的`NLS_LANG`环境变量来检查字符集。源`NLS_LANG`值必须设置为与目标系统完全相同的字符集。此外，目标 Oracle
    数据库字符集需要设置为源 Oracle 数据库系统的超集。


    #### 列缺失错误


    如果在源和目标之间发现列缺失，Oracle GoldenGate 将无法正确复制数据。其根源有两个方面。第一种情况是，如果在源和目标 Oracle 数据库环境中未正确启用补充数据。对于
    Oracle，您使用`ADD TRANDATA`命令在数据库级别或逐个表的基础上添加所需的补充日志数据。


    列缺失错误的另一个原因是使用`KEYCOLS`参数来执行从源到目标环境的列映射转换时。如果源到目标键列映射不匹配，就会发生错误。您需要确保在`KEYCOLS`定义中包含现有键或唯一列，以解决此错误。


    如果在 Extract 和 Replicat 参数文件中指定的源到目标映射转换中未指定和找到正确的现有键列，那么在这些参数文件中使用的过滤器和函数也会导致这些错误。


    #### 提取失败


    如果源行数据在 Oracle GoldenGate 处理过程中被删除，数据库提取失败会导致数据同步错误。提取失败的另一个根本原因是 Oracle 源和目标环境的
    undo 保留期过期。这导致 Extract 进程正在查找的强制性一致读数据影像消失，最终显示 Oracle Snapshot Too Old 消息。您可以通过向
    Extract 进程组配置添加`FETCHOPTIONS NOUSESNAPSHOT`参数来解决此问题。此参数使 Extract 从表中提取数据，而不是访问
    undo 表空间。


    在确认 Oracle GoldenGate 已处理记录后，您需要移除`FETCHOPTIONS`，以便 Extract 恢复为从 undo 表空间提取数据。您还应该增加源和目标
    Oracle 数据库在 undo 表空间中保留数据的时间。


    ### 总结


    本章为您提供了从整体角度排查 Oracle GoldenGate 问题的技巧和技术。您学习了如何识别和解决因数据库、操作系统和网络配置设置而导致 Oracle
    GoldenGate 处理失败的常见问题。此外，本章还讨论了启用 Oracle GoldenGate 环境跟踪以隔离操作问题根源的方法。更多信息，请访问 My
    Oracle Support：[`http://support.oracle.com`](http://support.oracle.com)。


    ## 灾难恢复复制


    维护灾难恢复数据库有许多可用策略。这些策略包括简单地在异地位置保留数据库备份副本，到数据库级复制，甚至存储镜像。本章将帮助您详细了解如何为维护灾难恢复数据库设置
    GoldenGate 复制解决方案。使用 GoldenGate 进行灾难恢复复制的主要优势是，它可以成为贵组织通用的数据库灾难恢复解决方案。GoldenGate
    适用于许多不同的数据库和平台。使用 GoldenGate，您可以开发标准的灾难恢复流程，并在您的组织中实施，而不管使用何种特定的 DBMS。


    在第 4 章中，您已经设置了基本复制。在本章中，您将在此基本配置基础上，为灾难恢复目的实现一个特定的复制配置。在许多方面，用于灾难恢复的 GoldenGate
    配置与基本复制相似，只是增加了一些增强功能。本章将介绍为灾难恢复设置和配置 GoldenGate 复制。我们将介绍如何处理计划内和计划外中断场景，以及如何使用
    GoldenGate 来最小化停机时间。


    ### 先决条件


    在开始设置灾难恢复复制之前，您需要具备以下先决条件：


    *   第 2 章所述的源和目标服务器上已安装 GoldenGate 软件

    *   源和目标数据库上已创建 GoldenGate 数据库用户 ID

    *   目标数据库服务器的名称或 IP 地址

    *   源和目标上的 GoldenGate 管理器进程已启动并正在运行

    *   从源服务器到目标服务器的 GoldenGate 管理器端口，以及反向的 TCP/IP 网络连接已开放

    *   对灾难恢复复制的业务和技术复制要求有透彻的了解


    对于灾难恢复复制，还有一些重要的额外先决条件：


    *   源和目标服务器上 GoldenGate 软件文件和工作目录的备份

    *   用于在切换或故障转移期间授予应用程序所需的任何对象权限的 SQL 脚本

    *   将应用程序和用户从源服务器移动到目标服务器并再次移回的流程和脚本


    首先，让我们回顾一下灾难恢复复制的要求。了解要求可能是任何复制项目成功的唯一最重要的因素。

    '
- fmt: '## Requirements


    You need to gain a solid understanding of the specific requirements which will
    drive the disaster recovery replication technical design. Here are some of the
    typical requirements and considerations for disaster recovery replication. We''ll
    refer to the source database you are replicating from as the `primary database`
    and the remote target database as the `standby` or `disaster recovery database`.
    The `primary database`, also know as the trusted source, is the active database
    where the application programs connect under normal circumstances.


    Once you define your requirements, you will need to ensure that you can meet these
    requirements using `Oracle GoldenGate` disaster recovery replication.


    *   Keep the `standby database` synchronized with the `primary database`.

    *   The `primary database` will be actively processing changes. For the purposes
    of this chapter, we will assume the `standby database` will be used for read-only
    queries; however, remember that with `GoldenGate` you could allow writes to the
    `standby database` in a bidirectional configuration. If you allow writes to the
    `standby` then you need to handle any data conflicts, as discussed in [Chapter
    5](#Chapter05.html#ch5).

    *   To allow for the fastest recovery time, typically you will want the database
    structures and data in the `standby database` to be identical to the `primary
    database`. However, by using `GoldenGate` you have the flexibility to allow differences
    in your `primary` and `standby databases`. For example, you may decide you only
    want to keep a critical subset of your data for disaster recovery purposes rather
    than the entire database. You can do this with `GoldenGate` filtering as covered
    in [Chapter 5](#Chapter05.html#ch5). For `Oracle` databases, you can also use
    the `GoldenGate DDL replication` feature to keep the database tables synchronized
    as well as the data.

    *   Usually you will want the data in the `primary database` to be kept current
    with the disaster recovery site to within at most a few seconds of difference
    in case of failover. For example, if you were processing financial transactions,
    any lag differences between the `primary` and the `standby` data could be costly.
    This will vary depending on your particular application. For some applications
    you may be able to tolerate the `standby` lagging behind the `primary database`
    for a period of time. Also, there may be some databases which do not need to be
    kept current and only need to be refreshed periodically. In that case, you can
    still set up the same `GoldenGate` configuration we will cover in this chapter,
    but only turn it on as needed.

    *   Fast switchover from the `primary database` to the `standby disaster recovery
    database` for both planned and unplanned outages.

    *   After failover or switchover to the `standby database`, the database roles
    are reversed and it becomes the `primary database`. As needed, the database roles
    can be reversed back to their original configuration at a later time.

    *   After failover or switchover, changes to the `standby database` must be captured
    to allow for synchronization when the `primary database` is returned to the configuration.


    In this chapter, we will show how you can meet these requirements using `GoldenGate`.
    For the examples, we will use the `HR schema` as in the earlier chapters.


    ## Disaster Recovery Replication Topology


    The underlying topology for disaster recovery is `one-way replication`, with some
    enhancements to support disaster recovery, as shown in [Figure 12-1](#Chapter12.html#fig_12_1).
    You may remember from [Chapter 3](#Chapter03.html#ch3), that `one-way replication`
    is the simplest topology and is often used for reporting or query offloading purposes.
    In our case, the `one-way replication` topology will be used for disaster recovery
    purposes. Data is replicated from a single source database, the `primary`, to
    a single target database, the `standby`, in only one direction. Changes to database
    data are only made at the `primary database` and then replicated to the `standby
    database`.


    For disaster recovery, a few enhancements are needed to the basic `one-way replication`
    topology. The `primary database` normally handles application activity except
    in the event of a switchover or failover. We will refer to a switchover as a planned
    outage for things like software maintenance. A failover is an unplanned outage
    where the `primary database` is totally lost for some period of time. During a
    switchover or failover the `standby database` will become the `primary database`.


    In order to meet the disaster recovery requirements we covered in the last section,
    you''ll have to ensure you can quickly and accurately switch the application activity
    from the `primary database` to the `standby database` and back. Also, you must
    capture any database changes made on the `standby database` to resynchronize with
    the `primary database` once it comes back online. We''ve indicated that with a
    dotted line in our illustration in [Figure 12-1](#Chapter12.html#fig_12_1).


    ![images](images/1201.jpg)


    Figure 12-1. Disaster recovery replication topology


    Now let''s look at how to implement the disaster recovery replication requirements
    and topology using `GoldenGate`.


    ## Setup


    Once the prerequisites are complete, setting up disaster recovery replication
    from source to target can be accomplished in two parts and seven total steps,
    as shown in [Figures 12-2](#Chapter12.html#fig_12_2) and [12-3](#Chapter12.html#fig_12_3).


    ![images](images/1202.jpg)


    Figure 12-2. Disaster recovery replication setup, part 1


    The steps are similar to setting up basic `one-way replication`, which we covered
    in [Chapter 4](#Chapter04.html#ch4).


    Part 1 includes the first four steps for setting up replication from the `primary
    database` to the `standby database`. These four steps include initially loading
    the data and then keeping the data synchronized after the initial load. Since
    we already covered these steps and concepts in [Chapter 4](#Chapter04.html#ch4),
    we won''t cover them again here. In the following sections in this chapter we''ll
    provide the `GoldenGate parameter files` and only explain the new concepts for
    disaster recovery where applicable.


    ![images](images/1203.jpg)


    Figure 12-3. Disaster recovery reverse replication setup, part 2


    Part 2, as shown in [Figure 12-3](#Chapter12.html#fig_12_3), includes the last
    three steps for configuring replication back from the `standby database` to the
    `primary`, should it be needed. You will configure, but not start, the replication
    back from the `standby database` to the `primary database`. The three steps for
    setting up replication from the `standby database` to the `primary database` include
    setting up and configuring the `Local Extract`, `data-pump Extract`, and `Replicat`.
    These `Extracts` and `Replicats` will be used later in switchover and failover
    scenarios. The steps in [Figure 12-3](#Chapter12.html#fig_12_3) are described
    as follows:


    1.  Add the `standby Extract`. Configure and add the `standby Extract` to be prepared
    to capture database changes in the event of a switchover or failover. If there
    is an outage, the `standby Local Extract` will already be in place and ready to
    start capturing changes.

    2.  Add the `standby data-pump Extract`. Configure and add the `standby data pump`
    to be prepared to capture changes from the `standby database` in the event of
    an outage on the `primary database`.

    3.  Add the `standby Replicat`. Configure and add the `standby Replicat` to be
    prepared to begin applying changes back to the `primary database` if there is
    an outage.


    Let''s look at each of the disaster recovery replication steps, beginning with
    configuring the `Local Extract` in the next section.'
