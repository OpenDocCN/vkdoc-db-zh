  trans: '

    ## 技巧与窍门


    在多年使用 `GoldenGate` 的过程中，我们积累了许多有用的技巧和窍门。本章将介绍一些您在设置和管理 `GoldenGate` 复制时可以使用的技巧。这些建议应能帮助您以最佳方式快速启动并运行您的环境。请记住，这些技巧基于多种不同的经验，通常能带来最佳效果。然而，不同的系统有不同的需求和要求，因此这些捷径可能不适用于您的具体情况。同时请注意，随着
    `GoldenGate` 和技术的不断发展，这些技巧和窍门也会随之变化。您应始终查阅标准的 `Oracle GoldenGate` 产品文档，这是使用该产品的官方指南。


    ### 需求与规划


    本节重点介绍为 `GoldenGate` 复制设置做准备。这个过程常常被草草了事或完全跳过，这会在日后导致错误，从长远来看最终会花费更多成本。您应确保您的项目投入适当的时间和精力来收集和理解需求，并且所有利益相关者都批准了这些需求。与所有项目一样，仔细规划复制项目有助于确保其成功。


    #### 了解业务目标


    清晰地理解设置 `GoldenGate` 的业务目标非常重要。业务目标驱动着围绕复制设置的许多技术决策。例如，如果业务目标可以通过单向复制而非双向复制来实现，那么技术复杂性就会大大降低。


    您可以从与核心团队成员进行一次非正式的白板讨论开始，回顾提议的复制范围和目标。您甚至可以开始勾勒出高层次的复制场景和流程，以便每个人都能理解其中涉及的内容。之后，您可以将初步的业务目标正式化，与团队成员分享并征求反馈。最后，项目范围和目标应由主要利益相关者审阅并批准。


    以下是一些您可以使用 `GoldenGate` 实现的业务目标示例：


    *   在将 Oracle 数据库从 10g 迁移到 Oracle 11g 时，将停机时间降至最低。

    *   将销售、客户和产品数据整合到一个新的只读数据库中，用于分析和报告。

    *   将密集的查询和报告活动从主 OLTP 数据库中卸载。

    *   在异地保留一个与主数据库同步的副本，用于灾难恢复目的。

    *   为业务用户创建一个企业数据仓库，其中包含从多个异构源数据库集成的近实时数据。

    *   在迁移到新平台时，将停机时间降至最低，同时确保有回退计划可用。


    #### 理解需求


    您需要深入理解将驱动复制技术设计的具体需求。以下是一些影响复制设计的因素：


    *   `源和目标配置：` 描述现有或计划中的源和目标数据库。数据库和操作系统的软件版本是什么？服务器是独立的还是集群的？数据存储如何配置？源和目标数据库的字符集是什么？

    *   `数据时效性：` 数据需要以多快的速度、多高的频率进行更新？可以容忍数据复制中的任何延迟吗？如果不能容忍任何延迟且数据变化量很大，您可能需要在项目中投入更多时间来设计和调整复制，以避免任何延迟。请注意，报告系统通常可以容忍延迟，目标数据不需要与源数据完全同步。

    *   `数据量：` 需要复制多少数据？数据更新的频率如何？您可以检查现有的数据库事务日志文件来确定源数据库中发生的数据变化量。数据变化量会影响源和目标之间的网络带宽要求以及跟踪文件所需的磁盘空间量。

    *   `数据需求：` 您应理解任何独特或特殊的数据需求，以便在 `GoldenGate` 中妥善处理。例如，如果存在触发器，则可能需要在目标数据库中禁用它们。如果需要复制序列，则需要添加特殊参数。某些数据类型可能需要特殊处理或可能不受支持。例如，在
    `GoldenGate 11` 中，`BFILE` 和 `ANYDATA` 等数据类型不受支持。其他数据类型可能受支持但有某些限制。*（请务必查阅 `Oracle
    GoldenGate` 产品文档以获取支持的数据类型列表。）*

    *   `安全需求：` 需要多高的安全性？例如，是否需要加密 `GoldenGate` 正在复制的数据？`GoldenGate` 可以加密存储在跟踪文件中的数据以及从源发送到目标的数据。此外，数据库中的数据是否加密？例如，Oracle
    可以使用称为 `透明数据加密 (TDE)` 的功能对数据库数据进行加密。如果数据库正在使用 `TDE`，`GoldenGate` 需要特殊参数来解密数据以进行复制。最后，`GoldenGate`
    本身在安装和拥有 `GoldenGate` 软件以及在数据库内执行复制时也需要安全性。您需要为此做好计划，并确保您的组织允许 `GoldenGate` 所需的新用户和安全访问权限。

    *   `网络需求：` 描述源和目标之间的网络。是否有任何防火墙需要为复制而开放？距离有多远？复制需要多少带宽，实际可用多少带宽？


    #### 确定拓扑结构


    正如第 3 章“架构”中所讨论的，`GoldenGate` 支持许多不同的拓扑结构。每种拓扑结构都有其独特的要求和复杂性。尽早确定拓扑结构有助于推动技术需求和设计。例如，单向复制拓扑比双向复制设置起来要简单得多。涉及单个源和单个目标数据库的复制比涉及单个源和多个目标数据库的复制更容易设置。


    ### 安装与设置


    现在，让我们来看一些与 `GoldenGate` 安装和设置相关的技巧和窍门。这些建议包括设置用户、指定 `Extract` 和 `Replicat` 参数以及命名标准。


    #### 创建专用用户


    您可能很想直接使用现有的数据库和操作系统用户来运行 `GoldenGate`。但您应该创建专门用于 `GoldenGate` 的操作系统和数据库专用用户。这样做可以确保来自
    `GoldenGate` 用户的任何活动都能被单独跟踪。例如，如果出现数据库性能问题，您可以隔离 `GoldenGate` 数据库用户的活动，以确定是否是它导致了问题。一些示例用户名如
    `gger`、`gguser`、`ggate` 等。


    根据您的平台，`GoldenGate` 用户可能需要一些通常为 DBA 团队保留的高级权限。例如，对于 `Microsoft SQL Server`，`Extract`
    进程需要一个具有 `系统管理员` 角色的用户。您需要根据您组织的安全要求，确定 `GoldenGate` 用户应属于 DBA 团队还是一个独立的团队。如果
    `GoldenGate` 用户 ID 不归 DBA 团队所有，那么 `GoldenGate` 的职责需要根据所需的安全级别在 DBA 团队和 `GoldenGate`
    团队之间进行划分。

    '
- fmt: '#### 加密密码


    在任何安全环境中，您都应该加密 GoldenGate 数据库用户密码。以下示例展示了如何使用 GoldenGate 加密密码 `abc` 并在参数文件中指定它。该示例使用了默认加密密钥，但如果需要，您可以使用特定密钥。


    ```

    GGSCI (server) 1> encrypt password abc

    No key specified, using default key…


    Encrypted password:  AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB

    ```


    确定密钥的加密值后，您可以将其在 Extract 或 Replicat 参数文件中指定，如下例所示。


    ```

    USERID "GGER", PASSWORD "AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB", ENCRYPTKEY default

    ```


    接下来，让我们回顾如何使用专用的 GoldenGate 安装目录。


    #### 创建专用安装目录


    您应该将 GoldenGate 软件安装在其自己独立的目录中，该目录由专用的 GoldenGate 操作系统用户拥有。这可以将 GoldenGate 软件与其他文件分开，并允许快速、轻松地定位和监控它们。由于
    GoldenGate 软件特定于 DBMS 供应商版本，您可能需要根据 DBMS 版本来限定子目录名称。示例安装目录包括用于 Oracle 10 GoldenGate
    安装的 `/gger/ggs/ora10` 和用于 SQL Server 2008 安装的 `c:\ggate\sql2008`。


    #### 使用检查点表


    您应该在目标数据库中添加一个检查点表，以跟踪 Replicat 的检查点。默认情况下，GoldenGate 在磁盘上的文件中跟踪检查点。如果您将检查点文件添加到数据库，GoldenGate
    会将检查点作为 Replicat 事务的一部分，这在某些情况下允许更好的可恢复性。以下示例创建了检查点表：


    ```

    GGSCI (targetserver) 1> dblogin userid gger password abc

    Successfully logged into database.

    ```


    ```

    GGSCI (targetserver) 2> add checkpointtable gger.chkpt

    Successfully created checkpoint table GGER.CHKPT.

    ```


    您应该将 `CHECKPOINTTABLE` 参数添加到 GoldenGate 软件安装目录（例如 `/gger/ggs`）中的 `GLOBALS` 文件中，以便所有
    Replicat 都使用此检查点表，如下所示：


    ```

    CHECKPOINTTABLE gger.chkpt

    ```


    #### 验证字符集


    有时您会在具有不同数据库字符集的数据库之间进行复制。使用 `SETENV` 命令在参数文件中显式设置数据库字符集始终是一个好主意。这样，您就不会意外地从环境设置中拾取可能不正确的默认字符集。


    以下示例展示了如何在 GoldenGate Extract 或 Replicat 参数文件中设置数据库字符集。


    ```

    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)

    ```


    接下来，我们将介绍为 GoldenGate 组件使用命名标准。


    #### 制定命名标准


    为您的 Extract 和 Replicat 组制定命名标准。这样做有助于您一目了然地识别 Extract 或 Replicat 的用途及其运行位置。在需要快速恢复故障复制的问题解决情况下，命名标准尤为重要。目前，Extract
    和 Replicat 组名的长度限制为八个字符。


    以下是您在制定命名标准模式时应包含的一些项目：


    *   进程类型，例如 Extract、Data Pump 或 Replicat

    *   使用该进程的应用程序，例如 payroll、sales 或 billing

    *   进程运行的环境上下文，例如 development 或 production

    *   指示是否存在多个 Extract 或 Replicat 组的标识符


    例如，名为 `RPAYRP1` 的 Replicat 组是在 `production` 环境中运行的针对 `payroll` 应用程序（`PAYR`）的 `第一个
    Replicat`。您可以很容易地看出 `RPAYRP1` 是一个 Replicat，因为首字符是 `R`。结尾的 `P1` 表示在生产环境中运行的第一个
    Replicat。


    也可以为跟踪文件制定命名标准，尽管您仅限于两个字符。您可以使用第一个字符来表示跟踪文件是由本地 Extract 创建还是由数据泵 Extract 创建。第二个字符可以是任何有效的字母或数字。例如，跟踪文件
    `P1` 可用于数据泵跟踪文件。


    #### 使用数据泵


    尽管从技术上讲数据泵 Extract 并非必需，但您几乎总是应该使用数据泵。本地 Extract 可以配置为直接将更改从源服务器发送到远程目标，而无需数据泵。然而，在配置中添加数据泵会引入另一个保护层，将本地
    Extract 与目标网络连接中断或目标本身问题造成的任何干扰隔离开来。


    例如，如果源和目标之间存在网络问题，这可能导致本地 Extract 失败。通过在源和目标之间设置数据泵，本地 Extract 可以继续提取更改，只有数据泵会受到影响。这样，当网络问题解决后，您可以重新启动数据泵并快速处理本地
    Extract 已在跟踪文件中捕获的已排队更改。请记住，数据泵需要一个额外的跟踪文件，因此您应确保在配置中留出一些额外的磁盘空间。


    ### 管理与监控


    本节介绍了一些使管理和监控 GoldenGate 环境更轻松的技巧和窍门。通过利用这些建议，您可以简化 GoldenGate 设置的日常管理，并确保其保持平稳运行。'
  raw: '#### Encrypting Passwords


    You should encrypt the GoldenGate database user passwords in any secured environment.
    The following example shows how to use GoldenGate to encrypt the password *abc*
    and specify it in the parameter file. The example uses a default encryption key,
    but you can use a specific key if needed.


    `GGSCI (server) 1> encrypt password abc`

    `No key specified, using default key…`


    `Encrypted password:  AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB`


    After you determine the encrypted value for the key, you can specify it in the
    Extract or Replicat parameter file as shown in the following example.


    `USERID "GGER", PASSWORD "AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB", ENCRYPTKEY default`


    Next let''s review using a dedicated GoldenGate installation directory.


    #### Creating a Dedicated Installation Directory


    You should install the GoldenGate software in its own separate directory, which
    is owned by the dedicated GoldenGate operating-system user. This keeps the GoldenGate
    software and other files separate and allows them to be located and monitored
    quickly and easily. Because the GoldenGate software is specific to a DMBS vendor
    release, you may want to qualify the subdirectory by the DBMS release. Example
    installation directories are `/gger/ggs/ora10` for an Oracle 10 GoldenGate installation
    and `c:\ggate\sql2008` for a SQL Server 2008 installation.


    #### Using a Checkpoint Table


    You should add a checkpoint table in your target database to keep track of checkpoints
    for your Replicats. By default, GoldenGate keeps track of checkpoints in a file
    on disk. If you add a checkpoint file to the database, GoldenGate makes the checkpoint
    part of the Replicat transaction, which permits better recoverability in some
    situations. The following example creates the checkpoint table:


    `GGSCI (targetserver) 1> dblogin userid gger password abc`

    `Successfully logged into database.`


    `GGSCI (targetserver) 2> add checkpointtable gger.chkpt`


    `Successfully created checkpoint table GGER.CHKPT.`


    You should add the `CHECKPOINTTABLE` parameter to your `GLOBALS` file in the GoldenGate
    software installation directory (for example `/gger/ggs`) so the checkpoint table
    is used for all of your Replicats as shown here:


    `CHECKPOINTTABLE gger.chkpt`


    #### Verifying the Character Sets


    Sometimes you replicate between databases with different database character sets.
    It’s always a good idea to explicitly set the database character set inside the
    parameter file using the `SETENV` command. This way, you won’t accidentally pick
    up a default character set from your environment settings that may be incorrect.


    The following example shows how to set the database character set in the GoldenGate
    Extract or Replicat parameter file.


    `SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)`


    Next we''ll cover using naming standards for your GoldenGate components.


    #### Developing Naming Standards


    Develop naming standards for your Extract and Replicat groups. Doing so helps
    you identify at a glance what the Extract or Replicat is used for and where it’s
    running. Naming standards are especially important in problem-solving situations
    where you need to get downed replication up and running again quickly. The current
    limitation for Extract and Replicat group names is eight characters.


    Here are some items you should include in the patterns you create for your naming
    standard:


    *   The type of process, such as Extract, Data Pump, or Replicat

    *   The application that is using the process, such as payroll, sales, or billing

    *   The environment context where the process is running, such as development
    or production

    *   An indicator to show if there are multiple Extract or Replicat groups


    For example, a Replicat group named RPAYRP1 is the *first* *Replicat* for the
    *payroll* application (PAYR) running in *production*. You can easily tell RPAYRP1
    is a Replicat, because the first character is an *R*. The *P1* at the end indicates
    the first Replicat running in the production environment.


    Naming standards can also be developed for trail files, although you’re limited
    to only two characters. You can use the first character to indicate whether a
    trail was created by the local Extract or by the data-pump Extract. The second
    character can be any valid letter or number. For example, trail P1 can be used
    for a data-pump trail.


    #### Using a Data Pump


    Although technically a data-pump Extract isn’t necessary, you should almost always
    use a data pump. The local Extract can be configured to send changes directly
    from the source server to the remote target without a data pump. Adding a data
    pump to the configuration, however, introduces another protective layer to insulate
    the local Extract from any disruptions caused by the network connection to the
    target or from a problem with the target itself.


    For example, if there was a network issue between the source and the target, this
    could cause the local Extract to fail. By having a data pump between the source
    and the target, the local Extract can continue to extract changes, and only the
    data pump is impacted. This way, when the network issue is resolved, you can restart
    the data pump and quickly process the queued changes that the local Extract has
    already captured in the trail. Keep in mind that the data pump requires an extra
    trail file, so you should make sure to allow some extra disk space in your configuration.


    ### Management and Monitoring


    This section covers some tips and tricks that make it easier to manage and monitor
    your GoldenGate environment. By utilizing these suggestions, you can simplify
    the day-to-day management of your GoldenGate setup and ensure that it stays up
    and running smoothly.'
