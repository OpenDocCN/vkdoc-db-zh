    \ (updated 1435:45:09 ago)\nLog Read Checkpoint  Oracle Redo Logs\n          \
    \           2011-03-15 21:50:47  Seqno 0, RBA 0\n```\n\n要查看本地和远程跟踪文件的状态和详细信息，您可以输入`INFO\
