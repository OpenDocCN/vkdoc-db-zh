    `Checkpoint Lag       00:00:00 (updated 00:00:31 ago)`

    `VAM Read Checkpoint  2011-04-03 23:15:12.005000`


    The next step is to create and associate the trail files with our extract from
    the previous step. Using `GGSCI` and the `ADD RMTTRAIL` commands, add the trail
    file as shown below.


    `GGSCI (oracledba) 5> add rmttrail ./dirdat/lt,extract extora,megabytes 5`

    `RMTTRAIL added.`

    `GGSCI (oracledba) 6> info rmttrail *`

    `       Extract Trail: ./dirdat/lt`

    `             Extract: EXTORA`

    `               Seqno: 0`

    `                 RBA: 0`

    `           File Size: 5M`


    Create the extract parameter as shown in the following sample parameter file.


    `--`

    `-- Change Capture parameter file to capture`

    `-- EMP and DEPT Changes`

    `--`

    `EXTRACT EXTORA`

    `USERID GGS, PASSWORD “GGS”`

    `RMTHOST localhost, MGRPORT 2000`

    `RMTTRAIL ./dirdat/lt`

    `TABLE GGS.EMP;`

    `TABLE GGS.DEPT;`


    Start the capture process for Oracle on the source system by using the START command
    in GGSCI as shown. For the change capture delivery process, configure the Replicat
    parameter and add the trail files in the normal manner from previous chapter examples.


    SQL Server to Oracle replication is performed in a similar manner to that shown
    earlier for replicating data from Oracle to SQL Server. The main difference is
    that you will create the Extract process groups on the source SQL Server system
    and the Replicat process groups on the Oracle target system.


    ##### MySQL to Oracle Replication


    MySQL is a popular RDBMS platform widely implemented by Internet startup companies,
    media companies, and Internet Service Providers (ISPs) as part of the open standard
    Linux Apache MySQL PHP (LAMP) technology stack. Based on our experiences with
    Oracle GoldenGate customers, they have a need to replicate and migrate their MySQL
    data as they scale up to larger environments and move to Oracle environments,
    as shown in [Table 6-2](#Chapter06.html#tab_6_2).


    ![images](images/t0602.jpg)


    Details on how to configure MySQL to Oracle replication can be found in the online
    Oracle GoldenGate documentation guides available at [`http://otn.oracle.com`](http://otn.oracle.com).


    ##### Teradata to Oracle Replication


    Teradata is one of the key players in the enterprise data warehouse and business
    intelligence market. It scales well and has robust performance. However, lack
    of a built-in native replication feature has been the Achille''s Heel of Teradata.
    As such, it requires Oracle GoldenGate software to perform database replication
    tasks. Many customers have a business need to replicate from Teradata to Oracle
    environments and GoldenGate fulfills this task perfectly.


    [Table 6-3](#Chapter06.html#tab_6_3) provides the currently supported configuration
    of Teradata with Oracle GoldenGate.


    ![images](images/t0603.jpg)


    Details on how to configure Teradata to Oracle replication can be found in the
    online Oracle GoldenGate documentation guides available at [`http://otn.oracle.com`](http://otn.oracle.com).


    ##### Sybase to Oracle Replication


    Sybase was originally a joint venture between Microsoft and Sybase Corporation
    before SQL Server split off from Sybase and Microsoft to become two different
    database products. Sybase has two database products: Sybase IQ and Sybase SQL
    Server. Currently there is no support for Sybase IQ to replicate with Oracle GoldenGate.
    However, replication from Sybase SQL Server is supported with Oracle GoldenGate.
    [Table 6-4](#Chapter06.html#tab_6_4) provides the currently supported versions
    of Sybase with Oracle GoldenGate.


    ![images](images/t0604.jpg)


    Details on how to configure Sybase to Oracle replication can be found in the online
    Oracle GoldenGate documentation guides available at [`http://download.oracle.com/docs/cd/E18101_01/doc.1111/e17806.pdf`](http://download.oracle.com/docs/cd/E18101_01/doc.1111/e17806.pdf).


    ##### IBM DB2 UDB to Oracle Replication


    IBM DB2 UDB provides an enterprise data warehouse and OLTP (Online Transaction
    Processing) database platform for Windows, UNIX, Linux, and mainframe platforms.
    With the advent of Oracle Fusion Middleware popularity and Oracle data warehouse
    capabilities, many IBM customers have a business need to maintain their current
    IBM DB2 database environments while maintaining their Oracle database environments.
    As a result, they have a need for a heterogeneous replication solution to keep
    all of their database environments in sync. Oracle GoldenGate fulfills this key
    requirement. Oracle 11g GoldenGate provides support for the following versions
    of IBM DB2 UDB with Oracle database environments, as shown in [Table 6-5](#Chapter06.html#tab_6_5)..


    ![images](images/t0605.jpg)


    Details on how to configure IBM DB2 UDB to Oracle replication can be found in
    the online Oracle GoldenGate documentation guides available at [`http://download.oracle.com/docs/cd/E18101_01/doc.1111/e17795.pdf`](http://download.oracle.com/docs/cd/E18101_01/doc.1111/e17795.pdf).


    ### Verifying Operational Readiness


    Now that we have set up multiple replication environments with third-party databases
    to move data to Oracle, it''s time to test and verify that the new Oracle GoldenGate
    environments function correctly. We also need to test and measure basic performance
    to ensure that sufficient resources are available to move data to Oracle from
    our different source systems. Operational readiness can be performed by using
    scripts to generate initial loads, perform DML and DDL transactions such as updates,
    deletes, and inserts, as well as using Oracle GoldenGate Veridata to check for
    data synchronization status between source and target heterogeneous environments
    with Oracle GoldenGate. Another way to measure operational readiness for your
    Oracle GoldenGate environments is to use the Oracle GoldenGate Director product
    to check on status for replication between source and target environments.


    ### Summary


    We provided a case study walkthrough on heterogeneous real-time data replication
    to Oracle from third-party database platforms with Oracle GoldenGate. We began
    with some basic installation guidelines and provided sample configuration steps
    along with the required commands to get up and running with minimal time and effort.
    In a large production environment with complex transformations, you would most
    likely need to build out these simple examples with more advanced features such
    as tokens and filters, along with macro libraries to enhance the business requirements
    of your replication environment.


    ## C H A P T E R  7


    ## Tuning


    GoldenGate is a proven high-performance product that replicates data for some
    of the busiest, high-volume applications in the world. To make GoldenGate perform
    efficiently in these types of environments, you need to have a solid understanding
    of how to tune GoldenGate. The process of tuning GoldenGate is similar to many
    software tuning exercises; however, the tuning tools and mechanisms are quite
    different. You should also keep in mind that although GoldenGate has its own tuning
    approaches, its performance depends on the performance of the underlying database,
    server, network, and storage. This chapter gives you an in-depth understanding
    of how to tune GoldenGate replication.


    This chapter reviews a structured methodology for tuning GoldenGate replication
    and digs into each step of the methodology. You then focus on some specific tuning
    strategies and examples you can use to improve the performance of your GoldenGate
    replication environment.'
