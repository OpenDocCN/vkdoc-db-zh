    ##### 报告滚动


    如果一个抽取或复制进程长时间持续运行，您可能会发现报告文件变得相当大。为了控制报告文件的大小，您可以设置 GoldenGate 按日或周为单位自动滚动（切换）报告。以下示例设置报告文件每天凌晨
    1:15 滚动一次。请注意，即使报告已滚动，报告统计信息仍会持续累积，除非您明确使用`STATOPTIONS`参数的`RESETREPORTSTATS`选项来重置它们。


    ## 报告丢弃记录


    在某些情况下，您可能会注意到 GoldenGate 因某种原因无法处理特定记录。这些记录在 GoldenGate 中被称为丢弃记录。例如，您可能更改了表结构却忘记更新
    GoldenGate 配置。这种情况下，GoldenGate 可能会丢弃该表的记录，因为它不了解新的表结构。


    默认情况下，GoldenGate 不会生成丢弃文件来向您展示哪些记录被丢弃。如果您想查看丢弃记录，可以使用`DISCARDFILE`参数指示 GoldenGate
    将它们写入文件。以下示例告诉 GoldenGate 为名为`LHREMD1`的人力资源模式抽取生成一个丢弃文件。同时使用`APPEND`参数将所有新记录追加到丢弃文件中。为了防止丢弃文件变得过大，您可以通过`DISCARDROLLOVER`参数设置每周日凌晨
    2 点对其进行滚动：


    ```

    DiscardFile dirrpt/LHREMD1.dsc, Append

    DiscardRollover at 02:00 ON SUNDAY

    ```


    您可以选择让 GoldenGate 为您本地的抽取、数据泵抽取和复制进程报告丢弃记录。


    ## 清除旧的跟踪文件


    您可以使用`PURGEOLDEXTRACTS`参数指示 GoldenGate 在旧跟踪文件被处理后自动清除它们。虽然您可以为单个抽取和复制添加此参数，但最好将其添加到您的管理器参数文件中，以便为所有抽取和复制集中管理清除操作。


    以下是您可以添加到管理器参数文件中以清除旧跟踪文件的参数示例：


    ```

    PurgeOldExtracts dirdat/*, UseCheckpoints, MinKeepDays 2

    ```


    让我们更仔细地看看这个参数及其选项。首先，您告诉 GoldenGate 清除存储跟踪文件的`dirdat`目录中的抽取文件。`USECHECKPOINTS`选项告诉
    GoldenGate 仅在跟踪文件根据检查点文件被抽取和复制进程完全处理后才删除它们。您几乎总是应该同时指定`USECHECKPOINTS`选项和`PURGEOLDEXTRACTS`参数，否则您的跟踪文件可能在处理之前就被删除。最后，根据`MINKEEPDAYS`选项，跟踪文件在处理后至少保留两天。管理器进程会自动删除任何已完全处理且超过两天的跟踪文件。


    ## 添加自动进程启动和重启


    现在，您可以在管理器参数文件中添加几个参数，以尽量避免抽取和复制进程的停机时间。如下例所示，`AUTOSTART`参数在管理器启动时自动启动所有抽取和复制。此示例使用通配符告诉管理器重启所有抽取和复制。如果需要，您可以指定仅启动单个抽取和复制：


    ```

    AutoStart ER *

    ```


    在某些情况下，抽取或复制会因临时性或间歇性问题（如短暂的网络中断）而失败。如下例所示的`AUTORESTART`参数会在发生此类问题导致失败时自动尝试重启抽取和复制。


    ![images](img/square.jpg) **注意** 请谨慎使用`AUTORESTART`参数。为了确保您不会无意中忽略任何问题，您可能更倾向于让抽取或复制进程失败，然后手动解决问题，而不是使用`AUTORESTART`。`AUTORESTART`最好作为自动解决已知问题的例外情况使用。


    默认情况下，使用`AUTORESTART`时，GoldenGate 会在等待两分钟重启间隔后尝试重启抽取和复制两次。每隔两小时，GoldenGate 会再次尝试。如果需要，您可以调整这些默认值。


    接下来，让我们向数据库添加一个检查点表。


    ## 添加检查点表


    默认情况下，GoldenGate 在磁盘上维护一个检查点文件以跟踪事务处理。此外，您可以在目标数据库中创建一个检查点表。这样做可以让复制进程将检查点本身作为事务处理的一部分，从而在某些情况下实现更好的可恢复性。让我们在目标数据库中添加一个检查点表。


    首先，您需要在`GLOBALS`文件中添加一个条目，以告诉 GoldenGate 检查点文件的名称。通过在`GLOBALS`文件中添加此条目，您告诉 GoldenGate
    为所有复制使用相同的检查点表。您也可以在`ADD REPLICAT`命令中为单个复制添加特定的检查点表：


    ```

    CheckPointTable gger.chkpt

    ```


    ![images](img/square.jpg) **提示** `GLOBALS`文件用于指定适用于整个 GoldenGate 实例的 GoldenGate
    参数，例如`CHECKPOINTTABLE`。`GLOBALS`文件位于 GoldenGate 软件安装目录中（示例中为`/gger/ggs`）。这与抽取和复制参数文件不同，后者位于`dirprm`子目录中。如果`GLOBALS`文件不存在，您可能需要在首次使用时创建它。


    接下来，您在目标数据库中创建检查点表：


    ```

    GGSCI (targetserver) 1> dblogin userid gger password userpw

    Successfully logged into database.


    GGSCI (targetserver) 2> add checkpointtable


    No checkpoint table specified, using GLOBALS specification (gger.chkpt)...


    Successfully created checkpoint table GGER.CHKPT.

    ```


    现在运行另一个检查点命令以验证检查点表是否存在：


    ```

    GGSCI (targetserver) 1> info checkpointtable gger.chkpt


    Checkpoint table GGER.CHKPT created 2011-01-30 22:02:03.

    ```


    以下是基本的抽取和复制参数文件，以及您在本节中引入的更改（以*斜体*显示）。首先我们来看增强后的抽取参数文件：


    ```

    GGSCI (sourceserver) 1> edit params LHREMD1

    Extract LHREMD1

    -------------------------------------------------------------------

    -- 人力资源模式的本地抽取

    -------------------------------------------------------------------

    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)

    USERID GGER@SourceDB, PASSWORD userpw

    ReportCount Every 30 Minutes, Rate

    Report at 01:00

    ReportRollover at 01:15

    DiscardFile dirrpt/LHREMD1.dsc, Append

    DiscardRollover at 02:00 ON SUNDAY

    ExtTrail dirdat/l1

    Table HR.*;

    ```


    接下来是增强后的复制参数文件：


    ```

    GGSCI (targetserver) 1> edit params RHREMD1

    Replicat RHREMD1

    -------------------------------------------------------------------

    -- 人力资源模式的复制

    -------------------------------------------------------------------

    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)

    USERID GGER@TargetDB, PASSWORD userpw

    AssumeTargetDefs

    ReportCount Every 30 Minutes, Rate

    Report at 01:00

    ReportRollover at 01:15

    DiscardFile dirrpt/RHREMD1.dsc, Append

    DiscardRollover at 02:00 ON SUNDAY

    Map HR.*, Target HR.* ;

    ```


    最后，增强后的管理器参数文件如下所示：


    ```

    GGSCI (server) 1> edit params MGR

    -------------------------------------------------------------------

    -- GoldenGate 管理器

    -------------------------------------------------------------------

    port 7840

    AutoStart ER *

    AutoRestart ER *

    PurgeOldExtracts /gger/ggs/dirdat/*, UseCheckpoints, MinKeepDays 2

    ```

    '
- fmt: "# Making the Replication More Secure\n\nThis section discusses a couple of\
    \ items to make your GoldenGate replication environment more secure. First you\
    \ look at encrypting the GoldenGate passwords, and then you examine encrypting\
    \ the GoldenGate trail files. Of course, turning on these features is optional\
    \ and depends on your specific security requirements.\n\n## Encrypting Passwords\n\
    \nYou should encrypt the GoldenGate database user passwords in your parameter\
    \ file in any secured environment. The following example shows how to encrypt\
    \ the password `abc` and specify it in the parameter file. The example uses a\
    \ default encryption key, but you can use a specific key if needed:\n\n```\nGGSCI\
    \ (sourceserver) 1> encrypt password abc\nNo key specified, using default key...\n\
    \nEncrypted password:  AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB\n```\n\nWhen you have\
    \ the value for the encrypted password, you can update your parameter file with\
    \ the value:\n\n```\nUSERID 'GGER', PASSWORD \"AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB\"\
    , ENCRYPTKEY default\n```\n\nIn addition to encrypting passwords, you can encrypt\
    \ the trail files, as you see next.\n\n## Encrypting the Trail Files\n\nIn some\
    \ cases, you may want to encrypt the data stored in the trail files. You can do\
    \ this by adding the `ENCRYPTTRAIL` and `DECRYPTTRAIL` commands to your parameter\
    \ files. Let's look at an example of how you can use encryption for the trail\
    \ files.\n\nYou can encrypt the source trail file created by the local Extract\
    \ as shown next. Note that the `ENCRYPTTRAIL` parameter must come before the trail\
    \ file to be encrypted—in this case, the `l1` trail:\n\n```\nENCRYPTTRAIL\nExtTrail\
    \ dirdat/l1\n```\n\nNow the `l1` source trail file is encrypted. The next step\
    \ is to add encryption parameters to the data-pump Extract. First you must decrypt\
    \ the trail file so it can be processed by the data pump, and then you can re-encrypt\
    \ it as the `l2` remote trail file:\n\n```\nPassThru\nDECRYPTTRAIL\nENCRYPTTRAIL\n\
    RmtHost targetserver, MgrPort 7809\nRmtTrail dirdat/l2\n```\n\nNotice that you\
    \ can still use passthru mode for the data pump even with encrypted trail files.\
    \ The data-pump Extract passes the encrypted trail data over the network and writes\
    \ the encrypted remote trail.\n\nThe last step is for the Replicat to decrypt\
    \ the trail file so it can be processed, as shown in the following example:\n\n\
    ```\nDECRYPTTRAIL\nMap HR.*, Target HR.* ;\n```\n\nLet's take another look at\
    \ your Extract and Replicat parameter files along with the new enhanced security\
    \ changes introduced in this section. First is the enhanced Extract parameter\
    \ file:\n\n```\nGGSCI (sourceserver) 1> edit params LHREMD1\nExtract LHREMD1\n\
    -------------------------------------------------------------------\n-- Local\
    \ extract for HR schema\n-------------------------------------------------------------------\n\
    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)\nUSERID 'GGER', PASSWORD \"AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB\"\
    , ENCRYPTKEY default\nReportCount Every 30 Minutes, Rate\nReport at 01:00\nReportRollover\
    \ at 01:15\nDiscardFile dirrpt/LHREMD1.dsc, Append\nDiscardRollover at 02:00 ON\
    \ SUNDAY\nENCRYPTTRAIL\nExtTrail dirdat/l1\nTable HR.*;\n```\n\nNext is the enhanced\
    \ Replicat parameter file:\n\n```\nGGSCI (targetserver) 1> edit params RHREMD1\n\
    Replicat RHREMD1\n-------------------------------------------------------------------\n\
    -- Replicat for HR Schema\n-------------------------------------------------------------------\n\
    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)\nUSERID 'GGER', PASSWORD \"AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB\"\
    , ENCRYPTKEY default\nAssumeTargetDefs\nReportCount Every 30 Minutes, Rate\nReport\
    \ at 01:00\nReportRollover at 01:15\nDiscardFile dirrpt/RHREMD1.dsc, Append\n\
    DiscardRollover at 02:00 ON SUNDAY\nDECRYPTTRAIL\nMap HR.*, Target HR.* ;\n```\n\
    \nIn the next section, you add specialized filtering and mapping to your replication\
    \ environment.\n\n# Adding Data Filtering and Mapping\n\nYou can use GoldenGate\
    \ to filter the tables, columns, and rows you're replicating. You can also perform\
    \ complex mapping of tables and columns from your source to target databases.\
    \ The following sections look at these topics and use the same sample HR table\
    \ introduced in [Chapter 4](#Chapter04.html#ch4). Following is the layout of the\
    \ table as a reminder:\n\n```\nTable EMPLOYEES\n Name                        \
    \              Null?    Type\n ----------------------------------------- --------\
    \ ----------------------------\n EMPLOYEE_ID  (PK)                         NOT\
    \ NULL NUMBER(6)\n FIRST_NAME                                         VARCHAR2(20)\n\
    \ LAST_NAME                                  NOT NULL VARCHAR2(25)\n EMAIL   \
    \                                   NOT NULL VARCHAR2(25)\n PHONE_NUMBER     \
    \                                   VARCHAR2(20)\n HIRE_DATE                 \
    \                        NOT NULL DATE\n JOB_ID                              \
    \             NOT NULL VARCHAR2(10)\n SALARY                                 \
    \           NUMBER(8,2)\n COMMISSION_PCT                                    NUMBER(2,2)\n\
    \ MANAGER_ID                                        NUMBER(6)\n DEPARTMENT_ID\
    \                                     NUMBER(4)\n```\n\n## Filtering Tables\n\n\
    You may remember from [Chapter 4](#Chapter04.html#ch4) that you instructed GoldenGate\
    \ to extract all the changes for all tables in the HR schema using the following\
    \ Extract parameter:\n\n```\nTable HR.*;\n```\n\nYou did this by using the wildcard\
    \ character asterisk after the schema name, `HR.*`, which tells GoldenGate to\
    \ extract *all* the tables in the HR schema.\n\nNow suppose your business requirements\
    \ have changed and you don't need to extract all the tables in the HR schema.\
    \ You only need to extract the `EMPLOYEES` and `JOBS` tables. You can do this\
    \ by changing the Extract parameters as shown in the following example:\n\n```\n\
    Table HR.EMPLOYEES;\nTable HR.JOBS;\n```\n\nYou removed the wildcard and added\
    \ only the two tables you want to replicate. You may already be wondering whether\
    \ you can accomplish the same thing by filtering using the Replicat instead of\
    \ the Extract. The answer is yes, although there may be advantages to filtering\
    \ using either the Extract or the Replicat, or both; it depends on your requirements\
    \ and specific needs. For example, you may have multiple Replicats as targets\
    \ that require different sets of data from different tables. In that case, it\
    \ may be better to extract the data for all the tables and use each Replicat to\
    \ filter out only the data it needs. Another option is to configure a data-pump\
    \ Extract to do the filtering and send each Replicat only the data it needs. On\
    \ the other hand, if you only need the two tables, it's probably better to filter\
    \ out the data for those at the Extract and send the Replicat only the data it\
    \ needs. You can see that you have to make some important design decisions as\
    \ you configure your replication environment.\n\nAs a reminder, let's review the\
    \ basic Replicat `MAP` parameter from [Chapter 4](#Chapter04.html#ch4). In the\
    \ following parameter example, you replicate all the tables from the HR schema\
    \ using the wildcard character:\n\n```\nMap HR.*, Target HR.* ;\n```\n\nIf you\
    \ want to replicate specific tables, you can filter the tables using the Replicat\
    \ much in the same way you filter them in the Extract. The following example filters\
    \ the tables to replicate only the `EMPLOYEES` and `JOBS` tables:\n\n```\nMap\
    \ HR.EMPLOYEES, Target HR.EMPLOYEES ;\nMap HR.JOBS, Target HR.JOBS ;\n```\n\n\
    In addition to filtering tables, you can also filter columns. Let's look at that\
    \ next."
  raw: '### Making the Replication More Secure


    This section discusses a couple of items to make your GoldenGate replication environment
    more secure. First you look at encrypting the GoldenGate passwords, and then you
    examine encrypting the GoldenGate trail files. Of course, turning on these features
    is optional and depends on your specific security requirements.


    #### Encrypting Passwords


    You should encrypt the GoldenGate database user passwords in your parameter file
    in any secured environment. The following example shows how to encrypt the password
    *abc* and specify it in the parameter file. The example uses a default encryption
    key, but you can use a specific key if needed:


    `GGSCI (sourceserver) 1> encrypt password abc`

    `No key specified, using default key...`


    `Encrypted password:  AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB`


    When you have the value for the encrypted password, you can update your parameter
    file with the value:


    `USERID ''GGER'', PASSWORD "AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB", ENCRYPTKEY default`


    In addition to encrypting passwords, you can encrypt the trail files, as you see
    next.


    #### Encrypting the Trail Files


    In some cases, you may want to encrypt the data stored in the trail files. You
    can do this by adding the `ENCRYPTTRAIL` and `DECRYPTTRAIL` commands to your parameter
    files. Let''s look at an example of how you can use encryption for the trail files.


    You can encrypt the source trail file created by the local Extract as shown next.
    Note that the `ENCRYPTTRAIL` parameter must come *before* the trail file to be
    encrypted—in this case, the l1 trail:


    `ENCRYPTTRAIL`

    `ExtTrail dirdat/l1`


    Now the l1 source trail file is encrypted. The next step is to add encryption
    parameters to the data-pump Extract. First you must decrypt the trail file so
    it can be processed by the data pump, and then you can re-encrypt it as the l2
    remote trail file:


    `PassThru`

    `DECRYPTTRAIL`

    `ENCRYPTTRAIL`

    `RmtHost targetserver, MgrPort 7809`

    `RmtTrail dirdat/l2`


    Notice that you can still use passthru mode for the data pump even with encrypted
    trail files. The data-pump Extract passes the encrypted trail data over the network
    and writes the encrypted remote trail.


    The last step is for the Replicat to decrypt the trail file so it can be processed,
    as shown in the following example:


    `DECRYPTTRAIL`

    `Map HR.*, Target HR.* ;`


    Let''s take another look at your Extract and Replicat parameter files along with
    the new enhanced security changes introduced in this section (shown in italics).
    First is the enhanced Extract parameter file:


    `GGSCI (sourceserver) 1> edit params LHREMD1`

    `Extract LHREMD1`

    `-------------------------------------------------------------------`

    `-- Local extract for HR schema`

    `-------------------------------------------------------------------`

    `SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)`

    *`USERID ''GGER'', PASSWORD "AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB", ENCRYPTKEY default`*

    `ReportCount Every 30 Minutes, Rate`

    `Report at 01:00`

    `ReportRollover at 01:15`

    `DiscardFile dirrpt/LHREMD1.dsc, Append`

    `DiscardRollover at 02:00 ON SUNDAY`

    *`ENCRYPTTRAIL`*

    `ExtTrail dirdat/l1`

    `Table HR.*;`


    Next is the enhanced Replicat parameter file:


    `GGSCI (targetserver) 1> edit params RHREMD1`

    `Replicat RHREMD1`

    `-------------------------------------------------------------------`

    `-- Replicat for HR Schema`

    `-------------------------------------------------------------------`

    `SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)`

    *`USERID ''GGER'', PASSWORD "AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB", ENCRYPTKEY default`*

    `AssumeTargetDefs`

    `ReportCount Every 30 Minutes, Rate`

    `Report at 01:00`

    `ReportRollover at 01:15`

    `DiscardFile dirrpt/RHREMD1.dsc, Append`

    `DiscardRollover at 02:00 ON SUNDAY`

    *`DECRYPTTRAIL`*

    `Map HR.*, Target HR.* ;`


    In the next section, you add specialized filtering and mapping to your replication
    environment.


    ### Adding Data Filtering and Mapping


    You can use GoldenGate to filter the tables, columns, and rows you''re replicating.
    You can also perform complex mapping of tables and columns from your source to
    target databases. The following sections look at these topics and use the same
    sample HR table introduced in [Chapter 4](#Chapter04.html#ch4). Following is the
    layout of the table as a reminder:


    `Table EMPLOYEES`

    ` Name                                      Null?    Type`

    ` ----------------------------------------- -------- ----------------------------`

    ` EMPLOYEE_ID  (PK)                         NOT NULL NUMBER(6)`

    ` FIRST_NAME                                         VARCHAR2(20)`

    ` LAST_NAME                                 NOT NULL VARCHAR2(25)`

    ` EMAIL                                     NOT NULL VARCHAR2(25)`

    ` PHONE_NUMBER                                       VARCHAR2(20)`

    ` HIRE_DATE                                          NOT NULL DATE`

    ` JOB_ID                                             NOT NULL VARCHAR2(10)`

    ` SALARY                                             NUMBER(8,2)`

    ` COMMISSION_PCT                                     NUMBER(2,2)`

    ` MANAGER_ID                                         NUMBER(6)`

    ` DEPARTMENT_ID                                      NUMBER(4)`


    #### Filtering Tables


    You may remember from [Chapter 4](#Chapter04.html#ch4) that you instructed GoldenGate
    to extract all the changes for all tables in the HR schema using the following
    Extract parameter:


    `Table HR.*;`


    You did this by using the wildcard character asterisk after the schema name, `HR.*`,
    which tells GoldenGate to extract *all* the tables in the HR schema.


    Now suppose your business requirements have changed and you don''t need to extract
    all the tables in the HR schema. You only need to extract the EMPLOYEES and JOBS
    tables. You can do this by changing the Extract parameters as shown in the following
    example:


    `Table HR.EMPLOYEES;`

    `Table HR.JOBS;`


    You removed the wildcard and added only the two tables you want to replicate.
    You may already be wondering whether you can accomplish the same thing by filtering
    using the Replicat instead of the Extract. The answer is yes, although there may
    be advantages to filtering using either the Extract or the Replicat, or both;
    it depends on your requirements and specific needs. For example, you may have
    multiple Replicats as targets that require different sets of data from different
    tables. In that case, it may be better to extract the data for all the tables
    and use each Replicat to filter out only the data it needs. Another option is
    to configure a data-pump Extract to do the filtering and send each Replicat only
    the data it needs. On the other hand, if you only need the two tables, it''s probably
    better to filter out the data for those at the Extract and send the Replicat only
    the data it needs. You can see that you have to make some important design decisions
    as you configure your replication environment.


    As a reminder, let''s review the basic Replicat `MAP` parameter from [Chapter
    4](#Chapter04.html#ch4). In the following parameter example, you replicate all
    the tables from the HR schema using the wildcard character:


    `Map HR.*, Target HR.* ;`


    If you want to replicate specific tables, you can filter the tables using the
    Replicat much in the same way you filter them in the Extract. The following example
    filters the tables to replicate only the EMPLOYEES and JOBS tables:


    `Map HR.EMPLOYEES, Target HR.EMPLOYEES ;`

    `Map HR.JOBS, Target HR.JOBS ;`


    In addition to filtering tables, you can also filter columns. Let''s look at that
    next.'
  trans: "\n# 使复制更加安全\n\n本节讨论几个项目，以使您的 GoldenGate 复制环境更加安全。首先探讨如何加密 GoldenGate 密码，然后研究如何加密\
    \ GoldenGate 轨迹文件。当然，启用这些功能是可选的，取决于您的具体安全要求。\n\n## 加密密码\n\n在任何安全环境中，您都应该加密参数文件中的\
    \ GoldenGate 数据库用户密码。以下示例展示了如何加密密码 `abc` 并在参数文件中指定它。该示例使用了默认加密密钥，但如果需要，您可以使用特定密钥：\n\
    \n```\nGGSCI (sourceserver) 1> encrypt password abc\n未指定密钥，使用默认密钥...\n\n加密后的密码：\
    \  AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB\n```\n\n获得加密密码的值后，您可以用该值更新参数文件：\n\n```\nUSERID\
    \ 'GGER', PASSWORD \"AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB\", ENCRYPTKEY default\n\
    ```\n\n除了加密密码，您还可以加密轨迹文件，接下来将看到这一点。\n\n## 加密轨迹文件\n\n在某些情况下，您可能需要加密存储在轨迹文件中的数据。这可以通过在参数文件中添加\
    \ `ENCRYPTTRAIL` 和 `DECRYPTTRAIL` 命令来实现。让我们看一个如何对轨迹文件使用加密的示例。\n\n您可以加密本地 Extract\
    \ 创建的源轨迹文件，如下所示。请注意，`ENCRYPTTRAIL` 参数必须位于要加密的轨迹文件之前——在本例中是 `l1` 轨迹：\n\n```\nENCRYPTTRAIL\n\
    ExtTrail dirdat/l1\n```\n\n现在 `l1` 源轨迹文件已被加密。下一步是向数据泵 Extract 添加加密参数。首先，必须解密轨迹文件以便数据泵可以处理它，然后您可以将其重新加密为\
    \ `l2` 远程轨迹文件：\n\n```\nPassThru\nDECRYPTTRAIL\nENCRYPTTRAIL\nRmtHost targetserver,\
    \ MgrPort 7809\nRmtTrail dirdat/l2\n```\n\n请注意，即使使用了加密轨迹文件，您仍然可以为数据泵使用 passthru\
    \ 模式。数据泵 Extract 通过网络传递加密的轨迹数据，并写入加密的远程轨迹。\n\n最后一步是让 Replicat 解密轨迹文件以便处理，如以下示例所示：\n\
    \n```\nDECRYPTTRAIL\nMap HR.*, Target HR.* ;\n```\n\n让我们结合本节介绍的新增强安全更改，再看一下您的\
    \ Extract 和 Replicat 参数文件。首先是增强的 Extract 参数文件：\n\n```\nGGSCI (sourceserver) 1>\
    \ edit params LHREMD1\nExtract LHREMD1\n-------------------------------------------------------------------\n\
    -- 针对 HR 模式的本地 Extract\n-------------------------------------------------------------------\n\
    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)\nUSERID 'GGER', PASSWORD \"AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB\"\
    , ENCRYPTKEY default\nReportCount Every 30 Minutes, Rate\nReport at 01:00\nReportRollover\
    \ at 01:15\nDiscardFile dirrpt/LHREMD1.dsc, Append\nDiscardRollover at 02:00 ON\
    \ SUNDAY\nENCRYPTTRAIL\nExtTrail dirdat/l1\nTable HR.*;\n```\n\n接下来是增强的 Replicat\
    \ 参数文件：\n\n```\nGGSCI (targetserver) 1> edit params RHREMD1\nReplicat RHREMD1\n\
    -------------------------------------------------------------------\n-- 针对 HR\
    \ 模式的 Replicat\n-------------------------------------------------------------------\n\
    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)\nUSERID 'GGER', PASSWORD \"AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB\"\
    , ENCRYPTKEY default\nAssumeTargetDefs\nReportCount Every 30 Minutes, Rate\nReport\
    \ at 01:00\nReportRollover at 01:15\nDiscardFile dirrpt/RHREMD1.dsc, Append\n\
    DiscardRollover at 02:00 ON SUNDAY\nDECRYPTTRAIL\nMap HR.*, Target HR.* ;\n```\n\
    \n在下一节中，您将向复制环境添加专门的过滤和映射。\n\n# 添加数据过滤和映射\n\n您可以使用 GoldenGate 来过滤您正在复制的表、列和行。您还可以对从源数据库到目标数据库的表和列执行复杂的映射。接下来的部分将探讨这些主题，并使用\
    \ 第 4 章 介绍的相同示例 HR 表。作为提醒，以下是该表的布局：\n\n```\nTable EMPLOYEES\n Name           \
    \                           Null?    Type\n -----------------------------------------\
    \ -------- ----------------------------\n EMPLOYEE_ID  (PK)                  \
    \       NOT NULL NUMBER(6)\n FIRST_NAME                                      \
    \   VARCHAR2(20)\n LAST_NAME                                  NOT NULL VARCHAR2(25)\n\
    \ EMAIL                                      NOT NULL VARCHAR2(25)\n PHONE_NUMBER\
    \                                        VARCHAR2(20)\n HIRE_DATE            \
    \                             NOT NULL DATE\n JOB_ID                         \
    \                  NOT NULL VARCHAR2(10)\n SALARY                            \
    \                NUMBER(8,2)\n COMMISSION_PCT                                \
    \    NUMBER(2,2)\n MANAGER_ID                                        NUMBER(6)\n\
    \ DEPARTMENT_ID                                     NUMBER(4)\n```\n\n## 过滤表\n\
    \n您可能还记得 第 4 章 中，您使用以下 Extract 参数指示 GoldenGate 提取 HR 模式中所有表的所有更改：\n\n```\nTable\
    \ HR.*;\n```\n\n您通过在模式名后使用通配符星号 `HR.*` 来实现这一点，这告诉 GoldenGate 提取 HR 模式中的 *所有* 表。\n\
    \n现在假设您的业务需求发生了变化，您不需要提取 HR 模式中的所有表。您只需要提取 `EMPLOYEES` 和 `JOBS` 表。您可以通过更改 Extract\
    \ 参数来实现，如下例所示：\n\n```\nTable HR.EMPLOYEES;\nTable HR.JOBS;\n```\n\n您移除了通配符，只添加了您想要复制的那两个表。您可能已经想过，是否可以通过使用\
    \ Replicat 而不是 Extract 过滤来实现同样的效果。答案是肯定的，尽管在 Extract、Replicat 或两者中进行过滤可能各有优势；这取决于您的需求和具体情况。例如，您可能有多个目标端\
    \ Replicat，它们需要来自不同表的不同数据集。在这种情况下，提取所有表的数据，然后让每个 Replicat 仅过滤出它需要的数据可能更好。另一种选择是配置一个数据泵\
    \ Extract 来执行过滤，并仅将每个 Replicat 需要的数据发送给它。另一方面，如果您只需要那两个表，可能更好的做法是在 Extract 端过滤掉这些表的数据，仅将\
    \ Replicat 需要的数据发送给它。您可以看到，在配置复制环境时，必须做出一些重要的设计决策。\n\n作为提醒，让我们回顾一下 第 4 章 中的基本\
    \ Replicat `MAP` 参数。在以下参数示例中，您使用通配符复制 HR 模式中的所有表：\n\n```\nMap HR.*, Target HR.*\
    \ ;\n```\n\n如果您想复制特定的表，可以使用 Replicat 以与在 Extract 中过滤类似的方式进行表过滤。以下示例过滤表，仅复制 `EMPLOYEES`\
    \ 和 `JOBS` 表：\n\n```\nMap HR.EMPLOYEES, Target HR.EMPLOYEES ;\nMap HR.JOBS, Target\
    \ HR.JOBS ;\n```\n\n除了过滤表，您还可以过滤列。接下来让我们看看这一点。\n"
- fmt: "#### Filtering Columns\n\n假设你不希望提取 `EMPLOYEES` 表中的所有列，而只对 `EMPLOYEE_ID`、`FIRST_NAME`\
    \ 和 `LAST_NAME` 列感兴趣。你可以通过向提取（Extract）的 `TABLE` 参数添加以下内容来实现：\n\n```\nTable HR.EMPLOYEES\n\
    COLS (employee_Id, first_name, last_name);\n```\n\n在此示例中，除了 `COLS` 参数中列出的三个列，所有其他列都被忽略。请记住，最好在\
    \ `COLS` 列表中包含主键列；否则 GoldenGate 可能会选择所有标记为键的列，这可能不是好主意。\n\n`Note` 如果你在数据泵（data-pump）提取中使用列过滤，将无法再使用直通（passthru）模式。\n\
    \n列过滤的另一个示例是，你希望提取表中的所有列，*除了*少数几列。假设你希望提取整个 `EMPLOYEES` 表，但排除 `EMAIL` 列。你可以在提取中使用\
    \ `COLSEXCEPT` 参数来实现，如下例所示：\n\n```\nTable HR.EMPLOYEES\nCOLSEXCEPT (email);\n\
    ```\n\n你可能会发现 `COLSEXCEPT` 比使用 `COLS` 更方便、更高效，特别是当你只想从大表中排除少数几列时。请记住，不能使用 `COLSEXCEPT`\
    \ 排除主键列。\n\n除了过滤列，你还可以过滤行。\n\n#### Filtering Rows\n\n过滤行最简单的方法是，在提取（Extract）的\
    \ `TABLE` 语句或复制（Replicat）的 `MAP` 语句中添加一个 `WHERE` 子句。让我们分别看一个示例。首先，在提取中添加过滤条件，仅提取\
    \ `EMPLOYEE_ID` 小于 100 的员工，如下例所示：\n\n```\nTable HR.EMPLOYEES,\nWHERE (EMPLOYEE_ID\
    \ < 100);\n```\n\n现在让我们在复制中添加过滤。假设你决定只复制 IT 程序员的数据。你可以按如下方式在复制中添加该过滤器：\n\n```\n\
    Map HR.EMPLOYEES, Target HR.EMPLOYEES,\nWHERE (JOB_ID = \"IT_PROG\");\n```\n\n\
    `Tip` 过滤数据值时，需要使用双引号。\n\n另一种对数值进行复杂过滤的方法是，在提取或复制中使用 GoldenGate 的 `FILTER` 参数。此外，你可以使用\
    \ `FILTER` 将过滤限制在特定的数据操作语言（DML）语句。以下示例仅过滤月薪大于 1000 的员工：\n\n```\nMap HR.EMPLOYEES,\
    \ Target HR.EMPLOYEES,\nFILTER (SALARY / 12 > 1000);\n```\n\n让我们再看一个基于 DML 操作（如\
    \ `insert`、`update` 或 `delete`）进行过滤的示例。假设你只希望在员工的月薪小于 1000 时复制 `delete` 操作。你可以设置一个过滤器，如下所示，该过滤器仅对\
    \ `delete` 语句执行。此示例使用提取的 `TABLE` 参数进行过滤：\n\n```\nTable HR.EMPLOYEES,\nFILTER (ON\
    \ DELETE, SALARY / 12 < 1000);\n```\n\n你已经看到了 GoldenGate 过滤表、行和列的强大功能的几个示例。现在让我们看一些高级的列映射。\n\
    \n#### Mapping Columns\n\n你可能还记得 [第 4 章](#Chapter04.html#ch4)，复制参数文件使用了 `ASSUMETARGETDEFS`\
    \ 参数。你使用此参数告诉 GoldenGate 你的源表和目标表是相同的。但如果源表和目标表不同呢？GoldenGate 可以轻松处理这些差异，甚至可以在需要时转换数据。\n\
    \n以下是你用作目标表的 `EMPLOYEES` 表的增强版本。在目标数据库中，该表名为 `STAFF`。本节还讨论了另外一些差异：\n\n```\nTable\
    \ STAFF\n Name                                      Null?    Type\n -----------------------------------------\
    \ -------- ----------------------------\n EMPLOYEE_ID  (PK)                  \
    \       NOT NULL NUMBER(6)\n FIRST_NAME                                VARCHAR2(20)\n\
    \ LAST_NAME                                 NOT NULL VARCHAR2(25)\n FULL_NAME\
    \                                 NOT NULL VARCHAR2(46)\n EMAIL              \
    \                       NOT NULL VARCHAR2(25)\n PHONE_NUMBER                 \
    \                    VARCHAR2(20)\n HIRE_DATE                                \
    \ NOT NULL DATE\n JOB_ID                                    NOT NULL VARCHAR2(10)\n\
    \ WAGES                                     NUMBER(8,2)\n COMMISSION_PCT     \
    \                       NUMBER(2,2)\n MANAGER_ID                             \
    \   NUMBER(6)\n DEPARTMENT_ID                             NUMBER(4)\n```\n\n目标数据库表中的列名不是源数据库表中的\
    \ `SALARY`，而是 `WAGES`。你可以按如下示例编写 `MAP` 参数：\n\n```\nMap HR.EMPLOYEES, Target HR.STAFF,\n\
    COLMAP (USEDEFAULTS,\nWAGES = SALARY);\n```\n\n在开始复制之前，你需要生成一个 GoldenGate 数据定义文件。这是必需的，因为源表和目标表现在不同了。\n\
    \n##### Generating a Data Definitions File\n\n只要 GoldenGate 认为你的源表和目标表不完全相同，你就必须使用\
    \ GoldenGate 数据定义文件。在本示例中，有一个列名不同，因此你必须创建一个数据定义文件。GoldenGate 复制使用数据定义文件来映射源表和目标表。因为你在目标服务器上使用复制进行映射，所以你在源服务器上生成数据定义文件并将其传输到目标服务器。如果你在源端使用提取进行映射，则需要在目标服务器上创建数据定义文件并将其传输到源服务器。\n\
    \n`Tip` 如果任何列不匹配或顺序不同，GoldenGate 就不会认为表是相同的。名称、长度、数据类型、语义和列顺序必须完全匹配，GoldenGate\
    \ 才会认为表是相同的。\n\n生成数据定义文件的第一步是创建一个 `defgen` 参数文件，以告诉 GoldenGate 文件中需要包含什么。以下示例为\
    \ `HR` 架构中的所有源表创建一个 `defgen` 参数文件。本例中 `defgen` 文件与复制同名，但文件扩展名不同，为 `defs`：\n\n\
    ```\ndefsfile ./dirdef/RHREMD1.defs\nUSERID GGER@sourcedb, PASSWORD userpw\nTABLE\
    \ HR.*;\n```\n\n接下来，你可以使用 GoldenGate 的 `defgen` 命令生成数据定义文件：\n\n```\ndefgen paramfile\
    \ dirprm/hrdefs.prm\n```\n\n这会生成在 `defgen` 参数文件中指定的数据定义文件 `RHREMD1.defs`。下一步是将此文件从源服务器传输到目标服务器。你应该将\
    \ `defgen` 文件放在 `dirdef` 目录中。\n\n最后一步是告诉 GoldenGate 你正在使用 `defgen` 文件，并且不再使用 `ASSUMETARGETDEFS`\
    \ 参数，因为源表和目标表不同。在以下示例中，`ASSUMETARGETDEFS` 参数被注释掉，并且包含一个新的 `SOURCEDEFS` 参数，该参数指向\
    \ `defgen` 文件：\n\n```\n--AssumeTargetDefs\nSourceDefs dirdef/RHREMD1.defs\n```\n\
    \n现在你已经设置了列映射并生成了数据定义文件，几乎准备好启动复制了。下一节将讨论一个额外的要求。"
  raw: '#### Filtering Columns


    Suppose that instead of extracting all the columns in the EMPLOYEES table, you''re
    only interested in the EMPLOYEE_ID, FIRST_NAME, and LAST_NAME columns. You can
    do this by adding the following to your Extract `TABLE` parameter:


    `Table HR.EMPLOYEES`

    `COLS (employee_Id, first_name, last_name);`


    In the example, all columns are ignored except the three columns listed in the
    `COLS` parameter. Keep in mind that it''s probably a good idea to include your
    key columns in the `COLS` list; otherwise GoldenGate may choose all the columns
    listed as the key, which may not be a good idea.


    ![images](images/square.jpg) **Note** Keep in mind that if you use column filtering
    in your data-pump Extract, you can no longer use passthru mode.


    Another example of column filtering is when you want all the columns in a table
    to be extracted *except* for a few columns. Let''s assume you want to extract
    the entire EMPLOYEES table except for the EMAIL column. You can do that in the
    Extract with the `COLSEXCEPT` parameter, as shown in the following example:


    `Table HR.EMPLOYEES`

    `COLSEXCEPT (email);`


    You may find that `COLSEXCEPT` is more convenient and efficient than using `COLS`,
    especially if you only want to exclude a few columns from a large table. Keep
    in mind that you can''t exclude key columns with `COLSEXCEPT`.


    In addition to filtering columns, you can filter rows.


    #### Filtering Rows


    The simplest way to filter rows is to add a `WHERE` clause to your `TABLE` statement
    on the Extract or to your `MAP` statement on the Replicat. Let''s look at an example
    of each. First you add filtering to the Extract to only extract employees whose
    EMPLOYEE_ID is less than 100, as shown in the following example:


    `Table HR.EMPLOYEES,`

    `WHERE (EMPLOYEE_ID < 100);`


    Now let''s add filtering to the Replicat. Suppose you decide that you only want
    to replicate rows for your IT programmers. You can add that filter to the Replicat
    as follows:


    `Map HR.EMPLOYEES, Target HR.EMPLOYEES,`

    `WHERE (JOB_ID = "IT_PROG");`


    ![images](images/square.jpg) **Tip** Double quotes are required when filtering
    for data values.


    Another way you can perform complex filtering for numeric values is to use the
    GoldenGate `FILTER` parameter on either the Extract or the Replicat. In addition,
    you can use `FILTER` to restrict filtering to specific data manipulation language
    (DML) statements. The following example filters only for employees whose monthly
    salary is greater than 1000:


    `Map HR.EMPLOYEES, Target HR.EMPLOYEES,`

    `FILTER (SALARY / 12 > 1000);`


    Let''s look at another example using filtering based on the DML operation, such
    as `insert`, `update`, or `delete`. Suppose you only want to replicate `delete`s
    if the employee''s monthly salary is less than 1000. You can set up a filter as
    shown next that only executes the filter for `delete` statements. This example
    filters using the Extract `TABLE` parameter:


    `Table HR.EMPLOYEES,`

    `FILTER (ON DELETE, SALARY / 12 < 1000);`


    You''ve seen a few examples of the extensive capabilities of GoldenGate to filter
    tables, rows, and columns. Now let''s look at some advanced column mapping.


    #### Mapping Columns


    You may remember from [Chapter 4](#Chapter04.html#ch4) that the Replicat parameter
    file used the `ASSUMETARGETDEFS` parameter. You used this parameter to tell GoldenGate
    that your source and target tables were identical. But what if the source and
    target tables are different? GoldenGate can easily handle these differences and
    even transform the data if needed.


    Following is an enhanced version of the EMPLOYEES table that you use as your target
    table. On the target database, the table is named STAFF. This section also discusses
    a few more differences:


    `Table STAFF`

    ` Name                                      Null?    Type`

    ` ----------------------------------------- -------- ----------------------------`

    ` EMPLOYEE_ID  (PK)                         NOT NULL NUMBER(6)`

    ` FIRST_NAME                                         VARCHAR2(20)`

    ` LAST_NAME                                 NOT NULL VARCHAR2(25)`

    ` FULL_NAME                                 NOT NULL VARCHAR2(46)`

    ` EMAIL                                     NOT NULL VARCHAR2(25)`

    ` PHONE_NUMBER                                       VARCHAR2(20)`

    ` HIRE_DATE                                          NOT NULL DATE`

    ` JOB_ID                                             NOT NULL VARCHAR2(10)`

    ` WAGES                                              NUMBER(8,2)`

    ` COMMISSION_PCT                                     NUMBER(2,2)`

    ` MANAGER_ID                                         NUMBER(6)`

    ` DEPARTMENT_ID                                      NUMBER(4)`


    Instead of using the column name SALARY as in the source database table; the target
    database table has a column named WAGES. You code the `MAP` parameter as shown
    in the following example:


    `Map HR.EMPLOYEES, Target HR.STAFF,`

    `COLMAP (USEDEFAULTS,`

    `WAGES = SALARY);`


    Before you can start the replication, you need to generate a GoldenGate data definitions
    file. This is required because the source and target tables are now different.


    ##### Generating a Data Definitions File


    You must use a GoldenGate data definitions file whenever your source and target
    tables aren''t considered identical by GoldenGate. In the example, there is one
    column with a different name, so you must create a data definitions file. The
    GoldenGate Replicat uses the data definitions file to map the source and target
    tables. Because you''re doing the mapping on the target server using the Replicat,
    you generate the data definitions file on the source server and transfer it to
    the target server. If you''re doing mapping on the source using the Extract, you
    create a data definitions file on the target server and transfer it to the source
    server.


    ![images](images/square.jpg) **Tip** GoldenGate doesn''t consider tables identical
    if any of the columns don''t match or are in a different order. The names, lengths,
    data types, semantics, and column order must match exactly for GoldenGate to consider
    the tables identical.


    The first step in generating a data definitions file is to create a `defgen` parameter
    file to tell GoldenGate what needs to be included in the file. The following example
    creates a `defgen` parameter file for all the source tables in the HR schema.
    In this case the `defgen` file has the same name as the Replicat, but with a different
    file name extension, `defs`:


    `defsfile ./dirdef/RHREMD1.defs`

    `USERID GGER@sourcedb, PASSWORD userpw`

    `TABLE HR.*;`


    Next you can generate the data definitions file using the GoldenGate `defgen`
    command:


    `defgen paramfile dirprm/hrdefs.prm`


    This generates the data definitions file `RHREMD1.defs` as specified in the `defgen`
    parameter file. The next step is to transfer this file from the source server
    to the target server. You should put the `defgen` file in the `dirdef` directory.


    The last step is to tell GoldenGate that you''re using a `defgen` file and no
    longer using the `ASSUMETARGETDEFS` parameter because the source and target tables
    are different. In the following example the `ASSUMETARGETDEFS` parameter is commented
    out, and you include a new `SOURCEDEFS` parameter that points to the `defgen`
    file:


    `--AssumeTargetDefs`

    `SourceDefs dirdef/RHREMD1.defs`


    Now that you''ve set up the column mapping and generated a data definitions file,
    you''re almost ready to start the Replicat. The next section addresses one additional
    requirement.'
  trans: "#### 筛选列\n\n假设你不希望提取 `EMPLOYEES` 表中的所有列，而只对 `EMPLOYEE_ID`、`FIRST_NAME` 和\
    \ `LAST_NAME` 列感兴趣。你可以通过向提取（Extract）的 `TABLE` 参数添加以下内容来实现：\n\n```\nTable HR.EMPLOYEES\n\
    COLS (employee_Id, first_name, last_name);\n```\n\n在此示例中，除了 `COLS` 参数中列出的三个列，所有其他列都被忽略。请记住，最好在\
    \ `COLS` 列表中包含主键列；否则 GoldenGate 可能会选择所有标记为键的列，这可能不是好主意。\n\n`注意` 如果你在数据泵（data-pump）提取中使用列过滤，将无法再使用直通（passthru）模式。\n\
    \n列过滤的另一个示例是，你希望提取表中的所有列，*除了*少数几列。假设你希望提取整个 `EMPLOYEES` 表，但排除 `EMAIL` 列。你可以在提取中使用\
    \ `COLSEXCEPT` 参数来实现，如下例所示：\n\n```\nTable HR.EMPLOYEES\nCOLSEXCEPT (email);\n\
    ```\n\n你可能会发现 `COLSEXCEPT` 比使用 `COLS` 更方便、更高效，特别是当你只想从大表中排除少数几列时。请记住，不能使用 `COLSEXCEPT`\
    \ 排除主键列。\n\n除了过滤列，你还可以过滤行。\n\n#### 筛选行\n\n过滤行最简单的方法是，在提取（Extract）的 `TABLE` 语句或复制（Replicat）的\
    \ `MAP` 语句中添加一个 `WHERE` 子句。让我们分别看一个示例。首先，在提取中添加过滤条件，仅提取 `EMPLOYEE_ID` 小于 100 的员工，如下例所示：\n\
    \n```\nTable HR.EMPLOYEES,\nWHERE (EMPLOYEE_ID < 100);\n```\n\n现在让我们在复制中添加过滤。假设你决定只复制\
    \ IT 程序员的数据。你可以按如下方式在复制中添加该过滤器：\n\n```\nMap HR.EMPLOYEES, Target HR.EMPLOYEES,\n\
    WHERE (JOB_ID = \"IT_PROG\");\n```\n\n`提示` 过滤数据值时，需要使用双引号。\n\n另一种对数值进行复杂过滤的方法是，在提取或复制中使用\
    \ GoldenGate 的 `FILTER` 参数。此外，你可以使用 `FILTER` 将过滤限制在特定的数据操作语言（DML）语句。以下示例仅过滤月薪大于\
    \ 1000 的员工：\n\n```\nMap HR.EMPLOYEES, Target HR.EMPLOYEES,\nFILTER (SALARY / 12\
    \ > 1000);\n```\n\n让我们再看一个基于 DML 操作（如 `insert`、`update` 或 `delete`）进行过滤的示例。假设你只希望在员工的月薪小于\
    \ 1000 时复制 `delete` 操作。你可以设置一个过滤器，如下所示，该过滤器仅对 `delete` 语句执行。此示例使用提取的 `TABLE` 参数进行过滤：\n\
    \n```\nTable HR.EMPLOYEES,\nFILTER (ON DELETE, SALARY / 12 < 1000);\n```\n\n你已经看到了\
    \ GoldenGate 过滤表、行和列的强大功能的几个示例。现在让我们看一些高级的列映射。\n\n#### 映射列\n\n你可能还记得 第 4 章，复制参数文件使用了\
    \ `ASSUMETARGETDEFS` 参数。你使用此参数告诉 GoldenGate 你的源表和目标表是相同的。但如果源表和目标表不同呢？GoldenGate\
    \ 可以轻松处理这些差异，甚至可以在需要时转换数据。\n\n以下是你用作目标表的 `EMPLOYEES` 表的增强版本。在目标数据库中，该表名为 `STAFF`。本节还讨论了另外一些差异：\n\
    \n```\nTable STAFF\n Name                                      Null?    Type\n\
    \ ----------------------------------------- -------- ----------------------------\n\
    \ EMPLOYEE_ID  (PK)                         NOT NULL NUMBER(6)\n FIRST_NAME  \
    \                              VARCHAR2(20)\n LAST_NAME                      \
    \           NOT NULL VARCHAR2(25)\n FULL_NAME                                \
    \ NOT NULL VARCHAR2(46)\n EMAIL                                     NOT NULL VARCHAR2(25)\n\
    \ PHONE_NUMBER                                     VARCHAR2(20)\n HIRE_DATE  \
    \                               NOT NULL DATE\n JOB_ID                       \
    \             NOT NULL VARCHAR2(10)\n WAGES                                  \
    \   NUMBER(8,2)\n COMMISSION_PCT                            NUMBER(2,2)\n MANAGER_ID\
    \                                NUMBER(6)\n DEPARTMENT_ID                   \
    \          NUMBER(4)\n```\n\n目标数据库表中的列名不是源数据库表中的 `SALARY`，而是 `WAGES`。你可以按如下示例编写\
    \ `MAP` 参数：\n\n```\nMap HR.EMPLOYEES, Target HR.STAFF,\nCOLMAP (USEDEFAULTS,\n\
    WAGES = SALARY);\n```\n\n在开始复制之前，你需要生成一个 GoldenGate 数据定义文件。这是必需的，因为源表和目标表现在不同了。\n\
    \n##### 生成数据定义文件\n\n只要 GoldenGate 认为你的源表和目标表不完全相同，你就必须使用 GoldenGate 数据定义文件。在本示例中，有一个列名不同，因此你必须创建一个数据定义文件。GoldenGate\
    \ 复制使用数据定义文件来映射源表和目标表。因为你在目标服务器上使用复制进行映射，所以你在源服务器上生成数据定义文件并将其传输到目标服务器。如果你在源端使用提取进行映射，则需要在目标服务器上创建数据定义文件并将其传输到源服务器。\n\
    \n`提示` 如果任何列不匹配或顺序不同，GoldenGate 就不会认为表是相同的。名称、长度、数据类型、语义和列顺序必须完全匹配，GoldenGate\
    \ 才会认为表是相同的。\n\n生成数据定义文件的第一步是创建一个 `defgen` 参数文件，以告诉 GoldenGate 文件中需要包含什么。以下示例为\
    \ `HR` 架构中的所有源表创建一个 `defgen` 参数文件。本例中 `defgen` 文件与复制同名，但文件扩展名不同，为 `defs`：\n\n\
    ```\ndefsfile ./dirdef/RHREMD1.defs\nUSERID GGER@sourcedb, PASSWORD userpw\nTABLE\
    \ HR.*;\n```\n\n接下来，你可以使用 GoldenGate 的 `defgen` 命令生成数据定义文件：\n\n```\ndefgen paramfile\
    \ dirprm/hrdefs.prm\n```\n\n这会生成在 `defgen` 参数文件中指定的数据定义文件 `RHREMD1.defs`。下一步是将此文件从源服务器传输到目标服务器。你应该将\
    \ `defgen` 文件放在 `dirdef` 目录中。\n\n最后一步是告诉 GoldenGate 你正在使用 `defgen` 文件，并且不再使用 `ASSUMETARGETDEFS`\
    \ 参数，因为源表和目标表不同。在以下示例中，`ASSUMETARGETDEFS` 参数被注释掉，并且包含一个新的 `SOURCEDEFS` 参数，该参数指向\
    \ `defgen` 文件：\n\n```\n--AssumeTargetDefs\nSourceDefs dirdef/RHREMD1.defs\n```\n\
    \n现在你已经设置了列映射并生成了数据定义文件，几乎准备好启动复制了。下一节将讨论一个额外的要求。"
- fmt: "#### Transforming Columns\n\nYou must do one more thing before you can start\
    \ replicating the `EMPLOYEES` table to the `Staff` table. The `WAGES` column in\
    \ the target `Staff` table needs to reflect the *annual* employee salary. The\
    \ `SALARY` column in the source database `EMPLOYEES` table stores only the *monthly*\
    \ salary. So during replication, you must transform the *monthly* salary amount\
    \ into an *annual* salary amount. You can do that using the Replicat `MAP` and\
    \ `COLMAP` parameters, as shown in the following example:\n\n```\nMap HR.EMPLOYEES,\
    \ Target HR.STAFF,\nCOLMAP (USEDEFAULTS,\nWAGES = @COMPUTE(SALARY * 12));\n```\n\
    \nThe example maps the monthly `SALARY` column multiplied by 12 months into the\
    \ annual `WAGES` column during replication. You can use the built-in GoldenGate\
    \ `@COMPUTE` function for the calculation.\n\nAnother difference between the source\
    \ and target `EMPLOYEES` tables is that the target has an additional column for\
    \ `FULL_NAME`. The full name is a concatenation of the `LAST_NAME`, a comma, and\
    \ the `FIRST_NAME`. You can perform this transformation using the Replicat `MAP`\
    \ parameter as shown here:\n\n```\nMap HR.EMPLOYEES, Target HR.STAFF,\nCOLMAP\
    \ (USEDEFAULTS,\nWAGES = @COMPUTE(SALARY * 12),\nFULL_NAME = @STRCAT(LAST_NAME,\"\
    ,\",FIRST_NAME));\n```\n\nNow let's look at the Extract and Replicat parameter\
    \ files with the mapping and filtering changes shown in italics. Here's the enhanced\
    \ Extract parameter file:\n\n```\nGGSCI (sourceserver) 1> edit params LHREMD1\n\
    Extract LHREMD1\n-------------------------------------------------------------------\n\
    -- Local extract for HR schema\n-------------------------------------------------------------------\n\
    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)\nUSERID 'GGER', PASSWORD \"AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB\"\
    , ENCRYPTKEY default\nReportCount Every 30 Minutes, Rate\nReport at 01:00\nReportRollover\
    \ at 01:15\nDiscardFile dirrpt/LHREMD1.dsc, Append\nDiscardRollover at 02:00 ON\
    \ SUNDAY\nENCRYPTTRAIL\nExtTrail dirdat/l1\nTable HR.EMPLOYEES\nFILTER (ON DELETE,\
    \ SALARY / 12 < 1000)\nWHERE (EMPLOYEE_ID < 100);\nTable HR.JOBS;\n```\n\nNext\
    \ is the enhanced Replicat parameter file:\n\n```\nGGSCI (targetserver) 1> edit\
    \ params RHREMD1\nReplicat RHREMD1\n-------------------------------------------------------------------\n\
    -- Replicat for HR Schema\n-------------------------------------------------------------------\n\
    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)\nUSERID 'GGER', PASSWORD \"AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB\"\
    , ENCRYPTKEY default\n--AssumeTargetDefs\nSourceDefs dirdef/RHREMD1.defs\nReportCount\
    \ Every 30 Minutes, Rate\nReport at 01:00\nReportRollover at 01:15\nDiscardFile\
    \ dirrpt/RHREMD1.dsc, Append\nDiscardRollover at 02:00 ON SUNDAY\nDECRYPTTRAIL\n\
    Map HR.EMPLOYEES, Target HR.STAFF,\nCOLMAP (USEDEFAULTS,\nWAGES = @COMPUTE(SALARY\
    \ * 12),\nFULL_NAME = @STRCAT(LAST_NAME,\",\",FIRST_NAME));\nMap HR.JOBS, Target\
    \ HR.JOBS ;\n```\n\n### Oracle-Specific DBMS Configuration Options\n\nLet's review\
    \ a few DBMS configuration options that are specific to those of you using an\
    \ Oracle database in your replication configuration. First you see how to configure\
    \ GoldenGate in an Oracle Real Application Clusters (RAC) environment. Then you\
    \ review some special configuration options for Oracle Automatic Storage Management\
    \ (ASM). Finally, you see how to set up DDL replication between Oracle databases.\
    \ If you aren't using Oracle databases, you can skip this section.\n\n#### Configuring\
    \ for Oracle RAC\n\nGoldenGate has had support for Oracle RAC for many years.\
    \ There are some special considerations you should be aware of if you're running\
    \ GoldenGate in Oracle RAC. Consult the *Oracle GoldenGate Oracle Installation\
    \ and Setup Guide* for specific platform requirements.\n\nYou can choose to install\
    \ and run GoldenGate from any of the nodes in your RAC cluster. You may decide\
    \ to run GoldenGate on one of the nodes that is planned to have less workload\
    \ than another node. GoldenGate can be installed on shared storage that is available\
    \ to all the nodes in the RAC cluster or on local storage. If you install GoldenGate\
    \ on shared storage, you can start the GoldenGate Manager and other GoldenGate\
    \ processes from any of the nodes. If the node on which you started GoldenGate\
    \ crashes, you can restart it on another node.\n\nYou can also set up GoldenGate\
    \ to run under Oracle Clusterware and automatically fail over to another node\
    \ in the cluster. Starting with Oracle 11gR2, you can use an ASM Clustered File\
    \ System (ACFS) for the GoldenGate software and files. For more information, refer\
    \ to the white paper *Oracle GoldenGate High Availability Using Oracle Clusterware*,\
    \ available on the Oracle Technology Network at [`www.oracle.com/technetwork/index.html`](http://www.oracle.com/technetwork/index.html).\n\
    \n##### Synchronizing the Nodes\n\nAs part of the Oracle RAC installation, you\
    \ should make sure the date and time for each of the nodes in the cluster are\
    \ synchronized. Date and time synchronization is typically done using Network\
    \ Time Protocol (NTP). Although synchronizing the date and time across nodes is\
    \ part of the Oracle cluster installation, it's especially important for replication\
    \ because GoldenGate makes processing decisions based on the system date and time\
    \ settings. If the times are different on each node, it can cause replication\
    \ issues or abends.\n\nYou should also be aware of a few GoldenGate parameters\
    \ that allow you to control the I/O latency between the nodes. You can use the\
    \ `THREADOPTIONS IOLATENCY` to compensate for differences in I/O latency between\
    \ the nodes. The default value is 1.5 seconds, but you can increase this to 3\
    \ minutes if needed for significant latency. Another option of the `THREADOPTIONS`\
    \ parameter lets you adjust for delays caused by disk contention on the redo logs:\
    \ you can adjust the `THREADOPTIONS MAXCOMMITPROPAGATIONDELAY` up to 90 seconds\
    \ to compensate for these delays. The default is 3 seconds.\n\n##### Connecting\
    \ to the Database\n\nFor Oracle RAC, you should set up a database service specifically\
    \ for the GoldenGate connection and define the connection information in your\
    \ `tnsnames.ora` file. You can set up the service using the Oracle Database Configuration\
    \ Assistant (DBCA) or with Oracle Enterprise Manager, as shown in [Figure 5-1](#Chapter05.html#fig_5_1).\n\
    \n![images](images/0501.jpg)\n\n**Figure 5-1.** GoldenGate service defined in\
    \ OEM\n\nThe example in [Figure 5-1](#Chapter05.html#fig_5_1) defines the service\
    \ on the preferred instance `sourcedb1`, and it's available on instance `sourcedb2`.\
    \ After the service is defined, you can stop the Extract or Replicat and move\
    \ the service from instance to instance as needed and then restart the Extract\
    \ or Replicat. You can also display information about the service using the `srvctl`\
    \ utility:\n\n```\n> srvctl config service -d sourcedb1 -s goldengate -a\ngoldengate\
    \ PREF: sourcedb1 AVAIL: sourcedb2 TAF: NONE\n```\n\nWhen you've defined the service,\
    \ you need to add the connection information to your `tnsnames.ora` file as shown\
    \ here:\n\n```\nGoldenGate =\n  (DESCRIPTION =\n    (ADDRESS = (PROTOCOL = TCP)(HOST\
    \ = sourceserver1-vip)(PORT = 1521))\n    (ADDRESS = (PROTOCOL = TCP)(HOST = sourceserver2-vip)(PORT\
    \ = 1521))\n    (LOAD_BALANCE = NO)\n    (CONNECT_DATA =\n      (SERVER = DEDICATED)\n\
    \      (SERVICE_NAME = GoldenGate)\n    )\n  )\n```\n\nThen, you can configure\
    \ your Extract or Replicat to use the new service-based connection as follows:\n\
    \n```\nUSERID GGER@GoldenGate, PASSWORD userpw\n```\n\nThis connection connects\
    \ the Extract or Replicat to the `GoldenGate` TNS alias you just added, which\
    \ uses the service you defined in the database. Now let's look at another consideration\
    \ you should be aware of when running GoldenGate on Oracle RAC."
  raw: '#### Transforming Columns


    You must do one more thing before you can start replicating the EMPLOYEES table
    to the Staff table. The WAGES column in the target Staff table needs to reflect
    the *annual* employee salary. The SALARY column in the source database EMPLOYEES
    table stores only the *monthly* salary. So during replication, you must transform
    the *monthly* salary amount into an *annual* salary amount. You can do that using
    the Replicat `MAP` and `COLMAP` parameters, as shown in the following example:


    `Map HR.EMPLOYEES, Target HR.STAFF,`

    `COLMAP (USEDEFAULTS,`

    `WAGES = @COMPUTE(SALARY * 12));`


    The example maps the monthly SALARY column multiplied by 12 months into the annual
    WAGES column during replication. You can use the built-in GoldenGate `@COMPUTE`
    function for the calculation.


    Another difference between the source and target EMPLOYEES tables is that the
    target has an additional column for FULL_NAME. The full name is a concatenation
    of the LAST_NAME, a comma, and the FIRST_NAME. You can perform this transformation
    using the Replicat `MAP` parameter as shown here:


    `Map HR.EMPLOYEES, Target HR.STAFF,`

    `COLMAP (USEDEFAULTS,`

    `WAGES = @COMPUTE(SALARY * 12)`

    `FULL_NAME = @STRCAT(LAST_NAME,",",FIRST_NAME));`


    Now let''s look at the Extract and Replicat parameter files with the mapping and
    filtering changes shown in italics. Here''s the enhanced Extract parameter file:


    `GGSCI (sourceserver) 1> edit params LHREMD1`

    `Extract LHREMD1`

    `-------------------------------------------------------------------`

    `-- Local extract for HR schema`

    `-------------------------------------------------------------------`

    `SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)`

    `USERID ''GGER'', PASSWORD "AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB", ENCRYPTKEY default`

    `ReportCount Every 30 Minutes, Rate`

    `Report at 01:00`

    `ReportRollover at 01:15`

    `DiscardFile dirrpt/LHREMD1.dsc, Append`

    `DiscardRollover at 02:00 ON SUNDAY`

    `ENCRYPTTRAIL`

    `ExtTrail dirdat/l1`

    *`Table HR.EMPLOYEES`*

    *`FILTER (ON DELETE, SALARY / 12 < 1000)`*

    *`WHERE (EMPLOYEE_ID < 100);`*

    *`Table HR.JOBS;`*


    Next is the enhanced Replicat parameter file:


    `GGSCI (targetserver) 1> edit params RHREMD1`

    `Replicat RHREMD1`

    `-------------------------------------------------------------------`

    `-- Replicat for HR Schema`

    `-------------------------------------------------------------------`

    `SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)`

    `USERID ''GGER'', PASSWORD "AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB", ENCRYPTKEY default`

    *`--AssumeTargetDefs`*

    *`SourceDefs dirdef/RHREMD1.defs`*

    `ReportCount Every 30 Minutes, Rate`

    `Report at 01:00`

    `ReportRollover at 01:15`

    `DiscardFile dirrpt/RHREMD1.dsc, Append`

    `DiscardRollover at 02:00 ON SUNDAY`

    `DECRYPTTRAIL`

    *`Map HR.EMPLOYEES, Target HR.STAFF,`*

    *`COLMAP (USEDEFAULTS,`*

    *`WAGES = @COMPUTE(SALARY * 12)`*

    *`FULL_NAME = @STRCAT(LAST_NAME,",",FIRST_NAME));`*

    *`Map HR.JOBS, Target HR.JOBS ;`*


    ### Oracle-Specific DBMS Configuration Options


    Let''s review a few DBMS configuration options that are specific to those of you
    using an Oracle database in your replication configuration. First you see how
    to configure GoldenGate in an Oracle Real Application Clusters (RAC) environment.
    Then you review some special configuration options for Oracle Automatic Storage
    Management (ASM). Finally, you see how to set up DDL replication between Oracle
    databases. If you aren''t using Oracle databases, you can skip this section.


    #### Configuring for Oracle RAC


    GoldenGate has had support for Oracle RAC for many years. There are some special
    considerations you should be aware of if you''re running GoldenGate in Oracle
    RAC. Consult the *Oracle GoldenGate* *Oracle Installation and Setup Guide* for
    specific platform requirements.


    You can choose to install and run GoldenGate from any of the nodes in your RAC
    cluster. You may decide to run GoldenGate on one of the nodes that is planned
    to have less workload than another node. GoldenGate can be installed on shared
    storage that is available to all the nodes in the RAC cluster or on local storage.
    If you install GoldenGate on shared storage, you can start the GoldenGate Manager
    and other GoldenGate processes from any of the nodes. If the node on which you
    started GoldenGate crashes, you can restart it on another node.


    You can also set up GoldenGate to run under Oracle Clusterware and automatically
    fail over to another node in the cluster. Starting with Oracle 11gR2, you can
    use an ASM Clustered File System (ACFS) for the GoldenGate software and files.
    For more information, refer to the white paper *Oracle GoldenGate High Availability
    Using Oracle Clusterware,* available on the Oracle Technology Network at [`www.oracle.com/technetwork/index.html`](http://www.oracle.com/technetwork/index.html).


    ##### Synchronizing the Nodes


    As part of the Oracle RAC installation, you should make sure the date and time
    for each of the nodes in the cluster are synchronized. Date and time synchronization
    is typically done using Network Time Protocol (NTP). Although synchronizing the
    date and time across nodes is part of the Oracle cluster installation, it''s especially
    important for replication because GoldenGate makes processing decisions based
    on the system date and time settings. If the times are different on each node,
    it can cause replication issues or abends.


    You should also be aware of a few GoldenGate parameters that allow you to control
    the I/O latency between the nodes. You can use the `THREADOPTIONS IOLATENCY` to
    compensate for differences in I/O latency between the nodes. The default value
    is 1.5 seconds, but you can increase this to 3 minutes if needed for significant
    latency. Another option of the `THREADOPTIONS` parameter lets you adjust for delays
    caused by disk contention on the redo logs: you can adjust the `THREADOPTIONS`
    `MAXCOMMITPROPAGATIONDELAY` up to 90 seconds to compensate for these delays. The
    default is 3 seconds.


    ##### Connecting to the Database


    For Oracle RAC, you should set up a database service specifically for the GoldenGate
    connection and define the connection information in your `tnsnames.ora` file.
    You can set up the service using the Oracle Database Configuration Assistant (DBCA)
    or with Oracle Enterprise Manager, as shown in [Figure 5-1](#Chapter05.html#fig_5_1).


    ![images](images/0501.jpg)


    ***Figure 5-1.** GoldenGate service defined in OEM*


    The example in [Figure 5-1](#Chapter05.html#fig_5_1) defines the service on the
    preferred instance sourcedb1, and it''s available on instance sourcedb2\. After
    the service is defined, you can stop the Extract or Replicat and move the service
    from instance to instance as needed and then restart the Extract or Replicat.
    You can also display information about the service using the `srvctl` utility:


    `> srvctl config service -d sourcedb1 -s goldengate -a`

    `goldengate PREF: sourcedb1 AVAIL: sourcedb2 TAF: NONE`


    When you''ve defined the service, you need to add the connection information to
    your `tnsnames.ora` file as shown here:


    `GoldenGate =`

    `  (DESCRIPTION =`

    `    (ADDRESS = (PROTOCOL = TCP)(HOST = sourceserver1-vip)(PORT = 1521))`

    `    (ADDRESS = (PROTOCOL = TCP)(HOST = sourceserver2-vip)(PORT = 1521))`

    `    (LOAD_BALANCE = NO)`

    `    (CONNECT_DATA =`

    `      (SERVER = DEDICATED)`

    `      (SERVICE_NAME = GoldenGate)`

    `    )`

    `  )`


    Then, you can configure your Extract or Replicat to use the new service-based
    connection as follows:


    `USERID GGER@GoldenGate, PASSWORD userpw`


    This connection connects the Extract or Replicat to the `''GoldenGate''` TNS alias
    you just added, which uses the service you defined in the database. Now let''s
    look at another consideration you should be aware of when running GoldenGate on
    Oracle RAC.'
  trans: "#### 转换列\n\n在开始将 `EMPLOYEES` 表复制到 `Staff` 表之前，您还有一件事需要完成。目标 `Staff` 表中的\
    \ `WAGES` 列需要反映员工的*年薪*。而源数据库 `EMPLOYEES` 表中的 `SALARY` 列只存储了*月薪*。因此，在复制过程中，您必须将*月薪*金额转换为*年薪*金额。您可以使用\
    \ Replicat 的 `MAP` 和 `COLMAP` 参数来完成此操作，如下例所示：\n\n```\nMap HR.EMPLOYEES, Target\
    \ HR.STAFF,\nCOLMAP (USEDEFAULTS,\nWAGES = @COMPUTE(SALARY * 12));\n```\n\n此示例在复制过程中，将每月的\
    \ `SALARY` 列乘以 12 个月，映射到年薪的 `WAGES` 列。您可以使用 GoldenGate 内置的 `@COMPUTE` 函数进行计算。\n\
    \n源表与目标 `EMPLOYEES` 表之间的另一个区别是，目标表多了一个 `FULL_NAME` 列。全名是 `LAST_NAME`、一个逗号和 `FIRST_NAME`\
    \ 的连接。您可以使用 Replicat `MAP` 参数执行此转换，如下所示：\n\n```\nMap HR.EMPLOYEES, Target HR.STAFF,\n\
    COLMAP (USEDEFAULTS,\nWAGES = @COMPUTE(SALARY * 12),\nFULL_NAME = @STRCAT(LAST_NAME,\"\
    ,\",FIRST_NAME));\n```\n\n现在让我们看看包含映射和过滤更改（以*斜体*显示）的 Extract 和 Replicat 参数文件。这是增强的\
    \ Extract 参数文件：\n\n```\nGGSCI (sourceserver) 1> edit params LHREMD1\nExtract LHREMD1\n\
    -------------------------------------------------------------------\n-- Local\
    \ extract for HR schema\n-------------------------------------------------------------------\n\
    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)\nUSERID 'GGER', PASSWORD \"AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB\"\
    , ENCRYPTKEY default\nReportCount Every 30 Minutes, Rate\nReport at 01:00\nReportRollover\
    \ at 01:15\nDiscardFile dirrpt/LHREMD1.dsc, Append\nDiscardRollover at 02:00 ON\
    \ SUNDAY\nENCRYPTTRAIL\nExtTrail dirdat/l1\nTable HR.EMPLOYEES\nFILTER (ON DELETE,\
    \ SALARY / 12 < 1000)\nWHERE (EMPLOYEE_ID < 100);\nTable HR.JOBS;\n```\n\n接下来是增强的\
    \ Replicat 参数文件：\n\n```\nGGSCI (targetserver) 1> edit params RHREMD1\nReplicat\
    \ RHREMD1\n-------------------------------------------------------------------\n\
    -- Replicat for HR Schema\n-------------------------------------------------------------------\n\
    SETENV (NLS_LANG = AMERICAN_AMERICA.AL32UTF8)\nUSERID 'GGER', PASSWORD \"AACAAAAAAAAAAADAVHTDKHHCSCPIKAFB\"\
    , ENCRYPTKEY default\n--AssumeTargetDefs\nSourceDefs dirdef/RHREMD1.defs\nReportCount\
    \ Every 30 Minutes, Rate\nReport at 01:00\nReportRollover at 01:15\nDiscardFile\
    \ dirrpt/RHREMD1.dsc, Append\nDiscardRollover at 02:00 ON SUNDAY\nDECRYPTTRAIL\n\
    Map HR.EMPLOYEES, Target HR.STAFF,\nCOLMAP (USEDEFAULTS,\nWAGES = @COMPUTE(SALARY\
    \ * 12),\nFULL_NAME = @STRCAT(LAST_NAME,\",\",FIRST_NAME));\nMap HR.JOBS, Target\
    \ HR.JOBS ;\n```\n\n### Oracle 特定的 DBMS 配置选项\n\n让我们回顾一些特定于在复制配置中使用 Oracle 数据库的\
    \ DBMS 配置选项。首先，您将了解如何在 Oracle 真应用集群 (RAC) 环境中配置 GoldenGate。然后，您将回顾 Oracle 自动存储管理\
    \ (ASM) 的一些特殊配置选项。最后，您将了解如何在 Oracle 数据库之间设置 DDL 复制。如果您不使用 Oracle 数据库，可以跳过本节。\n\
    \n#### 为 Oracle RAC 配置\n\nGoldenGate 支持 Oracle RAC 已有多年历史。如果您在 Oracle RAC 中运行\
    \ GoldenGate，有一些特殊的注意事项需要了解。请查阅 *Oracle GoldenGate Oracle 安装与设置指南* 以获取特定于平台的要求。\n\
    \n您可以选择在 RAC 集群中的任意节点上安装并运行 GoldenGate。您可能决定在计划工作负载较轻的某个节点上运行 GoldenGate。GoldenGate\
    \ 可以安装在对 RAC 集群中所有节点可用的共享存储上，也可以安装在本地存储上。如果您将 GoldenGate 安装在共享存储上，则可以从任意节点启动 GoldenGate\
    \ Manager 和其他 GoldenGate 进程。如果您启动 GoldenGate 的节点崩溃，您可以在另一个节点上重新启动它。\n\n您还可以设置\
    \ GoldenGate 在 Oracle Clusterware 下运行并自动故障转移到集群中的另一个节点。从 Oracle 11gR2 开始，您可以使用\
    \ ASM 集群文件系统 (ACFS) 来存放 GoldenGate 软件和文件。有关更多信息，请参阅白皮书 *Oracle GoldenGate 使用 Oracle\
    \ Clusterware 实现高可用性*，该文档可在 Oracle 技术网络上获取，网址为 [`www.oracle.com/technetwork/index.html`](http://www.oracle.com/technetwork/index.html)。\n\
    \n##### 同步节点\n\n作为 Oracle RAC 安装的一部分，您应确保集群中每个节点的日期和时间同步。日期和时间同步通常使用网络时间协议 (NTP)\
    \ 完成。尽管跨节点同步日期和时间是 Oracle 集群安装的一部分，但对于复制来说尤其重要，因为 GoldenGate 会根据系统日期和时间设置做出处理决策。如果每个节点上的时间不同，可能会导致复制问题或异常终止。\n\
    \n您还应该了解几个 GoldenGate 参数，这些参数允许您控制节点之间的 I/O 延迟。您可以使用 `THREADOPTIONS IOLATENCY`\
    \ 来补偿节点之间 I/O 延迟的差异。默认值为 1.5 秒，但如果您需要处理显著的延迟，可以将其增加到 3 分钟。`THREADOPTIONS` 参数的另一个选项允许您调整因重做日志上的磁盘争用而引起的延迟：您可以将\
    \ `THREADOPTIONS MAXCOMMITPROPAGATIONDELAY` 调整到最多 90 秒以补偿这些延迟。默认值为 3 秒。\n\n#####\
    \ 连接到数据库\n\n对于 Oracle RAC，您应该设置一个专门为 GoldenGate 连接使用的数据库服务，并在您的 `tnsnames.ora`\
    \ 文件中定义连接信息。您可以使用 Oracle 数据库配置助手 (DBCA) 或通过 Oracle Enterprise Manager 来设置服务，如图\
    \ 5-1 所示。\n\n![images](img/0501.jpg)\n\n**图 5-1.** 在 OEM 中定义的 GoldenGate 服务\n\n\
    图 5-1 中的示例在首选实例 `sourcedb1` 上定义了服务，并且它在实例 `sourcedb2` 上也可用。定义服务后，您可以停止 Extract\
    \ 或 Replicat，根据需要将服务从实例移动到实例，然后重新启动 Extract 或 Replicat。您还可以使用 `srvctl` 实用程序显示有关服务的信息：\n\
    \n```\n> srvctl config service -d sourcedb1 -s goldengate -a\ngoldengate PREF:\
    \ sourcedb1 AVAIL: sourcedb2 TAF: NONE\n```\n\n定义服务后，您需要将连接信息添加到您的 `tnsnames.ora`\
    \ 文件中，如下所示：\n\n```\nGoldenGate =\n  (DESCRIPTION =\n    (ADDRESS = (PROTOCOL =\
    \ TCP)(HOST = sourceserver1-vip)(PORT = 1521))\n    (ADDRESS = (PROTOCOL = TCP)(HOST\
    \ = sourceserver2-vip)(PORT = 1521))\n    (LOAD_BALANCE = NO)\n    (CONNECT_DATA\
    \ =\n      (SERVER = DEDICATED)\n      (SERVICE_NAME = GoldenGate)\n    )\n  )\n\
    ```\n\n然后，您可以配置 Extract 或 Replicat 使用新的基于服务的连接，如下所示：\n\n```\nUSERID GGER@GoldenGate,\
    \ PASSWORD userpw\n```\n\n此连接将 Extract 或 Replicat 连接到您刚刚添加的 `GoldenGate` TNS 别名，该别名使用您在数据库中定义的服务。现在让我们看看在\
    \ Oracle RAC 上运行 GoldenGate 时应该注意的另一个考虑因素。"
- fmt: "# 定义线程\n\n在Oracle单机数据库中，通常只有一个重做线程。在Oracle RAC中，通常每个实例有一个重做线程。您需要告诉GoldenGate\
    \ Extract进程Oracle RAC环境中定义的重做线程数。以下示例在具有两个实例和两个线程的Oracle RAC环境中添加了一个Extract：\n\
    \n```\nGGSCI (sourceserver) > ADD EXTRACT LHREMD1, TRANLOG, THREADS 2, BEGIN NOW\n\
    ```\n\n![images](images/square.jpg) **提示** 如果线程数量发生变化（例如添加新节点和实例），您必须记住使用正确的线程数删除并重新添加Extract。\n\
    \n接下来，让我们回顾如何为Oracle ASM配置GoldenGate。\n\n# 配置Oracle ASM\n\n如果您使用Oracle ASM，则需要一些特殊的GoldenGate参数，以允许GoldenGate\
    \ Extract连接到ASM。此外，您必须配置Oracle监听器和`tnsnames.ora`以支持来自GoldenGate的连接。让我们先看看GoldenGate参数。\n\
    \n## 指定ASM用户\n\n使用ASM时，GoldenGate本地Extract必须登录到ASM实例才能访问重做日志。您需要在本地Extract参数文件中添加一个额外的`TranLogOptions\
    \ ASMUser`参数来指定ASM用户ID和密码，如下例所示：\n\n```\nTranLogOptions ASMUser \"sys@asm\", asmpassword\
    \ \"<encrypted password>\",\nENCRYPTKEY default\n```\n\nASM用户可以是具有ASM实例中SYSDBA特权的任何用户（或11g及更高版本中的SYSASM特权）。此示例使用sys用户ID连接到ASM实例。\n\
    \n## 更新监听器\n\n更新GoldenGate本地Extract参数文件后，您需要确保您的监听器正在ASM实例上侦听连接。在您的`listener.ora`文件中添加如下所示的子句（以Oracle\
    \ 11g示例为例）：\n\n```\n(SID_DESC =\n      (SID_NAME = +ASM1)\n      (ORACLE_HOME\
    \ = /u01/asm/oracle/product/11.1.0/asm_1)\n```\n\n此子句确保您的监听器正在ASM实例上侦听连接。请确保重新加载监听器以使更改生效。\n\
    \n## 更新TNSNAMES.ORA\n\n最后，您需要在`tnsnames.ora`文件中为ASM连接创建一个别名：\n\n```\nASM =\n \
    \ (DESCRIPTION =\n    (ADDRESS = (PROTOCOL = TCP)(HOST = sourceserver1-vip)(PORT\
    \ = 1521))\n    (CONNECT_DATA =\n      (SERVER = DEDICATED)\n      (SERVICE_NAME\
    \ = +ASM1)\n      (INSTANCE_NAME = +ASM1)\n    )\n  )\n```\n\n此条目应与您之前在GoldenGate\
    \ `ASMUser`参数中指定的别名匹配。该示例在GoldenGate参数文件中使用`sys@asm`作为`ASMUser`进行连接，这与您的TNS条目相匹配。\n\
    \n# 添加Oracle DDL复制\n\n除了复制DML语句外，GoldenGate还可以为所有支持DML复制的Oracle数据库版本复制DDL语句。您可以使用相同的Extract和Replicat参数文件配置GoldenGate仅复制DDL、仅复制DML或同时复制DDL和DML语句。在开始为DDL复制配置参数之前，您应该了解GoldenGate\
    \ DDL复制的一些主要限制：\n\n*   在Oracle 11gR1之前的Oracle 10g及更高版本中，您必须关闭Oracle回收站。\n*   GoldenGate只能自动复制长度小于2MB的DDL语句。任何长于该长度的DDL必须使用GoldenGate提供的脚本手动处理。\n\
    *   DDL复制仅支持在*两个*系统之间进行复制。支持双向DDL复制。\n*   源和目标模式必须相同。这意味着您必须在Replicat上使用`ASSUMETARGETDEFS`参数。\n\
    *   您必须对需要DDL复制的表在数据泵Extract上使用直通模式。\n*   您应将单个表和相关表组的DML和DDL复制保留在同一个Extract和Replicat组中。\n\
    \n有关其他限制的详细信息，请参阅Oracle *GoldenGate Windows and UNIX Administrator's Guide*。现在，让我们逐步完成添加Oracle\
    \ DDL复制的步骤。此示例使用gger用户模式来存储DDL表，但您也可以根据需要选择其他模式：\n\n1.  授予gger用户在`UTL_FILE`上的执行权限：`SQL>\
    \ grant execute on utl_file to gger;`\n2.  将以下行添加到您的`GLOBALS`文件中。请记住，此文件位于您的GoldenGate软件安装目录中。如果它不存在，则需要在首次创建：`GGSCHEMA\
    \ GGER`\n3.  从GoldenGate软件安装目录运行`marker_setup.sql`脚本，如下所示。此脚本是GoldenGate软件安装的一部分。它会提示输入模式名称，在本例中为gger：\n\
    \    ```\n    SQL> connect / as sysdba\n    Connected.\n    SQL> @marker_setup.sql\n\
    \n    Marker setup script\n\n    You will be prompted for the name of a schema\
    \ for the GoldenGate database objects.\n    NOTE: The schema must be created prior\
    \ to running this script.\n    NOTE: Stop all DDL replication before starting\
    \ this installation.\n\n    Enter GoldenGate schema name:gger\n\n    Marker setup\
    \ table script complete, running verification script...\n    Please enter the\
    \ name of a schema for the GoldenGate database objects:\n    Setting schema name\
    \ to GGER\n\n    MARKER TABLE\n    -------------------------------\n    OK\n\n\
    \    MARKER SEQUENCE\n    -------------------------------\n    OK\n\n    Script\
    \ complete.\n    ```\n4.  从GoldenGate软件安装目录运行`ddl_setup.sql`。此脚本是GoldenGate软件安装的一部分：\n\
    \    ```\n    SQL> @ddl_setup.sql\n\n    GoldenGate DDL Replication setup script\n\
    \n    Verifying that current user has privileges to install DDL Replication...\n\
    \    Checking user sessions...\n\n    Check complete.\n\n    You will be prompted\
    \ for the name of a schema for the GoldenGate database objects.\n    NOTE: For\
    \ an Oracle 10g source, the system recycle bin must be disabled.\n    For Oracle\
    \ 11g and later, it can be enabled.\n    NOTE: The schema must be created prior\
    \ to running this script.\n    NOTE: Stop all DDL replication before starting\
    \ this installation.\n\n    Enter GoldenGate schema name:gger\n\n    You will\
    \ be prompted for the mode of installation.\n    To install or reinstall DDL replication,\
    \ enter INITIALSETUP\n    To upgrade DDL replication, enter NORMAL\n    Enter\
    \ mode of installation:INITIALSETUP\n    Working, please wait ...\n    Spooling\
    \ to file ddl_setup_spool.txt\n\n    Using GGER as a GoldenGate schema name, INITIALSETUP\
    \ as a mode of installation.\n\n    Working, please wait ...\n\n    ...\n    ```"
  raw: "##### Defining Threads\n\nIn an Oracle stand-alone database, there is typically\
    \ only one redo thread. In Oracle RAC, there is typically one redo thread per\
    \ instance. You need to tell the GoldenGate Extract process the number of redo\
    \ threads defined in the Oracle RAC environment. The following example adds an\
    \ Extract in an Oracle RAC environment with two instances and two threads:\n\n\
    `GGSCI (sourceserver) > ADD EXTRACT LHREMD1, TRANLOG, THREADS 2, BEGIN NOW`\n\n\
    ![images](images/square.jpg) **Tip** If the number of threads ever changes (such\
    \ as adding a new node and instance), you must remember to drop and re-add your\
    \ Extracts with the correct number of threads.\n\nNext, let's review how to configure\
    \ GoldenGate for Oracle ASM.\n\n#### Configuring for Oracle ASM\n\nIf you're using\
    \ Oracle ASM, some special GoldenGate parameters are needed in order to allow\
    \ the GoldenGate Extract to connect to ASM. In addition, you must configure the\
    \ Oracle listener and `tnsnames.ora` to support the connection from GoldenGate.\
    \ Let's look at the GoldenGate parameters first.\n\n##### Specifying the ASM User\n\
    \nWhen using ASM, the GoldenGate local Extract must log in to the ASM instance\
    \ in order to access the redo logs. You need to add an additional `TranLogOptions\
    \ ASMUser` parameter in the local Extract parameter file to specify the ASM user\
    \ ID and password, as shown in the following example:\n\n`TranLogOptions ASMUser\
    \ \"sys@asm\", asmpassword \"<encrypted password>\",`\n`ENCRYPTKEY default`\n\n\
    The ASM user can be any user that has the SYSDBA privilege in the ASM instance\
    \ (or the SYSASM privilege in 11g onwards. The example uses the sys user ID to\
    \ connect to the ASM instance.\n\n##### Updating the Listener\n\nAfter updating\
    \ your GoldenGate local Extract parameter file, you need to make sure your listener\
    \ is listening for connections on the ASM instance. Add a clause as shown in the\
    \ following Oracle 11g example to your `listener.ora` file:\n\n`(SID_DESC =`\n\
    `     (SID_NAME = +ASM1)`\n`     (ORACLE_HOME = /u01/asm/oracle/product/11.1.0/asm_1)`\n\
    \nThis clause ensures that your listener is listening for connections on the ASM\
    \ instance. Make sure to reload your listener for the changes to take effect.\n\
    \n##### Updating the TNSNAMES.ORA\n\nFinally, you need an alias in your `tnsnames.ora`\
    \ file for the ASM connection:\n\n`ASM =`\n`  (DESCRIPTION =`\n`    (ADDRESS =\
    \ (PROTOCOL = TCP)(HOST = sourceserver1-vip)(PORT = 1521))`\n`    (CONNECT_DATA\
    \ =`\n`      (SERVER = DEDICATED)`\n`(SERVICE_NAME = +ASM1)`\n`      (INSTANCE_NAME\
    \ = +ASM1)`\n`    )`\n`  )`\n\nThe entry should match the alias you specified\
    \ earlier in your GoldenGate `ASMUser` parameter. The example uses an `ASMUser`\
    \ of `sys@asm` to connect in the GoldenGate parameter file, which matches your\
    \ TNS entry.\n\n#### Adding Oracle DDL Replication\n\nIn addition to replicating\
    \ DML statements, GoldenGate can replicate DDL statements for all Oracle database\
    \ releases that support DML replication. You can configure GoldenGate to replicate\
    \ only DDL, only DML, or both DDL and DML statements with the same Extract and\
    \ Replicat parameter file. Before you jump into configuring the parameters for\
    \ DDL replication, you should be aware of some of the major restrictions with\
    \ GoldenGate DDL replication:\n\n*   You must turn off the Oracle recycle bin\
    \ in Oracle 10g and later prior to Oracle 11gR1.\n*   GoldenGate can only automatically\
    \ replicate DDL statements that are less than 2MB in length. Any DDL longer than\
    \ that must be processed manually using a GoldenGate-provided script.\n*   DDL\
    \ replication is supported for replication between *only* two systems. Bidirectional\
    \ DDL replication is supported.\n*   The source and target schemas must be identical.\
    \ This means you must be using the `ASSUMETARGETDEFS` parameter on your Replicat.\n\
    *   You must use passthru mode on your data-pump Extracts for tables that require\
    \ DDL replication.\n*   You should keep the DML and DDL replication for a single\
    \ table and for related groups of tables together in the same Extract and Replicat\
    \ groups.\n\nConsult the Oracle *GoldenGate Windows and UNIX Administrator's Guide*\
    \ for details on additional restrictions. Now, let's go though the steps to add\
    \ Oracle DDL replication. This example uses the gger user schema to store the\
    \ DDL tables, but you can choose another schema if needed:\n\n1.  Grant execute\
    \ permission on `UTL_FILE` to the gger user: `SQL> grant execute on utl_file to\
    \ gger;`\n2.  Add the following line to your `GLOBALS` file. Remember, this file\
    \ is in your GoldenGate software installation directory. If it doesn't exist,\
    \ you need to create it the first time: `GGSCHEMA GGER`\n3.  Run the `marker_setup.sql`\
    \ script from the GoldenGate software installation directory, as shown next. This\
    \ script is included as part of the GoldenGate software installation. It prompts\
    \ for the schema name, which in this case is gger: `SQL> connect / as sysdba`\n\
    \    `Connected.`\n    `SQL> @marker_setup.sql`\n\n`Marker setup script`\n\n`You\
    \ will be prompted for the name of a schema for the GoldenGate database objects.`\n\
    \    `NOTE: The schema must be created prior to running this script.`\n    `NOTE:\
    \ Stop all DDL replication before starting this installation.`\n\n`Enter GoldenGate\
    \ schema name:gger`\n\n`Marker setup table script complete, running verification\
    \ script...`\n    `Please enter the name of a schema for the GoldenGate database\
    \ objects:`\n    `Setting schema name to GGER`\n\n`MARKER TABLE`\n    `-------------------------------`\n\
    \    `OK`\n\n`MARKER SEQUENCE`\n    `-------------------------------`\n    `OK`\n\
    \n`Script complete.`\n4.  Run the `ddl_setup.sql` from the GoldenGate software\
    \ installation directory. This script is included as part of the GoldenGate software\
    \ installation: `SQL> @ddl_setup.sql`\n\n`GoldenGate DDL Replication setup script`\n\
    \n`Verifying that current user has privileges to install DDL Replication...`\n\
    \    `Checking user sessions...`\n\n`Check complete.`\n\n`You will be prompted\
    \ for the name of a schema for the GoldenGate database objects.`\n    `NOTE: For\
    \ an Oracle 10g source, the system recycle bin must be disabled.`\n    `For Oracle\
    \ 11g and later, it can be enabled.`\n    `NOTE: The schema must be created prior\
    \ to running this script.`\n    `NOTE: Stop all DDL replication before starting\
    \ this installation.`\n\n`Enter GoldenGate schema name:gger`\n\n`You will be prompted\
    \ for the mode of installation.`\n    `To install or reinstall DDL replication,\
    \ enter INITIALSETUP`\n    `To upgrade DDL replication, enter NORMAL`\n    `Enter\
    \ mode of installation:INITIALSETUP`\n    `Working, please wait ...`\n    `Spooling\
    \ to file ddl_setup_spool.txt`\n\n`Using GGER as a GoldenGate schema name, INITIALSETUP\
    \ as a mode of installation.`\n\n`Working, please wait ...`\n\n`...`"
