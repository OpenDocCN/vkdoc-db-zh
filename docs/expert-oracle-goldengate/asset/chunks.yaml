  raw: "#### Excluding Transactions for Bidirectional Replication\n\nIn a bidirectional\
    \ configuration, you have one or more Replicats running on each server applying\
    \ SQL transactions. You can imagine that an endless looping scenario of SQL transactions\
    \ could occur if each Replicat always applied SQL from the other Replicat back\
    \ and forth. By default, GoldenGate doesn't replicate SQL transactions applied\
    \ by the Replicats in order to prevent this endless looping. This is controlled\
    \ by the `GETREPLICATES` or `IGNOREREPLICATES` parameter. For most databases,\
    \ however, you still need to identify to GoldenGate which Replicat user transactions\
    \ to exclude. You do so with different parameters depending on the DBMS, as shown\
    \ in the following examples.\n\nFor DB2 z/OS and LUW, Ingres, and Sybase code,\
    \ use the following local Extract parameter file to exclude the gger user:\n\n\
    `TRANLOGOPTIONS EXCLUDEUSER gger`\n\nFor Sybase, include the following in the\
    \ local Extract parameter file to exclude the default transaction name of ggs_repl.\
    \ For SQL Server, this parameter is required only if the Replicat transaction\
    \ name is something other than the default ggs_repl:\n\n`TRANLOGOPTIONS EXCLUDETRANS\
    \ ggs_repl`\n\nFor Teradata, you don't need to identify the Replicat transaction;\
    \ however, you must include the following `SQLEXEC` statements in the Replicat\
    \ parameter file to execute a procedure that sets the Replicat session automatically\
    \ at startup:\n\n`SQLEXEC \"SET SESSION OVERRIDE REPLICATION ON;\"`\n`SQLEXEC\
    \ \"COMMIT;\"`\n\nFor SQL/MX, include the following in the local Extract parameter\
    \ file to exclude the operations on the checkpoint table `gger.ckpt`:\n\n`TRANLOGOPTIONS\
    \ FILTERTABLE gger.chkpt`\n\nFor Oracle 10g and later, include the following local\
    \ Extract parameter file to exclude the gger user:\n\n`TRANLOGOPTIONS EXCLUDEUSER\
    \ gger`\n\nFor Oracle 9i, include the following `TRACETABLE` parameter in both\
    \ the Extract and Replicat parameter files before any `TABLE` or `MAP` statements.\
    \ When an update occurs, the Replicat updates the trace table. This helps the\
    \ Extract identify and exclude any GoldenGate transactions. You have to create\
    \ the trace table first, using the `ADD TRACETABLE` command. This example uses\
    \ the trace table `ggs_trace`:\n\n`TRACETABLE ggs_trace`\n\nNext, let's discuss\
    \ how to handle conflict resolution for bidirectional replication.\n\n#### Handling\
    \ Conflict Resolution for Bidirectional Replication\n\nIn a bidirectional configuration,\
    \ you must plan for, identify, and handle data conflicts. Conflicts can occur\
    \ if data belonging to a record with the same key value is updated on both databases\
    \ at the same time. Because GoldenGate is an asynchronous solution, it's possible\
    \ for these conflicts to occur.\n\nThe following are a few techniques you can\
    \ use to avoid conflicts and handle conflict resolution:\n\n> *Low latency*: You\
    \ should make sure that the latency or lag between the two databases is minimized\
    \ to prevent or at least minimize conflicts from occurring. For example, if a\
    \ user on the first database updates Employee_ID 100's FIRST_NAME to Bill and\
    \ a few minutes later a different user on the second database updates the same\
    \ employee's FIRST_NAME to the correct name of William, you want to make sure\
    \ the correct name is applied to both databases. If there is latency, Bill may\
    \ be applied after William. If there is no latency the correct name of William\
    \ will be applied in the proper order. If there is significant latency, then you\
    \ may end up with more conflicts to resolve.\n> \n> *Key ranges:* You can assign\
    \ specific key ranges to applications and ensure that they only update that key\
    \ range on a specific database. For example, to avoid conflicts in the EMPLOYEES\
    \ table, you can assign EMPLOYEE_IDs 0–1000000 to the first database and EMPLOYEE_IDs\
    \ 1000001–2000000 to the second database. The HR application will be aware of\
    \ the key ranges and code their DML accordingly to point to the correct database\
    \ based on the key value.\n> \n> *Key identifiers:* Another technique is to add\
    \ an additional key column to the existing key to identify the specific database\
    \ where the record is owned or mastered. For example, database A can have an additional\
    \ key column to indicate that the record belongs to database A. Database B can\
    \ have a similar key added. You need to evaluate any disadvantages of having such\
    \ a column in your database tables.\n> \n> *Automated key sequences:* In some\
    \ databases, you can use automatically generated sequence numbers for keys with\
    \ different options. In the EMPLOYEES table, for example, you can generate even-numbered\
    \ sequences for one database and odd-numbered sequence for the second database.\
    \ Doing so ensures that there are no conflicts between the databases.\n> \n> *Conflict-resolution\
    \ routines:* If you can't avoid key conflicts, you need to identify that a conflict\
    \ is about to occur and handle it appropriately based on business decisions and\
    \ application logic. You can add filters to your `MAP` statements to determine\
    \ that a conflict is about to occur and how to handle it. For example, you can\
    \ add a filter to determine if a record comes in with the same key and an older\
