  trans: "\n### 审阅安装说明\n\nOracle GoldenGate 文档提供了大量的安装和配置指南，可从 OTN（Oracle 技术网络）获取，地址为\
    \ [`www.oracle.com/technetwork/middleware/goldengate/documentation/index.html`](http://www.oracle.com/technetwork/middleware/goldengate/documentation/index.html)。图\
    \ 2-10 展示了一份指南列表，这些指南阐述了 Oracle GoldenGate 的安装、配置和支持流程。\n\n![images](img/0210.jpg)\n\
    \n`图 2-10. Oracle GoldenGate 文档库`\n\n根据您的具体平台和基础设施设计，您需要查阅上图所示的相应指南。作为第一步，我们建议您审阅所有发行说明，以避免在安装完成前、安装过程中及安装后出现潜在错误问题。Oracle\
    \ GoldenGate 软件的每个版本发布时，开发团队都会及时发现新的缺陷并提供补丁以解决已知问题。\n\n![images](img/square.jpg)\
    \ `注意` 在安装 Oracle GoldenGate 软件前，请务必查阅发行说明。\n\n### 安装 GoldenGate\n\n在 Windows\
    \ 和 Linux 平台上安装 Oracle GoldenGate 软件之前，请务必确认源和目标 Oracle 数据库服务器均已在线并可用。这意味着除了检查确保这些\
    \ Oracle 实例和数据库已在线外，您还需要测试两台服务器主机之间的网络连通性。如果 GoldenGate 无法通过 TCP/IP 网络连接访问主机，软件将无法正常运行。您可以使用\
    \ `ping` 网络实用程序来检查网络连通性。如果源和目标环境之间存在网络超时问题，您需要在网络管理员协助下解决此问题，然后再安装 Oracle GoldenGate\
    \ 软件。\n\n#### 通用系统要求\n\n使用 Oracle 和 GoldenGate 的基本安装要求在 Windows、Linux 和 UNIX 平台上是标准的，涵盖所支持的\
    \ Oracle 数据库版本、内存要求、磁盘空间分配、网络要求和操作系统支持。我们将在本节中涵盖所有这些方面。\n\n##### 数据库服务器版本\n\n\
    Oracle 11g GoldenGate 支持以下 Oracle 数据库版本：\n\n*   Oracle 9iR2 (9.2)\n*   Oracle\
    \ 10gR1/R2 (10.1/10.2)\n*   Oracle 11gR1/R2 (11.1/11.2)\n\n自 Oracle GoldenGate\
    \ 11g 起，上述 Oracle 版本均支持 DML 和 DDL 复制。不提供对 Oracle 旧版本（如 Oracle v7 和 Oracle 8i）的支持。如果您计划在\
    \ Oracle 数据库环境中实施 GoldenGate，我们建议您将数据库升级到 Oracle 11g。\n\n#### 内存要求\n\n每个 GoldenGate\
    \ `Replicat` 和 `Extract` 进程至少需要 25 到 55 MB 的 RAM 内存。每个 GoldenGate 实例最多支持 300 个并发的\
    \ `Extract` 和 `Replicat` 进程。\n\n作为经验法则，您需要考虑到对于基本的 Oracle GoldenGate 安装，除了 `manager`\
    \ 进程外，至少还需要 1-2 个 `Extract` 进程和多个 `Replicat` 进程。评估总内存需求的最佳方式是运行 `GGSCI` 命令查看当前报告文件，并检查\
    \ `PROCESS AVAIL VM FROM OS (min)` 以确定您的平台是否有足够的交换内存。\n\n接下来让我们考虑安装 Oracle GoldenGate\
    \ 的磁盘要求。\n\n#### 磁盘空间要求\n\n以下是一些您应采取的措施，以确保有足够的磁盘空间来支持您的 GoldenGate 复制需求：\n\n\
    *   为 Oracle GoldenGate 软件二进制文件分配至少 50–150 MB 的磁盘空间。\n*   为每台服务器上每个 GoldenGate\
    \ 实例的工作目录和文件分配 40 MB 磁盘空间。对于 Oracle GoldenGate 的基本配置，您需要在源系统分配 40 MB，在目标系统分配 40\
    \ MB，总计需要 80 MB 磁盘空间。\n*   为临时文件分配足够的磁盘空间以满足 GoldenGate 操作的需要。默认情况下，GoldenGate\
    \ 将临时文件存储在默认安装目录下的 `dirtmp` 目录中。规划临时文件空间的一个良好经验法则是大约 10 GB 磁盘空间。\n*   每个跟踪文件至少规划\
    \ 10 MB 空间。作为经验法则，我们建议您从为每个系统分配至少 1 GB 磁盘空间用于跟踪文件开始。或者，使用 Oracle 提供的以下公式确定要预留的磁盘空间量：\n\
    \    ```\n    [一小时内的日志量] x [停机小时数] x 0.4 = 跟踪文件磁盘空间。\n    ```\n    计算跟踪文件所需总空间量的一种方法是查询源\
    \ Oracle 数据库内的 `V$ARCHIVED_LOG` 视图。以下查询展示了如何操作：\n    ```\n    select trunc(COMPLETION_TIME),count(*)*100\
    \ size_in_MB\n    from v$archived_log\n    group by  trunc(COMPLETION_TIME);\n\
    \    TRUNC(COM SIZE_IN_MB\n    --------- ----------\n    15-MAY-11        500\n\
    \    ```\n    安装 GoldenGate 后运行测试，以测量您特定的事务混合和负载，并评估跟踪文件所需的总磁盘空间。\n\n#### 网络要求\n\
    \n由于 Oracle GoldenGate 软件通过网络在源系统和目标系统之间运行，您必须配置 TCP/IP 网络，以在 DNS 中容纳所有主机，包括将部署在\
    \ Oracle GoldenGate 基础架构中的主机名。如果存在防火墙，则必须允许主机通过 `manager`、`Extract` 和 `Replicat`\
    \ 进程访问所需的开放端口发送和接收数据。必须为 GoldenGate 环境分配此端口范围。\n\n同时，为 GoldenGate `manager`、`Extract`\
    \ 和 `Replicat` 进程分配端口。默认情况下，`manager` 使用端口 `7840`。我们建议您保留此端口可用。此外，记录分配给 GoldenGate\
    \ 进程的端口以避免端口冲突。\n\n#### 操作系统要求\n\n在 Windows 下运行时，有以下一些要求：\n\n*   您必须使用管理员帐户来安装\
    \ Oracle GoldenGate 软件。\n*   您必须安装 Microsoft Visual C++ 2005 SP1 可再发行组件包。您必须使用这些库的\
    \ SP1 版本。您可以在 [`www.microsoft.com`](http://www.microsoft.com) 获取适用于您特定 Windows\
    \ 平台的正确版本。\n\n在 Linux 或 UNIX 下，您应执行以下操作：\n\n*   授予用于安装 Oracle GoldenGate 软件的操作系统（OS）帐户读写权限。\n\
    *   在集群环境中，将 Oracle GoldenGate 软件放在所有集群节点均可访问的共享磁盘或共享集群文件系统上。\n*   从对 Oracle 数据库软件以及\
    \ Oracle 在线重做日志文件具有读/写访问权限的操作系统和数据库系统帐户进行安装。\n\n![images](img/square.jpg) `注意`\
    \ 对于安腾（Itanium）平台，您必须安装 `vcredist_IA64.exe` 运行时库包，它提供了在 Windows 安腾平台上运行 Oracle\
    \ GoldenGate 所必需的 Visual Studio DLL 库。\n\n#### Microsoft Windows 集群环境的要求\n\nGoldenGate\
    \ 对于使用 Microsoft 集群的 Windows 环境有一些独特的要求。在执行安装之前，请完成以下步骤：\n\n1.  以管理员权限帐户登录到其中一个集群节点。\n\
    2.  选择一个在同一 Microsoft Windows 集群组中具有资源成员资格的驱动器。\n3.  确保磁盘组具有集群节点所有权。\n4.  将 Oracle\
    \ GoldenGate 软件放置在集群中所有节点均可访问的共享驱动器上。\n"
- fmt: "#### Installing Goldengate on Windows\n\nFollowing is a complete run-through\
    \ of a Goldengate install onto a Windows system. The process begins with downloading\
    \ the software, continues through uncompressing the download file, and then moves\
    \ into the install proper.\n\n1.  Download the Oracle 11g Goldengate software\
    \ for Windows x86 platform.\n2.  Download and install the Microsoft Visual C++\
    \ 2005 SP1 Redistributable Package from [`http://microsoft.com`](http://microsoft.com)\
    \ as shown in `Figure 2-11`.\n\n    ![images](images/0211.jpg)\n\n    **Figure\
    \ 2-11.** Microsoft Visual C++ package for Oracle GoldenGate installation on Windows\
    \ platform\n\n    After you have downloaded the Microsoft Visual C++ package,\
    \ save the file and then click the `vcredist_x86.exe` file, as shown in `Figure\
    \ 2-12`.\n\n    ![images](images/0212.jpg)\n\n    **Figure 2-12.** Installing\
    \ the Microsoft Visuall C++ libraries\n\n3.  Create two new directories for the\
    \ Oracle Goldengate software, one to be the source directory, and the other to\
    \ be the target:\n    ```\n    mkdir ggs_src\n    mkdir ggs_trgt\n    ```\n4.\
    \  Using Winzip or your favorite extraction utility, extract the Oracle 11g Goldengate\
    \ software to the `C:\\ggs_src` directory on the source database server and to\
    \ the `C:\\ggs_trgt` directory to the target database server.\n5.  Execute the\
    \ command `ggsci` on source and target:\n    ```\n    ggsci\n    ```\n6.  Execute\
    \ the command `CREATE SUBDIRS` on source and target:\n    ```\n    create subdirs\n\
    \    ```\n7.  Finally, give the command `EXIT` to leave the `ggsci` environment\
    \ to complete the installation process. Do this on both the source and the target\
    \ machines.\n\n#### Installing GoldenGate 11g on Linux and UNIX\n\nWe recommend\
    \ that you have a basic understanding of Linux and UNIX commands before you undertake\
    \ an installation for Oracle Goldengate on Linux and UNIX platforms. Basic syntax\
    \ and knowledge of copy and archive commands such as `cp`, `mv`, `tar`, and `mkdir`\
    \ are essential to function within this environment. Oracle ACE Director Arup\
    \ Nanda has written an excellent tutorial series on Oracle Linux command mastery\
    \ available online from OTN for Linux and UNIX novices and newbies at [`www.oracle.com/technetwork/articles/linux/index.html`](http://www.oracle.com/technetwork/articles/linux/index.html).\n\
    \n![images](images/square.jpg) **Note** Make sure that all system, network, and\
    \ database requirements have been completed.\n\nYou will need to unzip the files\
    \ for Linux and UNIX platforms by using the `tar` command. Once you have unzipped\
    \ the files, run the `ggsci` command `CREATE SUBDIRS` as we performed previously\
    \ for Windows.\n\n#### Environment Settings for Oracle and Goldengate on Linux\
    \ and UNIX\n\nSince Linux and UNIX platforms use environment variables to configure\
    \ software, you must set the `ORACLE_HOME` and `ORACLE_SID` environment variables.\
    \ For multiple process groups with Extract and Replicat, you will need to configure\
    \ the parameter files by adding `SETENV` as shown in the following syntax for\
    \ the extract and replicat parameter files.\n\n```\nSETENV (ORACLE_HOME=\"<ORACLE_HOME\
    \ directory path>\")\nSETENV (ORACLE_SID=\"<ORACLE_SID>\")\n```\n\nIf you have\
    \ more than one Oracle database instance on a system with Extract and Replicat\
    \ processes, you will need to issue a `SETENV` statement in the parameter file\
    \ for each Extract and Replicat process group.\n\nFollowing is a sample Extract\
    \ parameter file:\n\n```\nEXTRACT ext1\nSETENV (ORACLE_HOME=\"/oracle/ora11g/product\"\
    )\nSETENV (ORACLE_SID=\"ora11src\")\n\nUSERID ggs, PASSWORD ggs\nRMTHOST sdtarget\n\
    RMTTRAIL /d1/oracle/ggs/dirdat/rt\nTABLE scott.emp;\n```\n\nFor Windows servers\
    \ that have multiple Oracle database instances, you can set the environment variable\
    \ for `ORACLE_HOME` and `ORACLE_SID` by adding these settings to the registry\
    \ for Windows. This can be performed by opening My Computer ![images](images/U001.jpg)\
    \ Settings ![images](images/U001.jpg) Properties ![images](images/U001.jpg) Advanced\
    \ tab then Environment Variables and System Variables.\n\n#### GoldenGate and\
    \ Oracle RAC Considerations\n\nOracle RAC is certified by Oracle to support Goldengate\
    \ software. However, you will need to keep the following things in mind when performing\
    \ installation for Oracle Goldengate with RAC environments:\n\n*   All GoldenGate\
    \ software binary and executable files, trail files, and log files should be on\
    \ shared storage accessible by all cluster nodes.\n*   System clocks must be synchronized\
    \ for all RAC nodes using the Goldengate software. You can set up the network\
    \ time protocol (NTP) to ensure that cluster nodes are kept in sync. In addition\
    \ you can use the Goldengate `IOLATENCY` option with the `THREADOPTIONS` parameter\
    \ for Extract and Replicat parameter files.\n\n#### Installing Goldengate for\
    \ Microsoft SQL Server on Windows\n\nThe Oracle GoldenGate installation process\
    \ for Microsoft SQL Server requires additional configuration setups to ensure\
    \ that it functions successfully. The following versions of Microsoft SQL Server\
    \ are supported with Oracle GoldenGate:\n\n*   SQL Server 2000\n*   SQL Server\
    \ 2005\n*   SQL Server 2008\n\nTo verify that your specific Windows platform and\
    \ MS SQL Server version is supported, you can check the certification matrix online\
    \ at My Oracle Support ([`http://support.oracle.com`](http://support.oracle.com)).\n\
    \nSoftware for non-Oracle platforms can be obtained online from the E-Delivery\
    \ site at [`http://edelivery.oracle.com`](http://edelivery.oracle.com).\n\nNow\
    \ that we have discussed the installation process for Oracle RDBMS with GoldenGate,\
    \ we will discuss how to prepare other database platforms with Oracle GoldenGate.\
    \ One thing to keep in mind is that the installation steps for the Oracle GoldenGate\
    \ software are the same for other RDBMS platforms such as Teradata and Sybase.\
    \ However, the subtle nuances lie in the preparation for these environments with\
    \ Oracle GoldenGate.\n\n#### Installing Goldengate for Teradata on Windows and\
    \ UNIX\n\nAlas, by default, there is no built-in replication facility within the\
    \ Teradata RDBMS platform. As such, Teradata requires Goldengate to perform replication\
    \ activities. Teradata communicates with Oracle Goldengate via the Teradata Access\
    \ Module (TAM) and through the Teradata Change Data Capture (CDC) on the source\
    \ Teradata server. Oracle Goldengate functions as the replication server and receives\
    \ the transactions from the Teradata CDC source server.\n\nOracle Teradata has\
    \ a number of requirements that must be performed prior to installing Oracle Goldengate.\
    \ Before Oracle Goldengate can be installed for Teradata, the following items\
    \ must be configured and available:\n\n*   Change Data Capture (CDC)\n*   Replication\
    \ Groups\n*   Teradata Access Module (TAM)\n*   Relay Services Gateway (RSG)\n\
    \nThe setup and configuration of these tasks for Teradata is beyond the scope\
    \ of this chapter. For details on how to configure these features with Teradata,\
    \ please consult the Teradata documentation available online at [`www.info.teradata.com/`](http://www.info.teradata.com/).\n\
    \n##### System Requirements for Teradata with Oracle GoldenGate\n\nOracle GoldenGate\
    \ has unique requirements for setup with Teradata. The Oracle GoldenGate replication\
    \ server must be configured along with setups for the source and target Teradata\
    \ systems (if used).\n\n###### Oracle GoldenGate Replication Server\n\nIt is important\
    \ to keep the following points in mind when deploying Oracle GoldenGate for Teradata:\n\
    \n*   Install Oracle 11g GoldenGate on a separate physical server. Do not install\
    \ on any of the Teradata Servers.\n*   The Teradata Access Module (TAM) must be\
    \ installed on the Oracle GoldenGate replication server under the root directory\
    \ for the Oracle GoldenGate installation directory. TAM communicates with an Oracle\
    \ GoldenGate API called the Vendor Access Module (VAM). Details for TAM configuration\
    \ are provided in the Teradata Replication Services documentation available online\
    \ at [`www.info.teradata.com/`](http://www.info.teradata.com/)."
