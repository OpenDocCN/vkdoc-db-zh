- fmt: '## Introduction


    Oracle Corporation acquired GoldenGate in 2009 as part of future strategy to implement
    advanced replication technologies within the product suite of data warehousing
    and real-time transaction management. Before the advent of Oracle GoldenGate technology,
    data replication was performed using Oracle Streams and third-party replication
    solutions such as Quest SharePlex. This chapter discusses various types of database
    replication methods along with the techniques used by each method, to illustrate
    how Oracle GoldenGate came to be the logical conclusion for the current and future
    real-time-based data-transaction replication technology with Oracle database systems.


    Before the chapter discusses the foundations of Oracle GoldenGate software, a
    brief history of time is warranted for how database replication technologies came
    into existence. Before GoldenGate software, data transactions were replicated
    across networks with simple file transfers via the File Transfer Protocol (`FTP`)
    for nonrelational databases. With the popularity of the UNIX operating system
    and the advent of client-server computing, data replication was implemented with
    Oracle basic and advanced replication software in version 8 of Oracle database
    software.


    ### Distributed Processing and Replication


    Oracle release 5 introduced distributed processing queries in the form of database
    links. Database links provided the ability to issue SQL queries across networks
    and were the first real attempt to achieve a replication solution. [Figure 1-1](#Chapter01.html#fig_1_1)
    shows how connectivity is established between the source and target database environments
    via database links.


    ![images](images/0101.jpg)


    **Figure 1-1.** Database links for distributed systems


    The next step in the march of data replication came into existence with Oracle
    release 8, which enabled database professionals to set up log-based and trigger-based
    replication solutions.


    ### Oracle Basic Replication


    Oracle basic replication existed in two flavors: log-based and trigger-based.
    With log-based replication, you had to set up snapshot schemas and database links
    between the source and target database environments. Data was mined from the online
    redo logs in Oracle to capture the changes and propagate them across the network
    to send data transactions from the source database (a.k.a. master) to the target
    database. The schemas had be configured on both the source and target databases
    as well. In addition, refresh groups had to be configured in order to keep the
    target environments in sync with the primary master database on the source system.
    As you can imagine, the design was crude and prone to errors in terms of establishing
    a successful conflict-resolution system of checks and balances.


    ### Oracle Advanced Replication


    Oracle advanced replication added more robust features to allow for multimaster
    replication with multiple environments, as well as trigger-based methods to establish
    conflict-resolution rulesets to improve data reliability and to maintain accurate
    data synchronization between source and target systems. Nonetheless, advanced
    replication had its shortcomings and flaws, particularly the lack of support for
    certain data types and failures that occurred with trigger-based conflict handling.
    Also, latency was an issue in terms of keeping the target systems in sync with
    source master systems.


    [Figure 1-2](#Chapter01.html#fig_1_2) shows how conflict resolution was set up
    for basic and advanced replication in Oracle environments.


    ![images](images/0102.jpg)


    **Figure 1-2.** Conflict resolution for Oracle replication


    ### Oracle Streams Replication


    Oracle introduced the Streams replication solution in release 9.2. Streams resolved
    the deficiencies that plagued the older replication methods in previous releases.
    It established a log-based replication solution that mined the online redo logs
    for committed transactions on the source to move the data to downstream target
    systems. In addition, Streams introduced new background processes to maintain
    the communication and operations of replication activities within the Oracle ecosystem.


    Streams further enhanced previous Oracle replication technologies by using advanced
    queuing technology to boost replication performance. Oracle Advanced Queuing (`AQ`)
    is a technology designed with Streams and other Oracle technologies including
    Oracle Data Guard logical databases. `AQ` provides a system of enqueues and dequeues
    based on the subscriber and publisher model for database communication. It allows
    for robust messaging and processing of data transactions between source and target
    environments and lies at the heart of Oracle Streams processing.


    Further details on how to set up and manage `AQ` are available online in the Oracle
    reference documentation at [`http://tahiti.oracle.com`](http://tahiti.oracle.com).


    ### Evolution and Oracle GoldenGate


    With the advent of true log-based replication technology from Oracle and Quest
    SharePlex, advances made it possible to finally perform real-time-based replication.
    Out of the mainframe and midsize systems world arose a shining star in the development
    of real-time transaction-based replication techniques. In the late 1980s, a small
    software company called GoldenGate came up with a different method of replicating
    data between database platforms. Until GoldenGate, replication of data across
    platforms and vendors was problematic at best. For example, complex software development
    was required to harness the power of Oracle to non-Oracle database environments
    via the `Pro-C` and software development `APIs` to allow transactions to be moved
    between environments.


    GoldenGate invented a powerful and novel way to replicate data while achieving
    high performance with accuracy. Instead of using different formats, GoldenGate
    implements a uniform format to perform data replication operations by using a
    command prompt interface called GoldenGate Software Command Interface (`GGSCI`).
    `GGSCI` commands are used to create new GoldenGate replication configurations
    as well as to perform administration tasks. Committed transactions are stored
    in flat files called `trail files` on the filesystem for both the source and target
    systems. In addition, GoldenGate provides a seamless and transparent method to
    perform real-time data replication with guaranteed transaction consistency between
    heterogeneous environments without the need to develop complex routines or code.


    ### Summary


    This introduction has provided a history lesson on how database replication technologies
    evolved into the robust Oracle GoldenGate technologies. The next chapter shows
    you how to install the Oracle GoldenGate product suite.


    ## CHAPTER 2


    ## Installation


    The installation process for Oracle GoldenGate is simple compared to most of the
    other product suites available from the Oracle Fusion Middleware family, of which
    GoldenGate is a part. In this chapter, we will provide you with details on how
    to prepare for and perform a complete installation of the following Oracle GoldenGate
    products:


    *   Oracle GoldenGate 11g

    *   Oracle GoldenGate Director 11g

    *   Oracle GoldenGate Veridata 11g'
