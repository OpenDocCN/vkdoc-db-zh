    ## About the Authors


    ![image](images/ben_prusinski.jpg) ![images](images/square.jpg)**Ben Prusinski**
    is an Oracle Certified Professional (OCP) and database architect with more than
    14 years of experience with Oracle data warehouse and Oracle E-Business applications.
    As a corporate database consultant, Ben has provided services to dozens of Fortune
    500 clients. He is an internationally recognized expert in Oracle high availability,
    performance tuning, database security, and ERP implementations. As a top Oracle
    expert, Ben received the prestigious Oracle ACE award in 2009 in recognition of
    his contributions to the Oracle community. As an Oracle GoldenGate Certified Associate,
    Ben is a popular speaker at major conferences such as Oracle OpenWorld, Chilean
    Oracle User Group (CLOUG) in Latin America, the Independent Oracle Users Group
    (IOUG), and Oracle Collaborate OAUG (Oracle Applications User Group). In addition
    to Oracle consulting for clients, Ben regularly updates his Oracle blog at [`http://oracle-magician.blogspot.com`](http://oracle-magician.blogspot.com)
    with the latest database technology tips and information to share with the Oracle
    community. Ben is also a polyglot, being fluent in Spanish, French, Korean, and
    English, and he enjoys traveling to exotic places. In his free time, Ben enjoys
    racing in autocross events, golf, martial arts, reading, and cooking.


    ![image](images/steve_phillips.jpg) ![images](images/square.jpg)**Steve Phillips**
    is an Information Systems Architect with Hewlett-Packard Enterprise Services and
    has been working with computer databases for over twenty-five years. Steve is
    an Oracle Certified Professional and a past presenter at Oracle Openworld and
    IOUG. Steve holds a master''s degree in Information Systems from the University
    of Texas at Dallas and currently lives in Plano, Texas. In his spare time Steve
    enjoys playing tennis, coaching baseball, and watching sports.


    ![image](images/richard_chung.jpg) ![images](images/square.jpg)**Richard Chung**
    has 19 years of hands-on experiences in all aspect of IT environments. His recent
    focus is in the Business Intelligence area, such as Reporting, ETL, and Data architecture.
    Richard is Principal of BI and System Architect at Starwood Hotels and Resorts,
    where he built the current data warehouse and reporting applications; he also
    wrote highly sophisticated search engines and designed the ETL to populate the
    active data warehouse with near real-time data. Golden Gate is used to synchronize
    the critical business data around different cities in the US. Before Starwood,
    he worked at a startup [dot.com](http://dot.com), JP Morgan Chase, and Ernst &
    Young.


    ## About the Technical Reviewer


    ![image](images/arup_nanda.jpg) ![images](images/square.jpg)**Arup Nanda** ([`arup@proligence.com`](http://arup@proligence.com))
    has been an Oracle DBA for over 16 years, working on all aspects of Oracle database
    management from modeling to performance tuning. He has co-authored four books,
    published 300 articles, and presented over 150 sessions at various technology
    conferences; he also received DBA of the Year in 2003 from Oracle. He is an Oracle
    ACE Director, a frequent blogger ([`arup.blogspot.com`](http://arup.blogspot.com)),
    and a member of the Oak Table Network and the SELECT Journal Editorial Board.
    He lives in Danbury, CT.


