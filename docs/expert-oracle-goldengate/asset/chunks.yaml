  trans: "#### 配置备用复制进程\n\n接下来，你应该添加一个备用复制进程，它将在发生故障切换或计划切换后，随时准备将任何更改应用回你的主数据库。这与主复制进程类似，但将用于从备用数据库复制回主数据库。通过现在提前添加它，你将在发生中断时做好启动它的准备。\n\
    \n首先，为复制进程 `RHREMP3` 创建一个参数文件，如下例所示：\n\n```\nGGSCI (primaryserver) 1> edit params\
    \ RHREMP3\n\nReplicat RHREMP3\n-------------------------------------------------------------------\n\
    -- 用于 HR 模式的复制进程\n-------------------------------------------------------------------\n\
    \nUSERID GGER, PASSWORD userpw\n\nReportCount Every 10000 Records, Rate\nReport\
    \ at 00:30\n\nDiscardFile dirrpt/RHREMP3.dsc, Append\nDiscardRollover at 02:00\n\
    \n-- 在初始加载同步完成后，应关闭 HandleCollisions。\nHandleCollisions\n\nAssumeTargetDefs\n\n\
    Map HR.*, Target HR.* ;\n```\n\n下一步是添加备用复制进程组。在以下示例中，你将把 `RHREMP3` 复制进程添加到 GoldenGate\
    \ 配置中。\n\n```\nGGSCI (primaryserver) > ADD REPLICAT RHREMP3, EXTTRAIL dirdat/l6\n\
    ```\n\n请记住，在发生计划切换或故障切换之前，你不会启动这个备用复制进程。至此，你已完成灾难恢复复制的初始设置。你目前完成的所有步骤都是为潜在的切换或故障切换情况做准备。你现在已准备好执行计划内的切换或意外的故障切换到你的备用数据库。\n\
    \n### 执行计划切换\n\n尽管你正在为环境准备一个完整的意外灾难恢复场景，但在许多情况下，你可能需要因计划内停机而关闭主数据库。使用 GoldenGate\
    \ 复制，你可以将这些计划内停机时间缩减到最低限度，只需将应用程序从主数据库切换到备用数据库，且在此过程中不会丢失任何数据。在主数据库因维护而停机时，你可以让应用程序继续处理备用数据库上的事务，并在维护完成后切换回主数据库。\n\
    \n在我们的示例中，假设你需要为应用数据库软件补丁，这通常需要四小时的停机时间。现在，让我们使用 GoldenGate 复制来执行这些步骤，并尽量缩短应用程序的停机窗口。为简单起见，我们将计划切换步骤分为五个部分，每部分包含若干步骤。让我们从第一部分开始，如图\
    \ 12-4 所示。\n\n![images](img/1204.jpg)\n\n**图 12-4.** 灾难恢复计划切换，第一部分\n\n以下是图 12-4\
    \ 所示第一部分各步骤的说明。\n\n1.  停止连接到主数据库的应用程序。\n2.  确认没有延迟后，停止本地抽取进程，如下例所示：\n    ```\n\
    \    GGSCI (primaryserver) > LAG EXTRACT LHREMD2\n    Sending GETLAG request to\
    \ EXTRACT LHREMD2 ...\n    Last record lag: 10 seconds.\n    At EOF, no more records\
    \ to process.\n\n    GGSCI (primaryserver) > STOP EXTRACT LHREMD2\n    ```\n3.\
    \  确认没有延迟后，停止数据泵抽取进程，如下例所示：\n    ```\n    GGSCI (primaryserver) > LAG EXTRACT\
    \ PHREMD2\n    Sending GETLAG request to EXTRACT PHREMD2 ...\n    Last record\
    \ lag: 6 seconds.\n    At EOF, no more records to process.\n\n    GGSCI (primaryserver)\
    \ > STOP EXTRACT PHREMD2\n    ```\n4.  确认没有更多记录需要处理后，停止复制进程，如下例所示：\n    ```\n\
    \    GGSCI (standbyserver) > LAG REPLICAT RHREMD2\n    Sending GETLAG request\
    \ to REPLICAT RHREMD2 ...\n    Last record lag: 7 seconds.\n    At EOF, no more\
    \ records to process.\n\n    GGSCI (standbyserver) > STOP REPLICAT RHREMD2\n \
    \   ```\n\n现在你已经完成了切换过程的第一部分。应用程序不再使用主数据库，并且从主数据库到备用数据库的复制已停止。现在你可以进行第二部分，如图 12-4\
    \ 所示，启动备用抽取进程并将应用程序切换到使用备用数据库。\n\n![images](img/1205.jpg)\n\n**图 12-5.** 灾难恢复计划切换第二部分\n\
    \n以下是图 12-5 所示第二部分各步骤的说明。\n\n1.  为准备应用程序切换，开始捕获更改，修改备用数据库的本地抽取进程以从现在开始捕获更改，然后如下启动它：\n\
    \    ```\n    GGSCI (standbyserver) > ALTER EXTRACT LHREMD3, BEGIN NOW\n    GGSCI\
    \ (standbyserver) > START EXTRACT LHREMD3\n    ```\n2.  为应用程序准备备用数据库，并启动连接到备用数据库的应用程序。作为准备，你可能需要在备用数据库上为你的应用程序用户授予一些\
    \ SQL 权限。同时记得启用你可能在备用数据库作为复制目标时已禁用的任何触发器或级联删除约束。\n3.  此时，你应该在没有任何应用程序连接的情况下，在主数据库上执行所需的任何维护。在示例中，我们将关闭主数据库并应用数据库补丁。"
- fmt: "After completing part 2, you should be done with your database maintenance\
    \ and ready to switch the databases back to their original configuration. In order\
    \ to do that, you must apply any changes made to the standby database, while it\
    \ was functioning as the primary database, back to the original primary database.\
    \ Those steps are shown in [Figure 12-6](#Chapter12.html#fig_12_6).\n\n![images](images/1206.jpg)\n\
    \n**Figure 12-6.** Disaster recovery planned switchover, part 3\n\n## Part 3\n\
    \nNow let's review each of the steps in part 3, as shown in [Figure 12-6](#Chapter12.html#fig_12_6).\n\
    \n### 步骤说明\n\n1.  First you need to complete any maintenance activities on the\
    \ primary database. Until the maintenance is successfully completed, the standby\
    \ database will act as the primary. Make sure to disable any triggers or cascade\
    \ delete constraints on the primary before processing the GoldenGate changes from\
    \ the standby.\n2.  Stop the application running against the standby database.\
    \ At this time be sure to leave the `Local Extract` running so it can capture\
    \ any remaining database transactions.\n3.  Start the the `Replicat` on the primary\
    \ database to prepare to process the changes that were made on the standby database\
    \ as shown in the following example:\n    ```\n    GGSCI (primaryserver) > START\
    \ REPLICAT RHREMD3\n    ```\n4.  Start the data-pump `Extract` on the standby\
    \ to send change transactions to be processed by the `Replicat` on the primary\
    \ as shown in the following example:\n    ```\n    GGSCI (standbyserver) > START\
    \ EXTRACT PHREMD3\n    ```\n\nIn part 3 you finished your database maintenance\
    \ and then processed all the changes that were made to the standby database while\
    \ it was acting as the primary database. Next you need to turn off the replication\
    \ from the standby database to the primary database in part 4 as shown in [Figure\
    \ 12-7](#Chapter12.html#fig_12_7).\n\n## Part 4\n\n![images](images/1207.jpg)\n\
    \n**Figure 12-7.** Disaster recovery planned switchover, part 4\n\nFollowing are\
    \ the descriptions of the steps for part 4 from [Figure 12-7](#Chapter12.html#fig_12_7).\n\
    \n### 步骤说明\n\n1.  After verifying there is no lag, stop the `Local Extract` on\
    \ the standby database as shown in the following example:\n    ```\n    GGSCI\
    \ (standbyserver) > LAG EXTRACT LHREMD3\n    Sending GETLAG request to EXTRACT\
    \ LHREMD3 ...\n    Last record lag: 5 seconds.\n    At EOF, no more records to\
    \ process.\n    GGSCI (standbyserver) > STOP EXTRACT LHREMD3\n    ```\n2.  After\
    \ verifying there is no lag, stop the data-pump `Extract` on the standby database\
    \ as shown in the following example:\n    ```\n    GGSCI (standbyserver) > LAG\
    \ EXTRACT PHREMD3\n    Sending GETLAG request to EXTRACT PHREMD3 ...\n    Last\
    \ record lag: 4 seconds.\n    At EOF, no more records to process.\n    GGSCI (standbyserver)\
    \ > STOP EXTRACT PHREMD3\n    ```\n3.  After verifying there are no more records\
    \ to process, stop the `Replicat` on the primary database as shown in the following\
    \ example:\n    ```\n    GGSCI (primaryserver) > LAG REPLICAT RHREMD3\n    Sending\
    \ GETLAG request to REPLICAT RHREMD3 ...\n    Last record lag: 6 seconds.\n  \
    \  At EOF, no more records to process.\n    GGSCI (primaryserver) > STOP REPLICAT\
    \ RHREMD3\n    ```\n\nNow that the replication from the standby to the primary\
    \ is complete and stopped, you can proceed with restarting the original replication\
    \ from the primary database to the standby database in part 5, as shown in [Figure\
    \ 12-8](#Chapter12.html#fig_12_8).\n\n## Part 5\n\n![images](images/1208.jpg)\n\
    \n**Figure 12-8.** Disaster recovery planned switchover, part 5\n\nThe steps for\
    \ Part 5, as shown in [Figure 12-8](#Chapter12.html#fig_12_8), are as follows:\n\
    \n### 步骤说明\n\n1.  To being capturing changes in preparation for the application\
    \ switchover back to the primary database, alter the `Local Extract` for the primary\
    \ database to begin capturing changes beginning *now* and then start the `Extract`\
    \ as follows:\n    ```\n    GGSCI (primaryserver) > ALTER EXTRACT LHREMD2, BEGIN\
    \ NOW\n    GGSCI (primaryserver) > START EXTRACT LHREMD2\n    ```\n2.  Prepare\
    \ the primary database for the application and start the application connected\
    \ to the primary database. In preparation, you may need to grant some SQL permissions\
    \ to your application users. Also remember to enable any triggers or cascade delete\
    \ constraints you may have stopped while the primary database was the replication\
    \ target.\n3.  Start the data-pump `Extract` on the primary database as shown\
    \ in the following example:\n    ```\n    GGSCI (primaryserver) > START EXTRACT\
    \ PHREMD2\n    ```\n4.  Start the the `Replicat` on the standby database as shown\
    \ in the following example:\n    ```\n    GGSCI (standbyserver) > START REPLICAT\
    \ RHREMD2\n    ```\n\nNow you have completed Part 5 of your replication switchover\
    \ process and the databases are back to their original configuration. As a result,\
    \ you have minimized the downtime for your application from four hours to the\
    \ minimum required to switch your application to the standby database and back.\
    \ Next let's cover a different scenario using our disaster recovery replication\
    \ to perform an unplanned failover."
