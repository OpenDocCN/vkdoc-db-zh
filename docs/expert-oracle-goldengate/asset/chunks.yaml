    long-running transactions in Oracle GoldenGate. In the event that your Oracle
    database online redo logs have dumped their current data to the archive logs and
    you can’t restore the necessary archive logs, you must resynchronize both the
    source and target database environments.


    #### Extract Failure Conditions Due to Oracle Source Database Issues


    As mentioned earlier, Extracts must have read access to log in to the source Oracle
    database to read data from the online redo log files. Check the permissions for
    the Extract user account provided in the parameter file if you experience errors
    during operation. You can verify this by using the `DBLOGIN` command to check
    for permission and read-access issues. Another root cause of this issue is the
    disk-full condition for the source Oracle database file system.


    Once you’ve resolved the read and login issues on the source Oracle database,
    you need to stop both the Manager and Extract processes with Oracle GoldenGate.
    Exit the GGSCI interface for Oracle GoldenGate, and then restart the Manager and
    Extract process groups on the source system.


    #### Data-Pump Errors


    Recall from earlier chapters that you can use a special Extract process group
    called a data pump on an intermediate system to enhance performance and availability
    with processing. One common problem occurs when you use the `PASSTHRU` parameter
    and try to use data transformations. This causes the data pump to fail because
    the `PASSTHRU` parameter isn’t supported with Oracle GoldenGate. For the data
    pump pass-through mode with Oracle GoldenGate, both source and target table names
    and structures must be the same, and no filtering operations can be performed
    on the data.


    Another thing to check for in the data-pump parameter file when you use the `PASSTHRU`
    parameter is whether you’re using the `USERID` or `SOURCEDB` parameter. If the
    source system doesn’t contain a database, these parameters shouldn’t be used.
    If you’re using pass-through for some tables and normal processing for other tables,
    then for normal processing of these tables, the system must have a database. In
    addition, you need to specify the database login parameters with Oracle GoldenGate
    as well as use a source definitions file if any filtering is performed. Furthermore,
    you need to use a target definitions file for any column mapping or conversion
    operations.'
  trans: '

    每当您发现 Extract 检查点没有递增时，`INFO REPLICAT`命令可能会显示持续处理，因为它会指示读取的相对字节地址（RBA）在不断增加，直到最后一笔记录被写入到跟踪文件（trail
    file）。之后它就会停止移动，因为没有更多的记录通过网络发送并写入跟踪文件。与此同时，在源系统上，数据泵 Extract 进程无法将数据移动到目标端，并且很快会因为处理数据时内存耗尽而进入异常终止（abend）状态。然而，主
    Extract 进程组会继续运行，因为它会写入到本地跟踪文件。最终，它会到达该系列中的最后一个跟踪文件；而当它无法建立检查点时，就会失败并异常终止。


    这证明了尽快解决网络问题至关重要，以防止 Extract 进程在事务日志中落后太多，因为您不希望数据失去同步。您应该使用诸如 HP OpenView 或 Tivoli
    之类的网络诊断工具来监控源和目标环境之间的网络，并将这些问题告知您的网络管理员，以验证网络是否处于健康状态，并且延迟问题已尽可能降至最低。在确认网络性能充足后，请检查
    Extract 进程的带宽是否已饱和。您可能需要在多个 Extract 组之间拆分处理，以缓解网络性能问题。对于带宽资源不大的环境，多个数据泵也可能有益。这降低了在网络不可靠并出现周期性峰值或故障时
    Extract 失败的机会。您应该将具有相互参照完整性（referential integrity）的表归入同一个 Extract 进程组。在网络延迟问题解决后，您还可以调整
    Extract 的内存使用情况。


    ## Oracle 数据库与 GoldenGate 相关问题


    在理想情况下，本书将涵盖支持 Oracle GoldenGate 的每个平台的数据库配置问题。由于细节超出了本书的范围，我建议您在线查阅针对第三方 RDBMS
    平台的平台相关 Oracle GoldenGate 文档：[`http://download.oracle.com/docs/cd/E18101_1/index.htm`](http://download.oracle.com/docs/cd/E18101_1/index.htm)。导致
    Oracle GoldenGate 操作出错的 Oracle 数据库相关问题包括以下：


    *   Extract 进程无法读取或访问在线重做日志或 Oracle 数据库归档日志文件

    *   Oracle 数据库归档日志缺失

    *   Oracle 数据库不同步问题

    *   Oracle 源和目标数据库环境中 Extract 和 Replicat 失败

    *   数据泵错误


    ### Extract 无法访问 Oracle 数据库归档和重做日志


    如果 Extract 进程在源 Oracle 数据库上找不到请求的归档或在线重做日志文件，它会等待。例如，您可能会遇到 Oracle GoldenGate
    内部的错误消息，如下所示：


    ```

    2011-03-16 00:51:55  ERROR   OGG-00446  Error 5 (Access is denied.) opening log
    file C:\WINORA11G2\ORADATA\WIN11SRC\REDO01.LOG for sequence 16. Not able to establish
    initial position for begin time 2011-03-16 00:50:47.

    2011-03-16 00:51:55  ERROR   OGG-01668  PROCESS ABENDING.

    ```


    您可以通过执行 GGSCI 命令`VIEW REPORT <group>`来找出 Extract 正在寻找的日志文件。解决 Extract 归档日志缺失问题的最佳办法是恢复缺失的归档日志文件，然后重新启动
    Extract 组。为避免这些错误，您应维持足够的归档日志供 Extract 使用，直到这些日志中包含的数据已被处理完毕。


    Extract 和 Oracle 数据库归档日志文件的第二个问题发生在归档日志未存储在默认 Oracle 位置时。在这种情况下，您可以使用 Extract
    参数`ALTARCHIVELOGDEST <路径名>`来为 Extract 处理所需的归档日志指定另一个位置。识别归档日志缺失问题的一个关键方法是，当这种情况发生时，Extract
    启动过程运行缓慢，并且看起来处于挂起状态，因为它会回溯查找归档日志序列以找到其所需的特定日志。如果 Extract 在数据库事务打开时重启，则它必须搜索所有过去的日志，从而产生了搜索并回溯到过去操作的需要，直到收到提交（commit）为止，因为只有已提交的事务才会被
    Oracle GoldenGate 记录。进行中（In-flight）的事务不会被捕获，也不会记录在 Oracle 数据库归档日志中。Extract 可能需要花费数小时甚至数天时间来搜索
    Oracle 数据库归档日志以定位请求的日志文件。如果 Extract 未能找到归档日志，它将异常终止并失败。


    您应该在源 Oracle 数据库上针对`V$TRANSACTION`动态性能视图运行查询，以确保存在未提交的事务。您还应该定期运行 GGSCI 命令`SEND
    EXTRACT`来查看和管理长时间运行的事务。设置长时间运行的 Oracle 数据库事务阈值的一种方法是使用参数`WARNLOGTRANS`来标识 Oracle
    GoldenGate 中长时间运行的事务。如果您的 Oracle 数据库在线重做日志已将其当前数据转储到归档日志中，并且您无法恢复必要的归档日志，则必须重新同步源和目标数据库环境。


    ### 由于源 Oracle 数据库问题导致的 Extract 失败情况


    如前所述，Extract 必须具有读取权限才能登录到源 Oracle 数据库以从在线重做日志文件读取数据。如果您在操作期间遇到错误，请检查参数文件中提供的
    Extract 用户帐户的权限。您可以使用`DBLOGIN`命令来验证权限和读取访问问题。此问题的另一个根本原因是源 Oracle 数据库文件系统的磁盘已满情况。


    一旦您解决了源 Oracle 数据库上的读取和登录问题，您需要停止 Oracle GoldenGate 的 Manager 和 Extract 进程。退出
    Oracle GoldenGate 的 GGSCI 界面，然后在源系统上重新启动 Manager 和 Extract 进程组。


    ### 数据泵错误


    回想前面的章节，您可以在中间系统上使用一个称为数据泵的特殊 Extract 进程组，以提高处理性能和可用性。一个常见的问题是当您使用`PASSTHRU`参数并尝试进行数据转换时。这会导致数据泵失败，因为`PASSTHRU`参数不受
    Oracle GoldenGate 支持。对于 Oracle GoldenGate 的数据泵直通模式，源表和目标表的名称和结构必须相同，并且不能对数据执行任何过滤操作。


    当您使用`PASSTHRU`参数时，数据泵参数文件中需要检查的另一件事是您是否使用了`USERID`或`SOURCEDB`参数。如果源系统不包含数据库，则不应使用这些参数。如果您对某些表使用直通模式，而对其他表使用正常处理，那么对于这些表的正常处理，系统必须具有数据库。此外，您需要为
    Oracle GoldenGate 指定数据库登录参数，并且如果执行了任何过滤操作，还需要使用源定义文件（source definitions file）。Furthermore,
    you need to use a target definitions file for any column mapping or conversion
    operations.

