  \ > info ext PHREMD*`\n\n    ```\n    EXTRACT    PHREMD1   最后启动 2011-03-20 22:51\
  \   状态 运行中\n    检查点延迟       00:00:00 （更新于 00:00:06 前）\n    日志读取检查点  文件 dirdat/l1000018\n\
  \                         第一条记录  RBA 8144\n\n    EXTRACT    PHREMD2   最后启动 2011-03-20\
  \ 22:51   状态 运行中\n    检查点延迟       00:00:00 （更新于 00:00:06 前）\n    日志读取检查点  文件 dirdat/l1000018\n\
  \                         第一条记录  RBA 8144\n    ```\n\n10. 启动两个`复制`以开始处理来自数据泵的变更：\n\
  \    `GGSCI (targetserver) > start rep RHREMD*`\n\n    ```\n    正在向管理器发送 START 请求\
  \ ...\n    REPLICAT RHREMD1 正在启动\n\n    正在向管理器发送 START 请求 ...\n    REPLICAT RHREMD2\
  \ 正在启动\n    ```\n\n    `GGSCI (targetserver) > info rep RHREMD*`\n\n    ```\n  \
