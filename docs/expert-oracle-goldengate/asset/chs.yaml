                       2011-03-25 23:21:48.001492  RBA 2852\n```\n\n\n#### 使用 BATCHSQL\n\
  \n`BATCHSQ`L 是你可以添加到 Replicat 中以提升性能的另一个参数。根据 Oracle GoldenGate 文档，`BATCHSQL` 最多可将\
  \ Replicat 的性能提升 **300%**。`BATCHSQL` 有一些使用限制，并且仅对 Oracle、SQL Server、DB2 LUW、z/OS\
  \ 上的 DB2 以及 Teradata 数据库有效。你应查阅 `Oracle GoldenGate Windows and UNIX Reference Guide`\
  \ 以获取完整的限制列表。\n\n在常规处理中，GoldenGate 会对事务进行分组，但会保留源自源端的事务顺序。使用 `BATCHSQL` 时，GoldenGate\
  \ 会将相似的事务分组到一个高性能数组中，并以快得多的速度处理它们。要使用默认值实现 `BATCHSQL`，只需将以下参数添加到你的 Replicat 参数文件中即可：\n\
  \n`BATCHSQL`\n\n如果你需要调整 `BATCHSQL` 消耗的内存量，可以为 `BATCHSQL` 添加几个可选参数。你可以参考 GoldenGate\
  \ 参考指南了解那些参数的详细信息。通常，你应该从默认值开始，然后在需要时添加可选参数。\n\n让我们看几个例子来说明 `BATCHSQL` 的工作原理。图 7-5\
  \ 显示了 GoldenGate 正常处理远程 trail 的情况。该远程 trail 有三个事务，每个事务都包含对 `HR.EMPLOYEE` 表的一次插入和一次删除。GoldenGate\
  \ Replicat 根据 `GROUPTRANSOPS` 参数设置的最小值，将这些事务组织成一个更大的 Replicat 事务。在这个例子中，我们假设你使用的是默认的\
  \ `GROUPTRANSOPS` 设置，即每个 Replicat 事务最少包含 1,000 个 SQL 操作。请注意，GoldenGate 通常保留 SQL\
  \ 操作的顺序，即插入后跟删除，正如在远程 trail 中一样。\n\n![images](img/0705.jpg)\n\n**图 7-5.** GoldenGate\
  \ 常规事务处理\n\n图 7-6 显示了使用 `BATCHSQL` 处理远程 trail 的 GoldenGate。该远程 trail 有三个事务，每个事务都包含对\
  \ `HR.EMPLOYEE` 表的一次插入和一次删除。GoldenGate Replicat 根据 `GROUPTRANSOPS` 参数设置，将这些事务组织成一个更大的\
  \ Replicat 事务。在这个例子中，我们假设你使用的是默认的 `GROUPTRANSOPS` 设置，即每个 Replicat 事务包含 1,000 个 SQL\
  \ 操作。使用 `BATCHSQL` 时，请注意 GoldenGate 改变了 SQL 操作的顺序，并将对同一张 SQL 表的插入、更新和删除操作分组在一起。`BATCHSQ`L\
  \ 将对相同表格、相同列执行的相同 SQL 操作分组或批处理在一个处理数组中。\n\n![images](img/0706.jpg)\n\n**图 7-6.**\
  \ 使用 `BATCHSQL` 的 GoldenGate 事务处理\n\n你可能会问自己，使用 `BATCHSQL` 是否会导致任何引用完整性问题。GoldenGate\
  \ 会在应用批次之前分析任何外键依赖关系并做出调整。根据 GoldenGate 文档，在某些情况下，GoldenGate 可能需要在一个批次中应用多个 SQL\
  \ 语句来维护引用完整性。\n\n`BATCHSQL` 还会在你的报告文件中创建一个新部分。以下是当 `BATCHSQL` 激活时，你在报告文件中看到的新增统计信息的示例。请记住，这些微小的示例数字是基于图\
  \ 7-6 中的简单示例，仅用于说明目的：\n\n```\nBATCHSQL statistics:\n              Batch operations:\
  \          9\n                       Batches:          3\n              Batches\
  \ executed:          2\n                        Queues:          2\n           \
  \   Batches in error:          1\n        Normal mode operations:          1\n \
  \   Immediate flush operations:          0\n                  PK collisions:   \
  \       0\n                  UK collisions:          0\n                  FK collisions:\
  \          0\n           Thread batch groups:          0\n                     \
  \  Commits:          2\n                     Rollbacks:          1\n           \
  \   Queue flush calls:          2\n                  Ops per batch:          3\n\
  \        Ops per batch executed:       4.5\n                  Ops per queue:   \
  \    4.5\n           Parallel batch rate:       N/A\n```\n\n让我们回顾一下 `BATCHSQL` 报告中的几个字段。批操作数是已执行的操作总数。批次数是创建的批次数量。在这个例子中你有三个批次，你可以通过参考图\
  \ 7-6 看到。出错批次数是 1，这告诉你 `BATCHSQL` 在处理时遇到了一个错误。由于这个错误，正常模式操作数等于 1，因为当出现错误时，`BATCHSQL`\
  \ 会回滚并恢复为正常事务处理模式操作。\n\n当 `BATCHSQL` 遇到处理错误时，你将在 GoldenGate 日志中看到以下类型的消息：\n\n```\n\
  2011-03-22 17:12:14  WARNING OGG-00869  Aborting BATCHSQL transaction.\nDatabase\
  \ error 1 (ORA-00001: unique constraint (HR.PK_EMP_ID) violated).\n\n2011-03-22\
  \ 17:12:15  WARNING OGG-01137  BATCHSQL suspended, continuing in\nnormal mode.\n\
  \n2011-03-22 17:12:15  WARNING OGG-01003  Repositioning to rba 231493300 in seqno\
  \ 49.\n```\n\n当这些错误发生时，GoldenGate 会自动回滚 `BATCHSQL` 处理，并尝试在正常模式下处理该事务。这会降低 `BATCHSQL`\
  \ 的速度，因此如果你看到大量此类错误，你可能会发现 `BATCHSQL` 无法提升你的性能。\n\n当你成功启用 `BATCHSQL` 后，你应该检查你的 Replicat\
  \ 报告文件，并将处理速率与你的基线报告进行比较，以确定是否获得了性能提升。\n\n#### 使用 GROUPTRANSOPS\n\n你可以使用 `GROUPTRANSOPS`\
  \ 来调整 GoldenGate 事务中的 SQL 操作数量。正如你在图 7-5 中看到的，GoldenGate Replicat 将源端事务分组到一个 GoldenGate\
  \ 事务中。默认情况下，Replicat 在一个事务中至少包含 1,000 个 SQL 操作。通过设置更高的 `GROUPTRANSOPS` 值，比如 2,000，你可能会获得更高的性能。除了拥有更大的事务外，更高的\
  \ `GROUPTRANSOPS` 值还会减少写入 GoldenGate 检查点表的检查点数量。`GROUPTRANSOPS` 可以在你的 Replicat 参数文件中设置，如下例所示：\n\
  \n`GROUPTRANSOPS 2000`\n\n注意不要将 `GROUPTRANSOPS` 设置得过高。这样做会导致目标端延迟增加，因为目标端的事务大小比源端大。\n\
  \n### 调优磁盘存储\n\n作为数据复制产品，GoldenGate 本质上会产生大量磁盘 I/O。Trail 文件由本地 Extract 写入，由数据泵 Extract\
  \ 读写，最后由 Replicat 读取。因此，为了实现最高性能，将你的 trail 文件放置在尽可能快速的磁盘存储上至关重要。以下是一些建议，用于为 GoldenGate\
  \ 调优磁盘存储以获得最佳性能：\n\n*   将 GoldenGate 文件放置在可用的最快存储和存储控制器上。虽然 NAS 对于 GoldenGate 文件来说是可以接受的，但由于\
  \ NAS 网络开销，通常 SAN 存储比 NAS 性能更好。存储技术在不断变化，在你做决定时应评估当时的性能。\n*   使用 RAID 0+1 而不是 RAID\
  \ 5。RAID 5 维护奇偶校验信息，这不仅不需要，还会减慢 trail 的写入速度。\n*   始终评估用于存储你的 trail 文件的磁盘的性能。例如，在\
  \ Linux 上使用 `IOSTAT` 命令来确定是否存在任何磁盘设备瓶颈。\n*   使用上一节中描述的 `GROUPTRANSOPS` 参数来减少 I/O。\n\
  \n\n## 第 8 章：监控 Oracle GoldenGate\n\n### 调优网络\n\n根据你的复制环境中数据变更的数量，Extract（抽取进程）可能会通过网络向\
  \ Replicat（复制进程）发送大量数据以供处理。源端与目标端之间的网络性能对于 GoldenGate 的整体性能至关重要。如前所述，你可以使用诸如 Windows\
  \ 系统监视器或 Linux 上的 `netstat` 命令等工具来收集网络统计数据。你可以将这些数据与基线网络统计数据进行比较，以确定你遇到的是持续的性能问题还是仅仅是一个临时的峰值。\n\
  \n除了服务器命令，你也可以查看 GoldenGate 本身，看看是否是网络问题导致了性能瓶颈。让我们通过一个示例，了解如何使用 GoldenGate 命令检测网络瓶颈。\n\
  \n首先，让我们在本地 Extract 上运行一个 `info` 命令。输出的一部分如下例所示：\n\n```\nGGSCI (sourceserver) >\
  \ info ext LHREMD1, showch 10\n...\nWrite Checkpoint #1\n\n  GGS Log Trail\n\n \
  \ Current Checkpoint (current write position):\n    Sequence #: 11\n    RBA: 977\n\
  \    Timestamp: 2011-01-28 23:19:46.828700\n    Extract Trail: dirdat/l1\n```\n\n\
  你应该多次运行 `info` 命令并比较输出，特别是 Write Checkpoint（写入检查点）的值。观察每次命令输出中的最高 Write Checkpoint\
  \ #，并确保 RBA 和时间戳是递增的。对数据泵 Extract（data-pump Extract）运行相同的命令。\n\n如果本地 Extract 的 Write\
  \ Checkpoint 值在增加，而数据泵 Extract 的*没有*增加，那么说明数据泵 Extract 存在网络瓶颈。本地 Extract 能够处理数据，但数据泵遇到了瓶颈。最终，由于网络瓶颈，数据泵\
  \ Extract 会因事务积压而耗尽内部内存，然后异常终止（abends）。\n\n你也可以在 Replicat 上运行命令来确认是否存在网络瓶颈。下例在 Replicat\
  \ 上运行了一个 `status` 命令：\n\n```\nGGSCI (targetserver) > send replicat RHREMD1, status\n\
  \nSending STATUS request to REPLICAT RHREMD1 ...\n  Current status: At EOF\n  Sequence\
  \ #: 17\n  RBA: 2852\n  0 records in current transaction\n```\n\n在此示例中，Replicat\
  \ 处于 At EOF（位于文件末尾）状态。如果 Replicat 处于 At EOF 状态，而本地 Extract 正在处理数据，那么你就知道瓶颈出在数据泵和网络上。本地\
  \ Extract 正在抽取变更数据，但由于网络瓶颈，Replicat 没有数据可以处理。请记住，如果目标跟踪文件中遗留有任何数据，Replicat 会继续正常处理一段时间，直到它到达文件末尾。然后它将停止处理，因为它没有通过网络从数据泵接收到目标跟踪文件中的新数据。\n\
  \n你可以采取几种调优方法来帮助缓解网络性能问题。第一种方法是创建并行数据泵，如本章前面所述。并行数据泵可以缓解因使用单个数据泵进程而导致的任何网络带宽限制。其次，你可以在\
  \ `RMTHOST` 参数上调整一些额外的网络调优选项。我们接下来就来看看这些选项。\n\n### 调优 RMTHOST 参数\n\n默认的 GoldenGate\
  \ TCP 套接字缓冲区大小为 30,000 字节。通过增加此缓冲区大小，你可以通过网络发送更大的数据包。*《Oracle GoldenGate Windows\
  \ and UNIX 参考指南》* 提供了一个示例公式来帮助计算最佳的 TCP 套接字缓冲区大小。你还应该检查你的特定服务器对于最大 TCP 缓冲区大小的限制。例如，在\
  \ Linux 上，你可以检查以下设置来确定最大 TCP 发送和接收缓冲区大小：\n\n```\nnet.core.rmem_max = 262144\nnet.core.wmem_max\
  \ = 262144\n```\n\n在此示例中，发送和接收缓冲区设置为 256KB。你可以与服务器和网络管理员确认这些大小是否可以调整得更高，例如 4MB，以允许\
  \ GoldenGate 利用更大的 TCP 缓冲区大小。如果你向 `RMTHOST` 参数添加一个选项，GoldenGate 可以利用更大的 TCP 缓冲区大小，如下例所示：\n\
  \n```\nRmtHost targetserver, MgrPort 7809, TCPBUFSIZE 100000\n```\n\n此示例将数据泵 Extract\
  \ 中的 TCP 缓冲区大小自定义为 100,000 字节，试图通过发送更大的 TCP 数据包来提高性能。`RMTHOST` 参数的另一个网络调优选项是 `COMPRESS`\
  \ 选项，如下例所示：\n\n```\nRmtHost targetserver, MgrPort 7809, TCPBUFSIZE 100000, COMPRESS\n\
  ```\n\n使用 `COMPRESS`，GoldenGate 会压缩通过网络发送的出站数据块，然后在写入跟踪文件之前解压缩数据。根据 GoldenGate 参考手册，压缩比可能达到\
  \ 4:1 或更高。请注意，压缩和解压缩会增加服务器的一些 CPU 开销。\n\n#### 调优数据库\n\n本书不会花大量篇幅讨论通用的数据库调优，但可以肯定的是，调优不佳的数据库会对\
  \ GoldenGate 性能产生负面影响。在 Replicat 端尤其如此，因为 GoldenGate 在那里执行实际的数据库 DML 语句来更改数据。在启用\
  \ GoldenGate 之前，你应该确保数据库已得到适当调优。你可以检查几个主要方面，以帮助确保目标数据库上 Replicat 的性能良好：\n\n*   验证\
  \ GoldenGate 使用的目标表具有唯一键，并且已为这些键创建了 SQL 索引。\n*   验证数据库优化器统计信息是最新的，以确保数据库选择最高效的 SQL\
  \ 执行计划。\n*   确保作为复制目标的数据库表没有过度碎片化。如果有，应进行重组以消除碎片。\n*   运行数据库性能报告，例如 Oracle 数据库的\
  \ AWR，并验证没有重大的性能问题。\n\n### 总结\n\n本章介绍了调优 GoldenGate 复制的基本方法。它回顾了捕获 GoldenGate 性能统计数据基线，以帮助你确定何时出现性能问题以及如何最好地解决问题。然后，你看到了一些具体的调优方法和示例，例如使用并行处理组策略以及使用\
  \ `BATCHSQL` 和 `GROUPTRANSOPS` 等 GoldenGate 参数。\n\n### 监控 Oracle GoldenGate\n\n\
  GoldenGate 有很多依赖其他系统才能正常运行的组成部分。复制的目标是将数据从源端实时复制到目标端而不丢失任何数据。每个系统都是不同的，具有不同的优点和缺点。你可以监控薄弱点，但有时你可能也希望监控那些很少出问题的强点。正如墨菲定律所说：“凡是可能出错的事，就一定会出错。”\
  \ 解决问题的成本可能远高于实施一个良好监控系统的费用。拥有一个良好的监控系统，你可以减少因错误导致的停机时间，甚至可以在问题发生之前就阻止它们。\n\n本章介绍了一些场景，说明了\
  \ GoldenGate 数据传播链中可能出现的问题。接着，讨论了检测和识别错误的不同方法。最后，提供了一些可以使你的工作更轻松的自动化脚本。本章教你如何识别问题，并为你提供一些关于如何解决问题的基本思路。要了解高级故障排除、问题修复和调优技术，请参阅本书的第\
  \ 7 章、第 11 章和第 14 章。\n\n\n\n### 设计监控策略\n\n要设计一个全面的监控策略，您需要掌握两个因素：\n\n*   *内部因素：*\
  \ 您需要理解 `GoldenGate` 的内部工作原理。作为 `GoldenGate` 管理员，您应该拥有完全的控制权。如果 `GoldenGate` 系统内部出现问题，您应该能够识别并自行解决。\n\
  *   *外部因素：* 这些是 `GoldenGate` 所依赖的系统。在大型组织中，您可能无法完全访问这些系统，例如复杂的网络、服务器和存储监控工具及实用程序。在某些情况下，如果您不是\
  \ `DBA`，甚至无法访问数据库监控工具。但您无需完全访问这些系统即可监控您的 `GoldenGate` 进程。本章将讨论 `GoldenGate` 管理员可用的监控技术。\n\
  \n除了这些因素，您还需要识别 `GoldenGate` 所有可能出现故障的方式。一个简单的 `GoldenGate` 配置可能的监控点如图 8-1 所示；本章将涵盖其中的每一个。如果您能管理一个简单的配置，就能管理一个复杂的配置。`GoldenGate`\
  \ 系统中移动部件的数量并不重要——您只需为每个额外的组件增加更多的监控。例如，对于一个双活配置，您需要将图 8-1 中监控点 1 至 7 的监控活动从源端复制到目标端。您还需要在目标端对监控点\
  \ 7 至 13 执行相同的操作。如果您添加了一个额外的数据泵进程，那么您就需要在源端为点 2、3、4 和 7 添加监控，并在目标端对应的位置进行监控。然而，这是逻辑视图。实际脚本数量可能有所不同。例如，一个脚本可能提供\
  \ `GoldenGate` 整体健康状况的鸟瞰视图。\n\n![images](img/0801.jpg)\n\n**图 8-1.** 潜在的 `GoldenGate`\
  \ 监控点\n\n每个 `Extract` 进程都有一个数据库连接，用于查询数据字典以检查是否有任何更改。如果发生更改，`Extract` 进程会读取在线重做日志以捕获更改，并写入到跟踪文件。如果数据不在在线重做日志中，它会读取归档日志。如果数据不在归档日志中，并且您在\
  \ `Extract` 参数文件中指定了 `ALTARCHIVELOGDEST <路径名>`，`Extract` 进程会读取备用的归档日志。如果 `Extract`\
  \ 进程仍然无法找到具有正确提交序列号（`CSN`）的事务，`Extract` 进程将异常终止，并告知您丢失的文件序列号。\n\n![images](img/square.jpg)\
  \ **注意** `CSN` 是 `GoldenGate` 特有的；每个数据库系统都有自己跟踪提交序列的方式。Oracle 使用系统更改号（`SCN`），`DB2\
  \ z/OS` 使用相对字节地址（`RBA`），MySQL 使用 `LogNum`，等等。\n\n#### 为何监控抽取进程至关重要\n\n在 Oracle 中，`Extract`\
  \ 依赖于 Oracle 重做日志工作。对于处于归档日志模式的数据库，在最后一个条目写入后，在线重做日志会被转换为归档日志。在某些系统中，`DBA` 可能会压缩归档日志并将其移动到\
  \ `GoldenGate` 无法访问的其他位置。如果 `Extract` 长时间宕机且归档日志无法访问，您就会丢失数据。在关键业务环境中，您需要密切监控您的\
  \ `Extract` 进程。\n\n在正常的数据库系统中，`GoldenGate` 跟踪文件通常只占用整个重做日志文件的 30%或更少。另外 70%的重做数据是系统相关的日志，`GoldenGate`\
  \ 并不需要。因此，例如，如果您为了应对灾难而保留两周的跟踪文件，那么两周的总跟踪文件大小为 `<每日总重做日志大小> × 0.3 × 14`。您需要大约四倍于每日总重做日志大小的存储空间来保存整整两周的变更日志数据。在大型数据库系统上，连续宕机两周是非常罕见的。因此，只要\
  \ `Extract` 进程能够生成跟踪文件，`Replicat` 就会加载它们。\n\n#### 获取最大阈值\n\n获取 `GoldenGate` 通过网络能传输的最大阈值非常重要。例如，如果\
  \ `GoldenGate` 因计划停机需要关闭 5 小时，您需要知道 `GoldenGate` 追赶至零延迟需要多长时间。为此，您可以停止数据泵几小时，然后重新启动它。您可以在\
  \ `GoldenGate` 软件命令界面（`GGSCI`）提示符下使用 `stats` 命令来计算操作数。此外，您可以检查累积的文件大小和消耗速率。您将在本章后面看到如何执行此操作。\n\
  \n### 在 GoldenGate 环境中应监控哪些进程\n\n本章使用 `Extract EXTGGS1`、`Data Pump DPGGS1` 和 `Replicat\
  \ REPGGS1` 进行演示。这是一个简单的单向抽取。`GoldenGate` 进程使用 `CSN`、`seqno` 和 `RBA` 来连接并序列化每个进程。`CSN`、`seqno`\
  \ 和 `RBA` 是识别 `GoldenGate` 环境中延迟的工具。如果您确切知道延迟出现在哪里，就可以在该进程中增加更多监控。\n\n如前所述，Oracle\
  \ `GoldenGate` 使用 `CSN` 来跟踪提交顺序。每个数据库系统都有其独特的序列号；有关 `CSN` 的完整列表，请参阅 Oracle `GoldenGate`\
  \ 管理指南。`CSN` 也与时间戳相关联。\n\n![images](img/square.jpg) **注意** 在真正应用集群（`RAC`）环境中，确保所有集群服务器具有完全相同的时间戳至关重要。否则，您会收到“`SCN`\
  \ 不匹配的不兼容记录”错误。如果收到此错误，您可能会丢失数据，或者需要使用 `Logdump` 实用程序来识别有问题的记录并手动修补数据。\n\n除了 `CSN`，`seqno`\
  \ 在监控和故障排除中也起着重要作用。`Seqno` 是跟踪文件的序列号；每种类型的跟踪文件都有自己的序列号。例如，`Extract` 跟踪文件中的 `seqno=100`\
  \ 可能与 `Replicate` 或数据泵中的序列号 100 不同，即使它们处于同一传播过程中。跟踪文件的命名约定是 `aannnnnn`，其中 `aa` 是两个字符的跟踪文件前缀，六个\
  \ `n` 是 `seqno`。如果 `GoldenGate` 用完了所有可用的 `seqno` 值，它会从 `000000` 重新开始。从技术上讲，您最多可以拥有一百万个跟踪文件。因此，如果您需要保留大量跟踪文件，请正确设置跟踪文件大小。\n\
  \n最后一个关键指标是重做日志序列号。每当您发出 `alter extract begin [now]|[timestamp]` 命令时，`GoldenGate`\
  \ 会搜索 Oracle 数据字典以确定从哪个重做日志开始读取。如果未提供时间戳，`GoldenGate` 会从上一个检查点文件开始。因此，启动 `Extract`\
  \ 可能需要一段时间，尤其是在使用 `NODYNAMICRESOLUTION` 参数时。\n\n#### 监控所有运行中的进程\n\n`GGSCI` 提示符下的\
  \ `info all` 命令可以很好地指示 `GoldenGate` 的整体健康状况。如下所示，在正常操作中，`Lag`（延迟）应为 0，`Time Since\
  \ Chkpt`（自上次检查点以来的时间）应小于 10 秒。如果您的 `Extract` 存在较大延迟，`Lag` 列中的值会很大或不会减少：\n\n```\n\
  GGSCI  28> info all\nProgram        Status           Group            Lag      \
  \        Time Since Chkpt\nMANAGER    RUNNING\nEXTRACT     RUNNING     DPGGS1  \
  \     00:00:00      00:00:00\nEXTRACT     RUNNING     EXTGGS1     00:00:00     \
  \ 00:00:04\nREPLICAT    RUNNING     REPGGS1     00:00:00      00:00:09\n```\n\n\n\
  ## 监控提取详情\n\n要了解当前提取的状态，可以像下面这样在 `info` GGSCI 命令中添加 `detail` 参数：\n\n```bash\nGGSCI>\
  \ Info extract extggs1, detail\nEXTRACT    EXTGGS1   上次启动时间 2011-04-09 22:36   状态：运行中\n\
  检查点延迟       00:00:00 (更新于 00:00:02 前)\n日志读取检查点  Oracle 重做日志\n                  \
  \   2011-04-10 00:16:47  序列号 175，RBA 36263936\n  目标提取跟踪文件：\n  远程跟踪文件名          \
  \                              序列号        RBA        最大 MB\n  C:\\ggs\\dirdat\\\
  C1                                                9         2964         5\n\n \
  \ 提取源                                  开始时间             结束时间\n\n  C:\\APP\\ORADATA\\\
  ORCL\\REDO01.LOG                 2011-04-09 22:02  2011-04-10 00:16\n  C:\\APP\\\
  ORADATA\\ORCL\\REDO03.LOG                 2011-04-09 20:14  2011-04-09 22:02\n \
  \ C:\\APP\\ORADATA\\ORCL\\REDO01.LOG                 * 已初始化 *   2011-04-09 20:14\n\
  \n当前目录    C:\\ggs\n\n报告文件             C:\\ggs\\dirrpt\\EXTGGS1.rpt\n参数文件       \
  \  C:\\ggs\\dirprm\\EXTGGS1.prm\n检查点文件        C:\\ggs\\dirchk\\EXTGGS1.cpe\n进程文件\
  \           C:\\ggs\\dirpcs\\EXTGGS1.pce\n错误日志              C:\\ggs\\ggserr.log\n\
  ```\n\n根据这些结果，GoldenGate 正在读取序列号 (`seqno`) 为 175 的重做日志。在 RAC 环境中，你会看到每个节点的序列号。序列号\
  \ (`Seqno`) 9 是远程跟踪文件的序列号。\n\n`send` 命令提供了关于源端和目标端序列号 (`seqno`) 的类似信息：\n\n```bash\n\
  GGSCI  32> Send extract extggs1 status\n正在向 EXTRACT EXTGGS1 发送 STATUS 请求 ...\nEXTRACT\
  \ EXTGGS1 (PID 7220)\n  当前状态：恢复完成：位于文件末尾\n\n  当前读取位置：\n  序列号：175\n  RBA：36263936\n\
  \  时间戳：2011-04-10 00:27:47.000000\n\n  当前写入位置：\n  序列号：9\n  RBA：2964\n  时间戳：2011-04-10\
  \ 00:27:53.063000\n  提取跟踪文件：C:\\ggs\\dirdat\\C1\n```\n\n## 检查当前 Oracle 联机重做日志\n\n\
  根据上一节我们知道提取进程 `EXTGGS1` 正在读取序列号 (`sequence#`) 175，我们想知道这个序列号 175 是否是当前最新的。以下查询可以告诉我们\
  \ Oracle 正在处理哪个重做日志文件序列号。\n\n```sql\nSELECT\n  A.MEMBER,\n  B.SEQUENCE#,\n  B.STATUS,\n\
  \  B.FIRST_CHANGE#,\n  B.NEXT_CHANGE#,\n  B.ARCHIVED\nFROM   V$LOGFILE A, V$LOG\
  \ B\nWHERE  A.GROUP# = B.GROUP#\n```\n\n```\nMEMBER                          序列号\
  \   状态      首次变更号  下次变更号\nC:\\ORCL\\REDO03.LOG              174         非活动    6591047\
  \        6621440\nC:\\ORCL\\REDO02.LOG              173         非活动    6560323 \
  \       6591047\nC:\\ORCL\\REDO01.LOG              175         当前      6621440 \
  \       281474976710655\n```\n\n`first_change#` 和 `next_change#` 是 Oracle 的 SCN\
  \ 号。当前重做日志的序列号 (`sequence#`) 是 175。`EXTGGS1` 的序列号也是 175。两者都是 175，说明它们是同步的。因此，GoldenGate\
  \ 提取进程没有延迟。序列号 (`sequence#`) 为 174 及更小的重做日志位于归档日志区。\n\n#### 检查归档日志\n\n要找出 GoldenGate\
  \ 正在读取联机重做日志还是归档重做日志，可以使用以下 GGSCI 命令：\n\n```bash\nGGSCI> Info extract extggs1, detail\n\
  EXTRACT    EXTGGS1   上次启动时间 2011-04-09 22:36   状态：运行中\n检查点延迟       00:00:00 (更新于\
  \ 00:00:02 前)\n日志读取检查点  Oracle 重做日志\n                     2011-04-10 00:16:47  序列号\
  \ 175，RBA 36263936\n```\n\n序列号 (`Seqno`) 是 175，因为它当前正在读取联机重做日志。如果提取进程没有读取联机重做日志并已落后，那么它的序列号\
  \ (`seqno`) 会小于 175。你可以按照以下方式检查它正在读取哪个归档日志：\n\n```sql\nSELECT  SEQUENCE#,\n    \
  \    NAME,\n        FIRST_CHANGE#,\n        NEXT_CHANGE#\nFROM   V$ARCHIVED_LOG\n\
  ```\n\n```\n序列号  名称                                          首次变更号  下次变更号\n171 \
  \       C:\\ARC0000000171_0718807864.0001              6527997        6542114\n\
  172        C:\\ARC0000000172_0718807864.0001              6542114        6560323\n\
  173        C:\\ARC0000000173_0718807864.0001              6560323        6591047\n\
  174        C:\\ARC0000000174_0718807864.0001              6591047        6621440\n\
  ```\n\n默认的归档日志命名约定包含了日志序列号 (`sequence#`)。如果 DBA 更改了命名约定，你可以使用序列号 (`sequence#`) 来找出\
  \ GoldenGate 正在读取哪个归档重做日志文件。在正常操作期间，最大序列号 (`sequence#`) +1 应该是当前重做日志的序列号 (`seqno`)——本例中为\
  \ 175。如果不是，则说明提取进程已落后。要确定提取进程是否在写入跟踪文件，请检查跟踪文件的大小。在“监控提取详情”部分，跟踪文件是 `c1000009`，其中\
  \ 9 是跟踪文件的序列号 (`seqno`)。跟踪文件的 `RBA` 是 2964，因此你可以多次使用 `info extract extggs1, detail`\
  \ 命令来检查 `RBA` 是否增长。或者，你可以在 Unix/Linux 中使用 `ls -ls` 命令或在 Windows 中使用 `dir` 命令多次检查跟踪文件的大小。\n\
  \n## 监控 GoldenGate 速率和重做日志消耗速率\n\n默认情况下，`stats` 命令会列出所有有事务的表。你可以使用 `totalsonly`、`by\
  \ table` 和 `reportrate` 来限制显示。你也可以重置统计信息。\n\n```bash\nGGSCI  30> stats extggs1\n\
  正在向 EXTRACT EXTGGS1 发送 STATS 请求 ...\n统计信息开始于 2011-04-10 00:05:46.\n输出到 C:\\ggs\\\
  dirdat\\C1：\n从 GGS.SOURCE_TABLE 提取到 GGS.SOURCE_TABLE：\n*** 自 2011-04-09 22:36:18\
  \ 以来的总计统计信息 ***\n        插入总数                                     0.00\n       \
  \ 更新总数                                    12.00\n        删除总数                  \
  \                   0.00\n        丢弃总数                                     0.00\n\
  \        操作总数                                 12.00\n*** 自 2011-04-10 00:00:00 以来的每日统计信息\
  \ ***\n        未执行任何数据库操作。\n*** 自 2011-04-10 00:00:00 以来的每小时统计信息 ***\n        未执行任何数据库操作。\n\
  *** 自 2011-04-09 22:36:18 以来的最新统计信息 ***\n        插入总数                          \
  \           0.00\n        更新总数                                    12.00\n      \
  \  删除总数                                     0.00\n        丢弃总数                 \
  \                    0.00\n        操作总数                                 12.00\n\
  统计信息结束。\n```\n\n如果你执行以下命令，如果在映射中没有特殊过滤器，它们应该给出相似的操作数量：\n\n在源端：\n```bash\nGGSCI>\
  \ stats dpggs1 totalsonly *\nGGSCI> stats extggs1 totalsonly *\n```\n\n在目标端：\n```bash\n\
  GGSCI> stats repggs1 totalsonly *\n```\n\n如果你看到不同的操作数量，那么过程中可能有数据丢失或被过滤。例如，在单向复制中，提取端\
  \ (`Extract`) 和复制端 (`Replicate`) 的所有统计信息应该匹配。如果你在源表中插入了 10 条记录，但目标表中只有 9 条，那一定是有问题了。\n\
  \n## 监控各组的延迟\n\n有多种方法可以找出 GoldenGate 进程中的延迟。所有方法都类似，你可以使用一种或全部方法来验证延迟。\n\n监控延迟对于确保数据实时同步至关重要。你可以使用\
  \ `lag extract` 或 `lag replicat` 命令直接查看延迟时间，或者通过比较源端和目标端的序列号（如前所述）、检查点时间戳以及 `stats`\
  \ 命令报告的速率来进行综合判断。如果发现延迟持续增长，需要检查网络、系统资源或 GoldenGate 进程本身是否有瓶颈。\n\n\n## 监控 GoldenGate\
  \ 进程\n\n#### 使用 `getlag` 命令\n\n第一种方法使用 `getlag` 命令：\n\n```\nGGSCI> lag extract extggs1\n\
  ```\n\n或者\n\n```\nGGSCI> send extract extggs1, getlag\n```\n```\nSending GETLAG\
  \ request to EXTRACT EXTGGS1 ...\nLast record lag: 1 seconds.\n```\n\n你会得到以下三种状态之一：\n\
  \n*   `\"At EOF, no more records to process\"`：Extract、数据泵或 Replicat 没有延迟。如果数据仍然没有被复制，请检查跟踪文件名或数据库连接，确保它们设置正确。\n\
  *   `\"Waiting for data to process\"`：在 Extract 中，Extract 进程正在等待重做日志。在数据泵中，Extract\
  \ 正在等待 Extract 跟踪文件。在 Replicat 中，Replicate 进程正在等待数据泵或 Extract 跟踪文件。延迟可能是网络或磁盘 I/O\
  \ 问题导致的。\n*   `\"Processing data\"`：Extract、数据泵或 Replicat 正忙于处理数据。其中一个进程可能是瓶颈。如果这个状态是暂时的并在几秒钟后消失，这是正常的。\n\
  \n#### 使用 `Write Checkpoint` 命令\n\n下一种方法使用 `Write Checkpoint #`*`n`* 命令来验证延迟：\n\n\
  ```\nGGSCI> info extract extggs1, showch 10\n```\n```\nWrite Checkpoint #1\n\n \
  \ GGS Log Trail\n\n  Current Checkpoint (current write position):\n    Sequence\
  \ #: 7\n    RBA: 1411\n    Timestamp: 2011-04-11 22:00:53.446000\nExtract Trail:\
  \ C:\\ggs\\dirdat\\C2\n\nWrite Checkpoint #1\n\n  GGS Log Trail\n\n  Current Checkpoint\
  \ (current write position):\n    Sequence #: 6\n    RBA: 4994\n    Timestamp: 2011-04-10\
  \ 22:51:25.477000\n    Extract Trail: C:\\ggs\\dirdat\\C2\n```\n\n在数据泵进程上执行上述命令，并比较\
  \ `Sequence#`、RBA 和时间戳。如果我们期望 Extract 进程捕获数据，那么序列号和 RBA 应该在 Extract、数据泵和 Replicat\
  \ 进程中递增。如果序列号或 RBA 停滞或比其他进程增长得慢，那么该进程可能存在延迟问题。\n\n#### 使用跟踪文件生成速率\n\n另一种监控延迟的方法是记录\
  \ Extract、数据泵和 Replicat 进程当前的 `Sequence#` 和文件大小。本章使用`c1*nnnnnn*`表示数据泵，使用`c2*nnnnnn*`表示\
  \ Replicat（`c1`和`c2`中的六个*`n`*并不相同——每个都有自己的序列号）。\n\n我们可以通过列出目录文件（Linux/Unix 中使用`ls\
  \ –l`，Windows 中使用`dir`）来获取`c1`和`c2`的最大序列号。最大序列号就是该进程当前的跟踪文件。例如，Extract 正在写入`C1000011`文件，但如果数据泵进程正在读取`C1000011`以外的任何文件，那么数据泵进程就存在延迟。`C1000011`连接在\
  \ Extract 和数据泵进程之间。而`C200008`连接在数据泵和 Replicat 进程之间。\n\n如以下所示，检查每个跟踪文件的最大`Sequence#`：\n\
  \n```\nGGSCI (STRICHCHUT61) 21> shell dir dirdat\n```\n```\nDirectory of C:\\ggs\\\
  dirdat\n\n04/12/2011  06:28 PM               994 C1000010\n04/12/2011  06:28 PM\
  \               994 C1000011\n04/12/2011  06:29 PM             1,411 C2000007\n\
  04/12/2011  06:29 PM             1,455 C2000008\n```\n\n如上所示，`c1`的最大`Sequence#`是\
  \ 11，`C2`的最大`Sequence#`是 8。\n\n要确认 Extract 是否正在无延迟地写入当前跟踪文件，我们可以使用以下 GGSCI 命令：\n\
  \n```\nGGSCI> info extggs1, detail\n```\n```\nEXTRACT    EXTGGS1   Last Started\
  \ 2011-04-12 18:28   Status RUNNING\nCheckpoint Lag       00:00:00 (updated 00:00:05\
  \ ago)\nLog Read Checkpoint  Oracle Redo Logs\n                     2011-04-12 19:13:40\
  \  Seqno 187, RBA 33210880\n\n  Target Extract Trails:\n  Remote Trail Name    \
  \                           Seqno       RBA     Max MB\n  C:\\ggs\\dirdat\\C1  \
  \                                  11         994          5\n```\n\nExtract 正在读取重做日志`seqno`\
  \ 187。你可以使用本章“检查当前 Oracle 联机重做日志”一节中的查询来确定`seqno` 187 是当前的还是旧的。如果当前的 Oracle 重做日志`seqno`是\
  \ 187，那么 Extract 没有延迟。如果它大于 187，那么延迟发生在源数据库端，Extract 跟不上重做日志的生成速度。这种延迟情况可能是暂时的——例如，在大型更新期间。但如果延迟持续存在，你需要调整\
  \ Extract。还要注意，Extract 正在为跟踪文件`c1`写入`seqno` 11。\n\n要确认数据泵是否也在读取`seqno` 11，请执行以下\
  \ GGSCI 命令：\n\n```\nGGSCI> info dpggs1, detail\n```\n```\nEXTRACT    DPGGS1    Last\
  \ Started 2011-04-12 18:29   Status RUNNING\nCheckpoint Lag       00:00:00 (updated\
  \ 00:00:04 ago)\nLog Read Checkpoint  File c:\\ggs\\dirdat\\c1000011\n         \
  \            2011-04-12 18:28:41.860000  RBA 994\n\n  Target Extract Trails:\n \
  \ Remote Trail Name                                Seqno      RBA     Max MB\n \
  \ C:\\ggs\\dirdat\\C2                                     8        1455        \
  \  5\n```\n\n数据泵也在读取`c1000011` (`seqno` 11)，所以没有延迟。如果数据泵读取的`seqno`小于 11，那么数据泵跟不上\
  \ Extract。这可能是网络问题导致的，这种情况下你需要调整数据泵进程。注意，数据泵正在远程跟踪文件`c2`上写入`seqno` 8。要检查 Replicat\
  \ 是否与数据泵同步，请运行以下 GGSCI 命令：\n\n```\nGGSCI 22> info repggs1, detail\n```\n```\nREPLICAT\
  \   REPGGS1   Last Started 2011-04-12 18:28   Status RUNNING\nCheckpoint Lag   \
  \    00:00:00 (updated 00:00:06 ago)\nLog Read Checkpoint  File c:\\ggs\\dirdat\\\
  c2000008\n                     2011-04-12 18:28:41.860000  RBA 1455\n```\n\n在这种情况下，Replicat\
  \ 正在读取和处理`c2`上的`seqno` 8。数据泵也在`C2`上写入`seqno` 8，所以没有延迟。然而，如果该 Replicat 正在读取小于 8 的`seqno`，那么目标数据库端可能存在数据库问题。\n\
  \n#### 在 `ggserr.log` 文件中记录延迟状态\n\n你还可以在 Manager 参数文件中设置延迟报告频率：\n\n```\nLAGINFO[MINUTES|SECONDS|HOURS],\
  \ example. LAGINFOSECONDS 30\nLAGREPORT[MINUTES|HOURS], example LAGREPORTMINUTES\
  \ 1\n```\n\nManager 每 30 秒将延迟信息报告到`ggserr.log`文件，并且每分钟检查一次延迟。在`ggserr`中查看延迟报告。\n\
  \n### 查看事件和错误日志\n\n`view reports <group_name>` 命令显示最近发生于各组的错误和事件：\n\n```\nGGSCI\
  \ > view report extggs1\nGGSCI > view report mgr\nGGSCI >  view report repggs1\n\
  ```\n\n详细历史记录在`ggserr.log`中。GoldenGate 也会在 Windows 的`/var/log/messages`和事件日志中记录错误。\n\
  \n### 自动化监控\n\n现在你知道如何手动监控 GoldenGate 进程，是时候自动化它们了。本节介绍几个监控脚本。所有脚本都可扩展到多个 Extract\
  \ 和 Replicat。作为最佳实践，监控脚本应位于不同的系统上，因为如果监控服务器宕机，你将无法收到在该服务器上运行的任何警报。将所有监控脚本放在不同的地方，你可以在不遗漏任何警报的情况下承受任何系统中断。\n\
  \n\n\n## 检查 GoldenGate 进程脚本\n\n此监控脚本开销低；您可以每 5 分钟运行一次，以检查任何 GoldenGate 进程是否在运行。脚本不包括重启功能，因为大多数管理器参数应已包含自动重启。为您要监控的每个新进程复制以下代码块：\n\
  \n```ksh\n#!/bin/ksh\nEMAIL_LIST=\"shingchung@aol.com 5555555555@vtext.com\"\nhost=`hostname`\n\
  gghome=/ggs\n\ncheck=`ps -ef|grep extggs1|grep -v \"grep extggs1\"|wc -l`;\ncheck_num=`expr\
  \ $check`\n\nif [ $check_num -le 0 ]\nthen\n    echo \"GoldenGate Extract EXTGGS1\
  \ is down on $host.\" > $gghome/extggs1.out\n    tail -200 $gghome/dirrpt/eextggs1.rpt\
  \ >> $gghome/extggs1.out\n    mailx -s \"GoldenGate EXTGGS1 Down on $host\" $EMAIL_LIST\
  \ < $gghome/extggs1.out\nfi\n\ncheck=`ps -ef|grep dpggs1|grep -v \"grep dpggs1\"\
  |wc -l`;\ncheck_num=`expr $check`\n\nif [ $check_num -le 0 ]\nthen\n    echo \"\
  GoldenGate Extract DPGGS1 is down on $host.\" > $gghome/dpggs1.out\n    tail -200\
  \ $gghome/dirrpt/dpggs1.rpt >>$gghome/dpggs1.out\n    mailx -s \"GoldenGate Extract\
  \ DPGGS1 Down on $host\" $EMAIL_LIST < $gghome/dpggs1.out\nfi\n```\n\n如果出现任何异常终止（abend）甚至意外停止，您将收到警报电子邮件或页面。如果是网络问题或临时数据库问题导致异常终止，它应该会自行修复；然后警报会消失。然而，在极少数情况下，如果\
  \ GoldenGate 挂起，此脚本将无法捕获错误。您可以使用下一节中的延迟警报脚本来捕获几乎所有 GoldenGate 问题。\n\n## 监控延迟脚本\n\
  \n此延迟监控脚本报告从源数据库到目标数据库的整体延迟。它完全使用 PL/SQL 编写，易于移植到其他数据库。\n\n您必须在目标数据库上运行此脚本。您可以使用一个具有最频繁事务的表，或者您可以使用一个虚拟表，`source_table`\
  \ 和 `target_table` 来跟踪延迟。如果使用虚拟表，您可以通过 `dbms_job` 或计划作业每秒使用时间戳更新同一列。然后，在目标端计算相同表的时间差。该差值即为延迟值。\n\
  \n您可以为此脚本使用两种不同的调度：\n\n*   每 5 秒运行一次 `GGS.GET_LAG` 以更新 `LAG_HISTORY` 表。\n*   每小时运行一次\
  \ `GGS.GET_LAG` 以将有关延迟值的信息发送给您，以便您知道警报正在运行。如果您没有收到每小时的信息警报，那么您就知道出了问题。\n\n此脚本是一个独立的监控进程，不绑定到任何\
  \ GoldenGate 进程。因此，如果 图 8-1 中的任何监控点出现故障，它会向我们发出警报。部分场景如下：\n\n*   GoldenGate 管理员意外停止了\
  \ Extract，因此 GoldenGate 处于 `STOP` 状态而非 `ABEND` 状态。\n*   有人误删了 Extract。\n*   Extract\
  \ 进程挂起。\n*   源服务器宕机。\n*   有人意外关闭了源/目标端的监控 Shell 脚本。\n\n如果 CPU、内存、锁等出现任何问题导致数据库变慢，您将收到高延迟警报。\n\
  \n`GG_LAG_HISOTRY` 表存储所有历史延迟值。您可以将此表用于报告以及与其他监控工具和 ETL 集成。示例延迟图表如 图 8-2 和 图 8-3\
  \ 所示：\n\n```sql\nCREATE TABLE GGS.GG_LAG_HISTORY\n(\n  AUDIT_TIME  DATE,\n  LAG\
  \         NUMBER\n);\n\n---- 虚拟源表。将此表映射到您正在监控的 Extract 中\nCREATE TABLE GGS.SOURCE_TABLE\n\
  (\n  UPDATE_DATE  DATE,\n  UPDATE_ID    NUMBER\n);\n\n---- 虚拟目标表。将此映射到您正在复制的 Replicat\
  \ 中\nCREATE TABLE GGS.TARGET_TABLE\n(\n  UPDATE_DATE  DATE,\n  UPDATE_ID    NUMBER\n\
  );\n\n---- 调度此过程每秒或每五秒运行一次。\nCREATE OR REPLACE PROCEDURE GGS.GET_LAG\nIS\n   L_MAX_TIME\
  \   DATE;\n   L_LAG        NUMBER;\nBEGIN\n\n   SELECT   MAX (UPDATE_DATE) INTO\
  \ L_MAX_TIME FROM TARGET_TABLE;\n---- 如果目标和源在不同时区，请在此计算中添加时区偏移值。\n   SELECT   (SYSDATE\
  \ - UPDATE_DATE) * 24 * 60 * 60\n     INTO   L_LAG\n     FROM   GGS.TARGET_TABLE;\n\
  \n   INSERT INTO GGS.GG_LAG_HISTORY (AUDIT_TIME, LAG)\n     VALUES   (SYSDATE, L_LAG);\n\
  \n   COMMIT;\n\n------ 如果延迟超过 5 分钟，则发送电子邮件警报。\n   IF L_LAG > 300\n   THEN\n\n----\
  \ 如果您希望 Oracle 发送电子邮件警报，可以使用此功能。\n      GGS.SEND_EMAIL ('shingchung@aol.com.com,\
  \ 5555555555@vtext.com',\n                      'Golden Gate Admin',\n         \
  \             'ggs@somecompany.com',\n                      'Golden Gate Data Is\
  \ Behind',\n                      'The Lag Is ' || L_LAG || ' Seconds');\n   END\
  \ IF;\n\n---- 如果您想从 Shell 脚本启动此过程，此 dbms 输出将返回延迟值\n   DBMS_OUTPUT.PUT_LINE (L_LAG);\n\
  EXCEPTION\n   WHEN OTHERS\n   THEN\n      NULL;\nEND GET_LAG;\n/\n\n---- 以下是供您参考的\
  \ Oracle 发送电子邮件过程，您可以使用自己的版本。\nCREATE OR REPLACE PROCEDURE GGS.SEND_EMAIL (I_TO_EMAIL\
  \     IN VARCHAR2,\n                                            I_FROM_NAME    IN\
  \ VARCHAR2,\n                                            I_FROM_EMAIL   IN VARCHAR2,\n\
  \                                            I_SUBJECT      IN VARCHAR2,\n     \
  \                                       I_MESSEGE      IN VARCHAR2)\nIS\n   C  \
  \                 UTL_SMTP.CONNECTION;\n   L_EMAIL_START_POS   NUMBER (5) := 1;\n\
  \   L_EMAIL_END_POS     NUMBER (5) := 0;\n   L_EMAIL_CNT         NUMBER (5) := 0;\n\
  \   L_EMAIL             VARCHAR2 (250);\n   L_LAST_EMAIL_ADDR   BOOLEAN := FALSE;\n\
  \n   PROCEDURE SEND_HEADER (NAME IN VARCHAR2, HEADER IN VARCHAR2)\n   AS\n   BEGIN\n\
  \      UTL_SMTP.WRITE_DATA (C, NAME || ': ' || HEADER || UTL_TCP.CRLF);\n   END;\n\
  BEGIN\n   C := UTL_SMTP.OPEN_CONNECTION ('your.mail.relay.server');\n   UTL_SMTP.HELO\
  \ (C, 'foo.com');\n   UTL_SMTP.MAIL (C, I_FROM_EMAIL);\n\n   LOOP\n      L_EMAIL_CNT\
  \ := L_EMAIL_CNT + 1;\n\n      L_EMAIL_END_POS :=\n         INSTR (STR1   => I_TO_EMAIL,\n\
  \                STR2   => ',',\n                POS    => 1,\n                NTH\
  \    => L_EMAIL_CNT);\n\n      L_LAST_EMAIL_ADDR := (L_EMAIL_END_POS <= 0);\n\n\
  \      L_EMAIL_END_POS :=\n         CASE\n            WHEN (L_EMAIL_END_POS <= 0)\
  \ THEN LENGTH (I_TO_EMAIL) + 1\n            WHEN (L_EMAIL_START_POS = 0) THEN L_EMAIL_END_POS\
  \ - 1\n            ELSE L_EMAIL_END_POS\n         END;\n\n      L_EMAIL :=\n   \
  \      SUBSTR (STR1   => I_TO_EMAIL,\n                 POS    => L_EMAIL_START_POS,\n\
  \                 LEN    => (L_EMAIL_END_POS - L_EMAIL_START_POS));\n\n      UTL_SMTP.RCPT\
  \ (C, L_EMAIL);\n\n      EXIT WHEN L_LAST_EMAIL_ADDR;\n\n      L_EMAIL_START_POS\
  \ := L_EMAIL_END_POS + 1;\n   END LOOP;\n\n   UTL_SMTP.OPEN_DATA (C);\n   SEND_HEADER\
  \ ('From', '\"' || I_FROM_NAME || '\" <' || I_FROM_EMAIL || '>');\n   SEND_HEADER\
  \ ('To', '\"Recipient\" <' || I_TO_EMAIL || '>');\n   SEND_HEADER ('Subject', I_SUBJECT);\n\
  \   UTL_SMTP.WRITE_DATA (C, UTL_TCP.CRLF || I_MESSEGE);\n   UTL_SMTP.CLOSE_DATA\
  \ (C);\n   UTL_SMTP.QUIT (C);\nEXCEPTION\n   WHEN UTL_SMTP.TRANSIENT_ERROR OR UTL_SMTP.PERMANENT_ERROR\n\
  \   THEN\n      BEGIN\n         UTL_SMTP.QUIT (C);\n      EXCEPTION\n         WHEN\
  \ UTL_SMTP.TRANSIENT_ERROR OR UTL_SMTP.PERMANENT_ERROR\n         THEN\n        \
  \    NULL;\n      END;\n\n      RAISE_APPLICATION_ERROR (\n         -20000,\n  \
  \       'Failed: ' || SQLERRM\n      );\nEND SEND_EMAIL;\n/\n```\n\n![images](img/0802.jpg)\n\
  \n***图 8-2.** 按星期划分的平均延迟（秒）*\n\n![images](img/0803.jpg)\n\n***图 8-3.** 按小时划分的平均延迟（秒）*\n\
  \n\n\n#### 检查内存和 CPU 的脚本\n\n如果内存和 CPU 是系统中的薄弱环节，那么这个脚本会很方便，它能每小时报告内存和 CPU 使用情况。它会通过电子邮件发送所有\
  \ GoldenGate Extract 进程的内存和 CPU 使用率，以及总空闲内存量。注意，`goldengate`是 Unix/Linux 用户 ID。\n\
  \n以下是脚本：\n\n```ksh\n#!/bin/ksh\n\nEMAIL_LIST=\"shingchung@aol.com 5555555555@vtext.com\"\
  \n\nhost=`hostname`\ncd /ggs/scripts\nrm top.log\nrm top.rpt\ntop -h -f top.log\
  \ -n 50\ncat top.log | grep extract > top.rpt\necho \"\" >> top.rpt\necho \"Free\
  \ Memory: \" >> top.rpt\nvmstat 1 2 | tail -1 | awk '{printf \"%d%s\\n\", ($5*4)/1024,\
  \ \"MB\" }' >> top.rpt\n\nmailx -s \"GoldenGate Memory Usage on $host\" $EMAIL_LIST\
  \ < /ggs/scripts/top.rpt\n```\n\n输出：\n```\n19   ?    14000 goldengate 152 20  2331M\
  \  1201M run    602:09 31.64 31.59 extract\n10   ?    13655 goldengate 137 20 80912K\
  \ 16432K sleep 1568:25  5.97  5.96 extract\n\nFree Memory:\n47610MB\n```\n\nExtract\
  \ 进程使用了 31.59%的单个 CPU，数据泵使用了 5.96%。Extract 通常比数据泵消耗更多 CPU。Extract 的内存使用总量约为 2331MB，常驻内存为\
  \ 1201MB。整个服务器内存为 47GB，因此您仍有大量空闲内存。GoldenGate Extract 进程通常消耗整体 CPU 利用率的 1%到 5%。\n\
  \n#### 检查磁盘空间\n\n即使磁盘空间目前不是问题，运行一个监控脚本也是有益的。您永远不知道：您的磁盘空间可能在几年内不知不觉地被填满。如果跟踪文件磁盘空间是您的薄弱环节，那么您绝对需要这个脚本。许多脚本可在线获取，适用于各种系统，因此本节不列出具体脚本。请搜索“check\
  \ disk space scripts”以获取适合您操作系统的脚本。\n\n您可以根据需要编写任意多的监控脚本，但您不希望给系统增加负担。本章中的所有脚本都是轻量级的，因此可以安全使用。\n\
  \n### 总结\n\n本章向您展示了如何为您的 Extract、数据泵和 Replicat 设置一个非常好的监控系统。如果您有其他许多需要监控的 GoldenGate\
  \ 进程，那么您只需将它们添加到您现有的脚本中即可。图 8-1 包含 GoldenGate 进程中的 13 个链接，但您的配置可能有更多。\n\nGoldenGate\
  \ 可能出现的故障比您想象的要多，但本章介绍的自动化 PL/SQL 延迟监控脚本可以通知您问题，有时甚至在发生重大问题之前。只要目标数据库处于启动状态，它就是一个独立的进程。如果目标数据库关闭，您将不会收到每小时的延迟状态电子邮件，因此您会知道出了问题。该警报无法确切告诉您出了什么问题，但本章的其他脚本可以为您精确定位确切的问题。\n\
  \n本章还向您展示了如何监控整个 GoldenGate 系统的健康状况。在实施 GoldenGate 监控流程之前，了解系统中可能出现什么问题非常重要，这样您才能在问题恶化之前识别它们。\n\
  \n![images](img/square.jpg) **注意** GoldenGate 的管理包（也称为 GoldenGate Director）可以执行一些基本的监控和警报。Director\
  \ 还将延迟和事件信息存储到其专有表中，因此您可以从中创建报告。但风险自负，因为 Oracle 可能会在不同版本之间更改其表结构。有关 Director 的更多信息，请参见第\
  \ 10 章。\n\n## 第 9 章 Oracle GoldenGate Veridata\n\nOracle GoldenGate Veridata 是一种高性能的跨平台数据比较工具，支持在源和目标数据在线且正在更新时进行大规模比较。Veridata\
  \ 的三层架构将负载分散到不同的服务器上，而不会影响源和目标数据库系统的性能。\n\nVeridata 使用压缩的行哈希数据进行比较，这减少了比较数据所需的 CPU\
  \ 周期和网络带宽，但它不仅仅是一个数据比较工具。Veridata 可以跟踪变化的数据并在数据更新时执行比较——这是当今任何其他工具都无法实现的壮举。\n\n\
  在本章中，我们将介绍 Veridata 的关键组件，以便您了解它为何如此独特，以及为什么目前没有其他产品能与之竞争。然后，我们将介绍一些关键特性和优势，并展示\
  \ Veridata 如何与您的数据项目配合工作并帮助提高您组织的效率。一旦您了解了 Veridata 是什么以及它如何提供帮助，我们将通过一个快速教程介绍如何设置它。（设置一个比较作业实际上只需要几分钟——这就是该工具的高效之处。）最后，我们将介绍一些提示和技巧，以帮助您完成一些复杂的数据比较场景。\n\
  \n### Veridata 组件\n\n为了使 Veridata 启动并运行，您需要设置五个 Veridata 组件，如图 9-1 所示。\n\n![images](img/0901.jpg)\n\
  \n图 9-1. Oracle GoldenGate Veridata 组件\n\n#### GoldenGate Veridata 服务器\n\nVeridata\
  \ 服务器是整个 Veridata 系统的关键组件。没有它，比较将需要在源或目标数据库上执行，这将对服务器的性能产生负面影响。这是因为任何比较作业都是 CPU\
  \ 和 I/O 密集型的。\n\nVeridata 服务器执行以下功能：\n\n*   与代理协调 Oracle GoldenGate Veridata 执行任务的所有方面。\n\
  *   在 Veridata 服务器上对行进行排序。默认是在安装代理的数据库上进行排序。\n*   比较从 GoldenGate Veridata 代理收集的数据。\n\
  *   对不同步数据执行确认比较（稍后解释）。\n*   生成不同步、确认和性能报告。\n\n#### GoldenGate Veridata Web\n\n\
  Oracle GoldenGate Web 是 Veridata 服务器的基于 Web 的客户端。这是我们用于配置大多数 Veridata 任务的工具。它执行以下功能：\n\
  \n*   配置所有比较对象和规则，包括连接、组、作业等。\n*   启动和停止比较作业。\n*   提供作业状态的实时状态。\n*   查看比较和不同步数据报告。\n\
  \n#### GoldenGate Veridata 存储库\n\nVeridata 存储库存储所有比较对象和规则的配置。元数据以明文形式存储在存储库数据库的表中，因此您可以查询它们以创建自己的自定义报告。它还存储作业状态，因此您可以将其与您的\
  \ ETL 和监控工具无缝集成。\n\n#### GoldenGate Veridata 代理，Java 和 C-Code\n\nVeridata 代理执行 SQL\
  \ 以获取数据块并将其返回给服务器进行比较。它还将不同步行的详细信息提取到服务器以用于报告目的。Java 代理不需要 GoldenGate Manager，但基于\
  \ C 代码的代理需要 GoldenGate Manager 进程。\n\n#### GoldenGate Veridata CLI（Vericom）\n\n\
  Vericom 是一个命令行界面，用于调度比较作业。它可以覆盖一些配置文件设置、分区 SQL 谓词、关闭 Veridata 服务器以及生成/查看不同步报告。但是，它不能配置比较设置和规则，这些只能在\
  \ Veridata Web 客户端上完成。\n\n\n\n"
- '# Veridata 比较工作原理


  默认情况下，Veridata 比较活动分为两个步骤：初始比较和确认比较。如果数据在比较期间预计不会更改，或者数据已通过分区 SQL 谓词进行筛选，则确认比较是可选的。初始比较会生成一份不同步报告
  (`OOS`)。确认不同步报告 (`COOS`) 则是在确认比较过程中创建的。


  默认情况下，Veridata 会对所有主键列进行逐字（值对值）比较。对于所有非键列，它使用哈希值进行比较。行哈希值是一种压缩的唯一数字签名，用于比较两个源值。例如，一个
  2000 字节的行长度可以转换为 12 字节的哈希值。这并非绝对，但两个原始值相同的概率非常高。这减少了从 Veridata 代理到 Veridata 服务器的网络流量。比较方法可以在“列映射”屏幕中更改。


  ### Veridata 如何为您提供帮助


  您可以通过多种不同方式使用 Veridata，我无法在此一一列举。以下是一些关键特性和优势：


  *   它与数据复制工具（如 GoldenGate 单向复制和双向同步）无缝协作。GoldenGate 仅捕获和传送数据，但除非您添加一些自定义代码进行验证，否则它不会为您检查数据。Veridata
  可以进行两阶段比较，报告关于不良数据以及 GoldenGate 跳过的任何数据的数据差异。

  *   在所有系统中增强企业数据质量，避免不良数据导致决策失误、服务级别协议失败，并最终带来运营、财务和法律风险。借助 Veridata 持续验证所有关键业务数据，您可以在业务用户报告之前识别出不良数据。Veridata
  支持 Oracle 物化视图、视图以及 Veridata 特定的分区，使其能够比较不同粒度和基数的数据。

  *   由于高性能，减少了数据比较时间。Veridata 通过在代理的提取层使用哈希值来优化比较，然后在单独的服务器中比较数据。因此，它消除了源数据库和目标数据库上的开销。

  *   它是无侵入性的，因此可以在数据变更时实现实时数据比较，且零停机。我们可以在两个 OLTP 系统的数据正在变更时比较它们之间的数据。Veridata 将对数据同步进行两阶段确认。

  *   支持数据或数据库迁移项目中的初始复制和实时同步阶段，以确保数据准确性。我们可以使用 GoldenGate 进行不停机迁移，但通过在后台运行 Veridata
  来交叉检查源数据库和迁移后数据库之间的数据，我们无需在迁移的任何阶段编写昂贵的查询来进行数据比较。

  *   支持 Oracle、SQL Server、Teradata、HP Enscribe 和 HP SQL/MP 数据库之间的跨数据库比较。

  *   易于使用。IT 和业务用户均可使用。我们无需编写单个 SQL 语句即可设置大多数比较。

  *   它是一个独立工具，不依赖于 Oracle GoldenGate。您完全无需安装 GoldenGate 即可运行 Veridata。

  *   它具有基于角色的安全性，以控制访问权限并保护敏感数据。

  *   选择性比较可比较选定的列。通过适当设置，还可以进行增量比较。

  *   它具有灵活的命令行界面，可用于自动化和调度比较作业。


