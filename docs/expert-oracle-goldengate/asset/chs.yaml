  \ <tokenname> [<comparison>] [<tokenvalue>]`\n       `CSN | LogCSN [<comparison>]\
  \ [<value>]`\n   `<column range>`\n       `<start column>:<end column>`，例如 `0:231`\n\
     `<comparison>`\n       `=, ==, !=, <>, <, >, <=, >=  EQ, GT, LE, GE, LE, NE`\n\
  `X <program> [string]`  - 执行 `<program>`\n`TRANSHIST nnnn`        - 设置事务历史记录大小\n\
