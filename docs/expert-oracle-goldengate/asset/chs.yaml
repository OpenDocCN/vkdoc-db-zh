  --\nEXTRACT EXTORA\nUSERID GGS, PASSWORD “GGS”\nRMTHOST localhost, MGRPORT 2000\n\
  RMTTRAIL ./dirdat/lt\nTABLE GGS.EMP;\nTABLE GGS.DEPT;\n```\n\n使用 `GGSCI` 中的 `START`\
  \ 命令启动源系统上 Oracle 的捕获进程，如下所示。对于变更捕获传递过程，请配置 Replicat 参数，并按照前面章节示例中的常规方式添加跟踪文件。\n\
  \n从 SQL Server 到 Oracle 的复制，其执行方式与前面展示的从 Oracle 复制到 SQL Server 的方式类似。主要区别在于，您将在源\
  \ SQL Server 系统上创建 Extract 进程组，而在 Oracle 目标系统上创建 Replicat 进程组。\n\n### MySQL 到 Oracle\
  \ 复制\n\nMySQL 是一个流行的 RDBMS 平台，被互联网初创公司、媒体公司和互联网服务提供商 (ISP) 广泛采用，是开放标准 LAMP（Linux\
  \ Apache MySQL PHP）技术栈的一部分。根据我们使用 Oracle GoldenGate 客户的经验，随着他们扩展到更大规模的环境并迁移到 Oracle\
  \ 环境，他们有复制和迁移其 MySQL 数据的需求，如 表 6-2 所示。\n\n![images](img/t0602.jpg)\n\n有关如何配置 MySQL\
  \ 到 Oracle 复制的详细信息，请参阅可在 [`http://otn.oracle.com`](http://otn.oracle.com) 获取的 Oracle\
  \ GoldenGate 在线文档指南。\n\n### Teradata 到 Oracle 复制\n\nTeradata 是企业数据仓库和商业智能市场的关键参与者之一。它扩展性良好且性能稳健。然而，缺乏内置的原生复制功能一直是\
  \ Teradata 的“阿喀琉斯之踵”。因此，它需要 Oracle GoldenGate 软件来执行数据库复制任务。许多客户有业务需求，需要将数据从 Teradata\
  \ 复制到 Oracle 环境，而 GoldenGate 完美地完成了这项任务。\n\n表 6-3 提供了 Teradata 与 Oracle GoldenGate\
  \ 当前支持的配置。\n\n![images](img/t0603.jpg)\n\n有关如何配置 Teradata 到 Oracle 复制的详细信息，请参阅可在\
  \ [`http://otn.oracle.com`](http://otn.oracle.com) 获取的 Oracle GoldenGate 在线文档指南。\n\
  \n### Sybase 到 Oracle 复制\n\nSybase 最初是 Microsoft 和 Sybase Corporation 的合资企业，后来 SQL\
  \ Server 从 Sybase 和 Microsoft 中分离出来，成为两个不同的数据库产品。Sybase 有两个数据库产品：Sybase IQ 和 Sybase\
  \ SQL Server。目前，尚不支持 Sybase IQ 与 Oracle GoldenGate 进行复制。但是，支持从 Sybase SQL Server\
  \ 到 Oracle GoldenGate 的复制。表 6-4 提供了 Sybase 与 Oracle GoldenGate 当前支持的版本。\n\n![images](img/t0604.jpg)\n\
  \n有关如何配置 Sybase 到 Oracle 复制的详细信息，请参阅可在 [`http://download.oracle.com/docs/cd/E18101_01/doc.1111/e17806.pdf`](http://download.oracle.com/docs/cd/E18101_01/doc.1111/e17806.pdf)\
  \ 获取的 Oracle GoldenGate 在线文档指南。\n\n### IBM DB2 UDB 到 Oracle 复制\n\nIBM DB2 UDB 为\
  \ Windows、UNIX、Linux 和大型机平台提供企业数据仓库和 OLTP（在线事务处理）数据库平台。随着 Oracle Fusion Middleware\
  \ 的普及和 Oracle 数据仓库功能的出现，许多 IBM 客户有业务需求，希望在维护其 Oracle 数据库环境的同时，也保留其当前的 IBM DB2 数据库环境。因此，他们需要一个异构复制解决方案来保持所有数据库环境的同步。Oracle\
  \ GoldenGate 满足了这一关键需求。Oracle 11g GoldenGate 支持以下版本的 IBM DB2 UDB 与 Oracle 数据库环境，如\
  \ 表 6-5 所示。\n\n![images](img/t0605.jpg)\n\n有关如何配置 IBM DB2 UDB 到 Oracle 复制的详细信息，请参阅可在\
  \ [`http://download.oracle.com/docs/cd/E18101_01/doc.1111/e17795.pdf`](http://download.oracle.com/docs/cd/E18101_01/doc.1111/e17795.pdf)\
  \ 获取的 Oracle GoldenGate 在线文档指南。\n\n### 验证操作就绪性\n\n现在，我们已经设置了多个使用第三方数据库到 Oracle 的复制环境来传输数据，是时候测试和验证新的\
  \ Oracle GoldenGate 环境是否正常运行了。我们还需要测试和测量基本性能，以确保有足够的资源来从不同的源系统向 Oracle 传输数据。操作就绪性可以通过使用脚本来生成初始加载、执行\
  \ DML 和 DDL 事务（如更新、删除和插入）来验证，也可以使用 Oracle GoldenGate Veridata 来检查使用 Oracle GoldenGate\
  \ 的源和目标异构环境之间的数据同步状态。另一种衡量 Oracle GoldenGate 环境操作就绪性的方法是使用 Oracle GoldenGate Director\
  \ 产品来检查源和目标环境之间复制的状态。\n\n### 本章小结\n\n我们通过一个案例研究，介绍了使用 Oracle GoldenGate 从第三方数据库平台到\
  \ Oracle 的异构实时数据复制。我们从一些基本的安装指南开始，并提供了示例配置步骤以及所需的命令，以便以最少的时间和精力启动并运行。在具有复杂转换的大型生产环境中，您很可能需要通过更高级的功能（如令牌和过滤器）以及宏库来构建这些简单的示例，以满足复制环境的业务需求。\n\
  \n## 第 7 章\n\n### 调优\n\nGoldenGate 是一款久经考验的高性能产品，为世界上一些最繁忙、高吞吐量的应用程序复制数据。为了使 GoldenGate\
  \ 在此类环境中高效运行，您需要扎实掌握如何调优 GoldenGate。调优 GoldenGate 的过程与许多软件调优实践类似；然而，调优工具和机制却大不相同。您还应记住，尽管\
  \ GoldenGate 有自己的调优方法，但其性能取决于底层数据库、服务器、网络和存储的性能。本章将深入探讨如何调优 GoldenGate 复制。\n\n本章回顾了一种用于调优\
  \ GoldenGate 复制的结构化方法，并深入探讨了该方法的每个步骤。然后，您将重点关注一些具体的调优策略和示例，这些策略和示例可用于改善 GoldenGate\
  \ 复制环境的性能。\n\n\n\n### 调优方法论\n\n在调优 GoldenGate 时，遵循一套标准的性能与调优方法论对您来说至关重要。否则，您可能无法及时察觉性能问题，或者发现自己在解决错误的问题。本章推荐了一套标准方法论，但严格遵循它并非关键。您可以创建自己的方法论，或根据特定环境调整此方法论。最重要的考虑因素是，您确实遵循了一个结构化的方法，该方法预先定义了需求，并指定了后续的测量与验证。采用结构化方法有助于确保您能恰当地响应性能问题，并满足用户的期望。\n\
  \n以下是 GoldenGate 性能与调优方法论中建议的步骤。步骤 1 和 2 应在项目早期完成：\n1.  定义性能需求。\n2.  创建性能基线。\n\n\
  步骤 3 至 6 应在识别出调优问题时执行：\n3.  评估当前性能。\n4.  确定问题。\n5.  设计并实施解决方案。\n6.  根据需要重复步骤 3 到\
  \ 5。\n\n如果您曾进行过数据库性能与调优，这些步骤看起来可能很熟悉。但在 GoldenGate 复制环境中，每个步骤都有特定的考量。本章将随着您的进度解释并扩展这些步骤。现在，让我们来审视方法论中的第一步：定义性能需求。\n\
  \n### 定义性能需求\n\n成功满足业务用户性能期望的关键在于正确地定义性能需求。没有性能需求，您永远无法知道是否成功达到了用户的期望。当需求被定义并达成一致后，您就可以将调优工作集中在不符合要求的领域。\n\
  \n您应该在项目早期，甚至在 GoldenGate 安装和配置之前，就定义好 GoldenGate 复制性能需求。之所以这样做，是因为这些需求会对 GoldenGate\
  \ 的设置和配置方式产生重大影响。\n\n复制最重要的性能需求是应用程序可以容忍的延迟量。在收集复制需求时，您应将延迟视为从源到目标复制的整体延迟。稍后，您会将延迟细分为\
  \ GoldenGate 环境中具体的 Extract 和 Replicat 延迟。\n\n在第 4 章中，您了解了一些驱动复制技术设计的需求。以下两个领域特别与复制的性能和调优相关：\n\
  \n> *数据时效性*：数据需要多快、多频繁地更新？数据复制中能否容忍任何延迟？如果完全不能容忍延迟且变更量很大，您可能需要在项目中投入更多时间来设计和调优复制，以避免任何延迟。请记住，通常报告系统可以容忍延迟，目标数据无需与源数据完全同步。\n\
  >\n> *数据量*：需要复制多少数据？更新频率如何？您可以检查现有的数据库事务日志文件，以确定源数据库中发生的数据变更量。数据变更量会影响源和目标之间的网络带宽要求，以及跟踪文件所需的磁盘空间量。\n\
  \n在与业务用户和利益相关者协作解答了这些问题之后，您就可以开始制定您的复制性能需求了。最好保持需求简单易懂。让我们看几个性能需求的例子。\n\n第一个例子涉及一个重要的高吞吐量在线事务处理数据库，该数据库参与了一个双活复制拓扑。对业务而言，源和目标数据库始终保持近乎同步至关重要。与业务用户协商后，您就以下性能需求达成一致：\n\
  \n> *复制延迟必须在至少 80%的时间内少于 1 分钟。如果复制延迟超过 1 分钟，应发出警告并密切监控复制状态。如果复制延迟超过 5 分钟，应发出严重警报，并需要立即处理该问题。*\n\
  \n让我们再看一个不那么关键的复制例子。在此示例中，您正从一个 OLTP 数据库向一个报告数据库运行复制。报告数据库运行在另一个资源利用率很高的服务器上，只有有限的服务器资源可用于确保复制正常运行。该报告用于离线分析目的，数据是否保持最新对业务而言并非至关重要。在这种情况下，您的需求可能如下所示：\n\
  \n> *从 OLTP 数据库到报告数据库的复制延迟必须在至少 80%的时间内少于 1 小时。如果复制延迟超过 8 小时，应发出警告。如果复制延迟超过 24 小时，应发出严重警报，并需要在次日内解决该问题。*\n\
  \n您可以看到，这些复制场景各自有非常不同的性能需求。如果未预先正确定义需求，您可能会在调优报告复制上花费所有时间，而实际上双活复制才是最关键的。接下来，让我们看看如何创建性能基线。\n\
  \n\n\n#### 创建性能基线\n\n您的环境上线后，应尽快捕获复制环境性能的 `baseline`（基线）。`baseline` 本质上是一组在复制正常运行条件下捕获的性能指标。所谓正常条件，是指您不希望在任何特殊或异常处理运行期间，或者存在任何现有性能问题时收集基线指标。您不希望在性能峰值发生时捕获基线。\n\
  \n捕获基线后，您可以使用基线指标进行比较，以识别可能的性能问题。您还应定期捕获新的基线，尤其是在环境发生重大变化时。例如，如果为数据库集群添加了新服务器，您应捕获新的基线指标，因为旧的指标已不再有效。\n\
  \n让我们看一下您应为性能基线收集的指标示例：\n\n> *服务器统计信息*：对于运行复制的服务器，您应收集 CPU 利用率、磁盘利用率和内存使用情况。收集这些统计信息的方法因平台而异。例如，在\
  \ Linux 上，您可以使用 `SAR` 或 `IOSTAT`，在 Windows 上，您可以使用 `perfmon`。您甚至可能有自己定制的工具来收集这些指标。\n\
  >\n> *抽取和复制进程统计信息*：对于每个抽取和复制进程，您应捕获以下指标：\n>\n> *   *每个处理组的名称和状态：*您可以捕获 GoldenGate\
  \ 软件命令接口 (GGSCI) 的 `info *` 命令的输出。\n> *   *处理统计信息：*您可以使用 `stats` 命令，并通过诸如 `STATS\
  \ RHREMD1, TOTALSONLY *, REPORTRATE MIN` 之类的命令获取抽取和复制进程的聚合处理速率。例如，您可以使用此命令获取复制进程每分钟处理的总操作数。\n\
  > *   *处理速率：*第 5 章 展示了如何向抽取和复制进程添加报告参数以自动报告性能统计信息。您现在可以查看每个抽取和复制进程的报告文件并记录统计信息。从报告文件中，您可以记录处理的记录数、速率和增量。\n\
  > *   *处理延迟：*您可以从 `info` 命令获取近似延迟，也可以通过为每个抽取和复制进程运行 `lag` 命令获取具体延迟。\n> *   *服务器进程统计信息：*您可以收集专门针对抽取和复制进程的服务器统计信息，例如内存和\
  \ CPU 使用率。例如，在 Linux 上，如果 `top` 命令可用，您可以使用类似 `top –U gger` 的命令来仅监控 GoldenGate 的\
  \ gger 操作系统用户进程。\n>\n> *数据库性能统计信息*：作为基线的一部分，您应包含关于源和目标数据库使用情况的统计报告，例如 Oracle AWR\
  \ 报告或 SQL Server 仪表板报告。这使您能够了解在正常基线期间发生了多少数据库活动。\n>\n> *网络性能统计信息*：您应捕获一些统计信息以表明网络吞吐量和利用率。您可以使用诸如\
  \ Windows 系统监视器或 Linux 上的 `netstat` 命令等工具来收集这些统计信息。\n\n当您收集到一组可靠的基线统计信息后，您就具备了应对可能出现的任何性能问题的充分准备。别忘了定期更新这些基线统计信息。\n\
  \n您接下来可能会问的问题是，我应该收集哪些指标，收集多长时间？本节提供了您应在性能基线中收集哪些指标的指导原则。请记住，这些建议仅供参考，您应该收集任何可能影响您特定复制环境性能的指标。至少收集一小时的指标。如果这对于您的特定环境有意义，您可以收集一周甚至一个月的指标。您还可以捕获特殊情况的指标。例如，您可能有一些月末处理导致复制量增加。当您认为此活动运行正常时，可以为其捕获基线，然后将该基线用于与后续月份进行比较。\n\
  \n假设您很好地完成了基线统计信息的收集，几周后，您收到一份报告称复制运行缓慢。这将促使您进入流程的下一步：评估当前性能。\n\n#### 评估当前性能\n\n\
  当报告了潜在的 GoldenGate 复制性能问题后，流程的下一步是根据您先前记录的基线评估当前性能。您应遵循与在正常条件下收集 `baseline`（基线）性能统计信息完全相同的步骤，在性能问题条件下收集\
  \ `current`（当前）统计信息。\n\n让我们看一下为 HR 抽取和复制进程收集的一些基线和当前处理统计信息示例，如表 7-1 所示。\n\n`表 7-1.\
  \ 抽取和复制进程性能统计信息`\n\n| **统计信息** | **基线** | **当前** |\n| --- | --- | --- |\n| 源 CPU\
  \ 利用率 % | 12 | 15 |\n| 目标 CPU 利用率 % | 17 | 73 |\n| 源磁盘读取/秒 | 2.1 | 2.9 |\n| 源磁盘写入/秒\
  \ | 10.1 | 10.6 |\n| 源磁盘服务时间 | 3.4 | 3.2 |\n| 目标磁盘读取/秒 | 2.1 | 2.8 |\n| 目标磁盘写入/秒\
  \ | 10.1 | 10.9 |\n| 目标磁盘服务时间 | 3.4 | 3.2 |\n| 本地抽取 LHREMD1 状态 | 运行中 | 运行中 |\n|\
  \ 数据泵 PHREMD1 状态 | 运行中 | 运行中 |\n| 复制 RHREMD1 状态 | 运行中 | 运行中 |\n| 本地抽取 LHREMD1 速率/增量\
  \ | 20/21 | 20/19 |\n| 数据泵 PHREMD1 速率/增量 | 20/21 | 20/19 |\n| 复制 RHREMD1 速率/增量 |\
  \ 15/16 | 9/6 |\n| 复制 RHREMD1 操作数/分钟 | 1948 | 1232 |\n| 本地抽取 LHREMD1 延迟秒数 | 12 |\
  \ 11 |\n| 数据泵 PHREMD1 延迟秒数 | 8 | 9 |\n| 复制 RHREMD1 延迟秒数 | 15 | 127 |\n\n当您将基线统计信息与当前性能统计信息进行比较时，您可能会注意到一些重大差异。它们可能表明存在性能问题，但您应该谨慎，不要急于下结论。让我们继续进行调优流程的下一步以确定问题。\n\
  \n\n\n#### 确定问题\n\n收集到当前的性能统计数据后，你就可以着手尝试确定实际的性能问题了。尽管你现在拥有了大量统计数据，但仍有许多悬而未决的问题。让我们看看在分析过程中需要完成的一些任务，以确定问题所在：\n\
  \n1.  分析基线统计数据并与当前统计数据进行比较。确定是否存在显著差异。在示例中，你可以看到目标服务器的 CPU 利用率显著升高。你还会发现 Replicat\
  \ 的处理速率下降，而延迟显著增加。这为你指明了问题可能出在 Replicat 上，但也可能是目标数据库、服务器或其他方面的问题。\n2.  与相关方举行一个简短的会议，以了解他们对当前性能问题的看法，并确定他们对调优结果的期望。理解他们认为最重大的问题是什么至关重要。你还可以分享通过对比基线与当前性能统计数据得出的初步发现。以下是你在会议期间应询问的一些问题示例：\n\
  \n    *   最重大的性能问题是什么？\n        *   哪些业务流程受到了影响？\n        *   性能问题发生在一天中的什么时间，还是持续存在？\n\
  \        *   性能问题只影响一个用户还是所有用户？\n        *   性能问题是否与任何特定的数据库表或所有表相关？\n        *\
  \   性能问题是工作负载增加还是系统变更导致的结果？\n        *   该问题能否在测试环境中稳定复现？\n\n这些问题的答案可能会让你感到意外。也许相关方认为复制变慢是低优先级问题。也许他们只在一天中的特定时间看到变慢。又或者问题是系统变更或新业务量导致的结果。无论如何，获取相关方的观点和期望非常重要。你应该记录对性能问题的回答，并与相关方就复制调优工作的范围、影响和期望达成一致。\n\
  \n3.  深入调查那些看似运行缓慢的 GoldenGate 进程。查看`dirrpt`目录中的 GoldenGate 报告，并比较处理速率，尝试确定问题开始的时间。观察`rate`和`delta`值，看它们何时开始下降，如下列\
  \ Replicat 报告示例所示：\n\n    ```\n    RHREMD1.rpt:      98650000 records processed\
  \ as of 2011-03-09 19:27:48 (rate 4728,delta 3969)\n    RHREMD1.rpt:      98660000\
  \ records processed as of 2011-03-09 19:28:50 (rate 4728,delta 4439)\n    RHREMD1.rpt:\
  \      98670000 records processed as of 2011-03-09 19:29:53 (rate 3685,delta 4183)\n\
  \    RHREMD1.rpt:      98680000 records processed as of 2011-03-09 19:30:55 (rate\
  \ 3247,delta 3366)\n    RHREMD1.rpt:      98690000 records processed as of 2011-03-09\
  \ 19:31:57 (rate 2327,delta 2630)\n    RHREMD1.rpt:      98700000 records processed\
  \ as of 2011-03-09 19:32:00 (rate 1727,delta 2257)\n    RHREMD1.rpt:      98710000\
  \ records processed as of 2011-03-09 19:33:02 (rate 1135,delta 1736)\n    RHREMD1.rpt:\
  \      98720000 records processed as of 2011-03-09 19:34:04 (rate 768,delta 1125)\n\
  \    RHREMD1.rpt:      98730000 records processed as of 2011-03-09 19:35:06 (rate\
  \ 436,delta 923)\n    ```\n\n在示例中，你每处理 10,000 条记录报告一次 Replicat 处理速率。从 Replicat 报告列表中可以看出，处理速率在\
  \ 19:28 开始下降，并持续降低。\n\n4.  审查 GoldenGate 的`ggserr.log`文件，查找任何错误或警告。有时可能触发了你未意识到的警告消息，而这可能对性能产生负面影响。\n\
  5.  审查服务器系统日志，查找任何可能导致性能缓慢的错误消息，例如磁盘驱动器故障。\n6.  审查内置的数据库性能报告（例如 Oracle 的 AWR 或 SQL\
  \ Server 的仪表板），并与基线期间的报告进行比较。查看是否存在可能导致性能不佳的显著变化。\n\n当你完成对统计数据、相关方沟通和性能问题信息的分析后，你应该对问题的原因有了相当清晰的了解。你可能还不知道确切的解决方案，但至少应该有了一些改进性能的明确思路。下一步是设计并实施解决方案。\n\
  \n### 设计与实施解决方案\n\n现在，你可以着手设计并实施解决方案来调优复制。此时，你可能对问题有几种可能的解决方案。你需要进行一些分析以确定首先实施哪个解决方案。某个解决方案可能更容易实施且影响更小，因此你可以先尝试它，看看是否有效或将其排除。重要的是**一次只实施一个调优变更**，然后衡量其影响。这样，你能更清楚地表明你的解决方案确实解决了问题并提升了性能。如果你同时实施多个解决方案，可能很难确定是哪一个修复了问题（或使其恶化）。\n\
  \n接下来的几节将介绍针对 Extract 和 Replicat 的一些不同调优策略。当然，这些并不是唯一的策略，你可能会根据你的特定环境和经验发现自己的策略。由于本书的范围是\
  \ GoldenGate，因此仅涵盖与 GoldenGate 复制相关的数据库和服务器等组件的调优；但在调优 GoldenGate 之前，排除这些组件的一般性能问题至关重要。\n\
  \n#### 使用并行 Extract 和 Replicat\n\n通常，大多数调优工作集中在 Replicat 上，而不是 Extract。原因是 Extract\
  \ 通常从数据库事务日志读取，而 Replicat 则执行单线程 SQL 命令以更改目标数据库中的数据。然而，在某些情况下，Extract 可能需要一些调优。例如，在特定情况下，如果存在大对象（LOB）列或某列不在事务日志中，Extract\
  \ 可能需要从数据库中获取数据。在这些情况下，你可能希望将这些表隔离到它们自己的 Extract 组中。\n\n一种常见的 GoldenGate 调优策略是创建多个并行的\
  \ Extract 或 Replicat 处理组来平衡工作负载。GoldenGate 每个 GoldenGate Manager 最多支持 300 个处理组。例如，让我们为\
  \ HR 模式拆分数据泵 Extract 和 Replicat。在开始之前，提醒一下，图 7-1 展示了没有并行组的基本复制配置。\n\n![images](img/0701.jpg)\n\
  \n**图 7-1.** 无并行 Extract 或 Replicat 组的单向复制\n\n现在让我们看看具有两个并行数据泵 Extract 和 Replicat\
  \ 组的相同复制，如图 7-2 所示。\n\n![images](img/0702.jpg)\n\n**图 7-2.** 具有并行数据泵 Extract 和 Replicat\
  \ 组的单向复制\n\n让我们看一个如何在 HR 模式上实现并行 Extract 和 Replicat 的具体示例。\n\n\n## 实现带表过滤的并行提取与复制\n\
  \n在此示例中，您的所有分析、诊断都指向复制（Replicat）进程变慢，因此您的第一个调整是将数据泵提取（Extract）和复制拆分为两个并行处理组。这样做是为了尝试划分复制工作负载，加快复制速度并减少复制延迟。在此示例中，您通过为特定的\
  \ SQL 表设置过滤来拆分 GoldenGate 进程组。稍后，您将看到如何使用键范围以另一种方式拆分复制。\n\n![images](img/square.jpg)\
  \ `注意` 当拆分 GoldenGate 处理组时，请记住将因 SQL 参照完整性约束而相关的表保留在同一个 GoldenGate 进程组中。\n\n图 7-3\
  \ 展示了如何为 HR 模式拆分数据泵提取和复制的更多细节。\n\n![images](img/0703.jpg)\n\n`图 7-3.` HR 示例的并行数据泵提取和复制组\n\
  \n本地提取 `LHREMD1` 保持不变，仍然提取 HR 模式的所有表。使用本地提取来提取*所有*数据是一种常见方法。通常，最好使用本地提取提取所有数据，然后使用数据泵提取进行任何过滤。\n\
  \n数据泵 `PHREMD1` 的配置从提取 HR 模式中的所有表更改为仅过滤 HR 表 `EMPLOYEES`、`JOB_HISTORY`、`JOBS` 和\
  \ `LOCATIONS`。该模式中的其他表 `COUNTRIES` 和 `REGIONS` 由一个新的数据泵提取 `PHREMD2` 提取。接下来，您将使用两个复制组来处理来自数据泵的两个远程跟踪文件。\n\
  \n![images](img/square.jpg) `提示` 为避免争用，Oracle 建议在读取跟踪文件时，将每个复制与其自己的跟踪文件配对。不应超过三个复制读取同一个跟踪文件。\n\
  \n复制 `RHREMD1` 处理来自数据泵 `PHREMD1` 在 `l2` 跟踪文件中泵出的数据。新的复制 `RHREMD2` 处理来自数据泵 `PHREMD2`\
  \ 在新的 `l3` 跟踪文件中泵出的数据。\n\n接下来，让我们回顾一下实施调整更改的步骤。因为您已经为 HR 模式运行了复制，所以必须对现有运行配置进行调整，如图\
  \ 7-1 所示。以下是向现有复制配置添加并行数据泵提取和复制的步骤。提醒一下，尽管这里没有显示（以便您能看到命令细节），但您应该将这些步骤中的 GoldenGate\
  \ 命令放入一个 obey 文件中，如第 4 章所述：\n\n![images](img/square.jpg) `提示` 在进行任何更改之前，请务必备份您的\
  \ GoldenGate 参数文件。\n\n1.  编辑现有的数据泵提取参数文件 `PHREMD1` 以添加表过滤：\n    ```\n    GGSCI (sourceserver)\
