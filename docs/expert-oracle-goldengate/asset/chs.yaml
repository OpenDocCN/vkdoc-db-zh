  \n![image](img/ben_prusinski.jpg) ![images](img/square.jpg)`Ben Prusinski` 是一名 `Oracle`\
  \ 认证专家（`OCP`）和数据库架构师，拥有超过 `14` 年的 `Oracle` 数据仓库和 `Oracle E-Business` 应用程序经验。作为企业数据库顾问，`Ben`\
  \ 已为数十家财富 `500` 强客户提供服务。他是 `Oracle` 高可用性、性能调优、数据库安全和 `ERP` 实施方面的国际公认专家。作为顶级 `Oracle`\
  \ 专家，`Ben` 于 `2009` 年获得了著名的 `Oracle ACE` 奖，以表彰他对 `Oracle` 社区的贡献。作为 `Oracle GoldenGate`\
  \ 认证助理，`Ben` 是 `Oracle OpenWorld`、拉丁美洲智利 `Oracle` 用户组（`CLOUG`）、独立 `Oracle` 用户组（`IOUG`）和\
  \ `Oracle Collaborate OAUG`（`Oracle` 应用程序用户组）等主要会议上的热门演讲者。除了为客户提供 `Oracle` 咨询服务外，`Ben`\
  \ 还定期更新他的 `Oracle` 博客 [`http://oracle-magician.blogspot.com`](http://oracle-magician.blogspot.com)，分享最新的数据库技术技巧和信息。`Ben`\
  \ 也是一位多语言者，精通西班牙语、法语、韩语和英语，他喜欢去异国他乡旅行。在空闲时间，`Ben` 喜欢参加汽车障碍赛、打高尔夫、练习武术、阅读和烹饪。\n\n\
  ![image](img/steve_phillips.jpg) ![images](img/square.jpg)`Steve Phillips` 是 `Hewlett-Packard\
  \ Enterprise Services` 的信息系统架构师，拥有超过二十五年的计算机数据库工作经验。`Steve` 是 `Oracle` 认证专家，曾在 `Oracle\
  \ Openworld` 和 `IOUG` 上演讲。`Steve` 拥有德克萨斯大学达拉斯分校的信息系统硕士学位，目前居住在德克萨斯州的普莱诺。在业余时间，`Steve`\
  \ 喜欢打网球、指导棒球和观看体育比赛。\n\n![image](img/richard_chung.jpg) ![images](img/square.jpg)`Richard\
  \ Chung` 拥有 `19` 年的 `IT` 环境各方面实践经验。他近期专注于商业智能领域，如报表、`ETL` 和数据架构。`Richard` 是喜达屋酒店及度假村国际集团的首席\
  \ `BI` 和系统架构师，他在那里构建了当前的数据仓库和报表应用程序；他还编写了高度复杂的搜索引擎，并设计了 `ETL` 来近实时地填充活动数据仓库。`Golden\
  \ Gate` 用于同步美国不同城市的关键业务数据。在加入喜达屋之前，他曾在一家初创公司 [dot.com](http://dot.com)、`JP Morgan\
  \ Chase` 和 `Ernst & Young` 工作。\n\n## 关于技术审校\n\n![image](img/arup_nanda.jpg) ![images](img/square.jpg)`Arup\
  \ Nanda` ([`arup@proligence.com`](http://arup@proligence.com)) 担任 `Oracle DBA` 已超过\
  \ `16` 年，从事 `Oracle` 数据库管理的各个方面工作，从建模到性能调优。他合著了四本书，发表了 `300` 篇文章，并在各种技术会议上进行了超过\
  \ `150` 场演讲；他还于 `2003` 年获得了 `Oracle` 颁发的年度 `DBA` 大奖。他是 `Oracle ACE Director`，频繁的博主（[`arup.blogspot.com`](http://arup.blogspot.com)），并且是\
  \ `Oak Table Network` 和 `SELECT Journal` 编辑委员会的成员。他居住在康涅狄格州的丹伯里。\n\n## 第 1 章\n\n\
  \n\n## 引言\n\n甲骨文公司于 2009 年收购了 GoldenGate，作为其在未来数据仓库和实时事务管理产品套件中实施高级复制技术战略的一部分。在\
  \ Oracle GoldenGate 技术出现之前，数据复制是使用 Oracle Streams 和第三方复制解决方案（如 Quest SharePlex）来完成的。本章将讨论各类数据库复制方法及其所使用的技术，以说明\
  \ Oracle GoldenGate 如何成为面向当前及未来基于 Oracle 数据库系统的实时数据事务复制技术的逻辑终点。\n\n在本章讨论 Oracle\
  \ GoldenGate 软件的基础知识之前，有必要简要回顾一下数据库复制技术的历史。在 GoldenGate 软件出现之前，对于非关系型数据库，数据事务的复制是通过文件传输协议（`FTP`）进行简单的文件传输来跨网络实现的。随着\
  \ UNIX 操作系统的普及和客户端-服务器计算的出现，在 Oracle 数据库软件的第 8 版中，通过 Oracle 基础和高级复制软件实现了数据复制。\n\n\
  ### 分布式处理与复制\n\nOracle 第 5 版以数据库链接的形式引入了分布式处理查询。数据库链接提供了跨网络执行 SQL 查询的能力，是实现复制解决方案的首次真正尝试。图\
  \ 1-1 展示了如何通过数据库链接在源和目标数据库环境之间建立连接。\n\n![images](img/0101.jpg)\n\n**图 1-1.** 用于分布式系统的数据库链接\n\
  \n数据复制发展的下一步出现在 Oracle 第 8 版中，它使数据库专业人员能够设置基于日志和基于触发器的复制解决方案。\n\n### Oracle 基础复制\n\
  \nOracle 基础复制有两种形式：基于日志和基于触发器。使用基于日志的复制时，必须在源和目标数据库环境之间设置快照模式和数据库链接。数据从 Oracle 的联机重做日志中提取，以捕获变更并通过网络传播，将数据事务从源数据库（又称主数据库）发送到目标数据库。模式也必须在源和目标数据库上进行配置。此外，还必须配置刷新组以使目标环境与源系统上的主数据库保持同步。可以想象，这种设计在建立成功的冲突解决和制衡系统方面是粗糙且容易出错的。\n\
  \n### Oracle 高级复制\n\nOracle 高级复制增加了更强大的功能，支持在多环境中进行多主复制，并采用基于触发器的方法来建立冲突解决规则集，以提高数据可靠性并保持源和目标系统之间的准确数据同步。然而，高级复制也有其缺点和缺陷，特别是对某些数据类型缺乏支持，以及基于触发器的冲突处理会发生失败。此外，在保持目标系统与源主系统同步方面，延迟也是一个问题。\n\
  \n图 1-2 展示了在 Oracle 环境中如何为基本和高级复制设置冲突解决。\n\n![images](img/0102.jpg)\n\n**图 1-2.**\
  \ Oracle 复制的冲突解决\n\n### Oracle Streams 复制\n\nOracle 在 9.2 版中引入了 Streams 复制解决方案。Streams\
  \ 解决了困扰先前版本中旧复制方法的缺陷。它建立了一个基于日志的复制解决方案，从源系统的联机重做日志中挖掘已提交的事务，以将数据移动到下游目标系统。此外，Streams\
  \ 引入了新的后台进程来维护 Oracle 生态系统内复制活动的通信和操作。\n\nStreams 通过使用高级队列技术来提升复制性能，进一步增强了先前的 Oracle\
  \ 复制技术。Oracle 高级队列（`AQ`）是随 Streams 以及其他 Oracle 技术（包括 Oracle Data Guard 逻辑数据库）一起设计的一项技术。`AQ`提供了一个基于订阅者和发布者模型的入队和出队系统，用于数据库通信。它允许在源和目标环境之间进行健壮的数据事务消息传递和处理，是\
  \ Oracle Streams 处理的核心。\n\n有关如何设置和管理`AQ`的更多详细信息，可在线访问 Oracle 参考文档： [`http://tahiti.oracle.com`](http://tahiti.oracle.com)。\n\
  \n### 演进与 Oracle GoldenGate\n\n随着来自 Oracle 和 Quest SharePlex 的真正基于日志的复制技术的出现，技术进步使得最终能够执行基于实时的复制。在大型机和中型系统领域之外，基于实时事务的复制技术发展领域升起了一颗耀眼的明星。在\
  \ 20 世纪 80 年代末，一家名为 GoldenGate 的小型软件公司提出了一种在不同数据库平台之间复制数据的不同方法。在 GoldenGate 出现之前，跨平台和跨供应商的数据复制充其量是存在问题的。例如，需要复杂的软件开发才能利用\
  \ Oracle 的力量连接到非 Oracle 数据库环境，这需要通过`Pro-C`和软件开发`API`来实现，以允许事务在环境之间移动。\n\nGoldenGate\
  \ 发明了一种强大且新颖的数据复制方法，同时实现了高性能和准确性。GoldenGate 没有使用不同的格式，而是通过一个名为 GoldenGate 软件命令接口（`GGSCI`）的命令行界面来实施统一格式以执行数据复制操作。`GGSCI`命令用于创建新的\
  \ GoldenGate 复制配置以及执行管理任务。已提交的事务存储在源和目标系统文件系统上的称为`trail files`（跟踪文件）的平面文件中。此外，GoldenGate\
  \ 提供了一种无缝且透明的方法，可以在异构环境之间执行实时数据复制，并保证事务一致性，而无需开发复杂的例程或代码。\n\n### 总结\n\n本引言提供了一个关于数据库复制技术如何演变为强大的\
  \ Oracle GoldenGate 技术的历史课程。下一章将向您展示如何安装 Oracle GoldenGate 产品套件。\n\n## 第 2 章\n\n\
