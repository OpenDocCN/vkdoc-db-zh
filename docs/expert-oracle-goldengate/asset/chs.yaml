  \ Record  RBA 2351\n```\n\n### 10. 检查 Replicat 状态和处理进度\n应用一些更改后，你可以检查 Replicat 的状态以确保它们正常处理。可以检查\
  \ RBA 值是否在增加。你还可以运行 `stats replicat` `tablename` 和 `stats extract` `tablename` 命令来确认\
  \ Extract 和 Replicat 正在处理更改：\n\n```text\nGGSCI (targetserver) > info rep *\n\nREPLICAT   RHREMD1   Last\
