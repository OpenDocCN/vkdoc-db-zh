  \ 设置 committs 字段\n`USERTOKEN     on  | OFF | detail`  - 显示用户令牌信息\n`HEADERTOKEN   on  |\
  \ OFF | detail`  - 显示头令牌信息\n`GGSTOKEN      on  | OFF | detail`  - 显示 GGS 令牌信息\n\
  `FILEHEADER    on  | OFF | detail`  - 显示文件头内容\n`ASCIIHEADER   ON  | off`           -\
  \ 切换头字符集\n`EBCDICHEADER  on  | OFF`           - 切换头字符集\n`ASCIIDATA     ON  | on`            -\
