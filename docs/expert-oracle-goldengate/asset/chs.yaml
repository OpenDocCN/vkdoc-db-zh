  \ sprintf 格式，默认为 `%f`\n\n`Logdump 8 >`\n\n#### HISTORY\n\n`HISTORY` 命令显示在 Logdump\
  \ 会话中最近执行的所有活动，如下例所示：\n\n```\nLogdump 8 >history\n1> ghr on\n2> help\n3> open dirdata/aa\n\
  4> open aa\n5> open c:\\ggs_src\\trails\\aa\n6> host\n7> help\n8> history\n```\n\
  \n\n#### 使用 Logdump 打开 GoldenGate 跟踪文件\n\nOracle GoldenGate 中 `Logdump` 最常见的用途是打开跟踪文件以进行分析和故障排查。启动\
  \ `Logdump` 会话后，您需要像下面这样发出 `OPEN` 命令，指定路径名和跟踪文件名：\n\n```\nLogdump 1>open ./dirdat/aa00001\n\
  Current LogTrail is /ggs/orasrc/dirdat/aa00001\n```\n\n打开跟踪文件后，您需要启用一些有用的功能以充分利用\
  \ `Logdump` 工具。第一条命令是 `GHDR ON`。它会为 Oracle GoldenGate 跟踪文件中的事务显示记录头：\n\n```\nLogdump\
  \ 2 >ghdr on\n```\n\n接下来，您需要切换选项以查看跟踪文件数据的十六进制和 ASCII 值。为此，请执行详细数据命令：\n\n```\nLogdump\
  \ 3 >detail data\n```\n\n现在，您可以在 `Logdump` 中使用 `next` 命令移动到跟踪文件中的下一条记录。当您发出 `next`\
  \ 命令时，`Logdump` 会向前移动一条记录：\n\n```\nLogdump 5>next\n___________________________________________________________________\n\
  Hdr-Ind    :     E  (x45)     Partition  :     . (x00)\nUndoFlag   :     . (x00)     BeforeAfter:     A  (x41)\n\
  RecLength  :     0  (x0000)   IO Time    : 2011/05/04 21:22:17.611.797\nIOType     :   151  (x97)     OrigNode   :     0  (x00)\n\
  TransInd   :     . (x03)     FormatType :     R  (x52)\nSyskeyLen  :     0  (x00)     Incomplete\
  \ :     . (x00)\nAuditRBA   :          0       AuditPos   : 0\nContinued  :     N  (x00)     RecCount   :     0  (x00)\n\
  \n2010/08/04 21:22:17.611.797 RestartOK            Len     0 RBA 936\nName:\nAfter  Image:                                             Partition\
  \ 0   G  s\n```\n\n在这里，您可以检查事务在 `Logdump` 中显示的前后映像。\n\n有关在 Oracle GoldenGate 中使用\
  \ `Logdump` 工具的更多详细信息，请参阅《Oracle GoldenGate 故障排查指南》，其中包含所有 `Logdump` 命令、语法和用法的列表。该指南可在以下网址在线获取：适用于\
  \ 10.x 版本的 [`http://download.oracle.com/docs/cd/E15881_01/doc.104/gg_troubleshooting_v104.pdf`](http://download.oracle.com/docs/cd/E15881_01/doc.104/gg_troubleshooting_v104.pdf)\
  \ 以及适用于 11.1 版本的 [`http://download.oracle.com/docs/cd/E18101_01/doc.1111/e17792.pdf`](http://download.oracle.com/docs/cd/E18101_01/doc.1111/e17792.pdf)。\n\
