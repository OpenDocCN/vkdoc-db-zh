  \ | { [TO] <filename> }` - 写入会话日志\n`BEGIN <date-time>`     - 使用时间戳设置下一个读取位置\n`SAVEFILECOMMENT\
  \ on | OFF`  - 切换保存文件中的注释记录\n`SAVE <savefilename> [!] <options>`  - 将数据写入保存文件\n\
