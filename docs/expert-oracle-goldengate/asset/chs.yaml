           `<date-time string>` 格式为\n           `[[yy]yy-mm-dd] [hh[:mm][:ss]]`\n\
  `SCANFORENDTRANS (SFET)` - 查找当前事务的结尾\n`SCANFORNEXTTRANS (SFNT)` - 查找下一个事务的开头\n`SHOW\
  \ <option>`       - 显示内部信息\n      `[OPEN]`        - 列出已打开的文件\n      `[TIME]`        -\
