  \ > gmp/libgmp10@2:6.2.1+dfsg-3ubuntu1\nand 1 more...\n✗ Medium severity vulnerability\
  \ found in zlib/zlib1g\nDescription: Out-of-bounds Write\nInfo: https://snyk.io/vuln/SNYK-UBUNTU2204-ZLIB-2975633\n\
  Introduced through: meta-common-packages@meta\nFrom: meta-common-packages@meta >\
  \ zlib/zlib1g@1:1.2.11.dfsg-2ubuntu9\n✗ Medium severity vulnerability found in perl/perl-base\n\
  Description: Improper Verification of Cryptographic Signature\nInfo: https://snyk.io/vuln/SNYK-UBUNTU2204-PERL-2789081\n\
  Introduced through: meta-common-packages@meta\nFrom: meta-common-packages@meta >\
  \ perl/perl-base@5.34.0-3ubuntu1\nPackage manager:   deb\nProject name:      docker-image|ubuntu\n\
  Docker image:      ubuntu\nPlatform:          linux/amd64\nBase image:        ubuntu:22.04\n\
  Tested 102 dependencies for known vulnerabilities, found 12 vulnerabilities.\nAccording\
  \ to our scan, you are currently using the most secure version of the selected base\
  \ image\nFor more free scans that keep your images secure, sign up to Snyk at https://dockr.ly/3ePqVcp\n\
  ```\n\n**清单 16-1**\n对 Ubuntu 镜像进行 Snyk 扫描的简略输出，显示了低危和中危漏洞。\n\n对于不可信的公共镜像，请避开未知或匿名贡献者，做好调研，并善用免费的扫描服务！\n\
  \n#### 许可\n\n从 Docker Hub 下载公共镜像前还需考虑一点：许可证。Oracle 禁止用户分发其数据库内容，任何下载 Oracle 软件的人都必须同意其许可协议。任何通过公共仓库分发包含\
  \ Oracle 数据库软件镜像的行为，都可能违反该许可证。下载此类镜像也可能让你面临风险。\n\n\n\n### Docker Hub 账户\n\nDocker\
  \ Hub 为用户提供了丰富的免费内容，无需注册或登录。创建账户后，您可以在四个计划中享受额外服务：个人版（Personal）、专业版（Pro）、团队版（Team）和商业版（Business）。我重点说明了个人版和专业版账户之间的主要功能差异，它们最适合想要利用\
  \ Docker Hub 优势的个人用户：\n\n*   **个人订阅**是免费的，包括使用 Docker Desktop、无限数量的公共仓库和一个私人仓库。它还包括每月\
  \ 200 次由 Snyk 提供的本地漏洞扫描。这可能满足大多数人的所有需求——除非你打算维护多个 Oracle 数据库镜像的私有仓库！\n\n*   **专业订阅**每月\
  \ 7 美元或每年 60 美元。^(⁸⁸) 它包含个人版提供的所有功能，此外还有无限私有仓库；自动化测试和构建；与 GitHub、Bitbucket 和 Slack\
  \ 的集成；以及商业支持。（我订阅了专业版以利用无限私有仓库的优势。）\n\n创建账户并登录 Docker Hub 后，通过点击右上角的“Repository”菜单项，然后点击最右边的“Create\
  \ repository”按钮来创建一个仓库，如图 16-5 所示。\n\n![](img/514143_1_En_16_Fig5_HTML.jpg)\n\n\
  带有标记为 1 和 2 的 “Repositories” 选项卡和 “Create repository” 选项卡的预览页面截图。\n\n图 16-5\n\n\
  在 Docker Hub 中创建新仓库。点击菜单中的“Repository”项（1），然后点击“Create repository”按钮（2）\n\n这将带你进入图\
  \ 16-6 中的屏幕，在这里你为新仓库命名，选择内容是公开还是私有，最后创建仓库。此示例来自个人订阅，我创建了一个名为 “database” 的私有仓库。\n\
  \n![](img/514143_1_En_16_Fig6_HTML.jpg)\n\n带有 3 个高亮并标记的选项卡的页面截图：1、数据库名称，2、公开和私有选项，以及\
  \ 3、创建按钮。\n\n图 16-6\n\n要创建一个仓库，请为其命名（1），选择 Public 或 Private 可见性（2），然后点击“Create”按钮（3）\n\
  \n创建仓库后，你会进入图 16-7 中的仓库详情屏幕。在这里，你可以添加描述性信息并管理内容。\n\n![](img/514143_1_En_16_Fig7_HTML.jpg)\n\
  \n仓库详情屏幕的截图，用户可以添加描述性信息并管理内容。\n\n图 16-7\n\nDocker Hub 中新创建仓库的详情屏幕\n\n点击仓库的“Settings”选项卡，如图\
  \ 16-8 所示，你可以访问并启用漏洞扫描（在付费订阅中可用），以及将仓库的可见性从公开更改为私有，反之亦然的选项。\n\n![](img/514143_1_En_16_Fig8_HTML.jpg)\n\
  \n仓库设置选项卡的截图，用户可以访问并启用漏洞扫描（在付费订阅中可用），以及将仓库可见性从公开更改为私有，反之亦然的选项。\n\n图 16-8\n\n通过“Settings”选项管理仓库（1）。此屏幕用于管理仓库的可见性（2）并在付费订阅中启用镜像扫描\n\
  \n现在我有了一个仓库，我可以开始标记镜像并将其上传到 Docker Hub！\n\n### 镜像管理\n\n无论你使用的是 Docker Hub 还是其他公共或私有容器镜像仓库，上传和管理镜像的步骤都是相同的——登录并提供凭据，然后标记并推送镜像。\n\
  \n#### 仓库登录\n\n通过命令行或 Docker Desktop 登录以访问你的仓库。在这里，我使用我之前创建的用户名和密码，通过 `docker login`\
  \ 命令登录到我新创建的账户：\n\n```\n> docker login\nLogin with your Docker ID to push and pull\
  \ images from Docker Hub. If you don't have\na Docker ID, head over to https://hub.docker.com\
  \ to create one.\nUsername: oracleondocker\nPassword:\nLogin Succeeded\nLogging\
  \ in with your password grants your terminal complete access to your account.\n\
  For better security, log in with a limited-privilege personal access token. Learn\n\
  more at https://docs.docker.com/go/access-tokens/\n```\n\n一旦你登录到一个仓库，Docker 会保存你的凭据以供将来使用，并且没有需要重复登录的持久状态。^(⁸⁹)\
  \ 但是，如果你登录了一个账户并希望删除存储的凭据，请使用 `docker logout`：\n\n```\n> docker logout\nRemoving\
  \ login credentials for https://index.docker.io/v1/\n```\n\n登录后，我就可以标记和推送镜像了。\n\n\
  #### 标记镜像\n\n第 14 章介绍了标签的组成部分以及如何使用 `docker tag` 为镜像分配命名空间、镜像或仓库名称和标签。既然我们已经创建了一个仓库账户，命名空间的目的应该更加明显——它是仓库账户的名称。\n\
  \n列出我系统上的镜像时，我看到一个从 Oracle 的 GitHub 仓库构建的镜像，标记为 `oracle/database:19.3.0-ee`，后面还有四个属于我的命名空间\
  \ `oraclesean`、保存在名为 `db` 的仓库中的数据库镜像：\n\n```\n> docker images\nREPOSITORY      \
  \        TAG           IMAGE ID       CREATED         SIZE\noracle/database    \
  \     19.3.0-ee     bdbb8b83217b   3 days ago      6.68GB\noraclesean/db       \
  \    11.2.0.4-EE   c1015174e910   6 months ago    6.72GB\noraclesean/db        \
  \   12.1-EE       1db44c287b80   6 months ago    6.9GB\noraclesean/db          \
  \ 19.13.1-EE    27fdf297483b   5 months ago    7.81GB\noraclesean/db           21.5-EE\
  \       656c63dad153   5 months ago    8.69GB\n```\n\n在上一节的示例中，我在 Docker Hub 中创建了一个新用户和仓库，用户名为\
  \ `oracleondocker`，以及一个名为 `database` 的私有仓库。我想将其中一个镜像的副本推送到我的新账户，但我首先需要给它打标签。^(⁹⁰)\n\
  \n我可以使用以下任一命令分享 `oraclesean/db:11.2.0.4-EE` 镜像，通过现有标签或其镜像 ID 值来引用镜像：\n\n```\ndocker\
  \ tag oraclesean/db:11.2.0.4-EE oracleondocker/database:11.2.0.4-EE\ndocker tag\
  \ c1015174e910 oracleondocker/database:11.2.0.4-EE\n```\n\n当我再次列出系统上的镜像时，我在第二行看到了新标签：\n\
  \n```\n> docker tag oraclesean/db:11.2.0.4-EE oracleondocker/database:11.2.0.4-EE\n\
  > docker images\nREPOSITORY               TAG           IMAGE ID       CREATED \
  \       SIZE\noracle/database          19.3.0-ee     bdbb8b83217b   3 days ago \
  \    6.68GB\noracleondocker/database  11.2.0.4-EE   c1015174e910   6 months ago\
  \   6.72GB\noraclesean/db            11.2.0.4-EE   c1015174e910   6 months ago \
  \  6.72GB\noraclesean/db            12.1-EE       1db44c287b80   6 months ago  \
  \ 6.9GB\noraclesean/db            19.13.1-EE    27fdf297483b   5 months ago   7.81GB\n\
  oraclesean/db            21.5-EE       656c63dad153   5 months ago   8.69GB\n```\n\
  \n两个镜像的 Image ID 是相同的。只有标签不同。\n\n\n\n### 推送镜像\n\n标记镜像并不会实际将其添加到仓库。如果我导航到 Docker\
  \ Hub 并搜索仓库，它仍然是空的。我需要上传，或*推送*，该镜像：\n\n```\ndocker push oracleondocker/database:11.2.0.4-EE\n\
  ```\n\n推送意味着一个远程注册表，我不能为此操作使用镜像 ID——我必须指定标签。该标签告诉 Docker 我希望将已标记的镜像 `11.2.0.4-EE`\
  \ 上传到我的 `oracleondocker` 命名空间，并将其放置在 `database` 仓库中。Docker 报告上传进度：\n\n```\n> docker\
  \ push oracleondocker/database:11.2.0.4-EE\nThe push refers to repository [docker.io/oracleondocker/database]\n\
  5f70bf18a086: Pushed\nd67ad3eaa615: Pushing [=>                                ]\
  \  40.07MB/1.094GB\nfb92f0f7e7a1: Pushed\n8741e0584bcd: Pushing [>             \
  \                   ]  32.31MB/4.875GB\nb9cd4d53c8a0: Pushed\n0c7211f52f51: Pushed\n\
  59e93d414d42: Pushed\n4fa651f55709: Pushing [>                                ]\
  \  2.146MB/619.3MB\n4d82e938e5ad: Pushed\nd7d3f0b240dc: Mounted from library/oraclelinux\n\
  ```\n\n注意它在推送多个项目——正如你可能猜到的，这些是镜像层。当不同的镜像共享层时，Docker 在上传（推送）和下载（拉取）操作期间通过跳过系统上已存在的任何层来节省时间和带宽！\n\
  \n完成的 `push` 命令报告镜像的摘要，这是一个唯一标识镜像的哈希值：\n\n```\n> docker push oracleondocker/database:11.2.0.4-EE\n\
  The push refers to repository [docker.io/oracleondocker/database]\n5f70bf18a086:\
  \ Pushed\nd67ad3eaa615: Pushed\nfb92f0f7e7a1: Pushed\n8741e0584bcd: Pushed\nb9cd4d53c8a0:\
  \ Pushed\n0c7211f52f51: Pushed\n59e93d414d42: Pushed\n4fa651f55709: Pushed\n4d82e938e5ad:\
  \ Pushed\nd7d3f0b240dc: Mounted from library/oraclelinux\n11.2.0.4-EE: digest: sha256:e94665072e69fa398181a9d852d193beee5ca3fedfe65c26c8684762b90c710f\
  \ size: 2417\n```\n\n一旦镜像被推送到注册表，它在 Docker Hub 的控制台中就可见了，如图 16-9 所示。\n\n![](img/514143_1_En_16_Fig9_HTML.jpg)\n\
  \n显示推送到注册表的镜像在 docker hub 控制台中可见的屏幕截图。\n\n**图 16-9**\n\n在成功将镜像推送到我的新账户后，该标签在在线的\
  \ Docker Hub 控制台中可见\n\n如果我重新构建此镜像，无论是在本地还是在不同的仓库中，新版本都不会传播或替换 `oracleondocker/database:11.2.0.4-EE`\
  \ 中的镜像。哈希（和镜像 ID）元数据为镜像提供了唯一标识，这对于跟踪跨多个位置存储和共享的镜像版本非常有用。\n\n### CLI 注册表搜索\n\nDocker\
  \ 命令行界面，或 CLI，包含一个功能用于在注册表中搜索仓库和镜像：\n\n```\ndocker search \n```\n\n我发现 CLI 搜索功能有限。它默认显示\
  \ 25 个结果，可扩展到 100，并且不具备列出标签的功能。因此，除非你知道所需的标签（或者你对“最新”版本感到满意），否则它可能没有帮助。\n\n列表 16-2\
  \ 显示了在 Docker Hub 中搜索 `oracle` 时的顶部结果。你会注意到输出按 Stars 排序，表示将该仓库标记为收藏的人数。还有一个“Official”列，正如你可能预期的，表示这是一个官方仓库。\n\
  \n```\n> docker search oracle\nNAME              DESCRIPTION                   \
  \  STARS     OFFICIAL   AUTOMATED\noraclelinux        Official Docker builds of\
  \ Oracle Linux.          928        [OK]\noracleinanutshell/oracle-xe-11g      \
  \                            237\ngvenzl/oracle-xe  Oracle Database XE (21c, 18c,\
  \ 11g) for every...   115\nListing 16-2\n搜索 Docker Hub 中包含关键字“oracle”的仓库的截断输出\n\
  ```\n\n有一些选项可用于优化搜索结果：\n\n*   `is-official=true:` 设置为 *true* 仅显示官方仓库。\n*   `is-automated=true:`\
  \ 仅显示自动化镜像构建。自动化构建是一项付费订阅功能，可根据源代码构建镜像，并自动推送到 Docker Hub。\n*   `stars=n:` 将结果限制为至少拥有\
  \ *n* 个星标的仓库，其中 *n* 是一个整数值。\n\n将这些选项与 `-f` 或 `--filter` 标志配对使用。例如，要在 Docker Hub\
  \ 中搜索包含 oracle 关键字的官方镜像：\n\n```\n> docker search -f is-official=true oracle\nNAME\
  \          DESCRIPTION                    STARS     OFFICIAL   AUTOMATED\noraclelinux\
  \   Official Docker builds of Oracle Linux.       928        [OK]\n```\n\n执行对至少拥有\
  \ 100 个星标的镜像的搜索：\n\n```\n> docker search -f stars=100 oracle\nNAME          DESCRIPTION\
  \                         STARS      OFFICIAL   AUTOMATED\noraclelinux   Official\
  \ Docker builds of Oracle Linux.             928        [OK]\noracleinanutshell/oracle-xe-11g\
  \                                        237\ngvenzl/oracle-xe  Oracle Database\
  \ XE (21c, 18c, 11g) for every... 115\n```\n\n使用单独的 `-f` 标志应用多个搜索条件。这里，我搜索了至少拥有\
  \ 100 个星标的官方仓库：\n\n```\n> docker search -f stars=100 -f is-official=true oracle\n\
  NAME          DESCRIPTION                     STARS    OFFICIAL   AUTOMATED\noraclelinux\
  \   Official Docker builds of Oracle Linux.       928        [OK]\n```\n\n\n\n####\
  \ 拉取镜像\n\n在本书中，我们一直在*拉取*像 `alpine`、`ubuntu` 和 `oraclelinux` 这样的镜像，而没有使用命名空间（即之前\
  \ `docker push` 命令中 `/` 前面的部分）。这些都是 Docker Hub 中的**官方镜像**，存在于注册表的“根”目录下。它们不属于任何个人或组织拥有的命名空间。\n\
  \n然而，当我们说“拉取”了这些镜像时，我们并非显式地执行了拉取操作。对系统上尚不存在的镜像执行 `docker run` 会在后台自动执行 `docker pull`。也许你已经注意到了：\n\
  \n```\n> docker run alpine\nUnable to find image 'alpine:latest' locally\nlatest:\
  \ Pulling from library/alpine\n213ec9aee27d: Pull complete\nDigest: sha256:bc41182d7ef5ffc53a40b044e725193bc10142a1243f395ee852a8d9730fc2ad\n\
  Status: Downloaded newer image for alpine:latest\n```\n\n从公共仓库拉取或运行镜像，需要使用与之前 `docker\
  \ push` 示例相同的完全限定的注册表格式——一个命名空间、一个注册表或镜像名称，以及一个标签（如果存在的话）。在图 16-10 中，我浏览了 Docker\
  \ Hub 并找到了一个 Bitnami 的已验证发布者镜像 `bitnami/mariadb`。\n\n![](img/514143_1_En_16_Fig10_HTML.jpg)\n\
  \n**图 16-10: Bitnami MariaDB 发行版的主仓库页面**\n\nMariaDB 是一个流行的 MySQL 分支，因此可以推断也应该有一个官方镜像。如果我没有任何命名空间地执行\
  \ `docker pull mariadb`，会得到这样一个结果：\n\n```\n> docker pull mariadb\nUsing default\
  \ tag: latest\nlatest: Pulling from library/mariadb\n2b55860d4c66: Pull complete\n\
  4bf944e49ffa: Pull complete\n020ff2b6bb0b: Pull complete\n977397ae9bc6: Pull complete\n\
  b361cf449d40: Pull complete\n21d261950157: Pull complete\n296a47dd9435: Pull complete\n\
  bbe841bf5cfe: Pull complete\n758db05dd921: Pull complete\n9c2c0a21c9e6: Pull complete\n\
  4bc311b9359a: Pull complete\nDigest: sha256:05b53c3f7ebf1884f37fe9efd02da0b7faa0d03e86d724863f3591f963de632c\n\
  Status: Downloaded newer image for mariadb:latest\ndocker.io/library/mariadb:latest\n\
  ```\n\n但这是 Bitnami 的版本吗？不是。要获取 Bitnami 版本，我需要添加 Bitnami 命名空间：\n\n```\n> docker pull\
  \ bitnami/mariadb\nUsing default tag: latest\nlatest: Pulling from bitnami/mariadb\n\
  1d8866550bdd: Pull complete\ncfd1823a275f: Pull complete\nDigest: sha256:320745f11755f950a6ffa80a7e16dca108b3fe6df76873e2ec22fa3900fecb20\n\
  Status: Downloaded newer image for bitnami/mariadb:latest\ndocker.io/bitnami/mariadb:latest\n\
  ```\n\n在这两种情况下，Docker 都为我获取了“latest”版本，因为我没有指定标签。如果我查看图 16-11 中 Bitnami 镜像的“标签”部分，会看到各种各样的标签。要获取“latest”以外的版本，我必须使用其标签，这里是\
  \ `10.5.17`：\n\n```\n> docker pull bitnami/mariadb:10.5.17\n10.5.17: Pulling from\
  \ bitnami/mariadb\n1d8866550bdd: Already exists\n0f5b0c3c18cf: Pull complete\nDigest:\
  \ sha256:ec6bb285c67d5b66a6ee1fca667e9d73906d767b02cc5dbb2bff1159d97e7fbe\nStatus:\
  \ Downloaded newer image for bitnami/mariadb:10.5.17\ndocker.io/bitnami/mariadb:10.5.17\n\
  ```\n\n注意 Docker 没有下载镜像的第一层 `1d8866550bdd`。它与“latest”镜像的第一层完全相同，这表明它很可能是许多 Bitnami\
  \ MariaDB 镜像的基础底层。特定版本的内容仅限于第二层。\n\n在这两个 MariaDB 镜像中，还有一点值得注意。Bitnami 镜像只有两层，而官方镜像有十一层。这反映了它们构建方式的差异。官方的、受信任的\
  \ MariaDB 镜像将构建过程中的每一步都暴露为层。Bitnami 镜像则减少了层内容以提高安全性。你可以自己拉取这些镜像并运行以下 `docker history`\
  \ 命令（`--no-trunc` 标志可防止 Docker 截断原始 Dockerfile 的输出）：\n\n```\ndocker image history\
  \ --no-trunc bitnami/mariadb\ndocker image history --no-trunc mariadb\n```\n\n对比输出，查找诸如默认密码和配置等攻击者可能利用的信息。教训是什么？仅仅因为镜像是“官方”或“受信任”的，并不一定意味着它们适合生产环境！\n\
  \n![](img/514143_1_En_16_Fig11_HTML.jpg)\n\n**图 16-11: Bitnami MariaDB 仓库包含多个不同版本的镜像，每个版本通过其标签标识**\n\
  \n如果我在我的系统上运行 `docker images`，会看到这三个镜像都不同：\n\n```\nREPOSITORY       TAG        \
  \   IMAGE ID       CREATED         SIZE\nbitnami/mariadb  10.5.17       0470be367c25\
  \   9 hours ago     341MB\nbitnami/mariadb  latest        ca73fbad9ff3   5 hours\
  \ ago     344MB\nmariadb          latest        11aee66fdc31   6 days ago      384MB\n\
  ```\n\n通过引用 Bitnami 命名空间下的 MariaDB 镜像并使用离散版本的标签，我获得了稍有不同的 MariaDB 版本。\n\n拉取私有镜像遵循相同的模式，但有一个额外要求：用户必须登录到正确的命名空间（或拥有授予对该仓库访问权限的安全令牌）。\n\
  \n\n### Oracle Container Registry\n\nOracle 曾将官方数据库镜像存放在 Docker Hub 上，但出于之前提到的许可问题而将其移除。任何人都可以在不接受\
  \ Oracle 许可协议的情况下下载其内容。\n\n然而，Oracle 数据库镜像仍然可在 *Oracle 容器注册表* 中获取，地址为 [`https://container-registry.oracle.com`](https://container-registry.oracle.com)。在访问其镜像之前，您必须先使用\
  \ My Oracle Support 凭据登录并接受标准条款与限制。好消息是，一旦您接受了条款，注册表会识别该状态并允许您在未来无需“反复提醒”即可访问您的账户。\n\
  \n从 Oracle 的注册表拉取镜像前，请使用注册表地址 `container-registry.oracle.com` 从终端会话登录：\n\n```bash\n\
  > docker login container-registry.oracle.com\nAuthenticating with existing credentials...\n\
  Login Succeeded\n```\n\n登录后，您将可以访问注册表，并能够像在 Docker Hub 上那样搜索和拉取镜像。不幸的是，命令行的搜索功能比较难用。登录容器注册表后，如果我搜索匹配\
  \ \"oracle\" 的官方镜像，结果看起来和之前没什么不同：\n\n```bash\n> docker search -f is-official=true\
  \ oracle\nINDEX               NAME                DESCRIPTION                  \
  \     STARS               OFFICIAL            AUTOMATED\ndocker.io           oraclelinux\
  \         Official Docker builds of Oracle Linux.   928                 [OK]\n```\n\
  \n然而，如果我将搜索字符串更改为容器注册表的命名空间，我就能得到预期的结果。在此示例中，我将搜索范围缩小到命名空间内的数据库注册表 `container-registry.oracle.com/database`：\n\
  \n```bash\n> docker search -f is-official=true container-registry.oracle.com/database\n\
  INDEX   NAME   DESCRIPTION             STARS    OFFICIAL   AUTOMATED\noracle.com\
  \   database/enterprise  Oracle Database Enterprise Edition  0 [OK]\noracle.com\
  \   database/express     Oracle Database Express Edition     0 [OK]\noracle.com\
  \   database/gsm         Oracle Global Service Manager       0 [OK]\noracle.com\
  \   database/instantclient Oracle Instant Client             0 [OK]\noracle.com\
  \   database/observability-exporter   Oracle Database Observability Exporter (Metr...\
  \                                        0 [OK]\noracle.com   database/operator\
  \   This image is part of and for use with the O...                            \
  \ 0 [OK]\noracle.com   database/ords       Oracle REST Data Services (ORDS) with\
  \ Applic...                            0 [OK]\noracle.com   database/otmm      \
  \ Oracle Transaction Manager for Microservice                         0 [OK]\noracle.com\
  \   database/rac        Oracle Real Application Clusters     0 [OK]\noracle.com\
  \   database/sqlcl      Oracle SQLDeveloper Command Line (SQLcl)               \
  \               0 [OK]\noracle.com   database/standard   Oracle Database Standard\
  \ Edition  2  0 [OK]\n```\n\n输出显示了标准版和企业版数据库镜像的选项，但未提供它们如何被标记的详细信息。为此，最好返回到图 16-12\
  \ 中的容器注册表页面。\n\n![](img/514143_1_En_16_Fig12_HTML.jpg)\n\nOracle 容器注册表页面的屏幕截图包含一个功能，即浏览容器，用户可以按产品类别（如数据库、Java、中间件等）浏览容器。\n\
