  \ Docker 中运行 Oracle 数据库的现成解决方案。虽然方便，但它们缺乏通过构建自己的镜像所提供的定制化能力。\n\n### 总结\n\n在投入了所有努力构建完美的数据库镜像之后，不分享它真是太可惜了！Docker\
  \ Hub 是一个免费且流行的解决方案，可以做到这一点。但请记住，公开分享包含 Oracle 数据库软件的镜像是违反许可协议的。Docker Hub 免费的个人层级允许您创建一个私有仓库用于此目的。\n\
  \n请记住，Docker 以提升的权限集运行容器。请谨慎对待从公共仓库下载的内容，尽可能坚持使用可信内容。如果必须使用不受信任的镜像，请利用 Docker Hub\
  \ 的免费扫描服务。\n\nDocker Hub 并不是您唯一的仓库选择。包括 Oracle 在内的云供应商提供易于设置且通常免费的容器管理服务。组织可以部署与现有开发工作流集成的自有仓库。\n\
  \n脚注 1   2   3   4\n\n\n## 17. 结论\n\n在本书的第一部分，你探索了容器的工作原理，以及如何在 Docker 中运行 Oracle\
  \ 数据库。你学习了将重要的数据库内容——数据文件和配置——持久化存储在容器限制之外的方法。你也熟练掌握了容器网络的概念，能够将运行在主机上的客户端应用程序（如\
  \ SQL Developer）连接到容器内的数据库。你还可以利用容器网络在运行容器的数据库之间进行通信。\n\n第二部分涵盖了镜像及其构建配方：Dockerfile。你发现了如何定制\
  \ Oracle 容器仓库中提供的标准镜像，并深入了解了扩展 Dockerfile 以满足你需求的技术。当然，并非每个镜像一开始都能顺利运行！幸运的是，我们介绍了多种故障排除镜像和容器的方法与途径。一旦一切运行顺畅，你便学会了如何在仓库中添加和管理镜像。\n\
  \n我初次接触在容器中运行 Oracle 数据库的体验并不积极。我当时确信这是徒劳无功之事，注定会惨淡收场。此后的几年里，我亲身见证了容器的力量与潜力。它们已成为我日常工作中不可或缺的一部分。在本书中，我试图记录我对\
  \ Linux 容器背后技术的欣赏，并与你分享我在 Docker 体验中希望更早了解的那些事情。我真诚地希望你觉得本书对你有所帮助，并希望它能激励你开启或深化你的\
  \ Docker 之旅！\n\n"
- "# 第三部分 附录\n\n#### 安装 Docker Desktop\n\n#### 安装 Docker Desktop\n\nDocker Desktop\
  \ 可从 [`www.docker.com`](http://www.docker.com) 免费下载。Linux 用户可以安装 Docker Desktop\
  \ 或 Docker Engine（运行 Docker 容器的原生环境）。\n\n### Windows 10 和 11\n\n在幕后，Windows 上的 Docker\
  \ Desktop 在 Hyper-V 虚拟机中运行 Linux。早期版本的 Docker Desktop 因 Hyper-V 与 VirtualBox 之间的冲突而声名狼藉，性能也常常不尽如人意。\n\
  \n`Windows Subsystem for Linux version 2`，或称 `WSL 2`^(⁹¹)，在 Windows 10 上可用，它标志着\
  \ Docker Desktop 在 Windows 上的一次重大改进。在 WSL 2 下运行的 Docker Desktop 拥有改进的系统资源管理、更好的性能以及与主机操作系统更强大的集成。\n\
  \nWSL 在 Windows 操作系统内部提供了功能完整的 Linux 体验。本书中使用的命令示例在 WSL 环境中的运行方式，与在 Linux 或 Mac\
  \ 系统中完全相同。\n\n#### 设置 Windows Subsystem for Linux\n\n按照 Microsoft 的说明在 [`https://docs.microsoft.com/en-us/windows/wsl/install`](https://docs.microsoft.com/en-us/windows/wsl/install)\
  \ 设置 Windows Subsystem for Linux。在我的系统（Windows 10）上，我以管理员身份打开一个 PowerShell 会话，然后运行\
  \ `wsl --install`，如图 A-1 所示。这会执行 WSL 的默认安装并安装 Ubuntu Linux。命令完成后，请重启计算机。\n\n![](img/514143_1_En_18_Fig1_HTML.jpg)\n\
  \n一个管理员 - windows powershell 选项卡的截图，其中包含用于安装 WSL 2 的命令。\n\n图 A-1\n\n从以管理员身份运行的 PowerShell\
  \ 会话中安装 WSL 2\n\n默认情况下，WSL 会下载 Ubuntu Linux 并需要重启，如图 A-2 所示。重启计算机以完成 WSL 的设置并开始\
  \ Linux 安装。\n\n![](img/514143_1_En_18_Fig2_HTML.jpg)\n\n一个管理员 - windows powershell\
  \ 选项卡的截图，显示了 WSL 2 安装后的信息。\n\n图 A-2\n\nWSL 安装完成后，重启计算机\n\n#### 配置和更新 Linux\n\n计算机重启后，WSL\
  \ 将安装 Linux 发行版。这需要几分钟时间。安装完成后，你需要创建一个 Linux 用户，如图 A-3 所示。我在我的系统上使用了 `docker` 作为用户名。\n\
  \n![](img/514143_1_En_18_Fig3_HTML.jpg)\n\n安装完成后出现的选项卡截图。安装后，用户必须创建一个 linux 用户。\n\
  \n图 A-3\n\n安装完成后，创建一个要在 Linux 子系统中使用的用户\n\n务必更新你的 Linux 发行版。对于 Ubuntu 系统，在终端窗口中运行以下命令：\n\
  \n```\nsudo apt update && sudo apt upgrade\n```\n\n现在也是从 Windows 应用商店安装 Windows\
