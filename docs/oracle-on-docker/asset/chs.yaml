  bash-4.2$ ls -l /opt/oracle/oradata/dbconfig/ORCLCDB\ntotal 24\n-rw-r--r-- 1 oracle\
  \ oinstall  234 Jan 21 16:19 listener.ora\n-rw-r----- 1 oracle oinstall 2048 Jan\
  \ 21 16:28 orapwORCLCDB\n-rw-r--r-- 1 oracle oinstall  780 Jan 21 17:43 oratab\n\
  -rw-r----- 1 oracle oinstall 3584 Jan 21 17:46 spfileORCLCDB.ora\n-rw-r--r-- 1 oracle\
  \ oinstall   54 Jan 21 16:19 sqlnet.ora\n-rw-r----- 1 oracle oinstall  197 Jan 21\
  \ 17:43 tnsnames.ora\n```\n\n#### 镜像定制脚本\n\n我运行的是用于不同环境的混合镜像。我的交互式镜像包含我用于查看和编辑文件、执行测试以及收集诊断信息的工具。它们还将环境设置得熟悉且用户友好，包括我最喜欢的命令行提示符、简化导航的别名和快捷方式，以及一个用于定制我的\
  \ SQL*Plus 体验的 `login.sql` 文件。我的生产镜像遵循容器原则，旨在最小化占用空间、减少攻击面并消除不必要的包和库。我可以管理专用于不同目的的独立仓库，但这意味着要管理两套代码，增加测试和验证更改的工作量，并引入更多人为错误的机会。通过构建参数，单个仓库可以支持这两个镜像类别。\n\
  \n管理镜像内容存在多种选项，包括：\n\n*   **具有条件操作的脚本：** 当选项有限、定义明确且不会随时间发生重大变化时很有用。\n*   **追加或替换值：**\
  \ 最适用于预先未明确定义的动态输入。\n*   **有条件地复制文件：** 适用于广泛、复杂或特定于环境的、相对静态的修改。\n\n以下方法建议应用这些技术，从单个仓库生成定制镜像。\n\
  \n### 条件操作\n\n支持多种结果并减少代码量可以降低维护开销。向脚本添加条件逻辑是实现此目标的策略之一，当需要在有限选项间做出决定且每个选项都有明确操作时，这种方法效果最佳。条件的来源可以是传递给\
  \ `docker build` 命令的参数，也可以从环境中获取。\n\n本书一直使用的公共仓库为每个数据库版本（11.2.0.2、12.1.0.2、12.2.0.1、18.3.0、18.4.0、19.3.0\
  \ 和 21.3.0）都设有单独的目录。这些目录下的脚本结构相同：有些完全一致，有些在格式和风格上略有差异，还有少数引入了特定于版本的功能。例如，如果我运行 `diff`\
  \ 命令来显示 `installDBBinaries.sh` 的 19c 和 21c 版本之间的差异，会看到：\n```\n> diff 19.3.0/installDBBinaries.sh\
  \ 21.3.0/installDBBinaries.sh\n24c24\n if [ \"$EDITION\" != \"EE\" ] && [ \"$EDITION\"\
  \ != \"SE2\" ]; then\n```\n除了 `if` 语句的一个细微差别外，它们完全相同。其他地方则有反映代码改进的差异，例如 `runOracle.sh`\
  \ 脚本中的这个检查：\n```\n    if [ -a \"$ORACLE_HOME\"/install/.docker_* ]; then\n>    \
  \   mv \"$ORACLE_HOME\"/install/.docker_* \"$ORACLE_BASE\"/oradata/dbconfig/\"$ORACLE_SID\"\
  /\n>    fi;\n```\n19c 版本尝试移动匹配 `$ORACLE_HOME/install/.docker_*` 的文件。如果没有文件匹配该模式，它会返回错误。21c\
  \ 版本将移动命令包装在 `if` 语句中，在尝试移动之前先检查是否存在匹配的文件。21c 版本包含了特定于 Oracle 21c Express 版的操作，但脚本大体相同。将\
  \ 19c 和 21c 仓库合并到一个公共目录，然后向构建过程传递版本号，这是否可行？\n\n将版本分离到独立目录有充分的理由。在前一章讨论 `build context`\
  \ 时，我们了解到 Docker 会读取构建路径下的所有文件。将 19c 和 21c 合并在一个 Dockerfile 中意味着将两个版本的数据库安装介质存储在同一目录下。这些文件很大，同时放在一个目录中会增加上下文大小和处理时间。\n\
  \n独立目录的缺点在于维护。文件差异大多很小，但 21c 版本中的每一项改进并未都同步到其他版本。随着支持版本数量的增加，跟踪和测试不断扩大的代码库中的修复与改进的需求也在增长。\n\
  \n构建特性（见第 14 章）可以解决上下文问题。这个问题解决后，考虑通过构建参数将版本传递给 Dockerfile 就更加合理。该版本随后可以控制构建过程的独特方面，特别是：\n\
  \n*   在 `setupLinuxEnv.sh` 中应用正确的预安装 RPM 包\n*   执行为 21c 启用 Express 版所需的额外检查\n* \
  \  使用正确的数据库版本和版本标签标记镜像\n\n需要明确的是：将现有脚本转换为处理多个版本是一项复杂的任务，具体取决于你的目标，这只是说明为何可能在设置脚本中嵌入条件检查的一个例子。因此，列出具体的改动并不实际，但我们可以探索说明这种实践的技术。例如，Linux\
  \ 的 `case` 语句提供了一种非常便捷的方法，可根据版本确定正确的包集合：\n```\ncase $DB_VERSION in\n11*)   RPM_LIST=\"\
  oracle-rdbms-server-11gR2-preinstall unzip\" ;;\n12.1*) RPM_LIST=\"oracle-rdbms-server-12cR1-preinstall\
  \ tar\" ;;\n12.2*) RPM_LIST=\"oracle-database-server-12cR2-preinstall\" ;;\n18*)\
  \   RPM_LIST=\"oracle-database-preinstall-18c\" ;;\n19*)   RPM_LIST=\"oracle-database-preinstall-19c\"\
  \ ;;\n21*)   RPM_LIST=\"oracle-database-preinstall-21c\" ;;\n*)     exit 1 ;;\n\
  esac\n```\n然后，将 `$RPM_LIST` 变量传递给 `yum install` 命令：^(⁷⁵)\n```\nyum -y install \"\
  $RPM_LIST\" openssl\n```\n我想强调，两种方法都非“对”或“错”。编程是一门艺术，团队会选择最适合其风格、背景和目的的方法。在我的实践中，我倾向于为每个版本使用一套脚本，但对于\
  \ Oracle 的容器镜像，我承认独立目录更好。代码库向新用户介绍了容器，为每个版本设置一个目录更容易理解。随着你对容器越来越熟悉并扩展镜像库，将版本化构建整合到统一的目录结构下可能会是更好的选择。关于此方法的更多示例（或许还有灵感）可在我的\
  \ GitHub 上找到：[`https://github.com/oraclesean/docker-oracle`](https://github.com/oraclesean/docker-oracle)。\n\
  \n## 在 Dockerfile 中追加上一节中的 `yum install` 命令引出了修改镜像的第二个机会，这次与预期环境的性质有关。生产镜像应该精简，不包含可能增加镜像大小或引入漏洞的不必要包。用于实验的镜像有不同的要求，包括编辑器和诊断工具，这些会因需求和个人喜好而异。我喜欢\
  \ `vi`；其他人喜欢 `emacs`。你可能希望包含 `tree` 或 `strace`。这里的重点不在于需要安装 `what` 包，而在于列表的可变性质，要解决的挑战是如何最好地包含它们。\n\
  \n一种方法是以 `root` 用户身份登录正在运行的容器：\n```\ndocker exec -it -u root  bash\n```\n然后 `yum\
  \ install` 包：\n```\n# yum -y install vi less tree which\n```\n这种方法有以下缺点：\n\n*  \
  \ 其手动性质。我必须在每个容器中执行这些步骤。\n*   它是需要额外包的活动的先决条件，而且很容易被忘记，直到你发现缺少某个东西。\n*   安装会更改容器覆盖文件系统中的文件，增加了容器的大小。\n\
  \n对于独特的添加项，采取这条路线是有意义的。仅仅因为不想向容器添加几兆字节或多运行一个命令，就花费几分钟构建一个包含“这次你需要的那个包”的自定义镜像，这并不实际，特别是当该容器不会存在很长时间时。\n\
  \n当这些工具经常出现在镜像中时，通过构建参数将它们集成到镜像本身中更有意义。\n\n与 `docker run` 中使用的环境变量不同，我们不能“临时编造”构建参数。它们必须通过\
  \ Dockerfile 中的 `ARG` 指令来定义。然而，它们不需要值。让我们在 Dockerfile 中创建一个新参数来接受要安装到镜像中的可选包列表：\n\
  ```\nARG RPM_SUPPLEMENT=\"\"\n```\n它应该与传递给第一个构建阶段的其他参数一起出现。它是运行 `$INSTALL_DIR/$SETUP_LINUX_FILE`\
  \ 步骤的阶段。无需通过关联的 `ENV` 命令将其添加到环境中。参数在阶段的上下文中可用，如果在后续步骤中不需要，则不必提升到容器的环境中。\n\n接下来，在\
  \ `setupLinuxEnv.sh` 脚本中，更新 `yum install` 命令以包含新参数：\n```\nyum -y install oracle-database-preinstall-19c\
  \ openssl $RPM_SUPPLEMENT\n```\n如果我们没有向构建参数传递任何值，Linux 设置脚本会运行，并在 `yum` 命令末尾附加一个空字符串。但是，如果我们给构建参数传递一个包列表：^(⁷⁶)\n\
  ```\ndocker build ...\n--build-arg RPM_SUPPLEMENT=\"vi less tree which\"\n...\n\
  ```\n`yum` 命令会在变量中看到自定义参数，并安装额外的包。\n\n### 条件文件复制\n\n### 脚本逻辑与安全考量\n\n本节第一部分提出的修改，针对的是脚本使用参数进行\
  \ `if-then` 或基于 `case` 的决策的场景。脚本必须内嵌评估条件和根据条件采取行动的逻辑。该部分的例子考虑了将两个或多个版本的脚本整合到单一目录结构中。仓库中许多辅助文件是相同的或足够相似，可以在不同版本间互换，因此将它们合并是有意义的。但其他文件——包括数据库安装脚本——包含针对特定条件的独特步骤。随着\
  \ Oracle 推出新版本，对数据库安装采用“一个脚本统治所有”的方法可能并不实用。为每个版本（从 11g 到 21c 及以后）适应 Express、Standard\
  \ 和 Enterprise 版本之间的差异是一项复杂的任务。针对所有组合测试更新会迅速变得难以掌控。\n\n还有一个安全方面需要考虑。查看 Oracle 数据库容器中\
  \ `$ORACLE_BASE` 目录下的文件：\n\n```\n/opt/oracle/runOracle.sh\n/opt/oracle/createObserver.sh\n\
  /opt/oracle/relinkOracleBinary.sh\n/opt/oracle/setPassword.sh\n/opt/oracle/checkDBStatus.sh\n\
  /opt/oracle/runUserScripts.sh\n/opt/oracle/configTcps.sh\n/opt/oracle/createDB.sh\n\
  /opt/oracle/dbca.rsp.tmpl\n/opt/oracle/startDB.sh\n```\n\n嵌入在脚本中的逻辑揭示了在不同条件下系统如何工作，并可能暴露攻击者可以利用你的数据库基础设施的方式。能够访问一个镜像或一个不安全或“不重要”容器的人可以推断配置，甚至反向工程你环境中的其他容器。\n\
  \n### Dockerfile 示例\n\n也许存在一个折中方案——一组适用于任何版本的共享文件，以及没有过于复杂或泄露信息的条件逻辑的专用文件。为了想象这是如何工作的，让我们看一下\
  \ 19c Dockerfile 的顶部部分，重点关注清单 13-7 中的参数和环境设置。我通过删除一些对本练习不重要的特殊环境变量来简化它。\n\n```\n\
  # Argument to control removal of components not needed after db software installation\n\
  ARG SLIMMING=true\nARG INSTALL_FILE_1=\"LINUX.X64_193000_db_home.zip\"\n# Environment\
  \ variables required for this build (do NOT change)\n# -------------------------------------------------------------\n\
  ENV ORACLE_BASE=/opt/oracle \\\nORACLE_HOME=/opt/oracle/product/19c/dbhome_1 \\\n\
  INSTALL_DIR=/opt/install \\\nINSTALL_FILE_1=$INSTALL_FILE_1 \\\nINSTALL_RSP=\"db_inst.rsp\"\
  \ \\\nCONFIG_RSP=\"dbca.rsp.tmpl\" \\\nPWD_FILE=\"setPassword.sh\" \\\nRUN_FILE=\"\
  runOracle.sh\" \\\nSTART_FILE=\"startDB.sh\" \\\nCREATE_DB_FILE=\"createDB.sh\"\
  \ \\\nSETUP_LINUX_FILE=\"setupLinuxEnv.sh\" \\\nINSTALL_DB_BINARIES_FILE=\"installDBBinaries.sh\"\
  \ \\\n# Directory for keeping Oracle Wallet\nWALLET_DIR=\"\"\n```\n清单 13-7\n一个 Oracle\
  \ 19c Dockerfile 的部分内容，展示了参数和环境指令。环境设置侧重于与文件和目录相关的部分。\n\n为了说明问题，假设 `runOracle.sh`\
  \ 和 `createDB.sh` 脚本在不同数据库版本之间差异很大，将它们的逻辑合并既不实际也不可取。响应文件也不可互换。在清单 13-8 中，我添加了一个数据库版本参数，并将其纳入现有环境中。\n\
  \n```\n# Argument to control removal of components not needed after db software\
  \ installation\nARG SLIMMING=true\nARG INSTALL_FILE_1=\"LINUX.X64_193000_db_home.zip\"\
  \nARG DB_VERSION=19.3.0\n# Environment variables required for this build (do NOT\
  \ change)\n# -------------------------------------------------------------\nENV\
  \ ORACLE_BASE=/opt/oracle \\\nORACLE_HOME=/opt/oracle/product/19c/dbhome_1 \\\n\
  INSTALL_DIR=/opt/install \\\nINSTALL_FILE_1=$INSTALL_FILE_1 \\\nINSTALL_RSP=\"db_inst.${DB_VERSION}.rsp\"\
  \ \\\nCONFIG_RSP=\"dbca.rsp.${DB_VERSION}.tmpl\" \\\nPWD_FILE=\"setPassword.sh\"\
  \ \\\nRUN_FILE=\"runOracle.${DB_VERSION}.sh\" \\\nSTART_FILE=\"startDB.sh\" \\\n\
  CREATE_DB_FILE=\"createDB.${DB_VERSION}.sh\" \\\nSETUP_LINUX_FILE=\"setupLinuxEnv.sh\"\
  \ \\\nINSTALL_DB_BINARIES_FILE=\"installDBBinaries.sh\" \\\n# Directory for keeping\
  \ Oracle Wallet\nWALLET_DIR=\"\"\n```\n清单 13-8\n一个修改后的 Dockerfile，它通过一个参数接受数据库版本，并将其插入到环境中定义的选定脚本和模板的名称中。\n\
  \n该 Dockerfile 支持多个版本，而无需向脚本本身添加复杂逻辑。所有版本共有的文件被共享。在必要时替换专用脚本。同样的技术也有助于解决环境差异。用于设置生产系统外观的\
  \ `.bashrc` 文件可能与我在实验性容器中使用的有很大不同。19c 和 21c 的 Dockerfile 向容器的 `.bashrc` 文件添加了条目：\n\
  \n```\nRUN echo 'ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}'\
  \ > .bashrc\n```\n\n我们可以扩展该命令以包含提示符的自定义：\n\n```\nexport PS1=\"[\\u - \\${ORACLE_SID}]\
  \ \\w\\n# \"\n```\n\n然而，我们现在进入了棘手的领域。尝试用 `echo` 重现这个字符串：\n\n```\n# Without quotes:\
  \ backslash before the dollar sign and trailing whitespace are lost.\necho export\
  \ PS1=\"[\\u - \\${ORACLE_SID}] \\w\\n# \"\nexport PS1=[\\u - ${ORACLE_SID}] \\\
  w\\n#\n# With double quotes, escaping embedded quotes: backslash is lost.\necho\
  \ \"export PS1=\\\"[\\u - \\${ORACLE_SID}] \\w\\n# \\\"\"\nexport PS1=\"[\\u - ${ORACLE_SID}]\
  \ \\w\\n# \"\n# Double-escaped the backslash: works!\necho \"export PS1=\\\"[\\\
  u - \\\\\\${ORACLE_SID}] \\w\\n# \\\"\"\nexport PS1=\"[\\u - \\${ORACLE_SID}] \\\
  w\\n# \"\n# Single quotes prevent bash from evaluating the string: works!\necho\
  \ 'export PS1=\"[\\u - \\${ORACLE_SID}] \\w\\n# \"'\nexport PS1=\"[\\u - \\${ORACLE_SID}]\
  \ \\w\\n# \"\n```\n\nBash shell 有一些敏感性和怪癖，这并不总是显而易见的。弄清楚如何让它打印包含特殊字符的字符串可能会令人沮丧！另一种方法是提前为每个环境编写专用文件，然后将它们复制到镜像中。一个直截了当的生产文件\
  \ `bashrc.prod`：\n\n```\nORACLE_SID=${ORACLE_SID:-ORCLCDB}\nexport ORACLE_SID=${ORACLE_SID^^}\n\
  ```\n\n以及一个用于测试的文件 `bashrc.test`，它设置了 `ORACLE_SID` 并添加了提示符和其他环境变量的设置：\n\n```\nORACLE_SID=${ORACLE_SID:-ORCLCDB}\n\
  export ORACLE_SID=${ORACLE_SID^^}\nexport PS1=\"[\\u - \\${ORACLE_SID}] \\w\\n#\
  \ \"\nexport ORACLE_BASE_CONFIG=\"$($ORACLE_HOME/bin/orabaseconfig 2>/dev/null ||\
  \ echo $ORACLE_HOME)\"\nexport ORACLE_BASE_HOME=\"$($ORACLE_HOME/bin/orabasehome\
  \ 2>/dev/null || echo $ORACLE_HOME)\"\nexport TNS_ADMIN=$ORACLE_BASE_HOME/network/admin\n\
  export ORACLE_PATH=/home/oracle\n```\n\n在下面来自 19c Dockerfile 的片段中，我修改了最终的构建阶段以接受一个参数，并将\
  \ `RUN` 命令替换为 `COPY`，以将正确的文件插入镜像：\n\n```\n#############################################\n\
  # -------------------------------------------\n# Start new layer for database runtime\n\
  # -------------------------------------------\n#############################################\n\
  FROM base\nARG ENV=prod\nUSER oracle\nCOPY --chown=oracle:dba --from=builder $ORACLE_BASE\
  \ $ORACLE_BASE\nUSER root\nRUN $ORACLE_BASE/oraInventory/orainstRoot.sh && \\\n\
  $ORACLE_HOME/root.sh\nUSER oracle\nWORKDIR /home/oracle\n# Add an environment-specific\
  \ bashrc file to the image\nCOPY bashrc.$ENV /home/oracle/.bashrc\n```\n\n无论是处理脚本还是配置文件，使用包含镜像中所需的确切代码或文本的文件可能更容易（并且可能更不易出错和令人沮丧）！\n\
  \n\n### 摘要\n\n随着你处理现成容器镜像的经验日益丰富，你会发现一些你喜欢的东西，以及一些你想要改变的东西。这是学习曲线的一部分，而稳健、容错的工具有助于建立下一步所需的信心和技能。无论是第一辆公路自行车还是一项新技术，持续的练习能形成肌肉记忆和熟悉感。一旦使用工具变得得心应手，你的思维就能完全专注于更清晰地构想你想做的事情，并借此理解你的工具可能如何限制你的进展。\n\
  \n*Breaking Away* 中的四个朋友在寻找自己独特身份的过程中，努力对抗父母和社会的期望。虽然他们无法改变自己是谁或来自哪里，但他们意识到，出身并不决定未来的方向。这对于我们全书所使用的镜像仓库来说也是如此。它们是塑造我们理解如何在容器中运行数据库的基础，但并不阻止我们大胆梦想并规划自己的路线。\n\
  \n本章介绍了一些帮助你迈出下一步处理容器的“配方”。它们解决了你在使用数据库镜像时可能遇到的问题，但它们也具有适应其他需求的灵活性。这就是“配方”的美妙之处——无论是在烹饪还是编码中，它都是艺术与科学的结合。一个问题很少只有一个答案，然而解决一个问题的方法或模式通常也适用于其他问题。我希望本章的示例能激发你的想象力，为你在\
  \ Docker 之旅中遇到的挑战构想解决方案！下一章将更深入地探讨 Docker 如何构建镜像，着眼于编写高效、有效的 Dockerfiles。\n\n脚注\
  \ 1   2   3   4   5   6   7\n\n## 14. 构建镜像\n\n生活中有些奥秘我不需要（甚至不想）去理解。不去了解能为我保留一丝对周遭世界的惊奇感。缝纫机就是其中之一。我会手工缝纫，虽然没什么天赋，但我从未弄明白机器是如何复制这种劳作的。即使能轻易上网找到慢动作、逐针专家解说的\
  \ YouTube 视频来揭示整个过程，我也一直抗拒学习缝纫机的基本原理。机器如何将针部分刺入布料，然后从下方固定每一针，这对我来说超出了理解范围。我明明知道得更多，但我能想象到的最佳解释就是机器内部住着一群小精灵，正疯狂地将梭芯线穿过每一针。我满足于不知情——它滋养了我对日常事物的迷恋与欣赏，并提醒我身边充满了睿智而富有创造力的人！或者，魔法真的存在！\n\
  \n有些便利我简直习以为常。细想围绕我的技术，我明白我的笔记本电脑使用 DHCP 来获取网络地址。我不知道细节，但似乎如果有必要我能够弄清楚，而且它不像缝纫机那样充满神秘感。它让加入网络变得容易，并免去了在酒店\
  \ WiFi 上猜测可用 IP 地址的麻烦。\n\n自动化和脚本也属于类似范畴。它们让日常任务的执行变得更快、更容易，并让我们“忘记”细节。（坦白说，有时我看代码会想，自己当初怎么那么天真或那么灵感迸发！）将知识编码转化为工具，可以与他人分享，并作为更大、更好事物的构建块。在第\
  \ 4 章，`buildContainerImage.sh` 脚本正是这样做的。你给它一个数据库版本和版本，它就在后台为你构建并运行 `docker build`\
  \ 命令。\n\n要获得对镜像创建的更大控制权，意味着需要亲自动手处理构建过程。即使你的计划不包括编写自定义 Dockerfiles，理解构建命令的元素也能让你更好地欣赏幕后发生的事情，并理解其中的奥妙！而且我保证，构建镜像远没有缝纫机那么神秘，也不需要电脑内部有一支小精灵劳作大军！\n\
  \n### 构建命令语法\n\n`docker build` 可能是 Docker 词汇中最直白的命令。其最简形式是有效的：\n\n```\ndocker build\
  \ .\n```\n\n这看起来似乎没什么！这么简单的东西能做什么呢？这一切都与上下文有关！\n\n\n\n#### 上下文\n\n构建镜像需要 *Dockerfile*（指令或配方）和\
  \ *构建上下文*（文件、资源或素材）。上下文是指构建运行所在目录及其下的所有内容。Oracle 数据库构建包含软件安装介质、用于管理构建的脚本（准备操作系统和安装数据库）以及容器运行时使用的脚本（创建数据库、启动数据库、报告健康状况等）。\n\
  \n在之前的构建命令中，点（.）代表上下文。这个点或句号是 Linux 中的一个简写字符，指向当前目录^⁷⁷。Docker 使用它在那里找到的任何文件来构建镜像。构建也需要一个\
  \ `Dockerfile`，如果未明确指定，Docker 会在上下文中查找名为 “Dockerfile” 的文件。\n\n为了更好地理解上下文，我在一个新目录中创建了一个简单的\
  \ `Dockerfile`，如清单 14-1 所示。它以 `alpine` 镜像开始，这是一个在容器中流行的极简 Linux 发行版。`Dockerfile`\
  \ 运行一个 `COPY` 指令。第一个参数，星号通配符，将所有文件从构建上下文（本地目录）复制到目标位置，即容器的根目录（用斜杠表示）。\n\n```dockerfile\n\
  FROM alpine\nCOPY * /\nCMD ls -l /\n```\n\n清单 14-1\n用于演示上下文的简单 `Dockerfile`\n\n\
  最后的 `CMD` 指令在执行镜像时运行，并列出容器根目录的内容。清单 14-2 包含了运行上述简单命令所产生的输出。\n\n```console\n> docker\
  \ build .\nSending build context to Docker daemon  2.048kB\nStep 1/3 : FROM alpine\n\
  latest: Pulling from library/alpine\n213ec9aee27d: Pull complete\nDigest: sha256:bc41182d7ef5ffc53a40b044e725193bc10142a1243f395ee852a8d9730fc2ad\n\
  Status: Downloaded newer image for alpine:latest\n---> 9c6f07244728\nStep 2/3 :\
  \ COPY * /\n---> 1d5ae09bcac7\nStep 3/3 : CMD ls -l /\n---> Running in 7aab4d9ea957\n\
  Removing intermediate container 7aab4d9ea957\n---> 8cf63acc1f17\nSuccessfully built\
  \ 8cf63acc1f17\n```\n\n清单 14-2\n为清单 14-1 所示的 `Dockerfile` 运行 `docker build` 时生成的输出\n\
  \n来看一下输出：\n\n*   “Sending build context to Docker daemon”，读取了上下文（本地目录）中的所有文件并将它们发送到\
  \ Docker 守护进程。只有在这之后，它才开始读取 `Dockerfile` 并执行工作。\n*   `Dockerfile` 的第一步指示 Docker\
  \ 拉取 `alpine` 镜像。它将其添加到一个新创建的层 `9c6f07244728`。（每层都以三个破折号和一个右尖括号 `--->` 为前缀。）\n*\
  \   第二步将文件复制到另一个新层 `1d5ae09bcac7`。\n*   第三步在一个中间容器 `7aab4d9ea957` 中运行 `ls -l /`\
  \ 命令。\n*   移除中间容器后，Docker 创建了最后一层 `8cf63acc1f17`。\n\n运行 `docker images` 报告新创建的镜像以及被\
  \ `FROM` 指令拉取的 `alpine` 镜像：\n\n```console\n> docker images\nREPOSITORY        TAG\
  \         IMAGE ID       CREATED          SIZE\n                  8cf63acc1f17 \
  \  21 seconds ago   5.54MB\nalpine            latest      9c6f07244728   2 weeks\
  \ ago      5.54MB\noracle/database   19.3.0-ee   1b588736c8c1   2 months ago   \
  \  6.67GB\n```\n\n新容器的镜像 ID 与镜像列表中显示的一致。注意该镜像没有仓库或标签。管理或报告镜像信息、或将镜像作为容器运行的命令，必须使用其\
  \ ID（暂时）。让我们将镜像 ID 传递给 `docker history` 命令以查看镜像的各层：\n\n```console\n> docker history\
  \ 8cf63acc1f17\nIMAGE          CREATED         CREATED BY                      \
  \          SIZE   COMMENT\n8cf63acc1f17   2 minutes ago   /bin/sh -c #(nop)  CMD\
  \ [\"/bin/sh\" \"-c\" \"ls -...   0B\n1d5ae09bcac7   2 minutes ago   /bin/sh -c\
  \ #(nop) COPY file:a45abb589c97bd2f...   34B\n9c6f07244728   2 weeks ago     /bin/sh\
  \ -c #(nop)  CMD [\"/bin/sh\"]              0B\n      2 weeks ago     /bin/sh -c\
  \ #(nop) ADD file:2a949686d9886ac7c...   5.54MB\n```\n\n历史记录输出从最新的顶部到最旧的底部读取。注意各层的\
  \ ID 值与 `docker build` 输出中的对应。其中一层 `1d5ae09bcac7` 的大小为 34 字节，与本目录中 `Dockerfile`\
  \ 的大小相同：\n\n```console\n> ls -l\ntotal 8\n-rw-r--r--   1 seanscott  staff    34\
  \ Aug 25 10:57 Dockerfile\n```\n\n这一层包含一个文件，即通过 `COPY` 命令添加到“基础”alpine 镜像的 `Dockerfile`！\n\
  \n最后一层 `8cf63acc1f17` 是零字节。这是一个元数据层。它不属于镜像，至少容器内的用户无法以某种方式看到它。它在通过 `docker run`\
  \ 调用镜像时由 Docker 使用。我们可以通过运行该镜像看到这一点：\n\n```console\n> docker run 8cf63acc1f17\n\
  total 60\n-rw-r--r--    1 root     root            34 Aug 25 16:57 Dockerfile\n\
  drwxr-xr-x    2 root     root          4096 Aug  9 08:47 bin\ndrwxr-xr-x    5 root\
  \     root           360 Aug 25 17:54 dev\ndrwxr-xr-x    1 root     root       \
  \   4096 Aug 25 17:54 etc\ndrwxr-xr-x    2 root     root          4096 Aug  9 08:47\
  \ home\ndrwxr-xr-x    7 root     root          4096 Aug  9 08:47 lib\ndrwxr-xr-x\
  \    5 root     root          4096 Aug  9 08:47 media\ndrwxr-xr-x    2 root    \
  \ root          4096 Aug  9 08:47 mnt\ndrwxr-xr-x    2 root     root          4096\
  \ Aug  9 08:47 opt\ndr-xr-xr-x  332 root     root             0 Aug 25 17:54 proc\n\
  drwx------    2 root     root          4096 Aug  9 08:47 root\ndrwxr-xr-x    2 root\
  \     root          4096 Aug  9 08:47 run\ndrwxr-xr-x    2 root     root       \
  \   4096 Aug  9 08:47 sbin\ndrwxr-xr-x    2 root     root          4096 Aug  9 08:47\
  \ srv\ndr-xr-xr-x   13 root     root             0 Aug 25 17:54 sys\ndrwxrwxrwt\
  \    2 root     root          4096 Aug  9 08:47 tmp\ndrwxr-xr-x    7 root     root\
  \          4096 Aug  9 08:47 usr\ndrwxr-xr-x   12 root     root          4096 Aug\
  \  9 08:47 var\n>\n```\n\n记住，容器执行的功能或服务有点像可执行程序。`CMD` 指令定义了要执行的操作。容器中的其他所有内容——库、包、二进制文件和脚本——只是为了支持其运行时或可执行功能。这解释了为什么与虚拟机或物理主机上的文件系统和操作系统相比，镜像的占用空间通常有限。镜像\
  \ `CMD` 指令中固定的操作限制了容器的范围。在这个例子中，`CMD` 运行了一个命令 `ls -l /`。该任务完成后，它退出并将控制权交还给主机命令提示符。\n\
  \n清单 14-2 包含了这些行：\n\n```text\nStep 3/3 : CMD ls -l /\n---> Running in 7aab4d9ea957\n\
  Removing intermediate container 7aab4d9ea957\n```\n\nDocker 并没有读取或保存此操作的结果。“中间容器”是\
  \ Docker 检查命令语法的地方。\n\n关于层的一个提醒：在这个容器中运行 `ls -l /` 并不是以通常的方式显示容器的文件系统。相反，它显示的是两个层的合并内容：基础\
  \ `alpine` 镜像（层 `9c6f07244728`）中的文件系统，以及由 `COPY` 命令创建的层（`1d5ae09bcac7`）中的文件系统。将这些分离成层允许\
  \ Docker 在多个容器中重用相同的 `alpine` 层，而无需使用额外空间！\n\n\n\n"
- "# Docker 构建上下文详解\n\n### 构建路径与上下文\n\nDocker 构建示例中的构建上下文是运行构建的当前目录。然而，构建上下文不一定非要是*当前*目录。Docker\
  \ 期望的是一个路径。^(⁷⁸) 用目录路径替代点号（`.`）可以控制构建的运行位置以及哪些文件被包含在上下文中。在之前的命令中，点号代表构建上下文的路径，可以更通用地写作：\n\
  \n```\ndocker build <PATH>\n```\n\nDocker 会在 `<PATH>` 中寻找一个名为 `Dockerfile` 的文件，并将\
  \ `<PATH>` 处及以下的所有内容作为其上下文。为了说明其工作原理，我在目录树中向上导航一级，并重新运行 `docker build`，这次将相对目录路径\
  \ `./demo` 作为构建上下文传递：\n\n```\n> cd ..\n> docker build ./demo\nSending build context\
  \ to Docker daemon  2.048kB\nStep 1/3 : FROM alpine\n---> 9c6f07244728\nStep 2/3\
  \ : COPY * /\n---> Using cache\n---> 1d5ae09bcac7\nStep 3/3 : CMD ls -l /\n--->\
  \ Using cache\n---> 8cf63acc1f17\nSuccessfully built 8cf63acc1f17\n```\n\n注意到这个结果有什么有趣之处吗？它没有拉取\
  \ `alpine` 镜像，跳过了中间容器，但报告的层 ID 却与原始构建完全相同！这些“使用缓存”的消息表明，在将其上下文传递给守护进程后，Docker 识别出无需进行任何更改，并且这些层已经存在于其构建缓存中！\n\
  \nDockerfile 中的 `COPY` 和 `ADD` 操作不是直接从主机读取文件或目录。它们是从构建过程开始时构建的*上下文*中读取它们的。这是一个微妙但至关重要的区别。\n\
  \n#### 选择 Dockerfile\n\n我们已经看到，Docker 会在其上下文（即运行构建的目录）中寻找一个名为 `Dockerfile` 的文件。我们可以使用\
  \ `-f` 标志指定一个位于构建上下文之外的 Dockerfile 来覆盖此行为：\n\n```\ndocker build -f <DOCKERFILE_PATH>\
  \ <CONTEXT_PATH>\n```\n\n`docker build` 默认期望使用名为 `Dockerfile` 的文件，但并不限于此。`Dockerfile`\
  \ 是默认值，但 Docker 也接受 `-f` 选项中不同的文件名。\n\n我将基于前面的示例进行构建，将 Dockerfile 移出 `demo` 目录，并将我的\
  \ `/etc/passwd` 文件复制到 `demo` 目录中。这为 Docker 提供了需要消耗到其上下文中并复制到镜像里的内容：\n\n```\n> mv\
  \ demo/Dockerfile .\n> cp /etc/passwd ./demo\n> ls -l ./demo\n-rw-r--r--  1 seanscott\
  \  staff  7868 Aug 25 13:30 passwd\n> ls -l\n-rw-r--r--  1 seanscott  staff    34\
  \ Aug 25 10:57 Dockerfile\ndrwxr-xr-x  3 seanscott  staff    96 Aug 25 13:31 demo\n\
  ```\n\n新的构建目标目录是我当前目录下的 `demo`。Docker 需要构建路径，并且因为 `demo` 目录中没有 `Dockerfile`，我的构建命令需要通过\
  \ `-f` 选项指定 `Dockerfile` 的位置：\n\n```\ndocker build -f ./Dockerfile ./demo\n```\n\
  \n注意输出中的一些差异：\n\n```\n> docker build -f ./Dockerfile ./demo\nSending build context\
  \ to Docker daemon  10.27kB\nStep 1/3 : FROM alpine\n---> 9c6f07244728\nStep 2/3\
  \ : COPY * /\n---> 37b005627fc0\nStep 3/3 : CMD ls -l /\n---> Running in 8188378b8894\n\
  Removing intermediate container 8188378b8894\n---> 70b49717401f\nSuccessfully built\
  \ 70b49717401f\n```\n\n首先，由于我添加到 `demo` 目录中的文件，发送到 Docker 守护进程的信息更多了。基础镜像没有改变，Docker\
  \ 报告的镜像 ID 相同，这意味着它重用了缓存内容。然而，其余层都是新的。`demo` 目录的内容不同，这改变了在步骤 2 中复制到镜像的文件。此外，虽然两个镜像中\
  \ `CMD` 指令运行的命令相同，但它们并不共享，因为底层的层是不同的。\n\n运行新镜像会产生相似但不完全相同的输出，这反映了构建上下文的变化。两个镜像（和容器）中来自\
  \ `alpine` 镜像层的文件系统是相同的。向 `demo` 目录添加一个文件，改变了 `COPY` 命令在步骤 2 创建的层中添加的文件：\n\n```\n\
  > docker run 70b49717401f\ntotal 64\ndrwxr-xr-x    2 root     root          4096\
  \ Aug  9 08:47 bin\ndrwxr-xr-x    5 root     root           340 Aug 25 23:16 dev\n\
  drwxr-xr-x    1 root     root          4096 Aug 25 23:16 etc\ndrwxr-xr-x    2 root\
  \     root          4096 Aug  9 08:47 home\ndrwxr-xr-x    7 root     root      \
  \    4096 Aug  9 08:47 lib\ndrwxr-xr-x    5 root     root          4096 Aug  9 08:47\
  \ media\ndrwxr-xr-x    2 root     root          4096 Aug  9 08:47 mnt\ndrwxr-xr-x\
  \    2 root     root          4096 Aug  9 08:47 opt\n-rw-r--r--    1 root     root\
  \          7868 Aug 25 19:30 passwd\ndr-xr-xr-x  345 root     root             0\
  \ Aug 25 23:16 proc\ndrwx------    2 root     root          4096 Aug  9 08:47 root\n\
  drwxr-xr-x    2 root     root          4096 Aug  9 08:47 run\ndrwxr-xr-x    2 root\
  \     root          4096 Aug  9 08:47 sbin\ndrwxr-xr-x    2 root     root      \
  \    4096 Aug  9 08:47 srv\ndr-xr-xr-x   13 root     root             0 Aug 25 23:16\
  \ sys\ndrwxrwxrwt    2 root     root          4096 Aug  9 08:47 tmp\ndrwxr-xr-x\
  \    7 root     root          4096 Aug  9 08:47 usr\ndrwxr-xr-x   12 root     root\
  \          4096 Aug  9 08:47 var\n```\n\n\n\n#### 构建上下文中不允许存在符号链接或快捷方式\n\n在第 4 章中，你已将\
  \ Oracle 数据库安装介质添加到了一个特定于版本的目录中，例如 `$HOME/docker-images/OracleDatabase/SingleInstance/dockerfiles/19.3.0`。当你运行\
  \ `buildContainerImage.sh` 脚本时，Docker 会处理该目录中的文件以构建其上下文。Docker 不会读取相邻目录中的文件。它们在构建路径之外，无论如何对构建也没有用处——Oracle\
  \ 19c 的镜像不需要 21c 的安装介质，反之亦然。资源不共享，将文件整理到不同的目录中是合理的。\n\n当版本完全不同时确实如此，但处理小版本发布时，情况就变得模糊了。19.15\
  \ 和 19.16 发布更新（RU）使用相同的基本资源——安装介质和 OPatch——但补丁本身不同。将它们拆分到带版本号的目录中意味着需要复制部分（而非全部）文件：\n\
  \n```\n19c\n├── 19.15\n│   ├── LINUX.X64_193000_db_home.zip\n|   ├── p6880880_190000_Linux-x86-64.zip\n\
  │   └── patch-for-1915-RU.zip\n└── 19.16\n    ├── LINUX.X64_193000_db_home.zip\n\
  \    ├── p6880880_190000_Linux-x86-64.zip\n    └── patch-for-1916-RU.zip\n```\n\n\
  每个版本发布都会增加更多的重复，占用更多空间，甚至可能导致文件不匹配。在上面的目录结构中，以 `p6880880` 开头的 OPatch 文件名称相同，但这并不能保证它们是同一个文件或最新版本。理想情况下，两个目录都应该使用同一个集中管理的文件。\n\
  \n我们能否向 Docker 的上下文添加一个链接或快捷方式，从而避免在两个地方复制 `LINUX.X64_193000_db_home.zip` 文件？为了测试这一点，我向我们一直在使用的镜像上下文添加了一个链接，并重新运行了相同的构建：\n\
  \n```\n> ln -s /etc/passwd demo/linked_file\n> ls -l ./demo\ntotal 16\nlrwxr-xr-x\
  \  1 seanscott  staff    11 Aug 25 17:28 linked_file -> /etc/passwd\n-rw-r--r--\
  \  1 seanscott  staff  7868 Aug 25 13:30 passwd\n> docker build -f ./Dockerfile\
  \ ./demo\nSending build context to Docker daemon   10.8kB\nStep 1/3 : FROM alpine\n\
  ---> 9c6f07244728\nStep 2/3 : COPY * /\nCOPY failed: file not found in build context\
  \ or excluded by .dockerignore: stat linked_file: file does not exist\n```\n\n不幸的是，Docker\
  \ 只识别其上下文中的物理文件。由于 `linked_file` 物理上不在 Docker 的构建目录中，它未被添加到上下文。`COPY` 命令理解该文件在目录中存在并尝试复制它，但当它在上下文中找不到时失败了。\n\
  \nDocker 不会跟随指向文件系统中其他位置存储的文件的符号链接^(⁷⁹)，以保持一致性。当上下文（生成镜像所需的介质和脚本）是自包含时，可以保证跨主机的构建产生相同的结果。链接到上下文之外的文件或目录可能会破坏这一保证。在上面的例子中，该文件不仅是唯一的，它在另一台机器上可能位于不同的路径，甚至可能根本不存在！\n\
  \n这并没有解决我们试图解决的问题——减少文件重复。但失败构建中的错误消息提到了一个名为 `.dockerignore` 的东西，事实证明，它可以帮助我们实现这个目标！\n\
  \n#### 忽略文件\n\n在将信息发送给守护进程之前，Docker 会在其上下文目录中查找 `.dockerignore` 文件。`.dockerignore`\
  \ 文件告知构建过程需要排除哪些文件或目录，并防止构建过程向守护进程发送不必要的或可能敏感的内容。被忽略的文件无法用于 `COPY` 或 `ADD` 操作，因为尽管它们可能在文件系统上，但它们不在构建早期阶段发送给\
  \ Docker 引擎的构建上下文中。\n\n`.dockerignore` 文件通过名称或模式匹配文件和目录。许多资源提供了模式匹配的详细信息，为了避免重复这些信息，我将只介绍基本选项：\n\
  \n*   以井号（`#`）开头的行表示注释，会被忽略。\n*   星号（`*`）匹配文件名或目录名中的一个或多个字符。\n*   两个连续的星号（`**`）匹配文件路径中的任意数量的目录。\n\
  *   问号（`?`）匹配单个字符。\n*   感叹号（`!`）创建一个例外。\n\n忽略文件中的路径是相对于*上下文的根目录*进行评估的——即使忽略文件中的路径以斜杠开头，看起来像是引用了绝对路径。一些示例：\n\
  \n```\n# 一条注释\n# 忽略构建上下文根目录中的 Dockerfile：\nDockerfile\n# 忽略名为 test 的目录中的所有文件：\n\
  test/*\n# 忽略以 \"patch\" 开头后跟单个字符的任何目录中的文件：\npatch?/*\n# 忽略以后缀 \".key\" 结尾的任何目录中的文件\n\
  **/*.key\n# 忽略根目录下任意直接子目录中以后缀 \".zip\" 结尾的文件：\n*/*.zip\n# 覆盖先前对名为 \"LINUX.X64_193000_db_home.zip\"\
  \ 文件的排除：\n!*/LINUX.X64_193000_db_home.zip\n```\n\n请记住，Docker 按顺序读取忽略文件。最后一个条件优先。在以下示例中，第一条规则忽略\
  \ `software` 目录中的所有文件。第二条规则为 `LINUX.X64_193000_db_home.zip` 文件创建了一个例外。第三条规则随后忽略任何以\
  \ `.zip` 结尾的目录中的文件，排除了 `LINUX.X64_193000_db_home.zip`：\n\n```\n# 忽略 \"software\"\
  \ 目录中的文件：\nsoftware/*\n# 包含 \"software/LINUX.X64_193000_db_home.zip\" 文件：\n!software/LINUX.X64_193000_db_home.zip\n\
  # 忽略任何以 \".zip\" 结尾的目录中的文件\n**/*.zip\n```\n\n调换这些规则的顺序，将 `LINUX.X64_193000_db_home.zip`\
  \ 的例外放在最后，则允许其包含在上下文中：\n\n```\n# 忽略 \"software\" 目录中的文件：\nsoftware/*\n# 忽略任何以 \"\
  .zip\" 结尾的目录中的文件\n**/*.zip\n# 包含 \"software/LINUX.X64_193000_db_home.zip\" 文件：\n\
  !software/LINUX.X64_193000_db_home.zip\n```\n\n基于当前或预期目录内容进行过滤，尤其是使用通配符时，不能保证结果。与其基于模式允许文件，不如考虑一种最小权限模型，排除所有内容，并仅对*应该*是构建一部分的特定文件创建例外。此示例中的第一条模式排除了所有内容。后续行为\
  \ `file1` 和 `file2` 添加了例外：\n\n```\n*\n!file1\n!file2\n```\n\n构建目录中的所有其他内容都被省略，对\
  \ `ADD` 或 `COPY` 命令不可用——即使那些使用通配符的命令也不行！\n\n没有单独的选项（类似于为命名 Dockerfile 使用的 `-f` 标志）来指定忽略文件。Docker\
  \ 在与 Dockerfile 本身相同的目录中查找名为 `.dockerignore` 的忽略文件：\n\n```\ndocker build -f Dockerfile_test\
  \ .\n```\n\n\n\n#### 标记镜像\n\n在前面章节中运行的构建命令创建了镜像，但其命名方式有待改进。`docker images` 命令会报告镜像\
  \ ID，但没有一个便于人类理解的名称：\n\n```\n> docker images\nREPOSITORY        TAG         IMAGE\
  \ ID       CREATED          SIZE\n                  8cf63acc1f17   21 seconds ago\
  \   5.54MB\nalpine            latest      9c6f07244728   2 weeks ago      5.54MB\n\
  ```\n\n现在这应该感觉正常了——Docker 似乎不太愿意给事物赋予有用的或有意义的名称——但公平地说，我没有告诉它如何，甚至是否要为镜像命名。幸运的是，我们有补救措施，可以在事后或构建过程中为镜像命名，甚至为一个镜像分配多个名称！\n\
  \n**仓库、镜像名称、标签与标记**\n\n这些术语很容易混淆。镜像名称由一个（可选的）**仓库命名空间**、一个**镜像名称或仓库**，以及一个可选的**标签**组成。如果存在仓库命名空间，它与镜像名称之间用斜杠分隔。如果存在标签，它与镜像名称之间用冒号分隔：\n\
  \n`[<命名空间>/]<镜像名称>[:<标签>]`\n\n以本书通篇使用的 `oracle/database:19.3.0-ee` 镜像为例，`oracle`\
  \ 是命名空间；`database` 是镜像名称；`19.3.0-ee` 是标签，常用于区分同一镜像的不同版本。\n\n`docker images` 的输出将命名空间和镜像名称合并显示在\
  \ `REPOSITORY` 列下。\n\n术语 `image name`（镜像名称）和 `tag`（标签）经常被互换使用，以指代仓库命名空间、镜像名称和标签的组合。\n\
  \n`Repository`（仓库）、`image name`（镜像名称）和 `tag`（标签）是标识镜像 `来源`、`名称` 和 `版本` 的名词。`Tagging`（标记）是\
  \ `命名镜像` 的动作。\n\n#### 为镜像添加标签\n\n让我们使用 `docker tag` 命令为这个镜像命名。`docker tag` 接受两个参数——一个镜像\
  \ ID 或名称，以及一个新的标签。我的镜像（目前）还没有名字。我需要通过它的 ID 来引用它：\n\n```\n> docker tag 8cf63acc1f17\
  \ alpine-demo\n> docker images\nREPOSITORY        TAG         IMAGE ID       CREATED\
  \          SIZE\nalpine-demo       latest      8cf63acc1f17   24 minutes ago   5.54MB\n\
  alpine            latest      9c6f07244728   2 weeks ago      5.54MB\n```\n\n为镜像打上标签后，它会以新名称出现在\
  \ `docker images` 的输出中，列在 `REPOSITORY` 列下，且 `TAG` 为 `latest`。它替换了镜像列表中原来的、未命名的条目。\n\
  \n我可以为这个镜像创建一个额外的标签，这次通过它新的名称 `alpine-demo` 来引用：\n\n```\n> docker tag alpine-demo\
  \ alpine-new\n> docker images\nREPOSITORY        TAG         IMAGE ID       CREATED\
  \          SIZE\nalpine-new        latest      8cf63acc1f17   26 minutes ago   5.54MB\n\
  alpine-demo       latest      8cf63acc1f17   26 minutes ago   5.54MB\nalpine   \
  \         latest      9c6f07244728   2 weeks ago      5.54MB\n```\n\n它为同一个镜像 ID\
  \ 值添加了第二个条目。Docker 并没有创建一个新镜像。标签是别名，使人类能够更容易地识别、分类和操作镜像。\n\n为这个镜像指定一个标识其**用途或版本**的\
  \ `tag`（标签），可能比给一个新名称更合适。我将再次为其打标签，这次使用 `alpine` 名称，标签为 `demo`：\n\n```\n> docker\
  \ tag alpine-demo alpine:demo\n> docker images\nREPOSITORY        TAG         IMAGE\
  \ ID       CREATED          SIZE\nalpine-new        latest      8cf63acc1f17   27\
  \ minutes ago   5.54MB\nalpine            demo        8cf63acc1f17   27 minutes\
  \ ago   5.54MB\nalpine-demo       latest      8cf63acc1f17   27 minutes ago   5.54MB\n\
  alpine            latest      9c6f07244728   2 weeks ago      5.54MB\n```\n\n这相当混乱——同一个镜像有三个别名！让我们使用\
  \ `docker rmi` 来清理重复的镜像 `alpine-demo` 和 `alpine-new`：\n\n```\n> docker rmi alpine-demo\n\
  Untagged: alpine-demo:latest\n> docker rmi alpine-new\nUntagged: alpine-new:latest\n\
  ```\n\n注意 Docker 的响应。它 `取消标记`（Untagged）了镜像，但并未删除它们。`docker images` 显示该镜像只有一个条目，使用\
  \ `alpine:demo` 的名称/标签组合：\n\n```\n> docker images\nREPOSITORY        TAG       \
  \  IMAGE ID       CREATED          SIZE\nalpine            demo        8cf63acc1f17\
  \   29 minutes ago   5.54MB\nalpine            latest      9c6f07244728   2 weeks\
  \ ago      5.54MB\n```\n\n当这个镜像只剩下一个别名时，运行 `docker rmi alpine:demo` 会将其从系统中完全删除：^(⁸⁰)\n\
  \n```\n> docker rmi alpine:demo\nUntagged: alpine:demo\nDeleted: sha256:8cf63acc1f17c28d78ce7efac26f19f428847e895db81182ec1063e41b4246b4\n\
  Deleted: sha256:1d5ae09bcac7b79cb3dea2209118be4199b2cc91050968aca0037daea0a4728c\n\
  ```\n\n#### 在构建时标记镜像\n\n`tag` 命令为命名现有镜像和添加别名提供了一种方式。在构建过程本身中分配名称和标签要容易得多。`docker\
  \ build` 的 `-t` 选项正是做这个的：\n\n```\ndocker build ...\n-t [/][:]\n...\n```\n\n我们在本书通篇使用的镜像中见过这种模式：\n\
  \n```\noracle/database:19.3.0-ee\noraclelinux:7-slim\n```\n\n以及在 `docker images`\
  \ 命令的输出中：\n\n```\nREPOSITORY       TAG         IMAGE ID       CREATED        SIZE\n\
  oracle/database  19.3.0-ee   1b588736c8c1   2 months ago   6.67GB\noraclelinux \
  \     7-slim      9ec0d85eaed0   4 months ago   133MB\n```\n\n**解读镜像名称**\n\n*  \
  \ 最后一个斜杠^(⁸¹)之前的部分是仓库命名空间 `oracle`。Oracle Linux 镜像与一个命名空间无关。\n*   镜像名称是 `database`\
  \ 和 `oraclelinux`。\n*   前面带冒号的标签，通常代表版本信息，用于区分原本相似的镜像，例如 `19.3.0-ee` 和 `7-slim`。\n\
  \n我严重依赖标签和一致的镜像命名来组织和理解我的镜像。当你开始构建镜像时，花点时间考虑一下最适合你或你团队的模式！\n\n你可以为一个 `build`（构建）分配多个标签：\n\
  \n```\ndocker build ...\n-t oracledb:19.15-ee \\\n-t my_namespace/oracledb:19.15-ee\
  \ \\\n...\n```\n\n这在具有本地和远程仓库的环境中节省了时间。此示例中的镜像有两个别名：`oracledb:19.15-ee` 和 `my_namespace/oracledb:19.15-ee`。第二个别名引用了一个远程仓库，一旦构建完成，成品镜像就已经被标记好，可以上传或\
  \ `push`（推送到）目标位置。第 16 章将详细讨论这一点。\n\n### 参数\n\n第 12 章中关于参数的部分介绍了它们在 Dockerfile 中的实现。提醒一下，参数用于初始化变量并（可选地）设置其默认值：\n\
  \n```\nARG ORACLE_HOME=/opt/oracle/product/19c/dbhome_1\nENV ORACLE_HOME=$ORACLE_HOME\n\
  ```\n\n在构建过程中，使用 `--build-arg` 选项将自定义值传递给参数：\n\n```\ndocker build ...\n--build-arg\
  \ ORACLE_HOME=/u01/oracle/product/19.3.0/dbhome_1\n...\n```\n\n构建过程会覆盖 Dockerfile\
  \ 中 `ORACLE_HOME` 参数的值，进而将环境值分配到镜像中。\n\n在第 12 章中，你了解到 `ARG` 是唯一可以出现在 `FROM` 语句之前的\
  \ Dockerfile 命令。该参数仅对紧随其后的 `FROM` 语句可用，并允许操作构建所使用的基础镜像：\n\n```\nARG IMAGE_NAME=oraclelinux:7-slim\n\
  FROM $IMAGE_NAME\n...\n```\n\n使用 `--build-arg` 会改变上述示例中 Dockerfile 所使用的基础镜像：\n\n\
  ```\ndocker build ...\n--build-arg IMAGE_NAME=oraclelinux:7\n...\n```\n\n用多个 `--build-arg`\
  \ 来定义多个参数，每个参数对应一个。\n\n\n\n### 清理工作\n\nDockerfile 中的每一步都是基于前一步生成的镜像或 `FROM` 语句中引用的镜像来运行一个容器。这是合理的——毕竟镜像是不可变的——而\
  \ Dockerfile 中的命令本质上是运行一系列镜像作为容器、进行一些更改并保存结果的脚本。回顾清单 14-2 时，这一点清晰可见。注意，构建过程在完成镜像之前创建了两个中间容器。\n\
  \n有句俗话：“想找到做某事的最简单方法，就去问一个懒人。”从这个意义上说，Docker *极其*“懒惰”，它会尽其所能地限制自己需要做的工作！在构建过程中，这意味着缓存层并保存中间容器，以防它*可能*以后需要它们！\n\
  \n当我刚开始探索 Docker 和构建镜像时，并没有意识到这一点。作为一个喜欢动手实验的学习者，我进行了大量的试错，对 Dockerfile 进行微小的更改并检查结果。每一次更改、每一次实验、以及沿途的每一个错误，都会产生新的中间容器，而\
  \ Docker 会贴心地将它们缓存起来，以防我以后需要。直到有一天，Docker 突然……停止了。我的构建缓存增长到了几个 GB，占满了 Docker 虚拟机中的所有空间！幸运的是，有应对这种情况的补救性和预防性解决方案。\n\
  \n#### 清理\n\n补救性的解决方法是清除 Docker 的构建缓存。我们可以使用 `docker system df` 查看构建缓存占用的空间，以及其他对象（如镜像、容器和卷）的使用情况：\n\
  \n```\n> docker system df\nTYPE            TOTAL     ACTIVE    SIZE      RECLAIMABLE\n\
  Images          12        10        21.89GB   11.13MB (0%)\nContainers      12 \
  \       7         24.87GB   434.1MB (1%)\nLocal Volumes   6         4         853.6MB\
  \   1.53kB (0%)\nBuild Cache     19        0         48.38MB   48.38MB\n```\n\n\
  你会注意到我构建缓存中有 19 个对象，占用了略多于 48MB 的空间。Docker 将所有这些空间都标识为可回收的。使用 `docker builder prune`\
  \ 清理这些空间：\n\n```\n> docker builder prune\nWARNING! This will remove all dangling\
  \ build cache. Are you sure you want to continue? [y/N]\n```\n\nDocker 要求确认，并报告从系统中删除的缓存：\n\
  \n```\n> docker builder prune\nWARNING! This will remove all dangling build cache.\
  \ Are you sure you want to continue? [y/N] y\nDeleted build cache objects:\nh5x3svswlc8ju3p6kpfp3kfxq\n\
  zq3ddt7nkeurbb7dw9wh87yfv\nvhxgyd4wznuu43d8petp2byq0\n7xesrmsi56gium8iir4e3wdey\n\
  krhuiazatl6wovkvljxnicdyr\ns6p7a4olr4ioaj8rjo0klbehr\nvxc9v14ogunwqi2see58xmj35\n\
  fm2kxjek8n93c91sczhp4ld3z\nwodldqvqsfgtd40s8ulo3nkb2\nb1ua49rpznnz4t1wk4c16zzqr\n\
  ssz3lpns9rxxp2agb2011kvwl\nTotal reclaimed space: 48.38MB\n```\n\n完成后，重新运行 `docker\
  \ system df` 并验证空间是否已回收：\n\n```\n> docker system df\nTYPE            TOTAL     ACTIVE\
  \    SIZE      RECLAIMABLE\nImages          12        10        21.89GB   11.13MB\
  \ (0%)\nContainers      12        7         24.87GB   434.1MB (1%)\nLocal Volumes\
  \   6         4         853.6MB   1.53kB (0%)\nBuild Cache     8         0     \
  \    0B        0B\n```\n\n另一个命令 `docker system prune` 采取更彻底的方式，它会移除构建缓存、未使用的网络、已停止的容器和悬空镜像：\n\
  \n```\n> docker system prune\nWARNING! This will remove:\n- all stopped containers\n\
  - all networks not used by at least one container\n- all dangling images\n- all\
  \ dangling build cache\nAre you sure you want to continue? [y/N] n\n```\n\n这等同于运行以下四个独立命令：\n\
  \n```\ndocker container prune\ndocker network prune\ndocker image prune\ndocker\
  \ builder prune\n```\n\n请谨慎使用！^(⁸²) 清理 Docker 对象是不可逆的！\n\n#### 缓存管理\n\n如果你宁愿避免“东西不工作”的神秘感和不愉快，可以在构建时采取一点预防措施，使用构建的缓存管理选项\
  \ `--rm`、`--force-rm` 和 `--no-cache` 来移除或完全绕过缓存。\n\n*   `--rm=true` 在构建成功后移除中间容器（即清单\
  \ 14-2 中步骤 1 和 2 创建的那些）。这是默认设置。如果你经常构建具有相同或相似层次结构的镜像，而只有最后几个步骤不同，将其设置为 `false` 可能会提高构建性能。允许\
  \ Docker 保留中间镜像增加了后续相似构建找到匹配层并绕过一些工作的机会。\n*   `--force-rm=true` 无论构建是否成功，都删除中间容器。强制删除（即使是失败的镜像）会限制故障排除的选择（如第\
  \ 15 章所述）。\n*   `--no-cache=true` 阻止 Docker 使用（或创建）缓存。除了节省系统空间外，`--no-cache=true`\
  \ 选项还有一个不太明显的好处——强制 Docker 拉取最新的基础镜像。`--no-cache=true` 选项实际上会导致 Docker 从头开始构建每个镜像。\n\
  \n在构建中加入缓存管理，并结合监控空间消耗的检查，有助于保持系统健康且精简。这些设置对单个构建活动中的缓存应用了细粒度控制。对于测试和故障排除，`--rm=false`\
  \ 可以保留有助于诊断失败的构建产物。`--force-rm=true` 或 `--no-cache=true` 选项适用于不太可能共享内容的独特镜像。而通过\
  \ `--no-cache=true` 完全防止缓存则保证镜像读取资产的最新版本。\n\n`--no-cache=true` 的缺点是基础镜像的更改可能破坏构建的风险。例如，使用不带任何版本或标签的\
  \ `FROM centos`，实际上意味着 `centos:latest`。^(⁸³) CentOS 的“最新”版本是一个移动的目标，随着时间推移从 `centos:6`\
  \ 变为 `centos:7` 再到 `centos:8`，期间还经过了许多小版本。一个在“最新”版本是 CentOS 7 时能工作的镜像，可能因为移动到 CentOS\
  \ 8 而损坏——这说明了为什么始终为你所依赖的资产指定具体版本是个好主意！^(⁸⁴)\n\n注意\n\nOracle 提供的 `buildContainerImage.sh`\
  \ 脚本使用硬编码的 `--force-rm=true` 和 `--no-cache=true` 值来管理缓存。\n\n### BuildKit\n\n*BuildKit*\
  \ 是一个高级镜像构建器，它为现有的构建活动增加了安全特性、更好的缓存效率和速度。自 Docker 18.06 版本以来，它一直是 Docker 的一部分。它支持在\
  \ Windows、Mac 和 Linux 系统上构建基于 Linux 的容器镜像。\n\nBuildKit 是对旧版构建引擎的改进，并且是较新 Docker\
  \ 版本中的默认构建器。要验证它是否是 Docker Desktop 环境中的默认设置（如图 14-1 所示），可以导航到设置窗格并确认存在以下内容：\n\n\
  ![](img/514143_1_En_14_Fig1_HTML.jpg)\n\nDocker Desktop 的快照，显示 Docker Engine、设置和特性：花括号内为\
  \ `buildkit : true`，并有标签。\n\n图 14-1\n\n在 Docker Desktop 中，导航到设置窗格，在 Docker Engine\
  \ 部分下查找 BuildKit 特性条目\n\n```\n\"features\": { \"buildkit\": true }\n```\n\n如果 BuildKit\
  \ 未启用而你希望尝试一下，可以在任何构建命令的开头添加 BuildKit 标志 `DOCKER_BUILDKIT=1`：\n\n```\nDOCKER_BUILDKIT=1\
  \ docker build ...\n```\n\n注意，在这个例子中，环境设置和 `docker build` 命令本身之间没有任何内容，此语法仅为当前构建启用\
  \ BuildKit。你也可以在环境中导出该值：\n\n```\nexport DOCKER_BUILDKIT=1\n```\n\n或者，通过将 `DOCKER_BUILDKIT`\
  \ 变量设置为零来禁用 BuildKit。\n\n\n#### 进度\n\nBuildKit 与传统引擎之间最显著的差异在于输出格式。如清单 14-3 所示，传统引擎的默认输出是一个连续的活动日志。\n\
  \n```\nBuilding image 'oracle/database:19.3.0-ee' ...\nSending build context to\
  \ Docker daemon   3.06GB\nStep 1/24 : FROM oraclelinux:7-slim as base\n---> 03c22334cf5a\n\
  Step 2/24 : LABEL \"provider\"=\"Oracle\"                                     \"\
  issues\"=\"https://github.com/oracle/docker-images/issues\"               \"volume.data\"\
  =\"/opt/oracle/oradata\"                                     \"volume.setup.location1\"\
  =\"/opt/oracle/scripts/setup\"                    \"volume.setup.location2\"=\"\
  /docker-entrypoint-initdb.d/setup\"            \"volume.startup.location1\"=\"/opt/oracle/scripts/startup\"\
  \                \"volume.startup.location2\"=\"/docker-entrypoint-initdb.d/startup\"\
  \        \"port.listener\"=\"1521\"                                            \
  \      \"port.oemexpress\"=\"5500\"\n---> Running in 82a69d6a2ffc\nRemoving intermediate\
  \ container 82a69d6a2ffc\n---> d3e64e2a7cad\nListing 14-3\n传统引擎在命令行生成一个连续、冗长的输出流\n\
  ```\n\n如清单 14-4 所示，BuildKit 的输出则更为紧凑。\n\n```\nBuilding image 'oracle/database:19.3.0-ee'\
  \ ...\n[+] Building 63.7s (7/14)\n=> [internal] load build definition from Dockerfile\
  \                    2.5s\n=> => transferring dockerfile: 5.11kB               \
  \                   0.2s\n=> [internal] load .dockerignore                     \
  \                  4.0s\n=> => transferring context: 2B                        \
  \                 0.1s\n=> [internal] load metadata for docker.io/library/oraclelinux:7-slim\
  \   0.0s\n=> CACHED [base 1/4] FROM docker.io/library/oraclelinux:7-slim       \
  \  0.0s\n=> [internal] load build context                                      13.5s\n\
  => => transferring context: 3.06GB                                    11.2s\n=>\
  \ [base 2/4] COPY setupLinuxEnv.sh checkSpace.sh /opt/install/       29.1s\n清单 14-4\n\
  BuildKit 在构建过程中产生更紧凑的输出\n```\n\n`docker build` 的 `--progress` 选项控制着输出格式。设置 `--progress=plain`\
  \ 可以生成如清单 14-3 所示的输出，而设置 `--progress=tty` 则可以得到类似清单 14-4 的结果。\n\n我更喜欢 BuildKit 的\
  \ TTY 风格输出，原因有几个。首先，Oracle 数据库的构建过程很长，使用 `--progress=plain` 会向终端发送数千行内容。但它不仅仅是简洁。如清单\
  \ 14-5 所示，TTY 方法的进度报告更加细粒度和信息丰富。\n\n```\nBuilding image 'oracle/database:19.3.0-ee'\
  \ ...\n[+] Building 1045.0s (15/15) FINISHED\n=> [internal] load build definition\
  \ from Dockerfile     2.5s\n=> => transferring dockerfile: 5.11kB              \
  \     0.2s\n=> [internal] load .dockerignore                        4.0s\n=> =>\
  \ transferring context: 2B                          0.1s\n=> [internal] load metadata\
  \ for docker.io/library/or    0.0s\n=> CACHED [base 1/4] FROM docker.io/library/oracleli\
  \    0.0s\n=> [internal] load build context                       13.5s\n=> => transferring\
  \ context: 3.06GB                     11.2s\n=> [base 2/4] COPY setupLinuxEnv.sh\
  \ checkSpace.sh /o   29.1s\n=> [base 3/4] COPY runOracle.sh startDB.sh createDB.\
  \    4.2s\n=> [base 4/4] RUN echo \"INSTALL_DIR = /opt/install\"   393.8s\n=> [builder\
  \ 1/2] COPY --chown=oracle:dba LINUX.X64_1   43.8s\n=> [builder 2/2] RUN chmod ug+x\
  \ /opt/install/*.sh &&  329.0s\n=> [stage-2 1/4] COPY --chown=oracle:dba --from=buil\
  \  157.2s\n=> [stage-2 2/4] RUN /opt/oracle/oraInventory/orains    9.3s\n=> [stage-2\
  \ 3/4] WORKDIR /home/oracle                   4.4s\n=> [stage-2 4/4] RUN echo 'ORACLE_SID=${ORACLE_SID:-\
  \    2.9s\n=> exporting to image                                  28.0s\n=> => exporting\
  \ layers                                 27.9s\n=> => writing image sha256:b0be5db0705d826560d064522\
  \    0.0s\n=> => naming to docker.io/oracle/database:19.3.0-ee     0.0s\n清单 14-5\n\
  使用 BuildKit 构建 Oracle Database 19c 镜像的完整输出\n```\n\n结果中有几点值得注意：\n\n*   第二行显示了耗时、当前步骤及其状态。\n\
  *   BuildKit 以不同的方式计算 Dockerfile 中的步骤，并按阶段进行分解。清单 14-3 中的纯文本输出显示总步骤数为 24。而 TTY 输出则分别在\
  \ `base`、`builder` 和 `stage-2` 阶段内报告进度。步骤运行时，右侧的计时会持续更新以显示进度。完成后，它会显示该操作的耗时。\n*\
  \   当步骤处于活动状态时，TTY 输出会在屏幕底部的窗口区域滚动显示活动内容。\n\n阶段和步骤的计时与标签清楚地显示了构建过程在哪些地方花费了时间。这有点像\
  \ Docker 构建的 **AWR 报告**！如果我想加快这个构建速度，我会查看 `base` 阶段的第 4 步、`builder` 阶段的第 2 步，以及可能\
  \ `stage-2` 的第 1 步。^(⁸⁵)\n\n#### 忽略文件\n\n我们之前讨论过分离上下文，探索了一种用于构建相似镜像的目录结构：\n\n```\n\
  19c\n├── 19.15\n│   ├── Dockerfile\n│   ├── LINUX.X64_193000_db_home.zip\n│   ├──\
  \ p6880880_190000_Linux-x86-64.zip\n│   └── patch-for-1915-RU.zip\n└── 19.16\n \
  \   ├── Dockerfile\n    ├── LINUX.X64_193000_db_home.zip\n    ├── p6880880_190000_Linux-x86-64.zip\n\
  \    └── patch-for-1916-RU.zip\n```\n\n每个子目录中的前两个文件是相同的。Docker 不允许在构建上下文中使用链接或别名，除了将所有文件放在一个目录下之外，似乎没有好的办法来避免文件重复：\n\
  \n```\n19c\n├── Dockerfile\n├── LINUX.X64_193000_db_home.zip\n├── p6880880_190000_Linux-x86-64.zip\n\
  ├── patch-for-1915-RU.zip\n└── patch-for-1916-RU.zip\n```\n\n现在我们有了软件介质和 OPatch\
  \ 文件的单一副本，但不知道 `Dockerfile` 属于哪个版本！幸运的是，你之前已经了解到，我们可以使用 `-f` 选项指定自定义的 Dockerfile，这意味着我们可以为每个数据库版本编写不同的\
  \ `Dockerfile` 配方：\n\n```\n19c\n├── Dockerfile.19.15\n├── Dockerfile.19.16\n├──\
  \ LINUX.X64_193000_db_home.zip\n├── p6880880_190000_Linux-x86-64.zip\n├── patch-for-1915-RU.zip\n\
  └── patch-for-1916-RU.zip\n```\n\n然后，通过调用相应的 `Dockerfile` 来构建任一版本：\n\n```\ndocker\
  \ build -f Dockerfile.19.15 .\ndocker build -f Dockerfile.19.16 .\n```\n\n这消除了重复的文件，但现在两个补丁文件都在上下文中。当构建一个使用\
  \ 19.15 版本补丁的数据库时，`docker build` 会同时读取 19.15 和 19.16 的补丁。如果只有几个小补丁，这可能无关紧要，但实际上，我们更可能遇到的是\
  \ Oracle 每季度更新时添加的补丁数量不断增加。\n\n一个忽略文件可以解决这个问题，它告诉构建过程忽略除所需补丁之外的所有文件：\n\n```\n# 忽略所有文件：\n\
  *\n# 为 LINUX.X64_193000_db_home.zip 添加例外：\n!LINUX.X64_193000_db_home.zip\n# 为 p6880880_190000_Linux-x86-64.zip\
  \ 添加例外：\n!p6880880_190000_Linux-x86-64.zip\n# 为 19.15 的补丁添加例外：\n!patch-for-1915-RU.zip\n\
  ```\n\n这个忽略文件将 Docker 的上下文限制在用于构建 19.15 版本数据库的三个文件。然而，它破坏了 19.16 版本的构建！`docker build`\
  \ 没有引用自定义忽略文件的功能，只认默认的 `.dockerignore`。\n\n**BuildKit** 解决了这个问题。它没有引入选择忽略文件的开关，而是增加了对自定义忽略文件的支持，其名称源自自定义的\
  \ Dockerfile。\n\n通常，构建会在与 `Dockerfile` 相同的目录中查找名为 `.dockerignore` 的文件。当启用 **BuildKit**\
  \ 功能时，它首先查找与 `Dockerfile` 同名、但以 “`.dockerignore`” 为后缀的忽略文件。如果找不到自定义忽略文件，它接下来会查找默认名称的文件。\n\
  \n现在，每个 `Dockerfile` 版本都可以有自己的忽略文件：\n\n```\n19c\n├── Dockerfile.19.15\n├── Dockerfile.19.15.dockerignore\n\
  ├── Dockerfile.19.16\n├── Dockerfile.19.16.dockerignore\n├── LINUX.X64_193000_db_home.zip\n\
  ├── p6880880_190000_Linux-x86-64.zip\n├── patch-for-1915-RU.zip\n└── patch-for-1916-RU.zip\n\
  ```\n\n与特定版本 Dockerfile 绑定的自定义忽略文件，解决了因将重复或公共文件合并到单一目录而产生的构建上下文问题！\n\n#### BuildKit\
  \ 语法\n\n某些 **BuildKit** 功能必须在 `Dockerfile` 顶部作为注释启用，以标识前端构建器的版本。例如：\n\n```\n# syntax=docker/dockerfile:1.4\n\
  ```\n\n语法指令可以启用新的构建功能和错误修复，而无需更新 Docker 守护进程，并允许用户测试实验性功能。这些指令通常启用高级组件。如果未启用 **BuildKit**，注释后的语法指令将被忽略。\n\
  \n### 总结\n\n镜像及其包含的自动化流程，起初可能看起来神秘甚至神奇。但揭开帷幕后，显然其中并无异常或特别之处，只是 shell 脚本和普通的 Linux\
  \ 命令！\n\n凭借你对 Docker 构建语法的新理解，你可以构建镜像并为其命名。你已经看到了镜像中构建参数与容器中环境变量的相似之处，并学习了如何通过使用构建参数动态添加功能和灵活性来扩展\
  \ Dockerfile。\n\n我们讨论了用于控制构建缓存的特性，以及用于查看和管理构建过程中遗留产物的工具。随着容器使用的增长，我保证我们介绍的清理命令将证明它们的价值！\n\
  \n我在构建数据库镜像时遇到的一个挑战是管理源文件——每个版本所需的数据库安装介质和补丁。通过将文件集中存放在一个专用的清单目录中，可以更容易地防止重复和跟踪文件版本。通过将所有内容压缩到一个位置来节省空间是有代价的，每个文件都对潜在的构建上下文有贡献。采用命名的\
  \ Dockerfile，并结合通过 **BuildKit** 启用的自定义忽略文件，避免了在上下文和控制之间做出任何牺牲。\n\n有了这些知识，构建镜像应该不再那么令人生畏，我希望你会考虑拼凑几个自己的镜像！像任何事情一样，这有一个学习曲线，但别让它阻止你！在下一章中，我将分享一些我发现的、在处理镜像和容器时很有帮助的故障排除和调试技巧，虽然你肯定会遇到一些波折！\n\
  \n脚注 1 2 3 4 5 6 7 8 9\n\n## 15. 调试与故障排除\n\n“新”和“不同”常常令人望而生畏。我们被迫为熟悉或舒适的任务学习或发明新方法，甚至可能改变我们的认知和理解。久经考验的方法是稳定的，甚至是安全的。\n\
  \n然而，我们所做的一切，尤其是在 IT 领域，都曾经是新颖和不同的。我从 Oracle 7 开始，那远在 RMAN、真正应用集群或数据卫士出现之前。云计算？还不成形。Exadata\
  \ 仍是一个梦想。如今，我在日常的 Oracle 工作中视它们为理所当然，但我必须在某个时候学习掌握每一项技术。\n\nDocker 也不例外。当我开始使用容器时，我并未完全理解镜像与容器之间的关系，也没有意识到构建是一系列“在容器中运行镜像、执行操作、将结果保存为镜像、重复”的操作。理解了这一点，就更容易看清在何处以及如何对流程进行故障排除。\n\
  \n我最近读了一位新开发者的文章，他说工作中第二糟糕的部分是不明白代码为什么不工作。（最糟糕的是？不明白为什么他们的代码*能*工作！）本章讨论的方法和技巧将帮助你驾驭容器这个新颖而不同的世界！我将介绍从失败的镜像和容器中提取信息的方法，这些信息有助于理解发生了什么、为什么发生以及如何修复！\n\
  \n这些方法本身大多并不新——从脚本中回显变量的做法至少可以追溯到几十年前。但这些方法在容器中的应用和工作方式并非总是显而易见或直观的。\n\n### 查看与操作输出\n\
  \n如果您使用 `buildContainerImage.sh` 脚本构建过 Oracle 数据库，您可能已经看到过类似清单 15-1 和 15-2 中显示的输出信息。\n\
  \n```\nLaunching Oracle Database Setup Wizard...\n[WARNING] [INS-32055] The Central\
  \ Inventory is located in the Oracle base.\nACTION: Oracle recommends placing this\
  \ Central Inventory in a location outside the Oracle base directory.\n[WARNING]\
  \ [INS-13014] Target environment does not meet some optional requirements.\nCAUSE:\
  \ Some of the optional prerequisites are not met. See logs for details. installActions2022-09-24_10-13-19PM.log\n\
  ACTION: Identify the list of failed prerequisite checks from the log: installActions2022-09-24_10-13-19PM.log.\
  \ Then either from the log file or from installation manual find the appropriate\
  \ configuration to meet the prerequisites and fix it manually.\nThe response file\
  \ for this session can be found at:\n/opt/oracle/product/19c/dbhome_1/install/response/db_2022-09-24_10-13-19PM.rsp\n\
  You can find the log of this install session at:\n/tmp/InstallActions2022-09-24_10-13-19PM/installActions2022-09-24_10-13-19PM.log\n\
  As a root user, execute the following script(s):\n1\\. /opt/oracle/oraInventory/orainstRoot.sh\n\
  2\\. /opt/oracle/product/19c/dbhome_1/root.sh\nExecute /opt/oracle/oraInventory/orainstRoot.sh\
  \ on the following nodes:\n[331db970408a]\nExecute /opt/oracle/product/19c/dbhome_1/root.sh\
  \ on the following nodes:\n[331db970408a]\nRemoving intermediate container 331db970408a\n\
  Listing 15-2\nPart of an image build for an Oracle 19c database, showing part of\
  \ the database software installation step\n```\n\n```\n---> f33a827c1bc8\nStep 6/24\
  \ : ENV PATH=$ORACLE_HOME/bin:$ORACLE_HOME/OPatch/:/usr/sbin:$PATH     LD_LIBRARY_PATH=$ORACLE_HOME/lib:/usr/lib\
  \     CLASSPATH=$ORACLE_HOME/jlib:$ORACLE_HOME/rdbms/jlib\n---> Running in d64a3700b791\n\
  Removing intermediate container d64a3700b791\n---> bb272db209e2\nStep 7/24 : COPY\
  \ $SETUP_LINUX_FILE $CHECK_SPACE_FILE $INSTALL_DIR/\n---> 18dc49d4a53b\nStep 8/24\
  \ : COPY $RUN_FILE $START_FILE $CREATE_DB_FILE $CREATE_OBSERVER_FILE $CONFIG_RSP\
  \ $PWD_FILE $CHECK_DB_FILE $USER_SCRIPTS_FILE $RELINK_BINARY_FILE $CONFIG_TCPS_FILE\
  \ $ORACLE_BASE/\n---> 183467ad6373\nStep 9/24 : RUN chmod ug+x $INSTALL_DIR/*.sh\
  \ &&     sync &&     $INSTALL_DIR/$CHECK_SPACE_FILE &&     $INSTALL_DIR/$SETUP_LINUX_FILE\
  \ &&     rm -rf $INSTALL_DIR\n---> Running in 5367f8d86861\nListing 15-1\nA portion\
  \ of the output generated while building an Oracle database image. Note the ID values\
  \ identified with “--->,” the step tracking, and the list of commands executed in\
  \ each step\n```\n\n构建过程中的这份 `进度输出` 应该是查找故障原因线索的首选之地。这份输出并无特殊之处，与您手动执行命令所看到的输出别无二致。这使得我们可以运用与“常规”系统中类似的技巧。\n\
  \n如果日志输出没有显示任何明显问题，下一步就是添加输出，以报告诊断情况所需的信息和详细内容。\n\n#### 回显信息\n\n清单 15-1 中展示的第 9\
  \ 步运行了一系列命令：\n\n```\nRUN chmod ug+x $INSTALL_DIR/*.sh &&     sync &&     $INSTALL_DIR/$CHECK_SPACE_FILE\
  \ &&     $INSTALL_DIR/$SETUP_LINUX_FILE &&     rm -rf $INSTALL_DIR\n```\n\n这些命令对应于\
  \ Dockerfile 中的一个 `RUN` 代码块：\n\n```\nRUN chmod ug+x $INSTALL_DIR/*.sh && \\\nsync\
  \ && \\\n$INSTALL_DIR/$INSTALL_DB_BINARIES_FILE $DB_EDITION\n```\n\n如果此代码块中的一个或多个变量设置错误，我通过查看输出是无法得知的。所有内容都引用了环境变量。但是，我可以向此代码块添加命令，在构建输出中显示变量设置：\n\
  \n```\nRUN echo \"INSTALL_DIR = $INSTALL_DIR\" && \\\necho \"INSTALL_DB_BINARIES_FILE\
  \ = $INSTALL_DB_BINARIES_FILE\" && \\\necho \"DB_EDITION = $DB_EDITION\" && \\\n\
  chmod ug+x $INSTALL_DIR/*.sh && \\\nsync && \\\n$INSTALL_DIR/$INSTALL_DB_BINARIES_FILE\
  \ $DB_EDITION\n```\n\n当我重新运行构建时，我会看到这些值被打印到构建输出中：\n\n```\nStep 9/24 : RUN echo \"\
  INSTALL_DIR = $INSTALL_DIR\" && echo \"INSTALL_DB_BINARIES_FILE = $INSTALL_DB_BINARIES_FILE\"\
  \ && echo \"DB_EDITION = $DB_EDITION\" && chmod ug+x $INSTALL_DIR/*.sh && sync &&\
  \ $INSTALL_DIR/$CHECK_SPACE_FILE && $INSTALL_DIR/$SETUP_LINUX_FILE && rm -rf $INSTALL_DIR\n\
  ---> Running in e5331bac34fc\nINSTALL_DIR = /opt/install\nINSTALL_DB_BINARIES_FILE\
  \ = installDBBinaries.sh\nDB_EDITION =\n```\n\n请注意，诊断检查的位置可能会影响结果。在此示例中，我是作为 Dockerfile\
  \ 中现有步骤的一部分来回显这些值的。如果我将它们添加到一个单独的 `RUN` 代码块中，无论是在之前还是之后，它们都会在自己的容器中运行。其值可能无法反映在相关步骤中的设置。\n\
  \n回显值不仅限于 Dockerfile。Docker 用来完成每个构建任务的脚本会与进程输出交互，如清单 15-2 所示，同样的技术也适用。\n\n####\
  \ 添加调试选项\n\n使用 `bash -x` 调用 bash 脚本可以启用调试输出，打印出脚本内执行的命令和参数。如果您在上一个示例的第 9 步遇到问题，并想查看数据库二进制文件安装所做一切的详细信息，您可以修改\
  \ Dockerfile 为：\n\n```\nRUN chmod ug+x $INSTALL_DIR/*.sh && \\\nsync && \\\nbash\
  \ -x $INSTALL_DIR/$INSTALL_DB_BINARIES_FILE $DB_EDITION\n```\n\n在最后一行的脚本执行前添加 `bash\
  \ -x`，可以在不改变结果的情况下，增加对脚本操作的可见性。缺点在于需要在 Dockerfile 中添加和删除调试命令所需的工作量。但是，有我们的好帮手 `ARG`\
  \ 帮忙，这就不是问题了！\n\n在 Dockerfile 顶部添加一个新的、名为 `DEBUG` 的空参数：\n\n```\nARG DEBUG=\n```\n\
  \n然后在 Dockerfile 中执行的每个脚本前加上 `$DEBUG`：\n\n```\nRUN chmod ug+x $INSTALL_DIR/*.sh\
  \ && \\\nsync && \\\n$DEBUG $INSTALL_DIR/$INSTALL_DB_BINARIES_FILE $DB_EDITION\n\
  ```\n\n在常规调用 `docker build` 时，脚本执行前会无害地替换为空的 `DEBUG` 参数。然而，向该参数传递一个值即可开启调试：\n\n\
  ```\ndocker build ...\n--build-arg DEBUG=\"bash -x\" \\\n...\n```\n\n这个技巧在调试容器方面还有另一个应用。记住，容器执行的是由脚本定义的服务，对于我们的数据库容器，这些活动的根源是\
  \ `runOracle.sh`。正如您在第 6 章所发现的，`runOracle.sh` 会调用其他脚本来执行启动和创建数据库等功能。使用类似的 `$DEBUG`\
  \ 变量修改这些调用，可以为容器添加运行时调试功能，如清单 15-3 所示。\n\n```\n# Start database\n$DEBUG \"$ORACLE_BASE\"\
  /\"$START_FILE\";\nListing 15-3\nAdding a `$DEBUG` option to the individual script\
  \ executions, such as this call to the database startup script, enables runtime\
  \ debugging in containers through an environment variable\n```\n\n在这种情况下，`DEBUG`\
  \ 变量不是在构建过程中解释的参数。它是被复制到镜像中的脚本的一部分。`DEBUG` 变量在容器中是可见的，如果未定义，则为空值。和之前一样，它不会向脚本添加任何内容，也不会改变容器的行为或功能。在\
  \ `docker run` 命令中作为环境变量为 `DEBUG` 定义一个值即可激活调试：\n\n```\ndocker run ...\n-e DEBUG=\"\
  bash -x\" \\\n...\n```\n\n**不要在生产镜像中实现此类内置调试——这简直就是命令注入**——但在开发镜像中包含它已经为我节省了无数小时。如果调试功能已经内置，就无需更新\
  \ Dockerfile 或脚本，也无需重新构建包含调试功能的镜像了！\n\n\n#### 查看容器日志\n\n当容器失败时，通常发生在启动阶段，由自动化脚本中的错误引起。对于数据库，最有可能失败的事件是新容器中的数据库创建和现有容器上的数据库启动。错误信息几乎总是可以在容器日志中看到。\n\
  \n要查看容器的日志，请运行：\n\n```\ndocker logs <container_id_or_name>\n```\n\n这会将日志的全部内容转储到命令行，通过将命令输出通过管道传递给文件阅读器（如\
  \ `less` 或 `more`）可能更容易阅读，同时也增加了搜索能力：\n\n```\ndocker logs <container_id_or_name>\
  \ | less\n```\n\n无论容器是否正在运行，日志在 Docker 中都是可用的，并且由于大多数错误发生在启动后不久，你很有可能在开头几行就发现问题！\n\
  \n#### 覆盖容器启动\n\n仅仅因为一个镜像构建成功，并不意味着它能正常工作。当容器失败或行为异常时，根本原因在于镜像。修复这些问题最终意味着在整合必要的修复后重新构建镜像。你如何、在哪里识别、开发和测试这些修复至关重要。如果你无法在容器中尝试和测试东西，你唯一的办法就是更新\
  \ `Dockerfile` 及其自动化脚本，然后重新构建镜像。这可能是一个耗时的循环。\n\n当容器在启动时失败，你可能会觉得走进了死胡同。如果你无法登录并且容器无法运行，还有任何选择吗？当然有！\n\
  \n以下技术会在启动期间改变容器行为。它们本身并不是诊断构建过程问题的方法，但它们可以帮助让失败的镜像启动并运行足够长的时间，以发现损坏的地方！\n\n在本书的大部分内容中，我展示了如何使用\
  \ `-d` 标志运行容器，将它们创建为后台的分离进程：\n\n```\ndocker run -d ...\n```\n\n你可以将其视为在后台运行数据库服务或守护进程——容器启动并准备为客户端请求提供服务。运行什么——并由此提供服务——是由\
  \ `Dockerfile` 中的 `CMD` 指令定义的。\n\n`docker run` 读取镜像元数据并在容器中启动该命令。如果命令失败，容器通常会停止，因为它无法执行维持其服务所必需的操作。作为用户，你通常只会在启动后看到命令提示符处报告的容器名称，而没有迹象表明它已失败。直到有东西试图\
  \ *消费* 容器的服务时，你才会开始发现有些不对劲！\n\n如果 `docker ps -a` 显示的容器状态报告非零退出代码，那么它对 `docker start`\
  \ 作出积极反应的可能性也不大。以分离进程运行容器会调用启动命令，但你可以通过向容器传递不同的命令（例如一个 shell）在交互模式下绕过这种行为：\n\n```\n\
  docker run -it oracle/database:19.3.0-ee bash\n```\n\n这看起来像是使用 `docker exec` 连接到容器，只是用镜像名代替了容器名。给容器一些不同的事情做，会中断启动过程。即使过了几分钟，容器中也没有数据库进程在运行：\n\
  \n```\n> docker run -it oracle/database:19.3.0-ee bash\nbash-4.2$ ps -ef | grep\
  \ oracle\noracle         1       0  0 21:07 pts/0    00:00:00 bash\noracle     \
  \  132       1  0 21:12 pts/0    00:00:00 ps -ef\noracle       133       1  0 21:12\
  \ pts/0    00:00:00 grep oracle\n```\n\n在单独的会话中检查容器日志只显示我在命令提示符下运行的命令！\n\n```\n\
  > docker logs -f adoring_colden\nbash-4.2$ ps -ef | grep oracle\noracle        \
  \ 1       0  0 21:07 pts/0    00:00:00 bash\noracle       132       1  0 21:12 pts/0\
  \    00:00:00 ps -ef\noracle       133       1  0 21:12 pts/0    00:00:00 grep oracle\n\
  ```\n\n有了一个正在运行的容器，我就可以查询环境、运行脚本，甚至逐步执行失败的启动命令。\n\n此示例中的容器与我的会话绑定，当我退出时，容器就会停止。然而，通常在启动时调用的命令已被\
  \ `bash` 替换。此后的每一次 `docker start` 都会如此，在容器中启动 bash。从这一点出发，我可以停止和启动容器，虽然它不 *做* 预期的事情，但我可以通过运行“正常”的启动命令来重现故障！\n\
  \n#### 中间容器\n\n构建中的每一步都包括运行一个容器、做一些工作，然后将容器保存为镜像以用于后续步骤。一个单一的镜像可能有几十个步骤，每个步骤都建立在最后一个步骤之上并为最终结果做出贡献。这也意味着多个层可能共同导致一个问题，使得找出损坏之处不那么直观。\n\
  \n有些问题最好通过部分构建镜像来解决，构建到失败点，然后将其作为容器运行，并手动逐步执行自动化脚本。构建过程中生成的每个中间镜像都是 `Dockerfile`\
  \ 中定义的工作目标。\n\n如果 Docker 可以运行这些镜像，我们也可以——唯一的技巧是识别要运行的正确镜像！通过了解每个时间点的系统状态和日志，以及要运行的命令清单，我们可以在与\
  \ Docker 在构建期间经历的相同条件下，在中间容器中手动应用和测试更改。\n\n#### 构建到目标阶段\n\n达到这种“部分”状态的一个途径是通过注释掉或删除行来修剪\
  \ `Dockerfile`。对于多阶段构建，有一个更直接的内置选项：`--target` 选项。在 Dockerfile 中定位一个命名的阶段会在该阶段完成后停止构建：\n\
  \n```\ndocker build ...\n--target stage-name \\\n...\n```\n\n在下面的 `Dockerfile` 中，我移除了除\
  \ `FROM` 语句之外的所有内容，突出了它的三个阶段：`base`、`builder` 和一个最终的、未命名的阶段：\n\n```\nFROM oraclelinux:7-slim\
  \ as base\n\nFROM base AS builder\n\nFROM base\n\n```\n\n使用 `--target`，我可以告诉 Docker\
  \ 构建通过 `builder` 阶段，在执行最终阶段之前停止：\n\n```\ndocker build \\\n--target builder \\\n\
  -t builder-stage \\\n-f Dockerfile .\n```\n\n用一个新名称 `builder-stage` 标记镜像来标识它。构建完成后，以交互方式运行该镜像，启动一个\
  \ bash shell：\n\n```\ndocker run -it builder-stage bash\n```\n\n该镜像没有启动命令是不完整的，所以我们需要一种类似于用于覆盖容器中默认操作的方法，即给容器一个要运行的命令。在这里，我使用\
  \ `-it` 标志运行容器，这启动了一个交互式会话并打开了一个 bash shell。\n\n\n#### 运行缓存层\n\n我可以采用类似的方法来处理 Docker\
  \ 构建缓存中的层——假设它们仍然存在！`buildContainerImage.sh`脚本在构建镜像时使用了`--force-rm=true`和`--no-cache=true`选项。`--force-rm=true`开关会移除中间镜像，即使构建失败也是如此，因此在脚本更改此选项之前，中间镜像不可用：^(⁸⁶)\n\
  \n```\n\"${CONTAINER_RUNTIME}\" build --force-rm=false --no-cache=false \\\n\"${BUILD_OPTS[@]}\"\
  \ \"${PROXY_SETTINGS[@]}\" --build-arg DB_EDITION=${EDITION} \\\n-t \"${IMAGE_NAME}\"\
  \ -f \"${DOCKERFILE}\" . || {\necho \"\"\necho \"ERROR: Oracle Database 容器镜像未成功创建。\"\
  \necho \"ERROR: 请检查输出并纠正构建操作中报告的任何问题。\"\nexit 1\n}\n```\n\n同样，请注释掉构建命令后出现的`prune`指令：\n\
  \n```\n# 移除悬空镜像（带标签的中间镜像）\n#yes | \"${CONTAINER_RUNTIME}\" image prune > /dev/null\n\
  ```\n\n应用这些更改后，构建报告的进度（如清单 15-4 所示）与之前在清单 15-1 中看到的略有不同。`Removing intermediate container`的消息消失了，取而代之的是`Using\
  \ cache`。\n\n```\nStep 6/24 : ENV PATH=$ORACLE_HOME/bin:$ORACLE_HOME/OPatch/:/usr/sbin:$PATH\
  \     LD_LIBRARY_PATH=$ORACLE_HOME/lib:/usr/lib     CLASSPATH=$ORACLE_HOME/jlib:$ORACLE_HOME/rdbms/jlib\n\
  ---> 使用缓存\n---> 2d1f2466fe4f\nStep 7/24 : COPY $SETUP_LINUX_FILE $CHECK_SPACE_FILE\
  \ $INSTALL_DIR/\n---> 使用缓存\n---> 2e6a13841ca5\nStep 8/24 : COPY $RUN_FILE $START_FILE\
  \ $CREATE_DB_FILE $CREATE_OBSERVER_FILE $CONFIG_RSP $PWD_FILE $CHECK_DB_FILE $USER_SCRIPTS_FILE\
  \ $RELINK_BINARY_FILE $CONFIG_TCPS_FILE $ORACLE_BASE/\n---> 使用缓存\n---> bd581e634499\n\
  Step 9/24 : RUN echo \"INSTALL_DIR = $INSTALL_DIR\" &&     echo \"INSTALL_DB_BINARIES_FILE\
  \ = $INSTALL_DB_BINARIES_FILE\" &&     echo \"DB_EDITION = $DB_EDITION\" &&    \
  \ chmod ug+x $INSTALL_DIR/*.sh &&     sync &&     $INSTALL_DIR/$CHECK_SPACE_FILE\
  \ &&     $INSTALL_DIR/$SETUP_LINUX_FILE &&     rm -rf $INSTALL_DIR\n---> 在 3ea3d1739ebb\
  \ 中运行\n清单 15-4\n在 buildContainerImage.sh 脚本中禁用缓存管理后的部分构建输出\n```\n\n构建中处理的每个镜像的 ID\
  \ 值在输出中可见。在 BuildKit 和使用`--progress=tty`的构建下，不会打印镜像 ID。在这些情况下，或者如果原始构建输出不可用，中间镜像仍然在镜像的历史记录中可用：\n\
  \n```\n> docker history oracle/database:19.3.0-ee\n镜像 ID          创建时间         \
  \ 创建命令                            大小      注释\nbdbb8b83217b   3 分钟前    /bin/sh -c\
  \ #(nop)  CMD [\"/bin/sh\" \"-c\" \"exec...   0B\nfa9ccf999db3   3 分钟前    /bin/sh\
  \ -c #(nop)  HEALTHCHECK &{[\"CMD-SHELL...   0B\na6382dfde8a3   3 分钟前    /bin/sh\
  \ -c echo 'ORACLE_SID=${ORACLE_SID:-OR...   69B\n8b9a86303988   3 分钟前    /bin/sh\
  \ -c #(nop) WORKDIR /home/oracle          0B\n2a63bb2ba0e2   3 分钟前    /bin/sh -c\
  \ #(nop)  USER oracle                  0B\n3dc4a02582f5   3 分钟前    /bin/sh -c $ORACLE_BASE/oraInventory/orainst...\
  \   21.8MB\nb8ad822c9f7b   3 分钟前    /bin/sh -c #(nop)  USER root               \
  \     0B\na51c124a4630   4 分钟前    /bin/sh -c #(nop) COPY --chown=oracle:dbadir...\
  \   6.19GB\n80165c9dd6e6   6 分钟前    /bin/sh -c #(nop)  USER oracle             \
  \     0B\n7df11e1c33c2   13 分钟前   /bin/sh -c echo \"INSTALL_DIR = $INSTALL_DIR\"\
  ...   332MB\nbd581e634499   5 周前      /bin/sh -c #(nop) COPY multi:267aa3de5580180...\
  \   43kB\n2e6a13841ca5   5 周前      /bin/sh -c #(nop) COPY multi:08c35eebd2349e6...\
  \   1.96kB\n2d1f2466fe4f   5 周前      /bin/sh -c #(nop)  ENV PATH=/opt/oracle/prod...\
  \   0B\n6f7b027f7ba1   5 周前      /bin/sh -c #(nop)  ENV ORACLE_BASE=/opt/orac...\
  \   0B\nbfa620b5677f   5 周前      /bin/sh -c #(nop)  ARG INSTALL_FILE_1=LINUX....\
  \   0B\n6fbdf293ec56   5 周前      /bin/sh -c #(nop)  ARG SLIMMING=true          \
  \  0B\ne930d325050c   5 周前      /bin/sh -c #(nop)  LABEL provider=Oracle iss...\
  \   0B\n03c22334cf5a   2 年前      /bin/sh -c #(nop)  CMD [\"/bin/bash\"]        \
  \    0B\n      2 年前      /bin/sh -c #(nop) ADD file:0846801b1ef59a751...   131MB\n\
  \      2 年前      /bin/sh -c #(nop)  LABEL org.opencontainers....   0B\n```\n\n`docker\
  \ image history`的输出首先显示最新的操作，并标识了每个命令运行的镜像。现在，通过运行关联的镜像并提供一个命令（如 bash）来执行，检查一个步骤：\n\
  \n```\ndocker run --name test -it 3dc4a02582f5 bash\n```\n\n你也可以使用`-d`标志在后台运行中间镜像：\n\
  \n```\ndocker run --name test -d 3dc4a02582f5 bash\n```\n\n运行中间镜像时，关键要记住镜像不会有内置指令。如果不为容器提供要执行的操作（如打开\
  \ shell），它会立即退出！\n\n将中间镜像作为容器启动后，它们的行为与我们本书中一直使用的“常规”镜像完全相同。用于管理和连接的相同命令仍然有效。对于前面的两个示例，你可以使用`docker\
  \ exec`打开一个 bash 终端：\n\n```\ndocker exec -it test bash\n```\n\n在中间镜像中排查故障时，通常不需要添加环境变量、分配网络或映射端口。但是，你可能需要考虑映射一个绑定卷。\n\
  \n### 访问容器文件\n\n假设你已经编写了一个 Dockerfile 并用它构建了一个镜像。当你运行该镜像时，出现了问题。你遵循了本章中的一些推荐方法，得以启动容器并修改了一些脚本。如何从容器中访问更改后的文件？\n\
  \n你可以将文件内容从容器的 shell 复制粘贴到本地主机上的一个文件中。我无法计算自己这样做过多少次，在某种程度上，这是一个完全合理的解决方案。\n\n对于较大而不便复制粘贴的文件，请使用\
  \ Docker 的复制工具`docker cp`。它接受两个参数，从第一个（源）复制到第二个（目标）。通过添加容器名称前缀后跟冒号来标识容器中的位置：\n\n\
  ```\ndocker cp my_container:/source_path/filename /destination_path/\n```\n\n这将把容器“my_container”中的`/source_path/filename`复制到主机上的`/destination_path`。\n\
  \n遗憾的是，`docker cp`不支持通配符：\n\n```\n> docker cp ORCL:/home/oracle/* $HOME/\n错误：没有这样的容器路径：ORCL:/home/oracle/*\n\
  ```\n\n它也不复制目录内容。复制几个文件是可行的，但复制几十个可能会变得很繁琐！\n\n在故障排除期间管理多个文件，最好通过附加卷来解决。我建议将一个绑定卷映射到容器中不存在的挂载点，并将其关联到本地主机上的一个目录：\n\
  \n```\ndocker run -it \\\n-v $HOME:/debug \\\n3dc4a02582f5 bash\n```\n\n这对于将文件共享*到*容器中也很有用。大多数数据库管理员都有一套他们用得顺手的诊断脚本。预见需求并使其在容器环境中可用，对你自己会有很大帮助！\n\
  \n\n### 总结\n\n在我年轻的时候，我发现了自己对数学和逻辑的热爱。我记得在图书馆偶然发现一本逻辑谜题书，`Aha! Insight`，作者是《`Scientific\
  \ American`》的专栏作家马丁·加德纳。每个问题似乎都只差一块拼图就能获得足够的信息来解决悖论。然而，结果常常是他通过包含一个**干扰项**——某个“事实”或随机数字——给出了过多的数据，我会为之苦思冥想，直到意识到（有时只是在翻阅了书后的答案后）那是个干扰！大多数谜题都有着简单、优雅的解决方案，能带来“Aha!\
  \ 领悟时刻！”\n\n我在故障排查和调试代码时也看到了同样的模式。很多时候，一个简单的答案就隐藏在令人困惑、使场景变得杂乱的无意义信息之中。关键在于理解如何从系统中提取数据，以及应该将搜索解决方案的重点放在哪里。\n\
  \n最显而易见的起点是日志。在镜像构建过程中，Docker 会将脚本输出和消息中继到控制台，在本章中，你学习了向现有输出中添加补充性调试信息的策略。也许我最喜欢的方法，即在脚本调用前添加\
  \ `DEBUG` 参数，已经为我节省了数小时。只需记住，这是一个潜在的攻击向量，不应在生产代码中使用！\n\n你还发现了通过绕过初始化并在 shell 提示符下启动容器来规避容器启动失败的方法。然后，你可以逐步检查自动化代码，并（希望如此）找到并修复任何干扰容器运行的问题。同样的技术应用于中间镜像，对于识别构建过程中的小问题也很有价值。\n\
  \n将这些方法加入你的工具箱后，你就已经做好了充分准备，能够自信地构建和排查容器镜像的问题，并尽可能快速、无痛地达到你的“Aha! 领悟时刻”！\n\n脚注 1\n\
  \n## 16. Docker Hub 与镜像仓库\n\nDocker 是一种基础设施即代码工具，或称 IaC。`Dockerfile` 就是代码，是一组指导\
  \ Docker 完成创建（或重新创建）镜像步骤的指令。由于 Docker 是平台无关的，同一个 `Dockerfile` 在 Windows、Mac 和 Linux\
  \ 上，在私有机器或在云端都能生成完全相同的镜像！\n\n不过，有一个注意事项。你已经看到 `Dockerfile` 中的参数如何为构建增添了灵活性和多样性。我维护一个仓库，其中仅用一个\
  \ `Dockerfile` 就能构建从 11g 到 21c 的 Oracle 版本，并对最终镜像应用一个或多个补丁。单独来看，`Dockerfile` 只是一个模板，就像\
  \ Word 模板为新文档提供了基础，但倾注到每个文件中的思考和内容使其独一无二。`Dockerfile` 也是如此。配套的脚本和资源对结果有着重要影响。\n\n\
  数据库镜像严重依赖第三方内容——数据库安装文件和补丁。让数据库管理员告诉开发者，“从 Oracle 下载文件，放到正确的目录里，然后按照某些说明用这个 `Dockerfile`\
  \ 构建你的镜像”是没有意义的。虽然这比单独处理数据库镜像请求要快，但无法保证每个人使用的都是同一个镜像。\n\n镜像仓库正是为了解决这一确切需求而生的。作者运行一个构建并产出一个资产——镜像——然后将其“推送”到一个中央镜像仓库。任何有仓库访问权限的人都可以“拉取”特定的镜像，根据需要随时使用。你在本书练习中调用\
  \ `docker run ... alpine` 或编写并构建带有 `FROM` 子句（引用如 Oracle Linux 等现有镜像内容）的 `Dockerfile`\
  \ 时，不知不觉已经在使用一个名为 `Docker Hub` 的仓库了。\n\n本章的主要焦点是 `Docker Hub`，但其他供应商也提供了类似的容器注册中心，供个人和企业使用。个人和组织可以转向云供应商（如\
  \ `Oracle Cloud Infrastructure`，或 `OCI`）的容器注册中心服务来管理和托管他们的内容。\n\n### Docker Hub\n\
  \n我提到你一直以来都在使用 `Docker Hub`。即使没有登录或注册账户，存储在 `Docker Hub` 中的近一千万个镜像也对用户开放！导航到 [*https://hub.docker.com*](https://hub.docker.com)（如图\
  \ 16-1 所示），然后点击右上角的“Explore”链接。\n\n![](img/514143_1_En_16_Fig1_HTML.jpg)\n\nDocker\
  \ Hub 注册页面的截图，其中“Explore”标签页被突出显示并标注为“探索注册中心”。\n\n图 16-1\n\n从 Docker Hub 主页点击“Explore”链接以浏览仓库镜像\n\
  \n如图 16-2 所示的注册中心浏览器，列出了所有公共镜像，并在左侧包含用于缩小内容范围的筛选功能。请注意，“可信内容”部分有 Docker 官方镜像、已验证发布者和赞助的\
  \ OSS 选项。\n\n![](img/514143_1_En_16_Fig2_HTML.jpg)\n\n注册中心浏览器的截图，列出了所有公共镜像，并在左侧包含用于缩小内容范围的筛选功能。“可信内容”部分包含\
  \ Docker 官方镜像、已验证发布者和赞助的 O S S 选项。\n\n图 16-2\n\nDocker Hub 镜像仓库搜索的主界面。请注意左侧的筛选选项，尤其是用于仅选择“可信内容”的选项\n\
  \n#### 可信内容\n\n`Docker Hub` 有点像是一个自由市场！注册用户可以上传和分享几乎任何东西，包括恶意内容！恶意行为者会利用任何机会来危害毫无戒心的用户。Docker\
  \ 将内容标记为“可信”，以确保这些镜像作者是信誉良好的，他们的镜像不含恶意软件。“信任”分为几个等级：\n\n*   **Docker 官方镜像**是使软件开发和部署更容易的标准解决方案。它们通常是最受欢迎的镜像，经过漏洞扫描，由积极参与开源软件开发的可信赖组织维护，并经过大量使用该内容的用户社区的审查。\n\
  *   **已验证发布者**是经过 Docker 验证的生态系统中的商业合作伙伴。已验证发布者直接负责维护其内容，并且通常遵循与官方镜像相同的严格实践^(⁸⁷)。\n\
  *   **Docker 赞助的开源软件**（简称 `OSS`）是由 Docker 赞助的开源项目发布的镜像。虽然这些不是公司项目，但其内容会经过严格的恶意软件和漏洞审查。\n\
  \n然后，就是其他所有内容。\n\n\n\n#### 不可信镜像\n\n查看不可信的公共镜像时需格外谨慎。容器在 Docker 中运行时拥有提升的权限。利用这一点的方式不胜枚举，从窃取系统敏感信息到在后台进行加密货币挖矿。请记住，镜像就像提供某种服务的应用程序。你不会从未知来源下载并运行应用程序，对待公共镜像也应保持同样的怀疑态度！\n\
  \n这并不是说每个镜像都故意包含恶意代码！Docker 与多家第三方机构合作，包括 Snyk（[www.snyk.io](http://www.snyk.io)），他们提供扫描服务（甚至提供修复方案）。已扫描的镜像会显示已识别漏洞的摘要。图\
  \ 16-3 展示了扫描 Oracle 11.2.0.4 数据库镜像所识别漏洞的示例。图 16-4 则显示了每个问题的详细列表及其相关的通用漏洞披露（CVE）说明。\n\
  \n![](img/514143_1_En_16_Fig4_HTML.jpg)\n\n一个 oraclesean 标签的截图，描述了每个问题的详细列表及其相关的通用漏洞披露（CVE）说明。\n\
  \n**图 16-4**\n\n针对 Oracle 11.2.0.4 企业版镜像的 Snyk 扫描结果。它详细列出了漏洞及其严重性分数、描述问题的 CVE 说明、源软件包和版本，以及修复该问题的软件包版本。\n\
  \n![](img/514143_1_En_16_Fig3_HTML.jpg)\n\n一个标签页的截图，展示了扫描 Oracle 11.2.0.4 数据库镜像所识别漏洞的示例。\n\
  \n**图 16-3**\n\n来自私有仓库的 Oracle 11.2.0.4 企业版镜像摘要。扫描是镜像作者上传镜像到 Docker Hub 时可请求的一项可选功能。此处，镜像显示了其最后扫描时间以及镜像中存在的高、中、低严重性漏洞的摘要。\n\
  \n#### 漏洞扫描\n\n你可以使用 `docker scan` 命令在从公共仓库拉取镜像之前对其进行扫描。该命令会调用 Snyk 的第三方扫描服务，并生成在镜像中检测到的问题列表。清单\
  \ 16-1 展示了对 `ubuntu` 镜像进行扫描的示例。\n\n```\n> docker scan ubuntu\nDocker Scan relies\
  \ upon access to Snyk, a third party provider, do you consent to proceed using Snyk?\
  \ (y/N)\ny\nTesting ubuntu...\n✗ Low severity vulnerability found in shadow/passwd\n\
  Description: Time-of-check Time-of-use (TOCTOU)\nInfo: https://snyk.io/vuln/SNYK-UBUNTU2204-SHADOW-2801886\n\
  Introduced through: shadow/passwd@1:4.8.1-2ubuntu2, adduser@3.118ubuntu5, shadow/login@1:4.8.1-2ubuntu2\n\
  From: shadow/passwd@1:4.8.1-2ubuntu2\nFrom: adduser@3.118ubuntu5 > shadow/passwd@1:4.8.1-2ubuntu2\n\
  From: shadow/login@1:4.8.1-2ubuntu2\n✗ Low severity vulnerability found in gmp/libgmp10\n\
  Description: Integer Overflow or Wraparound\nInfo: https://snyk.io/vuln/SNYK-UBUNTU2204-GMP-2775169\n\
  Introduced through: gmp/libgmp10@2:6.2.1+dfsg-3ubuntu1, coreutils@8.32-4.1ubuntu1,\
  \ apt@2.4.7\nFrom: gmp/libgmp10@2:6.2.1+dfsg-3ubuntu1\nFrom: coreutils@8.32-4.1ubuntu1\
