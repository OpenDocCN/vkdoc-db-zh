  仓库作者体贴地在容器脚本中包含了详尽的日志输出！前两行显示了数据库版本（此处为 Enterprise 版）以及特权数据库账户的（随机生成的）密码。回想一下，我提到过这些并非生产就绪的镜像；这是一个例子——凭证显示在日志输出中！任何有权访问主机或容器的人都可以查看此信息！


