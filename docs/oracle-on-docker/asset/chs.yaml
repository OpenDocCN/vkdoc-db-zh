  ## 6. 定制容器环境


  运行容器类似于调用一个复杂的 Shell 脚本。容器和 Shell 脚本都执行一个特定范围的任务。脚本可以是显式的，带有硬编码的值，但增加一些灵活性可以使它们更具可移植性和价值。这可能意味着从环境中获取特定值，或在运行时解释传递给脚本的参数。以一个
  `RMAN` 备份脚本为例。硬编码数据库名称会阻止它在其他数据库上使用。将数据库名称作为变量传递，同一个脚本就可以在整个企业中使用。为备份目的地、并行度和增量级别增加更多选项，使该脚本在各种实现中变得灵活和有价值得多。


  `Docker` 在这方面类似，在本章中，我们将深入探讨 `docker run` 命令的一个选项，该选项将变量和值传递到容器的私有环境。这些环境变量就像 Shell
  脚本的参数，允许一个镜像动态工作，支持各种需求或应用。当 Oracle 数据库容器启动时，它会评估容器环境——如同备份脚本读取参数——并应用更改到容器中，以创建和运行一个匹配的数据库。


  其背后的魔法是一个特殊的指令，每当容器启动时，`Docker` 会自动运行它。


  ### 启动过程


  之前我提到过启动过程。从高层次来看，它会检查数据库是否存在，如果找到，则启动它。如果没有，则运行 `数据库配置助手 (DBCA)` 在容器中创建一个新数据库。我们正在使用的
  Oracle 容器仓库镜像的启动指令^(³⁶)是一个名为 `runOracle.sh` 的 `bash` Shell 脚本。（供参考，本章所有示例均基于使用 Oracle
  官方仓库 [`https://github.com/oracle/docker-images`](https://github.com/oracle/docker-images)
  构建的默认 Oracle Database 19c 镜像，但也适用于其他数据库版本。）图 6-1 详细展示了 Oracle 数据库容器的启动过程。


  ![](img/514143_1_En_6_Fig1_HTML.png)


  ```

  一个运行 Oracle 数据库的容器启动流程图。它始于检查 Oracle 环境。如果数据库存在，则启动数据库。如果不存在，则运行 D B C A 并移动配置文件。

  ```


  图 6-1


  ```

  Oracle 数据库容器启动过程的流程图

  ```


  `runOracle.sh` 脚本从环境中读取值，它首先查找的内容之一就是 `ORACLE_SID` 和 `ORACLE_PDB`。如果它们未定义，则分配默认值。只有这样，它才会检查是否存在匹配该
  SID 的数据库。




  ### 查看环境值


