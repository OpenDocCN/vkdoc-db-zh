  \n脚注 1\n\n## 别名和函数\n\n别名和函数可以简化和加速命令行任务。通过将它们添加到 Shell 登录配置文件中，它们会在您每次登录时加载到您的环境中。以下是我多年来采用的一些别名和函数，以使使用\
  \ Docker 更快、更容易。\n\n### 别名\n\n别名是长或复杂命令的快捷方式。它们甚至可以从环境中提取值！即使您不熟悉别名，您也可能在不知不觉中使用过它们——许多\
  \ Linux 安装都包含默认别名。\n\n要查看会话中定义的别名，只需在命令提示符下输入 `alias`：\n\n```\n$ alias\nalias egrep='egrep\
  \ --color=auto'\nalias fgrep='fgrep --color=auto'\nalias grep='grep --color=auto'\n\
  alias l.='ls -d .* --color=auto'\nalias ll='ls -l --color=auto'\nalias ls='ls --color=auto'\n\
  alias vi='vim'\nalias which='alias | /usr/bin/which --tty-only --read-alias --show-dot\
  \ --show-tilde'\n```\n\n这些是 Oracle Linux 7.9 上 Bash 中包含的别名。\n\n我广泛使用别名来对 Docker\
  \ 命令应用 `--format` 选项，重新排序和自定义其输出，有时称为“美化打印”。\n\n\n\n#### 报告容器信息\n\n这是我创建的第一个 Docker\
  \ 别名。起初，在演示和现场展示中，我用它来使 `docker ps -a` 的输出更紧凑易读：\n\n```\nalias dps='docker ps -a\
  \ --format \"table {{.Names}}\\t{{.Image}}\\t{{.Ports}}\\t{{.Status}}\"'\n```\n\n\
  `docker ps` 的默认输出包含一些我不感兴趣的列，并且结果对于某些显示器来说太宽了。这个别名重新排列了字段位置，将每个容器更易读的名称放在最左侧，并省略了我不常用字段：\n\
  \n```\n> dps\nNAMES     IMAGE                       PORTS     STATUS\nORA19C   \
  \ oracle/database:19.3.0-ee             Up 13 days (healthy)\nORCL      oracle/database:19.3.0-ee\
  \             Up 2 weeks (healthy)\n```\n\n#### 扩展的容器信息\n\n`docker ps` 显示端口分配，但不显示挂载点或容器大小。我偶尔需要这些信息，但频率不足以让我记住\
  \ `-s=true` 这个参数！\n\n```\nalias dpm='docker ps -a -s=true --no-trunc=true --format\
  \ \"table {{.Names}}\\t{{.Image}}\\t{{.Ports}}\\t{{.Size}}\\t{{.Mounts}}\\t{{.Status}}\"\
  '\n```\n\n该命令可能需要运行片刻，因为它必须收集所有容器的大小信息：\n\n```\n> dpm\nNAMES     IMAGE         \
  \  PORTS      SIZE                 MOUNTS    STATUS\nORA19C    oracle/database:19.3.0-ee\
  \  5.04GB (virtual 11.7GB)  Up 13 days (healthy)\nORCL      oracle/database:19.3.0-ee\
  \  5.35GB (virtual 12GB) Up 2 weeks (healthy)\n```\n\n#### 排序的镜像列表\n\n`docker images`\
  \ 的默认排序依据是创建日期。如果你更希望按镜像名称排序，可以试试这个：\n\n```\nalias images=\"docker images | awk\
  \ 'NR<2{print \\$0; next}{print \\$0 | \\\"sort\\\"}'\"\n```\n\n它将 `docker images`\
  \ 的输出通过 `awk` 处理以保留标题行（`NR<2{ print \\$0; next }` 打印行号 `RN` 小于 2 的行），然后对剩余的输出进行排序。\n\
  \n#### 列出悬空的卷\n\n“悬空”卷——即未被任何容器引用的卷——可能未被使用，却在主机上占用空间。要找到它们，可以检查 `docker volume`\
  \ 的 `dangling` 标志：\n\n```\nalias dangvol='docker volume ls -f dangling=true'\n```\n\
  \n#### 列出悬空的镜像\n\n与卷类似，未使用或“悬空”的镜像可能会占用系统空间。用以下命令找到它们：\n\n```\nalias dangimg='docker\
  \ images -f dangling=true'\n```\n\n### 函数\n\n函数和别名一样，使得调用重复或冗长的命令更加容易。别名支持固定或被动的操作，但函数更强大。它们本身是独立的\
  \ shell 脚本，可以接受并处理输入变量，执行更广泛或更复杂的任务。\n\n#### 启动容器 Shell\n\n毫无疑问，我在 Docker 中执行最多的操作就是连接到容器。与其每次都输入完整的命令：\n\
  \n```\ndocker exec -it  bash\n```\n\n我创建了这个函数。它将容器名称作为输入，并将其代入 `docker exec` 来启动一个\
  \ shell 会话：\n\n```\ndbash(){\ndocker exec -it $1 bash\n}\n```\n\n#### 检查函数\n\n`docker\
  \ inspect` 命令以 JSON 格式报告 Docker 对象（容器、镜像、卷等）的元数据信息。我通常运行 `docker inspect` 只是为了查看其总输出中的某一部分，而对于镜像和容器，总输出可能非常长。\n\
  \n与其他 Docker CLI 命令一样，`docker inspect` 接受 `--format` 选项，并带有用于过滤出单个元数据部分的额外语法。当然，这意味着你需要知道\
  \ Docker 如何标识你想要的部分，并记住用于格式化结果的表达式。\n\n我对这些语法的使用频率都不够高，无法牢记在心，所以我创建了一个函数来替我完成！\n\
  \n我包含这段代码是为了展示函数的功能，并希望能激发你的想象力。你可以根据自己的需求调整它：\n\n```\ndi() {\ncase $1 in\nenv)\
  \   docker inspect --format '{{range .Config.Env}} {{printf \"%s\\n\" .}} {{end}}'\
  \ $2 | sort ;;\nip)    docker inspect --format '{{range.NetworkSettings.Networks}}\
  \ {{.IPAddress}} {{end}}' $2 ;;\nports) docker inspect --format '{{range $p,$i :=\
  \ .NetworkSettings.Networks}} {{$p}} -> {{(index $i 0).HostPort}} {{end}}' $2 ;;\n\
  mount) docker inspect --format '{{.Name}} {{.Options.o}}:{{.Options.device}}' $2\
  \ ;;\n*) ;;\nesac\n}\n```\n\n这样调用它：\n\n```\ndi  \n```\n\n`case` 语句处理第一个值（要执行的检查类型），然后调用\
  \ `docker inspect` 对指定对象进行操作，并对输出应用相应的模板。\n\n这里包含的检查类型如下：\n\n*   `env`：报告容器的环境变量\n\
  *   `ip`：显示容器的 IP 地址\n*   `ports`：列出映射到容器的所有端口\n*   `mount`：显示卷的挂载选项和设备名称或目录\n*\
  \   `*`：当没有匹配的类型时退出\n\n请务必经常回顾和更新你的函数！随着你使用 Docker 并了解更多功能，你会遇到新的机会来添加或构建你的函数库，而最后一个例子就是一个很好的示范！\n\
