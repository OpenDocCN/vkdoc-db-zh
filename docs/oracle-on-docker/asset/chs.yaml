  ### 管理容器


  当涉及到管理新的容器数据库时，其实没什么太多可做的。从 Oracle 的仓库和容器注册表镜像创建的数据库默认设置为 `NOARCHIVELOG` 模式，因此没有归档日志需要管理。在关闭或重启主机时，无需停止容器或其数据库。如果主机或
  Docker Desktop 重启，请在系统启动后启动容器。数据库和侦听器将作为该过程的一部分自动启动。


  `docker start` 和 `docker stop` 管理容器的状态：


  ```

  > docker stop MYDB

  MYDB

  > docker start MYDB

  MYDB

  ```



  ### 摘要


  这是一份快速入门指南，介绍如何启动并运行一个包含 Oracle 数据库的容器。这是一个“配方”，没有解释“如何”或“为何”背后的原理或理由。您可以在需要快速创建数据库、回忆常用命令，或作为构建新镜像的复习参考时使用它。并且，就像配方一样，您可以随意调整它以符合您的喜好。


  既然您已经了解到构建数据库如此快速便捷，您几乎已准备好开始定制镜像和容器，并探索利用 Docker 功能的方法。下一章将探讨运行 Oracle 容器时您将遇到的本质差异。第
  6 章将介绍如何修改我们刚刚创建的基础容器以满足不同需求。


