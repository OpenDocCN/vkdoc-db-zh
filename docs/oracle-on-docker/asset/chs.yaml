  #### 构建镜像


  `OracleDatabase/SingleInstance/dockerfiles` 目录中的 `buildContainerImage.sh`^(²⁷) 脚本负责主要工作，并接受参数，如清单
  4-4 所示。


  ```

  Usage: buildContainerImage.sh -v [version] [-e | -s | -x] [-i] [-o] [container build
  option]

  Builds a container image for Oracle Database.

  Parameters:

  -v: version to build

  Choose one of: 11.2.0.2  12.1.0.2  12.2.0.1  18.3.0  18.4.0  19.3.0

  -e: creates image based on ''Enterprise Edition''

  -s: creates image based on ''Standard Edition 2''

  -x: creates image based on ''Express Edition''

  -i: ignores the MD5 checksums

  -o: passes on container build option

  * select one edition only: -e, -s, or -x

  ```


  清单 4-4

  调用 buildContainerImage.sh 时可用的选项


  目前，我们只需要关注版本和版本（edition）的选项。在此示例中，我将通过使用 `-e` 标志调用脚本并将 `19.3.0` 传递给版本标志 `-v` 来构建一个
  19c 企业版数据库的镜像：


  ```

  ./buildContainerImage.sh -e -v 19.3.0

  ```


  这将启动构建过程，在大多数笔记本电脑上通常需要 8-15 分钟。Docker 会显示每个步骤的输出，当它使用先决条件更新文件系统并安装 Oracle 软件时，您可能会看到一些熟悉的消息。完成后，您应该会看到一条指示镜像名称、标签和总构建时间的消息。运行
  `docker images` 并验证您的输出是否类似于以下内容：


  ```

  > docker images

  REPOSITORY       TAG         IMAGE ID      CREATED      SIZE

  oracle/database  19.3.0-ee   c0d1669287ad  2 hours ago  6.68GB

  ```


  现在我们有了一个用于运行数据库容器的镜像！


  ##### 运行容器


  恭喜！您已经创建了一个镜像，距离享受劳动成果只有几分钟之遥！运行容器就像烤我们的披萨——无论它是新鲜的还是冷冻的，步骤都是一样的！就像我们的披萨一样，无论镜像来源如何（Oracle
  容器注册中心、Oracle 的仓库脚本还是自定义镜像），运行容器的命令都是相同的。


  #### 容器属性


  `docker run` 首次启动一个容器。它还会设置容器的属性，这些属性以后无法更改，包括它如何与其环境交互。这个第一个数据库容器的基本要素是环境变量、端口发布、卷挂载和名称。


  ### 端口发布


  容器是主机上的隔离进程；容器内部发生的事情通常对主机上的其他应用程序是不可见的。有时，我们希望与容器交互，一个主要的例子是连接到 Oracle 数据库侦听器，通常通过端口
  1521。将此端口映射或*发布*到主机上的一个端口，允许主机环境中的其他进程与容器内的数据库进行通信。^(²⁸)


  端口映射由 `-p` 或 `--publish` 标志控制，后跟主机和容器端口。例如，`-p 10000:1521` 将容器中的端口 1521 映射到主机上的端口
  10000。


  #### 卷映射


  正如我们可能希望通过端口映射在主机与容器的边界上进行通信一样，在某些情况下，我们需要允许主机和容器共享文件或目录。卷映射通过将容器内的文件系统映射到本地主机上的一个卷或目录来实现这一点。现在，可以将映射后的卷视为一个
  NFS 挂载点。


  在 Oracle 数据库镜像中，数据库配置和数据文件位于 `/opt/oracle/oradata` 目录下。将此目录映射到本地机器，可以允许数据库利用高性能存储、外部冗余和持久性。


  删除容器会删除其内容，但映射到主机目录的绑定挂载卷的内容仍然保留在容器外部。我们希望在删除容器时保留数据的场景有很多，包括数据库克隆、补丁应用和升级^²⁹。


  卷挂载或绑定挂载通过 `-v` 或 `--volume` 标志处理，后跟将主机目录映射到容器目录的参数。例如，`-v $HOME/my_container:/opt/oracle/oradata`
  将容器的 `oradata` 目录映射到主机用户主目录下名为 `my_container` 的目录。


  #### Linux 和 Windows WSL 环境中的权限问题


  在 Linux 和 Windows WSL 环境中的 Linux 客户机上，主机上的目标目录必须由 `oracle` 用户拥有，或者具有允许 `oracle`
  用户写入该目录的权限。


  这可能会让 Windows 用户感到困惑，因为 Linux 和 Windows 环境中的权限结构不同。在 Docker Desktop、PowerShell 或命令提示符中创建的容器在
  Windows 文件系统下运行。Windows 用户同时拥有文件和进程的所有权，当 Docker 在本地文件系统上创建文件时不会发生冲突。


  `docker run` 的 `--volume` 或 `-v` 选项会在主机上创建映射的目录（如果它们不存在）。在 Linux 环境中——包括 Windows
  上的 WSL——它们是由调用进程创建并继承其所有权的。Docker 守护进程以 `root` 用户身份运行（并创建目录），如图 4-6 所示。这是在运行以下命令后在
  Windows WSL 系统上捕获的：


  ![](img/514143_1_En_4_Fig6_HTML.jpg)


  一张截图显示 docker 守护进程以 root 身份运行并创建目录。


  **图 4-6**


  在 Linux 系统上，`docker run` 创建的目录从 Docker 守护进程 `root` 继承所有权。


  ```

  docker run -d --name MYDB \

  -v $HOME/oradata/MYDB:/opt/oracle/oradata \

  oracle\database:19.3.0-ee

  ```


  `$HOME/oradata` 目录路径不存在，因此 Docker 以 `root` 用户身份创建了它。但是，当数据库配置助手（DBCA）在容器内以 `oracle`
  用户身份运行时^³⁰，它尝试向容器卷上的目录写入文件。然而，该卷映射到本地文件系统上的一个目录，而 `oracle` 用户无法访问该目录。如图 4-7 所示，由于无法创建必要的目录或写入文件，DBCA
  失败。


  ![](img/514143_1_En_4_Fig7_HTML.jpg)


  一张 Ubuntu 网页截图显示了 DBCA 命令。一个标签写着：DBCA 失败，因为容器无权在映射到卷的目录上创建资源。


  **图 4-7**


  容器中的 `/opt/oracle/oradata` 目录被映射到一个不存在的目录。Docker 守护进程以 root 用户身份在主机上创建了该目录。容器没有在那里写入文件的权限，因此
  DBCA 失败。


  有多种方法可以避免此问题。最简单的方法可能是在 Linux 系统中添加 `oracle` 用户和 `oinstall` 组：


  ```

  sudo groupadd -g 54321 oinstall

  sudo useradd -u 54321 -g oinstall oracle

  ```


  预先创建要映射到卷的目录并将其所有权设置为 `oracle:oinstall`：


  ```

  sudo mkdir -p $HOME/oradata/MYDB

  sudo chown -R oracle:oinstall $HOME/oradata/MYDB

  ```


  每当我在 Windows 或 Linux 系统上看到失败的 Oracle 数据库容器时，我首先检查日志中是否包含 “Cannot create directory”
  错误。这通常可以追溯到权限问题，即映射卷上的所有权与容器内请求资源的用户不兼容。


  #### 环境变量


  容器从父镜像继承默认的环境设置，包括数据库和可插拔数据库名称，通常是 `ORCLCDB` 和 `ORCLPDB1`。当容器首次运行时，启动脚本会检查是否存在数据库，如果不存在，则基于这些值创建一个。我们可以使用
  `-e` 或 `--env` 标志后跟变量-值对来覆盖默认值以自定义数据库名称。例如，`-e ORACLE_SID=TEST -e ORACLE_PDB=TESTPDB`
  覆盖了默认数据库名称，并创建一个名为 `TEST` 的数据库，其可插拔数据库名为 `TESTPDB`。


  这说明了如何使用单独的 `-e` 标志设置多个环境变量。同样的模式适用于多个端口和卷映射。


  #### 容器名称


  `--name` 标志为容器设置一个“友好”的名称。如果未指定，Docker 会生成一个随机名称，如“*quirky_elbakyan*”或“*nifty_buck*”。定义名称是一个好习惯。您无需查询
  Docker 来查找容器的名称，并且当容器具有有意义的名称时，您更有可能记住其用途。


  > **注意**

  >

  > 容器名称区分大小写。


  #### 一个完整的运行命令


  让我们使用清单 4-5 中的命令运行一个新容器。


  ```

  docker run -d --name MYDB  \

  -p 10000:1521  \

  -v $HOME/oradata/mydb/data:/opt/oracle/oradata \

  -v $HOME/oradata/mydb/diag:/opt/oracle/diag \

  -e ORACLE_SID=MYDB \

  -e ORACLE_PDB=MYPDB \

  oracle/database:19.3.0-ee

  ```


  **清单 4-5**

  一个用于基本 Oracle 数据库容器的实用 `docker run` 命令


  这里有一个我们尚未涵盖的新标志 `-d`。它告诉 Docker 将容器作为分离的后台进程运行。如果没有此标志，容器将在本地会话中以交互方式运行。退出容器会导致其停止。


  命令以 Docker 应使用的用于启动容器的镜像结束。该镜像组合了 `docker images` 报告的 `repository` 和 `tag` 字段，并用冒号连接。


  提交此命令会使 Docker 启动容器并运行镜像中嵌入的启动脚本。没有现有数据库，因此启动脚本调用 DBCA 创建一个名为 `MYDB` 的数据库，其可插拔数据库名为
  `MYPDB`。数据文件和配置被写入用户主目录下的目录中。我们可以通过本地主机上的端口 `10000` 连接到数据库监听器。


  在 Linux 系统或 Windows WSL 主机的 Linux shell 中运行此命令时，请务必首先创建必要的目录：


  ```

  sudo mkdir -p $HOME/oradata/mydb/{data,diag}

  sudo chown -R oracle:oinstall $HOME/oradata/mydb

  ```


  花括号内的值 `{data,diag}` 告诉 Linux 在 `$HOME/oradata/mydb` 下创建两个子目录。我将它们分配给容器中的两个卷。第一个映射到
  `/opt/oracle/oradata`，是数据库数据文件和配置的目标。第二个映射到 `/opt/oracle/diag`，接收数据库诊断目录。


  映射 Oracle 的诊断目录有两个好处。首先，这是一个易失性目录。如果没有卷，Oracle 会将这些文件写入容器的联合文件系统，导致其增长。容器层在 Docker
  的私有文件系统内管理。增长该文件系统可能很麻烦，因此将文件保存在容器层外部有助于防止以后出现问题。其次，将它们保存在卷上可以在容器被删除时保留它们，并且更便于查看。



  #### 查看容器日志


  创建数据库需要几分钟时间。我们可以使用 `docker logs` 命令来监控容器内的进度。使用 `-f` 标志来跟踪刚刚创建的 `MYDB` 容器的日志活动：


  ```

  docker logs -f MYDB

  ```


  初始输出显示了数据库创建过程。完成后，启动脚本会报告数据库已准备就绪，然后内容切换为显示警报日志的内容，如代码清单 4-6 所示。


  ```

  #########################

  DATABASE IS READY TO USE!

  #########################

  Datafiles are already patched. Skipping datapatch run.

  The following output is now a tail of the alert.log:

  ORCLPDB1(3):

  ORCLPDB1(3):XDB initialized.

  2021-03-01T17:32:38.353181+00:00

  ALTER SYSTEM SET control_files=''/opt/oracle/oradata/MYDB/control01.ctl'' SCOPE=SPFILE;

  代码清单 4-6

  报告数据库可用性的日志输出

  ```


  数据库创建完成了！我们可以通过容器 shell 交互式地使用数据库，也可以通过主机应用程序（如 SQL Developer）进行连接。


  ### 访问和使用容器


  让我们探索访问和使用数据库及容器环境的方法。我们可以交互式地连接到容器 shell、运行脚本，以及使用映射端口从远程客户端连接。


  #### 访问容器 Shell


  `docker exec` 在容器环境中执行命令，可以是交互式的，也可以在后台运行。使用以下命令在刚刚创建的 `MYDB` 容器中启动一个交互式 shell：


  ```

  docker exec --interactive --tty MYDB bash

  ```


  `--interactive` 标志指示 `docker exec` 以交互方式运行；`--tty` 标志打开一个 TTY 会话。这些标志有简写选项，分别是 `-i`
  和 `-t`，并且可以组合成更短的等效命令：


  ```

  docker exec -it MYDB bash

  ```


  运行任一命令都会在容器中执行（打开）一个 bash shell。可以将其理解为通过 `ssh` 登录到远程服务器——我们现在处于容器环境中。我们运行的任何命令都会在容器中执行，就像我们连接到了另一台主机一样，直到我们退出连接。


  一旦连接上，我们就相当于在另一台机器上——一台 Oracle 数据库服务器。为了证明这一点，在容器提示符下运行 `sqlplus / as sysdba` 并执行一些查询。结果将如代码清单
  4-7 所示。


  ```

  [oracle@9fc6a7a36152 ~]$ sqlplus / as sysdba

  SQL*Plus: Release 19.0.0.0.0 - Production on Mon Mar 1 19:51:55 2021

  Version 19.3.0.0.0

  Copyright (c) 1982, 2019, Oracle.  All rights reserved.

  Connected to:

  Oracle Database 19c Enterprise Edition Release 19.0.0.0.0 - Production

  Version 19.3.0.0.0

  SQL> select name from v$database;

  NAME


  MYDB

  SQL>

  代码清单 4-7

  在数据库容器中启动 SQL*Plus

  ```


  需要明确的是，这是一个功能齐全的 Oracle 数据库，仅受其主机资源的限制。所有“常规”数据库安装中的命令在容器数据库中都存在（除非为减小镜像大小而被移除）。


  #### 运行 SQL*Plus


  `SQL*Plus` 和 `bash` 一样，是一个可执行文件，可以通过 `docker exec` 命令以相同的方式调用。代码清单 4-8 演示了如何直接打开一个
  `SQL*Plus` 会话。


  ```

  > docker exec -it MYDB sqlplus / as sysdba

  SQL*Plus: Release 19.0.0.0.0 - Production on Mon Mar 1 20:09:25 2021

  Version 19.3.0.0.0

  Copyright (c) 1982, 2019, Oracle.  All rights reserved.

  Connected to:

  Oracle Database 19c Enterprise Edition Release 19.0.0.0.0 - Production

  Version 19.3.0.0.0

  SQL> select name from v$database;

  NAME


  MYDB

  SQL>

  代码清单 4-8

  在容器中执行 SQL*Plus

  ```


  在容器中运行其他命令也遵循相同的模式。


  #### 运行脚本


  调用不带 `-it` 标志的 `docker exec` 会运行命令并报告输出。代码清单 4-9 说明了如何列出容器中某个目录的文件。


  ```

  > docker exec MYDB ls /opt/oracle/oradata/MYDB

  MYPDB

  control01.ctl

  control02.ctl

  pdbseed

  redo01.log

  redo02.log

  redo03.log

  sysaux01.dbf

  system01.dbf

  temp01.dbf

  undotbs01.dbf

  users01.dbf

  代码清单 4-9

  列出 MYDB 容器中 /opt/oracle/oradata/MYDB 目录的内容

  ```


  Oracle 镜像包含用于在容器环境中管理数据库的脚本。其中之一是 `setPassword.sh`，用于更改 `SYS`、`SYSTEM` 和 `PDBADMIN`
  用户的密码。代码清单 4-10 展示了如何调用 `setPassword.sh` 脚本来更新这些用户密码。


  ```

  > docker exec MYDB ./setPassword.sh NewPassword1

