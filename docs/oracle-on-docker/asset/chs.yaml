  ## 5. 数据库容器的差异


  我年纪足够大，还记得 Oracle 数据库管理员手动管理回滚段的日子。当 Oracle 引入自动撤销保留时，人们（包括我自己）对此表示怀疑，确信它无法妥善管理回滚。多年后，我无法想象没有这个功能的世界！


  多年来，数据库管理员对其他新功能和进步也表示过怀疑，包括恢复管理器、自动共享内存管理和虚拟机。每一项都引入了新的、与熟悉方法不同的工作方式。随着时间的推移，我们的理解和接受度逐渐提高，直到这些（以及其他新功能）成为我们现在习以为常的常规。


  改变并非易事。主流最初会拒绝进步，常常没有理由或理解，仅仅因为我们不习惯它们。然而，它们被称为*进步*是有原因的；容器也不例外。例如，谷歌夸口说他们在容器中运行一切，如图
  5-1 中来自 [*https://cloud.google.com/containers*](https://cloud.google.com/containers)
  的屏幕截图所示。


  ![](img/514143_1_En_5_Fig1_HTML.jpg)


  一幅文本图像，标题是“谷歌的一切都在容器中运行”。它提到了容器化如何帮助开发团队提高效率。


  图 5-1


  谷歌在容器中运行一切


  改变可能令人不适，但对于想要进步或改进的组织和个人来说，这是必要且至关重要的。到目前为止，我们已经介绍了 Docker 的基本概念，并演示了如何开始构建和运行
  Oracle 数据库镜像。如果您的目标仅限于在本地环境中运行一个简单的数据库，这些已经足够了。在本章中，我将介绍容器与传统数据库平台的一些不同之处。理解这些概念对于将容器集成到您的实践中，并使其适应和定制以满足您当前和未来的需求至关重要。


  在我们开始修改之前，了解 Oracle 容器中的环境与在 Linux 系统上原生运行的“普通”数据库环境有何不同至关重要。为此，我们将检查从 Oracle 仓库构建的默认容器，并探索使其与众不同的独特方面和特性。


  已经熟悉容器但尚未运行容器化 Oracle 数据库的读者应从本节开始。有些概念可能很熟悉，但了解 Oracle 数据库如何在容器中适配和实现是很有价值的。


  ### 启动一个 Oracle 数据库容器


  我们将从一个使用 Oracle 的 GitHub 脚本 ([`https://github.com/oracle/docker-images`](https://github.com/oracle/docker-images))
  构建的基础容器开始，使用一个非常基础的命令：


  ```

  > docker run -d --name ORCL oracle/database:19.3.0-ee

  ```


  让我们分解这个命令以便更好地理解：


  *   `docker run`：指示 Docker “运行”一个镜像

  *   `-d` 标志：通知 Docker 我们希望在后台*分离*（非交互式）运行容器

  *   `--name` 标志：为容器分配一个名称 *ORCL*

  *   `oracle/database:19.3.0-ee`：指定 Docker 将使用的镜像


  Docker 会返回一个标识该容器的唯一哈希值：


  ```

  > docker run -d --name ORCL oracle/database:19.3.0-ee

  8facfd649aa4fcdbf27ae6908a573c2a16db0be7cba73c3093593507ac12b93f

  ```


  这并没有告诉我们太多信息！`docker logs` 命令报告容器内部发生的情况。在清单 5-1 中，我运行了 `docker logs`，传递了容器名称以及一个可选标志
  `-f`，以主动“跟踪”进度并查看实时发生的事件。如果没有这个标志，Docker 将仅报告日志中最近的几行。


