  \n## 终端环境\n\n与 Docker 的大多数交互都发生在命令行或 Shell 中。您需要一个 *终端程序* 来访问主机上的命令行，而每个操作系统上都有很多选择。\n\
  \n### Windows\n\nWindows 操作系统包含 PowerShell 和熟悉的 Windows 命令提示符。来自 Microsoft 的第三个选项，Windows\
  \ Terminal，结合了这两个工具，并增加了对 Windows Subsystem for Linux 的集成。我最近开始使用它，非常满意——它现在是我在\
  \ Windows 系统上最喜欢的新 Shell，取代了 PuTTY 和 MobaXterm！本书中的所有 Windows Shell 示例都是从 Windows\
  \ Terminal 截取的。\n\n本书中给出的命令行示例在通过 Windows Terminal 访问的 Linux Shell 中可以无缝运行。命令提示符、PowerShell、PuTTY\
