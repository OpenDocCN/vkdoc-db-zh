  企业版仓库中所有可用版本的标签列表


  每个标签代表一个不同的版本，并有各自独立的 `docker pull` 命令。


  请注意，版本 12.2.0.1 有两个标签。第二个带有 `-slim` 后缀，是经过精简至最低功能的版本。这在容器镜像中很常见。将镜像精简到最低限度可以节省空间并减小容器的受攻击面——您无法攻击不存在的软件和功能。如果您只需要基本功能，标记为
  `-slim` 的标签值得考虑。


  最后需要注意的是大小。图 4-3 显示 19.3.0.0 标签的镜像为 3GB，但那是压缩后的下载大小。清单 4-2 报告了 19c 镜像的实际大小，为 7.87GB。


  #### 运行预构建镜像


  下载完成后，按照文档页面的说明操作，或者直接跳转到“运行容器”一节。此注册表中的镜像使用了下一节讨论的相同脚本，相同的功能*应该*能够工作。容器注册表镜像不经常更新。Oracle
  的 Docker 仓库则持续更新着新特性和功能。虽然可能性不大，但从当前脚本仓库构建的镜像有可能会有不同的行为。


  #### 预构建镜像的限制


  Oracle 容器注册表提供的镜像虽便捷，但牺牲了多样性和功能。就像冷冻披萨，您无法更改配料。对于预构建镜像，您无法更改镜像中内置的某些功能。为了说明预构建镜像为何可能无法满足您的需求，让我们看两个限制：编辑器和多租户。


  在桌面或笔记本电脑系统上通过 Docker 运行 Oracle 非常方便。拥有一个可用于开发、测试和实验的“一次性”数据库很方便，对大多数人来说，这包括能够查看和编辑文件。


  用户可能会惊讶地发现，Oracle 的数据库镜像不包含文本编辑器，唯一的内置文件查看器是 `more`。这是有意为之——请记住，容器通常运行服务而非交互式会话，不需要编辑器或文件查看器。省略不必要的软件可以使容器更小，并减小其受攻击面。


  在构建镜像时，编辑器（和其他实用程序）被排除在外。我们无法更改镜像；手动安装额外的软件是唯一的选择。手动更新容器并不困难，也不耗时，直到您发现自己每次运行新容器时都要这么做！采用容器的原因之一是其能够提供已包含依赖项的自包含环境。手动更新每个容器与此目的背道而驰。


  虽然您可能认为添加编辑器并不是一个构建自己镜像的充分理由，但在容器中创建的数据库类型可能是一个理由。


  当 Oracle 数据库容器启动时，它会检查是否已有一个数据库。如果没有，它会运行 `数据库配置助手` (`DBCA`) 并创建一个新的 `容器数据库` (CDB)，其中包含一个
  `可插拔数据库` (PDB)。CDB 和 PDB 至今仍未被广泛采用，对于那些想要传统的、非 CDB 数据库的用户来说，替代方案是删除 DBCA 创建的数据库并手动创建一个。


  然而，从脚本构建镜像可以修改 Docker 的指令以包含编辑器、编辑用于创建数据库的响应文件等。您可能会发现，这种增加的控制权值得花费额外几分钟来构建自己的镜像。


  #### 从仓库构建镜像


  Oracle 脚本仓库的作者们使其脚本仓库的镜像构建变得简单。一个封装脚本处理了繁重的工作。用户只需下载仓库，将 Oracle 数据库安装文件放入一个目录，然后运行脚本。


  该仓库包含用于构建以下版本镜像的脚本：


  *   Oracle 11.2.0.2 快捷版

  *   Oracle 12.1.0.2 企业版、标准版 2

  *   Oracle 12.2.0.1 企业版、标准版 2

  *   Oracle 18.3.0 企业版、标准版 2

  *   Oracle 18.4.0 快捷版

  *   Oracle 19.3.0 企业版、标准版 2


  以下示例使用 Oracle 19c。步骤与其他版本类似。


