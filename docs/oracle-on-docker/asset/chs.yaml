  这是有意为之的。`cron` 是一个系统进程，而容器期望宿主机操作系统来处理它们。虽然二进制文件存在于容器文件系统中——甚至是可执行的——但容器内没有运行的系统进程来识别和执行作业。


  容器中缺乏运行的 `init.d` 或 `system.d` 进程引发了合理的担忧，特别是对于 Oracle 数据库。我们如何在容器中安排备份？更进一步，像 *Oracle
  Grid Infrastructure*、*Oracle Real Application Clusters* 和 *Oracle Restart* 这些严重依赖
  `init.d` 或 `system.d` 的产品，在容器中如何工作？幸运的是，有办法为容器添加此功能。


  现在让我们重新审视之前遇到的 `vi` 编辑器问题，看看它为什么缺失！



  #### 二进制文件


  容器通常被大规模部署。较小的容器能最大化基础设施容量，并减少跨网络复制的时间。构建容器镜像的目标是剔除任何不必要的组件。像`vi`这样的编辑器并非必需。


  没有编辑器，如何在容器中更改文件？简单的答案是，在*大多数*容器中并不这样做。与虚拟和物理主机不同，镜像提供了即用型文件系统，用于执行特定的服务或功能。它们并非多用途的交互式系统。如果需要编辑某些内容，这将在构建过程中完成并固化到镜像中，而不是在容器运行之后。如果需要修改容器中的文件，像`sed`这样对自动化友好的编辑器是更合适的选择。


  你在第[3]章中了解到，在容器中所做的更改会写入联合文件系统的一个层中。联合文件系统评估上下层之间的差异，并将结果投射到容器中。除了在容器层中增加空间外，计算这些差异还需要
  CPU，而在容器中限制更改会影响性能。


  这不仅仅关乎空间和性能。你会发现，容器镜像中缺少的二进制文件和工具远不止编辑器。任何不必要的东西都会增加一个*攻击面*，恶意行为者可能加以利用。攻击者无法利用不存在的东西。


  系统的攻击面是未经授权的用户可能用来获取系统访问权限的潜在向量或点的集合。限制安装在容器上的软件可以减少攻击者可用的资源，并凸显了容器与物理或虚拟主机之间的另一个区别。完整的操作系统往往包含用户*可能*需要的工具和实用程序。容器镜像的范围更有限，只包含必需的内容。


  用于 Docker 的 Linux 发行版通常提供“*-slim*”选项，表示精简版发行版。没有约定明确界定精简版包含或不包含（或更准确地说，排除）什么，这在供应商和版本之间各不相同。面向生产的镜像通常从一个精简版开始，然后添加必要的内容。正如我们将在第[12]章中看到的，Oracle
  的数据库镜像也遵循这一做法，使用 Oracle Enterprise Linux 7 的“slim”发行版作为基础。


  对我们大多数人来说，将数据库放入容器的第一个用例涉及一些交互，这意味着需要编辑器和诊断工具。幸运的是，修改构建脚本以包含二进制文件很容易，这将在下一章中讨论。


