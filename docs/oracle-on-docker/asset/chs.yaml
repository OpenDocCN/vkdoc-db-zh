  #### Oracle 数据库软件


  为了让 Docker 在镜像中安装 Oracle 数据库，它需要数据库软件安装文件。对于 Oracle 19c，该文件可从 [`www.oracle.com/database/technologies/oracle-database-software-downloads.html`](http://www.oracle.com/database/technologies/oracle-database-software-downloads.html)
  获取。其他版本^(²⁵) 可从 My Oracle Support (`support.oracle.com`) 或 Oracle Software Delivery
  Cloud (`edelivery.oracle.com`) 获取。


  无论您选择哪个版本，*务必下载适用于 Linux x86-64 的安装程序*。主机操作系统无关紧要——无论是在 Windows 还是 Mac 上运行，Docker
  Desktop 都使用 Linux VM，容器在 Linux 中运行。如果存在，请务必下载 ZIP 文件而不是 RPM 文件。图 4-5 显示了下载页面的相关部分，突出显示了选择
  Oracle Database 19c 的操作系统和下载选项。


  ![](img/514143_1_En_4_Fig5_HTML.jpg)


  19.3 企业版窗口的截图显示了下载页面的相关部分，突出显示了选择 Oracle Database 19c 的操作系统和下载选项。


  图 4-5


  Oracle 19c Database 安装程序的 Linux x86-64 ZIP 文件下载


  下载文件或将其复制到仓库中与数据库版本匹配的子目录中。对于 Oracle Database 19.3.0，安装文件需要复制到 `OracleDatabase/SingleInstance/dockerfiles/19.3.0`。^(²⁶)


  **注意**


  *不要解压安装文件！* Docker 的构建过程会查找 ZIP 文件并将其复制到其*构建上下文*中。构建会运行中间容器来完成工作，包括解压安装文件。


