  ### 脚本修改的解释\n\n在修改后的脚本中需要注意的一点是，`dbca` 命令中使用了 `-autoGeneratePasswords` 而不是固定密码。这与在新的容器中创建数据库的事件序列有关：\n\
  \n*   容器启动并执行 `runOracle.sh`。\n*   `runOracle.sh` 检查是否存在现有数据库，但没有找到。它调用 `createDB.sh`\
  \ 并将 `ORACLE_PWD` 的值传递给该脚本。除非作为 `docker run` 命令的一部分显式设置，或者通过 Podman secret 传递，否则\
  \ `ORACLE_PWD` 不会被导出或存在于环境中⁷²。\n*   `createDB.sh` 创建数据库。对于密码，它首先检查是否存在 Oracle Wallet，如果存在则使用钱包中的值。如果不存在，并且从\
  \ `runOracle.sh` 传递过来的 `ORACLE_PWD` 值不为空，则使用该值。否则，它指示 Database Configuration Assistant\
  \ 生成一个密码。\n*   完成后，`createDB.sh` 将控制权交还给 `runOracle.sh`。\n*   `runOracle.sh` 接下来调用\
  \ `runUserScripts.sh`，但没有传递 `ORACLE_PWD` 的值。\n*   `runUserScripts.sh` 发现 `01_add_pdb.sh`\
  \ 脚本并运行它。\n\n由于 Linux shell 的工作方式，`ORACLE_PWD` 变量不能保证在 `runOracle.sh` 和 `createDB.sh`\
  \ 脚本之外还有值。如果没有值，`-pdbAdminPassword \"$ORACLE_PWD\"` 会产生错误。为了简单和简洁，我让 PDB 创建自动生成\
  \ PDB 密码。添加类似于 `createDB.sh` 中的逻辑，检查钱包和 Podman secret 的存在，将进一步改进该脚本。\n\n### 创建只读数据库主目录\n\
  \nOracle Database 18c 新增了创建*只读数据库主目录*的选项，该选项将配置文件从 Oracle 数据库软件目录中移除。在旧版 Oracle\
  \ 中，`ORACLE_HOME` 混合了软件和配置。`ORACLE_HOME/dbs` 目录是密码文件和数据库启动时使用的参数文件的默认位置。`ORACLE_HOME/network/admin`\
  \ 目录存放网络配置文件，包括 `listener.ora`、`sqlnet.ora` 和 `tnsnames.ora` 文件。当数据库主目录支持多个实例时，这些特定于数据库的文件并未很好隔离，容易因另一个数据库的操作而被混淆或覆盖。这个缺点在\
  \ Docker 将配置文件从数据库主目录移动并复制到 `/opt/oracle/oradata/dbconfig` 下的特殊目录时表现得尤为明显。这对于从普通目录备份克隆数据库至关重要，如第\
  \ 5 章所述。\n\n随着只读主目录的引入，需要跟踪有关主目录的信息。Oracle 将此记录在一个名为 `orabasetab` 的特殊文件中。它仿照 `/etc/oratab`\
  \ 文件，位于 `$ORACLE_HOME/install/orabasetab`。在传统的、读写主目录中，该文件内容如下：\n\n```bash\n#orabasetab\
  \ file is used to track Oracle Home associated with Oracle Base\n/opt/oracle/product/19c/dbhome_1:/opt/oracle:OraDB19Home1:N:\n\
  ```\n\n各个字段以冒号分隔，反映了主目录的不同属性。顺序为：\n\n1.  `ORACLE_HOME` 目录，`/opt/oracle/product/19c/dbhome_1`。\n\
  2.  主目录使用的 `ORACLE_BASE`，`/opt/oracle`。\n3.  唯一的 Oracle 主目录名称，在安装时分配，`OraDB19Home1`。\n\
  4.  主目录的只读状态，由 `Y` 或 `N` 表示。\n\n该文件的第四字段设置为 `N`，意味着此主目录不是只读的，其配置文件位于“常规”位置。只读主目录中的数据库和网络配置文件从\
  \ `ORACLE_HOME` 移动到 `ORACLE_BASE` 下的新位置。两个新的环境变量，`ORACLE_BASE_CONFIG` 和 `ORACLE_BASE_HOME`，用于跟踪这些目录，它们默认为：\n\
  \n```bash\nORACLE_BASE_CONFIG=$ORACLE_BASE\nORACLE_BASE_HOME=$ORACLE_BASE/homes/\n\
  ```\n\n`$ORACLE_BASE_HOME` 中的 `HOME NAME` 是 `orabasetab` 中的第三个字段。基于前面的例子，代入 `orabasetab`\
  \ 中的值，就可以揭示如果这是一个只读主目录，配置文件的基本位置：\n\n```bash\nORACLE_BASE_CONFIG=/opt/oracle\nORACLE_BASE_HOME=/opt/oracle/homes/OraDB19Home1\n\
  ```\n\n原来存在于 `$ORACLE_HOME/dbs` 下的所有内容——参数文件、服务器参数文件和密码文件——都移动到 `$ORACLE_BASE_CONFIG/dbs`。之前存储在\
  \ `$ORACLE_HOME/network/admin` 的文件——TNS、SQL*Net 和侦听器文件——则重新定位到 `$ORACLE_BASE_HOME/network/admin`。\n\
  \n`ORACLE_BASE_CONFIG` 和 `ORACLE_BASE_HOME` 环境变量是可选的，Oracle 提供了两个新的二进制文件来报告它们的位置：\n\
  \n*   `orabaseconfig`，用于报告 `ORACLE_BASE_CONFIG`\n*   `orabasehome`，用于报告 `ORACLE_BASE_HOME`\n\
  \n它们通过检查 `orabasetab` 中的第四字段（只读主目录字段）来推导正确的位置。通过这两个环境变量，我们可以推断出数据库主目录中数据库配置的正确路径，无论主目录类型如何。在任何数据库中了解这些目录都很重要，但在容器环境中至关重要，因为它们包含的配置文件必须重新定位到挂载到\
  \ `/opt/oracle/oradata` 的卷中，以保留容器的完整功能和能力。请记住，该卷保存了数据库的完整内容——包括其配置——我们开始意识到，修改容器镜像以包含“只读主目录”选项涉及：\n\
  \n*   执行将数据库软件目录转换为只读主目录的操作\n*   为配置文件设置正确的目录路径\n*   更新脚本，以便在引用配置时使用正确的目标位置\n\n\
  #### 将数据库主目录转换为只读\n\n单个命令 `$ORACLE_HOME/bin/roohctl -enable`（用于只读 Oracle 主目录控制）可以将\
  \ 21c 之前的数据库主目录转换为只读。它在安装数据库软件后、创建数据库之前执行。在 Docker 生命周期中有两个机会运行此命令：\n\n*   在镜像创建期间，遵循数据库软件安装步骤之后\n\
  *   启动新的数据库容器时，在创建数据库之前\n\n在镜像创建期间将 `ORACLE_HOME` 转换为只读，会强制从该镜像运行的每个容器都使用只读主目录。将此选项留到运行时则为我们的容器提供了更大的灵活性，这也是这里采用的解决方案。\n\
  \n正如您可能猜到的那样，我们将通过检查运行时环境变量来控制是否转换主目录。我使用 `ROOH`：\n\n```bash\n# Enable read-only\
  \ Oracle Home:\nif [ \"${ROOH^^}\" = \"ENABLE\" ]\nthen $ORACLE_HOME/bin/roohctl\
  \ -enable\nfi\n```\n\n此命令从环境中读取 `ROOH` 的值，并使用 bash 变量扩展（`^^` 字符）将其转换为大写。当结果匹配 `ENABLE`\
  \ 时，脚本将主目录转换为只读。将此命令放在 `createDB.sh` 脚本中，在文件开头附近，在任何运行 Database Configuration Assistant\
  \ 的操作之前。（我将其放在检查 `INIT_SGA_SIZE` 和 `INIT_PGA_SIZE` 之前。）\n\n#### 解析配置目录\n\n我们将使用\
  \ Oracle 新增的两个用于报告配置目录的二进制文件：`orabaseconfig` 和 `orabasehome`。在读写主目录中，它们默认为 `ORACLE_HOME`，但在只读主目录中，它们会报告其在\
  \ `ORACLE_BASE` 下的新位置。无论主目录类型是只读还是读写，我们都使用这些命令在脚本中为 `ORACLE_BASE_CONFIG` 和 `ORACLE_BASE_HOME`\
  \ 分配正确的值。由于我们将重复执行此操作，我选择创建一个函数：\n\n```bash\nfunction setOracleBaseDirs {\nexport\
  \ ORACLE_BASE_CONFIG=\"$($ORACLE_HOME/bin/orabaseconfig)\"\nexport ORACLE_BASE_HOME=\"\
  $($ORACLE_HOME/bin/orabasehome)\"\n}\n```\n\n该函数应出现在 `createDB.sh` 和 `runOracle.sh`\
  \ 脚本的顶部，在任何调用 `setOracleBaseDirs` 来填充配置目录的其他函数之前。\n\n\n#### 更新脚本\n\n现有仓库仅预设了一个可读写的主目录，并依赖“旧”的默认路径\
  \ `ORACLE_HOME` 来存放其所有配置文件。我们需要将它们更改为使用新的引用路径：\n\n*   `$ORACLE_HOME/dbs` 更改为 `$ORACLE_BASE_CONFIG/dbs`。\n\
  *   `$ORACLE_HOME/network/admin` 更改为 `$ORACLE_BASE_HOME/network/admin`。\n\n在 `createDB.sh`\
  \ 中，这些路径出现在两个函数里：`setupNetworkConfig` 和 `setupTnsnames`。代码清单 13-5 展示了我所做的修改，在每个函数的开始调用\
  \ `setOracleBaseDirs` 并使用新的变量。\n\n```\n############## Set the ORACLE_BASE_CONFIG\
  \ and ORACLE_BASE_HOME variables ##############\nfunction setOracleBaseDirs {\n\
  export ORACLE_BASE_CONFIG=\"$($ORACLE_HOME/bin/orabaseconfig)\"\nexport ORACLE_BASE_HOME=\"\
  $($ORACLE_HOME/bin/orabasehome)\"\n}\n############## Setting up network related\
  \ config files (sqlnet.ora, listener.ora) ##############\nfunction setupNetworkConfig\
  \ {\nsetOracleBaseDirs\nmkdir -p \"$ORACLE_BASE_HOME\"/network/admin\n# sqlnet.ora\n\
  echo \"NAMES.DIRECTORY_PATH= (TNSNAMES, EZCONNECT, HOSTNAME)\" > \"$ORACLE_BASE_HOME\"\
  /network/admin/sqlnet.ora\n# listener.ora\necho \"LISTENER =\n(DESCRIPTION_LIST\
  \ =\n(DESCRIPTION =\n(ADDRESS = (PROTOCOL = IPC)(KEY = EXTPROC1))\n(ADDRESS = (PROTOCOL\
  \ = TCP)(HOST = 0.0.0.0)(PORT = 1521))\n)\n)\nDEDICATED_THROUGH_BROKER_LISTENER=ON\n\
  DIAG_ADR_ENABLED = off\n\" > \"$ORACLE_BASE_HOME\"/network/admin/listener.ora\n\
  }\n####################### Setting up tnsnames.ora ###########################\n\
  function setupTnsnames {\nsetOracleBaseDirs\nmkdir -p \"$ORACLE_BASE_HOME\"/network/admin\n\
  # tnsnames.ora\necho \"$ORACLE_SID=localhost:1521/$ORACLE_SID\" > \"$ORACLE_BASE_HOME\"\
  /network/admin/tnsnames.ora\necho \"$ORACLE_PDB=\n(DESCRIPTION =\n(ADDRESS = (PROTOCOL\
  \ = TCP)(HOST = 0.0.0.0)(PORT = 1521))\n(CONNECT_DATA =\n(SERVER = DEDICATED)\n\
  (SERVICE_NAME = $ORACLE_PDB)\n)\n)\" >> \"$ORACLE_BASE_HOME\"/network/admin/tnsnames.ora\n\
  }\nListing 13-5\n`setOracleBaseDirs` 函数为变量分配适当的值。它在两个网络设置函数中被使用，对 `ORACLE_HOME/network/admin`\
  \ 的引用更改为 `ORACLE_BASE_HOME/network/admin`，以适配只读主目录。\n```\n\n我对代码清单 13-6 中的 `runOracle.sh`\
  \ 进行了类似的修改，添加了新函数并更新了三个辅助函数 `moveFiles`、`symLinkFiles` 和 `undoSymLinkFiles` 中对 `ORACLE_HOME/dbs`\
  \ 和 `ORACLE_HOME/network/admin` 的引用。\n\n```\n############## Set the ORACLE_BASE_CONFIG\
  \ and ORACLE_BASE_HOME variables ##############\nfunction setOracleBaseDirs {\n\
  export ORACLE_BASE_CONFIG=\"$($ORACLE_HOME/bin/orabaseconfig)\"\nexport ORACLE_BASE_HOME=\"\
  $($ORACLE_HOME/bin/orabasehome)\"\n}\n########### Move DB files ############\nfunction\
  \ moveFiles {\nsetOracleBaseDirs\nif [ ! -d \"$ORACLE_BASE\"/oradata/dbconfig/\"\
  $ORACLE_SID\" ]; then\nmkdir -p \"$ORACLE_BASE\"/oradata/dbconfig/\"$ORACLE_SID\"\
  /\nfi;\nmv \"$ORACLE_BASE_CONFIG\"/dbs/spfile\"$ORACLE_SID\".ora \"$ORACLE_BASE\"\
  /oradata/dbconfig/\"$ORACLE_SID\"/\nmv \"$ORACLE_BASE_CONFIG\"/dbs/orapw\"$ORACLE_SID\"\
  \ \"$ORACLE_BASE\"/oradata/dbconfig/\"$ORACLE_SID\"/\nmv \"$ORACLE_BASE_HOME\"/network/admin/sqlnet.ora\
  \ \"$ORACLE_BASE\"/oradata/dbconfig/\"$ORACLE_SID\"/\nmv \"$ORACLE_BASE_HOME\"/network/admin/listener.ora\
  \ \"$ORACLE_BASE\"/oradata/dbconfig/\"$ORACLE_SID\"/\nmv \"$ORACLE_BASE_HOME\"/network/admin/tnsnames.ora\
  \ \"$ORACLE_BASE\"/oradata/dbconfig/\"$ORACLE_SID\"/\nmv \"$ORACLE_HOME\"/install/.docker_*\
  \ \"$ORACLE_BASE\"/oradata/dbconfig/\"$ORACLE_SID\"/\n# oracle user does not have\
  \ permissions in /etc, hence cp and not mv\ncp /etc/oratab \"$ORACLE_BASE\"/oradata/dbconfig/\"\
  $ORACLE_SID\"/\nsymLinkFiles;\n}\n########### Symbolic link DB files ############\n\
  function symLinkFiles {\nsetOracleBaseDirs\nif [ ! -L \"$ORACLE_BASE_CONFIG\"/dbs/spfile\"\
  $ORACLE_SID\".ora ]; then\nln -s \"$ORACLE_BASE\"/oradata/dbconfig/\"$ORACLE_SID\"\
  /spfile\"$ORACLE_SID\".ora \"$ORACLE_BASE_CONFIG\"/dbs/spfile\"$ORACLE_SID\".ora\n\
  fi;\nif [ ! -L \"$ORACLE_BASE_CONFIG\"/dbs/orapw\"$ORACLE_SID\" ]; then\nln -s \"\
  $ORACLE_BASE\"/oradata/dbconfig/\"$ORACLE_SID\"/orapw\"$ORACLE_SID\" \"$ORACLE_BASE_CONFIG\"\
  /dbs/orapw\"$ORACLE_SID\"\nfi;\nif [ ! -L \"$ORACLE_BASE_HOME\"/network/admin/sqlnet.ora\
  \ ]; then\nln -s \"$ORACLE_BASE\"/oradata/dbconfig/\"$ORACLE_SID\"/sqlnet.ora \"\
  $ORACLE_BASE_HOME\"/network/admin/sqlnet.ora\nfi;\nif [ ! -L \"$ORACLE_BASE_HOME\"\
  /network/admin/listener.ora ]; then\nln -s \"$ORACLE_BASE\"/oradata/dbconfig/\"\
  $ORACLE_SID\"/listener.ora \"$ORACLE_BASE_HOME\"/network/admin/listener.ora\nfi;\n\
  if [ ! -L \"$ORACLE_BASE_HOME\"/network/admin/tnsnames.ora ]; then\nln -s \"$ORACLE_BASE\"\
  /oradata/dbconfig/\"$ORACLE_SID\"/tnsnames.ora \"$ORACLE_BASE_HOME\"/network/admin/tnsnames.ora\n\
  fi;\n# oracle user does not have permissions in /etc, hence cp and not ln\ncp \"\
  $ORACLE_BASE\"/oradata/dbconfig/\"$ORACLE_SID\"/oratab /etc/oratab\n}\n###########\
  \ Undoing the symbolic links ############\nfunction undoSymLinkFiles {\nsetOracleBaseDirs\n\
  if [ -L \"$ORACLE_BASE_CONFIG\"/dbs/spfile\"$ORACLE_SID\".ora ]; then\nrm \"$ORACLE_BASE_CONFIG\"\
  /dbs/spfile\"$ORACLE_SID\".ora\nfi;\nif [ -L \"$ORACLE_BASE_CONFIG\"/dbs/orapw\"\
  $ORACLE_SID\" ]; then\nrm \"$ORACLE_BASE_CONFIG\"/dbs/orapw\"$ORACLE_SID\"\nfi;\n\
  if [ -L \"$ORACLE_BASE_HOME\"/network/admin/sqlnet.ora ]; then\nrm \"$ORACLE_BASE_HOME\"\
  /network/admin/sqlnet.ora\nfi;\nif [ -L \"$ORACLE_BASE_HOME\"/network/admin/listener.ora\
  \ ]; then\nrm \"$ORACLE_BASE_HOME\"/network/admin/listener.ora\nfi;\nif [ -L \"\
  $ORACLE_BASE_HOME\"/network/admin/tnsnames.ora ]; then\nrm \"$ORACLE_BASE_HOME\"\
  /network/admin/tnsnames.ora\nfi;\n}\nListing 13-6\n更新 `runOracle.sh` 脚本以处理只读和可读写主目录中的变量目录路径\n\
  ```\n\n\n#### 使用只读主目录运行容器\n\n前面的脚本更改仅存在于仓库中。我们需要重建或重新创建镜像，才能使修改后的脚本对新容器可用。导航到 `docker-images/OracleDatabase/SingleInstance/dockerfiles`\
  \ 目录并运行 `buildContainerImage.sh` 脚本，以使用新的脚本版本重建镜像：\n\n```\n./buildContainerImage.sh\
