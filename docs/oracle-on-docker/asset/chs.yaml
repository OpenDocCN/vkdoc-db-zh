  '
- "# docker run\n\n到目前为止，示例中用于创建 ORCL 数据库容器的命令是：\n\n```bash\ndocker run -d --name\
  \ ORCL oracle/database:19.3.0-ee\n```\n\n一旦创建，它的环境就是静态的，至少从自动化的角度来看是这样。我可以在容器中打开一个会话并设置环境变量，但这些变量不会改变元数据中的环境值。正是这个元数据，是启动脚本每次容器启动时都会看到和读取的。改变元数据的唯一机会（可能覆盖镜像中存在的默认值）是在容器创建期间。（这对于卷和网络等其他容器属性也是如此，我们将在后面的章节中看到。）\n\
  \n有几种方法可以将环境变量^(⁴⁰)传递给 `docker run` 命令：通过命令行、宿主环境或文件。每种方法都将一个值传递给容器的元数据，使其可供脚本（包括启动命令）和进程使用。\n\
  \n## 命令行选项\n\n使用 `-e` 标志或其长格式 `--env` 标志，后跟一个 `key=value` 对，例如：\n\n```bash\ndocker\
  \ run ... -e ORACLE_SID=TEST ...\ndocker run ... --env ORACLE_PDB=TESTPDB1 ...\n\
  ```\n\n为每个值分别使用 `-e` 标志来传递多个值：\n\n```bash\ndocker run ... -e ORACLE_SID=TEST -e\
  \ ORACLE_PDB=TESTPDB1 ...\n```\n\n值（等号后的部分）也可以是来自本地环境的变量。这对于配置多个容器很有用。列表 6-5 展示了一个在\
  \ Linux 环境中使用 `for 循环` 从值列表（DEV、TEST 和 STAGE）部署多个容器的示例——为每个容器从循环变量分配一个不同的数据库名称。\n\
  \n```bash\nfor dbname in DEV TEST STAGE\ndo docker run -d --name $dbname -e ORACLE_SID=$dbname\
  \ oracle/database:19.3.0-ee\ndone\n```\n*列表 6-5. 自动部署三个 Oracle 19c 数据库容器，从环境为每个容器传递\
  \ ORACLE_SID。*\n\n### 来自文件的值\n\n环境文件是文本文件，每个 `key=value` 对占一行，这样更容易与 `docker run`\
  \ 共享多个值。Docker 将以井号 (`#`) 开头的行视为注释而忽略。调用 `docker run` 时，使用 `--env-file` 选项和文件名。列表\
  \ 6-6 展示了一个 Oracle 数据库的示例环境文件，名为 `db.env`，以及在 `docker run` 命令中使用 `--env-file` 选项的示例。\n\
  \n```dockerfile\nORACLE_SID=TEST\nORACLE_PDB=TESTPDB1\nORACLE_EDITION=EE\nENABLE_ARCHIVELOG=true\n\
  ```\n*列表 6-6. 用于向 docker run 传递多个键值对的环境文件示例。*\n\n将该文件传递给 `docker run` 的 `--env-file`\
  \ 选项，会将文件中列出的变量填充到容器环境中：\n\n```bash\n> docker run ... --env-file db.env ...\n```\n\
  \n### 来自主机环境的值\n\n有一种特殊情况是共享来自主机的环境变量到容器。如果主机上存在一个变量，其名称与容器中的变量相同，则只需提供变量名（不带等号或值）。这对于命令行和环境文件选项都适用。\n\
  \n在列表 6-7 中，我通过将循环变量从 `dbname` 更改为 `ORACLE_SID` 修改了之前的循环示例。因为容器有一个匹配的变量，所以我可以单独使用该变量名。Docker\
  \ 会为我解释该变量和值^(⁴¹)。\n\n```bash\nfor ORACLE_SID in DEV TEST STAGE\ndo docker run -d\
  \ --name $ORACLE_SID -e ORACLE_SID oracle/database:19.3.0-ee\ndone\n```\n*列表 6-7.\
  \ 使用主机变量对容器进行隐式变量赋值。*\n\n在这种情况下，不需要写成 `ORACLE_SID=$ORACLE_SID`。要在环境文件中使用主机变量，请在单独一行中包含该变量，不带等号或值。Docker\
  \ 会从主机环境中读取该值。\n\n### 覆盖和创建变量\n\n使用 `docker run` 赋值变量会覆盖来自镜像的值。参考列表 6-3 和 6-4，其中列出了示例容器从其父容器继承的变量和值。如果我发出一个略有不同的命令并创建一个新容器，如列表\
