  ## 3. 容器基础


  在上一章中，我介绍了一些 Docker 术语和概念。本章将以此为基础，通过更多实用、动手操作的示例，帮助您直观地理解 Docker、它如何工作以及为何如此流行。


  除了介绍基本的 Docker 命令外，我还想介绍镜像和容器的基本概念。镜像是*不可变的*（`immutable`），容器是*短暂的*（`ephemeral`）和*持久的*（`persistent`）。我犹豫是否要打出这些词，因为我知道它们听起来多么学术和枯燥！在我开始容器之旅时，我承认我曾努力去理解这些想法或欣赏其重要性。大约一年后，我看到了它们的演示，其中的方式和原因立刻变得显而易见！我将尽力重现那些“啊哈！”时刻，并（希望）让您免于重复我的挣扎！


  如果您已经熟悉容器和这些概念，请随时转到第 4 章。如果没有，我鼓励您额外花点时间，在您的环境中跟随本章的示例操作，因为有一件事您无法从印刷页面上获取。


  *速度。*


  我可以告诉您容器很快，或者大峡谷很大，但有些事情最好通过*亲眼所见*来体会。


  如果您尚未安装 `Docker Desktop`，请从 [www.docker.com/products/docker-desktop](http://www.docker.com/products/docker-desktop)
  下载并安装。下一章详细介绍了如何在 Mac 和 Windows 上安装 `Docker Desktop`，以及如何在 Linux 系统上配置 Docker。


  ### Docker 命令行概览


  Docker 命令行指令以 `docker` 关键字开头。命令列表相对简短，而且在很大程度上，它们是简单明了的，即使对于新手也是如此。`docker start`
  启动一个容器；`docker logs` 显示容器日志；`docker run` 运行容器；依此类推。


  Docker 有一些同义命令。例如，`docker container run` 和 `docker run` 是同一个命令，`docker image ls`^(¹⁶)
  和 `docker images` 也是。Docker 社区倾向于在有同义词时使用较短的那个选项。我在本书中也将这样做。


  Docker 的替代品，如 Podman，包含别名指向其对应 Docker 命令的命令。我曾在安装了 Podman 而非 Docker 的环境中工作过，一些用户（包括系统管理员）多年都没有注意到！


  您总是可以通过在提示符下输入 `docker --help`（或仅 `docker`）来列出所有命令，并通过键入 `docker <COMMAND> --help`
  获取单个命令的详细信息。（附录包含一组常用命令，以及运行 Docker 和 Oracle 的示例和配方。）


  ### 运行您的第一个容器


  在开始运行 Oracle 数据库之前，让我们使用流行的 Linux 发行版 Ubuntu 来介绍一些基础知识。这提供了一个机会，让您实际操作 Docker，探索镜像和容器背后的一些概念，熟悉
  Docker 命令，并展示容器环境的基本属性。


  #### 列出镜像


  在您安装了 `Docker Desktop` 的计算机上打开一个 shell 会话，并通过运行 `docker images` 显示系统上可用的镜像。您的输出将显示一个标题但没有容器：


  ```

  > docker images

  REPOSITORY   TAG       IMAGE ID   CREATED   SIZE

  ```


  没有任何列表，表明系统上没有镜像。回想一下，镜像类似于模板，容器是运行镜像的产物。在运行容器之前，我们需要一个镜像。



  ##### 运行容器


  即使系统中没有镜像，我们能运行一个容器吗？让我们来检查一下！在 shell 提示符下发出以下命令以运行一个 Ubuntu Linux 容器：


  ```

  docker run -it ubuntu

  ```


  这会运行一个 Ubuntu Linux 镜像。这些标志告诉 Docker 使用标准输入以*交互*模式运行容器，并分配一个*TTY*。或者更简单地说，“启动一个容器并给我一个提示符”。`-it`
  标志或修饰符是 `--interactive` 和 `--tty` 的快捷方式（而且打字快得多）。


  即使系统上原来没有镜像，该命令也已成功完成。你应该会看到类似这样的输出：


  ```

  > docker run -it ubuntu

  Unable to find image ''ubuntu:latest'' locally

  latest: Pulling from library/ubuntu

  7b1a6ab2e44d: Pull complete

  Digest: sha256:626ffe58f6e7566e00254b638eb7e0f3b11d4da9675088f4781a50ae288f3322

  Status: Downloaded newer image for ubuntu:latest

  root@4a9ddd43e0e2:/#

  ```


  让我们分解一下输出，看看 Docker 做了什么：


  *   正如预期，Docker 在本地找不到 Ubuntu 镜像。

  *   由于没有本地镜像源，它“拉取”（*pulled*）或下载了一个镜像（我稍后会说明它来自哪里）。

  *   Docker 报告了它拉取的镜像的哈希值及其状态。

  *   它显示了一个提示符。


  所有这些只花了一小会儿时间。


  最后一行是 `root` 用户的 Linux 提示符，以及我们请求的交互式 TTY 会话，显示 `root` 用户已登录到主机 `4a9ddd43e0e2`，并显示了当前目录。


  #### 探索容器


  命令提示符看起来像是登录到了物理 Linux 主机或虚拟机。让我们通过运行一些命令来查询环境以确认这一点：


  ```

  whoami

  id

  echo $$

  head -2 /etc/os-release

  ```


  `whoami` 和 `id` 的输出确认我们是 `root` 用户。`echo $$` 的结果（显示当前会话的进程 ID 或 PID）表明我们的 PID 是
  1。最后，`os-release` 文件的内容显示我们登录到了一个 Ubuntu 主机。你的输出（除了提示符中的主机名和 Ubuntu 版本外）应该与此匹配：


  ```

  root@4a9ddd43e0e2:/# whoami

  root

  root@4a9ddd43e0e2:/# id

  uid=0(root) gid=0(root) groups=0(root)

  root@4a9ddd43e0e2:/# echo $$


  root@4a9ddd43e0e2:/# head -2 /etc/os-release

  NAME="Ubuntu"

  VERSION="20.04.3 LTS (Focal Fossa)"

  ```


  保持这个会话打开，在你的计算机上启动一个新的 shell。重新运行之前的 `docker images` 命令。结果现在显示一个 Ubuntu 镜像已存在：


  ```

  > docker images

  REPOSITORY   TAG       IMAGE ID       CREATED       SIZE

  ubuntu       latest    ba6acccedd29   4 weeks ago   72.8MB

  ```


  这个镜像就是 Docker 为了运行之前请求的 Ubuntu 容器而拉取的。它从哪里来的呢？


  #### 镜像注册表


  Ubuntu 镜像并不是 Docker Desktop 的一部分。Docker 是从 *Docker Hub* 请求的它，这是一个由 Docker 社区构建和共享的镜像注册中心。Docker
  Hub 包括由 Docker 发布的*官方镜像*（*Official Images*），由商业第三方（包括 Oracle）生产和维护的*验证镜像*（*Verified
  Images*），以及其他所有镜像。


  在我撰写本文时，Docker Hub 上有近 850 万个公开可用的镜像，大部分由个人和公司添加。官方和验证镜像会经过漏洞扫描和测试。不能保证其他镜像是编写良好的甚至是安全的。我们如何知道我们使用的
  Ubuntu 镜像是好的呢？


  当我们执行 `docker run` 时，我们请求了一个 Ubuntu 镜像但没有指定仓库。Docker 从它的官方镜像库中拉取。我将在第 16 章更详细地介绍注册中心。现在，知道
  Docker 并非随机拉取某些东西就足够了！


  你可能还会注意到，在 `docker run` 和 `docker images` 的输出中，镜像标签或版本都显示为 `latest`。这是最近版本的简写，如果你没有为镜像（当有多个版本时）请求特定标签，这是默认值。这通常不重要——你通常想要
  Ubuntu 或 Oracle Enterprise Linux 7 的最新版本，以确保包含最新的更新和错误修复。对于依赖关系和版本相关的应用程序，你需要指定版本。例如，要获取
  Node.js 的特定构建，你可能会调用 `docker run node:16` 或 `docker run node:17.1.0`，其中镜像标签跟在冒号后面。


  ### 精简性


  从清单 3-5 中关于 Ubuntu 镜像的信息显示，该镜像仅有 72.8MB。考虑到从 [`www.ubuntu.com`](http://www.ubuntu.com)
  下载的 ISO 有 1.2GB，这似乎很小。Ubuntu 的 Docker 镜像大小不到其已安装对应物的 6%。为什么？


  镜像（通常）只包含执行其功能所*绝对必需*的内容。通过排除*不*需要的内容来减少镜像占用空间有许多好处：


  *   跨网络传输的内容更少。

  *   实际上增加了基础设施容量。

  *   更小的镜像具有更小的攻击面。

  *   更少的依赖关系减少了错误和漏洞的可能性。


  编辑器通常是镜像中被排除的事物之一。容器通常自主运行，生命周期以小时或分钟计。在生产环境中登录容器是罕见的（甚至是不鼓励的）。编辑器根本没必要，而且会带来安全风险。


  回到你之前使用的容器提示符，尝试运行 `vi test.txt` 来编辑一个新文件。它找不到这个命令。`vi` 和 `nano` 没有安装：


  ```

  root@4a9ddd43e0e2:/# vi /etc/os-release

  bash: vi: command not found

  root@4a9ddd43e0e2:/# nano test.txt

  bash: nano: command not found

  ```


  还有其他迹象表明 Ubuntu 镜像已被精简，并非设计用于交互。尝试运行 `man ls` 来显示*手册页*（*manpage*），即 Linux 的内置文档。操作系统会响应一条消息，提醒我们这不是一个完整的操作系统：


  ```

  root@ebb592e975f0:/# man ls

  This system has been minimized by removing packages and content that are

  not required on a system that users do not log into.

  To restore this content, including manpages, you can run the ''unminimize''

  command. You will still need to ensure the ''man-db'' package is installed.

  ```


  #### 修改容器


  容器是用于执行一系列狭窄任务的精简功能系统，而不是运行交互式环境。Docker 和其他发布者提供的基础镜像是精简版本，没有我们习惯在物理和虚拟系统中找到的那些额外功能。


  一些发布者为常见发行版提供“slim”变体。虽然没有标准定义什么是或不是非 slim 版本的一部分，但“slim”通常包含工作系统所需的最小内容。相比之下，非
  slim 版本可能包含额外的标准或便利功能。


  在第 12 章中，我们将看到 Oracle 数据库的容器镜像是从 Oracle Enterprise Linux 的“slim”版本构建的。


  没有什么能阻止我们更新容器操作系统来添加功能。让我们通过运行命令将 `vi`（或者如果你喜欢，`nano`）添加到你的容器中来做到这一点。清单 3-1 显示了在
  Ubuntu 上安装 `vim-tiny` 的命令，这是一个不需要 Python 支持的发行版。


  ```

  apt-get update

  apt-get install -y vim-tiny

  ```


  > **清单 3-1** 在 Ubuntu 上安装 vim-tiny 包的命令


  请注意，你需要运行 `apt-get update` 来更新仓库以包含 `vim`。如果不更新，`apt-get` 就不知道这个包存在！


  再次尝试使用 `vi test.txt` 创建文件。这次，成功了！你成功修改了容器，添加了原始镜像中没有的功能。在文件中添加一些内容并保存——你将在下一节中再次用到它！


  ### 持久性


  多年来，我在讲授 Oracle 和 Docker 相关知识时，遇到最经久不衰（或者说最顽固，这里双关！）的误解是 `容器不持久化数据` 和 `不能可靠地保存其内容`——尤其是在重启之后。让我们来测试一下！在提示符处输入
  `exit` 来退出你的 Ubuntu 容器，就像你登录或通过 SSH 连接到主机后执行退出操作一样。


  #### 检查容器状态


  我们使用 `docker run` 命令和 `-it` 选项启动了容器。这创建了一个*交互式*容器，其状态与会话绑定。退出容器会停止它。我们可以使用 `docker
  ps` 命令查看系统上存在的容器及其状态。一开始，`ps` 可能看起来不那么直观，但 Unix 和 Linux 用户应该能认出这是一个用于报告系统上运行进程的命令。


  回想一下，容器只是进程，这就说得通了。在你的 Shell 中输入 `docker ps -a` 并检查结果：


  ```

  > docker ps -a

  CONTAINER ID IMAGE   COMMAND CREATED     STATUS                   PORTS        NAMES

  4a9ddd43e0e2 ubuntu  "bash"  2 hours ago Exited (0) 17 seconds ago       fervent_mendeleev

  ```


  `-a` 标志是 `--all` 的简写，显示系统上所有进程（或容器），无论其处于活动还是停止状态。如果不使用此选项，`docker ps` 只报告正在运行的容器。输出中还需要注意其他几点：


  *   `CONTAINER ID` 是一个随机字符串，与我们在容器 Shell 提示符中看到的主机名相匹配。

  *   `COMMAND`，即 `bash`，是容器启动时我们使用的 Shell。容器的默认命令在其 *Dockerfile* 中定义，并在第 12 和 13
  章中介绍。

  *   `STATUS` 显示容器正常退出，错误代码为 0。（从技术上讲，任何非 0 的代码都表示异常，尽管并非总是严重问题。）

  *   随机生成的 `NAME`，旨在对用户友好，是可自定义的。我稍后会介绍这一点。


  要确认容器已停止，运行不带 `-a` 选项的 `docker ps`，只查看活动容器。


  #### 启动容器


  要启动容器，请输入 `docker start`，后跟系统中的 `NAME` 或 `CONTAINER ID`，然后通过重复 `docker ps -a` 命令检查状态：


  ```

  > docker start fervent_mendeleev

  fervent_mendeleev

  > docker ps -a

  CONTAINER ID   IMAGE   COMMAND  CREATED      STATUS              PORTS          NAMES

  4a9ddd43e0e2   ubuntu  "bash"   2 hours ago  Up 3 seconds             fervent_mendeleev

  ```


  #### 交互模式与分离模式


  注意，这次你没有重新连接到容器。以此方式启动时，容器进程作为*分离的*或后台进程运行。分离的容器在用户注销时不会停止，因为它们的状态不与交互式会话绑定。


  要在启动时以分离模式运行容器，请将 `docker run` 中的 `-it` 选项替换为 `-d` 或 `--detach`。


  ### 连接到容器


  现在容器已激活，重新连接到提示符。有不同方式可以做到这一点：*附加*或*执行命令*。


  *   **附加** 通过 `docker attach <CONTAINER NAME>` 命令访问容器正在运行的进程。在我们的例子中，该命令是 bash，如
  `docker ps` 的 `COMMAND` 列所示。在任何给定时间只能有一个会话附加。像之前那样以交互模式运行容器，就是附加到该容器。

  *   **执行** 一个命令类似于通过 `ssh` 登录到远程主机。运行 `docker exec <CONTAINER NAME> <COMMAND>` 允许你指定一个命令或脚本。执行命令可以交互式运行，也可以在后台运行，并可设置用户、工作目录和环境。多个会话可以使用
  `docker exec` 同时连接。


  在使用 Docker 和 Oracle 时，我很少需要用到 `docker attach`。在实践和本书中，我几乎只使用 `docker exec`。


  运行 `docker exec` 并带上首次运行容器时使用的相同 `-it` 选项来连接到你的容器。后跟容器名称和我们想要运行的命令 `bash` 以启动一个
  Shell：


  ```

  > docker exec -it fervent_mendeleev bash

  root@4a9ddd43e0e2:/#

  ```


  #### 验证持久性


  重新连接到容器后，列出你创建文件 `test.txt` 的目录内容。文件仍然存在，其内容也得以保留，即使在重启容器之后也是如此。


  文件系统的更改并不是 Docker 中唯一持久存在的东西。会话状态也会保留。在容器提示符处使用键盘上箭头键滚动查看命令历史。停止容器之前发出的命令会出现。


  #### 移除容器


  微服务架构会创建容器来执行某些工作，然后销毁它们（稍后会详细介绍）。你创建的容器已经达到了目的：你学会了如何运行和修改容器、检查其状态、启动和停止它以及进行连接。现在，我们将移除它。


  像之前一样输入 `exit` 退出容器提示符。在主机提示符处运行 `docker rm -f <CONTAINER NAME>` 来移除容器，替换为系统中容器的名称：


  ```

  > docker rm -f fervent_mendeleev

  fervent_mendeleev

  ```


  `-f` 标志强制 Docker 移除正在运行的容器。不使用此选项，则必须在移除前停止容器。


  ### 镜像是不可变的


  你通过安装 `vi` 和添加文件修改了容器，但这并没有改变镜像。镜像*是不可变的*，无法被更改。每个镜像都有一个摘要或哈希值，作为保证镜像内容的签名。从给定镜像启动的每个容器都是相同的。这是一个理想的属性，是运行可靠性和可重复性的基础，我们将在后面的章节中利用这一点。


  不过，这确实引出了一个明显的问题。如果不能更改镜像，Docker Hub 中怎么会有如此多种类的镜像？说镜像是不可变的并不是全部事实。镜像不能被更改，但对容器所做的更改可以*另存为新的镜像*。构建镜像只是一系列操作：启动一个镜像，运行命令以修改正在运行的容器，并将结果保存为新的镜像。


  #### 启动一个新容器


  为了演示，启动一个新的 Ubuntu 容器，这次使用 `--name` 选项为其指定一个名称，而不是让 Docker 生成一个“友好”的名称：


  ```

  > docker run -it --name my_container ubuntu

  root@cadf21663737:/#

  ```


  注意它完成得多快！没有像第一次运行 Ubuntu 容器时看到的那些额外消息。Docker 不需要拉取镜像，因为它已经存在于系统上。它只需要在本地主机上启动一个新的
  Linux 进程——请记住，在 Docker 中，没有初始化或启动周期！



  #### 保存新镜像


  我们正在使用的 Ubuntu 镜像不包含 `vi` 命令。但如果我们想要一个包含 `vi` 的 Ubuntu 镜像怎么办？在每个新的 Ubuntu 容器上安装
  `vi` 并不实际。相反，让我们创建一个新镜像来包含 `vi`。


  在新容器中安装 `vi`（或 `nano`），使用清单 3-1 中的命令。退出容器，在主机命令提示符下，使用 `docker commit` 命令将容器保存为新镜像。你需要提供要保存的容器的名称和新镜像的名称：


  ```

  > docker commit my_container ubuntu_editor

  sha256:be90b42f8ef0c5b8e343c7fd5d7aaa5d99f1e7e65dfac9020c4f362dade0410f

  ```


  Docker 会返回新镜像的哈希值。重新运行 `docker images` 以确认它创建了一个新镜像，代码如清单 3-2 所示。


  ```

  > docker images

  REPOSITORY       TAG       IMAGE ID       CREATED         SIZE

  ubuntu_editor    latest    be90b42f8ef0   3 seconds ago   107MB

  ubuntu           latest    ba6acccedd29   4 weeks ago     72.8MB

  清单 3-2

  将修改后的容器提交为新镜像

  ```


  新镜像 `ubuntu_editor` 现在已可用。


  注意新镜像与原始镜像相比的大小。`vi` 那么大吗？不！这是镜像和 `层` 工作方式的副产品，本章稍后将讨论。


  #### 运行新镜像


  使用这个新镜像启动另一个容器，命令为 `docker run -it ubuntu_editor`，并确认 `vi` 存在，如清单 3-3 所示。


  ```

  > docker run -it ubuntu_editor

  root@d3f700a3aae2:/# which vi

  /usr/bin/vi

  清单 3-3

  从新提交的镜像创建容器并验证 vi 是否存在

  ```


  ### 联合文件系统


  清单 3-2 展示了两个镜像。原始的 Ubuntu 镜像是 72.8MB。安装了 `vi` 的修改版本是 107MB。安装一个简单的编辑器使大小增加了 45%
  以上。为什么？


  Docker 非常高效，它利用操作系统特性来提高速度并减少占用空间。其中一个特性，`联合文件系统`（有时称为 `覆盖文件系统`），对容器内容进行“去重”。


  逻辑上，一个从 200MB 单镜像启动的运行五个容器的系统应该使用 1000MB——每个容器 200MB。有了 `联合文件系统`，实际存储需求与容器数量无关。在这个例子中，无论主机运行十个还是一千个容器，存储需求可能低至
  200MB。


  镜像提供了容器所需的所有文件和依赖项，但它们不是从镜像复制的。`容器就是镜像。`


  如果镜像不能被修改，容器如何在其文件系统中使用镜像？


  启动新容器时，Docker 会创建一个由多层组成的 `联合文件系统`：`lower`（下层）、`upper`（上层）和 `working`（工作层）。


  *   `下层`：Docker 将镜像映射到下层。每个共享镜像的容器在其下层引用相同的不可变文件集。

  *   `上层`：Docker 为每个容器创建一个唯一的上层。创建和编辑文件会将其添加到容器的上层，而不改变下层中的原始副本。

  *   `工作层`：工作层是下层和上层的联合（因此得名）。它将下层中未更改的文件与保存在上层的新文件和修改过的文件合并。`联合文件系统` 将已删除文件作为一种特殊文件类型处理，告诉工作层将其从视图中屏蔽。


  为了形象化这一点，想象一个用于模拟井字棋游戏场景的镜像，如图 3-1 所示。镜像——即下层——包含游戏棋盘和游戏的前几步。起始步骤是镜像的一部分，每当容器启动时就会出现在游戏棋盘上。将上层想象为一个透明的薄片，玩家在上面标记他们的走法。工作层是玩家看到的视图，就像他们向下看时，将透明的上层叠加在下面的图像上。工作层显示了完整的棋盘——下层和上层的合并。


  ![](img/514143_1_En_3_Fig1_HTML.png)

  一个井字棋走法的示意图，从下到上说明了 3 层：下层、上层和工作层。

  图 3-1

  下层中的井字棋走法是镜像的一部分，在每个容器启动时就存在。在运行的容器中添加的走法仅存在于上层。玩家从工作层的视角“向下看”时，会看到所有的走法。


  图 3-2 展示了这如何应用于文件系统。同样，镜像提供了包含预填充文件的下层。容器获得它们自己的上层，在其中保存本地更改。在容器中运行的进程从工作层读取合并后的结果。


  ![](img/514143_1_En_3_Fig2_HTML.png)

  一个示意图展示了联合文件系统中的各层。从上到下的层依次为：工作层、上层和下层。文件名标记为文件 1、文件 2a、文件 3、文件 4 和文件 5。

  图 3-2

  `联合文件系统` 中的层。


  在图 3-2 的工作层中，文件 2 和 5 的更改版本覆盖（或屏蔽）了它们的原始版本。文件 1、3 和 4 未被遮挡，通过上层“可见”。


  在正常情况下，镜像的大部分——二进制文件、库和可执行文件——是静态的，不会在容器的上层有副本。^(¹⁸) 容器中进行的更改越少，其上层就越小。


  当你之前移除 Ubuntu 容器时，Docker 删除了分配给该容器的 `联合文件系统` 的上层。^(¹⁹) 容器中所做的更改丢失了，但底层镜像没有受到影响。


  从同一个镜像启动的数十或数百个容器共享一个下层，与物理机或虚拟机相比，在规模上带来了效率和成本效益的显著提升。我们可以通过运行带有 `-s` 或 `--size`
  选项的 `docker ps` 命令看到这一点。以下截断的输出报告了这些容器的实际大小和虚拟大小：^(²⁰)


  *   第一个容器不使用额外空间。由于容器中没有进行任何更改，其上层为空，容器的虚拟大小 72.8MB 与原始 Ubuntu 镜像相匹配。

  *   第二个容器的上层是 33.9MB。它包括更新文件系统和安装 `vi` 所需的修改。

  *   第三个容器，从新创建的镜像运行，不包括对其环境的任何更改。和第一个容器一样，这个容器的上层是空的。


  ```

  > docker ps -as

  CONTAINER ID   IMAGE         SIZE

  a5bf2c163d07   ubuntu        0B (virtual 72.8MB)

  cadf21663737   ubuntu        33.9MB (virtual 107MB)

  d3f700a3aae2   ubuntu_editor 0B (virtual 107MB)

  ```



  #### 提交与构建


  这解释了为什么提交的镜像更大，但差异的幅度却不成比例。这是因为当 `apt-get update` 和 `apt-get install` 命令运行时，容器的层发生了多大程度的变化。这些命令获取了软件包列表、解压了归档文件，并对存在于底层的文件进行了增量更改。每个操作都向容器的上层写入了一些内容。


  创建镜像还有另一种方式。`dockerfile` 是一套从零开始构建镜像的指令集。`docker commit` 是一种便捷但（有点）暴力的方法。从零开始构建镜像则能提供更大的控制权，并产生更小、更高效的镜像。


  清单 3-4 展示了一个“内嵌”了 `vi` 编辑器的 Ubuntu 镜像的 Dockerfile。清单 3-5 展示了使用此文件构建镜像的命令以及操作的结果。


  ```

  > docker build --tag ubuntu_vi .

  [+] Building 7.1s (6/6) FINISHED

  => [internal] load build definition from Dockerfile

  => => transferring dockerfile: 179B

  => [internal] load .dockerignore

  => => transferring context: 2B

  => [internal] load metadata for docker.io/library/ubuntu:latest

  => [1/2] FROM docker.io/library/ubuntu:latest

  => [2/2] RUN apt-get update && apt-get install -y vim-tiny && apt-get clean && rm
  -rf /var/lib/apt/lists/*

  => exporting to image

  => => exporting layers

  => => writing image sha256:03545fa76800a4ed39a11c9e25aa184d1a60a2b1cb889730961d47d8c8dde554

  => => naming to docker.io/library/ubuntu_vi

  清单 3-5

  镜像构建及结果

  ```


  ```

  FROM ubuntu:latest AS base

  RUN apt-get update \

  && apt-get install -y vim-tiny \

  && apt-get clean \

  && rm -rf /var/lib/apt/lists/*

  CMD bash

  清单 3-4

  一个用于创建带 vi 功能的 Ubuntu 镜像的 Dockerfile

  ```


  现在不必担心语法——我们将在第 12 到 14 章深入讲解。但请注意从 Dockerfile 构建的新镜像的大小差异：


  ```

  > docker images

  REPOSITORY       TAG       IMAGE ID       CREATED          SIZE

  ubuntu_vi        latest    03545fa76800   15 seconds ago   75.1MB

  ubuntu           latest    ba6acccedd29   4 weeks ago      72.8MB

  ```


  从零开始构建的版本仅大了 2.3MB。这个差异合理得多！


  ### 总结


  当我与人谈论在 Docker 中运行 Oracle 时，我首先会演示它的速度。这是一个引人入胜的开场论点，并将容器与竞争技术区分开来。与数据库管理员的对话很自然地会转向对持久性和可靠性的担忧。人们听说容器是临时性的，就想到了最坏的情况，从而在没有花时间去理解的情况下就摒弃了这项技术。我也未能免俗——这些误解也曾影响了我对
  Docker 的初次体验。


  容器“临时性”的标签源于其 `典型` 的用例，这些用例的生命周期较短。然而，何为“短”是相对的；细想之下，一切都是暂时的！没有任何东西能阻止长寿命的应用程序（包括数据库）在容器中运行。


  在本章中，你发现了容器与其物理和虚拟机（VM）对应物之间的更多区别。这些差异大多源于不同的用例。物理和虚拟主机承担广泛的、多用途的角色，需要各种功能和库。它们的操作系统通常较大，额外的功能也增加了潜在的漏洞。容器则是更精简的系统，针对特定任务定制，其文件系统只包含必要的内容。它们较小的占用空间非常适合在网络上共享，正如你在创建第一个容器时所见证的那样！


  你还应该能够熟练使用 Docker 的命令行界面来运行基本命令，报告系统中存在的镜像和容器，并创建、移除、停止和启动容器。你连接到了一个正在运行的容器并更新了环境，添加了一个编辑器。


  Docker 速度和效率的基础在于它如何使用联合文件系统。层（Layer）将用于启动容器的原始镜像与其生命周期内的更改隔离开来。层为在系统上运行的容器实现了持久性，并有助于容器基础设施的可扩展性，同时似乎还挑战了常识性的数学！你将在本书的第二部分，在涵盖
  Dockerfile、镜像和构建的章节中再次看到层的应用。深入理解层对于欣赏这些主题并非必需，但这是我后悔在 Docker 学习之旅中没有更早掌握的一个领域。


  现在你已经熟悉了 Docker 的语法和工作流程，可以开始使用数据库容器了。我们将在下一章做这件事，通过一个快速入门教程，介绍在容器中运行你的第一个 Oracle
  数据库的步骤！让我们开始吧！


  ## 4. Oracle 数据库快速入门


  每当我举办关于在 Docker 上运行 Oracle 的网络研讨会和演示时，与会者最常要求的就是一套循序渐进的指导，以便在容器中启动并运行数据库。本章是一个独立的教程集合，涵盖构建镜像和运行数据库容器的步骤。


  正如一本披萨食谱可能会提供制作面团的说明，而不解释酵母如何使面团发酵一样，本章侧重于“如何做”，而较少涉及“为什么”或“原理”。它涵盖了下载和构建镜像、创建一个基本的容器数据库、允许来自容器外部应用程序（如
  SQL Developer）的客户端连接、访问 Shell，以及在主机上持久化数据。首先，我们必须准备好我们的系统并理解几个基本术语。


  ### 访问 Docker 环境


  延续烹饪的主题，Docker Desktop 是我们准备镜像和容器的厨房。Docker Desktop 可以从 [`www.docker.com`](http://www.docker.com)
  免费下载。附录 A 涵盖了安装和配置。


  ### 术语


  要在 Docker 中启动并运行数据库，需要理解 Docker 环境中使用的一些术语。如果你是跳读到本章，并且不熟悉什么是 `镜像`、`容器` 和 `构建`，如何在系统上访问命令行，或者如何运行基本的
  Docker 命令，请花点时间回顾一下本节内容。如果你已经熟悉这些概念，可以直接跳到下一节 “`获取镜像。`”



  #### Docker 命令


  Docker 命令以 `docker` 开头，后跟一个动词，例如 `run`、`build`、`exec` 或 `attach`，然后是标志、对象和选项。本教程中会用到一些命令。在使用
  Docker 时，你可能会最常使用这些命令。即使在我接触容器化技术多年之后，我所做的大部分工作仍然围绕着这些核心命令：


  -   `docker images`：显示系统上可用的镜像，包括其名称、镜像 ID、来源、大小和创建时间。

  -   `docker ps`：列出正在运行的容器，包括名称、状态、来源镜像和创建时间。容器是系统上的进程，Linux 和 Docker 都使用 `ps` 来列出进程。添加
  `-a` 标志可显示所有容器，包括正在运行和已停止的。

  -   `docker run`：根据一个镜像创建并启动一个容器。

  -   `docker start`：启动一个已存在的容器。

  -   `docker stop`：停止一个正在运行的容器。

  -   `docker logs`：显示来自容器的日志输出。对于我们即将使用的 Oracle 数据库镜像，它会显示启动操作的输出，包括首次运行容器时启动监听器、数据库和数据库配置助手的输出。之后，它会显示来自数据库警报日志的输出。

  -   `docker exec`：在容器内部执行命令。


  这些命令将在本书其他章节有更详细的解释。


  #### 镜像与容器


  一个 `镜像` 包含运行应用程序或服务所需的所有文件。一个 Oracle 数据库镜像包括其文件系统、操作系统库和可执行文件、必备软件包、设置、二进制文件和配置文件。


  `容器` 是在主机上从镜像启动的进程。可以使用同一个镜像启动许多容器，每个容器可以独立于其他容器执行工作并对其初始状态进行更改。容器可以停止和启动，其内容会在重启后持续存在。


  #### 构建与运行


  镜像是使用一组称为 `Dockerfile` 的指令来 `构建` 的。Dockerfile 是 Docker 用来收集食材（包括文件和其他镜像）并将其制备成最终镜像的配方。容器从镜像中
  `运行`。


  对于这个快速入门来说，理解这两个过程的细节并非至关重要。但认识到操作和对象之间的关系非常重要，因为本教程的一部分内容就是指导你构建一个镜像并运行一个容器。


  #### Docker 命令行


  与 Docker Desktop 的大多数交互都通过命令行进行。Windows 用户应使用 `Windows Terminal`。在 Mac 和 Linux 环境中，请打开原生的终端应用程序。


  ### 获取镜像


  在运行数据库容器之前，我们需要一个镜像。就像烘烤披萨一样，Oracle 数据库镜像有几种选择可供使用，包括：


  -   **预构建镜像：** 这相当于冷冻披萨的选项。在预构建的镜像中，所有的准备工作都已为你完成。你只需要烘烤（或微波加热）并享受成果即可！在容器世界中，“烘烤”镜像就是运行容器。预构建镜像可能并不完全符合你的需求。它们的配置满足常见或通用需求，并且只有一家公司提供预构建镜像——Oracle。Oracle
  的预构建镜像包含数据库软件，用户必须接受许可协议才能下载它们。

  -   **从仓库构建：** 如果你想对镜像有更多控制权，可以考虑使用 `仓库`。仓库是用于构建镜像的脚本集合。这类似于用现成的饼底、一罐酱料和你自己提供的食材（包括
  Oracle 数据库软件和许可证）来组装披萨。Oracle 维护着一个优秀的仓库，不仅可以构建数据库，还能构建多种其他产品。由于仓库不包含获得许可的软件，因此组织和社区成员可以创建和共享仓库。从仓库构建会更耗时一些，但并不困难，远比从头创建镜像要简单。

  -   **从自定义 Dockerfile 或仓库构建：** 完全的控制和灵活性来自于自定义的 Dockerfile 或仓库。这相当于从头开始准备酱料和手工揉制面团来制作披萨。编写自定义
  Dockerfile 的内容将在第 13 章介绍。

  -   **数据库即服务：** 云供应商可能会提供数据库即服务或 `DBaaS` 的选项。DBaaS 类似于在餐厅点餐，云供应商负责完成所有工作，而客户则消费成果。


  让我们从最直接的选项开始：使用预构建镜像。


  #### 预构建镜像


  预构建镜像是最简单、最快捷的入门方式。但它们在版本和版本可用性方面也最受限制。Oracle 在其自己的 Oracle 容器注册表站点 `https://container-registry.oracle.com`
  上维护这些镜像。它们更新不频繁，你可能会遇到功能有限的情况。


  截至撰写本文时，可用的选项有：


  -   版本 19.3.0.0 企业版、标准版

  -   版本 12.2.0.1 企业版、标准版 2 (SE2)

  -   版本 12.1.0.2 企业版


  如果其中某个选项符合你的需求，请访问 `container-registry.oracle.com` 并导航至 `Database` 仓库。图 4-1 展示了
  Oracle 容器注册表以及存放预构建数据库镜像的 Database 仓库。


