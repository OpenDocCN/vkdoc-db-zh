  \ 功能都可以在命令行中使用。\n\n## Docker Desktop 功能\n\n用户可以通过 Docker Desktop 检查和管理容器、镜像和卷，并可以创建新的卷和容器。\n\
  \n### 容器管理\n\n容器菜单列出了系统上的所有容器，并包含用于启动、停止、暂停和删除容器的控件。用户还可以导航到单个容器，访问日志、检查环境和容器统计信息，并进入容器内部的命令行。\n\
  \n#### 容器终端\n\nDocker 最近更新了 Docker Desktop，添加了一个集成的命令行 Shell。您可以通过 Docker Desktop\
  \ 访问主机上任何正在运行的容器的 CLI，并且在任何操作系统上的结果都相同。\n\n要使用集成 Shell，首先确保其已启用。点击屏幕右上角（如图 A-14\
  \ 所示）的齿轮图标，打开 Docker Desktop 的设置菜单。然后，确保“选择容器终端”下的“集成”选项被勾选。\n\n![](img/514143_1_En_18_Fig14_HTML.jpg)\n\
  设置面板的截图，齿轮图标位于屏幕右上角，“选择容器终端”下选中了“集成”选项。\n\n**图 A-14**\n\n选择 Docker Desktop 右上角的齿轮图标以访问设置页面。然后，在常规选项窗格中，选择“集成”作为容器终端。\n\
  \n从 Docker Desktop 中，选择左侧菜单中的“容器”以查看系统上正在运行的容器列表。选择一个容器；然后点击最右侧的三个垂直点以访问“显示容器操作”选项。从出现的下拉框中，选择“在终端中打开”，如图\
  \ A-15 所示。\n\n![](img/514143_1_En_18_Fig15_HTML.jpg)\nDocker Desktop 的截图高亮显示了左侧菜单中的容器选项，以及显示容器操作选项下的在终端中打开。\n\
  \n**图 A-15**\n\n要访问容器的 Shell，请选择容器菜单 (1)，点击三个点访问“显示容器操作”下拉菜单 (2)，然后选择“在终端中打开”选项。\n\
  \n这将在容器上打开一个 `/bin/sh` 终端会话（不是 `/bin/bash`），如图 A-16 所示。终端窗口功能齐全，支持复制/粘贴和滚动功能。它也是持久化的——如果您离开\
  \ CLI 会话，它会在后台保持活动状态。可以通过容器页面右上角的 CLI 标签页重新访问它。\n\n![](img/514143_1_En_18_Fig16_HTML.jpg)\n\
