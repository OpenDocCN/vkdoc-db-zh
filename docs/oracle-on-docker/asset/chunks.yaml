- fmt: '### Download an Image


    First, log in to the site using your My Oracle Support (MOS) Single Sign-On (SSO)
    credentials and accept the license agreement. You should see a message in the
    upper right of Figure 4-2 indicating that you’ve accepted the license.


    In Docker, downloading an image is done with the `pull` command, and the right
    sidebar has a promising element, “Pull Command for Latest.” Unfortunately, copying/pasting
    produces an authentication error:

    ```

    unauthorized: authentication required

    ```


    We haven’t authenticated to Oracle’s repository. Log in with the following command:

    ```

    docker login container-registry.oracle.com

    ```


    Docker will ask for a username and password; these are your Oracle SSO credentials.
    Copy the `docker pull` command from the registry page and paste it into your shell.
    Docker will download the image’s layers to your system. Listing 4-1 shows the
    abbreviated output from the `pull` command.

    ```

    > docker pull container-registry.oracle.com/database/enterprise:19.3.0.0

    19.3.0.0: Pulling from database/enterprise

    86607bb85307: Pull complete

    ...

    5c2969cb34b8: Pull complete

    Digest: sha256:ea9cd805ec49368fd288323e3f41d6c6e45698813e2ae89fd5d097c026ab5aa6

    Status: Downloaded newer image for container-registry.oracle.com/database/enterprise:19.3.0.0

    container-registry.oracle.com/database/enterprise:19.3.0.0

    Listing 4-1

    Running docker pull for a 19c Enterprise Edition image

    ```


    That’s it! You’ve successfully downloaded a Docker image to your host! Check the
    images on your system with the `docker images` command. You will see something
    similar to the output in Listing 4-2.

    ```

    > docker images

    REPOSITORY                                          TAG                     IMAGE
    ID            CREATED             SIZE

    container-registry.oracle.com/database/enterprise   19.3.0.0                6ee1b2e4403f        6
    months ago        7.87GB

    Listing 4-2

    Running docker images after pulling the 19c Enterprise Edition image

    ```


    The Repository column reflects the origin of the image. The `tag` is its version.


    ### Download a Tag


    Earlier, I listed that three versions were available for Enterprise Edition. Where
    are the others? Figure 4-3 shows the bottom of the Enterprise Edition repository
    page, where the tags from this repository are listed.


    ![A screenshot of tags page displays the Enterprise Edition repository page lists
    the tags from repository.](images/514143_1_En_4_Chapter/514143_1_En_4_Fig3_HTML.jpg)


    Figure 4-3

    Tag listing for all versions available in the Enterprise Edition repository


    Each tag represents a different version and has separate `docker pull` commands.


    Notice there are two tags for version 12.2.0.1. The second, with the `-slim` suffix,
    is trimmed down to minimum capabilities. This is common for container images.
    Reducing the image to the bare minimum saves space and reduces the attack surface
    of containers—you can’t attack software and features that aren’t present. If you
    only need basic functionality, tags marked `-slim` are worth considering.


    One final thing to pay attention to is the size. Figure 4-3 suggests the image
    19.3.0.0 tag is 3GB, but that’s the compressed download size. Listing 4-2 reports
    the proper size of the 19c image, 7.87GB.


    ### Running Pre-built Images


    Once complete, follow the directions on the documentation page or skip ahead to
    the section “Running a Container.” The images in this registry use the same scripts
    discussed in the next section, and the same functionality *should* work. The container
    registry images are not updated frequently. Oracle’s Docker repository is updated
    continuously with new features and capabilities. While unlikely, there is a possibility
    that images built from the current script repository will behave differently.


    ### Pre-built Image Limitations


    The images from Oracle’s Container Registry offer convenience but sacrifice variety
    and functionality. With a frozen pizza, you can’t change the toppings. With pre-built
    images, you can’t change certain functionality built into the image. To illustrate
    why pre-built images might not satisfy your cravings, let’s look at two limitations:
    editors and multitenancy.


    Running Oracle in Docker on a desktop or laptop system is convenient. It’s handy
    to have a “throwaway” database available for developing, testing, and experimenting
    on, and for most, that includes being able to view and edit files.


    Users may be surprised that Oracle’s database images do not contain a text editor,
    and the only file viewer included is `more`. This is by design—remember that containers
    typically run services, not interactive sessions, and don’t need editors or file
    viewers. Leaving out unnecessary software makes containers smaller and reduces
    their attack surface.


    Editors (and other utilities) were left out of the image when it was built. We
    can’t change the image; manually installing the additional software is the only
    option. It’s not difficult to do and isn’t time-consuming to update the container
    until you find yourself doing it every time you run a new container! One reason
    for adopting containers is their ability to deliver self-contained environments
    that already include dependencies. Manually updating every container runs contrary
    to that purpose.


    While you may not consider adding an editor as a compelling reason to build your
    own images, the type of database created in the container might.


    When an Oracle database container starts, it checks to see if it already has a
    database. If not, it runs the `Database Configuration Assistant` (`DBCA`) and
    creates a new `container database` (CDB) with a single `pluggable database` (PDB).
    CDB and PDB are still not widely adopted, and for those that want a traditional,
    non-CDB database, the alternative is to drop the database created by DBCA and
    create one by hand.


    However, building an image from scripts makes it possible to amend Docker’s instructions
    to include an editor, edit the response file for creating databases, and more.
    You may find this added control worth the extra minutes it takes to build your
    own images.


    ### Building Images from a Repository


    The authors of Oracle’s script repository made building images using its script
    repository easy. A wrapper script handles the heavy lifting. Users only need to
    download the repository, place the Oracle database installation file in a directory,
    and run the script.


    The repository has scripts for building images for versions:


    *   Oracle 11.2.0.2 Express Edition

    *   Oracle 12.1.0.2 Enterprise Edition, Standard Edition 2

    *   Oracle 12.2.0.1 Enterprise Edition, Standard Edition 2

    *   Oracle 18.3.0 Enterprise Edition, Standard Edition 2

    *   Oracle 18.4.0 Express Edition

    *   Oracle 19.3.0 Enterprise Edition, Standard Edition 2


    The following examples use Oracle 19c. The steps are similar to other versions.'
