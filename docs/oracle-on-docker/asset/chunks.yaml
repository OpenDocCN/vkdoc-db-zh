    \ docker.service\n```\n\n### Add the Oracle Repository\n\nNew systems need a copy\
    \ of Oracle’s Docker repository. Assuming `git` is installed, I can clone the\
    \ repo into the `/docker` path:\n\n```\ngit clone https://github.com/oracle/docker-images\
    \ /docker\n```\n\nAfter copying the appropriate installation media to the version\
    \ directories under `/docker/OracleDatabase/SingleInstance/dockerfiles/`, I can\
    \ begin building the images:\n\n```\ncd /docker/OracleDatabase/SingleInstance/dockerfiles/\n\
    ./buildContainerImage.sh -v 19.3.0 -e\n./buildContainerImage.sh -v 21.3.0 -e\n\
    ```\n\n### Networking\n\nNext, I turn my attention to networking, adding a new\
    \ bridge network, which I usually name `oracle-db`:\n\n```\ndocker network create\
