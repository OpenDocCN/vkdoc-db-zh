  trans: "# 10. 容器创建快速参考\n\n本书第一部分涵盖了在 Linux 容器中运行 Oracle 数据库的基本要素，并强调了 `docker run`\
    \ 命令的重要性。预先考虑容器将如何创建数据库、存储数据以及通过网络进行交互，可以避免后续的挫折感，并节省修改或重建容器的时间。前面的章节分别阐述了这些概念，解释了每项建议背后的原因。\n\
    \n在学习新技术时，我喜欢一份涵盖如何操作事物的总结。第一部分的最后一章正是如此——一份快速参考，将迄今为止涵盖的所有内容提炼成一套方法和模式，供您在容器之旅中应用。\n\
    \n本章包含四个部分：创建存储和网络、运行容器，以及与容器交互的各种杂项命令。虽然不是必需的，但如果您打算将数据持久化到容器主机，并利用第 9 章中描述的用户定义网络，那么存储和网络是先决条件。创建后，在容器创建时引用这些资源。\n\
    \n## 约定\n\n为清晰起见，较长的命令使用 Linux 续行符（反斜杠 `\\`）拆分到多行。各个选项也分别显示在单独的行上，以突出每个选项：\n\n\
    ```\ndocker run --name  \\\n-e ORACLE_SID= \\\n...\n```\n\n示例中，当有多个可用选项时，使用较短的标志，例如，使用\
    \ `-e` 设置环境变量，而不是 `--env`。尖括号 `<` 和 `>` 之间的文本表示需要根据您的要求替换的信息。\n\n## 存储\n\n###\
    \ 创建卷\n\n有两种方法可以将数据持久化到容器主机：\n\n*   将主机上的目录映射到容器中的路径。\n*   创建一个称为 Docker 卷的专用对象。\n\
    \n前者不需要任何特殊设置，但挂载 Docker 卷需要预先创建该卷。绑定挂载卷所使用的目录在分配给容器之前必须存在。\n\n要创建一个默认卷（数据将存储在\
    \ Docker 的虚拟机中，路径为 `/var/lib/docker`）：\n\n```\ndocker volume create \n```\n\n\
    要在本地文件系统上创建具有用户定义位置的绑定挂载卷：\n\n```\ndocker volume create --opt type=none --opt\
    \ o=bind \\\n--opt device= \\\n```\n\n### Oracle 数据库容器中的预定义卷\n\nORADATA 卷在 Oracle\
    \ 容器镜像的 `/opt/oracle/oradata` 目录下保存数据库配置和数据文件。其高级目录结构如下：\n\n```\n.\n├── dbconfig\n\
    │   └── \n├── fast_recovery_area\n│   └── \n│       └── archivelog\n└── \n├──\
    \ controlfile\n├── datafile\n└── onlinelog\n```\n\n特殊的 `dbconfig` 子目录存放数据库和网络的配置文件，在这里您可以找到数据库的\
    \ `init.ora` 和 `spfile`、密码文件和 `oratab` 文件，以及网络配置，包括 `tnsnames.ora` 和 `listener.ora`：\n\
    \n```\n$ ls -l $ORACLE_BASE/oradata/dbconfig/$ORACLE_SID\ntotal 24\n-rw-r--r--\
    \ 1 oracle oinstall  234 Mar  6 22:04 listener.ora\n-rw-r----- 1 oracle oinstall\
    \ 2048 Mar  6 22:15 orapwORCLCDB\n-rw-r--r-- 1 oracle oinstall  784 Mar  6 23:33\
    \ oratab\n-rw-r----- 1 oracle oinstall 3584 Mar  6 23:33 spfileORCLCDB.ora\n-rw-r--r--\
    \ 1 oracle oinstall   53 Mar  6 22:04 sqlnet.ora\n-rw-r----- 1 oracle oinstall\
    \  211 Mar  6 23:33 tnsnames.ora\n```\n\n这些文件从其典型位置软链接而来，这意味着 ORADATA 卷是一个自包含的目录，包含了数据库所需的一切。\n\
    \n### 为 Oracle 数据库准备卷\n\n卷将数据写入 Docker 环境之外，并满足两个非常相似但不同的目的：\n\n*   将数据保存到本地或附加存储\n\
    *   将数据从容器文件系统中移除\n\n第一个示例涉及保护和持久化数据及配置。在生产环境中，这扩展到选择快速、持久的存储，以满足组织对性能和可用性的目标。\n\
    \n第二种情况，乍一看可能相同——将文件放在容器之外的某个地方——但有细微差别。这里，重要性在于管理容器外部的易变目录。在 Oracle 数据库中，这些是日志和审计目录。将它们留在容器的文件系统中，如果需要重新创建容器，它们将面临风险，同时也会导致容器层的增长。\n\
    \n## 网络\n\n### 创建用户定义的桥接网络\n\n某些功能，包括 DNS，在 Docker 安装时创建的默认桥接网络中是缺失的。用户定义的桥接网络提供了更强大的功能集。要创建桥接网络：\n\
    \n```\ndocker network create  --attachable --driver bridge\n```\n\n### 将容器连接到网络/从网络断开连接\n\
    \n容器在其生命周期中的任何时候都可以连接到网络。将没有端口映射的容器添加到网络中，允许主机使用原生端口进行连接。要将容器添加到网络：\n\n```\ndocker\
    \ network connect  \n```\n\n要从网络断开连接：\n\n```\ndocker network disconnect  \n```\n\
    \n### 专用 DNS\n\n有多种解决方案可以为容器主机添加 DNS 解析，允许主机上的客户端通过容器 ID、容器名称、分配的主机名或网络别名来引用容器。`dvdarias/docker-hoster`\
    \ 就是其中一个选项。它读取 Docker 的事件服务，并在容器启动或停止时向主机的 `/etc/hosts` 文件中添加或移除容器条目。使用推荐的默认值运行它：\n\
    \n```\ndocker run -d \\\n-v /var/run/docker.sock:/tmp/docker.sock \\\n-v /etc/hosts:/tmp/hosts\
    \ \\\ndvdarias/docker-hoster\n```\n\n## 容器\n\n### 基本容器创建\n\n创建数据库容器的最简命令：\n\n\
    ```\ndocker run -d \n```\n\n`-d` 标志将容器作为后台进程运行。\n\n以下命令片段说明了 `docker run` 命令选项的用法。\n\
    \n### 命名\n\n必须在创建时为容器分配名称、主机名和网络别名。如果未指定名称，Docker 会在创建时生成一个随机的容器名称。\n\n#### 分配容器名称\n\
    \n容器名称是一个便于人类识别的名称，在 `docker start`、`docker logs` 或 `docker exec` 等容器命令中被引用。使用\
    \ `--name` 标志设置容器名称：\n\n```\ndocker run -d \\\n--name  \\\n...\n```\n\n#### 分配主机名\n\
    \n主机名是一个可选的、与容器名称分开的标识。如果未设置，主机名默认为容器名称：\n\n```\ndocker run -d \\\n--hostname\
    \  \\\n...\n```"
- fmt: "### Define Environment Variables\n\nThe database creation and management scripts\
    \ read variables from the container environment and use them to build and start\
    \ the database. If not set manually, the container relies on its default settings.\
    \ The most frequently used variables (with default values in brackets) are\n\n\
    *   `ORACLE_SID`: The Oracle Database SID [ORCLCDB]\n*   `ORACLE_PDB`: The Oracle\
    \ Database PDB name [ORCLPDB1]\n*   `ORACLE_PWD`: The Oracle Database SYS, SYSTEM,\
    \ and PDB_ADMIN password [randomly generated during database creation]\n*   `ENABLE_ARCHIVELOG`:\
    \ Enable archive logging [False]\n\nTo display all environment variables available\
    \ in an image:\n```bash\ndocker image inspect \\\n--format '{{range .Config.Env}}{{printf\
    \ \"%s\\n\" .}}{{end}}' \\\n | sort\n```\n\nTo set an individual variable, in\
    \ this example `ORACLE_SID`, at the command line, use the `-e` option:\n```bash\n\
    docker run -d \\\n-e ORACLE_SID=ORCLDB \\\n...\n```\n\nSet multiple values using\
    \ separate `-e` flags for each. Here, the `ORACLE_SID` and `ORACLE_PDB` are set\
    \ in the container:\n```bash\ndocker run -d \\\n-e ORACLE_SID=ORCLDB \\\n-e ORACLE_PDB=PDB1\
    \ \\\n...\n```\n\nThe `docker run` command can read values from the host environment.\
    \ Here, the `ORACLE_SID` is set using the value of `$dbname` defined in the local\
    \ host environment:\n```bash\ndocker run -d \\\n-e ORACLE_SID=$dbname \\\n...\n\
    ```\n\nDocker can read values from a file, with each `VARIABLE=VALUE` pair on\
    \ separate lines. Example contents of an environment file called `db.env`:\n```\n\
    > cat db.env\nORACLE_SID=TEST\nORACLE_PDB=TESTPDB1\nORACLE_EDITION=EE\nENABLE_ARCHIVELOG=true\n\
    ```\n\nReference the file in the `docker run` command with the `--env-file` option:\n\
    ```bash\ndocker run -d \\\n--env-file db.env \\\n...\n```\n\n### Assign Storage\n\
    \nPersist data from the container database by mapping or mounting storage.\n\n\
    #### Bind-Mount a Directory with `-v`\n\nBind mounting maps a directory on the\
    \ host to a path inside the container. Files in the container are written (and\
    \ saved) to the container host’s filesystem and persisted locally, even if the\
    \ container is removed.\n\nThe `/opt/oracle/oradata` directory in Oracle database\
    \ images includes all database configuration and datafiles. To map it to a directory\
    \ on the host:\n```bash\ndocker run -d \\\n-v :/opt/oracle/oradata\n...\n```\n\
    \n#### Bind-Mount a Directory with `--mount`\n\nThe syntax of `--mount` is more\
    \ verbose and specific, and Docker recommends it over the `-v` option. The order\
    \ of elements in `--mount` isn’t important. To bind-mount a directory with `--mount`,\
    \ use the `type=bind` option:\n```bash\ndocker run -d \\\n--mount type=bind,source=,target=/opt/oracle/oradata\n\
    ...\n```\n\nRemember to use unique directories for each container to avoid multiple\
    \ databases writing to the same path and files!\n\n#### Attach a Predefined Volume\
    \ with `-v`\n\nDocker Volumes are named objects managed by Docker. They must be\
    \ precreated before being referenced in by `docker run`. To map the `/opt/oracle/oradata`\
    \ directory in the container to an existing volume:\n```bash\ndocker run -d \\\
    \n-v :/opt/oracle/oradata\n...\n```\n\n#### Attach a Predefined Volume with `--mount`\n\
    \nAs in the example of using `--mount` to bind a directory, the order of elements\
    \ is unimportant. To map a predefined volume to the `/opt/oracle/oradata` directory\
    \ using `--mount`, use the `type=volume` option:\n```bash\ndocker run -d \\\n\
    --mount type=volume,source=,target=/opt/oracle/oradata\n...\n```\n\n#### Entrypoints\n\
    \nEntrypoints are special directories in containers where scripts will search\
    \ for and execute scripts during creation and startup. In Oracle container images,\
    \ the entrypoints are\n\n*   `Entrypoint roots:` `/docker-entrypoint-initdb.d`\
    \ or `/opt/oracle/scripts`\n*   `Startup scripts:` `/opt/oracle/scripts/startup`\n\
    *   `Setup scripts:` `/opt/oracle/scripts/setup`\n\nWhen mapping directories to\
    \ an entrypoint root path, a `startup` and a `setup` directory must exist in the\
    \ locally mapped directory. Otherwise, the management scripts won’t find anything\
    \ to run. To mount a single directory to the root entrypoint:\n```bash\ndocker\
    \ run -d \\\n--mount type=bind,source=,target=/docker-entrypoint-initdb.d \\\n\
    ...\n```\n\nTo mount directories to the startup and setup entrypoints:\n```bash\n\
    docker run -d \\\n--mount type=bind,source=,target=/opt/oracle/scripts/startup\
    \ \\\n--mount type=bind,source=,target=/opt/oracle/scripts/setup \\\n...\n```\n\
    \n### Networking\n\n#### Map Ports to the Host\n\nPort mapping routes network\
    \ traffic from its native port on a container to a port on the host. It allows\
    \ clients on the host (or host network) to access container resources. To map\
    \ the Oracle listener on a container operating on port 1521:\n```bash\ndocker\
    \ run -d \\\n-p :1521 \\\n...\n```\n\nMap multiple ports with a separate declaration\
    \ for each:\n```bash\ndocker run -d \\\n-p :1521 \\\n-p :5500 \\\n...\n```\n\n\
    #### Add to a Network\n\nTo attach a container to a specific network at startup:\n\
    ```bash\ndocker run -d \\\n--network  \\\n...\n```\n\nContainers may be added\
    \ to (or removed from) networks at will and may even belong to multiple networks.\n\
    \n### Complete Container Examples\n\nThe command in Listing 10-1 creates a simple\
    \ container for an Oracle database and it\n\n*   Defines a custom container name\n\
    *   Defines user-defined values for the database CDB and PDB names\n*   Maps the\
    \ database listener to a port on the container host\n*   Bind-mounts the database’s\
    \ data directory to local storage for persistence\n\nThe resulting container delivers\
    \ all the functionality needed to run a database in a local environment, such\
    \ as a laptop or small lab, without creating volume or network objects.\n\n```bash\n\
    docker run -d \\\n--name  \\\n-e ORACLE_SID= \\\n-e ORACLE_PDB= \\\n-p :1521 \\\
    \n--mount type=bind,source=,target=/opt/oracle/oradata \\\n\n```\n**Listing 10-1**\
    \  \nAn example for creating a named container with a custom container name, user-defined\
    \ CDB, and PDB names, port mapping to the host, and database files and configuration\
    \ persisted to a host directory\n\nThe example in Listing 10-2 adds to the previous\
    \ command, delivering additional features, including a Docker-managed volume bind-mounted\
    \ to a local directory on the host and a user-defined bridge network that includes\
    \ DNS. After creating the prerequisite objects, the `docker run` command\n\n*\
    \   Names the container\n*   Assigns a custom hostname\n*   Defines the CDB and\
    \ PDB databases created in the container\n*   Mounts the predefined volume\n*\
    \   Attaches to the custom network\n\nThis configuration is well suited to intermediate\
    \ and advanced deployments where databases interact with other container services\
    \ (including other databases).\n\n```bash\ndocker volume create --opt type=none\
    \ --opt o=bind \\\n--opt device= \\\n\ndocker network create  --attachable --driver\
    \ bridge\ndocker run -d \\\n--name  \\\n--hostname  \\\n-e ORACLE_SID= \\\n-e\
    \ ORACLE_PDB= \\\n--mount type=volume,source=,target=/opt/oracle/oradata \\\n\
    --network  \\\n\n```\n**Listing 10-2**  \nAn example of building a more robust\
    \ container environment is taking advantage of Docker’s networking and volume\
    \ management.\n\nFinally, the example of Listing 10-3 adds to the previous `docker\
    \ run` command by adding a mapping for the container entrypoint. Docker will run\
    \ any scripts it discovers under the `startup` subdirectory whenever the container\
    \ starts. Scripts in the `setup` subdirectory run immediately after database creation\
    \ in the container.\n\n```bash\ndocker run -d \\\n--name  \\\n--hostname  \\\n\
    -e ORACLE_SID= \\\n-e ORACLE_PDB= \\\n--mount type=volume,source=,target=/opt/oracle/oradata\
    \ \\\n--mount type=bind,source=,target=/docker-entrypoint-initdb.d \\\n--network\
    \  \\\n\n```\n**Listing 10-3**  \nThe docker run command from Listing 10-2, with\
    \ the addition of an entrypoint definition\n\n### Interact with Containers"
