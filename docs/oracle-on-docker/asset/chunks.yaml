  trans: '### 提交与构建


    这解释了为什么提交的镜像更大，但差异的幅度却不成比例。这是因为当 `apt-get update` 和 `apt-get install` 命令运行时，容器的层发生了多大程度的变化。这些命令获取了软件包列表、解压了归档文件，并对存在于底层的文件进行了增量更改。每个操作都向容器的上层写入了一些内容。


    创建镜像还有另一种方式。`dockerfile` 是一套从零开始构建镜像的指令集。`docker commit` 是一种便捷但（有点）暴力的方法。从零开始构建镜像则能提供更大的控制权，并产生更小、更高效的镜像。


    清单 3-4 展示了一个“内嵌”了 `vi` 编辑器的 Ubuntu 镜像的 Dockerfile。清单 3-5 展示了使用此文件构建镜像的命令以及操作的结果。


    ```

    > docker build --tag ubuntu_vi .

    [+] Building 7.1s (6/6) FINISHED

    => [internal] load build definition from Dockerfile

    => => transferring dockerfile: 179B

    => [internal] load .dockerignore

    => => transferring context: 2B

    => [internal] load metadata for docker.io/library/ubuntu:latest

    => [1/2] FROM docker.io/library/ubuntu:latest

    => [2/2] RUN apt-get update && apt-get install -y vim-tiny && apt-get clean &&
    rm -rf /var/lib/apt/lists/*

    => exporting to image

    => => exporting layers

    => => writing image sha256:03545fa76800a4ed39a11c9e25aa184d1a60a2b1cb889730961d47d8c8dde554

    => => naming to docker.io/library/ubuntu_vi

    清单 3-5

    镜像构建及结果

    ```


    ```

    FROM ubuntu:latest AS base

    RUN apt-get update \

    && apt-get install -y vim-tiny \

    && apt-get clean \

    && rm -rf /var/lib/apt/lists/*

    CMD bash

    清单 3-4

    一个用于创建带 vi 功能的 Ubuntu 镜像的 Dockerfile

    ```


    现在不必担心语法——我们将在第 12 到 14 章深入讲解。但请注意从 Dockerfile 构建的新镜像的大小差异：


    ```

    > docker images

    REPOSITORY       TAG       IMAGE ID       CREATED          SIZE

    ubuntu_vi        latest    03545fa76800   15 seconds ago   75.1MB

    ubuntu           latest    ba6acccedd29   4 weeks ago      72.8MB

    ```


    从零开始构建的版本仅大了 2.3MB。这个差异合理得多！


    ## 总结


    当我与人谈论在 Docker 中运行 Oracle 时，我首先会演示它的速度。这是一个引人入胜的开场论点，并将容器与竞争技术区分开来。与数据库管理员的对话很自然地会转向对持久性和可靠性的担忧。人们听说容器是临时性的，就想到了最坏的情况，从而在没有花时间去理解的情况下就摒弃了这项技术。我也未能免俗——这些误解也曾影响了我对
    Docker 的初次体验。


    容器“临时性”的标签源于其 `典型` 的用例，这些用例的生命周期较短。然而，何为“短”是相对的；细想之下，一切都是暂时的！没有任何东西能阻止长寿命的应用程序（包括数据库）在容器中运行。


    在本章中，你发现了容器与其物理和虚拟机（VM）对应物之间的更多区别。这些差异大多源于不同的用例。物理和虚拟主机承担广泛的、多用途的角色，需要各种功能和库。它们的操作系统通常较大，额外的功能也增加了潜在的漏洞。容器则是更精简的系统，针对特定任务定制，其文件系统只包含必要的内容。它们较小的占用空间非常适合在网络上共享，正如你在创建第一个容器时所见证的那样！


    你还应该能够熟练使用 Docker 的命令行界面来运行基本命令，报告系统中存在的镜像和容器，并创建、移除、停止和启动容器。你连接到了一个正在运行的容器并更新了环境，添加了一个编辑器。


    Docker 速度和效率的基础在于它如何使用联合文件系统。层（Layer）将用于启动容器的原始镜像与其生命周期内的更改隔离开来。层为在系统上运行的容器实现了持久性，并有助于容器基础设施的可扩展性，同时似乎还挑战了常识性的数学！你将在本书的第二部分，在涵盖
    Dockerfile、镜像和构建的章节中再次看到层的应用。深入理解层对于欣赏这些主题并非必需，但这是我后悔在 Docker 学习之旅中没有更早掌握的一个领域。


    现在你已经熟悉了 Docker 的语法和工作流程，可以开始使用数据库容器了。我们将在下一章做这件事，通过一个快速入门教程，介绍在容器中运行你的第一个 Oracle
    数据库的步骤！让我们开始吧！


    # 4. Oracle 数据库快速入门


    每当我举办关于在 Docker 上运行 Oracle 的网络研讨会和演示时，与会者最常要求的就是一套循序渐进的指导，以便在容器中启动并运行数据库。本章是一个独立的教程集合，涵盖构建镜像和运行数据库容器的步骤。


    正如一本披萨食谱可能会提供制作面团的说明，而不解释酵母如何使面团发酵一样，本章侧重于“如何做”，而较少涉及“为什么”或“原理”。它涵盖了下载和构建镜像、创建一个基本的容器数据库、允许来自容器外部应用程序（如
    SQL Developer）的客户端连接、访问 Shell，以及在主机上持久化数据。首先，我们必须准备好我们的系统并理解几个基本术语。


    ## 访问 Docker 环境


    延续烹饪的主题，Docker Desktop 是我们准备镜像和容器的厨房。Docker Desktop 可以从 [`www.docker.com`](http://www.docker.com)
    免费下载。附录 A 涵盖了安装和配置。


    ## 术语


    要在 Docker 中启动并运行数据库，需要理解 Docker 环境中使用的一些术语。如果你是跳读到本章，并且不熟悉什么是 `镜像`、`容器` 和 `构建`，如何在系统上访问命令行，或者如何运行基本的
    Docker 命令，请花点时间回顾一下本节内容。如果你已经熟悉这些概念，可以直接跳到下一节 “`获取镜像。`”'
- fmt: '### Docker Commands


    Docker commands begin with `docker` and a verb like `run`, `build`, `exec`, or
    `attach`, followed by flags, objects, and options. There are a handful of commands
    used in this tutorial. You’ll likely use these commands most as you work with
    Docker. Years into my container journey, most of what I do still centers on these
    commands:


    -   `docker images`: Displays images available on the system, including their
    name, image ID, source, size, and age.

    -   `docker ps`: Lists running containers, name, status, source image, and age.
    Containers are processes on a system, and both Linux and Docker use `ps` to list
    processes. Adding the `-a` flag shows all containers, running and stopped.

    -   `docker run`: Creates a container from an image.

    -   `docker start`: Starts a running container.

    -   `docker stop`: Stops a container.

    -   `docker logs`: Displays log output from a container. For the Oracle database
    images we’ll work with, it shows the output of startup operations, including starting
    the listener, the database, and the Database Configuration Assistant when the
    container runs the first time. Afterward, it displays output from the database
    alert log.

    -   `docker exec`: Executes commands in the container.


    These are explained more fully elsewhere in this book.


    ### Images and Containers


    An `image` contains all the files needed to run an application or service. An
    Oracle database image includes its filesystem, operating system libraries and
    executables, prerequisite packages, settings, binaries, and configuration files.


    `Containers` are processes started on a host from an image. Many containers can
    be started using the same image, and each container can perform work and make
    changes to its initial state independently of other containers. Containers can
    be stopped and started, and their contents persist across restarts.


    ### Build and Run


    Images are `built` using a set of instructions called a `Dockerfile`. Dockerfiles
    are the recipes Docker uses to collect ingredients (including files and other
    images) and prepare them into a final image. Containers `run` from an image.


    It’s not critical to understand the details of either process for this quick start.
    Still, it’s important to recognize the relationships between the actions and objects
    since you will build an image and run a container as part of this tutorial.


    ### The Docker Command Line


    Most interactions with Docker Desktop occur through a command line. Windows users
    should use `Windows Terminal`. In Mac and Linux environments, open a native terminal
    application.


    ### Obtaining an Image


    Before running a database container, we need an image. Like baking a pizza, there
    are a few options available for Oracle database images, including


    -   **Pre-built images:** This is the frozen pizza option. In a pre-built image,
    all the preparation is done for you. You only have to bake (or microwave) it and
    enjoy the results! In the container world, “baking” the image is running a container.
    Pre-built images may not be exactly what you want. Configurations meet popular
    or general needs, and only one company makes pre-built images—Oracle. Oracle’s
    pre-built images include the database software, and users must accept a license
    agreement to download them.

    -   **Build from a repository:** If you want more control over images, consider
    a `repository`. A repository is a collection of scripts for building images. This
    is comparable to assembling a pizza from a ready-made crust, a jar of sauce, and
    ingredients you provide—including the Oracle database software and license. Oracle
    maintains an excellent repository for building a wide array of products beyond
    just the database. Since repositories don’t include licensed software, organizations
    and community members can create and share repositories. Building from a repository
    is a bit more time-consuming but isn’t difficult, much less so than creating images
    from scratch.

    -   **Build from a custom Dockerfile or repository:** Complete control and flexibility
    come from custom Dockerfiles or repositories. This is the pizza-making equivalent
    of preparing the sauce and hand-kneading dough from scratch. Writing custom Dockerfiles
    is covered in Chapter 13.

    -   **Database as a Service:** Cloud vendors may offer options for databases as
    a service or `DBaaS`. DBaaS is like ordering at a restaurant where the cloud vendor
    does the work and customers consume the results.


    Let’s begin with the most straightforward option: working from a pre-built image.


    #### Pre-built Images


    Pre-built images are the easiest way to get up and running. They’re also the most
    limited regarding version and edition availability. Oracle maintains these images
    on their own Oracle Container Registry site at `https://container-registry.oracle.com`.
    They are not updated frequently, and you may encounter limited functionality.


    As of this writing, the available options are


    -   Version 19.3.0.0 Enterprise Edition, Standard Edition

    -   Version 12.2.0.1 Enterprise Edition, Standard Edition 2 (SE2)

    -   Version 12.1.0.2 Enterprise Edition


    If one of these options meets your needs, go to `container-registry.oracle.com`
    and navigate to the `Database` repository. Figure 4-1 shows the Oracle Container
    Registry and the Database repository where the pre-built database images reside.


    ![](images/514143_1_En_4_Chapter/514143_1_En_4_Fig1_HTML.jpg)


    Figure 4-1: The Oracle Container Registry and Database repository


    There are separate Database repositories for Enterprise and Standard Editions
    (as well as Oracle Instant Client and RAC). Choose an edition to move on to the
    documentation and download page. For this example, I selected Enterprise Edition.
    Figure 4-2 shows the Oracle 19c Docker Image Documentation.


    ![](images/514143_1_En_4_Chapter/514143_1_En_4_Fig2_HTML.jpg)


    Figure 4-2: Oracle Database 19c Docker Image Documentation and download


    This page includes complete instructions for running and using the image, and
    there’s no reason to repeat them here. How to get the image to your local machine
    is not well documented!'
