    Think of a hobby or activity you enjoy and recall how you started. Chances are
    you were unsure where to begin or what equipment you needed. During those early
    days of learning the ropes, you might have done research or joined a club to get
    advice on what to buy and how to hone your skills. You probably didn’t buy the
    most expensive equipment, starting instead with something more basic. Spending
    time improving your skills with introductory gear prepares you for the next step
    and helps justify investing in something better (and likely more expensive).


    The Oracle GitHub repository is great for breaking into the world of Linux containers.
    It’s full of ready-made formulas that remove the risk and cost of exploring container
    platforms. There’s no better introduction for anyone curious about using containers
    as a platform for Oracle technology. Indeed, it’s where I got my start with Docker,
    and it carried me through my first few years. Without it, you wouldn’t be reading
    this book! It’s an introductory resource, though, and there comes the point where
    you’ll need something more appropriate and tailored to your needs and plans—particularly
    if you intend to use containers as a production platform for Oracle databases.


    This chapter opens by highlighting limitations you’re likely to encounter with
    ready-made, multipurpose images available in public repositories. We’ll introduce
    additional Dockerfile features that broaden the possibilities for repository design
    and discuss the pros and cons of dedicated vs. all-in-one directory structures.
    Then, after demonstrating techniques for adding extensibility to Dockerfiles and
    building templates, I’ll offer patterns for solving challenges you’ll encounter
    when designing and authoring your own Dockerfile libraries. Readers should be
    comfortable with shell scripting and familiar with basic Dockerfile instructions
    and concepts. Think of this as a guide to selecting a “second bike” after putting
    in some miles, getting comfortable in the saddle, learning how containers work,
    and determining where you want to go next!


    ## Multipurpose Image Limitations


    Back in the days when I worked in a physical office with an on-site data center,
    I carried a multitool (basically a Swiss Army Knife) on my belt. It had pliers,
    Phillips and Flathead screwdrivers, a wire stripper, and a few blades. When I
    needed to work on something in the data center, most of the tools I needed were
    conveniently located on my hip. The quality of the tools was perfectly adequate
    for quick work—replacing a hard drive or network card, securing a server in a
    rack, or prying loose a stubborn, ill-fitting part. Would I use a multitool knife
    for chopping vegetables? No.


    Ready-made, multipurpose images fill a similar need. They’re reliable and convenient
    and provide an easy on-ramp into the world of containers. But while they’re adaptable
    and fit wide-ranging needs, you’ll eventually encounter situations that require
    more precise tools. In some cases, you’ll be able to leverage existing scripts,
    adapting or rewriting them to add features or modify functionality. We identified
    the scripts responsible for implementing basic functionality in Chapter [11](#514143_1_En_11_Chapter.xhtml).
    Minor modifications to these scripts address limitations and oddities in multipurpose
    image builds.


    ### Fixed Directory Paths


    Containers typically provide services to clients. They’re endpoints that accept
    input and produce results. For our container databases, the values of the `ORACLE_HOME`
    and `ORACLE_BASE` directories inside containers aren’t important if the results
    are correct. It’s no different than traditional environments. Clients connecting
    to databases on physical hosts or virtual machines don’t care about the implementation
    details.


    These paths are essential for consistency and monitoring, though. If you’re introducing
    containers as analogs for simulating or testing existing systems, scripts and
    procedures are only portable across systems when the directory structures match.
    The same applies to monitoring systems and utilities. Standard configurations
    shared across environments simplify management and maintenance.


    Users have two choices for adapting existing Dockerfiles and scripts, depending
    on the need for flexibility. The first is simply changing hard-coded values to
    match standards by editing the `ENV` assignments in Dockerfiles. The path is still
    hard-coded. It’s just set to the same value used elsewhere.


    The second option leverages arguments, introducing a default value but adding
    the option to override the default during the build:


    ```

    # Set a default value for the ORACLE_BASE:

    ARG ORACLE_BASE=/u01/opt/oracle

    # Assign the ORACLE_BASE to environment variables in the image:

    ENV ORACLE_BASE=$ORACLE_BASE

    ENV ORACLE_HOME=$ORACLE_BASE/product/19c/dbhome_1

    ```


    This is more appropriate for users working across multiple environments and a
    foundation for more adaptable image construction.'
  trans: '# 13. Oracle Dockerfile 示例集锦


    我 13 岁那年，看了一部叫《*破网而出*》（Breaking Away）的电影，这是一个讲述四个高中毕业生试图寻找人生方向的成长故事。主角是个迷恋自行车赛的年轻人，他甚至假装自己是意大利车手。第二天，我偶然参加了一场本地自行车赛。这两件事给了我双重冲击，当天下午我就冲到本地车店，对所有愿意听的人宣布：我要成为一名自行车手！那时的我是个天真、易受影响的青少年，如饥似渴地从当地自行车俱乐部成员、车店常客以及杂志的文章和图片中汲取建议和见解。镇上的一家车店里有一辆漂亮的意大利
    Colnago。它是黑色的，带有金色装饰和镀金的 Campagnolo 组件。它堪称意大利自行车装备的典范，像艺术品一样陈列在收银台后面的墙上！


    我和车店里的一位先生成了朋友，^(⁷⁰) 他成了我这项运动的导师。他将我的注意力从我的梦想之车——以及任何 Colnago 上——移开，推荐了一辆不那么优雅的
    Campania。它有难看的灰色漆面，重量似乎是其他车的两倍。但为其说句公道话，它有一个意大利名字，贴花上用金色手写体宣称自己是“Professional”，这在一定程度上中和了它那不如我梦想之车那般吸引眼球的外观！


    真正重要的是：事实证明，这辆 Campania 近乎坚不可摧，对像我这样笨拙的新手非常宽容，而且对于一个靠兼职打工的高中生来说价格也负担得起。（车店里卖的任何
    Colnago——镀金与否——可都不敢这么说！）那辆车为我服务得很好，挺过了我学习曲线中遭遇的种种意外和摔车。它是我当时合适的自行车。它帮助我度过了这项运动的入门阶段，到了需要更换它时，我已经学到了足够的知识，知道尽管
    Colnago 很美，但它并不适合我。


    回想一个你喜欢的爱好或活动，以及你是如何开始的。很可能你当时也不确定从何开始或需要什么装备。在那些初学的摸索阶段，你可能会做研究或加入俱乐部，以获取关于购买什么和如何磨练技能的建议。你大概不会买最昂贵的装备，而是从更基础的东西开始。花时间用入门级装备提升技能，能为你下一步做好准备，并有助于证明投资更好（也可能更贵）的装备是合理的。


    Oracle GitHub 仓库是进入 Linux 容器世界的绝佳起点。它充满了现成的配方，消除了探索容器平台的风险和成本。对于任何好奇想将容器用作 Oracle
    技术平台的人来说，没有比这更好的入门介绍了。事实上，我就是从这里开始使用 Docker 的，它陪伴我度过了最初几年。没有它，你可能就不会读到这本书了！然而，它终究是一个入门资源，总会有那么一刻，你会需要更贴合你需求和计划的、更合适的方案——特别是如果你打算将容器用作
    Oracle 数据库的生产平台。


    本章首先会强调你在公共仓库中可能遇到的现成、多功能镜像的局限性。我们将介绍一些额外的 Dockerfile 特性，这些特性拓宽了仓库设计的可能性，并讨论专用目录结构与一体化目录结构的优缺点。然后，在演示了为
    Dockerfile 增加可扩展性以及构建模板的技术之后，我将提供一些模式，用于解决你在设计和编写自己的 Dockerfile 库时会遇到的挑战。读者应熟悉
    shell 脚本编写，并了解基本的 Dockerfile 指令和概念。可以将本章看作一份指南，指导你在骑行了一些里程、熟悉了马鞍、了解了容器工作原理并确定了下一步方向后，如何选择一辆“第二辆自行车”！


    ## 多功能镜像的局限性


    早年我在有现场数据中心的实体办公室工作时，腰带上总挂着一把多功能工具（基本上就是瑞士军刀）。它有钳子、十字和一字螺丝刀、剥线钳和几把刀片。当需要在数据中心处理事情时，我需要的大部分工具都方便地别在我腰间。这些工具的质量对于快速工作——比如更换硬盘或网卡、在机架中固定服务器，或者撬开一个顽固、不合适的零件——是完全足够的。但我会用多功能刀来切菜吗？不会。


    现成的多功能镜像满足了类似的需求。它们可靠、方便，并为进入容器世界提供了轻松的入门途径。但尽管它们适应性强且用途广泛，你最终会遇到需要更精确工具的情况。在某些情况下，你将能够利用现有脚本，通过修改或重写来增加功能或修改行为。我们在第[11]章中识别出了负责实现基本功能的脚本。对这些脚本稍作修改，就能解决多功能镜像构建中的局限性和怪异之处。


    ### 固定的目录路径


    容器通常向客户端提供服务。它们是接受输入并产生结果的端点。对于我们容器化的数据库来说，如果结果是正确的，那么容器内`ORACLE_HOME`和`ORACLE_BASE`目录的具体路径值并不重要。这与传统环境没什么不同。连接到物理主机或虚拟机上的数据库的客户端并不关心实现细节。


    然而，这些路径对于一致性和监控至关重要。如果你引入容器来模拟或测试现有系统，只有当目录结构匹配时，脚本和流程才能在不同系统间移植。监控系统和工具也是如此。跨环境共享标准配置可以简化管理和维护。


    根据对灵活性的需求，用户有两种选择来调整现有的 Dockerfile 和脚本。第一种是简单地通过编辑 Dockerfile 中的`ENV`赋值来将硬编码的值更改为匹配标准。路径仍然是硬编码的，只是设置为与其他地方使用的相同值。


    第二种选择利用参数，引入一个默认值，但增加了在构建时覆盖该默认值的选项：

    ```

    # 为 ORACLE_BASE 设置一个默认值：

    ARG ORACLE_BASE=/u01/opt/oracle

    # 将 ORACLE_BASE 赋值给镜像中的环境变量：

    ENV ORACLE_BASE=$ORACLE_BASE

    ENV ORACLE_HOME=$ORACLE_BASE/product/19c/dbhome_1

    ```

    这对于在多环境中工作的用户更为合适，并且是构建更具适应性镜像的基础。'
- fmt: '# Contradictions


    我承认，Oracle镜像中让我颇为烦恼的一点是Oracle Inventory Directory（清单目录）被安装在`ORACLE_BASE`之下。Oracle的*OFA*（Optimal
    Flexible Architecture，最优灵活架构）将清单目录置于`ORACLE_BASE`之外，以支持多个安装。在一个*Real Application
    Clusters*（RAC）系统中，符合OFA的目录结构可能如下所示：


    ```

    # Oracle Inventory

    /u01/app/oraInventory

    # Database BASE and HOME:

    /u01/app/oracle

    /u01/app/oracle/product/$DB_VERSION/dbhome_1

    # Grid Infrastructure BASE and HOME:

    /u01/app/grid

    /u01/app/$GRID_VERSION/grid

    ```


    这种独立的、专用的目录结构允许不同的所有权和必要的权限，以支持角色分离，所有这些都由一个单独的清单目录管理。


    在容器中采用不同的做法有其合理的原因。查看Oracle的某个Dockerfile，在接近末尾处你会看到如下代码块：


    ```

    USER oracle

    COPY --chown=oracle:dba --from=builder $ORACLE_BASE $ORACLE_BASE

    USER root

    RUN $ORACLE_BASE/oraInventory/orainstRoot.sh && \

    $ORACLE_HOME/root.sh

    ```


    `COPY`命令从先前的构建阶段（通过`--from=builder`参数引用）复制整个`ORACLE_BASE`目录结构到最终的镜像中。随后的指令在最终镜像中运行安装后的root脚本，设置清单目录的权限并注册`ORACLE_HOME`。


    如果清单目录位于`ORACLE_BASE`之下，一条命令就能复制所有内容——清单、`ORACLE_BASE`和`ORACLE_HOME`。由于每条命令都会在镜像中创建一个独立的层，将清单整合到`ORACLE_BASE`之下可以减少层数（并可能减小最终镜像的大小）。对镜像运行`docker
    history`可以看到此次复制操作创建的单一层面。为了清晰起见，我使用了格式化命令只打印“CREATED BY”字段，显示创建该层所用的命令：


    ```

    > docker image history --no-trunc --format "table {{.CreatedBy}}"  oracle/database:19.3.0-ee

    CREATED BY

    ...

    /bin/sh -c $ORACLE_BASE/oraInventory/orainstRoot.sh &&     $ORACLE_HOME/root.sh

    /bin/sh -c #(nop)  USER root

    /bin/sh -c #(nop) COPY --chown=oracle:dbadir:7f7ee78c2762cb56f03228b45ce0c0301ea5fd88c4ac14dd98d74eb5621054e4
    in /opt/oracle

    /bin/sh -c #(nop)  USER oracle

    ...

    ```


    这是另一种情况，从最终用户的角度看，容器中的清单位置并不重要。它对客户端没有影响——端点是一个执行数据库操作的数据库。但它在以下情况下确实重要：


    *   `Real Application Clusters`或`Global Service Manager`安装

    *   拥有多个`ORACLE_BASE`目录的系统

    *   需要角色分离的环境

    *   保持与现有基础设施的一致性

    *   防止安装程序错误


    在最后一种情况下，如果清单位置位于`ORACLE_BASE`之下，Oracle安装可能会返回以下警告（并伴随一个非零退出码）：


    ```

    Attention: INS-32056: The specified Oracle Base contains the existing Central
    Inventory location.

    Recommendation: Oracle recommends that the Central Inventory location is outside
    the Oracle Base directory. Specify a different location for the Oracle Base.

    ```


    或


    ```

    [WARNING] [INS-32056] The specified Oracle Base contains the existing Central
    Inventory location: /opt/oracle/oraInventory.

    ACTION: Oracle recommends that the Central Inventory location is outside the Oracle
    Base directory. Specify a different location for the Oracle Base.

    ```


    在一个*完美*的世界里，自动化流程应该因错误和警告而失败，标记出需要审查的条件，或者包含条件异常处理器来忽略它们。假设警告未被捕获或被视为潜在的故障。那样的话，就无法区分预期的、“可以安全忽略”的警告与可能影响镜像可靠性或准确性的其他警告。


    有多种方法可以解决这个问题。在我的脚本中，我为`ORACLE_INVENTORY`创建了一个参数和环境变量，并在Dockerfile中为清单目录添加了第二条`COPY`指令：


    ```

    ARG ORACLE_INVENTORY=/u01/app/oraInventory

    ENV ORACLE_INVENTORY=$ORACLE_INVENTORY

    ```


    我们还需要添加一条新的`COPY`指令来处理清单：


    ```

    USER oracle

    COPY --chown=oracle:dba --from=builder $ORACLE_BASE $ORACLE_BASE

    COPY --chown=oracle:dba --from=builder $ORACLE_INVENTORY $ORACLE_INVENTORY

    ```


    然后，更新执行安装后root脚本的`RUN`命令，将对`ORACLE_BASE`的引用改为新的`ORACLE_INVENTORY`变量：


    ```

    USER root

    RUN $ORACLE_INVENTORY/oraInventory/orainstRoot.sh && \

    $ORACLE_HOME/root.sh

    ```


    这解决了Dockerfile中的步骤。我们还需要将新的目录位置推送到数据库安装中。数据库安装响应文件`db_inst.rsp`通过`INVENTORY_LOCATION`条目设置清单路径。将以下行从


    ```

    INVENTORY_LOCATION=###ORACLE_BASE###/oraInventory

    ```


    改为


    ```

    INVENTORY_LOCATION=###ORACLE_INVENTORY###/oraInventory

    ```


    最后一步是在`installDBBinaries.sh`脚本中添加一行，用环境中的清单位置替换占位符。修改替换占位符的代码部分，使其如下所示：


    ```

    # Replace place holders

    # ---------------------

    sed -i -e "s|###ORACLE_EDITION###|$EDITION|g" "$INSTALL_DIR"/"$INSTALL_RSP" &&
    \

    sed -i -e "s|###ORACLE_BASE###|$ORACLE_BASE|g" "$INSTALL_DIR"/"$INSTALL_RSP" &&
    \

    sed -i -e "s|###ORACLE_HOME###|$ORACLE_HOME|g" "$INSTALL_DIR"/"$INSTALL_RSP" &&
    \

    sed -i -e "s|###ORACLE_INVENTORY###|$ORACLE_INVENTORY|g" "$INSTALL_DIR"/"$INSTALL_RSP"

    ```


    更新清单位置涉及一些工作，但对于增强镜像的通用性、保持与现有约定的一致性、或遵守标准和推荐实践来说，这是值得的（有时是必要的）一步。它也消除了容器与“传统”环境之间的一个差异，而这个差异常被反对者用作反对容器的论据！


    ## Extended Multitenancy Options


    Oracle在12c版本中引入了多租户数据库选项。多租户架构在21c及更高版本中成为强制要求。Oracle容器镜像创建的多租户数据库包含容器数据库（CDB）和一个可插拔数据库（PDB）。用户可以通过向`docker
    run`命令传递环境变量来设置容器和可插拔数据库的名称。然而，在初始数据库设置期间，没有选项可以创建非容器数据库或自动添加多个可插拔数据库。'
  raw: '### Contradictions


    I confess that one of my pet peeves in Oracle images is having the Oracle Inventory
    Directory installed under `ORACLE_BASE`. Oracle’s *OFA*, or *Optimal Flexible
    Architecture*, places the inventory outside `ORACLE_BASE` to support multiple
    installations. In a *Real Application Clusters*, or *RAC,* system, an OFA-compliant
    directory structure might look like this:


    ```

    # Oracle Inventory

    /u01/app/oraInventory

    # Database BASE and HOME:

    /u01/app/oracle

    /u01/app/oracle/product/$DB_VERSION/dbhome_1

    # Grid Infrastructure BASE and HOME:

    /u01/app/grid

    /u01/app/$GRID_VERSION/grid

    ```


    The separate, dedicated directories allow distinct ownership and permissions necessary
    to support role separations, all managed from a single inventory directory.


    There’s a reasonable explanation for doing it differently in containers. Look
    at one of Oracle’s Dockerfiles, and near the end, you’ll see the following block:


    ```

    USER oracle

    COPY --chown=oracle:dba --from=builder $ORACLE_BASE $ORACLE_BASE

    USER root

    RUN $ORACLE_BASE/oraInventory/orainstRoot.sh && \

    $ORACLE_HOME/root.sh

    ```


    The `COPY` command copies the whole `ORACLE_BASE` directory structure from a prior
    stage, referenced by the `--from=builder` argument, into the final image. The
    following instructions run the post-installation root scripts in the final image,
    setting the permissions on the inventory directory and registering the `ORACLE_HOME`.


    If the inventory directory is under the `ORACLE_BASE`, a single command copies
    everything—the inventory, the `ORACLE_BASE`, and the `ORACLE_HOME`. Since every
    command creates a separate layer in the image, consolidating the inventory under
    the `ORACLE_BASE` reduces the number of layers (and potentially, the final image
    size). Running `docker history` against the image shows the single layer created
    by this copy. I’ve used the format command to print just the “CREATED BY” field,
    showing only the command used to create the layer for clarity:


    ```

    > docker image history --no-trunc --format "table {{.CreatedBy}}"  oracle/database:19.3.0-ee

    CREATED BY

    ...

    /bin/sh -c $ORACLE_BASE/oraInventory/orainstRoot.sh &&     $ORACLE_HOME/root.sh

    /bin/sh -c #(nop)  USER root

    /bin/sh -c #(nop) COPY --chown=oracle:dbadir:7f7ee78c2762cb56f03228b45ce0c0301ea5fd88c4ac14dd98d74eb5621054e4
    in /opt/oracle

    /bin/sh -c #(nop)  USER oracle

    ...

    ```


    This is another situation where, from the end user''s perspective, the inventory
    location in the container doesn’t matter. It doesn’t make a difference to clients—the
    endpoint is a database that does database things. It does matter for


    *   Real Application Clusters or Global Service Manager installations


    *   Systems with multiple `ORACLE_BASE` directories


    *   Environments with role separation


    *   Remaining consistent with existing infrastructure


    *   Preventing installer errors


    In the last case, if the inventory location is under the `ORACLE_BASE`, the Oracle
    installation may return the following warnings (along with a nonzero exit code):


    ```

    Attention: INS-32056: The specified Oracle Base contains the existing Central
    Inventory location.

    Recommendation: Oracle recommends that the Central Inventory location is outside
    the Oracle Base directory. Specify a different location for the Oracle Base.

    ```


    or


    ```

    [WARNING] [INS-32056] The specified Oracle Base contains the existing Central
    Inventory location: /opt/oracle/oraInventory.

    ACTION: Oracle recommends that the Central Inventory location is outside the Oracle
    Base directory. Specify a different location for the Oracle Base.

    ```


    In a *perfect* world, automation should fail on errors and warnings, flag the
    conditions for review, or include conditional exception handlers to ignore them.
    Suppose the warning isn’t caught or treated as a potential failure. In that case,
    there’s no way to differentiate an expected, “safe to ignore” warning from others
    that could affect the reliability or accuracy of images.


    There are multiple ways to get around this issue. In my scripts, I create an argument
    and environment variable for the `ORACLE_INVENTORY` and add a second `COPY` instruction
    to the Dockerfile for the inventory directory:


    ```

    ARG ORACLE_INVENTORY=/u01/app/oraInventory

    ENV ORACLE_INVENTORY=$ORACLE_INVENTORY

    ```


    We’ll also need to add a new `COPY` instruction to handle the inventory:


    ```

    USER oracle

    COPY --chown=oracle:dba --from=builder $ORACLE_BASE $ORACLE_BASE

    COPY --chown=oracle:dba --from=builder $ORACLE_INVENTORY $ORACLE_INVENTORY

    ```


    Then, update the `RUN` command that executes the post-installation root scripts
    by changing the reference to `ORACLE_BASE` to the new `ORACLE_INVENTORY` variable:


    ```

    USER root

    RUN $ORACLE_INVENTORY/oraInventory/orainstRoot.sh && \

    $ORACLE_HOME/root.sh

    ```


    That addresses the steps in the Dockerfile. We also need to push the new directory
    location to the database installation. The database installation response file,
    `db_inst.rsp`, sets the inventory path via the `INVENTORY_LOCATION` entry. Change
    the following line from


    ```

    INVENTORY_LOCATION=###ORACLE_BASE###/oraInventory

    ```


    to


    ```

    INVENTORY_LOCATION=###ORACLE_INVENTORY###/oraInventory

    ```


    The last step is adding a line to the `installDBBinaries.sh` script to substitute
    the placeholder with the inventory location from the environment. Modify the section
    of code that replaces the placeholders to read:


    ```

    # Replace place holders

    # ---------------------

    sed -i -e "s|###ORACLE_EDITION###|$EDITION|g" "$INSTALL_DIR"/"$INSTALL_RSP" &&
    \

    sed -i -e "s|###ORACLE_BASE###|$ORACLE_BASE|g" "$INSTALL_DIR"/"$INSTALL_RSP" &&
    \

    sed -i -e "s|###ORACLE_HOME###|$ORACLE_HOME|g" "$INSTALL_DIR"/"$INSTALL_RSP" &&
    \

    sed -i -e "s|###ORACLE_INVENTORY###|$ORACLE_INVENTORY|g" "$INSTALL_DIR"/"$INSTALL_RSP"

    ```


    There’s some work involved in updating the inventory. Still, it’s a worthwhile
    (and sometimes necessary) step for adding versatility to images, maintaining consistency
    with existing conventions, or remaining compliant with standards and recommended
    practices. It also removes a disparity between containers and “traditional” environments
    that objectors raise as arguments against containers!


    ## Extended Multitenancy Options


    Oracle introduced the multitenant database option in version 12c. Multitenant
    architecture becomes mandatory with version 21c and beyond. Oracle container images
    create multitenant databases consisting of the container database, or CDB, and
    a single pluggable database, or PDB. Users can set the names of the container
    and pluggable databases by passing environment variables to the `docker run` command.
    However, there’s no option to create a non-container database or automatically
    add multiple pluggable databases during the initial database setup.'
  trans: '# 矛盾之处


    我承认，Oracle 镜像中让我颇为烦恼的一点是 Oracle 清单目录被安装在 `ORACLE_BASE` 之下。Oracle 的 *OFA*（最优灵活架构）将清单目录置于
    `ORACLE_BASE` 之外，以支持多个安装。在一个 *Real Application Clusters*（RAC）系统中，符合 OFA 的目录结构可能如下所示：


    ```

    # Oracle 清单

    /u01/app/oraInventory

    # 数据库 BASE 和 HOME:

    /u01/app/oracle

    /u01/app/oracle/product/$DB_VERSION/dbhome_1

    # 网格基础设施 BASE 和 HOME:

    /u01/app/grid

    /u01/app/$GRID_VERSION/grid

    ```


    这种独立的、专用的目录结构允许不同的所有权和必要的权限，以支持角色分离，所有这些都由一个单独的清单目录管理。


    在容器中采用不同的做法有其合理的原因。查看 Oracle 的某个 Dockerfile，在接近末尾处你会看到如下代码块：


    ```

    USER oracle

    COPY --chown=oracle:dba --from=builder $ORACLE_BASE $ORACLE_BASE

    USER root

    RUN $ORACLE_BASE/oraInventory/orainstRoot.sh && \

    $ORACLE_HOME/root.sh

    ```


    `COPY` 命令从先前的构建阶段（通过 `--from=builder` 参数引用）复制整个 `ORACLE_BASE` 目录结构到最终的镜像中。随后的指令在最终镜像中运行安装后的
    root 脚本，设置清单目录的权限并注册 `ORACLE_HOME`。


    如果清单目录位于 `ORACLE_BASE` 之下，一条命令就能复制所有内容——清单、`ORACLE_BASE` 和 `ORACLE_HOME`。由于每条命令都会在镜像中创建一个独立的层，将清单整合到
    `ORACLE_BASE` 之下可以减少层数（并可能减小最终镜像的大小）。对镜像运行 `docker history` 可以看到此次复制操作创建的单一层面。为了清晰起见，我使用了格式化命令只打印“CREATED
    BY”字段，显示创建该层所用的命令：


    ```

    > docker image history --no-trunc --format "table {{.CreatedBy}}"  oracle/database:19.3.0-ee

    CREATED BY

    ...

    /bin/sh -c $ORACLE_BASE/oraInventory/orainstRoot.sh &&     $ORACLE_HOME/root.sh

    /bin/sh -c #(nop)  USER root

    /bin/sh -c #(nop) COPY --chown=oracle:dbadir:7f7ee78c2762cb56f03228b45ce0c0301ea5fd88c4ac14dd98d74eb5621054e4
    in /opt/oracle

    /bin/sh -c #(nop)  USER oracle

    ...

    ```


    这是另一种情况，从最终用户的角度看，容器中的清单位置并不重要。它对客户端没有影响——端点是一个执行数据库操作的数据库。但它在以下情况下确实重要：


    *   `Real Application Clusters` 或 `Global Service Manager` 安装

    *   拥有多个 `ORACLE_BASE` 目录的系统

    *   需要角色分离的环境

    *   保持与现有基础设施的一致性

    *   防止安装程序错误


    在最后一种情况下，如果清单位置位于 `ORACLE_BASE` 之下，Oracle 安装可能会返回以下警告（并伴随一个非零退出码）：


    ```

    Attention: INS-32056: The specified Oracle Base contains the existing Central
    Inventory location.

    Recommendation: Oracle recommends that the Central Inventory location is outside
    the Oracle Base directory. Specify a different location for the Oracle Base.

    ```


    或


    ```

    [WARNING] [INS-32056] The specified Oracle Base contains the existing Central
    Inventory location: /opt/oracle/oraInventory.

    ACTION: Oracle recommends that the Central Inventory location is outside the Oracle
    Base directory. Specify a different location for the Oracle Base.

    ```


    在一个*完美*的世界里，自动化流程应该因错误和警告而失败，标记出需要审查的条件，或者包含条件异常处理器来忽略它们。假设警告未被捕获或被视为潜在的故障。那样的话，就无法区分预期的、“可以安全忽略”的警告与可能影响镜像可靠性或准确性的其他警告。


    有多种方法可以解决这个问题。在我的脚本中，我为 `ORACLE_INVENTORY` 创建了一个参数和环境变量，并在 Dockerfile 中为清单目录添加了第二条
    `COPY` 指令：


    ```

    ARG ORACLE_INVENTORY=/u01/app/oraInventory

    ENV ORACLE_INVENTORY=$ORACLE_INVENTORY

    ```


    我们还需要添加一条新的 `COPY` 指令来处理清单：


    ```

    USER oracle

    COPY --chown=oracle:dba --from=builder $ORACLE_BASE $ORACLE_BASE

    COPY --chown=oracle:dba --from=builder $ORACLE_INVENTORY $ORACLE_INVENTORY

    ```


    然后，更新执行安装后 root 脚本的 `RUN` 命令，将对 `ORACLE_BASE` 的引用改为新的 `ORACLE_INVENTORY` 变量：


    ```

    USER root

    RUN $ORACLE_INVENTORY/oraInventory/orainstRoot.sh && \

    $ORACLE_HOME/root.sh

    ```


    这解决了 Dockerfile 中的步骤。我们还需要将新的目录位置推送到数据库安装中。数据库安装响应文件 `db_inst.rsp` 通过 `INVENTORY_LOCATION`
    条目设置清单路径。将以下行从


    ```

    INVENTORY_LOCATION=###ORACLE_BASE###/oraInventory

    ```


    改为


    ```

    INVENTORY_LOCATION=###ORACLE_INVENTORY###/oraInventory

    ```


    最后一步是在 `installDBBinaries.sh` 脚本中添加一行，用环境中的清单位置替换占位符。修改替换占位符的代码部分，使其如下所示：


    ```

    # 替换占位符

    # ---------------------

    sed -i -e "s|###ORACLE_EDITION###|$EDITION|g" "$INSTALL_DIR"/"$INSTALL_RSP" &&
    \

    sed -i -e "s|###ORACLE_BASE###|$ORACLE_BASE|g" "$INSTALL_DIR"/"$INSTALL_RSP" &&
    \

    sed -i -e "s|###ORACLE_HOME###|$ORACLE_HOME|g" "$INSTALL_DIR"/"$INSTALL_RSP" &&
    \

    sed -i -e "s|###ORACLE_INVENTORY###|$ORACLE_INVENTORY|g" "$INSTALL_DIR"/"$INSTALL_RSP"

    ```


    更新清单位置涉及一些工作，但对于增强镜像的通用性、保持与现有约定的一致性、或遵守标准和推荐实践来说，这是值得的（有时是必要的）一步。它也消除了容器与“传统”环境之间的一个差异，而这个差异常被反对者用作反对容器的论据！


    ## 扩展的多租户选项


    Oracle 在 12c 版本中引入了多租户数据库选项。多租户架构在 21c 及更高版本中成为强制要求。Oracle 容器镜像创建的多租户数据库包含容器数据库（CDB）和一个可插拔数据库（PDB）。用户可以通过向
    `docker run` 命令传递环境变量来设置容器和可插拔数据库的名称。然而，在初始数据库设置期间，没有选项可以创建非容器数据库或自动添加多个可插拔数据库。'
- fmt: '### Create Non-CDB Databases


    Oracle may prefer we create and use container databases in versions 12c through
    19c. Still, non-CDB installations dominate real-world installations and will likely
    remain in the majority for the next several years. It makes sense then that we
    should be able to choose the architecture created in containers. Chapter [11](#514143_1_En_11_Chapter.xhtml)
    presented the steps for passing an option to `docker run` for selecting between
    container or non-container architectures. Briefly, it involves


    *   Updating the `dbca.rsp.tmpl` template, replacing the hard-coded value given
    to `createAsContainerDatabase` with a placeholder. When a new container starts,
    it calls the `createDB.sh` script, referencing the `Database Configuration Assistant`,
    or `DBCA`, template for database creation. The placeholder introduces the option
    of changing the database creation method by substituting an environment variable.

    *   Adding a `sed` find/replace command to conditionally substitute either true
    or false, based on an optional environment variable, into the `DBCA` template.

    *   Modifying the database health check, in `checkDBStatus.sh`, to read the value
    of open mode from either `v$pdbs` (for container databases) or `v$database` (for
    non-container) databases.

    *   Conditionally removing commands specific to pluggable databases from the database
    creation script.


    This pattern, in whole or part, can be adapted to add similar functionality during
    database creation and startup.


    ### Create Multiple Pluggable Databases


    Pluggable databases can increase database infrastructure''s usefulness, capacity,
    and lifespan by consolidating multiple stand-alone databases into pluggable databases,
    or PDBs, on a single host. Like schemas, PDBs offer another means of segmenting
    or separating data, and it’s not unusual to see container databases housing two
    or more PDBs. It makes sense to reflect this practice into database images, adding
    the ability to create multiple PDBs during initial container creation. There are
    two avenues to achieve this. The first changes the `DBCA` template and reads variables
    from the environment. The second leverages the Docker entrypoint directory and
    runs a script after the database setup completes.


    The first method works similarly to creating a non-CDB database, inserting a placeholder
    to the Database Creation Assistant template, and adding a `sed` command to conditionally
    substitute the placeholder with a value derived from the environment. The key
    in the `DBCA` template is `numberOfPDBs`, set by default to one:


    ```

    numberOfPDBs=1

    ```


    Replace this with a placeholder:


    ```

    numberOfPDBs=###PDB_COUNT###

    ```


    Add a `sed` command to the `createDB.sh` script to change the placeholder. Keep
    in mind the need to validate the incoming variable is a positive number, provide
    a default value, and perhaps set a practical upper limit for the number of pluggable
    databases:


    ```

    if ! [[ $PDB_COUNT =~ ''^[0-9]+$'' ]]             # PDB_COUNT must be a number

    then PDB_COUNT=1

    elif [ "$PDB_COUNT" -ge 1 -a "$PDB_COUNT" -le 5 ] # PDB_COUNT must be between
    1 and 5

    then PDB_COUNT=$PDB_COUNT

    else PDB_COUNT=1                                  # Set all other cases to the
    default

    fi

    sed -i -e "s|###PDB_COUNT###|$PDB_COUNT|g" "$ORACLE_BASE"/dbca.rsp

    ```


    You could control the creation of CDB vs. non-CDB databases through the same variable
    by checking whether `PDB_COUNT` is zero. If so, create a non-CDB database.


    When the `numberOfPDBs` variable is greater than one, the Database Configuration
    Assistant creates the container database and first pluggable database, then creates
    the additional pluggable databases. When `numberOfPDBs` is greater than one, Oracle
    uses the value of `pdbName` in the response file as the prefix and appends the
    PDB’s index. It derives the value of `pdbName` in the template from `ORACLE_PDB`
    in the environment. Be aware of this behavior to avoid unexpected pluggable database
    names! Remember, the default value of `ORACLE_PDB` is `ORCLPDB1`, and for a PDB
    count of one, Oracle creates a single PDB called `ORCLPDB1`. But, if the PDB count
    is two, Oracle uses the PDB name as a base value, and the PDB names will be `ORCLPDB11`
    and `ORCLPDB12`!'
  raw: '### Create Non-CDB Databases


    Oracle may prefer we create and use container databases in versions 12c through
    19c. Still, non-CDB installations dominate real-world installations and will likely
    remain in the majority for the next several years. It makes sense then that we
    should be able to choose the architecture created in containers. Chapter [11](#514143_1_En_11_Chapter.xhtml)
    presented the steps for passing an option to `docker run` for selecting between
    container or non-container architectures. Briefly, it involves


    *   Updating the `dbca.rsp.tmpl` template, replacing the hard-coded value given
    to `createAsContainerDatabase` with a placeholder. When a new container starts,
