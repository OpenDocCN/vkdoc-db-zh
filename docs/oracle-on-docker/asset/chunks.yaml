    ## Summary


    In this chapter, you learned how Docker uses scripts to build images and discovered
    ways of updating existing scripts in Oracle’s repository to change and add functionality
    to images and containers. You saw where the configuration of container operating
    systems occurs. You can add additional packages to container images and modify
    the Dockerfile to customize the environment and write files to images. We also
    covered steps performed during database installation and how response files complement
    Oracle software installation and database creation.


    We explored techniques for adding new features to database containers and how
    to drive their use through environment variables. You should also have a deeper
    appreciation for the inner workings of containers and recognize which scripts
    are called during startup. You should also have a general idea of the role health
    checks play in reporting database and container status, internally and externally.


    For many, the concepts covered in this chapter are adequate for tailoring containers
    to suit your needs better. If you’re using Docker exclusively for noncritical
    work, it’s unlikely you’ll need to write custom Dockerfiles. If so, feel free
    to skip ahead to Chapter [14](#514143_1_En_14_Chapter.xhtml).


    However, if you intend to use containers for more specific or critical applications
    or simply want to understand more about Docker’s inner workings, continue with
    the following three chapters, beginning with Chapter [12](#514143_1_En_12_Chapter.xhtml).


    # 12. Dockerfile Syntax


    One of my favorite activities is cooking, and like any creative endeavor, the
    best results come when you understand how to use the tools of the craft. It helps
    to know the rules, which are ironclad (don’t add water to hot oil) and which have
    flexibility (how much garlic is “too much!”). Others may enjoy the result, but
    only the chef appreciates the process!


    I see many parallels between cooking and coding and find creative outlets in both.
    There are accepted, “right” ways to do certain things, but for the most part,
    each allows practitioners liberty to stamp their style into the result. Sometimes,
    I review code and come across a block I don’t immediately understand. After working
    through it, I realize it’s functionally identical to a technique I’ve used for
    years, just a completely different approach. Two authors with different backgrounds,
    experiences, influences, and habits still produce the same result. I often adopt
    those methods into my library of “cool ways to do stuff.”


    Keep that thought in mind across the next few chapters on Dockerfiles. This isn’t
    an authoritative or definitive guide but an introduction to the rules and tools
    you’ll need to concoct image recipes—Dockerfiles—used by Docker’s build process
    to construct images. At its core, that’s what a Dockerfile is:


    *   Ingredients**:** The files and objects needed by the image. In Docker, this
    is known as the *build context*.


    *   Preparation**:** The order and method for combining elements. A recipe can
    have one step or many. For instance, the first step in baking a cake combines
    dry ingredients like flour, sugar, and baking soda; the second mixes the eggs
    and milk. In the third, the wet ingredients from step two are added to the dry
    ingredients from step one. The steps in a Dockerfile are called *stages*, and
    a *multistage* build works along the same lines as the cake recipe. Early stages
    make intermediate preparations that combine in a later stage, producing a completed
    product.


    *   **Cooking:** How to build and deliver the image. This is *metadata*. In a
    recipe, it’s measurements, temperature, and baking time. In Docker, the metadata
    sets the environment, defines runtime commands called when containers start, and
    health checks that report status.


    Databases have unique needs with different treatments than ordinary container
    images, and the following few chapters are more sharply focused on addressing
    techniques and considerations for building good database images. Let’s set aside
    definitions of “good” database images for now and focus on how Dockerfiles work!


    The good news is that there aren’t many commands to learn in the Dockerfile instruction
    set! The elements are relatively straightforward, and Dockerfiles read from top
    to bottom, with each line a separate instruction that tells the *build process*
    how to construct a new image. They boil down to


    *   What image to start from


    *   How to modify the starting image by adding environment variables, copying
    files, and running commands


    *   Finally, how the finished product should behave when run as a container


    This chapter assumes some familiarity with Linux and writing bash shell scripts.'
  trans: '## 启动和运行数据库


    最终需要检查的脚本负责管理容器启动时容器和数据库的行为。回想一下，在执行 `docker start` 和 `docker run` 时，触发“启动”事件是至关重要的。回顾第
    7 章，克隆数据库之所以可能，是因为容器并不知道自己是否首次启动。启动脚本会检查特定文件是否存在，如果存在，*假定*这不是一个新容器，然后继续启动数据库。否则，它会从头创建一个新的数据库。


    同一个脚本 `runOracle.sh` 处理这两种场景，并提供了多个引入特性设置的机会。它设置多个环境变量的默认值，调用 `createDB.sh` 脚本，调用入口点脚本，并通过调用
    `startDB.sh` 来启动数据库和监听器。当容器从 `docker stop` 接收到关闭信号时，它还负责控制数据库和监听器的关闭。


    ## 总结


    在本章中，你学习了 Docker 如何使用脚本来构建镜像，并发现了更新 Oracle 仓库中现有脚本的方法，以改变和增加镜像及容器的功能。你看到了容器操作系统配置发生的位置。你可以向容器镜像添加额外的软件包，并修改
    Dockerfile 来自定义环境，向镜像写入文件。我们还介绍了数据库安装期间执行的步骤，以及响应文件如何辅助 Oracle 软件安装和数据库创建。


    我们探讨了向数据库容器添加新特性的技术，以及如何通过环境变量来驱动其使用。你应该也对容器内部工作机制有了更深入的理解，并认识到哪些脚本在启动时被调用。你还应该对健康检查在内部和外部报告数据库和容器状态方面所扮演的角色有一个总体的认识。


    对于许多人来说，本章涵盖的概念足以根据你的需要更好地定制容器。如果你仅将 Docker 用于非关键工作，那么你不太可能需要编写自定义的 Dockerfile。如果是这样，请随意跳到第
    14 章。


    但是，如果你打算将容器用于更具体或关键的应用，或者只是想更多地了解 Docker 的内部工作原理，请继续阅读接下来的三章，从第 12 章开始。


    ## 12. Dockerfile 语法


    我最喜欢的活动之一是烹饪，就像任何创造性的工作一样，最好的结果来自于你懂得如何运用这门手艺的工具。了解规则会很有帮助，有些规则是铁律（不要往热油里加水），有些则具有灵活性（多少大蒜才算“太多！”）。其他人可能享受成果，但只有厨师懂得欣赏过程！


    我在烹饪和编码之间看到了许多相似之处，并发现两者都是创造性的出口。对于某些事情，存在公认的、“正确”的方式，但在大多数情况下，两者都允许从业者自由地将自己的风格烙印在成果上。有时，我审查代码时会遇到一块我不立即理解的部分。在仔细研究后，我意识到它在功能上与我使用多年的技术完全相同，只是方法完全不同。两位背景、经历、影响和习惯不同的作者，仍然产出了相同的结果。我经常把这些方法纳入我的“很酷的做事方式”库中。


    在接下来几章关于 Dockerfile 的内容中，请牢记这个想法。这不是权威或决定性的指南，而是对你需要用来*调制*镜像配方——Dockerfile——的规则和工具的介绍，Docker
    的构建过程使用这些配方来构建镜像。从核心上讲，这就是 Dockerfile：


    *   **配料：** 镜像所需的文件和对象。在 Docker 中，这被称为 `构建上下文`。

    *   **准备：** 组合元素的顺序和方法。一个食谱可以有一个步骤或多个步骤。例如，烘焙蛋糕的第一步是混合干性配料，如面粉、糖和小苏打；第二步是混合鸡蛋和牛奶；第三步是将第二步的湿性配料加入第一步的干性配料中。Dockerfile
    中的步骤称为 `阶段`，一个 `多阶段` 构建的工作原理与蛋糕食谱类似。早期的阶段进行中间准备工作，在后期阶段组合起来，产出一个成品。

    *   **烹饪：** 如何构建和交付镜像。这就是 `元数据`。在食谱中，它是计量、温度和烘焙时间。在 Docker 中，元数据设置环境，定义容器启动时调用的运行时命令，以及报告状态的健康检查。


    数据库有独特的需求，其处理方式不同于普通的容器镜像，接下来的几章将更集中地探讨构建良好数据库镜像的技术和考虑因素。现在我们暂且搁置对“良好”数据库镜像的定义，专注于
    Dockerfile 的工作原理吧！


    好消息是，Dockerfile 指令集中需要学习的命令并不多！元素相对简单直接，Dockerfile 从上到下读取，每一行都是一个单独的指令，告诉 `构建过程`
    如何构建一个新镜像。它们归结为：


    *   从哪个镜像开始

    *   如何通过添加环境变量、复制文件和运行命令来修改起始镜像

    *   最后，成品在作为容器运行时应该如何表现


    本章假设读者对 Linux 和编写 bash shell 脚本有一定熟悉度。'
- fmt: "# The Role of Layers in the Build Process\n\nBehind the scenes, the build\
    \ process is a series of scripted `docker run`–like operations that start a container\
    \ (using an existing image), do something to modify the container, and save the\
    \ result as a new image. In builds, Docker doesn’t lump multiple changes into\
    \ a single bucket. Every step is its own image. Docker layers the individual images\
    \ together to make a final image.\n\nThe layers in Docker images are like those\
    \ in the overlay filesystems we looked at in Chapter 7. Remember that a layer\
    \ overlays a base layer with changes. Remember our layered filesystem example,\
    \ looking down at a game of Tic-Tac-Toe?\n\n## Containers vs. Images: A Layer\
    \ Perspective\n\nContainers have a single intermediate layer that stores the cumulative\
    \ changes made over a container’s lifetime. Everything is lumped together because\
    \ there’s little chance that individual changes are reusable. Docker handles images\
    \ differently, though. Where containers have a single upper layer for all changes,\
    \ each step in an image build adds its own “glass shelf,” as in Figure 12-1, adding\
    \ depth to the stack of layers.\n\n![](images/514143_1_En_12_Chapter/514143_1_En_12_Fig1_HTML.png)\n\
    \n**Figure 12-1**\n\nContainers (left) capture all changes into a single upper\
    \ layer. The container view is a merger of the upper and lower layers, projected\
    \ into the working layer. Images (right) add new layers for every operation. The\
    \ final image is a union of many layers.\n\n## The Power of Reusability\n\nThe\
    \ reason behind this multilayer approach is reusability. Think of the steps involved\
    \ in “building” a Tic-Tac-Toe board—you draw the same four lines every time. It’s\
    \ a predictable, repeatable process. But drawing lines is fundamental to building\
    \ the grids used by other games. Figure 12-2 shows a Tic-Tac-Toe game beside a\
    \ “*La Grille de Sommes*” (Grid of Sums), introduced in France’s *Le Monde* newspaper\
    \ in 2013.\n\n![](images/514143_1_En_12_Chapter/514143_1_En_12_Fig2_HTML.png)\n\
    \n**Figure 12-2**\n\nAdding four lines to a Tic-Tac-Toe board (left) makes a 3x3\
    \ grid for playing “Grid of Sums”.\n\nIf you didn’t know about Game of Sums, I\
    \ could describe the steps for building the game board:\n\n*   “Draw a horizontal\
    \ line three inches long.”\n*   “Draw another horizontal line of equal length\
    \ one inch above the first.”\n*   “Draw a three-inch vertical line, intersecting\
    \ the horizontal lines one inch from their left end.”\n*   Etc.\n\nOr, I could\
    \ simply ask you to “Draw a Tic-Tac-Toe board and add a border around the outside.”\n\
    \nYou cached those steps into memory as layers when you learned how to build a\
    \ Tic-Tac-Toe board. Those layers are reusable foundations you can use for constructing\
    \ new and potentially more complex games, and it’s far more efficient to reference\
    \ the set of known operations—draw a Tic-Tac-Toe board—than describe the procedure.\n\
    \nDocker builds images the same way. Each layer in an image is reusable and available\
    \ to other builds, from “lower horizontal line” through “Tic-Tac-Toe board.” As\
    \ we build database images, you’ll see how efficient this is. If I need two images\
    \ for Oracle Database 19c, one with the 19.10 Release Update and another with\
    \ the 19.11 Release Update, *everything* up to applying the patch is identical,\
    \ as in Figure 12-3: configure the operating system and environment; add prerequisites;\
    \ install the Oracle 19c software. I then have a 19.3.0 database I can patch to\
    \ the desired level.\n\n![](images/514143_1_En_12_Chapter/514143_1_En_12_Fig3_HTML.png)\n\
    \n**Figure 12-3**\n\nCreating images for Oracle 19c databases patched with the\
    \ 19.10 and 19.11 Release Updates follows the same initial steps. Docker doesn’t\
    \ repeat the work performed in existing layers. Instead, it starts with the latest\
    \ or uppermost recyclable layer.\n\n## Inspecting Layers with `docker image history`\n\
    \nListing 12-1 shows the simplified output from running `docker image history`\
    \ for an Oracle 19c database image to see how this looks in a Docker image. `docker\
    \ image history` displays the composite layers that form a final image and the\
    \ commands that created them.\n\n```bash\n> docker image history -H oracle/database:19.3.0-ee\n\
    IMAGE         CREATED BY                                      SIZE\nf53962475832\
    \  /bin/sh -c #(nop)  CMD [\"/bin/sh\" \"-c\" \"exec…   0B\ndceea9dcf380  /bin/sh\
    \ -c #(nop)  HEALTHCHECK &{[\"CMD-SHELL…   0B\ne6a7408b308b  /bin/sh -c #(nop)\
    \ WORKDIR /home/oracle          0B\nf94cd312d82e  /bin/sh -c #(nop)  USER oracle\
    \                  0B\n1664ac9ff6d4  /bin/sh -c $ORACLE_BASE/oraInventory/orainst…\
    \   21.8MB\n6688786dc411  /bin/sh -c #(nop)  USER root                    0B\n\
    b6fb885c6988  /bin/sh -c #(nop) COPY --chown=oracle:dbadir…   6.19GB\n0dfd2be6867c\
    \  /bin/sh -c #(nop)  USER oracle                  0B\n64bee30fc72f  /bin/sh -c\
    \ chmod ug+x $INSTALL_DIR/*.sh &&  …   184MB\n53ce8dbf2fe1  /bin/sh -c #(nop)\
    \ COPY multi:db377117e0d23af…   36.8kB\n74619cb4eafe  /bin/sh -c #(nop) COPY multi:08c35eebd2349e6…\
    \   1.96kB\nbd4c7a72aa97  /bin/sh -c #(nop)  ENV PATH=/opt/oracle/prod…   0B\n\
    167ee23df373  /bin/sh -c #(nop)  ENV ORACLE_BASE=/opt/orac…   0B\n0e43108d92e1\
    \  /bin/sh -c #(nop)  ARG INSTALL_FILE_1=LINUX.…   0B\n0de06b15c6b1  /bin/sh -c\
    \ #(nop)  ARG SLIMMING=true            0B\nd1215483892c  /bin/sh -c #(nop)  LABEL\
    \ provider=Oracle iss…   0B\n9ec0d85eaed0  /bin/sh -c #(nop)  CMD [\"/bin/bash\"\
    ]            0B\n     /bin/sh -c #(nop) ADD file:b0df42f2bb614be48…   133MB\n\
    > docker images\nREPOSITORY          TAG                 IMAGE ID            SIZE\n\
    oracle/database     19.3.0-ee           f53962475832        6.53GB\noraclelinux\
    \         7-slim              9ec0d85eaed0        133MB\n```\n**Listing 12-1**\n\
    \nThe first command displays the history of an Oracle 19c database image. Read\
    \ the output from bottom to top to see the commands used to create each layer\
    \ of the final image and how it evolved from a starting point to its final form.\
    \ The second command lists information on the final database and Oracle Enterprise\
    \ Linux 7-slim images, including their unique identifiers and sizes.\n\n## Interpreting\
    \ Layer Sizes\n\nThe last line is the starting image. Each line above it is a\
    \ layer, or “glass shelf,” that introduced a modification. By reading the output\
    \ from the bottom up, you see how the final image evolved through a series of\
    \ operations, from a starting image (the `ADD file:` entry at the bottom) through\
    \ completion. Each image layer has a unique ID in the first column and a size\
    \ in the last.\n\nWhile we haven’t yet covered the different Dockerfile commands,\
    \ look at the size column. The layers that *aren’t* zero bytes have something\
    \ in common. Most `ADD` or `COPY` operations do just that—add or copy something\
    \ into the mix. The output is truncated for the remaining two commands, but were\
    \ the lines printed in their entirety, you’d see they’re running scripts or commands.\
    \ These nonzero-byte layers are like the glass shelves with something on them.\
    \ The layer’s size matches the amount of change contained on each shelf."
