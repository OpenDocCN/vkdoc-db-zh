    [3](#514143_1_En_3_Chapter.xhtml).


    ## Containers vs. Virtual Machines


    Ask a group of IT professionals to describe Docker containers, and the chances
    are good that at least half will respond that they’re “like lightweight virtual
    machines.” Some might even make comparisons:


    *   VMs are like houses; containers are like apartments.


    *   VMs are like semi-tractor trailers; containers are like pickup trucks.


    *   VMs are like supermarkets; containers are like convenience stores.


    *   VMs are a bakery; containers are a slice of cake.


    Virtual machines and containers are both valid solutions for addressing the challenges
    of cost, efficiency, scale, isolation, and portability, so it’s natural to compare
    them. The misstep these analogies make is framing containers as a lesser, lighter,
    or trivial alternative. It perpetuates the myth that containers aren’t capable
    or robust enough for production workloads.^([⁹](#fn9))


    I’d like to reframe this for an Oracle database audience by looking at virtual
    machines and containers as *different ways of doing similar things*. Let’s put
    Docker aside for a moment and put on our Oracle hat to consider ways to host three
    new database applications in an enterprise. Three possible approaches are as follows:


    *   **Three homes, three databases:** One database for each application, each
    with its own ORACLE_HOME. Individual Oracle software installations offer greater
    control over each application’s database version at the expense of increased overhead.
    Each ORACLE_HOME takes up space and must be managed, patched, and supported separately.


    *   **One home, three databases:** One database for each application, all running
    from a single ORACLE_HOME, reduces the complexity of maintaining multiple software
    installations while separating each application. Each database has overhead associated
    with its memory structures, processes, and metadata (SYSTEM, SYSAUX, TEMP, and
    UNDO tablespaces).


    *   **One database, three schemas:** The most efficient approach is a single database
    with individual schemas for each application. All three schemas share one set
    of memory structures, background processes, and metadata. Smaller, less expensive
    hardware provides equal performance.


    None of these solutions are right or wrong, good or bad, and there are scenarios
    where each is a better or more reasonable choice. Let’s eliminate the first option^([^(10)](#fn10))
    and narrow in on the second and third. These run from a single ORACLE_HOME and
    are therefore limited to running on a single host. Figure [2-1](#514143_1_En_2_Chapter.xhtml#Fig1)
    compares these options side by side.


    ![](images/514143_1_En_2_Chapter/514143_1_En_2_Fig1_HTML.png)


    A diagram compares the oracle home with three separate databases versus three
    separate schemas. Oracle home with separate databases contains a separate schema,
    memory, processes, and metadata for each database while oracle home with separate
    schemas contains same memory, processes, and metadata for all the schemas.


    Figure 2-1


    Alternatives for hosting three applications from a single ORACLE_HOME—separate
    databases vs. separate schemas


    From a client standpoint, there is no *functional* difference. The choice is purely
    operational. Separate database instances offer greater flexibility but require
    more resources and management (with higher costs).


    Spreading schemas across databases may *appear* to have security benefits and
    provide isolation. With a single ORACLE_HOME, vulnerabilities exploited in one
    database are there for others. More databases mean a larger attack surface. Security
    is a product of how well the infrastructure and schemas are protected.


    Most works and explanations on containers compare the resource placement of containers
    and virtual machines using a diagram similar to Figure [2-2](#514143_1_En_2_Chapter.xhtml#Fig2).


    ![](images/514143_1_En_2_Chapter/514143_1_En_2_Fig2_HTML.png)


    A diagram compares the resource placement for virtual machines and containers.
    The main difference is that the containers do not have a guest O S.


    Figure 2-2'
