  trans: '

    ## 摘要


    随着你处理现成容器镜像的经验日益丰富，你会发现一些你喜欢的东西，以及一些你想要改变的东西。这是学习曲线的一部分，而稳健、容错的工具有助于建立下一步所需的信心和技能。无论是第一辆公路自行车还是一项新技术，持续的练习能形成肌肉记忆和熟悉感。一旦使用工具变得得心应手，你的思维就能完全专注于更清晰地构想你想做的事情，并借此理解你的工具可能如何限制你的进展。


    *Breaking Away* 中的四个朋友在寻找自己独特身份的过程中，努力对抗父母和社会的期望。虽然他们无法改变自己是谁或来自哪里，但他们意识到，出身并不决定未来的方向。这对于我们全书所使用的镜像仓库来说也是如此。它们是塑造我们理解如何在容器中运行数据库的基础，但并不阻止我们大胆梦想并规划自己的路线。


    本章介绍了一些帮助你迈出下一步处理容器的“配方”。它们解决了你在使用数据库镜像时可能遇到的问题，但它们也具有适应其他需求的灵活性。这就是“配方”的美妙之处——无论是在烹饪还是编码中，它都是艺术与科学的结合。一个问题很少只有一个答案，然而解决一个问题的方法或模式通常也适用于其他问题。我希望本章的示例能激发你的想象力，为你在
    Docker 之旅中遇到的挑战构想解决方案！下一章将更深入地探讨 Docker 如何构建镜像，着眼于编写高效、有效的 Dockerfiles。


    脚注 1   2   3   4   5   6   7


    # 14. 构建镜像


    生活中有些奥秘我不需要（甚至不想）去理解。不去了解能为我保留一丝对周遭世界的惊奇感。缝纫机就是其中之一。我会手工缝纫，虽然没什么天赋，但我从未弄明白机器是如何复制这种劳作的。即使能轻易上网找到慢动作、逐针专家解说的
    YouTube 视频来揭示整个过程，我也一直抗拒学习缝纫机的基本原理。机器如何将针部分刺入布料，然后从下方固定每一针，这对我来说超出了理解范围。我明明知道得更多，但我能想象到的最佳解释就是机器内部住着一群小精灵，正疯狂地将梭芯线穿过每一针。我满足于不知情——它滋养了我对日常事物的迷恋与欣赏，并提醒我身边充满了睿智而富有创造力的人！或者，魔法真的存在！


    有些便利我简直习以为常。细想围绕我的技术，我明白我的笔记本电脑使用 DHCP 来获取网络地址。我不知道细节，但似乎如果有必要我能够弄清楚，而且它不像缝纫机那样充满神秘感。它让加入网络变得容易，并免去了在酒店
    WiFi 上猜测可用 IP 地址的麻烦。


    自动化和脚本也属于类似范畴。它们让日常任务的执行变得更快、更容易，并让我们“忘记”细节。（坦白说，有时我看代码会想，自己当初怎么那么天真或那么灵感迸发！）将知识编码转化为工具，可以与他人分享，并作为更大、更好事物的构建块。在第
    4 章，`buildContainerImage.sh` 脚本正是这样做的。你给它一个数据库版本和版本，它就在后台为你构建并运行 `docker build`
    命令。


    要获得对镜像创建的更大控制权，意味着需要亲自动手处理构建过程。即使你的计划不包括编写自定义 Dockerfiles，理解构建命令的元素也能让你更好地欣赏幕后发生的事情，并理解其中的奥妙！而且我保证，构建镜像远没有缝纫机那么神秘，也不需要电脑内部有一支小精灵劳作大军！


    ## 构建命令语法


    `docker build` 可能是 Docker 词汇中最直白的命令。其最简形式是有效的：


    ```

    docker build .

    ```


    这看起来似乎没什么！这么简单的东西能做什么呢？这一切都与上下文有关！

