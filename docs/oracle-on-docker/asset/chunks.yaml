  trans: '

    在生产环境中运行的 Oracle 数据库面临类似的问题。每个容器可能不止使用一个卷——一个用于诊断目录，其他用于配置文件和共享脚本，还有一个或多个用于数据。当
    Docker 自身能理解哪些卷在何处使用时，跟踪这些关联关系就会更容易。


    创建卷稍微麻烦一些。这是一个额外的步骤，带有一些额外的复杂性。在您使用 Docker 的早期就养成这个习惯，会使其成为自然而然的操作，当容器项目开始对存储提出更高要求时，您就能享受到卷带来的好处。


    如果您仍然不信服，那么绑定挂载有一些根本无法完成的事情，例如访问云存储。列表 7-3 展示了一个为 Oracle Cloud Infrastructure
    中的对象存储桶创建的 Docker 卷示例。


    ```

    docker volume inspect docker_bucket

    [

    {

    "CreatedAt": "0001-01-01T00:00:00Z",

    "Driver": "s3fs:latest",

    "Mountpoint": "",

    "Name": "docker_bucket",

    "Options": {},

    "Scope": "local",

    "Status": {

    "args": [

    "-o",                "nomultipart,use_path_request_style,url=https://ocid1.tenancy.oc1..XXXXX.compat.objectstorage.XXXXX-1.oraclecloud.com/,bucket=docker_bucket"

    ],

    "mounted": false

    }

    }

    ]

    列表 7-3

    由 Oracle Cloud Infrastructure 对象存储桶支持的卷

    ```


    Oracle 的容器注册表文档对 `/opt/oracle/oradata` 目录使用了绑定挂载（而非卷）。我建议在您的 Oracle 容器中额外挂载两个目录用于诊断和审计数据。这两个目录都有可能随着时间推移而增长。当保存在容器的联合文件系统中时，它们会增加到
    `/var/lib/docker` 文件系统中。


    Docker 推荐使用卷而不是绑定挂载，因为它们更灵活且功能更强。因此，后续章节中的示例除非另有说明，否则都使用卷。


    # 挂载存储


    理解了在容器中挂载存储的不同方法后，我们准备深入探讨其语法。Oracle 容器仓库中的镜像使用 `/opt/oracle/oradata` 目录作为一个卷。该目录是数据文件的默认根目录，我将以它为例来说明将挂载映射到容器的选项。（为简洁起见，这些初始示例中未包含诊断和审计目录。）


    将存储映射到容器发生在容器创建期间，通过 `docker run` 命令中的选项进行。Oracle 的容器仓库文档在其示例中使用了旧的 `-v`（长格式：`--volume`）选项，但
    Docker 建议使用 `--mount` 选项。一般来说，`--mount` 和 `-v` 选项提供相同的功能。^(⁵³) 显著差异在于定义每个组件的表达方式。`-v`
    使用有序格式，而 `--mount` 将元素分隔为带名称的组件。


    两种方法共享两个要点：


    *   宿主机上的一个 `source` 目录或卷

    *   容器内的一个 `target` 路径


    ## 使用 -v 或 --volume


    最终，我们要将容器内的 `target` 路径映射到宿主机的 `source` 来写入数据。对于 `-v` 或 `--volume` 选项，它们作为一个有序对传递，以冒号分隔，先是
    `source`，然后是 `target`。对于绑定挂载，`source` 是一个*目录*：


    ```

    docker run ... \

    -v /oradata/ORA19C:/opt/oracle/oradata \

    ...

    docker run ... \

    --volume /oradata/ORA19C:/opt/oracle/oradata \

    ...

    ```


    对于卷，`source` 是*卷名*：


    ```

    docker run ... \

    -v oradata_ORA19C:/opt/oracle/oradata \

    ...

    docker run ... \

    --volume oradata_ORA19C:/opt/oracle/oradata \

    ...

    ```


    ## 使用 --mount


    `--mount` 选项将元素分隔为带名称的、以逗号分隔的列表。元素的顺序无关紧要。用于绑定挂载目录的 `--mount` 等效形式是：


    ```

    docker run ... \

    --mount type=bind,source=/oradata/ORA19C,target=/opt/oracle/oradata \

    ...

    ```


    对于挂载卷：


    ```

    docker run ... \

    --mount type=volume,target=/opt/oracle/oradata,source=oradata_ORA19C \

    ...

    ```


    注意 `--mount` 语法中的额外字段 `type`。它告诉 Docker 我们使用的是卷还是绑定挂载。在 `-v` 选项中，根据 `source` 是
    Docker 卷还是目录来理解类型。第一条命令使用了与 `-v` 选项相同的顺序——先 `source`，然后 `target`。第二条命令通过颠倒元素顺序表明了顺序无关紧要。


    `-v` 和 `--mount` 的另一个区别是 Docker 如何处理不存在的 `source` 目录。如果这些示例中的 `source` 目录，即 `/oradata/ORA19C`，在宿主机上不存在，`-v`
    会在 `docker run` 期间创建该目录。^(⁵⁴) 而 `--mount` 选项不会创建，并会报错失败。


    根据 Docker 的研究，`--mount` 中的字段名称 `source` 和 `target` 使命令更易于理解，^(⁵⁵) 因此他们推荐使用 `--mount`
    选项。Oracle 的容器注册表在其文档中使用了 `-v` 标志。使用 `-v` 还是 `--mount` 取决于您。


    ## 未定义的卷


    到目前为止，我介绍了将存储挂载到容器中已知的卷，即 `/opt/oracle/oradata` 目录。该目录在 Dockerfile 中被定义为卷，镜像元数据知道它很特殊。这是一个*可以*与宿主机资源（无论是绑定挂载还是
    Docker 卷）关联的目录。^(⁵⁶)


    如果我尝试将宿主机目录映射到容器中不存在的东西会怎样？Docker 会如何处理不存在的卷？如列表 7-4 所示，Docker 会在容器中创建该目录。这是在
    Docker 宿主机和容器之间共享文件的一种便捷方式！


    ```

    > docker run --rm -it \

    >        -v $HOME:/not/a/real/directory alpine

    / # ls -l /not/a/real/directory/

    total 8302776

    drwx------    7 sean.scott  staff       224 Mar 26 11:44 Applications

    drwx------@  88 sean.scott  staff      2816 Apr  8 16:57 Desktop

    drwx------+  49 sean.scott  staff      1568 Mar 16 08:31 Documents

    ...

    列表 7-4

    当将本地目录挂载到容器中不存在的路径时，Docker 会在容器中创建该目录并将其映射到宿主机！

    ```


    在此示例中，Docker 在容器内创建了一个新目录。您也可以将目录挂载到容器中现有的路径。如果容器路径包含文件，Docker 会隐藏容器 `target`
    目录的内容，将 `source` 目录的内容投射到上面。这是替换镜像内容进行测试的一个巧妙技巧。例如，我可以将更新或修补过的 `ORACLE_HOME` 副本或脚本挂载到容器中用于测试目的——而无需重建镜像！


    不过需要提醒一句：挂载容器中现有的非空目录，如果 `source` 目录缺少容器所需的文件，可能会导致意外和不理想的结果。在前面的示例中，将一个空的宿主机目录挂载到容器的
    `ORACLE_HOME` 会阻止 Oracle 在容器中启动。

