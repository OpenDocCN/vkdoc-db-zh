    # 6. Customize Container Environments


    Running containers is comparable to calling a sophisticated shell script. Containers
    and shell scripts both perform a scoped set of tasks. Scripts can be explicit,
    with hard-coded values, but adding some flexibility makes them more portable and
    valuable. That might mean deriving specific values from the environment or interpreting
    parameters passed to the script at runtime. Take an RMAN backup script as an example.
    Hard-coding the database name prevents its use on other databases. Pass the database
    name as a variable, and the same script works across an enterprise. Adding additional
    options for the backup destination, degree of parallelism, and incremental level
    makes the script much more flexible and valuable over various implementations.


    Docker is similar in this regard, and in this chapter, we’ll dive into an option
    to the `docker run` command that passes variables and values to the container’s
    private environment. Those environment variables act like shell script parameters
    and allow one image to work dynamically, supporting various needs or applications.
    When an Oracle database container starts, it evaluates the container environment—as
    the backup script reads parameters—and applies changes to the container to create
    and run a database to match.


    The magic behind this is a special instruction Docker runs automatically whenever
    a container starts.


    ## The Startup Process


    I’ve mentioned the startup process previously. At a very high level, it checks
    to see if a database exists and, if found, starts it. If not, it runs the *Database
    Configuration Assistant (DBCA)* to create a new database in the container. The
    startup instruction^([^(36)](#fn36)) for the Oracle container repository images
    we’re working with is a `bash` shell script called `runOracle.sh`. (For reference,
    all examples in this chapter are based on a default Oracle Database 19c image
    built using the Oracle-authored repository at [`https://github.com/oracle/docker-images`](https://github.com/oracle/docker-images)
    but are valid for other database versions as well.) Figure [6-1](#514143_1_En_6_Chapter.xhtml#Fig1)
    adds some detail to the startup process of an Oracle database container.


    ![](images/514143_1_En_6_Chapter/514143_1_En_6_Fig1_HTML.png)


    A flowchart of a container startup to run an Oracle database. It begins with checking
    the Oracle environment. If D B exists, start the database. If not, then run D
    B C A and move configuration files.


    Figure 6-1


    Flowchart of the startup process for an Oracle database container


    The `runOracle.sh` script reads values from the environment, and one of the first
    things it looks for is the `ORACLE_SID` and `ORACLE_PDB`. If they’re not defined,
    it assigns defaults. Only then will it check whether a database matching the SID
    is present.'
  trans: '

    我们可以利用这一特性来**极其快速**地配置数据库克隆。卷上的数据与特定容器之间没有绑定关系。复制一份现有的 `oradata` 目录并将其用于新容器，就能让
    Oracle 完全跳过数据库创建过程！只要在容器创建时传递的 `ORACLE_SID` 及其他数据库特定环境变量与卷上数据库使用的值相匹配，`oradata`
    卷的内容就可用于在同系统上克隆数据库、将数据复制到不同机器，甚至跨主机操作系统共享——而无需任何修改！


    卷的真正威力体现在故障排查和练习/优化复杂流程时。最近，我与 Oracle 支持团队进行了一次屏幕共享会话，以诊断一个发生在数据库升级深处的问题。在演示了问题后，他们建议更改一个配置，然后重新运行升级。分析人员预计我需要几个小时才能将数据库恢复到升级前状态并重新运行该过程。然而，由于我在容器中工作，并且拥有故障发生前数据库的一份副本，因此仅用了几分钟就停止了容器、恢复了快照副本并重启了容器！


    卷是容器化运行的数据库所独有的强大特性。在 Docker 中恢复和克隆数据库**不需要** DBA 或 `RMAN` 知识。这只是简单的目录复制。将数据视为卷上一套自包含的文件，与容器中的数据库软件分离开来，这改变了开发团队的工作方式。将数据视为独立资产意味着组织可以对数据进行版本控制和共享，几乎不依赖或完全无需依赖专门的数据库技能。


    ## 总结


    不同并无好坏之分，只是不同而已。关键在于我们如何拥抱这种“不同”。这可能简单到尝试菜单上的新菜品，或者对技术演进带来的可能性持开放态度！


    在本章中，你学习了启动容器和监控活动的基本命令，以及如何连接和浏览数据库容器。登录到容器系统后，你探索了一些使容器区别于传统系统的特性，包括某些二进制文件和功能（如
    `cron`）的缺失。请记住，容器并非我们习惯的完备环境，可能迫使我们重新思考如何完成特定任务。然而，这些差异并非没有回报。使用最小化或精简的文件系统可提高性能并减少容器的受攻击面。


    你还发现了如何使用卷将数据持久化在容器外部，使其独立于容器的生命周期。卷还使得持久、高性能的网络附加存储能够被容器中托管的数据库访问。


    本章最重要的概念或许是 Oracle 在容器数据库中重定位数据库配置文件的方法。将这些文件与数据库的控制文件、数据文件和重做日志文件一起保存到卷上，可将数据库软件与数据库本身分离开来。这些清晰的边界对于独立管理每个组件至关重要。运行容器化数据库的组织可以将数据作为可版本化、可移植的资产进行管理，将数据集成到
    DevOps 流程中，并加速开发生命周期。


    在对 Docker 的某些内部机制有了更深的理解后，你已准备好进入下一章，开始定制容器！


