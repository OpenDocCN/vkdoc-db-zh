- fmt: '## Self-Contained


    To appreciate Docker, it may help to reframe the way we think of enterprise applications.
    Application software are the rules for executing specific tasks installed on a
    host. Microsoft Word, for instance, manages and edits documents.


    There’s a distinction between having Word and running Word. Installing it means
    I have Word, as a static collection of files that define its behavior. Running
    Word puts the software into action. It starts a process that executes rules prescribed
    by the software and allocates resources like memory and CPU. An active Word process
    can use existing files or create new ones and captures configurations and metadata
    as it’s running, but the installed software—the rules—don’t change.


    It’s easy to lose sight of this when thinking of an Oracle database. We think
    of databases as collections of hardware, software, data, and configurations rather
    than recognizing individual components, but they’re still just applications. Figure
    1-1 illustrates the similarities between Word and an Oracle database. The software
    in the `ORACLE_HOME` specifies the rules for working with data. Starting a database
    instance creates processes, allocates resources, and reads and writes data and
    configurations to files on disk.


    ![](images/514143_1_En_1_Chapter/514143_1_En_1_Fig1_HTML.png)


    A diagram illustrates the similarities between the Microsoft word and an oracle
    database.


    Figure 1-1


    An Oracle database is an application with components like those found in other
    applications, including Microsoft Word


    Applications are all the rules and dependencies needed to do something, compiled
    into a package. “Starting” the package runs the application and performs work.


    In Docker, `images` are the packages containing all the software and dependencies
    necessary to support a given application. Images are the software installation—the
    files and metadata that prescribe a function. `Running` an image creates a `container`
    for delivering services.


    The most significant difference between databases running natively on physical
    or virtual hosts and those running in containers are the locations of files. In
    traditional systems, prerequisite libraries and packages are installed directly
    into the operating system. Updating the OS risks changes to these dependencies,
    and many shops delay or limit their patching rather than jeopardize database stability
    and performance.


    Systems running in containers, however, are far more forgiving. Dependencies are
    built into the image, and changes to the underlying host OS aren’t a concern.^[⁴]
    The flexibility to manage the host operating system, with less regard for database
    compatibility, affords greater freedom to stay current with the latest security
    updates.


    Patching and upgrading databases is different, too. Container images are complete,
    self-contained collections of database software, entirely separate from data and
    configuration. In Docker, rather than updating the active Oracle Home, stop the
    container running the old version, then start a new container using a new, updated
    image!


    ## Speed


    Docker’s speed benefits go beyond its ability to build infrastructure quickly.
    Let’s compare Docker to another technology frequently used for database provisioning
    on desktops: `Vagrant`. Like Docker, `Vagrant` is an Infrastructure as Code tool.
    Docker creates and manages containers, while `Vagrant` does the same for virtual
    machines, or `guests`. Containers and virtual machines fill similar roles and
    are often compared against one another. Oracle maintains official repositories
    for deploying Oracle databases under each technology, offering an opportunity
    to contrast their performance performing similar tasks.


    I performed simple tests of two activities. The first was the time it took to
    create a database, including configuring the environment, installing prerequisites
    and database software, then creating a new database. The second was starting (or
    restarting) the system.


    I used Oracle’s Vagrant project (`https://github.com/oracle/vagrant-projects`)
    for my VM and Oracle’s Docker image builds (`https://github.com/oracle/docker-images`)
    for my image. I used the same archive file to install Oracle 19c Enterprise Edition
    and create a 19.3 container database and single pluggable database. All assets
    were already available locally to eliminate dependencies on downloads. Both tests
    were performed on the same machine, a MacBook Pro running the latest `Vagrant`
    and `Docker Desktop` versions. I ran each operation five times, captured timings,
    and computed their averages. Docker was just over 25% faster than `Vagrant` for
    building a new database and 37% faster to start than resuming a VM.


    Why is Docker so much faster? It boils down to differences in the way virtual
    machines and containers work. Virtual machines rely on a `hypervisor` to emulate
    hardware, then start an operating system. There’s a level of abstraction that
    translates calls from the guest operating system to the host and back.


    Docker containers are processes running natively on the host. There’s no operating
    system to initialize and nothing to boot. Containers (usually) include only the
    dependencies—executables, libraries, and other files—necessary to run the service
    they’re meant for, making them smaller than a comparable VM.


    Figure 1-2 illustrates the differences between virtual machines and containers.
    Both systems have host operating systems and an interpretive layer that supports
    virtualization. And in both environments, there are software dependencies—binaries,
    libraries, and application code. But virtual machines include a guest operating
    system that isn’t present in containers. Why not? Containers leverage files and
    resources already present in the host operating system!


    ![](images/514143_1_En_1_Chapter/514143_1_En_1_Fig2_HTML.png)


    A diagram illustrates the differences between virtual machines and containers.
    The virtual machines include a guest operating system that is not present in containers.


    Figure 1-2


    Running the same applications in a virtual machine and a container requires the
    same application code and dependencies. The difference lies in where the operating
    system needed to support the application exists. In virtual machines, each guest
    has its own OS. Containers share the host’s OS


    In Figure 1-2, the virtual machines are isolated from one another. Even if the
    application files and dependencies are identical, they consume space individually
    in each virtual guest. In Docker, three (or three hundred or three thousand) identical
    containers all start from the same image, using less space than their counterparts
    in the three virtual guests.^[⁵]'
