    在过去的几页中，我提供了一些代码片段，但我想通过从 Linux 或 WSL 命令行运行的实际示例来展示我典型的 Docker 工作流程。


    ### 新环境设置


    如果我在一个新的容器环境中工作，我的第一步是添加运行 Oracle in Docker 所需的目录和用户。在 Linux 系统上，我将存储分成两个分区，一个用于数据库，另一个用于
    Docker 相关文件：


    ```

    sudo mkdir /oradata /docker

    sudo chown $(id -un):$(id -gn) /docker

    ```


    第二个命令将 `/docker` 目录的所有者和组更改为我的本地用户，以便稍后无需调用 `sudo` 即可添加文件。


    `/oradata` 挂载点用作数据库卷和挂载的根目录。为了避免 Linux 上的绑定挂载问题，我创建一个 `oracle` 用户和 `oinstall`
    组，其 ID 值与 Oracle 预安装 RPM 中的值匹配，然后设置 `/oradata` 目录的所有权：


    ```

    sudo groupadd -g 54321 oinstall

    sudo useradd -u 54321 -g oinstall

    sudo chown oracle:oinstall /oradata

    ```


    默认情况下，Docker 将其数据保存在 `/var/lib/docker` 目录中。Linux 系统，尤其是在云服务中运行的系统，通常具有与启动卷分离的块存储，可为容器操作提供更快或更大的分区。如果是这样，我将
    `/var/lib/docker` 重新定位到一个新分区。在这里，我将其移动到 `/docker` 分区下：


    ```

    systemctl stop docker.service

    systemctl stop docker.socket

    sed -i ''s|ExecStart=/usr/bin/dockerd|ExecStart=/usr/bin/dockerd -g /docker|g''
    /lib/systemd/system/docker.service

    rsync -aqxP /var/lib/docker/ /docker/.docker 2>/dev/null

    systemctl daemon-reload

    systemctl start --no-block docker.service

    ```


    ### 添加 Oracle 仓库


    新系统需要 Oracle 的 Docker 仓库副本。假设已安装 `git`，我可以将仓库克隆到 `/docker` 路径下：


    ```

    git clone https://github.com/oracle/docker-images /docker

    ```


    将相应的安装介质复制到 `/docker/OracleDatabase/SingleInstance/dockerfiles/` 下的版本目录后，我就可以开始构建镜像：


    ```

    cd /docker/OracleDatabase/SingleInstance/dockerfiles/

    ./buildContainerImage.sh -v 19.3.0 -e

    ./buildContainerImage.sh -v 21.3.0 -e

    ```


    ### 网络配置


    接下来，我将注意力转向网络，添加一个新的桥接网络，我通常将其命名为 `oracle-db`：


    ```

    docker network create oracle-db --attachable --driver bridge

    ```


    更正式的环境可能需要多个网络以实现更好的隔离。如果是这样，我将重新进行此步骤。


    如果我预计需要 DNS，我还会启动一个 `docker-hoster` 容器：


    ```

    docker run -d \

    --name oracle-db-dns \

    -v /var/run/docker.sock:/tmp/docker.sock \

    -v /etc/hosts:/tmp/hosts \

    dvdarias/docker-hoster

    ```


    ### 运行容器


    我创建容器时遵循的步骤取决于我计划如何使用它们。通常分为两类：不打算保留很长时间的“一次性”数据库，以及生产或类似生产的数据库。


    #### 一次性环境


    我为*每个*数据库容器持久化 `/opt/oracle/oradata` 卷，但对于生命周期短的一次性数据库，我很少做更多。在清单 10-4 中的示例中，我设置了容器、数据库和
    PDB 名称的环境变量。脚本使用这些变量，添加一个目录并将其绑定挂载到卷，然后创建一个 Oracle 19c 数据库容器。我还将本地目录 `/oradata/scripts`
    挂载到容器上的一个新挂载点，称为 `/scripts`。这是一个常见的、共享的目录，包含——您猜对了——脚本、工具和实用程序，在我工作时可能需要在容器中使用。


    ```

    CONTAINER_NAME=test

    ORACLE_SID=ORCLCDB

    ORACLE_PDB=ORCLPDB1

    mkdir -p /oradata/${CONTAINER_NAME}

    docker volume create --opt type=none --opt o=bind \

    --opt device=/oradata/${CONTAINER_NAME} \

    ${CONTAINER_NAME}_data

    docker run -d \

    --name ${CONTAINER_NAME} \

    -e ORACLE_SID=${ORACLE_SID} \

    -e ORACLE_PDB={ORACLE_PDB} \

    --volume ${CONTAINER_NAME}_data:/opt/oracle/oradata \

    --volume /oradata/scripts:/scripts \

    --network oracle-db \

    oracle/database:19.3.0-ee

    ```

    清单 10-4

    展示创建资源和运行“一次性”Oracle 19c 数据库容器步骤的示例代码


    #### 持久化环境


    关键数据库需要更严格的管理和更多资源，包括用于诊断和审计目录的额外卷。清单 10-5 是一个脚本示例，用于自动化创建目录、分配卷和运行容器的步骤。


    ```

    CONTAINER_NAME=prod

    ORACLE_SID=ORCLCDB

    ORACLE_PDB=ORCLPDB1

    for dir in audit data diag

    do mkdir -p /oradata/${CONTAINER_NAME}/${dir}

    docker volume create --opt type=none --opt o=bind \

    --opt device=/oradata/${CONTAINER_NAME}/${dir} \

    ${CONTAINER_NAME}_${dir}

    done

    mkdir -p /oradata/${CONTAINER_NAME}_entry/{setup,startup}

    docker run -d \

    --name ${CONTAINER_NAME} \

    -e ORACLE_SID=${ORACLE_SID} \

    -e ORACLE_PDB={ORACLE_PDB} \

    --volume ${CONTAINER_NAME}_data:/opt/oracle/oradata \

    --volume ${CONTAINER_NAME}_diag:/opt/oracle/diag \

    --volume ${CONTAINER_NAME}_audit:/opt/oracle/admin \

    --volume /oradata/${CONTAINER_NAME}_entry:/opt/oracle/scripts \

    --volume /oradata/scripts:/scripts \

    --network oracle-db \

    oracle/database:19.3.0-ee

    ```

    清单 10-5

    用于自动化创建数据库审计、数据和诊断目录的多个目录及绑定挂载卷的脚本


    请注意，我为每个容器创建了专用的入口点目录。这是我放置任何用于修改容器设置和启动操作的脚本的地方。拥有专用目录可以实现更多控制，根据需要创建到全局副本的链接或编写自定义脚本。

    '
- fmt: '## Summary


    本章是创建和运行容器时最常用命令和选项的快速参考，并结束了本书关于容器的第一部分内容。我们涵盖了容器基础，重点介绍了它们如何应用于Oracle数据库。现在，您应该能够自如地编写和使用`docker
    run`命令；停止、启动和管理容器；以及从Docker获取有关镜像和容器的信息。


    第一部分的一个关键要点与持久化相关，这将在第[7](#514143_1_En_7_Chapter.xhtml)章中详细讨论。理解将容器中的易失性目录数据映射到本地主机存储的好处至关重要。容器使用分层（或覆盖）文件系统来提高速度和节省空间。分层文件系统在文件稳定时效率很高，但随着更改数量的增加，性能会下降。将经历大量更改的目录（特别是包含数据库文件的目录）映射到容器外的存储，可以提高性能并独立于容器的生命周期持久化数据。


    对于Oracle数据库，克隆或重新创建数据库所需的一切都位于`/opt/oracle/oradata`目录下。将此目录路径保存到容器主机，让我们可以在几秒钟内克隆或重新创建数据库！


    我们提到了容器的一些独特之处——比如缺少文本编辑器——并接受或绕过了它们作为其基础镜像的产物。在下一节中，我们的重点将从运行容器转向修改这些镜像，以更好地满足我们的需求。这始于对镜像构建的探索以及几个控制镜像和数据库创建的脚本。


    # Part II 构建和定制镜像


    您现在已精通运行容器，在第二部分中，我们的注意力转向构建和定制镜像。我们首先演示对第[4](#514143_1_En_4_Chapter.xhtml)章介绍的现有Oracle容器仓库的修改，深入探讨编写和调试Dockerfile的艺术，最后讨论将镜像保存到仓库。


    ## 11. 定制镜像


    我喜欢与Oracle（以及一般的数据库）工作的一个原因是其多样性。每天都会带来新的事物，问题通常有多种解决方案。每个机构都有自己的工作方式，解决方案根据行业实践、安全性和惯例而因客户而异。


    Docker（和其他自动化工具）补充并有助于强制执行这些标准。容器镜像是基础设施模板。容器镜像不是手工构建并引入人为错误的可能，而是提供了一个有保证的起点，预先配置以满足特定要求。


    但模板很少是一刀切的，容器镜像也是如此。在我们使用过的镜像中，Oracle决定了如何配置环境以及包含什么内容。第[3](#514143_1_En_3_Chapter.xhtml)章提出了这个问题，当时我们发现默认的Ubuntu镜像缺少vi编辑器。在大规模运行时，容器不需要编辑器，但在测试或实验室系统中，它们可能是一个要求，而满足这一需求需要不同的模板。我们可以手动添加编辑器，但这违背了自动化以及容器的整体理念：拥有一个包含我们所需一切的、随时可运行的镜像。


    当涉及到构建满足特定需求的Oracle数据库镜像时，有两种选择。第一种是编写*Dockerfiles*，即Docker用于构建镜像的配方，如第[12](#514143_1_En_12_Chapter.xhtml)和[13](#514143_1_En_13_Chapter.xhtml)章所述。本章涵盖的第二种技术是扩展现有脚本以定制生成的模板。


    请记住，我们使用的容器运行的是Oracle Enterprise Linux。容器环境中的所有命令，无论是运行容器还是构建镜像，都必须适合容器的操作系统。对于运行不同发行版版本的Linux用户，请记住主机上使用的命令可能与容器中所需的命令不同。例如，Ubuntu用户使用`apt-get`更新其系统上的软件包，但在Oracle数据库容器中使用`yum`。


    ### 脚本修改


    除了Dockerfile和两个响应文件外，本章回顾的文件都是`bash` shell脚本。此处的目的不是深入探讨脚本本身，而是指出如何以及在哪里更新它们以实现对最终镜像的各种修改。好消息是，您不需要成为脚本专家就能理解这些更改！


    我们将在本章中使用的文件是Docker仓库的一部分，该仓库在第[4](#514143_1_En_4_Chapter.xhtml)章中介绍。回想一下，将仓库复制到您的系统后，您沿着一条（相当长的）路径导航以构建您的第一个镜像：`docker-images/OracleDatabase/SingleInstance/dockerfiles`。在该目录下有几个子目录，每个数据库版本一个：


    ```

    drwxr-xr-x   8 seanscott  staff   256 May 27 20:51 11.2.0.2

    drwxr-xr-x  18 seanscott  staff   576 May 27 20:51 12.1.0.2

    drwxr-xr-x  16 seanscott  staff   512 May 27 20:51 12.2.0.1

    drwxr-xr-x  16 seanscott  staff   512 May 27 20:51 18.3.0

    drwxr-xr-x   8 seanscott  staff   256 May 27 20:51 18.4.0

    drwxr-xr-x  19 seanscott  staff   608 May 27 21:00 19.3.0

    drwxr-xr-x  21 seanscott  staff   672 May 27 21:00 21.3.0

    -rwxr-xr-x   1 seanscott  staff  7091 May 27 20:51 buildContainerImage.sh

    ```


    这些特定于版本的子目录都包含多个脚本，这些脚本执行四个类别的常规设置和配置操作：


    - 操作系统安装和配置

    - Oracle数据库软件安装

    - 数据库创建

    - 容器启动，包括启动Oracle监听器和数据库


    本章中的示例基于19c脚本，但适用于任何版本。您将导航到与您要使用的数据库版本匹配的子目录，在那里您会发现文件具有相同的名称和用途。由于这些文件在您的本地系统上，您可以使用您喜欢的文本编辑器执行更改。


    在进行任何更改之前，最好为每个文件创建一个备份。但是，如果出现问题，请记住您总是可以从原始GitHub仓库重新下载或复制文件。


    ### 操作系统安装和配置


    在生产环境中运行的容器被设计得尽可能精简，原因有很多，其中节省空间和安全性是首要的。用作更复杂或专业化应用程序（包括Oracle数据库）基线的容器镜像通常省略任何非必需的内容。添加所需内容比记住删除不需要的内容更快、更容易，也更安全。攻击者无法利用容器中不存在的程序和软件包中的软件漏洞！


    一种通常从镜像中排除的功能是编辑器。所有必要的文件都已预安装在生产部署中，并且环境已预先配置。无需手动编辑任何内容，而默认的数据库镜像也反映了这种思路。


    另一方面，如果您将容器用作交互式或实验性平台，拥有编辑器和用于导航环境的工具是有意义的。对于用于安全或渗透测试、评估新功能以及验证补丁或程序的容器也是如此。'
  raw: '## Summary


    This chapter is a quick reference of the most common commands and options you’ll
    use when creating and running containers and closes the first part of the book
    covering containers. We covered container fundamentals, focusing on how they apply
    to Oracle databases. You should now feel comfortable writing and using `docker
    run` commands; stopping, starting, and managing containers; and getting information
    from Docker about images and containers.


    A key takeaway of this first part relates to persistence, covered in Chapter [7](#514143_1_En_7_Chapter.xhtml).
    Understanding the benefits of mapping data from volatile directories in containers
    to storage on the local host is essential. Containers use layered (or overlay)
    filesystems to achieve speed and save space. Layered filesystems are efficient
    when files are stable but perform poorly as the number of changes increases. Mapping
    directories that experience many changes (particularly those containing database
    files) to storage outside the container improves performance and persists data
    independently of the container’s lifecycle.


    In the case of Oracle databases, everything needed to clone or recreate a database
    exists under the `/opt/oracle/oradata` directory. Saving this directory path to
    the container host lets us clone or recreate a database in seconds!


    We’ve touched upon a few peculiarities of containers—like the absence of text
    editors—and accepted or worked around them as products of their underlying images.
    In the next section, our focus moves from running containers to modifying those
    images to suit our needs better. That begins with an exploration of image builds
    and several scripts that control image and database creation.


    # Part IIBuilding and Customizing Images


    Building and Customizing Images


    You’re now well versed at running containers, and in this second part, our attention
    turns to building and customizing images. We begin by demonstrating modifications
    to the existing Oracle container repository introduced in Chapter [4](#514143_1_En_4_Chapter.xhtml),
    delve into the art of writing and troubleshooting Dockerfiles, then conclude with
    a discussion of saving images to repositories.


    # 11. Customizing Images


    Something I love about working with Oracle (and databases in general) is the variety.
    Each day brings something new, and problems often have multiple solutions. Every
    shop has its way of doing things, and solutions vary from customer to customer
    based on industry practices, security, and conventions.


    Docker (and other automation tools) complement and help enforce these standards.
    Container images are infrastructure templates. Rather than building things by
    hand and introducing the potential for human error, container images offer a guaranteed
    starting point, preconfigured to meet specific requirements.


    But templates are rarely one size fits all, and neither are container images.
    In the images we’ve worked with, Oracle decided how to configure the environment
    and what to include. Chapter [3](#514143_1_En_3_Chapter.xhtml) raised this issue
    when we discovered the default Ubuntu image lacks a vi editor. Containers don’t
    need editors when run at scale, but they may be a requirement in a test or lab
    system, and satisfying that need requires a different template. We could add an
    editor manually, but we’d be defeating the whole idea of automation in general
    and containers in particular: having a ready-to-run image with everything we need
    already installed.


    When it comes to building Oracle database images to meet specific needs, there
    are two options. The first is writing *Dockerfiles*, the recipes Docker uses to
    build images, as described in Chapters [12](#514143_1_En_12_Chapter.xhtml) and
    [13](#514143_1_En_13_Chapter.xhtml). The second technique, covered in this chapter,
    extends existing scripts to tailor the generated templates.


    Remember, the containers we’re working with run Oracle Enterprise Linux. All the
    commands in the container environment, whether running a container or building
    an image, must be appropriate to the container’s operating system. For Linux users
    running different distribution flavors, bear in mind that commands used on the
    host may differ from those needed in the container. For example, Ubuntu users
    update packages on their systems with `apt-get` but use `yum` in Oracle database
    containers.


    ## Script Modifications


    Except for the Dockerfile and two response files, the files reviewed in this chapter
    are all `bash` shell scripts. The intent here isn’t to delve deeply into the scripts
    themselves but to point out how and where to update them to accomplish various
    modifications to the resulting images. And the good news is you don’t need to
    be a scripting expert to understand these changes!


    The files we’ll work with in this chapter are part of the Docker repository, introduced
    in Chapter [4](#514143_1_En_4_Chapter.xhtml). Recall that after copying the repository
    to your system, you navigated down a (rather lengthy) path to build your first
    image: `docker-images/OracleDatabase/SingleInstance/dockerfiles`. Beneath that
    directory were several subdirectories, one for each database version:


    ```

    drwxr-xr-x   8 seanscott  staff   256 May 27 20:51 11.2.0.2

    drwxr-xr-x  18 seanscott  staff   576 May 27 20:51 12.1.0.2

    drwxr-xr-x  16 seanscott  staff   512 May 27 20:51 12.2.0.1

    drwxr-xr-x  16 seanscott  staff   512 May 27 20:51 18.3.0

    drwxr-xr-x   8 seanscott  staff   256 May 27 20:51 18.4.0

    drwxr-xr-x  19 seanscott  staff   608 May 27 21:00 19.3.0

    drwxr-xr-x  21 seanscott  staff   672 May 27 21:00 21.3.0

    -rwxr-xr-x   1 seanscott  staff  7091 May 27 20:51 buildContainerImage.sh

    ```


    These version-specific subdirectories all include several scripts that perform
    the general setup and configuration operations under four categories:


    *   Operating system installation and configuration


    *   Oracle database software installation


    *   Database creation


    *   Container startup, including starting the Oracle listener and database


    The examples in this chapter are based on the 19c scripts but apply to any version.
    You’ll navigate to the subdirectory matching the database version you want to
    work with, where you’ll find the files have the same names and purposes. Since
    these files are on your local system, you can perform the changes using your favorite
    text editor.


    It’s a good idea to create a backup of each file before making any changes. Still,
    if something breaks, remember you can always redownload or copy the files from
    the original GitHub repository.


    ## OS Install and Configuration


    Containers running in production environments are designed to be as minimal as
    possible, for many reasons, with space savings and security near the top. The
    container images used as baselines for more complex or specialized applications
    (including Oracle databases) typically leave out anything that isn’t essential.
    It’s faster and easier to add what’s needed than remember to remove what isn’t,
    and safer, too. Attackers can’t exploit software vulnerabilities in programs and
    packages that aren’t present in a container!


    One type of functionality commonly excluded from images is editors. All necessary
    files are preinstalled in production deployments and the environment preconfigured.
    There’s no need to edit anything manually, and the default database images reflect
    that thinking.


    On the other hand, if you’re using containers as an interactive or experimental
    platform, having editors and tools for navigating the environment makes sense.
    The same holds for containers used in security or penetration testing, evaluating
    new features, and validating patches or procedures.'
