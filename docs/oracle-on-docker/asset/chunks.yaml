    `ORCL` container displays environment details. It has links for the path, Oracle
    home, base, and directory installation.


    **Figure 6-2**

    The Inspect tab in Docker Desktop’s container detail page lists all the environment
    variables set in the container. But the `ORCL` container, created without specifying
    values for `ORACLE_SID` or `ORACLE_PDB`, doesn’t report either variable in its
    environment


    There are several additional variables we don’t see in “normal” database environments,
    like `SLIMMING` and those identifying directories, files, and scripts. Notice
    our startup script is there, too:


    ```

    RUN_FILE=runOracle.sh

    ```


    These values come from the parent image and represent the baseline configuration
    of any container started from the image. The results of the following commands
    that report environment configurations of the container and image are identical:


    ```

    docker container inspect --format ''{{range .Config.Env}}{{printf "%s\n" .}}{{end}}''
    ORCL

    docker image inspect --format ''{{range .Config.Env}}{{printf "%s\n" .}}{{end}}''
    oracle/database:19.3.0-ee

    ```


    Containers inherit environment settings from their parent image. Just as an RMAN
    backup script might set default values if not overridden, the database container
    assigns defaults for the `ORACLE_SID` and `ORACLE_PDB` if not provided when creating
    a container with `docker run`.'
