- fmt: "# Docker中运行Oracle数据库指南\n\n## 打开Shell\n\n要访问容器内的命令行，类似于通过SSH连接到远程主机：\n\n```\n\
    docker exec -it  bash\n```\n\n`-it` 标志指示Docker打开一个交互式会话。您可以通过将 `bash` 替换为其他shell或命令名称来指定不同的shell或命令。请记住，不属于容器\
    \ `PATH` 变量一部分的命令需要提供完整路径。\n\n## 运行SQL*Plus\n\n要在容器中直接运行SQL*Plus：\n\n```\ndocker\
    \ exec -it  sqlplus / as sysdba\n```\n\n## 运行脚本\n\n要在容器后台远程运行脚本，请省略 `-it` 标志并传递*容器中存在的*路径和脚本名称：\n\
    \n```\ndocker exec  /\n```\n\n脚本必须能被容器的默认用户（对于我们处理的容器是 `oracle` 用户）执行。\n\n## 以Root用户连接\n\
    \n要以默认用户以外的其他用户（包括 `root` 用户）连接到容器，请通过 `-u` 标志传递用户名：\n\n```\ndocker exec -it -u\
    \   bash\n```\n\n## 管理密码\n\n要设置（或重置）容器数据库的特权数据库密码，请使用 `docker exec` 运行容器中的 `/opt/oracle/setPassword.sh`\
    \ 脚本，并将新密码作为参数提供：\n\n```\ndocker exec  /opt/oracle/setPassword.sh \n```\n\n这里，我将容器\
    \ `ORCL1` 的密码更改为 `oracle123`：\n\n```\n> docker exec ORCL1 /opt/oracle/setPassword.sh\
    \ oracle123\nThe Oracle base remains unchanged with value /opt/oracle\nSQL*Plus:\
    \ Release 19.0.0.0.0 - Production on Tue Mar 29 00:44:36 2022\nVersion 19.3.0.0.0\n\
    Copyright (c) 1982, 2019, Oracle.  All rights reserved.\nConnected to:\nOracle\
    \ Database 19c Enterprise Edition Release 19.0.0.0.0 - Production\nVersion 19.3.0.0.0\n\
    SQL>\nUser altered.\nSQL>\nUser altered.\nSQL>\nSession altered.\nSQL>\nUser altered.\n\
    SQL> Disconnected from Oracle Database 19c Enterprise Edition Release 19.0.0.0.0\
    \ - Production\nVersion 19.3.0.0.0\n```\n\n## Docker部署示例\n\n在过去的几页中，我提供了一些代码片段，但我想通过从Linux或WSL命令行运行的实际示例来展示我典型的Docker工作流程。\n\
    \n### 新环境设置\n\n如果我在一个新的容器环境中工作，我的第一步是添加运行Oracle in Docker所需的目录和用户。在Linux系统上，我将存储分成两个分区，一个用于数据库，另一个用于Docker相关文件：\n\
    \n```\nsudo mkdir /oradata /docker\nsudo chown $(id -un):$(id -gn) /docker\n```\n\
    \n第二个命令将 `/docker` 目录的所有者和组更改为我的本地用户，以便稍后无需调用 `sudo` 即可添加文件。\n\n`/oradata` 挂载点用作数据库卷和挂载的根目录。为了避免Linux上的绑定挂载问题，我创建一个\
    \ `oracle` 用户和 `oinstall` 组，其ID值与Oracle预安装RPM中的值匹配，然后设置 `/oradata` 目录的所有权：\n\n\
    ```\nsudo groupadd -g 54321 oinstall\nsudo useradd -u 54321 -g oinstall\nsudo\
    \ chown oracle:oinstall /oradata\n```\n\n默认情况下，Docker将其数据保存在 `/var/lib/docker`\
    \ 目录中。Linux系统，尤其是在云服务中运行的系统，通常具有与启动卷分离的块存储，可为容器操作提供更快或更大的分区。如果是这样，我将 `/var/lib/docker`\
    \ 重新定位到一个新分区。在这里，我将其移动到 `/docker` 分区下：\n\n```\nsystemctl stop docker.service\n\
    systemctl stop docker.socket\nsed -i 's|ExecStart=/usr/bin/dockerd|ExecStart=/usr/bin/dockerd\
    \ -g /docker|g' /lib/systemd/system/docker.service\nrsync -aqxP /var/lib/docker/\
    \ /docker/.docker 2>/dev/null\nsystemctl daemon-reload\nsystemctl start --no-block\
    \ docker.service\n```\n\n### 添加Oracle仓库\n\n新系统需要Oracle的Docker仓库副本。假设已安装 `git`，我可以将仓库克隆到\
    \ `/docker` 路径下：\n\n```\ngit clone https://github.com/oracle/docker-images /docker\n\
    ```\n\n将相应的安装介质复制到 `/docker/OracleDatabase/SingleInstance/dockerfiles/` 下的版本目录后，我就可以开始构建镜像：\n\
    \n```\ncd /docker/OracleDatabase/SingleInstance/dockerfiles/\n./buildContainerImage.sh\
    \ -v 19.3.0 -e\n./buildContainerImage.sh -v 21.3.0 -e\n```\n\n### 网络配置\n\n接下来，我将注意力转向网络，添加一个新的桥接网络，我通常将其命名为\
    \ `oracle-db`：\n\n```\ndocker network create oracle-db --attachable --driver bridge\n\
    ```\n\n更正式的环境可能需要多个网络以实现更好的隔离。如果是这样，我将重新进行此步骤。\n\n如果我预计需要DNS，我还会启动一个 `docker-hoster`\
    \ 容器：\n\n```\ndocker run -d \\\n--name oracle-db-dns \\\n-v /var/run/docker.sock:/tmp/docker.sock\
    \ \\\n-v /etc/hosts:/tmp/hosts \\\ndvdarias/docker-hoster\n```\n\n### 运行容器\n\n\
    我创建容器时遵循的步骤取决于我计划如何使用它们。通常分为两类：不打算保留很长时间的“一次性”数据库，以及生产或类似生产的数据库。\n\n#### 一次性环境\n\
    \n我为*每个*数据库容器持久化 `/opt/oracle/oradata` 卷，但对于生命周期短的一次性数据库，我很少做更多。在清单 [10-4](#514143_1_En_10_Chapter.xhtml#PC44)\
    \ 中的示例中，我设置了容器、数据库和PDB名称的环境变量。脚本使用这些变量，添加一个目录并将其绑定挂载到卷，然后创建一个Oracle 19c数据库容器。我还将本地目录\
    \ `/oradata/scripts` 挂载到容器上的一个新挂载点，称为 `/scripts`。这是一个常见的、共享的目录，包含——您猜对了——脚本、工具和实用程序，在我工作时可能需要在容器中使用。\n\
    \n```\nCONTAINER_NAME=test\nORACLE_SID=ORCLCDB\nORACLE_PDB=ORCLPDB1\nmkdir -p\
    \ /oradata/${CONTAINER_NAME}\ndocker volume create --opt type=none --opt o=bind\
    \ \\\n--opt device=/oradata/${CONTAINER_NAME} \\\n${CONTAINER_NAME}_data\ndocker\
    \ run -d \\\n--name ${CONTAINER_NAME} \\\n-e ORACLE_SID=${ORACLE_SID} \\\n-e ORACLE_PDB={ORACLE_PDB}\
    \ \\\n--volume ${CONTAINER_NAME}_data:/opt/oracle/oradata \\\n--volume /oradata/scripts:/scripts\
    \ \\\n--network oracle-db \\\noracle/database:19.3.0-ee\n```\n清单 10-4\n展示创建资源和运行“一次性”Oracle\
    \ 19c数据库容器步骤的示例代码\n\n#### 持久化环境\n\n关键数据库需要更严格的管理和更多资源，包括用于诊断和审计目录的额外卷。清单 [10-5](#514143_1_En_10_Chapter.xhtml#PC45)\
    \ 是一个脚本示例，用于自动化创建目录、分配卷和运行容器的步骤。\n\n```\nCONTAINER_NAME=prod\nORACLE_SID=ORCLCDB\n\
    ORACLE_PDB=ORCLPDB1\nfor dir in audit data diag\ndo mkdir -p /oradata/${CONTAINER_NAME}/${dir}\n\
    docker volume create --opt type=none --opt o=bind \\\n--opt device=/oradata/${CONTAINER_NAME}/${dir}\
    \ \\\n${CONTAINER_NAME}_${dir}\ndone\nmkdir -p /oradata/${CONTAINER_NAME}_entry/{setup,startup}\n\
    docker run -d \\\n--name ${CONTAINER_NAME} \\\n-e ORACLE_SID=${ORACLE_SID} \\\n\
    -e ORACLE_PDB={ORACLE_PDB} \\\n--volume ${CONTAINER_NAME}_data:/opt/oracle/oradata\
    \ \\\n--volume ${CONTAINER_NAME}_diag:/opt/oracle/diag \\\n--volume ${CONTAINER_NAME}_audit:/opt/oracle/admin\
    \ \\\n--volume /oradata/${CONTAINER_NAME}_entry:/opt/oracle/scripts \\\n--volume\
    \ /oradata/scripts:/scripts \\\n--network oracle-db \\\noracle/database:19.3.0-ee\n\
    ```\n清单 10-5\n用于自动化创建数据库审计、数据和诊断目录的多个目录及绑定挂载卷的脚本\n\n请注意，我为每个容器创建了专用的入口点目录。这是我放置任何用于修改容器设置和启动操作的脚本的地方。拥有专用目录可以实现更多控制，根据需要创建到全局副本的链接或编写自定义脚本。"
  raw: "### Open a Shell\n\nTo access the command line inside the container, similar\
