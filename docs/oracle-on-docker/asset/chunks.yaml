- fmt: "### Context\n\n构建镜像需要 *Dockerfile*（指令或配方）和 *构建上下文*（文件、资源或素材）。上下文是指构建运行所在目录及其下的所有内容。Oracle\
    \ 数据库构建包含软件安装介质、用于管理构建的脚本（准备操作系统和安装数据库）以及容器运行时使用的脚本（创建数据库、启动数据库、报告健康状况等）。\n\n\
    在之前的构建命令中，点（.）代表上下文。这个点或句号是 Linux 中的一个简写字符，指向当前目录^[^(77)](#fn77)。Docker 使用它在那里找到的任何文件来构建镜像。构建也需要一个\
    \ `Dockerfile`，如果未明确指定，Docker 会在上下文中查找名为 “Dockerfile” 的文件。\n\n为了更好地理解上下文，我在一个新目录中创建了一个简单的\
    \ `Dockerfile`，如清单 [14-1](#514143_1_En_14_Chapter.xhtml#PC2) 所示。它以 `alpine` 镜像开始，这是一个在容器中流行的极简\
    \ Linux 发行版。`Dockerfile` 运行一个 `COPY` 指令。第一个参数，星号通配符，将所有文件从构建上下文（本地目录）复制到目标位置，即容器的根目录（用斜杠表示）。\n\
    \n```dockerfile\nFROM alpine\nCOPY * /\nCMD ls -l /\n```\n\n清单 14-1\n用于演示上下文的简单\
    \ `Dockerfile`\n\n最后的 `CMD` 指令在执行镜像时运行，并列出容器根目录的内容。清单 [14-2](#514143_1_En_14_Chapter.xhtml#PC3)\
    \ 包含了运行上述简单命令所产生的输出。\n\n```console\n> docker build .\nSending build context to\
    \ Docker daemon  2.048kB\nStep 1/3 : FROM alpine\nlatest: Pulling from library/alpine\n\
    213ec9aee27d: Pull complete\nDigest: sha256:bc41182d7ef5ffc53a40b044e725193bc10142a1243f395ee852a8d9730fc2ad\n\
    Status: Downloaded newer image for alpine:latest\n---> 9c6f07244728\nStep 2/3\
    \ : COPY * /\n---> 1d5ae09bcac7\nStep 3/3 : CMD ls -l /\n---> Running in 7aab4d9ea957\n\
    Removing intermediate container 7aab4d9ea957\n---> 8cf63acc1f17\nSuccessfully\
    \ built 8cf63acc1f17\n```\n\n清单 14-2\n为清单 14-1 所示的 `Dockerfile` 运行 `docker build`\
    \ 时生成的输出\n\n来看一下输出：\n\n*   “Sending build context to Docker daemon”，读取了上下文（本地目录）中的所有文件并将它们发送到\
    \ Docker 守护进程。只有在这之后，它才开始读取 `Dockerfile` 并执行工作。\n*   `Dockerfile` 的第一步指示 Docker\
    \ 拉取 `alpine` 镜像。它将其添加到一个新创建的层 `9c6f07244728`。（每层都以三个破折号和一个右尖括号 `--->` 为前缀。）\n\
    *   第二步将文件复制到另一个新层 `1d5ae09bcac7`。\n*   第三步在一个中间容器 `7aab4d9ea957` 中运行 `ls -l /`\
    \ 命令。\n*   移除中间容器后，Docker 创建了最后一层 `8cf63acc1f17`。\n\n运行 `docker images` 报告新创建的镜像以及被\
    \ `FROM` 指令拉取的 `alpine` 镜像：\n\n```console\n> docker images\nREPOSITORY       \
    \ TAG         IMAGE ID       CREATED          SIZE\n                  8cf63acc1f17\
    \   21 seconds ago   5.54MB\nalpine            latest      9c6f07244728   2 weeks\
    \ ago      5.54MB\noracle/database   19.3.0-ee   1b588736c8c1   2 months ago \
    \    6.67GB\n```\n\n新容器的镜像 ID 与镜像列表中显示的一致。注意该镜像没有仓库或标签。管理或报告镜像信息、或将镜像作为容器运行的命令，必须使用其\
    \ ID（暂时）。让我们将镜像 ID 传递给 `docker history` 命令以查看镜像的各层：\n\n```console\n> docker history\
    \ 8cf63acc1f17\nIMAGE          CREATED         CREATED BY                    \
    \            SIZE   COMMENT\n8cf63acc1f17   2 minutes ago   /bin/sh -c #(nop)\
    \  CMD [\"/bin/sh\" \"-c\" \"ls -...   0B\n1d5ae09bcac7   2 minutes ago   /bin/sh\
    \ -c #(nop) COPY file:a45abb589c97bd2f...   34B\n9c6f07244728   2 weeks ago  \
    \   /bin/sh -c #(nop)  CMD [\"/bin/sh\"]              0B\n      2 weeks ago  \
    \   /bin/sh -c #(nop) ADD file:2a949686d9886ac7c...   5.54MB\n```\n\n历史记录输出从最新的顶部到最旧的底部读取。注意各层的\
    \ ID 值与 `docker build` 输出中的对应。其中一层 `1d5ae09bcac7` 的大小为 34 字节，与本目录中 `Dockerfile`\
    \ 的大小相同：\n\n```console\n> ls -l\ntotal 8\n-rw-r--r--   1 seanscott  staff    34\
    \ Aug 25 10:57 Dockerfile\n```\n\n这一层包含一个文件，即通过 `COPY` 命令添加到“基础”alpine 镜像的 `Dockerfile`！\n\
    \n最后一层 `8cf63acc1f17` 是零字节。这是一个元数据层。它不属于镜像，至少容器内的用户无法以某种方式看到它。它在通过 `docker run`\
    \ 调用镜像时由 Docker 使用。我们可以通过运行该镜像看到这一点：\n\n```console\n> docker run 8cf63acc1f17\n\
    total 60\n-rw-r--r--    1 root     root            34 Aug 25 16:57 Dockerfile\n\
    drwxr-xr-x    2 root     root          4096 Aug  9 08:47 bin\ndrwxr-xr-x    5\
    \ root     root           360 Aug 25 17:54 dev\ndrwxr-xr-x    1 root     root\
    \          4096 Aug 25 17:54 etc\ndrwxr-xr-x    2 root     root          4096\
    \ Aug  9 08:47 home\ndrwxr-xr-x    7 root     root          4096 Aug  9 08:47\
    \ lib\ndrwxr-xr-x    5 root     root          4096 Aug  9 08:47 media\ndrwxr-xr-x\
    \    2 root     root          4096 Aug  9 08:47 mnt\ndrwxr-xr-x    2 root    \
    \ root          4096 Aug  9 08:47 opt\ndr-xr-xr-x  332 root     root         \
    \    0 Aug 25 17:54 proc\ndrwx------    2 root     root          4096 Aug  9 08:47\
    \ root\ndrwxr-xr-x    2 root     root          4096 Aug  9 08:47 run\ndrwxr-xr-x\
    \    2 root     root          4096 Aug  9 08:47 sbin\ndrwxr-xr-x    2 root   \
    \  root          4096 Aug  9 08:47 srv\ndr-xr-xr-x   13 root     root        \
    \     0 Aug 25 17:54 sys\ndrwxrwxrwt    2 root     root          4096 Aug  9 08:47\
    \ tmp\ndrwxr-xr-x    7 root     root          4096 Aug  9 08:47 usr\ndrwxr-xr-x\
    \   12 root     root          4096 Aug  9 08:47 var\n>\n```\n\n记住，容器执行的功能或服务有点像可执行程序。`CMD`\
    \ 指令定义了要执行的操作。容器中的其他所有内容——库、包、二进制文件和脚本——只是为了支持其运行时或可执行功能。这解释了为什么与虚拟机或物理主机上的文件系统和操作系统相比，镜像的占用空间通常有限。镜像\
    \ `CMD` 指令中固定的操作限制了容器的范围。在这个例子中，`CMD` 运行了一个命令 `ls -l /`。该任务完成后，它退出并将控制权交还给主机命令提示符。\n\
    \n清单 [14-2](#514143_1_En_14_Chapter.xhtml#PC3) 包含了这些行：\n\n```text\nStep 3/3 :\
    \ CMD ls -l /\n---> Running in 7aab4d9ea957\nRemoving intermediate container 7aab4d9ea957\n\
    ```\n\nDocker 并没有读取或保存此操作的结果。“中间容器”是 Docker 检查命令语法的地方。\n\n关于层的一个提醒：在这个容器中运行 `ls\
    \ -l /` 并不是以通常的方式显示容器的文件系统。相反，它显示的是两个层的合并内容：基础 `alpine` 镜像（层 `9c6f07244728`）中的文件系统，以及由\
    \ `COPY` 命令创建的层（`1d5ae09bcac7`）中的文件系统。将这些分离成层允许 Docker 在多个容器中重用相同的 `alpine` 层，而无需使用额外空间！"
  raw: "### Context\n\nBuilding images requires a *Dockerfile*—the instructions or\
    \ recipe—and a *build context,* the files, assets, or ingredients. Context is\
    \ everything at or below the directory where the build runs. Oracle database builds\
    \ include the software installation media, scripts for managing the build (preparing\
    \ the operating system and installing a database), and scripts used by the container\
    \ runtime (creating a database, starting a database, reporting health, and so\
    \ on).\n\nIn the preceding build command, the dot represents the context. The\
    \ dot, or period, is a shorthand character in Linux that points to the current\
    \ directory.^([^(77)](#fn77)) Docker builds the image using whatever files it\
    \ finds there. Builds need a Dockerfile, too, and if not explicitly defined, Docker\
    \ looks for a file named “Dockerfile” among the context.\n\nTo get a better idea\
    \ for context, I created a simple Dockerfile in a new directory, shown in Listing\
    \ [14-1](#514143_1_En_14_Chapter.xhtml#PC2). It begins with the `alpine` image,\
    \ a minimalist Linux distribution popular for containers. The Dockerfile runs\
    \ a `COPY` instruction. The first argument, the asterisk wildcard, copies all\
    \ files from the build context—the local directory—into the target destination,\
    \ the container’s root directory (represented by the slash).\n\n```\nFROM alpine\n\
    COPY * /\nCMD ls -l /\nListing 14-1\nA simple Dockerfile for demonstrating context\n\
    ```\n\nThe final `CMD` instruction runs when executing the image and lists the\
    \ contents of the container’s root directory. Listing [14-2](#514143_1_En_14_Chapter.xhtml#PC3)\
    \ includes the output produced by running the simple command earlier.\n\n```\n\
    > docker build .\nSending build context to Docker daemon  2.048kB\nStep 1/3 :\
    \ FROM alpine\nlatest: Pulling from library/alpine\n213ec9aee27d: Pull complete\n\
    Digest: sha256:bc41182d7ef5ffc53a40b044e725193bc10142a1243f395ee852a8d9730fc2ad\n\
    Status: Downloaded newer image for alpine:latest\n---> 9c6f07244728\nStep 2/3\
    \ : COPY * /\n---> 1d5ae09bcac7\nStep 3/3 : CMD ls -l /\n---> Running in 7aab4d9ea957\n\
    Removing intermediate container 7aab4d9ea957\n---> 8cf63acc1f17\nSuccessfully\
    \ built 8cf63acc1f17\nListing 14-2\nThe output generated when running docker build\
    \ for the Dockerfile is shown in Listing 14-1\n```\n\nTake a look at the output:\n\
    \n*   “*Sending build context to Docker daemon*,” read all the files in the context—the\
    \ local directory—and sent them to the Docker daemon. Only then did it begin reading\
    \ the Dockerfile and performing work.\n\n*   The first step of the Dockerfile\
    \ instructed Docker to pull the `alpine` image. It added this to a newly created\
    \ layer, `9c6f07244728`. (Each layer is prefixed by three dashes and a right caret:\
    \ `--->`.)\n\n*   The second step copied files into another new layer, `1d5ae09bcac7`.\n\
    \n*   The third step ran the `ls -l /` command in an intermediate container, `7aab4d9ea957`.\n\
    \n*   After removing the intermediate container, Docker created a final layer,\
    \ `8cf63acc1f17`.\n\nRunning `docker images` reports the newly created image,\
    \ as well as the `alpine` image, pulled in by the `FROM` instruction:\n\n```\n\
    > docker images\nREPOSITORY        TAG         IMAGE ID       CREATED        \
    \  SIZE\n                  8cf63acc1f17   21 seconds ago   5.54MB\nalpine    \
    \        latest      9c6f07244728   2 weeks ago      5.54MB\noracle/database \
    \  19.3.0-ee   1b588736c8c1   2 months ago     6.67GB\n```\n\nThe image ID of\
    \ the new container matches that shown in the image listing. Notice the image\
    \ doesn’t have a repository or tag. Commands for managing or reporting image information,\
    \ or running the image as a container, must use the ID (for now). Let’s pass the\
    \ image ID to the `docker history` command to view the image’s layers:\n\n```\n\
    > docker history 8cf63acc1f17\nIMAGE          CREATED         CREATED BY     \
    \                           SIZE   COMMENT\n8cf63acc1f17   2 minutes ago   /bin/sh\
    \ -c #(nop)  CMD [\"/bin/sh\" \"-c\" \"ls -...   0B\n1d5ae09bcac7   2 minutes\
    \ ago   /bin/sh -c #(nop) COPY file:a45abb589c97bd2f...   34B\n9c6f07244728  \
    \ 2 weeks ago     /bin/sh -c #(nop)  CMD [\"/bin/sh\"]              0B\n     \
    \ 2 weeks ago     /bin/sh -c #(nop) ADD file:2a949686d9886ac7c...   5.54MB\n```\n\
    \nHistory output reads from newest at the top to oldest at the bottom. Notice\
    \ the ID values of each layer correspond to those in the `docker build` output.\
    \ One of these, layer `1d5ae09bcac7`, has a size of 34 bytes. That’s the same\
    \ size as the Dockerfile in this directory:\n\n```\n> ls -l\ntotal 8\n-rw-r--r--\
    \   1 seanscott  staff    34 Aug 25 10:57 Dockerfile\n```\n\nThis layer contains\
    \ one file, the Dockerfile added to the “base” alpine image by the `COPY` command!\n\
    \nThe final layer, `8cf63acc1f17`, is zero bytes. This is a metadata layer. It’s\
    \ not part of the image, at least not in a way that a user inside the container\
    \ can see. It’s used by Docker when invoking the image through `docker run`. We\
    \ can see that by running the image:\n\n```\n> docker run 8cf63acc1f17\ntotal\
    \ 60\n-rw-r--r--    1 root     root            34 Aug 25 16:57 Dockerfile\ndrwxr-xr-x\
    \    2 root     root          4096 Aug  9 08:47 bin\ndrwxr-xr-x    5 root    \
    \ root           360 Aug 25 17:54 dev\ndrwxr-xr-x    1 root     root         \
    \ 4096 Aug 25 17:54 etc\ndrwxr-xr-x    2 root     root          4096 Aug  9 08:47\
    \ home\ndrwxr-xr-x    7 root     root          4096 Aug  9 08:47 lib\ndrwxr-xr-x\
    \    5 root     root          4096 Aug  9 08:47 media\ndrwxr-xr-x    2 root  \
    \   root          4096 Aug  9 08:47 mnt\ndrwxr-xr-x    2 root     root       \
    \   4096 Aug  9 08:47 opt\ndr-xr-xr-x  332 root     root             0 Aug 25\
    \ 17:54 proc\ndrwx------    2 root     root          4096 Aug  9 08:47 root\n\
    drwxr-xr-x    2 root     root          4096 Aug  9 08:47 run\ndrwxr-xr-x    2\
    \ root     root          4096 Aug  9 08:47 sbin\ndrwxr-xr-x    2 root     root\
    \          4096 Aug  9 08:47 srv\ndr-xr-xr-x   13 root     root             0\
    \ Aug 25 17:54 sys\ndrwxrwxrwt    2 root     root          4096 Aug  9 08:47 tmp\n\
    drwxr-xr-x    7 root     root          4096 Aug  9 08:47 usr\ndrwxr-xr-x   12\
    \ root     root          4096 Aug  9 08:47 var\n>\n```\n\nRemember that containers\
    \ perform functions or services somewhat like an executable program. The `CMD`\
    \ instruction defines the action. Everything else in the container—the libraries,\
    \ packages, binaries, and scripts—is only there to support its runtime, or executable,\
    \ function. It explains why image footprints are typically limited compared to\
    \ the filesystem and OS on a VM or physical host. The operation fixed in the image’s\
    \ `CMD` instruction confines the container’s scope. In this case, the `CMD` runs\
    \ a command, `ls -l /`. With that task complete, it exits and returns control\
    \ to the host command prompt.\n\nListing [14-2](#514143_1_En_14_Chapter.xhtml#PC3)\
    \ included these lines:\n\n```\nStep 3/3 : CMD ls -l /\n---> Running in 7aab4d9ea957\n\
    Removing intermediate container 7aab4d9ea957\n```\n\nDocker didn’t read or save\
    \ the result of this operation. The “intermediate container” is where Docker checked\
    \ the command syntax.\n\nA reminder about layers: Running `ls -l /` in this container\
    \ isn’t showing the filesystem of the container in a customary way. Instead, it\
    \ shows the merged contents of two layers: the filesystem in the base `alpine`\
    \ image, in layer `9c6f07244728`, and the filesystem in the layer created by the\
    \ `COPY` command, `1d5ae09bcac7`. Separating these into layers allows Docker to\
    \ reuse the same `alpine` layer in multiple containers without using additional\
    \ space!"
