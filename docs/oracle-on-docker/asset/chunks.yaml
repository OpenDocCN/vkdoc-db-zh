- fmt: '### Attach the Containers


    There are no interfaces because nothing is yet attached to the network. Let’s
    remedy that! Connect the containers using `docker network connect <network name>
    <container name>` and reinspect the new network as shown in Listing [9-7](#514143_1_En_9_Chapter.xhtml#PC30).


    ```bash

    > docker network connect database-bridge ORCL1

    > docker network connect database-bridge ORCL2

    > docker network inspect database-bridge

    [

    {

    "Name": "database-bridge",

    "Id": "9dfba096bf9a740e...",

    "Scope": "local",

    "Driver": "bridge",

    "IPAM": {

    "Driver": "default",

    "Options": {},

    "Config": [

    {

    "Subnet": "172.18.0.0/16",

    "Gateway": "172.18.0.1"

    }

    ]

    },

    "Internal": false,

    "Attachable": true,

    "Ingress": false,

    "ConfigFrom": {

    "Network": ""

    },

    "ConfigOnly": false,

    "Containers": {

    "3a15e84cd484b98f...": {

    "Name": "ORCL1",

    "EndpointID": "e4cb8fea4b119625...",

    "IPv4Address": "172.18.0.2/16"

    },

    "e050233167883499...": {

    "Name": "ORCL2",

    "EndpointID": "a6d9108c93c9b376...",

    "IPv4Address": "172.18.0.3/16"

    }

    },

    "Options": {},

    "Labels": {}

    }

    ]

    ```

    Listing 9-7

    Connect containers `ORCL1` and `ORCL2` to the new `database-bridge` network and
    reinspect the output. The containers are in the network and have unique IP addresses
    within the `172.18.0.0` subnet.


    In Listing [9-8](#514143_1_En_9_Chapter.xhtml#PC31), we see that attaching the
    containers to the `database-bridge` network updated their network configurations.
    Each received a new IP address on the new network and a new interface, `eth1`,
    and corresponding entries in `/etc/hosts`. These new IP addresses are `in addition`
    to those on the default bridge network, as evidenced by the separate host entries
    in `/etc/hosts`, one for each subnet.


    ```bash

    [oracle@dbhost1 ~]$ ifconfig

    eth0: flags=4163  mtu 1500

    inet 172.17.0.2  netmask 255.255.0.0  broadcast 172.17.255.255

    ether 02:42:ac:11:00:02  txqueuelen 0  (Ethernet)

    RX packets 135  bytes 15226 (14.8 KiB)

    RX errors 0  dropped 0  overruns 0  frame 0

    TX packets 104  bytes 6888 (6.7 KiB)

    TX errors 0  dropped 0 overruns 0  carrier 0  collisions 0

    eth1: flags=4163  mtu 1500

    inet 172.18.0.2  netmask 255.255.0.0  broadcast 172.18.255.255

    ether 02:42:ac:12:00:02  txqueuelen 0  (Ethernet)

    RX packets 17  bytes 1462 (1.4 KiB)

    RX errors 0  dropped 0  overruns 0  frame 0

    TX packets 0  bytes 0 (0.0 B)

    TX errors 0  dropped 0 overruns 0  carrier 0  collisions 0

    [oracle@dbhost1 ~]$ cat /etc/hosts

    127.0.0.1     localhost

    ::1     localhost ip6-localhost ip6-loopback

    fe00::0     ip6-localnet

    ff00::0     ip6-mcastprefix

    ff02::1     ip6-allnodes

    ff02::2     ip6-allrouters

    172.17.0.2     dbhost1

    172.18.0.2     dbhost1

    ```

    Listing 9-8

    Connecting the `ORCL1` container to the network added a new network interface
    inside the container and updated its `/etc/hosts` file with the new IP address.


    Connecting the containers to the `database-bridge` network created virtual interfaces
    on the host, corresponding to those in the containers, visible by listing the
    contents of `/sys/class/net/br-9dfba096bf9a/brif`:


    ```bash

    > ls /sys/class/net/br-9dfba096bf9a/brif

    veth9e1e709  vetheb94b3f

    ```


    Running `ifconfig` against these newly created virtual interfaces produces the
    output in Listing [9-9](#514143_1_En_9_Chapter.xhtml#PC33).


    ```bash

    > ifconfig veth9e1e709

    veth9e1e709: flags=4163  mtu 1500

    inet6 fe80::f412:9dff:fed8:b8c2  prefixlen 64  scopeid 0x20

    ether f6:12:9d:d8:b8:c2  txqueuelen 0  (Ethernet)

    RX packets 0  bytes 0 (0.0 B)

    RX errors 0  dropped 0  overruns 0  frame 0

    TX packets 18  bytes 1532 (1.5 KB)

    TX errors 0  dropped 0 overruns 0  carrier 0  collisions 0

    > ifconfig vetheb94b3f

    vetheb94b3f: flags=4163  mtu 1500

    inet6 fe80::705e:8aff:fe63:8d14  prefixlen 64  scopeid 0x20

    ether 72:5e:8a:63:8d:14  txqueuelen 0  (Ethernet)

    RX packets 0  bytes 0 (0.0 B)

    RX errors 0  dropped 0  overruns 0  frame 0

    TX packets 13  bytes 1006 (1.0 KB)

    TX errors 0  dropped 0 overruns 0  carrier 0  collisions 0

    ```

    Listing 9-9

    After connecting the containers to the new bridge, Docker added virtual interfaces
    for each container on the Docker host.


    ### What About DNS?


    Under the default bridge network, there was no DNS, and containers couldn’t resolve
    the hostnames of other containers. Under the user-defined bridge, Docker provides
    internal DNS services, as shown by running `nslookup`.


    ```sql

    [oracle@dbhost1 ~]$ nslookup dbhost1

    Server:          127.0.0.11

    Address:     127.0.0.11#53

    Non-authoritative answer:

    Name:     dbhost1

    Address: 172.18.0.2

    [oracle@dbhost1 ~]$ nslookup dbhost2

    Server:          127.0.0.11

    Address:     127.0.0.11#53

    Non-authoritative answer:

    Name:     dbhost2

    Address:  172.18.0.3

    ```


    The `/etc/resolv.conf` file reveals the DNS services provided by Docker:


    ```bash

    [oracle@dbhost1 ~]$ cat /etc/resolv.conf

    search Home

    nameserver 127.0.0.11

    options ndots:0

    ```


    Compare that to the file’s contents when the container was connected to only the
    default bridge network. With the addition of container DNS, both local and remote
    connections work as expected:


    ```sql

    SQL> conn system/oracle123@//dbhost1:1521/ORA1

    Connected.

    SQL> conn system/oracle123@//dbhost1/ORA1

    Connected.

    SQL> select host_name from v$instance;

    HOST_NAME

    --------------------------------------------------------------------------------

    dbhost1

    SQL> conn system/oracle123@//dbhost2:1521/ORA2

    Connected.

    SQL> conn system/oracle123@//dbhost2/ORA2

    Connected.

    SQL> select host_name from v$instance;

    HOST_NAME

    --------------------------------------------------------------------------------

    dbhost2

    ```


    Remember, the default bridge recognized the hostname assigned with the `--hostname`
    option during container creation but not the container name. Under a user-defined
    bridge network, DNS also honors container names:


    ```sql

    SQL> conn system/oracle123@//ORCL1:1521/ORA1

    Connected.

    SQL> conn system/oracle123@//ORCL2:1521/ORA2

    Connected.

    ```


    Finally, I can create database links between databases running in separate containers:


    ```sql

    SQL> create database link DB2 connect to system identified by oracle123 using
    ''dbhost2:1521/ORA2'';

    Database link created.

    SQL> select host_name from v$instance;

    HOST_NAME

    --------------------------------------------------------------------------------

    dbhost1

    SQL> select host_name from v$instance@DB2;

    HOST_NAME

    --------------------------------------------------------------------------------

    dbhost2

    ```


    The user-defined bridge network satisfies the objectives laid out at the beginning
    of the chapter:


    *   **Connect a client to a local database:** Connections from local clients behave
    as expected and recognize the whole gamut of hostnames: the custom hostname, the
    container name, and the container ID.

    *   **Connect a client to a database on a remote host:** Clients on containers
    can access remote databases by hostname over the traditional listener port.

    *   **Create database links between two databases:** The network supports the
    creation of database links between databases on separate containers.

    *   **Support for services, replication, and high availability:** Containers on
    the bridge network can access one another over any port.


    ## Host Connections


    Imagine how different surfing the Web would be if we had to remember and enter
    the IP address and port number of every site we visited! Thankfully, DNS translates
    human-friendly domain names into IP addresses in the background, while browsers
    connect to the default port 80 unless otherwise specified. At the beginning of
    the chapter, we set out to duplicate this experience for database connections,
    from container to container and host to container.


    Under the user-defined bridge networks, connections between containers meet this
    goal and work as expected, using the default ports and standard connection syntax.
    Unfortunately, connections from host to container do not work this way with either
    default or user-defined bridge networks.'
