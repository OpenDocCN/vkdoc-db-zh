  trans: '

    ## 自包含性


    要理解 Docker 的价值，或许需要我们重新审视对企业级应用的认知。应用软件是安装在主机上用于执行特定任务的规则集合。例如，微软 Word 就是用来管理和编辑文档的程序。


    拥有 Word 和运行 Word 是两回事。安装它意味着我拥有了 Word——一个定义了其行为的静态文件集合。而运行 Word 则让软件进入活动状态：它启动一个进程来执行软件预设的规则，并分配内存和
    CPU 等资源。一个活跃的 Word 进程可以使用现有文件或创建新文件，并在运行时捕获配置和元数据，但已安装的软件——即那些规则——本身并不会改变。


    在思考 Oracle 数据库时，这一点很容易被忽略。我们通常将数据库视为硬件、软件、数据和配置的集合体，而不是去识别其中的独立组件，但它们本质上仍然是应用程序。图
    1-1 展示了 Word 与 Oracle 数据库之间的相似之处。`ORACLE_HOME`中的软件定义了处理数据的规则。启动一个数据库实例就是创建进程、分配资源，并将数据和配置读写到磁盘上的文件中。


    ![](img/514143_1_En_1_Fig1_HTML.png)


    一张示意图展示了微软 Word 与 Oracle 数据库之间的相似性。


    **图 1-1**


    Oracle 数据库是一种应用程序，其组件与其他应用程序（包括微软 Word）类似。


    应用程序就是完成某项任务所需的所有规则和依赖项，它们被打包在一起。“启动”这个包就是运行应用程序并执行工作。


    在 Docker 中，`镜像`是包含运行特定应用程序所需的所有软件和依赖项的包。镜像是软件安装包——即规定了功能的文件和元数据。`运行`一个镜像会创建一个用于提供服务的`容器`。


    在物理或虚拟主机上原生运行的数据库，与在容器中运行的数据库，其最显著的区别在于文件的位置。在传统系统中，必要的库和包直接安装到操作系统中。更新操作系统可能会改变这些依赖项，许多机构因此会推迟或限制打补丁，以免危及数据库的稳定性和性能。


    然而，在容器中运行的系统则宽容得多。依赖项被构建到镜像中，底层主机操作系统的更改不再是问题。^[⁴] 这种管理主机操作系统的灵活性，以及对数据库兼容性担忧的减少，为及时应用最新的安全更新提供了更大的自由。


    打补丁和升级数据库的方式也不同。容器镜像是完整的、自包含的数据库软件集合，完全与数据和配置分离。在 Docker 中，无需更新活动的 Oracle Home，只需停止运行旧版本的容器，然后使用新的、已更新的镜像启动一个新容器即可！


    ## 速度


    Docker 的速度优势远不止于快速构建基础设施。让我们将 Docker 与另一种常用于在桌面环境中配置数据库的技术`Vagrant`进行比较。和 Docker
    一样，`Vagrant`也是一种“基础设施即代码”工具。Docker 创建和管理容器，而`Vagrant`则为虚拟机（或称为`客户机`）执行同样的任务。容器和虚拟机扮演着相似的角色，经常被拿来比较。Oracle
    为每种技术都维护着用于部署 Oracle 数据库的官方仓库，这为我们对比它们执行类似任务的性能提供了机会。


    我对两项活动进行了简单测试。第一项是创建一个数据库所需的时间，包括配置环境、安装前提条件和数据库软件，然后创建一个新的数据库。第二项是启动（或重启）系统。


    我使用 Oracle 的 Vagrant 项目（`https://github.com/oracle/vagrant-projects`）来创建虚拟机，使用
    Oracle 的 Docker 镜像构建（`https://github.com/oracle/docker-images`）来创建镜像。我使用相同的归档文件来安装
    Oracle 19c 企业版，并创建了一个 19.3 的容器数据库和一个可插拔数据库。所有资源都已提前下载到本地，以消除对网络下载的依赖。两项测试都在同一台机器上进行，这是一台运行着最新版`Vagrant`和`Docker
    Desktop`的 MacBook Pro。我将每项操作运行了五次，记录时间并计算了平均值。在构建新数据库方面，Docker 比`Vagrant`快了略超过
    25%；在启动速度上，Docker 比恢复一个虚拟机快了 37%。


    为什么 Docker 能快这么多？归结于虚拟机和容器工作方式的差异。虚拟机依赖于`虚拟机管理程序`来模拟硬件，然后启动一个操作系统。其中存在一个抽象层，用于将客户操作系统的调用转换到主机，再返回结果。


    Docker 容器是在主机上原生运行的进程。没有操作系统需要初始化，也没有任何东西需要引导。容器（通常）只包含运行其目标服务所必需的依赖项——可执行文件、库和其他文件，这使得它们比同等规模的虚拟机要小。


    图 1-2 展示了虚拟机和容器之间的差异。两种系统都有主机操作系统和一个支持虚拟化的解释层。并且在两种环境中，都存在软件依赖项——二进制文件、库和应用程序代码。但虚拟机包含了一个容器中没有的客户操作系统。为什么没有？因为容器利用了主机操作系统中已有的文件和资源！


    ![](img/514143_1_En_1_Fig2_HTML.png)


    一张示意图展示了虚拟机和容器之间的差异。虚拟机包含一个容器中没有的客户操作系统。


    **图 1-2**


    在虚拟机和容器中运行相同的应用程序需要相同的应用程序代码和依赖项。区别在于支持应用程序所需的操作系统位于何处。在虚拟机中，每个客户机都有自己的操作系统。容器则共享主机的操作系统。


    在图 1-2 中，虚拟机彼此隔离。即使应用程序文件和依赖项完全相同，它们也会在每个虚拟客户机中单独占用空间。在 Docker 中，三个（或三百个、三千个）相同的容器都从同一个镜像启动，其占用的空间远小于三个虚拟客户机中的对应物。^[⁵]

    '
- fmt: '### Portability


    Microsoft Word saves files in a standard format. I can share documents with others
    running Word on different operating systems or architectures and even with people
    using various word processing programs that recognize the standard.


    Container `images` built with `Docker` (and similar technologies) adhere to the
    `Open Container Initiative` or `OCI`^([⁶](#fn6)) ([`https://opencontainers.org`](https://opencontainers.org)).
    They’re portable across hardware and operating systems and interchangeable across
    all `OCI`-compliant environments. Images built in `Docker` on Windows work identically
    on a Mac or Linux system and vice versa. Virtually every cloud vendor supports
    the `OCI` standard, too. A single, standard database image works the same on any
    cloud and is `portable` across clouds. Why is portability desirable, even essential?


    Imagine we need to migrate several databases from on-premises systems to the cloud.
    Each database runs on dedicated hardware, with unique versions of Linux and different
    database software versions. Our cloud vendor offers pre-built compute images,
    but none are identical to our needs.


    One option is to recreate each database environment in the cloud, manage and maintain
    multiple distributions and configurations, follow separate update and patching
    cycles, develop unique test and QA processes, etc.—all while adding overhead to
    operations.


    Another option is to use a default compute image for every database host and run
    the databases in containers. Standard compute can be maintained identically across
    all infrastructure. Patching hosts doesn’t affect the database containers—they’re
    isolated, using their software. The abstraction and isolation containers offer
    facilitates and simplifies changing cloud vendors, running multicloud environments,
    and hybrid cloud/on-premises topologies.


    ### Reliability


    When discussing reliability, we typically think of how stable a system is, how
    resilient it is to failure if its components are durable, and whether critical
    aspects are redundant. This describes systems, infrastructure, or hardware reliability.
    There’s another aspect to reliability that’s often overlooked but equally important
    to consider: `process reliability`.


    Building reliable processes means assuring changes promoted from lower environments
    through production function predictably at each step. It also seeks to guarantee
    problem behaviors in production systems can be reproduced and confidently fixed
    elsewhere.


    Automation, version control, and configuration management are the best means of
    achieving process reliability. Unfortunately, database environments tend to avoid
    these approaches, leaning more toward manual administration. The reasoning goes
    that the overhead and discipline applied to non-database infrastructure aren’t
    justified when databases represent a minority of assets, and databases and hosts
    change too infrequently to benefit. Instead, a documented installation and configuration
    process substitutes to guarantee databases are consistent throughout the enterprise.


    Relying on documentation alone is risky. Documentation is `descriptive`. It’s
    a set of instructions that made sense to the authors when written but may be interpreted
    or understood differently by readers. It may be incomplete, particularly if the
    writer expects readers to understand certain things. Readers may even skip or
    miss steps. It’s also only effective or correct if it’s current.


    `Docker` (and other automation tools) is Infrastructure as Code and lends itself
    naturally to centralized version control tools like `git`. Code is `procedural`
    and `instructive` and less open to misinterpretation. Incomplete procedures and
    incorrect syntax lead to failure. Coded processes are also more reliable and easier
    to test.


    Images produced by `Docker` are `immutable`, meaning they can’t be changed, and
    offer greater certainty that multiple database containers running from the same
    image are identical. It eliminates variables that might confuse troubleshooting
    efforts and cast doubt on findings from a process management perspective. It’s
    easier to create (and keep) databases running in containers consistent and identical
    and achieve process reliability.


    ### Cost


    Services in containers occupy a smaller footprint than virtualized or bare-metal
    solutions. It’s why containers are attractive—they do more with less. While the
    bottom line is undoubtedly important, it’s not the only area where `Docker` and
    containers help reduce costs.


    I saved cost for last because each prior argument includes or implies cost savings
    that are more difficult to quantify. Building simpler and faster solutions accelerates
    development pipelines. Database teams no longer spend as much time performing
    data refreshes. Developer and QA teams have greater autonomy over their environments.
    Both sides win in the war between DBAs and developers!


    Operations teams use automation, configuration management, and version control
    to ensure consistency and simplify their environments. They help achieve efficiency.
    Databases often exist outside that envelope, eschewing standards and employing
    different or dedicated tools for monitoring and management. `Docker` introduces
    a way of bringing database teams into the operational fold and reducing the overhead
    associated with multiple techniques.


    Container portability creates opportunities to leverage less powerful hardware
    and low-cost cloud services to host nonproduction database environments dedicated
    to database testing. The primary obstacles to restore and disaster recovery testing
    are preparation difficulty and hardware availability. Containers solve both, automating
    the setup and reducing the threshold for what constitutes acceptable test environments.


    Finally, `Docker` creates predictable, reliable results. We solve problems with
    greater confidence and spend less time testing by reducing and eliminating doubts.
    When two systems behave differently, we typically begin looking for differences
    that may be to blame. For manually built databases, we can’t dismiss the possibility
    of errors or missed steps. Two systems started from the same image have an identical
    heritage, and it’s easier to locate where one diverges from the norm.


    ### Use Cases


    Let’s get this out of the way: My Oracle Support note `2216342.1` outlines Oracle’s
    support for `Docker`. Oracle certifies `Docker` for single-instance databases
    using `12.1.0.2` and later on hosts running


    *   `Oracle Linux 7 UEK4` and later

    *   `Red Hat Enterprise Linux 7`


    In October 2021, Oracle announced production support of `RAC` databases running
    `Oracle Database 21c` under My Oracle Support note `2488326.1`.


    `Docker` is an option for existing databases running on bare metal, a VM, or a
    cloud within these limitations.


    `Docker`’s small footprint, low resource demands, and speed make it a natural
    solution for sandbox and prototyping on limited hardware like laptops. But its
    architecture introduces the potential to work with Oracle in different and exciting
    ways.


    One interesting feature is the ability to easily separate database and operating
    system software from data and configuration. It’s easy to save the contents of
    a database as reference data, then share, restore, or provision new databases
    in seconds, using only basic OS commands—no Recovery Manager or Data Pump required.
    Let’s examine a few ways of leveraging this.'
