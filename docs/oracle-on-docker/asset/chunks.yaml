    *速度。*


    我可以告诉您容器很快，或者大峡谷很大，但有些事情最好通过*亲眼所见*来体会。


    如果您尚未安装 `Docker Desktop`，请从 [www.docker.com/products/docker-desktop](http://www.docker.com/products/docker-desktop)
    下载并安装。下一章详细介绍了如何在 Mac 和 Windows 上安装 `Docker Desktop`，以及如何在 Linux 系统上配置 Docker。


    ## Docker 命令行概览


    Docker 命令行指令以 `docker` 关键字开头。命令列表相对简短，而且在很大程度上，它们是简单明了的，即使对于新手也是如此。`docker start`
    启动一个容器；`docker logs` 显示容器日志；`docker run` 运行容器；依此类推。


    Docker 有一些同义命令。例如，`docker container run` 和 `docker run` 是同一个命令，`docker image ls`^(¹⁶)
    和 `docker images` 也是。Docker 社区倾向于在有同义词时使用较短的那个选项。我在本书中也将这样做。


    Docker 的替代品，如 Podman，包含别名指向其对应 Docker 命令的命令。我曾在安装了 Podman 而非 Docker 的环境中工作过，一些用户（包括系统管理员）多年都没有注意到！


    您总是可以通过在提示符下输入 `docker --help`（或仅 `docker`）来列出所有命令，并通过键入 `docker <COMMAND> --help`
    获取单个命令的详细信息。（附录包含一组常用命令，以及运行 Docker 和 Oracle 的示例和配方。）


    ## 运行您的第一个容器


    在开始运行 Oracle 数据库之前，让我们使用流行的 Linux 发行版 Ubuntu 来介绍一些基础知识。这提供了一个机会，让您实际操作 Docker，探索镜像和容器背后的一些概念，熟悉
    Docker 命令，并展示容器环境的基本属性。


    ### 列出镜像


    在您安装了 `Docker Desktop` 的计算机上打开一个 shell 会话，并通过运行 `docker images` 显示系统上可用的镜像。您的输出将显示一个标题但没有容器：


    ```

    > docker images

    REPOSITORY   TAG       IMAGE ID   CREATED   SIZE

    ```


    没有任何列表，表明系统上没有镜像。回想一下，镜像类似于模板，容器是运行镜像的产物。在运行容器之前，我们需要一个镜像。

    '
- fmt: '### Run a Container


    即使系统中没有镜像，我们能运行一个容器吗？让我们来检查一下！在 shell 提示符下发出以下命令以运行一个 Ubuntu Linux 容器：


    ```

    docker run -it ubuntu

    ```


    这会运行一个 Ubuntu Linux 镜像。这些标志告诉 Docker 使用标准输入以*交互*模式运行容器，并分配一个*TTY*。或者更简单地说，“启动一个容器并给我一个提示符”。`-it`
    标志或修饰符是 `--interactive` 和 `--tty` 的快捷方式（而且打字快得多）。


    即使系统上原来没有镜像，该命令也已成功完成。你应该会看到类似这样的输出：


    ```

    > docker run -it ubuntu

    Unable to find image ''ubuntu:latest'' locally

    latest: Pulling from library/ubuntu

    7b1a6ab2e44d: Pull complete

    Digest: sha256:626ffe58f6e7566e00254b638eb7e0f3b11d4da9675088f4781a50ae288f3322

    Status: Downloaded newer image for ubuntu:latest

    root@4a9ddd43e0e2:/#

    ```


    让我们分解一下输出，看看 Docker 做了什么：


    *   正如预期，Docker 在本地找不到 Ubuntu 镜像。

    *   由于没有本地镜像源，它“拉取”（*pulled*）或下载了一个镜像（我稍后会说明它来自哪里）。

    *   Docker 报告了它拉取的镜像的哈希值及其状态。

    *   它显示了一个提示符。


    所有这些只花了一小会儿时间。


    最后一行是 `root` 用户的 Linux 提示符，以及我们请求的交互式 TTY 会话，显示 `root` 用户已登录到主机 `4a9ddd43e0e2`，并显示了当前目录。


    ### Explore the Container


    命令提示符看起来像是登录到了物理 Linux 主机或虚拟机。让我们通过运行一些命令来查询环境以确认这一点：


    ```

    whoami

    id

    echo $$

    head -2 /etc/os-release

    ```


    `whoami` 和 `id` 的输出确认我们是 `root` 用户。`echo $$` 的结果（显示当前会话的进程 ID 或 PID）表明我们的 PID
    是 1。最后，`os-release` 文件的内容显示我们登录到了一个 Ubuntu 主机。你的输出（除了提示符中的主机名和 Ubuntu 版本外）应该与此匹配：


    ```

    root@4a9ddd43e0e2:/# whoami

    root

    root@4a9ddd43e0e2:/# id

    uid=0(root) gid=0(root) groups=0(root)

    root@4a9ddd43e0e2:/# echo $$


    root@4a9ddd43e0e2:/# head -2 /etc/os-release

    NAME="Ubuntu"

    VERSION="20.04.3 LTS (Focal Fossa)"

    ```


    保持这个会话打开，在你的计算机上启动一个新的 shell。重新运行之前的 `docker images` 命令。结果现在显示一个 Ubuntu 镜像已存在：


    ```

    > docker images

    REPOSITORY   TAG       IMAGE ID       CREATED       SIZE

    ubuntu       latest    ba6acccedd29   4 weeks ago   72.8MB

    ```


    这个镜像就是 Docker 为了运行之前请求的 Ubuntu 容器而拉取的。它从哪里来的呢？


    ### Image Registries


    Ubuntu 镜像并不是 Docker Desktop 的一部分。Docker 是从 *Docker Hub* 请求的它，这是一个由 Docker 社区构建和共享的镜像注册中心。Docker
    Hub 包括由 Docker 发布的*官方镜像*（*Official Images*），由商业第三方（包括 Oracle）生产和维护的*验证镜像*（*Verified
    Images*），以及其他所有镜像。


    在我撰写本文时，Docker Hub 上有近 850 万个公开可用的镜像，大部分由个人和公司添加。官方和验证镜像会经过漏洞扫描和测试。不能保证其他镜像是编写良好的甚至是安全的。我们如何知道我们使用的
    Ubuntu 镜像是好的呢？


    当我们执行 `docker run` 时，我们请求了一个 Ubuntu 镜像但没有指定仓库。Docker 从它的官方镜像库中拉取。我将在第 16 章更详细地介绍注册中心。现在，知道
    Docker 并非随机拉取某些东西就足够了！


    你可能还会注意到，在 `docker run` 和 `docker images` 的输出中，镜像标签或版本都显示为 `latest`。这是最近版本的简写，如果你没有为镜像（当有多个版本时）请求特定标签，这是默认值。这通常不重要——你通常想要
    Ubuntu 或 Oracle Enterprise Linux 7 的最新版本，以确保包含最新的更新和错误修复。对于依赖关系和版本相关的应用程序，你需要指定版本。例如，要获取
    Node.js 的特定构建，你可能会调用 `docker run node:16` 或 `docker run node:17.1.0`，其中镜像标签跟在冒号后面。


    ## Minimalism


    从清单 3-5 中关于 Ubuntu 镜像的信息显示，该镜像仅有 72.8MB。考虑到从 [`www.ubuntu.com`](http://www.ubuntu.com)
    下载的 ISO 有 1.2GB，这似乎很小。Ubuntu 的 Docker 镜像大小不到其已安装对应物的 6%。为什么？


    镜像（通常）只包含执行其功能所*绝对必需*的内容。通过排除*不*需要的内容来减少镜像占用空间有许多好处：


    *   跨网络传输的内容更少。

    *   实际上增加了基础设施容量。

    *   更小的镜像具有更小的攻击面。

    *   更少的依赖关系减少了错误和漏洞的可能性。


    编辑器通常是镜像中被排除的事物之一。容器通常自主运行，生命周期以小时或分钟计。在生产环境中登录容器是罕见的（甚至是不鼓励的）。编辑器根本没必要，而且会带来安全风险。


    回到你之前使用的容器提示符，尝试运行 `vi test.txt` 来编辑一个新文件。它找不到这个命令。`vi` 和 `nano` 没有安装：


    ```

    root@4a9ddd43e0e2:/# vi /etc/os-release

    bash: vi: command not found

    root@4a9ddd43e0e2:/# nano test.txt

    bash: nano: command not found

    ```


    还有其他迹象表明 Ubuntu 镜像已被精简，并非设计用于交互。尝试运行 `man ls` 来显示*手册页*（*manpage*），即 Linux 的内置文档。操作系统会响应一条消息，提醒我们这不是一个完整的操作系统：


    ```

    root@ebb592e975f0:/# man ls

    This system has been minimized by removing packages and content that are

    not required on a system that users do not log into.

    To restore this content, including manpages, you can run the ''unminimize''

    command. You will still need to ensure the ''man-db'' package is installed.

    ```


    ### Modify the Container


    容器是用于执行一系列狭窄任务的精简功能系统，而不是运行交互式环境。Docker 和其他发布者提供的基础镜像是精简版本，没有我们习惯在物理和虚拟系统中找到的那些额外功能。


    一些发布者为常见发行版提供“slim”变体。虽然没有标准定义什么是或不是非 slim 版本的一部分，但“slim”通常包含工作系统所需的最小内容。相比之下，非
    slim 版本可能包含额外的标准或便利功能。


    在第 12 章中，我们将看到 Oracle 数据库的容器镜像是从 Oracle Enterprise Linux 的“slim”版本构建的。


    没有什么能阻止我们更新容器操作系统来添加功能。让我们通过运行命令将 `vi`（或者如果你喜欢，`nano`）添加到你的容器中来做到这一点。清单 3-1 显示了在
    Ubuntu 上安装 `vim-tiny` 的命令，这是一个不需要 Python 支持的发行版。


    ```

    apt-get update

    apt-get install -y vim-tiny

    ```


    > **清单 3-1** 在 Ubuntu 上安装 vim-tiny 包的命令


    请注意，你需要运行 `apt-get update` 来更新仓库以包含 `vim`。如果不更新，`apt-get` 就不知道这个包存在！


    再次尝试使用 `vi test.txt` 创建文件。这次，成功了！你成功修改了容器，添加了原始镜像中没有的功能。在文件中添加一些内容并保存——你将在下一节中再次用到它！'
  raw: '### Run a Container


    Can we run a container even if there are no images present? Let’s check! Issue
    the following command at a shell prompt to run an Ubuntu Linux container:


    `docker run -it ubuntu`


    This runs an Ubuntu Linux image. The flags tell Docker to run the container in
    *interactive* mode using standard input and allocate a *TTY*.^([^(17)](#fn17))
    Or, more simply, “start a container and give me a prompt.” The `-it` flags, or
    modifiers, are shortcuts for `--interactive` and `--tty` (and much faster to type).


    Even though there was no image on the system, the command completed successfully.
    You should see something like this:


    ```

    > docker run -it ubuntu

    Unable to find image ''ubuntu:latest'' locally

    latest: Pulling from library/ubuntu

    7b1a6ab2e44d: Pull complete

    Digest: sha256:626ffe58f6e7566e00254b638eb7e0f3b11d4da9675088f4781a50ae288f3322

    Status: Downloaded newer image for ubuntu:latest

    root@4a9ddd43e0e2:/#

    ```


    Let’s break down the output and see what Docker did:


    *   Docker couldn’t find an Ubuntu image locally, as expected.


    *   Without a local source for the image, it “*pulled*” or downloaded an image
    (I’ll address where it came from shortly).


    *   Docker reported the hash value of the image it pulled and its status.


    *   It displayed a prompt.


    All of this took just a few moments.


    The last line is a Linux prompt for the `root` user and the interactive TTY session
    we requested, showing the `root` user logged in to host `4a9ddd43e0e2` and the
    current directory.


    ### Explore the Container


    The command prompt looks like a login to a physical Linux host or virtual machine.
    Let’s confirm this by running some commands to interrogate the environment:


    ```

    whoami

    id

    echo $$

    head -2 /etc/os-release

    ```


    The output of `whoami` and `id` confirms we’re the `root` user. The result of
    `echo $$` (showing the process ID or PID of the current session) says we’re PID
    1\. And finally, the contents of the `os-release` file show we’re logged in to
    an Ubuntu host. Your output (apart from the hostname in the prompt and the Ubuntu
    version) should match this:


    ```

    root@4a9ddd43e0e2:/# whoami

    root

    root@4a9ddd43e0e2:/# id

    uid=0(root) gid=0(root) groups=0(root)

    root@4a9ddd43e0e2:/# echo $$


    root@4a9ddd43e0e2:/# head -2 /etc/os-release

    NAME="Ubuntu"

    VERSION="20.04.3 LTS (Focal Fossa)"

    ```


    Leave this session open and start a new shell on your computer. Rerun the docker
    images command from earlier. The result now shows an Ubuntu image is present:


    ```

    > docker images

    REPOSITORY   TAG       IMAGE ID       CREATED       SIZE

    ubuntu       latest    ba6acccedd29   4 weeks ago   72.8MB

    ```


    This image is what Docker pulled so it could run the Ubuntu container requested
    earlier. Where did it come from?


    ### Image Registries


    The Ubuntu image isn’t part of Docker Desktop. Docker requested it from the *Docker
    Hub*, a registry of images built and shared by the Docker community. The Docker
    Hub includes *Official Images* published by Docker, *Verified Images* produced
    and maintained by commercial third parties (including Oracle), and everything
    else.


    As I write this, there are nearly 8.5 million publicly available images on Docker
    Hub, mostly added by individuals and companies. Official and Verified Images are
    scanned and tested for vulnerabilities. There are no guarantees other images are
    well written or even safe. How do we know the Ubuntu image we’re using is any
    good?


    When we executed `docker run`, we requested an Ubuntu image but didn’t specify
    a repository. Docker pulled from its library of Official Images. I’ll cover registries
    in more detail in Chapter [16](#514143_1_En_16_Chapter.xhtml). For now, it’s enough
    to know that Docker didn’t pull something at random!


    You may also notice that the image tag or version shows the latest in both the
    output of `docker run` and `docker images`. This is shorthand for the most recent
    version and the default if you don’t request a specific tag (when there is more
    than one) for an image. This usually isn’t important—you often want the most recent
    version of Ubuntu or Oracle Enterprise Linux 7 to guarantee the latest updates
    and bug fixes are present. You want to specify the version for applications where
    dependencies and versions are relevant. For example, to get a particular build
    of Node.js, you might call `docker run node:16` or `docker run node:17.1.0`, where
    the image tag follows a colon.


    ## Minimalism


    The information for the Ubuntu image from Listing [3-5](#514143_1_En_3_Chapter.xhtml#PC19)
    shows the image is a mere 72.8MB. That seems tiny, considering the ISO download
    from [`www.ubuntu.com`](http://www.ubuntu.com) is 1.2GB. The Docker image of Ubuntu
    is less than 6% the size of its installed counterpart. Why?


    Images (typically) contain only what’s *absolutely necessary* to perform their
    function. Reducing image footprint by excluding what’s *not* needed has a slew
    of benefits:


    *   Less to transfer across networks.


    *   Effectively increases infrastructure capacity.


    *   Smaller images have smaller attack surfaces.


    *   Fewer dependencies reduce the potential for bugs and vulnerabilities.


    Editors are among the things commonly excluded from images. Containers usually
    run autonomously, with lifetimes measured in hours or minutes. It’s rare (even
    discouraged) to log in to containers in production environments. Editors simply
    aren’t necessary and create security risks.


    Return to the container prompt you used before and try running `vi test.txt` to
    edit a new file. It can’t find the command. `vi` and `nano` aren’t installed:


    ```

    root@4a9ddd43e0e2:/# vi /etc/os-release

    bash: vi: command not found

    root@4a9ddd43e0e2:/# nano test.txt

    bash: nano: command not found

    ```


    There are other indications the Ubuntu image was trimmed down and not intended
    to be interactive. Try running `man ls` to display a *manpage*, Linux’s built-in
    documentation. The OS responds with a message reminding us that this is not a
    complete OS:


    ```

    root@ebb592e975f0:/# man ls

    This system has been minimized by removing packages and content that are

    not required on a system that users do not log into.

    To restore this content, including manpages, you can run the ''unminimize''

    command. You will still need to ensure the ''man-db'' package is installed.

    ```


    ### Modify the Container


    Containers are stripped-down, functional systems for performing a narrow set of
    tasks, not running interactive environments. The base images Docker and other
    publishers provide are trimmed-down versions without the extra bells and whistles
    we’re used to finding in physical and virtual systems.


    Some publishers offer “slim” variants for common distributions. While there isn’t
    a standard defining what is or isn’t part of the nonslim variants, “slim” usually
    has the minimum required for a working system. In contrast, the nonslim versions
    may include additional standard or convenient functionality.


    In Chapter [12](#514143_1_En_12_Chapter.xhtml), we’ll see that container images
    for Oracle databases are built from “slim” versions of Oracle Enterprise Linux.


    Nothing prevents us from updating the container OS to add functionality. Let’s
    do that by running commands to add `vi` (or `nano`, if you prefer) to your container.
    Listing [3-1](#514143_1_En_3_Chapter.xhtml#PC8) shows the commands for installing
    `vim-tiny`, a distribution that doesn’t require Python support.


    ```

    apt-get update

    apt-get install -y vim-tiny

    Listing 3-1

    Commands for installing the vim-tiny package on Ubuntu

    ```


    Note that you need to run `apt-get update` to update the repository to include
    `vim`. Without the update, `apt-get` doesn’t know the package exists!


    Try creating the file using `vi test.txt` once again. This time, it works! You
    successfully modified the container to add features absent from the original image.
    Add some content to the file and save it—you’ll use it again in the next section!'
