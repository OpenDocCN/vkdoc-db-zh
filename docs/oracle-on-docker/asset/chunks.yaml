    ## Introduction


    In 2013, Docker took a Linux construct that had existed for years—`containerization`—and
    wrapped it into a convenient interface, making it accessible to a broad audience.
    Since then, container adoption has blossomed. Much of the Web runs on containers.
    Everything at Google, from Search, through Gmail, to YouTube, runs in containers.
    Containers are inescapable!


    Inescapable, that is, except by one corner of the enterprise—the database.


    Databases are special. Data is the most valuable commodity in an organization,
    and for many, they entrust the most precious data—the Crown Jewels of the enterprise—to
    Oracle databases. A failed web server is quickly rebuilt or exchanged. Reconstructing
    data isn’t so easy, and the prized status of data is often projected onto the
    database, mistakenly asserting that the vault is as priceless as its contents.


    Objectively, database hosts are little more than compute and storage. As Laine
    Campbell and Charity Majors write in `Database Reliability Engineering` (O’Reilly,
    2017), "Databases are not special snowflakes." As enterprises move toward a consolidated,
    containerized platform, the pressure falls on databases to follow. Still, databases
    (particularly Oracle) are *different*. They can’t (or, more correctly, *shouldn’t*)
    run like other containers!


    That’s where this book comes in. It’s a guide for running Oracle databases on
    Docker with the same confidence, reliability, and security as traditional platforms.
    It’s not a book on Oracle database administration, nor Docker and containers.
    Instead, it covers the remarkable marriage of the two technologies. Whether you’re
    an Oracle database administrator investigating Docker solutions, a systems engineer
    exploring infrastructure consolidation, or a user searching for a reliable way
    to host Oracle databases for a development team, I’ve attempted to pour the things
    I wish I’d known when beginning my Docker journey in 2014 into this book.


    ## Acknowledgments


    This book is incomplete without extending my gratitude to those who made it possible:


    To my friends Reece and the Ligernaut team for introducing me to the beauty of
    DevOps and shepherding me through my beginnings with Docker.


    To Maggie, for the love and support over the years and your endless patience and
    understanding during this project.


    ## About the Author About the Technical Reviewer


    # Part I Introduction to Containers


    ## Introduction to Containers


    I’ve divided this book into two parts. This first part covers the basics of containers.
    You’ll create (or download) an Oracle database as a package, then run it on your
    system. These packages are portable across all popular operating systems—Windows,
    Mac, and Linux—and are the cornerstone behind the speed and simplicity Docker
    introduces to development.'
