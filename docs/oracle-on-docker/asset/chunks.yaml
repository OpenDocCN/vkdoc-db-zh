    # 17. 结论


    在本书的第一部分，你探索了容器的工作原理，以及如何在 Docker 中运行 Oracle 数据库。你学习了将重要的数据库内容——数据文件和配置——持久化存储在容器限制之外的方法。你也熟练掌握了容器网络的概念，能够将运行在主机上的客户端应用程序（如
    SQL Developer）连接到容器内的数据库。你还可以利用容器网络在运行容器的数据库之间进行通信。


    第二部分涵盖了镜像及其构建配方：Dockerfile。你发现了如何定制 Oracle 容器仓库中提供的标准镜像，并深入了解了扩展 Dockerfile 以满足你需求的技术。当然，并非每个镜像一开始都能顺利运行！幸运的是，我们介绍了多种故障排除镜像和容器的方法与途径。一旦一切运行顺畅，你便学会了如何在仓库中添加和管理镜像。


    我初次接触在容器中运行 Oracle 数据库的体验并不积极。我当时确信这是徒劳无功之事，注定会惨淡收场。此后的几年里，我亲身见证了容器的力量与潜力。它们已成为我日常工作中不可或缺的一部分。在本书中，我试图记录我对
    Linux 容器背后技术的欣赏，并与你分享我在 Docker 体验中希望更早了解的那些事情。我真诚地希望你觉得本书对你有所帮助，并希望它能激励你开启或深化你的
    Docker 之旅！


    # 第三部分 附录


    # 安装 Docker Desktop


    ## 安装 Docker Desktop


    Docker Desktop 可从 [`www.docker.com`](http://www.docker.com) 免费下载。Linux 用户可以安装
    Docker Desktop 或 Docker Engine（运行 Docker 容器的原生环境）。


    ### Windows 10 和 11


    在幕后，Windows 上的 Docker Desktop 在 Hyper-V 虚拟机中运行 Linux。早期版本的 Docker Desktop 因 Hyper-V
    与 VirtualBox 之间的冲突而声名狼藉，性能也常常不尽如人意。


    `Windows Subsystem for Linux version 2`，或称 `WSL 2`^(⁹¹)，在 Windows 10 上可用，它标志着
    Docker Desktop 在 Windows 上的一次重大改进。在 WSL 2 下运行的 Docker Desktop 拥有改进的系统资源管理、更好的性能以及与主机操作系统更强大的集成。


    WSL 在 Windows 操作系统内部提供了功能完整的 Linux 体验。本书中使用的命令示例在 WSL 环境中的运行方式，与在 Linux 或 Mac
    系统中完全相同。


    #### 设置 Windows Subsystem for Linux


    按照 Microsoft 的说明在 [`https://docs.microsoft.com/en-us/windows/wsl/install`](https://docs.microsoft.com/en-us/windows/wsl/install)
    设置 Windows Subsystem for Linux。在我的系统（Windows 10）上，我以管理员身份打开一个 PowerShell 会话，然后运行
    `wsl --install`，如图 A-1 所示。这会执行 WSL 的默认安装并安装 Ubuntu Linux。命令完成后，请重启计算机。


    ![](img/514143_1_En_18_Fig1_HTML.jpg)


    一个管理员 - windows powershell 选项卡的截图，其中包含用于安装 WSL 2 的命令。


    图 A-1


    从以管理员身份运行的 PowerShell 会话中安装 WSL 2


    默认情况下，WSL 会下载 Ubuntu Linux 并需要重启，如图 A-2 所示。重启计算机以完成 WSL 的设置并开始 Linux 安装。


    ![](img/514143_1_En_18_Fig2_HTML.jpg)


    一个管理员 - windows powershell 选项卡的截图，显示了 WSL 2 安装后的信息。


    图 A-2


    WSL 安装完成后，重启计算机


    #### 配置和更新 Linux


    计算机重启后，WSL 将安装 Linux 发行版。这需要几分钟时间。安装完成后，你需要创建一个 Linux 用户，如图 A-3 所示。我在我的系统上使用了
    `docker` 作为用户名。


    ![](img/514143_1_En_18_Fig3_HTML.jpg)


    安装完成后出现的选项卡截图。安装后，用户必须创建一个 linux 用户。


    图 A-3


    安装完成后，创建一个要在 Linux 子系统中使用的用户


    务必更新你的 Linux 发行版。对于 Ubuntu 系统，在终端窗口中运行以下命令：


    ```

    sudo apt update && sudo apt upgrade

    ```


    现在也是从 Windows 应用商店安装 Windows Terminal 的绝佳时机。有关安装 Windows Terminal 的详细信息，请参阅“终端环境”部分。


    #### 安装 Docker Desktop


    WSL 设置完成后，请参考 Docker 的安装指南 [`https://docs.microsoft.com/en-us/windows/wsl/install-manual`](https://docs.microsoft.com/en-us/windows/wsl/install-manual)
    并按照最新的说明操作，完成所有先决条件，然后从 [`www.docker.com`](http://www.docker.com) 下载并安装 Docker
    Desktop。


    双击安装文件以打开安装向导。请确保选中“`使用 WSL 2 代替 Hyper-V（推荐）`”的复选框，如图 A-4 所示。


    ![](img/514143_1_En_18_Fig4_HTML.jpg)


    一个安装 docker desktop 选项卡的截图，显示了“使用 WSL 2 代替 Hyper-V（推荐）”和“添加快捷方式到桌面”选项框中的标记。


    图 A-4


    在 Docker Desktop 安装向导中，标记“使用 WSL 2 代替 Hyper-V”选项


    导航到开始菜单并从应用程序列表中选择 Docker Desktop。接受许可协议后，Docker Desktop 将启动并打开一个简短的教程。


    #### 配置 Docker Desktop


    单击右上角的齿轮图标进入“设置”菜单，访问如图 A-5 所示的“常规”设置。确保选中“使用基于 WSL 2 的引擎”复选框。


    ![](img/514143_1_En_18_Fig5_HTML.jpg)


    一个 docker desktop 常规设置面板的截图，高亮显示了常规设置中的“使用基于 WSL 2 的引擎”选项。


    图 A-5


    在 Docker Desktop 的“常规”设置面板下，勾选“使用基于 WSL 2 的引擎”选项


    接下来，单击“资源”选项并选择“WSL 集成”。确认“启用与默认 WSL 发行版的集成”已启用，如图 A-6 所示。对于你将在 Docker 中使用的、出现在“启用与其他发行版的集成”部分下的发行版，将滑块设置为“开”。如果右下角的“应用并重启”按钮高亮显示，请单击它以提交你的更改。


    ![](img/514143_1_En_18_Fig6_HTML.jpg)


    一个 docker desktop 设置面板的截图，显示了“资源”设置中“启用与默认 WSL 发行版的集成”选项框的标记。


    图 A-6


    确认默认发行版的 WSL 集成已开启，并且为任何其他需要 Docker Desktop 集成的发行版启用该功能

    '
- fmt: '#### Set WSL Resources


    The default resources assigned to Docker Desktop under WSL are usually adequate.
    If you experience issues and need to adjust CPU, memory, or other settings, they’re
    configurable through the `.wslconfig` file in the user’s home directory (typically
    `C:\Users\<User Name>\.wslconfig`).


    Before editing or adding the `.wslconfig` file, stop WSL from a terminal session
    as an administrator:


    ```

    wsl --shutdown

    ```


    Then edit the file:


    ```

    notepad "$env:USERPROFILE/.wslconfig"

    ```


    Listing [A-1](#514143_1_En_18_Chapter.xhtml#PC4) shows an example of a `.wslconfig`
    file to limit the memory and processor available to WSL. For complete information
    on options available in the `.wslconfig` file, see [*https://docs.microsoft.com/en-us/windows/wsl/wsl-config*](https://docs.microsoft.com/en-us/windows/wsl/wsl-config).


    ```

    [wsl2]

    processors=4 # Limit of 4 processors for WSL.

    memory=8GB   # Limit WSL to 8GB memory.

    Listing A-1

    An example of a .wslconfig file for limiting CPU and memory consumption for Windows
    Subsystem for Linux

    ```


    ### Mac (Intel)


    Before installing Docker Desktop for Mac, review and complete the prerequisites
    at [*https://docs.docker.com/desktop/install/mac-install/*](https://docs.docker.com/desktop/install/mac-install/),
    then download Docker Desktop from [`www.docker.com`](http://www.docker.com). Navigate
    to the download directory and double-click the `Docker.dmg` file to open the installer
    seen in Figure [A-7](#514143_1_En_18_Chapter.xhtml#Fig7). Drag the `Docker.app`
    file to the *Applications* folder.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig7_HTML.jpg)


    A screenshot of docker desktop application file instructs the user to drag and
    drop the docker application file into the applications folder.


    Figure A-7


    Drag and drop the `Docker.app` file to the Applications folder


    When the file copy completes, navigate to the *Applications* folder, scroll to
    the `Docker.app` application, and double-click to start Docker Desktop. Accept
    the licensing terms and continue to Docker Desktop’s main screen.


    #### Configure Resources


    Click the gear icon in the upper right, or press the Command and comma keys together
    (⌘ + ,) to access Docker Desktop’s settings and preferences. The default values
    in the General preferences pane shown in Figure [A-8](#514143_1_En_18_Chapter.xhtml#Fig8)
    are appropriate.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig8_HTML.png)


    A screenshot of default general preferences panel.


    Figure A-8


    The default General preferences for Mac are acceptable for running Oracle containers


    Next, click the *Resources* tab in the left-side menu and select *Advanced* as
    in Figure [A-9](#514143_1_En_18_Chapter.xhtml#Fig9). To run Oracle database containers,
    allocate a minimum of 4GB of memory. Oracle is a memory-intensive application,
    and the more memory you can assign, the better it performs. The same is true for
    CPUs. 10–20GB is a reasonable starting point for disk space. You can harmlessly
    increase disk space for Docker Desktop later if you need to. Shrinking disk space,
    however, removes all images, containers, and volumes.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig9_HTML.png)


    A screenshot of preferences panel displays the marked resources option in the
    left-side menu. It displays the selected resource type as advanced.


    Figure A-9


    Configure resources for the Docker environment


    ### Mac (Apple Silicon)


    As of this writing, architecture differences prevent Oracle database images from
    running in Docker on Apple Silicon machines. The community is actively working
    to address this issue, with promising progress.


    ### Docker Desktop and Docker Engine for Linux


    See Docker’s website for information on installing Docker Desktop and Docker Engine
    for different flavors of Linux. Instructions for Docker Desktop are located at
    [*https://docs.docker.com/desktop/install/linux-install*](https://docs.docker.com/desktop/install/linux-install),
    while directions for Docker Engine are found at [*https://docs.docker.com/engine/install*](https://docs.docker.com/engine/install).


    ## Terminal Environments


    Most interaction with Docker occurs at the command line or shell. You’ll need
    a *terminal program* to access the command line on your host, and there are plenty
    to choose from on each operating system.


    ### Windows


    The Windows OS includes PowerShell and the familiar Windows command prompt. The
    third option from Microsoft, Windows Terminal, combines these two tools and adds
    integration for Windows Subsystem for Linux. I started using it recently and am
    pleased—it’s my new favorite shell for Windows systems, replacing PuTTY and MobaXterm!
    All Windows shell examples in this book were captured from Windows Terminal.


    The command-line examples given throughout this book work seamlessly in a Linux
    shell accessed through Windows Terminal. The way that tools like command prompt,
    PowerShell, PuTTY, and MobaXterm interpret environment variables, along with variations
    in local configurations, can cause unusual or erroneous results. If you’re using
    one of those applications and encounter any difficulties, try again using a Windows
    Terminal shell running on the WSL Linux environment.


    To install Windows Terminal, open the Windows Start menu and select the Microsoft
    Store app. Search for and install Windows Terminal, as shown in Figure [A-10](#514143_1_En_18_Chapter.xhtml#Fig10).


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig10_HTML.png)


    A screenshot of windows start menu displays the search option with text, terminal,
    and marked windows terminal application.


    Figure A-10


    Search for “terminal” in the Windows Store and install the Windows Terminal application


    This adds Windows Terminal to the system. Go to the Start menu and open the new
    Terminal application. The Terminal session in Figure [A-11](#514143_1_En_18_Chapter.xhtml#Fig11)
    shows the options for opening new tabs. Clicking the “plus” icon to the right
    of the tab will open a new default session. Clicking the down arrow opens a dialog
    with options for opening a command prompt, a PowerShell session, a Linux (Ubuntu)
    session, or an Azure Cloud Shell.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig11_HTML.jpg)


    A screenshot of a windows terminal displays the options for opening new tabs.


    Figure A-11


    Windows Terminal supports multiple shell types and automatically integrates with
    any virtual environments running under the Windows Subsystem for Linux


    The Ubuntu option is thanks to Windows Terminal integration with the Windows Subsystem
    for Linux. It detects the virtual environments running in WSL and includes shell
    options for each. Figure [A-12](#514143_1_En_18_Chapter.xhtml#Fig12) illustrates
    examples of the different shell environments: Ubuntu Linux, a command prompt,
    and PowerShell.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig12_HTML.jpg)


    A screenshot of image preview displays the examples of the different shell environments,
    namely Ubuntu Linux, a Command Prompt, and PowerShell.


    Figure A-12


    Examples of an Ubuntu Linux shell (top), a Windows command prompt (middle), and
    a PowerShell session (bottom) running as tabs in Windows Terminal'
