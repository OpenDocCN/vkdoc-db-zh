    # 创建数据库并连接到容器


    创建数据库是耗时且耗费资源的。根据主机的能力，这可能需要几分钟到一小时不等。在本书后面，我们将讨论绕过数据库创建的方法——即使对于新容器——这些方法允许快速、近乎即时地提供数据库。现在，请监控日志，观察
    Oracle 创建数据库的过程，直到你在日志中看到如代码清单 5-2 所示的消息“`DATABASE IS READY TO USE`”，这表明 `DBCA`
    已成功完成。


    ```

    77% complete

    Executing Post Configuration Actions

    100% complete

    Database creation complete. For details check the logfiles at:

    /opt/oracle/cfgtoollogs/dbca/ORCLCDB.

    Database Information:

    Global Database Name:ORCLCDB

    System Identifier(SID):ORCLCDB

    Look at the log file "/opt/oracle/cfgtoollogs/dbca/ORCLCDB/ORCLCDB.log" for further
    details.

    ...

    #########################

    DATABASE IS READY TO USE!

    #########################

    The following output is now a tail of the alert.log:

    ORCLPDB1(3):

    ORCLPDB1(3):XDB initialized.

    Listing 5-2

    Docker 日志的输出显示 DBCA 已完成，数据库已准备就绪

    ```


    太好了！数据库已就绪。现在呢？是时候连接到容器，看看容器“内部”是什么样子了！


    ## 连接到容器


    连接到容器就像建立到远程主机的 `SSH` 连接一样。一旦连接建立，我们就可以使用熟悉的 shell 命令在容器的操作系统中导航，就像连接到外部机器一样。在容器中运行的命令不会影响本地环境。


    我们将使用 `docker exec` 命令连接到容器。`docker exec` 中的 `exec` 代表执行，其基本语法是：


    ```

    docker exec

    ```


    容器名称是目标容器，命令是容器中存在的任何可执行脚本或命令。为了在容器中启动一个交互式会话，我们将执行一个 shell——在本例中是 `bash`：


    ```

    > docker exec -it ORCL bash

    [oracle@8facfd649aa4 ~]$

    ```


    让我们分解一下这个命令：


    *   `-it` 标志是向 Docker 传递多个标志的简写方式。它们代表 `--interactive` (`-i`) 和 `--tty` (`-t`)，组合使用以保持
    `STDIN` 打开，同时为容器分配一个 `pseudo-TTY` 或类似终端的会话。简单来说，这意味着你获得了一个交互式会话。（标志的顺序无关紧要。它们可以单独出现或组合出现，并且你可以混合使用长短标志。）


    *   `ORCL` 是容器的名称。


    *   `bash` 是 Docker 在容器中运行的命令。`bash`，即 `Bourne Again SHell`，是许多 Linux 操作系统（包括
    Oracle Enterprise Linux）的默认 shell。


    Docker 的响应提示符是 `[oracle@8facfd649aa4 ~]$`。默认提示符显示了用户（`oracle`）、主机名（`8facfd649aa4`）和当前工作目录（`~`，一个代表用户主目录的特殊简写字符）。


    容器名称是 `ORCL`，那么主机名不也应该是 `ORCL` 吗？`8facfd649aa4` 是从哪里来的？


    如果你在主机上打开一个新会话，并使用 `docker ps` 命令查看正在运行的容器，你会看到主机名 `8facfd649aa4` 同时也是容器 ID：


    ```

    > docker ps

    CONTAINER ID   IMAGE                       NAMES

    8facfd649aa4   oracle/database:19.3.0-ee   ORCL

    ```


    Docker 仍然能识别我们分配的“友好”容器名称，并且在调用命令时，我们可以同时使用容器 ID 和容器名称来引用容器。Docker 为容器创建唯一标识符并用作主机名，以避免用户分配的名称可能违反主机命名约定而引发的问题。


    你可以使用不同的 shell 登录容器，只要它们是镜像的一部分，例如，用 `sh` 代替 `bash`：


    ```

    > docker exec -it ORCL sh

    sh-4.2$

    ```


    `docker exec` 是本书中我们将用于连接到容器并在容器中运行命令的主要方法。


    ## 探索 Oracle 数据库容器


    现在你已经连接到数据库容器，让我们看看环境。乍一看，它似乎与在 Linux 中原生运行的典型数据库主机没有什么不同。代码清单 5-3 展示了一些用于查询环境的基本命令的结果。它们似乎表明这是一台运行
    RHEL 7.8 的 Linux 机器。`oracle` 用户存在，Oracle 的 `PMON` 进程也在运行。数据库条目在 `/etc/oratab`
    文件中。一切看起来都很正常！


    ```

    [oracle@8facfd649aa4 ~]$ id

    uid=54321(oracle) gid=54321(oinstall) groups=54321(oinstall),54322(dba),54323(oper),54324(backupdba),54325(dgdba),54326(kmdba),54330(racdba)

    [oracle@8facfd649aa4 ~]$ cat /etc/redhat-release

    Red Hat Enterprise Linux Server release 7.8 (Maipo)

    [oracle@8facfd649aa4 ~]$ ps -ef | grep pmon | grep -v grep

    oracle      2464       1  0 22:42 ?        00:00:00 ora_pmon_ORCLCDB

    [oracle@8facfd649aa4 ~]$ egrep -v "^$|^#" /etc/oratab

    ORCLCDB:/opt/oracle/product/19c/dbhome_1:N

    Listing 5-3

    查看有关容器用户、操作系统和数据库的基本信息

    ```


    确实，大多数事情看起来都很普通。这正是容器的魔力所在——对于所有（或大多数）目的而言，它们与成熟的原生主机难以区分。如果不是这样，我们就必须绕过这些差异才能让应用程序（如
    Oracle 数据库）按预期工作！


    ## 容器差异


    我们已经看到了一个差异的暗示——主机名。让我们更深入地看看这个以及其他差异。


    ### 主机名


    代码清单 5-4 深入探讨了我们之前看到的主机命名。在显示容器内 `/etc/hosts` 文件的内容后，我尝试（但失败了）将主机名更改为更用户友好的名称。


    ```

    [oracle@8facfd649aa4 ~]$ hostname

    8facfd649aa4

    [oracle@8facfd649aa4 ~]$ cat /etc/hosts

    127.0.0.1     localhost

    ::1     localhost ip6-localhost ip6-loopback

    fe00::0    ip6-localnet

    ff00::0     ip6-mcastprefix

    ff02::1     ip6-allnodes

    ff02::2     ip6-allrouters

    172.17.0.7     8facfd649aa4

    [oracle@8facfd649aa4 ~]$ hostname ORCL

    hostname: you must be root to change the host name

    Listing 5-4

    Oracle 用户无法更改主机名

    ```


    当然，`oracle` 用户无法更改主机名！但事实证明，`root` 用户也无法在容器中更改主机名，如代码清单 5-5 所示。我使用 `docker exec`
    登录容器，并添加了 `-u`（或 `--user`）标志将用户定义为 `root`。在确认以 `root` 身份登录后，我仍然无法更改主机名。（稍后我会展示一个解决方法。现在，请将此视为在容器中工作时需要牢记的几个差异中的第一个！）


    ```

    > docker exec -it -u root ORCL bash

    bash-4.2# whoami

    root

    bash-4.2# hostname ORCL

    hostname: you must be root to change the hostname

    Listing 5-5

    root 用户也无法更改主机名！

    ```

    '
- fmt: '### cron


    Containers don’t typically include `cron`, the Linux scheduling system, either.
    While containers have an operating system,^([^(31)](#fn31)) they aren’t full-fledged
    systems. Containers call binaries and reference libraries in that directory structure
    but rely on the host to perform system-level actions. The host kernel handles
    CPU, storage, and networking interactions like any process. It doesn’t make sense
    that application processes would duplicate these tasks!


    Containers are no different, and `cron` is one such system-managed process. Look
    at Listing [5-6](#514143_1_En_5_Chapter.xhtml#PC12) to see the processes containing
    the text “system” in my container. Compare that with the output in Listing [5-7](#514143_1_En_5_Chapter.xhtml#PC13),
    showing the system processes on my host running a complete Ubuntu Linux operating
    system.


    ```

    > ps -ef | grep system

    root         486       1  0 Feb14 ?        00:00:10 /lib/systemd/systemd-journald

    root         520       1  0 Feb14 ?        00:00:14 /lib/systemd/systemd-udevd

    systemd+     741       1  0 Feb14 ?        00:00:05 /lib/systemd/systemd-timesyncd

    systemd+     750       1  0 Feb14 ?        00:00:10 /lib/systemd/systemd-networkd

    systemd+     753       1  0 Feb14 ?        00:00:11 /lib/systemd/systemd-resolved

    message+     792       1  0 Feb14 ?        00:00:32 /usr/bin/dbus-daemon--system
    --address=systemd: --nofork --nopidfile --systemd-activation --syslog-only

    root         809       1  0 Feb14 ?        00:00:14 /lib/systemd/systemd-logind

    root         812       1  0 Feb14 ?        00:04:09 /usr/sbin/thermald--systemd
    --dbus-enable--adaptive

    lab       744954       1  0 Feb26 ?        00:01:05 /lib/systemd/systemd --user

    lab      2348206 2334483  0 23:56 pts/6    00:00:00 grep --color=auto system

    Listing 5-7

    Processes containing “system” on the host

    ```


    ```

    [oracle@8facfd649aa4 ~]$ ps -ef | grep system

    oracle     6486    4347  0 23:56 pts/0   00:00:00 grep --color=auto system

    Listing 5-6

    Processes containing “system” in the container

    ```


    There are no system processes in the container. This includes any needed to schedule
    and run `cron`. Yet the `crontab` command, used to manage `cron` jobs, is present,
    and the `oracle` user can run it:


    ```

    [oracle@8facfd649aa4 ~]$ ls -l /bin/crontab

    -rwsr-xr-x 1 root root 57656 Jun  9  2019 /bin/crontab

    [oracle@8facfd649aa4 ~]$ crontab -l

    no crontab for oracle

    ```


    Let’s try editing the `crontab` by adding an entry:


    ```

    [oracle@8facfd649aa4 ~]$ crontab -e

    no crontab for oracle - using an empty one

    /bin/sh: /usr/bin/vi: No such file or directory

    crontab: "/usr/bin/vi" exited with status 127

    [oracle@8facfd649aa4 ~]$

    ```


    It fails—but not for the reason you might expect! `crontab -e` (for edit) calls
    the `vi` (*visual)* editor, but *vi isn’t there*! To solve that, I logged in to
    a new session using the `-u root` option and installed `vi` using `yum`:


    ```

    > docker exec -it -u root ORCL bash

    bash-4.2# yum install -y vi

    Loaded plugins: ovl

    ol7_latest                            | 3.6 kB  00:00:00

    (1/3): ol7_latest/x86_64/group_gz     | 136 kB  00:00:00

    (2/3): ol7_latest/x86_64/updateinfo   | 3.4 MB  00:00:03

    (3/3): ol7_latest/x86_64/primary_db   |  39 MB  00:00:08

    Resolving Dependencies

    --> Running transaction check

    ---> Package vim-minimal.x86_64 2:7.4.629-8.0.1.el7_9 will be installed

    --> Finished Dependency Resolution

    ...

    Install  1 Package

    Total download size: 443 k

    ...

    Installed:

    vim-minimal.x86_64 2:7.4.629-8.0.1.el7_9

    Complete!

    ```


    Now that `vi` is present, I should be able to return to my original session and
    add an entry to the `oracle` user’s crontab. I added this line:


    ```

    * * * * * touch /home/oracle/added_by_cron

    ```


    For those unfamiliar with `cron` syntax, the job will run every minute of every
    hour of every day and “`touch`,” or create, an empty file called `/home/oracle/added_by_cron`.
    If the file isn’t present, `cron` will create it. When I check the `oracle` user’s
    `crontab`, the line is present:


    ```

    [oracle@8facfd649aa4 ~]$ crontab -l

    * * * * * touch /home/oracle/added_by_cron

    ```


    Or rather, `cron` should create it, but it doesn’t. Listing [5-8](#514143_1_En_5_Chapter.xhtml#PC19)
    shows that, even after 30 minutes, the file still isn’t there!


    ```

    [oracle@8facfd649aa4 ~]$ date

    Mon Jan  7 00:10:01 UTC 2022

    [oracle@8facfd649aa4 ~]$ ls -l /home/oracle

    total 0

    lrwxrwxrwx 1 root root 26 Apr 10  2021 setPassword.sh -> /opt/oracle/setPassword.sh

    [oracle@8facfd649aa4 ~]$ date

    Mon Jan  7 00:44:26 UTC 2022

    [oracle@8facfd649aa4 ~]$ ls -l /home/oracle

    total 0

    lrwxrwxrwx 1 root root 26 Apr 10  2021 setPassword.sh -> /opt/oracle/setPassword.sh

    Listing 5-8

    cron inside the container doesn’t behave as expected!

    ```


    Interesting! Perhaps the `cron` service isn’t running. In Listing [5-9](#514143_1_En_5_Chapter.xhtml#PC20),
    I returned to the `root` session I started earlier, checked the status, and tried
    starting the service.


    ```

    bash-4.2# service crond status

    Redirecting to /bin/systemctl status crond.service

    Failed to get D-Bus connection: Operation not permitted

    bash-4.2# service crond start

    Redirecting to /bin/systemctl start crond.service

    Failed to get D-Bus connection: Operation not permitted

    Listing 5-9

    The root user can’t start cron inside the container

    ```


    This is intentional. `cron` is a system process, and containers expect the host
    OS to handle them. While the binaries are present in the container filesystem—even
    executable—there is no system process running in the container to identify and
    run jobs.


    The absence of running `init.d` or `system.d` processes in containers raises legitimate
    concerns, particularly for Oracle databases. How do we schedule backups in containers?
    Better yet, how do products like *Oracle Grid Infrastructure*, *Oracle Real Application
    Clusters*, and *Oracle Restart*—which depend extensively on `init.d` or `system.d`—work
    in containers? Fortunately, there are ways to add this functionality to containers.


    Let’s now revisit the `vi` editor issue we encountered earlier and see why it
    was missing!'
