  trans: '

    ### cron


    容器通常也不包含 `cron`，即 Linux 的任务调度系统。虽然容器拥有操作系统，^(³¹) 但它们并非完整的系统。容器会调用二进制文件并引用该目录结构中的库，但依赖宿主机来执行系统级操作。宿主内核像处理任何进程一样处理
    CPU、存储和网络交互。让应用进程去重复这些任务是没有意义的！


    容器也不例外，`cron` 就是这样一个系统管理的进程。查看清单 5-6 看看我的容器中包含“system”文本的进程。与之对比的是清单 5-7 的输出，它显示了在我的运行完整
    Ubuntu Linux 操作系统的宿主机上的系统进程。


    ```

    > ps -ef | grep system

    root         486       1  0 Feb14 ?        00:00:10 /lib/systemd/systemd-journald

    root         520       1  0 Feb14 ?        00:00:14 /lib/systemd/systemd-udevd

    systemd+     741       1  0 Feb14 ?        00:00:05 /lib/systemd/systemd-timesyncd

    systemd+     750       1  0 Feb14 ?        00:00:10 /lib/systemd/systemd-networkd

    systemd+     753       1  0 Feb14 ?        00:00:11 /lib/systemd/systemd-resolved

    message+     792       1  0 Feb14 ?        00:00:32 /usr/bin/dbus-daemon--system
    --address=systemd: --nofork --nopidfile --systemd-activation --syslog-only

    root         809       1  0 Feb14 ?        00:00:14 /lib/systemd/systemd-logind

    root         812       1  0 Feb14 ?        00:04:09 /usr/sbin/thermald--systemd
    --dbus-enable--adaptive

    lab       744954       1  0 Feb26 ?        00:01:05 /lib/systemd/systemd --user

    lab      2348206 2334483  0 23:56 pts/6    00:00:00 grep --color=auto system

    清单 5-7

    宿主机上包含“system”的进程

    ```


    ```

    [oracle@8facfd649aa4 ~]$ ps -ef | grep system

    oracle     6486    4347  0 23:56 pts/0   00:00:00 grep --color=auto system

    清单 5-6

    容器中包含“system”的进程

    ```


    容器中没有系统进程。这包括调度和运行 `cron` 所需的任何进程。然而，用于管理 `cron` 作业的 `crontab` 命令是存在的，`oracle`
    用户可以运行它：


    ```

    [oracle@8facfd649aa4 ~]$ ls -l /bin/crontab

    -rwsr-xr-x 1 root root 57656 Jun  9  2019 /bin/crontab

    [oracle@8facfd649aa4 ~]$ crontab -l

    no crontab for oracle

    ```


    让我们尝试通过添加一个条目来编辑 `crontab`：


    ```

    [oracle@8facfd649aa4 ~]$ crontab -e

    no crontab for oracle - using an empty one

    /bin/sh: /usr/bin/vi: No such file or directory

    crontab: "/usr/bin/vi" exited with status 127

    [oracle@8facfd649aa4 ~]$

    ```


    它失败了——但原因可能出乎你的意料！`crontab -e`（用于编辑）会调用 `vi`（*visual*）编辑器，但 *vi 不存在*！为了解决这个问题，我使用
    `-u root` 选项登录到一个新会话，并用 `yum` 安装了 `vi`：


    ```

    > docker exec -it -u root ORCL bash

    bash-4.2# yum install -y vi

    Loaded plugins: ovl

    ol7_latest                            | 3.6 kB  00:00:00

    (1/3): ol7_latest/x86_64/group_gz     | 136 kB  00:00:00

    (2/3): ol7_latest/x86_64/updateinfo   | 3.4 MB  00:00:03

    (3/3): ol7_latest/x86_64/primary_db   |  39 MB  00:00:08

    Resolving Dependencies

    --> Running transaction check

    ---> Package vim-minimal.x86_64 2:7.4.629-8.0.1.el7_9 will be installed

    --> Finished Dependency Resolution

    ...

    Install  1 Package

    Total download size: 443 k

    ...

    Installed:

    vim-minimal.x86_64 2:7.4.629-8.0.1.el7_9

    Complete!

    ```


    既然 `vi` 已经存在，我应该可以返回到我原来的会话，并为 `oracle` 用户的 crontab 添加一个条目。我添加了这一行：


    ```

    * * * * * touch /home/oracle/added_by_cron

    ```


    对于那些不熟悉 `cron` 语法的人，这个作业将在每天的每小时每分钟运行，并“`touch`”（或创建）一个名为 `/home/oracle/added_by_cron`
    的空文件。如果文件不存在，`cron` 将创建它。当我检查 `oracle` 用户的 `crontab` 时，这一行是存在的：


    ```

    [oracle@8facfd649aa4 ~]$ crontab -l

    * * * * * touch /home/oracle/added_by_cron

    ```


    或者说，`cron` 应该创建它，但它没有。清单 5-8 显示，即使过了 30 分钟，文件仍然不在那里！


    ```

    [oracle@8facfd649aa4 ~]$ date

    Mon Jan  7 00:10:01 UTC 2022

    [oracle@8facfd649aa4 ~]$ ls -l /home/oracle

    total 0

    lrwxrwxrwx 1 root root 26 Apr 10  2021 setPassword.sh -> /opt/oracle/setPassword.sh

    [oracle@8facfd649aa4 ~]$ date

    Mon Jan  7 00:44:26 UTC 2022

    [oracle@8facfd649aa4 ~]$ ls -l /home/oracle

    total 0

    lrwxrwxrwx 1 root root 26 Apr 10  2021 setPassword.sh -> /opt/oracle/setPassword.sh

    清单 5-8

    容器内的 cron 行为不符合预期！

    ```


    有趣！也许 `cron` 服务没有运行。在清单 5-9 中，我回到了之前启动的 `root` 会话，检查了状态，并尝试启动该服务。


    ```

    bash-4.2# service crond status

    Redirecting to /bin/systemctl status crond.service

    Failed to get D-Bus connection: Operation not permitted

    bash-4.2# service crond start

    Redirecting to /bin/systemctl start crond.service

    Failed to get D-Bus connection: Operation not permitted

    清单 5-9

    root 用户无法在容器内启动 cron

    ```


    这是有意为之的。`cron` 是一个系统进程，而容器期望宿主机操作系统来处理它们。虽然二进制文件存在于容器文件系统中——甚至是可执行的——但容器内没有运行的系统进程来识别和执行作业。


    容器中缺乏运行的 `init.d` 或 `system.d` 进程引发了合理的担忧，特别是对于 Oracle 数据库。我们如何在容器中安排备份？更进一步，像
    *Oracle Grid Infrastructure*、*Oracle Real Application Clusters* 和 *Oracle Restart*
    这些严重依赖 `init.d` 或 `system.d` 的产品，在容器中如何工作？幸运的是，有办法为容器添加此功能。


    现在让我们重新审视之前遇到的 `vi` 编辑器问题，看看它为什么缺失！

    '
- fmt: '## 二进制文件


    容器经常被大规模部署。较小的容器能最大化基础设施容量，并减少跨网络复制的时间。构建容器镜像的目标是剔除任何不必要的组件。像`vi`这样的编辑器并不是必需的。


    没有编辑器，如何在容器中更改文件？简单的答案是，在*大多数*容器中并不这样做。与虚拟和物理主机不同，镜像提供了即用型文件系统，用于执行特定的服务或功能。它们并非多用途的交互式系统。如果需要编辑某些内容，这会在构建过程中完成并固化到镜像中，而不是在容器运行之后。如果需要修改容器中的文件，像`sed`这样对自动化友好的编辑器是更合适的选择。


    你在第[3]章中了解到，在容器中所做的更改会写入联合文件系统的一个层中。联合文件系统评估上下层之间的差异，并将结果投射到容器中。除了在容器层中增加空间外，计算这些差异还需要CPU，而在容器中限制更改会影响性能。


    这不仅仅关乎空间和性能。你会发现，容器镜像中缺少的二进制文件和工具远不止编辑器。任何不必要的东西都会增加一个*攻击面*，恶意行为者可能加以利用。攻击者无法利用不存在的东西。


    系统的攻击面是未经授权的用户可能用来获取系统访问权限的潜在向量或点的集合。限制安装在容器上的软件可以减少攻击者可用的资源，并凸显了容器与物理或虚拟主机之间的另一个区别。完整的操作系统往往包含用户*可能*需要的工具和实用程序。容器镜像的范围更有限，只包含必需的内容。


    用于Docker的Linux发行版通常提供“*-slim*”选项，表示精简版发行版。没有约定明确界定精简版包含或不包含（或更准确地说，排除）什么，这在供应商和版本之间各不相同。面向生产的镜像通常从一个精简版开始，然后添加必要的内容。正如我们将在第[12]章中看到的，Oracle的数据库镜像也遵循这一做法，使用Oracle
    Enterprise Linux 7的“slim”发行版作为基础。


    对我们大多数人来说，将数据库放入容器的第一个用例涉及一些交互，这意味着需要编辑器和诊断工具。幸运的是，修改构建脚本以包含二进制文件很容易，这将在下一章中讨论。


