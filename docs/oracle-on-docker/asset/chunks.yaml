  trans: '

    # docker run


    到目前为止，示例中用于创建 ORCL 数据库容器的命令是：


    ```bash

    docker run -d --name ORCL oracle/database:19.3.0-ee

    ```


    一旦创建，它的环境就是静态的，至少从自动化的角度来看是这样。我可以在容器中打开一个会话并设置环境变量，但这些变量不会改变元数据中的环境值。正是这个元数据，是启动脚本每次容器启动时都会看到和读取的。改变元数据的唯一机会（可能覆盖镜像中存在的默认值）是在容器创建期间。（这对于卷和网络等其他容器属性也是如此，我们将在后面的章节中看到。）


    有几种方法可以将环境变量^(⁴⁰)传递给 `docker run` 命令：通过命令行、宿主环境或文件。每种方法都将一个值传递给容器的元数据，使其可供脚本（包括启动命令）和进程使用。


    ## 命令行选项


    使用 `-e` 标志或其长格式 `--env` 标志，后跟一个 `key=value` 对，例如：


    ```bash

    docker run ... -e ORACLE_SID=TEST ...

    docker run ... --env ORACLE_PDB=TESTPDB1 ...

    ```


    为每个值分别使用 `-e` 标志来传递多个值：


    ```bash

    docker run ... -e ORACLE_SID=TEST -e ORACLE_PDB=TESTPDB1 ...

    ```


    值（等号后的部分）也可以是来自本地环境的变量。这对于配置多个容器很有用。列表 6-5 展示了一个在 Linux 环境中使用 `for 循环` 从值列表（DEV、TEST
    和 STAGE）部署多个容器的示例——为每个容器从循环变量分配一个不同的数据库名称。


    ```bash

    for dbname in DEV TEST STAGE

    do docker run -d --name $dbname -e ORACLE_SID=$dbname oracle/database:19.3.0-ee

    done

    ```

    *列表 6-5. 自动部署三个 Oracle 19c 数据库容器，从环境为每个容器传递 ORACLE_SID。*


    ## 来自文件的值


    环境文件是文本文件，每个 `key=value` 对占一行，这样更容易与 `docker run` 共享多个值。Docker 将以井号 (`#`) 开头的行视为注释而忽略。调用
    `docker run` 时，使用 `--env-file` 选项和文件名。列表 6-6 展示了一个 Oracle 数据库的示例环境文件，名为 `db.env`，以及在
    `docker run` 命令中使用 `--env-file` 选项的示例。


    ```dockerfile

    ORACLE_SID=TEST

    ORACLE_PDB=TESTPDB1

    ORACLE_EDITION=EE

    ENABLE_ARCHIVELOG=true

    ```

    *列表 6-6. 用于向 docker run 传递多个键值对的环境文件示例。*


    将该文件传递给 `docker run` 的 `--env-file` 选项，会将文件中列出的变量填充到容器环境中：


    ```bash

    > docker run ... --env-file db.env ...

    ```


    ## 来自主机环境的值


    有一种特殊情况是共享来自主机的环境变量到容器。如果主机上存在一个变量，其名称与容器中的变量相同，则只需提供变量名（不带等号或值）。这对于命令行和环境文件选项都适用。


    在列表 6-7 中，我通过将循环变量从 `dbname` 更改为 `ORACLE_SID` 修改了之前的循环示例。因为容器有一个匹配的变量，所以我可以单独使用该变量名。Docker
    会为我解释该变量和值^(⁴¹)。


    ```bash

    for ORACLE_SID in DEV TEST STAGE

    do docker run -d --name $ORACLE_SID -e ORACLE_SID oracle/database:19.3.0-ee

    done

    ```

    *列表 6-7. 使用主机变量对容器进行隐式变量赋值。*


    在这种情况下，不需要写成 `ORACLE_SID=$ORACLE_SID`。要在环境文件中使用主机变量，请在单独一行中包含该变量，不带等号或值。Docker
    会从主机环境中读取该值。


    # 覆盖和创建变量


    使用 `docker run` 赋值变量会覆盖来自镜像的值。参考列表 6-3 和 6-4，其中列出了示例容器从其父容器继承的变量和值。如果我发出一个略有不同的命令并创建一个新容器，如列表
    6-8 所示，这次更改了 `ORACLE_HOME`，当启动脚本找不到必要的文件时，容器就会崩溃。


    ```bash

    > docker run -d -e ORACLE_HOME=/home/oracle --name OOPS oracle/database:19.3.0-ee

    1c32eb9d016e723256e47199e5801d3bcd4cc64c87099cc40057028cd0177eba

    > docker logs -f OOPS

    /opt/oracle/relinkOracleBinary.sh: line 13: /home/oracle/bin/oraversion: No such
    file or directory

    /usr/bin/ar: /home/oracle/lib/libedtn.a: No such file or directory

    ORACLE EDITION:

    touch: cannot touch ''/home/oracle/install/.docker_'': No such file or directory

    ORACLE PASSWORD FOR SYS, SYSTEM AND PDBADMIN: vXy8JX7aiE4=1

    LSNRCTL for Linux: Version 19.0.0.0.0 - Production on 11-JAN-2022 21:52:59

    Copyright (c) 1991, 2019, Oracle.  All rights reserved.

    Message 1070 not found; No message file for product=network, facility=TNS

    TNS-12545: Message 12545 not found; No message file for product=network, facility=TNS

    TNS-12560: Message 12560 not found; No message file for product=network, facility=TNS

    TNS-00515: Message 515 not found; No message file for product=network, facility=TNS

    Linux Error: 2: No such file or directory

    cat: /opt/oracle/cfgtoollogs/dbca/ORCLCDB/ORCLCDB.log: No such file or directory

    cat: /opt/oracle/cfgtoollogs/dbca/ORCLCDB.log: No such file or directory

    ```

    *列表 6-8. 在容器中覆盖 ORACLE_HOME 会导致问题！*


    如果 `docker run` 中给出的变量/值不是镜像的一部分，Docker 会将其添加到容器环境（及其元数据）中。列表 6-9 展示了不是在更改 `ORACLE_HOME`，而是在创建容器时为
    `ORACLE_SID` 和 `ORACLE_PDB` 分配非默认值时发生的情况。


    ```bash

    > docker run -d -e ORACLE_SID=ORA19C -e ORACLE_PDB=PDB1 --name ORA19C oracle/database:19.3.0-ee

    aba0514d7fb36e70777c69ca4a6b619e3fbdca1f8a13a95935fed8e48c7722c3

    > docker container inspect --format ''{{range .Config.Env}}{{printf "%s\n" .}}{{end}}''
    ORA19C | grep ORACLE

    ORACLE_BASE=/opt/oracle

    ORACLE_HOME=/opt/oracle/product/19c/dbhome_1

    ORACLE_PDB=PDB1

    ORACLE_SID=ORA19C

    > docker exec -it ORA19C bash

    [oracle@aba0514d7fb3 ~]$ env | grep ORACLE

    ORACLE_SID=ORA19C

    ORACLE_BASE=/opt/oracle

    ORACLE_PDB=PDB1

    ORACLE_HOME=/opt/oracle/product/19c/dbhome_1

    [oracle@aba0514d7fb3 ~]$ ps -ef | grep pmon

    oracle      5072       1  0 21:21 ?        00:00:00 ora_pmon_ORA19C

    ```

    *列表 6-9. 当使用 ORACLE_SID 和 ORACLE_PDB 的非默认值时的容器环境。*


    原始容器的环境中没有 `ORACLE_SID` 或 `ORACLE_PDB`，这些变量也没有在父镜像中包含或分配。当启动脚本 `runOracle.sh`
    运行时，它会检查环境，如果这些变量未设置，则分配一个默认值。`docker run` 将新的变量和值添加到了新创建的容器中。`docker inspect`
    在容器元数据中显示了它们，并且它们也存在于 `oracle` 用户环境中。而且——最后但同样重要的是——启动脚本创建了一个 `ORACLE_SID` 为 `ORA19C`
    的数据库。


    `ORACLE_SID` 在 Oracle 数据库设置中无处不在，`ORACLE_PDB` 是多租户安装的一部分。由于它们在传统的 Oracle 数据库环境中很常见，我们可以有根据地猜测它们对容器环境是有意义的，尽管它们在预定义的数据库镜像环境中不存在。但是，是否存在其他不那么明显或非传统的容器环境值呢？

    '
- fmt: '## Environment Options in Oracle Images


    Oracle’s container image repository has extensive documentation at [`https://github.com/oracle/docker-images/tree/main/OracleDatabase/SingleInstance`](https://github.com/oracle/docker-images/tree/main/OracleDatabase/SingleInstance),
    including environment options for customizing database startup and creation.


    Environment options for customizing Oracle database creation in containers (defaults
    shown in brackets []):


    *   `ORACLE_SID`: The Oracle Database SID [`ORCLCDB`]

    *   `ORACLE_PDB`: The Oracle Database PDB name [`ORCLPDB1`]

    *   `ORACLE_EDITION`: The Oracle Database Edition^([^(42)](#fn42),[^(43)](#fn43))

    *   `ORACLE_CHARACTERSET`: The database character set [`AL32UTF8`]

    *   `ORACLE_PWD`: The Oracle Database SYS, SYSTEM, and PDB_ADMIN password [randomly
    generated during database creation]

    *   `ENABLE_ARCHIVELOG`: Enable archive logging [False]⁷


    Optional environment options available for managing memory in Oracle database
    containers:


    *   `INIT_SGA_SIZE`: The total memory, in MB, for the SGA components.⁷

    *   `INIT_PGA_SIZE`: The target aggregate PGA size, in MB.⁷

    *   `AUTO_MEM_CALCULATION`: Calculates total memory allocation based on the container’s
    available memory during database creation. When set to false, the total memory
    allocation is 2GB. This option is ignored when either `INIT_SGA_SIZE` or `INIT_PGA_SIZE`
    are set. [True]⁷


    These options cover the most common modifications for creating databases. Chapter
    [13](#514143_1_En_13_Chapter.xhtml) offers examples and ideas for additional customizations,
    extending the possibilities further!


    ## Summary


    In this chapter, you learned that containers inherit environment settings from
    their parent images, storing them as metadata. Each time an Oracle database container
    starts, the `runOracle.sh` runs automatically, governing activity in the container
    and its database. The startup script evaluates environment variables to customize
    database creation and startup—much as a shell script accepts command-line parameters
    to alter its default behavior.


    You learned different methods for passing environment variables to containers
    and can now use `docker inspect` to report and format metadata from containers.
    Finally, you discovered how to create an Oracle database in a Docker container
    using custom CDB and PDB names and learned about additional options for adjusting
    the database memory allocation, database edition, and archive logging state.


    In the following two chapters, you’ll explore additional options of the `docker
    run` command that allow interaction between hosts and containers. Chapter [7](#514143_1_En_7_Chapter.xhtml)
    introduces techniques for sharing host storage with containers and its implications
    for performance, data persistence, and efficiency. Chapter [8](#514143_1_En_8_Chapter.xhtml)
    covers communication between hosts and containers and configuring containers to
    serve clients, whether on the host or in other containers.


