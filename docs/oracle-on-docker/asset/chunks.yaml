    A screenshot of docker hub sign-up page with explore tab highlighted and labeled
    as explore the registry.


    Figure 16-1


    Click the “Explore” link from the Docker Hub home page to browse repository images


    The registry explorer, shown in Figure [16-2](#514143_1_En_16_Chapter.xhtml#Fig2),
    lists all public images and includes filtering functions on the left-hand side
    for narrowing the scope of the content. Notice that the “Trusted Content” section
    has options for Docker Official Images, Verified Publishers, and Sponsored OSS.


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig2_HTML.jpg)


    A screenshot of the registry explorer lists all public images and includes filtering
    functions on the left-hand side for narrowing the scope of the content. The Trusted
    Content section has options for Docker Official Images, Verified Publishers, and
    Sponsored O S S.


    Figure 16-2


    The main screen from Docker Hub’s image repository search. Note the filter options
    at the left, particularly those for selecting only “Trusted Content”


    ### Trusted Content


    Docker Hub is a bit of a free for all! Registered users can upload and share most
    anything, including malicious content! Bad actors will take advantage of any opportunity
    to compromise unsuspecting users. Docker marks content as “Trusted” to assure
    those image authors are reputable and their images free of malware. There are
    levels of “trust”:


    *   **Docker Official Images** are standard solutions that make developing and
    deploying software easier. They’re typically the most popular images, scanned
    for vulnerabilities, maintained by trusted organizations actively engaged in open
    source software development, and vetted by the large community of users that consume
    the content.


    *   **Verified Publishers** are commercial partners in Docker’s ecosystem verified
    by Docker. Verified publishers are directly responsible for maintaining their
    content and often follow the same rigorous practices as official images.^([^(87)](#fn87))


    *   **Docker Sponsored Open Source Software** (OSS for short) are images published
    by open source projects sponsored by Docker. While these are not corporate projects,
    the content undergoes strict review for malware and vulnerabilities.


    And then, there’s everything else.'
  trans: '

    ## 总结


    在我年轻的时候，我发现了自己对数学和逻辑的热爱。我记得在图书馆偶然发现一本逻辑谜题书，`Aha! Insight`，作者是《`Scientific American`》的专栏作家马丁·加德纳。每个问题似乎都只差一块拼图就能获得足够的信息来解决悖论。然而，结果常常是他通过包含一个**干扰项**——某个“事实”或随机数字——给出了过多的数据，我会为之苦思冥想，直到意识到（有时只是在翻阅了书后的答案后）那是个干扰！大多数谜题都有着简单、优雅的解决方案，能带来“Aha!
    领悟时刻！”


    我在故障排查和调试代码时也看到了同样的模式。很多时候，一个简单的答案就隐藏在令人困惑、使场景变得杂乱的无意义信息之中。关键在于理解如何从系统中提取数据，以及应该将搜索解决方案的重点放在哪里。


    最显而易见的起点是日志。在镜像构建过程中，Docker 会将脚本输出和消息中继到控制台，在本章中，你学习了向现有输出中添加补充性调试信息的策略。也许我最喜欢的方法，即在脚本调用前添加
    `DEBUG` 参数，已经为我节省了数小时。只需记住，这是一个潜在的攻击向量，不应在生产代码中使用！


    你还发现了通过绕过初始化并在 shell 提示符下启动容器来规避容器启动失败的方法。然后，你可以逐步检查自动化代码，并（希望如此）找到并修复任何干扰容器运行的问题。同样的技术应用于中间镜像，对于识别构建过程中的小问题也很有价值。


    将这些方法加入你的工具箱后，你就已经做好了充分准备，能够自信地构建和排查容器镜像的问题，并尽可能快速、无痛地达到你的“Aha! 领悟时刻”！


    脚注 1


    # 16. Docker Hub 与镜像仓库


    Docker 是一种基础设施即代码工具，或称 IaC。`Dockerfile` 就是代码，是一组指导 Docker 完成创建（或重新创建）镜像步骤的指令。由于
    Docker 是平台无关的，同一个 `Dockerfile` 在 Windows、Mac 和 Linux 上，在私有机器或在云端都能生成完全相同的镜像！


    不过，有一个注意事项。你已经看到 `Dockerfile` 中的参数如何为构建增添了灵活性和多样性。我维护一个仓库，其中仅用一个 `Dockerfile`
    就能构建从 11g 到 21c 的 Oracle 版本，并对最终镜像应用一个或多个补丁。单独来看，`Dockerfile` 只是一个模板，就像 Word 模板为新文档提供了基础，但倾注到每个文件中的思考和内容使其独一无二。`Dockerfile`
    也是如此。配套的脚本和资源对结果有着重要影响。


    数据库镜像严重依赖第三方内容——数据库安装文件和补丁。让数据库管理员告诉开发者，“从 Oracle 下载文件，放到正确的目录里，然后按照某些说明用这个 `Dockerfile`
    构建你的镜像”是没有意义的。虽然这比单独处理数据库镜像请求要快，但无法保证每个人使用的都是同一个镜像。


    镜像仓库正是为了解决这一确切需求而生的。作者运行一个构建并产出一个资产——镜像——然后将其“推送”到一个中央镜像仓库。任何有仓库访问权限的人都可以“拉取”特定的镜像，根据需要随时使用。你在本书练习中调用
    `docker run ... alpine` 或编写并构建带有 `FROM` 子句（引用如 Oracle Linux 等现有镜像内容）的 `Dockerfile`
    时，不知不觉已经在使用一个名为 `Docker Hub` 的仓库了。


    本章的主要焦点是 `Docker Hub`，但其他供应商也提供了类似的容器注册中心，供个人和企业使用。个人和组织可以转向云供应商（如 `Oracle Cloud
    Infrastructure`，或 `OCI`）的容器注册中心服务来管理和托管他们的内容。


    ## Docker Hub


    我提到你一直以来都在使用 `Docker Hub`。即使没有登录或注册账户，存储在 `Docker Hub` 中的近一千万个镜像也对用户开放！导航到 [*https://hub.docker.com*](https://hub.docker.com)（如图
    16-1 所示），然后点击右上角的“Explore”链接。


    ![](img/514143_1_En_16_Fig1_HTML.jpg)


    Docker Hub 注册页面的截图，其中“Explore”标签页被突出显示并标注为“探索注册中心”。


    图 16-1


    从 Docker Hub 主页点击“Explore”链接以浏览仓库镜像


    如图 16-2 所示的注册中心浏览器，列出了所有公共镜像，并在左侧包含用于缩小内容范围的筛选功能。请注意，“可信内容”部分有 Docker 官方镜像、已验证发布者和赞助的
    OSS 选项。


    ![](img/514143_1_En_16_Fig2_HTML.jpg)


    注册中心浏览器的截图，列出了所有公共镜像，并在左侧包含用于缩小内容范围的筛选功能。“可信内容”部分包含 Docker 官方镜像、已验证发布者和赞助的 O S
    S 选项。


    图 16-2


    Docker Hub 镜像仓库搜索的主界面。请注意左侧的筛选选项，尤其是用于仅选择“可信内容”的选项


    ### 可信内容


    `Docker Hub` 有点像是一个自由市场！注册用户可以上传和分享几乎任何东西，包括恶意内容！恶意行为者会利用任何机会来危害毫无戒心的用户。Docker
    将内容标记为“可信”，以确保这些镜像作者是信誉良好的，他们的镜像不含恶意软件。“信任”分为几个等级：


    *   **Docker 官方镜像**是使软件开发和部署更容易的标准解决方案。它们通常是最受欢迎的镜像，经过漏洞扫描，由积极参与开源软件开发的可信赖组织维护，并经过大量使用该内容的用户社区的审查。

    *   **已验证发布者**是经过 Docker 验证的生态系统中的商业合作伙伴。已验证发布者直接负责维护其内容，并且通常遵循与官方镜像相同的严格实践^(⁸⁷)。

    *   **Docker 赞助的开源软件**（简称 `OSS`）是由 Docker 赞助的开源项目发布的镜像。虽然这些不是公司项目，但其内容会经过严格的恶意软件和漏洞审查。


    然后，就是其他所有内容。

    '
- fmt: '### Untrusted Images


    View untrusted public images with extreme caution. Containers run with elevated
    permissions in Docker. There is no shortage of ways to take advantage of that,
    from relaying sensitive information from your system to mining cryptocurrency
    in the background. Remember that images are like applications that perform a service.
    You wouldn’t download and run apps from unknown sources. Treat public images with
    the same skepticism!


    That’s not to say every image is intentionally malicious! Docker partners with
    several third parties, including Snyk ([www.snyk.io](http://www.snyk.io)), that
    offer scanning services (and even remediation). Scanned images display a summary
    of any identified vulnerabilities. Figure [16-3](#514143_1_En_16_Chapter.xhtml#Fig3)
    shows an example of vulnerabilities identified by scanning an Oracle 11.2.0.4
    database image. Figure [16-4](#514143_1_En_16_Chapter.xhtml#Fig4) displays a detailed
    list of each problem and its associated Common Vulnerability and Exposure, or
    CVE note.


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig4_HTML.jpg)


    A screenshot of oraclesean tag describes a detailed list of each problem and its
    associated Common Vulnerability and Exposure, or C V E note.


    **Figure 16-4**


    The Snyk scan result for an Oracle 11.2.0.4 Enterprise Edition image. It shows
    a detailed list of the vulnerability and severity score, the CVE note detailing
    the problem, the source package and version, and the package version that fixed
    the issue


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig3_HTML.jpg)


    A screenshot of tag tab has an example of vulnerabilities identified by scanning
    an Oracle 11.2.0.4 database image.


    **Figure 16-3**


    Image summary (from a private repository) for an Oracle 11.2.0.4 Enterprise Edition
    image. Scanning is an optional feature authors can request when uploading images
    to Docker Hub. Here, the image shows when it was last scanned and a summary of
    the high, medium, and low severity vulnerabilities present in the image


    ### Vulnerability Scanning


    You can scan images before pulling them from public repositories with the `docker
    scan` command. This invokes Snyk’s third-party scanning service and produces a
    list of issues it detects in the image. Listing [16-1](#514143_1_En_16_Chapter.xhtml#PC1)
    shows an example of running a scan on the `ubuntu` image.


    ```

    > docker scan ubuntu

    Docker Scan relies upon access to Snyk, a third party provider, do you consent
    to proceed using Snyk? (y/N)

    y

    Testing ubuntu...

    ✗ Low severity vulnerability found in shadow/passwd

    Description: Time-of-check Time-of-use (TOCTOU)

    Info: https://snyk.io/vuln/SNYK-UBUNTU2204-SHADOW-2801886

    Introduced through: shadow/passwd@1:4.8.1-2ubuntu2, adduser@3.118ubuntu5, shadow/login@1:4.8.1-2ubuntu2

    From: shadow/passwd@1:4.8.1-2ubuntu2

    From: adduser@3.118ubuntu5 > shadow/passwd@1:4.8.1-2ubuntu2

    From: shadow/login@1:4.8.1-2ubuntu2

    ✗ Low severity vulnerability found in gmp/libgmp10

    Description: Integer Overflow or Wraparound

    Info: https://snyk.io/vuln/SNYK-UBUNTU2204-GMP-2775169

    Introduced through: gmp/libgmp10@2:6.2.1+dfsg-3ubuntu1, coreutils@8.32-4.1ubuntu1,
    apt@2.4.7

    From: gmp/libgmp10@2:6.2.1+dfsg-3ubuntu1

    From: coreutils@8.32-4.1ubuntu1 > gmp/libgmp10@2:6.2.1+dfsg-3ubuntu1

    From: apt@2.4.7 > gnutls28/libgnutls30@3.7.3-4ubuntu1.1 > gmp/libgmp10@2:6.2.1+dfsg-3ubuntu1

    and 1 more...

    ✗ Medium severity vulnerability found in zlib/zlib1g

    Description: Out-of-bounds Write

    Info: https://snyk.io/vuln/SNYK-UBUNTU2204-ZLIB-2975633

    Introduced through: meta-common-packages@meta

    From: meta-common-packages@meta > zlib/zlib1g@1:1.2.11.dfsg-2ubuntu9

    ✗ Medium severity vulnerability found in perl/perl-base

    Description: Improper Verification of Cryptographic Signature

    Info: https://snyk.io/vuln/SNYK-UBUNTU2204-PERL-2789081

    Introduced through: meta-common-packages@meta

    From: meta-common-packages@meta > perl/perl-base@5.34.0-3ubuntu1

    Package manager:   deb

    Project name:      docker-image|ubuntu

    Docker image:      ubuntu

    Platform:          linux/amd64

    Base image:        ubuntu:22.04

    Tested 102 dependencies for known vulnerabilities, found 12 vulnerabilities.

    According to our scan, you are currently using the most secure version of the
    selected base image

    For more free scans that keep your images secure, sign up to Snyk at https://dockr.ly/3ePqVcp

    ```


    **Listing 16-1**

    Abbreviated output from a Snyk scan of an Ubuntu image, showing low and medium
    severity vulnerabilities


    For untrusted public images, avoid unknown or anonymous contributors, do your
    research, and take advantage of free scanning services!


    ### Licensing


    One more thing to consider before downloading public images from Docker Hub: licensing.
    Oracle prohibits users from distributing its database content, and anyone downloading
    Oracle software must agree to their licensing agreement. Anyone distributing images
    containing Oracle database software through a public repository is probably violating
    that license. Downloading such an image may place you at risk, too.'
