- fmt: '### Pulling Images


    Throughout this book, we’ve *pulled* images like `alpine`, `ubuntu`, and `oraclelinux`
    without using a namespace (the part before the `/` in the `docker push` command
    earlier). These were all Official images in Docker Hub and existed under the “root”
    of the registry. They’re not part of a namespace owned by an individual or organization.


    However, when I say we pulled these images, we didn’t do so explicitly. Issuing
    `docker run` for an image not already present on the system performs a `docker
    pull` in the background. Maybe you’ve noticed:


    ```

    > docker run alpine

    Unable to find image ''alpine:latest'' locally

    latest: Pulling from library/alpine

    213ec9aee27d: Pull complete

    Digest: sha256:bc41182d7ef5ffc53a40b044e725193bc10142a1243f395ee852a8d9730fc2ad

    Status: Downloaded newer image for alpine:latest

    ```


    Pulling or running images from public repositories requires the same fully qualified
    registry format as the `docker push` example earlier—a namespace, a registry or
    image name, and a tag (if present). In Figure 16-10, I browsed through the Docker
    Hub and located a Verified Publisher image for `bitnami/mariadb`.


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig10_HTML.jpg)


    Figure 16-10: The main repository page for Bitnami’s MariaDB distribution


    MariaDB is a popular MySQL fork, and it stands to reason there’s an official image
    available, too. If I `docker pull mariadb` without any namespace, I get something:


    ```

    > docker pull mariadb

    Using default tag: latest

    latest: Pulling from library/mariadb

    2b55860d4c66: Pull complete

    4bf944e49ffa: Pull complete

    020ff2b6bb0b: Pull complete

    977397ae9bc6: Pull complete

    b361cf449d40: Pull complete

    21d261950157: Pull complete

    296a47dd9435: Pull complete

    bbe841bf5cfe: Pull complete

    758db05dd921: Pull complete

    9c2c0a21c9e6: Pull complete

    4bc311b9359a: Pull complete

    Digest: sha256:05b53c3f7ebf1884f37fe9efd02da0b7faa0d03e86d724863f3591f963de632c

    Status: Downloaded newer image for mariadb:latest

    docker.io/library/mariadb:latest

    ```


    But is it the Bitnami version? No. For that, I need to add the Bitnami namespace:


    ```

    > docker pull bitnami/mariadb

    Using default tag: latest

    latest: Pulling from bitnami/mariadb

    1d8866550bdd: Pull complete

    cfd1823a275f: Pull complete

    Digest: sha256:320745f11755f950a6ffa80a7e16dca108b3fe6df76873e2ec22fa3900fecb20

    Status: Downloaded newer image for bitnami/mariadb:latest

    docker.io/bitnami/mariadb:latest

    ```


    Docker retrieved the “latest” version for me in each case because I didn''t specify
    a tag. If I go to the Tags section of the Bitnami image in Figure 16-11, I see
    a variety of tags. To get something other than “latest,” I have to use its tag,
    here `10.5.17`:


    ```

    > docker pull bitnami/mariadb:10.5.17

    10.5.17: Pulling from bitnami/mariadb

    1d8866550bdd: Already exists

    0f5b0c3c18cf: Pull complete

    Digest: sha256:ec6bb285c67d5b66a6ee1fca667e9d73906d767b02cc5dbb2bff1159d97e7fbe

    Status: Downloaded newer image for bitnami/mariadb:10.5.17

    docker.io/bitnami/mariadb:10.5.17

    ```


    Notice Docker didn’t download the first layer in the image, `1d8866550bdd`. It’s
    identical to the first layer of the “latest” image and indicates it’s most likely
    the underlying foundation of many of Bitnami’s MariaDB images. Version-specific
    content is confined to the second layer.


    There’s something else worth noticing in the two MariaDB images. The Bitnami image
    is just two layers, while the official image is eleven. This reflects differences
    in how they’re built. The Official, trusted MariaDB image exposes every step in
    the build process as layers. The Bitnami image reduces the layer content to improve
    security. Pull these images on your own and run the following `docker history`
    commands (the `--no-trunc` flag prevents Docker from truncating the output in
    the original Dockerfile):


    ```

    docker image history --no-trunc bitnami/mariadb

    docker image history --no-trunc mariadb

    ```


    Compare the output and look for information like default passwords and configurations
    an attacker might leverage against the system. The lesson? Just because images
    are Official or Trusted doesn’t necessarily mean they’re appropriate for production
    environments!


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig11_HTML.jpg)


    Figure 16-11: The Bitnami MariaDB repository includes multiple images for different
    versions, each identified by its tag


    If I run `docker images` on my system, I see the three images are all different:


    ```

    REPOSITORY       TAG           IMAGE ID       CREATED         SIZE

    bitnami/mariadb  10.5.17       0470be367c25   9 hours ago     341MB

    bitnami/mariadb  latest        ca73fbad9ff3   5 hours ago     344MB

    mariadb          latest        11aee66fdc31   6 days ago      384MB

    ```


    By referencing the MariaDB images in Bitnami’s namespace and using tags for discrete
    versions, I obtained slightly different versions of MariaDB.


    Pulling private images follows the same pattern, with the additional requirement
    that the user is logged in to the correct namespace (or has a security token granting
    access to the repository).'
  raw: '### Pulling Images


    Throughout this book, we’ve *pulled* images like `alpine`, `ubuntu`, and `oraclelinux`
    without using a namespace (the part before the `/` in the push command earlier).
    These were all Official images in Docker Hub and existed under the “root” of the
    registry. They’re not part of a namespace owned by an individual or organization.


    However, when I say we pulled these images, we didn’t do so explicitly. Issuing
    `docker run` for an image not already present on the system performs a `docker
    pull` in the background. Maybe you’ve noticed:


    ```

    > docker run alpine

    Unable to find image ''alpine:latest'' locally

    latest: Pulling from library/alpine

    213ec9aee27d: Pull complete

    Digest: sha256:bc41182d7ef5ffc53a40b044e725193bc10142a1243f395ee852a8d9730fc2ad

    Status: Downloaded newer image for alpine:latest

    ```


    Pulling or running images from public repositories requires the same fully qualified
    registry format as the `docker push` example earlier—a namespace, a registry or
    image name, and a tag (if present). In Figure [16-10](#514143_1_En_16_Chapter.xhtml#Fig10),
    I browsed through the Docker Hub and located a Verified Publisher image for `bitnami/mariadb`.


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig10_HTML.jpg)


    A screenshot of the main repository page for Bitnami&#x2019;s Maria D B.


    Figure 16-10


    The main repository page for Bitnami’s MariaDB distribution


    MariaDB is a popular MySQL fork, and it stands to reason there’s an official image
    available, too. If I `docker pull mariadb` without any namespace, I get something:


    ```

    > docker pull mariadb

    Using default tag: latest

    latest: Pulling from library/mariadb

    2b55860d4c66: Pull complete

    4bf944e49ffa: Pull complete

    020ff2b6bb0b: Pull complete

    977397ae9bc6: Pull complete

    b361cf449d40: Pull complete

    21d261950157: Pull complete

    296a47dd9435: Pull complete

    bbe841bf5cfe: Pull complete

    758db05dd921: Pull complete

    9c2c0a21c9e6: Pull complete

    4bc311b9359a: Pull complete

    Digest: sha256:05b53c3f7ebf1884f37fe9efd02da0b7faa0d03e86d724863f3591f963de632c

    Status: Downloaded newer image for mariadb:latest

    docker.io/library/mariadb:latest

    ```


    But is it the Bitnami version? No. For that, I need to add the Bitnami namespace:


    ```

    > docker pull bitnami/mariadb

    Using default tag: latest

    latest: Pulling from bitnami/mariadb

    1d8866550bdd: Pull complete

    cfd1823a275f: Pull complete

    Digest: sha256:320745f11755f950a6ffa80a7e16dca108b3fe6df76873e2ec22fa3900fecb20

    Status: Downloaded newer image for bitnami/mariadb:latest

    docker.io/bitnami/mariadb:latest

    ```


    Docker retrieved the “latest” version for me in each case because I didn''t specify
    a tag. If I go to the Tags section of the Bitnami image in Figure [16-11](#514143_1_En_16_Chapter.xhtml#Fig11),
    I see a variety of tags. To get something other than “latest,” I have to use its
    tag, here 10.5.17:


    ```

    > docker pull bitnami/mariadb:10.5.17

    10.5.17: Pulling from bitnami/mariadb

    1d8866550bdd: Already exists

    0f5b0c3c18cf: Pull complete

    Digest: sha256:ec6bb285c67d5b66a6ee1fca667e9d73906d767b02cc5dbb2bff1159d97e7fbe

    Status: Downloaded newer image for bitnami/mariadb:10.5.17

    docker.io/bitnami/mariadb:10.5.17

    ```


    Notice Docker didn’t download the first layer in the image, `1d8866550bdd`. It’s
    identical to the first layer of the “latest” image and indicates it’s most likely
    the underlying foundation of many of Bitnami’s MariaDB images. Version-specific
    content is confined to the second layer.


    There’s something else worth noticing in the two MariaDB images. The Bitnami image
    is just two layers, while the official image is eleven. This reflects differences
    in how they’re built. The Official, trusted MariaDB image exposes every step in
    the build process as layers. The Bitnami image reduces the layer content to improve
    security. Pull these images on your own and run the following `docker history`
    commands (the `--no-trunc` flag prevents Docker from truncating the output in
    the original Dockerfile):


    ```

    docker image history --no-trunc bitnami/mariadb

    docker image history --no-trunc mariadb

    ```


    Compare the output and look for information like default passwords and configurations
    an attacker might leverage against the system. The lesson? Just because images
    are Official or Trusted doesn’t necessarily mean they’re appropriate for production
    environments!


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig11_HTML.jpg)


    A screenshot of the Tags section of the Bitnami image, the user sees a variety
    of tags.


    Figure 16-11


    The Bitnami MariaDB repository includes multiple images for different versions,
    each identified by its tag


    If I run `docker images` on my system, I see the three images are all different:


    ```

    REPOSITORY       TAG           IMAGE ID       CREATED         SIZE

    bitnami/mariadb  10.5.17       0470be367c25   9 hours ago     341MB

    bitnami/mariadb  latest        ca73fbad9ff3   5 hours ago     344MB

    mariadb          latest        11aee66fdc31   6 days ago      384MB

    ```


    By referencing the MariaDB images in Bitnami’s namespace and using tags for discrete
    versions, I obtained slightly different versions of MariaDB.


    Pulling private images follows the same pattern, with the additional requirement
    that the user is logged in to the correct namespace (or has a security token granting
    access to the repository).'
  trans: '

    ### 拉取镜像


    在本书中，我们一直在*拉取*像 `alpine`、`ubuntu` 和 `oraclelinux` 这样的镜像，而没有使用命名空间（即之前 `docker
    push` 命令中 `/` 前面的部分）。这些都是 Docker Hub 中的**官方镜像**，存在于注册表的“根”目录下。它们不属于任何个人或组织拥有的命名空间。


    然而，当我们说“拉取”了这些镜像时，我们并非显式地执行了拉取操作。对系统上尚不存在的镜像执行 `docker run` 会在后台自动执行 `docker pull`。也许你已经注意到了：


    ```

    > docker run alpine

    Unable to find image ''alpine:latest'' locally

    latest: Pulling from library/alpine

    213ec9aee27d: Pull complete

    Digest: sha256:bc41182d7ef5ffc53a40b044e725193bc10142a1243f395ee852a8d9730fc2ad

    Status: Downloaded newer image for alpine:latest

    ```


    从公共仓库拉取或运行镜像，需要使用与之前 `docker push` 示例相同的完全限定的注册表格式——一个命名空间、一个注册表或镜像名称，以及一个标签（如果存在的话）。在图
    16-10 中，我浏览了 Docker Hub 并找到了一个 Bitnami 的已验证发布者镜像 `bitnami/mariadb`。


    ![](img/514143_1_En_16_Fig10_HTML.jpg)


    **图 16-10: Bitnami MariaDB 发行版的主仓库页面**


    MariaDB 是一个流行的 MySQL 分支，因此可以推断也应该有一个官方镜像。如果我没有任何命名空间地执行 `docker pull mariadb`，会得到这样一个结果：


    ```

    > docker pull mariadb

    Using default tag: latest

    latest: Pulling from library/mariadb

    2b55860d4c66: Pull complete

    4bf944e49ffa: Pull complete

    020ff2b6bb0b: Pull complete

    977397ae9bc6: Pull complete

    b361cf449d40: Pull complete

    21d261950157: Pull complete

    296a47dd9435: Pull complete

    bbe841bf5cfe: Pull complete

    758db05dd921: Pull complete

    9c2c0a21c9e6: Pull complete

    4bc311b9359a: Pull complete

    Digest: sha256:05b53c3f7ebf1884f37fe9efd02da0b7faa0d03e86d724863f3591f963de632c

    Status: Downloaded newer image for mariadb:latest

    docker.io/library/mariadb:latest

    ```


    但这是 Bitnami 的版本吗？不是。要获取 Bitnami 版本，我需要添加 Bitnami 命名空间：


    ```

    > docker pull bitnami/mariadb

    Using default tag: latest

    latest: Pulling from bitnami/mariadb

    1d8866550bdd: Pull complete

    cfd1823a275f: Pull complete

    Digest: sha256:320745f11755f950a6ffa80a7e16dca108b3fe6df76873e2ec22fa3900fecb20

    Status: Downloaded newer image for bitnami/mariadb:latest

    docker.io/bitnami/mariadb:latest

    ```


    在这两种情况下，Docker 都为我获取了“latest”版本，因为我没有指定标签。如果我查看图 16-11 中 Bitnami 镜像的“标签”部分，会看到各种各样的标签。要获取“latest”以外的版本，我必须使用其标签，这里是
    `10.5.17`：


    ```

    > docker pull bitnami/mariadb:10.5.17

    10.5.17: Pulling from bitnami/mariadb

    1d8866550bdd: Already exists

    0f5b0c3c18cf: Pull complete

    Digest: sha256:ec6bb285c67d5b66a6ee1fca667e9d73906d767b02cc5dbb2bff1159d97e7fbe

    Status: Downloaded newer image for bitnami/mariadb:10.5.17

    docker.io/bitnami/mariadb:10.5.17

    ```


    注意 Docker 没有下载镜像的第一层 `1d8866550bdd`。它与“latest”镜像的第一层完全相同，这表明它很可能是许多 Bitnami MariaDB
    镜像的基础底层。特定版本的内容仅限于第二层。


    在这两个 MariaDB 镜像中，还有一点值得注意。Bitnami 镜像只有两层，而官方镜像有十一层。这反映了它们构建方式的差异。官方的、受信任的 MariaDB
    镜像将构建过程中的每一步都暴露为层。Bitnami 镜像则减少了层内容以提高安全性。你可以自己拉取这些镜像并运行以下 `docker history` 命令（`--no-trunc`
    标志可防止 Docker 截断原始 Dockerfile 的输出）：


    ```

    docker image history --no-trunc bitnami/mariadb

    docker image history --no-trunc mariadb

    ```


    对比输出，查找诸如默认密码和配置等攻击者可能利用的信息。教训是什么？仅仅因为镜像是“官方”或“受信任”的，并不一定意味着它们适合生产环境！


    ![](img/514143_1_En_16_Fig11_HTML.jpg)


    **图 16-11: Bitnami MariaDB 仓库包含多个不同版本的镜像，每个版本通过其标签标识**


    如果我在我的系统上运行 `docker images`，会看到这三个镜像都不同：


    ```

    REPOSITORY       TAG           IMAGE ID       CREATED         SIZE

    bitnami/mariadb  10.5.17       0470be367c25   9 hours ago     341MB

    bitnami/mariadb  latest        ca73fbad9ff3   5 hours ago     344MB

    mariadb          latest        11aee66fdc31   6 days ago      384MB

    ```


    通过引用 Bitnami 命名空间下的 MariaDB 镜像并使用离散版本的标签，我获得了稍有不同的 MariaDB 版本。


    拉取私有镜像遵循相同的模式，但有一个额外要求：用户必须登录到正确的命名空间（或拥有授予对该仓库访问权限的安全令牌）。

    '
- fmt: '## Oracle Container Registry


    Oracle 曾将官方数据库镜像存放在 Docker Hub 上，但出于之前提到的许可问题而将其移除。任何人都可以在不接受 Oracle 许可协议的情况下下载其内容。


    然而，Oracle 数据库镜像仍然可在 *Oracle Container Registry* 中获取，地址为 [`https://container-registry.oracle.com`](https://container-registry.oracle.com)。在访问其镜像之前，您必须先使用
    My Oracle Support 凭据登录并接受标准条款与限制。好消息是，一旦您接受了条款，注册中心会识别该状态并允许您在未来无需“反复提醒”即可访问您的账户。


    从 Oracle 的注册中心拉取镜像前，请使用注册中心地址 `container-registry.oracle.com` 从终端会话登录：


    ```bash

    > docker login container-registry.oracle.com

    Authenticating with existing credentials...

    Login Succeeded

    ```


    登录后，您将可以访问注册中心，并能够像在 Docker Hub 上那样搜索和拉取镜像。不幸的是，命令行的搜索功能比较难用。登录容器注册中心后，如果我搜索匹配
    "oracle" 的官方镜像，结果看起来和之前没什么不同：


    ```bash

    > docker search -f is-official=true oracle

    INDEX               NAME                DESCRIPTION                       STARS               OFFICIAL            AUTOMATED

    docker.io           oraclelinux         Official Docker builds of Oracle Linux.   928                 [OK]

    ```


    然而，如果我将搜索字符串更改为容器注册中心的命名空间，我就能得到预期的结果。在此示例中，我将搜索范围缩小到命名空间内的数据库注册中心 `container-registry.oracle.com/database`：


    ```bash

    > docker search -f is-official=true container-registry.oracle.com/database

    INDEX   NAME   DESCRIPTION             STARS    OFFICIAL   AUTOMATED

    oracle.com   database/enterprise  Oracle Database Enterprise Edition  0 [OK]

    oracle.com   database/express     Oracle Database Express Edition     0 [OK]

    oracle.com   database/gsm         Oracle Global Service Manager       0 [OK]

    oracle.com   database/instantclient Oracle Instant Client             0 [OK]

    oracle.com   database/observability-exporter   Oracle Database Observability Exporter
    (Metr...                                        0 [OK]

    oracle.com   database/operator   This image is part of and for use with the O...                             0
    [OK]

    oracle.com   database/ords       Oracle REST Data Services (ORDS) with Applic...                            0
    [OK]

    oracle.com   database/otmm       Oracle Transaction Manager for Microservice                         0
    [OK]

    oracle.com   database/rac        Oracle Real Application Clusters     0 [OK]

    oracle.com   database/sqlcl      Oracle SQLDeveloper Command Line (SQLcl)                              0
    [OK]

    oracle.com   database/standard   Oracle Database Standard Edition  2  0 [OK]

    ```


    输出显示了标准版和企业版数据库镜像的选项，但未提供它们如何被标记的详细信息。为此，最好返回到图 [16-12](#514143_1_En_16_Chapter.xhtml#Fig12)
    中的容器注册中心页面。


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig12_HTML.jpg)


    Oracle Container Registry 页面的屏幕截图包含一个功能，即浏览容器，用户可以按产品类别（如数据库、Java、中间件等）浏览容器。


    **Figure 16-12**


    Oracle Container Registry 主页显示了可用的仓库。左上角的数据库仓库被高亮显示。


    点击数据库仓库后，您将看到图 [16-13](#514143_1_En_16_Chapter.xhtml#Fig13) 中其子仓库的列表，这与之前执行的 `docker
    search` 输出相匹配。


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig13_HTML.jpg)


    数据库仓库的屏幕截图包含仓库类型、描述以及 Oracle 标准条款和限制等数据。


    **Figure 16-13**


    Oracle Container Registry 中的前五个数据库仓库。请注意最右边的列，绿色的勾选标记表示用户是否接受了许可协议。


    选择 “enterprise” 仓库将带我进入图 [16-14](#514143_1_En_16_Chapter.xhtml#Fig14) 中的仓库页面。在这里，您会找到有关使用该镜像的信息，以及在最右侧的
    `docker pull` 命令。但是，这是用于 `latest` 镜像标签的命令。要查看所有可用的标签，请滚动到页面底部，如图 [16-15](#514143_1_En_16_Chapter.xhtml#Fig15)
    所示。


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig15_HTML.jpg)


    标签选项卡的屏幕截图列出了所有可用的标签。


    **Figure 16-15**


    每个仓库页面的底部是所有可用标签的摘要，每个标签都列出了镜像信息以及相应的 `docker pull` 命令。


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig14_HTML.jpg)


    Oracle Database Server Release 21c Docker 镜像文档的屏幕截图提供了关于如何使用该镜像以及一个 `docker pull`
    命令的信息。


    **Figure 16-14**


    企业版仓库页面包含使用镜像的说明，以及右侧高亮的用于下载最新版本镜像的 `docker pull` 命令。


    Oracle Container Registry 中的镜像是用于在 Docker 中运行 Oracle 数据库的现成解决方案。虽然方便，但它们缺乏通过构建自己的镜像所提供的定制化能力。


    ## Summary


    在投入了所有努力构建完美的数据库镜像之后，不分享它真是太可惜了！Docker Hub 是一个免费且流行的解决方案，可以做到这一点。但请记住，公开分享包含 Oracle
    数据库软件的镜像是违反许可协议的。Docker Hub 免费的个人层级允许您创建一个私有仓库用于此目的。


    请记住，Docker 以提升的权限集运行容器。请谨慎对待从公共仓库下载的内容，尽可能坚持使用可信内容。如果必须使用不受信任的镜像，请利用 Docker Hub
    的免费扫描服务。


    Docker Hub 并不是您唯一的仓库选择。包括 Oracle 在内的云供应商提供易于设置且通常免费的容器管理服务。组织可以部署与现有开发工作流集成的自有仓库。


    Footnotes [1](#514143_1_En_16_Chapter.xhtml#Fn1_source)   [2](#514143_1_En_16_Chapter.xhtml#Fn2_source)   [3](#514143_1_En_16_Chapter.xhtml#Fn3_source)   [4](#514143_1_En_16_Chapter.xhtml#Fn4_source)'
  raw: '## Oracle Container Registry


    Oracle once kept official database images on Docker Hub but removed them for the
    licensing concerns I noted before. Anybody could download the content without
    accepting Oracle’s licensing agreement.


    Oracle database images are still available, however, in the *Oracle Container
    Registry*, at [*https://container-registry.oracle.com*](https://container-registry.oracle.com).
    Before accessing its images, you must first log in using your My Oracle Support
    credentials and accept the Standard Terms and Restrictions. The good news is once
    you accept the terms, the registry recognizes the status and allows future access
    to your account without further “nagging!”


    Before pulling images from Oracle’s registry, log in from a terminal session,
    using the registry address, `container-registry.oracle.com`:


    ```

    > docker login container-registry.oracle.com

    Authenticating with existing credentials...

    Login Succeeded

    ```


    Once logged in, you’ll have access to the registry and can search and pull images,
    just as you saw with Docker Hub. Unfortunately, the CLI’s search capabilities
    are touchy. After logging in to the container registry, if I search for Official
    images matching “oracle,” the results don’t appear any different than before:


    ```

    > docker search -f is-official=true oracle

    INDEX               NAME                DESCRIPTION                       STARS               OFFICIAL            AUTOMATED

    docker.io           oraclelinux         Official Docker builds of Oracle Linux.   928                 [OK]

    ```


    However, if I change the search string to the container registry’s namespace,
    I get the results I expected. In this example, I narrowed the search to the database
    registry within the namespace, `container-registry.oracle.com/database`:


    ```

    > docker search -f is-official=true container-registry.oracle.com/database

    INDEX   NAME   DESCRIPTION             STARS    OFFICIAL   AUTOMATED

    oracle.com   database/enterprise  Oracle Database Enterprise Edition  0 [OK]

    oracle.com   database/express     Oracle Database Express Edition     0 [OK]

    oracle.com   database/gsm         Oracle Global Service Manager       0 [OK]

    oracle.com   database/instantclient Oracle Instant Client             0 [OK]

    oracle.com   database/observability-exporter   Oracle Database Observability Exporter
    (Metr...                                        0 [OK]

    oracle.com   database/operator   This image is part of and for use with the O...                             0
    [OK]

    oracle.com   database/ords       Oracle REST Data Services (ORDS) with Applic...                            0
    [OK]

    oracle.com   database/otmm       Oracle Transaction Manager for Microservice                         0
    [OK]

    oracle.com   database/rac        Oracle Real Application Clusters     0 [OK]

    oracle.com   database/sqlcl      Oracle SQLDeveloper Command Line (SQLcl)                              0
    [OK]

    oracle.com   database/standard   Oracle Database Standard Edition  2  0 [OK]

    ```


    The output reveals options for Standard and Enterprise Edition database images
    but offers no details of how they’re tagged. For that, it’s best to return to
    the Container Registry page in Figure [16-12](#514143_1_En_16_Chapter.xhtml#Fig12).


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig12_HTML.jpg)


    A screenshot of the oracle Container Registry page includes a feature, browse
    containers, where the user can browse containers by product category, database,
    java, middleware, and morel.


    Figure 16-12


    The Oracle Container Registry home page shows the available repositories. The
    Database repository at the top left is highlighted


    After clicking the Database repository, you’ll see the list of its subrepositories
    in Figure [16-13](#514143_1_En_16_Chapter.xhtml#Fig13), which matches the output
    of the docker search performed before.


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig13_HTML.jpg)


    A screenshot of database repositories includes the data for repository type, description,
    and oracle standard terms and restrictions.


    Figure 16-13


    The first five database repositories in the Oracle Container Registry. Note the
    far right-hand column, where the green check marks indicate whether the user accepted
    the licensing agreements


    Selecting the “enterprise” repository takes me to the repository page seen in
    Figure [16-14](#514143_1_En_16_Chapter.xhtml#Fig14). Here, you’ll find information
    on using the image and a docker pull command at the far right. However, this is
    the command for the *latest* image tag. To see all available tags, scroll to the
    bottom of the page, as in Figure [16-15](#514143_1_En_16_Chapter.xhtml#Fig15).


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig15_HTML.jpg)


    A screenshot of the tags tab lists all the available tags.


    Figure 16-15


    At the bottom of each repository page is a summary of all available tags, each
    listing image information, and the appropriate `docker pull` command


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig14_HTML.jpg)


    A screenshot of oracle database server release 21 c docker image documentation
    provides the information on using the image and a docker pull command.


    Figure 16-14


    The Enterprise Edition repository page includes instructions for using the image,
    plus a `docker pull` command, highlighted at the right, for downloading the latest
    version of the image


    The images in the Oracle Container Registry are ready-made solutions for running
    Oracle databases in Docker. While convenient, they lack the customizations afforded
    by building your own images.


    ## Summary


    After all the hard work poured into building the perfect database image, it’s
    a shame not to share it! Docker Hub is a free, popular solution for doing just
    that. Remember, though, publicly sharing images containing Oracle database software
    is a violation of the licensing agreement. The free, personal tier of Docker Hub
    allows you to create a single, private repository you can use for this purpose.


    Bear in mind that Docker runs containers with an elevated set of privileges. Be
    cautious of what you download from public repositories, sticking to Trusted content
    whenever possible. If you must use an untrusted image, take advantage of Docker
    Hub’s free scanning services.


    Docker Hub isn’t your sole repository option. Cloud vendors, including Oracle,
    offer container management services that are easily set up and often free. Organizations
    can deploy homegrown repositories that integrate with existing development workflows.


