    ### 连接容器


    目前没有任何接口，因为还没有任何东西连接到网络。让我们来解决这个问题！使用 `docker network connect <网络名> <容器名>` 连接容器，并如清单
    9-7 所示重新检查新的网络。


    ```bash

    > docker network connect database-bridge ORCL1

    > docker network connect database-bridge ORCL2

    > docker network inspect database-bridge

    [

    {

    "Name": "database-bridge",

    "Id": "9dfba096bf9a740e...",

    "Scope": "local",

    "Driver": "bridge",

    "IPAM": {

    "Driver": "default",

    "Options": {},

    "Config": [

    {

    "Subnet": "172.18.0.0/16",

    "Gateway": "172.18.0.1"

    }

    ]

    },

    "Internal": false,

    "Attachable": true,

    "Ingress": false,

    "ConfigFrom": {

    "Network": ""

    },

    "ConfigOnly": false,

    "Containers": {

    "3a15e84cd484b98f...": {

    "Name": "ORCL1",

    "EndpointID": "e4cb8fea4b119625...",

    "IPv4Address": "172.18.0.2/16"

    },

    "e050233167883499...": {

    "Name": "ORCL2",

    "EndpointID": "a6d9108c93c9b376...",

    "IPv4Address": "172.18.0.3/16"

    }

    },

    "Options": {},

    "Labels": {}

    }

    ]

    ```

    清单 9-7

    将容器 `ORCL1` 和 `ORCL2` 连接到新的 `database-bridge` 网络，并重新检查输出。容器已加入网络，并在 `172.18.0.0`
    子网内拥有唯一的 IP 地址。


    在清单 9-8 中，我们看到将容器连接到 `database-bridge` 网络更新了它们的网络配置。每个容器都在新网络上获得了一个新的 IP 地址、一个新的接口
    `eth1` 以及 `/etc/hosts` 文件中相应的条目。这些新 IP 地址是`额外于`默认桥接网络上的地址的，这从 `/etc/hosts` 中独立的主机条目（每个子网一个）可以得到证明。


    ```bash

    [oracle@dbhost1 ~]$ ifconfig

    eth0: flags=4163  mtu 1500

    inet 172.17.0.2  netmask 255.255.0.0  broadcast 172.17.255.255

    ether 02:42:ac:11:00:02  txqueuelen 0  (Ethernet)

    RX packets 135  bytes 15226 (14.8 KiB)

    RX errors 0  dropped 0  overruns 0  frame 0

    TX packets 104  bytes 6888 (6.7 KiB)

    TX errors 0  dropped 0 overruns 0  carrier 0  collisions 0

    eth1: flags=4163  mtu 1500

    inet 172.18.0.2  netmask 255.255.0.0  broadcast 172.18.255.255

    ether 02:42:ac:12:00:02  txqueuelen 0  (Ethernet)

    RX packets 17  bytes 1462 (1.4 KiB)

    RX errors 0  dropped 0  overruns 0  frame 0

    TX packets 0  bytes 0 (0.0 B)

    TX errors 0  dropped 0 overruns 0  carrier 0  collisions 0

    [oracle@dbhost1 ~]$ cat /etc/hosts

    127.0.0.1     localhost

    ::1     localhost ip6-localhost ip6-loopback

    fe00::0     ip6-localnet

    ff00::0     ip6-mcastprefix

    ff02::1     ip6-allnodes

    ff02::2     ip6-allrouters

    172.17.0.2     dbhost1

    172.18.0.2     dbhost1

    ```

    清单 9-8

    将 `ORCL1` 容器连接到网络后，在容器内部添加了一个新的网络接口，并使用新 IP 地址更新了其 `/etc/hosts` 文件。


    将容器连接到 `database-bridge` 网络会在主机上创建与容器内接口对应的虚拟接口，可以通过列出 `/sys/class/net/br-9dfba096bf9a/brif`
    的内容来查看：


    ```bash

    > ls /sys/class/net/br-9dfba096bf9a/brif

    veth9e1e709  vetheb94b3f

    ```


    对这些新创建的虚拟接口运行 `ifconfig` 会产生清单 9-9 中的输出。


    ```bash

    > ifconfig veth9e1e709

    veth9e1e709: flags=4163  mtu 1500

    inet6 fe80::f412:9dff:fed8:b8c2  prefixlen 64  scopeid 0x20

    ether f6:12:9d:d8:b8:c2  txqueuelen 0  (Ethernet)

    RX packets 0  bytes 0 (0.0 B)

    RX errors 0  dropped 0  overruns 0  frame 0

    TX packets 18  bytes 1532 (1.5 KB)

    TX errors 0  dropped 0 overruns 0  carrier 0  collisions 0

    > ifconfig vetheb94b3f

    vetheb94b3f: flags=4163  mtu 1500

    inet6 fe80::705e:8aff:fe63:8d14  prefixlen 64  scopeid 0x20

    ether 72:5e:8a:63:8d:14  txqueuelen 0  (Ethernet)

    RX packets 0  bytes 0 (0.0 B)

    RX errors 0  dropped 0  overruns 0  frame 0

    TX packets 13  bytes 1006 (1.0 KB)

    TX errors 0  dropped 0 overruns 0  carrier 0  collisions 0

    ```

    清单 9-9

    将容器连接到新的桥接网络后，Docker 在 Docker 主机上为每个容器添加了虚拟接口。


    ### DNS 情况如何？


    在默认的桥接网络下，没有 DNS 服务，容器无法解析其他容器的主机名。在用户定义的桥接网络下，Docker 提供了内部 DNS 服务，如下运行 `nslookup`
    所示。


    ```sql

    [oracle@dbhost1 ~]$ nslookup dbhost1

    Server:          127.0.0.11

    Address:     127.0.0.11#53

    Non-authoritative answer:

    Name:     dbhost1

    Address: 172.18.0.2

    [oracle@dbhost1 ~]$ nslookup dbhost2

    Server:          127.0.0.11

    Address:     127.0.0.11#53

    Non-authoritative answer:

    Name:     dbhost2

    Address:  172.18.0.3

    ```


    `/etc/resolv.conf` 文件揭示了 Docker 提供的 DNS 服务：


    ```bash

    [oracle@dbhost1 ~]$ cat /etc/resolv.conf

    search Home

    nameserver 127.0.0.11

    options ndots:0

    ```


    将此文件内容与容器仅连接到默认桥接网络时的内容进行比较。随着容器 DNS 的加入，本地和远程连接都按预期工作：


    ```sql

    SQL> conn system/oracle123@//dbhost1:1521/ORA1

    Connected.

    SQL> conn system/oracle123@//dbhost1/ORA1

    Connected.

    SQL> select host_name from v$instance;

    HOST_NAME

    --------------------------------------------------------------------------------

    dbhost1

    SQL> conn system/oracle123@//dbhost2:1521/ORA2

    Connected.

    SQL> conn system/oracle123@//dbhost2/ORA2

    Connected.

    SQL> select host_name from v$instance;

    HOST_NAME

    --------------------------------------------------------------------------------

    dbhost2

    ```


    请记住，默认的桥接网络只识别在容器创建时使用 `--hostname` 选项分配的主机名，而不识别容器名称。在用户定义的桥接网络下，DNS 也认可容器名称：


    ```sql

    SQL> conn system/oracle123@//ORCL1:1521/ORA1

    Connected.

    SQL> conn system/oracle123@//ORCL2:1521/ORA2

    Connected.

    ```


    最后，我可以在运行在不同容器上的数据库之间创建数据库链接：


    ```sql

    SQL> create database link DB2 connect to system identified by oracle123 using
    ''dbhost2:1521/ORA2'';

    Database link created.

    SQL> select host_name from v$instance;

    HOST_NAME

    --------------------------------------------------------------------------------

    dbhost1

    SQL> select host_name from v$instance@DB2;

    HOST_NAME

    --------------------------------------------------------------------------------

    dbhost2

    ```


    用户定义的桥接网络满足了本章开头设定的目标：


    *   **将客户端连接到本地数据库：** 来自本地客户端的连接按预期工作，并能识别所有类型的主机名：自定义主机名、容器名称和容器 ID。

    *   **将客户端连接到远程主机上的数据库：** 容器上的客户端可以通过传统的侦听器端口，按主机名访问远程数据库。

    *   **在两个数据库之间创建数据库链接：** 该网络支持在独立容器上的数据库之间创建数据库链接。

    *   **支持服务、复制和高可用性：** 桥接网络上的容器可以通过任何端口相互访问。


    ## 主机连接


    想象一下，如果我们必须记住并输入我们访问的每个网站的 IP 地址和端口号，浏览网页将会有多么不同！幸运的是，DNS 在后台将人类可读的域名解析为 IP 地址，而浏览器默认连接到端口
    80，除非另有指定。在本章开头，我们力求为数据库连接复制这种体验，无论是从容器到容器，还是从主机到容器。


    在用户定义的桥接网络下，容器之间的连接达到了这个目标，并按预期工作，使用默认端口和标准连接语法。遗憾的是，无论是默认还是用户定义的桥接网络，从主机到容器的连接都无法以这种方式工作。

    '
- fmt: '### Problems with Port Mapping


    图 9-4 展示了部分原因。默认的桥接网络是虚拟的，由 Docker 定义，并将容器环境与主机隔离。在容器启动时定义的端口映射会穿过主机与容器之间这道类似防火墙的屏障。然而，与常规防火墙不同，这里没有机会添加或更改端口映射。更重要的是，暴露映射端口的接口是
    Docker 主机——而不是容器或容器网络。


    ![Port Mapping in Default Bridge Network](images/514143_1_En_9_Chapter/514143_1_En_9_Fig4_HTML.png)


    *图 9-4：默认桥接网络中的端口映射示意图。主机容器通过一个桥接网络与网络通信，同时存在像屏障一样的端口映射。*


    Docker 的默认桥接网络管理来自容器的流量，将其映射到主机的端口。Docker 只允许使用容器创建时映射的端口来建立主机与容器之间的连接。


    从主机连接到容器 ORCL1 中的数据库的字符串更改为以下内容：


    ```

    system/oracle123@//lab1:51521/ORA1

    system/oracle123@//localhost:51521/ORA1

    system/oracle123@//lab1:51521/PDB1

    system/oracle123@//localhost:51521/PDB1

    ```


    我们还需要更新容器 ORCL2 中运行的数据库的连接字符串：


    ```

    system/oracle123@//lab1:61521/ORA2

    system/oracle123@//localhost:61521/ORA2

    system/oracle123@//lab1:61521/PDB2

    system/oracle123@//localhost:61521/PDB2

    ```


    端口映射是一个手动过程，扩展性差，且与自动化集成不佳。我必须查找和分配开放端口，即使让 Docker 为我做这件事，我也必须识别分配给每个容器的端口。在端口映射下构建网络配置也不直观。连接字符串使用
    `localhost` 或 Docker 主机的主机名以及一个非默认端口，而不是有意义的主机名。识别数据库连接不遵循标准模式。


    为了实现本章开头设定的从主机客户端连接到容器的目标，我们需要两个额外的能力：动态添加端口的灵活性，以及主机上将容器名称映射到 DNS 的组件。


    ### Container DNS Resolution on Hosts


    幸运的是，有多种方法可以将 Linux 容器名称映射到 DNS。我个人最喜欢的是一个简单的基于 Docker 的工具，名为 `docker-hoster`
    ([https://github.com/dvddarias/docker-hoster](https://github.com/dvddarias/docker-hoster))。它作为一个容器运行，并侦听
    Docker 守护进程上的事件。当容器被添加、移除、停止或启动时，它会捕获相关的网络信息并更新 Docker 主机上的 `/etc/hosts` 文件。我在我的实验室环境中使用默认推荐的设置来运行
    `docker-hoster`：


    ```

    docker run -d \

    -v /var/run/docker.sock:/tmp/docker.sock \

    -v /etc/hosts:/tmp/hosts \

    dvdarias/docker-hoster

    ```


    启动 `docker-hoster` 后，更新后的 hosts 文件包含了在我的系统上运行的容器的条目：


    ```

    > cat /etc/hosts

    127.0.0.1 localhost

    127.0.1.1 lab01

    #-----------Docker-Hoster-Domains----------

    172.18.0.3    dbhost2   ORCL2   e05023316788

    172.17.0.3    ORCL2   dbhost2

    172.18.0.2    3a15e84cd484   ORCL1   dbhost1

    172.17.0.2    ORCL1   dbhost1

    172.17.0.4    docker-hoster   0d6f558aa6c0

    #-----Do-not-add-hosts-after-this-line-----

    ```


    通过这些条目出现在我的 Docker 主机的 `/etc/hosts` 文件中，我可以使用像 SQLcl（可从 Oracle 免费获取，网址为 [www.oracle.com/database/sqldeveloper/technologies/sqlcl/download](https://www.oracle.com/database/sqldeveloper/technologies/sqlcl/download/)）这样的数据库客户端从主机访问容器数据库：


    ```

    > sql system/oracle123@ORCL1:1521/ORA1

    SQLcl: Release 22.2 Production on Mon Jul 18 14:32:40 2022

    Copyright (c) 1982, 2022, Oracle.  All rights reserved.

    Last Successful login time: Mon Jul 18 2022 14:32:41 +00:00

    Connected to:

    Oracle Database 19c Enterprise Edition Release 19.0.0.0.0 - Production

    Version 19.3.0.0.0

    SQL> select host_name from v$instance;

    HOST_NAME

    ____________

    dbhost1

    SQL> conn system/oracle123@//dbhost2:1521/ORA2

    Connected.

    SQL> select host_name from v$instance;

    HOST_NAME

    ____________

    dbhost2

    ```


    *容器现在看起来就像是网络上的“真实”数据库服务器！*


    ### You Don’t Need Port Mapping


    在前面的例子中可能没有立即显现出来的是，数据库是通过默认的监听端口 `1521` 访问的。这些端口没有被映射。主机将容器识别为分配给桥接网络的虚拟接口上的端点，并将其视为通过一系列端口进行通信的“普通”主机。同样的技术在默认桥接网络上也有效，这通过使用容器
    IP 地址（请记住，默认桥接网络使用 `172.17.0.0/16` 地址范围）得到证明：


    ```

    SQL> conn system/oracle123@//172.17.0.2:1521/ORA1

    Connected.

    SQL> conn system/oracle123@//172.17.0.3:1521/ORA2

    Connected.

    ```


    只要存在一个将容器名称解析到主机的机制，就*不需要*映射端口。容器仍然可以通过映射到 Docker 主机默认桥接网络上的端口来访问：


    ```

    SQL> conn system/oracle123@//lab1:51521/ORA1

    Connected.

    SQL> conn system/oracle123@//lab1:61521/ORA2

    Connected.

    ```


    然而，通过端口映射可见的*唯一*服务是容器创建时指定的那些。并且将端口映射到主机偏离了我们建立的标准——即在环境中任何地方都能使用一个适用于每个数据库的连接字符串。


    你已经了解了如何创建具有内置 DNS 服务的自定义桥接网络，以及如何添加在主机上工作的 DNS 注册。有了这些连接到用户定义桥接网络的容器，就没有理由让它们继续连接到默认桥接网络上了！'
  raw: '### Problems with Port Mapping


    Figure [9-4](#514143_1_En_9_Chapter.xhtml#Fig4) gives some idea why. The default
    bridge network is virtual, defined in Docker, and insulates the container environment
    from the host. Port mappings defined during container startup traverse this firewall-like
    barrier between the host and containers. Unlike a regular firewall, though, there’s
    no opportunity to add or change port mappings. More importantly, the interface
    exposing the mapped ports is the Docker host—not the containers or the container
    network.


    ![](images/514143_1_En_9_Chapter/514143_1_En_9_Fig4_HTML.png)


    An illustration of port mapping in the default bridge network. The host containers
    communicate with the network through a bridge network in the presence of port
    mappings that act like a barrier.


    Figure 9-4


    Docker’s default bridge network manages traffic from the containers, mapping them
    to ports on the host. Docker only allows connections between the host and containers
    using ports mapped during container creation


    The strings for connecting from the host to the database in container ORCL1 change
    to the following:


    ```

    system/oracle123@//lab1:51521/ORA1

    system/oracle123@//localhost:51521/ORA1

    system/oracle123@//lab1:51521/PDB1

    system/oracle123@//localhost:51521/PDB1

    ```


    We need to update the connection strings for the database running in container
    ORCL2, also:


    ```

    system/oracle123@//lab1:61521/ORA2

    system/oracle123@//localhost:61521/ORA2

    system/oracle123@//lab1:61521/PDB2

    system/oracle123@//localhost:61521/PDB2

    ```


    Port mapping is a manual process that scales poorly and doesn’t integrate well
    with automation. I have to find and assign open ports, and if I let Docker do
    that for me, I still have to identify the ports assigned to each container. Building
    network configurations isn’t intuitive under port mapping, either. Connection
    strings use `localhost` or the Docker host’s hostname and a nondefault port instead
    of meaningful hostnames. Recognizing database connections doesn’t follow standard
    patterns.


    To reach the goals set at the beginning of the chapter for connecting to containers
    from host clients, we need two additional capabilities: the flexibility to add
    ports on the fly and something on the container host that maps container names
    into DNS.


    ### Container DNS Resolution on Hosts


    Fortunately, there are multiple methods of mapping Linux container names into
    DNS. My personal favorite is a simple Docker-based tool called `docker-hoster`
    ([*https://github.com/dvddarias/docker-hoster*](https://github.com/dvddarias/docker-hoster)).
    It runs as a container and listens for events on the Docker daemon. As containers
    are added, removed, stopped, or stated, it captures the related network information
    and updates the `/etc/hosts` file on the Docker host. I use `docker-hoster` in
    my lab environments with the default, recommended setup:


    ```

    docker run -d \

    -v /var/run/docker.sock:/tmp/docker.sock \

    -v /etc/hosts:/tmp/hosts \

    dvdarias/docker-hoster

    ```


    After starting `docker-hoster`, the updated host file includes entries for the
    containers running on my system:


    ```

    > cat /etc/hosts

    127.0.0.1 localhost

    127.0.1.1 lab01

    #-----------Docker-Hoster-Domains----------

    172.18.0.3    dbhost2   ORCL2   e05023316788

    172.17.0.3    ORCL2   dbhost2

    172.18.0.2    3a15e84cd484   ORCL1   dbhost1

    172.17.0.2    ORCL1   dbhost1

    172.17.0.4    docker-hoster   0d6f558aa6c0

    #-----Do-not-add-hosts-after-this-line-----

    ```


    With these entries present in the `/etc/hosts` file on my Docker host, I can access
    the container databases from the host using a database client like SQLcl (available
    for free from Oracle at [*www.oracle.com/database/sqldeveloper/technologies/sqlcl/download*](https://www.oracle.com/database/sqldeveloper/technologies/sqlcl/download/)):


    ```

    > sql system/oracle123@ORCL1:1521/ORA1

    SQLcl: Release 22.2 Production on Mon Jul 18 14:32:40 2022

    Copyright (c) 1982, 2022, Oracle.  All rights reserved.

    Last Successful login time: Mon Jul 18 2022 14:32:41 +00:00

    Connected to:

    Oracle Database 19c Enterprise Edition Release 19.0.0.0.0 - Production

    Version 19.3.0.0.0

    SQL> select host_name from v$instance;

    HOST_NAME

    ____________

    dbhost1

    SQL> conn system/oracle123@//dbhost2:1521/ORA2

    Connected.

    SQL> select host_name from v$instance;

    HOST_NAME

    ____________

    dbhost2

    ```


    *The containers now appear as if they were “real” database servers on the network!*


    ### You Don’t Need Port Mapping


    What might not jump out immediately in the preceding example is that the databases
    were accessible over the default listener port, 1521\. These ports aren’t mapped.
    The host recognized the containers as endpoints on the virtual interfaces assigned
    to the bridge networks and treated them as “ordinary” hosts communicating over
    a range of ports. The same technique works on the default bridge network, too,
    as proven by using the container IP address (remember, the default bridge network
    uses the 172.17.0.0/16 address range):


    ```

    SQL> conn system/oracle123@//172.17.0.2:1521/ORA1

    Connected.

    SQL> conn system/oracle123@//172.17.0.3:1521/ORA2

    Connected.

    ```


    As long as there’s a mechanism resolving container names to the host, there’s
    no *need* to map ports. The containers are still accessible using the ports mapped
    to the Docker host over the default bridge network:


    ```

    SQL> conn system/oracle123@//lab1:51521/ORA1

    Connected.

    SQL> conn system/oracle123@//lab1:61521/ORA2

    Connected.

    ```


    However, the *only* services visible over port mapping are those specified during
    container creation. And mapping ports to the host departs from the standard we
    established—having one connection string for each database that works anywhere
    in the environment.


    You’ve seen how to create a custom bridge network with built-in DNS services and
    how to add DNS registration that works at the host. With these containers connected
    to the user-defined bridge, there’s no reason to leave them attached to the default
    bridge!'
