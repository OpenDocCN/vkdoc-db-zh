  raw: '### Binaries


    Containers are frequently deployed at scale. Smaller containers maximize infrastructure
    capacity and take less time to copy across networks. When building container images,
    the objective is to eliminate anything that isn’t necessary. Editors, like `vi`,
    are not needed.


    Without editors, how can anyone change files in containers? The simple answer
    is that it’s not something done in *most* containers. Unlike virtual and physical
    hosts, images provide ready-made filesystems that perform specific services or
    functions. They’re not multipurpose, interactive systems. If something needs editing,
    it’s done during the build and baked into the image, not after the container runs.
    Automation-friendly editors like `sed` are better suited if files in containers
    require modification.


    You learned in Chapter [3](#514143_1_En_3_Chapter.xhtml) that changes made in
    containers write to a layer in a union filesystem. Union filesystems evaluate
    the differences between lower and upper layers, projecting the result to the container.
    Besides adding space in the container’s layer, calculating those differences requires
    a CPU, and limiting changes in a container has performance implications.


    It’s not just about space and performance, though. You’ll discover that the binaries
    and tools missing from container images extend beyond editors. *Anything* unnecessary
    adds an *attack surface* that bad actors can exploit. Attackers can’t take advantage
    of what isn’t there.


    A system’s attack surface is the collection of possible vectors or points an unauthorized
    user might exploit to gain access to the system. Limiting the software installed
    on containers reduces what’s available to attackers and highlights another difference
    between containers and physical or virtual hosts. Complete operating systems tend
    to include tools and utilities that users *might* need. Container images have
    a more limited scope and include only what’s required.


    Linux distributions for Docker are often available with a “*-slim*” option, indicating
    a minimized distribution. There’s no convention defining what is and isn’t included
    (or, more accurately, excluded from) a slim version, which varies across vendors
    and versions. Production-savvy images usually start with a slim version and add
    what’s necessary. As we’ll see in Chapter [12](#514143_1_En_12_Chapter.xhtml),
    Oracle’s database images follow suit, using a “slim” distribution of Oracle Enterprise
    Linux 7 as their foundation.


    For most of us, though, the first use case for putting databases in containers
    includes some interaction, which implies editors and diagnostic tools. Fortunately,
    modifying build scripts to include binaries is easy, as discussed in the next
    chapter.


    ### Oracle Directories


    Another difference peculiar to Oracle’s container registry images is the location
    of some Oracle-specific files. In Listing [5-10](#514143_1_En_5_Chapter.xhtml#PC21),
    I navigated to the `ORACLE_BASE` directory and listed its contents.


    ```

    [oracle@8facfd649aa4 opt]$ cd $ORACLE_BASE

    [oracle@8facfd649aa4 oracle]$ pwd

    /opt/oracle

    [oracle@8facfd649aa4 oracle]$ ls -l

    total 92

    drwxr-x--- 3 oracle oinstall 4096 Mar  6 22:04 admin

    drwxr-x--- 2 oracle oinstall 4096 Mar  6 22:04 audit

    drwxr-x--- 4 oracle oinstall 4096 Mar  6 22:15 cfgtoollogs

    -rwxrwxr-x 1 oracle dba      1040 Mar 31  2021 checkDBStatus.sh

    drwxr-xr-x 2 oracle dba      4096 Apr 10  2021 checkpoints

    -rwxrwxr-x 1 oracle dba      4121 Mar 31  2021 createDB.sh

    -rw-rw-r-- 1 oracle dba      9204 Oct 11  2020 dbca.rsp.tmpl

    drwxrwxr-x 1 oracle dba      4096 Apr 10  2021 diag

    drwxrwx--- 1 oracle dba      4096 Mar  6 23:32 oraInventory

    drwxr-xr-x 1 oracle dba      4096 Mar  6 23:33 oradata

    drwxr-xr-x 1 oracle dba      4096 Apr 10  2021 product

    -rwxrwxr-- 1 oracle dba      1941 Oct 11  2020 relinkOracleBinary.sh

    -rwxrwxr-x 1 oracle dba      6488 Mar 31  2021 runOracle.sh

    -rwxrwxr-x 1 oracle dba      1015 Oct 11  2020 runUserScripts.sh

    drwxr-xr-x 1 oracle dba      4096 Apr 10  2021 scripts

    -rwxrwxr-x 1 oracle dba       758 Oct 11  2020 setPassword.sh

    -rwxrwxr-x 1 oracle dba       678 Oct 11  2020 startDB.sh

    Listing 5-10

    Contents of ORACLE_BASE in an Oracle database container

    ```


    Ignore the shell scripts for the time being. I want you to look closely at the
    *directories*. Much of what’s here is what we expect to find. Admin, audit, and
    diagnostic directories—check! The product directory that forms the root of the
    `ORACLE_HOME` installed on the system—check! The `oradata` directory, where Oracle
    stores database files—check! But, `oraInventory`?


    Oracle’s database inventory is a collection of metadata for different Oracle products
    installed on a host, and Oracle doesn’t recommend installing in or under the `ORACLE_BASE`,
    yet here it is. Why?


    It’s linked to the way containers use union filesystems for efficiency. For more
    on that, let’s look at the `oradata` directory.'
  trans: '## 二进制文件


    容器通常被大规模部署。较小的容器能最大化基础设施容量，并减少跨网络复制的时间。构建容器镜像的目标是剔除任何不必要的组件。像`vi`这样的编辑器并非必需。


    没有编辑器，如何在容器中更改文件？简单的答案是，在*大多数*容器中并不这样做。与虚拟和物理主机不同，镜像提供了即用型文件系统，用于执行特定的服务或功能。它们并非多用途的交互式系统。如果需要编辑某些内容，这将在构建过程中完成并固化到镜像中，而不是在容器运行之后。如果需要修改容器中的文件，像`sed`这样对自动化友好的编辑器是更合适的选择。


    你在第[3]章中了解到，在容器中所做的更改会写入联合文件系统的一个层中。联合文件系统评估上下层之间的差异，并将结果投射到容器中。除了在容器层中增加空间外，计算这些差异还需要
    CPU，而在容器中限制更改会影响性能。


    这不仅仅关乎空间和性能。你会发现，容器镜像中缺少的二进制文件和工具远不止编辑器。任何不必要的东西都会增加一个*攻击面*，恶意行为者可能加以利用。攻击者无法利用不存在的东西。


    系统的攻击面是未经授权的用户可能用来获取系统访问权限的潜在向量或点的集合。限制安装在容器上的软件可以减少攻击者可用的资源，并凸显了容器与物理或虚拟主机之间的另一个区别。完整的操作系统往往包含用户*可能*需要的工具和实用程序。容器镜像的范围更有限，只包含必需的内容。


    用于 Docker 的 Linux 发行版通常提供“*-slim*”选项，表示精简版发行版。没有约定明确界定精简版包含或不包含（或更准确地说，排除）什么，这在供应商和版本之间各不相同。面向生产的镜像通常从一个精简版开始，然后添加必要的内容。正如我们将在第[12]章中看到的，Oracle
    的数据库镜像也遵循这一做法，使用 Oracle Enterprise Linux 7 的“slim”发行版作为基础。


    对我们大多数人来说，将数据库放入容器的第一个用例涉及一些交互，这意味着需要编辑器和诊断工具。幸运的是，修改构建脚本以包含二进制文件很容易，这将在下一章中讨论。


    ## Oracle 目录


    Oracle 容器注册表镜像的另一个独特之处在于某些 Oracle 特定文件的位置。在[清单 5-10]中，我导航到`ORACLE_BASE`目录并列出了其内容。


    ```bash

    [oracle@8facfd649aa4 opt]$ cd $ORACLE_BASE

    [oracle@8facfd649aa4 oracle]$ pwd

    /opt/oracle

    [oracle@8facfd649aa4 oracle]$ ls -l

    total 92

    drwxr-x--- 3 oracle oinstall 4096 Mar  6 22:04 admin

    drwxr-x--- 2 oracle oinstall 4096 Mar  6 22:04 audit

    drwxr-x--- 4 oracle oinstall 4096 Mar  6 22:15 cfgtoollogs

    -rwxrwxr-x 1 oracle dba      1040 Mar 31  2021 checkDBStatus.sh

    drwxr-xr-x 2 oracle dba      4096 Apr 10  2021 checkpoints

    -rwxrwxr-x 1 oracle dba      4121 Mar 31  2021 createDB.sh

    -rw-rw-r-- 1 oracle dba      9204 Oct 11  2020 dbca.rsp.tmpl

    drwxrwxr-x 1 oracle dba      4096 Apr 10  2021 diag

