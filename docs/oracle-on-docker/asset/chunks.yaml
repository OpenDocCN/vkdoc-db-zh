- fmt: '## Connect to a Database in a Container


    Whether adding a new database connection in SQL Developer, building an `EZConnect`
    string, or creating a `tnsnames.ora` entry, we need the same basic information:


    *   **A hostname:** Local clients will use the host `localhost` or IP address
    `0.0.0.0`.

    *   **The listener port:** For these examples, I’ll switch back to the `ORCL`
    container I created at the beginning of the preceding section. If you recall,
    I mapped the container’s listener port, `1521`, to port `51521` on my host.

    *   **The database service or SID:** The default service names created by the
    Oracle 19c database image I ran earlier are `ORCLCDB` (for the CDB or container
    database—not to be confused with the database running in the Docker container!)
    and `ORCLPDB1` (for the PDB, or pluggable database).

    *   **A username and password:** For demonstration purposes, I changed the `system`
    user’s password to `oracle`.


    ### Set Up Connections in SQL Developer


    SQL Developer is Oracle’s versatile, popular, and easy-to-use graphical development
    utility. It’s free to download from [www.oracle.com/tools/downloads/sqldev-downloads.html](https://www.oracle.com/tools/downloads/sqldev-downloads.html).
    There are dozens of other development tools compatible with Oracle databases,
    but the procedure for adding a new connection is similar. They all need the same
    four pieces of information, and what’s shown here is adaptable to other products.


    After opening SQL Developer, navigate to the connections panel in the upper left
    and click the green plus symbol to open the New Connection dialog shown in Figure
    8-2.


    ![](images/514143_1_En_8_Chapter/514143_1_En_8_Fig2_HTML.jpg)

    A screenshot for new or select database connection has options for name, database
    type, user info, and connection type details. The bottom side has options for
    help, save, clear, test, connect and cancel.

    Figure 8-2: The Oracle SQL Developer New Connection dialog


    Give the new connection a name and enter the username and password, as shown in
    Figure 8-3. Optionally, mark the “Save Password” checkbox.


    ![](images/514143_1_En_8_Chapter/514143_1_En_8_Fig3_HTML.jpg)

    A screenshot for a new or select database connection has the name O R C L C D
    B, database type oracle, user info, and connection type details.

    Figure 8-3: Enter a connection name and the username and password of a database
    user


    In the “Details” tab, leave the connection type set to “Basic” and “Hostname”
    at the default, `localhost`. Change the “Port” to the mapped host port assigned
    to the container. I’m using `51521` on my system, but yours may be different,
    notably if you opted to use the `-P` option to let Docker assign ports automatically.


    Next, check the radio button for “Service name” and enter the service name of
    the database running in the container. In Figure 8-4, I provided the default CDB
    service, `ORCLCDB`. Finally, click the “Test” button at the bottom of the dialog
    and confirm that the “Status” displayed at the lower left reports “Success.”


    ![](images/514143_1_En_8_Chapter/514143_1_En_8_Fig4_HTML.jpg)

    A screenshot for a new or select database connection has the name, database type,
    user info, and connection type details with the port and service name marked.
    The left side has the status as success.

    Figure 8-4: Change the port and service name, then test the connection


    Finally, click the “Save” button at the bottom of the dialog to save the connection
    settings.


    Congratulations! You created a connection to a database in a Docker container!
    Feel free to take a few minutes to explore the environment or connect to a user
    in the pluggable database, too!


    ### EZConnect


    Oracle’s `EZConnect`, or `Easy Connect`, is a simplified method of connecting
    to Oracle databases without performing service lookups in traditional `tnsnames.ora`
    files. The basic syntax is:


    ```

    username/password@//host:port/service_name

    ```


    Plugging in the same information used to build the SQL Developer connection earlier,
    I get a working connection string:


    ```

    system/oracle@//localhost:51521/ORCLCDB

    ```


    I can use this string to connect to the database from command-line clients like
    Oracle’s `SQLcl`, a command-line tool similar to SQL*Plus, but with many more
    developer-friendly features. It’s free to download from [www.oracle.com/tools/downloads/sqlcl-downloads.html](https://www.oracle.com/tools/downloads/sqlcl-downloads.html).


    This connection string works for any client *in my local environment* because
    it tells the client to connect to a database listening on port `51521` on the
    `localhost`. It will not work *inside the container itself*. Why not?


    The listener runs on port `1521` in the container and doesn’t know about the outside
    world. Nor does it see port mappings added by Docker between container and host.
    Inside the container, I connect to the database “normally” using an `EZConnect`
    string that includes the host, port, and service. `EZConnect` assumes port `1521`,
    meaning I can use just the host and service, too:


    ```

    SQL> conn system/oracle@//localhost:1521/ORCLCDB

    Connected.

    SQL> conn system/oracle@//localhost/ORCLCDB

    Connected.

    ```


    Connections from the container host (in this case, my laptop) and clients inside
    the container (here, SQL*Plus running in container `ORCL`) use `localhost` as
    the host. `localhost` is an alias for “my local host,” but it doesn’t represent
    *the same hosts* in the container and host!


    To illustrate this, I ran the Linux `hostname` command in the container in Listing
    8-4, exited the container environment, and reran it on the host.


    ```

    [oracle@f502c53c3c27 ~]$ hostname

    f502c53c3c27

    [oracle@f502c53c3c27 ~]$ exit

    exit

    > hostname

    SSCOTT-C02QP2DJG8WN

    ```

    Listing 8-4: The `localhost` references different hosts inside and outside the
    container environment


    I’ve confused this myself and once spent more time than I’d like to admit trying
    to reason why an `EZConnect` string that worked *outside* the container, using
    a translated port, didn’t work *inside* the container from SQL*Plus! When setting
    up connections, be careful not to lose track of which `localhost` is which!


    ### Creating tnsnames.ora Configurations


    As you might have guessed from the two previous sections, setting up a TNS connection
    requires applying the proper host, port, and service name to connection aliases.
    Adding an alias for a container database to a `tnsnames.ora` on the local machine
    uses the hostname and port mapped to the container. Listing 8-5 provides an example
    of entries in a `tnsnames.ora` file, defining a connection to the `ORCLPDB1` service
    in my `ORCL` container. Remember, port `51521` on my host maps to the database
    listener’s port `1521`.


    ```

    ORCLPDB1 =

    (DESCRIPTION =

    (ADDRESS = (PROTOCOL = TCP)(HOST = localhost)(PORT = 51521))

    (CONNECT_DATA =

    (SERVER = DEDICATED)

    (SERVICE_NAME = ORCLPDB1)

    )

    )

    ```

    Listing 8-5: The `tnsnames.ora` entry for connecting from the host to the `ORCLPDB1`
    service in a database inside a container. Using the port opened and mapped to
    the container directs traffic to the database listener.


    It looks very similar to the `tnsnames.ora` file in the container, located under
    `$ORACLE_HOME/network/admin` and shown in Listing 8-6. The only differences are
    the host and port. Remember, the database and software inside the container aren’t
    affected by (or even aware of) the change taking place at the container-host network
    interface.


    ```

    ORCLPDB1=

    (DESCRIPTION =

    (ADDRESS = (PROTOCOL = TCP)(HOST = 0.0.0.0)(PORT = 1521))

    (CONNECT_DATA =

    (SERVER = DEDICATED)

    (SERVICE_NAME = ORCLPDB1)

    )

    )

    ```

    Listing 8-6: The `tnsnames.ora` entry for the `ORCLPDB1` service inside the database
    container doesn’t encounter any port change because its traffic is entirely internal
    to the container.'
  raw: '## Connect to a Database in a Container


    Whether adding a new database connection in SQL Developer, building an *EZConnect*
    string, or creating a `tnsnames.ora` entry, we need the same basic information:


    *   **A hostname:** Local clients will use the host `localhost` or IP address
    `0.0.0.0`.


    *   **The listener port:** For these examples, I’ll switch back to the ORCL container
    I created at the beginning of the preceding section. If you recall, I mapped the
    container’s listener port, 1521, to port 51521 on my host.


    *   **The database service or SID:** The default service names created by the
    Oracle 19c database image I ran earlier are ORCLCDB (for the CDB or container
    database—not to be confused with the database running in the Docker container!)
    and ORCLPDB1 (for the PDB, or pluggable database).


    *   **A username and password:** For demonstration purposes, I changed the system
    user’s password to `oracle`.


    ### Set Up Connections in SQL Developer


    SQL Developer is Oracle’s versatile, popular, and easy-to-use graphical development
    utility. It’s free to download from [*www.oracle.com/tools/downloads/sqldev-downloads.html*](https://www.oracle.com/tools/downloads/sqldev-downloads.html).
    There are dozens of other development tools compatible with Oracle databases,
    but the procedure for adding a new connection is similar. They all need the same
    four pieces of information, and what’s shown here is adaptable to other products.


    After opening SQL Developer, navigate to the connections panel in the upper left
    and click the green plus symbol to open the New Connection dialog shown in Figure
    [8-2](#514143_1_En_8_Chapter.xhtml#Fig2).


    ![](images/514143_1_En_8_Chapter/514143_1_En_8_Fig2_HTML.jpg)


    A screenshot for new or select database connection has options for name, database
    type, user info, and connection type details. The bottom side has options for
    help, save, clear, test, connect and cancel.


    Figure 8-2


    The Oracle SQL Developer New Connection dialog


    Give the new connection a name and enter the username and password, as shown in
    Figure [8-3](#514143_1_En_8_Chapter.xhtml#Fig3). Optionally, mark the “*Save Password*”
    checkbox.


    ![](images/514143_1_En_8_Chapter/514143_1_En_8_Fig3_HTML.jpg)


    A screenshot for a new or select database connection has the name O R C L C D
    B, database type oracle, user info, and connection type details.


    Figure 8-3


    Enter a connection name and the username and password of a database user


    In the *Details* tab, leave the connection type set to *Basic* and *Hostname*
    at the default, `localhost`. Change the *Port* to the mapped host port assigned
    to the container. I’m using 51521 on my system, but yours may be different, notably
    if you opted to use the `-P` option to let Docker assign ports automatically.


    Next, check the radio button for “*Service name*” and enter the service name of
    the database running in the container. In Figure 8-4, I provided the default CDB
    service, ORCLCDB. Finally, click the “*Test*” button at the bottom of the dialog
    and confirm that the “*Status*” displayed at the lower left reports “*Success*.”


    ![](images/514143_1_En_8_Chapter/514143_1_En_8_Fig4_HTML.jpg)


    A screenshot for a new or select database connection has the name, database type,
    user info, and connection type details with the port and service name marked.
    The left side has the status as success.


    Figure 8-4


    Change the port and service name, then test the connection


    Finally, click the “*Save*” button at the bottom of the dialog to save the connection
    settings.


    Congratulations! You created a connection to a database in a Docker container!
    Feel free to take a few minutes to explore the environment or connect to a user
    in the pluggable database, too!


    ### EZConnect


    Oracle’s *EZConnect*, or *Easy Connect*, is a simplified method of connecting
    to Oracle databases without performing service lookups in traditional `tnsnames.ora`
    files. The basic syntax is


    ```

    username/password@//host:port/service_name

    ```


    Plugging in the same information used to build the SQL Developer connection earlier,
    I get a working connection string:


    ```

    system/oracle@//localhost:51521/ORCLCDB

    ```


    I can use this string to connect to the database from command-line clients like
    Oracle’s *SQLcl*, a command-line tool similar to SQL*Plus, but with many more
    developer-friendly features. It’s free to download from [*www.oracle.com/tools/downloads/sqlcl-downloads.html*](https://www.oracle.com/tools/downloads/sqlcl-downloads.html).


    This connection string works for any client *in my local environment* because
    it tells the client to connect to a database listening on port 51521 on the localhost.
    It will not work *inside the container itself*. Why not?


    The listener runs on port 1521 in the container and doesn’t know about the outside
    world. Nor does it see port mappings added by Docker between container and host.
    Inside the container, I connect to the database “normally” using an EZConnect
    string that includes the host, port, and service. EZConnect assumes port 1521,
    meaning I can use just the host and service, too:


    ```

    SQL> conn system/oracle@//localhost:1521/ORCLCDB

    Connected.

    SQL> conn system/oracle@//localhost/ORCLCDB

    Connected.

    ```


    Connections from the container host (in this case, my laptop) and clients inside
    the container (here, SQL*Plus running in container ORCL) use `localhost` as the
    host. `localhost` is an alias for “my local host,” but it doesn’t represent *the
    same hosts* in the container and host!


    To illustrate this, I ran the Linux hostname command in the container in Listing
    [8-4](#514143_1_En_8_Chapter.xhtml#PC16), exited the container environment, and
    reran it on the host.


    ```

    [oracle@f502c53c3c27 ~]$ hostname

    f502c53c3c27

    [oracle@f502c53c3c27 ~]$ exit

    exit

    > hostname

    SSCOTT-C02QP2DJG8WN

    Listing 8-4

    The localhost references different hosts inside and outside the container environment

    ```


    I’ve confused this myself and once spent more time than I’d like to admit trying
    to reason why an EZConnect string that worked *outside* the container, using a
    translated port, didn’t work *inside* the container from SQL*Plus! When setting
    up connections, be careful not to lose track of which `localhost` is which!


    ### Creating tnsnames.ora Configurations


    As you might have guessed from the two previous sections, setting up a TNS connection
    requires applying the proper host, port, and service name to connection aliases.
    Adding an alias for a container database to a `tnsnames.ora` on the local machine
    uses the hostname and port mapped to the container. Listing [8-5](#514143_1_En_8_Chapter.xhtml#PC17)
    provides an example of entries in a `tnsnames.ora` file, defining a connection
    to the ORCLPDB1 service in my ORCL container. Remember, port 51521 on my host
    maps to the database listener’s port 1521.


    ```

    ORCLPDB1 =

    (DESCRIPTION =

    (ADDRESS = (PROTOCOL = TCP)(HOST = localhost)(PORT = 51521))

    (CONNECT_DATA =

    (SERVER = DEDICATED)

    (SERVICE_NAME = ORCLPDB1)

    )

    )

    Listing 8-5

    The tnsnames.ora entry for connecting from the host to the ORCLPDB1 service in
    a database inside a container. Using the port opened and mapped to the container
    directs traffic to the database listener

    ```


    It looks very similar to the `tnsnames.ora` file in the container, located under
    `$ORACLE_HOME/network/admin` and shown in Listing [8-6](#514143_1_En_8_Chapter.xhtml#PC18).
    The only differences are the host and port. Remember, the database and software
    inside the container aren’t affected by (or even aware of) the change taking place
    at the container-host network interface.


    ```

    ORCLPDB1=

    (DESCRIPTION =

    (ADDRESS = (PROTOCOL = TCP)(HOST = 0.0.0.0)(PORT = 1521))

    (CONNECT_DATA =

    (SERVER = DEDICATED)

    (SERVICE_NAME = ORCLPDB1)

    )

    )

    Listing 8-6

    The tnsnames.ora entry for the ORCLPDB1 service inside the database container
    doesn’t encounter any port change because its traffic is entirely internal to
    the container

    ```'
