    *GitHub* 是一个基于 `git` 的流行版本控制、管理和代码分发平台。Oracle 在 GitHub 上维护了一个用于构建容器镜像的官方脚本仓库，地址为
    `github.com/oracle/docker-images`。除了数据库镜像，您还会在这里找到许多其他 Oracle 产品的目录，从 Instant
    Client 到 GoldenGate 再到 REST Data Services。我们需要在运行 Docker Desktop 的本地机器上获取这些文件。有两种方法可以做到这一点：直接下载或使用
    `git`。图 4-4 显示了点击 `Code` 按钮后的对话框窗口。


    ![](img/514143_1_En_4_Fig4_HTML.jpg)


