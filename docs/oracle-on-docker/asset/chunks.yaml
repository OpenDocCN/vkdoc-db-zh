    在我撰写本文时，Docker Hub 上有近 850 万个公开可用的镜像，大部分由个人和公司添加。官方和验证镜像会经过漏洞扫描和测试。不能保证其他镜像是编写良好的甚至是安全的。我们如何知道我们使用的
    Ubuntu 镜像是好的呢？


    当我们执行 `docker run` 时，我们请求了一个 Ubuntu 镜像但没有指定仓库。Docker 从它的官方镜像库中拉取。我将在第 16 章更详细地介绍注册中心。现在，知道
    Docker 并非随机拉取某些东西就足够了！


    你可能还会注意到，在 `docker run` 和 `docker images` 的输出中，镜像标签或版本都显示为 `latest`。这是最近版本的简写，如果你没有为镜像（当有多个版本时）请求特定标签，这是默认值。这通常不重要——你通常想要
    Ubuntu 或 Oracle Enterprise Linux 7 的最新版本，以确保包含最新的更新和错误修复。对于依赖关系和版本相关的应用程序，你需要指定版本。例如，要获取
    Node.js 的特定构建，你可能会调用 `docker run node:16` 或 `docker run node:17.1.0`，其中镜像标签跟在冒号后面。


    ## 精简性


    从清单 3-5 中关于 Ubuntu 镜像的信息显示，该镜像仅有 72.8MB。考虑到从 [`www.ubuntu.com`](http://www.ubuntu.com)
    下载的 ISO 有 1.2GB，这似乎很小。Ubuntu 的 Docker 镜像大小不到其已安装对应物的 6%。为什么？


    镜像（通常）只包含执行其功能所*绝对必需*的内容。通过排除*不*需要的内容来减少镜像占用空间有许多好处：


    *   跨网络传输的内容更少。

    *   实际上增加了基础设施容量。

    *   更小的镜像具有更小的攻击面。

    *   更少的依赖关系减少了错误和漏洞的可能性。


    编辑器通常是镜像中被排除的事物之一。容器通常自主运行，生命周期以小时或分钟计。在生产环境中登录容器是罕见的（甚至是不鼓励的）。编辑器根本没必要，而且会带来安全风险。


    回到你之前使用的容器提示符，尝试运行 `vi test.txt` 来编辑一个新文件。它找不到这个命令。`vi` 和 `nano` 没有安装：


    ```

    root@4a9ddd43e0e2:/# vi /etc/os-release

    bash: vi: command not found

    root@4a9ddd43e0e2:/# nano test.txt

    bash: nano: command not found

    ```


    还有其他迹象表明 Ubuntu 镜像已被精简，并非设计用于交互。尝试运行 `man ls` 来显示*手册页*（*manpage*），即 Linux 的内置文档。操作系统会响应一条消息，提醒我们这不是一个完整的操作系统：


    ```

    root@ebb592e975f0:/# man ls

    This system has been minimized by removing packages and content that are

    not required on a system that users do not log into.

    To restore this content, including manpages, you can run the ''unminimize''

    command. You will still need to ensure the ''man-db'' package is installed.

    ```


    ### 修改容器


    容器是用于执行一系列狭窄任务的精简功能系统，而不是运行交互式环境。Docker 和其他发布者提供的基础镜像是精简版本，没有我们习惯在物理和虚拟系统中找到的那些额外功能。


    一些发布者为常见发行版提供“slim”变体。虽然没有标准定义什么是或不是非 slim 版本的一部分，但“slim”通常包含工作系统所需的最小内容。相比之下，非
    slim 版本可能包含额外的标准或便利功能。


    在第 12 章中，我们将看到 Oracle 数据库的容器镜像是从 Oracle Enterprise Linux 的“slim”版本构建的。


    没有什么能阻止我们更新容器操作系统来添加功能。让我们通过运行命令将 `vi`（或者如果你喜欢，`nano`）添加到你的容器中来做到这一点。清单 3-1 显示了在
    Ubuntu 上安装 `vim-tiny` 的命令，这是一个不需要 Python 支持的发行版。


    ```

    apt-get update

    apt-get install -y vim-tiny

    ```


    > **清单 3-1** 在 Ubuntu 上安装 vim-tiny 包的命令


    请注意，你需要运行 `apt-get update` 来更新仓库以包含 `vim`。如果不更新，`apt-get` 就不知道这个包存在！


    再次尝试使用 `vi test.txt` 创建文件。这次，成功了！你成功修改了容器，添加了原始镜像中没有的功能。在文件中添加一些内容并保存——你将在下一节中再次用到它！'
- fmt: '## Persistence


    Over the years I’ve talked and taught about Oracle and Docker, the most enduring
    (or persistent, pardon the pun!) misconceptions are `containers don''t persist
    data` and `don''t reliably save their contents`—particularly across restarts.
    Let’s test this! Exit your Ubuntu container by typing `exit` at the prompt, just
    as you would if you’d logged in or connected to a host over SSH.


    ### Check the Container State


    We started the container using `docker run` and the `-it` option. It created an
    *interactive* container, tying its state to the session. Logging out of the container
    stopped it. We can see containers present on a system and their status using the
    `docker ps` command. At first, `ps` may not seem intuitive, but Unix and Linux
    users should recognize this as a command for reporting running processes on a
    system.


    Recall that containers are just processes, and it begins to make sense. Type `docker
    ps -a` in your shell and examine the results:


    ```

    > docker ps -a

    CONTAINER ID IMAGE   COMMAND CREATED     STATUS                   PORTS        NAMES

    4a9ddd43e0e2 ubuntu  "bash"  2 hours ago Exited (0) 17 seconds ago       fervent_mendeleev

    ```


    The `-a` flag is shorthand for `--all` and displays all processes (or containers)
    on the system, whether active or stopped. Without this option, `docker ps` reports
    only the running containers. A few other things to note in the output:


    *   The `CONTAINER ID` is a random string and matches the hostname we saw in the
    container’s shell prompt.

    *   The `COMMAND`, `bash`, is the shell we used when the container started. A
    container’s default command is defined in its *Dockerfile* and covered in Chapters
    [12](#514143_1_En_12_Chapter.xhtml) and [13](#514143_1_En_13_Chapter.xhtml).

    *   The `STATUS` shows the container exited normally, with an error code 0\. (Anything
    other than 0 is technically an exception, though not always serious.)

    *   The randomly generated `NAME`, meant to be human-friendly, is customizable.
    I’ll cover that shortly.


    To confirm the container is stopped, run `docker ps`, without the `-a` option,
    to see only the active containers.


    ### Start the Container


    To start the container, type `docker start`, followed by either the `NAME` or
    `CONTAINER ID` from your system, then check the status by repeating the `docker
    ps -a` command:


    ```

    > docker start fervent_mendeleev

    fervent_mendeleev

    > docker ps -a

    CONTAINER ID   IMAGE   COMMAND  CREATED      STATUS              PORTS          NAMES

    4a9ddd43e0e2   ubuntu  "bash"   2 hours ago  Up 3 seconds             fervent_mendeleev

    ```


    ### Interactive vs. Detached


    Notice you didn’t reconnect to the container this time. When started this way,
    the container process runs as a *detached*, or background, process. Detached containers
    don’t stop when users log out because their state isn’t tied to an interactive
    session.


    To run a container in detached mode at the outset, replace the `-it` options in
    `docker run` with `-d` or `--detach`.


    ### Connect to the Container


    Now that the container is active, reconnect to the prompt. There are different
    ways of doing this: *attaching* or *executing a command*.


    *   **Attaching** accesses a container’s running process via the `docker attach
    <CONTAINER NAME>` command. In our case, that command is bash, as shown by the
    `COMMAND` column of `docker ps`. Only one session can attach at any given time.
    Running a container in interactive mode, as you did earlier, attaches to the container.

    *   **Executing** a command is akin to logging in to a remote host via `ssh`.
    Running `docker exec <CONTAINER NAME> <COMMAND>` allows you to specify a command
    or script. The execute command can run interactively or in the background and
    set the user, working directory, and environment. Multiple sessions can connect
    simultaneously with `docker exec`.


    I’ve rarely needed `docker attach` when working with Docker and Oracle. I use
    `docker exec` almost exclusively in practice and in this book.


    Connect to your container by running `docker exec` with the same `-it` options
    used when you first ran the container. Follow this with the container name and
    the command we want to run, `bash`, to start a shell:


    ```

    > docker exec -it fervent_mendeleev bash

    root@4a9ddd43e0e2:/#

    ```


    ### Verify Persistence


    Once you’ve reconnected to the container, list the contents of the directory where
    you created the file `test.txt`. The file is still there, and its contents are
    preserved, even after restarting the container.


    Changes to the filesystem aren’t the only thing that persisted in Docker. Session
    state survives, too. Use the keyboard up arrow from your container prompt to scroll
    the command history. Commands issued before stopping the container appear.


    ### Remove the Container


    Microservice architectures create containers to perform some work, then destroy
    them (more on this later). The container you created served its purpose: you learned
    how to run and modify a container, check its state, start and stop it, and connect.
    Now, we’ll remove it.


    Exit from the container prompt by typing `exit` as before. Remove the container
    by running `docker rm -f <CONTAINER NAME>` at your host prompt, substituting the
    name of the container on your system:


    ```

    > docker rm -f fervent_mendeleev

    fervent_mendeleev

    ```


    The `-f` flag forces Docker to remove running containers. Without this option,
    you must stop the container before removing it.


    ## Images Are Immutable


    You modified the container by installing `vi` and adding a file, but it didn’t
    change the image. Images are *immutable* and can’t be changed. Every image has
    a digest or hash value, acting as a signature that guarantees the image contents.
    Every container started from a given image is identical. This is a desirable property,
    a foundation of operational reliability and repeatability, and something we’ll
    use to our advantage in later chapters.


    It does raise an obvious question, though. If you can’t change an image, how can
    such a variety of images be present in Docker Hub? Saying images are immutable
    isn’t the whole story. Images can’t be changed, but the changes made in a container
    can be *saved as new images*. Building images is just a series of operations that
    start an image, run commands to modify the running container, and save the results
    as a new image.


    ### Start a New Container


    To demonstrate, start a new Ubuntu container, this time assigning a name with
    the `--name` option rather than letting Docker generate a “friendly” name:


    ```

    > docker run -it --name my_container ubuntu

    root@cadf21663737:/#

    ```


    Notice how quickly this completed! There were no additional messages like those
    you saw the first time you ran an Ubuntu container. Docker didn’t need to pull
    the image because it’s already present on the system. It only needed to start
    a new Linux process on the local host—remember, with Docker, there’s no initialization
    or boot cycle!'
