- fmt: '# Docker Volumes


    `Docker` `Volumes` are similar to bind mounts in some regards: each persists data
    outside the container’s union filesystem. The differences lie in capabilities
    and management. While bind mounts are directories on the host filesystem, `Docker`
    `Volumes` are `Docker` objects and must be created ahead of time,^([^(48)](#fn48))
    adding a step to container creation. The *default* location for `Docker` `Volumes`
    is the host’s private `/var/lib/docker` area.


    Using the `/var/lib/docker` for storage was one of the indictments against union
    filesystems, though! If volumes use this location, we’re back in the same boat,
    putting data in a limited destination! But that’s merely the *default* location.
    We have the opportunity to create volumes on the local filesystem, just like bind
    mounts. Volumes can also reference storage beyond the reach of binds, including
    Object Storage buckets on cloud sources.


    `Docker` `Volumes` are *objects* in the `Docker` environment, managed through
    the `Docker` `CLI`, primarily the `docker volume` command. In some ways, `Docker`
    `Volumes` parallel *Oracle Automatic Storage Management* (ASM)—both provide integrated,
    application-aware storage and extended features and capabilities, but with the
    addition of dedicated commands. A volume must exist before mapping it to a container,
    just as DBAs need to create `ASM` disks before assigning them to a database. Listing
    [7-1](#514143_1_En_7_Chapter.xhtml#PC4) offers examples of creating a volume,
    listing volumes on the system, inspecting volume metadata, and removing the volume.^([^(49)](#fn49))
    `Docker` `Desktop` provides volume management, too. Figure [7-3](#514143_1_En_7_Chapter.xhtml#Fig3)
    shows the volume management tab in `Docker` `Desktop` for the `oradata` volume
    in this example.


    ![](images/514143_1_En_7_Chapter/514143_1_En_7_Fig3_HTML.jpg)


    A screenshot of the docker. The top panel has the option for volume marked 1 and
    oradata under volumes marked 2. The bottom side has data under the oradata indicated
    as 3.


    Figure 7-3


    The `Docker` `Desktop` view for the oradata volume. Under the “Volumes” view (1),
    I selected the oradata volume (2) to navigate to the volume details page. Under
    the “Data” tab (3), I can see the volume’s files and directories


    ```

    > docker volume create oradata

    oradata

    > docker volume ls

    DRIVER    VOLUME NAME

    local     oradata

    > docker volume inspect oradata

    [

    {

    "CreatedAt": "2022-01-01T12:00:00Z",

    "Driver": "local",

    "Labels": {},

    "Mountpoint": "/var/lib/docker/volumes/oradata/_data",

    "Name": "oradata",

    "Options": {},

    "Scope": "local"

    }

    ]

    > docker volume rm oradata

    oradata

    ```

    Listing 7-1

    Examples of Docker commands for creating a volume, listing volumes on a system,
    displaying volume metadata, and removing a volume


    # tmpfs and Secrets


    The remaining mount types see more limited and specific use.


    The *tmpfs* type saves data to memory but never writes to the host filesystem.
    They’re suitable for application or session data used while the container is running
    that doesn’t require persistence. A `tmpfs` mount can share sensitive information
    with containers, such as keys and passwords.


    *Runtime secrets*^([^(50)](#fn50)) are a special type of mount available in *Podman*,
    an alternate container engine. Runtime secrets offer a better, safer way of sharing
    credentials with containers. Absent runtime secrets, the options for passing passwords
    and other sensitive information to containers may leave visible artifacts threat
    actors can leverage.


    # Volumes vs. Bind Mounts


    `Docker` `Volumes` are the preferred means for persisting data, per `Docker`,
    and enjoy several advantages over bind mounts, including


    *   **Improved performance for Docker Desktop users:** `Docker` `Volumes` are
    `Docker`-native objects and perform better on `Docker` `Desktop` than bind mounts.

    *   **Remote host and cloud integration:** `Docker` `Volumes` can use specialized,
    remote, and cloud storage unavailable to bind mounts.

    *   **Increased security:** Plugins and drivers allow volume encryption and access
    control.

    *   **Better ownership and permission management:** Bind mounts in Linux systems
    (including those running under Windows Subsystem for Linux) require additional
    steps to fix directory ownership. Volumes do not.

    *   **Backup and sharing:** Volumes are easier to back up and migrate and safer
    to share across multiple containers.


    For those new to containers, it’s easy to forget to manage the volume resources.
    Deleting a container orphans its volumes. Over time, starting and dropping database
    containers without cleaning up volumes adds space pressure on the host. It’s especially
    true for volumes in the `Docker`’s private `/var/lib/docker` directory, which
    can easily fly under the radar. Only privileged users can identify what’s using
    the space on Linux systems. For `Docker` `Desktop` users, that space is hidden
    in a virtual machine.


    What happens once volumes^([^(51)](#fn51)) fill the disk depends on the environment.
    For `Docker` `Desktop` users, when the `Docker` `VM` runs out of space it stops
    working or reports errors. On Linux systems, users may observe anything from odd
    behavior to failures.


    The attraction and apparent advantage of bind mounts was their accessibility from
    the host. They’re regular directories, and discovering their space use is straightforward.
    But volumes can be bind mounts, too! Listing [7-2](#514143_1_En_7_Chapter.xhtml#PC5)
    shows how I created a volume called `oradata_ORA11G`, then listed and inspected
    its metadata. The `volume create` command uses additional options, instructing
    `Docker` to bind the volume to a directory on my local filesystem. In the end,
    I have a volume using a local directory, just like a bind mount!


    ```

    > docker volume create --opt type=none --opt o=bind --opt device=/oradata/ORA11G
    oradata_ORA11G

    oracle_data

    > docker volume ls

    DRIVER              VOLUME NAME

    local               oradata_ORA11G

    > docker volume inspect oradata_ORA11G

    [

    {

    "Driver": "local",

    "Mountpoint": "/var/lib/docker/volumes/oradata_ORA11G/_data",

    "Name": "oradata_ORA11G",

    "Options": {

    "device": "/oradata/ORA11G",

    "o": "bind",

    "type": "none"

    },

    "Scope": "local"

    }

    ]

    ```

    Listing 7-2

    Creating a volume that binds to a directory on the local host


    Now I have the best of both worlds! My volume is visible through `Docker`’s `CLI`
    and uses a directory on the host I can navigate with regular Linux commands!^([^(52)](#fn52))
    The next step is using this volume to mount the `oradata` volume in a new container
    called *ORA11G*.


    There’s a relationship between containers and external data. `Docker` has a better
    understanding of that relationship through volumes. In a simple environment with
    one or a few containers and volumes, it’s not that important. With growing complexity,
    it’s more critical to understand what’s used and where.


    When I first started running `Oracle` databases in containers, I used a directory
    called `oradata` as the root for all my containers. Each container was bind-mounted
    to its own subdirectory, and I managed everything manually. If I had a subdirectory
    called `TEST123` but no matching container, I knew it was safe to remove that
    subdirectory to reclaim space.


    It wasn’t long before I mounted multiple directories to a container or shared
    directories among numerous containers. Keeping track grew more difficult, and
    the ramifications of deleting a directory were more severe.'
