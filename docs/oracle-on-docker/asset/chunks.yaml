    ```

    bash-4.2$ env | sort

    ARCHIVELOG_DIR_NAME=archive_logs

    CHECKPOINT_FILE_EXTN=.created

    CHECK_DB_FILE=checkDBStatus.sh

    CHECK_SPACE_FILE=checkSpace.sh

    CLASSPATH=/opt/oracle/product/19c/dbhome_1/jlib:/opt/oracle/product/19c/dbhome_1/rdbms/jlib

    CLONE_DB=false

    CONFIG_RSP=dbca.rsp.tmpl

    CREATE_DB_FILE=createDB.sh

    CREATE_OBSERVER_FILE=createObserver.sh

    DG_OBSERVER_NAME=

    DG_OBSERVER_ONLY=false

    ENABLE_ARCHIVELOG=false

    HOME=/home/oracle

    HOSTNAME=59ae22d8ed19

    INSTALL_DB_BINARIES_FILE=installDBBinaries.sh

    INSTALL_DIR=/opt/install

    INSTALL_FILE_1=LINUX.X64_193000_db_home.zip

    INSTALL_RSP=db_inst.rsp

    LD_LIBRARY_PATH=/opt/oracle/product/19c/dbhome_1/lib:/usr/lib

    ORACLE_BASE=/opt/oracle

    ORACLE_HOME=/opt/oracle/product/19c/dbhome_1

    ORACLE_SID=ORCLCDB

    PATH=/opt/oracle/product/19c/dbhome_1/bin:/opt/oracle/product/19c/dbhome_1/OPatch/:/usr/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    PRIMARY_DB_CONN_STR=

    PWD=/home/oracle

    PWD_FILE=setPassword.sh

    RELINK_BINARY_FILE=relinkOracleBinary.sh

    RUN_FILE=runOracle.sh

    SETUP_LINUX_FILE=setupLinuxEnv.sh

    SHLVL=1

    SLIMMING=true

    STANDBY_DB=false

    START_FILE=startDB.sh

    TERM=xterm

    USER_SCRIPTS_FILE=runUserScripts.sh

    WALLET_DIR=

    _=/usr/bin/env

    清单 12-2

    Oracle 数据库容器中设置的默认环境变量

    ```


    其中一些环境变量（包括以 `INSTALL` 开头的）不应该出现在这里。这些变量都指向在 Oracle 数据库软件安装步骤的 Dockerfile 中使用的文件和目录。它们指向的工件在最终镜像中并不存在——它们被移除（或更准确地说，未包含在）`docker
    run` 使用的最终镜像中：


    ```

    bash-4.2$ ls -l $INSTALL_DIR

    ls: cannot access /opt/install: No such file or directory

    bash-4.2$ find / -name $INSTALL_DB_BINARIES_FILE 2>/dev/null

    bash-4.2$ find / -name $INSTALL_FILE_1 2>/dev/null

    bash-4.2$ find / -name $INSTALL_RSP 2>/dev/null

    bash-4.2$

    ```


    对于那些不熟悉 `2>/dev/null` 语法的人：它将错误信息发送到“虚空”！数字 `2` 是 `stderr`（标准错误）的简写，即我们通常看到的打印到终端的消息。脱字符
    `>` 将这些错误重定向到 Linux 的空设备文件 `/dev/null`。这个技巧可以防止因 `oracle` 用户无权读取的目录而产生的“权限被拒绝”错误扰乱输出。


    数据库软件安装脚本需要这些信息，但容器本身不需要。严格来说，它们不需要在容器环境中持久存在。请不要误会——我非常尊重维护 Oracle 容器仓库的作者和贡献者，他们多年的工作非常出色且富有洞察力。我并不是说这些变量出现在最终镜像中是错误的，只是我的编码风格和偏好不同。但是，它们的存在有助于说明如何利用
    `ARG` 和 `ENV` 的差异！


    如果通过参数传递这些值，而不是将它们添加到环境中，就会将它们定义为构建过程的一部分。它们对构建过程中调用的软件安装脚本可见，但在最终的镜像中不存在。我支持这种方法的理由如下：


    *   它能产生一个更“干净”、更整洁的环境。

    *   它使得数据库运行在 Linux 容器中这一点不那么明显。

    *   它限制了攻击者可能用来获取有关构建镜像方法的信息。


    再次强调，这里没有对错之分，只是不同的做事方式。


    另一种在不设置环境变量的情况下将变量传递给脚本的方法是将它们定义为命令字符串的一部分。本章稍后介绍的 `RUN` 指令可以在其命令中包含局部作用域的变量定义：


    ```

    RUN INSTALL_DIR=/opt/install && \

    INSTALL_DB_BINARIES_FILE=installDBBinaries.sh && \

    $INSTALL_DIR/$INSTALL_DB_BINARIES_FILE

    ```


    这里的变量仅在需要它们的 `RUN` 命令的作用域内设置。'
- fmt: "### Build Dockerfile Templates with Arguments\n\nThe `FROM` command must be\
    \ the first command in a Dockerfile. It makes sense—it’s challenging to do anything\
    \ without a starting image! The single exception that proves the rule is the `ARG`\
    \ command.\n\nA Dockerfile can have arguments as the first instructions and use\
    \ those arguments in a `FROM` command. It’s helpful for writing Dockerfile templates\
    \ that add flexibility to builds. For instance, all the database images we’ve\
    \ worked with so far use Oracle Enterprise Linux 7-slim as the base image. That\
    \ image name is hard-coded into the `FROM` statement. But what if we wanted to\
    \ use a different version? Rewriting the Dockerfile and changing the image is\
    \ one option. Another is using an argument-based image:\n\n```dockerfile\nARG\
    \ IMAGE_TAG=7-slim\nFROM oraclelinux:$IMAGE_TAG\n```\n\nA Dockerfile written this\
    \ way is more flexible and potentially future-proof.\n\n### Assign Multiple Variables\n\
    \nAnother difference between `ARG` and `ENV` is that arguments must be set individually,\
    \ but a single `ENV` command can set multiple variables:\n\n```dockerfile\nARG\
    \ VAR1=VALUE1\nARG VAR2=VALUE2\nARG VAR3=VALUE3\nENV VAR1=VALUE1 \\\n    VAR2=VALUE2\
    \ \\\n    VAR3=VALUE3\n```\n\nThe backslash (`\\`) is a continuation character\
    \ that tells Linux there’s more to the command on the following line. The preceding\
    \ `ENV` command could also be written as:\n\n```dockerfile\nENV VAR1=VALUE1 VAR2=VALUE2\
    \ VAR3=VALUE3\n```\n\nThe advantage of the first method is clarity. Each variable\
    \ could also be defined in separate `ENV` commands, but since every instruction\
    \ in a Dockerfile creates a new layer, combining commands into as few lines as\
    \ necessary reduces overhead.\n\n### Variables and Secrets\n\nDon’t use variables\
    \ to pass secrets to images or containers! As you can see, environment variables\
    \ set during the build persist into the final image and are inherited by containers!\
    \ Instead, use Docker secrets discussed in the section on `RUN` later in the chapter.\n\
    \n## LABEL\n\nLabels are optional instructions for setting image metadata. It’s\
    \ considered good practice to add labels to images, particularly for injecting\
    \ usage information users might find helpful for running your images.\n\nLike\
    \ `ENV`, labels are key-value pairs, and a single `LABEL` instruction can set\
    \ multiple labels. The value of a label should be enclosed in double quotes. Any\
    \ arguments or environment variables set during the build and included in a label\
    \ are reflected in the image metadata. Consider the partial contents of a Dockerfile\
    \ with some arguments, environment variables, and labels:\n\n```dockerfile\nARG\
    \ ORACLE_BASE=/opt/oracle\nENV ORACLE_BASE=$ORACLE_BASE \\\n    ORACLE_HOME=$ORACLE_HOME\
    \ \\\n    PATH=$PATH:$ORACLE_HOME/bin\nLABEL \"oracle_home\"=\"$ORACLE_HOME\"\
    \ \\\n      \"oracle_base\"=\"$ORACLE_BASE\" \\\n      \"description\"=\"This\
    \ is a database image\"\n```\n\nThe metadata of the final image contains three\
    \ labels (assuming the argument for `ORACLE_BASE` isn’t overridden during the\
    \ build):\n\n```json\n\"Labels\": {\n    \"description\" = \"This is a database\
    \ image\"\n    \"oracle_base\"=\"/opt/oracle\"\n    \"oracle_home\"=/opt/oracle/product/19c/dbhome_1\"\
    \n}\n```\n\nLabels are unstructured, and there are no strict rules covering what\
    \ should and shouldn’t be labeled. They often capture image properties such as\
    \ volumes, ports, and contact information. In this case, the convention for label\
    \ names is to separate elements with dots, such as `function.name`. There are\
    \ good examples in the Oracle Dockerfile. It sets the following labels:\n\n```dockerfile\n\
    LABEL \"provider\"=\"Oracle\"                                       \\\n     \
    \ \"issues\"=\"https://github.com/oracle/docker-images/issues\" \\\n      \"volume.data\"\
    =\"/opt/oracle/oradata\"                       \\\n      \"volume.setup.location1\"\
    =\"/opt/oracle/scripts/setup\"      \\\n      \"volume.setup.location2\"=\"/docker-entrypoint-initdb.d/setup\"\
    \ \\\n      \"volume.startup.location1\"=\"/opt/oracle/scripts/startup\"  \\\n\
    \      \"volume.startup.location2\"=\"/docker-entrypoint-initdb.d/startup\" \\\
    \n      \"port.listener\"=\"1521\"                                    \\\n   \
    \   \"port.oemexpress\"=\"5500\"\n```\n\nTo view an image’s label metadata, run\
    \ the `inspect` command and review the `Labels` section:\n\n```json\n\"Labels\"\
    : {\n    \"issues\": \"https://github.com/oracle/docker-images/issues\",\n   \
    \ \"port.listener\": \"1521\",\n    \"port.oemexpress\": \"5500\",\n    \"provider\"\
    : \"Oracle\",\n    \"volume.data\": \"/opt/oracle/oradata\",\n    \"volume.setup.location1\"\
    : \"/opt/oracle/scripts/setup\",\n    \"volume.setup.location2\": \"/docker-entrypoint-initdb.d/setup\"\
    ,\n    \"volume.startup.location1\": \"/opt/oracle/scripts/startup\",\n    \"\
    volume.startup.location2\": \"/docker-entrypoint-initdb.d/startup\"\n}\n```\n\n\
    To limit and format the output of `docker inspect` to only display labels:\n\n\
    ```bash\ndocker inspect \\\n    --format='{{range $p,$i:=.Config.Labels}}{{printf\
    \ \"%s = %s\\n\" $p $i}}{{end}}' \\\n    <image_name>\n```\n\nThe result:\n\n\
    ```text\nissues = https://github.com/oracle/docker-images/issues\nport.listener\
    \ = 1521\nport.oemexpress = 5500\nprovider = Oracle\nvolume.data = /opt/oracle/oradata\n\
    volume.setup.location1 = /opt/oracle/scripts/setup\nvolume.setup.location2 = /docker-entrypoint-initdb.d/setup\n\
    volume.startup.location1 = /opt/oracle/scripts/startup\nvolume.startup.location2\
    \ = /docker-entrypoint-initdb.d/startup\n```\n\n## USER\n\nIn the section on layers,\
    \ you saw that the `USER` instruction sets the login user for running commands.\
    \ Docker runs commands as the `root` user by default, but it’s a good practice\
    \ to set the user in your Dockerfile explicitly.\n\nStages in Dockerfiles aren’t\
    \ limited to a single user. It’s perfectly acceptable to set a user, run a command,\
    \ set a new user, run another command, and so on. You see that in Listing [12-1](#514143_1_En_12_Chapter.xhtml#PC1),\
    \ where the user changes from `oracle` to `root` and back to `oracle`. When you\
    \ consider what’s happening during an Oracle database software installation, it\
    \ parallels the manual steps:\n\n*   As the `oracle` user, prepare the environment,\
    \ copy and unzip the installation files, and run the installation.\n*   As the\
    \ `root` user, run the post-installation root scripts.\n*   As the `oracle` user,\
    \ finalize the installation.\n\nThe `USER` command is a “cooking instruction”\
    \ affecting the commands that follow. It sets the active user (and with it the\
    \ group) ID, and the rules are no different than you’d experience were you directly\
    \ logged into a system. The active user must have the proper permissions on files\
    \ and directories to successfully copy or execute files. The results inherit permissions\
    \ just as they do in a typical environment.\n\n## COPY\n\nThe `COPY` instruction\
    \ adds ingredients into images, copying source files from the local system to\
    \ a destination inside the image. It follows the same general rules as the Linux\
    \ `cp` command, including the ordering syntax of source followed by destination\
    \ and how it interprets wildcards and regular expressions.\n\nThe Dockerfile in\
    \ Oracle’s container repository includes some examples of `COPY` in practice:^([^(65)](#fn65))\n\
    \n```dockerfile\nCOPY $SETUP_LINUX_FILE $CHECK_SPACE_FILE $INSTALL_DIR/\n```\n\
    \nA single `COPY` instruction can add multiple source files to a single directory,\
    \ as seen here, where the `$SETUP_LINUX_FILE` and `$CHECK_SPACE_FILE` are copied\
    \ to the `$INSTALL_DIR` directory. The last argument is the destination, while\
    \ everything before is interpreted as a source."
  raw: '### Build Dockerfile Templates with Arguments


    The `FROM` command must be the first command in a Dockerfile. It makes sense—it’s
    challenging to do anything without a starting image! The single exception that
    proves the rule is the `ARG` command.


    A Dockerfile can have arguments as the first instructions and use those arguments
    in a `FROM` command. It’s helpful for writing Dockerfile templates that add flexibility
    to builds. For instance, all the database images we’ve worked with so far use
    Oracle Enterprise Linux 7-slim as the base image. That image name is hard-coded
    into the `FROM` statement. But what if we wanted to use a different version? Rewriting
    the Dockerfile and changing the image is one option. Another is using an argument-based
    image:


    ```

    ARG IMAGE_TAG=7-slim

    FROM oraclelinux:$IMAGE_TAG

    ```


    A Dockerfile written this way is more flexible and potentially future-proof.


    ### Assign Multiple Variables


    Another difference between `ARG` and `ENV` is that arguments must be set individually,
    but a single `ENV` command can set multiple variables:


    ```

    ARG VAR1=VALUE1

    ARG VAR2=VALUE2

    ARG VAR3=VALUE3

    ENV VAR1=VALUE1 \

    VAR2=VALUE2 \

    VAR3=VALUE3

    ```


    The backslash (`\`) is a continuation character that tells Linux there’s more
    to the command on the following line. The preceding `ENV` command could also be
    written as


    ```

    ENV VAR1=VALUE1 VAR2=VALUE2 VAR3=VALUE3

    ```


    The advantage of the first method is clarity. Each variable could also be defined
    in separate `ENV` commands, but since every instruction in a Dockerfile creates
    a new layer, combining commands into as few lines as necessary reduces overhead.


    ### Variables and Secrets


    Don’t use variables to pass secrets to images or containers! As you can see, environment
    variables set during the build persist into the final image and are inherited
    by containers! Instead, use Docker secrets discussed in the section on `RUN` later
    in the chapter.


    ## LABEL


    Labels are optional instructions for setting image metadata. It’s considered good
    practice to add labels to images, particularly for injecting usage information
    users might find helpful for running your images.


    Like `ENV`, labels are key-value pairs, and a single `LABEL` instruction can set
    multiple labels. The value of a label should be enclosed in double quotes. Any
    arguments or environment variables set during the build and included in a label
    are reflected in the image metadata. Consider the partial contents of a Dockerfile
    with some arguments, environment variables, and labels:


    ```

    ARG ORACLE_BASE=/opt/oracle

    ENV ORACLE_BASE=$ORACLE_BASE \

    ORACLE_HOME=$ORACLE_HOME \

    PATH=$PATH:$ORACLE_HOME/bin

    LABEL "oracle_home"="$ORACLE_HOME" \

    "oracle_base"="$ORACLE_BASE" \

    "description"="This is a database image"

    ```


    The metadata of the final image contains three labels (assuming the argument for
    `ORACLE_BASE` isn’t overridden during the build):


    ```

    "Labels": {

    "description" = "This is a database image"

    "oracle_base"="/opt/oracle"

    "oracle_home"=/opt/oracle/product/19c/dbhome_1"

    }

    ```


    Labels are unstructured, and there are no strict rules covering what should and
    shouldn’t be labeled. They often capture image properties such as volumes, ports,
    and contact information. In this case, the convention for label names is to separate
    elements with dots, such as `function.name`. There are good examples in the Oracle
    Dockerfile. It sets the following labels:


    ```

    LABEL "provider"="Oracle"                                       \

    "issues"="https://github.com/oracle/docker-images/issues" \

    "volume.data"="/opt/oracle/oradata"                       \

    "volume.setup.location1"="/opt/oracle/scripts/setup"      \

    "volume.setup.location2"="/docker-entrypoint-initdb.d/setup" \

    "volume.startup.location1"="/opt/oracle/scripts/startup"  \

    "volume.startup.location2"="/docker-entrypoint-initdb.d/startup" \

    "port.listener"="1521"                                    \

    "port.oemexpress"="5500"

    ```


    To view an image’s label metadata, run the `inspect` command and review the `Labels`
    section:


    ```

    "Labels": {

    "issues": "https://github.com/oracle/docker-images/issues",

    "port.listener": "1521",

    "port.oemexpress": "5500",

    "provider": "Oracle",

    "volume.data": "/opt/oracle/oradata",

    "volume.setup.location1": "/opt/oracle/scripts/setup",

    "volume.setup.location2": "/docker-entrypoint-initdb.d/setup",

    "volume.startup.location1": "/opt/oracle/scripts/startup",

    "volume.startup.location2": "/docker-entrypoint-initdb.d/startup"

    }

    ```


    To limit and format the output of `docker inspect` to only display labels:


    ```

    docker inspect \

    --format=''{{range $p,$i:=.Config.Labels}}{{printf "%s = %s\n" $p $i}}{{end}}''
    \


    ```


    The result:


    ```

    issues = https://github.com/oracle/docker-images/issues

    port.listener = 1521

    port.oemexpress = 5500

    provider = Oracle

    volume.data = /opt/oracle/oradata

    volume.setup.location1 = /opt/oracle/scripts/setup

    volume.setup.location2 = /docker-entrypoint-initdb.d/setup

    volume.startup.location1 = /opt/oracle/scripts/startup

    volume.startup.location2 = /docker-entrypoint-initdb.d/startup

    ```


    ## USER


    In the section on layers, you saw that the `USER` instruction sets the login user
    for running commands. Docker runs commands as the `root` user by default, but
    it’s a good practice to set the user in your Dockerfile explicitly.


    Stages in Dockerfiles aren’t limited to a single user. It’s perfectly acceptable
    to set a user, run a command, set a new user, run another command, and so on.
    You see that in Listing [12-1](#514143_1_En_12_Chapter.xhtml#PC1), where the user
    changes from `oracle` to `root` and back to `oracle`. When you consider what’s
    happening during an Oracle database software installation, it parallels the manual
    steps:


    *   As the `oracle` user, prepare the environment, copy and unzip the installation
    files, and run the installation.


    *   As the `root` user, run the post-installation root scripts.


    *   As the `oracle` user, finalize the installation.


    The `USER` command is a “cooking instruction” affecting the commands that follow.
    It sets the active user (and with it the group) ID, and the rules are no different
    than you’d experience were you directly logged into a system. The active user
    must have the proper permissions on files and directories to successfully copy
    or execute files. The results inherit permissions just as they do in a typical
    environment.


    ## COPY


    The `COPY` instruction adds ingredients into images, copying source files from
    the local system to a destination inside the image. It follows the same general
    rules as the Linux `cp` command, including the ordering syntax of source followed
    by destination and how it interprets wildcards and regular expressions.


    The Dockerfile in Oracle’s container repository includes some examples of `COPY`
    in practice:^([^(65)](#fn65))


    ```

    COPY $SETUP_LINUX_FILE $CHECK_SPACE_FILE $INSTALL_DIR/

    ```


    A single `COPY` instruction can add multiple source files to a single directory,
    as seen here, where the `$SETUP_LINUX_FILE` and `$CHECK_SPACE_FILE` are copied
    to the `$INSTALL_DIR` directory. The last argument is the destination, while everything
    before is interpreted as a source.'
  trans: "\n### 使用参数构建 Dockerfile 模板\n\n`FROM` 命令必须是 Dockerfile 中的第一条命令。这很合理——没有起始镜像就几乎无法进行任何操作！唯一的例外情况是\
    \ `ARG` 命令。\n\nDockerfile 可以将参数作为首条指令，并在 `FROM` 命令中使用这些参数。这对于编写能增加构建灵活性的 Dockerfile\
    \ 模板很有帮助。例如，到目前为止我们使用过的所有数据库镜像都以 Oracle Enterprise Linux 7-slim 作为基础镜像。该镜像名称是硬编码在\
    \ `FROM` 语句中的。但如果我们想使用不同版本怎么办？重写 Dockerfile 并更改镜像是一个选项。另一个选项是使用基于参数的镜像：\n\n```dockerfile\n\
    ARG IMAGE_TAG=7-slim\nFROM oraclelinux:$IMAGE_TAG\n```\n\n以这种方式编写的 Dockerfile\
    \ 更加灵活，并可能具有前瞻性。\n\n### 赋值多个变量\n\n`ARG` 和 `ENV` 的另一个区别在于，参数必须单独设置，但单个 `ENV` 命令可以设置多个变量：\n\
    \n```dockerfile\nARG VAR1=VALUE1\nARG VAR2=VALUE2\nARG VAR3=VALUE3\nENV VAR1=VALUE1\
    \ \\\n    VAR2=VALUE2 \\\n    VAR3=VALUE3\n```\n\n反斜杠 (`\\`) 是一个续行符，它告诉 Linux\
    \ 后续行中还有命令。上面的 `ENV` 命令也可以写作：\n\n```dockerfile\nENV VAR1=VALUE1 VAR2=VALUE2 VAR3=VALUE3\n\
    ```\n\n第一种方法的优势在于清晰。每个变量也可以在单独的 `ENV` 命令中定义，但由于 Dockerfile 中的每条指令都会创建一个新层，因此将命令合并到尽可能少的行中可以减少开销。\n\
    \n### 变量与秘密\n\n不要使用变量向镜像或容器传递秘密！如你所见，构建期间设置的环境变量会持久存在于最终镜像中，并被容器继承！相反，请使用本章稍后关于\
    \ `RUN` 一节中讨论的 Docker secrets。\n\n## LABEL（标签）\n\n标签是用于设置镜像元数据的可选指令。为镜像添加标签被认为是良好的实践，尤其是注入用户可能发现对运行你的镜像有用的使用信息。\n\
    \n与 `ENV` 类似，标签是键值对，单个 `LABEL` 指令可以设置多个标签。标签的值应使用双引号括起来。构建期间设置并包含在标签中的任何参数或环境变量都会反映在镜像元数据中。考虑一个包含一些参数、环境变量和标签的\
    \ Dockerfile 部分内容：\n\n```dockerfile\nARG ORACLE_BASE=/opt/oracle\nENV ORACLE_BASE=$ORACLE_BASE\
    \ \\\n    ORACLE_HOME=$ORACLE_HOME \\\n    PATH=$PATH:$ORACLE_HOME/bin\nLABEL\
    \ \"oracle_home\"=\"$ORACLE_HOME\" \\\n      \"oracle_base\"=\"$ORACLE_BASE\"\
    \ \\\n      \"description\"=\"This is a database image\"\n```\n\n最终镜像的元数据包含三个标签（假设\
    \ `ORACLE_BASE` 的参数在构建期间未被覆盖）：\n\n```json\n\"Labels\": {\n    \"description\"\
    \ = \"This is a database image\"\n    \"oracle_base\"=\"/opt/oracle\"\n    \"\
    oracle_home\"=/opt/oracle/product/19c/dbhome_1\"\n}\n```\n\n标签是非结构化的，并且没有严格规定什么应该标记、什么不应该标记。它们通常捕获镜像的属性，如卷、端口和联系信息。在这种情况下，标签名称的惯例是用点分隔元素，例如\
    \ `function.name`。Oracle Dockerfile 中有很好的例子。它设置了以下标签：\n\n```dockerfile\nLABEL\
    \ \"provider\"=\"Oracle\"                                       \\\n      \"issues\"\
    =\"https://github.com/oracle/docker-images/issues\" \\\n      \"volume.data\"\
    =\"/opt/oracle/oradata\"                       \\\n      \"volume.setup.location1\"\
    =\"/opt/oracle/scripts/setup\"      \\\n      \"volume.setup.location2\"=\"/docker-entrypoint-initdb.d/setup\"\
    \ \\\n      \"volume.startup.location1\"=\"/opt/oracle/scripts/startup\"  \\\n\
    \      \"volume.startup.location2\"=\"/docker-entrypoint-initdb.d/startup\" \\\
    \n      \"port.listener\"=\"1521\"                                    \\\n   \
    \   \"port.oemexpress\"=\"5500\"\n```\n\n要查看镜像的标签元数据，运行 `inspect` 命令并查看 `Labels`\
    \ 部分：\n\n```json\n\"Labels\": {\n    \"issues\": \"https://github.com/oracle/docker-images/issues\"\
    ,\n    \"port.listener\": \"1521\",\n    \"port.oemexpress\": \"5500\",\n    \"\
    provider\": \"Oracle\",\n    \"volume.data\": \"/opt/oracle/oradata\",\n    \"\
    volume.setup.location1\": \"/opt/oracle/scripts/setup\",\n    \"volume.setup.location2\"\
    : \"/docker-entrypoint-initdb.d/setup\",\n    \"volume.startup.location1\": \"\
    /opt/oracle/scripts/startup\",\n    \"volume.startup.location2\": \"/docker-entrypoint-initdb.d/startup\"\
    \n}\n```\n\n要限制并格式化 `docker inspect` 的输出，仅显示标签：\n\n```bash\ndocker inspect \\\n\
    \    --format='{{range $p,$i:=.Config.Labels}}{{printf \"%s = %s\\n\" $p $i}}{{end}}'\
    \ \\\n    <image_name>\n```\n\n结果：\n\n```text\nissues = https://github.com/oracle/docker-images/issues\n\
    port.listener = 1521\nport.oemexpress = 5500\nprovider = Oracle\nvolume.data =\
    \ /opt/oracle/oradata\nvolume.setup.location1 = /opt/oracle/scripts/setup\nvolume.setup.location2\
    \ = /docker-entrypoint-initdb.d/setup\nvolume.startup.location1 = /opt/oracle/scripts/startup\n\
    volume.startup.location2 = /docker-entrypoint-initdb.d/startup\n```\n\n## USER（用户）\n\
    \n在关于层的部分，你看到了 `USER` 指令设置运行命令的登录用户。Docker 默认以 `root` 用户身份运行命令，但在你的 Dockerfile\
    \ 中显式设置用户是良好的实践。\n\nDockerfile 中的构建阶段不限于单个用户。完全允许设置一个用户，运行一条命令，设置一个新用户，运行另一条命令，依此类推。你在清单\
    \ 12-1 中看到了这一点，其中用户从 `oracle` 切换到 `root`，然后又切换回 `oracle`。当你考虑在 Oracle 数据库软件安装过程中发生的事情时，它与手动步骤是类似的：\n\
    \n*   以 `oracle` 用户身份，准备环境，复制并解压安装文件，然后运行安装。\n*   以 `root` 用户身份，运行安装后的 root 脚本。\n\
    *   以 `oracle` 用户身份，完成安装。\n\n`USER` 命令是一条“烹饪指令”，影响其后的命令。它设置活动用户（以及随之的组）ID，其规则与你直接登录系统时所经历的并无不同。活动用户必须对文件和目录拥有适当的权限，才能成功复制或执行文件。结果继承权限，正如在典型环境中一样。\n\
    \n## COPY（复制）\n\n`COPY` 指令将“原料”添加到镜像中，将源文件从本地系统复制到镜像内部的目标位置。它遵循与 Linux `cp` 命令相同的一般规则，包括源文件后跟目标的顺序语法，以及它如何解释通配符和正则表达式。\n\
    \nOracle 容器仓库中的 Dockerfile 包含一些实际使用 `COPY` 的示例：^(⁶⁵)\n\n```dockerfile\nCOPY $SETUP_LINUX_FILE\
    \ $CHECK_SPACE_FILE $INSTALL_DIR/\n```\n\n单个 `COPY` 指令可以将多个源文件添加到单个目录中，如此处所见，其中\
    \ `$SETUP_LINUX_FILE` 和 `$CHECK_SPACE_FILE` 被复制到 `$INSTALL_DIR` 目录。最后一个参数是目标，而之前的所有内容都被解释为源。\n"
- fmt: "### Setting Ownership\n\n文件在复制到镜像时，其所有者被设为当前阶段设置的用户。如果后续需要由其他用户修改或执行这些文件，则必须更改其所有权。我们可以通过两步完成该操作——先复制文件，然后更改所有权——但\
    \ `COPY` 指令提供了一个同时完成这两件事的便捷选项：`--chown` 标志。使用 `--chown=<USER>:<GROUP>`，可以在 `COPY`\
    \ 命令本身中设置用户（以及可选的组）所有权：\n\n```dockerfile\nCOPY --chown=oracle:dba $INSTALL_FILE_1\
    \ $INSTALL_RSP $INSTALL_DB_BINARIES_FILE $INSTALL_DIR/\n```\n\n此示例来自 Oracle 容器仓库，它复制三个文件：数据库安装\
    \ zip 文件（`$INSTALL_FILE_1`）以及软件安装和响应文件（`$INSTALL_DB_BINARIES_FILE` 和 `$INSTALL_RSP`，在第\
    \ [11](#514143_1_En_11_Chapter.xhtml) 章讨论）到安装目录路径，并将其所有权设置为 `oracle` 用户和 `dba`\
    \ 组。这样，`oracle` 用户随后就拥有在构建后期更新和运行文件所需的必要权限。\n\n### 构建过程中的上下文\n\n回顾这些 `COPY` 命令的示例，注意它们使用*相对路径*引用文件。*绝对路径*是相对于文件系统根目录完全限定的，例如\
    \ `/etc/oratab`。绝对路径以斜杠开头，而相对路径则基于当前工作目录引用文件系统上的位置。如果我的当前工作目录是 `/etc`，那么指向 `oratab`\
    \ 文件的相对路径就是 `oratab`。绝对路径是精确的——它明确指代了哪个文件或目录。而相对路径，顾名思义，是相对的。它们需要某种*上下文*。\n\n\
    在 Docker 中，这个*构建上下文*就是运行构建的目录。如果 `Dockerfile` 是我们的食谱，那么上下文就是厨房，而 `COPY` 就是寻找每种食材的说明。我设置上下文（导航到厨房），并在开始前收集所有食材。（如果你曾经在别人的厨房里做饭，可以把\
    \ `COPY` 命令想象成询问盐放在哪里！）\n\n上下文不仅对构建的成功至关重要。它也会影响构建的速度和大小。如何影响？列表 [12-3](#514143_1_En_12_Chapter.xhtml#PC29)\
    \ 展示了一个虚构的目录树，我将数据库安装文件整合到了一个子目录 `db_files` 中。用于构建镜像的脚本在第二个子目录 `scripts` 中。\n\n\
    ```bash\n> tree .\n.\n├── db_files\n│   ├── linuxamd64_12102_database_1of2.zip\n\
    │   ├── linuxamd64_12102_database_2of2.zip\n│   ├── linuxamd64_12102_database_se2_1of2.zip\n\
    │   ├── linuxamd64_12102_database_se2_2of2.zip\n│   ├── linuxx64_12201_database.zip\n\
    │   ├── LINUX.X64_180000_db_home.zip\n│   ├── LINUX.X64_193000_db_home.zip\n│\
    \   └── LINUX.X64_213000_db_home.zip\n└── scripts\n    ├── checkDBStatus.sh\n\
    \    ├── checkSpace.sh\n    ├── createDB.sh\n    ├── dbca.rsp.tmpl\n    ├── db_inst.rsp\n\
    \    ├── installDBBinaries.sh\n    ├── runOracle.sh\n    ├── runUserScripts.sh\n\
    \    ├── setPassword.sh\n    ├── setupLinuxEnv.sh\n    └── startDB.sh\n```\n\n\
    **列表 12-3** 一个虚构的替代目录结构，将安装介质和管理脚本整合到各自的目录中\n\n当从此目录开始构建时，Docker 会对上下文——即运行构建的目录*及其所有子目录*——进行清点。它会编目*所有*可用的食材，无论它们是否在食谱中用到。`db_files`\
    \ 目录下的数据库安装介质每个版本大约有 3GB 到 4GB。Docker 将*所有这些文件*（将近 19GB）读入其上下文中。这不仅不必要地耗时，而且浪费了\
    \ Docker 引擎的内存和存储空间。\n\n回想一下第 [4](#514143_1_En_4_Chapter.xhtml) 章。你将数据库安装文件复制到了一个特定于版本的目录中。将每个版本的文件分开保存在各自的目录中，可以减少构建上下文。每个目录都是它自己的厨房，只包含准备单个数据库版本所需的工具和食材。\n\
    \n上下文也会影响镜像大小。`COPY` 接受目录作为源，并支持通配符和正则表达式。但要小心！基于列表 [12-3](#514143_1_En_12_Chapter.xhtml#PC29)\
    \ 中的目录结构，以下命令对构建上下文同样不利，但第二个命令会增大镜像大小：\n\n```dockerfile\nCOPY db_files/LINUX.X64_193000_db_home.zip\
    \ /opt/install\nCOPY db_files/LINUX* /opt/install\n```\n\n在每种情况下，上下文都包括整个 19GB\
    \ 的 `db_files` 目录，但是：\n*   第一个命令只复制单个文件 `LINUX.X64_193000_db_home.zip` 到镜像中。\n\
    *   第二个命令使用通配符将所有以 `LINUX` 开头的文件复制到 `/opt/install` 目录，为镜像增加了 7.2GB！\n\n基于通配符和完整目录的复制操作很方便，但可能会将机密信息引入镜像。我可以复制整个\
    \ `scripts` 目录：\n\n```dockerfile\nCOPY scripts /home/oracle\n```\n\n这会将 `scripts`\
    \ 目录的内容（相对于运行构建的目录）复制到镜像的 `/home/oracle` 目录。如果 `scripts` 目录中存在密钥、证书或其他敏感信息，它们现在就成了镜像的一部分！任何能够访问该镜像（或使用该镜像的容器）的人都可以看到并读取该信息！请将\
    \ Docker 构建所需的脚本和文件保存在单独的专用目录中。这不仅会缩短构建时间并节省资源，还减少了共享私有信息的可能性^([^(66)](#fn66))。"
  raw: '### Setting Ownership


    Files copied into images are owned by the current user set in the stage. The ownership
    must change if they need to be modified or executed later by a different user.
    We can accomplish that in two steps—copy the files, then change the ownership—but
    `COPY` has a facility to do both at once: the `--chown` flag. With `--chown=<USER>:<GROUP>`,
    the user (and optionally group) ownership is set within the `COPY` command itself:


    ```

    COPY --chown=oracle:dba $INSTALL_FILE_1 $INSTALL_RSP $INSTALL_DB_BINARIES_FILE
    $INSTALL_DIR/

    ```


    This example from the Oracle container repository copies three files, the database
    installation zip file (`$INSTALL_FILE_1`) and the software installation and response
    files (`$INSTALL_DB_BINARIES_FILE` and `$INSTALL_RSP`, discussed in Chapter [11](#514143_1_En_11_Chapter.xhtml)),
    to the installation directory path and sets their ownership to the `oracle` user
    and `dba` group. The `oracle` user then has the necessary rights to update and
    run the files later in the build.


    ### Context in the Build Process


    Look back on these examples of `COPY` commands and notice that they reference
    files using a *relative path*. An *absolute path* is fully qualified against the
    filesystem root, like `/etc/oratab`. Absolute paths begin with a slash, while
    relative paths reference locations on a filesystem based on the current working
    directory. If my current working directory is `/etc`, the relative path to the
    `oratab` file is just `oratab`. Absolute paths are precise—there’s no question
    about what file or directory we’re talking about. Relative paths are, well, relative.
    They require some sort of *context*.


    In Docker, this *build context* is the directory where the build runs. If the
    Dockerfile is our recipe, the context is the kitchen and `COPY` the instructions
    for finding each ingredient. I set the context—navigating to the kitchen—and assemble
    all the ingredients before beginning. (If you’ve ever prepared a meal in someone
    else’s kitchen, think of the `COPY` command as asking where they keep the salt!)


    Context isn’t only crucial for the success of a build. It also affects the speed
    and size of the build process. How? Listing [12-3](#514143_1_En_12_Chapter.xhtml#PC29)
    shows a fictitious directory tree, where I consolidated database installation
    files into one subdirectory, `db_files`. The scripts used to construct an image
    are in a second subdirectory, `scripts`.


    ```

    > tree .

    .

    ├── db_files

    │   ├── linuxamd64_12102_database_1of2.zip

    │   ├── linuxamd64_12102_database_2of2.zip

    │   ├── linuxamd64_12102_database_se2_1of2.zip

    │   ├── linuxamd64_12102_database_se2_2of2.zip

    │   ├── linuxx64_12201_database.zip

    │   ├── LINUX.X64_180000_db_home.zip

    │   ├── LINUX.X64_193000_db_home.zip

    │   └── LINUX.X64_213000_db_home.zip

    └── scripts

    ├── checkDBStatus.sh

    ├── checkSpace.sh

    ├── createDB.sh

    ├── dbca.rsp.tmpl

    ├── db_inst.rsp

    ├── installDBBinaries.sh

    ├── runOracle.sh

    ├── runUserScripts.sh

    ├── setPassword.sh

    ├── setupLinuxEnv.sh

    └── startDB.sh

    Listing 12-3

    An alternative, fictitious directory structure consolidating installation media
    and management scripts into their directories

    ```


    When starting a build from this directory, Docker performs an inventory of the
    context—the directory where the build is running *and all its subdirectories*.
    It’s cataloging *all* the available ingredients, whether they’re used in the recipe
    or not. The database installation media under the `db_files` directory are roughly
    3GB to 4GB per version. Docker reads *all of these files*, or just shy of 19GB,
    into its context. It’s unnecessarily time-consuming and wastes memory and storage
    in the Docker engine.


    Think back to Chapter [4](#514143_1_En_4_Chapter.xhtml). You copied the database
    installation files into a version-specific directory. Keeping the files for each
    version separate, in their own directories, reduces build context. Each directory
    is its own kitchen, containing only the tools and ingredients necessary for preparing
    a single database version.


    Context can affect image size, too. `COPY` accepts directories as a source and
    works with wildcards and regular expressions. But be careful! Working from the
    same directory structure in Listing [12-3](#514143_1_En_12_Chapter.xhtml#PC29),
    the following commands are equally bad for build context, but the second inflates
    the image size:


    ```

    COPY db_files/LINUX.X64_193000_db_home.zip /opt/install

    COPY db_files/LINUX* /opt/install

    ```


    In each case, the context includes the whole 19GB `db_files` directory, but


    *   The first command only copies a single file, `LINUX.X64_193000_db_home.zip`,
    into the image.


    *   The second command uses a wildcard to copy all files beginning with `LINUX`
    into the `/opt/install` directory, adding 7.2GB to the image!


    Wildcard-based and full directory copy operations are convenient but may introduce
    confidential information into images. I can copy the full `scripts` directory:


    ```

    COPY scripts /home/oracle

    ```


    This copies the contents of the `scripts` directory (relative to the directory
    where the build runs) into the image’s `/home/oracle` directory. If keys, certificates,
    or other sensitive information exist in the `scripts` directory, they’re now part
    of the image! Anyone with access to the image (or the containers that use the
    image) can see and read that information! Keep the scripts and files needed for
    Docker builds in separate, dedicated directories. Not only will it shorten build
    time and save resources, but it also reduces the likelihood of sharing private
    information.^([^(66)](#fn66))'
