  raw: '### Use the Setup Entrypoint


    We introduced Docker’s *entrypoint directories* in Chapter [7](#514143_1_En_7_Chapter.xhtml).
    If you need a quick refresher, the entrypoint is a special path in Docker, usually
    `/docker-entrypoint-initdb.d`, for mounting a local host directory. Container
    startup scripts may look here for scripts and run them. I say they *may* look
    here because it’s up to the author—it’s not an automatic feature, and if the startup
    script doesn’t recognize the directory (or looks elsewhere), Docker treats the
    files mounted at the entrypoint as, well, files!


    Oracle’s container repository recognizes entrypoints at the standard location,
    `/docker-entrypoint-initdb.d`, and `/opt/oracle/scripts`. It expects two subdirectories—`setup`
    and `startup`—searching them for scripts with either a `.sh` or `.sql` suffix.
    Automation built into the container checks for files in the `setup` directory
    and runs them once only after the initial database creation completes.^([^(71)](#fn71))
    The files in the `startup` directory run every time the container starts—including
    after the initial database setup.


    Here are a few tips and cautions when using entrypoints in database containers.


    Files in entrypoint directories are processed in alphanumeric order, regardless
    of the file type. Name files in the `setup` and `scripts` directory with numeric
    prefixes to guarantee their execution order:


    `01_add_pdb.sh`


    `02_add_users.sql`


    `03_update_passwords.sql`


    Shell scripts, with the `.sh` suffix, are executed as the container’s default
    user, `oracle`. SQL scripts are passed to SQL*Plus and run as the `SYSDBA` user.


    Remember to set the container in the script for SQL commands intended for pluggable
    databases.


    Files mounted in the `startup` directory run every time a container starts. They’re
    not part of the image. Changes to these files on the local host (or in other containers)
    reflect into all containers sharing the host directory, potentially leading to
    unexpected behavior and failures when containers restart. Remember this when using
    a shared directory for multiple containers and when changing files!


    The `setup` entrypoint lets us invoke the Database Configuration Assistant with
    the `-createPluggabledatabase` option and add pluggable databases via a script
    like the one shown in Listing [13-1](#514143_1_En_13_Chapter.xhtml#PC16).


    ```

    #!/bin/bash

    # Create an additional pluggable database.

    $ORACLE_HOME/bin/dbca -silent -createPluggableDatabase -pdbName PDB2 -sourceDB
    $ORACLE_SID -createAsClone true -createPDBFrom DEFAULT -pdbAdminPassword "oracle123"
    || exit 1

    cat > $ORACLE_HOME/network/admin/tnsnames.ora

    PDB2 =

    (DESCRIPTION =

    (ADDRESS = (PROTOCOL = TCP)(HOST = 0.0.0.0)(PORT = 1521))

    (CONNECT_DATA =

    (SERVER = DEDICATED)

    (SERVICE_NAME = PDB2)

    )

    )

    EOF

    $ORACLE_HOME/bin/sqlplus / as sysdba << EOF

    alter pluggable database PDB2 save state;

    EOF

    Listing 13-1

    A setup script for creating an additional pluggable database, adding a TNS entry,
    and setting the pluggable database state. Save the file to a directory and mount
    it to a volume at either /dockerfile-entrypoint-initdb.d/setup or /opt/oracle/scripts/setup

    ```


    I named this file `01_add_pdb.sh` and ran a new container called `SETUP` to demonstrate
    the call to the script:


    ```

    docker run -d --name SETUP \

    -e ORACLE_SID=ORCLPDB \

    -e ORACLE_PDB=PDB1 \

    -v ~/setup:/opt/oracle/scripts/setup \

    oracle/database:19.3.0-ee

    ```


    Docker calls the usual database creation scripts. When DBCA completes, the script
    reads the contents of the `setup` directory and runs files with a `.sh` or `.sql`
    suffix. It finds and runs the `01_add_pdb.sh` script in the setup location. The
    tail output in Listing [13-2](#514143_1_En_13_Chapter.xhtml#PC18) shows the tail
    end of the `docker logs` output where the custom user script ran and created the
    pluggable database.


    ```

    Executing user defined scripts

    /opt/oracle/runUserScripts.sh: running /opt/oracle/scripts/setup/01_add_pdb.sh

    Prepare for db operation

    13% complete

    Creating Pluggable Database

    15% complete

    19% complete

    23% complete

    31% complete

    53% complete

    Completing Pluggable Database Creation

    60% complete

    Executing Post Configuration Actions

    100% complete

    Pluggable database "PDB2" plugged successfully.

    Look at the log file "/opt/oracle/cfgtoollogs/dbca/CDB/PDB2/CDB.log" for further
    details.

    SQL*Plus: Release 19.0.0.0.0 - Production on Wed Jan 17 17:55:13 2022

    Version 19.3.0.0.0

    Copyright (c) 1982, 2019, Oracle.  All rights reserved.

    Connected to:

    Oracle Database 19c Enterprise Edition Release 19.0.0.0.0 - Production

    Version 19.3.0.0.0

    SQL>

    Pluggable database altered.

    SQL> Disconnected from Oracle Database 19c Enterprise Edition Release 19.0.0.0.0
    - Production

    Version 19.3.0.0.0

    DONE: Executing user defined scripts

    The Oracle base remains unchanged with value /opt/oracle

    #########################

    DATABASE IS READY TO USE!

    #########################

    Listing 13-2

    Output from docker logs showing custom user script execution during container
    creation. The 01_add_pdb.sh script creates a pluggable database, named PDB2\.
    When it completes, it returns control to the createDB.sh script, which in turn
    reports the database is ready for users

    ```


    The example in Listing [13-1](#514143_1_En_13_Chapter.xhtml#PC16) creates a single
    pluggable database using a fixed name and password. It works for a limited, specific
    case. What if we wanted to create multiple pluggable databases or needed a more
    flexible solution to add PDBs based on a runtime condition?


    Let’s extend the original script as seen in Listing [13-3](#514143_1_En_13_Chapter.xhtml#PC19).
    Instead of a static value for the PDB name, the script checks to see whether a
    new environment variable, `PDB_LIST`, is set. The variable represents a comma-delimited
    list of one or more pluggable database names to add once database creation finishes.
    It loops over each list element and performs the same steps as the original version—create
    a new PDB, add a TNS entry, and set the PDB state—but does so dynamically.


    ```

    #!/bin/bash

    # Create additional pluggable databases.

    if [ -n "$PDB_LIST" ] # A PDB list is defined

    then

    # Capture the existing IFS (Internal Field Separator)

    OLDIFS=$IFS

    # Set IFS to a comma before looping:

    IFS=,

    # Loop over PDBs in the list:

    for pdb_name in $PDB_LIST

    do

    # Return IFS to its original value while inside the loop:

    IFS=$OLDIFS

    # Create the PDB:

    $ORACLE_HOME/bin/dbca -silent -createPluggableDatabase -pdbName $pdb_name -sourceDB
    $ORACLE_SID -createAsClone true -createPDBFrom DEFAULT -autoGeneratePasswords
    || exit 1

    # Add a TNS entry:

    cat > $ORACLE_HOME/network/admin/tnsnames.ora

    $pdb_name =

    (DESCRIPTION =

    (ADDRESS = (PROTOCOL = TCP)(HOST = 0.0.0.0)(PORT = 1521))

    (CONNECT_DATA =

    (SERVER = DEDICATED)

    (SERVICE_NAME = $pdb_name)

    )

    )

    EOF

    # Open the PDB, save its state:

    sqlplus / as sysdba << EOF

    alter pluggable database $pdb_name save state;

    EOF

    # Set IFS back to a comma before returning to the next loop step:

    IFS=,

    done

    # Set IFS back to its original value:

    IFS=$OLDIFS

    fi

    Listing 13-3

    This modified script dynamically adds pluggable databases, looping over a comma-delimited
    list of PDB names passed to the container in an environment variable

    ```


    After dropping the original `SETUP` container, I rerun the command, this time
    defining the `PDB_LIST` variable to `"TEST,DEV"`:


    ```

    docker run -d --name SETUP \

    -e ORACLE_SID=ORCLPDB \

    -e ORACLE_PDB=PDB1 \

    -e PDB_LIST="TEST,DEV" \

    -v ~/setup:/opt/oracle/scripts/setup \

    oracle/database:19.3.0-ee

    ```'
  trans: "\n### 使用设置入口点\n\n我们在第 7 章介绍了 Docker 的入口点目录。如果需要快速回顾，入口点是 Docker 中的一个特殊路径，通常是`/docker-entrypoint-initdb.d`，用于挂载本地主机目录。容器启动脚本可能会在这里查找脚本并运行它们。我说它们*可能*会在这里查找，因为这取决于作者——这不是一个自动功能，如果启动脚本不识别该目录（或查看其他地方），Docker\
    \ 会将入口点挂载的文件视为普通文件！\n\nOracle 的容器仓库在标准位置`/docker-entrypoint-initdb.d`和`/opt/oracle/scripts`识别入口点。它需要两个子目录——`setup`和`startup`——在其中搜索后缀为`.sh`或`.sql`的脚本。容器内置的自动化功能会检查`setup`目录中的文件，并在初始数据库创建完成后仅运行它们一次^([71)]。`startup`目录中的文件每次容器启动时都会运行——包括在初始数据库设置之后。\n\
    \n以下是使用数据库容器中的入口点时的一些提示和注意事项。\n\n入口点目录中的文件按字母数字顺序处理，无论文件类型如何。在`setup`和`scripts`目录中命名文件时使用数字前缀，以保证其执行顺序：\n\
    \n`01_add_pdb.sh`\n`02_add_users.sql`\n`03_update_passwords.sql`\n\n后缀为`.sh`的\
    \ Shell 脚本以容器的默认用户`oracle`执行。SQL 脚本传递给 SQL*Plus 并以`SYSDBA`用户运行。\n\n对于针对可插拔数据库的\
    \ SQL 命令，请记住在脚本中设置容器。\n\n挂载在`startup`目录中的文件每次容器启动时都会运行。它们不是镜像的一部分。对本地主机（或其他容器）中这些文件的更改会反映到共享主机目录的所有容器中，当容器重启时，可能导致意外行为和故障。在多个容器使用共享目录以及更改文件时请记住这一点。\n\
    \n`setup`入口点让我们可以使用`-createPluggabledatabase`选项调用数据库配置助理（Database Configuration\
    \ Assistant），并通过如清单 13-1 所示的脚本添加可插拔数据库。\n\n```bash\n#!/bin/bash\n# 创建一个额外的可插拔数据库。\n\
    $ORACLE_HOME/bin/dbca -silent -createPluggableDatabase -pdbName PDB2 -sourceDB\
    \ $ORACLE_SID -createAsClone true -createPDBFrom DEFAULT -pdbAdminPassword \"\
    oracle123\" || exit 1\ncat > $ORACLE_HOME/network/admin/tnsnames.ora\nPDB2 =\n\
    \  (DESCRIPTION =\n    (ADDRESS = (PROTOCOL = TCP)(HOST = 0.0.0.0)(PORT = 1521))\n\
    \    (CONNECT_DATA =\n      (SERVER = DEDICATED)\n      (SERVICE_NAME = PDB2)\n\
    \    )\n  )\nEOF\n$ORACLE_HOME/bin/sqlplus / as sysdba << EOF\nalter pluggable\
    \ database PDB2 save state;\nEOF\n```\n\n**清单 13-1** 一个用于创建额外可插拔数据库、添加 TNS 条目并设置可插拔数据库状态的设置脚本。将文件保存到目录并挂载到`/dockerfile-entrypoint-initdb.d/setup`或`/opt/oracle/scripts/setup`的卷中。\n\
    \n我将此文件命名为`01_add_pdb.sh`，并运行一个名为`SETUP`的新容器来演示对脚本的调用：\n\n```bash\ndocker run\
    \ -d --name SETUP \\\n-e ORACLE_SID=ORCLPDB \\\n-e ORACLE_PDB=PDB1 \\\n-v ~/setup:/opt/oracle/scripts/setup\
    \ \\\noracle/database:19.3.0-ee\n```\n\nDocker 调用通常的数据库创建脚本。当 DBCA 完成后，脚本读取`setup`目录的内容并运行后缀为`.sh`或`.sql`的文件。它在设置位置找到并运行了`01_add_pdb.sh`脚本。清单\
    \ 13-2 中的尾部输出显示了`docker logs`输出的末尾，其中自定义用户脚本运行并创建了可插拔数据库。\n\n```console\nExecuting\
    \ user defined scripts\n/opt/oracle/runUserScripts.sh: running /opt/oracle/scripts/setup/01_add_pdb.sh\n\
    Prepare for db operation\n13% complete\nCreating Pluggable Database\n15% complete\n\
    19% complete\n23% complete\n31% complete\n53% complete\nCompleting Pluggable Database\
    \ Creation\n60% complete\nExecuting Post Configuration Actions\n100% complete\n\
    Pluggable database \"PDB2\" plugged successfully.\nLook at the log file \"/opt/oracle/cfgtoollogs/dbca/CDB/PDB2/CDB.log\"\
    \ for further details.\nSQL*Plus: Release 19.0.0.0.0 - Production on Wed Jan 17\
    \ 17:55:13 2022\nVersion 19.3.0.0.0\nCopyright (c) 1982, 2019, Oracle.  All rights\
    \ reserved.\nConnected to:\nOracle Database 19c Enterprise Edition Release 19.0.0.0.0\
    \ - Production\nVersion 19.3.0.0.0\nSQL>\nPluggable database altered.\nSQL> Disconnected\
    \ from Oracle Database 19c Enterprise Edition Release 19.0.0.0.0 - Production\n\
    Version 19.3.0.0.0\nDONE: Executing user defined scripts\nThe Oracle base remains\
    \ unchanged with value /opt/oracle\n#########################\nDATABASE IS READY\
    \ TO USE!\n#########################\n```\n\n**清单 13-2** `docker logs`的输出，显示在容器创建期间自定义用户脚本的执行情况。`01_add_pdb.sh`脚本创建了一个名为`PDB2`的可插拔数据库。完成后，它将控制权交还给`createDB.sh`脚本，后者接着报告数据库已准备好供用户使用。\n\
    \n清单 13-1 中的示例使用固定的名称和密码创建单个可插拔数据库。它适用于有限的、特定的情况。如果我们想创建多个可插拔数据库，或者需要一个更灵活的解决方案来根据运行时条件添加\
    \ PDB，该怎么办？\n\n让我们扩展原始脚本，如清单 13-3 所示。脚本不再使用静态的 PDB 名称值，而是检查一个新的环境变量`PDB_LIST`是否已设置。该变量表示一个逗号分隔的一个或多个可插拔数据库名称列表，将在数据库创建完成后添加。脚本遍历列表中的每个元素，并执行与原始版本相同的步骤——创建新的\
    \ PDB、添加 TNS 条目并设置 PDB 状态——但是以动态的方式完成。\n\n```bash\n#!/bin/bash\n# 创建额外的可插拔数据库。\n\
    if [ -n \"$PDB_LIST\" ] # 已定义 PDB 列表\nthen\n  # 捕获现有的 IFS（内部字段分隔符）\n  OLDIFS=$IFS\n\
    \  # 在循环前将 IFS 设置为逗号：\n  IFS=,\n  # 遍历列表中的 PDB：\n  for pdb_name in $PDB_LIST\n\
    \  do\n    # 在循环内部将 IFS 恢复为原始值：\n    IFS=$OLDIFS\n    # 创建 PDB：\n    $ORACLE_HOME/bin/dbca\
    \ -silent -createPluggableDatabase -pdbName $pdb_name -sourceDB $ORACLE_SID -createAsClone\
    \ true -createPDBFrom DEFAULT -autoGeneratePasswords || exit 1\n    # 添加 TNS 条目：\n\
    \    cat > $ORACLE_HOME/network/admin/tnsnames.ora\n    $pdb_name =\n      (DESCRIPTION\
    \ =\n        (ADDRESS = (PROTOCOL = TCP)(HOST = 0.0.0.0)(PORT = 1521))\n     \
    \   (CONNECT_DATA =\n          (SERVER = DEDICATED)\n          (SERVICE_NAME =\
    \ $pdb_name)\n        )\n      )\n    EOF\n    # 打开 PDB，保存其状态：\n    sqlplus /\
    \ as sysdba << EOF\n    alter pluggable database $pdb_name save state;\n    EOF\n\
    \    # 在返回下一个循环步骤前，将 IFS 设置回逗号：\n    IFS=,\n  done\n  # 将 IFS 设置回其原始值：\n  IFS=$OLDIFS\n\
    fi\n```\n\n**清单 13-3** 这个修改后的脚本动态添加可插拔数据库，遍历通过环境变量传递给容器的逗号分隔的 PDB 名称列表。\n\n在删除原始的`SETUP`容器后，我重新运行命令，这次定义`PDB_LIST`变量为`\"\
    TEST,DEV\"`：\n\n```bash\ndocker run -d --name SETUP \\\n-e ORACLE_SID=ORCLPDB\
    \ \\\n-e ORACLE_PDB=PDB1 \\\n-e PDB_LIST=\"TEST,DEV\" \\\n-v ~/setup:/opt/oracle/scripts/setup\
    \ \\\noracle/database:19.3.0-ee\n```\n"
- fmt: '# 执行用户定义脚本


    `createDB.sh` 脚本检查 setup 入口点，并找到了 `01_add_pdb.sh` 脚本，这与之前一样。该脚本检查 `PDB_LIST` 变量是否已设置。如果没有，它会将控制权交还给
    `createDB.sh` 脚本。不过在这个例子中该变量是存在的，循环会处理列表中的元素，创建 `TEST` 和 `DEV` 可插拔数据库及 TNS 条目，并保存
    PDB 状态。清单 13-4 显示了使用更新后的 PDB 脚本时，新容器的 `docker logs` 输出。


