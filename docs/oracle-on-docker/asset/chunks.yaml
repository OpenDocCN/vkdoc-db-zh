    ```

    > cat /etc/hosts

    127.0.0.1 localhost

    127.0.1.1 lab01

    #-----------Docker-Hoster-Domains----------

    172.18.0.3    dbhost2   ORCL2   e05023316788

    172.17.0.3    ORCL2   dbhost2

    172.18.0.2    3a15e84cd484   ORCL1   dbhost1

    172.17.0.2    ORCL1   dbhost1

    172.17.0.4    docker-hoster   0d6f558aa6c0

    #-----Do-not-add-hosts-after-this-line-----

    ```


    通过这些条目出现在我的 Docker 主机的 `/etc/hosts` 文件中，我可以使用像 SQLcl（可从 Oracle 免费获取，网址为 [www.oracle.com/database/sqldeveloper/technologies/sqlcl/download](https://www.oracle.com/database/sqldeveloper/technologies/sqlcl/download/)）这样的数据库客户端从主机访问容器数据库：


    ```

    > sql system/oracle123@ORCL1:1521/ORA1

    SQLcl: Release 22.2 Production on Mon Jul 18 14:32:40 2022

    Copyright (c) 1982, 2022, Oracle.  All rights reserved.

    Last Successful login time: Mon Jul 18 2022 14:32:41 +00:00

    Connected to:

    Oracle Database 19c Enterprise Edition Release 19.0.0.0.0 - Production

    Version 19.3.0.0.0

    SQL> select host_name from v$instance;

    HOST_NAME

    ____________

    dbhost1

    SQL> conn system/oracle123@//dbhost2:1521/ORA2

    Connected.

    SQL> select host_name from v$instance;

    HOST_NAME

    ____________

    dbhost2

    ```


    *容器现在看起来就像是网络上的“真实”数据库服务器！*


    ### 你不需要端口映射


    在前面的例子中可能没有立即显现出来的是，数据库是通过默认的监听端口 `1521` 访问的。这些端口没有被映射。主机将容器识别为分配给桥接网络的虚拟接口上的端点，并将其视为通过一系列端口进行通信的“普通”主机。同样的技术在默认桥接网络上也有效，这通过使用容器
    IP 地址（请记住，默认桥接网络使用 `172.17.0.0/16` 地址范围）得到证明：


    ```

    SQL> conn system/oracle123@//172.17.0.2:1521/ORA1

    Connected.

    SQL> conn system/oracle123@//172.17.0.3:1521/ORA2

    Connected.

    ```


    只要存在一个将容器名称解析到主机的机制，就*不需要*映射端口。容器仍然可以通过映射到 Docker 主机默认桥接网络上的端口来访问：


    ```

    SQL> conn system/oracle123@//lab1:51521/ORA1

    Connected.

    SQL> conn system/oracle123@//lab1:61521/ORA2

    Connected.

    ```


    然而，通过端口映射可见的*唯一*服务是容器创建时指定的那些。并且将端口映射到主机偏离了我们建立的标准——即在环境中任何地方都能使用一个适用于每个数据库的连接字符串。


    你已经了解了如何创建具有内置 DNS 服务的自定义桥接网络，以及如何添加在主机上工作的 DNS 注册。有了这些连接到用户定义桥接网络的容器，就没有理由让它们继续连接到默认桥接网络上了！

    '
- fmt: '## Disconnect from the Default Bridge Network


    Detaching the containers from the default bridge is a straightforward command:
    `docker network disconnect <network name> <container name>`. Disconnecting the
    containers (including `docker-hoster`) completes without fanfare:


    ```

    > docker network disconnect bridge ORCL1

    > docker network disconnect bridge ORCL2

    > docker network disconnect docker-hoster

    ```


    After the commands are complete, the bridge network configuration in Listing 9-10
    shows no attached containers.


    ```

    > docker network inspect bridge

    [

    {

    "Name": "bridge",

    "Id": "0201c1b85336336a...",

    "Scope": "local",

    "Driver": "bridge",

    "IPAM": {

    "Driver": "default",

    "Options": null,

    "Config": [

    {

    "Subnet": "172.17.0.0/16",

    "Gateway": "172.17.0.1"

    }

    ]

    },

    "Internal": false,

    "Attachable": false,

    "Ingress": false,

    "ConfigFrom": {

    "Network": ""

    },

    "ConfigOnly": false,

    "Containers": {},

    "Options": {

    "com.docker.network.bridge.default_bridge": "true",

    "com.docker.network.bridge.enable_icc": "true",

    "com.docker.network.bridge.enable_ip_masquerade": "true",

    "com.docker.network.bridge.host_binding_ipv4": "0.0.0.0",

    "com.docker.network.bridge.name": "docker0",

    "com.docker.network.driver.mtu": "1500"

    },

    "Labels": {}

    }

    ]

    ```

    Listing 9-10: Abridged configuration details of the default bridge network after
    disconnecting the containers. Compare this with the original output in Listing
    9-3


    Checking the virtual interfaces under `/sys/class/net/docker0/brif` confirms their
    removal:


    ```

    > ls /sys/class/net/docker0/brif

    ```


    The adapter still exists in the output from `ifconfig` because this is a default
    network where all newly created containers are assigned. Inside the containers,
    the original `eth0` interface is gone, as is the entry in `/etc/hosts` associated
    with the 172.17.0.0/16 network segment:


    ```

    [oracle@dbhost1 ~]$ ifconfig

    eth1: flags=4163  mtu 1500

    inet 172.18.0.2  netmask 255.255.0.0  broadcast 172.18.255.255

    ether 02:42:ac:12:00:02  txqueuelen 0  (Ethernet)

    RX packets 298  bytes 57915 (56.5 KiB)

    RX errors 0  dropped 0  overruns 0  frame 0

    TX packets 221  bytes 55308 (54.0 KiB)

    TX errors 0  dropped 0 overruns 0  carrier 0  collisions 0

    [oracle@dbhost1 ~]$ cat /etc/hosts

    127.0.0.1     localhost

    ::1     localhost ip6-localhost ip6-loopback

    fe00::0     ip6-localnet

    ff00::0     ip6-mcastprefix

    ff02::1     ip6-allnodes

    ff02::2     ip6-allrouters

    172.18.0.2     dbhost1

    ```


    Docker handles these updates automatically whenever the network topology changes.


    With the user-defined bridge network in place and the containers disconnected
    from the default bridge, Figure 9-5 represents the new network topology, with
    virtual interfaces on the bridge network spanning the host-container interface.


    ![](images/514143_1_En_9_Chapter/514143_1_En_9_Fig5_HTML.png)


    Figure 9-5: An illustration of a user-defined bridge network in the host network
    communication. The host containers communicate with the host network virtually
    through a user-defined bridge network.


    User-defined bridge networks offer a more natural, integrated container networking
    environment without the limitations of port mapping.


    ## Assign a Network During Container Creation


    Hopefully, the benefits of user-defined bridge networks are clear, but connecting
    and disconnecting containers is a bit laborious. The `docker run` command includes
    an option for assigning networks when creating containers, allowing us to skip
    the extra effort spent “unplugging” from the default network.


    The `--network` or `--net` option attaches containers to one or more existing
    networks. The `--network-alias` flag assigns a network alias, recognized by Docker’s
    DNS services, providing an additional method of identifying containers on networks.
    Listing 9-11 shows an updated version of the earlier commands to create two database
    containers, add network assignments and aliases, and remove the port mappings.


    ```

    > docker run -d --name ORCL1 \

    >        --hostname dbhost1 \

    >        -e ORACLE_SID=ORA1 \

    >        -e ORACLE_PDB=PDB1 \

    >        -v /oradata/ORCL1:/opt/oracle/oradata \

    >        --network database-bridge \

    >        --network-alias db-alias1 \

    >        oracle/database:19.3.0-ee

    d6e027dee0a65bc4dfccd7eb43bb6143e2a54803d3b6a699bb26dc645cc814e5

    > docker run -d --name ORCL2 \

    >        --hostname dbhost2 \

    >        -e ORACLE_SID=ORA2 \

    >        -e ORACLE_PDB=PDB2 \

    >        -v /oradata/ORCL2:/opt/oracle/oradata \

    >        --network database-bridge \

    >        --network-alias db-alias2 \

    >        oracle/database:19.3.0-ee

    c3c1168cdb986f0a284a46eda67c41c1d4d7bfc3c8112db1920dd8be85b99889

    ```

    Listing 9-11: Updated docker run commands for the two database containers. The
    containers are assigned to the `database-bridge` created earlier, given a network
    alias, and no longer map ports to the host.


    Inside the containers, the network recognizes all of the following network identities:


    *   The container names: `ORCL1`, `ORCL2`

    *   Their assigned hostnames: `dbhost1`, `dbhost2`

    *   The network aliases: `db-alias1`, `db-alias2`

    *   The container IDs and IP addresses


    With the `docker-hoster` container (or similar provision) translating container
    names to host entries, the same names also work from the Docker host!


    ## Summary


    The preceding pages dove deep into the sometimes unpleasant, possibly intimidating,
    but necessary subject of networking in Linux container environments! Networks
    in Docker play an essential role by isolating and insulating containers from each
    other, the host, and the broader network landscape. There’s no need to be an expert,
    but a solid foundation in container networking is a valuable skill for Oracle
    database administrators working in Docker environments.


    Chapter 8 addressed connectivity through port mapping. In this chapter, we looked
    deeper at some of port mapping’s limitations and introduced container networks
    as an alternative. Port mapping is a reasonable solution for smaller, localized
    implementations, but container networks are a better and more extensible alternative,
    mainly when working with multiple database containers.


    We discussed differences between various network types, reviewed commands for
    reporting and managing network objects, and then dove into bridge networks’ details.
    Next, we covered the relationship between bridge networks and virtual devices
    and how they support connectivity across interfaces. We examined distinctions
    between default and user-defined bridges—including limitations inherent in Docker’s
    default bridge network. Finally, we discussed DNS in container networks and solutions
    for extending DNS to the host.


    You now have a solid understanding and appreciation for containers and their capabilities.
    Over the last few chapters, you’ve learned how to manage storage and networking—arguably
    the most critical considerations for running databases. The next chapter combines
    concepts from the book’s first half in a command reference, marrying lessons and
    recommendations into actionable recipes to begin and build your journey with Oracle
    on Docker!


