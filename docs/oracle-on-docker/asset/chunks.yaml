- fmt: '# Docker 构建上下文详解


    ## 构建路径与上下文


    Docker 构建示例中的构建上下文是运行构建的当前目录。然而，构建上下文不一定非要是*当前*目录。Docker 期望的是一个路径。^([^(78)](#fn78))
    用目录路径替代点号（`.`）可以控制构建的运行位置以及哪些文件被包含在上下文中。在之前的命令中，点号代表构建上下文的路径，可以更通用地写作：


    ```

    docker build <PATH>

    ```


    Docker 会在 `<PATH>` 中寻找一个名为 `Dockerfile` 的文件，并将 `<PATH>` 处及以下的所有内容作为其上下文。为了说明其工作原理，我在目录树中向上导航一级，并重新运行
    `docker build`，这次将相对目录路径 `./demo` 作为构建上下文传递：


    ```

    > cd ..

    > docker build ./demo

    Sending build context to Docker daemon  2.048kB

    Step 1/3 : FROM alpine

    ---> 9c6f07244728

    Step 2/3 : COPY * /

    ---> Using cache

    ---> 1d5ae09bcac7

    Step 3/3 : CMD ls -l /

    ---> Using cache

    ---> 8cf63acc1f17

    Successfully built 8cf63acc1f17

    ```


    注意到这个结果有什么有趣之处吗？它没有拉取 `alpine` 镜像，跳过了中间容器，但报告的层ID却与原始构建完全相同！这些“使用缓存”的消息表明，在将其上下文传递给守护进程后，Docker
    识别出无需进行任何更改，并且这些层已经存在于其构建缓存中！


    Dockerfile 中的 `COPY` 和 `ADD` 操作不是直接从主机读取文件或目录。它们是从构建过程开始时构建的*上下文*中读取它们的。这是一个微妙但至关重要的区别。


    ### 选择 Dockerfile


    我们已经看到，Docker 会在其上下文（即运行构建的目录）中寻找一个名为 `Dockerfile` 的文件。我们可以使用 `-f` 标志指定一个位于构建上下文之外的
    Dockerfile 来覆盖此行为：


    ```

    docker build -f <DOCKERFILE_PATH> <CONTEXT_PATH>

    ```


    `docker build` 默认期望使用名为 `Dockerfile` 的文件，但并不限于此。`Dockerfile` 是默认值，但 Docker 也接受
    `-f` 选项中不同的文件名。


    我将基于前面的示例进行构建，将 Dockerfile 移出 `demo` 目录，并将我的 `/etc/passwd` 文件复制到 `demo` 目录中。这为
    Docker 提供了需要消耗到其上下文中并复制到镜像里的内容：


    ```

    > mv demo/Dockerfile .

    > cp /etc/passwd ./demo

    > ls -l ./demo

    -rw-r--r--  1 seanscott  staff  7868 Aug 25 13:30 passwd

    > ls -l

    -rw-r--r--  1 seanscott  staff    34 Aug 25 10:57 Dockerfile

    drwxr-xr-x  3 seanscott  staff    96 Aug 25 13:31 demo

    ```


    新的构建目标目录是我当前目录下的 `demo`。Docker 需要构建路径，并且因为 `demo` 目录中没有 `Dockerfile`，我的构建命令需要通过
    `-f` 选项指定 `Dockerfile` 的位置：


    ```

    docker build -f ./Dockerfile ./demo

    ```


    注意输出中的一些差异：


    ```

    > docker build -f ./Dockerfile ./demo

    Sending build context to Docker daemon  10.27kB

    Step 1/3 : FROM alpine

    ---> 9c6f07244728

    Step 2/3 : COPY * /

    ---> 37b005627fc0

    Step 3/3 : CMD ls -l /

    ---> Running in 8188378b8894

    Removing intermediate container 8188378b8894

    ---> 70b49717401f

    Successfully built 70b49717401f

    ```


    首先，由于我添加到 `demo` 目录中的文件，发送到 Docker 守护进程的信息更多了。基础镜像没有改变，Docker 报告的镜像ID相同，这意味着它重用了缓存内容。然而，其余层都是新的。`demo`
    目录的内容不同，这改变了在步骤 2 中复制到镜像的文件。此外，虽然两个镜像中 `CMD` 指令运行的命令相同，但它们并不共享，因为底层的层是不同的。


    运行新镜像会产生相似但不完全相同的输出，这反映了构建上下文的变化。两个镜像（和容器）中来自 `alpine` 镜像层的文件系统是相同的。向 `demo` 目录添加一个文件，改变了
    `COPY` 命令在步骤 2 创建的层中添加的文件：


    ```

    > docker run 70b49717401f

    total 64

    drwxr-xr-x    2 root     root          4096 Aug  9 08:47 bin

    drwxr-xr-x    5 root     root           340 Aug 25 23:16 dev

    drwxr-xr-x    1 root     root          4096 Aug 25 23:16 etc

    drwxr-xr-x    2 root     root          4096 Aug  9 08:47 home

    drwxr-xr-x    7 root     root          4096 Aug  9 08:47 lib

    drwxr-xr-x    5 root     root          4096 Aug  9 08:47 media

    drwxr-xr-x    2 root     root          4096 Aug  9 08:47 mnt

    drwxr-xr-x    2 root     root          4096 Aug  9 08:47 opt

    -rw-r--r--    1 root     root          7868 Aug 25 19:30 passwd

    dr-xr-xr-x  345 root     root             0 Aug 25 23:16 proc

    drwx------    2 root     root          4096 Aug  9 08:47 root

    drwxr-xr-x    2 root     root          4096 Aug  9 08:47 run

    drwxr-xr-x    2 root     root          4096 Aug  9 08:47 sbin

    drwxr-xr-x    2 root     root          4096 Aug  9 08:47 srv

    dr-xr-xr-x   13 root     root             0 Aug 25 23:16 sys

    drwxrwxrwt    2 root     root          4096 Aug  9 08:47 tmp

    drwxr-xr-x    7 root     root          4096 Aug  9 08:47 usr

    drwxr-xr-x   12 root     root          4096 Aug  9 08:47 var

    ```'
