    `grep` to just those including `ORACLE`, as shown in Listing [6-1](#514143_1_En_6_Chapter.xhtml#PC2),
    the only values that come up are the `ORACLE_BASE` and `ORACLE_HOME`. There’s
    nothing for the `ORACLE_SID` or `ORACLE_PDB`. Yet if I search active processes
    and use `grep` to limit the output to the Oracle database `pmon` process, a database
    with a SID of ORCLCDB is up and running.


