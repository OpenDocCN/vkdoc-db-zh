    # 镜像定制脚本


    我运行的是用于不同环境的混合镜像。我的交互式镜像包含我用于查看和编辑文件、执行测试以及收集诊断信息的工具。它们还将环境设置得熟悉且用户友好，包括我最喜欢的命令行提示符、简化导航的别名和快捷方式，以及一个用于定制我的
    SQL*Plus 体验的 `login.sql` 文件。我的生产镜像遵循容器原则，旨在最小化占用空间、减少攻击面并消除不必要的包和库。我可以管理专用于不同目的的独立仓库，但这意味着要管理两套代码，增加测试和验证更改的工作量，并引入更多人为错误的机会。通过构建参数，单个仓库可以支持这两个镜像类别。


    管理镜像内容存在多种选项，包括：


    *   **具有条件操作的脚本：** 当选项有限、定义明确且不会随时间发生重大变化时很有用。

    *   **追加或替换值：** 最适用于预先未明确定义的动态输入。

    *   **有条件地复制文件：** 适用于广泛、复杂或特定于环境的、相对静态的修改。


    以下方法建议应用这些技术，从单个仓库生成定制镜像。'
