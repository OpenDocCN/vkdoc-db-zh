    或 `$HOME/docker`。当您使用容器时，您可能会发现自己经常需要导航到该仓库，并且会感激通过提前规划所节省的击键次数！


    花点时间导航到数据库子目录 `OracleDatabase/SingleInstance/dockerfiles` 下的一个文件夹，然后列出其内容。您将看到类似于清单
    4-3 的结果。


    ```

