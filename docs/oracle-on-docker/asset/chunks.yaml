    Creating the new volume and container we’ll use to demonstrate client connectivity

    ```


    After starting the container, I see the port mapping listed in the output of `docker
    ps`:


    ```

    NAMES  IMAGE                       PORTS                     STATUS

    ORCL   oracle/database:19.3.0-ee   0.0.0.0:51521->1521/tcp   Up 6 minutes (healthy)

    ```


    Publishing ports does more than just redirect traffic. The mapping, `0.0.0.0:51521->1521/tcp`,
    acts as a firewall rule that opens port 1521 on the container and allows traffic
    to pass. Unpublished ports aren’t accessible. Since you can’t go back and add
    ports to existing containers, it reinforces the importance of anticipating networking
    needs during container creation!


    ### Limits of Container Port Mapping


    My container is running and listening for database traffic on host port 51521\.
    Let’s see what happens when I try adding a second container using the same port
    mapping:


    ```

    > docker run -d \

    >      --name ORCL1 \

    >      -p 51521:1521 \

    >      oracle/database:19.3.0-ee

    8ab4c0a09137cebcd99fda61a20942aa4c45350070d5af8d69f3dc2605b6ae9d

    docker: Error response from daemon: driver failed programming external connectivity
    on endpoint ORCL1: Bind for 0.0.0.0:51521 failed: port is already allocated.

    ```


    Port 51521 is already in use! Starting the second container failed because container-port
    combinations must use unique, unassigned ports on the host.


    The preceding output shows the container was *created* (as evidenced by its hash,
    the string beginning `8ab4…` reported before the error message). Listing containers
    on my system, using `docker ps`, confirms this and shows no mapped ports:


    ```

    NAMES  IMAGE                       PORTS                     STATUS

    ORCL1  oracle/database:19.3.0-ee                             Created

    ORCL   oracle/database:19.3.0-ee   0.0.0.0:51521->1521/tcp   Up 23 minutes (healthy)

    ```


    Before rerunning a corrected `docker run` command for this container, I need to
    remove it.


    Keeping track of ports isn’t difficult in small environments, like those running
    on laptops for experimentation. As the number of containers (or the number of
    ports mapped to the host) grows, port mapping becomes impractical. Ports are a
    finite resource, and, eventually, capacity on the host runs out.


    Tracking what port goes with what container is more complicated, too. When assigning
    host ports, I typically prefix the container’s port with a digit, for example,
    using ports 51521 and 55500 for one container, 61521 and 65500 in the next, and
    so on.


    Ports below 1024 are the *well-known* ports, usually assigned to standard system
    or root-owned processes. Mapping container ports to anything below 1024 risks
    conflict with these registered processes and can prevent host services (or the
    system) from running normally.


    Assigning ports in the 1024 to 49151 range isn’t always safe, either. These are
    the *registered ports*, and while not strictly controlled, registration reduces
    the chances that vendors duplicate one another. Oracle networking on port 1521
    is an example. Other vendors and services *could* use it, but it would create
    conflicts on systems also running an Oracle database listener.


    *Dynamic* or *nonreserved* ports in the 49152 to 65535 range aren’t assigned,
    controlled, or registered and are generally considered safe for private or temporary
    use. It’s why I chose port 51521 earlier. Ideally, only use ports in the dynamic
    range for port publication.


    ### Automatic Port Publication


    Rather than defining individual, explicit host-to-container port mappings, there’s
    an option to expose ports in the container and let Docker map them to unassigned
    ports in the dynamic range by using the `-P` (or `--publish-all`) option of `docker
    run`.


    The help menu for docker run states the `--publish-all` flag will “*Publish all
    exposed ports to random ports*.” We haven’t covered Dockerfiles yet, but they
    include an option that *exposes* ports in the image metadata. Running docker inspect
    against an *older* version of an Oracle database container image shows it exposes
    ports 1521 and 5500:


    ```

    > docker inspect -f ''{{.Config.ExposedPorts}}'' oracle/database:19.3.0-ee

    map[1521/tcp:{} 5500/tcp:{}]

    ```


    Running that image with the `-P` flag will randomly assign the exposed ports to
    available ports in the dynamic on the host:


    ```

    > docker run -d \

    --name TEST \

    -P oracle/database:19.3.0-ee

    639c6770dacd207f1d9b0a5fa301c9a9d1dc6dac420047ca6c0a41598b9a0203

    ```


    After starting the container, use `docker ps` to reveal the port assignments Docker
    made for the image’s exposed ports:


    ```

    > docker ps -a \

    --format "table {{.Names}}\t{{.Ports}}"

    NAMES    PORTS

    TEST     0.0.0.0:32771->1521/tcp, 0.0.0.0:32770->5500/tcp

    ```


    I noted that this was from an older image. The `-P` option only works when ports
    are *explicitly* exposed in the image, as in images created from older versions
    of Oracle’s container repository scripts. Somewhere along the line, they removed
    this from the images:


    ```

    > docker inspect -f ''{{.Config.ExposedPorts}}'' oracle/database:19.3.0-ee

    map[]

    ```


    The `-P` option has nothing to map if ports aren’t exposed in the image.


    Explicitly exposing ports in the image isn’t necessary, though. The capability
    is available via `docker run`’s `--expose` flag. It does at the container level
    what the `EXPOSE` option in a Dockerfile does for an image and offers more flexibility
    to define a list of exposed ports at runtime rather than fixing them into the
    image. Passing a list or range of ports to `--expose` tells Docker what ports
    to open on the container. When given alongside the `-P` option, Docker assigns
    ports as if they were exposed in the image.


    Listing [8-3](#514143_1_En_8_Chapter.xhtml#PC12) shows how `--expose` and `-P`
    work together with a current Oracle database image, opening and assigning ports
    1521 and 5500.


    ```

    > docker run -d \

    --name TEST \

    --expose 1521 \

    --expose 5500 \

    -P oracle/database:19.3.0-ee

    0d34bb1d59f85b67b90f19db16d0ab09b91ee000c81187f8847c4fe2f6c186eb

    > docker ps -a \

    --format "table {{.Names}}\t{{.Ports}}"

    NAMES     PORTS

    TEST      0.0.0.0:49157->1521/tcp, 0.0.0.0:49156->5500/tcp

    Listing 8-3

    Running an image using --expose and -P to open and publish ports 1521 and 5500,
    even though no ports are defined in the image

    ```


    Now that you understand how to open and map ports from the container to the host,
    let’s put the knowledge to practical use and connect clients to the database inside
    the container!'
  trans: '

    ### 发布容器端口


    发布端口的唯一机会是在容器创建时。你无法在之后为已存在的容器添加端口映射。^(^58^)


    遵循前一章的建议，我将创建一个卷来存放我的数据库文件。然后，我将启动一个容器，为其命名，挂载该卷，并将容器端口 `1521` 映射到主机端口 `51521`。清单
    8-2 展示了这些命令及其结果。


    ```

    > docker volume create \

    >      --opt type=none \

    >      --opt o=bind \

    >      --opt device=/Users/sean.scott/oradata/ORCL \

    >      oradata_ORCL

    oradata_ORCL

    > docker run -d \

    >      --name ORCL \

    >      --mount type=volume,target=/opt/oracle/oradata,source=oradata_ORCL \

    >      -p 51521:1521 \

    >      oracle/database:19.3.0-ee

    f502c53c3c272463f6b40860784c95f0c2f0cbf9893e503a7cce83bf2ccd35e6

    ```

    *清单 8-2. 创建新的卷和容器，用于演示客户端连接性。*


    容器启动后，我在 `docker ps` 的输出中看到了端口映射：


    ```

    NAMES  IMAGE                       PORTS                     STATUS

    ORCL   oracle/database:19.3.0-ee   0.0.0.0:51521->1521/tcp   Up 6 minutes (healthy)

    ```


    发布端口的作用不仅仅是重定向流量。映射 `0.0.0.0:51521->1521/tcp` 就像一条防火墙规则，它打开了容器上的端口 `1521`，并允许流量通过。未发布的端口是无法访问的。既然你无法回溯并为现有容器添加端口，这就强化了在创建容器时预见网络需求的重要性！


    ### 容器端口映射的局限


    我的容器正在运行，并在主机端口 `51521` 上监听数据库流量。让我们看看当我尝试使用相同的端口映射添加第二个容器时会发生什么：


    ```

    > docker run -d \

    >      --name ORCL1 \

    >      -p 51521:1521 \

    >      oracle/database:19.3.0-ee

    8ab4c0a09137cebcd99fda61a20942aa4c45350070d5af8d69f3dc2605b6ae9d

    docker: Error response from daemon: driver failed programming external connectivity
    on endpoint ORCL1: Bind for 0.0.0.0:51521 failed: port is already allocated.

    ```


    端口 `51521` 已被占用！启动第二个容器失败了，因为容器-端口组合必须在主机上使用唯一的、未被分配的端口。


    前面的输出显示该容器已被*创建*（由其哈希值，即错误消息前以 `8ab4…` 开头的字符串所证明）。使用 `docker ps` 列出我系统上的容器证实了这一点，并显示没有映射端口：


    ```

    NAMES  IMAGE                       PORTS                     STATUS

    ORCL1  oracle/database:19.3.0-ee                             Created

    ORCL   oracle/database:19.3.0-ee   0.0.0.0:51521->1521/tcp   Up 23 minutes (healthy)

    ```


    在为此容器重新运行修正后的 `docker run` 命令之前，我需要先将其移除。


    在小型环境中，比如那些在笔记本电脑上运行用于实验的环境，跟踪端口并不困难。随着容器数量（或映射到主机的端口数量）增加，端口映射变得不切实际。端口是有限的资源，最终，主机上的容量会耗尽。


    跟踪哪个端口对应哪个容器也更加复杂。在分配主机端口时，我通常在容器的端口前加一个数字前缀，例如，一个容器使用端口 `51521` 和 `55500`，下一个容器使用
    `61521` 和 `65500`，依此类推。


    低于 `1024` 的端口是*周知*端口，通常分配给标准的系统或由 root 拥有的进程。将容器端口映射到低于 `1024` 的任何端口，都有与这些已注册进程冲突的风险，并可能阻止主机服务（或系统）正常运行。


    将端口分配在 `1024` 到 `49151` 的范围内也并非总是安全。这些是*注册*端口，虽然并非严格控制，但注册减少了供应商之间重复使用的可能性。Oracle
    网络使用端口 `1521` 就是一个例子。其他供应商和服务*可能*使用它，但这会在同样运行 Oracle 数据库监听器的系统上造成冲突。


    `49152` 到 `65535` 范围内的*动态*或*非保留*端口未被分配、控制或注册，通常被认为是私有或临时使用的安全范围。这就是为什么我之前选择了端口
    `51521`。理想情况下，仅在动态端口范围内使用端口进行发布。


    ### 自动端口发布


    除了定义单独的、显式的主机到容器端口映射外，还有一种选项可以*暴露*容器中的端口，并让 Docker 通过使用 `docker run` 的 `-P`（或
    `--publish-all`）选项将它们映射到动态范围内的未分配端口。


    `docker run` 的帮助菜单说明 `--publish-all` 标志将“*将所有已暴露的端口发布到随机端口*”。我们尚未介绍 Dockerfile，但它们包含一个在镜像元数据中*暴露*端口的选项。对
    Oracle 数据库容器镜像的*旧*版本运行 `docker inspect` 显示它暴露了端口 `1521` 和 `5500`：


    ```

    > docker inspect -f ''{{.Config.ExposedPorts}}'' oracle/database:19.3.0-ee

    map[1521/tcp:{} 5500/tcp:{}]

    ```


    使用 `-P` 标志运行该镜像会将已暴露的端口随机分配给主机动态范围内的可用端口：


    ```

    > docker run -d \

    --name TEST \

    -P oracle/database:19.3.0-ee

    639c6770dacd207f1d9b0a5fa301c9a9d1dc6dac420047ca6c0a41598b9a0203

    ```


    容器启动后，使用 `docker ps` 显示 Docker 为镜像已暴露端口所做的端口分配：


    ```

    > docker ps -a \

    --format "table {{.Names}}\t{{.Ports}}"

    NAMES    PORTS

    TEST     0.0.0.0:32771->1521/tcp, 0.0.0.0:32770->5500/tcp

    ```


    我注意到这来自一个旧镜像。`-P` 选项仅在端口在镜像中*明确*暴露时才有效，例如从旧版本的 Oracle 容器仓库脚本创建的镜像。在某个时候，他们从镜像中移除了这个：


    ```

    > docker inspect -f ''{{.Config.ExposedPorts}}'' oracle/database:19.3.0-ee

    map[]

    ```


    如果镜像中没有暴露端口，`-P` 选项就没有可映射的对象。


    然而，在镜像中显式暴露端口并非必要。该功能可通过 `docker run` 的 `--expose` 标志获得。它在容器级别上做 Dockerfile 中
    `EXPOSE` 选项为镜像所做的事，并提供了更大的灵活性，可以在运行时定义一组暴露的端口，而不是将它们固定在镜像中。向 `--expose` 传递一个端口列表或范围，会告诉
    Docker 在容器上打开哪些端口。当与 `-P` 选项一起使用时，Docker 会像端口在镜像中被暴露那样分配端口。


    清单 8-3 展示了如何使用当前的 Oracle 数据库镜像，通过 `--expose` 和 `-P` 打开并分配端口 `1521` 和 `5500`。


    ```

    > docker run -d \

    --name TEST \

    --expose 1521 \

    --expose 5500 \

    -P oracle/database:19.3.0-ee

    0d34bb1d59f85b67b90f19db16d0ab09b91ee000c81187f8847c4fe2f6c186eb

    > docker ps -a \

    --format "table {{.Names}}\t{{.Ports}}"

    NAMES     PORTS

    TEST      0.0.0.0:49157->1521/tcp, 0.0.0.0:49156->5500/tcp

    ```

    *清单 8-3. 使用 `--expose` 和 `-P` 运行镜像，即使镜像中没有定义端口，也能打开并发布端口 1521 和 5500。*


    现在你已经了解如何打开并将端口从容器映射到主机，让我们将这些知识付诸实践，将客户端连接到容器内的数据库吧！

