- fmt: '### Runtimes


    容器运行时（`runtimes`）包含了一套用于构建、管理和运行容器的功能。适用于 Windows 和 Mac 用户的 `Docker Desktop` 以及适用于
    Linux 用户的 `Docker Engine` 是流行且可免费在 [www.docker.com](http://www.docker.com) 下载的工具，它们为刚接触容器的用户提供了直接且文档完善的途径。


    运行时包含一组用于管理和使用容器的命令集。不必为选择运行时而过度担忧。与 Docker 类似，运行时遵循一个标准，该标准别名化了 `Docker Desktop`
    的命令和语法，消除了日后切换的风险。简而言之，几乎任何在 `Docker Desktop` 中运行的东西在其他地方也能工作。


    大多数 Docker 命令以 `docker` 开头，后跟一个关键字和一个或多个用于设置或定义选项的标志。例如，`docker run ubuntu` 使用
    Ubuntu Linux 镜像运行一个容器。


    它如何知道从哪里获取 Ubuntu 镜像？像 `Docker Desktop` 这样的运行时会连接到一个中心（hub）或仓库（repository）。当用户调用
    `docker run ubuntu` 时，运行时会搜索其仓库中名为 `ubuntu` 的认证镜像，并自动*拉取*（`pulls`）或下载它。


    ### Dockerfiles


    回想一下，镜像是文件和目录的集合。`Dockerfile` 是用于填充镜像文件的一组指令或代码。`Dockerfile` 运行命令并调用脚本以安装和配置最终镜像。它们还定义了运行该镜像的容器的环境，包括变量、端口以及映射到主机资源的目录。`Dockerfile`
    还决定了容器启动时运行哪些脚本，并定义了用于报告容器健康的检查。


    ### Builds


    *构建*（`building`）镜像是执行 `Dockerfile` 中指令的过程。构建过程会顺序执行 `Dockerfile` 中的步骤。构建总是从拉取一个基础镜像（`base
    image`）开始。基础镜像作为一个容器运行，更改会以*层*（`layer`）的形式应用（请记住，镜像不能被更改）。每一层都是后续步骤的基础，直到最终镜像完成。^([^(15)](#fn15))


    ## Summary


    现在，您已经理解了 Docker 和容器的语言与概念，并认识到容器与虚拟机的比较方式。对于数据库管理员来说，将虚拟机视为数据库，将容器视为模式（`schema`），可能有助于理解。为新的应用程序添加一个模式，其成本远低于创建一个新的专用数据库。容器或模式中也没有需要启动的东西。


    您可以区分镜像和容器，并理解它们可以移植到任何容器环境以提供可靠、相同的结果。您了解到容器可以共享主机资源，包括网络和存储。最重要的是，卷（`volumes`）允许数据（包括
    Oracle 数据库）独立于容器持久存在。


    接下来，我们将揭开面纱，通过构建一个容器——不是用 Docker，而是在命令行中使用 Linux 命令——来探索容器如何工作。这有助于理解后续章节中使用的概念，但最重要的是，可以消除您在将
    Docker 用作数据库平台时可能产生的一些神秘感和顾虑！


