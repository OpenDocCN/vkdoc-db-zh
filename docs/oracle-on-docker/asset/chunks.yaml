    # 镜像定制脚本


    我运行的是用于不同环境的混合镜像。我的交互式镜像包含我用于查看和编辑文件、执行测试以及收集诊断信息的工具。它们还将环境设置得熟悉且用户友好，包括我最喜欢的命令行提示符、简化导航的别名和快捷方式，以及一个用于定制我的
    SQL*Plus 体验的 `login.sql` 文件。我的生产镜像遵循容器原则，旨在最小化占用空间、减少攻击面并消除不必要的包和库。我可以管理专用于不同目的的独立仓库，但这意味着要管理两套代码，增加测试和验证更改的工作量，并引入更多人为错误的机会。通过构建参数，单个仓库可以支持这两个镜像类别。


    管理镜像内容存在多种选项，包括：


    *   **具有条件操作的脚本：** 当选项有限、定义明确且不会随时间发生重大变化时很有用。

    *   **追加或替换值：** 最适用于预先未明确定义的动态输入。

    *   **有条件地复制文件：** 适用于广泛、复杂或特定于环境的、相对静态的修改。


    以下方法建议应用这些技术，从单个仓库生成定制镜像。'
- fmt: "## Conditional Operations\n\n支持多种结果并减少代码量可以降低维护开销。向脚本添加条件逻辑是实现此目标的策略之一，当需要在有限选项间做出决定且每个选项都有明确操作时，这种方法效果最佳。条件的来源可以是传递给`docker\
    \ build`命令的参数，也可以从环境中获取。\n\n本书一直使用的公共仓库为每个数据库版本（11.2.0.2、12.1.0.2、12.2.0.1、18.3.0、18.4.0、19.3.0和21.3.0）都设有单独的目录。这些目录下的脚本结构相同：有些完全一致，有些在格式和风格上略有差异，还有少数引入了特定于版本的功能。例如，如果我运行`diff`命令来显示`installDBBinaries.sh`的19c和21c版本之间的差异，会看到：\n\
    ```\n> diff 19.3.0/installDBBinaries.sh 21.3.0/installDBBinaries.sh\n24c24\n if\
    \ [ \"$EDITION\" != \"EE\" ] && [ \"$EDITION\" != \"SE2\" ]; then\n```\n除了`if`语句的一个细微差别外，它们完全相同。其他地方则有反映代码改进的差异，例如`runOracle.sh`脚本中的这个检查：\n\
    ```\n    if [ -a \"$ORACLE_HOME\"/install/.docker_* ]; then\n>       mv \"$ORACLE_HOME\"\
    /install/.docker_* \"$ORACLE_BASE\"/oradata/dbconfig/\"$ORACLE_SID\"/\n>    fi;\n\
    ```\n19c版本尝试移动匹配`$ORACLE_HOME/install/.docker_*`的文件。如果没有文件匹配该模式，它会返回错误。21c版本将移动命令包装在`if`语句中，在尝试移动之前先检查是否存在匹配的文件。21c版本包含了特定于Oracle\
    \ 21c Express版的操作，但脚本大体相同。将19c和21c仓库合并到一个公共目录，然后向构建过程传递版本号，这是否可行？\n\n将版本分离到独立目录有充分的理由。在前一章讨论`build\
    \ context`时，我们了解到Docker会读取构建路径下的所有文件。将19c和21c合并在一个Dockerfile中意味着将两个版本的数据库安装介质存储在同一目录下。这些文件很大，同时放在一个目录中会增加上下文大小和处理时间。\n\
    \n独立目录的缺点在于维护。文件差异大多很小，但21c版本中的每一项改进并未都同步到其他版本。随着支持版本数量的增加，跟踪和测试不断扩大的代码库中的修复与改进的需求也在增长。\n\
    \n构建特性（见第14章）可以解决上下文问题。这个问题解决后，考虑通过构建参数将版本传递给Dockerfile就更加合理。该版本随后可以控制构建过程的独特方面，特别是：\n\
    \n* 在`setupLinuxEnv.sh`中应用正确的预安装RPM包\n* 执行为21c启用Express版所需的额外检查\n* 使用正确的数据库版本和版本标签标记镜像\n\
    \n需要明确的是：将现有脚本转换为处理多个版本是一项复杂的任务，具体取决于你的目标，这只是说明为何可能在设置脚本中嵌入条件检查的一个例子。因此，列出具体的改动并不实际，但我们可以探索说明这种实践的技术。例如，Linux的`case`语句提供了一种非常便捷的方法，可根据版本确定正确的包集合：\n\
    ```\ncase $DB_VERSION in\n11*)   RPM_LIST=\"oracle-rdbms-server-11gR2-preinstall\
    \ unzip\" ;;\n12.1*) RPM_LIST=\"oracle-rdbms-server-12cR1-preinstall tar\" ;;\n\
    12.2*) RPM_LIST=\"oracle-database-server-12cR2-preinstall\" ;;\n18*)   RPM_LIST=\"\
    oracle-database-preinstall-18c\" ;;\n19*)   RPM_LIST=\"oracle-database-preinstall-19c\"\
    \ ;;\n21*)   RPM_LIST=\"oracle-database-preinstall-21c\" ;;\n*)     exit 1 ;;\n\
    esac\n```\n然后，将`$RPM_LIST`变量传递给`yum install`命令：^([^(75)](#fn75))\n```\nyum -y\
    \ install \"$RPM_LIST\" openssl\n```\n我想强调，两种方法都非“对”或“错”。编程是一门艺术，团队会选择最适合其风格、背景和目的的方法。在我的实践中，我倾向于为每个版本使用一套脚本，但对于Oracle的容器镜像，我承认独立目录更好。代码库向新用户介绍了容器，为每个版本设置一个目录更容易理解。随着你对容器越来越熟悉并扩展镜像库，将版本化构建整合到统一的目录结构下可能会是更好的选择。关于此方法的更多示例（或许还有灵感）可在我的GitHub上找到：[`https://github.com/oraclesean/docker-oracle`](https://github.com/oraclesean/docker-oracle)。\n\
    \n## Appending Values in Dockerfiles\n\n上一节中的`yum install`命令引出了修改镜像的第二个机会，这次与预期环境的性质有关。生产镜像应该精简，不包含可能增加镜像大小或引入漏洞的不必要包。用于实验的镜像有不同的要求，包括编辑器和诊断工具，这些会因需求和个人喜好而异。我喜欢`vi`；其他人喜欢`emacs`。你可能希望包含`tree`或`strace`。这里的重点不在于需要安装`what`包，而在于列表的可变性质，要解决的挑战是如何最好地包含它们。\n\
    \n一种方法是以`root`用户身份登录正在运行的容器：\n```\ndocker exec -it -u root  bash\n```\n然后`yum\
    \ install`包：\n```\n# yum -y install vi less tree which\n```\n这种方法有以下缺点：\n\n* 其手动性质。我必须在每个容器中执行这些步骤。\n\
    * 它是需要额外包的活动的先决条件，而且很容易被忘记，直到你发现缺少某个东西。\n* 安装会更改容器覆盖文件系统中的文件，增加了容器的大小。\n\n对于独特的添加项，采取这条路线是有意义的。仅仅因为不想向容器添加几兆字节或多运行一个命令，就花费几分钟构建一个包含“这次你需要的那个包”的自定义镜像，这并不实际，特别是当该容器不会存在很长时间时。\n\
    \n当这些工具经常出现在镜像中时，通过构建参数将它们集成到镜像本身中更有意义。\n\n与`docker run`中使用的环境变量不同，我们不能“临时编造”构建参数。它们必须通过Dockerfile中的`ARG`指令来定义。然而，它们不需要值。让我们在Dockerfile中创建一个新参数来接受要安装到镜像中的可选包列表：\n\
    ```\nARG RPM_SUPPLEMENT=\"\"\n```\n它应该与传递给第一个构建阶段的其他参数一起出现。它是运行`$INSTALL_DIR/$SETUP_LINUX_FILE`步骤的阶段。无需通过关联的`ENV`命令将其添加到环境中。参数在阶段的上下文中可用，如果在后续步骤中不需要，则不必提升到容器的环境中。\n\
    \n接下来，在`setupLinuxEnv.sh`脚本中，更新`yum install`命令以包含新参数：\n```\nyum -y install oracle-database-preinstall-19c\
    \ openssl $RPM_SUPPLEMENT\n```\n如果我们没有向构建参数传递任何值，Linux设置脚本会运行，并在`yum`命令末尾附加一个空字符串。但是，如果我们给构建参数传递一个包列表：^([^(76)](#fn76))\n\
    ```\ndocker build ...\n--build-arg RPM_SUPPLEMENT=\"vi less tree which\"\n...\n\
    ```\n`yum`命令会在变量中看到自定义参数，并安装额外的包。"
  raw: "### Conditional Operations\n\nSupporting multiple outcomes with less code\
    \ reduces maintenance overhead. Adding conditions to scripts is one strategy toward\
    \ that end and works best when deciding among a limited set of options with clear-cut\
    \ actions. The source of the condition could be an argument passed to the `docker\
    \ build` command or discovered from the environment.\n\nThe public repository\
    \ we’ve worked with throughout this book has separate directories for each database\
    \ version: 11.2.0.2, 12.1.0.2, 12.2.0.1, 18.3.0, 18.4.0, 19.3.0, and 21.3.0\\\
    . Within each of these directories are the same scripts. Some are identical, others\
    \ contain minor differences in formatting and style, and a few introduce version-specific\
    \ functionality. For instance, if I run the `diff` command to show the differences\
    \ between the 19c and 21c versions of `installDBBinaries.sh`, I see\n\n```\n>\
    \ diff 19.3.0/installDBBinaries.sh 21.3.0/installDBBinaries.sh\n24c24\n if [ \"\
    $EDITION\" != \"EE\" ] && [ \"$EDITION\" != \"SE2\" ]; then\n```\n\nThey’re identical\
    \ but for a minor difference in an `if` statement. Elsewhere are differences reflecting\
    \ code improvements, like this check in the `runOracle.sh` scripts:\n\n```\n \
    \   if [ -a \"$ORACLE_HOME\"/install/.docker_* ]; then\n>       mv \"$ORACLE_HOME\"\
    /install/.docker_* \"$ORACLE_BASE\"/oradata/dbconfig/\"$ORACLE_SID\"/\n>    fi;\n\
    ```\n\nThe 19c version tries to move files matching `$ORACLE_HOME/install/.docker_*`.\
    \ It will return an error if no files match the pattern. The 21c version wraps\
    \ the move command in an `if` statement, checking whether matching files are present\
    \ before attempting to move them. The 21c versions include actions specific to\
    \ Oracle 21c Express Edition, but the scripts are mostly the same. Is it practical\
    \ to combine the 19c and 21c repositories into a single, common directory, then\
    \ pass a version to the build?\n\nThere are good reasons to separate versions\
    \ into individual directories. In the previous chapter, when discussing *build\
    \ context*, you learned that Docker reads all the files beneath the build path.\
    \ Combining 19c and 21c in a single Dockerfile means storing the database installation\
    \ media for both versions in the same directory. They’re large files, and having\
    \ both in the same directory increases context size and processing time.\n\nThe\
    \ downside of separate directories is maintenance. The file differences are mostly\
    \ minor, but every improvement made in the 21c version hasn’t graduated to others.\
    \ As the count of supported versions grows, so does the need to track and test\
    \ fixes and improvements to an ever-widening code base.\n\nThe context issues\
    \ can be solved with build features covered in Chapter [14](#514143_1_En_14_Chapter.xhtml).\
    \ With that problem out of the way, it’s more reasonable to consider passing the\
    \ version to the Dockerfile through a build argument. The version then controls\
    \ unique aspects of the build process, notably:\n\n*   Applying the correct preinstallation\
    \ RPM packages in `setupLinuxEnv.sh`\n\n*   Performing additional checks needed\
    \ for enabling Express Edition in 21c\n\n*   Tagging images with the correct database\
    \ version and edition\n\nMake no mistake: converting existing scripts to handle\
    \ multiple versions is an involved task that varies according to your objectives\
    \ and a single example of why you might embed conditional checks in setup scripts.\
    \ Therefore, listing specific changes is not practical, but we can explore techniques\
    \ that illustrate the practice. The Linux `case` statement, for instance, presents\
    \ a very convenient method for determining the correct set of packages by version:\n\
    \n```\ncase $DB_VERSION in\n11*)   RPM_LIST=\"oracle-rdbms-server-11gR2-preinstall\
    \ unzip\" ;;\n12.1*) RPM_LIST=\"oracle-rdbms-server-12cR1-preinstall tar\" ;;\n\
    12.2*) RPM_LIST=\"oracle-database-server-12cR2-preinstall\" ;;\n18*)   RPM_LIST=\"\
    oracle-database-preinstall-18c\" ;;\n19*)   RPM_LIST=\"oracle-database-preinstall-19c\"\
    \ ;;\n21*)   RPM_LIST=\"oracle-database-preinstall-21c\" ;;\n*)     exit 1 ;;\n\
    esac\n```\n\nThen, pass the `$RPM_LIST` variable to the `yum install` command:^([^(75)](#fn75))\n\
    \n```\nyum -y install \"$RPM_LIST\" openssl\n```\n\nI want to emphasize that neither\
    \ approach is “right” or “wrong.” Coding is an art, and teams choose the methods\
    \ best suited to their style, background, and purpose. In my practice, I prefer\
    \ a single set of scripts for every version, but for Oracle’s container images,\
    \ I concede that separate directories are better. The code base introduces new\
    \ users to containers, and having a directory for each version is easier to understand.\
    \ As you grow more comfortable with containers and expand your image library,\
    \ consolidating versioned builds beneath a unified directory structure may present\
    \ a better alternative. Additional examples of this method (and perhaps inspiration)\
    \ are available on my GitHub: [`https://github.com/oraclesean/docker-oracle`](https://github.com/oraclesean/docker-oracle).\n\
    \n### Appending Values in Dockerfiles\n\nThe `yum install` command in the preceding\
    \ section leads to a second opportunity for modifying images, this time related\
    \ to the nature of the intended environment. Production images should be lean\
    \ and free of unnecessary packages that might add to image size or introduce vulnerabilities.\
    \ Images used for experimentation have different requirements, including editors\
    \ and diagnostic tools, and these will vary by need and personal taste. I prefer\
    \ `vi`; others like `emacs`. You may want `tree` or `strace` included. The point\
    \ here isn’t *what* packages need installation; it’s the variable nature of the\
    \ list, and the challenge to solve is how best to include them.\n\nOne approach\
    \ is logging in to running containers as the `root` user:\n\n```\ndocker exec\
    \ -it -u root  bash\n```\n\nThen `yum install` packages:\n\n```\n# yum -y install\
    \ vi less tree which\n```\n\nThe disadvantages of this approach are as follows:\n\
    \n*   Its manual nature. I have to perform these steps in every container.\n\n\
    *   It’s a prerequisite to activities requiring the extra packages and one that’s\
    \ easily forgotten until you realize something’s not there.\n\n*   The installation\
    \ changes files in the container’s overlay filesystem, adding to the container’s\
    \ size.\n\nFor unique additions, it makes sense to take this route. It isn’t practical\
    \ to spend several minutes building a custom image with “that package you need\
    \ this one time” simply because you don’t want to add a few megabytes to a container\
    \ or run an extra command, particularly if that container won’t be around very\
    \ long.\n\nWhen those tools appear regularly in images, it makes more sense to\
    \ integrate them into the image itself through a build argument.\n\nUnlike the\
    \ environment variables used in `docker run`, we can’t “make up” build arguments\
    \ on the fly. They must be defined through an `ARG` instruction in the Dockerfile.\
    \ However, they don’t require a value. Let’s create a new argument in the Dockerfile\
    \ to accept a list of optional packages to install in an image:\n\n```\nARG RPM_SUPPLEMENT=\"\
    \"\n```\n\nIt should appear with the other arguments passed to the first build\
    \ stage. It’s the one that runs the `$INSTALL_DIR/$SETUP_LINUX_FILE` step. There’s\
    \ no need to add it to the environment with an associated `ENV` command. Arguments\
    \ are available within the context of the stage and, if not needed in later steps,\
    \ don’t have to be promoted to the container’s environment.\n\nNext, in the `setupLinuxEnv.sh`\
    \ script, update the `yum install` command to include the new argument:\n\n```\n\
    yum -y install oracle-database-preinstall-19c openssl $RPM_SUPPLEMENT\n```\n\n\
    If we pass nothing to the build argument, the Linux setup script runs and appends\
    \ an empty string to the end of the `yum` command. But, if we give the build argument\
    \ a list of packages:^([^(76)](#fn76))\n\n```\ndocker build ...\n--build-arg RPM_SUPPLEMENT=\"\
    vi less tree which\"\n...\n```\n\nThe `yum` command sees the custom argument in\
    \ the variable and installs the additional packages."
  trans: "## 条件操作\n\n支持多种结果并减少代码量可以降低维护开销。向脚本添加条件逻辑是实现此目标的策略之一，当需要在有限选项间做出决定且每个选项都有明确操作时，这种方法效果最佳。条件的来源可以是传递给\
    \ `docker build` 命令的参数，也可以从环境中获取。\n\n本书一直使用的公共仓库为每个数据库版本（11.2.0.2、12.1.0.2、12.2.0.1、18.3.0、18.4.0、19.3.0\
    \ 和 21.3.0）都设有单独的目录。这些目录下的脚本结构相同：有些完全一致，有些在格式和风格上略有差异，还有少数引入了特定于版本的功能。例如，如果我运行\
    \ `diff` 命令来显示 `installDBBinaries.sh` 的 19c 和 21c 版本之间的差异，会看到：\n```\n> diff 19.3.0/installDBBinaries.sh\
    \ 21.3.0/installDBBinaries.sh\n24c24\n if [ \"$EDITION\" != \"EE\" ] && [ \"$EDITION\"\
    \ != \"SE2\" ]; then\n```\n除了 `if` 语句的一个细微差别外，它们完全相同。其他地方则有反映代码改进的差异，例如 `runOracle.sh`\
    \ 脚本中的这个检查：\n```\n    if [ -a \"$ORACLE_HOME\"/install/.docker_* ]; then\n>  \
    \     mv \"$ORACLE_HOME\"/install/.docker_* \"$ORACLE_BASE\"/oradata/dbconfig/\"\
    $ORACLE_SID\"/\n>    fi;\n```\n19c 版本尝试移动匹配 `$ORACLE_HOME/install/.docker_*` 的文件。如果没有文件匹配该模式，它会返回错误。21c\
    \ 版本将移动命令包装在 `if` 语句中，在尝试移动之前先检查是否存在匹配的文件。21c 版本包含了特定于 Oracle 21c Express 版的操作，但脚本大体相同。将\
    \ 19c 和 21c 仓库合并到一个公共目录，然后向构建过程传递版本号，这是否可行？\n\n将版本分离到独立目录有充分的理由。在前一章讨论 `build\
    \ context` 时，我们了解到 Docker 会读取构建路径下的所有文件。将 19c 和 21c 合并在一个 Dockerfile 中意味着将两个版本的数据库安装介质存储在同一目录下。这些文件很大，同时放在一个目录中会增加上下文大小和处理时间。\n\
    \n独立目录的缺点在于维护。文件差异大多很小，但 21c 版本中的每一项改进并未都同步到其他版本。随着支持版本数量的增加，跟踪和测试不断扩大的代码库中的修复与改进的需求也在增长。\n\
    \n构建特性（见第 14 章）可以解决上下文问题。这个问题解决后，考虑通过构建参数将版本传递给 Dockerfile 就更加合理。该版本随后可以控制构建过程的独特方面，特别是：\n\
    \n*   在 `setupLinuxEnv.sh` 中应用正确的预安装 RPM 包\n*   执行为 21c 启用 Express 版所需的额外检查\n\
    *   使用正确的数据库版本和版本标签标记镜像\n\n需要明确的是：将现有脚本转换为处理多个版本是一项复杂的任务，具体取决于你的目标，这只是说明为何可能在设置脚本中嵌入条件检查的一个例子。因此，列出具体的改动并不实际，但我们可以探索说明这种实践的技术。例如，Linux\
    \ 的 `case` 语句提供了一种非常便捷的方法，可根据版本确定正确的包集合：\n```\ncase $DB_VERSION in\n11*)   RPM_LIST=\"\
    oracle-rdbms-server-11gR2-preinstall unzip\" ;;\n12.1*) RPM_LIST=\"oracle-rdbms-server-12cR1-preinstall\
    \ tar\" ;;\n12.2*) RPM_LIST=\"oracle-database-server-12cR2-preinstall\" ;;\n18*)\
    \   RPM_LIST=\"oracle-database-preinstall-18c\" ;;\n19*)   RPM_LIST=\"oracle-database-preinstall-19c\"\
    \ ;;\n21*)   RPM_LIST=\"oracle-database-preinstall-21c\" ;;\n*)     exit 1 ;;\n\
    esac\n```\n然后，将 `$RPM_LIST` 变量传递给 `yum install` 命令：^(⁷⁵)\n```\nyum -y install\
    \ \"$RPM_LIST\" openssl\n```\n我想强调，两种方法都非“对”或“错”。编程是一门艺术，团队会选择最适合其风格、背景和目的的方法。在我的实践中，我倾向于为每个版本使用一套脚本，但对于\
    \ Oracle 的容器镜像，我承认独立目录更好。代码库向新用户介绍了容器，为每个版本设置一个目录更容易理解。随着你对容器越来越熟悉并扩展镜像库，将版本化构建整合到统一的目录结构下可能会是更好的选择。关于此方法的更多示例（或许还有灵感）可在我的\
    \ GitHub 上找到：[`https://github.com/oraclesean/docker-oracle`](https://github.com/oraclesean/docker-oracle)。\n\
    \n## 在 Dockerfile 中追加上一节中的 `yum install` 命令引出了修改镜像的第二个机会，这次与预期环境的性质有关。生产镜像应该精简，不包含可能增加镜像大小或引入漏洞的不必要包。用于实验的镜像有不同的要求，包括编辑器和诊断工具，这些会因需求和个人喜好而异。我喜欢\
    \ `vi`；其他人喜欢 `emacs`。你可能希望包含 `tree` 或 `strace`。这里的重点不在于需要安装 `what` 包，而在于列表的可变性质，要解决的挑战是如何最好地包含它们。\n\
    \n一种方法是以 `root` 用户身份登录正在运行的容器：\n```\ndocker exec -it -u root  bash\n```\n然后 `yum\
    \ install` 包：\n```\n# yum -y install vi less tree which\n```\n这种方法有以下缺点：\n\n*\
    \   其手动性质。我必须在每个容器中执行这些步骤。\n*   它是需要额外包的活动的先决条件，而且很容易被忘记，直到你发现缺少某个东西。\n*   安装会更改容器覆盖文件系统中的文件，增加了容器的大小。\n\
    \n对于独特的添加项，采取这条路线是有意义的。仅仅因为不想向容器添加几兆字节或多运行一个命令，就花费几分钟构建一个包含“这次你需要的那个包”的自定义镜像，这并不实际，特别是当该容器不会存在很长时间时。\n\
    \n当这些工具经常出现在镜像中时，通过构建参数将它们集成到镜像本身中更有意义。\n\n与 `docker run` 中使用的环境变量不同，我们不能“临时编造”构建参数。它们必须通过\
    \ Dockerfile 中的 `ARG` 指令来定义。然而，它们不需要值。让我们在 Dockerfile 中创建一个新参数来接受要安装到镜像中的可选包列表：\n\
    ```\nARG RPM_SUPPLEMENT=\"\"\n```\n它应该与传递给第一个构建阶段的其他参数一起出现。它是运行 `$INSTALL_DIR/$SETUP_LINUX_FILE`\
    \ 步骤的阶段。无需通过关联的 `ENV` 命令将其添加到环境中。参数在阶段的上下文中可用，如果在后续步骤中不需要，则不必提升到容器的环境中。\n\n接下来，在\
    \ `setupLinuxEnv.sh` 脚本中，更新 `yum install` 命令以包含新参数：\n```\nyum -y install oracle-database-preinstall-19c\
    \ openssl $RPM_SUPPLEMENT\n```\n如果我们没有向构建参数传递任何值，Linux 设置脚本会运行，并在 `yum` 命令末尾附加一个空字符串。但是，如果我们给构建参数传递一个包列表：^(⁷⁶)\n\
    ```\ndocker build ...\n--build-arg RPM_SUPPLEMENT=\"vi less tree which\"\n...\n\
    ```\n`yum` 命令会在变量中看到自定义参数，并安装额外的包。"
- fmt: '# Conditional File Copy


    ## 脚本逻辑与安全考虑


    本节第一部分提出的修改针对的是脚本使用参数进行 `if-then` 或基于 `case` 的决策的场景。脚本必须内嵌评估条件和根据条件采取行动的逻辑。该部分的例子考虑了将两个或多个版本的脚本整合到单一目录结构中。仓库中许多辅助文件是相同的或足够相似，可以在不同版本间互换，因此将它们合并是有意义的。但其他文件——包括数据库安装脚本——包含针对特定条件的独特步骤。随着
    Oracle 推出新版本，对数据库安装采用“一个脚本统治所有”的方法可能并不实用。为每个版本（从 11g 到 21c 及以后）适应 Express、Standard
    和 Enterprise 版本之间的差异是一项复杂的任务。针对所有组合测试更新会迅速变得难以掌控。


    还有一个安全方面需要考虑。查看 Oracle 数据库容器中 `$ORACLE_BASE` 目录下的文件：


    ```

    /opt/oracle/runOracle.sh

    /opt/oracle/createObserver.sh

    /opt/oracle/relinkOracleBinary.sh

    /opt/oracle/setPassword.sh

    /opt/oracle/checkDBStatus.sh

    /opt/oracle/runUserScripts.sh

    /opt/oracle/configTcps.sh

    /opt/oracle/createDB.sh

    /opt/oracle/dbca.rsp.tmpl

    /opt/oracle/startDB.sh

    ```


    嵌入在脚本中的逻辑揭示了在不同条件下系统如何工作，并可能暴露攻击者可以利用你的数据库基础设施的方式。能够访问一个镜像或一个不安全或“不重要”容器的人可以推断配置，甚至反向工程你环境中的其他容器。


    ## Dockerfile 示例


    也许存在一个折中方案——一组适用于任何版本的共享文件，以及没有过于复杂或泄露信息的条件逻辑的专用文件。为了想象这是如何工作的，让我们看一下 19c Dockerfile
    的顶部部分，重点关注清单 [13-7](#514143_1_En_13_Chapter.xhtml#PC46) 中的参数和环境设置。我通过删除一些对本练习不重要的特殊环境变量来简化它。


    ```

    # Argument to control removal of components not needed after db software installation

    ARG SLIMMING=true

    ARG INSTALL_FILE_1="LINUX.X64_193000_db_home.zip"

    # Environment variables required for this build (do NOT change)

    # -------------------------------------------------------------

    ENV ORACLE_BASE=/opt/oracle \

    ORACLE_HOME=/opt/oracle/product/19c/dbhome_1 \

    INSTALL_DIR=/opt/install \

    INSTALL_FILE_1=$INSTALL_FILE_1 \

    INSTALL_RSP="db_inst.rsp" \

    CONFIG_RSP="dbca.rsp.tmpl" \

    PWD_FILE="setPassword.sh" \

    RUN_FILE="runOracle.sh" \

    START_FILE="startDB.sh" \

    CREATE_DB_FILE="createDB.sh" \

    SETUP_LINUX_FILE="setupLinuxEnv.sh" \

    INSTALL_DB_BINARIES_FILE="installDBBinaries.sh" \

    # Directory for keeping Oracle Wallet

    WALLET_DIR=""

    ```

    清单 13-7

    一个 Oracle 19c Dockerfile 的部分内容，展示了参数和环境指令。环境设置侧重于与文件和目录相关的部分。


    为了说明问题，假设 `runOracle.sh` 和 `createDB.sh` 脚本在不同数据库版本之间差异很大，将它们的逻辑合并既不实际也不可取。响应文件也不可互换。在清单
    [13-8](#514143_1_En_13_Chapter.xhtml#PC47) 中，我添加了一个数据库版本参数，并将其纳入现有环境中。


    ```

    # Argument to control removal of components not needed after db software installation

    ARG SLIMMING=true

    ARG INSTALL_FILE_1="LINUX.X64_193000_db_home.zip"

    ARG DB_VERSION=19.3.0

    # Environment variables required for this build (do NOT change)

    # -------------------------------------------------------------

    ENV ORACLE_BASE=/opt/oracle \

    ORACLE_HOME=/opt/oracle/product/19c/dbhome_1 \

    INSTALL_DIR=/opt/install \

    INSTALL_FILE_1=$INSTALL_FILE_1 \

    INSTALL_RSP="db_inst.${DB_VERSION}.rsp" \

    CONFIG_RSP="dbca.rsp.${DB_VERSION}.tmpl" \

    PWD_FILE="setPassword.sh" \

    RUN_FILE="runOracle.${DB_VERSION}.sh" \

    START_FILE="startDB.sh" \

    CREATE_DB_FILE="createDB.${DB_VERSION}.sh" \

    SETUP_LINUX_FILE="setupLinuxEnv.sh" \

    INSTALL_DB_BINARIES_FILE="installDBBinaries.sh" \

    # Directory for keeping Oracle Wallet

    WALLET_DIR=""

    ```

    清单 13-8

    一个修改后的 Dockerfile，它通过一个参数接受数据库版本，并将其插入到环境中定义的选定脚本和模板的名称中。


    该 Dockerfile 支持多个版本，而无需向脚本本身添加复杂逻辑。所有版本共有的文件被共享。在必要时替换专用脚本。同样的技术也有助于解决环境差异。用于设置生产系统外观的
    `.bashrc` 文件可能与我在实验性容器中使用的有很大不同。19c 和 21c 的 Dockerfile 向容器的 `.bashrc` 文件添加了条目：


    ```

    RUN echo ''ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}''
    > .bashrc

    ```


    我们可以扩展该命令以包含提示符的自定义：


    ```

    export PS1="[\u - \${ORACLE_SID}] \w\n# "

    ```


    然而，我们现在进入了棘手的领域。尝试用 `echo` 重现这个字符串：


    ```

    # Without quotes: backslash before the dollar sign and trailing whitespace are
    lost.

    echo export PS1="[\u - \${ORACLE_SID}] \w\n# "

    export PS1=[\u - ${ORACLE_SID}] \w\n#

    # With double quotes, escaping embedded quotes: backslash is lost.

    echo "export PS1=\"[\u - \${ORACLE_SID}] \w\n# \""

    export PS1="[\u - ${ORACLE_SID}] \w\n# "

    # Double-escaped the backslash: works!

    echo "export PS1=\"[\u - \\\${ORACLE_SID}] \w\n# \""

    export PS1="[\u - \${ORACLE_SID}] \w\n# "

    # Single quotes prevent bash from evaluating the string: works!

    echo ''export PS1="[\u - \${ORACLE_SID}] \w\n# "''

    export PS1="[\u - \${ORACLE_SID}] \w\n# "

    ```


    Bash shell 有一些敏感性和怪癖，这并不总是显而易见的。弄清楚如何让它打印包含特殊字符的字符串可能会令人沮丧！另一种方法是提前为每个环境编写专用文件，然后将它们复制到镜像中。一个直截了当的生产文件
    `bashrc.prod`：


    ```

    ORACLE_SID=${ORACLE_SID:-ORCLCDB}

    export ORACLE_SID=${ORACLE_SID^^}

    ```


    以及一个用于测试的文件 `bashrc.test`，它设置了 `ORACLE_SID` 并添加了提示符和其他环境变量的设置：


    ```

    ORACLE_SID=${ORACLE_SID:-ORCLCDB}

    export ORACLE_SID=${ORACLE_SID^^}

    export PS1="[\u - \${ORACLE_SID}] \w\n# "

    export ORACLE_BASE_CONFIG="$($ORACLE_HOME/bin/orabaseconfig 2>/dev/null || echo
    $ORACLE_HOME)"

    export ORACLE_BASE_HOME="$($ORACLE_HOME/bin/orabasehome 2>/dev/null || echo $ORACLE_HOME)"

    export TNS_ADMIN=$ORACLE_BASE_HOME/network/admin

    export ORACLE_PATH=/home/oracle

    ```


    在下面来自 19c Dockerfile 的片段中，我修改了最终的构建阶段以接受一个参数，并将 `RUN` 命令替换为 `COPY`，以将正确的文件插入镜像：


    ```

    #############################################

    # -------------------------------------------

    # Start new layer for database runtime

    # -------------------------------------------

    #############################################

    FROM base

    ARG ENV=prod

    USER oracle

    COPY --chown=oracle:dba --from=builder $ORACLE_BASE $ORACLE_BASE

    USER root

    RUN $ORACLE_BASE/oraInventory/orainstRoot.sh && \

    $ORACLE_HOME/root.sh

    USER oracle

    WORKDIR /home/oracle

    # Add an environment-specific bashrc file to the image

    COPY bashrc.$ENV /home/oracle/.bashrc

    ```


    无论是处理脚本还是配置文件，使用包含镜像中所需的确切代码或文本的文件可能更容易（并且可能更不易出错和令人沮丧）！'
  raw: '### Conditional File Copy


    The modifications presented in the first part of this section addressed a case
    where scripts use arguments for if-then or case-based decision-making. The scripts
    must necessarily embed the logic for evaluating and acting on conditions. The
    example in that section considered consolidating scripts for two or more versions
    into a single directory structure. Many of the helper files in the repository
    are identical or similar enough to be interchangeable across versions, and it
    makes sense to combine them. But others—including the database installation script—include
    unique steps for specific conditions. As Oracle introduces new versions, a “one
    ring to rule them all” style approach for database installation may not be practical.
    Accommodating differences in Express, Standard, and Enterprise Editions for every
    version, from 11g to 21c and beyond, is a complex task. Testing updates against
    every combination would quickly grow out of hand.


    There’s a security aspect to think about as well. Look at the files present in
    the `$ORACLE_BASE` directory of an Oracle database container:


    ```

    /opt/oracle/runOracle.sh

    /opt/oracle/createObserver.sh

    /opt/oracle/relinkOracleBinary.sh

    /opt/oracle/setPassword.sh

    /opt/oracle/checkDBStatus.sh

    /opt/oracle/runUserScripts.sh

    /opt/oracle/configTcps.sh

    /opt/oracle/createDB.sh

    /opt/oracle/dbca.rsp.tmpl

    /opt/oracle/startDB.sh

    ```


    Logic embedded in scripts reveals how things work under different conditions and
    might expose ways attackers can exploit your database infrastructure. Someone
    with access to one image or an unsecured or “unimportant” container can infer
    configurations and even reverse engineer other containers in your environment.


    Perhaps there’s a happy medium—one set of shared files that apply to any version
    and dedicated files without conditional logic that’s overly complex or revealing.
    To imagine how that might work, let’s look at the top section of a 19c Dockerfile,
    focusing on the arguments and environment settings in Listing [13-7](#514143_1_En_13_Chapter.xhtml#PC46).
    I’ve narrowed it down by removing some of the specialized environment variables
    that aren’t important to this exercise.


    ```

    # Argument to control removal of components not needed after db software installation

    ARG SLIMMING=true

    ARG INSTALL_FILE_1="LINUX.X64_193000_db_home.zip"

    # Environment variables required for this build (do NOT change)

    # -------------------------------------------------------------

    ENV ORACLE_BASE=/opt/oracle \

    ORACLE_HOME=/opt/oracle/product/19c/dbhome_1 \

    INSTALL_DIR=/opt/install \

    INSTALL_FILE_1=$INSTALL_FILE_1 \

    INSTALL_RSP="db_inst.rsp" \

    CONFIG_RSP="dbca.rsp.tmpl" \

    PWD_FILE="setPassword.sh" \

    RUN_FILE="runOracle.sh" \

    START_FILE="startDB.sh" \

    CREATE_DB_FILE="createDB.sh" \

    SETUP_LINUX_FILE="setupLinuxEnv.sh" \

    INSTALL_DB_BINARIES_FILE="installDBBinaries.sh" \

    # Directory for keeping Oracle Wallet

    WALLET_DIR=""

    Listing 13-7

    A portion of an Oracle 19c Dockerfile showing argument and environment instructions.
    The environment settings focus on those related to files and directories

    ```


    For argument’s sake, let’s say that the `runOracle.sh` and `createDB.sh` scripts
    are different enough across database versions that combining their logic isn’t
    practical or desirable. The response files aren’t interchangeable, either. In
    Listing [13-8](#514143_1_En_13_Chapter.xhtml#PC47), I added an argument for the
    database version and incorporated it into the existing environment.


    ```

    # Argument to control removal of components not needed after db software installation

    ARG SLIMMING=true

    ARG INSTALL_FILE_1="LINUX.X64_193000_db_home.zip"

    ARG DB_VERSION=19.3.0

    # Environment variables required for this build (do NOT change)

    # -------------------------------------------------------------

    ENV ORACLE_BASE=/opt/oracle \

    ORACLE_HOME=/opt/oracle/product/19c/dbhome_1 \

    INSTALL_DIR=/opt/install \

    INSTALL_FILE_1=$INSTALL_FILE_1 \

    INSTALL_RSP="db_inst.${DB_VERSION}.rsp" \

    CONFIG_RSP="dbca.rsp.${DB_VERSION}.tmpl" \

    PWD_FILE="setPassword.sh" \

    RUN_FILE="runOracle.${DB_VERSION}.sh" \

    START_FILE="startDB.sh" \

    CREATE_DB_FILE="createDB.${DB_VERSION}.sh" \

    SETUP_LINUX_FILE="setupLinuxEnv.sh" \

    INSTALL_DB_BINARIES_FILE="installDBBinaries.sh" \

    # Directory for keeping Oracle Wallet

    WALLET_DIR=""

    Listing 13-8

    A modified Dockerfile that accepts a database version in an argument and inserts
    it into the names of select scripts and templates defined in the environment

    ```


    The Dockerfile supports multiple versions without adding complex logic to the
    scripts themselves. Files common to all versions are shared. Dedicated scripts
    are substituted where necessary. This same technique helps address environmental
    differences, too. The `.bashrc` file used to set up the look and feel of production
    systems may be quite different from the one I’d use in an experimental container.
    The 19c and 21c Dockerfiles add entries to the container’s `.bashrc` files:


    ```

    RUN echo ''ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}''
    > .bashrc

    ```


    We could extend that command to include customizations to the prompt:


    ```

    export PS1="[\u - \${ORACLE_SID}] \w\n# "

    ```


    Now we’re getting into rough territory, though. Attempting to reproduce this string
    with `echo`:


    ```

    # Without quotes: backslash before the dollar sign and trailing whitespace are
    lost.

    echo export PS1="[\u - \${ORACLE_SID}] \w\n# "

    export PS1=[\u - ${ORACLE_SID}] \w\n#

    # With double quotes, escaping embedded quotes: backslash is lost.

    echo "export PS1=\"[\u - \${ORACLE_SID}] \w\n# \""

    export PS1="[\u - ${ORACLE_SID}] \w\n# "

    # Double-escaped the backslash: works!

    echo "export PS1=\"[\u - \\\${ORACLE_SID}] \w\n# \""

    export PS1="[\u - \${ORACLE_SID}] \w\n# "

    # Single quotes prevent bash from evaluating the string: works!

    echo ''export PS1="[\u - \${ORACLE_SID}] \w\n# "''

    export PS1="[\u - \${ORACLE_SID}] \w\n# "

    ```


    The bash shell has sensitivities and quirks that aren’t always obvious. Figuring
    out how to make it print strings containing special characters can be frustrating!
    An alternative is writing dedicated files for each environment in advance, then
    copying them into the image. A no-nonsense production file, `bashrc.prod`:


    ```

    ORACLE_SID=${ORACLE_SID:-ORCLCDB}

    export ORACLE_SID=${ORACLE_SID^^}

    ```


    And a file for test, `bashrc.test`, that sets the `ORACLE_SID` and adds settings
    for the prompt and other environment variables:


    ```

    ORACLE_SID=${ORACLE_SID:-ORCLCDB}

    export ORACLE_SID=${ORACLE_SID^^}

    export PS1="[\u - \${ORACLE_SID}] \w\n# "

    export ORACLE_BASE_CONFIG="$($ORACLE_HOME/bin/orabaseconfig 2>/dev/null || echo
    $ORACLE_HOME)"

    export ORACLE_BASE_HOME="$($ORACLE_HOME/bin/orabasehome 2>/dev/null || echo $ORACLE_HOME)"

    export TNS_ADMIN=$ORACLE_BASE_HOME/network/admin

    export ORACLE_PATH=/home/oracle

    ```


    In the following snippet from the 19c Dockerfile, I modified the final build stage
    to accept an argument and replaced the `RUN` command with a `COPY` for inserting
    the correct file into the image:


    ```

    #############################################

    # -------------------------------------------

    # Start new layer for database runtime

    # -------------------------------------------

    #############################################

    FROM base

    ARG ENV=prod

    USER oracle

    COPY --chown=oracle:dba --from=builder $ORACLE_BASE $ORACLE_BASE

    USER root

    RUN $ORACLE_BASE/oraInventory/orainstRoot.sh && \

    $ORACLE_HOME/root.sh

    USER oracle

    WORKDIR /home/oracle

    # Add an environment-specific bashrc file to the image

    COPY bashrc.$ENV /home/oracle/.bashrc

    ```


    Whether working with scripts or configuration files, it may be easier (and potentially
    less error-prone and frustrating) to work with files containing the exact code
    or text needed in the image!'
  trans: '# 条件文件复制


    ## 脚本逻辑与安全考量


    本节第一部分提出的修改，针对的是脚本使用参数进行 `if-then` 或基于 `case` 的决策的场景。脚本必须内嵌评估条件和根据条件采取行动的逻辑。该部分的例子考虑了将两个或多个版本的脚本整合到单一目录结构中。仓库中许多辅助文件是相同的或足够相似，可以在不同版本间互换，因此将它们合并是有意义的。但其他文件——包括数据库安装脚本——包含针对特定条件的独特步骤。随着
    Oracle 推出新版本，对数据库安装采用“一个脚本统治所有”的方法可能并不实用。为每个版本（从 11g 到 21c 及以后）适应 Express、Standard
    和 Enterprise 版本之间的差异是一项复杂的任务。针对所有组合测试更新会迅速变得难以掌控。


    还有一个安全方面需要考虑。查看 Oracle 数据库容器中 `$ORACLE_BASE` 目录下的文件：


    ```

    /opt/oracle/runOracle.sh

    /opt/oracle/createObserver.sh

    /opt/oracle/relinkOracleBinary.sh

    /opt/oracle/setPassword.sh

    /opt/oracle/checkDBStatus.sh

    /opt/oracle/runUserScripts.sh

    /opt/oracle/configTcps.sh

    /opt/oracle/createDB.sh

    /opt/oracle/dbca.rsp.tmpl

    /opt/oracle/startDB.sh

    ```


    嵌入在脚本中的逻辑揭示了在不同条件下系统如何工作，并可能暴露攻击者可以利用你的数据库基础设施的方式。能够访问一个镜像或一个不安全或“不重要”容器的人可以推断配置，甚至反向工程你环境中的其他容器。


    ## Dockerfile 示例


    也许存在一个折中方案——一组适用于任何版本的共享文件，以及没有过于复杂或泄露信息的条件逻辑的专用文件。为了想象这是如何工作的，让我们看一下 19c Dockerfile
    的顶部部分，重点关注清单 13-7 中的参数和环境设置。我通过删除一些对本练习不重要的特殊环境变量来简化它。


    ```

    # Argument to control removal of components not needed after db software installation

    ARG SLIMMING=true

    ARG INSTALL_FILE_1="LINUX.X64_193000_db_home.zip"

    # Environment variables required for this build (do NOT change)

    # -------------------------------------------------------------

    ENV ORACLE_BASE=/opt/oracle \

    ORACLE_HOME=/opt/oracle/product/19c/dbhome_1 \

    INSTALL_DIR=/opt/install \

    INSTALL_FILE_1=$INSTALL_FILE_1 \

    INSTALL_RSP="db_inst.rsp" \

    CONFIG_RSP="dbca.rsp.tmpl" \

    PWD_FILE="setPassword.sh" \

    RUN_FILE="runOracle.sh" \

    START_FILE="startDB.sh" \

    CREATE_DB_FILE="createDB.sh" \

    SETUP_LINUX_FILE="setupLinuxEnv.sh" \

    INSTALL_DB_BINARIES_FILE="installDBBinaries.sh" \

    # Directory for keeping Oracle Wallet

    WALLET_DIR=""

    ```

    清单 13-7

    一个 Oracle 19c Dockerfile 的部分内容，展示了参数和环境指令。环境设置侧重于与文件和目录相关的部分。


    为了说明问题，假设 `runOracle.sh` 和 `createDB.sh` 脚本在不同数据库版本之间差异很大，将它们的逻辑合并既不实际也不可取。响应文件也不可互换。在清单
    13-8 中，我添加了一个数据库版本参数，并将其纳入现有环境中。


    ```

    # Argument to control removal of components not needed after db software installation

    ARG SLIMMING=true

    ARG INSTALL_FILE_1="LINUX.X64_193000_db_home.zip"

    ARG DB_VERSION=19.3.0

    # Environment variables required for this build (do NOT change)

    # -------------------------------------------------------------

    ENV ORACLE_BASE=/opt/oracle \

    ORACLE_HOME=/opt/oracle/product/19c/dbhome_1 \

    INSTALL_DIR=/opt/install \

    INSTALL_FILE_1=$INSTALL_FILE_1 \

    INSTALL_RSP="db_inst.${DB_VERSION}.rsp" \

    CONFIG_RSP="dbca.rsp.${DB_VERSION}.tmpl" \

    PWD_FILE="setPassword.sh" \

    RUN_FILE="runOracle.${DB_VERSION}.sh" \

    START_FILE="startDB.sh" \

    CREATE_DB_FILE="createDB.${DB_VERSION}.sh" \

    SETUP_LINUX_FILE="setupLinuxEnv.sh" \

    INSTALL_DB_BINARIES_FILE="installDBBinaries.sh" \

    # Directory for keeping Oracle Wallet

    WALLET_DIR=""

    ```

    清单 13-8

    一个修改后的 Dockerfile，它通过一个参数接受数据库版本，并将其插入到环境中定义的选定脚本和模板的名称中。


    该 Dockerfile 支持多个版本，而无需向脚本本身添加复杂逻辑。所有版本共有的文件被共享。在必要时替换专用脚本。同样的技术也有助于解决环境差异。用于设置生产系统外观的
    `.bashrc` 文件可能与我在实验性容器中使用的有很大不同。19c 和 21c 的 Dockerfile 向容器的 `.bashrc` 文件添加了条目：


    ```

    RUN echo ''ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}''
    > .bashrc

    ```


    我们可以扩展该命令以包含提示符的自定义：


    ```

    export PS1="[\u - \${ORACLE_SID}] \w\n# "

    ```


    然而，我们现在进入了棘手的领域。尝试用 `echo` 重现这个字符串：


    ```

    # Without quotes: backslash before the dollar sign and trailing whitespace are
    lost.

    echo export PS1="[\u - \${ORACLE_SID}] \w\n# "

    export PS1=[\u - ${ORACLE_SID}] \w\n#

    # With double quotes, escaping embedded quotes: backslash is lost.

    echo "export PS1=\"[\u - \${ORACLE_SID}] \w\n# \""

    export PS1="[\u - ${ORACLE_SID}] \w\n# "

    # Double-escaped the backslash: works!

    echo "export PS1=\"[\u - \\\${ORACLE_SID}] \w\n# \""

    export PS1="[\u - \${ORACLE_SID}] \w\n# "

    # Single quotes prevent bash from evaluating the string: works!

    echo ''export PS1="[\u - \${ORACLE_SID}] \w\n# "''

    export PS1="[\u - \${ORACLE_SID}] \w\n# "

    ```


    Bash shell 有一些敏感性和怪癖，这并不总是显而易见的。弄清楚如何让它打印包含特殊字符的字符串可能会令人沮丧！另一种方法是提前为每个环境编写专用文件，然后将它们复制到镜像中。一个直截了当的生产文件
    `bashrc.prod`：


    ```

    ORACLE_SID=${ORACLE_SID:-ORCLCDB}

    export ORACLE_SID=${ORACLE_SID^^}

    ```


    以及一个用于测试的文件 `bashrc.test`，它设置了 `ORACLE_SID` 并添加了提示符和其他环境变量的设置：


    ```

    ORACLE_SID=${ORACLE_SID:-ORCLCDB}

    export ORACLE_SID=${ORACLE_SID^^}

    export PS1="[\u - \${ORACLE_SID}] \w\n# "

    export ORACLE_BASE_CONFIG="$($ORACLE_HOME/bin/orabaseconfig 2>/dev/null || echo
    $ORACLE_HOME)"

    export ORACLE_BASE_HOME="$($ORACLE_HOME/bin/orabasehome 2>/dev/null || echo $ORACLE_HOME)"

    export TNS_ADMIN=$ORACLE_BASE_HOME/network/admin

    export ORACLE_PATH=/home/oracle

    ```


    在下面来自 19c Dockerfile 的片段中，我修改了最终的构建阶段以接受一个参数，并将 `RUN` 命令替换为 `COPY`，以将正确的文件插入镜像：


    ```

    #############################################

    # -------------------------------------------

    # Start new layer for database runtime

    # -------------------------------------------

    #############################################

    FROM base

    ARG ENV=prod

    USER oracle

    COPY --chown=oracle:dba --from=builder $ORACLE_BASE $ORACLE_BASE

    USER root

    RUN $ORACLE_BASE/oraInventory/orainstRoot.sh && \

    $ORACLE_HOME/root.sh

    USER oracle

    WORKDIR /home/oracle

    # Add an environment-specific bashrc file to the image

    COPY bashrc.$ENV /home/oracle/.bashrc

    ```


    无论是处理脚本还是配置文件，使用包含镜像中所需的确切代码或文本的文件可能更容易（并且可能更不易出错和令人沮丧）！'
- fmt: '## Summary


    As you gain experience working with ready-made container images, you’ll discover
    things you like and things you’d like to change. It’s part of the learning curve,
    and robust, forgiving tools help build the confidence and skills to take the next
    step. Whether it’s a first racing bike or a new technology, time in the saddle
    creates muscle memory and familiarity. Once using the tools becomes second nature,
    your mind can fully concentrate on developing a clearer vision of what you want
    to do and, with it, understand how your tools may limit your progress.


    The four friends in *Breaking Away* struggle against the expectations of parents
    and society as they search for their own unique identities. While they can’t change
    who they are or where they’re from, they realize their origins don’t define their
    future direction. The same holds for the image repositories we’ve worked with
    throughout this book. They’re foundations that shape our understanding of running
    databases in containers but don’t prevent us from dreaming big and charting our
    own course.


    This chapter introduced recipes to help you take those next steps with containers.
    They tackle issues you’re likely to face as you work with database images, but
    they’re also adaptable to other needs. That’s the beauty of recipes—whether in
    cooking or coding, it’s a blend of art and science. There’s rarely a single answer
    to a question, yet the methods or patterns for solving one problem often apply
    to others. I hope the examples in this chapter inspire you to imagine solutions
    for the challenges you encounter on your Docker journey! The next chapter looks
    deeper into how Docker builds images with an eye toward writing efficient and
    effective Dockerfiles.


    Footnotes [1](#514143_1_En_13_Chapter.xhtml#Fn1_source)   [2](#514143_1_En_13_Chapter.xhtml#Fn2_source)   [3](#514143_1_En_13_Chapter.xhtml#Fn3_source)   [4](#514143_1_En_13_Chapter.xhtml#Fn4_source)   [5](#514143_1_En_13_Chapter.xhtml#Fn5_source)   [6](#514143_1_En_13_Chapter.xhtml#Fn6_source)   [7](#514143_1_En_13_Chapter.xhtml#Fn7_source)


    # 14. Building Images


    There are certain mysteries in life I don’t need (or even want) to understand.
    Avoiding the knowledge preserves a bit of wonder for the world around me. Sewing
    machines are one of those things. I can sew by hand, albeit without much talent,
    but I’ve never figured out how a machine can duplicate that effort. Even with
    easy access to the Internet, where I could surely find a YouTube video that reveals
    the entire process in slow motion with stitch-by-stitch expert narration, I’ve
    resisted learning the underlying principles of sewing machines. How a machine
    pokes a needle partway through the fabric and then secures each stitch from below
    is beyond me. I know better, but the best explanation I can imagine involves tiny
    gremlins that live inside the machine, furiously looping bobbin thread through
    each stitch. I’m content not knowing—it nourishes a fascination and appreciation
    of everyday things and reminds me there are wonderfully intelligent and inventive
    people all around! Or that magic truly exists!


    There are conveniences I simply take for granted. Mulling over the technology
    surrounding me, I understand my laptop uses DHCP to get a network address. I don’t
    know the details, but it seems like something I could figure out if I needed to,
    and it doesn’t hold the same mystery as a sewing machine. It makes joining a network
    easy and removes the guesswork of finding an available IP address on hotel WiFi.


    Automation and scripts fall into a similar bucket. They make it faster and easier
    to perform everyday tasks and allow us “forget” the details. (To be completely
    honest, sometimes I look at the code and wonder how I was either so naive or so
    inspired!) Codifying knowledge converts it into tools we can share with others
    and use as the building blocks of bigger, better things. In Chapter [4](#514143_1_En_4_Chapter.xhtml),
    the `buildContainerImage.sh` script did just that. You gave it a database version
    and edition and constructed and ran a `docker build` command for you in the background.


    Gaining greater control over image creation means getting hands-on with the build
    process. Even if your plans don’t include writing custom Dockerfiles, understanding
    elements of the build command provides a greater appreciation of what takes place
    behind the curtains and makes sense of the magic! And I promise that building
    images doesn’t approach the mystery of sewing machines nor involves armies of
    gremlins laboring inside your computer!


    ## Build Command Syntax


    `docker build` may be the most straightforward command in the Docker lexicon.
    In its most minimal form, this is valid:


    ```

    docker build .

    ```


    That doesn’t seem like much! How could something this simple do anything? It all
    has to do with context!'
