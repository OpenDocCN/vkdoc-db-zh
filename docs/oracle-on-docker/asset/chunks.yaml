- fmt: '# 虚拟机和容器的资源放置比较


    两者都在主机上运行并拥有主机操作系统。[^11] 各自添加了一个抽象层：对于虚拟机是**hypervisor**；对于容器是**runtime**。Hypervisor允许每个虚拟机客户操作系统访问主机资源并将VM彼此隔离。容器运行时执行类似的功能。图[2-2]的主要结论是容器没有客户操作系统。


    ### 专用 vs. 共享


    注意图[2-1]与图[2-2]之间的相似之处。三个数据库意味着三组重复的元数据，每组都有其进程和内存需求。虚拟机也是如此。客户操作系统不是共享的。独立的虚拟机需要主机资源来管理其环境，就像它们原生运行一样。


    相比之下，单个数据库中的多个模式共享一个数据字典。添加模式不会增加后台进程的数量或使用的内存量。添加模式时，唯一受影响的系统资源是元数据和新对象所需的存储空间。类似地，容器共享主机内核和环境中的资源。通过减少或消除重复文件并与主机操作系统共享管理进程，容器享有更小的占用空间。


    ### 性能


    还有其他的比较点。为分配给各个数据库的模式添加或启动需要更多的时间和精力。虚拟机也是如此。创建和启动数据库，以及在独立虚拟机中安装和启动操作系统，都是时间和资源密集型的活动。


    在单个数据库中添加模式要简单得多，这仅仅是为应用程序创建专用数据库的一个有限子集。在数据库实例中也没有“启动”模式的概念。如果数据库已启动，那么模式也可用。访问模式的开销仅仅是建立数据库连接所需的开销。


    我们可以用同样的方式看待容器。没有先决的安装要求，而且由于容器没有操作系统，它们也不需要启动。如果主机正在运行，启动容器只是创建一个进程的问题。


    ### 容量和能力


    然而，图[2-2]中的表示并没有提供完整的图景。两者都在主机级别运行软件——一个操作系统和一些支持客户交互和隔离的软件抽象或模拟层。两种解决方案都容纳了三个应用程序。除了操作系统的存在与否，它们*可能看起来*是相对相似的方法。


    容器和虚拟机有时分别被称为“轻量”和“重量”。VM额外的“重量”来自于客户操作系统。相同的应用程序（即具有相同二进制文件、库和应用程序层的应用程序）在虚拟客户机之间重复组件。在虚拟环境中，运行并行操作系统的开销也增加了系统负载。


    让我们通过添加一个边界来捕获主机的相对*容量*，从而修正原始的虚拟机与容器比较，如图[2-3]所示。更容易理解的是，容器解决方案中的应用程序有增长空间，或者可以用更小、功能更弱（且更便宜）的硬件替代，而不牺牲能力。


    ![](images/514143_1_En_2_Chapter/514143_1_En_2_Fig3_HTML.png)


    一个图表比较了虚拟机和容器基础设施的容量需求。它描述了容器解决方案中的应用程序有增长空间，或者可以用更小、功能更弱（且更便宜）的硬件替代，而不牺牲能力。


    图 2-3


    虚拟机和容器基础设施的容量需求比较


    虚拟机相当于在Oracle中为应用程序中的每个模式运行独立数据库，每个数据库都有自己的管理、撤消和临时表空间、内存结构、后台进程等。


    将容器与运行具有多个模式的单个数据库实例进行比较。每个模式只包含其唯一对象。公共功能被集中共享和管理，减少了开销和重复，并提高了能力和性能。[^12]


    ## 概念和术语


    现在您知道了容器是什么以及它们在企业中的位置，让我们深入了解一些容器概念和术语。


    ### 镜像


    一个*镜像*是一个用于启动和运行容器的文件包。镜像在功能上类似于*Vagrant boxes*和*VirtualBox镜像*，熟悉Oracle多租户架构的人甚至可以将其视为*种子数据库*。从根本上说，这些都是使用技术和提供可靠、相同的起点的起点。


    当Docker从镜像启动一个新容器时，它会读取镜像元数据并向容器呈现一个*文件系统*（包括我们之前讨论过的二进制文件、库和应用程序文件）。下一章将更详细地介绍容器如何使用文件系统。同时，让我们看看镜像的一些属性：*标签*、*可移植性*、*不可变性*和*无状态性*。


    #### 标签


    一个*标签*（通常）标识*仓库*中镜像的*版本*。仓库是镜像的集合，通常相关，例如Linux或Python。标记镜像可以区分每个版本，并更容易找到和使用特定版本。标签与仓库名称结合，形成人类可读或友好的镜像名称，形式为`repository-name:tag`。


    仓库名称和标签为人类处理镜像提供了一种便捷的方式。甚至还有一个特殊的标签`latest`，可以在不知道其详细信息的情况下引用镜像的当前工作版本。这突显了一个重要的考虑因素：标签是任意的约定，而不是绝对的标识符。


    构建镜像会创建一个唯一的*SHA256哈希*值。镜像可以存在于具有不同标签的多个仓库中。该哈希（有时称为其*摘要*）用于标识镜像是否相同，并在考虑不可变性时发挥作用。


    #### 可移植


    Docker镜像是*可移植的*，因为它们可以在任何运行Docker的系统上运行——或者，实际上，任何具有兼容容器运行时的系统。这包括Docker替代品，如*Podman*和*LXC*，以及云供应商提供的容器服务。


    此处的可移植性不仅仅是*兼容性*。它保证用户在每个平台上都有*相同的体验*，而无需更改镜像或担心它将在哪里运行。如果它在一台机器上有效，那么它将在*每台机器*上有效。


    可移植性降低了应对各种日常挑战的门槛，包括（但不限于）构建实验室、教学和实验、演示新功能、测试安全性、验证补丁和修复以及验证流程。'
  raw: 'Resource placement comparison for virtual machines and containers


    Both run on a host and have host operating systems.^([^(11)](#fn11)) Each adds
    an abstraction layer: for virtual machines, the hypervisor; for containers, the
    runtime. Hypervisors allow the operating systems of each virtual machine guest
    to access host resources and isolate VMs from one another. The container runtime
    performs a similar function. The main takeaway from Figure [2-2](#514143_1_En_2_Chapter.xhtml#Fig2)
    is that containers don’t have a guest OS.


    ### Dedicated vs. Shared


    Note the parallels between Figures [2-1](#514143_1_En_2_Chapter.xhtml#Fig1) and
    [2-2](#514143_1_En_2_Chapter.xhtml#Fig2). Three databases mean three sets of duplicate
    metadata, each with process and memory requirements. The same applies to virtual
    machines. The guest operating systems are not shared. Independent virtual machines
    demand host resources to manage their environments as if they were running natively.


    In contrast, multiple schemas in a single database share a data dictionary. Adding
    schemas doesn’t increase the number of background processes or the amount of memory
    used. The only system resource affected when adding schemas is the storage needed
    by metadata and new objects. Similarly, containers share resources in the host
    kernel and environment. Containers enjoy smaller footprints by reducing or eliminating
    duplicate files and sharing administrative processes with the host operating system.


    ### Performance


    Other comparisons apply, too. There’s more time and effort needed to add or start
    schemas assigned to individual databases. The same applies to virtual machines.
    Creating and starting databases and installing and booting operating systems in
    independent virtual machines are time- and resource-intensive activities.


    Adding a schema is far less involved in the single database, a limited subset
    of creating a dedicated database for an application. There’s also no concept of
    “starting” a schema in a database instance. If the database is up, the schema
    is available, too. The overhead of accessing a schema is just what’s needed to
    establish a database connection.


    We can look at containers the same way. There’s no prerequisite installation,
    and since containers don’t have an operating system, they don’t need to boot.
    If the host is running, starting a container is just a matter of creating a process.


    ### Capacity and Capability


    The representation in Figure [2-2](#514143_1_En_2_Chapter.xhtml#Fig2) doesn’t
    provide a complete picture, though. Both run software at the host level—an OS
    and some software abstraction or emulation layer supporting guest interaction
    and isolation. Both solutions accommodate three applications. Besides the presence
    or absence of the operating system, they may *seem* to be relatively similar approaches.


    Containers and virtual machines are sometimes referred to as “light” and “heavy,”
    respectively. A VM’s extra “weight” comes from the guest’s operating systems.
    Identical applications (i.e., applications with the same binary, library, and
    application layers) duplicate components across virtual guests. In the virtual
    environment, the overhead of running parallel operating systems also adds load
    to the system.


    Let’s amend the original virtual machine vs. container comparison by adding a
    boundary to capture the relative *capacity* of the hosts, as shown in Figure [2-3](#514143_1_En_2_Chapter.xhtml#Fig3).
    It’s easier to understand that applications in the container solution have room
    to grow or that smaller and less powerful (and less expensive) hardware can be
    substituted without sacrificing capability.


    ![](images/514143_1_En_2_Chapter/514143_1_En_2_Fig3_HTML.png)


    A diagram compares the capacity requirement of virtual machine and container infrastructure.
    It describes that applications in the container solution have room to grow or
    that smaller and less powerful, and less expensive, hardware can be substituted
    without sacrificing capability.


    Figure 2-3


    Capacity requirement comparison of virtual machine and container infrastructure


    Virtual machines are the Oracle equivalent of running independent databases for
    every schema in an application, each with its own administrative, undo, and temporary
    tablespaces, memory structures, background processes, and so on.


    Compare containers to running a single database instance with multiple schemas.
    Each schema contains only its unique objects. Common features are shared and managed
    centrally, reducing overhead and duplication and increasing capability and performance.^([^(12)](#fn12))


    ## Concepts and Terminology


    Now that you know what containers are and where they fit in the enterprise, let’s
    dive into some container concepts and terminology.


    ### Images


    An *image* is a package of files used to start and run containers. Images bear
    functional similarities to *Vagrant boxes* and *VirtualBox images*, and those
    comfortable with Oracle’s multitenant architecture could even think of them as
    *seed databases*. Fundamentally, these are all starting points for working with
    technology and delivering reliable, identical starting points.


    When Docker starts a new container from an image, it reads image metadata and
    presents a *filesystem* (including the binaries, libraries, and application files
    we discussed earlier) to the container. The next chapter goes into more detail
    on how containers use filesystems. In the meantime, let’s look at some properties
    of images: *tags*, *portability*, *immutability*, and *statelessness*.


    #### Tags


    A *tag* (usually) identifies the *version* of an image in a *repository*. A repository
    is a collection of images, usually related, such as Linux or Python. Tagging an
    image differentiates each version and makes it easier to find and use a specific
    version. Tags combine with the repository name to create a human-readable or friendly
    image name with the form `repository-name:tag`.


    Repository names and tags provide a convenient means for humans to work with images.
    There’s even a special tag, `latest`, that references the current working version
    of an image without knowing its details. This highlights an important consideration.
    Tags are arbitrary conventions, not absolute identifiers.


    Building images creates a unique *SHA256 hash* value. Images can exist in multiple
    repositories with different tags. The hash (sometimes referred to as its *digest*)
    identifies whether the images are the same and comes into play when considering
    immutability.


    #### Portable


    Docker images are *portable* because they run on any system that runs Docker—or,
    for that matter, any system with a compatible container runtime. This includes
    Docker alternatives like *Podman* and *LXC* and container services offered by
    cloud vendors.


    Portability in this context is more than just *compatibility*. It guarantees users
    have *identical experiences* on every platform without changing the image or worrying
    about where it will run. If it works on one machine, it will work on *every machine*.


    Portability lowers the threshold for various everyday challenges, including (but
    not limited to) building labs, teaching and experimenting, demonstrating new features,
    testing security, validating patches and fixes, and verifying procedures.'
  trans: '# 虚拟机和容器的资源放置比较


    两者都在主机上运行并拥有主机操作系统。[¹¹] 各自添加了一个抽象层：对于虚拟机是**虚拟机管理程序**；对于容器是**运行时**。虚拟机管理程序允许每个虚拟机客户操作系统访问主机资源并将虚拟机彼此隔离。容器运行时执行类似的功能。图[2-2]的主要结论是容器没有客户操作系统。


    ### 专用 vs. 共享


    注意图[2-1]与图[2-2]之间的相似之处。三个数据库意味着三组重复的元数据，每组都有其进程和内存需求。虚拟机也是如此。客户操作系统不是共享的。独立的虚拟机需要主机资源来管理其环境，就像它们原生运行一样。


    相比之下，单个数据库中的多个模式共享一个数据字典。添加模式不会增加后台进程的数量或使用的内存量。添加模式时，唯一受影响的系统资源是元数据和新对象所需的存储空间。类似地，容器共享主机内核和环境中的资源。通过减少或消除重复文件并与主机操作系统共享管理进程，容器享有更小的占用空间。


    ### 性能


    还有其他的比较点。为分配给各个数据库的模式添加或启动需要更多的时间和精力。虚拟机也是如此。创建和启动数据库，以及在独立虚拟机中安装和启动操作系统，都是时间和资源密集型的活动。


    在单个数据库中添加模式要简单得多，这仅仅是为应用程序创建专用数据库的一个有限子集。在数据库实例中也没有“启动”模式的概念。如果数据库已启动，那么模式也可用。访问模式的开销仅仅是建立数据库连接所需的开销。


    我们可以用同样的方式看待容器。没有先决的安装要求，而且由于容器没有操作系统，它们也不需要启动。如果主机正在运行，启动容器只是创建一个进程的问题。


    ### 容量和能力


    然而，图[2-2]中的表示并没有提供完整的图景。两者都在主机级别运行软件——一个操作系统和一些支持客户交互和隔离的软件抽象或模拟层。两种解决方案都容纳了三个应用程序。除了操作系统的存在与否，它们*可能看起来*是相对相似的方法。


    容器和虚拟机有时分别被称为“轻量”和“重量”。虚拟机额外的“重量”来自于客户操作系统。相同的应用程序（即具有相同二进制文件、库和应用程序层的应用程序）在虚拟客户机之间重复组件。在虚拟环境中，运行并行操作系统的开销也增加了系统负载。


    让我们通过添加一个边界来捕获主机的相对*容量*，从而修正原始的虚拟机与容器比较，如图[2-3]所示。更容易理解的是，容器解决方案中的应用程序有增长空间，或者可以用更小、功能更弱（且更便宜）的硬件替代，而不牺牲能力。


    ![](img/514143_1_En_2_Fig3_HTML.png)


    一个图表比较了虚拟机和容器基础设施的容量需求。它描述了容器解决方案中的应用程序有增长空间，或者可以用更小、功能更弱（且更便宜）的硬件替代，而不牺牲能力。


    图 2-3


    虚拟机和容器基础设施的容量需求比较


    虚拟机相当于在 Oracle 中为应用程序中的每个模式运行独立数据库，每个数据库都有自己的管理、撤消和临时表空间、内存结构、后台进程等。


    将容器与运行具有多个模式的单个数据库实例进行比较。每个模式只包含其唯一对象。公共功能被集中共享和管理，减少了开销和重复，并提高了能力和性能。[¹²]


    ## 概念和术语


    现在您知道了容器是什么以及它们在企业中的位置，让我们深入了解一些容器概念和术语。


    ### 镜像


    一个*镜像*是一个用于启动和运行容器的文件包。镜像在功能上类似于*Vagrant boxes*和*VirtualBox 镜像*，熟悉 Oracle 多租户架构的人甚至可以将其视为*种子数据库*。从根本上说，这些都是使用技术和提供可靠、相同的起点的起点。


    当 Docker 从镜像启动一个新容器时，它会读取镜像元数据并向容器呈现一个*文件系统*（包括我们之前讨论过的二进制文件、库和应用程序文件）。下一章将更详细地介绍容器如何使用文件系统。同时，让我们看看镜像的一些属性：*标签*、*可移植性*、*不可变性*和*无状态性*。


    #### 标签


    一个*标签*（通常）标识*仓库*中镜像的*版本*。仓库是镜像的集合，通常相关，例如 Linux 或 Python。标记镜像可以区分每个版本，并更容易找到和使用特定版本。标签与仓库名称结合，形成人类可读或友好的镜像名称，形式为`repository-name:tag`。


    仓库名称和标签为人类处理镜像提供了一种便捷的方式。甚至还有一个特殊的标签`latest`，可以在不知道其详细信息的情况下引用镜像的当前工作版本。这突显了一个重要的考虑因素：标签是任意的约定，而不是绝对的标识符。


    构建镜像会创建一个唯一的*SHA256 哈希*值。镜像可以存在于具有不同标签的多个仓库中。该哈希（有时称为其*摘要*）用于标识镜像是否相同，并在考虑不可变性时发挥作用。


    #### 可移植


    Docker 镜像是*可移植的*，因为它们可以在任何运行 Docker 的系统上运行——或者，实际上，任何具有兼容容器运行时的系统。这包括 Docker 替代品，如*Podman*和*LXC*，以及云供应商提供的容器服务。


    此处的可移植性不仅仅是*兼容性*。它保证用户在每个平台上都有*相同的体验*，而无需更改镜像或担心它将在哪里运行。如果它在一台机器上有效，那么它将在*每台机器*上有效。


    可移植性降低了应对各种日常挑战的门槛，包括（但不限于）构建实验室、教学和实验、演示新功能、测试安全性、验证补丁和修复以及验证流程。


    [¹¹]: 此处原文为脚注标记，内容未提供。

    [¹²]: 此处原文为脚注标记，内容未提供。'
- fmt: '## Immutable and Stateless


    Images are `immutable`—they can’t be changed. An image can be modified and saved
    as a new image and even updated to replace an image using the same tag, but its
    hash value changes.

    Immutability goes hand in hand with the `stateless` nature of images. Information
    about an image’s condition, or `state`, can’t be saved `to the image`.^([^(13)](#fn13))
    Images always start from the same, known place.

    While tags offer a friendly mechanism for working with images, and portability
    lets us run an image anywhere, immutability guarantees images shared across multiple
    environments are the same. Statelessness assures that every image begins from
    the same starting point and delivers identical results.

    Portability and immutability are key to sharing images, with hashes uniquely identifying
    their version. Docker and container technology are a way of building `Infrastructure
    as Code`. Infrastructure as Code produces reliable environments through version
    control and automation and reduces or eliminates manual configuration.

    I recently helped troubleshoot a Data Guard issue. A new standby database added
    to an existing environment wasn’t working as expected. The DBA team followed a
    documented procedure and felt confident the failing system was identical to the
    working one. Several hours later, a minor variation in the `sqlnet.ora` configuration
    was identified and fixed. Building from code avoids oversights, saving time and
    money (and frustration)!


    ### Containers


    A `container` is created by “running” an image. Containers perform work. From
    the host perspective, a container looks like a single process on the system. “Inside”
    a container, things appear differently! Once connected to a container, the environment
    seems to be a complete host with a filesystem, processes, users, and networking.
    Like virtual machines, things look and behave differently depending on whether
    you’re “inside” or “outside.”

    Containers are `stateful` and `ephemeral` invocations of images. These characteristics
    are often misunderstood, particularly in the database world.


    #### Stateful


    A container’s condition, or `state`, is preserved. Nothing is lost when containers
    (or their host) are stopped and restarted. Files and content added and modified
    on the container’s filesystem persist through the stop-start cycle. Directories
    and files deleted from the container don’t reappear.

    It’s easy to confuse the ways images and containers manage state. Remember that
    images are like templates or seed databases. Their statelessness provides a reliable
    starting point to begin work. That work occurs (and is saved) in stateful containers.
    When working with databases, it’s essential to understand that changes to data
    persist in containers just as in virtual machines or bare-metal environments.


    #### Ephemeral


    Containers usually do some work, then disappear. Generally speaking, containers
    are considered `ephemeral`, or temporary, processes. Based on this, it’s easy
    to conclude containers are inappropriate for hosting long-lived applications like
    databases. However, containers don’t expire, and nothing prevents them from running
    for days, months, or years.

    Containers don’t vanish on their own, either. They are no more or less permanent
    than virtual machines, yet there is a mistaken belief in the database world that
    containers are dangerous places to put your data.^([^(14)](#fn14)) Can you remove
    a container? Absolutely. You can also remove a virtual machine or delete its disks
    from the host. To be clear, these are operational matters and unrelated to the
    technology itself.


    ## Resources


    Like other processes running on a system, containers use the host’s CPU, memory,
    and storage. Docker provides ways of managing and limiting resource use by individual
    containers and the Docker runtime. Chapter 16 covers this in more detail. But
    containers can interact with the host in other ways. The most common of these
    are accessing local storage and exposing network connectivity.


    ### Volumes


    `Volumes` are a mechanism for sharing filesystems from the local host with containers
    and separating data from software. Conceptually, volumes are like `NFS` filesystems
    visible to the host and container, allowing access to high-performance and resilient
    devices and shared data. They streamline operational activities that are difficult
    or impractical for Oracle databases running on other platforms, including

    *   **Patch and upgrade:** Stop and remove the running container, replace it with
    one using the upgraded version, run any post-upgrade steps, and start the database.

    *   **Move and migrate:** Containers are portable and run in any compatible environment.
    Whether it’s moving to a newer, more powerful on-premises host or a lift and shift
    to the cloud, containers offer a consistent and controllable mechanism for transporting
    data and databases.

    *   **Clone databases:** Separating data and software makes cloning a database
    a matter of copying the data volume and starting a new container referencing the
    location of the data.

    *   **Create reference datasets:** Create gold images of data to distribute among
    QA and development teams. Stop a container, swap out its data, and restart it.
    Or drop and recreate the container using the new dataset to guarantee teams are
    testing with clean, consistent data.

    Removing a container deletes its data—unless it’s on a volume. Storing data and
    configuration files on volumes allows data to outlive containers and is key to
    these techniques. Oracle’s official Docker image repository scripts build this
    capability into images, and it’s easily accessed through the Docker API when creating
    a container.


    ### Networking


    Containers run in isolation by default, with connections limited to privileged
    users on the host. That isn’t very useful for most applications. Fortunately,
    Docker can expose and map ports to the local host. Applications, users, and even
    other containers access a container using the mapped port on the host. Only ports
    deliberately opened in an image are mappable. Oracle’s Docker images expose ports
    1521 and 5500.

    Figure 2-4 shows an example of connecting Oracle SQL Developer to an Oracle database
    running in a container. The database’s listener port, 1521, is mapped to port
    10000 on the local host. The hostname is `localhost` (or the hostname or IP address
    of the Docker host).

    ![](images/514143_1_En_2_Chapter/514143_1_En_2_Fig4_HTML.jpg)

    ```

    A screenshot illustrates the example of connecting oracle S Q L developer to an
    oracle database running in a container. Hostname labeled as localhost, I P address,
    or host name for hostname labeled, port 10000 labeled as published port, and service
    name M Y D B labeled as database service.

    ```

    Figure 2-4

    Connecting SQL Developer to an Oracle database in a Docker container

    Most of the networking covered in this book uses port mapping for simplicity.
    There are more robust and scalable solutions suited to production environments.
    Chapter 9 covers a Docker-native solution. Tools like `Docker Compose` and `Kubernetes`
    have facilities for administering and securing connections to containers (and
    databases).


    ## Additional Terminology


    Readers should know a few additional terms and concepts to complete a basic understanding
    of Docker.'
