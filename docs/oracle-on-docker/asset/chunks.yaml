  trans: '


    ### 可移植性


    Microsoft Word 以标准格式保存文件。我可以与在不同操作系统或架构上运行 Word 的其他人共享文档，甚至可以与使用识别该标准的各种文字处理程序的人共享。


    使用 `Docker`（及类似技术）构建的容器 `镜像` 遵循 `开放容器倡议` 或 `OCI`^(⁶) ([`https://opencontainers.org`](https://opencontainers.org))。它们可在不同硬件和操作系统之间**可移植**，并且在所有符合
    `OCI` 标准的环境中可互换。在 Windows 上用 `Docker` 构建的镜像在 Mac 或 Linux 系统上运行效果相同，反之亦然。实际上，几乎每个云供应商也支持
    `OCI` 标准。一个单一的标准数据库镜像在任何云上运行效果相同，并且可以在云之间**可移植**。为什么可移植性是可取的，甚至是必不可少的？


    想象一下，我们需要将几个数据库从本地系统迁移到云中。每个数据库运行在专用硬件上，具有独特版本的 Linux 和不同版本的数据库软件。我们的云供应商提供预构建的计算镜像，但没有一个完全符合我们的需求。


    一种选择是在云中重新创建每个数据库环境，管理和维护多个发行版和配置，遵循单独的更新和打补丁周期，开发独特的测试和质量保证流程等等——所有这些都增加了运营开销。


    另一种选择是为每个数据库主机使用默认的计算镜像，并在容器中运行数据库。标准计算可以在所有基础设施中保持一致地维护。为主机打补丁不会影响数据库容器——它们是隔离的，使用自己的软件。容器提供的抽象和隔离有助于并简化更换云供应商、运行多云环境以及混合云/本地拓扑。


    ### 可靠性


    讨论可靠性时，我们通常考虑的是系统有多稳定，如果组件耐用，系统对故障的弹性如何，以及关键方面是否具有冗余。这描述的是系统、基础设施或硬件的可靠性。可靠性还有另一个方面常常被忽视，但同样重要：`流程可靠性`。


    构建可靠的流程意味着确保从低层环境提升到生产的变更在每一步都能可预测地运行。它还旨在保证生产系统中的问题行为可以在其他地方重现并有信心地修复。


    自动化、版本控制和配置管理是实现流程可靠性的最佳手段。不幸的是，数据库环境往往避免采用这些方法，而更倾向于手动管理。其理由是，当数据库只占资产的少数时，应用于非数据库基础设施的开销和纪律性是不合理的，而且数据库和主机变更频率太低，无法从中受益。取而代之的是，一个记录在案的安装和配置流程被用来保证整个企业内数据库的一致性。


    仅仅依赖文档是有风险的。文档是**描述性的**。它是作者在编写时认为合理的一组指令，但读者可能会有不同的解释或理解。它可能不完整，特别是如果作者期望读者理解某些事情。读者甚至可能跳过或遗漏步骤。文档也只有在是最新的情况下才有效或正确。


    `Docker`（和其他自动化工具）是基础设施即代码，天然适合像 `git` 这样的集中式版本控制工具。代码是**程序性的**和**指令性的**，不易产生误解。不完整的流程和不正确的语法会导致失败。编码的流程也更可靠，更容易测试。


    由 `Docker` 生成的镜像是**不可变的**，这意味着它们不能被更改，并且提供了更大的确定性，确保从同一镜像运行的多个数据库容器是相同的。从流程管理的角度来看，它消除了可能混淆故障排除工作并对调查结果产生怀疑的变量。使在容器中运行的数据库保持一致和相同并实现流程可靠性变得更容易。


    ### 成本


    容器中的服务比虚拟化或裸机解决方案占用更小的空间。这就是容器吸引人的原因——它们用更少的资源做更多的事情。虽然底线（成本）无疑很重要，但这并不是 `Docker`
    和容器帮助降低成本的唯一领域。


    我把成本放在最后讨论，是因为之前的每个论点都包含或暗示了更难量化的成本节约。构建更简单、更快的解决方案加速了开发流程。数据库团队不再花费那么多时间执行数据刷新。开发人员和质量保证团队对自己的环境有更大的自主权。双方在
    DBA 和开发人员的战争中都赢了！


    运营团队使用自动化、配置管理和版本控制来确保一致性并简化他们的环境。它们有助于实现效率。数据库通常存在于这个范畴之外，回避标准，并使用不同或专用的工具进行监控和管理。`Docker`
    引入了一种将数据库团队纳入运营体系并减少与多种技术相关的开销的方法。


    容器的可移植性创造了利用性能较低的硬件和低成本的云服务来承载专用于数据库测试的非生产数据库环境的机会。恢复和灾难恢复测试的主要障碍是准备困难和硬件可用性。容器解决了这两个问题，自动化了设置过程，并降低了可接受测试环境的门槛。


    最后，`Docker` 创造了可预测、可靠的结果。我们通过减少和消除疑虑，更自信地解决问题，并花费更少的时间进行测试。当两个系统行为不同时，我们通常开始寻找可能归咎的差异。对于手动构建的数据库，我们不能排除错误或遗漏步骤的可能性。从同一个镜像启动的两个系统具有相同的来源，更容易定位到一个系统偏离常规的地方。


    ### 用例


    让我们先明确一点：My Oracle Support 说明 `2216342.1` 概述了 Oracle 对 `Docker` 的支持。Oracle 认证
    `Docker` 用于在运行以下系统的主机上使用 `12.1.0.2` 及更高版本的单实例数据库：


    *   `Oracle Linux 7 UEK4` 及更高版本

    *   `Red Hat Enterprise Linux 7`


    2021 年 10 月，Oracle 在 My Oracle Support 说明 `2488326.1` 下宣布了生产环境支持运行 `Oracle Database
    21c` 的 `RAC` 数据库。


    在这些限制范围内，`Docker` 是现有在裸机、虚拟机或云中运行的数据库的一个选项。


    `Docker` 占用空间小、资源需求低、速度快，使其成为在笔记本电脑等有限硬件上进行沙盒和原型设计的自然解决方案。但其架构带来了以不同且令人兴奋的方式与
    Oracle 合作的潜力。


    一个有趣的特点是能够轻松地将数据库和操作系统软件与数据和配置分开。很容易将数据库的内容保存为参考数据，然后仅使用基本的 OS 命令——不需要 Recovery
    Manager 或 Data Pump——就能在几秒钟内共享、恢复或配置新的数据库。让我们研究一下利用这一点的几种方法。

    '
- fmt: '## Exchange Data


    Running an Oracle database class or lab for anything more than a few students
    requires substantial horsepower. Docker’s small footprint allows hardware to accommodate
    more students than a virtual guest solution. It also accelerates and simplifies
    the effort to provision the lab itself.


    In either situation, instructors create a gold image of a database all students
    will use. A Vagrant solution saves the gold image as a custom box containing the
    operating system, database, and data. Students work on independent virtual guests
    started from the custom box.


    In Docker, entire databases can be committed as new images and distributed. A
    second method creates two components: operating system and database software (host)
    and data and configuration (data). In this scenario, the host and data are shared
    or copied together or separately.^([⁷](#fn7)) The advantage of this method may
    not be immediately apparent.


    If the “host” piece in this example is a 19.10 database, it will work with *any*
    19.10 “data.” Different labs, with other data, can all use the same “host.” Only
    the reference data changes.


    A similar approach works for refreshing data in QA and development environments.
    Whenever reference data changes, copy the newer, self-contained version of the
    data and database configurations to the container’s data volume and restart the
    container. The same technique is helpful for versioning data. Applications include
    A/B testing and side-by-side comparison of function or performance before and
    after application or parameter changes.


    ## Modular Software


    Docker images consist of a set of files that appear as a regular Linux filesystem.
    An image for an Oracle database will contain directories for the `ORACLE_BASE`,
    `ORACLE_HOME`, inventory files, and so on. These files appear in the image as
    part of a typical directory structure. Docker can read and copy some or all of
    an existing image to build new images, saving time and effort (and space!).


    We can use images and parts of images as building blocks to construct more complex
    systems without duplicating effort. GoldenGate and database upgrades offer two
    scenarios illustrating ways to leverage a modular approach.


    For GoldenGate, an existing database image is extended by adding and configuring
    the GoldenGate software and dependencies. The original database image provides
    a foundation. Docker adds `layers`^([⁸](#fn8)) to the database image but leaves
    the original unchanged. The original image is untouched, and Docker can reuse
    identical portions of its filesystem to reduce the size of the final GoldenGate
    image.


    Building an image to test database upgrades *can* be done the same way, adding
    a new database home to an existing database image. But there’s another approach
    available, too. If I already have database images for my source and target versions,
    I can start with the source database image; *copy* the `ORACLE_HOME` from the
    target; attach or clone the new `ORACLE_HOME` to the existing inventory. The final
    image has source and target `ORACLE_HOME` directories and a complete inventory.
    There’s no need to install the binaries, and Docker’s storage deduplicates the
    shared content.


    Database patching and upgrades are other applications that work like Oracle’s
    `Rapid Home Provisioning`. Rather than patching software on an existing container,
    create a new image at the target release. The image produces consistent database
    containers, eliminating variations introduced by manual processes. To patch the
    database, stop the running container, start a new container using the updated
    image, and run any post-patching steps to modify database metadata.


    ## Orchestration


    Docker comes with its own orchestration solution, `Docker Compose`. Docker Compose
    (or simply Compose) typically coordinates two or more containers, manages cross-container
    dependencies, and facilitates networking and other shared resources. We can use
    Compose to run environments that use multiple databases, such as Data Guard.


    Compose uses `YAML` (*Yet Another Markup Language*), a plain-text markup language,
    to define participating members or *services* in an orchestration. Besides describing
    the members, information passed to each service through the Compose specification
    can trigger conditional activities. Compose starts two Oracle 19.10 Enterprise
    Edition databases in the following example: `DENVER` and `DALLAS`. Each is assigned
    environment variables called `ROLE` and `DB_UNQNAME`. A script in the database
    image reads these values from each database container’s environment and uses them
    to perform actions appropriate to each role.


    Don’t worry if you’re unfamiliar with YAML or similar markup languages. What you
    should notice is the simplicity of the configuration. The orchestration needs
    just a few pieces of information to automatically provision two databases in a
    Data Guard configuration!


    ```

    version: ''3''

    services:

    DENVER:

    image: oracledb:19.10-ee

    container_name: DENVER

    environment:

    ORACLE_SID: ORCL

    DB_UNQNAME: DENVER

    ROLE: PRIMARY

    DALLAS:

    image: oracledb:19.10-ee

    container_name: DALLAS

    environment:

    ORACLE_SID: ORCL

    DB_UNQNAME: DALLAS

    ROLE: STANDBY

    ```


    Compose simplifies the setup of complex environments and reduces the effort and
    time required to bring a fully configured set of interdependent databases online.
    Reduced startup cost makes building models for testing replication and disaster
    recovery systems easy. It also removes any reluctance to bend or break those systems.
    Once automation is in place, creating fresh models is straightforward.


    ## Other Uses


    As you work with Oracle in Docker, you will undoubtedly recognize new applications.
    Docker is my first thought when I need to troubleshoot anything, and my colleagues
    enjoy some good-natured teasing about it. Here are some additional ideas to consider:


    *   **Troubleshooting:** Isolating a bug in production can be difficult when the
    environment is restricted or prevents changes. Recreating a problem in Docker
    offers the freedom to tweak and test scenarios that allow better isolation and
    identification and, ultimately, faster resolutions.


    *   **Practice procedures:** Docker provides an excellent practice field for critical
    activities such as upgrades, migrations, database restores, and disaster recovery.
    It’s an ideal place to become familiar with the process and perfect and document
    procedures and runbooks.


    *   **Monitoring systems:** Create a self-contained, portable monitoring repository
    in Docker and deploy it into any infrastructure.


    *   **Performance tuning:** Export statistics and metadata from a production database
    into a database running in Docker to model and tune optimizer behavior.


    *   **Hacking and penetration testing:** A local, isolated system is an excellent
    testbed to explore vulnerabilities and practice hacking skills!


    *   **Feature evaluations:** Every new release of Oracle introduces a plethora
    of new features and capabilities. Docker offers a risk-free setting where users
    can get acquainted with what’s new and practice for certifications.


    This is by no means an exhaustive list—hopefully, it sparks your imagination!'
  raw: '### Exchange Data


    Running an Oracle database class or lab for anything more than a few students
    requires substantial horsepower. Docker’s small footprint allows hardware to accommodate
    more students than a virtual guest solution. It also accelerates and simplifies
    the effort to provision the lab itself.


    In either situation, instructors create a gold image of a database all students
    will use. A Vagrant solution saves the gold image as a custom box containing the
    operating system, database, and data. Students work on independent virtual guests
    started from the custom box.


    In Docker, entire databases can be committed as new images and distributed. A
    second method creates two components: operating system and database software (host)
    and data and configuration (data). In this scenario, the host and data are shared
    or copied together or separately.^([⁷](#fn7)) The advantage of this method may
    not be immediately apparent.


    If the “host” piece in this example is a 19.10 database, it will work with *any*
    19.10 “data.” Different labs, with other data, can all use the same “host.” Only
    the reference data changes.


    A similar approach works for refreshing data in QA and development environments.
    Whenever reference data changes, copy the newer, self-contained version of the
    data and database configurations to the container’s data volume and restart the
    container. The same technique is helpful for versioning data. Applications include
    A/B testing and side-by-side comparison of function or performance before and
    after application or parameter changes.


    ### Modular Software


    Docker images consist of a set of files that appear as a regular Linux filesystem.
    An image for an Oracle database will contain directories for the `ORACLE_BASE`,
    `ORACLE_HOME`, inventory files, and so on. These files appear in the image as
    part of a typical directory structure. Docker can read and copy some or all of
    an existing image to build new images, saving time and effort (and space!).


    We can use images and parts of images as building blocks to construct more complex
    systems without duplicating effort. GoldenGate and database upgrades offer two
    scenarios illustrating ways to leverage a modular approach.


    For GoldenGate, an existing database image is extended by adding and configuring
    the GoldenGate software and dependencies. The original database image provides
    a foundation. Docker adds *layers*^([⁸](#fn8)) to the database image but leaves
    the original unchanged. The original image is untouched, and Docker can reuse
    identical portions of its filesystem to reduce the size of the final GoldenGate
    image.


    Building an image to test database upgrades *can* be done the same way, adding
    a new database home to an existing database image. But there’s another approach
    available, too. If I already have database images for my source and target versions,
    I can start with the source database image; *copy* the `ORACLE_HOME` from the
    target; attach or clone the new `ORACLE_HOME` to the existing inventory. The final
    image has source and target `ORACLE_HOME` directories and a complete inventory.
    There’s no need to install the binaries, and Docker’s storage deduplicates the
    shared content.


    Database patching and upgrades are other applications that work like Oracle’s
    *Rapid Home Provisioning*. Rather than patching software on an existing container,
    create a new image at the target release. The image produces consistent database
    containers, eliminating variations introduced by manual processes. To patch the
    database, stop the running container, start a new container using the updated
    image, and run any post-patching steps to modify database metadata.


    ### Orchestration


    Docker comes with its own orchestration solution, *Docker Compose*. Docker Compose
    (or simply Compose) typically coordinates two or more containers, manages cross-container
    dependencies, and facilitates networking and other shared resources. We can use
    Compose to run environments that use multiple databases, such as Data Guard.


    Compose uses *YAML* (*Yet Another Markup Language*), a plain-text markup language,
    to define participating members or *services* in an orchestration. Besides describing
    the members, information passed to each service through the Compose specification
    can trigger conditional activities. Compose starts two Oracle 19.10 Enterprise
    Edition databases in the following example: `DENVER` and `DALLAS`. Each is assigned
    environment variables called `ROLE` and `DB_UNQNAME`. A script in the database
    image reads these values from each database container’s environment and uses them
    to perform actions appropriate to each role.


    Don’t worry if you’re unfamiliar with YAML or similar markup languages. What you
    should notice is the simplicity of the configuration. The orchestration needs
    just a few pieces of information to automatically provision two databases in a
    Data Guard configuration!


    ```

    version: ''3''

    services:

    DENVER:

    image: oracledb:19.10-ee

    container_name: DENVER

    environment:

    ORACLE_SID: ORCL

    DB_UNQNAME: DENVER

    ROLE: PRIMARY

    DALLAS:

    image: oracledb:19.10-ee

    container_name: DALLAS

    environment:

    ORACLE_SID: ORCL

    DB_UNQNAME: DALLAS

    ROLE: STANDBY

    ```


    Compose simplifies the setup of complex environments and reduces the effort and
    time required to bring a fully configured set of interdependent databases online.
    Reduced startup cost makes building models for testing replication and disaster
    recovery systems easy. It also removes any reluctance to bend or break those systems.
    Once automation is in place, creating fresh models is straightforward.


    ### Other Uses


    As you work with Oracle in Docker, you will undoubtedly recognize new applications.
    Docker is my first thought when I need to troubleshoot anything, and my colleagues
    enjoy some good-natured teasing about it. Here are some additional ideas to consider:


    *   **Troubleshooting:** Isolating a bug in production can be difficult when the
    environment is restricted or prevents changes. Recreating a problem in Docker
    offers the freedom to tweak and test scenarios that allow better isolation and
    identification and, ultimately, faster resolutions.


    *   **Practice procedures:** Docker provides an excellent practice field for critical
    activities such as upgrades, migrations, database restores, and disaster recovery.
    It’s an ideal place to become familiar with the process and perfect and document
    procedures and runbooks.


    *   **Monitoring systems:** Create a self-contained, portable monitoring repository
    in Docker and deploy it into any infrastructure.


    *   **Performance tuning:** Export statistics and metadata from a production database
    into a database running in Docker to model and tune optimizer behavior.


    *   **Hacking and penetration testing:** A local, isolated system is an excellent
    testbed to explore vulnerabilities and practice hacking skills!


    *   **Feature evaluations:** Every new release of Oracle introduces a plethora
    of new features and capabilities. Docker offers a risk-free setting where users
    can get acquainted with what’s new and practice for certifications.


    This is by no means an exhaustive list—hopefully, it sparks your imagination!'
  trans: '


    ## 数据交换


    要为超过几个学生的规模运行 Oracle 数据库课程或实验，需要强大的硬件支持。Docker 的轻量级特性使得硬件能够容纳比虚拟机解决方案更多的学生。它还加快并简化了实验室环境的准备工作。


    在这两种情况下，讲师都会创建一个所有学生将使用的数据库黄金镜像。Vagrant 解决方案将黄金镜像保存为一个自定义盒（box），其中包含操作系统、数据库和数据。学生在从这个自定义盒启动的独立虚拟机上进行操作。


    在 Docker 中，整个数据库可以作为新镜像提交并分发。另一种方法是创建两个组件：操作系统和数据库软件（主机），以及数据和配置（数据）。在这种场景下，主机和数据可以一起或分开地共享或复制。^(⁷)
    这种方法的优势可能不会立即显现。


    如果此示例中的“主机”部分是 19.10 数据库，它将与*任何*19.10“数据”配合工作。不同的实验，使用其他数据，都可以使用同一个“主机”。只有引用数据会变化。


    类似的方法也适用于刷新质量保证（QA）和开发环境中的数据。每当引用数据发生变化时，将更新的、自包含的数据版本和数据库配置复制到容器的数据卷中，然后重新启动容器。同样的技术对于数据版本管理也很有用。应用场景包括在应用或参数更改前后进行
    A/B 测试以及功能和性能的并排比较。


    ## 模块化软件


    Docker 镜像由一组文件组成，这些文件呈现为一个常规的 Linux 文件系统。一个 Oracle 数据库的镜像将包含`ORACLE_BASE`、`ORACLE_HOME`、清单文件等目录。这些文件作为典型目录结构的一部分出现在镜像中。Docker
    可以读取并复制现有镜像的部分或全部内容来构建新镜像，从而节省时间和精力（以及空间！）。


    我们可以将镜像和镜像的部分用作构建块，以构建更复杂的系统，而无需重复劳动。GoldenGate 和数据库升级提供了两个场景，说明如何利用模块化方法。


    对于 GoldenGate，通过添加和配置 GoldenGate 软件及其依赖项来扩展现有的数据库镜像。原始数据库镜像提供了一个基础。Docker 向数据库镜像添加`层`^(⁸)，但保持原始镜像不变。原始镜像未被修改，Docker
    可以重用其文件系统的相同部分，以减少最终 GoldenGate 镜像的大小。


    构建用于测试数据库升级的镜像*可以*用同样的方式完成，即向现有数据库镜像添加一个新的数据库主目录（Oracle Home）。但也有另一种方法可用。如果我已经拥有源版本和目标版本的数据库镜像，我可以从源数据库镜像开始；*复制*目标版本的`ORACLE_HOME`；将新的`ORACLE_HOME`附加或克隆到现有的清单中。最终的镜像包含源和目标`ORACLE_HOME`目录以及一个完整的清单。无需安装二进制文件，并且
    Docker 的存储会去重共享内容。


    数据库补丁和升级是其他应用，其工作方式类似于 Oracle 的`Rapid Home Provisioning`。不是在现有容器上修补软件，而是在目标版本上创建一个新镜像。该镜像生成一致的数据库容器，消除了手动流程引入的差异。要修补数据库，请停止正在运行的容器，使用更新后的镜像启动一个新容器，并运行任何修补后的步骤来修改数据库元数据。


    ## 编排


    Docker 自带其编排解决方案，`Docker Compose`。Docker Compose（或简称 Compose）通常用于协调两个或多个容器，管理跨容器的依赖关系，并促进网络和其他共享资源的使用。我们可以使用
    Compose 来运行使用多个数据库的环境，例如 Data Guard。


    Compose 使用`YAML`（*YAML 不是一个标记语言*），一种纯文本标记语言，来定义编排中的参与成员或*服务*。除了描述成员之外，通过 Compose
    规范传递给每个服务的信息可以触发条件活动。在以下示例中，Compose 启动了两个 Oracle 19.10 企业版数据库：`DENVER`和`DALLAS`。每个数据库被分配了名为`ROLE`和`DB_UNQNAME`的环境变量。数据库镜像中的一个脚本从每个数据库容器的环境中读取这些值，并使用它们来执行适合每个角色的操作。


    如果您不熟悉 YAML 或类似的标记语言，请不要担心。您应该注意的是配置的简洁性。这个编排只需要几条信息就能自动配置 Data Guard 中的两个数据库！


    ```

    version: ''3''

    services:

    DENVER:

    image: oracledb:19.10-ee

    container_name: DENVER

    environment:

    ORACLE_SID: ORCL

    DB_UNQNAME: DENVER

    ROLE: PRIMARY

    DALLAS:

    image: oracledb:19.10-ee

    container_name: DALLAS

    environment:

    ORACLE_SID: ORCL

    DB_UNQNAME: DALLAS

    ROLE: STANDBY

    ```


    Compose 简化了复杂环境的设置，并减少了让一组完全配置的、相互依赖的数据库上线所需的工作量和时间。降低的启动成本使得构建用于测试复制和灾难恢复系统的模型变得容易。它也消除了任何不愿意修改或拆解这些系统的顾虑。一旦自动化就位，创建全新的模型就非常简单了。


    ## 其他用途


    当您使用 Docker 中的 Oracle 时，您无疑会认识到新的应用场景。当我需要进行故障排除时，Docker 是我的首选，我的同事们也因此常和我开些善意的玩笑。以下是一些值得考虑的其他想法：


    *   **故障排除：** 当环境受限或不允许更改时，在生产环境中隔离一个错误可能很困难。在 Docker 中重现问题，提供了调整和测试场景的自由，从而更好地进行隔离和识别，并最终实现更快的解决。

    *   **练习操作流程：** Docker 为关键活动（如升级、迁移、数据库恢复和灾难恢复）提供了一个极佳的练习场。它是熟悉流程、完善和记录操作程序及运行手册的理想场所。

    *   **监控系统：** 在 Docker 中创建一个自包含、可移植的监控仓库，并将其部署到任何基础设施中。

    *   **性能调优：** 将生产数据库中的统计信息和元数据导出到在 Docker 中运行的数据库中，以模拟和调优优化器行为。

    *   **黑客与渗透测试：** 一个本地的、隔离的系统是探索漏洞和练习黑客技能的绝佳试验台。

    *   **功能评估：** Oracle 的每一个新版本都会引入大量新功能和新能力。Docker 提供了一个无风险的环境，用户可以在其中了解新增内容并为认证考试做准备。


    这绝非详尽无遗的列表——希望它能激发您的想象力！


    '
- fmt: '## Objections to Docker


    Over the years, I’ve heard many concerns about using Docker for databases, mainly
    Oracle. I shared many of these when I first began putting data into containers.
    Oracle officially supports Docker for production databases, but that doesn’t mean
    Docker is an appropriate solution. To tackle that, let’s address some of the myths,
    misconceptions, and misunderstandings about containers that exist, particularly
    in the database world:


    *   **I''ll lose my data:** Containers are processes on a host, accessing the
    same storage as non-container processes. Take the same precautions to protect
    container and non-container databases.


    *   **Containers are ephemeral:** It’s not unusual to see containers started to
    perform a service or function and destroyed when complete. There’s no time limit,
    though, and containers exist until deliberately removed. They can be stopped and
    started, and their data persists across system restarts.


    *   **Images are immutable:** Yes, and that’s good! Images are templates for starting
    new containers. They can’t be changed, assuring us that every new container is
    a reliable copy of the original image. Just because an existing image is immutable
    doesn’t prevent changing and saving it as a *new* image!


    I think it’s important to consider some of the opposition to Docker in a historical
    light. I’ve witnessed innovations over a long career in technology, including
    the introduction of `RMAN`, `Enterprise Manager`, virtualization, and the cloud.
    Each was met with resistance, not always rational. Humans don’t deal well with
    change, and it’s easy to dismiss new technology as a gimmick or marketing vaporware.


    At the risk of dating myself, I remember the introduction of automatic undo management.
    Everyone I knew dismissed it, suggesting that undo management was too complex
    to automate. Today, I can’t imagine manually tuning rollback. It’s a primitive
    idea!


    ## Summary


    Containers are the new way of doing things, and some of the largest, most successful
    enterprises are all-in. Infrastructure consolidation saves money and improves
    manageability. While database administrators may try to resist it, it’s only a
    matter of time before databases are the only things not in containers, at which
    point someone will ask, “Why not?” Justifying your answer to that question requires
    understanding how containers and databases coexist and operate and how they compare
    to the alternatives.


    In the following chapters, I’ll introduce you to container concepts relevant to
    databases and Oracle and walk you through the steps of building databases in Docker.
    We’ll begin with simple examples to get Oracle up and running on a laptop or desktop
    and build confidence and familiarity. At each step, I provide practical recipes
    you can apply, customize, and build on in your environment!


    Footnotes [1](#514143_1_En_1_Chapter.xhtml#Fn1_source)   [2](#514143_1_En_1_Chapter.xhtml#Fn2_source)
      [3](#514143_1_En_1_Chapter.xhtml#Fn3_source)   [4](#514143_1_En_1_Chapter.xhtml#Fn4_source)
      [5](#514143_1_En_1_Chapter.xhtml#Fn5_source)   [6](#514143_1_En_1_Chapter.xhtml#Fn6_source)
      [7](#514143_1_En_1_Chapter.xhtml#Fn7_source)   [8](#514143_1_En_1_Chapter.xhtml#Fn8_source)


    ## 2. Understanding the Container Landscape


    Containers have their own language, and those new to Docker should understand
    some basic concepts and terminology before jumping in. This chapter introduces
    the vocabulary needed to navigate the terrain and a high-level view of how containers
    work. Let’s begin by looking at containers in the context of another similar solution
    that readers may already be familiar with: virtual machines.


    If you’re already confident distinguishing between `images` and `containers` and
    recognize how containers and virtual machines differ, feel free to skip to Chapter
    [3](#514143_1_En_3_Chapter.xhtml).


    ### Containers vs. Virtual Machines


    Ask a group of IT professionals to describe Docker containers, and the chances
    are good that at least half will respond that they’re “like lightweight virtual
    machines.” Some might even make comparisons:


    *   VMs are like houses; containers are like apartments.


    *   VMs are like semi-tractor trailers; containers are like pickup trucks.


    *   VMs are like supermarkets; containers are like convenience stores.


    *   VMs are a bakery; containers are a slice of cake.


    Virtual machines and containers are both valid solutions for addressing the challenges
    of cost, efficiency, scale, isolation, and portability, so it’s natural to compare
    them. The misstep these analogies make is framing containers as a lesser, lighter,
    or trivial alternative. It perpetuates the myth that containers aren’t capable
    or robust enough for production workloads.^([⁹](#fn9))


    I’d like to reframe this for an Oracle database audience by looking at virtual
    machines and containers as *different ways of doing similar things*. Let’s put
    Docker aside for a moment and put on our Oracle hat to consider ways to host three
    new database applications in an enterprise. Three possible approaches are as follows:


    *   **Three homes, three databases:** One database for each application, each
    with its own `ORACLE_HOME`. Individual Oracle software installations offer greater
    control over each application’s database version at the expense of increased overhead.
    Each `ORACLE_HOME` takes up space and must be managed, patched, and supported
    separately.


    *   **One home, three databases:** One database for each application, all running
    from a single `ORACLE_HOME`, reduces the complexity of maintaining multiple software
    installations while separating each application. Each database has overhead associated
    with its memory structures, processes, and metadata (`SYSTEM`, `SYSAUX`, `TEMP`,
    and `UNDO` tablespaces).


    *   **One database, three schemas:** The most efficient approach is a single database
    with individual schemas for each application. All three schemas share one set
    of memory structures, background processes, and metadata. Smaller, less expensive
    hardware provides equal performance.


    None of these solutions are right or wrong, good or bad, and there are scenarios
    where each is a better or more reasonable choice. Let’s eliminate the first option^([^(10)](#fn10))
    and narrow in on the second and third. These run from a single `ORACLE_HOME` and
    are therefore limited to running on a single host. `Figure 2-1` compares these
    options side by side.


    ![A diagram compares the oracle home with three separate databases versus three
    separate schemas. Oracle home with separate databases contains a separate schema,
    memory, processes, and metadata for each database while oracle home with separate
    schemas contains same memory, processes, and metadata for all the schemas.](images/514143_1_En_2_Chapter/514143_1_En_2_Fig1_HTML.png)


    `Figure 2-1` Alternatives for hosting three applications from a single `ORACLE_HOME`—separate
    databases vs. separate schemas


    From a client standpoint, there is no *functional* difference. The choice is purely
    operational. Separate database instances offer greater flexibility but require
    more resources and management (with higher costs).


    Spreading schemas across databases may *appear* to have security benefits and
    provide isolation. With a single `ORACLE_HOME`, vulnerabilities exploited in one
    database are there for others. More databases mean a larger attack surface. Security
    is a product of how well the infrastructure and schemas are protected.


    Most works and explanations on containers compare the resource placement of containers
    and virtual machines using a diagram similar to `Figure 2-2`.


    ![A diagram compares the resource placement for virtual machines and containers.
    The main difference is that the containers do not have a guest O S.](images/514143_1_En_2_Chapter/514143_1_En_2_Fig2_HTML.png)


    `Figure 2-2`'
