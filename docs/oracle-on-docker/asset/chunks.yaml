- fmt: '## Docker Hub 账户


    Docker Hub 为用户提供了丰富的免费内容，无需注册或登录。创建账户后，您可以在四个计划中享受额外服务：个人版（Personal）、专业版（Pro）、团队版（Team）和商业版（Business）。我重点说明了个人版和专业版账户之间的主要功能差异，它们最适合想要利用
    Docker Hub 优势的个人用户：


    *   **个人订阅**是免费的，包括使用 Docker Desktop、无限数量的公共仓库和一个私人仓库。它还包括每月 200 次由 Snyk 提供的本地漏洞扫描。这可能满足大多数人的所有需求——除非你打算维护多个
    Oracle 数据库镜像的私有仓库！


    *   **专业订阅**每月 7 美元或每年 60 美元。^([^(88)](#fn88)) 它包含个人版提供的所有功能，此外还有无限私有仓库；自动化测试和构建；与
    GitHub、Bitbucket 和 Slack 的集成；以及商业支持。（我订阅了专业版以利用无限私有仓库的优势。）


    创建账户并登录 Docker Hub 后，通过点击右上角的“Repository”菜单项，然后点击最右边的“Create repository”按钮来创建一个仓库，如图
    [16-5](#514143_1_En_16_Chapter.xhtml#Fig5) 所示。


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig5_HTML.jpg)


    带有标记为 1 和 2 的 “Repositories” 选项卡和 “Create repository” 选项卡的预览页面截图。


    图 16-5


    在 Docker Hub 中创建新仓库。点击菜单中的“Repository”项（1），然后点击“Create repository”按钮（2）


    这将带你进入图 [16-6](#514143_1_En_16_Chapter.xhtml#Fig6) 中的屏幕，在这里你为新仓库命名，选择内容是公开还是私有，最后创建仓库。此示例来自个人订阅，我创建了一个名为
    “database” 的私有仓库。


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig6_HTML.jpg)


    带有 3 个高亮并标记的选项卡的页面截图：1、数据库名称，2、公开和私有选项，以及 3、创建按钮。


    图 16-6


    要创建一个仓库，请为其命名（1），选择 Public 或 Private 可见性（2），然后点击“Create”按钮（3）


    创建仓库后，你会进入图 [16-7](#514143_1_En_16_Chapter.xhtml#Fig7) 中的仓库详情屏幕。在这里，你可以添加描述性信息并管理内容。


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig7_HTML.jpg)


    仓库详情屏幕的截图，用户可以添加描述性信息并管理内容。


    图 16-7


    Docker Hub 中新创建仓库的详情屏幕


    点击仓库的“Settings”选项卡，如图 [16-8](#514143_1_En_16_Chapter.xhtml#Fig8) 所示，你可以访问并启用漏洞扫描（在付费订阅中可用），以及将仓库的可见性从公开更改为私有，反之亦然的选项。


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig8_HTML.jpg)


    仓库设置选项卡的截图，用户可以访问并启用漏洞扫描（在付费订阅中可用），以及将仓库可见性从公开更改为私有，反之亦然的选项。


    图 16-8


    通过“Settings”选项管理仓库（1）。此屏幕用于管理仓库的可见性（2）并在付费订阅中启用镜像扫描


    现在我有了一个仓库，我可以开始标记镜像并将其上传到 Docker Hub！


    ## 镜像管理


    无论你使用的是 Docker Hub 还是其他公共或私有容器镜像仓库，上传和管理镜像的步骤都是相同的——登录并提供凭据，然后标记并推送镜像。


    ### 仓库登录


    通过命令行或 Docker Desktop 登录以访问你的仓库。在这里，我使用我之前创建的用户名和密码，通过 `docker login` 命令登录到我新创建的账户：


    ```

    > docker login

    Login with your Docker ID to push and pull images from Docker Hub. If you don''t
    have

    a Docker ID, head over to https://hub.docker.com to create one.

    Username: oracleondocker

    Password:

    Login Succeeded

    Logging in with your password grants your terminal complete access to your account.

    For better security, log in with a limited-privilege personal access token. Learn

    more at https://docs.docker.com/go/access-tokens/

    ```


    一旦你登录到一个仓库，Docker 会保存你的凭据以供将来使用，并且没有需要重复登录的持久状态。^([^(89)](#fn89)) 但是，如果你登录了一个账户并希望删除存储的凭据，请使用
    `docker logout`：


    ```

    > docker logout

    Removing login credentials for https://index.docker.io/v1/

    ```


    登录后，我就可以标记和推送镜像了。


    ### 标记镜像


    第 [14](#514143_1_En_14_Chapter.xhtml) 章介绍了标签的组成部分以及如何使用 `docker tag` 为镜像分配命名空间、镜像或仓库名称和标签。既然我们已经创建了一个仓库账户，命名空间的目的应该更加明显——它是仓库账户的名称。


    列出我系统上的镜像时，我看到一个从 Oracle 的 GitHub 仓库构建的镜像，标记为 `oracle/database:19.3.0-ee`，后面还有四个属于我的命名空间
    `oraclesean`、保存在名为 `db` 的仓库中的数据库镜像：


    ```

    > docker images

    REPOSITORY              TAG           IMAGE ID       CREATED         SIZE

    oracle/database         19.3.0-ee     bdbb8b83217b   3 days ago      6.68GB

    oraclesean/db           11.2.0.4-EE   c1015174e910   6 months ago    6.72GB

    oraclesean/db           12.1-EE       1db44c287b80   6 months ago    6.9GB

    oraclesean/db           19.13.1-EE    27fdf297483b   5 months ago    7.81GB

    oraclesean/db           21.5-EE       656c63dad153   5 months ago    8.69GB

    ```


    在上一节的示例中，我在 Docker Hub 中创建了一个新用户和仓库，用户名为 `oracleondocker`，以及一个名为 `database` 的私有仓库。我想将其中一个镜像的副本推送到我的新账户，但我首先需要给它打标签。^([^(90)](#fn90))


    我可以使用以下任一命令分享 `oraclesean/db:11.2.0.4-EE` 镜像，通过现有标签或其镜像 ID 值来引用镜像：


    ```

    docker tag oraclesean/db:11.2.0.4-EE oracleondocker/database:11.2.0.4-EE

    docker tag c1015174e910 oracleondocker/database:11.2.0.4-EE

    ```


    当我再次列出系统上的镜像时，我在第二行看到了新标签：


    ```

    > docker tag oraclesean/db:11.2.0.4-EE oracleondocker/database:11.2.0.4-EE

    > docker images

    REPOSITORY               TAG           IMAGE ID       CREATED        SIZE

    oracle/database          19.3.0-ee     bdbb8b83217b   3 days ago     6.68GB

    oracleondocker/database  11.2.0.4-EE   c1015174e910   6 months ago   6.72GB

    oraclesean/db            11.2.0.4-EE   c1015174e910   6 months ago   6.72GB

    oraclesean/db            12.1-EE       1db44c287b80   6 months ago   6.9GB

    oraclesean/db            19.13.1-EE    27fdf297483b   5 months ago   7.81GB

    oraclesean/db            21.5-EE       656c63dad153   5 months ago   8.69GB

    ```


    两个镜像的 Image ID 是相同的。只有标签不同。'
  raw: '## Docker Hub Accounts


    Docker Hub makes a wealth of free content available to users without requiring
    registration or login. Creating an account entitles you to additional services
    across four plans: Personal, Pro, Team, and Business. I’ve highlighted the significant
    feature differences between the Personal and Pro accounts, which are most suited
    for individuals wanting the advantages of Docker Hub:


    *   **A** **Personal subscription** is free and includes the use of Docker Desktop
    and an unlimited number of public repositories and one private repository. It
    also includes 200 monthly local vulnerability scans with Snyk. This is probably
    everything most people need—unless you intend to maintain multiple private repositories
    of Oracle database images!


    *   **The Pro subscription** is $7 a month or $60 annually.^([^(88)](#fn88)) It
    includes everything offered in the Personal tier, plus unlimited private repositories;
    automated tests and builds; integration with GitHub, Bitbucket, and Slack; and
    commercial support. (I subscribe to the Pro tier to take advantage of the unlimited
    private repositories.)


    After creating an account and logging in to the Docker Hub, create a repository
    by clicking the “Repository” menu item at the upper right, followed by the “Create
    repository” button at the far right, as in Figure [16-5](#514143_1_En_16_Chapter.xhtml#Fig5).


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig5_HTML.jpg)


    A screenshot of a preview page with repositories tab and create repository tabs
    labeled 1 and 2.


    Figure 16-5


    Create a new repository in Docker Hub. Click the “Repository” item in the menu
    (1), then the “Create repository” button (2)


    This takes you to the screen in Figure [16-6](#514143_1_En_16_Chapter.xhtml#Fig6),
    where you give the new repository a name, select whether the content is public
    or private, and finally create the repository. This example is from a Personal
    subscription, and I’ve made a private repository named “database.”


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig6_HTML.jpg)


    A screenshot of a page with 3 tabs highlighted and labeled, 1, database, 2, public
    and private options, and 3, create.


    Figure 16-6


    To create a repository, give it a name (1), select either Public or Private visibility
    (2), and click the “Create” button (3)


    After creating the repository, you’re taken to the repository details screen in
    Figure [16-7](#514143_1_En_16_Chapter.xhtml#Fig7). Here, you can add descriptive
    information and manage the content.


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig7_HTML.jpg)


    A screenshot of the repository details screen, the user can add the descriptive
    information and manage the content.


    Figure 16-7


    The detail screen for a newly created repository in Docker Hub


    Click the repository’s “Settings” tab, shown in Figure [16-8](#514143_1_En_16_Chapter.xhtml#Fig8),
    and you have access to enable vulnerability scanning (available in paid subscriptions)
    and the option to change the visibility of the repo from public to private, and
    vice versa.


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig8_HTML.jpg)


    A screenshot of the repository''s settings tab, the user has access to enable
    vulnerability scanning, which is available in paid subscriptions, and the option
    to change the visibility of the repo from public to private, and vice versa.


    Figure 16-8


    Manage the repository through the “Settings” option (1). This screen is where
    you manage the repository’s visibility (2) and, in paid subscriptions, enable
    image scanning


    Now that I have a repository, I can begin tagging and uploading images into Docker
    Hub!


    ## Image Management


    Whether you’re using Docker Hub or different public or private container registry,
    uploading and curating images follows the same steps—log in and provide credentials,
    then tag and push images.


    ### Registry Login


    Log in to access your registry from the command line or Docker Desktop. Here,
    I’m logging in to my newly created account with the username and password I created
    earlier, using the `docker login` command:


    ```

    > docker login

    Login with your Docker ID to push and pull images from Docker Hub. If you don''t
    have

    a Docker ID, head over to https://hub.docker.com to create one.

    Username: oracleondocker

    Password:

    Login Succeeded

    Logging in with your password grants your terminal complete access to your account.

    For better security, log in with a limited-privilege personal access token. Learn

    more at https://docs.docker.com/go/access-tokens/

    ```


    Once you’ve logged in to a registry, Docker preserves your credentials for future
    use, and there’s no persistent state that requires repeated login.^([^(89)](#fn89))
    However, if you’re into an account and wish to remove the stored credentials,
    use `docker logout`:


    ```

    > docker logout

    Removing login credentials for https://index.docker.io/v1/

    ```


    Once logged in, I can tag and push images.


    ### Tag an Image


    Chapter [14](#514143_1_En_14_Chapter.xhtml) covered the components of tags and
    how to use `docker tag` for assigning a namespace, image or repository name, and
    a tag to an image. Now that we’ve created a registry account, the purpose of the
    namespace should be more apparent—it’s the name of the registry account.


    When listing images on my system, I see an image built from Oracle’s GitHub repository,
    tagged `oracle/database:19.3.0-ee`, followed by four more database images belonging
    to my namespace, `oraclesean`, saved to a repository called `db`:


    ```

    > docker images

    REPOSITORY              TAG           IMAGE ID       CREATED         SIZE

    oracle/database         19.3.0-ee     bdbb8b83217b   3 days ago      6.68GB

    oraclesean/db           11.2.0.4-EE   c1015174e910   6 months ago    6.72GB

    oraclesean/db           12.1-EE       1db44c287b80   6 months ago    6.9GB

    oraclesean/db           19.13.1-EE    27fdf297483b   5 months ago    7.81GB

    oraclesean/db           21.5-EE       656c63dad153   5 months ago    8.69GB

    ```


    In the examples from the previous section, I created a new user and repository
    in Docker Hub, with a username of `oracleondocker` and a private repository named
    `database`. I’d like to push a copy of one of these images to my new account,
    but I first need to tag it.^([^(90)](#fn90))


    I can share the `oraclesean/db:11.2.0.4-EE` image with either of the following
    commands, referencing the image by an existing tag or its image ID value:


    ```

    docker tag oraclesean/db:11.2.0.4-EE oracleondocker/database:11.2.0.4-EE

    docker tag c1015174e910 oracleondocker/database:11.2.0.4-EE

    ```


    When I list images from my system once again, I see the new tag appearing on the
    second line:


    ```

    > docker tag oraclesean/db:11.2.0.4-EE oracleondocker/database:11.2.0.4-EE

    > docker images

    REPOSITORY               TAG           IMAGE ID       CREATED        SIZE

    oracle/database          19.3.0-ee     bdbb8b83217b   3 days ago     6.68GB

    oracleondocker/database  11.2.0.4-EE   c1015174e910   6 months ago   6.72GB

    oraclesean/db            11.2.0.4-EE   c1015174e910   6 months ago   6.72GB

    oraclesean/db            12.1-EE       1db44c287b80   6 months ago   6.9GB

    oraclesean/db            19.13.1-EE    27fdf297483b   5 months ago   7.81GB

    oraclesean/db            21.5-EE       656c63dad153   5 months ago   8.69GB

    ```


    The Image ID is the same for both images. Only the tag is different.'
