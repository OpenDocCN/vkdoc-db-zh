    ```

    function setOracleBaseDirs {

    export ORACLE_BASE_CONFIG="$($ORACLE_HOME/bin/orabaseconfig)"

    export ORACLE_BASE_HOME="$($ORACLE_HOME/bin/orabasehome)"

    }

    ```


    The function should appear at the top of the `createDB.sh` and `runOracle.sh`
    scripts, above any other function that calls `setOracleBaseDirs` to populate the
    configuration directories.'
  trans: '## 创建只读数据库主目录


    Oracle Database 18c 新增了创建*只读数据库主目录*的选项，该选项将配置文件从 Oracle 数据库软件目录中移除。在旧版 Oracle
    中，`ORACLE_HOME` 混合了软件和配置。`ORACLE_HOME/dbs` 目录是密码文件和数据库启动时使用的参数文件的默认位置。`ORACLE_HOME/network/admin`
    目录存放网络配置文件，包括 `listener.ora`、`sqlnet.ora` 和 `tnsnames.ora` 文件。当数据库主目录支持多个实例时，这些特定于数据库的文件并未很好隔离，容易因另一个数据库的操作而被混淆或覆盖。这个缺点在
    Docker 将配置文件从数据库主目录移动并复制到 `/opt/oracle/oradata/dbconfig` 下的特殊目录时表现得尤为明显。这对于从普通目录备份克隆数据库至关重要，如第
    5 章所述。


    随着只读主目录的引入，需要跟踪有关主目录的信息。Oracle 将此记录在一个名为 `orabasetab` 的特殊文件中。它仿照 `/etc/oratab`
    文件，位于 `$ORACLE_HOME/install/orabasetab`。在传统的、读写主目录中，该文件内容如下：


    ```bash

    #orabasetab file is used to track Oracle Home associated with Oracle Base

    /opt/oracle/product/19c/dbhome_1:/opt/oracle:OraDB19Home1:N:

    ```


    各个字段以冒号分隔，反映了主目录的不同属性。顺序为：


    1.  `ORACLE_HOME` 目录，`/opt/oracle/product/19c/dbhome_1`。

    2.  主目录使用的 `ORACLE_BASE`，`/opt/oracle`。

    3.  唯一的 Oracle 主目录名称，在安装时分配，`OraDB19Home1`。

    4.  主目录的只读状态，由 `Y` 或 `N` 表示。


    该文件的第四字段设置为 `N`，意味着此主目录不是只读的，其配置文件位于“常规”位置。只读主目录中的数据库和网络配置文件从 `ORACLE_HOME` 移动到
    `ORACLE_BASE` 下的新位置。两个新的环境变量，`ORACLE_BASE_CONFIG` 和 `ORACLE_BASE_HOME`，用于跟踪这些目录，它们默认为：


    ```bash

    ORACLE_BASE_CONFIG=$ORACLE_BASE

    ORACLE_BASE_HOME=$ORACLE_BASE/homes/

    ```


    `$ORACLE_BASE_HOME` 中的 `HOME NAME` 是 `orabasetab` 中的第三个字段。基于前面的例子，代入 `orabasetab`
    中的值，就可以揭示如果这是一个只读主目录，配置文件的基本位置：


    ```bash

    ORACLE_BASE_CONFIG=/opt/oracle

    ORACLE_BASE_HOME=/opt/oracle/homes/OraDB19Home1

    ```


    原来存在于 `$ORACLE_HOME/dbs` 下的所有内容——参数文件、服务器参数文件和密码文件——都移动到 `$ORACLE_BASE_CONFIG/dbs`。之前存储在
    `$ORACLE_HOME/network/admin` 的文件——TNS、SQL*Net 和侦听器文件——则重新定位到 `$ORACLE_BASE_HOME/network/admin`。


    `ORACLE_BASE_CONFIG` 和 `ORACLE_BASE_HOME` 环境变量是可选的，Oracle 提供了两个新的二进制文件来报告它们的位置：


    *   `orabaseconfig`，用于报告 `ORACLE_BASE_CONFIG`

    *   `orabasehome`，用于报告 `ORACLE_BASE_HOME`


    它们通过检查 `orabasetab` 中的第四字段（只读主目录字段）来推导正确的位置。通过这两个环境变量，我们可以推断出数据库主目录中数据库配置的正确路径，无论主目录类型如何。在任何数据库中了解这些目录都很重要，但在容器环境中至关重要，因为它们包含的配置文件必须重新定位到挂载到
    `/opt/oracle/oradata` 的卷中，以保留容器的完整功能和能力。请记住，该卷保存了数据库的完整内容——包括其配置——我们开始意识到，修改容器镜像以包含“只读主目录”选项涉及：


    *   执行将数据库软件目录转换为只读主目录的操作

    *   为配置文件设置正确的目录路径

    *   更新脚本，以便在引用配置时使用正确的目标位置


    ### 将数据库主目录转换为只读


    单个命令 `$ORACLE_HOME/bin/roohctl -enable`（用于只读 Oracle 主目录控制）可以将 21c 之前的数据库主目录转换为只读。它在安装数据库软件后、创建数据库之前执行。在
    Docker 生命周期中有两个机会运行此命令：


    *   在镜像创建期间，遵循数据库软件安装步骤之后

    *   启动新的数据库容器时，在创建数据库之前


    在镜像创建期间将 `ORACLE_HOME` 转换为只读，会强制从该镜像运行的每个容器都使用只读主目录。将此选项留到运行时则为我们的容器提供了更大的灵活性，这也是这里采用的解决方案。


    正如您可能猜到的那样，我们将通过检查运行时环境变量来控制是否转换主目录。我使用 `ROOH`：


    ```bash

    # Enable read-only Oracle Home:

    if [ "${ROOH^^}" = "ENABLE" ]

    then $ORACLE_HOME/bin/roohctl -enable

    fi

    ```


    此命令从环境中读取 `ROOH` 的值，并使用 bash 变量扩展（`^^` 字符）将其转换为大写。当结果匹配 `ENABLE` 时，脚本将主目录转换为只读。将此命令放在
    `createDB.sh` 脚本中，在文件开头附近，在任何运行 Database Configuration Assistant 的操作之前。（我将其放在检查
    `INIT_SGA_SIZE` 和 `INIT_PGA_SIZE` 之前。）


    ### 解析配置目录


    我们将使用 Oracle 新增的两个用于报告配置目录的二进制文件：`orabaseconfig` 和 `orabasehome`。在读写主目录中，它们默认为
    `ORACLE_HOME`，但在只读主目录中，它们会报告其在 `ORACLE_BASE` 下的新位置。无论主目录类型是只读还是读写，我们都使用这些命令在脚本中为
    `ORACLE_BASE_CONFIG` 和 `ORACLE_BASE_HOME` 分配正确的值。由于我们将重复执行此操作，我选择创建一个函数：


    ```bash

    function setOracleBaseDirs {

    export ORACLE_BASE_CONFIG="$($ORACLE_HOME/bin/orabaseconfig)"

    export ORACLE_BASE_HOME="$($ORACLE_HOME/bin/orabasehome)"

    }

    ```


    该函数应出现在 `createDB.sh` 和 `runOracle.sh` 脚本的顶部，在任何调用 `setOracleBaseDirs` 来填充配置目录的其他函数之前。'
- fmt: '### Update Scripts


    现有仓库仅预设了一个可读写的主目录，并依赖“旧”的默认路径 `ORACLE_HOME` 来存放其所有配置文件。我们需要将它们更改为使用新的引用路径：


    *   `$ORACLE_HOME/dbs` 变为 `$ORACLE_BASE_CONFIG/dbs`。

    *   `$ORACLE_HOME/network/admin` 变为 `$ORACLE_BASE_HOME/network/admin`。


    在 `createDB.sh` 中，这些路径出现在两个函数里：`setupNetworkConfig` 和 `setupTnsnames`。代码清单 13-5
    展示了我所做的修改，在每个函数的开始调用 `setOracleBaseDirs` 并使用新的变量。


    ```

    ############## Set the ORACLE_BASE_CONFIG and ORACLE_BASE_HOME variables ##############

    function setOracleBaseDirs {

    export ORACLE_BASE_CONFIG="$($ORACLE_HOME/bin/orabaseconfig)"

    export ORACLE_BASE_HOME="$($ORACLE_HOME/bin/orabasehome)"

    }

    ############## Setting up network related config files (sqlnet.ora, listener.ora)
    ##############

    function setupNetworkConfig {

    setOracleBaseDirs

    mkdir -p "$ORACLE_BASE_HOME"/network/admin

    # sqlnet.ora

    echo "NAMES.DIRECTORY_PATH= (TNSNAMES, EZCONNECT, HOSTNAME)" > "$ORACLE_BASE_HOME"/network/admin/sqlnet.ora

    # listener.ora

    echo "LISTENER =

    (DESCRIPTION_LIST =

    (DESCRIPTION =

    (ADDRESS = (PROTOCOL = IPC)(KEY = EXTPROC1))

    (ADDRESS = (PROTOCOL = TCP)(HOST = 0.0.0.0)(PORT = 1521))

    )

    )

    DEDICATED_THROUGH_BROKER_LISTENER=ON

    DIAG_ADR_ENABLED = off

    " > "$ORACLE_BASE_HOME"/network/admin/listener.ora

    }

    ####################### Setting up tnsnames.ora ###########################

    function setupTnsnames {

    setOracleBaseDirs

    mkdir -p "$ORACLE_BASE_HOME"/network/admin

    # tnsnames.ora

    echo "$ORACLE_SID=localhost:1521/$ORACLE_SID" > "$ORACLE_BASE_HOME"/network/admin/tnsnames.ora

    echo "$ORACLE_PDB=

    (DESCRIPTION =

    (ADDRESS = (PROTOCOL = TCP)(HOST = 0.0.0.0)(PORT = 1521))

    (CONNECT_DATA =

    (SERVER = DEDICATED)

    (SERVICE_NAME = $ORACLE_PDB)

    )

    )" >> "$ORACLE_BASE_HOME"/network/admin/tnsnames.ora

    }

    Listing 13-5

    The setOracleBase function assigns appropriate values to variables. It’s used
    in the two networking setup functions, and references to ORACLE_HOME/network/admin
    change to ORACLE_BASE_HOME/network/admin to accommodate read-only homes

    ```


    我对代码清单 13-6 中的 `runOracle.sh` 进行了类似的修改，添加了新函数并更新了三个辅助函数 `moveFiles`、`symLinkFiles`
    和 `undoSymLinkFiles` 中对 `ORACLE_HOME/dbs` 和 `ORACLE_HOME/network/admin` 的引用。


    ```

    ############## Set the ORACLE_BASE_CONFIG and ORACLE_BASE_HOME variables ##############

    function setOracleBaseDirs {

    export ORACLE_BASE_CONFIG="$($ORACLE_HOME/bin/orabaseconfig)"

    export ORACLE_BASE_HOME="$($ORACLE_HOME/bin/orabasehome)"

    }

    ########### Move DB files ############

    function moveFiles {

    setOracleBaseDirs

    if [ ! -d "$ORACLE_BASE"/oradata/dbconfig/"$ORACLE_SID" ]; then

    mkdir -p "$ORACLE_BASE"/oradata/dbconfig/"$ORACLE_SID"/

    fi;

    mv "$ORACLE_BASE_CONFIG"/dbs/spfile"$ORACLE_SID".ora "$ORACLE_BASE"/oradata/dbconfig/"$ORACLE_SID"/

    mv "$ORACLE_BASE_CONFIG"/dbs/orapw"$ORACLE_SID" "$ORACLE_BASE"/oradata/dbconfig/"$ORACLE_SID"/

    mv "$ORACLE_BASE_HOME"/network/admin/sqlnet.ora "$ORACLE_BASE"/oradata/dbconfig/"$ORACLE_SID"/

    mv "$ORACLE_BASE_HOME"/network/admin/listener.ora "$ORACLE_BASE"/oradata/dbconfig/"$ORACLE_SID"/

    mv "$ORACLE_BASE_HOME"/network/admin/tnsnames.ora "$ORACLE_BASE"/oradata/dbconfig/"$ORACLE_SID"/

    mv "$ORACLE_HOME"/install/.docker_* "$ORACLE_BASE"/oradata/dbconfig/"$ORACLE_SID"/

    # oracle user does not have permissions in /etc, hence cp and not mv

    cp /etc/oratab "$ORACLE_BASE"/oradata/dbconfig/"$ORACLE_SID"/

    symLinkFiles;

    }

    ########### Symbolic link DB files ############

    function symLinkFiles {

    setOracleBaseDirs

    if [ ! -L "$ORACLE_BASE_CONFIG"/dbs/spfile"$ORACLE_SID".ora ]; then

    ln -s "$ORACLE_BASE"/oradata/dbconfig/"$ORACLE_SID"/spfile"$ORACLE_SID".ora "$ORACLE_BASE_CONFIG"/dbs/spfile"$ORACLE_SID".ora

    fi;

    if [ ! -L "$ORACLE_BASE_CONFIG"/dbs/orapw"$ORACLE_SID" ]; then

    ln -s "$ORACLE_BASE"/oradata/dbconfig/"$ORACLE_SID"/orapw"$ORACLE_SID" "$ORACLE_BASE_CONFIG"/dbs/orapw"$ORACLE_SID"

    fi;

    if [ ! -L "$ORACLE_BASE_HOME"/network/admin/sqlnet.ora ]; then

    ln -s "$ORACLE_BASE"/oradata/dbconfig/"$ORACLE_SID"/sqlnet.ora "$ORACLE_BASE_HOME"/network/admin/sqlnet.ora

    fi;

    if [ ! -L "$ORACLE_BASE_HOME"/network/admin/listener.ora ]; then

    ln -s "$ORACLE_BASE"/oradata/dbconfig/"$ORACLE_SID"/listener.ora "$ORACLE_BASE_HOME"/network/admin/listener.ora

    fi;

    if [ ! -L "$ORACLE_BASE_HOME"/network/admin/tnsnames.ora ]; then

    ln -s "$ORACLE_BASE"/oradata/dbconfig/"$ORACLE_SID"/tnsnames.ora "$ORACLE_BASE_HOME"/network/admin/tnsnames.ora

    fi;

    # oracle user does not have permissions in /etc, hence cp and not ln

    cp "$ORACLE_BASE"/oradata/dbconfig/"$ORACLE_SID"/oratab /etc/oratab

    }

    ########### Undoing the symbolic links ############

    function undoSymLinkFiles {

    setOracleBaseDirs

    if [ -L "$ORACLE_BASE_CONFIG"/dbs/spfile"$ORACLE_SID".ora ]; then

    rm "$ORACLE_BASE_CONFIG"/dbs/spfile"$ORACLE_SID".ora

    fi;

    if [ -L "$ORACLE_BASE_CONFIG"/dbs/orapw"$ORACLE_SID" ]; then

    rm "$ORACLE_BASE_CONFIG"/dbs/orapw"$ORACLE_SID"

    fi;

    if [ -L "$ORACLE_BASE_HOME"/network/admin/sqlnet.ora ]; then

    rm "$ORACLE_BASE_HOME"/network/admin/sqlnet.ora

    fi;

    if [ -L "$ORACLE_BASE_HOME"/network/admin/listener.ora ]; then

    rm "$ORACLE_BASE_HOME"/network/admin/listener.ora

    fi;

    if [ -L "$ORACLE_BASE_HOME"/network/admin/tnsnames.ora ]; then

    rm "$ORACLE_BASE_HOME"/network/admin/tnsnames.ora

    fi;

    }

    Listing 13-6

    Updates to the runOracle.sh script for handling the variable directory paths in
    read-only and read-write homes

    ```'
  raw: '### Update Scripts


    The existing repository only anticipates a read-write home and relies on the “old”
    default—`ORACLE_HOME`—for all its configuration files. We need to change them
    to use the new references:


    *   `$ORACLE_HOME/dbs` becomes `$ORACLE_BASE_CONFIG/dbs`.


    *   `$ORACLE_HOME/network/admin` becomes `$ORACLE_BASE_HOME/network/admin`.


    In `createDB.sh`, these appear in two functions, `setupNetworkConfig` and `setupTnsnames`.
    Listing [13-5](#514143_1_En_13_Chapter.xhtml#PC27) shows the modifications I made,
    calling the `setOracleBaseDirs` at the start of each function and using the new
    variables.


    ```

    ############## Set the ORACLE_BASE_CONFIG and ORACLE_BASE_HOME variables ##############

    function setOracleBaseDirs {

    export ORACLE_BASE_CONFIG="$($ORACLE_HOME/bin/orabaseconfig)"

    export ORACLE_BASE_HOME="$($ORACLE_HOME/bin/orabasehome)"

    }

    ############## Setting up network related config files (sqlnet.ora, listener.ora)
    ##############

    function setupNetworkConfig {

    setOracleBaseDirs

    mkdir -p "$ORACLE_BASE_HOME"/network/admin

    # sqlnet.ora

    echo "NAMES.DIRECTORY_PATH= (TNSNAMES, EZCONNECT, HOSTNAME)" > "$ORACLE_BASE_HOME"/network/admin/sqlnet.ora

    # listener.ora

    echo "LISTENER =

    (DESCRIPTION_LIST =

    (DESCRIPTION =

    (ADDRESS = (PROTOCOL = IPC)(KEY = EXTPROC1))

    (ADDRESS = (PROTOCOL = TCP)(HOST = 0.0.0.0)(PORT = 1521))

    )

    )

    DEDICATED_THROUGH_BROKER_LISTENER=ON

    DIAG_ADR_ENABLED = off

    " > "$ORACLE_BASE_HOME"/network/admin/listener.ora

    }

    ####################### Setting up tnsnames.ora ###########################

    function setupTnsnames {

    setOracleBaseDirs

