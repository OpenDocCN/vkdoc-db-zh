    \   3 minutes ago    /bin/sh -c echo 'ORACLE_SID=${ORACLE_SID:-OR...   69B\n8b9a86303988\
    \   3 minutes ago    /bin/sh -c #(nop) WORKDIR /home/oracle          0B\n2a63bb2ba0e2\
    \   3 minutes ago    /bin/sh -c #(nop)  USER oracle                  0B\n3dc4a02582f5\
    \   3 minutes ago    /bin/sh -c $ORACLE_BASE/oraInventory/orainst...   21.8MB\n\
    b8ad822c9f7b   3 minutes ago    /bin/sh -c #(nop)  USER root                 \
    \   0B\na51c124a4630   4 minutes ago    /bin/sh -c #(nop) COPY --chown=oracle:dbadir...\
    \   6.19GB\n80165c9dd6e6   6 minutes ago    /bin/sh -c #(nop)  USER oracle   \
    \               0B\n7df11e1c33c2   13 minutes ago   /bin/sh -c echo \"INSTALL_DIR\
    \ = $INSTALL_DIR\"...   332MB\nbd581e634499   5 weeks ago      /bin/sh -c #(nop)\
    \ COPY multi:267aa3de5580180...   43kB\n2e6a13841ca5   5 weeks ago      /bin/sh\
    \ -c #(nop) COPY multi:08c35eebd2349e6...   1.96kB\n2d1f2466fe4f   5 weeks ago\
    \      /bin/sh -c #(nop)  ENV PATH=/opt/oracle/prod...   0B\n6f7b027f7ba1   5\
    \ weeks ago      /bin/sh -c #(nop)  ENV ORACLE_BASE=/opt/orac...   0B\nbfa620b5677f\
    \   5 weeks ago      /bin/sh -c #(nop)  ARG INSTALL_FILE_1=LINUX....   0B\n6fbdf293ec56\
    \   5 weeks ago      /bin/sh -c #(nop)  ARG SLIMMING=true            0B\ne930d325050c\
    \   5 weeks ago      /bin/sh -c #(nop)  LABEL provider=Oracle iss...   0B\n03c22334cf5a\
    \   2 years ago      /bin/sh -c #(nop)  CMD [\"/bin/bash\"]            0B\n  \
    \    2 years ago      /bin/sh -c #(nop) ADD file:0846801b1ef59a751...   131MB\n\
    \      2 years ago      /bin/sh -c #(nop)  LABEL org.opencontainers....   0B\n\
    ```\n\nThe output of `docker image history` shows the latest operations first\
    \ and identifies the images where each command ran. Now, examine a step by running\
    \ the associated image and supplying a command, like bash, to execute:\n\n```\n\
    docker run --name test -it 3dc4a02582f5 bash\n```\n\nYou can also run intermediate\
    \ images in the background, using the `-d` flag:\n\n```\ndocker run --name test\
    \ -d 3dc4a02582f5 bash\n```\n\nWhen running intermediate images, it’s critical\
    \ to remember the image won’t have a built-in instruction. Without supplying something\
    \ for the container to do, like open a shell, it exits immediately!\n\nAfter starting\
    \ intermediate images as containers, they behave just like the “regular” images\
    \ we’ve worked with throughout the book. The same commands used to manage and\
    \ connect still work. For the two examples earlier, you can open a bash terminal\
    \ using `docker exec`:\n\n```\ndocker exec -it test bash\n```\n\nThere’s usually\
    \ no need to add environment variables, assign a network, or map ports while troubleshooting\
    \ processes in intermediate images. However, you might consider mapping a bound\
    \ volume.\n\n## Access Container Files\n\nLet’s assume you’ve written a Dockerfile\
    \ and used it to build an image. When you ran the image, something went wrong.\
    \ You followed some of the recommendations in this chapter, allowing you to start\
    \ a container and change some scripts. How do you access the changed files from\
    \ the container?\n\nYou could copy and paste the file contents from the container’s\
    \ shell into a file on the local host. I can’t count how many times I’ve done\
    \ this, and it’s a perfectly reasonable solution up to a point.\n\nFor larger\
    \ files where copy and paste aren’t practical, use Docker’s copy utility, `docker\
    \ cp`. It takes two arguments, copying from the first (source) to the second (destination).\
    \ Identify the location in the container by prefixing the container name, followed\
    \ by a colon:\n\n```\ndocker cp my_container:/source_path/filename /destination_path/\n\
    ```\n\nThis copies `/source_path/filename` from container “my_container” to `/destination_path`\
    \ on the host.\n\nUnfortunately, `docker cp` won’t process wildcards:\n\n```\n\
    > docker cp ORCL:/home/oracle/* $HOME/\nError: No such container:path: ORCL:/home/oracle/*\n\
    ```\n\nNor does it copy directory contents. Copying a few files is viable, but\
    \ dozens could get tedious!\n\nManaging multiple files during troubleshooting\
    \ is best addressed with attached volumes. I suggest mapping a bind volume to\
    \ a nonexistent mount point in the container and associating it to a directory\
    \ on the local host:\n\n```\ndocker run -it \\\n-v $HOME:/debug \\\n3dc4a02582f5\
    \ bash\n```\n\nThis has uses for sharing files *into* the container, too. Most\
    \ database administrators have a collection of diagnostic scripts they’re comfortable\
    \ using. You’ll do yourself a favor by anticipating the need and making them available\
    \ in the container environment!"
