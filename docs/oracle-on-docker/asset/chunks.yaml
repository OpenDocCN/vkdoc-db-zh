    ## 在容器中连接数据库


    无论是在 SQL Developer 中添加新的数据库连接、构建 `EZConnect` 字符串，还是创建 `tnsnames.ora` 条目，我们都需要相同的基本信息：


    *   **主机名：** 本地客户端将使用主机 `localhost` 或 IP 地址 `0.0.0.0`。

    *   **监听器端口：** 在这些示例中，我将切换回在上一节开头创建的 `ORCL` 容器。如果还记得，我将容器的监听器端口 `1521` 映射到了我主机上的端口
    `51521`。

    *   **数据库服务或 SID：** 我之前运行的 Oracle 19c 数据库镜像创建的默认服务名为 `ORCLCDB`（用于 CDB 或容器数据库——不要与在
    Docker 容器中运行的数据库混淆！）和 `ORCLPDB1`（用于 PDB，即可插拔数据库）。

    *   **用户名和密码：** 为了演示，我已将 `system` 用户的密码更改为 `oracle`。


    ### 在 SQL Developer 中设置连接


    SQL Developer 是 Oracle 提供的多功能、流行且易于使用的图形化开发工具。您可以从 [www.oracle.com/tools/downloads/sqldev-downloads.html](https://www.oracle.com/tools/downloads/sqldev-downloads.html)
    免费下载。还有许多其他与 Oracle 数据库兼容的开发工具，但添加新连接的步骤是类似的。它们都需要相同的四项信息，此处展示的内容也适用于其他产品。


    打开 SQL Developer 后，导航到左上角的连接面板，点击绿色加号以打开如图 8-2 所示的“新建连接”对话框。


    ![](img/514143_1_En_8_Fig2_HTML.jpg)

    新建或选择数据库连接的屏幕截图，包含名称、数据库类型、用户信息和连接类型详细信息等选项。底部有帮助、保存、清除、测试、连接和取消等选项。

    图 8-2：Oracle SQL Developer “新建连接”对话框


    为新连接命名并输入用户名和密码，如图 8-3 所示。可选择勾选“保存密码”复选框。


    ![](img/514143_1_En_8_Fig3_HTML.jpg)

    新建或选择数据库连接的屏幕截图，名称为 O R C L C D B，数据库类型为 oracle，包含用户信息和连接类型详细信息。

    图 8-3：输入连接名称和数据库用户的用户名与密码


    在“详细信息”选项卡中，将连接类型保持为“基本”，“主机名”保持为默认的 `localhost`。将“端口”更改为映射到该容器的主机端口。在我的系统上使用的是
    `51521`，但您的可能不同，特别是如果您选择使用 `-P` 选项让 Docker 自动分配端口。


    接下来，选中“服务名”的单选按钮，并输入在容器中运行的数据库的服务名。在图 8-4 中，我提供了默认的 CDB 服务 `ORCLCDB`。最后，点击对话框底部的“测试”按钮，并确认左下角显示的“状态”为“成功”。


    ![](img/514143_1_En_8_Fig4_HTML.jpg)

    新建或选择数据库连接的屏幕截图，包含名称、数据库类型、用户信息和连接类型详细信息，其中端口和服务名已标记。左侧状态显示为成功。

    图 8-4：更改端口和服务名，然后测试连接


    最后，点击对话框底部的“保存”按钮以保存连接设置。


    恭喜！您已成功创建到 Docker 容器中数据库的连接！您可以自由花几分钟时间探索环境，或者也连接到可插拔数据库中的一个用户！


    ### EZConnect


    Oracle 的 `EZConnect` 或 `Easy Connect` 是一种简化的方法，无需在传统的 `tnsnames.ora` 文件中执行服务查找即可连接到
    Oracle 数据库。基本语法是：


    ```

    username/password@//host:port/service_name

    ```


    使用与之前构建 SQL Developer 连接相同的信息，我可以得到一个有效的连接字符串：


    ```

    system/oracle@//localhost:51521/ORCLCDB

    ```


    我可以使用此字符串从像 Oracle 的 `SQLcl` 这样的命令行客户端连接到数据库，`SQLcl` 是一个类似于 SQL*Plus 的命令行工具，但具有更多开发者友好的功能。您可以从
    [www.oracle.com/tools/downloads/sqlcl-downloads.html](https://www.oracle.com/tools/downloads/sqlcl-downloads.html)
    免费下载它。


    此连接字符串在*我的本地环境*中的任何客户端都有效，因为它告诉客户端连接到在 `localhost` 上监听端口 `51521` 的数据库。它在*容器内部*将无法工作。为什么呢？


    监听器在容器内的端口 `1521` 上运行，并不了解外部世界。它也看不到 Docker 添加的在容器与主机之间的端口映射。在容器内部，我使用一个包含主机、端口和服务的
    `EZConnect` 字符串“正常地”连接到数据库。`EZConnect` 默认假定端口是 `1521`，这意味着我也可以只使用主机和服务：


    ```

    SQL> conn system/oracle@//localhost:1521/ORCLCDB

    Connected.

    SQL> conn system/oracle@//localhost/ORCLCDB

    Connected.

    ```


    从容器主机（在本例中是我的笔记本电脑）和容器内部的客户端（这里是在 `ORCL` 容器中运行的 SQL*Plus）发起的连接都使用 `localhost`
    作为主机。`localhost` 是“我的本地主机”的别名，但它在容器和主机中并不代表*同一个主机*！


    为了说明这一点，我在容器中运行了 Linux 的 `hostname` 命令（如清单 8-4 所示），然后退出容器环境，并在主机上重新运行了它。


    ```

    [oracle@f502c53c3c27 ~]$ hostname

    f502c53c3c27

    [oracle@f502c53c3c27 ~]$ exit

    exit

    > hostname

    SSCOTT-C02QP2DJG8WN

    ```

    清单 8-4：`localhost` 在容器环境内外引用的是不同的主机


    我自己也曾混淆过，有一次花了比我愿意承认的更多时间来推理，为什么一个在容器*外部*使用转换后的端口可以工作的 `EZConnect` 字符串，在容器*内部*从
    SQL*Plus 使用却不行！在设置连接时，请小心不要搞混了哪个 `localhost` 是哪个！


    ### 创建 tnsnames.ora 配置


    正如您可能从前面两节猜到的，设置 TNS 连接需要将正确的主机、端口和服务名应用于连接别名。在本地计算机的 `tnsnames.ora` 文件中为容器数据库添加别名，需要使用映射到该容器的主机名和端口。清单
    8-5 提供了 `tnsnames.ora` 文件中条目的示例，定义了到我的 `ORCL` 容器中 `ORCLPDB1` 服务的连接。请记住，我主机上的端口
    `51521` 映射到了数据库监听器的端口 `1521`。


    ```

    ORCLPDB1 =

    (DESCRIPTION =

    (ADDRESS = (PROTOCOL = TCP)(HOST = localhost)(PORT = 51521))

    (CONNECT_DATA =

    (SERVER = DEDICATED)

    (SERVICE_NAME = ORCLPDB1)

    )

    )

    ```

    清单 8-5：用于从主机连接到容器内数据库的 `ORCLPDB1` 服务的 `tnsnames.ora` 条目。使用开放并映射到容器的端口将流量定向到数据库监听器。


    它看起来与容器内的 `tnsnames.ora` 文件（位于 `$ORACLE_HOME/network/admin` 下，如清单 8-6 所示）非常相似。唯一的区别是主机和端口。请记住，容器内的数据库和软件不受容器-主机网络接口上发生的变化影响（甚至不知道这些变化）。


    ```

    ORCLPDB1=

    (DESCRIPTION =

    (ADDRESS = (PROTOCOL = TCP)(HOST = 0.0.0.0)(PORT = 1521))

    (CONNECT_DATA =

    (SERVER = DEDICATED)

    (SERVICE_NAME = ORCLPDB1)

    )

    )

    ```

    清单 8-6：数据库容器内部的 `ORCLPDB1` 服务的 `tnsnames.ora` 条目不会遇到任何端口更改，因为其流量完全在容器内部。

