  trans: '#### 设置 WSL 资源


    在 WSL 下分配给 Docker Desktop 的默认资源通常是足够的。如果您遇到问题并需要调整 CPU、内存或其他设置，可以通过用户主目录中的 `.wslconfig`
    文件（通常为 `C:\Users\<用户名>\.wslconfig`）进行配置。


    在编辑或添加 `.wslconfig` 文件之前，请以管理员身份从终端会话中停止 WSL：


    ```

    wsl --shutdown

    ```


    然后编辑该文件：


    ```

    notepad "$env:USERPROFILE/.wslconfig"

    ```


    清单 A-1 展示了一个用于限制 WSL 可用内存和处理器的 `.wslconfig` 文件示例。有关 `.wslconfig` 文件中可用选项的完整信息，请参阅
    [*https://docs.microsoft.com/en-us/windows/wsl/wsl-config*](https://docs.microsoft.com/en-us/windows/wsl/wsl-config)。


    ```

    [wsl2]

    processors=4 # 为 WSL 限制为 4 个处理器。

    memory=8GB   # 将 WSL 限制为 8GB 内存。

    清单 A-1

    用于限制 Windows Subsystem for Linux 的 CPU 和内存消耗的 .wslconfig 文件示例

    ```


    ### Mac (Intel)


    在为 Mac 安装 Docker Desktop 之前，请审阅并完成 [*https://docs.docker.com/desktop/install/mac-install/*](https://docs.docker.com/desktop/install/mac-install/)
    上的先决条件，然后从 [`www.docker.com`](http://www.docker.com) 下载 Docker Desktop。导航到下载目录并双击
    `Docker.dmg` 文件以打开图 A-7 中所示的安装程序。将 `Docker.app` 文件拖放到 *Applications* 文件夹中。


    ![](img/514143_1_En_18_Fig7_HTML.jpg)


    一张 Docker Desktop 应用程序文件的屏幕截图，指示用户将 Docker 应用程序文件拖放到 applications 文件夹中。


    图 A-7


    将 `Docker.app` 文件拖放到 Applications 文件夹


    文件复制完成后，导航到 *Applications* 文件夹，滚动到 `Docker.app` 应用程序，然后双击启动 Docker Desktop。接受许可条款并继续到
    Docker Desktop 的主屏幕。


    #### 配置资源


    单击右上角的齿轮图标，或同时按下 Command 和逗号键（⌘ + ,）以访问 Docker Desktop 的设置和首选项。图 A-8 中所示的通用首选项窗格中的默认值是合适的。


    ![](img/514143_1_En_18_Fig8_HTML.png)


    默认通用首选项面板的屏幕截图。


    图 A-8


    Mac 的默认通用首选项对于运行 Oracle 容器是可以接受的


    接下来，单击左侧菜单中的 *Resources* 选项卡，并选择 *Advanced*，如图 A-9 所示。要运行 Oracle 数据库容器，请至少分配 4GB
    内存。Oracle 是内存密集型应用，您能分配的内存越多，其性能就越好。CPU 的情况也是如此。磁盘空间 10–20GB 是一个合理的起点。如果需要，您以后可以无害地增加
    Docker Desktop 的磁盘空间。但是，缩小磁盘空间会删除所有镜像、容器和卷。


    ![](img/514143_1_En_18_Fig9_HTML.png)


    一个首选项面板的屏幕截图，左侧菜单中显示了标记的资源选项。它显示所选资源类型为高级。


    图 A-9


    为 Docker 环境配置资源


    ### Mac (Apple 芯片)


    截至本文撰写时，架构差异导致 Oracle 数据库镜像无法在配备 Apple 芯片的 Mac 上的 Docker 中运行。社区正在积极解决此问题，并已取得有希望的进展。


    ### Linux 的 Docker Desktop 和 Docker Engine


    请参阅 Docker 网站以获取有关为不同 Linux 发行版安装 Docker Desktop 和 Docker Engine 的信息。Docker Desktop
    的说明位于 [*https://docs.docker.com/desktop/install/linux-install*](https://docs.docker.com/desktop/install/linux-install)，而
    Docker Engine 的说明位于 [*https://docs.docker.com/engine/install*](https://docs.docker.com/engine/install)。


    ## 终端环境


    与 Docker 的大多数交互都发生在命令行或 Shell 中。您需要一个 *终端程序* 来访问主机上的命令行，而每个操作系统上都有很多选择。


    ### Windows


    Windows 操作系统包含 PowerShell 和熟悉的 Windows 命令提示符。来自 Microsoft 的第三个选项，Windows Terminal，结合了这两个工具，并增加了对
    Windows Subsystem for Linux 的集成。我最近开始使用它，非常满意——它现在是我在 Windows 系统上最喜欢的新 Shell，取代了
    PuTTY 和 MobaXterm！本书中的所有 Windows Shell 示例都是从 Windows Terminal 截取的。


    本书中给出的命令行示例在通过 Windows Terminal 访问的 Linux Shell 中可以无缝运行。命令提示符、PowerShell、PuTTY
    和 MobaXterm 等工具解释环境变量的方式，以及本地配置的差异，可能会导致异常或错误结果。如果您正在使用这些应用程序之一并遇到任何困难，请尝试在运行于
    WSL Linux 环境上的 Windows Terminal Shell 中再次操作。


    要安装 Windows Terminal，请打开 Windows 开始菜单并选择 Microsoft Store 应用。搜索并安装 Windows Terminal，如图
    A-10 所示。


    ![](img/514143_1_En_18_Fig10_HTML.png)


    Windows 开始菜单的屏幕截图，显示了搜索选项，文本为 "terminal"，并标记了 Windows Terminal 应用程序。


    图 A-10


    在 Windows 应用商店中搜索 "terminal" 并安装 Windows Terminal 应用程序


    这会将 Windows Terminal 添加到系统中。转到开始菜单并打开新的 Terminal 应用程序。图 A-11 中的终端会话显示了打开新标签页的选项。单击标签页右侧的“加号”图标将打开一个新的默认会话。单击向下箭头会打开一个对话框，其中包含打开命令提示符、PowerShell
    会话、Linux（Ubuntu）会话或 Azure Cloud Shell 的选项。


    ![](img/514143_1_En_18_Fig11_HTML.jpg)


    一个 Windows 终端的屏幕截图，显示了打开新标签页的选项。


    图 A-11


    Windows Terminal 支持多种 Shell 类型，并自动集成在 Windows Subsystem for Linux 下运行的任何虚拟环境


    Ubuntu 选项得益于 Windows Terminal 与 Windows Subsystem for Linux 的集成。它会检测在 WSL 中运行的虚拟环境，并为每个环境包含
    Shell 选项。图 A-12 展示了不同 Shell 环境的示例：Ubuntu Linux、命令提示符和 PowerShell。


    ![](img/514143_1_En_18_Fig12_HTML.jpg)


    一个图像预览的屏幕截图，显示了不同 Shell 环境的示例，即 Ubuntu Linux、命令提示符和 PowerShell。


    图 A-12


    作为标签页在 Windows Terminal 中运行的 Ubuntu Linux Shell（顶部）、Windows 命令提示符（中部）和 PowerShell
    会话（底部）的示例'
- fmt: '### Mac Terminal


    OS-X includes a Terminal application built into the operating system. Navigate
    to `/Applications/Utilities` on the system and double-click the Terminal app seen
    in Figure A-13.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig13_HTML.jpg)

    A screenshot lists the following apps, airport utility, audio M I D I, Bluetooth
    file exchange, color sync utility, disc utility, Grapher, keychain access, migration
    access, system information, terminal, voice over utility, and X quartz.


    **Figure A-13**


    The Terminal application is built into OS-X systems in the `/Applications/Utilities`
    folder.


    Terminal is a native Linux shell. Installing Docker Desktop adds the `docker`
    command to the user’s shell path, and all Docker features are available at the
    command line.


    ## Docker Desktop Features


    Users can inspect and manage containers, images, and volumes from Docker Desktop
    and create new volumes and containers.


    ### Container Management


    The container menu lists all containers on the system and includes controls for
    starting, stopping, pausing, and deleting containers. Users can also navigate
    to individual containers and access logs, inspect the environment and container
    statistics, and access a command line inside the container.


    #### Container Terminal


    Docker recently updated Docker Desktop, adding an integrated command shell. You
    can access the CLI for any running container on the host from within Docker Desktop,
    with identical results on any operating system.


    To use the integrated shell, first, ensure it’s enabled. Open Docker Desktop’s
    settings menu by clicking the gear icon, seen in Figure A-14, at the upper-right
    corner of the screen. Then, ensure the “Integrated” option under “Choose container
    terminal” is marked.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig14_HTML.jpg)

    A screenshot of the settings panel with gear icon at the upper-right corner of
    the screen, and selected Integrated option under the Choose container terminal.


    **Figure A-14**


    Select the gear icon in the upper-right corner of Docker Desktop to access the
    Settings page. Then, select “Integrated” as the container terminal in the General
    options pane.


    From Docker Desktop, choose “Containers” from the left menu to see a list of containers
    running on the system. Select a container; then click the three vertical dots
    on the far right to access the “Show container actions” options. From the drop-down
    box that appears, select “Open in terminal” as in Figure A-15.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig15_HTML.jpg)

    A screenshot of docker desktop highlights the containers option from the left
    menu, and open in terminal under show container actions option.


    **Figure A-15**


    To access a container’s shell, select the Container menu (1), click the three
    dots to access the “Show container actions” drop-down (2), and select the “Open
    in terminal” option.


    This opens a `/bin/sh` terminal session (not `/bin/bash`) on the container, as
    in Figure A-16. The terminal window is fully functional, with copy/paste and scroll
    capabilities. It’s also persistent—if you navigate away from the CLI session,
    it remains active in the background. Reaccess it through the CLI tab in the upper
    right of the container page.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig16_HTML.jpg)

    A screenshot of a container page in docker desktop has 3 labels, 1, Oracle database,
    2, open in the external terminal, and 3, C L I.


    **Figure A-16**


    A container page in Docker Desktop displays the container in the heading (1) and
    the command-line environment (2). The session is persistent—if you navigate away
    from the window, reaccess it via the CLI tab at the upper right (3).


    #### Container Logs and Statistics


    View container logs from the Logs tab in the container view, seen in Figure A-17.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig17_HTML.jpg)

    A screenshot of the logs tab in the container view displays the container logs.


    **Figure A-17**


    The Logs tab shows the container’s log output.


    #### Container Statistics


    The Stats tab in Figure A-18 displays the container’s current CPU, memory, I/O,
    and network usage.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig18_HTML.jpg)

    A screenshot of the stats tab displays the container''s current C P U, memory,
    inputs and outputs, and network usage.


    **Figure A-18**


    Resource consumption of a container from the Stats tab.


    ### Image Management


    The Images page in Docker Desktop lists images on the system and provides an interactive
    service for creating a new container from an image.


    To create a new container from an image, hover over the image, revealing the `RUN`
    option in Figure A-19. Click the `RUN` button, which starts the container creation
    dialog.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig19_HTML.jpg)

    A screenshot of the hover over the image reveals the RUN option to create a new
    container from an image.


    **Figure A-19**


    Hover over an image to access the option to create a new container.


    This opens the dialog in Figure A-20. Expand the “Optional settings” by clicking
    the arrow to the right.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig20_HTML.jpg)

    A screenshot of a dialog box displays the optional settings, along with cancel
    and Run options.


    **Figure A-20**


    The container creation dialog.


    Some options available on the command line are present in the dialog seen in Figure
    A-21, including assigning a name, mounting volumes, and setting environment variables.
    However, since the image doesn’t expose ports in its metadata, users don’t have
    the option of mapping a port.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig21_HTML.jpg)

    A screenshot of the run a new container panel lists options for optional settings
    such as container name, ports, volumes, container path, and environment variables.


    **Figure A-21**


    The “Run a new container” dialog includes only basic container creation options.


    ### Volume Management


    Volume management in Docker Desktop is limited. Users can list volumes (but not
    bind mounts) on a system but can only create internally stored volumes.


    Footnotes [1](#514143_1_En_18_Chapter.xhtml#Fn1_source)


    # Aliases and Functions


    Aliases and functions simplify and accelerate command-line tasks. By adding them
    to your shell login profile, they’re loaded into your environment every time you
    log in. The following are some I’ve adopted over the years to make working with
    Docker faster and easier.


    ## Aliases


    Aliases are shortcuts for long or complex commands. They can even pull values
    from the environment! Even if you’re not familiar with aliases, you’ve probably
    used them without realizing it—many Linux installations include default aliases.


    To see the aliases defined in your session, simply type `alias` at the command
    prompt:


    ```

    $ alias

    alias egrep=''egrep --color=auto''

    alias fgrep=''fgrep --color=auto''

    alias grep=''grep --color=auto''

    alias l.=''ls -d .* --color=auto''

    alias ll=''ls -l --color=auto''

    alias ls=''ls --color=auto''

    alias vi=''vim''

    alias which=''alias | /usr/bin/which --tty-only --read-alias --show-dot --show-tilde''

    ```


    These are aliases included in bash on Oracle Linux 7.9.


    I use aliases extensively to apply `--format` options to Docker commands, reordering
    and customizing their output, sometimes called “pretty printing.”'
