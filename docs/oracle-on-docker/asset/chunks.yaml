    \ Containers\n\nThe steps I follow when creating containers depend on how I plan\
    \ to use them. It generally falls into two categories: “disposable” databases\
    \ I don’t intend to keep very long and production or production-like databases.\n\
    \n#### Disposable Environments\n\nI persist the `/opt/oracle/oradata` volume for\
