  trans: "\n### 定义环境变量\n\n数据库创建和管理脚本从容器环境中读取变量，并利用它们来构建和启动数据库。若未手动设置，容器将依赖其默认设置。最常用的变量（方括号内为默认值）如下：\n\
    \n*   `ORACLE_SID`：Oracle 数据库的 SID [ORCLCDB]\n*   `ORACLE_PDB`：Oracle 数据库的 PDB\
    \ 名称 [ORCLPDB1]\n*   `ORACLE_PWD`：Oracle 数据库 SYS、SYSTEM 和 PDB_ADMIN 的密码 [数据库创建时随机生成]\n\
    *   `ENABLE_ARCHIVELOG`：启用归档日志 [False]\n\n要显示镜像中所有可用的环境变量：\n```bash\ndocker image\
    \ inspect \\\n--format '{{range .Config.Env}}{{printf \"%s\\n\" .}}{{end}}' \\\
    \n | sort\n```\n\n要在命令行设置单个变量（此示例中为 `ORACLE_SID`），请使用 `-e` 选项：\n```bash\ndocker\
    \ run -d \\\n-e ORACLE_SID=ORCLDB \\\n...\n```\n\n使用单独的 `-e` 标志为每个变量设置多个值。此处，`ORACLE_SID`\
    \ 和 `ORACLE_PDB` 在容器中设置：\n```bash\ndocker run -d \\\n-e ORACLE_SID=ORCLDB \\\n\
    -e ORACLE_PDB=PDB1 \\\n...\n```\n\n`docker run` 命令可以从主机环境读取值。此处，`ORACLE_SID` 使用本地主机环境中定义的\
    \ `$dbname` 变量值来设置：\n```bash\ndocker run -d \\\n-e ORACLE_SID=$dbname \\\n...\n\
    ```\n\nDocker 可以从文件中读取值，每个 `VARIABLE=VALUE` 对占一行。名为 `db.env` 的环境文件内容示例如下：\n```\n\
    > cat db.env\nORACLE_SID=TEST\nORACLE_PDB=TESTPDB1\nORACLE_EDITION=EE\nENABLE_ARCHIVELOG=true\n\
    ```\n\n在 `docker run` 命令中使用 `--env-file` 选项引用该文件：\n```bash\ndocker run -d \\\n\
    --env-file db.env \\\n...\n```\n\n### 分配存储\n\n通过映射或挂载存储来持久化来自容器数据库的数据。\n\n####\
    \ 使用 `-v` 绑定挂载目录\n\n绑定挂载将主机上的一个目录映射到容器内的一个路径。容器中的文件被写入（并保存）到容器主机的文件系统，并在本地持久化，即使容器被删除。\n\
    \nOracle 数据库镜像中的 `/opt/oracle/oradata` 目录包含所有数据库配置和数据文件。要将其映射到主机上的一个目录：\n```bash\n\
    docker run -d \\\n-v :/opt/oracle/oradata\n...\n```\n\n#### 使用 `--mount` 绑定挂载目录\n\
    \n`--mount` 的语法更详细且具体，Docker 推荐使用它而非 `-v` 选项。`--mount` 中元素的顺序不重要。要使用 `--mount`\
    \ 绑定挂载目录，请使用 `type=bind` 选项：\n```bash\ndocker run -d \\\n--mount type=bind,source=,target=/opt/oracle/oradata\n\
    ...\n```\n\n请记住为每个容器使用唯一的目录，以避免多个数据库写入相同的路径和文件！\n\n#### 使用 `-v` 附加预定义卷\n\nDocker\
    \ 卷是由 Docker 管理的命名对象。它们必须在通过 `docker run` 引用之前预先创建。要将容器中的 `/opt/oracle/oradata`\
    \ 目录映射到现有卷：\n```bash\ndocker run -d \\\n-v :/opt/oracle/oradata\n...\n```\n\n\
    #### 使用 `--mount` 附加预定义卷\n\n与使用 `--mount` 绑定目录的示例类似，元素的顺序不重要。要使用 `--mount` 将预定义卷映射到\
    \ `/opt/oracle/oradata` 目录，请使用 `type=volume` 选项：\n```bash\ndocker run -d \\\n\
    --mount type=volume,source=,target=/opt/oracle/oradata\n...\n```\n\n#### 入口点\n\
    \n入口点是容器中的特殊目录，脚本会在创建和启动期间搜索并执行这些目录中的脚本。在 Oracle 容器镜像中，入口点是：\n\n*   `入口点根目录：`\
    \ `/docker-entrypoint-initdb.d` 或 `/opt/oracle/scripts`\n*   `启动脚本：` `/opt/oracle/scripts/startup`\n\
    *   `设置脚本：` `/opt/oracle/scripts/setup`\n\n将目录映射到入口点根路径时，本地映射的目录中必须存在 `startup`\
    \ 和 `setup` 目录。否则，管理脚本将找不到任何可运行的内容。要将单个目录挂载到根入口点：\n```bash\ndocker run -d \\\n\
    --mount type=bind,source=,target=/docker-entrypoint-initdb.d \\\n...\n```\n\n\
    要将目录挂载到启动和设置入口点：\n```bash\ndocker run -d \\\n--mount type=bind,source=,target=/opt/oracle/scripts/startup\
    \ \\\n--mount type=bind,source=,target=/opt/oracle/scripts/setup \\\n...\n```\n\
    \n### 网络配置\n\n#### 映射端口到主机\n\n端口映射将网络流量从容器上的原生端口路由到主机上的一个端口。它允许主机（或主机网络）上的客户端访问容器资源。要将容器上运行的\
    \ Oracle 监听器映射到端口 1521：\n```bash\ndocker run -d \\\n-p :1521 \\\n...\n```\n\n\
    使用单独的声明映射多个端口：\n```bash\ndocker run -d \\\n-p :1521 \\\n-p :5500 \\\n...\n```\n\
    \n#### 加入网络\n\n要在启动时将容器附加到特定网络：\n```bash\ndocker run -d \\\n--network  \\\n...\n\
    ```\n\n容器可以随意添加到网络（或从网络移除），甚至可以属于多个网络。\n\n### 完整容器示例\n\n代码清单 10-1 中的命令为 Oracle\
    \ 数据库创建了一个简单的容器，它：\n\n*   定义了自定义容器名称\n*   为数据库 CDB 和 PDB 名称定义了用户自定义的值\n*   将数据库监听器映射到容器主机上的一个端口\n\
    *   将数据库的数据目录绑定挂载到本地存储以实现持久化\n\n由此产生的容器提供了在本地环境（如笔记本电脑或小型实验室）中运行数据库所需的所有功能，而无需创建卷或网络对象。\n\
    \n```bash\ndocker run -d \\\n--name  \\\n-e ORACLE_SID= \\\n-e ORACLE_PDB= \\\n\
    -p :1521 \\\n--mount type=bind,source=,target=/opt/oracle/oradata \\\n\n```\n\
