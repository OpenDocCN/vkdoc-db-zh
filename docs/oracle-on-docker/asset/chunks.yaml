    -rwxrwxr-x 1 oracle dba       678 Oct 11  2020 startDB.sh

    ```

    **清单 5-10** Oracle 数据库容器中`ORACLE_BASE`的内容


    暂时忽略那些 shell 脚本。我希望你仔细查看那些*目录*。这里大部分内容都是我们期望看到的。Admin、audit 和 diagnostic 目录——确认！构成系统上安装的`ORACLE_HOME`根目录的
    product 目录——确认！Oracle 存储数据库文件的`oradata`目录——确认！但是，`oraInventory`？


    Oracle 的数据库清单是主机上安装的不同 Oracle 产品的元数据集合，Oracle 并不建议在`ORACLE_BASE`内或之下安装，但它却在这里。为什么？


