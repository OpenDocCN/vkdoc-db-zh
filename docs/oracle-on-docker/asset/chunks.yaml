  trans: '## 演示桥接网络


    Oracle 数据库最常见的网络场景如下：


    *   将客户端连接到本地数据库：此处的客户端通常是像 SQL*Plus 这样的命令行工具。

    *   将客户端连接到远程主机上的数据库：客户端可能是 SQL*Plus 或像 Oracle 的 SQL Developer 或 Quest Software
    的 TOAD 这样的图形界面开发套件。

    *   在两个数据库之间创建数据库链接：实际上，这只是连接到远程主机的一种特定情况，其中本地数据库充当数据库客户端。

    *   支持服务、复制和高可用性：这看起来可能只是另一个本地或远程客户端连接，但有一个转折点。前面的例子都是通过数据库监听器在已知端口上发起数据库连接。而
    Oracle GoldenGate 使用的是不同的端口范围。


    托管在 Docker 容器中的数据库引入了一个额外的场景：将主机上的客户端连接到容器。这似乎属于第二个例子——客户端连接到远程数据库——但增加了一个穿越主机与容器网络之间鸿沟的需求。


    理想的网络解决方案不需要独特的配置或不合理的努力。相同的连接字符串和 `tnsnames.ora` 文件应该在任何地方都能工作——无论是在容器内还是在容器主机上。DNS
    应该能够通过网络上的主机名解析容器。为了探索和测试这些场景，请使用表 9-1 中列出的参数创建两个 Oracle 数据库容器。


    **表 9-1**

    分配给两个数据库容器 `ORCL1` 和 `ORCL2` 的属性


    |                    | `容器 ORCL1` | `容器 ORCL2` |

    | ------------------ | ------------ | ------------ |

    | 容器名称           | `DB1`        | `DB2`        |

    | 主机名             | `dbhost1`    | `dbhost2`    |

    | 数据库 SID         | `ORA1`       | `ORA2`       |

    | PDB 名称           | `PDB1`       | `PDB2`       |

    | 监听器端口         | 1521         | 1521         |

    | oradata 的卷路径   | `/oradata/ORCL1` | `/oradata/ORCL2` |

    | 映射的监听器端口   | 51521        | 61521        |

    | `SYSTEM` 密码      | `oracle123`  | `oracle123`  |


    代码清单 9-1 展示了用于创建这两个容器的 `docker run` 命令。`ORACLE_SID` 和 PDB 名称是使用环境变量设置的，监听器端口也如前一章所示进行了映射。请注意
    `--hostname` 选项。Docker 在执行 `docker run` 时会向容器的 `/etc/hosts` 文件添加一个主机名条目。默认情况下是容器名称，但
    `--hostname` 允许我们指定自定义值。


    **代码清单 9-1**

    用于创建两个 Oracle 数据库容器 `ORCL1` 和 `ORCL2` 的命令


    ```

    > docker run -d --name ORCL1 \

    >        --hostname dbhost1 \

    >        -e ORACLE_SID=ORA1 \

    >        -e ORACLE_PDB=PDB1 \

    >        -v /oradata/ORCL1:/opt/oracle/oradata \

    >        -p 51521:1521 oracle/database:19.3.0-ee

    3a15e84cd484b98f4c2437f4b0eabe10ebeb6c965dc992c09eb1d20d96b3589e

    > docker run -d --name ORCL2 \

    >        --hostname dbhost2 \

    >        -e ORACLE_SID=ORA2 \

    >        -e ORACLE_PDB=PDB2 \

    >        -v /oradata/ORCL2:/opt/oracle/oradata \

    >        -p 61521:1521 oracle/database:19.3.0-ee

    e05023316788349978c96414e2c57bb489cd0d2d54d2168e2c2db2d5221af9d3

    ```


    连接到这些数据库需要它们的主机名或 IP 地址、监听器端口和一个服务名（或目标数据库 SID）。如果表 9-1 中描述的数据库不是运行在容器中，我们可以通过
    SQL*Plus 使用 EZConnect 连接语法连接它们，例如：


    ```

    $ORACLE_HOME/bin/sqlplus system/oracle123@//dbhost1:1521/ORA1

    ```


    以下任一连接字符串^(⁵⁹) 都适用于 `dbhost1`：


    ```

    system/oracle123@//dbhost1:1521/ORA1

    system/oracle123@//dbhost1/ORA1

    system/oracle123@//dbhost1:1521/PDB1

    system/oracle123@//dbhost1/PDB1

    ```


    类似的一组连接字符串也适用于 `dbhost2`：


    ```

    system/oracle123@//dbhost2:1521/ORA2

    system/oracle123@//dbhost2/ORA2

    system/oracle123@//dbhost2:1521/PDB2

    system/oracle123@//dbhost2/PDB2

    ```


    一旦数据库创建完成，我们就可以开始探索 Docker 的网络环境了。


    ## 显示网络信息


    正如您可能预期的那样，Docker 中的网络管理使用一组 `docker network` 命令。代码清单 9-2 使用 `docker network --help`
    对其进行了总结。通读这些选项，请注意 Docker 允许我们创建和删除网络、列出和检查网络，以及将容器连接到网络（或从网络断开连接）。


    **代码清单 9-2**

    `docker network` 的选项包括创建、删除、列出和检查网络以及将容器连接到网络和从网络断开连接的命令


    ```

    > docker network --help

    Usage:  docker network COMMAND

    Manage networks

    Commands:

    connect     Connect a container to a network

    create      Create a network

    disconnect  Disconnect a container from a network

    inspect     Display detailed information on one or more networks

    ls          List networks

    prune       Remove all unused networks

    rm          Remove one or more networks

    Run ''docker network COMMAND --help'' for more information on a command.

    ```


    Docker Desktop 系统在 Windows 和 Mac 的虚拟机中运行，其中许多主机网络组件和接口不易从主机看到。本章中的示例来自运行 Docker
    引擎的 Oracle Enterprise Linux 系统，以简化问题并更好地说明 Docker 网络的工作原理（没有虚拟机引入的额外抽象层）。


    ### 列出网络


    使用 `docker network ls` 显示系统上的网络：


    ```

    > docker network ls

    NETWORK ID     NAME      DRIVER    SCOPE

    0201c1b85336   bridge    bridge    local

    8e74549be878   host      host      local

    d0ce1f7bd49f   none      null      local

    ```


    这三个网络 `bridge`、`host` 和 `none` 是 Docker 在安装期间创建的默认网络。在主机上启动 Docker 引擎也会启动其容器网络。无需任何额外努力即可在
    Docker 中启用网络功能！


    ### 检查网络


    让我们使用 `docker network inspect bridge` 进一步查看 `bridge`^(⁶⁰) 网络。我的系统上的简化输出（如代码清单
    9-3 所示）包含了容器 `ORCL1` 和 `ORCL2` 的信息，包括它们的 IP 地址。在底部附近，它显示这是一个默认的桥接网络（`com.docker.network.bridge.default_bridge`
    为 `true`），绑定到主机 IP 0.0.0.0，网络名称为 `docker0`。


    **代码清单 9-3**

    `docker network inspect bridge` 的示例输出，显示了 `bridge` 网络的详细信息。注意之前创建的两个容器 `ORCL1`
    和 `ORCL2` 已连接到此网络。


    ```

    > docker network inspect bridge

    [

    {

    "Name": "bridge",

    "Id": "0201c1b85336336a...",

    "Scope": "local",

    "Driver": "bridge",

    "IPAM": {

    "Driver": "default",

    "Config": [

    {

    "Subnet": "172.17.0.0/16",

    "Gateway": "172.17.0.1"

    }

    ]

    },

    "Containers": {

    "3a15e84cd484b98f...": {

    "Name": "ORCL1",

    "IPv4Address": "172.17.0.2/16"

    },

    "e050233167883499...": {

    "Name": "ORCL2",

    "IPv4Address": "172.17.0.3/16"

    }

    },

    "Options": {

    "com.docker.network.bridge.default_bridge": "true",

    "com.docker.network.bridge.enable_icc": "true",

    "com.docker.network.bridge.enable_ip_masquerade": "true",

    "com.docker.network.bridge.host_binding_ipv4": "0.0.0.0",

    "com.docker.network.bridge.name": "docker0"

    },

    }

    ]

    ```'
- fmt: "## 检查容器的网络条目\n\n您刚刚看到的 `docker network inspect` 输出报告了连接到网络的容器。我们也可以使用 `docker\
    \ container inspect` 来显示单个容器的网络信息。容器通常包含更明确的内容，检查容器的JSON输出可能相当冗长。为了过滤和精炼输出，可以使用\
    \ `docker inspect` 的 `--format` 选项来仅显示网络设置的JSON，然后用 `jq` 解析它：\n\n```\ndocker container\
    \ inspect \\\n--format '{{json .NetworkSettings}}' \\\n | jq\n```\n\n在我的系统上，容器\
    \ ORCL1 的精简网络信息如清单 [9-4](#514143_1_En_9_Chapter.xhtml#PC9) 所示。我裁剪了一些信息以聚焦于对我们相关的内容。请注意，除了显示容器的IP地址外，我们还可以看到容器端口\
    \ 1521 与主机上端口 51521 之间的映射。\n\n```\n> docker container inspect \\\n>        --format\
    \ '{{json .NetworkSettings}}' \\\n>        ORCL1 | jq\n{\n\"Bridge\": \"\",\n\"\
    Ports\": {\n\"1521/tcp\": [\n{\n\"HostIp\": \"0.0.0.0\",\n\"HostPort\": \"51521\"\
    \n}\n]\n},\n\"EndpointID\": \"c3a9bbde24705f37516...\",\n\"Gateway\": \"172.17.0.1\"\
    ,\n\"IPAddress\": \"172.17.0.2\",\n\"Networks\": {\n\"bridge\": {\n\"Aliases\"\
    : null,\n\"NetworkID\": \"0201c1b85336336a...\",\n\"EndpointID\": \"c3a9bbde24705f37...\"\
    ,\n\"Gateway\": \"172.17.0.1\",\n\"IPAddress\": \"172.17.0.2\"\n}\n}\n}\n清单 9-4\n\
    由 docker container inspect 命令生成的容器 ORCL1 的精简网络信息输出\n```\n\n## 查看容器网络上的虚拟设备\n\n\
    在清单 [9-3](#514143_1_En_9_Chapter.xhtml#PC7) 中 `docker network inspect bridge`\
    \ 输出的末尾附近，它报告了一个名为 `docker0`^([^(61)](#fn61)) 的接口上的网络连接，对应于一个虚拟（而非物理）的主机接口。`ifconfig`\
    \ 命令显示了关于此接口的附加信息，包括一个匹配的IP地址范围：\n\n```\n> ifconfig -a docker0\ndocker0: flags=4163\
    \  mtu 1500\ninet 172.17.0.1  netmask 255.255.0.0  broadcast 172.17.255.255\n\
    inet6 fe80::42:ebff:fe95:f6aa  prefixlen 64  scopeid 0x20\nether 02:42:eb:95:f6:aa\
    \  txqueuelen 0  (Ethernet)\nRX packets 158  bytes 8256 (8.2 KB)\nRX errors 0\
    \  dropped 0  overruns 0  frame 0\nTX packets 113  bytes 13510 (13.5 KB)\nTX errors\
    \ 0  dropped 0 overruns 0  carrier 0  collisions 0\n```\n\n可以将其想象为一个网络交换机。桥接网络上的容器通过接口“插入”到该交换机上。使用\
    \ Linux 命令 `ip link show type bridge` 列出系统上的桥接网络：\n\n```\n> ip link show type\
    \ bridge\n4: docker0:  mtu 1500 qdisc noqueue state UP mode DEFAULT group default\n\
    link/ether 02:42:eb:95:f6:aa brd ff:ff:ff:ff:ff:ff\n```\n\n每个桥接的接口记录在 `/sys/class/net/<BRIDGE\
    \ NAME>/brif` 中。桥接 `docker0` 有两个列出的接口：\n\n```\n> ls /sys/class/net/docker0/brif\n\
    veth7d17f7f  veth8c9057e\n```\n\n这些虚拟接口对应于两个容器。这些接口也可以通过主机上的 `ifconfig` 看到：\n\n\
    ```\n> ifconfig veth7d17f7f\nveth7d17f7f: flags=4163  mtu 1500\ninet6 fe80::3cf4:90ff:fe19:17f5\
    \  prefixlen 64  scopeid 0x20\nether 3e:f4:90:19:17:f5  txqueuelen 0  (Ethernet)\n\
    RX packets 104  bytes 6888 (6.8 KB)\nRX errors 0  dropped 0  overruns 0  frame\
    \ 0\nTX packets 135  bytes 15226 (15.2 KB)\nTX errors 0  dropped 0 overruns 0\
    \  carrier 0  collisions 0\n> ifconfig veth8c9057e\nveth8c9057e: flags=4163  mtu\
    \ 1500\ninet6 fe80::3845:f5ff:fed4:49c  prefixlen 64  scopeid 0x20\nether 3a:45:f5:d4:04:9c\
    \  txqueuelen 0  (Ethernet)\nRX packets 21  bytes 1394 (1.3 KB)\nRX errors 0 \
    \ dropped 0  overruns 0  frame 0\nTX packets 47  bytes 3218 (3.2 KB)\nTX errors\
    \ 0  dropped 0 overruns 0  carrier 0  collisions 0\n```\n\n这就是插入到 `docker0` 接口的“线缆”的末端。接下来，连接到\
    \ ORCL1 容器：\n\n```\n> docker exec -it ORCL1 bash\n```\n\n然后，通过在容器 ORCL1 上运行 `ifconfig`\
    \ 来显示连接的另一端，该连接附着在容器内的 `eth0` 接口上：\n\n```\n[oracle@dbhost1 ~]$ ifconfig eth0\n\
    eth0: flags=4163  mtu 1500\ninet 172.17.0.2  netmask 255.255.0.0  broadcast 172.17.255.255\n\
    ether 02:42:ac:11:00:02  txqueuelen 0  (Ethernet)\nRX packets 134  bytes 15156\
    \ (14.8 KiB)\nRX errors 0  dropped 0  overruns 0  frame 0\nTX packets 104  bytes\
    \ 6888 (6.7 KiB)\nTX errors 0  dropped 0 overruns 0  carrier 0  collisions 0\n\
    ```\n\n在连接到容器时，显示其 `/etc/hosts` 文件的内容，如清单 [9-5](#514143_1_En_9_Chapter.xhtml#PC16)\
    \ 所示。通过 `docker run` 的 `--hostname` 选项提供的主机名与IP地址匹配。Docker 在容器创建期间添加了此条目。它还会在容器每次启动时更新该文件，因此即使容器的地址发生变化，其\
    \ `/etc/hosts` 文件也包含当前的IP。主机名通常是唯一的、随机生成的容器名称；为 `docker run` 命令指定一个主机名会覆盖该行为。\n\
    \n```\n[oracle@dbhost1 ~]$ cat /etc/hosts\n127.0.0.1     localhost\n::1     localhost\
    \ ip6-localhost ip6-loopback\nfe00::0     ip6-localnet\nff00::0     ip6-mcastprefix\n\
    ff02::1     ip6-allnodes\nff02::2     ip6-allrouters\n172.17.0.2     dbhost1\n\
    清单 9-5\nORCL1 容器上的 /etc/hosts 文件包含一个由 Docker 为容器创建期间分配的主机名创建的条目\n```\n\n容器上的 Linux\
    \ `/etc/resolv.conf` 文件控制 DNS 解析，与主机的文件匹配：\n\n```\n[oracle@dbhost1 ~]$ cat /etc/resolv.conf\n\
    # This file is managed by man:systemd-resolved(8). Do not edit.\n#\n# This is\
    \ a dynamic resolv.conf file for connecting local clients directly to\n# all known\
    \ uplink DNS servers. This file lists all configured search domains.\n#\n# Third-party\
    \ programs must not access this file directly, but only through the\n# symlink\
    \ at /etc/resolv.conf. To manage man:resolv.conf(5) in a different way,\n# replace\
    \ this symlink by a static file or a different symlink.\n#\n# See man:systemd-resolved.service(8)\
    \ for details about the supported modes of\n# operation for /etc/resolv.conf.\n\
    nameserver 192.168.1.1\nsearch Home\n```\n\n它们匹配，因为它们是同一个文件：\n\n```\n> md5sum\
    \ /etc/resolv.conf\nc5dd1676e12d6ca9f7c6d03c5ca9b258  /etc/resolv.conf\n> docker\
    \ exec -it ORCL1 bash -c \"md5sum /etc/resolv.conf\"\nc5dd1676e12d6ca9f7c6d03c5ca9b258\
    \  /etc/resolv.conf\n```\n\nDocker 将主机 DNS 配置作为容器覆盖网络中的一个层映射到容器中，使容器能够访问主机上存在的相同名称解析能力。\n\
    \n图 [9-3](#514143_1_En_9_Chapter.xhtml#Fig3) 可视化了默认桥接网络上的网络连接，并为测试网络连接提供了一个起点。我们将在后面重新审视本节中的命令，以演示每种网络配置中的差异。\n\
    \n![](images/514143_1_En_9_Chapter/514143_1_En_9_Fig3_HTML.png)\n\n一幅展示通过默认 docker\
    \ 桥接进行主机-网络通信的示意图。主机容器 O R C L 1 和 2 与 docker 桥接通信，而后者又与主机网络通信。\n\n图 9-3\n默认桥接网络上两个容器\
    \ ORCL1 和 ORCL2 的接口和端点"
  raw: "### Inspect the Container’s Network Entries\n\nYou just saw the output of\
    \ `docker network inspect` reports the containers connected to a network. We can\
    \ also display network information of individual containers with `docker container\
    \ inspect`. Containers typically have more explicit content, and the JSON output\
    \ of inspecting a container can be rather lengthy. To filter and refine the output,\
    \ use the `--format` option of `docker inspect` to show only the JSON for the\
    \ network settings, then parse it with `jq`:\n\n```\ndocker container inspect\
    \ \\\n--format '{{json .NetworkSettings}}' \\\n | jq\n```\n\nAbridged networking\
    \ information for container ORCL1 on my system appears in Listing [9-4](#514143_1_En_9_Chapter.xhtml#PC9).\
    \ I trimmed out some information to focus on what’s relevant to us. Notice that,\
    \ in addition to showing the container’s IP address, we can see the mapping between\
    \ container port 1521 and port 51521 on the host.\n\n```\n> docker container inspect\
    \ \\\n>        --format '{{json .NetworkSettings}}' \\\n>        ORCL1 | jq\n\
    {\n\"Bridge\": \"\",\n\"Ports\": {\n\"1521/tcp\": [\n{\n\"HostIp\": \"0.0.0.0\"\
    ,\n\"HostPort\": \"51521\"\n}\n]\n},\n\"EndpointID\": \"c3a9bbde24705f37516...\"\
    ,\n\"Gateway\": \"172.17.0.1\",\n\"IPAddress\": \"172.17.0.2\",\n\"Networks\"\
    : {\n\"bridge\": {\n\"Aliases\": null,\n\"NetworkID\": \"0201c1b85336336a...\"\
    ,\n\"EndpointID\": \"c3a9bbde24705f37...\",\n\"Gateway\": \"172.17.0.1\",\n\"\
    IPAddress\": \"172.17.0.2\"\n}\n}\n}\nListing 9-4\nThe abridged output of the\
    \ network information from container ORCL1 is generated by the docker container\
    \ inspect command\n```\n\n### Viewing Virtual Devices on the Container Network\n\
    \nNear the end of the `docker network inspect bridge` output in Listing [9-3](#514143_1_En_9_Chapter.xhtml#PC7),\
    \ it reports network connections on an interface named `docker0`,^([^(61)](#fn61))\
    \ corresponding to a virtual (rather than a physical) host interface. The `ifconfig`\
    \ command shows additional information about this interface, including a matching\
    \ IP range:\n\n```\n> ifconfig -a docker0\ndocker0: flags=4163  mtu 1500\ninet\
    \ 172.17.0.1  netmask 255.255.0.0  broadcast 172.17.255.255\ninet6 fe80::42:ebff:fe95:f6aa\
    \  prefixlen 64  scopeid 0x20\nether 02:42:eb:95:f6:aa  txqueuelen 0  (Ethernet)\n\
    RX packets 158  bytes 8256 (8.2 KB)\nRX errors 0  dropped 0  overruns 0  frame\
    \ 0\nTX packets 113  bytes 13510 (13.5 KB)\nTX errors 0  dropped 0 overruns 0\
    \  carrier 0  collisions 0\n```\n\nIt may help to think of this as a network switch.\
    \ Containers on the bridge network “plug in” to the switch on interfaces. List\
    \ the bridge networks on a system with the Linux `ip link show type bridge` command:\n\
    \n```\n> ip link show type bridge\n4: docker0:  mtu 1500 qdisc noqueue state UP\
    \ mode DEFAULT group default\nlink/ether 02:42:eb:95:f6:aa brd ff:ff:ff:ff:ff:ff\n\
    ```\n\nInterfaces for each bridge are recorded in `/sys/class/net/<BRIDGE NAME>/brif`.\
    \ Bridge `docker0` has two interfaces listed:\n\n```\n> ls /sys/class/net/docker0/brif\n\
    veth7d17f7f  veth8c9057e\n```\n\nThese virtual interfaces correspond to the two\
    \ containers. The interfaces are also visible on the host through `ifconfig`:\n\
    \n```\n> ifconfig veth7d17f7f\nveth7d17f7f: flags=4163  mtu 1500\ninet6 fe80::3cf4:90ff:fe19:17f5\
    \  prefixlen 64  scopeid 0x20\nether 3e:f4:90:19:17:f5  txqueuelen 0  (Ethernet)\n\
    RX packets 104  bytes 6888 (6.8 KB)\nRX errors 0  dropped 0  overruns 0  frame\
    \ 0\nTX packets 135  bytes 15226 (15.2 KB)\nTX errors 0  dropped 0 overruns 0\
    \  carrier 0  collisions 0\n> ifconfig veth8c9057e\nveth8c9057e: flags=4163  mtu\
    \ 1500\ninet6 fe80::3845:f5ff:fed4:49c  prefixlen 64  scopeid 0x20\nether 3a:45:f5:d4:04:9c\
    \  txqueuelen 0  (Ethernet)\nRX packets 21  bytes 1394 (1.3 KB)\nRX errors 0 \
    \ dropped 0  overruns 0  frame 0\nTX packets 47  bytes 3218 (3.2 KB)\nTX errors\
    \ 0  dropped 0 overruns 0  carrier 0  collisions 0\n```\n\nThis is the end of\
    \ the “cable” plugged into the `docker0` interface. Next, connect to the ORCL1\
    \ container:\n\n```\n> docker exec -it ORCL1 bash\n```\n\nThen, show the other\
    \ end of the connection, attached to `eth0` interface in the container, by running\
    \ `ifconfig` on container ORCL1:\n\n```\n[oracle@dbhost1 ~]$ ifconfig eth0\neth0:\
    \ flags=4163  mtu 1500\ninet 172.17.0.2  netmask 255.255.0.0  broadcast 172.17.255.255\n\
    ether 02:42:ac:11:00:02  txqueuelen 0  (Ethernet)\nRX packets 134  bytes 15156\
    \ (14.8 KiB)\nRX errors 0  dropped 0  overruns 0  frame 0\nTX packets 104  bytes\
    \ 6888 (6.7 KiB)\nTX errors 0  dropped 0 overruns 0  carrier 0  collisions 0\n\
    ```\n\nWhile connected to the container, display the contents of its `/etc/hosts`\
    \ file, shown in Listing [9-5](#514143_1_En_9_Chapter.xhtml#PC16). The hostname\
    \ provided to `docker run` via the `--hostname` option matches the IP address.\
    \ Docker adds this entry during container creation. It also updates the file whenever\
    \ the container starts, so even if the container’s address changes, its `/etc/hosts`\
    \ file includes the current IP. The hostname is usually the unique, randomly generated\
    \ container name; specifying a hostname to the `docker run` command overrides\
    \ that behavior.\n\n```\n[oracle@dbhost1 ~]$ cat /etc/hosts\n127.0.0.1     localhost\n\
    ::1     localhost ip6-localhost ip6-loopback\nfe00::0     ip6-localnet\nff00::0\
    \     ip6-mcastprefix\nff02::1     ip6-allnodes\nff02::2     ip6-allrouters\n\
    172.17.0.2     dbhost1\nListing 9-5\nThe /etc/hosts file on the ORCL1 container\
    \ includes an entry created by Docker for the hostname assigned during container\
    \ creation\n```\n\nThe Linux `/etc/resolv.conf` files on the containers, controlling\
    \ DNS resolution, match the host:\n\n```\n[oracle@dbhost1 ~]$ cat /etc/resolv.conf\n\
    # This file is managed by man:systemd-resolved(8). Do not edit.\n#\n# This is\
    \ a dynamic resolv.conf file for connecting local clients directly to\n# all known\
    \ uplink DNS servers. This file lists all configured search domains.\n#\n# Third-party\
    \ programs must not access this file directly, but only through the\n# symlink\
    \ at /etc/resolv.conf. To manage man:resolv.conf(5) in a different way,\n# replace\
    \ this symlink by a static file or a different symlink.\n#\n# See man:systemd-resolved.service(8)\
    \ for details about the supported modes of\n# operation for /etc/resolv.conf.\n\
    nameserver 192.168.1.1\nsearch Home\n```\n\nThey match because they’re the same\
    \ file:\n\n```\n> md5sum /etc/resolv.conf\nc5dd1676e12d6ca9f7c6d03c5ca9b258  /etc/resolv.conf\n\
    > docker exec -it ORCL1 bash -c \"md5sum /etc/resolv.conf\"\nc5dd1676e12d6ca9f7c6d03c5ca9b258\
    \  /etc/resolv.conf\n```\n\nDocker maps the host DNS configuration into the container\
    \ as a layer in the container’s overlay network, giving the container access to\
    \ the same name resolution capabilities present on the host.\n\nFigure [9-3](#514143_1_En_9_Chapter.xhtml#Fig3)\
    \ visualizes the network connections on the default bridge network and offers\
    \ a starting point for testing network connections. We’ll revisit the commands\
    \ in this section to demonstrate the differences in each network configuration.\n\
    \n![](images/514143_1_En_9_Chapter/514143_1_En_9_Fig3_HTML.png)\n\nAn illustration\
    \ of host-network communication through a default docker bridge. The host containers,\
    \ O R C L 1 and 2 communicate with the docker bridge which in turn communicates\
    \ with the host network.\n\nFigure 9-3\n\nInterfaces and endpoints of the two\
    \ containers, ORCL1 and ORCL2, on the default bridge network"
  trans: "## 检查容器的网络条目\n\n您刚刚看到的 `docker network inspect` 输出报告了连接到网络的容器。我们也可以使用 `docker\
    \ container inspect` 来显示单个容器的网络信息。容器的输出通常包含更详细的内容，因此检查容器的 JSON 输出可能相当冗长。为了过滤和精简输出，可以使用\
    \ `docker inspect` 的 `--format` 选项来仅显示网络设置的 JSON，然后用 `jq` 解析它：\n\n```\ndocker\
    \ container inspect \\\n--format '{{json .NetworkSettings}}' \\\n | jq\n```\n\n\
    在我的系统上，容器 ORCL1 的精简网络信息如清单 9-4 所示。我裁剪了一些信息以聚焦于相关的内容。请注意，除了显示容器的 IP 地址外，我们还可以看到容器端口\
    \ 1521 与主机上端口 51521 之间的映射。\n\n```\n> docker container inspect \\\n>        --format\
    \ '{{json .NetworkSettings}}' \\\n>        ORCL1 | jq\n{\n\"Bridge\": \"\",\n\"\
    Ports\": {\n\"1521/tcp\": [\n{\n\"HostIp\": \"0.0.0.0\",\n\"HostPort\": \"51521\"\
    \n}\n]\n},\n\"EndpointID\": \"c3a9bbde24705f37516...\",\n\"Gateway\": \"172.17.0.1\"\
    ,\n\"IPAddress\": \"172.17.0.2\",\n\"Networks\": {\n\"bridge\": {\n\"Aliases\"\
    : null,\n\"NetworkID\": \"0201c1b85336336a...\",\n\"EndpointID\": \"c3a9bbde24705f37...\"\
    ,\n\"Gateway\": \"172.17.0.1\",\n\"IPAddress\": \"172.17.0.2\"\n}\n}\n}\n清单 9-4\n\
    由 docker container inspect 命令生成的容器 ORCL1 的精简网络信息输出\n```\n\n## 查看容器网络上的虚拟设备\n\n\
    在清单 9-3 中 `docker network inspect bridge` 输出的末尾附近，它报告了一个名为 `docker0`^(⁶¹) 的接口上的网络连接，该接口对应于一个虚拟（而非物理）的主机接口。`ifconfig`\
    \ 命令显示了关于此接口的附加信息，包括一个匹配的 IP 地址范围：\n\n```\n> ifconfig -a docker0\ndocker0: flags=4163\
    \  mtu 1500\ninet 172.17.0.1  netmask 255.255.0.0  broadcast 172.17.255.255\n\
    inet6 fe80::42:ebff:fe95:f6aa  prefixlen 64  scopeid 0x20\nether 02:42:eb:95:f6:aa\
    \  txqueuelen 0  (Ethernet)\nRX packets 158  bytes 8256 (8.2 KB)\nRX errors 0\
    \  dropped 0  overruns 0  frame 0\nTX packets 113  bytes 13510 (13.5 KB)\nTX errors\
    \ 0  dropped 0 overruns 0  carrier 0  collisions 0\n```\n\n可以将其想象为一个网络交换机。桥接网络上的容器通过接口“插入”到该交换机上。使用\
    \ Linux 命令 `ip link show type bridge` 列出系统上的桥接网络：\n\n```\n> ip link show type\
    \ bridge\n4: docker0:  mtu 1500 qdisc noqueue state UP mode DEFAULT group default\n\
    link/ether 02:42:eb:95:f6:aa brd ff:ff:ff:ff:ff:ff\n```\n\n每个桥接的接口记录在 `/sys/class/net/<BRIDGE\
    \ NAME>/brif` 中。桥接 `docker0` 有两个列出的接口：\n\n```\n> ls /sys/class/net/docker0/brif\n\
    veth7d17f7f  veth8c9057e\n```\n\n这些虚拟接口对应于两个容器。这些接口也可以通过主机上的 `ifconfig` 看到：\n\n\
    ```\n> ifconfig veth7d17f7f\nveth7d17f7f: flags=4163  mtu 1500\ninet6 fe80::3cf4:90ff:fe19:17f5\
    \  prefixlen 64  scopeid 0x20\nether 3e:f4:90:19:17:f5  txqueuelen 0  (Ethernet)\n\
    RX packets 104  bytes 6888 (6.8 KB)\nRX errors 0  dropped 0  overruns 0  frame\
    \ 0\nTX packets 135  bytes 15226 (15.2 KB)\nTX errors 0  dropped 0 overruns 0\
    \  carrier 0  collisions 0\n> ifconfig veth8c9057e\nveth8c9057e: flags=4163  mtu\
    \ 1500\ninet6 fe80::3845:f5ff:fed4:49c  prefixlen 64  scopeid 0x20\nether 3a:45:f5:d4:04:9c\
    \  txqueuelen 0  (Ethernet)\nRX packets 21  bytes 1394 (1.3 KB)\nRX errors 0 \
    \ dropped 0  overruns 0  frame 0\nTX packets 47  bytes 3218 (3.2 KB)\nTX errors\
    \ 0  dropped 0 overruns 0  carrier 0  collisions 0\n```\n\n这就是插入到 `docker0` 接口的“线缆”的末端。接下来，连接到\
    \ ORCL1 容器：\n\n```\n> docker exec -it ORCL1 bash\n```\n\n然后，通过在容器 ORCL1 上运行 `ifconfig`\
    \ 来显示连接的另一端，该连接附着在容器内的 `eth0` 接口上：\n\n```\n[oracle@dbhost1 ~]$ ifconfig eth0\n\
    eth0: flags=4163  mtu 1500\ninet 172.17.0.2  netmask 255.255.0.0  broadcast 172.17.255.255\n\
    ether 02:42:ac:11:00:02  txqueuelen 0  (Ethernet)\nRX packets 134  bytes 15156\
    \ (14.8 KiB)\nRX errors 0  dropped 0  overruns 0  frame 0\nTX packets 104  bytes\
    \ 6888 (6.7 KiB)\nTX errors 0  dropped 0 overruns 0  carrier 0  collisions 0\n\
    ```\n\n在连接到容器时，显示其 `/etc/hosts` 文件的内容，如清单 9-5 所示。通过 `docker run` 的 `--hostname`\
    \ 选项提供的主机名与 IP 地址匹配。Docker 在容器创建期间添加了此条目。它还会在容器每次启动时更新该文件，因此即使容器的地址发生变化，其 `/etc/hosts`\
    \ 文件也包含当前的 IP。主机名通常是唯一的、随机生成的容器名称；为 `docker run` 命令指定一个主机会覆盖该行为。\n\n```\n[oracle@dbhost1\
    \ ~]$ cat /etc/hosts\n127.0.0.1     localhost\n::1     localhost ip6-localhost\
    \ ip6-loopback\nfe00::0     ip6-localnet\nff00::0     ip6-mcastprefix\nff02::1\
    \     ip6-allnodes\nff02::2     ip6-allrouters\n172.17.0.2     dbhost1\n清单 9-5\n\
    ORCL1 容器上的 /etc/hosts 文件包含一个由 Docker 在容器创建期间为主机名创建的条目\n```\n\n容器上的 Linux `/etc/resolv.conf`\
    \ 文件控制 DNS 解析，与主机的文件匹配：\n\n```\n[oracle@dbhost1 ~]$ cat /etc/resolv.conf\n# This\
    \ file is managed by man:systemd-resolved(8). Do not edit.\n#\n# This is a dynamic\
    \ resolv.conf file for connecting local clients directly to\n# all known uplink\
    \ DNS servers. This file lists all configured search domains.\n#\n# Third-party\
    \ programs must not access this file directly, but only through the\n# symlink\
    \ at /etc/resolv.conf. To manage man:resolv.conf(5) in a different way,\n# replace\
    \ this symlink by a static file or a different symlink.\n#\n# See man:systemd-resolved.service(8)\
    \ for details about the supported modes of\n# operation for /etc/resolv.conf.\n\
    nameserver 192.168.1.1\nsearch Home\n```\n\n它们匹配，因为它们是同一个文件：\n\n```\n> md5sum\
    \ /etc/resolv.conf\nc5dd1676e12d6ca9f7c6d03c5ca9b258  /etc/resolv.conf\n> docker\
    \ exec -it ORCL1 bash -c \"md5sum /etc/resolv.conf\"\nc5dd1676e12d6ca9f7c6d03c5ca9b258\
    \  /etc/resolv.conf\n```\n\nDocker 将主机 DNS 配置作为容器覆盖网络中的一个层映射到容器中，使容器能够访问主机上存在的相同名称解析能力。\n\
    \n图 9-3 可视化了默认桥接网络上的网络连接，并为测试网络连接提供了一个起点。我们将在后面重新审视本节中的命令，以演示每种网络配置中的差异。\n\n![](img/514143_1_En_9_Fig3_HTML.png)\n\
    \n一幅展示通过默认 docker 桥接进行主机-网络通信的示意图。主机容器 O R C L 1 和 2 与 docker 桥接通信，而后者又与主机网络通信。\n\
    \n图 9-3\n默认桥接网络上两个容器 ORCL1 和 ORCL2 的接口和端点"
- fmt: '## Limitations of Default Bridge Networks


    Default and user-defined bridge networks both use Docker’s bridge network driver,
    and a default bridge network is a bridge network, right? Actually, no. The default
    bridge is a legacy feature of Docker, lacks capabilities found in user-defined
    bridges, and generally isn’t considered suitable for production use. To see how
    they’re different, connect to the `ORCL1` container and test connections to the
    database using the connection strings shown earlier. As a reminder, the connection
    strings for `dbhost1` are:


    ```

    system/oracle123@//dbhost1:1521/ORA1

    system/oracle123@//dbhost1/ORA1

    system/oracle123@//dbhost1:1521/PDB1

    system/oracle123@//dbhost1/PDB1

    ```


    For `dbhost2`:


    ```

    system/oracle123@//dbhost2:1521/ORA2

    system/oracle123@//dbhost2/ORA2

    system/oracle123@//dbhost2:1521/PDB2

    system/oracle123@//dbhost2/PDB2

    ```


    ### Local Connections Work


    When logged in to container `ORCL1`, connections to the local databases work as
    expected, using the hostname we assigned to the container (`dbhost1`) and the
    default listener port `1521`:


    ```

    SQL> conn system/oracle123@//dbhost1:1521/ORA1

    Connected.

    SQL> conn system/oracle123@//dbhost1/ORA1

    Connected.

    SQL> conn system/oracle123@//dbhost1:1521/PDB1

    Connected.

    SQL> conn system/oracle123@//dbhost1/PDB1

    Connected.

    ```


    Local connections using the container ID work, too. So far, so good:


    ```

    SQL> conn system/oracle123@//3a15e84cd484:1521/ORA1

    Connected.

    ```


    However, the container doesn’t recognize the container name, `ORCL1`:


    ```

    SQL> conn system/oracle123@//ORCL1:1521/ORA1

    ERROR:

    ORA-12154: TNS:could not resolve the connect identifier specified

    ```


    ### Remote Connections Fail


    Connections to the remote database on container `ORCL2`, however, do `not` work
    using either the default port or the mapped port:


    ```

    SQL> conn system/oracle123@//dbhost2:1521/ORA2

    ERROR:

    ORA-12154: TNS:could not resolve the connect identifier specified

    Warning: You are no longer connected to ORACLE.

    SQL> conn system/oracle123@//dbhost2:61521/ORA2

    ERROR:

    ORA-12154: TNS:could not resolve the connect identifier specified

    ```


    The reason? The container doesn’t know any host called `dbhost2`. Remember that
    the `/etc/hosts` file on `ORCL1` had only an entry for the local host, `dbhost1`.
    However, if I try connecting using the IP address of container `ORCL2`, it succeeds:


    ```

    SQL> conn system/oracle123@//172.17.0.3:1521/ORA2

    Connected.

    ```


    Why? The default bridge network lacks DNS. Containers on the network are accessible
    to each other, but only by IP address, not a hostname. We could add entries to
    `/etc/hosts` for each host, but remember the IP addresses Docker assigns aren’t
    guaranteed to work across restarts of the host or Docker resources. And, while
    Docker updates the `/etc/hosts` entry of the *local* host, it isn’t aware of custom
    entries.


    ## User-Defined Bridge Networks


    Let’s compare this behavior with a user-defined bridge network by creating a new
    network, using the `bridge` driver, attaching the two database containers, and
    testing connectivity.


    ### Create the Network


    Use the following command to create a new, user-defined bridge network named `database-bridge`:


    ```

    docker network create database-bridge --attachable --driver bridge

    ```


    The `--attachable` flag tells Docker we want the ability to manually attach containers
    to the network, while the `--driver` (or shorthand `-d`) option assigns the bridge
    driver. Once created, use the same `docker network ls` and `docker network inspect`
    commands to get information about the new network, as shown in Listing [9-6](#514143_1_En_9_Chapter.xhtml#PC27).
    The new network uses the same bridge driver as the default bridge, and Docker
    assigned a new, unique IP address range, `172.18.0.0/16`. The network doesn’t
    yet support any containers, and, compared to Listing [9-3](#514143_1_En_9_Chapter.xhtml#PC7),
    there is no host binding or bridge name.


    ```

    > docker network ls

    NETWORK ID     NAME              DRIVER    SCOPE

    0201c1b85336   bridge            bridge    local

    9dfba096bf9a   database-bridge   bridge    local

    8e74549be878   host              host      local

    d0ce1f7bd49f   none              null      local

    > docker network inspect database-bridge

    [

    {

    "Name": "database-bridge",

    "Id": "9dfba096bf9a740e...",

    "Scope": "local",

    "Driver": "bridge",

    "IPAM": {

    "Driver": "default",

    "Options": {},

    "Config": [

    {

    "Subnet": "172.18.0.0/16",

    "Gateway": "172.18.0.1"

    }

    ]

    },

    "Internal": false,

    "Attachable": true,

    "Ingress": false,

    "ConfigFrom": {

    "Network": ""

    },

    "ConfigOnly": false,

    "Containers": {},

    "Options": {},

    "Labels": {}

    }

    ]

    Listing 9-6

    The newly created `database-bridge` network operates on a unique IP address range
    but lacks the options present in the default bridge network

    ```


    A new bridge also appears in the output of `ip link show type bridge`:


    ```

    > ip link show type bridge

    4: docker0:  mtu 1500 qdisc noqueue state UP mode DEFAULT group default

    link/ether 02:42:eb:95:f6:aa brd ff:ff:ff:ff:ff:ff

    20: br-9dfba096bf9a:  mtu 1500 qdisc noqueue state UP mode DEFAULT group default

    link/ether 02:42:14:53:e0:c8 brd ff:ff:ff:ff:ff:ff

    ```


    However, no interfaces are present for the new network in `/sys/class/net/br-9dfba096bf9a/brif`:


    ```

    > ls /sys/class/net/br-9dfba096bf9a/brif

    ```'
