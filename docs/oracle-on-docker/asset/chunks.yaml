- fmt: '# 17. Conclusion


    In the first part of this book, you discovered how containers work and how to
    run an Oracle database in Docker. You learned methods for persisting vital database
    content—the datafiles and configuration—outside the confines of the container.
    You’re also fluent in container networking concepts and can connect client applications
    running on a host, like SQL Developer, to databases in containers. You can also
    leverage container networks to communicate among databases running containers.


    The second part covered images and the recipes for building them: Dockerfiles.
    You discovered how to customize the stock images provided in Oracle’s container
    repository and gained insights into techniques for extending Dockerfiles to suit
    your needs. Of course, not every image runs smoothly at first! Fortunately, we
    covered several methods and approaches for troubleshooting images and containers.
    Once everything runs smoothly, you learned how to add and manage images in repositories.


    My introduction to running Oracle databases in containers wasn’t positive. I was
    convinced it was a fool’s errand and destined for miserable failure. In the years
    since, I’ve seen the power and potential of containers firsthand. They’re an integral,
    indispensable part of my daily work. In this book, I’ve attempted to capture my
    appreciation of the technology behind Linux containers and share with you the
    things I wish I’d known earlier in my Docker experience. I sincerely hope you
    find it helpful and that it inspires you to begin or further your journey with
    Docker!


    # Part III Appendixes


    # Installing Docker Desktop


    ## Install Docker Desktop


    Docker Desktop is available as a free download from [`www.docker.com`](http://www.docker.com).
    Linux users can install Docker Desktop or Docker Engine, a native environment
    for running Docker containers.


    ### Windows 10 and 11


    Behind the scenes, Docker Desktop on Windows runs Linux in a Hyper-V virtual machine.
    Earlier versions of Docker Desktop were notorious for conflicts between Hyper-V
    and VirtualBox, and performance often left something to be desired.


    `Windows Subsystem for Linux version 2`, or `WSL 2`,^([^(91)](#fn91)) available
    on Windows 10, marked a significant improvement for Docker Desktop on Windows.
    Docker Desktop under WSL 2 boasts improved system resource management, better
    performance, and more robust integration with the host operating system.


    WSL provides a fully functional Linux experience inside the Windows operating
    system. The command examples used throughout this book work identically in the
    WSL environment, as in Linux or Mac systems.


    #### Set Up Windows Subsystem for Linux


    Set up the Windows Subsystem for Linux according to Microsoft’s instructions at
    [`https://docs.microsoft.com/en-us/windows/wsl/install`](https://docs.microsoft.com/en-us/windows/wsl/install).
    On my system (Windows 10), I opened a PowerShell session as an administrator,
    then ran `wsl --install`, as in Figure [A-1](#514143_1_En_18_Chapter.xhtml#Fig1).
    This performs a default installation of WSL and installs Ubuntu Linux. After the
    command completes, reboot the machine.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig1_HTML.jpg)


    A screenshot of an administrator - windows powershell tab includes commands to
    install W S L 2.


    Figure A-1


    Install WSL 2 from a PowerShell session running as an administrator


    By default, WSL downloads Ubuntu Linux and requires a restart, as shown in Figure
    [A-2](#514143_1_En_18_Chapter.xhtml#Fig2). Reboot the machine to finish setting
    up WSL and begin the Linux installation.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig2_HTML.jpg)


    A screenshot of an administrator - windows powershell tab displays the tab with
    information after the installation of W S L 2.


    Figure A-2


    After WSL finishes installing, reboot the machine


    #### Configure and Update Linux


    After the machine reboots, WSL installs the Linux distribution. This takes a few
    minutes. When the installation completes, you’ll need to create a Linux user,
    as seen in Figure [A-3](#514143_1_En_18_Chapter.xhtml#Fig3). I used `docker` as
    the user on my system.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig3_HTML.jpg)


    A screenshot of a tab appears after the completion of installation. After installation,
    the user has to create a linux user.


    Figure A-3


    After installation finishes, create a user to use in the Linux subsystem


    Be sure to update your Linux distribution. For Ubuntu systems, run the following
    command in the terminal window:


    ```

    sudo apt update && sudo apt upgrade

    ```


    Now is also an excellent time to install Windows Terminal from the Windows Store.
    For details on installing Windows Terminal, see the section “Terminal Environments.”


    #### Install Docker Desktop


    When WSL setup completes, refer to Docker’s installation guide at [`https://docs.microsoft.com/en-us/windows/wsl/install-manual`](https://docs.microsoft.com/en-us/windows/wsl/install-manual)
    and follow the latest instructions, completing all prerequisites, then download
    and install Docker Desktop from [`www.docker.com`](http://www.docker.com).


    Double-click the installation files to open the installation wizard. Be sure the
    box for “`Use WSL 2 instead of Hyper-V (recommended)`” is marked, as in Figure
    [A-4](#514143_1_En_18_Chapter.xhtml#Fig4).


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig4_HTML.jpg)


    A screenshot of a Installing docker desktop tab displays the marks in the boxes
    for Use W S L 2 instead of Hyper-V, recommended, and add shortcut to desktop.


    Figure A-4


    In the Docker Desktop install wizard, mark the option to “Use WSL 2 instead of
    Hyper-V”


    Navigate to the Start menu and select Docker Desktop from the list of applications.
    After accepting the license agreement, Docker Desktop starts and opens a brief
    tutorial.


    #### Configure Docker Desktop


    Click the gear icon at the upper right to access the Settings menu to access the
    General settings shown in Figure [A-5](#514143_1_En_18_Chapter.xhtml#Fig5). Ensure
    the “Use the WSL 2 based engine” box is checked.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig5_HTML.jpg)


    A screenshot of docker desktop''s general settings panel highlights the Use W
    S L 2 instead of Hyper-V (recommended) option in the general settings.


    Figure A-5


    Under Docker Desktop’s General settings panel, check the “Use the WSL 2 based
    engine” option


    Next, click the Resources option and select WSL Integration. Confirm that “Enable
    integration with my default WSL distro” is enabled as in Figure [A-6](#514143_1_En_18_Chapter.xhtml#Fig6).
    Set the slider “on” for the distributions you’ll use with Docker that appear under
    the “Enable integration with additional distros” section. If the “Apply & Restart”
    button at the lower right is highlighted, click it to commit your changes.


    ![](images/514143_1_En_18_Chapter/514143_1_En_18_Fig6_HTML.jpg)


    A screenshot of docker desktop''s settings panel displays the marked box for enable
    integration with my default W S L distro option in Resources settings.


    Figure A-6


    Confirm WSL integration is turned on for the default distribution, and it’s enabled
    for any other distributions that need Docker Desktop integration'
