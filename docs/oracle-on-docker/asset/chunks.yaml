    # 8. Basic Networking


    In the early days of Unix, compute resources were expensive. Getting the most
    from these costly systems meant finding ways to support many simultaneous connections.
    Users from different companies and those working with sensitive information needed
    assurance their processes and data were safe. This was a driver behind the Unix
    Time Sharing System, or UTS, and provides session isolation and security, the
    foundation of modern container implementations.


    Insulating and securing containers is the backbone of modern high-density infrastructure.
    Service-based and cloud-native computing concentrates the work of dozens or hundreds
    of individual systems onto individual servers. Each remains unaware they’re sharing
    resources. But what happens when you *want* containers to interact? Enterprises
    aren’t solitary systems cut off from the world, so there must be a mechanism for
    describing and managing access.


    Container networking builds on “normal” networking concepts. The container boundary—where
    packets cross from inside to outside the container—is a network interface. It
    follows the same rules, and we can use the same techniques to control and manipulate
    traffic. Virtual networks handle communication between a container and its host,
    other local containers, and remote resources (including containers on different
    machines) in container environments. You’ll see that creating network resources
    is very similar to what you learned about defining volumes in the last chapter.
    There’s a quick, easy, but limited way of doing things or a more involved method
    that offers greater flexibility.


    If you’re running a few database containers on a local system and only plan to
    connect with command-line or database clients like `SQL Developer`, the quick
    and easy way is probably all you need. Orchestrations and shared environments
    benefit from more structured approaches, which deliver more advanced networking
    capabilities like DNS. The extra effort spent planning network topologies of more
    complex, multicontainer projects (think RAC, GoldenGate, and Data Guard) is well
    worth the convenience and time savings once they’re in use.


    With that in mind, this chapter covers the quick, easy method—*port publishing*—and
    demonstrates how to connect clients to a container database. The next chapter
    digs into the more formal subject of *container networks* and their advantages,
    some practical examples for creating and managing different network resources,
    and adding containers to networks.


    ## Port Publishing


    *Port publishing* is the simplest way of establishing communication with containers.
    It’s perfectly suitable for local desktop systems but lacks container networks’
    scalability, flexibility, and controls. However, if all you want is to connect
    to an Oracle database on your desktop or laptop with a client like `SQL Developer`,
    the extra time and effort of creating a dedicated network are academic. Port publishing
    is all you need.


    For Oracle databases, we’re usually interested in port 1521, the default for `SQL*Net`
    traffic to and from the database listener. I’ll use port 1521 as an example while
    introducing port mapping (and container networking) in the following examples.


    Port publishing binds a port on the local host to a port on the container. For
    a container running an Oracle database, traffic to and from the container’s port
    1521 is redirected to a port on the host and vice versa. I’ll use port 51521 as
    the host port (for reasons I’ll get to shortly). So, packets leaving the container
    on port 1521 are mapped and visible at port 51521 on the host. Anything we want
    to connect to the listener inside the container should go to the host’s port 51521,
    as shown in Figure [8-1](#514143_1_En_8_Chapter.xhtml#Fig1).


    ![](images/514143_1_En_8_Chapter/514143_1_En_8_Fig1_HTML.jpg)


    A model diagram for the container host has container O R C L, container network
    interface, port 1521, host network interface, and port 51521.


    Figure 8-1


    Traffic from port 1521 in the container is redirected over port 51521 on the host’s
    network interface


    The `docker run` command’s `-p` (long-form `--publish`) option defines mappings.
    The syntax, shown in Listing [8-1](#514143_1_En_8_Chapter.xhtml#PC1), follows
    the same pattern as mapping volumes in the previous chapter:


    *   The local resource first


    *   Then the container resource, separated by a colon


    ```bash

    docker run --name <container_name> \

    -p <host_port>:<container_port> \

    ...


    docker run --name <container_name> \

    --publish <host_port>:<container_port> \

    ...

    ```


    **Listing 8-1**

    The `docker run` syntax for publishing ports with the `-p` and `--publish` flags


    Just as you map multiple volumes by using more than one `-v` flag, create multiple
    port mappings with separate `-p` (or `--publish`) declarations:


    ```bash

    docker run --name <container_name> \

    -p <host_port1>:<container_port1> \

    -p <host_port2>:<container_port2> \

    ...

    ```


    Here, I’m mapping port 51521 on the host to port 1521 in the container while creating
    a new Oracle 19c database:


    ```bash

    docker run --name ORCL \

    -p 51521:1521 \

    ...

    oracle/database:19.3.0-ee

    ```


    When the traffic is local—where the client and container are both on the same
    host—the port is all that’s necessary. There’s no need for hostnames (or anything
    other than `localhost` or its equivalent). The container “sees” incoming traffic
    arrive at port 1521. Clients typically connecting to the database on port 1521
    will use port 51521 on `localhost` instead.'
  raw: '#### Mounting Method


    With regular bind mounts, the `--volume` and `--mount` options treated nonexistent
    directories differently. Because the directories used by bind-mounted volumes
    must be precreated, the `--volume` and `--mount` options are both valid.


    Despite the additional effort needed to create the volume and source directory
    before running containers, bind-mounted volumes are the best option for databases.
    Data on the volumes are accessible from the OS, and we can back up the data using
    either operating system commands or Docker’s volume management tools. We see consistent
    behavior and operation across platforms and don’t need to worry about setting
    permissions or ownership!


    ## Summary


    Understanding storage is arguably among the most important concepts when implementing
    database infrastructure in containers. In this chapter, you discovered the advantages
    and limitations of container union filesystems and how externally mounted storage
    extends capabilities and improves containers’ performance.


    You learned the differences between bind mounts and volumes. You now understand
    the multiple meanings of *volume* in Docker circles, as a target directory in
    an image, an object for storing data, and how it’s inaccurately used to reference
    any storage attached to a container. Finally, you recognize the differences and
    benefits of different storage methods and know how to create volumes and mount
    storage to new containers.


    Exploring container storage offered a glimpse into how well-planned images lead
    to highly modular, efficient, and portable implementations. In the next chapter,
    you’ll learn how to set up communication between hosts and containers. It’s the
    second half of the puzzle, joining host resources to containers.


