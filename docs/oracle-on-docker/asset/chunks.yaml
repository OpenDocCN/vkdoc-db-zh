- fmt: '# Configuration Files


    Navigating further into the `ORACLE_BASE/oradata` directory, you’ll notice two
    subdirectories, `ORCLCDB` and `dbconfig`:


    ```

    [oracle@8facfd649aa4 oradata]$ pwd

    /opt/oracle/oradata

    [oracle@8facfd649aa4 oradata]$ ls -l

    total 8

    drwxr-x--- 4 oracle oinstall 4096 Mar  6 22:15 ORCLCDB

    drwxr-xr-x 3 oracle oinstall 4096 Mar  6 23:33 dbconfig

    ```


    The `ORCLCDB` directory here is expected. It’s part of the *Optimal Flexible Architecture*,^([^(32)](#fn32))
    or *OFA*, and forms the root directory containing the *control*, *data*, and *redo
    log* files belonging to the `ORCLCDB` database instance running on the host.


    In Listing [5-11](#514143_1_En_5_Chapter.xhtml#PC23), I listed the contents of
    the `ORCLCDB` subdirectory. As anticipated, there are database files and subdirectories
    for the pluggable database `ORCLPDB1` and PDB seed files. This is consistent with
    Oracle database installations in non-container environments.


    ```

    [oracle@8facfd649aa4 oradata]$ ls -l ORCLCDB

    total 2341684

    drwxr-x--- 2 oracle oinstall      4096 Mar  6 23:32 ORCLPDB1

    -rw-r----- 1 oracle oinstall  18726912 Mar  7 01:44 control01.ctl

    -rw-r----- 1 oracle oinstall  18726912 Mar  7 01:44 control02.ctl

    drwxr-x--- 2 oracle oinstall      4096 Mar  6 22:37 pdbseed

    -rw-r----- 1 oracle oinstall 209715712 Mar  7 00:38 redo01.log

    -rw-r----- 1 oracle oinstall 209715712 Mar  7 01:44 redo02.log

    -rw-r----- 1 oracle oinstall 209715712 Mar  6 23:32 redo03.log

    -rw-r----- 1 oracle oinstall 545267712 Mar  7 01:41 sysaux01.dbf

    -rw-r----- 1 oracle oinstall 933240832 Mar  7 01:41 system01.dbf

    -rw-r----- 1 oracle oinstall  33562624 Mar  6 22:44 temp01.dbf

    -rw-r----- 1 oracle oinstall 246423552 Mar  7 01:43 undotbs01.dbf

    -rw-r----- 1 oracle oinstall   5251072 Mar  7 00:43 users01.dbf

    ```

    *Listing 5-11*

    Contents of `$ORACLE_BASE/oradata/$ORACLE_SID` in a container


    The *dbconfig* directory, however, is unexpected. Listing [5-12](#514143_1_En_5_Chapter.xhtml#PC24)
    shows the contents of the `dbconfig` directory. There’s a subdirectory for the
    `ORACLE_SID` and, beneath that, some unexpected files!


    ```

    [oracle@8facfd649aa4 oradata]$ ls -l dbconfig

    total 4

    drwxr-xr-x 2 oracle oinstall 4096 Mar  6 23:33 ORCLCDB

    [oracle@8facfd649aa4 oradata]$ ls -l dbconfig/ORCLCDB

    total 24

    -rw-r--r-- 1 oracle oinstall  234 Mar  6 22:04 listener.ora

    -rw-r----- 1 oracle oinstall 2048 Mar  6 22:15 orapwORCLCDB

    -rw-r--r-- 1 oracle oinstall  784 Mar  6 23:33 oratab

    -rw-r----- 1 oracle oinstall 3584 Mar  6 23:33 spfileORCLCDB.ora

    -rw-r--r-- 1 oracle oinstall   53 Mar  6 22:04 sqlnet.ora

    -rw-r----- 1 oracle oinstall  211 Mar  6 23:33 tnsnames.ora

    ```

    *Listing 5-12*

    Contents of `$ORACLE_BASE/oradata/dbconfig/$ORACLE_SID`


    These configuration files are customarily saved under the `ORACLE_HOME` or `/etc`.
    What are they doing here?


    To answer that, look first at the default location for the three networking files—`listener.ora`,
    `sqlnet.ora`, and `tnsnames.ora`—the `ORACLE_HOME/network/admin` directory, in
    Listing [5-13](#514143_1_En_5_Chapter.xhtml#PC25). These network configuration
    files *link* to the files in `ORACLE_BASE/oradata/dbconfig/ORCLCDB`!


    ```

    [oracle@8facfd649aa4 oradata]$ ls -l $ORACLE_HOME/network/admin

    total 8

    lrwxrwxrwx 1 oracle oinstall   49 Mar  6 23:33 listener.ora -> /opt/oracle/oradata/dbconfig/ORCLCDB/listener.ora

    drwxr-xr-x 2 oracle dba      4096 Apr 17  2019 samples

    -rw-r--r-- 1 oracle dba      1536 Feb 14  2018 shrept.lst

    lrwxrwxrwx 1 oracle oinstall   47 Mar  6 23:33 sqlnet.ora -> /opt/oracle/oradata/dbconfig/ORCLCDB/sqlnet.ora

    lrwxrwxrwx 1 oracle oinstall   49 Mar  6 23:33 tnsnames.ora -> /opt/oracle/oradata/dbconfig/ORCLCDB/tnsnames.ora

    ```

    *Listing 5-13*

    Contents of `$ORACLE_HOME/network/admin` in a container. The listener, SQL*Net,
    and TNS configurations link to the files under the dbconfig directory


    Listing [5-14](#514143_1_En_5_Chapter.xhtml#PC26) shows the *password file* (`orapwORCLCDB`)
    and *server parameter file*, or *spfile* (`spfileORCLCDB.ora`) in their “proper”
    location, `ORACLE_HOME/dbs`, are also linked to `ORACLE_BASE/oradata/dbconfig/ORCLCDB`!


    ```

    [oracle@8facfd649aa4 oradata]$ ls -l $ORACLE_HOME/dbs

    total 12

    -rw-rw---- 1 oracle oinstall 1544 Mar  6 23:32 hc_ORCLCDB.dat

    -rw-r--r-- 1 oracle dba      3079 May 14  2015 init.ora

    -rw-r----- 1 oracle oinstall   24 Mar  6 22:10 lkORCLCDB

    lrwxrwxrwx 1 oracle oinstall   49 Mar  6 23:33 orapwORCLCDB -> /opt/oracle/oradata/dbconfig/ORCLCDB/orapwORCLCDB

    lrwxrwxrwx 1 oracle oinstall   54 Mar  6 23:33 spfileORCLCDB.ora -> /opt/oracle/oradata/dbconfig/ORCLCDB/spfileORCLCDB.ora

    ```

    *Listing 5-14*

    Database configuration files in `$ORACLE_HOME/dbs` link to their counterparts
    in dbconfig


    Finally, in Listing [5-15](#514143_1_En_5_Chapter.xhtml#PC27), we see the `oratab`
    file, `/etc/oratab`, is not linked but identical to the mysterious file in the
    special `dbconfig` directory.


    ```

    [oracle@8facfd649aa4 oradata]$ ls -l /etc/oratab

    -rw-rw-r-- 1 oracle oinstall 784 Mar  6 23:33 /etc/oratab

    [oracle@8facfd649aa4 oradata]$ md5sum /etc/oratab

    31f3633542a9883ebd7f0eaac771ec7b  /etc/oratab

    [oracle@8facfd649aa4 oradata]$ md5sum $ORACLE_BASE/oradata/dbconfig/ORCLCDB/oratab

    31f3633542a9883ebd7f0eaac771ec7b  /opt/oracle/oradata/dbconfig/ORCLCDB/oratab

    ```

    *Listing 5-15*

    The `/etc/oratab` and `/opt/oracle/oradata/dbconfig/ORCLCDB/oratab` files are
    identical


    What’s the explanation for this? Layers and volumes.'
