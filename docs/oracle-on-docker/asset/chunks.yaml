- fmt: "### Entrypoint Directories\n\n镜像定义了`startup commands`，类似于物理或虚拟主机上的启动或初始化过程。启动命令在创建和启动容器时运行，指导它们执行预定义的工作。（如果需要回顾，请查阅第5章和第6章中关于Oracle数据库镜像启动过程的描述。）当Oracle数据库容器启动时，它会调用一个脚本来发现数据库是否存在。如果找到了数据库，它就启动监听器和数据库。如果没有，它就创建一个新数据库。\n\
    \n一个`entrypoint directory`（不要与第12章讨论的`container entrypoints`混淆）是一种特殊类型的空目录。启动命令扫描该目录以查找额外的脚本，并以编程方式处理它们。目录的位置以及启动命令如何评估其内容完全取决于启动命令或脚本本身。\n\
    \n我们使用的Oracle数据库镜像中的启动脚本会在`/docker-entrypoint-initdb.d`^([^(57)](#fn57))或`/opt/oracle/scripts`中查找这些脚本，它期望在那里找到两个子目录：`setup`和`startup`。它在初始数据库创建之后运行`setup`目录中的shell（`.sh`）和SQL（`.sql`）脚本；在每次容器启动时（包括数据库创建之后）运行`startup`目录中的脚本。\n\
    \n将一个卷或本地目录挂载到入口点目录，并用自定义脚本填充它，可以实现对容器数据库的更大控制。然而，需要提醒一点：由于此目录存在于容器之外，对其内容的更改会影响未来的启动，可能导致意想不到的结果。\n\
    \n清单7-5展示了如何将本地目录挂载到入口点目录。它使用了一个包含现有`setup`和`startup`子目录的单一路径。当Docker将此目录挂载到容器时，这些目录与启动脚本期望的目录相匹配。\n\
    \n```\ndocker run ... \\\n--mount type=bind,source=$HOME/dbscripts,target=/docker-entrypoint-initdb.d\
    \ \\\n...\n```\n**清单 7-5** 将入口点目录挂载到Oracle数据库容器\n\n清单7-6中的示例将两个独立的目录（一个用于setup，另一个用于startup）分别挂载到它们各自的目标位置。\n\
    \n```\ndocker run ... \\\n--mount type=bind,source=$HOME/dbstartup,target=/opt/oracle/scripts/startup\
    \ \\\n--mount type=bind,source=$HOME/dbsetup,target=/opt/oracle/scripts/setup\
    \ \\\n...\n```\n**清单 7-6** 将独立的startup和setup入口点挂载到容器\n\n当这些目录中存在多个脚本时，Oracle建议添加数字前缀以确保执行顺序，例如：\n\
    ```\n01_first_step.sql\n02_second_step.sh\n03_last_step.sql\n```\n\n### Manage\
    \ Space\n\n要查看系统上哪些Docker对象占用了空间，请运行`docker system df`命令：\n```\n> docker system\
    \ df\nTYPE           TOTAL  ACTIVE  SIZE     RECLAIMABLE\nImages         29  \
    \   2       157.3GB  143.7GB (91%)\nContainers     2      2       540.6MB  0B\
    \ (0%)\nLocal Volumes  8      0       15.42GB  15.42GB (100%)\nBuild Cache   \
    \ 138    0       41.05MB  41.05MB\n```\n\n该输出报告了在Docker的私有目录`/var/lib/docker`中占用空间的对象类型摘要。`Images`就是字面意思——在此系统上构建或下载的镜像。`Containers`行显示了容器`upper\
    \ layers`所使用的空间。最后一行`Build Cache`列出了由构建活动缓存的内容大小。\n\n第三行报告了八个`Local Volumes`，占用了15GB的空间。没有一个是活动的。请记住，本地卷是那些创建时`没有`指定驱动程序，并将数据保存在Docker的私有目录`/var/lib/docker`中的卷。这`不`包括与系统上的绑定挂载相关联的卷，这些卷是通过`--opt\
    \ o=bind`或类似选项创建的。\n\n### Prune Volumes\n\n很容易将`local volumes`与`use a local driver`的卷混淆，正如`docker\
    \ volume ls`的输出所示：\n```\n> docker volume ls\nDRIVER  VOLUME NAME\nlocal   2ac7d7486083a10a4ed313699e06eba017e63ba\n\
    local   4efabdab067033c973d00e73de9a05121e0cb70\nlocal   9fc0fdc81eabd71a07f28a8d79fd2c1a5606747\n\
    local   84c91dc6a3f0cb354243cb9ee2ca5a79933ca67\nlocal   ORA216_data\nlocal  \
    \ ORA216_diag\nlocal   ORA216_audit\nlocal   ORA1915_data\nlocal   ORA1915_diag\n\
    local   ORA1915_audit\nlocal   oradata_ORCL1_data\nlocal   oradata_ORCL1_diag\n\
    local   oradata_ORCL1_audit\nlocal   b26d713b83be8ac8f549f825d19cc2b6e6f19a6\n\
    ```\n\n所有卷都使用`local`驱动程序。以“`ORA`”开头的六个卷被绑定挂载到主机上的目录。我可以通过检查卷并查找设备的存在来确认这一点。`ORA216_data`卷的输出在`Options`部分显示了设备：\n\
    ```\n> docker volume inspect ORA216_data\n[\n    {\n        \"Driver\": \"local\"\
    ,\n        \"Mountpoint\": \"/var/lib/docker/volumes/ORA216_data/_data\",\n  \
    \      \"Name\": \"ORA216_data\",\n        \"Options\": {\n            \"device\"\
    : \"/oradata/ORA216_data\",\n            \"o\": \"bind\",\n            \"type\"\
    : \"none\"\n        },\n        \"Scope\": \"local\"\n    }\n]\n```\n\n`oradata_ORCL1_data`卷的`Options`部分是空的：\n\
    ```\n> docker volume inspect oradata_ORCL1_data\n[\n    {\n        \"Driver\"\
    : \"local\",\n        \"Mountpoint\": \"/var/lib/docker/volumes/oradata_ORCL1_data/_data\"\
    ,\n        \"Name\": \"oradata_ORCL1_data\",\n        \"Options\": {},\n     \
    \   \"Scope\": \"local\"\n    }\n]\n```\n\n根据“`ACTIVE`”列下的零值，我知道这八个本地卷都是孤儿卷。由于它们未被任何容器使用，可以安全地使用`docker\
    \ volume prune`命令删除它们：\n```\n> docker volume prune\nWARNING! This will remove\
    \ all local volumes not used by at least one container.\nAre you sure you want\
    \ to continue? [y/N] y\nDeleted Volumes:\n84c91dc6a3f0cb354243cb9ee2ca5a79933ca67\n\
    oradata_ORCL1_data\noradata_ORCL1_diag\n4efabdab067033c973d00e73de9a05121e0cb70\n\
    9fc0fdc81eabd71a07f28a8d79fd2c1a5606747\noradata_ORCL1_audit\nb26d713b83be8ac8f549f825d19cc2b6e6f19a6\n\
    2ac7d7486083a10a4ed313699e06eba017e63ba\n```\n\n知道Docker不会删除由容器（无论是运行中还是已停止）使用的卷，这很让人安心！\n\
    \n运行prune命令后，我第二次检查了空间使用情况：\n```\n> docker system df\nTYPE           TOTAL  ACTIVE\
    \  SIZE     RECLAIMABLE\nImages         29     2       157.3GB  143.7GB (91%)\n\
    Containers     2      2       540.6MB  0B (0%)\nLocal Volumes  0      0      \
    \ 0B       0B\nBuild Cache    138    0       41.05MB  41.05MB\n```\n\nDocker删除了非活动卷并回收了空间。`docker\
    \ volume ls`确认prune操作没有影响到主机上的绑定挂载卷：\n```\n> docker volume ls\nDRIVER  VOLUME\
    \ NAME\nlocal   ORA216_data\nlocal   ORA216_diag\nlocal   ORA216_audit\nlocal\
    \   ORA1915_data\nlocal   ORA1915_diag\nlocal   ORA1915_audit\n```"
  raw: '### Entrypoint Directories


    Images define *startup commands*, similar to the boot or initialization processes
    on physical or virtual hosts. Startup commands run when creating and starting
    containers, directing them to perform predefined work. (Review the Oracle database
    image startup procedures in Chapters [5](#514143_1_En_5_Chapter.xhtml) and [6](#514143_1_En_6_Chapter.xhtml)
    if you need a refresher.) When an Oracle database container starts, it calls a
    script to discover whether a database exists. If it finds one, it starts the listener
    and database. If not, it creates a new database.


    An *entrypoint directory* (not to be confused with *container entrypoints*, discussed
    in Chapter [12](#514143_1_En_12_Chapter.xhtml)) is a special type of empty directory.
    The startup command scans the directory for additional scripts and processes them
    programmatically. The directory location and how startup evaluates the contents
    are purely dependent on the startup command or script.


    The startup script in the Oracle database images we’re using looks for these scripts
    in either `/docker-entrypoint-initdb.d`^([^(57)](#fn57)) or `/opt/oracle/scripts`,
    where it expects to find two subdirectories, `setup` and `startup`. It runs shell
    (`.sh`) and SQL (`.sql`) scripts in the `setup` directory after initial database
    creation; those in the `startup` directory every time the container starts, including
    after database creation.


    Mounting a volume or local directory to the entrypoint directory, and populating
    it with custom scripts, allows greater control of container databases. A caution
    is in order, however. Since this directory exists outside the container, changes
    to its contents affect future startups, potentially leading to unexpected results.


    Listing [7-5](#514143_1_En_7_Chapter.xhtml#PC12) shows how to mount a local directory
    to the entrypoint directory. It uses a single path that has existing `setup` and
    `startup` subdirectories. When Docker mounts this directory to the container,
    these directories match those expected by the startup script.


    ```

    docker run ... \

    --mount type=bind,source=$HOME/dbscripts,target=/docker-entrypoint-initdb.d \

    ...

    Listing 7-5

    Mounting an entrypoint directory to an Oracle database container

    ```


    The example in Listing [7-6](#514143_1_En_7_Chapter.xhtml#PC13) mounts two separate
    directories, one for setup and another for startup, to their respective targets.


    ```

    docker run ... \

    --mount type=bind,source=$HOME/dbstartup,target=/opt/oracle/scripts/startup \

    --mount type=bind,source=$HOME/dbsetup,target=/opt/oracle/scripts/setup \

    ...

    Listing 7-6

    Mounting separate startup and setup entrypoints to a container

    ```


    When multiple scripts exist in these directories, Oracle recommends adding a numerical
    prefix to ensure the order of execution, for example:


    ```

    01_first_step.sql

    02_second_step.sh

    03_last_step.sql

    ```


    ## Manage Space


    To see what Docker objects use space on a system, run the `docker system df` command:


    ```

    > docker system df

    TYPE           TOTAL  ACTIVE  SIZE     RECLAIMABLE

    Images         29     2       157.3GB  143.7GB (91%)

    Containers     2      2       540.6MB  0B (0%)

    Local Volumes  8      0       15.42GB  15.42GB (100%)

    Build Cache    138    0       41.05MB  41.05MB

    ```


    The output reports a summary of the object types using space in Docker’s private,
    `/var/lib/docker` directory. *Images* are just that—images built or downloaded
    on this system. The *Containers* line displays the space used by the container’s
    *upper layers*. The last line, *Build Cache*, lists the size of content cached
    by build activity.


    The third line reports eight *Local Volumes* that take up 15GB of space. None
    are active. Remember that local volumes are those created *without* drivers and
    save data in Docker’s private, `/var/lib/docker` directory. This does *not* include
    volumes associated to bind mounts on the system, created with an `--opt o=bind`
    or similar option.


    ### Prune Volumes


    It’s easy to confuse *local volumes* with volumes that *use a local driver*, as
    shown in the output of `docker volume` `ls`:


    ```

    > docker volume ls

    DRIVER  VOLUME NAME

    local   2ac7d7486083a10a4ed313699e06eba017e63ba

    local   4efabdab067033c973d00e73de9a05121e0cb70

    local   9fc0fdc81eabd71a07f28a8d79fd2c1a5606747

    local   84c91dc6a3f0cb354243cb9ee2ca5a79933ca67

    local   ORA216_data

    local   ORA216_diag

    local   ORA216_audit

    local   ORA1915_data

    local   ORA1915_diag

    local   ORA1915_audit

    local   oradata_ORCL1_data

    local   oradata_ORCL1_diag

    local   oradata_ORCL1_audit

    local   b26d713b83be8ac8f549f825d19cc2b6e6f19a6

    ```


    All the volumes use a local driver. The six beginning with “`ORA`” are bind-mounted
    to directories on the host. I can confirm this by inspecting the volumes and looking
    for the presence of a device. The output for the `ORA216_data` volume shows the
    device in the `Options` section:


    ```

    > docker volume inspect ORA216_data

    [

    {

    "Driver": "local",

    "Mountpoint": "/var/lib/docker/volumes/ORA216_data /_data",

    "Name": "ORA216_data",

    "Options": {

    "device": "/oradata/ORA216_data",

    "o": "bind",

    "type": "none"

    },

    "Scope": "local"

    }

    ]

    ```


    The `Options` section from the `oradata_ORCL1_data` volume is empty:


    ```

    > docker volume inspect oradata_ORCL1_data

    [

    {

    "Driver": "local",

    "Mountpoint": "/var/lib/docker/volumes/oradata_ORCL1_data/_data",

    "Name": "oradata_ORCL1_data",

    "Options": {},

    "Scope": "local"

    }

    ]

    ~

    ```


    I know that all eight local volumes are orphaned based on the zero under the “`ACTIVE`”
    column. Since they’re unused by any containers, it’s safe to remove them using
    the `docker volume prune` command:


    ```

    > docker volume prune

    WARNING! This will remove all local volumes not used by at least one container.

    Are you sure you want to continue? [y/N] y

    Deleted Volumes:

    84c91dc6a3f0cb354243cb9ee2ca5a79933ca67

    oradata_ORCL1_data

    oradata_ORCL1_diag

    4efabdab067033c973d00e73de9a05121e0cb70

    9fc0fdc81eabd71a07f28a8d79fd2c1a5606747

    oradata_ORCL1_audit

    b26d713b83be8ac8f549f825d19cc2b6e6f19a6

    2ac7d7486083a10a4ed313699e06eba017e63ba

    ```


    It’s reassuring knowing Docker won’t remove volumes used by containers (whether
    running or stopped)!


    After running the prune command, I checked the space use a second time:


    ```

    > docker system df

    TYPE           TOTAL  ACTIVE  SIZE     RECLAIMABLE

    Images         29     2       157.3GB  143.7GB (91%)

    Containers     2      2       540.6MB  0B (0%)

    Local Volumes  0      0       0B       0B

    Build Cache    138    0       41.05MB  41.05MB

    ```


    Docker removed the inactive volumes and reclaimed the space. `docker volume ls`
    confirms the prune didn’t affect the bind-mounted volumes on the host:


    ```

    > docker volume ls

    DRIVER  VOLUME NAME

    local   ORA216_data

    local   ORA216_diag

    local   ORA216_audit

    local   ORA1915_data

    local   ORA1915_diag

    local   ORA1915_audit

    ```'
