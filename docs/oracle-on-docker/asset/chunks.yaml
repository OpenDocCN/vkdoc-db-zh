  trans: '## 持久性


    多年来，我在讲授 Oracle 和 Docker 相关知识时，遇到最经久不衰（或者说最顽固，这里双关！）的误解是 `容器不持久化数据` 和 `不能可靠地保存其内容`——尤其是在重启之后。让我们来测试一下！在提示符处输入
    `exit` 来退出你的 Ubuntu 容器，就像你登录或通过 SSH 连接到主机后执行退出操作一样。


    ### 检查容器状态


    我们使用 `docker run` 命令和 `-it` 选项启动了容器。这创建了一个*交互式*容器，其状态与会话绑定。退出容器会停止它。我们可以使用 `docker
    ps` 命令查看系统上存在的容器及其状态。一开始，`ps` 可能看起来不那么直观，但 Unix 和 Linux 用户应该能认出这是一个用于报告系统上运行进程的命令。


    回想一下，容器只是进程，这就说得通了。在你的 Shell 中输入 `docker ps -a` 并检查结果：


    ```

    > docker ps -a

    CONTAINER ID IMAGE   COMMAND CREATED     STATUS                   PORTS        NAMES

    4a9ddd43e0e2 ubuntu  "bash"  2 hours ago Exited (0) 17 seconds ago       fervent_mendeleev

    ```


    `-a` 标志是 `--all` 的简写，显示系统上所有进程（或容器），无论其处于活动还是停止状态。如果不使用此选项，`docker ps` 只报告正在运行的容器。输出中还需要注意其他几点：


    *   `CONTAINER ID` 是一个随机字符串，与我们在容器 Shell 提示符中看到的主机名相匹配。

    *   `COMMAND`，即 `bash`，是容器启动时我们使用的 Shell。容器的默认命令在其 *Dockerfile* 中定义，并在第 12 和 13
    章中介绍。

    *   `STATUS` 显示容器正常退出，错误代码为 0。（从技术上讲，任何非 0 的代码都表示异常，尽管并非总是严重问题。）

    *   随机生成的 `NAME`，旨在对用户友好，是可自定义的。我稍后会介绍这一点。


    要确认容器已停止，运行不带 `-a` 选项的 `docker ps`，只查看活动容器。


    ### 启动容器


    要启动容器，请输入 `docker start`，后跟系统中的 `NAME` 或 `CONTAINER ID`，然后通过重复 `docker ps -a`
    命令检查状态：


    ```

    > docker start fervent_mendeleev

    fervent_mendeleev

    > docker ps -a

    CONTAINER ID   IMAGE   COMMAND  CREATED      STATUS              PORTS          NAMES

    4a9ddd43e0e2   ubuntu  "bash"   2 hours ago  Up 3 seconds             fervent_mendeleev

    ```


    ### 交互模式与分离模式


    注意，这次你没有重新连接到容器。以此方式启动时，容器进程作为*分离的*或后台进程运行。分离的容器在用户注销时不会停止，因为它们的状态不与交互式会话绑定。


    要在启动时以分离模式运行容器，请将 `docker run` 中的 `-it` 选项替换为 `-d` 或 `--detach`。


    ### 连接到容器


    现在容器已激活，重新连接到提示符。有不同方式可以做到这一点：*附加*或*执行命令*。


    *   **附加** 通过 `docker attach <CONTAINER NAME>` 命令访问容器正在运行的进程。在我们的例子中，该命令是 bash，如
    `docker ps` 的 `COMMAND` 列所示。在任何给定时间只能有一个会话附加。像之前那样以交互模式运行容器，就是附加到该容器。

    *   **执行** 一个命令类似于通过 `ssh` 登录到远程主机。运行 `docker exec <CONTAINER NAME> <COMMAND>`
    允许你指定一个命令或脚本。执行命令可以交互式运行，也可以在后台运行，并可设置用户、工作目录和环境。多个会话可以使用 `docker exec` 同时连接。


    在使用 Docker 和 Oracle 时，我很少需要用到 `docker attach`。在实践和本书中，我几乎只使用 `docker exec`。


    运行 `docker exec` 并带上首次运行容器时使用的相同 `-it` 选项来连接到你的容器。后跟容器名称和我们想要运行的命令 `bash` 以启动一个
    Shell：


    ```

    > docker exec -it fervent_mendeleev bash

    root@4a9ddd43e0e2:/#

    ```


    ### 验证持久性


    重新连接到容器后，列出你创建文件 `test.txt` 的目录内容。文件仍然存在，其内容也得以保留，即使在重启容器之后也是如此。


    文件系统的更改并不是 Docker 中唯一持久存在的东西。会话状态也会保留。在容器提示符处使用键盘上箭头键滚动查看命令历史。停止容器之前发出的命令会出现。


    ### 移除容器


    微服务架构会创建容器来执行某些工作，然后销毁它们（稍后会详细介绍）。你创建的容器已经达到了目的：你学会了如何运行和修改容器、检查其状态、启动和停止它以及进行连接。现在，我们将移除它。


    像之前一样输入 `exit` 退出容器提示符。在主机提示符处运行 `docker rm -f <CONTAINER NAME>` 来移除容器，替换为系统中容器的名称：


    ```

    > docker rm -f fervent_mendeleev

    fervent_mendeleev

    ```


    `-f` 标志强制 Docker 移除正在运行的容器。不使用此选项，则必须在移除前停止容器。


    ## 镜像是不可变的


    你通过安装 `vi` 和添加文件修改了容器，但这并没有改变镜像。镜像*是不可变的*，无法被更改。每个镜像都有一个摘要或哈希值，作为保证镜像内容的签名。从给定镜像启动的每个容器都是相同的。这是一个理想的属性，是运行可靠性和可重复性的基础，我们将在后面的章节中利用这一点。


    不过，这确实引出了一个明显的问题。如果不能更改镜像，Docker Hub 中怎么会有如此多种类的镜像？说镜像是不可变的并不是全部事实。镜像不能被更改，但对容器所做的更改可以*另存为新的镜像*。构建镜像只是一系列操作：启动一个镜像，运行命令以修改正在运行的容器，并将结果保存为新的镜像。


    ### 启动一个新容器


    为了演示，启动一个新的 Ubuntu 容器，这次使用 `--name` 选项为其指定一个名称，而不是让 Docker 生成一个“友好”的名称：


    ```

    > docker run -it --name my_container ubuntu

    root@cadf21663737:/#

    ```


    注意它完成得多快！没有像第一次运行 Ubuntu 容器时看到的那些额外消息。Docker 不需要拉取镜像，因为它已经存在于系统上。它只需要在本地主机上启动一个新的
    Linux 进程——请记住，在 Docker 中，没有初始化或启动周期！'
- fmt: '### Save a New Image


    The Ubuntu image we’re using doesn’t include the `vi` command. But what if we
    want an Ubuntu image that does? Installing `vi` on every new Ubuntu container
    isn’t a practical solution. Instead, let’s create a new image to include `vi`.


    Install `vi` (or `nano`) in the new container, using the commands from Listing
    [3-1](#514143_1_En_3_Chapter.xhtml#PC8). Exit the container, and at the host command
    prompt, save the container as a new image using the `docker commit` command. You’ll
    need to provide the name of the container you want to save and the name of the
    new image:


    ```

    > docker commit my_container ubuntu_editor

    sha256:be90b42f8ef0c5b8e343c7fd5d7aaa5d99f1e7e65dfac9020c4f362dade0410f

    ```


    Docker responds with the hash value of the new image. Rerun `docker images` to
    confirm it created a new image, following the code in Listing [3-2](#514143_1_En_3_Chapter.xhtml#PC15).


    ```

    > docker images

    REPOSITORY       TAG       IMAGE ID       CREATED         SIZE

    ubuntu_editor    latest    be90b42f8ef0   3 seconds ago   107MB

    ubuntu           latest    ba6acccedd29   4 weeks ago     72.8MB

    Listing 3-2

    Commit the modified container to a new image

    ```


    The new image, `ubuntu_editor`, is now available.


    Notice the new image size compared to the original. Is `vi` that big? No! This
    is a by-product of how images and `layers` work, discussed later in this chapter.


    ### Run the New Image


    Start another container using this new image, using `docker run -it ubuntu_editor`,
    and confirm `vi` is present, as shown in Listing [3-3](#514143_1_En_3_Chapter.xhtml#PC16).


    ```

    > docker run -it ubuntu_editor

    root@d3f700a3aae2:/# which vi

    /usr/bin/vi

    Listing 3-3

    Create a container from the newly committed image and verify vi is present

    ```


    ## Union Filesystems


    Listing [3-2](#514143_1_En_3_Chapter.xhtml#PC15) showed two images. The original
    Ubuntu image is 72.8MB. The modified version, with `vi` installed, is 107MB. Installing
    a simple editor increased the size by over 45%. Why?


    Docker is very efficient, leveraging operating system features to improve speed
    and reduce footprint. One of these features, `union filesystems` (sometimes called
    `overlay filesystems`), “deduplicates” the contents of containers.


    Logically, a system running five containers starting from a single 200MB image
    should use 1000MB—200MB per container. With `union filesystems`, the actual storage
    requirement is unrelated to the number of containers. In this example, it could
    be as little as 200MB, whether the host is running ten containers or a thousand.


    Images provide all the files and dependencies the container needs, but they aren’t
    copied from the image. `Containers are the image.`


    How can containers use images in their filesystems if images can’t be changed?


    When starting a new container, Docker creates a `union filesystem` consisting
    of multiple layers: `lower`, `upper`, and `working`.


    *   `Lower layer`: Docker maps images to the lower layer. Every container sharing
    an image references the same immutable set of files in its lower layer.

    *   `Upper layer`: Docker creates a unique upper layer for each container. Creating
    and editing files adds them to the container’s upper layer without altering the
    original copy in the lower layer.

    *   `Working layer`: The working layer is the union (hence the name) of the lower
    and upper layers. It merges unchanged files from the lower layer with new and
    modified files saved in the upper layer. `Union filesystems` handle deleted files
    as a particular file type, telling the working layer to block them from view.


    To visualize this, imagine an image for playing out Tic-Tac-Toe game scenarios,
    shown in Figure [3-1](#514143_1_En_3_Chapter.xhtml#Fig1). The image—the lower
    layer—holds the game board and the first few moves of the game. The starting moves
    are part of the image and appear on the game board whenever a container starts.
    Think of the upper layer as a transparent sheet where players mark their moves.
    The working layer is the view players see as if they were looking down, with the
    transparent upper layer superimposed onto the image beneath it. The working layer
    shows the complete game board—the merger of lower and upper layers.


    ![](images/514143_1_En_3_Chapter/514143_1_En_3_Fig1_HTML.png)

    A diagram of a tic-tac-toe move, illustrates 3 layers from bottom to top, the
    lower layer, upper layer and working layer.

    Figure 3-1

    The Tic-Tac-Toe moves in the lower layer are part of the image and are present
    at the start of every container. Moves added in the running container exist only
    in the upper layer. Players “looking down” from the perspective of the working
    layer see all the moves.


    Figure [3-2](#514143_1_En_3_Chapter.xhtml#Fig2) shows how this applies to a filesystem.
    Once again, the image supplies the lower layer with prepopulated files. Containers
    get their own upper layers, where they save local changes. Processes running in
    containers read the merged result from the working layer.


    ![](images/514143_1_En_3_Chapter/514143_1_En_3_Fig2_HTML.png)

    A diagram illustrates the layers in a union filesystem. The layers from top to
    bottom, working layer, upper layer, and lower layers. The file names labeled as
    file 1, file 2a, file 3, file 4, and file 5.

    Figure 3-2

    Layers in a `union filesystem`.


    In the working layer of Figure [3-2](#514143_1_En_3_Chapter.xhtml#Fig2), the changed
    versions of files 2 and 5 overlay, or block, their original versions. Files 1,
    3, and 4 are unobstructed and “visible” through the upper layer.


    Under normal circumstances, most of the image—the binaries, libraries, and executables—are
    static and won’t have copies in the container’s upper layer.^([^(18)](#fn18))
    The fewer the changes made in the container, the smaller its upper layer.


    When you removed the Ubuntu container earlier, Docker deleted the upper layer
    of the `union filesystem` assigned to the container.^([^(19)](#fn19)) Changes
    made in the container were lost, but nothing happened to the underlying image.


    Dozens or hundreds of containers started from the same image share a lower layer,
    leading to dramatic improvements in efficiency and cost-effectiveness at scale
    compared to their physical or virtual machine counterparts. We can see this by
    running the `docker ps` command with the `-s` or `--size` option. The following
    abridged output reports the real and virtual sizes of these containers:^([^(20)](#fn20))


    *   The first container uses no extra space. With no changes made in the container,
    its upper layer is empty, and the container’s virtual size, 72.8MB, matches that
    of the original Ubuntu image.

    *   The second container’s upper layer is 33.9MB. It includes the modifications
    needed to update the filesystem and install `vi`.

    *   The third container, run from the newly created image, doesn’t include any
    changes to its environment. Like the first, the upper layer of this container
    is empty.


    ```

    > docker ps -as

    CONTAINER ID   IMAGE         SIZE

    a5bf2c163d07   ubuntu        0B (virtual 72.8MB)

    cadf21663737   ubuntu        33.9MB (virtual 107MB)

    d3f700a3aae2   ubuntu_editor 0B (virtual 107MB)

    ```'
