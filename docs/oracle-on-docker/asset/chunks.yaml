  trans: '

    那些零字节层又是什么呢？它们是 Docker 用来运行镜像的元数据指令，不占用镜像空间。沿用烹饪主题来打比方，镜像元数据就像是准备和完成一道食谱所需的信息。比如烤箱温度和烘烤时间，并不是蛋糕里的实体原料，但对制作过程仍然至关重要。在
    Dockerfile 中，`USER root` 和 `USER oracle` 这类指令就扮演着这个角色，告诉 Docker 后续的一个或多个命令要以特定用户身份运行。如果你熟悉
    Oracle 数据库的安装，甚至可能在这里认出一个熟悉的模式：


    ```

    1664ac9ff6d4  /bin/sh -c $ORACLE_BASE/oraInventory/orainst…   21.8MB

    6688786dc411  /bin/sh -c #(nop)  USER root                    0B

    ```


    同样，从下往上读，Docker 将用户设置为 `root`，然后在 `$ORACLE_BASE/oraInventory/orasinst...` 中执行某些操作。那一行的完整命令是：


    ```

    $ORACLE_BASE/oraInventory/orainstRoot.sh && $ORACLE_HOME/root.sh

    ```


    这就是 Docker 在运行 Oracle 的安装后 root 脚本！更改用户是一项元数据操作。运行安装后 root 脚本在下方的层中造成了 21.8MB
    的变更。


    层的强大之处在于其可复用性。我们不会仅仅为了添加一个微小改动就完全重写文档，也不会重新构建包含相同步骤的镜像。假设我修改了用于构建前面所示数据库镜像的 Dockerfile。在这种情况下，Docker
    会理解到我的编辑之前的所有内容都是相同的，并会复用现有的镜像层，而不是重新执行那些步骤。假设这里出现的这一层：


    ```

    b6fb885c6988  /bin/sh -c #(nop) COPY --chown=oracle:dbadir…   6.19GB

    ```


    最后一列显示该层占用了 6.19GB 磁盘空间。Docker 可以在有后续步骤变更的新镜像中回收该层（以及它之前的所有层）。那样的话，这个 6.19GB 的层就不会被复制——所有镜像共享同一份副本！


    ## FROM


    你已经了解到，构建镜像的过程是运行一个容器、进行更改，然后将结果保存为一个新镜像。第一步——运行容器——需要一个镜像，而 `FROM` 命令告诉 Docker
    这个镜像的名称。格式非常直接：`FROM <镜像名称>`：


    ```

    FROM oraclelinux:7-slim

    ```


    构建镜像需要一个镜像。那么第一个镜像又是从哪里来的呢？这不是一个鸡生蛋、蛋生鸡的悖论吗？并非如此！一个名为 `scratch` 的特殊镜像可以创建一个空的文件系统。使用现有镜像的优势在于它们是预先构建好的、经过测试的、可复用的，能让我们免于从“零”（字面意义上的）开始的费时费力。


    请注意，数据库镜像的第一层（记录为图像 ID 是 `<missing>` 的那一项）与清单 12-1 中的 Oracle Enterprise Linux
    7-slim 镜像的大小都是 133MB。Docker 在第一步中添加了该镜像（`ADD file:b0df42f2bb614be48…`），作为后续修改的基础。


    ### 构建阶段


    `FROM` 命令还有一个额外的功能，可以保存步骤的结果，以便在同一个构建过程的后期本地使用。这是多阶段构建的基础。多阶段构建的每个阶段都是一系列命令的集合——相当于食谱中单个步骤的各个部分。虽然别名出现在标记阶段开始的
    `FROM` 命令中，但它引用的是该阶段所有操作完成后的结果。要创建别名，请在 `FROM` 引用的镜像后添加 `AS` 关键字：


    ```

    FROM oraclelinux:7-slim AS base

    ```


    从功能上讲，这等同于食谱中写道：


    *步骤 1. 将面粉、糖、小苏打和盐放入碗中混合。放置备用。*


    别名就是阶段的名称，在后续的 `FROM` 命令中可以使用该别名来引用该阶段的结果：


    ```

    FROM base

    ```


    这在食谱中的等价表述是：


    *步骤 3. 取回步骤 1 中准备好的那碗干性材料，然后...*


    在复杂的构建中，对阶段的调用可以拥有自己的别名，给构建过程带来一种模块化的感觉：


    ```

    FROM base AS builder

    ```


    阶段是局部和临时的，构建过程并不知道在其他 Dockerfile 中创建的阶段。^(^(⁶⁴))


    `base` 和 `builder` 是 Dockerfile 中阶段常用的别名。`base` 通常代表一个在整个构建过程中反复使用的基础结果。例如，Oracle
    数据库的 `base` 镜像通常以一个操作系统镜像（`oraclelinux:7-slim`）开始，然后添加标准环境变量、`oracle` 用户和必备软件包。


    `builder` 通常是一个中间或临时阶段，用于创建或处理供后续使用的内容。你将在接下来的两章中看到这方面的例子。


    ## 配置环境：ARG 和 ENV


    使用起始镜像启动构建过程后，就该开始定制了！最常见的下一步是设置环境变量。在常规的 Linux 主机上，`.login`、`.bash_login`、`.bashrc`
    或类似脚本会在登录时设置环境。


    `FROM` 命令中的镜像并不包含我们需要的信息。这些信息需要被添加进去。`ENV`（环境）命令是设置环境变量最直接、最简单的方式。它按照与在 Linux
    中导出变量到本地环境相同的模式，为变量赋值：


    ```

    ENV ORACLE_HOME=/opt/oracle/product/19c/dbhome_1

    ```


    很简单，对吧？

    '
- fmt: '### Extending Images


    前面命令存在一个问题。它将 `ORACLE_HOME` 设置为静态的硬编码值。理想情况下，镜像应具备一定的灵活性。如果用户希望将 Oracle 安装到不同的目录结构下，就必须编辑
    Dockerfile 中的 `ENV` 命令，并将 `ORACLE_HOME` 的赋值改为其所需位置。


    `ARG`（或称“参数”）命令提供了一种替代 `ENV` 赋予静态值的方式。这两个命令的格式相同：


    ```

    ARG ORACLE_HOME=/opt/oracle/product/19c/dbhome_1

    ```


    我们仍然需要为 `ORACLE_HOME` 配置环境，但不再是硬编码值，而是通过参数的值来赋值，表示为 Shell 变量 (`$ORACLE_HOME`)：


    ```

    ENV ORACLE_HOME=$ORACLE_HOME

    ```


    乍一看，这似乎完成了相同的事情，反而增加了工作量！这里仍然有一个静态值，并且用了两条命令而不是一条：


    ```

    ARG ORACLE_HOME=/opt/oracle/product/19c/dbhome_1

    ENV ORACLE_HOME=$ORACLE_HOME

    ```


    为什么这样更好？


    回想一下，我们可以使用 `docker run` 命令的 `-e` 选项来覆盖环境变量的默认值。这使得数据库镜像比锁定在预定义设置中灵活得多。`docker
    build` 命令有一个类似的功能 `--build-arg`，用于覆盖 Dockerfile 中设置的参数。（我们将在第 [14](#514143_1_En_14_Chapter.xhtml)
    章详细探讨 `docker build`。）


    关于 `ARG` 和 `ENV` 存在一些混淆。简要来说：


    *   `ARG` 为变量设置默认值。参数仅对构建过程可见，并且仅在其定义的阶段内可见。它们不会被写入镜像，也不会持续到后续的构建阶段。在构建过程中，`--build-arg`
    选项可以覆盖这些默认值。

    *   `ENV` 为变量赋值，并将值保留在镜像中。由于环境变量是镜像的一部分，在一个阶段设置的环境变量会延续到后续阶段。环境变量在构建期间无法更改。


    任何不需要灵活性的变量都可以用 `ENV` 定义。任何可能在构建过程中需要调整的变量则应同时使用 `ARG` 和 `ENV`。


    将空值赋给 `ARG` 会初始化一个变量并使其可用作构建参数：


    ```

    ARG INSTALL_OPTIONS=

    ENV INSTALL_OPTIONS=$INSTALL_OPTIONS

    ```


    这里，`ARG` 初始化了一个变量 `INSTALL_OPTIONS` 并将其设置为空值。`ENV` 将该参数的值赋给环境中的一个变量。在镜像中它保持为空，除非构建时给它赋值。


    我们可以使用 `docker run -e` 标志在容器中动态创建新变量，但构建镜像时不存在相同的功能。`--build-arg` 选项只能引用 Dockerfile
    中存在的参数。


    `ARG` 和 `ENV` 之间的关系不必是一一对应的。以以下示例为例，它使用参数来设置数据库版本和 `ORACLE_BASE`，并构造 `ORACLE_HOME`
    路径：


    ```

    ARG DB_VERSION=19c

    ARG ORACLE_BASE=/opt/oracle

    ENV ORACLE_HOME=$ORACLE_BASE/product/$DB_VERSION/dbhome_1

    ENV ORACLE_BASE=$ORACLE_BASE

    ```


    ### 构建期间的参数和环境变量作用域


    我之前提到过，用 `ARG` 设置的变量仅对构建过程可见，而用 `ENV` 设置的变量会传递到镜像中。我们可以利用参数的作用域来隐藏构建过程的某些方面。


    连接到 Oracle 数据库容器并运行 `env | sort` 来打印排序后的环境变量列表，如清单 [12-2](#514143_1_En_12_Chapter.xhtml#PC15)
    所示。它显示了 Oracle 数据库主机上预期的条目以及一些来自构建过程的残留信息。


    ```

    bash-4.2$ env | sort

    ARCHIVELOG_DIR_NAME=archive_logs

    CHECKPOINT_FILE_EXTN=.created

    CHECK_DB_FILE=checkDBStatus.sh

    CHECK_SPACE_FILE=checkSpace.sh

    CLASSPATH=/opt/oracle/product/19c/dbhome_1/jlib:/opt/oracle/product/19c/dbhome_1/rdbms/jlib

    CLONE_DB=false

    CONFIG_RSP=dbca.rsp.tmpl

    CREATE_DB_FILE=createDB.sh

    CREATE_OBSERVER_FILE=createObserver.sh

    DG_OBSERVER_NAME=

    DG_OBSERVER_ONLY=false

    ENABLE_ARCHIVELOG=false

    HOME=/home/oracle

    HOSTNAME=59ae22d8ed19

    INSTALL_DB_BINARIES_FILE=installDBBinaries.sh

    INSTALL_DIR=/opt/install

    INSTALL_FILE_1=LINUX.X64_193000_db_home.zip

    INSTALL_RSP=db_inst.rsp

    LD_LIBRARY_PATH=/opt/oracle/product/19c/dbhome_1/lib:/usr/lib

    ORACLE_BASE=/opt/oracle

    ORACLE_HOME=/opt/oracle/product/19c/dbhome_1

    ORACLE_SID=ORCLCDB

    PATH=/opt/oracle/product/19c/dbhome_1/bin:/opt/oracle/product/19c/dbhome_1/OPatch/:/usr/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    PRIMARY_DB_CONN_STR=

    PWD=/home/oracle

    PWD_FILE=setPassword.sh

    RELINK_BINARY_FILE=relinkOracleBinary.sh

    RUN_FILE=runOracle.sh

    SETUP_LINUX_FILE=setupLinuxEnv.sh

    SHLVL=1

    SLIMMING=true

    STANDBY_DB=false

    START_FILE=startDB.sh

    TERM=xterm

    USER_SCRIPTS_FILE=runUserScripts.sh

    WALLET_DIR=

    _=/usr/bin/env

    Listing 12-2

    Oracle 数据库容器中设置的默认环境变量

    ```


    其中一些环境变量（包括以 `INSTALL` 开头的）不应该出现在这里。这些变量都指向在 Oracle 数据库软件安装步骤的 Dockerfile 中使用的文件和目录。它们指向的工件在最终镜像中并不存在——它们被移除（或更准确地说，未包含在）`docker
    run` 使用的最终镜像中：


    ```

    bash-4.2$ ls -l $INSTALL_DIR

    ls: cannot access /opt/install: No such file or directory

    bash-4.2$ find / -name $INSTALL_DB_BINARIES_FILE 2>/dev/null

    bash-4.2$ find / -name $INSTALL_FILE_1 2>/dev/null

    bash-4.2$ find / -name $INSTALL_RSP 2>/dev/null

    bash-4.2$

    ```


    对于那些不熟悉 `2>/dev/null` 语法的人：它将错误信息发送到“虚空”！数字 `2` 是 `stderr`（标准错误）的简写，即我们通常看到的打印到终端的消息。脱字符
    `>` 将这些错误重定向到 Linux 的空设备文件 `/dev/null`。这个技巧可以防止因 `oracle` 用户无权读取的目录而产生的“权限被拒绝”错误扰乱输出。


    数据库软件安装脚本需要这些信息，但容器本身不需要。严格来说，它们不需要在容器环境中持久存在。请不要误会——我非常尊重维护 Oracle 容器仓库的作者和贡献者，他们多年的工作非常出色且富有洞察力。我并不是说这些变量出现在最终镜像中是错误的，只是我的编码风格和偏好不同。但是，它们的存在有助于说明如何利用
    `ARG` 和 `ENV` 的差异！


    如果通过参数传递这些值，而不是将它们添加到环境中，就会将它们定义为构建过程的一部分。它们对构建过程中调用的软件安装脚本可见，但在最终的镜像中不存在。我支持这种方法的理由如下：


    *   它能产生一个更“干净”、更整洁的环境。

    *   它使得数据库运行在 Linux 容器中这一点不那么明显。

    *   它限制了攻击者可能用来获取有关构建镜像方法的信息。


    再次强调，这里没有对错之分，只是不同的做事方式。


    另一种在不设置环境变量的情况下将变量传递给脚本的方法是将它们定义为命令字符串的一部分。本章稍后介绍的 `RUN` 指令可以在其命令中包含局部作用域的变量定义：


    ```

    RUN INSTALL_DIR=/opt/install && \

    INSTALL_DB_BINARIES_FILE=installDBBinaries.sh && \

    $INSTALL_DIR/$INSTALL_DB_BINARIES_FILE

    ```


    这里的变量仅在需要它们的 `RUN` 命令的作用域内设置。'
  raw: '### Extending Images


    There’s just one problem with the preceding command. It sets the `ORACLE_HOME`
    to a static, hard-coded value. Ideally, images should have some flexibility. Users
    that want to build an image with Oracle installed under a different directory
    structure must edit the `ENV` command in the Dockerfile and change the assignment
    of `ORACLE_HOME` to their preferred location.


    The `ARG`, or *argument*, command offers an alternative to assigning static values
    with `ENV`. The format of the two commands is the same:


    ```

    ARG ORACLE_HOME=/opt/oracle/product/19c/dbhome_1

    ```


    We still need to configure the environment with a value for `ORACLE_HOME`, but
    instead of a hard-coded value, we’ll assign it using the value of the argument,
    expressed as a shell variable (`$ORACLE_HOME`):


    ```

    ENV ORACLE_HOME=$ORACLE_HOME

    ```


    At first, this seems to accomplish the same thing and creates more work! There’s
    still a static value, and now two commands instead of one:


    ```

    ARG ORACLE_HOME=/opt/oracle/product/19c/dbhome_1

    ENV ORACLE_HOME=$ORACLE_HOME

    ```


    What makes this better?


    Recall we can override the default values for environment variables using the
    `-e` option of the `docker run` command. It makes database images far more flexible
    than being locked into predefined settings. The `docker build` command has a similar
    feature, `--build-arg`, for overriding arguments set in the Dockerfile. (We’ll
    delve into `docker build` in Chapter [14](#514143_1_En_14_Chapter.xhtml).)


    There’s some confusion when it comes to `ARG` and `ENV`. Briefly:


    *   `ARG` sets default values for a variable. Arguments are only visible to the
    build process and only within the stage where they’re defined. They aren’t written
    into the image nor persist into subsequent build stages. During the build process,
    the `--build-arg` option can override the defaults.


    *   `ENV` assigns values to variables and preserves them in the image. Since they’re
    part of the image, environment variables set in one stage carry over into later
    stages. Environment variables can’t be changed during a build.


    Any variables that don’t require flexibility can be defined with `ENV`. Anything
    that might need adjustment during the build should use both `ARG` and `ENV`.


    Assigning an empty value to `ARG` initializes a variable and makes it available
    as a build argument:


    ```

    ARG INSTALL_OPTIONS=

    ENV INSTALL_OPTIONS=$INSTALL_OPTIONS

    ```


    Here, `ARG` initializes a variable, `INSTALL_OPTIONS`, and sets it to an empty
    value. `ENV` assigns the value of the argument to a variable in the environment.
    It remains empty in the image unless the build gives it a value.


    We can create new variables in containers on the fly, using the `docker run -e`
    flag, but that same functionality doesn’t exist for building images. The `--build-arg`
    option can only reference an argument present in the Dockerfile.


    The relationship between `ARG` and `ENV` needn’t be one to one. Take the following
    example that uses arguments for database version and `ORACLE_BASE` and constructs
    an `ORACLE_HOME` path:


    ```

    ARG DB_VERSION=19c

    ARG ORACLE_BASE=/opt/oracle

    ENV ORACLE_HOME=$ORACLE_BASE/product/$DB_VERSION/dbhome_1

    ENV ORACLE_BASE=$ORACLE_BASE

    ```


    ### Argument and Environment Scope During Builds


    I mentioned earlier that variables set with `ARG` are only visible to the build
    process, but those set with `ENV` are passed to the image. We can use the scope
    of arguments to disguise certain aspects of the build process.


    Connect to an Oracle database container and run `env | sort` to print a sorted
    list of environment variables, as seen in Listing [12-2](#514143_1_En_12_Chapter.xhtml#PC15).
    It shows entries we expect to see on an Oracle database host and some residue
    from the build process.


    ```

    bash-4.2$ env | sort

    ARCHIVELOG_DIR_NAME=archive_logs

    CHECKPOINT_FILE_EXTN=.created

    CHECK_DB_FILE=checkDBStatus.sh

    CHECK_SPACE_FILE=checkSpace.sh

    CLASSPATH=/opt/oracle/product/19c/dbhome_1/jlib:/opt/oracle/product/19c/dbhome_1/rdbms/jlib

    CLONE_DB=false

    CONFIG_RSP=dbca.rsp.tmpl

    CREATE_DB_FILE=createDB.sh

    CREATE_OBSERVER_FILE=createObserver.sh

    DG_OBSERVER_NAME=

    DG_OBSERVER_ONLY=false

    ENABLE_ARCHIVELOG=false

    HOME=/home/oracle

    HOSTNAME=59ae22d8ed19

    INSTALL_DB_BINARIES_FILE=installDBBinaries.sh

    INSTALL_DIR=/opt/install

    INSTALL_FILE_1=LINUX.X64_193000_db_home.zip

    INSTALL_RSP=db_inst.rsp

    LD_LIBRARY_PATH=/opt/oracle/product/19c/dbhome_1/lib:/usr/lib

    ORACLE_BASE=/opt/oracle

    ORACLE_HOME=/opt/oracle/product/19c/dbhome_1

    ORACLE_SID=ORCLCDB

    PATH=/opt/oracle/product/19c/dbhome_1/bin:/opt/oracle/product/19c/dbhome_1/OPatch/:/usr/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    PRIMARY_DB_CONN_STR=

    PWD=/home/oracle

    PWD_FILE=setPassword.sh

    RELINK_BINARY_FILE=relinkOracleBinary.sh

    RUN_FILE=runOracle.sh

    SETUP_LINUX_FILE=setupLinuxEnv.sh

    SHLVL=1

    SLIMMING=true

    STANDBY_DB=false

    START_FILE=startDB.sh

    TERM=xterm

    USER_SCRIPTS_FILE=runUserScripts.sh

    WALLET_DIR=

    _=/usr/bin/env

    Listing 12-2

    Default environment variables set in an Oracle database container

    ```


    Some of these environment variables don’t need to be here, including those that
    begin with `INSTALL`. These variables all point to files and directories used
    in the Dockerfile during the Oracle database software installation step. The artifacts
    they point to aren’t present in the final image—they’re removed (or, more accurately,
    not included) in the final image used by `docker run`:


    ```

    bash-4.2$ ls -l $INSTALL_DIR

    ls: cannot access /opt/install: No such file or directory

    bash-4.2$ find / -name $INSTALL_DB_BINARIES_FILE 2>/dev/null

    bash-4.2$ find / -name $INSTALL_FILE_1 2>/dev/null

    bash-4.2$ find / -name $INSTALL_RSP 2>/dev/null

    bash-4.2$

    ```


    For those unfamiliar with the `2>/dev/null` syntax: It sends errors into the void!
    The number `2` is shorthand for `stderr`, the error messages we’d generally see
    printed to the terminal. The caret, `>`, redirects these errors to the Linux null
    device file, `/dev/null`. This trick prevents “permission denied” errors for directories
    the `oracle` user can’t read from cluttering the output.


    The database software installation scripts need this information. The container
    doesn’t. Strictly speaking, they don’t need to persist in the container environment.
    Don’t get me wrong—I greatly respect the authors and contributors that maintain
    Oracle’s container repository, and their work over the years is remarkable and
    insightful. I’m not saying it’s wrong for these variables to be in the final image,
    merely because my coding style and preferences differ. But, their presence helps
    illustrate how to leverage differences in `ARG` and `ENV`!


    Passing these values as arguments instead of adding them to the environment would
    define them to the build process. They’d be visible to the software installation
    scripts called during the build but absent from the final image. My arguments
    in favor of this approach are as follows:


    *   It produces a “cleaner,” less cluttered environment.


    *   It makes it less apparent the database is running in a Linux container.


    *   It limits information an attacker could use to gain information about methods
    used to build the image.


    Again, there’s no right or wrong here, just different ways of doing things.


    Another option for passing variables to scripts without setting them in the environment
    is to define them as part of a command string. The `RUN` instruction, covered
    later in this chapter, can include a locally scoped variable definition as part
    of its command:


    ```

    RUN INSTALL_DIR=/opt/install && \

    INSTALL_DB_BINARIES_FILE=installDBBinaries.sh && \

    $INSTALL_DIR/$INSTALL_DB_BINARIES_FILE

    ```


    The variables here are set only in the scope of the `RUN` command that needs them.'
