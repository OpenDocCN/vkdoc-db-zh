  trans: '

    ## Oracle 镜像中的环境选项


    Oracle 的容器镜像仓库在[`https://github.com/oracle/docker-images/tree/main/OracleDatabase/SingleInstance`](https://github.com/oracle/docker-images/tree/main/OracleDatabase/SingleInstance)有详尽的文档，包括用于自定义数据库启动和创建的环境选项。


    用于在容器中自定义 Oracle 数据库创建的环境选项（默认值显示在方括号[]内）：


    *   `ORACLE_SID`：Oracle 数据库的 SID [`ORCLCDB`]

    *   `ORACLE_PDB`：Oracle 数据库的 PDB 名称 [`ORCLPDB1`]

    *   `ORACLE_EDITION`：Oracle 数据库版本^(⁴²,⁴³)

    *   `ORACLE_CHARACTERSET`：数据库字符集 [`AL32UTF8`]

    *   `ORACLE_PWD`：Oracle 数据库 SYS、SYSTEM 和 PDB_ADMIN 的密码 [在数据库创建时随机生成]

    *   `ENABLE_ARCHIVELOG`：启用归档日志 [False]⁷


    可用于管理 Oracle 数据库容器内存的可选环境选项：


    *   `INIT_SGA_SIZE`：SGA 组件的总内存（MB）。⁷

    *   `INIT_PGA_SIZE`：PGA 的目标聚合大小（MB）。⁷

    *   `AUTO_MEM_CALCULATION`：在数据库创建期间，基于容器可用内存计算总内存分配。当设置为 false 时，总内存分配为 2GB。如果设置了`INIT_SGA_SIZE`或`INIT_PGA_SIZE`，则忽略此选项。[True]⁷


    这些选项涵盖了创建数据库时最常见的修改。第 13 章提供了更多自定义的示例和思路，进一步扩展了可能性！


    ## 总结


    在本章中，你了解到容器从其父镜像继承环境设置，并将这些设置存储为元数据。每次 Oracle 数据库容器启动时，`runOracle.sh`脚本会自动运行，管理容器及其数据库中的活动。启动脚本通过评估环境变量来定制数据库的创建和启动——这就像
    shell 脚本接受命令行参数以改变其默认行为一样。


    你学习了向容器传递环境变量的不同方法，现在可以使用`docker inspect`来报告和格式化来自容器的元数据。最后，你发现了如何在 Docker 容器中使用自定义的
    CDB 和 PDB 名称创建 Oracle 数据库，并了解了用于调整数据库内存分配、数据库版本和归档日志状态的其他选项。


    在接下来的两章中，你将探索`docker run`命令的其他选项，这些选项允许主机和容器之间进行交互。第 7 章介绍了将主机存储与容器共享的技术，以及其对性能、数据持久性和效率的影响。第
    8 章涵盖了主机与容器之间的通信，以及如何配置容器以为客户端（无论是在主机上还是在其他容器中）提供服务。


    脚注 1 2 3 4 5 6 7 8


    ## 7. 持久化


    当我在 2014 年开始寻找关于在容器中运行 Oracle 的信息时，Oracle 专家们的共识并不乐观。大多数数据库管理员认为 Docker 不过是开发人员中的最新*技术潮流*，不足以应对数据库的需求。他们引用了关于不稳定、性能差和数据丢失的严厉警告。同行们分享了各种根源于
    Docker 不成熟或脆弱性的灾难故事。


    这些批评有一个共同的主题。每一个都是涉及某个模糊的“朋友的朋友”的轶事，回响着多年来针对其他新技术的警告——这些技术如今我们已习以为常，比如恢复管理器（RMAN）、自动撤销管理^(⁴⁴)，甚至虚拟机。同样令人好奇的是，这些灾难都被归咎于在生产环境中使用的、当时仍属新兴的技术，这似乎不太可能。那时我明白了，这些故事是对未知事物忧虑的副产品，甚至是对容器可能改变我们做事方式的恐惧。


    如果说有一个首当其冲的反对意见，那就是数据持久性。人们（错误地）认为，由于容器是短暂的，与容器相关的任何东西也是如此。的确，容器的文件系统与容器本身绑定。删除容器会永久移除其数据。


    除非这些数据是*外部*挂载的。


    Docker 可以使用挂载存储在容器外部保存（并持久化！）数据，因为它与容器是分离的。删除容器不会影响外部存储的数据。深思熟虑地使用数据库挂载点能提供更强的控制力和可见性，并为运行高效、可靠、一致且模块化的数据库环境奠定基础。而挂载正是
    Linux 容器强大功能背后的关键组件。


    ## 容器存储


    我们已经看到容器如何利用联合文件系统来提供可靠、一致的结果。人们很容易说，从一个给定镜像启动的每个容器都始于相同的文件系统。但容器使用的并非精确的*副本*。在整个生命周期中，它们都共享*同一个*文件系统——即镜像本身。启动容器会创建一个专用的*联合文件系统*（有时称为*覆盖文件系统*），以父镜像为基础。图
    7-1 展示了容器层在玩井字游戏时的工作原理。该镜像包含游戏棋盘和开局走法，填充了顶行和中心方格。每个容器都使用该镜像作为*下层*，但无法“触碰”或更改其内容。相反，Docker
    将容器的更改写入每个容器私有的*上层*。图 7-1 中的两个容器起始于相同的棋盘、走法和一个空的上层。随着每个容器中游戏的进行，Docker 将新的走法添加到各自的上层。从容器内部视角（由*工作层*提供）看到的视图，是下层和上层的复合体或合并体。从容器的角度“向下”看这些层，文件系统看起来是“扁平”的。


    ![](img/514143_1_En_7_Fig1_HTML.png)


    *图 7-1：容器使用联合文件系统将本地更改投射到其父镜像提供的基础文件系统上*


    联合文件系统使容器快速而高效。无论镜像是几兆字节还是几千兆字节大小，都不重要，因为容器在启动时不会复制它们。它们只是初始化一个新的联合文件系统，并在现有镜像之上添加一个最初为空的层。从一个
    1GB 镜像运行十个容器不需要 10GB 的空间。它们都使用相同的 1GB 镜像，因此它们的存储需求只是每个容器私有层中更改所占用空间的总和。

    '
- fmt: '### Docker Internal Storage


    这些镜像和层仍然在磁盘上占用空间，位于 Docker 的 `/var/lib/docker` 目录中。该目录是运行 Docker Desktop 的 Windows
    和 Mac 系统底层 Linux 虚拟机的一部分。在 Linux 系统上，它是 Docker 安装的默认位置。^([^(45)](#fn45)) 无论哪种情况，只有特权
    (`root`) 用户可以浏览该目录，这是有充分理由的。其内容需要受到保护，以确保容器生态系统的健康。


    查看 `/var/lib/docker` 目录信息和内容的唯一实用方法是间接进行，要么通过 Docker CLI 命令报告元数据，要么连接到容器并检查其文件系统。这并非总是最方便的方式，尤其是在主机与容器之间共享信息时。


    考虑一个使用运行 Oracle 数据库的 Docker 容器来隔离潜在软件故障的故障排除场景。在某些时候，我需要从容器中获取文件与 Oracle 共享。怎么办？


    假设配置了 SMTP，我可以将文件通过电子邮件发送，或者从容器 shell 复制粘贴到本地主机的文件中。这两种方式都不太实用。我可以使用 `sudo` 进入
    `/var/lib/docker` 目录，并尝试在它们的层中定位文件，然后复制到我的主目录——这同样，可能也不是最佳解决方案。


    一个更现实的选择是 `docker cp` 命令。就像它的 Linux 同名命令 `cp` 一样，`docker cp` 允许我在主机和容器之间复制文件。我将容器视为主机，并将
    `docker cp` 视为等同于 `scp` 或 `sftp`。`docker cp` 的结构与 `scp` 命令类似：


    ```

    scp [source file] [destination]

    docker cp [source file] [destination]

    ```


    约定也很相似。远程组件是主机或容器，后跟冒号，最后是路径或文件名：


    ```

    scp [host or IP address]:[source file] [destination]

    docker cp [container name]:[source file] [destination]

    ```


    这无疑是一种更易用、更好的文件传输方式，但有一点例外。`docker cp` 不支持通配符。使用 `docker cp` 时，操作仅限于整个目录或单个文件。在主机和容器之间移动文件充其量是不方便的。联合文件系统还有其他限制，特别是对于数据库。


    ### Union Filesystems 的缺点


    联合文件系统是容器背后的重要魔法组成部分，但它们并不是数据库的理想存储机制：


    *   **它们是临时的**。写入容器私有层的任何数据在移除容器时都会丢失。如果我删除图 [7-1](#514143_1_En_7_Chapter.xhtml#Fig1)
    中所示的一个容器，我就是在移除它的联合文件系统以及上层和工作层。

    *   **随着容器私有层变化的增长，联合文件系统的效率会下降**。对属于父镜像的文件进行的每一次修改都会增加宿主系统为生成容器看到的视图而必须执行的工作量。获取功能结果需要读取基础目录和中间目录中的文件，然后计算差异。当容器保持与原始镜像接近时，开销并不显著。写入大量数据的应用程序——如数据库——会增加容器的上层，消耗资源来计算结果。

    *   **`/var/lib/docker` 中的层默认仅限于单个文件系统，即启动卷**。数据库的容量、性能和冗余性仅限于这一个磁盘的能力，没有选项可以跨多个设备分散活动。


    用 Oracle 的视角来看，这就像使用主机的启动卷来运行 Oracle 数据库作为 `ORACLE_HOME` 和数据。磁盘性能对于数据库软件并不关键——二进制文件在启动后缓存在内存中后，活动就很有限。数据库主目录的大小在其生命周期内保持相当稳定，因此容量也不是问题。


    然而，将数据文件和归档日志文件放在同一个磁盘上是一个问题。数据库只能增长到单个磁盘的物理极限。为保护数据库文件而添加 RAID 保护适用于磁盘上的所有内容，无论是否需要该保护。幸运的是，Oracle
    允许我们控制这些数据库文件的放置，而 Docker 中的挂载点对容器有类似的目的：挂载存储。'
  raw: '### Docker Internal Storage


    These images and layers still occupy space on disk in Docker’s `/var/lib/docker`
    directory. The directory is part of the Linux virtual machine running under the
    covers on Windows and Mac systems running Docker Desktop. On Linux systems, it’s
    the default location for Docker installations.^([^(45)](#fn45)) In either case,
    only privileged (`root`) users can navigate the directory, and with good reason.
    Its contents need to be protected to guarantee the health of container ecosystems.


    The only practical way to view information and contents of the `/var/lib/docker`
    directory is indirectly, either through Docker CLI commands to report metadata
    or connecting to a container and inspecting its filesystem. It’s not always the
    most convenient way of doing things, particularly when sharing information between
    host and container.


    Consider a troubleshooting scenario using a Docker container running an Oracle
    database to isolate a potential software bug. At some point, I’ll need to get
    files from the container to share with Oracle. How?


    Assuming SMTP is configured, I could email or copy-paste them from a container
    shell to files on my local host. Neither is very practical. I could `sudo` into
    the `/var/lib/docker` directory and try to locate the files in their layers and
    copy them to my home directory—again, perhaps not the best solution.


    A more realistic alternative is the `docker cp` command. Like its Linux namesake,
    `cp`, `docker cp` lets me copy files between hosts and containers. I visualize
    containers as remote hosts and think of `docker cp` as equivalent to `scp` or
    `sftp`. The structure of `docker cp` is comparable to the `scp` command:


    ```

    scp [source file] [destination]

    docker cp [source file] [destination]

    ```


    The conventions are similar, too. The remote component is the host or container,
    followed by a colon and ending with a path or file name:


    ```

    scp [host or IP address]:[source file] [destination]

    docker cp [container name]:[source file] [destination]

    ```


    That’s certainly a more accessible and better way of transferring files, but for
    one thing. `docker cp` doesn’t honor wildcards. With `docker cp`, operations are
    limited to entire directories or individual files. Moving files between hosts
    and containers is inconvenient at best. There are other limitations to union filesystems,
    particularly for databases.


    ### Drawbacks of Union Filesystems


    Union filesystems are a significant piece of the magic behind containers, but
    they are not an ideal storage mechanism for databases:


    *   **They''re temporary**. Any data written to the container’s private layer
    is lost when removing the container. If I delete one of the containers shown in
    Figure [7-1](#514143_1_En_7_Chapter.xhtml#Fig1), I’m removing its union filesystem
    and the upper and working layers along with it.


    *   **The efficiency of union filesystems drops as the container''s private layer
    changes grow**. Every modification made against a file that’s part of the parent
    image adds to the work the host system must perform to generate the working view
    seen by the container. Getting the functional result involves reading files in
    the base and intermediate directories, then computing the difference. The overhead
    isn’t significant when the container remains close to the original image. Applications
    that write considerable amounts of data—like databases—add to the container’s
    upper layer, drawing resources to calculate results.


    *   **Layers in /var/lib/docker are limited to a single filesystem, by default,
    the boot volume**. Database capacity, performance, and redundancy are limited
    to the capabilities of this one disk, with no option to spread activity across
    multiple devices.


    Adding an Oracle spin on this is like running an Oracle database using the host’s
    boot volume for the `ORACLE_HOME` and data. Disk performance isn’t critical for
    the database software—once binaries are cached in memory after startup, activity
    is limited. The size of the database home remains reasonably stable over its lifetime,
    so capacity isn’t a concern, either.


    However, collocating data and archive log files on the same disk is a problem.
    The database can only grow to the physical limits of one disk. Adding RAID to
    protect database files applies to everything on the disk, whether or not that
    protection is warranted. Fortunately, Oracle gives us control over the placement
    of those database files, and mounts in Docker have a similar purpose for containers:
    mounted storage.'
  trans: '### Docker 冕部存储


    这些镜像和层仍然在磁盘上占用空间，位于 Docker 的 `/var/lib/docker` 目录中。该目录是运行 Docker Desktop 的 Windows
    和 Mac 系统底层 Linux 虚拟机的一部分。在 Linux 系统上，它是 Docker 安装的默认位置。^(⁴⁵) 无论哪种情况，只有特权 (`root`)
    用户可以浏览该目录，这是有充分理由的。其内容需要受到保护，以确保容器生态系统的健康。


    查看 `/var/lib/docker` 目录信息和内容的唯一实用方法是间接进行，要么通过 Docker CLI 命令报告元数据，要么连接到容器并检查其文件系统。这并非总是最方便的方式，尤其是在主机与容器之间共享信息时。


    考虑一个使用运行 Oracle 数据库的 Docker 容器来隔离潜在软件故障的故障排除场景。在某些时候，我需要从容器中获取文件与 Oracle 共享。怎么办？


    假设配置了 SMTP，我可以将文件通过电子邮件发送，或者从容器 shell 复制粘贴到本地主机的文件中。这两种方式都不太实用。我可以使用 `sudo` 进入
    `/var/lib/docker` 目录，并尝试在它们的层中定位文件，然后复制到我的主目录——这同样，可能也不是最佳解决方案。


    一个更现实的选择是 `docker cp` 命令。就像它的 Linux 同名命令 `cp` 一样，`docker cp` 允许我在主机和容器之间复制文件。我将容器视为主机，并将
    `docker cp` 视为等同于 `scp` 或 `sftp`。`docker cp` 的结构与 `scp` 命令类似：


    ```

    scp [source file] [destination]

    docker cp [source file] [destination]

    ```


    约定也很相似。远程组件是主机或容器，后跟冒号，最后是路径或文件名：


    ```

    scp [host or IP address]:[source file] [destination]

    docker cp [container name]:[source file] [destination]

    ```


    这无疑是一种更易用、更好的文件传输方式，但有一点例外。`docker cp` 不支持通配符。使用 `docker cp` 时，操作仅限于整个目录或单个文件。在主机和容器之间移动文件充其量是不方便的。联合文件系统还有其他限制，特别是对于数据库。


    ### 联合文件系统的缺点


    联合文件系统是容器背后的重要魔法组成部分，但它们并不是数据库的理想存储机制：


    *   **它们是临时的**。写入容器私有层的任何数据在移除容器时都会丢失。如果我删除图 7-1 中所示的一个容器，我就是在移除它的联合文件系统以及上层和工作层。

    *   **随着容器私有层变化的增长，联合文件系统的效率会下降**。对属于父镜像的文件进行的每一次修改都会增加宿主系统为生成容器看到的视图而必须执行的工作量。获取最终结果需要读取基础目录和中间目录中的文件，然后计算差异。当容器保持与原始镜像接近时，开销并不显著。写入大量数据的应用程序——如数据库——会增加容器的上层，消耗资源来计算结果。

    *   **`/var/lib/docker` 中的层默认仅限于单个文件系统，即启动卷**。数据库的容量、性能和冗余性仅限于这一个磁盘的能力，没有选项可以跨多个设备分散活动。


    用 Oracle 的视角来看，这就像使用主机的启动卷来运行 Oracle 数据库作为 `ORACLE_HOME` 和数据。磁盘性能对于数据库软件并不关键——二进制文件在启动后缓存在内存中后，活动就很有限。数据库主目录的大小在其生命周期内保持相当稳定，因此容量也不是问题。


    然而，将数据文件和归档日志文件放在同一个磁盘上是一个问题。数据库只能增长到单个磁盘的物理极限。为保护数据库文件而添加 RAID 保护适用于磁盘上的所有内容，无论是否需要该保护。幸运的是，Oracle
    允许我们控制这些数据库文件的放置，而 Docker 中的挂载点对容器有类似的目的：挂载存储。'
- fmt: '## Mount Concepts


    Mounts expand container storage beyond the union filesystem. Think of them as
    networked attached storage or shared filesystems (and containers can use network
    storage, too). They''re separate objects, independent of containers and their
    lifecycles. With mounts, containers can


    *   Use local storage on the host for persistence, better performance, and increased
    capacity

    *   Share files with the host or other containers

    *   Avoid the overhead of union filesystems for volatile directories

    *   Access files and directories that aren''t part of their parent image

    *   Distribute database files across multiple disks, improving performance, increasing
    capacity, and controlling redundancy


    As you work with mounts, particularly with databases, you''ll see how they expose
    differences between software, configuration, and data. The container in Figure
    7-2 uses mounts to separate relatively static components of an Oracle database
    from its data, configuration, logs, and scripts. The advantages of such an approach
    are significant:


    *   The database software and its dependencies are built into an image. Database
    software doesn''t change much, and an immutable image is the most appropriate
    and efficient provisioning method. Any database started from this image is guaranteed
    to have the same version and patches baked in.^([^(46)](#fn46)) The few changes
    that might appear in these directories aren''t significant to the performance
    of the container''s union filesystem.

    *   Files that combine to make up the database instance—data, temp, control, redo,
    and archive log files—exist on dedicated storage, taking advantage of high-performance
    and redundant disks. Configuration files needed to start and operate a database—including
    the password, parameter, `oratab`, and networking configurations—are separate
    from software and data. This and the data are the most necessary parts of an Oracle
    database. Cloning or copying these files is all that''s needed to create an identical
    copy of the database. Thanks to Docker''s portability, that copy can be on the
    same system, a colleague''s machine running a different operating system, or the
    cloud.

    *   Saving diagnostic directories to disk makes them visible to processes on the
    host and remains available even if the database container is stopped. Log monitoring
    and rotation can run from the container host rather than on the database.

    *   Using mounts for shared support scripts is more sensible than adding them
    to the parent image. While these scripts might remain unchanged, sharing them
    among containers over a mount is better. Leaving them out of the image leads to
    smaller images that don''t need updating to include modified scripts, nor do those
    changes have to be propagated to running containers.


    Oracle adopted a similar approach with `Read-Only Homes`, a feature introduced
    in Oracle Database 18c. Once mixed into the software directories, configuration
    files, like the password and parameter files and network configurations, are now
    stored separately from the `ORACLE_HOME`. It makes cloning and restoring databases
    easier and increases the distinction between the database instance and the database
    software.


    `Read-Only Homes` and mounts lend themselves to a more modular way of thinking
    about database components. Look at Figure 7-2 and note how different types of
    files are divided between the container''s union filesystem and mounts.


    ![](images/514143_1_En_7_Chapter/514143_1_En_7_Fig2_HTML.jpg)


    A schematic representation has a database container with different directories.
    The left side has three cylindrical structures for external and shared external
    volume.


    Figure 7-2


    An Oracle database running in a container, with relatively static content built
    into the image. The data, logs, and configuration files are separated onto mounts
    dedicated to the database(s) running in the container. The scripts directory is
    mounted to a filesystem shared with multiple containers


    Notice that the relatively static content, including the database software home
    and inventory directories, are in the container''s filesystem. Volatile content,
    like datafiles and logs under Oracle''s diagnostic directory in `/opt/oracle/diag`,
    are separated onto volumes. Configuration files under `$ORACLE_HOME/dbs` and `$ORACLE_HOME/network/admin`
    are linked from their expected locations to a subdirectory under `/opt/oracle/oradata`,
    too, which in turn saves them to the database volume.


    Mounts aren''t limited to data and configuration. The `/scripts` directory in
    this example is mounted to a shared filesystem, giving every container access
    to a common library of scripts and utilities.


    ## Volumes vs. Volumes


    Before venturing any further, I want to clarify some terminology. In Docker, `volume`
    has multiple meanings and is often used loosely to describe or reference any external
    storage mounted to a container. Officially, a "volume" in Docker describes two
    things:


    *   A directory, defined in a `Dockerfile`, which may be associated with a container
    host resource. The path of the volume is part of the image metadata. You can assign
    persistent storage for the volume when creating a new container. Oracle''s container
    repository images define a volume at `/opt/oracle/oradata`.

    *   A Docker object used as a target for persisting container data.


    A `Docker Volume` (the latter, object definition) can be a source for a volume
    directory (the former, path in the image metadata). But "volume" is often used
    informally (and incorrectly) to describe *any* type of storage mounted outside
    the container''s union filesystem, whether or not it''s actually a `Docker Volume`.


    If that''s not already confusing enough, the `docker run` command has a `-v` or
    `--volume` option that maps storage to a container. So, we use the `--volume`
    option to map `Docker Volumes` to `volumes` when creating containers!


    Let''s break down the different methods of storage attachment to help navigate
    these overlapping terms.


    ## Mount Types


    The only time for attaching storage to containers is during initial creation,
    using options in the `docker run` command. There''s no going back to edit or add
    it later, so it''s essential to get it right! That means understanding the types
    of storage, their purpose, and their advantages or limits. The two types used
    most with our databases are `bind mounts` and `volumes`. Two additional types,
    `tmpfs`, and a special case, `secrets`, are less common.


    ### Bind Mount


    You''ve already seen `bind mounts` used to persist data to the local filesystem.
    Bind mounts map files and directories in containers to files and directories on
    hosts. They''re arguably more familiar and comfortable for anyone new to Docker
    and containers, and the method Oracle demonstrates in their container repository
    documentation. The advantage of bind mounts is convenience and, ostensibly, visibility.
    Using the `/opt/oracle/oradata` volume directory of an Oracle database container
    as an example, I can navigate to the directory on my local machine to view and
    manage its contents:


    ```

    ~/oradata> du -sh ./*

    1.5G     ./ORA11G

    2.0G     ./ORA12C

    2.9G     ./ORA19C

    4.8G     ./ORA21C

    ```


    I mapped multiple containers to separate subdirectories under `$HOME/oradata`
    and can use standard Linux commands to view and manage those directories. Their
    space consumption is readily visible using the `du` command.


    Assigning bind mounts to containers during `docker run` is straightforward, and
    the host directory doesn''t even have to exist! The directory is part of the host
    filesystem,^([^(47)](#fn47)) and the same familiar Linux commands used elsewhere
    on the Docker host work in the mapped directory. There are no extra commands or
    prerequisites needed to use bind mounts. What''s not to love?'
