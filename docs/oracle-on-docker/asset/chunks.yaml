- fmt: "### Ignore Files\n\nWe discussed separating context earlier, exploring a directory\
    \ structure for building similar images:\n\n```\n19c\n├── 19.15\n│   ├── Dockerfile\n\
    │   ├── LINUX.X64_193000_db_home.zip\n│   ├── p6880880_190000_Linux-x86-64.zip\n\
    │   └── patch-for-1915-RU.zip\n└── 19.16\n    ├── Dockerfile\n    ├── LINUX.X64_193000_db_home.zip\n\
    \    ├── p6880880_190000_Linux-x86-64.zip\n    └── patch-for-1916-RU.zip\n```\n\
    \nThe first two files in each subdirectory are identical. Docker doesn’t allow\
    \ links or aliases in the build context, and it appeared there was no good solution\
    \ that prevented duplicating the files other than putting them all in one directory:\n\
    \n```\n19c\n├── Dockerfile\n├── LINUX.X64_193000_db_home.zip\n├── p6880880_190000_Linux-x86-64.zip\n\
    ├── patch-for-1915-RU.zip\n└── patch-for-1916-RU.zip\n```\n\nNow we have a single\
    \ copy of the software media and OPatch files, but left wondering which version\
    \ the `Dockerfile` belongs to! Fortunately, you learned earlier that we could\
    \ specify custom Dockerfiles with the `-f` option, meaning we can write different\
    \ `Dockerfile` recipes for each database version:\n\n```\n19c\n├── Dockerfile.19.15\n\
    ├── Dockerfile.19.16\n├── LINUX.X64_193000_db_home.zip\n├── p6880880_190000_Linux-x86-64.zip\n\
    ├── patch-for-1915-RU.zip\n└── patch-for-1916-RU.zip\n```\n\nThen, build either\
    \ version by calling the appropriate `Dockerfile`:\n\n```\ndocker build -f Dockerfile.19.15\
    \ .\ndocker build -f Dockerfile.19.16 .\n```\n\nThis eliminates duplicate files,\
    \ but now both patch files are in context. When building a database patched with\
    \ the 19.15 version, `docker build` reads both the 19.15 and 19.16 patches. That\
    \ might not matter if there are just a few small patches, but in reality, we’re\
    \ more likely to encounter growing numbers of patches added during Oracle’s quarterly\
    \ updates.\n\nAn ignore file could solve this, telling the build to ignore all\
    \ but the desired patch:\n\n```\n# Ignore all files:\n*\n# Add an exception for\
    \ LINUX.X64_193000_db_home.zip:\n!LINUX.X64_193000_db_home.zip\n# Add an exception\
    \ for p6880880_190000_Linux-x86-64.zip p:\n!p6880880_190000_Linux-x86-64.zip\n\
    # Add an exception for the 19.15 patch:\n!patch-for-1915-RU.zip\n```\n\nThe ignore\
    \ file limits Docker’s context to the three files used for building a version\
    \ 19.15 database. However, it breaks builds for version 19.16! `docker build`\
    \ has no facility for referencing a custom ignore file, only the default, `.dockerignore`.\n\
    \nBuildKit solves this. Rather than introducing a switch for picking an ignore\
    \ file, it adds support for custom ignore files with names derived from custom\
    \ Dockerfiles.\n\nTypically, the build looks for a file named `.dockerignore`\
    \ in the same directory as the `Dockerfile`. When BuildKit features are enabled,\
    \ it first looks for an ignore file with the same name as the `Dockerfile`, suffixed\
    \ by “`.dockerignore`.” If it doesn’t find a custom ignore file, it searches next\
    \ for a file with the default name.\n\nNow, each `Dockerfile` version can have\
    \ its own ignore file:\n\n```\n19c\n├── Dockerfile.19.15\n├── Dockerfile.19.15.dockerignore\n\
    ├── Dockerfile.19.16\n├── Dockerfile.19.16.dockerignore\n├── LINUX.X64_193000_db_home.zip\n\
    ├── p6880880_190000_Linux-x86-64.zip\n├── patch-for-1915-RU.zip\n└── patch-for-1916-RU.zip\n\
    ```\n\nCustom ignore files, tied to version-specific Dockerfiles, address the\
    \ build context problem created by consolidating duplicate or common files into\
    \ a single directory!\n\n### BuildKit Syntax\n\nCertain BuildKit features must\
    \ be enabled at the top of the `Dockerfile` as a comment identifying the frontend\
    \ builder version. For instance:\n\n```\n# syntax=docker/dockerfile:1.4\n```\n\
    \nSyntax directives enable new build features and bug fixes without requiring\
    \ an update of the Docker daemon and allow users to test experimental features.\
    \ These typically enable advanced components. If BuildKit isn’t enabled, the syntax\
    \ directive behind the comment is simply ignored.\n\n## Summary\n\nImages, and\
    \ the automation they contain, might seem mysterious or even magical at first.\
    \ After pulling back the curtain, it’s clear that there’s nothing unusual or special\
    \ going on, just shell scripts and ordinary Linux commands!\n\nYou can build images\
    \ and assign names with your new understanding of Docker’s build syntax. You’ve\
    \ seen the similarities between build arguments in images and environment variables\
    \ in containers and learned how to extend Dockerfiles by dynamically adding functionality\
    \ and flexibility with build arguments.\n\nWe discussed features for gaining control\
    \ over the build cache and tools for viewing and managing the artifacts left behind\
    \ during builds. As your container use grows, I promise the purge commands we\
    \ covered will prove their worth!\n\nOne of the challenges I’ve encountered while\
    \ building database images is managing the source files—the database installation\
    \ media and patches needed for each version. Preventing duplicates and tracking\
    \ file versions is easier with files centrally located in a single, dedicated\
    \ inventory. Saving space by condensing everything into one location comes with\
    \ a cost, and every file contributes to the potential build context. Employing\
    \ named Dockerfiles, alongside custom ignore files enabled through BuildKit, avoids\
    \ any need to sacrifice context against control.\n\nWith this knowledge, building\
    \ images should feel less intimidating, and I hope you’ll consider stitching together\
    \ a few of your own! Like anything, there’s a learning curve, but don’t let that\
    \ stop you! While you’re sure to encounter some bumps along the way, I’ve shared\
    \ some of the troubleshooting and debugging techniques I’ve found helpful when\
    \ working with images and containers in the next chapter!\n\nFootnotes [1](#514143_1_En_14_Chapter.xhtml#Fn1_source)\
    \ [2](#514143_1_En_14_Chapter.xhtml#Fn2_source) [3](#514143_1_En_14_Chapter.xhtml#Fn3_source)\
    \ [4](#514143_1_En_14_Chapter.xhtml#Fn4_source) [5](#514143_1_En_14_Chapter.xhtml#Fn5_source)\
    \ [6](#514143_1_En_14_Chapter.xhtml#Fn6_source) [7](#514143_1_En_14_Chapter.xhtml#Fn7_source)\
    \ [8](#514143_1_En_14_Chapter.xhtml#Fn8_source) [9](#514143_1_En_14_Chapter.xhtml#Fn9_source)\n\
    \n# 15. Debugging and Troubleshooting\n\n“New” and “different” are often intimidating\
    \ and scary. We’re forced to learn or invent new approaches to familiar or comfortable\
    \ tasks and perhaps even alter our perceptions and understanding. Tried and true\
    \ is stable, even secure.\n\nYet everything we do, especially in IT, was once\
    \ new and different. I started on Oracle 7, long before the days of RMAN, Real\
    \ Application Clusters, or Data Guard. The cloud? Not a thing. Exadata was still\
    \ a dream. Today, I take them for granted as part of my day-to-day work with Oracle,\
    \ but I had to learn my way around each technology at some point.\n\nDocker is\
    \ no different. When I started working with containers, I didn’t fully grasp the\
    \ relationship between images and containers or realize that builds were a series\
    \ of “run an image in a container, do something, save the result as an image,\
    \ repeat” operations. Understanding that made it easier to see how and where to\
    \ troubleshoot the process.\n\nI read an article recently by a new developer who\
    \ said the second worst part of their job was not understanding why code didn’t\
    \ work. (The worst? Not understanding why their code *did* work!) This chapter\
    \ discusses approaches and recipes to help navigate the new and different world\
    \ of containers! I’ll cover ways of extracting information from failing images\
    \ and containers that lead to understanding what happened, why it happened, and\
    \ how to fix it!\n\nMost of this isn’t new in its own right—echoing variables\
    \ from scripts goes back decades, at least. But how these methods are applied\
    \ and work in containers isn’t always obvious or intuitive."
  raw: '### Ignore Files


    We discussed separating context earlier, exploring a directory structure for building
    similar images:


    ```

    19c

    ├── 19.15

    │   ├── Dockerfile

    │   ├── LINUX.X64_193000_db_home.zip

    |   ├── p6880880_190000_Linux-x86-64.zip

    │   └── patch-for-1915-RU.zip

    └── 19.16

    ├── Dockerfile

    ├── LINUX.X64_193000_db_home.zip

    ├── p6880880_190000_Linux-x86-64.zip

    └── patch-for-1916-RU.zip

    ```


    The first two files in each subdirectory are identical. Docker doesn’t allow links
    or aliases in the build context, and it appeared there was no good solution that
    prevented duplicating the files other than putting them all in one directory:


    ```

    19c

    ├── Dockerfile

    ├── LINUX.X64_193000_db_home.zip

    ├── p6880880_190000_Linux-x86-64.zip

    ├── patch-for-1915-RU.zip

    └── patch-for-1916-RU.zip

    ```


    Now we have a single copy of the software media and OPatch files, but left wondering
    which version the Dockerfile belongs to! Fortunately, you learned earlier that
    we could specify custom Dockerfiles with the `-f` option, meaning we can write
    different Dockerfile recipes for each database version:


    ```

    19c

    ├── Dockerfile.19.15

    ├── Dockerfile.19.16

    ├── LINUX.X64_193000_db_home.zip

    ├── p6880880_190000_Linux-x86-64.zip

    ├── patch-for-1915-RU.zip

    └── patch-for-1916-RU.zip

    ```


    Then, build either version by calling the appropriate Dockerfile:


    ```

    docker build -f Dockerfile.19.15 .

    docker build -f Dockerfile.19.16 .

    ```


    This eliminates duplicate files, but now both patch files are in context. When
    building a database patched with the 19.15 version, `docker build` reads *both*
    the 19.15 *and* 19.16 patches. That might not matter if there are just a few small
    patches, but in reality, we’re more likely to encounter growing numbers of patches
    added during Oracle’s quarterly updates.


    An ignore file could solve this, telling the build to ignore all but the desired
    patch:


    ```

    # Ignore all files:

    *

    # Add an exception for LINUX.X64_193000_db_home.zip:

    !LINUX.X64_193000_db_home.zip

    # Add an exception for p6880880_190000_Linux-x86-64.zip p:

    !p6880880_190000_Linux-x86-64.zip

    # Add an exception for the 19.15 patch:

    !patch-for-1915-RU.zip

    ```


    The ignore file limits Docker’s context to the three files used for building a
    version 19.15 database. However, it breaks builds for version 19.16! `docker build`
    has no facility for referencing a custom ignore file, only the default, `.dockerignore`.


    BuildKit solves this. Rather than introducing a switch for picking an ignore file,
    it adds support for custom ignore files with names derived from custom Dockerfiles.


    Typically, the build looks for a file named `.dockerignore` in the same directory
    as the Dockerfile. When BuildKit features are enabled, it first looks for an ignore
    file with the same name as the Dockerfile, suffixed by “`.dockerignore`.” If it
    doesn’t find a custom ignore file, it searches next for a file with the default
    name.


    Now, each Dockerfile version can have its own ignore file:


    ```

    19c

    ├── Dockerfile.19.15

    ├── Dockerfile.19.15.dockerignore

    ├── Dockerfile.19.16

    ├── Dockerfile.19.16.dockerignore

    ├── LINUX.X64_193000_db_home.zip

    ├── p6880880_190000_Linux-x86-64.zip

    ├── patch-for-1915-RU.zip

    └── patch-for-1916-RU.zip

    ```


    Custom ignore files, tied to version-specific Dockerfiles, address the build context
    problem created by consolidating duplicate or common files into a single directory!


    ### BuildKit Syntax


    Certain BuildKit features must be enabled at the top of the Dockerfile as a comment
    identifying the frontend builder version. For instance:


    ```

    # syntax=docker/dockerfile:1.4

    ```


    Syntax directives enable new build features and bug fixes without requiring an
    update of the Docker daemon and allow users to test experimental features. These
    typically enable advanced components. If BuildKit isn’t enabled, the syntax directive
    behind the comment is simply ignored.


    ## Summary


    Images, and the automation they contain, might seem mysterious or even magical
    at first. After pulling back the curtain, it’s clear that there’s nothing unusual
    or special going on, just shell scripts and ordinary Linux commands!


    You can build images and assign names with your new understanding of Docker’s
    build syntax. You’ve seen the similarities between build arguments in images and
    environment variables in containers and learned how to extend Dockerfiles by dynamically
    adding functionality and flexibility with build arguments.


    We discussed features for gaining control over the build cache and tools for viewing
    and managing the artifacts left behind during builds. As your container use grows,
    I promise the purge commands we covered will prove their worth!


    One of the challenges I’ve encountered while building database images is managing
    the source files—the database installation media and patches needed for each version.
    Preventing duplicates and tracking file versions is easier with files centrally
    located in a single, dedicated inventory. Saving space by condensing everything
    into one location comes with a cost, and every file contributes to the potential
    build context. Employing named Dockerfiles, alongside custom ignore files enabled
    through BuildKit, avoids any need to sacrifice context against control.


    With this knowledge, building images should feel less intimidating, and I hope
    you’ll consider stitching together a few of your own! Like anything, there’s a
    learning curve, but don’t let that stop you! While you’re sure to encounter some
    bumps along the way, I’ve shared some of the troubleshooting and debugging techniques
    I’ve found helpful when working with images and containers in the next chapter!


