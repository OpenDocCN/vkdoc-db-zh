  trans: "### 清理镜像\n\n镜像也有对应的清理选项：\n\n```\ndocker image prune\n```\n\n`image prune`\
    \ 命令会移除“悬空”的镜像——即未被任何容器使用且没有标签名的镜像：\n\n```\n> docker image prune\nWARNING! This\
    \ will remove all dangling images.\nAre you sure you want to continue? [y/N] y\n\
    Total reclaimed space: 0B\n```\n\n悬空镜像通常是由于重新构建现有镜像并使用了相同的标签而产生的。如果有任何容器仍在使用旧镜像，Docker\
    \ 会将其取消标签。这个 `docker ps` 的简化输出显示了两个容器，一个使用旧的（未加标签的）镜像（仅通过其镜像 ID 标识），另一个使用更新的、已加标签的版本：\n\
    \n```\n> docker ps\nNAMES        IMAGE\nORA19c_old   f53962475832\nORA19c_new\
    \   oracle/database:19.3.0-ee\n```\n\n在 `docker images` 的输出中，悬空镜像没有仓库或标签：\n\n\
    ```\n# docker images\nREPOSITORY       TAG        IMAGE ID      CREATED      \
    \ SIZE\noracle/database  19.3.0-ee  94d27a821d52  4 weeks ago   6.67GB\n     \
    \           f53962475832  4 months ago  6.53GB\n```\n\n`docker image prune` 不会移除悬空的镜像——前提是仍有容器在使用它。在移除对悬空镜像的所有依赖后，`docker\
    \ image prune` 会将其删除。\n\n### 清理容器\n\n清理镜像相对安全。然而，你应该谨慎使用 `docker container prune`！清理容器会从系统中移除所有已停止的容器：\n\
    \n```\n> docker container prune\nWARNING! This will remove all stopped containers.\n\
    Are you sure you want to continue? [y/N] y\nTotal reclaimed space: 0B\n```\n\n\
    已停止的容器不一定就是废弃的！请小心使用此命令！\n\n### 清理系统\n\n如果你真想用一条命令清理系统上的所有内容，可以使用 `docker system\
    \ prune`。它会移除已停止的容器、悬空的镜像、未使用的网络以及构建缓存：\n\n```\n> docker system prune\nWARNING!\
    \ This will remove:\n- all stopped containers\n- all networks not used by at least\
    \ one container\n- all dangling images\n- all dangling build cache\nAre you sure\
    \ you want to continue? [y/N] y\nTotal reclaimed space: 0B\n```\n\n`docker container\
    \ prune` 所提出的同样警告也适用于系统清理命令。\n\n## 哪种卷类型最佳？\n\n你已经了解了几种在容器外部保存和维护数据库内容的方法，但哪种最好呢？有几个标准会影响容器存储的选择：\n\
    \n*   **访问与导航：** 容器数据保存到卷后，是否对本地操作系统上的用户可见？\n*   **Docker 管理：** Docker 是否将存储作为对象进行管理，将其与容器关联，并报告卷是否被使用？\n\
    *   **目录创建：** Docker 是否会自动在主机上创建不存在的目录路径？\n*   **目录所有权：** 对于自动创建的目录，所有权设置是否正确？\n\
    *   **备份与保存数据：** 有哪些可用的机制来复制和保存数据？\n*   **跨平台一致性：** 该解决方案在所有平台（Windows、Mac 和 Linux）上的行为是否一致？\n\
    \n让我们看看每种存储选项如何处理这些场景。我想重点讨论对 Oracle 数据库和用户的影响，包括创建容器和支持对象所需的步骤，以及备份或复制数据库 `oradata`\
    \ 卷内容的难易程度。\n\n### 未使用卷\n\n未使用卷创建的容器将其数据存储在其联合文件系统的上层。容器创建很简单。没有与目录创建或所有权相关的问题，并且它在每个操作系统上的工作方式都相同。但是，用户无法实际访问数据库的\
    \ `oradata` 卷。\n\n运行时不使用卷选项的容器将数据保留在 Docker 的私有存储中。随着数据库的增长，增加空间并非易事，而且它是单一存储桶，可能无法满足性能要求。该空间还与主机上的所有容器共享，因此除了本地实现和\
    \ I/O 性能要求较低的环境外，它不适合作为其他任何用途的方法。\n\n### 绑定挂载\n\n绑定挂载通过将容器目录映射到主机上的存储，大大改善了情况。保存到主机操作系统的文件对用户可见，并且我们可以备份和复制\
    \ `oradata` 卷的内容。然而，绑定挂载在之前概述的四个测试标准上都失败了。\n\n#### 容器关联与孤立目录\n\n绑定挂载目录并不会明确地将它们与容器关联起来。运行\
    \ `docker container inspect` 会显示绑定挂载的源和目标，如下例所示（已格式化，仅显示挂载信息）：\n\n```\n> docker\
    \ inspect -f \"{{ .Mounts }}\" ORCL\n[{bind  /oradata/ORCL /opt/oracle/oradata\
    \   true rprivate}]\n```\n\n然而，除了检查系统上的所有容器外，没有好的方法来确定 `/oradata/ORCL` 是否正被任何容器使用。绑定挂载很容易让人失去对孤立目录的追踪。\n\
    \n#### 挂载方法\n\n挂载方法会影响 Docker 是否自动创建不存在的目录。当我使用 `--volume` 或 `-v` 选项时，Docker 会创建该目录。在这里，我创建一个\
    \ Alpine 容器，挂载一个名为 `$HOME/test_volume` 的、尚不存在的目录，并列出其内容：\n\n```\n> docker run\
    \ \\\n--volume $HOME/test_volume:/test_volume \\\nalpine ls -l /test_volume\n\
    total 0\n> ls -l $HOME\ndrwxr-xr-x  2 root root       4096 Sep 18 19:36  test_volume\n\
    ```\n\n但是，如果我运行相同的命令，这次使用 `--mount` 选项来挂载另一个不存在的目录 `$HOME/test_mount`，它会失败：\n\n\
    ```\n> docker run \\\n--mount type=bind,source=$HOME/test_mount,target=/test_mount\
    \ \\\nalpine ls -l /test_mount\ndocker: Error response from daemon: invalid mount\
    \ config for type \"bind\": bind source path does not exist: /home/sean/test_mount.\n\
    See 'docker run --help'.\n```"
- fmt: '#### Directory Ownership


    The preceding `--volume` example ran on a Linux machine and created the directory,
    `$HOME/test_volume`, for me. But look at the contents of my `$HOME` folder after
    running the container:


    ```

    > ls -l $HOME

    drwxrwxr-x 32 sean sean       4096 Aug 20 17:06  docker-images

    drwxr-xr-x  2 root root       4096 Sep 18 19:36  test_volume

    ```


    Notice anything odd?


    The newly created directory, `test_volume`, is owned by `root`.


    I called `docker run` as a non-`root` user without using `sudo`. How, then, did
    I manage to create the new directory owned by `root` in my home directory?


    Docker creates nonexistent directories within its daemon, and they inherit their
    ownership from the user running the daemon process. On Linux systems, the daemon
    runs as the `root` user. `root`, therefore, owns the newly created directories.


    This creates problems for Oracle database containers on Linux systems and those
    initiated from a Linux command prompt in Windows Subsystem for Linux. Docker creates
    the directory as `root`. Oracle processes running within the container can’t write
    to the directory, and if that happens to be the mount point for `/opt/oracle/oradata`,
    the Database Configuration Assistant fails!


    ##### Mac and Windows


    This isn’t an issue for Mac or Windows, provided you issue the `docker run` command
    within a session running from the native Windows operating system. In these cases,
    the daemon runs as the local user, and the Oracle processes in the container have
    permission to add files in the newly created directories. Starting containers
    from Docker Desktop circumvents this issue, too. The “Run a new container” dialog
    in Figure [7-4](#514143_1_En_7_Chapter.xhtml#Fig4) lets users create a mount,
    assigning a host directory to a container target. (Despite how it may appear,
    defining a Host path under the Volumes section of the dialog does **not** create
    a Docker Volume.)


    ![](images/514143_1_En_7_Chapter/514143_1_En_7_Fig4_HTML.jpg)


    A screenshot to run a new container has options for optional settings, ports,
    volumes, and environmental variables. The bottom right side has buttons for cancel
    and run.


    Figure 7-4


    The Docker Desktop “Run a new container” dialog allows users to assign a local
    directory to a target in the new container


    ##### Linux and WSL Workaround


    Users in Linux and WSL environments can work around this by precreating the directories
    and setting directory ownership:


    ```

    sudo mkdir -p /oradata/ORCL

    sudo chown oracle:oinstall /oradata/ORCL

    ```


    Setting ownership to `oracle:oinstall` means the user and group must exist, with
    the same user and group ID specified in containers by the Linux preinstall RPMs:


    ```

    sudo groupadd -g 54321 oinstall

    sudo useradd -u 54321 -g oinstall

    ```


    Alternately, you can assign the directory ownership to the Docker process ID,
    1000:


    ```

    sudo chown 1000 /oradata/ORCL

    ```


    Bind mounts are a good, but not great, solution for database storage, mainly if
    you’re using a Mac or running everything from Docker Desktop. Users working on
    multiple operating systems or environments will likely encounter limitations and
    peculiar or annoying behaviors.


    ### Local Volumes


    With local volumes, users graduate onto objects fully managed by Docker. Whether
    in Docker Desktop or at the command line, containers and their volumes are visibly
    associated, making the relationships more manageable.


    Recall from the section on volume pruning that local volumes are created without
    any type and show nothing in the Options output of `docker volume inspect`.


    Local volumes are Docker objects and behave consistently on all operating systems.
    Docker provides tools for saving directories and files on volumes and sharing
    volume contents among containers.


    However, since local volumes save data inside Docker’s private directory, they
    suffer many of the same shortcomings as saving data with no mount or volume. Data
    in local volumes isn’t visible from the local operating system, and they’re subject
    to the same limitations to performance and space.


    ### Bind-Mounted Volumes


    Bind-mounting volumes combines the best of bind mounts with the advantages of
    Docker-managed objects. Files saved to the host filesystem are visible to users
    and processes—including backups. Docker Desktop or the Docker CLI manages relationships
    between containers and bind-mounted volumes, as with local volumes.


    Unfortunately, Docker Desktop doesn’t currently offer an option for creating volumes
    with bind mounts, forcing us to perform at least this step from the command line.


    Let’s compare behaviors between regular bind mounts and volumes that use bind
    mounts.


    #### Directory Creation


    I’ll first create a bind mount using the directory `$HOME/test_bind`:


    ```

    > docker volume create --opt type=none --opt o=bind \

    --opt device=$HOME/test_bind test_bind

    test_bind

    ```


    So far, so good. Now I try running a test similar to the one I performed before,
    this time mapping a directory in the container to the volume:


    ```

    > docker run \

    >         --volume test_bind:/test_bind \

    >         alpine ls -l /test_bind

    docker: Error response from daemon: error while mounting volume ''/docker/volumes/test_bind/_data'':
    failed to mount local volume: mount /home/docker/test_bind:/docker/volumes/test_bind/_data,
    flags: 0x1000: no such file or directory.

    ERRO[0000] error waiting for container: context canceled

    ```


    Creating the bind-mounted volume didn’t make the directory! Let’s take care of
    that and try again:


    ```

    > mkdir -p $HOME/test_bind

    > docker run \

    >        --volume test_bind:/test_bind \

    >        alpine ls -l /test_bind

    total 0

    ```


    This time it works! I created the directory as the local user on the system, meaning
    it’s not owned by root. But how will this affect our database containers?


    #### Directory Ownership and Permissions


    Remember in the earlier bind mount example that Oracle database processes running
    inside containers on Linux systems needed specific permissions on the host directory.
    Else, the Database Configuration Assistant fails with “permission denied” errors
    when creating a database. I’ll test this, creating a new directory and volume
    for an Oracle database container:


    ```

    > docker volume create --opt type=none --opt o=bind \

    >        --opt device=$HOME/oracle_bind oracle_bind

    oracle_bind

    > mkdir -p $HOME/oracle_bind

    ```


    There’s nothing unusual about the ownership on the new directory:


    ```

    > ls -l $HOME

    total 7386868

    drwxrwxr-x 32 sean sean       4096 Aug 20 17:06  docker-images

    drwxr-xr-x  3 sean sean         21 Sep 18 22:11  oracle_bind

    ```


    Without doing anything special with the newly created `$HOME/oracle_bind` directory,
    I start a container, mapping the oradata directory to the volume:


    ```

    > docker run -d --name bind_test \

    >        -v oracle_bind:/opt/oracle/oradata \

    >        oracle/database:19.3.0-ee

    d2b25b1f661d7f243984fdcbd77177beb14dc61be9525d421426e0d609917f31

    ```


    However, once DBCA starts in the container, something unusual happens to this
    directory:


    ```

    > ls -l $HOME

    total 7386868

    drwxrwxr-x 32 sean   sean       4096 Aug 20 17:06  docker-images

    drwxr-xr-x  4 oracle 54322        61 Sep 18 22:26  oracle_bind

    ```


    Docker changed the directory ownership! While the Docker daemon runs as root,
    processes inside the container propagate the expected ownership to the daemon,
    which makes the necessary changes on the container host.'
  raw: '#### Directory Ownership


    The preceding `--volume` example ran on a Linux machine and created the directory,
    `$HOME/test_volume`, for me. But look at the contents of my `$HOME` folder after
    running the container:


    ```

    > ls -l $HOME

    drwxrwxr-x 32 sean sean       4096 Aug 20 17:06  docker-images

    drwxr-xr-x  2 root root       4096 Sep 18 19:36  test_volume

    ```


    Notice anything odd?


    The newly created directory, `test_volume`, is owned by `root`.


    I called `docker run` as a non-`root` user without using `sudo`. How, then, did
    I manage to create the new directory owned by `root` in my home directory?


    Docker creates nonexistent directories within its daemon, and they inherit their
    ownership from the user running the daemon process. On Linux systems, the daemon
    runs as the `root` user. `root`, therefore, owns the newly created directories.


    This creates problems for Oracle database containers on Linux systems and those
    initiated from a Linux command prompt in Windows Subsystem for Linux. Docker creates
    the directory as `root`. Oracle processes running within the container can’t write
    to the directory, and if that happens to be the mount point for `/opt/oracle/oradata`,
    the Database Configuration Assistant fails!


    This isn’t an issue for Mac or Windows, provided you issue the `docker run` command
    within a session running from the native Windows operating system. In these cases,
    the daemon runs as the local user, and the Oracle processes in the container have
    permission to add files in the newly created directories. Starting containers
    from Docker Desktop circumvents this issue, too. The “Run a new container” dialog
    in Figure [7-4](#514143_1_En_7_Chapter.xhtml#Fig4) lets users create a mount,
    assigning a host directory to a container target. (Despite how it may appear,
    defining a Host path under the Volumes section of the dialog does *not* create
    a Docker Volume.)


    ![](images/514143_1_En_7_Chapter/514143_1_En_7_Fig4_HTML.jpg)


    A screenshot to run a new container has options for optional settings, ports,
    volumes, and environmental variables. The bottom right side has buttons for cancel
    and run.


    Figure 7-4


    The Docker Desktop “Run a new container” dialog allows users to assign a local
    directory to a target in the new container


    Users in Linux and WSL environments can work around this by precreating the directories
    and setting directory ownership:


    ```

    sudo mkdir -p /oradata/ORCL

    sudo chown oracle:oinstall /oradata/ORCL

    ```


    Setting ownership to `oracle:oinstall` means the user and group must exist, with
    the same user and group ID specified in containers by the Linux preinstall RPMs:


    ```

    sudo groupadd -g 54321 oinstall

    sudo useradd -u 54321 -g oinstall

    ```


    Alternately, you can assign the directory ownership to the Docker process ID,
    1000:


    ```

    sudo chown 1000 /oradata/ORCL

    ```


    Bind mounts are a good, but not great, solution for database storage, mainly if
    you’re using a Mac or running everything from Docker Desktop. Users working on
    multiple operating systems or environments will likely encounter limitations and
    peculiar or annoying behaviors.


