  trans: '### 创建非 CDB 数据库


    在 Oracle 12c 至 19c 版本中，官方可能更倾向于我们创建和使用**容器数据库**。然而，在实际部署中，非 CDB 安装仍占据主导地位，并且在接下来的几年里很可能继续保持多数。因此，我们应当能够选择在容器中创建的架构，这是合理的。第
    11 章介绍了向`docker run`传递选项以在容器与非容器架构之间进行选择的步骤。简而言之，它涉及：


    *   更新`dbca.rsp.tmpl`模板，将硬编码的`createAsContainerDatabase`值替换为一个占位符。当一个新容器启动时，它会调用`createDB.sh`脚本，并引用**数据库配置助手**（`DBCA`）模板进行数据库创建。该占位符引入了通过替换环境变量来改变数据库创建方法的选项。

    *   添加一个`sed`查找/替换命令，根据一个可选的环境变量，有条件地将`true`或`false`代入`DBCA`模板。

    *   修改`checkDBStatus.sh`中的数据库健康检查，以便从`v$pdbs`（用于容器数据库）或`v$database`（用于非容器数据库）中读取打开模式的值。

    *   有条件地从数据库创建脚本中移除特定于可插拔数据库的命令。


    这个模式，无论是全部还是部分，都可以被调整，以在数据库创建和启动过程中添加类似的功能。


    ### 创建多个可插拔数据库


    可插拔数据库可以通过将多个独立数据库整合到单台主机上的可插拔数据库（PDB）中，从而提升数据库基础设施的效用、容量和使用寿命。与模式类似，PDB 提供了另一种对数据进行分段或隔离的方式，而一个容器数据库容纳两个或更多
    PDB 的情况并不少见。将这一实践反映到数据库镜像中是合理的，即在初始容器创建时增加创建多个 PDB 的能力。有两种途径可以实现这一点。第一种方法是更改`DBCA`模板并从环境中读取变量。第二种方法是利用
    Docker 入口点目录，在数据库设置完成后运行脚本。


    第一种方法与创建非 CDB 数据库类似，即向数据库配置助手模板插入一个占位符，并添加一个`sed`命令，根据环境派生的值有条件地替换该占位符。`DBCA`模板中的关键项是`numberOfPDBs`，其默认值为
    1：


    ```

    numberOfPDBs=1

    ```


    将其替换为占位符：


    ```

    numberOfPDBs=###PDB_COUNT###

    ```


    在`createDB.sh`脚本中添加一条`sed`命令以更改占位符。请记住需要验证输入的变量是否为正数、提供一个默认值，并且可能为可插拔数据库的数量设置一个实际上限：


    ```

    if ! [[ $PDB_COUNT =~ ''^[0-9]+$'' ]]             # PDB_COUNT 必须是数字

    then PDB_COUNT=1

    elif [ "$PDB_COUNT" -ge 1 -a "$PDB_COUNT" -le 5 ] # PDB_COUNT 必须在 1 到 5 之间

    then PDB_COUNT=$PDB_COUNT

    else PDB_COUNT=1                                  # 其他所有情况设为默认值

    fi

    sed -i -e "s|###PDB_COUNT###|$PDB_COUNT|g" "$ORACLE_BASE"/dbca.rsp

    ```


    您可以通过检查`PDB_COUNT`是否为零，来通过同一个变量控制创建 CDB 还是非 CDB 数据库。如果为零，则创建一个非 CDB 数据库。


    当`numberOfPDBs`变量大于一时，数据库配置助手会创建容器数据库和第一个可插拔数据库，然后再创建额外的可插拔数据库。当`numberOfPDBs`大于一时，Oracle
    会使用响应文件中`pdbName`的值作为前缀，并附加 PDB 的索引。它从模板中的`ORACLE_PDB`环境变量派生`pdbName`的值。请注意此行为，以避免出现意外的可插拔数据库名称！请记住，`ORACLE_PDB`的默认值是`ORCLPDB1`，当
    PDB 数量为一时，Oracle 会创建一个名为`ORCLPDB1`的 PDB。但是，如果 PDB 数量为二，Oracle 会将 PDB 名称作为基础值，那么
    PDB 名称将是`ORCLPDB11`和`ORCLPDB12`！'
- fmt: "### Use the Setup Entrypoint\n\nWe introduced Docker’s entrypoint directories\
    \ in Chapter [7](#514143_1_En_7_Chapter.xhtml). If you need a quick refresher,\
    \ the entrypoint is a special path in Docker, usually `/docker-entrypoint-initdb.d`,\
    \ for mounting a local host directory. Container startup scripts may look here\
    \ for scripts and run them. I say they *may* look here because it’s up to the\
    \ author—it’s not an automatic feature, and if the startup script doesn’t recognize\
    \ the directory (or looks elsewhere), Docker treats the files mounted at the entrypoint\
    \ as, well, files!\n\nOracle’s container repository recognizes entrypoints at\
    \ the standard location, `/docker-entrypoint-initdb.d`, and `/opt/oracle/scripts`.\
    \ It expects two subdirectories—`setup` and `startup`—searching them for scripts\
    \ with either a `.sh` or `.sql` suffix. Automation built into the container checks\
    \ for files in the `setup` directory and runs them once only after the initial\
    \ database creation completes.^[([71](#fn71))] The files in the `startup` directory\
    \ run every time the container starts—including after the initial database setup.\n\
    \nHere are a few tips and cautions when using entrypoints in database containers.\n\
    \nFiles in entrypoint directories are processed in alphanumeric order, regardless\
    \ of the file type. Name files in the `setup` and `scripts` directory with numeric\
    \ prefixes to guarantee their execution order:\n\n`01_add_pdb.sh`\n`02_add_users.sql`\n\
    `03_update_passwords.sql`\n\nShell scripts, with the `.sh` suffix, are executed\
    \ as the container’s default user, `oracle`. SQL scripts are passed to SQL*Plus\
    \ and run as the `SYSDBA` user.\n\nRemember to set the container in the script\
    \ for SQL commands intended for pluggable databases.\n\nFiles mounted in the `startup`\
    \ directory run every time a container starts. They’re not part of the image.\
    \ Changes to these files on the local host (or in other containers) reflect into\
    \ all containers sharing the host directory, potentially leading to unexpected\
    \ behavior and failures when containers restart. Remember this when using a shared\
    \ directory for multiple containers and when changing files!\n\nThe `setup` entrypoint\
    \ lets us invoke the Database Configuration Assistant with the `-createPluggabledatabase`\
    \ option and add pluggable databases via a script like the one shown in Listing\
    \ [13-1](#514143_1_En_13_Chapter.xhtml#PC16).\n\n```bash\n#!/bin/bash\n# Create\
