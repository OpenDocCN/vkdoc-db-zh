    ## 7. Persistence


    As I began looking for information on running Oracle in containers back in 2014,
    the consensus among Oracle experts wasn’t very promising. Most database administrators
    dismissed Docker as the latest *technology-de-jour* among developers and not something
    capable of handling the demands of a database. They cited dire warnings about
    instability, poor performance, and data loss. Peers shared horror stories of various
    disasters rooted in the immaturity or fragility of Docker.


    Those criticisms shared a common theme. Each was an anecdote involving some vague
    “friend of a friend” and echoed the warnings made for other new technologies over
    the years—technologies we take for granted today, like Recovery Manager (RMAN),
    automatic undo management,^([^(44)](#fn44)) and even virtual machines. It’s also
    curious that these disasters were each blamed on a still-new technology used in
    production environments, which seemed unlikely. That’s when I understood these
    stories were by-products of apprehension surrounding the unknown, even fear that
    containers might change how we do things.


    If there was one objection at the forefront, then it was data persistence. The
    (mistaken) belief was since containers are ephemeral, anything associated with
    containers was, too. Indeed, a container’s filesystem is linked to the container.
    Deleting a container permanently removes its data.


    Unless that data is mounted *externally*.


    Docker can save (and persist!) data outside containers using mounted storage because
    it’s separate from the container. Deleting a container doesn’t affect the data
    stored externally. Thoughtful use of database mounts offers greater control and
    visibility and sets the foundation for running efficient, reliable, consistent,
    and modular database environments. And mounts are the critical component behind
    powerful capabilities unique to Linux containers.


    ## Container Storage


    We’ve seen how containers take advantage of union filesystems to deliver reliable,
    consistent results. It’s tempting to say that every container run from a given
    image starts with identical filesystems. But containers don’t use exact *copies*.
    Throughout their lifecycle, they all share the *same* filesystem—the image itself.
    Starting a container creates a dedicated *union filesystem* (sometimes called
    an *overlay filesystem*), using the parent image as a foundation. Figure [7-1](#514143_1_En_7_Chapter.xhtml#Fig1)
    visualizes how container layers work for playing a game of Tic-Tac-Toe. The image
    contains the game board and the opening moves, filling the top row and center
    square. Every container uses the image as the *lower layer* but can’t “touch”
    or change its contents. Instead, Docker writes container changes to each container’s
    private *upper layer*. The two containers in Figure [7-1](#514143_1_En_7_Chapter.xhtml#Fig1)
    start with the same board, moves, and an empty upper layer. Docker adds new moves
    to the upper layers as the games in each container progress. The view inside the
    container, provided by the *working layer*, is a composite or merger of the lower
    and upper layers. Looking “down” through the layers from the container’s perspective,
    the filesystem appears “flat.”


    ![](images/514143_1_En_7_Chapter/514143_1_En_7_Fig1_HTML.png)


    *Figure 7-1: Containers use union filesystems to project local changes over the
    base filesystem provided by their parent image*


    Union filesystems make containers fast and efficient. It doesn’t matter if an
    image is a few megabytes or several gigabytes in size because containers aren’t
    copying them on startup. They’re just initializing a new union filesystem and
    adding an initially empty layer atop the existing image. Running ten containers
    from a 1GB image doesn’t require 10GB of space. They all use the same 1GB image,
    so their storage requirement is only the sum of the space used by changes in each
    container’s private layer.'
