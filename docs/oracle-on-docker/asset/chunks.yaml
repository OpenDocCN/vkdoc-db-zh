    # 2. Understanding the Container Landscape


    Containers have their own language, and those new to Docker should understand
    some basic concepts and terminology before jumping in. This chapter introduces
    the vocabulary needed to navigate the terrain and a high-level view of how containers
    work. Let’s begin by looking at containers in the context of another similar solution
