    : \"none\"\n        },\n        \"Scope\": \"local\"\n    }\n]\n```\n\n`oradata_ORCL1_data`卷的`Options`部分是空的：\n\
    ```\n> docker volume inspect oradata_ORCL1_data\n[\n    {\n        \"Driver\"\
    : \"local\",\n        \"Mountpoint\": \"/var/lib/docker/volumes/oradata_ORCL1_data/_data\"\
    ,\n        \"Name\": \"oradata_ORCL1_data\",\n        \"Options\": {},\n     \
    \   \"Scope\": \"local\"\n    }\n]\n```\n\n根据“`ACTIVE`”列下的零值，我知道这八个本地卷都是孤儿卷。由于它们未被任何容器使用，可以安全地使用`docker\
    \ volume prune`命令删除它们：\n```\n> docker volume prune\nWARNING! This will remove\
    \ all local volumes not used by at least one container.\nAre you sure you want\
    \ to continue? [y/N] y\nDeleted Volumes:\n84c91dc6a3f0cb354243cb9ee2ca5a79933ca67\n\
    oradata_ORCL1_data\noradata_ORCL1_diag\n4efabdab067033c973d00e73de9a05121e0cb70\n\
    9fc0fdc81eabd71a07f28a8d79fd2c1a5606747\noradata_ORCL1_audit\nb26d713b83be8ac8f549f825d19cc2b6e6f19a6\n\
    2ac7d7486083a10a4ed313699e06eba017e63ba\n```\n\n知道 Docker 不会删除由容器（无论是运行中还是已停止）使用的卷，这很让人安心！\n\
    \n运行 prune 命令后，我第二次检查了空间使用情况：\n```\n> docker system df\nTYPE           TOTAL \
    \ ACTIVE  SIZE     RECLAIMABLE\nImages         29     2       157.3GB  143.7GB\
    \ (91%)\nContainers     2      2       540.6MB  0B (0%)\nLocal Volumes  0    \
    \  0       0B       0B\nBuild Cache    138    0       41.05MB  41.05MB\n```\n\n\
    Docker 删除了非活动卷并回收了空间。`docker volume ls`确认 prune 操作没有影响到主机上的绑定挂载卷：\n```\n> docker\
    \ volume ls\nDRIVER  VOLUME NAME\nlocal   ORA216_data\nlocal   ORA216_diag\nlocal\
    \   ORA216_audit\nlocal   ORA1915_data\nlocal   ORA1915_diag\nlocal   ORA1915_audit\n\
    ```\n"
- fmt: "### Prune Images\n\nThere are prune options for images, too:\n\n```\ndocker\
    \ image prune\n```\n\nThe `image prune` command removes \"dangling\" images—those\
    \ unused by any container and not tagged with a name:\n\n```\n> docker image prune\n\
    WARNING! This will remove all dangling images.\nAre you sure you want to continue?\
    \ [y/N] y\nTotal reclaimed space: 0B\n```\n\nDangling images typically result\
    \ from rebuilding an existing image and using the same tag. If any containers\
    \ use the old image, it's untagged by Docker. This abbreviated output of `docker\
    \ ps` shows two containers, one using the old (untagged) image identified only\
    \ by its Image ID, the other using the newer, tagged version:\n\n```\n> docker\
    \ ps\nNAMES        IMAGE\nORA19c_old   f53962475832\nORA19c_new   oracle/database:19.3.0-ee\n\
    ```\n\nIn the output of `docker images`, the dangling image has no repository\
    \ or tag:\n\n```\n# docker images\nREPOSITORY       TAG        IMAGE ID      CREATED\
    \       SIZE\noracle/database  19.3.0-ee  94d27a821d52  4 weeks ago   6.67GB\n\
    \                f53962475832  4 months ago  6.53GB\n```\n\n`docker image prune`\
    \ won't remove the dangling image—provided any containers still use it. After\
    \ removing all dependencies on a dangling image, `docker image prune` deletes\
    \ them.\n\n### Prune Containers\n\nPruning images is relatively safe. However,\
    \ you should use `docker container prune` with caution! Pruning containers removes\
    \ all stopped containers from the system:\n\n```\n> docker container prune\nWARNING!\
    \ This will remove all stopped containers.\nAre you sure you want to continue?\
    \ [y/N] y\nTotal reclaimed space: 0B\n```\n\nStopped containers aren't necessarily\
    \ obsolete! Be careful with this command!\n\n### Prune the System\n\nIf you really\
    \ want to clean up everything on the system in a single command, there's `docker\
    \ system prune`. It removes stopped containers, dangling images, unused networks,\
    \ and build cache:\n\n```\n> docker system prune\nWARNING! This will remove:\n\
    - all stopped containers\n- all networks not used by at least one container\n\
    - all dangling images\n- all dangling build cache\nAre you sure you want to continue?\
    \ [y/N] y\nTotal reclaimed space: 0B\n```\n\nThe same cautions raised for `docker\
    \ container prune` apply to the system prune command.\n\n## Which Type of Volume\
    \ Is Best?\n\nYou've seen several methods for saving and preserving database contents\
    \ outside containers, but which is best? There are several criteria affecting\
    \ container storage choices:\n\n*   **Access and navigation:** Is container data\
    \ saved to the volume visible to users on the local operating system?\n*   **Docker\
    \ managed:** Does Docker manage the storage as an object, associate it with containers,\
    \ and report whether the volume is used?\n*   **Directory creation:** Will Docker\
    \ automatically create nonexistent directory paths on the host?\n*   **Directory\
    \ ownership:** For automatically created directories, is ownership set correctly?\n\
    *   **Backup and save data:** What mechanisms are available for copying and saving\
    \ data?\n*   **Consistent across platforms:** Does the solution behave identically\
    \ on all platforms (Windows, Mac, and Linux)?\n\nLet's examine how each storage\
    \ option handles these scenarios. I want to focus on ramifications for Oracle\
    \ databases and users, including the steps necessary to create the container and\
    \ supporting objects and ease of backing up or copying the contents of a database's\
    \ `oradata` volume.\n\n### No Volume\n\nContainers created with no volume store\
    \ data in the upper layers of their union filesystems. Container creation is easy.\
    \ There are no concerns related to directory creation or ownership, and it works\
    \ the same on every OS. However, users lack practical access to the database's\
    \ `oradata` volume.\n\nContainers run with no volume options keep data in Docker's\
    \ private storage. As databases grow, adding space isn't a simple task, and it's\
    \ a single bucket that may not meet performance requirements. The space is also\
    \ shared by all containers on the host, disqualifying it as a method for anything\
    \ beyond local implementations and environments with low expectations for I/O\
    \ performance.\n\n### Bind Mounts\n\nBind mounts improve things considerably by\
    \ mapping a container directory to storage on the host. Files saved to the host\
    \ OS are visible to users, and we can back up and copy the contents of the `oradata`\
    \ volume. However, bind mounting fails four of the test criteria outlined earlier.\n\
    \n#### Container Association and Orphans\n\nBind-mounting directories doesn't\
    \ explicitly associate them with a container. Running `docker container inspect`\
    \ shows the source and target of the bind mount, as in this example formatted\
    \ to show only the mount information:\n\n```\n> docker inspect -f \"{{ .Mounts\
    \ }}\" ORCL\n[{bind  /oradata/ORCL /opt/oracle/oradata   true rprivate}]\n```\n\
    \nHowever, there's no good method for identifying whether `/oradata/ORCL` is used\
    \ by any containers, short of inspecting all containers on the system. Bind mounting\
    \ makes it easy to lose track of orphaned directories.\n\n#### Mounting Method\n\
    \nThe mounting method affects whether Docker automatically creates nonexistent\
    \ directories. When I use the `--volume` or `-v` option, Docker creates the directory.\
    \ Here, I'm creating an Alpine container, mounting a directory called `$HOME/test_volume`\
    \ that doesn't already exist, and listing the contents:\n\n```\n> docker run \\\
    \n--volume $HOME/test_volume:/test_volume \\\nalpine ls -l /test_volume\ntotal\
    \ 0\n> ls -l $HOME\ndrwxr-xr-x  2 root root       4096 Sep 18 19:36  test_volume\n\
    ```\n\nHowever, if I run the same command, this time using the `--mount` option\
    \ for a different, nonexistent directory, `$HOME/test_mount`, it fails:\n\n```\n\
    > docker run \\\n--mount type=bind,source=$HOME/test_mount,target=/test_mount\
    \ \\\nalpine ls -l /test_mount\ndocker: Error response from daemon: invalid mount\
    \ config for type \"bind\": bind source path does not exist: /home/sean/test_mount.\n\
    See 'docker run --help'.\n```"
