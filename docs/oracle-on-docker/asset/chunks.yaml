  trans: '


    ## 挂载概念


    挂载扩展了容器的存储空间，使其超出了联合文件系统的限制。您可以将它们视为网络附加存储或共享文件系统（容器同样可以使用网络存储）。它们是独立的对象，与容器及其生命周期无关。通过挂载，容器可以：


    *   使用主机上的本地存储来实现持久化、提升性能并增加容量

    *   与主机或其他容器共享文件

    *   避免为易变目录承担联合文件系统的开销

    *   访问不属于其父镜像的文件和目录

    *   将数据库文件分布到多个磁盘上，从而提升性能、增加容量并控制冗余


    当您使用挂载，尤其是在数据库场景下，您会看到它们如何暴露软件、配置和数据之间的差异。图 7-2 中的容器使用挂载将 Oracle 数据库中相对静态的组件与其数据、配置、日志和脚本分离。这种方法的优势非常显著：


    *   数据库软件及其依赖项被构建到一个镜像中。数据库软件变化不大，不可变的镜像是最合适、最高效的供应方式。任何从该镜像启动的数据库都保证包含相同的版本和已打包的补丁。^(⁴⁶)
    这些目录中可能出现的少量更改对容器联合文件系统的性能影响不大。

    *   构成数据库实例的文件——数据文件、临时文件、控制文件、重做日志文件和归档日志文件——存在于专用存储上，利用了高性能和冗余磁盘。启动和操作数据库所需的配置文件——包括密码文件、参数文件、`oratab`
    文件和网络配置——与软件和数据分离。这些以及数据是 Oracle 数据库最必要的部分。克隆或复制这些文件即可创建一个完全相同的数据库副本。得益于 Docker
    的可移植性，这个副本可以位于同一系统、运行不同操作系统的同事机器上或云端。

    *   将诊断目录保存到磁盘，使其对主机上的进程可见，并且即使数据库容器停止后仍然可用。日志监控和轮转可以从容器主机运行，而无需在数据库内部运行。

    *   用于共享支持脚本的挂载比将其添加到父镜像中更合理。虽然这些脚本可能保持不变，但通过挂载在容器间共享它们是更好的选择。将它们排除在镜像之外可以得到更小的镜像，无需为包含修改后的脚本而更新镜像，这些更改也无需传播到正在运行的容器。


    Oracle 在 Oracle Database 18c 中引入的 `Read-Only Homes`（只读主目录）功能采用了类似的方法。原本混杂在软件目录中的配置文件，如密码文件、参数文件和网络配置，现在与
    `ORACLE_HOME` 分开存储。这使得克隆和恢复数据库更加容易，并增强了数据库实例与数据库软件之间的区分。


    `Read-Only Homes` 和挂载有助于以一种更模块化的方式思考数据库组件。观察图 7-2，注意不同类型的文件如何在容器的联合文件系统和挂载之间进行划分。


    ![](img/514143_1_En_7_Fig2_HTML.jpg)


    示意图展示了一个数据库容器及其不同目录。左侧有三个圆柱形结构，代表外部和共享的外部卷。


    图 7-2


    一个在容器中运行的 Oracle 数据库，其相对静态的内容被构建到镜像中。数据、日志和配置文件被分离到专为容器中运行的数据库设置的挂载上。脚本目录挂载到一个与多个容器共享的文件系统上。


    请注意，相对静态的内容，包括数据库软件主目录和清单目录，位于容器的文件系统中。易变的内容，如 Oracle 诊断目录 `/opt/oracle/diag`
    下的数据文件和日志，则被分离到卷上。`$ORACLE_HOME/dbs` 和 `$ORACLE_HOME/network/admin` 下的配置文件也从它们的预期位置链接到
    `/opt/oracle/oradata` 下的一个子目录，这反过来又将它们保存到数据库卷中。


    挂载不仅限于数据和配置。此示例中的 `/scripts` 目录挂载到一个共享文件系统，使每个容器都能访问一个公共的脚本和实用程序库。


    ## 卷与卷


    在深入之前，我想澄清一些术语。在 Docker 中，`volume`（卷）有多个含义，并且经常被随意地用来描述或引用任何挂载到容器的外部存储。官方来说，Docker
    中的“卷”描述两件事：


    *   在 `Dockerfile` 中定义的目录，可能与容器主机资源相关联。卷的路径是镜像元数据的一部分。在创建新容器时，可以为卷分配持久化存储。Oracle
    的容器仓库镜像在 `/opt/oracle/oradata` 定义了一个卷。

    *   一个用作持久化容器数据目标的 Docker 对象。


    一个 `Docker Volume`（后者，对象定义）可以作为卷目录（前者，镜像元数据中的路径）的来源。但“卷”经常被非正式地（且不正确地）用来描述*任何*挂载在容器联合文件系统之外的存储类型，无论它是否真的是一个
    `Docker Volume`。


    如果这还不够令人困惑的话，`docker run` 命令有一个 `-v` 或 `--volume` 选项，用于将存储映射到容器。所以，我们在创建容器时使用
    `--volume` 选项将 `Docker Volumes` 映射到 `volumes`（卷目录）！


    让我们分解一下存储挂接的不同方法，以帮助理清这些重叠的术语。


    ## 挂载类型


    将存储挂载到容器的唯一时机是在初始创建时，使用 `docker run` 命令中的选项。之后无法返回编辑或添加，因此务必一次性做对！这意味着需要理解存储类型、其用途以及其优势或限制。我们数据库最常用的两种类型是
    `bind mounts`（绑定挂载）和 `volumes`（卷）。另外两种类型 `tmpfs` 和特例 `secrets` 则不太常见。


    ### 绑定挂载


    您已经看到 `bind mounts` 被用于将数据持久化到本地文件系统。绑定挂载将容器中的文件和目录映射到主机上的文件和目录。对于任何刚接触 Docker
    和容器的人来说，这种方法可能更熟悉和舒适，也是 Oracle 在其容器仓库文档中演示的方法。绑定挂载的优势在于便利性和表面上的可见性。以 Oracle 数据库容器的
    `/opt/oracle/oradata` 卷目录为例，我可以导航到本地机器上的该目录来查看和管理其内容：


    ```

    ~/oradata> du -sh ./*

    1.5G     ./ORA11G

    2.0G     ./ORA12C

    2.9G     ./ORA19C

    4.8G     ./ORA21C

    ```


    我将多个容器映射到 `$HOME/oradata` 下的单独子目录，并且可以使用标准的 Linux 命令来查看和管理这些目录。使用 `du` 命令可以轻松查看它们的空间占用情况。


    在 `docker run` 时为容器分配绑定挂载很简单，甚至主机目录都不必事先存在！该目录是主机文件系统的一部分，^(⁴⁷) 在 Docker 主机上其他地方使用的相同熟悉的
    Linux 命令在映射目录中同样适用。使用绑定挂载无需额外的命令或先决条件。这有什么不喜欢的呢？


