  trans: "\n### 构建上下文中不允许存在符号链接或快捷方式\n\n在第 4 章中，你已将 Oracle 数据库安装介质添加到了一个特定于版本的目录中，例如\
    \ `$HOME/docker-images/OracleDatabase/SingleInstance/dockerfiles/19.3.0`。当你运行\
    \ `buildContainerImage.sh` 脚本时，Docker 会处理该目录中的文件以构建其上下文。Docker 不会读取相邻目录中的文件。它们在构建路径之外，无论如何对构建也没有用处——Oracle\
    \ 19c 的镜像不需要 21c 的安装介质，反之亦然。资源不共享，将文件整理到不同的目录中是合理的。\n\n当版本完全不同时确实如此，但处理小版本发布时，情况就变得模糊了。19.15\
    \ 和 19.16 发布更新（RU）使用相同的基本资源——安装介质和 OPatch——但补丁本身不同。将它们拆分到带版本号的目录中意味着需要复制部分（而非全部）文件：\n\
    \n```\n19c\n├── 19.15\n│   ├── LINUX.X64_193000_db_home.zip\n|   ├── p6880880_190000_Linux-x86-64.zip\n\
    │   └── patch-for-1915-RU.zip\n└── 19.16\n    ├── LINUX.X64_193000_db_home.zip\n\
    \    ├── p6880880_190000_Linux-x86-64.zip\n    └── patch-for-1916-RU.zip\n```\n\
    \n每个版本发布都会增加更多的重复，占用更多空间，甚至可能导致文件不匹配。在上面的目录结构中，以 `p6880880` 开头的 OPatch 文件名称相同，但这并不能保证它们是同一个文件或最新版本。理想情况下，两个目录都应该使用同一个集中管理的文件。\n\
    \n我们能否向 Docker 的上下文添加一个链接或快捷方式，从而避免在两个地方复制 `LINUX.X64_193000_db_home.zip` 文件？为了测试这一点，我向我们一直在使用的镜像上下文添加了一个链接，并重新运行了相同的构建：\n\
    \n```\n> ln -s /etc/passwd demo/linked_file\n> ls -l ./demo\ntotal 16\nlrwxr-xr-x\
    \  1 seanscott  staff    11 Aug 25 17:28 linked_file -> /etc/passwd\n-rw-r--r--\
    \  1 seanscott  staff  7868 Aug 25 13:30 passwd\n> docker build -f ./Dockerfile\
    \ ./demo\nSending build context to Docker daemon   10.8kB\nStep 1/3 : FROM alpine\n\
    ---> 9c6f07244728\nStep 2/3 : COPY * /\nCOPY failed: file not found in build context\
    \ or excluded by .dockerignore: stat linked_file: file does not exist\n```\n\n\
    不幸的是，Docker 只识别其上下文中的物理文件。由于 `linked_file` 物理上不在 Docker 的构建目录中，它未被添加到上下文。`COPY`\
    \ 命令理解该文件在目录中存在并尝试复制它，但当它在上下文中找不到时失败了。\n\nDocker 不会跟随指向文件系统中其他位置存储的文件的符号链接^(⁷⁹)，以保持一致性。当上下文（生成镜像所需的介质和脚本）是自包含时，可以保证跨主机的构建产生相同的结果。链接到上下文之外的文件或目录可能会破坏这一保证。在上面的例子中，该文件不仅是唯一的，它在另一台机器上可能位于不同的路径，甚至可能根本不存在！\n\
    \n这并没有解决我们试图解决的问题——减少文件重复。但失败构建中的错误消息提到了一个名为 `.dockerignore` 的东西，事实证明，它可以帮助我们实现这个目标！\n\
    \n### 忽略文件\n\n在将信息发送给守护进程之前，Docker 会在其上下文目录中查找 `.dockerignore` 文件。`.dockerignore`\
    \ 文件告知构建过程需要排除哪些文件或目录，并防止构建过程向守护进程发送不必要的或可能敏感的内容。被忽略的文件无法用于 `COPY` 或 `ADD` 操作，因为尽管它们可能在文件系统上，但它们不在构建早期阶段发送给\
    \ Docker 引擎的构建上下文中。\n\n`.dockerignore` 文件通过名称或模式匹配文件和目录。许多资源提供了模式匹配的详细信息，为了避免重复这些信息，我将只介绍基本选项：\n\
    \n*   以井号（`#`）开头的行表示注释，会被忽略。\n*   星号（`*`）匹配文件名或目录名中的一个或多个字符。\n*   两个连续的星号（`**`）匹配文件路径中的任意数量的目录。\n\
    *   问号（`?`）匹配单个字符。\n*   感叹号（`!`）创建一个例外。\n\n忽略文件中的路径是相对于*上下文的根目录*进行评估的——即使忽略文件中的路径以斜杠开头，看起来像是引用了绝对路径。一些示例：\n\
    \n```\n# 一条注释\n# 忽略构建上下文根目录中的 Dockerfile：\nDockerfile\n# 忽略名为 test 的目录中的所有文件：\n\
    test/*\n# 忽略以 \"patch\" 开头后跟单个字符的任何目录中的文件：\npatch?/*\n# 忽略以后缀 \".key\" 结尾的任何目录中的文件\n\
    **/*.key\n# 忽略根目录下任意直接子目录中以后缀 \".zip\" 结尾的文件：\n*/*.zip\n# 覆盖先前对名为 \"LINUX.X64_193000_db_home.zip\"\
    \ 文件的排除：\n!*/LINUX.X64_193000_db_home.zip\n```\n\n请记住，Docker 按顺序读取忽略文件。最后一个条件优先。在以下示例中，第一条规则忽略\
    \ `software` 目录中的所有文件。第二条规则为 `LINUX.X64_193000_db_home.zip` 文件创建了一个例外。第三条规则随后忽略任何以\
    \ `.zip` 结尾的目录中的文件，排除了 `LINUX.X64_193000_db_home.zip`：\n\n```\n# 忽略 \"software\"\
    \ 目录中的文件：\nsoftware/*\n# 包含 \"software/LINUX.X64_193000_db_home.zip\" 文件：\n!software/LINUX.X64_193000_db_home.zip\n\
    # 忽略任何以 \".zip\" 结尾的目录中的文件\n**/*.zip\n```\n\n调换这些规则的顺序，将 `LINUX.X64_193000_db_home.zip`\
    \ 的例外放在最后，则允许其包含在上下文中：\n\n```\n# 忽略 \"software\" 目录中的文件：\nsoftware/*\n# 忽略任何以\
    \ \".zip\" 结尾的目录中的文件\n**/*.zip\n# 包含 \"software/LINUX.X64_193000_db_home.zip\"\
    \ 文件：\n!software/LINUX.X64_193000_db_home.zip\n```\n\n基于当前或预期目录内容进行过滤，尤其是使用通配符时，不能保证结果。与其基于模式允许文件，不如考虑一种最小权限模型，排除所有内容，并仅对*应该*是构建一部分的特定文件创建例外。此示例中的第一条模式排除了所有内容。后续行为\
    \ `file1` 和 `file2` 添加了例外：\n\n```\n*\n!file1\n!file2\n```\n\n构建目录中的所有其他内容都被省略，对\
    \ `ADD` 或 `COPY` 命令不可用——即使那些使用通配符的命令也不行！\n\n没有单独的选项（类似于为命名 Dockerfile 使用的 `-f`\
    \ 标志）来指定忽略文件。Docker 在与 Dockerfile 本身相同的目录中查找名为 `.dockerignore` 的忽略文件：\n\n```\n\
    docker build -f Dockerfile_test .\n```\n"
- fmt: "## Tagging Images\n\nThe build command run in the preceding sections created\
    \ images, but they leave something to be desired for naming. `docker images` reports\
    \ the image ID, but there’s no human-friendly name:\n\n```\n> docker images\n\
    REPOSITORY        TAG         IMAGE ID       CREATED          SIZE\n         \
    \         8cf63acc1f17   21 seconds ago   5.54MB\nalpine            latest   \
    \   9c6f07244728   2 weeks ago      5.54MB\n```\n\nThis should feel normal by\
    \ now—Docker seems reluctant to give things helpful or meaningful names—but in\
    \ fairness, I didn’t tell it how, or even whether, to name the image. Fortunately,\
    \ we have remedies, naming images after the fact or during the build process,\
    \ even assigning multiple names to a single image!\n\nRepositories, Image Names,\
    \ Tags, and Tagging\n\nIt’s easy to confuse these terms. Image names consist of\
    \ an (optional) repository namespace, an image name or repository, and an optional\
    \ tag. The repository namespace, if present, is separated from the image name\
    \ by a slash. The tag, if present, is separated from the image name by a colon:\n\
    \n`[<NAMESPACE>/]<IMAGE_NAME>[:<TAG>]`\n\nLooking at the `oracle/database:19.3.0-ee`\
    \ image used throughout the book, `oracle` is the namespace; `database` is the\
    \ image name; `19.3.0-ee` is the tag, often used to distinguish different versions\
    \ of an image.\n\nThe output of `docker images` combines the namespace and image\
    \ name under the `REPOSITORY` column.\n\nThe terms `image name` and `tag` are\
    \ frequently used interchangeably to reference the combined repository namespace,\
    \ image name, and tag.\n\n`Repository`, `image name`, and `tag` are nouns that\
    \ identify the `source`, `name`, and `version` of images. `Tagging` is the action\
    \ of `naming images`.\n\n### Add Tags to Images\n\nLet’s name this image using\
    \ the `docker tag` command. `docker tag` takes two arguments—an image ID or name\
    \ and a new tag. My image doesn’t (yet) have a name. I need to reference it by\
    \ its ID:\n\n```\n> docker tag 8cf63acc1f17 alpine-demo\n> docker images\nREPOSITORY\
    \        TAG         IMAGE ID       CREATED          SIZE\nalpine-demo       latest\
    \      8cf63acc1f17   24 minutes ago   5.54MB\nalpine            latest      9c6f07244728\
    \   2 weeks ago      5.54MB\n```\n\nAfter tagging the image, it appears in `docker\
    \ images` with the new name, listed under the `REPOSITORY` column, and a `TAG`\
    \ of `latest`. It replaced the original, unnamed entry in the image list.\n\n\
    I can create an additional tag for this image, this time referencing it by its\
    \ new name, `alpine-demo`:\n\n```\n> docker tag alpine-demo alpine-new\n> docker\
    \ images\nREPOSITORY        TAG         IMAGE ID       CREATED          SIZE\n\
    alpine-new        latest      8cf63acc1f17   26 minutes ago   5.54MB\nalpine-demo\
    \       latest      8cf63acc1f17   26 minutes ago   5.54MB\nalpine           \
    \ latest      9c6f07244728   2 weeks ago      5.54MB\n```\n\nIt added a second\
    \ entry for the image with the same image ID value. Docker didn’t create a new\
    \ image. Tags are aliases that make it easier for humans to identify, classify,\
    \ and work with images.\n\nIt may be more appropriate to give this image a `tag`\
    \ that identifies its purpose or version rather than a new name. I’ll tag it again,\
    \ this time with the `alpine` name and a tag of `demo`:\n\n```\n> docker tag alpine-demo\
    \ alpine:demo\n> docker images\nREPOSITORY        TAG         IMAGE ID       CREATED\
    \          SIZE\nalpine-new        latest      8cf63acc1f17   27 minutes ago \
    \  5.54MB\nalpine            demo        8cf63acc1f17   27 minutes ago   5.54MB\n\
    alpine-demo       latest      8cf63acc1f17   27 minutes ago   5.54MB\nalpine \
    \           latest      9c6f07244728   2 weeks ago      5.54MB\n```\n\nThis is\
    \ rather messy—three aliases for the same image! Let’s use `docker rmi` and clean\
    \ up the duplicate images, `alpine-demo`, and `alpine-new`:\n\n```\n> docker rmi\
    \ alpine-demo\nUntagged: alpine-demo:latest\n> docker rmi alpine-new\nUntagged:\
    \ alpine-new:latest\n```\n\nNotice the response from Docker. It `untagged` the\
    \ images but didn’t delete them. `docker images` shows a single entry for this\
    \ image, using the `alpine:demo` name/tag combination:\n\n```\n> docker images\n\
    REPOSITORY        TAG         IMAGE ID       CREATED          SIZE\nalpine   \
    \         demo        8cf63acc1f17   29 minutes ago   5.54MB\nalpine         \
    \   latest      9c6f07244728   2 weeks ago      5.54MB\n```\n\nWith only one alias\
    \ remaining for this image, running `docker rmi alpine:demo` completely removes\
    \ the image from the system:^([^(80)](#fn80))\n\n```\n> docker rmi alpine:demo\n\
    Untagged: alpine:demo\nDeleted: sha256:8cf63acc1f17c28d78ce7efac26f19f428847e895db81182ec1063e41b4246b4\n\
    Deleted: sha256:1d5ae09bcac7b79cb3dea2209118be4199b2cc91050968aca0037daea0a4728c\n\
    ```\n\n### Tag Images During Builds\n\nThe `tag` command provides a means of naming\
    \ existing images and adding aliases. It’s far easier to assign names and tags\
    \ during the build itself. `docker build`’s `-t` option does just that:\n\n```\n\
    docker build ...\n-t [/][:]\n...\n```\n\nWe’ve seen this pattern in the images\
    \ used throughout this book:\n\n```\noracle/database:19.3.0-ee\noraclelinux:7-slim\n\
    ```\n\nAnd in the output of the docker images command:\n\n```\nREPOSITORY    \
    \   TAG         IMAGE ID       CREATED        SIZE\noracle/database  19.3.0-ee\
    \   1b588736c8c1   2 months ago   6.67GB\noraclelinux      7-slim      9ec0d85eaed0\
    \   4 months ago   133MB\n```\n\nTo read an image name\n\n*   The part before\
    \ the last slash^([^(81)](#fn81)) is the repository namespace, `oracle`. The Oracle\
    \ Linux image isn’t associated with a namespace.\n*   The image names are `database`\
    \ and `oraclelinux`.\n*   Tags, preceded by a colon, typically represent version\
    \ information that differentiates otherwise similar images, like `19.3.0-ee` and\
    \ `7-slim`.\n\nI lean heavily on tags and consistent image naming to organize\
    \ and make sense of my images. As you begin building images, take a moment to\
    \ consider the patterns that will work best for you or your team!\n\nYou can assign\
    \ multiple tags to a single `build`:\n\n```\ndocker build ...\n-t oracledb:19.15-ee\
    \ \\\n-t my_namespace/oracledb:19.15-ee \\\n...\n```\n\nThis saves time in environments\
    \ with local and remote repositories. The image in this example has two aliases:\
    \ `oracledb:19.15-ee` and `my_namespace/oracledb:19.15-ee`. The second references\
    \ a remote repository, and once the build completes, the finished image is already\
    \ tagged and available to upload or `push` to the destination. Chapter [16](#514143_1_En_16_Chapter.xhtml)\
    \ discusses this in detail.\n\n## Arguments\n\nThe section on arguments in Chapter\
    \ [12](#514143_1_En_12_Chapter.xhtml) covered their implementation in Dockerfiles.\
    \ As a reminder, arguments initiate variables and (optionally) set their default\
    \ values:\n\n```\nARG ORACLE_HOME=/opt/oracle/product/19c/dbhome_1\nENV ORACLE_HOME=$ORACLE_HOME\n\
    ```\n\nUse the `--build-arg` option to pass custom values to arguments during\
    \ a build:\n\n```\ndocker build ...\n--build-arg ORACLE_HOME=/u01/oracle/product/19.3.0/dbhome_1\n\
    ...\n```\n\nThe build process overrides the value of the `ORACLE_HOME` argument\
    \ in the Dockerfile, which in turn assigns the environment value in the image.\n\
    \nIn Chapter [12](#514143_1_En_12_Chapter.xhtml), you learned that `ARG` is the\
    \ only Dockerfile command that can precede a `FROM` statement. The argument is\
    \ only available to the `FROM` statement that follows and allows manipulation\
    \ of the base image used by the build:\n\n```\nARG IMAGE_NAME=oraclelinux:7-slim\n\
    FROM $IMAGE_NAME\n...\n```\n\nUsing `--build-arg` alters the base image used by\
    \ the Dockerfile in the preceding example:\n\n```\ndocker build ...\n--build-arg\
    \ IMAGE_NAME=oraclelinux:7\n...\n```\n\nDefine multiple arguments with an individual\
    \ `--build-arg` for each."
  raw: "## Tagging Images\n\nThe build command run in the preceding sections created\
    \ images, but they leave something to be desired for naming. `docker images` reports\
    \ the image ID, but there’s no human-friendly name:\n\n```\n> docker images\n\
    REPOSITORY        TAG         IMAGE ID       CREATED          SIZE\n         \
    \         8cf63acc1f17   21 seconds ago   5.54MB\nalpine            latest   \
    \   9c6f07244728   2 weeks ago      5.54MB\n```\n\nThis should feel normal by\
    \ now—Docker seems reluctant to give things helpful or meaningful names—but in\
    \ fairness, I didn’t tell it how, or even whether, to name the image. Fortunately,\
    \ we have remedies, naming images after the fact or during the build process,\
    \ even assigning multiple names to a single image!\n\nRepositories, Image Names,\
    \ Tags, and Tagging\n\nIt’s easy to confuse these terms. Image names consist of\
    \ an (optional) repository namespace, an image name or repository, and an optional\
    \ tag. The repository namespace, if present, is separated from the image name\
    \ by a slash. The tag, if present, is separated from the image name by a colon:\n\
    \n`[<NAMESPACE>/]<IMAGE_NAME>[:<TAG>]`\n\nLooking at the `oracle/database:19.3.0-ee`\
    \ image used throughout the book, `oracle` is the namespace; `database` is the\
    \ image name; `19.3.0-ee` is the tag, often used to distinguish different versions\
    \ of an image.\n\nThe output of `docker images` combines the namespace and image  name\
    \ under the `REPOSITORY` column.\n\nThe terms “*image name*” and “*tag*” are frequently\
    \ used interchangeably to reference the combined repository namespace, image name,\
    \ and tag.\n\n*Repository*, *image name*, and *tag* are nouns that identify the\
    \ *source*, *name*, and *version* of images. *Tagging* is the action of *naming\
    \ images*.\n\n### Add Tags to Images\n\nLet’s name this image using the `docker\
    \ tag` command. `docker tag` takes two arguments—an image ID or name and a new\
    \ tag. My image doesn’t (yet) have a name. I need to reference it by its ID:\n\
    \n```\n> docker tag 8cf63acc1f17 alpine-demo\n> docker images\nREPOSITORY    \
    \    TAG         IMAGE ID       CREATED          SIZE\nalpine-demo       latest\
    \      8cf63acc1f17   24 minutes ago   5.54MB\nalpine            latest      9c6f07244728\
    \   2 weeks ago      5.54MB\n```\n\nAfter tagging the image, it appears in `docker\
    \ images` with the new name, listed under the `REPOSITORY` column, and a `TAG`\
    \ of `latest`. It replaced the original, unnamed entry in the image list.\n\n\
    I can create an additional tag for this image, this time referencing it by its\
    \ new name, `alpine-demo`:\n\n```\n> docker tag alpine-demo alpine-new\n> docker\
    \ images\nREPOSITORY        TAG         IMAGE ID       CREATED          SIZE\n\
    alpine-new        latest      8cf63acc1f17   26 minutes ago   5.54MB\nalpine-demo\
    \       latest      8cf63acc1f17   26 minutes ago   5.54MB\nalpine           \
    \ latest      9c6f07244728   2 weeks ago      5.54MB\n```\n\nIt added a second\
    \ entry for the image with the same image ID value. Docker didn’t create a new\
    \ image. Tags are aliases that make it easier for humans to identify, classify,\
    \ and work with images.\n\nIt may be more appropriate to give this image a *tag*\
    \ that identifies its purpose or version rather than a new name. I’ll tag it again,\
    \ this time with the `alpine` name and a tag of `demo`:\n\n```\n> docker tag alpine-demo\
    \ alpine:demo\n> docker images\nREPOSITORY        TAG         IMAGE ID       CREATED\
    \          SIZE\nalpine-new        latest      8cf63acc1f17   27 minutes ago \
    \  5.54MB\nalpine            demo        8cf63acc1f17   27 minutes ago   5.54MB\n\
    alpine-demo       latest      8cf63acc1f17   27 minutes ago   5.54MB\nalpine \
    \           latest      9c6f07244728   2 weeks ago      5.54MB\n```\n\nThis is\
    \ rather messy—three aliases for the same image! Let’s use `docker rmi` and clean\
    \ up the duplicate images, `alpine-demo`, and `alpine-new`:\n\n```\n> docker rmi\
    \ alpine-demo\nUntagged: alpine-demo:latest\n> docker rmi alpine-new\nUntagged:\
    \ alpine-new:latest\n```\n\nNotice the response from Docker. It *untagged* the\
    \ images but didn’t delete them. `docker images` shows a single entry for this\
    \ image, using the `alpine:demo` name/tag combination:\n\n```\n> docker images\n\
    REPOSITORY        TAG         IMAGE ID       CREATED          SIZE\nalpine   \
    \         demo        8cf63acc1f17   29 minutes ago   5.54MB\nalpine         \
    \   latest      9c6f07244728   2 weeks ago      5.54MB\n```\n\nWith only one alias\
    \ remaining for this image, running `docker rmi alpine:demo` completely removes\
    \ the image from the system:^([^(80)](#fn80))\n\n```\n> docker rmi alpine:demo\n\
    Untagged: alpine:demo\nDeleted: sha256:8cf63acc1f17c28d78ce7efac26f19f428847e895db81182ec1063e41b4246b4\n\
    Deleted: sha256:1d5ae09bcac7b79cb3dea2209118be4199b2cc91050968aca0037daea0a4728c\n\
    ```\n\n### Tag Images During Builds\n\nThe `tag` command provides a means of naming\
    \ existing images and adding aliases. It’s far easier to assign names and tags\
    \ during the build itself. `docker build`’s `-t` option does just that:\n\n```\n\
    docker build ...\n-t [/][:]\n...\n```\n\nWe’ve seen this pattern in the images\
    \ used throughout this book:\n\n```\noracle/database:19.3.0-ee\noraclelinux:7-slim\n\
    ```\n\nAnd in the output of the docker images command:\n\n```\nREPOSITORY    \
    \   TAG         IMAGE ID       CREATED        SIZE\noracle/database  19.3.0-ee\
    \   1b588736c8c1   2 months ago   6.67GB\noraclelinux      7-slim      9ec0d85eaed0\
    \   4 months ago   133MB\n```\n\nTo read an image name\n\n*   The part before\
    \ the last slash^([^(81)](#fn81)) is the repository namespace, `oracle`. The Oracle\
    \ Linux image isn’t associated with a namespace.\n\n*   The image names are `database`\
    \ and `oraclelinux`.\n\n*   Tags, preceded by a colon, typically represent version\
    \ information that differentiates otherwise similar images, like `19.3.0-ee` and\
    \ `7-slim`.\n\nI lean heavily on tags and consistent image naming to organize\
    \ and make sense of my images. As you begin building images, take a moment to\
    \ consider the patterns that will work best for you or your team!\n\nYou can assign\
    \ multiple tags to a single `build`:\n\n```\ndocker build ...\n-t oracledb:19.15-ee\
    \ \\\n-t my_namespace/oracledb:19.15-ee \\\n...\n```\n\nThis saves time in environments\
    \ with local and remote repositories. The image in this example has two aliases:\
    \ `oracledb:19.15-ee` and `my_namespace/oracledb:19.15-ee`. The second references\
    \ a remote repository, and once the build completes, the finished image is already\
    \ tagged and available to upload or *push* to the destination. Chapter [16](#514143_1_En_16_Chapter.xhtml)\
    \ discusses this in detail.\n\n## Arguments\n\nThe section on arguments in Chapter\
    \ [12](#514143_1_En_12_Chapter.xhtml) covered their implementation in Dockerfiles.\
    \ As a reminder, arguments initiate variables and (optionally) set their default\
    \ values:\n\n```\nARG ORACLE_HOME=/opt/oracle/product/19c/dbhome_1\nENV ORACLE_HOME=$ORACLE_HOME\n\
    ```\n\nUse the `--build-arg` option to pass custom values to arguments during\
    \ a build:\n\n```\ndocker build ...\n--build-arg ORACLE_HOME=/u01/oracle/product/19.3.0/dbhome_1\n\
    ...\n```\n\nThe build process overrides the value of the `ORACLE_HOME` argument\
    \ in the Dockerfile, which in turn assigns the environment value in the image.\n\
    \nIn Chapter [12](#514143_1_En_12_Chapter.xhtml), you learned that `ARG` is the\
    \ only Dockerfile command that can precede a `FROM` statement. The argument is\
    \ only available to the `FROM` statement that follows and allows manipulation\
    \ of the base image used by the build:\n\n```\nARG IMAGE_NAME=oraclelinux:7-slim\n\
    FROM $IMAGE_NAME\n...\n```\n\nUsing `--build-arg` alters the base image used by\
    \ the Dockerfile in the preceding example:\n\n```\ndocker build ...\n--build-arg\
    \ IMAGE_NAME=oraclelinux:7\n...\n```\n\nDefine multiple arguments with an individual\
    \ `--build-arg` for each."
  trans: "\n## 标记镜像\n\n在前面章节中运行的构建命令创建了镜像，但其命名方式有待改进。`docker images` 命令会报告镜像 ID，但没有一个便于人类理解的名称：\n\
    \n```\n> docker images\nREPOSITORY        TAG         IMAGE ID       CREATED \
    \         SIZE\n                  8cf63acc1f17   21 seconds ago   5.54MB\nalpine\
    \            latest      9c6f07244728   2 weeks ago      5.54MB\n```\n\n现在这应该感觉正常了——Docker\
    \ 似乎不太愿意给事物赋予有用的或有意义的名称——但公平地说，我没有告诉它如何，甚至是否要为镜像命名。幸运的是，我们有补救措施，可以在事后或构建过程中为镜像命名，甚至为一个镜像分配多个名称！\n\
    \n**仓库、镜像名称、标签与标记**\n\n这些术语很容易混淆。镜像名称由一个（可选的）**仓库命名空间**、一个**镜像名称或仓库**，以及一个可选的**标签**组成。如果存在仓库命名空间，它与镜像名称之间用斜杠分隔。如果存在标签，它与镜像名称之间用冒号分隔：\n\
    \n`[<命名空间>/]<镜像名称>[:<标签>]`\n\n以本书通篇使用的 `oracle/database:19.3.0-ee` 镜像为例，`oracle`\
    \ 是命名空间；`database` 是镜像名称；`19.3.0-ee` 是标签，常用于区分同一镜像的不同版本。\n\n`docker images` 的输出将命名空间和镜像名称合并显示在\
    \ `REPOSITORY` 列下。\n\n术语 `image name`（镜像名称）和 `tag`（标签）经常被互换使用，以指代仓库命名空间、镜像名称和标签的组合。\n\
    \n`Repository`（仓库）、`image name`（镜像名称）和 `tag`（标签）是标识镜像 `来源`、`名称` 和 `版本` 的名词。`Tagging`（标记）是\
    \ `命名镜像` 的动作。\n\n### 为镜像添加标签\n\n让我们使用 `docker tag` 命令为这个镜像命名。`docker tag` 接受两个参数——一个镜像\
    \ ID 或名称，以及一个新的标签。我的镜像（目前）还没有名字。我需要通过它的 ID 来引用它：\n\n```\n> docker tag 8cf63acc1f17\
    \ alpine-demo\n> docker images\nREPOSITORY        TAG         IMAGE ID       CREATED\
    \          SIZE\nalpine-demo       latest      8cf63acc1f17   24 minutes ago \
    \  5.54MB\nalpine            latest      9c6f07244728   2 weeks ago      5.54MB\n\
    ```\n\n为镜像打上标签后，它会以新名称出现在 `docker images` 的输出中，列在 `REPOSITORY` 列下，且 `TAG` 为 `latest`。它替换了镜像列表中原来的、未命名的条目。\n\
    \n我可以为这个镜像创建一个额外的标签，这次通过它新的名称 `alpine-demo` 来引用：\n\n```\n> docker tag alpine-demo\
    \ alpine-new\n> docker images\nREPOSITORY        TAG         IMAGE ID       CREATED\
    \          SIZE\nalpine-new        latest      8cf63acc1f17   26 minutes ago \
    \  5.54MB\nalpine-demo       latest      8cf63acc1f17   26 minutes ago   5.54MB\n\
    alpine            latest      9c6f07244728   2 weeks ago      5.54MB\n```\n\n\
    它为同一个镜像 ID 值添加了第二个条目。Docker 并没有创建一个新镜像。标签是别名，使人类能够更容易地识别、分类和操作镜像。\n\n为这个镜像指定一个标识其**用途或版本**的\
    \ `tag`（标签），可能比给一个新名称更合适。我将再次为其打标签，这次使用 `alpine` 名称，标签为 `demo`：\n\n```\n> docker\
    \ tag alpine-demo alpine:demo\n> docker images\nREPOSITORY        TAG        \
    \ IMAGE ID       CREATED          SIZE\nalpine-new        latest      8cf63acc1f17\
    \   27 minutes ago   5.54MB\nalpine            demo        8cf63acc1f17   27 minutes\
    \ ago   5.54MB\nalpine-demo       latest      8cf63acc1f17   27 minutes ago  \
    \ 5.54MB\nalpine            latest      9c6f07244728   2 weeks ago      5.54MB\n\
    ```\n\n这相当混乱——同一个镜像有三个别名！让我们使用 `docker rmi` 来清理重复的镜像 `alpine-demo` 和 `alpine-new`：\n\
    \n```\n> docker rmi alpine-demo\nUntagged: alpine-demo:latest\n> docker rmi alpine-new\n\
    Untagged: alpine-new:latest\n```\n\n注意 Docker 的响应。它 `取消标记`（Untagged）了镜像，但并未删除它们。`docker\
    \ images` 显示该镜像只有一个条目，使用 `alpine:demo` 的名称/标签组合：\n\n```\n> docker images\nREPOSITORY\
    \        TAG         IMAGE ID       CREATED          SIZE\nalpine            demo\
    \        8cf63acc1f17   29 minutes ago   5.54MB\nalpine            latest    \
    \  9c6f07244728   2 weeks ago      5.54MB\n```\n\n当这个镜像只剩下一个别名时，运行 `docker rmi\
    \ alpine:demo` 会将其从系统中完全删除：^(⁸⁰)\n\n```\n> docker rmi alpine:demo\nUntagged: alpine:demo\n\
    Deleted: sha256:8cf63acc1f17c28d78ce7efac26f19f428847e895db81182ec1063e41b4246b4\n\
    Deleted: sha256:1d5ae09bcac7b79cb3dea2209118be4199b2cc91050968aca0037daea0a4728c\n\
    ```\n\n### 在构建时标记镜像\n\n`tag` 命令为命名现有镜像和添加别名提供了一种方式。在构建过程本身中分配名称和标签要容易得多。`docker\
    \ build` 的 `-t` 选项正是做这个的：\n\n```\ndocker build ...\n-t [/][:]\n...\n```\n\n我们在本书通篇使用的镜像中见过这种模式：\n\
    \n```\noracle/database:19.3.0-ee\noraclelinux:7-slim\n```\n\n以及在 `docker images`\
    \ 命令的输出中：\n\n```\nREPOSITORY       TAG         IMAGE ID       CREATED        SIZE\n\
    oracle/database  19.3.0-ee   1b588736c8c1   2 months ago   6.67GB\noraclelinux\
    \      7-slim      9ec0d85eaed0   4 months ago   133MB\n```\n\n**解读镜像名称**\n\n\
    *   最后一个斜杠^(⁸¹)之前的部分是仓库命名空间 `oracle`。Oracle Linux 镜像与一个命名空间无关。\n*   镜像名称是 `database`\
    \ 和 `oraclelinux`。\n*   前面带冒号的标签，通常代表版本信息，用于区分原本相似的镜像，例如 `19.3.0-ee` 和 `7-slim`。\n\
    \n我严重依赖标签和一致的镜像命名来组织和理解我的镜像。当你开始构建镜像时，花点时间考虑一下最适合你或你团队的模式！\n\n你可以为一个 `build`（构建）分配多个标签：\n\
    \n```\ndocker build ...\n-t oracledb:19.15-ee \\\n-t my_namespace/oracledb:19.15-ee\
    \ \\\n...\n```\n\n这在具有本地和远程仓库的环境中节省了时间。此示例中的镜像有两个别名：`oracledb:19.15-ee` 和 `my_namespace/oracledb:19.15-ee`。第二个别名引用了一个远程仓库，一旦构建完成，成品镜像就已经被标记好，可以上传或\
    \ `push`（推送到）目标位置。第 16 章将详细讨论这一点。\n\n## 参数\n\n第 12 章中关于参数的部分介绍了它们在 Dockerfile\
    \ 中的实现。提醒一下，参数用于初始化变量并（可选地）设置其默认值：\n\n```\nARG ORACLE_HOME=/opt/oracle/product/19c/dbhome_1\n\
    ENV ORACLE_HOME=$ORACLE_HOME\n```\n\n在构建过程中，使用 `--build-arg` 选项将自定义值传递给参数：\n\n\
    ```\ndocker build ...\n--build-arg ORACLE_HOME=/u01/oracle/product/19.3.0/dbhome_1\n\
    ...\n```\n\n构建过程会覆盖 Dockerfile 中 `ORACLE_HOME` 参数的值，进而将环境值分配到镜像中。\n\n在第 12 章中，你了解到\
    \ `ARG` 是唯一可以出现在 `FROM` 语句之前的 Dockerfile 命令。该参数仅对紧随其后的 `FROM` 语句可用，并允许操作构建所使用的基础镜像：\n\
    \n```\nARG IMAGE_NAME=oraclelinux:7-slim\nFROM $IMAGE_NAME\n...\n```\n\n使用 `--build-arg`\
    \ 会改变上述示例中 Dockerfile 所使用的基础镜像：\n\n```\ndocker build ...\n--build-arg IMAGE_NAME=oraclelinux:7\n\
    ...\n```\n\n用多个 `--build-arg` 来定义多个参数，每个参数对应一个。\n"
- fmt: '## Housekeeping


    Every step in a Dockerfile runs a container based on an image generated in a previous
    step or referenced in a `FROM` statement. It makes sense—images are immutable,
    after all—and the commands in Dockerfiles are essentially scripts that run a series
    of images as containers, make some changes, and save the result. It’s visible
    when looking back at Listing [14-2](#514143_1_En_14_Chapter.xhtml#PC3). Notice
    the build process creates two intermediate containers before completing the image.


    There’s a saying, “To find the easiest way of doing something, ask a lazy person.”
    In that sense, Docker is *extremely* lazy, doing everything in its power to limit
    the work it has to do! In the build process, that means caching layers and saving
    intermediate containers, just in case it *might* need them later!


    I didn’t realize this when I began exploring Docker and building images. As a
    hands-on learner who likes to experiment, I did my fair share of trial and error,
    making minor changes to Dockerfiles and examining the results. Every change, every
    experiment, and every mistake along the way resulted in new intermediate containers
    that Docker helpfully cached away, just in case I needed them later. Until one
    day, Docker just… stopped. My build cache grew to several gigs, consuming all
    the space in Docker’s virtual machine! Fortunately, there are reactive and proactive
    solutions to this situation.


    ### Pruning


    The reactive fix is purging Docker’s build cache. We can view space used in the
    build cache, along with other objects like images, containers, and volumes, with
    `docker system df`:


    ```

    > docker system df

    TYPE            TOTAL     ACTIVE    SIZE      RECLAIMABLE

    Images          12        10        21.89GB   11.13MB (0%)

    Containers      12        7         24.87GB   434.1MB (1%)

    Local Volumes   6         4         853.6MB   1.53kB (0%)

    Build Cache     19        0         48.38MB   48.38MB

    ```


    You notice I have 19 objects in my build cache, using just over 48MB. Docker identified
    all of that space as reclaimable. Purge the space with `docker builder prune`:


    ```

    > docker builder prune

    WARNING! This will remove all dangling build cache. Are you sure you want to continue?
    [y/N]

    ```


    Docker asks for confirmation and reports the cache it removed from the system:


    ```

    > docker builder prune

    WARNING! This will remove all dangling build cache. Are you sure you want to continue?
    [y/N] y

    Deleted build cache objects:

    h5x3svswlc8ju3p6kpfp3kfxq

    zq3ddt7nkeurbb7dw9wh87yfv

    vhxgyd4wznuu43d8petp2byq0

    7xesrmsi56gium8iir4e3wdey

    krhuiazatl6wovkvljxnicdyr

    s6p7a4olr4ioaj8rjo0klbehr

    vxc9v14ogunwqi2see58xmj35

    fm2kxjek8n93c91sczhp4ld3z

    wodldqvqsfgtd40s8ulo3nkb2

    b1ua49rpznnz4t1wk4c16zzqr

    ssz3lpns9rxxp2agb2011kvwl

    Total reclaimed space: 48.38MB

    ```


    Once completed, rerun `docker system df` and verify it reclaimed the space:


    ```

    > docker system df

    TYPE            TOTAL     ACTIVE    SIZE      RECLAIMABLE

    Images          12        10        21.89GB   11.13MB (0%)

    Containers      12        7         24.87GB   434.1MB (1%)

    Local Volumes   6         4         853.6MB   1.53kB (0%)

    Build Cache     8         0         0B        0B

    ```


    Another command, `docker system prune`, takes a more severe approach by removing
    build cache, unused networks, stopped containers, and dangling images:


    ```

    > docker system prune

    WARNING! This will remove:

    - all stopped containers

    - all networks not used by at least one container

    - all dangling images

    - all dangling build cache

    Are you sure you want to continue? [y/N] n

    ```


    This is the same as running four separate commands:


    ```

    docker container prune

    docker network prune

    docker image prune

    docker builder prune

    ```


    Use it with caution!^([^(82)](#fn82)) Pruning Docker objects is irreversible!


    ### Cache Management


    If you’d rather avoid the mystery and unpleasantness of “things not working,”
    apply an ounce of prevention to your builds and remove or bypass cache altogether
    with the build’s cache management options: `--rm`, `--force-rm`, and `--no-cache`.


    *   `--rm=true` removes intermediate containers (the ones created in steps 1 and
    2 in Listing [14-2](#514143_1_En_14_Chapter.xhtml#PC3)) after a build succeeds.
    This is the default. Setting this to false may improve build performance if you
    frequently build images with the same or similar hierarchy, where only the final
    few steps are different. Allowing Docker to keep intermediate images increases
    the chance that subsequent, similar builds will find matching layers and bypass
    some work.

    *   `--force-rm=true` deletes intermediate containers whether or not the build
    succeeds. Forcing removal, even for failed images, limits troubleshooting options
    (as you’ll see in Chapter [15](#514143_1_En_15_Chapter.xhtml)).

    *   `--no-cache=true` prevents Docker from using (or creating) cache. Besides
    saving space on your system, the `--no-cache=true` option has a less obvious benefit—forcing
    Docker to pull the latest base image. The `--no-cache=true` option effectively
    causes Docker to build every image from scratch.


    Including cache management in builds, alongside checks to monitor space consumption,
    helps keep the system healthy and trim. These settings apply fine-grained control
    to caching in individual build activities. For testing and troubleshooting, `--rm=false`
    preserves build artifacts that can aid in diagnosing failures. The `--force-rm=true`
    or `--no-cache=true` options suit unique images that are unlikely to share content.
    And preventing caching altogether through `--no-cache=true` guarantees images
    are reading the latest versions of assets.


    The downside of `--no-cache=true` is the risk of change to base images that can
    break a build. For instance, using `FROM centos`, without any version or tag,
    really means `centos:latest`.^([^(83)](#fn83)) The “latest” version of CentOS
    is a moving target, over time changing from `centos:6` to `centos:7` to `centos:8`,
    with stops at minor releases along the way. An image that worked when the “latest”
    was CentOS 7 may break by moving to CentOS 8—and this illustrates why it’s always
    a good idea to identify specific versions for the assets you source!^([^(84)](#fn84))


    Note


    The `buildContainerImage.sh` script provided by Oracle manages cache with hard-coded
    values of `--force-rm=true` and `--no-cache=true`.


    ## BuildKit


    *BuildKit* is an advanced image builder that adds security features, better cache
    efficiency, and speed to existing build activities. It’s been part of Docker since
    version 18.06\. It supports builds of Linux-based container images on Windows,
    Mac, and Linux systems.


    BuildKit is an improvement over the legacy build engine and the default builder
    on newer Docker releases. Verify whether it’s the default in Docker Desktop environments,
    as in Figure [14-1](#514143_1_En_14_Chapter.xhtml#Fig1), by navigating to the
    settings pane and confirming the following line is present:


    ![](images/514143_1_En_14_Chapter/514143_1_En_14_Fig1_HTML.jpg)


    A snapshot of docker desktop with docker engine, settings, and features : open
    curly bracket, buildkit : true, close curly bracket labeled.


    Figure 14-1


    In Docker Desktop, navigate to the Settings pane and look under the Docker Engine
    section for the BuildKit feature entry


    ```

    "features": { "buildkit": true }

    ```


    If BuildKit isn’t enabled and you’d like to try it out, add the BuildKit flag,
    `DOCKER_BUILDKIT=1`, to the beginning of any build command:


    ```

    DOCKER_BUILDKIT=1 docker build ...

    ```


    Notice there’s nothing between the environment setting and the `docker build`
    command itself in this example, and this syntax enables BuildKit only for the
    build in question. You can also export the value in the environment:


    ```

    export DOCKER_BUILDKIT=1

    ```


    Alternately, disable BuildKit by setting the `DOCKER_BUILDKIT` variable to zero.'
  raw: '## Housekeeping


    Every step in a Dockerfile runs a container based on an image generated in a previous
    step or referenced in a `FROM` statement. It makes sense—images are immutable,
    after all—and the commands in Dockerfiles are essentially scripts that run a series
    of images as containers, make some changes, and save the result. It’s visible
    when looking back at Listing [14-2](#514143_1_En_14_Chapter.xhtml#PC3). Notice
    the build process creates two intermediate containers before completing the image.


    There’s a saying, “To find the easiest way of doing something, ask a lazy person.”
    In that sense, Docker is *extremely* lazy, doing everything in its power to limit
    the work it has to do! In the build process, that means caching layers and saving
    intermediate containers, just in case it *might* need them later!


    I didn’t realize this when I began exploring Docker and building images. As a
    hands-on learner who likes to experiment, I did my fair share of trial and error,
    making minor changes to Dockerfiles and examining the results.


    Every change, every experiment, and every mistake along the way resulted in new
    intermediate containers that Docker helpfully cached away, just in case I needed
    them later.


    Until one day, Docker just… stopped. My build cache grew to several gigs, consuming
    all the space in Docker’s virtual machine! Fortunately, there are reactive and
    proactive solutions to this situation.


    ### Pruning


    The reactive fix is purging Docker’s build cache. We can view space used in the
    build cache, along with other objects like images, containers, and volumes, with
    `docker system df`:


    ```

    > docker system df

    TYPE            TOTAL     ACTIVE    SIZE      RECLAIMABLE

    Images          12        10        21.89GB   11.13MB (0%)

    Containers      12        7         24.87GB   434.1MB (1%)

    Local Volumes   6         4         853.6MB   1.53kB (0%)

    Build Cache     19        0         48.38MB   48.38MB

    ```


    You notice I have 19 objects in my build cache, using just over 48MB. Docker identified
    all of that space as reclaimable. Purge the space with `docker builder prune`:


    ```

    > docker builder prune

    WARNING! This will remove all dangling build cache. Are you sure you want to continue?
    [y/N]

    ```


    Docker asks for confirmation and reports the cache it removed from the system:


    ```

    > docker builder prune

    WARNING! This will remove all dangling build cache. Are you sure you want to continue?
    [y/N] y

    Deleted build cache objects:

    h5x3svswlc8ju3p6kpfp3kfxq

    zq3ddt7nkeurbb7dw9wh87yfv

    vhxgyd4wznuu43d8petp2byq0

    7xesrmsi56gium8iir4e3wdey

    krhuiazatl6wovkvljxnicdyr

    s6p7a4olr4ioaj8rjo0klbehr

    vxc9v14ogunwqi2see58xmj35

    fm2kxjek8n93c91sczhp4ld3z

    wodldqvqsfgtd40s8ulo3nkb2

    b1ua49rpznnz4t1wk4c16zzqr

    ssz3lpns9rxxp2agb2011kvwl

    Total reclaimed space: 48.38MB

    ```


    Once completed, rerun `docker system df` and verify it reclaimed the space:


    ```

    > docker system df

    TYPE            TOTAL     ACTIVE    SIZE      RECLAIMABLE

    Images          12        10        21.89GB   11.13MB (0%)

    Containers      12        7         24.87GB   434.1MB (1%)

    Local Volumes   6         4         853.6MB   1.53kB (0%)

    Build Cache     8         0         0B        0B

    ```


    Another command, `docker system prune`, takes a more severe approach by removing
    build cache, unused networks, stopped containers, and dangling images:


    ```

    > docker system prune

    WARNING! This will remove:

    - all stopped containers

    - all networks not used by at least one container

    - all dangling images

    - all dangling build cache

    Are you sure you want to continue? [y/N] n

    ```


    This is the same as running four separate commands:


    ```

    docker container prune

    docker network prune

    docker image prune

    docker builder prune

    ```


    Use it with caution!^([^(82)](#fn82)) Pruning Docker objects is irreversible!


    ### Cache Management


    If you’d rather avoid the mystery and unpleasantness of “things not working,”
    apply an ounce of prevention to your builds and remove or bypass cache altogether
    with the build’s cache management options: `--rm`, `--force-rm`, and `--no-cache`.


    *   `--rm=true` removes intermediate containers (the ones created in steps 1 and
    2 in Listing [14-2](#514143_1_En_14_Chapter.xhtml#PC3)) after a build succeeds.
    This is the default. Setting this to false may improve build performance if you
    frequently build images with the same or similar hierarchy, where only the final
    few steps are different. Allowing Docker to keep intermediate images increases
    the chance that subsequent, similar builds will find matching layers and bypass
    some work.


    *   `--force-rm=true` deletes intermediate containers whether or not the build
    succeeds. Forcing removal, even for failed images, limits troubleshooting options
    (as you’ll see in Chapter [15](#514143_1_En_15_Chapter.xhtml)).


    *   `--no-cache=true` prevents Docker from using (or creating) cache. Besides
    saving space on your system, the `--no-cache=true` option has a less obvious benefit—forcing
    Docker to pull the latest base image. The `--no-cache=true` option effectively
    causes Docker to build every image from scratch.


    Including cache management in builds, alongside checks to monitor space consumption,
    helps keep the system healthy and trim. These settings apply fine-grained control
    to caching in individual build activities. For testing and troubleshooting, `--rm=false`
    preserves build artifacts that can aid in diagnosing failures. The `--force-rm=true`
    or `--no-cache=true` options suit unique images that are unlikely to share content.
    And preventing caching altogether through `--no-cache=true` guarantees images
    are reading the latest versions of assets.


    The downside of `--no-cache=true` is the risk of change to base images that can
    break a build. For instance, using `FROM centos`, without any version or tag,
    really means `centos:latest`.^([^(83)](#fn83)) The “latest” version of CentOS
    is a moving target, over time changing from `centos:6` to `centos:7` to `centos:8`,
    with stops at minor releases along the way. An image that worked when the “latest”
    was CentOS 7 may break by moving to CentOS 8—and this illustrates why it’s always
    a good idea to identify specific versions for the assets you source!^([^(84)](#fn84))


    Note


    The `buildContainerImage.sh` script provided by Oracle manages cache with hard-coded
    values of `--force-rm=true` and `--no-cache=true`.


    ## BuildKit


    *BuildKit* is an advanced image builder that adds security features, better cache
    efficiency, and speed to existing build activities. It’s been part of Docker since
    version 18.06\. It supports builds of Linux-based container images on Windows,
    Mac, and Linux systems.


    BuildKit is an improvement over the legacy build engine and the default builder
    on newer Docker releases. Verify whether it’s the default in Docker Desktop environments,
    as in Figure [14-1](#514143_1_En_14_Chapter.xhtml#Fig1), by navigating to the
    settings pane and confirming the following line is present:


    ![](images/514143_1_En_14_Chapter/514143_1_En_14_Fig1_HTML.jpg)


    A snapshot of docker desktop with docker engine, settings, and features : open
    curly bracket, buildkit : true, close curly bracket labeled.


    Figure 14-1


    In Docker Desktop, navigate to the Settings pane and look under the Docker Engine
    section for the BuildKit feature entry


    ```

    "features": { "buildkit": true }

    ```


    If BuildKit isn’t enabled and you’d like to try it out, add the BuildKit flag,
    `DOCKER_BUILDKIT=1`, to the beginning of any build command:


    ```

    DOCKER_BUILDKIT=1 docker build ...

    ```


    Notice there’s nothing between the environment setting and the `docker build`
    command itself in this example, and this syntax enables BuildKit only for the
    build in question. You can also export the value in the environment:


    ```

    export DOCKER_BUILDKIT=1

    ```


    Alternately, disable BuildKit by setting the `DOCKER_BUILDKIT` variable to zero.'
  trans: '

    ## 清理工作


    Dockerfile 中的每一步都是基于前一步生成的镜像或 `FROM` 语句中引用的镜像来运行一个容器。这是合理的——毕竟镜像是不可变的——而 Dockerfile
    中的命令本质上是运行一系列镜像作为容器、进行一些更改并保存结果的脚本。回顾清单 14-2 时，这一点清晰可见。注意，构建过程在完成镜像之前创建了两个中间容器。


    有句俗话：“想找到做某事的最简单方法，就去问一个懒人。”从这个意义上说，Docker *极其*“懒惰”，它会尽其所能地限制自己需要做的工作！在构建过程中，这意味着缓存层并保存中间容器，以防它*可能*以后需要它们！


    当我刚开始探索 Docker 和构建镜像时，并没有意识到这一点。作为一个喜欢动手实验的学习者，我进行了大量的试错，对 Dockerfile 进行微小的更改并检查结果。每一次更改、每一次实验、以及沿途的每一个错误，都会产生新的中间容器，而
    Docker 会贴心地将它们缓存起来，以防我以后需要。直到有一天，Docker 突然……停止了。我的构建缓存增长到了几个 GB，占满了 Docker 虚拟机中的所有空间！幸运的是，有应对这种情况的补救性和预防性解决方案。


    ### 清理


    补救性的解决方法是清除 Docker 的构建缓存。我们可以使用 `docker system df` 查看构建缓存占用的空间，以及其他对象（如镜像、容器和卷）的使用情况：


    ```

    > docker system df

    TYPE            TOTAL     ACTIVE    SIZE      RECLAIMABLE

    Images          12        10        21.89GB   11.13MB (0%)

    Containers      12        7         24.87GB   434.1MB (1%)

    Local Volumes   6         4         853.6MB   1.53kB (0%)

    Build Cache     19        0         48.38MB   48.38MB

    ```


    你会注意到我构建缓存中有 19 个对象，占用了略多于 48MB 的空间。Docker 将所有这些空间都标识为可回收的。使用 `docker builder
    prune` 清理这些空间：


    ```

    > docker builder prune

    WARNING! This will remove all dangling build cache. Are you sure you want to continue?
    [y/N]

    ```


    Docker 要求确认，并报告从系统中删除的缓存：


    ```

    > docker builder prune

    WARNING! This will remove all dangling build cache. Are you sure you want to continue?
    [y/N] y

    Deleted build cache objects:

    h5x3svswlc8ju3p6kpfp3kfxq

    zq3ddt7nkeurbb7dw9wh87yfv

    vhxgyd4wznuu43d8petp2byq0

    7xesrmsi56gium8iir4e3wdey

    krhuiazatl6wovkvljxnicdyr

    s6p7a4olr4ioaj8rjo0klbehr

    vxc9v14ogunwqi2see58xmj35

    fm2kxjek8n93c91sczhp4ld3z

    wodldqvqsfgtd40s8ulo3nkb2

    b1ua49rpznnz4t1wk4c16zzqr

    ssz3lpns9rxxp2agb2011kvwl

    Total reclaimed space: 48.38MB

    ```


    完成后，重新运行 `docker system df` 并验证空间是否已回收：


    ```

    > docker system df

    TYPE            TOTAL     ACTIVE    SIZE      RECLAIMABLE

    Images          12        10        21.89GB   11.13MB (0%)

    Containers      12        7         24.87GB   434.1MB (1%)

    Local Volumes   6         4         853.6MB   1.53kB (0%)

    Build Cache     8         0         0B        0B

    ```


    另一个命令 `docker system prune` 采取更彻底的方式，它会移除构建缓存、未使用的网络、已停止的容器和悬空镜像：


    ```

    > docker system prune

    WARNING! This will remove:

    - all stopped containers

    - all networks not used by at least one container

    - all dangling images

    - all dangling build cache

    Are you sure you want to continue? [y/N] n

    ```


    这等同于运行以下四个独立命令：


    ```

    docker container prune

    docker network prune

    docker image prune

    docker builder prune

    ```


    请谨慎使用！^(⁸²) 清理 Docker 对象是不可逆的！


    ### 缓存管理


    如果你宁愿避免“东西不工作”的神秘感和不愉快，可以在构建时采取一点预防措施，使用构建的缓存管理选项 `--rm`、`--force-rm` 和 `--no-cache`
    来移除或完全绕过缓存。


    *   `--rm=true` 在构建成功后移除中间容器（即清单 14-2 中步骤 1 和 2 创建的那些）。这是默认设置。如果你经常构建具有相同或相似层次结构的镜像，而只有最后几个步骤不同，将其设置为
    `false` 可能会提高构建性能。允许 Docker 保留中间镜像增加了后续相似构建找到匹配层并绕过一些工作的机会。

    *   `--force-rm=true` 无论构建是否成功，都删除中间容器。强制删除（即使是失败的镜像）会限制故障排除的选择（如第 15 章所述）。

    *   `--no-cache=true` 阻止 Docker 使用（或创建）缓存。除了节省系统空间外，`--no-cache=true` 选项还有一个不太明显的好处——强制
    Docker 拉取最新的基础镜像。`--no-cache=true` 选项实际上会导致 Docker 从头开始构建每个镜像。


    在构建中加入缓存管理，并结合监控空间消耗的检查，有助于保持系统健康且精简。这些设置对单个构建活动中的缓存应用了细粒度控制。对于测试和故障排除，`--rm=false`
    可以保留有助于诊断失败的构建产物。`--force-rm=true` 或 `--no-cache=true` 选项适用于不太可能共享内容的独特镜像。而通过
    `--no-cache=true` 完全防止缓存则保证镜像读取资产的最新版本。


    `--no-cache=true` 的缺点是基础镜像的更改可能破坏构建的风险。例如，使用不带任何版本或标签的 `FROM centos`，实际上意味着 `centos:latest`。^(⁸³)
    CentOS 的“最新”版本是一个移动的目标，随着时间推移从 `centos:6` 变为 `centos:7` 再到 `centos:8`，期间还经过了许多小版本。一个在“最新”版本是
    CentOS 7 时能工作的镜像，可能因为移动到 CentOS 8 而损坏——这说明了为什么始终为你所依赖的资产指定具体版本是个好主意！^(⁸⁴)


    注意


    Oracle 提供的 `buildContainerImage.sh` 脚本使用硬编码的 `--force-rm=true` 和 `--no-cache=true`
    值来管理缓存。


    ## BuildKit


    *BuildKit* 是一个高级镜像构建器，它为现有的构建活动增加了安全特性、更好的缓存效率和速度。自 Docker 18.06 版本以来，它一直是 Docker
    的一部分。它支持在 Windows、Mac 和 Linux 系统上构建基于 Linux 的容器镜像。


    BuildKit 是对旧版构建引擎的改进，并且是较新 Docker 版本中的默认构建器。要验证它是否是 Docker Desktop 环境中的默认设置（如图
    14-1 所示），可以导航到设置窗格并确认存在以下内容：


    ![](img/514143_1_En_14_Fig1_HTML.jpg)


    Docker Desktop 的快照，显示 Docker Engine、设置和特性：花括号内为 `buildkit : true`，并有标签。


    图 14-1


    在 Docker Desktop 中，导航到设置窗格，在 Docker Engine 部分下查找 BuildKit 特性条目


    ```

    "features": { "buildkit": true }

    ```


    如果 BuildKit 未启用而你希望尝试一下，可以在任何构建命令的开头添加 BuildKit 标志 `DOCKER_BUILDKIT=1`：


    ```

    DOCKER_BUILDKIT=1 docker build ...

    ```


    注意，在这个例子中，环境设置和 `docker build` 命令本身之间没有任何内容，此语法仅为当前构建启用 BuildKit。你也可以在环境中导出该值：


    ```

    export DOCKER_BUILDKIT=1

    ```


    或者，通过将 `DOCKER_BUILDKIT` 变量设置为零来禁用 BuildKit。

    '
