    *   `bash-completion`：一组用于自动补全 Linux 命令的辅助函数。

    *   `git`：添加了与基于 `git` 的仓库交互所需的库。

    *   `less`：一个文件查看器，类似于 `more`，用于在 Linux 系统上阅读和搜索文本文件。

    *   `strace`：一个调试和诊断工具，用于检查信号和系统调用。`strace` 对于调查数据库内核中的潜在问题非常宝贵。

    *   `tree`：以具有父子关系的层次化"树"结构可视化显示目录结构。

    *   `vi`：我选择的编辑器！

    *   `which`：一个有用的工具，用于显示用户 `PATH` 中可执行文件的位置。


    要更新 `yum install` 命令以包含其他包，请将它们添加在 `install` 关键字和标记 `yum` 命令结尾的双和号 `&&` 之间的任何位置。例如，要添加
    `less`、`strace`、`tree` 和 `vi`，将命令更改为：


    ```

    yum -y install oracle-database-preinstall-19c openssl less strace tree vi && \

    ```


    使用更新后的脚本构建新镜像后，从该新镜像运行的所有容器都将包含添加的命令。


    ### `Dockerfile`


    有一个可能的修改可以改进或定制容器中的交互。这个修改位于默认的 `Dockerfile` 中，它创建了一个 `.bashrc` 文件。这个文件在每次交互式
    `bash` 会话开始时运行，可用于设置 shell 提示符、环境变量、别名，甚至执行命令。


    接下来的两章会深入讨论 Dockerfile，但并非每个人都需要从定制镜像中获得的额外控制权。这个技巧有更广泛的应用，因此我将其放在这里。


    打开你仓库中的 `Dockerfile`，导航到文件末尾。在 19c 和 21c 版本中，你会找到一行：


    ```

    # Add a bashrc file to capitalize ORACLE_SID in the environment

    RUN echo ''ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}''
    > .bashrc

    ```


    如果你的版本没有这一行，你可以在以 `HEALTHCHECK` 开头的那一行之前添加一个。


    要理解这个命令，让我们分解它的各个部分：


    *   `RUN`：`Dockerfile` 中的 `RUN` 命令告诉构建过程运行一个或多个命令。不要将其与 `docker run` 混淆！前者是镜像构建过程中的一个步骤，后者是用于创建新容器。`RUN`
    后面是 Docker 用于构建镜像的命令。

    *   `echo ''ORACLE_SID=` 到 `${ORACLE_SID^^}''`：这是 Docker 在镜像中运行的命令。`echo` 将输出显示到
    `stdout` 或**标准输出**，通常是终端。它打印的文本是单引号（`''`）之间的所有内容。

    *   `> .bashrc`：单个右尖括号（`>`）是一个**输出重定向**，它将 `echo` 语句的输出发送到一个文件。单个尖括号会覆盖文件内容；两个尖括号（`>>`）则将输出追加到文件末尾。接收结果的文件是
    `.bashrc`。


    我想提请注意 `echo` 命令中单引号的使用。单引号按字面意义处理其内容，不解释或替换引号字符串中的任何内容。如果字符串用双引号包围，`bash` 将使用环境中的值替换
    `$ORACLE_SID`。比较使用单引号和双引号产生的不同结果：


    ```

    echo ''ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}''

    ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}

    echo "ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}"

    ORACLE_SID=ORCLCDB; export ORACLE_SID=

    ```


    在第二个使用双引号的例子中，替换是空的，因为 `$ORACLE_SID` 没有设置。这个命令预期一个定义了 `$ORACLE_SID` 的环境，但它在镜像构建过程中运行，*在设置变量之前*！


    这个 `RUN` 命令在 `oracle` 用户的主目录中创建一个新的 `.bashrc` 文件，并在 `oracle` 用户每次登录时运行。第一部分将 `ORACLE_SID`
    设置为环境中的任何值。如果启动容器的 `docker run` 命令包含了 `-e` 标志和 `ORACLE_SID` 的值，则使用该值。如果没有值，`bash`
    的操作符 `:-ORCLCDB` 会给出一个默认值 `ORCLCDB`：


    ```

    ORACLE_SID=${ORACLE_SID:-ORCLCDB}

    ```


    下一部分使用 `^^` 操作符将 `ORACLE_SID` 转换为大写，并将其导出到环境中：


    ```

    export ORACLE_SID=${ORACLE_SID^^}

    ```


    我们可以在 19c 和 21c `Dockerfile` 中现有的 `RUN` 命令（或在其他版本的 `Dockerfile` 中添加类似的行）的基础上构建，该命令将条目写入
    `.bashrc` 文件。这种模式也便于对容器环境进行其他更改。两个例子是修改 shell 提示符和为 SQL*Plus 创建一个 `login.sql`
    文件。

    '
- fmt: '#### 修改默认Shell提示符


    特殊的`PS1`变量控制着shell提示符的外观，它有一个特殊字符库，用于显示（除其他外）日期、当前目录，甚至设置颜色。以下语法将提示符设置为显示用户（`\u`）、`ORACLE_SID`和当前目录（`\w`），后跟新行上的哈希提示符（`\n#`）：


    ```

    export PS1="[\u - ${ORACLE_SID}] \w\n# "

    ```


    要将此添加到现有的`RUN`命令中：


    ```

    RUN echo ''ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^};
    export PS1="[\u - ${ORACLE_SID}] \w\n# "'' > .bashrc

    ```


    `PS1`变量中的方括号是必须包含在引号内的特殊字符。


    #### 添加login.sql文件


    Oracle在启动SQL*Plus时会读取两个文件：位于`$ORACLE_HOME/sqlplus/admin`下的`glogin.sql` *全局登录*文件，以及位于`$ORACLE_PATH`下的可选`login.sql`
    *登录*文件。这些文件可以包含任何在SQL*Plus会话启动时运行的SQL或SQL*Plus语句或命令。全局登录文件对所有人都有效，但个别用户可以分配自定义登录文件并在其本地环境中设置路径。


    要理解为什么您可能需要登录文件，请打开SQL*Plus并运行以下语句：


    ```

    select * from v$database;

    ```


    该表只有一行，但输出分散在重复的标题之间。它既难看又难以阅读。根本原因是Oracle的默认`pagesize`设置，它控制每页显示多少行文本：


    ```

    SQL> show pages

    pagesize 14

    ```


    要使输出呈现得更易于理解，将`pagesize`更改为更大的值，例如9999：


    ```

    set pages 9999

    ``


    如果您希望看到不同的格式，可以*每次登录时*手动运行此set命令。或者，将其添加到`login.sql`文件中，让Oracle为您完成。要将后一种自动化解决方案整合到Docker镜像中，我们需要在镜像的`.bashrc`文件中设置`$ORACLE_PATH`变量，并在`$ORACLE_PATH`目录中创建一个新的`login.sql`文件。


    这是一组相对复杂的指令。我们可以在Dockerfile中添加多个`RUN`行，但是（原因在第[12](#514143_1_En_12_Chapter.xhtml)章中介绍），将`RUN`命令的数量保持在最低限度是可取的。相反，我将利用之前见过的双与号（`&&`）和反斜杠（`\`）将多个命令跨多行串联起来，全部作为一个`RUN`指令的一部分：


    ```

    RUN echo ''ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}''
    > .bashrc && \

    echo ''export ${ORACLE_PATH}=/home/oracle'' >> .bashrc && \

    echo ''set pages 9999'' > /home/oracle/login.sql

    ```


    请注意，第二行上的重定向使用两个插入符号（`>>`）来将文本追加到`.bashrc`文件，而不是覆盖它。


    **避免更改`glogin.sql`文件！** 它适用于所有SQL*Plus活动，包括任何自动化或后台进程。运行SQL或更改环境可能会对您的数据库产生奇怪或灾难性的影响！


    希望这些示例能激发您的想象力，并为您提供一个扩展和增强容器的工具！


    ## 数据库安装


    在为Oracle准备好操作系统之后，自动化的数据库安装就开始了。软件安装过程本身并没有太多内容；这是一个由`installDBBinaries.sh`脚本控制的相当通用的过程。令人兴奋的部分是安装脚本如何与`db_inst.rsp`响应文件协同工作。


    ### installDBBinaries.sh


    如前所述，我们通常尝试使容器尽可能小，数据库安装也不例外。在19c和21c脚本的末尾附近，有一部分专门用于此目的：


    ```

    if $SLIMMING; then

    # Remove not needed components

    # APEX

    rm -rf "$ORACLE_HOME"/apex && \

    # ORDS

    rm -rf "$ORACLE_HOME"/ords && \

    # SQL Developer

    rm -rf "$ORACLE_HOME"/sqldeveloper && \

    # UCP connection pool

    rm -rf "$ORACLE_HOME"/ucp && \

    # All installer files

    rm -rf "$ORACLE_HOME"/lib/*.zip && \

    # OUI backup

    rm -rf "$ORACLE_HOME"/inventory/backup/* && \

    # Network tools help

    rm -rf "$ORACLE_HOME"/network/tools/help && \

    # Database upgrade assistant

    rm -rf "$ORACLE_HOME"/assistants/dbua && \

    # Database migration assistant

    rm -rf "$ORACLE_HOME"/dmu && \

    # Remove pilot workflow installer

    rm -rf "$ORACLE_HOME"/install/pilot && \

    # Support tools

    rm -rf "$ORACLE_HOME"/suptools && \

    # Temp location

    rm -rf /tmp/* && \

    # Database files directory

    rm -rf "$INSTALL_DIR"/database

    fi

    ```


    在撰写本文时，这些语句在19c之前的版本中没有包装在`if`语句中，但为了保持一致性，可能会为这些版本添加类似的逻辑。


    此`if`语句检查一个构建参数`SLIMMING`的值，在安装后删除数据库主目录中的多个目录。要防止脚本删除这些目录，请将`SLIMMING`变量设置为`false`。实现此目的的一种方法是编辑Dockerfile并将以下行中的`true`更改为`false`：


    ```

    ARG SLIMMING=true

    ```


    目前，`buildContainerImage.sh`脚本中没有选项可以影响构建并保留这些目录。同样，该功能可能会在以后添加。


    我强调脚本的这一部分的真正原因与从早期版本的Oracle升级到19c有关。Docker的一个强大用途是规划和准备数据库升级。在将旧版本的Oracle升级到19c之前，您需要删除旧的APEX安装。删除APEX的脚本位于`$ORACLE_HOME/apex`下。


    但看看`installDBBinaries.sh`脚本对于每个版本是如何处理APEX的：


    ```

    rm -rf "$ORACLE_HOME"/apex

    ```


    如果用于删除APEX的脚本所在的目录都不存在了，您又如何能删除APEX呢？


    替代方案不是在Dockerfile中更改`SLIMMING`的值，而是用井号（`#`）注释掉单个行：


    ```

    #rm -rf "$ORACLE_HOME"/apex

    ```


    关键点是记住，默认情况下，数据库安装脚本会“精简”数据库主目录。如果您对Docker的计划涉及被删除目录中的任何内容，请务必相应地更新`installDBBinaries.sh`脚本，以节省自己的麻烦！'
  raw: '#### Modify the Default Shell Prompt


    The special `PS1` variable controls the appearance of the shell prompt, with a
    library of special characters for displaying (among other things) the date, current
    directory, and even setting colors. The following syntax sets the prompt to show
    the user (`\u`), the `ORACLE_SID`, and the current directory (`\w`), followed
    by a hash prompt on a new line (`\n#` ):


    ```

    export PS1="[\u - ${ORACLE_SID}] \w\n# "

    ```


    To add this to the existing `RUN` command:


    ```

    RUN echo ''ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^};
    export PS1="[\u - ${ORACLE_SID}] \w\n# "'' > .bashrc

    ```


    The brackets in the `PS1` variable are special characters that must be inside
    quotes.


    #### Add a login.sql File


    Oracle reads two files whenever starting SQL*Plus: the `glogin.sql` *global login*
    file under `$ORACLE_HOME/sqlplus/admin` and an optional `login.sql` *login* file
    present in the `$ORACLE_PATH`. These files can contain any SQL or SQL*Plus statements
    or commands to run when SQL*Plus sessions start. The global login file runs for
    everyone, but individual users can assign custom login files and set the path
    in their local environment.


    To understand why you might want a login file, open SQL*Plus and run the following
    statement:


    ```

    select * from v$database;

    ```


    The table has one line, with output scattered among repeated headings. It’s ugly
    and difficult to read. The underlying cause is Oracle’s default setting of `pagesize`,
    which controls how many lines of text to put on each page:


    ```

    SQL> show pages

    pagesize 14

    ```


    To see the output presented more digestibly, change the `pagesize` to a larger
    value, 9999:


    ```

    set pages 9999

    ```


    If you want to see things formatted differently, you could run this set command
    manually *every time you log in*. Or, add it to a `login.sql` file and let Oracle
    do it for you. To incorporate the latter automated solution into a Docker image,
    we need to set the `$ORACLE_PATH` variable in the image’s `.bashrc` file and create
    a new `login.sql` file in the `$ORACLE_PATH` directory.


    This is a somewhat more complex set of instructions. We could add multiple `RUN`
    lines to the Dockerfile, but (for reasons covered in Chapter [12](#514143_1_En_12_Chapter.xhtml)),
    keeping the number of `RUN` commands to a minimum is desirable. Instead, I’ll
    take advantage of the double ampersand (`&&`) and backslash (`\`) we saw before
    to string several commands together across multiple lines, all as part of a single
    `RUN` instruction:


    ```

    RUN echo ''ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}''
    > .bashrc && \

    echo ''export ${ORACLE_PATH}=/home/oracle'' >> .bashrc && \

    echo ''set pages 9999'' > /home/oracle/login.sql

    ```


    Notice that the redirection on the second line uses two carets to append text
    to the `.bashrc` file rather than overwriting it.


    Avoid changing the `glogin.sql` file! It applies to all SQL*Plus activity, including
    any automated or background processes. Running SQL or changing the environment
    can create odd or devastating effects on your database!


    Hopefully, these examples spark your imagination and offer a vehicle for you to
    extend and enhance your containers!


    ## Database Installation


    After readying the operating system for Oracle, automated database installation
    begins. There isn’t much in the software installation procedure itself; it’s a
    fairly generic process controlled by the `installDBBinaries.sh` script. The exciting
    part is how the installation script works with the `db_inst.rsp` response file.


    ### installDBBinaries.sh


    As mentioned earlier, we generally try to make containers as small as possible,
    and the database installation is no exception. There’s a section near the end
    of the 19c and 21c scripts dedicated to that purpose:


    ```

    if $SLIMMING; then

    # Remove not needed components

    # APEX

    rm -rf "$ORACLE_HOME"/apex && \

    # ORDS

    rm -rf "$ORACLE_HOME"/ords && \

    # SQL Developer

    rm -rf "$ORACLE_HOME"/sqldeveloper && \

    # UCP connection pool

    rm -rf "$ORACLE_HOME"/ucp && \

    # All installer files

    rm -rf "$ORACLE_HOME"/lib/*.zip && \

    # OUI backup

    rm -rf "$ORACLE_HOME"/inventory/backup/* && \

    # Network tools help

    rm -rf "$ORACLE_HOME"/network/tools/help && \

    # Database upgrade assistant

    rm -rf "$ORACLE_HOME"/assistants/dbua && \

    # Database migration assistant

    rm -rf "$ORACLE_HOME"/dmu && \

    # Remove pilot workflow installer

    rm -rf "$ORACLE_HOME"/install/pilot && \

    # Support tools

    rm -rf "$ORACLE_HOME"/suptools && \

    # Temp location

    rm -rf /tmp/* && \

    # Database files directory

    rm -rf "$INSTALL_DIR"/database

    fi

    ```


    At the time of writing, these statements aren’t wrapped in an `if` statement for
    versions before 19c, but similar logic may be added for consistency.


    This `if` statement checks the value of a build argument, `SLIMMING`, removing
    several directories from the database home after installation. To prevent the
    script from removing these directories, set the `SLIMMING` variable to `false`.
    One way of accomplishing this is editing the Dockerfile and changing `true` in
    the following line to `false`:


    ```

    ARG SLIMMING=true

    ```


    There’s currently no option in the `buildContainerImage.sh` script to influence
    the build and not remove these directories. Again, that functionality may be added
    later.


    The real reason I highlighted this part of the script relates to 19c upgrades
    from earlier versions of Oracle. A powerful use of Docker is planning and preparing
    for database upgrades. Before upgrading older versions of Oracle to 19c, you’ll
    need to remove older APEX installations. The scripts for removing APEX are located
    under `$ORACLE_HOME/apex`.


    But look at what the `installDBBinaries.sh` scripts do when it comes to APEX,
    for each version:


    ```

    rm -rf "$ORACLE_HOME"/apex

    ```


    How can you remove APEX if the directory with the script for removing APEX is
    missing?


    An alternative to changing the value of `SLIMMING` in the Dockerfile is commenting
    out individual lines with a hash (`#`) character:


    ```

    #rm -rf "$ORACLE_HOME"/apex

    ```


    The takeaway is to remember that the database installation script “slims down”
    the database home by default. If your plans for Docker include anything in one
    of the removed directories, save yourself some headaches and update the `installDBBinaries.sh`
    script appropriately!'
