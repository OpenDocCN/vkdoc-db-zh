    # 第二部分 构建和定制镜像


    您现在已精通运行容器，在第二部分中，我们的注意力转向构建和定制镜像。我们首先演示对第 4 章介绍的现有 Oracle 容器仓库的修改，深入探讨编写和调试 Dockerfile
    的艺术，最后讨论将镜像保存到仓库。


    ## 11. 定制镜像


    我喜欢与 Oracle（以及一般的数据库）工作的一个原因是其多样性。每天都会带来新的事物，问题通常有多种解决方案。每个机构都有自己的工作方式，解决方案根据行业实践、安全性和惯例而因客户而异。


    Docker（和其他自动化工具）补充并有助于强制执行这些标准。容器镜像是基础设施模板。容器镜像不是手工构建并引入人为错误的可能，而是提供了一个有保证的起点，预先配置以满足特定要求。


    但模板很少是一刀切的，容器镜像也是如此。在我们使用过的镜像中，Oracle 决定了如何配置环境以及包含什么内容。第 3 章提出了这个问题，当时我们发现默认的
    Ubuntu 镜像缺少 vi 编辑器。在大规模运行时，容器不需要编辑器，但在测试或实验室系统中，它们可能是一个要求，而满足这一需求需要不同的模板。我们可以手动添加编辑器，但这违背了自动化以及容器的整体理念：拥有一个包含我们所需一切的、随时可运行的镜像。


    当涉及到构建满足特定需求的 Oracle 数据库镜像时，有两种选择。第一种是编写*Dockerfiles*，即 Docker 用于构建镜像的配方，如第 12
    和 13 章所述。本章涵盖的第二种技术是扩展现有脚本以定制生成的模板。


    请记住，我们使用的容器运行的是 Oracle Enterprise Linux。容器环境中的所有命令，无论是运行容器还是构建镜像，都必须适合容器的操作系统。对于运行不同发行版版本的
    Linux 用户，请记住主机上使用的命令可能与容器中所需的命令不同。例如，Ubuntu 用户使用`apt-get`更新其系统上的软件包，但在 Oracle
    数据库容器中使用`yum`。


    ### 脚本修改


    除了 Dockerfile 和两个响应文件外，本章回顾的文件都是`bash` shell 脚本。此处的目的不是深入探讨脚本本身，而是指出如何以及在哪里更新它们以实现对最终镜像的各种修改。好消息是，您不需要成为脚本专家就能理解这些更改！


    我们将在本章中使用的文件是 Docker 仓库的一部分，该仓库在第 4 章中介绍。回想一下，将仓库复制到您的系统后，您沿着一条（相当长的）路径导航以构建您的第一个镜像：`docker-images/OracleDatabase/SingleInstance/dockerfiles`。在该目录下有几个子目录，每个数据库版本一个：


    ```

    drwxr-xr-x   8 seanscott  staff   256 May 27 20:51 11.2.0.2

    drwxr-xr-x  18 seanscott  staff   576 May 27 20:51 12.1.0.2

    drwxr-xr-x  16 seanscott  staff   512 May 27 20:51 12.2.0.1

    drwxr-xr-x  16 seanscott  staff   512 May 27 20:51 18.3.0

    drwxr-xr-x   8 seanscott  staff   256 May 27 20:51 18.4.0

    drwxr-xr-x  19 seanscott  staff   608 May 27 21:00 19.3.0

    drwxr-xr-x  21 seanscott  staff   672 May 27 21:00 21.3.0

    -rwxr-xr-x   1 seanscott  staff  7091 May 27 20:51 buildContainerImage.sh

    ```


    这些特定于版本的子目录都包含多个脚本，这些脚本执行四个类别的常规设置和配置操作：


    - 操作系统安装和配置

    - Oracle 数据库软件安装

    - 数据库创建

    - 容器启动，包括启动 Oracle 监听器和数据库


    本章中的示例基于 19c 脚本，但适用于任何版本。您将导航到与您要使用的数据库版本匹配的子目录，在那里您会发现文件具有相同的名称和用途。由于这些文件在您的本地系统上，您可以使用您喜欢的文本编辑器执行更改。


    在进行任何更改之前，最好为每个文件创建一个备份。但是，如果出现问题，请记住您总是可以从原始 GitHub 仓库重新下载或复制文件。


    ### 操作系统安装和配置


    在生产环境中运行的容器被设计得尽可能精简，原因有很多，其中节省空间和安全性是首要的。用作更复杂或专业化应用程序（包括 Oracle 数据库）基线的容器镜像通常省略任何非必需的内容。添加所需内容比记住删除不需要的内容更快、更容易，也更安全。攻击者无法利用容器中不存在的程序和软件包中的软件漏洞！


    一种通常从镜像中排除的功能是编辑器。所有必要的文件都已预安装在生产部署中，并且环境已预先配置。无需手动编辑任何内容，而默认的数据库镜像也反映了这种思路。


    另一方面，如果您将容器用作交互式或实验性平台，拥有编辑器和用于导航环境的工具是有意义的。对于用于安全或渗透测试、评估新功能以及验证补丁或程序的容器也是如此。

    '
- fmt: '### `setupLinuxEnv.sh`


    在 Linux 中，软件包通过**包管理器**提供这些功能和特性。不同的 Linux“风味”使用不同的包管理器。Oracle Enterprise Linux
    7 使用一个名为 `yum` 的包管理器，它是 *Yellowdog Updater, Modified* 的缩写。


    导航到你的仓库中 `docker-images/OracleDatabase/SingleInstance/dockerfiles` 目录下你喜欢的版本子目录，你会找到一个名为
    `setupLinuxEnv.sh` 的文件。在你喜欢的编辑器中打开该文件，查找以 `yum -y install` 开头的一行。在 19.3.0 版本中该行是：


    ```

    yum -y install oracle-database-preinstall-19c openssl && \

    ```


    对于那些不熟悉 Linux 或 `yum` 的人，这一行中各个元素的含义如下：


    *   `yum`：调用 `yum`。

    *   `-y`：这个标志是简短的确认，告诉 `yum` 无需用户输入即可执行任何操作。它允许脚本化或自动化的命令在没有人工交互的情况下完成。

    *   `install`：`yum` 有多个可用选项，正如你可能猜测的那样，`install` 告诉包管理器要安装某些东西。

    *   `oracle-database-preinstall-19c` 和 `openssl`：这些是 `yum` 将要安装的软件包。第一个是 Oracle
    预安装包（本身也是一个包集合），包含了安装和运行 Oracle 数据库所需的一切。每个数据库版本都有自己的包，所以你看到的版本可能不同。`openssl`
    是一个加密包。（12cR1 脚本也会安装 `tar`。）

    *   `&&` 和 `\`：双和号（`&&`）是一个逻辑运算符，指示 Linux 如果当前命令成功完成，则执行后续命令。反斜杠（`\`）是一个续行符，告诉
    Linux 这不是命令的结尾，要继续在下一行读取更多内容。


    请注意，单个 `yum` 命令可以安装多个包，在 `install` 操作后逐一列出每个包。`yum`（以及其他包管理器）会解析给定包列表中的（大多数）依赖关系。包的顺序无关紧要。我们可以向现有的
    `yum` 命令添加包——比如编辑器之类的包！


    我通常安装的、能改善我在 Oracle 容器镜像中交互体验的包有：


    *   `oracle-epel-release-el7`：EPEL，即 *Extra Packages for Enterprise Linux*，是一个开发包集合，提供额外的特性和功能。

    *   `bash-completion`：一组用于自动补全 Linux 命令的辅助函数。

    *   `git`：添加了与基于 `git` 的仓库交互所需的库。

    *   `less`：一个文件查看器，类似于 `more`，用于在 Linux 系统上阅读和搜索文本文件。

    *   `strace`：一个调试和诊断工具，用于检查信号和系统调用。`strace` 对于调查数据库内核中的潜在问题非常宝贵。

    *   `tree`：以具有父子关系的层次化“树”结构可视化显示目录结构。

    *   `vi`：我选择的编辑器！

    *   `which`：一个有用的工具，用于显示用户 `PATH` 中可执行文件的位置。


    要更新 `yum install` 命令以包含其他包，请将它们添加在 `install` 关键字和标记 `yum` 命令结尾的双和号 `&&` 之间的任何位置。例如，要添加
    `less`、`strace`、`tree` 和 `vi`，将命令更改为：


    ```

    yum -y install oracle-database-preinstall-19c openssl less strace tree vi && \

    ```


    使用更新后的脚本构建新镜像后，从该新镜像运行的所有容器都将包含添加的命令。


    ### `Dockerfile`


    有一个可能的修改可以改进或定制容器中的交互。这个修改位于默认的 `Dockerfile` 中，它创建了一个 `.bashrc` 文件。这个文件在每次交互式
    `bash` 会话开始时运行，可用于设置 shell 提示符、环境变量、别名，甚至执行命令。


    接下来的两章会深入讨论 Dockerfile，但并非每个人都需要从定制镜像中获得的额外控制权。这个技巧有更广泛的应用，因此我将其放在这里。


    打开你仓库中的 `Dockerfile`，导航到文件末尾。在 19c 和 21c 版本中，你会找到一行：


    ```

    # Add a bashrc file to capitalize ORACLE_SID in the environment

    RUN echo ''ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}''
    > .bashrc

    ```


    如果你的版本没有这一行，你可以在以 `HEALTHCHECK` 开头的那一行之前添加一个。


    要理解这个命令，让我们分解它的各个部分：


    *   `RUN`：`Dockerfile` 中的 `RUN` 命令告诉构建过程运行一个或多个命令。不要将其与 `docker run` 混淆！前者是镜像构建过程中的一个步骤，后者是用于创建新容器。`RUN`
    后面是 Docker 用于构建镜像的命令。

    *   `echo ''ORACLE_SID=` 到 `${ORACLE_SID^^}''`：这是 Docker 在镜像中运行的命令。`echo` 将输出显示到
    `stdout` 或**标准输出**，通常是终端。它打印的文本是单引号（`''`）之间的所有内容。

    *   `> .bashrc`：单个右尖括号（`>`）是一个**输出重定向**，它将 `echo` 语句的输出发送到一个文件。单个尖括号会覆盖文件内容；两个尖括号（`>>`）则将输出追加到文件末尾。接收结果的文件是
    `.bashrc`。


    我想提请注意 `echo` 命令中单引号的使用。单引号按字面意义处理其内容，不解释或替换引号字符串中的任何内容。如果字符串用双引号包围，`bash` 将使用环境中的值替换
    `$ORACLE_SID`。比较使用单引号和双引号产生的不同结果：


    ```

    echo ''ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}''

    ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}

    echo "ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}"

    ORACLE_SID=ORCLCDB; export ORACLE_SID=

    ```


    在第二个使用双引号的例子中，替换是空的，因为 `$ORACLE_SID` 没有设置。这个命令预期一个定义了 `$ORACLE_SID` 的环境，但它在镜像构建过程中运行，*在设置变量之前*！


    这个 `RUN` 命令在 `oracle` 用户的主目录中创建一个新的 `.bashrc` 文件，并在 `oracle` 用户每次登录时运行。第一部分将 `ORACLE_SID`
    设置为环境中的任何值。如果启动容器的 `docker run` 命令包含了 `-e` 标志和 `ORACLE_SID` 的值，则使用该值。如果没有值，`bash`
    的操作符 `:-ORCLCDB` 会给出一个默认值 `ORCLCDB`：


    ```

    ORACLE_SID=${ORACLE_SID:-ORCLCDB}

    ```


    下一部分使用 `^^` 操作符将 `ORACLE_SID` 转换为大写，并将其导出到环境中：


    ```

    export ORACLE_SID=${ORACLE_SID^^}

    ```


    我们可以在 19c 和 21c `Dockerfile` 中现有的 `RUN` 命令（或在其他版本的 `Dockerfile` 中添加类似的行）的基础上构建，该命令将条目写入
    `.bashrc` 文件。这种模式也便于对容器环境进行其他更改。两个例子是修改 shell 提示符和为 SQL*Plus 创建一个 `login.sql`
    文件。'
  raw: '### setupLinuxEnv.sh


    In Linux, packages deliver these capabilities and features through a *package
    manager*. Different “flavors” of Linux use different package managers. Oracle
    Enterprise Linux 7 uses a package manager called `yum`, which stands for *Yellowdog
    Updater, Modified*.


    Navigate to your preferred version subdirectory under `docker-images/OracleDatabase/SingleInstance/dockerfiles`
    in your repository, and you’ll find a file called `setupLinuxEnv.sh`. Open that
    file in your favorite editor and look for a line beginning `yum -y install`. The
    line in the 19.3.0 version is


    ```

    yum -y install oracle-database-preinstall-19c openssl && \

    ```


    For those unfamiliar with Linux or yum, the meanings of elements on this line
    are as follows:


    *   `yum`: Invokes `yum`.


    *   `-y`: This flag is a shorthand confirmation, telling `yum` to proceed with
    whatever operations without user input. It allows scripted or automated commands
    to complete without human interaction.


    *   `install`: There are several options available to `yum`, and, as you might
    suspect, `install` tells the package manager to install something.


    *   `oracle-database-preinstall-19c` and `openssl`: These are the packages `yum`
    will install. The first is the Oracle preinstallation package (itself a collection
    of packages) containing everything necessary to install and run an Oracle. Each
    database version has its own package, so the version you see may be different.
    `openssl` is a cryptographic package. (The 12cR1 script also installs `tar`.)


    *   `&&` and `\`: The double ampersand (`&&`) is a logical operation instructing
    Linux to execute the following command if the current command completes successfully.
    The backslash (`\`) is a continuation character, telling Linux that this isn’t
    the end of the command and to continue reading on the following line for more.


    Note that a single `yum` command can install multiple packages, listing each individually
    after the `install` operation. `yum` (and other package managers) resolves (most)
    dependencies in a given list of packages. The order of packages doesn’t matter.
    We can add packages to the existing `yum` command—packages like editors!


    The packages I typically install that improve my interactive experience in Oracle
    container images:


    *   `oracle-epel-release-el7`: EPEL, or *Extra Packages for Enterprise Linux*,
    is a collection of development packages providing additional features and functionality.


    *   `bash-completion`: A set of helper functions for autocompleting Linux commands.


    *   `git`: Adds libraries necessary for interacting with `git`-based repositories.


    *   `less`: A file viewer, similar to `more`, for reading and searching text files
    on Linux systems.


    *   `strace`: A debugging and diagnostic tool for inspecting signals and system
    calls. `strace` is invaluable for investigating potential problems in the database
    kernel.


    *   `tree`: Displays directory structures visually as a hierarchal “tree” of entries
    with parent-child relationships.


    *   `vi`: My editor of choice!


    *   `which`: A helpful tool for displaying the locations of executables in the
    user’s `PATH`.


    To update the `yum install` command to include additional packages, add them anywhere
    between the `install` keyword and the double ampersand, `&&`, that marks the end
    of the `yum` command. For example, to add `less`, `strace`, `tree`, and `vi`,
    change the command to


    | `yum -y install oracle-database-preinstall-19c openssl less strace tree vi &&
    \` |


    After building a new image using the updated script, all containers run from the
    new image will include the added commands.


    ### Dockerfile


    There’s one potential modification for improving or customizing interaction in
    containers. This change, in the default Dockerfile, creates a `.bashrc` file.
    This file runs every time an interactive `bash` session starts and can be used
    to set the shell prompt, environment variables, and aliases and even execute commands.


    The following two chapters address Dockerfiles in depth, but not everyone needs
    the additional control available from custom images. This tip has broader applications,
    so I include it here.


    Open the `Dockerfile` in your repository and navigate to the end of the file.
    In the 19c and 21c versions, you’ll find a line that reads


    ```

    # Add a bashrc file to capitalize ORACLE_SID in the environment

    RUN echo ''ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}''
    > .bashrc

    ```


    If your version doesn’t have this line, you can add one just before the line that
    begins `HEALTHCHECK`.


    To understand this command, let’s break down its parts:


    *   `RUN`: The `RUN` command in the Dockerfile tells the build process to run
    one or more commands. Don’t confuse it with `docker run`! The former is a step
    in the image build process, while the latter is for creating a new container.
    Following `RUN` are commands Docker uses to construct the image.


    *   `echo ''ORACLE_SID=` through `${ORACLE_SID^^}''`: This is the command Docker
    runs in the image. `echo` displays output to `stdout` or *standard output*, usually
    the terminal. The text it prints is everything between the single quotes (`''`).


    *   `> .bashrc`: The single right caret (`>`) is an *output redirection* that
    sends the output of the `echo` statements to a file. A single caret overwrites
    the file contents; two carets (`>>`) append the output to the end of the file.
    The file receiving the result is `.bashrc`.


    I want to call attention to the use of single quotes in the `echo` command. Single
    quotes treat their contents literally, without interpreting or substituting anything
    in the quoted string. If double quotes bounded the string, `bash` would replace
    `$ORACLE_SID` using its value in the environment. Compare the different results
    produced by the same command, using single vs. double quotes:


    ```

    echo ''ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}''

    ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}

    echo "ORACLE_SID=${ORACLE_SID:-ORCLCDB}; export ORACLE_SID=${ORACLE_SID^^}"

    ORACLE_SID=ORCLCDB; export ORACLE_SID=

    ```


    The substitution is empty in the second example, using double quotes, because
    `$ORACLE_SID` isn’t set. This command anticipates an environment where the `$ORACLE_SID`
    is defined but runs during the image build *before setting the variable*!


    This `RUN` command creates a new `.bashrc` file in the `oracle` user’s home directory
    and runs each time the `oracle` user logs in. The first part sets the `ORACLE_SID`
    to whatever value is in the environment. If the `docker run` command that started
    the container included an `-e` flag and value for `ORACLE_SID`, that is assigned.
    If there’s no value, the `bash` manipulation, `:-ORCLCDB`, gives a default value
    of `ORACLECDB`:


    ```

    ORACLE_SID=${ORACLE_SID:-ORCLCDB}

    ```


    The next part converts the `ORACLE_SID` to upper case, using the `^^` manipulation,
    and exports it to the environment:


    ```

    export ORACLE_SID=${ORACLE_SID^^}

    ```


    We can build on the existing `RUN` command in the 19c and 21c Dockerfiles (or
    add a similar line to the Dockerfiles in other versions) that write entries to
    a `.bashrc` file. This pattern facilitates other changes to the container environment,
    too. Two examples are modifying the shell prompt and creating a `login.sql` file
    for SQL*Plus.'
