  trans: '### 下载镜像


    首先，使用您的 My Oracle Support (MOS) 单点登录 (SSO) 凭证登录网站并接受许可协议。您应该会在图 4-2 的右上角看到一条消息，表明您已接受许可。


    在 Docker 中，下载镜像是通过 `pull` 命令完成的，右侧栏有一个看起来很有希望的元素——“最新版本的拉取命令”。不幸的是，复制粘贴会导致认证错误：

    ```

    unauthorized: authentication required

    ```


    我们尚未对 Oracle 的仓库进行认证。使用以下命令登录：

    ```

    docker login container-registry.oracle.com

    ```


    Docker 会要求输入用户名和密码；这些就是您的 Oracle SSO 凭证。从注册表页面复制 `docker pull` 命令并将其粘贴到您的 shell
    中。Docker 将把镜像的各层下载到您的系统。清单 4-1 展示了 `pull` 命令的简化输出。

    ```

    > docker pull container-registry.oracle.com/database/enterprise:19.3.0.0

    19.3.0.0: Pulling from database/enterprise

    86607bb85307: Pull complete

    ...

    5c2969cb34b8: Pull complete

    Digest: sha256:ea9cd805ec49368fd288323e3f41d6c6e45698813e2ae89fd5d097c026ab5aa6

    Status: Downloaded newer image for container-registry.oracle.com/database/enterprise:19.3.0.0

    container-registry.oracle.com/database/enterprise:19.3.0.0

    清单 4-1

    运行 docker pull 拉取 19c 企业版镜像

    ```


    就是这样！您已成功将 Docker 镜像下载到您的主机！使用 `docker images` 命令检查系统上的镜像。您将看到与清单 4-2 输出类似的内容。

    ```

    > docker images

    REPOSITORY                                          TAG                     IMAGE
    ID            CREATED             SIZE

    container-registry.oracle.com/database/enterprise   19.3.0.0                6ee1b2e4403f        6
    months ago        7.87GB

    清单 4-2

    拉取 19c 企业版镜像后运行 docker images

    ```


    “仓库”列反映了镜像的来源。`tag` 是其版本。


    ### 下载标签


    之前，我列出了企业版有三个可用版本。其他的在哪里？图 4-3 显示了企业版仓库页面的底部，那里列出了此仓库的标签。


    ![一张标签页的截图显示了企业版仓库页面列出了该仓库的标签。](img/514143_1_En_4_Fig3_HTML.jpg)


    图 4-3

    企业版仓库中所有可用版本的标签列表


    每个标签代表一个不同的版本，并有各自独立的 `docker pull` 命令。


    请注意，版本 12.2.0.1 有两个标签。第二个带有 `-slim` 后缀，是经过精简至最低功能的版本。这在容器镜像中很常见。将镜像精简到最低限度可以节省空间并减小容器的受攻击面——您无法攻击不存在的软件和功能。如果您只需要基本功能，标记为
    `-slim` 的标签值得考虑。


    最后需要注意的是大小。图 4-3 显示 19.3.0.0 标签的镜像为 3GB，但那是压缩后的下载大小。清单 4-2 报告了 19c 镜像的实际大小，为 7.87GB。


    ### 运行预构建镜像


    下载完成后，按照文档页面的说明操作，或者直接跳转到“运行容器”一节。此注册表中的镜像使用了下一节讨论的相同脚本，相同的功能*应该*能够工作。容器注册表镜像不经常更新。Oracle
    的 Docker 仓库则持续更新着新特性和功能。虽然可能性不大，但从当前脚本仓库构建的镜像有可能会有不同的行为。


    ### 预构建镜像的限制


    Oracle 容器注册表提供的镜像虽便捷，但牺牲了多样性和功能。就像冷冻披萨，您无法更改配料。对于预构建镜像，您无法更改镜像中内置的某些功能。为了说明预构建镜像为何可能无法满足您的需求，让我们看两个限制：编辑器和多租户。


    在桌面或笔记本电脑系统上通过 Docker 运行 Oracle 非常方便。拥有一个可用于开发、测试和实验的“一次性”数据库很方便，对大多数人来说，这包括能够查看和编辑文件。


    用户可能会惊讶地发现，Oracle 的数据库镜像不包含文本编辑器，唯一的内置文件查看器是 `more`。这是有意为之——请记住，容器通常运行服务而非交互式会话，不需要编辑器或文件查看器。省略不必要的软件可以使容器更小，并减小其受攻击面。


    在构建镜像时，编辑器（和其他实用程序）被排除在外。我们无法更改镜像；手动安装额外的软件是唯一的选择。手动更新容器并不困难，也不耗时，直到您发现自己每次运行新容器时都要这么做！采用容器的原因之一是其能够提供已包含依赖项的自包含环境。手动更新每个容器与此目的背道而驰。


    虽然您可能认为添加编辑器并不是一个构建自己镜像的充分理由，但在容器中创建的数据库类型可能是一个理由。


    当 Oracle 数据库容器启动时，它会检查是否已有一个数据库。如果没有，它会运行 `数据库配置助手` (`DBCA`) 并创建一个新的 `容器数据库` (CDB)，其中包含一个
    `可插拔数据库` (PDB)。CDB 和 PDB 至今仍未被广泛采用，对于那些想要传统的、非 CDB 数据库的用户来说，替代方案是删除 DBCA 创建的数据库并手动创建一个。


    然而，从脚本构建镜像可以修改 Docker 的指令以包含编辑器、编辑用于创建数据库的响应文件等。您可能会发现，这种增加的控制权值得花费额外几分钟来构建自己的镜像。


    ### 从仓库构建镜像


    Oracle 脚本仓库的作者们使其脚本仓库的镜像构建变得简单。一个封装脚本处理了繁重的工作。用户只需下载仓库，将 Oracle 数据库安装文件放入一个目录，然后运行脚本。


    该仓库包含用于构建以下版本镜像的脚本：


    *   Oracle 11.2.0.2 快捷版

    *   Oracle 12.1.0.2 企业版、标准版 2

    *   Oracle 12.2.0.1 企业版、标准版 2

    *   Oracle 18.3.0 企业版、标准版 2

    *   Oracle 18.4.0 快捷版

    *   Oracle 19.3.0 企业版、标准版 2


    以下示例使用 Oracle 19c。步骤与其他版本类似。'
- fmt: '### Oracle Docker GitHub Repo


    *GitHub* is a popular version control, management, and distribution platform for
    code based on `git`. Oracle maintains an official repository of scripts on GitHub
    for building container images at `github.com/oracle/docker-images`. In addition
    to database images, you’ll find directories here for many other Oracle products,
    from Instant Client to GoldenGate to REST Data Services. We need these files on
    the local machine where Docker Desktop is running. There are two ways to do this:
    direct download or using `git`. Figure [4-4](#514143_1_En_4_Chapter.xhtml#Fig4)
    shows the dialog window after clicking the `Code` button.


    ![](images/514143_1_En_4_Chapter/514143_1_En_4_Fig4_HTML.jpg)


    A screenshot of the oracle or docker images page displays the dialog window after
    clicking the code button.


    Figure 4-4


    GitHub options for cloning and downloading the repository


    Details for cloning or downloading the repository through `git` or `GitHub Desktop`
    are out of scope for this book. If you’re using `git`, these should be familiar.


    For readers who aren’t comfortable with `git` or don’t want to maintain these
    files in a repository, click the `Download ZIP` option at the bottom of the dialog.
    When the download completes, unzip the file on the local machine.


    Tip


    The paths beneath each subdirectory in the repository can be long. The repository
    scripts can be anywhere on your computer, but I prefer to keep the path short
    and place them in a directory near the root. Most examples in this book use `$HOME/docker-images`
    or `$HOME/docker`. As you work with containers, you may find yourself navigating
    to the repository often and appreciate the keystrokes saved by planning ahead!


    Take a moment to navigate into a folder under the database subdirectory, `OracleDatabase/SingleInstance/dockerfiles`,
    then list the contents. You’ll see a result similar to Listing [4-3](#514143_1_En_4_Chapter.xhtml#PC5).


    ```

    ~/docker-images/OracleDatabase/SingleInstance/dockerfiles

    > ls -l

    total 32

    drwxrwxr-x 2 lab lab 4096 Mar 31 14:18 11.2.0.2

    drwxrwxr-x 2 lab lab 4096 Mar 31 14:18 12.1.0.2

    drwxrwxr-x 2 lab lab 4096 Mar 31 14:18 12.2.0.1

    drwxrwxr-x 2 lab lab 4096 Mar 31 14:18 18.3.0

    drwxrwxr-x 2 lab lab 4096 Mar 31 14:18 18.4.0

    drwxrwxr-x 2 lab lab 4096 Mar 31 14:18 19.3.0

    -rwxrwxr-x 1 lab lab 6575 Mar 31 14:18 buildContainerImage.sh

    ```


    Listing 4-3

    Folders in the OracleDatabase/SingleInstance/dockerfiles directory


    The following steps are performed from this directory or one of the subdirectories
    for the different database versions.


    ### Oracle Database Software


    For Docker to install the Oracle database in the image, it needs the database
    software installation file. For Oracle 19c, the file is available from [`www.oracle.com/database/technologies/oracle-database-software-downloads.html`](http://www.oracle.com/database/technologies/oracle-database-software-downloads.html).
    Other versions^([^(25)](#fn25)) are available from My Oracle Support, `support.oracle.com`,
    or the Oracle Software Delivery Cloud, `edelivery.oracle.com`.


    Whichever version you choose, *be sure to download the installer for Linux x86-64*.
    The host operating system doesn’t matter—whether running on Windows or Mac, Docker
    Desktop uses a Linux VM and the containers run in Linux. Be sure to download the
    ZIP file and not the RPM, if present. Figure [4-5](#514143_1_En_4_Chapter.xhtml#Fig5)
    shows the relevant section of the download page highlighting the operating system
    and download to select Oracle Database 19c.


    ![](images/514143_1_En_4_Chapter/514143_1_En_4_Fig5_HTML.jpg)


    A screenshot of 19.3 enterprise edition window displays the relevant section of
    the download page highlighting the operating system and download to select Oracle
    Database 19 c.


    Figure 4-5


    Oracle 19c Database installer ZIP file download for Linux x86-64


    Download or copy the file into the subdirectory in the repository that matches
    the database version. For Oracle Database 19.3.0, the installation needs to be
    copied into `OracleDatabase/SingleInstance/dockerfiles/19.3.0`.^([^(26)](#fn26))


    Note


    Do not unzip the installation file! Docker’s build process looks for the ZIP file
    and copies it into its *build context*. Builds run intermediate containers to
    do work, including unzipping the installation file.


    We’re ready to build a database image with the repository and installation file
    in place!


    ### Build an Image


    The `buildContainerImage.sh`^([^(27)](#fn27)) script in the `OracleDatabase/SingleInstance/dockerfiles`
    directory handles the heavy lifting and accepts parameters, as shown in Listing
    [4-4](#514143_1_En_4_Chapter.xhtml#PC6).


    ```

    Usage: buildContainerImage.sh -v [version] [-e | -s | -x] [-i] [-o] [container
    build option]

    Builds a container image for Oracle Database.

    Parameters:

    -v: version to build

    Choose one of: 11.2.0.2  12.1.0.2  12.2.0.1  18.3.0  18.4.0  19.3.0

    -e: creates image based on ''Enterprise Edition''

    -s: creates image based on ''Standard Edition 2''

    -x: creates image based on ''Express Edition''

    -i: ignores the MD5 checksums

    -o: passes on container build option

    * select one edition only: -e, -s, or -x

    ```


    Listing 4-4

    Options available when calling buildContainerImage.sh


    For now, we need only be concerned with those for version and edition. For this
    example, I’ll build an image for a 19c Enterprise Edition database by calling
    the script with the `-e` flag and passing `19.3.0` to the version flag, `-v`:


    ```

    ./buildContainerImage.sh -e -v 19.3.0

    ```


    This starts the build process and usually takes 8–15 minutes on most laptops.
    Docker displays the output of each step, and you may spot some familiar messages
    as it updates the filesystem with prerequisites and installs Oracle software.
    You should see a message indicating the image name, tag, and total build time
    when it completes. Run `docker images` and verify your output appears similar
    to the following:


    ```

    > docker images

    REPOSITORY       TAG         IMAGE ID      CREATED      SIZE

    oracle/database  19.3.0-ee   c0d1669287ad  2 hours ago  6.68GB

    ```


    We now have an image to use for running database containers!


    ## Running a Container


    Congratulations! You’ve created an image and are just a few minutes away from
    enjoying the fruits of your labor! Running a container is like baking our pizza—the
    steps are the same whether it’s fresh or frozen! And just like our pizza, the
    commands for running a container are the same no matter the source of the image:
    Oracle Container Registry, Oracle’s repository scripts, or a custom image.


    ### Container Properties


    `docker run` starts a container for the first time. It also sets properties for
    the container that can’t be changed later, including how it interacts with its
    environment. Essential elements of this first database container are the environment
    variables, port publishing, volume mounting, and name.


    #### Port Publishing


    Containers are isolated processes on the host; what occurs inside a container
    is generally invisible to other applications on the host. Sometimes, we want to
    interact with containers, and a prime example is connecting to an Oracle database
    listener, typically over port 1521. Mapping, or *publishing*, this port to one
    on the host allows other processes in the host environment to communicate with
    the database inside the container.^([^(28)](#fn28))


    Port mapping is controlled by the `-p` or `--publish` flag, followed by the host
    and container ports. For example, `-p 10000:1521` maps port 1521 in the container
    to port 10000 on the host.'
