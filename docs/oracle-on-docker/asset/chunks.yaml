    -e ORACLE_SID=${ORACLE_SID} \\\n-e ORACLE_PDB={ORACLE_PDB} \\\n--volume ${CONTAINER_NAME}_data:/opt/oracle/oradata\
    \ \\\n--volume /oradata/scripts:/scripts \\\n--network oracle-db \\\noracle/database:19.3.0-ee\n\
    Listing 10-4\nExample code showing steps for creating resources and running a\
    \ “disposable” Oracle 19c database container\n```\n\n#### Persistent Environments\n\
    \nCritical databases require more discipline and resources, including additional\
    \ volumes for diagnostic and audit directories. Listing [10-5](#514143_1_En_10_Chapter.xhtml#PC45)\
    \ is an example of a script for automating the steps to create directories, assign\
    \ volumes, and run containers.\n\n```\nCONTAINER_NAME=prod\nORACLE_SID=ORCLCDB\n\
    ORACLE_PDB=ORCLPDB1\nfor dir in audit data diag\ndo mkdir -p /oradata/${CONTAINER_NAME}/${dir}\n\
    docker volume create --opt type=none --opt o=bind \\\n--opt device=/oradata/${CONTAINER_NAME}/${dir}\
    \ \\\n${CONTAINER_NAME}_${dir}\ndone\nmkdir -p /oradata/${CONTAINER_NAME}_entry/{setup,startup}\n\
    docker run -d \\\n--name ${CONTAINER_NAME} \\\n-e ORACLE_SID=${ORACLE_SID} \\\n\
    -e ORACLE_PDB={ORACLE_PDB} \\\n--volume ${CONTAINER_NAME}_data:/opt/oracle/oradata\
    \ \\\n--volume ${CONTAINER_NAME}_diag:/opt/oracle/diag \\\n--volume ${CONTAINER_NAME}_audit:/opt/oracle/admin\
    \ \\\n--volume /oradata/${CONTAINER_NAME}_entry:/opt/oracle/scripts \\\n--volume\
    \ /oradata/scripts:/scripts \\\n--network oracle-db \\\noracle/database:19.3.0-ee\n\
    Listing 10-5\nA script for automating the creation of multiple directories and\
    \ bind-mounted volumes for a database’s audit, data, and diagnostic directories\n\
    ```\n\nNotice I create dedicated entrypoint directories for each container. This\
    \ is where I place any scripts used to modify the container’s setup and startup\
    \ operations. Having dedicated directories allows more control, creating links\
    \ to global copies or writing custom scripts as needed."
