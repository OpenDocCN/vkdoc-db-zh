    ---> 183467ad6373

    Step 9/24 : RUN chmod ug+x $INSTALL_DIR/*.sh &&     sync &&     $INSTALL_DIR/$CHECK_SPACE_FILE
    &&     $INSTALL_DIR/$SETUP_LINUX_FILE &&     rm -rf $INSTALL_DIR

    ---> Running in 5367f8d86861

    Listing 15-1

    A portion of the output generated while building an Oracle database image. Note
    the ID values identified with “--->,” the step tracking, and the list of commands
    executed in each step

    ```


    This `progress output` from the build should be the first place to look for clues
    in identifying the cause of failures. There’s nothing special about this output,
    and it’s no different than what you’d see by manually executing the commands.
    That allows us to employ techniques similar to those we’d use in a “normal” system.


    If the log output doesn’t show anything obvious, the next step is adding output
    to report the information and details needed to diagnose the situation.


    ### Echo Information


    Step 9, shown in Listing [15-1](#514143_1_En_15_Chapter.xhtml#PC1), runs a series
    of commands:


    ```

    RUN chmod ug+x $INSTALL_DIR/*.sh &&     sync &&     $INSTALL_DIR/$CHECK_SPACE_FILE
    &&     $INSTALL_DIR/$SETUP_LINUX_FILE &&     rm -rf $INSTALL_DIR

    ```


    These correspond to a `RUN` block in the Dockerfile:


    ```

    RUN chmod ug+x $INSTALL_DIR/*.sh && \

    sync && \

    $INSTALL_DIR/$INSTALL_DB_BINARIES_FILE $DB_EDITION

    ```


    If one or more variables from this block were set incorrectly, I’d have no way
    of knowing by looking at the output. Everything references environment variables.
    But, I can add commands to this block of code and display the variable settings
    in the build output:


    ```

    RUN echo "INSTALL_DIR = $INSTALL_DIR" && \

    echo "INSTALL_DB_BINARIES_FILE = $INSTALL_DB_BINARIES_FILE" && \

    echo "DB_EDITION = $DB_EDITION" && \

    chmod ug+x $INSTALL_DIR/*.sh && \

    sync && \

    $INSTALL_DIR/$INSTALL_DB_BINARIES_FILE $DB_EDITION

    ```


    When I rerun the build, I’ll see the values printed to the build output:


    ```

    Step 9/24 : RUN echo "INSTALL_DIR = $INSTALL_DIR" && echo "INSTALL_DB_BINARIES_FILE
    = $INSTALL_DB_BINARIES_FILE" && echo "DB_EDITION = $DB_EDITION" && chmod ug+x
    $INSTALL_DIR/*.sh && sync && $INSTALL_DIR/$CHECK_SPACE_FILE && $INSTALL_DIR/$SETUP_LINUX_FILE
    && rm -rf $INSTALL_DIR

    ---> Running in e5331bac34fc

    INSTALL_DIR = /opt/install

    INSTALL_DB_BINARIES_FILE = installDBBinaries.sh

    DB_EDITION =

    ```


    Be aware that the position of diagnostic checks may affect results. In this example,
    I echoed the values as part of an existing step in the Dockerfile. Had I added
    them to a separate `RUN` block, either before or after, they would run in their
    own container. The values might not reflect their settings during the step in
    question.


    Echoing values isn’t limited to the Dockerfile. The scripts Docker uses to complete
    each build task interact with the process output, as in Listing [15-2](#514143_1_En_15_Chapter.xhtml#PC2),
    and the same techniques apply.


    ### Add a Debug Option


    Calling bash scripts with `bash -x` enables debugging output that prints the commands
    and arguments executed within the script. If you experienced problems during step
    9 in the last example and wanted to see details of everything the database binary
    installation did, you could modify the Dockerfile to:


    ```

    RUN chmod ug+x $INSTALL_DIR/*.sh && \

    sync && \

    bash -x $INSTALL_DIR/$INSTALL_DB_BINARIES_FILE $DB_EDITION

    ```


    Adding `bash -x` before the script execution on the last line adds visibility
    into the script’s actions without changing the result. The downside comes in the
    effort required to add and remove debugging commands in the Dockerfile. But, with
    the help of our friend, `ARG`, that’s not a problem!


    Add a new, empty argument called `DEBUG` at the top of the Dockerfile:


    ```

    ARG DEBUG=

    ```


    Then prefix each script executed in the Dockerfile with `$DEBUG`:


    ```

    RUN chmod ug+x $INSTALL_DIR/*.sh && \

    sync && \

    $DEBUG $INSTALL_DIR/$INSTALL_DB_BINARIES_FILE $DB_EDITION

    ```


    Any regular call to `docker build` harmlessly substitutes the empty `DEBUG` argument
    before the script execution. However, passing a value to the argument turns on
    debugging:


    ```

    docker build ...

    --build-arg DEBUG="bash -x" \

    ...

    ```


    This trick has an additional application for debugging containers, too. Remember
    that containers perform services defined by scripts, and with our database containers,
    the root of these activities is `runOracle.sh`. As you discovered in Chapter [6](#514143_1_En_6_Chapter.xhtml),
    `runOracle.sh` calls other scripts to perform functions like starting and creating
    databases. Modifying these calls with a similar `$DEBUG` variable adds runtime
    debugging to containers, as in Listing [15-3](#514143_1_En_15_Chapter.xhtml#PC11).


    ```

    # Start database

    $DEBUG "$ORACLE_BASE"/"$START_FILE";

    Listing 15-3

    Adding a `$DEBUG` option to the individual script executions, such as this call
    to the database startup script, enables runtime debugging in containers through
    an environment variable

    ```


    In this case, the `DEBUG` variable isn’t an argument interpreted during the build.
    It’s part of the script copied into the image. The `DEBUG` variable is visible
    in the container and, left undefined, is empty. As before, it adds nothing to
    the script nor alters the container’s behavior or function. Defining a value for
    the environment variable as part of the `docker run` command activates debugging:


    ```

    docker run ...

    -e DEBUG="bash -x" \

    ...

    ```


    Do not implement built-in debugging like this in production images—it’s command
    injection, plain and simple—but including it in development images has saved me
    countless hours. There’s no need to update the Dockerfile or scripts or to rebuild
    images with debugging included if it’s already there!'
