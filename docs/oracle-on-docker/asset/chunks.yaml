    # 3. 容器基础


    在上一章中，我介绍了一些 Docker 术语和概念。本章将以此为基础，通过更多实用、动手操作的示例，帮助您直观地理解 Docker、它如何工作以及为何如此流行。


    除了介绍基本的 Docker 命令外，我还想介绍镜像和容器的基本概念。镜像是*不可变的*（`immutable`），容器是*短暂的*（`ephemeral`）和*持久的*（`persistent`）。我犹豫是否要打出这些词，因为我知道它们听起来多么学术和枯燥！在我开始容器之旅时，我承认我曾努力去理解这些想法或欣赏其重要性。大约一年后，我看到了它们的演示，其中的方式和原因立刻变得显而易见！我将尽力重现那些“啊哈！”时刻，并（希望）让您免于重复我的挣扎！


    如果您已经熟悉容器和这些概念，请随时转到第 [4](#514143_1_En_4_Chapter.xhtml) 章。如果没有，我鼓励您额外花点时间，在您的环境中跟随本章的示例操作，因为有一件事您无法从印刷页面上获取。


    *速度。*


    我可以告诉您容器很快，或者大峡谷很大，但有些事情最好通过*亲眼所见*来体会。


    如果您尚未安装 `Docker Desktop`，请从 [www.docker.com/products/docker-desktop](http://www.docker.com/products/docker-desktop)
    下载并安装。下一章详细介绍了如何在 Mac 和 Windows 上安装 `Docker Desktop`，以及如何在 Linux 系统上配置 Docker。


    ## Docker 命令行概览


    Docker 命令行指令以 `docker` 关键字开头。命令列表相对简短，而且在很大程度上，它们是简单明了的，即使对于新手也是如此。`docker start`
    启动一个容器；`docker logs` 显示容器日志；`docker run` 运行容器；依此类推。


    Docker 有一些同义命令。例如，`docker container run` 和 `docker run` 是同一个命令，`docker image ls`^([^(16)](#fn16))
    和 `docker images` 也是。Docker 社区倾向于在有同义词时使用较短的那个选项。我在本书中也将这样做。


    Docker 的替代品，如 Podman，包含别名指向其对应 Docker 命令的命令。我曾在安装了 Podman 而非 Docker 的环境中工作过，一些用户（包括系统管理员）多年都没有注意到！


    您总是可以通过在提示符下输入 `docker --help`（或仅 `docker`）来列出所有命令，并通过键入 `docker <COMMAND> --help`
    获取单个命令的详细信息。（附录包含一组常用命令，以及运行 Docker 和 Oracle 的示例和配方。）


    ## 运行您的第一个容器


    在开始运行 Oracle 数据库之前，让我们使用流行的 Linux 发行版 Ubuntu 来介绍一些基础知识。这提供了一个机会，让您实际操作 Docker，探索镜像和容器背后的一些概念，熟悉
    Docker 命令，并展示容器环境的基本属性。


    ### 列出镜像


    在您安装了 `Docker Desktop` 的计算机上打开一个 shell 会话，并通过运行 `docker images` 显示系统上可用的镜像。您的输出将显示一个标题但没有容器：


    ```

    > docker images

    REPOSITORY   TAG       IMAGE ID   CREATED   SIZE

    ```


    没有任何列表，表明系统上没有镜像。回想一下，镜像类似于模板，容器是运行镜像的产物。在运行容器之前，我们需要一个镜像。'
  raw: '### Runtimes


    Container *runtimes* incorporate a suite of capabilities for building, managing,
    and running containers. *Docker Desktop* for Windows and Mac users and *Docker
    Engine* for Linux users are popular and free to download at [*www.docker.com*](http://www.docker.com)
    and provide straightforward and well-documented avenues for users at the start
    of their container journey.


    Runtimes include a command set for managing and using containers. Don’t stress
    over choosing a runtime. Like Docker, runtimes follow a standard that aliases
    the commands and syntax of Docker Desktop and eliminates the risk of switching
    later. Simply put, virtually anything you run in Docker Desktop will work elsewhere.


    Most Docker commands begin with *docker*, followed by a keyword and one or more
    flags to set or define options. For example, `docker run ubuntu` runs a container
    using an Ubuntu Linux image.


    How does it know where to get the Ubuntu image? Runtimes like Docker Desktop connect
    to a hub or repository. When a user invokes `docker run ubuntu`, the runtime searches
    its repository for a certified image named ubuntu and *pulls* or downloads it
    automatically.


    ### Dockerfiles


    Recall that images are a collection of files and directories. A *Dockerfile* is
    the set of instructions, or code, used to populate the files in images. Dockerfiles
    run commands and call scripts for installing and configuring the final image.
    They also define the environment for containers that run the image, including
    variables, ports, and directories mapped to host resources. Dockerfiles also determine
    what scripts containers run when they start and define checks for reporting container
    health.


    ### Builds


    *Building* images executes the instructions in Dockerfiles. The build process
    steps through the Dockerfile sequentially. Builds always begin by pulling a base
    image. The base image runs as a container, and changes are applied (remember,
    images can’t be changed) as a *layer*. Each layer is a foundation for the following
    steps until the final image is complete.^([^(15)](#fn15))


    ## Summary


    You now understand the language and concepts of Docker and containers and recognize
    how containers compare to virtual machines. For database administrators, it may
    be helpful to think of virtual machines as databases and containers as schemas.
    Adding a schema for a new application is far less costly than creating a new,
    dedicated database. There’s nothing to start in a container or a schema, either.


    You can differentiate between images and containers and understand that they’re
    portable to any container environment to deliver reliable, identical results.
    You learned containers can share host resources, including network and storage.
    Most notably, volumes allow data—including Oracle databases—to persist independently
    from a container.


    Next, we’ll lift the veil and explore how containers work by building one, not
    in Docker, but at the command line, using Linux commands. This gives insight into
    concepts used in later chapters but, most importantly, eliminates some of the
    mystery and apprehension you may have when using Docker as a database platform!


