    \ image. Read the output from bottom to top to see the commands used to create\
    \ each layer of the final image and how it evolved from a starting point to its\
    \ final form. The second command lists information on the final database and Oracle\
    \ Enterprise Linux 7-slim images, including their unique identifiers and sizes\n\
    ```\n\nThe last line is the starting image. Each line above it is a layer, or\
    \ “glass shelf,” that introduced a modification. By reading the output from the\
    \ bottom up, you see how the final image evolved through a series of operations,\
    \ from a starting image (the `ADD file:` entry at the bottom) through completion.\
    \ Each image layer has a unique ID in the first column and a size in the last.\n\
    \nWhile we haven’t yet covered the different Dockerfile commands, look at the\
    \ size column. The layers that *aren’t* zero bytes have something in common. Most\
    \ `ADD` or `COPY` operations do just that—add or copy something into the mix.\
    \ The output is truncated for the remaining two commands, but were the lines printed\
    \ in their entirety, you’d see they’re running scripts or commands. These nonzero-byte\
    \ layers are like the glass shelves with something on them. The layer’s size matches\
    \ the amount of change contained on each shelf."
  trans: "\n# 层在构建过程中的作用\n\n在幕后，构建过程是一系列类似脚本化 `docker run` 的操作。这些操作启动一个容器（使用现有镜像），对容器进行一些修改，然后将结果保存为一个新镜像。在构建中，Docker\
    \ 并不会将多个更改混为一谈。每一步都会生成自己的镜像。Docker 将这些单独的镜像**层叠**在一起，以构成最终的镜像。\n\nDocker 镜像中的层，类似于我们在第\
    \ 7 章中探讨的叠加文件系统中的层。请记住，一层会在基础层之上叠加更改。还记得我们的分层文件系统示例，俯视一局井字棋游戏吗？\n\n## 容器 vs. 镜像：从层的视角看\n\
    \n容器拥有一个中间层，用于存储其生命周期内累积的所有更改。所有更改都被归并在一起，因为个别更改不太可能被重用。然而，Docker 处理镜像的方式则不同。容器将所有更改放在一个单一的上层，而镜像构建中的每一步都会添加自己的“玻璃隔板”，如图\
    \ 12-1 所示，为层堆栈增加了深度。\n\n![](img/514143_1_En_12_Fig1_HTML.png)\n\n**图 12-1**\n\n\
    容器（左）将所有更改捕获到一个单一的上层中。容器视图是上层和下层合并后的结果，投射到工作层中。镜像（右）为每个操作添加新层。最终镜像是多个层的联合体。\n\n\
    ## 可重用性的力量\n\n这种多层方法背后的原因是可重用性。想一想“构建”一个井字棋棋盘所涉及的步骤——你每次都画相同的四条线。这是一个可预测、可重复的过程。但画线是构建其他游戏所用网格的基础。图\
    \ 12-2 展示了一个井字棋游戏和一个“*数字加总网格*”（Grid of Sums），后者于 2013 年在法国的《世界报》（*Le Monde*）上首次介绍。\n\
    \n![](img/514143_1_En_12_Fig2_HTML.png)\n\n**图 12-2**\n\n在井字棋棋盘（左）上添加四条线，就形成了一个用于玩“数字加总网格”游戏的\
    \ 3x3 网格。\n\n如果你不知道“数字加总网格”游戏，我可以这样描述构建游戏棋盘的步骤：\n*   “画一条三英寸长的水平线。”\n*   “在第一条线上方一英寸处，画另一条长度相同的水平线。”\n\
    *   “画一条三英寸长的竖线，在距离水平线左端一英寸处与它们相交。”\n*   以此类推。\n\n或者，我可以直接要求你：“画一个井字棋棋盘，并在周围加一个边框。”\n\
    \n当你学会如何构建井字棋棋盘时，你已经将这些步骤作为“层”缓存到了记忆中。这些层是可重用的基础，你可以用它们来构建新的、可能更复杂的游戏。引用已知的操作集合——画一个井字棋棋盘——远比重新描述整个流程要高效得多。\n\
    \nDocker 构建镜像的方式与之相同。镜像中的每一层都是可重用的，并且可供其他构建使用，从“底部水平线”一直到“井字棋棋盘”。在我们构建数据库镜像时，你会看到这种效率。如果我需要两个\
    \ Oracle Database 19c 的镜像，一个包含 19.10 发布更新，另一个包含 19.11 发布更新，那么如图 12-3 所示，在*应用补丁之前的一切*都是完全相同的：配置操作系统和环境；添加先决条件；安装\
    \ Oracle 19c 软件。之后我就有了一个 19.3.0 数据库，可以将其补丁更新到所需级别。\n\n![](img/514143_1_En_12_Fig3_HTML.png)\n\
    \n**图 12-3**\n\n为应用了 19.10 和 19.11 发布更新的 Oracle 19c 数据库创建镜像遵循相同的初始步骤。Docker 不会重复现有层中已完成的工作。相反，它会从最新的、最顶层的可回收层开始构建。\n\
    \n## 使用 `docker image history` 检查层\n\n代码清单 12-1 展示了为 Oracle 19c 数据库镜像运行 `docker\
    \ image history` 命令的简化输出，以查看它在 Docker 镜像中的样子。`docker image history` 显示了构成最终镜像的复合层以及创建它们的命令。\n\
    \n```bash\n> docker image history -H oracle/database:19.3.0-ee\nIMAGE        \
    \ CREATED BY                                      SIZE\nf53962475832  /bin/sh\
    \ -c #(nop)  CMD [\"/bin/sh\" \"-c\" \"exec…   0B\ndceea9dcf380  /bin/sh -c #(nop)\
    \  HEALTHCHECK &{[\"CMD-SHELL…   0B\ne6a7408b308b  /bin/sh -c #(nop) WORKDIR /home/oracle\
    \          0B\nf94cd312d82e  /bin/sh -c #(nop)  USER oracle                  0B\n\
    1664ac9ff6d4  /bin/sh -c $ORACLE_BASE/oraInventory/orainst…   21.8MB\n6688786dc411\
    \  /bin/sh -c #(nop)  USER root                    0B\nb6fb885c6988  /bin/sh -c\
    \ #(nop) COPY --chown=oracle:dbadir…   6.19GB\n0dfd2be6867c  /bin/sh -c #(nop)\
    \  USER oracle                  0B\n64bee30fc72f  /bin/sh -c chmod ug+x $INSTALL_DIR/*.sh\
    \ &&  …   184MB\n53ce8dbf2fe1  /bin/sh -c #(nop) COPY multi:db377117e0d23af… \
    \  36.8kB\n74619cb4eafe  /bin/sh -c #(nop) COPY multi:08c35eebd2349e6…   1.96kB\n\
    bd4c7a72aa97  /bin/sh -c #(nop)  ENV PATH=/opt/oracle/prod…   0B\n167ee23df373\
    \  /bin/sh -c #(nop)  ENV ORACLE_BASE=/opt/orac…   0B\n0e43108d92e1  /bin/sh -c\
    \ #(nop)  ARG INSTALL_FILE_1=LINUX.…   0B\n0de06b15c6b1  /bin/sh -c #(nop)  ARG\
    \ SLIMMING=true            0B\nd1215483892c  /bin/sh -c #(nop)  LABEL provider=Oracle\
    \ iss…   0B\n9ec0d85eaed0  /bin/sh -c #(nop)  CMD [\"/bin/bash\"]            0B\n\
    \     /bin/sh -c #(nop) ADD file:b0df42f2bb614be48…   133MB\n> docker images\n\
    REPOSITORY          TAG                 IMAGE ID            SIZE\noracle/database\
    \     19.3.0-ee           f53962475832        6.53GB\noraclelinux         7-slim\
    \              9ec0d85eaed0        133MB\n```\n**代码清单 12-1**\n\n第一条命令显示了一个 Oracle\
    \ 19c 数据库镜像的历史记录。从下往上阅读输出，可以看到用于创建最终镜像每一层的命令，以及它如何从起点演变到最终形式。第二条命令列出了最终数据库和 Oracle\
    \ Enterprise Linux 7-slim 镜像的信息，包括它们的唯一标识符和大小。\n\n## 解读层大小\n\n最后一行是起始镜像。它上面的每一行都是一个层，或称为“玻璃隔板”，它们引入了一个修改。通过从下往上阅读输出，你可以看到最终镜像是如何通过一系列操作演变而来的，从起始镜像（底部的\
    \ `ADD file:` 条目）一直到完成。每个镜像层在第一列都有一个唯一的 ID，在最后一列有其大小。\n\n虽然我们还没有介绍不同的 Dockerfile\
    \ 命令，但请看大小列。那些*不是*零字节的层有一个共同点。大多数 `ADD` 或 `COPY` 操作正如其名——向组合中添加或复制了某些东西。剩余两个命令的输出被截断了，但如果完整打印出来，你会看到它们正在运行脚本或命令。这些非零字节的层就像上面放了东西的玻璃隔板。层的大小与每个隔板上所包含的更改量相匹配。\n"
- fmt: 'What about the zero-byte layers? These are metadata instructions Docker uses
    to run the image. They don’t occupy space in the image. In keeping with the cooking
    theme, image metadata is the information needed to prepare and finish a recipe.
    Things like oven temperature and baking time aren’t physical ingredients in a
    cake, yet they’re still critical to the process. In the Dockerfile, the `USER
    root` and `USER oracle` instructions fill this role, telling Docker to run one
    or more subsequent commands as a particular user. If you’re familiar with Oracle
    database installations, you might even recognize a familiar pattern here:


    ```

    1664ac9ff6d4  /bin/sh -c $ORACLE_BASE/oraInventory/orainst…   21.8MB

    6688786dc411  /bin/sh -c #(nop)  USER root                    0B

    ```


    Again, reading from the bottom up, Docker sets the user to `root` and runs something
    in `$ORACLE_BASE/oraInventory/orasinst...`. The full command on that line is


    ```

    $ORACLE_BASE/oraInventory/orainstRoot.sh && $ORACLE_HOME/root.sh

    ```


    That’s Docker running Oracle’s post-installation root scripts! Changing the user
    is a metadata operation. Running the post-installation root scripts created 21.8MB
    in changes to the layers below.


    Layers are powerful because they’re reusable. We don’t completely rewrite documentation
    just to add a minor change, nor do we rebuild images containing identical steps.
    Suppose I changed the Dockerfile used to build the database image shown earlier.
    In that case, Docker understands that everything up to my edit is the same and
    reuses existing image layers instead of reexecuting the steps. Given the layer
    appearing here:


    ```

    b6fb885c6988  /bin/sh -c #(nop) COPY --chown=oracle:dbadir…   6.19GB

    ```


    The last column shows the layer uses 6.19GB of disk space. Docker can recycle
    that layer (and everything before it) in new images that have changes after that
    step. In that case, the 6.19GB layer isn’t duplicated—all images share the same
    copy!


    ## FROM


    You’ve learned that building an image runs a container, makes changes, then saves
    the result as a new image. The first step—running a container—requires an image,
    and the `FROM` command tells Docker the image’s name. The format is straightforward:
    `FROM <image name>`:


    ```

    FROM oraclelinux:7-slim

    ```


    Building an image requires an image. Where did the first image come from? Isn’t
    it a chicken and the egg paradox? Not really! A special image, called `scratch`,
    creates an empty filesystem. The advantage of using existing images is they’re
    pre-built, tested, reusable, and save us the time and effort of starting from
    “scratch” (literally)!


    Notice the sizes of the first layer of the database image (the entry recorded
    with an image ID of `<missing>`) and the Oracle Enterprise Linux 7-slim image
    in Listing [12-1](#514143_1_En_12_Chapter.xhtml#PC1) are both 133MB. Docker added
    the image (`ADD file:b0df42f2bb614be48…`) in the first step as the foundation
    for the following modifications.


    ### Build Stages


    There’s an additional capability of `FROM` that preserves the result of steps
    to use locally, later in the same build. It’s a foundation of multistage builds.
    Each stage of a multistage build is a collection of commands—parts of a single
    step in a recipe. While the alias appears in the `FROM` command marking the beginning
    of the stage, it references the result after all operations in the stage are complete.
    To create an alias, add the `AS` keyword after the image referenced in `FROM`:


    ```

    FROM oraclelinux:7-slim AS base

    ```


    It’s functionally identical to a recipe that reads


    *Step 1. Combine flour, sugar, baking soda, and salt in a bowl. Set aside.*


    The alias is the name of the stage, and it’s referenced in subsequent `FROM` commands
    using the alias:


    ```

    FROM base

    ```


    The equivalent in a recipe is


    *Step 3. Retrieve the bowl of dry ingredients from Step 1 and…*


    In complex builds, calls to stages can have their own aliases, imparting a very
    modular feel to the build process:


    ```

    FROM base AS builder

    ```


    Stages are local and temporary, and build processes aren’t aware of stages created
    in other Dockerfiles.^(^([^(64)](#fn64)))


    `base` and `builder` are common aliases for stages in a Dockerfile. `base` usually
    represents a foundation result used repeatedly throughout a build. For example,
    a `base` image for an Oracle database often starts with an OS image (`oraclelinux:7-slim`)
    and adds standard environment variables, the `oracle` user, and prerequisite packages.


    `builder` is typically an intermediate or temporary stage for creating or manipulating
    content for later use. You’ll see examples of this in the two following chapters.


    ## Configure Environments: ARG and ENV


    After initiating the build process with a starting image, it’s time to start customizing
    things! One of the most common next steps is setting environment variables. On
    a regular Linux host, the `.login`, `.bash_login`, `.bashrc`, or similar script
    sets the environment at login.


    The image in the `FROM` command doesn’t have the information we need. It needs
    to be added. The `ENV`, or environment, command is the most direct and simple
    way of setting environment variables. It assigns a value to a variable following
    the same pattern as exporting a variable to the local environment in Linux:


    ```

    ENV ORACLE_HOME=/opt/oracle/product/19c/dbhome_1

    ```


    Simple, right?'
