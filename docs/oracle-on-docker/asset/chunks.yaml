    One thing to notice in the modified script is the presence of `-autoGeneratePasswords`
    rather than a fixed password in the `dbca` command. It has to do with the sequence
    of events for creating a database in a new container:


    *   The container starts and executes `runOracle.sh`.


    *   `runOracle.sh` checks for an existing database and finds none. It calls `createDB.sh`
    and passes the value of `ORACLE_PWD` to the script. `ORACLE_PWD` isn’t exported
    or present in the environment unless it’s set explicitly as part of the `docker
    run` command or a Podman secret is passed.^([^(72)](#fn72))


    *   `createDB.sh` creates the database. For the password, it first checks whether
    an Oracle Wallet is present and, if so, uses the wallet value. If not, the value
    of `ORACLE_PWD` passed from `runOracle.sh` isn’t empty; it uses that. Otherwise,
    it instructs the Database Configuration Assistant to generate a password.


    *   When it finishes, `createDB.sh` returns control to `runOracle.sh`.


    *   `runOracle.sh` next calls `runUserScripts.sh` but does not pass the value
    of `ORACLE_PWD`.


    *   `runUserScripts.sh` discovers the `01_add_pdb.sh` script and runs it.


    Because of the way Linux shells work, the `ORACLE_PWD` variable isn’t guaranteed
    to have a value beyond the `runOracle.sh` and `createDB.sh` scripts. If it doesn’t,
    `-pdbAdminPassword "$ORACLE_PWD"` produces an error. In the interest of simplicity
    and brevity, I let PDB creation autogenerate the PDB password. Adding similar
    logic to that found in `createDB.sh`, checking for a wallet and the presence of
    a Podman secret would further improve the script.'
