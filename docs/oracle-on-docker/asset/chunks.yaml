    `OracleDatabase/SingleInstance/dockerfiles` 目录中的 `buildContainerImage.sh`^(²⁷)
    脚本负责主要工作，并接受参数，如清单 4-4 所示。


    ```

    Usage: buildContainerImage.sh -v [version] [-e | -s | -x] [-i] [-o] [container
    build option]

    Builds a container image for Oracle Database.

    Parameters:

    -v: version to build

    Choose one of: 11.2.0.2  12.1.0.2  12.2.0.1  18.3.0  18.4.0  19.3.0

    -e: creates image based on ''Enterprise Edition''

    -s: creates image based on ''Standard Edition 2''

    -x: creates image based on ''Express Edition''

    -i: ignores the MD5 checksums

    -o: passes on container build option

    * select one edition only: -e, -s, or -x

    ```


    清单 4-4

    调用 buildContainerImage.sh 时可用的选项


    目前，我们只需要关注版本和版本（edition）的选项。在此示例中，我将通过使用 `-e` 标志调用脚本并将 `19.3.0` 传递给版本标志 `-v` 来构建一个
    19c 企业版数据库的镜像：


    ```

    ./buildContainerImage.sh -e -v 19.3.0

    ```


    这将启动构建过程，在大多数笔记本电脑上通常需要 8-15 分钟。Docker 会显示每个步骤的输出，当它使用先决条件更新文件系统并安装 Oracle 软件时，您可能会看到一些熟悉的消息。完成后，您应该会看到一条指示镜像名称、标签和总构建时间的消息。运行
    `docker images` 并验证您的输出是否类似于以下内容：


    ```

    > docker images

    REPOSITORY       TAG         IMAGE ID      CREATED      SIZE

    oracle/database  19.3.0-ee   c0d1669287ad  2 hours ago  6.68GB

    ```


    现在我们有了一个用于运行数据库容器的镜像！


    ## 运行容器


    恭喜！您已经创建了一个镜像，距离享受劳动成果只有几分钟之遥！运行容器就像烤我们的披萨——无论它是新鲜的还是冷冻的，步骤都是一样的！就像我们的披萨一样，无论镜像来源如何（Oracle
    容器注册中心、Oracle 的仓库脚本还是自定义镜像），运行容器的命令都是相同的。


    ### 容器属性


    `docker run` 首次启动一个容器。它还会设置容器的属性，这些属性以后无法更改，包括它如何与其环境交互。这个第一个数据库容器的基本要素是环境变量、端口发布、卷挂载和名称。


    #### 端口发布


    容器是主机上的隔离进程；容器内部发生的事情通常对主机上的其他应用程序是不可见的。有时，我们希望与容器交互，一个主要的例子是连接到 Oracle 数据库侦听器，通常通过端口
    1521。将此端口映射或*发布*到主机上的一个端口，允许主机环境中的其他进程与容器内的数据库进行通信。^(²⁸)


    端口映射由 `-p` 或 `--publish` 标志控制，后跟主机和容器端口。例如，`-p 10000:1521` 将容器中的端口 1521 映射到主机上的端口
    10000。'
- fmt: '## Volume Mounting


    正如我们可能希望通过端口映射在主机-容器边界上进行通信一样，在某些情况下，我们需要允许主机和容器共享文件或目录。卷映射通过将容器内的文件系统映射到本地主机上的卷或目录来实现这一点。现在，可以将映射的卷视为NFS挂载点。


    在Oracle数据库镜像中，数据库配置和数据文件位于`/opt/oracle/oradata`。将此目录映射到本地机器允许数据库利用高性能存储、外部冗余和持久性。


    删除容器会删除其内容，但映射到主机目录的绑定挂载卷的内容仍保留在容器外部。我们希望在删除容器时保留数据的场景有很多，包括数据库克隆、补丁应用和升级^[^(29)](#fn29)。


    卷挂载或绑定挂载通过`-v`或`--volume`标志处理，后跟将主机目录映射到容器目录。例如，`-v $HOME/my_container:/opt/oracle/oradata`将容器的`oradata`目录映射到主机用户主目录下名为`my_container`的目录。


    ## Permissions Issues in Linux and Windows WSL Environments


    在Linux和Windows WSL环境中的Linux客户机上，主机上的目标目录必须由`oracle`用户拥有，或者具有允许`oracle`用户写入该目录的权限。


    这可能会让Windows用户感到困惑，因为Linux和Windows环境中的权限结构不同。在Docker Desktop、PowerShell或命令提示符中创建的容器在Windows文件系统下运行。Windows用户同时拥有文件和进程的所有权，当Docker在本地文件系统上创建文件时不会发生冲突。


    `docker run`的`--volume`或`-v`选项会在主机上创建映射的目录（如果它们不存在）。在Linux环境中——包括Windows上的WSL——它们是由调用进程创建并继承其所有权的。Docker守护进程以`root`用户身份运行（并创建目录），如图[4-6](#514143_1_En_4_Chapter.xhtml#Fig6)所示。这是在运行以下命令后在Windows
    WSL系统上捕获的：


    ![](images/514143_1_En_4_Chapter/514143_1_En_4_Fig6_HTML.jpg)


    一张截图显示docker守护进程以root身份运行并创建目录。


    **Figure 4-6**


    在Linux系统上，`docker run`创建的目录从Docker守护进程`root`继承所有权。


    ```

    docker run -d --name MYDB \

    -v $HOME/oradata/MYDB:/opt/oracle/oradata \

    oracle\database:19.3.0-ee

    ```


    `$HOME/oradata`目录路径不存在，因此Docker以`root`用户身份创建了它。但是，当数据库配置助手（DBCA）在容器内以`oracle`用户身份运行时^[^(30)](#fn30)，它尝试向容器卷上的目录写入文件。然而，该卷映射到本地文件系统上的一个目录，而`oracle`用户无法访问该目录。如图[4-7](#514143_1_En_4_Chapter.xhtml#Fig7)所示，由于无法创建必要的目录或写入文件，DBCA失败。


    ![](images/514143_1_En_4_Chapter/514143_1_En_4_Fig7_HTML.jpg)


    一张Ubuntu网页截图显示了DBCA命令。一个标签写着：DBCA失败，因为容器无权在映射到卷的目录上创建资源。


    **Figure 4-7**


    容器中的`/opt/oracle/oradata`目录被映射到一个不存在的目录。Docker守护进程以root用户身份在主机上创建了该目录。容器没有在那里写入文件的权限，因此DBCA失败。


    有多种方法可以避免此问题。最简单的方法可能是在Linux系统中添加`oracle`用户和`oinstall`组：


    ```

    sudo groupadd -g 54321 oinstall

    sudo useradd -u 54321 -g oinstall oracle

    ```


    预创建要映射到卷的目录并将其所有权设置为`oracle:oinstall`：


    ```

    sudo mkdir -p $HOME/oradata/MYDB

    sudo chown -R oracle:oinstall $HOME/oradata/MYDB

    ```


    每当我在Windows或Linux系统上看到失败的Oracle数据库容器时，我首先检查日志中是否包含“Cannot create directory”错误。这通常可以追溯到权限问题，即映射卷上的所有权与容器内请求资源的用户不兼容。


    ## Environment Variables


    容器从父镜像继承默认的环境设置，包括数据库和可插拔数据库名称，通常是`ORCLCDB`和`ORCLPDB1`。当容器首次运行时，启动脚本会检查是否存在数据库，如果不存在，则基于这些值创建一个。我们可以使用`-e`或`--env`标志后跟变量-值对来覆盖默认值以自定义数据库名称。例如，`-e
    ORACLE_SID=TEST -e ORACLE_PDB=TESTPDB`覆盖了默认数据库名称，并创建一个名为`TEST`的数据库，其可插拔数据库名为`TESTPDB`。


    这说明了如何使用单独的`-e`标志设置多个环境变量。同样的模式适用于多个端口和卷映射。


    ## Container Name


    `--name`标志为容器设置一个“友好”的名称。如果未指定，Docker会生成一个随机名称，如“*quirky_elbakyan*”或“*nifty_buck*”。定义名称是一个好习惯。您无需查询Docker来查找容器的名称，并且当容器具有有意义的名称时，您更有可能记住其用途。


    > **Note**

    >

    > 容器名称区分大小写。


    ### A Full Run Command


    让我们使用清单[4-5](#514143_1_En_4_Chapter.xhtml#PC12)中的命令运行一个新容器。


    ```

    docker run -d --name MYDB  \

    -p 10000:1521  \

    -v $HOME/oradata/mydb/data:/opt/oracle/oradata \

    -v $HOME/oradata/mydb/diag:/opt/oracle/diag \

    -e ORACLE_SID=MYDB \

    -e ORACLE_PDB=MYPDB \

    oracle/database:19.3.0-ee

    ```


    **Listing 4-5**

    一个用于基本Oracle数据库容器的实用`docker run`命令


    这里有一个我们尚未涵盖的新标志`-d`。它告诉Docker将容器作为分离的后台进程运行。如果没有此标志，容器将在本地会话中以交互方式运行。退出容器会导致其停止。


    命令以Docker应使用的用于启动容器的镜像结束。该镜像组合了`docker images`报告的`repository`和`tag`字段，并用冒号连接。


    提交此命令会使Docker启动容器并运行镜像中嵌入的启动脚本。没有现有数据库，因此启动脚本调用DBCA创建一个名为`MYDB`的数据库，其可插拔数据库名为`MYPDB`。数据文件和配置被写入用户主目录下的目录中。我们可以通过本地主机上的端口`10000`连接到数据库监听器。


    在Linux系统或Windows WSL主机的Linux shell中运行此命令时，请务必首先创建必要的目录：


    ```

    sudo mkdir -p $HOME/oradata/mydb/{data,diag}

    sudo chown -R oracle:oinstall $HOME/oradata/mydb

    ```


    花括号内的值`{data,diag}`告诉Linux在`$HOME/oradata/mydb`下创建两个子目录。我将它们分配给容器中的两个卷。第一个映射到`/opt/oracle/oradata`，是数据库数据文件和配置的目标。第二个映射到`/opt/oracle/diag`，接收数据库诊断目录。


    映射Oracle的诊断目录有两个好处。首先，这是一个易失性目录。如果没有卷，Oracle会将这些文件写入容器的联合文件系统，导致其增长。容器层在Docker的私有文件系统内管理。增长该文件系统可能很麻烦，因此将文件保存在容器层外部有助于防止以后出现问题。其次，将它们保存在卷上可以在容器被删除时保留它们，并且更便于查看。'
  raw: '#### Volume Mounting


    Just as we may want to communicate across the host-container boundary using port
    mapping, there are situations where we need to allow the host and container to
    share files or directories. Volume mapping accomplishes this by mapping a filesystem
    inside the container to a volume or directory on the local host. For now, think
    of mapped volumes as NFS mounts.


    In Oracle database images, database configuration and datafiles are located at
    `/opt/oracle/oradata`. Mapping this directory to the local machine allows the
    database to utilize high-performance storage, external redundancy, and *persistence*.


    Deleting a container deletes its contents, but the contents of bind-mounted volumes
    mapped to host directories remain outside the container. There are many situations
    where we want to delete containers but save the data, including database cloning,
    patching, and upgrades.^([^(29)](#fn29))


    Volume mounting, or bind mounting, is handled by the `-v` or `--volume` flag,
    followed by mapping the host directory to the container directory. For example,
    “`-v $HOME/my_container:/opt/oracle/oradata`” maps the container’s `oradata` directory
    to a directory called `my_container` under the user’s home directory on the host.


    #### Permissions Issues in Linux and Windows WSL Environments


    On Linux and Linux guests in Windows WSL environments, the target directory on
    the host must be owned by the `oracle` user or have permissions that permit the
    `oracle` user to write the directory.


    This will likely confuse Windows users due to the different permissions structures
    in Linux and Windows environments. Containers created in Docker Desktop, in PowerShell,
    or from a command prompt, run under the Windows filesystem. The Windows user owns
    both the files and the process, and there’s no conflict when Docker creates files
    on the local filesystem.


    The `--volume` or `-v` options of `docker run` creates the mapped directories
    on the host if they don’t exist. In a Linux environment—including WSL on Windows—they’re
    made by and inherit ownership from the calling process. The Docker daemon runs
    (and creates directories) as `root`, as in Figure [4-6](#514143_1_En_4_Chapter.xhtml#Fig6).
    This was captured on a Windows WSL system after running the following command:


    ![](images/514143_1_En_4_Chapter/514143_1_En_4_Fig6_HTML.jpg)


    A screenshot displays the docker daemon runs and creates directories as root.


    Figure 4-6


    Directories created by docker run on Linux systems inherit ownership from the
    Docker daemon, `root`


    ```

    docker run -d --name MYDB \

    -v $HOME/oradata/MYDB:/opt/oracle/oradata \

    oracle\database:19.3.0-ee

    ```


    The `$HOME/oradata` directory path didn’t exist, so Docker created it—as `root`.
    But, when the Database Configuration Assistant ran inside the container as the
    `oracle` user,^([^(30)](#fn30)) it attempted to write files to directories on
    the container’s volume. Still, it’s mapped to a directory on the local filesystem
    the `oracle` user can’t access. Unable to create the necessary directories or
    write files in Figure [4-7](#514143_1_En_4_Chapter.xhtml#Fig7), DBCA fails.


    ![](images/514143_1_En_4_Chapter/514143_1_En_4_Fig7_HTML.jpg)


    A screenshot of ubuntu web page displays the D B C A command. A label reads, D
    B C A failed because the container has no permission to create resources on the
    directory mapped to the volume.


    Figure 4-7


    The /opt/oracle/oradata directory in the container was mapped to a directory that
    didn’t exist. The Docker daemon created the directory on the host as the root
    user. The container doesn’t have permission to write files there, and DBCA failed


    There are a variety of options for avoiding this. Perhaps the simplest is adding
    the `oracle` user and `oinstall` group in the Linux system:


    ```

    sudo groupadd -g 54321 oinstall

    sudo useradd -u 54321 -g oinstall oracle

    ```


    Precreate directories to be mapped to volumes and set their ownership to `oracle:oinstall`:


    ```

    sudo mkdir -p $HOME/oradata/MYDB

    sudo chown -R oracle:oinstall $HOME/oradata/MYDB

    ```


    Whenever I see a failed Oracle database container on a Windows or Linux system,
    I first check whether the logs contain a “Cannot create directory” error. It usually
    leads back to a permissions issue, where ownership on a mapped volume was incompatible
    with the user requesting the resource inside the container.


    #### Environment Variables


    Containers inherit default environment settings from the parent image, including
    the database and pluggable database names, typically ORCLCDB and ORCLPDB1\. When
    a container runs for the first time, a startup script checks to see if a database
    exists and, if not, creates one based on these values. We can override the defaults
    to customize the database name with the `-e` or `--env` flags, followed by a variable-value
    pair. For example, “`-e ORACLE_SID=TEST -e ORACLE_PDB=TESTPDB`” overrides the
    default database names and creates a database called TEST with a pluggable database
    named TESTPDB.


    This illustrates how to set multiple environment variables using separate `-e`
    flags. The same pattern applies to multiple port and volume mappings.


    #### Container Name


    The `--name` flag sets a “friendly” name for a container. If not specified, Docker
    generates a random name like “*quirky_elbakyan*” or “*nifty_buck*.” Defining a
    name is a good practice. You won’t have to query Docker to find the name of your
    container, and you’re more likely to remember the purpose of a container when
    it has a meaningful name.


    Note


    Container names are case sensitive.


    ### A Full Run Command


    Let’s run a new container using the command in Listing [4-5](#514143_1_En_4_Chapter.xhtml#PC12).


    ```

    docker run -d --name MYDB  \

    -p 10000:1521  \

    -v $HOME/oradata/mydb/data:/opt/oracle/oradata \

    -v $HOME/oradata/mydb/diag:/opt/oracle/diag \

    -e ORACLE_SID=MYDB \

    -e ORACLE_PDB=MYPDB \

    oracle/database:19.3.0-ee

    Listing 4-5

    A practical docker run command for a basic Oracle database container

    ```


    There’s a new flag, `-d`, that we haven’t covered. It tells Docker to run the
    container as a detached background process. Without this flag, the container runs
    interactively in the local session. Exiting the container causes it to stop.


    The command ends with the image Docker should use to start the container. The
    image combines the `repository` and `tag` fields reported by `docker images`,
    connected with a colon.


    Submitting this command causes Docker to start the container and run startup scripts
    embedded in the image. There’s no existing database, so the startup script calls
    DBCA to create a database called MYDB, with a pluggable database called MYPDB.
    The datafiles and configurations are written to a directory under the user’s home.
    We can connect to the database listener over port 10000 on the local host.


    When running this command on a Linux system or from a Linux shell on a Windows
    WSL host, be sure to create the necessary directories first:


    ```

    sudo mkdir -p $HOME/oradata/mydb/{data,diag}

    sudo chown -R oracle:oinstall $HOME/oradata/mydb

    ```


    The values inside the curly braces—`{data,diag}`—tell Linux to create two subdirectories
    under `$HOME/oradata/mydb`. I’m assigning them to two volumes in the container.
    The first, mapped to `/opt/oracle/oradata`, is the target for the database’s datafiles
    and configurations. The second, mapped to `/opt/oracle/diag`, receives the database
    diagnostic directory.


    Mapping Oracle’s diagnostic directory has two benefits. First, this is a volatile
    directory. Without a volume, Oracle writes these files into the container’s union
    filesystem, causing it to grow. Container layers are managed inside Docker’s private
    filesystem. Growing that filesystem can be painful, so saving the files externally
    from container layers helps prevent problems later. Second, having them on a volume
    preserves them if the container is deleted and makes them more accessible for
    review.'
