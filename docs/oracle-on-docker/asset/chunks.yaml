    ## 连接到远程主机上的容器


    这些示例展示了同一主机上容器与客户端之间的连接。但情况并非总是如此。我有一个专门用于容器构建的本地实验室环境，并在各种云计算资源上操作额外的容器。访问远程主机上的
    Oracle 数据库，无论是您网络内的另一台机器，还是云中的某个虚拟主机，其过程与您看到的几乎完全相同。


    连接设置的唯一改变在于主机名。将 `localhost` 替换为远程资源的名称或 IP 地址。例如，我本地 Docker 实验室的主机名是 `lab01`。到远程机器上容器的连接会引用该主机名，但端口保持不变。只要我的网络允许通过该端口进行连接，远程主机就能识别并将流量路由到相应的容器。


    这就引出了连接到远程 Docker 主机时的另一个考虑因素。在我的家庭实验室中，所有东西都在私有网络内，因此防火墙规则不是问题。但是连接到云上的容器则需要安全规则来允许流量进入云网络，以及各个主机上的防火墙和路由规则。


    ## 设置容器主机名


    在 `docker run` 时可用的最后一个选项是 `--hostname` 标志，它能让使用容器的感觉更加“正常”。


    Docker 在创建容器时会分配唯一的字母数字字符串作为主机名，如清单 8-7 所示。对于非交互式环境来说，这不是问题。但随机的字符串对于在命令行工作的人来说可读性很差！默认的提示符虽然包含了主机名，但并不提供任何有意义的信息。配置依赖于名称解析的连接——例如两个数据库之间——会很繁琐。谁愿意反复输入（或复制/粘贴）“f502c53c3c27”呢？


    ```

    > docker exec -it ORCL bash

    [oracle@f502c53c3c27 ~]$ hostname

    f502c53c3c27

    [oracle@f502c53c3c27 ~]$ cat /etc/hosts

    127.0.0.1     localhost

    ::1     localhost ip6-localhost ip6-loopback

    fe00::0    ip6-localnet

    ff00::0     ip6-mcastprefix

    ff02::1     ip6-allnodes

    ff02::2     ip6-allrouters

    172.17.0.2     f502c53c3c27

    清单 8-7

    在未设置主机名的容器中查看主机名和主机信息

    ```


    `docker run` 的 `--hostname` 选项用于设置容器内的主机名。清单 8-8 是在创建时为主机名分配主机名的示例，随后在新容器内使用与清单
    8-7 相同的命令进行了验证。


    ```

    > docker run -d \

    >      --name TEST \

    >      --hostname TEST \

    >      -p 51521:1521 \

    >      oracle/database:19.3.0-ee

    78f62ede3f889b3805d51428385b5d56826164c2517951019cf5f612c608b8be

    > docker exec -it TEST bash

    [oracle@TEST ~]$ hostname

    TEST

    [oracle@TEST ~]$ cat /etc/hosts

    127.0.0.1     localhost

    ::1     localhost ip6-localhost ip6-loopback

    fe00::0     ip6-localnet

    ff00::0     ip6-mcastprefix

    ff02::1     ip6-allnodes

    ff02::2     ip6-allrouters

    172.17.0.5     TEST

    [oracle@TEST ~]$

    清单 8-8

    使用 docker run --hostname 标志设置并确认容器内的主机名

    ```


    比较一下两个容器的输出。第二个容器由于在 shell 提示符处显示了有意义的名称，因此更容易识别。它也有助于在环境中按照标准实践保持一致的命名。而且，借助
    DNS，容器内部的网络连接对于人类读者来说也更加直接明了。唉，容器网络中的 DNS 是下一章的主题！


    ## 向现有容器添加端口


    在介绍端口发布时，我说过唯一在容器中打开端口的时机是在创建时。我也提到了一个变通方法，虽然没有什么魔法可以绕过 Docker 的网络行为，但有一种方法可以实现结果——只有一个注意事项！


    在第 7 章中，您了解到 Docker 如何将数据与软件分离，以及保存在卷上的数据和配置在移除容器后仍然保留。卷上的数据和配置可以被回收利用——例如克隆数据库——或用于重新创建数据库。通过将
    `/opt/oracle/oradata` 目录映射到现有卷，新容器并不知道它是一个新容器。它只是启动了现有的数据库。


    同样的技巧允许您向现有容器添加端口映射。只要数据被持久化到卷中，您就可以停止、移除，然后使用相同的数据库特定设置（例如 `ORACLE_SID` 和 `ORACLE_PDB`）以及相同的卷映射重新创建容器。将被遗漏的端口映射（或其他配置）添加到新的
    `docker run` 命令中。


    ## 本章小结


    本章介绍了容器网络背后的基础知识，并描述了如何使用端口发布在主机与其容器之间打开通信。您了解到端口无法在容器创建后添加，但删除并重新创建容器可以绕过这个疏忽——前提是其数据已持久化到卷中！


    使用 `-p` 或 `--publish` 选项在主机和容器之间映射资源，其模式与使用 `-v` 或 `--volume` 分配卷相同，但这是一种有限的方法。端口数量是有限的，并且并非所有端口都适合作为转换流量的目标。只能使用非保留或动态范围（从
    49152 到 65535）内的端口，否则可能与其他服务发生冲突。为避免使用已被分配的端口，可以同时使用 `--expose` 和 `-P`（或 `--publish-all`）标志来分配网络映射。


    创建到运行在容器中的数据库的连接，与在非容器环境中的过程几乎完全相同。关键区别在于理解使用哪个主机和端口以及在哪里使用。在容器内部运行的进程不使用端口映射，而从主机（或远程主机上的容器）连接的客户端将使用映射的端口。


    最后，您学习了如何设置容器的主机名，使环境感觉更“正常”和友好。设置主机名是下一章的铺垫，在下一章中，容器网络和 DNS 功能将使编排和多个数据库系统变得更加流畅和自然。


    端口发布对于小型系统，尤其是在笔记本电脑或台式机等本地化环境中运行的系统来说是足够的。通过添加容器网络来使事情复杂化是没有意义的。如果您在 Linux 容器中运行
    Oracle 数据库的动机是个人用途，拥有一些用于实验的数据库，那么您可以直接跳到第 10 章。要了解更多关于容器网络的知识，以及如何构建更健壮和灵活的网络，或使容器表现为“常规”网络资源（而无需记住哪个容器使用什么端口），您可以在第
    9 章找到答案！


    脚注 1

    '
- fmt: '# 9. Container Networks


    I have a confession: networking intimidates me. I spent years in environments
    with dedicated network administrators and didn’t make time to learn much beyond
    the basics. It wasn’t until I joined an operations team that I recognized the
    void in my skills. From what I’ve heard from other database administrators, I’m
    not alone.


    I used port publishing to handle connections during my first few years working
    with Docker. Since I only needed local access to a few containers, it didn’t make
    sense to go through the additional effort of creating dedicated networks. Plus,
    it’s what everyone else was doing.


    As my use and reliance on containers grew, I realized the burden and limitations
    port mapping created. It’s a manual process that scales poorly and doesn’t integrate
    with automation. I had to keep track of and assign open ports. If I let Docker
    assign ports, I needed to identify the mappings. And, if I forgot to set a port,
    I had to recreate the container! Network configurations aren’t intuitive under
    port mapping, either. Connection strings and host identities vary based on where
    connections originate. Container networks eliminate these issues, simplifying
    access and usability, integrating containers with existing observation platforms,
    and reducing operational overhead.


    This chapter isn’t a deep dive into networking concepts. Instead, it concentrates
    on practical solutions to the networking issues faced when deploying Oracle database
    services in containers. Hopefully, it makes the subject less intimidating for
    others who share my anxiety about networking!


    ## Container Networks


    We’ve already seen how Docker isolates container resources, whether it’s the ability
    to add users in a container that aren’t present on the host or create private
    filesystems visible only to the container. But containers can’t be completely
    cut off from the host. They still need to share host resources like CPU, memory,
    storage—and networking—delivered via `container networks`.


    Container networks don’t require much attention. They start automatically as part
    of the Docker engine startup. Each network has a default gateway and DNS capabilities,
    with DHCP services and IP assignments provided by the Docker daemon. And, operations
    like starting, stopping, creating, or removing containers don’t impact networks.


    The Docker daemon assigns container IP addresses using DHCP. Addresses are reassigned
    (and may change) whenever the host, container engine, or container network restarts.
    Treat container IP addresses as temporary and don’t use them for networking configurations
    like `tnsnames.ora` files!


    It’s easy to take Docker networking for granted. Many container operations require
    a network, including connecting to a container command line or database and building
    images (which calls `yum` to retrieve OS updates over the host’s Internet connection).
    Yet we didn’t need to create or configure any networking because Docker added
    three default networks when installed: `bridge`, `host`, and `none`.


    ### Docker Network Types


    Container networks are `virtual` or `software-defined networks`. Rather than cables
    and physical cards, the rules and configurations define the network devices and
    routes. They still operate much like “normal” networks, but each type of container
    network addresses specific needs.


    #### Bridge Networks


    As the name suggests, bridge networks traverse the gaps between network devices.
    In container environments, the gap covered by a bridge network is between the
    host and the container network. Containers on the same bridge network can communicate
    `inside` the network while interacting with the host `across` the bridge. However,
    rules in the bridge driver prevent bridge networks from communicating with one
    another. While containers assigned to one bridge network can see and communicate
    with each other, they can’t see or reach containers over other bridge networks.
    Bridge networks are limited to a single host or, more correctly, to the Docker
    daemon running on the host, but a single host may have multiple bridge networks.


    Because bridge networking exposes containers to one another, it’s most appropriate
    for labs and local environments hosting multiple interdependent services. Everything
    you’ve seen so far occurred over a bridge network like the one shown in Figure
    9-1—specifically, Docker’s `default bridge network`. While the default bridge
    uses the same bridge driver as user-defined bridges, user-defined bridge networks
    have additional features and capabilities that make them more attractive in all
    but the most basic environments.


    ![](images/514143_1_En_9_Chapter/514143_1_En_9_Fig1_HTML.png)


    Figure 9-1

    Containers attached to bridge networks can see and communicate with other containers
    on the same network, while the “bridge” spans the gap between the container network
    and the host.


    #### Host Networks


    Host networks map container ports directly to the host. In effect, host networks
    make it seem like container services are running natively and not in a container.
    For an Oracle database container using a container host network, external clients
    reach the listener over the host’s port 1521 instead of a mapped port.


    One advantage of host networks is DNS transparency. Clients on the external network
    can resolve the container host and don’t have to navigate any abstractions created
    by Docker. The two downsides are that host networking is only available on Linux,
    and a Docker host can’t run multiple containers.


    Container host networks like the one shown in Figure 9-2 are helpful for container
    hosts dedicated to a single service. They combine container benefits, like isolation
    and Infrastructure as Code, without complicating the network environment. When
    running Oracle databases, particularly where performance or capacity demands dedicated
    resources and infrastructure for individual databases, host networks reduce complexity
    and configuration overhead.


    ![](images/514143_1_En_9_Chapter/514143_1_En_9_Fig2_HTML.png)


    Figure 9-2

    Host networks connect containers directly to the host network interface.


    #### Other Network Types


    Docker offers additional network types, including


    *   `MACVLAN networks` make containers appear more like physical hosts by creating
    unique MAC addresses for each container on the network. Docker routes traffic
    to containers based on the MAC address. They’re helpful when migrating legacy
    applications to containers on virtual machines (or physical hosts).


    *   `IPVLAN networks` offer fine-grained control over the IPv4 and IPv6 addresses
    assigned to containers. They typically require more attention and dedicated network
    design.


    *   The `“None” network` is just what it seems—no network. Connecting a container
    to the none network disables networking. It’s most often used in conjunction with
    custom network drivers.


    *   `Overlay networks` join networks running over multiple Docker daemons into
    a single network, transparently linking services running on various hosts without
    intruding on existing (non-container) enterprise networks.


    You’re unlikely to encounter these specialty network types as you begin your Docker
    journey. The remainder of this chapter concentrates on bridge networking, the
    default bridge network and port mapping limitations, and creating and configuring
    user-defined bridge networks for multicontainer and multidatabase environments.
    To better appreciate these concepts, let’s create a test environment consisting
    of two Oracle database containers.'
