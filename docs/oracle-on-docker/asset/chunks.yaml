  trans: '### 从镜像复制与构建阶段


    Docker 采用高度模块化的方法来构建基础设施。从容器和镜像中的层到镜像本身，都体现出一种可复用的趋势，这种趋势也延伸到了 `COPY` 指令。除了本地主机上的文件，`COPY`
    指令的源还可以是现有镜像中的文件和目录——包括由构建阶段创建的别名镜像。


    要从现有镜像复制，可以使用 `--from=<镜像名>` 选项，例如下面这个 Oracle Dockerfile 中的例子：

    ```

    COPY --chown=oracle:dba --from=builder $ORACLE_BASE $ORACLE_BASE

    ```


    让我们回顾一下蛋糕食谱的例子：


    *步骤 3. 取回步骤 1 中的干配料碗，并拌入步骤 2 中的湿配料。*


    在上面的命令中，整个 `$ORACLE_BASE` 目录是从一个名为 `builder` 的镜像（多阶段构建的一部分）复制到目标镜像的 `$ORACLE_BASE`
    目录中，并将目录所有者设置为 `oracle:dba`。表面上看，这可能显得浪费或冗余。`builder` 阶段是同一构建的一部分，我们完全可以假设 `$ORACLE_BASE`
    目录已经存在。将其从一个地方复制到另一个地方并没有改变目录中的任何内容，那为何要费这个事呢？


    我们将在接下来的两章中更深入地讨论这一点，但简而言之，其背后的原因（再次）是镜像大小和层。创建 `$ORACLE_BASE` 的阶段 `builder` 包含了一些安装介质和脚本，而这些在最终的数据库镜像中并不需要。还记得我们之前查找那些以
    `INSTALL` 开头的环境变量所列出的文件和目录吗？它们都是在 `builder` 阶段，在 `ORACLE_BASE` 之外的目录中创建的。该阶段创建了
    `ORACLE_BASE` 目录，其中包含数据库软件和清册文件。^(⁶⁷)


    软件安装涉及的其他步骤是在镜像的其他位置创建和修改文件。在“正常”环境中，我们只需删除不再需要的文件。但在覆盖文件系统中，删除文件并不会真正删除它们。它只是添加了一个不透明层来隐藏下面的内容。原始文件仍然存在，仍然占用空间。


    为了解决这个问题，我们将文件复制到 `builder` 阶段并执行安装，然后只将我们需要的部分——`ORACLE_BASE`——复制到一个全新的、干净的镜像中！


    从现有镜像复制对于 Oracle 数据库还有其他应用，包括打补丁和数据库升级。


    #### 打补丁


    Oracle 的季度数据库补丁是**累积性**的。新版本的补丁适用于任何之前的版本。如果我要用 19.15 版本更新（RU）补丁为 19c 数据库打补丁，以下所有路径*应该*都会产生相同的结果：


    - 基础数据库版本 19.3；应用 19.15 RU

    - 基础数据库版本 19.3；应用 19.14 RU；应用 19.15 RU

    - 基础数据库版本 19.3；应用 19.7 RU；应用 19.14 RU；应用 19.15 RU

    - 基础数据库版本 19.3；应用 19.7 RU；应用 19.10 RU；回滚到 19.7 RU；应用 19.14 RU；应用 19.15 RU


    虽然它们*应该*都同样有效，但我敢打赌第一种最不可能遇到问题，并且反映了图 12-3 中的结构。那是一个单独的补丁。很可能它是一条经过充分测试（即使不是*测试最充分*）的路径。其他路径引入了复杂性，并随之带来了不确定性。你猜
    Oracle 测试了多少次最后一种场景？其他人采取相同步骤、发现问题并报告给 Oracle 的可能性有多大？现在再想想你的环境中可能使测试和验证复杂化的不同数据库特性、选项和配置。将这个乘以每一个可能的版本更新。难道你不更愿意每次都从
    19.3 升级吗？


    这些场景都有一个共同点：它们都始于一个基础版本。一个用 19.3 数据库主目录构建的 Docker 镜像——一个`参考`或`黄金`镜像——支持任何 19c
    补丁，使用的是最简单、最直接且可能是最安全的路径：

    ```

    COPY --chown=oracle:dba --from=oracle/database:19.3.0-ee $ORACLE_BASE $ORACLE_BASE

    COPY --chown=oracle:dba  /opt/install

    ```

    唯一的区别是补丁 ID。过程和 `opatch` 命令是相同的。一个以补丁 ID 为参数的自动化流程可以处理任何补丁。最终的镜像，每个版本更新一个，本身就是参考镜像。^(⁶⁸)


    #### 数据库升级


    数据库升级需要两个数据库主目录：一个用于源，一个用于目标。你可以编写一个 Dockerfile 来从头开始安装源和目标数据库主目录，或者从现有的数据库镜像复制已配置好的主目录。例如，从
    12.2.0.1 升级到 19.3.0：

    ```

    ENV ORACLE_19C_HOME=$ORACLE_BASE/product/19c/dbhome_1

    COPY --chown=oracle:dba --from=oracle/database:12.2.0.1-ee $ORACLE_BASE     $ORACLE_BASE

    COPY --chown=oracle:dba --from=oracle/database:19.3.0-ee   $ORACLE_19C_HOME $ORACLE_19C_HOME

    ```

    注意被复制的文件和环境变量的值！第一个 `COPY` 将整个源数据库安装添加到 `$ORACLE_BASE`，其中包括数据库清册文件——第二个只将新的 19c
    数据库主目录的内容复制到新的目标位置。使用 `ORACLE_BASE` 会覆盖 12c 结构下同名的文件和目录，而 `ORACLE_HOME` 则替换了 12c
    数据库主目录。^(⁶⁹)


    ## RUN


    `RUN` 指令是实际构建镜像工作发生的地方。我将重点介绍它在构建数据库镜像中的应用：运行命令、执行脚本和调用机密。


    ### 运行命令和脚本


    `RUN` 调用脚本和 shell 命令，就像在普通命令提示符下一样。与到目前为止介绍的许多指令一样，`RUN` 可以包含多个命令并跨越多行，使用两个 `&&`
    作为指令之间的逻辑连接符，并使用反斜杠 `\` 来续行。再次参考 Oracle 的 19c Dockerfile，以下片段将文件复制到镜像中，使 `$INSTALL_DIR`
    中所有 `*.sh` 脚本变为可执行，并运行两个脚本：

    ```

    COPY $SETUP_LINUX_FILE $CHECK_SPACE_FILE $INSTALL_DIR/

    RUN chmod ug+x $INSTALL_DIR/*.sh && \

    $INSTALL_DIR/$CHECK_SPACE_FILE && \

    $INSTALL_DIR/$SETUP_LINUX_FILE

    ```

    将命令串联在一个 `RUN` 指令中，可以将它们合并为一个层，从而产生更小、更高效的镜像。'
- fmt: '### Commands or Scripts?


    We looked at the `setupLinuxEnv.sh` file in Chapter [11](#514143_1_En_11_Chapter.xhtml).
    The commands in Listing [12-4](#514143_1_En_12_Chapter.xhtml#PC36) are part of
    that script and prepare the operating system for an Oracle installation.


    ```

    mkdir -p "$ORACLE_BASE"/scripts/setup && \

    mkdir "$ORACLE_BASE"/scripts/startup && \

    mkdir -p "$ORACLE_BASE"/scripts/extensions/setup && \

    mkdir "$ORACLE_BASE"/scripts/extensions/startup && \

    ln -s "$ORACLE_BASE"/scripts /docker-entrypoint-initdb.d && \

    mkdir "$ORACLE_BASE"/oradata && \

    mkdir -p "$ORACLE_HOME" && \

    chmod ug+x "$ORACLE_BASE"/*.sh && \

    yum -y install oracle-database-preinstall-19c openssl && \

    rm -rf /var/cache/yum && \

    ln -s "$ORACLE_BASE"/"$PWD_FILE" /home/oracle/ && \

    echo oracle:oracle | chpasswd && \

    chown -R oracle:dba "$ORACLE_BASE"

    Listing 12-4

    The commands executed by the setupLinuxEnv.sh script for a 19.3.0 database

    ```


    These could be part of the Dockerfile `RUN` command:


    ```

    RUN chmod ug+x $INSTALL_DIR/*.sh && \

    $INSTALL_DIR/$CHECK_SPACE_FILE && \

    mkdir -p "$ORACLE_BASE"/scripts/setup && \

    mkdir "$ORACLE_BASE"/scripts/startup && \

    mkdir -p "$ORACLE_BASE"/scripts/extensions/setup && \

    mkdir "$ORACLE_BASE"/scripts/extensions/startup && \

    ln -s "$ORACLE_BASE"/scripts /docker-entrypoint-initdb.d && \

    mkdir "$ORACLE_BASE"/oradata && \

    mkdir -p "$ORACLE_HOME" && \

    chmod ug+x "$ORACLE_BASE"/*.sh && \

    yum -y install oracle-database-preinstall-19c openssl && \

    rm -rf /var/cache/yum && \

    ln -s "$ORACLE_BASE"/"$PWD_FILE" /home/oracle/ && \

    echo oracle:oracle | chpasswd && \

    chown -R oracle:dba "$ORACLE_BASE"

    ```


    Which is better? There are arguments in favor of both. It boils down to coding
    style, needs, and what’s easiest for you and your team to test and manage.


    ## EXPOSE and VOLUME


    Use the `EXPOSE` instruction to define the specific ports (and protocols) available
    by default when the image runs as a container. Chapter [8](#514143_1_En_8_Chapter.xhtml)
    discussed that the network ports `exposed` by an image could be mapped to ports
    on the host. Ports that aren’t explicitly exposed in an image can be added during
    `docker run` through the `--expose` flag. Adding containers to networks, covered
    in Chapter [9](#514143_1_En_9_Chapter.xhtml), is often a better option than port
    mapping.


    The `VOLUME` instruction sets the directories inside a container that are available
    as `volumes` when running the image.


    These instructions don’t provide functionality that isn’t already available through
    `docker run` and, as such, seem to have fallen out of favor.


    ## WORKDIR


    `WORKDIR`, for Working Directory, sets the default directory used by specific
    following instructions, including `CMD`. For our purposes, it’s part of the environment
    setup for users logging in to database containers:


    ```

    USER oracle

    WORKDIR /home/oracle

    ```


    Unless otherwise defined, users log in as the `oracle` user with their session
    beginning in `/home/oracle`.


    ## CMD


    The `CMD`, or `command` instruction, is the default command Docker runs whenever
    a container starts. For Oracle’s database containers, it’s the `runOracle.sh`
    script. You may recall from Chapter [11](#514143_1_En_11_Chapter.xhtml) that this
    script contains the logic Docker uses to start a database if one exists. Otherwise,
    create a new database from values set in or passed to the environment through
    the `docker run` command.


    ## HEALTHCHECK


    The `HEALTHCHECK` is the set of rules Docker uses for reporting whether running
    containers are healthy. Sometimes, a basic command is all that’s needed to check
    status. A more conditional set of rules is often necessary for a database, and
    the health check is a script. For Oracle’s database images, it’s the `checkDBStatus.sh`
    script.


    `HEALTHCHECK` requires a command (or script) that generates an exit code of 0,
    resulting in a healthy status, or 1 to show the container as unhealthy. The frequency
    and other check characteristics are controlled through optional flags:


    *   `--interval=<check interval>`: The number of seconds between each health check.
    The default is 30 seconds, and the first health check runs `interval` seconds
    after startup or once the startup period (below) ends.

    *   `--timeout=<timeout>`: How many seconds Docker waits for the check to complete
    before reporting failure. The default is 30 seconds.

    *   `--start-period=<startup timeout>`: How long Docker waits before attempting
    the first health check. During the start period, Docker reports the container
    as “starting.” The default is zero, meaning containers show “starting” during
    the initial interval.


    Remember the different actions it performs when selecting startup timeouts for
    database containers and viewing status. Starting an existing database takes a
    few seconds, while creating a database may take several minutes, and environments
    that alert on unhealthy containers must settle on a reasonable balance. A long
    startup time that accommodates new database creation won’t immediately recognize
    existing databases that didn’t start successfully. A short startup time catches
    failed database startups but incorrectly reports containers creating new databases
    as unhealthy.


    ## Summary


    Understanding Dockerfiles is the key to building images tailored to your own needs.
    The knowledge you’ve gained elevates your image “cooking” skills from microwaving
    prepackaged frozen entrees to preparing delicious, healthy meals! This was a lot
    of information to digest, and you did a great job with this cooking lesson! The
    essential concepts we covered in this chapter that will help you understand and
    write Dockerfiles were layers, extensibility, and context.


    Image layers, like the layers in a container’s overlay filesystem, are the additions
    and modifications projected, one atop another, to produce a result. Each instruction
    in a Dockerfile creates a layer and can potentially be shared with other similar
    images. Reusing layers reduces Docker’s footprint on a host and improves overall
    speed and efficiency. Copying images from remote repositories will skip layers
    already on a host instead of recopying the existing data.


    Extensibility is more art than science since it involves anticipating the things
    you might want to do in the future, then integrating that flexibility into your
    Dockerfiles. The `ARG` instruction introduces that adaptability into builds. Use
    it to set defaults while offering the option to change aspects of images as they’re
    built.


    Context has implications for performance, resource use, and security. It’s essential
    to recognize which directories and files are part of the build context to avoid
    adding unnecessary content to images or accidentally exposing sensitive information.
    Use caution and avoid overly broad `COPY` commands that could include extraneous
    files!


    The Dockerfile is much more than a set of assembly instructions. It’s also the
    metadata Docker uses to manage containers. Metadata appears in images as zero-byte
    layers that tell Docker what user to invoke, the commands or scripts to run on
    startup, and the rules to use for reporting the health and status of containers.


    In the next chapter, we’ll look at examples of Dockerfiles and offer some opportunities
    and solutions to consider when adapting or developing Dockerfiles for Oracle databases.
    If writing custom Dockerfiles from scratch is more than you need, skip to Chapter
    [14](#514143_1_En_14_Chapter.xhtml), covering the commands and options available
    in `docker build`.


    Footnotes [1](#514143_1_En_12_Chapter.xhtml#Fn1_source)   [2](#514143_1_En_12_Chapter.xhtml#Fn2_source)   [3](#514143_1_En_12_Chapter.xhtml#Fn3_source)   [4](#514143_1_En_12_Chapter.xhtml#Fn4_source)   [5](#514143_1_En_12_Chapter.xhtml#Fn5_source)   [6](#514143_1_En_12_Chapter.xhtml#Fn6_source)   [7](#514143_1_En_12_Chapter.xhtml#Fn7_source)'
  raw: '### Commands or Scripts?


    We looked at the `setupLinuxEnv.sh` file in Chapter [11](#514143_1_En_11_Chapter.xhtml).
    The commands in Listing [12-4](#514143_1_En_12_Chapter.xhtml#PC36) are part of
    that script and prepare the operating system for an Oracle installation.


    ```

    mkdir -p "$ORACLE_BASE"/scripts/setup && \

    mkdir "$ORACLE_BASE"/scripts/startup && \

    mkdir -p "$ORACLE_BASE"/scripts/extensions/setup && \

    mkdir "$ORACLE_BASE"/scripts/extensions/startup && \

    ln -s "$ORACLE_BASE"/scripts /docker-entrypoint-initdb.d && \

    mkdir "$ORACLE_BASE"/oradata && \

    mkdir -p "$ORACLE_HOME" && \

    chmod ug+x "$ORACLE_BASE"/*.sh && \

    yum -y install oracle-database-preinstall-19c openssl && \

    rm -rf /var/cache/yum && \

    ln -s "$ORACLE_BASE"/"$PWD_FILE" /home/oracle/ && \

    echo oracle:oracle | chpasswd && \

    chown -R oracle:dba "$ORACLE_BASE"

    Listing 12-4

    The commands executed by the setupLinuxEnv.sh script for a 19.3.0 database

    ```


    These could be part of the Dockerfile `RUN` command:


    ```

    RUN chmod ug+x $INSTALL_DIR/*.sh && \

    $INSTALL_DIR/$CHECK_SPACE_FILE && \

    mkdir -p "$ORACLE_BASE"/scripts/setup && \

    mkdir "$ORACLE_BASE"/scripts/startup && \

    mkdir -p "$ORACLE_BASE"/scripts/extensions/setup && \

    mkdir "$ORACLE_BASE"/scripts/extensions/startup && \

    ln -s "$ORACLE_BASE"/scripts /docker-entrypoint-initdb.d && \

    mkdir "$ORACLE_BASE"/oradata && \

    mkdir -p "$ORACLE_HOME" && \

    chmod ug+x "$ORACLE_BASE"/*.sh && \

    yum -y install oracle-database-preinstall-19c openssl && \

    rm -rf /var/cache/yum && \

    ln -s "$ORACLE_BASE"/"$PWD_FILE" /home/oracle/ && \

    echo oracle:oracle | chpasswd && \

    chown -R oracle:dba "$ORACLE_BASE"

    ```


    Which is better? There are arguments in favor of both. It boils down to coding
    style, needs, and what’s easiest for you and your team to test and manage.


    ## EXPOSE and VOLUME


    Use the `EXPOSE` instruction to define the specific ports (and protocols) available
    by default when the image runs as a container. Chapter [8](#514143_1_En_8_Chapter.xhtml)
    discussed that the network ports *exposed* by an image could be mapped to ports
    on the host. Ports that aren’t explicitly exposed in an image can be added during
    `docker run` through the `--expose` flag. Adding containers to networks, covered
    in Chapter [9](#514143_1_En_9_Chapter.xhtml), is often a better option than port
    mapping.


    The `VOLUME` instruction sets the directories inside a container that are available
    as *volumes* when running the image.


    These instructions don’t provide functionality that isn’t already available through
    `docker run` and, as such, seem to have fallen out of favor.


    ## WORKDIR


    `WORKDIR`, for Working Directory, sets the default directory used by specific
    following instructions, including `CMD`. For our purposes, it’s part of the environment
    setup for users logging in to database containers:


    ```

    USER oracle

    WORKDIR /home/oracle

    ```


    Unless otherwise defined, users log in as the `oracle` user with their session
    beginning in `/home/oracle`.


    ## CMD


    The `CMD`, or *command* instruction, is the default command Docker runs whenever
    a container starts. For Oracle’s database containers, it’s the `runOracle.sh`
    script. You may recall from Chapter [11](#514143_1_En_11_Chapter.xhtml) that this
    script contains the logic Docker uses to start a database if one exists. Otherwise,
    create a new database from values set in or passed to the environment through
    the `docker run` command.


    ## HEALTHCHECK


    The `HEALTHCHECK` is the set of rules Docker uses for reporting whether running
    containers are healthy. Sometimes, a basic command is all that’s needed to check
    status. A more conditional set of rules is often necessary for a database, and
    the health check is a script. For Oracle’s database images, it’s the `checkDBStatus.sh`
    script.


    `HEALTHCHECK` requires a command (or script) that generates an exit code of 0,
    resulting in a healthy status, or 1 to show the container as unhealthy. The frequency
    and other check characteristics are controlled through optional flags:


    *   `--interval=<check interval>`: The number of seconds between each health check.
    The default is 30 seconds, and the first health check runs `interval` seconds
    after startup or once the startup period (below) ends.


    *   `--timeout=<timeout>`: How many seconds Docker waits for the check to complete
    before reporting failure. The default is 30 seconds.


    *   `--start-period=<startup timeout>`: How long Docker waits before attempting
    the first health check. During the start period, Docker reports the container
    as “starting.” The default is zero, meaning containers show “starting” during
    the initial interval.


    Remember the different actions it performs when selecting startup timeouts for
    database containers and viewing status. Starting an existing database takes a
    few seconds, while creating a database may take several minutes, and environments
    that alert on unhealthy containers must settle on a reasonable balance. A long
    startup time that accommodates new database creation won’t immediately recognize
    existing databases that didn’t start successfully. A short startup time catches
    failed database startups but incorrectly reports containers creating new databases
    as unhealthy.


    ## Summary


    Understanding Dockerfiles is the key to building images tailored to your own needs.
    The knowledge you’ve gained elevates your image “cooking” skills from microwaving
    prepackaged frozen entrees to preparing delicious, healthy meals! This was a lot
    of information to digest, and you did a great job with this cooking lesson! The
    essential concepts we covered in this chapter that will help you understand and
    write Dockerfiles were layers, extensibility, and context.


    Image layers, like the layers in a container’s overlay filesystem, are the additions
    and modifications projected, one atop another, to produce a result. Each instruction
    in a Dockerfile creates a layer and can potentially be shared with other similar
    images. Reusing layers reduces Docker’s footprint on a host and improves overall
    speed and efficiency. Copying images from remote repositories will skip layers
    already on a host instead of recopying the existing data.


    Extensibility is more art than science since it involves anticipating the things
    you might want to do in the future, then integrating that flexibility into your
    Dockerfiles. The argument instruction introduces that adaptability into builds.
    Use it to set defaults while offering the option to change aspects of images as
    they’re built.


    Context has implications for performance, resource use, and security. It’s essential
    to recognize which directories and files are part of the build context to avoid
    adding unnecessary content to images or accidentally exposing sensitive information.
    Use caution and avoid overly broad `COPY` commands that could include extraneous
    files!


    The Dockerfile is much more than a set of assembly instructions. It’s also the
    metadata Docker uses to manage containers. Metadata appears in images as zero-byte
    layers that tell Docker what user to invoke, the commands or scripts to run on
    startup, and the rules to use for reporting the health and status of containers.


    In the next chapter, we’ll look at examples of Dockerfiles and offer some opportunities
    and solutions to consider when adapting or developing Dockerfiles for Oracle databases.
    If writing custom Dockerfiles from scratch is more than you need, skip to Chapter
    [14](#514143_1_En_14_Chapter.xhtml), covering the commands and options available
    in `docker build`.


    Footnotes [1](#514143_1_En_12_Chapter.xhtml#Fn1_source)   [2](#514143_1_En_12_Chapter.xhtml#Fn2_source)
      [3](#514143_1_En_12_Chapter.xhtml#Fn3_source)   [4](#514143_1_En_12_Chapter.xhtml#Fn4_source)
      [5](#514143_1_En_12_Chapter.xhtml#Fn5_source)   [6](#514143_1_En_12_Chapter.xhtml#Fn6_source)
      [7](#514143_1_En_12_Chapter.xhtml#Fn7_source)'
  trans: '

    ### 命令还是脚本？


    我们在第 11 章中查看了 `setupLinuxEnv.sh` 文件。清单 12-4 中的命令是该脚本的一部分，用于为 Oracle 安装准备操作系统。


    ```

    mkdir -p "$ORACLE_BASE"/scripts/setup && \

    mkdir "$ORACLE_BASE"/scripts/startup && \

    mkdir -p "$ORACLE_BASE"/scripts/extensions/setup && \

    mkdir "$ORACLE_BASE"/scripts/extensions/startup && \

    ln -s "$ORACLE_BASE"/scripts /docker-entrypoint-initdb.d && \

    mkdir "$ORACLE_BASE"/oradata && \

    mkdir -p "$ORACLE_HOME" && \

    chmod ug+x "$ORACLE_BASE"/*.sh && \

    yum -y install oracle-database-preinstall-19c openssl && \

    rm -rf /var/cache/yum && \

    ln -s "$ORACLE_BASE"/"$PWD_FILE" /home/oracle/ && \

    echo oracle:oracle | chpasswd && \

    chown -R oracle:dba "$ORACLE_BASE"

    清单 12-4

    setupLinuxEnv.sh 脚本为 19.3.0 数据库执行的命令

    ```


    这些命令可以作为 Dockerfile 的 `RUN` 指令的一部分：


    ```

    RUN chmod ug+x $INSTALL_DIR/*.sh && \

    $INSTALL_DIR/$CHECK_SPACE_FILE && \

    mkdir -p "$ORACLE_BASE"/scripts/setup && \

    mkdir "$ORACLE_BASE"/scripts/startup && \

    mkdir -p "$ORACLE_BASE"/scripts/extensions/setup && \

    mkdir "$ORACLE_BASE"/scripts/extensions/startup && \

    ln -s "$ORACLE_BASE"/scripts /docker-entrypoint-initdb.d && \

    mkdir "$ORACLE_BASE"/oradata && \

    mkdir -p "$ORACLE_HOME" && \

    chmod ug+x "$ORACLE_BASE"/*.sh && \

    yum -y install oracle-database-preinstall-19c openssl && \

    rm -rf /var/cache/yum && \

    ln -s "$ORACLE_BASE"/"$PWD_FILE" /home/oracle/ && \

    echo oracle:oracle | chpasswd && \

    chown -R oracle:dba "$ORACLE_BASE"

    ```


    哪种方式更好？两者各有支持的理由。这归结于编码风格、需求以及对你和你的团队来说最易于测试和管理的方案。


    ## EXPOSE 和 VOLUME


    使用 `EXPOSE` 指令来定义镜像作为容器运行时默认可用的特定端口（和协议）。第 8 章讨论了镜像**暴露**的网络端口可以映射到主机上的端口。镜像中未明确暴露的端口可以在
    `docker run` 时通过 `--expose` 标志添加。第 9 章介绍的将容器添加到网络，通常是比端口映射更好的选择。


    `VOLUME` 指令设置容器内部的目录，这些目录在运行镜像时可作为**卷**使用。


    这些指令提供的功能并非无法通过 `docker run` 获得，因此似乎已不那么受青睐。


    ## WORKDIR


    `WORKDIR`，即工作目录，设置后续特定指令（包括 `CMD`）使用的默认目录。就我们的目的而言，它是登录数据库容器的用户环境设置的一部分：


    ```

    USER oracle

    WORKDIR /home/oracle

    ```


    除非另有定义，用户将以 `oracle` 用户身份登录，其会话从 `/home/oracle` 开始。


    ## CMD


    `CMD` 或**命令**指令是 Docker 在容器启动时运行的默认命令。对于 Oracle 的数据库容器，它是 `runOracle.sh` 脚本。你可能还记得第
    11 章，该脚本包含了 Docker 用于启动数据库（如果存在）的逻辑。否则，它会根据通过 `docker run` 命令在环境中设置或传递的值创建一个新数据库。


    ## HEALTHCHECK


    `HEALTHCHECK` 是 Docker 用于报告运行中的容器是否健康的一组规则。有时，一个简单的命令就足以检查状态。但对于数据库，通常需要一套更条件化的规则，而健康检查是一个脚本。对于
    Oracle 数据库镜像，它是 `checkDBStatus.sh` 脚本。


    `HEALTHCHECK` 需要一个命令（或脚本），该命令生成退出代码 0 表示健康状态，或生成退出代码 1 表示容器不健康。检查的频率和其他特征通过可选标志控制：


    *   `--interval=<检查间隔>`：每次健康检查之间的秒数。默认为 30 秒，第一次健康检查在启动后或启动期（见下文）结束后运行 `interval`
    秒。

    *   `--timeout=<超时时间>`：Docker 等待检查完成然后报告失败的秒数。默认为 30 秒。

    *   `--start-period=<启动超时>`：Docker 在尝试第一次健康检查前等待的时间。在启动期间，Docker 报告容器状态为“正在启动”。默认值为零，表示容器在初始间隔期间显示为“正在启动”。


    在为数据库容器选择启动超时和查看状态时，请记住它执行的不同操作。启动一个现有数据库需要几秒钟，而创建一个数据库可能需要几分钟，对不健康容器发出警报的环境必须找到一个合理的平衡点。一个为适应新数据库创建而设置的较长启动时间，将无法立即识别出未成功启动的现有数据库。一个较短的启动时间能捕获失败的数据库启动，但会错误地报告正在创建新数据库的容器为不健康。


    ## 小结


    理解 Dockerfile 是构建满足自身需求定制镜像的关键。你所获得的知识将你的镜像“烹饪”技能从加热预制冷冻食品提升到了准备美味健康的佳肴！这一章信息量很大，你在此次烹饪课上表现得非常棒！我们在本章中涵盖的、将帮助你理解和编写
    Dockerfile 的核心概念是：**层**、**可扩展性**和**上下文**。


    镜像层，类似于容器的覆盖文件系统中的层，是层层叠加投影的添加和修改，以产生最终结果。Dockerfile 中的每条指令创建一个层，并可能与其他类似镜像共享。重用层减少了
    Docker 在主机上的占用空间，并提高了整体速度和效率。从远程仓库复制镜像时，会跳过主机上已有的层，而不是重新复制现有数据。


    可扩展性更像是一门艺术而非科学，因为它涉及预测未来可能想做的事情，然后将这种灵活性集成到你的 Dockerfile 中。`ARG` 指令将这种适应性引入构建过程。使用它来设置默认值，同时提供在构建时更改镜像某些方面的选项。


    上下文对性能、资源使用和安全性有影响。识别哪些目录和文件是构建上下文的一部分至关重要，以避免将不必要的内容添加到镜像中或意外暴露敏感信息。请谨慎行事，避免使用可能包含无关文件的过于宽泛的
    `COPY` 命令！


    Dockerfile 远不止是一组汇编指令。它也是 Docker 用来管理容器的元数据。元数据在镜像中以零字节层的形式出现，告诉 Docker 应调用哪个用户、在启动时运行哪些命令或脚本，以及用于报告容器健康状态和状态的规则。


    在下一章中，我们将查看 Dockerfile 的示例，并在为 Oracle 数据库调整或开发 Dockerfile 时提供一些需要考虑的机会和解决方案。如果从头编写自定义
    Dockerfile 超出了你的需求，请直接跳转到第 14 章，该章介绍了 `docker build` 中可用的命令和选项。


    脚注 1   2   3   4   5   6   7

    '
- fmt: '# 13. Oracle Dockerfile Recipes


    When I was 13 years old, I saw a movie called *Breaking Away*, a coming-of-age
    story about four friends trying to find their place in the world after high school.
    The main character is a young man who’s so enamored with bike racing that he pretends
    to be an Italian cyclist. The following day, by chance, I attended a local bike
    race. That one-two punch was all it took, and that same afternoon I headed to
    the local bike shop and announced to anyone who’d listen that I was going to be
    a bike racer! I was a wide-eyed, impressionable teenager and soaked up advice
    and opinions from local cycling club members, regulars at bike shops, and articles
    and photos in magazines. One shop in town had a beautiful Italian Colnago. It
    was black, with gold accents and gold-plated Campagnolo components. It was the
    epitome of Italian cycling equipment, displayed on the wall behind the register
    like a piece of art!


    I made friends with a gentleman at the shop,^([^(70)](#fn70)) and he became my
    mentor in the sport. He turned my attention away from my dream bike—and for that
    matter, any Colnago—and recommended a less-elegant Campania instead. It had an
    ugly gray paint job and seemed twice the weight of anything else. In its defense,
    it sported an Italian name, and a decal pronounced it was “Professional” in gold
    script, somewhat softening its less-than-eye-catching appearance alongside the
    bike of my dreams!


    What was truly important: the Campania turned out to be a near-indestructible
    workhorse, forgiving of a clumsy beginner like me, and affordable for a high school
    kid with a part-time job. (The same couldn’t be said of any Colnago the shop sold—gold
    plated or not!) That bike served me well and survived the mishaps and crashes
    that were part of my learning curve. It was the right bike for me at the time.
    It got me through the beginner stage of the sport, and when the time came to replace
    it, I’d learned enough to know, beautiful as they are, a Colnago wasn’t right
    for me.


    Think of a hobby or activity you enjoy and recall how you started. Chances are
    you were unsure where to begin or what equipment you needed. During those early
    days of learning the ropes, you might have done research or joined a club to get
    advice on what to buy and how to hone your skills. You probably didn’t buy the
    most expensive equipment, starting instead with something more basic. Spending
    time improving your skills with introductory gear prepares you for the next step
    and helps justify investing in something better (and likely more expensive).


    The Oracle GitHub repository is great for breaking into the world of Linux containers.
    It’s full of ready-made formulas that remove the risk and cost of exploring container
    platforms. There’s no better introduction for anyone curious about using containers
    as a platform for Oracle technology. Indeed, it’s where I got my start with Docker,
    and it carried me through my first few years. Without it, you wouldn’t be reading
    this book! It’s an introductory resource, though, and there comes the point where
    you’ll need something more appropriate and tailored to your needs and plans—particularly
    if you intend to use containers as a production platform for Oracle databases.


    This chapter opens by highlighting limitations you’re likely to encounter with
    ready-made, multipurpose images available in public repositories. We’ll introduce
    additional Dockerfile features that broaden the possibilities for repository design
    and discuss the pros and cons of dedicated vs. all-in-one directory structures.
    Then, after demonstrating techniques for adding extensibility to Dockerfiles and
    building templates, I’ll offer patterns for solving challenges you’ll encounter
    when designing and authoring your own Dockerfile libraries. Readers should be
    comfortable with shell scripting and familiar with basic Dockerfile instructions
    and concepts. Think of this as a guide to selecting a “second bike” after putting
    in some miles, getting comfortable in the saddle, learning how containers work,
    and determining where you want to go next!


    ## Multipurpose Image Limitations


    Back in the days when I worked in a physical office with an on-site data center,
    I carried a multitool (basically a Swiss Army Knife) on my belt. It had pliers,
    Phillips and Flathead screwdrivers, a wire stripper, and a few blades. When I
    needed to work on something in the data center, most of the tools I needed were
    conveniently located on my hip. The quality of the tools was perfectly adequate
    for quick work—replacing a hard drive or network card, securing a server in a
    rack, or prying loose a stubborn, ill-fitting part. Would I use a multitool knife
    for chopping vegetables? No.


    Ready-made, multipurpose images fill a similar need. They’re reliable and convenient
    and provide an easy on-ramp into the world of containers. But while they’re adaptable
    and fit wide-ranging needs, you’ll eventually encounter situations that require
    more precise tools. In some cases, you’ll be able to leverage existing scripts,
    adapting or rewriting them to add features or modify functionality. We identified
    the scripts responsible for implementing basic functionality in Chapter [11](#514143_1_En_11_Chapter.xhtml).
    Minor modifications to these scripts address limitations and oddities in multipurpose
    image builds.


    ### Fixed Directory Paths


    Containers typically provide services to clients. They’re endpoints that accept
    input and produce results. For our container databases, the values of the `ORACLE_HOME`
    and `ORACLE_BASE` directories inside containers aren’t important if the results
    are correct. It’s no different than traditional environments. Clients connecting
    to databases on physical hosts or virtual machines don’t care about the implementation
    details.


    These paths are essential for consistency and monitoring, though. If you’re introducing
    containers as analogs for simulating or testing existing systems, scripts and
    procedures are only portable across systems when the directory structures match.
    The same applies to monitoring systems and utilities. Standard configurations
    shared across environments simplify management and maintenance.


    Users have two choices for adapting existing Dockerfiles and scripts, depending
    on the need for flexibility. The first is simply changing hard-coded values to
    match standards by editing the `ENV` assignments in Dockerfiles. The path is still
    hard-coded. It’s just set to the same value used elsewhere.


    The second option leverages arguments, introducing a default value but adding
    the option to override the default during the build:


    ```

    # Set a default value for the ORACLE_BASE:

    ARG ORACLE_BASE=/u01/opt/oracle

    # Assign the ORACLE_BASE to environment variables in the image:

    ENV ORACLE_BASE=$ORACLE_BASE

    ENV ORACLE_HOME=$ORACLE_BASE/product/19c/dbhome_1

    ```


    This is more appropriate for users working across multiple environments and a
    foundation for more adaptable image construction.'
