    ```


    You could control the creation of CDB vs. non-CDB databases through the same variable
    by checking whether `PDB_COUNT` is zero. If so, create a non-CDB database.


    When the `numberOfPDBs` variable is greater than one, the Database Configuration
    Assistant creates the container database and first pluggable database, then creates
    the additional pluggable databases. When `numberOfPDBs` is greater than one, Oracle
    uses the value of `pdbName` in the response file as the prefix and appends the
    PDB’s index. It derives the value of `pdbName` in the template from `ORACLE_PDB`
    in the environment. Be aware of this behavior to avoid unexpected pluggable database
    names! Remember, the default value of `ORACLE_PDB` is `ORCLPDB1`, and for a PDB
    count of one, Oracle creates a single PDB called `ORCLPDB1`. But, if the PDB count
