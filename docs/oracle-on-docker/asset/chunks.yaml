- fmt: 'Oracle databases running in production face similar problems. They’ll likely
    use more than one volume per container—one for the diagnostic directory, others
    for configuration files and shared scripts, and one or more for data. Keeping
    track of these associations is easier when Docker itself understands which volumes
    are used where.


    Creating volumes is a little more trouble. It’s an extra step with some additional
    complexity. Developing the habit early in your Docker experience makes it second
    nature and puts the benefits of volumes within reach when container projects begin
    demanding more from storage.


    If you’re still not convinced, there are things bind mounts simply can’t do, for
    instance, accessing cloud storage. Listing [7-3](#514143_1_En_7_Chapter.xhtml#PC6)
    shows an example of a Docker Volume created for an Object Storage bucket in Oracle
    Cloud Infrastructure.


    ```

    docker volume inspect docker_bucket

    [

    {

    "CreatedAt": "0001-01-01T00:00:00Z",

    "Driver": "s3fs:latest",

    "Mountpoint": "",

    "Name": "docker_bucket",

    "Options": {},

    "Scope": "local",

    "Status": {

    "args": [

    "-o",                "nomultipart,use_path_request_style,url=https://ocid1.tenancy.oc1..XXXXX.compat.objectstorage.XXXXX-1.oraclecloud.com/,bucket=docker_bucket"

    ],

    "mounted": false

    }

    }

    ]

    Listing 7-3

    A volume backed by an Oracle Cloud Infrastructure Object Storage bucket

    ```


    Oracle’s container registry documentation uses a bind mount (not a volume) for
    the `/opt/oracle/oradata` directory. I suggest mounting two additional directories
    in your Oracle containers for diagnostic and audit data. Both have the potential
    to grow over time. When saved within the container’s union filesystem, they add
    to the `/var/lib/docker` filesystem.


    Docker recommends volumes over bind mounts due to their flexibility and capabilities.
    Examples in the following chapters, therefore, use volumes unless otherwise noted.


    # Mounting Storage


    With an understanding of the different methods of mounting storage in containers,
    we’re ready to dig into the syntax. The images in Oracle’s container repository
    use the `/opt/oracle/oradata` directory as a volume. This directory is the default
    root for datafiles, and I’ll use it as an example to illustrate options for mapping
    mounts to containers. (For simplicity, I didn’t include diagnostic and audit directories
    in these initial examples.)


    Mapping storage to containers occurs during container creation through options
    in the `docker run` command. Oracle’s container repository documentation uses
    the legacy `-v` (long form: `--volume`) option in its examples, but Docker recommends
    using `--mount` instead. Generally speaking, both the `--mount` and `-v` options
    offer the same capabilities.^([^(53)](#fn53)) The significant difference lies
    in the expressions for defining each component. `-v` uses an ordered format, while
    `--mount` separates elements into named components.


    Both methods share two things:


    *   A `source` directory or volume on the host

    *   A `target` path in the container


    ## Using -v or --volume


    Ultimately, we’re mapping a `target` path in a container to write data to a `source`
    on the host. For the `-v` or `--volume` option, they’re passed as an ordered pair
    separated by a colon, `source` first, followed by the `target`. For bind mounts,
    the `source` is a *directory*:


    ```

    docker run ... \

    -v /oradata/ORA19C:/opt/oracle/oradata \

    ...

    docker run ... \

    --volume /oradata/ORA19C:/opt/oracle/oradata \

    ...

    ```


    For volumes, the `source` is the *volume name*:


    ```

    docker run ... \

    -v oradata_ORA19C:/opt/oracle/oradata \

    ...

    docker run ... \

    --volume oradata_ORA19C:/opt/oracle/oradata \

    ...

    ```


    ## Using --mount


    The `--mount` option separates elements into named, comma-delimited lists. The
    order of elements doesn’t matter. The `--mount` equivalent for bind-mounting a
    directory is


    ```

    docker run ... \

    --mount type=bind,source=/oradata/ORA19C,target=/opt/oracle/oradata \

    ...

    ```


    For attaching a volume:


    ```

    docker run ... \

    --mount type=volume,target=/opt/oracle/oradata,source=oradata_ORA19C \

    ...

    ```


    Note the additional field, `type`, in the `--mount` syntax. It tells Docker whether
    we’re using a volume or bind mount. The type is understood in the `-v` option
    based on whether the `source` is a Docker Volume or a directory. The first command
    uses the same order—`source`, then `target`—as the `-v` option. The second demonstrates
    that order doesn’t matter by reversing the elements.


    Another difference between `-v` and `--mount` is how Docker handles nonexistent
    `source` directories. If the `source` directory in these examples, `/oradata/ORA19C`,
    isn’t present on the host, `-v` creates the directory during `docker run`.^([^(54)](#fn54))
    The `--mount` option doesn’t and fails with an error.


    According to Docker’s research, the field names in `--mount`, `source` and `target`,
    make the command more understandable,^([^(55)](#fn55)) and they recommend the
    `--mount` option. Oracle’s container registry uses the `-v` flag in their documentation.
    Whether you use `-v` or `--mount` is up to you.


    ## Undefined Volumes


    So far, I’ve covered mounting storage to a known volume in the container, the
    `/opt/oracle/oradata` directory. That directory is defined as a volume in the
    Dockerfile, and the image metadata understands it’s special. It’s a directory
    that *can* be associated with a host resource, whether a bind mount or a Docker
    volume.^([^(56)](#fn56))


    What happens if I try to map a host directory to something that doesn’t exist
    in the container? How will Docker handle a nonexistent volume? Docker creates
    the directory in the container, as shown in Listing [7-4](#514143_1_En_7_Chapter.xhtml#PC11).
    It’s a convenient way of sharing files between the Docker host and container!


    ```

    > docker run --rm -it \

    >        -v $HOME:/not/a/real/directory alpine

    / # ls -l /not/a/real/directory/

    total 8302776

    drwx------    7 sean.scott  staff       224 Mar 26 11:44 Applications

    drwx------@  88 sean.scott  staff      2816 Apr  8 16:57 Desktop

    drwx------+  49 sean.scott  staff      1568 Mar 16 08:31 Documents

    ...

    Listing 7-4

    When mounting a local directory to a nonexistent path in the container, Docker
    creates the directory in the container and maps it to the host!

    ```


    Docker created a new directory inside the container in this example. You can also
    mount directories to existing paths in containers. If the container path includes
    files, Docker hides the contents of the container’s `target` directory, projecting
    the `source` directory contents on top. It’s a neat trick to replace an image’s
    contents for testing. For example, I can mount an updated or patched copy of an
    `ORACLE_HOME` or scripts to a container for testing purposes—without rebuilding
    the image!


    A word of warning, though: Mounting existing, nonempty directories in containers
    can have unexpected and undesirable results if the `source` directory lacks the
    files the container needs. In the previous example, mounting an empty host directory
    to the container’s `ORACLE_HOME` prevents Oracle from starting in the container.'
