  trans: '

    ### 保存新镜像


    我们正在使用的 Ubuntu 镜像不包含 `vi` 命令。但如果我们想要一个包含 `vi` 的 Ubuntu 镜像怎么办？在每个新的 Ubuntu 容器上安装
    `vi` 并不实际。相反，让我们创建一个新镜像来包含 `vi`。


    在新容器中安装 `vi`（或 `nano`），使用清单 3-1 中的命令。退出容器，在主机命令提示符下，使用 `docker commit` 命令将容器保存为新镜像。你需要提供要保存的容器的名称和新镜像的名称：


    ```

    > docker commit my_container ubuntu_editor

    sha256:be90b42f8ef0c5b8e343c7fd5d7aaa5d99f1e7e65dfac9020c4f362dade0410f

    ```


    Docker 会返回新镜像的哈希值。重新运行 `docker images` 以确认它创建了一个新镜像，代码如清单 3-2 所示。


    ```

    > docker images

    REPOSITORY       TAG       IMAGE ID       CREATED         SIZE

    ubuntu_editor    latest    be90b42f8ef0   3 seconds ago   107MB

    ubuntu           latest    ba6acccedd29   4 weeks ago     72.8MB

    清单 3-2

    将修改后的容器提交为新镜像

    ```


    新镜像 `ubuntu_editor` 现在已可用。


    注意新镜像与原始镜像相比的大小。`vi` 那么大吗？不！这是镜像和 `层` 工作方式的副产品，本章稍后将讨论。


    ### 运行新镜像


    使用这个新镜像启动另一个容器，命令为 `docker run -it ubuntu_editor`，并确认 `vi` 存在，如清单 3-3 所示。


    ```

    > docker run -it ubuntu_editor

    root@d3f700a3aae2:/# which vi

    /usr/bin/vi

    清单 3-3

    从新提交的镜像创建容器并验证 vi 是否存在

    ```


    ## 联合文件系统


    清单 3-2 展示了两个镜像。原始的 Ubuntu 镜像是 72.8MB。安装了 `vi` 的修改版本是 107MB。安装一个简单的编辑器使大小增加了 45%
    以上。为什么？


    Docker 非常高效，它利用操作系统特性来提高速度并减少占用空间。其中一个特性，`联合文件系统`（有时称为 `覆盖文件系统`），对容器内容进行“去重”。


    逻辑上，一个从 200MB 单镜像启动的运行五个容器的系统应该使用 1000MB——每个容器 200MB。有了 `联合文件系统`，实际存储需求与容器数量无关。在这个例子中，无论主机运行十个还是一千个容器，存储需求可能低至
    200MB。


    镜像提供了容器所需的所有文件和依赖项，但它们不是从镜像复制的。`容器就是镜像。`


    如果镜像不能被修改，容器如何在其文件系统中使用镜像？


    启动新容器时，Docker 会创建一个由多层组成的 `联合文件系统`：`lower`（下层）、`upper`（上层）和 `working`（工作层）。


    *   `下层`：Docker 将镜像映射到下层。每个共享镜像的容器在其下层引用相同的不可变文件集。

    *   `上层`：Docker 为每个容器创建一个唯一的上层。创建和编辑文件会将其添加到容器的上层，而不改变下层中的原始副本。

    *   `工作层`：工作层是下层和上层的联合（因此得名）。它将下层中未更改的文件与保存在上层的新文件和修改过的文件合并。`联合文件系统` 将已删除文件作为一种特殊文件类型处理，告诉工作层将其从视图中屏蔽。


    为了形象化这一点，想象一个用于模拟井字棋游戏场景的镜像，如图 3-1 所示。镜像——即下层——包含游戏棋盘和游戏的前几步。起始步骤是镜像的一部分，每当容器启动时就会出现在游戏棋盘上。将上层想象为一个透明的薄片，玩家在上面标记他们的走法。工作层是玩家看到的视图，就像他们向下看时，将透明的上层叠加在下面的图像上。工作层显示了完整的棋盘——下层和上层的合并。


    ![](img/514143_1_En_3_Fig1_HTML.png)

    一个井字棋走法的示意图，从下到上说明了 3 层：下层、上层和工作层。

    图 3-1

    下层中的井字棋走法是镜像的一部分，在每个容器启动时就存在。在运行的容器中添加的走法仅存在于上层。玩家从工作层的视角“向下看”时，会看到所有的走法。


    图 3-2 展示了这如何应用于文件系统。同样，镜像提供了包含预填充文件的下层。容器获得它们自己的上层，在其中保存本地更改。在容器中运行的进程从工作层读取合并后的结果。


    ![](img/514143_1_En_3_Fig2_HTML.png)

    一个示意图展示了联合文件系统中的各层。从上到下的层依次为：工作层、上层和下层。文件名标记为文件 1、文件 2a、文件 3、文件 4 和文件 5。

    图 3-2

    `联合文件系统` 中的层。


    在图 3-2 的工作层中，文件 2 和 5 的更改版本覆盖（或屏蔽）了它们的原始版本。文件 1、3 和 4 未被遮挡，通过上层“可见”。


    在正常情况下，镜像的大部分——二进制文件、库和可执行文件——是静态的，不会在容器的上层有副本。^(¹⁸) 容器中进行的更改越少，其上层就越小。


    当你之前移除 Ubuntu 容器时，Docker 删除了分配给该容器的 `联合文件系统` 的上层。^(¹⁹) 容器中所做的更改丢失了，但底层镜像没有受到影响。


    从同一个镜像启动的数十或数百个容器共享一个下层，与物理机或虚拟机相比，在规模上带来了效率和成本效益的显著提升。我们可以通过运行带有 `-s` 或 `--size`
    选项的 `docker ps` 命令看到这一点。以下截断的输出报告了这些容器的实际大小和虚拟大小：^(²⁰)


    *   第一个容器不使用额外空间。由于容器中没有进行任何更改，其上层为空，容器的虚拟大小 72.8MB 与原始 Ubuntu 镜像相匹配。

    *   第二个容器的上层是 33.9MB。它包括更新文件系统和安装 `vi` 所需的修改。

    *   第三个容器，从新创建的镜像运行，不包括对其环境的任何更改。和第一个容器一样，这个容器的上层是空的。


    ```

    > docker ps -as

    CONTAINER ID   IMAGE         SIZE

    a5bf2c163d07   ubuntu        0B (virtual 72.8MB)

    cadf21663737   ubuntu        33.9MB (virtual 107MB)

    d3f700a3aae2   ubuntu_editor 0B (virtual 107MB)

    ```

    '
- fmt: '### Commit vs. Build


    That explains why the committed image is larger, but not the magnitude of the
    difference. That’s a product of how much the container’s layer changed when `apt-get
    update` and `apt-get install` ran. Those commands retrieved package lists, decompressed
    archives, and made incremental changes to files present in the lower layer. Every
    operation wrote something to the container’s upper layer.


    There is another way to create images. A `dockerfile` is a set of instructions
    for building images from scratch. `docker commit` is a convenient, albeit brute-force,
    method. Building images from scratch affords greater control and produces smaller,
    more efficient images.


    Listing [3-4](#514143_1_En_3_Chapter.xhtml#PC18) shows a Dockerfile that creates
    an Ubuntu image with `vi` “baked in.” Listing [3-5](#514143_1_En_3_Chapter.xhtml#PC19)
    shows the command for building an image using this file, followed by the operation’s
    results.


    ```

    > docker build --tag ubuntu_vi .

    [+] Building 7.1s (6/6) FINISHED

    => [internal] load build definition from Dockerfile

    => => transferring dockerfile: 179B

    => [internal] load .dockerignore

    => => transferring context: 2B

    => [internal] load metadata for docker.io/library/ubuntu:latest

    => [1/2] FROM docker.io/library/ubuntu:latest

    => [2/2] RUN apt-get update && apt-get install -y vim-tiny && apt-get clean &&
    rm -rf /var/lib/apt/lists/*

    => exporting to image

    => => exporting layers

    => => writing image sha256:03545fa76800a4ed39a11c9e25aa184d1a60a2b1cb889730961d47d8c8dde554

    => => naming to docker.io/library/ubuntu_vi

    Listing 3-5

    The image build and results

    ```


    ```

    FROM ubuntu:latest AS base

    RUN apt-get update \

    && apt-get install -y vim-tiny \

    && apt-get clean \

    && rm -rf /var/lib/apt/lists/*

    CMD bash

    Listing 3-4

    A Dockerfile for creating a vi-enabled Ubuntu image

    ```


    Don’t worry about the syntax for now—we’ll cover this in depth in Chapters [12](#514143_1_En_12_Chapter.xhtml)
    through [14](#514143_1_En_14_Chapter.xhtml). But note the difference in the size
    of the new image built from the Dockerfile:


    ```

    > docker images

    REPOSITORY       TAG       IMAGE ID       CREATED          SIZE

    ubuntu_vi        latest    03545fa76800   15 seconds ago   75.1MB

    ubuntu           latest    ba6acccedd29   4 weeks ago      72.8MB

    ```


    The version built from scratch is only 2.3MB larger. A far more reasonable difference!


    ## Summary


    When I talk to people about running Oracle in Docker, I begin by demonstrating
    speed. It’s a compelling opening argument and sets containers apart from competing
    technologies. Conversations with DBAs understandably turn to concerns about persistence
    and reliability. People hear containers are ephemeral and think the worst, dismissing
    the technology without taking time to understand. I’m not immune—these misunderstandings
    clouded my first experiences with Docker.


    Containers’ ephemeral labeling originates from their `typical` use cases, which
    have short lifespans. However, what counts as “short” is relative; when you think
    about it, everything is temporary! Nothing prevents long-lived applications, including
    databases, from running in containers.


    You discovered additional distinctions between containers and their physical and
    VM counterparts in this chapter. Most of these differences originate in the different
    use cases. Physical and virtual hosts fill broad, multipurpose roles requiring
    various features and libraries. Their operating systems are often larger, and
    the extra features increase potential vulnerabilities. Containers are slimmer
    systems, purpose-driven to specific tasks, with filesystems that include only
    what’s essential. Their smaller footprints are well suited for sharing across
    networks, as witnessed when creating your first container!


    You should also be comfortable using Docker’s command interface to run basic commands
    to report the images and containers present on your system and create, remove,
    stop, and start containers. You connected to a running container and updated the
    environment, adding an editor.


    The foundation of Docker’s speed and efficiency is how it uses union filesystems.
    Layers isolate the original image used for starting containers from the changes
    made over their lifecycle. Layers implement persistence for containers running
    on a system and contribute to the scalability of container infrastructure, all
    while appearing to defy common-sense mathematics! You’ll see layers return in
    the second part of this book, in the chapters covering Dockerfiles, images, and
    builds. A deep understanding of layers isn’t necessary to appreciate these topics,
    but it is an area I regret not learning sooner in my Docker journey.


    Now that you’re familiar with Docker’s syntax and workflow, you’re ready to begin
    working with database containers. We’ll do that in the next chapter, with a quick-start
    tutorial covering the steps for running your first Oracle database in a container!
    Let’s go!


    # 4. Oracle Database Quick Start


    Whenever I give webinars and presentations about running Oracle on Docker, the
    top request from attendees is a set of step-by-step instructions to get a database
    up and running in a container. This chapter is a stand-alone collection of recipes
    for building images and running database containers.


    Just as a pizza cookbook might offer instructions for making dough without describing
    how yeast makes dough rise, this chapter focuses on “how-to” and less on the “why”
    or “how.” It covers downloading and building images, creating a basic container
    database, allowing client connections from applications outside the container
    (like SQL Developer), accessing a shell, and persisting data on the host. First,
    we must prepare our system and understand a few basic terms.


    ## Access the Docker Environment


    Continuing with the cooking theme, Docker Desktop is the kitchen where we prepare
    images and containers. Docker Desktop is available as a free download from [`www.docker.com`](http://www.docker.com).
    Appendix A covers setup and configuration.


    ## Terminology


    Getting a database up and running in Docker requires understanding some of the
    language used in the Docker environment. If you’ve jumped ahead to this chapter
    and aren’t familiar with what `images`, `containers`, and `builds` are, how to
    access a command line on your system, or running basic Docker commands, spend
    a few moments reviewing this section. If you’re already comfortable with these
    concepts, feel free to skip to the next section, “`Obtaining an Image.`”'
  raw: '### Commit vs. Build


    That explains why the committed image is larger, but not the magnitude of the
    difference. That’s a product of how much the container’s layer changed when `apt-get
    update` and `apt-get install` ran. Those commands retrieved package lists, decompressed
    archives, and made incremental changes to files present in the lower layer. Every
    operation wrote something to the container’s upper layer.


    There is another way to create images. A *dockerfile* is a set of instructions
    for building images from scratch. `docker commit` is a convenient, albeit brute-force,
    method. Building images from scratch affords greater control and produces smaller,
    more efficient images.


    Listing [3-4](#514143_1_En_3_Chapter.xhtml#PC18) shows a Dockerfile that creates
    an Ubuntu image with `vi` “baked in.” Listing [3-5](#514143_1_En_3_Chapter.xhtml#PC19)
    shows the command for building an image using this file, followed by the operation’s
    results.


    ```

    > docker build --tag ubuntu_vi .

    [+] Building 7.1s (6/6) FINISHED

    => [internal] load build definition from Dockerfile

    => => transferring dockerfile: 179B

    => [internal] load .dockerignore

    => => transferring context: 2B

    => [internal] load metadata for docker.io/library/ubuntu:latest

    => [1/2] FROM docker.io/library/ubuntu:latest

    => [2/2] RUN apt-get update && apt-get install -y vim-tiny && apt-get clean &&
    rm -rf /var/lib/apt/lists/*

    => exporting to image

    => => exporting layers

    => => writing image sha256:03545fa76800a4ed39a11c9e25aa184d1a60a2b1cb889730961d47d8c8dde554

    => => naming to docker.io/library/ubuntu_vi

    Listing 3-5

    The image build and results

    ```


    ```

    FROM ubuntu:latest AS base

    RUN apt-get update \

    && apt-get install -y vim-tiny \

    && apt-get clean \

    && rm -rf /var/lib/apt/lists/*

    CMD bash

    Listing 3-4

    A Dockerfile for creating a vi-enabled Ubuntu image

    ```


    Don’t worry about the syntax for now—we’ll cover this in depth in Chapters [12](#514143_1_En_12_Chapter.xhtml)
    through [14](#514143_1_En_14_Chapter.xhtml). But note the difference in the size
    of the new image built from the Dockerfile:


