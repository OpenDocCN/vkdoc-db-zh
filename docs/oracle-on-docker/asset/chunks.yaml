    # 3. Container Foundations


    In the previous chapter, I covered some Docker terms and concepts. This chapter
    builds on that with more practical, hands-on examples that will help you understand
    Docker firsthand, how it works, and why it’s grown so popular.


    In addition to presenting basic Docker commands, I want to introduce fundamental
    concepts of images and containers. Images are *immutable*, and containers are
    *ephemeral* and *persistent*. I hesitate to type that because I know how academic
    and boring it sounds! When I started my container journey, I’ll admit that I wrestled
    with wrapping my mind around these ideas or appreciating their importance. After
    a year or so, I saw them demonstrated and the how and why were immediately apparent!
    I will do my best to reproduce those “Aha!” moments and (hopefully) save you from
    repeating my struggles!


    If you’re already familiar with containers and these concepts, feel free to move
    on to Chapter [4](#514143_1_En_4_Chapter.xhtml). If not, I encourage you to take
    the extra time to follow along with the examples in this chapter in your environment
    because there’s one thing you won’t be able to pick up off the printed page.


    *Speed.*


    I can tell you containers are fast or that the Grand Canyon is big, but some things
    are best appreciated by *seeing for yourself*.


    If you don’t already have Docker Desktop installed, download and install it from
    [*www.docker.com/products/docker-desktop*](http://www.docker.com/products/docker-desktop).
    The next chapter has details on installing Docker Desktop for Mac and Windows
    and configuring Docker on Linux systems.


    ## Docker Command-Line Overview


    Docker command-line instructions begin with the `docker` keyword. The list of
    commands is relatively brief, and, for the most part, they’re plain and meaningful,
    even to the uninitiated. `docker start` starts a container; `docker logs` displays
    container logs; `docker run` runs containers; and so on.


    Docker has some synonymous commands. For example, `docker container run` and `docker
    run` are the same command, as are `docker image ls`^([^(16)](#fn16)) and `docker
    images`. The Docker community tends to use the shorter option when there’s a synonym.
    I’ll do the same throughout this book.


    Docker alternatives, like Podman, include commands aliased to their Docker counterparts.
    I’ve worked in environments with Podman installed instead of Docker, and some
    users (including systems administrators) didn’t notice for years!


    You can always list all commands with `docker --help` (or just `docker`) at the
    prompt and get details for individual commands by typing `docker <COMMAND> --help`.
    (The Appendix includes a collection of common commands, with examples and recipes
    for running Docker and Oracle.)


    ## Run Your First Container


    Before jumping in and running an Oracle database, let’s cover some basics using
    Ubuntu, a popular Linux distribution. It provides an opportunity to take a practical
    tour of Docker, explore some concepts behind images and containers, get comfortable
    with Docker commands, and demonstrate the essential properties of container environments.


    ### List Images


    Open a shell session on the computer where you’ve installed Docker Desktop and
    show the images available on the system by running `docker images`. Your output
    will show a heading but no containers:


    ```

    > docker images

    REPOSITORY   TAG       IMAGE ID   CREATED   SIZE

    ```


    There’s nothing listed indicating there are no images on the system. Recall that
    an image is like a template, and a container is a product of running an image.
    Before running a container, we need an image.'
