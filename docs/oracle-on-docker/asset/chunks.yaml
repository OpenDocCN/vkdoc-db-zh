  trans: '

    ### 查看容器日志


    创建数据库需要几分钟时间。我们可以使用 `docker logs` 命令来监控容器内的进度。使用 `-f` 标志来跟踪刚刚创建的 `MYDB` 容器的日志活动：


    ```

    docker logs -f MYDB

    ```


    初始输出显示了数据库创建过程。完成后，启动脚本会报告数据库已准备就绪，然后内容切换为显示警报日志的内容，如代码清单 4-6 所示。


    ```

    #########################

    DATABASE IS READY TO USE!

    #########################

    Datafiles are already patched. Skipping datapatch run.

    The following output is now a tail of the alert.log:

    ORCLPDB1(3):

    ORCLPDB1(3):XDB initialized.

    2021-03-01T17:32:38.353181+00:00

    ALTER SYSTEM SET control_files=''/opt/oracle/oradata/MYDB/control01.ctl'' SCOPE=SPFILE;

    代码清单 4-6

    报告数据库可用性的日志输出

    ```


    数据库创建完成了！我们可以通过容器 shell 交互式地使用数据库，也可以通过主机应用程序（如 SQL Developer）进行连接。


    ## 访问和使用容器


    让我们探索访问和使用数据库及容器环境的方法。我们可以交互式地连接到容器 shell、运行脚本，以及使用映射端口从远程客户端连接。


    ### 访问容器 Shell


    `docker exec` 在容器环境中执行命令，可以是交互式的，也可以在后台运行。使用以下命令在刚刚创建的 `MYDB` 容器中启动一个交互式 shell：


    ```

    docker exec --interactive --tty MYDB bash

    ```


    `--interactive` 标志指示 `docker exec` 以交互方式运行；`--tty` 标志打开一个 TTY 会话。这些标志有简写选项，分别是
    `-i` 和 `-t`，并且可以组合成更短的等效命令：


    ```

    docker exec -it MYDB bash

    ```


    运行任一命令都会在容器中执行（打开）一个 bash shell。可以将其理解为通过 `ssh` 登录到远程服务器——我们现在处于容器环境中。我们运行的任何命令都会在容器中执行，就像我们连接到了另一台主机一样，直到我们退出连接。


    一旦连接上，我们就相当于在另一台机器上——一台 Oracle 数据库服务器。为了证明这一点，在容器提示符下运行 `sqlplus / as sysdba`
    并执行一些查询。结果将如代码清单 4-7 所示。


    ```

    [oracle@9fc6a7a36152 ~]$ sqlplus / as sysdba

    SQL*Plus: Release 19.0.0.0.0 - Production on Mon Mar 1 19:51:55 2021

    Version 19.3.0.0.0

    Copyright (c) 1982, 2019, Oracle.  All rights reserved.

    Connected to:

    Oracle Database 19c Enterprise Edition Release 19.0.0.0.0 - Production

    Version 19.3.0.0.0

    SQL> select name from v$database;

    NAME


    MYDB

    SQL>

    代码清单 4-7

    在数据库容器中启动 SQL*Plus

    ```


    需要明确的是，这是一个功能齐全的 Oracle 数据库，仅受其主机资源的限制。所有“常规”数据库安装中的命令在容器数据库中都存在（除非为减小镜像大小而被移除）。


    ### 运行 SQL*Plus


    `SQL*Plus` 和 `bash` 一样，是一个可执行文件，可以通过 `docker exec` 命令以相同的方式调用。代码清单 4-8 演示了如何直接打开一个
    `SQL*Plus` 会话。


    ```

    > docker exec -it MYDB sqlplus / as sysdba

    SQL*Plus: Release 19.0.0.0.0 - Production on Mon Mar 1 20:09:25 2021

    Version 19.3.0.0.0

    Copyright (c) 1982, 2019, Oracle.  All rights reserved.

    Connected to:

    Oracle Database 19c Enterprise Edition Release 19.0.0.0.0 - Production

    Version 19.3.0.0.0

    SQL> select name from v$database;

    NAME


    MYDB

    SQL>

    代码清单 4-8

    在容器中执行 SQL*Plus

    ```


    在容器中运行其他命令也遵循相同的模式。


    ### 运行脚本


    调用不带 `-it` 标志的 `docker exec` 会运行命令并报告输出。代码清单 4-9 说明了如何列出容器中某个目录的文件。


    ```

    > docker exec MYDB ls /opt/oracle/oradata/MYDB

    MYPDB

    control01.ctl

    control02.ctl

    pdbseed

    redo01.log

    redo02.log

    redo03.log

    sysaux01.dbf

    system01.dbf

    temp01.dbf

    undotbs01.dbf

    users01.dbf

    代码清单 4-9

    列出 MYDB 容器中 /opt/oracle/oradata/MYDB 目录的内容

    ```


    Oracle 镜像包含用于在容器环境中管理数据库的脚本。其中之一是 `setPassword.sh`，用于更改 `SYS`、`SYSTEM` 和 `PDBADMIN`
    用户的密码。代码清单 4-10 展示了如何调用 `setPassword.sh` 脚本来更新这些用户密码。


    ```

    > docker exec MYDB ./setPassword.sh NewPassword1

    The Oracle base remains unchanged with value /opt/oracle

    SQL*Plus: Release 19.0.0.0.0 - Production on Mon Mar 1 20:25:55 2021

    Version 19.3.0.0.0

    Copyright (c) 1982, 2019, Oracle.  All rights reserved.

    Connected to:

    Oracle Database 19c Enterprise Edition Release 19.0.0.0.0 - Production

    Version 19.3.0.0.0

    SQL>

    User altered.

    SQL>

    User altered.

    SQL>

    Session altered.

    SQL>

    User altered.

    SQL> Disconnected from Oracle Database 19c Enterprise Edition Release 19.0.0.0.0
    - Production

    Version 19.3.0.0.0

    代码清单 4-10

    在 MYDB 容器上运行 setPassword.sh 以更改密码

    ```


    这些示例应该足以让您入门。


    ### 从主机应用程序连接


    如果容器的侦听器端口已发布，本地主机上的数据库客户端可以使用这些端口映射来访问容器数据库。这包括 `SQL Developer` 和 `SQLcl` ([`www.oracle.com/tools/downloads/sqldev-downloads.html`](http://www.oracle.com/tools/downloads/sqldev-downloads.html))、`Oracle
    Instant Client` ([`www.oracle.com/database/technologies/instant-client.html`](http://www.oracle.com/database/technologies/instant-client.html))
    以及第三方工具如 Quest Toad ([`www.quest.com/products/toad-for-oracle/software-downloads.aspx`](http://www.quest.com/products/toad-for-oracle/software-downloads.aspx))。连接到在容器中运行的数据库时，唯一不同的是端口。连接本地机器上的容器时使用
    `localhost`，连接到容器运行所在系统时使用其 IP 地址或主机名。


    图 4-8 显示了 `SQL Developer` 中的数据库连接对话框，其中为主机、端口和服务名填写了 `MYDB` 数据库的信息。


    ![](img/514143_1_En_4_Fig8_HTML.jpg)


    新建或选择数据库连接窗口的屏幕截图，其中显示了 S Q L Developer 的数据库连接对话框，主机名、端口和服务名的条目已填充。本地主机标记为 I P
    地址或主机名，端口 1000 标记为已发布端口，服务名 M Y D B 标记为数据库服务。


    图 4-8

    在 SQL Developer 中添加对在 Docker 容器中运行的数据库的连接


    如果您不知道或忘记了端口映射，`docker container ports` 命令会报告此信息（它也是 `docker ps` 输出的一部分）：


    ```

    > docker container port MYDB

    1521/tcp -> 0.0.0.0:10000

    ```


    ## 管理容器


    当涉及到管理新的容器数据库时，其实没什么太多可做的。从 Oracle 的仓库和容器注册表镜像创建的数据库默认设置为 `NOARCHIVELOG` 模式，因此没有归档日志需要管理。在关闭或重启主机时，无需停止容器或其数据库。如果主机或
    Docker Desktop 重启，请在系统启动后启动容器。数据库和侦听器将作为该过程的一部分自动启动。


    `docker start` 和 `docker stop` 管理容器的状态：


    ```

    > docker stop MYDB

    MYDB

    > docker start MYDB

    MYDB

    ```

