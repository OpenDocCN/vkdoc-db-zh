- fmt: '### No Symbolic Links or Shortcuts Allowed in the Context


    In Chapter [4](#514143_1_En_4_Chapter.xhtml), you added the Oracle database installation
    media into a version-specific directory like `$HOME/docker-images/OracleDatabase/SingleInstance/dockerfiles/19.3.0`.
    When you ran the `buildContainerImage.sh` script, Docker processed the files in
    that directory to develop its context. Docker didn’t read files in the neighboring
    directories. They’re outside the build path and not useful to the build anyway—Oracle
    doesn’t need 21c installation media for a 19c image, and vice versa. The assets
    aren’t shared, and organizing files into separate directories makes sense.


    That’s true when versions are entirely different, but things get vague when dealing
    with minor releases. The 19.15 and 19.16 Release Updates (RU) use the same fundamental
    assets—installation media and OPatch—but not the patches themselves. Splitting
    them into versioned directories means duplicating some, but not all, of the files:


    ```

    19c

    ├── 19.15

    │   ├── LINUX.X64_193000_db_home.zip

    |   ├── p6880880_190000_Linux-x86-64.zip

    │   └── patch-for-1915-RU.zip

    └── 19.16

    ├── LINUX.X64_193000_db_home.zip

    ├── p6880880_190000_Linux-x86-64.zip

    └── patch-for-1916-RU.zip

    ```


    Each release adds more duplication, uses more space, and may even mismatch files.
    In the preceding directory structure, the OPatch files, beginning `p6880880`,
    have the same name, but that doesn’t guarantee they’re the same file or the latest
    version. Both directories should, ideally, use the same centrally managed file.


    Could we add a link or shortcut to Docker’s context and avoid duplicating the
    `LINUX.X64_193000_db_home.zip` file in two places? To test this, I added a link
    to the image context we’ve been working with and reran the same build:


    ```

    > ln -s /etc/passwd demo/linked_file

    > ls -l ./demo

    total 16

    lrwxr-xr-x  1 seanscott  staff    11 Aug 25 17:28 linked_file -> /etc/passwd

    -rw-r--r--  1 seanscott  staff  7868 Aug 25 13:30 passwd

    > docker build -f ./Dockerfile ./demo

    Sending build context to Docker daemon   10.8kB

    Step 1/3 : FROM alpine

    ---> 9c6f07244728

    Step 2/3 : COPY * /

    COPY failed: file not found in build context or excluded by .dockerignore: stat
    linked_file: file does not exist

    ```


    Unfortunately, Docker only recognizes physical files in its context. Since `linked_file`
    wasn’t physically present in Docker’s build directory, it wasn’t added to the
    context. The `COPY` command understood the file existed in the directory and tried
    to copy it but failed when it wasn’t found in its context.


    Docker doesn’t follow symbolic links to files stored elsewhere on the filesystem^([^(79)](#fn79))
    to maintain consistency. When context—the media and scripts needed to produce
    an image—is self-contained, builds are guaranteed to generate identical results
    across hosts. Linking to files or directories outside the context potentially
    breaks that assurance. In the preceding example, not only is the file unique,
    it could be under a different path on another machine or may not exist at all!


    That doesn’t fix the problem we sought to solve—reducing file duplication. But
    the error message in the failed build alludes to something called `.dockerignore`,
    which, it turns out, can help us reach that goal!


    ### Ignore Files


    Before sending information to the daemon, Docker looks for a `.dockerignore` file
    in its context directory. The `.dockerignore` file informs the build of any files
    or directories to exclude and prevents builds from sending unnecessary or potentially
    sensitive content to the daemon. Ignored files aren’t available to `COPY` or `ADD`
    operations because, while they may be on the filesystem, they’re not in the build
    context sent to the Docker engine in the earliest part of the build.


    `.dockerignore` files match files and directories by name or pattern. Numerous
    resources offer details pattern matching, and, rather than duplicating that information,
    I’ll cover just the basic options:


    *   Lines that begin with the hash (`#`) denote comments and are ignored.

    *   The asterisk (`*`) matches one or more characters in a file or directory name.

    *   Two consecutive asterisks (`**`) match any number of directories in the file’s
    path.

    *   A question mark (`?`) matches a single character.

    *   The exclamation point (`!`) creates an exception.


    The paths in ignore files are evaluated relative to the *root directory of the
    context*—even if the path in the ignore file begins with a slash, apparently referencing
    an absolute path. Some examples:


    ```

    # A comment

    # Ignore the Dockerfile in the root directory of the build context:

    Dockerfile

    # Ignore all files in a directory called test:

    test/*

    # Ignore files in any directory that begins "patch", followed by a single character:

    patch?/*

    # Ignore files in any directory with a suffix of ".key"

    **/*.key

    # Ignore files with a ".zip" suffix in any directory immediately below the root
    directory:

    */*.zip

    # Override the prior exclusion for files named "LINUX.X64_193000_db_home.zip":

    !*/LINUX.X64_193000_db_home.zip

    ```


    Bear in mind that Docker reads ignore files sequentially. The last condition takes
    precedence. In the following example, the first rule ignores all files in the
    `software` directory. The second makes an exception for the `LINUX.X64_193000_db_home.zip`
    file. The third then ignores any file in any directory that ends in `.zip`, excluding
    `LINUX.X64_193000_db_home.zip`:


    ```

    # Ignore files in the "software" directory:

    software/*

    # Include the "software/LINUX.X64_193000_db_home.zip" file:

    !software/LINUX.X64_193000_db_home.zip

    # Ignore files in any directory that end in ".zip"

    **/*.zip

    ```


    Switching the order of these rules, placing the exception for `LINUX.X64_193000_db_home.zip`
    last, allows its inclusion in the context:


    ```

    # Ignore files in the "software" directory:

    software/*

    # Ignore files in any directory that end in ".zip"

    **/*.zip

    # Include the "software/LINUX.X64_193000_db_home.zip" file:

    !software/LINUX.X64_193000_db_home.zip

    ```


    Filtering, especially with wildcards, based on the current or expected directory
    contents doesn’t guarantee an outcome. Rather than allowing files based on patterns,
    consider a least-privilege model that excludes everything and makes exceptions
    *only* for specific files that *should* be part of the build. The first pattern
    in this example excludes everything. The following lines add exceptions for `file1`
    and `file2`:


    ```

    *

    !file1

    !file2

    ```


    Everything else in the build directory is omitted and unavailable to `ADD` or
    `COPY` commands—even those using wildcards!


    There’s no separate option, similar to the `-f` flag for naming Dockerfiles, for
    identifying ignore files. Docker looks for ignore files called `.dockerfile` in
    the same directory as the Dockerfile itself:


    ```

    docker build -f Dockerfile_test .

    ```'
