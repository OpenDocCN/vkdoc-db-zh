    # 15. Debugging and Troubleshooting


    “New” and “different” are often intimidating and scary. We’re forced to learn
    or invent new approaches to familiar or comfortable tasks and perhaps even alter
    our perceptions and understanding. Tried and true is stable, even secure.


    Yet everything we do, especially in IT, was once new and different. I started
    on Oracle 7, long before the days of RMAN, Real Application Clusters, or Data
    Guard. The cloud? Not a thing. Exadata was still a dream. Today, I take them for
    granted as part of my day-to-day work with Oracle, but I had to learn my way around
    each technology at some point.


    Docker is no different. When I started working with containers, I didn’t fully
    grasp the relationship between images and containers or realize that builds were
    a series of “run an image in a container, do something, save the result as an
    image, repeat” operations. Understanding that made it easier to see how and where
    to troubleshoot the process.


    I read an article recently by a new developer who said the second worst part of
    their job was not understanding why code didn’t work. (The worst? Not understanding
    why their code *did* work!) This chapter discusses approaches and recipes to help
    navigate the new and different world of containers! I’ll cover ways of extracting
    information from failing images and containers that lead to understanding what
    happened, why it happened, and how to fix it!


    Most of this isn’t new in its own right—echoing variables from scripts goes back
    decades, at least. But how these methods are applied and work in containers isn’t
    always obvious or intuitive.'
  trans: "### 忽略文件\n\n我们之前讨论过分离上下文，探索了一种用于构建相似镜像的目录结构：\n\n```\n19c\n├── 19.15\n│ \
    \  ├── Dockerfile\n│   ├── LINUX.X64_193000_db_home.zip\n│   ├── p6880880_190000_Linux-x86-64.zip\n\
    │   └── patch-for-1915-RU.zip\n└── 19.16\n    ├── Dockerfile\n    ├── LINUX.X64_193000_db_home.zip\n\
    \    ├── p6880880_190000_Linux-x86-64.zip\n    └── patch-for-1916-RU.zip\n```\n\
    \n每个子目录中的前两个文件是相同的。Docker 不允许在构建上下文中使用链接或别名，除了将所有文件放在一个目录下之外，似乎没有好的办法来避免文件重复：\n\
    \n```\n19c\n├── Dockerfile\n├── LINUX.X64_193000_db_home.zip\n├── p6880880_190000_Linux-x86-64.zip\n\
    ├── patch-for-1915-RU.zip\n└── patch-for-1916-RU.zip\n```\n\n现在我们有了软件介质和 OPatch\
    \ 文件的单一副本，但不知道 `Dockerfile` 属于哪个版本！幸运的是，你之前已经了解到，我们可以使用 `-f` 选项指定自定义的 Dockerfile，这意味着我们可以为每个数据库版本编写不同的\
    \ `Dockerfile` 配方：\n\n```\n19c\n├── Dockerfile.19.15\n├── Dockerfile.19.16\n├──\
    \ LINUX.X64_193000_db_home.zip\n├── p6880880_190000_Linux-x86-64.zip\n├── patch-for-1915-RU.zip\n\
    └── patch-for-1916-RU.zip\n```\n\n然后，通过调用相应的 `Dockerfile` 来构建任一版本：\n\n```\ndocker\
    \ build -f Dockerfile.19.15 .\ndocker build -f Dockerfile.19.16 .\n```\n\n这消除了重复的文件，但现在两个补丁文件都在上下文中。当构建一个使用\
    \ 19.15 版本补丁的数据库时，`docker build` 会同时读取 19.15 和 19.16 的补丁。如果只有几个小补丁，这可能无关紧要，但实际上，我们更可能遇到的是\
    \ Oracle 每季度更新时添加的补丁数量不断增加。\n\n一个忽略文件可以解决这个问题，它告诉构建过程忽略除所需补丁之外的所有文件：\n\n```\n\
    # 忽略所有文件：\n*\n# 为 LINUX.X64_193000_db_home.zip 添加例外：\n!LINUX.X64_193000_db_home.zip\n\
    # 为 p6880880_190000_Linux-x86-64.zip 添加例外：\n!p6880880_190000_Linux-x86-64.zip\n\
    # 为 19.15 的补丁添加例外：\n!patch-for-1915-RU.zip\n```\n\n这个忽略文件将 Docker 的上下文限制在用于构建\
    \ 19.15 版本数据库的三个文件。然而，它破坏了 19.16 版本的构建！`docker build` 没有引用自定义忽略文件的功能，只认默认的 `.dockerignore`。\n\
    \n**BuildKit** 解决了这个问题。它没有引入选择忽略文件的开关，而是增加了对自定义忽略文件的支持，其名称源自自定义的 Dockerfile。\n\
    \n通常，构建会在与 `Dockerfile` 相同的目录中查找名为 `.dockerignore` 的文件。当启用 **BuildKit** 功能时，它首先查找与\
    \ `Dockerfile` 同名、但以 “`.dockerignore`” 为后缀的忽略文件。如果找不到自定义忽略文件，它接下来会查找默认名称的文件。\n\
    \n现在，每个 `Dockerfile` 版本都可以有自己的忽略文件：\n\n```\n19c\n├── Dockerfile.19.15\n├── Dockerfile.19.15.dockerignore\n\
    ├── Dockerfile.19.16\n├── Dockerfile.19.16.dockerignore\n├── LINUX.X64_193000_db_home.zip\n\
    ├── p6880880_190000_Linux-x86-64.zip\n├── patch-for-1915-RU.zip\n└── patch-for-1916-RU.zip\n\
    ```\n\n与特定版本 Dockerfile 绑定的自定义忽略文件，解决了因将重复或公共文件合并到单一目录而产生的构建上下文问题！\n\n### BuildKit\
    \ 语法\n\n某些 **BuildKit** 功能必须在 `Dockerfile` 顶部作为注释启用，以标识前端构建器的版本。例如：\n\n```\n#\
    \ syntax=docker/dockerfile:1.4\n```\n\n语法指令可以启用新的构建功能和错误修复，而无需更新 Docker 守护进程，并允许用户测试实验性功能。这些指令通常启用高级组件。如果未启用\
    \ **BuildKit**，注释后的语法指令将被忽略。\n\n## 总结\n\n镜像及其包含的自动化流程，起初可能看起来神秘甚至神奇。但揭开帷幕后，显然其中并无异常或特别之处，只是\
    \ shell 脚本和普通的 Linux 命令！\n\n凭借你对 Docker 构建语法的新理解，你可以构建镜像并为其命名。你已经看到了镜像中构建参数与容器中环境变量的相似之处，并学习了如何通过使用构建参数动态添加功能和灵活性来扩展\
    \ Dockerfile。\n\n我们讨论了用于控制构建缓存的特性，以及用于查看和管理构建过程中遗留产物的工具。随着容器使用的增长，我保证我们介绍的清理命令将证明它们的价值！\n\
    \n我在构建数据库镜像时遇到的一个挑战是管理源文件——每个版本所需的数据库安装介质和补丁。通过将文件集中存放在一个专用的清单目录中，可以更容易地防止重复和跟踪文件版本。通过将所有内容压缩到一个位置来节省空间是有代价的，每个文件都对潜在的构建上下文有贡献。采用命名的\
    \ Dockerfile，并结合通过 **BuildKit** 启用的自定义忽略文件，避免了在上下文和控制之间做出任何牺牲。\n\n有了这些知识，构建镜像应该不再那么令人生畏，我希望你会考虑拼凑几个自己的镜像！像任何事情一样，这有一个学习曲线，但别让它阻止你！在下一章中，我将分享一些我发现的、在处理镜像和容器时很有帮助的故障排除和调试技巧，虽然你肯定会遇到一些波折！\n\
    \n脚注 1 2 3 4 5 6 7 8 9\n\n# 15. 调试与故障排除\n\n“新”和“不同”常常令人望而生畏。我们被迫为熟悉或舒适的任务学习或发明新方法，甚至可能改变我们的认知和理解。久经考验的方法是稳定的，甚至是安全的。\n\
    \n然而，我们所做的一切，尤其是在 IT 领域，都曾经是新颖和不同的。我从 Oracle 7 开始，那远在 RMAN、真正应用集群或数据卫士出现之前。云计算？还不成形。Exadata\
    \ 仍是一个梦想。如今，我在日常的 Oracle 工作中视它们为理所当然，但我必须在某个时候学习掌握每一项技术。\n\nDocker 也不例外。当我开始使用容器时，我并未完全理解镜像与容器之间的关系，也没有意识到构建是一系列“在容器中运行镜像、执行操作、将结果保存为镜像、重复”的操作。理解了这一点，就更容易看清在何处以及如何对流程进行故障排除。\n\
    \n我最近读了一位新开发者的文章，他说工作中第二糟糕的部分是不明白代码为什么不工作。（最糟糕的是？不明白为什么他们的代码*能*工作！）本章讨论的方法和技巧将帮助你驾驭容器这个新颖而不同的世界！我将介绍从失败的镜像和容器中提取信息的方法，这些信息有助于理解发生了什么、为什么发生以及如何修复！\n\
    \n这些方法本身大多并不新——从脚本中回显变量的做法至少可以追溯到几十年前。但这些方法在容器中的应用和工作方式并非总是显而易见或直观的。"
