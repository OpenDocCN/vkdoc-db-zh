- fmt: '### Add a Non-CDB Option


    The software install response file doesn’t offer many interesting options, but
    the DBCA response file has more exciting possibilities. Take, for instance

    ```

    createAsContainerDatabase=true

    ```

    Maybe you’d prefer a 19c database that *isn''t* a container database. You could
    change that value to `false`, but remember this file is written into the image.
    Once you change the container database option from `true` to `false`, *every database*
    created from *this image* will necessarily be a non-container database, reversing
    the original problem. If you need both, you could maintain separate images for
    each or create one that has both! How?


    Use this technique to introduce variable-driven control over nearly any option
    you''d care to add to the database creation process.


    First, update the response file template to read

    ```

    createAsContainerDatabase=###CREATE_CDB###

    ```

    Then, add a default value for a new environment variable that matches the placeholder,
    `CREATE_CDB`, and a `sed` command to perform the substitution. I chose to add
    the code just before the first `sed` command in the existing script:

    ```

    [ "$CREATE_CDB" == "false" ] || CREATE_CDB=true

    sed -i -e "s|###CREATE_CDB###|$CREATE_CDB|g" "$ORACLE_BASE"/dbca.rsp

    ```

    The first line checks to see if the value of `CREATE_CDB` is false. The two pipes
    (`||`) are a logical expression that instruct `bash` to execute the following
    command when the statement is false. In plain English, it says, “If `CREATE_CDB`
    is `false`, leave it that way; otherwise, set it to `true`.” The `sed` expression
    on the following line performs the substitution.


    Where, then, does the `CREATE_CDB` value in the condition come from? It will be
    present in the container environment, and we can pass a value in a `docker run`
    command with the `-e` flag:

    ```

    docker run -d \

    -e CREATE_CDB=false

    ...

    ```

    Any value passed to `CREATE_CDB` that isn’t `false` (including no value at all)
    defaults to `true`, and the script creates a CDB and PDB. The container only creates
    a non-CDB database when `CREATE_CDB` is explicitly set to `false`.


    There’s one more change we’ll need to make. The 19c database creation script includes
    CDB- and PDB-specific commands that produce errors in databases built as non-CDB.
    To adapt these commands to a non-CDB environment, use the same logic earlier.
    Near the end of the script, you’ll find a `sqlplus` command block:

    ```

    sqlplus / as sysdba << EOF

    ALTER SYSTEM SET control_files=''$ORACLE_BASE/oradata/$ORACLE_SID/control01.ctl''
    scope=spfile;

    ALTER SYSTEM SET local_listener='''';

    ALTER PLUGGABLE DATABASE $ORACLE_PDB SAVE STATE;

    EXEC DBMS_XDB_CONFIG.SETGLOBALPORTENABLED (TRUE);

    ALTER SESSION SET "_oracle_script" = true;

    CREATE USER OPS\$oracle IDENTIFIED EXTERNALLY;

    GRANT CREATE SESSION TO OPS\$oracle;

    GRANT SELECT ON sys.v_\$pdbs TO OPS\$oracle;

    GRANT SELECT ON sys.v_\$database TO OPS\$oracle;

    ALTER USER OPS\$oracle SET container_data=all for sys.v_\$pdbs container = current;

    exit;

    EOF

    ```

    We need to remove three CDB- and PDB-specific commands for non-CDB databases:

    ```

    ALTER PLUGGABLE DATABASE $ORACLE_PDB SAVE STATE;

    GRANT SELECT ON sys.v_\$pdbs TO OPS\$oracle;

    ALTER USER OPS\$oracle SET container_data=all for sys.v_\$pdbs container = current;

    ```

    The following code checks the same `CREATE_CDB` environment variable and assigns
    these commands to three variables, `PDB_CMD1`, `PDB_CMD2`, and `PDB_CMD3`:

    ```

    [ "$CREATE_CDB" == "false" ] || PDB_CMD1="ALTER PLUGGABLE DATABASE $ORACLE_PDB
    SAVE STATE;"

    [ "$CREATE_CDB" == "false" ] || PDB_CMD2=''GRANT SELECT ON sys.v_$pdbs TO OPS$oracle;''

    [ "$CREATE_CDB" == "false" ] || PDB_CMD3=''ALTER USER OPS$oracle SET container_data=all
    for sys.v_$pdbs container = current;''

    ```

    Pay attention to the quotes! The first variable uses double quotes, so `bash`
    substitutes the value of `$ORACLE_PDB` into the command. The second and third
    use single quotes, preventing `bash` from interpreting the dollar signs (`$`)
    as part of an environment variable. The original commands prefix the dollar signs
    with the backslash (`\`) to escape the dollar sign because they’re part of a `here
    document`. The `here document` passes everything between the `<< EOF`, after the
    `sqlplus` login, and the closing tag, `EOF`, as if typed directly into SQL*Plus.


    Now, substitute these variables into the original code:

    ```

    sqlplus / as sysdba << EOF

    ALTER SYSTEM SET control_files=''$ORACLE_BASE/oradata/$ORACLE_SID/contro01.ctl''
    scope=spfile;

    ALTER SYSTEM SET local_listener='''';

    $PDB_CMD1

    EXEC DBMS_XDB_CONFIG.SETGLOBALPORTENABLED (TRUE);

    ALTER SESSION SET "_oracle_script" = true;

    CREATE USER OPS\$oracle IDENTIFIED EXTERNALLY;

    GRANT CREATE SESSION TO OPS\$oracle;

    $PDB_CMD2

    GRANT SELECT ON sys.v_\$database TO OPS\$oracle;

    $PDB_CMD3

    exit;

    EOF

    ```

    When creating a CDB, the variables equate to the original commands, where they’re
    interpreted in the here document and passed to SQL*Plus. For non-CDB databases,
    they’ll be undefined, creating blank lines in the script!


    There’s one more change to make in the database health check. Docker uses health
    checks to report the state of the container. If we omit this step, any container
    running a non-CDB database will report an “unhealthy” status. The scripts that
    run the database rely on the same checks to identify whether database creation
    completed properly. Left as they are, we’ll see errors in the database logs, an
    unhealthy state in `docker ps` output, and potentially break functionality that
    runs only in a “healthy” database.


    The `checkDBStatus.sh` script performs the database and container health check.
    We’ll use the same method to modify the following section, located near the top
    of the file:

    ```

    checkPDBOpen() {

    # Obtain OPEN_MODE for PDB using SQLPlus

    PDB_OPEN_MODE=$(sqlplus -s / << EOF

    set heading off;

    set pagesize 0;

    SELECT DISTINCT open_mode FROM v\$pdbs;

    exit;

    EOF

    ```

    The script assumes it’s working with a CDB. For a non-CDB database, change the
    reference from `pdbs` to `database`:

    ```

    [ "$CREATE_CDB" == "false" ] && PDB_CMD=database || PDB_CMD=pdbs

    ```

    The logic check is like those used before, with the addition of a logical and
    represented by two ampersands (`&&`). This means “If `CREATE_CDB` is false, set
    `PDB_CMD` to `database`; otherwise, set it to `pdbs`.”


    Finally, substitute the variable into the `SELECT DISTINCT` line in the `checkDBHealth.sh`
    script:

    ```

    SELECT DISTINCT open_mode FROM v\$$PDB_CMD;

    ```

    Pay attention to the sequence with the backslash and two dollar signs (`\$$`).
    The backslash “escapes” the first dollar sign but allows substitution of `$PDB_CMD`.
    The health check runs its `SELECT` against `v$database` or `v$pdbs`, depending
    on the value of `CREATE_PDB`.


    Congratulations! You’ve extended a database image to create CDB and non-CDB databases,
    run appropriate post-creation commands, and call the proper health check command
    simply by passing a variable to the `docker run` command!


    Adapting database creation scripts to accommodate CDB and non-CDB databases is
    a complex change since it touches on multiple moving parts: the response file,
    substituting a placeholder and conditionally updating SQL statements in `createDB.sh`,
    and changing the database health check. Not every change is this involved. By
    adapting all or part of this technique, you’ll be able to incorporate additional
    flexibility into images.'
  raw: '### Add a Non-CDB Option


    The software install response file doesn’t offer many interesting options, but
    the DBCA response file has more exciting possibilities. Take, for instance


    ```

    createAsContainerDatabase=true

    ```


    Maybe you’d prefer a 19c database that *isn''t* a container database. You could
    change that value to `false`, but remember this file is written into the image.
    Once you change the container database option from `true` to `false`, *every database*
    created from *this image* will necessarily be a non-container database, reversing
    the original problem. If you need both, you could maintain separate images for
    each or create one that has both! How?


    Use this technique to introduce variable-driven control over nearly any option
    you''d care to add to the database creation process.


    First, update the response file template to read


    ```

    createAsContainerDatabase=###CREATE_CDB###

    ```


    Then, add a default value for a new environment variable that matches the placeholder,
    `CREATE_CDB`, and a `sed` command to perform the substitution. I chose to add
    the code just before the first `sed` command in the existing script:


    ```

    [ "$CREATE_CDB" == "false" ] || CREATE_CDB=true

    sed -i -e "s|###CREATE_CDB###|$CREATE_CDB|g" "$ORACLE_BASE"/dbca.rsp

    ```


    The first line checks to see if the value of `CREATE_CDB` is false. The two pipes
    (`||`) are a logical expression that instructs `bash` to execute the following
    command when the statement is false. In plain English, it says, “If `CREATE_CDB`
    is `false`, leave it that way; otherwise, set it to `true`.” The `sed` expression
    on the following line performs the substitution.


    Where, then, does the `CREATE_CDB` value in the condition come from? It will be
    present in the container environment, and we can pass a value in a `docker run`
    command with the `-e` flag:


    ```

    docker run -d \

    -e CREATE_CDB=false

    ...


    ```


    Any value passed to `CREATE_CDB` that isn’t `false` (including no value at all)
    defaults to `true`, and the script creates a CDB and PDB. The container only creates
    a non-CDB database when `CREATE_CDB` is explicitly set to `false`.


    There’s one more change we’ll need to make. The 19c database creation script includes
    CDB- and PDB-specific commands that produce errors in databases built as non-CDB.
    To adapt these commands to a non-CDB environment, use the same logic earlier.
    Near the end of the script, you’ll find a `sqlplus` command block:


    ```

    sqlplus / as sysdba << EOF

    ALTER SYSTEM SET control_files=''$ORACLE_BASE/oradata/$ORACLE_SID/control01.ctl''
    scope=spfile;

    ALTER SYSTEM SET local_listener='''';

    ALTER PLUGGABLE DATABASE $ORACLE_PDB SAVE STATE;

    EXEC DBMS_XDB_CONFIG.SETGLOBALPORTENABLED (TRUE);

    ALTER SESSION SET "_oracle_script" = true;

    CREATE USER OPS\$oracle IDENTIFIED EXTERNALLY;

    GRANT CREATE SESSION TO OPS\$oracle;

    GRANT SELECT ON sys.v_\$pdbs TO OPS\$oracle;

    GRANT SELECT ON sys.v_\$database TO OPS\$oracle;

    ALTER USER OPS\$oracle SET container_data=all for sys.v_\$pdbs container = current;

    exit;

    EOF

    ```


    We need to remove three CDB- and PDB-specific commands for non-CDB databases:


    ```

    ALTER PLUGGABLE DATABASE $ORACLE_PDB SAVE STATE;

    GRANT SELECT ON sys.v_\$pdbs TO OPS\$oracle;

    ALTER USER OPS\$oracle SET container_data=all for sys.v_\$pdbs container = current;

    ```


    The following code checks the same `CREATE_CDB` environment variable and assigns
    these commands to three variables, `PDB_CMD1`, `PDB_CMD2`, and `PDB_CMD3`:


    ```

    [ "$CREATE_CDB" == "false" ] || PDB_CMD1="ALTER PLUGGABLE DATABASE $ORACLE_PDB
    SAVE STATE;"

    [ "$CREATE_CDB" == "false" ] || PDB_CMD2=''GRANT SELECT ON sys.v_$pdbs TO OPS$oracle;''

    [ "$CREATE_CDB" == "false" ] || PDB_CMD3=''ALTER USER OPS$oracle SET container_data=all
    for sys.v_$pdbs container = current;''

    ```


    Pay attention to the quotes! The first variable uses double quotes, so `bash`
    substitutes the value of `$ORACLE_PDB` into the command. The second and third
    use single quotes, preventing `bash` from interpreting the dollar signs (`$`)
    as part of an environment variable. The original commands prefix the dollar signs
    with the backslash (`\`) to escape the dollar sign because they’re part of a “*here
    document*.” The *here document* passes everything between the `<< EOF`, after
    the `sqlplus` login, and the closing tag, `EOF`, as if typed directly into SQL*Plus.


    Now, substitute these variables into the original code:


    ```

    sqlplus / as sysdba << EOF

    ALTER SYSTEM SET control_files=''$ORACLE_BASE/oradata/$ORACLE_SID/contro01.ctl''
    scope=spfile;

    ALTER SYSTEM SET local_listener='''';

    $PDB_CMD1

    EXEC DBMS_XDB_CONFIG.SETGLOBALPORTENABLED (TRUE);

    ALTER SESSION SET "_oracle_script" = true;

    CREATE USER OPS\$oracle IDENTIFIED EXTERNALLY;

    GRANT CREATE SESSION TO OPS\$oracle;

    $PDB_CMD2

    GRANT SELECT ON sys.v_\$database TO OPS\$oracle;

    $PDB_CMD3

    exit;

    EOF

    ```


    When creating a CDB, the variables equate to the original commands, where they’re
    interpreted in the here document and passed to SQL*Plus. For non-CDB databases,
    they’ll be undefined, creating blank lines in the script!


    There’s one more change to make in the database *health check*. Docker uses health
    checks to report the state of the container. If we omit this step, any container
    running a non-CDB database will report an “*unhealthy*” status. The scripts that
    run the database rely on the same checks to identify whether database creation
    completed properly. Left as they are, we’ll see errors in the database logs, an
    unhealthy state in `docker ps` output, and potentially break functionality that
    runs only in a “healthy” database.


    The `checkDBStatus.sh` script performs the database and container health check.
    We’ll use the same method to modify the following section, located near the top
    of the file:


    ```

    checkPDBOpen() {

    # Obtain OPEN_MODE for PDB using SQLPlus

    PDB_OPEN_MODE=$(sqlplus -s / << EOF

    set heading off;

    set pagesize 0;

    SELECT DISTINCT open_mode FROM v\$pdbs;

    exit;

    EOF

    ```


    The script assumes it’s working with a CDB. For a non-CDB database, change the
    reference from `pdbs` to `database`:


    ```

    [ "$CREATE_CDB" == "false" ] && PDB_CMD=database || PDB_CMD=pdbs

    ```


    The logic check is like those used before, with the addition of a *logical and*
    represented by two ampersands (`&&`). This means “If `CREATE_CDB` is false, set
    `PDB_CMD` to `database`; otherwise, set it to `pdbs`.”


    Finally, substitute the variable into the `SELECT DISTINCT` line in the `checkDBHealth.sh`
    script:


    ```

    SELECT DISTINCT open_mode FROM v\$$PDB_CMD;

    ```


    Pay attention to the sequence with the backslash and two dollar signs (`\$$`).
    The backslash “escapes” the first dollar sign but allows substitution of `$PDB_CMD`.
    The health check runs its `SELECT` against `v$database` or `v$pdbs`, depending
    on the value of `CREATE_PDB`.


    Congratulations! You’ve extended a database image to create CDB and non-CDB databases,
    run appropriate post-creation commands, and call the proper health check command
    simply by passing a variable to the `docker run` command!


    Adapting database creation scripts to accommodate CDB and non-CDB databases is
    a complex change since it touches on multiple moving parts: the response file,
    substituting a placeholder and conditionally updating SQL statements in `createDB.sh`,
    and changing the database health check. Not every change is this involved. By
    adapting all or part of this technique, you’ll be able to incorporate additional
    flexibility into images.'
  trans: '

    ### 添加非 CDB 选项


    软件安装响应文件没有提供太多有趣的选项，但 DBCA 响应文件有更多令人兴奋的可能性。例如：

    ```

    createAsContainerDatabase=true

    ```

    也许你更想要一个*不是*容器数据库的 19c 数据库。你可以将该值改为 `false`，但请记住这个文件是写入镜像中的。一旦你将容器数据库选项从 `true`
    改为 `false`，*每一个*从*这个镜像*创建的数据库都将必然是一个非容器数据库，这反而颠倒了最初的问题。如果你需要两者，你可以为每种情况维护单独的镜像，或者创建一个两者兼有的镜像！怎么做？


    使用这种技术，你可以对你想要添加到数据库创建过程中的几乎所有选项引入变量驱动的控制。


    首先，更新响应文件模板为：

    ```

    createAsContainerDatabase=###CREATE_CDB###

    ```

    然后，为与占位符 `CREATE_CDB` 匹配的新环境变量添加一个默认值，以及一个执行替换的 `sed` 命令。我选择在现有脚本的第一个 `sed` 命令之前添加代码：

    ```

    [ "$CREATE_CDB" == "false" ] || CREATE_CDB=true

    sed -i -e "s|###CREATE_CDB###|$CREATE_CDB|g" "$ORACLE_BASE"/dbca.rsp

    ```

    第一行检查 `CREATE_CDB` 的值是否为 `false`。双竖线 (`||`) 是一个逻辑表达式，指示 `bash` 当语句为假时执行后面的命令。用通俗的英语说，它的意思是：“如果
    `CREATE_CDB` 是 `false`，就保持原样；否则，将其设为 `true`。”下一行的 `sed` 表达式执行替换。


    那么，条件中的 `CREATE_CDB` 值从何而来呢？它将存在于容器环境中，我们可以通过 `docker run` 命令的 `-e` 标志传递一个值：

    ```

    docker run -d \

    -e CREATE_CDB=false

    ...

    ```

    任何传递给 `CREATE_CDB` 且不是 `false` 的值（包括完全没有值）默认为 `true`，脚本将创建一个 CDB 和 PDB。只有当 `CREATE_CDB`
    显式设置为 `false` 时，容器才创建非 CDB 数据库。


    我们还需要做一处修改。19c 数据库创建脚本包含特定于 CDB 和 PDB 的命令，这些命令在构建为非 CDB 的数据库中会产生错误。为了使这些命令适应非
    CDB 环境，使用与前面相同的逻辑。在脚本末尾附近，你会找到一个 `sqlplus` 命令块：

    ```

    sqlplus / as sysdba << EOF

    ALTER SYSTEM SET control_files=''$ORACLE_BASE/oradata/$ORACLE_SID/control01.ctl''
    scope=spfile;

    ALTER SYSTEM SET local_listener='''';

    ALTER PLUGGABLE DATABASE $ORACLE_PDB SAVE STATE;

    EXEC DBMS_XDB_CONFIG.SETGLOBALPORTENABLED (TRUE);

    ALTER SESSION SET "_oracle_script" = true;

    CREATE USER OPS\$oracle IDENTIFIED EXTERNALLY;

    GRANT CREATE SESSION TO OPS\$oracle;

    GRANT SELECT ON sys.v_\$pdbs TO OPS\$oracle;

    GRANT SELECT ON sys.v_\$database TO OPS\$oracle;

    ALTER USER OPS\$oracle SET container_data=all for sys.v_\$pdbs container = current;

    exit;

    EOF

    ```

    我们需要为非 CDB 数据库移除三个特定于 CDB 和 PDB 的命令：

    ```

    ALTER PLUGGABLE DATABASE $ORACLE_PDB SAVE STATE;

    GRANT SELECT ON sys.v_\$pdbs TO OPS\$oracle;

    ALTER USER OPS\$oracle SET container_data=all for sys.v_\$pdbs container = current;

    ```

    以下代码检查相同的 `CREATE_CDB` 环境变量，并将这些命令分配给三个变量 `PDB_CMD1`、`PDB_CMD2` 和 `PDB_CMD3`：

    ```

    [ "$CREATE_CDB" == "false" ] || PDB_CMD1="ALTER PLUGGABLE DATABASE $ORACLE_PDB
    SAVE STATE;"

    [ "$CREATE_CDB" == "false" ] || PDB_CMD2=''GRANT SELECT ON sys.v_$pdbs TO OPS$oracle;''

    [ "$CREATE_CDB" == "false" ] || PDB_CMD3=''ALTER USER OPS$oracle SET container_data=all
    for sys.v_$pdbs container = current;''

    ```

    注意引号！第一个变量使用双引号，因此 `bash` 会将 `$ORACLE_PDB` 的值代入命令。第二和第三个使用单引号，阻止 `bash` 将美元符号
    (`$`) 解释为环境变量的一部分。原始命令用反斜杠 (`\`) 前缀美元符号以转义，因为它们是 `here document` 的一部分。`here document`
    将 `<< EOF` 之后、`sqlplus` 登录之后以及结束标签 `EOF` 之间的所有内容传递，就像直接输入到 SQL*Plus 中一样。


    现在，将这些变量代入原始代码：

    ```

    sqlplus / as sysdba << EOF

    ALTER SYSTEM SET control_files=''$ORACLE_BASE/oradata/$ORACLE_SID/contro01.ctl''
    scope=spfile;

    ALTER SYSTEM SET local_listener='''';

    $PDB_CMD1

    EXEC DBMS_XDB_CONFIG.SETGLOBALPORTENABLED (TRUE);

    ALTER SESSION SET "_oracle_script" = true;

    CREATE USER OPS\$oracle IDENTIFIED EXTERNALLY;

    GRANT CREATE SESSION TO OPS\$oracle;

    $PDB_CMD2

    GRANT SELECT ON sys.v_\$database TO OPS\$oracle;

    $PDB_CMD3

    exit;

    EOF

    ```

    当创建 CDB 时，这些变量等同于原始命令，它们在 here document 中被解释并传递给 SQL*Plus。对于非 CDB 数据库，它们将是未定义的，在脚本中创建空行！


    数据库健康检查还有一处修改要做。Docker 使用健康检查来报告容器的状态。如果我们省略这一步，任何运行非 CDB 数据库的容器都将报告“不健康”状态。运行数据库的脚本依赖相同的检查来确定数据库创建是否正确完成。如果不做修改，我们会在数据库日志中看到错误，在
    `docker ps` 输出中看到不健康状态，并可能破坏仅在“健康”数据库中运行的功能。


    `checkDBStatus.sh` 脚本执行数据库和容器健康检查。我们将使用相同的方法修改位于文件顶部附近的以下部分：

    ```

    checkPDBOpen() {

    # Obtain OPEN_MODE for PDB using SQLPlus

    PDB_OPEN_MODE=$(sqlplus -s / << EOF

    set heading off;

    set pagesize 0;

    SELECT DISTINCT open_mode FROM v\$pdbs;

    exit;

    EOF

    ```

    该脚本假设它正在与 CDB 一起工作。对于非 CDB 数据库，将对 `pdbs` 的引用改为 `database`：

    ```

    [ "$CREATE_CDB" == "false" ] && PDB_CMD=database || PDB_CMD=pdbs

    ```

    逻辑检查与之前使用的类似，增加了由双和符号 (`&&`) 表示的逻辑与。这意味着“如果 `CREATE_CDB` 为 false，将 `PDB_CMD` 设为
    `database`；否则，设为 `pdbs`。”


    最后，在 `checkDBHealth.sh` 脚本的 `SELECT DISTINCT` 行中代入变量：

    ```

    SELECT DISTINCT open_mode FROM v\$$PDB_CMD;

    ```

    注意反斜杠和两个美元符号 (`\$$`) 的序列。反斜杠“转义”第一个美元符号，但允许 `$PDB_CMD` 的替换。健康检查根据 `CREATE_PDB`
    的值，对 `v$database` 或 `v$pdbs` 运行其 `SELECT`。


    恭喜！你扩展了一个数据库镜像，仅通过向 `docker run` 命令传递一个变量，就能创建 CDB 和非 CDB 数据库，运行适当的创建后命令，并调用正确的健康检查命令！


    调整数据库创建脚本以适应 CDB 和非 CDB 数据库是一个复杂的变更，因为它涉及多个变动部分：响应文件、替换占位符、在 `createDB.sh` 中有条件地更新
    SQL 语句，以及更改数据库健康检查。并非每个变更都如此复杂。通过采用全部或部分此技术，你将能够为镜像增加额外的灵活性。

    '
- fmt: '## Start and Run the Database


    The final scripts to examine manage the behavior of containers and databases when
    containers start. Recalling the “start” event during `docker start` and `docker
    run` is essential. Thinking back to Chapter [7](#514143_1_En_7_Chapter.xhtml),
    cloning databases is possible because the container doesn’t know whether it’s
    starting for the first time. The startup script looks to see if specific files
    are present and, if so, *assumes* it’s not a new container and proceeds to start
    the database. Otherwise, it creates a new database from scratch.


    The same script, `runOracle.sh`, handles both scenarios and offers multiple opportunities
    to introduce features. It sets the defaults for several environment variables
    and calls the `createDB.sh` script, invokes entrypoint scripts, and starts the
    database and listener by calling `startDB.sh`. It also controls database and listener
    shutdown when the container receives a shutdown signal from `docker stop`.


    ## Summary


    In this chapter, you learned how Docker uses scripts to build images and discovered
    ways of updating existing scripts in Oracle’s repository to change and add functionality
    to images and containers. You saw where the configuration of container operating
    systems occurs. You can add additional packages to container images and modify
    the Dockerfile to customize the environment and write files to images. We also
    covered steps performed during database installation and how response files complement
    Oracle software installation and database creation.


    We explored techniques for adding new features to database containers and how
    to drive their use through environment variables. You should also have a deeper
    appreciation for the inner workings of containers and recognize which scripts
    are called during startup. You should also have a general idea of the role health
    checks play in reporting database and container status, internally and externally.


    For many, the concepts covered in this chapter are adequate for tailoring containers
    to suit your needs better. If you’re using Docker exclusively for noncritical
    work, it’s unlikely you’ll need to write custom Dockerfiles. If so, feel free
    to skip ahead to Chapter [14](#514143_1_En_14_Chapter.xhtml).


    However, if you intend to use containers for more specific or critical applications
    or simply want to understand more about Docker’s inner workings, continue with
    the following three chapters, beginning with Chapter [12](#514143_1_En_12_Chapter.xhtml).


    ## 12. Dockerfile Syntax


    One of my favorite activities is cooking, and like any creative endeavor, the
    best results come when you understand how to use the tools of the craft. It helps
    to know the rules, which are ironclad (don’t add water to hot oil) and which have
    flexibility (how much garlic is “too much!”). Others may enjoy the result, but
    only the chef appreciates the process!


    I see many parallels between cooking and coding and find creative outlets in both.
    There are accepted, “right” ways to do certain things, but for the most part,
    each allows practitioners liberty to stamp their style into the result. Sometimes,
    I review code and come across a block I don’t immediately understand. After working
    through it, I realize it’s functionally identical to a technique I’ve used for
    years, just a completely different approach. Two authors with different backgrounds,
    experiences, influences, and habits still produce the same result. I often adopt
    those methods into my library of “cool ways to do stuff.”


    Keep that thought in mind across the next few chapters on Dockerfiles. This isn’t
    an authoritative or definitive guide but an introduction to the rules and tools
    you’ll need to concoct image recipes—Dockerfiles—used by Docker’s build process
    to construct images. At its core, that’s what a Dockerfile is:


    *   **Ingredients:** The files and objects needed by the image. In Docker, this
    is known as the `build context`.

    *   **Preparation:** The order and method for combining elements. A recipe can
    have one step or many. For instance, the first step in baking a cake combines
    dry ingredients like flour, sugar, and baking soda; the second mixes the eggs
    and milk. In the third, the wet ingredients from step two are added to the dry
    ingredients from step one. The steps in a Dockerfile are called `stages`, and
    a `multistage` build works along the same lines as the cake recipe. Early stages
    make intermediate preparations that combine in a later stage, producing a completed
    product.

    *   **Cooking:** How to build and deliver the image. This is `metadata`. In a
    recipe, it’s measurements, temperature, and baking time. In Docker, the metadata
    sets the environment, defines runtime commands called when containers start, and
    health checks that report status.


    Databases have unique needs with different treatments than ordinary container
    images, and the following few chapters are more sharply focused on addressing
    techniques and considerations for building good database images. Let’s set aside
    definitions of “good” database images for now and focus on how Dockerfiles work!


    The good news is that there aren’t many commands to learn in the Dockerfile instruction
    set! The elements are relatively straightforward, and Dockerfiles read from top
    to bottom, with each line a separate instruction that tells the `build process`
    how to construct a new image. They boil down to


    *   What image to start from

    *   How to modify the starting image by adding environment variables, copying
    files, and running commands

    *   Finally, how the finished product should behave when run as a container


    This chapter assumes some familiarity with Linux and writing bash shell scripts.'
