  trans: '

    # 查看环境值


    让我们查看上一章创建的容器，看看其环境中有哪些值。提醒一下，我使用了以下命令：


    ```

    docker run -d --name ORCL oracle/database:19.3.0-ee

    ```


    如果我登录容器，运行 `env` 命令，并用 `grep` 将结果限制为仅包含 `ORACLE` 的项，如代码清单 6-1 所示，出现的唯一值只有 `ORACLE_BASE`
    和 `ORACLE_HOME`。没有 `ORACLE_SID` 或 `ORACLE_PDB` 的值。然而，如果我搜索活动进程并用 `grep` 将输出限制为
    Oracle 数据库的 `pmon` 进程，则会发现一个 SID 为 ORCLCDB 的数据库正在运行。


    ```

    docker exec -it ORCL bash

    [oracle@8facfd649aa4 ~]$ env | grep ORACLE

    ORACLE_BASE=/opt/oracle

    ORACLE_HOME=/opt/oracle/product/19c/dbhome_1

    [oracle@8facfd649aa4 ~]$ ps -ef | grep pmon | grep -v grep

    oracle        88       1  0 Jan1 ?        00:00:16 ora_pmon_ORCLCDB

    ```


    **代码清单 6-1**

    默认数据库容器中 oracle 用户的环境变量


    也许 `env` 命令并不是检查容器环境的正确方法。启动终端会话会调用用户和 shell 的登录及配置脚本，可能会改变结果。我想要的是能看到容器启动时启动脚本所看到的相同环境的方法。为了实现这一点，我将使用
    `docker inspect` 命令来查看容器元数据：³⁷


    ```

    docker container inspect ORCL

    ```


    对我的容器执行 `docker inspect` 会产生近 300 行的 JSON 输出，并不是很用户友好。仅仅为了查看环境设置就需要翻阅大量内容！幸运的是，`inspect`
    命令（以及许多其他命令）有一个有用的 `--format` 选项，我们可以用它来限制和结构化其输出。在代码清单 6-2 中，我添加了格式化以将结果限制为配置输出中的环境值，即
    `--format=''{{.Config.Env}}''`。不幸的是，它为了清晰度牺牲了简洁性。它将所有内容都放到了单行上，而不是一个清晰、干净的变量列表！


    ```

    > docker container inspect --format=''{{json .Config.Env}}'' ORCL

    [PATH=/opt/oracle/product/19c/dbhome_1/bin:/opt/oracle/product/19c/dbhome_1/OPatch/:/usr/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    ORACLE_BASE=/opt/oracle ORACLE_HOME=/opt/oracle/product/19c/dbhome_1 INSTALL_DIR=/opt/install
    INSTALL_FILE_1=LINUX.X64_193000_db_home.zip INSTALL_RSP=db_inst.rsp CONFIG_RSP=dbca.rsp.tmpl
    PWD_FILE=setPassword.sh RUN_FILE=runOracle.sh START_FILE=startDB.sh CREATE_DB_FILE=createDB.sh
    SETUP_LINUX_FILE=setupLinuxEnv.sh CHECK_SPACE_FILE=checkSpace.sh CHECK_DB_FILE=checkDBStatus.sh
    USER_SCRIPTS_FILE=runUserScripts.sh INSTALL_DB_BINARIES_FILE=installDBBinaries.sh
    RELINK_BINARY_FILE=relinkOracleBinary.sh SLIMMING=true LD_LIBRARY_PATH=/opt/oracle/product/19c/dbhome_1/lib:/usr/lib
    CLASSPATH=/opt/oracle/product/19c/dbhome_1/jlib:/opt/oracle/product/19c/dbhome_1/rdbms/jlib]

    ```


    **代码清单 6-2**

    使用 `--format` 选项限制结果会将所有输出放在一行上且没有格式


    为了获得更人性化的输出，在代码清单 6-3 中，我将结果通过 `jq` ³⁸ 工具发送，以将 JSON 块解析为更易读的格式。我在代码清单 6-4 中使用了额外的格式化选项，将条目打印在不同的行上。我喜欢第二个示例的格式化输出。我发现它更具可读性，但这个命令比将结果通过
    `jq` 管道传输更冗长且更难记住。³⁹


    ```

    > docker container inspect --format ''{{range .Config.Env}}{{printf "%s\n" .}}{{end}}''
    ORCL

    PATH=/opt/oracle/product/19c/dbhome_1/bin:/opt/oracle/product/19c/dbhome_1/OPatch/:/usr/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin

    ORACLE_BASE=/opt/oracle

    ORACLE_HOME=/opt/oracle/product/19c/dbhome_1

    INSTALL_DIR=/opt/install

    INSTALL_FILE_1=LINUX.X64_193000_db_home.zip

    INSTALL_RSP=db_inst.rsp

    CONFIG_RSP=dbca.rsp.tmpl

    PWD_FILE=setPassword.sh

    RUN_FILE=runOracle.sh

    START_FILE=startDB.sh

    CREATE_DB_FILE=createDB.sh

    SETUP_LINUX_FILE=setupLinuxEnv.sh

    CHECK_SPACE_FILE=checkSpace.sh

    CHECK_DB_FILE=checkDBStatus.sh

    USER_SCRIPTS_FILE=runUserScripts.sh

    INSTALL_DB_BINARIES_FILE=installDBBinaries.sh

    RELINK_BINARY_FILE=relinkOracleBinary.sh

    SLIMMING=true

    LD_LIBRARY_PATH=/opt/oracle/product/19c/dbhome_1/lib:/usr/lib

    CLASSPATH=/opt/oracle/product/19c/dbhome_1/jlib:/opt/oracle/product/19c/dbhome_1/rdbms/jlib

    ```


    **代码清单 6-4**

    使用扩展格式化命令对环境信息进行“美化打印”


    ```

    > docker container inspect --format=''{{json .Config.Env}}'' ORCL | jq

    [

    "PATH=/opt/oracle/product/19c/dbhome_1/bin:/opt/oracle/product/19c/dbhome_1/OPatch/:/usr/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin",

    "ORACLE_BASE=/opt/oracle",

    "ORACLE_HOME=/opt/oracle/product/19c/dbhome_1",

    "INSTALL_DIR=/opt/install",

    "INSTALL_FILE_1=LINUX.X64_193000_db_home.zip",

    "INSTALL_RSP=db_inst.rsp",

    "CONFIG_RSP=dbca.rsp.tmpl",

    "PWD_FILE=setPassword.sh",

    "RUN_FILE=runOracle.sh",

    "START_FILE=startDB.sh",

    "CREATE_DB_FILE=createDB.sh",

    "SETUP_LINUX_FILE=setupLinuxEnv.sh",

    "CHECK_SPACE_FILE=checkSpace.sh",

    "CHECK_DB_FILE=checkDBStatus.sh",

    "USER_SCRIPTS_FILE=runUserScripts.sh",

    "INSTALL_DB_BINARIES_FILE=installDBBinaries.sh",

    "RELINK_BINARY_FILE=relinkOracleBinary.sh",

    "SLIMMING=true",

    "LD_LIBRARY_PATH=/opt/oracle/product/19c/dbhome_1/lib:/usr/lib",

    "CLASSPATH=/opt/oracle/product/19c/dbhome_1/jlib:/opt/oracle/product/19c/dbhome_1/rdbms/jlib"

    ]

    ```


    **代码清单 6-3**

    使用 `jq` 解析环境信息


    无论格式如何，仍然没有 `ORACLE_SID` 或 `ORACLE_PDB`。


    通过导航到 Docker Desktop 中的容器详细信息并选择检查选项卡，如图 6-2 所示，我会看到类似的结果。屏幕列出了容器的环境变量（但缺少对结果的排序和筛选）。


    ![](img/514143_1_En_6_Fig2_HTML.jpg)


    容器页面上检查选项卡的屏幕截图。`ORCL` 容器的检查选项卡显示环境详细信息。它包含指向路径、Oracle 主目录、基础和目录安装的链接。


    **图 6-2**

    Docker Desktop 容器详细信息页面中的检查选项卡列出了容器中设置的所有环境变量。但创建时未指定 `ORACLE_SID` 或 `ORACLE_PDB`
    值的 `ORCL` 容器，其环境中不会报告这两个变量


    有几个在“常规”数据库环境中看不到的附加变量，比如 `SLIMMING` 以及标识目录、文件和脚本的变量。注意我们的启动脚本也在那里：


    ```

    RUN_FILE=runOracle.sh

    ```


    这些值来自父镜像，代表了从该镜像启动的任何容器的基线配置。报告容器和镜像环境配置的以下命令的结果是相同的：


    ```

    docker container inspect --format ''{{range .Config.Env}}{{printf "%s\n" .}}{{end}}''
    ORCL

    docker image inspect --format ''{{range .Config.Env}}{{printf "%s\n" .}}{{end}}''
    oracle/database:19.3.0-ee

    ```


    容器从其父镜像继承环境设置。就像 RMAN 备份脚本在未被覆盖时可能设置默认值一样，数据库容器在通过 `docker run` 创建容器时，如果未提供，则会为
    `ORACLE_SID` 和 `ORACLE_PDB` 分配默认值。

