    docker run -d --name ORCL oracle/database:19.3.0-ee

    ```


    Once created, its environment is static, at least from the standpoint of automation.
    I could open a session in the container and set environment variables, but they
    won’t alter the environment values in the metadata. It’s that metadata the startup
    script sees and reads each time the container starts. The only opportunity to
    change the metadata, potentially overriding defaults present in the image, is
    during container creation. (This is true for other container properties like volumes
    and networking, as we’ll see in the coming chapters.)


    A few methods pass environment variables^([^(40)](#fn40)) to the `docker run`
    command: via the command line, the host environment, or a file. Each passes a
    value to the container’s metadata, making them available to scripts (including
    startup commands) and processes.


    ## Command-Line Option


    Use the `-e` flag or its long form, the `--env` flag, followed by a single `key=value`
    pair, for example:


    ```bash

    docker run ... -e ORACLE_SID=TEST ...

    docker run ... --env ORACLE_PDB=TESTPDB1 ...

    ```


    Pass multiple values using the `-e` flag separately for each:


    ```bash

    docker run ... -e ORACLE_SID=TEST -e ORACLE_PDB=TESTPDB1 ...

    ```


    The value (the part after the equal sign) can also be a variable from the local
    environment. It’s useful for provisioning multiple containers. Listing [6-5](#514143_1_En_6_Chapter.xhtml#PC12)
    shows an example of using a `for loop` in a Linux environment for deploying multiple
    containers from a list of values—DEV, TEST, and STAGE—assigning a different database
    name to each from the loop variable.


    ```bash

    for dbname in DEV TEST STAGE

    do docker run -d --name $dbname -e ORACLE_SID=$dbname oracle/database:19.3.0-ee

    done

    ```

    *Listing 6-5. Automatically deploying three Oracle 19c database containers, passing
    the ORACLE_SID to each from the environment.*


    ## Values from a File


    Environment files are text files, with each `key=value` pair on a separate line,
    making it easier to share multiple values with `docker run`. Docker ignores lines
    starting with pound signs (`#`) as comments. Use the `--env-file` option with
    the file’s name when calling `docker run`. Listing [6-6](#514143_1_En_6_Chapter.xhtml#PC13)
    shows a sample environment file, named `db.env`, for an Oracle database, along
    with an example of using the `--env-file` option in the `docker run` command.


    ```dockerfile

    ORACLE_SID=TEST

    ORACLE_PDB=TESTPDB1

    ORACLE_EDITION=EE

    ENABLE_ARCHIVELOG=true

    ```

    *Listing 6-6. An example environment file for passing multiple key-value pairs
    to docker run.*


    Passing that file to the `--env-file` option of `docker run` populates the variables
    listed in the file into the container environment:


    ```bash

    > docker run ... --env-file db.env ...

    ```


    ## Values from the Host Environment


    There’s a particular case for sharing environment variables from the host with
    a container. If the variable exists on the host with the same name as the container,
    it’s only necessary to provide the variable name (without the equal sign or value).
    This works for both the command line and environment file options.


    In Listing [6-7](#514143_1_En_6_Chapter.xhtml#PC15), I modified the earlier loop
    example by changing the loop variable from `dbname` to `ORACLE_SID`. Because the
    container has a matching variable, I can use the variable name on its own. Docker
    interprets the variable and value for me.^([^(41)](#fn41))


    ```bash

    for ORACLE_SID in DEV TEST STAGE

    do docker run -d --name $ORACLE_SID -e ORACLE_SID oracle/database:19.3.0-ee

    done

    ```

    *Listing 6-7. Implicit variable assignment to a container using a host variable.*


    It isn’t necessary to write `ORACLE_SID=$ORACLE_SID` in this case. To use a host
    variable in an environment file, include the variable on a separate line without
    an equal sign or value. Docker reads the value from the host environment.


    # Overwriting and Creating Variables


    Assigning variables with `docker run` overwrites values from the image. Refer
    to Listings [6-3](#514143_1_En_6_Chapter.xhtml#PC5) and [6-4](#514143_1_En_6_Chapter.xhtml#PC6),
    which list variables and values the example container inherited from its parent.
    If I issue a slightly different command and create a new container, seen in Listing
    [6-8](#514143_1_En_6_Chapter.xhtml#PC16), this time changing the `ORACLE_HOME`,
    the container breaks when the startup script can’t locate the necessary files.


    ```bash

    > docker run -d -e ORACLE_HOME=/home/oracle --name OOPS oracle/database:19.3.0-ee

    1c32eb9d016e723256e47199e5801d3bcd4cc64c87099cc40057028cd0177eba

    > docker logs -f OOPS

    /opt/oracle/relinkOracleBinary.sh: line 13: /home/oracle/bin/oraversion: No such
    file or directory

    /usr/bin/ar: /home/oracle/lib/libedtn.a: No such file or directory

    ORACLE EDITION:

    touch: cannot touch ''/home/oracle/install/.docker_'': No such file or directory

    ORACLE PASSWORD FOR SYS, SYSTEM AND PDBADMIN: vXy8JX7aiE4=1

    LSNRCTL for Linux: Version 19.0.0.0.0 - Production on 11-JAN-2022 21:52:59

    Copyright (c) 1991, 2019, Oracle.  All rights reserved.

    Message 1070 not found; No message file for product=network, facility=TNS

    TNS-12545: Message 12545 not found; No message file for product=network, facility=TNS

    TNS-12560: Message 12560 not found; No message file for product=network, facility=TNS

    TNS-00515: Message 515 not found; No message file for product=network, facility=TNS

    Linux Error: 2: No such file or directory

    cat: /opt/oracle/cfgtoollogs/dbca/ORCLCDB/ORCLCDB.log: No such file or directory

    cat: /opt/oracle/cfgtoollogs/dbca/ORCLCDB.log: No such file or directory

    ```

    *Listing 6-8. Overriding the ORACLE_HOME in a container breaks things!*


    If a variable/value given in `docker run` isn’t part of the image, Docker adds
    it to the container environment (and its metadata). Instead of changing the `ORACLE_HOME`,
    Listing [6-9](#514143_1_En_6_Chapter.xhtml#PC17) shows what happens when I create
    a container, this time assigning nondefault values for `ORACLE_SID` and `ORACLE_PDB`.


    ```bash

    > docker run -d -e ORACLE_SID=ORA19C -e ORACLE_PDB=PDB1 --name ORA19C oracle/database:19.3.0-ee

    aba0514d7fb36e70777c69ca4a6b619e3fbdca1f8a13a95935fed8e48c7722c3

    > docker container inspect --format ''{{range .Config.Env}}{{printf "%s\n" .}}{{end}}''
    ORA19C | grep ORACLE

    ORACLE_BASE=/opt/oracle

    ORACLE_HOME=/opt/oracle/product/19c/dbhome_1

    ORACLE_PDB=PDB1

    ORACLE_SID=ORA19C

    > docker exec -it ORA19C bash

    [oracle@aba0514d7fb3 ~]$ env | grep ORACLE

    ORACLE_SID=ORA19C

    ORACLE_BASE=/opt/oracle

    ORACLE_PDB=PDB1

    ORACLE_HOME=/opt/oracle/product/19c/dbhome_1

    [oracle@aba0514d7fb3 ~]$ ps -ef | grep pmon

    oracle      5072       1  0 21:21 ?        00:00:00 ora_pmon_ORA19C

    ```

    *Listing 6-9. The container environment when using nondefault values for ORACLE_SID
    and ORACLE_PDB.*


    The original container didn’t have `ORACLE_SID` or `ORACLE_PDB` in its environment,
    and those variables aren’t included or assigned in the parent image. When the
    startup script, `runOracle.sh`, runs, it checks the environment and assigns a
    default value if they aren’t set. `docker run` added the new variables and values
    to the container in the newly created container. `docker inspect` shows them in
    the container metadata, and they’re in the `oracle` user environment. And—last
    but not least—the startup script created a database with an `ORACLE_SID` of `ORA19C`.


    `ORACLE_SID` is ubiquitous in Oracle database settings, and `ORACLE_PDB` is part
    of multitenant installations. Being common to traditional Oracle database environments,
    we can make an educated guess they’re meaningful to container environments, despite
    being absent from the predefined database image environment. But are there other,
    less obvious, or conventional values used in container environments?'
