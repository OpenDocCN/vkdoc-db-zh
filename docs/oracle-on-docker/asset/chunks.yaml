    \n## 访问容器文件\n\n假设你已经编写了一个 Dockerfile 并用它构建了一个镜像。当你运行该镜像时，出现了问题。你遵循了本章中的一些推荐方法，得以启动容器并修改了一些脚本。如何从容器中访问更改后的文件？\n\
    \n你可以将文件内容从容器的 shell 复制粘贴到本地主机上的一个文件中。我无法计算自己这样做过多少次，在某种程度上，这是一个完全合理的解决方案。\n\n\
    对于较大而不便复制粘贴的文件，请使用 Docker 的复制工具`docker cp`。它接受两个参数，从第一个（源）复制到第二个（目标）。通过添加容器名称前缀后跟冒号来标识容器中的位置：\n\
    \n```\ndocker cp my_container:/source_path/filename /destination_path/\n```\n\n\
    这将把容器“my_container”中的`/source_path/filename`复制到主机上的`/destination_path`。\n\n遗憾的是，`docker\
    \ cp`不支持通配符：\n\n```\n> docker cp ORCL:/home/oracle/* $HOME/\n错误：没有这样的容器路径：ORCL:/home/oracle/*\n\
    ```\n\n它也不复制目录内容。复制几个文件是可行的，但复制几十个可能会变得很繁琐！\n\n在故障排除期间管理多个文件，最好通过附加卷来解决。我建议将一个绑定卷映射到容器中不存在的挂载点，并将其关联到本地主机上的一个目录：\n\
    \n```\ndocker run -it \\\n-v $HOME:/debug \\\n3dc4a02582f5 bash\n```\n\n这对于将文件共享*到*容器中也很有用。大多数数据库管理员都有一套他们用得顺手的诊断脚本。预见需求并使其在容器环境中可用，对你自己会有很大帮助！"
- fmt: '## Summary


    When I was younger, I discovered a love of mathematics and logic. I remember stumbling
    on a book of logic puzzles at my library, `Aha! Insight`, by `Scientific American`
    columnist Martin Gardner. Every problem seemed to fall one piece short of having
    enough information to solve the paradox. Often, though, it turned out he gave
    too much data by including a red herring—some “fact” or random number—that I’d
    stew over until realizing (sometimes only after skimming the answers in the back)
    it was a distraction! Most of the puzzles had simple, elegant solutions that led
    to “Aha! Insight!” moments!


    I see the same patterns in troubleshooting and debugging code. All too often,
    a simple answer hides among meaningless information that confuses and clutters
    the scene. The trick is understanding how to extract data from systems and where
    to focus the search for solutions.


    The most obvious starting point is logs. In image builds, Docker relays script
    output and messages to the console, and in this chapter, you learned strategies
    for adding supplemental debugging information to existing output. Perhaps my favorite
    method, adding `DEBUG` arguments before script calls, has saved me hours. Just
    remember that it’s a potential attack vector and not something to use in production
    code!


    You also discovered ways of circumventing container startup failures by bypassing
    initialization and starting them at a shell prompt. Then, you can step through
    the automation code and (hopefully) find and fix whatever’s interfering with the
    container’s operations. The same technique, applied to intermediate images, is
    valuable for identifying hiccups in builds.


    With these approaches added to your toolkit, you’re fully prepared to confidently
    build and troubleshoot container images and reach your “Aha! Insight!” moment
    as quickly and painlessly as possible!


    Footnotes [1](#514143_1_En_15_Chapter.xhtml#Fn1_source)


    # 16. Docker Hub and Image Repositories


    Docker is an Infrastructure as Code tool, or IaC. `Dockerfile`s are the code,
    a set of instructions that direct Docker through the steps of creating (or recreating)
    images. Since Docker is platform agnostic, the same `Dockerfile` generates identical
    images on Windows, Mac, and Linux, on private machines, or in the cloud!


    There’s a caveat, though. You’ve seen how the arguments in `Dockerfile`s add flexibility
    and variety to builds. I maintain a repository with a single `Dockerfile` capable
    of building versions of Oracle from 11g through 21c and applying one or more patches
    to the final image. On its own, a `Dockerfile` is merely a template, and just
    as a Word template provides a foundation for new documents, the thought and content
    poured into each file makes it unique. And so it is with `Dockerfile`s. The supporting
    scripts and resources make a difference in the outcome.


    Database images depend heavily on third-party content—the database installation
    files and patches. It makes little sense for database administrators to tell developers,
    “Download files from Oracle, put them in the right directories, and build your
    image with this `Dockerfile` according to some instructions.” It’s faster than
    filling individual requests for database images but lacks guarantees that everyone’s
    working with the same image.


    Image repositories address this precise need. Authors run a build and produce
    an asset—the image—which they then “push” to a central image repository. Anyone
    with access to the repository can “pull” specific images, ready to use according
    to need. Without realizing it, you’ve been using a repository called `Docker Hub`
    for the exercises in this book when calling `docker run ... alpine` or writing
    and building `Dockerfile`s with `FROM` clauses referencing existing image content
    like Oracle Linux.


    The primary focus of this chapter is `Docker Hub`, but other vendors offer similar
    container registries for personal and enterprise use. Individuals and organizations
    can turn to container registry services from cloud vendors, like `Oracle Cloud
    Infrastructure`, or `OCI`, to manage and host their content.


    ## Docker Hub


    I mentioned you’ve been using `Docker Hub` this whole time. Even without signing
    in or registering an account, the nearly ten million images stored in `Docker
    Hub` are available to users! Navigate to [*https://hub.docker.com*](https://hub.docker.com),
    seen in Figure [16-1](#514143_1_En_16_Chapter.xhtml#Fig1), and click the “Explore”
    link in the upper right.


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig1_HTML.jpg)


    A screenshot of docker hub sign-up page with explore tab highlighted and labeled
    as explore the registry.


    Figure 16-1


    Click the “Explore” link from the Docker Hub home page to browse repository images


    The registry explorer, shown in Figure [16-2](#514143_1_En_16_Chapter.xhtml#Fig2),
    lists all public images and includes filtering functions on the left-hand side
    for narrowing the scope of the content. Notice that the “Trusted Content” section
    has options for Docker Official Images, Verified Publishers, and Sponsored OSS.


    ![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig2_HTML.jpg)


    A screenshot of the registry explorer lists all public images and includes filtering
    functions on the left-hand side for narrowing the scope of the content. The Trusted
    Content section has options for Docker Official Images, Verified Publishers, and
    Sponsored O S S.


    Figure 16-2


    The main screen from Docker Hub’s image repository search. Note the filter options
    at the left, particularly those for selecting only “Trusted Content”


    ### Trusted Content


    `Docker Hub` is a bit of a free for all! Registered users can upload and share
    most anything, including malicious content! Bad actors will take advantage of
    any opportunity to compromise unsuspecting users. Docker marks content as “Trusted”
    to assure those image authors are reputable and their images free of malware.
    There are levels of “trust”:


    *   **Docker Official Images** are standard solutions that make developing and
    deploying software easier. They’re typically the most popular images, scanned
    for vulnerabilities, maintained by trusted organizations actively engaged in open
    source software development, and vetted by the large community of users that consume
    the content.

    *   **Verified Publishers** are commercial partners in Docker’s ecosystem verified
    by Docker. Verified publishers are directly responsible for maintaining their
    content and often follow the same rigorous practices as official images^([^(87)](#fn87)).

    *   **Docker Sponsored Open Source Software** (`OSS` for short) are images published
    by open source projects sponsored by Docker. While these are not corporate projects,
    the content undergoes strict review for malware and vulnerabilities.


    And then, there’s everything else.'
