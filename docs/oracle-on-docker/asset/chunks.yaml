    ## 环境变量


    容器从父镜像继承默认的环境设置，包括数据库和可插拔数据库名称，通常是 `ORCLCDB` 和 `ORCLPDB1`。当容器首次运行时，启动脚本会检查是否存在数据库，如果不存在，则基于这些值创建一个。我们可以使用
    `-e` 或 `--env` 标志后跟变量-值对来覆盖默认值以自定义数据库名称。例如，`-e ORACLE_SID=TEST -e ORACLE_PDB=TESTPDB`
    覆盖了默认数据库名称，并创建一个名为 `TEST` 的数据库，其可插拔数据库名为 `TESTPDB`。


    这说明了如何使用单独的 `-e` 标志设置多个环境变量。同样的模式适用于多个端口和卷映射。


    ## 容器名称


    `--name` 标志为容器设置一个“友好”的名称。如果未指定，Docker 会生成一个随机名称，如“*quirky_elbakyan*”或“*nifty_buck*”。定义名称是一个好习惯。您无需查询
    Docker 来查找容器的名称，并且当容器具有有意义的名称时，您更有可能记住其用途。


    > **注意**

    >

    > 容器名称区分大小写。


    ### 一个完整的运行命令


    让我们使用清单 4-5 中的命令运行一个新容器。


    ```

    docker run -d --name MYDB  \

    -p 10000:1521  \

    -v $HOME/oradata/mydb/data:/opt/oracle/oradata \

    -v $HOME/oradata/mydb/diag:/opt/oracle/diag \

    -e ORACLE_SID=MYDB \

    -e ORACLE_PDB=MYPDB \

    oracle/database:19.3.0-ee

    ```


    **清单 4-5**

    一个用于基本 Oracle 数据库容器的实用 `docker run` 命令


    这里有一个我们尚未涵盖的新标志 `-d`。它告诉 Docker 将容器作为分离的后台进程运行。如果没有此标志，容器将在本地会话中以交互方式运行。退出容器会导致其停止。


    命令以 Docker 应使用的用于启动容器的镜像结束。该镜像组合了 `docker images` 报告的 `repository` 和 `tag` 字段，并用冒号连接。


    提交此命令会使 Docker 启动容器并运行镜像中嵌入的启动脚本。没有现有数据库，因此启动脚本调用 DBCA 创建一个名为 `MYDB` 的数据库，其可插拔数据库名为
    `MYPDB`。数据文件和配置被写入用户主目录下的目录中。我们可以通过本地主机上的端口 `10000` 连接到数据库监听器。


    在 Linux 系统或 Windows WSL 主机的 Linux shell 中运行此命令时，请务必首先创建必要的目录：


    ```

    sudo mkdir -p $HOME/oradata/mydb/{data,diag}

    sudo chown -R oracle:oinstall $HOME/oradata/mydb

    ```


    花括号内的值 `{data,diag}` 告诉 Linux 在 `$HOME/oradata/mydb` 下创建两个子目录。我将它们分配给容器中的两个卷。第一个映射到
    `/opt/oracle/oradata`，是数据库数据文件和配置的目标。第二个映射到 `/opt/oracle/diag`，接收数据库诊断目录。


    映射 Oracle 的诊断目录有两个好处。首先，这是一个易失性目录。如果没有卷，Oracle 会将这些文件写入容器的联合文件系统，导致其增长。容器层在 Docker
    的私有文件系统内管理。增长该文件系统可能很麻烦，因此将文件保存在容器层外部有助于防止以后出现问题。其次，将它们保存在卷上可以在容器被删除时保留它们，并且更便于查看。'
- fmt: '### View Container Logs


    Creating the database will take a few minutes. We can monitor progress in the
    container with the `docker logs` command. Follow the log activity of the `MYDB`
    container we just created using the `-f` flag:


    ```

    docker logs -f MYDB

    ```


    The initial output shows the database creation process. When complete, the startup
    scripts report that the database is ready to use, and the content switches to
    showing the contents of the alert log, as shown in Listing 4-6.


    ```

    #########################

    DATABASE IS READY TO USE!

    #########################

    Datafiles are already patched. Skipping datapatch run.

    The following output is now a tail of the alert.log:

    ORCLPDB1(3):

    ORCLPDB1(3):XDB initialized.

    2021-03-01T17:32:38.353181+00:00

    ALTER SYSTEM SET control_files=''/opt/oracle/oradata/MYDB/control01.ctl'' SCOPE=SPFILE;

    Listing 4-6

    Log output reporting database availability

    ```


    The database creation is complete! We can use the database interactively through
    the container shell and connections from host applications like SQL Developer.


    ## Access and Use the Container


    Let’s explore ways of accessing and using the database and container environment.
    We can interactively connect to the container shell, run scripts, and connect
    from remote clients using a mapped port.


    ### Access a Container Shell


    `docker exec` executes commands, interactively or in the background, in container
    environments. Start an interactive shell in the `MYDB` container we just created
    with the following command:


    ```

    docker exec --interactive --tty MYDB bash

    ```


    The `--interactive` flag instructs `docker exec` to run interactively; the `--tty`
    flag opens a TTY session. These flags have shorthand options, `-i` and `-t`, respectively,
    and can be combined into a shorter, equivalent command:


    ```

    docker exec -it MYDB bash

    ```


    Running either command executes (opens) a bash shell in the container. It may
    be helpful to think of this as `ssh`-ing into a remote server—we’re now in the
    container environment. Any commands we run are executed in the container as if
    we’d connected to a different host, until we exit the connection.


    Once connected, we’re effectively on a different machine—an Oracle database server.
    To prove that, run `sqlplus / as sysdba` at the container prompt and perform some
    queries. The result will appear much like Listing 4-7.


    ```

    [oracle@9fc6a7a36152 ~]$ sqlplus / as sysdba

    SQL*Plus: Release 19.0.0.0.0 - Production on Mon Mar 1 19:51:55 2021

    Version 19.3.0.0.0

    Copyright (c) 1982, 2019, Oracle.  All rights reserved.

    Connected to:

    Oracle Database 19c Enterprise Edition Release 19.0.0.0.0 - Production

    Version 19.3.0.0.0

    SQL> select name from v$database;

    NAME


    MYDB

    SQL>

    Listing 4-7

    Starting SQL*Plus in the database container

    ```


    To be clear, this is a fully functional Oracle database, limited only by its host
    resources. All commands in a “normal” database installation are present in the
    container database (unless removed to reduce image size).


    ### Run SQL*Plus


    `SQL*Plus`, like `bash`, is an executable and can be invoked by the `docker exec`
    command in the same way. Listing 4-8 demonstrates how to open an `SQL*Plus` session
    directly.


    ```

    > docker exec -it MYDB sqlplus / as sysdba

    SQL*Plus: Release 19.0.0.0.0 - Production on Mon Mar 1 20:09:25 2021

    Version 19.3.0.0.0

    Copyright (c) 1982, 2019, Oracle.  All rights reserved.

    Connected to:

    Oracle Database 19c Enterprise Edition Release 19.0.0.0.0 - Production

    Version 19.3.0.0.0

    SQL> select name from v$database;

    NAME


    MYDB

    SQL>

    Listing 4-8

    Execute SQL*Plus in a container

    ```


    The same pattern holds for running other commands in the container.


    ### Run Scripts


    Calling `docker exec` without the `-it` flags runs commands and reports the output.
    Listing 4-9 illustrates how to list files from a directory in the container.


    ```

    > docker exec MYDB ls /opt/oracle/oradata/MYDB

    MYPDB

    control01.ctl

    control02.ctl

    pdbseed

    redo01.log

    redo02.log

    redo03.log

    sysaux01.dbf

    system01.dbf

    temp01.dbf

    undotbs01.dbf

    users01.dbf

    Listing 4-9

    List the contents of the /opt/oracle/oradata/MYDB directory in the MYDB container

    ```


    The Oracle images include scripts for managing the database in the container environment.
    Among these is `setPassword.sh`, for changing the passwords of the `SYS`, `SYSTEM`,
    and `PDBADMIN` users. Listing 4-10 shows how to call the `setPassword.sh` script
    to update these user passwords.


    ```

    > docker exec MYDB ./setPassword.sh NewPassword1

    The Oracle base remains unchanged with value /opt/oracle

    SQL*Plus: Release 19.0.0.0.0 - Production on Mon Mar 1 20:25:55 2021

    Version 19.3.0.0.0

    Copyright (c) 1982, 2019, Oracle.  All rights reserved.

    Connected to:

    Oracle Database 19c Enterprise Edition Release 19.0.0.0.0 - Production

    Version 19.3.0.0.0

    SQL>

    User altered.

    SQL>

    User altered.

    SQL>

    Session altered.

    SQL>

    User altered.

    SQL> Disconnected from Oracle Database 19c Enterprise Edition Release 19.0.0.0.0
    - Production

    Version 19.3.0.0.0

    Listing 4-10

    Run setPassword.sh on the MYDB container to change passwords

    ```


    These examples should be enough to get you started.


    ### Connect from Host Applications


    If the container’s listener port is published, database clients on the local host
    can access the container database using these port mappings. This includes `SQL
    Developer` and `SQLcl` ([`www.oracle.com/tools/downloads/sqldev-downloads.html`](http://www.oracle.com/tools/downloads/sqldev-downloads.html)),
    `Oracle Instant Client` ([`www.oracle.com/database/technologies/instant-client.html`](http://www.oracle.com/database/technologies/instant-client.html)),
    and third-party tools like Quest Toad ([`www.quest.com/products/toad-for-oracle/software-downloads.aspx`](http://www.quest.com/products/toad-for-oracle/software-downloads.aspx)).
    The port is the only thing that’s different when connecting to databases running
    in containers. Use `localhost` when connecting to containers on the local machine
    or the IP or hostname of the system where the container is running.


    Figure 4-8 shows the database connection dialog from `SQL Developer`, with entries
    for the host, port, and service name populated for the `MYDB` database.


    ![](images/514143_1_En_4_Chapter/514143_1_En_4_Fig8_HTML.jpg)


    A screenshot of new or select database connection window displays the database
    connection dialog from S Q L Developer, with entries for the hostname, port, and
    service name populated. Localhost labeled as I P address, or hostname, port 1000
    labeled as published port, and service name M Y D B labeled as database service.


    Figure 4-8

    Adding a connection to a database running in a Docker container in SQL Developer


    If you don’t know or remember the port mapping, the `docker container ports` command
    reports this information for containers (it’s also part of the `docker ps` output):


    ```

    > docker container port MYDB

    1521/tcp -> 0.0.0.0:10000

    ```


    ## Manage the Container


    When it comes to managing the new container database, there isn’t much to do.
    Databases created from Oracle’s repository and container registry images are set
    to `NOARCHIVELOG` mode by default, so there are no archive logs to manage. There’s
    no need to stop the container or its database when shutting down or rebooting
    the host. If the host or Docker Desktop restarts, start the container once the
    system is up. The database and listener start automatically as part of the process.


    `docker start` and `docker stop` manage the state of containers:


    ```

    > docker stop MYDB

    MYDB

    > docker start MYDB

    MYDB

    ```'
