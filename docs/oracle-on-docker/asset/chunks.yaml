- fmt: "### Report Containers\n\nThis was the first Docker alias I created. Initially,\
    \ I used it to make the output of `docker ps -a` more compact and readable during\
    \ presentations and live demos:\n\n```\nalias dps='docker ps -a --format \"table\
    \ {{.Names}}\\t{{.Image}}\\t{{.Ports}}\\t{{.Status}}\"'\n```\n\nThe default output\
    \ of `docker ps` includes columns I wasn’t interested in and made the result too\
    \ wide for some displays. This alias reorders the fields, placing the human-friendly\
    \ name of each container at the left, and omits fields I don’t usually need:\n\
    \n```\n> dps\nNAMES     IMAGE                       PORTS     STATUS\nORA19C \
    \   oracle/database:19.3.0-ee             Up 13 days (healthy)\nORCL      oracle/database:19.3.0-ee\
    \             Up 2 weeks (healthy)\n```\n\n### Extended Container Information\n\
    \n`docker ps` shows port assignments but doesn’t display mounts or container size.\
    \ I need this information now and then, but not frequently enough for the `-s=true`\
    \ part to stick in my memory!\n\n```\nalias dpm='docker ps -a -s=true --no-trunc=true\
    \ --format \"table {{.Names}}\\t{{.Image}}\\t{{.Ports}}\\t{{.Size}}\\t{{.Mounts}}\\\
    t{{.Status}}\"'\n```\n\nThis command may take a few moments to run as it has to\
    \ collect the size of all containers:\n\n```\n> dpm\nNAMES     IMAGE         \
    \  PORTS      SIZE                 MOUNTS    STATUS\nORA19C    oracle/database:19.3.0-ee\
    \  5.04GB (virtual 11.7GB)  Up 13 days (healthy)\nORCL      oracle/database:19.3.0-ee\
    \  5.35GB (virtual 12GB) Up 2 weeks (healthy)\n```\n\n### Sorted List of Images\n\
    \nThe default sorting for `docker images` is by created date. If you’d rather\
    \ see them sorted by image name, try this:\n\n```\nalias images=\"docker images\
    \ | awk 'NR<2{print \\$0; next}{print \\$0 | \\\"sort\\\"}'\"\n```\n\nIt passes\
    \ the output of `docker images` through `awk` to preserve the header rows (`NR<2{\
    \ print \\$0; next }` prints rows with a row number, `RN`, less than 2), then\
    \ sorts the remaining output.\n\n### List Dangling Volumes\n\n“Dangling” volumes—those\
    \ not referenced by any containers—are potentially unused, consuming space on\
    \ the host. To find them, check the `dangling` flag of `docker volume`:\n\n```\n\
    alias dangvol='docker volume ls -f dangling=true'\n```\n\n### List Dangling Images\n\
    \nLike volumes, unused or “dangling” images may take up space in a system. Find\
    \ them with\n\n```\nalias dangimg='docker images -f dangling=true'\n```\n\n##\
    \ Functions\n\nFunctions, like aliases, make it easier to call repetitive or lengthy\
    \ commands. Aliases support fixed or passive actions, but functions are more powerful.\
    \ They’re shell scripts in their own right, can accept and process input variables,\
    \ and perform more extensive or sophisticated tasks.\n\n### Start a Container\
    \ Shell\n\nWithout question, the action I perform most in Docker is connecting\
    \ to a container. Rather than typing the full command each time:\n\n```\ndocker\
    \ exec -it  bash\n```\n\nI created this function. It takes the container name\
    \ as input and substitutes it into `docker exec` to start a shell session:\n\n\
    ```\ndbash(){\ndocker exec -it $1 bash\n}\n```\n\n### Inspect Function\n\nThe\
    \ `docker inspect` command reports metadata information for Docker objects—containers,\
    \ images, volumes, etc.—in JSON format. I typically run `docker inspect` to see\
    \ one section of its total output, which can be lengthy for images and containers.\n\
    \nLike other Docker CLI commands, `docker inspect` accepts the `--format` option,\
    \ with additional syntax for filtering out individual metadata sections. Of course,\
    \ it means you need to know how Docker identifies the section you want and remember\
    \ the expression for formatting the result.\n\nI don’t use either often enough\
    \ to commit the syntax to memory, so I created a function to do it for me!\n\n\
    I’m including this snippet to demonstrate the capabilities of functions and hopefully\
    \ spark your imagination. It’s something you can adapt to fit your needs:\n\n\
    ```\ndi() {\ncase $1 in\nenv)   docker inspect --format '{{range .Config.Env}}\
    \ {{printf \"%s\\n\" .}} {{end}}' $2 | sort ;;\nip)    docker inspect --format\
    \ '{{range.NetworkSettings.Networks}} {{.IPAddress}} {{end}}' $2 ;;\nports) docker\
    \ inspect --format '{{range $p,$i := .NetworkSettings.Ports}} {{$p}} -> {{(index\
    \ $i 0).HostPort}} {{end}}' $2 ;;\nmount) docker inspect --format '{{.Name}} {{.Options.o}}:{{.Options.device}}'\
    \ $2 ;;\n*) ;;\nesac\n}\n```\n\nCall it with\n\n```\ndi  \n```\n\nThe case statement\
    \ processes the first value, the type of inspection to perform, and calls `docker\
    \ inspect` against the object, applying the appropriate template to the output.\n\
    \nThe inspection types included here are as follows:\n\n*   `env`：Reports a container’s\
    \ environment variables\n*   `ip`：Shows the IP address of a container\n*   `ports`：Lists\
    \ all ports mapped to a container\n*   `mount`：Displays a volume’s mount option\
    \ and device name or directory\n*   `*`：Exits when there’s no matching type\n\n\
    Be sure to revisit your functions often! As you use Docker and learn more about\
    \ its capabilities, you’ll encounter new opportunities to add or build your function\
    \ library, and this last case is a great example!"
