    of preparing the sauce and hand-kneading dough from scratch. Writing custom Dockerfiles
    is covered in Chapter [13](#514143_1_En_13_Chapter.xhtml).


    *   **Database as a Service:** Cloud vendors may offer options for databases as
    a service or DBaaS. DBaaS is like ordering at a restaurant where the cloud vendor
    does the work and customers consume the results.


    Let’s begin with the most straightforward option: working from a pre-built image.


    ## Pre-built Images


    Pre-built images are the easiest way to get up and running. They’re also the most
    limited regarding version and edition availability. Oracle maintains these images
    on their own Oracle Container Registry site at [`https://container-registry.oracle.com`](https://container-registry.oracle.com).^([^(23)](#fn23))
    They are not updated frequently, and you may encounter limited functionality.


    As of this writing, the available options are


    *   Version 19.3.0.0 Enterprise Edition, Standard Edition


    *   Version 12.2.0.1 Enterprise Edition, Standard Edition 2 (SE2)


    *   Version 12.1.0.2 Enterprise Edition


    If one of these options meets your needs, go to container-registry.oracle.com
    and navigate to the Database repository. Figure [4-1](#514143_1_En_4_Chapter.xhtml#Fig1)
    shows the Oracle Container Registry and the Database repository where the pre-built
    database images reside.


    ![](images/514143_1_En_4_Chapter/514143_1_En_4_Fig1_HTML.jpg)


    A screenshot of the Oracle Container Registry and the Database repository. Database
    is labeled, database images are located under the database repository.


    Figure 4-1


    The Oracle Container Registry and Database repository


    There are separate Database repositories for Enterprise and Standard Editions
    (as well as Oracle Instant Client and RAC). Choose an edition to move on to the
    documentation and download page. For this example, I selected Enterprise Edition.
    Figure [4-2](#514143_1_En_4_Chapter.xhtml#Fig2) shows the Oracle 19c Docker Image
    Documentation.


    ![](images/514143_1_En_4_Chapter/514143_1_En_4_Fig2_HTML.jpg)


    A screenshot of the Oracle database server release 19 c Docker Image Documentation.
    Message in the right pane indicates the user accepted the license.


    Figure 4-2


    Oracle Database 19c Docker Image Documentation and download


    This page includes complete instructions for running and using the image, and
    there’s no reason to repeat them here. How to get the image to your local machine
    is not well documented!'
  trans: '

    ### Docker 命令


    Docker 命令以 `docker` 开头，后跟一个动词，例如 `run`、`build`、`exec` 或 `attach`，然后是标志、对象和选项。本教程中会用到一些命令。在使用
    Docker 时，你可能会最常使用这些命令。即使在我接触容器化技术多年之后，我所做的大部分工作仍然围绕着这些核心命令：


    -   `docker images`：显示系统上可用的镜像，包括其名称、镜像 ID、来源、大小和创建时间。

    -   `docker ps`：列出正在运行的容器，包括名称、状态、来源镜像和创建时间。容器是系统上的进程，Linux 和 Docker 都使用 `ps`
    来列出进程。添加 `-a` 标志可显示所有容器，包括正在运行和已停止的。

    -   `docker run`：根据一个镜像创建并启动一个容器。

    -   `docker start`：启动一个已存在的容器。

    -   `docker stop`：停止一个正在运行的容器。

    -   `docker logs`：显示来自容器的日志输出。对于我们即将使用的 Oracle 数据库镜像，它会显示启动操作的输出，包括首次运行容器时启动监听器、数据库和数据库配置助手的输出。之后，它会显示来自数据库警报日志的输出。

    -   `docker exec`：在容器内部执行命令。


    这些命令将在本书其他章节有更详细的解释。


    ### 镜像与容器


    一个 `镜像` 包含运行应用程序或服务所需的所有文件。一个 Oracle 数据库镜像包括其文件系统、操作系统库和可执行文件、必备软件包、设置、二进制文件和配置文件。


    `容器` 是在主机上从镜像启动的进程。可以使用同一个镜像启动许多容器，每个容器可以独立于其他容器执行工作并对其初始状态进行更改。容器可以停止和启动，其内容会在重启后持续存在。


    ### 构建与运行


    镜像是使用一组称为 `Dockerfile` 的指令来 `构建` 的。Dockerfile 是 Docker 用来收集食材（包括文件和其他镜像）并将其制备成最终镜像的配方。容器从镜像中
    `运行`。


    对于这个快速入门来说，理解这两个过程的细节并非至关重要。但认识到操作和对象之间的关系非常重要，因为本教程的一部分内容就是指导你构建一个镜像并运行一个容器。


    ### Docker 命令行


    与 Docker Desktop 的大多数交互都通过命令行进行。Windows 用户应使用 `Windows Terminal`。在 Mac 和 Linux
    环境中，请打开原生的终端应用程序。


    ### 获取镜像


    在运行数据库容器之前，我们需要一个镜像。就像烘烤披萨一样，Oracle 数据库镜像有几种选择可供使用，包括：


    -   **预构建镜像：** 这相当于冷冻披萨的选项。在预构建的镜像中，所有的准备工作都已为你完成。你只需要烘烤（或微波加热）并享受成果即可！在容器世界中，“烘烤”镜像就是运行容器。预构建镜像可能并不完全符合你的需求。它们的配置满足常见或通用需求，并且只有一家公司提供预构建镜像——Oracle。Oracle
    的预构建镜像包含数据库软件，用户必须接受许可协议才能下载它们。

    -   **从仓库构建：** 如果你想对镜像有更多控制权，可以考虑使用 `仓库`。仓库是用于构建镜像的脚本集合。这类似于用现成的饼底、一罐酱料和你自己提供的食材（包括
    Oracle 数据库软件和许可证）来组装披萨。Oracle 维护着一个优秀的仓库，不仅可以构建数据库，还能构建多种其他产品。由于仓库不包含获得许可的软件，因此组织和社区成员可以创建和共享仓库。从仓库构建会更耗时一些，但并不困难，远比从头创建镜像要简单。

    -   **从自定义 Dockerfile 或仓库构建：** 完全的控制和灵活性来自于自定义的 Dockerfile 或仓库。这相当于从头开始准备酱料和手工揉制面团来制作披萨。编写自定义
    Dockerfile 的内容将在第 13 章介绍。

    -   **数据库即服务：** 云供应商可能会提供数据库即服务或 `DBaaS` 的选项。DBaaS 类似于在餐厅点餐，云供应商负责完成所有工作，而客户则消费成果。


    让我们从最直接的选项开始：使用预构建镜像。


    #### 预构建镜像


    预构建镜像是最简单、最快捷的入门方式。但它们在版本和版本可用性方面也最受限制。Oracle 在其自己的 Oracle 容器注册表站点 `https://container-registry.oracle.com`
    上维护这些镜像。它们更新不频繁，你可能会遇到功能有限的情况。


    截至撰写本文时，可用的选项有：


    -   版本 19.3.0.0 企业版、标准版

    -   版本 12.2.0.1 企业版、标准版 2 (SE2)

    -   版本 12.1.0.2 企业版


    如果其中某个选项符合你的需求，请访问 `container-registry.oracle.com` 并导航至 `Database` 仓库。图 4-1 展示了
    Oracle 容器注册表以及存放预构建数据库镜像的 Database 仓库。


    ![](img/514143_1_En_4_Fig1_HTML.jpg)


    图 4-1: Oracle 容器注册表与 Database 仓库


    企业版和标准版有单独的数据库仓库（此外还有 Oracle Instant Client 和 RAC）。选择一个版本以进入文档和下载页面。在本例中，我选择了企业版。图
    4-2 显示了 Oracle 19c Docker 镜像的文档页面。


    ![](img/514143_1_En_4_Fig2_HTML.jpg)


    图 4-2: Oracle Database 19c Docker 镜像文档与下载


    此页面包含了运行和使用镜像的完整说明，因此没有理由在这里重复它们。不过，关于如何将镜像获取到本地机器，文档记录得并不完善！

