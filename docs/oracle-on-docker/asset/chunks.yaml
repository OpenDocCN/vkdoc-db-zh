    对 Ubuntu 镜像进行 Snyk 扫描的简略输出，显示了低危和中危漏洞。


    对于不可信的公共镜像，请避开未知或匿名贡献者，做好调研，并善用免费的扫描服务！


    ### 许可


    从 Docker Hub 下载公共镜像前还需考虑一点：许可证。Oracle 禁止用户分发其数据库内容，任何下载 Oracle 软件的人都必须同意其许可协议。任何通过公共仓库分发包含
    Oracle 数据库软件镜像的行为，都可能违反该许可证。下载此类镜像也可能让你面临风险。

