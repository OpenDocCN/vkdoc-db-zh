- fmt: '# View Environment Values


    Let’s look at the container created in the previous chapter and see what values
    are in its environment. As a reminder, I used this command:


    ```

    docker run -d --name ORCL oracle/database:19.3.0-ee

    ```


    If I log in to the container, run the `env` command, and limit the results with
    `grep` to just those including `ORACLE`, as shown in Listing 6-1, the only values
    that come up are the `ORACLE_BASE` and `ORACLE_HOME`. There’s nothing for the
    `ORACLE_SID` or `ORACLE_PDB`. Yet if I search active processes and use `grep`
    to limit the output to the Oracle database `pmon` process, a database with a SID
    of ORCLCDB is up and running.


    ```

    docker exec -it ORCL bash

    [oracle@8facfd649aa4 ~]$ env | grep ORACLE

    ORACLE_BASE=/opt/oracle

    ORACLE_HOME=/opt/oracle/product/19c/dbhome_1

    [oracle@8facfd649aa4 ~]$ ps -ef | grep pmon | grep -v grep

    oracle        88       1  0 Jan1 ?        00:00:16 ora_pmon_ORCLCDB

    ```


    **Listing 6-1**

    Environment variables for the oracle user in a default database container


    Perhaps the `env` command isn’t the right way to check the container environment.
    Starting a terminal session calls login and profile scripts for the user and shell,
    potentially altering the result. What I want is a way of seeing the same environment
    the startup script sees when the container starts. To accomplish that, I’ll use
    the `docker inspect` command to view the container metadata: ^(37)


    ```

    docker container inspect ORCL

    ```


    `docker inspect` for my container produces nearly 300 lines of JSON output and
    isn’t very user-friendly. It’s a lot to pick through just to see the environment
    settings! Fortunately, the `inspect` command (and many others) have a helpful
    `--format` option we can use to limit and structure its output. In Listing 6-2,
    I added formatting to confine the result to the environment values in the configuration
    output, `--format=''{{.Config.Env}}''`. Unfortunately, it sacrifices brevity for
    clarity. It puts everything onto a single line rather than a nice, clean list
    of variables!


    ```

    > docker container inspect --format=''{{json .Config.Env}}'' ORCL

    [PATH=/opt/oracle/product/19c/dbhome_1/bin:/opt/oracle/product/19c/dbhome_1/OPatch/:/usr/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    ORACLE_BASE=/opt/oracle ORACLE_HOME=/opt/oracle/product/19c/dbhome_1 INSTALL_DIR=/opt/install
    INSTALL_FILE_1=LINUX.X64_193000_db_home.zip INSTALL_RSP=db_inst.rsp CONFIG_RSP=dbca.rsp.tmpl
    PWD_FILE=setPassword.sh RUN_FILE=runOracle.sh START_FILE=startDB.sh CREATE_DB_FILE=createDB.sh
    SETUP_LINUX_FILE=setupLinuxEnv.sh CHECK_SPACE_FILE=checkSpace.sh CHECK_DB_FILE=checkDBStatus.sh
    USER_SCRIPTS_FILE=runUserScripts.sh INSTALL_DB_BINARIES_FILE=installDBBinaries.sh
    RELINK_BINARY_FILE=relinkOracleBinary.sh SLIMMING=true LD_LIBRARY_PATH=/opt/oracle/product/19c/dbhome_1/lib:/usr/lib
    CLASSPATH=/opt/oracle/product/19c/dbhome_1/jlib:/opt/oracle/product/19c/dbhome_1/rdbms/jlib]

    ```


    **Listing 6-2**

    Limiting the result with the `--format` option places all the output on a single
    line with no formatting


    To get more human-friendly output, I sent the result through the `jq` ^(38) utility
    to parse the JSON block into something more readable in Listing 6-3. I used additional
    formatting options in Listing 6-4 to print entries on separate lines. I like the
    formatting output from the second example. I find it more readable, but the command
    is more verbose and harder to remember than piping the result through `jq`. ^(39)


    ```

