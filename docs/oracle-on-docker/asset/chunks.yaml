- fmt: '# Creating a Database and Connecting to the Container


    Creating a database is time-consuming and resource intensive. Depending on the
    host’s capabilities, this may take a few minutes to an hour. Later in this book,
    we’ll discuss methods for bypassing database creation—even for new containers—that
    allow rapid, near-instantaneous database provisioning. For now, monitor the logs
    as Oracle creates a database until you see the message in Listing 5-2, “DATABASE
    IS READY TO USE,” indicating `DBCA` completed successfully.


    ```

    77% complete

    Executing Post Configuration Actions

    100% complete

    Database creation complete. For details check the logfiles at:

    /opt/oracle/cfgtoollogs/dbca/ORCLCDB.

    Database Information:

    Global Database Name:ORCLCDB

    System Identifier(SID):ORCLCDB

    Look at the log file "/opt/oracle/cfgtoollogs/dbca/ORCLCDB/ORCLCDB.log" for further
    details.

    ...

    #########################

    DATABASE IS READY TO USE!

    #########################

    The following output is now a tail of the alert.log:

    ORCLPDB1(3):

    ORCLPDB1(3):XDB initialized.

    Listing 5-2

    The output of docker logs shows DBCA finished, and the database is ready to use

    ```


    Great! The database is ready. Now what? It’s time to connect to the container
    and see what things look like “inside” the container!


    ## Connect to the Container


    Connecting to containers is like making `SSH` connections to remote hosts. Once
    established, we navigate the container’s operating system using familiar shell
    commands as if connected to an external machine. Commands run in the container
    don’t affect the local environment.


    We’ll connect to the container using the `docker exec` command. The `exec` in
    `docker exec` stands for execute, and the basic syntax is:


    ```

    docker exec

    ```


    The container name is the target container, and the command is any executable
    script or command present in the container. To start an interactive session in
    a container, we’ll execute a shell—in this example, `bash`:


    ```

    > docker exec -it ORCL bash

    [oracle@8facfd649aa4 ~]$

    ```


    Let’s break down this command:


    *   The `-it` flags are a shorthand way of passing multiple flags to Docker. They
    represent `--interactive` (`-i`) and `--tty` (`-t`) and are used in combination
    to keep `STDIN` open while allocating a `pseudo-TTY` or terminal-like session
    to the container. Translated, it just means you get an interactive session. (The
    order of the flags doesn’t matter. They can occur individually or combined, and
    you can mix and match long and short flags.)


    *   `ORCL` is the name of the container.


    *   `bash` is the command Docker runs in the container. `bash`, the `Bourne Again
    SHell`, is the default shell for many Linux operating systems, including Oracle
    Enterprise Linux.


    Docker responds to this with a prompt, `[oracle@8facfd649aa4 ~]$`. The default
    prompt displays the user (`oracle`), the hostname (`8facfd649aa4`), and the current
    working directory (`~`, a special shorthand character representing the user’s
    home).


    The container name is `ORCL`, so shouldn’t the hostname be `ORCL`, too? Where
    does the `8facfd649aa4` originate?


    If you open a new session on your host and look at the running containers using
    the `docker ps` command, you’ll see that the hostname, `8facfd649aa4`, is also
    the container ID:


    ```

    > docker ps

    CONTAINER ID   IMAGE                       NAMES

    8facfd649aa4   oracle/database:19.3.0-ee   ORCL

    ```


    Docker still recognizes the “friendly” container name we assigned, and we can
    use both the container ID and container name to reference the container when calling
    commands. Docker creates unique identifiers for containers and uses them as the
    hostname to avoid issues caused by user-assigned names that might violate host-naming
    conventions.


    You can log in to a container using different shells, as long they’re part of
    the image, for instance, substituting `sh` instead of `bash`:


    ```

    > docker exec -it ORCL sh

    sh-4.2$

    ```


    `docker exec` is the primary method we’ll use for connecting to and running commands
    in containers throughout this book.


    ## Navigate the Oracle Database Container


    Now that you’re connected to the database container, let’s look at the environment.
    At first glance, it doesn’t seem different than a typical database host running
    natively in Linux. Listing 5-3 shows the result of some basic commands to query
    the environment. They seem to indicate this is a Linux machine running RHEL 7.8.
    The `oracle` user is there, along with Oracle’s `PMON` process. An entry for the
    database is in the `/etc/oratab` file. Everything looks normal!


    ```

    [oracle@8facfd649aa4 ~]$ id

    uid=54321(oracle) gid=54321(oinstall) groups=54321(oinstall),54322(dba),54323(oper),54324(backupdba),54325(dgdba),54326(kmdba),54330(racdba)

    [oracle@8facfd649aa4 ~]$ cat /etc/redhat-release

    Red Hat Enterprise Linux Server release 7.8 (Maipo)

    [oracle@8facfd649aa4 ~]$ ps -ef | grep pmon | grep -v grep

    oracle      2464       1  0 22:42 ?        00:00:00 ora_pmon_ORCLCDB

    [oracle@8facfd649aa4 ~]$ egrep -v "^$|^#" /etc/oratab

    ORCLCDB:/opt/oracle/product/19c/dbhome_1:N

    Listing 5-3

    Review basic information about the container’s user, operating system, and database

    ```


    Indeed, most things seem ordinary. That’s part of the magic of containers—for
    all (or most) intents and purposes, they’re indistinguishable from full-fledged,
    native hosts. If they weren’t, we’d have to work around those differences to get
    applications—like Oracle databases—to work as expected!


    ## Container Differences


    We’ve already seen one hint of differences in containers—the hostname. Let’s look
    at this and others in greater depth.


    ### Hostname


    Listing 5-4 digs deeper into the host naming we saw earlier. After displaying
    the contents of the `/etc/hosts` file in the container, I tried (and failed) to
    change the hostname to something more user-friendly.


    ```

    [oracle@8facfd649aa4 ~]$ hostname

    8facfd649aa4

    [oracle@8facfd649aa4 ~]$ cat /etc/hosts

    127.0.0.1     localhost

    ::1     localhost ip6-localhost ip6-loopback

    fe00::0    ip6-localnet

    ff00::0     ip6-mcastprefix

    ff02::1     ip6-allnodes

    ff02::2     ip6-allrouters

    172.17.0.7     8facfd649aa4

    [oracle@8facfd649aa4 ~]$ hostname ORCL

    hostname: you must be root to change the host name

    Listing 5-4

    The oracle user can’t change the hostname

    ```


    Naturally, the `oracle` user can’t change the hostname! But it turns out `root`
    can’t change the hostname in a container, as shown in Listing 5-5. I logged in
    to the container with `docker exec`, adding the `-u` (or `--user`) flag to define
    the user as `root`. After confirming I logged in as `root`, I still couldn’t change
    the hostname. (I’ll show a workaround for this later. For now, chalk this up as
    the first of several differences to keep in mind when working in containers!)


    ```

    > docker exec -it -u root ORCL bash

    bash-4.2# whoami

    root

    bash-4.2# hostname ORCL

    hostname: you must be root to change the hostname

    Listing 5-5

    The root user can’t change the hostname, either!

    ```'
