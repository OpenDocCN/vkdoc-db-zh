    ```\ndocker run --name test -it 3dc4a02582f5 bash\n```\n\n你也可以使用`-d`标志在后台运行中间镜像：\n\
    \n```\ndocker run --name test -d 3dc4a02582f5 bash\n```\n\n运行中间镜像时，关键要记住镜像不会有内置指令。如果不为容器提供要执行的操作（如打开\
