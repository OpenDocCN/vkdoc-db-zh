- fmt: '### Copy from Images and Build Stages


    Docker takes a very modular approach to building infrastructure. From layers in
    containers and images to images themselves, there’s a tendency toward reusability,
    extending to the `COPY` instruction. Besides files on the local host, the source
    of a `COPY` instruction can be files and directories in existing images—including
    the aliased images created by build stages.


    To copy from existing images, use the `--from=<IMAGE NAME>` option as in this
    example from an Oracle Dockerfile:

    ```

    COPY --chown=oracle:dba --from=builder $ORACLE_BASE $ORACLE_BASE

    ```


    Revisiting the cake recipe:


    *Step 3. Retrieve the bowl of dry ingredients from Step 1 and fold in the wet
    ingredients from Step 2.*


    In the preceding command, the entire `$ORACLE_BASE` directory is copied from an
    image called `builder`—part of a multistage build—to the `$ORACLE_BASE` directory
    in the target image, with directory ownership set to `oracle:dba`. On the surface,
    this might appear wasteful or redundant. The `builder` stage is part of the same
    build, and we can rightly assume the `$ORACLE_BASE` directory already exists.
    Copying it from one place to another isn’t changing anything in the directory,
    so why make an effort?


    We’ll cover this further in the following two chapters, but briefly, the reason
    behind this is (again) image size and layers. The stage, `builder`, where the
    `$ORACLE_BASE` is created, includes installation media and scripts that aren’t
    needed in the final database image. Remember earlier where we looked for the files
    and directories listed as environment variables beginning `INSTALL`? Those are
    all created in the `builder` stage, in directories outside the `ORACLE_BASE`.
    The stage creates the `ORACLE_BASE` directory, which includes the database software
    and inventory.^([^(67)](#fn67))


    The other steps involved in the software installation are creating and modifying
    files elsewhere in the image. In a “normal” environment, we’d simply delete the
    files we no longer needed. But in overlay filesystems, deleting files doesn’t
    delete them. It just adds an opaque layer to hide what’s below. The original file
    is still there. It still takes up space.


    To get around this, we copy files into the `builder` stage and perform the installation,
    then copy only what we need—the `ORACLE_BASE`—into a new, pristine image!


    Copying from existing images has other applications for Oracle databases, including
    patching and database upgrades.


    #### Patching


    Oracle’s quarterly database patches are `cumulative`. Patches for a new version
    are valid for any prior edition. If I’m patching a 19c database with the 19.15
    Release Update (RU) patch, all the following paths *should* result in the same
    outcome:


    - Base database version 19.3; apply 19.15 RU

    - Base database version 19.3; apply 19.14 RU; apply 19.15 RU

    - Base database version 19.3; apply 19.7 RU; apply 19.14 RU; apply 19.15 RU

    - Base database version 19.3; apply 19.7 RU; apply 19.10 RU; rollback to 19.7
    RU; apply 19.14 RU; apply 19.15 RU


    While they *should* all work the same, I’ll wager the first is least likely to
    encounter problems and reflects the construct in Figure [12-3](#514143_1_En_12_Chapter.xhtml#Fig3).
    It’s one patch. Chances are good it’s a well-tested, if not the *most tested,*
    path. The others introduce complexity and, with it, uncertainty. How many times
    do you suppose Oracle tested the last scenario? What’s the likelihood that others
    have taken the same steps, discovered issues, and reported them to Oracle? Now
    think of the different database features, options, and configurations unique to
    your environment that might complicate testing and validation. Multiply this by
    every possible Release Update. Wouldn’t you rather upgrade from 19.3 every time?


    These scenarios all have one thing in common: they begin with a base version.
    One Docker image—a `reference` or `gold` image—built with a 19.3 database home
    supports any 19c patch using the simplest, easiest, and presumably safest path:

    ```

    COPY --chown=oracle:dba --from=oracle/database:19.3.0-ee $ORACLE_BASE $ORACLE_BASE

    COPY --chown=oracle:dba  /opt/install

    ```

    The only difference is the patch ID. The process and `opatch` command are the
    same. One automated process that takes the patch ID as a parameter handles any
    patch. The final images, one for each Release Update, are reference images in
    their own right.^([^(68)](#fn68))


    #### Database Upgrades


    Database upgrades require two database homes: one for the source and another for
    the target. You could write a Dockerfile to install source and target database
    homes from scratch or copy the already-configured homes from existing database
    images. For an upgrade from 12.2.0.1 to 19.3.0:

    ```

    ENV ORACLE_19C_HOME=$ORACLE_BASE/product/19c/dbhome_1

    COPY --chown=oracle:dba --from=oracle/database:12.2.0.1-ee $ORACLE_BASE     $ORACLE_BASE

    COPY --chown=oracle:dba --from=oracle/database:19.3.0-ee   $ORACLE_19C_HOME $ORACLE_19C_HOME

    ```

    Pay attention to the files being copied and the values of environment variables!
    The first `COPY` adds the entire source database installation at the `$ORACLE_BASE`,
    which includes the database inventory—the second copies only the contents of the
    new 19c database home to a new target location. Using `ORACLE_BASE` overwrites
    files and directories under the 12c structure with the same name, and `ORACLE_HOME`
    replaces the 12c database home.^([^(69)](#fn69))


    ## RUN


    The `RUN` instruction is where the real work of building images takes place. I’m
    concentrating on its applications for building database images: running commands,
    executing scripts, and calling secrets.


    ### Running Commands and Scripts


    `RUN` calls scripts and shell commands just as you would at an ordinary command
    prompt. And as with many instructions covered so far, `RUN` can include multiple
    commands and span more than one line, using two ampersands, `&&`, as a logical
    connection between each instruction and the backslash, `\`, to continue a line.
    Reaching once more into Oracle’s 19c Dockerfile, the following snippet copies
    files into the image, makes all the `*.sh` scripts in the `$INSTALL_DIR` executable,
    and runs two scripts:

    ```

    COPY $SETUP_LINUX_FILE $CHECK_SPACE_FILE $INSTALL_DIR/

    RUN chmod ug+x $INSTALL_DIR/*.sh && \

    $INSTALL_DIR/$CHECK_SPACE_FILE && \

    $INSTALL_DIR/$SETUP_LINUX_FILE

    ```

    Stringing commands together in a single `RUN` consolidates them into one layer,
    producing smaller, more efficient images.'
  raw: '### Copy from Images and Build Stages


