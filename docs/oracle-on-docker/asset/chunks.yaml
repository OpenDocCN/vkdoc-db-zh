  trans: '

    ## 卷


    在第 3 章中，你学习了容器如何使用联合文件系统来存储本地数据。联合文件系统允许从同一镜像启动的多个容器使用相同的文件。两个容器不会占用两倍空间，因为两者共享原始镜像。这就是为什么容器启动如此迅速，并且每个容器的行为都相同。创建容器并不会复制或更改镜像的内容。每个容器都使用（并重用）来自镜像本身的目录结构！


    镜像提供了联合文件系统的下层。在它“之上”的一层保存了在每个容器中所做的更改。通过“向下”查看这些层，每个容器要么看到下层（即镜像）中未更改的文件，要么看到保存在上层的本地更改。（请回顾第
    3 章中关于层和联合文件系统的讨论。）


    这种安排对于写入数据不多的短生命周期应用非常有效。在生命周期更长的更持久系统上——比如数据库——容器中的活动可能会显著增加各个容器的层。图 5-2 显示了
    Oracle 数据库容器的情况。左侧的图显示了启动两个数据库容器后的系统状态。Docker 添加了专用于每个容器的层。它们位于镜像之上，最初是空的。但很快，Oracle
    开始在容器中创建数据库。在此步骤中添加的数据文件不是镜像的一部分，因此它们被写入容器的层中。（即使它们原本在镜像中，容器层也会捕获对镜像文件的更改。）右侧的图显示了容器层如何增长以容纳额外的内容。


    ![](img/514143_1_En_5_Fig2_HTML.png)


    两个数据库容器的示意图。左侧容器在数据库创建前有 2 个空层，右侧容器在数据库创建后层被填满。


    图 5-2


    运行两个数据库容器的主机表示。左侧的图像代表容器刚启动时的情况。这些层是空的。右侧的图像显示了数据库创建完成后的结果。层大幅增长以容纳在数据库配置期间添加和更改的文件。


    这并非理想情况，原因有几个。计算联合文件系统上层和下层之间的差异会加载主机 CPU。数据库也受到限制——容器层位于主机文件系统上，该系统可能不够大，无法容纳不断增长的数据库，或者不够快，无法满足数据库的性能要求。


    在容器层中保存数据还有另一个缺点：持久性。分配给容器的上层就是容器本身。删除容器会移除该层——随之消失的还有数据库！


    幸运的是，Docker 提供了一种称为卷的解决方案。容器卷将容器内的目录分配给本地主机上分层文件系统之外的存储。当容器将数据保存到挂载目录时，实际上是在将其写入本地主机上的持久存储。


    图 5-3 显示了相同的数据库容器，现在为 `/opt/oracle/oradata` 目录使用卷。现在，写入此目录的容器操作将保存到主机文件系统，而不是容器层。容器内的所有其他目录的行为与之前相同。


    ![](img/514143_1_En_5_Fig3_HTML.jpg)


    数据库容器的示意图。它展示了两个容器层中内容的卷。


    图 5-3


    数据库容器使用卷将 `/opt/oracle/oradata` 目录的内容存储到本地文件系统


    删除容器会移除上层和工作层，并随之移除它们保存的所有更改。一旦层消失，就无法恢复或重新创建。卷独立于容器，删除其父容器时不受影响。卷也可以像网络文件系统一样工作，在容器和主机之间甚至在容器之间共享文件。它们也可以利用高性能存储来存放数据。


    这让我们回到 `oradata` 目录以及 Oracle 数据库配置文件位置背后的谜团。


    将 `oradata` 目录挂载为卷，使 Oracle 的易失性数据文件脱离联合文件系统，避免了性能损失。但配置文件的更改频率不足以影响性能。还有另一种解释。


    当数据库容器首次启动时，会检查是否存在数据库，如图 5-4 所示。如果检查发现数据库，接下来它会在 `dbconfig` 目录中查找，将其找到的配置文件链接到预期位置，然后启动数据库。否则，它会创建一个新的数据库。完成后，它会将配置文件复制到
    `dbconfig` 目录，并用指向这些副本的链接替换它们通常位置上的文件。


    ![](img/514143_1_En_5_Fig4_HTML.jpg)


    一个流程图，从容器启动开始。如果数据库存在，则链接文件并启动数据库；如果不存在，则运行 D B C A，创建数据库，移动配置文件，并用链接替换它们。


    图 5-4


    启动 Oracle 数据库容器时执行的操作。无论数据库是旧的还是新的，它都会将配置文件保存在 `dbconfig` 目录中


    使用卷时，`/opt/oracle/oradata` 目录中的数据被写入本地主机。位于 `ORACLE_BASE` 和 `ORACLE_HOME` 下的配置文件、`/etc/oratab`
    文件以及数据库清单——保存在容器的临时层中——在删除容器时会丢失。在这种情况下，它删除的是指向这些文件的*链接*^(³³)，而不是文件本身。数据库配置文件安全地保存在卷上，如图
    5-5 所示。


    ![](img/514143_1_En_5_Fig5_HTML.jpg)


    数据库配置文件位置的示意图。左侧的容器层有指向文件的链接，右侧挂载的卷存储实际的配置文件。


    图 5-5


    容器中 ORACLE_HOME 下的数据库配置文件并非物理存在。它们是指向 `/opt/oracle/oradata/dbconfig` 下文件的链接。


    该卷是重建数据库所需一切的快照。当我删除容器时，卷会保留下来。当我启动一个新容器并将其 `oradata` 卷映射到先前容器留下的目录时，会发生什么？^(³⁴)


    启动脚本检查是否存在数据库，并且——尽管它是全新的——*它发现了来自现有数据库的文件*！^(³⁵) 容器不知道这些文件来自一个现已删除的容器。它只看到数据库所需的文件。它没有创建新数据库，而是启动了它发现的那个。


    每次启动脚本运行时，它都会检查是否存在数据库，如果发现，则在必要时重新创建链接，从其预期位置指向 `/opt/oracle/oradata/dbconfig/$ORACLE_SID`
    目录中的文件。

    '
- fmt: 'We can leverage this feature to provision database clones very quickly. Nothing
    ties data on a volume to a specific container. Taking a copy of an existing `oradata`
    directory and using it in a new container lets Oracle skip the database creation
    process entirely! Provided the `ORACLE_SID` and other database-specific environment
    variables passed during container creation match the values used in the database
    on the volume, the contents of the `oradata` volume can be used to clone the database
    on the same system, copy data to different machines, and even share them across
    host operating systems—without modification!


    The real power of volumes comes when troubleshooting issues and practicing or
    refining complex procedures. I was recently on a screen-sharing session with Oracle
    Support to diagnose an issue happening deep in a database upgrade. After demonstrating
    the problem, they suggested changing a configuration, then rerunning the upgrade.
    The analysts expected it to take a few hours for me to restore the database to
    its pre-upgrade state and rerun the process. However, since I was working in a
    container and had a copy of the database from just before the failure, it only
    took a few minutes to stop the container, restore a copy of the snapshot, and
    restart the container!


    Volumes are a unique and powerful feature exclusive to databases running in containers.
    Restoring and cloning databases in Docker doesn’t require a DBA or knowledge of
    `RMAN`. It’s a straightforward directory copy. Treating data as a self-contained
    set of files on a volume, separate from the database software in the container,
    transforms the way development teams work. Treating data as a freestanding asset
    means organizations can version and share data with little or no dependency on
    specialized database skills.


    ## Summary


    Different isn’t good or bad. It’s just different. It’s how we embrace “different”
    that matters. That may be as simple as picking something new from the menu or
    opening yourself to the possibilities introduced by technological evolution!


    In this chapter, you learned the basic commands for starting a container and monitoring
    activity and how to connect to and navigate a database container. Once logged
    in to the container system, you explored some distinctions that set containers
    apart from traditional systems, including the absence of certain binaries and
    features, like `cron`. Remember that containers are not the comprehensive environments
    we’re accustomed to and may force us to rethink how we accomplish specific tasks.
    These differences aren’t without reward, however. Using minimal or slimmed-down
    filesystems improves performance and reduces containers’ attack surface.


    You also discovered how to use volumes to persist data outside the container,
    where it’s independent of the container’s lifecycle. Volumes also make durable,
    high-performance, network-attached storage accessible to databases hosted in containers.


    Perhaps the most vital concept from this chapter is Oracle’s method for relocating
    the database configuration files used in container databases. Saving these files
    to a volume, alongside the database’s control, data, and redo log files, separates
    the database software from the database itself. These distinct boundaries are
    crucial to managing each component independently. Organizations running containerized
    databases can manage data as a versioned, portable asset, integrate data into
    DevOps processes, and accelerate development lifecycles.


    With an enhanced appreciation for some of Docker’s internals, you’re ready to
    move on to the next chapter and begin customizing containers!


