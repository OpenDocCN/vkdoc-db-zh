    ```

    ---> f33a827c1bc8

    Step 6/24 : ENV PATH=$ORACLE_HOME/bin:$ORACLE_HOME/OPatch/:/usr/sbin:$PATH     LD_LIBRARY_PATH=$ORACLE_HOME/lib:/usr/lib     CLASSPATH=$ORACLE_HOME/jlib:$ORACLE_HOME/rdbms/jlib

    ---> Running in d64a3700b791

    Removing intermediate container d64a3700b791

    ---> bb272db209e2

    Step 7/24 : COPY $SETUP_LINUX_FILE $CHECK_SPACE_FILE $INSTALL_DIR/

    ---> 18dc49d4a53b

    Step 8/24 : COPY $RUN_FILE $START_FILE $CREATE_DB_FILE $CREATE_OBSERVER_FILE $CONFIG_RSP
    $PWD_FILE $CHECK_DB_FILE $USER_SCRIPTS_FILE $RELINK_BINARY_FILE $CONFIG_TCPS_FILE
    $ORACLE_BASE/

    ---> 183467ad6373

    Step 9/24 : RUN chmod ug+x $INSTALL_DIR/*.sh &&     sync &&     $INSTALL_DIR/$CHECK_SPACE_FILE
    &&     $INSTALL_DIR/$SETUP_LINUX_FILE &&     rm -rf $INSTALL_DIR

    ---> Running in 5367f8d86861

    Listing 15-1

    A portion of the output generated while building an Oracle database image. Note
    the ID values identified with “--->,” the step tracking, and the list of commands
    executed in each step

    ```


    构建过程中的这份 `进度输出` 应该是查找故障原因线索的首选之地。这份输出并无特殊之处，与您手动执行命令所看到的输出别无二致。这使得我们可以运用与“常规”系统中类似的技巧。


    如果日志输出没有显示任何明显问题，下一步就是添加输出，以报告诊断情况所需的信息和详细内容。


    ### 回显信息


    清单 15-1 中展示的第 9 步运行了一系列命令：


    ```

    RUN chmod ug+x $INSTALL_DIR/*.sh &&     sync &&     $INSTALL_DIR/$CHECK_SPACE_FILE
    &&     $INSTALL_DIR/$SETUP_LINUX_FILE &&     rm -rf $INSTALL_DIR

    ```


    这些命令对应于 Dockerfile 中的一个 `RUN` 代码块：


    ```

    RUN chmod ug+x $INSTALL_DIR/*.sh && \

    sync && \

    $INSTALL_DIR/$INSTALL_DB_BINARIES_FILE $DB_EDITION

    ```


    如果此代码块中的一个或多个变量设置错误，我通过查看输出是无法得知的。所有内容都引用了环境变量。但是，我可以向此代码块添加命令，在构建输出中显示变量设置：


    ```

    RUN echo "INSTALL_DIR = $INSTALL_DIR" && \

    echo "INSTALL_DB_BINARIES_FILE = $INSTALL_DB_BINARIES_FILE" && \

    echo "DB_EDITION = $DB_EDITION" && \

    chmod ug+x $INSTALL_DIR/*.sh && \

    sync && \

    $INSTALL_DIR/$INSTALL_DB_BINARIES_FILE $DB_EDITION

    ```


    当我重新运行构建时，我会看到这些值被打印到构建输出中：


    ```

    Step 9/24 : RUN echo "INSTALL_DIR = $INSTALL_DIR" && echo "INSTALL_DB_BINARIES_FILE
    = $INSTALL_DB_BINARIES_FILE" && echo "DB_EDITION = $DB_EDITION" && chmod ug+x
    $INSTALL_DIR/*.sh && sync && $INSTALL_DIR/$CHECK_SPACE_FILE && $INSTALL_DIR/$SETUP_LINUX_FILE
    && rm -rf $INSTALL_DIR

    ---> Running in e5331bac34fc

    INSTALL_DIR = /opt/install

    INSTALL_DB_BINARIES_FILE = installDBBinaries.sh

    DB_EDITION =

    ```


    请注意，诊断检查的位置可能会影响结果。在此示例中，我是作为 Dockerfile 中现有步骤的一部分来回显这些值的。如果我将它们添加到一个单独的 `RUN`
    代码块中，无论是在之前还是之后，它们都会在自己的容器中运行。其值可能无法反映在相关步骤中的设置。


    回显值不仅限于 Dockerfile。Docker 用来完成每个构建任务的脚本会与进程输出交互，如清单 15-2 所示，同样的技术也适用。


    ### 添加调试选项


    使用 `bash -x` 调用 bash 脚本可以启用调试输出，打印出脚本内执行的命令和参数。如果您在上一个示例的第 9 步遇到问题，并想查看数据库二进制文件安装所做一切的详细信息，您可以修改
    Dockerfile 为：


    ```

    RUN chmod ug+x $INSTALL_DIR/*.sh && \

    sync && \

    bash -x $INSTALL_DIR/$INSTALL_DB_BINARIES_FILE $DB_EDITION

    ```


    在最后一行的脚本执行前添加 `bash -x`，可以在不改变结果的情况下，增加对脚本操作的可见性。缺点在于需要在 Dockerfile 中添加和删除调试命令所需的工作量。但是，有我们的好帮手
    `ARG` 帮忙，这就不是问题了！


    在 Dockerfile 顶部添加一个新的、名为 `DEBUG` 的空参数：


    ```

    ARG DEBUG=

    ```


    然后在 Dockerfile 中执行的每个脚本前加上 `$DEBUG`：


    ```

    RUN chmod ug+x $INSTALL_DIR/*.sh && \

    sync && \

    $DEBUG $INSTALL_DIR/$INSTALL_DB_BINARIES_FILE $DB_EDITION

    ```


    在常规调用 `docker build` 时，脚本执行前会无害地替换为空的 `DEBUG` 参数。然而，向该参数传递一个值即可开启调试：


    ```

    docker build ...

    --build-arg DEBUG="bash -x" \

    ...

    ```


    这个技巧在调试容器方面还有另一个应用。记住，容器执行的是由脚本定义的服务，对于我们的数据库容器，这些活动的根源是 `runOracle.sh`。正如您在第
    6 章所发现的，`runOracle.sh` 会调用其他脚本来执行启动和创建数据库等功能。使用类似的 `$DEBUG` 变量修改这些调用，可以为容器添加运行时调试功能，如清单
    15-3 所示。


    ```

    # Start database

    $DEBUG "$ORACLE_BASE"/"$START_FILE";

    Listing 15-3

    Adding a `$DEBUG` option to the individual script executions, such as this call
    to the database startup script, enables runtime debugging in containers through
    an environment variable

    ```


    在这种情况下，`DEBUG` 变量不是在构建过程中解释的参数。它是被复制到镜像中的脚本的一部分。`DEBUG` 变量在容器中是可见的，如果未定义，则为空值。和之前一样，它不会向脚本添加任何内容，也不会改变容器的行为或功能。在
    `docker run` 命令中作为环境变量为 `DEBUG` 定义一个值即可激活调试：


    ```

    docker run ...

    -e DEBUG="bash -x" \

    ...

    ```


    **不要在生产镜像中实现此类内置调试——这简直就是命令注入**——但在开发镜像中包含它已经为我节省了无数小时。如果调试功能已经内置，就无需更新 Dockerfile
    或脚本，也无需重新构建包含调试功能的镜像了！'
- fmt: '### 查看容器日志


    当容器失败时，通常发生在启动阶段，由自动化脚本中的错误引起。对于数据库，最有可能失败的事件是新容器中的数据库创建和现有容器上的数据库启动。错误信息几乎总是可以在容器日志中看到。


    要查看容器的日志，请运行：


    ```

    docker logs <container_id_or_name>

    ```


    这会将日志的全部内容转储到命令行，通过将命令输出通过管道传递给文件阅读器（如`less`或`more`）可能更容易阅读，同时也增加了搜索能力：


    ```

    docker logs <container_id_or_name> | less

    ```


    无论容器是否正在运行，日志在Docker中都是可用的，并且由于大多数错误发生在启动后不久，你很有可能在开头几行就发现问题！


    ### 覆盖容器启动


    仅仅因为一个镜像构建成功，并不意味着它能正常工作。当容器失败或行为异常时，根本原因在于镜像。修复这些问题最终意味着在整合必要的修复后重新构建镜像。你如何、在哪里识别、开发和测试这些修复至关重要。如果你无法在容器中尝试和测试东西，你唯一的办法就是更新`Dockerfile`及其自动化脚本，然后重新构建镜像。这可能是一个耗时的循环。


    当容器在启动时失败，你可能会觉得走进了死胡同。如果你无法登录并且容器无法运行，还有任何选择吗？当然有！


    以下技术会在启动期间改变容器行为。它们本身并不是诊断构建过程问题的方法，但它们可以帮助让失败的镜像启动并运行足够长的时间，以发现损坏的地方！


    在本书的大部分内容中，我展示了如何使用`-d`标志运行容器，将它们创建为后台的分离进程：


    ```

    docker run -d ...

    ```


    你可以将其视为在后台运行数据库服务或守护进程——容器启动并准备为客户端请求提供服务。运行什么——并由此提供服务——是由`Dockerfile`中的`CMD`指令定义的。


    `docker run`读取镜像元数据并在容器中启动该命令。如果命令失败，容器通常会停止，因为它无法执行维持其服务所必需的操作。作为用户，你通常只会在启动后看到命令提示符处报告的容器名称，而没有迹象表明它已失败。直到有东西试图*消费*容器的服务时，你才会开始发现有些不对劲！


    如果`docker ps -a`显示的容器状态报告非零退出代码，那么它对`docker start`作出积极反应的可能性也不大。以分离进程运行容器会调用启动命令，但你可以通过向容器传递不同的命令（例如一个shell）在交互模式下绕过这种行为：


    ```

    docker run -it oracle/database:19.3.0-ee bash

    ```


    这看起来像是使用`docker exec`连接到容器，只是用镜像名代替了容器名。给容器一些不同的事情做，会中断启动过程。即使过了几分钟，容器中也没有数据库进程在运行：


    ```

    > docker run -it oracle/database:19.3.0-ee bash

    bash-4.2$ ps -ef | grep oracle

    oracle         1       0  0 21:07 pts/0    00:00:00 bash

    oracle       132       1  0 21:12 pts/0    00:00:00 ps -ef

    oracle       133       1  0 21:12 pts/0    00:00:00 grep oracle

    ```


    在单独的会话中检查容器日志只显示我在命令提示符下运行的命令！


    ```

    > docker logs -f adoring_colden

    bash-4.2$ ps -ef | grep oracle

    oracle         1       0  0 21:07 pts/0    00:00:00 bash

    oracle       132       1  0 21:12 pts/0    00:00:00 ps -ef

    oracle       133       1  0 21:12 pts/0    00:00:00 grep oracle

    ```


    有了一个正在运行的容器，我就可以查询环境、运行脚本，甚至逐步执行失败的启动命令。


    此示例中的容器与我的会话绑定，当我退出时，容器就会停止。然而，通常在启动时调用的命令已被`bash`替换。此后的每一次`docker start`都会如此，在容器中启动bash。从这一点出发，我可以停止和启动容器，虽然它不*做*预期的事情，但我可以通过运行“正常”的启动命令来重现故障！


    ### 中间容器


    构建中的每一步都包括运行一个容器、做一些工作，然后将容器保存为镜像以用于后续步骤。一个单一的镜像可能有几十个步骤，每个步骤都建立在最后一个步骤之上并为最终结果做出贡献。这也意味着多个层可能共同导致一个问题，使得找出损坏之处不那么直观。


    有些问题最好通过部分构建镜像来解决，构建到失败点，然后将其作为容器运行，并手动逐步执行自动化脚本。构建过程中生成的每个中间镜像都是`Dockerfile`中定义的工作目标。


    如果Docker可以运行这些镜像，我们也可以——唯一的技巧是识别要运行的正确镜像！通过了解每个时间点的系统状态和日志，以及要运行的命令清单，我们可以在与Docker在构建期间经历的相同条件下，在中间容器中手动应用和测试更改。


    ### 构建到目标阶段


    达到这种“部分”状态的一个途径是通过注释掉或删除行来修剪`Dockerfile`。对于多阶段构建，有一个更直接的内置选项：`--target`选项。在Dockerfile中定位一个命名的阶段会在该阶段完成后停止构建：


    ```

    docker build ...

    --target stage-name \

    ...

    ```


    在下面的`Dockerfile`中，我移除了除`FROM`语句之外的所有内容，突出了它的三个阶段：`base`、`builder`和一个最终的、未命名的阶段：


    ```

    FROM oraclelinux:7-slim as base


    FROM base AS builder


    FROM base


    ```


    使用`--target`，我可以告诉Docker构建通过`builder`阶段，在执行最终阶段之前停止：


    ```

    docker build \

    --target builder \

    -t builder-stage \

    -f Dockerfile .

    ```


    用一个新名称`builder-stage`标记镜像来标识它。构建完成后，以交互方式运行该镜像，启动一个bash shell：


    ```

    docker run -it builder-stage bash

    ```


    该镜像没有启动命令是不完整的，所以我们需要一种类似于用于覆盖容器中默认操作的方法，即给容器一个要运行的命令。在这里，我使用`-it`标志运行容器，这启动了一个交互式会话并打开了一个bash
    shell。'
  raw: "### View Container Logs\n\nWhen containers fail, it’s generally during the\
    \ startup phase, caused by errors in automation scripts. For databases, the events\
    \ most likely to fail are database creation in new containers and database startup\
    \ on existing ones. Error messages are nearly always visible in the container\
    \ logs.\n\nTo check the logs from a container, run\n\n```\ndocker logs \n```\n\
    \nThis dumps the entire content of the log to the command line, and it may be\
    \ easier to read by piping the command output into a file reader like `less` or\
    \ `more`, also adding search capabilities:\n\n```\ndocker logs  | less\n```\n\n\
    The logs are available in Docker whether the container is running or not, and\
    \ since most errors occur shortly after startup, there’s a good chance you’ll\
    \ spot trouble in the opening lines!\n\n## Override Container Startup\n\nJust\
    \ because an image builds successfully doesn’t mean it works. When containers\
    \ fail or misbehave, the root cause is in the image. Fixing those problems ultimately\
    \ means rebuilding the image after integrating the necessary fixes. How and where\
    \ you identify, develop, and test those fixes matters. If you can’t try and test\
    \ things in a container, your only course is updating the Dockerfile and its automation,\
    \ then rebuilding the image. That’s a potentially time-consuming cycle.\n\nIt\
    \ may feel like you’ve hit a dead end when containers fail on startup. Is there\
    \ any option if you can’t log in and the container won’t run? Absolutely!\n\n\
    The following techniques alter container behavior during startup. They’re not\
    \ methods for diagnosing problems with the build process per se, but they can\
    \ help get failing images up and running long enough to discover what’s broken!\n\
    \nThrough most of this book, I’ve shown you how to run containers using the `-d`\
    \ flag, creating them as detached processes in the background:\n\n```\ndocker\
    \ run -d ...\n```\n\nYou might think of this as running a database service or\
    \ daemon in the background—the container starts and prepares to service client\
    \ requests. What runs—and, in turn, provides the service—is defined by the `CMD`\
    \ instruction in the Dockerfile.\n\n`docker run` reads the image metadata and\
    \ kicks off that command in the container. If the command fails, the container\
    \ typically stops because it couldn’t perform the actions necessary to sustain\
    \ its service. As a user, you’ll usually only see the container name reported\
    \ at the command prompt after it starts, with no indication it’s failed. It isn’t\
    \ until something attempts to *consume* the container’s services that you begin\
    \ to see something isn’t right!\n\nIf the container status displayed by `docker\
    \ ps -a` reports a nonzero exit code, it’s unlikely to respond favorably to `docker\
    \ start`, either. Running containers as detached processes invokes the startup\
    \ command, but you can bypass this behavior by passing a different command—like\
    \ a shell—to the container in interactive mode:\n\n```\ndocker run -it oracle/database:19.3.0-ee\
    \ bash\n```\n\nThis looks like connecting to a container with `docker exec`, using\
    \ the image name instead of the container name. Giving the container something\
    \ different to do short-circuits the startup process. Even after several minutes,\
    \ no database processes are running in the container:\n\n```\n> docker run -it\
    \ oracle/database:19.3.0-ee bash\nbash-4.2$ ps -ef | grep oracle\noracle     \
    \    1       0  0 21:07 pts/0    00:00:00 bash\noracle       132       1  0 21:12\
    \ pts/0    00:00:00 ps -ef\noracle       133       1  0 21:12 pts/0    00:00:00\
    \ grep oracle\n```\n\nChecking the container logs in a separate session shows\
    \ only the commands I ran at the command prompt!\n\n```\n> docker logs -f adoring_colden\n\
    bash-4.2$ ps -ef | grep oracle\noracle         1       0  0 21:07 pts/0    00:00:00\
    \ bash\noracle       132       1  0 21:12 pts/0    00:00:00 ps -ef\noracle   \
    \    133       1  0 21:12 pts/0    00:00:00 grep oracle\n```\n\nWith a running\
    \ container, I’m positioned to query the environment, run scripts, and even step\
    \ through the failing startup commands.\n\nThe container in this example is tied\
    \ to my session, and when I exit, the container stops. However, the commands usually\
    \ called at startup are replaced by `bash`. Every future `docker start` follows\
    \ suit, starting bash in the container. From this point, I can stop and start\
    \ the container, and while it doesn’t *do* what’s expected, I can duplicate the\
    \ failure by running the “normal” startup command!\n\n## Intermediate Containers\n\
    \nEvery step in a build consists of running a container, doing some work, then\
    \ saving the container as an image to use in a subsequent step. A single image\
    \ may have dozens of steps, each building upon the last and contributing to the\
    \ outcome. It also means multiple layers can contribute to a problem, making it\
    \ less intuitive to find what’s broken.\n\nSome problems are best addressed by\
    \ building an image partially, up to the point of failure, then running it as\
    \ a container and stepping through the automation scripts manually. Every intermediate\
    \ image generated during a build is a target for work defined in the Dockerfile.\n\
    \nIf Docker can run these images, so can we—the only trick is identifying the\
    \ right image to run! With visibility of the system state and logs at each point\
    \ and an inventory of commands to run, we can apply and test changes manually\
    \ in the intermediate containers under the same conditions Docker experiences\
    \ during a build.\n\n### Build to a Target\n\nOne avenue for reaching this “partial”\
    \ state is trimming the Dockerfile down by commenting or removing lines. There’s\
    \ a more straightforward, built-in option for multistage builds: the `--target`\
    \ option. Targeting a named stage in a Dockerfile halts the build on completion\
    \ of the stage:\n\n```\ndocker build ...\n--target stage-name \\\n...\n```\n\n\
    In the following Dockerfile, I removed everything but the `FROM` statements, highlighting\
    \ its three stages: `base`, `builder`, and a final, unnamed stage:\n\n```\nFROM\
    \ oraclelinux:7-slim as base\n\nFROM base AS builder\n\nFROM base\n\n```\n\nWith\
    \ `--target`, I can tell Docker to build through the `builder` stage, stopping\
    \ before performing the final stage:\n\n```\ndocker build \\\n--target builder\
    \ \\\n-t builder-stage \\\n-f Dockerfile .\n```\n\nTagging the image with a new\
    \ name, `builder-stage`, identifies the image. After the build completes, run\
    \ the image interactively, starting a bash shell:\n\n```\ndocker run -it builder-stage\
    \ bash\n```\n\nThe image is incomplete without a startup command, so we need an\
    \ approach similar to that used to override the default operations in a container,\
    \ namely, giving the container a command to run. Here, I ran the container with\
    \ the `-it` flags, which started an interactive session and opened a bash shell."
  trans: '

    ### 查看容器日志


    当容器失败时，通常发生在启动阶段，由自动化脚本中的错误引起。对于数据库，最有可能失败的事件是新容器中的数据库创建和现有容器上的数据库启动。错误信息几乎总是可以在容器日志中看到。


    要查看容器的日志，请运行：


    ```

    docker logs <container_id_or_name>

    ```


    这会将日志的全部内容转储到命令行，通过将命令输出通过管道传递给文件阅读器（如 `less` 或 `more`）可能更容易阅读，同时也增加了搜索能力：


    ```

    docker logs <container_id_or_name> | less

    ```


    无论容器是否正在运行，日志在 Docker 中都是可用的，并且由于大多数错误发生在启动后不久，你很有可能在开头几行就发现问题！


    ### 覆盖容器启动


    仅仅因为一个镜像构建成功，并不意味着它能正常工作。当容器失败或行为异常时，根本原因在于镜像。修复这些问题最终意味着在整合必要的修复后重新构建镜像。你如何、在哪里识别、开发和测试这些修复至关重要。如果你无法在容器中尝试和测试东西，你唯一的办法就是更新
    `Dockerfile` 及其自动化脚本，然后重新构建镜像。这可能是一个耗时的循环。


    当容器在启动时失败，你可能会觉得走进了死胡同。如果你无法登录并且容器无法运行，还有任何选择吗？当然有！


    以下技术会在启动期间改变容器行为。它们本身并不是诊断构建过程问题的方法，但它们可以帮助让失败的镜像启动并运行足够长的时间，以发现损坏的地方！


    在本书的大部分内容中，我展示了如何使用 `-d` 标志运行容器，将它们创建为后台的分离进程：


    ```

    docker run -d ...

    ```


    你可以将其视为在后台运行数据库服务或守护进程——容器启动并准备为客户端请求提供服务。运行什么——并由此提供服务——是由 `Dockerfile` 中的 `CMD`
    指令定义的。


    `docker run` 读取镜像元数据并在容器中启动该命令。如果命令失败，容器通常会停止，因为它无法执行维持其服务所必需的操作。作为用户，你通常只会在启动后看到命令提示符处报告的容器名称，而没有迹象表明它已失败。直到有东西试图
    *消费* 容器的服务时，你才会开始发现有些不对劲！


    如果 `docker ps -a` 显示的容器状态报告非零退出代码，那么它对 `docker start` 作出积极反应的可能性也不大。以分离进程运行容器会调用启动命令，但你可以通过向容器传递不同的命令（例如一个
    shell）在交互模式下绕过这种行为：


    ```

    docker run -it oracle/database:19.3.0-ee bash

    ```


    这看起来像是使用 `docker exec` 连接到容器，只是用镜像名代替了容器名。给容器一些不同的事情做，会中断启动过程。即使过了几分钟，容器中也没有数据库进程在运行：


    ```

    > docker run -it oracle/database:19.3.0-ee bash

    bash-4.2$ ps -ef | grep oracle

    oracle         1       0  0 21:07 pts/0    00:00:00 bash

    oracle       132       1  0 21:12 pts/0    00:00:00 ps -ef

    oracle       133       1  0 21:12 pts/0    00:00:00 grep oracle

    ```


    在单独的会话中检查容器日志只显示我在命令提示符下运行的命令！


    ```

    > docker logs -f adoring_colden

    bash-4.2$ ps -ef | grep oracle

    oracle         1       0  0 21:07 pts/0    00:00:00 bash

    oracle       132       1  0 21:12 pts/0    00:00:00 ps -ef

    oracle       133       1  0 21:12 pts/0    00:00:00 grep oracle

    ```


    有了一个正在运行的容器，我就可以查询环境、运行脚本，甚至逐步执行失败的启动命令。


    此示例中的容器与我的会话绑定，当我退出时，容器就会停止。然而，通常在启动时调用的命令已被 `bash` 替换。此后的每一次 `docker start` 都会如此，在容器中启动
    bash。从这一点出发，我可以停止和启动容器，虽然它不 *做* 预期的事情，但我可以通过运行“正常”的启动命令来重现故障！


    ### 中间容器


    构建中的每一步都包括运行一个容器、做一些工作，然后将容器保存为镜像以用于后续步骤。一个单一的镜像可能有几十个步骤，每个步骤都建立在最后一个步骤之上并为最终结果做出贡献。这也意味着多个层可能共同导致一个问题，使得找出损坏之处不那么直观。


    有些问题最好通过部分构建镜像来解决，构建到失败点，然后将其作为容器运行，并手动逐步执行自动化脚本。构建过程中生成的每个中间镜像都是 `Dockerfile`
    中定义的工作目标。


    如果 Docker 可以运行这些镜像，我们也可以——唯一的技巧是识别要运行的正确镜像！通过了解每个时间点的系统状态和日志，以及要运行的命令清单，我们可以在与
    Docker 在构建期间经历的相同条件下，在中间容器中手动应用和测试更改。


    ### 构建到目标阶段


    达到这种“部分”状态的一个途径是通过注释掉或删除行来修剪 `Dockerfile`。对于多阶段构建，有一个更直接的内置选项：`--target` 选项。在
    Dockerfile 中定位一个命名的阶段会在该阶段完成后停止构建：


    ```

    docker build ...

    --target stage-name \

    ...

    ```


    在下面的 `Dockerfile` 中，我移除了除 `FROM` 语句之外的所有内容，突出了它的三个阶段：`base`、`builder` 和一个最终的、未命名的阶段：


    ```

    FROM oraclelinux:7-slim as base


    FROM base AS builder


    FROM base


    ```


    使用 `--target`，我可以告诉 Docker 构建通过 `builder` 阶段，在执行最终阶段之前停止：


    ```

    docker build \

    --target builder \

    -t builder-stage \

    -f Dockerfile .

    ```


    用一个新名称 `builder-stage` 标记镜像来标识它。构建完成后，以交互方式运行该镜像，启动一个 bash shell：


    ```

    docker run -it builder-stage bash

    ```


    该镜像没有启动命令是不完整的，所以我们需要一种类似于用于覆盖容器中默认操作的方法，即给容器一个要运行的命令。在这里，我使用 `-it` 标志运行容器，这启动了一个交互式会话并打开了一个
    bash shell。

