- fmt: '## Volumes


    In Chapter [3](#514143_1_En_3_Chapter.xhtml), you learned how containers use union
    filesystems to store local data. Union filesystems allow multiple containers running
    from the same image to use the same files. Two containers don’t take up twice
    the space because both share the original image. It’s why containers start so
    quickly, and every container behaves identically. Creating a container doesn’t
    copy or change the contents of the image. Every container uses (and reuses) the
    directory structure from the image itself!


    The image provides the lower layer of the union filesystem. A layer “above” that
    saves the changes made in each container. By “looking down” into the layers, each
    container sees either the unchanged files in the lower layer (the image) or the
    local changes held in the upper layer. (Refer back to the discussion in Chapter
    [3](#514143_1_En_3_Chapter.xhtml) about layers and union filesystems.)


    This arrangement works well for short-lived applications that don’t write much
    data. On more durable systems with longer lifespans—like databases—activity in
    the container may add considerably to the individual container layers. Figure
    [5-2](#514143_1_En_5_Chapter.xhtml#Fig2) shows this for an Oracle database container.
    The drawing on the left shows the system immediately after starting two database
    containers. Docker adds layers dedicated to each container. They sit atop the
    image, and, initially, they’re empty. But soon, Oracle begins creating databases
    in the containers. Datafiles added during this step aren’t part of the image,
    so they’re written into the container’s layers. (Even if they were in the image,
    the container layer would capture the changes to image files.) The drawing on
    the right shows how the container layers grew to hold the additional content.


    ![](images/514143_1_En_5_Chapter/514143_1_En_5_Fig2_HTML.png)


    An illustration of 2 database containers. The left containers contain 2 empty
    layers before the database creation and the right containers have layers filled
    to the brim after database creation.


    Figure 5-2


    Representations of a host running two database containers. The image on the left
    represents the situation immediately after the containers start. The layers are
    empty. The right-side image shows the result after database creation completes.
    The layers grew substantially to hold the files added and changed during database
    provisioning


    This isn’t an ideal situation for several reasons. Computing the differences between
    the upper and lower layers of union filesystems loads the host CPU. The database
    is limited, too—the container layers are on the host filesystem, which may not
    be large enough to accommodate a growing database nor fast enough to satisfy the
    database’s performance requirements.


    There’s another drawback to saving data in the container layer: durability. The
    upper layer assigned to the container is the container. Deleting the container
    removes the layer—and with it, the database!


    Fortunately, Docker offers a solution called a volume. Container volumes assign
    directories inside the container to storage outside the layered filesystem on
    the local host. When the container saves data to the mounted directory, it’s writing
    it to persistent storage on the local host.


    Figure [5-3](#514143_1_En_5_Chapter.xhtml#Fig3) shows the same database containers,
    now using volumes for the `/opt/oracle/oradata` directories. Now, container operations
    writing into this directory are saved to the host filesystem, not the container
    layers. All other directories inside the container behave as they did before.


    ![](images/514143_1_En_5_Chapter/514143_1_En_5_Fig3_HTML.jpg)


    An illustration of database containers. It presents the volume of the contents
    in the layers of the 2 containers.


    Figure 5-3


    Database containers use volumes to store the contents of the `/opt/oracle/oradata`
    directory to the local filesystem


    Deleting containers removes the upper and working layers and, along with them,
    all the changes they hold. Once the layer is gone, it can’t be recovered or recreated.
    Volumes are independent of the container and unaffected when deleting their parent
    container. Volumes can act like network filesystems, too, sharing files between
    the container and host and even between containers. They can take advantage of
    high-performance storage for data, too.


    This brings us back to the `oradata` directory and the mystery behind the placement
    of the Oracle database configuration files.


    Mounting the `oradata` directory as a volume keeps Oracle’s volatile datafiles
    off the union filesystem, avoiding performance penalties. But configuration files
    aren’t changed frequently enough to hamper performance. There’s another explanation.


    When database containers first start, there’s a check to see if a database exists,
    as shown in Figure [5-4](#514143_1_En_5_Chapter.xhtml#Fig4). If the review finds
    a database, it next looks in the `dbconfig` directory, links the configuration
    files it finds to their expected locations, then starts the database. Otherwise,
    it creates a new database. When it finishes, it copies the configuration files
    into the `dbconfig` directory and replaces them in their usual locations with
    links pointing to the copies.


    ![](images/514143_1_En_5_Chapter/514143_1_En_5_Fig4_HTML.jpg)


    A flowchart begins with a container startup. If a D B exists, link files and start
    the database, if not, then run D B C A, create a database, move configuration
    files, and replace them with links.


    Figure 5-4


    Actions performed when starting Oracle database containers. Whether the database
    is old or new, it saves configuration files in the `dbconfig` directory


    With volumes, the data in the `/opt/oracle/oradata` directory is written to the
    local host. Configuration files under `ORACLE_BASE` and `ORACLE_HOME`, the `/etc/oratab`
    file, and the database inventory—saved in the container’s ephemeral layers—are
    lost when dropping the container. In this case, it deletes *links*^([^(33)](#fn33))
    to those files, not the files themselves. The database configuration files are
    safely preserved on the volume, as shown in Figure [5-5](#514143_1_En_5_Chapter.xhtml#Fig5).


    ![](images/514143_1_En_5_Chapter/514143_1_En_5_Fig5_HTML.jpg)


    An illustration of the database configuration file location. The container layer
    on the left has the links to the files and the mounted volume on the right stores
    the actual configuration files.


    Figure 5-5


    The database configuration files under the ORACLE_HOME in the container aren’t
    physically there. They’re links, referencing files under `/opt/oracle/oradata/dbconfig`


    The volume is a snapshot of everything necessary for recreating the database.
    When I delete the container, the volume remains behind. What happens when I start
    a new container and map its `oradata` volume to the directory left over from the
    prior container?^([^(34)](#fn34))


    The startup script checks to see if a database exists, and—even though it’s brand
    new—*it discovers the files from the existing database*!^([^(35)](#fn35)) The
    container doesn’t know the files came from a now-deleted container. All it sees
    are the files it needs for a database. Instead of creating a new database, it
    starts the one it discovered.


    Every time the startup script runs, it checks for a database and, if found, recreates
    the links, if necessary, from their expected locations to the files in the `/opt/oracle/oradata/dbconfig/$ORACLE_SID`
    directory.'
