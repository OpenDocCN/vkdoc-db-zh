- fmt: "## Push an Image\n\n标记镜像并不会实际将其添加到仓库。如果我导航到 Docker Hub 并搜索仓库，它仍然是空的。我需要上传，或*推送*，该镜像：\n\
    \n```\ndocker push oracleondocker/database:11.2.0.4-EE\n```\n\n推送意味着一个远程注册表，我不能为此操作使用镜像\
    \ ID——我必须指定标签。该标签告诉 Docker 我希望将已标记的镜像 `11.2.0.4-EE` 上传到我的 `oracleondocker` 命名空间，并将其放置在\
    \ `database` 仓库中。Docker 报告上传进度：\n\n```\n> docker push oracleondocker/database:11.2.0.4-EE\n\
    The push refers to repository [docker.io/oracleondocker/database]\n5f70bf18a086:\
    \ Pushed\nd67ad3eaa615: Pushing [=>                                ]  40.07MB/1.094GB\n\
    fb92f0f7e7a1: Pushed\n8741e0584bcd: Pushing [>                               \
    \ ]  32.31MB/4.875GB\nb9cd4d53c8a0: Pushed\n0c7211f52f51: Pushed\n59e93d414d42:\
    \ Pushed\n4fa651f55709: Pushing [>                                ]  2.146MB/619.3MB\n\
    4d82e938e5ad: Pushed\nd7d3f0b240dc: Mounted from library/oraclelinux\n```\n\n\
    注意它在推送多个项目——正如你可能猜到的，这些是镜像层。当不同的镜像共享层时，Docker 在上传（推送）和下载（拉取）操作期间通过跳过系统上已存在的任何层来节省时间和带宽！\n\
    \n完成的 `push` 命令报告镜像的摘要，这是一个唯一标识镜像的哈希值：\n\n```\n> docker push oracleondocker/database:11.2.0.4-EE\n\
    The push refers to repository [docker.io/oracleondocker/database]\n5f70bf18a086:\
    \ Pushed\nd67ad3eaa615: Pushed\nfb92f0f7e7a1: Pushed\n8741e0584bcd: Pushed\nb9cd4d53c8a0:\
    \ Pushed\n0c7211f52f51: Pushed\n59e93d414d42: Pushed\n4fa651f55709: Pushed\n4d82e938e5ad:\
    \ Pushed\nd7d3f0b240dc: Mounted from library/oraclelinux\n11.2.0.4-EE: digest:\
    \ sha256:e94665072e69fa398181a9d852d193beee5ca3fedfe65c26c8684762b90c710f size:\
    \ 2417\n```\n\n一旦镜像被推送到注册表，它在 Docker Hub 的控制台中就可见了，如图 [16-9](#514143_1_En_16_Chapter.xhtml#Fig9)\
    \ 所示。\n\n![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig9_HTML.jpg)\n\n显示推送到注册表的镜像在\
    \ docker hub 控制台中可见的屏幕截图。\n\n**图 16-9**\n\n在成功将镜像推送到我的新账户后，该标签在在线的 Docker Hub\
    \ 控制台中可见\n\n如果我重新构建此镜像，无论是在本地还是在不同的仓库中，新版本都不会传播或替换 `oracleondocker/database:11.2.0.4-EE`\
    \ 中的镜像。哈希（和镜像 ID）元数据为镜像提供了唯一标识，这对于跟踪跨多个位置存储和共享的镜像版本非常有用。\n\n## CLI 注册表搜索\n\nDocker\
    \ 命令行界面，或 CLI，包含一个功能用于在注册表中搜索仓库和镜像：\n\n```\ndocker search \n```\n\n我发现 CLI 搜索功能有限。它默认显示\
    \ 25 个结果，可扩展到 100，并且不具备列出标签的功能。因此，除非你知道所需的标签（或者你对“最新”版本感到满意），否则它可能没有帮助。\n\n列表\
    \ [16-2](#514143_1_En_16_Chapter.xhtml#PC11) 显示了在 Docker Hub 中搜索 `oracle` 时的顶部结果。你会注意到输出按\
    \ Stars 排序，表示将该仓库标记为收藏的人数。还有一个“Official”列，正如你可能预期的，表示这是一个官方仓库。\n\n```\n> docker\
    \ search oracle\nNAME              DESCRIPTION                     STARS     OFFICIAL\
    \   AUTOMATED\noraclelinux        Official Docker builds of Oracle Linux.    \
    \      928        [OK]\noracleinanutshell/oracle-xe-11g                      \
    \            237\ngvenzl/oracle-xe  Oracle Database XE (21c, 18c, 11g) for every...\
    \   115\nListing 16-2\n搜索 Docker Hub 中包含关键字“oracle”的仓库的截断输出\n```\n\n有一些选项可用于优化搜索结果：\n\
    \n*   `is-official=true:` 设置为 *true* 仅显示官方仓库。\n*   `is-automated=true:` 仅显示自动化镜像构建。自动化构建是一项付费订阅功能，可根据源代码构建镜像，并自动推送到\
    \ Docker Hub。\n*   `stars=n:` 将结果限制为至少拥有 *n* 个星标的仓库，其中 *n* 是一个整数值。\n\n将这些选项与 `-f`\
    \ 或 `--filter` 标志配对使用。例如，要在 Docker Hub 中搜索包含 oracle 关键字的官方镜像：\n\n```\n> docker\
    \ search -f is-official=true oracle\nNAME          DESCRIPTION               \
    \     STARS     OFFICIAL   AUTOMATED\noraclelinux   Official Docker builds of\
    \ Oracle Linux.       928        [OK]\n```\n\n执行对至少拥有 100 个星标的镜像的搜索：\n\n```\n\
    > docker search -f stars=100 oracle\nNAME          DESCRIPTION               \
    \          STARS      OFFICIAL   AUTOMATED\noraclelinux   Official Docker builds\
    \ of Oracle Linux.             928        [OK]\noracleinanutshell/oracle-xe-11g\
    \                                        237\ngvenzl/oracle-xe  Oracle Database\
    \ XE (21c, 18c, 11g) for every... 115\n```\n\n使用单独的 `-f` 标志应用多个搜索条件。这里，我搜索了至少拥有\
    \ 100 个星标的官方仓库：\n\n```\n> docker search -f stars=100 -f is-official=true oracle\n\
    NAME          DESCRIPTION                     STARS    OFFICIAL   AUTOMATED\n\
    oraclelinux   Official Docker builds of Oracle Linux.       928        [OK]\n\
    ```"
  raw: "### Push an Image\n\nTagging an image doesn’t physically add it to the repository.\
    \ If I navigate to Docker Hub and search the repository, it’s still empty. I need\
    \ to upload, or *push*, the image:\n\n```\ndocker push oracleondocker/database:11.2.0.4-EE\n\
    ```\n\nPushing implies a remote registry, and I can’t use an image ID for this\
    \ operation—I have to specify the tag. The tag tells Docker I want to upload a\
    \ tagged image, `11.2.0.4-EE`, to my `oracleondocker` namespace and place it in\
    \ the `database` repository. Docker reports the upload progress:\n\n```\n> docker\
    \ push oracleondocker/database:11.2.0.4-EE\nThe push refers to repository [docker.io/oracleondocker/database]\n\
    5f70bf18a086: Pushed\nd67ad3eaa615: Pushing [=>                              \
    \  ]  40.07MB/1.094GB\nfb92f0f7e7a1: Pushed\n8741e0584bcd: Pushing [>        \
    \                        ]  32.31MB/4.875GB\nb9cd4d53c8a0: Pushed\n0c7211f52f51:\
    \ Pushed\n59e93d414d42: Pushed\n4fa651f55709: Pushing [>                     \
    \           ]  2.146MB/619.3MB\n4d82e938e5ad: Pushed\nd7d3f0b240dc: Mounted from\
    \ library/oraclelinux\n```\n\nNotice it’s pushing multiple items—as you might\
    \ have guessed, these are the image layers. When various images share layers,\
    \ Docker saves time and bandwidth during upload (push) and download (pull) actions\
    \ by skipping any layers already present on the system!\n\nThe completed `push`\
    \ command reports the image’s digest, a hash that uniquely identifies the image:\n\
    \n```\n> docker push oracleondocker/database:11.2.0.4-EE\nThe push refers to repository\
    \ [docker.io/oracleondocker/database]\n5f70bf18a086: Pushed\nd67ad3eaa615: Pushed\n\
    fb92f0f7e7a1: Pushed\n8741e0584bcd: Pushed\nb9cd4d53c8a0: Pushed\n0c7211f52f51:\
    \ Pushed\n59e93d414d42: Pushed\n4fa651f55709: Pushed\n4d82e938e5ad: Pushed\nd7d3f0b240dc:\
    \ Mounted from library/oraclelinux\n11.2.0.4-EE: digest: sha256:e94665072e69fa398181a9d852d193beee5ca3fedfe65c26c8684762b90c710f\
    \ size: 2417\n```\n\nOnce the image is pushed to the registry, it’s visible in\
    \ Docker Hub’s console, as in Figure [16-9](#514143_1_En_16_Chapter.xhtml#Fig9).\n\
    \n![](images/514143_1_En_16_Chapter/514143_1_En_16_Fig9_HTML.jpg)\n\nA screenshot\
    \ of the image visible in docker hub's console pushes to the registry.\n\nFigure\
    \ 16-9\n\nAfter successfully pushing the image to my new account, the tag is visible\
    \ in the online Docker Hub console\n\nIf I rebuilt this image, either locally\
    \ or in a different repository, the new version isn’t propagated to or replace\
    \ the image in `oracleondocker/database:11.2.0.4-EE`. The hash (and image ID)\
    \ metadata provides a unique identity for the image, useful for tracking the version\
    \ of images stored and shared across multiple locations.\n\n### CLI Registry Search\n\
    \nThe Docker command-line interface, or CLI, includes a feature for searching\
    \ repositories and images in a registry:\n\n```\ndocker search \n```\n\nI find\
    \ the CLI search capability is limited. It shows 25 results by default, extendable\
    \ to 100, and doesn’t include an ability to list tags. So, it may not be helpful\
    \ unless you know the tag you want (or you’re satisfied with the “latest” version).\n\
    \nListing [16-2](#514143_1_En_16_Chapter.xhtml#PC11) shows the top results when\
    \ searching for `oracle` in Docker Hub. You’ll notice the output is sorted by\
    \ Stars, indicating the number of people who’ve marked the repository as a favorite.\
    \ There’s also an “Official” column, which, as you might expect, indicates this\
    \ is an Official repository.\n\n```\n> docker search oracle\nNAME            \
    \  DESCRIPTION                     STARS     OFFICIAL   AUTOMATED\noraclelinux\
    \        Official Docker builds of Oracle Linux.          928        [OK]\noracleinanutshell/oracle-xe-11g\
    \                                  237\ngvenzl/oracle-xe  Oracle Database XE (21c,\
    \ 18c, 11g) for every...   115\nListing 16-2\nThe truncated output from searching\
    \ Docker Hub for repositories including the keyword “oracle”\n```\n\nThere are\
    \ options for refining search results:\n\n*   **is-official=true:** Set to *true*\
    \ shows only official repositories.\n\n*   **is-automated=true:** Shows only automated\
    \ image builds. Automated builds are a paid subscription feature that builds images\
    \ from source code, automatically pushing them to Docker Hub.\n\n*   **stars=n:**\
    \ Limit results to repositories with at least *n* stars, where *n* is an integer\
    \ value.\n\nPair these options with the `-f` or `--filter` flag. For example,\
    \ to search Docker Hub for Official images with the oracle keyword:\n\n```\n>\
    \ docker search -f is-official=true oracle\nNAME          DESCRIPTION        \
    \            STARS     OFFICIAL   AUTOMATED\noraclelinux   Official Docker builds\
    \ of Oracle Linux.       928        [OK]\n```\n\nPerform a search of images with\
    \ at least 100 stars:\n\n```\n> docker search -f stars=100 oracle\nNAME      \
    \    DESCRIPTION                         STARS      OFFICIAL   AUTOMATED\noraclelinux\
    \   Official Docker builds of Oracle Linux.             928        [OK]\noracleinanutshell/oracle-xe-11g\
    \                                        237\ngvenzl/oracle-xe  Oracle Database\
    \ XE (21c, 18c, 11g) for every... 115\n```\n\nApply multiple search criteria using\
    \ a separate `-f` flag for each. Here, I searched for Official repositories with\
    \ at least 100 stars:\n\n```\n> docker search -f stars=100 -f is-official=true\
    \ oracle\nNAME          DESCRIPTION                     STARS    OFFICIAL   AUTOMATED\n\
    oraclelinux   Official Docker builds of Oracle Linux.       928        [OK]\n\
    ```"
