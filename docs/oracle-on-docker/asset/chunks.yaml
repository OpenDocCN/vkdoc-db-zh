    No matter how it’s formatted, there’s still no `ORACLE_SID` or `ORACLE_PDB`.


    I’ll see similar results by navigating to the container details in Docker Desktop
    and selecting the Inspect tab, as in Figure 6-2. The screen lists the container’s
