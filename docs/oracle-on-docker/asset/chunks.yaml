    drwxrwxr-x 2 lab lab 4096 Mar 31 14:18 19.3.0

    -rwxrwxr-x 1 lab lab 6575 Mar 31 14:18 buildContainerImage.sh

    ```


    清单 4-3

    OracleDatabase/SingleInstance/dockerfiles 目录中的文件夹


