- fmt: '# 1. Introducing Docker and Oracle


    Over the past decade, we’ve witnessed a fundamental shift in how infrastructure
    is built, deployed, and run. The rise of reliability engineering is a response
    to systems’ increasing complexity and scale. Without its tools and methods, managing
    and monitoring the environments of hundreds or thousands of hosts and services
    is an unimaginable, impossible task.


    In traditional organizations, deploying infrastructure is a slow, manual process
    that relies on operations teams and their specialized skills. When consumers,
    like development teams, need new environments, they depend on operations teams
    to do the work. Administrators are the bottlenecks in the pipeline.


    `DevOps` is a set of practices, tools, and organizational philosophies that drive
    cooperation and collaboration between `Development` and `Operations` teams. The
    key to successful DevOps organizations is automation. Automated processes can
    be delegated to users, empowering them to provision infrastructure on demand and
    removing dependencies on operations teams.


    DevOps emphasizes quality and performance through observation and measurement.
    Responding to performance metrics is only possible when test environments accurately
    represent the observed systems. It’s far easier to reliably reproduce systems
    backed by automation than those built and managed manually.


    DevOps is much more than an organizational approach. It’s a business model affecting
    the bottom line. DevOps’ cooperative framework allows teams to deliver new features
    faster and with greater confidence, leading to competitive advantages in the marketplace.
    Monitoring application performance keeps customers happy. Tracking user behavior
    offers insight into improvements to the user experience and potentially exposes
    methods attackers use against the organization!


    Yet as `DevOps` practices are accepted and adopted in organizations, databases
    (and database administrators) remain largely unaffected. The data tier seems resistant
    to automation, configuration management, Infrastructure as Code, and version control.
    The argument I often hear is that data is too valuable to trust to these processes—and
    by association, databases. Databases are stable, persistent, and unique. They
    make up a small fraction of the enterprise, and wasting time on concepts invented
    for mass-producing dynamic components with short lifetimes doesn’t make sense.


    Yes, data is priceless. Databases are special. But databases are vessels for data.
    Bank safes are valued by how well they work. Their value doesn’t change according
    to their contents, and whether they hold the Hope Diamond or family documents
    isn’t relevant. Safes protect things, and controlled processes allow manufacturers
    to guarantee every safe resists threats and secures what’s inside, precisely as
    those tested by certifying agencies and independent labs. Adding custom or manual
    steps introduces variability and the potential for mistakes or inconsistency.


    Databases are no different. The value of data makes consistent, repeatable processes
    crucial, perhaps more so than “less important” infrastructure. Database hosts
    built and governed under configuration management can be rebuilt precisely and
    rapidly. Changes applied and tracked through version control can be reverted in
    response to performance problems and promoted from lower environments into production.
    Reliability engineering is all about `confidence`—confidence that changes made
    in test behave the same in production; issues in one environment are reproducible
    elsewhere; we can recreate any or every component in the stack at will.


    `Docker` (or, more generally, `Linux containers`^([¹](#fn1))) is a piece of the
    reliability engineering puzzle. Docker allows us to confidently build, deploy,
    and run multiple identical containers for services—applications, web hosts, monitoring,
    and even databases!


    ## Why Docker?


    One of the first questions people ask about running Oracle databases in Docker
    is “Why?” Answering this requires an objective look at how we do things now and
    asking if there are better tools or ways to accomplish the job. Then, determine
    if the new methods are compelling. How will it improve things? Is it worth the
    effort and risk to change? What is the return on investment?


    When running Oracle on Docker, we can distill these motivations into a handful
    of opportunities: simplicity, speed, portability, reliability, and cost.


    ### Simplicity


    Docker is `Infrastructure as Code`.^([²](#fn2)) Docker automates operating system
    preparation, installing and patching Oracle software, and configuring databases.
    Users don’t need to understand or remember detailed steps. Calling Docker and
    supplying optional parameters to customize the environment is all that’s required.
    Users who aren’t familiar with or comfortable installing a database no longer
    rely on a DBA to create new working environments.


    Docker presents an even broader set of possibilities for database administrators
    beyond just automating database installations. Consider the effort to set up a
    primary and standby database in `Data Guard`. At a high level:


    *   Provision the hosts


    *   Install software


    *   Configure networking


    *   Create and configure a primary database


    *   Prepare and recover the standby database


    *   Set up the broker


    *   Test and validate


    It’s a very linear and time-consuming process: set up the environments before
    building the primary; wait for the primary database to be created before restoring
    the standby; wait for the standby to come online before setting up the broker.
    The number of steps creates opportunities for missed commands and mistakes. One
    wrong or overlooked parameter early on may leave things in a questionable state
    further on.


    The expense and complexity of setting up `Data Guard` makes it something many
    DBAs do infrequently, making it challenging to get familiar with the technology.
    It’s unusual for most companies to have a `Data Guard` environment dedicated to
    testing—where operations teams can break, fix, and explore how it works.^([³](#fn3))
    In my experience, most shops that run `Data Guard` treat the systems with kid
    gloves. They’re reluctant to test it to extremes because of the effort needed
    to rebuild. That’s especially true when `Data Guard` only exists in production!


    If database teams are uncomfortable building and fixing `Data Guard`, how effective
    can they be if it breaks? Do they have practice diagnosing and addressing problems?
    Will they recognize and react to situations appropriately?


    With Docker, the effort of building test environments drops significantly and,
    with it, concerns of recreating (previously) fragile systems. Suppose staff can
    create (and rebuild) full `Data Guard` environments that mimic production topology
    in just minutes on a laptop. In that case, they have the opportunity to practice
    and perfect their skills and respond confidently in a crisis.


    Limited or inadequate testbeds aren’t limited to `Data Guard`—it applies to any
    complex environment or feature. Patch, upgrade, secure, restore—any change potentially
    tricky or time-consuming to recover from.


    It’s an odd contradiction: we’re often reluctant to practice and test activities,
    some critical to business continuity and security, for fear of breaking lower
    environments. Yet failing to do so increases risk. Procedures earn less scrutiny
    and practice. Teams are less familiar and comfortable with the process when they
    reach production.'
