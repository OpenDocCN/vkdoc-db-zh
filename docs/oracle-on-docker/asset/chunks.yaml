    \ ran. It needn’t be the *current* directory. Docker expects a path.^([^(78)](#fn78))\
    \ Substituting a directory path for the dot controls where builds run and what\
    \ files are included in the context. In the preceding command, the dot represents\
    \ a path to the build context and can be written more generally as\n\n```\ndocker\
    \ build \n```\n\nDocker looks for a file called `Dockerfile` in the `<PATH>` and\
    \ uses everything at or below the `<PATH>` as its context. To illustrate how this\
    \ works, I navigated up one level in my directory tree and reran `docker build`,\
    \ this time passing the relative directory path, `./demo`, as the context for\
    \ the build:\n\n```\n> cd ..\n> docker build ./demo\nSending build context to\
    \ Docker daemon  2.048kB\nStep 1/3 : FROM alpine\n---> 9c6f07244728\nStep 2/3\
    \ : COPY * /\n---> Using cache\n---> 1d5ae09bcac7\nStep 3/3 : CMD ls -l /\n--->\
    \ Using cache\n---> 8cf63acc1f17\nSuccessfully built 8cf63acc1f17\n```\n\nNotice\
    \ anything interesting about this result? It didn’t pull the `alpine` image and\
    \ skipped the intermediate container, yet it reports the identical layer IDs as\
    \ the original build! The “using cache” messages indicate that after passing its\
    \ context to the daemon, Docker recognized no changes were necessary, and the\
    \ layers were already in its build cache!\n\nThe `COPY` and `ADD` operations in\
    \ the Dockerfile don’t read files or directories directly from the host. They\
    \ read them from the *context* built at the outset of the build process. It’s\
    \ a subtle but essential distinction.\n\n### Select a Dockerfile\n\nWe’ve seen\
    \ that Docker looks for a file named Dockerfile in its context, the directory\
    \ where it’s running. We can override that behavior by specifying a Dockerfile\
    \ outside the build context using the `-f` flag:\n\n```\ndocker build -f  \n```\n\
    \n`docker build` expects but isn’t limited to using files named `Dockerfile`.\
    \ It’s the default, but Docker accepts different file names in the `-f` option.\n\
    \nI’ll build on the preceding example, moving the Dockerfile out of the `demo`\
    \ directory and copying my `/etc/passwd` file into the `demo` directory. This\
    \ gives Docker something to consume into its context and copy into the image:\n\
    \n```\n> mv demo/Dockerfile .\n> cp /etc/passwd ./demo\n> ls -l ./demo\n-rw-r--r--\
    \  1 seanscott  staff  7868 Aug 25 13:30 passwd\n> ls -l\n-rw-r--r--  1 seanscott\
    \  staff    34 Aug 25 10:57 Dockerfile\ndrwxr-xr-x  3 seanscott  staff    96 Aug\
    \ 25 13:31 demo\n```\n\nThe new target directory for the build is `demo`, under\
    \ my current directory. Docker needs the build path, and because there’s no Dockerfile\
    \ in the `demo` directory, my build command needs the location of the Dockerfile\
    \ via the `-f` option:\n\n```\ndocker build -f ./Dockerfile ./demo\n```\n\nNotice\
    \ a few differences in the output:\n\n```\n> docker build -f ./Dockerfile ./demo\n\
    Sending build context to Docker daemon  10.27kB\nStep 1/3 : FROM alpine\n--->\
    \ 9c6f07244728\nStep 2/3 : COPY * /\n---> 37b005627fc0\nStep 3/3 : CMD ls -l /\n\
    ---> Running in 8188378b8894\nRemoving intermediate container 8188378b8894\n--->\
    \ 70b49717401f\nSuccessfully built 70b49717401f\n```\n\nFirst, more information\
    \ was sent to the Docker daemon, thanks to the file I added to the `demo` directory.\
    \ The base image didn’t change, though, and Docker reports the same image ID,\
    \ meaning it reused the contents of its cache. However, the remaining layers are\
