- fmt: "# 10. Container Creation Quick Reference\n\nThe first part of this book covered\
    \ the essential elements of running Oracle databases in Linux containers and emphasized\
    \ the importance of the `docker run` command. Anticipating how containers will\
    \ create their databases, store data, and interact over the network prevents frustration\
    \ and saves time revising or rebuilding containers later. The preceding chapters\
    \ addressed these concepts individually, explaining the whys behind each recommendation.\n\
    \nI enjoy a summary covering how to do things when learning new technologies.\
    \ This last chapter of Part 1 is just that—a quick reference, distilling everything\
    \ covered thus far into a set of recipes and patterns for you to apply on your\
    \ container journey.\n\nThis chapter comprises four parts: creating storage and\
    \ networks, running containers, and miscellaneous commands for interacting with\
    \ containers. While not required, storage and networking are prerequisites if\
    \ you intend to persist data to the container host and take advantage of user-defined\
    \ networking as described in Chapter [9](#514143_1_En_9_Chapter.xhtml). Once created,\
    \ reference these resources during container creation.\n\n## Conventions\n\nFor\
    \ clarity, more extended commands are split across multiple lines using the Linux\
    \ continuation character, the backslash. Individual options are presented on separate\
    \ lines, too, helping each to stand out:\n\n```\ndocker run --name  \\\n-e ORACLE_SID=\
    \ \\\n...\n```\n\nExamples use the shorter flag when more than one is available,\
    \ for instance, `-e` to set an environment variable rather than `--env`. Text\
    \ between carets, `<` and `>`, identifies information to substitute according\
    \ to your requirements.\n\n## Storage\n\n### Create Volumes\n\nThere are two ways\
    \ to persist data to the container host:\n\n*   Map a directory on the host to\
    \ a path in the container.\n*   Create a dedicated object called a Docker volume.\n\
    \nThe former doesn’t require anything special, but mounting a Docker volume requires\
    \ that the volume is precreated. Directories used by bind-mounted volumes must\
    \ exist before assigning them to containers.\n\nTo create a default volume, which\
    \ will store data in Docker’s virtual machine (`/var/lib/docker`):\n\n```\ndocker\
    \ volume create \n```\n\nTo create a bind-mounted volume with a user-defined location\
    \ on the local filesystem:\n\n```\ndocker volume create --opt type=none --opt\
    \ o=bind \\\n--opt device= \\\n```\n\n### Predefined Volumes in Oracle Database\
    \ Containers\n\nThe ORADATA volume holds database configuration and datafiles\
    \ under the `/opt/oracle/oradata` directory in Oracle’s container images. Its\
    \ high-level directory structure:\n\n```\n.\n├── dbconfig\n│   └── \n├── fast_recovery_area\n\
    │   └── \n│       └── archivelog\n└── \n├── controlfile\n├── datafile\n└── onlinelog\n\
    ```\n\nThe special `dbconfig` subdirectory houses configuration files for the\
    \ database and network and where you’ll find the database’s `init.ora` and `spfile`,\
    \ the password and `oratab` files, and networking configurations, including `tnsnames.ora`\
    \ and `listener.ora`:\n\n```\n$ ls -l $ORACLE_BASE/oradata/dbconfig/$ORACLE_SID\n\
    total 24\n-rw-r--r-- 1 oracle oinstall  234 Mar  6 22:04 listener.ora\n-rw-r-----\
    \ 1 oracle oinstall 2048 Mar  6 22:15 orapwORCLCDB\n-rw-r--r-- 1 oracle oinstall\
    \  784 Mar  6 23:33 oratab\n-rw-r----- 1 oracle oinstall 3584 Mar  6 23:33 spfileORCLCDB.ora\n\
    -rw-r--r-- 1 oracle oinstall   53 Mar  6 22:04 sqlnet.ora\n-rw-r----- 1 oracle\
    \ oinstall  211 Mar  6 23:33 tnsnames.ora\n```\n\nThese files are soft-linked\
    \ from their typical locations, meaning the ORADATA volume is a self-contained\
    \ directory of everything the database needs.\n\n### Preparing Volumes for Oracle\
    \ Databases\n\nVolumes write data outside of the Docker environment and satisfy\
    \ two very similar but distinct purposes:\n\n*   Saving data to local or attached\
    \ storage\n*   Removing data from the container filesystem\n\nThe first example\
    \ relates to protecting and persisting data and configurations. In production\
    \ environments, it extends to choosing fast, durable storage that satisfies organizational\
    \ objectives for performance and availability.\n\nThe second case, at first, may\
    \ appear the same—put files someplace other than the container—but with a subtle\
    \ difference. Here, the importance is managing volatile directories externally\
    \ to the container. In Oracle databases, these are the log and audit directories.\
    \ Leaving them in the container’s filesystem places them at risk if there’s ever\
    \ a need to recreate the container, but it also contributes to growth in container\
    \ layers.\n\n## Networking\n\n### Create User-Defined Bridge Networks\n\nCertain\
    \ functionality, including DNS, is absent from the default bridge network created\
    \ by Docker on installation. User-defined bridge networks offer a more robust\
    \ feature set. To create a bridge network:\n\n```\ndocker network create  --attachable\
    \ --driver bridge\n```\n\n### Connect/Disconnect Containers to/from Networks\n\
    \nContainers may be attached to a network at any time in their lifecycle. Adding\
    \ containers without port mappings to a network allows connections from the host\
    \ using native ports. To add a container to a network:\n\n```\ndocker network\
    \ connect  \n```\n\nTo disconnect from a network:\n\n```\ndocker network disconnect\
    \  \n```\n\n### Dedicated DNS\n\nThere are multiple solutions for adding DNS resolution\
    \ to a container host, allowing clients on the host to reference containers by\
    \ container ID, container name, assigned hostname, or network alias. `dvdarias/docker-hoster`\
    \ is one such option. It reads Docker’s event service and adds or removes containers\
    \ to the host `/etc/hosts` file whenever they start or stop. To run it using the\
    \ recommended defaults:\n\n```\ndocker run -d \\\n-v /var/run/docker.sock:/tmp/docker.sock\
    \ \\\n-v /etc/hosts:/tmp/hosts \\\ndvdarias/docker-hoster\n```\n\n## Containers\n\
    \n### Basic Container Creation\n\nThe minimum command to create a database container:\n\
    \n```\ndocker run -d \n```\n\nThe `-d` flag runs the container as a background\
    \ process.\n\nThe following command snippets illustrate the use of options for\
    \ the `docker run` command.\n\n### Naming\n\nAssigning names, hostnames, and network\
    \ aliases to containers must occur during creation. Docker generates a random\
    \ container name during creation if a name isn’t specified.\n\n#### Assign a Container\
    \ Name\n\nThe container name is a human-friendly name referenced in container\
    \ commands such as `docker start`, `docker logs`, or `docker exec`. Set the container\
    \ name with the `--name` flag:\n\n```\ndocker run -d \\\n--name  \\\n...\n```\n\
    \n#### Assign a Hostname\n\nThe hostname is an optional identity separate from\
    \ the container name. If not set, the hostname defaults to the container name:\n\
    \n```\ndocker run -d \\\n--hostname  \\\n...\n```"
