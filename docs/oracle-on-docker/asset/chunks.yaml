- fmt: '## Summary


    This was a fast-start guide for getting a container with an Oracle database up
    and running. It’s a recipe, without explanations or reasons behind the “how” or
    “why.” Use it as a reference when you need to create a database quickly, to remember
    common commands, or as a refresher for building new images. And, like a recipe,
    feel free to adjust it to suit your tastes.


    Now that you’ve learned how fast and easy it is to build a database, you’re nearly
    ready to start customizing images and containers and exploring ways of leveraging
    Docker’s capabilities. The next chapter addresses essential differences you’ll
    encounter when running Oracle containers. Chapter [6](#514143_1_En_6_Chapter.xhtml)
    introduces ways of modifying the basic container we just created to suit different
    requirements.


    Footnotes [1](#514143_1_En_4_Chapter.xhtml#Fn1_source)   [2](#514143_1_En_4_Chapter.xhtml#Fn2_source)   [3](#514143_1_En_4_Chapter.xhtml#Fn3_source)   [4](#514143_1_En_4_Chapter.xhtml#Fn4_source)   [5](#514143_1_En_4_Chapter.xhtml#Fn5_source)   [6](#514143_1_En_4_Chapter.xhtml#Fn6_source)   [7](#514143_1_En_4_Chapter.xhtml#Fn7_source)   [8](#514143_1_En_4_Chapter.xhtml#Fn8_source)   [9](#514143_1_En_4_Chapter.xhtml#Fn9_source)   [10](#514143_1_En_4_Chapter.xhtml#Fn10_source)


    # 5. Differences in Database Containers


    I’m old enough to remember the days when Oracle database administrators managed
    rollback segments by hand. When Oracle introduced automatic undo retention, people
    (myself included) balked at the idea, confident that it couldn’t manage rollback
    appropriately. Years later, I can’t imagine a world without that feature!


    Database administrators have expressed skepticism toward other new features and
    advances over the years, including Recovery Manager, Automatic Shared Memory Management,
    and virtual machines. Each introduced new ways of doing things, different from
    familiar methods. Over time, our understanding and acceptance grew until these
    (and other new features) became the routine we now take for granted.


    Change isn’t easy. The mainstream rejects advances initially, often without reason
    or understanding, simply because we’re not used to them. They’re called *advances*
    for a reason, though; containers are no exception. Google, for instance, boasts
    that they run everything in containers, as shown in the screen capture from [*https://cloud.google.com/containers*](https://cloud.google.com/containers)
    in Figure [5-1](#514143_1_En_5_Chapter.xhtml#Fig1).


    ![](images/514143_1_En_5_Chapter/514143_1_En_5_Fig1_HTML.jpg)


    An image of the text is titled everything at Google runs in containers. It mentions
    how containerization has helped the development team achieve efficiency.


    Figure 5-1


    Google runs everything in containers


    Change may be uncomfortable, but it’s necessary, even vital, for organizations
    and individuals wanting to advance or improve. So far, we’ve covered basic Docker
    concepts and demonstrated how to get started building and running Oracle database
    images. These are sufficient if your intentions are limited to running a simple
    database in a local environment. In this chapter, I introduce some ways containers
    differ from traditional database platforms. Understanding these concepts is essential
    for integrating containers into your practice and adapting and customizing them
    to suit your current and future needs.


    Before we start modifying things, it’s vital to understand how environments in
    Oracle containers compare to those of “normal” databases running natively on Linux
    systems. To that end, we’ll examine default containers built from Oracle’s repository
    and explore unique aspects and features that set them apart.


    Readers already comfortable with containers but who haven’t run containerized
    Oracle databases should start here. Some concepts may be familiar, but it’s valuable
    to see how Oracle databases are adapted and implemented in containers.


    ## Start an Oracle Database Container


    We’ll begin with a basic container built from Oracle’s GitHub scripts ([`https://github.com/oracle/docker-images`](https://github.com/oracle/docker-images))
    using a very basic command:


    ```

    > docker run -d --name ORCL oracle/database:19.3.0-ee

    ```


    Let’s break down that command to understand it better:


    *   `docker run`: Instructs Docker to “run” an image


    *   `-d` flag: Informs Docker that we want to run the container *detached* (not
    interactively) in the background


    *   `--name` flag: Assigns a name, *ORCL*, to the container


    *   `oracle/database:19.3.0-ee`: Identifies the image Docker will use


    Docker responds with a unique hash value identifying the container:


    ```

    > docker run -d --name ORCL oracle/database:19.3.0-ee

    8facfd649aa4fcdbf27ae6908a573c2a16db0be7cba73c3093593507ac12b93f

    ```


    That doesn’t tell us much! The `docker logs` command reports what’s happening
    inside containers. In Listing [5-1](#514143_1_En_5_Chapter.xhtml#PC3), I ran `docker
    logs`, passing the container name along with an optional flag, `-f`, to actively
    “follow” the progress and see events as they occur. Without this flag, Docker
    would have reported only the most recent lines in the log.


    ```

    > docker logs -f ORCL

    ORACLE EDITION: ENTERPRISE

    ORACLE PASSWORD FOR SYS, SYSTEM AND PDBADMIN: 2Fy7ZqtWS9U=1

    LSNRCTL for Linux: Version 19.0.0.0.0 - Production on 06-MAR-2022 22:04:37

    Copyright (c) 1991, 2019, Oracle.  All rights reserved.

    Starting /opt/oracle/product/19c/dbhome_1/bin/tnslsnr: please wait...

    TNSLSNR for Linux: Version 19.0.0.0.0 - Production

    System parameter file is /opt/oracle/product/19c/dbhome_1/network/admin/listener.ora

    Log messages written to /opt/oracle/diag/tnslsnr/8facfd649aa4/listener/alert/log.xml

    Listening on: (DESCRIPTION=(ADDRESS=(PROTOCOL=ipc)(KEY=EXTPROC1)))

    Listening on: (DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=0.0.0.0)(PORT=1521)))

    Connecting to (DESCRIPTION=(ADDRESS=(PROTOCOL=IPC)(KEY=EXTPROC1)))

    STATUS of the LISTENER


    Alias                     LISTENER

    Version                   TNSLSNR for Linux: Version 19.0.0.0.0 - Production

    Start Date                06-MAR-2022 22:04:46

    Uptime                    0 days 0 hr. 0 min. 8 sec

    Trace Level               off

    Security                  ON: Local OS Authentication

    SNMP                      OFF

    Listener Parameter File   /opt/oracle/product/19c/dbhome_1/network/admin/listener.ora

    Listener Log File         /opt/oracle/diag/tnslsnr/8facfd649aa4/listener/alert/log.xml

    Listening Endpoints Summary...

    (DESCRIPTION=(ADDRESS=(PROTOCOL=ipc)(KEY=EXTPROC1)))

    (DESCRIPTION=(ADDRESS=(PROTOCOL=tcp)(HOST=0.0.0.0)(PORT=1521)))

    The listener supports no services

    The command completed successfully

    Prepare for db operation

    8% complete

    Copying database files

    Creating and starting Oracle instance

    32% complete

    ...

    46% complete

    Completing Database Creation

    54% complete

    Creating Pluggable Databases

    ```


    **Listing 5-1**

    Following or “tailing” a container log with the `docker logs` command. When run
    with the `-f` option, `docker logs` runs continuously—type `ctrl-c` to exit the
    log session


    The repository authors thoughtfully included extensive log output in the container
    scripts! The first two lines show the database edition (Enterprise, in this case)
    and the (randomly generated) password for privileged database accounts. Recall
    that I mentioned these are not production-ready images; this is one example—credentials
    displayed in the log output! Anyone with access to the host or container can view
    this information!


    The container next starts the listener, after which the startup scripts (discussed
    in the next chapter) check to see whether a database exists. If so, it starts
    the database. If not, it calls the Oracle *Database Configuration Assistant*,
    *DBCA*, to create a new database. This is the first time we’ve run this container,
    so `DBCA` starts building the database.'
