- fmt: '## Create a Read-Only Database Home


    Oracle Database 18c added an option to create *read-only database homes*, removing
    configuration files from the Oracle database software directory. In older versions
    of Oracle, the `ORACLE_HOME` is a mix of software and configuration. The `ORACLE_HOME/dbs`
    directory is the default location for password files and the parameter files used
    during database startup. The `ORACLE_HOME/network/admin` directory holds network
    configurations, including the `listener.ora`, `sqlnet.ora`, and `tnsnames.ora`
    files. When database homes support multiple instances, these database-specific
    files aren’t well separated and are vulnerable to being confused or overwritten
    by actions from another database. This shortcoming is evident in how Docker moves
    and copies configuration files out of the database home to a special directory
    under `/opt/oracle/oradata/dbconfig`. It’s key to cloning databases from an ordinary
    directory backup, as covered in Chapter [5](#514143_1_En_5_Chapter.xhtml).


    With the addition of the read-only homes came the need to track information about
    the home. Oracle records this in a special file called the `orabasetab`. It’s
    patterned on the `/etc/oratab` file and located at `$ORACLE_HOME/install/orabasetab`.
    In a legacy, read-write home, the contents of the file look like this:


    ```bash

    #orabasetab file is used to track Oracle Home associated with Oracle Base

    /opt/oracle/product/19c/dbhome_1:/opt/oracle:OraDB19Home1:N:

    ```


    Individual fields, separated by colons, reflect different properties of the home.
    In order:


    1.  The `ORACLE_HOME` directory, `/opt/oracle/product/19c/dbhome_1`.

    2.  The `ORACLE_BASE` used by the home, `/opt/oracle`.

    3.  The unique Oracle Home Name, assigned during installation, `OraDB19Home1`.

    4.  The read-only status of the home is indicated by `Y` or `N`.


    The fourth field in this file, set to `N`, means this home is not read-only, and
    its configuration files are in the “normal” places. The database and network configuration
    files in a read-only home move from the `ORACLE_HOME` to new locations under the
    `ORACLE_BASE`. Two new environment variables, the `ORACLE_BASE_CONFIG` and `ORACLE_BASE_HOME`,
    track these directories, and they default to


    ```bash

    ORACLE_BASE_CONFIG=$ORACLE_BASE

    ORACLE_BASE_HOME=$ORACLE_BASE/homes/

    ```


    The `HOME NAME` in the `$ORACLE_BASE_HOME` is the third field in the `orabasetab`.
    Based on the preceding example, substituting the values from the `orabasetab`
    reveals the base locations for configuration files if this was a read-only home:


    ```bash

    ORACLE_BASE_CONFIG=/opt/oracle

    ORACLE_BASE_HOME=/opt/oracle/homes/OraDB19Home1

    ```


    Everything that used to exist under `$ORACLE_HOME/dbs`—parameter, server parameter,
    and password files—moves to `$ORACLE_BASE_CONFIG/dbs`. What was previously stored
    in `$ORACLE_HOME/network/admin`—the TNS, SQL*Net, and listener files—relocates
    to `$ORACLE_BASE_HOME/network/admin`.


    The `ORACLE_BASE_CONFIG` and `ORACLE_BASE_HOME` environment variables are optional,
    and Oracle provides two new binaries for reporting their locations:


    *   `orabaseconfig`, for `ORACLE_BASE_CONFIG`

    *   `orabasehome`, for `ORACLE_BASE_HOME`


    They derive the correct locations by checking the fourth, read-only home field
    in the `orabasetab`. Through these two environment variables, we can divine the
    right path to database configurations in a database home, no matter the type of
    home. It’s important to know these directories in any database but essential in
    a container environment because they contain configuration files that must relocate
    to the volume mounted to `/opt/oracle/oradata` to retain containers'' full function
    and capability. Remember that this volume holds the complete contents of a database—including
    its configuration—and we begin to realize that modifying the container image to
    include a Read-Only Home option involves


    *   Performing actions to convert the database software directory to a Read-Only
    Home

    *   Setting the proper directory paths for configuration files

    *   Updating scripts to use the correct destinations when referencing configurations


    ### Convert a Database Home to Read-Only


    A single command, `$ORACLE_HOME/bin/roohctl -enable` (for Read-Only Oracle Home
    Control), converts pre-21c database homes to read-only. It’s executed after installing
    the database software but before creating a database. There are two opportunities
    for running the command in the Docker lifecycle:


    *   During image creation, following the database software installation steps

    *   When starting a new database container, before creating the database


    Converting the `ORACLE_HOME` to read-only during image creation forces every container
    run from the image to use a read-only home. Leaving this option until runtime
    offers more flexibility for our containers and is the solution pursued here.


    As you’ve probably guessed, we’ll control whether to convert the home by checking
    a runtime environment variable. I’m using `ROOH`:


    ```bash

    # Enable read-only Oracle Home:

    if [ "${ROOH^^}" = "ENABLE" ]

    then $ORACLE_HOME/bin/roohctl -enable

    fi

    ```


    This reads the value of `ROOH` from the environment and converts it to uppercase
    using bash variable expansion—the `^^` characters. When the result matches `ENABLE`,
    the script converts the home to read-only. Place this command in the `createDB.sh`
    script, near the beginning of the file and before any operations that run the
    Database Configuration Assistant. (I added it just before the check for `INIT_SGA_SIZE`
    and `INIT_PGA_SIZE`.)


    ### Resolve Configuration Directories


    We’ll use the two new binaries Oracle added for reporting configuration directories:
    `orabaseconfig` and `orabasehome`. In a read-write home, they default to the `ORACLE_HOME`,
    but in read-only homes respond with their new placement under `ORACLE_BASE`. Regardless
    of the type of home—read-only or read-write—we use these commands to assign the
    proper values for `ORACLE_BASE_CONFIG` and `ORACLE_BASE_HOME` in scripts. Since
    we’ll perform this action repeatedly, I chose to create a function:


    ```bash

    function setOracleBaseDirs {

    export ORACLE_BASE_CONFIG="$($ORACLE_HOME/bin/orabaseconfig)"

    export ORACLE_BASE_HOME="$($ORACLE_HOME/bin/orabasehome)"

    }

    ```


    The function should appear at the top of the `createDB.sh` and `runOracle.sh`
    scripts, above any other function that calls `setOracleBaseDirs` to populate the
    configuration directories.'
