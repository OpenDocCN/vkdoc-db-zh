- fmt: '## Connect to Containers on Remote Hosts


    These examples demonstrate connections between the container and client on the
    same host. That’s not always the case. I have a local lab environment dedicated
    to container builds and operate additional containers on various cloud computing
    resources. Accessing Oracle databases on remote hosts, whether another machine
    inside your network or a virtual host somewhere in the cloud, is nearly identical
    to what you’ve seen.


    The single change to the connection setup is the hostname. Replace `localhost`
    with the name or IP address of the remote resource. For example, the hostname
    of my local Docker lab is `lab01`. Connections to containers on the remote machine
    reference the hostname, but the port remains the same. Provided my network allows
    connections over that port, the remote host recognizes and routes traffic to the
    container.


    That raises the additional consideration when connecting to remote Docker hosts.
    Firewall rules aren’t a concern in my home lab, where everything is inside my
    private network. But connections to containers on the cloud require security rules
    allowing traffic to the cloud network and firewall and routing rules on individual
    hosts.


    ## Setting the Container Hostname


    One final option available during `docker run` that makes using containers feel
    more normal is the `--hostname` flag.


    Docker assigns unique alphanumeric strings for hostnames when creating containers,
    as seen in Listing [8-7](#514143_1_En_8_Chapter.xhtml#PC19). For noninteractive
    environments, that’s not a problem. But random strings aren’t very readable to
    humans working at the command line! The default prompt includes the hostname but
    doesn’t offer anything meaningful. Configuring connections—between two databases,
    perhaps—that rely on name resolution is tedious. Who wants to type (or copy/paste)
    “f502c53c3c27” repeatedly?


    ```

    > docker exec -it ORCL bash

    [oracle@f502c53c3c27 ~]$ hostname

    f502c53c3c27

    [oracle@f502c53c3c27 ~]$ cat /etc/hosts

    127.0.0.1     localhost

    ::1     localhost ip6-localhost ip6-loopback

    fe00::0    ip6-localnet

    ff00::0     ip6-mcastprefix

    ff02::1     ip6-allnodes

    ff02::2     ip6-allrouters

    172.17.0.2     f502c53c3c27

    Listing 8-7

    Viewing hostname and host information in a container without setting the hostname

    ```


    The `--hostname` option to docker run sets the hostname in the container. Listing
    [8-8](#514143_1_En_8_Chapter.xhtml#PC20) is an example of assigning a hostname
    to a container at creation, followed by verification within the new container
    using the same commands from Listing [8-7](#514143_1_En_8_Chapter.xhtml#PC19).


    ```

    > docker run -d \

    >      --name TEST \

    >      --hostname TEST \

    >      -p 51521:1521 \

    >      oracle/database:19.3.0-ee

    78f62ede3f889b3805d51428385b5d56826164c2517951019cf5f612c608b8be

    > docker exec -it TEST bash

    [oracle@TEST ~]$ hostname

    TEST

    [oracle@TEST ~]$ cat /etc/hosts

    127.0.0.1     localhost

    ::1     localhost ip6-localhost ip6-loopback

    fe00::0     ip6-localnet

    ff00::0     ip6-mcastprefix

    ff02::1     ip6-allnodes

    ff02::2     ip6-allrouters

    172.17.0.5     TEST

    [oracle@TEST ~]$

    Listing 8-8

    Setting and confirming the hostname in a container with the docker run --hostname
    flag

    ```


    Compare the output from the two containers. The second is easier to recognize
    with its meaningful name at the shell prompt. It also facilitates naming consistent
    with the standard practices in an environment. And, with DNS, intracontainer networking
    is direct and clear to human audiences. Alas, DNS in container networks is a topic
    for the next chapter!


    ## Adding Ports to an Existing Container


    When introducing port publication, I said the only time to open ports in a container
    was during creation. I also suggested a workaround, and while there’s no magic
    for bypassing Docker’s networking behavior, there’s a way to achieve the result—with
    one caveat!


    In Chapter [7](#514143_1_En_7_Chapter.xhtml), you discovered how Docker separates
    data from software and that data and configuration saved on a volume remain after
    removing the container. Data and configuration on a volume can be recycled—to
    clone databases—or used to recreate a database. With its `/opt/oracle/oradata`
    directory mapped to an existing volume, a new container doesn’t know it’s a new
    one. It just starts the existing database.


    This same trick lets you add a port mapping to an existing container. Provided
    data was persisted to a volume, you can stop, remove, then recreate the container
    using the same values for database-specific settings (e.g., the `ORACLE_SID` and
    `ORACLE_PDB`) and the same volume mappings. Add the overlooked port mappings (or
    other configurations) to the new `docker run` command.


    ## Summary


    This chapter introduced the basics behind container networking and described how
    to use port publication to open communication between a host and its containers.
    You learned that ports can’t be added after creating a container, but deleting
    and recreating a container can get around that oversight—provided its data was
    persisted to a volume!


    Mapping resources between a host and container using the `-p` or `--publish` options
    follows the same pattern as assigning volumes with the `-v` or `--volume`, but
    it’s a limited method. There are a finite number of ports, and not all are suitable
    destinations for translated traffic. Only use ports in the nonreserved or dynamic
    range, from 49152 to 65535, or risk conflicts with other services. To avoid using
    an already-assigned port, use the `--expose` and `-P` (or `--publish-all`) flags
    together to allocate network mappings.


    Creating connections to databases running in containers is nearly identical to
    the process in non-container environments. The key difference is understanding
    which host and port to use and where. Processes running inside the container don’t
    use the port mappings, while clients connecting from the host (or containers on
    remote hosts) will use the mapped port.


    Finally, you learned how to set the hostname for a container and make the environment
    feel more normal and friendly. Setting hostnames is a prelude to the next chapter,
    where container networks and DNS features make orchestration and multiple database
    systems more fluid and natural.


    Port publication is adequate for small systems, especially those running in localized
    environments like laptops or desktops. It doesn’t make sense to complicate things
    by adding container networks. If your motivation for running Oracle databases
    in Linux containers is personal, having a few databases for experimentation, feel
    free to skip to Chapter [10](#514143_1_En_10_Chapter.xhtml). To learn more about
    container networking and how to build more robust and flexible networks or make
    containers appear as “normal” network resources (without remembering which container
    uses what port), you’ll find answers in Chapter [9](#514143_1_En_9_Chapter.xhtml)!


    Footnotes [1](#514143_1_En_8_Chapter.xhtml#Fn1_source)'
