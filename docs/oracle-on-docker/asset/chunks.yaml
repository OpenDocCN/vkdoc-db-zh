    ## Scripting Image Customization


    I run a mix of images intended for different environments. My interactive images
    include tools I use for viewing and editing files, performing tests, and collecting
    diagnostic information. They also set the environment to be familiar and user-friendly,
    with my favorite command-line prompt, aliases and shortcuts that simplify navigation,
    and a `login.sql` file to customize my SQL*Plus experience. My production images
    follow container principles and aim for minimal footprint, reduced attack surface,
    and eliminating unnecessary packages and libraries. I could manage separate repositories
    dedicated to different purposes, but that would mean managing two sets of code,
    increasing work spent testing and validating changes, and introducing more opportunities
    for human error. With build arguments, a single repository can support both image
    categories.


    Multiple options exist for managing image content, including


    *   **Scripts with conditional operations:** Useful when options are limited,
    well defined, and won’t change significantly over time.


    *   **Appending or substituting values:** Best for dynamic inputs that aren’t
    well defined in advance.


    *   **Conditionally copying files:** Suitable for relatively static modifications
    that are extensive, complex, or environment specific.


    The following recipes suggest applications of these techniques to produce customized
    images from a single repository.'
