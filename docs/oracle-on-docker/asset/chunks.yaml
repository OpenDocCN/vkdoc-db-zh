- fmt: '### db_inst.rsp


    I mentioned before that the `installDBBinaries.sh` script uses a second file,
    the `db_inst.rsp` response file. For those that haven''t worked with them in the
    past, response files store the answers to all the questions typically answered
    in the GUI-based installation process. These include the `ORACLE_BASE` and `ORACLE_HOME`
    to the "*Do you want to receive security updates from Oracle*" question near the
    end. Without response files, we couldn''t perform unattended installations in
    Docker (or other automation platforms like Vagrant, Ansible, or Terraform, for
    that matter).


    Oracle provides default response files for each database version, prepopulated
    with every available option. Most entries are commented out with hashes (`#`)
    and include some descriptive or informational text. Take this entry from a 19c
    response file, for instance, that identifies the purpose and possible options
    of the `oracle.install.option` parameter:


    ```

    #-----------------------------------

    # Specify the installation option.

    # It can be one of the following:

    #   - INSTALL_DB_SWONLY

    #   - INSTALL_DB_AND_CONFIG

    #   - UPGRADE_DB

    #-----------------------------------

    oracle.install.option=INSTALL_DB_SWONLY

    ```


    The `db_inst.rsp` file is the response file Docker uses to install the database.
    Working again with the 19c version of the repository, I''ve selected only the
    "uncommented" lines that the installer reads during the installation. These are
    the "answers" to each of the "questions" a database installation needs:


    ```

    oracle.install.responseFileVersion=/oracle/install/rspfmt_dbinstall_response_schema_v19.0.0

    oracle.install.option=INSTALL_DB_SWONLY

    UNIX_GROUP_NAME=dba

    INVENTORY_LOCATION=###ORACLE_BASE###/oraInventory

    ORACLE_HOME=###ORACLE_HOME###

    ORACLE_BASE=###ORACLE_BASE###

    oracle.install.db.InstallEdition=###ORACLE_EDITION###

    oracle.install.db.OSDBA_GROUP=dba

    oracle.install.db.OSOPER_GROUP=dba

    oracle.install.db.OSBACKUPDBA_GROUP=dba

    oracle.install.db.OSDGDBA_GROUP=dba

    oracle.install.db.OSKMDBA_GROUP=dba

    oracle.install.db.OSRACDBA_GROUP=dba

    SECURITY_UPDATES_VIA_MYORACLESUPPORT=false

    DECLINE_SECURITY_UPDATES=true

    ```


    A few of these lines—the ones with `###` surrounding part of the "answer"—might
    stand out. What do you suppose `###ORACLE_HOME###` and `###ORACLE_BASE###` mean
    here? They''re placeholders that the `installDBBinaries.sh` script replaces with
    real values with this group of commands:


    ```

    # Replace place holders

    # ---------------------

    sed -i -e "s|###ORACLE_EDITION###|$EDITION|g" "$INSTALL_DIR"/"$INSTALL_RSP" &&
    \

    sed -i -e "s|###ORACLE_BASE###|$ORACLE_BASE|g" "$INSTALL_DIR"/"$INSTALL_RSP" &&
    \

    sed -i -e "s|###ORACLE_HOME###|$ORACLE_HOME|g" "$INSTALL_DIR"/"$INSTALL_RSP"

    ```


    The `sed` command in Linux stands for stream editor, a powerful (and sometimes
    cryptic) tool for programmatically modifying text files. The three commands in
    the installation script perform a find-and-replace operation against the response
    file, identified here as `"$INSTALL_DIR"/$INSTALL_RSP"`. It substitutes values
    from the environment for the placeholders. (Keep this bit of code in mind for
    the next section on database creation, where it plays a much more valuable role
    in customizing the database.)


    The default response files produce generic database installations. If your needs
    go beyond those in the default responses, make those changes in the `db_inst.rsp`
    file.


    ## Database Creation


    As with database installation, the database creation script has a partner response
    file. What''s important to remember is these files, `createDB.sh` and `dbca.rsp.tmpl`,
    are added to the image *during the image build* but *called* during `docker run`.
    You''ll need to rebuild the image before new containers recognize changes to these
    scripts.


    Just as the `db_inst.rsp` contains the answers needed to complete a database installation,
    the `dbca.rsp.tmpl` file includes the answers asked during database creation.
    You may even recognize some entries from the last time you ran the Database Configuration
    Assistant (DBCA) GUI! And, like the installation response file, the file contains
    placeholders identified by three hashes (`###`). Once again, from the 19c directory,
    the noncommented entries are


    ```

    responseFileVersion=/oracle/assistants/rspfmt_dbca_response_schema_v19.0.0

    gdbName=###ORACLE_SID###

    sid=###ORACLE_SID###

    createAsContainerDatabase=true

    numberOfPDBs=1

    pdbName=###ORACLE_PDB###

    pdbAdminPassword=###ORACLE_PWD###

    templateName=General_Purpose.dbc

    sysPassword=###ORACLE_PWD###

    systemPassword=###ORACLE_PWD###

    emConfiguration=DBEXPRESS

    emExpressPort=5500

    dbsnmpPassword=###ORACLE_PWD###

    characterSet=###ORACLE_CHARACTERSET###

    nationalCharacterSet=AL16UTF16

    initParams=audit_trail=none,audit_sys_operations=false

    automaticMemoryManagement=FALSE

    totalMemory=2048

    ```


    The database creation script, `createDB.sh`, has similar `sed` commands:


    ```

    # Replace place holders in response file

    cp "$ORACLE_BASE"/"$CONFIG_RSP" "$ORACLE_BASE"/dbca.rsp

    # Reverting umask to original value

    umask 022

    sed -i -e "s|###ORACLE_SID###|$ORACLE_SID|g" "$ORACLE_BASE"/dbca.rsp

    sed -i -e "s|###ORACLE_PDB###|$ORACLE_PDB|g" "$ORACLE_BASE"/dbca.rsp

    ```'
