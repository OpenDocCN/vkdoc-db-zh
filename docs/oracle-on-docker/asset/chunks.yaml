    # Docker 卷


    `Docker` `卷`在某些方面与绑定挂载类似：两者都将数据持久化在容器联合文件系统之外。区别在于功能和管理方式。绑定挂载是主机文件系统上的目录，而 `Docker`
    `卷`是 `Docker` 对象，必须提前创建，^(⁴⁸) 这为容器创建增加了一个步骤。`Docker` `卷`的*默认*位置是主机私有的 `/var/lib/docker`
    区域。


    不过，使用 `/var/lib/docker` 进行存储曾是对联合文件系统的一项指控！如果卷使用这个位置，我们又回到了同样的境地，将数据放在一个有限的目的地！但这仅仅是*默认*位置。我们有机会在本地文件系统上创建卷，就像绑定挂载一样。卷也可以引用绑定挂载无法访问的存储，包括云源上的对象存储桶。


    `Docker` `卷`是 `Docker` 环境中的*对象*，通过 `Docker` `CLI`（主要是 `docker volume` 命令）进行管理。在某些方面，`Docker`
    `卷`类似于 *Oracle 自动存储管理* (ASM)——两者都提供集成的、应用感知的存储以及扩展的功能和能力，但额外提供了专用命令。卷必须在映射到容器之前存在，就像
    DBA 需要在将 `ASM` 磁盘分配给数据库之前创建它们一样。清单 7-1 提供了创建卷、列出系统上的卷、检查卷元数据以及删除卷的示例。^(⁴⁹) `Docker`
    `Desktop` 也提供卷管理功能。图 7-3 展示了 `Docker` `Desktop` 中此示例的 `oradata` 卷的卷管理选项卡。


    ![](img/514143_1_En_7_Fig3_HTML.jpg)


    一个 Docker 截图。顶部面板有标记为 1 的卷选项，以及标记为 2 的卷下的 oradata。底部显示 oradata 下标记为 3 的数据。


    图 7-3


    `Docker` `Desktop` 中 oradata 卷的视图。在“卷”视图下 (1)，我选择了 oradata 卷 (2) 以导航到卷详细信息页面。在“数据”选项卡下
    (3)，我可以看到卷的文件和目录


    ```

    > docker volume create oradata

    oradata

    > docker volume ls

    DRIVER    VOLUME NAME

    local     oradata

    > docker volume inspect oradata

    [

    {

    "CreatedAt": "2022-01-01T12:00:00Z",

    "Driver": "local",

    "Labels": {},

    "Mountpoint": "/var/lib/docker/volumes/oradata/_data",

    "Name": "oradata",

    "Options": {},

    "Scope": "local"

    }

    ]

    > docker volume rm oradata

    oradata

    ```

    清单 7-1

    用于创建卷、列出系统上的卷、显示卷元数据和删除卷的 Docker 命令示例


    # tmpfs 和机密


    剩余的挂载类型用途更为有限和特定。


    *tmpfs* 类型将数据保存到内存，但从不写入主机文件系统。它们适用于容器运行时使用的、不需要持久化的应用或会话数据。`tmpfs` 挂载可以与容器共享敏感信息，例如密钥和密码。


    *运行时机密*^(⁵⁰) 是 *Podman*（一种替代容器引擎）中可用的一种特殊挂载类型。运行时机密提供了一种更好、更安全的方式与容器共享凭据。如果没有运行时机密，向容器传递密码和其他敏感信息的选项可能会留下威胁参与者可以利用的可见痕迹。


    # 卷 vs 绑定挂载


    根据 `Docker` 的说法，`Docker` `卷`是持久化数据的首选方式，并且相比绑定挂载具有 several 优势，包括：


    *   **为 Docker Desktop 用户提升性能：** `Docker` `卷`是 `Docker` 原生对象，在 `Docker` `Desktop`
    上的性能优于绑定挂载。

    *   **远程主机和云集成：** `Docker` `卷`可以使用绑定挂载无法访问的专用、远程和云存储。

    *   **更高的安全性：** 插件和驱动程序允许卷加密和访问控制。

    *   **更好的所有权和权限管理：** Linux 系统（包括在 Windows Subsystem for Linux 下运行的系统）中的绑定挂载需要额外步骤来修复目录所有权。卷则不需要。

    *   **备份和共享：** 卷更易于备份和迁移，并且在多个容器之间共享更安全。


    对于容器新手来说，很容易忘记管理卷资源。删除容器会使其卷成为孤儿。随着时间的推移，在不清理卷的情况下启动和丢弃数据库容器会增加主机上的空间压力。对于位于 `Docker`
    私有 `/var/lib/docker` 目录中的卷尤其如此，这些卷很容易被忽视。在 Linux 系统上，只有特权用户才能识别空间使用情况。对于 `Docker`
    `Desktop` 用户来说，该空间隐藏在虚拟机中。


    一旦卷^(⁵¹) 填满磁盘会发生什么，取决于环境。对于 `Docker` `Desktop` 用户，当 `Docker` `VM` 空间不足时，它会停止工作或报告错误。在
    Linux 系统上，用户可能会观察到从异常行为到故障的任何情况。


    绑定挂载的吸引力和明显优势在于可以从主机访问。它们是常规目录，发现其空间使用情况很简单。但卷也可以是绑定挂载！清单 7-2 展示了我如何创建一个名为 `oradata_ORA11G`
    的卷，然后列出并检查其元数据。`volume create` 命令使用了额外的选项，指示 `Docker` 将卷绑定到我本地文件系统上的一个目录。最终，我得到了一个使用本地目录的卷，就像绑定挂载一样！


    ```

    > docker volume create --opt type=none --opt o=bind --opt device=/oradata/ORA11G
    oradata_ORA11G

    oracle_data

    > docker volume ls

    DRIVER              VOLUME NAME

    local               oradata_ORA11G

    > docker volume inspect oradata_ORA11G

    [

    {

    "Driver": "local",

    "Mountpoint": "/var/lib/docker/volumes/oradata_ORA11G/_data",

    "Name": "oradata_ORA11G",

    "Options": {

    "device": "/oradata/ORA11G",

    "o": "bind",

    "type": "none"

    },

    "Scope": "local"

    }

    ]

    ```

    清单 7-2

    创建一个绑定到本地主机目录的卷


    现在我两全其美！我的卷可以通过 `Docker` 的 `CLI` 看到，并且使用了我可以使用常规 Linux 命令导航的主机上的一个目录！^(⁵²) 下一步是使用这个卷在名为
    *ORA11G* 的新容器中挂载 `oradata` 卷。


    容器与外部数据之间存在关系。`Docker` 通过卷更好地理解了这种关系。在一个只有几个容器和卷的简单环境中，这并不那么重要。随着复杂性的增加，了解使用了什么以及在哪里使用就变得更为关键。


    当我第一次开始在容器中运行 `Oracle` 数据库时，我使用一个名为 `oradata` 的目录作为所有容器的根目录。每个容器都绑定挂载到自己的子目录，我手动管理一切。如果我有一个名为
    `TEST123` 的子目录但没有匹配的容器，我就知道可以安全地删除该子目录以回收空间。


    不久之后，我将多个目录挂载到一个容器，或在多个容器之间共享目录。跟踪变得更加困难，删除目录的后果也更严重。

