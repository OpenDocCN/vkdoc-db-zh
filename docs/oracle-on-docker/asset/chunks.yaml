  trans: '

    # 9. 容器网络


    我得坦白：网络技术让我感到畏惧。我曾在设有专职网络管理员的环境中工作了多年，除了基础之外，并未花时间深入学习。直到我加入一个运维团队，我才意识到自己技能上的这一空白。从我听到的其他数据库管理员的反馈来看，有这种感觉的并非我一个人。


    在使用 Docker 的头几年，我主要依靠端口发布来处理连接。由于我只需要本地访问少数几个容器，因此觉得没必要额外费心去创建专用网络。而且，当时大家也都是这么做的。


    随着我对容器的使用和依赖日益增加，我逐渐认识到端口映射带来的负担和局限性。它是一个手动过程，扩展性差，且无法与自动化流程集成。我必须手动跟踪和分配开放端口。如果让
    Docker 分配端口，我又需要去识别这些映射关系。而且，如果我忘记设置端口，就不得不重新创建容器！在端口映射下，网络配置也不直观。连接字符串和主机标识会根据连接来源的不同而变化。容器网络消除了这些问题，它简化了访问和使用，将容器与现有的观测平台集成，并降低了运维开销。


    本章并非对网络概念的深入探讨，而是聚焦于在容器中部署 Oracle 数据库服务时所面临网络问题的实用解决方案。希望这能让那些与我一样对网络技术感到焦虑的人觉得这个主题不那么可怕！


    ## 容器网络


    我们已经了解了 Docker 如何隔离容器资源，无论是在容器中添加主机上不存在的用户，还是创建仅容器可见的私有文件系统。但容器并不能完全与主机隔绝。它们仍然需要共享主机资源，如
    CPU、内存、存储以及通过`容器网络`提供的网络。


    容器网络通常无需过多关注。它们作为 Docker 引擎启动的一部分自动启动。每个网络都有一个默认网关和 DNS 功能，Docker 守护进程提供 DHCP
    服务和 IP 分配。并且，启动、停止、创建或移除容器等操作不会影响网络。


    Docker 守护进程使用 DHCP 为容器分配 IP 地址。每当主机、容器引擎或容器网络重启时，地址会被重新分配（并且可能会改变）。请将容器 IP 地址视为临时地址，不要将它们用于`tnsnames.ora`文件等网络配置中！


    人们很容易将 Docker 网络视为理所当然。许多容器操作都需要网络，包括连接到容器的命令行或数据库，以及构建镜像（这会调用`yum`通过主机的互联网连接获取操作系统更新）。然而，我们并不需要创建或配置任何网络，因为
    Docker 在安装时添加了三个默认网络：`bridge`、`host`和`none`。


    ### Docker 网络类型


    容器网络是`虚拟`或`软件定义的网络`。它们不是由电缆和物理网卡定义，而是由规则和配置来定义网络设备和路由。它们的操作方式与“普通”网络非常相似，但每种容器网络类型都针对特定需求而设计。


    #### 桥接网络


    顾名思义，桥接网络跨越了网络设备之间的间隙。在容器环境中，桥接网络所覆盖的间隙位于主机和容器网络之间。位于同一桥接网络上的容器可以在网络`内部`相互通信，同时可以`跨越`桥接与主机交互。然而，桥接驱动程序中的规则阻止了不同桥接网络之间的通信。虽然分配到一个桥接网络的容器可以看见并与彼此通信，但它们无法看到或访问其他桥接网络上的容器。桥接网络仅限于单个主机，或者更准确地说，仅限于运行在该主机上的
    Docker 守护进程，但单个主机上可以有多个桥接网络。


    由于桥接网络将容器暴露给彼此，因此它最适用于托管多个相互依赖服务的实验环境和本地环境。到目前为止你所见到的所有操作，都是通过类似图 9-1 所示的桥接网络进行的——具体来说，是
    Docker 的`默认桥接网络`。虽然默认桥接网络使用与用户自定义桥接相同的桥接驱动程序，但用户自定义的桥接网络具有更多功能和特性，使其在除最基本环境之外的所有场景中更具吸引力。


    ![](img/514143_1_En_9_Fig1_HTML.png)


    图 9-1

    连接到桥接网络的容器可以看见并与同一网络上的其他容器通信，同时“桥接”跨越了容器网络与主机之间的间隙。


    #### 主机网络


    主机网络将容器端口直接映射到主机。实际上，主机网络使得容器服务看起来像是在本地运行，而不是在容器中运行。对于使用容器主机网络的 Oracle 数据库容器，外部客户端通过主机的
    1521 端口而非映射端口访问监听器。


    主机网络的一个优势是 DNS 透明性。外部网络上的客户端可以解析容器主机，而无需处理 Docker 创建的任何抽象层。两个缺点是：主机网络仅在 Linux
    上可用，并且一个 Docker 主机无法运行多个容器。


    如图 9-2 所示的容器主机网络对于专用于单一服务的容器主机非常有用。它们结合了容器的优势，如隔离和基础设施即代码，而不会使网络环境复杂化。在运行 Oracle
    数据库时，特别是当性能或容量需求要求为单个数据库分配专用资源和基础设施时，主机网络可以降低复杂性和配置开销。


    ![](img/514143_1_En_9_Fig2_HTML.png)


    图 9-2

    主机网络将容器直接连接到主机网络接口。


    #### 其他网络类型


    Docker 提供了其他网络类型，包括：


    *   `MACVLAN 网络`：通过为网络上的每个容器创建唯一的 MAC 地址，使容器看起来更像物理主机。Docker 根据 MAC 地址将流量路由到容器。当将传统应用程序迁移到虚拟机（或物理主机）上的容器时，它们很有用。

    *   `IPVLAN 网络`：提供对分配给容器的 IPv4 和 IPv6 地址的细粒度控制。它们通常需要更多的关注和专门的网络设计。

    *   `“无”网络`：正如其名——没有网络。将容器连接到 none 网络会禁用网络功能。它最常与自定义网络驱动程序结合使用。

    *   `覆盖网络`：将在多个 Docker 守护进程上运行的网络连接成一个单一网络，透明地链接运行在各个主机上的服务，而不侵入现有的（非容器）企业网络。


    在你开始 Docker 之旅时，不太可能遇到这些特殊类型的网络。本章的剩余部分将集中讨论桥接网络，包括默认桥接网络及其端口映射的局限性，以及为多容器和多数据库环境创建和配置用户自定义的桥接网络。为了更好地理解这些概念，让我们创建一个由两个
    Oracle 数据库容器组成的测试环境。

    '
- fmt: '## Demonstrating Bridge Networking


    The most common networking scenarios for Oracle databases are as follows:


    *   Connect a client to a local database: The client, in this case, is usually
    a command-line tool like SQL*Plus.

    *   Connect a client to a database on a remote host: The client may be SQL*Plus
    or a GUI development suite such as Oracle’s SQL Developer or Quest Software’s
    TOAD.

    *   Create database links between two databases: In practice, this is just a particular
    case of connecting to a remote host, where the local database is the database
    client.

    *   Support for services, replication, and high availability: This may appear
    to be just another local or remote client connection, but there’s a twist. The
    previous examples initiate database connections via the database listener over
    a known port. Oracle GoldenGate, for instance, uses a different range of ports.


    Databases hosted in Docker containers introduce an additional scenario: connecting
    clients on the host to a container. This seems to fall under the second example—a
    client connecting to a remote database—but with an added need to traverse the
    gap between the host and the container network.


    An ideal networking solution won’t require unique configurations or unreasonable
    effort. The same connection strings and `tnsnames.ora` files should work everywhere—in
    containers and on the container host. DNS should resolve containers by their hostname
    on the network. To explore and test these scenarios, create two Oracle database
    containers using the parameters listed in Table 9-1.


    **Table 9-1**

    Properties assigned to the two database containers, `ORCL1` and `ORCL2`


    |                    | `Container ORCL1` | `Container ORCL2` |

    | ------------------ | ----------------- | ----------------- |

    | Container Name     | `DB1`             | `DB2`             |

    | Hostname           | `dbhost1`         | `dbhost2`         |

    | Database SID       | `ORA1`            | `ORA2`            |

    | PDB Name           | `PDB1`            | `PDB2`            |

    | Listener Port      | 1521              | 1521              |

    | Volume for oradata | `/oradata/ORCL1`  | `/oradata/ORCL2`  |

    | Mapped Listener Port | 51521             | 61521             |

    | `SYSTEM` Password  | `oracle123`       | `oracle123`       |


    Listing 9-1 shows the `docker run` commands for creating the two containers. The
    `ORACLE_SID` and PDB name are set using environment variables, and the listener
    ports are mapped, as shown in the last chapter. Take note of the `--hostname`
    option. Docker adds an entry for the hostname to the container’s `/etc/hosts`
    file during `docker run`. It defaults to the container name, but `--hostname`
    allows us to specify custom values.


    **Listing 9-1**

    Commands for creating the two Oracle database containers, `ORCL1` and `ORCL2`


    ```

    > docker run -d --name ORCL1 \

    >        --hostname dbhost1 \

    >        -e ORACLE_SID=ORA1 \

    >        -e ORACLE_PDB=PDB1 \

    >        -v /oradata/ORCL1:/opt/oracle/oradata \

    >        -p 51521:1521 oracle/database:19.3.0-ee

    3a15e84cd484b98f4c2437f4b0eabe10ebeb6c965dc992c09eb1d20d96b3589e

    > docker run -d --name ORCL2 \

    >        --hostname dbhost2 \

    >        -e ORACLE_SID=ORA2 \

    >        -e ORACLE_PDB=PDB2 \

    >        -v /oradata/ORCL2:/opt/oracle/oradata \

    >        -p 61521:1521 oracle/database:19.3.0-ee

    e05023316788349978c96414e2c57bb489cd0d2d54d2168e2c2db2d5221af9d3

    ```


    Connecting to these databases requires their hostname or IP address, the listener
    port, and a service name (or target database SID). If the databases described
    in Table 9-1 weren’t running in containers, we could connect to them through SQL*Plus,
    using EZConnect connection syntax such as


    ```

    $ORACLE_HOME/bin/sqlplus system/oracle123@//dbhost1:1521/ORA1

    ```


    Any of the following connection strings^([^(59)](#fn59)) would work for `dbhost1`:


    ```

    system/oracle123@//dbhost1:1521/ORA1

    system/oracle123@//dbhost1/ORA1

    system/oracle123@//dbhost1:1521/PDB1

    system/oracle123@//dbhost1/PDB1

    ```


    A similar set of connection strings would apply to `dbhost2`:


    ```

    system/oracle123@//dbhost2:1521/ORA2

    system/oracle123@//dbhost2/ORA2

    system/oracle123@//dbhost2:1521/PDB2

    system/oracle123@//dbhost2/PDB2

    ```


    Once database creation completes, we can start exploring Docker’s network environment.


    ## Displaying Network Information


    As you might expect, network management in Docker uses a set of `docker network`
    commands, summarized in Listing 9-2 using `docker network --help`. Reading through
    the options, notice Docker lets us create and remove networks, list and inspect
    a network, and connect containers to (and disconnect them from) a network.


    **Listing 9-2**

    Options for `docker network` include commands to create, remove, list, and inspect
    networks and connect and disconnect containers to and from a network


    ```

    > docker network --help

    Usage:  docker network COMMAND

    Manage networks

    Commands:

    connect     Connect a container to a network

    create      Create a network

    disconnect  Disconnect a container from a network

    inspect     Display detailed information on one or more networks

    ls          List networks

    prune       Remove all unused networks

    rm          Remove one or more networks

    Run ''docker network COMMAND --help'' for more information on a command.

    ```


    Docker Desktop systems run in virtual machines on Windows and Mac, where many
    of the host networking components and interfaces aren’t easily visible from the
    host. The examples in this chapter are from an Oracle Enterprise Linux system
    running the Docker engine to simplify matters and better illustrate how Docker
    networking works (without the additional layer of abstraction introduced by the
    virtual machine).


    ### List Networks


    Show the networks on a system with `docker network ls`:


    ```

    > docker network ls

    NETWORK ID     NAME      DRIVER    SCOPE

    0201c1b85336   bridge    bridge    local

    8e74549be878   host      host      local

    d0ce1f7bd49f   none      null      local

    ```


    These three networks, `bridge`, `host`, and `none`, are the default networks created
    by Docker during installation. Starting the Docker engine on a host starts its
    container networks, too. There’s no extra effort required to enable networking
    in Docker!


    ### Inspect a Network


    Let’s look further into the `bridge`^([^(60)](#fn60)) network using `docker network
    inspect bridge`. The abridged output from my system, shown in Listing 9-3, includes
    for containers `ORCL1` and `ORCL2`, including their IP addresses. Near the bottom,
    it shows that this is a default bridge network (`com.docker.network.bridge.default_bridge`
    is `true`) bound to the host on IP 0.0.0.0, with a network name of `docker0`.


    **Listing 9-3**

    Example output of `docker network inspect bridge`, showing details of the `bridge`
    network. Note the two containers created earlier, `ORCL1` and `ORCL2`, are attached
    to this network.


    ```

    > docker network inspect bridge

    [

    {

    "Name": "bridge",

    "Id": "0201c1b85336336a...",

    "Scope": "local",

    "Driver": "bridge",

    "IPAM": {

    "Driver": "default",

    "Config": [

    {

    "Subnet": "172.17.0.0/16",

    "Gateway": "172.17.0.1"

    }

    ]

    },

    "Containers": {

    "3a15e84cd484b98f...": {

    "Name": "ORCL1",

    "IPv4Address": "172.17.0.2/16"

    },

    "e050233167883499...": {

    "Name": "ORCL2",

    "IPv4Address": "172.17.0.3/16"

    }

    },

    "Options": {

    "com.docker.network.bridge.default_bridge": "true",

    "com.docker.network.bridge.enable_icc": "true",

    "com.docker.network.bridge.enable_ip_masquerade": "true",

    "com.docker.network.bridge.host_binding_ipv4": "0.0.0.0",

    "com.docker.network.bridge.name": "docker0"

    },

    }

    ]

    ```'
