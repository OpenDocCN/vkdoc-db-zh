- fmt: "# CHAPTER 18 ■ Tuning for Peak Load\n\n## Identifying Critical Issues from\
    \ Activity Data\n\nAs you can see, from this one execution of the current activity\
    \ data, you can identify several behaviors about this SQL Server instance. These\
    \ behaviors will help you start to build the mental image in your mind about what\
    \ you can expect to see as you monitor the system over time. Some of the behaviors\
    \ you can expect to see are the following:\n\n*   There are large blocking chains.\n\
    *   There are queries that consume a number of large resources.\n*   The application\
    \ is using application locks in the database (`sp_getapplock`).\n*   There are\
    \ nonoptimal plans for some frequently executed procedures.\n\nThere are several\
    \ critical items in the preceding list that need to be addressed before the peak\
    \ season. For example, at the beginning of the chapter we talked about large blocking\
    \ chains that are impacting the application. The blocking chain in Figure 18-15\
    \ was impacting users for a minimum of 4 minutes, and this potentially could cost\
    \ the business thousands of dollars in potential orders.\n\n![Image 216](index-464_1.png)\n\
    \nAdditional information needs to be captured for all of these items. You need\
    \ to identify the unique blocking chains, when they occur, and what objects and\
    \ processes are involved. Another source of blocking information is the `sys.dm_db_index_operational_stats`\
    \ DMV, which you can use to see which objects are frequently waiting on locks\
    \ or have lock contention. Frequently executed statements need to be tuned and\
    \ potentially rewritten to minimize the chance of receiving a nonoptimal execution\
    \ plan. The goal for the core business transactions is for them to be predictable\
    \ so that they can meet the performance requirements in the SLAs. If several stored\
    \ procedures involved in a core business transactions have a large runtime variance,\
    \ the risk of not meeting the requirements of the SLAs increases. The next step\
    \ addresses the large resource consumers because we’ll review the runtime data\
    \ that we captured from SQL Server and the application.\n\n## Index Utilization\
    \ Analysis\n\nBegin by reviewing the index utilization statistics that were captured\
    \ during the data-collecting stage.\n\nIndex changes are usually low-risk and\
    \ high-reward changes to make. If you adjust the indexing strategy on the core\
    \ tables, you can have a positive effect on a large number of SQL statements.\
    \ If you start by tuning SQL statements, the risk is higher. Tuning SQL statements\
    \ requires more effort and a significant amount of testing. After you adjust the\
    \ indexing strategy and affect many of the execution plans, you will be in a better\
    \ position to review the runtime performance for the SQL statements.\n\nFigure\
    \ 18-16 represents a sample data set you will review. It is a subset of the result\
    \ set for index usage data. Additional columns included in the view are server\
    \ name, database name, source, object name, `object_id`, index name, last user\
    \ scan, last user seek, and run time.\n\n***Figure 18-16.** Usage statistics for\
    \ all indexes.*\n\nFigure 18-16 shows index usage statistics and some other metadata\
    \ about the indexes on particular objects. This data includes many attributes\
    \ that are essential for the analysis, such as `is_unique`, `rowcnt`, total pages,\
    \ and the total number of indexes on a table. From this data, you can determine\
    \ the following scenarios:\n\n*   **Unused indexes:** Indexes that have not been\
    \ used.\n*   **Costly indexes:** Indexes that require more resources to maintain\
    \ than is warranted by how much the index is used.\n*   **High number of indexes:**\
    \ Review all tables with a large number of indexes. What is considered to be a\
    \ large number of indexes? The answer to this depends on which of the following\
    \ types of applications SQL Server is supporting:\n    *   **Transactional Database:**\
    \ For this type of database a large number would be about three to five indexes\
    \ per table, but what qualifies as “a large number” really depends on the amount\
    \ of system activity.\n    *   **Reporting Database:** For this type of database,\
    \ a higher number is acceptable, but a large number might affect the extraction,\
    \ transformation, and load (ETL) performance.\n    *   **Mix – Transactional and\
    \ Reporting Database:** If both of the preceding types of databases are used,\
    \ about five to seven indexes per table is considered to be a large number. However,\
    \ it really depends on the amount of system activity.\n*   **Missing indexes:**\
    \ Larger objects with high scan counts are candidates for additional indexes.\n\
    *   **High number of lookups:** Review the most frequent statements against the\
    \ object to see if adding a couple of columns might help offset the need for a\
    \ lookup. Remember, leverage `INCLUDE` columns but consider the index width.\n\
    *   **Non-Optimal Clustered Key:** Notice the nonclustered index in Figure 18-17\
    \ with a lower number of seeks and a high number of lookups on the clustered index.\
    \ This indicates the common access path into this table is on `PK_Table1` than\
    \ on `CDX_Table1`. Consider changing the columns that are clustered in this example.\n\
    \n![Image 217](index-465_1.png)\n\n***Figure 18-17.** Usage statistics for a table\
    \ that needs the clustered key switched to another column(s).*\n\n**Note:** After\
    \ the new index changes have been implemented, you need to collect updated DMV\
    \ performance data as shown in Figure 18-16 and trace data, as shown in Table\
    \ 18-5 because the index statistics and performance profiles will have changed.\n\
    \nAfter you have performance-tuned a system several times or even tuned the same\
    \ system over time, you will start to notice that tuning indexes gets you most\
    \ of the way to where you need to be. Adjusting configurations, the timing of\
    \ events, and code will get you the rest of the way.\n\n## Approaches for Identifying\
    \ SQL Statements to Tune\n\nThere are several approaches you can use when identifying\
    \ which SQL statements to performance tune. Following are different sources, in\
    \ order of preference:\n\n*   **Top 100 Query Stats by Execution Count:** These\
    \ frequently called statements represent the majority of the total resource consumption.\
    \ If 75 percent of these statements are tuned with indexes or code modifications,\
    \ you will reduce total resource consumption by a large percentage. Remember,\
    \ people and time are usually limited, so spend your time tuning processes that\
    \ will have a large impact on the system. Do not tune the one query that uses\
    \ 500 million I/O because this is not an effective use of time and the net savings\
    \ you’ll see in terms of system resources is not as great.\n*   **ALL statements\
    \ from the core business transaction:** Evaluate these because they have a direct\
    \ impact on the user experience. If you make these statements faster, the user\
    \ experience will most likely be better.\n*   **SQL statements that frequently\
    \ receive nonoptimal plans and are frequently called:** Based on my experiences,\
    \ nonoptimal plans are usually magnitudes worse and could cause additional issues\
    \ on the server.\n\nBy adjusting the indexing strategy and performance tuning\
    \ of the most frequently called procedures, you can reduce the total resource\
    \ consumption of the server. There is often a single large query that consumes\
    \ a lot of resources, but tuning that should be secondary to one that is executed\
    \ 1,000,000 times per day. Once the changes are implemented, measure the new resource\
    \ levels as talked about earlier to see if things are better or worse. This is\
    \ an iterative process, so make sure to collect updated metadata and runtime statistics.\n\
    \nAt the end of this exercise, if you determine that the current environment will\
    \ not be able to handle the peak load, start to think about other environmental\
    \ or process-related changes. Not every change needs to be a code or configuration\
    \ change. If reporting is going against the transactional environment and the\
    \ total resource consumption is 25 percent, can you shift this to another server\
    \ running SQL Server?"
