    # 第 9 章：合规与审计


    虽然法律本身以及负责执行法律的机构并未向数据库专业人员下达具体指令，但它们所定义的是法律的意图。SOX（萨班斯-奥克斯利法案）侧重于报告的准确性，这意味着它不关心谁查看了数据，而是关心什么数据被添加、修改或删除。因此，数据库专业人员主要需要关注写事件以及谁有权限执行这些操作。


    表 9-1 列出了在包含受 SOX 监管数据的 SQL Server 实例上应该审计的领域。


    `Table 9-1.` 包含受 SOX 监管数据的服务器需关注的领域


    | **领域** | **审计组** |

    | :--- | :--- |

    | 角色变更 | `SERVER_ROLE_MEMBER_CHANGE_GROUP` |

    | 确保审计 | `AUDIT_CHANGE_GROUP` |

    | 数据库状态 | `BACKUP_RESTORE_GROUP` |

    |  | `DATABASE_CHANGE_GROUP` |

    |  | `DATABASE_OBJECT_CHANGE_GROUP` |

    | 登录与安全 | `SCHEMA_OBJECT_CHANGE_GROUP` |

    |  | `SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP` |

    |  | `DATABASE_PRINCIPAL_IMPERSONATION_GROUP` |


    > **注意** 完整的 SQL Server 审计操作组和操作列表可以在这里找到：`http://technet.microsoft.com/en-us/library/cc280663.aspx`。


    SOX 的主要关注点是报告的准确性以及审计数据录入或更改方式和时间的能力。这些事件的审计通过数据库审计操作完成，本章稍后将进行介绍。需要审计的操作是`UPDATE`、`INSERT`和`DELETE`。这些审计特定于数据库架构或对象，需要为任何受
    SOX 监管的数据库进行规划。


    ## 健康保险流通与责任法案


    《1996 年健康保险流通与责任法案》（HIPAA）是美国的一项法律，旨在简化和规范电子医疗交易的处理方式。随着这种标准化围绕电子健康记录的使用展开，数据的安全和隐私成为了一个关注点。该法律试图通过《隐私规则》来解决这个问题。


    《隐私规则》用于规范受保护的健康信息（PHI）的使用或披露。并非所有健康信息都被归类为 PHI，但其定义是任何医疗记录或支付历史的一部分。数据库专业人员可能负责数百个数据库，但在该组中可能只有一个数据库或服务器受
    HIPAA 约束。


    美国卫生与公众服务部（HHS）负责 HIPAA 的执行。与监督 SOX 的机构类似，HHS 已经概述了实体必须减轻健康信息的意外或非法暴露，但没有给出如何操作的指导方针。


    HIPAA 和 SOX 之间的区别体现在法律意图上。SOX 旨在确保财务数据的准确性。这意味着数据库专业人员需要审计数据被谁访问过。HIPAA 则关注于保持健康信息的私密性。这意味着数据库专业人员需要审计数据被谁访问过。


    表 9-2 列出了在包含 HIPAA 数据的 SQL Server 实例上应该审计的领域。


    `Table 9-2.` 包含受 HIPAA 监管数据的服务器需关注的领域


    | **领域** | **审计组** |

    | :--- | :--- |

    | 登录与安全 | `SUCCESSFUL_LOGIN_GROUP` |

    | 变更 | `FAILED_LOGIN_GROUP` |

    |  | `LOGOUT_GROUP` |

    |  | `LOGIN_CHANGE_PASSWORD_GROUP` |

    | 角色变更 | `SERVER_ROLE_MEMBER_CHANGE_GROUP` |

    | 访问数据库 | `APPLICATION_ROLE_CHANGE_PASSWORD_GROUP` |

    |  | `DATABASE_CHANGE_GROUP` |

    |  | `DATABASE_OBJECT_ACCESS_GROUP` |

    |  | `DATABASE_OBJECT_CHANGE_GROUP` |

    |  | `DATABASE_OBJECT_OWNERSHIP_CHANGE_GROUP` |

    |  | `DATABASE_OWNERSHIP_CHANGE_GROUP` |

    |  | `DATABASE_PERMISSION_CHANGE_GROUP` |

    |  | `DATABASE_PRINCIPAL_CHANGE_GROUP` |

    |  | `DATABASE_PRINCIPAL_IMPERSONATION_GROUP` |

    |  | `DATABASE_ROLE_MEMBER_CHANGE_GROUP` |

    | 确保审计 | `AUDIT_CHANGE_GROUP` |

    | 对服务器的更改或 | `SERVER_OBJECT_CHANGE_GROUP` |

    | 对服务器的访问 | `SERVER_OBJECT_PERMISSION_CHANGE_GROUP` |

    |  | `SERVER_OBJECT_OWNERSHIP_CHANGE_GROUP` |

    |  | `SERVER_PERMISSION_CHANGE_GROUP` |

    |  | `SERVER_PRINCIPAL_CHANGE_GROUP` |

    |  | `SERVER_PRINCIPAL_IMPERSONATION_GROUP` |

    |  | `SERVER_STATE_CHANGE_GROUP` |

    |  | `DBCC_GROUP` |

    | 服务器操作 | `SERVER_OPERATION_GROUP` |

    |  | `SERVER_STATE_CHANGE_GROUP` |

    |  | `BACKUP_RESTORE_GROUP` |


    由于 HIPAA 的重点是控制对数据的访问，因此需要创建数据库级别的审计操作。


    应对可以访问 PHI 的数据库架构或对象上的`SELECT`操作进行审计。因为这些数据库级别的审计操作对每个数据库都是特定的，所以需要为每个包含 PHI 的数据库进行规划。


    虽然 SOX 和 HIPAA 都是管辖美国公司的法律，但其他国家也有类似的标准，例如加拿大的 Bill 198、日本的 J-SOX 或德国的《公司治理准则》。


    全球性的行业特定标准，如支付卡行业数据安全标准也存在。


    这些标准将规定需要审计什么以满足法律的合规要求。


    ## SQL Server 2012 中的新审计功能


    随着 SQL Server 2012 的发布，微软对其审计功能进行了改进和增强，包括增加或改进审计过滤和用户定义审计，并将一些审计功能引入标准版。这些功能将在以下部分详细介绍。


    ### 标准版的服务器级别审计


    当 SQL Server 审计在 SQL Server 2008 中引入时，它是仅限企业版的功能。虽然完全细粒度的审计在 SQL Server 2012 中仍然是仅限企业版的功能，但服务器级别审计在标准版中可用。这使得运行
    SQL Server 标准版的公司能够审计服务器访问、数据库备份和还原、以及与安全相关的事件。


    ### 审计日志失败选项


    为了确保满足合规性要求，一些公司可能强制要求对信息进行审计。SQL Server 2012 中审计的一个新功能允许数据库专业人员定义如果服务器无法记录事件时应如何处理。这在服务器审计中的`ON_FAILURE`服务器选项中定义。有三个选项可用：服务器可以关闭、单个操作可以失败，或者服务器可以继续运行。


    `ON_FAILURE`和`QUEUE_DELAY`选项既可以在 SQL Server Management Studio 中设置，也可以通过 T-SQL
    设置。这些选项的语法将在本章后面介绍。


    ### 最大滚动文件数


    审计可能生成大量数据，因此能够设置最大文件大小和最大滚动文件数使组织可以控制审计将占用的空间量。


    这些控制通过`MAXSIZE`和`MAX_ROLLOVER_FILES`选项指定。`MAXSIZE`选项定义每个审计日志文件的最大文件大小。`MAXSIZE`选项可以设置为兆字节（`MB`）、千兆字节（`GB`）或太字节（`TB`）。`MAX_ROLLOVER_FILES`选项定义审计文件的大小。一旦达到`MAX_ROLLOVER_FILES`限制，超过该大小的最旧的额外文件将被删除，服务器将继续运行。


    在 SQL Server 2008 中，有选项可以在日志文件达到定义大小后滚动，或者有无限数量的日志文件。SQL Server 2012 允许日志文件滚动，并限制日志文件的数量。`MAXSIZE`和`MAX_ROLLOVER_FILES`选项既可以在
    SQL Server Management Studio 中设置，也可以通过 T-SQL 设置。本章后面将展示这两个选项的示例。


    ### 用户定义审计


    SQL Server 2012 现在允许数据库专业人员编写将信息发送到审计日志的应用程序。这为数据库管理员提供了灵活性，可以记录自定义应用程序信息以进行审计，以及标准的
    SQL Server 审计信息。使用用户定义审计功能的示例将在本章后面介绍。


    ### 审计过滤

