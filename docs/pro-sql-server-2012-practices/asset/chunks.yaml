- fmt: '# Bulk Copy Process


    Bulk Copy Process (`BCP`) is a utility that enables data to be copied from a data
    source to or from a file. Run at the command line, simple parameters are enabled
    to state the source and destination locations for the data. Optional use of a
    format file can be added to map the source and target more easily.


    Let’s say you have a table with a million rows and 200 columns and you need to
    move that data somewhere or share it with multiple users rather quickly. Or maybe
    you have 50 tables that need to be shared and their combined data size is in the
    hundreds of Gigabytes. How will you get that data distributed? For initial loads,
    `BCP` is often a viable option when dealing with large amounts of data.


    Using `BCP` is simple. You create and execute a `BCP` command at either the target
    or the source, depending on whether you are creating a data file for export or
    importing a data file. A host of options are available to customize the processing,
    including the ability to indicate a query for a subset of data from a table.


    The benefits of using `BCP` include:


    *   Simple, command-line execution

    *   Provision for reading and generating `XML` and text formats for ease in mapping
    data fields


    Its limitations are:


    *   A `BCP` command applies to a single table only.

    *   Manual mapping is required if you’re not using a format file.

    *   No troubleshooting or maintenance tools are included.


    Following are ways in which to apply `BCP` in our four scenarios:


    ### SCENARIO 1: Global Organization

    If satellite offices require subsets of the data only on an occasional basis,
    `BCP` might be an option for transferring those limited datasets. Data files for
    export could be created on a scheduled basis (ex: weekly) and offices could import
    those files as needed. `BCP` is used under the covers for applying snapshots in
    replication.


    ### SCENARIO 2: High-Volume Reporting Needs

    `BCP` would not help in this scenario.


    ### SCENARIO 3: Overnight Processing Jobs

    `BCP` would not help in this scenario.


    ### SCENARIO 4: Hardware Failure

    Although `BCP` would not provide any help in the event of a service or hardware
    failure, it could be used to create files for all tables in a database. Those
    files could be used to “restore” the data for any table, but a format file for
    each table would also need to be used.


    # Choosing the Right Deployment


    There will be times when one solution seems to be the perfect fit for the needs
    of your company or process, and you have the resources at hand to implement it
    easily. Treasure those times! More often, there will be compromises and concessions
    that need to be made along the way. I have seen it happen that management decides
    it needs one implementation, but in reality, once all of the requirements and
    resources have been laid out, it turns out a different implementation is needed.


    Tables 11-1a and 11-1b—actually, one table split into two in order to fit onto
    the page—can help you decide which approach to take in a situation in which data
    needs to be replicated to or from another database. Choose your database edition
    and the features you need in the left column. Look for occurrences of “Yes” in
    the other columns to help you identify which of the solutions talked about in
    this chapter will cover your needs.


    Table `11-1a`. Replication Decision Factors, Part 1


    | Replication | Peer-to-Peer | Transactional | Merge | Custom ETL | BCP |

    | :--- | :--- | :--- | :--- | :--- | :--- |

    | SQL Express Edition | Subscriber only | Subscriber | Yes | Yes | Only |

    | SQL Standard Edition | Yes | Yes | Yes | Yes | Yes |

    | SQL Enterprise Edition | Yes | Yes | Yes | Yes | Yes |

    | SQL BI Edition | Yes | Yes | Yes | Yes | Yes |

