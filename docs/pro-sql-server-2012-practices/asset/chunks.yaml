    Give the alert an easily identifiable name. “Corruption Alert” isn’t nearly as
    specific as “Error 823.”


    Choose the database the alert is for carefully. For each event alert, you can
    choose to monitor one database, or all databases on the instance. Be aware that
    some events, such as database restores, cannot take place in the database they
    are executing an action in, and must be set against another database.


    There are thousands of error numbers in SQL Server, and setting up an alert for
    each one is not necessary. However, some errors are very critical and can warn
    you of impending disaster, such as disk corruption. Errors 823, 824, and 825 are
