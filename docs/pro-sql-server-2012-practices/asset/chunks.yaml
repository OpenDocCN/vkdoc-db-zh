    At the very bottom of the hierarchy are records—specifically, data records.


    ***Figure 14-3.** Compression affects the way data is stored on disk. Row compression
    specifically alters the way* *data is stored at the record level.*


    To help you understand what happens when changes are made to a data record, I’ll
    start by examining a regular record. First I’ll make a database and a table so
    that I can create a data record and insert a record: IF EXISTS(SELECT NAME FROM
    SYS.DATABASES WHERE NAME=''demoInternals'')


    BEGIN


    ![Image 166](index-346_1.png)


    chapter 14 ■ page and row compression


    DROP DATABASE demoInternals


    END


    GO


    USE master


    GO


    CREATE DATABASE demoInternals


    GO


    USE demoInternals


    GO


    IF EXISTS(SELECT NAME FROM sys.tables WHERE NAME=''dataRecord'')


    BEGIN


    DROP TABLE dataRecord


    END


    GO


    CREATE TABLE dataRecord


    (myID INT


    ,myfixedData CHAR(4)


    ,myVarData1 VARCHAR(6)


    ,myVarData2 VARCHAR(9)


    ,myVarData3 VARCHAR(6)


    )


    GO


