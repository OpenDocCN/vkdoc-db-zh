    举个例子，在我早期担任顾问的一个项目中，我们正在为一家化工公司设计系统。我们收到的一个关键需求大致是：“产品仅在质量评级不低于100时才可销售。”于是，作为想取悦老板和客户的明星顾问程序员，我实现的数据库在评级为99.9999或更低时阻止发货，UI程序员也是如此。系统交付大约一周后，我们才得知真正的需求：“产品仅在质量评级不低于100时才可销售…或者客户因为需要而覆盖该评级。”
