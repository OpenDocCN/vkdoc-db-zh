  raw: 'The application log and system log differ by the level at which an event is
    logged. An event logged can be anything involving an exception, informational
    event, or critical systems failure. Note that systems failures are logged, but
    in some cases, such as critical dump exceptions, dump files are utilized to ensure
    the exception is captured for later review. This means some events may not be
    logged to the system log.


    Each logged event has a signature. The signature is either an OS-level component,
    or an application-level signature. Depending on where the event comes from, it
    is logged appropriately in order to be related in a logical container, either
    in the system or application log.


    Reviewing the logs daily for items marked Critical, Error, or Warning will help
    you be proactive. A great tool to help you collect logs from a server, filter
    them down, and search for errors is PowerShell.


    SQL Server Error Log


    You can gain some information about how SQL Server interacts with the operating
    system and other applications through Event Viewer. However, to truly understand
    what is going on in SQL Server, you’ll want to regularly review, and capture important
    information from, the SQL Server error logs.


    To access the logs in SSMS, expand Management, and then SQL Server Logs. You will
    see a list of all logs kept by SQL Server, as shown on the left side of Figure
    10-22\. To view a specific log, double-click the entry. You can also view the
    logs by going to <drive letter>:\Program Files\Microsoft SQL Server\ InstanceDirectory\MSSQL\Log.


    ![Image 133](index-272_1.png)


    chapter 10 ■ automating administration


    ***Figure 10-22.** Viewing SQL Server error logs*


    Upon startup, the authentication mode, service account, startup parameters, port
    number, and other information are captured. Normal operations are logged, including,
    but not limited to, databases starting up, database backups, restores of data
    files and log files, failed logins, DBCC commands, deadlocks, data or log files
    reaching maximum capacity, and more.


    Why is this important? You want to regularly check the error logs to catch potential
    problems before they arise, or soon after. You can log into the server, open SSMS,
    and read the error logs each day, but this gets tiring and tedious. It is much
    better to automate the reading and searching of them. Setting up Agent alerts
    for high-priority errors, or those you want to ensure don’t cause problems in
    your environment, is a great way to accomplish this.


    SQL Server Agent Logs


    SQL Server Agent has its own set of error logs. To view Agent jobs, logs, and
    more, open SSMS and expand SQL Server Agent. To view the logs, expand Error Logs
    and double-click one to view it. You can see this in Figure 10-23\. To view the
    log of a specific job, double-click Job Activity Monitor to open it. Right-click
    a specific job and select View History.


    ![Image 134](index-273_1.png)


    chapter 10 ■ automating administration


    ***Figure 10-23.** Viewing the history for SQL Agent jobs*


    Failed Jobs


    One of the first things you will want to look for is jobs that have failed. This
    can happen for a variety of reasons, depending on what the job does. A backup
    may fail if it is being written across the network and loses connection. An index
    job may fail because you run out of space in tempdb to sort. A job can fail if
    the database is a state in which it cannot be accessed. You want to monitor the
    jobs that are failing, and determine why. After analysis, you can determine if
    it was a one-time or recurring failure. If it’s a one-time occurrence, you can
    decide if you need to rerun it or wait until the next scheduled job. If the job
    consistently fails, you can decide if the timing is incorrect, or perhaps the
    job needs to be rewritten. This is the power of automation: you can be more proactive.


    Long-Running Jobs


    Another element you can track in the Agent logs is the duration of a job. You
    will soon become familiar with the average length of time it takes to execute.
    Some jobs (backups, restores, index rebuilds, etc.) you will expect to take longer
    as the database grows in size. However, what if you have a normal amount of growth
    but an abnormal run time? Seeing this information and tracking it can help you
    prevent a problem from occurring in the future. You are also able to track the
    job history by step, so if a failure occurs, you know at exactly what point it
    happened.


    chapter 10 ■ automating administration


    Drive Space


    Something that is almost certain with every database is that it will grow in size.
    Depending on the application and the data stored, that growth could be slow or
    quick. Both the data and the log files will grow. In addition to user databases,
    you also need to be watchful of the system databases, especially tempdb, as it
    is used for many operations.


    The first thing to automate with databases is their autogrow settings. You will
    want to verify these are configured appropriately for each database created on
    your server, and monitor both data and log files. I also recommend checking the
    settings in model on each server you manage, to ensure that any databases created
    follow your standards. This will ensure that you do not have to manually expand
    every database and every log file as they grow. These settings can be found by
    connecting to SQL Server through SSMS, expanding Databases, right-clicking the
    database name, selecting Properties, and selecting Files. The Autogrow/Maxsize
    column will tell you the settings for that database, and you can click the ellipses
    on the right of that field to change the settings.


    You’ll also want to ensure your databases are in the correct recovery model for
    your environment, and if in Full or Bulk-Logged that you are automating log backups.
    You can check the recovery model in Properties, on the Options tab, and reviewing
    Recovery Model at the top. Remember, each user database is unique and requires
    unique settings given the data storage purposes it has been created for.


    Disk Space


    The saying is that disk space is cheap. However, it’s still finite. You need to
    set up a process that will notify you if your drives are approaching their limits.
    You can then plan whether you need to move a database to another server or drive,
    separate data and log files onto different drives, set up partitioning, or remove
    databases that are no longer needed. A combination of DMVs and PowerShell can
    be used to monitor disk space.


    Database File Limits


    You’ll also want to know if your data and log files are approaching their maximum
    sizes. Setting the autogrow limits will help you manage this growth. Being alerted
    when files are nearing their limits makes you proactive. You can expand a file
    before a user gets an error saying the database is out of space and contacts you
    to fix the problem.


    One way to manage getting advance notice that a file is approaching its limit
    is to have a weekly report that sends the DBA team the list of data and log files
    that are within 10 percent of their maximum. Then, you can expand the files and
    double-check autogrow settings. Even databases that are set for unlimited growth
    should be monitored and manually changed, so you are in control of the process.
    Conversely, you can also report databases that are large and not using much space.
    Perhaps they were very large once for a data load, or a log file grew for an operation.
    Reducing the size saves disk space and money.


    Backups and Restores


    SQL Server backups are the cornerstone of your disaster recovery plan, because
    a company’s data is its business. You need to back up your databases to ensure
    that if anything were to happen—whether it be a natural disaster that destroys
    your data center or a developer dropping a database—you can recover the data to
    the point of the last backup.


