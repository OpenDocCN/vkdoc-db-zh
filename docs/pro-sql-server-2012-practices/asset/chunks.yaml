  trans: "\n# 第 13 章：I/O——未被讲述的故事\n\n## I/O 性能考量\n\n你通常掌握着关于自身环境的关键特性，并可以利用这些特性来配置\
    \ `SQLIO` 测试。此实用程序用于测量磁盘吞吐量，并可配置为你感兴趣的 I/O 类型（读取或写入）、线程数量、以 KB 为单位的块大小（IOP 大小）以及许多其他因素。它将测试连续读取和/或写入以及随机读取和/或写入。运行此测试对磁盘子系统具有侵入性——**切勿**在业务繁忙时段运行。如果你运行此测试，修改队列深度，然后再次运行，你就能为特定硬件上的特定工作负载找到理想的平衡点。可在此处找到该工具的下载链接：[`www.microsoft.com/en-us/download/details.aspx?id=20163`](http://www.microsoft.com/en-us/download/details.aspx?id=20163)。\n\
    \n在虚拟环境中工作时，关于 I/O 工作负载的考量有所不同，因为操作系统通常与你的数据文件运行在同一组磁盘轴上。这些额外的考量为你提供了机会，可以与你的虚拟化专家和存储专家合作，或许可以将环境中的操作系统所需\
    \ I/O 与你的数据库文件隔离开来。说明所需 I/O 的一个好方法是使用前面讨论的 `性能监视器` 数据以及我刚讨论的 `SQLIO` 工具。\n\n##\
    \ SQL Server 功能对 I/O 的影响\n\n`SQL Server` 的功能也会影响你的 I/O。一个很好的例子是备份压缩。当你使用备份压缩时，写入数据文件所需的\
    \ I/O 请求会减少，因为它在写入磁盘之前已在内存中被压缩。另一个 `SQL Server` 功能是快照隔离，它使 `SQL Server` 能够使用乐观锁而非默认的悲观锁定方案。两者差异显著。悲观锁定可被视为\
    \ `串行化` 的，意味着一次只能对一列进行修改。而通过乐观锁，Microsoft 引入了一种允许多个请求同时修改同一列的方法。这在上下文中之所以重要，是因为快照隔离所需的行版本存储位于\
    \ `TempDB` 数据库中，并且可能大量使用 `TempDB`，从而增加了你的 I/O 占用空间。再次强调，这是一个极好的功能，但必须在你的特定环境中进行测试。\n\
    \n> **注意** 我通过在启动时实施跟踪标志 `–T1118`，成功地在 `TempDB` 中配合快照隔离提高了吞吐量和并发性。你可以在 [`support.microsoft.com/kb/2154845`](http://support.microsoft.com/kb/2154845)\
    \ 了解更多信息。\n\n## I/O 的硬件创新\n\n在过去的几年里，有几家公司已站在 I/O 性能的前沿。我曾有幸使用过来自 Fusion-io 的产品，它们提供了极快的\
    \ I/O 吞吐量。我已将 Fusion-io 卡用于 `TempDB`、文件存储甚至事务日志。使用 Fusion-io 卡可以实现的吞吐量远超传统磁盘轴，但真正的价值在于其降低的延迟。\n\
    \n其入门级产品的延迟以微秒为单位测量。考虑到 I/O 时间通常以毫秒为单位测量，这相当令人印象深刻。如果你正在考虑购买此产品或类似产品，那么需要超低延迟的数据文件将受益于此类存储。\n\
    \n## 压缩在 I/O 性能中的作用\n\n压缩是另一个可以提升 I/O 吞吐量以及与 I/O 相关的整体数据库性能的功能。有两种主要的压缩类型需要了解。第一种是\
    \ `备份压缩`。创建备份时，你可以选择压缩备份。这减少了需要写入磁盘的数据量。第二种是 `数据压缩`。数据压缩主要有两种形式：行压缩和页压缩。第 14 章将深入探讨数据压缩的细节，但就本章目的而言，你需要知道的是，如果应用得当，数据压缩可以显著提高数据库吞吐量、降低延迟（读取和写入时间）并改善数据库服务器的响应时间。它还可能减轻你可能遇到的内存压力。使用数据压缩的理由有许多注意事项，决定以何种方式压缩哪些表和索引至关重要。因此，请务必阅读有关此主题的章节并花时间进行测试。\n\
    \n## 通过分区减少 IOPS\n\n分区是降低 IOPS 的另一个绝佳途径。简而言之，分区类似于将你的表拆分成许多不同的表。一个简单的例子将帮助你理解分区的价值，更重要的是，理解\
    \ `分区消除` 的概念。\n\n以具有 `TransactionDate` 列的 `Transactions` 表为例。在此表中，假设你有一百万条记录，时间范围从\
    \ 2005 年到 2010 年（五年）。出于此示例的目的，假设每年的数据分布是相同的。每年有 250,000 笔交易（行）。当你运行类似以下的查询时：\n\
    \n```\nSELECT COUNT (*), Convert(date, TransactionDate) as TransactionDate \n\
    FROM Transactions \nWHERE TransactionDate BETWEEN '06/01/2005' AND '06/01/2006'\n\
    ```\n\n数据库引擎将需要访问根级别和中间级别的 `n` 个页面。\n\n如果在此表上实施了分区——特别是基于 `TransactionDate` 列——你就可以减少\
    \ `SQL Server` 需要评估你的特定查询时所涉及的数据足迹。思考此分区概念的另一种方式，类似于拥有多个包含 `Transactions` 表中数据的表。在此示例中，如果你每年有一个\
    \ `Transactions` 表，`SQL Server` 的工作量将显著减少。但这也会使 T-SQL 实现或分布式分区视图（DPV）的实现变得具有挑战性，所以让我们保持简单，仅对表进行分区，让\
    \ `SQL Server` 消除它不需要读取的数据。有许多优秀的资源可供你进一步学习此主题，我最喜欢的一个可以在 [`msdn.microsoft.com/en-us/library/dd578580(v=sql.100).aspx`](http://msdn.microsoft.com/en-us/library/dd578580(v=sql.100).aspx)\
    \ 找到。关于 `SQL Server 2012` 的具体细节，包括与先前版本相比在表可包含分区数量方面的变化，可以在 [`msdn.microsoft.com/en-us/library/ms190787.aspx`](http://msdn.microsoft.com/en-us/library/ms190787.aspx)\
    \ 找到。\n\n## 结论\n\n有时，对于你们中许多人日常经历的数据量增长，没有简单的答案。然而，有现成的工具可以帮助你定义并清晰阐述你的具体情况。也有一些设计考量，你可以帮助引入或实施到你的环境中。这一切始于了解你的\
    \ IOP 模式，并能够随时讨论它。\n\n然后，着手实践你从本章中收集到的想法。你的 IOP 模式会随着时间的推移以及新功能和新特性的出现而改变。保持你的\
    \ IOD 配置文件是最新的，邀请你的存储专家共进午餐，与你的同行建立沟通和信任的桥梁。不知不觉中，你将能够直视这只 800 磅重的 I/O 大猩猩的眼睛而不眨眼。\n\
    \n# 第 14 章：页和行压缩\n"
- fmt: '# By Bradley Ball


    The first question that needs to be answered about page and row compression is
    the most important. Why should you use it? After all, hard-drives and disks are
    cheap, right?


    You hear that all the time—disks are cheap, or storage is cheap. It certainly
    isn’t as expensive as it was 10 years ago. You can walk down to your nearest retailer
    on Black Friday, an American Shopping holiday, and purchase a 2-terabyte (TB)
    hard drive for under $100. In some cases, you can find solid-state disks of the
    same size for a little more. I would wager a guess that you do not go out and
    buy the hard drives for your production servers on Black Friday, or any other
    shopping holiday. Even if you did, these disks are not designed to work in storage
    area network (SAN), devices. When you purchase a SAN, you’re typically looking
    at an expense of thousands of dollars. If you have multiple SANs, you might have
    a SAN administrator or two. Before you know it, those disks start to add up.


    Then you have the databases you manage. You probably don’t manage just one database
    or one SQL instance. You might have the same database in Production, Staging or
    QA, or Development, or you might have a Continuation of Operations Planning/Disaster
    Recovery (COOP/DR) server. Administrators often strive to eliminate data duplication
    within a database, but it is a necessary part of proper content management to
    have duplicated copies of data in multiple environments. When you start thinking
    about all of that data for all of the many systems you manage, you quickly see
    how compression can save you space—not just on a single table in a single database,
    but across your entire corporate SQL Server enterprise.


    Space savings in your database are just one reason to consider using page and
    row compression. You also reduce the memory footprint required for you database,
    the logical IOs from queries, your backup size, and your backup time.


    **Tip** I cannot tell you how many times I give a presentation on compression
    and afterwards someone says something along the lines of, “Is it bad if I compress
    my entire database?”.


    Yes, Dear Reader, it is. However, I like to reply with a question and ask if they
    would compress their entire `C:` drive on their laptop? Sure it will save you
    space, but unless you’re on a powerful computer it will drag down your whole operating
    system, because you’re performing compression operations on all data regardless
    of whether it is suited for compression or not.


    ![Image 163](index-343_1.png)


    ## Chapter 14 ■ Page and Row Compression


    Similarly, you don’t want to compress the entire contents of a database unless
    that data is compatible with compression. The cost of compression is additional
    CPU cycles and most servers have cycles to spare, but you don’t want to waste
    them needlessly. Rarely will you find a database where compressing every single
    table is a good idea.


    99.99 percent of databases should not be fully compressed. You might be in the
    00.01 percent, but I wouldn’t bet on it. Wasting CPU cycles can cause scalability
    issues for your database at a future date.


    As we will discuss, there are certain specific things you can do to find what
    you should and should not compress in your database.


    ## Before You Get Started


    Before you can begin enabling page and row compression, there are a couple of
    basic considerations to think about. First you need to use an edition of SQL Server
    2012 that supports page and row compression, and you need to ensure that you will
    not need to restore that database on a lower version, such as Microsoft SQL Server
    2012 Standard Edition. Once the basic compatibility issue is out of the way, you
    also need to consider exactly what data to compress and how to do it.


    Most importantly: Know Thy Data! Knowledge of the data types that are used on
    tables, and the type of data that is stored within them, can make a big difference
    in determining what you should compress.


    ### Editions and Support


    Compression is an enterprise-level feature. This means that you must be using
    SQL Server 2012 Enterprise Edition or Developer Edition for page and row compression
    to be available to you. This also means that if you enable compression on an Enterprise
    Edition SQL instance and try to restore that database to a standard-level instance,
    it will fail.


    **Figure 14-1.** You can use DMV `sys.dm_persisted_sku_features` to find what
    Enterprise Edition features are enabled on your database.


    ![Image 164](index-344_1.png)


    ## Chapter 14 ■ Page and Row Compression


    If you need to move an Enterprise Edition database to a lower edition, you can
    run the following query to see if there are any Enterprise Edition features currently
    enabled on the database.


    ```sql

    SELECT

    feature_name

    ,feature_id

    FROM

    sys.dm_db_persisted_sku_features;

    ```


    Running this will not only tell you if compression is enabled, but it will inform
    you of any other Enterprise Edition feature that is enabled, as you can see from
    Figure 14-1.


    ### What to Compress and How to Compress It


    So what can you compress inside of your database? You can compress heaps (base
    tables without a clustered index), clustered indexes (base tables ordered by a
    clustered index), nonclustered indexes, and objects by partition.


    You might be wondering what I mean by “objects by partition” This means that if
    you have a table that uses multiple table partitions, you can compress each partition
    using a different level of compression: `Page`, `Row`, or `None`. In addition,
    if you have a partitioned nonclustered index, you can also compress each partition
    using a different level of compression. See Figure 14-2 for more details.


    **Figure 14-2.** You can compress your partitioned tables differently by partition.
    You can also compress partitioned nonclustered indexes by partition as well.


    So you can compress heaps, clustered indexes, nonclustered indexes, and objects
    by partition, but *how* do you compress them? There are two different ways to
    apply compression. First, you can specify the level of compression you want to
    use upon creation of the object. Second, you can rebuild a heap, clustered index,
    or nonclustered index and specify the level of compression you want to use. The
    ability to rebuild a heap was first introduced in SQL Server 2008. The concept
    is the same as rebuilding an index.


    ![Image 165](index-345_1.png)


    ## Chapter 14 ■ Page and Row Compression


    When a heap is rebuilt, the structure is completely re-created on new data pages.
    While this occurs, any fragmentation or forwarding pointers caused by inserts,
    updates, or deletes are eliminated, and the specified compression level is fully
    applied.


    ```sql

    ALTER TABLE dbo.heap

    REBUILD WITH(data_compression=Page)

    GO

    ```


    Once an object is rebuilt using compression, the compression-level selection is
    inherited in any future rebuild operation. The only time the compression level
    changes is when you specify a new compression level in a rebuild command. From
    then on, that new setting will be inherited.


    There are three different levels of compression: `Page`, `Row`, and `None`. `None`
    is the regular noncompressed format that you are used to using every day. But
    it is important to know that if you can compress your data, you can uncompress
    it as well. As far as page and row compression is concerned, let’s dive a little
    deeper.


    ## Row Compression


    We’ll start our dive into data compression with row compression. Row compression
    is the lowest level of compression that will be applied to a SQL Server table,
    regardless of the compression level specified. Later, when I discuss page compression,
    I’ll detail how it is a superset of row compression.'
