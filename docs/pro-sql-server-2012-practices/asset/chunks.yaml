    EXEC @ReturnCode = msdb.dbo.sp_add_jobserver @job_id = @jobId, @server_name =
    N''(local)''


    IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback


    COMMIT TRANSACTION


    GOTO EndSave


    QuitWithRollback:


    IF (@@TRANCOUNT > 0) ROLLBACK TRANSACTION


    EndSave:


    GO


    With that script run on every single server, all that remains to be done is to
    test the process. To see changes in the database I’ve been using, I’m going to
    create a table for the database: CREATE TABLE dbo.ChangingData


    (ID INT IDENTITY(1, 1),


    Val VARCHAR(50)


    );


    Then I’m going to add a row, wait until a log backup has been run, and then add
    another row: BEGIN TRANSACTION


    INSERT INTO dbo.ChangingData


    (Val)


    VALUES (''First Row'');


    COMMIT TRANSACTION


    WAITFOR DELAY ''00:04'';


    ![Image 190](index-396_1.png)


    Chapter 16 ■ BaCkups and restores using availaBility groups


    ***Figure 16-14.** Log backups completing on one of the replicas.*


    BEGIN TRANSACTION


    INSERT INTO dbo.ChangingData


    (Val)


    VALUES (''Second Row'');


    COMMIT TRANSACTION


    With all that in place, I can identify which of the replicas is currently my primary.
    In my case, it’s SQLFIVE. I can see the log backups that have been running by
    looking at the drive on that server. as you can see in Figure 16-14.


    And that’s all it takes to set up the backups on an Availability Group. You can
    see the backups occurring, but the only way to know for sure that a backup has
    worked is to recover the database.


    Recovery on Availability Groups


    The entire purpose of the Availability Group is to provide a mechanism whereby
    the databases that have been configured to be a part of the group are always available.
    This is done primarily through the process of automatic failover from one of the
    replicas to another. The very concept suggests that you no longer need backups
    at all. Keep in mind, though, Availability Groups are a means of maintaining high
    availability. They supplement your disaster recovery (DR) plans, but they cannot
    completely replace the fundamental beginning of all DR efforts, backups. You’re
    still need to run your standard sets of backups.


    There is one problem with placing a database in an Availability Group. Once that
    database is a part of the group, you can no longer run a restore on that database.
    In fact, as far as the Availability Group is concerned, you wouldn’t want to.
    If a server went offline, a database was corrupted, or some other action caused
    the loss of connectivity to that replica, your other replicas are there to take
    up the load. And you can simply recover the system by getting it back online and
    rejoining the Availability Group. You’ll resynchronize with the Availability Group
    and continue on happily.


    However, what if you do need to go to the full-blown disaster recovery plan. You
    need to restore that database. Well, your processes haven’t changed much. Let’s
    walk through this.


    I have a full database backup that I took from my primary replica. I also have
    a series of backups taken against one of my secondaries. In a normal DR scenario,
    you can move these backups off-site from your primary location to protect them.
    In this case, I bring together my full backup and my log backups, both taken on
    different replicas, and combine them to restore a database to a point in time
    on a different server as a different database.


    First, I’ll restore the full backup:


    RESTORE DATABASE MMCopy


    ![Image 191](index-397_1.png)


    Chapter 16 ■ BaCkups and restores using availaBility groups


    FROM DISK = ''c:\bu\moviemanagement.bak''


    WITH NORECOVERY, MOVE ''MovieManagement'' TO ''c:\data\moviemanagement.mdf'',


    MOVE ''MovieManagement_Log'' TO ''c:\data\moviemanagement_log.ldf'';


    Now I can use some of the log backups that were created to recover this database
    to a point in time prior to the insertion of the second row of data:


    RESTORE LOG MMCopy


    FROM DISK = ''c:\bu\MovieManagement_log_2012_7_6_22_44''


    WITH NORECOVERY, STOPAT = ''7/6/2012 18:45'';


    RESTORE LOG MMCopy


    FROM DISK = ''c:\bu\MovieManagement_log_2012_7_6_22_46''


    WITH NORECOVERY, STOPAT = ''7/6/2012 18:45'';


    RESTORE DATABASE MMCopy


    WITH RECOVERY;


    ***Figure 16-15.** The data returned after restoring to a point in time prior
    to the second insert.*


    I can verify that I recovered the database to a point prior to the second insert
    by simply selecting data from the restored database:


    USE MMCopy;


    SELECT * FROM dbo.ChangingData;


    The data returned looks like Figure 16-15.


    Restoring to a point in time is no big deal. But you have to remember that the
    full backup that was used was from one server—specifically, my current primary
    replica, SQLTHREE. The log backups that were used were from a completely different
    server, SQLFIVE. I was able to take backups across multiple machines from within
    the Availability Group and then combine those backups at another location to restore
    a database.


    Conclusion'
