    它确实有帮助——虽然不大。物理读计数从3减少到2，但逻辑读（内存）从17减少到10。在这个案例中，它对物理I/O影响较小，但对内存I/O的影响更明显。


    关于`SET STATISTICS IO ON`的更多资源可以在[http://msdn.microsoft.com/en-us/library/ms184361.aspx](http://msdn.microsoft.com/en-us/library/ms184361.aspx)找到。如果你不熟悉这个选项，我建议你研究一下并把它加入你的工具箱。关于预读的更多信息可以在[http://msdn.microsoft.com/en-us/library/ms191475.aspx](http://msdn.microsoft.com/en-us/library/ms191475.aspx)找到。


    通过简单的语句`SET STATISTICS IO ON`，可以获得关于SQL Server如何尝试访问你的数据的宝贵数据集，该语句还会指出在特定查询中应关注哪个对象。


    ## Environmental Considerations


    在本章前面，我提到了许多会起作用并且即使在你自己的环境中也会有很大差异的变量。本章的这一部分将在较高层次上介绍更常见的变量。


    根据操作系统和SQL Server的版本，为SQL Server服务帐户授予“在内存中锁定页”的权限将阻止操作系统对SQL Server缓冲池中的数据进行分页。这可能对你的环境产生显著影响。根据我的经验，我最常在虚拟化的SQL
    Server实例中看到这种情况。


    另一个可以提高I/O吞吐量的设置是“执行卷维护任务”。此权限允许SQL Server进程即时初始化文件，这将在启动时减少创建`TempDB`所需的时间。它还有助于增量数据文件增长或创建新数据库时。请注意，此设置对事务日志没有影响——只有数据文件符合即时（零填充）初始化的条件。


    我在本章详细讨论了SAN，尽管技术在不断变化，但有几个主要的注意事项需要了解。第一个是控制器上缓存的配置方式。通常，SAN包含内存，这些内存通常由电池供电，使其可用作写入存储。通过这种方式，你的事务不必等待数据实际持久化到磁盘。相反，数据通过服务器、主机总线适配器（HBA）然后到达控制器。根据具体的SAN供应商、控制器和配置，你的数据很可能只写入内存，稍后再刷新到物理磁盘。这里重要的是你的环境中内存是如何配置的。许多供应商有某种自动平衡功能，但对于传统的数据库工作负载，缓存的主要用途最好配置在高写入模式。例如，如果你的控制器有1GB内存，从数据库工作负载的角度来看，最好是将大部分缓存分配给写入而不是读取。毕竟，你的数据库服务器有用于读取缓存的内存，但它不包含写入缓存。


    另一个与此密切相关的设置是你的HBA卡上的队列深度。这是使服务器能够连接到你的SAN的硬件组件。配置HBA卡的建议各不相同，并且取决于你的特定卡、SAN、服务器和工作负载。但值得注意的是，增加队列深度可以提高性能。与任何此类性质的事情一样，确保测试你特定的环境至关重要。目前的好消息是，你已知I/O性能……'
