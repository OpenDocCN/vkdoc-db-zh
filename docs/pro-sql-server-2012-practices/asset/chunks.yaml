    Custom ETL Using SQL Server Integration Services


    SQL Server Integration Services (SSIS) is an incredibly powerful tool in the SQL
    Server stack, allowing for the utmost flexibility in creating processes for moving
    or copying data from one source to another.


    Commonly called *ETL processing* (Extract, Transform, Load), SSIS is most often
    used for loading data warehouses. Through the use of custom control-flow and data-flow
    tasks, any data source can be copied or moved to another location. Business logic
    can also be used to limit or change the data in any way needed.


    If you have ever used the Data Import/Export Wizard in SQL Server Management Studio
    and saved the package at the end, you have created an SSIS package. The interface
    for working with SSIS is either Microsoft Visual Studio or Business Intelligence
    Development Studio (BIDS), a lighter weight version of Visual Studio. By using
    a single control flow that can branch out into multiple data-flow tasks, you take
    a dataset from its original format and location, massage the data to get it to
    look the way it needs to, and then save it in a new location.


    The benefits are that Integration Services does the following:


    •


    Provides for the highest level of customization


    •


    Incorporates business logic if needed


    •


    Allows secondary databases to be made available for use


    Its limitations are these:


    • You must rely on manual scheduling for execution.


    • Integration Services might require extended development resources for design,


    coding, and testing.


    •


    No troubleshooting or maintenance tools are included.


    Following are ways you can apply custom ETL solutions developed using Integration
    Services to our four scenarios:


    chapter 11 ■ the Fluid dynamics oF sQl server data movement


    **SCENARIO 1: Global Organization** Creating a customized ETL for global


    distribution can be a tedious project. If your satellite offices require only
    copies of the data, or subsets of the data, replication is likely a better option.
    However, if your offices need data that is based on the data at the primary location,
    but not


    the raw data itself, an SSIS project might be worthwhile.


    **SCENARIO 2: High-Volume Reporting Needs** Depending on the types of


