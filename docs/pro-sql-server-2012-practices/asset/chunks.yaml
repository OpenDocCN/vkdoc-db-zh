    that always contains a datetime where the date portion is midnight and a ShiftDetails
    table with a ShiftStartDate that has dates with time portions that are not midnight,
    and the join needs to be on the date. To optimize that query and to avoid the
    inequality join predicate you could add another column to the ShiftDetails table
    that stores the date only. This would likely be a persisted computed column. Of
    course, that assumes the application using those tables won’t break if another
    column is added.


    Fixing these kinds of problems in an existing system is very difficult and, in
    many cases, is not possible. It is far better to get a correct design up front
    with appropriate data type usage and properly normalized tables.


    Spills


    The third form of hidden performance problem that I want to discuss is the spill.
    Before I can explain what a spill is, I need to briefly explain what memory grants
    are.


    A *memory grant* is an amount of memory that the query processor will request
    before it starts executing the query. It’s additional memory that the query needs
    for things like hashes and sorts. The memory grant amount is based on the number
    of memory-requiring operations, on whether or not the query will be executed in
    parallel, and on the cardinality estimates in the execution plan.


    I don’t want to go too deep into the process of requesting and granting that memory;
    it’s not essential for the rest of this section. If you are interested in the
    topic, you can refer to the following blog entries for


    [further detail: http://blogs.msdn.com/b/sqlqueryprocessing/archive/2010/02/16/understanding-sql-](http://blogs.msdn.com/b/sqlqueryprocessing/archive/2010/02/16/understanding-sql-server-memory-grant.aspx)


    [server-memory-grant.aspx and http://www.sqlskills.com/blogs/joe/post/](http://blogs.msdn.com/b/sqlqueryprocessing/archive/2010/02/16/understanding-sql-server-memory-grant.aspx)


    e2809cMemoryGrantInfoe2809d-Execution-Plan-Statistics.aspx. Also, you can view
    the presentation that Adam Machanic did at the Pass S[ummit in 2011 (http://www.youtube.com/watch?v=j5YGdIk3DXw)](http://www.youtube.com/watch?v=j5YGdIk3DXw)


    The use of memory grants is all well and good, but those memory grants are based
    on cardinality estimates and estimates can be wrong. So what happens when they
    are wrong?


    Let’s compare two examples, one with an accurate estimate and one with a badly
    inaccurate one. (I’ll use some hints to force a bad estimate because it’s both
    easier and more repeatable than creating actual stale statistics or simulating
    other conditions that result in poor estimates.)


    The two plans look identical, so I’m not going to show them (two index seeks,
    a hash join, and a select). I’ll just show the properties of the hash joins and
    of the selects for the two.


    The first query, with accurate estimations, is shown in Figure 3-25.


    The second query, with poor estimations, is shown in Figure 3-26.


    Ignore “Estimated Number of Rows 1” on the tooltip of the select. That shows up
    because the outer select was a COUNT (*).


    ![Image 34](index-77_1.png)


    ![Image 35](index-77_2.png)


    chapter 3 ■ hidden performance Gotchas


    ***Figure 3-25.** Accurate estimations.*


    If you take a look at those, the first hash join has an estimated row count of
    35 million and an actual


    ***Figure 3-26.** Inaccurate estimates.*


    ![Image 36](index-78_1.png)


    chapter 3 ■ hidden performance Gotchas


    row count of 35 million. To do the hash join (which was a many-to-many join),
    the query was granted 450


    MB of workspace memory.


    The second query has an estimated row count of 6,000 rows and an actual row count
    of 35 million. The memory grant that the query execution engine requested was
    based on that estimate, and was 1.5 MB. If the first query required 450 MB to
    do the hash join, the second is not going to be able to do it in 1.5 MB. So what
    happens? Figure 3-27 shows the result.


    A hash spill happens. I won’t go into the complexities of hash spills here because
    that’s beyond the scope of this chapter, but in short, portions of the hash table
    are written to TempDB and then read back when necessary. This can happen once
    or it can happen repeatedly during the execution of the query.


    ***Figure 3-27.** Hash warnings viewed via SQL Profiler.*


    As I’m sure you can imagine, that’s not going to be good for performance. Memory
    is many times faster than disk and having to write and re-read portions of what
    should be an in-memory structure is going to make the query run slower than it
    otherwise would. In this example, the query that didn’t spill took on average
    8 seconds to run and the query that did spill took on average 10 seconds. That’s
    not a huge difference, but that was on a machine with a single user and no other
    appreciable I/O load.


    In addition to the hash spill, there are other operations that can spill—sorts
    and exchanges being the most common. Spools also use TempDB, but that’s not so
    much a spill as the fact that a spool is, by definition, a temporary structure
    in TempDB.


    The obvious outstanding questions are how do you detect these spills, what do
    you do about them, and how do you prevent them?


    Detecting hash spills is the easy part. There are three SQLTrace events that fire
    in response to hash spills, sort spills, and exchange spills. They are hash warnings,
    sort warnings, and exchange warnings, respectively.


    Those trace events show only that a spill has happened; they don’t say anything
    about how much data was spilled to TempDB. To detect that information, you need
    to turn to the Dynamic Management Views—


    specifically, to sys.dm_db_task_space_usage and sys.dm_db_session_space_usage.
    I’ll use the second one because it is a little easier. The first one shows data
    only for currently executing queries. The second one shows data for currently
    connected sessions.


    SELECT es.session_id ,


    user_objects_alloc_page_count ,


    internal_objects_alloc_page_count ,


    login_name ,


    program_name ,


    host_name ,


    last_request_start_time ,


    last_request_end_time ,


    DB_NAME(dbid) AS DatabaseName ,


    text


    FROM sys.dm_db_session_space_usage AS ssu


    INNER JOIN sys.dm_exec_sessions AS es ON ssu.session_id = es.session_id


    INNER JOIN sys.dm_exec_connections AS ec ON es.session_id = ec.session_id


    LEFT OUTER JOIN sys.dm_exec_requests AS er ON ec.session_id = er.session_id


    chapter 3 ■ hidden performance Gotchas


    CROSS APPLY sys.dm_exec_sql_text(COALESCE(er.sql_handle, ec.most_recent_sql_handle))
    AS


    dest


    WHERE is_user_process = 1


    This query tells you how much space in TempDB any current connection has used,
    along with either the currently running command or the last command that was run.


    Using that on the earlier example, I can see that the query that didn’t spill
    had 0 pages allocated in TempDB. The query that did spill had 0 pages of user
    objects and 10,500 pages of internal objects—that’s 82 MB. (A page is 8 KB.)


    That query can be scheduled to check for any processes that are using large amounts
    of TempDB


    space and to log any excessive usage for further investigation. Large amounts
    of internal allocations don’t necessarily indicate spills, but it’s probably worth
    investigating such readings. (Large amounts of user allocations suggests temp
    table overuse.)


    On the subject of fixing spills, the first and most important point is that spills
    cannot always be prevented. Some operations will spill no matter what. A sort
    operation is the poster child here. If you imagine a sort of a 50-GB result set
    on a server with only 32 GB of memory, it’s obvious that the sort cannot be done
    entirely in memory and will have to spill to TempDB.


    Tuning spills has three major aspects:


    •


    Prevent unnecessary spills caused by memory grant misestimates.


    •


    Minimize the number of operations that have to spill.


    •


    Tune TempDB to be able to handle the spills that do happen.'
  trans: "\n我在本节开头所举的例子中，有一个包含 `Shifts` 表的场景，该表的 `ShiftStartDate` 列始终包含一个时间部分为午夜零点的日期时间值；而另一个\
    \ `ShiftDetails` 表的 `ShiftStartDate` 列则包含时间部分非午夜零点的日期值。当需要按日期进行连接时，这种差异会导致问题。为了优化该查询并避免使用不等式连接谓词，你可以向\
    \ `ShiftDetails` 表中添加另一个仅存储日期的列。这很可能是一个持久化计算列。当然，这假设了使用这些表的应用程序在增加新列后不会出错。\n\n\
    在现有系统中修复此类问题非常困难，并且在许多情况下是不可能实现的。更好的做法是在设计初期就采用正确的数据类型使用方式和适当规范化的表结构。\n\n## 溢出\n\
    \n我想讨论的第三种隐藏性能问题是**溢出**。在解释什么是溢出之前，我需要先简要说明**内存授权**是什么。\n\n**内存授权**是查询处理器在开始执行查询前将要请求的内存量。它是查询执行哈希和排序等操作所需的额外内存。内存授权量基于需要内存的操作数量、查询是否将并行执行以及执行计划中的基数估算值。\n\
    \n我不想过深地探讨请求和授予该内存的过程；这对于本节其余部分并非必需。如果你对此主题感兴趣，可以参考以下博客文章以获取更多细节：http://blogs.msdn.com/b/sqlqueryprocessing/archive/2010/02/16/understanding-sql-server-memory-grant.aspx\
    \ 和 http://www.sqlskills.com/blogs/joe/post/e2809cMemoryGrantInfoe2809d-Execution-Plan-Statistics.aspx。此外，你还可以观看\
    \ Adam Machanic 在 2011 年 PASS 峰会上所做的演示：http://www.youtube.com/watch?v=j5YGdIk3DXw\n\
    \n内存授权的使用本身是好的，但这些授权基于基数估算，而估算可能出错。那么当估算错误时会发生什么呢？\n\n让我们比较两个例子，一个估算准确，另一个估算严重不准确。（我将使用一些提示来强制产生错误估算，因为这比创建实际的过时统计信息或模拟其他导致不良估算的条件更容易且更可重复。）\n\
    \n这两个执行计划看起来一模一样，因此我不打算展示它们（都是两次索引查找、一个哈希连接和一个 SELECT）。我只展示这两个查询中哈希连接和 SELECT\
    \ 的属性。\n\n第一个查询（估算准确）如图 3-25 所示。\n第二个查询（估算不佳）如图 3-26 所示。\n\n忽略 SELECT 工具提示上的 `“估计行数\
    \ 1”`。它出现是因为外部 SELECT 是一个 `COUNT(*)`。\n\n![Image 34](img/index-77_1.png)\n\n![Image\
    \ 35](img/index-77_2.png)\n\n**图 3-25.** 估算准确\n\n观察这些属性，第一个哈希连接的估计行数为 3500 万，实际行数也为\
    \ 3500 万。为了执行这个哈希连接（一个多对多连接），查询被授予了 450 MB 的工作区内存。\n\n**图 3-26.** 估算不准确\n\n第二个查询的估计行数为\
    \ 6000 行，实际行数为 3500 万。查询执行引擎请求的内存授权基于该估算值，仅为 1.5 MB。如果第一个查询需要 450 MB 来执行哈希连接，那么第二个查询显然无法在\
    \ 1.5 MB 内完成。结果会怎样呢？图 3-27 显示了结果。\n\n发生了**哈希溢出**。我不会在此深入探讨哈希溢出的复杂性，因为这超出了本章的范围，但简而言之，哈希表的某些部分被写入\
    \ `TempDB`，并在必要时重新读回。这种情况可能发生一次，也可能在查询执行过程中反复发生。\n\n![Image 36](img/index-78_1.png)\n\
    \n**图 3-27.** 通过 SQL Profiler 查看的哈希警告\n\n正如你可以想象的那样，这对性能没有好处。内存比磁盘快许多倍，而不得不将本应是内存中结构的部分数据写入并重新读取，会使查询运行速度比正常情况下更慢。在这个例子中，未溢出的查询平均耗时\
    \ 8 秒，而发生溢出的查询平均耗时 10 秒。虽然这个差异不算巨大，但这是在单用户且无其他明显 I/O 负载的机器上得出的结果。\n\n除了哈希溢出，还有其他操作也可能发生溢出——最常见的是排序和交换。临时表也会使用\
    \ `TempDB`，但这与其说是溢出，不如说是临时表本身就是 `TempDB` 中的一种临时结构。\n\n显而易见的关键问题是：如何检测这些溢出？如何处理它们？以及如何预防它们？\n\
    \n检测哈希溢出是相对容易的部分。有三个 `SQL 跟踪`事件分别响应哈希溢出、排序溢出和交换溢出而触发。它们分别是 `哈希警告`、`排序警告` 和 `交换警告`。\n\
    \n这些跟踪事件仅表明发生了溢出；它们并未说明有多少数据被溢出到 `TempDB`。要检测这方面的信息，你需要转向动态管理视图——具体来说是 `sys.dm_db_task_space_usage`\
    \ 和 `sys.dm_db_session_space_usage`。我将使用第二个视图，因为它稍微简单一些。第一个视图仅显示当前正在执行的查询的数据。第二个视图显示当前已连接会话的数据。\n\
    \n```sql\nSELECT es.session_id ,\n       user_objects_alloc_page_count ,\n   \
    \    internal_objects_alloc_page_count ,\n       login_name ,\n       program_name\
    \ ,\n       host_name ,\n       last_request_start_time ,\n       last_request_end_time\
    \ ,\n       DB_NAME(dbid) AS DatabaseName ,\n       text\nFROM sys.dm_db_session_space_usage\
    \ AS ssu\nINNER JOIN sys.dm_exec_sessions AS es ON ssu.session_id = es.session_id\n\
    INNER JOIN sys.dm_exec_connections AS ec ON es.session_id = ec.session_id\nLEFT\
    \ OUTER JOIN sys.dm_exec_requests AS er ON ec.session_id = er.session_id\nCROSS\
    \ APPLY sys.dm_exec_sql_text(COALESCE(er.sql_handle, ec.most_recent_sql_handle))\
    \ AS dest\nWHERE is_user_process = 1\n```\n\n这个查询可以告诉你任何当前连接在 `TempDB` 中使用了多少空间，以及当前正在运行的命令或最后运行的命令。\n\
    \n在前面的例子中应用此查询，我可以看到未溢出的查询在 `TempDB` 中分配了 0 个页面。而发生溢出的查询分配了 0 个页面的用户对象和 10,500\
    \ 个页面的内部对象——即 82 MB。（一个页面大小为 8 KB。）\n\n可以定期运行此查询来检查哪些进程使用了大量 `TempDB` 空间，并将任何过度使用记录下来以供进一步调查。大量的内部对象分配不一定表示发生了溢出，但这样的读数可能值得研究。（大量的用户对象分配则暗示了临时表的过度使用。）\n\
    \n关于修复溢出的问题，首先也是最重要的一点是，溢出并非总能预防。有些操作无论如何都会发生溢出。排序操作就是典型的例子。想象一下，在一个只有 32 GB 内存的服务器上对一个\
    \ 50 GB 的结果集进行排序，显然排序操作无法完全在内存中进行，必须溢出到 `TempDB`。\n\n优化溢出主要有三个大的方面：\n\n*   预防因内存授权估算错误而导致的不必要溢出。\n\
    *   尽量减少必须发生溢出的操作数量。\n*   优化 `TempDB` 以使其能够处理确实发生的溢出。\n"
- fmt: '# Memory Grant Underestimates and TempDB Configuration


    Memory grant underestimates are often a result of row cardinality misestimates.
    These can be caused by stale statistics, missing statistics, non-SARGable predicates
    (as discussed in the first section of this chapter), or a few less common causes.


    For more details on cardinality problems, see the following:


    - [http://blogs.msdn.com/b/bartd/archive/2011/01/25/query_5f00_tuning_5f00_key_5f00_terms.aspx](http://blogs.msdn.com/b/bartd/archive/2011/01/25/query_5f00_tuning_5f00_key_5f00_terms.aspx)

    - [http://msdn.microsoft.com/en-us/library/ms181034.aspx](http://msdn.microsoft.com/en-us/library/ms181034.aspx)

    - *Microsoft SQL Server 2008 Internals* by Kalen Delaney (Microsoft Press, 2009)


    Minimizing the number of operations that have to spill is mostly a matter of application
    design. The main points are not to return more data than necessary and not to
    sort unless necessary.


    It’s common for applications to fetch far more data than any user would ever read,
    retrieving millions of rows into a data set or producing a report with tens or
    even hundreds of pages of data. This is not just a waste of network resources
    and a strain on the client machine, but it can often also lead to huge joins and
    sorts on the SQL Server instance.


    There’s a fine line between a chatty application that calls the SQL Server instance
    too many times requesting tiny amounts of information and an application that
    fetches far too much data, wasting server and client resources.


    When you are designing applications, it is generally a good idea to fetch all
    the data for a particular screen or page in the smallest number of calls possible.
    That said, don’t err on the side of fetching the entire database. The user should
    be able to specify filters and limitations that restrict the data that is requested.
    Don’t pull a million rows to the app and let the user search within that. Specify
    the search in the database call, and return only the data that the user is interested
    in.


    On the subject of sorts, note that it’s worthless to sort the result set in SQL
    Server if the application is going to sort it when displayed. It’s also sometimes
    more efficient to sort the result set at the client rather than on the server,
    because the client is dealing only with the one user’s requests and small amounts
    of data while the server is dealing with multiple concurrent requests. You should
    consider this during the application design and development phases. It’s certainly
    not always possible to do this, but you should at least consider whether it can
    be done.


    The last part is tuning TempDB for the cases that will spill. This is one of those
    areas where almost everyone has an opinion and none of them are the same. I won’t
    go into huge amounts of detail; rather, I’ll just give you some solid guidelines.


    Unless you have a storage area network (SAN) large enough and configured to absorb
    the I/O requirements of TempDB and the user databases without degradation, the
    TempDB database should preferably be placed on a separate I/O channel from the
    user databases. This means putting them on separate physical drives, not on a
    partition on the same drive as the user databases. Preferably, you should use
    a dedicated RAID array.


    TempDB should be on a RAID 10 array if at all possible. If not, RAID 1 might be
    adequate. RAID 5 is a bad choice for TempDB because it has slower writes than
    RAID 1 or 10 because of the computation of the parity stripe.


    I’ve heard of suggestions to use RAID 0 for TempDB. In my opinion, this is a very
    dangerous suggestion. It is true that there is no persistent data in TempDB (or
    at least there shouldn’t be) and, hence, losing anything in TempDB is not a large
    concern. However, RAID 0 has no redundancy; if a single drive in the array fails,
    the entire array goes offline. If the drive hosting TempDB fails, SQL Server will
    shut down and cannot be restarted until the drive is replaced or TempDB is moved
    elsewhere. Hence, although using RAID 0 for TempDB does not pose a risk of data
    loss, it does have downtime risk. Depending on the application, that might be
    worse for the app.


    If Solid State Drives (SSD) are available, putting TempDB onto the SSD array should
    be considered—just considered, not used as an automatic rule. It might be that
    a user database has higher I/O latency than TempDB and would hence benefit more,
    but it is definitely worth considering and investigating putting TempDB onto an
    SSD array if one is available.


    On the subject of the number of files for TempDB, much has been written. Some
    writers on the topic even agree.


    There are two reasons for splitting TempDB into multiple files:


    - I/O throughput

    - Allocation contention


    Allocation contention seems more common than I/O throughput, though it isn’t clear
    whether that’s just because it’s talked about more or whether it occurs more.
    Allocation contention refers to frequent `PageLatch` waits (not `PageIOLatch`)
    seen on the allocation pages in TempDB, usually on page 3 in file 1 (appearing
    as `2:1:3`). They also appear on page 1 and 2 (appearing as `2:1:1` and `2:1:2`),
    though those are less common. These waits can be seen in `sys.dm_exec_requests`
    or `sys.dm_os_waiting_tasks`.


    The contention happens because (very simplified) anything writing to TempDB needs
    to check those pages to find a page to allocate and then needs to update that
    page to indicate that the allocation has been done. The primary solution for allocation
    contention is to add more files to TempDB. How many, well, that depends. You can
    read more about this at the following website: [http://www.sqlskills.com/BLOGS/PAUL/post/A-SQL-Server-DBA-myth-a-day-%281230%29-tempdb-should-always-have-one-data-file-per-processor-core.aspx](http://www.sqlskills.com/BLOGS/PAUL/post/A-SQL-Server-DBA-myth-a-day-%281230%29-tempdb-should-always-have-one-data-file-per-processor-core.aspx).


    Splitting for I/O throughput is less common. If the dedicated array that holds
    TempDB is not providing adequate I/O throughput and cannot be tuned, you might
    need to split TempDB over multiple dedicated arrays. This is far less common than
    splitting for allocation contention.


    For further reading, see the white paper “Working with TempDB in SQL Server 2005”
    ([http://www.microsoft.com/technet/prodtechnol/sql/2005/workingwithtempdb.mspx](http://www.microsoft.com/technet/prodtechnol/sql/2005/workingwithtempdb.mspx)).


    ## Conclusion


    All of the problems looked at in this chapter are subtle, hard to see, and very
    easy to miss, especially in the semi-controlled chaos that many of us seem to
    work in these days. I hope the details I provided give you valuable insight into
    some design and development choices that can influence the performance of your
    apps and systems in various ways. This chapter also described additional tools
    and processes you can examine and experiment with when faced with performance
    problems.


    # `chapter 4`

    By Kellyn Pot’vin'
