- fmt: "It is a best practice to retain an archive of the `XML` for execution plans\
    \ of the most often executed `SQL` in each environment.\n\n-   The creation of\
    \ `XML` for any execution plan uses a fair amount of `CPU`. I recommend performing\
    \ this task at off hours if you are executing the `XML` on a production system.\n\
    -   You can use the data in the show plan for comparisons when performance changes\
    \ occur, allowing you to compare performance changes and pinpoint issues.\n- \
    \  The query plan is based on the parameters entered during the execution of the\
    \ first query. `SQL Server` refers to this as `parameter sniffing`. All subsequent\
    \ executions will use this plan whether their parameter values match the original\
    \ or not.\n-   If a poor combination of parameters was saved to the base execution\
    \ plan, this can cause performance issues not just for the original execution\
    \ but for all subsequent ones. Because you can view this in the execution-plan\
    \ `XML`, knowing how to view this data when you have concerns regarding a query\
    \ can be very helpful.\n-   If you do suspect an issue, you can locate the correct\
    \ plan and force its usage with the `OPTIMIZE FOR` hint.\n\n## Optimizing Performance\n\
    \nThere are many versions of queries joining the `DMVs` `dm_exec_query_stats`\
    \ and `dm_exec_sql_text` to provide a `DBA` with information regarding poor performance.\
    \ The following is a collection of queries that I retain in my own arsenal to\
    \ locate and troubleshoot performance.\n\n`Top 1000 Poor Performing` is a script\
    \ that will generate a large report, showing the worst code executed in the environment,\
    \ and for many environments, it will show some of the least offending code executed\
    \ in the environment. This provides you with a solid understanding of what code\
    \ is executed in the environment and how much is high impact and how much is standard\
    \ processing and everyday queries.\n\n```sql\nSELECT TOP 1000\n    [Object_Name]\
    \ = object_name(dest.objectid),\n    ![Image 44](index-94_1.png)\n    chapter\
    \ 4 ■ Dynamic management Views\n    creation_time,\n    last_execution_time,\n\
    \    total_cpu_time = total_worker_time / 1000,\n    avg_cpu_time = (total_worker_time\
    \ / execution_count) / 1000,\n    min_cpu_time = min_worker_time / 1000,\n   \
    \ max_cpu_time = max_worker_time / 1000,\n    last_cpu_time = last_worker_time\
    \ / 1000,\n    total_time_elapsed = total_elapsed_time / 1000 ,\n    avg_time_elapsed\
    \ = (total_elapsed_time / execution_count) / 1000,\n    min_time_elapsed = min_elapsed_time\
    \ / 1000,\n    max_time_elapsed = max_elapsed_time / 1000,\n    avg_physical_reads\
    \ = total_physical_reads / execution_count,\n    avg_logical_reads = total_logical_reads\
    \ / execution_count,\n    execution_count,\n    SUBSTRING(dest.text, (deqs.statement_start_offset/2)\
    \ + 1,\n        (\n            (\n                CASE statement_end_offset\n\
    \                    WHEN -1 THEN DATALENGTH(dest.text)\n                    ELSE\
    \ qs.statement_end_offset\n                END\n                - deqs.statement_start_offset\n\
    \            ) /2\n        ) + 1\n    ) as statement_text\nFROM sys.dm_exec_query_stats\
    \ deqs\nCROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) dest\nWHERE Object_Name(st.objectid)\
    \ IS NOT NULL\n--AND DB_NAME(dest.dbid) = 5\nORDER BY db_name(dest.dbid),\n  \
    \  total_worker_time / execution_count DESC;\n```\n\nWhen you execute this query,\
    \ it returns the top `1000` procedures or processes and it breaks down performance\
    \ impacts by the actual procedural calls, listing the offending code from the\
    \ procedure or complex process, as `Figure 4-8` shows.\n\n**`Figure 4-8.`** Results\
    \ of the top 1000 SQL Statement text from the query.\n![Image 45](index-95_1.png)\n\
    chapter 4 ■ Dynamic management Views\n\nYou can also take advantage of various\
    \ joins between `dm_exec_query_stats` and `dm_exec_sql_text` to clearly identify\
    \ the statement by average `CPU` and `SQL` text, two of the most important aspects\
    \ to note when researching poorly performing `SQL`. Here’s an example:\n\n```sql\n\
    SELECT TOP 5\n    total_worker_time/execution_count 'Avg CPU Time',\n    SUBSTRING(dest.text,\
    \ (deqs.statement_start_offset/2)+1,\n        ((CASE deqs.statement_end_offset\n\
    \            WHEN -1 THEN DATALENGTH(dest.text)\n            ELSE deqs.statement_end_offset\n\
    \        END - deqs.statement_start_offset)/2) + 1)statement_text\nFROM sys.dm_exec_query_stats\
    \ deqs\nCROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) dest\nORDER BY total_worker_time/execution_count\
    \ DESC;\n```"
