    Pig allows for manipulation of HDFS data via its procedural language, Pig Latin,
    providing a more advanced tool for transforming data and letting you solve more
    complicated problems. In this example, you used Pig to get data from HDFS and
    to transform and store it in another HDFS data store, and you did so without impacting
    the SQL Server. This is why Pig is important to the SQL Server DBA. Not everything
    has to go through SQL Server and a DBA needs to know when it’s more effective
    to use HDFS as both the input and output data store. Knowing the best ways to
    take advantage of Pig and its features will reduce the stress you put on your
    SQL Server databases.


    Big Data for the Rest of Us


    The analysis scenarios, while certainly the most popular reason for Big Data’s
    existence, are not the only use-case. Before we let the data analysts take over
    everything, let’s look at how Big Data can impact the rest of the world. We’ll
    also look at scenarios where the work the data analyst is doing can impact the
    DBA’s architecture, and how the DBA can deal with both RDBMS and Big Data working
    in conjunction.


    Business Intelligence


    While Big Data is often used for analytics, it’s not necessarily synonymous with
    Business Intelligence and what it has come to be. Some experts will even tell
    you that Big Data means the end of BI, but that’s not likely. A comprehensive
    BI framework should encompass Big Data and, at the very least, use it as a data
    source. BI includes a type of analysis and visualization that allows for rapid-fire
    what-if analysis with a high degree of user interaction. It can also convey the
    state of the business, relative to key performance indicators, by taking a snapshot
    of the business at strategic points in time. Under the BI umbrella, we would also
    include online analytical processing, data mining, predictive modeling, performance
    management, and more. For planning purposes, you should expect that data you collect
    in a Hadoop framework will become part of the data used by the BI framework.


    Big Data Sources


    Where is all of this data coming from at such a high *velocity*, in such large
    *volume*, and of so much *variety*?


    Sensors, logs, web content, text, map, media, social computing, and click-stream
    data are being collected at higher rates than ever, and the ability to capture
    this data has grown enormously over the past several years. This data can be produced
    at a high rate of speed, or velocity in Big Data terms.


    The most common data sources for Big Data analytical applications are web data
    in the form of web logs, sensors that continuously capture data (such as movement
    and location), unstructured content (including video and images), and social networking
    data. Web logs are analyzed to optimize site 425


    chapter 17 ■ Big Data for the SQL Server DBa


    navigation and to understand the behavior of online customers. Sensors are driving
    the collection of large amounts of data, since near real-time analytics can be
    performed on data streams being produced by sensors. If a problem is spotted,
    swift action can be taken to correct the situation. Data from sensors can also
    be stored for future analysis to discover patterns that indicate persistent problems.


    There is no minimum volume of data to be considered Big Data, but typically the
    volume starts in the terabytes and could grow to petabytes in size. The same is
    true for variety. While Big Data has made a name for itself by being good at handling
    unstructured data, it can also handle more well-structured data, and there’s no
    yardstick as to how much unstructured data qualifies it as Big Data.


    Big Data Business Cases'
  trans: "# 第 17 章：面向 SQL Server DBA 的大数据\n\n这段脚本定义了数据结构，按产品 ID 对数据进行分组，获取产品在数据集中出现的次数，按降序排序，并将数据保存回\
    \ HDFS 中一个名为`aggregate_products`的文件。这与我们能用 SQL 做的事情区别不大，因此这是一个很好的起点，有助于理解 Pig\
    \ 脚本的结构以及如何执行它。\n\n`表 17-6`描述了我们正在使用的 Pig 命令；完整参考请访问 http://pig.apache.org。\n\n\
    ## 表 17-6. Hive 命令部分描述性列表\n\n| 命令 | 描述 |\n| :--- | :--- |\n| `LOAD 'data' [USING\
    \ function] [AS schema];` | `'data'`是你正在使用的 HDFS 文件或目录的名称。除非你编写自己的加载函数，否则`PigStorage`是默认的加载函数。列和数据类型在\
    \ schema 中定义。 |\n| `GROUP...BY group key` | 此命令使用一个分组键对一个或多个关系中的数据进行分组。它的功能与 T-SQL\
    \ 中的`GROUP BY`子句非常相似。 |\n| `FOREACH...GENERATE` | 使用此操作处理数据列以生成数据转换。 |\n| `STORE...INTO\
    \ 'directory' [USING function]` | 这会将结果存储到文件系统。`'directory'`是输出文件在 HDFS 中保存的位置。除非你编写自己的存储函数，否则`PigStorage`是默认的存储函数。\
    \ |\n\n要运行 Pig 脚本，再次进入 Azure 上的 Hadoop 远程桌面，并从桌面启动 Hadoop 命令 Shell。在命令提示符处输入`cd\
    \ pig`以进入 pig 目录。从开始菜单启动记事本，复制并粘贴示例 Pig 脚本，并将其作为`product.pig`保存在`c:\\ Apps\\dist\\\
    pig`文件夹中。通过输入`pig product.pig`并按 Enter 键从命令行执行它。如果成功完成，你现在将在 HDFS 的`ProductExtract`文件夹中看到一个包含脚本输出的新文件。\n\
    \n让我们做一些能突出显示 Pig 更多功能的事情。假设财务部门现在想要知道，每次捕获价格变动时，产品的库存水平是多少。为了获取可用的数据，通过运行以下两个\
    \ Sqoop 导入到 HDFS，将`Product`表和`ProductInventory`表加载到 HDFS。回想一下，为了让 Sqoop 工作，你为`Product`表创建了一个同义词。现在为`ProductInventory`表执行相同的操作，如下所示：\n\
    \n```sql\nCREATE SYNONYM [Production.ProductInventory] FOR Production.ProductInventory\n\
    ```\n\n```bash\nsqoop import --connect \"jdbc:sqlserver://myserver.database.windows.net;\n\
    username=mysqluser@myserver; password=mypwd; database=AdventureWorks2012\"\n--table\
    \ Production.Product --target-dir /data/Product -m 1\n\nsqoop import --connect\
    \ \"jdbc:sqlserver://myserver.database.windows.net;\nusername=mysqluser@myserver;\
    \ password=mypwd; database=AdventureWorks2012\"\n--table Production.ProductInventory\
    \ --target-dir /data/ProductInventory -m 1\n```\n\n完成后，`/data/Product`和`/data/ProductInventory`文件夹中将各有一个文件可供使用。现在，你可以像下面这样用\
    \ Pig 将这些数据连接在一起：\n\n```pig\nproduct = LOAD '/data/Product/*' USING PigStorage(',')\n\
    AS (\n  ProductID:int,\n  Name:chararray,\n  ProductNumber:chararray\n);\n\nproduct_inventory\
    \ = LOAD '/data/ProductInventory/*' USING PigStorage(',')\nAS (\n  ProductID:int,\n\
    \  LocationID:int,\n  Shelf:chararray,\n  Bin:int,\n  Quantity:int\n);\n\nproduct_group\
    \ = GROUP product_inventory by ProductID;\n\ninventory_sum = FOREACH product_group\
    \ GENERATE group as ProductID,\nCOUNT(product_inventory.LocationID) as num_locations,\n\
    SUM(product_inventory.Quantity) as total_inventory,\nAVG(product_inventory.Quantity)\
    \ as avg_inventory;\n\ninventory_filter = FILTER inventory_sum BY total_inventory<1000;\n\
    \nproduct_join = JOIN product BY ProductID, inventory_filter BY ProductID;\n\n\
    product_sorted = ORDER product_join by total_inventory desc;\n\nSTORE product_sorted\
    \ INTO '/data/ProductOutput/inventory_list3' USING PigStorage(',');\n```\n\nPig\
    \ 允许通过其过程化语言 Pig Latin 来操作 HDFS 数据，为数据转换提供了更高级的工具，让你能够解决更复杂的问题。在此示例中，你使用 Pig 从\
    \ HDFS 获取数据，并将其转换并存储到另一个 HDFS 数据存储中，而且没有影响 SQL Server。这就是 Pig 对 SQL Server DBA\
    \ 重要的原因。并非所有事情都必须通过 SQL Server，DBA 需要知道何时更有效地将 HDFS 同时用作输入和输出数据存储。了解如何最好地利用 Pig\
    \ 及其功能，将减轻你对 SQL Server 数据库施加的压力。\n\n# 面向我们其他人的大数据\n\n分析场景，尽管无疑是大数据存在的最流行原因，但并非唯一的用例。在让数据分析师接管一切之前，让我们看看大数据如何影响世界的其他部分。我们还将看看数据分析师所做的工作可能影响\
    \ DBA 架构的场景，以及 DBA 如何处理 RDBMS 与大数据协同工作的情况。\n\n## 商业智能\n\n虽然大数据常用于分析，但它不一定等同于商业智能及其发展现状。一些专家甚至会告诉你，大数据意味着\
    \ BI 的终结，但这不太可能。一个全面的 BI 框架应该包含大数据，至少将其用作数据源。BI 包括一种分析和可视化类型，支持高度用户交互的快速假设分析。它还可以通过在战略时间点对业务进行快照，来传达业务相对于关键绩效指标的状态。在\
    \ BI 范畴下，我们还会包括在线分析处理、数据挖掘、预测建模、绩效管理等。出于规划目的，你应该预期在 Hadoop 框架中收集的数据将成为 BI 框架所使用的数据的一部分。\n\
    \n## 大数据源\n\n所有这些数据以如此高的`速度`、如此大的`容量`和如此多的`多样性`来自哪里？\n\n传感器、日志、网络内容、文本、地图、媒体、社交计算和点击流数据正以前所未有的速率被收集，并且捕获这些数据的能力在过去几年中大幅增长。这些数据可以高速产生，或者用大数据术语来说就是速度。\n\
    \n大数据分析应用最常见的数据源是以网络日志形式出现的网络数据、持续捕获数据（如移动和位置）的传感器、非结构化内容（包括视频和图像）以及社交网络数据。分析网络日志可以优化站点导航并理解在线客户的行为。传感器推动了大量数据的收集，因为可以对传感器产生的数据流执行近实时分析。如果发现问题，可以迅速采取行动进行纠正。来自传感器的数据也可以存储起来以供将来分析，从而发现表明持续问题的模式。\n\
    \n没有最低数据量要求来定义大数据，但通常容量从 TB 级开始，并可能增长到 PB 级。多样性也是如此。虽然大数据因擅长处理非结构化数据而闻名，但它也能处理结构更良好的数据，并且没有衡量多少非结构化数据才能称其为大数据的标准。\n\
    \n## 大数据业务案例\n"
- fmt: '## 适合大数据框架的数据集类型


    让我们来看看哪些类型的数据集适合你的大数据框架。基于如何将网络日志数据用于分析和发现的用例，还有其他类型的数据集也更适合由Hadoop处理，而不是传统的RDBMS。随着阅读深入，你会开始了解它们如何与SQL
    Server协同工作。


    ### 非关系型数据集


    有多少次，你仅仅因为需要一个存放数据的地方，就将其存储在一个扁平、非关系型的表中？


    我们处理的大部分数据是非关系型的，或者更准确地说，是伪关系型的。我们将其视为非关系型数据，因为它与什么相关不明确，无法与我们已有的任何数据相关，或者与之关联是不必要的。提取数据、暂存数据、日志以及源自外部的数据都可以归入此类。


    ### 传感器流数据


    你是否捕获了一个数据流，并且只保留一个小的时间窗口（例如，滚动的两周），因为它积累得太快，会迅速使你的数据库变得非常庞大？或者你只保留随机样本，因为其规模让你难以应对？如果你已经在捕获传感器数据，这类似于“从消防水管喝水”，那么你已经知道传感器能够产生海量的数据。


    ### 归档数据


    你是否因为数据使你的事务数据库变得杂乱，而不断地手动或通过定期作业删除或归档数据？这些数据通常被归档在SQL Server内部，无论是同一数据库内的另一个表，还是主要目的是保存归档数据的另一个数据库。通过将其保留在SQL
    Server数据库中，它在需要时仍可供业务访问，但它可能迅速累积并增长到难以管理的规模，影响你在SQL Server上进行的其他所有操作。


    ### 非结构化数据


    大数据的许多用途提到它是处理非结构化数据的好方法。非结构化数据是不一致且未定义的数据，没有关于数据如何排列的规则，并且通常没有长度限制。这可能是你经常以二进制大对象的形式存储在SQL
    Server中，并认为是数据库负担的东西。


    **第17章 ■ SQL Server DBA 的大数据**


    ### 数据发现


    有时，你直到需要时才知道自己需要什么。不幸的是，当那一刻到来时，你经常发现所需的数据不可用。其他时候，你只是想去探索。


    例如，如果你注意到客户的购买习惯发生了变化并想知道原因，你可能会认为仔细查看网络日志、历史交易、客户评论等会有所帮助。这项工作可能会引导你找到寻求的答案，但也可能帮助你了解关于客户的其他信息，一些你最初并未寻找的东西。


    ### 由分析结果驱动的业务规则


    有时，你的OLTP数据库需要执行需要大数据计算结果的操作分析功能。例如，假设市场部门想在他们的主页上突出显示三部新电影中的一部：布拉德·皮特的戏剧、亚当·桑德勒的喜剧或布鲁斯·威利斯的动作片。决定展示哪部电影是通过程序做出的，输入包括客户人口统计、位置、过往购买历史等。做出此决策的一个更重要的因素是该演员在Twitter上是否呈正面趋势。你可以使用大数据基础设施捕获相关的Twitter流，并尽可能接近实时地将汇总的情感反馈给你的OLTP数据库，以便将其应用于决定在主页上显示内容的算法。这个过程的关键是在趋势变化后尽快更改主页。


    ### 微软未来的大数据


    微软拥抱Hadoop和大数据的益处在于，未来我们应该能看到Hadoop与众多提供和支撑分析能力的微软工具之间的全面集成，包括报表、仪表板、预测建模和ETL（提取、转换和加载）。我期望看到的增强类型包括以下内容：


    *   你已经看到了如何通过Hive在Excel中使用HDFS数据。我期望`HDFS`与`Excel`、`PowerView`、`SQL Server Reporting
    Services`和`PerformancePoint`更紧密地集成。

    *   我期望更好的`SSIS`数据流任务，允许从`HDFS`输入和输出数据，以及提供更适合`HDFS`的转换技术的转换任务。

    *   我预计使用`HDFS`作为数据源的`SSAS`表格模块之间会有更紧密的耦合。

    *   我还期望能够创建在`SQL Server`内部实现`MapReduce`无缝集成的`HDFS`表。


    这个领域还有更多发展，我期望其中大部分我们会看到在Windows上的本地部署Hadoop解决方案中。


    **第17章 ■ SQL Server DBA 的大数据**


    ### 结论


    在SQL Server数据库环境中实施Hadoop框架，为有见识的数据库管理员提供了设计和实现更有效、更强大的数据架构。它提供了扩展到数据物理规模不再是限制的水平的能力。这使DBA承担起确定如何构建数据基础设施的责任，并迫使他们为特定数据集做出正确的决策：它应该驻留在SQL
    Server还是HDFS中？为了做出这些决策，DBA必须了解业务将如何使用数据、开发人员将如何访问数据以及数据量会有多大。传统SQL Server表不再是默认的存放位置。


    DBA必须做出的另一个重要决策是将数据存储在本地还是使用云。我们能够将数据在云中的Hadoop和SQL Server之间移动。我们还将数据在我们网络内的SQL
    Server实例和云中的Hadoop之间来回移动，并展示了如何使用SQL Server众多功能之一——变更数据捕获来帮助我们完成此操作。


    DBA必须支持的一个重要过程是在SQL Server和HDFS之间移动数据。我们展示了如何使用`Sqoop`来完成此操作，它以一种基本的方式实现但易于使用。


    `Hive`提供了一个熟悉的类SQL接口来从`HDFS`获取数据。使用`ODBC`连接器，这为用户和应用程序提供了一种从`HDFS`获取数据的方式。我们看到了它如何在Excel中工作，DBA应该预期在许多其他方式中也有这种类型的访问，包括报表工具、分析软件、`.NET`应用程序和网站。`Pig`让我们能够以过程化方式访问`HDFS`并操作数据。它需要编程技能和专业知识，但值得深入学习以充分利用其数据转换能力。`Sqoop`、`Pig`和`Hive`的关键能力在于它们都执行`MapReduce`作业，并能充分利用`Hadoop`框架。DBA重要的是要知道如何使用这些工具，并了解其功能的正确应用场景。


    我们在关于从`HDFS`导出数据的章节中展示了通过将数据从`HDFS`移动到`SQL Server`会如何影响它，因此DBA应考虑到这一点。一个可能促成此操作的业务案例是，当正在捕获进入`HDFS`数据的趋势统计信息，并且趋势的输出被发送到`SQL
    Server`以驱动应用程序行为时。我们没有展示非结构化数据将如何存储在`HDFS`中，或者它可能如何使用，但这将需要比使用`SQL Server`更多的分析软件和算法方面的工作，因此我们将该演示推迟到分析书籍。要查看Hadoop如何与半结构化文本数据配合使用的示例，微软在`Hadoop
    on Azure`网站上的`Samples`库中提供了一个字数统计示例。'
  raw: 'Let’s look at what types of datasets are a good fit for your Big Data framework.
    Building on the use-case of how web log data can be used for analytics and discovery,
    there are other types of datasets that can also be handled better by Hadoop than
    with an RDBMS. As you read on, you’ll start to see how they can work in conjunction
    with SQL Server.


    The Nonrelational Dataset


    How many times have you stored data in a flat, nonrelational table because you
    needed a place to put it?


    Much of the data we work with is nonrelational, or better said it is pseudo-relational.
    We treat it nonrelationally because it’s unclear what it’s related to, it can’t
    be related to anything we have, or relating it to something is unnecessary. Extracts,
    staging data, logs, and data that originates from external sources can all be
    put in this category.


    Streaming Data from Sensors


    Do you capture a stream of data and only keep a small window (e.g., a rolling
    two weeks) because it accumulates too fast and makes your database very large
    quickly? Or do you retain only a random sample because its size overwhelms you?
    If you’re already capturing data from sensors and it’s akin to “drinking from
    a fire hose,” then you already know that a sensor has the ability to produce an
    overwhelming amount of data.


    Archives


    Do you constantly delete or archive data either manually or using regular jobs
    because it clutters your transactional database? This data often gets archived
    within SQL Server, whether it’s another table within the same database, or another
    database whose main purpose it is to hold archived data. By keeping it in a SQL
    Server database, it’s still accessible when needed by the business, but it can
    add up fast and grow to an unmanageable size that impacts everything else you’re
    doing with SQL Server.


    Unstructured Data


    Many uses of Big Data mention it as a good way to handle unstructured data. Unstructured
    data is inconsistent and undefined data, with no rules about how the data is arranged,
    and often with no length limit. This is something that you might often store in
    SQL Server as a BLOB, and consider it a burden on your database.


    chapter 17 ■ Big Data for the SQL Server DBa


    Data Discovery


    Sometimes, you don’t know what you need until you need it. Unfortunately, when
    the time comes, you often find out that the data you need to move forward isn’t
    available. Other times, you just want to go look.


    For example, if you’ve noticed a change in your customer’s buying habits and want
    know why, you might think it would be helpful to scour through web logs, historical
    transactions, customer comments, and more. This work might lead you to the answer
    you’re looking for, but it also could help you learn something else about your
    customers, something you weren’t initially looking for.


    Business Rules Driven by Analytic Outcomes


    There are times when your OLTP database needs to perform operational analytic
    functions that require the output of Big Data calculations. For example, assume
    a marketing department wants to highlight one of three new movies on their home
    page: a Brad Pitt drama, an Adam Sandler comedy, or a Bruce Willis action movie.
    The decision of which movie to show is made programmatically, with many inputs
    that include customer demographic, location, past purchase history, and more.
    One of the more important factors in making this decision is whether the actor
    is trending positively on Twitter. You can capture the relevant Twitter stream
    using a Big Data infrastructure, and in as near to real-time as possible, you
    can feed the aggregated sentiment back to your OLTP database, so it can be applied
    by the algorithm that determines what to show on the home page. The key to this
    process is to change the home page as soon as possible, after the trend changes.


    Big Data in the Microsoft Future


    The benefit to Microsoft embracing Hadoop and Big Data is that in the future we
    should see full integration between Hadoop and the many Microsoft tools that provide
    and support analytic capabilities, including reporting, dashboards, predictive
    modeling, and ETL (extract, transform, and load). The types of enhancements I
    would expect to see include the following:


    •


    You’ve seen how HDFS data can be used in Excel through Hive. I would expect


    tighter integration of HDFS with Excel, PowerView, SQL Server Reporting Services,


    and PerformancePoint.


    •


    I expect better SSIS data flow tasks that allow for data to be input and output
    from HDFS, and transformation tasks that provide transformation techniques better


    suited for HDFS.


    •


    I anticipate tighter coupling between SSAS tabular modules using HDFS as a data


    source.


    •


    I also would expect the ability to create an HDFS table within SQL Server that


    implements MapReduce seamlessly.


    There’s much more to come in this area, and I expect that much of it we’ll see
    in the on-premise solution of Hadoop on Windows.


    chapter 17 ■ Big Data for the SQL Server DBa


    Conclusion


    The implementation of a Hadoop framework in a SQL Server database environment
    gives the informed database administrator a more effective and powerful data architecture
    to design and implement. It provides the ability to scale out to a level where
    the physical size of data is no longer a constraint. This puts the responsibility
    on DBAs for determining how to build out a data infrastructure, and forces them
    to make the right decision for a particular dataset; should it reside in SQL Server
    or HDFS? To make these decisions, DBAs will have to know how the business will
    use the data, how developers will access it, and how much of it there will be.
    No longer will the default location be a traditional SQL Server table.


    Another important decision DBAs will have to make is whether to store the data
    on premise or use the cloud. We were able to move data between Hadoop and SQL
    Server where both were in the cloud. We also moved data to and from a SQL Server
    instance inside our network and Hadoop in the cloud, and showed how we could use
    one of the many features of SQL Server, Change Data Capture, to help us do this.


    An important process that DBAs will have to support is the movement of data between
    SQL Server and HDFS. We showed how to do this with Sqoop, which does this in a
    rudimentary manner but is easy to use.


    Hive provides a familiar SQL-like interface to get data out of HDFS. Using the
    ODBC connector, this gives users and applications a way to get data from HDFS.
    We saw how this works in Excel, and DBAs should expect this type of access in
    many other ways, including reporting tools, analysis software, .NET


    application, and web sites. Pig let us access HDFS and manipulate the data procedurally.
    It requires programming skills and expertise but is worth learning well to make
    the most of its data transformation capabilities. The key capability of Sqoop,
    Pig, and Hive is that they all execute MapReduce jobs and can fully take advantage
    of the Hadoop framework. It’s important for DBAs to know how to use these tools
    and to know the right application of their functions.


    We showed in the section on exporting data from HDFS how we can impact SQL Server
    by moving data there from HDFS, so DBAs should account for this. An example of
    a business case that could be an impetus for this is when trending statistics
    are being captured on data coming into HDFS, and the outputs of the trends are
    sent to SQL Server to drive application behaviors. We didn’t show how unstructured
    data would be stored in HDFS, or how it might be used, but this would require
    more work with analytic software and algorithms than it does with SQL Server,
    so we’ll defer that demonstration to the analytics books. To see an example of
    how Hadoop works with semistructured text data, Microsoft provides a word count
    example under the Samples gallery on the Hadoop on Azure web site.'
