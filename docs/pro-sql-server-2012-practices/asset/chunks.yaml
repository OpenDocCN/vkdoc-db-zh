    ## 第 18 章 ■ 峰值负载调优


    错误的基础设施和服务器配置常常是性能问题的诱因。如果能及时发现——例如在服务器移交给数据库管理员后立即发现——这些问题很容易修复。如果未能及时发现，而是在服务器投入生产后的某个阶段才被察觉，则可能导致需要安排停机时间进行修复——即使修复本身很简单。一些常见的配置不良示例包括内存设置、本地策略和页面文件设置错误。


    一个看似与`SQL Server`无关，但实际上密切相关的典型例子是`Windows`中的电源管理设置。`Windows Server 2008`（或更新版本）的默认配置中，电源管理计划设置为“平衡”。平衡电源配置文件会关闭核心并降低核心时钟频率以节省电量。这种限制会影响服务器性能。如果`SQL
    Server`安装在该服务器上，性能可能因为这一项设置从极快变得极慢。更改此设置很容易，并可能极大提升性能。同样，与电源相关的 EFI 或 BIOS 设置可能会覆盖`Windows`设置，因此也需要检查。这是另一个需要你串联所有逻辑线索才能得出单一正确结论的案例。


    评估工作的重要一环是从应用服务器、承载`SQL Server`实例的服务器以及基础设施收集配置数据。虽然目标是审查服务器配置并确定其配置是否正确，但究竟什么才是“正确”的配置？在审查配置数据之前，应与相关团队成员合作，获取标准构建文档的副本。标准构建应作为基线，因为大多数公司都投入了大量时间来设计和测试基础构建。由于标准构建可能未针对`SQL
    Server`进行优化，你可能会在此过程中发现未来构建的改进点。


    在审查各类服务器配置时，请牢记性能数据审查中的发现。以前面的例子为例，如果你在操作系统中看到大量分页，并审查`SQL Server`中的`最大服务器内存`，内存是动态的还是静态的？内存配置过高还是过低？需要如何重新调整，或者服务器是否需要更多物理内存？在查看（并可能更改）配置设置之前先审查性能数据，能为你提供宝贵信息，用于分析服务器配置。现在，你便掌握了一些背景信息来判断潜在的瓶颈是什么，以及系统的哪些区域是健康的。


    由于我们专注于`SQL Server`，我将回顾一些推荐的需要捕获的配置设置，如`表 18-10`所示。


    ### 表 18-10. 待验证的 SQL Server 配置示例列表。


    | SQL Server 配置 | 所需分析 |

    |--------------------------|-------------------|

    | `SQL Server`版本、Service Pack 级别和版本 | `SQL Server`是否为最新？应用程序支持哪些版本？ |

    | SQL 服务账户 | `SQL Server`服务账户是否使用专用的安全凭据？这些安全凭据是否属于本地管理员组？ |

    | `sp_configure` | 启用了哪些配置选项？以下是需要审查的关键项：`默认备份压缩( TRUE )`、`并行操作的成本阈值`、`填充因子( %
    )`。是否使用了默认设置？`最大并行度`。如果系统启用了 NUMA，请将其设置为 NUMA 节点内的核心数。`最大服务器内存( MB )`。此设置取决于多个因素，但可以参考以下网站获取很好的指导：`http://sqlskills.com/blogs/jonathan/post/How-much-memory-does-my-SQL-Server-actually-need.aspx`
    |

