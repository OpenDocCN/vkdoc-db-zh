  raw: 'Page compression is a superset of row compression. As I mentioned before,
    at the lowest level once compression is turned on, everything is at least row
    compressed. Page compression contains row compression, column prefix compression,
    and page dictionary compression. Page compression is always applied in the order
    of row, column, and then dictionary. Note that you can specify only row and page
    compression settings on a database object. Column prefix and page dictionary compression
    are internal subsets of page compression. You cannot specify which portions of
    page compression to use—SQL Server makes that determination internally. To help
    you fully understand page compression, I need to cover each step that occurs when
    it is applied, which I will do shortly. First I’ll create a table I can use to
    demonstrate the power of page compression.


    USE demoInternals;


    GO


    /*


    Let''s create a Clustered Index


    */


    IF EXISTS(SELECT NAME FROM sys.tables WHERE name=N''compressedDataRecord'')


    BEGIN


    DROP TABLE dbo.compressedDataRecord


    END


    CREATE TABLE compressedDataRecord(


    myID INT IDENTITY(1,1)


    ,productName char(500) DEFAULT ''some product''


    ,productDescription CHAR(1000) DEFAULT ''Product Description''


    ,PRIMARY KEY CLUSTERED(myID)


    ) ;


    /*


    Let''s insert some data


    */


    DECLARE @i INT, @myID INT


    SET @i=0


    WHILE (@i<383)


    BEGIN


    SET @myID=(SELECT (MAX(myid)+1) FROM dbo.compressedDataRecord)


    chapter 14 ■ page and row compression


    INSERT INTO dbo.compressedDataRecord(productName, productDescription)


    VALUES(


    (REPLICATE(''a'', (500- LEN(@myID))) + CAST(@myID AS VARCHAR(3)))


    (REPLICATE(''b'', (1000- LEN(@myID))) + CAST(@myID AS VARCHAR(3)))


    )


    SET @i=@i+1


    END


    When we looked at row compression, it was important to look at one data row and
    see the changes.


    Page compression requires an understanding of not just the changes to the data
    page, explained shortly, but an understanding of how data storage changes. When
    you used the preceding script to insert data, you’re taking fixed-length data
    fields and stretching them to the point that row compression can save you little
    to no storage space. You’re packing these fields as full as you can. If you use
    DBCC IND to get a page count, you’ll see that you’re currently storing data on
    79 different pages. Subtract the PageType 10


    allocation page and the PageType 2 index page and you’re at 77 total pages for
    the table: DBCC IND(demoInternals, ''compressedDataRecord'', 1)


    GO


    So now let’s apply page compression, perform another DBCC IND, and see how this
    changes our storage structure:


    /*


    Rebuild our table applying Page Compression


    */


    ALTER TABLE dbo.compressedDataRecord


    REBUILD WITH (DATA_COMPRESSION=Page)


    GO


    DBCC IND(demoInternals, ''compressedDataRecord'', 1)


    GO


    After running the commands, you should find that you now have only two data pages
    on disk. The PageType 10 allocation page and the PageType1 data page are all that
    is left. You just reduced 77 pages to 1.


    These results are not typical; you’re working with a data set that is optimized
    to display the power that page compression *can* potentially have on your data.


    When I discussed row compression, I talked about how it worked only on fixed-length
    data types. Page compression occurs at the binary level across the entire data
    page, so it is data-type agnostic. Meaning, Header


