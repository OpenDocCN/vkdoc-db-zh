    With all of the steps in this section complete, you will have the information
    collected for your indexing workload. The next steps will be to prepare a database
    for the workload to analyze indexes against and then to run the Database Engine
    Tuning Advisor.


    ## Sample Workload


    We’ll next look at a sample workload that will help demonstrate some the value
    of using the Database Engine Tuning Advisor. Prior to running the workload, we’ll
    make one change to the `AdventureWorks2012` database to allow DTA to identify
    a clustering index issue. We’ll change the clustering key on `Sales.SalesOrderDetail`
    from `SalesOrderID` and `SalesOrderDetailID` to just `SalesOrderDetailID`. The
    code in Listing 7-12 will perform this change.


    **Listing 7-12.** Change the Clustering Key on `Sales.SalesOrderDetail`


