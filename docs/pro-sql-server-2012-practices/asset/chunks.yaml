    LL 巡航车架-黄色\nT\nM\n874.99\n澳大利亚\n\nHitch Rack-4-Bike\nS\nF\n120.00\n美国\n\nRoad-250\
    \ 红色\nR\nM\n3528.99\n美国\n\nMountain-150 银色\nM\nM\n1578.27\n\nMapReduce 有两个重要函数：`map`\
    \ 和 `reduce`。`map` 函数接收一个数据集作为输入，过滤掉任何脏数据或不需要的数据，并为每一行分配一个用户定义的键，然后将其输出。Hadoop\
    \ 框架会根据用户定义的键对数据进行分组和排序，然后将其发送到 `reduce` 函数。在此示例中，你将使用的键是 `Product Line`。你唯一需要的其他数据是\
    \ `Sale Amount`，因此忽略其余部分。以下是对重要术语的简要说明：\n\n- **MapReduce Job**：这是由 MapReduce 框架运行的一个进程，包括输入数据、自定义\
    \ MapReduce 代码和配置设置。一个 MapReduce 作业既执行 `map` 任务，也执行 `reduce` 任务。MapReduce 工作流程如图\
    \ 17-2 所示。\n- **Map Task**：MapReduce 作业的输入被框架拆分为大小相等的工作单元，称为 `map tasks`。每个任务处理整个数据集的一个子集，并且理想情况下在包含该子集本地磁盘的节点上执行。\n\
    - **Reduce Task**：`reduce tasks` 由自定义代码和配置设置组成，它们以 `map tasks` 的输出作为输入。`map tasks`\
    \ 按键对数据进行分组和排序，其输出被送入 `reduce tasks` 进行进一步处理。\n- **Map Function**：这是由 `map task`\
    \ 执行的自定义程序代码，其主要目的是过滤数据并识别键字段。\n- **Reduce Function**：这是由 `reduce task` 执行的自定义程序代码，通常执行聚合和其他计算。\n\
    \n![Image 192](img/index-404_1.png)\n\n第 17 章 ■ 面向 SQL Server 数据库管理员的大数据\n\n>\
    \ **注意** `map tasks` 的数量不一定等于 `reduce tasks` 的数量。通常，如果 Hadoop 框架确定使用单个 `reduce\
    \ task` 是处理数据的最有效方式，那么可能会有多个 `map tasks` 而只有一个 `reduce task`。你可以通过编辑 Hadoop 的\
    \ `conf` 目录下的 `mapred-site.xml` 配置文件，来限制每个数据节点并行运行的 `map` 和 `reduce` 任务数量（默认分别设置为\
    \ 2 和 1）。这些参数只设置上限，如果 Hadoop 框架确定可以用更少的资源完成作业，它可能会使用少于最大值的任务数。\n\n***图 17-2.**\
    \ MapReduce 工作流程*\n\n数据从文件系统读取作为 `map` 函数的输入，并以键值对的形式传入，键是每一行的文件偏移量。此处文件偏移量并不重要，因此在此示例中忽略输入。通常，文件偏移量永远不会有用，因为你对数据在文件中的位置不感兴趣。然而，这里的值很重要，因为它是你想要处理的实际数据。`map`\
    \ 函数的输入将包含完整的行，因此 MapReduce 开发者的工作是识别你感兴趣的数据并解析输入，以便只提取 `Product Line` 和 `Sale\
    \ Amount`。表 17-2 展示了作为输入发送到 `map` 函数的数据示例。\n\n***表 17-2.** 输入 map 函数的数据，键为行偏移量，值为数据行*\n\
    | **键** | **值** |\n| :--- | :--- |\n| USA,Road-650 Black,R,M,4,1,699.09 | USA,Mountain-100\
    \ Silver,M,F,5,1,3399.99 |\n| France,Hydration Pack-70 oz.,M,F,3,1,54.99 | Canada,Road-150\
    \ Red,R,M,5, 1,1777.77 |\n| Australia,Short-Sleeve Classic Jersey,S,F,0,1,35.99\
    \ | Australia,Mountain-350 Orange,M,M,4,1,899.99 |\n| USA,LL Touring Frame-Yellow,T,M,0,1,874.99\
    \ | Australia,Hitch Rack-4-Bike,S,F,0,1,120.00 |\n| USA,Road-250 Red,R,M,1,1,3528.99\
    \ | USA,Mountain-150 Silver,M,M,0,1,1578.27 |\n\n在此过程的这一点上，开发者还可以通过检查空值或其他不一致之处来查找脏数据，并将其清理或丢弃。这是一个使用\
    \ JavaScript 的简单 `map` 函数示例：\n\n```javascript\nvar map = function (key, value,\
    \ context) {\n  var aryValues = value.split(\",\");\n  var pattern = /[A-Za-z]/;\n\
    \  var productLine;\n  var salesAmount;\n\n  productLine = aryValues[2];\n  salesAmount\
    \ = aryValues[6];\n\n  if (pattern.test(productLine) && productLine.toString()\
    \ != \"null\") {\n    context.write(productLine.toUpperCase(), salesAmount.toString());\n\
    \  }\n};\n```\n\n尽管这是一个小函数，但你将看到它如何在不庞大复杂的情况下变得非常有价值。作为键值对的值部分传入函数输入的是一行文本数据，你通过使用逗号作为分隔符（因为你的数据是逗号分隔的）进行分割来解析它。然后，通过使用数组偏移量访问它们来获取你感兴趣的列值。因此，在我们的示例中，`Product\
    \ Line` 位于偏移量 2，`Sales Amount` 位于偏移量 6。\n\n`map` 函数的主要目的是为后续处理定义你自己的键值对。你使用 `context.write`\
    \ 函数返回一个键值对作为输出，其中 `Product Line` 是键，`Sale Amount` 是值。新键值对的标识由开发者根据要解决的问题确定，并且必须正确完成，MapReduce\
    \ 才能获得所需的结果。表 17-3 展示了这些数据从 `map` 函数输出时的示例。\n\n***表 17-3.** map 函数的输出，键设为产品线，值设为销售额*\n\
    | **键** | **值** |\n| :--- | :--- |\n| R | 699.09 |\n| M | 3399.99 |\n| M | 54.99\
    \ |\n| R | 1777.77 |\n| S | 35.99 |\n| M | 899.99 |\n| T | 874.99 |\n| S | 120.00\
    \ |\n| R | 3528.99 |\n| M | 1578.27 |\n\n在 `map` 函数和 `reduce` 函数之间，MapReduce 框架会帮助你完成一些工作。它在一个称为\
    \ *shuffle* 的过程中按键对键值对进行分组和排序，并将结果传递到 `reduce` 步骤。因为你的数据以 `Product Line` 作为键，所以它被按键分组和排序后输入到\
    \ `reduce` 函数中。每个 `Product Line` 都有关联的所有 `Sale Amount` 值。\n\n这些新的键值对被写入每个数据节点的本地磁盘，以便\
    \ `reduce` 函数可以读取它们。键值对看起来如下所示。\n\n```\n{M, (3399.99, 54.99, 899.99, 1578.27)}\n\
    {R, (699.09, 1777.77, 3528.99)}\n{S, (35.99, 120.00)}\n{T, (874.99)}\n```\n\n\
    ![Image 193](img/index-406_1.png)\n\n第 17 章 ■ 面向 SQL Server 数据库管理员的大数据\n\n***图\
    \ 17-3.** 使用单个 reduce 任务的 MapReduce 作业*\n\n现在你有了可以处理的东西，因为键值对按键已排序和分组，但请记住，这是由\
    \ `map` 步骤在*独立*节点上运行 `map tasks` 完成的。在执行 `map task` 的每台服务器上，可能都有相同的键但不同的值。这些键需要在\
    \ `reduce` 步骤中汇集在一起，因此 MapReduce 框架通过将它们发送到一个公共节点以便一起处理来解决这个问题，如图 17-3 所示。\n\n\
    `reduce` 步骤以这些数据作为输入并对其进行迭代。当它接收到一个键值对时，由开发者负责相应地处理数据。为了满足你的需求，开发者需要遍历每个 `Sale\
    \ Amount` 值并对其进行聚合。简单来说，`reduce` 步骤允许你对一个键的销售额求和，并返回带有聚合总额的键。当 `reduce` 步骤完成时，作业就完成了，输出被写入\
    \ HDFS。客户端必须从 HDFS 读取输出数据，才能使其对最终用户可见。在此示例中，`reduce` 输出是一个包含四行数据的小文件，即按 `Product\
    \ Line` 的总销售额。\n\n```javascript\nvar reduce = function (key, values, context)\
    \ {\n  var sumsales = 0.0;\n  var productLine = key;\n  while (values.hasNext())\
    \ {\n    sumsales += parseFloat(values.next());\n  }\n  context.write(productLine,\
    \ sumsales);\n};\n```\n\n***归约输出***\n\n```\n{M, 5933.24}\n{R, 6005.85}\n{S, 155.99}\n\
    {T, 874.99}\n```\n"
- fmt: '# Chapter 17: Big Data for the SQL Server DBA


    MapReduce is the most important part of this chapter, so let’s take the example
    a step further to emphasize how much we made Hadoop do with a small amount of
    code. In a real-world scenario, this simple job could be executed on hundreds
    of computers at the same time, if the data is distributed across that number of
    data nodes, each of them taking on their own share of the load. While our code
    snippets have a big role to play in how the data is processed, a lot happens that
    isn’t visible to us. With so many servers involved, you’re probably thinking that
    there has to be a substantial amount of coordination, organization, and management
    going on—and you would be correct.


    The MapReduce framework takes care of this, starting `MapReduce` jobs on the data
    nodes that contain the data you need, monitoring the jobs for success or failure,
    and bringing the data together after it is processed independently. If a job fails,
    the framework can reexecute it, and this is good because you could be potentially
    running jobs on hundreds of servers at the same time and you wouldn’t want a failure
    on a single machine to stop you from your pursuit. A data node can fail for any
    number of reasons (such as a hardware problem, memory pressure, low disk space,
    etc.), yet the `MapReduce` framework can restart the job on another server that
    has the same set of data to keep things running.


    ![Image 194](index-407_1.png)


    *Figure 17-4. A `MapReduce` process showing how key-value pairs are brought together
    in the reduce step*


    Even if you never write a line of `MapReduce` code, it’s important to know how
    it works because there are numerous tools available to `DBAs` for importing, exporting,
    and manipulating `Hadoop` data. These tools implement `MapReduce` to do their
    work, but hide the details from the user, while the `JavaScript` code allows you
    to customize the `MapReduce` function to suit your needs. In `SQL Server` terms,
    the `JavaScript` code would be `T-SQL`, while the `Hadoop` tools would be `BCP`
    and `SSIS`. The `Hadoop` tools you’ll use in the sample scripts later in the chapter
    will allow you to set some parameters that affect how they employ `MapReduce`
    to do their work, so understanding `MapReduce` at the code level is important
    for knowing how to use the tools effectively.


    For in-depth coverage on setting up `Hadoop`, writing `MapReduce` code, and tuning
    and testing `MapReduce` jobs, see *Pro Hadoop* written by Jason Venner (Apress,
    2009). Venner’s book covers `MapReduce` in much more detail and also discusses
    debugging, testing, and tuning `MapReduce`.


    Another important factor in how `MapReduce` works is the hardware configuration.
    Even though we’ve been talking about a cloud configuration with `Hadoop` on `Azure`,
    it’s important to have some knowledge about the hardware that drives `Hadoop`.


    ## Hardware


    You might have heard that `Hadoop` can use `commodity` hardware, suggesting second-rate
    or low-quality machines, but don’t assume we’re talking about the old servers
    that have been sitting under your desk for years. The majority of your servers
    will be `Slave Nodes` with lots of local disk storage and moderate amounts of
    `CPU` and `RAM`. Some of the machines will be `Master Nodes` that might have a
    slightly different configuration with more `RAM` and `CPU`, but less local storage.
    These machines might be cheaper than the machines you normally use for `SQL Server`,
    but not necessarily. Many `SQL Server DBAs` are running their databases on this
    type of `commodity` hardware, so the term `commodity` might be misleading, allowing
    them to think that they can use even lower-end hardware for Big Data. In addition,
    for Big Data you’ll need a lot more servers that will still need a minimum level
    of storage and memory to perform in a satisfactory manner. In this context, `commodity`
    hardware refers to a collection of servers that can be purchased off the shelf,
    not high-end computers that are custom designed and built for super-high performance.


    A generic minimum configuration for `Hadoop` should include two machines with
    two multicore `CPUs`, four directly attached local hard disks with at least 1
    `TB` of storage each, and 24 `GB` of `RAM`. You would need two of these data nodes,
    giving you 8 `TB` of storage. If you are expecting to quickly ramp up a production
    `Hadoop` cluster to a larger scale, you could put together eight multicore servers,
    each with 32 `GB` of `RAM` and 12 2-`TB` disks, totaling 24 `TB` of storage. This
    would give you 192 `TB` of total storage, but since the data is stored three times
    for redundancy, it means you actually have 64 `TB` to work with. What happens
    if usage takes off and you need more storage? You simply add more data nodes.
    One of `Hadoop`’s strengths is the ability to add more data nodes to a cluster
    seamlessly, so whether you start with the smaller or larger configuration, you
    can always grow to a very large size. Consider that it would take approximately
    130 24-`TB` data nodes to scale up to 3 `PB` (petabytes) of redundant data, while
    the framework has been designed to handle 10,000 data nodes!


    > **Caution** Notice that we didn’t talk about the storage being handled by a
    `SAN`. There’s a good reason for this.


    `Hadoop` was designed for locally attached direct storage so that each node controls
    its own data storage. A `SAN` could become a bottleneck when multiple data nodes
    access it simultaneously (or if used by other applications in an enterprise setting),
    and it’s a more expensive way to store data than `commodity` disk drives. Disk
    access is often the bottleneck when you process large amounts of data, and not
    sharing the storage reduces this bottleneck. Using separate storage dedicated
    to each data node allows the disk to be used in parallel more effectively.


    While this high degree of distribution and parallelism provides an ability to
    store an almost infinite amount of data, an important thing to understand is that
    `HDFS` is limited in ways we’re not accustomed to as `RDBMS`-focused data architects.
    It supports forward-only parsing, so you are either reading ahead or appending
    to the end of a file. There is no concept of update or insert, and files can only
    be written to once. This is what makes `HDFS` very different from `SQL Server`,
    and will even seem crude at times compared to the tables, columns, views, and
    other database objects you’re familiar with.'
