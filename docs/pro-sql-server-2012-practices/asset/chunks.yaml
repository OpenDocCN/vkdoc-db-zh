    在基本层面上，最好保留一份对每个请求的更改的简单记录，并随着与你的发布管理流程相关的任务完成，保留一份任务列表。跟踪这些任务以及执行或重新执行的日期，将使你能够衡量实际发布的成功程度。收集这些信息将有助于未来的发布，并帮助微调你的发布管理任务。允许你的流程进行改变和优化，将确保你创建一个成功的、包含恰当任务的发布管理流程。


    两个有帮助的文档是发布说明文档和实际的发布计划文档。


    发布说明将是一个包含每个发布摘要信息以及所述发布相关任务的单一文档。日期和其他信息将被收集并保存在此文档中，以帮助你为每个新发布更好地计划。实际的发布计划文档将被创建、填写、测试并最终执行，将变更发布到你的生产环境。在每次执行发布时，保留这些信息片段以供将来审查。随着发布管理流程中的步骤发生变化，更新未来版本的发布计划。手头拥有此发布计划的模板是个好主意，你可以根据需要对其进行更新。这个模板将通过提供一个起点（其中许多信息已经填写）来帮助你创建每个发布计划。


    ## 发布说明


    保留每个发布请求的记录。保留与你执行的每个任务相关的每个日期的记录。当你执行一次发布，然后是下一次，再下一次，你很快就会得到一个信息量相当大的文档。你可以使用这些信息不仅记住过去的发布，还可以回顾它们是如何执行的、有多少步骤被重复、哪些步骤遇到了困难、哪些步骤不那么有用，甚至是你流程中缺少步骤的漏洞。随着你跟踪在准备发布每个变更时在流程中所处的位置，保留这些准确的发布说明信息也将使这项任务变得容易。


    完成此任务的一个简单方法是启动一个`Excel`文档，类似于图 8-3 所示。


    该文档可以随着收到的每个变更请求而不断增长，并将帮助你跟踪每个请求及其任务。


    ***图 8-3.** 发布说明示例文档*


    你可以在这些发布说明中跟踪的信息将包含信息、任务和日期。例如：


    -   发布名称

    -   发布计划（对此文档的引用）

    -   发布到各个环境的日期

    -   初始发布计划请求

    -   接收并审查答案

    -   审查代码

    -   审查发布

    -   交接

    -   发布计划创建

    -   发布计划审查

    -   回滚程序

    -   发布计划测试

    -   执行发布


    ### 发布名称


    每个发布都将关联一个发布名称。如何命名每个发布取决于你，但请记住，唯一的命名约定将有助于跟踪每个单独的发布。


    ### 发布计划


    你应该创建一个包含执行实际发布的所有信息和步骤的文档。你将此文档称为*发布计划*。在你的发布说明中，保留对此发布计划的链接或引用。当你正在准备和执行发布时，这些信息将唾手可得。当发布完成且一段时间过去后，拥有此引用对你的未来发布将非常有价值。


    ### 发布到各个环境的日期


    跟踪发布在你的每个环境中执行的日期。按顺序执行这些操作至关重要，按照正确的顺序跟踪每次执行也将帮助你保持流程的有序。确保不要通过在适当时间之前跳到另一个环境来跨越你有序的环境。


    ### 初始发布计划请求


    当变更被请求时，在你的发布说明中将此日期记录为发布被请求的初始日期。这将成为你的起点。最终目标将是一个成功的发布。你可能永远不会发布它，这也没关系。跟踪这些日期将帮助你保持条理并遵循你的流程。当你收到变更请求时，此时你可以使用模板创建发布计划，并开始用你收集和创建的信息填充它。


    ### 接收并审查答案


    当你准备发布计划文档并为其填充信息，以及审查提议变更的代码时，你不可避免地会有需要解答的问题。这个迭代过程可能涉及多个周期，直到你和其他相关人员满意为止。允许这个周期发生，并继续寻求问题的答案。在你遍历每个迭代时进行跟踪，记下与收到答案相关的日期。


    ### 审查代码

