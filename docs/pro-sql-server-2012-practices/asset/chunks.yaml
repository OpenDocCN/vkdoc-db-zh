    EXECUTE [dbUtilities].[dbo].[Get_File_growth]\n```\n\n可以通过从表中选择行来查看结果。\n\n```sql\n\
    SELECT * FROM [dbUtilities].[dbo].[File_growth]\n```\n\n本章剩余的示例将不包括收集操作的执行或结果语句的验证，因为它们只是具有不同对象名称的语句。数据库文件增长信息的收集仅在存储过程执行时进行。\n\
