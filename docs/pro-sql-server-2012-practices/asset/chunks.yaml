    ## SQL Server 代理


    SQL Server 代理允许你创建**作业**，这些作业是针对实例执行的一个或一系列操作。作业可以运行一次或多次。一个作业将包含几个组件，这些组件是作业步骤、计划和通知。


    作业的一个例子是监控 DMV 部分中讨论的内存、处理器和磁盘信息。首先，你将创建一个数据库来保存记录信息的表。此查询如清单 10-4 所示。


    ### 清单 10-4. 创建 DBAInfo 数据库


    ```sql

    CREATE DATABASE DBAInfo;

    ```


    接下来，你将创建一个表来保存每个 DMV 查询的信息，如清单 10-5 所示。


    ### 清单 10-5. 创建用于保存监控信息的表


    ```sql

    CREATE TABLE MemoryDMVHistory

    (total_physical_memory_kb BIGINT,

    available_physical_memory_kb BIGINT,

    system_memory_state_desc NVARCHAR(256),

    collection_date_time DATETIME);


    CREATE TABLE ProcessorDMVHistory

    (session_id SMALLINT,

    request_id INT,

    host_name NVARCHAR(128),

    login_name NVARCHAR(128),

    db_name NVARCHAR(128),

    start_time DATETIME,

    currenttime DATETIME,

    cpu_time INT,

    total_elapsed_time INT,

    query_text NVARCHAR(MAX),

    collection_date_time DATETIME);


    CREATE TABLE DiskDMVHistory

    (session_id SMALLINT,

    request_id INT,

    host_name NVARCHAR(128),

    login_name NVARCHAR(128),

    db_name NVARCHAR(128),

    start_time DATETIME,

    currenttime DATETIME,

    total_elapsed_time INT,

    reads BIGINT,

    writes BIGINT,

    query_text NVARCHAR(MAX),

    collection_date_time DATETIME);

    ```


    要查看现有作业，请打开 `SSMS`，连接到一个实例，展开 `SQL Server 代理`，然后展开 `作业`。


    要创建新作业，请右键单击 `作业`。如图 10-3 所示的“常规”屏幕允许你配置基本信息，如作业名称、类别和描述。将作业命名为“收集 DMV 性能指标”，选择
    `数据收集器` 作为类别，并添加描述。


    ![Image 114](img/index-248_1.png)


    第 10 章 ■ 自动化管理


    ### 图 10-3. SQL Server 代理作业的常规属性


    ### 作业步骤


    每个作业由一个或多个步骤组成。要创建步骤，请在作业屏幕左侧单击 `步骤`，如图 10-4 所示。创建作业步骤时，至少需要提供步骤名称、类型和命令。步骤名称是你在
    `作业活动监视器` 和错误日志中看到步骤被引用的方式。请为步骤选择一个清晰的名称，使其作用一目了然。


    最常用的命令类型是 `T-SQL`，但你也可以指定 `ActiveX 脚本`、`CmdExe`、`PowerShell`、`复制代理`、`Analysis
    Services` 命令或查询，或 `Integration Services` 包。这些选项极大地扩展了作业的功能。`T-SQL` 可以完成许多任务，但有些任务由其他工具完成更合适。


    第 10 章 ■ 自动化管理


    如果你的 `SQL Agent` 服务帐户没有足够的权限执行 `T-SQL` 脚本，可以在代码中包含 `EXECUTE AS` 命令。对于 `T-SQL`
    以外的步骤，`运行身份` 选项允许你指定另一个帐户来执行该步骤。能够传入不同的凭据集可以帮助你规避权限不足的问题，而无需向 `代理` 帐户授予额外权限。


    以下是正确设置 `运行身份` 选项所需的几个步骤：


    • 你必须首先向服务器添加一个凭据，其中包含用户名和密码信息。设置方法位于 `安全性 > 凭据` 下。


    • 然后，创建一个链接到这些凭据的代理。代理设置位于 `SQL Server 代理 > 代理` 下。


    • 创建凭据后，创建一个代理。将该代理分配给它可以关联的步骤类型。


    现在，你将能够选择一个帐户来运行任何关联的步骤。


    为了继续创建执行 DMV 查询的作业，添加一个步骤来执行清单 10-6 中所示的查询。


    ### 清单 10-6. 将 DMV 查询结果插入表中的查询


    ```sql

    INSERT INTO MemoryDMVHistory

    SELECT total_physical_memory_kb,

    available_physical_memory_kb,

    system_memory_state_desc,

    GETDATE()

    ```

