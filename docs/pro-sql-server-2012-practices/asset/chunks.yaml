- fmt: "# Chapter 4: Dynamic Management Views\n\n## Partition Statistics\n\nThe index\
    \ shown in Figure 4-17 was created by me for just this query. It’s never been\
    \ used and is on the column `MiddleName` of the `Persons` table. This might seem\
    \ like a ridiculous index, but it would not be the worst I’ve identified for removal.\
    \ The important thing to note is that you should monitor unused indexes for at\
    \ least a month’s time. As new objects and indexes are placed into an environment,\
    \ they might not be called (that is, objects are released, but application code\
    \ is to be released at a later date that will call upon the index, and so forth).\
    \ These scenarios must be kept in mind when choosing indexes to remove, because\
    \ removing a needed index can have a serious performance impact to the users or\
    \ applications.\n\nReporting on partition statistics can offer the DBA pertinent\
    \ day-to-day data storage information, performance information, and so forth.\
    \ Knowing how to join to system tables, such as `sys.partitions`, is important\
    \ because it can give database professional more valuable data, as well as reviewing\
    \ space usage and LOB info.\n\nThe DMVs will show only one row per partition.\
    \ This allows the DMV to simplify partition count queries for any given object.\
    \ Row overflow data, which is extremely important to maintenance work, can be\
    \ pulled easily from the DMV, too.\n\nQuerying partition statistics DMVs offer\
    \ high hit partitions with drill down lists, page and row-count information. The\
    \ `OBJECT_ID` function can then be used to identify the objects from the views\
    \ by name.\n\nRetrieving information about used pages and the number of rows on\
    \ a heap or clustered index can be challenging, but not if you use the following\
    \ query:\n\n```sql\nSELECT SUM(used_page_count) AS total_number_of_used_pages,\n\
    \       SUM (row_count) AS total_number_of_rows\nFROM sys.dm_db_partition_stats\n\
    WHERE object_id=OBJECT_ID('Person.Person')\n  AND (index_id=0\n       or index_id=1)\n\
    ```\n\nFigure 4-18 shows the results.\n\nFigure 4-18. Statistics on a partitioned\
    \ index.\n\nLocating partitions with the largest row counts can give you pertinent\
