  trans: '# 第 12 章：面向数据库管理员的 Windows Azure SQL Database


    SQL 数据库管理门户（SDMP）有些不同。因为它是作为一个完全独立的门户构建的，所以即使你已经登录了 Windows Azure 管理门户，也需要重新登录。Windows
    Azure 管理门户中提供了访问数据库门户的链接。各种门户和高级安全要求如图 12-2 所示。


    `注意` 由于 Windows Azure 是一个快速发展的平台，在 Windows Azure 中管理资源的方式也在不断改进。在撰写本文时，一个新的 Windows
    Azure 管理门户预览版已经可用，也显示在图 12-2 中。


    *图 12-2. Windows Azure 门户。*


    表 12-2 快速总结了每个门户提供的功能。某些功能尚无用户界面，例如管理用户和对象级安全。目前，在 SQL 数据库管理门户中无法执行的功能需要在 SSMS
    中完成。


    *表 12-2. 各门户执行的高级功能*


    | 门户 | 提供的功能 |

    | :--- | :--- |

    | Windows Azure 管理 | 创建或删除数据库。管理防火墙规则。查看数据库连接字符串。导出或导入数据。 |

    | Windows Azure SQL Reporting | 上传和管理报表。管理用户安全。查看日志文件。 |

    | Windows Azure SQL Data Sync | 在数据库之间创建和管理数据同步。查看日志文件。 |

    | SQL 数据库管理 | 管理数据库对象（如视图、表和存储过程）。查看数据库使用情况和性能不佳的查询。运行 T-SQL 语句。查看执行计划。管理联合。 |


    你也可以使用 SSMS 来管理你的 SQL 数据库实例。只要遵循受支持的 T-SQL 语法并使用 2008 R2 SP1 或更高版本，你就可以执行 SQL
    数据库管理门户提供的所有功能。你可以在 MSDN 上查看 SQL 数据库 T-SQL 参考：[`msdn.microsoft.com/en-us/library/windowsazure/ee336281.aspx`](http://msdn.microsoft.com/en-us/library/windowsazure/ee336281.aspx)。


    例如，要在 SSMS 中创建一个 5-GB 的 SQL 数据库实例，你需要在连接到 master 数据库时执行以下语句：

    ```

    CREATE DATABASE mydb1 (MAXSIZE=5GB)

    ```


    ## 安全性


    谈到安全性，SQL 数据库只提供了一些功能，但它们都很重要。


    然而，目前 SQL 数据库不支持用于静态数据加密的证书。虽然缺乏静态数据加密已被确定为该平台的一个显著缺陷，但目前这是无法避免的，因为你需要向 Microsoft
    提供解密数据所需的所有密钥。


    即使考虑到加密方面的限制，SQL 数据库仍然是一个非常安全的数据库，并提供了高级的安全机制，如表 12-3 所列。


    *表 12-3. SQL 数据库中的安全功能摘要*


    | 安全功能 | 描述 |

    | :--- | :--- |

    | 数据库登录 | 对 SQL 数据库唯一可用的身份验证方式是数据库登录。目前不支持网络级身份验证。 |

    | 哈希处理 | 支持与 SQL Server 相同级别的哈希处理。 |

    | SSL 流量 | 所有流向 SQL 数据库的流量都使用安全套接字层（SSL）证书进行加密。此安全功能无法关闭。 |

    | 对象级安全 | 所有传统的对象级安全机制在 SQL 数据库支持的对象上都可用，例如架构级安全。 |

    | 防火墙 | SQL 数据库自带防火墙，在 master 数据库中进行配置。防火墙在数据库身份验证之前工作，阻止来自未授权 IP 地址的不需要的连接。 |


    ## 其他重要信息


    到目前为止，我概述了 SQL Server 和 SQL 数据库之间的一些关键差异。既然我们正在讨论这个话题，还有一些额外的事情你需要了解。


    ### 数据库大小


    SQL 数据库实例有特定的大小，对应于 Web 版或商业版。


    目前，各版本之间没有功能差异；只有每个版本下可用的数据库大小不同，如表 12-4 所列。


    *表 12-4. 各版本 SQL 数据库的最大可用大小*


    | SQL 数据库版本 | 可用的数据库最大大小 |

    | :--- | :--- |

    | Web 版 | 1 GB 和 5 GB |

    | 商业版 | 10、20、30、40、50、100 和 150 GB |


    ### 数据库版本


    如果你检查数据库的版本，你会看到 SQL 数据库作为 SQL Server 2012 运行；但是，如果你检查数据库的兼容性模式，你很快就会意识到数据库实例本身运行在
    SQL 2008 向后兼容模式下。这意味着虽然 SQL 数据库运行在 SQL Server 2012 平台上，但它目前无法使用 SQL Server 2012
    的新功能。尽管如此，一些特定于 SQL Server 2012 的可编程性功能在 SQL 数据库中是可用的，例如新的日期和时间相关函数（如 `DATEFROMPARTS`、`EOMONTH`）、新的逻辑函数（`IIF`
    和 `CHOOSE`）以及少数其他功能。


    ### 对 T-SQL 的支持


    虽然绝大多数 T-SQL 操作都受 SQL 数据库支持，但仍有一些显著的例外和许多限制。一般来说，能够提供位于同一服务器上的其他客户信息的系统视图不可用，依赖于硬件知识（如文件位置）或不可用功能（如使用证书和加密）的语句也不可用。因为这些限制的清单可能会快速变化并且数量较多，你应该查阅
    MSDN 以获取关于哪些语句受支持、部分支持或不受支持的最新信息。查看 [`msdn.microsoft.com/en-us/library/windowsazure/ee336253`](http://msdn.microsoft.com/en-us/library/windowsazure/ee336253)
    获取不受支持的 T-SQL 语句列表。


    ### 备份和还原


    在 SQL 数据库中，没有传统意义上的备份和还原命令。但是，有多种方法可以恢复通常因对数据库的错误操作（如意外的截断操作）而导致的意外数据丢失。这些选项如表
    12-5 所示。请注意，除非对原始主 SQL 数据库实例的副本执行操作，否则导出/导入功能不提供事务一致性。


    *表 12-5. 可对 SQL 数据库实例执行的数据复制和还原操作摘要*


    | 操作 | 事务一致性 | 说明 |

    | :--- | :--- | :--- |

    | COPY 操作 | 是 | 使用 `CREATE DATABASE AS COPY OF` 命令创建 SQL 数据库实例的克隆。 |

    | 导入/导出 | 否 | 将数据库的数据和架构复制到 blob，以便可以通过导入过程进行还原。存在某些限制。 |

    | 时间点还原 | 是 | SQL 数据库的未来功能，提供时间点还原选项。存在某些限制。 |


    `注意` 时间点还原功能在撰写本文时尚未公开提供。


    ### 联合


    如前所述，SQL 数据库实例运行在商用硬件上，几乎没有硬件或环境配置选项。这使得 SQL 数据库实例对于具有非常高要求工作负载且需要纵向扩展环境的应用程序和系统来说是一个糟糕的选择。但是，你可以使用
    SQL 数据库进行扩展，利用一个 SQL Server 上不可用的功能，称为*联合*。


    你可以将联合与 SQL 数据库一起使用，以将一个或多个表分区到多个数据库中，开发人员可以通过代码以某种透明的方式使用联合来访问数据。'
- fmt: 'Because SQL Database instances can be created programmatically without any
    hardware configuration or environment settings, adding new SQL Database instances
    to a federation is simple and requires very little administration. The simplicity
    of SQL Database becomes its strength when it comes to scalability.


    **Note:** *Scale up* is usually a term used to refer to database systems that
    scale by adding more processing power, more memory, or more disks to a single
    server. *Scale out* is a term used to refer to database systems that scale by
    adding more servers for improved response time.


    ## Key Terms


    Before we go any further, let’s review the terms related to the SQL Database Federations
    feature. A SQL Database instance is called a `root database` when one or more
    federations have been created in it. Because many federations can be created in
    a `root database`, a few system views were added so that you can easily find out
    how many federations were created.


    A federation is created by specifying a `distribution name` and contains one or
    more `federation members`. The `distribution name` is a typed identifier used
    by SQL Database to determine which type of field a table can be federated on.
    You specify which field a table will be federated on by linking it to the federation
    `distribution name`. (See “T-SQL Changes for Federations” later in this chapter
    for further details.) The field in the federated table used to partition the data
    is called the `federated column`. The `distribution name` and the `federated column`
    must be of the same type.


    A `federation member` is a SQL Database instance that contains a slice of data
    for the federated tables it contains, based on its allocated range. If a `federation
    member` is responsible for holding records from 1 to 100 on the `distribution
    name` called `CustomerID`, all the tables in that `federation member` that are
    federated on `CustomerID` can store only values in that range. Records that fall
    outside of that range are stored in other `federation members`. Note, however,
    that a `federation member` can contain more than federated tables; it can also
    contain stored procedures, views, and most database objects supported by SQL Database.


    A federated member can also contain `reference tables`. `Reference tables` are
    tables that are not federated and are used to store the same data on all the federated
    members for referential integrity and performance. However, `reference tables`
    are not synchronized, meaning that once they are created in the federated members,
    changing records in a `reference table` in one `federation member` does not automatically
    change the `reference tables` in other `federation members`.


    ### Figure 12-3. Sample federation in SQL Database


    Figure 12-3 represents a sample federation called `FederationCust` with two `federation
    members` split at `CustomerID = 1000`. In this example, the `Customers` table
    contains the first 999 customers in the first `federation member` and the remaining
    records in the second `federation member`. The `Countries` table is used as a
    `reference table` and contains the same records.


    ## T-SQL Changes for Federations


    Because Federations are a fully supported feature of SQL Database, certain T-SQL
    commands were created and others modified to manage them. Table 12-6 provides
    a summary of the most important statements and views used with federations.


    ### Table 12-6. Summary of important federation commands and system views


    **T-SQL Statement** | **Comment**

    --- | ---

    `CREATE FEDERATION` | This new statement is executed on a SQL Database instance
    to create a new federation. This statement also specifies the `distribution name`
    that will be used during the `CREATE TABLE` statement to determine which field
    the table will be federated on. The SQL Database instance on which this command
    is used becomes the `root database`.

    `DROP FEDERATION` | The federation to drop. All the `federation members` (databases)
    that'
  raw: 'Because SQL Database instances can be created programmatically without any
    hardware configuration or environment settings, adding new SQL Database instances
    to a federation is simple and requires very little administration. The simplicity
    of SQL Database becomes its strength when it comes to scalability.


    n **Note** *Scale up* is usually a term used to refer to database systems that
    scale by adding more processing power, more memory, or more disks to a single
    server. *Scale out* is a term used to refer to database systems that scale by
    adding more servers for improved response time.


    Key Terms


    Before we go any further, let’s review the terms related to the SQL Database Federations
    feature. A SQL


    Database instance is called a *root database* when one or more federations have
    been created in it. Because many federations can be created in a root database,
    a few system views were added so that you can easily find out how many federations
    were created.


    A federation is created by specifying a *distribution name* and contains one or
    more *federation* *members*. The distribution name is a typed identifier used
    by SQL Database to determine which type of field a table can be federated on.
    You specify which field a table will be federated on by linking it to the federation
    distribution name. (See “T-SQL Changes for Federations” later in this chapter
    for further 300


    ![Image 142](index-308_1.png)


    chapter 12 ■ WindoWs azure sQL database for dbas


    details.) The field in the federated table used to partition the data is called
    the *federated column*. The distribution name and the *federated column* must
    be of the same type.


    A federation member is a SQL Database instance that contains a slice of data for
    the federated tables it contains, based on its allocated range. If a federation
    member is responsible for holding records from 1 to 100 on the distribution name
    called CustomerID, all the tables in that federation member that are federated
    on CustomerID can store only values in that range. Records that fall outside of
    that range are stored in other federation members. Note, however, that a federation
    member can contain more than federated tables; it can also contain stored procedures,
    views, and most database objects supported by SQL Database.


    A federated member can also contain *reference tables*. Reference tables are tables
    that are not federated and are used to store the same data on all the federated
    members for referential integrity and performance. However, reference tables are
    not synchronized, meaning that once they are created in the federated members,
    changing records in a reference table in one federation member does not automatically
    change the reference tables in other federation members.


    Figure 12-3 represents a sample federation called FederationCust with two federation
    members split at CustomerID = 1000\. In this example, the Customers table contains
    the first 999 customers in the first federation member and the remaining records
    in the second federation member. The Countries table is used as a reference table
    and contains the same records.


    ***Figure 12-3.** Sample federation in SQL Database.*


    T-SQL Changes for Federations


    Because Federations are a fully supported feature of SQL Database, certain T-SQL
    commands were created and others modified to manage them. Table 12-6 provides
    a summary of the most important statements and views used with federations.


    chapter 12 ■ WindoWs azure sQL database for dbas


    ***Table 12-6.** Summary of important federation commands and system views*


    **T-SQL Statement**


    **Comment**


    CREATE FEDERATION


    This new statement is executed on a SQL Database instance to create a


    new federation. This statement also specifies the distribution name that


    will be used during the CREATE TABLE statement to determine which field


    the table will be federated on. The SQL Database instance on which this


    command is used becomes the root database.


    DROP FEDERATION


    The federation to drop. All the federation members (databases) that'
