- fmt: '## Analyzing Perfmon Data


    You might see a statement such as "The SQL Server''s CPU is averaging 25%, it
    is healthy and there is excess capacity." Today''s systems and applications are
    very complex and cannot be measured by only a single metric like processor utilization.
    The `% Processor Time` counter is one of the many object counters you collected
    data from as part of this effort. Each object counter is important and tells a
    different part of the story. A system averaging 25 percent might be having a problem
    elsewhere, such as scheduler pressure, and you might overlook it by just looking
    at the `% Processor Time` data.


    There are several important rules to follow when you are reviewing the performance
    data and working through the findings:


    - When analyzing data, refer only to facts, not hypotheticals. Hypotheticals often
    lead people down the wrong road.

    - Perform proper root-cause analysis. Many times the cause of an issue is identified
    without the person analyzing the data trying to understand what the real problem
    was. Instead, the analyst bases her opinion on circumstantial evidence that can
    be misleading. It would be like saying, "Johnny was in the back yard when the
    window was broken, so he must have done it."

    - Some object counters can be reviewed in isolation, but most object counters
    need to be reviewed with other related object counters. A periodic increase in
    I/O on the disk that contains the transaction logs is most likely the result of
    database checkpoints. If you review both counters together, you can correlate
    these events.


    ![Image 210](index-454_1.png)


    CHAPTER 18 ■ Tuning foR PEAk LoAd


    Analyzing performance data can be a frustrating experience for some `DBA`s because
    `SQL Server` performance metrics represent a small percentage of the overall object
    counters available and/or captured. As noted earlier, this is where the other
    members of the team come into play, because each one will analyze his or her respective
    area of the system. This enables everyone to correlate data points. A specific
    data point analyzed in isolation might look bad, but when you put it together
    with all the other information, it might be better or worse than you originally
    thought.


    An example of this is when the `Max Server Memory` data for a given `SQL Server`
    instance is set to a large fixed amount that is actually starving `Windows` from
    the memory it needs. It might not be evident in `SQL Server`, but the `OS`-level
    counters show that there is excessive paging in the `OS`. When the server administrator
    reviews the server object counters, he might know that `SQL Server` is on the
    system but not that the internal memory setting for `SQL Server` is so high that
    it can cause such a problem. Only when the two administrator talks to another
    team member does he figure out that there is a mismatch. That is why communication
    is key within the team, especially when you are reviewing the performance data.
    The reality is that many non-`DBA`s do not understand how `SQL Server` works.
    Ensure you fully explain what you are seeing within `SQL Server`, and this will
    help others on the team make connections they otherwise wouldn’t.


    If you are a `DBA` who likes to learn, use peak load as the perfect opportunity
    to learn how to analyze `Perfmon` data. There is a huge amount of information
    about `Perfmon` on the web that talks about the object counters and all of the
    recommended thresholds. There are also several great tools that can help you analyze
    the collected data, and templates are available that are specific to `SQL Server`.
    One of them is Performance Analysis of Logs (`PAL`), which you can find at `http://pal.codeplex.com/`.
    You can use this tool to analyze the `Perfmon` files with `SQL Server`–specific
    thresholds. After you answer some questions about the server, `PAL` analyzes the
    `Perfmon` file, produces a report, and outlines all of the object counters that
    need to be reviewed. Figure 18-10 shows sample output contained in a `PAL` report.


    ***Figure 18-10.** High-level view of a sample `PAL` report.*


    `PAL` breaks down a larger `Perfmon` data capture into smaller time slices so
    that numbers better reflect the performance during that specific time window.
    For example, if the average for `PLE` is calculated over 48 hours, it might include
    times when the buffers are under more pressure due to reindexing processes. For
    each time slice, the minimum, maximum, and average values for each object counter
    are evaluated to determine if they are within an acceptable range. If the counter
    is outside of this range, `PAL` will highlight the finding in yellow for a warning
    and in red for critical. The condition is shown as a hyperlink to supporting detail,
    as shown in Figure 18-11. Above the graph is a detailed description for the respective
    object counter, which is very informative, especially for `DBA`s who are not familiar
    with `Perfmon` data.


    ![Image 211](index-455_1.png)


    CHAPTER 18 ■ Tuning foR PEAk LoAd


    ***Figure 18-11.** Supporting detail for `Batch Requests/sec`.*


    As you can see in Figure 18-11, additional analysis is provided if you remove
    the outliers for the top 30 percent and calculate the standard deviation. The
    data points in Figure 18-10 reflect the average over a specific time, but you
    cannot see the trends of the data. Reviewing the chart in Figure 18-11 provides
    you with a better view of the data. It is easier to see trends in the chart view
    than in the report view, as you will see when you analyze the `Perfmon` files
    in `Performance Monitor`.


    `PAL` is a great tool for reviewing a large `Perfmon` file quickly, but it does
    not correlate the separate object counters, which as established above, is an
    important part of this process when analyzing the performance of complex systems.
    This is where utilizing the `Perfmon` file in binary (`BLG`) format comes into
    play. You can view the `BLG` file in `Performance Monitor` in several different
    formats, but the two formats I’ll walk you through are the line view and the report
    view. The line view displays the data in a graphical format, where it is easier
    to correlate the data and see trends in the data. The report view lists the values
    only, which makes it easier to see the values and compare them to the thresholds.
    You will walk through both types of formats as you analyze performance data for
    the example tax application.


    Figure 18-12 shows the report view from a system that was run for seven days.
    By default, `Perfmon` displays the average of all values. In this view, it’s easy
    to see that the values for the `F` drive `Avg. Disk sec/Read` is an average of
    `.043` over seven days.


    ![Image 212](index-456_1.png)


    ![Image 213](index-456_2.png)


    CHAPTER 18 ■ Tuning foR PEAk LoAd


    ***Figure 18-12.** Report view in `Performance Monitor` for a seven-day capture
    of the logical disk counters.*'
