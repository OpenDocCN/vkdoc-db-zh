    The key to a successful deployment is to ensure all parties involved have bought
    in and signed off on the requirements and the process to be used to achieve the
    goal. Problems arise when managers or executives are expecting one thing and they
    end up with something different. Managing those individual expectations will go
    a long way toward a successful deployment. Additionally, verify that all key personnel
    understand what the process implemented will actually be doing. If you have spent
    a considerable sum of money setting up a `Windows Failover Cluster` with `SQL`,
    and management expects to have a second copy of the data ready for reporting,
    you are going to have a lot of explaining to do later.


    Keep in mind the following:


    **Edition of SQL Server** Several features are available only with the `Enterprise
    edition`, which incurs greater licensing costs than the `Standard edition`.


    **Latency** Determine whether or not latency will negatively impact your system.
    In many cases, a copy of the data that is 15-minutes to 1-hour old might be more
    than sufficient for the business needs.


    **Overall goal** When the needs of data redundancy are for high availability or
    disaster recovery, `log shipping`, `mirroring`, and `failover clustering` are
    more likely the place to begin building your implementation plan. When searching
    for load-balancing, reporting, or distributed systems solutions, `replication`
    or `AlwaysOn availability groups` might be better places to start.


    Keep in mind that there are always situations in which management might choose
    to go with a choice you don’t fully agree with or that you feel is suboptimal.
    Often, that is due to cost considerations, resource considerations, or both. For
    example, management might prefer to avoid the high cost of the `Enterprise edition`.
    Don’t dig in your heels in these cases. Work with what you have.


    ### Keeping the Data Consistent


    We’ve now created a picture of what each technology can do and have created a
    roadmap to help determine the best course of action. It’s time to talk about keeping
    the resulting solution running smoothly.


    First and foremost, you need to monitor your systems. Some features, such as `replication`,
    come with built-in monitoring tools. These can be a starting place for troubleshooting
    in the event of failures. Other features, however, have nothing unless you build
    it yourself—`BCP`, for example.


    If you build an automated system, remember to include error-handling and notification
    mechanisms too. The worst thing that can happen to your environment is to discover
    hours or days later that your data was not in sync!


    If you discover inconsistencies in your data, you need to be prepared to fix them
    quickly. Notifying your superiors and users is crucial to keeping the situation
    from spiraling out of control. Have a plan for communication in the event of failures.
    Timing is very important. Plan for fast communication ahead of time.'
