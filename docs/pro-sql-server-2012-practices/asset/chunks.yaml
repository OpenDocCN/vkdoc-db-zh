  trans: "# 第七章：跳出思维定式进行索引分析\n\n在每一个缓存计划的 `SHOWPLAN` XML 中，都记录了所有被使用的索引和表。\n\n因此，通过查询计划缓存中的索引使用情况，你可以识别出索引在何处被使用。\n\
    \n![图片 98](img/index-201_1.png)\n\n虽然索引的使用情况可以通过计划缓存来确定，但弄清楚索引在何处被使用的意义何在呢？其意义在于能够识别出索引提供价值的原因。了解这一点后，你就能确定索引支持的是哪个业务流程，从而知道它是被用于填充值列表，还是用于计算你的季度奖金。当你了解了它所支持的内容，就能最准确地判断更改或删除索引会在何处产生影响，并知道如何以及在何处测试对索引所做的更改。\n\
    \n举个例子，我们将检查本章的演示服务器，看看哪些查询正在使用 `PK_SalesOrderHeader_SalesOrderID` 索引。使用代码清单 7-18\
    \ 中的代码，我们可以看到，通过检查 `SHOWPLAN` XML 的 `Object` 节点，索引存储在 `@IndexName` 属性中。我们可以直接查询这个属性，或者通过查询中使用的变量来查询。此查询的结果如图\
    \ 7-19 所示，它显示缓存中有八个计划正在使用该索引，包括使用次数计数，以及你可用于进一步调查其使用方式的执行计划。\n\n**代码清单 7-18.**\
    \ 查询计划缓存以获取索引使用情况\n\n```sql\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED\n\
    GO\n\nDECLARE @IndexName sysname = 'PK_SalesOrderHeader_SalesOrderID';\nSET @IndexName\
    \ = QUOTENAME(@IndexName,'[');\n\nWITH XMLNAMESPACES (DEFAULT 'http://schemas.microsoft.com/sqlserver/2004/07/showplan'),\n\
    IndexSearch\nAS (\n    SELECT qp.query_plan,\n           cp.usecounts,\n     \
    \      ix.query('.') AS StmtSimple\n    FROM sys.dm_exec_cached_plans cp\n   \
    \ OUTER APPLY sys.dm_exec_query_plan(cp.plan_handle) qp\n    CROSS APPLY qp.query_plan.nodes('//StmtSimple')\
    \ AS p(ix)\n    WHERE query_plan.exist('//Object[@Index = sql:variable(\"@IndexName\"\
    )]') = 1\n)\nSELECT StmtSimple.value('StmtSimple[1]/@StatementText', 'VARCHAR(4000)')\
    \ AS sql_text,\n       obj.value('@Database','sysname') AS database_name,\n  \
    \     obj.value('@Schema','sysname') AS schema_name,\n       obj.value('@Table','sysname')\
    \ AS table_name,\n       obj.value('@Index','sysname') AS index_name,\n      \
    \ ixs.query_plan\nFROM IndexSearch ixs\nCROSS APPLY StmtSimple.nodes('//Object')\
    \ AS o(obj)\nWHERE obj.exist('.[@Index = sql:variable(\"@IndexName\")]') = 1\n\
    ```\n\n**图 7-19.** 计划缓存查询的结果\n\n**注意** 曾经有一个案例，我处理的一个数据库有多张表上建有索引。这些索引平均每周只被使用一两次。在一次索引评估中，我们认定这些索引的使用频率不足以证明保留它们是合理的。一旦删除，它们所支持的导入过程性能就大幅下降，导入时间从不到一小时延长到了数小时。这近乎是一个完美的例子，说明了解索引如何被使用以及为何被用是至关重要的。如果事先对索引的用途进行了研究，那么使用这些索引的过程就不会出现性能回退。\n\
    \n## 数据完整性\n\n索引商业价值的另一个方面与数据完整性相关，或者更准确地说，与为验证和确保数据完整性而施加于数据库的规则相关。其主要方法是使用外键。通过外键，我们能够确保输入到一个表中的值，是另一个包含参考信息的表中已有的值。虽然为此信息创建索引似乎并不重要，但这样做通常至关重要。原因在于，如果被验证的列没有索引，那么任何验证检查都需要对该列进行扫描。如果该列有数千或数百万行，这种扫描可能会导致性能问题，并可能引发死锁。\n\
    \n确定外键是否缺失索引的最佳方法，是将外键的元数据与索引进行比对。所需的所有信息都已包含在内，并且可以轻松查询。关键是要记住，务必从索引的左边缘开始比较索引和外键。如果外键不能匹配到那个边缘，那么它就不能用于验证索引中的值。使用代码清单\
    \ 7-19 中所示的查询，可以提供数据库中未建索引的外键列表。此查询的结果如图 7-20 所示，显示 `AdventureWorks2012` 数据库中有\
    \ 33 个外键未建索引。\n\n在识别出未建索引的外键后，下一步就是创建覆盖这些外键的索引。需要建索引的表在图 7-20 的 `fk_table_name`\
    \ 列中；索引的键列将来自 `fk_columns` 列。例如，为缺失的外键索引 `FK_BillOfMaterials_Product_ComponentID`\
    \ 创建索引，将使用代码清单 7-20 中的代码。\n\n**代码清单 7-19.** 查询未建索引的外键\n\n```sql\nSET TRANSACTION\
    \ ISOLATION LEVEL READ UNCOMMITTED\n;\nWITH cIndexes\nAS (\n    SELECT i.object_id,\n\
    \           i.name,\n           (SELECT QUOTENAME(ic.column_id,'(')\n        \
    \    FROM sys.index_columns ic\n            WHERE i.object_id = ic.object_id\n\
    \                AND i.index_id = ic.index_id\n                AND is_included_column\
    \ = 0\n            ORDER BY key_ordinal ASC\n            FOR XML PATH('')) AS\
    \ indexed_compare\n    FROM sys.indexes i\n), cForeignKeys\nAS (\n    SELECT fk.name\
    \ AS foreign_key_name,\n           fkc.parent_object_id AS object_id,\n      \
    \     STUFF((SELECT ', ' + QUOTENAME(c.name)\n                  FROM sys.foreign_key_columns\
    \ ifkc\n                      INNER JOIN sys.columns c ON ifkc.parent_object_id\
    \ = c.object_id\n                          AND ifkc.parent_column_id = c.column_id\n\
    \                  WHERE fk.object_id = ifkc.constraint_object_id\n          \
    \        ORDER BY ifkc.constraint_column_id\n                  FOR XML PATH('')),\
    \ 1, 2, '') AS fk_columns,\n           (SELECT QUOTENAME(ifkc.parent_column_id,'(')\n\
    \            FROM sys.foreign_key_columns ifkc\n            WHERE fk.object_id\
    \ = ifkc.constraint_object_id\n            ORDER BY ifkc.constraint_column_id\n\
    \            FOR XML PATH('')) AS fk_columns_compare\n    FROM sys.foreign_keys\
    \ fk\n        INNER JOIN sys.foreign_key_columns fkc ON fk.object_id = fkc.constraint_object_id\n\
    \    WHERE fkc.constraint_column_id = 1\n), cRowCount\nAS (\n    SELECT object_id,\
    \ SUM(row_count) AS row_count\n    FROM sys.dm_db_partition_stats ps\n    WHERE\
    \ index_id IN (1,0)\n    GROUP BY object_id\n)\nSELECT fk.foreign_key_name,\n\
    \       OBJECT_SCHEMA_NAME(fk.object_id) AS fk_schema_name,\n       OBJECT_NAME(fk.object_id)\
    \ AS fk_table_name,\n       fk.fk_columns,\n       rc.row_count AS row_count\n\
    FROM cForeignKeys fk\n    INNER JOIN cRowCount rc ON fk.object_id = rc.object_id\n\
    \    LEFT OUTER JOIN cIndexes i ON fk.object_id = i.object_id AND\n        i.indexed_compare\
    \ LIKE fk.fk_columns_compare + '%'\nWHERE i.name IS NULL\nORDER BY OBJECT_NAME(fk.object_id),\
    \ fk.fk_columns\n```\n\n**图 7-20.** 外键查询的结果\n\n**代码清单 7-20.** 外键索引示例\n\n```sql\n\
    CREATE INDEX FIX_BillOfMaterials_ComponentID ON Production.BillOfMaterials (ComponentID)\n\
    ```\n\n## 结论"
- fmt: '# Chapter 8: Release Management


    ## Indexing Considerations


    Indexing your databases is an important aspect of maintaining performance for
    your applications. While we often build our indexes by hand and make decisions
    on their value based on their frequency of use, there are other things to consider.
    The totality of the indexing for a table and the purposes of those indexes often
    outweigh the value in adding one index for one purpose. Though, sometimes the
    one index for one purpose is needed to support a business process.


    In this chapter we looked at how to use the missing index DMOs and DTA to perform
    some of the heavy lifting with indexes and get a head start with less manual work.
    We also looked at a few reasons outside statistics that can necessitate an index.
    When going forward with your indexing strategies, it will be important to consider
    all of these facets to index your databases as a whole.


    ## Release Management


    ### By TJay Belt


    The very nature of a database system is to be dynamic, rarely static. The applications
    that use databases tend to change, thus requiring changes within the associated
    databases. The totality of pieces and parts that comprise this “change” will be
    combined into a “release” that will be applied to the system.


    Controlling this change is not rocket science, but it is not without its complexities.
    In this chapter, we will discuss various terms, processes, and ideas, and suggest
    tools to assist you in performing this necessary function, while minimizing risk,
    and impacting your system in a graceful fashion.


    While there are many factors that influence a system, we will specifically discuss
    changes to databases. There are several concerns that we need to keep in mind
    as we contemplate making changes in our databases. There is always a risk to making
    a change to a system. Changes typically will come in the form of newly released
    features, or fixes to existing features. Assuming that your system is in a preferred
    state and running as designed, any new changes should, hopefully, be for the best.
    As we delve into how to create your own release management process, remember that
    minimizing risk will be the goal of this chapter.


    ### My Release Management Process


    The following information has come to you via many years of release process executions,
    and will impart details learned over a few hundred separate releases, some even
    being heralded as successful. In the beginning, when I first embarked on this
    journey of release management, I had no idea what I was doing. I simply knew that
    changes needed to occur.


    I took it upon myself to look at the process as a whole and try to make it better.
    It was a difficult road, and had many late nights, early mornings, and other frustrations.
    Having to speak to my company, both within and outside of my department, was a
    difficult task. Getting them to commit to a process that they didn’t understand
    or care about was even more difficult.


    Slowly, we made progress. We started by implementing small changes, such as a
    rule disallowing ad-hoc queries. The reasoning behind this was sane, and though
    it generated frustrations from others, its enforcement was successful. This lead
    us to the need to wrap our changes into stored procedures that we could introduce
    into our system, execute, and then drop. This allowed us to minimize human involvement
    at release time.


    Soon, we discovered that we needed many additional steps in the process. Eventually,
    I started keeping track of everything we did to prepare for a release. This led
    me to the realization that many of the tasks were unknown to many people, and
    I was able to share these with others via documentation. Once folks realized how
    complex a release was, they were more inclined to be open and helpful, especially
    when I would show them that their release would require hundreds of steps. No
    more were they shy about being available and helping me out. They learned that
    their simple request (or so it seemed to them) required multiple people to work
    many hours to prepare and perform. When they saw the level of documentation that
    we requested them to review, they suddenly caught the vision. This vision spread
    and was infectious.


    In the beginning, we would hold our breath as we embarked upon a release. Often,
    we would hold our breath through the entire release. Many of our initial releases
    failed, had to be rolled back, or had some otherwise undesirable outcome. Soon,
    through the careful implementation of this release process, we started becoming
    proficient at not only planning, but also executing the releases. Soon, we could
    scarcely recall a failed release. Well, that’s a bit of an exaggeration. We always
    remembered the failed releases, but we started putting time between us and them.
    This experience made us happy, but ever vigilant.


    One release, well into our successful period, showed us that even though we had
    been doing a good job, we were not beyond error. An unforeseen functionality occurred
    immediately after the release, and the decision to rollback was made. However,
    in our confidence, we had started skimping on the rollback procedures. In this
    case, it was left to the release engineer to decide how to rollback, and the choice
    that was made turned out to be a bad one. Who was at fault? Was it the individual
    that rolled back in an improper way? No. Was it the developer that released the
    bad code? No. It was me, the creator of the release plan. Because I had not spent
    time creating and documenting the rollback process sufficiently, the onus rested
    upon me. I still feel the sting of this experience, and I use that feeling to
    remain more diligent.


    By sharing such experiences with you, I intend to show you that the release management
    process isn’t a new idea; it has been in practice in various organizations for
    quite a while. I have continued to perfect and alter this process over time. Each
    time the process iterates, it gets stronger. It might never be perfect, but as
    long as the process evolves to meet needs, it will greatly benefit us.


    ### A Change Is Requested


    As you can probably guess, a change will eventually be requested in your application
    and/or database system. How this request comes into existence is not important.
    The request will come, and it will need to be dealt with. We want to determine
    the best ways we can deal with them, control them, and gracefully introduce them
    into our respective systems.


    Unfortunately, many release processes might be similar to the one detailed in
    Figure 8-1. This shows a process that contains very few steps, very few tests,
    very little verification, and a large chance of failure.


    Granted, for certain releases, success could be achieved with this simplistic
    process.


    *Figure 8-1. A typical (and ineffective) release process*


    The following basic steps are involved in this minimalistic release process:


    1. A change is requested.

    2. `T-SQL` code is created to support this change.

    3. `T-SQL` code is tested.

    4. `T-SQL` code is deployed.


    Note: When we refer to `T-SQL` code, this could be `T-SQL` that creates or alters
    functions, tables, stored procedures, data, and so on.


    The minimum tasks from the preceding steps could be steps 2 and 4: create and
    deploy the code. The actual request (step 1) might not come as an official request;
    it might be received in a variety of unofficial ways. Unfortunately, testing (step
    3) does not often occur. This leaves us with only two core tasks transpiring.'
