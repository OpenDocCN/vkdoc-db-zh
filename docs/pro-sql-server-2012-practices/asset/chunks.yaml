    Execution Plans


    Execution plans are another powerful tool you can use to understand and troubleshoot
    performance issues. You can also view execution plans with the SQL Database Management
    Portal (SDMP). However, the portal provides a somewhat different experience than
    SSMS does in a few different areas.


    First of all, the symbols provided in the graphical representation are different
    and not as granular. For example, the symbol for Index Seek operations looks different
    on the portal than it does in SSMS. (See Table 12-7 for a few symbols displayed
    in SDMP.).Also, the same symbol is provided in the portal for Clustered Index
    Seek and Non-Clustered Index Seek operations. Although some symbols might not
    be as granular in the portal as in SSMS, their descriptions are granular enough.


    ***Table 12-7.** Partial list of execution plan symbols shown in SQL*


    *Database Management Portal*


    **Operation**


    **SDMP Symbols**


    Seek


    Scan


    Nested Loop


    Sort


