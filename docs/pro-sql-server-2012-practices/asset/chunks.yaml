    n **Note** The number of map tasks does not have to equal the number of reduce
    tasks. Often, there will be multiple map tasks and only one reduce task if the
    Hadoop framework decides that using a single reduce task is the most efficient
    way to process the data. You can limit the number of map and reduce tasks running
    in parallel per data node (which by default is set to 2 and 1, respectively) by
    editing the mapred-site.xml config file under the conf directory of Hadoop. These
    parameters set only an upper boundary, and the Hadoop framework may use less tasks
    than the maximum if it determines it can complete the job with less resources.


