    ![Image 225](index-487_1.png)


    ![Image 226](index-487_2.png)


    ![Image 227](index-487_3.png)


    ## 关于作者


    - **Mladen Prajdić** is a `SQL Server MVP` from Slovenia. He started programming
    in 1999 in `Visual C++`. Since 2002, he has been actively developing different
    types of applications in `.Net (C#)` and `SQL Server`, ranging from standard line-of-business
    to image-processing applications.


    He graduated from the College of Electrical Engineering at the University of Ljubljana,
    majoring in Medical Cybernetics. He’s a regular speaker at various conferences
    and user-group meetings. He blogs at [`http://weblogs.sqlteam.com/mladenp`](http://weblogs.sqlteam.com/mladenp)
    and has authored various articles about `SQL Server`. He really likes to optimize
    slow `SQL` statements, analyze performance, and find unconventional solutions
    to difficult `SQL Server` problems.


    In his free time, among other things, he also develops a very popular add-in for
    `SQL Server Management Studio`, called `SSMS Tools Pack`.


    - **Herve Roggero**, `Windows Azure MVP`, is the founder of `Blue Syntax Consulting`,
    a company specializing in cloud-computing products and services. Herve’s experience
    includes software development, architecture, database administration, and senior
    management, with both global corporations and startup companies. Herve holds multiple
    certifications, including an `MCDBA`, `MCSE`, and `MCSD`. He also holds a Master’s
    degree in Business Administration from Indiana University.


    Herve is the co-author of *`PRO SQL Azure`* (Apress, 2010). For more information,
    visit [`http://www.bluesyntax.net`](http://www.bluesyntax.net).


    - **Chris Shaw** started his database career in 1993. He began by working with
    `Lotus` during his time in the `Marine Corps`. Following his time with the Marines,
    Chris continued working with databases for companies such as `Wells Fargo`, `Pulte
    Mortgage`, and `Yellow Pages Inc.`. He later consulted with insurance companies,
    including `Anthem Blue Shield` and `Admini Quest`. Chris has been writing and
    speaking about `SQL Server` for over 15 years at events such as `SQL Connections`,
    `PASS`, and `SSWUG Ultimate` conferences. Chris was the Conference Director for
    `SSWUG` in 2008. Chris received the `Microsoft MVP` award in 2009, 2010, and 2011,
    and he just received his fourth `MVP` award in April 2012. He is the founding
    member of the `Colorado Springs SQL Server User Group` and presently is the Co-President.
    Chris has many featured articles on the `SSWUG` website, and he was a contributing
    author for *`SQL Server 2005 Bible`* (Wiley, 2006) and *`SQL Server MVP Deep Dives,
    Volume 2`* (Manning Publications, 2011). Blogs, information, questions, quizzes,
    and interviews can be found at Chris’ blog site at [`http://chrisshaw.wordpress.com`](http://chrisshaw.wordpress.com).
    He can also be reached on twitter at `@SQLShaw` or by email at [`Chris@sqlshaw.com`](mailto:Chris@sqlshaw.com).


    xvii


    ![Image 228](index-488_1.png)


    ![Image 229](index-488_2.png)


    ## 关于作者


    - **Gail Shaw** is a senior consultant with `Xpertease`, based in Johannesburg,
    South Africa. She specializes in database performance tuning and database recovery,
    with a particular focus on topics such as indexing strategies, execution plans,
    and writing `T-SQL` code that performs well and scales gracefully.


    Gail is a `Microsoft Certified Master for SQL Server 2008` and a `SQL Server MVP`.
    She is a frequent poster on the `SQL Server Central` forums, writes articles for
    both `SQLServerCentral` and `Simple-Talk`, and blogs on all things relating to
    database performance at [`http://sqlinthewild.co.za`](http://sqlinthewild.co.za).
    She has spoken at `TechEd Africa`, at a number of the `24 Hours of PASS` web events
    and, on multiple occasions, at the `PASS Community Summit`.


    Gail is an `Aikido Shodan` (1st degree black belt) and a keen archer. In her copious
    spare time, she is pursuing a Master’s degree in Computer Science at the University
    of South Africa.


    - **Jason Strate** is a database architect at `Pragmatic Works`, with more than
    15 years of experience. He has been a recipient of `Microsoft`’s “Most Valuable
    Professional” designation for `SQL Server` since July 2009. His experience includes
    the design and implementation of both `OLTP` and `OLAP` solutions, as well as
    the assessment and implementation of `SQL Server` environments for best practices,
    performance, and high-availability solutions.


    Jason is an active member of the `SQL Server` community. He currently serves as
    regional mentor for the `North Central PASS` region, helping community members
    and chapters connect with each other. In the community, he presents on `SQL Server`
    and related topics at local, regional, and national events, including `SQL Saturdays`
    and the `PASS Summit`. He also blogs at [`http://www.jasonstrate.com`](http://www.jasonstrate.com)
    and [`http://www.sqlkaraoke.com`](http://www.sqlkaraoke.com), and he can be contacted
    on twitter as `@stratesql`.


    xviii


    ![Image 230](index-489_1.png)


    ## 关于技术审阅者


    - **Rudi Bruchez** is an independent consultant and trainer based in Paris, France.
    He has 15 years’ experience with `SQL Server`. He worked as a DBA for `CNET Channel`,
    a subsidiary of `CNET.com`, at the `MSC` (Mediterranean Shipping Company) headquarters
    in Geneva, and at `Promovacances`, an online travel company in Paris. Since 2006,
    he has provided consulting and audits as well as `SQL Server` training sessions.
    As `SQL Server` is evolving into a more complex solution, he is trying to make
    sure that developers and administrators keep mastering the fundamentals of the
    relational database and the `SQL` language. He co-authored one of the best-selling
    books about the `SQL` language in French, and in 2008, he published the only book
    in French about `SQL Server` optimization. He can be contacted at [`http://www.babaluga.com/`](http://www.babaluga.com/).


    - **Robin Dewson** has been hooked on programming ever since he bought his first
    computer in 1980, a `Sinclair ZX80`. His first major application of his own was
    a `Visual FoxPro` program that could be used to run a Fantasy League system. At
    this point, he met up with a great help in his PC development life, Jon Silver,
    at `Step One Technologies`. In return for training, he helped Jon with some other
    `Visual FoxPro` applications. From there, realizing that the marketplace for `Visual
    FoxPro` was limited, he decided to learn `Visual Basic` and `SQL Server`.


    Starting out with `SQL Server 6.5`, Robin soon moved to `SQL Server 7` and `Visual
    Basic 5` and became involved in developing several applications for clients both
    in the UK and in the United States. From there, he has moved through each version
    to `SQL Server 2012`. Robin now specializes in `C#` and `VB .NET`. Robin can be
    contacted at [`robin@fat-belly.com`](mailto:robin@fat-belly.com) or at [`http://www.fat-belly.com`](http://www.fat-belly.com).

