    Now if you look at Figure 14-10, you see a page that has had column prefix compression
    applied. The way that it works is it goes through each row at a record level and
    finds the common prefix values. For column one, you can see the values Chad2004,
    Chadwick2010, Chadster2010, and Chad2005\. The common prefix in each column is
    (Chad). Column prefix compression takes the longest value with the matching pattern,
    (Chad), and places it in the anchor tag—in this case, Chadwick2010.


    A special 2-bit value, symbolized by a NULL, takes the place of Chadwick2010,
    on Row 2 Column 1 of Figure 14-10\. In that portion of the record, the NULL points
    to the anchor tag as the home of the data for that column. All the remaining rows
    are also altered, putting a numeric value in place to symbolize the number of
    characters to be read from the anchor tag to be applied to all of the other records
    in that column in order to be properly read, as shown in Figure 14-10.


    If you look at the other columns, you can begin to see the matching patterns.
    In Column 2, the only values that match are 35.95 and 35.76. The common pattern
