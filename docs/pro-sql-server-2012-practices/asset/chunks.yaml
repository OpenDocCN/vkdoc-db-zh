    # 第 16 章：使用可用性组进行备份与恢复


    SQL Server 2012 中可用性组提供的高级功能带来了更为丰富的高可用性解决方案。但它们同时也为您的灾难恢复计划创造了更多可能性。您将能够把部分备份任务转移到辅助副本上执行，而无需担心哪个副本当前是主副本，甚至哪个辅助副本是可用的。


    只需确保您总是通过查询 `sys.fn_hadr_backup_is_preferred_replica` 函数来确认运行备份的是正确的副本。虽然您无法直接对可用性组内的数据库执行还原，但您可以将这些日志备份与来自主副本的完整备份结合使用，将数据库还原到另一个位置。最棒的是，您执行备份的方式不受限制。您可以使用
    `Maintenance plans`（维护计划）或自定义脚本，而不会影响可用性组的功能，也不会对您后续还原参与该组的数据库的能力产生负面影响。


    # 第 17 章：面向 SQL Server DBA 的大数据


    作者：Carlos Bossy


    时至今日，您一定都听说过“大数据”，从人们的谈论方式来看，您可能会认为它像宇宙一样庞大得令人难以招架。如果您像大多数数据库管理员一样，很可能已经在处理规模庞大的数据了。您的工作可能就是管理多个大小为
    TB 级或更大的数据库，并且这些数据还在持续增长。数据的规模已经超越了摩尔定律，每 24 个月就翻一番以上，这至少可以说给 DBA 的工作带来了挑战。您所从事的工作从来就不是小事。那么，为什么现在数据变成了“大”数据呢？


    本章将通过与 SQL Server 关系数据库环境进行比较和对比，来解释大数据的含义及其重要性。它还将通过演示如何利用大数据生态系统来补充您现有的数据架构，并使其与您的
    SQL Server 数据库以有效的方式共存，从而展示其为您的技术基础架构所能带来的价值。如果关于大数据的讨论让您感到困惑，并让您怀疑它是否只不过是非理性的繁荣，那么在本章结束时，您将更清楚如何最好地利用它，以及为什么它可能对您和您的组织有益。


    对于以 SQL Server 为中心的 DBA 来说，大数据究竟意味着什么？它仍然是一个模糊的领域，尚未有明确的定义，也没有被广泛接受的实践或标准。DBA
    这份要求苛刻的工作本身就需要掌握大量知识，而再去学习、理解和管理另一项技术，无疑会为本已充满压力的工作日增添负担。在本章中，我将逐步介绍一些关于大数据的定义和描述，阐述几个利用大数据的业务案例，并展示一些您可以在大数据数据库环境中执行的实际代码示例。


    如果您不确定大数据是什么，您并非个中高手。要给它下一个确切的定义并不容易，也没有精确的行业标准定义。因此，让我们先来看一些关于大数据的论述，以期带来一些清晰的理解。


    > **注意：** 大数据是一类数据，需要超出独立计算机硬件能力的 CPU 和磁盘资源才能高效检索。有效处理它需要多台分布式计算机并行工作。这类数据在传统的关系数据库管理系统（`RDBMS`）中难以处理。


    因此，有益的做法是在检索时为这类数据定义模式，即在它被存储到磁盘之后。


    定义大数据的“三个 V”分别是：**容量**，数据量至少以 TB 计，直至 PB 级；**多样性**，数据包括媒体文件、图像、文本、流、日志、传感器数据等；以及**速度**，即数据被收集的速度。


    对于 SQL Server DBA 而言，大数据意味着管理和处理数据时，必须跳出 SQL Server 丰富功能集的局限去思考。这种方法包括使用那些难以用核心数据库引擎、分区、`Service
    Broker`、`Analysis Services`以及您常用以使 SQL Server 处理大量各类数据类型的众多其他工具来实现的解决方案。


    Hadoop 对大数据的实现是一种处理数据的机制，它能够且必须进行分布式处理，以实现超越 SQL Server 所能（以及其设计初衷）的大规模可扩展性。


    Hadoop 还擅长处理大型数据类型、没有明确定义模式的数据，以及通常对 SQL Server 等传统数据库而言难以处理的数据。大数据关乎海量的数据，如果您需要处理以下任何类型的数据，Hadoop
    基础设施可能就是您的未来选择：

    - 非结构化数据，如图像、视频和自由格式文本

    - 为了节省空间或保持性能而本会丢弃的数据

    - 您日后可能需要用于分析、审计或未计划用途的数据

    - 任何您不希望放在`OLTP`数据库或数据集市中的数据，因为它们并不真正属于那里

    - 与其他任何数据没有精确关联的数据


    如果没有庞大的数据量或特殊的数据类型，传统的 SQL Server 数据库解决方案很可能就完全适合您，并能充分处理您的数据，而无需引入新技术的复杂性。SQL
    Server `OLTP`关系数据库启动事务、获取数据、锁定数据、修改数据，并将更改提交到数据库。这是一个经过验证、可靠且广为人知的过程，自 20 世纪 70
    年代以来不断发展和完善。


    除了关系数据库技术，您还有其他存储数据的选项。`Analysis Services`多维数据集和表格模型非常适用于报表、临时分析、仪表盘和其他基于指标的可视化。您还可以对数据进行分区、使用文件表、通过`Service
    Broker`进行扩展等等，使得每种数据架构都独具特色。这些技术为您提供了多种选择，而大数据的到来则是您武器库中的又一件利器。


    大数据是非关系型的，但关系数据模型在过去 30 多年里已证明自己非常有用。它易于技术人员理解，如果您理解了这个模型，那么很有可能也理解了应用程序。它以一种非常熟悉的方式描述数据库中的实体；当我们谈论这些实体时，我们也在描述现实世界。一个客户*拥有*一个地址。一家商店*包含*产品。一位主管*是*一名员工。开发人员可以轻松解读其视觉表示，并将其作为指导来处理应用程序内的数据。例如，您可以浏览数据模型图，并立即对数据有很好的理解。您甚至可以将此图贴在墙上供参考和讨论。

