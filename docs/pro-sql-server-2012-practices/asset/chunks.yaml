    # 第 18 章 ■ 峰值负载调优


    ## 概述


    [memory-does-my-SQL-Server-actually-need.aspx.](http://sqlskills.com/blogs/jonathan/post/How-much-memory-does-my-SQL-Server-actually-need.aspx)


    ## 服务器配置


    *   **最小服务器内存 (MB)**：该值设置为多少？如果有多个实例，请将此值设置为特定实例所需的最小内存量。

    *   **优化即席工作负载**

    *   **身份验证**：SQL Server 是否设置为使用混合模式或 Windows 身份验证？

    *   **已安装功能**：数据库引擎、Analysis Services、Reporting Services、Integration Services、文件流。


    ## 故障转移群集配置


    *   **群集或独立**：检查群集配置，并确保故障转移过程已经过测试。

    *   **端口号**：是否使用默认值？


    ## 数据库属性


    以下是需要检查的关键属性：


    *   **自动关闭和自动收缩** (`FALSE`)

    *   **自动创建和自动更新统计信息** (`TRUE`)

    *   **兼容级别**：验证此属性是否设置为最高级别。

    *   **页面验证**：将此属性设置为 `CHECKSUM`。

    *   **参数化** (`FALSE`)

    *   **透明数据加密 (TDE)**：此属性是否已启用？

    *   **恢复模型**：确保此属性设置为满足恢复点目标 (RPO)。


    ## 数据库文件属性


    以下是需要检查的关键属性：


    *   **文件位置**：对于高事务量的数据库，文件是否位于最快的磁盘上？

    *   **文件大小**：文件有多大，存在多少可用空间？

    *   **每个数据库的文件数量**：有多少个文件？每个文件有多少可用空间？

    *   是否存在多个事务日志文件？你只需要一个。

    *   每个文件的增长方式和大小是什么？将这些属性设置为特定大小，例如 512 MB。如果事务日志发生自动增长事件，在典型的磁盘子系统上，增长文件平均需要大约两到五秒。


    ## 每个数据库的虚拟日志文件 (VLF) 数量


    每个数据库有多少个 VLF？是否超过 100 个？如果是，你将需要减少 VLF 的数量并更好地管理事务日志增长事件。


    ## 每个数据库中不受信任的约束


    处于不受信任状态的外键可能触发额外的扫描。将约束切换到受信任状态。


    ## 作业列表 – 清单和计划


    服务器上计划了哪些任务？进程何时运行以及运行多长时间？大多数人（包括我）将进程安排在整点、半点或一刻钟运行，例如 :15 和 :30。错开作业时间，并最小化重叠的计划。


    ## 数据库维护过程


    服务器上执行了哪些维护？是否以最高效的方式完成？是否只重建了碎片化的索引？上次运行 `CHECKDB` 是在什么时候？


    ## 最近的错误日志


    SQL Server 中发生了哪些错误？是否存在死锁或严重错误？


    ## 评估与变更流程


    根据 SQL Server 配置以及上次对服务器执行评估的时间，作为配置评估的一部分，可能会有很多变更和任务产生。对于所有变更，务必在类似的环境中进行测试，以确保应用程序不会出现意外行为。生产环境绝不应是首次应用变更的地方。如果未在类似环境中首先测试就遇到问题，可能会使情况变得更糟而非更好。有些配置可能看起来只是表面上的，但你所做的大多数变更都会改变
    SQL Server 的行为或应用程序的执行方式。


    ## 建立性能基线


    初始的 `Perfmon` 数据是你的性能基线，或者是系统在进行任何更改之前的性能表现。变更实施后，需要创建一个新的基线，以便衡量系统的百分比变化。你可以使用现有的数据收集器来创建新基线——只需将目标更改为一个新文件即可。随着时间的推移，你可以开始看到所有变更对应用程序和系统的影响——无论好坏——并相应地调整配置。


    ## 分析 SQL 性能数据


    调优索引或查询可能是大多数人在提到为峰值负载调优 SQL Server 实例时所想到的。然而，正如你在本章所看到的，为那个时间段进行调优远不止是添加一些索引和重写语句。如果磁盘子系统配置错误，你每秒只能执行
    10 次 I/O，那么所有语句都会受到影响——即使代码已经优化。你可能会想，“这怎么可能？我的 SAN 团队告诉我配置是最优的。”


    这里有一个我过去客户的一个例子。这个特定的客户在其磁盘子系统上只能实现 10 `I/Ops`，但性能尚可。运行 SQL Server 的服务器使用 `iSCSI`
    连接到 SAN。由于磁盘 I/O 缓慢，这最终用户表现为性能问题。花了一些时间，但通过与 SAN 以及网络团队的合作，我们能够追踪到问题。结果发现，`iSCSI`
    接口插入的网络交换机配置错误。因为 `iSCSI` 基于 `TCP/IP`，如果关键组件配置不当，缺乏性能是合理的。这就是为什么在审查应用程序的任何部分之前，验证底层配置如此重要。调优很像剥洋葱——你发现一个问题，另一个问题又暴露出来。


    那么，如果你捕获了大量 SQL Server 性能数据，从哪里开始看起呢？这可能会让人望而生畏。你有来自动态管理视图 (`DMV`) 的数据，显示最频繁运行的代码，这将与最大的
    I/O 消耗者相关联。你有来自 `Profiler` 或 `Extended Events` 的不同数据集，用于长时间运行的语句或特定时间内的所有流量。还有包含核心业务交易所涉及的所有事务的数据集呢？如你所见，数据量很大——这甚至还不包括
    SQL Server 中关于对象使用或执行计划的任何元数据。


    在审查配置数据之前，你已经审查了 `Perfmon` 数据，以获取有关 SQL Server 实例性能表现的更多信息。在审查跟踪或 `DMV` 中的任何信息之前，你需要审查当前活动。之前捕获的实例的当前活动为你提供了有关执行的语句类型、常见的等待统计信息、资源使用情况以及许多其他因素的洞察。在几个系统上执行此操作后，你将开始识别数据中的模式，并发现系统何时出现问题。图
    18-15 是一个脚本输出的示例，显示了 SQL Server 实例上所有活动进程的详细信息。


    ![Image 215](img/index-463_1.png)


    `图 18-15`. 通过 SQL 脚本收集的 SQL Server 实例的当前活动。


    如果你在一天中多次运行生成此数据的脚本，你可以看到数据中的模式。以下是分析图 18-15 所示数据得出的观察结果：


    *   存在几个被阻塞的进程，阻塞时间最长的进程被阻塞了近四分钟。

    *   `会话 ID` 是一个长时间运行的进程，已消耗超过 40 亿次逻辑读取和大量其他资源。

    *   `会话 ID` 1864 正在尝试获取应用程序锁。

    *   尽管代码不在图 18-5 所示的视图中，但图 18-15 底部的会话都在运行具有非最优执行计划的相同代码。

    *   一个客户端跟踪正在运行死锁捕获。

    *   存在一个 `WAITFOR` 进程，用于捕获自定义应用程序的性能指标。

