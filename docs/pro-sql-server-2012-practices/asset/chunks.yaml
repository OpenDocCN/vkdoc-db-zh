    ### 数据发现


    有时，你直到需要时才知道自己需要什么。不幸的是，当那一刻到来时，你经常发现所需的数据不可用。其他时候，你只是想去探索。


    例如，如果你注意到客户的购买习惯发生了变化并想知道原因，你可能会认为仔细查看网络日志、历史交易、客户评论等会有所帮助。这项工作可能会引导你找到寻求的答案，但也可能帮助你了解关于客户的其他信息，一些你最初并未寻找的东西。


    ### 由分析结果驱动的业务规则


    有时，你的 OLTP 数据库需要执行需要大数据计算结果的操作分析功能。例如，假设市场部门想在他们的主页上突出显示三部新电影中的一部：布拉德·皮特的戏剧、亚当·桑德勒的喜剧或布鲁斯·威利斯的动作片。决定展示哪部电影是通过程序做出的，输入包括客户人口统计、位置、过往购买历史等。做出此决策的一个更重要的因素是该演员在
    Twitter 上是否呈正面趋势。你可以使用大数据基础设施捕获相关的 Twitter 流，并尽可能接近实时地将汇总的情感反馈给你的 OLTP 数据库，以便将其应用于决定在主页上显示内容的算法。这个过程的关键是在趋势变化后尽快更改主页。


    ### 微软未来的大数据


    微软拥抱 Hadoop 和大数据的益处在于，未来我们应该能看到 Hadoop 与众多提供和支撑分析能力的微软工具之间的全面集成，包括报表、仪表板、预测建模和
    ETL（提取、转换和加载）。我期望看到的增强类型包括以下内容：


    *   你已经看到了如何通过 Hive 在 Excel 中使用 HDFS 数据。我期望`HDFS`与`Excel`、`PowerView`、`SQL Server
    Reporting Services`和`PerformancePoint`更紧密地集成。

    *   我期望更好的`SSIS`数据流任务，允许从`HDFS`输入和输出数据，以及提供更适合`HDFS`的转换技术的转换任务。

    *   我预计使用`HDFS`作为数据源的`SSAS`表格模块之间会有更紧密的耦合。

    *   我还期望能够创建在`SQL Server`内部实现`MapReduce`无缝集成的`HDFS`表。


    这个领域还有更多发展，我期望其中大部分我们会看到在 Windows 上的本地部署 Hadoop 解决方案中。


    **第 17 章 ■ SQL Server DBA 的大数据**


    ### 结论


    在 SQL Server 数据库环境中实施 Hadoop 框架，为有见识的数据库管理员提供了设计和实现更有效、更强大的数据架构。它提供了扩展到数据物理规模不再是限制的水平的能力。这使
    DBA 承担起确定如何构建数据基础设施的责任，并迫使他们为特定数据集做出正确的决策：它应该驻留在 SQL Server 还是 HDFS 中？为了做出这些决策，DBA
    必须了解业务将如何使用数据、开发人员将如何访问数据以及数据量会有多大。传统 SQL Server 表不再是默认的存放位置。


    DBA 必须做出的另一个重要决策是将数据存储在本地还是使用云。我们能够将数据在云中的 Hadoop 和 SQL Server 之间移动。我们还将数据在我们网络内的
    SQL Server 实例和云中的 Hadoop 之间来回移动，并展示了如何使用 SQL Server 众多功能之一——变更数据捕获来帮助我们完成此操作。


    DBA 必须支持的一个重要过程是在 SQL Server 和 HDFS 之间移动数据。我们展示了如何使用`Sqoop`来完成此操作，它以一种基本的方式实现但易于使用。


    `Hive`提供了一个熟悉的类 SQL 接口来从`HDFS`获取数据。使用`ODBC`连接器，这为用户和应用程序提供了一种从`HDFS`获取数据的方式。我们看到了它如何在
    Excel 中工作，DBA 应该预期在许多其他方式中也有这种类型的访问，包括报表工具、分析软件、`.NET`应用程序和网站。`Pig`让我们能够以过程化方式访问`HDFS`并操作数据。它需要编程技能和专业知识，但值得深入学习以充分利用其数据转换能力。`Sqoop`、`Pig`和`Hive`的关键能力在于它们都执行`MapReduce`作业，并能充分利用`Hadoop`框架。DBA
    重要的是要知道如何使用这些工具，并了解其功能的正确应用场景。


    我们在关于从`HDFS`导出数据的章节中展示了通过将数据从`HDFS`移动到`SQL Server`会如何影响它，因此 DBA 应考虑到这一点。一个可能促成此操作的业务案例是，当正在捕获进入`HDFS`数据的趋势统计信息，并且趋势的输出被发送到`SQL
    Server`以驱动应用程序行为时。我们没有展示非结构化数据将如何存储在`HDFS`中，或者它可能如何使用，但这将需要比使用`SQL Server`更多的分析软件和算法方面的工作，因此我们将该演示推迟到分析书籍。要查看
    Hadoop 如何与半结构化文本数据配合使用的示例，微软在`Hadoop on Azure`网站上的`Samples`库中提供了一个字数统计示例。'
