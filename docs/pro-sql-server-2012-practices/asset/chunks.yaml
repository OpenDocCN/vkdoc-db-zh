  trans: '

    添加用于容量规划的数据收集流程。


    确保告警在五分钟内得到响应。


    有一点再怎么强调也不为过，那就是在高峰负载期间，要确保获得开发人员和各级运维人员的充分支持。如果此时出现问题，相关人员必须能够及时响应。根据`SLA`（服务级别协议）的不同，响应时间可能以分钟计，而非以小时计。必须制定流程和规程，并向工作人员清晰传达。


    ## 结论


    每位数据库管理员（DBA）都有运行`SQL Server`的服务器，这些服务器需要日复一日、年复一年地保持高性能和可扩展性。随着时间的推移，情况会发生变化。数据会增长，负载和使用模式可能会增加，功能也常常会演变。那么，面对今年的高峰季节，您将做些什么来确保您的组织能够处理今年的峰值负载？您从去年的峰值负载中学到了哪些教训，以避免重蹈覆辙？


    通过组建一个能够持续分析环境并实施必要变更的团队，您将在确保环境能够扩展以满足日益增长的需求方面抢占先机，无论是面对“黑色星期五”销售日，还是仅仅是一个繁忙的星期三。环境和应用程序都会发生变化，但这些变化可能会带来更多机遇，例如将长期建议融入应用程序设计，或改变整个解决方案的架构。成功的关键在于保持好奇心，揭开每一块石头、打开每一扇门，去寻找改进的机会。


