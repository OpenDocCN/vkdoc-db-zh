    那么，该怎么做呢？让我们从前面讨论过的 I/O 模式开始。在大多数数据库环境中，I/O 模式在日复一日、周复一周中看起来非常相似。通常，这种 I/O 模式在不同月份的特定时间也看起来一样。（想想一家上午
    8 点到下午 5 点营业、每月一次记录库存或核对余额的零售店，或者一家在每个财政月末发送月度账单的传统金融机构。）例子可以一直举下去，而你应该有一个基于你的数据库所支持的业务而需要了解的、属于你自己的例子。


    I/O 模式是一个有价值且可操作的数据集。有了它，规划可以涵盖比你的数据库服务器更多的内容，因为大多数环境都包含共享存储（`SAN` 或 `NAS`），而这些共享存储设备有自己的维护窗口、自己的高峰期窗口等等。


    > **注意**：我数不清有多少次，“I/O 数据集”成为与 `SAN` 管理员、应用程序所有者和系统管理员合作的关键共同组件。


    一旦我们都基于相同的事实（数据）开展工作，沟通挑战就会变得更容易、更有效。这些挑战并非只有你一个人经历。理解这一点非常重要。如果你使用的是共享存储设备，其他应用程序所有者也正在经历与你相同的挑战。这里的不同之处在于，你可以成为推动所有人对话的那个人，因为你掌握了数据，并且知道你的日程安排以及何时需要从共享存储设备获得特定的
    `IOP` 吞吐量。我无法更加强调这种对话在你组织内不同团队之间的重要性。它将架起桥梁、建立信任和信心。它将使 `SAN` 专家更好地理解你的需求及其重要性，并将使服务器管理员能够将他们的系统备份窗口或病毒扫描更改到不同的时间。


    简而言之，它促进了沟通与协作，因为没有数据、没有事实的讨论，很容易被理解为是指责或试图推卸责任。


    我与客户最喜欢的一个对话就是围绕这个话题，因为很容易承认你的数据库对 `IOPS` “需求很大”。如果能用确凿的数据点清晰地传达其价值和必要性，那么，你怎么可能出错呢？你的组织又怎么会出错呢？


    ### **深入分析指标**


    继续前进，上一节的目的是向你介绍这些指标，并解释它们为何重要、可以用它们做什么以及如何获取它们。现在你已经拿到了数据，让我们来谈谈几个更精细的要点。


    在你的 I/O 特征分析中，你可能会发现在一天的不同时间，你的 I/O 模式会发生变化。


    以 `Disk Bytes/sec` 计数器为例。如果你观察到该计数器出现显著且持续的变化，请检查相关的计数器 `Disk Bytes/Read(Write)`。你可能会看到
    I/O 大小的变化，因为不同类型的 `IOPS` 用于不同的数据库负载。在查看这个的同时，也看一下 `Disk Reads(Writes)`——其相关性应该相当明显。你会看到在备份窗口期间，I/O
    数量减少，而吞吐量增加，大小也很可能有所提升。


    对于重新建立索引的活动也是如此。


    考虑将你的备份、重新建立索引或统计信息更新更改为你的子系统能更好处理该类负载的时间。当你考虑更改时，应该与你的系统管理员和 `SAN` 专家沟通，因为他们会感谢你告知此事，并可能在他们那边做出一些调整以满足你的需求。'
- fmt: 'Now on to more specifics because, as they say, the devil is in the details
    and there’s nothing like having your environment, including your I/O pattern pretty
    well understood and then being surprised. One of the key elements with this monitoring
    and analysis is to do it by `LUN`. Ideally, your database files are broken out
    on different `LUNs`. For example, having the log file on a separate drive makes
    monitoring easier, so is having `TempDB` broken out to a different drive. This
    is because the I/O pattern and type vary with these specific workloads, unlike
    the user databases in your environment. The log files, for example, will require
    the lowest possible write latency because every transaction is dependent on this
    file. If you have replication enabled, note that there will be some reads as well,
    but the more important aspect with your transaction log is that the writes need
    to be as fast as they can be. `TempDB` is a different beast, and it’s used for
    a number of different functions within the `RDBMS`, such as for table variables,
    temp tables, global temp tables, sorts, snapshot isolation, and cursors. Because
    of the dynamic usage of `TempDB` and the elements which are enabled in your environment,
    you need to not only tune `TempDB` from a file management perspective, but also
    from an I/O perspective. This takes two forms: decreasing latch contention, and
    increasing throughput in `TempDB`. After all, the intent of having multiple data
    files for `TempDB` is to increase throughput in `TempDB`, which translates to
    increased throughput to the disk. If the disk cannot adequately support that throughput,
    the intended gain cannot be realized. `TempDB` usage, due to the quantity of operations
    that can occur in this database, can be more challenging to identify a known I/O
    pattern. Keep in mind that if you find slow I/O in `TempDB`, the scenario is similar
    to a slow log write except that your primary impact are to reads.


    ## Times Have Changed


    Many years ago, the predominate method of attaching storage to a server was to
    procure a server with enough bays, find a controller that could support your redundant
    array of independent disk or disks (`RAID`) considerations and throughput requirements,
    and then find the drives that were the correct speed and size for what you needed.


    As a simple example, suppose you have three hard drives. Believe it or not, this
    was a common configuration years ago, and often these three drives would be provisioned
    as a `RAID-5` array, often with two logical drives partitioned.


    Understanding the types of `RAID` will help you develop a solution that’s in the
    process of being designed or configure an existing solution that is either being
    refactored or scaled up. In today’s world, the ticky-tack details of `RAID` inside
    of current `SANs` is a bit different than it used to be, but you need to understand
    some of the underpinnings of the technology to better appreciate what the storage
    gurus do in your company. Developing such an understanding might build a communication
    bridge when they learn that you know a thing or two about their world.


    You can think of `RAID`, in its simplest form, as taking the three disk drives,
    pushing the magic “go” button, and transforming them into one viewable disk from
    the operating system and by extension, `SQL Server`. Now that you have a drive
    with three disks, you can have bigger `LUNs` and more easily manage the `OS` and
    the databases that reside on the server. At this point, you are probably thinking
    the same thing I thought when I wrote that, which is “That’s what those storage
    gurus get paid for?” Clearly, there’s a bit more to it than pushing the magic
    “go” button. Just imagine if the storage gurus always gave you what you asked
    for. In this case, you would have one “drive” with your logs, data, `OS`, `TempDB`,
    and any third-party software you use on your server. Suddenly, the file structure
    on your server looks like the one on your laptop, and most folks aren’t happy
    with the performance of their laptop when they are saving a big file or unzipping
    a `.blg` they just copied from their server to get to know their I/O pattern.


    The primary purpose for the drives on your servers implementing a type of `RAID`
    is fault tolerance. In today’s world, anyone can walk into a big-box electronics
    store and buy a terabyte of hard-drive space for less than $100\. Compared to
    commercial-grade drives, that is a very good bargain—but somewhere you hear your
    grandfather’s wisdom whispering, “You get what you pay for.” While the quantity
    of storage per dollar reaches historically low levels year after year, the performance
    and availability of those hard drives hasn’t had a similar increase. This means
    that if one terabyte of storage cost $1000 US dollars just five years ago and
    now it’s $100 US dollars—a tenfold decrease—the availability, durability, and
    speed of that terabyte of data has not increased tenfold.


    You also need to have a good grasp on the types of `RAID`. `RAID 5` was the primary
    `RAID` configuration that I learned about, and it’s still one of the most frequently
    used type in the industry. The concept of `RAID 5` is akin to striping a file
    across all of the drives involved and then adding parity. In this manner, any
    singular drive in a three-drive configuration can fail and the data will still
    be available until such time as the drive is replaced and the data is then written
    to the new drive. This is perfect when the intent is to have fault tolerance with
    a hard drive. However, it comes at a price. In this case, that price is performance.
    For `RAID 5` to be successful, it must read the data you are accessing, and if
    you modify it, it must re-read the block to recalculate the parity, write the
    data, and then rewrite the data to maintain parity. This becomes a performance
    bottleneck rather quickly, and it’s why you will see many blogs recommend that
    `SQL Server` transaction logs and `TempDB` be located on `RAID 1+0 (10)`.


    `RAID 10` is arguably a better form of `RAID` for database systems because this
    form of `RAID` obtains its fault tolerance from mirrors of information and its
    performance from striping the data across all of the spindles (disks). Due to
    the definition of the word “mirror,” the three-disk configuration I mentioned
    earlier wouldn’t work for `RAID 10`, but if you had a fourth disk, you could implement
    `RAID 10\. This mean that the write penalty wouldn’t be as significant as with
    `RAID 5` but the usable space is now only roughly half as much as the storage
    you purchased, because the data is being mirrored. In our configuration with `RAID
    10`, two of the drives simply mirror the other two, which means that our footprint
    for available data is half of the storage purchased. From a performance perspective,
    this is a much better way to go because the mirrors can be read from, and to support
    your data footprint, more spindles need to exist.


    There are additional types of `RAID`. I could attempt to explain them all in this
    chapter , but your eyes are likely rolling back right in their sockets at this
    point and you are probably wondering, “Why do I care?”'
