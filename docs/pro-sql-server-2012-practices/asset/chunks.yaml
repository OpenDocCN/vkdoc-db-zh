    ## Chapter 14 ■ Page and Row Compression


    ```sql

    GO

    ```


    You see the same logged operations as before—`LOP_BEGIN_XACT`, `LOP_LOCK_XACT`,
    and `LOP_INSERT_ROWS`—repeated over 4999 times. You do not see any compression
    operations inside of a transaction because they occur outside of the scope of
    the transaction. This means there is no additional overhead in transactions to
    account for compressed operations, which is very efficient.


    If the overhead is a concern, there are two ways you can track this. If you’re
    in the `Full` recovery model or the `Bulk Logged` recovery model and are performing
    regular transaction log backups (and if you don’t, your transaction log will grow
    until it fills up the drive it is on and prevent any new data from being inserted
    into your database), you can examine the size of your log files and track that
    size once you turn compression on. If you notice significant growth, you can use
    the undocumented function `fn_dump_dblog` to query your transaction log backups
    and see how many `LOP_COMPRESSION_INFO` logged events you have.


    Use your favorite search engine to search for more information on `fn_dump_dblog`
    because that is beyond the scope of this chapter.


    If your recovery model is `Simple`, you can watch the overall growth of your transaction
    log and watch your baselines for changes. As long as the Virtual Log Files (`VLF`s,
    which are the inner structures of the transaction log), that contain compression
    operations have not been overwritten, you can use `fn_dblog` to query them as
    well. You cannot use `fn_dump_dblog` because you cannot take transaction-log backups
    in the `Simple` recovery model.


    To find these transactions, I originally took the entire content of the transaction
    log and dumped it into a spreadsheet and sorted by type until I could identify
    each operation. Because these operations did not occur within the context of our
    named transactions, it means that compression operations do not add overhead to
    user transactions. I found one in particular that stood out: `LOP_COMPRESSION_INFO`.
    Let’s take a look:


    ```sql

    /*

    first don''t forget to commit

    your transaction

    */

    COMMIT TRAN

    SELECT * FROM fn_dblog(NULL, NULL) dl

    WHERE Operation=''LOP_COMPRESSION_INFO''

    ```


    You will find this logged operation frequently. The `LOP_COMPRESSION_INFO` operation
    is the logged event that is called when a data page compression attempt is made.
    If the attempt has failed, it points to a bitmap that contains the different reasons
    that the page would not be compressed. You also have the columns `Compression
    Info` and `Compression Log Type`. `Compression Info` contains a copy of the data
    record in its compressed format. If you use the command `DBCC Page`, that you
    used earlier, and compare the data record contents to that of the `Compression
    Info` column from the logged operation, they will match exactly. If you look at
    the `Compression Log Type` column, you’ll see it is a bit field that is set to
    `1` when the record has been page-compressed and `0` when it has not. Some reasons
    why a record would not be compressed is that you have not reached the 20 percent
    space-savings requirement, the page is not yet full to the point of a page split
    (in a clustered index), or the data or the page changed and no new compression
    savings could be found.


    One important note is that when data is modified and committed in SQL Server,
    it is logged in the transaction log. When that data is in a compressed state,
    it takes up less room. Depending on your data and how it is used, that can translate
    into space savings within the transaction log. You should not be afraid of transaction-log
    overhead when it comes to compression—in fact, quite the opposite.


    ## Chapter 14 ■ Page and Row Compression


    ### Conclusion


    Page and row compression are powerful tools. If you’re paying for an Enterprise
    license you should be taking advantage of them. As with indexes, there is not
    a one-size-fits-all solution to compression. Instead, the more you know about
    it, the better you will be able to apply it in your environment. Turning it on
    and walking away is never a good idea. Monitor your systems, and make sure there
    are not any changes or spikes in CPU usage that will catch you off guard. “Know
    Thy Data” is not just a catchy phrase. The more you know about your environment,
    the more you can apply SQL Server internal knowledge to help you manage it effectively.


    Remember the criteria to consider: The larger the table, the more likely you are
    to see a benefit. Get accurate baselines so that you know how compression affects
    query performance. Look at your allocation-unit structure: tables with 100 percent
    `IN_ROW_DATA` pages are great candidates for compression. You want to tread carefully
    with anything lower than 50 percent. Tables and indexes with greater than 45 percent
    scan usage patterns are candidates for compression; for update patterns lower
    than 45 percent (down to 20 percent), use row compression. For 20 percent and
    lower, use page compression, get a baseline, and test again.


    ## `Chapter 15`


    ■ ■ ■


    ### `Selecting and Sizing the Server`


    **By Glenn Berry**


    With the release of SQL Server 2012, Microsoft has moved to a new licensing model
    that is quite different from previous releases. Because of this, it is quite important
    to revisit how you go about selecting database server hardware in order to get
    good performance and scalability while still keeping your SQL Server 2012 license
    costs under control. SQL Server 2012 Enterprise Edition uses core-based licensing,
    where you pay for licenses based on physical processor cores, with a minimum of
    four physical core licenses required for each physical processor. This is quite
    a change from the socket-based licensing used by SQL Server 2008 R2 and all previous
    releases of SQL Server.


    This new model came as an unpleasant shock to many people when it was first revealed
    in November 2011, causing some database professionals to immediately assume a
    worst-case scenario of a fourfold price increase for SQL Server 2012 licenses.
    This chapter will show you how to properly select your database server hardware
    to maximize your performance and scalability, while keeping your SQL Server licensing
    costs under control.


    Depending on your workload type, you will want to make different hardware choices
    to get the best performance and scalability for your workload.


    > **Tip** Read the entire chapter before you actually spec out any hardware. The
    interaction between workloads, hardware, and SQL Server licensing is a complex
    subject. It is easy to make an expensive mistake if you don’t understand the concepts
    involved.


    The hardware I look at in this chapter is specifically the server itself, meaning
    the form factor, and also the CPU and memory. Your CPU choice most strongly affects
    your licensing costs, and I spend a good deal of time looking at CPU choices with
    respect to SQL Server’s new licensing model. Microsoft’s new pricing scheme changes
    the game, and it’s important to revisit assumptions you might be holding that
    are no longer valid.


    ### Understanding Your Workload


    SQL Server places different demands on its underlying hardware depending on what
    type of database workload is running against the instance of SQL Server. Database
    engine workloads are quite different 361


    ## Chapter 15 ■ Selecting and Sizing the Server


    than file server, web server, or application server workloads. SQL Server instances
    that are running the database engine generally see one of two main types of workloads.
    One type is an online transaction processing (`OLTP`) workload, while the other
    type is a relational data warehouse (`DW`) workload.'
