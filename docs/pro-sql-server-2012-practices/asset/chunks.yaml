    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    ```


    这样好多了。使用该索引后，执行相同查询所需的页面总数从1,042个下降到11个。


    如果这是一个频繁运行的查询，潜在的I/O节省以及内存节省将是显著的。该查询的预读计数仅为8个页面，而不是将表的1,302个页面放入内存。


    更进一步，如果这个索引通过行压缩进行压缩会怎样？这有点挑战性，因为这个表相对较小，你要查询的数据集也很小，但让我们看看会发生什么。


    可以通过以下方式重建索引并添加行压缩：


    ```sql

    CREATE NONCLUSTERED INDEX [IX_Query1_Covering]

    ON [dbo].[FactInternetSales] ([ProductKey])

    INCLUDE ([OrderDateKey],[OrderQuantity],[UnitPrice],[SalesAmount])

    WITH (DATA_COMPRESSION = ROW, DROP_EXISTING = ON)

    GO

    ```


    当重新运行查询时，`STATISTICS IO`输出如下：


    ```

    Table ''FactInternetSales''. Scan count 1, logical reads 2, physical reads 2,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.

    (1 row(s) affected)

    (13 row(s) affected)


    Table ''Worktable''. Scan count 0, logical reads 0, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.


    Table ''DimDate''. Scan count 1, logical reads 21, physical reads 2, read-ahead
    reads 30, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.


    Table ''FactInternetSales''. Scan count 1, logical reads 10, physical reads 2,
    read-ahead reads 8,

    lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.


    Table ''DimProduct''. Scan count 0, logical reads 2, physical reads 2, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

