- fmt: '

    [her technical blog, http://dbakevlar.com, and contr](http://dbakevlar.com)ibutions
    to numerous technical sites. She is on the board of directors for RMOUG (Rocky
    Mountain Oracle User Group) as the group’s Training Days Director, a yearly conference
    of almost 1000 attendees. She has performed numerous presentations in the US and
    abroad at both Oracle and SQLPass User Group conferences. Kellyn lives with her
    partner, Tim, and her three children in Broomfield, Colorado (USA). Currently,
    she is honing her technical skills at Enkitec ([http://www.enkitec.com) and can
    be follo](http://www.enkitec.com)wed on twitter under the tweet handle `@DBAKevlar`.


