    Pig


    Pig is a platform for analyzing large datasets. It consists of a high-level language
    for expressing data analysis programs, and allows for a high degree of parallelization.
    Pig includes Pig Latin, which is a procedural scripting language that allows you
    to manipulate data in more powerful ways than you can with Sqoop. While Sqoop
    is analogous to BCP in SQL Server, you can consider Pig the ETL tool of Hadoop,
    so naturally it is highly parallel when extracting, transforming, and loading
    data.


    Pig has a good set of built-in functions for string manipulation, mathematical
    operations, and for groupings, aggregations, and comparisons. It also has relational
    operators for joins, unions, and more functionality for controlling the flow of
    the script and the processing of data. In more sophisticated scripts, Pig developers
    can use nested data structures, streaming operators, and user-defined functions.
    The strength of Pig is that it can load data in parallel, apply analytical functions
    to the data, and then write the results of the analytic process.


    n **Note** Pig will be an option for your environment when you want to do more
    than simply move data back and forth between SQL Server. It allows you to inspect,
    crunch, and convert data as you’re moving it from one place to another.


    In today’s version of Hadoop on Azure, the primary use of Pig will be to read
    data from HDFS, process it procedurally, and write the results back to HDFS. It
    won’t involve the SQL Server database engine; although in the future, it seems
    that it would be sensible to have a way to store the results in SQL Server.


    The following is a simple Pig script that mirrors T-SQL for grouping by ProductID,
    counting the number of rows, and sorting by the row count:


    product_audit = LOAD ''/data/ProductAudit/part-m-00001'' USING PigStorage('','')


    AS (


    ProductID:int,


    Name:chararray,


    ProductNumber:chararray,


    ListPrice:float,


    ModifiedData:chararray


    );


    product_group = GROUP product_audit by (ProductID);


    product_count = FOREACH product_group GENERATE group, COUNT($1) as num_products;


    product_sorted = ORDER product_count by num_products desc;'
  trans: "# 第 17 章：面向 SQL Server 数据库管理员的大数据\n\n## 实践应用代码\n\n现在你已经将数据存入 HDFS，接下来就可以让这些代码发挥作用了。这段\
    \ JavaScript 代码将读取你通过 Sqoop 导入 HDFS 并存储在`/data/ProductTable`目录中的产品数据，该目录是你执行第一个作业时创建的。\n\
    \n你使用的产品数据与之前的示例数据不同，因此需要修改 JavaScript 代码以适应现有数据。需要解决的业务问题是按产品线计算产品的平均标价。同时必须注意数据是以逗号分隔的，且部分产品名称文本中包含逗号。\n\
    \n## 映射函数\n\n```javascript\nvar map = function (key, value, context) {\n\n   \
    \ var aryValues = value.split(\",\");\n    var pattern = /[A-Za-z]/;\n    var\
    \ productLine;\n    var listPrice;\n\n    if (aryValues.length == 25)\n    {\n\
    \        productLine = aryValues[15];\n        listPrice = aryValues[9];\n   \
    \ }\n    else\n    {\n        productLine = aryValues[16];\n        listPrice\
    \ = aryValues[10];\n    }\n\n    if (pattern.test(productLine) && productLine.toString()\
    \ != \"null\")\n    {\n        context.write(productLine.toUpperCase(), listPrice);\n\
    \    }\n};\n```\n\n这个`map`函数没有使用传入的`key`参数，因为我们并不关心行在文件中的偏移量（通常也不需要关心）。我们需要的产品数据通过`value`参数传入函数，并使用逗号分隔符将其拆分为数组。由于产品名称中可能包含逗号，需要检查数组长度以确认单元格数量是否超出预期。若数组长度为`25`，则产品名称不含逗号，产品线位于数组第`15`个单元格，标价位于第`9`个单元格；若产品名称包含逗号，则产品线和标价分别位于第`16`和第`10`个单元格。由于源数据表`Production.Product`的产品线允许`null`值，必须验证数据是否为字母字符且非`null`。这将过滤约半数行数据，正是应在`map`函数中完成的数据清洗工作，同时通过避免将这些数据传递给`reduce`函数来节省资源。\n\
    \n## 归约函数\n\n```javascript\nvar reduce = function (key, values, context) {\n\n\
    \    var sumListPrice = 0.0;\n    var productLine = key;\n    var cnt = 0.0;\n\
    \n    while (values.hasNext()) {\n        sumListPrice += parseFloat(values.next());\n\
    \        cnt++;\n    }\n\n    var avgListPrice = sumListPrice / cnt;\n    context.write(productLine,\
    \ avgListPrice);\n};\n```\n\n产品线作为`key`参数传入`reduce`函数——这与我们在`map`函数中的定义方式一致，而每个产品线对应的所有标价则作为`values`集合传入。`reduce`函数的主要操作是遍历`values`集合，累加所有标价并统计数量以计算平均值。完成后返回产品线和平均标价，这些值将被写入\
    \ HDFS。最终数据如下所示：\n\n```\nM    827.0639560439561\nR    965.3488000000007\nS   \
    \ 50.39885714285715\nT    840.7621153846153\n```\n\n## 运行代码\n\n要运行此代码，请将`map`函数和`reduce`函数复制到名为`AverageListPrice.js`的文件中。可以使用记事本完成此操作，然后保存到本地计算机。完成后，通过\
    \ Azure 上的 Hadoop 网站上传该文件。进入主菜单并点击**Interactive Console**磁贴。控制台加载后，确保右上角的**JavaScript**按钮处于选中状态，且可见`js>`提示符。\n\
    \n要上传刚创建的 JS 文件，在提示符后输入`fs.put()`。系统将弹出窗口要求选择要上传的 JS 文件，浏览至`AverageListPrice.js`并选中。保持目标框为空，点击**Upload**。这将把文件存入你在\
    \ Hadoop 中的用户默认文件位置`/user/username`。\n\nJavaScript 文件上传完成后即可运行。在提示符后输入以下命令：\n\n\
    ```javascript\nrunJs(\"AverageListPrice.js\", \"/data/ProductTable\", \"AverageListPrice\"\
    )\n```\n\n`runJs`函数将执行你编写的 JavaScript 代码中的`map`和`reduce`函数。需要传入三个参数：上传的 JavaScript\
    \ 文件名、输入数据所在目录名、输出数据目录名。本例中使用`/data/ProductTable`作为输入数据目录（因为我们之前将产品数据存储于此），输出数据将保存在\
    \ HDFS 中的`/user/username`文件夹内。执行`runJs`后，作业运行期间将滚动显示系统消息。完成后屏幕将如图 17-10 所示，此时即可查看输出数据。\n\
    \n**图 17-10.** *Azure 上 Hadoop 的交互式 JavaScript 界面*\n\n再次通过远程桌面连接，进入桌面并启动`HadoopNameNode`（与\
    \ Sqoop 章节操作相同，可参考图 17-7）。点击**Browse the filesystem**链接，浏览器将打开显示目录列表，其中包含用户文件夹。打开该文件夹可见与用户名同名的子目录，点击后可查看用户名下的文件和目录，找到名为`AverageListPrice`的目录即为输出数据存储位置。打开目录查看名为`part-r-00000`的文件，点击即可浏览内容。该文件应包含四行数据，与本节前文所示输出一致。\n\
    \n## Pig\n\nPig 是一个用于分析大规模数据集的平台，包含用于表达数据分析程序的高级语言，并支持高度并行化处理。Pig 包含 Pig Latin\
    \ 语言，这是一种过程式脚本语言，比 Sqoop 提供更强大的数据操作能力。如果说 Sqoop 类似于 SQL Server 中的 BCP 工具，那么 Pig\
    \ 可视为 Hadoop 的 ETL 工具，因此在数据提取、转换和加载过程中天然具有高度并行性。\n\nPig 提供了丰富的内置函数，涵盖字符串操作、数学运算、分组、聚合和比较等功能。还提供关系运算符实现连接、联合等操作，并支持脚本流程控制和数据处理。在复杂脚本中，Pig\
    \ 开发者可使用嵌套数据结构、流操作符和用户自定义函数。Pig 的优势在于能够并行加载数据、应用分析函数，并最终输出分析结果。\n\n**注意：** 当需要超越简单的\
    \ SQL Server 间数据迁移时，Pig 将成为环境中的重要选择。它允许在数据移动过程中进行检查、处理和转换。\n\n在当前版本的 Azure Hadoop\
    \ 中，Pig 主要用于从 HDFS 读取数据、进行过程化处理，并将结果写回 HDFS。虽然未来可能需要将结果存储到 SQL Server 的合理方案，但当前版本不会涉及\
    \ SQL Server 数据库引擎。\n\n以下是一个简单的 Pig 脚本，实现了类似 T-SQL 的按`ProductID`分组、统计行数并按行数排序的功能：\n\
    \n```pig\nproduct_audit = LOAD '/data/ProductAudit/part-m-00001' USING PigStorage(',')\n\
    \    AS (\n        ProductID:int,\n        Name:chararray,\n        ProductNumber:chararray,\n\
    \        ListPrice:float,\n        ModifiedData:chararray\n    );\n\nproduct_group\
    \ = GROUP product_audit by (ProductID);\nproduct_count = FOREACH product_group\
    \ GENERATE group, COUNT($1) as num_products;\nproduct_sorted = ORDER product_count\
    \ by num_products desc;\n```"
- fmt: "# Chapter 17: Big Data for the SQL Server DBA\n\nThis script defines the structure\
    \ of the data, groups the data by product ID, gets a count of the number of times\
    \ a product appears in the dataset, sorts that in descending order, and saves\
    \ the data back to HDFS in a file called `aggregate_products`. This isn’t very\
    \ different from what we can do with SQL, so it’s a good example to start with\
    \ to understand the structure of a Pig script and how to execute it.\n\n`Table\
    \ 17-6` describes the Pig commands we’re using; go to http://pig.apache.org for\
    \ a full reference.\n\n## Table 17-6. Partial Descriptive List of Hive Commands\n\
    \n| Command | Description |\n| :--- | :--- |\n| `LOAD 'data' [USING function]\
    \ [AS schema];` | `'data'` is the name of the HDFS file or directory you’re using.\
    \ `PigStorage` is the default load function, unless you write your own load function.\
    \ The columns and data types are defined in the schema. |\n| `GROUP...BY group\
    \ key` | This command groups the data in one or more relations using a group key.\
    \ It works very much like the `GROUP BY` clause in T-SQL. |\n| `FOREACH...GENERATE`\
    \ | Use this operation to work with columns of data to generate data transformations.\
    \ |\n| `STORE...INTO 'directory' [USING function]` | This stores results to the\
    \ file system. `'directory'` is the location in HDFS where the output files are\
    \ saved. `PigStorage` is the default store function, unless you write your own\
    \ store function. |\n\nTo run the Pig script, go to Remote Desktop again in Hadoop\
    \ on Azure and launch the Hadoop Command Shell from the desktop. Enter `cd pig`\
    \ at the command prompt to go to the pig directory. Launch Notepad from the Start\
    \ menu, copy and paste the sample Pig script, and save it as `product.pig` in\
    \ the `c:\\ Apps\\dist\\pig` folder. Execute it from the command line by typing\
    \ `pig product.pig` and pressing Enter. If it completes successfully, you’ll now\
    \ see a new file in HDFS in the `ProductExtract` folder with the output of the\
    \ script.\n\nLet’s do something that will highlight some more features of Pig.\
    \ Assume the finance department now wants to know what the inventory level of\
    \ a product is, every time you capture a price change. To get some data that you\
    \ can use, load the `Product` table and the `ProductInventory` tables to HDFS\
    \ by running the following two Sqoop imports into HDFS. Recall that for Sqoop\
    \ to work, you created a synonym for the `Product` table. Now do the same for\
    \ the `ProductInventory` table, like so:\n\n```sql\nCREATE SYNONYM [Production.ProductInventory]\
    \ FOR Production.ProductInventory\n```\n\n```bash\nsqoop import --connect \"jdbc:sqlserver://myserver.database.windows.net;\n\
    username=mysqluser@myserver; password=mypwd; database=AdventureWorks2012\"\n--table\
    \ Production.Product --target-dir /data/Product -m 1\n\nsqoop import --connect\
    \ \"jdbc:sqlserver://myserver.database.windows.net;\nusername=mysqluser@myserver;\
    \ password=mypwd; database=AdventureWorks2012\"\n--table Production.ProductInventory\
    \ --target-dir /data/ProductInventory -m 1\n```\n\nWhen this completes, you’ll\
    \ have one file in the `/data/Product` and `/data/ProductInventory` folders to\
    \ work with. Now you can join this data together with Pig, as follows:\n\n```pig\n\
    product = LOAD '/data/Product/*' USING PigStorage(',')\nAS (\n  ProductID:int,\n\
    \  Name:chararray,\n  ProductNumber:chararray\n);\n\nproduct_inventory = LOAD\
    \ '/data/ProductInventory/*' USING PigStorage(',')\nAS (\n  ProductID:int,\n \
    \ LocationID:int,\n  Shelf:chararray,\n  Bin:int,\n  Quantity:int\n);\n\nproduct_group\
    \ = GROUP product_inventory by ProductID;\n\ninventory_sum = FOREACH product_group\
    \ GENERATE group as ProductID,\nCOUNT(product_inventory.LocationID) as num_locations,\n\
    SUM(product_inventory.Quantity) as total_inventory,\nAVG(product_inventory.Quantity)\
    \ as avg_inventory;\n\ninventory_filter = FILTER inventory_sum BY total_inventory<1000;\n\
    \nproduct_join = JOIN product BY ProductID, inventory_filter BY ProductID;\n\n\
    product_sorted = ORDER product_join by total_inventory desc;\n\nSTORE product_sorted\
    \ INTO '/data/ProductOutput/inventory_list3' USING PigStorage(',');\n```\n\nPig\
    \ allows for manipulation of HDFS data via its procedural language, Pig Latin,\
    \ providing a more advanced tool for transforming data and letting you solve more\
    \ complicated problems. In this example, you used Pig to get data from HDFS and\
    \ to transform and store it in another HDFS data store, and you did so without\
    \ impacting the SQL Server. This is why Pig is important to the SQL Server DBA.\
    \ Not everything has to go through SQL Server and a DBA needs to know when it’s\
    \ more effective to use HDFS as both the input and output data store. Knowing\
    \ the best ways to take advantage of Pig and its features will reduce the stress\
    \ you put on your SQL Server databases.\n\n# Big Data for the Rest of Us\n\nThe\
    \ analysis scenarios, while certainly the most popular reason for Big Data’s existence,\
    \ are not the only use-case. Before we let the data analysts take over everything,\
    \ let’s look at how Big Data can impact the rest of the world. We’ll also look\
    \ at scenarios where the work the data analyst is doing can impact the DBA’s architecture,\
    \ and how the DBA can deal with both RDBMS and Big Data working in conjunction.\n\
    \n## Business Intelligence\n\nWhile Big Data is often used for analytics, it’s\
    \ not necessarily synonymous with Business Intelligence and what it has come to\
    \ be. Some experts will even tell you that Big Data means the end of BI, but that’s\
    \ not likely. A comprehensive BI framework should encompass Big Data and, at the\
    \ very least, use it as a data source. BI includes a type of analysis and visualization\
    \ that allows for rapid-fire what-if analysis with a high degree of user interaction.\
    \ It can also convey the state of the business, relative to key performance indicators,\
    \ by taking a snapshot of the business at strategic points in time. Under the\
    \ BI umbrella, we would also include online analytical processing, data mining,\
    \ predictive modeling, performance management, and more. For planning purposes,\
    \ you should expect that data you collect in a Hadoop framework will become part\
    \ of the data used by the BI framework.\n\n## Big Data Sources\n\nWhere is all\
    \ of this data coming from at such a high `velocity`, in such large `volume`,\
    \ and of so much `variety`?\n\nSensors, logs, web content, text, map, media, social\
    \ computing, and click-stream data are being collected at higher rates than ever,\
    \ and the ability to capture this data has grown enormously over the past several\
    \ years. This data can be produced at a high rate of speed, or velocity in Big\
    \ Data terms.\n\nThe most common data sources for Big Data analytical applications\
    \ are web data in the form of web logs, sensors that continuously capture data\
    \ (such as movement and location), unstructured content (including video and images),\
    \ and social networking data. Web logs are analyzed to optimize site navigation\
    \ and to understand the behavior of online customers. Sensors are driving the\
    \ collection of large amounts of data, since near real-time analytics can be performed\
    \ on data streams being produced by sensors. If a problem is spotted, swift action\
    \ can be taken to correct the situation. Data from sensors can also be stored\
    \ for future analysis to discover patterns that indicate persistent problems.\n\
    \nThere is no minimum volume of data to be considered Big Data, but typically\
    \ the volume starts in the terabytes and could grow to petabytes in size. The\
    \ same is true for variety. While Big Data has made a name for itself by being\
    \ good at handling unstructured data, it can also handle more well-structured\
    \ data, and there’s no yardstick as to how much unstructured data qualifies it\
    \ as Big Data.\n\n## Big Data Business Cases"
