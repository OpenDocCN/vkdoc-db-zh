- fmt: '# Chapter 16: Backups and Restores Using Availability Groups


    ## Figure 16-2. Enabling AlwaysOn High Availability.


    ![Image 179](index-383_1.png)


    这里，我将向你展示如何使用`SSMS`来完成同样的事情。有一个完整的管理界面用于创建和维护你的可用性组。在对象资源管理器中导航到`AlwaysOn High
    Availability`文件夹。展开后，你会看到一个`Availability Groups`文件夹。在这里，如果你已经配置了可用性组，你可以看到它们，查看其状态，并进行修改。但是，既然你目前还没有创建一个，我建议使用“可用性组向导”来开始。


    右键单击`Availability Group`文件夹，并从上下文菜单中选择`New Availability Group Wizard`。将打开一个标准的向导介绍窗口进行说明。单击`Next`按钮，你将被要求提供可用性组的名称。选择一个能明确定义该组及其用途的名称。对于这组测试，我将使用“AgBackup”作为该组的名称。


    定义名称后，再次单击`Next`按钮。你会看到一个数据库列表。这些数据库将被验证并标记是否可以参与可用性组。


    你可以在图16-3中看到一个例子。


    图16-3引用的服务器上当前有四个数据库。从该列表中，`AdventureWorks2008R2.database`的复选框是灰色的。状态显示它有2个必需的操作。基本上，该数据库目前对在可用性组中使用无效。可能的原因各不相同。你可以单击`Status`标题获取定义。一些可能的原因包括数据库未处于`Full
    Recovery`模式（这是数据库在可用性组中使用所必需的），或者因为尚未在该数据库上运行完整备份（这是另一个要求）。你可以看到`AOTest.database`不符合标准，因为它已经是另一个可用性组的一部分。名为`MirrorMe`的数据库正在被镜像，因此无法放入可用性组。


    这就剩下了`MovieManagement`数据库，它通过了所有验证要求，因此可以被选择包含在内。


    如果你有希望作为一个单元进行高可用性处理的数据库组，这也是可以的。如果它们通过验证，请将它们添加到组中。选择要包含在组中的一个或多个数据库后，单击`Next`按钮。这将打开向导的“指定副本”页面。在这里，你可以定义用于管理可用性组的主副本和辅助副本。如图16-4所示，你可以在组中指定一到五个不同的服务器。


    在此示例中，我包含了五个副本，并最大化了每个不同的选项：两个副本具有自动故障转移，三个副本具有同步提交。自动故障转移意味着当主副本因任何原因离线时，一个辅助副本将自动成为主副本。事务在主副本和辅助副本之间传输。当你选择使这些事务同步时，意味着可用性组管理将先在这些副本上提交事务，然后这些事务才能从主副本中移除。异步提交将使辅助副本上的事务与主副本上的事务分离，并且不会影响主副本的日志。我还将其中一个副本设置为可读辅助副本。这意味着即使该辅助副本从当前充当主副本的副本接收更新，也可以针对它运行查询。


    ## Figure 16-3. A list of databases and information about whether or not they
    meet the criteria for use in an Availability Group.


    ![Image 180](index-384_1.png)


    ## Figure 16-4. Specifying the replicas in the Availability Group.


    除了副本之外，此页面还提供另外三个选项卡来设置可用性组的各个部分。在“端点”选项卡上，你可以修改服务器的位置信息和连接字符串。如果你在物理位置不同的服务器上构建可用性组，需要特殊设置才能建立远程连接，这将非常有用。你可以单击“备份首选项”选项卡来修改副本的备份首选项，但我将在本章后面详细讨论这一点。最后，在“侦听器”选项卡上，你可以为可用性组设置一个侦听器。这充当应用程序的标准连接点，这样你就不必编写代码来确定应用程序可以连接到哪台服务器。你的应用程序代码连接到侦听器，然后由侦听器将你的代码定向到适当的副本。


    ![Image 181](index-385_1.png)


    ## Figure 16-5. Defining how the data-synchronization process will take place.


    如果你单击`Next`按钮，将进入“选择数据同步”页面。你使用此页面上的选项来确定可用性组中的数据库如何移动到组中的副本。有三个基本选项，如图16-5所示并进行了解释。


    你的选择归结为允许`SQL Server`为你管理该过程，或者你自己设置数据库。如果你在单一网络内设置可用性组，没有重大的物理隔离以及随之而来的带宽和延迟问题，你可能希望允许`SQL
    Server`为你管理该过程。如果不是，则你需要还原一个完整备份和适当的日志备份，以确保在初始化可用性组之前，数据库的数据和结构完全同步。完成后，单击`Next`按钮将运行向导的下一步，该步骤处理验证。


    验证确保你的服务器和数据库都已正确配置，并且可以适当通信以支持你的可用性组。如果任何验证失败，你将在屏幕上收到通知。单击通知将为你提供详细说明。你可以将此屏幕保留在原位以直接解决问题。一旦修复，你只需单击图16-6底部显示的`ReRun
    Validation`按钮。


    如图16-6所示，我的可用性组的侦听器配置有一个警告。这是因为在上一页上我没有定义侦听器。可用性组无需侦听器即可工作，尽管它对你的应用程序如何连接到该组有很大影响。但你可以先设置和测试可用性组，然后在准备处理应用程序时再添加侦听器。'
  raw: '***Figure 16-2.** Enabling AlwaysOn High Availability.*


    ![Image 179](index-383_1.png)


    Chapter 16 ■ BaCkups and restores using availaBility groups


    here, I’ll show you how to use SSMS to accomplish the same thing. There is a complete
    management interface for creating and maintaining your Availability Groups. Navigate
    to the AlwaysOn High Availability folder within the Object Explorer. After expanding
    this, you’ll see a folder for Availability Groups. Within here, if you have Availability
    Groups already configured, you can see them, see their status, and make modifications
    to them. But, since at this point, you don’t have one created, I suggest using
    the Availability Group Wizard to get started.


    Right-click on the Availability Group folder, and select New Availability Group
    Wizard from the context menu. A standard wizard introduction window explaining
    things will open. Click the Next button and you’ll be required to supply a name
    for your Availability Group. Select a name that meaningfully defines the group
    and its purpose. For this set of tests, I’ll use the name “AgBackup” as the name
    for the group.


    After you define a name, click the Next button again. You are presented with a
    list of databases. These databases will be validated and marked as to whether
    or not they can take partake in an Availability Group.


    You can see an example of this in Figure 16-3.


    There are four databases currently on the server referenced in Figure 16-3\. From
    that list, the AdventureWorks2008R2 .database has its check box grayed out. The
    status shows that it has 2 required actions. Basically, that database is not currently
    valid for use in an Availability Group. The possible reasons are varied. You can
    click on the Status header to get a definition. Some of the possible reasons are
    that the database is not in Full Recovery mode, which is required for a database
    to be used in an Availability Group, or because no full backup has been run on
    this database, which is another requirement. You can see that the AOTest. database
    doesn’t meet the criteria because it’s already part of a different Availability
    Group. The database with the name. MirrorMe is being mirrored and therefore can’t
    be put into an Availability Group.


    That leaves the MovieManagement database, which has passed all the validation
    requirements and therefore can be selected for inclusion.


    If there are groups of databases you want to treat as a unit for the purposes
    of High Availability, you can. If they pass validation, add them to the group.
    With the database, or databases, selected for the group, click the Next button.
    This brings up the Specify Replicas page of the wizard. This is where you define
    the primary and secondary replicas for managing the Availability Group. You can
    specify between one and five different servers to create within the group, as
    shown in Figure 16-4.


    For this example, I included five replicas and maxed out each of the different
    options: two replicas have automatic failover, and three replicas have synchronous
    commit. Automatic failover means that when the primary replica is taken offline
    for any reason, one of the secondary replicas will automatically become the primary
    replica. Transactions are transferred between the primary replica and the


    ***Figure 16-3.** A list of databases and information about whether or not they
    meet the criteria for use in an* *Availability Group.*


    ![Image 180](index-384_1.png)


    Chapter 16 ■ BaCkups and restores using availaBility groups


    ***Figure 16-4.** Specifying the replicas in the Availability Group.*


    secondaries. When you choose to make these transactions synchronous, it means
    that the Availability Group management will commit transactions to those replicas
    before those transactions can be removed from the primary replica. Asynchronous
    commits will separate the transactions on the secondaries from those on the primary
    replica and won’t affect the primary’s log. I also made one of the replicas a
    readable secondary. This means that queries can be run against that secondary
    even as it gets updated from whichever of the replicas is currently acting as
    the primary.


    In addition to the replicas, this page offers three other tabs for setting up
    pieces of the Availability Group. On the Endpoints tab, you can modify the location
    information and connection strings for the servers. This is especially useful
    if you are building an Availability Group with servers in different physical locations
    requiring special settings in order to make the remote connection. You can click
    on the Backup Preferences tab to modify the backup preferences for the replicas,
    but I’ll cover that in some detail later in the chapter. Finally, on the Listener
    tab, you can set up a listener for the Availability Group. This acts as a standard
    connection point for applications so that you don’t have to write code that determines
    which server an application can connect to. Your application code connects to
    the listener and that directs your code to the appropriate replica.


    ![Image 181](index-385_1.png)


    Chapter 16 ■ BaCkups and restores using availaBility groups


    ***Figure 16-5.** Defining how the data-synchronization process will take place.*


    If you click the Next button, you’ll be taken to the Select Data Synchronization
    page. You use the options on this page to determine how the database, or databases,
    in your Availability Group get moved to the replicas in the group. There are three
    basic options, which are displayed and explained in Figure 16-5.


    Your choices boil down to allowing SQL Server to manage the process for you or
    setting up the databases yourself. If you’re setting up your Availability Groups
    within a single network without major physical separation, and the bandwidth and
    latency problems that brings with it, you might want to allow SQL Server to manage
    the process for you. If not, you need to restore a full backup and the appropriate
    log backups to ensure that the data and structures for your databases are completely
    in sync prior to initializing your Availability Group. Once this is done, clicking
    the Next button runs the next step in the wizard, which deals with validations.


    The validations ensure that your servers and databases are all correctly configured
    and can communicate appropriately to support your Availability Group. If any of
    the validations fail, you will receive notice on the screen. Clicking on the notice
    will provide you with a detailed explanation. You can leave this screen in place
    to address the issues directly. Once they are fixed, you just have to click the
    ReRun Validation button that you see on the bottom of Figure 16-6.


    As you can see in Figure 16-6, there was a warning from the listener configuration
    for my Availability Group. This is because I did not define a listener on the
    previous page. You don’t have to have a listener for Availability Groups to work,
    although it makes a huge difference in how you connect to the group from your
    applications. But you can set up and test the Availability Group first, and then
    add a listener when you’re ready to work with applications.'
  trans: '# 第 16 章：使用可用性组进行备份和还原


    ## 图 16-2. 启用 AlwaysOn 高可用性。


    ![Image 179](img/index-383_1.png)


    这里，我将向你展示如何使用`SSMS`来完成同样的事情。有一个完整的管理界面用于创建和维护你的可用性组。在对象资源管理器中导航到`AlwaysOn 高可用性`文件夹。展开后，你会看到一个`可用性组`文件夹。在这里，如果你已经配置了可用性组，你可以看到它们，查看其状态，并进行修改。但是，既然你目前还没有创建一个，我建议使用“可用性组向导”来开始。


    右键单击`可用性组`文件夹，并从上下文菜单中选择`新建可用性组向导`。将打开一个标准的向导介绍窗口进行说明。单击`下一步`按钮，你将被要求提供可用性组的名称。选择一个能明确定义该组及其用途的名称。对于这组测试，我将使用“AgBackup”作为该组的名称。


    定义名称后，再次单击`下一步`按钮。你会看到一个数据库列表。这些数据库将被验证并标记是否可以参与可用性组。


    你可以在图 16-3 中看到一个例子。


    图 16-3 引用的服务器上当前有四个数据库。从该列表中，`AdventureWorks2008R2.database`的复选框是灰色的。状态显示它有 2
    个必需的操作。基本上，该数据库目前对在可用性组中使用无效。可能的原因各不相同。你可以单击`状态`标题获取定义。一些可能的原因包括数据库未处于`完整恢复`模式（这是数据库在可用性组中使用所必需的），或者因为尚未在该数据库上运行完整备份（这是另一个要求）。你可以看到`AOTest.database`不符合标准，因为它已经是另一个可用性组的一部分。名为`MirrorMe`的数据库正在被镜像，因此无法放入可用性组。


    这就剩下了`MovieManagement`数据库，它通过了所有验证要求，因此可以被选择包含在内。


    如果你有希望作为一个单元进行高可用性处理的数据库组，这也是可以的。如果它们通过验证，请将它们添加到组中。选择要包含在组中的一个或多个数据库后，单击`下一步`按钮。这将打开向导的“指定副本”页面。在这里，你可以定义用于管理可用性组的主副本和辅助副本。如图
    16-4 所示，你可以在组中指定一到五个不同的服务器。


    在此示例中，我包含了五个副本，并最大化了每个不同的选项：两个副本具有自动故障转移，三个副本具有同步提交。自动故障转移意味着当主副本因任何原因离线时，一个辅助副本将自动成为主副本。事务在主副本和辅助副本之间传输。当你选择使这些事务同步时，意味着可用性组管理将先在这些副本上提交事务，然后这些事务才能从主副本中移除。异步提交将使辅助副本上的事务与主副本上的事务分离，并且不会影响主副本的日志。我还将其中一个副本设置为可读辅助副本。这意味着即使该辅助副本从当前充当主副本的副本接收更新，也可以针对它运行查询。


    ## 图 16-3. 数据库列表及其是否符合可用性组使用标准的信息。


    ![Image 180](img/index-384_1.png)


    ## 图 16-4. 指定可用性组中的副本。


    除了副本之外，此页面还提供另外三个选项卡来设置可用性组的各个部分。在“端点”选项卡上，你可以修改服务器的位置信息和连接字符串。如果你在物理位置不同的服务器上构建可用性组，需要特殊设置才能建立远程连接，这将非常有用。你可以单击“备份首选项”选项卡来修改副本的备份首选项，但我将在本章后面详细讨论这一点。最后，在“侦听器”选项卡上，你可以为可用性组设置一个侦听器。这充当应用程序的标准连接点，这样你就不必编写代码来确定应用程序可以连接到哪台服务器。你的应用程序代码连接到侦听器，然后由侦听器将你的代码定向到适当的副本。


    ![Image 181](img/index-385_1.png)


    ## 图 16-5. 定义数据同步过程将如何进行。


    如果你单击`下一步`按钮，将进入“选择数据同步”页面。你使用此页面上的选项来确定可用性组中的数据库如何移动到组中的副本。有三个基本选项，如图 16-5 所示并进行了解释。


    你的选择归结为允许`SQL Server`为你管理该过程，或者你自己设置数据库。如果你在单一网络内设置可用性组，没有重大的物理隔离以及随之而来的带宽和延迟问题，你可能希望允许`SQL
    Server`为你管理该过程。如果不是，则你需要还原一个完整备份和适当的日志备份，以确保在初始化可用性组之前，数据库的数据和结构完全同步。完成后，单击`下一步`按钮将运行向导的下一步，该步骤处理验证。


    验证确保你的服务器和数据库都已正确配置，并且可以适当通信以支持你的可用性组。如果任何验证失败，你将在屏幕上收到通知。单击通知将为你提供详细说明。你可以将此屏幕保留在原位以直接解决问题。一旦修复，你只需单击图
    16-6 底部显示的`重新运行验证`按钮。


    如图 16-6 所示，我的可用性组的侦听器配置有一个警告。这是因为在上一页上我没有定义侦听器。可用性组无需侦听器即可工作，尽管它对你的应用程序如何连接到该组有很大影响。但你可以先设置和测试可用性组，然后在准备处理应用程序时再添加侦听器。'
- fmt: '## 了解可用性组仪表板与管理设置


    完成向导后，流程的下一步是将数据库移动到每个副本服务器上，使其可供使用。您可以通过可用性组仪表板检查可用性组的状态，该仪表板可以从可用性组内的任何服务器访问。在对象资源管理器中，右键单击
    **AlwaysOn High Availability** 文件夹。然后，可以从菜单中选择 **Dashboard**。选择此项将显示服务器上所有可用性组的列表。如果您选择其中一个组，您将看到其当前状态。图
    16-7 显示了我的可用性组 `AgBackup` 当前的配置方式。


    信息分为三个基本区域。顶部是可用性组本身的状态。在左侧，您可以看到此组的当前状态为 **Healthy**，主实例是 `SQLTHREE`，故障转移模式设置为
    **Automatic**，集群状态是正常仲裁，这意味着有足够的服务器可用以确定当前哪个是主实例。仪表板右侧还提供了一些链接。您可以单击 **Start Failover
    Wizard**、**View AlwaysOn Health Events** 或 **View Cluster Quorum Information**。第二部分显示有关可用性组副本的更多详细信息。每个服务器的链接允许您深入查看相应的服务器。最后一节显示有关可用性组中服务器的更详细信息。这就是您快速确定可用性组状态的方式。但是，要管理组的设置，您需要转到不同的窗口。


    在对象资源管理器中右键单击可用性组，允许您从上下文菜单中访问 **Properties** 窗口。您可以在此处修改有关可用性组设置时所做的决策。选项与向导步骤中提供的类似，但您获得的指导会少很多。您可以调整主副本和辅助副本及其在组内的角色，所有这些如图
    16-8 所示。


    通过最后一个屏幕，您就掌握了如何设置和操作可用性组的基础知识。


    关于如何在具有不同安全级别和许多其他事项的不同物理位置之间配置组，还有更多细节，但现在我们将继续进行使用可用性组设置备份。


    ## 启用可用性组上的备份


    可用性组上可用的唯一备份是日志备份和设置为使用 `COPY_ONLY` 的完整数据库备份。不允许完整备份，也不允许差异备份。但即使是日志备份，您也不能简单地运行备份。您必须进行许多配置选择，以确保您将获得一组可用于恢复的备份。首先，您需要确定备份将在何处发生。您可以决定仅在主副本上运行、仅在辅助副本上运行、仅在某些辅助副本上运行，或者介于两者之间的各种变体。最后，您可以为每个副本设置优先级值，如果您特别希望备份在某个副本上运行。


    备份过程的设置在可用性组的 **Properties** 对话框中可用。您可以按照前面章节中的描述访问它。


    ### 备份位置


    确定应使用哪个副本进行备份完全是您的系统及其要求的一部分。但备份发生位置的操纵是通过可用性组的 **Properties** 对话框完成的，如图 16-9
    所示。


    运行自动化备份最有弹性的机制是使用默认选项 **Prefer Secondary**。这确保了只要可用性组的某部分在线且未完全从备份中移除（下一节将详细介绍），您将从其中一个副本获取日志备份。这往往会将组带离主副本，但不会将其从考虑中完全排除。如果您确实希望卸载运行备份的过程，可以选择
    **Secondary Only** 选项。这将排除主副本，无论它在备份运行时位于何处。或者，如果您需要，可以设置备份仅在主服务器上运行。最后，您可以选择
    **Any Replica** 选项。选择此项将导致自动化备份简单地回退到任何在线、包含在备份中且当前具有优先级的副本。


    您可以以编程方式确定服务器是否具有备份优先级。有一个系统函数 `sys.fn_hadr_backup_is_preferred_replica`。这是一个只返回布尔值的函数。它可以作为
    `IF` 语句的一部分调用，也可以简单地通过 `SELECT` 调用：


    ```sql

    SELECT sys.fn_hadr_backup_is_preferred_replica(''MovieManagement'');

    ```


    如果我在当前主副本上运行此命令，并且备份位置设置为默认选项 **Prefer Secondary**，我的输出将如图 16-10 所示。


    我们稍后将对此函数进行更多操作。


    说到 `T-SQL`，您可以使用 `T-SQL` 命令来管理可用性组，包括设置备份位置。以下是您可以如何修改 `AgBackup` 组以对备份使用 **Secondary
    Only** 选项。（虽然可以在数据库内运行单个数据库命令，但大多数可用性组的管理命令必须从 `master` 数据库运行。）


    ```sql

    USE master;

    GO

    ALTER AVAILABILITY GROUP AgBackup

    SET (AUTOMATED_BACKUP_PREFERENCE = SECONDARY_ONLY);

    ```


    现在，主服务器（无论哪个服务器是主服务器）都不能用于运行自动化备份。


    但是，简单地设置您希望控制备份的副本类型并不是控制自动化备份发生位置的唯一方法。您还可以从列表中移除副本并调整副本的优先级。


    ### 备份优先级


    与修改可以执行备份的副本类型一样，备份优先级也通过 `GUI` 和 `T-SQL` 控制。我们将通过图 16-11 从 `GUI` 方法开始。


    您可以指定要排除的副本。当某个副本被选中时，它无法运行备份，无论其他设置如何。**Backup Priority** 是一个介于 1 到 100 之间的数字。默认是将所有服务器设置为相同的中等优先级
    50。您可以向上或向下调整它们，以提供对哪个服务器更可能运行备份的控制级别。当然，所有这些都取决于服务器的可用性。尽管某个副本可能具有最低优先级，但如果它是唯一可用于备份的服务器，备份将在那里进行。


    通过 `T-SQL` 调整优先级级别遵循您之前看到的一些机制。要修改副本的优先级级别，请执行以下操作：


    ```sql

    ALTER AVAILABILITY GROUP AgBackup

    MODIFY REPLICA ON ''SQLTWO''

    WITH (BACKUP_PRIORITY = 2);

    ```'
  raw: 'After you complete the wizard, the next step of the process is to move the
    database onto each of the replica servers so that it’s available for use. You
    can check the status of the Availability Group by using the Availability Group
    dashboard. This can be accessed from any server within the Availability Group.
    In Object Explorer, right-click on the AlwaysOn High Availability folder. You
    can then select Dashboard from the menu. Selecting this will show a listing of
    all Availability Groups on your server. If you select one of the groups, you’ll
    see its current status. Figure 16-7 shows how my Availability Group, AgBackup,
    is currently configured.


    The information is divided into three basic areas. Across the top is the status
    of the Availability Group itself. On the left, you can see that the current status
    of this group is Healthy, that the primary instance is 380


    ![Image 182](index-386_1.png)


    ![Image 183](index-386_2.png)


    Chapter 16 ■ BaCkups and restores using availaBility groups


    ***Figure 16-6.** A successful set of validations, along with one warning.*


    ***Figure 16-7.** The Availability Group dashboard showing the current status
    of all the replicas.*


    ![Image 184](index-387_1.png)


    Chapter 16 ■ BaCkups and restores using availaBility groups


    SQLTHREE, and that the failover mode is set to Automatic and the cluster state
    is a normal quorum, meaning enough servers are available to determine which of
    them is currently the primary. You also get a few links on the right side of the
    dashboard. You can click Start Failover Wizard, View AlwaysOn Health Events, or
    View Cluster Quorum Information. The second section shows more details about the
    Availability Group replicas. The links for each server allow you to drill down
    on the appropriate server. The final section shows more detailed information about
    the servers in the Availability Group. This is how you quickly determine what
    the status of your Availability Group is. But to manage the settings of the group,
    you need to go to a different window.


    Right-clicking on the Availability Group in the Object Explorer allows you to
    access the Properties window in the context menu. This is where you can modify
    the decisions you’ve made regarding the setup of the Availability Group. The options
    are similar to those you were offered during the steps through the wizard, but
    you’ll get quite a bit less guidance. You can adjust the primary replica and the
    secondary replicas and their roles within the group all as shown in Figure 16-8.


    With this last screen, you have the basics for how to set up and manipulate the
    Availability Group.


    There are a lot more details on how to configure groups between different physical
    locations, with varying degrees of security and a number of other things, but
    now we’re going to move on to setting up backups using the Availability Groups.


    ***Figure 16-8.** Properties for the Availability Group that you can use to take
    control of the group.*


    ![Image 185](index-388_1.png)


    ![Image 186](index-388_2.png)


    Chapter 16 ■ BaCkups and restores using availaBility groups


    Enabling Backups on Availability Groups


    The only backups that are available on your Availability Group are log backups
    and full-database backups that are set to use COPY_ONLY. Full backups are not
    allowed nor are differentials. But even with the log backups, you can’t simply
    run a backup. There are a number of configuration choices you have to make to
    ensure that you’re going to get a set of backups you can use for recovery. To
    start with, you need to determine where your backups are going to occur. You can
    decide to run them only on the primary, only on secondaries, only on some secondaries,
    or all sorts of variations in between. Finally, you can set the priority value
    for each of your replicas if there is one in particular where you’d like to see
    the backups run.


    The settings for your backup processes are available in the Properties dialog
    box for the Availability Group. You can access it exactly as described in the
    preceding section.


    Backup Location


    Determining which of the replicas should be used for backup is entirely a part
    of your system and the requirements there. But the manipulation of where backups
    occur is done from the Properties dialog box for your Availability Group, as shown
    in Figure 16-9.


    The most resilient mechanism for running the automated backups is to have them
    use the default option, Prefer Secondary. This ensures that as long as some part
    of the Availability Group is online and hasn’t been removed from the backups entirely
    (more on that in the next section), you’ll get a log backup from one of the replicas.
    This will tend to take the group away from the primary replica, but not eliminate
    it from consideration. If you really are trying to offload the process of running
    backups, you can choose the Secondary Only option. This will exclude the primary
    replica, wherever it might be when the backups are run. Or, if you need to, you
    can make it so that backups are only ever run from the primary server. Finally,
    you can just choose the Any Replica option. Choosing this will cause the automated
    backup simply to fall back on whichever replica is online, included in backups,
    and currently has the priority.


    You can determine programmatically if a server has the backup priority. There’s
    a system function called sys.fn_hadr_backup_is_preferred_replica. It’s a function
    that just returns a Boolean. It can be called as part of an IF statement or simply
    as a SELECT:


    ***Figure 16-9.** Determing where to perform automated backups in an Availability
    Group.*


    ***Figure 16-10.** The current server is not the preferred backup replica.*


    ![Image 187](index-389_1.png)


    Chapter 16 ■ BaCkups and restores using availaBility groups


    SELECT sys.fn_hadr_backup_is_preferred_replica(''MovieManagement'');


    If I ran this on the current primary replica and the backup location was set to
    the default option, Prefer Secondary, my output would look like Figure 16-10.


    We’ll do more with this function later.


    Speaking of T-SQL, you can use T-SQL commands to take charge of the Availability
    Groups, including setting up the backup location. Here’s how you could modify
    the AgBackup group to use the Secondary Only option for the backups. (Although
    individual database commands can be run within the database, most of the management
    commands for Availability Groups must be run from the master database.) USE master;


    GO


    ALTER AVAILABILITY GROUP AgBackup


    SET (AUTOMATED_BACKUP_PREFERENCE = SECONDARY_ONLY);


    Now the primary, regardless of which server is the primary, cannot be used to
    run automated backups.


    But simply setting which type of replica you want to be able to control the backups
    is not the only way to control where the automated backups take place. You can
    also remove replicas from the list and adjust the priority of the replicas.


    Backup Priority


    As with modifying which types of replicas can do the backups, backup priority
    is controlled through both the GUI and T-SQL. We’ll start the GUI approach by
    looking at Figure 16-11.


    You can specify the replicas that you want excluded. When a replica is selected,
    it cannot run a backup, regardless of what the other settings are. The Backup
    Priority is a number between 1 and 100\. The default is to have all servers set
    to the same, midrange, priority of 50\. You can adjust them up and down to provide
    a level of control over which of the servers is more likely to run the backup.
    All of this depends, of course, on the availability of the server. Although a
    replica might have the lowest priority, if it’s the only server available for
    a backup, that’s where the backup will occur.


    Adjusting the priority level through T-SQL follows some of the mechanisms you
    saw earlier. To modify the priority level of a replica, you do this:


    ALTER AVAILABILITY GROUP AgBackup


    MODIFY REPLICA ON ''SQLTWO''


    WITH (BACKUP_PRIORITY = 2);'
