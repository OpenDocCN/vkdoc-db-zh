    本质上，它们（统计信息）告知查询优化器某个列中每个值有多少个。这有助于优化器为查询选择最佳执行计划。随着数据的添加、更新和删除，数据的分布，以及关于数据的统计信息，也会发生变化。


    SQL Server 可以自动维护统计信息。您可以选择的数据库设置之一是 `AUTO UPDATE STATISTICS`。如果设置了此选项，一旦对某一列的更改数量达到数据库引擎设定的阈值，统计信息就会更新。但是，如果您想对此有更多控制权，可以计划一个作业来执行您提供的命令，这些命令按照您设定的时间表运行，并以您希望的方式更新统计信息。


    SQL Server 中的 `UPDATE STATISTICS` 命令允许您指定要作为样本扫描的行数，可以是具体数字或百分比。您可以更新整个表的统计信息，或者仅更新表上的某一项统计信息。存储过程
    `sp_updatestats` 将更新数据库中所有表的过期统计信息。该命令和过程有一些缺点，例如查询计划会重新编译，因此最好谨慎使用。


    ## 结论


    您有许多机会可以自动化 SQL Server 管理任务，并且有许多工具可以实现这一点。自动化为您带来诸多益处，例如预防问题、工作更快、更为主动、提高生产力、扩展环境以及节省成本。心中有了目标，您就可以着手制定计划来自动化您的环境，实施它并衡量结果。


    ## 第 11 章：SQL Server 数据移动的流体动力学


    作者：Wendy Pastrick


    作为数据库管理员（DBA），我最喜欢的任务之一是配置和管理将数据从一个地方移动到另一个地方的解决方案。在我职业生涯的早期，我很幸运地工作在一个需要将数据复制到全球各地的环境中。支持一个我负责在七个主要地理中心实现数据冗余的系统，这非常令人兴奋，对我而言也是一个全新的挑战。直到后来我才意识到，对许多人来说，移动数据被视为一项艰巨的任务。多年来，我看到数据复制的需求变得越来越普遍。


    自从我开始使用 Microsoft SQL Server 以来，我已经使用了多种方法来实现数据冗余。然而，我所采用的方法取决于我试图完成的任务。数据副本是用于报告吗？高可用性？灾难恢复？在本章中，我将根据我的经验，就如何选择合适的功能将数据从
    A 点移动到 B 点提供实用建议，并且我也会告知您每种方法的优缺点。


    ### 为什么需要复制数据？


    在多个地方拥有同一数据的多个副本的需求正在不断增长。无论公司大小，都会受到来自内部和外部用户的四面八方的数据存储访问请求的轰炸。每个人都想查看数据，并且希望尽可能快地看到数据。通常，这些数据需要是最新的且干净的。以下是一个简短的列表，说明了组织可能需要其数据副本的原因：


    - 在开发、测试或预演环境中使用生产数据

    - 将数据移动到更靠近用户的地方——地理位置分散

    - 满足报告需求

    - 在数据进入生产环境之前对其进行处理

    - 用于高可用性（HA）

    - 用于灾难恢复（DR）


    当然，这个列表并非详尽无遗，我相信您还能想到一些此处未显示、特定于您公司需求的其他场景。关键在于，数据复制远不止是为了 HA 或 DR 而拥有副本。虽然这些是人们在其他地方拥有冗余数据副本最常见的原因，但其他原因可能同样重要。


    例如，如果您的公司有自己的开发团队，那么您的数据中心至少会有一个开发环境，可能还有其他用于测试、质量保证或生产前发布评审的环境。作为数据库管理员，您将负责按照某种计划刷新这些数据。我见过从每年刷新到每晚刷新，甚至需要按需刷新的情况。


    那么，如何克服数据检索中的延迟问题呢？我曾为两家全球性公司工作过两个关键职位，它们都面临类似的问题：地理上分散的办公室需要在本地维护当前数据存储。虽然两家公司都使用复制模型来分发数据，但它们各自采取了完全不同的方式。然而，对于这两家公司来说，关键都是让数据在物理上更靠近用户，以缓解连接到可能位于世界另一端的单一数据存储所带来的长时间同步问题。


    当许多用户试图针对单一数据存储创建或运行报告时，会发生类似的问题。太多连接同时尝试访问相同的信息片段，可能会导致用户感受到明显的延迟问题。此外，如果您的公司允许临时报告，或者有部门通过
    Microsoft Excel 或 Access 数据源访问您的数据库，您就无法控制对数据的任何不良查询。一个编写不当的查询可能会对您的系统产生严重影响。


    在这种情况下，拥有一个数据副本用于那些不占用真正生产源相同系统资源的报告，可以缓解大量的资源争用。


    如果您需要对数据运行批处理过程，但又要确保对日常业务功能没有负面影响，该怎么办？您可能会选择设置一个数据的副本来测试批处理过程的影响，然后再将这些更改推送到生产环境。


    在我继续之前，请允许我就高可用性和灾难恢复说几句。高可用性系统是指在发生单个硬件故障时，能够立即可用并尽可能减少数据损失的系统。我将在此描述的一些技术非常适用于提供高可用性系统。另一方面，灾难恢复是贵公司在发生重大灾难时的应急计划。想象一下地震、原子弹爆炸——这些是我们祈祷永远不会发生、但可能摧毁整个社区或您整个设施的事件。如果面临真正的灾难情况，您的公司是否仍能在数小时、数天或数周内恢复并重新运行？我将把这些类型的应急计划讨论留给其他资料，因为它们相当复杂。然而，有一点是肯定的，那就是您必须考虑到在发生灾难时需要核心数据存储的副本。


    让我们研究几个说明需要不同数据分发实施方式的场景。


    ### 场景 1：全球性组织


    “咨询公司 R Us”是一家全球性的专业服务公司。他们在美国伊利诺伊州芝加哥设有总部，拥有两个数据中心。一个位于其主要设施现场，另一个位于美国俄亥俄州哥伦布市的一个托管设施内。他们在全球各地设有办事处，包括墨西哥城、里约热日内瓦、悉尼、东京、伊斯坦布尔、伦敦和约翰内斯堡。全球业务必须每天
    24 小时在线，仅在周六上午有一个短暂的可用停机窗口。


    ### 场景 2：高容量报告需求


    该公司有几个用于报告的数据库。许多用户同时查询这些数据库，导致了数据访问问题。

