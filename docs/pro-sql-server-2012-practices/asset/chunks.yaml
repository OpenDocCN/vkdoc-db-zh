    \ be retrieved for tasks such as reorganizing indexes, backing up databases, and\
    \ performing certain `DBCC` processes and rollbacks. In the past, this data was\
    \ unavailable.\n\nKeep in mind that the data used by the following queries doesn’t\
    \ have to be cleared by a cycle of the database server or services. The data can\
