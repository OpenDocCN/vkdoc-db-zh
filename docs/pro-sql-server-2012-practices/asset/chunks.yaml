    bad anyway.) The predicate is the same as it was before on the index scan. It’s
    still being applied to every row returned from the seek (which is every row in
    the table), so it’s just as inefficient as the query was before adding the OrderID
    > 0


    predicate to the where clause. An examination of the output of statistics IO (which
    I will leave as an exercise to the reader) will show that adding that OrderID
    > 0 predicate made no improvements to the efficiency of the query.


    Be aware, not all index seeks are created equal and adding predicates to a where
    clause just so that the execution plan shows a seek rather than a scan is unlikely
    to do anything but require extra typing.


    Residuals


    Moving on to residuals, they are similar in concept to the predicates on index
    seeks, index scans, and key lookups, but they are found in a different place.
    They’re found on joins, mainly on merge and hash joins.


    (Residuals on a loop join usually show up as predicates on the inner or outer
    table, or sometimes both.) Let’s start with an example:


    ![Image 27](index-71_1.png)


    chapter 3 ■ hidden performance Gotchas


    SELECT *


    FROM dbo.Shifts AS s


    INNER JOIN dbo.ShiftDetails AS sd


    ON s.EmployeeID = sd.EmployeeID


    AND s.ShiftStartDate BETWEEN sd.ShiftStartDate AND DATEADD(ms,-3,DATEADD(dd,1,


    sd.ShiftStartDate))


    WHERE CAST(sd.ShiftStartDate AS DATETIME) > ''2012/06/01''


    The plan for this query is shown in Figure 3-18.


    ***Figure 3-18.** Partial join.*


    The tooltip of the join operator shows that the Join columns was EmployeeID only.
    There’s no mention of my date expression. Where did that go? See Figure 3-19 for
    the answer. It shows that it went into the residual section in the properties
    of the join operator.


    ![Image 28](index-72_1.png)


    ![Image 29](index-72_2.png)


    chapter 3 ■ hidden performance Gotchas


    ***Figure 3-19.** Join residual as seen in the properties of the join operator.*


    It’s hard to see what’s happening there, so I repeated it and cleaned it up here:


    Shifts.EmployeeID =ShiftDetails.EmployeeID


    AND Shifts.ShiftStartDate >= CONVERT_IMPLICIT(datetime, ShiftDetails.ShiftStartDate,0)
    AND Shifts.ShiftStartDate <= dateadd(millisecond,(-3), dateadd(day,(1),


    CONVERT_IMPLICIT(datetime,ShiftDetails.ShiftStartDate, 0)))


    The join columns just contains the EmployeeID; it’s the residual that has both.
    What’s happening here is that SQL evaluates the join on the join columns (in this
    case, EmployeeID) and then applies the filter listed in the residual to every
    row that qualifies for the join. If the match on just the join columns isn’t very
    restrictive, you can end up with a huge intermediate result set (a partial cross
    join, technically) that SQL


    has to find memory for and has to work through and apply the residual to. This
    can be seen in the properties of the join, as shown in Figure 3-20.


    ***Figure 3-20.** Many-to-many join with a huge row count.*


    ![Image 30](index-73_1.png)


    chapter 3 ■ hidden performance Gotchas


    There are 70 million rows estimated, and that’s estimated based on what SQL knows
    of the uniqueness of the join columns on each side of the join (and in this case,
    the EmployeeID is not very unique in either table). The Actual Row Count (as mentioned
    earlier) is the total rows that the operator output, not the total rows that the
    join had to work over. In this case, the number of rows that the join operator
    had to process is a lot higher than the number that were output (probably close
    to the estimated rows).


    Depending on how many rows match on just the join columns (vs. both the join and
    the residual), this can result in minor overhead or major overhead.


    To put things in perspective, the prior example ran for 14 minutes. A fixed version
    that joined on a direct equality on both EmployeeID and ShiftStartDate and had
    both predicates listed in the join columns (and returned the same rows) ran in
    20 seconds.


    Hash joins can also have residuals. The properties of the hash join (shown in
    Figure 3-21) show the join and the residual slightly differently to the merge.


    ***Figure 3-21.** Hash join properties.*


    ![Image 31](index-74_1.png)


    ![Image 32](index-74_2.png)


    chapter 3 ■ hidden performance Gotchas


    The columns that are used to join appear as Hash Keys Probe in the tooltip, and
    as Hash Keys Build and Hash Keys Probe in the properties of the join operator
    (as shown in Figure 3-22). The columns for the residual appear in the probe residual
    in both the tooltip and the properties.


    ***Figure 3-22.** Hash join build and probe columns.*


    As with the merge join, the number of rows that the residual has to process affects
    just how bad it will be in terms of performance.


    That’s all well and good, but how do you fix them?


    As with the predicates on index seeks and scans, multiple things can cause residuals.


    Unlike predicates, the index column order is not a main cause. Hash joins don’t
    mind the index column order much. Merge joins do because they need both sides
    of the join to be sorted on the join columns, and indexes do provide an order.
    However, if the order isn’t as the merge wants it, the optimizer can put a sort
    into the plan or it can use a different join, such as a hash join.


    Mismatched data types can result in joins that have residuals, as Figure 3-23
    shows. By “mismatched data type,” I mean joins where the two columns involved
    are of different data types. The most common ones I’ve seen in systems are varchar
    and nvarchar, varchar and date, and varchar and int.


    ***Figure 3-23.** Hash join with a residual caused by a data type mismatch.*


    ![Image 33](index-75_1.png)


    chapter 3 ■ hidden performance Gotchas


    It’s not clear from the tooltip shown in Figure 3-23 that any conversions are
    occurring; even the properties do not show anything wrong. In fact, the presence
    of the residual is the only hint that something’s not right. If you compare that
    to a query where the data types do match (shown in Figure 3-24), you’ll notice
    that there’s no residual in that case.


    ***Figure 3-24.** Hash join without a residual.*


    The last cause I’ll look at is strange join predicates. By “strange,” I mean something
    like an inequality in the join predicate.


    Merge joins and hash joins are both limited to being able to use equality predicates
    only for the actual join. Anything other than an equality has to be processed
    as a residual. (Nested loop joins do not have such a limitation.) This was the
    example I used initially: a join with a between because the date in one table
    was a date with the time set to midnight, and the date in the other table had
    a date with a time other than midnight. Hence, the only way to join those was
    with a between, and that resulted in the inefficient join.


    Mismatched data types and non-equality join predicates are often indications of
    underlying database design problems—not always, but often. Fixing them can be
    difficult and time consuming. In the case of the mismatched data types, fixing
    the problem might require altering the data type of one or more columns in a database,
    or possibly even adding additional columns (usually computed columns) that convert
    the join column to the matching data type for an efficient join.


    Queries that join on inequalities are harder to fix. Although there are certainly
    legitimate reasons for such a join, they should not be common. The fixes for queries
    using inequality joins depend very much on the underlying database and how much
    (if at all) it can be modified.


