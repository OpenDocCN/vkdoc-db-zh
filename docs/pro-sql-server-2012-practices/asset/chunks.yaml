    That’s much better. The count of pages necessary for the same query with that
    index in place dropped from a total of 1,042 to 11.


    chapter 13 ■ I/O: the UntOld StOry


    If this was a frequently run query, the potential IO savings are significant,
    as well as the potential memory savings. Instead of placing 1,302 pages of the
    table into memory, this query had a read-ahead count of only 8 pages.


    To take it one step further, what if this index were compressed via row compression?
    This is a bit of a challenge because this table is relatively small and the dataset
    you are after is also small, but let’s see what happens.


    An index can be rebuilt and row compression can be added in the following manner:


    CREATE NONCLUSTERED INDEX [IX_Query1_Covering]


    ON [dbo].[FactInternetSales] ([ProductKey])


    INCLUDE ([OrderDateKey],[OrderQuantity],[UnitPrice],[SalesAmount])


    WITH (DATA_COMPRESSION = ROW, DROP_EXISTING = ON)


    GO


    When the query is re-run, the STATISTICS IO output reads as follows:


    Table ''FactInternetSales''. Scan count 1, logical reads 2, physical reads 2,
    read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead
    reads 0.


