    # 第 11 章：SQL Server 数据流动的流体动力学


    并且不需要像旧版本那样依赖虚拟局域网（VLAN）。


    *   整个 SQL Server 实例在硬件或服务故障时都能得到保护。

    *   通过使用共享存储，您可以实现快速、自动的故障转移。


    其局限性如下：


    *   多节点需要额外的硬件资源。

    *   您需要与其他团队——例如负责存储、安全和网络的团队——紧密合作，来配置和支持 Windows Server 故障转移群集。

    *   `WSFC` 仲裁的丢失可能导致一切宕机，这将需要手动干预。


    以下是在我们的四种应用场景中，故障转移群集可能的应用方式：


    ## 场景 1：全球化组织


    故障转移群集实例（`FCI`）旨在应对硬件故障恢复，因此它无法覆盖全球分散部署的场景。尽管您可以跨多个数据中心配置 `FCI`，但它仍然不提供数据冗余。能够在群集底层不同数据中心之间切换所需的数据冗余，需要由基于存储的解决方案提供。


    ## 场景 2：高吞吐量报表需求


    故障转移群集实例（`FCI`）旨在应对硬件故障恢复。它不提供数据冗余。`FCI` 可以承载一个报表数据库，但需要采用典型的方法来实现其扩展。


    ## 场景 3：夜间批处理作业


    与场景 2 类似，`FCI` 可用于批处理，但它仅是实例中的一个数据库——仅此而已。


    ## 场景 4：硬件故障


    在此场景下，可在 Windows Server 故障转移群集上安装 `SQL Server` 以提供即时故障转移。


    # 使用 SQL Server Integration Services 自定义 ETL


    `SQL Server Integration Services (SSIS)` 是 `SQL Server` 技术栈中一个极其强大的工具，在创建流程以将数据从一个源移动或复制到另一个目标时提供了极高的灵活性。


    通常被称为 *ETL 处理*（`抽取`、`转换`、`加载`），`SSIS` 最常用于加载数据仓库。通过使用自定义的控制流和数据流任务，任何数据源都可以被复制或移动到另一个位置。也可以使用业务逻辑来按需限制或转换数据。


    如果您曾经使用过 `SQL Server Management Studio` 中的 `数据导入/导出向导` 并在最后保存了包，那么您就已经创建了一个 `SSIS`
    包。用于处理 `SSIS` 的界面是 `Microsoft Visual Studio` 或 `Business Intelligence Development
    Studio (BIDS)`，它是 `Visual Studio` 的一个轻量级版本。通过使用一个可以分支出多个数据流任务的单一控制流，您可以将数据集从其原始格式和位置进行处理，将其转换为所需的形态，然后保存到一个新位置。


    其优势在于，`Integration Services` 可以：


    *   提供最高级别的定制化。

    *   根据需要融入业务逻辑。

    *   使得辅助数据库可供使用。


    其局限性如下：


    *   您必须依赖手动计划来执行。

    *   `Integration Services` 可能需要额外的开发资源进行设计、编码和测试。

    *   不包含故障排除或维护工具。


    以下是您可以将使用 `Integration Services` 开发的自定义 `ETL` 解决方案应用于我们四种场景的方式：


    ## 场景 1：全球化组织


    为全球分发创建定制的 `ETL` 可能是一个繁琐的项目。如果您的分支机构仅需要数据的副本或数据子集，复制可能是更好的选择。然而，如果您的分支机构需要基于主位置数据但不是原始数据本身的数据，那么一个
    `SSIS` 项目可能是值得的。


    ## 场景 2：高吞吐量报表需求


    根据所运行报表的类型，您可能需要在单独的数据仓库中创建聚合表。

