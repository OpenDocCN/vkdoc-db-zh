    Broker, a asynchronous addition to the database engine. Figure 5-6 shows the basic
    architecture of Service Broker. You can see the Service Broker building blocks:
    messages, services, queues and dialogs. Service Broker can send messages between
    databases and servers in transactional manner keeping the properties of ACID intact.
    The communication between two endpoints can be open or encrypted (transport security).
    Even messages themselves can be encrypted (dialog security). We’ll cover just
    the very basics of Service Broker but for deeper understanding you can read about
    it in Books Online.


    ![Image 66](index-121_1.png)


    chapter 5 ■ From SQL trace to extended eventS


    ***Figure 5-6.** SQL Server Service Broker basic architecture*'
