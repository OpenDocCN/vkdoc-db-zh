    你可能不希望每次检测到碎片时都重建每个索引。这样做会导致不必要的工作量。首先，为你的索引确定多少碎片是不可接受的。一旦你确定了不可接受的水平，决定是重组还是重建索引。你甚至可以采取分层的方法，重组碎片在
