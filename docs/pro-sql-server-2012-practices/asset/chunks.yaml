    Sessions


    Sessions are just a grouping of events, actions and targets. There are no limits
    about which of those you can and cannot mix, except the ones that are private
    to the database engine by default like objects from SecAudit package. Sessions
    are not auto-started when created and can be changed while running.


    There are quite a few configuration options that each session has. You can look
    all them up in Books Online but we’ll name 3 most interesting ones. The first
    is EVENT_RETENTION_MODE which lets us control what’s the event loss our session
    can handle. It has 3 options: ALLOW_SINGLE_EVENT_LOSS (the default setting), ALLOW_MULTIPLE_EVENT_LOSS,
    and NO_EVENT_LOSS. The names are pretty self-explanatory. But be careful if you
    set it to NO_EVENT_LOSS. For events that fire a lot, this can slow down the server
    considerably.


    The second session option is TRACK_CAUSALITY. When turned ON it adds action package0.attach_


    activity_id to every event. This action is a combination of GUID and sequence
    number. With it we can track events that happen in a batch or across multiple
    threads in the parallel query execution. This option is OFF by default.


    The third option is the MAX_DISPATCH_LATENCY which sets the number of seconds
    before the non-full session buffers are sent to the asynchronous target. The default
    is 30 seconds.


    All information about Extended events objects and running sessions can be found
