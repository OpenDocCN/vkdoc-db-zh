    你能越早参与到变更过程中，就越能更好地降低风险。这并不是说你是在所有数据库事物中的主题专家（SME）。然而，作为这个领域的专家，确实让你有能力在可能影响最终产品的决策早期就参与其中。


    正如你是数据库专家一样，也要依靠其他领域的其他主题专家，并确保你们都尽早参与到变更过程中。花必要的时间尽可能多地了解你们各自的系统，以及它们如何与数据交互，特别是与你的数据库交互。尽可能多地参与所有与数据库相关的事务，你将为成功的发布做好更充分的准备。


    你可能会对踏入这个流程阶段感到犹豫。对你、你的经理和其他人来说，这似乎不是你的职责或职位描述。只需提醒自己和他人，你有数据库经验。提醒大家你是一个可用的资源。参与进去。强迫自己进入开发过程。要温和地、尊重地去做，但必须去做。如果你能获得进入这个开发阶段的机会，你将有能力在整个开发过程直至实际发布期间影响变更。


    ## 审查变更


    至关重要的是，每一段代码在成为你永久拓扑结构的一部分之前，都应被审查，最好由多方进行。如果你确保你自己和其他具备必要技能的人对变更进行了彻底的审查，你将更好地武装自己，以降低系统风险。这需要时间。


    你必须安排这个时间。你必须留出必要的时间，让你和其他人能够适当地审查代码，权衡其变更与整个拓扑结构的关系，并相应地进行。


    即使是一个简单的变更也是一个“变更”，需要给予适当的关注。你最终创建的过程可能会有几个步骤。即使这些步骤花费的时间很少，也要确保你按各自的顺序执行它们，以降低风险。

    '
- fmt: '# CHAPTER 8 ■ RELEASE MANAGEMENT


    Don’t be afraid to reject code that you feel might negatively impact your system.
    You will be the one that gets in trouble for it, not the creator of the code.
    Be firm, but be respectful. Back up your concerns with good information and best
    practices. Share with others the the agreements you’ve reached. Let them know
    that you are simply trying to protect your system, and minimize impact for the
    entire organization.


    Involving others as you review code will be an excellent opportunity for team
    and cross-team unity.


    Do not be afraid of letting others help you out and helping others out as well.
    Peer reviews will let you get more folks involved, more eyes on the code, and
    many more chances to perfect the code and minimize risk to your system.


    ## Environments


    Take the time to detail all vital pieces of your environment that will receive
    change. This may start at the development layer, and work its way up through many
    layers of various systems that influence your release management process. As a
    way to reduce risk, take time to create various testing ground environments through
    which your code can pass, allowing for various forms of testing, as well as testing
    of the actual release plan (we will discuss release plans in a bit). Only through
    properly tested iterations, can we truly reduce risk.


    Involve your development group in your discovery and documentation of environments.
    They might already have various environments in play that allow them to test their
    changes prior to reaching any other environments. They might also have tools that
    can help with unit testing. If not, together you need to find such tools and add
    them to your arsenal. Together, you can discuss the best ways you can determine
    how to test code in these early stages of change development. You can pull out
    each new change and test it separately, but make sure you test the completed code
    as it would behave in a live, production environment.


    At a minimum implement a `development environment` and a `testing environment`
    before your actual `production environment`. Beyond the minimum, implement as
    many layers as you feel comfortable implementing without adding burden to the
    process. Ensure that each layer is understood, managed, and controlled. I would
    suggest that you do not implement an environment that will become a burden, or
    be skipped, or become out of date and cause problems with your release testing.
    Each environment needs to provide a playground for you to perform tests within,
    yet remain valid and viable.


    Ensure that no change enters the actual `production environment` without passing
    through the lower levels first. Ensure that only properly authorized individuals
    can access `production` and push out changes in a controlled manner. In fact,
    ensure that each layer of environment is secured to only those that should access
    it. By minimizing the quantity of individuals that have access to your `production`
    (and prior) environment, as well as having environments through which validations
    occur, you will more easily reach the goals we are striving for.


    Realize also that this will create tasks for other individuals in your organization
    besides yourself. You will need to take the time to get their commitment on this
    process so that it is used, and not just dreamt about. This will take time and
    force you to show that having these other environments will greatly decrease your
    risk to change.


    ![Image 101](index-212_1.png)


    ## Figure 8-2. Possible database environments


    The `development environment` may be a single environment or multiple environments.
    This area will be the playground for developers to make changes at their whim.
    You should ensure that they have sufficient quantities of data to approximate
    a `production environment`. Ensure that the `development environments` match in
    structure and objects with the `production environment`. If you have a `development
    environment` that has differences in objects, missing indexes, or only small amounts
    of data, you are setting yourself up for future problems.


    The `testing environment` can be used by development, and even the DBAs that perform
    the release, to start testing the `release plans`. This environment, like others,
    should match `production` as closely as possible. Performing `release plan` testing
    is a vital step that needs to be performed to ensure that the plan you have created
    is accurate. The environment needs to be valid enough to be a good test for the
    `release plan`.


    The `quality assurance environment` will be used primarily by the `QA` group for
    their own testing procedures. This environment also needs to match `production`
    and provide a decent playground for them to perform valid tests. You may or may
    not be involved in keeping this environment intact.


    A `customer facing environment` would be used to provide a place where folks outside
    your company can preview changes. This environment will provide you very valuable
    data about how others perceive your product. There will be many opportunities
    for information to be collected about how a small change can affect your system
    as a whole. You will need to ensure that this environment has very up-to-date
    data compared to `production`. Your external users will want this to be as close
    to `production` as possible.


    The `preproduction environment` is very similar to the `customer facing environment`,
    except that it is internally facing. This environment is the last stage before
    the change is released into the wild, into `production`. By this stage, your `release
    plan` should have been buttoned down and tested through the other environments.
    The steps to successfully perform the release will have been put to the test through
    the various environment releases. This last phase will let you test it one last
    time, and should include all pieces and parts, including replication, and so on.
    Do not skimp on this environment. Ensure it matches `production` in as many ways
    as you can implement. Having matching hardware and storage can only help you in
    the minimization of risk while testing your process and the actual release of
    the change.


    The `production environment` doesn’t need an introduction or explanation. This
    is the goal environment. All the others exist simply to allow you to prepare to
    push a change out to `production`.


    ## Release Process


    The end goal of this chapter is that you will have created a `release process`
    that encompasses the necessary tasks to accomplish our goals of release management.
    Document this process and know that it will change over time to encompass any
    future possibilities. It must be rigid and always followed as its design intended.
    This means that, at any given time, the rules that you have created for this process
    must be followed. To ensure that all involved know the process, it must be discussed
    with the proper individuals; it must be accepted and agreed upon by all involved.
    Keep in mind that this process may change over time.


    Allowing it to be malleable will help you to improve your process as time marches
    on and your needs change.


    This chapter provides many pieces and parts that you will be able to implement
    within a process. If you can automate pieces of this process, or even the entire
    process, you will greatly minimize risk.'
