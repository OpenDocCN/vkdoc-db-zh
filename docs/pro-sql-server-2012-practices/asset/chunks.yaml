    # 第 18 章 ■ 峰值负载调优


    网络 `Network Interface(*)\Bytes Total/sec` 验证网络接口是否根据网卡类型和网段速度设置为正确的速率。


    确保 `Output Queue Length` 在 24 小时内保持接近于零，因为队列表明进程正在等待网络接口。如果确实存在队列长度，请检查网络接口配置以确保其配置正确，且每秒总字节数不超过网卡总容量。一个
    1Gbps 的网卡理论上每秒可发送和接收约 120 兆字节。


    处理器 `Processor(*)\% Privileged Time`


    处理器 `Processor(*)\% Processor Time`


    处理器 `Processor(*)\% User Time`


    处理器 `System\Context Switches/sec`


    这些对象计数器衡量每个内核的利用率，可用于容量规划。这些计数器可用于确定服务器是否需要更多内核或更快的内核。如果上下文切换次数超过内核数量的约 3000 倍，则表明有大量线程被切换到其他处理器。如果每个内核的处理器队列长度大于
    2，则线程正在排队等待运行，这表明存在调度器压力。


    处理器 `System\Processor Queue Length`


    务必确定服务器是否开启了超线程，这是在评估上述数值时的重要考量因素。


    SQL Server `SQLServer:Access Methods\Full Scans/sec`


    应用程序中发生了多少次全表扫描与索引搜索？这些数据可以揭示索引策略的稳固程度。尽量减少页拆分，因为其活动成本高昂，并会导致更高程度的碎片化。理想情况下，页拆分应少于每秒批处理请求数的
    20%。


    SQL Server `SQLServer:Access Methods\Index Searches/sec`


    SQL Server `SQLServer:Access Methods\Page Splits/sec`


    SQL Server `SQLServer:Buffer Manager\Buffer cache hit ratio`


    缓冲区缓存命中率在大部分时间应达到 99%或更高。额外的缓冲区管理器对象计数器提供了关于缓冲区健康状况的其他指标。页生命周期（PLE）反映了数据页在内存中平均存活的秒数。这个计数器的难点在于，关于
    300 和 600 是阈值（表明 SQL 数据缓存不健康）的误解很多。在评估 PLE 时，请考虑其他对象计数器，因为它们将帮助您判断 PLE 是过低还是过高。这实际上取决于您的应用程序、数据大小、系统配置以及服务器规模。请注意，如果您的系统启用了非统一内存访问（NUMA），请检查内存节点对象计数器，因为它们是特定于
    NUMA 节点的。


    SQL Server `SQLServer:Buffer Manager\Checkpoint pages/sec`


    SQL Server `SQLServer:Buffer Manager\Free list stalls/sec`


    SQL Server `SQLServer:Buffer Manager\Lazy writes/sec`


    SQL Server `SQLServer:Buffer Manager\Page life expectancy`


