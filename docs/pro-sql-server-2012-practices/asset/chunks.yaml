    ```sql

    [contact],


    [remarks],


    [creator],


    [databaselevel],


    [backuplevel] )


    VALUES


    ( @databasename,


    @application,


    @contact,


    @remarks,


    ORIGINAL_LOGIN(),


    @databaselevel,


    @backuplevel )


    PRINT ''Connection String : '' +


    ''Data Source='' + @@SERVERNAME +


    '';Initial Catalog='' + @databasename +


    '';User Id=''+


    '';Password=''+


    '';Application Name='' + @application


    END

    ```


    这个简单的例子可以轻松扩展，以包括创建标准用户、默认权限分配等。作为一个额外的奖励，我将连接字符串返回给了刚刚创建的数据库。


    这有助于开发人员使用真正的驱动程序，也有助于确保他们包含应用程序名称，因为在所有用户名都是“Joe”、应用程序是“Microsoft .Net Provider”的
    SQL Server 实例上进行诊断，没有什么比这更糟糕的了。


    如你所见，`EXECUTE AS` 提供了很多选项来创建存储过程，允许你的开发人员执行特权代码，而无需直接将权限授予开发人员。


    ## 步骤 5：创建良好的报告


    那么我所说的“良好报告”是什么意思呢？它指的是从运行系统中提取信息的选项，这些信息可以告诉你 SQL Server 当前的运行状况。与系统管理部分一样，只有你的想象力会限制你。你可以从使用
    SQL Server 自带的工具开始，例如 `Data Collector`（数据收集器）、`dynamic management views`（动态管理视图）和
    `Reporting Services`（报表服务）。通过 `Data Collector`，你有机会收集 SQL Server 随时间发生的情况的信息，然后使用
    `Reporting Services` 以易于理解和阅读的格式呈现这些数据。


    要兼顾全局和局部思考。


    ### 第 1 章 ■ 成为你开发人员最好的朋友


    通过创建一个显示服务器整体性能的概览来进行全局思考。例如，消耗资源最多的 35 个查询是什么？按三个不同类别列出它们：执行次数最多、I/O 最多和 CPU
    使用率最高。将这些信息与重要事件列表以及磁盘使用趋势结合起来。


    但也要通过为单个数据库创建相同类型的概览来进行局部思考，而不是针对整个服务器。这样，开发人员和应用程序所有者就可以轻松发现其代码中的资源瓶颈并做出反应。这样的报告也为开发人员提供了一种无需
    DBA 介入即可持续改进其查询的简便方法，这意味着减少了你的工作量。


    除了包含性能信息之外，你还可以轻松地包含来自日志表的信息，以便报告不同的数据库创建和更新情况。


    最后，请注意明确定义谁处理异常以及如何处理。确保当出现问题时，没有人对该做什么有疑问，并且每个人都知道，如果你的代码或应用程序无法支持你的框架，由谁来决定该怎么做。


    ## 确保版本兼容性


    如果你选择整合到 SQL Server 2012，你无疑会发现你的某个关键应用程序要求供应商支持 SQL Server 2008。或者你可能发现应用程序用户需要
    `sysadmin` 权限，这使得该数据库无法在你现有的任何实例上运行。


    你可能需要为关键应用程序破例。试着尽早识别并列出这些可能的例外情况，并尽快处理它们。大多数应用程序将能够在 SQL Server 2012 上运行，但不可避免地会有一些应用程序，其供应商已不复存在，代码是用
    Visual Basic 3 编写的，无法直接迁移到 Visual Basic 2010，或者源代码已丢失，编写应用程序的人员已不在公司。这些都是你必须谨慎处理的潜在例外。


    处理这些例外的一种方法是创建一个安装了所需旧版 SQL Server 的环境，并且安装在正确的操作系统版本上。创建这样的环境，但不要将其记录对外公开。为什么不呢？因为那样每个人都会突然有例外，并期望得到同样的优待。支持例外，但只作为最后的手段。始终尝试修复那些明显的不兼容性。


    只有在尝试并拒绝了所有其他选项后，才应允许例外。不应允许供应商仅仅说“我们不支持那个”，而不提供实际的技术论据来说明原因。记住你是客户。你为他们的软件付费，而不是相反。


    当 64 位 Windows 刚出现时，许多应用程序供应商的安装程序设计得不够好，无法安装到 64 位环境中。有时他们只是简单地增加了一个版本预检，没有考虑到
    64 位安装的可能性。当应用程序的 64 位兼容版本最终出现时，结果发现只有安装程序被更改了，而不是应用程序本身。我特别记得一个存储供应商花了一年多的时间才修复了这个问题，因此该供应商在我们的环境中是一个例外。不过，一旦你创建了一个例外，就要让供应商为该例外签署一个结束日期。重新审视旧需求总是一个好的做法，因为大多数需求会随时间而变化。如果你没有一个结束日期，系统往往会被遗忘，或者其他事情变得更加重要，于是例外就永远存在。


    最后请记住，当那些应用程序原本需要某个早期版本时，你可以使用兼容性模式使应用程序能够在 SQL Server 2012 上运行。不再支持与 SQL Server
    2000 的兼容，但支持与 2005 和 2008 版本的兼容。


    ### 第 1 章 ■ 成为你开发人员最好的朋友


    > **`提示`** 使用兼容性模式而不是实际在旧版本上安装实例的一个非常好的理由是，兼容性模式仍然提供对较新管理功能的访问，例如备份压缩。例如，在 SQL
    Server 2008 中使用 SQL Server 2000 兼容性模式让我可以选择对一些非常大的表进行分区，尽管分区在 2000 版本中并不受支持。在向
    Microsoft 核实时，我被告知，如果该功能有效，它就是受支持的。


    ## 设定限制


    然而，并非一切都好。你仍然需要设定限制并保护数据。


    我相信你经历过登录名被滥用的情况。有时，开发人员恰好知道用户名和密码，并将其插入应用程序中。这种做法会导致你不知道谁有权访问数据，并且你可能会发现你无法可靠地知道哪些应用程序访问了哪些数据库。后一个问题在密码被更改或数据库被移动时可能导致生产中断，应用程序突然停止工作。


    我有酒店环境的背景，在同一实例中支持多个数据库，每个数据库由不同的部门或客户拥有。（在整合环境中也可以达到同样的效果。）SQL Server 缺少这样的功能：可以说客户
    A 不允许访问客户 B 的数据。你可以说创建不同的数据库用户可以解决问题，但我们都知道用户名和密码有在其所属领域之外被知晓的倾向。因此，在某个时候，客户 A
    将获得客户 B 的用户名和密码，并能够从客户 A 的位置查看客户 B 的数据。或者如果不是外部客户，也许是内部客户或部门最终会意外地访问彼此的数据。

