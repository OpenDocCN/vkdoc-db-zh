    | 排序 | ![Image 147](img/index-312_4.png) |

    | 表假脱机 | ![Image 148](img/index-312_5.png) |

    | 筛选 | ![Image 149](img/index-312_6.png) |


    与 SSMS 类似，你可以在 SDMP 中放大和缩小执行计划，也可以查看批处理执行计划。SDMP 还为你提供快速搜索选项和不同视图，而无需重新执行 T-SQL
    语句。例如，你可以通过单击 CPU 图标来搜索开销大的操作，它会自动找到批处理中最耗费 CPU 的操作并突出显示它们，如图 12-5 所示。


    ![Image 150](img/index-313_1.png)


    **图 12-5.** SDMP 中按 CPU 开销排序的执行计划


    ### 性能仪表板

    SQL Database 管理门户还提供了一个方便的性能仪表板，在辅助屏幕中显示当前活动和详细的性能信息。当你首次登录门户时，会看到你所登录数据库的摘要。要查看性能仪表板摘要，请单击屏幕顶部的“查询性能”。你将看到类似于图
    12-6 的屏幕。此屏幕向你显示带有性能指标的查询列表，包括每秒资源消耗。例如，语句 `SELECT * FROM EnzoUsers` 每秒消耗 2 次物理读取，平均持续时间为每秒
    11 毫秒 (ms)。这些指标是通过使用 `sys.dm_exec_query_stats` 表获得的，并提供了每秒的平均消耗率，显示在屏幕上。虽然这听起来可能有点复杂，但此屏幕旨在按降序列出在任何时间点最活跃且消耗资源最多的语句。


    ![Image 151](img/index-314_1.png)

    ![Image 152](img/index-314_2.png)


    **图 12-6.** 查询性能摘要仪表板。


    单击特定查询将打开另一个屏幕，如图 12-7 所示，该屏幕提供执行详细信息，包括 `sys.dm_exec_query_stats` 提供的大部分统计信息。此屏幕显示资源消耗和查询计划信息，例如查询计划缓存的时间、计划句柄等。如果你单击“查询计划”，还可以从此屏幕直接查看执行计划。


    ![Image 153](img/index-315_1.png)


    **图 12-7.** 查询性能详细视图。


    ## 相关服务

    Windows Azure SQL Database 附带一些相关服务，包括 Windows Azure SQL Reporting、Windows Azure
    SQL Data Sync 以及导出/导入功能。如前所述，Windows Azure SQL Reporting 有自己的管理门户，而其他功能可通过 Windows
    Azure 管理门户访问。


    ### Windows Azure SQL Reporting

    Windows Azure 包含一项云服务，可用于以最小的工作量部署报表，并允许通过向用户提供报表的 URL，从传统的 Windows 应用程序、Web 应用程序或直接从浏览器运行这些报表。


    使用 Windows Azure SQL Reporting（或 SQL Reporting）比在本地 Reporting Service 环境中工作简单得多，因为除了用户和应用程序访问控制外，无需担心配置设置。与云中提供的任何其他服务一样，SQL
    Reporting 旨在按需扩展，并自动处理提供高度可扩展服务所需的后端配置设置。


    SQL Reporting 目前是一项完全受支持的服务；但是，你应该了解一些限制。首先，SQL Reporting 只能连接到 SQL Database 实例。这意味着在撰写本文时，你不能将
    SQL Reporting 与内部数据源或其他云数据源（例如 Azure 表）一起使用。另一个重要限制与用户管理相关；你需要在专门为 SQL 创建的管理门户中单独创建和管理每个用户

