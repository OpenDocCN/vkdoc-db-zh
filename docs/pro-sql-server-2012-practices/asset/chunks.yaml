- fmt: '# Chapter 9: Compliance and Auditing


    ## Auditing


    SQL Server 2012 now allows for events to be filtered *before* they are written
    to the audit log. This allows database professionals to have more granular control
    over what events are audited. Examples of using Audit Filtering will be covered
    later in this chapter.


    SQL Server Auditing is made up of three components: a server audit, server audit
    specification, and database audit specification. A server audit and an audit specification
    (either for the server or the database) are required to actually audit any events.
    The following sections will cover how to create these through both SQL Server
    Management Studio and T-SQL.


    ### Note

    Some examples in this chapter will use the AdventureWorks 2012 sample databases.
    The databases can be found on CodePlex: [http://msftdbprodsamples.codeplex.com/releases/view/55330.](http://msftdbprodsamples.codeplex.com/releases/view/55330)


    ## Server Audit


    The server audit defines where audit data is stored. Server audit information
    can be stored in a binary log file, the Windows Application log, or the Windows
    Security log. The Server audit is specific to a single instance of SQL Server
    but more than one Server Audit can exist per instance. This allows for different
    audit information to be stored in different locations.


    Some organizations require a separation of duties between auditors and database
    professionals. The ability to create multiple server audits satisfies the separation
    of duties and allows for both parties to conduct audits. The danger with this
    separation of duties is when the `ON_FAILURE` option is set to shut down the server
    if it cannot write to the audit file location. If the database professional cannot
    access or monitor the file location, and it runs out of space or goes offline,
    the server will shut down unexpectedly.


    The server audit can be created using T-SQL or SQL Server Management Studio. Running
    the following code will create a server audit that outputs data to a binary file
    located in the `C:\AuditLogs\` folder. This binary file can be located on a local
    drive, on attached storage, or at a network location. The file should be located
    on a drive that will not create disk contention with SQL Server data or log files.


    ```sql

    -- Create a server audit called Corp_Audit in the folder C:\AuditLogs\.

    CREATE SERVER AUDIT Corp_Audit

    TO FILE (FILEPATH = ''C:\AuditLogs\'', MAXSIZE = 500MB, MAX_ROLLOVER_FILES = 10)

    WITH (QUEUE_DELAY = 0, ON_FAILURE = SHUTDOWN)

    ```


    The `QUEUE_DELAY` option defines the time delay that can occur between the action
    being audited and failure to write to the audit log.


    By default, the server audit is disabled. To enable it, run the following T-SQL
    statement:


    ```sql

    -- Enable the Server Audit

    ALTER SERVER AUDIT Corp_Audit

    WITH (STATE = ON)

    GO

    ```


    To create the server audit in Management Studio, expand the **Security**, **Audits**
    folder and right-click the **Audits** folder. Select the **New Audit** option
    to open the **Create Audit** dialog box, which is shown in Figure 9-1.


    ![Image 106](index-234_1.png)


    ### Figure 9-1

    The Create Audit dialog box showing the creation of the server audit with a queue
    delay set to 0, shutdown on audit log failure, with an audit destination of a
    file specified, and a maximum number of rollover files defined, and a file size
    of 500 MB specified.


    Just like the T-SQL code, the server audit created through SQL Server Management
    Studio is disabled by default after it is created. To enable the server audit,
    right-click on the newly created audit and select **Enable Audit** from the menu.
    Once the server audit is created, SQL Server is ready to begin auditing, but nothing
    will be captured until a server audit specification or database audit specification
    has been defined. How to set up server audit specifications and database audit
    specifications will be covered in the following sections.


    ## Server Audit Specification


    The server audit specification defines server-level events to be audited. These
    events include backups, restores, failed logins, and more.


    ### Note

    A full list of the SQL Server Audit action groups and actions can be found here:
    [http://msdn.microsoft.com/en-us/library/cc280663.aspx.](http://msdn.microsoft.com/en-us/library/cc280663.aspx)


    The server audit specification can be created using T-SQL or SQL Server Management
    Studio. The following code will create the server audit specification `Corp_Server_Audit_Spec`
    for the server audit `Corp_Audit` created in the previous section. This audit
    will capture the server-level audit groups `BACKUP_RESTORE_GROUP`, `DATABASE_OBJECT_CHANGE_GROUP`,
    `DATABASE_PRINCIPAL_CHANGE_GROUP`, `DATABASE_ROLE_MEMBER_CHANGE_GROUP`, and `FAILED_LOGIN_GROUP`.
    Unlike the server audit, the server audit specification can be created and enabled
    in the same transaction through the `STATE` option.


    ```sql

    -- Create and enable the Server Audit Specification

    CREATE SERVER AUDIT SPECIFICATION Corp_Server_Audit_Spec

    FOR SERVER AUDIT Corp_Audit

    ADD (BACKUP_RESTORE_GROUP),

    ADD (DATABASE_OBJECT_CHANGE_GROUP),

    ADD (DATABASE_PRINCIPAL_CHANGE_GROUP),

    ADD (DATABASE_ROLE_MEMBER_CHANGE_GROUP),

    ADD (FAILED_LOGIN_GROUP)

    WITH (STATE = ON)

    GO

    ```


    To create the server audit specifications in Management Studio, right-click on
    the **Security**, **Server Audit Specifications** folder and select the **New
    Server Audit Specifications** menu option. The **Create Server Audit Specification**
    dialog box will be opened, as shown in Figure 9-2.


    ![Image 107](index-236_1.png)


    ### Figure 9-2

    The Create Server Audit Specification dialog box, showing a server audit specification
    created based on the `Corp_Audit` and defining the audit action types.


    If the server audit specification is created through T-SQL, it can be enabled
    at the same time it is created. If the server audit specification is created through
    SQL Server Management Studio, an additional step is needed to enable it. Select
    the newly created server audit specification, right-click and select **Enable
    Server Audit Specification**. The server audit specification can be enabled with
    the following T-SQL code:


    ```sql

    -- Enable Corp_Server_Audit_Spec

    ALTER SERVER AUDIT SPECIFICATION Corp_Server_Audit_Spec

    WITH (STATE = ON)

    GO

    ```


    ## Database Audit Specification


    Database audit specification captures database-level events on individual database
    objects. Database-level events include `SELECT`, `UPDATE`, `INSERT`, and `DELETE`
    on a table. A database audit specification needs to be created for each database
    that is to be audited.


    The database audit specification can be created through T-SQL or SQL Server Management
    Studio.


    The code in the following example will create a database audit specification on
    the `AdventureWorks2012` database. This database audit specification will audit
    any `SELECT`, `UPDATE`, `INSERT`, or `DELETE` events on the `HumanResources.EmployeePayHistory`
    table by user `dbo`. The database audit specification can be created and enabled
    at the same time through the `STATE` option.


    ```sql

    -- Create and enable the Database Audit Specification

    USE AdventureWorks2012

    GO

    CREATE DATABASE AUDIT SPECIFICATION Corp_AdventureWorks2012_Database_Audit_Spec

    FOR SERVER AUDIT Corp_Audit

    ADD (SELECT, UPDATE, INSERT, DELETE ON HumanResources.EmployeePayHistory BY dbo)

    WITH (STATE = ON)

    GO

    ```


    Database audit specifications are unique to each database, so they will need to
    be added to the **Security**, **Database Audit Specification** folder of each
    database in Management Studio. Right-clicking on the **Database Audit Specification**
    folder and selecting **New Database Audit Specification** will open the **Create
    Database Audit Specification** dialog box seen in Figure 9-3.


    ### Figure 9-3

    The Database Audit Specification dialog box shows the definition based on the
    `Corp_Audit` and defines the audit action types.'
  raw: 'SQL Server 2012 now allows for events to be filtered *before* they are written
    to the audit log. This allows database professionals to have more granular control
    over what events are audited. Examples of using Audit Filtering will be covered
    later in this chapter.


    chapter 9 ■ compliance and auditing


    Auditing


    SQL Server Auditing is made up of three components: a server audit, server audit
    specification, and database audit specification. A server audit and an audit specification
    (either for the server or the database) are required to actually audit any events.
    The following sections will cover how to create these through both SQL Server
    Management Studio and T-SQL.


    n **Note** Some examples in this chapter will use the AdventureWorks 2012 sample
    databases. The databases can be found on CodePlex: [http://msftdbprodsamples.codeplex.com/releases/view/55330.](http://msftdbprodsamples.codeplex.com/releases/view/55330)


    Server Audit


    The server audit defines where audit data is stored. Server audit information
    can be stored in a binary log file, the Windows Application log, or the Windows
    Security log. The Server audit is specific to a single instance of SQL Server
    but more than one Server Audit can exist per instance. This allows for different
    audit information to be stored in different locations.


    Some organizations require a separation of duties between auditors and database
    professionals. The ability to create multiple server audits satisfies the separation
    of duties and allows for both parties to conduct audits. The danger with this
    separation of duties is when the ON_FAILURE option is set to shut down the server
    if it cannot write to the audit file location. If the database professional cannot
    access or monitor the file location, and it runs out of space or goes offline,
    the server will shut down unexpectedly.


    The server audit can be created using T-SQL or SQL Server Management Studio. Running
    the following code will create a server audit that outputs data to a binary file
    located in the C:\AuditLogs\ folder. This binary file can be located on a local
    drive, on attached storage, or at a network location. The file should be located
    on a drive that will not create disk contention with SQL Server data or log files.


    --Create a server audit called Corp_Audit in the folder C:\AuditLogs\.


    CREATE SERVER AUDIT Corp_Audit


    TO FILE (FILEPATH = ''C:\AuditLogs\'', MAXSIZE = 500MB, MAX_ROLLOVER_FILES = 10)


    WITH (QUEUE_DELAY = 0, ON_FAILURE = SHUTDOWN)


    The QUEUE_DELAY option defines the time delay that can occur between the action
    being audited and failure to write to the audit log


    By default, the server audit is disabled. To enable it, run the following T-SQL
    statement:


    --Enable the Server Audit


    ALTER SERVER AUDIT Corp_Audit


    WITH (STATE = ON)


    GO


    To create the server audit in Management Studio, expand the Security, Audits folder
    and right-click the Audits folder. Select the New Audit option to open the Create
    Audit dialog box, which is shown in Figure 9-1.


    j


    ![Image 106](index-234_1.png)


    chapter 9 ■ compliance and auditing


    ***Figure 9-1.** The Create Audit dialog box showing the creation of the server
    audit with a queue delay set to 0,* *shutdown on audit log failure, with anan
    audit destination of a file specified, and a maximum number of* *rollover files
    defined, and a file size of 500 MB specified.*


    Just like the T-SQL code, the server audit created through SQL Server Management
    Studio is disabled by default after it is created. To enable the server audit,
    right-click on the newly created audit and select Enable Audit from the menu.
    Once the server audit is created, SQL Server is ready to begin auditing, but nothing
    will be captured until a server audit specification or database audit specification
    has been defined. How to set up server audit specifications and database audit
    specifications will be covered in the following sections.


    chapter 9 ■ compliance and auditing


    Server Audit Specification


    The server audit specification defines server-level events to be audited. These
    events include backups, restores, failed logins, and more.


    n **Note** A full list of the SQL Server Audit action groups and actions can be
    found here: http://msdn.


    microsoft.com/en-us/library/cc280663.aspx.


    The server audit specification can be created using T-SQL or SQL Server Management
    Studio. The following code will create the server audit specification Corp_Server_Audit_Spec
    for the server audit Corp_


    Audit created in the previous section. This audit will capture the server-level
    audit groups BACKUP_RESTORE_


    GROUP, DATABASE_OBJECT_CHANGE_GROUP, DATABASE_PRINCIPAL_CHANGE_GROUP, DATABASE_ROLE_MEMBER_CHANGE_


    GROUP, and FAILED_LOGIN_GROUP. Unlike the server audit, the server audit specification
    can be created and enabled in the same transaction through the STATE option.


    --Create and enable the Server Audit Specification


    CREATE SERVER AUDIT SPECIFICATION Corp_Server_Audit_Spec


    FOR SERVER AUDIT Corp_Audit


    ADD (BACKUP_RESTORE_GROUP),


    ADD (DATABASE_OBJECT_CHANGE_GROUP),


    ADD (DATABASE_PRINCIPAL_CHANGE_GROUP),


    ADD (DATABASE_ROLE_MEMBER_CHANGE_GROUP),


    ADD (FAILED_LOGIN_GROUP)


    WITH (STATE = ON)


    GO


    To create the server audit specifications in Management Studio, right-click on
    the Security, Server Audit Specifications folder and select the New Server Audit
    Specifications menu option. The Create Server Audit Specification dialog box will
    be opened, as shown in Figure 9-2.


    ![Image 107](index-236_1.png)


    chapter 9 ■ compliance and auditing


    ***Figure 9-2.** The Create Server Audit Specification dialog box, showing a server
    audit specification created* *based on the Corp_Audit and defining the audit action
    types.*


    If the server audit specification is created through T-SQL, it can be enabled
    at the same time it is created. If the server audit specification is created through
    SQL Server Management Studio, an additional step is needed to enable it. Select
    the newly created server audit specification, right-click and select Enable Server
    Audit Specification. The server audit specification can be enabled with the following
    T-SQL code:


    --Enable Corp_Server_Audit_Spec


    ALTER SERVER AUDIT SPECIFICATION Corp_Server_Audit_Spec


    WITH (STATE = ON)


    GO


    ![Image 108](index-237_1.png)


    chapter 9 ■ compliance and auditing


    Database Audit Specification


    Database audit specification captures database-level events on individual database
    objects. Databaselevel events include SELECT, UPDATE, INSERT, and DELETE on a
    table. A database audit specification needs to be created for each database that
    is to be audited.


    The database audit specification can be created through T-SQL or SQL Server Management
    Studio.


    The code in the following example will create a database audit specification on
    the AdventureWorks2012


    database. This database audit specification will audit any SELECT, UPDATE, INSERT,
    or DELETE events on the HumanResources.EmployeePayHistory table by user dbo. The
    database audit specification can be created and enabled at the same time through
    the STATE option.


    --Create and enable the Database Audit Specification


    USE AdventureWorks2012


    GO


    CREATE DATABASE AUDIT SPECIFICATION Corp_AdventureWorks2012_Database_Audit_Spec


    FOR SERVER AUDIT Corp_Audit


    ADD (SELECT, UPDATE, INSERT, DELETE ON HumanResources.EmployeePayHistory BY dbo)


    WITH (STATE = ON)


    Database audit specifications are unique to each database, so they will need to
    be added to the Security, Database Audit Specification folder of each database
    in Management Studio. Right-clicking on the Database Audit Specification folder
    and selecting New Database Audit Specification will open the Create Database Audit
    Specification dialog box seen in Figure 9-3.


    ***Figure 9-3.** The Database Audit Specification dialog box shows the definition
    based on the Corp_Audit and* *defines the audit action types.*


    chapter 9 ■ compliance and auditing'
