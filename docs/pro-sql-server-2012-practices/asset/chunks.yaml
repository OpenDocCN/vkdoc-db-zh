    \ I/O 争用问题。从这里开始，你可以选择调整特定的查询，或者从更宏观的角度审视系统表，探究哪些索引可能是导致 I/O 问题的原因。\n\n以下查询提供了索引的使用统计信息：\n\
    \n```sql\nSELECT\n    a.name as Object_Name,\n    b.name as Index_name,\n    b.Type_Desc,\n\
