    # 第 9 章：合规性与审计


    ## 审核


    SQL Server 2012 现在允许在事件写入审核日志*之前*对其进行筛选。这使得数据库专业人员能够对审核的事件进行更精细的控制。本章稍后将介绍使用审核筛选的示例。


    SQL Server 审核由三个组件组成：服务器审核、服务器审核规范和数据库审核规范。要实际审核任何事件，需要服务器审核和审核规范（服务器或数据库的）。接下来的章节将介绍如何通过
    SQL Server Management Studio 和 T-SQL 创建这些组件。


    ### 注意

    本章中的一些示例将使用 AdventureWorks 2012 示例数据库。这些数据库可以在 CodePlex 上找到：[`msftdbprodsamples.codeplex.com/releases/view/55330.`](http://msftdbprodsamples.codeplex.com/releases/view/55330)


    ## 服务器审核


    服务器审核定义了审核数据的存储位置。服务器审核信息可以存储在二进制日志文件、Windows 应用程序日志或 Windows 安全日志中。服务器审核特定于 SQL
    Server 的单个实例，但每个实例可以存在多个服务器审核。这允许将不同的审核信息存储在不同的位置。


    一些组织要求审计员和数据库专业人员之间职责分离。创建多个服务器审核的能力满足了职责分离的要求，并允许双方进行审核。这种职责分离的危险之处在于，如果无法写入审核文件位置，`ON_FAILURE`
    选项被设置为关闭服务器。如果数据库专业人员无法访问或监视文件位置，并且该位置空间不足或脱机，服务器将意外关闭。


    可以使用 T-SQL 或 SQL Server Management Studio 创建服务器审核。运行以下代码将创建一个服务器审核，将数据输出到位于 `C:\AuditLogs\`
    文件夹中的二进制文件。此二进制文件可以位于本地驱动器、附加存储或网络位置。该文件应位于不会与 SQL Server 数据或日志文件产生磁盘争用的驱动器上。


    ```sql

    -- 在文件夹 C:\AuditLogs\ 中创建一个名为 Corp_Audit 的服务器审核。

    CREATE SERVER AUDIT Corp_Audit

    TO FILE (FILEPATH = ''C:\AuditLogs\'', MAXSIZE = 500MB, MAX_ROLLOVER_FILES = 10)

    WITH (QUEUE_DELAY = 0, ON_FAILURE = SHUTDOWN)

    ```


    `QUEUE_DELAY` 选项定义了被审核的操作与写入审核日志失败之间可能发生的延迟时间。


    默认情况下，服务器审核是禁用的。要启用它，请运行以下 T-SQL 语句：


    ```sql

    -- 启用服务器审核

    ALTER SERVER AUDIT Corp_Audit

    WITH (STATE = ON)

    GO

    ```


    要在 Management Studio 中创建服务器审核，请展开“安全”、“审计”文件夹，并右键单击“审计”文件夹。选择“新建审计”选项以打开“创建审核”对话框，如图
    9-1 所示。


    ![Image 106](img/index-234_1.png)


    ### 图 9-1

    “创建审核”对话框，显示正在创建的服务器审核，其队列延迟设置为 0，在审核日志失败时关闭，审核目标指定为文件，定义了最大滚动文件数，并指定了 500 MB
    的文件大小。


    与 T-SQL 代码一样，通过 SQL Server Management Studio 创建的服务器审核在创建后默认是禁用的。要启用服务器审核，请右键单击新创建的审核，然后从菜单中选择“启用审核”。服务器审核创建后，SQL
    Server 就可以开始审核，但在定义服务器审核规范或数据库审核规范之前，不会捕获任何内容。如何设置服务器审核规范和数据库审核规范将在以下部分介绍。


    ## 服务器审核规范


    服务器审核规范定义了要审核的服务器级别事件。这些事件包括备份、还原、失败的登录等。


    ### 注意

    SQL Server 审核操作组和操作的完整列表可以在这里找到：[`msdn.microsoft.com/en-us/library/cc280663.aspx.`](http://msdn.microsoft.com/en-us/library/cc280663.aspx)


    服务器审核规范可以使用 T-SQL 或 SQL Server Management Studio 创建。以下代码将为上一节创建的服务器审核 `Corp_Audit`
    创建服务器审核规范 `Corp_Server_Audit_Spec`。此审核将捕获服务器级别审核组 `BACKUP_RESTORE_GROUP`、`DATABASE_OBJECT_CHANGE_GROUP`、`DATABASE_PRINCIPAL_CHANGE_GROUP`、`DATABASE_ROLE_MEMBER_CHANGE_GROUP`
    和 `FAILED_LOGIN_GROUP`。与服务器审核不同，服务器审核规范可以通过 `STATE` 选项在同一个事务中创建和启用。


    ```sql

    -- 创建并启用服务器审核规范

    CREATE SERVER AUDIT SPECIFICATION Corp_Server_Audit_Spec

    FOR SERVER AUDIT Corp_Audit

    ADD (BACKUP_RESTORE_GROUP),

    ADD (DATABASE_OBJECT_CHANGE_GROUP),

    ADD (DATABASE_PRINCIPAL_CHANGE_GROUP),

    ADD (DATABASE_ROLE_MEMBER_CHANGE_GROUP),

    ADD (FAILED_LOGIN_GROUP)

    WITH (STATE = ON)

    GO

    ```


    要在 Management Studio 中创建服务器审核规范，请右键单击“安全”、“服务器审核规范”文件夹，然后选择“新建服务器审核规范”菜单选项。将打开“创建服务器审核规范”对话框，如图
    9-2 所示。


    ![Image 107](img/index-236_1.png)


    ### 图 9-2

    “创建服务器审核规范”对话框，显示基于 `Corp_Audit` 创建的服务器审核规范，并定义了审核操作类型。


    如果通过 T-SQL 创建服务器审核规范，它可以在创建时同时启用。如果通过 SQL Server Management Studio 创建服务器审核规范，则需要额外的步骤来启用它。选择新创建的服务器审核规范，右键单击并选择“启用服务器审核规范”。可以使用以下
    T-SQL 代码启用服务器审核规范：


    ```sql

    -- 启用 Corp_Server_Audit_Spec

    ALTER SERVER AUDIT SPECIFICATION Corp_Server_Audit_Spec

    WITH (STATE = ON)

    GO

    ```


    ## 数据库审核规范


    数据库审核规范捕获单个数据库对象上的数据库级别事件。数据库级别事件包括对表的 `SELECT`、`UPDATE`、`INSERT` 和 `DELETE`。需要为要审核的每个数据库创建一个数据库审核规范。


    数据库审核规范可以通过 T-SQL 或 SQL Server Management Studio 创建。


    以下示例中的代码将在 `AdventureWorks2012` 数据库上创建一个数据库审核规范。此数据库审核规范将审核用户 `dbo` 对 `HumanResources.EmployeePayHistory`
    表进行的任何 `SELECT`、`UPDATE`、`INSERT` 或 `DELETE` 事件。数据库审核规范可以通过 `STATE` 选项同时创建和启用。


    ```sql

    -- 创建并启用数据库审核规范

    USE AdventureWorks2012

    GO

    CREATE DATABASE AUDIT SPECIFICATION Corp_AdventureWorks2012_Database_Audit_Spec

    FOR SERVER AUDIT Corp_Audit

    ADD (SELECT, UPDATE, INSERT, DELETE ON HumanResources.EmployeePayHistory BY dbo)

    WITH (STATE = ON)

    GO

    ```


    数据库审核规范对于每个数据库是唯一的，因此需要将它们添加到 Management Studio 中每个数据库的“安全”、“数据库审核规范”文件夹中。右键单击“数据库审核规范”文件夹并选择“新建数据库审核规范”将打开图
    9-3 中所示的“创建数据库审核规范”对话框。


    ### 图 9-3

    “数据库审核规范”对话框显示了基于 `Corp_Audit` 的定义，并定义了审核操作类型。

    '
- fmt: "# SQL Server 审计配置与日志查询\n\nThe T-SQL command can enable the database audit\
    \ specification in a single command, but this cannot be done through Management\
    \ Studio. To enable it, right-click and select **Enable Database Audit Specification**.\n\
    \n## 查询审计文件\n\nIf the server information is logged to a binary audit file, you\
    \ can review this information in two ways: querying the file through SQL Server\
    \ or viewing the Audit Log via SQL Server Management Studio. The binary audit\
    \ file cannot be viewed as a plain text file. The `fn_get_audit_file` function\
    \ is used to query the audit file. The following T-SQL code will return all the\
    \ information that has been audited:\n\n```sql\n--Query the audit file\nSELECT\
    \ *\nFROM sys.fn_get_audit_file('C:\\AuditLogs\\Corp_Audit_*.sqlaudit',DEFAULT,DEFAULT\
    \ )\nGO\n```\n\nIndividual audit files can be queried, but if multiple files have\
    \ been created, a wildcard in the file path is supported to return results across\
    \ multiple audit files.\n\nTo view the audit log from SQL Server Management Studio,\
    \ right-click on the audit and select **View Audit Logs** from the menu. This\
    \ will open the SQL Server Log File Viewer. From this window, the audit log can\
    \ be filtered or exported.\n\nIf audit events are logged to the Security log or\
    \ the Windows Event log, they can be viewed through the respective logs or through\
    \ the SQL Log File Viewer. Each event that is logged will be an information-level\
    \ event and have a source of `MSSQLSERVER`. The SQL Log File Viewer can be found\
    \ under the Management, SQL Server Logs folder. The SQL Log File Viewer will display\
    \ SQL Server logs by default, but selecting the Application log will show the\
    \ Windows Application log as well.\n\nThe SQL Log File Viewer, shown in `Figure\
    \ 9-4`, can be filtered for the date, the source, event information, and more.\
    \ The filter can be configured by clicking the **Filter** button on the SQL Log\
    \ File Viewer screen. The SQL Log File Viewer can also export the log file for\
    \ an auditor to review.\n\n![Image 109](index-239_1.png)\n\n`Figure 9-4.` The\
    \ Log Viewer can be filtered to show just audit events in the Windows Application\
    \ log\n\nThe Windows Event logs can also be accessed through **Start, All Programs,\
    \ Administrative Tools, Event Viewer**.\n\n## 专业提示：针对审计事件设置警报\n\nAuditing is not\
    \ designed to send an alert or notify anyone if an audit event occurs. Although\
    \ SQL Server is not designed to send these alerts, there is a solution that will\
    \ allow this to happen. The caveats to this solution are that audits must be sent\
    \ to the Windows logs and it leverages SQL Server alerts.\n\nDuring normal operation,\
    \ SQL Server generates events and writes them to the Windows Application log.\
    \ The SQL Server Agent is continuously reading the Application log and can trigger\
    \ an alert based on an event. If an audit is configured to write audit events\
    \ to the Windows Application log, an alert can be configured to notify an administrator\
    \ or auditor of the event.\n\n> **Note**\n> Setting up alerts requires the audit\
    \ events to be written to the Windows Application log, Database Mail to be configured,\
    \ and an operator to be created.\n\n![Image 110](index-240_1.png)\n\nAlerts can\
    \ be created with both T-SQL code and through SQL Server Management Studio. The\
    \ following code will create an alert to notify Jonathan Gardner when a database\
    \ is backed up:\n\n```sql\nUSE [msdb]\nGO\nEXEC msdb.dbo.sp_add_alert @name=N'BackupAlert',\n\
    \    @message_id=18264,\n    @severity=0,\n    @enabled=1,\n    @delay_between_responses=60,\n\
    \    @include_event_description_in=1,\n    @job_id=N'00000000-0000-0000-0000-000000000000'\n\
    GO\nEXEC msdb.dbo.sp_add_notification @alert_name=N'BackupAlert', @operator_name=N'Jonathan\
    \ Gardner',\n    @notification_method = 1\nGO\n```\n\nIn SQL Server Management\
    \ Studio, alerts are located in the **Alerts** folder under the **SQL Server Agent**.\n\
    \nTo create a new alert, right-click on the **Alerts** folder. The **New Alert**\
    \ dialog box will open, as shown in `Figure 9-5`. The name of the alert, the error\
