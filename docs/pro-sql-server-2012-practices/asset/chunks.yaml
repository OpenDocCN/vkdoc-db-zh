  trans: '# 内存授权低估与 TempDB 配置


    内存授权低估通常是行基数错误估算的结果。这些错误可能由统计信息过时、统计信息缺失、非 SARGable 谓词（如本章第一节所述）或一些较少见的原因导致。


    关于基数问题的更多详情，请参阅以下资料：


    - [`blogs.msdn.com/b/bartd/archive/2011/01/25/query_5f00_tuning_5f00_key_5f00_terms.aspx`](http://blogs.msdn.com/b/bartd/archive/2011/01/25/query_5f00_tuning_5f00_key_5f00_terms.aspx)

    - [`msdn.microsoft.com/en-us/library/ms181034.aspx`](http://msdn.microsoft.com/en-us/library/ms181034.aspx)

    - Kalen Delaney 所著的 *《Microsoft SQL Server 2008 Internals》* (Microsoft Press,
    2009)


    最小化必须溢出的操作数量主要取决于应用程序设计。要点是：不要返回超出必要的数据，并且除非必要，不要进行排序。


    应用程序常见的情况是获取的数据远远超出任何用户可能阅读的范围，将数百万行数据检索到数据集中，或者生成包含数十甚至数百页数据的报告。这不仅浪费网络资源并给客户端机器带来压力，通常还可能导致
    SQL Server 实例上出现大量的连接和排序操作。


    在频繁调用 SQL Server 实例请求少量信息的“话唠”式应用程序，与获取过多数据浪费服务器和客户端资源的应用程序之间，存在着一条微妙的界限。


    在设计应用程序时，通常建议以尽可能少的调用次数获取特定屏幕或页面的所有数据。话虽如此，但也不要矫枉过正去获取整个数据库的数据。用户应该能够指定过滤条件和限制来约束所请求的数据。不要将一百万行数据拉到应用程序中然后让用户在其中搜索。应在数据库调用中指定搜索条件，只返回用户感兴趣的数据。


    关于排序，需要注意的是，如果应用程序在显示时会对结果集进行排序，那么在 SQL Server 中进行排序就是徒劳的。有时在客户端而非服务器上对结果集排序可能更高效，因为客户端只处理单个用户的请求和少量数据，而服务器则需处理多个并发请求。您应在应用程序的设计和开发阶段考虑这一点。当然并非总能做到，但至少应考虑其可行性。


    最后一部分是针对那些会发生溢出的情况对 TempDB 进行调优。这是一个几乎人人都有看法且众说纷纭的领域。我不会深入太多细节，而是只提供一些可靠的指导原则。


    除非您拥有足够大且配置得当的存储区域网络（SAN），能够吸收 TempDB 和用户数据库的 I/O 需求而不导致性能下降，否则 TempDB 数据库最好放置在与用户数据库分开的
    I/O 通道上。这意味着应将它们放在不同的物理驱动器上，而不是放在与用户数据库同一驱动器的某个分区上。最好使用专用的 RAID 阵列。


    TempDB 应尽可能放在 RAID 10 阵列上。如果不行，RAID 1 也足够。RAID 5 是 TempDB 的糟糕选择，因为其写入速度比 RAID
    1 或 10 慢，这是由于需要计算奇偶校验条带。


    我曾听闻建议为 TempDB 使用 RAID 0。在我看来，这是一个非常危险的建议。确实，TempDB 中没有持久数据（或者说不应该有），因此 TempDB
    中数据的丢失不是大问题。然而，RAID 0 没有冗余；如果阵列中的单个驱动器故障，整个阵列将离线。如果承载 TempDB 的驱动器故障，SQL Server
    将关闭，并且在驱动器更换或 TempDB 移动到其他位置之前无法重新启动。因此，尽管为 TempDB 使用 RAID 0 不会带来数据丢失风险，但它确实存在停机时间风险。根据应用程序的不同，这对应用程序的影响可能更糟。


    如果固态硬盘（SSD）可用，应考虑将 TempDB 放在 SSD 阵列上——仅仅是考虑，并非作为自动规则。可能某个用户数据库的 I/O 延迟比 TempDB
    更高，因此从中受益更多，但如果 SSD 阵列可用，绝对值得考虑并研究将 TempDB 放在其上。


    关于 TempDB 文件数量的话题，已有大量论述。有些作者甚至对此达成一致。


    将 TempDB 拆分为多个文件有两个原因：


    - I/O 吞吐量

    - 分配争用


    分配争用似乎比 I/O 吞吐量更常见，尽管尚不清楚这是因为它被谈论得更多还是因为它发生得更多。分配争用指的是在 TempDB 的分配页上频繁出现的 `PageLatch`
    等待（非 `PageIOLatch`），通常出现在文件 1 的第 3 页（显示为 `2:1:3`）。它们也出现在第 1 页和第 2 页（显示为 `2:1:1`
    和 `2:1:2`），尽管那些情况较少见。这些等待可以在 `sys.dm_exec_requests` 或 `sys.dm_os_waiting_tasks`
    中看到。


    争用发生的原因是（非常简化地讲）任何写入 TempDB 的操作都需要检查这些页面以找到要分配的页面，然后需要更新该页面以指示分配已完成。解决分配争用的主要方法是向
    TempDB 添加更多文件。添加多少？嗯，这取决于具体情况。您可以在以下网站阅读更多相关信息：[`www.sqlskills.com/BLOGS/PAUL/post/A-SQL-Server-DBA-myth-a-day-%281230%29-tempdb-should-always-have-one-data-file-per-processor-core.aspx`](http://www.sqlskills.com/BLOGS/PAUL/post/A-SQL-Server-DBA-myth-a-day-%281230%29-tempdb-should-always-have-one-data-file-per-processor-core.aspx)。


    为 I/O 吞吐量进行拆分的情况较少见。如果承载 TempDB 的专用阵列无法提供足够的 I/O 吞吐量且无法调优，您可能需要将 TempDB 拆分到多个专用阵列上。这比为分配争用进行拆分要少见得多。


    进一步阅读，请参阅白皮书“Working with TempDB in SQL Server 2005” ([`www.microsoft.com/technet/prodtechnol/sql/2005/workingwithtempdb.mspx`](http://www.microsoft.com/technet/prodtechnol/sql/2005/workingwithtempdb.mspx))。


    ## 结论


    本章探讨的所有问题都很微妙、难以察觉且非常容易被忽视，尤其是在我们许多人现今似乎身处其中的、半受控的混乱工作环境中。我希望我提供的细节能让您深入了解一些设计和开发选择，这些选择可以以各种方式影响您的应用程序和系统的性能。本章还描述了当面临性能问题时，您可以检查和尝试的其他工具与流程。


    # `第 4 章`

    作者：Kellyn Pot’vin'
- fmt: '# Chapter 4: Dynamic Management Views


    I’ve been working with Microsoft SQL Server since version 6.5 and was introduced
    to performance tuning and high-intensity database management in SQL Server 7 back
    in 2000. The environment at that time was a SQL Server 7 implementation clustered
    on a Compaq SAN and pulling in 1 to 4 gigabytes (GB) per day, which was considered
    a great deal for a SQL Server back then. Performance tuning incorporated what
    *appeared* as voodoo to many at this time. I found great success only through
    the guidance of great mentors while being technically trained in a mixed platform
    of Oracle and SQL Server. Performance tuning was quickly becoming second nature
    to me. It was something I seemed to intuitively and logically comprehend the benefits
    and power of. Even back then, many viewed SQL Server as the database platform
    anyone could install and configure, yet many soon came to realize that a “database
    is a database,” no matter what the platform is. This meant the obvious: the natural
    life of a database is growth and change. So, sooner or later, you were going to
    need a database administrator to manage it and tune all aspects of the complex
    environment.


    The days of voodoo ceased when SQL Server 2005 was released with the new feature
    of Dynamic Management Views (`DMVs`). The ability to incorporate a familiar, relational
    view of data to gather critical system and performance data from any SQL Server
    version 2005 or newer was a gigantic leap forward for the SQL Server professional.
    As an Oracle DBA who had access to `V$*` and `DBA_*` views for years, the `DMV`
    feature was a wonderful addition to Microsoft’s arsenal of performance tools.


    In this chapter, I will not just describe the views and how to collect the data,
    but I’ll cover why collecting this data is important to the health and long performance
    of an `MSSQL` database. Performance tuning is one of the areas that I see often
    neglected in `MSSQL`, because it is often marketed as being easy to set up, yet
    it takes strong, advanced database knowledge to understand what can hinder performance
    and how to resolve that problem. The introduction of Dynamic Management Views
    gives you the ability to provide clear, defined performance data, whereas before
    they were introduced, incorrect assumptions were easily made and many mistakes
    resulted from them.


    ## Understanding the Basics


    Dynamic Management Views must be used with Dynamic Management Functions (`DMFs`).
    There is no way around this: the views are the data, and the table functions offer
    you the additional processing capability required to view the data—specifically,
    using the `OUTER` and `CROSS APPLY` operators to present the results in a proper
    format for easy readability.


    Table functions can perform more than a single select (that is, of a view). When
    that functionality is used with Dynamic Management Views, it offers more powerful
    logic choices than any view alone could offer.


    Before you can use the techniques found in this chapter, you need to understand
    basic database administration, which includes knowing how to locate a database
    ID (`DBID`), how to query views with function calls, and the differences between
    SQL calls from Procedure object names.


    ## Naming Convention


    The `DMVs` and `DMFs` reside in the `SYS` schema and can be located by their specific
    naming convention of `dm_*`. No aliases (synonyms) have been created for `DMVs`
    or `DMFs`, so you must prefix them with the `sys.` schema name. When `DMVs` are
    discussed, they often are referred to with the `sys.` in the name, but within
    this chapter, the `sys.` part will be assumed—for example, `sys.dm_exec_sql_text`.


    These naming conventions can be confusing at times, depending on what type of
    dynamic-management object you are referring to. `DMVs` can be queried using a
    “simple” naming convention, whereas `DMFs` can be referenced only with the standard
    two-part and three-part names—that is,


    ```

    <dbname>.<dbowner>.<view_name>

    ```


    not the four-part, fully qualified naming convention, which adds the `<dbserver>`
    prefix.'
