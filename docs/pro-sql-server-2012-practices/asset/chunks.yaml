    chapter 7 ■ IndexIng OutsIde the BuBBle


    In the equality scenario, we want to look at the recommendation generated when
    there are specific value queries from the database. In this scenario, we’ll look
    at the missing index recommendations for three queries, included in Listing 7-3\.
    The first query selects and filters a date on the DueDate column. The second selects
    the OrderDate column and filters a date on the DueDate column. Finally, the third
    selects the AccountNumber column while filtering a value on both the DueDate and
    AccountNumber columns.


    After running the query in Listing 7-1 to obtain the missing index recommendations,
    we see that there are two recommendations based on these three queries, shown
    in Figure 7-2\. The first two queries resulted in the first recommendation, which
    is evident by the inclusion of two user seeks on the recommendation.


    This recommendation is for an index with the DueDate column as the index key.
    The second recommendation includes two columns for the index. This recommendation
    correlates to the third query in the script, which has two columns (DueDate and
    AccountNumber) as predicates.


    ***Listing 7-3.** Equality Columns Scenario*


    USE AdventureWorks2012


    GO


    SELECT DueDate FROM Sales.SalesOrderHeader


    WHERE DueDate = ''2005-07-13 00:00:00.000''


    GO


    SELECT OrderDate FROM Sales.SalesOrderHeader


