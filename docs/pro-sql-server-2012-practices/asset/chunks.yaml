- fmt: '# Chapter 13: I/O — The Untold Story


    For years, storage vendors have done some wonderful work, but it has left others
    wondering how to adapt to the changes. This is the reason that I leave out the
    counter I relied on many years ago and now my primary counters deal with how much
    data the database is moving to the storage subsystem (`Disk Bytes/sec`), what
    type of bytes (read or write) they are, how many of them there are (`Disk Reads/sec`)
    and (`Disk Writes/sec`), the size of the I/O request (`in and out requests per
    second`) (`Avg. Disk Bytes/Read`) and (`Avg. Disk Bytes/Write`), and finally how
    quickly the storage subsystem is able to return that data (`Avg. Disk sec/Read`)
    and (`Avg. Disk sec/Write`).


    This set of counters yields interesting data, all of which happen to be in a language
    your server administrator or your storage guru can relate to. Note that when your
    operating system (OS) reports a number, it might not be the same number that the
    storage device is reporting. However, it shouldn’t be far off. If it is, it’s
    often due to the sample interval that each of you are independently working from.


    Traditionally, storage area network (SAN) metrics and reporting aren’t sampled
    at a frequency of one second. However, servers are often sampled at this frequency,
    and for good reason. The sample set is typically sourced from Performance Monitor,
    and it’s only captured during times of interest at that poll frequency. The result
    is that when the conversation begins, you need to ensure that everyone is talking
    about the same apples—this includes the same server, logical unit number (LUN),
    frequency of the sample (sample interval), and of course time frame. Time frame
    is certainly important here, because averages have a way of looking better over
    time.


    There’s an interesting relationship between all of these counters which helps
    to explain the I/O behavior on a database server. As you can imagine, if the `Disk
    Reads/sec` (`read In/Out Per second`, `IOPs`) increased, one would expect the
    `Disk Read Bytes/sec` counter to increase. Typically, this is true, but what if,
    at the same time, a different profile of data were accessing the database server
    and the `Disk Bytes/Read` decreased? In this manner, you certainly could have
    more I/O requests per second, at a smaller size, resulting in the same `Disk Bytes/second`
    measure. It’s for this reason that knowing and understanding your specific I/O
    footprint and pattern is so important. There are times of the day that your system
    will behave in a certain fashion and other times of the day when it’s significantly
    different.


    ## Considerations


    Imagine that your database server supports an online retail store where 99 percent
    of the orders and the web traffic occur between 8:00 AM and 5:00 PM. During that
    time of the day, your I/O pattern will be indicative of what the web application
    needs in order to fulfill orders, look up item information, and so forth. Of course,
    this assumes you don’t run database maintenance, backups, Database Console Command’s
    (`DBCC`s), and so forth during the day. The only thing running on the database
    server during those hours are applications that support the online web application.
    Once you have an understanding of what that I/O profile looks like, it will give
    you a solid foundation to begin from.


    At this point, if you are anything like me, you are thinking to yourself, “Can’t
    you just show me a picture, already?” Indeed, often it can be easier to visualize
    the relationship between counters to see why they matter. Figure 13-1 shows that
    relationship.


    ![Illustration of Disk Reads/sec (Bold), Disk Read Bytes/sec (Normal), Avg. Disk
    sec/Read (Light), and Avg. Disk Bytes/Read (Dash)](index-323_1.png)


    **Figure 13-1.** Illustration of `Disk Reads/sec` (Bold), `Disk Read Bytes/sec`
    (Normal), `Avg. Disk sec/Read` (Light), and `Avg. Disk Bytes/Read` (Dash)


    This is an interesting view of the logical disk because it shows the relationship
    of IOP size (`Avg. Disk Bytes/read`), disk throughput (`Disk Read Bytes/sec`),
    and the quantity of IOPs (`Disk Reads/sec`). The `Disk Reads/sec` counter (the
    bold line) shows a very steady trend for the majority of the sample, but as you
    can see early on, there was an increase in the size of the I/O, which translated
    into nearly a threefold increase in disk throughput.


    This means, in short, that not all I/Os are created equal. As you can see in Figure
    13-1, a variation in the size of the IOP can have a noticeable effect on the environment.
    One of the primary reasons I look for this and make note of it is so that I’m
    not surprised when this occurs in an environment. Imagine that you are working
    diligently on providing scalability numbers for your environment and one of the
    key performance indicators (`KPI`s) is “business transactions.” In this context,
    the application group makes a statement along the lines of “You do 1,000 transactions
    per hour during the day and 100 transactions per hour at night,” and you are asked
    what that means at a database level. In this scenario, the business also wants
    to know what it would mean if the transaction rate remained the same yet native
    growth of the database continued over the period of a year. They also want to
    ensure that the next hardware purchase (the server and SAN, specifically) will
    provide enough horsepower to further the native growth of the database and also
    a potential transaction increase from 1,000 per hour to 2,000 per hour.


    At first blush, this scenario seems simple: double what you have and you will
    be OK. But what if that simple math didn’t actually pan out? What if, due to “wall-clock”
    time and service times on the SAN, there suddenly weren’t enough hours in the
    day to update your statistics, rebuild your indexes, execute `DBCC`s, or keep
    up with the backup window?


    Typically, there’s not a linear increase with data growth over time. For many
    businesses, the customer base is expanding, not contracting. These additional
    customers will slowly add to the size of your database and require additional
    I/O that you cannot see a need for in your data today. Even in the scenarios where
    the customer base is contracting, it’s common that data is kept for the old customers.
    This happens for a variety of reasons, including regulatory, marketing, financial,
    and so on. The result is that, while it’s tempting to rely on the simple math,
    doing so can result in some complications down the road.


    For this reason, understanding your I/O profile over time and knowing which data
    is in the mix is critical.


    > **Note:** The type of I/O is perhaps more important than the overall quantity
    of I/O operations.


    The type of I/O will change based on the type of business transaction or the operation
    you have written or scheduled. Backups, for instance, have a very different I/O
    profile than traditional business transactions, and even business transactions
    are not created equal. Consider a company that sells widgets online and via an
    outbound call center. The type of I/O for the online web store might have differing
    characteristics than the client-server application that’s used by the outbound
    call center employees.


    Another interesting example is determining what type of reporting occurs against
    your OLTP database server and even the times that the reports are run. Often,
    operational types of reporting occur during the day, while summarized information
    or rolled-up data reporting occurs during the evening hours. But what if users
    have the ability to run the larger, more I/O-intensive rollup types of reports
    at, say, the end of each month in the middle of the day? What if that coincides
    with a marketing push and your web store traffic increases by 50 percent?'
