    # 使数据库结构匹配引擎需求，是数据库代码性能调优过程中第二重要的部分。（而使结构匹配用户需求是最重要的！）


    ## 一段非常简短的历史渊源


    关系数据库的概念起源于 20 世纪 70 年代末。（术语 `关系` 主要类似于 SQL 中的表，并非指代关联关系。）1979 年，当时任职于 IBM 研究实验室的
    Edgar F. Codd 撰写了一篇题为“大型共享数据库的关系模型”的论文，发表在《ACM 通讯》上。（“ACM” 代表计算机协会，你可以在 [www.acm.org](http://www.acm.org)
    了解更多关于它的信息。）在这篇确实应该被列为必读的 11 页论文中，Codd 向学术界以外的世界介绍了一个相当革命性的理念：如何打破当时所用数据库类型的物理壁垒。


    在此论文之后，Codd 在 20 世纪 80 年代提出了 13 条规则，用以界定何为“关系型”数据库，看看最初的愿景中有多少留存至今是相当有用的。我不会复述所有规则，但其主旨是：在关系数据库中，数据库的所有物理属性都应从用户那里封装起来。数据是存储在本地、存储区域网络（SAN）、局域网（LAN）的其他位置，还是在云中（尽管当时的这个概念远没有今天这样热门），这些都不应该重要。数据存储在具有一致形态（每行具有相同列数）的容器中，系统为用户处理内部存储细节。


    更关键的一点是，实现细节对用户是隐藏的，使得数据仅在一个非常高的抽象层面上进行交互。


    遵循这些原则确保了数据通过高级语言访问起来要容易得多，只需知道数据所在的表、列名（或多个列名）以及一些可用于唯一标识一行数据的片段（即“键”）。这使得普通用户访问数据变得容易得多，因为访问数据时，你不需要知道数据在磁盘的哪个扇区，文件名是什么，甚至不需要知道索引等物理结构的名称。所有这些细节都由软件处理。


    未被其他代码直接引用的对象的更改不应导致系统其余部分崩溃。因此，删除一个未被引用的列不会导致系统崩溃。此外，数据不应仅按行处理，而应一次按集合处理。如果这还不够，这些表还应该能够通过完整性约束（包括唯一性约束和引用完整性）来自我保护，而用户不应知道这些约束的存在（当然，除非他们违反了其中一个）。


    Codd 的规则中包含了更多标准，包括对 `NULLs` 的需求，但这对于简要介绍关系数据库概念已经足够了。


    事实是，`SQL Server`——实际上所有的关系数据库管理系统（`RDBMSs`）——也只是刚刚达到能够实现其中一些梦想的阶段。20 世纪 80 年代的计算能力与我们现在拥有的根本无法相比。我的第一个
    `SQL Server`（为一个中等规模的非营利组织运行会计系统）磁盘空间不到 100 MB，内存只有 16 MB。我五年前的手机性能都比那台服务器强。我们现在拥有的所有这些计算能力可能会让开发者头脑发热，给他一种不需要花时间做设计的印象。问题在于，数据对公司而言是令人上瘾的。他们一旦尝到甜头，就会意识到数据的力量，数据量会激增，这又把我们带回到需要理解关系引擎如何工作的问题上。第一次就做对……这听起来很熟悉，对吧？


    ## 为何普通数据库优于非凡的数据库


    在上一节中，我提到在关系数据库中直接访问数据的唯一（且理想的）方法是通过表、行键和列名。在构建数据库时，这种访问模式应该贯穿你的思维。目标是让用户拥有恰好数量的“桶”来存放他们的数据，当你编写代码时，无需为了使用而进一步拆分数据。


    随着时间的推移，关系数据库最重要的结构化需求被制定成一套标准，称为 `范式`。当一个表无法在不改变其含义的情况下被重写为更简单的形式时，它就是规范化的。这种含义应更关注实际应用而非学术练习，并且仅仅因为你能够将一个值拆分成多个部分，并不意味着你必须这样做。你的决策应主要基于数据的使用方式。你在
    `范式` 中看到的很多内容会显得非常显而易见。事实上，数据库设计要正确并不太难，但如果你不知道什么是正确的，那么出错就容易得多。


    实现规范化有两种截然不同的方式。一种是非常正式的方式，有一套逐步递进的严格“规则”来规定要遵守的“范式”。这种方法本身没有问题，并且在构建一个“优秀”数据库之前是必要的练习，但任何经验丰富的数据架构师都不太可能以这种逐步通过范式的方式进行设计。相反，你会在心中牢记规范化的原则进行设计，并使用
    `范式` 作为测试你设计的一种方法。


    设计一个优秀数据库的问题，因其过程看似自然而变得更加复杂。


    “过去的、未经教育的我”构建的第一个数据库有 10 多张表——都是那些显而易见的表，比如客户、订单等等，这样设置是为了能够生成用户界面以满足客户。


    然而，地址、订单项和其他项目被作为主表的一部分，使得查询操作起来如同噩梦。随着我的雇主要求系统提供更多功能，设计变得越来越吃紧（数据也越来越“污染”）。基本的东西是有了，但内部结构全错了，这个设计本可以使用大约
    50 张左右的表来完善正确的解决方案。不久之后（在下一家公司，抱歉 Terry），我真正接受了数据库设计基础方面的教育，我脑中的那个 1000 流明的小灯泡就亮了。

    '
- fmt: "# 数据库规范化指南\n\n## 引言\n\n那个灯泡之所以存在，是因为我在大学数据库课上见过的一个看似比普通人会创建的更复杂的数据库，它的存在是为了帮助设计适配我正在使用的工具（SQL\
    \ Server 1.0）。而且，由于创建关系数据库引擎的人使用相同的规范化概念来指导引擎的工作原理，这是一个双赢的局面。所以，如果关系引擎供应商使用一套概念来指导他们如何创建引擎，那么如果你遵循这些概念，事实证明是相当有帮助的。\n\
    \n在本节中，我将分两个阶段介绍规范化的概念：\n\n- **（半）形式化定义**：使用范式定义，我将阐述什么是范式。\n- **实际应用**：通过简单地重述规范化的目标，我将通过几个规范化的示例，并演示违反这些原则将如何损害你的性能以及数据质量。\n\
    \n最终，我将至少建立一个关于什么是“正确”的基本版本，帮助你将设计引向正确性。不过，这里有一个简单的警告：所有这些原则都必须以用户的意愿为指导，否则看起来最好的数据库也将会失败。\n\
    \n## （半）形式化定义\n\n首先，让我们以半正式的方式看看“正式”规则。规范化是用“范式”来表述的，从第一范式开始，还包括其他几个范式。有些范式是编号的，有些则以规则创建者的名字命名。（请注意，最严格地说，要处于更高的范式，你必须也符合较低的范式。所以，你不可能处于最严格的第三范式而不接受第一范式的定义。）数据架构师在谈话中很少会具体引用范式，除非他们想在评审时给经理留下印象，但理解规范化的基础对于理解为什么需要它至关重要。以下是对范式的快速重述：\n\
    \n- **第一范式/表定义** 属性和行*形状*：\n    - 所有列必须是*原子的*——每列一个独立的值，无需拆分即可使用。\n    - 表的所有行必须包含相同数量的值——没有数组或重复组（通常由名称末尾带数字的列表示，例如：`payment1`,\
    \ `payment2` 等）。\n    - 每一行应该与表中的所有其他行不同。行应该是唯一的。\n\n- **Boyce-Codd范式** 每个可能的键都被识别，并且所有属性都完全依赖于一个键。所有非键列必须表示关于一个键、整个键、且仅关于键的事实。此范式是第二和第三范式的扩展，由于它们最初是根据单个*主键*定义的，因此它们是Boyce-Codd范式的子集：\n\
    \    - **第二范式** 所有属性必须是关于整个主键的事实，而不是主键子集的事实。\n    - **第三范式** 所有属性必须是关于主键的事实，且仅关于主键。\n\
    \n- **第四范式** 实体中不能表示多于一个多值依赖。此范式专门处理键内属性的关系，确保表代表单个实体。\n\n- **第五范式** 一个通用规则，用于分解那些未被额外规则特别清除的任何数据冗余。如果一个表有一个包含多于两列的键，并且你可以将其分解为具有两列键的表，并保证通过连接它们能重新得到原表，那么该表就不是第五范式。第五范式涵盖的数据冗余形式在典型设计中很少被违反。\n\
    \n> **注意** 第四和第五范式在下一节的实际应用中对你来说会变得更加明显。它们很少被涵盖的主要原因不是它们不有趣，而是因为它们描述起来并不太容易。然而，两者的示例都很容易找到。\n\
    \n还有其他更理论化的范式，我不会提及，因为你甚至很少会遇到它们。在开发周期的现实中，所述规则并非铁律，而仅仅是你可以用来避免某些陷阱的指导原则。在实践中，你最终可能会得到*反规范化*（意味着为了某个明确、已理解的目的而故意违反规范化原则，而不是为了更快地完成工作而忽略规则，后者应称为*未规范化*）。\n\
    \n反规范化主要是为了满足数据消费者（程序员、查询者和其他用户）的某些编程或性能需求。\n\n一旦你深入“理解”了规范化的概念，你会发现构建数据库就像搭建一个精心构思的乐高作品。你会在拼装零件之前设计好每个部分如何融入整体，因为就像拆解1000块乐高积木来做个小改动会让乐高搭建更像是工作而不是乐趣一样，数据库设计几乎一开始就是工作，并且通常伴随着一个不断看手表并向你投来指责面孔的经理。基于保持过程敏捷可能需要一些重建，但你提前计划得越多，需要重新整理的数据就越少。\n\
    \n## 实际应用\n\n在实践中，根本不引用规则的正式定义。相反，引用的是它们所包含的指导原则。我牢记以下四个概念来指导我正在构建的数据库的设计，对于真正烦人或复杂的问题，我会回溯到更具体的规则：\n\
    \n- **列** 确保每一列只代表一个值。\n- **表/行唯一性** 一行代表一个独立的事物，并且该事物不会在其他地方表示。\n- **列仅依赖于整个键**\
    \ 列要么是键的一部分，要么描述由键标识的行。\n- **键始终表示单个表达式** 确保三个或更多键值之间的依赖关系是正确的。\n\n在本节中，我将提供一些例子来巩固这些定义，但在这里理解“原子”这个术语是个好时机：*原子*是描述一个值不能再被分解而不改变其本质的常用方式。例如，一个水分子由氢和氧组成。在分子内部，如果你凑得非常近，你可以看到两种类型的原子。你可以把它们分开，你仍然拥有氢和氧。尝试分裂氢，它会变成完全不同的东西（而且你的邻居们会非常不高兴）。在SQL中，你需要将事物分解到易于使用且不超出必要范围改变含义的级别。\n\
    \n分解到原子级别的表和列在它们的编程接口中只有一个，并且只有一个含义。如果你永远不需要使用SQL来使用列的一部分，那么单个列是完美的。（用户在屏幕上使用的备注集是一个很好的例子。）你不会想要一个段落表、句子表和字符表来存储这些信息，因为整个值应该只作为整体才有用。如果你正在构建一个计算该文档字符数的系统，那么每行一个字符可能是个好主意。"
  raw: 'That light bulb was there because what had looked like a more complicated
    database than a normal person would have created in my college database class
    was there to help designs fit the tools that I was using (SQL Server 1.0). And
    because the people who create relational database engines use the same concepts
    of normalization to help guide how the engine works, it was a win/win situation.
    So if the relational engine vendors are using a set of concepts to guide how they
    create the engine, it turns out to be actually quite helpful if you follow along.


    In this section, I will cover the concept of normalization in two stages:


    •


    (**Semi-)Formal Definition** Using the normal-form definitions, I will establish
    what the normal forms are.


    •


    **Practical Application** Using a simple restatement of the goals of normalization,
    I will work through a few examples of normalization and demonstrate how violations


    of these principals will harm your performance as well as your data quality.


    In the end, I will have established at least a basic version of what “right” is,
    helping you to guide your designs toward correctness. Here’s a simple word of
    warning, though: all of these principles must be guided by the user’s desires,
    or the best looking database will be a failure.


    (Semi-)Formal Definition


    First, let’s look at the “formal” rules in a semi-formal manner. Normalization
    is stated in terms of “forms,”


    starting with the first normal form and including several others. Some forms are
    numbered, and others are named for the creators of the rule. (Note that in the
    strictest terms, to be in a greater form, you must also conform to the lesser
    form. So you can’t be in the third strictest normal form and not give in to the
    definition of the first.) It’s rare that a data architect actually refers to the
    normal forms in conversation specifically, unless they are trying to impress their
    manager at review time, but understanding the basics of normalization is essential
    to understanding why it is needed. What follows is a quick restatement of the
    normal forms:


    •


    **First Normal Form/Definition of a Table** Attribute and row *shape*:


    •


    All columns must be *atomic*—one individual value per column that needn’t be broken
    down for use.


    •


    All rows of a table must contain the same number of values—no arrays or


    repeating groups (usually denoted by columns with numbers at the end of the


    name, such as the following: payment1, payment2, and so on).


    •


    Each row should be different from all other rows in the table. Rows should be


    unique.


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance


    •


    **Boyce-Codd Normal Form** Every possible key is identified, and all attributes
    are fully dependent on a key. All non-key columns must represent a fact about
    a key, a whole key, and nothing but a key. This form was an extension of the second
    and


    third normal forms, which are a subset of the Boyce-Codd normal forms because


    they were initially defined in terms of a single *primary* key:


    **• Second Normal Form** All attributes must be a fact about the entire primary
    key and not a subset of the primary key.


    **• Third Normal Form** All attributes must be a fact about the primary key and
    nothing but the primary key.


    •


    **Fourth Normal Form** There must not be more than one multivalued dependency


    represented in the entity. This form deals specifically with the relationship
    of


    attributes within the key, making sure that the table represents a single entity.


    •


    **Fifth Normal Form** A general rule that breaks out any data redundancy that
    has not specifically been culled out by additional rules. If a table has a key
    with more than two columns and you can break the table into tables with two column
    keys and


    be guaranteed to get the original table by joining them together, the table is
    not in Fifth Normal Form. The form of data redundancy covered by Fifth Normal
    Form is


    very rarely violated in typical designs.


    n **Note** The Fourth and Fifth Normal Forms will become more obvious to you when
    you get to the practical applications in the next section. One of the main reasons
    why they are seldom covered isn’t that they aren’t interesting, but more because
    they are not terribly easy to describe. However, examples of both are very accessible.


    There are other, more theoretical forms that I won’t mention because it’s rare
    that you would even encounter them. In the reality of the development cycle of
    life, the stated rules are not hard-and-fast rules, but merely guiding principles
    you can use to avoid certain pitfalls. In practice, you might end up with *denormalization*
    (meaning purposely violating a normalization principle for a stated, understood
    purpose, not ignoring the rules to get the job done faster, which should be referred
    to as *unnormalized*).


    Denormalization occurs mostly to satisfy some programming or performance need
    from the consumer of the data (programmers, queriers, and other users).


    Once you deeply “get” the concepts of normalization, you’ll that you build a database
    like a well-thought-out Lego creation. You’ll design how each piece will fit into
    the creation before putting the pieces together because, just like disassembling
    1000 Lego bricks to make a small change makes Lego building more like work than
    fun, database design is almost always work to start with and usually is accompanied
    by a manager who keeps looking at a watch while making accusatory faces at you.
    Some rebuilding based on keeping your process agile might be needed, but the more
    you plan ahead, the less data you will have to reshuffle.


    Practical Application


    In actual practice, the formal definition of the rules aren’t referenced at all.
    Instead, the guiding principles that they encompass are referenced. I keep the
    following four concepts in the back of my mind to guide the design of the database
    I am building, falling back to the more specific rules for the really annoying
    or complex problem I am trying to solve:


    • **Columns** Make sure every column represents only one value.


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance


    •


    **Table/row uniqueness** One row represents one independent thing, and that thing
    isn’t represented anywhere else.


    •


    **Columns depend only on an entire key** Columns either are part of a key or


    describe something about the row identified by the key.


    •


    **Keys always represent a single expression** Make sure the dependencies between
    three or more key values are correct.


    Throughout this section, I’ll provide some examples to fortify these definitions,
    but it is a good point here to understand the term: *atomic*. Atomic is a common
    way to describe a value that cannot be broken down further without changing it
    into something else. For example, a water molecule is made up of hydrogen and
    oxygen. Inside of the molecule, you can see both types of atoms if you look really
    close. You can split them up and you still have hydrogen and oxygen. Try to split
    hydrogen, and it will turn into something else altogether (and your neighbors
    are not going to be pleased one little bit). In SQL, you want to break things
    down to a level that makes them easy to work with without changing the meaning
    beyond what is necessary.


    Tables and columns split to their atomic level have one, and only one, meaning
    in their programming interface. If you never need to use part of a column using
    SQL, a single column is perfect. (A set of notes that the user uses on a screen
    is a good example.) You wouldn’t want a paragraph, sentence, and character table
    to store this information, because the whole value should be useful only as a
    whole. If you are building a system to count the characters in that document,
    it could be a great idea to have one row per character.'
