    Networking `Network Interface(*)\Bytes Total/sec` Validate the network interfaces
    are set to the correct speed based upon the NIC type and network segment speeds.


    Ensure the `Output Queue Length` remains close to zero over a 24-hour period,
    because queuing indicates that processes are waiting on the network interface.
    If a queue length does exist, review the network interface configuration to ensure
    it is configured correctly and the total number of bytes per second does not exceed
