    # 跳出思维定式进行索引


    此列表提供了在为表创建索引时应关注内容的概览。该列表唯一缺失的是*上下文*。针对单个查询，查看相关表并确定最适合该查询的索引是容易的。但不幸的是，在大多数
    SQL Server 环境中，服务器上运行的查询不止一个。事实上，对于大多数数据库，针对每个表编写的查询可能有数百甚至数千个。面对如此多的活动，为了给每个查询获得最佳性能，可以添加到表上的索引变体数量会非常庞大。这可能导致表上的索引数量变得难以维护。插入或更新操作可能需要
    SQL Server 付出巨大代价，由此产生的阻塞和锁会使表变得不可用。


    基于这些原因，你不应仅将单个查询作为创建索引的唯一动机。


    像这样孤立地工作有时被称为 `在思维定式中工作`。这样做的问题在于，由于任何一个索引都会影响针对同一表执行的其他查询，因此你必须考虑所有查询。你必须跳出单一查询的思维定式，考虑所有查询。


    同样地，能为某个查询带来最佳改进的索引也并非总是合理的。如果该查询执行频率不高，或者没有足够的业务需求来证明其合理性，那么拥有“完美”的索引并不总是必要的。在这些情况下，借鉴查询优化器构建执行计划的方式，查询只需要一组
    `足够好` 的索引来完成工作。


    在本章中，我们将探讨如何跳出思维定式，开始为针对表及其所在数据库运行的所有查询进行索引设计。我们将审视索引合理性的两个主要方面。首先是数据库正在承受的工作负载。


    通过此，我们将研究可用的工具，以调查和分析如何发掘并为表设计最佳索引。在本章的第二部分，我们将探讨在设计索引时，工作负载未必是唯一的考量因素。


    ## 环境定式


    索引设计时需要跳出的第一个定式是环境定式。你不仅要考虑当前的查询，还要考虑表上的其他查询。在这两个定式中，这个相对容易，或者说更直接地被打破。为此，你应该遵循以下两个步骤：


    1.  识别缺失索引。

    2.  评估工作负载。


    遵循这些步骤，你将打破在定式内进行索引设计的陷阱，改变你的索引实践方式，从而考虑数据库中的所有表和索引，而非局限于单个查询的狭窄范围。


    ## 识别缺失索引


    进行索引设计时的起点是 SQL Server 实例中可用的缺失索引建议。从这里开始的主要原因是，SQL Server 查询优化器已经确定这些索引机会存在。虽然除了添加缺失索引外，可能还有其他方法可以提高查询性能，但添加索引是你可以采取的、风险最低的改进性能的措施之一。


    每当为查询生成执行计划时，都可能创建一个缺失索引建议。如果列上的统计信息足够具有选择性，以至于索引可以提升查询性能，那么该索引架构就会被添加到缺失索引建议列表中。但请注意，有几种情况不会发生这种情况。首先，如果已有
    500 条建议，则不会生成进一步的建议。其次，缺失索引建议不包括聚集索引、空间索引或列存储索引。


    每条缺失索引建议都包含多个定义该建议的属性。根据建议的来源（我们将在本章后面讨论），属性值的位置会有所不同。表 7-1 列出了每个来源都始终包含的所有属性。


    ### 表 7-1. 缺失索引属性


    **属性** | **描述**

    ---|---

    `Statement` | 缺失索引的数据库、架构和表的名称。

    `Equality Columns` | 对等谓词有贡献的列的逗号分隔列表。当使用特定值进行筛选时，会使用这些谓词。

    `Inequality Columns` | 对不等谓词有贡献的列的逗号分隔列表。当筛选值范围时，会产生不等谓词。

    `Included Columns` | 查询所需的覆盖列的逗号分隔列表。

    `Impact` | 如果实现了此缺失索引组，用户查询可能体验到的平均收益百分比。


    有些活动会导致缺失索引建议从缺失索引列表中被移除。第一种情况是每当向受影响表添加索引时。由于新索引可能覆盖缺失索引中的列，因此该表的建议会从队列中移除。类似地，当索引被重建或碎片整理时，缺失索引建议也会被移除。


    在我们回顾一些缺失索引场景时，牢记一些建议的局限性很重要。首先，缺失索引是针对生成的计划而言的。即使创建了索引，仍然可能存在另一个未被当前计划考虑到的、能提供更大改进的缺失索引建议。其次，不等谓词列的成本信息不如等值谓词列准确，因为不等谓词列是基于范围的。


    考虑到所有这些因素，你可能会认为使用缺失索引建议价值不大。幸运的是，事实远非如此。提供的建议使你能够立即开始识别索引机会，且只需极少的工作。如果定期进行，这些信息是新鲜、相关的，并且提供了一个窗口，让你可以轻松地为
    SQL Server 数据库提升性能。


    在 SQL Server 中有两种方式可以访问缺失索引建议：动态管理对象和计划缓存。在本节的剩余部分，我们将探讨如何使用这些来源获取索引建议。


    ### 动态管理对象


    访问缺失索引建议的第一种方法是通过动态管理对象。通过这些动态管理对象，可以收集和查看缺失索引信息。这些动态管理对象如下：


    *   `sys.dm_db_missing_index_details`：返回缺失索引建议列表；每行代表一个建议的索引。

    *   `sys.dm_db_missing_index_group_stats`：返回关于缺失索引组的统计信息。

    *   `sys.dm_db_missing_index_groups`：返回有关特定缺失索引组中包含哪些缺失索引的信息。

    *   `sys.dm_db_missing_index_columns`：对于提供的每个 `index_handle`，返回缺失索引的表列。


    使用动态管理对象返回缺失索引信息的最简单方法是使用此列表中的前三个对象（`sys.dm_db_missing_index_details`、`sys.dm_db_missing_index_group_stats`
    和 `sys.dm_db_missing_index_groups`）。这三个对象可以连接在一起，生成一个查询，为每个已识别的建议返回一行。`清单 7-1`
    中的查询使用这些动态管理对象来返回缺失索引建议。

    '
- fmt: "# Chapter 7: Indexing Outside the Bubble\n\nWhile the DMOs provide quite a\
    \ bit of useful information, keep in mind that when you review missing index recommendations,\
    \ you should look beyond the statistics provided for the recommendation. You can\
    \ also use those statistics to identify which recommendations would have the most\
    \ impact on database performance.\n\nThe performance impact can be determined\
    \ through two calculations included in the query. The first calculation, `total_impact`,\
    \ provides an aggregate value of average impact to the queries, multiplied by\
    \ the `user_seeks` and `user_scans`. This allows you to determine which indexes\
    \ would have the highest percent impact if implemented. This helps you make judgments\
    \ on whether an index that improves performance by 90 percent on one query is\
    \ as valuable as an index that improves performance on 50 queries by 50 percent\
    \ (where the `total_impact` values would be 90 and 2,500, respectively).\n\nThe\
    \ second calculation, `index_score`, includes `avg_total_user_cost` in the equation.\
    \ Because the cost of a query relates to the amount of work that a query will\
    \ perform, the impact of improving a query with a cost of 1,000 versus a cost\
    \ of one will likely result in a greater visible performance improvement. Table\
    \ 7-2 shows a full list of the columns and the information they provide.\n\n**Note:**\
    \ Occasionally, people will recommend adding indexes that have values in either\
    \ the `total_impact` or `index_score` calculations that exceed one value or another.\
    \ None of these recommendations should ever be taken at face value. The longer\
    \ a set of recommendations is in the missing index recommendation list, the greater\
    \ the chance the score will be high. A recommendation shouldn’t be accepted just\
    \ because it is high and has accumulated long enough; it should be accepted after\
    \ consideration between the other recommendations and the indexes that exist on\
    \ the table.\n\n## Listing 7-1: Query for Missing Index DMOs\n\n```sql\nSELECT\n\
    \    DB_NAME(database_id) AS database_name\n    ,OBJECT_SCHEMA_NAME(object_id,\
    \ database_id) AS schema_name\n    ,OBJECT_NAME(object_id, database_id) AS table_name\n\
    \    ,mid.equality_columns\n    ,mid.inequality_columns\n    ,mid.included_columns\n\
    \    ,migs.avg_total_user_cost\n    ,migs.avg_user_impact\n    ,(migs.user_seeks\
    \ + migs.user_scans) * migs.avg_user_impact AS total_impact\n    ,migs.avg_total_user_cost\
    \ * (migs.avg_user_impact / 100.0) * (migs.user_seeks + migs.user_scans) AS index_score\n\
    \    ,migs.user_seeks\n    ,migs.user_scans\nFROM sys.dm_db_missing_index_details\
    \ mid\nINNER JOIN sys.dm_db_missing_index_groups mig\n    ON mid.index_handle\
    \ = mig.index_handle\nINNER JOIN sys.dm_db_missing_index_group_stats migs\n  \
    \  ON mig.index_group_handle = migs.group_handle\nORDER BY migs.avg_total_user_cost\
    \ * (migs.avg_user_impact / 100.0) * (migs.user_seeks + migs.user_scans) DESC\n\
    ```\n\n## Table 7-2: Missing Index Query Columns\n\n| Column Name | Description\
    \ |\n| :--- | :--- |\n| `database_name` | Name of the database where the index\
    \ is missing |\n| `schema_name` | Name of the schema for the table where the index\
    \ is missing |\n| `table_name` | Name of the table where the index is missing\
    \ |\n| `equality_columns` | Comma-separated list of columns that contribute to\
    \ equality predicates |\n| `inequality_columns` | Comma-separated list of columns\
    \ that contribute to inequality predicates |\n| `included_columns` | Comma-separated\
    \ list of columns needed as covering columns for the query |\n| `avg_total_user_cost`\
    \ | Average cost of the user queries that could be reduced by the index in the\
    \ group |\n| `avg_user_impact` | Average percentage benefit that user queries\
    \ could experience if this missing index group had been implemented |\n| `total_impact`\
    \ | Calculation of total user impact across seeks and scans that provides weighing\
    \ of recommendations to determine which index recommendations would have the most\
    \ effect across full use of the index recommendation |\n| `index_score` | Calculation\
    \ providing a measure of weighing to the `total_impact` calculation by multiplying\
    \ the value by the `avg_total_user_cost` |\n| `user_seeks` | Count of seeks in\
    \ user queries that would have occurred if the missing index had been built |\n\
    | `user_scans` | Count of scans in user queries that would have occurred if the\
    \ missing index had been built |\n\nThe final DMO, `sys.dm_db_missing_index_columns`,\
    \ returns a row for every column in the missing index recommendation. Because\
    \ this DMO is an inline table-valued function, the index handle for the missing\
    \ index recommendation is required in any queries, such as the example in Listing\
    \ 7-2. While not especially useful for retrieving the recommendations in a single\
    \ row, it can be useful when needing the columns for the recommendations returned\
    \ in separate columns, such as those in Figure 7-1.\n\n## Listing 7-2: Query for\
    \ sys.dm_db_missing_index_columns\n\n```sql\nSELECT column_id\n    ,column_name\n\
    \    ,column_usage\nFROM sys.dm_db_missing_index_columns(44)\n```\n\n![Image 81](index-175_1.png)\n\
    \n## Figure 7-1: Sample output for sys.dm_db_missing_index_columns\n\nTo help\
    \ you understand the recommendations you can retrieve from the missing index DMOs,\
    \ we’ll review the following two scenarios that create missing index recommendations:\n\
    \n*   Equality Columns\n*   Inequality Columns\n\nIn the equality scenario, we\
    \ want to look at the recommendation generated when there are specific value queries\
    \ from the database. In this scenario, we’ll look at the missing index recommendations\
    \ for three queries, included in Listing 7-3. The first query selects and filters\
    \ a date on the `DueDate` column. The second selects the `OrderDate` column and\
    \ filters a date on the `DueDate` column. Finally, the third selects the `AccountNumber`\
    \ column while filtering a value on both the `DueDate` and `AccountNumber` columns.\n\
    \nAfter running the query in Listing 7-1 to obtain the missing index recommendations,\
    \ we see that there are two recommendations based on these three queries, shown\
    \ in Figure 7-2. The first two queries resulted in the first recommendation, which\
    \ is evident by the inclusion of two `user_seeks` on the recommendation.\n\nThis\
    \ recommendation is for an index with the `DueDate` column as the index key. The\
    \ second recommendation includes two columns for the index. This recommendation\
    \ correlates to the third query in the script, which has two columns (`DueDate`\
    \ and `AccountNumber`) as predicates.\n\n## Listing 7-3: Equality Columns Scenario\n\
    \n```sql\nUSE AdventureWorks2012\nGO\n\nSELECT DueDate FROM Sales.SalesOrderHeader\n\
    WHERE DueDate = '2005-07-13 00:00:00.000'\nGO\n\nSELECT OrderDate FROM Sales.SalesOrderHeader\n\
    WHERE DueDate = '2010-07-15 00:00:00.000'\nGO\n\nSELECT AccountNumber FROM Sales.SalesOrderHeader\n\
    WHERE DueDate = '2005-07-13 00:00:00.000'\n    AND AccountNumber = '10-4020-000676'\n\
    GO\n```\n\n![Image 80](index-174_1.png)\n\n## Figure 7-2: Missing index recommendations\
    \ for the Equality Columns scenario\n\nAn important aspect to missing index recommendations\
    \ can be discovered while looking at the second of the recommendations from the\
    \ first scenario. In that recommendation, the columns for the equality are `DueDate`\
    \ and `AccountNumber`, and it appears they are recommended in that order. The\
    \ order of the columns in the recommendation does not have any bearing on the\
    \ most useful order of the columns in the index. As you might already know, indexes\
    \ should be designed with the most unique columns at the leftmost side of the\
    \ index. In this case, using the code in Listing 7-4, we are able to determine\
    \ that there are 1,124 unique `DueDate` values and 19,119 unique `AccountNumber`\
    \ values. The index would be better served with the `AccountNumber` column leading\
    \ on the left side of the index. While the index recommendations provide value,\
    \ you must always check to verify the most useful order of the columns in the\
    \ index.\n\n## Listing 7-4: Column Uniqueness\n\n```sql\nUSE AdventureWorks2012\n\
    GO\n\nSELECT COUNT(DISTINCT DueDate) AS UniquenessDueDate\nFROM Sales.SalesOrderHeader\n\
    \nSELECT COUNT(DISTINCT AccountNumber) AS UniquenessAccountNumber\nFROM Sales.SalesOrderHeader\n\
    ```"
