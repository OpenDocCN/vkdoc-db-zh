    Using the answers just shown, follow these steps to create a new data collector
    set in `Perfmon`:

    1. To open `Perfmon`, click on **Start** à **Administrative Tools** and select
    **Performance Monitor**.

    2. When `Perfmon` is open, expand **Data Collector Sets**. Right-click **User
    Defined**, and select **New** from the context menu.

    3. The dialog box shown in Figure 18-2 appears. This is where you have a choice
    to make. If you are new to `Perfmon`, you might want to choose **Create From A
    Template** so that you can use predefined options. After you have worked with
    `Perfmon` a few times, choosing **Create Manually** is the way to go. The manual
    mode allows you to create a data collector that is customized to the situation.
    Make your choice, and click **Next**.


    **Figure 18-2.** Creating a manual data collector.


    4. The next step is to define what type of data you will collect (as shown in
    Figure 18-3). Normally, you will choose **Performance Counter** because you can
    use this option to collect the performance data from the system. However, as you
    can see, there are other options in the dialog box you can use to capture more
    data about a server.


    **Figure 18-3.** Creating a performance counter data collector.


    5. After you select **Performance Counter** and click **Next**, you need to select
    the objects you want to capture (as shown in Figure 18-4). There are many options,
    which can be daunting. Before you choose any objects, think back to the core areas
    of the system: CPU, network, disk, memory, and `SQL Server`. The goal is to capture
    high-level data for each of these areas. For the scenario defined earlier, the
    counters defined in Table 18-4 will be used. You can use this configuration as
    a starting point for any system where you want to gain high-level insight into
    how busy the system is, the system’s health, and the system’s pain points.


    **Figure 18-4.** Displays the objects that can be selected for monitoring SQL
