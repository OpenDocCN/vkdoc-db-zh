    creates a logical backup file called a *data-tier application* (DAC) file.


    When the file is created on a local disk, it has a .bacpac extension, so it is
    also referred to as a BACPAC file.


    You can use the BACPAC file to copy databases from the cloud to your on-premises
    SQL Server databases, and back. Because the BACPAC file contains objects specific
    to the release of the database being backed up, you might experience errors when
    importing a BACPAC file on a version of SQL Server prior to SQL


    Server 2012.


    When you are exporting a SQL Database instance to a BACPAC, you are essentially
    creating a blob device in a Windows Azure Storage Account you own. Figure 12-10
    shows you the information you need to provide when exporting a database. In addition
    to providing the database credentials, you need to provide the path of the blob
    that will be created and the access key needed to access your storage account.
    The blob path contains the storage account and the blob name (mystorageaccount
    and blobbackup001, respectively, in my example).


    ***Figure 12-10.** Exporting a database using the Import/Export feature.*


    If you want to create another database in the cloud with this blob, you need to
    create an empty SQL


    Database instance and run the Import Wizard from the Windows Azure Management
    Portal. If you want to create a database on a local SQL Server instance, you first
    need to download the blob to a local machine and then use SQL Server Management
    Studio to import this file into a newly create database.


    ![Image 156](index-318_1.png)


    chapter 12 ■ WindoWs azure sQL database for dbas


    n **Note** You should know that the export process does not create a backup file;
    it creates a copy of a database and does not ensure transactional consistency.
    If you want to create a blob with transactional consistency, you first need to
    use the CREATE DATABASE … AS COPY OF… command, and then export the copied database
    after the copy operation has completed.


    Cost of SQL Database


    The SQL Database service can cost you just a few dollars a month to hundreds or
    even thousands of dollars, depending on your needs. Generally speaking, you pay
    for what you use; the more database space you need and the more network traffic
    you generate, the more you will pay. The total cost for using SQL


    Database is made up of a flat rate that varies based on the amount of data stored
    and the outbound network traffic generated in a given month.


    At the time of this writing, a 1-GB SQL Database instance costs $9.99 per month,
    plus 12 cents for each GB of outbound bandwidth consumed. The minimum amount you
    can pay for a SQL Database is $4.99 per month if you consume only 100 MB of storage
    in a 1-GB database instance. A 150-GB SQL Database instance costs $225.78 per
    month, excluding the bandwidth cost. As you can probably guess, the price per
    GB goes down with a larger database, as you can see in Figure 12-11.


    ***Figure 12-11.** Monthly cost of a SQL Database instance per GB of storage in
    US dollars.*


    In the case of a federated environment, you might need multiple database instances;
    each federated database instance incurs its own cost. So if you have 25 federated
    members of 1 GB each and a root database of 100 MB, you would pay about $254.75
    (25 * $9.99 + $4.99) plus the combined outbound bandwidth generated by all your
    databases.


    n **Note** Make sure to check the latest pricing on the Microsoft website. Visit
    [http://www.microsoft.com/](http://www.microsoft.com/)


    azure, and use the price calculator provided on this website.


