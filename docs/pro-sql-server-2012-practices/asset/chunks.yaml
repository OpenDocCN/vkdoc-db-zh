    \ I/O，更重要的是，识别相关的停顿。I/O 停顿并非坏事，它们必然会发生。但是，如果您发现文件之间存在显著差异，并且发现您的日志文件有大量与之相关的停顿，您需要确定它们是与检查点相关还是正常操作。将这些信息关联起来的一个好方法是通过每个服务器的等待统计信息，这些信息可通过\
    \ `sys.dm_os_wait_stats` DMV 获取。此 DMV 也是累积的，并提供有关您整体等待类型的极佳信息。借助此 DMV 中的数据，您可以开始找出导致\
    \ I/O 停顿的原因。\n\n即使有了这部分信息，可能仍不清楚需要处理什么。这时，会话级别的信息就开始变得有价值了。\n\n> **注意** 有时我会直接深入研究会话级别的信息，但该信息也可能产生误导。I/O\
    \ 模式在您的环境中会随着时间的推移（一天、一周、一个月甚至一年）而变化。\n\n只要它是查询，以下查询将开始提供导致您的 I/O 的实际 T-SQL。当然，外部事件也可能导致\
    \ I/O，但这些项目通常是次要于在专用 SQL Server 服务器上驱动 I/O 的因素。\n\n```sql\nSELECT\n    Rqst.session_id\
    \ as SPID,\n    Qstat.last_worker_time,\n    Qstat.last_physical_reads,\n    Qstat.total_physical_reads,\n\
    \    Qstat.total_logical_writes,\n    Qstat.last_logical_reads,\n    Rqst.wait_type\
    \ as CurrentWait,\n    Rqst.last_wait_type,\n    Rqst.wait_resource,\n    Rqst.wait_time,\n\
    \    Rqst.open_transaction_count,\n    Rqst.row_count,\n    Rqst.granted_query_memory,\n\
    \    tSQLCall.text as SqlText\nFROM sys.dm_exec_query_stats Qstat\nJOIN sys.dm_exec_requests\
    \ Rqst ON\n```"
- fmt: "# Chapter 13 ■ I/O: the UntOld StOry\n\n![Image 161](index-334_1.png)\n\n\
    `Qstat.plan_handle = Rqst.plan_handle AND Qstat.query_hash = Rqst.query_hash`\n\
    \n`CROSS APPLY sys.dm_exec_sql_text (Rqst.sql_handle) tSQLCall`\n\nNow we’re getting\
    \ somewhere. In the result set in Table 13-4, you see which SPIDs are driving\
    \ the I/O at this moment in time.\n\n**Table 13-4.** Table containing a sample\
    \ output of the referenced DMV query\n\n| SPID | total_reads | total_writes |\
    \ physical_reads | logical_reads | last_CurrentWait | last_wait_type | wait_time\
    \ | SqlText |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :---\
    \ |\n| | | | | | | | | `WAITFOR` |\n| | | | | | | | | `WAITFOR` |\n| | | | | |\
    \ | | | `exec prc...` |\n| 18549821 | 741189 | | | | | | `insert tab...` |\n|\
    \ | | | | | | | | `exec prc...` |\n| | | | | | | | | `exec prc...` |\n| | | |\
    \ | | | `CXPACKET` | | |\n| | | | | | | `CXPACKET` | | |\n| | | | | | | | `DECLARE\
    \ @Var…` |\n| | | | | | | `WRITELOG` | | |\n| | | | | | | `WRITELOG` | | |\n|\
    \ | | | | | | | `DECLARE @Var…` |\n| | | | | | | `ASYNC_IO_COMPLETION` | | |\n\
    | | | | | | | `ASYNC_IO_COMPLETION` | | |\n| | | | | | | | `BACKUP db..` |\n|\
    \ | | | | | | `WRITELOG` | | |\n| | | | | | | `WRITELOG` | | |\n| | | | | | |\
    \ | `IF @@TRAN` |\n\nIn this example, the database server is rebuilding a clustered\
    \ index, running some long-running stored procedures with complex logic, deleting\
    \ data from a table with blobs in them, and backing up a large database. Some\
    \ of these tasks require a significant amount of I/O. As a result, you see in\
    \ the wait types that the wait type for the backup SPID (111) is `ASYNC_IO_COMPLETION`,\
    \ which is SQL Server waiting for an I/O completion event. SPID 104 and 122 are\
    \ actually of more concern because they are waiting for their respective data\
    \ to be committed (written) to the transaction log. In this event, it would have\
    \ been wise to not run backups and stored procedure calls known to have high I/O\
    \ while rebuilding a clustered index.\n\n**Figure 13-5.** Illustration of server\
    \ activity on a SAN under load.\n\nAs you can see, the response time ranges from\
    \ 11 to 27 ms. In this environment, that’s a very long time. Coupled with the\
    \ query results from Table 13-4, it illustrates that the server was very busy\
    \ during this time.\n\nIn the result set, it’s helpful to know exactly what this\
    \ query was doing. With that information, you can begin to dig deeper into your\
    \ specific environment and address the I/O contention on two fronts: hardware\
    \ and software (T-SQL). From here, you can choose to tune a particular query or\
    \ take a broader view and interrogate the system tables about which indexes might\
    \ be driving your I/O.\n\nThe following query provides usage statistics for your\
    \ indexes:\n\n```sql\nSELECT\n    a.name as Object_Name,\n    b.name as Index_name,\n\
    \    b.Type_Desc,\n    c.user_seeks,\n    c.user_scans,\n    c.user_lookups,\n\
    \    c.user_updates,\n    c.last_user_seek,\n    c.last_user_update\nFROM sys.objects\
    \ AS a\nJOIN sys.indexes AS b ON a.object_id = b.object_id\nJOIN sys.dm_db_index_usage_stats\
    \ AS c ON b.object_id = C.object_id\n    AND b.index_id = C.index_id\nWHERE A.type\
    \ = 'u'\nORDER BY user_seeks+user_scans+user_updates+user_lookups desc\n```\n\n\
    This data set can help narrow down which of the tables in the query or stored\
    \ procedure returned is the most or least used. Additional overhead could be due\
    \ to a missing index, a fragmented index, index scans, or RowID lookups (bookmark\
    \ lookups).\n\nAnother interesting query can be found by interrogating the `sys.dm_os_schedulers`\
    \ object like this:\n\n```sql\nSELECT MAX(pending_disk_io_count) as MaxPendingIO_Current,\n\
    \    AVG(pending_disk_io_count) as AvgPendingIO_Current\nFROM sys.dm_os_schedulers\n\
    ```\n\nUnlike the previous queries in the chapter, the results of this query are\
    \ solely based on current activity and do not represent historical data.\n\n##\
    \ Addressing a Query\n\nWhat you’ve just gone through can produce a lot of data,\
    \ perhaps an overwhelming amount. However, perhaps you found that there’s a particular\
    \ query that is the most expensive from an IO perspective. Perhaps you opened\
    \ this chapter with one already in mind. The question is, how to address it. Before\
    \ that however, you first must understand some characteristics around this query.\n\
    \nThere are many good books on execution plans and I’m not going to spend time\
    \ in this chapter discussing them as there’s an alternate manner to evaluate physical\
    \ reads for a specific query or T-SQL batch. By using the statement `SET STATISTICS\
    \ IO ON`, you can view some valuable characteristics about where a query is obtaining\
    \ its data (disk or memory).\n\nThe following query was written for the `AdventureWorksDW2008R2`\
    \ database:\n\n```sql\nDBCC DROPCLEAN BUFFERS -- ensures that the data cache is\
    \ cold\nDBCC FREEPROCCACHE -- ensures that the query plan is not in memory\n--*Warning,\
    \ running this in a production environment can have unintended consequences.\n\
    -- [Additional details on these DBCC commands can be found at: http://msdn.microsoft.com/en-us/library/ms187762.aspx\
    \ and http://msdn.microsoft.com/en-us/library/ms174283(v=sql.105).aspx]\nSET STATISTICS\
    \ IO ON;\nUSE AdventureWorksDW2008R2\nGO\ndeclare @ProductKey int = (select MIN\
    \ (ProductKey) from dbo.FactInternetSales)\nSELECT\n    SUM(UnitPrice) as Total_UnitPrice,\
    \ AVG(UnitPrice) as Average_UnitPrice,\n    MIN(UnitPrice) as Lowest_UnitPrice,\
    \ MAX(UnitPrice) as HighestUnitPrice,\n    SUM(OrderQuantity) as Total_OrderQuantity,\
    \ AVG(OrderQuantity) as Average_OrderQuantity,\n    MIN(OrderQuantity) as Lowest_OrderQuantity,\
    \ MAX(OrderQuantity) as HighestOrderQuantity,\n    SUM(SalesAmount) as Total_SalesAmount,\
    \ AVG(SalesAmount) as Average_SalesAmount,\n    MIN(SalesAmount) as Lowest_SalesAmount,\
    \ MAX(SalesAmount) as HighestSalesAmount,\n    P.EnglishProductName, D.EnglishMonthName,\
    \ D.FiscalYear,\n    AVG(P.ListPrice) / AVG(FIS.UnitPrice)) as ProductListPriceVersusSoldUnitPrice\n\
    FROM dbo.FactInternetSales FIS\nINNER JOIN dbo.DimProduct P ON FIS.ProductKey\
    \ = P.ProductKey\nINNER JOIN dbo.DimDate D on FIS.OrderDateKey = D.DateKey\nWHERE\
    \ FIS.ProductKey = @ProductKey\nGROUP by P.EnglishProductName, D.EnglishMonthName,\
    \ D.FiscalYear\n```\n\nThe output of this query isn’t relevant, but if you click\
    \ on the messages tab you should see something similar to the following:\n\n```\n\
    Table 'FactInternetSales'. Scan count 1, logical reads 2, physical reads 2, read-ahead\
    \ reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
    (13 row(s) affected)\nTable 'Worktable'. Scan count 0, logical reads 0, physical\
    \ reads 0, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob\
    \ read-ahead reads 0.\nTable 'DimDate'. Scan count 1, logical reads 21, physical\
    \ reads 1, read-ahead reads 22, lob logical reads 0, lob physical reads 0, lob\
    \ read-ahead reads 0.\nTable 'FactInternetSales'. Scan count 1, logical reads\
    \ 1036, physical reads 10, read-ahead reads 1032, lob logical reads 0, lob physical\
    \ reads 0, lob read-ahead reads 0.\nTable 'DimProduct'. Scan count 0, logical\
    \ reads 2, physical reads 2, read-ahead reads 0, lob logical reads 0, lob physical\
    \ reads 0, lob read-ahead reads 0.\n```\n\nThis output shows us some very interesting\
    \ items. If you focus on the results for physical reads and read-ahead reads,\
    \ you can begin to figure out how to better optimize this query or the objects\
    \ it’s pulling data from.\n\nThe most interesting result I see here is the second\
    \ reference to the object `FactInternetSales`. It has a physical read count of\
    \ 10 and read-ahead reads of 1,032. In total, 1,042 data pages were retrieved\
    \ from disk and placed into cache to satisfy the query. That’s a lot of data for\
    \ a result set of only 13 rows. Granted, there is a `GROUP BY` involved, so it\
    \ needed more rows in order to satisfy the `WHERE` clause, which alone returns\
    \ 2,230 records.\n\nSo the question is, how can you make this query better with\
    \ this data alone? If I run the statement `sp_help FactInternetSales`, part of\
    \ the output for reads looks like Figure 13-6.\n\n**Figure 13-6.** Illustration\
    \ of the output of `sp_help FactInternetSales`.\n\nThis alone tells me that the\
    \ query optimizer might try to use the index `IX_FactInternetSales_ProductKey`\
    \ to satisfy the `WHERE` criteria, and it will most certainly use the clustered\
    \ index `PK_`"
