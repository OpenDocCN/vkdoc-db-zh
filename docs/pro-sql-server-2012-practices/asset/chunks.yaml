- fmt: "# Chapter 13: I/O – The Untold Story\n\n## I/O Performance Considerations\n\
    \nYou often have key characteristics in hand about your environment and you can\
    \ use these to configure a test with `SQLIO`. This utility measures your disk\
    \ throughput and can be configured for the type of I/O you are interested in testing\
    \ (read or write), the number of threads, the block size in KB (IOP size), among\
    \ many other factors. It will test contiguous reads and/or writes and random reads\
    \ and/or writes. Running this is intrusive to your disk subsystem—don’t run it\
    \ in the middle of your business day. If you run this test, modify your queue\
    \ depth, and then run it again, you can find the ideal balance for your specific\
    \ workload on your specific hardware. The download for this can be found here:\
    \ [http://www.microsoft.com/en-us/download/details.aspx?id=20163](http://www.microsoft.com/en-us/download/details.aspx?id=20163).\n\
    \nConsiderations about your I/O workload differ when working with virtual environments\
    \ because the operating system is often running on the same set of spindles as\
    \ your data files. These additional considerations can present opportunities for\
    \ you to work with your virtualization expert and your storage guru to perhaps\
    \ isolate the I/O required for the operating systems in the environment from your\
    \ database files. A good way to illustrate the I/O required is with the `Performance\
    \ Monitor` data discussed earlier and by using the `SQLIO` tool I just discussed.\n\
    \n## Impact of SQL Server Features on I/O\n\nFeatures of `SQL Server` will also\
    \ impact your I/O. A great example of this is backup compression. When you use\
    \ backup compression, fewer I/O requests are required to write the data file because\
    \ it’s compressed in memory before it writes to the disk. Another `SQL Server`\
    \ feature is Snapshot Isolation, which enables `SQL Server` to use optimistic\
    \ locking rather than the default pessimistic locking scheme. The difference is\
    \ considerable. Pessimistic locking can be considered `serialized`, meaning that\
    \ modifications can occur for only one column at a time. With optimistic locking,\
    \ Microsoft introduced a way for multiple requests to modify the same column.\
    \ The reason that it’s important in this context is that the row version store\
    \ required for Snapshot Isolation is in the `TempDB` database and can use `TempDB`\
    \ aggressively, thereby increasing your I/O footprint. Again, this is an excellent\
    \ feature, but one that must be tested in your specific environment.\n\n> **Note**\
    \ I’ve had success with increasing throughput and concurrency in `TempDB` with\
    \ Snapshot Isolation by implementing trace flag `–T1118` at startup. You can find\
    \ out more at [http://support.microsoft.com/kb/2154845](http://support.microsoft.com/kb/2154845).\n\
    \n## Hardware Innovations for I/O\n\nOver the past several years, a few companies\
    \ have risen to the forefront of I/O performance. I’ve had the pleasure of working\
    \ with products from Fusion-io that provide very fast I/O throughput. I’ve used\
    \ Fusion-io cards for `TempDB`, file stores, and even transaction logs. The throughput\
    \ you can achieve with a Fusion-io card far exceeds that of traditional spindles,\
    \ but the real value comes from the decreased latency.\n\nThe latency of their\
    \ entry-level product is measured in microseconds. This is pretty impressive considering\
    \ that you measure I/O time in milliseconds. If you are considering purchasing\
    \ this product or have a product similar to this, data files that require ultra-low\
    \ latency benefit from this type of storage.\n\n## Compression's Role in I/O Performance\n\
    \nCompression is another feature that can benefit your I/O throughput and overall\
    \ database performance, as it relates to I/O. There are two primary types of compression\
    \ to be aware of. The first is `backup compression`. When creating a backup, you\
    \ can choose to compress the backup. This decreases the amount of data that has\
    \ to be written to disk. The second is `data compression`. Data compression comes\
    \ in two primary forms: row and page. Chapter 14 dives into the details of data\
    \ compression, but what you need to know for the purpose of this chapter is that\
    \ data compression, if applied correctly, can significantly increase your database\
    \ throughput, decrease your latency (read and write time), and improve the response\
    \ time of your database server. It can also decrease memory pressure that you\
    \ might be experiencing. There are many caveats to the case for using data compression\
    \ and deciding which tables and index to compress in which fashion is critical.\
    \ So be sure that you read the chapter on this topic and that you spend time to\
    \ test.\n\n## Partitioning to Reduce IOPS\n\nPartitioning is another excellent\
    \ avenue for decreasing your IOPS. Partitioning, in a nutshell, is akin to breaking\
    \ your table up into many different tables. A quick example of this will help\
    \ you understand the value of partitioning and, more importantly, the concept\
    \ of `partition elimination`.\n\nA simple illustration with the `Transactions`\
    \ table that has a `TransactionDate` column will help. In this table, let’s say\
    \ that you have one million records ranging from 2005 to 2010 (five years). For\
    \ the purpose of this example, assume that the data distribution across each year\
    \ is identical. For each year, there are 250,000 transactions (rows). When you\
    \ run a query similar to:\n\n```\nSELECT COUNT (*), Convert(date, TransactionDate)\
    \ as TransactionDate \nFROM Transactions \nWHERE TransactionDate BETWEEN '06/01/2005'\
    \ AND '06/01/2006'\n```\n\nthe database engine will need to access `n` pages at\
    \ the root and intermediate levels.\n\nIf partitioning is implemented on this\
    \ table—specifically, on the `TransactionDate` column—you can decrease the footprint\
    \ of the data that `SQL Server` needs to evaluate your particular query. Another\
    \ way to think about this partitioning concept is akin to one of having multiple\
    \ tables which contain the data in the `Transactions` table. In this example,\
    \ if you had a `Transactions` table for each year, `SQL Server`’s work would be\
    \ significantly less. It would also make for some challenging T-SQL or implementation\
    \ of a distributed partition view (DPV), but let’s keep it simple and just partition\
    \ the table and allow `SQL Server` to eliminate what it doesn’t need to read.\
    \ There are many good resources available to learn more about this subject, and\
    \ one of my favorites can be found here: [http://msdn.microsoft.com/en-us/library/dd578580(v=sql.100).aspx](http://msdn.microsoft.com/en-us/library/dd578580(v=sql.100).aspx).\
    \ Details specific to `SQL Server 2012`, including a change from previous versions\
    \ of `SQL Server` as it relates to the quantity of partitions a table can contain,\
    \ can be found here: [http://msdn.microsoft.com/en-us/library/ms190787.aspx](http://msdn.microsoft.com/en-us/library/ms190787.aspx).\n\
    \n## Conclusion\n\nAt times, there are no easy answers for dealing with the increase\
    \ in data volumes that many of you experience on a daily basis. However, there\
    \ are tools at your disposal to help you define and then articulate your specific\
    \ situation. There are also design considerations you can help introduce or implement\
    \ in your environment. It all begins with knowing your IOP pattern and being able\
    \ to discuss it at a moment’s notice.\n\nThen work on the ideas you have gleaned\
    \ from this chapter. Your IOP pattern will change over time and with new features\
    \ and functionality. Keep your IOP profile up to date, take your storage guru\
    \ out to lunch, build the bridge of communication and trust with your peers. Before\
    \ you know it, you will be able to look this 800-pound I/O gorilla in the eye\
    \ and not blink.\n\n# Chapter 14: Page and Row Compression"
