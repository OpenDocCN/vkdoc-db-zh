    ![Image 145](img/index-312_2.png)

    ![Image 146](img/index-312_3.png)

    ![Image 147](img/index-312_4.png)

    ![Image 148](img/index-312_5.png)

    ![Image 149](img/index-312_6.png)


    ### 执行计划

    执行计划是另一个强大的工具，可用于理解和解决性能问题。你也可以通过 SQL Database 管理门户 (SDMP) 查看执行计划。然而，该门户在几个方面的体验与
    SSMS 略有不同。


    首先，图形化表示中提供的符号不同，并且颗粒度较低。例如，索引查找操作的符号在门户中与在 SSMS 中看起来不同。（有关 SDMP 中显示的一些符号，请参见表
    12-7）。此外，门户对聚集索引查找和非聚集索引查找操作提供相同的符号。尽管门户中的某些符号可能不如 SSMS 中的细致，但其描述足够详细。


    **表 12-7.** SQL Database 管理门户中显示的执行计划符号部分列表


