  trans: '# 第 8 章 ■ 发布管理


    或者，如果变更需要修改现有对象，你可能需要了解其活动类型，以及所提出的变更是否会影响它、将其锁定，或导致该对象在一段时间内无法访问。如果是这样，你如何确保拓扑结构的其余部分、系统、应用程序等受到的影响最小？在此次变更发布到生产环境之前，你可能需要优雅地关闭相关服务，尽早发现这一点将有助于你创建执行此优雅关闭的正确步骤。


    当变更影响到复制时，你可能需要采取特殊预防措施，以确保复制继续按当前设计和实现的方式运行。在复制环境中引入此变更可能需要执行额外的步骤，而这些步骤在非复制环境中是不必要的。也许你依赖于一个难以维护的第三方复制方案，这可能会产生许多额外步骤。无论如何，在制定发布计划时了解对复制的影响将有所帮助。


    ![图片 105](img/index-225_1.png)


    关键在于，总有进一步挖掘的空间，以尽可能多地了解情况。思考这一变更可能如何影响你对数据库系统的常规、自动化甚至手动维护。你还需要将此纳入发布计划中进行规划。如果你正在向系统中引入新的数据库，请确保你的常规维护流程能覆盖这个新数据库，并对其执行必要的任务。你可能需要创建或修改备份作业。其他维护流程也很可能受到影响。识别并规划这些变更。


    如果你正在更改任何作业，请确保收集有关该作业的详细信息。检查它将在何时执行。你需要确保这不会与现有其他作业冲突。检查作业的详细信息，查看该作业将影响什么。因一次变更而对新的或现有作业产生负面影响是很糟糕的。


    如果你的变更影响到任何 `DTS` 包或 `SSIS` 包，那么有许多细节你应该调查。有些配置和步骤你需要审查，同时还需要确定在包的不同步骤中将影响哪些对象。


    ## 发布步骤


    在创建执行发布的步骤时，请意识到这些步骤在大多数环境中会重复执行。某些步骤可能在有些环境中不会发生，而有些环境可能需要额外的步骤。这将取决于你如何设置每个环境。我建议你先为一个环境创建这些步骤，然后根据需要为其他每个环境进行调整。这意味着可以为所有环境创建通用步骤，然后可以从原始步骤中复制出多个环境，为每个环境创建独特的步骤。确保你详细说明了每个环境所需的步骤。要有条理，将它们全部列出。我发现为每个环境创建单独的步骤列表并在任务执行时逐一勾选是至关重要的。


    ```

    图 8-6 展示了计划模板中的发布步骤部分。

    ```


    列出将被此次发布触及的每个数据库，以及这些数据库的工作人员——需要告知他们即将进行的发布。这对于保持组织性很重要。此数据库列表也将成为一系列步骤，你将采取这些步骤以确保为每个受影响的数据库创建快照。为每个数据库架构生成快照，将为你提供一个基线，用于在发布之前、期间和之后进行比较。


    有许多选项可以生成这些快照。第三方应用程序可以执行此任务，也可以直接从 `Management Studio`、`SMO` 或 `PowerShell` 脚本化对象。我最喜欢的工具之一是
    `Red Gate SQL Compare`，它可以将快照生成为一个包含所选数据库架构的单一文件。然后，你可以在以后将此快照与同一数据库的另一个快照进行比较。比较结果将显示你的变更所修改的不同对象。主要的一点是，这是一个重要的执行步骤。为不同的数据库架构生成前后快照，并利用此比较来显示受影响的内容，可以在必要时协助回滚。


    除了生成快照外，可能还需要执行其他步骤来为发布做准备。这些可能包括优雅地关闭其他服务或应用程序，或者你可能需要更改复制配置以正确准备发布。每个步骤都需要详细说明、深思熟虑和规划。你应该将准备任务识别并记录为单独的步骤。


    在某个时间点，你需要列出所有将被执行以达成所需变更的对象和/或脚本。你可以直接在 `Management Studio` 中执行这些变更，这将需要有人生成脚本。


    你也可以使用工具在生产环境和较低级环境之间执行比较，并通过此生成的脚本来实施变更。你可以使用一个发布工具来控制变更的执行，记录每一步骤，并具备回滚失败变更的能力。创建此工具需要花费一些时间和精力，但它将帮助你优雅地将变更发布到你的环境中。使用比较工具可以让你手动决定哪些对象将被比较并最终被修改。


    无论你使用比较工具还是 `Management Studio`，都需要由密切参与所请求变更的某人来创建详细说明变更的脚本。还需要生成一个可以执行回滚的脚本。创建包含所有变更的单个脚本，或包含各个变更的多个脚本，这是你的特权。单个或多个脚本也会影响回滚过程。你如何执行此变更将是发布过程中的一个重要因素，它使得变更能够优雅且受控地进行。


    如果你的拓扑结构中涉及复制，你的发布可能需要一些额外的步骤。你可能需要删除订阅和/或文章，重新添加文章，停止分发代理，刷新订阅，甚至可能需要重新快照发布。这些步骤需要在类似的复制环境中进行测试，以确保所采取的步骤能够成功。


    正如你详细说明了优雅关闭应用程序和服务的所有步骤一样，你现在需要详细说明将它们重新无缝开启所需的反向步骤。按正确的顺序列出每一个步骤。


    在所有内容都发布完成后，生成另一个架构快照，并将其与原始快照进行比较。这将证明哪些对象被修改了。这可以用于生成报告，展示此次发布完成了什么。


    在发布计划中执行每个步骤时，将其标记为已完成。尽管这仅供你自己使用，但将来你可以在许多场合参考此文档，它肯定有助于规划未来类似的发布。将其作为已采取或未采取哪些步骤的证明。


    让这份文档验证你的发布过程步骤是以正确的顺序执行的。你始终可以参考这些内容，并对你的流程和发布计划模板进行修改，以容纳新的信息、新的知识以及实现成功发布的新方法。'
- fmt: 'Create this document with the intent that you may hand it over to another
    individual to perform all the steps themselves, without your involvement. This
    will force you to include a level of detail and explanation that will make the
    steps easily accomplished. Being as thorough as possible with all the steps will
    foster success.


    # CHAPTER 8 ■ RElEAsE MAnAgEMEnT


    ## Document Repository


    Because we have been creating several files, including the release plan and release
    plan template documents, a folder structure to contain all of these files will
    assist you in organizing your releases. Acquire a central location that everyone
    involved with the release process can access to store documents associated with
    each release. You will be generating pre and post snapshots of each database to
    be affected, the actual scripts that will effect change, and other files. All
    these files can reside in the following folder structure to easily help:


    - Release name

    - Pre snapshots

    - Post snapshots

    - Database objects

    - Web objects

    - Application objects

    - Release plan

    - Other


    As soon as you receive the request to make a change, create a location (similar
    to the previous suggestion) to store all the relevant files and information. Keep
    adding to this repository as you create files.


    You could store these files in your version control system as well. Ensure that
    you store them somewhere that is secure and can allow you and others to access
    them during the release period, as well as before and after.


    This will ultimately be the location from which you pull all relevant information
    to perform the production release. If done properly, you will have used these
    files for release to each environment as you march this release to production.
    Keep all these files as proof and reference of the actual release. You can even
    refer your supervisor to this location to review your work for year-end reviews.


    ## Conclusion


    Accept change, embrace it, plan for it, and then gracefully introduce it into
    your environment. And then repeat. As you repeat, you will learn how to modify
    your release process to achieve that perfect balance where change is introduced
    into your topology, yet risk is minimized and the impact is graceful. You can
    do this, though you probably can’t do this alone. You will need to include others
    along the way. Realize that there are quite a few tasks, several documents, and
    many considerations that have been discussed—quite a few, indeed! Please take
    the necessary time to dig into all these and formulate your own release process.


    Do it for your systems. Do it for yourself. Become the hero.


    # CHAPTER 9 ■ COMPLIANCE AND AUDITING


    ## By Jonathan Gardner


    In the United States, the Health Insurance Portability Accountability Act (HIPAA),
    Sarbanes-Oxley, and Payment Card Industry Data Security Standard (PCI DSS) make
    up just a sampling of the regulatory issues faced by today’s businesses. Today’s
    database professional is on the front lines of ensuring compliance with these
    regulations. Database administrators (DBAs) can use auditing to monitor and document
    access and changes to databases that are subject to these regulations. While auditing
    is only part of ensuring compliance, many times it is the only tool that a database
    professional has control over.


    Microsoft introduced auditing in SQL Server 2008 as a feature to satisfy requirements
    related to regulatory compliance with the laws mentioned earlier and others. SQL
    Server 2012 provides even more granular audit controls, making it an indispensable
    addition to the DBA’s toolset.


    This chapter will detail the some of the major laws DBAs must ensure their organizations
    comply with, including how they are enforced and what that means for database
    professionals. The chapter will also cover the new auditing features introduced
    in SQL Server 2012 and walk step by step through setting up auditing.


    ## Compliance


    Compliance laws rarely go into detail about how to protect or audit data. Understanding
    the law and what it is trying to protect arms database professionals with the
    knowledge to properly align their organization with the law’s mandate.


    ### Sarbanes-Oxley


    The Sarbanes-Oxley Act of 2002 (SOX) was established in the wake of the accounting
    scandals at Enron, WorldCom, and others. United States public companies and accounting
    firms are subject to SOX. While the bill contains new corporate governance rules,
    Section 404 “Management Assessment of Internal Controls” is the section that database
    professionals need to understand.


    Section 404 states that an annual report must be generated to show “management’s
    responsibility for establishing and maintaining an adequate internal control structure
    and procedures for financial reporting”. It also requires management to perform
    “an assessment of the effectiveness of the internal control structure and procedures
    for financial reporting.”


    It is difficult for these statements to be any more vague regarding how the database
    professional should ensure compliance. The actual law does not define what needs
    to be done to ensure compliance. It simply states that “internal controls” are
    required and must be audited on an annual basis.


    Since no specific definition is provided in the law, the parties responsible for
    enforcing and monitoring SOX should provide the necessary guidance. Therefore,
    the U.S. Securities and Exchange Commission (SEC) and the Public Company Accounting
    Oversight Board (PCAOB) are charged with ensuring SOX compliance.


    The SEC issued a final ruling on how compliance with the law should be ensured.
    This ruling stated that the framework defined by the Treadway Commission—in the
    Committee of Sponsoring Organizations (COSO) report “Internal Control – Integrated
    Framework”—should be used. The COSO report does not define the specifics of an
    IT Framework. Instead, it states “Policies and procedures that help ensure the
    continued, proper operations of computer information systems. They include controls
    over data-center operations, systems software acquisition and maintenance, access
    security, and application system development and maintenance. General controls
    support the function of programmed application controls. Other terms sometimes
    used to describe general controls are general computer controls and information
    technology controls.” The report defines effective internal controls as including
    the following:


    - Control Environment

    - Risk Assessment

    - Control Activities

    - Information and Communication

    - Monitoring


    **Note:** The full, SEC-issued final ruling on how compliance should be ensured
    can be found at http://www.sec.gov/rules/final/33-8238.htm.


    The PCAOB released Auditing Standard No. 2: An Audit of Internal Control Over
    Financial Reporting Performed in Conjunction with an Audit of Financial Statements.
    While this report discusses IT controls, it refrains from mentioning which IT
    controls need to be implemented.


    For the readers still following along at this point, both the PCAOB and the COSO
    mention the need for IT controls and an IT framework. However, they fail to actually
    recommend one.


    In 1996, the Information Systems Audit and Control Association (ISACA) released
    an IT framework called Control Objectives for Information and Related Technologies
    (COBIT). While the release of the COBIT framework occurred long before the 2002
    scandals, the framework is aligned with those that the PCAOB and COSO require.
    The COBIT 4.1 framework has been widely adopted as the framework used to comply
    with SOX requirements. For database professionals, this still does not provide
    clarity because there is little outlined in the framework that is specifically
    directed at them.


    **Note:** More information regarding COBIT can be found at http://www.isaca.org/Knowledge-Center/COBIT/Pages/Overview.aspx.'
