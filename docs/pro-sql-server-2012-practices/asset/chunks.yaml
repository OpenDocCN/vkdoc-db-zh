- fmt: '# SQL Server 性能计数器监控指南


    在评估服务器性能时，相对值（**relative**）很重要。例如，需要审查 `LogicalDisk(*)\Avg. Disk sec/Write` 的响应时间，确保其平均值低于
    10 毫秒。


    ## 数据库操作计数器


    `SQL Server SQLServer:Databases(*)\Log Flushes/sec`


    `SQL Server SQLServer:Databases(*)\Transactions/sec`

    这是建立服务器基线时需要审查的重要对象计数器。它衡量了数据库内每秒 `INSERT`、`UPDATE` 和 `DELETE` 操作的总数。需要在服务器级别和数据库级别审查
    `transactions/sec` 的总数。一个需要特别注意的点是，你应该审查在 `TEMPDB` 中发生的 `transactions/sec` 总数。这是衡量
    `TEMPDB` 内发生的操作总数的绝佳指标。


    ## 通用统计信息计数器


    `SQL Server SQLServer:General Statistics\Processes blocked`

    在任何系统中，特别是需要扩展的系统中，首先要排查的问题之一就是数据库阻塞链。如果此对象计数器大于零，则表示服务器存在阻塞链，需要在高峰事件发生前进行记录和解决。


    `SQL Server SQLServer:General Statistics\User Connections`

    此计数器测量连接到 SQL Server 的用户连接总数（包括活动和非活动连接）。每个连接都需要占用空间和资源来维护，因此需要分析收集到的用户连接配置数据，以确定所有连接池是否定义正确，以及旧连接的数量是否很低。旧连接是指超过
    24 小时或更长时间未使用的连接。可通过审查 `sys.sys_dm_connections.last_request_time` 时间来确定连接是否陈旧。


    ## 锁与闩锁计数器


    `SQL Server SQLServer:Latches\Average Latch Wait Time (ms)`

    `SQL Server SQLServer:Latches\Latch Waits/sec`

