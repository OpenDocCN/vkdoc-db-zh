    ## 更新统计信息


    此任务将构建并执行一个 `UPDATE STATISTICS` 语句。您可以选择数据库、表以及列或索引统计信息。您还可以选择完全扫描，或指定用于抽样的行百分比。


    ## 创建维护计划


    定期运行 `检查数据库完整性` 任务非常重要，并且可以轻松设置为维护计划。此任务对一个或多个数据库执行 `DBCC CHECKDB`，以验证每个页面上的数据一致性。


    要开始创建计划，请右键单击 `维护计划`，然后选择 `维护计划向导`。起始屏幕如图 10-14 所示。为计划指定一个描述性名称并输入描述。选择运行该作业的帐户。使用
    `更改` 按钮设置计划（选项将与代理作业相同）。


    ![Image 125](img/index-262_1.png)


    ![Image 126](img/index-262_2.png)


    ***图 10-14.** 创建维护计划*


    在如图 10-15 所示的“选择维护任务”屏幕上，选择您希望在此计划中完成的任务。对于本示例，选择 `检查数据库完整性`。


    ***图 10-15.** 在向导中选择维护任务*


    ![Image 127](img/index-263_1.png)


    如图 10-16 所示的“选择维护任务顺序”屏幕将允许您为所选任务排序。如果像本示例中只选择了一个任务，则排序选项不可用。


    ***图 10-16.** 选择计划中任务的顺序*


    下一步是选择要对其执行任务的数据库，如图 10-17 所示。您的选项如下：


    - 所有数据库

    - 系统数据库：`Master`、`model`、`msdb` 和 `tempdb`。

    - 所有用户数据库：除 `master`、`model`、`msdb` 和 `tempdb` 之外的所有数据库。

    - 这些数据库：选择一个或多个数据库


    除非某个数据库非常大或有其他特殊要求，否则最好检查所有数据库。


    选中“包括索引”选项将检查数据库中的索引页，这也是推荐的做法。


    ![Image 128](img/index-264_1.png)


    ***图 10-17.** 为“检查数据库完整性”任务选择数据库*


    如图 10-18 所示的“选择报告选项”屏幕是您设置计划日志记录选项的地方。“将报告写入文本文件”将在每次计划运行时生成一个 .txt 文件，包括诸如执行的步骤和错误等详细信息。默认选项是将这些文件保存到运行计划的服务器上，这将占用存储空间。请选择用于日志记录的磁盘，或选择其他服务器或网络位置来保存日志。“电子邮件报告”将在计划完成时向操作员发送电子邮件。


    ![Image 129](img/index-265_1.png)


    ***图 10-18.** “选择报告选项”屏幕*


    完成向导后，将创建该计划，并开始使用您创建的计划执行。要查看计划的详细信息，请在 `维护计划` 下双击计划名称。


    ### 其他选项


    选择任务只是计划的第一步。创建计划后，您可以选择控制任务流。流程控制允许您将两个或多个任务链接在一起，并且一个任务可以依赖于前一个任务的成功或失败。例如，您可以设置一个计划来重新组织索引，然后更新统计信息。因为这两者相关，所以使用一个计划而不是两个可以简化管理。


    还有一个维护计划日志文件查看器，可帮助您监视作业。在 SSMS 中，右键单击 `维护计划` 并选择 `查看历史记录`。您可以看到作业的成功或失败情况，以及执行时间，如果失败还包含错误信息。如果您设置了计划，请确保对它们进行监视！


    ### 可能的陷阱


    维护计划是设置实例基本管理的简单方法。但是，像任何其他功能一样，请确保您理解所选选项及其影响。例如，在 `重新生成索引` 任务中选择重新生成数据库的所有索引很容易，但执行该任务可能会由于任务执行期间的锁定和资源消耗而影响数据库对用户的可用性。


    ## SQL Server Integration Services


    SQL Server Integration Services 是为提取、转换和加载 (ETL) 操作而设计的工具。它经常用于从电子表格、平面文件或其他数据库系统等源获取数据，并将其导入
    SQL Server。它也用于将数据从一个 SQL Server 数据库传输到另一个数据库，无论是从生产环境到 QA 环境，还是从 OLTP 数据库到 OLAP
    数据库。


    `SSIS` 基于包的概念工作。一个包将有一个或多个与之关联的任务。维护计划中可用的许多任务在 `SSIS` 中也可用。您会找到 `备份数据库任务`、`检查数据库完整性任务`、`重新生成索引任务`、`重新组织索引任务`、`传输数据库任务`
    和 `更新统计信息任务`。任务可以配置、组合为一个包，并设置为自动执行。实际上，`SSIS` 是维护计划的基础！


    `SSIS` 中还提供了一些在其他地方不可用的任务，例如以下任务：


    - `传输数据库任务`：复制或移动数据库，在实例内或移动到不同实例。

    - `传输 SQL Server 对象任务`：将表、视图和存储过程等对象从一个实例复制到另一个实例。

    - `执行 SQL 任务`：执行 T-SQL 语句或存储过程。


    一个常见的管理任务是将登录名从一个实例传输到另一个实例。随着数据库的测试和发布，登录名可能从开发环境传输到 QA 环境，或从 QA 环境传输到生产环境。如果需要升级数据库或将其移动到其他服务器，则需要移动或重新创建登录名。


    编写或下载脚本是执行此任务的常用方法，但使用 `SSIS` 可能更高效。


    要构建 `SSIS` 包，您需要安装 `SQL Server Data Tools`，这是一个用于创建 `SSIS` 包、SSAS 多维数据集和 SSRS
    报告的环境。`SSDT` 绝不应安装在数据库服务器上，因为开发和运行包会消耗 CPU、内存和磁盘资源。请将该软件安装在您的工作站上以开发包；完成后将其部署到服务器。


    安装后，创建一个新的 `SQL Server Integration Services 项目`。您将看到一个包含任务和容器的 `工具箱`，以及 `控制流`
    屏幕。找到 `传输登录名任务` 并将其拖到 `控制流` 上。右键单击该任务并选择 `编辑` 以打开 `任务编辑器`，如图 10-19 所示。输入名称和描述。


    ![Image 130](img/index-267_1.png)


    ***图 10-19.** “传输登录名任务编辑器”屏幕！*


    单击左侧的 `登录名` 选项以设置源连接、目标连接、要传输的登录名以及其他选项，如图 10-20 所示。选择源连接（登录名当前所在的位置）和目标连接（您要将登录名移动到的位置）。您可以选择移动所有登录名、仅移动选定的登录名，或仅移动来自选定数据库的登录名。这些选择如下：


    - `所有登录名`：源服务器上的所有登录名都将传输到目标服务器。

    - `选定的登录名`：您选择的所有登录名都将被传输。可以移动 Windows 和 SQL Server 登录名。

    - `选定数据库的所有登录名`：您选择的所有数据库中的所有登录名都将被传输。


    `IfObjectExists` 属性允许您指定如果登录名已在目标服务器上存在时将发生的情况。这些选择包括：

