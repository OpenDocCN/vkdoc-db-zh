    考虑以下两种场景：一种是查找谓词返回 100,000 行，然后谓词消除了 5 行，最终返回 99,995 行；另一种是查找谓词返回 100,000 行，然后谓词删除了
    99,500 行，最终返回 500 行。第二种场景比第一种问题更大，更值得关注。


