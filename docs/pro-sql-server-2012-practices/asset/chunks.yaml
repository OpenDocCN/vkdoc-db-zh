    2.  连接到目标实例并验证该数据库不存在。

    3.  创建目标数据库。

    4.  在源数据库上设置数据库脚本编写选项。

    5.  从源数据库创建克隆脚本。

    6.  在目标数据库上执行克隆脚本。


