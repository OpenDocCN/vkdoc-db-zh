  trans: 'Now on to more specifics because, as they say, the devil is in the details
    and there’s nothing like having your environment, including your I/O pattern pretty
    well understood and then being surprised. One of the key elements with this monitoring
    and analysis is to do it by `LUN`. Ideally, your database files are broken out
    on different `LUNs`. For example, having the log file on a separate drive makes
    monitoring easier, so is having `TempDB` broken out to a different drive. This
    is because the I/O pattern and type vary with these specific workloads, unlike
    the user databases in your environment. The log files, for example, will require
    the lowest possible write latency because every transaction is dependent on this
    file. If you have replication enabled, note that there will be some reads as well,
    but the more important aspect with your transaction log is that the writes need
    to be as fast as they can be. `TempDB` is a different beast, and it’s used for
    a number of different functions within the `RDBMS`, such as for table variables,
    temp tables, global temp tables, sorts, snapshot isolation, and cursors. Because
    of the dynamic usage of `TempDB` and the elements which are enabled in your environment,
    you need to not only tune `TempDB` from a file management perspective, but also
    from an I/O perspective. This takes two forms: decreasing latch contention, and
    increasing throughput in `TempDB`. After all, the intent of having multiple data
    files for `TempDB` is to increase throughput in `TempDB`, which translates to
    increased throughput to the disk. If the disk cannot adequately support that throughput,
    the intended gain cannot be realized. `TempDB` usage, due to the quantity of operations
    that can occur in this database, can be more challenging to identify a known I/O
    pattern. Keep in mind that if you find slow I/O in `TempDB`, the scenario is similar
    to a slow log write except that your primary impact are to reads.


    ## 时代已变


    多年前，将存储连接到服务器的主要方法是采购一台拥有足够多驱动器托架的服务器，找到一个能够满足你独立磁盘冗余阵列（`RAID`）考量和吞吐量要求的控制器，然后挑选出符合你需要的正确速度和尺寸的驱动器。


    举个简单的例子，假设你有三个硬盘驱动器。信不信由你，这是多年前常见的配置，而且这三个驱动器通常会被配置为一个 `RAID-5` 阵列，通常还会划分成两个逻辑驱动器。


    了解 `RAID` 的类型将帮助你为正在设计中的方案开发解决方案，或是为正在重构或扩展的现有方案进行配置。在当今，当前 `SAN` 内部 `RAID` 的琐碎细节与过去有些不同，但你需要理解该技术的一些基础原理，以便更好地理解你公司里的存储专家们在做什么。培养这种理解，当他们得知你对他们的领域略知一二时，可能会架起一座沟通的桥梁。


    你可以将 `RAID` 最简单的形式想象为：按下那个神奇的“开始”按钮，将三个磁盘驱动器转换成操作系统以及 `SQL Server` 可见的一个磁盘。现在你有了一个包含三个磁盘的驱动器，你可以拥有更大的
    `LUN`，并更轻松地管理服务器上的 `OS` 和数据库。此时，你可能想的和我写到这里时想的一样：“这就是那些存储专家拿薪水的原因吗？”显然，事情远不止按一下神奇的“开始”按钮那么简单。想象一下，如果存储专家总是给你所要的东西。在这种情况下，你的日志、数据、`OS`、`TempDB`
    以及你在服务器上使用的任何第三方软件都会放在一个“驱动器”上。突然，你服务器上的文件结构看起来就像你笔记本电脑上的那样，而大多数人在保存大文件或将从服务器复制过来的
    `.blg` 文件解压缩以了解其 I/O 模式时，都不会对笔记本电脑的性能感到满意。


    在服务器驱动器上实施某种 `RAID` 的主要目的是容错。在当今，任何人都可以走进一家大型电子商店，用不到 100 美元买下一太字节的硬盘空间。与商用级驱动器相比，这非常划算——但在某处，你听到了祖父的智慧在低语：“一分钱一分货。”尽管每美元的存储容量逐年达到历史低点，但这些硬盘驱动器的性能和可用性却没有类似的增长。这意味着，如果一太字节的存储在五年前要花费
    1000 美元，而现在是 100 美元——下降了十倍——那么这太字节数据的可用性、耐用性和速度并没有增加十倍。


    你还需要很好地掌握 `RAID` 的类型。`RAID 5` 是我最初学到的主要 `RAID` 配置，它仍然是业界最常用的类型之一。`RAID 5` 的概念类似于将文件条带化分布在所有涉及的驱动器上，然后添加奇偶校验。通过这种方式，在三驱动器配置中，任何一个驱动器都可以发生故障，而数据仍然可用，直到该驱动器被更换，然后数据被写入新驱动器。当目的是为硬盘驱动器提供容错时，这是完美的。然而，它是有代价的。在本例中，代价是性能。为了让
    `RAID 5` 正常工作，它必须读取你正在访问的数据，而如果你修改了它，它必须重新读取该块以重新计算奇偶校验，写入数据，然后重写数据以保持奇偶校验。这很快就会成为性能瓶颈，这就是为什么你会看到许多博客建议将
    `SQL Server` 事务日志和 `TempDB` 放置在 `RAID 1+0 (10)` 上。


    `RAID 10` 可以说是更适合数据库系统的 `RAID` 形式，因为这种 `RAID` 形式通过信息的镜像获得容错能力，并通过在所有主轴（磁盘）上条带化数据来获得性能。由于“镜像”一词的定义，我之前提到的三磁盘配置不适用于
    `RAID 10`，但如果你有第四个磁盘，就可以实施 `RAID 10`。这意味着写惩罚不会像 `RAID 5` 那样显著，但可用空间现在只有你购买存储容量的大约一半，因为数据被镜像了。在我们的
    `RAID 10` 配置中，其中两个驱动器只是另外两个的镜像，这意味着我们可用数据的占用空间是购买存储的一半。从性能角度来看，这是更好的方式，因为可以从镜像读取，并且为了支持你的数据占用空间，需要存在更多的主轴。


    还有其他类型的 `RAID`。我本可以尝试在本章中解释所有类型，但此时你的眼睛可能已经在眼窝里打转，你可能在想：“我为什么要在乎？”'
- fmt: '# I/O 性能：不容忽视的故事


    你需要关心这个，因为当你的存储专家问你想要什么时，你可以自信地说：“我想要一个芝士汉堡和一个……” 等等——你和你的存储专家还没那么熟呢。当存储专家需要为你数据库分配
    LUN 时，掌握关于 RAID 和你特定 SAN 的知识是非常宝贵的。这为你提供了与他进行专业对话的机会，并可以为你数据库所渴望的东西提出要求：快速的 I/O。


    前文提到，事务日志文件和 `TempDB` 都容易受到慢速 I/O 的影响，而 I/O 等待是数据库系统性能良好的大敌。


    ## 共享存储的现实环境


    在当今的大多数环境中，SQL Server 数据库存储通常位于共享磁盘（SAN 或 NAS）上。这些设备通常拥有数百个磁盘轴。如果你回想我们之前讨论的三磁盘示例，你就能看出这为你的环境带来了多大的变化。


    人们会立刻想：“耶！我有更多磁盘轴了。” 是的，你确实有——但通常，这些磁盘轴上还运行着其他应用程序。


