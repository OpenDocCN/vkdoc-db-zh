  trans: '# 第十章：自动化管理


    • **失败任务**：任务将无法完成。

    • **覆盖**：目标服务器的登录信息将被源服务器的信息覆盖。

    • **跳过**：如果对象已存在于目标服务器上，它将保持原样，任务将继续处理下一个登录名。


    **复制 SID** 选项决定是否随登录名一起移动分配给它们的安全标识符（SID）。如果不移动 SID，目标服务器上使用该登录名的数据库将无法识别它。


    还有一些额外的限制条件需要考虑。唯一无法传输的登录名是 `sa`。此外，当登录名被传输时，它在目标服务器上会被禁用，并且密码会被设置为一个随机的 260 字符长的密码。你需要有一个重新启用这些登录名的流程，如果它们是
    Windows 登录名，则还需要重置密码。


    *图 10-20. 配置“传输登录名”任务的选项*


    配置完成后，你可以通过从你的计算机运行该包来进行测试。请注意，这将会传输登录名！要进行测试，请点击绿色的播放按钮进行调试。如果成功，将会出现一个带有对勾的绿色圆圈和消息“包执行已成功完成”，如图
    10-21 所示。


    *图 10-21. 在 BIDs 中成功执行的包*


    当包经过测试并满足你的要求后，它可以被部署到 SQL Server 实例上，并按需执行，或者可以使用 SQL Server Agent 作业进行调度。这个包是
    SSIS 所具备的简化 SQL Server 管理能力的一个例子。


    ## PowerShell


    PowerShell 是微软创建的、基于 .NET 的强大脚本语言。它使得管理 Windows Server 以及运行在其上的程序（如 SQL Server）变得容易得多。


    使用 PowerShell 有哪些好处？它所构建的环境可以访问操作系统和文件系统的某些部分，而 T-SQL 无法做到。与 VBscript 或 Perl 不同，它是一种面向对象的编程语言。它具有许多高级编程结构，例如循环和错误处理。有许多任务用
    T-SQL 很难实现或不可能实现，但用 PowerShell 却很简单。


    要理解 PowerShell，首先必须理解 **cmdlet**。这些是轻量级的 .NET 类，用于执行你指示它们的工作。所有 cmdlet 都采用“动词-名词”格式，例如
    `Get-Help`。虽然其中许多 cmdlet 本身就功能强大，但能够将一个 cmdlet 的结果作为对象，传递给另一个 cmdlet 并继续处理的能力是无价的。


    特定于数据库引擎的 cmdlet 有：`Invoke-Sqlcmd`（运行 T-SQL 和 XQuery 查询）；`Invoke-PolicyEvaluation`（评估基于策略的管理策略）；`Encode-Sqlname`
    和 `Decode-Sqlname`（用于处理 SQL Server 允许但 PowerShell 不允许的特殊字符）；以及 `Convert-UrnToPath`（将
    SQL SMO 资源名称转换为提供程序路径）。


    ### 启动 PowerShell


    从你的工作站或服务器，你可以运行 `powershell.exe` 来启动该环境。在 SQL Server 中，你可以在对象资源管理器中右键单击一个对象，然后选择
    **启动 PowerShell**。区别在于，如果你从 SSMS 中打开它，它会自动使用 `sqlps` 实用程序打开，这意味着 SQL Server 提供程序和
    cmdlet 已经加载并准备好使用。


    ### 使用 PowerShell


    使用 PowerShell 可以简单到只需打开它并执行一个 cmdlet。你也可以创建更详细的脚本，传入变量、从磁盘读取文件并写入表。任何命令或脚本都可以保存为
    PowerShell 脚本文件（`.ps1`）供将来使用。


    一个例子是使用 PowerShell 检查磁盘上的可用空间。PowerShell 可以使用 WMI 来访问这些信息。`Get-WmiObject` cmdlet
    将调用 WMI 对象，可用于本地或远程计算机。如果你在远程计算机上使用它，你的凭据必须具有对该计算机的访问权限。


    清单 10-7 中的脚本将允许你输入一个计算机名变量，并检查该计算机上的可用磁盘空间。大小和可用空间以字节为单位。


    *清单 10-7. 用于查看总驱动器空间和可用驱动器空间的 PowerShell 脚本*

    ```

    #检查可用磁盘空间


    $Server = ''dev01''


    get-wmiobject -query ''

    "Select DeviceID, Size, Freespace From Win32_logicaldisk Where drivetype=3" ''

    -computer $Server | select-object DeviceID, Size, FreeSpace

    ```


    ### 自动化 PowerShell


    通过创建脚本并将其保存以供将来使用，也就具备了自动化运行脚本的能力。如果你的环境中使用了 Windows 任务计划程序，可以设置它按计划运行脚本。


    你也可以通过 SQL Server Agent 调度 PowerShell 作业。这里需要注意两点。


    首先，每次 Agent 服务运行该步骤时，都会启动一个 PowerShell 实例，这将消耗内存。其次，从 SQL Server 运行 PowerShell
    要求你创建一个对环境中任何资源都具有访问权限的凭据，然后使用该凭据为 PowerShell 创建一个 SQL Server Agent 代理。在作业中，你必须在
    `RunAs` 字段中指定该代理。


    ## 自动化什么


    了解了可用于帮助你自动化任务的工具后，下一个决定是应该自动化哪些任务。首先列出你每天、每周、每月和每年执行的任务。任何你执行超过一次的任务都是自动化的候选对象。选择一个任务开始。


    与 IT 中的任何变更一样，一次不要改变多个流程。实施一个新的流程或计划，测试它，修复错误并进行优化。这有助于确保如果出现问题，你可以准确定位原因并尽快加以纠正。当你确定该流程按预期工作后，就可以选择列表中的另一个任务。


    第二步是为你当前在任务上花费的时间创建一个基线。你花费多少时间阅读错误日志、手动恢复数据库以及修复索引碎片？在你更改一个流程后，再次测量时间。这样做可以为你和业务部门提供一个关于节省时间的准确描述。


    ## 监控


    监控你的服务器以发现现有问题或未来问题的迹象，是成为一名成功的 DBA 最关键的环节之一。有许多来源包含你可以挖掘的信息，以了解服务器的健康状况——Windows
    事件日志、SQL Server 错误日志和 SQL Server Agent 日志是你可用的宝贵资源中的一部分。能够自动化搜索这些日志，从即将发生的潜在磁盘损坏到失败的登录尝试，都具有难以置信的价值。


    ### Windows 事件查看器


    Windows 事件查看器包含应用程序和系统日志。应用程序日志将列出由计算机上安装的程序记录的事件。SQL Server 的各种内部和外部功能与进程（如引擎、代理和报告服务）会将条目写入此日志。日志条目中包含日期和时间、错误来源、事件
    ID 以及项目说明或错误消息等信息。每个项目还被分配了一个重要级别。你应该关注标记为 **严重**、**错误** 或 **警告** 的最高重要级别的项目。


    系统日志将列出操作系统及其组件记录的事件。如果某项服务在服务器启动时未能启动，你将看到一个错误和错误消息。'
- fmt: '# SQL Server 日志管理与自动化运维


    ## 日志概述

    应用日志与系统日志的区别在于事件记录的级别。记录的事件可以是任何涉及异常、信息性事件或关键系统故障的情况。需要注意的是，系统故障会被记录，但在某些情况下（例如严重转储异常），会使用转储文件来确保异常被捕获以供后续审查。这意味着有些事件可能不会被记录到系统日志中。


    每个记录的事件都有一个签名。该签名要么是操作系统级别的组件，要么是应用程序级别的签名。根据事件的来源，它会被适当地记录，以便关联到逻辑容器中，无论是系统日志还是应用日志。


    每天审查标记为“严重”、“错误”或“警告”的项目将有助于你保持主动性。`PowerShell`是一个强大的工具，可以帮助你从服务器收集日志、筛选它们并搜索错误。


    ## SQL Server 错误日志

    你可以通过“事件查看器”获取有关 SQL Server 如何与操作系统及其他应用程序交互的信息。然而，要真正理解 SQL Server 内部发生了什么，你需要定期审查并从
    SQL Server 错误日志中捕获重要信息。


    要在 `SSMS` 中访问日志，请展开“管理”，然后展开“SQL Server 日志”。你将看到 SQL Server 保留的所有日志列表，如图 10-22
    左侧所示。要查看特定日志，请双击该条目。你也可以通过访问路径 `<drive letter>:\Program Files\Microsoft SQL Server\InstanceDirectory\MSSQL\Log`
    来查看日志。


    ![SQL Server 错误日志视图](index-272_1.png)


    **图 10-22. 查看 SQL Server 错误日志**


    在启动时，会捕获身份验证模式、服务帐户、启动参数、端口号等信息。正常操作也会被记录，包括但不限于：数据库启动、数据库备份、数据文件和日志文件的恢复、登录失败、`DBCC`
    命令、死锁、数据或日志文件达到最大容量等。


    这为什么重要？你希望定期检查错误日志，以便在问题出现之前或出现后不久就发现它们。你可以登录服务器，打开 `SSMS`，每天阅读错误日志，但这会变得令人厌倦和繁琐。更好的方法是自动化日志的读取和搜索。为高优先级错误或那些你希望确保不会在你的环境中引起问题的错误设置
    `Agent` 警报，是实现这一目标的好方法。


    ## SQL Server Agent 日志

    `SQL Server Agent` 有自己的一套错误日志。要查看 `Agent` 作业、日志等，请打开 `SSMS` 并展开 `SQL Server Agent`。要查看日志，请展开“错误日志”并双击其中一个进行查看。你可以在图
    10-23 中看到这一点。要查看特定作业的日志，请双击“作业活动监视器”将其打开。右键单击特定作业并选择“查看历史记录”。


    ![SQL Agent 作业历史记录视图](index-273_1.png)


    **图 10-23. 查看 SQL Agent 作业的历史记录**


    ### 失败作业

    你首先需要查找的事情之一就是失败的作业。失败可能由多种原因引起，具体取决于作业的功能。备份作业可能因为通过网络写入时失去连接而失败。索引作业可能因为 `tempdb`
    空间不足而无法排序而失败。如果数据库处于无法访问的状态，作业也可能失败。你需要监控失败的作业，并查明原因。经过分析，你可以判断这是一次性失败还是重复性失败。如果是一次性事件，你可以决定是否需要重新运行它，或者等待下一个计划作业。如果作业持续失败，你可以判断是否是时机不对，或者作业需要重写。这就是自动化的力量：你可以更加主动。


    ### 长时间运行的作业

    你可以在 `Agent` 日志中跟踪的另一个元素是作业的持续时间。你很快就会熟悉执行所需的平均时间长度。有些作业（备份、恢复、索引重建等）随着数据库大小的增长，你预计会花费更长时间。然而，如果你的数据库增长正常但运行时间异常呢？看到并跟踪这些信息可以帮助你防止未来发生问题。你还可以按步骤跟踪作业历史记录，因此如果发生失败，你确切知道它是在哪个点发生的。


    ## 磁盘空间管理

    ### 驱动器空间

    对于每个数据库来说几乎肯定会发生的事情就是它的大小会增长。根据应用程序和存储的数据，这种增长可能是缓慢的，也可能是快速的。数据和日志文件都会增长。除了用户数据库，你还需要警惕系统数据库，尤其是
    `tempdb`，因为它用于许多操作。


    对于数据库，首先要自动化的是它们的自动增长设置。你需要验证这些设置对于你服务器上创建的每个数据库都配置得当，并监控数据和日志文件。我还建议检查你管理的每台服务器上
    `model` 中的设置，以确保任何创建的数据库都符合你的标准。这将确保你不必在数据库和日志文件增长时手动扩展每一个。可以通过连接到 `SSMS` 的 SQL
    Server，展开“数据库”，右键单击数据库名称，选择“属性”，然后选择“文件”来找到这些设置。“自动增长/最大大小”列将告诉你该数据库的设置，你可以单击该字段右侧的省略号来更改设置。


    你还需要确保你的数据库处于适合你环境的正确恢复模型，并且如果处于“完整”或“大容量日志”模式，则正在自动化日志备份。你可以在“属性”的“选项”选项卡顶部查看“恢复模型”。请记住，每个用户数据库都是独特的，根据其创建的数据存储目的，需要独特的设置。


    ### 磁盘空间

    俗话说磁盘空间很便宜。然而，它仍然是有限的。你需要建立一个流程，当你的驱动器接近其极限时通知你。然后，你可以计划是将数据库移动到另一台服务器或驱动器、将数据和日志文件分离到不同的驱动器、设置分区，还是删除不再需要的数据库。可以结合使用
    `DMV` 和 `PowerShell` 来监控磁盘空间。


    ### 数据库文件限制

    你还需要知道你的数据和日志文件是否接近其最大大小。设置自动增长限制将帮助你管理这种增长。在文件接近其限制时收到警报会让你保持主动。你可以在用户收到数据库空间不足的错误并联系你修复问题之前扩展文件。


    管理提前通知文件接近其限制的一种方法是，每周向 `DBA` 团队发送一份报告，列出距离其最大值 10% 以内的数据和日志文件。然后，你可以扩展这些文件并再次检查自动增长设置。即使是设置为无限增长的数据库也应该被监控和手动更改，这样你才能控制这个过程。相反，你也可以报告那些很大但并未使用太多空间的数据库。也许它们曾经因为数据加载而非常大，或者日志文件因为某个操作而增长。减小大小可以节省磁盘空间和成本。


    ## 备份与恢复

