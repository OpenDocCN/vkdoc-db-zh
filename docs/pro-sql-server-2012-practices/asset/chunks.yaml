    13-2 中数字的目的，是让您了解我多年来在各种应用程序和 I/O 需求下常见的情况。


    日志受长时间写入的影响更大，并且根据环境不同，长时间的读取也可能成为问题。数据库中每个需要数据修改元素（插入、更新或删除）的事务都是一个日志记录操作。无论使用何种恢复模型，情况总是如此。因此，确保事务日志的写入时间尽可能低，可能是您在数据库环境中能做的最重要的事情之一。


    一个实际的思考方式是考虑每秒的写事务数。这个计数器结合每秒事务数来看很有趣，因为它说明了有多少事务依赖于事务日志的写入时间。如果将这个值与`Avg. Disk
    sec/Write`结合起来看，您通常能找到相关性。这很重要是因为，如果您的数据库环境为每个写事务额外增加了 20 毫秒，您可以通过将写事务数量乘以毫秒数来进一步理解有多少“挂钟时间”被花在了等待存储阵列通知操作系统其操作已完成上。在进行这项计算时，请观察您的阻塞链和场景，您很可能会发现，在日志写入事件持续时间较长时，阻塞数量会增加。


    > **注意** 我见过`Avg. Disk sec/Read`和`Avg. Disk sec/Write`时间高达五秒。相反，我也见过这个值低至 10 毫秒，同时`Disk
    Bytes/sec`测量值高于 1400 MB/sec。这两种情况都是极端案例，虽然我们都希望吞吐量超过每秒 1 GB，读写时间低于 10 毫秒，但我们中很少有人有预算来实现这一点。然而，我们都应该有预算和工具来避免请求耗时超过一秒。如果您不处于这种情况，或许是因为您还没有帮助构建案例来争取额外的资本支出。请记住，数字是客观的，但人是主观的，他们可能不像您那样对这些数字充满热情。“了解您的客户”这句老话对于
    I/O 讨论非常贴切，因为这通常涉及指出需要根据您的发现和建议投入一笔可观的资金。


    I/O 请求的大小也起着作用。大小指的是每个请求存在多少数据。通常，读 IOP 的块会比写 IOP 的块大。这部分是由于范围扫描和应用程序选择的数据比写入的数据多。这是另一个需要了解您的
    I/O 的领域。'
- fmt: '## **I/O：被忽视的故事**


    ### **分析 I/O 性能特征**


    I/O 性能特征非常重要。例如，在晚上重新建立索引时，I/O 请求的大小通常会比白天看到的数值更高。这是因为你正在处理的事务大小远大于通常非常小的单个插入或更新操作。想象一下，你对自己的
    I/O 模式有清晰的理解，却发现 `Disk Bytes/sec` 计数器存在波动。这里的问题很可能在于 I/O 请求的大小。


    需要理解的是，这些计数器是协同工作的，只有结合完整的数据，才能看到全貌并真正理解你的 I/O 模式。


    到此，你应该对如何监控 I/O 有了很好的理解。在本章的后续部分，我们将引入更复杂的考量因素。前面提到的方程将包含一些先前提到的变量、你环境和数据库特有的细节，当然，还有一些关于如何减少或改变你的
    I/O 占用和/或模式的建议。


    ### **使用性能监视器进行监控**


    要监控 I/O，请打开性能监视器，展开“数据收集器集”，右键单击“用户定义”，然后选择“新建”。这将调出你在图 13-2 中看到的屏幕。


    **图 13-2.** 使用性能监视器创建新的数据收集器集。


    ![Image 159](index-327_1.png)


    选择“手动创建”，单击“下一步”，然后选择“创建数据日志”并选中“性能计数器”，如图 13-3 所示。


    **图 13-3.** 指定使用性能监视器收集的数据类型。


    单击“下一步”，将采样间隔设置为一秒，然后单击“添加”。接着选择“逻辑磁盘”，为了简单起见，选择“所有计数器”和“<所有实例>”，如图 13-4 所示。


    ![Image 160](index-328_1.png)


    **图 13-4.** 指定在性能监视器中使用的计数器。


    然后，选择你希望文件写入的位置。随着你对性能监视器越来越熟悉，你会发现“日志格式”、“日志模式”以及其他根据需求可能有帮助的选项。


    ### **分析收集的数据**


    现在你手头有了数据……（哦，我之前没提过本章会有一些必需的工作吧？）如果你还没有你的 `IOP` 数字，去获取它们——我会等着和我的女儿再看一集《米奇妙妙屋》。


    之后，你可以着手完善你的流程、数据收集时间、数据报告等等；但现在，请先知道你的数字是多少。如果不从内到外地了解你的 I/O 特征，你怎么会知道它是好是坏，或者在周六凌晨
    3:30 一个愉快的夜晚外出之后是否会出现问题？在“超级碗”周日你的 `.com` 服务器性能崩溃之际试图弄清楚这一点，不仅会让人得溃疡，也可能终结你在 `FillInTheBlank.com`
    的任期。


    ### **代码问题还是磁盘问题？**


    多年来，我读过的许多文章和书籍都部分地指出，不备份对于 DBA 来说是不可原谅的过失。我非常赞同这种观点，但说实话，这个标准相当低，我认为我们都准备将其提高几个档次。所以，让我们也把
    I/O 纳入这个范畴。


    我经常收到的一个问题是：“这是糟糕的代码还是糟糕的 I/O？” 我很喜欢这个问题，因为答案通常是“是的”。你的系统当然有糟糕的代码。你的环境当然有糟糕的 I/O。在数据库系统中，不存在“好的
    I/O”，因为 I/O 是数据库环境中最慢的部分。嗯，它应该是最慢的。如果不是，请阅读本书的其他章节！


    那么，该怎么做呢？让我们从前面讨论过的 I/O 模式开始。在大多数数据库环境中，I/O 模式在日复一日、周复一周中看起来非常相似。通常，这种 I/O 模式在不同月份的特定时间也看起来一样。（想想一家上午
    8 点到下午 5 点营业、每月一次记录库存或核对余额的零售店，或者一家在每个财政月末发送月度账单的传统金融机构。）例子可以一直举下去，而你应该有一个基于你的数据库所支持的业务而需要了解的、属于你自己的例子。


    I/O 模式是一个有价值且可操作的数据集。有了它，规划可以涵盖比你的数据库服务器更多的内容，因为大多数环境都包含共享存储（`SAN` 或 `NAS`），而这些共享存储设备有自己的维护窗口、自己的高峰期窗口等等。


    > **注意**：我数不清有多少次，“I/O 数据集”成为与 `SAN` 管理员、应用程序所有者和系统管理员合作的关键共同组件。


    一旦我们都基于相同的事实（数据）开展工作，沟通挑战就会变得更容易、更有效。这些挑战并非只有你一个人经历。理解这一点非常重要。如果你使用的是共享存储设备，其他应用程序所有者也正在经历与你相同的挑战。这里的不同之处在于，你可以成为推动所有人对话的那个人，因为你掌握了数据，并且知道你的日程安排以及何时需要从共享存储设备获得特定的
    `IOP` 吞吐量。我无法更加强调这种对话在你组织内不同团队之间的重要性。它将架起桥梁、建立信任和信心。它将使 `SAN` 专家更好地理解你的需求及其重要性，并将使服务器管理员能够将他们的系统备份窗口或病毒扫描更改到不同的时间。


    简而言之，它促进了沟通与协作，因为没有数据、没有事实的讨论，很容易被理解为是指责或试图推卸责任。


    我与客户最喜欢的一个对话就是围绕这个话题，因为很容易承认你的数据库对 `IOPS` “需求很大”。如果能用确凿的数据点清晰地传达其价值和必要性，那么，你怎么可能出错呢？你的组织又怎么会出错呢？


    ### **深入分析指标**


    继续前进，上一节的目的是向你介绍这些指标，并解释它们为何重要、可以用它们做什么以及如何获取它们。现在你已经拿到了数据，让我们来谈谈几个更精细的要点。


    在你的 I/O 特征分析中，你可能会发现在一天的不同时间，你的 I/O 模式会发生变化。


    以 `Disk Bytes/sec` 计数器为例。如果你观察到该计数器出现显著且持续的变化，请检查相关的计数器 `Disk Bytes/Read(Write)`。你可能会看到
    I/O 大小的变化，因为不同类型的 `IOPS` 用于不同的数据库负载。在查看这个的同时，也看一下 `Disk Reads(Writes)`——其相关性应该相当明显。你会看到在备份窗口期间，I/O
    数量减少，而吞吐量增加，大小也很可能有所提升。


    对于重新建立索引的活动也是如此。


    考虑将你的备份、重新建立索引或统计信息更新更改为你的子系统能更好处理该类负载的时间。当你考虑更改时，应该与你的系统管理员和 `SAN` 专家沟通，因为他们会感谢你告知此事，并可能在他们那边做出一些调整以满足你的需求。'
  raw: 'profile is very important. For instance, in the evenings when re-indexing
    occurs, you’ll likely see higher values for the size of your IOP request than
    you will see during the day. This is because the sizes of the transactions you
    are working with are much larger than individual inserts or updates, which are
    traditionally very small. Imagine the scenario where you have a solid understanding
    of your I/O pattern yet you notice that your Disk Bytes/sec counter varies. The
    problem here is likely the size of the I/O


    request. It’s important to understand that these counters work in concert with
    one another and, in their completeness, the full picture can be seen and your
    true I/O pattern can be realized.


    At this point, you should have a good understanding of how to monitor your I/O.
    Over the course of this chapter, a harder portion of the equation will be factored
    in as well. The aforementioned equation includes some of the variables mentioned
    previously, specifics unique to your environment and database, and, of course,
    some suggestions for what can be done about decreasing or changing your I/O footprint
    and/or pattern.


    To monitor your I/O, open Performance Monitor, expand Data Collector Sets, right-click
    User Defined, and select New. That will bring up the screen you see in Figure
    13-2.


    ***Figure 13-2.** Creating a new data collector set using Performance Monitor.*


    ![Image 159](index-327_1.png)


    chapter 13 ■ I/O: the UntOld StOry


    Choose Create Manually, click Next, and then choose Create Data Logs and select
    Performance Counter, as shown in Figure 13-3.


    ***Figure 13-3.** Specifying the type of data to collect with Performance Monitor.*


    Click Next, set the sample interval to one second, and then click Add. Then choose
    Logical Disk and, for the sake of simplicity, choose All Counters and <All Instances>,
    as shown in Figure 13-4.


    ![Image 160](index-328_1.png)


    chapter 13 ■ I/O: the UntOld StOry


    ***Figure 13-4.** Specifying which counters to use in Performance Monitor.*


    You will then choose where you want the file written to. As you become more familiar
    with Performance Monitor, you will find that Log Format, Log Mode, and additional
    options that can be helpful depending on your needs.


    Now that you have numbers in hand… (Oh, didn’t I mention earlier that there would
    be some required work associated with this chapter?) If you don’t yet have your
    IOP numbers, go get them—I’ll hang out and watch another episode of Mickey Mouse
    Clubhouse with my daughter.


    Later, you can work on refining your process, your data-collection times, your
    reporting for this data, and so on; for now, know what your numbers are. Without
    knowing your I/O profile inside and out, how can you ever know if it’s good, bad,
    or an issue at 3:30 AM on a Saturday morning after a fun night out on the town?
    Trying to figure this out while in the midst of a performance meltdown of your
    .com server on Super Bowl Sunday is not only a way to develop ulcers, it could
    be the demise of your tenure at FillInTheBlank.com.


    Code or Disk?


    I’ve read many articles and books over the years that state, in part, that not
    having backups is an inexcusable offense for a DBA. I couldn’t agree more with
    that sentiment, but honestly, that bar is pretty low and I think we’re all up
    for raising it a few notches. So let’s throw I/O into that mix as well.


    One of the questions I often receive is along the lines of “Is this bad code or
    bad IO?” I love that question because the answer is typically “yes.” Of course
    your system has bad code. Of course your environment has bad I/O. There’s no such
    thing as “good I/O” in a database system, where I/O is the slowest portion of
    the database environment. Well, it should be. If it isn’t, read other chapters
    in this book!


    So what’s to be done about this? Let’s begin with the I/O pattern, which was covered
    earlier. In most database environments, the I/O pattern will look very familiar
    day to day and week to week. Often, this I/O


    pattern looks the same during different times of the month as well, (Think about
    a retail store that is open from 8 AM to 5 PM and records inventory or reconciles
    its balances once per month or a traditional financial institution that sends
    out monthly statements at the end of each fiscal month.) The examples 321


    chapter 13 ■ I/O: the UntOld StOry


    could go on forever, and you have an example of your own that you should be aware
    of, based on the business your database supports.


    The I/O pattern is a valuable and actionable data set. With it, scheduling can
    encompass much more than just your database server because most environments contain
    shared storage (SANs or NASs) and these shared-storage appliances have their own
    maintenance windows, their own peak windows, and so forth.


    n **Note** I cannot count, on both hands, how many times the “I/O data set” has
    been the key common component to working with the SAN admits, application owners,
    and system administrators.


    Once we are all working from the same sheet of music, it’s much easier and more
    effective to communicate challenges. These challenges aren’t experienced by you
    alone. This is very important to understand. If you are on a shared storage device,
    other application owners are encountering the same challenges that you are. The
    difference here is that you can be the one to drive the conversation for everyone
    because you are armed with data and you know your schedule and when you need certain
    IOP


    throughput from your shared storage device. I cannot emphasize enough the importance
    that this conversation will have within the various groups in your organization.
    This will build bridges, trust, and confidence. It will enable the SAN gurus to
    better understand your needs and why they matter, and it will enable the server
    administrators to change their system backup windows or virus scans to a different
    time.


    In short, it enables communication and collaboration because having such discussions
    without data, without the facts, it can come across as finger pointing or an attempt
    to shift the blame.


    One of my favorite conversations with clients revolves around this topic because
    it’s easy to take ownership of your database being “hungry” for IOPS. If the value
    and necessity of it can be clearly communicated with hard-and-fast data points,
    well, how can you go wrong? How can your organization go wrong?


    Moving on, the point of the previous section was to introduce you to the metrics
    and to explain why they matter, what can be done with them, and how to obtain
    them. Now that you have them, let’s talk about a few of the finer points.


    In your I/O profile, you will likely see that during different times of the day
    your I/O pattern changes.


    Take, for example, the Disk Bytes/sec counter. If you see significant and sustained
    changes in this counter, check the related counter, Disk Bytes/Read(Write). You’ll
    likely see a change in the size of the I/O because different types of IOPS are
    used for varying database loads. While looking at this, go ahead and look at the
    Disk Reads(Writes)—the correlation should be pretty clear. You will see that during
    your backup window, the quantity of I/Os are decreased while the throughput is
    increased, and the size is likely elevated as well.


    The same will be true for re-indexing activities.


    Consider changing your backups, re-indexing, or statistic updates to times when
    your subsystem can better handle that type of load. When you contemplate changing
    this, you should communicate it with your system administrator and SAN guru, because
    they will appreciate the communication and might change something on their side
    to accommodate your need.'
