    ,iu.IndexType


    ,iu.USAGE


    , cast(iu.Percentage as decimal(12,2)) as Percentage


    FROM


    IndexUsage iu


    ORDER BY


    iu.tableName


    ,iu.IndexName


    ,iu.Percentage DESC


    GO


    ***Figure 14-16.** The scan and update patterns on the tables in my demo database.*


    This query uses the statistics in use on your database since the last reboot to
    determine these patterns. To get solid data, you should run this on a server that
    has been online for as long as possible. The higher the number of scans, the more
    the table is suited for compression. The lower the number of scans 354


    chapter 14 ■ page and row compression


    and higher the number of updates, the more you want to consider either row compression
    or no compression.


    Look at Figure 14-16 and examine our usage patterns. You’ll see that vmaxTest
    is a good candidate for compression. You’ll also see that dbo.datarecord is not.
    Get a baseline of the statements run against the database to validate this decision.


    Another thing to consider regarding indexes is the rebuild time. When you enable
    row compression index, rebuilds on that particular index should take 1.5 times
    what the rebuild rate is for the same -index in a noncompressed format. Page compression
    takes that up even further to 2 times the rebuild rate for the same index in an
    uncompressed format.


    So now that you have selected a table based on the table size, allocation unit
    makeup, and a compression setting based on the scan or update patterns, you’re
    ready to run sp_estimate_data_


    compression_savings. This is the built-in procedure for estimating compression
    space savings. You can focus this procedure by providing the Schema Name, Object
    Name, Index ID, and Partition Number parameters and specifying the type of compression
    you want to estimate. You can specify Row, Page, or None. If you have an uncompressed
    object, you can see the estimated space savings by specifying the type of compression
    you would like to apply. If you would like to uncompress a compressed object,
    you can specify None and find out what the estimated size of the uncompressed
    object will be. Before you do that, I want to issue a big warning.


    The system stored procedure sp_estimate_data_compression_savings works by placing
    5 percent of the table in your Tempdb and performing the compression operation.
    Based on the rate of compression, it then extrapolates the data and estimates,
    based on the size of your table, what your savings might be for the type of compression
    you specified.


    For most people, this will not be a problem. Estimating the compression savings
    of a 100-MB table will take 5 MB of Tempdb space. However, estimating the compression
    savings of a 100-GB table will take 5 GB


    of Tempdb space. If you have a 500-GB table, you need 25 GB of free Tempdb space
    for the operation. If you fill up Tempdb, activity on your server will grind to
    a halt. So be careful and only use sp_estimate_


    data_compression_savings as your last step.


    There are tools on Codeplex and scripts all over the Internet that put sp_estimate_data_compression_


    savings in a cursor and run it for every table in your database. I do not recommend
    this approach because all it does is give you a possible savings *estimate*. It
    doesn’t tell you what the allocation unit makeup of your tables are, nor does
    it help you determine what level of compression to use.


    So before you use sp_estimate_data_compression_savings, take a look at your Tempdb
    and make sure you have enough free space to estimate the compression savings safely.


    After doing this, make sure you take performance baselines before and after compression
    is applied.


    Compression will reduce the amount of data cache used by the buffer pool, and
    reducing the number of pages in a table could move some queries from scans to
    seeks, thus improving query performance. The only way to be sure is to have a
    baselines review.


    Fragmentation and Logged Operations'
  trans: "\n# 第 14 章：页面与行压缩\n\n```\nSELECT\n    iu.IndexID,\n    iu.IndexType,\n \
    \   iu.USAGE,\n    cast(iu.Percentage as decimal(12,2)) as Percentage\nFROM\n\
    \    IndexUsage iu\nORDER BY\n    iu.tableName,\n    iu.IndexName,\n    iu.Percentage\
    \ DESC\nGO\n```\n\n`图 14-16.` 我的演示数据库中表上的扫描与更新模式。\n\n该查询利用自上次重启以来数据库中使用的统计信息来确定这些模式。为获得可靠数据，应在服务器运行时间尽可能长的机器上执行此操作。扫描次数越高，表就越适合进行压缩。扫描次数\
    \ 354 越低且更新次数越高，你就越需要考虑行压缩或不进行压缩。\n\n查看`图 14-16`并检查我们的使用模式。你会看到`vmaxTest`是压缩的良好候选对象。你也会看到`dbo.datarecord`则不是。获取针对数据库运行的语句基线以验证此决策。\n\
    \n关于索引需要考虑的另一件事是重建时间。当你启用行压缩索引时，该特定索引的重建时间应约为相同索引在非压缩格式下重建时间的 1.5 倍。页面压缩则进一步将此提升至相同索引在未压缩格式下重建时间的\
    \ 2 倍。\n\n现在，你已根据表大小、分配单元构成以及基于扫描或更新模式的压缩设置选定了表，可以运行`sp_estimate_data_compression_savings`了。这是一个用于估算压缩空间节省的内置存储过程。你可以通过提供`架构名`、`对象名`、`索引\
    \ ID`和`分区号`参数并指定要估算的压缩类型来聚焦此过程。你可以指定`行`、`页面`或`无`。如果你有一个未压缩的对象，通过指定想要应用的压缩类型，可以查看估计的空间节省。如果你想解压缩一个已压缩的对象，可以指定`无`并找出解压缩后对象的估计大小。在此之前，我想发出一个重大警告。\n\
    \n系统存储过程`sp_estimate_data_compression_savings`的工作原理是将表的 5%放入你的`Tempdb`并执行压缩操作。根据压缩率，然后推断数据，并基于表的大小估算你指定的压缩类型可能带来的节省空间。\n\
    \n对大多数人来说，这不会有问题。估算一个 100MB 表的压缩节省将占用 5MB 的`Tempdb`空间。然而，估算一个 100GB 表的压缩节省将占用\
    \ 5GB 的`Tempdb`空间。如果你有一个 500GB 的表，此操作需要 25GB 的空闲`Tempdb`空间。如果你填满了`Tempdb`，服务器上的活动将完全停止。所以要小心，仅将`sp_estimate_data_compression_savings`作为最后一步使用。\n\
    \nCodeplex 上有工具，互联网上也有各种脚本，它们将`sp_estimate_data_compression_savings`放入游标中，并为数据库中的每个表运行它。我不推荐这种方法，因为它只提供一个可能的`估算`。它不会告诉你表的分配单元构成，也不会帮助你确定使用哪个压缩级别。\n\
    \n因此，在你使用`sp_estimate_data_compression_savings`之前，检查一下你的`Tempdb`，确保有足够的空闲空间来安全地估算压缩节省。\n\
    \n完成此操作后，请确保在应用压缩前后获取性能基线。\n\n压缩将减少缓冲池使用的数据缓存量，并减少表中的页面数量可能将一些查询从扫描转换为查找，从而提高查询性能。唯一确定的方法是进行基线审查。\n\
    \n## 碎片化与日志操作\n"
