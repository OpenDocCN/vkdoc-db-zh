    # 第五章 ■ 从 SQL 跟踪到扩展事件


    这些存储过程和函数负责创建、修改、启动、停止和查看跟踪文件。表 5-1 展示了相关的扩展存储过程和函数名称及其功能描述。


    ## 表 5-1. SQL 跟踪扩展存储过程、函数及其功能描述


    **扩展存储过程/函数**


    `fn_trace_geteventinfo`

    返回有关跟踪中所包含事件的信息。


    `fn_trace_getinfo`

    返回有关指定跟踪或所有现有跟踪的信息。


    `fn_trace_getfilterinfo`

    返回有关应用于跟踪的筛选器的信息。


    `sp_trace_create`

    创建跟踪定义。新跟踪将处于停止状态。


    `sp_trace_generateevent`

    创建用户定义的事件。


    `sp_trace_setevent`

    向跟踪中添加事件类或数据列，或从中移除它们。


    `sp_trace_setstatus`

    启动、停止或关闭跟踪。


    `sp_trace_setfilter`

    向跟踪应用新的或修改后的筛选器。


    如果你更详细地查看这些存储过程和函数，会发现它们用起来并不那么直观。例如，跟踪事件和列不是通过名称引用，而是通过其 ID。这就是 SQL Profiler
    的用武之地。它可以将定义的跟踪导出为一个 `.sql` 文件，你可以使用该文件在服务器上启动 SQL 跟踪。这比手动编写所有代码要轻松得多。生成的文件当然需要检查，并且像跟踪名称和路径这样的信息需要手动输入。为此，请启动一个跟踪，停止它，然后转到
    文件 -> 导出 -> 脚本跟踪定义，并选择所需的 SQL Server 版本。


    SQL Server 自带了两种开箱即用的跟踪：一个黑盒跟踪和一个默认跟踪。


    黑盒跟踪默认不运行。顾名思义，这是一个你无法以任何方式修改的跟踪。不能添加事件、设置筛选器或更改目标文件设置。你只能启动或停止它。


    通过使用带有选项 8 的 `sp_trace_create` 来启动它。它仅包含 4 个事件（RPC 开始、批处理开始、异常、注意），并保存到 `%SQLDIR%\MSSQL\DATA\blackbox.trc`
    这个 5 MB 的文件中。当该文件写满时，它会创建一个名为 `blackbox_1.trc` 的第二个轮转文件。当第二个文件写满后，它再次开始写入第一个文件，如此循环。它曾被用于
    SQL Server 2000 的故障排除和审核，但现在已使用其他功能来实现这些目的，例如默认跟踪和自定义解决方案。


    第二个内置跟踪称为默认跟踪。它在 SQL Server 2005 中作为轻量级诊断跟踪引入，与黑盒跟踪不同，它默认运行，除非你通过使用 `sp_configuration`
    启用高级选项来特意将其关闭。像黑盒跟踪一样，它也不能被修改。它使用 5 个 20 MB 的文件进行轮转。以下代码展示了如何查看默认跟踪是否正在运行，以及如何在未运行时启用它。


    ```sql

    -- 查看默认跟踪是否已启用

    SELECT * FROM sys.configurations WHERE configuration_id = 1568

    GO

    -- 查看默认跟踪是否正在运行

    SELECT * FROM sys.traces WHERE is_default = 1

    GO

    -- 如果没有运行，则启动它

    sp_configure ''show advanced options'', 1;

    GO

    RECONFIGURE;

    GO

    sp_configure ''default trace enabled'', 1;

    GO

    RECONFIGURE;

    GO

    ```


    它包含的事件比黑盒跟踪多得多，确切地说是 32 个。这些事件来自 6 个类别：服务器、数据库、错误和警告、全文、对象相关以及安全审核。完整的事件集可以在 SQL
    Server 联机丛书中找到。尽管默认跟踪很有用，但如果你有一个应用程序会频繁创建、更改或删除对象（例如在 tempdb 中的临时表），所需的信息可能很快就会被覆盖。以下代码展示了写入默认跟踪的三个事件：排序警告、缺少联接谓词以及带有添加和删除子类别的审核添加登录事件。如果你要运行此代码，请确保将路径更改为默认跟踪的路径。


    ```sql

    -- 创建一个次优的计划并重用它，从而创建一个排序警告。

    -- 在默认跟踪中创建“排序警告”事件

    USE tempdb

    -- 创建测试表

    IF (OBJECT_ID(''TestSortWarning'', ''U'') IS NOT NULL)

    DROP TABLE TestSortWarning

    GO

    CREATE TABLE TestSortWarning

    (

    c1 NVARCHAR(100) NOT NULL,

    c2 NVARCHAR(40) NOT NULL

    )

    GO

    -- 插入 100000 行随机数据

    INSERT INTO TestSortWarning(c1, c2)

    SELECT TOP 100000 c1.name, CAST(NEWID() AS NVARCHAR(40))

    FROM sys.all_columns AS c1,

    sys.all_columns AS c2

    GO

    CREATE CLUSTERED INDEX CI_TestSortWarning_c1 ON TestSortWarning(c1)

    GO

    -- 清除缓存

    DBCC freeproccache

    GO

    -- 返回 0 行

    EXEC sp_executesql N''SELECT * FROM TestSortWarning WHERE c1 LIKE @p1 ORDER BY
    c2'', N''@p1 NVARCHAR(20)'',

    @p1 = ''#%''

    GO

    -- 由于次优计划导致排序警告（查看排序操作符的行数估计）

    EXEC sp_executesql N''SELECT * FROM TestSortWarning WHERE c1 LIKE @p1 ORDER BY
    c2'', N''@p1 NVARCHAR(20)'',

    @p1 = ''B%''

    GO

    USE master

    GO

    SELECT TE.name, T.DatabaseName, T.DatabaseID

    FROM sys.fn_trace_gettable(''C:\Program Files\Microsoft SQL Server\MSSQL11.SQL2012\MSSQL\Log\log.trc'',
    DEFAULT) T

    JOIN sys.trace_events TE ON T.EventClass = TE.trace_event_id

    WHERE TE.name = ''Sort Warnings''

    ORDER BY T.StartTime DESC

    ```


    ```sql

    -- 在两列之间进行交叉联接。

    -- 在默认跟踪中创建“缺少联接谓词”事件

    USE master

    GO

    SELECT top 100 *

    FROM master..spt_values t1,

    master..spt_values t2

    GO

    SELECT TE.name, T.DatabaseName, T.DatabaseID

    FROM sys.fn_trace_gettable(''C:\Program Files\Microsoft SQL Server\MSSQL11.SQL2012\MSSQL\Log\log.trc'',
    DEFAULT) T

    JOIN sys.trace_events TE ON T.EventClass = TE.trace_event_id

    WHERE TE.name = ''Missing Join Predicate''

    ORDER BY T.StartTime DESC

    GO

    ```


    ```sql

    -- 创建一个登录名并删除它。

    -- 这将在默认跟踪中创建“审核添加登录事件：添加”

    -- 和“审核添加登录事件：删除”事件

    USE master

    CREATE LOGIN DT_LOGIN_TEST WITH PASSWORD = ''I_AM_PASSWORD!'';

    GO

    DROP LOGIN DT_LOGIN_TEST

    GO

    SELECT TE.name AS [EventName], TSV.subclass_name, T.DatabaseName, T.DatabaseID

    FROM sys.fn_trace_gettable(''C:\Program Files\Microsoft SQL Server\MSSQL11.SQL2012\MSSQL\Log\log.trc'',
    DEFAULT) T

    JOIN sys.trace_events TE ON T.EventClass = TE.trace_event_id

    JOIN sys.trace_subclass_values TSV ON TSV.trace_event_id = TE.trace_event_id AND

    TSV.subclass_value = t.EventSubClass

    WHERE te.name LIKE ''Audit Addlogin Event''

    ORDER BY T.StartTime DESC

    ```


    如果你需要收集比默认跟踪更多的数据，你应该创建另一个只包含额外数据的跟踪，并将两者关联起来以减少开销。尽管默认跟踪是轻量级的，但小心驶得万年船。


    ## 事件通知


    事件通知在 SQL Server 2005 中引入。它们基于 Service Broker，这是数据库引擎的一个异步扩展组件。图 5-6 展示了 Service
    Broker 的基本架构。你可以看到 Service Broker 的构建块：消息、服务、队列和对话。Service Broker 可以在数据库和服务器之间以事务方式发送消息，同时保持
    ACID 属性不变。两个端点之间的通信可以是开放的或加密的（传输安全性）。甚至消息本身也可以被加密（对话安全性）。我们这里只涵盖 Service Broker
    的最基本知识，但为了更深入的理解，你可以在 SQL Server 联机丛书中阅读相关内容。


    ![图 66](img/index-121_1.png)


    ### 图 5-6. SQL Server Service Broker 基本架构

