  trans: '# 第 8 章 发布管理


    ## 审查发布


    当你收集所有这些信息时，不可避免地会创建一个包含详尽信息、发布所有活动部分以及各种执行步骤的发布计划。请务必审查此计划。如果可能，在另一个环境中对发布计划进行**预演**，以验证各个步骤。与进行此项变更的开发人员和架构师一起审查这些步骤。与你的团队成员和其他相关人员一起审查这些步骤。验证这些步骤的合理性将确保你的发布能够成功执行。


    ## 交接


    一旦发布计划的所有步骤都已规划完毕，并且你已审查了步骤、信息和代码，你就达到了可以认为发布已从开发阶段“**交接**”的节点。确保你已尽职尽责地将发布推进到这一阶段。在发布经过严格审核之前，不要接受其为“已交接”。如果尚未达到此点，请重复任何先前未完成的步骤。重复这些步骤，直到你满意为止。


    ## 发布计划已创建


    现在你已经创建了一个发布计划，请在你的发布说明中注明创建的日期。这些信息将有助于你为未来的发布建立基准。了解发布被请求的日期，了解执行各项任务所需的时间长度，以及了解确保发布成功所需的所有必要部分，这些都将有助于你规划未来的发布。保存此信息并在成功发布后进行回顾，将对你有所帮助。


    ## 发布计划审查


    如前所述，审查发布计划可能是一个迭代的过程。记录每次修改计划的日期将帮助你建立基准并规划未来的发布。其中一些未来的发布可能包含类似的步骤，你的计划可以被复用，这应该能为你节省时间。


    ## 回滚程序


    除了精心规划执行发布的所有步骤、审查代码、用注释和信息增强你的文档之外，你还应该煞费苦心地创建**回滚程序**。正如创建变更有其步骤一样，你应该始终有步骤来撤销该变更。这可能包括你的数据库模式的快照，以及将对象变更恢复到原始状态的流程。它可能包括可以执行的脚本，以逆转数据变更、插入、更新或删除。请确保将这些信息添加到你的发布计划中，这样，如果不可避免的事情发生，你被迫必须回滚变更时，你已做好准备。你将拥有这些步骤，已在`发布计划`的测试阶段测试过这些步骤，并且拥有轻松、优雅地执行`回滚程序`的知识。在你需要它的那天，你肯定会很高兴已经准备好了这些步骤。与发布计划中的所有其他步骤一样，这些也需要经过他人的审核、测试和批准。


    ## 发布计划测试


    之前已经提到过，但还是要再说一遍：测试你的发布计划。测试、测试、再测试。创建一个尽可能模仿生产环境的沙盒环境，并在此环境中执行发布。这样做也将允许你测试回滚程序，以将环境恢复到先前的状态。执行你的前置和后置验证。在此环境中执行任何必要的质量保证任务。将此环境用作你的试验场。让你能够执行一次实际的发布，并在实际的生产发布之前审核所有步骤，这将对你大有裨益。当出现问题时（它可能会出问题），需要多次执行测试，这将使你为真正的生产发布做好更充分的准备。


    ## 执行发布


    至此，你已经做了大量工作，剩下的就是那个决定性的日子——发布日。你所有的准备工作都已就绪。其他人也已完成了他们的部分。你已经对你的发布计划进行了无数次测试。它已准备就绪。你实际上可以相当确定地预知结果。希望你不会说，“我希望这能成功。”此时你应该已经知道了。然而，要保持警惕，不要过度自信。按照你在发布计划步骤中概述的方式执行发布。不要冒跳过步骤的风险，因为你之前已经执行过这些步骤，可能都已烂熟于心。要一丝不苟，遵循你的计划，并按照概述执行发布。


    在执行发布时，确保对你的环境进行了适当的监控。应该有许多人一丝不苟地监视着你的流程，观察功能是否出现任何异常、各种监控结果以及可能发生的任何警报。这些人应该知道正在发生发布，并且能够指出异常情况。这种意识将使你能够在必要时暂停发布并执行你准备好的任何回滚程序。


    就在发布执行完毕之后，你可能会认为工作已经完成。你可以在这里停止。但为什么不额外花一点时间，对实际发布做一些记录呢？详细说明你或他人在执行步骤时遇到的任何问题。也许在执行过程中有些地方出了偏差，而这在之前的测试迭代中并未发现。如果你现在记录下这些细节，为下一次发布制定行动事项，那么下次你的流程将更加完善。不要害怕记录他人可以改进的地方。更不要害怕对自己做同样的记录。你进步的唯一途径是通过实践和对技术的观察。通常，在
    IT 系统发生错误后，会执行根本原因分析，以调查原因和可能的修复方法。为什么不对你的发布流程也进行一次积极的总结呢。每一次执行的发布迭代，无论多么简单或复杂，都能提供使下一次迭代更加稳定的提示。回想一下，我们的目标是达到那个完美的平衡点，即任务既充分又不繁琐。这将需要你的时间，并且很可能涉及这个灵活的发布流程的多次迭代。沿途做笔记对于使你的下一次发布更加顺利成功至关重要。


    ![图片 103](img/index-220_1.png)


    ## 发布计划模板与发布计划


    你会注意到，在我们讨论过的文档中，几项任务与信息交织在一起。现在我们来讨论将纳入发布计划的实际任务。这里我指的不是创建发布计划的任务，而是将在实际发布中执行的、你应该记录在发布计划中的任务。


    确保你彻底审查代码；特别要权衡这些变更将如何影响你的系统和拓扑结构。每次接触代码时，记录日期、你的观察结果、你的进度、任何笔记以及在此过程中你能收集到的任何其他信息。将这些信息保存在你的发布说明中。与所有相关人员共享这些信息。你可能需要在你自己和发布过程中涉及的其他个人之间安排各种会议。在收集信息的过程中，确保你在发布过程中及之后参考这些信息。'
- fmt: "You should create a release plan template to keep track of the generic tasks\
    \ you want to perform for each release. Each release will have specific tasks,\
    \ skipping some of the generic tasks, saving some, and maybe even adding unique\
    \ tasks for that particular release. Using this template document as a launch\
    \ pad into each release plan will greatly help your effectiveness, as well as\
    \ be able to allow you to control your release, matching similar tasks to past\
    \ releases. As your release management tasks evolve, so should this document.\n\
    \n## Generic Release Information\n\nWithin the template for release plans, as\
    \ well as the actual release plans, you should document the generic information\
    \ about the release. For the template, simply leave sections of the document ready\
    \ to be filled in with the information shown in `Figure 8-4`.\n\nIn the actual\
    \ release plan that you create for a given release, fill in this information as\
    \ you collect it.\n\nThis information will paint a picture of what these changes\
    \ will impact. It will require you to go out and talk to people, to understand\
    \ your topology, and find out the needed information. Do not skimp when you fill\
    \ out these answers. Really dig into the questions and ask the appropriate people\
    \ to glean as much information as you can. Collect this information in this section\
    \ of the document so that you can refer to it during release preparation and after.\
    \ `Figure 8-4` is an example spreadsheet that has been used to collect this information.\n\
    \n`Figure 8-4. Release plan template—release synopsis`\n\nCHAPTER 8 ■ RElEAsE\
    \ MAnAgEMEnT\n\nThe following list explains some of the information detailed in\
    \ `Figure 8-4`. Do not stop here; add to these as your system and topology reveals\
    \ questions you should be asking to prepare for a successful release. This list\
    \ is meant to be a quick reference guide that is filled out with quick answers.\n\
    \n*   The release name\n*   The dates to release to each environment\n    *  \
    \ Each environment should get a date. Multiple dates can be added for each attempt.\n\
    *   Project Overview\n*   Will there be a new database?\n*   Will there be new\
    \ objects?\n    *   Will these objects affect replication?\n    *   Will the creation\
    \ of this object cause issues? (It’s important to prove this while testing this\
    \ release.)\n*   Will there be schema changes?\n    *   List all tables impacted\
    \ by schema changes\n    *   Ensure that you create or review the schema change\
    \ script\n    *   Detail the activity that these tables experience\n*   Will there\
    \ be replication impact?\n    *   Detail the quantity of impact to be expected\n\
    *   Will there be data updates?\n*   Will there be `DTS` package updates? (similar\
    \ for `SSIS`)\n*   Will there be changes to Scheduled Jobs?\n*   Notes\n    *\
    \   General notes about the release\n    *   Notes from any preproduction environments\n\
    \    *   Notes about replication\n    *   Notes about data changes\n    *   Handoff\
    \ notes\n\n## Questions and Answers\n\nYou should also keep track of various questions\
    \ and answers that you typically ask of the developers. Keep these questions within\
    \ the release plan template. As you fill out individual release plans, you can\
    \ reference these questions and fill in the answers, as well as any others that\
    \ arise. These will help you to collect the information necessary to prepare for\
    \ the releases. `Figures 8-5` show an example spreadsheet of several questions\
    \ that I have used in the preparation of my releases.\n\n![Image 104](index-222_1.png)\n\
    \nCHAPTER 8 ■ RElEAsE MAnAgEMEnT\n\n`Figure 8-5. Release plan template—release\
    \ questions`\n\nThe following list goes into detail about the information shown\
    \ in `Figures 8-5`. These are all questions you should pose to the developers\
    \ within your organization.\n\n*   Does this release create a new or alter an\
    \ existing database?\n    *   What is the name of the affected/new database?\n\
    \    *   What are the capacity requirements?\n    *   What is the database size?\n\
    \    *   What type of activity occurs?\n        *   `read only`\n        *   `write\
    \ only`\n        *   Highly transactional\n        *   Reporting\n        *  \
    \ Periodic lookup\n    *   What are the growth projections?\n        *   Detail\
    \ how many rows will be created, how often, and so on.\n*   Does this release\
    \ create new objects?\n    *   If the object is a table, ask the following:\n\
    \        *   What is the name of the new or affected object?\n        *   What\
    \ are the capacity requirements?\n        *   What is the size of this object?\n\
    \        *   What type of activity occurs?\n        *   What are the growth projections?\n\
    \        *   Are there triggers involved with this object?\n    *   If the object\
    \ is a stored procedure, view or function, ask the following:\n        *   What\
    \ is the name of the object?\n        *   What is the business function? (This\
    \ might be a political hot button. Ensure that you find out as much as possible\
    \ as why this needs to exist and how it will help your system.)\n        *   Have\
    \ you verified the query plan or efficient use of indexes?\n        *   Do you\
    \ understand the potential impact to your system?\n*   Does this release contain\
    \ alterations to objects?\n    *   If the object is a table, ask the following:\n\
    \        *   What is the name of the new or affected object?\n        *   What\
    \ are the capacity requirements?\n        *   What are the changes to the table?\n\
    \        *   What is the size of this object?\n        *   What type of activity\
    \ occurs?\n        *   What are the growth projections?\n        *   What will\
    \ the transactional activity be?\n        *   Can the table remain quiet during\
    \ release?\n        *   Does the proposed schema change lock the table for an\
    \ extended period of time?\n        *   Are there triggers involved with this\
    \ object?\n    *   If the object is a stored procedure, view, or function, ask\
    \ the following:\n        *   What is the name of the object?\n        *   What\
    \ are the changes to the object?\n        *   Have you verified the query plan\
    \ or efficient use of indexes?\n        *   Do you understand the potential impact\
    \ to your system?\n*   Are there data updates?\n    *   What is the business need\
    \ to have data changed?\n    *   What is the expected quantity of changes?\n \
    \   *   What will the lock impact be?\n    *   What will the transaction size\
    \ be?\n    *   Does data need to be replicated to other systems? If so, why?\n\
    \    *   Is there an impact to replication?\n        *   What tables will be involved?\n\
    \        *   What will the security impact be?\n        *   Why does this change\
    \ need to occur?\n    *   Is there impact to regular database maintenance tasks?\n\
    \    *   Will this change impact indexes?\n    *   Will there be any data purge?\
    \ If so, understand the expected growth rate and any processes to maintain.\n\
    *   Is there any impact to `SQL Server Agent Jobs`?\n    *   Explain the requirements\
    \ for this job change.\n    *   Detail the schedule for this job.\n*   Are there\
    \ changes/new `SSIS`/`DTS` packages?\n    *   Detail the configuration requirements\
    \ for these packages.\n    *   Detail the purpose and implementation steps.\n\
    \    *   Understand the tables involved.\n        *   What read activity will\
    \ occur?\n        *   Detail the write / update / deletes that will occur.\n \
    \       *   Verify that the transaction boundaries are small.\n\nObviously, your\
    \ environment will be different and might require additional questions. These\
    \ are only samples to get you thinking about the possible questions you should\
    \ ask before each release. Ask these or similar questions to determine what this\
    \ change will entail, so that you can properly plan for it. Some of the preceding\
    \ questions are just the tip of the iceberg, and depending on the answers received,\
    \ you might need to dig deeper.\n\nFor example, if a new object is to be introduced\
    \ as part of the change, you will want to follow up with questions about the name\
    \ of the object, the capacity requirements if it is a database or table, the size\
    \ it should start out at and possibly grow to, the type of activity it will experience,\
    \ and what interactions it will have with other objects within your database."
  raw: 'You should create a release plan template to keep track of the generic tasks
    you want to perform for each release. Each release will have specific tasks, skipping
    some of the generic tasks, saving some, and maybe even adding unique tasks for
    that particular release. Using this template document as a launch pad into each
    release plan will greatly help your effectiveness, as well as be able to allow
    you to control your release, matching similar tasks to past releases. As your
    release management tasks evolve, so should this document.


    My release plan template has three major sections. The first section contains
    generic information about a release. The next section has various questions that
    should be asked for each release. The last section will be the actual steps to
    be performed to execute the release. This last section will be created once, and
    then duplicated for each environment that will receive the changes.


    Generic Release Information


    Within the template for release plans, as well as the actual release plans, you
    should document the generic information about the release. For the template, simply
    leave sections of the document ready to be filled in with the information shown
    in Figure 8-4.


    In the actual release plan that you create for a given release, fill in this information
    as you collect it.


    This information will paint a picture of what these changes will impact. It will
    require you to go out and talk to people, to understand your topology, and find
    out the needed information. Do not skimp when you fill out these answers. Really
    dig into the questions and ask the appropriate people to glean as much information
    as you can. Collect this information in this section of the document so that you
    can refer to it during release preparation and after. Figure 8-4 is an example
    spreadsheet that has been used to collect this information.


    ***Figure 8-4.** Release plan template—release synopsis*


    CHAPTER 8 ■ RElEAsE MAnAgEMEnT


    The following list explains some of the information detailed in Figure 8-4\. Do
    not stop here; add to these as your system and topology reveals questions you
    should be asking to prepare for a successful release. This list is meant to be
    a quick reference guide that is filled out with quick answers.


    •


    The release name


    •


    The dates to release to each environment


    •


    Each environment should get a date Multiple dates can be added for each


    attempt


    •


    Project Overview


    •


    Will there be a new database?


    •


    Will there be new objects?


    • Will these objects affect replication?


    • Will the creation of this object cause issues? (It’s important to prove


    this while testing this release.)


    •


    Will there be schema changes?


    • List all tables impacted by schema changes


    • Ensure that you create or review the schema change script


    • Detail the activity that these tables experience


    •


    Will there be replication impact?


    • Detail the quantity of impact to be expected


    •


    Will there be data updates?


    •


    Will there be DTS package updates? (similar for SSIS)


    •


    Will there be changes to Scheduled Jobs?


    •


    Notes


    •


    General notes about the release


    •


    Notes from any preproduction environments


    •


    Notes about replication


    •


    Notes about data changes


    •


    Handoff notes


    Questions and Answers


    You should also keep track of various questions and answers that you typically
    ask of the developers. Keep these questions within the release plan template.
    As you fill out individual release plans, you can reference these questions and
    fill in the answers, as well as any others that arise. These will help you to
    collect the information necessary to prepare for the releases. Figures 8-5 show
    an example spreadsheet of several questions that I have used in the preparation
    of my releases.


    ![Image 104](index-222_1.png)


    CHAPTER 8 ■ RElEAsE MAnAgEMEnT


    ***Figure 8-5.** Release plan template—release questions*


    The following list goes into detail about the information shown in Figures 8-5\.
    These are all questions you should pose to the developers within your organization.


    •


    Does this release create a new or alter an existing database?


    •


    What is the name of the affected/new database?


    •


    What are the capacity requirements?


    •


    What is the database size?


    •


    What type of activity occurs?


    • Read only


    • Write only


    • Highly transactional


    • Reporting


    • Periodic lookup


    •


    What are the growth projections?


    • Detail how many rows will be created, how often, and so on


    •


    Does this release create new objects?


    •


    If the object is a table, ask the following:


    • What is the name of the new or affected object?


    • What are the capacity requirements?


    CHAPTER 8 ■ RElEAsE MAnAgEMEnT


    • What is the size of this object?


    • What type of activity occurs?


    • What are the growth projections?


    • Are there triggers involved with this object?


    •


    If the object is a stored procedure, view or function, ask the following:


    • What is the name of the object?


    • What is the businesss function? (This might be a political hot button.


    Ensure that you find out as much as possible as why this needs to


    exist and how it will help your system.)


    • Have you verified the query plan or efficient use of indexes?


    • Do you understand the potential impact to your system?


    •


    Does this release contain alterations to objects?


    •


    If the object is a table, ask the following:


    • What is the name of the new or affected object?


    • What are the capacity requirements?


    • What are the changes to the table?


    • What is the size of this object?


    • What type of activity occurs?


    • What are the growth projections?


    • What will the transactional activity be?


    • Can the table remain quiet during release?


    • Does the proposed schema change lock the table for an extended


    period of time?


    • Are there triggers involved with this object?


    •


    If the object is a stored procedure, view, or function, ask the following:


    • What is the name of the object?


    • What are the changes to the object?


    • Have you verified the query plan or efficient use of indexes?


    • Do you understand the potential impact to your system?


    •


    Are there data updates?


    •


    What is the business need to have data changed?


    •


    What is the excpected quantity of changes?


    •


    What will the lock impact be?


    •


    What will the transaction size be?


    CHAPTER 8 ■ RElEAsE MAnAgEMEnT


    •


    Does data need to be replicated to other systems? If so, why?


    •


    Is there an impact to replication?


    •


    What tables will be involved?


    •


    What will the security impact be?


    •


    Why does this change need to occur?


    •


    Is there impact to regular database maintenance tasks?


    •


    Will this change impact indexes?


    •


    Will there be any data purge? If so, understand the expected growth rate and any


    processes to maintain


    •


    Is there any impact to SQL Server Agent Jobs?


    •


    Explain the requirements for this job change


    •


    Detail the schedule for this job


    •


    Are there changes/new SSIS/DTS packages?


    •


    Detail the configuration requirements for these packages.


    •


    Detail the purpose and implementation steps


    •


    Understand the tables involved


    • What read activity will occur?


    • Detail the write / update / deletes that will occur.


    • Verify the the transaction boundries are small.


    Obviously, your environment will be different and might require additional questions.
    These are only samples to get you thinking about the possible questions you should
    ask before each release. Ask these or similar questions to determine what this
    change will entail, so that you can properly plan for it. Some of the preceding
    questions are just the tip of the iceberg, and depending on the answers receive,
    you might need to dig deeper.


    For example, if a new object is to be introduced as part of the change, you will
    want to follow up with questions about the name of the object, the capacity requirements
    if it is a database or table, the size it should start out at and possibly grow
    to, the type of activity it will experience, and what interactions it will have
    with other objects within your database.'
  trans: "\n您应该创建一个发布计划模板，以跟踪每次发布时需要执行的通用任务。每次发布都会有特定任务，可能会跳过某些通用任务、保留一些任务，甚至可能添加该次发布独有的任务。使用此模板文档作为启动每个发布计划的基础，将极大提升您的工作效率，同时让您能够控制发布过程，将类似任务与历史发布保持一致。随着您的发布管理任务不断发展，此文档也应同步更新。\n\
    \n## 通用发布信息\n\n在发布计划模板以及实际的发布计划中，您应记录关于发布的通用信息。对于模板，只需按照 `Figure 8-4` 所示信息，将文档相应部分预留出来待填写即可。\n\
    \n在为特定发布创建的实际发布计划中，随着信息的收集逐步填写这部分内容。\n\n这些信息将描绘出这些变更将产生何种影响。它要求您主动与相关人员沟通，理解您的系统架构，并获取所需信息。填写这些答案时切勿敷衍。务必深入探究问题，向适当人员请教，以尽可能收集详尽信息。将本信息收集在文档的此部分中，以便您在发布准备期间及之后随时参考。`Figure\
    \ 8-4` 是一个用于收集此信息的示例电子表格。\n\n`Figure 8-4. 发布计划模板——发布概要`\n\n第 8 章 ■ 发布管理\n\n以下列表解释了\
    \ `Figure 8-4` 中详述的部分信息。请不要止步于此；随着您的系统和架构揭示出为成功发布做准备应询问的问题，请随时增补。此列表旨在作为快速参考指南，用于填写简要答案。\n\
    \n*   发布名称\n*   发布到每个环境的日期\n    *   每个环境都应有一个日期。每次尝试可添加多个日期。\n*   项目概述\n*   是否会创建新数据库？\n\
    *   是否会创建新对象？\n    *   这些对象会影响复制吗？\n    *   创建此对象会导致问题吗？（在测试此发布时证明这一点很重要。）\n*\
    \   是否存在架构更改？\n    *   列出受架构更改影响的所有表\n    *   确保创建或审阅架构更改脚本\n    *   详细说明这些表所经历的活动类型\n\
    *   是否会对复制产生影响？\n    *   详细说明预期的影响程度\n*   是否会进行数据更新？\n*   是否会有 `DTS` 包更新？（`SSIS`\
    \ 类似）\n*   计划作业是否会有变更？\n*   备注\n    *   关于此发布的一般性备注\n    *   来自任何预生产环境的备注\n  \
    \  *   关于复制的备注\n    *   关于数据更改的备注\n    *   交接备注\n\n## 问题与答案\n\n您还应记录通常向开发人员提出的一系列问题及其答案。将这些问题保存在发布计划模板中。在填写个别发布计划时，您可以参考这些问题并填写答案，以及出现的任何其他问题。这将帮助您收集为发布做准备所需的信息。`Figures\
    \ 8-5` 展示了一个示例电子表格，其中包含我在准备发布时使用过的几个问题。\n\n![Image 104](img/index-222_1.png)\n\
    \n第 8 章 ■ 发布管理\n\n`Figure 8-5. 发布计划模板——发布问题`\n\n以下列表详细说明了 `Figures 8-5` 中显示的信息。这些都是您应向组织内开发人员提出的问题。\n\
    \n*   此发布是否会创建新数据库或更改现有数据库？\n    *   受影响/新数据库的名称是什么？\n    *   容量要求是什么？\n    *\
    \   数据库大小是多少？\n    *   会发生何种类型的活动？\n        *   `只读`\n        *   `只写`\n     \
    \   *   高事务性\n        *   报表\n        *   周期性查询\n    *   增长预测如何？\n        *  \
    \ 详细说明将创建多少行、创建频率等。\n*   此发布是否会创建新对象？\n    *   如果对象是表，请询问以下问题：\n        *   新对象或受影响对象的名称是什么？\n\
    \        *   容量要求是什么？\n        *   此对象的大小是多少？\n        *   会发生何种类型的活动？\n     \
    \   *   增长预测如何？\n        *   此对象是否涉及触发器？\n    *   如果对象是存储过程、视图或函数，请询问以下问题：\n \
    \       *   对象的名称是什么？\n        *   业务功能是什么？（这可能是一个敏感的政治问题。务必尽可能查明其存在的原因以及它将如何帮助您的系统。）\n\
    \        *   是否已验证查询计划或索引的高效使用？\n        *   您是否了解其对系统的潜在影响？\n*   此发布是否包含对对象的修改？\n\
    \    *   如果对象是表，请询问以下问题：\n        *   新对象或受影响对象的名称是什么？\n        *   容量要求是什么？\n\
    \        *   表发生了哪些更改？\n        *   此对象的大小是多少？\n        *   会发生何种类型的活动？\n    \
    \    *   增长预测如何？\n        *   事务活动将会怎样？\n        *   在发布期间，表是否可以保持静默？\n      \
    \  *   拟议的架构更改是否会长时间锁定表？\n        *   此对象是否涉及触发器？\n    *   如果对象是存储过程、视图或函数，请询问以下问题：\n\
    \        *   对象的名称是什么？\n        *   对象发生了哪些更改？\n        *   是否已验证查询计划或索引的高效使用？\n\
    \        *   您是否了解其对系统的潜在影响？\n*   是否存在数据更新？\n    *   需要更改数据的业务需求是什么？\n    *  \
    \ 预期的更改数量是多少？\n    *   锁定影响会如何？\n    *   事务大小会是多少？\n    *   数据是否需要复制到其他系统？如果是，为什么？\n\
    \    *   是否对复制产生影响？\n        *   会涉及哪些表？\n        *   安全影响会如何？\n        *   为什么需要进行此更改？\n\
    \    *   是否对常规数据库维护任务产生影响？\n    *   此更改会影响索引吗？\n    *   是否会有任何数据清除？如果是，请了解预期增长率以及任何需要维护的流程。\n\
    *   是否对 `SQL Server 代理作业` 产生影响？\n    *   解释此作业更改的要求。\n    *   详细说明此作业的计划安排。\n\
    *   是否有变更/新增的 `SSIS`/`DTS` 包？\n    *   详细说明这些包的配置要求。\n    *   详细说明其目的和实施步骤。\n\
    \    *   了解涉及的表。\n        *   会发生何种读取活动？\n        *   详细说明将发生的写入/更新/删除操作。\n  \
    \      *   确保事务边界较小。\n\n显然，您的环境会有所不同，可能需要额外的问题。这些只是示例，旨在启发您思考在每次发布前应该询问的可能问题。提出这些或类似的问题，以确定此变更将涉及哪些内容，从而能够进行妥善规划。前述问题仅是冰山一角，根据收到的答案，您可能需要深入探究。\n\
    \n例如，如果作为变更的一部分将引入一个新对象，您将希望跟进有关对象名称、如果是数据库或表的容量要求、其初始大小及可能增长到的大小、它将经历的活动类型以及它将与数据库中其他对象发生何种交互等问题。\n"
- fmt: '# CHAPTER 8 ■ RElEAsE MAnAgEMEnT


    Or, if the change requires an alteration to an existing object, you might need
    to know about its type of activity, and if the proposed change will impact it,
    lock it, or otherwise cause the object to be inaccessible for a period. If so,
    how can you ensure that the rest of your topology, system, applications, and so
    forth are minimally impacted? You might have to gracefully shut down services
    prior to this change being released to production, and finding this out early
    on will help you create the proper steps to perform this graceful shutdown.


    When a change impacts replication, you might have to take special precautions
    to ensure that replication continues functioning as currently designed and implemented.
    There could be extra steps that need to be performed to introduce this change
    into a replicated environment that would not be necessary in a nonreplicated environment.
    Maybe you rely on a third-party replication scheme that is difficult to maintain
    and could generate many extra steps. In any event, knowing the impact to replication
    as you create your release plan will help.


    ![Image 105](index-225_1.png)


    The point is that there is always room for more digging to find out as much as
    you possibly can. Think about how this change could affect your regular, automated,
    or even manual maintenance of your database systems. You will need to plan this
    into the release plan as well. If you are introducing a new database to your system,
    ensure that your regular maintenance processes pick up this new database and perform
    the necessary tasks upon it. You might need to create or alter backup jobs. Other
    maintenance processes will likely be impacted. Identify and plan for these changes.


    If you are changing any jobs, ensure that you collect the details about the job.
    Review the schedule that it will execute. You will want to make sure that this
    doesn’t conflict with other existing jobs. Review the details of the job to see
    what the job will affect. It would be bad for new or existing jobs to be negatively
    impacted through a change.


    If your change affects any `DTS` packages or `SSIS` packages, there will be many
    details that you should investigate. There will be configurations and steps that
    you should review, as well as determining which objects will be affected with
    the various steps of the packages.


    ## Release Steps


    As you create the steps to perform a release, realize that these steps will be
    repeated for most environments. Some of the steps might not occur in some environments,
    and some environments might need extra steps. This will depend on how you have
    set up each of these environments. I suggest that you create these steps for a
    single environment, and then make adjustments for each of the other environments
    as needed. This means that general steps could be created for all environments,
    and then multiple environments can be copied from the original, creating unique
    steps for each. Ensure that you detail the steps necessary for each environment.
    Be methodical and list them all. I find it imperative to create individual step
    lists for each environment and check off each task as they are performed.


    ```

    Figure 8-6 shows the release steps portion of the plan template.

    ```


    List each database that will be touched by the release, and the people who work
    on those databases that need to be informed of the impending release. This is
    important to keep things organized. This database list will also become a series
    of steps you will take to ensure snapshots are taken for each affected database.
    Generating a snapshot of each database schema will give you a baseline to compare
    against before, during, and after the release.


    There will be many options to generate these snapshots. Third-party applications
    can perform this task, scripting objects directly from `Management Studio`, `SMO`,
    or `PowerShell`. One of my favorite tools is `Red Gate SQL Compare`, which lets
    you generate a snapshot as a single file containing the schema of the selected
    database. You can then compare this snapshot to another snapshot of that same
    database at a later time. Comparisons will show the different objects that were
    altered by your change. The main point is that it’s an important step to perform.
    Generating a before-and-after snapshot of your various database schemas, and using
    this comparison to show what was affected, can assist with rollback, if necessary.


    Along with generating a snapshot, there might be other steps that you need to
    perform to get ready for the release. These could include a graceful shutdown
    of other services or application, or you might need to make changes to your replication
    configuration to properly prepare for the release. Each of these steps needs to
    be detailed, thought out, and planned. You should identify and document preparatory
    tasks as individual steps.


    At some point, you will need to list all the objects and/or scripts that will
    be executed to affect the needed changes. You could simply execute these changes
    directly in `Management Studio`, which will require someone to generate a script.


    You could also use a tool to perform a compare between production and a lower
    environment, and affect the changes via this generated script. You can use a release
    tool that controls the execution of changes, documenting each step, with ability
    to roll back failed changes. Creating this tool will take some time and effort,
    but it will help you gracefully release change into your environment. Using a
    comparison tool will let you manually decide which objects will be compared and
    ultimately altered.


    Whether you use a comparison tool or `Management Studio`, a script that details
    the changes will need to be created by someone intimately involved with the requested
    changes. A script will need to be generated that can perform a rollback as well.
    Creating a single script with all changes, or multiple scripts with individual
    changes will be your prerogative. Single or multiple scripts will also impact
    the rollback process. How you execute this change will be an important factor
    in your release process, allowing for a graceful and controlled change.


    If you have replication involved in your topology, your release might need some
    extra steps. You might need to drop subscriptions and/or articles, add articles
    back, stop distribution agents, refresh subscriptions, and maybe even resnapshot
    publications. These steps will need to be tested in a similarly replicated environment,
    to ensure that the steps taken will succeed.


    Just as you detailed all the steps to gracefully shut down applications and services,
    you will now want to detail the reverse of those steps that will need to be taken
    to seamlessly turn them back on. List each of these steps, in the proper order.


    After everything has been released, generate another schema snapshot and use it
    to compare to the original snapshot. This should prove which objects where altered.
    This can be used to generate reports to show what was accomplished for the release.


    As you perform each step within the release plan, mark it as completed. Even though
    this is just for you, you will be able to refer to this document on many occasions
    in the future, and it will certainly help in planning future similar releases.
    Use this as proof of what steps were taken, or what steps were not taken.


    Let this documentation validate that your release process steps were executed
    in the proper order. You can always refer to these and make alterations to your
    process and your release plan template to accommodate new information, new knowledge,
    and new ways of accomplishing successful releases.'
