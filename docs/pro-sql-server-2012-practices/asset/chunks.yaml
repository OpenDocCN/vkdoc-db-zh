    Conclusion


    At times, there are no easy answers for dealing with the increase in data volumes
    that many of you experience on a daily basis. However, there are tools at your
    disposal to help you define and then articulate your specific situation. There
    are also design considerations you can help introduce or implement in your environment.
    It all begins with knowing your IOP pattern and being able to discuss it at a
    moment’s notice.


    Then work on the ideas you have gleaned from this chapter. Your IOP pattern will
    change over time and with new features and functionality. Keep your IOP profile
    up to date, take your storage guru out to lunch, build the bridge of communication
