- fmt: '# Chapter 14: Page and Row Compression


    When I think about compression, I find it helps to think of the hierarchy in which
    data is stored inside of SQL Server as a map of a shopping mall. (For a full hierarchy,
    see **Figure 14-3**.) When you go to a mall, you see a lot of little signs that
    read “You Are Here.” Compression directly affects the way that data is stored,
    and to understand it you need to start at the bottom and work your way up. Row
    compression affects the way that data is stored at the Record level. At the very
    bottom of the hierarchy are records—specifically, data records.


    **Figure 14-3.** Compression affects the way data is stored on disk. Row compression
    specifically alters the way data is stored at the record level.


    To help you understand what happens when changes are made to a data record, I’ll
    start by examining a regular record. First I’ll make a database and a table so
    that I can create a data record and insert a record:


    ```sql

    IF EXISTS(SELECT NAME FROM SYS.DATABASES WHERE NAME=''demoInternals'')

    BEGIN

    DROP DATABASE demoInternals

    END

    GO

    USE master

    GO

    CREATE DATABASE demoInternals

    GO

    USE demoInternals

    GO

    IF EXISTS(SELECT NAME FROM sys.tables WHERE NAME=''dataRecord'')

    BEGIN

    DROP TABLE dataRecord

    END

    GO

    CREATE TABLE dataRecord

    (myID INT

    ,myfixedData CHAR(4)

    ,myVarData1 VARCHAR(6)

    ,myVarData2 VARCHAR(9)

    ,myVarData3 VARCHAR(6)

    )

    GO

    INSERT INTO dataRecord(myID, myfixedData, myVarData1, myVarData2, myVarData3)

    VALUES (7, ''XXXX'', ''SSS'', ''WWWWWWWWW'', ''BB'')

    GO

    ```


    A regular data record is made up of tag bytes, the `NULL` bitmap offset, the fixed
    data portion of the record, the `NULL` bitmap, the variable offset array, the
    variable array, and special information (used for the snapshot isolation level
    or forwarding pointers in heaps). I will now use the undocumented commands `DBCC
    IND` and `DBCC PAGE` to peek underneath the covers and see the data record on
    disk. (See **Figure 14-5**.)


    ```sql

    DBCC IND(demoInternals, ''dataRecord'', 1)

    GO

    --Note your Page IDs may vary from mine

    --We want to get the Page Number which

    --has the column value of PageType =1

    ```


    **Figure 14-4.** Output of `DBCC IND`.


    As you can see from **Figure 14-4**, two rows have been returned. We want to look
    at the data record. If you look at the `PageType` column, you’ll see one row has
    a value of 10 and the other has a value of 1. Value 10 is an allocation page.
    Whenever a table is created, it receives an allocation page, and this is that
    page for our table, while value 1 indicates a data page. If you then look at column
    `PagePID` for the row that has a `PageType` value of 1, you see the data record
    is found on page 276. Now set `Trace Flag 3604` to ON to send the output of `DBCC
    Page` to the SQL Server Management Studio, `SSMS`, window. If you don’t enable
    `Trace Flag 3604`, you get only the message “Command completed successfully” and
    no additional output. Next I’ll use `DBCC Page` to view the record. The output
    of `DBCC Page` will give us a lot of metadata. I strip that down just to the data
    that is relevant for us to examine the data record. See **Figure 14-5** to see
    the data record output of `DBCC Page`.


    ```sql

    DBCC TRACEON(3604)

    GO

    DBCC PAGE(''demoInternals'', 1, 276, 1)

    GO

    ```


    **Figure 14-5.** Full output of an internal data record.


    In a normal data record, you have tag bytes, a `NULL` bitmap offset, fixed-length
    data, the `NULL` bitmap, our variable offset array, and our variable length data.


    SQL Server has five transaction isolation levels: Read Committed, Read Uncommitted,
    Repeatable Read, Snapshot, and Serializable. The default transaction isolation
    level for SQL Server is Read Committed.


    If you use Read Uncommitted or Snapshot, you enable versioning on your data records.
    A full discussion of transaction isolation levels is beyond the scope of this
    chapter; see Microsoft Books Online to read more on transaction isolation levels
    at http://msdn.microsoft.com/en-us/library/ms173763.aspx.


    If you have Snapshot or Read Uncommitted isolation level turned on or are using
    any feature that uses the Snapshot isolation level, such as Online Index or Table
    Rebuilds, you’ll have an additional portion that contains a date timestamp of
    when the record was last changed.


    ## Row Compression


    Row compression works on the fixed-length data types in the data record. What
    are fixed-length data types? Anything that is `decimal`, `numeric`, `smallint`,
    `int`, `bigint`, `bit`, `smallmoney`, `money`, `float`, `real`, `datetime`, `datetime2`,
    `datetimeoffset`, `char`, `binary`, `timestamp/rowversion`, `nchar`, `nvarchar`,
    and introduced in SQL 2012 for the first time, Spatial Data Types `Geometry` and
    `Geography`.


    So how does it work? Row compression stores fixed-length data that contains variable-length
    data as variable-length data. That’s a bit of a tongue twister, but let me explain.
    If I took a `Char(50)` field and put in the value “Bradley Ball,” I would be using
    only 12 bytes out of 50. A regular data record wastes those 38 bytes. Row compression
    stores just the 12 bytes. If I had a `datetime` field—normally, 8 bytes—and inserted
    the value “1/25/1977,” a compressed record would store that as a 4-byte field,
    giving us 4 bytes of savings.


    Our variable-length identifiers, the variable offset array, are reduced from 4
    bytes to 4 bits each. There is also special handling for `NULL` values and zeros,
    which reduces storage from bytes to bits.


    Now that you’ve looked at a normal data record and read about the changes row
    compression will make, try compressing the record. After you rebuild the table,
    you need to use `DBCC IND` to get the data page again (as you can see in **Figure
    14-6**), because the rebuild operation creates a new page with a new page number.


    ```sql

    ALTER TABLE dataRecord

    REBUILD WITH (DATA_COMPRESSION=ROW)

    GO

    DBCC IND(demoInternals, ''dataRecord'', 1)

    GO

    ```


    **Figure 14-6.** Output of `DBCC IND`.


    Now use `DBCC Page` to get the Row Compressed record. The results are shown in
    **Figure 14-7**. Once again, I strip out the metadata details and list only the
    data record, but as you examine the output of `DBCC Page`, you’ll see that the
    record type is now listed as compressed.


    ```sql

    DBCC PAGE(''demoInternals'', 1, 320, 1)

    GO

    ```


    **Figure 14-7.** Row-compressed data record.


    Now that the record is row-compressed, you can see that the structure of the record
    has changed quite a bit. You have a header, CD region, a short data region that
    stores all data shorter than 9 bytes, and a long data region with all data that
    is 9 bytes and longer. Once again, if you had the Snapshot isolation level turned
    on or if you had a forwarding pointer from a heap, they would be at the end of
    the record in an area called Special Information.


    It is important to understand row compression because it is the default level
    of compression that will be applied when compression is turned on. Furthermore,
    index pages beyond the leaf level will only be row-compressed even if you’re using
    Page-level compression.


    ## Page Compression


    The next step on our tour of SQL compression internals is page compression, as
    shown in **Figure 14-8**.


    **Figure 14-8.** Page compression rearranges structures at the page level.'
