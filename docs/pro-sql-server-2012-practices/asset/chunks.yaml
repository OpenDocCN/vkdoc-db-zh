    Select


    db_name(), db_ID(), object_schema_name(indexes.object_id) + ''.'' +


    object_name(indexes.object_id),OBJECT_ID, indexes.name, indexes.index_id,


    indexes.type_desc


    FROM sys.indexes


    Where object_schema_name(indexes.object_id) not like ''sys''


    DECLARE Get_Frag CURSOR FOR SELECT ObjectID, IndexID FROM


    @Index_Fragmentation;


    Open Get_Frag


    WHILE 1=1


    BEGIN


    FETCH NEXT from Get_FRAG Into @OBJECTID, @INDEXID;


    IF @@FETCH_STATUS < 0 BREAK


    UPDATE @Index_Fragmentation


    SET Fragmentation = avg_fragmentation_in_percent


    from


    sys.dm_db_index_physical_stats(db_id(),@ObjectID,@IndexID, null, null)


    WHERE ObjectID = @ObjectID and IndexId = @IndexID


    END


    CLOSE Get_Frag


    DEALLOCATE Get_Frag


    INSERT INTO Index_Fragmentation


    ([DatabaseName], [OBjectName], [IndexName], [Index_Type],


    [Fragmentation], [ReadingDate])


    Select [DatabaseName], [OBjectName], [IndexName], [Index_Type],


    [Fragmentation], GETDATE()


    From @Index_Fragmentation


    GO


    After your utility database has the index fragmentation stored, index maintenance
    can be very strategic. Code can be written that includes decision factors in rebuilding
    or defragmenting and index based on fragmentation.


    chapter 6 ■ the Utility Database


    Stored Procedure Performance


    Tracking stored procedure performance can be critical in many complex environments.
    The flexibility of SQL Server and the demands on new features for applications
    that require database support can require hours of code reviews to validate performance
    before release. Often, this is not an option due to the time commitment; therefore,
    understanding the performance patterns on the stored procedures, historically,
    is critical.


    USE [dbUtilities]


    GO


    CREATE TABLE [dbo].[Procedure_Execution_Times](


    [ProcExecutionReadingID] [int] IDENTITY(1,1) NOT NULL,


    [DatabaseName] [Sysname],


    [SPName] [Sysname] NULL,


    [ExeCount] [bigint] NULL,


    [ExePerSec] [bigint] NULL,


    [AvgWorkerTime] [bigint] NULL,


    [TotalWorkerTime] [bigint] NULL,


    [AvgElapsedTime] [bigint] NULL,


    [MaxLogicalReads] [bigint] NULL,


    [MaxLogicalWrites] [bigint] NULL,


    [TotalPhysicalReads] [bigint] NULL,


    [DateRecorded] [datetime] NULL,


    CONSTRAINT [PK_Procedure_Execution_Times_ID] PRIMARY KEY CLUSTERED


    ([ProcExecutionReadingID]))


    GO


    The stored procedure execution times can be retrieved by looking at the sys.dm_exec_query_stats
    DMV. When using a DMV as the source of statistics, it is important to understand
    the source of this information. With the sys.dm_exec_query_stats DMV, the data
    is based on the cache. When the execution plan is no longer in cache, the corresponding
    statistics are removed from the sys.dm_exec_query_stats DMV.


    n **Note** I highly recommend looking at some of the other useful DMVs that Glenn
    Berry has on his blog at


    [http://sqlserverperformance.wordpress.com.](http://sqlserverperformance.wordpress.com)


    USE [dbUtilities]


    GO


    CREATE PROCEDURE [dbo].[Get_Proc_Exection_Times]


    AS


    INSERT INTO dbUtilities..Procedure_Execution_Times


    (DatabaseName,SPName, ExeCount, ExePerSec, AvgWorkerTime, TotalWorkerTime,


    AvgElapsedTime, MaxLogicalReads, MaxLogicalWrites, TotalPhysicalReads,


    DateRecorded)


    SELECT


    DB_Name() AS dbname,


    OBJECT_SCHEMA_NAME(qt.objectid, qt.dbid) + ''.'' + object_name(qt.objectid,


    qt.dbid) AS spname,


    chapter 6 ■ the Utility Database


    qs.execution_count AS ''Execution Count'',


    isnull(qs.execution_count,.0001)/Isnull(DATEDIFF(Second, qs.creation_time,


    GetDate()),.0001) AS ''Calls/Second'',


    isnull(qs.total_worker_time,1)/isnull(qs.execution_count,1) AS


    ''AvgWorkerTime'',


    qs.total_worker_time AS ''TotalWorkerTime'',


    isnull(qs.total_elapsed_time,1)/isnull(qs.execution_count,1) AS


    ''AvgElapsedTime'',


    qs.max_logical_reads,


    qs.max_logical_writes,


    qs.total_physical_reads,


    GETDATE() AS RecordedDate


    FROM sys.dm_exec_query_stats AS qs


    CROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) AS qt


    ORDER BY qs.execution_count DESC


    GO


    This information should help answer questions such as what stored procedure is
    executed the most often, and what stored procedures have the longest duration.


    Failed Jobs


    Keep track of failed jobs over the last 48 hours by querying the system tables
    in the msdb database and inserting the results into the Daily_Report table. Because
    this data is used as an overview and notification to the report viewer of potential
    problems, minimum data is stored and there is no historical use, in this context.
    The stored procedure can be altered to keep a longer, more detailed history if
    it is a requirement, and the history in the msdb database does not meet the requirements.


    USE [dbUtilities]


    GO


    CREATE PROCEDURE Get_Failed_Jobs


    AS


    INSERT INTO Daily_Report


    (EventStatus, EventDate, Event)


    SELECT


    ''Job Failed'',


    msdb.dbo.agent_datetime(sjh.run_date, sjh.run_time),


    ''SQL Server Job Failed '' + Name


    FROM msdb..sysjobs sj


    Join msdb..sysjobhistory sjh


    on sj.job_id = sjh.job_id and sjh.run_status = 0


    WHERE Enabled = 1 and step_id = 0


    AND msdb.dbo.agent_datetime(sjh.run_date, sjh.run_time) > Dateadd(dd,


    -2,GetDate())


    GO


    n **Note** You can modify the option for keeping longer history on SQL Server
    2012 job and task history by adjusting the job history properties in the SQL Server
    Agent properties.


    chapter 6 ■ the Utility Database


    The visibility of information that SQL Server 2012 provides helps you get the
    important information required to manage the servers and databases. Up to this
    point, the examples have been focused on the core installation of SQL Server,
    so all the tables and stored procedures have been created in the dbo schema. In
    the next section, the examples focus on feature-specific counters. In your environment,
    you may use all, some, or none of the features. These examples use a different
    schema for each feature to help with the deployment of the code based on used
    features. I would recommend you consider using a like method to organize the information
    you are collecting.


    Reporting Services


    SQL Server Reporting Services (SSRS) has made report authoring and deployment
    easy and common. Yet, a thorough understanding of how Reporting Services is used
    is not as common. With a few simple steps, question such as what is the most common
    report, what is the longest running report, and what step of building the report
    takes the most time can be answered with confidence.


    n **Note** Recently, I received a call that the reports were not performing well.
    After a few quick queries, I was able to isolate what reports were having issues,
    and was able to determine that the performance degradation was on the Reporting
    Services machine with the rendering time, rather than the database server and
    the data retrieval time.


    Having this information allowed me to focus my work where it could make the largest
    impact.'
  trans: "\n# 第六章：工具数据库\n\n## 填充 Index_Fragmentation 表\n\n工具数据库用于跟踪索引碎片的表结构如下：\n\n\
    ```sql\nUSE [dbUtilities]\nGO\nCREATE TABLE [dbo].Index_Fragmentation NOT NULL,\n\
    \    [DatabaseName] [Sysname] NULL,\n    [OBjectName] [Sysname] NULL,\n    [IndexName]\
    \ [Sysname] NULL,\n    [Index_Type] nvarchar NULL,\n    [Fragmentation] [float]\
    \ NULL,\n    [ReadingDate] [datetime] NULL,\n    CONSTRAINT [PK_IndexFragID] PRIMARY\
    \ KEY CLUSTERED\n    ([IndexFragID])\n)\nGO\n```\n\n使用以下存储过程查询 `sys.indexes` 表来填充\
    \ `Index_Fragmentation` 表。此示例中的粒度包括数据库、表和索引。只需添加几行代码，即可修改该过程以查看分区和服务器上的所有数据库。\n\
    \n```sql\nUSE [dbUtilities]\nGO\nCREATE PROCEDURE Get_Index_Fragmentation\nAS\n\
    DECLARE @objectID int\nDECLARE @IndexID int\nDECLARE @Index_Fragmentation TABLE\
    \ ([DatabaseName] [Sysname], DB_ID int,\n    [OBjectName] [Sysname], ObjectID\
    \ int, [IndexName] [Sysname], IndexId int,\n    [Index_Type] nvarchar,[Fragmentation]\
    \ [float])\n\nINSERT INTO @Index_Fragmentation ([DatabaseName], [DB_ID], [OBjectName],\n\
    \    [ObjectID], [IndexName], [IndexId], [Index_Type])\nSelect\n    db_name(),\
    \ db_ID(), object_schema_name(indexes.object_id) + '.' +\n    object_name(indexes.object_id),OBJECT_ID,\
    \ indexes.name, indexes.index_id,\n    indexes.type_desc\nFROM sys.indexes\nWhere\
    \ object_schema_name(indexes.object_id) not like 'sys'\n\nDECLARE Get_Frag CURSOR\
    \ FOR SELECT ObjectID, IndexID FROM\n    @Index_Fragmentation;\nOpen Get_Frag\n\
    WHILE 1=1\nBEGIN\n    FETCH NEXT from Get_FRAG Into @OBJECTID, @INDEXID;\n   \
    \ IF @@FETCH_STATUS < 0 BREAK\n    UPDATE @Index_Fragmentation\n    SET Fragmentation\
    \ = avg_fragmentation_in_percent\n    from\n        sys.dm_db_index_physical_stats(db_id(),@ObjectID,@IndexID,\
    \ null, null)\n    WHERE ObjectID = @ObjectID and IndexId = @IndexID\nEND\nCLOSE\
    \ Get_Frag\nDEALLOCATE Get_Frag\n\nINSERT INTO Index_Fragmentation\n    ([DatabaseName],\
    \ [OBjectName], [IndexName], [Index_Type],\n    [Fragmentation], [ReadingDate])\n\
    Select [DatabaseName], [OBjectName], [IndexName], [Index_Type],\n    [Fragmentation],\
    \ GETDATE()\nFrom @Index_Fragmentation\nGO\n```\n\n在您的工具数据库存储了索引碎片信息后，索引维护就可以非常具有策略性。可以编写代码，根据碎片情况将决策因素（如重建或整理索引）纳入其中。\n\
    \n## 存储过程性能\n\n在许多复杂环境中，跟踪存储过程性能至关重要。SQL Server 的灵活性以及对需要数据库支持的应用程序新特性的要求，可能需要在发布前进行数小时的代码审查以验证性能。通常，由于时间投入的问题，这并非总是可行；因此，了解存储过程历史上的性能模式至关重要。\n\
    \n```sql\nUSE [dbUtilities]\nGO\nCREATE TABLE [dbo].Procedure_Execution_Times\
    \ NOT NULL,\n    [DatabaseName] [Sysname],\n    [SPName] [Sysname] NULL,\n   \
    \ [ExeCount] [bigint] NULL,\n    [ExePerSec] [bigint] NULL,\n    [AvgWorkerTime]\
    \ [bigint] NULL,\n    [TotalWorkerTime] [bigint] NULL,\n    [AvgElapsedTime] [bigint]\
    \ NULL,\n    [MaxLogicalReads] [bigint] NULL,\n    [MaxLogicalWrites] [bigint]\
    \ NULL,\n    [TotalPhysicalReads] [bigint] NULL,\n    [DateRecorded] [datetime]\
    \ NULL,\n    CONSTRAINT [PK_Procedure_Execution_Times_ID] PRIMARY KEY CLUSTERED\n\
    \    ([ProcExecutionReadingID])\n)\nGO\n```\n\n可以通过查看 `sys.dm_exec_query_stats`\
    \ DMV 来获取存储过程执行时间。当使用 DMV 作为统计信息源时，理解此信息的来源非常重要。对于 `sys.dm_exec_query_stats` DMV，数据基于缓存。当执行计划不再位于缓存中时，相应的统计信息会从\
    \ `sys.dm_exec_query_stats` DMV 中移除。\n\n`注意` 我强烈建议查看 Glenn Berry 博客上提供的一些其他有用\
    \ DMV，网址是 [`sqlserverperformance.wordpress.com`](http://sqlserverperformance.wordpress.com)。\n\
    \n```sql\nUSE [dbUtilities]\nGO\nCREATE PROCEDURE [dbo].[Get_Proc_Exection_Times]\n\
    AS\nINSERT INTO dbUtilities..Procedure_Execution_Times\n    (DatabaseName,SPName,\
    \ ExeCount, ExePerSec, AvgWorkerTime, TotalWorkerTime,\n    AvgElapsedTime, MaxLogicalReads,\
    \ MaxLogicalWrites, TotalPhysicalReads,\n    DateRecorded)\nSELECT\n    DB_Name()\
    \ AS dbname,\n    OBJECT_SCHEMA_NAME(qt.objectid, qt.dbid) + '.' + object_name(qt.objectid,\n\
    \    qt.dbid) AS spname,\n    qs.execution_count AS 'Execution Count',\n    isnull(qs.execution_count,.0001)/Isnull(DATEDIFF(Second,\
    \ qs.creation_time,\n    GetDate()),.0001) AS 'Calls/Second',\n    isnull(qs.total_worker_time,1)/isnull(qs.execution_count,1)\
    \ AS\n    'AvgWorkerTime',\n    qs.total_worker_time AS 'TotalWorkerTime',\n \
    \   isnull(qs.total_elapsed_time,1)/isnull(qs.execution_count,1) AS\n    'AvgElapsedTime',\n\
    \    qs.max_logical_reads,\n    qs.max_logical_writes,\n    qs.total_physical_reads,\n\
    \    GETDATE() AS RecordedDate\nFROM sys.dm_exec_query_stats AS qs\nCROSS APPLY\
    \ sys.dm_exec_sql_text(qs.sql_handle) AS qt\nORDER BY qs.execution_count DESC\n\
    GO\n```\n\n这些信息应有助于回答诸如哪个存储过程执行最频繁，以及哪些存储过程持续时间最长等问题。\n\n## 失败的作业\n\n通过查询 `msdb`\
    \ 数据库中的系统表并将结果插入 `Daily_Report` 表，来跟踪过去 48 小时内失败的作业。由于此数据用作对报告查看者潜在问题的概览和通知，因此在此上下文中仅存储最少的数据，且没有历史用途。如果要求保留更长、更详细的历史记录，并且\
    \ `msdb` 数据库中的历史记录不满足要求，则可以修改该存储过程。\n\n```sql\nUSE [dbUtilities]\nGO\nCREATE PROCEDURE\
    \ Get_Failed_Jobs\nAS\nINSERT INTO Daily_Report\n    (EventStatus, EventDate,\
    \ Event)\nSELECT\n    'Job Failed',\n    msdb.dbo.agent_datetime(sjh.run_date,\
    \ sjh.run_time),\n    'SQL Server Job Failed ' + Name\nFROM msdb..sysjobs sj\n\
    Join msdb..sysjobhistory sjh\n    on sj.job_id = sjh.job_id and sjh.run_status\
    \ = 0\nWHERE Enabled = 1 and step_id = 0\n    AND msdb.dbo.agent_datetime(sjh.run_date,\
    \ sjh.run_time) > Dateadd(dd,\n    -2,GetDate())\nGO\n```\n\n`注意` 您可以通过在 SQL Server\
    \ 代理属性中调整作业历史记录属性，来修改 SQL Server 2012 作业和任务历史记录的保留选项以保留更长时间的历史记录。\n\n## 信息的可见性\n\
    \nSQL Server 2012 提供的信息可见性可帮助您获取管理服务器和数据库所需的重要信息。到目前为止，示例一直侧重于 SQL Server 的核心安装，因此所有表和存储过程都是在\
    \ `dbo` 架构中创建的。在下一节中，示例将侧重于特定功能的计数器。在您的环境中，您可能使用全部、部分或不使用这些功能。这些示例为每个功能使用不同的架构，以帮助根据所使用的功能部署代码。我建议您考虑使用类似的方法来组织您正在收集的信息。\n\
    \n## Reporting Services\n\nSQL Server Reporting Services (SSRS) 使报表创作和部署变得简单而普遍。然而，对\
    \ Reporting Services 使用方式的深入理解却并不那么普遍。通过几个简单的步骤，诸如最常见的报表、运行时间最长的报表以及构建报表的哪个步骤最耗时等问题都可以得到自信的回答。\n\
    \n`注意` 最近，我接到一个电话，说报表性能不佳。经过几次快速查询，我能够隔离出有问题的报表，并确定性能下降是发生在 Reporting Services\
    \ 机器上的渲染时间，而不是数据库服务器上的数据检索时间。\n\n拥有这些信息使我能够将工作集中在能产生最大影响的地方。\n"
- fmt: '# SQL Server 高可用性与监控


    ## SQL Server Reporting Services


    SQL Server Reporting Services 使用两个数据库来支持报表服务的运行。其中一个数据库用于存储临时数据 (`ReportServerTempDB`)，另一个数据库则存储报表定义
    (`ReportServer`)。


    `ReportServer` 数据库内包含许多可能需要考虑查阅的表和视图；然而，有一个关键视图包含关于 Reporting Services 安装及使用情况的一些重要信息。（此视图仅存在于
    SQL Server 2012 及更高版本中。如果安装的是旧版本的 SQL Server Reporting Services，请使用 `ExecutionLog
    2` 视图，并相应地修改存储过程。）


    Reporting Services 并非基本安装的一部分。由于这是一个附加功能，我为其创建了一个新的架构（schema）。在此案例中，我使用了架构名称 `rpt`。


    ```sql

    USE [dbUtilities]

    GO

    CREATE SCHEMA rpt

    GO

    ```


    创建架构后，以相同的方法添加存储过程。


    ```sql

    CREATE PROCEDURE [rpt].[Get_Report_Stats]

    AS

    DECLARE @Last24hours int

    DECLARE @Reports TABLE (ItemPath VARCHAR(1000), UserName VARCHAR(100),

    ReportExecution int)

    SET @Last24hours = (SELECT COUNT(*) FROM ReportServer..ExecutionLog3

    WHERE TimeStart > DATEADD(dd, -1, GETDATE()))

    INSERT INTO @Reports

    (ItemPath, UserName, ReportExecution)

    SELECT TOP 10

    ItemPath,

    UserName,

    COUNT(*) AS ''ReportExecution'' FROM

    ReportServer..ExecutionLog3

    WHERE TimeStart > DATEADD(dd, -1, GETDATE())

    GROUP BY ItemPath, UserName

    ORDER BY COUNT(*) DESC

    INSERT INTO [dbo].[Daily_Report]

    (EventStatus, EventDate, EVENT )

    SELECT ''Total Reports'', GETDATE(), ''Total number of Reports

    Executed '' + CONVERT(VARCHAR(10), @Last24hours)

    INSERT INTO [dbo].[Daily_Report]

    (EventStatus, EventDate, EVENT )

    SELECT ''Top Reports'', GETDATE(), ItemPath + '' '' + UserName + ''

    '' + CONVERT(VARCHAR(10),ReportExecution)

    FROM @Reports

    ORDER BY ReportExecution DESC

    GO

    ```


    ## 数据库镜像


    数据库镜像是 SQL Server 2005 引入的一项高可用性功能。此功能使数据库能够被镜像到另一个 SQL Server 实例上的第二个数据库。如果出现问题，此镜像数据库可以接管成为主要数据源。配置镜像时，可以选择使用见证服务器来帮助决策哪个数据库应作为主体运行。如果不使用见证服务器，则需要手动进行故障转移。镜像配置简单且易于故障转移；但是，如果数据库需要运行的对象（例如用户账户或作业）位于数据库之外，则需要一些额外的步骤。


    了解哪个数据库当前充当主数据库是关键信息。此外，了解历史上哪个服务器充当主体主机在故障排除时可能也是一条关键信息。与 SQL Server Reporting
    Services 数据类似，我建议仅为镜像对象创建一个专用的架构。


    ```sql

    USE [dbUtilities]

    GO

    CREATE SCHEMA Mir

    GO

    ```


    对于历史数据，将创建一个表来存储日志信息。在 `ReadingDate` 列上设置了默认值，作为故障转移可能何时发生的一个参考时间点。然而，该值取决于行插入的时间；因此，如果状态每十分钟才检查一次，日期可能会有近十分钟的偏差。


    ```sql

    CREATE TABLE [Mir].[MirrorLogging](

    [MirrorLoggingID] [int] IDENTITY(1,1) NOT NULL,

    [HostName] [sysname] NOT NULL,

    [DatabaseName] [sysname] NOT NULL,

    [MirrorDescription] [varchar](10) NOT NULL,

    [ReadingDate] [datetime] DEFAULT getdate() NULL,

    CONSTRAINT [PK_MirrorLoggingID] PRIMARY KEY CLUSTERED

    ([MirrorLoggingID]))

    GO

    ```


    如果您希望将镜像日志表用作数据库镜像状态更改的通知源，可以考虑使用触发器，或利用以下存储过程在状态更改时向您发送电子邮件。


    ```sql

    CREATE PROCEDURE Mir.Log_Mirroring_Status

    AS

    Set NOCOUNT ON

    DECLARE @HostName SYSNAME

    DECLARE @dbname SYSNAME

    DECLARE @MirDesc VARCHAR(10)

    DECLARE @CurrentStatusID INT

    DECLARE dbname CURSOR FAST_FORWARD FOR

    SELECT

    CAST(SERVERPROPERTY (''MachineName'') AS SYSNAME),

    DB_NAME(database_id),

    Mirroring_Role_Desc

    FROM sys.database_mirroring

    WHERE mirroring_state is not null

    OPEN dbname

    WHILE 1=1

    BEGIN

    FETCH NEXT from dbname Into @hostname, @dbname, @MirDesc;

    IF @@FETCH_STATUS < 0 BREAK

    -- Valdiate a record is there for the database, If not insert it.

    If Not Exists (Select HostName, DatabaseName From Mir.MirrorLogging

    WHERE HostName like @HostName

    AND DatabaseName like @dbname)

    Begin

    Insert Mir.MirrorLogging (HostName, DatabaseName,

    MirrorDescription)

    VALUES (@HostName, @dbname, @MirDesc)

    END

    -- Find the most recent status, if the status has changed

    -- Insert a new entry

    SET @CurrentStatusID = (Select Max(MirrorLoggingID) From Mir.MirrorLogging

    WHERE HostName like @HostName

    AND DatabaseName like @dbname)

    IF @MirDesc not like (Select MirrorDescription from Mir.MirrorLogging

    WHERE MirrorLoggingID = @CurrentStatusID) BEGIN

    Insert Mir.MirrorLogging (HostName, DatabaseName,

    MirrorDescription)

    VALUES (@HostName, @dbname, @MirDesc)

    END

    END

    CLOSE dbname

    DEALLOCATE dbname

    GO

    ```


    ## AlwaysOn


    AlwaysOn 功能集是 SQL Server 2012 的新特性，是结合了 Windows 故障转移群集的下一代数据库镜像技术。Windows 故障转移群集一直以来一个困难且昂贵的方面是让物理上不靠近的机器组成群集。使用数据库镜像时，除非镜像使用数据库快照，否则应用程序不易读取镜像数据。AlwaysOn
    允许 SQL Server 拥有多个在线且可读的数据库，同时提供自动故障转移的功能。


    对 AlwaysOn 的监控和历史跟踪可以采用与监控和跟踪数据库镜像非常相似的方式完成。通过使用 `SERVERPROPERTY` 函数，您可以获取诸如服务器名称、数据库名称、可用性组和其他关键信息等事实。SQL
    Server 2012 中添加了额外的视图和函数以帮助获取有价值的信息。在实施 AlwaysOn 时，请检查监控和历史跟踪功能，以确保您能获取所需的信息。以下是其中一小部分对象的列表：


    *   `sys.availability_groups`

    *   `sys.availability_group_cluster`

    *   `sys.dm_hadr_availability_group_state`

    *   `sys.dm_hadr_database_replica_states`

    *   `sys.availability_replicas`

    *   `sys.fn_hadr_backup_is_preferred_replica`


    ## 管理关键业务指标


    先前用于解释关键业务指标 (KBI) 的案例是本地城镇的 911 服务。如果呼叫状态被记录，并且对于提供 911 服务的企业的功能很重要，那么特定状态下的呼叫数量不仅可以作为业务绩效指标，还可以用于确定业务是否需要针对关键时刻做出调整。


    收集业务数据流的历史趋势和行为至关重要。这些数据基于数据库安装后创建的内部设计，与 SQL Server 功能本身的安装没有直接关系。这些数据也可以用作可据此采取行动的关键性能计数器；例如，如果在业务原本平淡的时期发生了某种紧急情况，可以向组织发送消息和警告，告知其
    911 呼叫数量的增加。例如，假设服务器上有一个名为 `emergencyservice` 的数据库。跟踪电话队列的表可能类似于这样：'
  raw: 'SQL Server Reporting Services uses two databases for the operations of reporting
    services. One of the two databases is used for storing temporary data (ReportServerTempDB),
    and the other database stores the report definitions (ReportServer). There are
    a number of tables and views inside the ReportServer database that contain information
    you might want to consider reviewing; however, there is one key view that contains
    some key information about your Reporting Services install and how it is being
    used. (This view only exists in SQL Server 2012, when reporting services is installed.
    If an older version of SQL Server Reporting Services has been installed, use the
    ExecutionLog 2 view, and alter the stored procedure.) Reporting Services is not
    installed with the basic installation. Because this is an added feature, I created
    a new schema for the feature. In this case, I used the schema name rpt.


    USE [dbUtilities]


    GO


    CREATE SCHEMA rpt


    GO


    After the schema is created, adding the stored procedure is done in the same prior
    method.


    CREATE PROCEDURE [rpt].[Get_Report_Stats]


    AS


    DECLARE @Last24hours int


    DECLARE @Reports TABLE (ItemPath VARCHAR(1000), UserName VARCHAR(100),


    ReportExecution int)


    SET @Last24hours = (SELECT COUNT(*) FROM ReportServer..ExecutionLog3


    WHERE TimeStart > DATEADD(dd, -1, GETDATE()))


    INSERT INTO @Reports


    (ItemPath, UserName, ReportExecution)


    SELECT TOP 10


    chapter 6 ■ the Utility Database


    ItemPath,


    UserName,


    COUNT(*) AS ''ReportExecution'' FROM


    ReportServer..ExecutionLog3


    WHERE TimeStart > DATEADD(dd, -1, GETDATE())


    GROUP BY ItemPath, UserName


    ORDER BY COUNT(*) DESC


    INSERT INTO [dbo].[Daily_Report]


    (EventStatus, EventDate, EVENT )


    SELECT ''Total Reports'', GETDATE(), ''Total number of Reports


    Executed '' + CONVERT(VARCHAR(10), @Last24hours)


    INSERT INTO [dbo].[Daily_Report]


    (EventStatus, EventDate, EVENT )


    SELECT ''Top Reports'', GETDATE(), ItemPath + '' '' + UserName + ''


    '' + CONVERT(VARCHAR(10),ReportExecution)


    FROM @Reports


    ORDER BY ReportExecution DESC


    GO


    Mirroring


    Database mirroring is a high-availability feature introduced in SQL Server 2005\.
    This feature enables a database to be mirrored to a second database on another
    instance of SQL Server. This mirrored database can take over as the primary source
    of the data if a situation arises. When mirroring is configured, you have the
    option of using a witness server to help in the decision as to what database should
    be running as the principal. If a witness server is not used, a manual failover
    is required. Mirroring is easy to configure and easy to failover; however, if
    there are objects (e.g., user accounts or jobs) outside of the database that the
    database requires to be operational, a few extra steps are required.


    Knowing what database is acting as the current primary is critical information.
    In addition, the value of knowing what server was acting as the principal host
    historically can be a key piece of information when troubleshooting. In similar
    fashion as the SQL Server Reporting Services data, I recommend a schema just for
    the mirroring objects.


    USE [dbUtilities]


    GO


    CREATE SCHEMA Mir


    GO


    For the historical data, a table will be created to store our log information.
    A default is assigned on the ReadingDate column for a point in reference as to
    when a failover may have occurred. However the value is dependent on when the
    row was inserted; therefore, if the status is to be checked only once every ten
    minutes, the date could be off by almost ten minutes.


    CREATE TABLE [Mir].[MirrorLogging](


    [MirrorLoggingID] [int] IDENTITY(1,1) NOT NULL,


    [HostName] [sysname] NOT NULL,


    [DatabaseName] [sysname] NOT NULL,


    [MirrorDescription] [varchar](10) NOT NULL,


    chapter 6 ■ the Utility Database


    [ReadingDate] [datetime] DEFAULT getdate() NULL,


    CONSTRAINT [PK_MirrorLoggingID] PRIMARY KEY CLUSTERED


    ([MirrorLoggingID]))


    GO


    If you want to use the mirror logging table as a source of notification for when
    the database mirroring state changes, consider using a trigger or tying into the
    following stored procedure to send you an e-mail message when the state changes.


    CREATE PROCEDURE Mir.Log_Mirroring_Status


    AS


    Set NOCOUNT ON


    DECLARE @HostName SYSNAME


    DECLARE @dbname SYSNAME


    DECLARE @MirDesc VARCHAR(10)


    DECLARE @CurrentStatusID INT


    DECLARE dbname CURSOR FAST_FORWARD FOR


    SELECT


    CAST(SERVERPROPERTY (''MachineName'') AS SYSNAME),


    DB_NAME(database_id),


    Mirroring_Role_Desc


    FROM sys.database_mirroring


    WHERE mirroring_state is not null


    OPEN dbname


    WHILE 1=1


    BEGIN


    FETCH NEXT from dbname Into @hostname, @dbname, @MirDesc;


    IF @@FETCH_STATUS < 0 BREAK


    -- Valdiate a record is there for the database, If not insert it.


    If Not Exists (Select HostName, DatabaseName From Mir.MirrorLogging


    WHERE HostName like @HostName


    AND DatabaseName like @dbname)


    Begin


    Insert Mir.MirrorLogging (HostName, DatabaseName,


    MirrorDescription)


    VALUES (@HostName, @dbname, @MirDesc)


    END


    -- Find the most recent status, if the status has changed


    -- Insert a new entry


    SET @CurrentStatusID = (Select Max(MirrorLoggingID) From Mir.MirrorLogging


    WHERE HostName like @HostName


    AND DatabaseName like @dbname)


    IF @MirDesc not like (Select MirrorDescription from Mir.MirrorLogging


    WHERE MirrorLoggingID = @CurrentStatusID) BEGIN


    Insert Mir.MirrorLogging (HostName, DatabaseName,


    MirrorDescription)


    VALUES (@HostName, @dbname, @MirDesc)


    END


    END


    CLOSE dbname


    DEALLOCATE dbname


    chapter 6 ■ the Utility Database


    GO


    AlwaysOn


    The AlwaysOn feature set is new with SQL Server 2012, and is the next generation
    of database mirroring in combination with Windows clustering. A difficult and
    expensive aspect of Windows clustering has always been clustering machines that
    are not physically near each other. With database mirroring, the mirror is not
    easily readable for applications unless the mirror is using database snapshots.
    AlwaysOn allows the SQL Server to have multiple databases online and readable,
    while providing the functionality of the automated failover.


    Monitoring and historical tracking of AlwaysOn can be accomplished in a very similar
    fashion as monitoring and historical tracking of database mirroring. By using
    the SERVERPROPERTY functions, you are able to get facts such as server names,
    database names, availability groups, and other key pieces of information. Additional
    views and functions have been added in SQL Server 2012 to assist in reaching valuable
    information. When implementing AlwaysOn, review the monitoring and historical
    tracking to ensure you are getting the information you need. The following is
    a short list of just a few of these objects:


    • sys.availability_groups


    • sys.availability_group_cluster


    • sys.dm_hadr_availability_group_state


    • sys.dm_hadr_database_replica_states


    • sys.availability_replicas


    • sys.fn_hadr_backup_is_preferred_replica


    Managing Key Business Indicators


    The previous example case used to explain a Key Business Indicator (KBI) was that
    of a 911 service for the local town. If the call status is logged, and is important
    to the functions of the business that supplies the 911 server, the number of calls
    in a specific status could not only be a business performance indicator, but also
    a way to determine whether the business needs to make adjustments for critical
    times.


    It is critical to gather historic trends and behaviors of the business data flow.
    This data is based on a design internal to databases that have been created after
    the install, and is not directly related to the installation of SQL Server as
    a feature. This data can also be used as a critical performance counter that can
    be acted upon; for example, if there was an emergency of some sort in an otherwise
    slow period of business, messages and warnings could be sent out to the organization
    informing them of the increase of 911 calls. As an example, assume there is a
    database named emergencyservice on the server. The table that tracks the phone
    queue might look similar to this:'
  trans: '# SQL Server 高可用性与监控


    ## SQL Server Reporting Services


    SQL Server Reporting Services 使用两个数据库来支持报表服务的运行。其中一个数据库用于存储临时数据 (`ReportServerTempDB`)，另一个数据库则存储报表定义
    (`ReportServer`)。


    `ReportServer` 数据库内包含许多可能需要考虑查阅的表和视图；然而，有一个关键视图包含关于 Reporting Services 安装及使用情况的一些重要信息。（此视图仅存在于
    SQL Server 2012 及更高版本中。如果安装的是旧版本的 SQL Server Reporting Services，请使用 `ExecutionLog
    2` 视图，并相应地修改存储过程。）


    Reporting Services 并非基本安装的一部分。由于这是一个附加功能，我为其创建了一个新的架构（schema）。在此案例中，我使用了架构名称 `rpt`。


    ```sql

    USE [dbUtilities]

    GO

    CREATE SCHEMA rpt

    GO

    ```


    创建架构后，以相同的方法添加存储过程。


    ```sql

    CREATE PROCEDURE [rpt].[Get_Report_Stats]

    AS

    DECLARE @Last24hours int

    DECLARE @Reports TABLE (ItemPath VARCHAR(1000), UserName VARCHAR(100),

    ReportExecution int)

    SET @Last24hours = (SELECT COUNT(*) FROM ReportServer..ExecutionLog3

    WHERE TimeStart > DATEADD(dd, -1, GETDATE()))

    INSERT INTO @Reports

    (ItemPath, UserName, ReportExecution)

    SELECT TOP 10

    ItemPath,

    UserName,

    COUNT(*) AS ''ReportExecution'' FROM

    ReportServer..ExecutionLog3

    WHERE TimeStart > DATEADD(dd, -1, GETDATE())

    GROUP BY ItemPath, UserName

    ORDER BY COUNT(*) DESC

    INSERT INTO [dbo].[Daily_Report]

    (EventStatus, EventDate, EVENT )

    SELECT ''Total Reports'', GETDATE(), ''Total number of Reports

    Executed '' + CONVERT(VARCHAR(10), @Last24hours)

    INSERT INTO [dbo].[Daily_Report]

    (EventStatus, EventDate, EVENT )

    SELECT ''Top Reports'', GETDATE(), ItemPath + '' '' + UserName + ''

    '' + CONVERT(VARCHAR(10),ReportExecution)

    FROM @Reports

    ORDER BY ReportExecution DESC

    GO

    ```


    ## 数据库镜像


    数据库镜像是 SQL Server 2005 引入的一项高可用性功能。此功能使数据库能够被镜像到另一个 SQL Server 实例上的第二个数据库。如果出现问题，此镜像数据库可以接管成为主要数据源。配置镜像时，可以选择使用见证服务器来帮助决策哪个数据库应作为主体运行。如果不使用见证服务器，则需要手动进行故障转移。镜像配置简单且易于故障转移；但是，如果数据库需要运行的对象（例如用户账户或作业）位于数据库之外，则需要一些额外的步骤。


    了解哪个数据库当前充当主数据库是关键信息。此外，了解历史上哪个服务器充当主体主机在故障排除时可能也是一条关键信息。与 SQL Server Reporting
    Services 数据类似，我建议仅为镜像对象创建一个专用的架构。


    ```sql

    USE [dbUtilities]

    GO

    CREATE SCHEMA Mir

    GO

    ```


    对于历史数据，将创建一个表来存储日志信息。在 `ReadingDate` 列上设置了默认值，作为故障转移可能何时发生的一个参考时间点。然而，该值取决于行插入的时间；因此，如果状态每十分钟才检查一次，日期可能会有近十分钟的偏差。


    ```sql

    CREATE TABLE [Mir].MirrorLogging NOT NULL,

    [HostName] [sysname] NOT NULL,

    [DatabaseName] [sysname] NOT NULL,

    [MirrorDescription] varchar NOT NULL,

    [ReadingDate] [datetime] DEFAULT getdate() NULL,

    CONSTRAINT [PK_MirrorLoggingID] PRIMARY KEY CLUSTERED

    ([MirrorLoggingID]))

    GO

    ```


    如果您希望将镜像日志表用作数据库镜像状态更改的通知源，可以考虑使用触发器，或利用以下存储过程在状态更改时向您发送电子邮件。


    ```sql

    CREATE PROCEDURE Mir.Log_Mirroring_Status

    AS

    Set NOCOUNT ON

    DECLARE @HostName SYSNAME

    DECLARE @dbname SYSNAME

    DECLARE @MirDesc VARCHAR(10)

    DECLARE @CurrentStatusID INT

    DECLARE dbname CURSOR FAST_FORWARD FOR

    SELECT

    CAST(SERVERPROPERTY (''MachineName'') AS SYSNAME),

    DB_NAME(database_id),

    Mirroring_Role_Desc

    FROM sys.database_mirroring

    WHERE mirroring_state is not null

    OPEN dbname

    WHILE 1=1

    BEGIN

    FETCH NEXT from dbname Into @hostname, @dbname, @MirDesc;

    IF @@FETCH_STATUS < 0 BREAK

    -- Valdiate a record is there for the database, If not insert it.

    If Not Exists (Select HostName, DatabaseName From Mir.MirrorLogging

    WHERE HostName like @HostName

    AND DatabaseName like @dbname)

    Begin

    Insert Mir.MirrorLogging (HostName, DatabaseName,

    MirrorDescription)

    VALUES (@HostName, @dbname, @MirDesc)

    END

    -- Find the most recent status, if the status has changed

    -- Insert a new entry

    SET @CurrentStatusID = (Select Max(MirrorLoggingID) From Mir.MirrorLogging

    WHERE HostName like @HostName

    AND DatabaseName like @dbname)

    IF @MirDesc not like (Select MirrorDescription from Mir.MirrorLogging

    WHERE MirrorLoggingID = @CurrentStatusID) BEGIN

    Insert Mir.MirrorLogging (HostName, DatabaseName,

    MirrorDescription)

    VALUES (@HostName, @dbname, @MirDesc)

    END

    END

    CLOSE dbname

    DEALLOCATE dbname

    GO

    ```


    ## AlwaysOn


    AlwaysOn 功能集是 SQL Server 2012 的新特性，是结合了 Windows 故障转移群集的下一代数据库镜像技术。Windows 故障转移群集一直以来一个困难且昂贵的方面是让物理上不靠近的机器组成群集。使用数据库镜像时，除非镜像使用数据库快照，否则应用程序不易读取镜像数据。AlwaysOn
    允许 SQL Server 拥有多个在线且可读的数据库，同时提供自动故障转移的功能。


    对 AlwaysOn 的监控和历史跟踪可以采用与监控和跟踪数据库镜像非常相似的方式完成。通过使用 `SERVERPROPERTY` 函数，您可以获取诸如服务器名称、数据库名称、可用性组和其他关键信息等事实。SQL
    Server 2012 中添加了额外的视图和函数以帮助获取有价值的信息。在实施 AlwaysOn 时，请检查监控和历史跟踪功能，以确保您能获取所需的信息。以下是其中一小部分对象的列表：


    *   `sys.availability_groups`

    *   `sys.availability_group_cluster`

    *   `sys.dm_hadr_availability_group_state`

    *   `sys.dm_hadr_database_replica_states`

    *   `sys.availability_replicas`

    *   `sys.fn_hadr_backup_is_preferred_replica`


    ## 管理关键业务指标


    先前用于解释关键业务指标 (KBI) 的案例是本地城镇的 911 服务。如果呼叫状态被记录，并且对于提供 911 服务的企业的功能很重要，那么特定状态下的呼叫数量不仅可以作为业务绩效指标，还可以用于确定业务是否需要针对关键时刻做出调整。


    收集业务数据流的历史趋势和行为至关重要。这些数据基于数据库安装后创建的内部设计，与 SQL Server 功能本身的安装没有直接关系。这些数据也可以用作可据此采取行动的关键性能计数器；例如，如果在业务原本平淡的时期发生了某种紧急情况，可以向组织发送消息和警告，告知其
    911 呼叫数量的增加。例如，假设服务器上有一个名为 `emergencyservice` 的数据库。跟踪电话队列的表可能类似于这样：'
- fmt: '# Chapter 6 ■ The Utility Database


    ## Using the Data


    Once the methods for collection and storing the data have been created, collection
    and reporting on the data completes the development cycle of your utility database.
    Monitoring the data can be automated, as well, by configuring alerts, triggers,
    and creating a SQL mail profile.


    ## Automating the Data Collection


    The primary use of the utility database is to gather and store information on
    a consistent schedule, to determine the health and history of the SQL Server and
    databases located on the SQL Server. Collection data on a schedule makes automation
    easy. The first step in automating all the data collection points is to identify
    what collection points need to be collected, how often they should be collected,
    and when this collection should occur. If you use the stored procedures created
    during the examples of this chapter, you can isolate a few data points to collect
    each day.


    - `Get_Drive_Space_Free`

    - `Get_Failed_Jobs`

    - `Get_File_Growth`

    - `Get_Filtered_Error_Log`

    - `Get_Index_Fragmentation`


    A stored procedure can be created to execute each one of these stored procedures
    by nesting the individual executions. The calling stored procedure should be named
    something obvious that indicates the frequency of the collection.


    ```sql

    USE [dbUtilities]

    GO


    CREATE PROCEDURE Daily_Data_Collection

    AS

    SET NOCOUNT on


    -- Maintenance Work--

    INSERT INTO [dbo].[Daily_Report_Archive]

    SELECT * FROM [dbo].[Daily_Report]

    DELETE Daily_Report


    -- Disk Space--

    EXECUTE Get_Drive_Space_Free

    EXECUTE Get_File_Growth


    --Read Error Log--

    EXECUTE Get_Filtered_Error_Log


    --Get Failed Jobs --

    EXECUTE Get_Failed_Jobs


    --Get Index Frag --

    EXECUTE Get_Index_Fragmentation


    --Get Procedure Execution --

    EXECUTE Get_Proc_Exection_Times

    GO

    ```


    The following are some notable items to consider:


    ![Image 79](index-168_1.png)


    - Error Handling—For space considerations, the error handling lines on the code
    has been removed.

    - Archive—The Maintenance Work section of code clears the `Daily_Report` table
    after the data has been archived. If the examples are followed, the report wizard
    in Visual Studio 2010 is an easy way to build a report that can be subscribed
    to.


    ## Scheduling the Data Collection


    To schedule the data collection, create a new SQL Server Agent job. After the
    job has been named and a description added, add a new task. For the command portion
    of the task, execute the calling stored procedure created in the previous example
    (see Figure 6-2).


    ***Figure 6-2.** Creating the job task*


    The last step to automating the data collection is to schedule the job. The code
    in the examples has been created with the intention that the majority of the data
    collection steps would execute once a day.


    The scheduling of the job for once a day is a natural fit, but not required; however,
    note that some of the stored procedures might need to be altered.


    ## Conclusion


    We have focused on how to organize the data storage, different ways to retrieve
    your important data, and scheduling the collection of information. After you have
    started getting some data collected into your utility database, you should soon
    start seeing the benefits. The next steps to expand the usefulness of the utility
    database include the following:


    - Use Visual Studio to build a report that can be deployed and subscribed to.
    This simple step-by-step wizard adds quite a bit to your custom utility database.

    - Deploy your utility database to all the SQL Servers in your domain. With a few
    modifications to tables and stored procedures, tracking server names or instance
    names is an easy code change. With linked servers, SSIS or PowerShell data can
    be collected and centralized with little additional effort.

    - Add additional counters by using the techniques discussed. At the time of authoring,
    I am working on reviewing server inventory tracking that was implemented by a
    friend of mine.

    - Consider using PowerShell to deploy your utility database; the larger your environment,
    the more helpful this is.

    - Most important, don’t forget to back up your database. After putting all this
    effort into getting the data, make sure you keep your data.


    If all of this information or code development appears overwhelming, start small.
    Add the `dbUtilities` database to your server, then add one counter. The database
    growth counter is a good one to start with because the value of the historical
    data is high, yet the complexity to add it is not.


    # Chapter 7 ■ ■ ■


    ## Indexing Outside the Bubble

    By Jason Strate


    When it comes to indexing, there are many best practices we could adhere to. These
    practices help define how and when we should build our indexes. They provide a
    starting point for us, and help guide us through creating the best set of indexes
    on the tables in our databases. Some popular best practices include the following:


    - Use clustered indexes on primary keys, by default.

    - Index on search columns.

    - Use a database-level fill factor.

    - Use an index-level fill factor.

    - Index on foreign key columns.'
  raw: 'USE [dbUtilities]


    GO


    CREATE TABLE CallStatus(


    CallStatusID int identity(1,1) not null,


    CallID int Not null,


    CallStatus varchar(15) Not Null,


    StatusChangeDateTime datetime Not Null,


    CONSTRAINT [PK_CallStatusID] PRIMARY KEY CLUSTERED


    chapter 6 ■ the Utility Database


    ([CallStatusID]))


    GO


    For example purposes, assume there is a foreign key pointed over to a Call table.
    Each call that comes into the 911 service had a header record created in the Call
    table, and then a record in the CallStatus table. Each call should have multiple
    call status records, which indicate when a call has entered into a new status.
    For instance, when a call first comes into the system, but has not yet been answered,
    the status may be “initial call.” When it is answered, a new status record would
    be inserted with a CallStatus of “call answered.” There are many call status options,
    such as hold, waiting police, waiting fire, lost, and closed.


    After a call has been marked in the closed status, it might be a short period
    of time before the data is archived out of the CallStatus table.


    Even with few columns in the CallStatus table, many KBIs can be tracked. For example,
    you could track the amount of time the caller is waiting for the police, the average
    total length of calls, or the percent of calls that are lost. An important KBI
    for the 911 service company might be the number of calls that are lost. All the
    data with this KBI is directly related to the individual company, so use a new
    schema in the dbUtilities database to indicate it as such.


    USE [dbUtilities]


    GO


    CREATE SCHEMA ES


    GO


    The table creation is similar to the other tables that we have created.


    CREATE TABLE ES.LostCall


    (


    LostCallID int identity(1,1) not null,


    AvgLostCall_ByHour int not null,


    ReadingDate DateTime not null,


    CONSTRAINT [PK_LostCallID] PRIMARY KEY CLUSTERED


    ([LostCallID])


    )


    The historical data can be tracked for this in your utility database, with a stored
    procedure, like so: CREATE PROCEDURE ES.Log_LostCallCount


    AS


    Insert Into ES.Log_LostCall (AvgLostCall_ByHour)


    Select COUNT(CALLStatusID) from Emergencyservice..CALLStatus


    WHERE Callstatus like ''lost''


    AND StatusChangeDateTime > DATEADD(hour, -1, GETDATE())


    GO


    Each business is different, and understanding what is important to an organization
    is critical. A database professional that can help an organization get to pertinent
    information can dramatically improve his or her visibility within that organization.
    Often, when database administrators are doing job tasks well, their visibility
    is not as great; however, when the database administrators are not completing
    essential tasks, their visibility is achived, but in a negative light.


