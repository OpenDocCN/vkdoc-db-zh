- fmt: 'This chapter introduced you to the basics of the Windows Azure SQL Database
    platform offered on the Microsoft cloud. I provided you with an overview of the
    underlying architecture of this platform so that you can better understand the
    inner workings of this technology. I also provided an overview of the major differences
    between SQL Server and SQL Database, gave you a quick introduction of the various
    management portals available online, and gave you a quick tour of the various
    services provided by the Azure platform that leverage SQL Database.


    SQL Database is designed to serve the needs of a wide variety of projects, from
    smaller applications to very large systems, by leveraging the recent federation
    features built to deliver a shared-nothing architecture and support larger workloads
    in a distributed fashion. With its simple configuration and provisioning model,
    SQL Database is poised to become a very popular database platform over time.


    Because this technology is continuously evolving, I encourage you to learn more
    about it and other Azure-related services online on the Microsoft website, where
    you can find additional information on the topics covered in this chapter and
    more.


    # Chapter 13


    ## I/O: The Untold Story


    *By Jeremy Lowell*


    We are living in an age when data growth is being measured in factors over the
    previous decade. There’s no indication that the rate of growth will subside. This
    pace is here to stay, and it presents companies and data professionals with new
    challenges.


    According to Gartner ([http://www.gartner.com/it/page.jsp?id=1460213), data gr](http://www.gartner.com/it/page.jsp?id=1460213)owth
    is the largest challenge faced by large enterprises. Not surprisingly, system
    performance and scalability follow close behind.


    In an unscientific study based on conversations I’ve had with many database administrators
    (DBAs) and other personnel in companies I have the honor of working with, I’ve
    found that they are struggling to keep up with this data explosion. It’s no wonder
    that DBAs share one of the lowest unemployment numbers in the technical field.
    The purpose of this chapter is to provide DBAs with the knowledge and tools to
    drive this conversation with your company, your peers, and that wicked smart storage
    guru in the corner office.


    How many times have you entered a search in Google related to I/O and come up
    with either a trivial answer or one so complex that it’s hard to fully understand?
    The goal of this chapter is to help bridge that gap and fill in the blanks in
    your knowledge regarding your database environment and the correlating I/O.


    I/O is often misunderstood with respect to its impact within database environments.
    I believe this is often due to miscommunication and a lack of foundational understanding
    of how to measure I/O; what to measure; how to change, modify, or otherwise alter
    the behavior; and perhaps more importantly, how to communicate and have the conversation
    about I/O with peers, management, and of course the storage and server gurus whom
    we all rely on. As you delve into this chapter and learn how to better measure,
    monitor, communicate, and change your I/O patterns, footprint, and behavior, it’s
    important to begin from a common definition of “I/O.”


    A distilled version of I/O, as it relates to this chapter, is “Data movement that
    persists in either memory or on disk.” There are any number of additional types
    of I/O, all of which are important but fall outside of the context and focus of
    this chapter.


    The untold story of I/O is one you have likely struggled with before—either knowingly
    or unknowingly—and it contains within it a number of very important data points
    for your database health, consistency, performance, and availability. This chapter
    will focus on two primary types of I/O: memory (logical I/O) and disk (physical
    I/O). Although they are intimately related, they follow different patterns, and
    different approaches are required for measuring, monitoring, and resolving issues
    with each of them.


    ### The Basics


    The beginning of this quest starts with preparation. In this case, with understanding
    what your database system requires of your disk subsystem during normal operations,
    peak loads, backups, subsystem (SAN) maintenance, and what appear to be idle periods.


    Baselining your database, server or servers, and environment is critical to understanding
    the I/O characteristics of your system. More importantly, it helps you to determine
    if there’s an issue and where its origin might lie. There are a handful of metrics
    you need to obtain and whose trends you need to monitor over time. Table 13-1
    shows sample output from the counters you can use for this, and they will be explained
    in further detail as you dive deeper into the chapter.


    Table 13-1. Illustration of counters that will be the basis for further discussion
    throughout this chapter.


    | LogicalDisk | _Total | C: | D: |

    | :--- | :--- | :--- | :--- |

    | Avg. Disk Bytes/Read | 64,810.127 | 65,536.000 | 64,771.413 |

    | Avg. Disk Bytes/Write | 4,289.730 | 4,174.769 | 4,352.000 |

    | Avg. Disk sec/Read | 0.000 | 0.000 | 0.000 |

    | Avg. Disk sec/Write | 0.001 | 0.000 | 0.001 |

    | Disk Bytes/sec | 10,416,951.109 | 579,574.335 | 9,837,376.774 |

    | Disk Read Bytes/sec | 10,257,952.840 | 525,207.185 | 9,732,745.655 |

    | Disk Reads/sec | 158.277 | 8.014 | 150.263 |

    | Disk Write Bytes/sec | 158,998.269 | 54,367.150 | 104,631.119 |

    | Disk Writes/sec | 37.065 | 13.023 | 24.042 |


    The source for the data in Table 13-1 is Performance Monitor. Performance Monitor
    is a utility found in Microsoft operating systems which graphs performance related
    data. In the “Tactical” section of this chapter, you can find details on how to
    configure counters in Performance Monitor.


    There are two primary counters found in Performance Monitor for the counters referenced
    in Table 13-1: the Logical Disk counter and the Physical Disk counter. I prefer
    the counter Logical Disk for a number of reasons, but an understanding of the
    primary difference between the two can be found in the description of the counters,
    which in part reads, “The value of physical disk counters are sums of the values
    of the logical disks into which they are divided.” As such, the Logical Disk counter
    provides you with a lower level of granularity, and I’d argue it gives a more
    accurate depiction of how the server—and thus, the database—is performing on that
    drive. It’s also a more intuitive way to look at the disks on the server because
    most DBAs know which database files live on which drives.


    ### Monitoring


    The counters I prefer to base decisions on have changed over time. Years ago,
    I relied on the `Disk Queue Length` counter. This counter measures the queued
    requests for each drive. There is a common rule which states that a sustained
    value above 2 could be problematic. The challenge with this value is that it must
    be a derived value. To derive the correct number, the quantity of disks or spindles
    involved must be taken into account as well. If I have a server with 4 disks and
    a queue length of 6, that queue length appears to be three times higher than the
    threshold value of 2. However, if I take that value of 6 and divide it by the
    quantity of disks (4), my actual value comes out to 1.5, which is below the threshold
    value of 2.'
