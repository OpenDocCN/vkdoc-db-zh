- fmt: '## 系统性能调优与峰值负载处理


    ### 性能 SLA 的重要性


    我们大多数人都能设计一个处理高交易量的系统，但要保证这些交易在特定时间框架内完成则是另一项完全不同的任务。这通常在你将被衡量的基于性能的 SLA 中规定。即使没有正式记录，核心业务流程的
    SLA 通常也已定义。性能 SLA 是对业务和客户最重要的因素之一，因为如果你没有履行合同条款，会产生不同的后果，包括财务处罚。例如，信用卡行业经常在 SLA
    中指定执行余额检查的响应时间为两秒。如果响应没有在特定时间内返回，交易另一方的公司可能不得不为该交易进行垫付。每次垫付都会产生成本，这些成本会迅速累积。如果系统在美国的黑色星期五等大型零售购物日宕机
    10 分钟，可能会让公司损失数十万美元。


    定义峰值负载期间的交易量通常是业务最关键和最具挑战性的任务之一。如果业务在实施适当的响应时间方面判断失误，可能就没有足够的资源来处理所有交易，甚至可能因为容量不足而导致系统故障。拥有过剩容量可以应对不可预见的增长，一个好的经验法则是在峰值数字基础上增加
    20%。你需要避免的是容量过剩，这意味着业务可能花费了不必要的资金。归根结底，必须取得平衡。


    一旦你有了正式的需求，技术团队就必须将业务需求转化为技术需求，这是一个截然不同的任务。


    ### 评估当前状态


    为峰值负载准备系统就像训练马拉松而不是冲刺后气喘吁吁。一旦团队设定了正式的期望，你就必须分析你是否能处理你的峰值负载。这不是一个直接的过程。首先，你必须列出受峰值负载需求影响的应用程序、服务器、实例、数据库等清单。例如，在较大的组织中，旺季可能涉及或触及众多单独的服务器，每个服务器都以不同的方式受到额外负载的影响。对于较小的组织，它可能涉及少量
    Web 服务器和一台运行 `SQL Server` 的单一服务器。服务器较少并不一定意味着更容易规划峰值使用。这取决于性能方面的要求是什么。


    你必须评估每个应用程序及其关联的后端，以了解当前状态与满足峰值负载所需状态之间的差距。这项工作的一个重要部分是发现环境约束，包括那些无法在短期（或长期）内改变或解决的项目。这些环境约束需要及早识别，以便在必要时规划变通方案，因为通常需要额外的前置时间来解决它们。一些最常见的限制是应用程序版本；基础设施如存储区域网络（`SAN`）容量或性能；以及服务器硬件，例如不支持额外内存的主板。这些约束之所以需要提前了解，是因为在评估环境时它们需要被考虑在内。


    如果你支持的环境很大，并且包含构成核心业务的许多系统，你应该将应用程序及其关联服务器分为 `Tier 1` 和 `Tier 2`。`Tier 1` 应用程序启动并支持核心业务流程。要确定一个应用程序是否属于
    `Tier 1`，问自己这个问题：如果应用程序或其服务器不可用，交易还能完成吗？如果答案是否定的，它就是一个 `Tier 1` 应用程序。`Tier 2`
    应用程序提供辅助功能，并非完成核心交易所必需。报表服务器通常被归类为 `Tier 2`，因为处理销售交易比提供销售了多少产品的报告更重要。通过这种方式对每个应用程序进行分类，你将得到一个更小的应用程序清单来进行初步评估，这在时间紧迫时很重要。


    > **`Note`** 由于本书专注于 `SQL Server`，我将集中从使用 `SQL Server` 的角度评估每个应用程序。你的评估还应考虑其他方面，例如基础设施、底层服务器硬件和
    `Windows`。一切都重要。


    出于本章的目的，将使用以下场景：


    *   该应用程序是一个在线税务应用程序，允许用户在线输入其联邦税务信息，并提供工作流协助、保存纳税申报表、在线向联邦政府提交表格并处理付款。

    *   历史上，该应用程序在报税季节存在性能问题，特别是在报表和一些支付处理方面。

    *   没有专用的性能测试环境。所有性能和系统测试都在质量保证（`QA`）部门完成，该部门的规模是生产环境的一半，但共享相同类型的磁盘子系统。

    *   在线处理的申报表和支付处理数量的增长率如表 18-1 所示。


    **表 18-1.** 这些数字代表了过去三年的历史申报表和已处理付款，以及 2013 年的预计申报量。


    | 年份 | 总申报表 | 已处理总付款 | 较上年变化 | 较上年变化（申报表） |

    | :--- | :--- | :--- | :--- | :--- |

    |      | 2,500,000 | 1,800,000 | 28% | 25% |

    |      | 3,800,000 | 2,500,000 | 35% | 28% |

    |      | 5,400,000 | 4,200,000 | 29% | 22% |

    |      | 8,154,000 | 6,300,000 | 51% | 50% |


    > **`Note`** 假设新功能正在程序中发布，并且正在进行大力营销。由于这些因素，估计该应用程序在 2012 年的申报量将增长 22%。


    如图 18-1 所示，这个物理环境包括三台运行 Internet 信息服务（`IIS`）的 Web 服务器、两台中间层服务器和一个运行 `SQL Server`
    2012 标准版的单一 `SQL Server` 集群，该集群承载着三个数据库，占用 900 `GB`。该应用程序是一个 `.NET` 应用程序，并利用中间层进行所有数据访问、连接管理、事务管理和会话状态管理。数据库具备基本的维护流程，并由一名兼职
    `DBA` 支持。


    ![Image 201](index-437_1.png)


    **图 18-1.** 税务应用程序的高层拓扑图。


    ### 执行评估


    从哪里开始弄清楚情况——尤其是在大型环境中？你需要一个路线图，而通过识别环境中现有的数据源可以方便地创建路线图。检查是否存在拓扑图或配置管理数据库（`CMDB`）存储库。拓扑图将提供应用程序的概览视图。根据
    `CMDB` 中维护的信息级别，你或许能够看到服务器详细信息、应用程序所有者以及应用程序关系——这些在你处理一个可能不熟悉的系统时都很重要。目标是识别主应用程序可能与之交互的任何其他应用程序，因为它可能影响可扩展性。'
  raw: 'Most of us can design a system to process a high number of transactions, but
    it is another task entirely to guarantee the transactions are completed within
    a specific time frame. This is often specified in the performance-based SLA you
    will be measured against. Even if it hasn’t been formally documented, the SLA
    often has already been defined for the core business processes. The performance
    SLA is one of the most important factors to the business and the customer because
    if you do not fulfill the terms of the contract, there are different ramifications,
    including financial penalties. For example, the credit card industry often specifies
    in an SLA a response time of two seconds to perform a balance check. If the response
    does not come back in a certain amount of time, the company on the other side
    of the transaction might have to stand in for the transaction. For each stand-in,
    there is a cost and these costs can add up fast. If the system is not available
    for 10 minutes on a big retail shopping day like Black Friday in the United States,
    it could cost a company several hundred thousand dollars.


    Defining what is transactional volume during the peak load is often one of the
    most crucial and challenging tasks for the business to do. If the business misses
    the mark with regard to implementing appropriate response times, it might not
    have enough resources to process all of the transactions or might even end up
    seeing its systems fail because there is not enough capacity. Having excess capacity
    can be a good thing to account for unforeseen growth, and a good rule of thumb
    is to add 20 percent to the peak numbers. What you want to avoid is having too
    much capacity, which means that the business might have spent money unnecessarily.
    At the end of the day, there is a balance that must be achieved.


    Once you have the formalized requirements, the technical team has to take the
    business requirements and map them to technical requirements, which is a vastly
    different exercise.


    Determine Where You Are Today


    Preparing a system for the peak load is like training for a marathon and not getting
    winded by running a sprint. Once the team sets the formal expectations, you have
    to analyze whether you can handle your peak load. This is not a straightforward
    process. To begin, you must put together a list of the applications, servers,
    instances, databases, and so forth that are affected by the peak-load requirement.
    For example, in a larger organization, the peak season might involve or touch
    numerous individual servers, with each one being impacted by the additional load
    in different ways. For smaller organizations, it might involve a handful of web
    servers and a single server running SQL Server. Just because there are fewer servers
    does not necessarily mean it is easier to plan for your peak usage. It depends
    on what is being asked for when it comes to performance.


    You must assess each application and its associated back end to see where you
    are today versus where you need to be to meet the peak load. An important part
    of this effort is to discover the environmental constraints, including items that
    cannot be changed or addressed in the short (or long) term. These environmental
    constraints need to be identified early on so that a workaround can be planned
    if necessary, because additional lead time is often needed to address them. Some
    of the most common limitations are application editions or versions; infrastructure
    like storage area network (SAN) capacity or performance; and server hardware,
    such as a motherboard that cannot support additional memory. These constraints
    are important to know up front because they need to be in the back of your head
    when you are assessing the environment.


    If the environment you support is large and includes many systems that make up
    the core business, you should prioritize the applications and their associated
    servers into Tier 1 and Tier 2\. The Tier 1


    applications initiate and support the core business processes. To determine if
    an application is Tier 1, ask yourself this question: If the application or its
    servers are not up, can a transaction be completed? If the answer is no, it is
    a Tier 1 application. Tier 2 applications provide auxiliary functions and are
    not required 431


    CHAPTER 18 ■ Tuning foR PEAk LoAd


    to be up and performing to complete a core transaction. Reporting servers are
    often classified as Tier 2


    because processing the sales transaction is more important than providing a report
    on how many products were sold. By classifying each application in this way, you
    will have a smaller list of applications to perform the initial assessment on,
    which is important if the timeline is tight.


    n **Note** Because this book is focused on SQL Server, I’ll concentrate on assessing
    each application from the viewpoint of using SQL Server. Your assessment should
    also take into account other aspects such as infrastructure, the underlying server
    hardware, and Windows. Everything matters.


    For the purposes of this chapter, the following scenario will be used:


    • The application is an online tax application that allows users to enter their
    federal tax information online with a workflow to assist them, save the tax return,
    file the forms online with the federal government, and process the payment.


    •


    Historically, the application has had performance issues during the tax season,


    specifically with reporting and with some of the payment processes.


    •


    A dedicated environment does not exist for performance testing. All performance


    and system testing is done in the Quality Assurance (QA) department, which is
    half the size of the production environment but shares the same type of disk subsystem.


    • The growth rate for the number of returns processed online and the number of


    payments processed is shown in Table 18-1.


    ***Table 18-1.** These figures represent the last three years of historical returns
    and processed payments as well* *as the projected filings for 2013.*


    **% Change from Prior Year % Change from Prior**


    **Year**


    **Total Returns Filed Total Payments Processed (Return Filed)**


    **Year (Return Filed)**


    2,500,000


    1,800,000


    28%


    25%


    3,800,000


    2,500,000


    35%


    28%


    5,400,000


    4,200,000


    29%


    22%


    8,154,000


    6,300,000


    51%


    50%


    n **Note** Assume that new functionality is being released in the program, which
    is being heavily marketed. Because of these factors, it is estimated the application
    will see a 22 percent increase in filings in 2012.


    As shown in Figure 18-1, this physical environment consists of three web servers
    running Internet Information Services (IIS), two middle-tier servers, and a single
    SQL Server cluster running SQL Server Standard Edition 2012, which hosts three
    databases that consume 900 GB. The application is a .NET


    application and leverages the middle tier for all data access, connection management,
    transaction management, and session state. The database has the basic maintenance
    processes in place and is supported by a part-time DBA.


    ![Image 201](index-437_1.png)


    CHAPTER 18 ■ Tuning foR PEAk LoAd


    ***Figure 18-1.** A high-level topology diagram for the tax application.*


    Perform the Assessment


    Where do you start to figure out what is going on—especially in a large environment?
    You need a road map, and creating one is facilitated by identifying existing sources
    of data within your environment. Check to see if a topology diagram or configuration
    management database (CMDB) repository exists. The topology diagram will provide
    the 50,000-foot view of the application. Depending on the level of information
    maintained in the CMDB, you might be able to see the server details, application
    owners, as well as application relationships—all of which are important when working
    with a system you might not be familiar with. The goal is to identify any other
    applications the primary application might interface with because it might impact
    the scalability.'
