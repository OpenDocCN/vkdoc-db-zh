  trans: '# 批量复制过程


    批量复制过程（`BCP`）是一种能够将数据从数据源复制到文件或从文件复制到数据源的实用工具。在命令行中运行时，可通过简单的参数来指定数据的源位置和目标位置。还可以选择使用格式文件，以便更轻松地映射源和目标。


    假设你有一个包含一百万行和两百列的表，并且需要将这些数据快速移动到其他地方或与多个用户共享。或者，你可能有 50 个需要共享的表，它们的总数据量达到数百 GB。你将如何分发这些数据？对于初始加载，处理大量数据时，`BCP`通常是一个可行的选择。


    使用`BCP`非常简单。根据你是创建导出数据文件还是导入数据文件，你可以在目标或源处创建并执行`BCP`命令。该工具提供了许多自定义处理的选项，包括能够指定从表中查询数据子集。


    使用`BCP`的好处包括：


    *   简单、命令行执行

    *   支持读取和生成`XML`及文本格式，便于映射数据字段


    其局限性包括：


    *   一个`BCP`命令仅适用于单个表。

    *   如果不使用格式文件，则需要手动映射。

    *   不包含任何故障排除或维护工具。


    以下是我们如何在四种场景中应用`BCP`：


    ### 场景 1：全球组织

    如果分支机构只是偶尔需要数据的子集，`BCP`可能是传输这些有限数据集的一个选项。可以按计划（例如每周）创建导出数据文件，各办公室可根据需要导入这些文件。`BCP`在后台被用于在复制中应用快照。


    ### 场景 2：高容量报告需求

    `BCP`在此场景中无能为力。


    ### 场景 3：隔夜处理作业

    `BCP`在此场景中无能为力。


    ### 场景 4：硬件故障

    尽管`BCP`在服务或硬件故障时无法提供任何帮助，但它可用于为数据库中的所有表创建文件。这些文件可用于“还原”任何表的数据，但同时还需要使用每个表对应的格式文件。


    # 选择正确的部署方案


    有些时候，某个解决方案似乎完美契合公司或流程的需求，并且你手头有资源可以轻松实施它。请珍惜这样的时刻！更多时候，过程中需要做出妥协和让步。我曾见过管理层决定需要一种实施方案，但实际上，在列出所有需求和资源后，发现需要的是另一种实施方案。


    表 11-1a 和 11-1b——实际上是分成两个以适合页面显示的一个表——可以帮助你决定在需要将数据复制到另一个数据库或从另一个数据库复制时采取哪种方法。在左侧列中选择你的数据库版本和所需的功能。查看其他列中出现的“是”，以帮助你识别本章讨论的解决方案中哪一个能满足你的需求。


    表 `11-1a`. 复制决策因素，第 1 部分


    | 复制方式 | 点对点 | 事务复制 | 合并复制 | 自定义 ETL | BCP |

    | :--- | :--- | :--- | :--- | :--- | :--- |

    | SQL Express 版 | 仅限订阅者 | 订阅者 | 是 | 是 | 仅此选项 |

    | SQL 标准版 | 是 | 是 | 是 | 是 | 是 |

    | SQL 企业版 | 是 | 是 | 是 | 是 | 是 |

    | SQL BI 版 | 是 | 是 | 是 | 是 | 是 |

