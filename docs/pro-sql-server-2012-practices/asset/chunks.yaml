- fmt: '# CHAPTER 8 RELEASE MANAGEMENT


    ## Review Release


    As you collect all this information, inevitably you will be creating a release
    plan that has great information, all the moving parts of the release, as well
    as various steps to perform. Ensure that you review this plan. If possible, perform
    a dry run of the release plan in another environment to validate the steps. Review
    these steps with the developers and architects of the change. Review these steps
    with your teammates and any others involved. Validating that these steps are appropriate
    will ensure that your release will perform successfully.


    ## Hand Off


    Once the release plan has reached the point in which all the steps have been mapped
    out, and you have reviewed the steps, information, and code, you have reached
    a point in which you can consider the release “handed off” from development. Ensure
    that you have done your due diligence to get the release to this point. Do not
    accept a release as “handed off” until it has been vigorously vetted. If it has
    not reached this point, repeat any of the previous steps that are yet unfulfilled.
    Repeat these steps until you are satisfied.


    ## Release Plan Created


    Now that you have created a release plan, note the date that this occurred in
    your release notes. This information will come in handy to help you create a baseline
    for future releases. Knowing the dates that a release is requested, knowing the
    length of time it takes to perform the various tasks, and knowing all the necessary
    parts needed to ensure a successful release will help you plan future releases.
    Saving this information and reviewing after your successful release will assist
    you.


    ## Release Plan Review


    As mentioned before, reviewing the release plan can be an iterative process. Keeping
    track of each date you alter the plan will help you baseline and plan for future
    releases. Some of these future releases could entail similar steps, and your plan
    could be reused, which should save you time.


    ## Rollback Procedures


    In addition to meticulously planning all the steps to perform a release, reviewing
    code, augmenting your documentation with notes and information, you should also
    painstakingly create rollback procedures. Just as there are steps to create a
    change, you should always have steps to back out of that change. This might entail
    a snapshot of your schema, and a process to revert object changes to original
    state. It might entail scripts that can be executed to reverse data changes, insertions,
    updates, or deletions. Ensure that you add this information to your release plan,
    so that if the inevitable happens and you are forced into a situation in which
    you must roll back a change, you will be prepared. You will have the steps, will
    have tested the steps as part of your `release plan` testing phase, and will have
    the knowledge to easily and gracefully perform the `rollback procedures`. You
    will certainly be happy you have these steps in place on the day you need it.
    As with all other steps within this release plan, these need to be vetted, tested,
    and approved by others.


    ## Release Plan Testing


    It has been alluded to before, but let’s say it again: test your release plan.
    Test and test and retest. Create a sandbox environment that mimics your production
    environment to the best of your ability, and perform the release in this environment.
    Doing so will also allow you to test the rollback procedures to return the environment’s
    previous state. Perform your pre- and postvalidations. Perform any quality assurance
    tasks necessary in this environment. Use this environment as your testing ground.
    Giving yourself the ability to perform an actual release, and vet all the steps
    prior to the actual production release, will help you. Having to perform it multiple
    times when something goes wrong (and it might go wrong) will make you better prepared
    for the real release to production.


    ## Performing the Release


    At this point you have done a lot of work, and all that is left is that fateful
    day, release day. All your ducks are in a row. Others have done their parts. You
    have performed countless tests on your release plan. It’s ready. You can actually
    say with a level of certainty what the outcome will be. Hopefully, you will not
    be saying, “I hope that this works.” You should know at this point. However, be
    wary and don’t be over confident. Perform the release as you have outlined it
    in your release plan steps. Don’t run the risk of skipping steps because you have
    performed them previously and probably know them by heart. Be meticulous, follow
    your plan, and perform the release as outlined.


    While you perform the release, ensure that there is proper monitoring occurring
    on your environments. There should be many folks meticulously watching your processes
    for any falters in functionality, various monitoring results, and any alerts that
    might occur. These individuals should be aware that a release is occurring, and
    be able to indicate that something is awry. This awareness will allow you to halt
    the release and perform any rollback procedures you have in place, if necessary.


    Just after the release has been performed, you might think that you are done.
    You could quit here. But why not take a little extra time to make any notes about
    the actual release? Detail any issues that you or others had while performing
    the steps. Maybe something was off in the execution that was not found in the
    previous iterations of testing. If you note those details now, making action items
    for the next release, your process will be that much more fine-tuned next time.
    Don’t be afraid to make notes about what others could do better. Be even less
    afraid to make those same notes about yourself. The only way you get better is
    through practice and observation of the technique. Often, a root cause analysis
    will be performed after an error has occurred in an IT system, in order to investigate
    the causes and possible fixes. Why not do this on a positive note to your release
    process. Each performed iteration of a release, no matter how small or complex,
    can provide tips to make the next iteration more stable. Recall that our goal
    was to reach that perfect balance where the tasks are at once sufficient, yet
    not cumbersome. This will take you time and most likely involve various iterations
    of this malleable release process. Taking notes along the way is crucial to making
    your next release a more streamlined success.


    ![Image 103](index-220_1.png)


    ## Release Plan Template and Release Plans


    You will notice that in the documents that we have discussed, several tasks were
    intermingled among the information. Let’s discuss the actual tasks that will go
    into a release plan. Here, I do not mean the tasks to create the release plan,
    rather the tasks that will be performed in the actual release, which you should
    document within a release plan.


    Ensure that you review the code thoroughly; especially weighing how these changes
    will impact your system and topology. Each time that you touch the code, keep
    track of the dates, your observations, your progress, any notes, and any other
    information that you can gather during this process. Keep this information within
    your release notes. Share this information with all involved. You might have to
    plan various meetings between yourself and other individuals involved in the release
    process. As you collect information, ensure that you reference this information
    during and after the release process.'
