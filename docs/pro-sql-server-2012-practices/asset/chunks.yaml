  trans: '# 第 15 章 ■ 选择和确定服务器规模


    这两种成本较低的选项之间存在一些关键差异。`E5-2643`处理器的基本时钟速度更高，为`3.3 GHz`，并且能够利用英特尔睿频加速技术将单个核心的时钟速度提升至`3.5
    GHz`（当所有核心尚未全速运行时）。与之相比，`E5-2690`处理器的基本时钟速度为`2.9 GHz`，睿频加速最高可达`3.8 GHz`。一个装载`E5-2643`处理器的高负载系统，其处理核心在大部分时间会以`3.3
    GHz`运行，偶尔单个核心会突发至`3.5 GHz`。而一个装载`E5-2690`处理器的高负载系统，其处理核心在大部分时间会以`2.9 GHz`运行，偶尔单个核心会突发至`3.8
    GHz`。表 15-1 展示了这两款处理器的部分相关规格。


    表 15-1. 两款英特尔至强 E5 系列处理器的比较


    | `CPU` | `基础时钟` | `睿频时钟` | `核心` | `L3 缓存` | `价格` |

    | --- | --- | --- | --- | --- | --- |

    | `E5-2690` | `2.9 GHz` | `3.8 GHz` | `20 MB` | | `$2,057` |

    | `E5-2643` | `3.3 GHz` | `3.5 GHz` | `10 MB` | | `$885` |


    故意空出一个处理器插槽，会为你预留大量容量，以便未来购买第二个处理器（并支付额外的`SQL Server 2012`核心许可费用）时加以利用。如果两个插槽都装满四核处理器，那么一旦你需要升级，就不得不将两个处理器都换成性能更好的型号。根据我的经验，这会是一个更难推销的方案，特别是因为系统供应商很可能会对处理器套件收取溢价。此外，你还会多出两个原始处理器，它们很可能会作为相当昂贵的镇纸，最终躺在某个抽屉里。


    一个双路系统，如果安装了上述任一款处理器，且两个处理器插槽都装满的话，使用`16 GB`的`DIMM`内存条可以支持`384 GB`的`RAM`。如果只安装一个处理器插槽，使用`16
    GB`的`DIMM`内存条，最大`RAM`容量将降至`192 GB`。


    如果必须在这两种方案中选择，我可能会倾向于选择一个`E5-2690`处理器，而不是两个`E5-2643`处理器，因为这样升级路径会更容易且成本更低。


    ## 内存选择


    一般来说，我喜欢为数据库服务器配置大量的`RAM`。目前，所有基于英特尔和`AMD`的新服务器都使用纠错码（`ECC`）`DDR3 RAM`，但`ECC DDR4
    RAM`将于`2014`年开始在新服务器中使用。随着时间的推移，`ECC DDR3 RAM`的价格已稳步下降，变得极其经济实惠。


    在数据库服务器中拥有大量的物理`RAM`，可以让`SQL Server`拥有更大的缓冲池，用于缓存从存储子系统读入内存的数据。任何位于`SQL Server`缓冲池中的数据，都可以通过逻辑读取来获取，而无需从存储子系统进行物理读取。逻辑读取比物理读取快得多，即使你使用的是闪存存储。


    理想情况下，你的整个数据库都能放入`RAM`中，这将显著降低存储子系统的读取`I/O`压力。拥有大量的`RAM`还会减少`SQL Server`惰性写入器的运行频率，从而降低存储子系统的写入`I/O`压力。购买更多的`RAM`比升级存储子系统要便宜得多。


    考虑到这一切，你的新数据库服务器应该购买多少`RAM`呢？第一个决策点是你是否拥有`SQL Server 2012`企业版，因为这直接影响你能实际用于`SQL
    Server`的`RAM`容量。


    `SQL Server 2012`标准版限制数据库引擎使用`64 GB`的`RAM`，`SQL Server Analysis Services (SSAS)`使用`64
    GB`的`RAM`，因此理论上，两者之间可以使用`128 GB`的`RAM`（尽管出于性能原因，将数据库引擎和`SSAS`运行在同一实例上并非最佳实践）。


    `SQL Server 2012`商业智能版允许`SSAS`使用操作系统最大值，数据库引擎最多可使用`64 GB`的`RAM`。


    `SQL Server 2012`企业版对数据库引擎和`SSAS`都可使用操作系统最大值。`Windows Server 2008 R2`的操作系统最大值为`2
    TB`，`Windows Server 2012`为`4 TB`。如果你愿意为`32 GB`的`DIMM`内存条支付溢价，目前在一台普通的四路服务器上获得`2
    TB`的`RAM`是可能的。当前内存模块容量的甜蜜点是`16 GB`，因为你能以可承受的价格获得相对较大的内存模块。


    如果你将运行`SQL Server 2012`标准版，我认为没有任何理由在你的数据库服务器中配置少于`64 GB`的`RAM`。我会强烈考虑使用十根`8 GB`的`DIMM`内存条配置`80
    GB`的`RAM`，这样你可以将实例级别的“最大服务器内存”设置设置为`64000`，同时仍为操作系统留出充足的`RAM`。


    对于`SQL Server 2012`企业版，如果可能的话，我会希望用`16 GB`的`DIMM`内存条填满服务器中所有可用的内存插槽，因为服务器`RAM`如此经济实惠，且对提升性能如此有效。既然你的组织已经为企业版花了钱，那么为了在`RAM`上节省相对较少的钱而束缚服务器的性能和可扩展性是愚蠢的。例如，一个配备两个英特尔至强`E5-2600`系列处理器的双路数据库服务器，可以使用`24`个内存插槽。`24
    根 16 GB ECC DDR3 DIMM`内存条当前的成本为`$6,240`，这只占该数据库服务器`SQL Server 2012`企业版许可成本的很小一部分。


    表 15-2 展示了`2012`年底不同容量内存模块的相对价格。


    表 15-2. ECC DDR3 RAM 的相对价格（2012 年末）


    | `模块容量` | `价格` | `每 GB 价格` |

    | --- | --- | --- |

    | `32 GB` | `$1,498` | `$47/GB` |

    | `16 GB` | `$260` | `$16/GB` |

    | `8 GB` | `$90` | `$11/GB` |

    | `4 GB` | `$60` | `$15/GB` |

    | `2 GB` | `$30` | `$15/GB` |


    最后一个需要考虑的因素是不同内存配置对内存带宽的影响。当你向系统添加更多`DIMM`内存条以填充更多可用内存插槽时，内存的带宽可能会下降，这可能会在一定程度上损害内存访问性能。这种影响因处理器及其集成的内存控制器而异。最新的英特尔处理器受此问题的影响要小得多。尽管如此，我仍然倾向于使用大量的`RAM`，因为即使是“较慢”的`RAM`也比你的存储子系统快得多。如果你担心这一点，应该查阅服务器的文档，了解关于如何配置内存的建议。


    ## 结论


    本章涵盖了一个非常复杂主题的许多方面。为了在不花费小 fortune 购买`SQL Server 2012`核心许可费用的情况下，从你的数据库服务器获得最佳的性能和可扩展性，你需要做出明智的选择，尤其是在为数据库服务器选择处理器的确切型号时。因为`SQL
    Server 2012`使用基于核心的许可方式，所以选择具有出色单线程性能的处理器非常重要，这样你才能从每个昂贵的核心许可中获得尽可能高的性能。同时，你还需要尽量减少物理核心总数以最小化许可成本。


    双路服务器在处理器技术方面通常比同期的四路服务器领先一代。与过去相比，它们还具有更高的内存密度和更多的`PCI-E`扩展插槽，因此对于许多数据库服务器工作负载来说，它们是极具吸引力的选择。'
- fmt: '# Chapter 16: Backups and Restores Using Availability Groups


    By Grant Fritchey


    You need to know whether you will be using `SQL Server 2012 Enterprise Edition`
    or whether you will have to use a lower edition, as this will affect how much
    `RAM` you can use and how many sockets and physical cores that you can use for
    `SQL Server 2012`.


    You should take advantage of the extremely low pricing for `ECC DDR3 server RAM`
    by buying a larger amount of `RAM` for your new server. There is really no longer
    any excuse to have a new server with only 16 `GB` or 32 `GB` of `RAM`.


    Finally, you need to understand your workload so that you can make the right hardware
    choices to get the best performance and scalability for that type of workload.


    With the release of `Microsoft SQL Server 2012`, a whole new mechanism for ensuring
    continuous availability of databases in your system was introduced: `AlwaysOn
    Availability Groups`. `Availability Groups` provide a mechanism for failing over
    a database, or a group of databases, from a primary replica onto between one and
    four secondary replicas. This ability to keep a database online with little to
    no data loss and without the requirements of the old `Failover Cluster` shared
    disks and matching hardware makes for a great way to help ensure the continuity
    of access to data in your systems. Further, secondary replicas can be set up as
    read-only replicas, allowing you to offload some of the data access from your
    production system, hosting the primary replica, to one or more of the secondary
    replicas. If all this isn’t enough, you also get the ability to remove the server
    load required for running part of the backup process and put that into the secondary
    replicas as well. The ability to change where and how you back up your databases
    without negatively affecting your ability to recover a database is a major improvement
    in the capabilities available for disaster recovery, and it provides performance
    improvements.


    This chapter provides a very basic overview of how `Availability Groups` are set
    up and configured to allow you to get your own `Availability Group` going. From
    there, we’ll explore how you can configure your `Availability Group` to support
    different mechanisms of backing up a `SQL Server` instance. Finally, because your
    backup is only as good as your last restore, we’ll cover how you can restore your
    databases from these backups. All this will help you provide a more versatile
    disaster-recovery setup in your environment. You’ll also receive some performance
    benefits when you remove things like backup compression overhead from your primary
    replica on your production servers.


    One point is worth noting right away. You can’t run a `FULL BACKUP` on the `Availability
    Group`. You can run only log backups and a `COPY_ONLY` backup. You also don’t
    get `DIFFERENTIAL backups` either. So while we’ll look at saving the cost of some
    backup processing, we’re not talking about saving the cost of all backup processing.


    ![Image 177](index-381_1.png)


    ## Setting Up an Availability Group


    It’s a fairly straight forward task to get an `Availability Group` up and running.
    But that’s only for a simple setup. If you have a complex network topology, this
    task becomes more involved. I’ll assume a simple setup in order to outline this
    process and move on to the backups.


    You have to configure your `Windows` servers to take part in the `Availability
    Group` first. You also have to configure the `SQL Server` instance to support
    `Availability Groups`. Once these tasks are complete, you’ll be able to add one
    or more databases to an `Availability Group`. First, you have to set up the `Windows`
    server.


    ### Configuring the Windows Server


    `Availability Groups` require that you have a `Failover Clustering` service running
    and all the replicas are nodes within that group. Installing this is pretty simple.
    You just have to use the `Features Wizard` from the `Server Manager` as shown
    in Figure 16-1.


    Getting the service onto the server is about the easiest step in the whole process.
    You are not required to have matching machines or a shared hard drive. You just
    need the service installed on each of the machines. The `Windows Failover Clustering
    Service (WFCS)` has a very long list of requirements for exactly how you need
    to configure your servers for it to work properly. You can access that list online
    here: `http://technet.microsoft.com/en-us/library/cc732035`. The good news is
    that you don’t have to go through this list and validate that your systems are
    ready for clustering. Instead, you can take advantage of the built-in tools that
    are installed as part of the clustering service.


    Before proceeding to attempting to set up a cluster, you need to install the service
    on all the machines you’re going to use to manage replicas within your `Availability
    Group`. You can create the cluster and then add machines to it, but that can be
    confusing. Further, if you already configured a cluster and put it into your production
    environment, you’re risking downtime by choosing to add servers at a later date.
    It’s better to install and configure what you need up front.


    ***Figure 16-1.** Installing the `Failover Clustering` service.*


    ![Image 178](index-382_1.png)


    Once you have the clustering service installed on your servers, you can connect
    to one and use the `Failover Clustering Manager` software to set up your cluster.
    But first, you should validate that your servers will support the cluster. You
    do this by running the `Validate A Configuration Wizard`. This interface requires
    you to simply supply the servers that are going to take part in your cluster.
    The wizard will validate all the requirements for a cluster for you. Errors will
    prevent the success of your cluster, and by extension, your `Availability Group`.
    These must be addressed directly. Warnings are just indications that one or more
    of the servers taking part in the cluster might have configuration or hardware
    issues that will preclude it from being always available as a part of the clustering
    service. You should understand the implications of the warnings, but these will
    not prevent you from creating a cluster.


    After completing the steps in the validation wizard, you can begin creating a
    cluster. Because you’re not setting up all sorts of shared resources between these
    machines, you need to supply only the connection information, as you did during
    the validation process, for each server.


    ## SQL Server Availability Group


    With the cluster set up and all the servers that you require made members of it,
    you need to set up `SQL Server` to create and support `Availability Groups`. The
    first thing you need to do is run the `SQL Server Configuration Manager`. You
    need to make one modification to the `SQL Server` service itself. Open the properties
    for the service from the `Configuration Manager` window, and click on the `AlwaysOn
    High Availability` tab, which is shown in Figure 16-2.


    Select the `Enable AlwaysOn Availability Groups` check box. This enables this
    server to take part in `Availability Groups`. It does require a restart for the
    machine, so if you are adding this capability to a production server, plan for
    some downtime. Each server that is going to take part in your `Availability Group`
    needs to be configured in the same manner.


    Now, with the server designated as a node in a cluster and `AlwaysOn High Availability`
    enabled, you’re ready to start creating an `Availability Group`. You need to open
    `SQL Server Management Studio (SSMS)` and connect it to one of the servers in
    your clustered environment. `Availability Groups` can be managed through `SSMS`
    or through `T-SQL`. If you’re going to be setting up and maintaining lots of these
    environments, you’ll want to get very familiar with the `T-SQL` method of doing
    things. For simplicity’s sake'
