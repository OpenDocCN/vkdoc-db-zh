    # 第五章：从 SQL 跟踪到扩展事件


    *配对匹配*目标是一个有趣的目标，因为借助它，你可以追踪仍在发生的事件。它获取一个事件对，例如 SQL 语句开始和 SQL 语句完成，根据事件数据中的一个或多个列进行匹配，如果匹配成功，则将它们从进一步处理中丢弃。对于它捕获的每个事件，它会记录该事件的完整事件数据以及为该事件指定的所有操作。它会将所有数据存储在内存缓冲区中，直到配对的事件触发。这个内存缓冲区无法手动设置，它由扩展事件引擎在内部处理，并基于可用的系统资源。如果出现内存压力，存储的未配对事件必须被刷新，那么本应与这些被刷新事件配对的传入事件在目标中将显示为未配对。这里有一点你必须小心。并非所有事件都能很好地配对。`Lock
    Acquired` 就是其中之一。虽然有 `Lock Released` 事件，你可能认为每个 `Lock Acquired` 事件都会触发它，但事实并非如此。一个例子是当锁从行升级到页再到表时。`Lock
    Acquired` 事件会为其中的每一次升级触发，但 `Lock Released` 仅在页或表锁被释放时触发一次。


    ## 环形缓冲区


    `环形缓冲区`是一个基于内存的异步目标。它将事件存储在一个循环使用的内存空间中。它可以在两种模式下工作。第一种是严格的先进先出（默认），当缓冲区满时，最旧的事件会被移除。第二种是按事件类型先进先出，顾名思义，这种模式下会在内存中保留一定数量的同类事件。在这种模式下，每种类型的最后一个事件会从缓冲区中移除。环形缓冲区的内存大小、要保留的事件数量（包括所有事件和每种类型的事件数量）都是可配置的选项。


    ## 事件文件


    `事件文件`是一个基于文件的异步目标。当会话缓冲区满时，它会将其内容写入文件。与 SQL 跟踪类似，你可以指定文件名、文件大小、文件是否可以滚动，以及文件满时增长的大小。要读取事件文件的内容，我们必须使用
    `sys.fn_xe_file_target_read_file` 函数。指定文件名时，你可以在名称的任何位置使用 `*` 字符来读取所有匹配部分名称的文件。其工作方式类似于
    SQL `LIKE` 比较中的 `%` 字符。要在 SQL Server 2008 中读取事件文件，我们还需要向 `sys.fn_xe_file_target_read_file`
    函数提供一个元数据文件（在会话启动时创建）。在 SQL Server 2012 中，不再需要这个文件。


    ## Windows 事件追踪（ETW）目标


    最后一个目标称为 *Windows 事件追踪 - ETW* 目标。它是一个基于文件的同步目标。要成功使用此目标，你必须了解 ETW 在 Windows 中的工作原理，这超出了本章的范围。如果你想了解更多信息，请在
    MSDN 上搜索“Event Tracing for Windows Target”文章 (http://msdn.microsoft.com/en-us/library/ff878411.aspx)。该目标在
    SQL Server 进程中是单例。这意味着无论有多少个扩展事件会话正在发送事件数据，到达它的事件都将一次处理一个。一旦你启用了 ETW 目标，就会在 SQL
    Server 运行的计算机上创建一个 ETW 会话。此会话在该机器上安装的所有实例之间共享。要使用 ETW 目标，运行 SQL Server 服务的账户必须是
    `Performance Log Users` 组的成员。


    ![图片 68](img/index-128_1.png)


    在了解了 ETW 目标之后，如果你觉得它令人困惑，我会说你是完全正确的。在我看来，这个目标目前状态过于复杂，无法有效使用。


    可以使用此 SQL 语句查看现有目标：


    ```sql

    SELECT *

    FROM sys.dm_xe_objects

    WHERE object_type = ''target''

    -- 仅显示我们可以使用的目标

    ```

