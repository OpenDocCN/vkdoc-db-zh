- fmt: 'The drawback of implementing data architecture primarily with the relational
    engine as a comprehensive, one-size-fits-all solution is that you often have difficulty
    making every data model work the way you would like. Often, you might use the
    relational engine for data that doesn’t quite fit, but you do so because it’s
    what you have available and it’s what you know. To use all of SQL Server correctly
    can take a highly experienced professional who has expertise with every feature,
    property, and setting of the DBMS to get it done. For most professionals in the
    SQL Server world, the relational engine is a typical and undeniable solution for
    all data types and structures, including logs, archives, BLOBs, text, star schemas,
    staging data, and streaming data. That has now changed with Big Data. You’ll have
    to choose where data will reside and dropping it in an OLTP database won’t necessarily
    be the only (or default) choice. This is a new realm that the enterprise DBA will
    have to work within as they develop this architecture.


    Should all of your data be stored in a Big Data cluster? It could be, but in a
    Microsoft SQL Server environment, the answer is very clear, “Never!” Remember,
    you still have SQL Server and it meets most (or all) of your needs already. It’s
    a solid, reliable, full-featured package with a quality database engine, and any
    `ACID` (atomicity, consistency, isolation, durability) requirements you have in
    a high-volume environment will still be better served by SQL Server.


    ## Big Data Arrives with Hadoop


    Now that we’ve established that Big Data doesn’t replace SQL Server or your database
    infrastructure but complements it, let’s look at the software and hardware that
    you will install, configure, and work with, and business cases that can make it
    useful for you. When you make the leap to Big Data, you are committing to developing
    a new type of data architecture that typically involves adding a Hadoop cluster
    to your environment, either internally within your network or in the cloud. This
    chapter will work with Hadoop on Azure, the cloud-based solution available from
    Microsoft in 2012. As of this writing, Microsoft has provided a `Community Technology
    Preview` (`CTP`) edition that we’ll make use of to show working code. As a follow-on
    product, Microsoft will release `Hadoop for Windows` sometime in the future, but
    because this edition isn’t publicly available yet, we won’t discuss it here.


    *Hadoop* is a framework, or an ecosystem, not a database. The framework is made
    up of various pieces of software that allow for the distributed, parallel, and
    redundant storing of data. The key parts of Hadoop are `HDFS` and `MapReduce`.


    -   **`HDFS`:** The Hadoop Distributed File System is the main file storage system
    used by the Hadoop framework software and applications.

    -   **`MapReduce`:** This is a software framework for processing large amounts
    of data in parallel on a cluster of servers in a reliable, fault-tolerant manner.


    Hadoop gets its processing power by being able to write data in parallel to a
    large set of distributed machines, which in the Hadoop ecosystem are called *nodes*.
    When we talk about a large set of machines, consider that a small cluster might
    have 50 nodes. A cluster of this size would have all 50 machines processing data
    simultaneously in a coordinated manner. The redundancy of the data is baked in
    to this process, as it works by writing every piece of data to three nodes simultaneously.


    A Hadoop cluster has three types of machines: Clients, `Master Nodes`, and `Slave
    Nodes`. There are two types of `Master Nodes`: `Job Trackers` and `Name Nodes`.
    The `Name Node` coordinates the data storage in `HDFS`, while the `Job Tracker`
    organizes the parallel processing of data using `MapReduce`. The majority of the
    machines in a Hadoop deployment are `Slave Nodes`, which do the work of storing
    data and running computations. Each `Slave` runs both a `Data Node` and `Task
    Tracker` daemon that communicate with and receive instructions from their `Master
    Nodes`. The responsibility of the `Client` machines is to load data into the cluster,
    submit `MapReduce` jobs, and retrieve the results of the jobs when they finish.


    Figure 17-1 shows the `Client`–`Master`–`Slave` relationship and how the `Name
    Node` works with the `data nodes` to store and get data in `HDFS`. In smaller
    clusters of 50 nodes or less, you could have a single physical server playing
    multiple roles, such as both `Job Tracker` and `Name Node`. With medium to large
    clusters, you will often have each role operating on a single server machine.


    ### Hadoop Cluster


    ```text

    Clients

    Backup Node

    Master Node

    Secondary Name Node

    Name Node

    Slave Nodes

    Data Node 1

    Data Node 2

    Data Node 3

    Data Node N

    ```


    ***Figure 17-1.** A Hadoop cluster with N data nodes*


    ## MapReduce: The Nucleus of Hadoop


    The reason for Hadoop’s surge in popularity is its ability to retrieve and process
    large amounts of data faster than any other means available, and `MapReduce` is
    the key to making this happen. Consequently, the best way to understand Hadoop
    is to know how `MapReduce` works. To do this, you’ll walk through an example of
    how `MapReduce` crunches data to solve a high-volume problem. Although writing
    code for `MapReduce` programs won’t typically be the DBA’s job, knowing how the
    data is processed will be as important to them as knowing how transactions are
    handled by a web application.


    > **Note** Hadoop is written in the `Java` programming language, so `MapReduce`
    code is most often written in `Java` even though there is support for other languages,
    such as `C++` and `Python`. An interesting development introduced by Microsoft
    to the Hadoop ecosystem is the addition of `JavaScript` as a `MapReduce` programming
    language. You’ll use `JavaScript` to walk through an example of `MapReduce` in
    this section, and later in the chapter you’ll execute a `MapReduce` job with your
    own code in the “`JavaScript`” section. For many software and database developers
    with experience using Microsoft development tools, `JavaScript` will be familiar
    and a viable option for `MapReduce` development.


    To see how `MapReduce` processes data, you’ll now work through a business scenario
    of an online retailer that is doing more than `$2 billion` in sales per year and
    has accumulated a large volume of sales data over the past three years. Assume
    the number of sales transactions processed over the three-year period has grown
    to more than 1 billion, and the company has used Hadoop to store a record of each
    transaction. Some of the data recorded for each transaction is shown in Table
    17-1. The full set of data is spread across a cluster of 100 data nodes.


    Keeping a record of the data in so much detail allows you to retrieve and analyze
    it in any way you choose. You know a lot about each sale, including customer details,
    product characteristics, and promotion information. The data is stored in `CSV`
    format by Hadoop in `HDFS`, so you can analyze this data over the full three-year
    period by computing sales metrics in numerous ways using the geography, product,
    promotion, customer, and sales data in your dataset. For your first task, you’ll
    calculate the average sale amount by product line.


    ***Table 17-1.** Ten Purchases in Your Sample `HDFS` Dataset*


    **Product** | **Country** | **Product Line** | **Gender** | **Total Children**
    | **Order Quantity** | **Sale Amount**

    ---|---|---|---|---|---|---

    USA | Road-650 Black | R | M | 699.09

    USA | Mountain-100 Silver | M | F | 3399.99

    France | Hydration Pack-70 oz. | M | F | 54.99

    Canada | Road-150 Red | R | M | 1777.77

    Australia | ... | ... | ... | ...'
