    of monitoring and recovery for each data-redundancy technology.


    Monitoring and recovery options for replication include


    •


    Monitoring


    • Replication Monitor


    • Custom Errors


    •


    Recovery:


    • Re-apply failed transactions


    • Manually edit the data at the subscriber


    • Reinitialize


    chapter 11 ■ the Fluid dynamics oF sQl server data movement


    Also helpful are the articles “Monitoring Replication with System Monitor” and
    “Monitoring Replication,” which you can read for information about using system
    tools in replication solutions. You’ll find these on the Microsoft Developer Network
    website ( [*http://www.msdn.com*). Just sear](http://www.msdn.com)ch for their
    titles.


    Options for log shipping are as follows:


    •


    Monitoring


    • Notification upon failure of the Transaction Log backup


    • Notification upon failure of the Copy job


    • Notification upon failure of the Restore


    •


    Recovery


    • Restart failed jobs


    • Manually apply log backups at the secondary


    • Reinitialize


    Again, MSDN is your friend. See the MSDN article “Monitor Log Shipping” for a
    list of system tables and stored procedures you can use to help stay on top of
    log-shipping solutions.


    For database mirroring, your options are the following:


    •


    Monitoring


    • Notification upon failover


    • Perfor[mance counters (see http://technet.microsoft.com/en-us/library/](http://technet.microsoft.com/en-us/library/)


    ms189931.aspx)


    •


    Recovery


    • GUI interface for failback


    • Reinitialize


    The list is very short for AlwaysOn availability groups:


    •


    Monitoring


    • The AlwaysOn dashboard in SQL Server Management Studio (SSMS)


    • Extended events


    • Windows PowerShell


    •


    Recovery


    • Failover and failback of the primary replica


    Custom ETL using SQL Server Integration Services offers the following options
    for monitoring and recovery:


    •


    Monitoring


    • Scheduled ETL jobs can be configured to notify on failure.


    • Error handling in the package can be configured.


    •


    Recovery


    • You might be able to manually correct data.


    chapter 11 ■ the Fluid dynamics oF sQl server data movement


    • Reinitialization could be complex.


    And finally, for Bulk Copy Process (BCP), you have the following options:


    •


    Monitoring


    • Scheduled BCP jobs can be configured to notify on failure.


    • More robust scripting can include some error handling.


    •


    Recovery


    • When BCP fails on importing data, the entire batch is rolled back so that no
    data inconsistency can come from a partial load.


    Keep in mind that you can take advantage of Extended Events and PowerShell to
    create your own custom monitoring. These two tools can actually be applied to
    any of the data-replication techniques described in this chapter.


    Conclusion


    You might end up using one or more of the methods described in this chapter, or
    a combination of two or more. They all have their strengths. They all have drawbacks,
    too. If you plan well and communicate that plan to the right team members, you
    are well on your way to successful deployment. Make sure your senior managers
    also are aware of what the technology you choose can and cannot do. With their
    understanding, you are less likely to be asked later, “Why doesn’t it do X? We
    thought it would do X.”


    n **Note** Don’t forget to use all of the valuable resources available to you,
    most are available for free on YouTube, Twitter, and many SQL Server support sites.


    As with everything related to SQL Server, your mileage might vary because your
    experiences can be vastly different from mine. The examples provided here have
    all come from real-life scenarios I have had to support. They are not intended
    to be all encompassing, and even though my company went in one direction for a
    solution, yours might choose another. A few things are certain, though: the technology
    will continue to advance, and database administrators and developers will continue
    to find creative solutions using those tools.


    **chapter 12**


    ■ ■ ■


    **Windows Azure SQL Database for**


    **DBAs**


    **By Herve Roggero**


    Microsoft entered the cloud-computing space a few years ago with the vision to
    provide organizations a set of services they could use to build applications faster,
    with reduced maintenance requirements and with as much transparent scalability
    and availability as possible. As part of this vision, Microsoft created Windows
    Azure SQL Database (or SQL Database for short), a relational database service
    for the cloud, which delivers configuration-free high availability and scalability
    at a reasonable cost.


    Although you can easily install and configure a full instance of SQL Server on
    virtual machines in the cloud, SQL Database is one of the most interesting cloud
    technologies because it provides many features of SQL Server and high availability
    without the burden of complex configuration settings. Think of SQL


    Database as a subset of SQL Server for the most part; I will explore some key
    differences and explain how this technology works throughout this chapter to give
    you a solid foundation to understand and manage this platform.


    Before diving into the details of this technology, I should set an expectation
    upfront: SQL Database is not SQL Server in the cloud. This is perhaps the number
    one misconception about this technology and the source of much confusion about
    what SQL Database should and should not do. Because SQL Database instances run
    on shared hardware and infrastructure, SQL Database is a “one size fits all” environment
    from a configuration standpoint. For example, everyone gets a database that is
    fully redundant with 99.95


    percent monthly availability, and everyone gets roughly the same share of computing
    resources on any given server. Conversely, no one can modify the disk subsystem,
    modify memory allocation, or have direct access to the physical server on which
    SQL Database instances are running.


    So if there are no configuration options to worry about and, as a result, no hardware
    and databaselevel tuning options, why are we even discussing this technology at
    all in this book? Because, as a DBA, you will inevitably be asked about the capabilities
    of SQL Database at some point, how this technology could be leveraged by your
    organization, what its strengths and weaknesses are, and even possibly how to
    support it as part of your daily responsibilities. And as you will see in this
    chapter, there is no shortage of opportunities for businesses to leverage SQL
    Database.


    chapter 12 ■ WindoWs azure sQL database for dbas


    n **Note** The formal name of this technology is *Windows Azure SQL Database*.
    However, for simplicity, I refer to it as *SQL Database* in this chapter. Also,
    a user database in SQL Database is referred to as a *SQL Database instance* .


    SQL Database Architecture


    Let’s first take a look at the SQL Database underlying architecture and discuss
    some of its implications. As you will see, SQL Database was designed as a cloud
    database, and not simply as a database in the cloud.


    Infrastructure


    One of the primary drivers of this architecture is to favor availability and scalability
    rather than raw performance. When you connect to a SQL Database instance, you
    are in fact connecting through a layer of routers and proxies that will find the
    server on which your database is currently located. That’s right, your database
    can move around from server to server. There is no way for you to know on which
    server your database is located; Microsoft reserves the right to move SQL Database
    instances around based on current workload requirements and other factors.


    When an application connects to a SQL Database instance, the connection request
    first goes through a layer of gateways that route the connection request to the
    correct underlying server holding your database, as shown in Figure 12-1\. The
    gateway has additional responsibilities, including security and protocol parsing.'
