    now. A few things health_


    session tracks:


    •


    sql_text, session_id for any error with severity >=20


    •


    sql_text, session_id for any sessions that encounters a memory error (not all


    memory errors are severity >=20)


    •


    A record of any “non-yielding scheduler” problems


    •


    Any deadlocks


    •


    Callstack, sql_text, session_id for sessions waiting on latches (or other interesting
    resources) for > 15 seconds


    •


    Callstack, sql_text, session_id for sessions waiting on locks for > 30 seconds


    •


    Callstack, sql_text, session_id for sessions waiting 5 seconds for “external”
    waits or


    “pre-emptive waits”


    In SQL Server 2008 the only target for health_sesion was the Ring Buffer, but
    in SQL Server 2012 the targets are both the Ring Buffer and the Event File. Because
    we’ve previously shown how to read from the Ring Buffer target the following code
    example will read from the Event File.


