- fmt: '# Chapter 11: The Fluid Dynamics of SQL Server Data Movement


    is of limited use here. Having said that, I have seen setups that use `mirroring`,
    coupled with `log shipping` on top of the mirror instance, to provide users with
    a read-only copy of the database.


    ## SCENARIO 3: Overnight Processing Jobs


    `Mirroring` will not provide any benefit in this scenario, because the mirror
    is not accessible for data reads or writes.


    ## SCENARIO 4: Hardware Failure


    Here is where `mirroring` can shine. If a hardware failure happens, failover is
    immediate. Applications might still need manual intervention to point to the new
    data source, however, depending upon how those applications are designed. Once
    the failover condition has been cleared, failing the database back over to the
    principal is simple.


    > **Note:** In Scenario 4, failover is immediate when synchronous mirroring is
    used. Asynchronous mirroring brings the possibility of delay while the target
    database clears the redo queue.


    ## AlwaysOn


    "AlwaysOn" is an umbrella term that covers two features in SQL Server 2012:


    *   `Availability groups`

    *   `Failover clustering instance (FCI)`


    ### Availability Groups


    `Availability groups` (shown in Figure 11-4) incorporate the best of `database
    mirroring`, but they are enhanced beyond that. `Availability groups` require that
    the servers hosting the SQL Server instances are part of a `Windows Server Failover
    Cluster (WSFC)`. SQL Server can also be installed as a standalone instance on
    a server in a `WSFC` with no shared storage requirement; it is not required to
    be a `failover cluster instance (FCI)` to implement `availability groups`. To
    review all of the prerequisites needed for using `AlwaysOn`, see the documentation
    from Microsoft here: `http://msdn.microsoft.com/en-us/library/ff878487.aspx`.


    Once you have installed a SQL Server instance and the `AlwaysOn` feature has been
    enabled, you can configure `availability groups`. Each `availability group` serves
    as a host to a number of user databases (`availability databases`) in a primary
    replica, and up to four additional secondary replicas can be configured, for a
    total of up to five replicas. This is different from `mirroring`, where only a
    single principal database can be configured to a single mirror.


    ![Image 138](index-290_1.png)


    *Figure 11-4. AlwaysOn availability groups.*


    The primary replica and all secondary replicas are kept in sync by a process called
    `data synchronization`, where the transaction log entries from the primary are
    applied to each secondary. Each database in the `availability group` will have
    its own `data-synchronization` process. Data is not synchronized for the entire
    `availability group`, but for each individual database. As with `mirroring`, synchronization
    can be synchronous or asynchronous per database. Recall that with synchronous
    replicas, latency might occur while the primary replica database waits for the
    secondary replica database transaction to be committed.


    Unlike `mirroring`, secondary replicas can be configured for read-only access
    and can also be used to support full (`copy-only`) or transaction log backups.


    In the event of a failover, one of the secondary replicas will become the primary
    and the original primary replica will become a secondary. There can only be one
    primary replica for any given `availability group`. All databases in a replica
    will be failed over together.


    One of the biggest benefits of `availability groups` is that you have the ability
    to configure a `listener name`, which acts as a single point of entry for applications
    that stays the same name no matter where it lives (which is always where the primary
    replica is). As with an `FCI`, this allows applications to not worry about connecting
    after a failover to a different name.


    Benefits include the following:


    *   `Availability groups` allow for more than one database to fail over as a group
    if they are configured that way.

    *   Automatic failover can be configured.'
