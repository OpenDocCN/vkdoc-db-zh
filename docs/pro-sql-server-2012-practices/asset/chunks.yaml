  raw: 'You will find that there are a number of ways to query the sql_handle. The
    following code demonstrates how to pull the sql_handle for a procedure call:


    DECLARE @HANDLE BINARY(20)


    SELECT @HANDLE = SQL_HANDLE FROM SYSPROCESSES WHERE SPID = <SESSION ID>


    The following code shows how to query the handle with a select command, with the
    results shown in Figure 4-1:


    SELECT * from sys.sysprocesses


    cross apply sys.dm_exec_sql_text (sql_handle)


    ***Figure 4-1.** Results joining sys.processes and sys.dm_exec_sql_text.*


    Each SQL Server performance-tuning DBA has its own suite of scripts to query DMVs
    in times of performance challenges. Included in this chapter is my own collection
    of scripts that I have pulled together through the years. Most of them are sourced
    from MSDN, various websites, and books. I made changes to some of them as was
    required for the environment I was working in, but I’ve often noticed that many
    DBAs query the data the same way to gather the same pertinent information.


    Common Performance-Tuning Queries


    Performance tuning is an area that many have found more difficult to master in
    SQL Server than they might have in other database platforms. The DMVs covered
    in this section represent an incredible leap in the direction of performance control,
    understanding, and reporting that the SQL Server DBA didn’t have access to in
    earlier days.


    Because performance tuning is my niche, the *exec* DMVs are by far my favorite
    area of the featured DMVs. This section covers how to locate connection, session,
    and status information, and then moves on to actual query stats and performance
    metrics.


    Retrieving Connection Information


    Query the sys.dm_exec_connections view to retrieve information about connections
    to the database. Table 4-1 lists the most commonly used columns in the view.


    ***Table 4-1.** Columns commonly used by dm_exec_connections.*


    **Column**


    **Data Retrieved**


    session_ID


    Identifying ID (must be an integer) for the session


    connect_time


    Timestamp showing when the connection was established


    client_net_address


    Host address, can be an Internet Protocol (IP), only used for


    the Transmission Control Protocol (TCP) transport provider


    established.


    ![Image 38](index-86_1.png)


    chapter 4 ■ Dynamic management Views


    last_read


    Timestamp showing when the last read occurred


    last_write


    Timestamp showing when the last write occurred


    auth_scheme


    States whether SQL Server or Windows Authentication is being


    used


    most_recent_sql_handle


    As stated, it’s the most recent SQL_HANDLE executed


    Following is an example query against the view. The query returns a list of current
    connections to the instance.


    SELECT session_id,


    connect_time,


    client_net_address,


    last_read,


    last_write,


    auth_scheme,


    most_recent_sql_handle


    FROM sys.dm_exec_connections


    Figure 4-2 shows my output from this query.


    ***Figure 4-2.** Example output showing currently connected sessions.*


    Showing Currently Executing Requests


    For the dm_exec_requests DMV, the results show information about each of the requests
    executing in SQL


    Server at any given time. The results from this view will appear very similar
    to the sp_who view of years gone by, but the DBA should not underestimate the
    added value of this DMV.


    Table 4-2 lists columns commonly used in this view.


    ***Table 4-2.** Columns commonly used by dm_exec_requests.*


    **Column**


    **Data Retrieved**


    session_id


    The identifier for the session


    start_time


    Timestamp showing when the request arrived—not to be confused with login


    time.


    chapter 4 ■ Dynamic management Views


    status


    Request status, which can be any of the following:


    Background


    Running


    Runnable


    Sleeping


    Suspended


    command


    Identifies the type of statement (for example, DML or DDL type, including


    SELECT, INSERT, BACKUP, DBCC, and so forth)


    sql_handle


    The hash map identified for the SQL text


    user_id


    Identifies the user requesting the session


    blocking_session_id


    Blocking session ID, if one exists


    wait_type


    Blocking session wait type, which is a short 2-3 word definition of the type of


    wait occurring.


    wait_time


    Blocking session wait time


    wait_resource'
