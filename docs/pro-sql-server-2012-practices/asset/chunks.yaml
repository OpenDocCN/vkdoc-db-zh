    worth it.


    CHAPTER 8 ■ RElEAsE MAnAgEMEnT


    Rollback Process


    Just as you are preparing a process to ensure that your changes occur cleanly,
    you must be prepared to roll back your changes. Each time that you produce a change,
    ensure that you have created the proper scripts that will allow you to roll back
    those changes. You can rely on snapshots prior to a release, version-controlled
    objects, scripts generated, database backups, among other options.


    You may implement a drop command that removes objects that you will be releasing.
    As mentioned earlier, you can use SMO and PowerShell to generate scripts of objects.
    You will also notice on most windows in SQL Server Management Studio (SSMS) that
    you can click on a scripting menu to generate a script of various objects, changes,
    and so on. You can generate these scripts on the fly via SSMS, and then save them
    as potential rollback scripts. You might need to create a script that adds or
    removes data. You must always be prepared to quickly recover your system to a
    state prior to the beginning of your release process execution.


    Even if the change you are to introduce is one that “shouldn’t affect anything,”
    you should still create a rollback process. This means always, no matter how small
    of a change! You should accompany *any* change with a rollback process. Realize
    that you might need to involve other individuals in the creation of the process,
    or it could simply be you alone. Either way, be involved to ensure that it gets
    done. Before the release is the best time to have a cool head and plan appropriately.
    During the stress of a failed release, when your brain is inevitably compromised
    with emotion, you will be less likely to create a clean and graceful rollback.
    Do it when your head is clear, when you have the time to interact and get answers
    to the many questions you might have. I know from experience that in the heat
    of the moment, it seems that my brain seems less able to think clearly.


    Documents


    Remembering that the goal is to create a balanced process that will allow you
    to create releases in a controlled fashion and without incident, we will now go
    over several documents that you can create and use to reach that goal. These documents
    will help you with the release process, as well as help you keep track of where
    you are within the process. Some of these documents will be templates that will
    quicken your steps to creating a release.


    •


    Release notes


    •


    Release plan template


    •


    Release plan(s)


    At a basic level, it is a good idea to keep a simple record of each requested
    change that is made, and keep a list of tasks associated with your release management
    process as they are accomplished. Keeping track of these tasks, and the dates
    performed or reperformed, will allow you to measure the success of the actual
    release. Collecting this information will help with future releases as well as
    help fine-tune your release management tasks. Allowing your process to change
    and refine will ensure that you create a successful release management process,
    filled with appropriate tasks.


    Two documents that will help out are a release notes document and actual release
    plan documents.


    The release notes will be a single document that contains summary information
    about each release, and the tasks associated with said releases. Dates and other
    information will be gathered and saved within this document to help you plan better
    for each new release. The actual release plan documents will be created, filled
    out, tested, and ultimately performed, releasing change to your production environment.
    As each release is performed, keep track of these pieces of information for future
    review. As your steps within your release management process change, update future
    versions of your release plan. It’s a good idea to have a template of this release
    plan on hand, which will receive any changes as you see fit to update it. This
    207


    ![Image 102](index-216_1.png)


    CHAPTER 8 ■ RElEAsE MAnAgEMEnT


    template will help you in the creation of each release plan by providing a starting
    point with much of the information already filled in.


    Release Notes


    Keep a record of each release request. Keep a record of each date associated with
    each task you have performed. As you perform a release, and the next release,
    and the next, you will soon have a document with quite the collection of information.
    You can use this information to not only remember past releases, but review how
    they were performed, how many steps were repeated, what steps had a tough time,
    what steps were not as useful, and even holes in your process where steps are
    missing. Keeping track of where you are in the process as you prepare to release
    each change will also be made easy as you keep accurate information in these release
    notes.


    An easy way to accomplish this task is to start an Excel document, similar to
    that shown in Figure 8-3.


    This document can continue to grow with each change request that comes in, and
    will help you keep track of each one along with its tasks.


    ***Figure 8-3.** Release notes sample document*


    The information that you can keep track of within these release notes will contain
    information, tasks, and dates. For example:


    •


    Release name


    •


    Release plan (reference to this document)


    •


    Dates released to various environments


    •


    Initial release plan requested


    •


    Receive and review answers


    CHAPTER 8 ■ RElEAsE MAnAgEMEnT


    •


    Review code


    •


    Review release


    •


    Hand off


    •


    Release plan created


    •


    Release plan review


    •


    Rollback procedures


    •


    Release plan testing


    •


    Performing the release


    Release Name


    A release name will be associated with each release. How you name each release
    will be up to you, but keep in mind that a unique naming convention will assist
    in keeping track of each individual release.


    Release Plan


    You should create a document that contains all information and steps to perform
    the actual release. You will refer to this document as a *release plan*. Within
    your release notes, keep a link or reference to this release plan. While you are
    in the midst of preparing and performing a release, this information will be at
    your fingertips. When the release has been completed and some time has passed,
    having this reference will be valuable for your future releases.


    Dates Released to Various Environments


    Keep track of the dates that the release has been executed in each of your environments.
    Performing these in order is vital, and keeping track of each of these executions
    as they occur in the proper order will also help you keep your process in order.
    Ensure that you do not leapfrog your ordered environments by skipping to another
    environment before its proper time.


    Initial Release Plan Requested


    When a change has been requested, log this date in your release notes as the initial
    date that the release was requested. This will become your starting point. The
    end goal will be a successful release. You might never release it, which is fine.
    Keeping track of these dates will help you keep organized and follow your process.
    When you have received a request for change, at this point you can use a template
    to create a release plan and start to populate it with the information you are
    collecting and creating.


    Receive and Review Answers


    As you prepare the release plan document and fill it with information, and as
    you review the code that is proposed for change, you will inevitably have questions
    that need answering. This iterative process can involve many cycles before you
    and the others involved are satisfied. Allow this cycle to occur, and continue
    to seek out answers to your questions. Keep track as you traverse each of the
    iterations, noting the dates associated with the receipt of answers.


    CHAPTER 8 ■ RElEAsE MAnAgEMEnT


