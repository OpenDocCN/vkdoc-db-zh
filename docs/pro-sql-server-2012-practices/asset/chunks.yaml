    n ABOUT THE AUTHORS


     **Jes Borland** is a consultant with Brent Ozar PLF and a Microsoft SQL Server
    MVP. She holds an AAS -


    Programmer/Analyst degree and loves SQL Server Reporting Services and day-to-day
    administration. She is an active member of PASS, a user-group founder, a Tech
    on Tap brewmaster, and a LessThanDot.com blogger. She’s a frequent presenter at
    user groups, SQL Saturdays, and other community events. She is also an avid runner
    and novice chef.


     **Carlos Bossy** (MCTS, MCP SQL Server 2008 BI, CBIP) is a consultant with


    25 years of experience in software and database development. As the


    Principal of his company, Carlos focuses on the development of Business


    Intelligence solutions, including data warehouses, predictive analytics,


    integration, and reporting. He has worked with SQL Server for 12 years and


    is very enthusiastic about its powerful features. Carlos has developed data


    warehouses and BI solutions for a variety of industries and state agencies


    and is a frequent speaker at SQL Server events.


     **Louis Davidson** has been in the IT industry for what is starting to seem
    like a really long time as a corporate database developer and architect. He has
    been a


    Microsoft MVP for 9 years and has written five books on database design for


    Apress, including *Pro SQL Server 2012 Relational Database Design and*


    *Implementation* (2012). Louis has been active speaking on the topic of of


    database design and implementation at many conferences over the past ten


    years, including SQL PASS, SQL Rally, SQL Saturday events, and CA World, as


    well as the Devlink developer conference. Louis has worked for the Christian


    Broadcasting Network as a developer, DBA, and Data Architect supporting


    offices in Virginia Beach, Virginia, and Nashville, Tennessee for over 14 years.


    Despite what his website at drsql.org implies, Louis has a bachelor’s degree


    from the University of Tennessee at Chattanooga in computer science.


     **Ben DeBow** is a consultant who works with customers of all sizes on their


    mission-critical applications and SQL Server deployments. His versatility


    allows him to assist with everything from virtualization and consolidation to


    schema design, performance tuning, and disk architectures. He has tuned


    and deployed some of the largest and most complex SQL Server solutions in


    the world. An active member of the SQL Server community, Ben is also an


    MCDBA, MCSE, and MCITP. He is also the co-founder of SQLHA with Allan


    Hirt, and can be r[eached at http://www.sqlha.com.](http://www.sqlha.com)


     **Grant Fritchey** works for Red Gate Software—a market–leading, software-tools
    vendor—as its product evangelist. He has done development of large-scale applications
    in languages such as VB, C#, and Java; and he has worked in SQL Server since version
    6.0\. In addition, he has worked in insurance, finance, and consulting, as well
    as for three failed dot coms. He is the author of *SQL Server Execution Plans*
    (Simple Talk Publishing, 2008) and *SQL Server 2012 Query Performance Tuning*
    (Apress, 2012). Grant is a co-author of *Beginning SQL Server 2012 Administration*
    (Apress, 2012) and has one chapter in *SQL Server MVP Deep* *Dives Volume* *2*
    (Manning Publications, 2011).


