    ## 第 11 章 ■ SQL Server 数据移动的流体动力学


    ### 辅助副本


    辅助副本可以配置为供用户和应用程序进行只读访问。它们也可用于执行某些备份操作。


    其限制如下：


    *   可用性组是企业版功能。

    *   它们需要用于通信的端点。

    *   可用性组不能用于服务器实例级别的保护。


    ### 将可用性组应用于场景


    您可以将可用性组应用于我们的四个场景，如下所示：


    **场景 1：全球化组织**

    可用性组可用于使特定办公室连接到数据库的只读辅助副本。然而，由于数据请求和交付所需的时间，在任何分布式场景中仍可能存在显著的延迟问题。可以将此场景想象为在芝加哥有三份数据副本，但每个人仍然必须连接到芝加哥才能访问数据。在网络基础设施较差的国家，可用性组对有问题的访问毫无帮助。


    **场景 2：高容量报告需求**

    这是使用可用性组的一个可能案例。允许报告工具连接到特定的辅助数据库可以缓解数据库争用，但这可能会影响该副本满足特定`RTO`和`RPO`需求的能力。但是，如果数据检索需要单独的索引策略，则不受支持。


    **场景 3：夜间处理作业**

    这是使用可用性组的另一个可能案例。可以将备份过程指向辅助数据库，以进行完整（仅复制）和事务日志备份，而处理操作继续在主数据库上进行。不支持在辅助数据库上进行差异备份。有关在辅助副本上备份支持的完整信息，请参见此处：`http://msdn.microsoft.com/en-us/library/hh245119.aspx`。


    **场景 4：硬件故障**

    可用性组可用于在此情况下进行故障转移。与镜像非常相似，当检测到主副本出现问题时，可以故障转移到某个辅助副本。与镜像不同，如果您配置了监听器名称并且您的应用程序使用了正确的客户端工具，则无需手动干预来重定向您的应用程序。如果您想要最高级别的保护，可以将可用性组与`FCI`结合使用。


    ### 故障转移群集


    SQL Server 可以作为群集实例安装，该实例运行在 Windows Server 故障转移群集之上（如图 11-5 所示）。由于底层 Windows
    群集功能的工作方式，它提供实例级别的保护并能自动故障转移到另一个节点。`FCI` 并非提供数据冗余副本的解决方案；对于 `FCI` 中的数据库，只有一份数据副本。数据库随后存储在共享存储解决方案上，例如存储区域网络
    (`SAN`)。


    ![Image 139](img/index-292_1.png)


    *图 11-5. AlwaysOn 故障转移群集。*


    故障转移可能发生在各种情况下，但两种最常见的情况是服务或硬件故障以及仲裁丢失。服务故障和硬件问题相当明显：服务或硬件发生致命故障且无法恢复。仲裁丢失可能更令人困惑，但归结起来是回答这个问题：群集中的大多数服务器是否实际在运行？如果答案是肯定的，群集继续运行。如果答案是否定的，整个群集可能脱机。这当然不是理想状态，您的群集配置应考虑仲裁丢失的情况。


    故障转移群集的好处包括：


    *   对于高可用性而言，故障转移群集是 SQL Server 提供的最佳功能之一。

    *   SQL Server 2012 中的故障转移群集支持 `WSFC` 的多子网功能。

    '
- fmt: '# Chapter 11: The Fluid Dynamics of SQL Server Data Movement


    and does not require a virtual local area network (VLAN) like in previous versions.


    *   The entire SQL Server instance is protected in event of a hardware or service
    failure.

    *   You get fast and automatic failover from the use of shared storage.


    The limitations are as follows:


    *   Additional hardware resources are needed for multiple nodes.

    *   You need to work closely with other teams—such as teams working with storage,
    security, and network—to configure and support the Windows Server Failover Cluster.

    *   Loss of quorum in a `WSFC` can result in everything going down, which would
    then require manual intervention.


    Following are some examples of how failover clustering might be applied in our
    four scenarios:


    ## SCENARIO 1: Global Organization


    An `FCI` is intended for recovery from a hardware failure, so it will not cover
    a globally dispersed scenario. Although you can span multiple data centers with
    an `FCI` configuration, it still does not provide the data redundancy. The data
    redundancy needed to be able to switch between data centers underneath the cluster
    is provided by a storage-based solution.


    ## SCENARIO 2: High-Volume Reporting Needs


    An `FCI` is intended for recovery from a hardware failure. It provides no redundancy
    of data. An `FCI` can house a reporting database, but typical methods to make
    it scale need to be employed.


    ## SCENARIO 3: Overnight Processing Jobs


    Similar to Scenario 2, an `FCI` can be used for batch processing, but it would
    be a database in an instance—nothing more, nothing less.


    ## SCENARIO 4: Hardware Failure


    Install `SQL Server` on a Windows Server Failover Cluster to provide immediate
    failover in this situation.


    # Custom ETL Using SQL Server Integration Services


    `SQL Server Integration Services (SSIS)` is an incredibly powerful tool in the
    `SQL Server` stack, allowing for the utmost flexibility in creating processes
    for moving or copying data from one source to another.


    Commonly called *ETL processing* (`Extract`, `Transform`, `Load`), `SSIS` is most
    often used for loading data warehouses. Through the use of custom control-flow
    and data-flow tasks, any data source can be copied or moved to another location.
    Business logic can also be used to limit or change the data in any way needed.


    If you have ever used the `Data Import/Export Wizard` in `SQL Server Management
    Studio` and saved the package at the end, you have created an `SSIS` package.
    The interface for working with `SSIS` is either `Microsoft Visual Studio` or `Business
    Intelligence Development Studio (BIDS)`, a lighter weight version of `Visual Studio`.
    By using a single control flow that can branch out into multiple data-flow tasks,
    you take a dataset from its original format and location, massage the data to
    get it to look the way it needs to, and then save it in a new location.


    The benefits are that `Integration Services` does the following:


    *   Provides for the highest level of customization.

    *   Incorporates business logic if needed.

    *   Allows secondary databases to be made available for use.


    Its limitations are these:


    *   You must rely on manual scheduling for execution.

    *   `Integration Services` might require extended development resources for design,
    coding, and testing.

    *   No troubleshooting or maintenance tools are included.


    Following are ways you can apply custom `ETL` solutions developed using `Integration
    Services` to our four scenarios:


    ## SCENARIO 1: Global Organization


    Creating a customized `ETL` for global distribution can be a tedious project.
    If your satellite offices require only copies of the data, or subsets of the data,
    replication is likely a better option. However, if your offices need data that
    is based on the data at the primary location, but not the raw data itself, an
    `SSIS` project might be worthwhile.


    ## SCENARIO 2: High-Volume Reporting Needs


    Depending on the types of reports being run, you might want to create aggregate
    tables in a separate data warehouse.'
