    在本章的初始示例中，高效选项从表中读取了 5 个页，而低效选项读取了超过 300 个页。这个差异足以引起调查。然而，如果高效选项读取了 100 个页，而低效选项读取了
    108 个页，那么花费时间去解决这个问题就不是特别值得。你可以在其他地方找到更大的改进点。


    ## 如何发现和解决索引查找效率问题？


    第一步当然是找出存在这些问题的查询。最简单的方法可能是作为常规性能调优的一部分。使用 SQL Profiler 或扩展事件会话捕获工作负载，分析其中执行过多读取的查询，并在分析过程中查看它们是否具有低效的索引查找。


    解决方案取决于具体是什么导致了低效的查找。


    如果问题是索引内的列顺序，解决方案是更改索引中列的顺序，或创建另一个索引来完全支持该查询。哪种选项最佳（实际上，是否任何一种可取）取决于针对该表运行的其他查询、发生的数据修改量、查询的重要性以及它实际低效到什么程度。不幸的是，关于索引更改的完整讨论超出了本章的范围。


    如果低效查找的原因是对列应用了函数，则解决起来容易得多。只需移除该函数。


    好吧，也许没那么简单。这取决于该函数的功能，看它是否可以移除或更改。


    在某些情况下，你可以对变量、参数或字面量而不是列应用函数，以获得相同的结果。下面是一个例子：


    `WHERE Subtotal * 1.14 >= @MinimumDiscount`


    执行计划如图 3-12 所示。


    ![Image 21](img/index-65_1.png)


    chapter 3 ■ hidden performance Gotchas


    Figure 3-12. 由 WHERE 子句中列上的函数导致的扫描。


    应用于列的乘法意味着无法对 `Subtotal` 上的任何索引使用索引查找。如果 WHERE 子句中还有另一个谓词，SQL 可能能够基于该谓词进行查找，并对
    `Subtotal` 应用二级过滤器。否则，查询就必须作为带二级过滤器的索引扫描来执行。


    基础代数告诉你，表达式 `x*y >= z` 与 `x >= z/y` 完全等价（除非 `y` 为零），因此你可以将该 WHERE 子句改写如下：


    `WHERE Subtotal >= (@MinimumDiscount/1.14)`


    这个例子不像第一个那么直观，但它更高效，如图 3-13 所示。


    ![Image 22](img/index-66_1.png)


    chapter 3 ■ hidden performance Gotchas


    Figure 3-13. 更改函数计算位置导致索引查找。


    另一个常见情况是日期函数，特别是当日期在数据库中与其时间一起存储，而查询需要获取特定日期的所有行时。经常会看到像这样的查询：`WHERE CAST(OrderDate
    AS DATE) = @SpecificDate`


    转换为 DATE 消除了日期时间值的时间部分，因此与日期的比较返回该日的所有行。然而，这不是一种特别高效的方法，如图 3-14 所示。


    ![Image 23](img/index-67_1.png)


    chapter 3 ■ hidden performance Gotchas


    Figure 3-14. 将列转换为 DATE 导致扫描。


    相反，可以重写查询以使用不等式谓词并搜索特定日期的时间范围，如下所示：


    `WHERE OrderDate >= @SpecificDate and OrderDate < DATEADD(dd,1,@SpecificDate)`


    我不使用 BETWEEN，因为 BETWEEN 在两侧都是包含性的，并且如果不需要 `OrderDate` 为次日午夜的行，则需要稍微复杂的日期操作。


    这种形式的 WHERE 子句更复杂，但也更高效，如图 3-15 所示。


    ![Image 24](img/index-68_1.png)


    chapter 3 ■ hidden performance Gotchas


    Figure 3-15. 列上无函数；因此使用了查找。


    第三种情况是不必要的字符串函数。我经常看到这样的代码：


    `WHERE UPPER(LTRIM(RTRIM(LastName))) = ''SMITH''`


    除非数据库运行的是区分大小写的排序规则，否则 `UPPER` 是不必要的（我经常在大小写不敏感的数据库中看到这个）。`RTRIM` 是不必要的，因为 SQL
    在比较字符串时会忽略尾随空格。因此，在 SQL 进行字符串比较时，''abc'' 等于 ''abc''。否则，它如何比较 `CHAR(4)` 和 `CHAR(10)`？如果已知数据库中有混乱数据，`LTRIM`
    可能有用。我在这里的偏好是确保插入和加载始终删除可能潜入的任何前导空格。


    那么检索数据的查询就不需要担心前导空格，因此也不需要使用 `LTRIM`。


    隐式转换可能是最容易解决的问题（尽管通常是较难发现的问题之一）。这主要是确保参数和变量与列类型匹配；必要时显式转换字面量、变量或参数；并确保前端应用程序在使用动态或参数化
    SQL 语句时传递正确的类型。


    这里一个常见的罪魁祸首是 JDBC（Java 数据访问库），它默认将字符串作为 `nvarchar` 发送，无论它们实际是什么。在处理这种情况时，有时你可能需要将列的数据类型更改为
    `nvarchar`，以避免隐式转换，前提是应用程序无法更改。一些 ORM 工具也表现出相同的默认行为。


    ![Image 25](img/index-69_1.png)


    chapter 3 ■ hidden performance Gotchas


    ## 索引查找不总是高效的


    我在此讨论的一个含义需要特别注意：并非所有的索引查找都是相等的，仅仅在查询的执行计划中存在索引查找并不能保证该查询是高效的。


    我记得之前在某个 SQL 论坛上的一次讨论，有人问如何消除他查询执行计划中的聚集索引扫描。该查询的相关部分类似于：


    `WHERE CAST(OrderDate AS DATE) = @SpecificDate`


    如前所述，优化该查询的方法是从列上移除函数，将 WHERE 子句改为使用 `BETWEEN` 或 `>=` 和 `<` 运算符，并确保存在合适的索引在 `OrderDate`
    列上以支持查询。有人发布的解决方案是在 WHERE 子句中添加第二个谓词，具体来说是在主键列（是一个整数，具有标识属性，默认种子和增量，因此始终大于 0）上使用不等式谓词，如下所示：


    `WHERE CAST(OrderDate AS DATE) = @SpecificDate AND OrderID > 0`


    这达到了期望的目标吗？图 3-16 有部分答案。


    Figure 3-16. 聚集索引查找。


    它似乎达到了期望的目标，因为现在有一个聚集索引查找。但那个查找实际在做什么？见图 3-17。


    ![Image 26](img/index-70_1.png)


    chapter 3 ■ hidden performance Gotchas


    Figure 3-17. 效率非常低的聚集索引查找。


    查找谓词 `OrderID > 0` 匹配了表中的每一行。它没有消除任何内容。

