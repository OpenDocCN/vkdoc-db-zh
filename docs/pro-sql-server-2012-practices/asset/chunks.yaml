    ## 分析性能监视器数据


    你可能会看到这样的陈述：“SQL Server 的 CPU 平均使用率为 25%，系统健康且容量充足。”如今的系统和应用程序非常复杂，不能仅凭处理器利用率这类单一指标来衡量。`%
    Processor Time`计数器只是你作为此项工作一部分收集数据的众多对象计数器之一。每个对象计数器都很重要，它们共同讲述着故事的不同部分。一个平均使用率为
    25%的系统，可能在其他方面存在问题，例如调度器压力，而如果你只看`% Processor Time`数据，可能会忽略它。


    在审查性能数据和梳理分析结果时，有几个重要规则需要遵循：


    -   分析数据时，只依据事实，而非假设。假设常常会将人引向错误的方向。

    -   进行恰当的根因分析。很多时候，分析数据的人尚未理解真正的问题所在，就已确定了问题的原因。相反，分析者基于可能具有误导性的间接证据得出自己的观点。这就好比说，“窗户破的时候约翰尼在后院，所以一定是他干的。”

    -   一些对象计数器可以单独审查，但大多数对象计数器需要与其他相关计数器一起审查。包含事务日志的磁盘 I/O 周期性增加，很可能是数据库检查点（checkpoint）操作的结果。如果同时审查这两个计数器，你就可以关联这些事件。


    ![Image 210](img/index-454_1.png)


    第 18 章 ■ 针对峰值负载进行调优


    分析性能数据对一些`DBA`来说可能是一次令人沮丧的经历，因为`SQL Server`的性能指标只占可用和/或捕获的整体对象计数器的很小一部分。如前所述，这正是团队其他成员发挥作用的地方，因为每个人都将分析其负责的系统领域。这使得每个人都能关联数据点。一个孤立分析的特定数据点可能看起来很糟糕，但当你将它与所有其他信息结合起来时，其情况可能比你原先认为的更好或更糟。


    一个例子是，当某个`SQL Server`实例的`Max Server Memory`数据被设置为一个很大的固定值，以至于实际上剥夺了`Windows`所需的内存时。这在`SQL
    Server`内部可能并不明显，但`OS`级别的计数器显示`OS`中存在过度分页。当服务器管理员审查服务器对象计数器时，他可能知道系统上运行着`SQL Server`，但不知道`SQL
    Server`的内部内存设置高到足以引起这样的问题。只有当两位管理员相互交流时，他才会发现存在不匹配。这就是为什么团队内部的沟通至关重要，尤其是在审查性能数据时。现实情况是，许多非`DBA`并不理解`SQL
    Server`的工作原理。确保你充分解释在`SQL Server`中看到的情况，这将有助于团队中的其他人建立他们原本不会建立的关联。


    如果你是一位热爱学习的`DBA`，请将峰值负载作为学习如何分析`Perfmon`数据的绝佳机会。网上有大量关于`Perfmon`的信息，讨论对象计数器和所有推荐的阈值。还有一些很棒的工具可以帮助你分析收集到的数据，并且有专门为`SQL
    Server`设计的模板。其中之一是日志性能分析工具（`PAL`），你可以在 `http://pal.codeplex.com/` 找到它。你可以使用此工具，配合`SQL
    Server`特定的阈值来分析`Perfmon`文件。在你回答了一些关于服务器的问题后，`PAL`会分析`Perfmon`文件，生成报告，并概述所有需要审查的对象计数器。图
    18-10 显示了`PAL`报告中的一个输出样例。


    ***图 18-10.** `PAL`报告样例的概览视图。*


    `PAL`将较大的`Perfmon`数据捕获分解为较小的时间切片，以便数据能更好地反映该特定时间窗口内的性能。例如，如果`PLE`的平均值是在 48 小时内计算的，它可能包含了由于重新索引过程导致缓冲区压力更大的时段。对于每个时间切片，会评估每个对象计数器的最小值、最大值和平均值，以确定它们是否在可接受的范围内。如果计数器超出此范围，`PAL`会以黄色突出显示警告，以红色突出显示严重问题。该状况显示为一个超链接，指向支持性详细信息，如图
    18-11 所示。图表上方是相应对象计数器的详细描述，这非常具有参考价值，尤其对于不熟悉`Perfmon`数据的`DBA`。


    ![Image 211](img/index-455_1.png)


    第 18 章 ■ 针对峰值负载进行调优


    ***图 18-11.** `Batch Requests/sec`的支持性详细信息。*


    如图 18-11 所示，如果排除前 30%的异常值并计算标准差，则会提供额外的分析。图 18-10 中的数据点反映了特定时间内的平均值，但你看不到数据的趋势。查看图
    18-11 中的图表视图能让你更好地观察数据。正如你在`Performance Monitor`中分析`Perfmon`文件时会看到的，图表视图比报告视图更容易看出数据趋势。


    `PAL`是快速审查大型`Perfmon`文件的绝佳工具，但它不会关联独立的对象计数器，而如前所述，这是分析复杂系统性能过程中的重要一环。这正是使用二进制格式（`BLG`）的`Perfmon`文件发挥作用的地方。你可以在`Performance
    Monitor`中以几种不同的格式查看`BLG`文件，但我会带你了解其中两种格式：折线图视图和报告视图。折线图视图以图形格式显示数据，更容易关联数据并查看数据趋势。报告视图仅列出数值，更容易查看数值并与阈值进行比较。在你为示例税务应用程序分析性能数据时，将逐步体验这两种格式。


    图 18-12 显示了一个运行了七天的系统的报告视图。默认情况下，`Perfmon`显示所有值的平均值。在此视图中，很容易看出`F`驱动器的`Avg. Disk
    sec/Read`值在七天内的平均值为`.043`。


    ![Image 212](img/index-456_1.png)


    ![Image 213](img/index-456_2.png)


    第 18 章 ■ 针对峰值负载进行调优


    ***图 18-12.** `Performance Monitor`中针对逻辑磁盘计数器进行七天捕获的报告视图。*

