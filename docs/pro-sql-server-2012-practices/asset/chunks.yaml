    \ `Free_Drive_Space` 表中以供历史参考，还可以插入到当前健康状况表 `Daily_Report` 中。\n\n```sql\nUSE [dbUtilities]\n\
    \nGO\n\nCREATE PROCEDURE [dbo].[Get_Drive_Space_Free]\nAS\nDECLARE @driveSpace\
    \ TABLE (drive CHAR(2), MBFree int)\n\nINSERT INTO @driveSpace\nEXEC sp_executesql\
    \ N'xp_fixeddrives'\n\nINSERT INTO [dbUtilities].[dbo].[Daily_Report]\nSELECT\
    \ 'Drive Space', GETDATE(), 'Free space on ' + drive + \n    ' is ' + CONVERT\
