    # 第 18 章 ■ 峰值负载调优


    ## 分析应用使用情况数据


    至此，您已经收集了大量数据，可能包括拓扑图、服务器和应用的配置信息、来自 `SQL Server` 的运行时数据，以及来自网络、服务器和应用的性能数据。这些信息代表了环境的当前状态，您需要自上而下地进行分析，以充分理解应用程序并确定与业务目标相关的、需要解决的潜在领域。


    您要求业务部门提供的一个重要问题是关于需要扩展的核心业务事务的使用情况和性能指标。这些使用数据与系统指标相结合，为您提供了关于系统当前所处状态的有价值洞察。这一点很重要，因为如果您不知道系统当前的状态（以及最近所处的状态），就无法为未来进行规划。说到底，这是一项容量规划工作。


    这项特定容量规划工作的目标是在脑海中构建出应用程序的图景，以充分理解配置选项、流程和事件时机的原因、时间、内容和地点。您需要了解这些信息，才能确定在特定配置下，应用程序能够支持多少业务事务。


    图 18-7 展示了一个从第三方监控工具收集性能数据的示例。它显示了为期两个月内每日的累计请求数和响应时间。延迟（以 `ms` 为单位）显示在左侧轴上，请求总数显示在右侧轴上，而阴影区域则显示了主机、网络、安全套接层
    (`SSL`)、空闲和请求的总延迟或响应时间。虚线代表当天的请求总数。在图表顶部，您可以切换显示以查看 `X 百分位数`。此数据不包含每个核心业务事务的使用情况和性能数据，但它让您对应用调用虚拟
    IP (`VIP`) 到 `VIP` 的往返时间有了一个整体的了解。


    如果您无法访问能够检查所有应用调用的更先进且昂贵的监控工具，也有替代方案。大多数替代方案通常需要您发挥创意，使用您已拥有的原生工具（以及可能的开源实用程序）。如前所述，`Extended
    Events` 可以创建应用程序配置文件，但它也可用于捕获长期性能数据。您可以使用捕获到的原始性能数据在 `Microsoft Excel`（或另一个能处理数据的工具）中创建图表，如图
    18-7 所示。挑战在于如何在应用层捕获额外数据，以便您能看到全局情况。如果您只有数据库的性能数字，在最终用户打电话抱怨性能问题之前，您可能不会意识到应用程序存在问题。


    `图 18-7` 为期两个月的所有应用调用性能数据，按天汇总。


    ![Image 208](img/index-451_1.png)


    `表 18-7` 中的观察结果代表了 `图 18-7` 的高层分析。从这些观察中，您可以确定每月事务增长的速度，看到响应时间的大幅增加，并识别可能在周末发生的潜在性能问题。


    `表 18-7` 与 `图 18-7` 所示数据相关的观察结果。


    | `观察结果` | `说明` |

    | :--- | :--- |

    | 第一个月的总体平均延迟为 `76 ms`，最近一个月平均增加到 `125 ms`。 | 平均响应时间逐月增长了 `40%`。需审查额外的历史数据以确定响应时间的长期变化，特别是考虑到
    `40%` 的变化是剧烈的。 |

    | 请求总数峰值达到 `130 万` | 请求总数增加了 `30 万`

