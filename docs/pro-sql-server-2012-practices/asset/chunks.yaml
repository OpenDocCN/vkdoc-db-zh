- fmt: '# Chapter 2 ■ Getting it Right: Designing the Database for Performance


    `Class` (in this case, the type of class) and `Trainer` are related, and a class
    might have multiple trainers.

    `Book` and `Class` are related, and a book might be used for multiple classes.

    `Trainer` and `Book` are not directly related, because the rule stated that the
    class uses a specific book.


    Hence, regardless of how correct the table initially seemed, what you really have
    here are two independent types of information being represented in a single table.
    To deal with this, you will split the table on the column that is common to the
    two dependent relationships. Take this one table and make two tables that express
    the data that was in the first table:


    `Class` `Trainer`

    --------------- --------------

    Normalization Louis

    Normalization Chuck

    Implementation Fred

    Golf Fred


    `Class` `Book`

    -------------- --------------------------

    Normalization DB Design & Implementation

    Implementation DB Design & Implementation

    Golf Topics for the Non-Technical


    Joining these two tables together on `Class`, you will find that you get the exact
    same table as before.


    However, if you change the book for the `Normalization` class, it will be changed
    immediately for both of the classes that are being taught by the different teachers.
    Note that initially it seems like you have more data because you have more rows
    and more tables. However, notice the redundancy in the following data from the
    original design:


    Louis Normalization DB Design & Implementation

    Chuck Normalization DB Design & Implementation


    The redundancy comes from stating twice that the book `DB Design & Implementation`
    is used for the `Normalization` class. The new design conveys that same information
    with one less row of data. When the system grows to the point of having 50 `Normalization`
    classes being taught, you will have much less data, making the storage of data
    more efficient, possibly creating some performance benefits, and reducing the
    amount of redundant data that can get out of sync.


    Note, too, that if the table was modeling an instance of the class, the key would
    be `class`, `time`, `location`, and the `teacher` and `book` would be simply columns.
    (This assumes a class can have only one teacher and classroom; otherwise, you
    end up with more multivalued dependencies.) Most of these conditions are caught
    during testing, but not always.


    As an alternate situation, consider the following table of data, which might be
    part of the car rental system that I used in the initial example before. This
    table defines the brand of vehicles that the driver will drive:


    `Driver` `VehicleStyle` `VehicleBrand`

    ------------------- ---------------------------- -----------------------

    Louis Station Wagon Ford

    Louis Sedan Hyundai

    Ted Coupe Chevrolet


    `Driver` and `VehicleStyle` are related, representing the style the driver will
    drive.

    `Driver` and `VehicleBrand` are related, representing the brand of vehicle the
    driver will drive.


    `VehicleStyle` and `VehicleBrand` are related, defining the styles of vehicles
    the brand offers that can be rented.


    This table defines the types of vehicles that the driver will take. Each of the
    columns has a relationship to the other, so it properly represents a single thing
    only. As our final multiple-key example, consider the following key that is meant
    to represent book `Authors` and `Editors`:


    `Book` `Author` `Editor`

    ------------------- -------------------------- ----------------

    Design Louis Jonathan

    Design Jeff Leroy

    Golf Louis Steve

    Golf Fred Tony


    There are two possible interpretations that might be made somewhat clear by the
    name of the table (and the documentation as well):


    This key does not represent a singular value if it represents the following independent
    relationships:

    - The book `Design` has authors `Louis` and `Jeff`, and it has editors `Jonathan`
    and `Leroy`.

    - The book `Golf` has authors `Louis` and `Fred`, and it has editors `Steve` and
    `Tony`.


    The key does represent a singular value if it represents the following:

    - For the book `Design`, editor `Jonathan` edits `Louis`’ work and editor `Leroy`
    edits `Jeff`’ work.

    - For the book `Golf`, editor `Steve` edits `Louis`’ work and editor `Tony` edits
    `Fred`’ work.


    In the first case, the author and editor are independent of each other, meaning
    that, technically, you should have a table for the Book-to-Author relationship
    and another for the Book-to-Editor relationship. In the second case, the author
    and editor are directly related. Hence, all three of the values are required to
    express the single thought of “for book X, editor Y edits Z’s work.”


    Like in many cases we have discussed so far, the goal of this rule is to get the
    design right so that you don’t have to mess around with poorly formatted data.
    When the keys that you expect to represent a single value actually represent multiple
    values, your data gets messy and dealing with bad data is the single largest cause
    of poor performance on many levels. Of course, sometimes the performance issues
    arise only after you discover that your data is massively messed up and you have
    layered on tons of hacks to keep it in order.


    ## Physical Model Choices


    In this section, I will discuss a few of the physical model choices that can greatly
    affect the performance of your database system. Normalization gets you to the
    point of having the data structured in the correct way, but next you have to fine-tune
    the implementation details. In this section, I will talk about the following topics:


    ### Datatype


    Datatypes are often implemented as an afterthought. This is actually one of the
    more important choices you make, both for data-integrity purposes and in terms
    of performance.


    Choosing proper datatypes to match the domain chosen during logical modeling is
    an important task. One datatype might be more efficient than another of a similar
    type. For example, you can store integer data in an integer datatype, a numeric
    datatype, a floating-point datatype, or even a `varchar(10)` type, but these datatypes
    are certainly not alike in implementation or performance. Matching the datatype
    to the need is a large step in getting the data quality that will make your users
    happy with their database.


    Getting the datatype right is the first step in getting the implementation correct,
    so it can really help to spend a reasonable amount of time here making sure it
    is right. Too many databases end up with all datatypes the same size and nullable
    (except for primary keys, if they have them) and lose the integrity of having
    properly sized and constrained data storage.


    ### Constraints


    Protecting the integrity of the data might not have an immediate positive effect
    on the performance of your system, but not having to worry about the quality of
    the data pays tremendous benefits when the data is used.


    ### Indexing


    A database without indexes is probably unusable. (For starters, uniqueness constraints
    are implemented with indexes.) Getting the indexing right during design (and testing)
    can limit the amount of tuning you need to do once the cranky users get their
    hands on your code.


    One choice that I won’t talk about any more than I have already is primary key
    choice. Choosing to use natural key values or surrogates is not likely to kill
    your system’s performance as long as your choice is reasonable. Either approach
    has its own difficulties depending on how complex your natural key values are
    or what you choose for a surrogate value. I will touch on the indexing considerations
    in the indexing section, but as long as your indexes are optimum and your data
    is unique enough that the user doesn’t have to randomly choose between rows, any
    reasonable primary key choice is going to be just fine.'
