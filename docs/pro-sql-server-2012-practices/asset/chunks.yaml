  trans: '

    # 第 2 章 ■ 正确设计：为性能而优化的数据库设计


    `课程`（此处指课程类型）和`培训师`是相关联的，一门课程可能有多位培训师。

    `书籍`和`课程`是相关联的，一本书可能用于多门课程。

    `培训师`和`书籍`并不直接相关，因为规则规定的是课程使用特定的书籍。


    因此，无论初始表格看起来多么合理，这里你实际上拥有的是在单个表中表示的两种独立信息类型。为了处理这个问题，你需要根据两个依赖关系共有的列来拆分这个表。将这一个表拆成两个表，以表达原先表中的数据：


    `课程` `培训师`

    --------------- --------------

    范式化 路易斯

    范式化 查克

    实现 弗雷德

    高尔夫 弗雷德


    `课程` `书籍`

    -------------- --------------------------

    范式化 数据库设计与实现

    实现 数据库设计与实现

    高尔夫 非技术主题


    通过在`课程`上连接这两个表，你会发现得到的结果和之前的表完全一样。


    然而，如果你更改了`范式化`课程的书籍，那么所有由不同教师教授的`范式化`课程的书籍都会立即被更改。注意，最初看起来你拥有了更多数据，因为你有了更多的行和更多的表。但是，请注意原始设计中的以下数据存在冗余：


    路易斯 范式化 数据库设计与实现

    查克 范式化 数据库设计与实现


    这种冗余来源于重复声明了书籍`数据库设计与实现`被用于`范式化`课程。新设计用少一行数据传达了相同的信息。当系统发展到有 50 门`范式化`课程被教授时，你的数据量将大大减少，从而使数据存储更高效，可能带来一些性能优势，并减少可能不同步的冗余数据量。


    还需注意，如果该表是对课程实例进行建模，那么主键将是`课程`、`时间`、`地点`，而`教师`和`书籍`则只是普通的列。（这假设一门课程只能有一位教师和一间教室；否则，你最终会得到更多的多值依赖。）大多数这些情况会在测试中被发现，但并非总是如此。


    作为另一种情况，考虑下面的数据表，它可能是我最初示例中使用的汽车租赁系统的一部分。该表定义了驾驶员将驾驶的车辆品牌：


    `驾驶员` `车辆样式` `车辆品牌`

    ------------------- ---------------------------- -----------------------

    路易斯 旅行车 福特

    路易斯 轿车 现代

    泰德 轿跑车 雪佛兰


    `驾驶员`和`车辆样式`是相关的，代表驾驶员将驾驶的样式。

    `驾驶员`和`车辆品牌`是相关的，代表驾驶员将驾驶的车辆品牌。


    `车辆样式`和`车辆品牌`是相关的，定义了该品牌提供的可供租赁的车辆样式。


    该表定义了驾驶员将驾驶的车辆类型。每一列都与其他列有关联，因此它只适当地表示单一事物。作为我们最后一个多键示例，考虑以下旨在表示书籍`作者`和`编辑`的键：


    `书籍` `作者` `编辑`

    ------------------- -------------------------- ----------------

    设计 路易斯 乔纳森

    设计 杰夫 勒罗伊

    高尔夫 路易斯 史蒂夫

    高尔夫 弗雷德 托尼


    根据表名（以及文档）的不同，可能会做出两种可能的解释：


    如果它表示以下独立关系，则此键不代表单一值：

    - 书籍`设计`的作者是`路易斯`和`杰夫`，它的编辑是`乔纳森`和`勒罗伊`。

    - 书籍`高尔夫`的作者是`路易斯`和`弗雷德`，它的编辑是`史蒂夫`和`托尼`。


    如果它表示以下内容，则此键代表单一值：

    - 对于书籍`设计`，编辑`乔纳森`编辑`路易斯`的作品，编辑`勒罗伊`编辑`杰夫`的作品。

    - 对于书籍`高尔夫`，编辑`史蒂夫`编辑`路易斯`的作品，编辑`托尼`编辑`弗雷德`的作品。


    在第一种情况下，作者和编辑彼此独立，这意味着，严格来说，你应该有一个表来存储书籍与作者的关系，另一个表来存储书籍与编辑的关系。在第二种情况下，作者和编辑是直接相关的。因此，所有三个值都是必需的，以表达“对于书籍
    X，编辑 Y 编辑 Z 的作品”这一单一想法。


    就像我们到目前为止讨论过的许多情况一样，本规则的目标是正确设计，这样你就不必处理格式糟糕的数据。当你期望代表单一值的键实际上代表多个值时，你的数据会变得混乱，而处理糟糕的数据是许多层面性能低下的最主要原因。当然，有时性能问题只有在你发现数据已经大规模混乱，并且你已经添加了大量补救措施来维持其秩序时才会出现。


    ## 物理模型选择


    在本节中，我将讨论几种可能极大地影响数据库系统性能的物理模型选择。规范化使你达到数据以正确方式组织的阶段，但接下来你必须微调实现细节。在本节中，我将讨论以下主题：


    ### 数据类型


    数据类型常常被当作事后才考虑的事情。这实际上是更重要的选择之一，无论对于数据完整性目的还是性能方面都是如此。


    选择与逻辑建模期间所选领域相匹配的适当数据类型是一项重要任务。一种数据类型可能比类似类型的另一种更高效。例如，你可以将整数数据存储在整数数据类型、数值数据类型、浮点数据类型，甚至
    `varchar(10)` 类型中，但这些数据类型在实现或性能上肯定不同。使数据类型与需求相匹配是获得能让用户对其数据库满意的良好数据质量的重要一步。


    正确设置数据类型是实现正确性的第一步，因此在这里花费合理的时间以确保其正确性确实很有帮助。太多数据库最终将所有数据类型设置为相同大小且可为空（如果有主键，则除外），从而失去了拥有适当大小和受约束的数据存储的完整性。


    ### 约束


    保护数据完整性可能不会立即对系统性能产生积极影响，但在使用数据时，无需担心数据质量会带来巨大的好处。


    ### 索引


    没有索引的数据库可能无法使用。（首先，唯一性约束是通过索引实现的。）在设计（和测试）阶段正确设置索引可以限制一旦挑剔的用户拿到你的代码后你需要进行的调优工作量。


    有一个我不会比已经提到的更多讨论的选择是主键选择。选择使用自然键值还是代理键，只要你的选择合理，不太可能损害系统性能。根据自然键值的复杂程度或你为代理键选择的值，两种方法各有其难点。我将在索引部分简要提及索引考虑因素，但只要你的索引是最优的，并且你的数据足够唯一，用户无需在行之间随机选择，那么任何合理的主键选择都可以。

    '
- fmt: "It usually isn’t that difficult a task, but all too often it is a choice that\
    \ is ignored. Too many databases have no more than three datatype configurations\
    \ (consider `varchar(10)` and `varchar(20)` as two configurations of `varchar`)\
    \ in their database. Using `int`, `varchar(200)`, and `varchar(max)`, you *could*\
    \ implement almost any database. Of course, there are two problems with only using\
    \ very generic datatypes for every column.\n\nFirst, although you could implement\
    \ most numbers as integers, some numbers need decimal places.\n\n(Yes, you could\
    \ store your monetary values in pennies instead of dollars, but that would confuse\
    \ the heck out of most users and make using the data confusing.) And you can also\
    \ put all other types of data in a `varchar(200)` and a `varchar(max)`. Any data\
    \ that you can store in SQL Server can be translated into a textual representation,\
    \ but not necessarily in a manner that is conducive to use, either by the user\
    \ or the computer system. The first goal of datatypes is to represent the data\
    \ in the most natural manner so that the computer can work with it best and the\
    \ user will be less likely to make a mistake. SQL Server provides a rich set of\
    \ datatypes, including the following groups of types:\n\n-   **Precise numeric\
    \ data** Stores data with no loss of precision due to storage. This group includes\
    \ integer types, which are implemented in hardware (`bit`, `tinyint`, `smallint`,\
    \ `int`, `bigint`); `decimal`; `money`; and `smallmoney`. (The `money` types are\
    \ based on integers, which leads to some mathematical limitations and should be\
    \ rarely used. Use `decimal` instead.)\n\n-   **Approximate numeric data** Stores\
    \ approximations of numbers. This group provides for a large range of values.\
    \ It includes the `float` and `real` floating point types, which are based on\
    \ IEEE standards and are supported via hardware but have round-off issues that\
    \ have to be understood. Use this group primarily for scientific applications\
    \ that may need to store extremely small or extremely large values in the same\
    \ column, and can handle a small amount of rounding error.\n\n-   **Date and time**\
    \ Stores date values, including the time of day. This group includes the types\
    \ `date`, `time`, `datetime2`, `datetimeoffset`, `smalldatetime`, and `datetime`.\
    \ (Note: You should phase out usage of this `smalldatetime` and `datetime` and\
    \ use the more standards-oriented `datetime2`, though neither are technically\
    \ deprecated.)\n\n-   **Character (or string) data** Used to store textual data,\
    \ such as names, descriptions, notes, and so on. This group includes `Char`, `varchar`,\
    \ `varchar(max)`, and their Unicode equivalents: `nchar`, `nvarchar`, and `nvarchar(max)`.\
    \ (Note that there also `text`/`ntext` datatypes that are deprecated (and fairly\
    \ unpleasant) and that you should phase out for the `varchar(max)`/`nvarchar(max)`\
    \ datatypes, immediately if not sooner.)\n\n-   **Binary data** Data stored in\
    \ bytes (rather than as human-readable values, for example), files, or images.\
    \ This group includes `Binary`, `Varbinary`, and `varbinary(max)`. (Note that\
    \ there is also an `image` datatype that is deprecated and that you should phase\
    \ out for the `varbinary(max)` datatype, immediately if not sooner.)\n\n-   **And\
    \ the rest** Datatypes that don’t fit into any other groups nicely but are still\
    \ interesting. This group includes `rowversion` (also known as `timestamp`), `uniqueidentifier`,\
    \ `sql_variant`, `XML`, `hierarchyId`, and spatial types (such as `geometry` and\
    \ `geography`).\n\nPicking the right datatype from these types to match your need\
    \ is an important step in establishing data integrity, and it’s crucial for performance.\
    \ (There is even the `sql_variant` type that you can use in the rare case that\
    \ you can’t actually predict the datatype.) SQL Server (believe it or not) is\
    \ optimized to work with data in a certain way, and to do comparisons in each\
    \ datatype in a natural way, not in the way that you may imagine it will in a\
    \ given situation. For example, say you store numbers in a character string. Then\
    \ you evaluate the following expression: `'100' > '2'`. Even when just looking\
    \ at this, your mind really wants to say that it is true. `CAST('100' AS int)\
    \ > CAST('2' AS int)` will evaluate to true, but `'100' > '2'` will evaluate to\
    \ false because character strings are ordered from left to right in the way character\
    \ strings are in the real world. This is obvious when you ask whether `'Apple'\
    \ < 'Microsoft'`. This evaluates to true because the ‘A’ is less than ‘M’ regardless\
    \ of the size of the string (and for no other reason, no matter what humor I might\
    \ be trying to derive from the names of those companies.)\n\nIf you don’t get\
    \ how a relational database uses indexes, the significance of this previous paragraph\
    \ has probably not yet hit you. (You also really need to read the indexing chapter\
    \ later in this book.) In procedural programming, executing `CAST(value AS type)\
    \ > CAST(value2 AS type)` is no slower than executing `value > value2`. You’ll\
    \ see this if you frequently use SQL Server Integration Services (`SSIS`) to do\
    \ comparisons, because you’ll do a lot of type casts and uppercasing for comparisons\
    \ since data is all case sensitive as you work on the data row by row.\n\nBut\
    \ in a set-based and declarative language like SQL, your goal isn’t to take complete\
    \ control over the entire process, but rather to set up the scenario for the engine\
    \ to get the right answer fast. There are two ways that indexes are used optimally\
    \ in a query like the following one:\n\n```\nSELECT <columnList>\nFROM <tableName>\n\
    WHERE <column1> = <comparisonValue1>\n```\n\nThe ideal case is that `column1`\
    \ and `comparisonValue1` have the exact same datatype. The next best case is that\
    \ the `comparisonValue` can be implicitly converted to the datatype of the column.\
    \ Implicit conversion is generally possible when one datatype is less complex\
    \ than the other. For example, you can implicitly convert an ASCII string to a\
    \ Unicode string, but you cannot do it the other way around. For the complete\
    \ chart, check the “Data Type Precedence” topic in SQL Server books online. As\
    \ an example, consider a table such as this (which I will create in `tempdb`):\n\
    \n```\nCREATE TABLE dbo.testType\n(\n    varcharType varchar(20),\n    nvarcharType\
    \ varchar(20)\n)\n```\n\nObviously, this is not the most useful table, but even\
    \ a table this simple will show you how performance will be affected by a simple\
    \ datatype choice. In the following query, the column is higher in datatype precedence.\
    \ So the value that is lower in precedence will be converted to the higher one.\
    \ In the following query:\n\n```\nSELECT *\nFROM testType\nWHERE nvarcharType\
    \ = 'Test'\n```\n\nThis is okay, because the optimizer will convert the literal\
    \ value to the more complex type. (The value that is implicitly converted will\
    \ always be less complex, because implicit conversions are always non-lossy in\
    \ nature.) In the query plan, you will find the following expression: `[tempdb].[dbo].[testType].[nvarcharType]\
    \ = CONVERT_IMPLICIT(nvarchar(4000),[@1],0)`. However, consider the following\
    \ query:\n\n```\nSELECT *\nFROM testType\nWHERE varcharType = N'Test' --Note:\
    \ A capital N before a string literal makes it UNICODE\n```\n\nYou will see the\
    \ following expression: `CONVERT_IMPLICIT(nvarchar(20),[tempdb].[dbo].[testType].[varcharType],...)`."
  raw: 'It usually isn’t that difficult a task, but all too often it is a choice that
    is ignored. Too many databases have no more than three datatype configurations
    (consider varchar(10) and varchar(20) as two configurations of varchar) in their
    database. Using int, varchar(200), and varchar(max), you *could* implement almost
    any database. Of course, there are two problems with only using very generic datatypes
    for every column.


    First, although you could implement most numbers as integers, some numbers need
    decimal places.


    (Yes, you could store your monetary values in pennies instead of dollars, but
    that would confuse the heck out of most users and make using the data confusing.)
    And you can also put all other types of data in a varchar(200) and a varchar(max).
    Any data that you can store in SQL Server can be translated into a textual representation,
    but not necessarily in a manner that is conducive to use, either by the user or
    the computer system. The first goal of datatypes is to represent the data in the
    most natural manner so that the computer can work with it best and the user will
    be less likely to make a mistake. SQL Server provides a rich set of datatypes,
    including the following groups of types:


    •


    **Precise numeric data** Stores data with no loss of precision due to storage.
    This group includes integer types, which are implemented in hardware (bit, tinyint,


    smallint, int, bigint); decimal; money; and smallmoney. (The money types are based
    on integers, which leads to some mathematical limitations and should be rarely


    used. Use decimal instead.)


    •


    **Approximate numeric data** Stores


    approximations of numbers. This group


    provides for a large range of values. It includes the float and real floating
    point types, which are based on IEEE standards and are supported via hardware
    but have


    round-off issues that have to be understood. Use this group primarily for scientific
    34


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance applications
    that may need to store extremely small or extremely large values in the same column,
    and can handle a small amount of rounding error.


    •


    **Date and time** Stores date values, including the time of day. This group includes
    the types date, time, datetime2, datetimeoffset, smalldatetime, and datetime.
    (Note: You should phase out usage of this smalldatetime and datetime and use the
    more


    standards-oriented datetime2, though neither are technically deprecated.)


    •


    **Character (or string) data** Used


    to store textual data, such as names, descriptions,


    notes, and so on. This group includes Char, varchar, varchar(max), and their


    Unicode equivalents: nchar, nvarchar, and nvarchar(max). (Note that there also


    text/ntext datatypes that are deprecated (and fairly unpleasant) and that you


    should phase out for the varchar(max)/nvarchar(max) datatypes, immediately if
    not


    sooner.)


    •


    **Binary data** Data stored in bytes (rather than as human-readable values, for
    example), files, or images. This group includes Binary, Varbinary, and


    varbinary(max). (Note that there is also an image datatype that is deprecated
    and


    that you should phase out for the varbinary(max) datatype, immediately if not


    sooner.)


    •


    **And the rest** Datatypes that don’t fit into any other groups nicely but are
    still interesting. This group includes rowversion (also known as timestamp),


    uniqueidentifier, sql_variant, XML, hierarchyId, and spatial types (such as geometry
    and geography).


    Picking the right datatype from these types to match your need is an important
    step in establishing data integrity, and it’s crucial for performance. (There
    is even the sql_variant type that you can use in the rare case that you can’t
    actually predict the datatype.) SQL Server (believe it or not) is optimized to
    work with data in a certain way, and to do comparisons in each datatype in a natural
    way, not in the way that you may imagine it will in a given situation. For example,
    say you store numbers in a character string. Then you evaluate the following expression:
    ''100'' > ''2''. Even when just looking at this, your mind really wants to say
    that it is true. CAST(''100'' AS int) > CAST(''2'' AS int) will evaluate to true,
    but ''100'' > ''2'' will evaluate to false because character strings are ordered
    from left to right in the way character strings are in the real world. This is
    obvious when you ask whether ''Apple'' < ''Microsoft''. This evaluates to true
    because the ‘A’ is less than ‘M’ regardless of the size of the string (and for
    no other reason, no matter what humor I might be trying to derive from the names
    of those companies.)


    If you don’t get how a relational database uses indexes, the significance of this
    previous paragraph has probably not yet hit you. (You also really need to read
    the indexing chapter later in this book.) In procedural programming, executing
    CAST(value AS type) > CAST(value2 AS type) is no slower than executing value >
    value2. You’ll see this if you frequently use SQL Server Integration Services
    (SSIS) to do comparisons, because you’ll do a lot of type casts and uppercasing
    for comparisons since data is all case sensitive as you work on the data row by
    row.


    But in a set-based and declarative language like SQL, your goal isn’t to take
    complete control over the entire process, but rather to set up the scenario for
    the engine to get the right answer fast. There are two ways that indexes are used
    optimally in a query like the following one:


    SELECT <columnList>


    FROM <tableName>


    WHERE <column1> = <comparisonValue1>


    The ideal case is that column1 and comparisonValue1 have the exact same datatype.
    The next best case is that the comparisonValue can be implicitly converted to
    the datatype of the column. Implicit conversion is generally possible when one
    datatype is less complex than the other. For example, you can implicitly 35


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance convert an
    ASCII string to a Unicode string, but you cannot do it the other way around. For
    the complete chart, check the “Data Type Precedence” topic in SQL Server books
    online. As an example, consider a table such as this (which I will create in tempdb):


    CREATE TABLE dbo.testType


    (


    varcharType varchar(20),


    nvarcharType varchar(20)


    )


    Obviously, this is not the most useful table, but even a table this simple will
    show you how performance will be affected by a simple datatype choice. In the
    following query, the column is higher in datatype precedence. So the value that
    is lower in precedence will be converted to the higher one. In the following query:


    SELECT *


    FROM testType


    WHERE nvarcharType = ''Test''


    This is okay, because the optimizer will convert the literal value to the more
    complex type. (The value that is implicitly converted will always be less complex,
    because implicit conversions are always non-lossy in nature.) In the query plan,
    you will find the following expression: [tempdb].[dbo].[testType].


    [nvarcharType] = CONVERT_IMPLICIT( nvarchar(4000),[@1],0). However, consider the
    following query: SELECT *


    FROM testType


    WHERE varcharType = N''Test'' --Note: A capital N before a string literal makes
    it UNICODE


    You will see the following expression: CONVERT_IMPLICIT(nvarchar(20),[tempdb].[dbo].[testType].'
  trans: "\n这通常不是一项特别困难的任务，但它却常常是一个被忽视的选择。太多数据库中，其数据类型配置不超过三种（例如，将 `varchar(10)` 和\
    \ `varchar(20)` 视为 `varchar` 的两种配置）。使用 `int`、`varchar(200)` 和 `varchar(max)`，你*几乎*可以实现任何数据库。当然，只为所有列使用非常通用的数据类型存在两个问题。\n\
    \n首先，虽然你可以将大多数数字实现为整数，但有些数字需要小数位。\n\n（是的，你可以将货币值以“分”而不是“美元”来存储，但这会让大多数用户感到困惑，并使数据的使用变得混乱。）你也可以将所有其他类型的数据放入\
    \ `varchar(200)` 和 `varchar(max)` 中。任何可以在 SQL Server 中存储的数据都可以转换为文本表示形式，但不一定以对用户或计算机系统易于使用的方式进行。数据类型的首要目标是以最自然的方式表示数据，以便计算机能够最佳地处理它，并且用户也不太可能犯错。SQL\
    \ Server 提供了丰富的数据类型集，包括以下几组类型：\n\n-   **精确数值数据** 存储数据时不会因存储而损失精度。这组类型包括硬件实现的整数类型（`bit`、`tinyint`、`smallint`、`int`、`bigint`）；`decimal`；`money`；以及\
    \ `smallmoney`。（`money` 类型基于整数，这导致了一些数学上的局限性，应很少使用。请改用 `decimal`。）\n\n-   **近似数值数据**\
    \ 存储数字的近似值。这组类型提供了很大的值范围。它包括 `float` 和 `real` 浮点类型，它们基于 IEEE 标准并通过硬件支持，但具有必须理解的舍入误差问题。主要将此类型组用于科学应用，这些应用可能需要在同一列中存储极小或极大的值，并且可以处理少量的舍入误差。\n\
    \n-   **日期和时间** 存储日期值，包括一天中的时间。这组类型包括 `date`、`time`、`datetime2`、`datetimeoffset`、`smalldatetime`\
    \ 和 `datetime` 类型。（注意：你应该逐步淘汰 `smalldatetime` 和 `datetime` 的使用，并使用更面向标准的 `datetime2`，尽管严格来说这两种类型都未被弃用。）\n\
    \n-   **字符（或字符串）数据** 用于存储文本数据，如姓名、描述、注释等。这组类型包括 `Char`、`varchar`、`varchar(max)`\
    \ 及其对应的 Unicode 版本：`nchar`、`nvarchar` 和 `nvarchar(max)`。（注意，还有 `text`/`ntext`\
    \ 数据类型已被弃用（且相当不好用），你应该立即（如果不更早的话）改用 `varchar(max)`/`nvarchar(max)` 数据类型。）\n\n\
    -   **二进制数据** 以字节（而非人类可读的值）、文件或图像形式存储的数据。这组类型包括 `Binary`、`Varbinary` 和 `varbinary(max)`。（注意，还有一个\
    \ `image` 数据类型已被弃用，你应该立即（如果不更早的话）改用 `varbinary(max)` 数据类型。）\n\n-   **以及其他类型**\
    \ 那些无法很好地归入其他类别但仍然有趣的数据类型。这组类型包括 `rowversion`（也称为 `timestamp`）、`uniqueidentifier`、`sql_variant`、`XML`、`hierarchyId`\
    \ 和空间类型（如 `geometry` 和 `geography`）。\n\n从这些类型中选择合适的数据类型以满足你的需求，是建立数据完整性的重要步骤，并且对性能至关重要。（甚至还有\
    \ `sql_variant` 类型，在极少数情况下，当你实际上无法预测数据类型时可以使用。）SQL Server（信不信由你）被优化为以某种方式处理数据，并以每种数据类型自然的方式进行比较，而不是你可能在特定情况下想象的方式。例如，假设你将数字存储在字符串中。然后你评估以下表达式：`'100'\
    \ > '2'`。即使只是看着它，你的思维也会强烈地认为这是真的。`CAST('100' AS int) > CAST('2' AS int)` 的评估结果为真，但\
    \ `'100' > '2'` 的评估结果为假，因为字符串的排序在现实世界中是按照字符串从左到右的方式进行的。当你问 `'Apple' < 'Microsoft'`\
    \ 是否成立时，这就很明显了。该表达式评估结果为真，因为 'A' 小于 'M'，而与字符串的大小无关（无论我是否试图从这些公司的名称中获取幽默感，都没有其他原因）。\n\
    \n如果你还不理解关系数据库如何使用索引，上一段话的重要性可能尚未被你意识到。（你真的需要阅读本书后面关于索引的章节。）在过程式编程中，执行 `CAST(value\
    \ AS type) > CAST(value2 AS type)` 并不比执行 `value > value2` 慢。如果你经常使用 SQL Server\
    \ Integration Services (`SSIS`) 进行比较，你会看到这一点，因为你会进行大量的类型转换和大写转换以进行比较，因为当你逐行处理数据时，数据都是区分大小写的。\n\
    \n但在像 SQL 这样的基于集合的、声明性的语言中，你的目标不是完全控制整个过程，而是设置场景，让引擎能够快速得到正确答案。在如下查询中，索引有两种优化的使用方式：\n\
    \n```\nSELECT <columnList>\nFROM <tableName>\nWHERE <column1> = <comparisonValue1>\n\
    ```\n\n理想情况是 `column1` 和 `comparisonValue1` 具有完全相同的数据类型。次优情况是 `comparisonValue`\
    \ 可以隐式转换为列的数据类型。当一种数据类型比另一种简单时，通常可以进行隐式转换。例如，你可以将 ASCII 字符串隐式转换为 Unicode 字符串，但反之则不行。有关完整的图表，请查阅\
    \ SQL Server 联机丛书中的“数据类型优先级”主题。作为一个例子，考虑这样一个表（我将在 `tempdb` 中创建）：\n\n```\nCREATE\
    \ TABLE dbo.testType\n(\n    varcharType varchar(20),\n    nvarcharType varchar(20)\n\
    )\n```\n\n显然，这不是最有用的表，但即使这样一个简单的表也能向你展示一个简单的数据类型选择将如何影响性能。在下面的查询中，列在数据类型优先级中较高。因此，优先级较低的值将被转换为较高的那个。在以下查询中：\n\
    \n```\nSELECT *\nFROM testType\nWHERE nvarcharType = 'Test'\n```\n\n这是没问题的，因为优化器会将字面值转换为更复杂的类型。（被隐式转换的值总是复杂度较低的，因为隐式转换本质上是无损的。）在查询计划中，你会找到以下表达式：`[tempdb].[dbo].[testType].[nvarcharType]\
    \ = CONVERT_IMPLICIT(nvarchar(4000),[@1],0)`。但是，请考虑以下查询：\n\n```\nSELECT *\nFROM\
    \ testType\nWHERE varcharType = N'Test' --注意：字符串字面量前的大写 N 使其成为 UNICODE\n```\n\n\
    你将看到以下表达式：`CONVERT_IMPLICIT(nvarchar(20),[tempdb].[dbo].[testType].[varcharType],...)`。\n"
- fmt: '[varcharType]`,0)=[@1]`。这表明它已转换列值，实际上使得任何对 `varcharType` 列的索引对于任何查找操作都变得无用。还要注意，对于字符值，还有一个控制值排序和比较的排序规则，这也可能导致类型不匹配。


    这些都是简单的例子，但这些问题经常出现，因为有很多地方你需要比较值，例如在连接、搜索等场景中。注意正确选择数据类型的细节，可以在性能和数据质量方面给你带来巨大的回报。在下一节中，我将扩展数据质量和限制数据的话题，超越数据类型，但数据类型的选择常常是你将要做的第一个物理模型选择。


    **约束**


    一旦你设计了表，并选择了符合需求的数据类型，你需要将数据约束为仅“合法”的内容。你能保持数据越正确，你纠正错误所花的时间就越少。任何可以实际约束的数据都应该被约束。例如，经常有人设计一个列来在地址中保存国家名称。世界上有不到两百个国家，但如果你给用户一个简单的文本列来输入国家名称，你可能会得到每个国家超过200种不同的拼写。运用一点创造力，你可以通过使用
    SQL Server 的声明性约束之一来防止拼写错误。可能无法验证所有数据——例如，在美国，验证州相当容易，但随着粒度增加，验证变得更加困难。验证县和城市成本高昂，确保邮政编码匹配城市和州则更困难一些，因为有太多允许的例外。验证完整地址可能只在你进行批量邮件操作以获得邮寄折扣时才值得付出努力。


    ## 第2章 ■ 正确设计：为性能设计数据库


    为了帮助约束和引导数据完整性挑战，SQL Server 有五种声明性约束：


    - **NULL** 确定列是否将接受 NULL 作为其值。尽管 NULL 约束不像其他约束类型那样是对象，但它们的行为方式非常相似。


    - **PRIMARY KEY 和 UNIQUE 约束** 用于确保你的行在给定的键列集合上仅包含唯一的值组合。这种约束用于保护你设计的键免受重复数据的影响。


    - **FOREIGN KEY** 用于确保任何外键引用只有与其引用的键列匹配的有效值。


    - **DEFAULT** 用于在用户未提供时设置列的可接受默认值。（有些人不将默认值视为约束，因为默认值不限制更新。）


    - **CHECK** 用于限制可输入到单个列或整行的值。


    约束是表基础实现的一部分，有助于确保数据质量。你应尽可能广泛地使用约束来保护你的数据，因为它们简单，并且大部分情况下开销最小。当然，它们并非免费，它们可能会在一定程度上减慢你的数据创建速度（对于
    CHECK、FOREIGN KEY 和 PRIMARY KEY/UNIQUE 约束来说肯定是这样），但从长远来看，格式不佳的数据对你的性能影响要糟糕得多。


    > **注意** SQL Server 还提供了触发器，可用于复杂的数据完整性实现。然而，它们应仅作为最后手段使用，因为它们可能难以正确实现，并且如果使用不当，可能对数据完整性非常有害。


    所有 SQL Server 约束（除默认值外）最伟大的方面之一是，查询优化器可以使用它们来优化查询，因为约束告诉优化器有关数据的某些额外质量方面。例如，假设你在列上放置了一个约束，要求该列的所有值都介于
    5 到 10 之间。如果执行一个查询，要求该列值大于 100 的所有行，优化器甚至无需查看数据就知道没有行满足条件。


    无论约束是否直接帮助查询性能，它们在维护数据质量方面的作用是整体系统性能的最大因素之一。除了我涵盖的规范化和数据类型主题之外，考虑一个包含活动演讲者日程的数据库。


    假设数据库设计完美，但一些演讲者分配不正确。因此，每个用户现在都必须通过手动检查坏数据的值来限定所有行的所有使用（这是时间的显著浪费）并处理错误的数据值。


    当然，虽然你可以用约束做很多事，但你只能做这么多。用户是人类（大部分情况下），所以有时他们听错东西。有时他们拼错东西。（相信我，看到 Louis 这个名字被拼写总是令人愉悦；至少
    *一些* 拼写是阳性的。）。例如，假设你花费了大量时间设计一个客户数据库，而你的用户与客户进行了以下对话：


    *计算机操作员：“嗨，你的名字是什么？”*


    *电话声音：“Fred。”*


    *[计算机按键点击；镜头转向计算机屏幕。]*


    *输入无效：23720823437 不是有效的人名*


    *计算机操作员：“嗯，我想我拼错了。你能再拼一遍吗？”*


    *电话声音（不太高兴地）：“F-r-e-d。”*


    *[计算机按键点击；镜头转向计算机屏幕。]*


    *名字（屏幕上显示）：Jerkface*


    对于这些类型的“错误”，你真的无能为力。首先，呼叫者的名字可能是 Jerkface（但很可能拼写为 Jearkfase!），所以也许输入是正确的，但软件无法防止用户的错误。其次，它可能是一个女性声音，而“Fred”这个名字可能是错的，因为它是一个非常不常见的女性名字（尽管
    Frederica 这个名字可以缩写为 Fred）。这些数据问题仅仅是阻止所有类型数据完整性问题的复杂性的开始。我曾处理过地址数据库（为其目的充分设计），其中美国州、国家、城市和街道名称有许多变体，就是不可能正确。是的，有一个叫格鲁吉亚的国家，但它很可能没有亚特兰大这个州。


    一个有用的实现模式是，对于一个具有自然固定域的列（例如原色，或联赛中足球队的名称），与其尝试使用硬编码值列表的约束（或者在 UI 层硬编码值列表），不如创建一个表来实现固定域。例如，假设你有一个像这样的地址表：


    ```

    CREATE TABLE Address

    (

    ...

    CountryName varchar(30)

    ...

    );

    ```


