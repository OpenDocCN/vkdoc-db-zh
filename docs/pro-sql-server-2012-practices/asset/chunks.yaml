- fmt: '# Getting the database structure to match the needs of the engine is the second
    most important part in the process of performance tuning your database code. (Matching
    your structure to the user’s needs being the most important!)


    ## A Really Quick Taste of History


    The concept of a relational database originated in the late 1970s. (The term `relation`
    is mostly analogous to a table in SQL and does not reference relationships.) In
    1979, Edgar F. Codd, who worked for the IBM Research Laboratory at the time, wrote
    a paper titled “A Relational Model of Data for Large Shared Data Banks,” which
    was printed in “Communications of the ACM.” (“ACM” stands for the Association
    for Computing Machinery, which you can learn more about at [www.acm.org.) In this
    11-page paper](http://www.acm.org), which really should be required reading, Codd
    introduced to the world outside of academia the fairly revolutionary idea for
    how to break the physical barriers of the types of databases in use at that time.


    Following this paper, in the 1980s Codd presented 13 rules for what made a database
    “relational,” and it is quite useful to see just how much of the original vision
    persists today. I won’t regurgitate all of the rules, but the gist of them was
    that, in a relational database, all of the physical attributes of the database
    are to be encapsulated from the user. It shouldn’t matter if the data is stored
    locally, on a storage area network (SAN), elsewhere on the local area network
    (LAN), or even in the cloud (though that concept wasn’t quite the buzz worthy
    one it is today.) Data is stored in containers that have a consistent shape (same
    number of columns in every row), and the system works out the internal storage
    details for the user.


    The higher point is that the implementation details are hidden from the users
    such that data is interacted with only at a very high level.


    Following these principles ensures that data is far more accessible using a high
    level language, accessing data by knowing the table where the data resided, the
    column name (or names), and some piece of unique data that could be used to identify
    a row of data (aka a “key”). This made the data far more accessible to the common
    user because to access data, you didn’t need to know what sector on a disc the
    data was on, or a file name, or even the name of physical structures like indexes.
    All of those details were handled by software.


    Changes to objects that are not directly referenced by other code should not cause
    the rest of the system to fail. So dropping a column that isn’t referenced would
    not bring down the systems. Moreover, data should not only be treated row by row
    but in sets at a time. And if that isn’t enough, these tables should be able to
    protect themselves with integrity constraints, including uniqueness constraints
    and referential integrity, and the user shouldn’t know these constraints exist
    (unless they violate one, naturally).


    More criteria is included in Codd’s rules, including the need for `NULLs`, but
    this is enough for a brief infomercial on the concept of the relational database.


    The fact is, `SQL Server`—and really all relational database management systems
    (`RDBMSs`) —is just now getting to the point where some of these dreams are achievable.
    Computing power in the 1980s was nothing compared to what we have now. My first
    `SQL Server` (running the accounting for a midsized, nonprofit organization) had
    less than 100 MB of disk space and 16 MB of RAM. My phone five years ago had more
    power than that server. All of this power we have now can go to a developer’s
    head and give him the impression that he doesn’t need to spend the time doing
    design. The problem with this is that data is addictive to companies. They get
    their taste, and they realize the power of data and the data quantity explodes,
    leading us back to the need of understanding how the relational engine works.
    Do it right the first time…. That sounds familiar, right?


    ## Why a Normal Database Is Better Than an Extraordinary One


    In the previous section, I mentioned that the only (desirable) method of directly
    accessing data in a relational database is by the table, row key, and column name.
    This pattern of access ought to permeate your thinking when you are assembling
    your databases. The goal is that users have exactly the right number of buckets
    to put their data into, and when you are writing code, you do not need to break
    down data any further for usage.


    As the years passed, the most important structural desires for a relational database
    were formulated into a set of criteria known as the `normal forms`. A table is
    normalized when it cannot be rewritten in a simpler manner without changing the
    meaning. This meaning should be more concerned with actual utilization than academic
    exercises, and just because you can break a value into pieces doesn’t mean that
    you have to. Your decision should be based mostly on how data is used. Much of
    what you will see in the `normal forms` will seem very obvious. As a matter of
    fact, database design is not terribly difficult to get right, but if you don’t
    know what right is, it is a lot easier to get things wrong.


    There are two distinct ways that normalization is approached. In a very formal
    manner, you have a progressive set of draconian “rules” that specify “forms” to
    adhere to. There is nothing wrong with that approach, and it’s an essential exercise
    to do before building a “great” database, but progressing through the forms in
    a stepwise manner is not how any seasoned data architect is likely to approach
    the process of design. Instead, you design with the principles of normalization
    in mind, and use the `normal forms` as a way to test your design.


    The problem with getting a great database design is compounded with how natural
    the process seems.


    The first database that “past, uneducated me” built had 10+ tables—all of the
    obvious ones, like customer, orders, and so forth that are set up so that the
    user interface could be produced to satisfy the client.


    However, addresses, order items, and other items were left as part of the main
    tables, making it a beast to work with for queries. As my employer wanted more
    and more out of the system, the design became more and more taxed (and the data
    became more and more polluted). The basics were there, but the internals were
    all wrong and the design could have used about 50 or so tables to flesh out the
    correct solution. Soon after (at my next company, sorry Terry), I gained a real
    education in the basics of database design, and the little 1000-lumen light bulb
    in my head went off.'
