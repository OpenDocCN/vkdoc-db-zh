  trans: '第 6 章：实用数据库


    阅读本章时请牢记这一点，并思考不同信息的哪些方面可能对你的数据库至关重要。在审阅提供的示例时，请注意我们用于收集那些数据库信息的策略，然后思考如何将这些策略应用到你的实用数据库中。一个强有力的观点认为，实用数据库应不断新增功能，我敦促读者采纳这一立场。如果某项任务你执行了不止一次，你就应该考虑这是否是你的实用数据库能够自动化的任务。


    最近，在登机时，我观察了飞行员如何绕机行走检查。他查看了引擎、轮子以及其他一些关键部件。然后他进入驾驶舱，取下剪贴板，开始对照控制面板上的仪表逐一核对项目。作为一个紧张的飞行乘客，他如此尽职尽责地确保飞机准备好飞行，这让我感到安心。


    同样地，你应该每天检查服务器的健康状况。检查备份以确保其正确执行，审阅错误日志以查找任何潜在问题，以及其他许多关键点。同样，知道数据库已为即将进行的操作做好准备，公司也会感到安心。对飞行员来说，这是一个漫长的过程，涉及许多人检查飞机的多个方面。而对数据库管理员来说，这些任务中有许多在识别出来后就可以自动化。


    每台服务器可能使用`SQL Server 2012`的不同功能；例如，有些系统需要`AlwaysOn`，而有些则不需要。你的一些所需功能可能需要在定期安排的间隔进行不同的检查；例如，如果你正在使用`AlwaysOn`，你可能希望每天验证延迟，以确保网络和数据库的性能符合标准。下面的检查清单列出了你为成功使用`SQL
    Server 2012`可能需要执行的任务，包括确保能够恢复你的`SQL Server`的任务。每次安装和功能使用都可能改变你所需的项目。


    ### 每日检查清单项目


    以下项目应每天检查：


    *   **备份**—恢复操作离不开备份。没有适当的备份，数据库可能会永久丢失。备份计划是最好的起点，但确保其每次都能无故障运行对于长期成功至关重要。

    *   **自动化还原**—验证备份计划最有效的方法是实际执行它，但这很耗时，并且在员工繁忙时常常被遗忘。自动化还原是常见的做法，但除非对还原的成功或失败进行监控，否则并不算完整。

    *   **错误日志**—许多问题会在错误日志中显现，但与自动化还原类似，在繁忙的环境中每天检查每一个日志会迅速消耗掉大量时间。这项检查常常被跳过，以完成那些可能被认为更紧迫的任务。

    *   **`SQL Server` 作业**—`SQL Server 2012`使用户能够安排作业。这些作业可能是维护任务，也可能是对企业运营至关重要的任务。需要每天审查这些作业的完成情况。

    *   **磁盘空间/数据库增长**—应检查数据库以确保其有充足的空间来接受新数据。根据数据库的选项，这可能意味着需要检查数据库内部以确保文件有足够的可用空间，或者验证是否有足够的驱动器空间供数据库增长。

    *   **完整性检查**—可以通过运行一系列完整性检查来验证数据库内部页面的健康状况。你必须确保这些检查在每次执行时都产生无错误的结果。

    *   **索引健康**—数据库的索引可以比作一本书的索引。随着更多页面（即信息）添加到书中，索引需要调整。同样，向表中添加更多信息可能导致其索引需要调整。数据库的性能依赖于这项任务的完成。如果性能对`SQL
    Server`至关重要，你必须检查索引及其效率。

    *   **安全**—记录访问数据库的失败尝试是常见的做法。记录固然好，但同样重要的是你需要审阅日志，以便采取任何必要的纠正措施。

    *   **关键业务指标（KBI）**—许多组织的数据中都有指标，这些指标不仅决定了数据库的健康状况，也决定了业务的健康状况。例如，如果数据库是为支持紧急`911`系统而设，一个`KBI`可能是需要应答的排队呼叫数量。尽管这个数字可能与数据库性能没有直接关系，但呼叫数量过高可能表明数据库无法跟上信息记录的速度。


    ### 长期检查清单项目


    以下项目不需要每天检查，但应定期完成。每个环境（例如，非营利组织与上市公司）有不同的要求，这些要求可能决定检查频率。我建议每季度至少完成一次这些项目。


    *   **审计**—越来越多的组织开始要求审计。即使不是强制性的，定期审计你的服务器也是一个良好的实践。它可能像快速的资产清查一样简单，也可能需要深入的安全审计。

    *   **补丁/服务包**—`SQL Server 2012`是一个稳定的平台，并且已被证明非常可靠，但有时可能需要补丁或服务包来移除代码中的潜在错误或启用某些功能。跟踪数据库服务器的当前版本以及这些版本何时发生过变更，对于故障排除问题至关重要。

    *   **配置**—验证`SQL Server`的配置与首次确保配置正确同样重要。在允许多个账户访问和更改配置的环境中，持续检查配置是否正确至关重要。

    *   **新的`SQL Server`实例**—`SQL Server`有许多版本，每个版本具有不同的功能、价格和许可。许多应用程序会安装一个`SQL Server`版本来满足其所需的数据库支持。检查以确保你的许可正确，并且每台服务器都得到维护，可能是一项艰难的任务。重复执行这项任务可能令人不堪重负且耗时，但却至关重要。


    看起来很长的检查清单，实际上只是触及了表面。需要检查的项目太多，无法一一列举，随着你在自己的环境中使用`SQL Server 2012`，新的项目会变得显而易见。增加其他重复性和定时执行的任务，应使用相同的设计并稍作调整，使其融入你的实用数据库结构中。


    ### 实用数据库布局


    实用数据库的结构是长期易用性的关键；企业对实用数据库的使用始于此。良好理解其结构有助于轻松添加新功能并进行定制，以确保在每个环境中收集有用的数据。没有定义好的结构，数据库的升级和组织会变得复杂。我们在示例中将使用的实用数据库分为以下三个主要类别：


    *   **类别 1**—核心安装特定

    *   **类别 2**—功能特定

    *   **类别 3**—领域特定（KBI）


    第一个类别是必须在所有将使用该实用数据库的`SQL Server`安装上收集的数据。例如`SQL Server`版本、`SQL Server`资产清单以及索引碎片等数据都属于此类别。


    第二个类别的数据依赖于可能在`SQL Server`上实现的功能。'
- fmt: '# 数据分类


    服务器数据，例如`AlwaysOn`和`SQL Server Audits`。这类数据提供了一层历史记录和监控信息，这些信息可能在其他方法中不可用。例如，我经常在这里包含的一个表是集群节点历史记录；它提供了关于集群的哪个节点历史上承载了`SQL
    Server`的信息。


    作为顾问，我发现这第三类数据非常有帮助。正如前面的清单部分所讨论的，每个业务都有不同的关键业务指标。那些不符合`SQL Server`核心安装，也不符合`SQL
    Server`功能的数据，就属于这第三类。例如，如果我们重复使用之前的911呼叫列表队列示例，那么该类别中的一个表将存储队列中有多少呼叫在等待的日期和时间。这些数据与`SQL
    Server`核心安装无关，也与`SQL Server`功能无关；相反，它属于特定领域数据的第三类。


    ## 数据存储


    工具数据库中的数据可分为许多不同的组。根据数据未来将如何使用以及保留多长时间的意图来组织数据，有助于确定表的设计方式。


    - **组1**—用于分析历史内容的数据

    - **组2**—用于检查当前健康状况的数据

    - **组3**—存档数据


    ### 组1：用于分析历史内容的数据


    用于检查历史趋势的数据，例如数据库增长，应该长期保留。以数据库增长作为测量值可以看到对相似数据进行分组的好处。


    主要好处是确定增长率并随时间测量该增长率。您也可以从这些历史信息中获得次要好处；例如，重大发布后的数据足迹，或者数据库增长模式停止或开始的时间，这些在故障排除时提供了有价值的信息。


    ### 组2：用于检查当前健康状况的数据


    没有长期价值，但可能是每日检查表报告一部分的数据，可能不需要保留超过24小时。这类数据的一个例子是`SQL Server`错误日志。`SQL Server`错误日志可以每天导入工具数据库并进行筛选。报告这些数据时，报告可以只包含相关数据。筛选后的数据在初始报告后可能就不再相关，可能不需要保留。在`SQL
    Server`错误日志筛选的示例中，数据的原始来源（错误日志）没有被更改；因此，保留数据会造成信息重复。


    ### 组3：存档数据


    存档数据和历史数据之间略有不同。历史数据是为了识别长期趋势（例如增长）而保留的。存档数据组为您提供了一个选项，用于记录那些已发送报告但随后被删除的信息。在`SQL
    Server`错误日志的情况下，由于数据重复，可能不需要保留详细数据，但用户可能希望查看之前报告中的内容。如果您选择使用存档数据，它将是报告中发送但随后被删除的数据。这使您能够重新创建过去发送的报告。请记住，这在每个工具数据库实现中可能并非都有用。


    图6-1显示了一个类别如何可以包含一个或多个组。核心安装类别（类别1）收集有关基本安装的信息，例如数据库增长和`SQL Server`错误日志。报告后，`SQL
    Server`错误日志表（筛选后的数据）可以被截断，使其成为组2。数据库增长表将长期保留用于历史趋势分析，使其成为组1。


    ```

    核心安装 (类别1)

    ├─ 增长 (组1)

    └─ SQL Server 错误日志 (组2)


    功能安装 (类别2)

    ├─ 集群节点历史记录 (组1)

    └─ 复制冲突 (组2)


    KBI (类别3)

    └─ 队列历史记录 (组1)

    ```


    **图6-1.** 数据分组


    ## 使用模式


