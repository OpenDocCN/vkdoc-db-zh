    \n- **监控**\n    - 复制监视器\n    - 自定义错误\n- **恢复**\n    - 重新应用失败的事务\n    - 手动编辑订阅服务器上的数据\n\
    \    - 重新初始化\n\n> **注意**  \n> 文章《使用系统监视器监控复制》和《监控复制》也很有帮助，您可以阅读它们以了解如何在复制解决方案中使用系统工具。您可以在\
    \ Microsoft 开发者网络网站上找到这些文章（`http://www.msdn.com`）。只需按标题搜索即可。\n\n## 日志传送的选项如下：\n\
    \n- **监控**\n    - 事务日志备份失败时的通知\n    - 复制作业失败时的通知\n    - 还原作业失败时的通知\n- **恢复**\n\
    \    - 重新启动失败的作业\n    - 在辅助服务器上手动应用日志备份\n    - 重新初始化\n\n同样，MSDN 是您的朋友。请参阅 MSDN\
    \ 文章《监控日志传送》以获取可用于帮助管理日志传送解决方案的系统表和存储过程列表。\n\n## 数据库镜像的选项如下：\n\n- **监控**\n   \
    \ - 故障转移时的通知\n    - 性能计数器（参见 `http://technet.microsoft.com/en-us/library/ms189931.aspx`）\n\
    - **恢复**\n    - 用于故障恢复的 GUI 界面\n    - 重新初始化\n\n## AlwaysOn 可用性组的列表非常短：\n\n- **监控**\n\
    \    - SQL Server Management Studio (`SSMS`) 中的 AlwaysOn 仪表板\n    - 扩展事件\n   \
    \ - Windows PowerShell\n- **恢复**\n    - 主副本的故障转移和故障恢复\n\n## 使用 SQL Server Integration\
    \ Services 的自定义 ETL 提供以下监控和恢复选项：\n\n- **监控**\n    - 可以将计划的 ETL 作业配置为在失败时通知。\n\
    \    - 可以在包中配置错误处理。\n- **恢复**\n    - 您可能能够手动更正数据。\n    - 重新初始化可能很复杂。\n\n## 最后，对于大容量复制过程\
    \ (`BCP`)，您有以下选项：\n\n- **监控**\n    - 可以将计划的 `BCP` 作业配置为在失败时通知。\n    - 更健壮的脚本可以包含一些错误处理。\n\
    - **恢复**\n    - 当 `BCP` 导入数据失败时，整个批次将回滚，因此部分加载不会导致数据不一致。\n\n请记住，您可以利用扩展事件和 `PowerShell`\
    \ 创建自己的自定义监控。这两种工具实际上可以应用于本章描述的任何数据复制技术。\n\n## 结论\n\n您最终可能会使用本章描述的一种或多种方法，或者两种或多种方法的组合。它们都有其优点。它们也都有缺点。如果您计划周全并将该计划传达给正确的团队成员，那么您就走上了成功部署的道路。确保您的高级管理人员也了解您所选技术能做什么和不能做什么。有了他们的理解，以后就不太可能被问到：“为什么它不做\
    \ X？我们以为它会做 X。”\n\n> **注意**  \n> 不要忘记使用所有对您有价值的资源，大多数可在 YouTube、Twitter 和许多 SQL\
    \ Server 支持网站上免费获取。\n\n与涉及 SQL Server 的所有内容一样，您的情况可能有所不同，因为您的经验可能与我的经验大相径庭。这里提供的示例都来自我必须支持的真实场景。它们并非旨在包罗万象，尽管我的公司为解决方案选择了一个方向，但您的公司可能会选择另一个。不过，有几件事是肯定的：技术将继续进步，数据库管理员和开发人员将继续使用这些工具找到创造性的解决方案。\n\
    \n# Windows Azure SQL Database for DBAs\n\n**作者：Herve Roggero**\n\n微软在几年前进入了云计算领域，其愿景是为组织提供一套服务，使他们能够更快地构建应用程序，减少维护需求，并实现尽可能透明的横向扩展和可用性。作为这一愿景的一部分，微软创建了\
    \ Windows Azure SQL Database（简称 SQL Database），这是一个面向云的关系数据库服务，它以合理的成本提供免配置的高可用性和可扩展性。\n\
    \n虽然您可以轻松地在云中的虚拟机上安装和配置完整的 SQL Server 实例，但 SQL Database 是最有趣的云技术之一，因为它提供了 SQL\
    \ Server 的许多功能和高可用性，而无需复杂的配置负担。在很大程度上，可以将 SQL Database 视为 SQL Server 的一个子集；我将在本章中探讨一些关键差异并解释这项技术的工作原理，为您提供理解和管理此平台的坚实基础。\n\
    \n在深入探讨这项技术的细节之前，我应该提前设定一个预期：SQL Database 不是云中的 SQL Server。这可能是对这项技术最大的误解，也是关于\
    \ SQL Database 应该做什么和不做什么的许多困惑的根源。由于 SQL Database 实例运行在共享的硬件和基础设施上，因此从配置的角度来看，SQL\
    \ Database 是一个“一刀切”的环境。例如，每个人都获得一个具有 99.95% 月度可用性的完全冗余数据库，并且每个人在任何给定的服务器上都获得大致相同的计算资源份额。相反，没有人可以修改磁盘子系统、修改内存分配或直接访问运行\
    \ SQL Database 实例的物理服务器。\n\n那么，如果没有配置选项需要担心，因此也没有硬件和数据库级别的调优选项，我们为什么还要在本书中讨论这项技术呢？因为，作为一名\
    \ DBA，在某些时候您不可避免地会被问及 SQL Database 的功能、这项技术如何能被您的组织利用、它的优缺点是什么，甚至可能是如何在其日常职责中支持它。正如您将在本章中看到的，企业利用\
    \ SQL Database 的机会并不少。\n\n> **注意**  \n> 该技术的正式名称是 *Windows Azure SQL Database*。但是，为简单起见，我在本章中将其称为\
    \ *SQL Database*。此外，SQL Database 中的用户数据库称为 *SQL Database 实例*。\n\n## SQL Database\
    \ 架构\n\n让我们首先看一下 SQL Database 的底层架构，并讨论它的一些含义。正如您将看到的，SQL Database 被设计为一个云数据库，而不仅仅是云中的一个数据库。\n\
    \n### 基础设施\n\n这种架构的主要驱动因素之一是优先考虑可用性和可扩展性，而不是原始性能。当您连接到 SQL Database 实例时，您实际上是通过一层路由器和代理进行连接，这些路由器和代理将找到您的数据库当前所在的服务器。没错，您的数据库可以在服务器之间移动。您无法知道您的数据库位于哪台服务器上；微软保留根据当前工作负载要求和其他因素移动\
    \ SQL Database 实例的权利。\n\n当应用程序连接到 SQL Database 实例时，连接请求首先通过一层网关，该网关将连接请求路由到保存您数据库的正确底层服务器，如图\
    \ 12-1 所示。网关还承担其他职责，包括安全和协议解析。"
