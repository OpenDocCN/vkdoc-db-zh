  trans: '

    # 第 17 章：面向 SQL Server 数据库管理员的大数据


    **注意** 这种高度分布式的基础架构运行在众多服务器上，你以为它会非常快，对吧？实际上，在处理少量数据时它并不快。启动各种`MapReduce`作业、获取数据以及汇总输出的开销非常高，因此这种技术更适合处理海量数据。然而，在处理小型数据集时，这个过程就显得过度了，因为每次数据请求都要启动`MapReduce`作业，成本太高。本章后面的代码示例在你使用的小型数据集上可能看起来速度较慢。但是，当你需要处理
    TB 级别的数据时，它的速度将比传统方式快得多。不过与`SQL Server`不同的是，你仍需要习惯于以分钟和小时为单位来衡量大数据系统的查询响应时间，而不是毫秒和秒。


    ## 数据库管理员作为数据架构师


    之前，我们研究了一个拥有海量销售数据的在线零售商如何使用`MapReduce`按产品线汇总数据。我们将继续使用产品数据来探讨更多的业务问题及其解决方案。


    在这种情境下，你是一家快速发展的在线零售商的`SQL Server`数据库管理员，公司希望更深入地追踪其产品数据的动态。一个平静的早晨，一位与你合作的开发者来到你的办公桌前，谈论他接到的新需求。他希望在数据库服务器上分配大量磁盘空间，因为他被要求记录`Product`表中的每一次更改。特别是由于动态定价，产品的标价变动频繁，平均每天
    20 次。根据当前的活跃度和总共 50 万种活跃产品计算，这每天会增加 1000 万行数据。天哪！


    你努力从最初的震惊中冷静下来，询问开发者这些数据将如何使用。他表示这部分还不太明确，因为财务部门希望他先捕获这些数据，以备日后审计之需。瞬间，关于磁盘空间、内存以及对现有数据库影响的各种念头在你脑海中闪过。你是为此创建一个新数据库，安装一个新的`SQL
    Server`实例，还是启动一台新服务器？如果它开始被大量使用，你将如何管理？这是一个经验丰富的数据库管理员再熟悉不过的场景了。


    将`Hadoop`加入你的数据库管理员工具集后，你做出了一个明智的决定：实施一个解决方案，既能充分利用`SQL Server`的诸多特性，又能使用`Hadoop`来发挥其最擅长的功能。为了完成这个任务，作为数据库管理员，你的主要挑战将是定义、规范和管理数据在不同存储位置之间的流动。数据流动的多种方式之一如图
    17-5 所示。


    ![Image 195](img/index-410_1.png)


    `图 17-5. 复杂的数据流使数据架构决策更加多样化和复杂化。`


    ## 用于分析的大数据


    你可能在微软环境中见过的许多关于使用大数据的演示、网络研讨会、论文和其他展示，其目标都是将其用于分析或增强商业智能框架。微软这样做很有道理；这是一个展示`PowerView`和`Excel`等工具的机会，这些工具在这些场景中表现出色，随着分析师可以处理的数据量趋近于无限，赋予它们近乎无限的能力。不仅仅是微软在推动这一点，将大数据用于分析也是构建大数据基础设施最常见的原因。


    使用这些工具分析数据的通常技术是一个三步过程：从`HDFS`数据存储中选择要处理的数据，将其中一部分提取到分析师可以访问的位置，然后使用`Excel`或统计分析工具进行分析。根据任何发现或观察结果，分析师以迭代的方式重复这个过程，直到得出结论。除了分析本身，所有这些步骤都是以非交互方式完成的。将数据准备好供分析师使用可能需要数小时，因为提取是作为后台批处理任务运行的。


    举个例子，假设一位分析师想要查看过去三个月的网络日志，以确定潜在客户在查看网站上的“关于我们”页面后访问了哪个网页。


    网络日志已在`HDFS`中存储了一年，与这家公司习惯的数据规模相比，存储量变得非常大，已增长到超过 100TB。分析师首先为这项工作设定一些界限，例如感兴趣的日期范围和目标网页的
    URL，它可能类似于`[www.mywebsite.com\aboutus.aspx.](http://www.mywebsite.com\aboutus.aspx)`。


    分析师设定的这个标准成为过滤条件，使得`MapReduce`能够提取出分析师想要的数据。一个`MapReduce`作业被启动，以访问分布在 75 台服务器上的网络日志，可能会从所有服务器中抓取数据，并将结果输出到一个分析师可以访问的位置和格式。数据现在已经被缩减到分析师可以处理的规模，而不是最初的
    100TB 数据集。分析师准备好使用她熟悉的工具开展工作。她创建图表以更好地可视化趋势和模式，将数据输入统计模型以更好地理解，并提出假设性问题，这些问题又引发了更多问题，需要分析师尚未掌握的数据。分析师回到`Hadoop`去获取更多数据，并准备再次进行分析。这个迭代过程一直持续到分析师对她得到的结果满意为止。这种类型的数据访问和分析是`Hadoop`存在的主要原因，也是数据库管理员在`SQL
    Server` + `Hadoop`环境中需要支持的主要用例。


    ## 将 SQL Server 与 Hadoop 结合使用


    在`SQL Server`旁边添加一个`Hadoop`数据存储的最佳理由是让`Hadoop`负责处理那些本质上非事务性、不要求`ACID`合规性且规模增长迅速的数据。作为数据库管理员，在这个数据管理的新时代，你的工作将是为数据存储位置做出正确的选择。


    ### 数据库管理员的角色


    一些数据库管理员是数据架构师和建模师，但许多人不是。大多数数据库管理员的首要任务是数据保护，包括备份/恢复、灾难恢复、高可用性和安全性。其他人则致力于提高性能和减少资源争用。角色混杂，职责往往不明确，而随着大数据的出现，情况将变得更加模糊。

    '
- fmt: "# Chapter 17: Big Data for the SQL Server DBA\n\n## The Evolving Role of the\
    \ DBA\n\nIn newer software and database environments, such as those seen in technology\
    \ startups or companies that don’t perform intentional data architecture, the\
    \ role of the DBA as data architect is often nonexistent. Developers decide how\
    \ and where to store data and the DBA’s involvement is that of an order taker,\
    \ if any at all. In some enterprise environments where the data architect is king,\
    \ every data-modeling decision is made or approved by his majesty. If the architect\
    \ is simply another subject, the choices for storing data are made by the DBA\
    \ in union with the development team. Often though, there is no data architect\
    \ to play the role of gatekeeper on the data model and it’s developed in an ad-hoc\
    \ manner. In any case, the DBA has a significant role in storing and maintaining\
    \ the data to ensure its integrity and availability, and should be prepared to\
    \ take on the management, safety, and reliability of the Big Data framework.\n\
    \n## Challenges for the DBA with Big Data\n\nThe lack of control and stewardship\
    \ will be a challenge to a DBA adding Big Data to their sphere of responsibility.\
    \ Consider what it will do to your current environment when you introduce the\
    \ following characteristics of Big Data environments:\n\n*   You have unrelated\
    \ mounds of data without foreign keys that comes in all shapes and sizes.\n* \
    \  Most data is processed in batch processes.\n*   The data model is programmer\
    \ driven.\n*   The server hardware can be built out to a practically endless size.\n\
    *   The life cycle of data is undefined and unbounded.\n*   Data cleansing is\
    \ a question mark.\n*   Tools for managing Big Data are in their infancy.\n* \
    \  Bringing together disparate datasets will take expertise, effort, and money.\n\
    \n## Big Data in Practice\n\nLet’s explore a few patterns that show how to make\
    \ use of `Hadoop`, and take a look at some examples that illustrate some ways\
    \ that you might implement Big Data. One of the first decisions you’ll have to\
    \ make, after deciding what data to store using `Hadoop`, is how you will use\
    \ it and how it will interact with your `SQL Server` databases. There are numerous\
    \ architectural choices, and numerous techniques for moving data back and forth.\
    \ We’ll start by using `Sqoop`, a tool that will allow you to transfer data in\
    \ bulk into and out of `SQL Server`.\n\n### Importing and Exporting\n\nThe first\
    \ example you’ll work through is simply moving data into and out of `HDFS`. Assume\
    \ that you need to solve a problem for your marketing department. The `AdventureWorks`\
    \ Company is implementing a new sophisticated dynamic pricing system and marketing\
    \ wants to know the price of a product for any day throughout the product’s history.\
    \ Today, the `AdventureWorks` database has a `ProductListPriceHistory` table,\
    \ but because product prices changed infrequently in the past, it tracked price\
    \ changes by wide date ranges, so you’ll want to replace it so you can store a\
    \ higher volume of data. You also know that, in the future, you’ll want to track\
    \ everything about a product, including inventory levels, cost, marketing description,\
    \ and more. To make sure you don’t miss anything, you store every product in `HDFS`\
    \ at midnight every night using your new `Hadoop` infrastructure. Using the `AdventureWorks\
    \ for SQL Azure` database, the `Product` table has the following definition, using\
    \ two user-defined data types:\n\n```sql\nCREATE TYPE dbo.Name FROM nvarchar(50)\
    \ NULL\nCREATE TYPE dbo.Flag FROM bit NOT NULL\n\nCREATE TABLE Production.Product(\n\
    \    ProductID int IDENTITY(1,1) NOT NULL,\n    Name dbo.Name NOT NULL,\n    ProductNumber\
    \ nvarchar(25) NOT NULL,\n    MakeFlag dbo.Flag NOT NULL,\n    FinishedGoodsFlag\
    \ dbo.Flag NOT NULL,\n    Color nvarchar(15) NULL,\n    SafetyStockLevel smallint\
    \ NOT NULL,\n    ReorderPoint smallint NOT NULL,\n    StandardCost money NOT NULL,\n\
    \    ListPrice money NOT NULL,\n    Size nvarchar(5) NULL,\n    SizeUnitMeasureCode\
    \ nchar(3) NULL,\n    WeightUnitMeasureCode nchar(3) NULL,\n    Weight decimal(8,\
    \ 2) NULL,\n    DaysToManufacture int NOT NULL,\n    ProductLine nchar(2) NULL,\n\
    \    Class nchar(2) NULL,\n    Style nchar(2) NULL,\n    ProductSubcategoryID\
    \ int NULL,\n    ProductModelID int NULL,\n    SellStartDate datetime NOT NULL,\n\
    \    SellEndDate datetime NULL,\n    DiscontinuedDate datetime NULL,\n    rowguid\
    \ uniqueidentifier NOT NULL,\n    ModifiedDate datetime NOT NULL,\n    CONSTRAINT\
    \ PK_Product_ProductID PRIMARY KEY CLUSTERED\n    (\n        ProductID ASC\n \
    \   )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF,\n\
    \          ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON)\n)\n```\n\nThe tool you’ll\
    \ use to do this bulk data load work is `Sqoop`, a component of the `Hadoop` ecosystem\
    \ (`Hadoop on Azure` includes `Sqoop` as part of its offering, so you don’t have\
    \ to install it separately). `Sqoop` is important for DBAs because it’s the best\
    \ way to perform bulk data transfers between `Hadoop` and `SQL Server`. The first\
    \ thing to know about `Sqoop` is that an **import** moves data into `HDFS` and\
    \ an **export** moves data out of `HDFS` (and into `SQL Server`, in this example).\
    \ This example will show the movement of this data where both the `SQL Server`\
    \ `AdventureWorks` database and the `HDFS` data store are in the cloud. Later,\
    \ you’ll work through an example where both data stores are inside your organization’s\
    \ network, although any of the code can be made to work with either `SQL Server`\
    \ or `HDFS` inside your network or in the cloud.\n\n> **Note:** Apache `Sqoop`\
    \ is a tool designed for efficiently transferring bulk data between Apache `Hadoop`\
    \ and structured data stores, such as relational databases.\n\nTo start, you’ll\
    \ need a `SQL Azure` account. The first thing to do is add the `AdventureWorks`\
    \ database to `SQL Azure`, which you can download from [http://msftdbprodsamples.codeplex.com/releases/view/37304.](http://msftdbprodsamples.codeplex.com/releases/view/37304)\
    \ Follow the instructions to get the database uploaded.\n\nThen, you’re going\
    \ to need access to a `Hadoop` cluster. For these examples, I allocated a `Hadoop`\
    \ cluster in `Windows Azure` using the `Community Technology Preview (CTP)` edition\
    \ at [https://www.hadooponazure.com.](https://www.hadooponazure.com) After it’s\
    \ allocated, you’re ready to go with a `Hadoop` cluster in the cloud, as shown\
    \ in Figure 17-6. Note that because, as of this writing, `Microsoft` has released\
    \ only the `CTP` edition of `Hadoop`, the figure shows that the cluster will expire\
    \ soon, but it also displays a set of tiles that will let me use the cluster.\
    \ You’ll spend most of your time running jobs from the command line that import\
    \ and export data, so click `Remote Desktop` to directly log in to the cluster.\n\
    \n![Figure 17-6. Hadoop on Azure CTP main menu](index-414_1.png)\n\nNow you can\
    \ put this cluster to use by putting some data in there. After you `RDP` and log\
    \ in to the cluster, go to the desktop and launch the `Hadoop Command Shell`.\
    \ Once at the command line, you’ll be at the root path for `Hadoop` and you’ll\
    \ see the `c:\\apps\\dist>` prompt. Before you do anything else, set the `Hadoop`\
    \ home environment variable by executing the following line:\n\n```\nSET HADOOP_HOME=c:\\\
    Apps\\dist\n```\n\nThe next step is to change the command-line path to `c:\\Apps\\\
    dist\\sqoop\\bin`, which is where you’ll run `Sqoop` jobs to get data from `AdventureWorks`\
    \ in `SQL Azure` into `Hadoop` and back.\n\n```\ncd sqoop\\bin\n```\n\nThen, you\
    \ need to log in to your `AdventureWorks` database and add a synonym. It’s required\
    \ because `Sqoop` puts brackets around table names, so it will need them when\
    \ it accesses `SQL Server`. Go to `SQL Azure` and execute this `SQL` command:\n\
    \n```sql\nCREATE SYNONYM [Production.Product] FOR Production.Product\n```\n\n\
    The setup is done and you’re ready to get some work done! The first `Sqoop` job\
    \ will copy the `Product` table from `SQL Server` to `HDFS`. This is akin to using\
    \ the `BCP` utility for `SQL Server`, a tool you’re probably more familiar with.\
    \ You aren’t specifying any filters, columns, or an explicit query, so the whole\
    \ table will be copied."
  raw: 'In newer software and database environments, such as those seen in technology
    startups or companies that don’t perform intentional data architecture, the role
    of the DBA as data architect is often nonexistent. Developers decide how and where
    to store data and the DBA’s involvement is that of an order taker, if any at all.
    In some enterprise environments where the data architect is king, every data-modeling
    decision is made or approved by his majesty. If the architect is simply another
    subject, the choices for storing data are made by the DBA in union with the development
    team. Often though, there is no data architect to play the role of gatekeeper
    on the data model and it’s developed in an ad-hoc manner. In any case, the DBA
    has a significant role in storing and maintaining the data to ensure its integrity
    and availability, and should be prepared to take on the management, safety, and
    reliability of the Big Data framework.


    The lack of control and stewardship will be a challenge to a DBA adding Big Data
    to their sphere of responsibility. Consider what it will do to your current environment
    when you introduce the following characteristics of Big Data environments:


    •


    You have unrelated mounds of data without foreign keys that comes in all shapes


    and sizes.


    •


    Most data is processed in batch processes.


    •


    The data model is programmer driven.


    •


    The server hardware can be built out to a practically endless size.


    •


    The life cycle of data is undefined and unbounded.


    •


    Data cleansing is a question mark.


    chapter 17 ■ Big Data for the SQL Server DBa


    •


    Tools for managing Big Data are in their infancy.


    •


    Bringing together disparate datasets will take expertise, effort, and money.


    Big Data in Practice


    Let’s explore a few patterns that show how to make use of Hadoop, and take a look
    at some examples that illustrate some ways that you might implement Big Data.
    One of the first decisions you’ll have to make, after deciding what data to store
    using Hadoop, is how you will use it and how it will interact with your SQL


    Server databases. There are numerous architectural choices, and numerous techniques
    for moving data back and forth. We’ll start by using Sqoop, a tool that will allow
    you to transfer data in bulk into and out of SQL Server.


    Importing and Exporting


    The first example you’ll work through is simply moving data into and out of HDFS.
    Assume that you need to solve a problem for your marketing department. The AdventureWorks
    Company is implementing a new sophisticated dynamic pricing system and marketing
    wants to know the price of a product for any day throughout the product’s history.
    Today, the AdventureWorks database has a ProductListPriceHistory table, but because
    product prices changed infrequently in the past, it tracked price changes by wide
    date ranges, so you’ll want to replace it so you can store a higher volume of
    data. You also know that, in the future, you’ll want to track everything about
    a product, including inventory levels, cost, marketing description, and more.
    To make sure you don’t miss anything, you store every product in HDFS at midnight
    every night using your new Hadoop infrastructure. Using the AdventureWorks for
    SQL Azure database, the Product table has the following definition, using two
    user-defined data types: CREATE TYPE dbo.Name FROM nvarchar(50) NULL


    CREATE TYPE dbo.Flag FROM bit NOT NULL


    CREATE TABLE Production.Product(


    ProductID int IDENTITY(1,1) NOT NULL,


    Name dbo.Name NOT NULL,


    ProductNumber nvarchar(25) NOT NULL,


    MakeFlag dbo.Flag NOT NULL,


    FinishedGoodsFlag dbo.Flag NOT NULL,


    Color nvarchar(15) NULL,


    SafetyStockLevel smallint NOT NULL,


    ReorderPoint smallint NOT NULL,


    StandardCost money NOT NULL,


    ListPrice money NOT NULL,


    Size nvarchar(5) NULL,


    SizeUnitMeasureCode nchar(3) NULL,


    WeightUnitMeasureCode nchar(3) NULL,


    Weight decimal(8, 2) NULL,


    DaysToManufacture int NOT NULL,


    ProductLine nchar(2) NULL,


    Class nchar(2) NULL,


    Style nchar(2) NULL,


    ProductSubcategoryID int NULL,


    ProductModelID int NULL,


    chapter 17 ■ Big Data for the SQL Server DBa


    SellStartDate datetime NOT NULL,


    SellEndDate datetime NULL,


    DiscontinuedDate datetime NULL,


    rowguid uniqueidentifier NOT NULL,


    ModifiedDate datetime NOT NULL,


    CONSTRAINT PK_Product_ProductID PRIMARY KEY CLUSTERED


    (


    ProductID ASC


    )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE = OFF, IGNORE_DUP_KEY = OFF,


    ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON)


    )


    The tool you’ll use to do this bulk data load work is Sqoop, a component of the
    Hadoop ecosystem (Hadoop on Azure includes Sqoop as part of its offering, so you
    don’t have to install it separately). Sqoop is important for DBAs because it’s
    the best way to perform bulk data transfers between Hadoop and SQL


    Server. The first thing to know about Sqoop is that an import moves data into
    HDFS and an export moves data out of HDFS (and into SQL Server, in this example).
    This example will show the movement of this data where both the SQL Server AdventureWorks
    database and the HDFS data store are in the cloud. Later, you’ll work through
    an example where both data stores are inside your organization’s network, although
    any of the code can be made to work with either SQL Server or HDFS inside your
    network or in the cloud.


    n **Note** Apache Sqoop is a tool designed for efficiently transferring bulk data
    between Apache Hadoop and structured data stores, such as relational databases.


    To start, you’ll need a SQL Azure account. The first thing to do is add the AdventureWorks
    database to SQL Azure, which you can download from [http://msftdbprodsamples.codeplex.com/releases/view/37304.](http://msftdbprodsamples.codeplex.com/releases/view/37304)


    Follow the instructions to get the database uploaded.


    Then, you’re going to need access to a Hadoop cluster. For these examples, I allocated
    a Hadoop cluster in Windows Azure using the Community Technology Preview (CTP)
    edition at https://www.


    hadooponazure.com. After it’s allocated, you’re ready to go with a Hadoop cluster
    in the cloud, as shown in Figure 17-6\. Note that because, as of this writing,
    Microsoft has released only the CTP edition of Hadoop, the figure shows that the
    cluster will expire soon, but it also displays a set of tiles that will let me
    use the cluster. You’ll spend most of your time running jobs from the command
    line that import and export data, so click Remote Desktop to directly log in to
    the cluster.


    ![Image 196](index-414_1.png)


    chapter 17 ■ Big Data for the SQL Server DBa


    ***Figure 17-6.*** ***Hadoop on Azure CTP main menu***


    **Now you can put this cluster to use by putting some data in there. After you
    RDP and log in to the cluster, go to the desktop and launch the Hadoop Command
    Shell. Once at the command line, you’ll be at the root path for Hadoop and you’ll
    see the c:\apps\dist> prompt. Before you do anything else, set the Hadoop home
    environment variable by executing the following line:


    SET HADOOP_HOME=c:\Apps\dist


    The next step is to change the command-line path to c:\Apps\dist\sqoop\bin, which
    is where you’ll run Sqoop jobs to get data from AdventureWorks in SQL Azure into
    Hadoop and back.


    cd sqoop\bin


    Then, you need to log in to your AdventureWorks database and add a synonym. It’s
    required because Sqoop puts brackets around table names, so it will need them
    when it accesses SQL Server. Go to SQL


    Azure and execute this SQL command:


    CREATE SYNONYM [Production.Product] FOR Production.Product


    The setup is done and you’re ready to get some work done! The first Sqoop job
    will copy the Product table from SQL Server to HDFS. This is akin to using the
    BCP utility for SQL Server, a tool you’re probably more familiar with. You aren’t
    specifying any filters, columns, or an explicit query, so the whole table will
    be copied.


