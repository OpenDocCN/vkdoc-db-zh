- fmt: "# I/O: the UntOld StOry\n\n```sql\n(FileStats.num_of_bytes_written /1024)/1024.0\
    \ as MB_Written,\nFileStats.Num_of_reads, FileStats.Num_of_writes,\n((FileStats.io_stall_write_ms\
    \ /1000.0)/60) as Minutes_of_IO_Write_Stalls,\n((FileStats.io_stall_read_ms /1000.0)/60)\
    \ as Minutes_of_IO_Read_Stalls\nFROM sys.dm_io_virtual_file_stats(null,null) as\
    \ FileStats\nJOIN sys.master_files ON\nFileStats.database_id = sys.master_files.database_id\n\
    AND FileStats.file_id = sys.master_files.file_id\n```\n\nSample output for this\
    \ query can be found in Table 13-3.\n\n**Table 13-3.** Table containing a sample\
    \ output of the referenced DMV query.\n\n| Database Name | Physical Name | File\
    \ Type | FileSize_GB | MB_Read | MB_Written | Num_of_Reads | Num_of_Writes | Minutes_of_IO_Write_Stalls\
    \ | Minutes_of_IO_Read_Stalls |\n| :--- | :--- | :--- | :--- | :--- | :--- | :---\
    \ | :--- | :--- | :--- |\n| tempdev | `D:\\Tem…` | Data Files | 0.14 | 1.34 |\
    \ 123.03 | 0.11 | 0.11 | | |\n| templog | `D:\\Tem…` | Log Files | 0.13 | 0.92\
    \ | 244.75 | 0.84 | 0.84 | | |\n| TEST | `C:\\Test…` | Data Files | 0.21 | 66.76\
    \ | 123.19 | 0.1 | 0.1 | | |\n| TEST_log | `C:\\Test…` | Log Files | 0.49 | 1.14\
    \ | 362.15 | 1.99 | 1.99 | | |\n\nThis is an interesting data set because it helps\
    \ to illustrate which specific database is driving your IOPS higher.\n\nThe result\
    \ set columns that aren’t apparent are as follows:\n\n*   `FileSize_GB` This is\
    \ the size of the file as persisted in the `dm_io_virtual_file_stats` DMF.\n*\
    \   `MB_Read` The quantity of MB read from this data file.\n*   `MB_Written` The\
    \ quantity of MB written to this data file.\n*   `Number of Reads` The quantity\
    \ of reads from this data file.\n*   `Number of Writes` The quantity of writes\
    \ to this data file.\n*   `Minutes of IO Write Stalls` The aggregated total of\
    \ all of the waits to write to this file.\n*   `Minutes of IO Read Stalls` The\
    \ aggregated total of all of the reads to this data file.\n\n> **Note** The numbers\
    \ are all aggregated totals since the instance was last restarted. This will include\
    \ your higher, known I/O operations.\n\nThe values in this table are certainly\
    \ useful, yet they contain information since the instance was last restarted.\
    \ Due to this, the values reported are going to contain your backup I/O, your\
    \ re-indexing I/O, and, of course, normal usage. This tends to skew these numbers\
    \ and makes it challenging to know when the reported waits are occurring. One\
    \ option is to create a job that persists this data at an interval. In this manner,\
    \ it is easier to tell which databases are consuming the majority of I/O and,\
    \ more importantly, identify the related stalls. I/O stalls are not a bad thing,\
    \ and they will occur. However, if you see a significant deviation between your\
    \ files and find that your log files have a high number of stalls associated with\
    \ them, you need to determine if they are related to checkpoints or normal operations.\
    \ A good way to tie this information together is via the wait statistics, per\
    \ server, which are available via the `sys.dm_os_wait_stats` DMV. This DMV is\
    \ also cumulative and provides some excellent information about your overall wait\
    \ types. Armed with data in this DMV, you can begin to figure out what’s causing\
    \ the I/O stalls.\n\nEven with that subset of information, it might not be clear\
    \ what you need to address. That’s where the session-level information begins\
    \ to be of value.\n\n> **Note** There are times when I dive straight to the session-level\
    \ information, but that information can also be misleading. IOP patterns change\
    \ over the course of the day, week, month, or even year in your environment.\n\
    \nThe following query will begin to provide the actual T-SQL that is driving your\
    \ I/O, as long as it’s a query. It’s certainly possible that external events can\
    \ drive I/O, but those items are typically secondary to what drives I/O on a dedicated\
    \ SQL Server server.\n\n```sql\nSELECT\n    Rqst.session_id as SPID,\n    Qstat.last_worker_time,\n\
    \    Qstat.last_physical_reads,\n    Qstat.total_physical_reads,\n    Qstat.total_logical_writes,\n\
    \    Qstat.last_logical_reads,\n    Rqst.wait_type as CurrentWait,\n    Rqst.last_wait_type,\n\
    \    Rqst.wait_resource,\n    Rqst.wait_time,\n    Rqst.open_transaction_count,\n\
    \    Rqst.row_count,\n    Rqst.granted_query_memory,\n    tSQLCall.text as SqlText\n\
    FROM sys.dm_exec_query_stats Qstat\nJOIN sys.dm_exec_requests Rqst ON\n```"
