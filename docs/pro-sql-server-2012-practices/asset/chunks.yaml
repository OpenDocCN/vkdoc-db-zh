    ## Analyzing Application-Usage Data


    By now, you have collected a large amount of data, which might include topology
    diagrams, configuration information about the servers and applications, runtime
    data from `SQL Server`, and performance data from the network, servers, and applications.
    This information represents the current state of the environment, and you need
    to analyze it from the top down to fully understand the application and identify
    potential areas to address related to the business goals.


    One of the important questions you asked the business to provide was related to
    the usage and performance metrics for the core business transactions that need
    to scale. This usage data, when coupled with the system metrics, provides you
    with valuable insight into what state the system is currently in. This is important
    because if you don’t know what state the system is in (and what state it has been
    in recently), it is impossible to plan for the future. When it comes right down
    to it, this is a capacity-planning exercise.


    The goal of this specific capacity-planning exercise is to create a mental picture
    about the application to fully understand the why, when, what, and where of the
    configuration options, processes, and timing of events. You need to know this
    to determine how many business transactions the application can support for a
    specific configuration.


    Figure 18-7 shows an example of performance data collected from a third-party
    monitoring tool. It shows the cumulative number of requests and the response time
    by day for a two-month period. The Latency (measured in `ms`) is on the left axis,
    and the total number of requests are shown on the right axis, while the shaded
    areas show the total latency or response time for the host, network, Secure Sockets
    Layer (`SSL`), idle, and requests. The dotted line represents the total number
    of requests for that day. Along the top of the graph, you can switch the display
    to show the `X percentile`. This data does not have the usage and performance
    data for each of the core business transactions, but it gives you an overall picture
    of the roundtrip times for virtual IP (`VIP`)-to-`VIP` for the application calls.


    If you do not have access to a more advanced and costly monitoring tool that checks
    all of the application calls, there are alternatives. Most alternatives usually
    require you to be creative and use native tools (and possibly open-source utilities)
    that you already own. As mentioned previously, `Extended Events` can create an
    application profile, but it can also be used to capture long-term performance
    data. You can use the raw performance data captured to create charts in `Microsoft
    Excel` (or another tool that can process data), as demonstrated in Figure 18-7.
    The challenge is to capture additional data at the application layer so that you
    can see the full picture. If you have only the performance numbers for the database,
    you might not be aware that the application has issues until you get a call from
    an end user complaining about performance.


    `Figure 18-7` Performance data for all application calls over a two-month period,
    summarized by day.


    ![Image 208](index-451_1.png)


    The observations in `Table 18-7` represent the high-level analysis of `Figure
    18-7`. From these observations, you can determine the rate of the monthly transaction
    growth, see the large increase in response time, and identify potential performance
    issues that might occur on the weekend.


    `Table 18-7` Observations related to the data shown in `Figure 18-7`.


    | `Observations` | `Comments` |

    | :--- | :--- |

    | Overall latency averaged `76 ms` in the first month and increased to an average
    of `125 ms` in the latest month. | Month over month, there was a `40 percent`
    increase in the average response time. Review additional historical data to determine
    the long-term change in response time, especially because a `40 percent` change
    is dramatic. |

    | The total number of requests peaked at `1.3 million` | A `300,000` increase
    in the total number of |'
