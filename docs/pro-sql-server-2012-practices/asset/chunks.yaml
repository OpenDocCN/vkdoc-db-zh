    chapter 5 ■ From SQL trace to extended eventS


    that last longer than 1 second saved into one separate file, and all the others
    into another one. Figure 5-5


    shows what the object model looks like.


    ***Figure 5-5.** The SMO Object Model*


    The following code example shows how to read an existing trace file called DurationTrace.trc
    with SMO, and filter it so that only statements with duration longer than 500
    ms are saved into a new file. The DurationTrace.trc file can be created by running
    SQL Profiler with Duration template for a few minutes.


    One thing to note is where the filtering takes place. The first time I used SMO
    for tracing I thought that since we have a reader and a writer class, we have
    to read a trace line, perform the filtering there, and then either send it to
    the writer or not. However this is not the case. You can stream the reader directly
    into the writer without any filtering. The writer class has a WriteNotify event.
    This event gets called every time a row from the reader is read. In this event
    you have to perform any filtering and determine whether to skip the record or
    let it be written. This way of doing things still seems a bit backwards to me,
    but since this is the case we have to live with it. The example is well documented
    and is not that hard to follow. By understanding how the classes fit together
    you can build powerful tracing solutions directly in .NET.


    However be aware that this still uses the rowset provider and can still drop events.


    static void Main(string[] args)


    {


    // create the reader that reads from the existign trace file


    TraceFile traceFileReader = new TraceFile();


    string traceFileReaderPath =


    Path.Combine(Path.GetDirectoryName(Assembly.GetExecutingAssembly().Location),


    "DurationTrace.trc");


    traceFileReader.InitializeAsReader(traceFileReaderPath);


    // create the trace writer class with the file destination


    string traceFileWriterPath =


    Path.Combine(Path.GetDirectoryName(Assembly.GetExecutingAssembly().Location),


    "DurationTraceFiltered.trc");


    TraceFile traceFileWriter = new TraceFile();


    chapter 5 ■ From SQL trace to extended eventS


    traceFileWriter.InitializeAsWriter(traceFileReader, traceFileWriterPath);


    // add the event where the filtering occurs


    traceFileWriter.WriteNotify += new


    WriteNotifyEventHandler(traceFileWriter_WriteNotify);


    // simply looping the writer until the end is enough.


    // Internally it reads from the reader and filters


    // through the WriteNotify event


    while (traceFileWriter.Write()) ;


    // close both to dispose of the resources


    traceFileReader.Close();


    traceFileWriter.Close();


    }


    static void traceFileWriter_WriteNotify(object sender, TraceEventArgs args)


    {


    try


    {


    object durationInMicroSeconds = args.CurrentRecord["Duration"];


    if (durationInMicroSeconds == null || (long)durationInMicroSeconds < (500


    /*ms*/ * 1000 /* to get to microseconds*/))


    {


    args.SkipRecord = true;


    return;


    }


    }


    catch (Exception ex)


    {


    Console.WriteLine(ex.Message);


    }


