    # 第 16 章：使用可用性组进行备份与还原


    作者：Grant Fritchey


    你需要确定是使用 `SQL Server 2012 企业版`，还是必须使用更低版本，因为这会影响你可以为 `SQL Server 2012` 使用的 `RAM`
    大小以及插槽和物理核心数量。


    你应当利用 `ECC DDR3 服务器内存` 极低的价格，为新服务器购买更大容量的 `RAM`。现在真的没有任何借口再为新服务器仅配置 16 `GB` 或
    32 `GB` 的 `RAM` 了。


    最后，你需要理解你的工作负载，以便做出正确的硬件选择，从而为这类工作负载获得最佳性能和可扩展性。


    随着 `Microsoft SQL Server 2012` 的发布，引入了一种全新的确保系统中数据库持续可用的机制：`AlwaysOn 可用性组`。`可用性组`
    提供了一种将单个数据库或一组数据库从主副本故障转移到一到四个次要副本的机制。这种能够使数据库保持在线状态，且几乎零数据丢失、又不需要旧的 `故障转移群集`
    共享磁盘和匹配硬件的能力，是帮助确保系统中数据访问连续性的绝佳方式。此外，可以将次要副本设置为只读副本，从而允许你将部分数据访问（原本由托管主副本的生产系统处理）分流到一个或多个次要副本上。如果这些还不够，你还可以选择将运行部分备份过程所需的服务器负载也转移到次要副本上。能够改变数据库备份的位置和方式，同时又不影响你的数据库恢复能力，这是灾难恢复可用功能方面的一项重大改进，并且它还能带来性能上的提升。


    本章将非常基础地概述如何设置和配置 `可用性组`，以让你启动并运行自己的 `可用性组`。在此基础上，我们将探讨如何配置你的 `可用性组` 以支持备份 `SQL
    Server` 实例的不同机制。最后，因为你的备份质量只取决于你最近的一次恢复操作，我们将介绍如何从这些备份中还原数据库。所有这些内容将帮助你在环境中提供更通用的灾难恢复设置。当你从生产服务器的主副本上移除诸如备份压缩开销等任务时，你还将获得一些性能方面的好处。


    有一点值得注意。你无法对 `可用性组` 运行 `完整备份`。你只能运行日志备份和 `仅复制备份`。你也不能进行 `差异备份`。因此，虽然我们会着眼于节省部分备份处理的成本，但我们讨论的并不是节省所有备份处理的成本。


    ![图片 177](img/index-381_1.png)


    ## 设置可用性组


    启动并运行一个 `可用性组` 是一项相当简单的任务。但这仅限于简单的设置。如果你的网络拓扑结构复杂，这个任务就会变得复杂得多。为了概述这个过程并继续讨论备份，我将假设一个简单的设置。


    首先，你必须配置你的 `Windows` 服务器以参与 `可用性组`。你还需要配置 `SQL Server` 实例以支持 `可用性组`。一旦这些任务完成，你就可以将一个或多个数据库添加到一个
    `可用性组` 中。首先，你需要设置 `Windows` 服务器。


    ### 配置 Windows 服务器


    `可用性组` 要求你运行 `故障转移群集` 服务，并且所有副本都是该群集内的节点。安装这个服务相当简单。你只需使用 `服务器管理器` 中的 `功能向导`，如图
    16-1 所示。


    将该服务安装到服务器上，是整个过程中最简单的一步。你不需要匹配的机器或共享硬盘驱动器。你只需要在每台机器上安装该服务。`Windows 故障转移群集服务 (WFCS)`
    有一个非常长的需求列表，详细说明了如何配置你的服务器才能使其正常工作。你可以在此处在线访问该列表：`http://technet.microsoft.com/en-us/library/cc732035`。好消息是，你不必逐一检查这个列表来验证你的系统是否已准备好进行群集。相反，你可以利用作为群集服务一部分安装的内置工具。


    在尝试设置群集之前，你需要在所有计划用于管理 `可用性组` 内副本的机器上安装该服务。你可以先创建群集，然后再将机器添加进去，但这可能会造成混淆。此外，如果你已经配置了一个群集并将其投入生产环境，选择在以后添加服务器会有导致停机时间的风险。最好提前安装和配置你需要的内容。


    ***图 16-1.** 安装 `故障转移群集` 服务。*


    ![图片 178](img/index-382_1.png)


    一旦你在服务器上安装了群集服务，你就可以连接到其中一台服务器，并使用 `故障转移群集管理器` 软件来设置你的群集。但首先，你应该验证你的服务器是否支持该群集。你需要运行
    `验证配置向导` 来完成此操作。该界面要求你简单地提供将参与群集的服务器。向导将为你验证群集的所有要求。错误将阻止群集创建成功，进而也会阻止你的 `可用性组`
    创建成功。必须直接解决这些错误。警告则只是表明参与群集的一台或多台服务器可能存在配置或硬件问题，导致其无法始终作为群集服务的一部分保持可用。你应该理解这些警告的含义，但它们不会阻止你创建群集。


    完成验证向导中的步骤后，你就可以开始创建群集了。由于你不是在这些机器之间设置各种共享资源，你只需要像在验证过程中那样，为每台服务器提供连接信息。


    ## SQL Server 可用性组


    群集设置完成，并且所有需要的服务器都已成为其成员后，你需要设置 `SQL Server` 以创建和支持 `可用性组`。你需要做的第一件事是运行 `SQL Server
    配置管理器`。你需要对 `SQL Server` 服务本身进行一项修改。从 `配置管理器` 窗口中打开该服务的属性，然后单击 `AlwaysOn 高可用性`
    选项卡，如图 16-2 所示。


    选中 `启用 AlwaysOn 可用性组` 复选框。这将使此服务器能够参与 `可用性组`。这确实需要重启机器，所以如果你要将此功能添加到生产服务器，请预留一些停机时间。计划参与你的
    `可用性组` 的每台服务器都需要以相同的方式进行配置。


    现在，服务器已被指定为群集中的一个节点，并且启用了 `AlwaysOn 高可用性`，你已准备好开始创建 `可用性组`。你需要打开 `SQL Server Management
    Studio (SSMS)` 并连接到群集环境中的其中一台服务器。`可用性组` 可以通过 `SSMS` 或 `T-SQL` 来管理。如果你要设置和维护大量此类环境，你会希望非常熟悉使用
    `T-SQL` 方法进行操作。为了简单起见

