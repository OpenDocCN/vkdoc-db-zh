    # 从 SQL 跟踪到扩展事件


    ## 会话创建用户界面


    要访问会话创建用户界面，您需要导航到**服务器**节点，然后是**管理**节点，最后是**扩展事件**节点。右键单击**会话**节点，并从上下文菜单中启动探查器。您可以从两个选项中选择：**新建会话向导**项和**新建会话…**项。向导允许您以向导模式创建新会话，但它仅限于使用`环形缓冲区`和`事件文件`目标。**新建会话…**选项则能让您释放**扩展事件**的全部功能。由于向导用户界面是**新建会话…**用户界面的一个子集，我们将重点介绍后者。


    会话创建用户界面由四个主要选项页面组成。


    ### 图 5-10. 扩展事件会话创建页面：常规


    第一个页面是**常规**页面，如图 5-10 所示。您可以在此页面上命名会话、选择一个现有模板作为会话基础、设置会话计划选项，并开启因果关系跟踪。


    ![Image 70](img/index-136_1.png)


    共有九个内置模板，图中所示的所有数据都基于**连接跟踪**模板。


    ### 图 5-11. 扩展事件会话创建页面：事件 - 第 1 部分


    图 5-11 显示了**事件**页面的第一部分。此页面是会话创建过程的核心。在这里，您选择要跟踪的事件、它们的字段、额外操作以及任何事件筛选器。您可以按事件名称、描述、字段或以上所有条件来筛选事件。这大大简化了查找正确事件的工作。左侧网格中有一个`类别`列，用于说明事件所属的类别，而`通道`类别则告诉您该事件进入哪个**Windows
    事件跟踪** (`ETW`)通道。如果您点击`通道`标题，会注意到**调试**通道中的事件未显示出来。这是因为正常的 DBA 跟踪不需要它们。它们通常在 Microsoft
    支持人员需要对您的服务器进行故障排除时使用。您可以根据这两个列来筛选事件。左侧网格下方是事件及其字段的描述。


    右侧网格显示了您已选择跟踪的左侧网格中的哪些事件。带有小闪电图标的列列出了我们为该事件跟踪的操作数量，筛选器列表示该事件是否存在筛选器。


    ![Image 71](img/index-137_1.png)


    ### 图 5-12. 扩展事件会话创建页面：事件 - 第 2 部分


    图 5-12 显示了**事件**页面的第二部分。通过点击图 5-11 所示页面右上角的**配置**按钮，即可进入此部分。您选择的事件现在显示在左侧的网格中。网格下方是所选事件的描述。右侧的网格有三个选项卡。第一个名为**全局字段(操作)**，允许您选择要为此事件收集的操作。第二个选项卡名为**筛选器(谓词)**，使我们能够添加各种简单和复杂的筛选器。在第三个名为**事件字段**的选项卡中，您可以看到所选事件的所有字段。默认情况下不会自动收集的字段，其左侧会有一个复选框。在图
    5-12 中，您可以看到`options_text`字段将被收集，但`database_name`字段不会，因为您已经有了`database_id`。


    ![Image 72](img/index-138_1.png)


    ### 图 5-13. 扩展事件会话创建页面：数据存储


    图 5-13 显示了**数据存储**页面。**数据存储**只是目标的另一个名称。您可以看到在此图中选择了`环形缓冲区`目标。我保留了缓冲区中保留事件的默认数量（1000），并将`环形缓冲区`的最大内存设置为
    10 MB。此外，我创建了一个全事件 FIFO 缓冲区，而不是按事件类型划分的 FIFO 缓冲区。您可以在此页面上添加任意多个目标。


    ![Image 73](img/index-139_1.png)

