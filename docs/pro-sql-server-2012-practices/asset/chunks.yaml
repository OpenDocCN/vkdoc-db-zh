    ## 第 18 章 ■ 针对峰值负载的调优


    既然您已经理解了目标，我将把刚刚描述的数据捕获原则应用到一个示例场景中。在开始这样一个流程之前，您需要回答一些问题，以驱动数据收集器的配置。表 18-3 展示了需要回答的问题类型的示例。如果无法回答这些问题，数据收集器可能无法在核心业务时间段或针对正确的功能收集数据。如果未能捕获到峰值窗口时间，您最终将得到具有误导性的数据用于分析。


    ### 表 18-3. 创建数据收集器之前需要提出的关键问题。


    | 问题 | 答案 |

    | :--- | :--- |

    | 数据收集器的目的是什么？ | 为 SQL Server 建立基线 |

    | 应用程序的峰值时段是什么时候？ | 一月至三月，早上 8 点到晚上 8 点；四月一日至四月十五日，早上 7 点到午夜 12 点 |

    | 一个完整的业务周期是多少天？ | ![Image 202](img/index-441_1.png) |

    | 可以将 `Perfmon` 文件放置在什么位置？ | `D:\perflogs` |

    | SQL Server 使用了哪些功能？ | `数据库引擎` |

    | 核心应用程序使用的实例名称是什么？ | `Default` |


    使用上面显示的答案，按照以下步骤在 `Perfmon` 中创建一个新的数据收集器集：

    1.  要打开 `Perfmon`，点击 **开始** → **管理工具** 并选择 **性能监视器**。

    2.  `Perfmon` 打开后，展开 **数据收集器集**。右键单击 **用户定义**，并从上下文菜单中选择 **新建**。

    3.  将出现如图 18-2 所示的对话框。您需要在这里做出选择。如果您是 `Perfmon` 的新手，可能希望选择 **从模板创建**，以便使用预定义的选项。在您使用过
    `Perfmon` 几次之后，选择 **手动创建** 是更好的方式。手动模式允许您创建一个根据具体情境定制的数据收集器。做出您的选择，然后单击 **下一步**。


    **图 18-2.** 创建手动数据收集器。


    4.  下一步是定义您将收集的数据类型（如图 18-3 所示）。通常，您会选择 **性能计数器**，因为您可以使用此选项从系统收集性能数据。但是，如您所见，对话框中还有其他选项可用于捕获有关服务器的更多数据。


    **图 18-3.** 创建性能计数器数据收集器。


    5.  选择 **性能计数器** 并单击 **下一步** 后，您需要选择要捕获的对象（如图 18-4 所示）。有许多选项，这可能令人望而生畏。在选择任何对象之前，请回想系统的核心领域：CPU、网络、磁盘、内存和
    `SQL Server`。目标是捕获这些领域的高层级数据。对于前面定义的场景，将使用表 18-4 中定义的计数器。您可以使用此配置作为起点，应用于任何您希望深入了解系统繁忙程度、系统健康状态和系统痛点的系统。


    **图 18-4.** 显示可选择用于监控 SQL Server、Windows 和许多其他应用程序的对象。


    > **注意** `SQL Server` 动态管理视图 (`DMV`) 可以为许多与 `SQL Server` 相关的 `Performance Monitor`
    计数器提供额外数据。如果某个对象计数器记录的值超过了特定阈值，并且需要更多信息，请考虑使用 `DMV` 来更好地呈现情况。


    ### 表 18-4. 显示所有推荐捕获的 `Perfmon` 对象计数器。


    | 类别 | 计数器组\计数器 | 备注 |

    | :--- | :--- | :--- |

    | `内存` | `Memory\Available Mbytes` | 确定操作系统的内存健康状况。如果 `Pages/sec` 计数器水平高于 X 或
    `Available Mbytes` 数量较低，请检查操作系统上所有运行进程的内存使用情况。检查 `SQL Server` 内部的 `最大服务器内存使用量`，并验证其是否设置得过高。
    |

    | `内存` | `Memory\Pages/sec` | |

    | `内存` | `Paging File(\??\C:\pagefile.sys)\% Usage` | |

