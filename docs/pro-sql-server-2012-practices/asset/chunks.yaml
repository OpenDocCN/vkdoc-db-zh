    • Error Handling—For space considerations, the error handling lines on the code
    has been removed.


    • Archive—The Maintenance Work section of code clears the Daily_Report table after
    the data has been archived. If the examples are followed, the report wizard in
    Visual Studio 2010 is an easy way to build a report that can be subscribed to.


    Scheduling the Data Collection


    To schedule the data collection, create a new SQL Server Agent job. After the
    job has been named and a description added, add a new task. For the command portion
    of the task, execute the calling stored procedure created in the previous example
    (see Figure 6-2).


    ***Figure 6-2.** Creating the job task*


    The last step to automating the data collection is to schedule the job. The code
    in the examples has been created with the intention that the majority of the data
    collection steps would execute once a day.


    chapter 6 ■ the Utility Database


    The scheduling of the job for once a day is a natural fit, but not required; however,
    note that some of the stored procedures might need to be altered.


    Conclusion


    We have focused on how to organize the data storage, different ways to retrieve
    your important data, and scheduling the collection of information. After you have
    started getting some data collected into your utility database, you should soon
    start seeing the benefits. The next steps to expand the usefulness of the utility
    database include the following:


    • Use Visual Studio to build a report that can be deployed and subscribed to.
    This simple step-by-step wizard adds quite a bit to your custom utility database.


    • Deploy your utility database to all the SQL Servers in your domain. With a few


    modifications to tables and stored procedures, tracking server names or instance


    names is an easy code change. With linked servers, SSIS or PowerShell data can
    be


    collected and centralized with little additional effort.


    • Add additional counters by using the techniques discussed. At the time of authoring,
    I am working on reviewing server inventory tracking that was implemented by a


    friend of mine.


    • Consider using PowerShell to deploy your utility database; the larger your


    environment, the more helpful this is.


    •


    Most important, don’t forget to back up your database. After putting all this
    effort into getting the data, make sure you keep your data.


    If all of this information or code development appears overwhelming, start small.
    Add the dbUtilities database to you server, then add one counter. The database
    growth counter is a good one to start with because the value of the historical
    data is high, yet the complexity to add it is not.


    **chapter 7**


    ■ ■ ■


    **Indexing Outside the Bubble**


    **By Jason Strate**


    When it comes to indexing, there are many best practices we could adhere to. These
    practices help define how and when we should build our indexes. They provide a
    starting point for us, and help guide us through creating the best set of indexes
    on the tables in our databases. Some popular best practices include the following:


    • Use clustered indexes on primary keys, by default.


    • Index on search columns.


    • Use a database-level fill factor.


    • Use an index-level fill factor.


    •


    Index on foreign key columns.'
  trans: '# 第六章 ■ 实用工具数据库


    ## 数据使用


    一旦完成数据收集和存储方法的创建，数据的收集与报告便构成了实用工具数据库的完整开发周期。通过配置警报、触发器并创建 SQL 邮件配置文件，数据监控同样可以实现自动化。


    ## 自动化数据收集


    实用工具数据库的主要用途是按固定时间表收集并存储信息，以评估 SQL Server 及其承载数据库的运行状态与历史记录。按计划收集数据使自动化变得简单。实现所有数据收集点自动化的第一步是明确需要收集哪些收集点、收集频率以及收集发生的具体时间。若使用本章示例中创建的存储过程，可以每天隔离出少量数据点进行收集。


    - `Get_Drive_Space_Free`

    - `Get_Failed_Jobs`

    - `Get_File_Growth`

    - `Get_Filtered_Error_Log`

    - `Get_Index_Fragmentation`


    可以通过嵌套执行各存储过程的方式，创建一个存储过程来调用每一个过程。调用存储过程的命名应直观体现收集频率。


    ```sql

    USE [dbUtilities]

    GO


    CREATE PROCEDURE Daily_Data_Collection

    AS

    SET NOCOUNT on


    -- 维护工作 --

    INSERT INTO [dbo].[Daily_Report_Archive]

    SELECT * FROM [dbo].[Daily_Report]

    DELETE Daily_Report


    -- 磁盘空间 --

    EXECUTE Get_Drive_Space_Free

    EXECUTE Get_File_Growth


    -- 读取错误日志 --

    EXECUTE Get_Filtered_Error_Log


    -- 获取失败作业 --

    EXECUTE Get_Failed_Jobs


    -- 获取索引碎片 --

    EXECUTE Get_Index_Fragmentation


    -- 获取过程执行时间 --

    EXECUTE Get_Proc_Exection_Times

    GO

    ```


    以下是一些值得注意的事项：


    ![图片 79](img/index-168_1.png)


    - 错误处理——出于篇幅考虑，代码中的错误处理行已被移除。

    - 存档——代码的维护工作部分会在数据归档后清空 `Daily_Report` 表。若遵循示例操作，Visual Studio 2010 中的报告向导是构建可订阅报告的便捷方式。


    ## 调度数据收集


    要调度数据收集，请创建一个新的 SQL Server Agent 作业。为作业命名并添加描述后，新增一个任务。对于任务的命令部分，执行在上一示例中创建的调用存储过程（见图
    6-2）。


    ***图 6-2.** 创建作业任务*


    实现数据收集自动化的最后一步是调度该作业。示例中的代码设计初衷是让大部分数据收集步骤每天执行一次。


    将作业调度为每天执行是自然的选择，但非强制要求；不过请注意，某些存储过程可能需要相应调整。


    ## 总结


    我们重点探讨了如何组织数据存储、检索重要数据的不同方法以及调度信息收集。一旦开始将数据收集到实用工具数据库中，您应很快能看到其带来的益处。扩展实用工具数据库用途的后续步骤包括：


    - 使用 Visual Studio 构建可部署和订阅的报告。这个简单的分步向导能为您的自定义实用工具数据库增添许多功能。

    - 将实用工具数据库部署到您域中的所有 SQL Server。通过少量修改表和存储过程，跟踪服务器名称或实例名称的代码更改十分容易。借助链接服务器、SSIS
    或 PowerShell，数据可以轻松实现集中收集。

    - 运用讨论的技术添加额外的计数器。在撰写本文时，我正在审阅由一位朋友实现的服务器清单跟踪方案。

    - 考虑使用 PowerShell 部署您的实用工具数据库；环境规模越大，此方法越有益。

    - 最重要的是，不要忘记备份您的数据库。在投入大量精力收集数据后，请务必妥善保存这些数据。


    如果所有这些信息或代码开发显得过于繁杂，请从小处着手。将 `dbUtilities` 数据库添加到您的服务器，然后添加一个计数器。数据库增长计数器是一个不错的起点，因为其历史数据价值高，但添加复杂度却不高。


    # 第七章 ■ ■ ■


    ## 跳出思维定式谈索引

    作者：Jason Strate


    谈及索引，我们可遵循许多最佳实践。这些实践有助于定义如何以及何时构建索引。它们为我们提供了起点，并指导我们为数据库中的表创建最优的索引集。一些流行的最佳实践包括：


    - 默认情况下，在主键上使用聚集索引。

    - 在搜索列上创建索引。

    - 使用数据库级别的填充因子。

    - 使用索引级别的填充因子。

    - 在外键列上创建索引。'
- fmt: '# Indexing Outside the Bubble


    This list provides a glimpse of what we should be looking for when indexing a
    table. The one thing missing from this list is *context*. It is easy to take a
    query, look at the tables, and identify the index that is best suited for that
    query. Unfortunately, in most of our SQL Server environments, there will be more
    than one query run on the server. In fact, on most databases, there will be hundreds
    or thousands of queries written against each table. With all of that activity,
    there are numerous variations of indexes that can be added to the table to get
    the best performance for each query. This could lead to a situation where the
    number of indexes on the tables is unsustainable. An insert or update would require
    so much effort from the SQL Server that the resulting blocking and locking would
    make the table unusable.


    For these reasons, you should not use a query alone as the sole motivation for
    building an index.


    Working in isolation like this is sometimes referred to as `working in a bubble`.
    The problem with this is that because any one index will affect the other queries
    that are executed against a table, you must consider them all. You must work outside
    the bubble of a single query and consider all queries.


    Along the same lines, an index that provides the best improvement for a query
    will not always be justified. If the query is not executed frequently or doesn’t
    have a business need sufficient to justify it, then it isn’t always necessary
    to have the perfect index. In these cases, to borrow from how the query optimizer
    builds execution plans, the query needs a set of indexes that are `good enough`
    to get the job done.


    In this chapter, we’re going to look at how you can break out of the bubble and
    start indexing for all of the queries that are running against a table, and the
    database in which it resides. We’ll look at at two general areas of justifications
    for indexes. The first will be the workload that a database is encountering.


    Through this, we’ll examine the tools available to investigate and analyze how
    to uncover and design the best indexes for the table. In the second part of the
    chapter, we’ll examine how that workload isn’t necessarily the only consideration
    when designing indexes.


    ## The Environment Bubble


    The first bubble to break out of when indexing is the environment bubble. You
    must consider not only the query at hand, but the other queries on the table.
    Of the two bubbles, this will be the easier, or rather more straightforward, to
    break out of. In order to so, you should use the following two steps:


    1.  Identify missing indexes.

    2.  Evaluate a workload.


    By following these steps, you will break out of the trap of indexing within a
    bubble and change your indexing practices to consider all of the tables and indexes
    in the database, rather than the narrow scope of a single query.


    ## Identifying Missing Indexes


    The first place to start when indexing is with the missing index recommendations
    that are available within the SQL Server instance. The main reason to start here
    is that the SQL Server query optimizer has already determined that these indexing
    opportunities exist. While there might be other methods for improving query performance
    outside of adding the missing index, the addition of the index is one of the lowest
    risk activities you can do to improve performance.


    A missing index recommendation can be created whenever a plan is generated for
    a query. If the statistics on the column are selective enough that an index could
    improve performance of the query, then the index schema is added to the list of
    missing index recommendations. However, be aware that there are a few situations
    where this won’t happen. First, if there are already 500 recommendations, then
    no further recommendations will be made. Second, missing index recommendations
    won’t include clustered, spatial, or columnstore indexes.


    Each missing index recommendation includes a number of attributes that define
    the recommendation. Depending on the source of the recommendation, which we will
    discuss later in this chapter, the location of the attribute’s values will differ.
    Table 7-1 lists all the attributes that will always be included for each source.


    ### Table 7-1. Missing Index Attributes


    **Attribute** | **Description**

    ---|---

    `Statement` | Name of the database, schema, and table where the index is missing.

    `Equality Columns` | Comma-separated list of columns that contribute to equality
    predicates. These predicates are used when there is a specific value that is used
    for filtering.

    `Inequality Columns` | Comma-separated list of columns that contribute to inequality
    predicates. An inequality predicate occurs when a range of values is filtered.

    `Included Columns` | Comma-separated list of columns needed as covering columns
    for the query.

    `Impact` | Average percentage benefit that user queries could experience if this
    missing index group had been implemented.


    There are some activities that can cause missing index recommendations to be dropped
    from the list of missing indexes. The first occurs whenever indexes are added
    to the affected table. Since the new index could potentially cover the columns
    in the missing index, the suggestions for that table are removed from the queue.
    In a similar note, when indexes are rebuilt or defragmented, the missing index
    suggestions will also be removed.


    As we review some missing index scenarios, there are a few recommendation limitations
    that are important to keep in mind. First, the missing index is in regards to
    the plan that was created. Even if the index is created, there still could be
    a different missing index suggestion that provides a greater improvement that
    hadn’t been considered by the current plan. Second, the costing information for
    the inequality columns is less accurate than that of the equality columns because
    the inequality columns are based on ranges.


    With all of the considerations, you might think that using the missing index recommendations
    doesn’t hold much value. Fortunately, that is quite far from the truth. The recommendations
    that are provided allow you to immediately begin identifying indexing opportunities
    with minimal work. When done on a regular basis, the information is fresh, relevant,
    and provides a window into indexes that can easily improve performance on your
    SQL Server database.


    There are two ways within SQL Server to access the missing index recommendations:
    the dynamic management objects and the plan cache. In the rest of this section,
    we’ll look at how to use these sources to obtain the indexing suggestions.


    ### Dynamic Management Objects


    The first method for accessing missing index recommendations is through dynamic
    management objects (DMOs). Through the DMOs, the missing index information can
    be collected and viewed. The DMOs are as follows:


    *   `sys.dm_db_missing_index_details`: This returns a list of missing index recommendations;
    each row represents one suggested index.

    *   `sys.dm_db_missing_index_group_stats`: This returns statistical information
    about groups of missing indexes.

    *   `sys.dm_db_missing_index_groups`: This returns information about what missing
    indexes are contained in a specific missing index group.

    *   `sys.dm_db_missing_index_columns`: For each `index_handle` provided, the results
    returns the table columns that are missing an index.


    The easiest manner to use the DMOs to return missing index information is by using
    the first three DMOs in this list (`sys.dm_db_missing_index_details`, `sys.dm_db_missing_index_group_stats`,
    and `sys.dm_db_missing_index_groups`). These three can be joined together to procedure
    a query that returns one row for every recommendation that has been identified.
    The query in `Listing 7-1` uses these DMOs to return missing index recommendations.'
