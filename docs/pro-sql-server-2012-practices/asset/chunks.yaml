  trans: '

    ## 第 6 章 ■ 实用工具数据库


    **注意** 我倾向于将 `.dll` 文件放在我存储数据的目录中。这样，如果 SQL Server 位于集群上，`.dll` 文件将可在集群的任何节点上访问。


    SQL Server 需要注册 `.dll` 的位置。`create assembly` 语句用于满足此需求。


    ```sql

    USE [dbUtilities]

    GO

    CREATE ASSEMBLY [dbUtilities.Database.CLRFunctions]

    FROM ''C:\Data\dbstats.Database.CLRFunctions .dll''

    WITH PERMISSION_SET = UNSAFE

    GO

    ```


    SQL Server 可以通过一个函数来执行 `.dll`。


    ```sql

    USE [dbUtilities]

    GO

    CREATE FUNCTION [dbo].[GetCPUUTI]()

    RETURNS nchar WITH EXECUTE AS CALLER

    AS

    EXTERNAL NAME [dbUtilities.Database.CLRFunctions].[UserDefinedFunctions].[GetCPUUTI]

    GO

    ```


    最后一步是创建存储过程，供进程调用以检索处理器信息并最终存储它。


    ```sql

    USE [dbUtilities]

    GO

    CREATE PROCEDURE GetProcUTI

    AS

    Insert Into Processor_UTI (ReadingDate,ProcessorUTI)

    Select Getdate(),Isnull(Round(dbo.getCPUUTI(), 0),0)

    GO

    ```


    ### 错误日志


    错误日志中会出现大量消息、警告和错误。需要定期审查这些错误，以确保不会遗漏任何关键的健康状况信息。自动化和过滤错误日志有助于避免遗漏关键消息。这些数据的本质位于
    SQL Server 的核心，并与当前的健康状况相关。没有必要在已报告的消息之外存储数据。过滤错误日志的操作针对已创建的 `Daily_Report` 表进行。


    ```sql

    USE [dbUtilities]

    GO

    CREATE PROCEDURE [dbo].[Get_Filtered_Error_Log]

    AS

    DECLARE @Errorlog TABLE (LogDate datetime, ProcessorInfo VARCHAR(100),ErrorMSG
    VARCHAR(2000))

    INSERT INTO @Errorlog

    EXEC sp_executesql N''xp_readerrorlog''

    DELETE

    FROM @Errorlog

    WHERE ErrorMSG LIKE ''%Log was backed up%''

    DELETE

    FROM @Errorlog

    WHERE ErrorMSG LIKE ''%Setting database option COMPATIBILITY_LEVEL%''

    DELETE

    FROM @Errorlog

    WHERE ErrorMSG LIKE ''%were backed up%''

    DELETE

    FROM @Errorlog

    WHERE ErrorMSG LIKE ''%without errors%''

    INSERT INTO dbUtilities.dbo.Daily_Report

    SELECT ''Error Log'',Logdate,SUBSTRING(ErrorMSG, 1, 2000)

    FROM @Errorlog

    WHERE LogDate > DATEADD(dd, -1, GETDATE())

    GO

    ```


    该存储过程的核心是使用一个扩展存储过程将错误日志中的数据加载到临时表中。因为我们不希望审查错误日志中的所有消息，并且将其用作来源审查，所以成功消息以及已确定为无需审查的消息会从临时表中删除。然后，筛选出最近一天的数据，并将其插入到
    `Daily_Report` 表中。


    **注意** 将错误日志保留较长时间非常重要。默认情况下，仅当 SQL Server 服务启动时才会创建新的错误日志。对于不经常重启的 SQL Server，日志文件可能更难导航。考虑使用
    `sp_Cycle_Errorlog` 来保持错误日志的可管理性。


    ### 索引


    当表中的记录被插入或更新时，索引会产生碎片。作为数据库管理员，你的部分职责很可能是确保数据库运行良好。SQL Server 2012 提供了维护计划，你可以在其中添加重新索引；但是，可能存在需要你在维护计划之外创建索引策略的情况。


    **注意** 不同的表碎片产生的速率不同；数据变更频繁的表比数据静态的表碎片产生得更快。当发生变化的数据量很关键时（例如，当你在较小带宽上使用数据库镜像时），这一点就变得很重要。因为重建索引时，记录的移动会被记录下来，这些事务会被推送到镜像。当可能不需要时（例如，重新索引一个不需要重新索引的索引），为何要创建不必要的事务和流量？

    '
- fmt: "# Chapter 6: The Utility Database\n\n## Population of the Index_Fragmentation\
    \ Table\n\nThe table the utility database uses to keep track of index fragmentation\
    \ has the following structure:\n\n```sql\nUSE [dbUtilities]\nGO\nCREATE TABLE\
    \ [dbo].[Index_Fragmentation](\n    [IndexFragID] [int] IDENTITY(1,1) NOT NULL,\n\
    \    [DatabaseName] [Sysname] NULL,\n    [OBjectName] [Sysname] NULL,\n    [IndexName]\
    \ [Sysname] NULL,\n    [Index_Type] [nvarchar](120) NULL,\n    [Fragmentation]\
    \ [float] NULL,\n    [ReadingDate] [datetime] NULL,\n    CONSTRAINT [PK_IndexFragID]\
    \ PRIMARY KEY CLUSTERED\n    ([IndexFragID])\n)\nGO\n```\n\nPopulation of the\
    \ `Index_Fragmentation` table is accomplished using the following stored procedure\
    \ to query the `sys.indexes` table. The granularity in this example includes database,\
    \ table, and index. With a few added lines, the procedure can be modified to look\
    \ at partitions and all the databases on a server.\n\n```sql\nUSE [dbUtilities]\n\
    GO\nCREATE PROCEDURE Get_Index_Fragmentation\nAS\nDECLARE @objectID int\nDECLARE\
    \ @IndexID int\nDECLARE @Index_Fragmentation TABLE ([DatabaseName] [Sysname],\
    \ DB_ID int,\n    [OBjectName] [Sysname], ObjectID int, [IndexName] [Sysname],\
    \ IndexId int,\n    [Index_Type] [nvarchar](120),[Fragmentation] [float])\n\n\
    INSERT INTO @Index_Fragmentation ([DatabaseName], [DB_ID], [OBjectName],\n   \
    \ [ObjectID], [IndexName], [IndexId], [Index_Type])\nSelect\n    db_name(), db_ID(),\
    \ object_schema_name(indexes.object_id) + '.' +\n    object_name(indexes.object_id),OBJECT_ID,\
    \ indexes.name, indexes.index_id,\n    indexes.type_desc\nFROM sys.indexes\nWhere\
    \ object_schema_name(indexes.object_id) not like 'sys'\n\nDECLARE Get_Frag CURSOR\
    \ FOR SELECT ObjectID, IndexID FROM\n    @Index_Fragmentation;\nOpen Get_Frag\n\
    WHILE 1=1\nBEGIN\n    FETCH NEXT from Get_FRAG Into @OBJECTID, @INDEXID;\n   \
    \ IF @@FETCH_STATUS < 0 BREAK\n    UPDATE @Index_Fragmentation\n    SET Fragmentation\
    \ = avg_fragmentation_in_percent\n    from\n        sys.dm_db_index_physical_stats(db_id(),@ObjectID,@IndexID,\
    \ null, null)\n    WHERE ObjectID = @ObjectID and IndexId = @IndexID\nEND\nCLOSE\
    \ Get_Frag\nDEALLOCATE Get_Frag\n\nINSERT INTO Index_Fragmentation\n    ([DatabaseName],\
    \ [OBjectName], [IndexName], [Index_Type],\n    [Fragmentation], [ReadingDate])\n\
    Select [DatabaseName], [OBjectName], [IndexName], [Index_Type],\n    [Fragmentation],\
    \ GETDATE()\nFrom @Index_Fragmentation\nGO\n```\n\nAfter your utility database\
    \ has the index fragmentation stored, index maintenance can be very strategic.\
    \ Code can be written that includes decision factors in rebuilding or defragmenting\
    \ an index based on fragmentation.\n\n## Stored Procedure Performance\n\nTracking\
    \ stored procedure performance can be critical in many complex environments. The\
    \ flexibility of SQL Server and the demands on new features for applications that\
    \ require database support can require hours of code reviews to validate performance\
    \ before release. Often, this is not an option due to the time commitment; therefore,\
    \ understanding the performance patterns on the stored procedures, historically,\
    \ is critical.\n\n```sql\nUSE [dbUtilities]\nGO\nCREATE TABLE [dbo].[Procedure_Execution_Times](\n\
    \    [ProcExecutionReadingID] [int] IDENTITY(1,1) NOT NULL,\n    [DatabaseName]\
    \ [Sysname],\n    [SPName] [Sysname] NULL,\n    [ExeCount] [bigint] NULL,\n  \
    \  [ExePerSec] [bigint] NULL,\n    [AvgWorkerTime] [bigint] NULL,\n    [TotalWorkerTime]\
    \ [bigint] NULL,\n    [AvgElapsedTime] [bigint] NULL,\n    [MaxLogicalReads] [bigint]\
    \ NULL,\n    [MaxLogicalWrites] [bigint] NULL,\n    [TotalPhysicalReads] [bigint]\
    \ NULL,\n    [DateRecorded] [datetime] NULL,\n    CONSTRAINT [PK_Procedure_Execution_Times_ID]\
    \ PRIMARY KEY CLUSTERED\n    ([ProcExecutionReadingID])\n)\nGO\n```\n\nThe stored\
    \ procedure execution times can be retrieved by looking at the `sys.dm_exec_query_stats`\
    \ DMV. When using a DMV as the source of statistics, it is important to understand\
    \ the source of this information. With the `sys.dm_exec_query_stats` DMV, the\
    \ data is based on the cache. When the execution plan is no longer in cache, the\
    \ corresponding statistics are removed from the `sys.dm_exec_query_stats` DMV.\n\
    \n`Note` I highly recommend looking at some of the other useful DMVs that Glenn\
    \ Berry has on his blog at [http://sqlserverperformance.wordpress.com](http://sqlserverperformance.wordpress.com).\n\
    \n```sql\nUSE [dbUtilities]\nGO\nCREATE PROCEDURE [dbo].[Get_Proc_Exection_Times]\n\
    AS\nINSERT INTO dbUtilities..Procedure_Execution_Times\n    (DatabaseName,SPName,\
    \ ExeCount, ExePerSec, AvgWorkerTime, TotalWorkerTime,\n    AvgElapsedTime, MaxLogicalReads,\
    \ MaxLogicalWrites, TotalPhysicalReads,\n    DateRecorded)\nSELECT\n    DB_Name()\
    \ AS dbname,\n    OBJECT_SCHEMA_NAME(qt.objectid, qt.dbid) + '.' + object_name(qt.objectid,\n\
    \    qt.dbid) AS spname,\n    qs.execution_count AS 'Execution Count',\n    isnull(qs.execution_count,.0001)/Isnull(DATEDIFF(Second,\
    \ qs.creation_time,\n    GetDate()),.0001) AS 'Calls/Second',\n    isnull(qs.total_worker_time,1)/isnull(qs.execution_count,1)\
    \ AS\n    'AvgWorkerTime',\n    qs.total_worker_time AS 'TotalWorkerTime',\n \
    \   isnull(qs.total_elapsed_time,1)/isnull(qs.execution_count,1) AS\n    'AvgElapsedTime',\n\
    \    qs.max_logical_reads,\n    qs.max_logical_writes,\n    qs.total_physical_reads,\n\
    \    GETDATE() AS RecordedDate\nFROM sys.dm_exec_query_stats AS qs\nCROSS APPLY\
    \ sys.dm_exec_sql_text(qs.sql_handle) AS qt\nORDER BY qs.execution_count DESC\n\
    GO\n```\n\nThis information should help answer questions such as what stored procedure\
    \ is executed the most often, and what stored procedures have the longest duration.\n\
    \n## Failed Jobs\n\nKeep track of failed jobs over the last 48 hours by querying\
    \ the system tables in the `msdb` database and inserting the results into the\
    \ `Daily_Report` table. Because this data is used as an overview and notification\
    \ to the report viewer of potential problems, minimum data is stored and there\
    \ is no historical use, in this context. The stored procedure can be altered to\
    \ keep a longer, more detailed history if it is a requirement, and the history\
    \ in the `msdb` database does not meet the requirements.\n\n```sql\nUSE [dbUtilities]\n\
    GO\nCREATE PROCEDURE Get_Failed_Jobs\nAS\nINSERT INTO Daily_Report\n    (EventStatus,\
    \ EventDate, Event)\nSELECT\n    'Job Failed',\n    msdb.dbo.agent_datetime(sjh.run_date,\
    \ sjh.run_time),\n    'SQL Server Job Failed ' + Name\nFROM msdb..sysjobs sj\n\
    Join msdb..sysjobhistory sjh\n    on sj.job_id = sjh.job_id and sjh.run_status\
    \ = 0\nWHERE Enabled = 1 and step_id = 0\n    AND msdb.dbo.agent_datetime(sjh.run_date,\
    \ sjh.run_time) > Dateadd(dd,\n    -2,GetDate())\nGO\n```\n\n`Note` You can modify\
    \ the option for keeping longer history on SQL Server 2012 job and task history\
    \ by adjusting the job history properties in the SQL Server Agent properties.\n\
    \n## The Visibility of Information\n\nThe visibility of information that SQL Server\
    \ 2012 provides helps you get the important information required to manage the\
    \ servers and databases. Up to this point, the examples have been focused on the\
    \ core installation of SQL Server, so all the tables and stored procedures have\
    \ been created in the `dbo` schema. In the next section, the examples focus on\
    \ feature-specific counters. In your environment, you may use all, some, or none\
    \ of the features. These examples use a different schema for each feature to help\
    \ with the deployment of the code based on used features. I would recommend you\
    \ consider using a like method to organize the information you are collecting.\n\
    \n## Reporting Services\n\nSQL Server Reporting Services (SSRS) has made report\
    \ authoring and deployment easy and common. Yet, a thorough understanding of how\
    \ Reporting Services is used is not as common. With a few simple steps, questions\
    \ such as what is the most common report, what is the longest running report,\
    \ and what step of building the report takes the most time can be answered with\
    \ confidence.\n\n`Note` Recently, I received a call that the reports were not\
    \ performing well. After a few quick queries, I was able to isolate what reports\
    \ were having issues, and was able to determine that the performance degradation\
    \ was on the Reporting Services machine with the rendering time, rather than the\
    \ database server and the data retrieval time.\n\nHaving this information allowed\
    \ me to focus my work where it could make the largest impact."
