    \ 2008 没有扩展事件的 UI，SQL Server 2012 为此提供了一个用于创建会话和分析的 UI。与 SQL Server Profiler 不同，两者的\
    \ UI 都内置于 SSMS 中。\n\n### 会话创建 UI"
- fmt: '# From SQL Trace to Extended Events


    ## Session Creation UI


    To access the session creation UI, you have to navigate to the **Server** node,
    then to the **Management** node, and finally go to the **Extended Events** node.
    Right-click on the **sessions** node, and start the profiler from the context
    menu. There are two options you can choose from: the **New Session Wizard** item
    and the **New Session…** item. The wizard lets you create a new session in wizard
    style, but it limits you to only the `Ring Buffer` and `Event File` targets. The
    **New Session…** option lets you unleash the full power of the **Extended Events**.
    Because the wizard UI is a subset of the **New Session…** UI we’ll take a look
    at the latter.


    There are four main option pages that comprise the session creation UI.


    ### Figure 5-10. Extended Events Session creation page: General


    The first page is the **General** page displayed in Figure 5-10. On it you can
    name a session, choose an existing template to base the session on, set session
    scheduling options, and turn on causality tracking.


    ![Image 70](index-136_1.png)


    There are nine built in templates and all the data you can see in the figures
    are based on the **Connection Tracking** template.


    ### Figure 5-11. Extended Events Session creation page: Events - part 1


    Figure 5-11 shows the first part of the **Events** page. This page is the heart
    of the session creation process. Here you choose the events you’ll track, their
    fields, extra actions, and any event filters. You can filter the events by event
    names, their descriptions, their fields, or all of the above. This makes the job
    of finding the correct event much simpler. In the left grid there’s a `Category`
    column which tells you which category the events falls under, and the `Channel`
    category tells you which **Event Tracing for Windows** (`ETW`) channel the event
    goes into. If you click on the `Channel` header you’ll notice that the events
    in the **Debug** channel are not shown. This is because they aren’t needed for
    normal DBA tracing. They are usually used when Microsoft support needs to troubleshoot
    a problem on your server. You can filter the events on both of these columns.
    Underneath the left grid there are descriptions of the events and their fields.


    The grid on the right shows which events from the grid on the left have you chosen
    to track. The column with a small lightning bolt lists the number of actions we
    track for this event and the filter column indicates if a filter is present for
    this event.


    ![Image 71](index-137_1.png)


    ### Figure 5-12. Extended Events Session creation page: Events - part 2


    Figure 5-12 shows the second part of the **Events** page. You get to this part
    by clicking the **Configure** button in the upper right corner of the page shown
    in Figure 5-11. The events you selected are now shown in the grid on the left.
    Below the grid is the description of the selected event. The grid on the right
    has three tabs. The first one, called **Global Fields(action)**, lets you choose
    the actions you want to collect for this event. The second tab, called **Filter(Predicate)**,
    enables us to add various simple and complex filters. In the third tab, named
    **Event Fields**, you can see all the fields for the selected event. The fields
    that are not autocollected by default have a checkbox on their left side. In Figure
    5-12 you can see the `options_text` field will be collected but the `database_name`
    won’t be since you already have the `database_id`.


    ![Image 72](index-138_1.png)


    ### Figure 5-13. Extended Events Session creation page: Data Storage


    Figure 5-13 shows **Data Storage** page. **Data Storage** is just a different
    name for a target. You can see that the `ring_buffer` target is chosen in this
    figure. I’ve kept the default number (1000) of kept events in the buffer and set
    the maximum memory for the `ring_buffer` to 10 MB. Also I’ve created an all-event
    FIFO buffer, and not a per-event type FIFO buffer. You can add as many targets
    as you want on this page.


    ![Image 73](index-139_1.png)'
