    # 第十八章 峰值负载调优


    如果只需要额外增加 5% 到 10% 的资源，在峰值负载期间可以推迟或关闭什么？能否将维护进程提前两天执行？禁用非必要进程如何？当你在为峰值使用进行调优时，所有选项都应该被考虑。有时你需要跳出思维定式，因为某些环境面临着独特的挑战。


    ## 制定计划


    那么，如何将所有的分析和发现转化为一个可执行的计划呢？就像你之前所做的那样，你需要花时间审阅所有的发现，以得出正确的解决方案。现在的挑战在于确定首先实施哪项变更，以及实施该变更的预期影响和潜在风险。你早期识别出的任何系统限制是否会影响潜在的变更——包括弄清楚该变更是否能够实施？这些问题很复杂，而且你的决策的潜在影响通常只有在变更完全部署到测试或生产环境后才会被完全理解。


    你将按照开始分析数据的方式来实施提议的变更。始终从配置变更开始。这些变更将纠正环境中的错误配置或改变相应技术的行为。例如，如果你在 `SQL Server`
    中选择 `Optimize For Ad-Hoc Workloads` 选项，这将改变 `SQL Server` 的行为，并减少实例级别过程缓存所消耗的内存。做出变更后，确保尽可能记录变更的实际结果。这样，你就可以保留操作和结果的记录，以备将来出现问题需要回滚变更时使用。


    `表 18-11` 是针对税务应用的提议变更示例顺序。除了 `表 18-11` 中显示的服务器特定变更外，还可以包括应用程序、基础设施和流程相关的变更。


    *表 18-11. 税务应用调优示例计划。*


    | **技术** | **针对税务应用的提议变更** |

    | :--- | :--- |

    | 固件和驱动程序 | 更新 `HBA` 和 `NIC` 驱动程序。 |

    | 网络变更 | 将应用程序服务器移至与数据库服务器相同的交换机。<br>将 `NIC` 切换到 `Active\Active` 配置。 |

    | SAN 变更 | 将 `HBA` 队列深度更改为 `64`。<br>将关键 `LUN` 迁移至更快的存储层级。 |

    | 操作系统配置 | 更改页面文件的位置和大小。<br>将电源方案更改为 `High Performance`。<br>将 `SQL Server` 服务账户添加到以下本地策略：<br>•
    `Lock Page in Memory`<br>• `Perform Volume Maintenance Tasks`<br>为 `SQL Server`
    和 `Cluster` 资源添加文件排除。 |

    | SQL Server – 服务器属性 | 选择 `Optimize For Ad-Hoc Workloads` 选项。<br>启用跟踪标志 `1118`
    和 `834`。<br>将 `Max Server Memory` 设置从 `120,000` 减少到 `108,000`。 |

    | SQL Server 数据库配置 | 将所有数据库的增长方法和大小更改为 `512 MB`。<br>预先增长多个数据库文件，并同步文件大小。<br>为
    `TempDB` 添加文件，从 `1` 个增加到 `8` 个。<br>减少三个数据库的 `VLF`。<br>将主要数据库数据文件移至新的 `LUN`。 |

    | 索引变更 | `DROP`、`ADD` 和 `ALTER` 索引。<br>将 `FILLFACTOR` 从 `50`（*现有设置*）更改为 `100`。<br>将几个高度事务性对象的
    `FILLFACTOR` 从 `100` 降低到 `80`。<br>为所有对象实现 `ROW` 级压缩。 |

    | SQL 语句变更 | 将不可信约束更改为可信约束。<br>实施更新版本的 `SQL` 语句。 |

    | 维护变更 | 将索引重建更改为仅重建碎片率大于 `20%` 的对象，并设置为每晚执行。<br>每晚 `12 AM` 循环错误日志。 |

    | 作业时间变更 | 禁用旧的作业。<br>将维护作业的开始时间从 `:00` 和 `:15` 改为 `:12` 和 `:18`。<br>更改几个作业的计划，以最小化同时运行的作业数量。
    |

    | 监控 | 在 `Enterprise Monitoring` 工具中添加额外的警报。 |

    '
- fmt: 'Add data-collection processes for capacity planning.


    Ensure alerts are responded to within five minutes.


    Something that cannot be overemphasized is ensuring there is sufficient support
    from the developers and all levels of operations during the peak load. If issues
    occur during this time, people need to be able to respond in a timely manner.
    Depending on the `SLAs`, the response time might be minutes rather than an hour.
    Processes and procedures need to be defined and clearly communicated to the staff.


    ## Conclusion


    Every DBA has servers running `SQL Server` that must perform and scale day after
    day, year after year. Over time, things change. The data grows, the load and usage
    patterns might increase, and the functionality often evolves. So what will you
    do this peak season to ensure your organization is able to process this year’s
    peak load? What lessons did you learn from last year’s peak load so that you don’t
    have the same problems?


    By creating an ongoing team that is capable of analyzing the environment and implementing
    necessary changes, you will have a head start toward making sure the environment
    can scale to meet increased demands, whether it is the Black Friday sales day
    or just a busy Wednesday. Things will change in the environment and with the application,
    but these changes might bring more opportunity, such as long-term recommendations
    being folded into the application design or the architecture of the entire solution
    being changed. The key to being successful is to be curious and look under all
    of the rocks and behind all of the doors for opportunities for improvement.


