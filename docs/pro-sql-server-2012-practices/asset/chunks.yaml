- fmt: 'Essentially, they tell the query optimizer how many of each value are in a
    column. This helps the optimizer pick the best plan for a query. As data is added,
    updated, and deleted, the distribution of data, and thus the statistics about
    the data, changes.


    SQL Server can maintain the statistics automatically. One of the database settings
    you can choose is `AUTO UPDATE STATISTICS`. If this is set, once the number of
    changes to a column reaches the threshold set by the database engine, statistics
    are updated. However, if you want more control over this, you can schedule a job
    to execute commands that you provide, that run on the schedule that you set, and
    that update statistics in the ways that you wish.


    The `UPDATE STATISTICS` command in SQL Server allows you to specify how many rows
    you want scanned as a sample, in either a number or a percentage. You can update
    statistics for an entire table, or only one statistic on the table. The stored
    procedure `sp_updatestats` will update out-of-date statistics for all tables in
    a database. There are some drawbacks to the command and the procedure, such as
    query plans recompiling, so they are best used with caution.


    ## Conclusion


    There are many opportunities for you to automate SQL Server administration tasks,
    and many tools with which to do so. Automating gives you many benefits such as
    preventing problems, working faster, being proactive, being more productive, scaling
    your environment, and cost savings. With a goal in mind, you can set out a plan
    to automate your environment, implement it, and measure the results.


    ## Chapter 11: The Fluid Dynamics of SQL Server Data Movement


    By Wendy Pastrick


    One of my favorite tasks as a database administrator (DBA) is configuring and
    administering solutions that get data from one place to another. Very early in
    my career, I was fortunate to work in an environment where we had to replicate
    data all over the globe. Supporting a system where I was responsible for data
    redundancy across seven major geographic hubs was very exciting, and it was a
    new challenge for me to tackle. Only later did I realize moving data is seen as
    a daunting task to many. Over the years, I have seen how the need for data replication
    has become more widespread.


    Since I started with Microsoft SQL Server, I have used numerous methods to achieve
    data redundancy. However, what I do depends on the task I am trying to accomplish.
    Is the copy of data for reporting? High availability? Disaster recovery? In this
    chapter, I will give practical advice on how to choose the right feature to get
    your data from point A to point B based on my experience, and I will let you know
    about the pros and cons of each method as well.


    ### Why the Need for Replicating Data?


    The need to have multiple copies of the same data in more than one place is ever-increasing.
    Companies both large and small are bombarded from all directions with requests
    for access to their data stores from both internal and external users. Everyone
    wants to see the data, and they want to see the data as quickly as possible. Often,
    that data needs to be current and clean. Here is a short list of reasons why an
    organization might need replicas of its data:


    - To use production data in development, test, or staging

    - To move data closer to users—geographical displacement

    - To satisfy reporting needs

    - To process data before it goes into production

    - For high availability (HA)

    - For disaster recovery (DR)


    This list is, of course, not comprehensive, and I’m sure you can come up with
    a few additional scenarios that are not shown here and specific to your company’s
    needs. The point is that there is a lot more to data replication than just having
    copies for HA or DR. Although those are the most common reasons people have redundant
    copies of data elsewhere, the other reasons might be just as important.


    For example, if your company has its own team of developers, there will be at
    least one development environment in your datacenter, and possibly others for
    testing, quality assurance, or pre-production release reviews. As a database administrator,
    you will be responsible for refreshing this data on some type of scheduled basis.
    I have seen everything from yearly to nightly refreshes, and even the need for
    on-demand capabilities.


    How about overcoming issues with latency in data retrieval? There have been two
    key jobs where I worked for global companies, and both had similar issues with
    geographically dispersed offices maintaining current data stores locally. While
    both companies worked with replication models to distribute their data, they each
    went about it in completely different ways. For both companies, though, the key
    was to have the data physically closer to the users to ease the long synchronization
    times associated with connecting to a single data store that could be on the other
    side of the world.


    A similar problem occurs when many users are attempting to create or run reports
    against a single data store. Too many connections simultaneously trying to access
    the same pieces of information can result in apparent latency issues for your
    users. Additionally, if your company allows ad-hoc reporting or has departments
    that access your databases through Microsoft Excel or Access data sources, you
    cannot control any bad querying of the data. One poorly written query can have
    a serious impact on your system.


    In this case, having a copy of the data available for those reports that are not
    using the same system resources as the true production source could alleviate
    much of that resource contention.


    What do you do if you need to run batch processes against your data, but you need
    to ensure there is no negative impact on your daily business functions? You might
    choose to set up a secondary copy of your data to test the effect of the batch
    processes before pushing those changes to production.


    Before I move on, let me say a few words about high availability and disaster
    recovery. A highly available system is one that is ready to use as instantly as
    possible with as little data loss as possible in the event of a single hardware
    failure. Some of the technologies I will describe here are great for providing
    highly available systems. Disaster recovery, on the other hand, is your company’s
    contingency plan in the event of a major disaster. Think of earthquakes, atom
    bomb explosions—the types of events we pray never come to pass but could knock
    out entire communities, or your entire facility. If faced with a true disaster
    situation, could your company still recover and be back up and running in a matter
    of hours, days, or weeks? I will leave discussions about planning for those types
    of contingencies to other sources, because they are quite complex. One thing is
    guaranteed, though, and that is the fact you will need to account for a replica
    of your core data stores in the event of a disaster.


    Let’s examine a few scenarios that illustrate the need for different data-distribution
    implementations.


    ### Scenario 1: Global Organization


    Consulting Firms R Us is a global professional services company. They have a headquarters
    in Chicago, Illinois (USA) with two datacenters. One is located onsite at their
    main facility, and the other is in Columbus, Ohio (USA) at a co-hosting facility.
    They have business offices across the globe in Mexico City, Rio de Janeiro, Sydney,
    Tokyo, Istanbul, London, and Johannesburg. Worldwide, business operations must
    be online 24 hours a day, with a short available outage window on Saturday mornings.


    ### Scenario 2: High-Volume Reporting Needs


    The firm has several databases that are accessed for reports. A number of users
    attempting to query these databases concurrently are causing issues with data
