  trans: '

    # 第五章：从 SQL 跟踪到扩展事件


    *扩展事件* 是 SQL Server 2008 数据库引擎新增的功能。它是一个全新的、轻量级、高性能的事件系统，直接构建在 SQLOS 内部。扩展事件引擎本身只是一个分发器池，负责将事件数据发送到其目标。它不包含任何元数据，并且是完全可插拔的。这样，Microsoft
    就可以在无需修改其他代码的情况下对其进行扩展。在 SQL Server 2012 中，数据库引擎的 SQL 跟踪基础设施已被弃用（但 SSAS 部分尚未弃用）。扩展事件是其替代品。随着数据规模和负载的增加，以尽可能低的开销进行跟踪的需求也随之增长。在
    SQL Server 2008 中，SQL 跟踪仍是主要的跟踪引擎，并且拥有更多事件。SQL Server 2012 弥补了这一差距，现在 SQL 跟踪事件和扩展事件之间存在精确的映射关系。由于它们在
    SQL Server 2012 中更完整，所有代码都基于该版本。由于存在各种变化，并非所有代码都能在 SQL Server 2008 上运行。


    图 5-7 展示了扩展事件的所有组件如何组合在一起。模块是一个 dll 或 exe 文件。每个模块可以包含多个包，每个包又包含其自己的扩展事件对象。这样，就可以根据事件功能（如审核、SQLOS
    事件或通用 SQL Server 事件）进行分组。SQL Server 2008 中有 4 个包，SQL Server 2012 中有 9 个。可以通过查询
    `sys.dm_xe_packages` 目录视图来查看它们。


    并非所有包都能使用，也并非所有包都包含完全公开的对象。例如，您无法使用 `SecAudit` 包中的任何内容，因为它专用于内置审核功能。在接下来的章节中，我们将简要了解包中的对象。


    ![Image 67](img/index-125_1.png)


    **图 5-7.** 扩展事件架构


    ## 事件


    事件是我们可以跟踪的代码中的点。它们使用标准的 ETW（Windows 事件跟踪）模型定义，该模型包括通道、关键字和有效负载属性。通道指明了事件的目标受众，例如管理员或开发人员。关键字使我们能够将事件分组到额外的类别中。事件总是同步执行，但扩展事件引擎可以同步或异步地将它们转发到目标。有效负载只是为事件收集的数据的一个花哨名称。与
    SQL 跟踪不同，事件很酷的一点是我们可以通过操作扩展收集的数据。我们很快会讨论这些。可以使用以下 SQL 语句查看现有事件及其有效负载：


    ```sql

    -- 查看 sql server 中所有已定义的事件

    SELECT *

    FROM sys.dm_xe_objects

    WHERE object_type = ''event''

    -- 仅显示我们可以使用的目标

    AND (capabilities IS NULL OR capabilities & 1 = 0)

    ORDER BY name;


    -- 查看每个事件的所有列 - 事件有效负载

    SELECT *

    FROM sys.dm_xe_object_columns

    WHERE -- 仅显示我们可以使用的目标

    (capabilities IS NULL OR capabilities & 1 = 0)

    ORDER BY object_name, name;

    ```


    ## 谓词


    谓词类似于 SQL 跟踪中的过滤器，但功能强大得多。它们的作用类似于 SQL 语句中的 `WHERE` 子句。它们过滤哪些事件将被发送到目标，这又不同于 SQL
    跟踪（后者将事件发送到所有目标，并将过滤留给目标处理）。谓词完全支持短路求值，因此最好先指定简单的谓词，再指定更复杂的谓词。所有谓词都是同步处理的，因此请注意，繁重的条件可能会导致一些性能下降。最好保持谓词简单，例如基于事务
    ID 或对象 ID 等类似条件过滤事件。可以使用此 SQL 语句查看现有谓词：


    ```sql

    SELECT *

    FROM sys.dm_xe_objects

    WHERE object_type in (''pred_compare'', ''pred_source'')

    -- 仅显示我们可以使用的目标

    AND (capabilities IS NULL OR capabilities & 1 = 0)

    ORDER BY name;

    ```


    ## 操作


    操作是为事件提供附加信息的命令。您可以将它们视为提供当前数据库引擎状态信息的环境变量。但是，您也可以使用它们在数据库引擎内部执行任务，例如插入断点或收集小型转储。但要小心使用这些断点，因为它们会停止
    SQL Server 的执行。操作在会话定义中绑定到事件，并且少数操作（如 `database_name`、`event_sequence`）是直接从 SQL
    跟踪映射过来的列。任何操作都可以链接到任何事件。它们也在所有谓词求值之后、事件发送到目标之前同步处理。操作反映数据库引擎的全局状态，它们与事件并非硬性链接。例如，有一个名为
    `sqlserver.sql_text` 的操作，可以在事件触发时收集。此操作返回的信息与 `DBCC INPUTBUFFER` 命令相同。初次用户（就像我一样）可能会认为它收集的是触发事件的
    SQL 语句。其实不然。


    可以使用此 SQL 语句查看现有操作：


    ```sql

    SELECT *

    FROM sys.dm_xe_objects

    WHERE object_type = ''action''

    -- 仅显示我们可以使用的目标

    AND (capabilities IS NULL OR capabilities & 1 = 0)

    ORDER BY name;

    ```


    ## 类型和映射


    *类型* 是用于事件有效负载的简单或复杂数据类型。*映射* 是将某些数值映射到文本的字典。可以使用以下 SQL 语句查看现有类型和映射：


    ```sql

    SELECT *

    FROM sys.dm_xe_objects

    WHERE object_type in (''map'', ''type'')

    -- 仅显示我们可以使用的目标

    AND (capabilities IS NULL OR capabilities & 1 = 0)

    ORDER BY name;


    SELECT *

    FROM sys.dm_xe_map_values;

    ```


    ## 目标


    目标是扩展事件数据存储的目的地。目标可以是内存缓冲区或文件，其保存数据的方式可以是同步或异步的。如果目标是同步的，那么引擎会等待，直到事件数据成功存储到目标中。在
    SQL Server 2008 和 2012 中都有 6 个目标。由于一些目标名称及其属性在版本之间发生了变化，我将使用 SQL Server 2012 的名称和属性。


    第一个目标称为 *直方图*。它是基于内存的、异步的目标。它计算事件触发的发生次数。直方图分组的依据可以是事件数据或操作。由于此目标仅存储计数且性能开销较低，因此当我们试图找出数据库引擎中哪些事件触发最频繁时，它是一个不错的选择。


    *事件计数器* 目标是一个基于内存的同步目标。它与直方图类似，但仅在计算事件方面相似。不同之处在于，它无法以任何方式进行修改或过滤，并且会计算引擎中发生的所有事件。使用此计数器是了解系统工作负载特征的好方法。

