- fmt: "What you need to know about `Service Broker` to understand `Event Notifications`\
    \ is that when an event you’re interested in fires, a message with that event\
    \ data is asynchronously sent in a dialog to a service that is backed by a queue\
    \ where the actual message is stored until processed. The message is processed\
    \ inside a custom stored procedure called *activation stored procedure* where\
    \ we `RECEIVE` the messages from the queue and do with them whatever we want.\
    \ `RECEIVE` is a new `T-SQL` keyword that is used to retrieve a message from the\
    \ queue. It’s basically a `SELECT` statement for messages in a queue. A message\
    \ is always stored in an `XML` form that can also be validated with a schema if\
    \ needed. Message size can be up to 2 GB.\n\nBecause the messages are always in\
    \ `XML` format there is a very small overhead of converting the event data into\
    \ `XML` format and sending the event notification. Because of this `Service Broker`\
    \ dependency you have to enable `Service Broker` on the databases you’re going\
    \ to use `Event Notifications` in.\n\n## Event Notification Categories\n\nThere\
    \ are 2 categories the `Event Notifications` events fall into: server-scoped and\
    \ database-scoped.\n\nServer-scoped events are a subset of `SQL Trace` event classes,\
    \ while database-scoped ones are all `DDL` events that can be used for either\
    \ an event notification or a `DDL` trigger. Both have a fixed `XML` schema that\
    \ they conform to and are validated against when creating a message for sending.\n\
    \n## Differences from SQL Trace\n\nThere are a few differences between `SQL Trace`\
    \ and `Event notifications` though. If a `DDL` statement is rolled back, the message\
    \ is not fired. That means that the event notifications get sent only after a\
    \ transaction is successfully committed. While a transaction is running the messages\
    \ are stored in internal `Service Broker` queues. The next difference is that\
    \ the `Event Notifications` unlike `SQL Trace` traces (except default trace) persist\
    \ across server restarts. They can also be received remotely to a different server\
    \ for processing.\n\n## Monitoring with Catalog Views\n\nYou can monitor anything\
    \ related to `Event Notifications` with the following catalog views. You can find\
    \ their details in Books Online.\n\n*   `sys.event_notification_event_types`:\
    \ Contains all server and database scoped events. They are hierarchicaly grouped,\
    \ which means you can subsribe to anything from a group of events to a single\
    \ event. This kind of granularity provides a powerful tracing model.\n*   `sys.server_event_notifications`\
    \ and `sys.server_events`: contains all server level event notifications and the\
    \ events each notification contains.\n*   `sys.event_notifications` and `sys.events`:\
    \ contains all database level event notifications and the events each notification\
    \ contains.\n\n## Implementation and Use Cases\n\nBecause `Event Notifications`\
    \ are based on `Service Broker`, they fire an activation stored procedure each\
    \ time an event is fired. This way you can have different activation stored procedures\
    \ for different events. I have found this very useful and `Event Notifications`\
    \ have become my number one way to get immediately notified about important events\
    \ like deadlocks or blocks. You just have to subscribe to a `DEADLOCK_GRAPH` and\
    \ `BLOCKED_PROCESS_REPORT` events, and when you get one, you can save the notification\
    \ to a table and send an email to the person in charge. Sure beats constantly\
    \ running a trace and events without immediate notifications. The following examples\
    \ shows how to subscribe to a `DEADLOCK_GRAPH` server scoped event and a short\
    \ stored procedure snippet to process it. The full code can be found in the book’s\
    \ code appendix. This is actually part of the code I use on my servers for immediate\
    \ deadlock notificatios.\n\nThey work great and let me investigate problems as\
    \ soon as they happen.\n\n## Example 1: Instant Deadlock Notifications\n\n```sql\n\
    -- INSTANT DEADLOCK NOTIFICATIONS\n\nUSE tempdb;\nGO\n\n-- this procedure will\
    \ write our event data into the table and\n-- send the notification email in this\
    \ example the stored procedure\n-- is missing error and transaction handling!\n\
    CREATE PROCEDURE usp_ProcessNotification\nAS\nDECLARE @msgBody XML;\nDECLARE @dlgId\
    \ uniqueidentifier;\n\n-- you can change this to get all messages at once\nWHILE(1=1)\n\
    BEGIN\n    -- receive messages from the queue one by one\n    ;RECEIVE TOP(1)\n\
    \        @msgBody = message_body,\n        @dlgId = conversation_handle\n    FROM\
    \ dbo.EventNotificationsQueue;\n\n    -- insert event data into our table\n  \
    \  INSERT INTO TestEventNotification(eventMsg)\n    SELECT @msgBody;\n\n    --\
    \ we can also send an email after processing the event\n    -- DECLARE @MailBody\
    \ NVARCHAR(MAX)\n    -- SELECT @MailBody = CAST(@msgBody AS NVARCHAR(MAX));\n\n\
    \    -- send an email with the defined email profile.\n    -- since this is async\
    \ it doesn't halt execution\n    -- EXEC msdb.dbo.sp_send_dbmail\n    -- @profile_name\
    \ = 'your mail profile', -- your defined email profile\n    -- @recipients = 'dba@yourCompany.com',\
    \ -- your email\n    -- @subject = 'occured notification',\n    -- @body = @MailBody;\n\
    END\nGO\n\n-- create the notification queue that will receive the event notification\
    \ messages\n-- add the activation stored procedure that will process the messages\
    \ in the queue\n-- as they arrive\nCREATE QUEUE EventNotificationsQueue\nWITH\
    \ STATUS = ON,\nACTIVATION (\n    PROCEDURE_NAME = usp_ProcessNotification,\n\
    \    MAX_QUEUE_READERS = 1,\n    EXECUTE AS 'dbo' );\nGO\n\n-- crete the notification\
    \ service for our queue with the pre-defined message type\nCREATE SERVICE NotificationsService\n\
    ON QUEUE\n    EventNotificationsQueue(\n    [http://schemas.microsoft.com/SQL/Notifications/PostEventNotification]);\n\
    GO\n\n-- create the route for the service\nCREATE ROUTE NotificationsRoute\nWITH\
    \ SERVICE_NAME = 'NotificationsService',\n    ADDRESS = 'LOCAL';\nGO\n\n-- create\
    \ the event notification for the DEADLOCK_GRAPH event.\nCREATE EVENT NOTIFICATION\
    \ ServerNotificationEvent\nON SERVER\nFOR DEADLOCK_GRAPH\nTO SERVICE 'NotificationsService',\n\
    \    'current database' -- CASE sensitive string that specifies USE OF server\
    \ broker IN CURRENT db;\nGO\n\n-- check to see if our event notification has been\
    \ created ok\nSELECT * FROM sys.server_event_notifications WHERE name = 'ServerNotificationEvent';\n\
    GO\n\n-- create the table that will hold our data\n-- every time a deadlock happens\
    \ its information will be written into this table\nCREATE TABLE TestEventNotification(Id\
    \ INT IDENTITY(1,1), EventMsg xml, EventDate datetime default(GETDATE()));\n```\n\
    \n## Example 2: Subscribing to a DDL Event Group\n\nThe other example shows how\
    \ to subscribe to a database scoped `DDL_TABLE_EVENTS` event group that consists\
    \ of `CREATE_TABLE`, `ALTER_TABLE`, and `DROP_TABLE` events. Everything works\
    \ exactly the same in regard to the activation stored procedures and message handling.\
    \ The example is running in a `tempdb` that has service broker enabled by default.\
    \ If you want to run it in another database, you have to enable service broker\
    \ in it.\n\n```sql\n-- SUBSCRIBE TO DDL_TABLE_EVENTS EVENT GROUP\n\n-- view the\
    \ full DDL_TABLE_EVENTS event group we're going subscribe to\nWITH cteEvents AS\n\
    (\n    SELECT 0 AS LEVEL, *\n    FROM sys.event_notification_event_types\n   \
    \ WHERE TYPE_NAME = 'DDL_TABLE_EVENTS'\n    UNION ALL\n    SELECT LEVEL + 1 AS\
    \ LEVEL, EN.*\n    FROM sys.event_notification_event_types EN\n    JOIN cteEvents\
    \ C ON C.parent_type = EN.type\n)\nSELECT *\nFROM cteEvents\nORDER BY TYPE;\n\n\
    -- create the event notification for the DDL_TABLE_EVENTS events.\n-- send it\
    \ to the same service that we used for the Server Events\nCREATE EVENT NOTIFICATION\
    \ DatabaseNotificationEvent\nON DATABASE\nFOR DDL_TABLE_EVENTS\nTO SERVICE 'NotificationsService',\n\
    \    'current database'; -- CASE sensitive string that specifies USE OF server\
    \ broker IN CURRENT db\nGO\n\n-- Test if it works\nCREATE TABLE testEN (id INT);\n\
    GO\nINSERT INTO testEN VALUES (1), (2);\nGO\nALTER TABLE testEN ADD VALUE VARCHAR(20);\n\
    GO\nDROP TABLE testEN;\nGO\nSELECT * FROM TestEventNotification;\n```"
