    To completely remove the replica from the list of available replicas for backups,
    you adjust the backup priority down to zero using the T-SQL code:


    ```sql

    ALTER AVAILABILITY GROUP AgBackup

    MODIFY REPLICA ON ''SQLFOUR''

    WITH (BACKUP_PRIORITY = 0);

    ```


    That will change the replica specified and remove it from the Availability Group
    list of backups entirely. It means that if you ran the preferred backup function,
    `sys.fn_hadr_backup_is_preferred_replica`, it could never return a positive value
    for that server. If you refresh the properties window, you can see the changes
    made graphically represented, as shown in Figure 16-12.


    You can see that the automated backups now would run only on secondary servers,
    never on the primary. The replica `SQLFOUR` can’t support automated backups because
    it has been excluded. Finally, the `SQLTWO` replica has had its priority changed
    to 2, making it the least likely replica to support the automated backup.


    This is how you can control what kind of replica is performing the backup and
    where the backup is occurring. But how do you set up the backups themselves? I’ll
    cover that in the next section. Before we move on though, I’ll reset the Availability
    Group back to the default values:


    ```sql

    ALTER AVAILABILITY GROUP AgBackup

    SET (AUTOMATED_BACKUP_PREFERENCE = SECONDARY);


    ALTER AVAILABILITY GROUP AgBackup

    MODIFY REPLICA ON ''SQLTWO''

    WITH (BACKUP_PRIORITY = 50);


    ALTER AVAILABILITY GROUP AgBackup

    MODIFY REPLICA ON ''SQLFOUR''

    WITH (BACKUP_PRIORITY = 50);

    ```


    ## Automating Backups on Availability Groups


    You can run a backup manually from any of the Availability Group replicas. To
    automate backups, though, you have to do some extra work because you’ll never
    know which group is available to perform the backup, although you do get to set
    a bias as to which of the replicas will perform the action, as I discussed in
    the previous section. To use Availability Groups for this process, you need to
    configure a common set of scripts on each of the servers.


    The backups themselves can be done using normal T-SQL commands or even using maintenance
    plans. You just have to make sure of two things. First, make sure that every replica
    that has not been excluded from the possibility of backups through setting the
    priority has an automated backup in place.


    Second, make sure that each of the backups you set up determines first if that
    server has the current priority through the use of `sys.fn_hadr_backup_is_preferred_replica`.
    This is included for you automatically if you’re using maintenance plans.


    The most important thing to understand is that the log cleanup that normally occurs
    with a database in the Full recovery model still occurs with your primary replica.
    The log backups that take place on a secondary cause the primary’s log to be cleaned
    up. If the process didn’t work this way, it would be pointless.


    ### Maintenance Plans


    To provide you with an example, I chose to set up my automated log backups on
    the `SQLTHREE` server using maintenance plans. Figure 16-13 is the basic dialog
    box showing how the log backups have been configured.


    Note that there are no options you can set in the standard dialog box that specify
    whether or not this backup process is configured for use with an Availability
    Group. You can select the For Availability Databases, Ignore Replica Priority
    For Backup And Backup On Primary Settings check box to ignore the replica priority,
    but this isn’t a good choice for setting up a log backup that is meant to work
    regardless of which server is online. However, if you click the View T-SQL button
    at the bottom of the dialog box, you’ll see a script that looks like this:


    ```sql

    DECLARE @preferredReplica int

    SET @preferredReplica = (SELECT

    [master].sys.fn_hadr_backup_is_preferred_replica(''MovieManagement''))

    IF (@preferredReplica = 1)

    BEGIN

    BACKUP LOG [MovieManagement] TO DISK = N''C:\Program Files\Microsoft SQL

    Server\MSSQL11.MSSQLSERVER\MSSQL\Backup\MovieManagement_backup_2012_06_25_144225_8512689.trn''

    WITH NOFORMAT, NOINIT, NAME = N''MovieManagement_backup_2012_06_25_144225_8512689'',
    SKIP, REWIND, NOUNLOAD, STATS = 10

    END

    ```


    ![Image 189](index-392_1.png)


    Figure 16-13. The maintenace plan window you use to configure log backups.


    The script declares a variable, `@preferredReplica`, and then uses the `sys.fn_hadr_backup_is_preferred_replica`
    function to determine if the server currently calling the backup process is the
    replica in the Availability Group where the backup will currently run.


    To show you this in action, I’m going to set up the maintenance plan on this server,
    `SQLTHREE`, so that it runs a log backup every 15 minutes. Currently, none of
    the other replicas have a backup process and `SQLTHREE` is the primary. When the
    job fires, it completes successfully, without error. However, that’s only because
    it’s getting to the priority check and finding that it’s not currently the server
    with priority, which causes it to exit gracefully, but it means I don’t have a
    log backup. I can validate that by going to the location specified to see if a
    backup file was created. There is none.


    To get this to work, I need to perform two tasks. First, I need to create this
    same maintenance plan on all my other servers. Second, I need to create a schedule
    that executes the plan on each of the servers.


    Because only one will be selected by the `sys.fn_hadr_back_is_preferred_replica`
    function, I’m placing extremely little load on all the servers because they will
    only check to see if they are the preferred replica currently. If the server in
    question is not the preferred replica, the process will close out. If the server
    is the preferred replica, the log backup will be run.


    I’m not a fan of using maintenance plans, because they don’t offer enough granular
    control over how processes are run. Setting up a similar log-backup process using
    scripts is extremely easy.


    ### T-SQL Scripts


    First, I need to establish the backup script that I want to use on each of the
    servers. My script will be slightly different than the one created for the maintenance
    plan:


    ```sql

    DECLARE @preferredReplica INT

    SET @preferredReplica = (SELECT

    [master].sys.fn_hadr_backup_is_preferred_replica(''MovieManagement'')

    )

    IF (@preferredReplica = 1)

    BEGIN

    DECLARE @Location NVARCHAR(50);

    DECLARE @CurrentTime DATETIME = GETUTCDATE();

    SET @Location = ''C:\bu\MovieManagement_log_''

    + CAST(DATEPART(year, @CurrentTime) AS NVARCHAR) + ''_''

    + CAST(DATEPART(month, @CurrentTime) AS NVARCHAR) + ''_''

    + CAST(DATEPART(day, @CurrentTime) AS NVARCHAR) + ''_''

    + CAST(DATEPART(hour, @CurrentTime) AS NVARCHAR) + ''_''

    + CAST(DATEPART(minute, @CurrentTime) AS NVARCHAR) + ''.bak''

    BACKUP LOG MovieManagement

    TO DISK = @Location

    WITH INIT;

    END

    ```


    I can create a SQL Agent Job with a schedule that runs this backup every three
    minutes. That’s probably more frequently than you would want to run a backup in
    a production system, but I’m just setting this up for testing purposes. Then I
    can easily script that job out and run it on each of my servers.'
