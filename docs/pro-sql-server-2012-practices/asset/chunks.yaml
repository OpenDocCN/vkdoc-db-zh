- fmt: '# Chapter 5: From SQL Trace to Extended Events


    **Figure 5-13.** Extended Events Session creation page: Data Storage (Targets)


    Figure 5-14 shows the Advanced session options, like the Event retention mode,
    the Maximum dispatch latency, Min and Max memory size, and Memory partition mode.
    For an explanation of these values, see the session part of the chapter. I’ve
    left all the options here to their default values.


    ![Image 74](index-140_1.png)


    **Figure 5-14.** Extended Events Session creation page: Advanced


    After you’re done setting the Session options, click OK to create the sessions.
    The session autostarts after the dialog closes, if that option was set.


    ## Extended Events Profiler UI


    For how the Profiler works, we’ll look at a session called `ApressBookSession`,
    which tracks connections. As we set it to already watch live data we get the same
    window that we would get if we right clicked on the `ApressBookSession` node and
    clicked the `Watch Live Data` menu item. Open a few query windows and close them.
    That should give you output similar to what is shown in Figure 5-15. Notice that
    there is also a new toolbar called `Extended Events`. The top `Events` grid shows
    live events as they are being generated.


    This grid is limited to showing one million events. The extra events that aren’t
    shown in the grid are not removed from the target though. The bottom `Details`
    grid shows each event’s fields. We can add/remove any of those fields into/from
    the top grid.


    If you stop the watching of live data via the `Stop` button in the toolbar (this
    does not stop the session) you can see that some options are now enabled in the
    toolbar. The `Grouping` button activates the Grouping window shown in Figure 5-16.
    You can use this window to add columns that you want to group output by.. Once
    we’ve grouped our data we can do various aggregations on these groups. Clicking
    the `Aggregation` toolbar button opens the window shown in Figure 5-17. Since
    we’re already grouping by `client_app_name`, `session_id`, and `logical_reads`
    columns we can do aggregates only on `timestamp` and `name` columns. Here we’ll
    only `COUNT` the `name` column and sort by it in ascending order. The result of
    the grouped and aggregated data is shown in Figure 5-18.


    ![Image 75](index-141_1.png)


    **Figure 5-15.** Extended Events Watch Live Data window in stopped state


    ![Image 76](index-142_1.png)


    ![Image 77](index-142_2.png)


    **Figure 5-16.** Extended Events column grouping window.


    **Figure 5-17.** Extended Events column aggregation window.


    ![Image 78](index-143_1.png)


    **Figure 5-18.** Extended Events grouped and aggregated data


    This was a quick overview of the new Extended Events Profiler. It is really easy
    to use once you get the hang of it. Hopefully this chapter has made it a bit easier.


    ## Conclusion


    In this chapter we’ve taken a look at the current state of tracing and diagnostic
    infrastructure in SQL Server. 5 years ago SQL Trace might have been sufficient
    to diagnose problems but faced with increased workload in clients’ systems a new
    infrastructure was needed. That infrastructure was Extended Events, a completely
    new, highly customizable engine built directly into the `SQLOS`, that should be
    enough for the next few years. By actually deprecating SQL Trace in `SQL Server
    2012` Microsoft showed that we have to learn Extended Events and start using them
    in our daily troubleshooting and performance tuning endeavors.


    # Chapter 6: The Utility Database


    *By Chris Shaw*


    Time and time again, I have been able to use my own custom database, named the
    `utility database`, to solve problems. This has shortened troubleshooting times
    by supplying additional insight into what the system has been doing historically,
    and what the system is doing now. The `utility database` has reduced my repetitive
    and time-consuming tasks, such as reviewing the error logs, by automating and
    using SQL Server Reporting Services (`SSRS`) to send reports on a daily basis
    to my e-mail. When you are able to record database history, it makes it much easier
    for you to identify certain database patterns, such as growth. The additional
    data eases the ability to forecast key issues, such as performance degradation
    or the volume of disk space required when new hardware needs to be ordered.


    When you are responsible for the well-being of a database or a server, there are
    a number of key factors that you must pay attention to or your long-term system
    health and performance will be at risk.


    Some of these tasks require much time and manual effort to verify that the systems
    are behaving as expected.


    As a consultant, one of my first experiences with a client had me diagnosing an
    error they received when the transaction log backups would fail overnight. The
    error message they were receiving indicated they didn’t have enough disk space
    to store the backup file. There were some serious concerns as to why this happened
    each night, because when they came in the next morning and started to research
    the failure, there was plenty of disk space on the drive for the file. In addition,
    subsequent transaction log backups would complete without any problem.


    My suspicion was that a file was being created on the drive, that would consume
    the required free space. Long before the morning shift would start, the file would
    be removed, leaving the space open and the appearance that the error message they
    received was incorrect.


    I was able to create a `utility database` to track the disk free space to solve
    the issue. The process reviewed the amount of free space on the drive, and the
    results were then inserted into a table every five minutes. I then built a report
    off those results, which provided visibility as to what was happening.


    It quickly became apparent that my hunch in this situation was correct. I was
    able to narrow down the time when the space was consumed, and again when the space
    was released, along with the list of files on that volume. With this data, we
    were able to find the source of the error, correct it, and give the client new
    visibility into the disk space usage.


    Over the course of this chapter, we will review some of the strategies used to
    create the `utility database` and leverage the use of it, allowing you more time
    for necessary project-oriented tasks. The information in this chapter is designed
    to give you the fundamentals of how to retrieve, store, process, and report the
    information. This, in turn, allows you to move your work strategy to a proactive
    style rather than a reactive style where workers feel as if they are only there
    to chase down problems after they occur. Think of this as a style to *work smarter,
    not harder*.


    ## Start with Checklists


    The key aspect to the `utility database` is that it is a collection of data that
    is designed by you, and contains data that is important to you and your environment.
    A way to look at a `utility database` is as a custom monitoring utility designed
    just for you, by you. I’ll make a series of recommendations in this chapter on
    some of the trackable items that you might consider storing in your database.
    The examples can be used as is and should provide additional insight into the
    databases and database servers that it gathers data from.


    However, the usefulness is multiplied when the data is meaningful to the individual
    user or organization.'
