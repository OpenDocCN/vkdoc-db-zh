    # 第 5 章：从 SQL 跟踪到扩展事件


    **图 5-13.** 扩展事件会话创建页面：数据存储（目标）


    图 5-14 展示了高级会话选项，例如事件保留模式、最大分派延迟、最小和最大内存大小以及内存分区模式。关于这些值的解释，请参阅本章的会话部分。我将此处的所有选项都保留为其默认值。


    ![Image 74](img/index-140_1.png)


    **图 5-14.** 扩展事件会话创建页面：高级


    设置完会话选项后，单击“确定”以创建会话。如果设置了该选项，对话框关闭后会话将自动启动。


    ## 扩展事件探查器 UI


    关于探查器的工作原理，我们将查看一个名为 `ApressBookSession` 的会话，它用于跟踪连接。由于我们已将其设置为监视实时数据，因此我们会获得与右键单击
    `ApressBookSession` 节点并单击“监视实时数据”菜单项时相同的窗口。打开几个查询窗口然后关闭它们。这应该会产生类似于图 5-15 所示的输出。请注意，还有一个名为
    `Extended Events` 的新工具栏。顶部的“事件”网格会实时显示生成的事件。


    此网格限制为显示一百万个事件。未显示在网格中的额外事件不会从目标中移除。底部的“详细信息”网格显示每个事件的字段。我们可以将这些字段中的任意字段添加到顶部网格中，或从顶部网格中移除。


    如果通过工具栏中的“停止”按钮停止监视实时数据（这不会停止会话），您会看到工具栏中现在启用了一些选项。“分组”按钮会激活如图 5-16 所示的分组窗口。您可以使用此窗口添加您希望用于对输出进行分组的列。一旦对数据进行了分组，我们就可以对这些组执行各种聚合操作。单击工具栏上的“聚合”按钮会打开如图
    5-17 所示的窗口。由于我们已经按 `client_app_name`、`session_id` 和 `logical_reads` 列进行分组，因此我们只能对
    `timestamp` 和 `name` 列进行聚合。这里我们将仅对 `name` 列进行 `COUNT`（计数）并按升序排序。分组和聚合数据的结果如图 5-18
    所示。


    ![Image 75](img/index-141_1.png)


    **图 5-15.** 处于停止状态的扩展事件“监视实时数据”窗口


    ![Image 76](img/index-142_1.png)


    ![Image 77](img/index-142_2.png)


    **图 5-16.** 扩展事件列分组窗口。


    **图 5-17.** 扩展事件列聚合窗口。


    ![Image 78](img/index-143_1.png)


    **图 5-18.** 扩展事件分组和聚合数据


    这是对新扩展事件探查器的快速概览。一旦掌握诀窍，它真的非常易于使用。希望本章内容让这个过程变得更容易了一些。


    ## 结论


    在本章中，我们了解了 SQL Server 中当前跟踪和诊断基础设施的现状。五年前，SQL Trace 可能足以诊断问题，但面对客户端系统中不断增加的工作负载，需要一个新的基础设施。该基础设施就是扩展事件，这是一个全新的、高度可定制的引擎，直接内置于
    `SQLOS` 中，应该足以满足未来几年的需求。通过在 `SQL Server 2012` 中正式弃用 SQL Trace，微软表明我们必须学习扩展事件并开始在我们日常的故障排除和性能调优工作中使用它们。


    # 第 6 章：实用工具数据库


    *作者：Chris Shaw*


    一次又一次，我能够使用我自己创建的名为 `实用工具数据库` 的自定义数据库来解决问题。它通过提供对系统历史行为和当前行为的额外洞察，缩短了故障排除时间。`实用工具数据库`
    通过自动化并使用 SQL Server Reporting Services (`SSRS`) 每天向我的电子邮件发送报告，减少了我那些重复且耗时的任务，例如检查错误日志。当您能够记录数据库历史时，识别某些数据库模式（例如增长）就会变得容易得多。额外的数据有助于预测关键问题，例如性能下降或订购新硬件时所需的磁盘空间量。


    当您负责数据库或服务器的健康运行时，有许多关键因素您必须关注，否则您的长期系统健康状况和性能将面临风险。


    其中一些任务需要花费大量时间和人工努力来验证系统是否按预期运行。


    作为顾问，我早期与客户合作的经历之一是诊断他们在夜间事务日志备份失败时收到的错误。他们收到的错误消息表明没有足够的磁盘空间来存储备份文件。为何每晚都会发生这种情况存在一些严重担忧，因为当他们第二天早上进来开始调查故障时，驱动器上有足够的磁盘空间存放该文件。此外，随后的事务日志备份都能顺利完成。


    我怀疑是有一个文件在驱动器上创建，消耗了所需的可用空间。在早班开始前很久，该文件就会被删除，留下空间，并给人一种他们收到的错误消息不正确的印象。


    我能够创建一个 `实用工具数据库` 来跟踪磁盘可用空间以解决此问题。该进程每五分钟检查一次驱动器上的可用空间量，然后将结果插入到一个表中。我随后基于这些结果构建了一个报告，从而提供了对所发生情况的清晰洞察。


    很快就能看出，在这种情况下我的直觉是正确的。我能够确定空间被消耗的时间，以及空间再次被释放的时间，同时还有该卷上的文件列表。有了这些数据，我们能够找到错误的来源，纠正它，并让客户端能清晰地了解磁盘空间的使用情况。


    在本章中，我们将回顾用于创建 `实用工具数据库` 并利用它的一些策略，从而为您节省更多时间用于必要的项目导向型任务。本章的信息旨在为您提供如何检索、存储、处理和报告信息的基础知识。这反过来又使您能够将工作策略转变为积极主动的模式，而不是被动的模式——在被动模式下，员工感觉他们只是在问题发生后追查问题。请将其视为一种
    *更聪明，而不是更辛苦* 的工作方式。


    ## 从清单开始


    `实用工具数据库` 的关键方面在于，它是由您设计的数据集合，包含对您和您的环境重要的数据。可以将 `实用工具数据库` 视为由您设计、为您量身定制的定制监控工具。在本章中，我将就一些您可能考虑存储在数据库中的可跟踪项目提出一系列建议。这些示例可以直接使用，并且应该能提供对它所收集数据的数据库和数据库服务器的额外洞察。


    然而，当数据对个人用户或组织有意义时，其用处才会倍增。

    '
- fmt: '# Chapter 6: The Utility Database


    Keep this in mind as you read through this chapter, and consider aspects of different
    information that might be critical to your database. As you review the examples
    provided, take note of the strategies we use to gather the information on those
    databases, and then think about how you can apply these strategies to your utility
    database. A strong argument can be made that the utility database should never
    stop gaining new features, and I urge readers to take this stance. If there is
    a task that you perform more than once, you should consider whether this is something
    that your utility database can automate.


    Recently, while boarding a flight, I observed how the pilot walked around the
    plane. He looked at the engine, the wheels, and some other key components. He
    then entered the cockpit, retrieved a clipboard, and began to check off items
    while assessing the instruments on the control panel. As a nervous flyer, I was
    comforted by his due diligence in making sure the craft was ready for flight.


    In like fashion, you should review the health of your servers each day. Check
    the backups to make sure they executed properly, and review the error logs to
    look for any looming issues, along with many other key points. Likewise, the company
    will be comforted in knowing that the database is ready for the upcoming operations.
    For the pilot, this was a lengthy process that included many people looking at
    multiple aspects of the plane. For a database administrator, many of these tasks
    can be automated after they have been identified.


    Each server may utilize different features of `SQL Server 2012`; for example,
    some systems require `AlwaysOn`, while some do not. Some of your required features
    might need different checks on a regularly scheduled interval; for instance, if
    you’re using `AlwaysOn`, you might want to validate the latency each day to ensure
    the network and the databases are performing to standards. The checklists that
    follow identify tasks that you might require for success with `SQL Server 2012`,
    including tasks that ensure the ability to recover your `SQL Server`. Each installation
    and feature usage may change the items that you require.


    ## Daily Checklist Items


    The following items should be checked daily:


    *   **Backups**—Recovery means that a backup is required. Without a proper backup,
    the database could be lost for good. A backup plan is the best place to start,
    but ensuring it is running each time without failure is critical for long-term
    success.

    *   **Automated Restores**—The most effective way to validate a backup plan is
    to exercise it, but that can be time consuming and often forgotten about when
    staff is busy. Automating restores is common, but not complete unless the restore
    is being monitored for success or failure.

    *   **Error Logs**—Many issues present themselves in the error log, but similar
    to the automated restores, checking each one of these daily in a busy environment
    can quickly consume a large portion of the day. This check is often skipped to
    complete tasks that might be considered more pressing.

    *   **`SQL Server` Jobs**—`SQL Server 2012` gives the user the ability to schedule
    jobs. These jobs could be maintenance or tasks that are critical to the operations
    of the business. The completion of these jobs needs to be reviewed each day.

    *   **Disk Space/Database Growth**—Databases should be checked to ensure they
    have plenty of space to accept new data. Depending on the options of the database,
    this could mean internal checking of the database to make sure the files have
    enough free space, or it could mean validating that there is enough drive space
    for the database to grow.

    *   **Integrity Checks**—The health of the pages inside the database can be verified
    by running a number of integrity checks. You must make sure that these checks
    yield error-free results each time they are executed.

    *   **Index Health**—Indexes to databases can be compared to an index of a book.
    As more pages (i.e., information) are added to the book, the index will need to
    be adjusted. Likewise, more information added to a table may result in adjustment
    to its indexes. The performance of the database relies on this task being done.
    If performance is critical to the `SQL Server`, you must review the indexes and
    their efficiency.

    *   **Security**—It is common to log failed attempts to access the databases.
    Logging is good, but it is equally important that you review the log so that you
    can take any necessary corrective action.

    *   **Key Business Indicators (KBI)**—Many organizations have indicators in the
    data that determine not only the health of the database, but the health of the
    business. For example, if the database was for support of an emergency `911` system,
    a `KBI` could be the number of calls in queue that need to be answered. Even though
    the number might not be directly related to the performance of the database, a
    high number of calls could indicate that the database cannot keep up on logging
    the information.


    ## Longer-Term Checklist Items


    The following items don’t need to be checked daily, but should be done periodically.
    Each environment (e.g., a nonprofit vs. a public company) has different requirements
    that could determine the frequency. I recommend completing these items no less
    than once a quarter.


    *   **Audits**—Audits are starting to be required by more organizations each day.
    Even if it is not required, it is a good practice to audit your servers regularly.
    It might be as simple as a quick inventory audit, or you could need an in-depth
    security audit.

    *   **Patches/Service Packs**—`SQL Server 2012` is a stable platform and is proving
    to be very reliable, but on occasion it might need a patch or a service pack to
    remove potential errors in the code or enable some features. Keeping track of
    what version the database server is and when these versions have changed can be
    critical in troubleshooting issues.

    *   **Configurations**—Validating the configuration of the `SQL Server` is as
    important as ensuring the configuration is correct the first time. In environments
    where more accounts are able to access and change the configuration, it is crucial
    to continually check that the proper configuration is in place.

    *   **New `SQL Servers`**—`SQL Server` has many versions, each with different
    features, prices, and licensing. Many applications install a version of `SQL Server`
    for the database support that they need. Checking to make sure that you are licensed
    correctly and that each of the servers is being maintained can be a difficult
    task to do once. Doing this task on a repeated basis can be overwhelming and time
    consuming, but critical.


    What might appear to be an extensive checklist of tasks is really only a scratch
    on the surface. The items are too numerous to list, and as you work with `SQL
    Server 2012` in your environment, new items will become obvious. The addition
    of other repetitive and time-scheduled tasks should fit into your utility database
    structure using the same design with some slight adjustments.


    ## Utility Database Layout


    The structure of the utility database is key to the long-term ease of use; enterprise
    use of the utility database begins here. A good understanding of the structure
    eases the addition of new features and customization to ensure useful data is
    collected in each environment. Without a defined structure, upgrades and the organization
    of the database becomes complex. The utility database we will be working with
    in the examples is separated into the following three major categories:


    *   **Category 1**—Core installation specific

    *   **Category 2**—Feature specific

    *   **Category 3**—Domain specific (KBIs)


    The first of these categories is the data that must be collected on all the `SQL
    Server` installations that will use the utility database. Data such as `SQL Server`
    version, inventory of `SQL Servers`, and index fragmentation fit into this category.


    The second category is data that is dependent on features that may be implemented
    on the `SQL Server`.'
