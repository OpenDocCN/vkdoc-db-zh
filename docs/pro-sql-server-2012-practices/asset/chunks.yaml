  trans: '

    # 第 17 章：面向 SQL Server DBA 的大数据


    回到 Hadoop 命令行界面，输入以下脚本。将 `connect` 参数中的 `myserver` 替换为你的数据库服务器名称，并使用能实际登录 SQL
    Server 的用户名和密码。`--connect` 参数看起来像是一个熟悉的连接字符串，`import` 命令告诉 `sqoop` 将数据从数据库复制到
    HDFS。`--target-dir` 参数是数据在 HDFS 中存储的文件夹路径，`-m` 告知 `sqoop` 为导入操作并行运行的 Map 任务数量。Sqoop
    参数及其描述的部分列表如表 17-4 所示。执行脚本以启动 `sqoop`。


    ```bash

    sqoop import --connect "jdbc:sqlserver://myserver.database.windows.net;username=mysqluser@myserver;password=mypwd;database=AdventureWorks2012"
    --table Production.Product --target-dir /data/ProductTable -m 1

    ```


    ## 表 17-4：Sqoop 参数部分描述性列表


    | 参数 | 描述 |

    | :--- | :--- |

    | `--connect <jdbc-uri>` | 指定 JDBC 连接字符串 |

    | `--username <username>` | 设置认证用户名 |

    | `--password <password>` | 设置认证密码 |

    | `--append` | 将数据追加到 HDFS 中现有的数据集 |

    | `--columns <col, col, col…>` | 要从表中导入的列 |

    | `-m`, `--num-mappers <n>` | 使用 `n` 个 Map 任务并行导入 |

    | `-e`, `--query <statement>` | 导入 SQL 语句的结果 |

    | `--split-by <column-name>` | 用于拆分工作单元的表列 |

    | `--table <table-name>` | 要读取的表 |

    | `--target-dir` | 输出数据存储的文件夹 |

    | `--where <where clause>` | 导入时使用的 where 子句 |


    你会看到大量的日志消息，然后，希望看到成功提示。在日志结束时，你应该会看到几条消息，告诉你运行此作业所花费的时间、传输的字节数，以及 Product 表中的所有
    504 行数据都已导入 HDFS。看起来应该像下面这样：


    ```text

    12/07/18 02:14:58 INFO mapreduce.ImportJobBase: Transferred 102.9434 KB in 43.5506
    seconds (2.3638 KB/sec)

    12/07/18 02:14:58 INFO mapreduce.ImportJobBase: Retrieved 504 records.

    ```


    如果你和我一样，你首先会问：“数据去哪里了？我该怎么查看它？” 回到桌面，启动 `HadoopNameNode`。屏幕会显示一个标有“浏览文件系统”的链接（见图
    17-7）。点击它，将打开一个网络浏览器，其中包含目录列表，其中一个是数据文件夹。点击此文件夹，你应该会看到另一个名为 `ProductTable` 的文件夹，这正是你在
    Sqoop 脚本中指定的数据在 HDFS 中的位置。点击此文件夹，你会看到一个名为 `part-m-00000` 的文件。`sqoop` 创建的文件名格式为
    `part-m-xxxxx`，其中 `xxxxx` 是从 0 开始的顺序编号。你的数据就应该在这里。


    现在点击打开该文件，你会看到一个看起来像是 Product 表逗号分隔的文件。我知道，不太令人兴奋，但确实如此。这就是 `sqoop` 将表加载到 HDFS
    的方式，也是它在 HDFS 中的存在形式。不过别太担心，这种方式非常实用。


    ![Image 197](img/index-416_1.png)


    ![Image 198](img/index-416_2.png)


    **图 17-7.** 点击“浏览文件系统”链接以浏览你存储在 HDFS 中的数据集。


    关于这次初始数据加载，有几点需要注意。首先，它没有充分利用 Hadoop。数据量很小，对于更大的数据集，你的集群能带来更大的收益。其次，我们要求 `sqoop`
    将表常规加载到 HDFS，因此它加载了整个表而没有使用并行处理。要强制并行，你可以将 `-m` 操作符改为大于 1 的数字，并且你必须告诉它表的主键，以便它能将数据拆分为多个导入作业。如果你不告诉
    `sqoop` 表的主键是什么，那么操作符 `-m` 的值必须为 1，否则会失败。请参见图 17-8，了解 `sqoop` 通过将工作拆分为多个 Map 任务并行导入数据的示意图。


    **图 17-8.** 使用 MapReduce 的 `sqoop` 导入数据流。


    如果你再次执行相同的作业会怎样？它会失败，因为文件 `part-m-00000` 已经存在于 `ProductTable` 文件夹中。要成功执行，你必须添加
    `--append` 操作符，这会将完整的 Product 表再次导入到同一个文件夹，只是这次会放入一个名为 `part-m-00001` 的文件中。如果你每天这样做，你将在
    HDFS 中存储 Product 表的完整快照，每天一个文件。


    使用 `sqoop` 导入数据还有很多其他选项。这个例子展示了 Hadoop 的一般用法，但通常你会希望运行更有针对性的导入，所以下面你将执行一个基于过滤器获取数据的导入。


    ## 使用日期过滤器提取数据


    假设你的 AdventureWorks SQL Server 数据库包含 500,000 种独特产品，因为你是一家大型在线零售商。你仍在尝试构建一个数据存储来捕获产品变更的历史，尤其是价格。正如你在上一节关于导入和导出中看到的，你可以每天获取
    Product 表的完整快照并将其捕获到 HDFS 中。相反，你选择捕获产品的所有变更，因此你决定在每天结束时运行一个作业，仅抓取当天发生变更的产品行。你可以使用
    `sqoop` 来完成此操作，只需添加一些参数。


    首先，你将发出一个 SQL `UPDATE` 语句，如果价格在 45 到 100 美元之间（在 AdventureWorks 中应该是 42 行），则将数据库中每个产品的价格提高
    1 美元。这还将使用 `getdate()` 将 `ModifiedDate` 列更新为更新时间。


    ```sql

    UPDATE Production.Product

    SET ListPrice = ListPrice + 1,

    ModifiedDate = getdate()

    WHERE ListPrice between 45 and 100

    ```


    ## 从 Azure 执行 Sqoop 导入


    因为我们仍在使用 SQL Azure，所以接下来你将从那里获取变更，并将其放入你一直在使用的同一个 HDFS 文件夹中，但首先你需要优化 `sqoop` 导入。你会注意到我们在导入中添加了一个
    `where` 子句，因此这只拉取在 2012-07-19 日期（注意该日期取决于你执行示例 `Update` 语句的时间）发生变化的五行数据。我们将 `-m`
    参数改为 4，这样四个 MapReduce 任务可以并行运行（我知道，对于 42 行数据有点小题大做，但这是一个例子）。


    接下来，因为你使用了大于 1 的 `-m` 设置，你需要指定一个键，MapReduce 作业可以使用它来在它们之间拆分数据，这样它们在抓取数据时就不会重叠。这样，每一行都属于且仅属于一个作业。要指示拆分键，你使用
    `--split-by` 并告诉它键列是 `ProductID`。最后，你决定不获取 Product 表的每一列，因此你使用 `--columns` 操作符并仅列出你感兴趣的列。


    ```bash

    sqoop import --connect "jdbc:sqlserver://myserver.database.windows.net;username=mysqluser@myserver;password=mypwd;database=AdventureWorks2012"
    --table Production.Product --where "ModifiedDate between ''2012-07-19'' and ''2012-07-20''"
    --target-dir /data/ProductTable -m 4 --append --columns "ProductID,ProductNumber,ListPrice,ModifiedDate"
    --split-by ProductID

    ```


    执行作业后，回到 HDFS 中的 `ProductTable` 文件夹。你看到的可能会让你惊讶。

