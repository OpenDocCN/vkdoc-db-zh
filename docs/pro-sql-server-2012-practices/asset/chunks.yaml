    \n## 计划缓存\n\n第二种识别缺失索引建议的方法是从缓存的执行计划中检索它们。对许多读者来说，在执行计划的顶部看到缺失索引建议可能比较常见（见图 7-4\
    \ 中的示例）。这些恰好与缺失索引 DMOs 中出现的缺失索引建议相同。主要区别在于它们与特定的执行计划和 T-SQL 语句相关联。\n\n**图 7-4.**\
    \ 查询计划中的缺失索引建议\n\n正如预期的那样，收集在 SQL Server 实例上创建和使用的所有执行计划以查找缺失索引建议是不切实际的。幸运的是，不需要执行此活动即可获取信息。相反，信息可以在存储在计划缓存中的执行计划中找到。在这些计划中，将受益于缺失索引建议的\
    \ T-SQL 语句在执行计划的 `SHOWPLAN XML` 中存储了一个 `MissingIndex` 节点，类似于图 7-5。\n\n**图 7-5.**\
    \ `SHOWPLAN XML` 中的 `MissingIndex` 节点\n\n通过 `MissingIndex` 节点，你可以从计划缓存中检索缺失索引建议，并将它们与创建索引将直接影响的\
    \ T-SQL 语句关联起来。检索缺失索引信息需要使用一个 `xquery` SQL 语句，类似于清单 7-6 中提供的语句。在此查询中，会识别出来自计划缓存中具有缺失索引节点的计划。有了这个列表，计划将被解析以检索\
    \ SQL 语句以及数据库、架构和表名称。与此同时，将检索影响、相等列、不等式列和包含列。由于访问的是计划缓存，计划的使用计数和执行计划也可以包含在内，如示例脚本所示。在执行清单\
    \ 7-6 后的查询后，应返回图 7-6 的结果。\n\n### 清单 7-6. 从计划缓存中查询缺失索引\n\n```sql\nWITH XMLNAMESPACES\
    \ (DEFAULT 'http://schemas.microsoft.com/sqlserver/2004/07/showplan')\n,PlanMissingIndexes\n\
    AS (\n    SELECT query_plan, cp.usecounts\n    FROM sys.dm_exec_cached_plans cp\n\
    \    OUTER APPLY sys.dm_exec_query_plan(cp.plan_handle) tp\n    WHERE tp.query_plan.exist('//MissingIndex')=1\n\
    )\nSELECT\n    stmt.value('(//MissingIndex/@Database)[1]', 'sysname') AS database_name\n\
    \    ,stmt.value('(//MissingIndex/@Schema)[1]', 'sysname') AS [schema_name]\n\
    \    ,stmt.value('(//MissingIndex/@Table)[1]', 'sysname') AS [table_name]\n  \
    \  ,stmt.value('(@StatementText)[1]', 'VARCHAR(4000)') AS sql_text\n    ,pmi.usecounts\n\
    \    ,stmt.value('(//MissingIndexGroup/@Impact)[1]', 'FLOAT') AS impact\n    ,stmt.query('for\
    \ $group in //ColumnGroup\n                 for $column in $group/Column\n   \
    \              where $group/@Usage=\"EQUALITY\"\n                 return string($column/@Name)\n\
    \                ').value('.', 'varchar(max)') AS equality_columns\n    ,stmt.query('for\
    \ $group in //ColumnGroup\n                 for $column in $group/Column\n   \
    \              where $group/@Usage=\"INEQUALITY\"\n                 return string($column/@Name)\n\
    \                ').value('.', 'varchar(max)') AS inequality_columns\n    ,stmt.query('for\
    \ $group in //ColumnGroup\n                 for $column in $group/Column\n   \
    \              where $group/@Usage=\"INCLUDE\"\n                 return string($column/@Name)\n\
    \                ').value('.', 'varchar(max)') AS include_columns\n    ,pmi.query_plan\n\
    FROM PlanMissingIndexes pmi\nCROSS APPLY pmi.query_plan.nodes('//StmtSimple')\
    \ AS p(stmt)\n```\n\n**图 7-6.** 从计划缓存获取的缺失索引节点\n\n在许多方面，从计划缓存返回的缺失索引结果与查询缺失索引\
    \ DMOs 是相同的。当然，两者之间也有一些关键而重要的区别。使用缺失索引 DMOs，你可以了解查询是否会使用 `seek` 或 `scan` 来使用缺失索引。另一方面，使用计划缓存则提供了生成缺失索引建议的实际计划和\
    \ T-SQL 语句。DMOs 帮助你了解新索引将如何被使用，而计划缓存则是你确定什么会受到影响的地方。通过知道什么代码会受到影响，你就知道测试人员需要测试什么，性能提升将在哪里，并有机会考虑索引是否真的是缓解由缺失索引建议揭示的性能问题的最佳方式。\n\
    \n> **注意：** 由于计划缓存对 SQL Server 实例中的查询性能至关重要，因此在查询计划缓存时要谨慎。虽然在查询时通常没有影响，但在生产环境中使用任何计划缓存查询时要小心，并警惕意外行为。\n\
    \n## 工作负载的索引调优"
- fmt: 'After looking at the missing indexes recommendations, the next place to look
    for index suggestions is to use the Database Engine Tuning Advisor (`DTA`). The
    `DTA` is an indexing tool included with SQL Server that can be used to evaluate
    a workload, or collection of queries, to determine what indexes would be useful
    for those queries. This activity goes beyond the recommendations made by the missing
    index processes discussed in previous sections. Where the missing index processes
    can identify statistics that would be best materialized as indexes, the `DTA`
    can do much more. As examples, the `DTA` is capable of the following:


    • Suggesting changes to clustered indexes


    • Identifying when partitioning would be of value


    • Recommending nonclustered indexes


    By using the `DTA` with some automation, you can start identifying early when
    to make changes to more than just missing nonclustered indexes. Instead, you can
    begin to dig deep into indexing with minimal effort. Instead of time spent imagining
    new indexes, you can shift your focus to validating suggestions and digging into
    more complicated performance issues that are outside the boundaries of where `DTA`
    functions.


    n **Note** The Database Engine Tuning Advisor (`DTA`) is often shunned by senior-level
    database administrators and developers. For various reasons, it is seen as an
    unwelcomed crutch to indexing and performance tuning. While not all recommendations
    will make it to production environments, the work that it can do and effort that
    it replaces is of high value. Ignoring the value of `DTA` is akin to the stories
    from American folklore of the railroad workers trying to beat the steam powered
    tools. In the end, this tool frees us from menial work so we can expand our horizons
    and skills.


    # Chapter 7 ■ Indexing Outside the Bubble


    ## Collecting a Workload


    In order to test a series of queries, to determine whether they are in need of
    additional indexes, you must first collect the queries in which you wish to discover
    indexing opportunities. There are a few ways that a workload can be gathered.
    In many situations, you could ask peers what queries they think need performance
    improvements, you could check with developers to see what they believe the applications
    are using most frequently, or you could ask the business to identify the most
    important queries in the database.


    The chief issue with all of these methods is that they often bear relationship
    to the queries that the SQL Server instance is actually processing. Your peers
    will know what they think the problems are, but what about the smaller, more frequently
    run queries that are bleeding the server with small performance issues? While
    application developers know what an application does, they don’t necessarily know
    what the users are using and how often. Also, the features and functionality important
    to the business users might not be the activity on the database that needs the
    most assistance or should be the primary focus.


    An alternative method to using the resources already discussed is to have the
    SQL Server instance or database tell you the queries that are most often used.
    In that way, you can look at those queries and determine what indexes, through
    `DTA`, are needed on the database. Ideally, you will want to collect a sample
    of queries from times in which the applications are generating activity that matches
    common portions of the application life cycle. If the business’s peak activity
    occurs from noon to 5 p.m., then you will want to capture the workload from that
    time period. Capturing activity overnight or in the morning won’t provide the
    information necessary to adequately build indexes for your databases.


    There are a few ways to collect your workload. In this chapter, we’ll look at
    two of the most common methods. These methods are by using `SQL Profiler` and
    `Extended Events`. With each of these methods, we’ll look at how the process for
    collecting information can be set up and configured, and then how the workload
    collection itself can be automated.'
