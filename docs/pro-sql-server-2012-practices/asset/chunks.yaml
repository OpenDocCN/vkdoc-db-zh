- fmt: '# Dell Comparison Recap


    I really like the `R720xd`, with its 26 internal drive bays. I suspect that a
    very high percentage of SQL Server workloads would run extremely well on an `R720xd`.
    If 26 internal drives did not give you enough I/O performance and capacity, you
    could always add some internal solid state storage cards or use some form of external
    storage.


    As a database professional, I would be actively lobbying against using the `R420`
    or `R520` models, since they have the entry-level `Intel Xeon E5-2400 series processors`,
    which have lower clock speeds and less memory bandwidth compared to the `Intel
    Xeon E5-2600 series processors` that are used in the `R620`, `R720`, and `R720xd`.
    They also have half of the total memory capacity and far fewer `PCI-E` slots compared
    to the higher-end models. They are a little less expensive, but the hardware cost
    delta is pretty small compared to the `SQL Server 2012` license costs. Remember,
    you are paying for `SQL Server 2012` core licenses based on physical core counts,
    so you want to get the best package you can as far as the rest of the server goes.
    One nice fact is that the `Intel Xeon E5` processor family is available in four-core,
    six-core, and eight-core models, with specific four-core models having higher
    base clock speeds than the "top-of-the line" eight-core model processor. If you
    wanted to minimize your `SQL Server 2012` core-based licensing costs and were
    willing to give up some scalability and capacity, you could pick one of these
    faster base clock speed four-core model processors for your server and actually
    see very good single-threaded performance.


    # Processor Vendor Selection


    In the `Microsoft Windows` and `SQL Server` world, you will have to pick between
    an `Intel Xeon` processor-based server or an `AMD Opteron` processor-based server.
    Your choice here directly dictates which model servers are available from your
    preferred server vendor, as only certain server models are available with an Intel
    or an AMD processor. Especially with the change to `SQL Server 2012` core-based
    licensing, it is nearly impossible to recommend an `AMD Opteron` processor-based
    server for use with `SQL Server 2012`, especially for `OLTP` workloads.


    There are a number of reasons for this rather strong assertion. First are the
    relatively high physical core counts in modern, high-end `AMD Opteron` processors,
    with models available with 12 or 16 physical cores. Each of these physical processor
    cores requires a relatively expensive `SQL Server 2012` processor core license.
    That would perhaps be acceptable if each one of those physical cores provided
    excellent single-threaded performance, but sadly, that is not the case. You can
    easily check the relative performance per physical processor core for `OLTP` workloads
    by performing some simple arithmetic against official `TPC-E` `OLTP` benchmark
    scores. You can simply divide the actual `TPC-E` score for a system by the number
    of physical processor cores in the database server of the system under test (`SUT`),
    to get a score per physical processor core for a particular model of processor.
    This is a valid method, because the `TPC-E` benchmark is processor bound as long
    as you have sufficient I/O performance to drive the workload, which is a fairly
    safe assumption given the cost and time for a hardware vendor to develop and submit
    an official `TPC-E` benchmark submission.


    For example, on July 5, 2012, Fujitsu submitted a `TPC-E` score of 1871.81 `TpsE`
    for a `PRIMERGY RX300 S7` system that had two `Intel Xeon E5-2690` processors
    that have a total of 16 physical cores in the system. Dividing 1871.81 by 16 physical
    cores gives you a score per physical processor core of 116.98.


    On November 14, 2011, HP submitted a `TPC-E` score of 1232.84 `TpsE` for a `Proliant
    DL385 G7` system that had two `AMD Opteron 6282 SE` processors that have a total
    of 32 physical cores in the system. Dividing 1232.82 by 32 physical cores gives
    you a score per physical processor core of 38.52. The score per physical processor
    core of the `Intel` system is 3.03 times as high as the score per physical processor
    core of the `AMD` system.


    To make matters worse for `AMD` in this comparison, the `SQL Server 2012` license
    costs for the `AMD`-based system are twice as high as for the `Intel`-based system,
    because you have to purchase 32 core licenses versus 16 core licenses.


    ## Dell PowerEdge R720


    This model server has a `2U` form factor, two processor sockets, and uses `Intel
    Xeon E5-2600 series processors`. It has twenty-four memory slots (384 GB total
    RAM with 16-GB `DIMMs`), has sixteen 2.5-inch drive bays, and has six `PCI-E 3.0
    x8` and one `PCI-E 3.0 x16` expansion slots. It has a total of eight, twelve,
    or sixteen physical cores for `SQL Server 2012` core licensing purposes. It has
    a total of sixteen, twenty-four, or thirty-two logical cores with `Intel` hyper-threading
    enabled.


    The `R720` is one of my favorite models in the `Dell 12th generation` line. It
    uses the same `Intel Xeon E5-2600 series processor` as the `R620`, but it has
    seven `PCI-E` expansion slots and sixteen internal drive bays, which combine to
    give you a lot of potential I/O capacity and performance. It does cost a little
    more than the `R620`, and it is in a `2U` vertical size, so there are some scenarios
    where I would prefer an `R620`. An example scenario would be an `OLTP` workload
    where I knew that I would have external storage area network (`SAN`) storage with
    very good random I/O performance, and I wanted to be able to use `1U` database
    servers instead of `2U` database servers.


    ## Dell PowerEdge R720xd


    This model server has a `2U` form factor, two processor sockets, uses `Intel Xeon
    E5-2600 series processors`, has twenty-four memory slots (384 GB total RAM with
    16-GB `DIMMs`), has twenty-six 2.5-inch drive bays, and has four `PCI-E 3.0 x8`
    and two `PCI-E 3.0 x16` expansion slots. It has a total of eight, twelve, or sixteen
    physical cores for `SQL Server 2012` core licensing purposes. It has a total of
    sixteen, twenty-four, or thirty-two logical cores with `Intel` hyper-threading
    enabled.


    The `R720xd` is similar to the `R720`, except that it has twenty-six internal
    drive bays and only six `PCI-E` expansion slots. This model could be a good choice
    if you can run your I/O workload on twenty-six internal drive bays, some or all
    of which could be solid state drives (`SSDs`). This could let you avoid the expense
    of an external direct-attached storage (`DAS`) enclosure or a `SAN`.


    ## Dell PowerEdge R820


    This model server has a `2U` form factor, four processor sockets, and uses `Intel
    Xeon E5-4600 series processors`. It has forty-eight memory slots (768 GB total
    RAM with 16-GB `DIMMs`), has sixteen 2.5-inch drive bays, and has five `PCI-E
    3.0 x8` and two `PCI-E 3.0 x16` expansion slots. It also has a total of sixteen,
    twenty-four, or thirty-two physical cores for `SQL Server 2012` core licensing
    purposes. It has a total of thirty-two, forty-eight, or sixty-four logical cores
    with `Intel` hyper-threading enabled.


    The `R820` has four processor sockets in a `2U` vertical size. It uses the `Intel
    Xeon E5-4600 series processor`, which has lower clock speeds than the `Xeon E5-2600
    series`. There is also some nonuniform memory access (`NUMA`) scaling loss as
    you move from a two-socket to a four-socket server (i.e., a four-socket server
    does not have twice the scalability as a two-socket server with the exact same
    processor). The `R820` does have sixteen internal drive bays and seven `PCI-E`
    expansion slots, so it has good I/O capacity and performance potential. It also
    has twice the total RAM capacity compared to an `R620`, `R720`, or `R720xd`.


    In spite of all these factors, I would tend to prefer two `R720xd` servers instead
    of one `R820` server, assuming you can split your workload between two servers.
    You would have faster, less expensive processors, over three times as many internal
    drive bays, and nearly twice as many `PCI-E` expansion slots, while paying the
    same `SQL Server 2012` license costs.'
