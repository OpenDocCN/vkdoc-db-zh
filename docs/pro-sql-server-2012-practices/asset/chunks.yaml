    # 第 13 章：I/O —— 不为人知的故事


    多年来，存储厂商完成了一些出色的工作，但也让其他人难以适应这些变化。这就是我放弃多年前依赖的计数器的原因，现在我的主要计数器关注的是数据库向存储子系统移动了多少数据（`磁盘字节/秒`）、这些字节的类型（读或写）、它们的数量（`磁盘读取/秒`）和（`磁盘写入/秒`）、I/O
    请求的大小（`每秒输入和输出请求`）（`平均磁盘字节/读取`）和（`平均磁盘字节/写入`），以及最终存储子系统返回这些数据的速度（`平均磁盘秒/读取`）和（`平均磁盘秒/写入`）。


    这套计数器产生的数据很有趣，所有这些数据恰好都使用您的服务器管理员或存储专家能理解的语言。请注意，当您的操作系统（OS）报告一个数字时，它可能与存储设备报告的数字不同。但是，两者不应相差太远。如果相差较大，通常是因为你们各自使用的采样间隔不同。


    传统上，存储区域网络（SAN）的指标和报告不是以一秒的频率采样的。然而，服务器通常以此频率采样，这是有充分理由的。样本集通常来源于性能监视器，并且仅在感兴趣的时段以该轮询频率捕获。结果就是，当讨论开始时，你需要确保每个人谈论的是相同的“苹果”——这包括相同的服务器、逻辑单元号（LUN）、采样频率（采样间隔），当然还有时间范围。时间范围在这里肯定很重要，因为平均值会随着时间的推移看起来更好。


    所有这些计数器之间存在一种有趣的关系，这有助于解释数据库服务器上的 I/O 行为。正如你可以想象的，如果 `磁盘读取/秒`（`每秒读取输入/输出`，`IOPs`）增加，人们会预期
    `磁盘读取字节/秒` 计数器也会增加。通常情况下，这确实如此，但假设与此同时，访问数据库服务器的数据特征发生了变化，导致 `平均磁盘字节/读取` 减少了呢？这样一来，你当然可能每秒有更多的
    I/O 请求，但每个请求的大小更小，从而导致 `磁盘字节/秒` 的度量保持不变。正因如此，了解和理解你特定的 I/O 占用空间和模式才如此重要。你的系统在一天中的某些时段会以某种方式运行，而在其他时段则会显著不同。


    ## 考虑因素


    想象一下，你的数据库服务器支持一个在线零售商店，其中 99% 的订单和网络流量发生在上午 8:00 到下午 5:00 之间。在一天中的那个时段，你的 I/O
    模式将反映出 Web 应用程序为完成订单、查找商品信息等所需的特性。当然，这假设你在白天不运行数据库维护、备份、数据库控制台命令（`DBCC`）等。在那些小时内，数据库服务器上运行的只有支持在线
    Web 应用程序的应用。一旦你理解了那个 I/O 特征是什么样子，它将为你提供一个坚实的基础。


    在这一点上，如果你和我一样，你可能在心里想：“你能不能直接给我看张图？”确实，通常可视化计数器之间的关系更容易看出它们为何重要。图 13-1 展示了这种关系。


    ![磁盘读取/秒（粗体）、磁盘读取字节/秒（正常）、平均磁盘秒/读取（浅色）和平均磁盘字节/读取（虚线）的示意图](img/index-323_1.png)


    **图 13-1.** `磁盘读取/秒`（粗体）、`磁盘读取字节/秒`（正常）、`平均磁盘秒/读取`（浅色）和`平均磁盘字节/读取`（虚线）的示意图


    这是逻辑磁盘的一个有趣视图，因为它显示了 IOP 大小（`平均磁盘字节/读取`）、磁盘吞吐量（`磁盘读取字节/秒`）和 IOP 数量（`磁盘读取/秒`）之间的关系。`磁盘读取/秒`
    计数器（粗线）在大部分样本中显示出非常稳定的趋势，但正如你早期所见，I/O 大小有所增加，这转化为磁盘吞吐量增加了近三倍。


    简而言之，这意味着并非所有的 I/O 都是相同的。如图 13-1 所示，IOP 大小的变化会对环境产生显著影响。我寻找并记录这一点的主要原因之一，是为了当这种情况在环境中发生时不会感到惊讶。想象一下，你正在努力为你的环境提供可扩展性数据，而关键性能指标（`KPI`）之一是“业务交易”。在这种情况下，应用组可能会说类似这样的话：“你在白天每小时做
    1000 笔交易，晚上每小时做 100 笔交易”，然后被问及这在数据库层面意味着什么。在这种情况下，业务部门还想知道，如果交易率保持不变，但数据库的自然增长在一年期间持续进行，那意味着什么。他们还想确保下一次硬件采购（特别是服务器和
    SAN）将提供足够的马力来支持数据库的自然增长，以及交易量从每小时 1000 笔增加到 2000 笔的可能性。


    乍一看，这个场景似乎很简单：将你现有的翻倍就没事了。但如果这个简单的数学计算实际上行不通呢？如果因为“实际”时间和 SAN 上的服务时间，突然一天中没有足够的时间来更新统计信息、重建索引、执行
    `DBCC` 或跟上备份窗口呢？


    通常，数据随时间的增长不是线性的。对于许多企业来说，客户群在扩大，而不是在缩小。这些额外的客户将逐渐增加你数据库的大小，并带来额外的 I/O，这些在你当前的数据中是看不到需求的。即使在客户群缩小的情况下，保留老客户的数据也很常见。这样做有多种原因，包括监管、营销、财务等等。结果是，虽然依赖简单的数学计算很诱人，但这样做可能会在以后导致一些复杂情况。


    因此，了解你随时间变化的 I/O 特征并知道涉及哪些数据至关重要。


    > **注意：** I/O 的类型可能比 I/O 操作的总体数量更重要。


    I/O 的类型会根据业务交易的类型或你编写或计划的操作而变化。例如，备份的 I/O 特征与传统业务交易非常不同，甚至业务交易之间也不尽相同。考虑一家通过在线和外呼呼叫中心销售小部件的公司。在线网上商店的
    I/O 类型可能与外呼呼叫中心员工使用的客户端-服务器应用程序具有不同的特征。


    另一个有趣的例子是确定在你的 OLTP 数据库服务器上运行了哪种类型的报告，甚至报告运行的时间。通常，操作类型的报告发生在白天，而汇总信息或滚动数据报告发生在夜间。但是，如果用户有能力在比如说每月末的中午运行那些更大、更耗费
    I/O 的汇总类型报告呢？如果这恰好赶上一次营销活动，你的网上商店流量增加了 50% 呢？

    '
- fmt: '# I/O性能考量与策略


    ## 多节点集群与共享存储

    如果您的环境是配置了一个多节点集群，并且所有节点都驻留在同一个SAN上，情况会怎样？在这种场景下，当您进行夜间维护（备份、索引维护、DBCC、更新统计信息、用户进程等）时，用于填充数据仓库的任务同时也在从您的OLTP数据库提取大量数据到暂存环境，然后将这些数据处理到您的星型模式中。您可以想象，在此期间，没有一个单一服务器会显得过载；然而，它们共享同一个存储阵列，很可能也共享相同的控制器，并且很多时候共享相同的磁盘组。突然之间，您的调度安排有了新的含义。请确保从整个环境的视角深思熟虑地进行调度规划，而不仅仅停留在服务器层面。每一个共享组件都需要被纳入考量。


    ## 战术性考量

    在您测量、监控和跟踪I/O配置文件的过程中，请牢记极其重要的`Avg. Disk sec/Read`和`Avg. Disk sec/Write`计数器，因为它们对于您的I/O性能至关重要。它们测量完成该特定IOP请求读取或写入磁盘所花费的时间。在表13-1中，您可以看到我测试的磁盘速度非常快，平均读取时间为0.000秒，写入仅需0.001秒。


    根据我的经验，很难找到一个权威来源来说明这些数字应该是多少。这涉及到从磁盘读取和写入的众多变量。存在不同速度的磁盘、不同尺寸、不同制造商、寻道时间、扫描时间、吞吐量指标、SAN卡、SAN卡配置、SAN配置、操作系统配置、LUN布局以及数据库设置等差异。最重要的是，您的数据库本身、其访问模式、数据类型和大小等也存在差异。我认为正是由于这些变量，供应商、SAN制造商、服务器制造商、微软，甚至是该领域的专家都迟迟不愿给出硬性规定。尽管如此，表13-2中的数字在某种程度上受制于我刚列出的变量，以及任何我尚未遇到的其他因素。


    表13-2代表了一个最佳情况，展示了您的子系统（磁盘）根据计数器`Avg. Disk sec/Read`和`Avg. Disk sec/Write`将数据返回给操作系统所需的时间。


    > **表13-2.** 性能监视器报告的从磁盘读取和写入磁盘的时间表（以秒为单位）。

    >

    > | Avg. Disk sec/ Read | Avg. Disk sec/ Write | 条件 |

    > |---|---|---|

    > | .000 to .005 | .000 to .005 | 可能未充分利用 |

    > | .005 to .010 | .005 to .010 | 健康 |

    > | .010 to .015 | .010 to .015 | 健康 |

    > | .015 to .035 | .015 to .035 | 健康 - 忙碌 |

    > | .035 to .050 | .035 to .050 | 忙碌—部分请求可能在等待页面I/O |

    > | .050 to .100 | .050 to .100 | 非常忙碌—许多请求可能在等待页面I/O |

    > | .100 to .250 | .100 to .250 | 非常忙碌—仅在较短持续时间内可接受 |

    > | .250 to .500 | .250 to .500 | 非常忙碌—仅在已知的高I/O操作期间可接受 |

    > | > .500 | > .500 | 可能存在一些严重问题 |


    表13-2中的数字以几分之一秒给出，通常用毫秒来展示和交流会更直观。将表中的数值乘以1000，时间将以毫秒（ms）显示。在本章中，当提及磁盘读写时间时，都将以毫秒为单位。


    以此作为指导原则，请注意，当您努力更好地理解您的I/O状况或解决环境中潜在问题时，还有额外的变量需要考虑。具体的变量是`TempDB`和事务日志。您还应该将您的应用程序纳入考虑。如果您支持的是超低延迟的应用程序——例如信用卡行业或交易行业（如股票市场或能源市场）中常见的应用——这些数字可能不适用。相反，如果您的应用程序支持的是一个没有用户前端、本质上是批处理的邮购目录系统，这些数字可能又过于激进。再次强调，这都是相对的。提供表13-2中数字的目的，是让您了解我多年来在各种应用程序和I/O需求下常见的情况。


    日志受长时间写入的影响更大，并且根据环境不同，长时间的读取也可能成为问题。数据库中每个需要数据修改元素（插入、更新或删除）的事务都是一个日志记录操作。无论使用何种恢复模型，情况总是如此。因此，确保事务日志的写入时间尽可能低，可能是您在数据库环境中能做的最重要的事情之一。


    一个实际的思考方式是考虑每秒的写事务数。这个计数器结合每秒事务数来看很有趣，因为它说明了有多少事务依赖于事务日志的写入时间。如果将这个值与`Avg. Disk
    sec/Write`结合起来看，您通常能找到相关性。这很重要是因为，如果您的数据库环境为每个写事务额外增加了20毫秒，您可以通过将写事务数量乘以毫秒数来进一步理解有多少“挂钟时间”被花在了等待存储阵列通知操作系统其操作已完成上。在进行这项计算时，请观察您的阻塞链和场景，您很可能会发现，在日志写入事件持续时间较长时，阻塞数量会增加。


    > **注意** 我见过`Avg. Disk sec/Read`和`Avg. Disk sec/Write`时间高达五秒。相反，我也见过这个值低至10毫秒，同时`Disk
    Bytes/sec`测量值高于1400 MB/sec。这两种情况都是极端案例，虽然我们都希望吞吐量超过每秒1 GB，读写时间低于10毫秒，但我们中很少有人有预算来实现这一点。然而，我们都应该有预算和工具来避免请求耗时超过一秒。如果您不处于这种情况，或许是因为您还没有帮助构建案例来争取额外的资本支出。请记住，数字是客观的，但人是主观的，他们可能不像您那样对这些数字充满热情。“了解您的客户”这句老话对于I/O讨论非常贴切，因为这通常涉及指出需要根据您的发现和建议投入一笔可观的资金。


    I/O请求的大小也起着作用。大小指的是每个请求存在多少数据。通常，读IOP的块会比写IOP的块大。这部分是由于范围扫描和应用程序选择的数据比写入的数据多。这是另一个需要了解您的I/O的领域。'
  raw: 'What if your environment is configured in such a manner that you have a multinode
    cluster in which all clusters reside on the same SAN? In that scenario, when you
    are doing your nightly maintenance (backups, index maintenance, DBCCs, updating
    statistics, user processes, and so forth), the job to populate your data warehouse
    is also pulling large amounts of data from your OLTP database into your staging
    environment, and then munging that data into your star schema. You can see that
    during that time, no single server will appear overloaded; however, they all share
    the same storage array and, likely, the same controllers and, many times, the
    same spindles (disks). Suddenly, your scheduling takes on new meaning. Ensure
    that your scheduling is thought through from an environment perspective, not just
    at a server level. Every shared component needs to be taken into account.


    Tactical


    As you go through the process of measuring, monitoring, and trending your IOP
    profile, bear in mind the ever-important Avg. Disk sec/Read and Avg. Disk sec/Write
    counters because they are critical to your I/O


    performance. They measure the duration it takes to read and write that specific
    IOP request to the disk. In Table 13-1, you can see that the disk I ran a test
    on is very fast, taking 0.000 seconds (on average) to read from the disk and only
    .001 seconds to write to the disk.


    In my experience, it’s difficult to find an authoritative source for what these
    numbers should be. This is due to the quantity of variables involved with reading
    from and writing to disk. There are different speeds of disks, sizes, manufacturers,
    seek times, scan times, throughput metrics, SAN cards, SAN card configurations,
    SAN configurations, OS configuration, LUN layout, and database settings. Most
    importantly, there are also differences in your database, its access patterns,
    data types, and size, to name a few. I believe it’s due to those variables that
    vendors, SAN manufactures, server manufacturers, Microsoft, and even experts in
    the field hesitate to provide hard-and-fast answers. With all of that said, the
    numbers in Table 13-2, in part, are subject to the variables I just listed, as
    well as any number of additional items that I have yet to come across.


    Table 13-2 represents a best-case scenario for how long it should take your subsystem
    (disk) to return data to the OS based on the counters Avg. Disk sec/Read and Avg.
    Disk sec/Write.


    chapter 13 ■ I/O: the UntOld StOry


    ***Table 13-2.** Table of times (in seconds) for reading from and writing to disk
    as reported from Performance* *Monitor.*


    **Avg. Disk sec/ Read**


    **Avg. Disk sec/ Write**


    **Condition**


    .000 to .005


    .000 to .005


    Potentially underutilized


    .005 to .010


    .005 to .010


    Healthy


    .010 to .015


    .010 to .015


    Healthy


    .015 to .035


    .015 to .035


    Healthy - Busy


    .035 to .050


    .035 to .050


    Busy—some request are likely waiting for Page I/O


    .050 to .100


    .050 to .100


    Very Busy—many requests are likely waiting for Page


    I/O


    .100 to .250


    .100 to .250


    Very Busy—OK only for shorter durations


    .250 to .500


    .250 to .500


    Very Busy—OK only during known, high-I/O


    operations


    > .500


    > .500


    Potentially some serious issues


    The numbers in Table 13-2 are given in fractions of one second, and it’s often
    easier to have this illustrated and communicated in milliseconds. By multiplying
    the values shown in the table by 1,000, the time will be displayed in milliseconds
    (ms). Throughout this chapter, when disk read and write time is referenced, it
    will be shown in milliseconds.


    Armed with this as a guideline, be aware that there are additional variables to
    take into account that can and should be taken into account when you’re striving
    to better understand your I/O footprint or resolve a potential issue in your environment.
    The specific variables are TempDB and transaction logs. You also should keep your
    application in mind. If you support an ultra-low latent application—such as those
    found in the credit card industry or trading industry, such as the stock market
    or energy market—these numbers are likely not applicable. Alternatively, if your
    application supports a mail order catalog, which has no user front end and is
    predominately batch in nature, these numbers could be too aggressive. Again, it’s
    all relative. The intent of providing the numbers in Table 13-2 is to give you
    a gauge of what I’ve commonly seen over the years with a variety of applications
    and I/O requirements.


    Logs are more impacted by long write times and, depending on the environment,
    can become problematic by having long read times as well. Each transaction in
    a database that requires an element of data modification (Insert, Update, or Delete)
    is a logged operation. This is always the case, regardless of the recovery model
    in place. As such, ensuring that the write time for your transaction logs is as
    low as possible is perhaps one of the most important things you can do within
    your database environment.


    A practical way to think about this is in terms of write transactions per second.
    This counter is interesting to look at in combination with transactions per second
    because it illustrates how many transactions are dependent on the write time to
    the transaction log. If you couple this value with the Avg.


    Disk sec/Write, you can often find a correlation. The reason that this matters
    is that if your database environment is adding 20 unnecessary milliseconds to
    each write transaction, you can multiply the quantity of write transactions by
    the quantity of milliseconds to further understand how much “wall clock”


    time is being spent on waiting for the storage array to tell the OS it has completed
    its operation. As you do that math, watch your blocking chains and scenarios and
    you will likely see that you have a higher number of blocks during the longer-duration
    log write events.


    n **Note** I’ve seen the Avg. Disk sec/Read and Avg. Disk sec/Write times as high
    as five seconds. Conversely, I’ve seen this value as low as 10 ms with Disk Bytes/sec
    measuring higher than 1,400 MB/sec. Each of those two 318


    ![Image 158](index-326_1.png)


    chapter 13 ■ I/O: the UntOld StOry


    scenarios are extremes, and although we all want over 1 GB per second in throughput,
    with our read and write times below 10 ms, very few of us have the budget to accomplish
    that. However, we all should have the budget and tools to keep us from having
    requests taking longer than a second. If you aren’t in that scenario, perhaps
    it’s because you haven’t helped to build the case for the additional capital expenditure.
    Keep in mind that while numbers are numbers, people are people and they might
    not be as passionate about the numbers you are passionate about. The old adage
    of “Know your customer” is very relevant to the I/O discussion because the conversation
    typically involves pointing out that a meaningful amount of money needs to be
    spent based on your findings and recommendation.


    The size of the I/O request also plays a part. The size refers to how much data
    exists for each request.


    Traditionally, read IOPs will have larger blocks than write IOPs. This is due,
    in part, to range scans and applications selecting more data than they write.
    This is another area where understanding your I/O'
