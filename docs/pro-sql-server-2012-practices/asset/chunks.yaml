    成功部署的关键在于确保所有相关方都已认可并签署同意所需的要求及用于实现目标的流程。当管理者或高管期望得到一样东西，但最终结果却大相径庭时，问题就会出现。管理好这些个体的期望将大大有助于成功部署。此外，还需核实所有关键人员是否理解所实施流程的实际作用。如果你花费巨资建立了一个带
    `SQL` 的 `Windows 故障转移群集`，而管理层却期望能有一个用于报表的数据副本，那么之后你将不得不进行大量解释。


    请牢记以下几点：


    **SQL Server 版本** 某些功能仅在 `Enterprise 版` 中可用，这比 `Standard 版` 会产生更高的许可成本。


    **延迟** 确定延迟是否会对你的系统产生负面影响。在许多情况下，一份延迟 15 分钟到 1 小时的数据副本可能已完全满足业务需求。


    **总体目标** 当数据冗余的需求是为了高可用性或灾难恢复时，`日志传送`、`镜像` 和 `故障转移群集` 很可能是开始构建实施计划的出发点。当寻求负载均衡、报表或分布式系统解决方案时，`复制`
    或 `AlwaysOn 可用性组` 可能是更好的起点。


    请记住，总会有这样一些情况，管理层可能会选择一个你并非完全赞同或认为不是最优的方案。通常，这是由于成本考虑、资源考虑或两者兼而有之。例如，管理层可能倾向于避免
    `Enterprise 版` 的高成本。在这种情况下，不要固执己见。应利用现有条件开展工作。


    ### 保持数据一致性


    我们现在已经描绘了每种技术能做什么的图景，并创建了一个路线图来帮助确定最佳行动方案。现在，是时候谈谈如何确保最终解决方案平稳运行了。


    首先且最重要的是，你需要监控你的系统。有些功能，如 `复制`，带有内置的监控工具。在发生故障时，这些工具可以作为故障排查的起点。然而，其他功能则完全没有监控工具，除非你自行构建——例如
    `BCP`。


    如果你构建了一个自动化系统，请记住也要包含错误处理和通知机制。你的环境中可能发生的最糟糕的事情，就是几小时或几天后才发现你的数据不同步！


    如果你发现数据不一致，你需要准备好迅速修复它们。通知上级和用户对于防止情况失控至关重要。要制定好故障发生时的沟通计划。时机非常重要。提前规划好快速沟通。

