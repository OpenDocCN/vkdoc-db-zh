- fmt: '# Chapter 5 ■ From SQL Trace to Extended Events


    Those take care of creating, altering, starting, stopping and viewing trace files.
    Table 5-1 shows the extended stored procedures and functions names and what they
    do.


    ## Table 5-1. SQL Trace extended stored procedures and functions and descriptions
    about what they do


    **Extended Stored Procedure/Function**


    `fn_trace_geteventinfo`

    Returns information about events included in a trace.


    `fn_trace_getinfo`

    Returns information about a specified trace or all existing traces.


    `fn_trace_getfilterinfo`

    Returns information about filters applied to a trace.


    `sp_trace_create`

    Creates a trace definition. The new trace will be in a stopped state.


    `sp_trace_generateevent`

    Creates a user-defined event.


    `sp_trace_setevent`

    Adds an event class or data column to a trace, or removes one from it.


    `sp_trace_setstatus`

    Starts, stops, or closes a trace.


    `sp_trace_setfilter`

    Applies a new or modified filter to a trace.


    If you look at these stored procedures and functions in greater detail you’ll
    notice they’re not the most intuitive things to work with. For example the trace
    events and columns are not referenced by their names but their ID’s. This is where
    SQL Profiler comes to the rescue. It has the ability to export a defined trace
    to a `.sql` file that you can use to start the SQL trace on the server. This makes
    life much easier than having to code everything by hand. The created file does
    have to be checked and things like trace name and path have to be manually entered.
    To do this, start a trace, stop it, then go to File->Export->Script Trace Definition
    and choose the desired SQL Server version.


    There are two out of the box traces that come with SQL Server: a blackbox trace
    and a default trace.


    The blackbox trace is not running by default. As its name suggests, it’s a trace
    you can’t modify in any way. There is no adding of events, filtering, or changing
    the target file settings. You can either start it or stop it.


    You start it by using `sp_trace_create` with option 8, it contains only 4 events
    (RPC starting, Batch starting, Exception, Attention) and is saved to a 5 MB file
    at `%SQLDIR%\MSSQL\DATA\blackbox.trc`. When that file is full it creates a second
    rolled over filed called `blackbox_1.trc`. When the second file gets full it again
    starts writing into the first one and so on. It has been used for troubleshooting
    and auditing in SQL Server 2000 but now other functionality is used for that,
    such as the default trace and custom solutions.


    The second built in trace is called the Default Trace. It was introduced in SQL
    Server 2005 as a lightweight diagnostic trace and unlike the blackbox trace, it
    runs by default unless you specifically turn it off by enabling advanced options
    with `sp_configure`. Like the blackbox trace it can’t be modified. It uses 5 files
    of 20 MB that are rolled over. The following code shows how to see if the default
    trace is running and how to enable it if not.


    ```sql

    -- See if the default trace is enabled

    SELECT * FROM sys.configurations WHERE configuration_id = 1568

    GO

    -- See if the default trace is running

    SELECT * FROM sys.traces WHERE is_default = 1

    GO

    -- if not start it

    sp_configure ''show advanced options'', 1;

    GO

    RECONFIGURE;

    GO

    sp_configure ''default trace enabled'', 1;

    GO

    RECONFIGURE;

    GO

    ```


    It contains quite a few more events than the blackbox trace, 32 to be exact. They
    events are from 6 categories: Server, Database, Error and Warnings, Full Text,
    Object related, and Security audit. The complete set of events can be found in
    Books Online. As useful as the default trace is, if you have an application that
    creates, alters, or drops a lot of objects (like temporary tables in tempdb) the
    needed information may be quickly lost. The following code shows three events
    that get written to the default trace: the Sort Warning, the Missing Join Predicate
    and the Audit Addlogin Event with Add and Drop subclasses. If you’re going to
    run this code, make sure to change the path to the Default Trace.


    ```sql

    -- make a suboptimal plan that gets reused and creates a sort warning.

    -- creates the Sort Warning event in the default trace

    USE tempdb

    -- create test table

    IF (OBJECT_ID(''TestSortWarning'', ''U'') IS NOT NULL)

    DROP TABLE TestSortWarning

    GO

    CREATE TABLE TestSortWarning

    (

    c1 NVARCHAR(100) NOT NULL,

    c2 NVARCHAR(40) NOT NULL

    )

    GO

    -- insert 100000 random rows

    INSERT INTO TestSortWarning(c1, c2)

    SELECT TOP 100000 c1.name, CAST(NEWID() AS NVARCHAR(40))

    FROM sys.all_columns AS c1,

    sys.all_columns AS c2

    GO

    CREATE CLUSTERED INDEX CI_TestSortWarning_c1 ON TestSortWarning(c1)

    GO

    -- Clear the cache

    DBCC freeproccache

    GO

    -- returns 0 rows

    EXEC sp_executesql N''SELECT * FROM TestSortWarning WHERE c1 LIKE @p1 ORDER BY
    c2'', N''@p1 NVARCHAR(20)'',

    @p1 = ''#%''

    GO

    -- Sort warning because of suboptimal plan (see row count estimation for sort
    operator)

    EXEC sp_executesql N''SELECT * FROM TestSortWarning WHERE c1 LIKE @p1 ORDER BY
    c2'', N''@p1 NVARCHAR(20)'',

    @p1 = ''B%''

    GO

    USE master

    GO

    SELECT TE.name, T.DatabaseName, T.DatabaseID

    FROM sys.fn_trace_gettable(''C:\Program Files\Microsoft SQL Server\MSSQL11.SQL2012\MSSQL\Log\log.trc'',
    DEFAULT) T

    JOIN sys.trace_events TE ON T.EventClass = TE.trace_event_id

    WHERE TE.name = ''Sort Warnings''

    ORDER BY T.StartTime DESC

    ```


    ```sql

    -- Make a CROSS JOIN between 2 columns.

    -- creates the Missing Join Predicate event in the default trace

    USE master

    GO

    SELECT top 100 *

    FROM master..spt_values t1,

    master..spt_values t2

    GO

    SELECT TE.name, T.DatabaseName, T.DatabaseID

    FROM sys.fn_trace_gettable(''C:\Program Files\Microsoft SQL Server\MSSQL11.SQL2012\MSSQL\Log\log.trc'',
    DEFAULT) T

    JOIN sys.trace_events TE ON T.EventClass = TE.trace_event_id

    WHERE TE.name = ''Missing Join Predicate''

    ORDER BY T.StartTime DESC

    GO

    ```


    ```sql

    -- Create a login and drop it.

    -- This creates the Audit Addlogin Event: Add

    -- and Audit Addlogin Event: Drop events in the default trace

    USE master

    CREATE LOGIN DT_LOGIN_TEST WITH PASSWORD = ''I_AM_PASSWORD!'';

    GO

    DROP LOGIN DT_LOGIN_TEST

    GO

    SELECT TE.name AS [EventName], TSV.subclass_name, T.DatabaseName, T.DatabaseID

    FROM sys.fn_trace_gettable(''C:\Program Files\Microsoft SQL Server\MSSQL11.SQL2012\MSSQL\Log\log.trc'',
    DEFAULT) T

    JOIN sys.trace_events TE ON T.EventClass = TE.trace_event_id

    JOIN sys.trace_subclass_values TSV ON TSV.trace_event_id = TE.trace_event_id AND

    TSV.subclass_value = t.EventSubClass

    WHERE te.name LIKE ''Audit Addlogin Event''

    ORDER BY T.StartTime DESC

    ```


    If you need to collect more data than the default trace, you should create another
    trace with just the extra data and correlate the two to reduce overhead. Even
    though the default trace is lightweight, one can never be too careful.


    ## Event Notifications


    Event notifications were introduced in SQL Server 2005. They are based on Service
    Broker, a asynchronous addition to the database engine. Figure 5-6 shows the basic
    architecture of Service Broker. You can see the Service Broker building blocks:
    messages, services, queues and dialogs. Service Broker can send messages between
    databases and servers in transactional manner keeping the properties of ACID intact.
    The communication between two endpoints can be open or encrypted (transport security).
    Even messages themselves can be encrypted (dialog security). We’ll cover just
    the very basics of Service Broker but for deeper understanding you can read about
    it in Books Online.


    ![Image 66](index-121_1.png)


    ### Figure 5-6. SQL Server Service Broker basic architecture'
