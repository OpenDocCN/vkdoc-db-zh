    Analyzing Configuration Data


    Typically, when a new server configuration that will run SQL Server is built,
    it is often done with a standard build approved by the IT organization and it’s
    not necessarily optimized for SQL Server. Most companies like to maintain as few
    server configurations as possible and make them work everywhere if possible. The
    build process most likely will be automated to a certain extent, with some items
    manually configured. The result is expected to be a server that looks, acts, and
