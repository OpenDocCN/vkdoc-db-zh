  trans: "\n# 第 18 章 ■ 高峰期负载调优\n\n## 从活动数据中识别关键问题\n\n正如您所见，通过当前活动数据的这一次执行，您可以识别出此\
    \ SQL Server 实例的若干行为。这些行为将帮助您开始在脑海中构建一幅心理图景，了解在长期监控系统时可能会看到什么。您可能会看到的一些行为如下：\n\
    \n*   存在大型阻塞链。\n*   存在消耗大量资源的查询。\n*   应用程序正在数据库中使用应用程序锁（`sp_getapplock`）。\n* \
    \  某些频繁执行的存储过程存在非最优执行计划。\n\n在上列清单中，有几个关键项需要在旺季开始前解决。例如，我们在本章开头讨论了影响应用程序的大型阻塞链。图\
    \ 18-15 中的阻塞链至少影响了用户 4 分钟，这可能使业务损失数千美元的潜在订单。\n\n![Image 216](img/index-464_1.png)\n\
    \n需要为所有这些项捕获额外的信息。您需要识别唯一的阻塞链、它们发生的时间以及涉及的对象和进程。另一个阻塞信息来源是 `sys.dm_db_index_operational_stats`\
    \ DMV，您可以用它来查看哪些对象经常等待锁或存在锁争用。需要对频繁执行的语句进行调优，并可能重写，以最小化获得非最优执行计划的可能性。核心业务事务的目标是它们可预测，以便能够满足\
    \ SLA 中的性能要求。如果一个核心业务事务涉及的几个存储过程的运行时差异很大，那么无法满足 SLA 要求的风险就会增加。下一步将处理大型资源消耗者，因为我们将审查从\
    \ SQL Server 和应用程序捕获的运行时数据。\n\n## 索引利用率分析\n\n首先审查在数据收集阶段捕获的索引利用率统计信息。\n\n索引更改通常是低风险、高回报的更改。如果您调整核心表上的索引策略，可以对大量\
    \ SQL 语句产生积极影响。如果您从调优 SQL 语句开始，风险则更高。调优 SQL 语句需要更多精力和大量测试。在调整索引策略并影响许多执行计划后，您将处于更有利的位置来审查\
    \ SQL 语句的运行时性能。\n\n图 18-16 展示了您将要审查的一个样本数据集。它是索引使用数据结果集的一个子集。视图中包含的额外列有：服务器名称、数据库名称、源、对象名称、`object_id`、索引名称、最后用户扫描时间、最后用户查找时间以及运行时长。\n\
    \n***图 18-16.** 所有索引的使用统计信息。*\n\n图 18-16 显示了特定对象上索引的使用统计信息以及其他一些元数据。此数据包含许多对分析至关重要的属性，例如\
    \ `is_unique`、`rowcnt`、总页数以及表上的索引总数。通过此数据，您可以确定以下场景：\n\n*   **未使用的索引：** 从未被使用的索引。\n\
    *   **高成本索引：** 维护该索引所需的资源超过了其使用频率所能证明的合理性。\n*   **索引数量过多：** 审查所有具有大量索引的表。多少算作大量索引？答案取决于\
    \ SQL Server 支持的应用程序类型：\n    *   **事务型数据库：** 对于此类数据库，大量索引大约是每表 3 到 5 个，但“大量”的具体标准实际上取决于系统活动量。\n\
    \    *   **报表型数据库：** 对于此类数据库，可以接受更高的数量，但大量索引可能会影响提取、转换和加载（ETL）性能。\n    *   **混合型\
    \ – 事务型和报表型数据库：** 如果同时使用上述两种类型的数据库，则大约每表 5 到 7 个索引被认为是大量索引。不过，这实际上取决于系统活动量。\n\
    *   **缺失索引：** 扫描次数较多的大型对象是需要添加索引的候选对象。\n*   **查找次数过多：** 审查针对该对象的最频繁语句，看看添加一两个列是否有助于减少查找的需要。记住，可以利用\
    \ `INCLUDE` 列，但也要考虑索引宽度。\n*   **非最优聚集键：** 注意图 18-17 中的非聚集索引，其查找次数较少，而在聚集索引上的查找次数较高。这表明访问此表的常用路径是通过\
    \ `PK_Table1` 而非 `CDX_Table1`。在此示例中，考虑更改聚集列。\n\n![Image 217](img/index-465_1.png)\n\
    \n***图 18-17.** 一个需要将聚集键切换到另一列（或多列）的表的使用统计信息。*\n\n**注意：** 实施新的索引更改后，您需要收集更新后的\
    \ DMV 性能数据（如图 18-16 所示）和跟踪数据（如表 18-5 所示），因为索引统计信息和性能特征已经改变。\n\n在对系统进行多次性能调优，或者随时间推移对同一系统进行调优之后，您会开始注意到，调优索引能解决大部分问题。调整配置、事件时序和代码则能解决剩余的问题。\n\
    \n## 识别要调优的 SQL 语句的方法\n\n在识别要进行性能调优的 SQL 语句时，可以使用几种方法。以下是不同的来源，按优先顺序列出：\n\n* \
    \  **按执行次数排名前 100 的查询统计信息：** 这些频繁调用的语句代表了总资源消耗的大部分。如果这些语句中有 75%通过索引或代码修改得到调优，您将大幅降低总资源消耗。记住，人员和时间通常是有限的，所以应将时间花在对系统有重大影响的调优过程上。不要调优那个使用了\
    \ 5 亿次 I/O 的单个查询，因为这并非有效利用时间，并且您在系统资源方面能看到的净节省并不大。\n*   **来自核心业务事务的所有语句：** 评估这些语句，因为它们直接影响用户体验。如果您让这些语句变得更快，用户体验很可能会更好。\n\
    *   **经常收到非最优执行计划且被频繁调用的 SQL 语句：** 根据我的经验，非最优执行计划通常糟糕几个数量级，并可能在服务器上引发额外问题。\n\n\
    通过调整索引策略和对最频繁调用的存储过程进行性能调优，您可以降低服务器的总资源消耗。通常会有一个消耗大量资源的大型查询，但对它的调优应次于对每天执行一百万次的查询的调优。一旦更改实施，如前面所述测量新的资源水平，看看情况是变好还是变差。这是一个迭代过程，因此请务必收集更新的元数据和运行时统计信息。\n\
    \n在此练习结束时，如果您确定当前环境无法处理高峰期负载，请开始考虑其他与环境或流程相关的更改。并非每次更改都需要是代码或配置更改。如果报表是在事务型环境中运行的，并且总资源消耗占\
    \ 25%，您能将其转移到另一台运行 SQL Server 的服务器上吗？\n"
- fmt: '# CHAPTER 18 Tuning for Peak Load


    If you only need 5 percent to 10 percent more resources, what can be delayed or
    turned off during the peak load? Can you run the maintenance processes two days
    before? What about disabling nonessential processes? When you are tuning for peak
    usage, every option should be on the table. Sometimes you need to think outside
    of the box because certain environments have some unique challenges.


    ## Devise a Plan


    So how do you translate all the analysis and findings into an actionable plan?
    As you have done up until now, you need to take your time and review all of the
    findings to come up with the right solutions. The challenge now is determining
    what change you implement first, and what the expected impact and potential risks
    are of applying that change. Are there any system limitations that you identified
    earlier that might impact the potential changes—including figuring out whether
    the change can even be implemented? These questions are complex and the potential
    impact of your decision is often not fully understood until the change is fully
    deployed into a test or production environment.


    The same way that you started to analyze the data, you will implement the proposed
    changes. Always start with the configuration changes. These will correct misconfigurations
    in the environment or change the behavior of the respective technology. For example,
    if you choose `Optimize For Ad-Hoc Workloads` option in `SQL Server`, this will
    change the behavior of `SQL Server` and reduce the amount of memory consumed by
    the procedure cache at the instance level. After you make a change, make sure
    you document the actual result of the change if possible. This way, you can have
    a record of the action and result just in case there is an issue later on and
    the change needs to be rolled back.


    `Table 18-11` is the sample order of proposed changes for the tax application.
    In addition to the server-specific changes shown in `Table 18-11`, there can also
    be application, infrastructure, and process-related changes.


    *Table 18-11. A sample plan for tuning the tax application.*


    | **Technology** | **Proposed changes for tax application** |

    | :--- | :--- |

    | Firmware and drivers | Update the `HBA` and `NIC` drivers. |

    | Network changes | Move the application servers to the same switch as the database
    server.<br>Switch the `NIC`s to an `Active\Active` configuration. |

    | SAN changes | Change the `HBA` queue depth to `64`.<br>Perform a `LUN` migration
    for the critical `LUN` to a faster tier of storage. |

    | OS configurations | Change the location and size of the pagefile.<br>Change
    the power profile to `High Performance`.<br>Add the `SQL Server` service accounts
    to the following local policies:<br>• `Lock Page in Memory`<br>• `Perform Volume
    Maintenance Tasks`<br>Add file exclusions for `SQL Server` and `Cluster` resources.
    |

    | SQL Server – Server properties | Choose the `Optimize For Ad-Hoc Workloads`
    option.<br>Enable trace flags `1118` and `834`.<br>Reduce the `Max Server Memory`
    setting from `120,000` to `108,000`. |

    | SQL Server database configurations | Change the growth method and size for all
    databases to `512 MB`.<br>Pre-grow several database files, and synchronize the
    file size.<br>Add files to `TempDB`, from `1` to `8`.<br>Reduce `VLF`s for three
    databases.<br>Move the primary database data files to the new `LUN`. |

    | Index changes | `DROP`, `ADD`, and `ALTER` indexes.<br>Change the `FILLFACTOR`
    from `50` ( *existing setting*) to `100`.<br>Reduce the `FILLFACTOR` for several
    highly transactional objects from `100` to `80`.<br>Implement `ROW`-level compression
    for all objects. |

    | SQL statement changes | Change the nontrusted constraints to trusted.<br>Implement
    the updated version of the `SQL` statements. |

    | Maintenance changes | Change the index rebuild to rebuild only objects with
    fragmentation greater than `20` percent, and set this to be done nightly.<br>Cycle
    the error log nightly at `12 AM`. |

    | Job timing changes | Disable old jobs.<br>Change the maintenance jobs to start
    at `:12` and `:18` past the hour rather than at `:00` and `:15`.<br>Change the
    schedules for several of the jobs to minimize the number of jobs running concurrently.
    |

    | Monitoring | Add additional alerts in the `Enterprise Monitoring` tool. |'
