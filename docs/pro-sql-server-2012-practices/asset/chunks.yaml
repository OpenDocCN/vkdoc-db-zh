    ## 扇出支持

    从开发角度来看，无法在单个调用中向联邦成员发出请求。开发人员负责在客户端发出请求并处理结果。


    ## 数据库副本

    当前不支持针对根数据库或联邦成员执行数据库副本操作。


    ## 隔离的架构更改

    对联邦成员架构的更改仅保留在该联邦成员内部。


    ## 用户界面

    目前，唯一支持管理 SQL Database 联邦的界面是 SQL Database 管理门户。


    ## 其他

    还存在其他限制，例如不支持索引视图、对联邦列有额外限制等。完整限制列表请查阅 MSDN：[`msdn.microsoft.com/en-us/library/windowsazure/hh597469`](http://msdn.microsoft.com/en-us/library/windowsazure/hh597469)。


    ## 性能问题疑难解答

    如果你遇到 SQL Database 的性能问题，首先要遵循传统的数据库调优技术，例如评估索引、调整 T-SQL 语句、限制触发器使用，以及最小化数据库往返次数和返回给消费者的数据量。


    不幸的是，如前所述，SQL Database 不支持使用 SQL Trace。这是因为 SQL Trace 所使用的系统存储过程在 SQL Database
    实例上无法访问。


    好消息是，你可以访问某些动态管理视图 (DMV)。你还可以通过 SSMS 或 SQL Database 管理门户访问执行计划。


    ### 可用的动态管理视图

    DMV 是 SQL Server 和 SQL Database 提供的宝贵系统视图，用于对数据库引擎的内部运行进行疑难解答。出于安全原因，SQL Database
    提供的 DMV 是 SQL Server 下可用 DMV 的一个子集。SQL Database 中可用的 DMV 包括：


    *   `sys.dm_exec_connections` 返回在 SQL Database 实例中建立的连接列表。

    *   `sys.dm_exec_query_plan` 返回 SQL 查询或批处理的 XML 执行计划。

    *   `sys.dm_exec_query_stats` 返回缓存查询计划的聚合性能信息。

    *   `sys.dm_exec_requests` 返回有关 SQL Database 实例正在执行的语句的信息。

    *   `sys.dm_exec_sessions` 返回当前打开的会话以及有关该会话的性能信息。但是，它不返回上次登录信息，例如 `last_successful_logon`
    列。

    *   `sys.dm_exec_sql_text` 返回 SQL 批处理的文本。

    *   `sys.dm_exec_text_query_plan` 以文本格式返回 SQL 查询或批处理的执行计划。


