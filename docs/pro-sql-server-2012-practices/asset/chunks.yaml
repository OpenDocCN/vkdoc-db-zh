- fmt: '# CHAPTER 18: Tuning for Peak Load


    ## SQL Server: SQL Statistics\Batch Requests/sec

    Provides an indication of how busy SQL Server is. Also, review `Databases: Transaction
    /sec`.


    ## SQL Server: SQL Statistics\SQL Compilations/sec

    Compilations consume resources. Monitor how many compiles per second are occurring.


    ## SQL Server: SQL Statistics\SQL Re-Compilations/sec

    If recompilations are higher than 10 percent of your compilations, research and
    see if recompiles can be reduced by changing the type of calls the application
    is making.


    ## SQL Server: Wait Statistics (Average Wait time (ms))

    Wait types in SQL Server tell you what resource a process is waiting for, excluding
    CPU resources. If a SQL Server process is scheduled to run, the total time is
    the wait time plus the execution time.


    ## Storage: LogicalDisk(*)\% Idle Time

    By reviewing `% Idle Time`, you can determine how busy a disk is. A busy disk
    does not mean it is slow. You need to take into consideration the `Avg. Disk sec/Read`
    and `Avg. Disk sec/Write` performance as well.


    ## Storage: LogicalDisk(*) Performance Counters

    A busy SQL Server instance requires the average read and write times to be below
    20 ms. The transaction log should be placed on the fast disk, with write times
    below 10 ms on average. Relevant counters include:

    - `LogicalDisk(*)\Avg. Disk sec/Read`

    - `LogicalDisk(*)\Avg. Disk sec/Write`

    - `LogicalDisk(*)\Disk Bytes/sec`

    - `LogicalDisk(*)\Disk Reads/sec`

    - `LogicalDisk(*)\Disk Writes/sec`


    ## 6. Scheduling the Data Collector

    The last step is to schedule the data collector. Click on the Schedule tab, as
    shown in Figure 18-5. This tab provides several options for scheduling, such as
    Beginning Date and Expiration Date, along with options for specifying the time
    and days. You can use the options on this tab to schedule the data collector over
    a weekend or during off-peak hours. To add a schedule, click on the Add button
    and select the beginning date and Expiration Date.


    ![Image 205](index-447_1.png)

    ![Image 206](index-447_2.png)


    **Figure 18-5.** The Folder Action dialog box, which was accessed from the Schedule
    tab, for a data collector.


    ## 7. Setting Stop Conditions

    Another tab that is commonly used is Stop Condition, which is shown in Figure
    18-6. You can use this tab to define stop conditions for the data collector. This
    is important because you can use it to ensure that the data collector does not
    run for an extended period of time and eventually cause additional issues on the
    system. A common rule to follow is to always define a stop condition based on
    time or file size. This minimizes the risk that the data collector will fill up
    the system partition and cause an outage.


    **Figure 18-6.** The Stop Condition tab for a data collector.


    ## Collecting Application Performance Data

    The Perfmon data collected to date provides a view into how the servers themselves
    are performing, but it is only one view of what is going on. This information
    does not tell you what type of code SQL Server is running, what type of calls
    are being executed from the various application servers, and whether the performance
    is optimal. Capturing this type of data is called *application profiling*. Application
    profiling involves capturing all of the application calls generated by performing
    a single action from a process or an end-user request. Profiling an application
    gives you important data related to performance tuning an application. This information
    helps you understand what operations the application is performing for a specific
    request. Following are several questions to get answers to when you are reviewing
    the application profile data.


    > **Note:** These application-profile questions are focused on the database tier.


    - How many database statements were executed for each request?

    - Were the database statements part of a single batch, or is each one a separate
    database call?

    - Is the application using connection pooling? If not, how many login/logout events
    occurred for each application request?

    - Are the database calls ad-hoc or stored procedures?

    - Are there statements that consume a high number of physical resources—such as
    CPU or I/O—or are there long-running statements?


    To profile an application, you can use `SQL Server Extended Events` to define
    custom traces to capture the application requests and other pertinent data. Just
    like the Perfmon data, this data can be used as a baseline for the application
    or the database server.


    > **Note:** `SQL Server Profiler` was deprecated as of SQL Server 2012, so it
    is recommended you start learning how to use the Extended Events feature.


    Before you can start, you need to define the different types of data you want
    to capture. Typically, there are four types of traces that are run to capture
    different types of data, as shown in Table 18-5, with some sample guidelines.


    **Table 18-5.** The four types of transactional activity to capture from SQL Server.


    | Name | Goal |

    | :--- | :--- |

    | Error messages and connection issues | By capturing `User Error Messages` and
    `Attention` events you can see many of the errors occurring on the server that
    are usually not known to the application developers or DBAs. The findings from
    this trace typically get added to the findings list for you to prioritize and
    address. |

    | All application activity | As the title states, this trace captures 100 percent
    of the calls for several short durations during different time windows. This trace
    data provides insight into the mix of calls from the various applications and
    parameters you specify. |

    | Greater than X duration | Depending on the SLAs for the core transactions, this
    trace captures every statement that runs for 1 second or more. This trace is run
    for 48 hours or more, depending on the environment. Once the application has been
    tuned, run this trace again and compare the number of statements captured before
    and after the performance-tuning event. The net result should be a reduction in
    the number of long-running statements. |

    | Application Profile | Use this trace to monitor the core business processes
    and capture all of the database calls for each process. You can use this data
    to see how many calls are generated to complete one business transaction. Some
    applications are chattier than others, but this information is good to know because
    sometimes the number of calls can be reduced if your company owns the code base
    and has time to devote to this effort. You also can use this data to analyze the
    statements and start to tune them, if they support one of the core business processes
    in the application. Saving 100 ms or 2000 CPU cycles here might have a huge impact
    on the core business transactions. Remember, a positive byproduct of tuning the
    transactions is faster transactions and a happier end user. |


    When using `Profiler` to capture system activity, make sure to create a server-side
    trace and log the information to a file locally. If possible, save the file to
    a faster drive (especially one that does not contain the data and log files for
    the database being analyzed) to improve the performance. Table 18-6 is a list
    of recommended columns to capture when you use `Profiler` or `Extended Events`.


    **Table 18-6.** The SQL Server Profiler and Extended Event attributes to collect
    when capturing the activities defined in Table 18-5.


    | SQL Server Profiler Attributes | Extended Event Attributes |

    | :--- | :--- |

    | `Application Name` | `client_app_name` |

    | `SPID` | `session_id` |

    | `Database Name` | `database_name` |

    | `Start Time` | N/A |

    | `Text Data` | `statement` |

    | `Login Name` | `server_principal_name` |

    | `CPU` | `cpu_time` |

    | `Duration` | `Duration` |

    | `Reads` | `logical_reads`, `physical_reads` |

    | `Writes` | `writes` |


    ![Image 207](index-450_1.png)


    ## Analyze the Data'
