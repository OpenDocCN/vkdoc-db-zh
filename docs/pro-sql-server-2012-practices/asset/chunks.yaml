    to see a benefit. Get accurate baselines so that you know how compression affects
    query performance. Look at your allocation-unit structure: tables with 100 percent
    IN_ROW_DATA pages are great candidates for compression. You want to tread carefully
    with anything lower than 50 percent. Tables and indexes with greater than 45 percent
    scan usage patterns are candidates for compression; for update patterns lower
    than 45 percent (down to 20 percent), use row compression. For 20 percent and
    lower, use page compression, get a baseline, and test again.


    **chapter 15**


    ■ ■ ■


    **Selecting and Sizing the Server**


    **By Glenn Berry**


    With the release of SQL Server 2012, Microsoft has moved to a new licensing model
    that is quite different from previous releases. Because of this, it is quite important
    to revisit how you go about selecting database server hardware in order to get
    good performance and scalability while still keeping your SQL Server 2012


    license costs under control. SQL Server 2012 Enterprise Edition uses core-based
    licensing, where you pay for licenses based on physical processor cores, with
    a minimum of four physical core licenses required for each physical processor.
    This is quite a change from the socket-based licensing used by SQL Server 2008


    R2 and all previous releases of SQL Server.


    This new model came as an unpleasant shock to many people when it was first revealed
    in November 2011, causing some database professionals to immediately assume a
    worst-case scenario of a fourfold price increase for SQL Server 2012 licenses.
    This chapter will show you how to properly select your database server hardware
    to maximize your performance and scalability, while keeping your SQL Server licensing
    costs under control.


    Depending on your workload type, you will want to make different hardware choices
    to get the best performance and scalability for your workload.


    n **Tip** Read the entire chapter before you actually spec out any hardware. The
    interaction between workloads, hardware, and SQL Server licensing is a complex
    subject. It is easy to make an expensive mistake if you don’t understand the concepts
    involved.


    The hardware I look at in this chapter is specifically the server itself, meaning
    the form factor, and also the CPU and memory. Your CPU choice most strongly affects
    your licensing costs, and I spend a good deal of time looking at CPU choices with
    respect to SQL Server’s new licensing model. Microsoft’s new pricing scheme changes
    the game, and it’s important to revisit assumptions you might be holding that
    are no longer valid.


    Understanding Your Workload


    SQL Server places different demands on its underlying hardware depending on what
    type of database workload is running against the instance of SQL Server. Database
    engine workloads are quite different 361


    chapter 15 ■ Selecting and Sizing the Server


    than file server, web server, or application server workloads. SQL Server instances
    that are running the database engine generally see one of two main types of workloads.
    One type is an online transaction processing (OLTP) workload, while the other
    type is a relational data warehouse (DW) workload.'
