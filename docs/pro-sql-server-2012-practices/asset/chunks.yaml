  raw: '[varcharType],0)=[@1]. This indicates that it has converted the column value,
    effectively rendering any indexes on the varcharType column useless for any seek
    operation. Note, too, that when it comes to character values, there is also a
    collation that controls how values are sorted and compared that can also cause
    type mismatches.


    These are simple examples, but these issues crop up all of the time because there
    are plenty of places where you have to compare values, in joins, searches, and
    so on. Attention to the detail of getting the datatypes right can give you great
    dividends in terms of performance and data quality. In the next section, I’ll
    expand the topic of data quality and limiting data beyond datatypes, but the datatype
    choice is quite often your first physical model choice that you will make.


    Constraints


    Once you have designed the tables, and picked the datatype to match the need,
    you need to constrain the data to only what is “legal.” The more correct you can
    keep the data, the less time you’ll spend correcting mistakes. Any data that can
    be realistically constrained ought to be. For example, often someone will design
    a column to hold the country name in an address. There are fewer than two hundred
    countries in the world, but if you give users a simple text column to enter the
    country name, you might get over 200


    different spellings of each country. With a little ingenuity, you can prevent
    misspellings by using one of SQL Server’s declarative constraints. It might not
    be possible to validate all data—for example, in the US, it is pretty easy to
    validate states, but validation gets more difficult as you get more granular.
    Validating counties and cities gets costly, and making sure postal codes match
    the city and state is a bit more difficult because there are so many allowable
    exceptions. Validating complete addresses may only be worth the effort only when
    you are doing bulk mailing operations that will give you a mailing discount.


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance To aid in
    constraining and guiding data-integrity challenges, SQL Server has five kinds
    of declarative constraints:


    •


    **NULL** Determines if a column will accept NULL for its value. Though NULL constraints
    aren’t objects like the other constraint types, they behave very much in the same


    manner.


    •


    **PRIMARY KEY and UNIQUE constraints** Used to make sure your rows contain only
    unique combinations of values over a given set of key columns. This type of


    constraint is used to protect the keys you design from duplicate data.


    •


    **FOREIGN KEY** Used to make sure that any foreign-key references have only valid
    values that match the key columns they reference.


    •


    **DEFAULT** Used to set an acceptable default value for a column when the user
    doesn’t provide one. (Some people don’t count defaults as constraints, because
    defaults


    don’t constrain updates.)


    •


    **CHECK** Used to limit the values that can be entered into a single column or
    an entire row.


    Constraints are part of the base implementation of a table that helps to ensure
    data quality. You should use constraints as extensively as possible to protect
    your data, because they’re simple and, for the most part, have minimal overhead.
    Of course, they are not free, and they can slow down your data creation to some
    extent (definitely for CHECK, FOREIGN KEY, and PRIMARY KEY/UNIQUE constraints),
    but poorly formatted data is far worse for your performance over time.


    n **Note** SQL Server also provides triggers that can be used for complex data-integrity
    implementation. However, they should be used only as a last resort because they
    can be tricky to get correct and can be very harmful to data integrity if not
    used correctly.


    One of the greatest aspects of all of SQL Server’s constraints (other than defaults)
    is that the query optimizer can use them to optimize queries, because the constraints
    tell the optimizer about some additional quality aspect of the data. For example,
    say you place a constraint on a column that requires all values for that column
    to fall between 5 and 10\. If a query is executed that asks for all rows with
    a value greater than 100 for that column, the optimizer will know without even
    looking at the data that no rows meet the criteria.


    Regardless of whether constraints help query performance directly, their part
    in maintaining data quality is one of the biggest factors in overall system performance.
    Beyond the topics I covered on normalization and datatypes, consider a database
    that contains the calendar of speakers for an event.


    Suppose that the database is perfectly designed but a few speaker assignments
    are not right. So every user now has to qualify all usage for all rows by manually
    checking values for bad data (a significant waste of time) and dealing with the
    data values that are wrong.


    Of course, while you can do a lot with constraints, you can only do so much. Users
    are humans (for the most part), so sometimes they hear things wrong. Sometimes
    they spell things wrong. (Trust me, the name Louis has always been a delight to
    see spelled; at least *some* of the spellings are masculine.). For example, say
    you have spent a large amount of time designing a customer database and your user
    has the following conversation with the customer:


    *Computer operator: “Hi, what is your first name?”*


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance *Phone Voice:
    “Fred.”*


    *[Computer keys click; pan to computer screen.]*


    *Input invalid: 23720823437 is not a valid person name*


    *Computer operator: “Hmm, I think I misspelled that. Can you spell it again?”*


    *Phone Voice (less happily): “F-r-e-d.”*


    *[Computer keys click; pan to computer screen.]*


    *First Name (as shown on screen): Jerkface*


    There is really nothing you can do about these types of “mistakes”. First, the
    caller’s name might have been Jerkface (but probably actually spelled Jearkfase!),
    so maybe it was entered correctly, but the software has no way of preventing the
    user’s error. Second, it might have been a female voice and the name “Fred”


    could have been wrong as it is a very uncommon female name(though the name Frederica
    could be shortened to Fred). These sorts of data issues are just the start of
    how complicated it is to stop all of the sorts of data integrity issues. I have
    worked with databases of addresses (all adequately designed for their purpose)
    with many permutations of American state, country, city, and street names that
    just couldn’t be correct. Yes, there is a country named Georgia, but it doesn’t
    have a state of Atlanta most likely.


    A useful implementation pattern is to take a column with a naturally fixed domain
    (such as the primary colors, or names of football teams in a league) and instead
    of trying to have a constraint that hard-codes a list of values (or perhaps hard-codes
    the list of values in the UI layer), create a table that implements a fixed domain.
    For example, suppose you have an address table like this: CREATE TABLE Address


    (


    …


    CountryName varchar(30)


    …


    );


    This table would allow users to enter anything for the country. Instead of leaving
    this open for users to enter fifteen different spellings of “United States,” adding
    a table to implement the domain of countries such as the following forces users
    to always enter (or choose) an actual, correctly spelled value.


    CREATE TABLE Country


    (


    CountryName varchar(30) NOT NULL PRIMARY KEY


    );


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance ALTER TABLE
    Address


    ADD FOREIGN KEY (CountryName) REFERENCES Country (CountryName);'
