    ## Update Statistics


    This task will build and execute an `UPDATE STATISTICS` statement. You choose
    the database(s), tables(s), and column or index statistics. You can also select
    to a full scan, or a percentage of the rows to sample.


    ## Creating a Maintenance Plan


    The `Check Database Integrity` task is important to run on a regular basis, and
    simple to set up as a maintenance plan. This task performs a `DBCC CHECKDB` on
    one or more databases to validate the data consistency on each page.


    To start creating the plan, right-click `Maintenance Plans`, then select `Maintenance
    Plan Wizard`. The starting screen is shown in Figure 10-14. Give the plan a descriptive
    name and enter a description. Choose the account to run the job. Use the `Change`
    button to set a schedule (the options will be the same as an Agent job).


    ![Image 125](index-262_1.png)


    ![Image 126](index-262_2.png)


    ***Figure 10-14.** Creating a maintenance plan*


    On the Select Maintenance Tasks, shown in Figure 10-15, choose the tasks you want
    to complete in this plan. For this example, choose `Check Database Integrity`.


    ***Figure 10-15.** Select maintenance tasks in the wizard*


    ![Image 127](index-263_1.png)


    The Select Maintenance Task Order screen, shown in Figure 10-16, will allow you
    to choose the order of the tasks you select. If you choose only one task, like
    in this example, the sort options are not available.


    ***Figure 10-16.** Choose the order of the tasks in your plan*


    The next step is to pick the databases you want to perform the task on, shown
    in Figure 10-17. Your options are as follows:


    - All databases

    - System databases: `Master`, `model`, `msdb`, and `tempdb`.

    - All user databases: All databases except `master`, `model`, `msdb`, and `tempdb`.

    - These databases: choose one or more databases


    Unless one database is very large or has other special requirements, it is best
    to check all databases.


    Checking the "Include indexes" option will check the index pages in the database,
    which is also recommended.


    ![Image 128](index-264_1.png)


    ***Figure 10-17.** Choosing the databases for the Check Database Integrity task*


    The Select Report Options screen, shown in Figure 10-18, is where you will set
    logging options for the plan. "Write a report to a text file" will generate a
    .txt file each time the plan is run, including details such as steps executed
    and errors. The default option is to save these to the server the plan is run
    on, which will take up space on the storage. Choose a disk used for logging purposes,
    or choose a different server or network location to save the logs. "Email report"
    will send an e-mail to an operator when the plan completes.


    ![Image 129](index-265_1.png)


    ***Figure 10-18.** The Select Report Options screen*


    After you complete the wizard, the plan will be created, and will begin executing
    using the schedule you created. To view the details of the plan, double-click
    the plan name under `Maintenance Plans`.


    ### Other Options


    Choosing your tasks is only the first step in a plan. After it’s created, you
    have options to control the flow of tasks. Flow control allows you to link two
    or more tasks together, and one can be dependent on the success or failure of
    the previous. As an example, you could set up a plan to reorganize your indexes
    and then update statistics. Because these two are related, having one plan instead
    of two can ease administration.


    There is a maintenance plan log file viewer also, to help you monitor the jobs.
    In SSMS, right-click `Maintenance Plans` and choose `View History`. You can see
    the success or failure of jobs, along with execute time, and errors if it failed.
    If you have plans set up, make sure you are monitoring them!


    ### Possible Pitfalls


    Maintenance plans are an easy way to set up basic administration of your instances.
    However, like any other feature, make sure you understand the options you have
    selected, and the implications. For example, choosing to rebuild all the indexes
    of a database is quite easy in the `Rebuild Index` task, but performing that task
    could impact the availability of the database to users due to locking and resource
    consumption while the task executes.


    ## SQL Server Integration Services


    SQL Server Integration Services is a tool designed for Extract, Transform, and
    Load (ETL) operations. It is frequently used to take data from a source such as
    a spreadsheet, a flat file, or another database system and import it into SQL
    Server. It’s also used to transfer data from one SQL Server database to another,
    whether that be from a production environment to a QA environment, or from an
    OLTP database to an OLAP database.


    `SSIS` works on the concept of packages. A package will have one or more tasks
    associated with it. Many of the tasks that are available in maintenance plans
    are available in `SSIS`. You’ll find the `Back Up Database Task`, `Check Database
    Integrity Task`, `Rebuild Index Task`, `Reorganize Index Task`, `Transfer Database
    Task`, and `Update Statistics Task`. Tasks can be configured, grouped together
    as a package, and set to execute automatically. As a matter of fact, `SSIS` is
    the foundation of maintenance plans!


    Other tasks are available in `SSIS` that are not available anywhere else, such
    as the following:


    - `Transfer Database Task`: Copies or moves a database, within an instance or
    to a different instance.

    - `Transfer SQL Server Objects Task`: Copies objects such as tables, views, and
    stored procedures from one instance to another.

    - `Execute SQL Task`: Executes T-SQL statements or stored procedures.


    A common administration task is transferring logins from one instance to another.
    Logins may be transferred from development to QA, or QA to production, as a database
    is tested and released. If a database needs to be upgraded, or moved to a different
    server, logins will need to be moved or re-created.


    Writing or downloading a script is a common way to perform this task, but using
    `SSIS` can be more efficient.


    To build an `SSIS` package, you will need to install `SQL Server Data Tools`,
    an environment for creating `SSIS` packages, SSAS cubes, and SSRS reports. `SSDT`
    should never be installed on a database server, because developing and running
    packages will consume CPU, memory, and disk resources. Install the software on
    your workstation to develop the packages; deploy them to the server when they
    are complete.


    Once installed, created a new `SQL Server Integration Services Project`. You will
    see a `Toolbox` that contains the tasks and containers, and the `Control Flow`
    screen. Find the `Transfer Logins Task` and drag it on to the `Control Flow`.
    Right-click the task and select `Edit` to open the `Task Editor`, as shown in
    Figure 10-19. Enter a name and description.


    ![Image 130](index-267_1.png)


    ***Figure 10-19.** The Transfer Logins Task Editor screen!*


    Click the `Logins` option on the left to set the source connection, destination
    connection, logins to be transferred, and other options, shown in Figure 10-20.
    Choose a source connection (where the logins currently reside) and a destination
    connection (where you want to move the logins). You can choose to move all logins,
    only selected logins, or only logins from selected databases. These choices are
    as follows:


    - `All Logins`: All logins on the source server will be transferred to the destination
    server.

    - `Selected Logins`: All logins you choose will be transferred. Windows and SQL
    Server logins can be moved.

    - `All Logins From Selected Databases`: All the logins from all databases you
    choose will be transferred.


    The `IfObjectExists` property allows you to specify what will happen if the login
    already exists on the destination server. These choices include the following:'
