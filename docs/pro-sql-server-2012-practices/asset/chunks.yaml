    SalesOrderID,


    SalesOrderDetailID


    )


    GO


    CREATE CLUSTERED INDEX CLUS_SalesOrderDetail ON Sales.SalesOrderDetail


    (


    SalesOrderDetailID


    )


    GO

    ```


    The workload, provided in Listing 7-13, contains scripts that accomplish the following:


