    页面压缩是行压缩的超集。如前所述，在最低层级上，一旦启用压缩，所有内容至少都会进行行压缩。页面压缩包含行压缩、列前缀压缩和页面字典压缩。页面压缩始终按照行、列、然后字典的顺序应用。请注意，你只能在数据库对象上指定行压缩和页面压缩设置。列前缀和页面字典压缩是页面压缩的内部子集。你无法指定使用页面压缩的哪些部分——SQL
    Server 会在内部做出决定。为了帮助你完全理解页面压缩，我需要简要介绍应用它时发生的每个步骤，我稍后会这样做。首先，我将创建一个表，用于演示页面压缩的强大功能。


    ```

    USE demoInternals;


    GO


    /*


    让我们创建一个聚集索引


    */


    IF EXISTS(SELECT NAME FROM sys.tables WHERE name=N''compressedDataRecord'')


    BEGIN


    DROP TABLE dbo.compressedDataRecord


    END


    CREATE TABLE compressedDataRecord(


    myID INT IDENTITY(1,1)


    ,productName char(500) DEFAULT ''some product''


    ,productDescription CHAR(1000) DEFAULT ''Product Description''


    ,PRIMARY KEY CLUSTERED(myID)


    ) ;


    /*


    插入一些数据


    */


    DECLARE @i INT, @myID INT


    SET @i=0


    WHILE (@i<383)


    BEGIN


    SET @myID=(SELECT (MAX(myid)+1) FROM dbo.compressedDataRecord)


    INSERT INTO dbo.compressedDataRecord(productName, productDescription)


    VALUES(


    (REPLICATE(''a'', (500- LEN(@myID))) + CAST(@myID AS VARCHAR(3)))


    ,(REPLICATE(''b'', (1000- LEN(@myID))) + CAST(@myID AS VARCHAR(3)))


    )


    SET @i=@i+1


    END

    ```


    在讨论行压缩时，查看单个数据行并观察其变化是很重要的。


    页面压缩不仅需要理解数据页的变化（稍后解释），还需要理解数据存储方式的变化。当你使用前面的脚本插入数据时，你将定长数据字段拉伸到了行压缩几乎无法节省存储空间的程度。你将这些字段填充得尽可能满。如果使用
    `DBCC IND` 获取页数，你会看到当前数据存储在 79 个不同的页面上。减去 `PageType` 10 分配页和 `PageType` 2 索引页，该表总共剩下
    77 页：`DBCC IND(demoInternals, ''compressedDataRecord'', 1)`


    现在让我们应用页面压缩，再执行一次 `DBCC IND`，看看这如何改变我们的存储结构：


    ```

    /*


    重建我们的表并应用页面压缩


    */


    ALTER TABLE dbo.compressedDataRecord


    REBUILD WITH (DATA_COMPRESSION=Page)


    GO


    DBCC IND(demoInternals, ''compressedDataRecord'', 1)


    GO

    ```


    运行命令后，你应该会发现磁盘上现在只有两个数据页。只剩下 `PageType` 10 分配页和 `PageType 1` 数据页。你刚刚将 77 页减少到了
    1 页。


    这些结果并非典型情况；你正在使用一个经过优化的数据集，以展示页面压缩*可能*对你的数据产生的强大效果。


    当我讨论行压缩时，我谈到它只对定长数据类型有效。页面压缩是在整个数据页的二进制级别上发生的，因此它是与数据类型无关的。这意味着，头信息


