    # 第四章：动态管理视图


    自 SQL Server 6.5 版本起我就开始使用微软 SQL Server，并于 2000 年在 SQL Server 7 中接触到了性能调优与高强度数据库管理。当时的环境是一个集群化的
    SQL Server 7 实现，部署在康柏 SAN 上，每天处理 1 到 4 吉字节（GB）的数据——这在当时对于 SQL Server 而言已是相当大的数据量。性能调优在当时对许多人来说似乎如同巫术般神秘。通过优秀导师的指导，同时得益于我在
    Oracle 与 SQL Server 混合平台上的技术训练，我取得了巨大成功。性能调优迅速成为我的第二本能，我似乎能凭直觉和逻辑理解其益处与强大能力。即便在那时，许多人认为
    SQL Server 是任何人都能安装和配置的数据库平台，但很快大家就意识到一个道理：无论平台如何，数据库的本质是相同的。这意味着显而易见的事实：数据库的自然生命周期就是增长与变化。因此，迟早你会需要一名数据库管理员来管理它，并调优这个复杂环境的所有方面。


    这种"巫术"般的时代在 SQL Server 2005 发布后便告终结，因为它引入了一项新功能——动态管理视图（`DMVs`）。能够利用熟悉的关系型数据视图来从任何
    SQL Server 2005 或更新版本中收集关键的系统与性能数据，这对于 SQL Server 专业人士而言是一次巨大的飞跃。作为一名多年来能访问`V$*`和`DBA_*`视图的
    Oracle DBA，`DMV`功能是微软性能工具库中的一项美妙补充。


    在本章中，我不仅会描述这些视图以及如何收集数据，还将阐述为何收集这些数据对`MSSQL`数据库的健康与长期性能至关重要。性能调优是我在`MSSQL`中常见被忽视的领域之一，因为它常被宣传为易于设置，然而要理解什么可能阻碍性能以及如何解决这些问题，需要强大而先进的数据库知识。动态管理视图的引入使您能够提供清晰、明确的性能数据，而在它们出现之前，错误的假设很容易产生，并导致许多失误。


    ## 理解基础


    动态管理视图必须与动态管理函数（`DMFs`）结合使用。这一点无法绕过：视图提供数据，而表值函数则为您提供查看数据所需的额外处理能力——具体来说，使用`OUTER`和`CROSS
    APPLY`操作符以适当的格式呈现结果，便于阅读。


    表值函数可以执行的不仅仅是单次查询（即针对视图的查询）。当该功能与动态管理视图结合使用时，它能提供比任何单一视图更强大的逻辑选择。


    在使用本章中的技巧之前，您需要了解基本的数据库管理知识，包括如何定位数据库 ID（`DBID`）、如何通过函数调用查询视图，以及从存储过程对象名称发起的 SQL
    调用之间的区别。


    ## 命名约定


    `DMVs`和`DMFs`位于`SYS`模式中，可通过其特定的命名约定`dm_*`来定位。尚未为`DMVs`或`DMFs`创建任何别名（同义词），因此您必须在它们前面加上`sys.`模式名前缀。当讨论`DMVs`时，通常会带上`sys.`前缀来指代它们，但在本章中，`sys.`部分将默认存在——例如，`sys.dm_exec_sql_text`。


    这些命名约定有时可能会令人困惑，具体取决于您所指的动态管理对象类型。`DMVs`可以使用“简单”命名约定进行查询，而`DMFs`只能使用标准的两部分和三部分名称来引用——即


    ```

    <数据库名>.<数据库所有者>.<视图名>

    ```


    而非四部分完全限定的命名约定（即添加`<数据库服务器>`前缀的形式）。

    '
- fmt: '# Chapter 4: Dynamic Management Views


    ## Groups of Related Views


    More views and functions have been added in each subsequent SQL Server release
    to support the dynamic-management features. These views are then grouped by usage.
    In SQL Server 2005, there were 12 initial groups; in 2008, there were 15; and
    in 2012, there are now 20 groups of views. These additional groups include ones
    to support the new disaster-recovery and high-availability feature: the AlwaysOn
    Availability Groups Dynamic Management Views and Functions group.


    As of 2012, the DMVs are broken down into the following groups:


    - AlwaysOn Availability Group Dynamic Management Views and Functions

    - Index Related Dynamic Management Views and Functions

    - Change Data Capture Related Dynamic Management Views

    - I/O Related Dynamic Management Views and Functions

    - Change Tracking Related Dynamic Management View

    - Object Related Dynamic Management Views and Functions

    - Common Language Runtime Related Dynamic Management Views

    - Query Notifications Related Dynamic Management Views

    - Database Mirroring Related Dynamic Management Views

    - Replication Related Dynamic Management Views

    - Database Related Dynamic Management Views

    - Resource Governor Dynamic Management Views

    - Execution Related Dynamic Management Views and Functions

    - Security Related Dynamic Management Views

    - Extended Events Dynamic Management Views

    - Service Broker Related Dynamic Management Views

    - Filestream and FileTable Dynamic Management Views (Transact-SQL)

    - SQL Server Operating System Related Dynamic Management Views

    - Full-Text Search and Semantic Search Dynamic Management Views

    - Transaction Related Dynamic Management Views and Functions


    To query DMVs and DMFs, the user must have the `VIEW SERVER STATE` or `VIEW DATABASE
    STATE` permission granted. Without this permission, users receive an error stating
    the object does not exist.


    ## Varbinary Hash Values


    To query the data from a DMV, you need to use SQL Server’s version of a system-generated
    hash value, called the *handle*. The handle replaces other options that could
    have been used but would have been more difficult, including data that is stored
    in XML formats. A handle is stored in a `varbinary(64)` datatype, and the performance
    benefits for doing this are apparent.


    `varbinary` is variable-length binary data. A `varbinary` value can be a value
    from 1 to 8,000. After creation, when measuring allocation, the storage size is
    the actual length of the data entered plus an additional 2 bytes.


    Following are some characteristics of `varbinary` data:


    - `varbinary` is data that has inconsistent or varying entries.

    - `varbinary` is more efficient if any sorting is required because it does not
    require collation.

    - `varbinary` generally consumes fewer bytes on average than a `varchar` or other
    common datatype choices.

    - Note that, as different datatypes are converted to `varbinary`, they can be
    padded or truncated on the left or right, depending on the datatype they are being
    converted from.


    The two most widely used `varbinary` datatypes in DMVs are the following:


    - `plan_handle`: Hash value of the execution plan for the `sql_handle` in question.

    - `sql_handle`: Hash value of a given SQL statement. This is a unique value for
    a SQL statement that is produced by an algorithm that will guarantee that the
    same `sql_handle` will appear on any SQL Server server for a unique statement.
    This can be very useful in clustered environments or for comparisons between development,
    test, and production SQL Server servers.


    ![Image 37](index-85_1.png)'
