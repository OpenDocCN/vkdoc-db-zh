    创建此文档的初衷，是希望你可以将其移交给另一个人，由他们自己独立执行所有步骤，而无需你的参与。这将迫使你包含足够详细的说明和解释，使得这些步骤易于完成。尽可能详尽地完成所有步骤，将有助于取得成功。


    # 第 8 章■发布管理


    ## 文档仓库


    由于我们已经创建了多个文件，包括发布计划和发布计划模板文档，因此建立一个文件夹结构来存放所有这些文件，将有助于你组织你的发布。找一个所有参与发布过程的人员都能访问的中央位置，用于存储与每次发布相关的文档。你将生成每个受影响数据库的预快照和后快照、实际将执行变更的脚本以及其他文件。所有这些文件都可以存放在以下文件夹结构中，以便于管理：


    -   发布名称

    -   预快照

    -   后快照

    -   数据库对象

    -   Web 对象

    -   应用程序对象

    -   发布计划

    -   其他


    一收到变更请求，就创建一个位置（类似于前面的建议）来存储所有相关文件和信息。随着你创建文件，不断向此仓库添加内容。


    你也可以将这些文件存储在你的版本控制系统中。确保将它们存放在安全的地方，并且允许你和其他人在发布期间以及发布前后能够访问它们。


    这最终将成为你提取所有相关信息以执行生产环境发布的位置。如果操作得当，你将已经在将此发布推进到生产环境的过程中，使用这些文件向每个环境进行发布。保留所有这些文件，作为实际发布的证明和参考。你甚至可以将你的主管引导至此位置，以便在年终评审时查阅你的工作。


    ## 结论


    接受变革，拥抱变革，为之规划，然后优雅地将其引入你的环境。然后重复这个过程。随着你不断重复，你将学会如何调整你的发布过程，以达到完美的平衡：变革被引入你的拓扑结构，同时风险被最小化，影响也是温和的。你可以做到这一点，尽管你可能无法独自完成。你需要让其他人参与进来。要认识到已经讨论过的任务相当多，文件也不少，需要考虑的事项更是数不胜数——确实很多！请务必花必要的时间深入研究所有这些内容，并制定你自己的发布过程。


    为你的系统这样做。为你自己这样做。成为英雄。


    # 第 9 章■合规与审核


    ## 作者：乔纳森·加德纳


    在美国，《健康保险流通与责任法案》（HIPAA）、《萨班斯-奥克斯利法案》（Sarbanes-Oxley）和《支付卡行业数据安全标准》（PCI DSS）只是当今企业所面临的众多监管问题中的一部分。当今的数据库专业人员站在确保遵守这些法规的第一线。数据库管理员（DBA）可以使用审核功能来监控和记录对受这些法规约束的数据库的访问和更改。虽然审核只是确保合规性的一部分，但它往往是数据库专业人员唯一能掌控的工具。


    微软在 SQL Server 2008 中引入了审核功能，以满足与前述及其他法律相关的合规性要求。SQL Server 2012 提供了更细粒度的审核控制，使其成为
    DBA 工具箱中不可或缺的补充。


    本章将详细说明 DBA 必须确保其组织遵守的一些主要法律，包括它们如何执行以及这对数据库专业人员意味着什么。本章还将介绍 SQL Server 2012 中引入的新审核功能，并逐步指导如何设置审核。


    ## 合规


    合规法律很少详细说明如何保护或审核数据。理解法律及其试图保护的内容，为数据库专业人员提供了知识武装，以便正确地使其组织与法律要求保持一致。


    ### 萨班斯-奥克斯利法案


    2002 年的《萨班斯-奥克斯利法案》（SOX）是在安然、世通等公司会计丑闻之后设立的。美国上市公司和会计师事务所受 SOX 约束。虽然该法案包含了新的公司治理规则，但第
    404 条款“内部控制的管理层评估”是数据库专业人员需要理解的部分。


    第 404 条款规定，必须生成一份年度报告，以表明“管理层负责建立和维护充分的内部控制结构和财务报告程序”。它还要求管理层进行“对内部控制结构和财务报告程序有效性的评估”。


    关于数据库专业人员应如何确保合规，这些陈述几乎是含糊其辞的。实际法律并未定义需要做什么来确保合规。它只是简单地声明需要“内部控制”，并且必须每年进行审核。


    由于法律没有提供具体定义，负责执行和监控 SOX 的各方应提供必要的指导。因此，美国证券交易委员会（SEC）和美国公众公司会计监督委员会（PCAOB）负责确保
    SOX 合规。


    SEC 发布了一项关于应如何确保法律合规的最终裁决。该裁决指出，应使用特雷德韦委员会在发起组织委员会（COSO）报告《内部控制——整合框架》中定义的框架。COSO
    报告并未定义 IT 框架的具体内容。相反，它指出“有助于确保计算机信息系统持续正常运行的政策和程序。它们包括对数据中心运营、系统软件获取和维护、访问安全以及应用系统开发和维护的控制。一般控制支持程序化应用控制的功能。有时用来描述一般控制的其他术语是通用计算机控制和信息技术控制。”该报告将有效的内部控制定义为包括以下内容：


    -   控制环境

    -   风险评估

    -   控制活动

    -   信息与沟通

    -   监督


    **注意：** SEC 发布的关于应如何确保合规的完整最终裁决可在 http://www.sec.gov/rules/final/33-8238.htm 找到。


    PCAOB 发布了第 2 号审计准则：《与财务报表审计一同进行的财务报告内部控制审计》。虽然该报告讨论了 IT 控制，但它避免提及需要实施哪些具体的 IT
    控制。


    对于仍然在跟读的读者，PCAOB 和 COSO 都提到了对 IT 控制和 IT 框架的需求。然而，它们实际上都没有推荐一个具体的框架。


    1996 年，信息系统审计与控制协会（ISACA）发布了一个名为“信息及相关技术控制目标”（COBIT）的 IT 框架。尽管 COBIT 框架的发布远在 2002
    年丑闻之前，但该框架与 PCAOB 和 COSO 的要求是一致的。COBIT 4.1 框架已被广泛采纳为满足 SOX 要求的框架。对于数据库专业人员来说，这仍然不够清晰，因为框架中明确针对他们的内容很少。


    **注意：** 关于 COBIT 的更多信息可以在 http://www.isaca.org/Knowledge-Center/COBIT/Pages/Overview.aspx
    找到。

