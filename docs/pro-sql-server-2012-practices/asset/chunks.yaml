    本章向您介绍了微软云平台上提供的 Windows Azure SQL Database 平台基础知识。我概述了该平台的基础架构，以便您能更好地理解这项技术的内部工作机制。我还概述了
    SQL Server 与 SQL Database 之间的主要差异，简要介绍了各种在线管理门户，并带您快速浏览了 Azure 平台提供的、利用 SQL Database
    的各项服务。


    SQL Database 旨在通过利用内置的联合功能（用于实现无共享架构并以分布式方式支持更大的工作负载），满足从较小应用程序到非常大型系统的各种项目的需求。凭借其简单的配置和供应模型，SQL
    Database 有望在未来成为非常流行的数据库平台。


    由于这项技术在不断发展，我鼓励您在微软网站上了解更多关于它和其他 Azure 相关服务的信息，您可以在那里找到有关本章涵盖主题的更多信息以及更多内容。


    # 第 13 章


    ## I/O：不为人知的故事


    *作者：杰里米·洛厄尔 (Jeremy Lowell)*


    我们正处在一个数据增长量以十年前倍数计量的时代。没有迹象表明这种增长速度会放缓。这种步伐将持续存在，它给公司和数据专业人员带来了新的挑战。


    根据 Gartner（[`www.gartner.com/it/page.jsp?id=1460213）的`](http://www.gartner.com/it/page.jsp?id=1460213)数据，数据增长是大型企业面临的最大挑战。系统性能和可扩展性紧随其后，这并不令人意外。


    根据我与许多数据库管理员 (DBA) 以及我有幸合作的公司的其他人员进行的非正式研究，我发现他们正在努力跟上这种数据爆炸的步伐。难怪 DBA 的失业率是技术领域中最低的之一。本章的目的就是为
    DBA 提供知识和工具，以便您能与您的公司、同事以及坐在角落办公室里那位极其聪明的存储专家推动这场对话。


    有多少次您在谷歌上搜索与 I/O 相关的内容，得到的答案要么过于简单，要么复杂到难以完全理解？本章的目标是帮助弥合这一差距，并填补您关于数据库环境及相应 I/O
    知识的空白。


    I/O 在数据库环境中的影响常常被误解。我认为这通常是由于沟通不畅以及对如何衡量 I/O、衡量什么、如何改变、修改或调整其行为缺乏基本理解造成的；或许更重要的是，如何与同事、管理层以及我们都依赖的存储和服务器专家沟通和讨论
    I/O。当您深入本章，学习如何更好地衡量、监控、沟通和改变您的 I/O 模式、占用情况及行为时，从“I/O”的一个共同定义开始是很重要的。


    就本章而言，I/O 的一个精炼定义是“持久存在于内存或磁盘中的数据移动”。还有许多其他类型的 I/O，它们都很重要，但超出了本章的上下文和重点。


    I/O 这个不为人知的故事，您可能之前就经历过——无论是有意还是无意——它包含了关于数据库健康状况、一致性、性能和可用性的一些非常重要的数据点。本章将重点讨论两种主要类型的
    I/O：内存（逻辑 I/O）和磁盘（物理 I/O）。尽管它们密切相关，但遵循不同的模式，并且衡量、监控和解决每种 I/O 的问题需要不同的方法。


    ### 基础知识


    这项探索的起点是准备工作。在这里，是指了解您的数据库系统在正常操作、高峰负载、备份、子系统（SAN）维护以及看似空闲的时期内，对磁盘子系统的要求。


    为您的数据库、一台或多台服务器以及环境建立基线，对于理解系统的 I/O 特性至关重要。更重要的是，它有助于您确定是否存在以及问题根源可能在哪里。您需要获取一些指标，并随着时间的推移监控它们的趋势。表
    13-1 显示了可用于此目的的计数器的示例输出，随着您更深入地研究本章，将会更详细地解释这些计数器。


    表 13-1. 作为本章后续讨论基础的计数器图示。


    | LogicalDisk | _Total | C: | D: |

    | :--- | :--- | :--- | :--- |

    | Avg. Disk Bytes/Read | 64,810.127 | 65,536.000 | 64,771.413 |

    | Avg. Disk Bytes/Write | 4,289.730 | 4,174.769 | 4,352.000 |

    | Avg. Disk sec/Read | 0.000 | 0.000 | 0.000 |

    | Avg. Disk sec/Write | 0.001 | 0.000 | 0.001 |

    | Disk Bytes/sec | 10,416,951.109 | 579,574.335 | 9,837,376.774 |

    | Disk Read Bytes/sec | 10,257,952.840 | 525,207.185 | 9,732,745.655 |

    | Disk Reads/sec | 158.277 | 8.014 | 150.263 |

    | Disk Write Bytes/sec | 158,998.269 | 54,367.150 | 104,631.119 |

    | Disk Writes/sec | 37.065 | 13.023 | 24.042 |


    表 13-1 中的数据来源是性能监视器。性能监视器是微软操作系统中的一个实用程序，用于绘制与性能相关的数据图表。在本章的“实战”部分，您可以找到关于如何在性能监视器中配置计数器的详细信息。


    性能监视器中针对表 13-1 引用的计数器有两个主要计数器：逻辑磁盘计数器和物理磁盘计数器。我更喜欢逻辑磁盘计数器，原因有很多，但两者之间的主要区别可以在计数器的描述中找到，其部分内容为：“物理磁盘计数器的值是其划分成的逻辑磁盘的值的总和。”因此，逻辑磁盘计数器为您提供了更低级别的粒度，并且我认为它能更准确地描述服务器——进而数据库——在该驱动器上的性能。这也是查看服务器上磁盘的一种更直观的方式，因为大多数
    DBA 都知道哪些数据库文件位于哪个驱动器上。


    ### 监控


    我倾向于基于其做决策的计数器随着时间的推移已经改变。多年前，我依赖 `Disk Queue Length` 计数器。该计数器测量每个驱动器的排队请求数量。有一个通用规则指出，持续高于
    2 的值可能有问题。这个值的挑战在于它必须是一个派生值。要推导出正确的数字，还必须考虑所涉及的磁盘或磁盘轴的数量。如果我有一台带有 4 个磁盘且队列长度为
    6 的服务器，那么该队列长度看起来是阈值 2 的三倍。但是，如果我取 6 这个值并除以磁盘数量（4），我的实际值就是 1.5，低于阈值 2。

