    SQL Server 2012 企业版核心许可成本为十六乘以 **$6,874**，总计 **$109,984**。如果您想专注于降低这台服务器的许可成本，您有两个可行的替代方案。一个选择是选择两颗
    Intel Xeon E5-2643 处理器，每颗有四个物理核心，服务器总共八个物理核心。这一台数据库服务器的 SQL Server 2012 企业版核心许可成本为八乘以
    **$6,874**，总计 **$54,992**。


    第二个选择是只选择一颗 Intel Xeon E5-2690 处理器，它有八个物理核心，服务器总共八个物理核心。这一台数据库服务器的 SQL Server
    2012 企业版核心许可成本为八乘以 **$6,874**，总计 **$54,992**。

    '
- fmt: '# Chapter 15 ■ Selecting and Sizing the Server


    There are some key differences between these two lower-cost options. The `E5-2643`
    processor runs at a higher base clock speed of `3.3 GHz`, with the ability to
    use Intel Turbo Boost to increase the clock speed of individual cores to `3.5
    GHz` (when all of the cores are not running at full speed already). This compares
    to the `E5-2690` processor with a base clock speed of `2.9 GHz` and a maximum
    Turbo Boost speed of `3.8 GHz`. A heavily loaded system with `E5-2643` processors
    will be running the processor cores at `3.3 GHz` most of the time, with occasional
    bursts to `3.5 GHz` for individual cores. A heavily loaded system with the `E5-2690`
    processor will be running the processor cores at `2.9 GHz` most of the time, with
    occasional bursts up to `3.8 GHz` for individual cores. Some of the relevant specifications
    for these two processors are shown in Table 15-1.


    Table 15-1. Comparison of Two Intel Xeon E5 Series Processors


    | `CPU` | `Base Clock` | `Turbo Clock` | `Cores` | `L3 Cache` | `Price` |

    | --- | --- | --- | --- | --- | --- |

    | `E5-2690` | `2.9 GHz` | `3.8 GHz` | `20 MB` | | `$2,057` |

    | `E5-2643` | `3.3 GHz` | `3.5 GHz` | `10 MB` | | `$885` |


    Purposely leaving one socket empty would leave you with a lot of reserve capacity
    that you could take advantage of by purchasing a second processor in the future
    (and paying for the extra `SQL Server 2012` core licenses). Having both sockets
    populated with the four-core processor would force you to replace both processors
    with something better if you ever needed to upgrade. That would be a harder proposition
    to sell in my experience, especially since the system vendor would likely charge
    a premium for the processor kits. You would also have the two original processors
    that would most likely end up in a drawer somewhere as rather expensive paperweights.


    A two-socket system with either one of these processors would support `384 GB`
    of `RAM` using `16-GB DIMMs` if both processor sockets were populated. If only
    one processor socket were populated, the maximum `RAM` amount would be reduced
    to `192 GB` using `16-GB DIMMs`.


    If I had to choose between these two alternatives, I would likely lean toward
    having one `E5-2690` processor instead of two `E5-2643` processors, as the upgrade
    path would be easier and less expensive.


    ## Memory Selection


    Generally speaking, I like to specify database servers with a large amount of
    `RAM`. Currently, all new Intel-and `AMD`-based servers use error correcting code
    (`ECC`) `DDR3 RAM`, but `ECC DDR4 RAM` will start to be used in new servers by
    `2014`. Over time, `ECC DDR3 RAM` prices have steadily declined to the point where
    this type of `RAM` is extremely affordable.


    Having a large amount of physical `RAM` in your database server allows `SQL Server`
    to have a larger buffer pool, which is used for caching data that has been read
    into memory from the storage subsystem. Any data that is in the `SQL Server` buffer
    pool can be retrieved with a logical read instead of requiring a physical read
    from the storage subsystem. Logical reads are much faster than physical reads,
    even if you have flash-based storage.


    Ideally, your entire database would fit into `RAM`, which would dramatically reduce
    the read `I/O` pressure on your storage subsystem. Having a large amount of `RAM`
    will also reduce how often the `SQL Server` lazy writer has to run, which can
    reduce the write `I/O` pressure on your storage subsystem. Buying more `RAM` is
    much less expensive than upgrading your storage subsystem.


    Given all of this, how much `RAM` should buy for your new database server? The
    first decision point is whether you have `SQL Server 2012 Enterprise Edition`
    or not, as this directly affects how much `RAM` you can actually use for `SQL
    Server`.


    `SQL Server 2012 Standard Edition` is limited to using `64 GB` of `RAM` for the
    database engine and `64 GB` of `RAM` for `SQL Server Analysis Services (SSAS)`,
    so you could theoretically use `128 GB` of `RAM` between the two (even though
    it is not a best practice to run the database engine and `SSAS` on the same instance
    for performance reasons).


    `SQL Server 2012 Business Intelligence Edition` will let you use the operating
    system maximum for `SSAS`, and up to `64 GB` of `RAM` for the database engine.


    `SQL Server 2012 Enterprise Edition` can use up to the operating system maximum
    for the database engine, and up to the operating system maximum for `SSAS`. The
    operating system maximum is `2 TB` for `Windows Server 2008 R2` and it is `4 TB`
    for `Windows Server 2012`. It is currently possible to get `2 TB` of `RAM` in
    a commodity four-socket machine if you are willing to pay the premium for `32-GB
    DIMMs`. The current sweet spot for memory module size is `16 GB`, as you get a
    relatively large memory module for an affordable price.


    If you will be running `SQL Server 2012 Standard Edition`, I don’t see any reason
    to get less than `64 GB` of `RAM` in your database server. I would strongly consider
    getting `80 GB` using ten `8-GB DIMMs`, so that you can set the instance level
    Maximum Server Memory setting to `64000` and still leave plenty of `RAM` for the
    operating system.


    With `SQL Server 2012 Enterprise Edition`, I would want to fill up every available
    memory slot in the server with `16-GB DIMMs` if at all possible, since server
    `RAM` is so affordable and so effective for improving performance. Because your
    organization has already spent the money for `Enterprise Edition`, it is foolish
    to hobble the performance and scalability of the server by saving a relatively
    small amount of money on `RAM`. For example, a two-socket database server with
    two Intel Xeon `E5-2600` series processors can use `24` memory slots. The current
    cost for `24 16-GB ECC DDR3 DIMMS` would be `$6,240`, which is a very small fraction
    of the `SQL Server 2012 Enterprise Edition` license cost for that database server.


    Table 15-2 shows the relative prices for various sizes of memory modules in late
    `2012`.


    Table 15-2. Relative Prices for ECC DDR3 RAM (Late 2012)


    | `Module Size` | `Price` | `Price/GB` |

    | --- | --- | --- |

    | `32 GB` | `$1,498` | `$47/GB` |

    | `16 GB` | `$260` | `$16/GB` |

    | `8 GB` | `$90` | `$11/GB` |

    | `4 GB` | `$60` | `$15/GB` |

    | `2 GB` | `$30` | `$15/GB` |


    One last factor to consider is the effect of different memory configurations on
    the memory bandwidth of the memory. As you add more `DIMMs` to a system to populate
    more of the available memory slots, the bandwidth of the memory can decrease,
    which can hurt memory access performance somewhat. This effect varies based on
    the processor and the associated, integrated memory controller that is being used.
    The latest Intel processors are much less susceptible to this problem. Regardless
    of this, I still favor using large amounts of `RAM`, because even “slower” `RAM`
    is much, much faster than your storage subsystem. If you are concerned about this,
    you should consult the documentation for your server to see the recommendations
    for how you should configure your memory.


    ## Conclusion


    This chapter has covered a lot of ground about a very complex subject. In order
    to get the best performance and scalability possible from your database server
    without spending a small fortune on `SQL Server 2012` core license costs, you
    need to make wise choices, especially when it comes to the exact model of processor
    that you select for your database server. Because `SQL Server 2012` uses core-based
    licensing, it is very important that you choose a processor that has very good
    single-threaded performance so that you get the most performance possible for
    each of those expensive core licenses. You also want to minimize your total physical
    core counts to minimize your licensing costs.


    Two-socket servers are typically one generation ahead of their four-socket contemporary
    counterparts when it comes to processor technology. They also have much higher
    memory density and more `PCI-E` expansion slots than they did in the past, so
    they are an extremely attractive choice for many database server workloads.'
