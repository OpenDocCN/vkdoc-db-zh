    data warehouse model or any data structures that you might be familiar with in
    data warehousing, but it is useful as a SQL-like query language on top of HDFS.


    You’ll need to have some data in HDFS, so if you haven’t done this yet or have
    wiped out previous data load we’ve worked with, use Sqoop to populate HDFS so
    you have something to work with.


    sqoop import --connect "jdbc:sqlserver://myserver.database.windows.net;


    username=mysqluser@myserver; password=mypwd; database=AdventureWorks2012"


    -table Production.Product --where "ModifiedDate between ''2012-07-19'' and ''2012-07-20''"'
  trans: '

    既然你已经收集了数十亿乃至数万亿行数据，并且能够跟踪产品的变化，那么现在是时候使用审计跟踪了。你的财务团队希望了解某个产品在一年中的定价情况，以及每个价格生效的确切时长。你可以从`HDFS`中提取这些数据，并使用`Sqoop`将其放入一个熟悉的`SQL
    Server`表中。


    财务人员并不要求你为这份报告检索该产品的每一条数据，他们表示，只需要用到`ProductName`、`ProductNumber`、`ListPrice`和`ModifiedDate`。


    然而，由于你也把`ProductID`和`ProductNumber`导入到了`HDFS`，所以你必须把它们也导出出来，因为`Sqoop`不允许你选择导出部分列，而且它也不给你机会去筛选要导出的数据。如你所见，这是要么全导出、要么全不导出，所以你需要在`SQL
    Server`中创建一个表来容纳`HDFS`中的所有数据。


    ```

    CREATE TABLE dbo.Product_Changes(


    ProductID int NULL,


    Name nvarchar(50) NULL,


    ProductNumber nvarchar(25) NULL,


    ListPrice money NULL,


    ModifiedDate datetime NULL


    )

    ```


    创建这个表之后，你就可以回到命令行，并从`c:\Apps\dist\sqoop\bin`目录执行以下作业：


    ```

    sqoop export --connect


    "jdbc:sqlserver://myserver.domain.com;username=mysqluser;password=mypwd;database=AdventureWorks"


    --table [Product_Changes] --export-dir /data/ProductAudit –m 4

    ```


    这个作业成功执行后，产品数据现在就存放在你熟悉的地方——`SQL Server`中了，你可以随心所欲地处理它。这让你（以及你的用户）处于一个舒适的状态，你可以使用`Excel`、`SSRS`和`PowerView`这类熟悉且强大的工具来分析数据并创建报告。


    将数据从`Hadoop`迁移到`SQL Server`有充分的理由，包括在星型模式、多维数据集和其他报表结构中，将`Hadoop`数据与现有的`SQL Server`实体进行关联。数据存储位置是`DBA`必须做出的决策，但在分析工作已经在`SQL
    Server`环境中进行的组织中，将部分数据从`Hadoop`迁移到`SQL Server`将是一种常规做法。这并不意味着你会将每 PB 的数据都从`Hadoop`迁移到`SQL
    Server`，但如果有这种情况发生，那也将是以经过筛选和/或聚合的方式进行的。


    但请注意，这只是众多用例中的一个，并且使用`Excel`等可视化工具并不需要将数据放回`SQL Server`。你将在下一节中看到如何使用`Excel`直接访问存储在`HDFS`中的数据，以及`Hadoop`如何为你提供像`Hive`这样的工具来实现这一点。


    ## Hive


    如果你不想把数据放到`SQL Server`里呢？你能直接在它所在的位置使用它吗？是的，你可以，`Hive`就是一个你可以用来在`HDFS`中处理数据的工具。`Hive`为你提供了`HiveQL`，这是一种类似
    SQL 的语言，可用于查询`HDFS`中的数据。Apache 将`Hive`描述为一个用于`Hadoop`的数据仓库系统，它便于对存储在与`Hadoop`兼容的文件系统中的大型数据集进行数据汇总、即席查询和分析。`Hive`提供了一种将结构映射到这些数据上的机制，并使用一种名为`HiveQL`的类
    SQL 语言来查询数据。


    ## 第 17 章 ■ 面向 SQL Server DBA 的大数据


    `注意` 对于熟悉`SQL Server`和数据仓库的人来说，请宽泛地看待“`Hive`是一个数据仓库系统”这种说法。它并未使用公认的数据仓库模型或你可能在数据仓库中熟悉的任何数据结构，但作为运行在`HDFS`之上的类
    SQL 查询语言，它是有用的。


    你需要在`HDFS`中有一些数据，所以如果你还没这样做，或者已经清除了我们之前使用的加载数据，那么请使用`Sqoop`来填充`HDFS`，以便你有数据可用。


    ```

    sqoop import --connect "jdbc:sqlserver://myserver.database.windows.net;


    username=mysqluser@myserver; password=mypwd; database=AdventureWorks2012"


    -table Production.Product --where "ModifiedDate between ''2012-07-19'' and ''2012-07-20''"

    ```

    '
- fmt: "# 在 Hive 中创建表并查询数据\n\n## 使用 HiveQL 查询 HDFS 数据\n\n要开始使用数据，您需要定义一个 Hive 表。使用\
    \ `CREATE EXTERNAL TABLE` 来完成此操作，它为您提供了到 HDFS 的接口。这很好，因为您已经在那里存储了数据。如果您不告诉 Hive\
    \ 位置，它会在自己的默认位置创建表。实际上，您是在 Hive 元存储中定义一个表，并告诉它该表所代表的数据驻留的位置。对于 SQL Server 用户来说，这可能听起来有些\
    \ backward，因为您通常先创建表，然后添加数据。在这种情况下，Hive 只是您 HDFS 数据的一个前端。Hive 也允许您在创建新表时填充数据，因此它不仅仅是访问现有数据的接口。\n\
    \n要运行 Hive 命令，请使用 Azure 网站上 Hadoop 提供的用户界面（请参阅前面的图 17-6）。登录到集群后，转到主屏幕并点击 **Interactive\
    \ Console** 磁贴。\n\n然后点击右上角的 **Hive** 按钮，将控制台切换到 Hive 模式。在底部，您将能够输入 Hive 命令，因此请使用以下命令创建表：\n\
    \n```\nCREATE EXTERNAL TABLE price_audit (\n\n    ProductID INT,\n\n    Name STRING,\n\
    \n    ListPrice DOUBLE,\n\n    ModifiedDate STRING\n\n)\n\nCOMMENT 'This is my\
    \ output'\n\nROW FORMAT DELIMITED FIELDS TERMINATED by ','\n\nSTORED AS TEXTFILE\n\
    \nLOCATION '/data/PriceAudit/';\n```\n\n请注意，Hive 要求您指定每一列的名称和数据类型。这些看起来应该很熟悉，因为我为这些列命名的名称与\
    \ SQL Server 表中使用的名称相同。\n\n但是，您可以按自己喜欢的方式命名列；它们不必与作为数据源的 SQL Server 表同名。\n\nHive\
    \ 允许您在创建表时指定许多参数，其中一些列在表 17-5 中。使用参数 `ROW FORMAT DELIMITED FIELDS TERMINATED by\
    \ ','` 和 `STORED AS TEXTFILE` 将 Hive 表定义为逗号分隔的文本文件。`LOCATION` 关键字让您指定存储 Hive 表数据的\
    \ HDFS 文件夹。有关 Hive 语法的完整说明，请参阅位于 [http://hive.apache.org](http://hive.apache.org)\
    \ 的文档。\n\n**表 17-5. Hive 命令的部分描述性列表**\n\n`CREATE [EXTERNAL] TABLE table_name`\n\
    此命令创建一个新的 HIVE 表。`EXTERNAL` 关键字让您提供表的 `LOCATION`。当您已经拥有指向 HDFS 中的数据时使用 `EXTERNAL`。如果不包含它，HIVE\
    \ 会在默认位置创建表。\n\n`COMMENT`\n这提供了表的描述。您也可以为列添加注释。\n\n`ROW FORMAT row_format`\n使用此命令指定列分隔符。它还允许您指定行终止符以及其他设置。\n\
    \n`STORED AS file_format`\n使用 `TEXTFILE` 作为文件格式将数据存储为纯文本。指定 `SEQUENCEFILE` 将压缩数据。\n\
    \n`LOCATION hdfs_path`\n使用此命令给出 HDFS 中数据的文件路径。\n\n我们在示例中使用的列分隔符是逗号，我们通过 `ROW FORMAT\
    \ DELIMITED FIELDS TERMINATED by ','` 实现。我们确保 `LOCATION` 路径设置为我们一直向 HDFS 存放数据的文件夹。您现在已准备好使用\
    \ HiveQL 查询这些数据。\n\n一旦执行，您就可以执行 HiveQL 查询。使用这个 `select` 语句来获取数据。\n\n值得庆幸的是，语法看起来就像我们非常熟悉的\
    \ SQL 语言。\n\n```\nselect * from price_audit\n```\n\n您将看到先前存储在 HDFS 中的数据的结果集：\n\
    \n```\n218 LJ-0192-S 50.99 2012-07-19 03:35:12.0\n219 LJ-0192-M 50.99 2012-07-19\
    \ 03:35:12.0\n220 LJ-0192-L 50.99 2012-07-19 03:35:12.0\n221 LJ-0192-X 50.99 2012-07-19\
    \ 03:35:12.0\n314 HB-M763 62.92 2012-07-19 04:18:38.12\n317 HB-R720 62.92 2012-07-19\
    \ 04:18:38.12\n320 FW-M423 61.745 2012-07-19 04:18:38.12\n. . .\n```\n\n如果您想限制结果的大小，因为您使用比示例更大的数据集运行了代码，那么您可以使用\
    \ `LIMIT` 操作符，如下所示：\n\n```\nselect * from price_audit limit 5\n```\n\n```\n218\
    \ LJ-0192-S 50.99 2012-07-19 03:35:12.0\n219 LJ-0192-M 50.99 2012-07-19 03:35:12.0\n\
    220 LJ-0192-L 50.99 2012-07-19 03:35:12.0\n221 LJ-0192-X 50.99 2012-07-19 03:35:12.0\n\
    314 HB-M763 62.92 2012-07-19 04:18:38.12\n```\n\n这些查询的后台发生了什么？同样，这些是 MapReduce\
    \ 作业，而 Hive 只是作为 MapReduce 的一个更熟悉 SQL 用户的层。如果您去查看 Azure 上 Hadoop 的作业日志，您会看到为每个查询执行的作业。您可以点击主屏幕的\
    \ **Job History** 磁贴。\n\n当然，我们不仅仅想提取明细数据。我们可以用 Sqoop 完成。虽然 Hive 没有提供我们习惯的 T-SQL\
    \ 的所有功能，但它确实使我们能够进行分组和聚合、筛选和排序，并且还具有一些连接功能。例如，您可以发出以下命令进行分组、求和和连接。再次注意这些查询与我们熟悉的\
    \ SQL 有多么相似。\n\n```\nSELECT Name, ListPrice, ModifiedDate\n\nFROM price_audit\n\
    \nwhere Name = 'LJ-0192-X'\n\norder by ListPrice\n```\n\n```\n221 LJ-0192-X 50.99\
    \ 2012-07-19 03:35:12.0\n221 LJ-0192-X 54.99 2012-07-20 09:24:51.0\n221 LJ-0192-X\
    \ 52.99 2012-07-20 14:32:18.0\n```\n\n```\nSELECT Name, COUNT(*)\n\nFROM price_audit\n\
    \nGROUP by Name\n```\n\n```\nLJ-0192-X 4\nHB-M763 1\nHB-R720 1\nFW-M423 1\n```\n\
    \n使用 HiveQL 获取数据是完整解决方案的重要组成部分，它允许您通过 Excel 使 Hadoop 数据可供最终用户和分析师访问。我们将逐步介绍一个如何将\
    \ Excel 与 Hive 结合使用的示例，以完成循环并充分利用这些数据。\n\n## Hive 和 Excel\n\nMicrosoft 为 Hive\
    \ 提供了一个 ODBC 驱动程序，以便可以从分析工具和其他应用程序发出 HiveQL 查询。Excel 可以使用 Hive ODBC 驱动程序，并且有一个加载项可用，以便可以拉取数据进行分析。要使用\
    \ Hive 和 Excel，请执行以下操作：\n\n1.  点击 Hadoop on Azure 主菜单中的 **Open Ports** 磁贴。\n2.\
    \  点击切换按钮，使其滑动到右侧并且状态变为 **Open**，从而打开 Hive ODBC 端口。\n3.  返回主菜单，点击 **Download**\
    \ 磁贴。\n4.  下载并安装 Hive ODBC 驱动程序和用于 Excel 的 Hive 加载项。按照说明确保安装正确的版本（32 位或 64 位）。\n\
    5.  启动 Excel 并转到 **Data** 菜单。点击 **Hive Pane** 和 **Enter Cluster Details**。如果一切正常，您将在表下拉列表中看到您创建的\
    \ Hive 表列表。\n6.  现在您已准备好在 Excel 中处理放入 HDFS 的产品数据。只需选择一个表和一些列，添加条件和分组，然后执行查询。\n\
    7.  此外，您可以转到 Windows 中的 **Data Sources (ODBC)** 并添加 Hive ODBC DSN，如图 17-9 所示，以便可以从其他应用程序使用它。\n\
    \n![Image 199](index-424_1.png)\n\n**图 17-9.** 使用 Windows 中的 **Data Sources (ODBC)**\
    \ 进行 ODBC Hive 设置\n\n虽然通过 Excel 使用 Hive 的主要用户不是 DBA，但了解他们所管理的数据将如何被他人使用是有好处的。例如，大多数\
    \ DBA 不会使用 Excel 分析 Hive 数据，但数据分析师很可能会使用，因为这是他们熟悉的软件工具。要构建强大的大数据架构，了解数据将如何使用以及使用数据的工具如何工作非常重要。这有助于您为管理数据做出更好的架构决策。\n\
    \n## JavaScript\n\n还记得您在本章前面用于处理 MapReduce 示例的 JavaScript 吗？"
  raw: '--target-dir /data/ProductAudit -m 4 -append


    --columns "ProductID,ProductNumber,ListPrice,ModifiedDate" --split-by ProductID


    To start using the data, you need to define a Hive table. Use CREATE EXTERNAL
    TABLE to do so, which provides you with an interface to HDFS. This is good since
    you already have data there. If you didn’t tell Hive the location, it would create
    the table in its own default location. In effect, what you are doing is defining
    a table in the Hive metabase and telling it where the data that it represents
    resides. For SQL Server people, this might sound backward, since you usually create
    the table first, then add data. In this case, Hive is simply a front-end to your
    HDFS data. Hive also allows you to create new tables that you populate with data
    when you create them, so it can be more than just an interface to existing data.


    To run a Hive command, use the user interface provided by Hadoop on the Azure
    web site (refer back to Figure 17-6). After logging in to your cluster, go to
    the main screen and click the Interactive Console tile.


    Then click the Hive button at the top right to change the console to Hive mode.
    At the bottom, you’ll be able to enter a Hive command, so create the table using
    this command:


    CREATE EXTERNAL TABLE price_audit (


    ProductID INT,


    Name STRING,


    ListPrice DOUBLE,


    ModifiedDate STRING


    )


    COMMENT ''This is my output''


    ROW FORMAT DELIMITED FIELDS TERMINATED by '',''


    STORED AS TEXTFILE


    LOCATION ''/data/PriceAudit/'';


    Notice that Hive requires you to specify the name and data type of each column.
    These should look familiar to you, as I have named the columns with the same names
    that are used in the SQL Server table.


    However, you may name the columns whatever you like; they don’t have to have the
    same name as the SQL


    Server table that was the source of the data.


    Hive allows you to specify a number of arguments when you create a table, some
    of which are listed in Table 17-5\. Using the arguments ROW FORMAT DELIMITED FIELDS
    TERMINATED by '','' and STORED AS


    TEXTFILE define the Hive table as a comma-delimited text file. The LOCATION keyword
    lets you specify the HDFS folder where the Hive table data is stored. For a complete
    description of Hive syntax, see the documentation at [http://hive.apache.org.](http://hive.apache.org)


    chapter 17 ■ Big Data for the SQL Server DBa


    ***Table 17-5**. Partial Descriptive List of Hive Commands*


    **Command**


    **Description**


    CREATE [EXTERNAL] TABLE


    This command creates a new HIVE table. The EXTERNAL keyword lets


    *table_name*


    you provide the table’s LOCATION. Use EXTERNAL when you already have


    data in HDFS that you are pointing to. If you don’t include it, HIVE


    creates the table in a default location.


    COMMENT


    This gives the description of the table. You can also add comments to


    columns.


    ROW FORMAT *row_format*


    Use this command to specify a column delimiter. It also lets you specify a


    line terminator, among other settings.


    STORED AS *file_format*


    Use TEXTFILE as the file format to store the data as plain text. Specifying


    SEQUENCEFILE will compress the data.


    LOCATION *hdfs_path*


    Use this command to give the file path of the data in HDFS.


    The column delimiter we used in our example was a comma, which we did with ROW
    FORMAT DELIMITED


    FIELDS TERMINATED by '',''. We made sure that the LOCATION path was set to the
    folder where we’ve been putting data into HDFS. You’re now all set to query this
    data using HiveQL.


    Once this is executed, you can execute a HiveQL query. Use this select statement
    to get the data.


    Thankfully, the syntax looks just like the SQL language we’re so familiar with.


    select * from price_audit


    You’ll see a result set of the data that you previously stored in HDFS:


    218 LJ-0192-S 50.99 2012-07-19 03:35:12.0


    219 LJ-0192-M 50.99 2012-07-19 03:35:12.0


    220 LJ-0192-L 50.99 2012-07-19 03:35:12.0


    221 LJ-0192-X 50.99 2012-07-19 03:35:12.0


    314 HB-M763 62.92 2012-07-19 04:18:38.12


    317 HB-R720 62.92 2012-07-19 04:18:38.12


    320 FW-M423 61.745 2012-07-19 04:18:38.12


    . . .


    If you want to limit the size of the results because you’ve run the sample code
    using much bigger datasets than I did, then you can use the LIMIT operator, like
    so:


    select * from price_audit limit 5


    218 LJ-0192-S 50.99 2012-07-19 03:35:12.0


    219 LJ-0192-M 50.99 2012-07-19 03:35:12.0


    220 LJ-0192-L 50.99 2012-07-19 03:35:12.0


    221 LJ-0192-X 50.99 2012-07-19 03:35:12.0


    314 HB-M763 62.92 2012-07-19 04:18:38.12


    What happened in the background of these queries? Again, these are MapReduce jobs,
    and Hive is simply acting as a layer for MapReduce that is more familiar to SQL
    users. If you go look at the job log for Hadoop on Azure, you’ll see the jobs
    that are executed for each of these queries. You can click on the Job History
    tile of the main screen.


    Of course, we don’t just want to extract detail data. We could do that with Sqoop.
    While Hive doesn’t provide all of the functionality we’re used to with T-SQL,
    it does give us the ability to group and aggregate, 418


    chapter 17 ■ Big Data for the SQL Server DBa


    filter and sort, and it also has some join capabilities. For example, you can
    issue the following command to group, sum, and join. Once again, notice how much
    these queries look like the SQL were so familiar with.


    SELECT Name, ListPrice, ModifiedDate


    FROM price_audit


    where Name = ''LJ-0192-X''


    order by ListPrice


    221 LJ-0192-X 50.99 2012-07-19 03:35:12.0


    221 LJ-0192-X 54.99 2012-07-20 09:24:51.0


    221 LJ-0192-X 52.99 2012-07-20 14:32:18.0


    SELECT Name, COUNT(*)


    FROM price_audit


    GROUP by Name


    LJ-0192-X 4


    HB-M763 1


    HB-R720 1


    FW-M423 1


    Getting data using HiveQL is an important part of the complete solution, one that
    allows you to make Hadoop data accessible to your end users and analysts via Excel.
    We’re going to walk through an example of how to use Excel together with Hive
    to close the loop and make the most of this data.


    Hive and Excel


    An ODBC driver is provided by Microsoft for Hive so that HiveQL queries can be
    issued from analysis tools and other applications. Excel can use the Hive ODBC
    driver, and an add-in is available so data can be pulled in for analysis. To work
    with Hive and Excel, do the following:


    1\. Click on the Open Ports tile in the Hadoop on Azure main menu.


    2\. Open the Hive ODBC port by clicking the toggle button so it slides to the
    right and the status changes to Open.


    3\. Back on the main menu, click the Download tile.


    4\. Download and install the Hive ODBC driver and Hive Add-in for Excel. Follow


    the instructions to make sure you install the right versions (32-bit or 64-bit).


    5\. Launch Excel and go to the Data menu. Click the Hive Pane and Enter Cluster


    Details. If it all works, you’ll see the list of Hive tables you’ve created in
    the table drop-down list.


    6\. Now you’re ready to start working in Excel with the product data you put in


    HDFS. Simply select a table and some columns, add criteria and groupings, and


    execute the query.


    7\. In addition, you can go to Data Sources (ODBC) in Windows and add the Hive


    ODBC DSN, as shown in Figure 17-9, so you can use it from other applications.


    ![Image 199](index-424_1.png)


    chapter 17 ■ Big Data for the SQL Server DBa


    ***Figure 17-9*****.** *ODBC Hive setup using Data Sources (ODBC) in Windows*
    While the primary user of Hive via Excel won’t be a DBA, it’s good to understand
    how the data they administer will be used by others. For example, most DBAs won’t
    be doing analysis of Hive data using Excel, but it will likely be used by data
    analysts because it is a software tool they are familiar with. To develop a strong
    architecture with Big Data, it’s important to know how data will be used and how
    the tools that use the data work. This helps you make better architectural decisions
    for managing data.


    JavaScript


    Remember the JavaScript that you used to work through the MapReduce example earlier
    in the chapter?'
