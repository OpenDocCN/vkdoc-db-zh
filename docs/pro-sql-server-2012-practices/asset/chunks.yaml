    chapter 6 ■ the Utility Database


    Gathering Data


    Without understanding the options for data collection, the utility database is
    limited in what data is collected. As new versions of SQL Server are released,
    the inner workings of SQL Server become more accessible, providing further information
    that allows users to make more critical decisions than with the previous versions.
    In this gathering data section, we will look at some of the options available.
    In the last part of this section, examples will show how to take advantage of
    these options, maximizing the usefulness of the utility database.


