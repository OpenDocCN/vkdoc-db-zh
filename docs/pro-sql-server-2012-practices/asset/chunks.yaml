    Performing Analysis


    At this point, you will have the sample workload from your database environment
    and a cloned database to use with the Database Engine Tuning Advisor. The next
    step is to pull these together into a tuning session and review the results. There
    are two basic methods to execute a workload against a database. You can use the
    GUI that comes with DTA, which is probably the most familiar method for using
    DTA; or you can use the same tool, but through a command-line interface. We will
    use the command-line interface with dta.exe in this chapter. The primary reason
    is that it easily ties into the theme of scriptable actions that have been used
    for the previous activities.


    n **Note** More information on indexing and using DTA can be found in *Expert
    Performance Indexing for SQL Server* *2012* by Jason Strate and Ted Krueger (Apress,
    2012).


    Through dta.exe, you’ll provide the tool with an XML configuration file which
    will provide all of the information needed to run the workload against the database.
    The XML configuration files provided in Listings 7-15 and 7-16 can be used to
    configure dta.exe to run against either SQL Profiler .trc files or the dbo.indexing_workload
    table, respectively. The other options in the XML input file configure the following
    attributes:


    • SQL Server instance name set to STR8-SQL-12


    • Database name set to AdventureWorks2012


    • Workload set to either files or table


    • Tune clustered and nonclustered indexes


    • Do not consider additional partitioning


    •


    Keep none of the existing clustered and nonclustered indexes


    Through these options, the DTA will be able to do more than what is possible through
    the missing indexes feature. Where missing indexes provide suggestions for where
    statistics could be made into 188


    chapter 7 ■ IndexIng OutsIde the BuBBle


    nonclustered indexes that will improve performance, the DTA can suggest when to
    consider partitioning or, even, when to move the clustered index.


    ***Listing 7-15.** Sample XML Input File for DTA Using .trc Files*


    <?xml version="1.0" encoding="utf-16" ?>


    [<DTAXML](http://www.w3.org/2001/XMLSchema-instance)


    [>](http://schemas.microsoft.com/sqlserver/2004/07/dta)


    <DTAInput>


    <Server>


    <Name>STR8-SQL-12</Name>


    <Database>


    <Name>AdventureWorks2012</Name>


    </Database>


    </Server>


    <Workload>


    <File>c:\temp\index_workload.trc</File>


    </Workload>


    <TuningOptions>


    <StorageBoundInMB>3000</StorageBoundInMB>


    <FeatureSet>IDX</FeatureSet>


    <Partitioning>NONE</Partitioning>


    <KeepExisting>NONE</KeepExisting>


    </TuningOptions>


    </DTAInput>


    </DTAXML>


    ***Listing 7-16.** Sample XML Input File for DTA Using dbo.indexing_workload Table*


    <?xml version="1.0" encoding="utf-16" ?>


    [<DTAXML](http://www.w3.org/2001/XMLSchema-instance)


    [>](http://schemas.microsoft.com/sqlserver/2004/07/dta)


    <DTAInput>


    <Server>


    <Name>STR8-SQL-12</Name>


    <Database>


    <Name>AdventureWorks2012</Name>


    </Database>


    </Server>


    <Workload>


    <Database>


    <Name>tempdb</Name>


    <Schema>


    <Name>dbo</Name>


    <Table>


    <Name>indexing_workload</Name>


    </Table>


    </Schema>


    </Database>


    </Workload>


    <TuningOptions>


    chapter 7 ■ IndexIng OutsIde the BuBBle


    <StorageBoundInMB>3000</StorageBoundInMB>


    <FeatureSet>IDX</FeatureSet>


    <Partitioning>NONE</Partitioning>


    <KeepExisting>NONE</KeepExisting>


    </TuningOptions>


    </DTAInput>


    </DTAXML>


    After building the XML input file for the tuning session, save the file as WorkloadConfig.xml,
    or any other appropriate name that you can remember. The next step is to execute
    the session against dta.exe using command-line arguments, such as those provided
    in Listing 7-17\. To pass in the input file, you will use the ix argument. For
    the report outputs, you will need to use the ox argument to determine where to
    place the reports and the rl argument output format. Table 7-3 shows a list of
    available report outputs.


    Along with those arguments, you will also need the s argument to specify a name
    for the session. Session names must always be unique.


    ***Listing 7-17.** DTA Command with XML Input File*


    dta -ix "c:\temp\WorkloadConfig.xml" -ox "c:\temp\Output.xml" -rl ALL -s Workload


    ***Table 7-3.** DTA Analysis Report List*


    **Value**


    **Report**


    ALL


    All analysis reports


    STMT_COST


    Statement cost report


    EVT_FREQ


    Event frequency report


    STMT_DET


    Statement detail report


    CUR_STMT_IDX


    Statement-index relations report (current configuration)


    REC_STMT_IDX


    Statement-index relations report (recommended configuration)


    STMT_COSTRANGE


    Statement cost range report


    CUR_IDX_USAGE


    Index usage report (current configuration)


    REC_IDX_USAGE


    Index usage report (recommended configuration)


    CUR_IDX_DET


    Index detail report (current configuration)


    REC_IDX_DET


    Index detail report (recommended configuration)


    VIW_TAB


    View-table relations report


    WKLD_ANL


    Workload analysis report


    DB_ACCESS


    Database access report


    TAB_ACCESS


    Table access report


    COL_ACCESS


    Column access report


    When the execution completes, you will be presented with an XML report that details
    the indexing recommendations. You can use these to identify potential new indexes
    to add, along with information on indexes that can be removed from the database.
    From a high level, the output report will contain all of the individual reports
    that are requested from tuning sessions. This will look like the XML document
    shown in Figure 7-17\. Examining the individual recommendations, the results will
    include items such as the index recommendation that is shown in Figure 7-18.


    ![Image 96](index-200_1.png)


    ![Image 97](index-200_2.png)


    chapter 7 ■ IndexIng OutsIde the BuBBle


    While there is still work to be done to validate the results, the key with using
    the DTA is that the heavy lifting has already been done. You aren’t going to be
    using your time to consider and test new index configurations; rather, you’ll
    be spending your time validating and applying the indexes. The heavy lifting can
    be done with minimal effort.


    ***Figure 7-17.** DTA output report sample*


    ***Figure 7-18.** DTA index recommendation*


    n **Caution** Never run DTA on a production server. When evaluating a workload,
    the tool uses algorithms that will, in essence, use a brute-force process to investigate
    as many indexing options as possible on the database. While no physical indexes
    or database changes will be made, there are hypothetical objects created that
    the tool uses to make its recommendations.


    The Business Bubble


    Besides the overall impact on the total performance of an index on a table and
    the queries that utilize the table, there is another area and reason that helps
    dictate whether an index is of value to a database. In the context of this chapter,
    we refer to this other reason as the *business bubble*. The business bubble is
    all of the nonstatistical reasons to index a table that can dictate the need for
    an index. Sometimes supporting the most important queries in a database defines
    the queries that are run most often. At times, they will be supporting the queries
    that are important because of the business value that they provide.


    Index Business Usage


    Probably the most often overlooked part of indexing is investigating the purpose
    or use of an index. There are not many easy ways to identify why an index is used.
    While that might be the case, there is one method you can use that will tell you
    how an index has been recently used—this is by querying the plan cache.'
  trans: "\n# 执行分析\n\n至此，您将拥有来自数据库环境的示例工作负载和一个用于数据库引擎优化顾问的克隆数据库。下一步是将这些内容整合到一个优化会话中并审阅结果。针对数据库执行工作负载有两种基本方法。您可以使用\
    \ `DTA` 自带的图形用户界面（GUI），这可能是使用 `DTA` 最为熟悉的方法；或者，您也可以通过命令行界面使用相同的工具。在本章中，我们将使用 `dta.exe`\
    \ 的命令行界面。主要原因是它更容易融入脚本化操作这一主题，该主题在之前的活动中已经使用过。\n\n> **注意：** 有关索引和使用 `DTA` 的更多信息，请参阅\
    \ Jason Strate 和 Ted Krueger 所著的《Expert Performance Indexing for SQL Server 2012》（Apress,\
    \ 2012）。\n\n通过 `dta.exe`，您将向工具提供一个 XML 配置文件，该文件包含了针对数据库运行工作负载所需的所有信息。清单 7-15 和\
    \ 7-16 中提供的 XML 配置文件可用于配置 `dta.exe`，分别针对 SQL Profiler `.trc` 文件或 `dbo.indexing_workload`\
    \ 表运行。XML 输入文件中的其他选项配置以下属性：\n\n- SQL Server 实例名称设置为 `STR8-SQL-12`\n- 数据库名称设置为\
    \ `AdventureWorks2012`\n- 工作负载设置为文件或表\n- 优化聚集和非聚集索引\n- 不考虑额外的分区\n- 不保留任何现有的聚集和非聚集索引\n\
    \n通过这些选项，`DTA` 将能够完成超出“缺失索引”功能可能性的任务。缺失索引功能提供关于何处可以将统计信息转化为能提升性能的非聚集索引的建议，而 `DTA`\
    \ 可以建议何时考虑分区，甚至何时移动聚集索引。\n\n**清单 7-15.** 使用 `.trc` 文件的 `DTA` 示例 XML 输入文件\n\n```xml\n\
    <?xml version=\"1.0\" encoding=\"utf-16\" ?>\n<DTAXML xmlns=\"http://schemas.microsoft.com/sqlserver/2004/07/dta\"\
    >\n  <DTAInput>\n    <Server>\n      <Name>STR8-SQL-12</Name>\n      <Database>\n\
    \        <Name>AdventureWorks2012</Name>\n      </Database>\n    </Server>\n \
    \   <Workload>\n      <File>c:\\temp\\index_workload.trc</File>\n    </Workload>\n\
    \    <TuningOptions>\n      <StorageBoundInMB>3000</StorageBoundInMB>\n      <FeatureSet>IDX</FeatureSet>\n\
    \      <Partitioning>NONE</Partitioning>\n      <KeepExisting>NONE</KeepExisting>\n\
    \    </TuningOptions>\n  </DTAInput>\n</DTAXML>\n```\n\n**清单 7-16.** 使用 `dbo.indexing_workload`\
    \ 表的 `DTA` 示例 XML 输入文件\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-16\" ?>\n\
    <DTAXML xmlns=\"http://schemas.microsoft.com/sqlserver/2004/07/dta\">\n  <DTAInput>\n\
    \    <Server>\n      <Name>STR8-SQL-12</Name>\n      <Database>\n        <Name>AdventureWorks2012</Name>\n\
    \      </Database>\n    </Server>\n    <Workload>\n      <Database>\n        <Name>tempdb</Name>\n\
    \        <Schema>\n          <Name>dbo</Name>\n          <Table>\n           \
    \ <Name>indexing_workload</Name>\n          </Table>\n        </Schema>\n    \
    \  </Database>\n    </Workload>\n    <TuningOptions>\n      <StorageBoundInMB>3000</StorageBoundInMB>\n\
    \      <FeatureSet>IDX</FeatureSet>\n      <Partitioning>NONE</Partitioning>\n\
    \      <KeepExisting>NONE</KeepExisting>\n    </TuningOptions>\n  </DTAInput>\n\
    </DTAXML>\n```\n\n为优化会话构建好 XML 输入文件后，将其保存为 `WorkloadConfig.xml` 或其他您能记住的合适名称。下一步是使用命令行参数针对\
    \ `dta.exe` 执行会话，例如清单 7-17 中提供的那些。要传入输入文件，您将使用 `-ix` 参数。对于报告输出，您需要使用 `-ox` 参数来确定报告的放置位置，以及\
    \ `-rl` 参数指定输出格式。表 7-3 显示了可用报告输出的列表。\n\n除了这些参数，您还需要 `-s` 参数来为会话指定一个名称。会话名称必须始终是唯一的。\n\
    \n**清单 7-17.** 带 XML 输入文件的 `DTA` 命令\n\n```\ndta -ix \"c:\\temp\\WorkloadConfig.xml\"\
    \ -ox \"c:\\temp\\Output.xml\" -rl ALL -s Workload\n```\n\n**表 7-3.** `DTA` 分析报告列表\n\
    \n| 值 | 报告 |\n| :--- | :--- |\n| `ALL` | 所有分析报告 |\n| `STMT_COST` | 语句成本报告 |\n\
    | `EVT_FREQ` | 事件频率报告 |\n| `STMT_DET` | 语句详情报告 |\n| `CUR_STMT_IDX` | 语句-索引关系报告（当前配置）\
    \ |\n| `REC_STMT_IDX` | 语句-索引关系报告（推荐配置） |\n| `STMT_COSTRANGE` | 语句成本范围报告 |\n|\
    \ `CUR_IDX_USAGE` | 索引使用报告（当前配置） |\n| `REC_IDX_USAGE` | 索引使用报告（推荐配置） |\n| `CUR_IDX_DET`\
    \ | 索引详情报告（当前配置） |\n| `REC_IDX_DET` | 索引详情报告（推荐配置） |\n| `VIW_TAB` | 视图-表关系报告 |\n\
    | `WKLD_ANL` | 工作负载分析报告 |\n| `DB_ACCESS` | 数据库访问报告 |\n| `TAB_ACCESS` | 表访问报告 |\n\
    | `COL_ACCESS` | 列访问报告 |\n\n执行完成后，您将看到一份详细的 XML 报告，其中包含了索引建议。您可以使用这些建议来识别潜在的新建索引，以及可以从数据库中删除的索引信息。从高层次来看，输出报告将包含从优化会话请求的所有单独报告。这将看起来像图\
    \ 7-17 所示的 XML 文档。检查各项建议，结果将包含如图 7-18 所示的索引建议等项目。\n\n![Image 96](img/index-200_1.png)\n\
    \n![Image 97](img/index-200_2.png)\n\n尽管仍有验证结果的工作要做，但使用 `DTA` 的关键在于繁重的工作已经完成。您不需要花费时间来考虑和测试新的索引配置；相反，您将花费时间来验证和应用索引。繁重的工作可以用最小的努力完成。\n\
    \n> **警告：** 切勿在生产服务器上运行 `DTA`。在评估工作负载时，该工具使用的算法本质上将采用蛮力过程，尽可能多地调查数据库上的索引选项。虽然不会创建任何物理索引或进行数据库更改，但会创建一些假设对象，工具利用它们来生成建议。\n\
    \n# 业务泡沫\n\n除了索引对表及其所用查询的整体性能影响之外，还有另一个领域和原因有助于决定索引对数据库是否有价值。在本章的上下文中，我们将此原因称为\
    \ **业务泡沫**。业务泡沫是所有非统计性的、可以决定索引需求的索引理由。有时，支持数据库中最重要的查询定义了那些最常运行的查询。有时，它们支持的查询之所以重要，是因为它们所提供的业务价值。\n\
    \n# 索引的业务用途\n\n索引中最常被忽视的部分可能是调查索引的用途或使用目的。没有太多简单的方法可以识别索引被使用的原因。尽管如此，有一种方法可以告诉您索引最近是如何被使用的——那就是查询计划缓存。\n"
- fmt: "# Chapter 7: Indexing Outside the Bubble\n\nWithin the `SHOWPLAN` XML for\
    \ every cached plan, all of the indexes and tables used are documented.\n\nBecause\
    \ of this, by querying the plan cache for index use, you can identify where an\
    \ index is being used.\n\n![Image 98](index-201_1.png)\n\nWhile the use of an\
    \ index can be determined through the plan cache, what is the point of determining\
    \ where an index is used? The point of this is to be able to identify the reasons\
    \ in which an index is providing value. By knowing this, you can determine which\
    \ business process that the index supports and, thus, know whether the index is\
    \ being used to populate value lists or to calculate your next quarter bonus.\
    \ When you know what is being supported, you will best be able to identify where\
    \ the impact of changing or dropping an index will occur and know how and where\
    \ to test for the changes made to the index.\n\nAs an example, we’ll investigate\
    \ the demonstration server from this chapter to see what queries are using the\
    \ `PK_SalesOrderHeader_SalesOrderID` index. Using the code in Listing 7-18, we\
    \ can see that by investigating the `Object` node of the `SHOWPLAN` XML, the index\
    \ is stored in the attribute `@IndexName`. We can query for this directly or through\
    \ a variable, which is used in the query. The results of this query, shown in\
    \ Figure 7-19, show you that there are eight plans in the cache that are using\
    \ the index, along with the counts of use and the execution plan that you’d use\
    \ to further investigate how it is being used.\n\n**Listing 7-18.** Query Plan\
    \ Cache for Index Usage\n\n```sql\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED\n\
    GO\n\nDECLARE @IndexName sysname = 'PK_SalesOrderHeader_SalesOrderID';\nSET @IndexName\
    \ = QUOTENAME(@IndexName,'[');\n\nWITH XMLNAMESPACES (DEFAULT 'http://schemas.microsoft.com/sqlserver/2004/07/showplan'),\n\
    IndexSearch\nAS (\n    SELECT qp.query_plan,\n           cp.usecounts,\n     \
    \      ix.query('.') AS StmtSimple\n    FROM sys.dm_exec_cached_plans cp\n   \
    \ OUTER APPLY sys.dm_exec_query_plan(cp.plan_handle) qp\n    CROSS APPLY qp.query_plan.nodes('//StmtSimple')\
    \ AS p(ix)\n    WHERE query_plan.exist('//Object[@Index = sql:variable(\"@IndexName\"\
    )]') = 1\n)\nSELECT StmtSimple.value('StmtSimple[1]/@StatementText', 'VARCHAR(4000)')\
    \ AS sql_text,\n       obj.value('@Database','sysname') AS database_name,\n  \
    \     obj.value('@Schema','sysname') AS schema_name,\n       obj.value('@Table','sysname')\
    \ AS table_name,\n       obj.value('@Index','sysname') AS index_name,\n      \
    \ ixs.query_plan\nFROM IndexSearch ixs\nCROSS APPLY StmtSimple.nodes('//Object')\
    \ AS o(obj)\nWHERE obj.exist('.[@Index = sql:variable(\"@IndexName\")]') = 1\n\
    ```\n\n**Figure 7-19.** Results from plan cache query\n\n**Note** In one situation,\
    \ I worked with a database that had indexes on a number of tables. These indexes\
    \ were used on average once or twice a week. During an indexing assessment, it\
    \ was determined that these weren’t used often enough to justify keeping the indexes.\
    \ Once removed, the import process that they supported degraded substantially\
    \ and the import time went from under an hour to many hours. This is a near perfect\
    \ example of why it is critical to know how your indexes are used, and what they\
    \ are used for. Had the research into the purpose of the indexes been done, then\
    \ the process using the indexes would not have regressed in performance.\n\n##\
    \ Data Integrity\n\nThe other piece of the business value for an index relates\
    \ to the data integrity, or rather the rules that are placed on the database to\
    \ validate and ensure data integrity. The chief method for this is the use of\
    \ foreign keys. With foreign keys, we are able to ensure that a value placed on\
    \ one table is a value that is in another table, which contains reference information.\
    \ While it might not seem important to index this information, it is often critical\
    \ to do so. The reason for this need is that if the column being validated is\
    \ not indexed, then any validation check will require a scan of the column. If\
    \ the column has thousands or millions of rows, this scan can cause performance\
    \ issues, and could lead to deadlocks.\n\nThe best way to determine whether there\
    \ are missing indexes on foreign keys is to check the metadata for the foreign\
    \ keys against and indexes. All of the information needed is included and can\
    \ be easily queried. The key thing to remember is to be certain the that indexes\
    \ and foreign keys are compared from the left edge of the index. If the foreign\
    \ key does not match to that edge, then it cannot be used to validate values in\
    \ the index. Using the query shown in Listing 7-19 provides the list of foreign\
    \ keys that are not indexed in a database. The results from this query, shown\
    \ in Figure 7-20, show that there are 33 foreign keys in the `AdventureWorks2012`\
    \ database that are not indexed.\n\nAfter the unindexed foreign keys are identified,\
    \ the next step is to create indexes that cover those foreign keys. The table\
    \ that the index needs to be built on is in the `fk_table_name` column in Figure\
    \ 7-20; the key columns for the index will be from the `fk_columns` column. As\
    \ an example, the index to cover the missing foreign key index for `FK_BillOfMaterials_Product_ComponentID`\
    \ would use the code in Listing 7-20.\n\n**Listing 7-19.** Query for Unindexed\
    \ Foreign Keys\n\n```sql\nSET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED\n;\n\
    WITH cIndexes\nAS (\n    SELECT i.object_id,\n           i.name,\n           (SELECT\
    \ QUOTENAME(ic.column_id,'(')\n            FROM sys.index_columns ic\n       \
    \     WHERE i.object_id = ic.object_id\n                AND i.index_id = ic.index_id\n\
    \                AND is_included_column = 0\n            ORDER BY key_ordinal\
    \ ASC\n            FOR XML PATH('')) AS indexed_compare\n    FROM sys.indexes\
    \ i\n), cForeignKeys\nAS (\n    SELECT fk.name AS foreign_key_name,\n        \
    \   fkc.parent_object_id AS object_id,\n           STUFF((SELECT ', ' + QUOTENAME(c.name)\n\
    \                  FROM sys.foreign_key_columns ifkc\n                      INNER\
    \ JOIN sys.columns c ON ifkc.parent_object_id = c.object_id\n                \
    \          AND ifkc.parent_column_id = c.column_id\n                  WHERE fk.object_id\
    \ = ifkc.constraint_object_id\n                  ORDER BY ifkc.constraint_column_id\n\
    \                  FOR XML PATH('')), 1, 2, '') AS fk_columns,\n           (SELECT\
    \ QUOTENAME(ifkc.parent_column_id,'(')\n            FROM sys.foreign_key_columns\
    \ ifkc\n            WHERE fk.object_id = ifkc.constraint_object_id\n         \
    \   ORDER BY ifkc.constraint_column_id\n            FOR XML PATH('')) AS fk_columns_compare\n\
    \    FROM sys.foreign_keys fk\n        INNER JOIN sys.foreign_key_columns fkc\
    \ ON fk.object_id = fkc.constraint_object_id\n    WHERE fkc.constraint_column_id\
    \ = 1\n), cRowCount\nAS (\n    SELECT object_id, SUM(row_count) AS row_count\n\
    \    FROM sys.dm_db_partition_stats ps\n    WHERE index_id IN (1,0)\n    GROUP\
    \ BY object_id\n)\nSELECT fk.foreign_key_name,\n       OBJECT_SCHEMA_NAME(fk.object_id)\
    \ AS fk_schema_name,\n       OBJECT_NAME(fk.object_id) AS fk_table_name,\n   \
    \    fk.fk_columns,\n       rc.row_count AS row_count\nFROM cForeignKeys fk\n\
    \    INNER JOIN cRowCount rc ON fk.object_id = rc.object_id\n    LEFT OUTER JOIN\
    \ cIndexes i ON fk.object_id = i.object_id AND\n        i.indexed_compare LIKE\
    \ fk.fk_columns_compare + '%'\nWHERE i.name IS NULL\nORDER BY OBJECT_NAME(fk.object_id),\
    \ fk.fk_columns\n```\n\n**Figure 7-20.** Results from foreign key query\n\n**Listing\
    \ 7-20.** Example Foreign Key Index\n\n```sql\nCREATE INDEX FIX_BillOfMaterials_ComponentID\
    \ ON Production.BillOfMaterials (ComponentID)\n```\n\n## Conclusion"
