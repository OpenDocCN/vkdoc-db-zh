  trans: '

    仅以关系引擎作为全面、一刀切的解决方案来实现数据架构，其缺点在于你往往难以让每个数据模型都按你期望的方式工作。通常，你可能会在不太适配的关系引擎中使用数据，但这样做只是因为它是你可用的工具，也是你熟悉的工具。要正确运用
    SQL Server 的所有功能，可能需要一位经验丰富、精通 DBMS 每个特性、属性和设置的专业人士才能完成。对于 SQL Server 领域的大多数专业人士来说，关系引擎对于所有数据类型和结构——包括日志、归档、BLOB、文本、星型模式、暂存数据和流数据——都是一个典型且无可否认的解决方案。但随着大数据的出现，情况已经改变。你必须选择数据存储的位置，将其放入
    OLTP 数据库未必是唯一（或默认）的选择。这是企业 DBA 在开发此架构时必须面对的一个新领域。


    你的所有数据都应该存储在大数据集群中吗？可以，但在 Microsoft SQL Server 环境中，答案非常明确：“绝不！”请记住，你仍然拥有 SQL Server，它已经满足了你大部分（或全部）需求。它是一个可靠、稳定、功能齐全的软件包，拥有高质量的数据库引擎，而且你在高容量环境中需要的任何
    `ACID`（原子性、一致性、隔离性、持久性）要求，SQL Server 仍然能更好地满足。


    ## 大数据随 Hadoop 而来


    既然我们已经确定大数据不会取代 SQL Server 或你的数据库基础设施，而是对其补充，现在让我们看看你将安装、配置和使用的软硬件，以及能让它对你有用的业务案例。当你迈向大数据时，你就承诺要开发一种新型的数据架构，通常涉及在你的环境中（无论是在你的网络内部还是在云端）添加一个
    Hadoop 集群。本章将使用 Azure 上的 Hadoop，这是 Microsoft 在 2012 年提供的基于云的解决方案。在撰写本文时，Microsoft
    提供了 `社区技术预览` (`CTP`) 版本，我们将利用它来展示可运行的代码。作为后续产品，Microsoft 将在未来某个时候发布 `Hadoop for
    Windows`，但由于此版本尚未公开，我们在此不作讨论。


    *Hadoop* 是一个框架，或者说是一个生态系统，而不是数据库。该框架由各种软件组成，支持数据的分布式、并行和冗余存储。Hadoop 的关键部分是 `HDFS`
    和 `MapReduce`。


    -   **`HDFS`:** Hadoop 分布式文件系统是 Hadoop 框架软件和应用程序使用的主要文件存储系统。

    -   **`MapReduce`:** 这是一个软件框架，用于在服务器集群上以可靠、容错的方式并行处理大量数据。


    Hadoop 的处理能力来自于能够并行地将数据写入大量分布式机器，在 Hadoop 生态系统中，这些机器被称为 *节点*。当我们谈论一大组机器时，可以设想一个小型集群可能有
    50 个节点。这样一个规模的集群，所有 50 台机器将以协调的方式同时处理数据。数据的冗余性已内置于这个过程中，因为它通过同时将每个数据片段写入三个节点来工作。


    一个 Hadoop 集群包含三种类型的机器：客户端、`主节点`和`从节点`。`主节点`有两种类型：`作业追踪器`和`名称节点`。`名称节点`协调 `HDFS`
    中的数据存储，而`作业追踪器`则使用 `MapReduce` 组织数据的并行处理。Hadoop 部署中的大多数机器都是`从节点`，它们负责存储数据和运行计算。每个`从节点`都运行一个`数据节点`和一个`任务追踪器`守护进程，与它们的`主节点`通信并接收指令。`客户端`机器的责任是将数据加载到集群中、提交
    `MapReduce` 作业，并在作业完成后检索结果。


    图 17-1 显示了`客户端`-`主节点`-`从节点`的关系，以及`名称节点`如何与`数据节点`协作在 `HDFS` 中存储和获取数据。在 50 个节点或更少的较小集群中，你可以让单台物理服务器扮演多个角色，例如同时担任`作业追踪器`和`名称节点`。对于中大型集群，你通常会让每个角色在单台服务器上运行。


    ### Hadoop 集群


    ```text

    客户端

    备份节点

    主节点

    辅助名称节点

    名称节点

    从节点

    数据节点 1

    数据节点 2

    数据节点 3

    数据节点 N

    ```


    ***图 17-1.** 一个拥有 N 个数据节点的 Hadoop 集群*


    ## MapReduce：Hadoop 的核心


    Hadoop 之所以人气激增，是因为它比其他任何可用方式都能更快地检索和处理大量数据，而 `MapReduce` 正是实现这一目标的关键。因此，理解 Hadoop
    的最佳途径就是了解 `MapReduce` 的工作原理。为此，你将通过一个示例来了解 `MapReduce` 如何处理数据以解决一个高容量问题。尽管为 `MapReduce`
    程序编写代码通常不是 DBA 的工作，但了解数据如何处理对他们来说，就像了解交易如何由 Web 应用程序处理一样重要。


    > **注意** Hadoop 是用 `Java` 编程语言编写的，因此 `MapReduce` 代码最常用 `Java` 编写，尽管也支持其他语言，如 `C++`
    和 `Python`。Microsoft 为 Hadoop 生态系统引入的一个有趣发展是增加了 `JavaScript` 作为 `MapReduce` 编程语言。在本节中，你将使用
    `JavaScript` 来逐步了解 `MapReduce` 的示例，稍后在本章的“`JavaScript`”部分，你将用自己的代码执行一个 `MapReduce`
    作业。对于许多有经验使用 Microsoft 开发工具的软件和数据库开发人员来说，`JavaScript` 是熟悉的，并且是 `MapReduce` 开发的一个可行选择。


    为了了解 `MapReduce` 如何处理数据，你现在将通过一个在线零售商的业务场景进行演练。该零售商年销售额超过 `$20 亿`，并且在过去三年中积累了大量的销售数据。假设这三年期间处理的销售交易数量已增长到超过
    10 亿条，并且公司使用 Hadoop 存储了每笔交易的记录。表 17-1 显示了为每笔交易记录的部分数据。完整的数据集分布在 100 个数据节点的集群上。


    如此详细地记录数据，使你能够以任何你选择的方式检索和分析它。你对每笔销售都有很多了解，包括客户详情、产品特性和促销信息。Hadoop 将数据以 `CSV`
    格式存储在 `HDFS` 中，因此你可以通过使用数据集中的地理位置、产品、促销、客户和销售数据，以多种方式计算销售指标，来分析这完整三年期间的数据。对于你的第一个任务，你将计算每个产品线的平均销售额。


