  trans: "\n关于 `Service Broker`，要理解 `Event Notifications`，你需要知道的是：当你感兴趣的事件触发时，一条包含该事件数据的消息会在一个会话中被异步发送到一个服务。该服务后端由一个队列支撑，实际的消息会存储在队列中，直到被处理。消息在一个名为\
    \ *激活存储过程* 的自定义存储过程中处理，在此过程中我们 `RECEIVE`（接收）来自队列的消息，并按需处理。`RECEIVE` 是一个新的 `T-SQL`\
    \ 关键字，用于从队列中检索消息。它基本上是用于队列中消息的 `SELECT` 语句。消息总是以 `XML` 格式存储，如果需要，也可以使用架构进行验证。消息大小最大可达\
    \ 2 GB。\n\n因为消息始终是 `XML` 格式，所以将事件数据转换为 `XML` 格式并发送事件通知的开销非常小。由于这种对 `Service Broker`\
    \ 的依赖，你必须在打算使用 `Event Notifications` 的数据库上启用 `Service Broker`。\n\n## 事件通知类别\n\n\
    `Event Notifications` 事件分为两类：服务器作用域和数据库作用域。\n\n服务器作用域事件是 `SQL Trace` 事件类的一个子集，而数据库作用域事件则是所有\
    \ `DDL` 事件，这些事件既可用于事件通知，也可用于 `DDL` 触发器。两者都有一个固定的 `XML` 架构，在创建要发送的消息时，会根据该架构进行验证。\n\
    \n## 与 SQL Trace 的区别\n\n不过，`SQL Trace` 和 `Event Notifications` 之间有一些区别。如果一条 `DDL`\
    \ 语句被回滚，则不会触发消息。这意味着事件通知仅在事务成功提交后才会发送。在事务运行期间，消息存储在内部的 `Service Broker` 队列中。另一个区别是，与\
    \ `SQL Trace` 跟踪（默认跟踪除外）不同，`Event Notifications` 在服务器重启后仍然存在。它们也可以被远程接收到另一台服务器进行处理。\n\
    \n## 使用目录视图进行监控\n\n你可以使用以下目录视图监控与 `Event Notifications` 相关的任何内容。其详细信息可以在联机丛书中找到。\n\
    \n*   `sys.event_notification_event_types`：包含所有服务器和数据库作用域事件。它们是分层分组的，这意味着你可以订阅从一组事件到单个事件的任何内容。这种粒度提供了一个强大的跟踪模型。\n\
    *   `sys.server_event_notifications` 和 `sys.server_events`：包含所有服务器级别的事件通知以及每个通知包含的事件。\n\
    *   `sys.event_notifications` 和 `sys.events`：包含所有数据库级别的事件通知以及每个通知包含的事件。\n\n##\
    \ 实现与用例\n\n因为 `Event Notifications` 基于 `Service Broker`，所以每次事件触发时，它们都会激活一个存储过程。这样，你可以为不同的事件设置不同的激活存储过程。我发现这非常有用，`Event\
    \ Notifications` 已成为我获取重要事件（如死锁或阻塞）即时通知的首选方式。你只需订阅 `DEADLOCK_GRAPH` 和 `BLOCKED_PROCESS_REPORT`\
    \ 事件，当收到事件时，就可以将通知保存到表中，并向负责人发送电子邮件。这当然比持续运行跟踪和事件而没有即时通知要好得多。以下示例展示了如何订阅服务器作用域的\
    \ `DEADLOCK_GRAPH` 事件，以及一个简短的存储过程片段来处理它。完整代码可以在本书的代码附录中找到。这实际上是我服务器上用于即时死锁通知的部分代码。\n\
    \n它们效果很好，让我能在问题发生时立即进行调查。\n\n## 示例 1：即时死锁通知\n\n```sql\n-- 即时死锁通知\n\nUSE tempdb;\n\
    GO\n\n-- 此过程会将我们的事件数据写入表中，并发送通知电子邮件。\n-- 在此示例中，该存储过程缺少错误和事务处理！\nCREATE PROCEDURE\
    \ usp_ProcessNotification\nAS\nDECLARE @msgBody XML;\nDECLARE @dlgId uniqueidentifier;\n\
    \n-- 你可以更改此设置以一次性获取所有消息\nWHILE(1=1)\nBEGIN\n    -- 从队列中逐条接收消息\n    ;RECEIVE TOP(1)\n\
    \        @msgBody = message_body,\n        @dlgId = conversation_handle\n    FROM\
    \ dbo.EventNotificationsQueue;\n\n    -- 将事件数据插入我们的表中\n    INSERT INTO TestEventNotification(eventMsg)\n\
    \    SELECT @msgBody;\n\n    -- 处理事件后我们也可以发送电子邮件\n    -- DECLARE @MailBody NVARCHAR(MAX)\n\
    \    -- SELECT @MailBody = CAST(@msgBody AS NVARCHAR(MAX));\n\n    -- 使用定义的电子邮件配置文件发送电子邮件。\n\
    \    -- 由于这是异步的，它不会暂停执行\n    -- EXEC msdb.dbo.sp_send_dbmail\n    -- @profile_name\
    \ = 'your mail profile', -- 你定义的电子邮件配置文件\n    -- @recipients = 'dba@yourCompany.com',\
    \ -- 你的电子邮件\n    -- @subject = 'occured notification',\n    -- @body = @MailBody;\n\
    END\nGO\n\n-- 创建将接收事件通知消息的通知队列\n-- 添加激活存储过程，该过程将在消息到达时处理队列中的消息\nCREATE QUEUE EventNotificationsQueue\n\
    WITH STATUS = ON,\nACTIVATION (\n    PROCEDURE_NAME = usp_ProcessNotification,\n\
    \    MAX_QUEUE_READERS = 1,\n    EXECUTE AS 'dbo' );\nGO\n\n-- 为我们的队列创建通知服务，使用预定义的消息类型\n\
    CREATE SERVICE NotificationsService\nON QUEUE\n    EventNotificationsQueue(\n\
    \    [http://schemas.microsoft.com/SQL/Notifications/PostEventNotification]);\n\
    GO\n\n-- 为服务创建路由\nCREATE ROUTE NotificationsRoute\nWITH SERVICE_NAME = 'NotificationsService',\n\
    \    ADDRESS = 'LOCAL';\nGO\n\n-- 为 DEADLOCK_GRAPH 事件创建事件通知。\nCREATE EVENT NOTIFICATION\
    \ ServerNotificationEvent\nON SERVER\nFOR DEADLOCK_GRAPH\nTO SERVICE 'NotificationsService',\n\
    \    'current database' -- 区分大小写的字符串，指定在当前数据库中使用服务代理；\nGO\n\n-- 检查我们的事件通知是否已正确创建\n\
    SELECT * FROM sys.server_event_notifications WHERE name = 'ServerNotificationEvent';\n\
    GO\n\n-- 创建将保存我们数据的表\n-- 每次发生死锁时，其信息都将写入此表\nCREATE TABLE TestEventNotification(Id\
    \ INT IDENTITY(1,1), EventMsg xml, EventDate datetime default(GETDATE()));\n```\n\
    \n## 示例 2：订阅 DDL 事件组\n\n另一个示例展示了如何订阅数据库作用域的 `DDL_TABLE_EVENTS` 事件组，该事件组由 `CREATE_TABLE`、`ALTER_TABLE`\
    \ 和 `DROP_TABLE` 事件组成。关于激活存储过程和消息处理，其工作原理完全相同。该示例在默认启用了服务代理的 `tempdb` 中运行。如果你想在另一个数据库中运行它，必须在该数据库中启用服务代理。\n\
    \n```sql\n-- 订阅 DDL_TABLE_EVENTS 事件组\n\n-- 查看我们要订阅的完整 DDL_TABLE_EVENTS 事件组\nWITH\
    \ cteEvents AS\n(\n    SELECT 0 AS LEVEL, *\n    FROM sys.event_notification_event_types\n\
    \    WHERE TYPE_NAME = 'DDL_TABLE_EVENTS'\n    UNION ALL\n    SELECT LEVEL + 1\
    \ AS LEVEL, EN.*\n    FROM sys.event_notification_event_types EN\n    JOIN cteEvents\
    \ C ON C.parent_type = EN.type\n)\nSELECT *\nFROM cteEvents\nORDER BY TYPE;\n\n\
    -- 为 DDL_TABLE_EVENTS 事件创建事件通知。\n-- 将其发送到我们用于服务器事件的同一服务\nCREATE EVENT NOTIFICATION\
    \ DatabaseNotificationEvent\nON DATABASE\nFOR DDL_TABLE_EVENTS\nTO SERVICE 'NotificationsService',\n\
    \    'current database'; -- 区分大小写的字符串，指定在当前数据库中使用服务代理\nGO\n\n-- 测试它是否有效\nCREATE\
    \ TABLE testEN (id INT);\nGO\nINSERT INTO testEN VALUES (1), (2);\nGO\nALTER TABLE\
    \ testEN ADD VALUE VARCHAR(20);\nGO\nDROP TABLE testEN;\nGO\nSELECT * FROM TestEventNotification;\n\
    ```\n"
- fmt: '# Chapter 5: From SQL Trace to Extended Events


    *Extended events* are a new addition to the SQL Server database engine in SQL
    Server 2008. They are a new lightweight high performance eventing system that
    is built directly inside the SQLOS. The extended events engine itself is just
    a pool of dispatchers that send event data to their targets. It contains no metadata
    and is fully pluggable. This way Microsoft can extend it without the need to modify
    other code. In SQL Server 2012 the SQL Trace infrastructure for the database engine
    was deprecated (however the SSAS part is not yet deprecated). Extended events
    are its replacement. As the data sizes and loads increase so does the need for
    tracing with as little overhead as possible. In SQL Server 2008, SQL Trace was
    still the main tracing engine and had more events. SQL Server 2012 fixed this
    and now an exact mapping exists between SQL Trace events and Extended events.
    Because they are more complete in SQL Server 2012 all code is based on that version.
    Since there have been various changes not all of it will be runnable on SQL Server
    2008.


    Figure 5-7 shows how all the pieces of extended events fit together. A module
    is a dll or an exe file. Each module can contain multiple packages and each package
    contains its own extended events objects. This way a grouping can be done based
    on event functionality like auditing or SQLOS events or general SQL Server events.
    There are 4 packages in SQL Server 2008 and 9 in SQL Server 2012. They can be
    viewed by querying the `sys.dm_xe_packages` catalog view.


    Not all of the packages can be used, and not all of them have entirely public
    objects. For example you can’t use anything from `SecAudit` package since it’s
    reserved for the built in auditing functionality. In the following sections, we’ll
    take a short look at the objects that are in a package.


    ![Image 67](index-125_1.png)


    **Figure 5-7.** Extended events architecture


    ## Events


    Events are points in code that we can trace. They are defined with the standard
    ETW (event tracing for windows) model that includes channel, keyword, and payload
    attributes. Channel tells the target audience for the event like an administrator
    or a developer. Keywords give us the ability to group events into extra categories.
    Events always execute synchronously but the extended events engine can forward
    them to their targets synchronously or asynchronously. The payload is just a fancy
    name for the data collected for the event. The cool thing about the events is
    that we can unlike with SQL Trace extend the collected data with actions. We’ll
    look at those shortly. Existing events and their payload can be viewed with these
    SQL statements:


    ```sql

    -- view all defined events in sql server

    SELECT *

    FROM sys.dm_xe_objects

    WHERE object_type = ''event''

    -- show only targets that we can use

    AND (capabilities IS NULL OR capabilities & 1 = 0)

    ORDER BY name;


    -- view all columns for each event - the event payload

    SELECT *

    FROM sys.dm_xe_object_columns

    WHERE -- show only targets that we can use

    (capabilities IS NULL OR capabilities & 1 = 0)

    ORDER BY object_name, name;

    ```


    ## Predicates


    Predicates are similar to filters in SQL Trace but much more powerful. They function
    like a `WHERE` clause in a SQL statement. They filter which events will be sent
    to the target, again unlike SQL Trace, which sends an event to all targets and
    leaves the filtering to them. Predicates fully support short-circuiting so it’s
    a good idea to first specify simple predicates followed by more complex ones.
    All predicates are processed synchronously so be aware that heavy duty conditions
    can cause some performance degradation. It’s best to keep predicates simple like
    filtering the event based on a transaction ID or object ID or something similar.
    Existing predicates can be viewed with this SQL statement:


    ```sql

    SELECT *

    FROM sys.dm_xe_objects

    WHERE object_type in (''pred_compare'', ''pred_source'')

    -- show only targets that we can use

    AND (capabilities IS NULL OR capabilities & 1 = 0)

    ORDER BY name;

    ```


    ## Actions


    Actions are commands that provide additional information for an event. You can
    view them as environment variables that give information about the current database
    engine state. However you can also perform a task with them inside the database
    engine, like inserting a breakpoint or collecting a mini dump. Just be careful
    with those breakpoints because they stop the SQL Server execution. They are bound
    to the event in the session definition and a few (such as `database_name`, `event_sequence`)
    are direct column mappings from SQL Trace. Any action can be linked to any event.
    They are also processed synchronously after all predicates have been evaluated
    and before the event is sent to its target. Actions reflect the global state of
    the database engine and they are not hard linked to an event. For example there’s
    an action called `sqlserver.sql_text` that can be collected when an event fires.
    This action returns the same information as `DBCC INPUTBUFFER` command. A first
    time user will probably think (like I did) that it is collecting the SQL statement
    that fired the event. This is not the case.


    Existing actions can be viewed with this SQL statement:


    ```sql

    SELECT *

    FROM sys.dm_xe_objects

    WHERE object_type = ''action''

    -- show only targets that we can use

    AND (capabilities IS NULL OR capabilities & 1 = 0)

    ORDER BY name;

    ```


    ## Types and Maps


    A *type* is a simple or complex data type that is used in the event payload. *Maps*
    are dictionaries that map some numeric value to a text. Existing types and maps
    can be viewed with these SQL statements:


    ```sql

    SELECT *

    FROM sys.dm_xe_objects

    WHERE object_type in (''map'', ''type'')

    -- show only targets that we can use

    AND (capabilities IS NULL OR capabilities & 1 = 0)

    ORDER BY name;


    SELECT *

    FROM sys.dm_xe_map_values;

    ```


    ## Targets


    Targets are the destinations where the extended event data is stored. A target
    can be a memory buffer or a file and can be either synchronous or asynchronous
    in the way it saves data. If a target is synchronous then the engine waits until
    the event data is successfully stored in the target. In both SQL Server 2008 and
    2012 there are 6 targets. Because some target names and some of their properties
    have changed between versions I will use SQL Server 2012 names and properties.


    First target is called the *Histogram*. It is memory based and asynchronous. It
    counts the number of occurrences that an event fires. The basis for a histogram
    group can be event data or an action. As this target only stored counts and has
    a low performance overhead it’s a good choice to use when we’re trying to find
    which events fire the most in the database engine.


    The *Event Counter* target is a memory-based and synchronous target. It is similar
    to the Histogram but only in that it counts events. The difference is that it
    can’t be modified or filtered in any way and counts all events that happen in
    the engine. Using this counter is a good way to find out the workload characteristics
    of your system.'
