    MapReduce has two important functions: map and reduce. The map function takes
    as input a dataset, filters out any data that is dirty or unwanted, and assigns
    a user-defined key to each row before outputting it. The Hadoop framework groups
    the data together by the user-defined key and sorts it before sending it to the
    reduce function. In this example, the key you’ll use is Product Line. The only
    other data you’ll need is Sale Amount, so ignore the rest. Here’s a quick explanation
    of the important terms:


    •


    **MapReduce Job:** This is a process run by the MapReduce framework that includes
    input data, custom MapReduce code, and configuration settings. One MapReduce


    job executes both map tasks and reduce tasks. The MapReduce work flow is shown


    in Figure 17-2.


    • **Map Task:** The input to a MapReduce job is split into equal-sized units of
    work called *map tasks* by the framework. Each task processes a subset of a whole
    dataset and ideally executes on a node that contains that subset on its local
    disk.


    • **Reduce Task:** Reduce tasks are made up of custom code and configuration settings
    that take as input the output of the map tasks. The map tasks group and sort the


    data by key and their output is fed into reduce tasks for further processing.


    • **Map Function:** This is the custom program code that is executed by a map
    task whose main purpose is to filter data and identify a key field.


    • **Reduce Function:** This is the custom program code that is executed by a reduce
    task that normally performs aggregations and other calculations.


    ![Image 192](index-404_1.png)


