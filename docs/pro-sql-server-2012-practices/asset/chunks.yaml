    If the `Pages/sec` counter level is higher than X or the amount of `Available
    Mbytes` is low, review the memory usage for all running processes on the OS. Check
    the `Max Server Memory Usage` within `SQL Server`, and validate that it is not
    set too high. |

    | `Memory` | `Memory\Pages/sec` | |

