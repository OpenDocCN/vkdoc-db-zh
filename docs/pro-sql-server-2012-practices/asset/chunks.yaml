    99 percent LOB_DATA. Upon asking what was stored in the table, I learned that
    it had an Image column and was used to hold PDF documents. I immediately told
    the client that SQL Server data compression was not something they should use
    on this table, because the majority of the data, the vast majority, was not compressible.
    The best thing about knowing what type of allocation units make up your table
    is that not only will it help you choose what *to* compress, but it will help
    you choose what *not to* compress. We could have used FILESTREAM to store the
    PDF documents or, in SQL Server 2012, FileTable also was an option to consider,
    to give them greater flexibility on how they store and searched their data.


    As long as your data is in IN_ROW_DATA pages, you can compress it. Know what your
    allocation unit for your data is before deciding what to compress. I wouldn’t
    normally compress a table with just a 50-50 ratio, like I did in our second example,
    without taking a couple steps. First find the queries or stored procedures that
    access this table. Extract the query plans in XML format and examine them. Compress
