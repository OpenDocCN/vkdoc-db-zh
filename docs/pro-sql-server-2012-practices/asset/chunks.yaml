- fmt: "# Chapter 4 - Dynamic Management Views\n\n## Blocking Session Wait Resource\n\
    \n`cpu_time`\nCPU time in milliseconds.\n\n`total_elapsed_time`\nTotal time that\
    \ has elapsed since the request was received.\n\n`reads`\nNumber of reads performed.\n\
    \n`writes`\nNumber of writes performed.\n\n`query_plan_hash`\nBinary hash value\
    \ assigned to the query execution plan.\n\nThe `dm_exec_requests` DMV can pull\
    \ basic information or be joined to other views, such as `dm_os_wait_stats`, to\
    \ gather more complex information about sessions currently executing in the database.\n\
    \nHere’s an example:\n```sql\nSELECT session_id,\n       status,\n       command,\n\
    \       sql_handle,\n       database_id\nFROM sys.dm_exec_requests\n```\nFigure\
    \ 4-3 demonstrates the output for the current requests.\n\nNote that the background\
    \ processes for MSSQL (the session number is less than 51, which signifies a background\
    \ system session) are displayed with the command type and purpose, along with\
    \ what database (DBID) it belongs to.\n\n![Image 39](index-88_1.png)\n![Image\
    \ 40](index-88_2.png)\n\n**Figure 4-3.** Example output showing current requests.\n\
    \nLocating a blocked session and blocked information is simple with `sys.dm_exec_requests`,\
    \ as the following example shows:\n```sql\nSELECT session_id, status,\n      \
    \ blocking_session_id,\n       wait_type,\n       wait_time,\n       wait_resource,\n\
    \       transaction_id\nFROM sys.dm_exec_requests\nWHERE status = N'suspended';\n\
    ```\nFigure 4-4 shows an example of results for a blocked session.\n\n**Figure\
    \ 4-4.** Example output showing a blocking session.\n\nIn the scenario shown in\
    \ Figure 4-4, you can see that the blocked session (56) is blocked by session\
    \ ID 54 on an update for the same row (`LCK_M_U`), and that it is suspended until\
    \ the lock is either committed or rolled back. You now identify the `transaction_id`,\
    \ which can also be used for further information in joins to secondary DMVs.\n\
    \n## Locking Escalation\n\nLocking escalation is one of the enhanced features\
    \ in SQL Server that Microsoft spent a lot of time on. When an issue does arise,\
    \ it is important that the DBA understand what is occurring and how to address\
    \ a lock-escalation issue. If you do experience a locking issue in one of your\
    \ databases, the following query, using the `dm_trans_lock` DMV returns information\
    \ regarding locking status from the database in question.\n```sql\nSELECT resource_type,\n\
    \       resource_associated_entity_id,\n       request_status,\n       request_mode,\n\
    \       request_session_id,\n       resource_description\nFROM sys.dm_tran_locks\n\
    WHERE resource_database_id = <DBID>\n```\nFigure 4-5 shows the results of this\
    \ query.\n\n![Image 41](index-89_1.png)\n\n**Figure 4-5.** Demonstration of locking-escalation\
    \ information shown in SQL Server.\n\nIn Figure 4-5, you can see that there is\
    \ a lock escalation in progress between session IDs 54 and 56. The “Page” escalation\
    \ on `resource_associated_entity_id` (the Employee table) involves the index (`IX`,\
    \ `KEY`) as well. Always be aware of object and key escalations. Lock escalation\
    \ should work seamlessly in SQL Server and when issues arise, always inspect the\
    \ code and statistics first for opportunities for improvement.\n\nIdentifying\
    \ what type of locking status, including the mode and the transaction state the\
    \ lock is in, addressing a lock that has escalated and has created an issue are\
    \ pertinent parts of the DBA’s job. Gathering the information on locking is now\
    \ simple—you do it by joining the `dm_tran_locks` DMV to the `dm_os_waiting_tasks`\
    \ DMV, as shown here:\n```sql\nSELECT dtl.resource_type,\n       dtl.resource_database_id,\n\
    \       dtl.resource_associated_entity_id,\n       dtl.request_mode,\n       dtl.request_session_id,\n\
    \       dowt.blocking_session_id\nFROM sys.dm_tran_locks as dtl\nINNER JOIN sys.dm_os_waiting_tasks\
    \ as dowt\nON dtl.lock_owner_address = dowt.resource_address\n```\n\n## Finding\
    \ Poor Performing SQL\n\nAs a performance-tuning DBA, I find the DMVs in the next\
    \ section to be some of my favorites. These DMVs are the most commonly queried\
    \ by any DBA looking for performance issues with the plan cache of SQL Server.\
    \ With these queries, you can view aggregated data about execution time, CPU resource\
    \ usage, and execution times."
