    \ Category 1 的定义。此类数据的分组既适用于历史健康状况，也适用于当前健康状况。为了跟踪历史信息，表设计与前一节讨论的数据库文件增长表相呼应。\n"
- fmt: "# The Utility Database\n\n## Tracking Database Health\n\n```sql\nUSE [dbUtilities]\n\
    \nGO\n\nCREATE TABLE [dbo].[Free_Drive_Space](\n    [DriveSpaceReadingID] [int]\
    \ IDENTITY(1,1) NOT NULL,\n    [Drive] [char](1) NOT NULL,\n    [MBFree] [int]\
    \ NOT NULL,\n    [ReadingDate] [datetime] NOT NULL,\n    CONSTRAINT [PK_Free_Drive_Space_ReadingID]\
    \ PRIMARY KEY CLUSTERED \n        ([DriveSpaceReadingID])\n)\n\nGO\n```\n\nTracking\
    \ this data is not only relevant to the historical health of the database; it\
    \ also provides a point where the current health of the database can be reviewed.\
    \ If the amount of free space decreases to a point where action needs to be taken\
    \ to ensure future database stability, then the attention of the administrators\
    \ needs to be raised. The results from the following stored procedure can be inserted\
    \ into not only the `Free_Drive_Space` table for historical reference, but also\
    \ into the current health table, `Daily_Report`.\n\n```sql\nUSE [dbUtilities]\n\
    \nGO\n\nCREATE PROCEDURE [dbo].[Get_Drive_Space_Free]\nAS\nDECLARE @driveSpace\
    \ TABLE (drive CHAR(2), MBFree int)\n\nINSERT INTO @driveSpace\nEXEC sp_executesql\
    \ N'xp_fixeddrives'\n\nINSERT INTO [dbUtilities].[dbo].[Daily_Report]\nSELECT\
    \ 'Drive Space', GETDATE(), 'Free space on ' + drive + \n    ' is ' + CONVERT\
    \ (VARCHAR(20), MBFree/1024) + ' Gigs'\nFROM @driveSpace\n\nINSERT INTO [dbUtilities].[dbo].[Free_Drive_Space]\n\
    SELECT Drive, MBFree, GETDATE()\nFROM @driveSpace\n\nGO\n```\n\nThe `Get_Drive_Space_Free`\
    \ stored procedure is an example of using extended stored procedures to gather\
    \ information outside of SQL Server, and how to store that information.\n\n##\
    \ Processors\n\nUnderstanding how hard the processors are working is also an important\
    \ key data point, but accessing this information is not easy. One option to retrieve\
    \ this information is to review the DVMs. This information, however, includes\
    \ statistics on how SQL Server is using the processors, not the actual processor\
    \ utilization numbers that you might need.\n\nOne method that can retrieve processor\
    \ information from the operating system level is Windows Management Instrumentation\
    \ (WMI). A great resource for WMI can be found in Microsoft’s Script Center ([http://technet.microsoft.com/en-US/scriptcenter/default.aspx](http://technet.microsoft.com/en-US/scriptcenter/default.aspx)).\
    \ The compiled code that is used in this example was provided by a developer willing\
    \ to help. Inside the `.dll` that was provided to me is a WMI call that starts\
    \ monitoring the processor utilization, waits 10 seconds, and then determines\
    \ the average over that time period. The utility database can call this `.dll`\
    \ by enabling CLR and then addressing the information by a user-created function.\
    \ As complex as it sounds, the code is not too difficult to put into place.\n\n\
    The first step is to create the table that will store this information. The table\
    \ format will match other Category 1 tables as a core part of the utility database,\
    \ and the retention of the data matches that of other data that should be retained\
    \ historically.\n\n```sql\nUSE [dbUtilities]\n\nGO\n\nCREATE TABLE [dbo].[Processor_UTI](\n\
    \    [ProcessorReadingID] [int] IDENTITY(1,1) NOT NULL,\n    [ReadingDate] [datetime]\
    \ NOT NULL,\n    [ProcessorUTI] [int] NOT NULL,\n    CONSTRAINT [PK_Processor_UTI_ID]\
    \ PRIMARY KEY CLUSTERED \n        ([ProcessorReadingID])\n) ON [PRIMARY]\n\nGO\n\
    ```\n\n## Enabling Processor Utilization Collection\n\nRetrieving the information\
    \ includes a number of steps that will adjust some of the server’s configuration\
    \ settings. The first step to enable the processor utilization collection is to\
    \ enable CLR on your server.\n\n```sql\nsp_configure 'show advanced options',\
    \ 1;\nRECONFIGURE\nGO\n\nsp_configure 'clr enabled', 1;\nRECONFIGURE\nGO\n```\n\
    \nSQL Server needs to be instructed that the contents within the database are\
    \ trustworthy. The altering of the trustworthy status needs to be done with elevated\
    \ permissions on the SQL Server instance. This step is to validate that the code\
    \ being called from inside the database is trusted by the administrators.\n\n\
    ```sql\nALTER DATABASE dbUtilities SET TRUSTWORTHY ON;\n```\n\nOnce the server\
    \ has been configured to allow the external calls to the `.dll`, it is important\
    \ to make sure that the `.dll` exists where SQL Server can access it. Copy the\
    \ `.dll` to the directory."
