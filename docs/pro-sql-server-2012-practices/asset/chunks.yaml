- fmt: '## SQL Server 页面与行压缩机制详解


    当你查看常规数据页的内容与压缩数据页的内容时，会发现两者差异巨大。你可能会好奇，从首次引入压缩的 SQL Server 2005 到 SQL Server
    2008，微软的开发人员是如何让关系引擎能同时读取两套不同页面的。答案是，他们并没有这样做。


    当启用页面或行压缩时，数据以压缩格式存储在磁盘上，并以压缩格式读入内存。然而，当数据在访问方法将其返回给关系引擎之前，从内存的缓冲池中被读取时，压缩数据会被重写为未压缩的格式。这些未压缩的页面并不存储在内存中。页面的转换是以
    CPU 操作为代价完成的。为了更仔细地研究这一点，请查看图 14-12，了解 SQL Server 中针对压缩表执行 `select` 操作的工作流程。


    `Figure 14-12` 数据在磁盘上被压缩，并以压缩形式读入池中的内存；只有当它离开存储引擎前往关系引擎时才会被解压缩。


    ### 第14章 页面和行压缩


    当查询最初从用户端发出时，它会通过 SQL 网络接口连接，该接口将数据转换为微软专有的表格数据流协议。随后，查询到达命令解析器。如果你曾因查询语法不正确而收到错误信息，那么你就已经与命令解析器有过交互了。SQL
    Server 会检查该查询是否存在缓存计划，以便跳过优化步骤；在我们的例子中，没有缓存计划，因此查询被移交给优化器。在为检索数据创建好执行计划后，查询进入查询执行器。查询执行器向访问方法请求满足查询所需的数据副本，并指示其查找数据的位置。访问方法向缓冲区管理器请求所需的页面，缓冲区管理器会检查数据缓存以确认这些页面是否存在。对于我们的查询，页面不在缓存中，因此缓冲区管理器以压缩格式从磁盘检索它们，并以压缩格式将它们读入数据缓存的内存中。接着，缓冲区管理器将所需的页面交给访问方法。访问方法将经过页面压缩的页面转换为未压缩格式。经过行压缩的页面则在关系引擎的代码块中，通过一个“着陆垫”进行解压缩，然后再返回给查询执行器。


    查询执行器将数据通过 `SNI` 发回，`SNI` 会为客户端翻译数据。


    这是对整个过程的过度简化。关于关系引擎和存储引擎的特定内部组件，需要花费数周乃至数月的时间来学习。这里的关键信息是：数据在*磁盘*和*内存*中都是压缩的。因此，你在这两个位置都能获得节省空间的益处。


    CPU 开销的多少与你选择的压缩级别以及服务器上的负载类型直接相关。如果你的服务器是 CPU 密集型的，平均持续 CPU 使用率在 60% 或更高，你可能不想使用压缩，至少不要在包含大量插入和更新操作的易失性表上使用。


    > **提示** (`Tip`) 页面压缩是一个非常有趣的功能。在已启用页面压缩的表或索引中，每个页面会自动应用行压缩。但是，要应用列前缀或页面字典压缩，必须能够实现整个页面
    20% 的空间节省——否则，该页面将只应用行压缩。这意味着，在已启用页面压缩的表上，一些页面可能只应用了行压缩，而另一些则应用了完整的页面压缩。这由 SQL
    Server 内部管理，用户无法更改。


    ```

    索引页仅在叶子级别接收页面压缩。在根级别和中间级别，它们将只进行行压缩。

    ```'
  raw: 'When you look at the contents of a regular data page compared to a compressed
    data page, you can see that the contents are wildly different. So different that
    you might wonder between SQL Server 2005 and SQL Server 2008, where compression
    was first introduced, how Microsoft developers had time to make the Relational
    Engine read from two different sets of pages. The answer is they didn’t.


    When page or row compression is turned on, the data is stored on disk in a compressed
    format, and it is read into memory in a compressed format. However, when it is
    read out from memory from the buffer pool before the access methods return the
    data to the relational engine, the compressed data is rewritten in an uncompressed
    format. The uncompressed pages are not stored in memory. The pages are translated
    at the cost of CPU operations. To examine this more closely, take a look at Figure
    14-12 to see how a select operation works in SQL Server against a compressed table.


    ***Figure 14-12.** Data is compressed on disk and read into memory in the Pool
    compressed; only when it leaves* *the Storage Engine for the Relational Engine
    is it uncompressed.*


    chapter 14 ■ page and row compression


    When a query initially comes from the user, it connects through the SQL Network
    Interface (SNI), which translates the data to a Tabular Data Stream protocol that
    is proprietary to Microsoft. The query then reaches the Command Parser. You have
    interacted with the Command Parser if you’ve ever received an error on a query
    where the syntax is not correct. SQL Server checks to see if the query has a cached
    plan so that it can skip optimization; in our case, it does not, and the query
    is handed to the optimizer. After a plan is created for retrieving the data, the
    query goes to the Query Executor. The Query Executor asks the access methods for
    a copy of the data needed to satisfy the query and hands it the direction to go
    to find the data. The access methods ask for the required pages from the buffer
    manager, which checks the data cache to see if the pages are there. The pages
    for our query are not, so the buffer manager retrieves them from disk, in a compressed
    format, and reads them into memory in the data cache in a compressed format. The
    buffer manager then gives the required pages to the access methods. The access
    methods translate page-compressed pages to an uncompressed format. Row-compressed
    pages are uncompressed by a “landing pad” in the Relational Engine block of code
    before being handed back to the Query Executor.


    The Query Executor sends the data back through the SNI, which translates it for
    the client.


    This is an oversimplification of the process. Weeks and months of courses are
    taught on the specific internal components of the Relational and Storage engines.
    The important information here is data is compressed on *disk* and in *memory*.
    So you receive space-savings benefits in both locations.


    The amount of CPU overhead is directly related to the level of compression you
    use and the type of load on your server. If you have a CPU-bound server with average
    sustained CPU usage around 60 percent or higher, you might not want to use compression,
    at least not on volatile tables that have a lot of inserts and updates.


    n **Tip** Page compression is a very interesting feature. Every page in a page-compressed
    table or index automatically receives row compression, but for column prefix or
    page dictionary compression to be applied, either or both must be able to accomplish
    20 percent space savings across the page—otherwise, the page will receive only
    row compression. This means on a table that has had page compression applied,
    some pages could be only row-compressed while others are page-compressed. This
    is internally managed by SQL Server and is not something that can be changed by
    the user.


    Index pages receive page compression only at the Leaf level. At the Root and Intermediate
    levels, they will be only row compressed.'
  trans: '## SQL Server 页面与行压缩机制详解


    当你查看常规数据页的内容与压缩数据页的内容时，会发现两者差异巨大。你可能会好奇，从首次引入压缩的 SQL Server 2005 到 SQL Server
    2008，微软的开发人员是如何让关系引擎能同时读取两套不同页面的。答案是，他们并没有这样做。


    当启用页面或行压缩时，数据以压缩格式存储在磁盘上，并以压缩格式读入内存。然而，当数据在访问方法将其返回给关系引擎之前，从内存的缓冲池中被读取时，压缩数据会被重写为未压缩的格式。这些未压缩的页面并不存储在内存中。页面的转换是以
    CPU 操作为代价完成的。为了更仔细地研究这一点，请查看图 14-12，了解 SQL Server 中针对压缩表执行 `select` 操作的工作流程。


    `Figure 14-12` 数据在磁盘上被压缩，并以压缩形式读入池中的内存；只有当它离开存储引擎前往关系引擎时才会被解压缩。


    ### 第 14 章 页面和行压缩


    当查询最初从用户端发出时，它会通过 SQL 网络接口连接，该接口将数据转换为微软专有的表格数据流协议。随后，查询到达命令解析器。如果你曾因查询语法不正确而收到错误信息，那么你就已经与命令解析器有过交互了。SQL
    Server 会检查该查询是否存在缓存计划，以便跳过优化步骤；在我们的例子中，没有缓存计划，因此查询被移交给优化器。在为检索数据创建好执行计划后，查询进入查询执行器。查询执行器向访问方法请求满足查询所需的数据副本，并指示其查找数据的位置。访问方法向缓冲区管理器请求所需的页面，缓冲区管理器会检查数据缓存以确认这些页面是否存在。对于我们的查询，页面不在缓存中，因此缓冲区管理器以压缩格式从磁盘检索它们，并以压缩格式将它们读入数据缓存的内存中。接着，缓冲区管理器将所需的页面交给访问方法。访问方法将经过页面压缩的页面转换为未压缩格式。经过行压缩的页面则在关系引擎的代码块中，通过一个“着陆垫”进行解压缩，然后再返回给查询执行器。


    查询执行器将数据通过 `SNI` 发回，`SNI` 会为客户端翻译数据。


    这是对整个过程的过度简化。关于关系引擎和存储引擎的特定内部组件，需要花费数周乃至数月的时间来学习。这里的关键信息是：数据在*磁盘*和*内存*中都是压缩的。因此，你在这两个位置都能获得节省空间的益处。


    CPU 开销的多少与你选择的压缩级别以及服务器上的负载类型直接相关。如果你的服务器是 CPU 密集型的，平均持续 CPU 使用率在 60% 或更高，你可能不想使用压缩，至少不要在包含大量插入和更新操作的易失性表上使用。


    > **提示** (`Tip`) 页面压缩是一个非常有趣的功能。在已启用页面压缩的表或索引中，每个页面会自动应用行压缩。但是，要应用列前缀或页面字典压缩，必须能够实现整个页面
    20% 的空间节省——否则，该页面将只应用行压缩。这意味着，在已启用页面压缩的表上，一些页面可能只应用了行压缩，而另一些则应用了完整的页面压缩。这由 SQL
    Server 内部管理，用户无法更改。


    ```

    索引页仅在叶子级别接收页面压缩。在根级别和中间级别，它们将只进行行压缩。

    ```'
- fmt: 'When page compression is enabled, new data is inserted only in a row-compressed
    format. When a page fills to the point that a page split occurs in a clustered
    index, the page-compression calculation fires off.


    In a heap, new data is always inserted in a row-compressed format even if 20 percent
    space savings can be achieved. The only way to get page compression to fully apply
    to a heap is to rebuild the heap.


    ## What Do You Compress?


    Now that you have a better understanding of compression and how it works with
    your data, you can start to look at your data to figure out what you should and
    should not compress. The factors that will play the largest part in your compression
    decision are table size, allocation units, and scan and update patterns on your
    tables.


    You want to get the biggest bang for your buck, and I understand that. When you
    go to your boss and say, “We can save X amount of space using SQL Server compression,”
    you want to say it proudly. So the first thing you want to know is this: what
    are the largest tables in our database? There are multiple ways to get your table
    space usage in SSMS: you can right-click on your database, select reports, and
    select Disk Usage by Table. You could also use DMV `sys.dm_db_partition_stats`.
    It would take a little finesse to get the same output, but the data is there.
    Normally, to get that I like to run a script I have that uses the undocumented
    `sp_MSforeachtable` and that inserts the data from `sp_spaceused` into a table
    variable and returns a list of tables and their sizes.


    The command `sp_MSforeachtable` is a function that does a cursor loop through
    all user tables in a user database, and all tables in a system database. The command
    `sp_spaceused` is a documented function that gives you the table name, rows, reserved
    space, data space, index size, and unused space per table.


    ```sql

    DECLARE @myTable AS TABLE(

    [Name] varchar(1000)

    ,[Rows] int

    ,[Reserved] varchar(500)

    ,[Data] varchar(500)

    ,[Index_Size] varchar(500)

    ,[Unused] varchar(500)

    );


    INSERT INTO @myTable

    EXEC (''sp_msforeachtable @command1="sp_spaceused [?]"'');


    SELECT

    NAME

    ,ROWS

    ,RESERVED

    ,(cast(LEFT([reserved],(LEN([reserved])-3)) as int)/1024) as ReservedMB

    ,((cast(LEFT([reserved],(LEN([reserved])-3)) as int)/1024)/1024) as ReservedGB

    ,DATA

    ,INDEX_SIZE

    ,UNUSED

    FROM

    @myTable

    ORDER BY

    (cast(LEFT([reserved],(LEN([reserved])-3)) as int)/1024) DESC;

    GO

    ```


    Now that you know what the largest tables are, you need to know what kind of allocation
    units they are made up of. SQL Server has three types of allocation units: `IN_ROW_DATA`,
    `ROW_OVERFLOW_DATA`, and `LOB_DATA`.


    Allocation units are responsible for tracking how many pages have been allocated
    and what types of pages have been allocated for a particular table. The data type
    you select to use in your table determines the type of allocation units SQL Server
    uses. See `Table 14-1` for a list of which data types are associated with which
    types of allocation units.


    The only allocations units that can be compressed are data types that use only
    `IN_ROW_DATA` pages.


    Luckily, as long as you’re not using Large Object (`LOB`) types such as `Text`,
    `Image`, `XML`, or any of the `MAX` types—`VARCHAR(MAX)`, `BINARY(MAX)`, `NVARCHAR(MAX)`—the
    data will be on `IN_ROW_PAGES`. If your data record contains less than 8,000 bytes
    of data, you can have `LOB` data types on `IN_ROW_DATA` pages. In those cases,
    row compression doesn’t give you space savings, because you have variable-length
    columns and that do not waste extra unused space. Page compression might save
    you space if the binary data matches the criteria I previously covered with regard
    to meeting page-compression requirements for being applied to a page. As long
    as the data can exist on `IN_ROW_DATA` pages, it can be compressed. In a moment,
    I’ll validate this statement with an example, but first let’s continue on with
    allocation units.


    `Table 14-1`. Types of allocation units and their data types. Remember, only `IN_ROW_DATA`
    can be compressed.'
