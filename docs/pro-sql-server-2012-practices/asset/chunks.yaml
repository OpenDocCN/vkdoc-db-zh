    challenging. So what happens is that as requirements are discovered late in the
    process, the database is morphed to meet new requirements. This can leave the
    database in a state that is hard to use and generally difficult to optimize because,
    most of the time, the requirements you miss will be the obscure kind that people
    don’t think of immediately but that are super-important when they crop up in use.
    The SQL Server engine has patterns of use that work best, and well-designed databases
    fit the requirements of the user to the requirements of the engine.


    As I mentioned in the opening section of this chapter, you might not be the person
    gathering requirements, but you will certainly be affected by them. Very often
    (even as a production DBA who does no programming), you might be called on to
    give opinions on a database. The problem almost always is that if you don’t know
    the requirements, almost any database can appear to be correct. If the requirements
    are too loose, your code might have to optimize for a ridiculously wide array
    of situations that might not even be physically possible. If the requirements
    are too strict, the software might not even work.


    Going back to the chemical plant example, suppose that my consulting firm had
    completed our part of the project, we had been paid, and the programmers had packed
    up to spend our bonuses at Disney World and the software could not be changed.
    What then? The user would then find some combination of data that is illogical
    to the system, but tricks the system into working. For example, they might enter
    a quality rating of 10,000 + the actual rating. This is greater than 100, so the
    product can ship. But now every usage of the data has to take into consideration
    that 10,000 and greater actually means that the value was the stored value minus
    10,000 that the customer has accepted, and values under 100 are failed products
    that the user did not accept. In the next section, I’ll discuss normalization,
    but for now take my word for it that designing a column that holds multiple values
    and/or multiple meanings is not a practice that you would call good, making it
    more and more difficult to achieve adequate performance.


    As a final note about requirements, requirements should be written in such a way
    that they are implementation non-specific. Stating that “We need to have a table
    to store product names and product quality scores” can reduce the quality of the
    software because it is hard to discern actual requirements from poorly written
    prose. This statement could mean, “Products have names, and each batch of that
    product has a quality score” or “Each batch will have a different name and a quality
    score.” As you build 19


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance your tables,
    your goal will be to match your design to the version that is correct. Sure the
    first makes sense, but business doesn’t always make sense.


    n **Note** In this short chapter on design and the effect on performance, I am
    going to assume you are acclimated to the terminology of the relational database
    and understand the basics. I also will not spend too much time on the overall
    process of design, but you should spend time between getting requirements and
    writing code visualizing the output, likely with a data-modeling tool. For more
    information on the overall process of database design, might I shamelessly suggest
    *Pro SQL Server 2012 Relational Database Design and Implementation* (Apress, 2012)?
    My goal for the rest of this chapter will be to cover the important parts of design
    that can negatively affect your performance of (as well as your happiness when
    dealing with) your SQL Server databases.


    Table Structure


    The engineers who work for Microsoft on the SQL Server team are amazing. They
    have built a product that, in each successive version, continues to improve and
    attempt to take whatever set of structures is thrown at them, any code that a
    person of any skill level throws at it, and make the code work well. Yet for all
    of their hard work, the fact remains that the heart of SQL Server is a relational
    database engine and you can get a lot more value by using the engine following
    good relational practices. In this section, I will discuss what goes into making
    a database “relational,” and how you can improve your data quality and database
    performance by just following the relational pattern as closely as possible.


    To this end, I will cover the following topics:


    •


    **A Really Quick Taste of History** Knowing why relational databases are what
    they are can help to make it clear why SQL Server is built the way it is and why
    you need to structuring your databases that way too.


    •


    **Why a Normal Database Is Better Than an Extraordinary One** Normalization is
    the process of making a database work well with the relational engine. I will
    describe normalization and how to achieve it in a practical manner.


    •


    **Physical Model Choices** There are variations on the physical structure of a
    database that can have distinct implications for your performance.'
