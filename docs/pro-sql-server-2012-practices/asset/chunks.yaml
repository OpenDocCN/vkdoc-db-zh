    `AuthorFirstName` 和 `AuthorLastName`——即两个列，一个包含“Louis, Jessica”，另一个包含“Davidson,
    Moss”。关于作者的其他信息呢？当用户使用“&”而不是“,”时会发生什么？嗯，这些是你在进行设计时，而不是在代码编写之后，应该思考的问题。


    如果你为名字设置了多个列，使用逗号分隔的解决方案可能看起来不合逻辑，因此用户经常会想出其他巧妙的解决方案。如果你输入一本 ISBN 号为 `444444444`
    的书，表格如下所示（这个集合的键是 `BookISBN` 列）：


    | 书籍 ISBN   | 书名       | 出版社   | 作者名      | 作者姓   |

    |------------|------------|----------|-------------|----------|

    | 444444444  | 数据库设计 | Apress   | Jessica     | Moss     |


    这很好，但现在用户需要添加另一位作者，而`她的`经理要求让它能工作。所以，作为一个聪明的人类，用户必须想办法让它工作。逗号分隔的解决方案感觉很奇怪，而且绝对“不正确”：


    | 书籍 ISBN   | 书名       | 出版社   | 作者名           | 作者姓           |

    |------------|------------|----------|------------------|------------------|

    | 444444444  | 数据库设计 | Apress   | Jessica, Louis   | Moss, Davidson   |


    于是用户决定添加另一行，并只是重复 ISBN 号。唯一性约束不会让她这样做，所以瞧！用户稍微修改了 ISBN 号来添加行：


    | 书籍 ISBN      | 书名       | 出版社   | 作者     |

    |---------------|------------|----------|----------|

    | 444444444     | 数据库设计 | Apress   | Jessica  |

    | 444444444-1   | 数据库设计 | Apress   | Louis    |


    你可能会认为这是解雇用户的理由，但事实是，她只是在做她的工作。在系统能够处理这种情况之前，你的代码在谈论书籍时必须将这两行视为一行，而在处理作者时则视为两行。这意味着在处理子字符串的
    `BookISBN` 值或可能包含第一个或第二个值的外键值时需要对行进行分组。而混乱就从那里开始增长。对于表结构来说，数据看起来没问题，所以在这个设计中，你无法阻止这种情况的发生。（也许
    ISBN 的格式本可以强制执行，但用户可能的下一个替代解决方案可能更糟）。


    用以下两个表来设计这个书籍和作者解决方案会更好。在第二个表（命名为 `BookAuthor`）中，`BookISBN` 是第一个表（命名为 `Book`）的外键，`BookAuthor`
    的键是 `BookISBN` 和 `AuthorName`。这个解决方案如下所示：


    **Book 表**

    | 书籍 ISBN   | 书名          | 出版社     |

    |------------|---------------|------------|

    | 111111111  | 规范化        | Apress     |

    | 222222222  | T-SQL         | Apress     |

    | 333333333  | 索引          | Microsoft  |

    | 444444444  | 数据库设计    | Apress     |


    **BookAuthor 表**

    | 书籍 ISBN   | 作者名   | 贡献类型         |

    |------------|----------|------------------|

    | 111111111  | Louis    | 主要作者         |

    | 222222222  | Michael  | 主要作者         |

    | 333333333  | Kim      | 主要作者         |

    | 444444444  | Louis    | 主要作者         |

    | 444444444  | Jessica  | 贡献者           |


    还要注意，添加关于作者对书籍贡献的更多数据是一个非常自然的过程，只需添加一列即可。在单表解决方案中，识别作者的贡献将是一场噩梦。此外，如果你想添加版税百分比或其他关于书籍作者的信息，同样是一个简单的过程。你还应该注意到，很容易添加一个作者表并扩展关于作者的信息。在例子中，即使
    Louis 写了例子中的两本书，你也不希望重复他的数据两次。


    ### 表/行唯一性'
- fmt: "# Chapter 2 - Getting it Right: Designing the Database for Performance\n\n\
    *One row represents one independent thing, and that thing isn’t represented anywhere\
    \ else.*\n\nThe first normal form tells you that rows need to be unique. This\
    \ is a very important point, but it needs to be more than a simple mechanical\
    \ choice. Just having a uniqueness constraint with a meaningless value technically\
    \ makes the data unique. As an example of how generated values lead to confusion,\
    \ consider the following subset of a table that lists school mascots. (The primary\
    \ key is on `MascotId`.)\n\n| MascotId | Name   |\n|----------|--------|\n| 1\
    \        | Smokey |\n| 112      | Bear   |\n| 4567     | Bear   |\n| 9757    \
    \ | Bear   |\n\nThe rows are technically unique, because the `ID` values are different.\
    \ If those `ID` numbers represent a number that the user uses to identify rows\
    \ in all cases, this might be a fine table design. However, in the far more likely\
    \ case where `MascotId` is just a number generated when the row is created and\
    \ has no actual meaning, this data is a disaster waiting to occur. The first user\
    \ will use `MascotId` 9757, the next user might use 4567, and the user after that\
    \ might use 112. There is no real way to tell the rows apart. And although the\
    \ Internet seems to tell me that the mascot name “Smokey” is used only by the\
    \ University of Tennessee, the bear is a common mascot used not only by my high\
    \ school but by many other schools as well.\n\nIdeally, the table will contain\
    \ a natural key (or a key based on columns that have a relationship to the meaning\
    \ of the table of data being modeled instead of an artificial key that has no\
    \ relationship to the same). In this case, the combination of `SchoolName` and\
    \ the mascot `Name` probably will suffice:\n\n| MascotId | Name   | SchoolName\
    \            |\n|----------|--------|-----------------------|\n| 1        | Smokey\
    \ | University of Tennessee |\n| 112      | Bear   | Bradley High School   |\n\
    | 4567     | Bear   | Baylor University     |\n| 979796   | Bear   | Washington\
    \ University |\n\nYou might also think that the `SchoolName` value is unique in\
    \ and of itself, but many schools have more than one mascot. Because of this,\
    \ you may need multiple rows for each `SchoolName`. It is important to understand\
    \ what you are modeling and make sure it matches what your key is representing.\n\
    \n`Note` Key choice can be a contentious discussion, and it’s also is a very important\
    \ part of any design. The essential part of any design is that you can tell one\
    \ row from another in a manner that makes sense to the users of the system. `SQL\
    \ Server` physical considerations include what column is used to cluster the table\
    \ (or physically order the internal structures), what columns are frequently used\
    \ to fetch data based on user usage, and so forth. The physical considerations\
    \ should be secondary to making sure the data is correct.\n\nWhy is uniqueness\
    \ so important to performance? When users can do a search and know that they have\
    \ the one unique item that meets their needs, their job will be much easier. When\
    \ duplicated data goes unchecked in the database design and user interface, all\
    \ additional usage has to deal with the fact that where the user expects one row,\
    \ he might get back more than one.\n\nOne additional uniqueness consideration\
    \ is that a row represents one unique thing. When you look at the columns in your\
    \ tables, does this column represent something independent of what the table is\
    \ named and means? In the following table that represents a customer, check each\
    \ column:\n\n| CustomerId   | Name            | Payment1 | Payment2 | Payment3\
    \ |\n|--------------|-----------------|----------|----------|----------|\n| 0000002323\
    \   | Joe's Fish Market | 100.03   | 120.23   | NULL     |\n| 0000230003   | Fred's\
    \ Cat Shop | 200.23   | NULL     | NULL     |\n\n`CustomerId` and `Name` clearly\
    \ are customer related, but the `Payment` columns are completely different things\
    \ than customers. So now two different sorts of objects are related to one another.\
    \ This is important because it becomes difficult to add a new payment type object.\
    \ How do you know what the difference is between `Payment1`, `Payment2`, and `Payment3`?\
    \ And what if there turns out to be a fourth payment? To add the next payment\
    \ for Fred’s Cat Shop, you might use some `SQL` code along these lines:\n\n```sql\n\
    UPDATE dbo.Customer\nSET Payment1 = CASE WHEN Payment1 IS NULL THEN 1000.00 ELSE\
    \ Payment1 END,\n    Payment2 = CASE WHEN Payment1 IS NOT NULL AND Payment2 IS\
    \ NULL\n                    THEN 1000.00 ELSE Payment2 END,\n    Payment3 = CASE\
    \ WHEN Payment1 IS NOT NULL\n                    AND Payment2 IS NOT NULL\n  \
    \                  AND Payment3 IS NULL\n                    THEN 1000.00 ELSE\
    \ Payment3 END\nWHERE CustomerId = '0000230003';\n```\n\nIf payments were implemented\
    \ as their own table, the table might look like this:\n\n| CustomerId   | PaymentNumber\
    \ | Amount | Date       |\n|--------------|---------------|--------|------------|\n\
    | 0000002323   | 1             | 120.23 | 2012-10-15 |\n| 0000002323   | 2   \
    \          | 100.03 | 2012-11-12 |\n| 0000230003   | 1             | 200.23 |\
    \ 2012-08-13 |\n\nAdding a new payment would be as simple as adding another row,\
    \ and adding metadata about the payment is as easy as adding a single column.\
    \ Although the payments example is probably a bit unrealistic and certainly a\
    \ case where most anyone would see the need for multiple rows, there are many\
    \ cases where designers think that just using columns is the best answer. A system\
    \ I am working with right now has email addresses stored as `emailAddress1`, `emailAddress2`,\
    \ and `emailAddress3`. The `emailAddress1` value is used straightforwardly as\
    \ the primary email address, but the values in `emailAddress2` and `emailAddress3`\
    \ are used either as previous email addresses or alternate email addresses. And\
    \ without adding 10 to 20 new columns of metadata (one set for each email address),\
    \ it will be nearly impossible to reign in usage and know what all the values\
    \ mean.\n\nKeep in mind that even if all of the payment entries are done manually\
    \ through the UI, even things like counting the number of payments tends to be\
    \ a difficult task. How many payments has Fred made?\n\nYou could do something\
    \ like this:\n\n```sql\nSELECT CASE WHEN Payment1 IS NOT NULL THEN 1 ELSE 0 END\
    \ +\n       CASE WHEN Payment2 IS NOT NULL THEN 1 ELSE 0 END +\n       CASE WHEN\
    \ Payment3 IS NOT NULL THEN 1 ELSE 0 END AS PaymentCount\nFROM dbo.Customer\n\
    WHERE CustomerId = 0000230003;\n```\n\nWhen you do it that way and you have to\
    \ start doing this work for multiple accounts simultaneously, it gets complicated.\
    \ In many cases, the easiest way to deal with this condition is to normalize the\
    \ set, probably through a view:\n\n```sql\nCREATE VIEW dbo.CustomerPayment\nAS\n\
    SELECT CustomerId, 1 AS PaymentNumber, Payment1 AS PaymentAmount\nFROM dbo.Customer\n\
    WHERE Payment1 IS NOT NULL\nUNION ALL\nSELECT CustomerId, 2 AS PaymentNumber,\
    \ Payment2 AS PaymentAmount\nFROM dbo.Customer\nWHERE Payment2 IS NOT NULL\nUNION\
    \ ALL\nSELECT CustomerId, 3 AS PaymentNumber, Payment3 AS PaymentAmount\nFROM\
    \ dbo.Customer\nWHERE Payment3 IS NOT NULL\n```\n\nNow you can do all of your\
    \ queries just as if the table was properly structured, although it’s not going\
    \ to perform nearly as well as if the table was designed correctly:\n\n```sql\n\
    SELECT CustomerId, COUNT(*)\nFROM dbo.CustomerPayment\nGROUP BY CustomerId\n```\n\
    \nNow you just use the columns of the customer objects that are unique to the\
    \ customer, and these rows are unique for each customer payment.\n\n## Columns\
    \ depend only on an entire key\n\n*Columns either are part of a key or describe\
    \ something about the row identified by the key.*"
