    reads 30, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.


    Table ''FactInternetSales''. Scan count 1, logical reads 10, physical reads 2,
    read-ahead reads 8,


    lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.


    Table ''DimProduct''. Scan count 0, logical reads 2, physical reads 2, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.


    It did help—a little. The total physical reads counter decreased from 3 to 2,
    but the logical reads (memory) decreased from 17 to 10\. In this case, it had
    a minor impact on phsyical I/O but a more noticeable impact on memory I/O.


    Additional resources for SET STATISTICS IO ON [can be found at http://msdn.microsoft.com/en-us/](http://msdn.microsoft.com/en-us/)


    library/ms184361.aspx. If you aren’t familiar with this option, I recommend reading
    up on it and adding it


    [to your tool box. More information on read-ahead reads can be found at http://msdn.microsoft.com/en-](http://msdn.microsoft.com/en-us/library/ms191475.aspx)


    [us/library/ms191475.aspx.](http://msdn.microsoft.com/en-us/library/ms191475.aspx)


    With the simple statement SET STATISTICS IO ON, a very valuable set of data can
    be obtained about how SQL Server is trying to access your data and that statement
    will also point you to which object to focus on in a specific query.


    Environmental Considerations


    Earlier in this chapter, I mentioned a number of variables that come into play
    and will vary widely, even in your own environment. This portion of the chapter
    will cover the more common variables at a high level.


    Depending on the version of the operating system and SQL Server, granting access
    to “Lock Pages in Memory” for the SQL Server service account will prevent the
    operating system from paging data in SQL


    Server’s Buffer Pool. This can have a marked impact in your environment. In my
    experience, I’ve seen this most often with virtualized SQL Server instances.


    chapter 13 ■ I/O: the UntOld StOry


    Another setting that can improve I/O throughput is “Perform volume maintenance
    tasks.” This permission allows the SQL Server process to instantly initialize
    files, which at start-up will decrease the time it takes to create TempDB. It
    also helps during incremental data-file growths or when new databases are being
    created. Note that this setting does not have an impact on transaction logs—only
    data files qualify for instant (zero fill) initialization.


    I’ve discussed SANs at length in this chapter and, although the technology is
    continually changing, there are a couple of primary considerations to be aware
    of. The first is how the cache is configured on the controller. Typically, SANs
    contain memory, which is often backed up by battery power and enables that memory
    to be used as a write store. In this manner, your transactions won’t have to wait
    for the data to actually be persisted to disk. Instead, the data makes its way
    through the server, the host bus adapter (HBA), and then the controller. Depending
    on the specific SAN vendor, controller, and configuration, it’s likely that your
    data is only written to memory and then later flushed to physical spindles. What’s
    important here is how the memory is configured in your environment. Many vendors
    have an auto-balance of sorts, but for traditional database workloads the primary
    usage of cache is best used in a high-write configuration. For instance, if your
    controller has 1 GB of memory, it’s preferred, from a database workload, that
    the majority of that cache be allocated to writes rather than reads. After all,
    your database server has memory for read cache, but it does not contain write
    cache.


    Another closely related setting to this is the queue depth on your HBA card. This
    is the piece of hardware that enables the server to connect to your SAN. The recommendations
    for configuring the HBA card vary and are based on your specific card, SAN, server,
    and workload. It’s worth noting, though, that increasing the queue depth can improve
    performance. As with anything of this nature, ensuring that you test your specific
    environment is critical. The good news, at this point, is that you have known
    IOP'
