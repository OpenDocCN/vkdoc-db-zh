    为专业人士打造的专业书籍®


    Ball, 等.


    相关书籍


    `Pro SQL Server 2012 Practices`


    通过《`Pro SQL Server 2012 Practices`》，成为一名顶尖的数据库管理员（`DBA`）或数据库程序员。在一群资深 `DBA` 的指导下，你将学会如何掌控、规划和监控性能；在问题出现时进行有效排查；并全面掌控你的
    `SQL Server` 环境。


    每章解决一个特定问题、技术或功能集，并为你提供经过验证的技术和最佳实践。你将学会如何：


    *   为 `SQL Server 2012` 选择并规划服务器规模

    *   迁移到新的 `Extended Events` 框架

    *   自动跟踪关键性能指标

    *   管理从开发到生产的分阶段发布

    *   将性能设计融入你的应用程序

    *   分析 `I/O` 模式并诊断资源问题

    *   使用可用性组进行备份和还原


    别让你的数据库反过来管理你！请转向 `Pro SQL Server 2012 Practices`，学习你需要的知识和技能，从而充分发挥微软旗舰数据库系统的潜力。


    归类于

    数据库 / `MS SQL Server`


