    ## 数据库镜像


    重新上线后，可以将辅助数据库备份并还原到主数据库。需要重新配置并启动日志传送，以便为下一次故障转移做好准备。


    数据库镜像常常与日志传送混淆（我至今仍不明白原因），但它确实与日志传送毫无共同之处。使用镜像意味着回到在事务级别应用更改的方式；然而，与复制不同的是，事务被批量打包并尽快应用，且不使用分发服务器。对于镜像，只有一个主体服务器，并且只能有一个镜像服务器。还可以使用一个可选的见证服务器来验证与主体和镜像的通信。


    如果你想在你的环境中实现某种类型的数据复制——并且你有一个闪亮的、新安装的 `SQL Server 2012`——我不建议设置数据库镜像。此功能已被弃用，最终将在产品的未来版本中不可用。升级方法是转换镜像配置为
    `AlwaysOn` 可用性组。


    如果你目前需要在将要升级到 `2012` 的 `SQL Server 2008` 或 `2008 R2` 版本中支持镜像，那么保留镜像配置没有问题。请记住，当一项技术被弃用时，你有一个宽限期来进行更改和规划替代方案。但有这个宽限期并不意味着你应该继续在新系统中鼓励使用已弃用的功能！


    镜像最重要的特性是，当与主数据库的通信丢失或中断时，能够轻松进行故障转移。此外，通过数据“安全性”选项，你可以控制故障转移时潜在的数据丢失量。以下是两种选项：280


    第 11 章 ■ SQL Server 数据移动的流体动力学


    高性能模式 (`异步`) 事务被打包并随着传入而在镜像上应用。故障转移时，有可能某些事务尚未在镜像上应用。此选项仅在 `Enterprise` 版本中可用。


    高安全模式 (`同步`) 事务在提交到主服务器之前先应用到镜像。这确保了故障转移时不会丢失数据。使用同步模式时可能会产生延迟。在高安全模式下，如果配置了见证服务器，还可以实现自动故障转移。


    镜像的优势包括以下几点：


    -  传递事务时进行压缩。

    -  整个数据库被镜像。

    -  支持自动故障转移。

    -  故障转移时，主体和镜像的角色会互换。

    -  同步镜像不会发生数据丢失。

    -  可能早期检测到数据库中的损坏。


    这次的局限性列表相当长：


    -  镜像要求 `FULL` 恢复模型。

    -  镜像副本不在线，在故障转移前不能使用。

    -  不支持数据分区或筛选。

    -  镜像需要传输控制协议 (`TCP`) 端点进行通信。

    -  镜像不能支持跨数据库事务或分布式事务。

    -  你不能镜像任何系统数据库（例如，`master`、`msdb`、`tempdb` 或 `model`）。

    -  镜像的异步选项仅在 `Enterprise` 版本中可用。

    -  在发生故障转移时，你可能需要手动设置应用程序使用镜像。


    以下是在本章迄今为止考虑的四种场景中，你如何从镜像中受益：


    场景 1：全球性组织 在这里使用镜像无法在分配用户负载方面提供好处，因为镜像更适用于 `HA/DR` 场景。由于在故障转移前镜像数据库不可用，因此任何时候只有主体在使用中。


    场景 2：高容量报告需求 与场景 1 非常相似，镜像

