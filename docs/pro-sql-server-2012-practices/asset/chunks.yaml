    ## 第 5 章 ■ 从 SQL 跟踪到扩展事件


    **作者：姆拉登·普拉伊迪奇**


    在本章中，我们将了解 SQL Server 2012 中当前存在的跟踪和诊断基础设施。


    我们将涵盖三个领域：`SQL 跟踪`、`事件通知`和`扩展事件`。`SQL 跟踪`是三者中最古老的，并且在 SQL Server 2012 中已被列入弃用功能清单。这意味着它将在未来的
    `SQL Server` 版本中被移除。未来版本通常意味着当前版本 + 2。


    因此，我假设您在本章中已熟悉 `SQL 跟踪器` 的术语和基本用法。`事件通知`是在 SQL Server 2005 中引入的，它是基于 `SQL Server
    Service Broker` 的异步事件系统。发送的事件可以是数据库作用域或服务器作用域的。`扩展事件`是在 SQL Server 2008 中引入的，它是完全构建在
    `SQLOS` 内部的全新诊断和跟踪基础设施。


    ### SQL 跟踪


    `SQL 跟踪`基础设施由 2 部分组成：服务器端和客户端。服务器端是构建在 `SQL Server` 中的整个跟踪基础设施：实际控制跟踪功能的扩展存储过程，以及收集跟踪事件数据的
    `SQL Server` 代码中的跟踪点。在 SQL Server 2005 中，我们引入了 `SQLOS`（SQL 操作系统），它是处理内存管理、IO 访问、CPU
    调度、锁定、异常处理等的 `SQL Server` 组件。由于 `SQLOS` 有一个 `SQL Server` 其他组件所使用的 `API`，`SQL 跟踪`构建在
    `SQLOS` 之上并使用此 `API`。客户端包括用于创建和分析跟踪的 `SQL Server 跟踪器`工具，以及提供与 `SQL Server 跟踪器`相同功能但允许您自动化整个收集/分析/存储过程的
    `.NET` 对象模型（这在持续监控中通常存在）。图 5-1 展示了 `SQL 跟踪` 架构的概览。


    **图 5-1.** SQL 跟踪基础设施：事件触发，发送到跟踪，在那里进行筛选，然后发送到目标提供程序（文件或行集）


    大约有 180 个跟踪事件（具体数量取决于您使用的 `SQL Server` 版本）和 66 个包含各种跟踪数据的列。还有 10 个用户可配置事件，您可以在
    T-SQL 代码中指定它们，它们像任何其他跟踪事件一样被收集。它们被命名为 `UserConfigurable:0` 到 `UserConfigurable:9`，并通过
    `sp_trace_generateevent` 存储过程触发。


    由于它需要 `ALTER TRACE` 权限，我们必须将此权限授予执行该存储过程的任何帐户。`sp_trace_generateevent` 存储过程的调用方式如下：


    ```

    DECLARE @msg NVARCHAR(128);

    SELECT @msg = N''Message that will be displayed in the SQL Trace or SQL Profiler'';

    -- user configurable events have ID''s from 82 (UserConfigurable:0) to 91

    (UserConfigurable:9)

    ```

