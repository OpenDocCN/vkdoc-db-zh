    # 第 12 章 - 面向数据库管理员的 Windows Azure SQL Database


    ## 报表


    此外，不支持自定义程序集；实际上，您无法访问运行此服务的服务器，因此您的报表不能使用自定义扩展。还存在其他限制，请务必查阅 `MSDN` 以获取完整的限制列表。


    通过 Windows Azure 管理门户，您可以直接从左侧栏选择“报表”来访问 SQL 报表门户，如图 12-8 所示。系统会显示一个包含可用选项的菜单，提供对用户管理屏幕、在
    `Visual Studio 2008 Reporting Services` 中创建的报表、执行日志和用法统计信息的访问。报表通过 `HTTPS` 访问，因此报表上显示的数据在网络上经过加密，以提供更强的安全性。请注意，目前需要创建一个单独的管理员帐户来管理
    SQL 报表门户中的报表。


    ***图 12-8.** Windows Azure SQL 报表管理门户。*


    ![Image 154](img/index-316_1.png)


    ## Windows Azure SQL 数据同步


    由于许多公司需要在本地数据库与 SQL Database 之间，甚至在 SQL Database 实例之间同步数据，Windows Azure 提供了一项名为
    Windows Azure SQL 数据同步（简称 SQL 数据同步）的数据同步服务。此服务提供基于计划的、在多个数据库之间的数据同步功能，并在设计时充分考虑了高弹性。


    使用 SQL 数据同步时，您首先创建一个 `同步组`，向其中添加多个本地和云端数据库。在任何给定的 `同步组` 中，本地 SQL Server 数据库是可选的；然而，一个
    `同步组` 必须至少包含一个 `SQL Database` 实例作为中心。由于 SQL 数据同步采用中心辐射型架构，中心充当核心数据库，所有来自各个成员数据库的数据更改都会复制到此中心，然后成功的更改再复制回相关的成员数据库。每个
    `同步组` 定义自己的冲突解决策略：中心优先或客户端优先。（`客户端` 是用于指代成员数据库的另一个术语。）通常，您根据中心数据库相对于组内其他数据库的位置来选择它，以最小化数据传输成本并优化性能。


    在配置包含本地 SQL Server 数据库的 `同步组` 时，必须在数据库服务器上安装和配置一个客户端代理来管理数据同步。一旦客户端代理安装并正确配置后，您将在
    Windows Azure 管理门户中看到它已添加到 `同步组` 中。


    同步错误清晰可见；可以直接通过门户点击“日志查看器”按钮来查看操作日志文件。您还可以随时强制进行同步。图 12-9 显示了一次失败的同步。


    ***图 12-9.** Windows Azure SQL 数据同步管理门户。*


    SQL 数据同步也有一些值得注意的限制。也许此功能最重要的限制是数据复制不具备事务一致性。另外，请记住，要同步两个数据库，必须首先完成一次完全同步。根据数据库的位置和要同步的数据量，首次同步操作可能需要一些时间。最后，在
    `同步组` 创建后，某些属性无法更改；例如，一旦 `同步组` 创建，您就无法更改中心。


    ![Image 155](img/index-317_1.png)


    ## 导入/导出功能


    SQL Database 还附带一个有趣的功能，称为导入/导出。它旨在将数据库架构和数据导出到一个单一的 blob 中，之后可以将其导入到 `SQL Server`
    实例或另一个 `SQL Database` 实例。此功能创建一个称为 `数据层应用程序` (`DAC`) 文件的逻辑备份文件。


    当该文件在本地磁盘上创建时，其扩展名为 `.bacpac`，因此它也被称为 `BACPAC` 文件。


    您可以使用 `BACPAC` 文件将数据库从云端复制到您的本地 `SQL Server` 数据库，反之亦然。由于 `BACPAC` 文件包含特定于被备份数据库版本的对象，在早于
    `SQL Server 2012` 的 `SQL Server` 版本上导入 `BACPAC` 文件时，您可能会遇到错误。


    当您将 `SQL Database` 实例导出到 `BACPAC` 时，您实际上是在您拥有的一个 Windows Azure 存储帐户中创建了一个 blob
    设备。图 12-10 显示了导出数据库时需要提供的信息。除了提供数据库凭据外，您还需要提供将创建的 blob 的路径以及访问您的存储帐户所需的访问密钥。Blob
    路径包含存储帐户和 blob 名称（在我的示例中分别是 `mystorageaccount` 和 `blobbackup001`）。


    ***图 12-10.** 使用导入/导出功能导出数据库。*


    如果您想使用此 blob 在云端创建另一个数据库，您需要创建一个空的 `SQL Database` 实例，并从 Windows Azure 管理门户运行导入向导。如果您想在本地
    `SQL Server` 实例上创建数据库，您首先需要将 blob 下载到本地计算机，然后使用 `SQL Server Management Studio`
    将此文件导入到新创建的数据库中。


    ![Image 156](img/index-318_1.png)


    > **注意：** 您应该知道，导出过程不会创建备份文件；它创建的是数据库的副本，并不确保事务一致性。如果您希望创建一个具有事务一致性的 blob，您需要先使用
    `CREATE DATABASE … AS COPY OF…` 命令，待复制操作完成后再导出复制的数据库。


    ## SQL Database 的成本


    根据您的需求，`SQL Database` 服务每月可能花费您几美元到数百甚至数千美元不等。一般来说，您按使用量付费；您需要的数据库空间越多，产生的网络流量越大，您需要支付的费用就越高。使用
    `SQL Database` 的总成本由基本费率和附加费用组成，基本费率根据存储的数据量而变化，附加费用是给定月份内产生的出站网络流量费用。


    在撰写本文时，一个 1GB 的 `SQL Database` 实例每月费用为 9.99 美元，外加每消耗 1GB 出站带宽 0.12 美元。如果您在一个 1GB
    的数据库实例中仅使用 100 MB 存储空间，您需要支付的最低金额为每月 4.99 美元。一个 150GB 的 `SQL Database` 实例每月费用为
    225.78 美元，不包括带宽费用。正如您可能猜到的那样，每 GB 的价格随着数据库变大而降低，如图 12-11 所示。


    ***图 12-11.** SQL Database 实例每 GB 存储的月度成本（以美元计）。*


    在联合环境的情况下，您可能需要多个数据库实例；每个联合数据库实例都会产生其自身的成本。因此，如果您有 25 个每个 1GB 的联合成员和一个 100MB 的根数据库，您将支付大约
    254.75 美元 (`25 * $9.99 + $4.99`) 加上所有数据库产生的合并出站带宽费用。


    > **注意：** 请务必在 Microsoft 网站上查看最新价格。访问 [`www.microsoft.com/azure`](http://www.microsoft.com/azure)，并使用此网站上提供的价格计算器。


    ## 结论

