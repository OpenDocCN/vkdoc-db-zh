    - **恢复**\n    - 当 `BCP` 导入数据失败时，整个批次将回滚，因此部分加载不会导致数据不一致。\n\n请记住，您可以利用扩展事件和 `PowerShell`\
    \ 创建自己的自定义监控。这两种工具实际上可以应用于本章描述的任何数据复制技术。\n\n## 结论\n\n您最终可能会使用本章描述的一种或多种方法，或者两种或多种方法的组合。它们都有其优点。它们也都有缺点。如果您计划周全并将该计划传达给正确的团队成员，那么您就走上了成功部署的道路。确保您的高级管理人员也了解您所选技术能做什么和不能做什么。有了他们的理解，以后就不太可能被问到：“为什么它不做\
    \ X？我们以为它会做 X。”\n\n> **注意**  \n> 不要忘记使用所有对您有价值的资源，大多数可在 YouTube、Twitter 和许多 SQL\
    \ Server 支持网站上免费获取。\n\n与涉及 SQL Server 的所有内容一样，您的情况可能有所不同，因为您的经验可能与我的经验大相径庭。这里提供的示例都来自我必须支持的真实场景。它们并非旨在包罗万象，尽管我的公司为解决方案选择了一个方向，但您的公司可能会选择另一个。不过，有几件事是肯定的：技术将继续进步，数据库管理员和开发人员将继续使用这些工具找到创造性的解决方案。\n\
    \n# Windows Azure SQL Database for DBAs\n\n**作者：Herve Roggero**\n\n微软在几年前进入了云计算领域，其愿景是为组织提供一套服务，使他们能够更快地构建应用程序，减少维护需求，并实现尽可能透明的横向扩展和可用性。作为这一愿景的一部分，微软创建了\
    \ Windows Azure SQL Database（简称 SQL Database），这是一个面向云的关系数据库服务，它以合理的成本提供免配置的高可用性和可扩展性。\n\
    \n虽然您可以轻松地在云中的虚拟机上安装和配置完整的 SQL Server 实例，但 SQL Database 是最有趣的云技术之一，因为它提供了 SQL\
    \ Server 的许多功能和高可用性，而无需复杂的配置负担。在很大程度上，可以将 SQL Database 视为 SQL Server 的一个子集；我将在本章中探讨一些关键差异并解释这项技术的工作原理，为您提供理解和管理此平台的坚实基础。\n\
    \n在深入探讨这项技术的细节之前，我应该提前设定一个预期：SQL Database 不是云中的 SQL Server。这可能是对这项技术最大的误解，也是关于\
    \ SQL Database 应该做什么和不做什么的许多困惑的根源。由于 SQL Database 实例运行在共享的硬件和基础设施上，因此从配置的角度来看，SQL\
    \ Database 是一个“一刀切”的环境。例如，每个人都获得一个具有 99.95% 月度可用性的完全冗余数据库，并且每个人在任何给定的服务器上都获得大致相同的计算资源份额。相反，没有人可以修改磁盘子系统、修改内存分配或直接访问运行\
    \ SQL Database 实例的物理服务器。\n\n那么，如果没有配置选项需要担心，因此也没有硬件和数据库级别的调优选项，我们为什么还要在本书中讨论这项技术呢？因为，作为一名\
    \ DBA，在某些时候您不可避免地会被问及 SQL Database 的功能、这项技术如何能被您的组织利用、它的优缺点是什么，甚至可能是如何在其日常职责中支持它。正如您将在本章中看到的，企业利用\
    \ SQL Database 的机会并不少。\n\n> **注意**  \n> 该技术的正式名称是 *Windows Azure SQL Database*。但是，为简单起见，我在本章中将其称为\
    \ *SQL Database*。此外，SQL Database 中的用户数据库称为 *SQL Database 实例*。\n\n## SQL Database\
    \ 架构\n\n让我们首先看一下 SQL Database 的底层架构，并讨论它的一些含义。正如您将看到的，SQL Database 被设计为一个云数据库，而不仅仅是云中的一个数据库。\n\
    \n### 基础设施\n\n这种架构的主要驱动因素之一是优先考虑可用性和可扩展性，而不是原始性能。当您连接到 SQL Database 实例时，您实际上是通过一层路由器和代理进行连接，这些路由器和代理将找到您的数据库当前所在的服务器。没错，您的数据库可以在服务器之间移动。您无法知道您的数据库位于哪台服务器上；微软保留根据当前工作负载要求和其他因素移动\
    \ SQL Database 实例的权利。\n\n当应用程序连接到 SQL Database 实例时，连接请求首先通过一层网关，该网关将连接请求路由到保存您数据库的正确底层服务器，如图\
    \ 12-1 所示。网关还承担其他职责，包括安全和协议解析。"
- fmt: '# Chapter 12: Windows Azure SQL Database for DBAs


    ## Simplified SQL Database Infrastructure


    From a security standpoint, the gateway determines if the connection request comes
    from an approved Internet Protocol (IP) address. Indeed, SQL Database comes with
    its own built-in IP firewall. If the connection comes from a client IP address
    that’s not specifically authorized, the connection will be rejected. Also, if
    too many requests are coming in at the same time, the gateway might deny access
    to the database in an attempt to block Denial of Service (DoS) attacks.


    If the connection is authorized, the gateway also parses the statement coming
    in to determine if a special command is coming through, such as `CREATE DATABASE`.
    Creating a new database is handled by another component within the SQL Database
    infrastructure because it impacts billing.


    Once the connection is authorized and the `T-SQL` statements can be forwarded
    to the actual database, the proxy layer forwards the `Tabular Data Stream (TDS)`
    packets to the correct underlying `SQL Server` instance for processing.


    You should also note that there is no physical master database available through
    SQL Database.


    Although you can connect to the master database and execute `T-SQL` statements,
    you actually are communicating with the proxy layer. As a result, the master database
    is read-only and removed from billing considerations. In fact, to create a new
    database, you must be connected to the master database; and to change firewall
    settings, you also need to be connected to the master database.


    ![Image 140](index-302_1.png)


    `Figure 12-1. Simplified SQL Database infrastructure and replication topology.`


    ## Availability and Failover


    You might have noticed in `Figure 12-1` that three databases are depicted in the
    diagram. The SQL Database instance you are connecting to is called the *primary
    instance*. To ensure high availability, every SQL Database instance is replicated
    to two other instances (called *secondary instances*). Every operation performed
    on a SQL Database instance involves a two-phase commit; at least one of the secondary
    instances must be successfully committed before the operation completes, which
    by nature slows down write access. This is an example of high availability taking
    precedence over pure performance.


    Another implication of this architecture is that failing over is very quick and
    virtually transparent.


    Because each SQL Database continuously updates two copies of the primary instance,
    failing over in case of severe failure of the primary server can be performed
    very quickly; one of the secondary instances becomes the new primary instance.
    The proxy layer can detect the failover and redirect all new connection requests
    to the newly upgraded primary database. As you can imagine, applications need
    to account for connection loss and perform connection retries whenever necessary;
    for this and many other reasons, database connection retry logic is now part of
    normal coding practices in the cloud.


    **Note** The underlying SQL Database architecture gives Microsoft the liberty
    to roll out critical updates and enhancements virtually unnoticed.


    ## Hardware


    You might wonder what the physical servers are made of, how much memory is available,
    and so on. At the time of this writing, each server is configured with 32 GB of
    RAM, 8 cores, and 12 disks. The server configuration is the same for all servers
    running SQL Database and even Windows Azure, making it easy for Microsoft to swap
    resources when needed.


    As mentioned previously, this infrastructure is a shared environment, so you are
    effectively sharing the available resources on each machine with many other customers.
    Because your SQL Database instances are running on commodity hardware in a shared
    infrastructure, scaling applications up (by adding resources to the server) is
    not possible anymore. However, SQL Database is designed for scaling out with a
    feature called Federations. A federation is a set of SQL Database instances that
    work together to distribute data horizontally over multiple servers, similar to
    a shared-nothing configuration in which each resource has its own set of CPU,
    memory and disk subsystem. I will review federations in more detail later in this
    chapter.


    ## Differences with SQL Server


    You now know that SQL Server is the underpinning technology of SQL Database. However,
    this doesn’t mean SQL Database offers all of the features of SQL Server. Let’s
    review the major differences between the two platforms.


    ### Database Components


    SQL Database offers a limited subset of the components that make up a typical
    `SQL Server` installation. For example, `SQL Server Integration Services` is not
    included with SQL Database. However, you can connect to SQL Database using a locally
    installed copy of `SQL Server Integration Services`. So for the most part, although
    many of the components provided by `SQL Server` are not available in the cloud
    with SQL Database, you can use the ones installed on a local `SQL Server` installation
    and connect to a SQL Database instance in the cloud.


    `Table 12-1` shows a summary of the components supported in SQL Database. *Partially
    Supported* means that some or most of the features of the component can be used
    with SQL Database. *Not Included* means that there is no Windows Azure equivalent.
    *Included* means that there is a Windows Azure equivalent but the component itself
    can use SQL Database if needed. *Replaced* means that the component itself is
    not supported at all but Windows Azure offers an equivalent.


    `Table 12-1. SQL Server component support in SQL Database`


    | **SQL Server Component** | **SQL Database** |

    | :--- | :--- |

    | Relational Engine | Partially Supported |

    | SQL Server Reporting Services | Included |

    | SQL Agent | Not Included |

    | SQL Server Integration Services | Not Included |

    | SQL Server Analysis Services | Not Included |

    | SQL Profiler | Not Supported |

    | Replication | Replaced |


    Windows Azure includes its own version of Reporting Services. The `Windows Azure
    SQL Reporting` service allows companies to deploy and manage reports in the cloud
    with high availability and scalability automatically configured. So you can either
    use a local `SQL Server Reporting Service` to connect to a SQL Database remotely
    or use the one provided as part of Windows Azure. However, if you use the Reporting
    service in Windows Azure, certain limitations apply. For example, the only data
    source supported from `Windows Azure SQL Reporting` is SQL Database.


    ![Image 141](index-304_1.png)


    Replication is not supported with SQL Database. However, another feature called
    `Windows Azure SQL Data Sync` offers a way to transfer data between two or more
    SQL Database instances and even between a `SQL Server` database and a SQL Database
    instance. Data changes can be propagated both ways.


    ### Management Platform


    With `SQL Server`, you depend on `SQL Server Management Studio (SSMS)` to manage
    your databases. However, SQL Database comes with online tools to manage cloud
    databases. At the time of this writing, the `Windows Azure Management Portal`
    is used to provision databases and manage both `Windows Azure SQL Reporting` and
    `Windows Azure SQL Data Sync`. Because they are both part of the `Windows Azure
    Management Portal`, you do not need to log in again.'
