    \ 只是您 HDFS 数据的一个前端。Hive 也允许您在创建新表时填充数据，因此它不仅仅是访问现有数据的接口。\n\n要运行 Hive 命令，请使用 Azure\
    \ 网站上 Hadoop 提供的用户界面（请参阅前面的图 17-6）。登录到集群后，转到主屏幕并点击 **Interactive Console** 磁贴。\n\
    \n然后点击右上角的 **Hive** 按钮，将控制台切换到 Hive 模式。在底部，您将能够输入 Hive 命令，因此请使用以下命令创建表：\n\n```\n\
    CREATE EXTERNAL TABLE price_audit (\n\n    ProductID INT,\n\n    Name STRING,\n\
    \n    ListPrice DOUBLE,\n\n    ModifiedDate STRING\n\n)\n\nCOMMENT 'This is my\
    \ output'\n\nROW FORMAT DELIMITED FIELDS TERMINATED by ','\n\nSTORED AS TEXTFILE\n\
    \nLOCATION '/data/PriceAudit/';\n```\n\n请注意，Hive 要求您指定每一列的名称和数据类型。这些看起来应该很熟悉，因为我为这些列命名的名称与\
    \ SQL Server 表中使用的名称相同。\n\n但是，您可以按自己喜欢的方式命名列；它们不必与作为数据源的 SQL Server 表同名。\n\nHive\
    \ 允许您在创建表时指定许多参数，其中一些列在表 17-5 中。使用参数 `ROW FORMAT DELIMITED FIELDS TERMINATED by\
    \ ','` 和 `STORED AS TEXTFILE` 将 Hive 表定义为逗号分隔的文本文件。`LOCATION` 关键字让您指定存储 Hive 表数据的\
    \ HDFS 文件夹。有关 Hive 语法的完整说明，请参阅位于 [`hive.apache.org`](http://hive.apache.org) 的文档。\n\
    \n**表 17-5. Hive 命令的部分描述性列表**\n\n`CREATE [EXTERNAL] TABLE table_name`\n此命令创建一个新的\
    \ HIVE 表。`EXTERNAL` 关键字让您提供表的 `LOCATION`。当您已经拥有指向 HDFS 中的数据时使用 `EXTERNAL`。如果不包含它，HIVE\
    \ 会在默认位置创建表。\n\n`COMMENT`\n这提供了表的描述。您也可以为列添加注释。\n\n`ROW FORMAT row_format`\n使用此命令指定列分隔符。它还允许您指定行终止符以及其他设置。\n\
    \n`STORED AS file_format`\n使用 `TEXTFILE` 作为文件格式将数据存储为纯文本。指定 `SEQUENCEFILE` 将压缩数据。\n\
    \n`LOCATION hdfs_path`\n使用此命令给出 HDFS 中数据的文件路径。\n\n我们在示例中使用的列分隔符是逗号，我们通过 `ROW FORMAT\
    \ DELIMITED FIELDS TERMINATED by ','` 实现。我们确保 `LOCATION` 路径设置为我们一直向 HDFS 存放数据的文件夹。您现在已准备好使用\
    \ HiveQL 查询这些数据。\n\n一旦执行，您就可以执行 HiveQL 查询。使用这个 `select` 语句来获取数据。\n\n值得庆幸的是，语法看起来就像我们非常熟悉的\
    \ SQL 语言。\n\n```\nselect * from price_audit\n```\n\n您将看到先前存储在 HDFS 中的数据的结果集：\n\
    \n```\n218 LJ-0192-S 50.99 2012-07-19 03:35:12.0\n219 LJ-0192-M 50.99 2012-07-19\
    \ 03:35:12.0\n220 LJ-0192-L 50.99 2012-07-19 03:35:12.0\n221 LJ-0192-X 50.99 2012-07-19\
    \ 03:35:12.0\n314 HB-M763 62.92 2012-07-19 04:18:38.12\n317 HB-R720 62.92 2012-07-19\
    \ 04:18:38.12\n320 FW-M423 61.745 2012-07-19 04:18:38.12\n. . .\n```\n\n如果您想限制结果的大小，因为您使用比示例更大的数据集运行了代码，那么您可以使用\
    \ `LIMIT` 操作符，如下所示：\n\n```\nselect * from price_audit limit 5\n```\n\n```\n218\
    \ LJ-0192-S 50.99 2012-07-19 03:35:12.0\n219 LJ-0192-M 50.99 2012-07-19 03:35:12.0\n\
    220 LJ-0192-L 50.99 2012-07-19 03:35:12.0\n221 LJ-0192-X 50.99 2012-07-19 03:35:12.0\n\
    314 HB-M763 62.92 2012-07-19 04:18:38.12\n```\n\n这些查询的后台发生了什么？同样，这些是 MapReduce\
    \ 作业，而 Hive 只是作为 MapReduce 的一个更熟悉 SQL 用户的层。如果您去查看 Azure 上 Hadoop 的作业日志，您会看到为每个查询执行的作业。您可以点击主屏幕的\
    \ **Job History** 磁贴。\n\n当然，我们不仅仅想提取明细数据。我们可以用 Sqoop 完成。虽然 Hive 没有提供我们习惯的 T-SQL\
    \ 的所有功能，但它确实使我们能够进行分组和聚合、筛选和排序，并且还具有一些连接功能。例如，您可以发出以下命令进行分组、求和和连接。再次注意这些查询与我们熟悉的\
    \ SQL 有多么相似。\n\n```\nSELECT Name, ListPrice, ModifiedDate\n\nFROM price_audit\n\
    \nwhere Name = 'LJ-0192-X'\n\norder by ListPrice\n```\n\n```\n221 LJ-0192-X 50.99\
    \ 2012-07-19 03:35:12.0\n221 LJ-0192-X 54.99 2012-07-20 09:24:51.0\n221 LJ-0192-X\
    \ 52.99 2012-07-20 14:32:18.0\n```\n\n```\nSELECT Name, COUNT(*)\n\nFROM price_audit\n\
    \nGROUP by Name\n```\n\n```\nLJ-0192-X 4\nHB-M763 1\nHB-R720 1\nFW-M423 1\n```\n\
    \n使用 HiveQL 获取数据是完整解决方案的重要组成部分，它允许您通过 Excel 使 Hadoop 数据可供最终用户和分析师访问。我们将逐步介绍一个如何将\
    \ Excel 与 Hive 结合使用的示例，以完成循环并充分利用这些数据。\n\n## Hive 和 Excel\n\nMicrosoft 为 Hive\
    \ 提供了一个 ODBC 驱动程序，以便可以从分析工具和其他应用程序发出 HiveQL 查询。Excel 可以使用 Hive ODBC 驱动程序，并且有一个加载项可用，以便可以拉取数据进行分析。要使用\
    \ Hive 和 Excel，请执行以下操作：\n\n1.  点击 Hadoop on Azure 主菜单中的 **Open Ports** 磁贴。\n2.\
    \  点击切换按钮，使其滑动到右侧并且状态变为 **Open**，从而打开 Hive ODBC 端口。\n3.  返回主菜单，点击 **Download**\
    \ 磁贴。\n4.  下载并安装 Hive ODBC 驱动程序和用于 Excel 的 Hive 加载项。按照说明确保安装正确的版本（32 位或 64 位）。\n\
    5.  启动 Excel 并转到 **Data** 菜单。点击 **Hive Pane** 和 **Enter Cluster Details**。如果一切正常，您将在表下拉列表中看到您创建的\
    \ Hive 表列表。\n6.  现在您已准备好在 Excel 中处理放入 HDFS 的产品数据。只需选择一个表和一些列，添加条件和分组，然后执行查询。\n\
    7.  此外，您可以转到 Windows 中的 **Data Sources (ODBC)** 并添加 Hive ODBC DSN，如图 17-9 所示，以便可以从其他应用程序使用它。\n\
    \n![Image 199](img/index-424_1.png)\n\n**图 17-9.** 使用 Windows 中的 **Data Sources\
    \ (ODBC)** 进行 ODBC Hive 设置\n\n虽然通过 Excel 使用 Hive 的主要用户不是 DBA，但了解他们所管理的数据将如何被他人使用是有好处的。例如，大多数\
    \ DBA 不会使用 Excel 分析 Hive 数据，但数据分析师很可能会使用，因为这是他们熟悉的软件工具。要构建强大的大数据架构，了解数据将如何使用以及使用数据的工具如何工作非常重要。这有助于您为管理数据做出更好的架构决策。\n\
    \n## JavaScript\n\n还记得您在本章前面用于处理 MapReduce 示例的 JavaScript 吗？"
- fmt: "# Chapter 17: Big Data for the SQL Server DBA\n\n## Putting the Code to Work\n\
    \nNow that you have data in HDFS, you can put that code to work. The JavaScript\
    \ will read the product data you imported with Sqoop into HDFS, and stored within\
    \ the directory `/data/ProductTable` with the first job you executed.\n\nThe product\
    \ data you’re using isn’t the same as the sample data you worked with, so you’ll\
    \ change the JavaScript to make use of what you have. The business problem you’ll\
    \ solve is to calculate the average list price of products by product line. You\
    \ also must consider that the data is comma-delimited, and that some of the product\
    \ names have a comma in the text.\n\n## The Map Function\n\n```javascript\nvar\
    \ map = function (key, value, context) {\n\n    var aryValues = value.split(\"\
    ,\");\n    var pattern = /[A-Za-z]/;\n    var productLine;\n    var listPrice;\n\
    \n    if (aryValues.length == 25)\n    {\n        productLine = aryValues[15];\n\
    \        listPrice = aryValues[9];\n    }\n    else\n    {\n        productLine\
    \ = aryValues[16];\n        listPrice = aryValues[10];\n    }\n\n    if (pattern.test(productLine)\
    \ && productLine.toString() != \"null\")\n    {\n        context.write(productLine.toUpperCase(),\
    \ listPrice);\n    }\n};\n```\n\nThis `map` function doesn’t use the `key` passed\
    \ into it, as you don’t care about the offset of the row within the file (and\
    \ normally won’t). The product data you’re interested in is passed into the function\
    \ in the `value` parameter, which is split into an array using a comma delimiter.\
    \ Since it’s possible there’s a comma in the product name, you then check the\
    \ length of the array to see whether there are more cells than expected. If the\
    \ length of the array is `25`, then there isn’t a comma in the product name, so\
    \ product line is in cell `15` of the array and list price is in cell `9`. If\
    \ there is a comma in the product name, then the product line and list price are\
    \ in cells `16` and `10`, respectively. Because `null`s are allowed in the product\
    \ line in the `Production.Product` table that we used as a source for this data,\
    \ you must check the data to make sure it is an alpha character and that it isn’t\
    \ `null`. This will filter out about half of the rows and is exactly the type\
    \ of cleansing that belongs in a `map` function. It also saves resources by making\
    \ sure you do not pass this data on to the `reduce` function.\n\n## The Reduce\
    \ Function\n\n```javascript\nvar reduce = function (key, values, context) {\n\n\
    \    var sumListPrice = 0.0;\n    var productLine = key;\n    var cnt = 0.0;\n\
    \n    while (values.hasNext()) {\n        sumListPrice += parseFloat(values.next());\n\
    \        cnt++;\n    }\n\n    var avgListPrice = sumListPrice / cnt;\n    context.write(productLine,\
    \ avgListPrice);\n};\n```\n\nThe product line is passed in to the `reduce` function\
    \ as the `key`, which is the way you defined it in the `map` function, and all\
    \ of the list prices for each product line are passed in as the `values` collection.\
    \ The main thing you do in the `reduce` function is to iterate through the `values`\
    \ to sum all of the list prices and count the number of values so you can calculate\
    \ the average. When finished, you return the product line and average list price,\
    \ and it’s these values that are written to HDFS. The resulting data will look\
    \ like this:\n\n```\nM    827.0639560439561\nR    965.3488000000007\nS    50.39885714285715\n\
    T    840.7621153846153\n```\n\n## Running the Code\n\nTo run this code, copy both\
    \ the `map` function and the `reduce` function into a file called `AverageListPrice.js`.\
    \ You can do this using Notepad, then save it to your local machine. After this\
    \ is done, upload the file using the Hadoop on Azure web site. Go to the main\
    \ menu and click the **Interactive Console** tile. When the console displays,\
    \ make sure that the **JavaScript** button is clicked on the top right, and that\
    \ the `js>` prompt is visible.\n\nTo upload the JS file you just created, type\
    \ `fs.put()` in the prompt. A pop-up window will ask you to find the JS file you\
    \ want to upload, so browse to `AverageListPrice.js` and select it. Leave the\
    \ destination box empty and click **Upload**. This will put the file in your user’s\
    \ default file location in Hadoop, which is `/user/username`.\n\nAfter the JavaScript\
    \ file is uploaded, you’re ready to run it. To do so, key in the following at\
    \ the prompt:\n\n```javascript\nrunJs(\"AverageListPrice.js\", \"/data/ProductTable\"\
    , \"AverageListPrice\")\n```\n\nThe `runJs` function will execute the `map` and\
    \ `reduce` functions you wrote in JavaScript. There are three parameters you pass\
    \ in to `runJs`: the name of the JavaScript file you uploaded, the name of the\
    \ directory that contains the input data, and the name of the directory for the\
    \ output data. In this example, we’re using `/data/ProductTable` as the input\
    \ data because we stored the product data there earlier, and the output data will\
    \ be saved in your `/user/username` folder in HDFS. Execute `runJs` and you will\
    \ see some system messages scroll by as the job runs. When it’s finished, the\
    \ screen will look like it does in Figure 17-10. Now you can look at the output\
    \ data.\n\n**Figure 17-10.** *Interactive JavaScript screen in Hadoop on Azure*\n\
    \nUsing remote desktop again, go to the desktop and launch the `HadoopNameNode`,\
    \ like you did in the section on Sqoop (refer back to Figure 17-7). Click the\
    \ link labeled **Browse the filesystem** and a web browser will open with a list\
    \ of directories, one of them being the user folder. Open it and you’ll see another\
    \ directory named the same as your user name. Click it to see the files and directories\
    \ under your user name and find the directory named `AverageListPrice`. This is\
    \ where your output data is. Open the directory to see a file named `part-r-00000`\
    \ and take a look at the file by clicking it. The file should have four rows that\
    \ look just like the output we saw earlier in this section.\n\n## Pig\n\nPig is\
    \ a platform for analyzing large datasets. It consists of a high-level language\
    \ for expressing data analysis programs, and allows for a high degree of parallelization.\
    \ Pig includes Pig Latin, which is a procedural scripting language that allows\
    \ you to manipulate data in more powerful ways than you can with Sqoop. While\
    \ Sqoop is analogous to BCP in SQL Server, you can consider Pig the ETL tool of\
    \ Hadoop, so naturally it is highly parallel when extracting, transforming, and\
    \ loading data.\n\nPig has a good set of built-in functions for string manipulation,\
    \ mathematical operations, and for groupings, aggregations, and comparisons. It\
    \ also has relational operators for joins, unions, and more functionality for\
    \ controlling the flow of the script and the processing of data. In more sophisticated\
    \ scripts, Pig developers can use nested data structures, streaming operators,\
    \ and user-defined functions. The strength of Pig is that it can load data in\
    \ parallel, apply analytical functions to the data, and then write the results\
    \ of the analytic process.\n\n**Note:** Pig will be an option for your environment\
    \ when you want to do more than simply move data back and forth between SQL Server.\
    \ It allows you to inspect, crunch, and convert data as you’re moving it from\
    \ one place to another.\n\nIn today’s version of Hadoop on Azure, the primary\
    \ use of Pig will be to read data from HDFS, process it procedurally, and write\
    \ the results back to HDFS. It won’t involve the SQL Server database engine; although\
    \ in the future, it seems that it would be sensible to have a way to store the\
    \ results in SQL Server.\n\nThe following is a simple Pig script that mirrors\
    \ T-SQL for grouping by `ProductID`, counting the number of rows, and sorting\
    \ by the row count:\n\n```pig\nproduct_audit = LOAD '/data/ProductAudit/part-m-00001'\
    \ USING PigStorage(',')\n    AS (\n        ProductID:int,\n        Name:chararray,\n\
    \        ProductNumber:chararray,\n        ListPrice:float,\n        ModifiedData:chararray\n\
    \    );\n\nproduct_group = GROUP product_audit by (ProductID);\nproduct_count\
    \ = FOREACH product_group GENERATE group, COUNT($1) as num_products;\nproduct_sorted\
    \ = ORDER product_count by num_products desc;\n```"
