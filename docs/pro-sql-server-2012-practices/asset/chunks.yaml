  trans: '# 第 10 章 ■ 自动化管理


    如果 `AdventureWorks2012` 数据库中的活动事务数量超过 500，将会触发如图 10-9 所示的示例警报。这仅仅是众多可用条件中的一个。


    ### 图 10-9. SQL Server 性能条件警报


    ![Image 121](img/index-256_1.png)


    ## WMI 事件


    第三种类型的警报基于 Windows Management Instrumentation (WMI) 事件。WMI 是一个框架，用于使用编程或脚本语言执行常见的服务器管理任务。


    SQL Server Agent 将使用 Windows Management Instrumentation 查询语言 (`WQL`)，它与 SQL 类似。要创建此警报，您需要指定命名空间和一个查询。


    在图 10-10 中，已设置一个 WMI 事件警报来捕获 `DEADLOCK_GRAPH` 事件。使用了默认的 SQL Server 命名空间，查询使用的是
    `WQL`。


    ### 图 10-10. WMI 事件警报


    当发生死锁时，将启动一个 SQL Server Agent 作业，如图 10-11 所示。已设置的作业 `Capture Deadlock Graph` 会将当前日期、时间和死锁图插入到一个表中，以供进一步审查。


    ![Image 122](img/index-257_1.png)


    ### 图 10-11. 此 WMI 事件警报的响应是执行一个 Agent 作业


    ## 响应


    对于所有警报类型，在选择了事件类型之后，下一步是定义当您设定的条件满足时采取的响应。如图 10-12 所示，您可以选择执行现有的 SQL Server Agent
    作业、通知现有的操作员，或者两者都做。


    ![Image 123](img/index-258_1.png)


    ### 图 10-12. 警报的响应选项


    ## 选项


    第三步是设置选项，如图 10-13 所示。您可以选择在警报中包含错误文本，这样您就能确切知道问题是什么。当负责接收通知的人员（例如初级 DBA）可能不熟悉错误编号和严重级别时，包含错误文本也很有益。您还可以选择在此处添加自己额外的自定义消息。


    最重要的是，您可以设置发送响应之间的延迟。当出现问题时，每分钟可能会产生数千个错误和警报。为了使情况可控，请在响应之间设置延迟。平均而言，30 到 60 秒的延迟足以避免收到海量警报，同时仍能知晓存在问题。


    ![Image 124](img/index-259_1.png)


    ### 图 10-13. 警报的附加选项


    ## 维护计划


    SQL Server 为您提供了一种便捷的方式来管理许多常见的管理任务，例如备份、还原和索引维护。维护计划是基于 SQL Server Integration
    Services (`SSIS`) 包的工作流。


    要在 `SSMS` 中访问此功能，请展开 `管理` 并查找 `维护计划`。从这里，您可以手动创建维护计划，或使用内置向导。在制定计划时，您要做的第一个决定是包含哪些任务。SQL
    Server 2012 中有十一个可用任务。


    ## 任务


    维护计划中的可用任务包括 `备份数据库`、`检查数据库完整性`、`执行 SQL Server Agent 作业`、`执行 T-SQL 语句`、`历史记录清理任务`、`维护清理任务`、`通知操作员`、`重建索引`、`重新组织索引`、`收缩数据库`
    和 `更新统计信息`，如表 10-1 所示。


    由于默认选项，其中一些任务应谨慎处理或避免使用。例如：


    -   **历史记录清理任务**：不要删除过多或过于近期的信息。如果需要，备份和还原历史记录可用于确定恢复策略。Agent 作业和维护计划历史记录有助于对失败的作业或错误进行故障排除。

    -   **维护清理任务**：不要删除您需要的备份文件。如果您的标准是保存两周的完整备份和三天的事务日志备份，请确保您不会通过此步骤删除这些文件。

    -   **重建索引** 和 **重新组织索引**：这些任务不允许您为对象指定触发操作的碎片阈值。如果选定了某个对象，它将被重建或重新组织，这可能并非必要。选择数据库中的所有对象可能很诱人，但这可能导致不必要的重建和重新组织操作，从而导致服务器上的
    `I/O` 活动增加。

    -   **收缩数据库**：执行 `DBCC SHRINKDATABASE`，这会移动数据库中的页面。这会导致碎片，进而引发性能问题。不应定期在任何数据库上执行此任务。您的数据文件大小应根据其所需容纳的数据量来设定。


    对于所有这些任务，当您构建计划和选择选项时，可以选择 `编辑` 屏幕底部的 `查看 T-SQL` 按钮，以查看 SQL Server 在幕后实际执行的操作。


    ### 表 10-1. 可用的维护计划任务


    **任务** | **描述**

    ---|---

    `备份数据库` | 执行完整、差异或日志备份。您可以选择所有数据库、所有系统数据库、所有用户数据库，或仅选择一个或多个。您选择要保存备份文件的位置。包含一个验证备份文件完整性的选项，该选项执行
    `RESTORE VERIFYONLY`。还可以设置压缩级别。

    `检查数据库完整性` | 此任务将对您选择的数据库执行 `DBCC CHECKDB`。您可以选择检查所有页面，或排除索引。

    `执行 SQL Server Agent 作业` | 创建 Agent 作业后，您可以将其包含在维护计划中。SQL Server 使用系统存储过程 `sp_start_job`
    来运行作业。

    `执行 T-SQL 语句` | 此任务允许您输入任何 T-SQL 语句或脚本。如果您已开发自定义脚本，这可以是一种将其纳入并自动化的方式。

    `历史记录清理任务` | SQL Server 将许多操作的历史记录存储在 `msdb` 数据库中。这包括备份和还原信息、Agent 作业历史记录以及维护计划历史记录。如果放任不管，这些表会变得非常大。历史记录清理任务允许您选择一种或多种类型，以及一个时间范围，并将从
    `msdb` 表中删除早于该时间的信息。

    `维护清理任务` | 正如某些操作会在 `msdb` 中占用空间一样，其他操作也会在磁盘上占用空间。此任务允许您清理早于特定日期的备份文件和维护计划报告。请谨慎使用此选项，尤其是在处理备份文件时。您需要确保不会删除灾难恢复计划所需的任何文件。

    `通知操作员` | 此任务将使用您在 SQL Server Agent 中定义的操作员，因此该服务必须启用并正在运行。该任务允许您配置计划以向操作员发送信息。您可以自定义通知的主题和正文。

    `重建索引` | 将使用您选择的选项构建并执行 `ALTER INDEX…REBUILD` 语句。选择一个或多个数据库以及一个或多个表或视图。此处提供高级选项，例如在
    `tempdb` 中排序结果以及保持索引联机。但是，请确保在选择之前了解这些选项的含义。

    `重新组织索引` | 要执行强度较低的 `ALTER INDEX…REORGANIZE` 操作，请使用此任务。选择将对其执行任务的数据库和对象。

    `收缩数据库` | 配置此任务时，需选择数据库、大小限制和可用空间百分比。数据库将被收缩到目标大小，并保留指定的可用空间。启用此任务时请谨慎。执行的 `DBCC
    SHRINKDATABASE` 命令可能导致碎片。'
