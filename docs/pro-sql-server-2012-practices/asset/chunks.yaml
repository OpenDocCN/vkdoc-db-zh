  trans: '# 第 11 章：SQL Server 数据移动的流体动力学


    在这里用途有限。话虽如此，我曾见过一些部署，它们在镜像实例之上结合使用`镜像`和`日志传送`，为用户提供数据库的只读副本。


    ## 场景 3：夜间批处理作业


    在此场景下，`镜像`不会带来任何好处，因为镜像副本不可用于数据读取或写入。


    ## 场景 4：硬件故障


    这正是`镜像`大放异彩的地方。如果发生硬件故障，故障转移是立即完成的。然而，根据应用程序的设计方式，应用程序可能仍需要手动干预才能指向新的数据源。一旦故障条件被清除，将数据库故障恢复回主体服务器也很简单。


    > **注意：** 在场景 4 中，使用同步镜像时故障转移是立即完成的。异步镜像则可能导致延迟，因为目标数据库需要清空重做队列。


    ## AlwaysOn


    "AlwaysOn"是一个涵盖性术语，在 SQL Server 2012 中涵盖了两个功能：


    *   `可用性组`

    *   `故障转移集群实例 (FCI)`


    ### 可用性组


    `可用性组`（如图 11-4 所示）融合了`数据库镜像`的最佳特性，并在此基础上进行了增强。`可用性组`要求承载 SQL Server 实例的服务器是`Windows
    Server 故障转移集群 (WSFC)`的一部分。SQL Server 也可以作为独立实例安装在`WSFC`中的服务器上，无需共享存储；实现`可用性组`并不要求它必须是`故障转移集群实例
    (FCI)`。要查看使用`AlwaysOn`所需的所有先决条件，请参阅微软此处的文档：`http://msdn.microsoft.com/en-us/library/ff878487.aspx`。


    安装 SQL Server 实例并启用`AlwaysOn`功能后，即可配置`可用性组`。每个`可用性组`在主副本中承载多个用户数据库（`可用性数据库`），并且最多可以配置四个额外的辅助副本，总计最多五个副本。这与`镜像`不同，后者只能将单个主体数据库配置到单个镜像。


    ![Image 138](img/index-290_1.png)


    *图 11-4. AlwaysOn 可用性组。*


    主副本和所有辅助副本通过一个称为`数据同步`的过程保持同步，在此过程中，来自主副本的事务日志条目被应用到每个辅助副本。`可用性组`中的每个数据库都将有自己独立的`数据同步`过程。数据不是为整个`可用性组`同步，而是为每个单独的数据库同步。与`镜像`一样，同步可以是每个数据库配置为同步或异步。回想一下，在同步副本中，当主副本数据库等待辅助副本数据库提交事务时，可能会出现延迟。


    与`镜像`不同，辅助副本可以配置为只读访问，也可用于支持完整（`仅复制`）备份或事务日志备份。


    在发生故障转移时，一个辅助副本将成为主副本，而原始主副本将成为辅助副本。对于任何给定的`可用性组`，只能有一个主副本。副本中的所有数据库将一起进行故障转移。


    `可用性组`的最大优势之一是，你可以配置一个`侦听器名称`，它充当应用程序的单点入口，无论其位置如何（始终是主副本所在的位置），该名称都保持不变。与`FCI`一样，这使得应用程序无需担心故障转移到不同名称后的连接问题。


    好处包括：


    *   `可用性组`允许配置为一组的多个数据库一起故障转移。

    *   可以配置自动故障转移。'
- fmt: '## Chapter 11 ■ The Fluid Dynamics of SQL Server Data Movement


    ### Secondary Replicas


    Secondary replicas can be configured for read-only access by users and applications.
    They can also be used for some backup operations.


    Limitations are the following:


    *   Availability groups are an Enterprise edition feature.

    *   They require endpoints for communication.

    *   Availability groups cannot be used for server instance-level protection.


    ### Applying Availability Groups to Scenarios


    You can apply availability groups to our four scenarios as follows:


    **SCENARIO 1: Global Organization**

    Availability groups can be used to enable particular offices to connect to read-only
    secondary copies of the database. However, there might still be significant issues
    with latency due to the time it takes for the data request and delivery to occur
    as it would be in any dispersed scenario. Think of this scenario as having three
    copies of the data in Chicago, and everyone still has to connect to Chicago to
    access the data. In countries where the network infrastructure is poor, availability
    groups provide no help with problematic access.


    **SCENARIO 2: High-Volume Reporting Needs**

    Here is a possible case for using availability groups. Allowing reporting tools
    to connect to a specific secondary database could alleviate database contention,
    but it might impact that replica’s ability to meet specific `RTO` and `RPO` needs.
    If separate indexing strategies are needed for data retrieval, however, that would
    not be supported.


    **SCENARIO 3: Overnight Processing Jobs**

    Another possible case for using availability groups. Backup procedures could be
    pointed at a secondary database for full (copy-only) and transaction log backup
    while processing continues to occur on the primary database. Differential backups
    on a secondary database are not supported. Find complete information on support
    for backups on a secondary replica here: `http://msdn.microsoft.com/en-us/library/hh245119.aspx`.


    **SCENARIO 4: Hardware Failure**

    Availability groups can be used to failover in this situation. Much like mirroring,
    when an issue with the primary replica is detected, failover to one of the secondaries
    can take place. Unlike mirroring, no manual intervention is needed to redirect
    your application if you configure a listener name and your application uses the
    right client utilities. If you want the highest protection, you can combine availability
    groups with `FCI`s.


    ### Failover Clustering


    SQL Server can be installed as a clustered instance that runs on top of a Windows
    Server Failover Cluster (shown in Figure 11-5). It provides instance-level protection
    and automatic failover to another node due to how the underlying Windows clustering
    feature works. An `FCI` is not a solution that provides a redundant copy of the
    data; there is only one copy of the data for databases in an `FCI`. The databases
    are then stored on a shared-storage solution such as a storage area network (`SAN`).


    ![Image 139](index-292_1.png)


    *Figure 11-5. AlwaysOn failover clustering.*


    Failover can happen in a variety of circumstances, but the two most common scenarios
    are service or hardware failures and loss of quorum. Failures in services and
    issues with hardware are fairly obvious: the service or the hardware experiences
    a fatal failure and cannot recover. Loss of quorum can be a bit more confusing,
    but it boils down to answering this question: Are a majority of the servers in
    the cluster actually functioning? If the answer is yes, the cluster continues
    to run. If the answer is no, the entire cluster can go offline. This is certainly
    not a preferred state, and the configuration of your cluster should consider a
    loss of quorum situation.


    The benefits from failover clustering include the following:


    *   For high-availability, failover clustering is one of the best features SQL
    Server has to offer.

    *   Failover clustering in SQL Server 2012 supports the multisubnet feature of
    `WSFC`.'
