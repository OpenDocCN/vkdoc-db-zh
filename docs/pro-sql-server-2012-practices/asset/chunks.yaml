    # 第 18 章


    ■ ■ ■


    # 峰值负载调优


    作者：Ben DeBow


    我们执行的脚本并没有像你可能预期的那样以超高速度运行。它们很慢，通常比我们使用 SQL Server 时习惯的查询和大容量加载过程要慢得多。我们开发的示例适用于少量数据，但别忘了本章是关于大数据的，而
    Hadoop 框架在处理超大型数据集时才能大放异彩。为处理少量数据而启动 128 台服务器来执行 MapReduce 作业以正确获取和组装数据，其系统开销远大于通过大规模并行化带来的收益。即使只使用两台服务器，对于我们手头的数据量来说开销也太大了。然而，当你将数据规模扩大到数十亿甚至数万亿个数据元素时，就会看到益处，因为与大规模并行化带来的收益相比，启动和执行
    MapReduce 作业所使用的资源只是小菜一碟。


    今天在历史上是你的在线购物业务一年中最繁忙的一天。上午 11 点，系统开始显示出压力迹象，负载超过了去年。顾客在完成订单时遇到问题。有些失败了，有些只是很慢。运维中心叫你来看看
    SQL Server 出了什么问题，你观察到进程因为大型阻塞链而开始排队，这最终影响了结账过程。你没有编写应用程序代码，但你作为数据库管理员的工作就是解决问题。当这一切发生时，高层管理者忧心忡忡，首席信息官就站在你身后看着你尝试解决问题——压力山大。当天晚些时候情况最终平息下来，但尚不清楚有多少销售机会或潜在顾客因为速度变慢或结账失败而流失。除了受影响的订单外，向报告环境的复制现在出现了
    12 小时的延迟，影响了向使用原始销售数据的内部消费者提供的报告。你能防止这种情况发生吗？在很多情况下，你是可以的。


    每个组织都有运行其业务的关键任务应用程序。这些应用程序必须能够扩展和提升性能，以在系统最繁忙时（即其*峰值负载*时）处理负载。峰值负载可能每天发生，也可能在不同时间间隔发生，通常在旺季；它不一定只是每年一次的事件，比如前面例子中描述的节日季（这可以被视为一个旺季）。为了应对这些挑战，组织必须提前为这些事件做好规划，这样才能高枕无忧，知道他们的系统能够满足增加的流量需求。


    故障或停机通常不是一个选项，因为大多数企业要么在这些高峰时段依赖很大一部分收入，要么有关键业务事件，比如会计部门的年末结账。


    你的解决方案在部署之日的样子，不会是 10 天、100 天或 1000 天后的样子。用户会增加，流量会上升。你不仅需要预见到日常使用（这可能代表你的高峰时间）的变化，还需要预见到那些系统性能至关重要的特殊时期的变化。本章将向你展示如何为你的服务器需要扩展和提升性能以处理额外流量的那些时刻做准备。


    ## 定义峰值负载


    你知道在高峰日的高峰小时内，你预期会有多少交易量吗？如果知道，这个数字有多准确？核心交易是否有成文的性能要求以满足服务等级协议（SLA）？你是否衡量过当前系统日常能处理多少交易量？在业务能够安心进入旺季之前，回答这些问题以及许多其他问题都很重要。


    每个应用程序和环境都不同。然而，有一点是不变的：没有任何单一行动能使系统扩展。必须结合不同的措施才能达到预期效果。例如，业务方不能假设购买更新、更大的硬件就能解决其性能问题并使应用程序扩展。想想你的关键应用程序，以及核心业务时段内的大型阻塞链可能如何影响应用程序，并最终影响业务本身。硬件无法解释也无法修复
    SQL Server 中被阻塞的内部资源。资源被阻塞是一个应用程序问题，即使最终只是像修复索引这样简单，或者像重写应用程序逻辑这样复杂。使应用程序为峰值负载做好准备的过程是重复性的，在环境准备好扩展以满足额外负载之前，通常需要重复多次。


    在进行任何分析以可能修复应用程序来处理峰值负载之前，你需要组建一个多职能的项目团队。项目团队应由来自整个企业的不同群体组成，包括业务的技术和非技术方面。


    以下是一个典型项目团队的构成，按职能列出：


    *   项目经理

    *   多名应用程序代表

    *   DBA 负责人

    *   存储资源人员

    *   网络资源人员

    *   服务器资源人员

    *   业务代表


    项目团队的主要职责是明确界定在高峰使用时段（无论是事件性、日常性、季节性等）必须达成的目标，并实施必要的变更以使系统达到或超越这些目标。这些目标必须正式记录并达成一致，这样在期望值方面大家才能达成共识。如果不这样做，你可能会陷入本章开头描述的那种情景。


    首先定义在高峰时段内的预期。根据环境和公司不同，这个练习可能对某些人来说比其他人更容易。预期应该始终从业务的非技术性要求开始。达成该预期的讨论通常涉及审视当前市场状况，并审查大量当前和历史数据。目标是定义公司预期在特定时间段内处理多少业务交易。


    这些交易代表了消费者或最终用户在旺季将使用或发起的核心流程。例如，如果你的公司是在线零售商，核心交易可能包括产品搜索、将商品加入购物车、结账流程、处理付款以及查看订单。你真正试图了解的是：交易何时发生？预期的峰值数量是多少？公司预计在一小时或一天内确认多少订单？


    是每小时 1000 笔，还是每天 50 万笔？这个数量在一天、一个月或一年中的某些时间点会变化吗？为每小时 1000 笔交易做规划与为 50 万笔交易的工作负载做规划截然不同。你需要设计解决方案以满足高峰时间段内的最大交易数量。


    应用程序是关键，因此将类似“每小时 X 笔销售额”映射到系统中的交易数量，再映射到 SQL Server 中需要发生的交易数量，这很重要。这让团队的技术方了解从何处开始、寻找什么以及如何进行架构设计。


    你需要确定的唯一衡量标准，并不只是旺季或高峰时段预期的业务流程数量。平均响应时间可以是多长？响应时间应符合最终用户对于端到端交易应花费多长时间的预期。429

