- fmt: "# 大型机安全演进与SQL Server安全控制\n\n在大型机支持TCP/IP之前，通常使用系统网络架构（SNA）和分布式数据设施（DDF）来访问DB2中的数据。DDF允许你定义用户与逻辑单元（LU）的关联，这使得可以强制规定一个特定位置只能使用一个用户ID。当TCP/IP获得支持后，IBM移除了此功能，并在TCP/IP的文档中写下了这样的话：“你信任你的用户吗？”。因此，在将新技术应用于老旧的大型机时，IBM实际上降低了其安全性。\n\
    \n## 登录触发器\n\n无法将TCP/IP访问限制在特定位置的问题，其解决方案是使用DB2中的一个登录用户出口。该出口被称为*资源访问控制设施（RACF）*（它是大型机上的安全实现）。RACF用于验证用户和IP地址是否匹配，如果不匹配则拒绝连接。\n\
    \n2000年，在伦敦的SQLPASS大会上，我询问了SQL Server是否能实现类似于DB2登录出口的功能。最终，LOGON TRIGGER功能到来了，我们现在有了实现类似功能的选项。在接下来的例子中，我将展示一种简单的安全实现方法，使用户只能从给定的子网进行连接。然而，此解决方案的安全性与可靠性，完全取决于其所依据的动态管理视图（DMV）中的数据。\n\
    \n### 注意事项\n**Caution** 请小心使用LOGIN触发器。此类触发器中的错误可能导致你无法再连接到数据库服务器，或者需要通过专用管理员连接（DAC）来绕过触发器。\n\
    \n以下是你需要了解的关键点：\n\n- 登录触发器在用户验证通过之后、获得访问权限之前执行。\n- 连接的源IP地址可以在`sys.dm_exec_connections`中找到。\n\
    - 本地连接显示为`<local machine>`。我不喜欢这样，但事实如此。亲爱的微软，为什么不使用`127.0.0.1`或服务器自己的IP地址呢？\n\
    - 如何将IP地址转换为可用于计算的形式。\n\n首先，你需要一个能将IP地址转换为整数的函数。为此，你可以稍微取巧，使用`PARSENAME()`函数。`PARSENAME()`函数设计用于返回数据库中对象名称的某一部分。因为数据库对象采用四部分命名约定，且各部分以句点分隔，所以该函数也可以轻松用于解析IP地址。\n\
    \n这是一个示例函数：\n\n```sql\nCREATE FUNCTION [fn_ConvertIpToInt]( @ip varchar(15) )\n\
    RETURNS bigint\nWITH SCHEMABINDING\nBEGIN\nRETURN (CONVERT(bigint, PARSENAME(@ip,1))\
    \ +\n        CONVERT(bigint, PARSENAME(@ip,2)) * 256 +\n        CONVERT(bigint,\
    \ PARSENAME(@ip,3)) * 65536 +\n        CONVERT(bigint, PARSENAME(@ip,4)) * 16777216)\n\
    END\n```\n\n接下来，你需要一个表来存放需要保护的用户名。该表将包含登录名和IP范围。IP地址以标准形式（例如`10.42.42.42`）存储，同时存储其整数值。整数值使你能够轻松检查一个IP地址是否在给定范围内。以下是一个可能用到的表结构：\n\
    \n```sql\nCREATE TABLE [LoginsAllowed]\n( [LoginName] [sysname] NOT NULL,\n  [IpFromString]\
    \ [varchar](15) NOT NULL,\n  [IpToString] [varchar](15) NOT NULL,\n  [IpFrom]\
    \ AS ([fn_ConvertIpToInt]([IpFromString])) PERSISTED,\n  [IpTo] AS ([fn_ConvertIpToInt]([IpToString]))\
    \ PERSISTED )\n\nALTER TABLE [LoginsAllowed]\nWITH CHECK\nADD CONSTRAINT [CK_LoginsAllowed_IpCheck]\n\
    CHECK (([IpFrom]<=[IpTo]))\nGO\n\nCREATE UNIQUE CLUSTERED INDEX [IX_LoginsAllowed]\
    \ ON [LoginsAllowed]\n( [LoginName] ASC,\n  [IpFrom] ASC,\n  [IpTo] ASC )\n```\n\
    \n然后创建一个用于执行触发器的用户。授予该用户对表和`SERVER STATE`的访问权限。如果不这样做，触发器将无法访问所需的DMV。示例如下：\n\n\
    ```sql\nCREATE LOGIN [LogonTrigger] WITH PASSWORD = 'Pr@s1ensGedBag#' ;\nDENY\
    \ CONNECT SQL TO [LogonTrigger];\nGRANT VIEW SERVER STATE TO [LogonTrigger];\n\
    CREATE USER [LogonTrigger] FOR LOGIN [LogonTrigger] WITH DEFAULT_SCHEMA=[dbo];\n\
    GRANT SELECT ON [LoginsAllowed] TO [LogonTrigger];\nGRANT EXECUTE ON [fn_ConvertIpToInt]\
    \ TO [LogonTrigger];\n```\n\n现在来看触发器本身。它将检查登录的用户是否存在于`LOGIN`表中。如果不存在，则允许登录。如果用户*确实存在于*表中，触发器将继续检查连接是否来自该用户IP范围所涵盖的IP地址。如果不是，则拒绝连接。触发器的代码如下：\n\
    \n```sql\nCREATE TRIGGER ConnectionLimitTrigger\nON ALL SERVER\nWITH EXECUTE AS\
    \ 'LogonTrigger'\nFOR LOGON\nAS\nBEGIN\n  DECLARE @LoginName sysname, @client_net_address\
    \ varchar(48), @ip bigint\n  SET @LoginName = ORIGINAL_LOGIN()\n  IF EXISTS (SELECT\
    \ 1 FROM LoginsAllowed WHERE LoginName = @LoginName)\n  BEGIN\n    SET @client_net_address=(SELECT\
    \ TOP 1 client_net_address\n                            FROM sys.dm_exec_connections\n\
    \                            WHERE session_id = @@SPID)\n    -- 如果连接来自 <local\
    \ host>，则修正该字符串\n    IF @client_net_address = '<local machine>'\n        SET @client_net_address\
    \ = '127.0.0.1'\n    SET @ip = fn_ConvertIpToInt(@client_net_address)\n    IF\
    \ NOT EXISTS (SELECT 1 FROM LoginsAllowed\n                  WHERE LoginName =\
    \ @LoginName AND\n                        @ip BETWEEN IpFrom AND IpTo)\n     \
    \   ROLLBACK;\n  END\nEND\n```\n\n测试此触发器时，请打开多个查询编辑器并连接到服务器。打开第二个查询编辑器可能会让你免于一些麻烦。触发器只在新建连接时执行。如果你的代码中存在导致你被锁定在数据库之外的逻辑缺陷，你可以使用第二个查询编辑器中的那个备用连接来删除触发器并重新获得访问权限。或者，你需要建立一个DAC连接来绕过触发器。\n\
    \n## 基于策略的管理\n\n基于策略的管理（PBM）允许你保护安装，或监控安装是否符合你定义的不同标准。PBM可以以多种方式使用。我曾合作过的一位客户遇到了带有企业版功能的数据库进入生产环境的问题。\n\
    \n这是一个问题，因为客户希望在生产环境中迁移到标准版。因此，他们建立了一个企业策略，在这些功能被使用时向他们发出警报。他们选择发出警报而不是完全阻止使用，因为他们认为向开发者解释他们的理由很重要，而不是直接强制决定。\n\
    \n## 日志记录与资源控制\n\n如果你需要记录对象何时被创建，你可能还想记录它们何时被删除。因此，一个删除数据库的过程将执行以下步骤：\n1.  `DROP\
    \ DATABASE`\n2.  `UPDATE DatabaseLog`\n\n当许多资源集中在一个地方时，例如在整合环境中，你需要控制这些资源的使用，以防止一个数据库占用所有资源。讨论SQL\
    \ Server中的资源控制时，需要考虑两个不同的层面：跨多个实例的资源使用，以及实例内单个用户的资源使用。\n\n一个进程（例如病毒扫描、备份代理等）可能会占用机器上的所有CPU资源，从而剥夺同一服务器上所有其他进程的CPU资源。SQL\
    \ Server无法防范此类问题。但Windows可以防范此类问题。Windows包含一个称为*Windows系统资源管理器（WSRM）*的功能，这是一个从Windows\
    \ Server 2008开始提供的、不太为人所知的功能。当WSRM运行时，它会监控CPU使用率，并在使用率超过70%时激活。你可以创建策略，在资源管理器激活时，为所有实例分配相等的CPU份额。\n\
    \n## 后续步骤"
  raw: 'Before having TCP/IP on the mainframe, it was common to use System Network
    Architecture (SNA) and Distributed Data Facility (DDF) to access data in DB2\.
    DDF allowed you to define user and Logical Unit (LU) correlations, and that made
    it possible to enforce that only one user-id could be used from a specific location.
    When TCP/IP was supported, IBM removed this functionality and wrote the following
    in the documentation about TCP/IP: “Do you trust your users?”. So, when implementing
    newer technology on the old mainframe, IBM actually made it less secure.


    Logon Triggers


    The solution to the problem of not being able to restrict TCP/IP access to specific
    locations was to use a logon user exit in DB2\. That exit was called *Resource
    Access Control Facility (RACF)*. (It was the security implementation on the mainframe.)
    RACF was used to validate that the user and IP address matched and, if not, to
    reject the connection.


    In 2000, at SQLPASS in London, I asked about the ability of SQL Server to do something
    similar to DB2’s logon exit feature. Finally, the LOGON TRIGGER functionality
    arrived, and we now have the option to do something similar. In the following
    example, I will show a simple way to implement security so that a user can connect
    only from a given subnet. This solution, though, is only as secure and trustworthy
    as the data in the DMVs that the method is based upon.


    chapter 1 ■ Be Your Developer’s Best FrienD


    n **Caution** Be careful about LOGIN triggers. An error in such a trigger can
    result in you no longer being able to connect to your database server or in you
    needing to bypass the trigger using the Dedicated Administrator Connection (DAC).


    Following is what you need to know:


    •


    The logon trigger is executed after the user is validated, but before access is
    granted.


    •


    It is in sys.dm_exec_connections that you find the IP address that the connection


    originates from.


    •


    Local connections are called *<local machine>* . I don’t like it, but such is
    the case.


    Dear Microsoft, why not use 127.0.0.1 or the server’s own IP address?


    •


    How to translate an IP address for use in calculations.


    First, you need a function that can convert the IP address to an integer. For
    that, you can cheat a little and use PARSENAME(). The PARSENAME() function is
    designed to return part of an object name within the database. Because database
    objects have a four-part naming convention, with the four parts separated by periods,
    the function can easily be used to parse IP addresses as well.


    Here’s such a function:


    CREATE FUNCTION [fn_ConvertIpToInt]( @ip varchar(15) )


    RETURNS bigint


    WITH SCHEMABINDING


    BEGIN


    RETURN (CONVERT(bigint, PARSENAME(@ip,1)) +


    CONVERT(bigint, PARSENAME(@ip,2)) * 256 +


    CONVERT(bigint, PARSENAME(@ip,3)) * 65536 +


    CONVERT(bigint, PARSENAME(@ip,4)) * 16777216)


    END


    Next you need a table that can contain the names of users who need protection.
    The table will include Login Name and ip-ranges. The IP address is written in
    normal form (for example, 10.42.42.42), and at the same time in its integer value.
    It is the integer value that enables you to easily check whether an IP address
    falls within a given range. Following is a table that you might use:


    CREATE TABLE [LoginsAllowed]


    ( [LoginName] [sysname] NOT NULL,


    [IpFromString] [varchar](15) NOT NULL,


    [IpToString] [varchar](15) NOT NULL,


    [IpFrom] AS ([fn_ConvertIpToInt]([IpFromString])) PERSISTED,


    [IpTo] AS ([fn_ConvertIpToInt]([IpToString])) PERSISTED )


    ALTER TABLE [LoginsAllowed]


    WITH CHECK


    ADD CONSTRAINT [CK_LoginsAllowed_IpCheck]


    CHECK (([IpFrom]<=[IpTo]))


    GO


    CREATE UNIQUE CLUSTERED INDEX [IX_LoginsAllowed] ON [LoginsAllowed]


    ( [LoginName] ASC,


    chapter 1 ■ Be Your Developer’s Best FrienD


    [IpFrom] ASC,


    [IpTo] ASC )


    Then create a user to execute the trigger. Grant the user access to the table
    and SERVER STATE. If you do not do this, the trigger will not have access to the
    required DMV. Here’s an example: CREATE LOGIN [LogonTrigger] WITH PASSWORD = ''Pr@s1ensGedBag#''
    ;


    DENY CONNECT SQL TO [LogonTrigger];


    GRANT VIEW SERVER STATE TO [LogonTrigger];


    CREATE USER [LogonTrigger] FOR LOGIN [LogonTrigger] WITH DEFAULT_SCHEMA=[dbo];


    GRANT SELECT ON [LoginsAllowed] TO [LogonTrigger];


    GRANT EXECUTE ON [fn_ConvertIpToInt] TO [LogonTrigger];


    Now for the trigger itself. It will check whether the user logging on exists in
    the LOGIN table. If not, the login is allowed. If the user *does exist* in the
    table, the trigger goes on to check whether the connection comes from an IP address
    that is covered by that user’s IP range. If not, the connection is refused. Here
    is the code for the trigger:


    CREATE TRIGGER ConnectionLimitTrigger


    ON ALL SERVER


    WITH EXECUTE AS ''LogonTrigger''


    FOR LOGON


    AS


    BEGIN


    DECLARE @LoginName sysname, @client_net_address varchar(48), @ip bigint


    SET @LoginName = ORIGINAL_LOGIN()


    IF EXISTS (SELECT 1 FROM LoginsAllowed WHERE LoginName = @LoginName)


    BEGIN


    SET @client_net_address=(SELECT TOP 1 client_net_address


    FROM sys.dm_exec_connections


    WHERE session_id = @@SPID)


    -- Fix the string, if the connection is from <local host>


    IF @client_net_address = ''<local machine>''


    SET @client_net_address = ''127.0.0.1''


    SET @ip = fn_ConvertIpToInt(@client_net_address)


    IF NOT EXISTS (SELECT 1 FROM LoginsAllowed


    WHERE LoginName = @LoginName AND


    @ip BETWEEN IpFrom AND IpTo)


    ROLLBACK;


    END


    END


    chapter 1 ■ Be Your Developer’s Best FrienD


    When you test this trigger, have more than one query editor open and connected
    to the server. Having a second query editor open might save you some pain. The
    trigger is executed only on new connections. If there is a logical flaw in your
    code that causes you to be locked out of your database, you can use that spare
    connection in the second query editor to drop the trigger and regain access to
    your database. Or you need to make a DAC connection to bypass the trigger.


    Policy-Based Management


    Policy-based management (PBM) allows you to secure an installation or to monitor
    whether the installation adheres to the different standards you have defined.
    PBM can be used in different ways. One customer I worked for had the problem of
    databases with enterprise features making it into production.


    This was a problem because the customer wanted to move to Standard Edition in
    the production environment. So they set up an enterprise policy to alert them
    whenever those features were used. They chose to alert rather than to block usage
    entirely because they felt it important to explain their reasoning to the developer
    instead of just forcing the decision.


    Logging and Resource Control


    If you need to log when objects are created, you probably also want to log whenever
    they are deleted. A procedure to drop a database, then, would perform the following
    steps:


    1\. DROP DATABASE


    2\. UPDATE DatabaseLog


    When many resources are gathered in one place, as in consolidation environments,
    you need to control the usage of those resources to prevent one database from
    taking them all. There are two different levels to think about when you talk about
    resource control in SQL Server: resource usage across multiple instances, and
    by individual users in an instance.


    One process (for example, a virus scan, backup agent, and so forth) could take
    all CPU resources on a machine and take away all CPU resources for all the other
    processes on that same server. SQL Server cannot guard itself against problems
    like that. But Windows can guard against that problem. Windows includes a feature
    called *Windows System Resource Manager (WSRM)*, which is a not-well-known feature
    available starting with Windows Server 2008\. When WSRM is running, it will monitor
    CPU usage and activate when usage rises above the 70 percent mark. You can create
    policies in which, when the resource manager is activated, you will allocate an
    equal share of CPU to all instances.


    Next Steps'
  trans: "# 大型机安全演进与 SQL Server 安全控制\n\n在大型机支持 TCP/IP 之前，通常使用系统网络架构（SNA）和分布式数据设施（DDF）来访问\
    \ DB2 中的数据。DDF 允许你定义用户与逻辑单元（LU）的关联，这使得可以强制规定一个特定位置只能使用一个用户 ID。当 TCP/IP 获得支持后，IBM\
    \ 移除了此功能，并在 TCP/IP 的文档中写下了这样的话：“你信任你的用户吗？”。因此，在将新技术应用于老旧的大型机时，IBM 实际上降低了其安全性。\n\
    \n## 登录触发器\n\n无法将 TCP/IP 访问限制在特定位置的问题，其解决方案是使用 DB2 中的一个登录用户出口。该出口被称为*资源访问控制设施（RACF）*（它是大型机上的安全实现）。RACF\
    \ 用于验证用户和 IP 地址是否匹配，如果不匹配则拒绝连接。\n\n2000 年，在伦敦的 SQLPASS 大会上，我询问了 SQL Server 是否能实现类似于\
    \ DB2 登录出口的功能。最终，LOGON TRIGGER 功能到来了，我们现在有了实现类似功能的选项。在接下来的例子中，我将展示一种简单的安全实现方法，使用户只能从给定的子网进行连接。然而，此解决方案的安全性与可靠性，完全取决于其所依据的动态管理视图（DMV）中的数据。\n\
    \n### 注意事项\n**注意事项** 请小心使用 LOGIN 触发器。此类触发器中的错误可能导致你无法再连接到数据库服务器，或者需要通过专用管理员连接（DAC）来绕过触发器。\n\
    \n以下是你需要了解的关键点：\n\n-   登录触发器在用户验证通过之后、获得访问权限之前执行。\n-   连接的源 IP 地址可以在`sys.dm_exec_connections`中找到。\n\
    -   本地连接显示为`<local machine>`。我不喜欢这样，但事实如此。亲爱的微软，为什么不使用`127.0.0.1`或服务器自己的 IP 地址呢？\n\
    -   如何将 IP 地址转换为可用于计算的形式。\n\n首先，你需要一个能将 IP 地址转换为整数的函数。为此，你可以稍微取巧，使用`PARSENAME()`函数。`PARSENAME()`函数设计用于返回数据库中对象名称的某一部分。因为数据库对象采用四部分命名约定，且各部分以句点分隔，所以该函数也可以轻松用于解析\
    \ IP 地址。\n\n这是一个示例函数：\n\n```sql\nCREATE FUNCTION fn_ConvertIpToInt )\nRETURNS\
    \ bigint\nWITH SCHEMABINDING\nBEGIN\nRETURN (CONVERT(bigint, PARSENAME(@ip,1))\
    \ +\n        CONVERT(bigint, PARSENAME(@ip,2)) * 256 +\n        CONVERT(bigint,\
    \ PARSENAME(@ip,3)) * 65536 +\n        CONVERT(bigint, PARSENAME(@ip,4)) * 16777216)\n\
    END\n```\n\n接下来，你需要一个表来存放需要保护的用户名。该表将包含登录名和 IP 范围。IP 地址以标准形式（例如`10.42.42.42`）存储，同时存储其整数值。整数值使你能够轻松检查一个\
    \ IP 地址是否在给定范围内。以下是一个可能用到的表结构：\n\n```sql\nCREATE TABLE [LoginsAllowed]\n( [LoginName]\
    \ [sysname] NOT NULL,\n  [IpFromString] varchar NOT NULL,\n  [IpToString] varchar\
    \ NOT NULL,\n  [IpFrom] AS (fn_ConvertIpToInt) PERSISTED,\n  [IpTo] AS (fn_ConvertIpToInt)\
    \ PERSISTED )\n\nALTER TABLE [LoginsAllowed]\nWITH CHECK\nADD CONSTRAINT [CK_LoginsAllowed_IpCheck]\n\
    CHECK (([IpFrom]<=[IpTo]))\nGO\n\nCREATE UNIQUE CLUSTERED INDEX [IX_LoginsAllowed]\
    \ ON [LoginsAllowed]\n( [LoginName] ASC,\n  [IpFrom] ASC,\n  [IpTo] ASC )\n```\n\
    \n然后创建一个用于执行触发器的用户。授予该用户对表和`SERVER STATE`的访问权限。如果不这样做，触发器将无法访问所需的 DMV。示例如下：\n\n\
    ```sql\nCREATE LOGIN [LogonTrigger] WITH PASSWORD = 'Pr@s1ensGedBag#' ;\nDENY\
    \ CONNECT SQL TO [LogonTrigger];\nGRANT VIEW SERVER STATE TO [LogonTrigger];\n\
    CREATE USER [LogonTrigger] FOR LOGIN [LogonTrigger] WITH DEFAULT_SCHEMA=[dbo];\n\
    GRANT SELECT ON [LoginsAllowed] TO [LogonTrigger];\nGRANT EXECUTE ON [fn_ConvertIpToInt]\
    \ TO [LogonTrigger];\n```\n\n现在来看触发器本身。它将检查登录的用户是否存在于`LOGIN`表中。如果不存在，则允许登录。如果用户*确实存在于*表中，触发器将继续检查连接是否来自该用户\
    \ IP 范围所涵盖的 IP 地址。如果不是，则拒绝连接。触发器的代码如下：\n\n```sql\nCREATE TRIGGER ConnectionLimitTrigger\n\
    ON ALL SERVER\nWITH EXECUTE AS 'LogonTrigger'\nFOR LOGON\nAS\nBEGIN\n  DECLARE\
    \ @LoginName sysname, @client_net_address varchar(48), @ip bigint\n  SET @LoginName\
    \ = ORIGINAL_LOGIN()\n  IF EXISTS (SELECT 1 FROM LoginsAllowed WHERE LoginName\
    \ = @LoginName)\n  BEGIN\n    SET @client_net_address=(SELECT TOP 1 client_net_address\n\
    \                            FROM sys.dm_exec_connections\n                  \
    \          WHERE session_id = @@SPID)\n    -- 如果连接来自 <local host>，则修正该字符串\n  \
    \  IF @client_net_address = '<local machine>'\n        SET @client_net_address\
    \ = '127.0.0.1'\n    SET @ip = fn_ConvertIpToInt(@client_net_address)\n    IF\
    \ NOT EXISTS (SELECT 1 FROM LoginsAllowed\n                  WHERE LoginName =\
    \ @LoginName AND\n                        @ip BETWEEN IpFrom AND IpTo)\n     \
    \   ROLLBACK;\n  END\nEND\n```\n\n测试此触发器时，请打开多个查询编辑器并连接到服务器。打开第二个查询编辑器可能会让你免于一些麻烦。触发器只在新建连接时执行。如果你的代码中存在导致你被锁定在数据库之外的逻辑缺陷，你可以使用第二个查询编辑器中的那个备用连接来删除触发器并重新获得访问权限。或者，你需要建立一个\
    \ DAC 连接来绕过触发器。\n\n## 基于策略的管理\n\n基于策略的管理（PBM）允许你保护安装，或监控安装是否符合你定义的不同标准。PBM 可以以多种方式使用。我曾合作过的一位客户遇到了带有企业版功能的数据库进入生产环境的问题。\n\
    \n这是一个问题，因为客户希望在生产环境中迁移到标准版。因此，他们建立了一个企业策略，在这些功能被使用时向他们发出警报。他们选择发出警报而不是完全阻止使用，因为他们认为向开发者解释他们的理由很重要，而不是直接强制决定。\n\
    \n## 日志记录与资源控制\n\n如果你需要记录对象何时被创建，你可能还想记录它们何时被删除。因此，一个删除数据库的过程将执行以下步骤：\n1.  `DROP\
    \ DATABASE`\n2.  `UPDATE DatabaseLog`\n\n当许多资源集中在一个地方时，例如在整合环境中，你需要控制这些资源的使用，以防止一个数据库占用所有资源。讨论\
    \ SQL Server 中的资源控制时，需要考虑两个不同的层面：跨多个实例的资源使用，以及实例内单个用户的资源使用。\n\n一个进程（例如病毒扫描、备份代理等）可能会占用机器上的所有\
    \ CPU 资源，从而剥夺同一服务器上所有其他进程的 CPU 资源。SQL Server 无法防范此类问题。但 Windows 可以防范此类问题。Windows\
    \ 包含一个称为*Windows 系统资源管理器（WSRM）*的功能，这是一个从 Windows Server 2008 开始提供的、不太为人所知的功能。当\
    \ WSRM 运行时，它会监控 CPU 使用率，并在使用率超过 70%时激活。你可以创建策略，在资源管理器激活时，为所有实例分配相等的 CPU 份额。\n\n\
    ## 后续步骤"
- fmt: '当所有细节都到位时，你的目标框架正在成形，环境也正在慢慢创建，你必须思考如何使你的努力取得成功。解决方案的一部分是选择正确的开发人员作为起点。大多数人可能会从最大或最重要的应用程序中抽调开发人员，但我认为那将是一个错误。从简单、小型、容易的系统开始，在开始之前几乎就能保证自己成功。这样你将悄然奠定良好的基础。如果出现问题，它们很可能比你选择一个庞大复杂的系统作为起点时更容易解决。从小处开始的另一个原因是，你能在组织内逐步积累积极的故事和满意的“大使”。长远来看，这些满意的“大使”将转化为更多系统迁移到你的环境中。


    ## Chapter 2: Getting It Right: Designing the Database for Performance


    *By Louis Davidson*


    本书中的大多数主题都与管理任务相关：索引、性能调优、硬件、备份、压缩等等。很多时候，数据库管理员（DBA）对他们负责的数据库设计没有发言权。但即使你无法控制设计，了解一个好的设计应该是什么样子也是有益的——至少，当你与某个软件较劲时，你可以更具体地提出抱怨。


    在本章中，我将概述数据库系统设计的整个过程，讨论使数据库性能良好的因素。良好的性能始于过程的早期，远在代码编写之前，即在项目定义阶段。（不幸的是，它实际上始于远高于本书任何读者薪资等级的层面。）当项目在董事会会议室里被构想时，人们对于如何创建软件知之甚少，对时间的严苛规律更是理解甚少。计划常常归结为“我们需要软件X，并且我们需要它在一个完全出于…嗯，某个不那么令人愉快的地方想出的日期前完成。”因此，计划过程被缩短，你接手了混乱的种子。无论你在这个过程中扮演什么角色，都需要采取一些步骤来最终获得一个可行的、可接受的设计，而这正是你作为数据库专业人员需要确保发生的事情。


    在本章中，我将带你了解数据库设计的过程，并强调许多使本书其他章节的目标更容易实现的因素。以下是我将要讨论的主要话题：


    *   **需求** 在新数据库诞生之前，需要做一些准备工作。许多数据库系统性能极差，因为最初设计的系统与实际需要的系统毫无相似之处。

    *   **表结构** 数据库的结构非常重要。Microsoft SQL Server 以某种方式工作，因此以最大化 SQL Server 引擎性能的方式来构建你的表至关重要。

    *   **设计测试** 测试过程应超越代码，延伸到设计过程中，该过程的主要目标是确保创建的软件符合用户的需求。


    数据库设计过程并非特别困难，却常常做得很糟糕。在我多年的写作、工作、演讲和在论坛回答问题的过程中，大约90%的问题都源于那些规划不善、构建不当、并且（也许最重要的是）因为访问这些结构的大量代码而无法更改的数据库。只需一点规划和一些关于
    SQL Server 引擎基础模式的知识，你就会惊讶于自己所能取得的成果，以及你能比最初预期更快地完成它。


    ### Requirements


    任何实现的基础是理解到底要创建什么。


    编写软件的目标是解决某个问题。通常，这是一个简单的业务问题，比如创建一个会计系统，但有时它也是一个有趣的问题，比如在主题公园游乐设施上调度乘客，创建电视节目表，建立音乐库，或解决其他问题。


    作为软件创造者，我们的目标应该是自动化人们必须做的无脑工作，让他们用大脑来做决策。


    需求受到了沉重的打击，因为它们是经典“瀑布式”软件创建方法论中的第一步。编程界普遍存在的一个最大谎言是瀑布式方法完全错误。瀑布式方法指出，一个项目应按照以下步骤运行：


