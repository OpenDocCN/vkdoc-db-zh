    # 发布管理


    ## 发布流程概述


    在我们讨论发布管理这个宏大的主题时，许多需要考虑的事项、文档和任务将会逐一浮现。事实上，这些正是本章后续要重点关注的三大领域。


    我们将深入探讨那些您应该优先考虑的要点。这将帮助您编写详细描述任务的文档。当您阅读接下来的观点时，请思考如何将其应用到您的拓扑结构和系统中。请记住，没有一个流程是绝对完美、适用于所有人或所有情况的。选取那些适合您的想法，并将其添加到您的发布管理流程中。如果您目前还没有一个流程，本章将帮助您创建一个。


    ## 考虑因素


    在规划发布管理策略时，虽然有诸多考虑因素，但我们将深入探讨一些具体的方面，并希望阐明您为何应考虑它们的一些原因。我们的目标是创建一个平衡的流程，使您能够以可控的方式进行发布，避免负面事件的发生。在讨论过程中，请考虑到您系统的具体情况。以下是我们将讨论的考虑因素概述：


    - **目标：** 定义您的发布流程目标。

    - **环境：** 详细描述您的环境，从上到下，从开发到生产。

    - **发布流程：** 定义一个发布流程，与所有相关人员共享并获得他们的承诺。

    - **涉及人员：** 指明谁将参与此流程。

    - **版本控制：** 确定一个安全的地方来跟踪您的代码。

    - **回滚流程：** 始终保留一种回退到已知状态的方法。


    ## 目标


    首先且最重要的是，您应详细说明您对发布管理的目标是什么。我的目标可能与您的不同。您的目标可能会随着时间推移而改变，也可能因为引入新想法、新管理者等因素而需要调整。无论您当前的目标是什么，请继续审视它们，并在执行发布流程时与他人讨论。如果速度至关重要，这将帮助您精简发布流程的任务和规程。如果安全性是您的目标，其他任务可能会增多并融入您的流程中。让我们将目标精简到几个简单的项，并进一步定义这些术语。我认为以下几点是我发布管理流程的核心目标：


    - 降低风险

    - 控制变更

    - 成功执行变更

    - 遵循最佳实践

    - 架构/设计变更

    - 审查变更


    ### 降低风险


    您的系统存在并运行是有其目的的，因此降低其风险应该是一个显而易见的目标。阻止任何可能影响您系统的变更发生，说起来容易做起来难。保持其停滞不前并非可选方案，因此让我们直面不可避免的事情，并努力降低变更可能引入的风险。


    我们需要采取措施，创建一个为每个系统量身定制的流程，借鉴其他发布管理流程迭代的要素，以找到那个完美适合您、保护您并降低您风险的流程。当您审查代码、测试发布流程以及执行其他任务时，始终牢记您需要以降低风险的眼光来完成所有任务。这并不意味着您不应该实施变更；而是试图将变更包裹进一个优雅、可控且成功的流程中。


    ### 控制变更


    控制变更仅仅意味着，系统中发生的任何变更都遵循一个经过审查、达成一致、详细描述并记录在案的流程。换句话说，就是让正确的人在正确的时间，以正确的顺序执行正确的任务。您需要定义这一切。其他人可以给您建议，甚至可以为您规划流程并与您一起规划；然而，最终决定权在您手中。请记住，您是数据专业人士，确保系统安全、可用且使用得当是您的职责所在。


    为了控制变更，您应该花时间了解您的整个拓扑结构。理解数据如何流入和流出。尽可能多地了解您的系统。了解系统如何运作、如何保障安全以及数据如何在其中流动，将使您能更好地控制变更对系统的影响。


    ### 成功执行变更


    成功的变更可以定义为按预期执行、没有负面影响的变更。变更引入到系统后，没有引发任何异常，也没有出现意想不到的系统功能退化。这并不意味着变更包含无缺陷的代码或完美的功能。我们之前已经看到，引入的功能可能并非预期，或者表现与预期不同。成功的变更仅仅是成功地引入了变更，无需将代码回滚到先前状态。尽管目标是成功执行变更，但您有必要采取必要步骤，确保包含适当的测试和万无一失的回滚流程。我们将在本章后面讨论这一点。


    ### 遵循最佳实践


    确定并记录您的发布最佳实践。您应该参考微软发布的最佳实践（例如，可在 `http://msdn.microsoft.com/en-us/practices/ff921345`
    找到一些）。您也应该在书籍、博客、培训等资源中寻找最佳实践。搜寻那些能传授他人所认为的最佳实践的来源。有许多可用的示例供您挑选和定制，使其适合您的系统。您可能已经在组织内部拥有一些行之有效的最佳实践。也请使用这些实践。


    无论来源如何，将这些规则纳入您的发布管理流程和文档中。不要害怕在重复发布管理流程迭代时添加或删除它们。始终审查您的流程并不断对其进行调整。当您发现有助于更好执行发布的内容时，将其整合到您的流程中。


    当您实施最佳实践时，确保这些规则得到遵守是下一个合乎逻辑的步骤。如果您选择多走一英里，可以包括一种监控系统的方法，以防止违反您所选最佳实践的变更。基于策略的管理（`PBM`）是
    SQL Server 提供的一个解决方案，它正是做这个的。`PBM` 允许您在 SQL Server 系统上定义和执行策略，从而防止不希望的变更。本章不会深入探讨如何实现
    `PBM`。


    自行开发的解决方案也可以防止和跟踪变更。使用工具来控制变更也会有所帮助。

    '
- fmt: '# 最佳实践的应用


    最佳实践也可以在各种 SQL Server 书籍中找到。Joe Celko 写了一本名为 SQL Programming Style (Morgan Kaufmann,
    2005) 的书，Louis Davidson 则有一本名为 Pro SQL Server 2012 Relational Database Design
    and Implementation (Apress, 2012) 的书。这两种资源都将帮助你找到最佳实践。参考你的经理、队友和其他同事的意见，以确定哪些最佳实践已经在被遵循，并找出它们如何能融入你的发布流程。


    假设你已决定实施一项最佳实践，即禁止在你的系统中使用即席查询（ad-hoc queries）。如果存在这样一条规则且所有相关方都同意，那么当对拟议的发布进行审查时，代码如果包含即席查询，就会被退回重新设计。这让审查者免于陷入解释为什么这是坏事的困境。这已经是事先达成一致、并添加到你的流程中的，只是在审查时多了一个需要检查的项。


    一个屡次帮助我的建议是：创建真正包含数据库变更的存储过程。假设要发布的变更将执行一个 `ALTER TABLE` 语句，向现有表添加一个列。这个变更将是一个添加列的
    `ALTER TABLE T-SQL` 语句。你可以把这段代码放在一个存储过程中。该存储过程可以包含执行验证的代码。也许应该在执行 `ALTER TABLE`
    语句之前，添加一个验证来检查此列是否存在。语句执行后，你可以检查此列是否存在。我建议用一个事务包裹整个 `T-SQL` 代码，这样后置验证可以根据验证结果决定提交或回滚你的变更。作为发布的一部分，你将创建这个存储过程，执行它，然后删除它。当存储过程执行时，它会为你执行
    `ALTER TABLE` 命令。


    你可以将所有变更捆绑到一个或多个存储过程中。这些存储过程就是你实际发布的内容。然后你执行它们，这会执行变更，最后你删除它们。因此，它们在你的环境中只存在很短的时间。它们执行一项任务并被移除。这允许进行受控的变更，并确保执行时它们只执行期望的任务。将这些脚本保存到一个发布存储位置，将使你在未来能够跟踪它们。你也可以将这些脚本保存在你喜欢的源码控制系统中。我们将在本章后面进一步讨论这一点。


    通过如前所述的受控方法执行变更，你将限制可能引入系统中的即席变更的数量。一旦达到发布代码变更的阶段，你可以通过一个工具轻松地执行变更，该工具会为你执行操作，这进一步从变更过程中移除了人为因素。你只需点击按钮；它会执行所有可能的任务，并根据结果提交或回滚。你还可以将执行的步骤保存在一个历史收集系统中。记住，这是我们的目标之一。


    你可能想包含的其他最佳实践包括：命名规范、限制数据变更数量的事务级别、在自动化过程中编码一个中断点等等。


    命名规范将帮助你的数据库对象更清晰、更易于理解。精心选择和遵循的命名规范将有助于导航和理解你的数据库。我敢说，即使是一个糟糕的标准，只要被遵循，也比选择随机的标准并同时遵循它们要好。花些时间研究你已有的命名规范，并确保未来你有一个文档化的命名标准并完全遵循它。


    当变更涉及大量数据时，实施一次变更数量的上限，并将这个数量包裹在一个事务中，可以帮助加快整个过程。这比应用所有数据变更然后提交，或者更糟的是逐个应用它们要高效得多。你可能需要做一些研究来为每个大数据变更找到合适的数量。有些数据变更可能不需要事务和数量限制。你必须在非生产环境中测试这一点。你可以并且应该确保在测试中比较适当数量的数据。测试一个类似数据的小版本，在你实际在生产环境中执行变更时是帮不上忙的。


    有些变更可能需要很长时间才能执行。当变更长时间运行时，如果你有能力在中途优雅地停止它，你就可以轻松地中止一个潜在的长运行进程。例如，你可以实现一个循环来检查某个表中的特定值。然后，根据这个值的结果，你可以继续或中止变更，从而给你一个退出的选项。这通常不是变更中实现的功能。然而，你可以实现这一点，并在长运行进程或更新中设置一个断点。


    ## 架构/设计变更


    你能越早参与到变更过程中，就越能更好地降低风险。这并不是说你是在所有数据库事物中的主题专家（SME）。然而，作为这个领域的专家，确实让你有能力在可能影响最终产品的决策早期就参与其中。


    正如你是数据库专家一样，也要依靠其他领域的其他主题专家，并确保你们都尽早参与到变更过程中。花必要的时间尽可能多地了解你们各自的系统，以及它们如何与数据交互，特别是与你的数据库交互。尽可能多地参与所有与数据库相关的事务，你将为成功的发布做好更充分的准备。


    你可能会对踏入这个流程阶段感到犹豫。对你、你的经理和其他人来说，这似乎不是你的职责或职位描述。只需提醒自己和他人，你有数据库经验。提醒大家你是一个可用的资源。参与进去。强迫自己进入开发过程。要温和地、尊重地去做，但必须去做。如果你能获得进入这个开发阶段的机会，你将有能力在整个开发过程直至实际发布期间影响变更。


    ## 审查变更


    至关重要的是，每一段代码在成为你永久拓扑结构的一部分之前，都应被审查，最好由多方进行。如果你确保你自己和其他具备必要技能的人对变更进行了彻底的审查，你将更好地武装自己，以降低系统风险。这需要时间。


    你必须安排这个时间。你必须留出必要的时间，让你和其他人能够适当地审查代码，权衡其变更与整个拓扑结构的关系，并相应地进行。


    即使是一个简单的变更也是一个“变更”，需要给予适当的关注。你最终创建的过程可能会有几个步骤。即使这些步骤花费的时间很少，也要确保你按各自的顺序执行它们，以降低风险。'
  raw: 'Best practices can also be found in various SQL Server books. Joe Celko has
    written a book called *SQL*


    *Programming Style* (Morgan Kaufmann, 2005) and Louis Davidson has a book called
    *Pro SQL Server 2012*


    *Relational Database Design and Implementation* (Apress, 2012). Both these resources
    will help you find best practices. Look to your managers, teammates, and other
    coworkers to determine what best practices are already being followed, and find
    where they can fit into your release process.


    Let us assume that you have decided to implement a best practice that prohibits
    the use of ad-hoc queries in your system. If such a rule exists and all parties
    agree upon it, then when a review is performed of a proposed release, the code
    can be kicked back for redesign because it contains ad-hoc queries. This leaves
    the reviewer out of the mess of explaining why this is a bad thing. It has been
    agreed upon already, added to your process, and simply becomes a checkmark to
    look for upon review.


    A suggestion that has helped me time and time again is to create stored procedures
    that actually contain a database change. Let us assume that a change to be released
    will perform an alter table statement, adding a column to an existing table. This
    change will be an ALTER TABLE T-SQL statement that adds a column. You can put
    this code within a stored procedure. The stored procedure can contain code that
    performs validations. Maybe there should be a validation that checks for the existence
    of this column, prior to performing the ALTER TABLE statement. After the statement
    has been performed, you can check for the existence of this column. I would suggest
    that this entire T-SQL code be wrapped with a transaction, so that the post validation
    can either commit or roll back your change, based on the validation results. As
    part of your release, you would create this stored procedure, execute it, and
    then drop it. When the stored procedure is executed, it will perform the ALTER
    TABLE command for you.


    You can bundle all the changes into a single stored procedure or multiple stored
    procedures. These stored procedures are what you actually release. Then you execute
    them, which executes the changes, and 201


    CHAPTER 8 ■ RElEAsE MAnAgEMEnT


    finally you drop them. So, they exist for a short period within your environment.
    They perform a task and are removed. This allows for a controlled change, and
    will ensure that when executed, they perform their desired tasks only. Saving
    these scripts into a release storage location will allow you to keep track of
    these in the future. You could also save these scripts in your favorite source
    control system. We will discuss this further, later in the chapter.


    By executing changes via a controlled method, as previously explained, you will
    limit the quantity of ad-hoc changes that can be introduced into your system.
    Once you reach the stage of releasing code changes, you can easily execute the
    changes via a tool that will perform the executions for you, which further removes
    the human element from the change process. You would click the button; it would
    perform all the tasks possible, and commit them or roll back, depending on the
    result. You could also save the performed steps within a historical collection
    system. Remember that this is one of our goals.


    Other best practices that you might want to include could be naming conventions,
    transaction levels limiting quantity of data changes, coding a breakout point
    in automated processes, and so on.


    Naming conventions will help your database objects be cleaner and better understood.
    Well chosen and followed naming conventions will help with navigating and understanding
    your database. I would venture to say that even a bad standard, as long as it
    is followed, is better than choosing random standards and following them all simultaneously.
    Take some time to research the naming conventions that you already have in place,
    and ensure that going forward you have a documented naming standard and follow
    it completely.


    When changes involve large quantities of data, implementing a cap on how many
    changes will occur at once, and wrapping this quantity within a transaction, can
    help speed up the overall process. This is much more efficient than applying all
    data changes at once and then committing, or worse yet, applying them one at a
    time. You might need to do some research to find the proper quantity for each
    large data change. Some data changes might not need a transaction and quantity.
    You will have to test this out in a nonproduction environment. You can and should
    ensure that you compare appropriate quantities of data in your testing. Testing
    a small version of similar data will not help you when you actually perform the
    change in production.


    Some changes might take a long time to perform. While the change is churning on
    and on, if you had the ability to stop it midstream, gracefully, you could easily
    halt a potentially long-running process. For example, you could implement a loop
    that checks a table for a certain value. Then, based on the result of this value,
    you could continue or halt the change, thereby giving you an out. This is a feature
    that is not usually implemented in changes. However, you can implement this, and
    instill a breakpoint in long-running processes or updates.


    **Architect/Design Changes**


    The earlier that you can be involved in the change process, the better you will
    be able to mitigate risk. It’s not to say that you are the subject matter expert
    (SME) in all things database. However, being an expert in this field does allow
    you the ability to weigh in on decisions early on that could impact the final
    product.


    Just as you are the expert in databases, lean on other SMEs in other areas, and
    ensure that you are all involved in the change process as early on as possible.
    Take the time necessary to learn as much as you can about your respective systems,
    and how they interact with data and, especially, with your databases. Be as involved
    as you can with all things database, and you will be better prepared for a successful
    release.


    You might be hesitant at stepping into this stage of the process. It might seem
    to you, your managers, and to others that this is not your place or job description.
    Simply remind yourself and others that you have experience with databases. Remind
    them all that you are a resource. Get in there. Force yourself in on the development
    process. Do it gingerly, respectfully, but do it. If you can gain access to this
    stage of development, you will be armed to impact changes all through the development
    process and into the actual release period.


    CHAPTER 8 ■ RElEAsE MAnAgEMEnT


    **Review Changes**


    It is imperative that each piece of code be reviewed, hopefully by multiple parties,
    along the route to becoming part of your permanent topology. If you ensure that
    you and others, with the necessary skills, perform a thorough review of changes,
    you’ll be better armed to reduce risk to your system. It takes time.


    You must schedule this time. You must take the time necessary that will allow
    you and others to appropriately review the code, weigh its changes against the
    entire topology, and proceed accordingly.


    Even a simple change is a “change” and needs to be given proper attention. The
    process that you ultimately create will likely have several steps. Even if these
    steps take little time, make sure you take them, in their respective order, so
    as to reduce risk.'
