    What if you do not know what a lot of the information in Table 18-2 means? This
    is why you put together a multidisciplined project team with members from all
    areas of technology that will be responsible not only for gathering this data,
    but for working with you to analyze the data. The goal of the project team is
    to bring together all of the data, analyze it, and determine what needs to be
    addressed based on the goals the business has defined.


    Configuration data by itself is useful, but often it needs to be paired with performance-based
    runtime information to create the full picture. The configuration data in Table
    18-2 will be used later, after you have collected additional application data,
    additional runtime data, and historical performance data. The data gathered often
    leads to other questions, other data that will be captured, and ultimately, other
    conclusions.


    ## Collecting System Performance Data


    After you have the base information about the environment, you can collect performance
    data. Depending on your environment, some or all of the performance data might
    already exist in some format that you and your team members can access without
    a lot of extra effort. Most environments have some level of monitoring in place
    already, which generates alerts based on certain conditions and also stores the
    performance metrics for a period of time. Historical performance information is
    a treasure trove of information if it is available because the data can be analyzed
    to establish trends over time. The farther back you can go, the more trends you
    can see. If you are lucky, you might have captured the performance data from the
    last peak time frame. If any of this type of data does exist, be sure to use it,
    back it up, and save it for future analysis. This type of information is valuable
    because most products archive or aggregate older data, which results in a loss
    of data fidelity.


    Whether or not you already have performance data for the application and database
    servers, SAN, and network, you still need to have current information. More importantly,
    you need to have the right items captured. Capturing information for the sake
    of capturing information is a pointless exercise. This effort does not need to
    cost a lot of money or take a lot of work to put in place. Several tools are available
    that capture performance data. If you do not have money in the budget to purchase
    them, you can leverage native tools that Microsoft provides for free. You can
    use Performance Monitor (often referred to as just `Perfmon`), which is built
    into Windows, to collect hundreds of performance metrics with very little overhead.
    `Perfmon` allows users to create a data collector, which is a saved profile that
    contains a list of the objects to capture, the file location for the data, the
    format of the file, the start and end times, and the interval, which can be measured
    down to the second. Remember, though, that just because it can capture data every
    second does not mean you should—or could—do it. (For example, collecting data
    this frequently might add unnecessary overhead, depending on how much data you
    are capturing.) You need to think about the goal of your data collector and how
    frequently you need the data to be collected to meet that goal.


    What to capture will depend on the application as well as what technologies your
    application is using.


    For SQL Server and the related server-level data, the goal of the collection process
    is to capture information related to the processor, the network, the disk, memory,
    and SQL Server itself. The goal of the data capture is to identify if there is
    any pressure within a certain layer. If there is, you should capture additional
    information to understand why that is happening. The secondary goal of the data
    capture is to be able to use this data as a performance baseline.'
