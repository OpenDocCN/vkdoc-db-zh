    and end dates for when you executed the changes so the import actually retrieves
    data.


    ```sql

    sqoop import --connect "jdbc:sqlserver://myserver.domain.com;username=mysqluser;
    password=mypwd;database=AdventureWorks" --query "SELECT * FROM cdc.Production_Product_CT
    where $CONDITIONS and ModifiedDate between ''2004-03-11 08:00:00'' and ''2004-03-11
    09:00:00''" --target-dir /data/ProductAudit -m 1

    ```


    ## Exporting from HDFS


    You’re successfully putting every change made to the `Product` table into HDFS,
    but what do you do with it?


    I’m glad you asked, and next we’ll develop two different ways to work with it.
    One approach you can take is to export a subset of the data and put it back into
    SQL Server. The advantage of this is that your applications, developers, and analysts
    can use it in ways they are used to, in particular employing tools that they’re
    familiar with, such as T-SQL. An alternative method to using the data is to query
    and analyze it as it is in HDFS. I’ll display the former technique and once again
    use Sqoop to export it from HDFS into SQL Server. To drop it in SQL Server, I
    have to have a database and table to target. The latter technique will use Hive
    to work with the data directly in HDFS.'
  raw: 'There are four new files, one for each MapReduce task. Each file has a different
    number of rows because Sqoop doesn’t balance the load among the four MapReduce
    tasks, but simply divides the work by getting the min and max values of the primary
    key and arithmetically splitting it into four groups. This way, each row that
    changed on 2012-07-19 ends up in one, and only one, of the four files. Notice
    too that each file has only the four columns you requested in the Sqoop job.


    chapter 17 ■ Big Data for the SQL Server DBa


    Just to show that there’s more than one way to accomplish anything, the following
    script gets the same results. What is interesting about this technique is that
    you can write SQL queries using Sqoop. Notice the use of the $CONDITIONS token
    in the where clause. Sqoop replaces this token with a unique condition expression
    so the job can be run in parallel and each task get a different range of data.


    sqoop import --connect "jdbc:sqlserver://myserver.domain.com; username=mysqluser;
    password=mypwd; database=AdventureWorks"


    --query "SELECT ProductID,ProductNumber,ListPrice,ModifiedDate FROM Production.Product
    where $CONDITIONS and ModifiedDate between ''2012-07-19'' and ''2012-07-20''"


    --target-dir /data/ProductTable -m 4 --split-by ProductID -append


    This Sqoop job executes several queries in SQL Server. One of the queries gets
    the minimum and maximum ProductID. Sqoop uses the results of this query to divide
    the ProductID into four equal parts so it can execute four separate queries in
    parallel that access a different set of rows in the table (but not necessarily
    an equal number of rows).


    SELECT MIN(ProductID), MAX(ProductID) FROM


    (SELECT ProductID,ProductNumber,ListPrice,ModifiedDate FROM Production.Product
    where (1 = 1) and ModifiedDate between ''2012-07-19'' and ''2012-07-20'') AS t1


    Sqoop then executes the following four queries in SQL Server. The $CONDITIONS
    expression is replaced in each query by the clause where ProductID between MIN
    and MAX. See how the MIN and MAX values for each query are determined by the results
    of the calculation performed in the previous query that split the data being read
    into four parts.


    SELECT ProductID,ProductNumber,ListPrice,ModifiedDate FROM Production.Product
    where ( ProductID >= 1 ) AND ( ProductID < 251 ) and ModifiedDate between ''2012-07-19''
    and ''2012-07-20


    SELECT ProductID,ProductNumber,ListPrice,ModifiedDate FROM Production.Product
    where ( ProductID >= 251 ) AND ( ProductID < 501 ) and ModifiedDate


    between ''2012-07-19'' and ''2012-07-20


    SELECT ProductID,ProductNumber,ListPrice,ModifiedDate FROM Production.Product
    where ( ProductID >= 501 ) AND ( ProductID < 750 ) and ModifiedDate


    between ''2012-07-19'' and ''2012-07-20


    SELECT ProductID,ProductNumber,ListPrice,ModifiedDate FROM Production.Product
    where ( ProductID >= 750 ) AND ( ProductID <= 999 ) and ModifiedDate between ''2012-07-19''


    and ''2012-07-20


    The result is no different from the prior Sqoop job you executed and the data
    is again split into four files.


    As mentioned previously, Table 17-4 shows a list of the Sqoop arguments we’ve
    used with their descriptions. To see a full list of Sqoop parameters[, go to http://sqoop.apache.org/.You’ve
    done some](http://sqoop.apache.org/.You%E2%80%99ve)


    good work, but when you show the marketing people, you learn that the requirements
    have changed. They really want a complete audit trail of every change made to
    a product. The data load script you’ve developed with Sqoop gets the last version
    of a product for the date range you used in the query. If you run the script once
    per day, changing the date range each time, you’ll get the latest row for every
    product that was changed during that day. You’re losing all of the information
    in between, so you would lose the change detail if a product changed five times
    in between your jobs running. You want all of the changes made to a product, so
    when a price is lowered by 50 percent for five minutes, you would know about it
    because you will capture the change.


    chapter 17 ■ Big Data for the SQL Server DBa


    Also, your dynamic pricing system has gone crazy. It is now changing prices on
    products 20 times per day, and since you have 500,000 active products, that’s
    10 million rows each day you’ll capture in HDFS.


    Good thing you’ve got Hadoop ready to go, because now you’re really getting some
    Big Data! For the future, marketing is already saying they want to see more than
    just price changes. They also want to know the inventory levels, cost, and other
    important data about a product every time it changes.


    Let’s see how you can make better use of SQL Server to get this work done. SQL
    Server can identify every change to the Product table with Change Data Capture
    (CDC). CDC will store an image of every insert, a before and after image of every
    update, and a before image of every delete. To enable CDC for the AdventureWorks
    database and the Product table, execute the following:


    Use AdventureWorks


    Go


    exec sp_cdc_enable_db


    Go


    exec sp_enable table @source_schema=''Production'', @source_name=''Product'',
    @capture_instance Go


    Next, change some data so you have data in the CDC tables. To do this, execute
    the following T-SQL


    commands for the AdventureWorks database. These inserts, updates, and deletes
    will generate change rows that are stored in the cdc.dbo_Product_CT table.


    INSERT INTO Production.Product(Name, ProductNumber, MakeFlag, FinishedGoodsFlag,


