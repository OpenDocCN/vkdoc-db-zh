    Trace file provider


    Unlike the rowset provider we discussed earlier, the file provider writes directly
    to files and guarantees lossless delivery of trace data. Just like rowset provider
    it uses internal buffers to dispatch the trace data.


    The buffers get flushed every 4 seconds to maximize the IO performance by using
    large block writes. It’s less expensive to write one large continuous block of
    data than many small ones. Because the file provider guarantees lossless delivery,
    it can’t drop events and if there are too many of them the whole system can stop.
