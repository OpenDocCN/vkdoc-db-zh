    # 第 17 章：面向 SQL Server 数据库管理员的大数据


    MapReduce 是本章最重要的部分，因此让我们更进一步地举例说明，以强调我们如何用少量的代码让 Hadoop 完成大量工作。在现实场景中，如果数据分布在数百台数据节点上，这个简单的作业可以同时在数百台计算机上执行，每个节点承担自己那部分负载。虽然我们的代码片段在数据处理方式上扮演着重要角色，但还有很多我们看不见的过程在发生。涉及这么多服务器，你可能在想背后一定有大量的协调、组织和管理工作在进行——你是对的。


    MapReduce 框架负责处理这些事务，它会在包含所需数据的数据节点上启动`MapReduce`作业，监控作业的成功或失败状态，并在数据被独立处理完成后将其汇总。如果一个作业失败，框架可以重新执行它，这很有用，因为你可能同时在数百台服务器上运行作业，你不希望因为单台机器的故障而中断你的工作。数据节点可能因各种原因（如硬件问题、内存压力、磁盘空间不足等）而故障，但`MapReduce`框架可以在拥有相同数据集的另一台服务器上重启该作业，以保持流程持续运行。


    ![图片 194](img/index-407_1.png)


    *图 17-4. 一个`MapReduce`流程图，展示了在 reduce 步骤中键值对如何被汇总在一起*


    即使你从未写过一行`MapReduce`代码，了解其工作原理也很重要，因为有大量工具可供`DBAs`用于导入、导出和操作`Hadoop`数据。这些工具通过实现`MapReduce`来完成工作，但对用户隐藏了细节；而`JavaScript`代码则允许你自定义`MapReduce`函数以满足需求。用`SQL
    Server`的术语来说，`JavaScript`代码相当于`T-SQL`，而`Hadoop`工具相当于`BCP`和`SSIS`。本章后面的示例脚本中你会用到的`Hadoop`工具，将允许你设置一些参数来影响它们如何使用`MapReduce`完成工作，因此从代码层面理解`MapReduce`对于知道如何有效使用这些工具至关重要。


    关于设置`Hadoop`、编写`MapReduce`代码以及调优和测试`MapReduce`作业的深入内容，请参阅 Jason Venner 所著的*Pro
    Hadoop*（Apress, 2009）。Venner 的书更详细地介绍了`MapReduce`，并讨论了调试、测试和调优`MapReduce`。


    `MapReduce`工作方式的另一个重要因素是硬件配置。尽管我们一直在讨论基于`Azure`上的`Hadoop`云配置，但了解驱动`Hadoop`的硬件知识也很重要。


    ## 硬件


    你可能听说过`Hadoop`可以使用`商用`硬件，这暗示着二流或低质量的机器，但不要以为我们说的是在你桌下放了好几年的旧服务器。你的大多数服务器将是`从节点`，拥有大量本地磁盘存储和中等数量的`CPU`及`RAM`。其中一些机器将是`主节点`，它们的配置可能略有不同，拥有更多`RAM`和`CPU`，但本地存储较少。这些机器可能比你通常用于`SQL
    Server`的机器便宜，但也不一定。许多`SQL Server DBAs`正在这类`商用`硬件上运行他们的数据库，所以`商用`这个词可能会产生误导，让人以为他们可以用更低端的硬件来处理大数据。此外，对于大数据，你将需要多得多的服务器，这些服务器仍然需要最低水平的存储和内存才能以令人满意的性能运行。在这个语境下，`商用`硬件指的是可以现成购买的一批服务器，而非为超高性能而定制设计和制造的高端计算机。


    `Hadoop`的通用最低配置应包括两台机器，每台配备两个多核`CPU`、四个直接连接的本地硬盘（每个至少 1`TB`存储）和 24`GB`的`RAM`。你需要两个这样的数据节点，总计提供
    8`TB`的存储。如果你期望快速将生产`Hadoop`集群扩展到更大规模，你可以组建八台多核服务器，每台配备 32`GB`的`RAM`和 12 块 2`TB`的硬盘，总计
    24`TB`的存储。这将为你提供 192`TB`的总存储，但由于数据为了冗余而存储三份，这意味着你实际可使用 64`TB`。如果使用量激增，你需要更多存储空间怎么办？你只需添加更多的数据节点。`Hadoop`的优势之一就是能够将更多数据节点无缝添加到集群中，因此无论你从较小还是较大的配置开始，你总能扩展到非常大的规模。考虑到扩展到
    3`PB`（拍字节）的冗余数据大约需要 130 个 24`TB`的数据节点，而该框架的设计可以处理 10,000 个数据节点！


    > **注意** 注意我们没有提到由`SAN`处理存储。这有一个很好的理由。


    `Hadoop`是为本地连接的直连存储而设计的，这样每个节点控制自己的数据存储。当多个数据节点同时访问时（或在企业环境中被其他应用程序使用时），`SAN`可能成为瓶颈，而且它比`商用`磁盘驱动器存储数据的成本更高。处理大量数据时，磁盘访问通常是瓶颈，而不共享存储可以减轻这个瓶颈。为每个数据节点使用独立的专用存储，能更有效地并行使用磁盘。


    虽然这种高度的分布式和并行性提供了存储几乎无限量数据的能力，但需要理解的一个重要方面是，`HDFS`的限制方式与我们作为专注于`RDBMS`的数据架构师所习惯的有所不同。它仅支持向前解析，因此你只能向前读取或追加到文件末尾。没有更新或插入的概念，文件只能写入一次。这使得`HDFS`与`SQL
    Server`非常不同，甚至有时与你熟悉的表、列、视图和其他数据库对象相比，会显得很原始。

    '
- fmt: '# Chapter 17: Big Data for the SQL Server DBA


    **Caution** With such a highly distributed infrastructure running on so many servers,
    you think it’s going to be really fast, don’t you? Actually, it’s not fast when
    run on a small amount of data. The overhead of starting up the various `MapReduce`
    jobs, getting the data, and assembling the output together is very high, so it
    makes sense to crunch through a large amount of data when you do this. However,
    the process is excessive when working with a small dataset, since spinning up
    `MapReduce` jobs each time a data request occurs is so expensive. The code examples
    later in this chapter will seem to be slow on the small sets of data you’ll use.
    However, it will be much faster than traditional means when you get to the point
    where you’re processing data that is terabytes in size, but unlike `SQL Server`
    you’ll still get used to measuring query response times from a Big Data system
    in minutes and hours instead of milliseconds and seconds.


    ## DBA As Data Architect


    Previously, we looked at how an online retailer with a large set of sales data
    could aggregate it by product line with `MapReduce`. We’ll continue working with
    product data to work through more business problems and their solutions.


    In this setting, you are a `SQL Server` DBA at the fast-growing online retailer
    and the company is looking to track more of what is happening with its product
    data. One uneventful morning, a developer you work with stops by your desk and
    starts talking about the new requirements he’s been handed. He wants a large amount
    of disk space allocated on the database server because he has been tasked with
    keeping a record of every change made to the `Product` table. In particular, because
    of dynamic pricing, the list price of a product changes frequently, an average
    of 20 times per day. Based on current activity and a total of 500,000 active products,
    this adds up to 10 million rows per day. Yikes!


    Trying to clear your head from the initial shock, you ask the developer how the
    data is going to be used. He claims that part is a bit unclear because the finance
    department wants him to capture it just in case they need it later for an audit.
    Immediately, thoughts race through your head about disk space, memory, and impact
    to existing databases. Do you create a new database for this data, install a new
    `SQL Server` instance, or fire up a new server? How will you manage it if it starts
    getting used heavily? It’s a scenario an experienced DBA is all too familiar with.


    With `Hadoop` added to your DBA toolset, you make a wise decision by implementing
    a solution that makes the best use of the many features of `SQL Server`, while
    using `Hadoop` for what it does best. To get this done, your main challenge as
    DBA will be to define, regulate, and manage the flow of data among the various
    places it can reside. An example of the many ways the data can flow is shown in
    Figure 17-5.


    ![Image 195](index-410_1.png)


    `Figure 17-5. Complicated data flow makes data architecture decisions more varied
    and complex.`


    ## Big Data for Analytics


    Many of the demonstrations, webinars, papers, and other presentations you might
    have seen for using Big Data in a Microsoft environment are targeted at using
    it for analytics or to enhance a Business Intelligence framework. Microsoft has
    good reason for this; it’s an opportunity to show off tools such as `PowerView`
    and `Excel`, which shine in those situations, giving them practically unlimited
    power as the amount of data an analyst can work with approaches infinity. It isn’t
    just Microsoft pushing this, as using it for analytics is also the most common
    reason for building a Big Data infrastructure.


    The usual technique for analyzing data with these tools is a three-step process
    of selecting the data to work with from within the `HDFS` data store, extracting
    a portion of it to a place the analyst can access it, and then analyzing it using
    `Excel` or a statistical analysis tool. Based on any findings or discoveries,
    the analyst repeats the process in an iterative fashion until a conclusion is
    reached. All of this, other than the analysis itself, is done in a noninteractive
    way. Getting the data to a point where an analyst can work with it could take
    hours because the extract runs as a batch process in the background.


    As an example of this, suppose an analyst wants to look at web logs for the past
    three months to determine which web page a potential customer goes to after viewing
    the About Us page on the web site.


    The web logs have been stored in `HDFS` for the past year and the storage has
    gotten large compared to the size of data this company is accustomed to, growing
    to over 100 TB in size. The analyst starts by setting some boundaries for this
    work, such as the dates of interest and the URL of the web page being targeted,
    which would be something like `[www.mywebsite.com\aboutus.aspx.](http://www.mywebsite.com\aboutus.aspx)`


    This criterion set by the analyst becomes the filters that allow `MapReduce` to
    extract just the data the analyst wants. A `MapReduce` job is fired off to access
    the web log that has been distributed over 75 servers, potentially grabbing data
    from all of them and outputting the results to a place and in a form the analyst
    can access. The data is now trimmed down to a size the analyst can work with instead
    of the initial 100-TB dataset. The analyst is ready to do her job using tools
    she’s familiar with. She creates graphs to better visualize trends and patterns,
    runs the data through a statistical model for better understanding, and asks what-if
    questions that provoke more questions that require data the analyst doesn’t yet
    have. The analyst goes back to `Hadoop` to get more data and is ready to do it
    again. This iterative process continues until the analyst is satisfied with the
    results she is getting. This type of data access and analysis is the main reason
    for `Hadoop`’s existence and the primary use-case DBAs will need to support in
    a `SQL Server` + `Hadoop` environment.


    ## Using SQL Server with Hadoop


    The best reason for adding a `Hadoop` data store to work side by side with `SQL
    Server` is to let `Hadoop` be responsible for handling data that isn’t transactional
    in nature, isn’t required to be `ACID` compliant, and grows in size quickly. As
    a DBA, your job in this new era of data management will be to make the right choices
    for where your data resides.


    ### The DBA’s Role


    Some DBAs are data architects and modelers, but many are not. Most DBAs have as
    their first priority data protection, including backup/restore, disaster recover,
    and high availability and security. Others work on improving performance and reducing
    contention. The roles are muddled and the responsibilities are often unclear,
    and with Big Data, things are going to get murkier.'
