    process is the replica in the Availability Group where the backup will currently
    run.


    To show you this in action, I’m going to set up the maintenance plan on this server,
    SQLTHREE, so that it runs a log backup every 15 minutes. Currently, none of the
    other replicas have a backup process and SQLTHREE is the primary. When the job
    fires, it completes successfully, without error. However, that’s only because
    it’s getting to the priority check and finding that it’s not currently the server
    with priority, which causes it to exit gracefully, but it means I don’t have a
    log backup. I can validate that by going to the location specified to see if a
    backup file was created. There is none.


    To get this to work, I need to perform two tasks. First, I need to create this
    same maintenance plan on all my other servers. Second, I need to create a schedule
    that executes the plan on each of the servers.


    Because only one will be selected by the sys.fn_hadr_back_is_preferred_replica
    function, I’m placing 387


    Chapter 16 ■ BaCkups and restores using availaBility groups


    extremely little load on all the servers because they will only check to see if
    they are the preferred replica currently. If the server in question is not the
    preferred replica, the process will close out. If the server is the preferred
    replica, the log backup will be run.


    I’m not a fan of using maintenance plans, because they don’t offer enough granular
    control over how processes are run. Setting up a similar log-backup process using
    scripts is extremely easy.


    T-SQL Scripts


    First, I need to establish the backup script that I want to use on each of the
    servers. My script will be slightly different than the one created for the maintenance
    plan:


    DECLARE @preferredReplica INT


    SET @preferredReplica = (SELECT


    [master].sys.fn_hadr_backup_is_preferred_replica(''MovieManagement'')


    )


    IF (@preferredReplica = 1)


    BEGIN


    DECLARE @Location NVARCHAR(50);


    DECLARE @CurrentTime DATETIME = GETUTCDATE();


    SET @Location = ''C:\bu\MovieManagement_log_''


    + CAST(DATEPART(year, @CurrentTime) AS NVARCHAR) + ''_''


    + CAST(DATEPART(month, @CurrentTime) AS NVARCHAR) + ''_''


    + CAST(DATEPART(day, @CurrentTime) AS NVARCHAR) + ''_''


    + CAST(DATEPART(hour, @CurrentTime) AS NVARCHAR) + ''_''


    + CAST(DATEPART(minute, @CurrentTime) AS NVARCHAR) + ''.bak''


    BACKUP LOG MovieManagement


    TO DISK = @Location


    WITH INIT;


    END


    I can create a SQL Agent Job with a schedule that runs this backup every three
    minutes. That’s probably more frequently than you would want to run a backup in
    a production system, but I’m just setting this up for testing purposes. Then I
    can easily script that job out and run it on each of my servers.'
  trans: '# 第 16 章 ■ 使用可用性组进行备份和还原


    图 16-11. 设置备份优先级以及从自动备份过程中移除副本。


    ![Image 188](img/index-390_1.png)


    这段代码将更改指定的可用性组，将副本 `SQLTWO` 的优先级修改为极低的 2。使用超过 1-5 的数字，可以让你更精细地控制哪些副本更可能获得备份优先级。


    图 16-12. 属性窗口显示了对备份执行位置以及哪些副本支持备份所做的修改。


    要将某个副本完全从可用的备份副本列表中移除，你可以使用以下 T-SQL 代码将其备份优先级调整为零：


    ```sql

    ALTER AVAILABILITY GROUP AgBackup

    MODIFY REPLICA ON ''SQLFOUR''

    WITH (BACKUP_PRIORITY = 0);

    ```


    这将更改指定的副本，并将其从可用性组的备份列表中完全移除。这意味着，如果你运行首选备份函数 `sys.fn_hadr_backup_is_preferred_replica`，它对该服务器永远不会返回正值。如果刷新属性窗口，你可以看到图形化表示的更改，如图
    16-12 所示。


    你可以看到，自动备份现在将只在辅助服务器上运行，永远不会在主副本上运行。副本 `SQLFOUR` 因为被排除在外，所以无法支持自动备份。最后，副本 `SQLTWO`
    的优先级被更改为 2，使其成为最不可能支持自动备份的副本。


    这就是你如何控制执行备份的副本类型以及备份发生的位置。但是，如何设置备份本身呢？我将在下一节中介绍。在继续之前，我将把可用性组重置回默认值：


    ```sql

    ALTER AVAILABILITY GROUP AgBackup

    SET (AUTOMATED_BACKUP_PREFERENCE = SECONDARY);


    ALTER AVAILABILITY GROUP AgBackup

    MODIFY REPLICA ON ''SQLTWO''

    WITH (BACKUP_PRIORITY = 50);


    ALTER AVAILABILITY GROUP AgBackup

    MODIFY REPLICA ON ''SQLFOUR''

    WITH (BACKUP_PRIORITY = 50);

    ```


    ## 在可用性组上实现自动备份


    你可以从任何可用性组副本手动运行备份。但是，要实现自动化备份，你需要做一些额外的工作，因为你永远不会知道哪个组可以执行备份，尽管你可以设置一个偏向，决定哪个副本将执行操作，正如我在上一节讨论的那样。要为此过程使用可用性组，你需要在每台服务器上配置一组通用的脚本。


    备份本身可以使用普通的 T-SQL 命令甚至维护计划来完成。你只需要确保两点。首先，确保每个没有通过设置优先级被排除在备份可能性之外的副本都已配置自动备份。


    其次，确保你设置的每个备份在执行前都首先通过 `sys.fn_hadr_backup_is_preferred_replica` 判断该服务器是否具有当前的优先级。如果你使用维护计划，这一点会自动包含在内。


    最重要的是要理解，在完整恢复模型下通常发生的日志清理，在主副本上仍然会发生。在辅助副本上执行的日志备份会导致主副本的日志被清理。如果该过程不是这样工作，那么它就毫无意义了。


    ### 维护计划


    为了给你一个示例，我选择在 `SQLTHREE` 服务器上使用维护计划设置自动日志备份。图 16-13 是显示日志备份配置方式的基本对话框。


    请注意，在标准对话框中没有你可以设置的选项来指定此备份过程是否配置为与可用性组一起使用。你可以选中“对于可用性数据库，忽略备份和备份在主副本设置上的副本优先级”复选框来忽略副本优先级，但这对于设置一个旨在无论哪个服务器在线都能工作的日志备份来说不是一个好的选择。但是，如果你单击对话框底部的“查看
    T-SQL”按钮，你将看到一个类似这样的脚本：


    ```sql

    DECLARE @preferredReplica int

    SET @preferredReplica = (SELECT

    [master].sys.fn_hadr_backup_is_preferred_replica(''MovieManagement''))

    IF (@preferredReplica = 1)

    BEGIN

    BACKUP LOG [MovieManagement] TO DISK = N''C:\Program Files\Microsoft SQL

    Server\MSSQL11.MSSQLSERVER\MSSQL\Backup\MovieManagement_backup_2012_06_25_144225_8512689.trn''

    WITH NOFORMAT, NOINIT, NAME = N''MovieManagement_backup_2012_06_25_144225_8512689'',
    SKIP, REWIND, NOUNLOAD, STATS = 10

    END

    ```


    ![Image 189](img/index-392_1.png)


    图 16-13. 用于配置日志备份的维护计划窗口。


    该脚本声明一个变量 `@preferredReplica`，然后使用 `sys.fn_hadr_backup_is_preferred_replica` 函数来确定当前调用备份过程的服务器是否是可用性组中当前应运行备份的副本。


    为了向你展示其实际效果，我将在此服务器 `SQLTHREE` 上设置维护计划，使其每 15 分钟运行一次日志备份。目前，其他副本都没有备份过程，并且 `SQLTHREE`
    是主副本。当作业触发时，它会成功完成，没有错误。然而，这只是因为它执行了优先级检查，发现它当前不是具有优先级的服务器，这导致它优雅地退出，但这也意味着我没有日志备份。我可以通过访问指定位置来验证是否创建了备份文件。结果是没有。


    要使其工作，我需要执行两个任务。首先，我需要在我的所有其他服务器上创建相同的维护计划。其次，我需要创建一个计划，在每台服务器上执行该计划。


    因为只有一个副本会被 `sys.fn_hadr_back_is_preferred_replica` 函数选中，所以对所有服务器的负载都极小，因为它们只会检查自己是否是当前首选的副本。如果所讨论的服务器不是首选副本，该过程将关闭。如果该服务器是首选副本，则将运行日志备份。


    我不太喜欢使用维护计划，因为它们对进程运行方式的粒度控制不够。使用脚本设置类似的日志备份过程非常简单。


    ### T-SQL 脚本


    首先，我需要确定要在每台服务器上使用的备份脚本。我的脚本将与为维护计划创建的脚本略有不同：


    ```sql

    DECLARE @preferredReplica INT

    SET @preferredReplica = (SELECT

    [master].sys.fn_hadr_backup_is_preferred_replica(''MovieManagement'')

    )

    IF (@preferredReplica = 1)

    BEGIN

    DECLARE @Location NVARCHAR(50);

    DECLARE @CurrentTime DATETIME = GETUTCDATE();

    SET @Location = ''C:\bu\MovieManagement_log_''

    + CAST(DATEPART(year, @CurrentTime) AS NVARCHAR) + ''_''

    + CAST(DATEPART(month, @CurrentTime) AS NVARCHAR) + ''_''

    + CAST(DATEPART(day, @CurrentTime) AS NVARCHAR) + ''_''

    + CAST(DATEPART(hour, @CurrentTime) AS NVARCHAR) + ''_''

    + CAST(DATEPART(minute, @CurrentTime) AS NVARCHAR) + ''.bak''

    BACKUP LOG MovieManagement

    TO DISK = @Location

    WITH INIT;

    END

    ```


    我可以创建一个带有计划的 SQL Server 代理作业，每三分钟运行一次此备份。这可能比你希望在生产系统中运行备份的频率要高，但我只是为了测试目的而这样设置。然后，我可以轻松地将该作业编写为脚本并在我的每台服务器上运行它。'
- fmt: "# Chapter 16: Backups and Restores Using Availability Groups\n\nBecause I’m\
    \ using a specific location for the backups, I need to make sure that each server\
    \ does have that file location available. My finished Agent Job looks like this:\n\
    \n```sql\nUSE [msdb]\nGO\n\n/****** Object:  Job [LogBackups]    Script Date:\
    \ 7/6/2012 6:05:56 PM ******/\nBEGIN TRANSACTION\nDECLARE @ReturnCode INT\nSELECT\
    \ @ReturnCode = 0\n\n/****** Object:  JobCategory [[Uncategorized (Local)]]] \
    \   Script Date: 7/6/2012 6:05:56 PM ******/\nIF NOT EXISTS (SELECT name FROM\
    \ msdb.dbo.syscategories WHERE name=N'[Uncategorized (Local)]' AND category_class=1)\n\
    BEGIN\nEXEC @ReturnCode = msdb.dbo.sp_add_category @class=N'JOB', @type=N'LOCAL',\
    \ @name=N'[Uncategorized (Local)]'\nIF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO\
    \ QuitWithRollback\nEND\n\nDECLARE @jobId BINARY(16)\nEXEC @ReturnCode = msdb.dbo.sp_add_job\
    \ @job_name=N'LogBackups',\n    @enabled=1,\n    @notify_level_eventlog=0,\n \
    \   @notify_level_email=0,\n    @notify_level_netsend=0,\n    @notify_level_page=0,\n\
    \    @delete_level=0,\n    @description=N'No description available.',\n    @category_name=N'[Uncategorized\
    \ (Local)]',\n    @owner_login_name=N'CONTOSO\\LabUser', @job_id = @jobId OUTPUT\n\
    IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback\n\n/****** Object:\
    \  Step [Backup MovieManagement]    Script Date: 7/6/2012 6:05:56 PM ******/\n\
    EXEC @ReturnCode = msdb.dbo.sp_add_jobstep @job_id=@jobId, @step_name=N'Backup\
    \ MovieManagement',\n    @step_id=1,\n    @cmdexec_success_code=0,\n    @on_success_action=1,\n\
    \    @on_success_step_id=0,\n    @on_fail_action=2,\n    @on_fail_step_id=0,\n\
    \    @retry_attempts=0,\n    @retry_interval=0,\n    @os_run_priority=0, @subsystem=N'TSQL',\n\
    \    @command=N'DECLARE @preferredReplica INT\nSET @preferredReplica = (SELECT\
    \ [master].sys.fn_hadr_backup_is_preferred_replica(''MovieManagement''))\nIF (@preferredReplica\
    \ = 1)\nBEGIN\nDECLARE @Location NVARCHAR(50);\nDECLARE @CurrentTime DATETIME\
    \ = GETUTCDATE();\nSET @Location = ''C:\\bu\\MovieManagement_log_''\n    + CAST(DATEPART(year,\
    \ @CurrentTime) AS NVARCHAR) + ''_''\n    + CAST(DATEPART(month, @CurrentTime)\
    \ AS NVARCHAR) + ''_''\n    + CAST(DATEPART(day, @CurrentTime) AS NVARCHAR) +\
    \ ''_''\n    + CAST(DATEPART(hour, @CurrentTime) AS NVARCHAR) + ''_''\n    + CAST(DATEPART(minute,\
    \ @CurrentTime) AS NVARCHAR) + ''.bak''\nBACKUP LOG MovieManagement\nTO DISK =\
    \ @Location\nWITH INIT;\nEND',\n    @database_name=N'master',\n    @flags=0\n\
    IF (@@ERROR <> 0 OR @ReturnCode <> 0) GOTO QuitWithRollback\n\nEXEC @ReturnCode\
    \ = msdb.dbo.sp_update_job @job_id = @jobId, @start_step_id = 1\nIF (@@ERROR <>\
    \ 0 OR @ReturnCode <> 0) GOTO QuitWithRollback\n\nEXEC @ReturnCode = msdb.dbo.sp_add_jobschedule\
    \ @job_id=@jobId, @name=N'Every Two Minutes',\n    @enabled=1,\n    @freq_type=4,\n\
    \    @freq_interval=1,\n    @freq_subday_type=4,\n    @freq_subday_interval=2,\n\
    \    @freq_relative_interval=0,\n    @freq_recurrence_factor=0,\n    @active_start_date=20120706,\n\
    \    @active_end_date=99991231,\n    @active_start_time=0,\n    @active_end_time=235959,\n\
    \    @schedule_uid=N'70996e43-6c73-41f2-be5a-143853fdd5dd'\nIF (@@ERROR <> 0 OR\
    \ @ReturnCode <> 0) GOTO QuitWithRollback\n\nEXEC @ReturnCode = msdb.dbo.sp_add_jobserver\
    \ @job_id = @jobId, @server_name = N'(local)'\nIF (@@ERROR <> 0 OR @ReturnCode\
    \ <> 0) GOTO QuitWithRollback\n\nCOMMIT TRANSACTION\nGOTO EndSave\n\nQuitWithRollback:\n\
    IF (@@TRANCOUNT > 0) ROLLBACK TRANSACTION\nEndSave:\nGO\n```\n\nWith that script\
    \ run on every single server, all that remains to be done is to test the process.\
    \ To see changes in the database I’ve been using, I’m going to create a table\
    \ for the database:\n\n```sql\nCREATE TABLE dbo.ChangingData\n(ID INT IDENTITY(1,\
    \ 1),\n Val VARCHAR(50)\n);\n```\n\nThen I’m going to add a row, wait until a\
    \ log backup has been run, and then add another row:\n\n```sql\nBEGIN TRANSACTION\n\
    INSERT INTO dbo.ChangingData\n(Val)\nVALUES ('First Row');\nCOMMIT TRANSACTION\n\
    \nWAITFOR DELAY '00:04';\n```\n\n![Image 190](index-396_1.png)\n\n**Figure 16-14.**\
    \ Log backups completing on one of the replicas.\n\n```sql\nBEGIN TRANSACTION\n\
    INSERT INTO dbo.ChangingData\n(Val)\nVALUES ('Second Row');\nCOMMIT TRANSACTION\n\
    ```\n\nWith all that in place, I can identify which of the replicas is currently\
    \ my primary. In my case, it’s `SQLFIVE`. I can see the log backups that have\
    \ been running by looking at the drive on that server. as you can see in Figure\
    \ 16-14.\n\nAnd that’s all it takes to set up the backups on an Availability Group.\
    \ You can see the backups occurring, but the only way to know for sure that a\
    \ backup has worked is to recover the database.\n\n## Recovery on Availability\
    \ Groups\n\nThe entire purpose of the Availability Group is to provide a mechanism\
    \ whereby the databases that have been configured to be a part of the group are\
    \ always available. This is done primarily through the process of automatic failover\
    \ from one of the replicas to another. The very concept suggests that you no longer\
    \ need backups at all. Keep in mind, though, Availability Groups are a means of\
    \ maintaining high availability. They supplement your disaster recovery (DR) plans,\
    \ but they cannot completely replace the fundamental beginning of all DR efforts,\
    \ backups. You’re still need to run your standard sets of backups.\n\nThere is\
    \ one problem with placing a database in an Availability Group. Once that database\
    \ is a part of the group, you can no longer run a restore on that database. In\
    \ fact, as far as the Availability Group is concerned, you wouldn’t want to. If\
    \ a server went offline, a database was corrupted, or some other action caused\
    \ the loss of connectivity to that replica, your other replicas are there to take\
    \ up the load. And you can simply recover the system by getting it back online\
    \ and rejoining the Availability Group. You’ll resynchronize with the Availability\
    \ Group and continue on happily.\n\nHowever, what if you do need to go to the\
    \ full-blown disaster recovery plan. You need to restore that database. Well,\
    \ your processes haven’t changed much. Let’s walk through this.\n\nI have a full\
    \ database backup that I took from my primary replica. I also have a series of\
    \ backups taken against one of my secondaries. In a normal DR scenario, you can\
    \ move these backups off-site from your primary location to protect them. In this\
    \ case, I bring together my full backup and my log backups, both taken on different\
    \ replicas, and combine them to restore a database to a point in time on a different\
    \ server as a different database.\n\nFirst, I’ll restore the full backup:\n\n\
    ```sql\nRESTORE DATABASE MMCopy\nFROM DISK = 'c:\\bu\\moviemanagement.bak'\nWITH\
    \ NORECOVERY, MOVE 'MovieManagement' TO 'c:\\data\\moviemanagement.mdf',\nMOVE\
    \ 'MovieManagement_Log' TO 'c:\\data\\moviemanagement_log.ldf';\n```\n\nNow I\
    \ can use some of the log backups that were created to recover this database to\
    \ a point in time prior to the insertion of the second row of data:\n\n```sql\n\
    RESTORE LOG MMCopy\nFROM DISK = 'c:\\bu\\MovieManagement_log_2012_7_6_22_44'\n\
    WITH NORECOVERY, STOPAT = '7/6/2012 18:45';\n\nRESTORE LOG MMCopy\nFROM DISK =\
    \ 'c:\\bu\\MovieManagement_log_2012_7_6_22_46'\nWITH NORECOVERY, STOPAT = '7/6/2012\
    \ 18:45';\n\nRESTORE DATABASE MMCopy\nWITH RECOVERY;\n```\n\n**Figure 16-15.**\
    \ The data returned after restoring to a point in time prior to the second insert.\n\
    \nI can verify that I recovered the database to a point prior to the second insert\
    \ by simply selecting data from the restored database:\n\n```sql\nUSE MMCopy;\n\
    SELECT * FROM dbo.ChangingData;\n```\n\nThe data returned looks like Figure 16-15.\n\
    \nRestoring to a point in time is no big deal. But you have to remember that the\
    \ full backup that was used was from one server—specifically, my current primary\
    \ replica, `SQLTHREE`. The log backups that were used were from a completely different\
    \ server, `SQLFIVE`. I was able to take backups across multiple machines from\
    \ within the Availability Group and then combine those backups at another location\
    \ to restore a database.\n\n## Conclusion"
