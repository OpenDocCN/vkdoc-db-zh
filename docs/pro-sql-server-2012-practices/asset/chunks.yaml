- fmt: '```sql

    (total_physical_reads + total_logical_reads) / execution_count as avg_reads,

    max_elapsed_time as max_duration,

    total_elapsed_time as total_duration,

    ((total_elapsed_time / execution_count)) / 1000000 as avg_duration_sec

    FROM sys.dm_exec_query_stats deqs

    CROSS APPLY sys.dm_exec_sql_text(sql_handle) dest

    CROSS APPLY sys.dm_exec_query_plan (plan_handle) deqp

    ORDER BY deqs.total_worker_time DESC

    ```


    ![Image 42](index-92_1.png)

    ![Image 43](index-92_2.png)


    ## chapter 4 ■ Dynamic management Views


    There are two areas in this query, along with the subsequent ones in this section,
    that I want you to fully understand. The first is the initial column of SQL, followed
    by the XML output of the showplan, which you can see in Figure 4-6.


    **Figure 4-6.** Top 10 performance-challenging queries, arranged by total working
    time in the database.


    The example in Figure 4-6 shows the results of a CPU intensive environment. As
    helpful as this data is, the process of collecting this data can add CPU resource
    pressure to a production environment and the database professional should take
    care regarding when and how often this type of query is executed. The benefits
    of the resulting query are the links shown for the show plan data, which can then
    be clicked on to show the full SQL for the statement in row chosen.


    When investigating further, the next area of focus is on how the quantity of execution
    counts corresponds to the impact to CPU, reads, durations and other pertinent
    data, as shown in Figure 4-7.


    **Figure 4-7.** The response from this query results in a wide array of columns
    that can then identify SQL code with high execution counts, extensive physical
    reads and/or elapsed time.


    When any performance DBA is evaluating easy options for performance tuning, identifying
    the low-hanging fruit—that is, comparing the number of executions to the time
    they take and the impact they have on the CPU—is crucial. Identifying and tuning
    these can result in a quick performance gain by making small, efficient corrections
    to one to five offending top processes rather than creating a large, resource-intensive
    project to correct an environment.


    Note also that the preceding queries and subsequent ones all have a common DMF
    call in them. You can use this DMF to retrieve a `sql_handle` for a given SQL
    statement, such as `CROSS APPLY sys.dm_exec_sql_text(sql_handle) sql`. As mentioned
    earlier, for performance reasons DMVs refer to SQL statements by their `sql_handle`
    only. Use this function if you need to retrieve the SQL text for a given handle.
    This DMF accepts either the `sql_handle` or `plan_handle` as input criteria.


    Many of the performance DMFs won’t complete in SQL Server environments if version
    8.0 (SQL 2000) compatibility is enabled. The common workaround is to execute the
    DMF from a system database using the common fully qualified name—for example,
    `CROSS APPLY <dbserver>.<dbname>.sys.dm_exec_sql_text(plan_handle)`.


    ## Divergence in Terminology


    Terminology divergence is a common issue for many as new versions and features
    evolve. Note that DMVs that use the `plan_handle` to execute results within the
    execution plan will also be referred to as the *showplan*. This now is often shown
    as a link in a user-friendly XML format. The links will only display plans that
    are executed or are still in cache. If you attempt to display plans other than
    these, a null result will occur upon clicking on the link.


    Execution plans in XML format are often difficult to read. To view execution plans
    graphically in Management Studio, do the following:

    - The function will return a hyperlink automatically for the showplan XML.

    - Click on the hyperlink to bring up the XML page in an Internet browser.

    - Click on File -> Save As and save the file to your local drive using a `.SQLPLAN`
    file extension.

    - Return to SQL Server Management Studio. You can now open the file you just saved
    without issue.

    ```'
