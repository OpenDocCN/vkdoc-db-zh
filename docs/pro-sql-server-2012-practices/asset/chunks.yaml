    机架式服务器的一个小缺点是，它们内部密布各种组件，这可能使它们更难维修，也更难散热。因此，机架式服务器通常配备多个嘈杂的小直径、高速风扇，这些风扇将冷空气从机箱前端吸入，并将产生的热空气从后部排出。这就是为什么数据中心在服务器机架之间交替布置冷通道和热通道。冷通道有空调冷空气通过机房架空地板的孔向上流动，流入服务器前端，然后从服务器后部排出。热通道的天花板上设有回风口，热空气上升后由此离开服务器机房。


    ### 塔式服务器


    塔式服务器通常采用高大宽厚的机箱，放置在架子上而非机架中。它们机箱内部空间更大，一旦打开机箱，维修工作也更容易进行。它们通常没有导轨，因此常常直接放在地板上或机架内的架子上。一些塔式服务器可以加装导轨并侧向安装在机架中，但这并不常见，因为它与真正的机架式服务器相比会浪费机架内的垂直空间。塔式服务器通常被认为是入门级服务器，更常用于较小的组织，因为它们可能比机架式服务器更便宜。


    ### 刀片服务器


    刀片服务器比机架式服务器更小、更密集。它们有一个机架安装的刀片机箱底座，容纳电源、散热、网络连接、I/O 连接和管理功能的通用组件。多个独立的刀片服务器安装在一个刀片机箱中，使您能够在更少的物理机架空间内拥有更多独立的服务器和更高的整体计算能力。虽然这听起来很有吸引力，但如果您正在考虑将刀片服务器用于数据库服务器，有几个问题需要注意。一个问题在于，刀片机箱是所有安装在其内部的刀片服务器的单一故障点。如果刀片机箱发生任何硬件故障，可能会影响机箱内的所有刀片服务器。这意味着您不会希望将
    Windows Server 故障转移集群实例的多个节点放在同一个刀片机箱底座中。同样的注意事项也适用于 SQL Server 2012 `AlwaysOn
    可用性组`中的多个节点，或数据库镜像伙伴关系的两端。


    刀片机箱中的通用基础设施，特别是刀片服务器与实际存储子系统之间的 I/O 接口，可能成为性能瓶颈，尤其是在刀片数量增加时。这是另一个不应将刀片服务器用作关键任务数据库服务器的原因。


    大多数数据库服务器的标准做法是使用传统的机架式服务器。您必须做的主要决定是，您的机架式服务器需要哪种垂直单元尺寸（1U、2U、4U 或更大）。这个选择在某种程度上取决于您的服务器中将有多少处理器插槽。单处理器插槽和双处理器插槽的服务器有
    1U 的垂直尺寸可供选择。


    您也可以在更高的 2U 垂直尺寸中获得双处理器插槽服务器，这使您可以在机箱内拥有更多的内部存储驱动器托架。您可以在 2U 和 4U 垂直尺寸中获得四处理器插槽服务器，更大的尺寸为内部存储驱动器托架提供了更多空间。最后，您可以在
    4U 或更大的垂直尺寸中获得更高的处理器插槽数量。


    需要记住的一点是，单个服务器机架中多个 1U 和 2U 机架式服务器的整体电源和散热需求。完全配备了内部驱动器、大量物理 RAM 和许多 PCI-E 扩展卡的双处理器插槽服务器，会消耗大量电力并产生大量热量。这意味着，如果您在整个机架中装满
    42 台 1U 机架式双处理器插槽服务器，有时可能会超过单个 42U 服务器机架的整体电源容量。随着使用更少电力的现代处理器和其他更节能组件的出现，这个问题已不如几年前常见。您仍然应该与您的数据中心联系，了解每个服务器机架可用的电源和散热容量。


    ## 服务器处理器数量选择


    您必须做的一个重大决定是，您的数据库服务器中将有多少物理处理器。


    服务器中的物理处理器数量与服务器的性能、可扩展性和整体负载能力有某种间接关系。对于 SQL Server 2012 基于核心的授权，物理处理器核心的数量（与处理器插槽数量相关）对服务器的总体成本（包括软件授权）有很大影响。很容易在
    SQL Server 2012 核心许可证上的花费远超过在实际服务器硬件和存储子系统上的花费。


    许多数据库专业人员常犯的一个错误是，认为“更大”（就物理处理器数量而言）的服务器比小服务器更快。在大多数情况下，这并不正确。正如本章后面详细解释的，双插槽服务器中使用的特定处理器在单线程性能上通常比同期的四插槽处理器对应产品快得多。

    '
- fmt: '# Dell 12th Generation Server Comparison


    Traditionally, it has been quite common to use four-socket servers for database
    server usage because they had more total processor cores, more memory slots, and
    more expansion slots than a contemporary two-socket server. Two-socket servers
    that were available before roughly 2008–2009 were limited to about eight total
    processor cores, 32 GB of RAM, and two or three PCI-E expansion slots (used by
    things like RAID controllers, Host Bus Adaptors, and network interface cards),
    which meant they simply could not handle higher-intensity database server workloads.


    Since then, processor core density has increased, so you can have between 16 and
    32 physical processor cores in a two-socket server. Memory density has increased,
    with two-socket servers having up to 24 memory slots that can each hold a 32-GB
    DIMM, giving a total RAM capacity of 768 GB in a two-socket server. You can also
    have up to seven PCI-E 3.0 slots in a new, two-socket server, which is a significant
    increase in total I/O capacity over what was available several years ago.


    The main point here is that a modern two-socket server has enough CPU capacity,
    memory capacity, and I/O capacity to handle a very high percentage of SQL Server
    workloads, so you should strongly consider selecting a two-socket server instead
    of a traditional four-socket server. An exception would be if you absolutely need
    more than 16 to 32 physical processor cores, or more than 768 GB of RAM, or more
    than seven PCI-E expansion slots in a single server, and you are unable to split
    your workload between multiple servers. If any of those conditions are true, you
    could be forced to move up to a slower and more expensive four-socket database
    server. Most people will probably be able to run most of their workloads on a
    modern, two-socket database server.


    In order to make this discussion a little more concrete, it is useful to look
    at the various 12th generation, rack-mounted server models available from Dell,
    comparing them from a SQL Server perspective. There are currently seven models
    in this line, ranging from an entry-level, single-socket server to a four-socket
    server. All of these servers use the `Intel Xeon E5` processor, but different
    models use different series of that processor family, which is a very important
    detail to pay attention to for `SQL Server 2012` usage. You could easily compare
    the available server models from another vendor in the same way.


    ## Dell PowerEdge R320


    This model server has a `1U` form factor, one processor socket, uses the `Intel
    Xeon E5-2400` series processors, has six memory slots (`96 GB` total RAM with
    `16-GB` DIMMs), has eight `2.5-inch` drive bays, and has one `PCI-E 3.0 x8` and
    one `PCI-E 3.0 x16` expansion slots. It has a total of four, six, or eight physical
    cores for `SQL Server 2012` core licensing purposes. It has a total of eight,
    twelve, or sixteen logical cores with `Intel` hyper-threading enabled.


    The `R320` is an interesting option for some smaller workloads because it uses
    the `Xeon E5-2400` series `Sandy Bridge-EN` processor (that is usually used in
    two-socket systems) instead of the `Xeon E3-1200 Sandy Bridge` or `Xeon E3-1200
    v2` series `Ivy Bridge` processor that is used in most new single-socket servers.
    This lets you use up to `96 GB` of `RAM` instead of being limited to `32 GB` of
    `RAM`, and it lets you have up to eight physical processor cores instead of being
    limited to four physical processor cores. The downside of this is being limited
    to slower processor clock speeds with the `E5-2400` series compared to the `E3-1200`
    series processors, which means you will see slower single-threaded performance.
    The `R320` might be a good choice for a `DW` type of workload, where the extra
    processor cores and higher memory capacity would be more useful. A single-socket
    server with an `Intel E3-1200 v2` series processor would be better for a small
    `OLTP` workload. Keep in mind that `SQL Server 2012 Standard Edition` is limited
    to `64 GB` of `RAM`.


    ## Dell PowerEdge R420


    This model server has a `1U` form factor, two processor sockets, and uses `Intel
    Xeon E5-2400` series processors. It also has twelve memory slots (`192 GB` total
    RAM with `16-GB` DIMMs), has eight `2.5-inch` drive bays, and has two `PCI-E 3.0
    x16` expansion slots. It has a total of eight, twelve, or sixteen physical cores
    for `SQL Server 2012` core licensing purposes. It has a total of sixteen, twenty-four,
    or thirty-two logical cores with `Intel` hyper-threading enabled.


    This model is a bad choice for `SQL Server 2012`. The `Xeon E5-2400` series `Sandy
    Bridge-EN` processor is very limited compared to the `Xeon E5-2600` series `Sandy
    Bridge-EP` processor. It has slower clock speeds, less memory bandwidth, and less
    memory capacity. Since you pay the same amount for each `SQL Server 2012` core
    license regardless of what type of physical core is in the processor, the `E5-2400`
    series is a bad choice compared to the `E5-2600` series. Another problem with
    this model server is the fact that it has only two `PCI-E` expansion slots and
    eight internal drive bays, which limits your overall `I/O` capacity and performance.


    ## Dell PowerEdge R520


    This model server has a `2U` form factor, two processor sockets, and uses `Intel
    Xeon E5-2400` series processors. It also has twelve memory slots (`192 GB` total
    RAM with `16-GB` DIMMs), has eight `3.5-inch` drive bays, and has three `PCI-E
    3.0 x8` and one `PCI-E 3.0 x16` expansion slots. It has a total of eight, twelve,
    or sixteen physical cores for `SQL Server 2012` core licensing purposes. It has
    a total of sixteen, twenty-four, or thirty-two logical cores with `Intel` hyper-threading
    enabled.


    This model is also a bad choice for `SQL Server 2012` because it uses the same
    `Intel Xeon E5-2400` series processor as the `R420`. It does have four `PCI-E`
    expansion slots, which is a little better for `I/O` capacity and performance.
    Still, I would steer clear of both the `R420` and `R520` models for `SQL Server`
    usage.


    ## Dell PowerEdge R620


    This model server has a `1U` form factor, two processor sockets, and uses `Intel
    Xeon E5-2600` series processors. It has twenty-four memory slots (`384 GB` total
    RAM with `16-GB` DIMMs), has ten `2.5-inch` drive bays, and has one `PCI-E 3.0
    x8` and two `PCI-E 3.0 x16` expansion slots. It also has a total of eight, twelve,
    or sixteen physical cores for `SQL Server 2012` core licensing purposes. It has
    a total of sixteen, twenty-four, or thirty-two logical cores with `Intel` hyper-threading
    enabled.


    The `R620` is a much better choice for `SQL Server 2012` than either the `R420`
    or `R520` because it uses the `Intel Xeon E5-2600` series `Sandy Bridge-EP` processor.
    This processor series gives you higher clock speeds, higher memory bandwidth,
    and higher memory capacity compared to the `Xeon E5-2400` series `Sandy Bridge-EN`
    processor. The `R620` is limited to three `PCI-E` expansion slots, but it does
    have ten internal drive bays. Overall, it is a good model for use as an entry-level,
    two-socket database server.'
