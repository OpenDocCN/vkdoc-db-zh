    每个步骤还提供高级选项，如图 10-5 所示。如果成功，你可以继续到另一个步骤、退出并报告成功，或退出并报告失败。如果步骤失败，你可以选择重试。如果在指定重试次数后仍然失败，你有相同的选项：继续到另一个步骤、退出并报告成功，或退出并报告失败。\n\
    \n图 10-5 还显示了额外的错误日志记录选项。你可以选择将错误信息输出到文件，或输出到数据库中的表。\n\n***图 10-5.** 作业步骤的高级选项*\n\
    \n## 计划\n\nSQL Server 代理作业中自动化的真正威力在于能够设置计划。你不再需要在离开办公室时手动启动作业执行，或担心在周末登录来启动一次性作业。\n\
    \n计划设置界面如图 10-6 所示。首次建立计划时，需要为其命名。尽量使计划名称具有描述性，以便清楚地了解计划的类型和频率。对于计划类型，你可以从以下选项中选择：\n\
    \n-   **重复**：需要多次运行的作业，例如数据库备份、事务日志备份、索引重组或重建，或用于填充报表表的查询。\n-   **一次性**：仅需运行一次的作业，例如计划的数据加载。\n\
    -   **当 SQL Server 代理启动时**：仅在代理服务启动时需要执行的作业，可能用于发送通知或运行特定的存储过程。\n-   **每当 CPU\
    \ 空闲时**：可以利用 CPU 空闲时间且不需要在特定时间运行的作业，例如批处理。\n\n频率可以是每天、每周或每月。如果选择每天，请选择重复运行之间的天数。例如，你可以让作业每天运行、每五天运行一次或每十天运行一次。如果选择每周，请选择重复运行之间的周数，以及作业运行的星期几。如果选择每月，你可以选择月份中的特定日期。另一个选项是选择每\
    \ Y 个月的第 X 天（例如，每月的第二个星期四，或每三个月的最后一天）。图 10-6 显示了计划屏幕。DMV 收集作业将每天每 15 分钟运行一次。\n\
    \n***图 10-6.** 设置作业计划*\n\n另一个好处是，计划一旦建立，就可以重复使用。当查看作业的“计划”屏幕时，选择“选取”而不是“新建”来选择现有计划。\n\
    \n**注意：** 你还可以基于警报创建作业，这将在本章后面介绍。\n\n## 通知\n\n通知允许你在作业完成时执行操作。如图 10-7 所示，你可以向已设置的任何操作员发送电子邮件。可以在作业失败时、作业成功时，或在作业完成时（无论结果如何）发送电子邮件。\n\
    \n你还可以选择写入 Windows 应用程序事件日志。作业完成后删除它也是一个选项，如果作业是一次性操作且你不想之后回来清理它，这会很有用。对于 DMV\
    \ 执行，如果作业失败，将通过电子邮件和 Windows 事件日志发送通知。\n\n***图 10-7.** 选择作业完成的通知方式*\n\n## 警报\n\
    \n如前所述，SQL Server 中设置了多个级别的日志记录。错误编号和消息会写入事件日志。错误被分配了严重性级别，以确定其关键程度。\n\n很多时候，表明可能出错的错误信息可能被淹没在日志中。逐日查看每台服务器的错误日志会非常耗时，而这正是我们希望通过自动化过程避免的事情。\n\
    \n设置可以通知操作员或启动作业的警报，是一种主动通知某人错误或采取纠正措施的非常有用的方法。定义警报后，SQL Server 将监视错误日志，查找与你定义的条件匹配的条目。当找到匹配项时，SQL\
    \ Server 将执行你在警报中设置的操作。\n\n可以基于特定错误编号、严重性级别、性能条件或 WMI 事件定义警报。要查看现有警报或创建新警报，请打开\
    \ SSMS，连接到实例，打开对象资源管理器，展开“SQL Server 代理”，然后单击“警报”。\n\n### 错误和严重性级别\n\n第一种警报类型针对特定错误编号或严重性级别，如图\
    \ 10-8 所示。设置警报所需的一般信息包括名称、类型和定义。\n\n***图 10-8.** 设置 SQL Server 事件警报*\n\n为警报起一个易于识别的名称。\"\
    损坏警报\"远不如\"错误 823\"具体。\n\n仔细选择警报针对的数据库。对于每个事件警报，你可以选择监视一个数据库，或实例上的所有数据库。请注意，某些事件（例如数据库还原）无法在它们执行操作的数据库中发生，必须针对另一个数据库设置。\n\
    \nSQL Server 中有数千个错误编号，为每个错误都设置警报是不必要的。但是，有些错误非常关键，可能预示着即将发生的灾难，例如磁盘损坏。错误 823、824\
    \ 和 825 就是很好的例子。这三个错误表明 SQL Server 无法从磁盘读取页面。这些是你需要设置警报的错误。\n\n还有几个严重性级别。级别 017\
    \ 到 025 表示硬件或软件错误，应该被监控。级别 017 到 019 用于软件错误，例如资源耗尽，用户无法修复。级别 020 到 025 表示致命错误，将终止客户端连接。系统管理员被通知发生致命错误至关重要。\n\
    \n图 10-8 中的示例显示了针对实例上所有数据库的错误 823 的警报。\n\n### 性能条件\n\n第二种警报类型基于性能条件。这些是来自性能监视器的\
    \ SQL Server 特定计数器。你选择一个对象、其计数器和实例（如果适用）。然后，你需要定义具体的计数器条件——它必须低于、高于或等于特定值。\n"
- fmt: '# Chapter 10 ■ Automating Administration


    The example alert shown in Figure 10-9 would be raised if the number of active
    transactions in the `AdventureWorks2012` database rises above 500. This is just
    one of many conditions that are available.


    ### Figure 10-9. A SQL Server performance condition alert


    ![Image 121](index-256_1.png)


    ## WMI Events


    The third type of alert is based on a Windows Management Instrumentation (WMI)
    event. WMI is a framework to carry out common server management tasks with a programming
    or scripting language.


    Agent will use the Windows Management Instrumentation Query Language (`WQL`),
    which is similar to SQL. To create this alert, you specify the namespace and a
    query.


    In Figure 10-10, a WMI event alert has been set up to capture a `DEADLOCK_GRAPH`
    event. The default SQL Server namespace is used, and the query is using `WQL`.


    ### Figure 10-10. A WMI event alert


    When a deadlock occurs, a SQL Server Agent job is started, as shown in Figure
    10-11. The job that was set up, `Capture Deadlock Graph`, will insert the current
    date and time and the deadlock graph into a table for further review.


    ![Image 122](index-257_1.png)


    ### Figure 10-11. The response to this WMI event alert is to execute an Agent
    job


    ## Responses


    For all alert types, after selecting the type of event, the next step is to define
    a response when the condition you established is met. As seen in Figure 10-12,
    you can choose to execute an existing SQL Server Agent job, notify existing operators,
    or do both.


    ![Image 123](index-258_1.png)


    ### Figure 10-12. The response options for an alert


    ## Options


    The third step is to set options, as seen in Figure 10-13. You can choose to include
    the error text in the alert, so you know exactly what the problem is. Including
    the error text is also beneficial when someone who might not be familiar with
    error numbers and severity levels is assigned to receive the notifications, such
    as a junior DBA. You can choose to add your own additional, custom messages here
    as well.


    Most importantly, you can set a delay between the responses that are sent. When
    something is going wrong, there could potentially be thousands of errors and alerts
    being generated per minute. To keep this manageable, set a delay between the responses.
    On average, 30 to 60 seconds is enough of a delay to not get an overwhelming amount
    of alerts, but still be aware there is a problem.


    ![Image 124](index-259_1.png)


    ### Figure 10-13. Additional options for an alert


    ## Maintenance Plans


    SQL Server gives you a convenient way to manage many common administration tasks,
    such as backups, restores, and index maintenance. Maintenance plans are workflows
    based on SQL Server Integration Services (`SSIS`) packages.


    To access this functionality in `SSMS`, expand `Management` and look for `Maintenance
    Plans`. From here, you can create the maintenance plans manually, or use the built-in
    wizard. The first decision you will make when putting a plan together is deciding
    which tasks to include. There are eleven available in SQL Server 2012.


    ## Tasks


    The tasks available in maintenance plans include `Back Up Database`, `Check Database
    Integrity`, `Execute SQL Server Agent Job`, `Execute T-SQL Statement`, `History
    Cleanup Task`, `Maintenance Cleanup Task`, `Notify Operator`, `Rebuild Index`,
    `Reorganize Index`, `Shrink Database`, and `Update Statistics`, as shown in Table
    10-1.


    Some of these tasks should be approached with great care or avoided because of
    default options. For example:


    - **History Cleanup Task**: Do not delete too much or too recent of information.
    Backup and restore history can be used to determine a recovery strategy if needed.
    Agent job and maintenance plan history can help troubleshoot failed jobs or errors.

    - **Maintenance Cleanup Task**: Do not delete backup files you need. If your standards
    are to save full backups for two full weeks and transaction log backups for three
    full days, ensure you are not deleting those files with this step.

    - **Rebuild Index** and **Reorganize Index**: The tasks do not allow you to specify
    a fragmentation threshold for an object at which to perform the action. If the
    object is selected, it will be rebuilt or reorganized, perhaps unnecessarily.
    It might be tempting to choose all objects in a database, but that can result
    in unnecessary rebuild and reorganize operations, which lead to increased `I/O`
    activity on the server.

    - **Shrink Database**: `DBCC SHRINKDATABASE` is performed, which moves pages in
    the database. This causes fragmentation, which leads to performance problems.
    This task should not be performed on any database on a regular basis. Your data
    files should be sized for the amount of data they will need.


    For each of these tasks, as you are building plans and selecting options, you
    can select the `View T-SQL` button at the bottom of the `Edit` screen to see what
    SQL Server is really doing behind the scenes.


    ### Table 10-1. Available Maintenance Plan Tasks


    **Task** | **Description**

    ---|---

    `Back Up Database` | Perform a full, differential, or log backup. You have the
    option to pick all databases, all system databases, all user databases, or select
    just one or more. You select where you want to save the backup files. An option
    is included to verify the backup file’s integrity, which performs a `RESTORE VERIFYONLY`.
    Compression level can also be set.

    `Check Database Integrity` | This task will perform a `DBCC CHECKDB` on the database(s)
    you select. You can choose to check all pages, or exclude indexes.

    `Execute SQL Server Agent Job` | After you have created Agent jobs, you can include
    them in a maintenance plan. SQL Server uses a system stored procedure, `sp_start_job`,
    to run the job.

    `Execute T-SQL Statement` | This task will allow you to enter any T-SQL statement
    or script. If you have developed custom scripts, this can be a way to incorporate
    and automate them.

    `History Cleanup Task` | SQL Server stores the history of many operations in the
    `msdb` database. This includes backup and restore information, Agent job history,
    and maintenance plan history. These tables, if left unattended, can grow very
    large. The history cleanup task allows you to pick one or more types, and a time
    frame, and will delete information older than that from the `msdb` tables.

    `Maintenance Cleanup Task` | Just as some operations will take up space in `msdb`,
    other operations will take up space on disk. This task allows you to clean up
    backup files and maintenance plan reports that are older than a certain date.
    Be very careful with this option, particularly when used with backup files. You
    want to ensure you are not deleting any files that you need for your disaster
    recovery plans.

    `Notify Operator` | This task will use the operators you have defined in SQL Server
    Agent, so that service must be enabled and running. The task allows you to configure
    your plan to send information to the operator. You can customize the subject and
    body of the notification.

    `Rebuild Index` | An `ALTER INDEX…REBUILD` statement will be built and executed
    using the options you choose. Select one or more databases and one or more tables
    or views. There are advanced options available here, such as sorting results in
    `tempdb` and keeping the indexes online. However, make sure you understand the
    implications of these before selecting them.

    `Reorganize Index` | To perform the less-intensive `ALTER INDEX…REORGANIZE` operation,
    use this task. Select the databases and objects against which the task will be
    executed.

    `Shrink Database` | When this task is configured, databases, size limits, and
    free space percentages are chosen. The database will be shrunk to the target size
    with the specified free space remaining. Use caution when enabling the task. The
    `DBCC SHRINKDATABASE` command that is executed can cause fragmentation.'
