  raw: 'Server, such as AlwaysOn and SQL Server Audits. This category of data provides
    a layer of history and monitoring that might not be available in other methods.
    For example, a table that I include in here often is the cluster node history;
    this provides information as to what node of a cluster was hosting the SQL


    Server historically.


    This third category has been extremely helpful to me as a consultant. As discussed
    in the previous checklist section, each business has different key business indicators.
    Data that does not fit in a core install of SQL Server, and does not fit into
    the features of SQL Server, fits into this third category. For example, if we
    reuse the previous 911 call list queue example, a table in this category would
    store the date and time of how many calls were waiting in the queue. This data
    does not have to do with SQL Server core install nor SQL Server features; instead,
    it falls into the third category of domain-specific data.


    Data Storage


    The data in your utility database fits into many different groups. Organizing
    the data based on the intent of how it will be used in the future, and how long
    the data is retained, helps in the determination of how the tables are designed.


    • Group 1—Data in which historical content is being analyzed


    • Group 2—Data that is reviewed for current health


    • Group 3—Archived data


    chapter 6 ■ the Utility Database


    Data that is reviewed for historical trending, such as database growth, should
    be retained long term.


    An example of the benefits of grouping like data can be seen with database growth
    as the measured value.


    The primary benefit is to determine what the growth rate is and to measure that
    growth rate over the course of time. You could draw secondary benefits from this
    historical information as well; for example, the data footprint after a major
    release, or when a database growth pattern stopped or started, add valuable information
    when troubleshooting.


    Data that has no long-term value, but might be part of a daily checklist report,
    might not need to be retained longer than 24 hours. An example of this data group
    could be the SQL Server error log. SQL Server error logs can be imported and then
    filtered each day by the utility database. When this data is reported, the report
    can include only the data that is relevant. The filtered data might not be relevant
    after the initial report of the data, and might not need to be kept. In the example
    of SQL Server error log filtering, the original source of the data (the error
    log), is not altered; therefore, keeping the data would create duplicate information.


    There is a slight difference between archived data and historical data. The historical
    data is being kept around to identify long-term trends (such as growth). The archive
    data group gives you the option to log information that was sent in a report,
    but then removed. In the case of the SQL Server error log, there might be no need
    to keep detailed data because of the duplication of data, but a user might want
    to see what data was sent in a previous report. The archive data, if you choose
    to use it, would be the data that was sent in a report, but then deleted. This
    allows you to re-create reports that were sent in the past. Keep in mind that
    this might not be useful in each utility database implementation.


    Figure 6-1 shows how a category can have one or more groups. The core install
    category (Category 1) collects information about the basic install, such as database
    growth and SQL Server error logs. After reporting, the SQL Server error logs table
    (filtered data) can be truncated, making it a Group 2\. The database growth table
    would be retained long term for historical trending, making it a Group 1.


