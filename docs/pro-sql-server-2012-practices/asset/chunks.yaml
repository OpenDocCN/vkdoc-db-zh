  trans: "\n# 分配单元类型数据类型\n\n## 描述\n\n**IN_ROW_DATA**\n`SMALLINT`、`INT`、`TINYINT`、`BIT`、`BIGINT`、`CHAR`、`NCHAR`、`NVARCHAR`、`NVARCHAR(MAX)`、`VARCHAR`、`VARCHAR(MAX)`、`DECIMAL`、`NUMERIC`、`SMALLMONEY`、`MONEY`、`FLOAT`、`REAL`、`DATE`、`DATETIME`、`DATETIME2`、`DATETIMEOFFSET`、`SMALLDATETIME`、`TIME`、`BINARY`、`VARBINARY`、`VARBINARY(MAX)`、`XML`、`GEOGRAPHY`、`GEOMETRY`、`TIMESTAMP/ROWVERSION`、`UNIQUEIDENTIFIER`、`CLR\
    \ 用户定义类型` 或 `SQL_VARIANT`\n\n常规数据页，组合记录大小为 8,000 字节。大多数可以存在于其他分配单元页上的数据类型，只要总记录大小低于\
    \ 8,000 字节，也可以位于 `IN_ROW_DATA` 页上。\n\n**ROW_OVERFLOW_DATA**\n`VARCHAR`、`NVARCHAR`、`VARBINARY`、`CLR\
    \ 用户定义类型` 或 `SQL_VARIANT`\n\n可变长度数据，最初可能位于 `IN_ROW_DATA` 页上。一旦记录超过 8,000 字节，最大的可变长度字段就会被移入\
    \ `ROW_OVERFLOW_DATA` 页。\n\n**LOB_DATA**\n`XML`、`TEXT`、`IMAGE`、`NTEXT`、`VARCHAR(MAX)`、`VARBINARY(MAX)`、`NVARCHAR(MAX)`\n\
    \n代表“大型对象数据”。\n\n## 查询分配单元页计数\n\n我首先要做的是针对数据库运行一个查询，以获取所有分配单元类型的页计数。为此，我运行以下查询，按页计数获取表和索引的列表，并重点关注具有\
    \ `IN_ROW_DATA` 的表。\n\n```sql\nSELECT\n    OBJECT_NAME(sp.object_id) AS [ObjectName]\n\
    \    ,si.name AS IndexName\n    ,sps.in_row_data_page_count as In_Row_Data\n \
    \   ,sps.row_overflow_used_page_count AS Row_Over_Flow_Data\n    ,sps.lob_reserved_page_count\
    \ AS LOB_Data\nFROM\n    sys.dm_db_partition_stats sps\n    JOIN sys.partitions\
    \ sp\n        ON sps.partition_id=sp.partition_id\n    JOIN sys.indexes si\n \
    \       ON sp.index_id=si.index_id AND sp.object_id = si.object_id\nWHERE\n  \
    \  OBJECTPROPERTY(sp.object_id,'IsUserTable') =1\norder by sps.in_row_data_page_count\
    \ desc\n```\n\n## 在 IN_ROW_DATA 页上压缩数据\n\n现在，让我们验证一下，只要数据位于 `IN_ROW_DATA` 页上，数据类型并不重要。\n\
    \n我们将使用以下脚本在数据库中创建一个具有 `VARCHAR(MAX)` 数据类型的表，但我们将仅使用 4,037 个字符的数据并应用页面压缩：\n\n\
    ```sql\n/*\n选择我们要使用的演示数据库\n*/\nUSE demoInternals\nGO\n\n/*\n创建我们的表\n*/\nIF EXISTS(SELECT\
    \ name FROM sys.tables WHERE name='vmaxTest')\nBEGIN\n    DROP TABLE dbo.vmaxTest\n\
    END\nGO\n\nCREATE TABLE vmaxTest(myid int identity(1,1)\n    , mydata varchar(max)\
    \ default 'a'\n    ,CONSTRAINT pk_vmaxtest1 PRIMARY KEY CLUSTERED (myid))\nGO\n\
    \n/*\n插入 5000 行\n*/\nDECLARE @i INT\nSET @i=0\nWHILE (@i<5000)\nBEGIN\n    INSERT\
    \ INTO vmaxTest(mydata)\n    VALUES(replicate('a',4032)+cast(@i AS VARCHAR(5)))\n\
    \    SET @i=@i+1\nEND\nGO\n\n/*\n在压缩前检查我们的空间使用情况\n*/\nsp_spaceused 'vmaxTest'\n\
    GO\n\n/*\n使用页面压缩重建我们的表\n*/\nALTER TABLE dbo.vmaxtest\nREBUILD WITH(DATA_COMPRESSION=PAGE);\n\
    GO\n\n/*\n在压缩后检查我们的空间使用情况\n*/\nsp_spaceused 'vmaxTest'\nGO\n```\n\n如图 14-13 所示，在压缩表之前使用的空间为\
    \ 40,200 KB，大约 40 MB。这不是一个大型数据集，但足以展示我们想要测试的内容。应用页面压缩后，存储大小减少到 320 KB。\n\n**图\
    \ 14-13.** 查看对位于 `IN_ROW_DATA` 页中的 `VARCHAR(MAX)` 数据类型应用页面压缩的结果。\n\n这证实了我们可以压缩位于\
    \ `IN_ROW_DATA` 页上的 `VARCHAR(MAX)`，但它只证实了我们前提的一半。为了测试这一点，我们需要创建由 `IN_ROW_DATA`\
    \ 以外的方式分配的数据，并观察到它无法被压缩。\n\n## 跨多个分配单元压缩数据\n\n我们将使用与上次相同的脚本，但会添加另一个 `VARCHAR(MAX)`\
    \ 字段，并强制将部分数据放入 `LOB_DATA` 页。压缩前的页计数参见图 14-14。之后，我们将查看分配单元，验证页面是否已创建，然后压缩仍位于 `IN_ROW_DATA`\
    \ 页中的数据。应用压缩后的页计数参见图 14-15。\n\n```sql\n/*\n选择我们要使用的演示数据库\n*/\nUSE demoInternals\n\
    GO\n\n/*\n创建我们的表\n*/\nIF EXISTS(SELECT name FROM sys.tables WHERE name='vmaxTest')\n\
    BEGIN\n    DROP TABLE dbo.vmaxTest\nEND\nGO\n\nCREATE TABLE vmaxTest(myid int\
    \ identity(1,1)\n    , mydata varchar(8000) default 'a'\n    ,mydata2 varchar(max)\
    \ default 'b'\n    ,CONSTRAINT pk_vmaxtest1 PRIMARY KEY CLUSTERED (myid))\nGO\n\
    \n/*\n插入 5000 行\n*/\nDECLARE @i INT\nSET @i=0\nWHILE (@i<5000)\nBEGIN\n    INSERT\
    \ INTO vmaxTest(mydata, mydata2)\n    VALUES(replicate('a',2016)+cast(@i AS VARCHAR(5)),\
    \ replicate('b',2016)+cast(@i AS VARCHAR(5)))\n    SET @i=@i+1\nEND\nGO\n\n/*\n\
    通过将 mydata2 varchar(max) 字段的大小膨胀到 7000 个字符\n来创建一些行溢出数据\n*/\nUPDATE dbo.vmaxTest\n\
    SET mydata=replicate('a',3900),\n    mydata2=replicate('b', 5000)\nGO\n\n/*\n\
    验证我们的分配单元构成\n并获取页计数\n*/\nSELECT\n    OBJECT_NAME(sp.object_id) AS [ObjectName]\n\
    \    ,si.name AS IndexName\n    ,sps.in_row_data_page_count as In_Row_Data\n \
    \   ,sps.row_overflow_used_page_count AS Row_Over_Flow_Data\n    ,sps.lob_reserved_page_count\
    \ AS LOB_Data\nFROM\n    sys.dm_db_partition_stats sps\n    JOIN sys.partitions\
    \ sp\n        ON sps.partition_id=sp.partition_id\n    JOIN sys.indexes si\n \
    \       ON sp.index_id=si.index_id AND sp.object_id = si.object_id\nWHERE\n  \
    \  OBJECTPROPERTY(sp.object_id,'IsUserTable') =1\norder by sps.in_row_data_page_count\
    \ desc\n```\n\n**图 14-14.** 应用页面压缩前按分配单元列出的页计数。\n\n```sql\n/*\n使用页面压缩重建我们的表\n\
    */\nALTER TABLE dbo.vmaxtest\nREBUILD WITH(DATA_COMPRESSION=PAGE);\nGO\n\n/*\n\
    验证我们的分配单元构成\n并获取页计数\n*/\nSELECT\n    OBJECT_NAME(sp.object_id) AS [ObjectName]\n\
    \    ,si.name AS IndexName\n    ,sps.in_row_data_page_count as In_Row_Data\n \
    \   ,sps.row_overflow_used_page_count AS Row_Over_Flow_Data\n    ,sps.lob_reserved_page_count\
    \ AS LOB_Data\nFROM\n    sys.dm_db_partition_stats sps\n    JOIN sys.partitions\
    \ sp\n        ON sps.partition_id=sp.partition_id\n    JOIN sys.indexes si\n \
    \       ON sp.index_id=si.index_id AND sp.object_id = si.object_id\nWHERE\n  \
    \  OBJECTPROPERTY(sp.object_id,'IsUserTable') =1\norder by sps.in_row_data_page_count\
    \ desc\n```\n\n**图 14-15.** 应用页面压缩后按分配单元列出的页计数。\n\n## 结论：了解你的数据\n\n我曾经有一个客户，他们刚刚从\
    \ SQL Server 2000 升级到 SQL Server 2008 R2。他们希望考虑在其主要生产数据库上使用压缩。他们心中有一个特定的表，该表包含\
    \ 132 GB 的数据。我首先查看了分配单元，发现其中 1% 是 `IN_ROW_DATA`，99% 是 `LOB_DATA`。在询问表中存储的内容后，我了解到它有一个\
    \ `Image` 列，用于保存 PDF 文档。我立即告诉客户，SQL Server 数据压缩不应用于此表，因为绝大部分（绝大多数）数据是不可压缩的。了解构成表的分配单元类型的最大好处在于，它不仅有助于你选择*要*压缩的内容，也有助于你选择*不要*压缩的内容。我们本可以使用\
    \ `FILESTREAM` 来存储 PDF 文档，或者在 SQL Server 2012 中，`FileTable` 也是一个值得考虑的选项，可以为他们提供更大的灵活性来存储和搜索数据。\n\
    \n只要你的数据位于 `IN_ROW_DATA` 页中，你就可以压缩它。在决定压缩什么之前，先了解你数据的分配单元是什么。我通常不会像在第二个例子中那样，在没有采取几个步骤的情况下，就压缩一个比例只有\
    \ 50-50 的表。首先，找到访问此表的查询或存储过程。以 XML 格式提取查询计划并进行检查。压缩数据，然后再次提取查询计划。现在计划改变了吗？性能受到了怎样的影响？回答这些问题对于确定你想要压缩什么大有帮助。\n"
- fmt: "# Chapter 14: Page and Row Compression\n\nThe scan and update patterns, on\
    \ your tables, are the next thing to consider when determining what to compress.\
    \ The more a table is updated, the less likely you should be to compress it. Writes\
    \ cause extra CPU activities. SQL is constantly translating writes to data pages\
    \ to compressed and uncompressed format. Updates can cause page splits, which\
    \ then cause the page compression to be recalculated on all updated pages. Notice\
    \ that I said “updates” and not “inserts.” Inserts might cause an issue, but updates\
    \ speak to the volatility of the data in your table. Our queries will look for\
    \ scans and updates, and we will filter inserts out of each.\n\nYou use the DMV\
    \ `sys.dm_db_index_operational_stats` to determine your scan and update patterns.\n\
    \nThis DMV returns low-level I/O details for a number of range and table scans,\
    \ as well as update, insert, and delete activity. The query you’ll use was originally\
    \ two separate queries. I used a Common Table Expression (`CTE`), which is a temporary\
    \ derived result set based on a simple query, to combine them so that you could\
    \ look at scans and updates for indexes side by side.\n\nYou use the `range_scan_count`\
    \ column to get all scans that have occurred against a heap, clustered index,\
    \ or nonclustered index. You then multiply that number by `100.0` and divide the\
    \ result by the total scans, inserts, updates, and deletes that have occurred\
    \ on the system. This gives you a percentage of scan activity on all the indexes\
    \ in all the tables in your database.\n\nIf you perform only selects, you’ll always\
    \ have returned 100 percent. If you issue some updates, deletes, or inserts, you’ll\
    \ see the scan percentage begin to drop.\n\nYou use the `leaf_update_count` column\
    \ to get all update activity for your heaps, clustered indexes, and nonclustered\
    \ indexes. Figure 14-16 shows the results of your scan and update query from some\
    \ of our demo tables; your results might vary based on select, update, and insert\
    \ statements that you have run. All scan and update data for an object will be\
    \ cleared when rebuilding an object by applying compression.\n\nIdeally, your\
    \ updates should be under 40 percent and your scans should be 60 percent or higher,\
    \ in order to select a table for compression. Neither of these percentages will\
    \ add up to 100 percent—we are simply getting an average of these two activities\
    \ out of all the other operations that could be performed on them.\n\nSo now let’s\
    \ run a query that will look at each table in your database and let you see what\
    \ the allocation unit makeup is for each one.\n\n```sql\nWITH IndexUsage(tableName,\
    \ IndexName, [Partition], IndexID, IndexType, USAGE, Percentage) AS(\n    SELECT\n\
    \        (ss.name + '.' + so.name)\n        ,si.name\n        ,ios.partition_number\n\
    \        ,ios.index_id\n        ,si.type_desc AS indexType\n        ,'SCANS'\n\
    \        , case ios.range_scan_count\n            when 0 then 0\n            else\n\
    \            (ios.range_scan_count *100.0/\n            (ios.range_scan_count\
    \ +\n            ios.leaf_delete_count +\n            ios.leaf_insert_count +\n\
    \            ios.leaf_page_merge_count +\n            ios.leaf_update_count +\n\
    \            ios.singleton_lookup_count)) end AS percentScan\n    FROM\n     \
    \   sys.dm_db_index_operational_stats(DB_ID(),NULL,NULL,NULL) ios\n        JOIN\
    \ sys.objects so\n            ON so.object_id=ios.object_id\n        JOIN sys.indexes\
    \ si\n            ON si.object_id = ios.object_id AND si.index_id = ios.index_id\n\
    \        JOIN sys.schemas ss\n            ON so.schema_id = ss.schema_id\n   \
    \ WHERE\n        OBJECTPROPERTY(ios.object_id, 'IsUserTable')=1\n    UNION ALL\n\
    \    SELECT\n        (ss.name + '.'+ so.name)\n        ,si.NAME\n        ,ios.partition_number\n\
    \        ,ios.index_id\n        ,si.type_desc\n        ,'UPDATES'\n        , case\
    \ ios.leaf_update_count\n            when 0 then 0\n            else\n       \
    \     (ios.leaf_update_count *100/\n            (ios.range_scan_count +\n    \
    \        ios.leaf_insert_count +\n            ios.leaf_delete_count +\n      \
    \      ios.leaf_update_count +\n            ios.leaf_page_merge_count +\n    \
    \        ios.singleton_lookup_count)) end\n    FROM\n        sys.dm_db_index_operational_stats(DB_ID(),\
