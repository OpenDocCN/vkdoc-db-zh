    events in our trace and will not use a template. Select the option “Do not use
    a template” and then select Next.


    ![Image 91](index-187_1.png)


    chapter 7 ■ IndexIng OutsIde the BuBBle


    ***Figure 7-12.** Extended events wizard Choose Template screen*


    The next step is to select the events that will be captured through the extended
    events session. These are configured on the Select Events To Capture screen of
    the wizard. To configure the session similar to the SQL Profiler Tuning session,
    you need to select the events in extended events that match the RPC: Completed,
    SP: Completed, and SQL: Batch Completed events. The easiest way to discover these
    events is to use the event filter and retrieve all of the events with the word
    *completed* in their names, as shown in Figure 7-13\. The events to select are
    rpc_completed, sp_statement_completed, and sql_statement_


    completed. After you’ve selected these events, click the Next button to continue.


    ![Image 92](index-188_1.png)


    chapter 7 ■ IndexIng OutsIde the BuBBle


    ***Figure 7-13.** Extended events wizard Select Events To Capture screen*


    Each extended event has its own set of columns, but these don’t cover all of the
    columns required for matching the extended event session to the SQL trace session.
    To accomplish this, you need to add some additional columns to the session on
    the Capture Global Fields screen of the wizard. The additional fields to include,
    which are shown in Figure 7-14, are as follows:


    • database_id


    • database_name


    • session_id


    •


    username


    After selecting the global fields, click the Next button to continue to the next
    screen of the wizard.


    ![Image 93](index-189_1.png)


    chapter 7 ■ IndexIng OutsIde the BuBBle


    ***Figure 7-14.** Extended events wizard Capture Global Fields screen*


    The next step in building the session is adding filter criteria to the session
    via the Set Session Event Filters screen, shown in Figure 7-15\. There are two
    filters that will be worthwhile for most loads. The first removes system activity
    using the is_systemfield filter, since we won’t be indexing any system tables.
    The second limits the events only to those that are occurring in the database
    in which we want to look at improving indexing. In this case, it is only the AdventureWorks2012
    database, which has the database ID of 18 on the demonstration server used for
    this chapter.


    You can use either the database_name or database_id columns for the filtering.
    It is typically preferred to use the database_id column because the data types
    for the filtering are smaller. On the other hand, using the database_name for
    the filter is easier to port between servers, which would likely not have identical
    database_id values. When building filters, it is important to configure them in
    the order of highest selectivity, as extended events filtering supports short-circuiting.


    ![Image 94](index-190_1.png)


    chapter 7 ■ IndexIng OutsIde the BuBBle


    ***Figure 7-15.** Extended events wizard Set Session Event Filters screen*


    The last step in configuring the extended events session is to configure the target
    for the events. On the Specify Session Data Storage screen, shown in Figure 7-16,
    select the option for “Save data to a file for later analysis (event_file target).”
    You can use the default file location, but you should be certain that it is a
    location that will not conflict with other more important I/O activity, such as
    tempdb and transaction files.


    Click Next to continue, or Finish to build and start the session. The next screen
    in the wizard summarizes the session and builds the session.


    ![Image 95](index-191_1.png)


    chapter 7 ■ IndexIng OutsIde the BuBBle


    ***Figure 7-16.** Extended events wizard Specify Session Data Storage screen*
    Alternatively to building the extended event session through the wizard, you can
    also build the session through T-SQL DDL commands. To do this, you will use the
    CREATE EVENT SESSION statement, provided in Listing 7-9, which includes event,
    action, predicate, and target information in a single statement.


    Using DDL is much easier when you want to build and create the sessions on many
    servers, and allows you to avoid using the wizard time and again. One difference
    between the wizard-created session and the one provided in Listing 7-9 is the
    inclusion of the EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS


    option in the session. The use of this option is advised, as it will allow the
    extended event session to drop events in situations where the server is taxed
    with other activities. In general, this should be the case, but you will likely
    want to allow for this.


    ***Listing 7-9.** Create Extended Events Session*


    CREATE EVENT SESSION [indexing_workload] ON SERVER


    ADD EVENT sqlserver.rpc_completed(


    SET collect_data_stream=(1),collect_statement=(1)


    ACTION(sqlserver.database_id,sqlserver.database_name


    ,sqlserver.session_id,sqlserver.username)


    WHERE (([sqlserver].[is_system]=(0))


    AND ([sqlserver].[database_id]=(18)))),


    ADD EVENT sqlserver.sp_statement_completed(


    chapter 7 ■ IndexIng OutsIde the BuBBle


    ACTION(sqlserver.database_id,sqlserver.database_name


    ,sqlserver.session_id,sqlserver.username)


    WHERE (([sqlserver].[is_system]=(0))


    AND ([sqlserver].[database_id]=(18)))),


    ADD EVENT sqlserver.sql_statement_completed(


    ACTION(sqlserver.database_id,sqlserver.database_name


    ,sqlserver.session_id,sqlserver.username)


    WHERE (([sqlserver].[is_system]=(0))


    AND ([sqlserver].[database_id]=(18))))


    ADD TARGET package0.event_file(


    SET filename=N''C:\temp\indexing_workload.xel'')


    WITH (STARTUP_STATE=ON,EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS)


    GO


    After the session has been created, you will need to start the session for it
    to begin collecting events.


    The session should be run for the period that was determined at the start of this
    section. The code provided in Listing 7-10 can be used to start and stop the session.


    ***Listing 7-10.** Start and Stop the Session*


    --Start Session


    ALTER EVENT SESSION indexing_workload ON SERVER STATE = START


    GO


    --Stop Session


    ALTER EVENT SESSION indexing_workload ON SERVER STATE = STOP


    GO


    When the extended event session has been stopped, the data from the session will
    need to be inserted into the table dbo.indexing_workload, which was created in
    Listing 7-8\. Listing 7-11 shown how we accomplish this. Because the extended
    event session was output to a file target, the function sys.fn_xe_


    file_target_read_file is used to read the data back into SQL Server. One of the
    benefits of using the file target in this scenario, is that the files can be read
    into any server; this means you can perform the analysis on any server and, specifically,
    not on the production server.


    ***Listing 7-11.** Insert Extended Event Session into dbo.indexing_workload*


    WITH indexing_workload AS (


    SELECT object_name as event


    ,CONVERT(xml, event_data) as XMLData


    FROMsys.fn_xe_file_target_read_file


    (''C:\temp\indexing_workload*.xel''


    , ''C:\temp\indexing_workload*.xem''


    , null, null))


    INSERT INTO dbo.indexing_workload


    (


    EventClass


    , TextData


    , Duration


    , SPID


    , DatabaseID


    , DatabaseName


    chapter 7 ■ IndexIng OutsIde the BuBBle


    , ObjectType


    , LoginName


    , BinaryData


    )


    SELECT


    CASE event


    WHEN ''sp_statement_completed'' THEN 43


    WHEN ''sql_statement_completed'' THEN 12


    WHEN ''rpc_completed'' THEN 10


    END


    , XMLData.value(''(/event/data[@name=''''statement'''']/value)[1]'',''nvarchar(max)'')


    , XMLData.value(''(/event/data[@name=''''duration'''']/value)[1]'',''bigint'')


    , XMLData.value(''(/event/action[@name=''''session_id'''']/value)[1]'',''int'')


    , XMLData.value(''(/event/action[@name=''''database_id'''']/value)[1]'',''int'')


    , XMLData.value(''(/event/action[@name=''''database_name'''']/value)[1]'',''nvarchar(128)'')


    , XMLData.value(''(/event/data[@name=''''object_type'''']/value)[1]'',''bigint'')'
