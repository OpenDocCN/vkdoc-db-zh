    ## 修改联邦（ALTER FEDERATION）


    SQL 数据库未来将提供的一项功能，支持时间点恢复选项。具体应用时会受到某些限制。


    ## 使用联邦（USE FEDERATION）


    允许一个会话将其数据库上下文从一个联邦成员切换到另一个，或返回到根数据库。


    ## 在联邦上创建表（CREATE TABLE FEDERATED ON）


    `CREATE TABLE` 语句经过修改，可接受 `FEDERATED ON` 选项。此选项告知 SQL 数据库，表中的哪个字段将作为联邦列，并用于在联邦成员之间分配数据。


    ## sys.federations


    提供对根数据库中创建的联邦列表的访问。


    ## sys.federation_members


    提供构成根数据库中所有联邦的所有联邦成员列表。


    ## 联邦示例


    让我们来看一个简单的场景。在这个场景中，我创建一个名为 `FederationCust` 的联邦，它将包含两个表：`Customers` 和 `Countries`。我的
    `Customers` 表将被联邦化，因为它将包含大量记录，并且随着数据库的增长，将成为我的 SQL 数据库实例中性能和可扩展性问题的根源。我的 `Customers`
    表将包含一个 `CustomerID` 字段作为唯一标识符，该字段被用作联邦表的密钥。`Countries` 表不需要被联邦化；但是，我希望在联邦中包含该表作为参考表，以确保数据完整性。以下步骤展示了如何创建该联邦，如图
    12-4 所示：


    1.  我使用 `CREATE FEDERATION` 语句创建一个名为 `FederationCust` 的联邦，指定一个名为 `CustomerID`
    的分布名称。这会创建一个空数据库。然后我使用 `USE FEDERATION` 语句将上下文切换到该数据库，并创建我的两个表：`Countries` 和 `Customers`。但是，在创建
    `Customers` 表时，我使用 `CREATE TABLE … FEDERATED ON` 语句指定该表将根据其 ID 字段（联邦列）进行联邦化。由于我的联邦目前只有一个成员数据库，所有记录都将存储在此数据库中。

    2.  将来的某个时候，我意识到我的联邦正在增长，并希望将我的 `Customers` 表存储在两个成员数据库（也称为 `federation members`，或简称为
    `members`）上，以提高应用程序性能。因此，我决定使用 `ALTER FEDERATION … SPLIT` 命令拆分联邦，指定 `CustomerID`
    分布名称将在 1000 处进行拆分。在后台，SQL 数据库会创建两个新的成员数据库，并从原始成员数据库复制客户记录，使得第一个新成员包含所有 ID 小于 1000
    的记录，第二个新成员包含所有 ID 大于或等于 1000 的记录。由于 `Countries` 表未被联邦化，它将被完整复制。如果原始成员中还创建了其他对象，例如存储过程，它们也会被复制。


    ![Image 143](img/index-310_1.png)


    第 12 章 ■ 面向数据库管理员的 Windows Azure SQL 数据库


    3.  复制操作完成后，原始成员将被移除，只剩下两个成员。`SPLIT` 操作可以在联机状态下执行，对性能影响有限，并且在操作结束时数据库将保持事务一致性。我可以根据需要随着时间的推移进一步拆分我的联邦，以扩展我的数据库。


    **图 12-4.** 创建 SQL 数据库联邦的步骤。


    ## 限制


    SQL 数据库联邦正变得越来越受欢迎，因为它们满足了云计算中的一个重要可扩展性需求。但是，存在某些限制，开发人员和数据库管理员应予以了解。其中一些限制可能会随着时间的推移而解除，因此我建议您核实以下限制是否仍然适用：


    - `数据类型`：联邦成员中不支持 `timestamp` 和 `rowversion` 数据类型。

    - `标识列`：联邦成员中不支持标识列。

    - `合并`：目前无法合并联邦成员。此功能已计划但尚未可用。

