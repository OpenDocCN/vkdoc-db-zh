- fmt: "**SCENARIO 3: Overnight Processing Jobs**\nWith a particularly large database,\
    \ taking a nightly backup has started to cause issues with overnight processing\
    \ jobs. These jobs are critical to starting business the next morning and are\
    \ required to finish before the employees arrive at 8 a.m.\n\n**SCENARIO 4: Hardware\
    \ Failure**\nThe main database server has failed due to a hardware issue. The\
    \ vendor, while providing prompt service, cannot guarantee a subsequent failure\
    \ without upgrading to the newest hardware it offers. Everything appears to be\
    \ running smoothly, but having more than just the nightly backup to rely upon\
    \ is now a number 1 priority.\n\n# SQL Server Solutions\n\nWithout having a clear\
    \ understanding of the technology you want to use, it is easy to work yourself\
    \ into trouble. SQL Server provides a variety of options for data replication.\
    \ Shown here are various methods available to you just by using the product:\n\
    \n- Replication\n  - Snapshot\n  - Transactional\n  - Peer-to-Peer\n  - Merge\n\
    - Log shipping\n- Database mirroring\n  - Asynchronous\n  - Synchronous\n- AlwaysOn\
    \ (requires Windows Server Failover Cluster)\n  - Availability groups\n  - Failover\
    \ cluster instance (FCI)\n- Custom ETL (Extract, Transform, Load) using SQL Server\
    \ Integration Services\n- Bulk copy process (BCP)\n\nEach of these methods has\
    \ certain benefits and limitations compared to the others, and certain ones are\
    \ better suited to different needs. The flexibility gained by having so many choices\
    \ can be daunting. Once you are familiar with the strengths of each, it becomes\
    \ easier to determine which is best for the purpose at hand.\n\nThe sections that\
    \ follow provide descriptions of each option, along with the benefits offered\
    \ by each. Also covered are some potential hurdles you should be aware of with\
    \ a given solution. Keep in mind as you read, though, that nothing is ever “set\
    \ and forget.” You will always need to monitor and tune as your servers continue\
    \ to support your company’s applications.\n\n## Replication\n\nMany data professionals,\
    \ upon hearing the word “replication,” get a wary look and start moving away from\
    \ you. I have yet to understand why people can be so antireplication—unless they\
    \ haven’t worked with it since SQL Server version 6.5 “back in the day.” Today’s\
    \ options for using SQL Server replication cover a wide variety of scenarios and\
    \ offer a lot of flexibility.\n\n> **Note:** In general, replication involves\
    \ three players: the publisher, the distributor, and one or more subscribers.\
    \ The main use for replication is for redundancy and geographic distribution of\
    \ data. There is no tenet for failing over services or applications when using\
    \ replication. However, subscribers can be used to support outages of other subscribers\
    \ when needed.\n\n### Snapshot\n\nJust as the name implies, a snapshot is a point-in-time\
    \ picture of the data. The snapshot method can be good for making quick copies\
    \ that do not need to be updated frequently. Snapshots are typically used to initialize\
    \ other replication topologies, but they can also be useful for creating mainly\
    \ read-only copies of an entire database. The process is comparable to a `backup/restore`\
    \ operation that runs on a scheduled basis—for example, daily, weekly, or monthly.\n\
    \n> **Note:** Snapshot replication uses the same topology as transactional replication,\
    \ which is described in the next section.\n\nIf you decide to implement snapshot\
    \ replication, the size of the data being replicated is a paramount concern. If\
    \ the amount of data is too large and takes a long time to replicate to the subscribers,\
    \ the frequency of snapshots should be limited significantly.\n\n### Transactional\n\
    \nPicture a three-ring circus consisting of a publisher database, distribution\
    \ database (DB), and at least one subscriber database, all brought together with\
    \ the use of the `SQL Server Agent` as the ringmaster. (Figure 11-1 illustrates\
    \ the topology.) There are several options for configuring transactional replication\
    \ that make this solution scalable by parceling off each component. Another strength\
    \ of this solution is that you can choose to replicate portions of your data,\
    \ whether it’s a single table, a few columns in a table, or even a subset of data\
    \ from a table.\n\n![Transactional replication topology diagram](index-282_1.png)\n\
    *Figure 11-1. Transactional replication.*\n\nAdditionally, you can have multiple\
    \ subscriber databases, so you have the ability to create many copies of the data\
    \ and keep them synchronized with the data from the publisher. By using stored\
    \ procedures to apply data changes, you can gain even greater flexibility because\
    \ you can create your own custom logic if needed.\n\nAnother win here is the option\
    \ to not only pass along data changes, but also pass along changes to the objects\
    \ themselves. Data Definition Language (DDL) changes to tables, views, stored\
    \ procedures, and so on can also be replicated. Multiple databases can be set\
    \ up as publishers, subscribers, or both on any given server.\n\nIn the transactional\
    \ replication setup, data changes are made at the publisher database. Then the\
    \ transaction details are sent to the distribution database, which in turn sends\
    \ those changes to all of the subscriber databases. `SQL Server Agent` jobs called\
    \ *log readers* facilitate the collection and delivery of transactions.\n\nThe\
    \ benefits include the following:\n\n- Flexibility in the topology so that you\
    \ can use it in a wide variety of environments\n- Customizability through the\
    \ implementation of stored procedures for `insert`, `update`, and `delete` transactions\n\
    - Ability of the distribution agent to push changes out to subscribers, or to\
    \ allow each subscriber to have its own distribution agent to pull changes from\
    \ the distribution database\n- Availability in all versions of SQL Server\n- Table-level\
    \ data replication, with options for partitioning and filtering\n- Ability for\
    \ a subscriber to have a completely different set of data replicated to it\n\n\
    The limitations include the following:\n\n- Every table included in a replication\
    \ topology must have a `Primary Key` defined.\n- There is potential for varied\
    \ degrees of latency due to network traffic or significant or frequent data changes.\n\
    \n### Peer-to-Peer\n\nIn the peer-to-peer topology, all database servers—referred\
    \ to as *nodes*—act as both publishers and subscribers. The distribution agents\
    \ facilitate the delivery of all changes to all nodes, essentially making peer-to-peer\
    \ a hybrid of transactional and merge replication.\n\nThere is an option for conflict\
    \ detection. If conflict detection is enabled, conflicts are handled at the distribution\
    \ database and will cause a failure of the distribution agent until the conflict\
    \ has been manually resolved.\n\nThe benefits of peer-to-peer replication are\
    \ the following:\n\n- Can be useful in load-balancing architectures\n- Possibility\
    \ to fail over to any node (application level)\n\nThe price you pay is that you\
    \ have to deal with a somewhat longer list of limitations:\n\n- Every table included\
    \ in a replication topology must have a `Primary Key` defined.\n- Row and column\
    \ partitioning is not supported.\n- Snapshots cannot be used for the initialization\
    \ of a new node.\n- Conflict detection requires manual intervention.\n- The recommended\
    \ setup is to have only one node updateable due to conflict-detection intervention.\n\
    - Peer-to-peer replication is an Enterprise edition–only feature.\n\n### Merge"
  raw: '**SCENARIO 3: Overnight Processing Jobs** With a particularly large database,


    taking a nightly backup has started to cause issues with overnight processing


    jobs. These jobs are critical to starting business the next morning and are required
    to finish before the employees arrive at 8 a.m.


    **SCENARIO 4: Hardware Failure** The main database server has failed due to a


    hardware issue. The vendor, while providing prompt service, cannot guarantee a


    subsequent failure without upgrading to the newest hardware it offers. Everything


    appears to be running smoothly, but having more than just the nightly backup to


    rely upon is now a number 1 priority.


    SQL Server Solutions


    Without having a clear understanding of the technology you want to use, it is
    easy to work yourself into trouble. SQL Server provides a variety of options for
    data replication. Shown here are various methods available to you just by using
    the product:


    •


    Replication


    • Snapshot


    • Transactional


    • Peer-to-Peer


    • Merge


    •


    Log shipping


    •


    Database mirroring


    • Asynchronous


    • Synchronous


    •


    AlwaysOn (requires Windows Server Failover Cluster)


    • Availability groups


    • Failover cluster instance (FCI)


    •


    Custom ETL (Extract, Transform, Load) using SQL Server Integration Services


    •


    Bulk copy process (BCP)


    Each of these methods has certain benefits and limitations compared to the others,
    and certain ones are better suited to different needs. The flexibility gained
    by having so many choices can be daunting.


    Once you are familiar with the strengths of each, it becomes easier to determine
    which is best for the purpose at hand.


    The sections that follow provide descriptions of each option, along with the benefits
    offered by each.


    Also covered are some potential hurdles you should be aware of with a given solution.
    Keep in mind as you read, though, that nothing is ever “set and forget.” You will
    always need to monitor and tune as your servers continue to support your company’s
    applications.


    chapter 11 ■ the Fluid dynamics oF sQl server data movement


    Replication


    Many data professionals, upon hearing the word “replication,” get a wary look
    and start moving away from you. I have yet to understand why people can be so
    antireplication—unless they haven’t worked with it since SQL Server version 6.5
    “back in the day.” Today’s options for using SQL Server replication cover a wide
    variety of scenarios and offer a lot of flexibility.


    n **Note** In general, replication involves three players: the publisher, the
    distributor, and one or more subscribers.


    The main use for replication is for redundancy and geographic distribution of
    data. There is no tenet for failing over services or applications when using replication.
    However, subscribers can be used to support outages of other subscribers when
    needed.


    Snapshot


    Just as the name implies, a snapshot is a point-in-time picture of the data. The
    snapshot method can be good for making quick copies that do not need to be updated
    frequently. Snapshots are typically used to initialize other replication topologies,
    but they can also be useful for creating mainly read-only copies of an entire
    database. The process is comparable to a backup/restore operation that runs on
    a scheduled basis—for example, daily, weekly, or monthly.


    n **Note** Snapshot replication uses the same topology as transactional replication,
    which is described in the next section.


    If you decide to implement snapshot replication, the size of the data being replicated
    is a paramount concern. If the amount of data is too large and takes a long time
    to replicate to the subscribers, the frequency of snapshots should be limited
    significantly.


    Transactional


    Picture a three-ring circus consisting of a publisher database, distribution database
    (DB), and at least one subscriber database, all brought together with the use
    of the SQL Server Agent as the ringmaster. (Figure 11-1 illustrates the topology.)
    There are several options for configuring transactional replication that make
    this solution scalable by parceling off each component. Another strength of this
    solution is that you can choose to replicate portions of your data, whether it’s
    a single table, a few columns in a table, or even a subset of data from a table.


    ![Image 135](index-282_1.png)


    chapter 11 ■ the Fluid dynamics oF sQl server data movement


    ***Figure 11-1.** Transactional replication.*


    Additionally, you can have multiple subscriber databases, so you have the ability
    to create many copies of the data and keep them synchronized with the data from
    the publisher. By using stored procedures to apply data changes, you can gain
    even greater flexibility because you can create your own custom logic if needed.


    Another win here is the option to not only pass along data changes, but also pass
    along changes to the objects themselves. Data Definition Language (DDL) changes
    to tables, views, stored procedures, and so on can also be replicated. Multiple
    databases can be set up as publishers, subscribers, or both on any given server.


    In the transactional replication setup, data changes are made at the publisher
    database. Then the transaction details are sent to the distribution database,
    which in turn sends those changes to all of the subscriber databases. SQL Server
    Agent jobs called *log readers* facilitate the collection and delivery of transactions.


    The benefits include the following:


    •


    Flexibility in the topology so that you can use it in a wide variety of environments


    •


    Customizability through the implementation of stored procedures for insert,


    update, and delete transactions


    •


    Ability of the distribution agent to push changes out to subscribers, or to allow
    each subscriber to have its own distribution agent to pull changes from the distribution
    database


    •


    Availability in all versions of SQL Server


    •


    Table-level data replication, with options for partitioning and filtering


    •


    Ability for a subscriber to have a completely different set of data replicated
    to it The limitations include the following:


    •


    Every table included in a replication topology must have a Primary Key defined.


    •


    There is potential for varied degrees of latency due to network traffic or significant
    or frequent data changes.


    chapter 11 ■ the Fluid dynamics oF sQl server data movement


    Peer-to-Peer


    In the peer-to-peer topology, all database servers—referred to as *nodes*—act
    as both publishers and subscribers. The distribution agents facilitate the delivery
    of all changes to all nodes, essentially making peer-to-peer a hybrid of transactional
    and merge replication.


    There is an option for conflict detection. If conflict detection is enabled, conflicts
    are handled at the distribution database and will cause a failure of the distribution
    agent until the conflict has been manually resolved.


    The benefits of peer-to-peer replication are the following:


    •


    Can be useful in load-balancing architectures


    •


    Possibility to fail over to any node (application level)


    The price you pay is that you have to deal with a somewhat longer list of limitations:


    •


    Every table included in a replication topology must have a Primary Key defined.


    •


    Row and column partitioning is not supported.


    •


    Snapshots cannot be used for the initialization of a new node.


    •


    Conflict detection requires manual intervention.


    •


    The recommended setup is to have only one node updateable due to conflict-


    detection intervention.


    •


    Peer-to-peer replication is an Enterprise edition–only feature.


    Merge'
  trans: "\n**场景三：夜间处理作业**\n随着数据库规模变得异常庞大，执行夜间备份开始对夜间处理作业造成影响。这些作业对于次日早上的业务启动至关重要，并且必须在员工早上\
    \ 8 点到达前完成。\n\n**场景四：硬件故障**\n主数据库服务器因硬件问题而故障。供应商虽然能提供及时的服务，但若不升级到其提供的最新硬件，则无法保证后续不会再次出现故障。一切看似运行平稳，但现在除了依赖夜间备份之外，还有更多优先事项需要考虑。\n\
    \n# SQL Server 解决方案\n\n如果没有清晰地了解想要使用的技术，很容易陷入困境。SQL Server 提供了多种数据复制选项。以下展示了仅使用该产品即可获得的多种方法：\n\
    \n- 复制\n  - 快照\n  - 事务\n  - 点对点\n  - 合并\n- 日志传送\n- 数据库镜像\n  - 异步\n  - 同步\n- AlwaysOn（需要\
    \ Windows Server 故障转移群集）\n  - 可用性组\n  - 故障转移群集实例\n- 使用 SQL Server Integration\
    \ Services 的自定义 ETL（提取、转换、加载）\n- 大容量复制过程\n\n这些方法中的每一种与其他方法相比，都有其特定的优点和局限性，其中某些方法更适合不同的需求。拥有如此多选择所带来的灵活性可能令人望而生畏。一旦你熟悉了每种方法的优势，就更容易确定哪种最适合当前的目的。\n\
    \n接下来的章节将对每个选项进行描述，并介绍其各自的优点。同时，也会讨论一些在给定解决方案中需要注意的潜在障碍。不过，请在阅读时记住，没有什么是“设置好就不管了”的。当你的服务器持续支持公司应用时，你总是需要监控和调优。\n\
    \n## 复制\n\n许多数据专业人员一听到“复制”这个词，就会露出警惕的神色并开始远离你。我至今仍不明白为什么人们会如此抗拒复制——除非他们自 SQL Server\
    \ 6.5 版那个“老时代”之后就再没接触过它。如今，使用 SQL Server 复制的选项涵盖了广泛的场景，并提供了极大的灵活性。\n\n> **注意：**\
    \ 一般来说，复制涉及三个参与者：发布者、分发者和一个或多个订阅者。复制的主要用途是数据冗余和地理分布。在使用复制时，没有关于服务或应用故障转移的固有原则。然而，在需要时，订阅者可用于支持其他订阅者的停机。\n\
    \n### 快照\n\n顾名思义，快照是数据在某个时间点的图像。快照方法适用于制作不需要频繁更新的快速副本。快照通常用于初始化其他复制拓扑，但对于创建整个数据库的只读副本也很有用。该过程类似于按计划运行的\
    \ `备份/恢复` 操作——例如，每天、每周或每月。\n\n> **注意：** 快照复制使用与事务复制相同的拓扑，这将在下一节中描述。\n\n如果你决定实施快照复制，被复制数据的大小是首要考虑因素。如果数据量过大且复制到订阅者需要很长时间，则应显著限制快照的频率。\n\
    \n### 事务\n\n想象一个由发布者数据库、分发者数据库和至少一个订阅者数据库组成的三环马戏团，它们都通过 `SQL Server Agent` 作为指挥串联在一起。（图\
    \ 11-1 展示了拓扑结构。）配置事务复制有多种选项，通过分割每个组件使此解决方案具有可扩展性。该解决方案的另一个优势是，你可以选择复制数据的部分内容，无论是单个表、表中的几个列，甚至是表中的数据子集。\n\
    \n![事务复制拓扑图](img/index-282_1.png)\n*图 11-1. 事务复制。*\n\n此外，你可以拥有多个订阅者数据库，因此你能够创建数据的许多副本，并使它们与发布者的数据保持同步。通过使用存储过程来应用数据变更，你可以获得更大的灵活性，因为可以在需要时创建自己的自定义逻辑。\n\
    \n这里还有一个优点，即不仅可以选择传递数据变更，还可以选择传递对象本身的变更。对表、视图、存储过程等的数据定义语言（DDL）变更也可以被复制。在任何给定的服务器上，可以设置多个数据库作为发布者、订阅者或两者兼有。\n\
    \n在事务复制设置中，数据变更发生在发布者数据库中。然后，事务详细信息被发送到分发者数据库，后者再将这些变更发送到所有订阅者数据库。称为 *日志读取器* 的\
    \ `SQL Server Agent` 作业负责促进事务的收集和传递。\n\n其优点包括：\n\n- 拓扑结构灵活，可适用于各种环境\n- 通过为 `插入`、`更新`\
    \ 和 `删除` 事务实现存储过程而具有可定制性\n- 分发代理能够将变更推送至订阅者，或允许每个订阅者拥有自己的分发代理从分发者数据库拉取变更\n- 所有\
    \ SQL Server 版本中均可用\n- 表级数据复制，并带有分区和筛选选项\n- 订阅者可以接收到完全不同的数据子集\n\n其局限性包括：\n\n-\
    \ 复制拓扑中包含的每个表都必须定义 `主键`。\n- 由于网络流量或显著或频繁的数据变更，可能存在不同程度的延迟。\n\n### 点对点\n\n在点对点拓扑中，所有数据库服务器（称为\
    \ *节点*）都同时充当发布者和订阅者。分发代理负责将所有变更传递给所有节点，这使得点对点复制本质上成为事务复制和合并复制的混合体。\n\n该选项支持冲突检测。如果启用了冲突检测，冲突将在分发者数据库处理，并将导致分发代理失败，直到冲突被手动解决。\n\
    \n点对点复制的优点如下：\n\n- 可用于负载均衡架构\n- 可能实现向任何节点的故障转移（应用层面）\n\n你付出的代价是必须处理一长串的限制：\n\n\
    - 复制拓扑中包含的每个表都必须定义 `主键`。\n- 不支持行和列分区。\n- 不能使用快照来初始化新节点。\n- 冲突检测需要手动干预。\n- 由于需要冲突检测干预，推荐的设置是仅使一个节点可更新。\n\
    - 点对点复制是仅适用于企业版的功能。\n\n### 合并\n"
- fmt: '# Chapter 11: The Fluid Dynamics of SQL Server Data Movement


    ## Merge Replication


    Merge is the granddaddy of the replication topologies (shown in Figure 11-2),
    allowing updates of the data to originate from any source (publisher or subscriber).
    These updates are then consolidated by the publisher. By using conflict-resolution
    rules, the publisher ultimately determines the state of each data point and then
    replicates those to other subscribers. Instead of log readers, merge replication
    uses table triggers and system tables plus the `merge agent`, which tracks table
    changes and then logs actions to the `distributor`.


    ![Image 136](index-284_1.png)


    ***Figure 11-2.** Merge replication.*


    So what is the difference between peer-to-peer and merge replication, then? The
    key is in conflict detection and management. With peer-to-peer replication, the
    entire distribution process is halted until someone manually resolves the conflict.
    With merge replication, custom business rules for resolving conflicts can be implemented
    without any interruption of service.


    Merge replication provides numerous benefits:


    - It is ideal for use in systems where you are working with point of sale (`POS`)
    data or a remote sales force.

    - Conflict detection does not cause any interruption of service.

    - Synchronizations can be pushed out to subscribers, or subscribers can pull from
    the publisher.

    - You can perform table-level data replication, with options for partitioning
    and filtering.

    - Each subscriber can have a completely different set of data replicated to it.


    Yet you cannot completely escape limitations, such as the following:


    - Each table participating in merge replication must have a globally unique identifier
    (`GUID`) value for each record.

    - Subscriptions that expire require full reinitialization, which can be time consuming.


    ## Replication Examples


    Following are examples of how replication can be applied to the four scenarios
    introduced earlier in the chapter:


    **SCENARIO 1: Global Organization**

    This is a good scenario for replication. Choose one server as the publisher (transactional
    replication)—let’s say `Chicago`—and set up each other city as a subscriber. Data
    can be shared among all of the major hubs. You can implement a peer-to-peer setup
    that allows data updates from any major city. You can use merge replication to
    manage data updates from any of the subscribers.


    **SCENARIO 2: High-Volume Reporting Needs**

    Consider the reporting requirements first. If up-to-the-minute data is needed
    for reporting, transactional replication could be a good fit. Another bonus to
    having a subscriber copy of the database is that you can set up different indexing
    strategies on each subscriber, thereby giving you the ability to performance tune
    for individual reporting needs. Alternatively, peer-to-peer replication can be
    configured with only one node updateable, allowing for read-only access at a given
    node and no possibility for conflicts to occur.


    **SCENARIO 3: Overnight Processing Jobs**

    If your subscribers are exact copies of your publisher, replication might help
    out here. Ensure that all objects in the database are identical (table definitions,
    indexing, stored procedures—everything!), and set your backups to run against
    a subscriber. Your doing so will enable the overnight processing to run against
    the publisher, and replication will then distribute any changes made to the subscriber
    or subscribers. Alternatively, peer-to-peer replication can be configured with
    only one node updateable, allowing backups to be performed on the nonupdateable
    node.


    **SCENARIO 4: Hardware Failure**

    Replication is not ideal in the case of a hardware failure. Having said that,
    if you have multiple subscribers and one of those fails, you might be able to
    use a second subscriber in its place until the first one is recovered. Your application
    will need to be configured to have that flexibility of connecting to an alternate
    subscriber. If, however, you lose your'
