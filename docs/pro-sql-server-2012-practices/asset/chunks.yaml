    # 第 11 章：SQL Server 数据移动的流体动力学


    ## 合并复制


    合并复制是复制拓扑结构中的元老（如图 11-2 所示），它允许数据的更新可以源自任何来源（发布者或订阅者）。这些更新随后由发布者进行整合。通过使用冲突解决规则，发布者最终确定每个数据点的状态，然后将其复制到其他订阅者。合并复制不使用日志读取器，而是使用表触发器和系统表，外加
    `合并代理`，该代理跟踪表的更改，然后将操作记录到 `分发器`。


    ![Image 136](img/index-284_1.png)


    ***图 11-2.** 合并复制。*


    那么，对等复制和合并复制之间的区别是什么呢？关键在于冲突检测和管理。使用对等复制时，整个分发过程会暂停，直到有人手动解决冲突。而使用合并复制，可以实现自定义的业务规则来解决冲突，且不会造成任何服务中断。


    合并复制提供了许多好处：


    -   非常适合用于处理销售点（`POS`）数据或远程销售团队的系统。

    -   冲突检测不会导致服务中断。

    -   同步可以推送到订阅者，或者订阅者可以从发布者拉取。

    -   可以执行表级的数据复制，并支持分区和筛选选项。

    -   每个订阅者可以复制到其上的数据集可以完全不同。


    然而，你仍然无法完全避免其局限性，例如：


    -   参与合并复制的每个表，其每条记录都必须有一个全局唯一标识符（`GUID`）值。

    -   过期的订阅需要完全重新初始化，这可能非常耗时。


    ## 复制示例


    以下是复制如何应用于本章前面介绍的四种场景的示例：


    **场景 1：全球性组织**

    这是使用复制的理想场景。选择一台服务器作为发布者（事务性复制）——假设是 `Chicago`——并将其他每个城市设置为订阅者。数据可以在所有主要枢纽之间共享。你可以实施对等设置，允许从任何主要城市进行数据更新。你可以使用合并复制来管理来自任何订阅者的数据更新。


    **场景 2：高容量报告需求**

    首先考虑报告需求。如果报告需要最新数据，那么事务性复制可能是一个很好的选择。拥有订阅者数据库副本的另一个好处是，你可以在每个订阅者上设置不同的索引策略，从而能够针对个别报告需求进行性能调优。或者，可以配置对等复制，只允许一个节点可更新，这样在给定节点上提供只读访问，并且不会发生冲突。


    **场景 3：夜间批处理作业**

    如果你的订阅者是发布者的精确副本，那么复制可能会在此发挥作用。确保数据库中的所有对象都完全相同（表定义、索引、存储过程——所有一切！），并将备份设置为针对订阅者运行。这样可以使夜间批处理作业在发布者上运行，然后复制会将任何更改分发到一个或多个订阅者。或者，可以配置对等复制，只允许一个节点可更新，从而可以在不可更新的节点上执行备份。


