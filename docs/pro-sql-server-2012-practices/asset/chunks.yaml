    -- Get 2 rows from the XML, one for each event node.


    -- We get the attributes from the data nodes and


    -- the values of data nodes children via .query().value() construct'
  trans: "\n# 会话\n\n会话仅仅是事件、操作和目标的集合。除了默认情况下数据库引擎私有的对象（例如 `SecAudit` 包中的对象）外，对于可以混合和不可以混合哪些项目没有限制。会话在创建时不会自动启动，并且可以在运行时更改。\n\
    \n## 会话配置选项\n\n每个会话都有相当多的配置选项。你可以在联机丛书中查阅所有这些选项，但我们这里列举 3 个最有趣的。\n\n第一个是 `EVENT_RETENTION_MODE`，它让我们可以控制我们的会话能够处理何种程度的事件丢失。它有\
    \ 3 个选项：`ALLOW_SINGLE_EVENT_LOSS`（默认设置）、`ALLOW_MULTIPLE_EVENT_LOSS` 和 `NO_EVENT_LOSS`。这些名称本身就很好理解。但是，如果你将其设置为\
    \ `NO_EVENT_LOSS`，请务必小心。对于触发非常频繁的事件，这可能会显著减慢服务器速度。\n\n第二个会话选项是 `TRACK_CAUSALITY`。当设置为\
    \ `ON` 时，它会向每个事件添加操作 `package0.attach_activity_id`。此操作是 GUID 和序列号的组合。借助它，我们可以跟踪批处理中或并行查询执行中跨多个线程发生的事件。此选项默认为\
    \ `OFF`。\n\n第三个选项是 `MAX_DISPATCH_LATENCY`，它设置非满会话缓冲区发送到异步目标之前的秒数。默认值为 30 秒。\n\n\
    ## 对象元数据\n\n所有关于扩展事件对象和正在运行的会话的信息，都可以在以 `sys.dm_xe_*` 开头的动态管理视图和以 `sys.server_event_session*`\
    \ 开头的目录视图中找到。联机丛书中的 `Figure 5-8` 展示了一个单一事件的生命周期。\n\n`图 5-8. 事件生命周期`\n\n# 从 SQL\
    \ 跟踪到扩展事件\n\n## 目标中的数据格式\n\n现在我们已经熟悉了扩展事件对象，接下来谈谈目标中的数据格式。所有事件都以无架构的 XML 格式存储，并使用\
    \ XQuery 进行读取。我们必须熟悉以下 XML 函数：\n- `nodes()` 将 XML 转换为关系形式（XML 的行集视图）\n- `query()`\
    \ 执行 XQuery 查询并返回 XML\n- `value()` 执行 XQuery 查询以获取 SQL 数据类型的标量值并返回它\n\n以下代码示例展示了\
    \ XML 的快速入门方法。请务必阅读注释。\n\n```sql\nuse tempdb;\nGO\n\nIF (OBJECT_ID('TextXML',\
    \ 'U') IS NOT NULL)\nDROP TABLE TextXML;\nGO\n\nCREATE TABLE TextXML\n(\n    ID\
    \ INT IDENTITY(1,1),\n    XmlColumn XML\n) ;\nGO\n\nINSERT INTO TextXML(XmlColumn)\n\
    SELECT\n'<root>\n    <event name=\"Fast Event Name 1\" timestamp=\"2012-05-19T11:53:06.395Z\"\
    >\n        <data name=\"TestComponent 1\">\n            <type name=\"TestType\
    \ 1\" />\n            <value>100</value>\n            <text>This is some Test\
    \ Text 1</text>\n        </data>\n    </event>\n    <event name=\"Fast Event Name\
    \ 2\" timestamp=\"2012-05-20T12:53:06.395Z\">\n        <data name=\"TestComponent\
    \ 2\">\n            <type name=\"TestType\" />\n            <value>200</value>\n\
    \            <text>This is some Test Text 2</text>\n        </data>\n        <data\
    \ name=\"TestComponent 2 a\">\n            <type name=\"TestType a\" />\n    \
    \        <value>2001</value>\n            <text>This is some Test Text 2 a</text>\n\
    \        </data>\n    </event>\n</root>';\n\n-- 在 cross apply 中的节点深度设置\n-- 从 XML\
    \ 中获取 2 行，每行对应一个事件，以 XML 形式\nSELECT Tbl.cols.query('.') as ShreddedXML\nFROM TextXML\
    \ X\n-- 我们这里的意思是获取所有 event 节点\nCROSS APPLY X.XmlColumn.nodes('/root/event') Tbl(cols);\n\
    \n-- 从 XML 中获取 2 行，每行对应一个 event 节点。\n-- 这里我们通过 .query().value() 结构获取每个事件的属性\n\
    -- 注意 .value() 内部的 [1] 索引器。它是基于 1 的，而不是基于 0 的。\nSELECT Tbl.cols.query('.') as\
    \ EventXML\n, Tbl.cols.query('.').value('(event/@name)[1]', 'nvarchar(100)') as\
    \ EventName\n, Tbl.cols.query('.').value('(event/@timestamp)[1]', 'datetime')\
    \ as EventTimestamp\nFROM TextXML X\n-- 我们这里的意思是获取所有 event 节点\nCROSS APPLY X.XmlColumn.nodes('/root/event')\
    \ Tbl(cols);\nGO\n\n-- 从 XML 中获取 2 行，每行对应一个 event 节点。\n-- 我们通过 .query().value()\
    \ 结构获取 data 节点的属性以及\n-- data 节点子元素的值\n```"
- fmt: "## XML 数据规范化与非规范化查询示例\n\n-- Event 1 has just one data node so the `query().value()`\
    \ returns null when looking for values at index 2.\n-- This can be viewed as denormalization\
    \ of the XML.\n\n```sql\nSELECT Tbl.cols.query('./data') as DataXML\n, Tbl.cols.query('./data').value('(data/@name)[1]',\
    \ 'nvarchar(100)') as Data1Name\n, Tbl.cols.query('./data').value('(data/@name)[2]',\
    \ 'nvarchar(100)') as Data2Name\n, Tbl.cols.query('./data/type').value('(type/@name)[1]',\
    \ 'nvarchar(100)') as Type1Name\n, Tbl.cols.query('./data/type').value('(type/@name)[2]',\
    \ 'nvarchar(100)') as Type2Name\n, Tbl.cols.query('./data/value').value('(value)[1]',\
    \ 'int') as Value1\n, Tbl.cols.query('./data/value').value('(value)[2]', 'int')\
    \ as Value2\n, Tbl.cols.query('./data/text').value('(text)[1]', 'nvarchar(100)')\
    \ as Text1\n, Tbl.cols.query('./data/text').value('(text)[2]', 'nvarchar(100)')\
    \ as Text2\nFROM TextXML X\n-- we're saying to get all the event nodes\nCROSS\
    \ APPLY X.XmlColumn.nodes('/root/event') Tbl(cols);\nGO\n```\n\n-- Get 3 rows\
    \ from the XML, one for each data node.\n-- The first event has one data node\
    \ and the second event has two data nodes.\n-- We get the attributes from the\
    \ data nodes and the values of their children\n-- There are no nulls here since\
    \ we're selecting all the values that exist.\n-- If the above was denormalization\
    \ then this is normalization of the XML values\n\n```sql\nSELECT Tbl.cols.query('.')\
    \ as DataXML\n, Tbl.cols.query('.').value('(data/@name)[1]', 'nvarchar(100)')\
    \ as DataName\n, Tbl.cols.query('./type').value('(type/@name)[1]', 'nvarchar(100)')\
    \ as TypeName\n, Tbl.cols.query('./value').value('(value)[1]', 'int') as Value\n\
    , Tbl.cols.query('./text').value('(text)[1]', 'nvarchar(100)') as [Text]\nFROM\
    \ TextXML X\n-- we're saying to get all the data nodes from all the event nodes\n\
    CROSS APPLY X.XmlColumn.nodes('/root/event/data') Tbl(cols);\n```\n\n## 使用扩展事件\
    \ (Extended Events) 进行跟踪\n\nNow that we know how to work with XML to parse the\
    \ event data let’s take look at a concrete example.\nWe’ll use the ring buffer\
    \ target to trace all statements that take longer than 500ms.\n\n```sql\nUSE master;\n\
    GO\n\n-- chapter 5 ■ From SQL trace to extended eventS\n\nIF EXISTS(SELECT * FROM\
    \ sys.server_event_sessions WHERE name = 'RingBufferExampleSession')\nDROP EVENT\
    \ SESSION RingBufferExampleSession ON SERVER;\n\nCREATE EVENT SESSION RingBufferExampleSession\n\
    ON SERVER\nADD EVENT sqlserver.sql_statement_completed\n(\n    ACTION (sqlserver.session_id,\
    \ sqlserver.username)\n    WHERE sqlserver.sql_statement_completed.duration >\
    \ 500000\n    -- duration is in microseconds\n)\nADD TARGET package0.ring_buffer\n\
    (SET max_memory = 4096)\nWITH (max_dispatch_latency = 1 seconds);\n\nALTER EVENT\
    \ SESSION RingBufferExampleSession ON SERVER STATE=START;\nGO\n```\n\n-- this\
    \ takes longer than half a second\n\n```sql\nSELECT TOP 100000 *\nFROM master..spt_values\
    \ t1\nCROSS JOIN master..spt_values t2;\nGO\n```\n\n```sql\nSELECT -- these are\
    \ some of the event columns\n    Cols.value('(data[@name=\"duration\"]/value)[1]','BIGINT')/1000.0\
    \ as duration_in_ms,\n    Cols.value('(data[@name=\"cpu_time\"]/value)[1]','BIGINT')/1000.0\
    \ as cpu_time_in_ms,\n    Cols.value('(data[@name=\"logical_reads\"]/value)[1]','BIGINT')\
    \ as logical_reads,\n    Cols.value('(data[@name=\"row_count\"]/value)[1]','BIGINT')\
    \ as row_count,\n    Cols.value('(data[@name=\"statement\"]/value)[1]','NVARCHAR(MAX)')\
    \ as sql_statement,\n    -- these are actions we specified for the event\n   \
    \ Cols.value('(action[@name=\"username\"]/value)[1]','NVARCHAR(MAX)') as username,\n\
    \    Cols.value('(action[@name=\"session_id\"]/value)[1]','SMALLINT') as session_id\n\
    FROM (\n    SELECT CAST(t.target_data AS XML) AS RingBufferInfo\n    FROM sys.dm_xe_session_targets\
    \ t\n    JOIN sys.dm_xe_sessions s ON s.address = t.event_session_address\n  \
    \  WHERE t.target_name = 'ring_buffer' AND s.name = 'RingBufferExampleSession'\n\
    ) RB\nCROSS APPLY RingBufferInfo.nodes('/RingBufferTarget/event') AS Tbl(Cols);\n\
    GO\n\nALTER EVENT SESSION RingBufferExampleSession ON SERVER STATE=STOP;\n```\n\
    \n## 内置健康会话 (Built-in Health Session)\n\nLike the default trace in SQL Server\
    \ 2005, Extended Events provides an always-running session called `health_sesion`.\
    \ This session holds the combination of events and actions that help us troubleshoot\
    \ various issues.\n\n-- chapter 5 ■ From SQL trace to extended eventS"
