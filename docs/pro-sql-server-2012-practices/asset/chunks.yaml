  trans: '

    ## SQL Server 版本

    需要支持的 SQL Server 版本越少，越容易保持系统运行稳定。你需要运行不同版本 Windows Server 的需求就越少，而且你保持的版本越新，就越容易获得来自
    Microsoft 或广大社区的支持。我见过一些环境运行的版本横跨 7.0、2000、2005、2008、2008 R2 直到 2012。为什么不直接选择
    2012 呢？将最新版本作为标准也是一个向开发者推介的好卖点，因为大多数激动人心的新功能都将对他们可用。你可能无法缩减到只支持一个版本，但要努力将需要支持的版本数量最小化。


    ## 功能支持

    开始研究所有不同的功能。描述你的环境如何实现、如何使用、哪些功能被接受、哪些功能不被接受。考虑某些功能是否需要 `sysadmin`、访问命令行 shell
    等特权。此过程中的关键是要理解每个功能的优缺点，并尝试理清如何解释为何某个功能不会被启用——或者，例如，使用全局唯一标识符（`GUIDs`）作为主键。开发者往往希望自己能创建主键，因为这样更容易在同一个事务中插入父表和子表。在这种情况下，`SQL
    Server 2012` 对存储序列的新支持可以轻松替代应用程序中创建的 `GUIDs`。


    ## 版本

    版本可以被看作是功能集的延伸。公司如何看待使用，例如，`Express Edition`？你应该只使用 `Standard Edition`，还是需要使用
    `Enterprise Edition`？你是否在开发和测试环境中使用 `Developer Edition`，然后在生产环境中使用 `Standard Edition`，这样就会留下开发中使用的功能无法在生产中实现的风险？你如何帮助开发者理解他们可以做什么、不能做什么，以及他们实际可以使用哪些高级功能？你是否使用基于策略的管理，在使用
    `Enterprise Edition` 功能时发出警报？还是仅仅定期查询视图 `sys.dm_db_persisted_sku_features`，该视图会告诉你当前有多少
    `Enterprise Edition` 功能正在被使用？


    ## 命名标准

    命名标准是必须的。最低级别应在服务器级别，为服务器、端口、实例和数据库选择标准名称。标准化有助于使你的环境更易于管理。你知道你的实例使用哪些端口吗？了解这一点可以使系统迁移和连接到不同的服务器变得容易得多。此外，数据库往往需要迁移，所以请记住，两个不同的系统不应使用相同的数据库名。为你数据库名称添加特定于应用程序的前缀，使其更易于识别。


    ## 补丁

    版本变更很重要，需要牢记，因为它很容易被忽视。一旦忽视，最终会导致生产和开发环境中运行大量旧版本。尝试在此处实施合理的要求。例如，你可以选择规定开发和测试环境应在版本发布后每六个月升级到最新版本，生产环境则在该升级完成后最多三个月内进行升级。此外，你可以要求服务包在发布后三个月内实施。


    ## 权限

    权限的控制非常重要。某些权限在开发和测试环境中可能可以接受，但在生产环境中不行，这是可以的。只需记得记录下这些差异，以便每个人都了解它们及其存在的原因。首先在开发环境中允许开发者对其自己的数据库拥有
    `dbo` 访问权限。这样，你就不会限制他们的工作。

