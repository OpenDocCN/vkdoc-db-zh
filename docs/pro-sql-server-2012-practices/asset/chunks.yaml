    \ RowID 查找（书签查找）造成的。\n\n另一个有趣的查询可以通过查询 `sys.dm_os_schedulers` 对象找到，如下所示：\n\n```sql\n\
    SELECT MAX(pending_disk_io_count) as MaxPendingIO_Current,\n    AVG(pending_disk_io_count)\
    \ as AvgPendingIO_Current\nFROM sys.dm_os_schedulers\n```\n\n与本章之前的查询不同，此查询的结果完全基于当前活动，不代表历史数据。\n\
    \n## 处理一个查询\n\n你刚才经历的过程可以产生大量数据，甚至可能是海量数据。然而，也许你发现有一个特定的查询在 IO 角度上是开销最大的。也许你在打开本章时心中已经有一个这样的查询。问题是，如何处理它。但在那之前，你首先需要了解关于此查询的一些特性。\n\
    \n关于执行计划有许多好书，本章不打算花时间讨论它们，因为有另一种方法可以评估特定查询或 T-SQL 批处理的物理读数。通过使用 `SET STATISTICS\
    \ IO ON` 语句，你可以查看查询从何处获取数据（磁盘或内存）的一些宝贵特性。\n\n以下查询是为 `AdventureWorksDW2008R2` 数据库编写的：\n\
    \n```sql\nDBCC DROPCLEAN BUFFERS -- 确保数据缓存是冷的\nDBCC FREEPROCCACHE -- 确保查询计划不在内存中\n\
    --*警告，在生产环境中运行此命令可能会产生意外后果。\n-- [有关这些 DBCC 命令的更多详细信息，请访问：http://msdn.microsoft.com/en-us/library/ms187762.aspx\
    \ 和 http://msdn.microsoft.com/en-us/library/ms174283(v=sql.105).aspx]\nSET STATISTICS\
    \ IO ON;\nUSE AdventureWorksDW2008R2\nGO\ndeclare @ProductKey int = (select MIN\
    \ (ProductKey) from dbo.FactInternetSales)\nSELECT\n    SUM(UnitPrice) as Total_UnitPrice,\
    \ AVG(UnitPrice) as Average_UnitPrice,\n    MIN(UnitPrice) as Lowest_UnitPrice,\
    \ MAX(UnitPrice) as HighestUnitPrice,\n    SUM(OrderQuantity) as Total_OrderQuantity,\
    \ AVG(OrderQuantity) as Average_OrderQuantity,\n    MIN(OrderQuantity) as Lowest_OrderQuantity,\
    \ MAX(OrderQuantity) as HighestOrderQuantity,\n    SUM(SalesAmount) as Total_SalesAmount,\
    \ AVG(SalesAmount) as Average_SalesAmount,\n    MIN(SalesAmount) as Lowest_SalesAmount,\
    \ MAX(SalesAmount) as HighestSalesAmount,\n    P.EnglishProductName, D.EnglishMonthName,\
    \ D.FiscalYear,\n    AVG(P.ListPrice) / AVG(FIS.UnitPrice)) as ProductListPriceVersusSoldUnitPrice\n\
    FROM dbo.FactInternetSales FIS\nINNER JOIN dbo.DimProduct P ON FIS.ProductKey\
    \ = P.ProductKey\nINNER JOIN dbo.DimDate D on FIS.OrderDateKey = D.DateKey\nWHERE\
    \ FIS.ProductKey = @ProductKey\nGROUP by P.EnglishProductName, D.EnglishMonthName,\
    \ D.FiscalYear\n```\n\n此查询的输出无关紧要，但如果你点击“消息”选项卡，应该会看到类似以下的内容：\n\n```\nTable 'FactInternetSales'.\
    \ Scan count 1, logical reads 2, physical reads 2, read-ahead reads 0, lob logical\
    \ reads 0, lob physical reads 0, lob read-ahead reads 0.\n(13 row(s) affected)\n\
    Table 'Worktable'. Scan count 0, logical reads 0, physical reads 0, read-ahead\
    \ reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
    Table 'DimDate'. Scan count 1, logical reads 21, physical reads 1, read-ahead\
    \ reads 22, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.\n\
    Table 'FactInternetSales'. Scan count 1, logical reads 1036, physical reads 10,\
    \ read-ahead reads 1032, lob logical reads 0, lob physical reads 0, lob read-ahead\
    \ reads 0.\nTable 'DimProduct'. Scan count 0, logical reads 2, physical reads\
    \ 2, read-ahead reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead\
    \ reads 0.\n```\n\n这个输出向我们展示了一些非常有趣的项目。如果你关注物理读取和预读的结果，你就可以开始找出如何更好地优化此查询或它从中提取数据的对象。\n\
    \n我在这里看到最有趣的结果是对象 `FactInternetSales` 的第二次引用。它的物理读取计数为 10，预读为 1,032。总共从磁盘检索了 1,042\
    \ 个数据页并放入缓存以满足查询。对于一个只有 13 行的结果集来说，这是大量的数据。当然，这里涉及 `GROUP BY`，所以它需要更多的行来满足 `WHERE`\
    \ 子句，该子句本身返回 2,230 条记录。\n\n那么问题是，仅凭这些数据，你如何能让这个查询变得更好？如果我运行语句 `sp_help FactInternetSales`，其读取输出的一部分如图\
    \ 13-6 所示。\n\n**图 13-6.** `sp_help FactInternetSales` 输出示意图。\n\n仅此一点就告诉我，查询优化器可能会尝试使用索引\
    \ `IX_FactInternetSales_ProductKey` 来满足 `WHERE` 条件，并且它肯定会使用聚集索引 `PK_`\n"
