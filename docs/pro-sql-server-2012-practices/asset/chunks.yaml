  raw: 'The scan and update patterns, on your tables, are the next thing to consider
    when determining what to compress. The more a table is updated, the less likely
    you should be to compress it. Writes cause extra CPU activities. SQL is constantly
    translating writes to data pages to compressed and uncompressed format. Updates
    can cause page splits, which then cause the page compression to be recalculated
    on all updated pages. Notice that I said “updates” and not “inserts.” Inserts
    might cause an issue, but updates speak to the volatility of the data in your
    table. Our queries will look for scans and updates, and we will filter inserts
    out of each.


    You use the DMV sys.dm_db_index_operational_stats to determine your scan and update
    patterns.


    This DMV returns low-level I/O details for a number of range and table scans,
    as well as update, insert, and delete activity. The query you’ll use was originally
    two separate queries. I used a Common Table Expression (CTE), which is a temporary
    derived result set based on a simple query, to combine them so that you could
    look at scans and updates for indexes side by side.


    You use the range_scan_count column to get all scans that have occurred against
    a heap, clustered index, or nonclustered index. You then multiply that number
    by 100.0 and divide the result by the total 352


    chapter 14 ■ page and row compression


    scans, inserts, updates, and deletes that have occurred on the system. This gives
    you a percentage of scan activity on all the indexes in all the tables in your
    database.


    If you perform only selects, you’ll always have returned 100 percent. If you issue
    some updates, deletes, or inserts, you’ll see the scan percentage begin to drop.


    You use the leaf_update_count column to get all update activity for your heaps,
    clustered indexes, and nonclustered indexes. Figure 14-16 shows the results of
    your scan and update query from some of our demo tables; your results might vary
    based on select, update, and insert statements that you have run. All scan and
    update data for an object will be cleared when rebuilding an object by applying
    compression.


    Ideally, your updates should be under 40 percent and your scans should be 60 percent
    or higher, in order to select a table for compression. Neither of these percentages
    will add up to 100 percent—we are simply getting an average of these two activities
    out of all the other operations that could be performed on them.


    So now let’s run a query that will look at each table in your database and let
    you see what the allocation unit makeup is for each one.


