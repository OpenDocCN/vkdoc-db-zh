    ## Preparing the Database


    In an ideal world, you will have unlimited space and servers for testing that
    exactly match your production environment. We don’t all live in an ideal world,
    and that means that when it comes to finding a database that is identical to production
    for indexing, we are often left with a server that has significantly less space
    in it than the production database has. For this reason, there needs to be a method
    to test a workload against a database as similar as possible to production so
    that the recommendations will match the same recommendations that you would received
    if the test were run in production.


    We can find a solution to the problem through a process commonly referred to as
    *cloning* the database. A cloned database is one that contains the exact schema
    of the source database on the destination, along with the statistics and histogram
    information from the source in the destination. In this case, the execution plans
    generated in the destination database will be identical to those generated in
    the source database. Because the same execution plans will be generated in both
    databases, the indexes used or needed will be the same.


    There are various means to clone a database. You can use the generate scripts
    wizard in SSMS. You can restore a database, disable stats updates, and then delete
    all of the data. Or you can leverage PowerShell and Server Management Objects
    (`SMO`) to build a script. The advantage to using a PowerShell script is the ability
    to build the process once and run it over and over again. Because you will want
    to run multiple workloads over time, the best option is to use a solution that
    is easily repeatable.


    Using PowerShell to clone a database takes just a few steps. These steps are as
    follows:

    1.  Connect to source instance and database.

    2.  Connect to destination instance and validate that database does not exist.

    3.  Create destination database.

    4.  Set database scripting options on the source database.

    5.  Create clone script from source database.

    6.  Execute clone script on destination database.


    While there are various ways to accomplish each of these steps, the script in
    Listing 7-14 provides one means of doing so. The script executes each of the steps
    and includes variables that can be used to change the SQL Server instance and
    database names.


    **Listing 7-14.** PowerShell Script to Clone Database


    ```powershell

    $version = [System.Reflection.Assembly]::LoadWithPartialName( "Microsoft.SqlServer.SMO")
    if ((($version.FullName.Split('',''))[1].Split(''=''))[1].Split(''.'')[0] -ne
    ''9'') {


    [System.Reflection.Assembly]::LoadWithPartialName("Microsoft.SqlServer.SMOExtended")
    |


    out-null}


    $SourceServer = ''STR8-SQL-12\SQL2012''


    $SourceDatabase= ''AdventureWorks2012''


    $DestinationServer= ''STR8-SQL-12''


    $DestinationDatabase = ''AdventureWorks2012''


    $SourceServerObj = new-object("Microsoft.SqlServer.Management.SMO.Server") $SourceServer
    if ($SourceServerObj.Version -eq $null ){Throw "Can''t find source SQL Server
    instance: $SourceServer"}


    $SourceDatabaseObj = $SourceServerObj.Databases[$SourceDatabase]


    if ($SourceDatabaseObj.name -ne $SourceDatabase){


    Throw "Can''t find the source database ''$SourceDatabase'' on $SourceServer"};
    $DestinationServerObj = new-object ("Microsoft.SqlServer.Management.SMO.Server")
    $DestinationServer


    if ($DestinationServerObj.Version -eq $null ){


    Throw "Can''t find destination SQL Server instance: $DestinationServer"}


    $DestinationDatabaseObj = $DestinationServerObj.Databases[$DestinationDatabase]


    if ($DestinationDatabaseObj.name -eq $DestinationDatabase){


    Throw "Destination database ''$DestinationDatabase'' exists on $DestinationServer"};
    $DestinationDatabaseObj = new-object


    (''Microsoft.SqlServer.Management.Smo.Database'')($DestinationServerObj,


    $DestinationDatabase)


    $DestinationDatabaseObj.Create()


    #Required options per http://support.microsoft.com/kb/914288


    $Options = new-object ("Microsoft.SqlServer.Management.SMO.ScriptingOptions")
    $Options.DriAll = $true


    $Options.ScriptDrops = $false


    $Options.Indexes = $true


    $Options.FullTextCatalogs = $true


    $Options.FullTextIndexes = $true


    $Options.FullTextStopLists = $true


    $Options.ClusteredIndexes = $true


    $Options.PrimaryObject = $true


    $Options.SchemaQualify = $true


    $Options.Triggers = $true


