    END


    CREATE DATABASE demoCOMPRESSIONInternals


    GO


    USE demoCOMPRESSIONInternals


    go


    IF EXISTS(SELECT NAME FROM sys.tables WHERE name=N''myTableC1'')


    BEGIN


    DROP TABLE dbo.myTableC1


    END


    CREATE TABLE myTableC1(


    myID INT IDENTITY(1,1)


    ,productName char(500) DEFAULT ''some product''


    ,productDescription CHAR(1000) DEFAULT ''Product Description''


    ,PRIMARY KEY CLUSTERED(myID) WITH (DATA_COMPRESSION=PAGE)


    ) ;


    I’ll use a named transaction so that you can search the transaction log and find
    the logged operation easily:.


    /*


    Look at the Transactions within


    The Transaction Log


    */


    BEGIN TRAN Compressed


    INSERT INTO dbo.myTableC1(productName, productDescription)


    VALUES(


    (REPLICATE(''a'', 499) + CAST(1 AS VARCHAR(1)))


    ,(REPLICATE(''b'', 999)+ CAST(1 AS VARCHAR(1)))


    )


