    anywhere* *else.*


    The first normal form tells you that rows need to be unique. This is a very important
    point, but it needs to be more than a simple mechanical choice. Just having a
    uniqueness constraint with a meaningless value technically makes the data unique.
    As an example of how generated values lead to confusion, consider the following
    subset of a table that lists school mascots. (The primary key is on MascotId.)
    MascotId Name


    ----------- ------------------


    1 Smokey


    112 Bear


    4567 Bear


    9757 Bear


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance The rows
    are technically unique, because the ID values are different. If those ID numbers
    represent a number that the user uses to identify rows in all cases, this might
    be a fine table design. However, in the far more likely case where MascotId is
    just a number generated when the row is created and has no actual meaning, this
    data is a disaster waiting to occur. The first user will use MascotId 9757, the
    next user might use 4567, and the user after that might use 112\. There is no
    real way to tell the rows apart. And although the Internet seems to tell me that
    the mascot name “Smokey” is used only by the University of Tennessee, the bear
    is a common mascot used not only by my high school but by many other schools as
    well.


    Ideally, the table will contain a natural key (or a key based on columns that
    have a relationship to the meaning of the table of data being modeled instead
    of an artificial key that has no relationship to the same). In this case, the
    combination of SchoolName and the mascot Name probably will suffice: MascotId
    Name SchoolName


    ----------- ------------------ ----------------------------------


    1 Smokey University of Tennessee


    112 Bear Bradley High School


    4567 Bear Baylor University


    979796 Bear Washington University


    You might also think that the SchoolName value is unique in and of itself, but
    many schools have more than one mascot. Because of this, you may need multiple
    rows for each SchoolName. It is important to understand what you are modeling
    and make sure it matches what your key is representing.


    n **Note** Key choice can be a contentious discussion, and it’s also is a very
    important part of any design. The essential part of any design is that you can
    tell one row from another in a manner that makes sense to the users of the system.
    SQL Server physical considerations include what column is used to cluster the
    table (or physically order the internal structures), what columns are frequently
    used to fetch data based on user usage, and so forth. The physical considerations
    should be secondary to making sure the data is correct.


    Why is uniqueness so important to performance? When users can do a search and
    know that they have the one unique item that meets their needs, their job will
    be much easier. When duplicated data goes unchecked in the database design and
    user interface, all additional usage has to deal with the fact that where the
    user expects one row, he might get back more than one.


    One additional uniqueness consideration is that a row represents one unique thing.
    When you look at the columns in your tables, does this column represent something
    independent of what the table is named and means? In the following table that
    represents a customer, check each column:


    CustomerId Name Payment1 Payment2 Payment3


    ----------------- ----------------- ------------ ------------- --------------


    0000002323 Joe''s Fish Market 100.03 120.23 NULL


    0000230003 Fred''s Cat Shop 200.23 NULL NULL


    CustomerId and Name clearly are customer related, but the payment columns are
    completely different things than customers. So now two different sorts of objects
    are related to one another. This is important because it becomes difficult to
    add a new payment type object. How do you know what the difference is between
    Payment1, Payment2, and Payment3? And what if there turns out to be a fourth payment?
    To add the next payment for Fred’s Cat Shop, you might use some SQL code along
    these lines: UPDATE dbo.Customer


    SET Payment1 = CASE WHEN Payment1 IS NULL THEN 1000.00 ELSE Payment1 END,


    Payment2 = CASE WHEN Payment1 IS NOT NULL AND Payment2 IS NULL


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance THEN 1000.00
    ELSE Payment2 END,


    Payment3 = CASE WHEN Payment1 IS NOT NULL


    AND Payment2 IS NOT NULL


    AND Payment3 IS NULL


    THEN 1000.00 ELSE Payment3 END


    WHERE CustomerId = ''0000230003'';


    If payments were implemented as their own table, the table might look like this:


    CustomerId PaymentNumber Amount Date


    --------------- -------------- ------------- --------------


    0000002323 1 120.23 2012-10-15


    0000002323 2 100.03 2012-11-12


    0000230003 1 200.23 2012-08-13


    Adding a new payment would be as simple as adding another row, and adding metadata
    about the payment is as easy as adding a single column. Although the payments
    example is probably a bit unrealistic and certainly a case where most anyone would
    see the need for multiple rows, there are many cases where designers think that
    just using columns is the best answer. A system I am working with right now has
    email addresses stored as emailAddress1, emailAddress2, and emailAddress3\. The
    emailAddress1 value is used straightforwardly as the primary email address, but
    the values in emailAddress2 and emailAddress3 are used either as previous email
    addresses or alternate email addresses. And without adding 10 to 20 new columns
    of metadata (one set for each email address), it will be nearly impossible to
    reign in usage and know what all the values mean.


    Keep in mind that even if all of the payment entries are done manually through
    the UI, even things like counting the number of payments tends to be a difficult
    task. How many payments has Fred made?


    You could do something like this:


    SELECT CASE WHEN Payment1 IS NOT NULL THEN 1 ELSE 0 END +


    CASE WHEN Payment2 IS NOT NULL THEN 1 ELSE 0 END +


    CASE WHEN Payment3 IS NOT NULL THEN 1 ELSE 0 END AS PaymentCount


    FROM dbo.Customer


    WHERE CustomerId = 0000230003;


    When you do it that way and you have to start doing this work for multiple accounts
    simultaneously, it gets complicated. In many cases, the easiest way to deal with
    this condition is to normalize the set, probably through a view:


    CREATE VIEW dbo.CustomerPayment


    AS


    SELECT CustomerId, 1 AS PaymentNumber, Payment1 AS PaymentAmount


    FROM dbo.Customer


    WHERE Payment1 IS NOT NULL


    UNION ALL


    SELECT CustomerId, 2 AS PaymentNumber, Payment2 AS PaymentAmount


    FROM dbo.Customer


    WHERE Payment2 IS NOT NULL


    UNION ALL


    SELECT CustomerId, 3 AS PaymentNumber, Payment3 AS PaymentAmount


    FROM dbo.Customer


    WHERE Payment3 IS NOT NULL


    Now you can do all of your queries just as if the table was properly structured,
    although it’s not going to perform nearly as well as if the table was designed
    correctly:


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance SELECT CustomerId,
    COUNT(*)


    FROM dbo.CustomerPayment


    GROUP BY CustomerId


    Now you just use the columns of the customer objects that are unique to the customer,
    and these rows are unique for each customer payment.


    Columns depend only on an entire key


    *Columns either are part of a key or describe something about the row identified
    by the* *key.*'
  trans: "\n# 第二章 - 凣到好：为性能而设计数据库\n\n*一行代表一个独立的事物，并且该事物不会在别处重复出现。*\n\n第一范式告诉你，行必须是唯一的。这一点非常重要，但它不仅仅是一个简单的机械选择。仅仅添加一个无意义的唯一性约束在技术上确实能使数据唯一。作为一个生成值如何导致混淆的例子，请看下面这个列出学校吉祥物的表的一部分。（主键在\
    \ `MascotId` 上。）\n\n| MascotId | Name   |\n|----------|--------|\n| 1        |\
    \ Smokey |\n| 112      | Bear   |\n| 4567     | Bear   |\n| 9757     | Bear  \
    \ |\n\n从技术上讲，这些行是唯一的，因为 `ID` 值不同。如果这些 `ID` 数字代表用户在所有情况下用来识别行的数字，那么这可能是一个不错的表设计。然而，在更可能的情况下，`MascotId`\
    \ 只是行创建时生成的一个数字，没有实际意义，那么这些数据就是一个等待发生的灾难性隐患。第一个用户可能会使用 `MascotId` 9757，下一个用户可能使用\
    \ 4567，再下一个用户可能使用 112。没有办法真正区分这些行。而且，尽管互联网似乎告诉我吉祥物名称“Smokey”仅由田纳西大学使用，但“熊”是一个常见的吉祥物，不仅我的高中使用，许多其他学校也使用。\n\
    \n理想情况下，该表应包含一个自然键（或基于与所建模数据含义相关的列的键，而不是与含义无关的人工键）。在这种情况下，`SchoolName` 和吉祥物 `Name`\
    \ 的组合可能就足够了：\n\n| MascotId | Name   | SchoolName            |\n|----------|--------|-----------------------|\n\
    | 1        | Smokey | University of Tennessee |\n| 112      | Bear   | Bradley\
    \ High School   |\n| 4567     | Bear   | Baylor University     |\n| 979796   |\
    \ Bear   | Washington University |\n\n你可能也认为 `SchoolName` 值本身是唯一的，但许多学校有不止一个吉祥物。因此，你可能需要为每个\
    \ `SchoolName` 设置多行。重要的是理解你正在建模的内容，并确保它与你的键所代表的含义相匹配。\n\n`Note` 键的选择可能是一个有争议的讨论，它也是任何设计中非常重要的一部分。任何设计的要点在于，你能以对系统用户有意义的方式区分一行与另一行。`SQL\
    \ Server` 的物理考量包括使用哪一列来对表进行聚类（或物理排序内部结构），哪些列经常用于根据用户使用情况获取数据等等。物理考量应次于确保数据正确性。\n\
    \n为什么唯一性对性能如此重要？当用户可以搜索并知道他们找到了唯一符合需求的项时，他们的工作会轻松得多。当重复数据在数据库设计和用户界面中未得到控制时，所有额外的操作都必须处理这样一个事实：用户期望返回一行，但可能得到多行。\n\
    \n另一个唯一性考量是，一行代表一个独特的事物。当你查看表中的列时，该列是否代表独立于表名和表含义的事物？在下面这个表示客户的表中，检查每一列：\n\n|\
    \ CustomerId   | Name            | Payment1 | Payment2 | Payment3 |\n|--------------|-----------------|----------|----------|----------|\n\
    | 0000002323   | Joe's Fish Market | 100.03   | 120.23   | NULL     |\n| 0000230003\
    \   | Fred's Cat Shop | 200.23   | NULL     | NULL     |\n\n`CustomerId` 和 `Name`\
    \ 显然与客户相关，但 `Payment` 列与客户是完全不同的事物。所以现在两种不同类型的对象关联在一起了。这一点很重要，因为要添加一个新的支付类型对象会变得困难。你怎么知道\
    \ `Payment1`、`Payment2` 和 `Payment3` 之间的区别是什么？如果出现了第四笔付款怎么办？要为 Fred's Cat Shop\
    \ 添加下一笔付款，你可能会使用类似这样的 `SQL` 代码：\n\n```sql\nUPDATE dbo.Customer\nSET Payment1 =\
    \ CASE WHEN Payment1 IS NULL THEN 1000.00 ELSE Payment1 END,\n    Payment2 = CASE\
    \ WHEN Payment1 IS NOT NULL AND Payment2 IS NULL\n                    THEN 1000.00\
    \ ELSE Payment2 END,\n    Payment3 = CASE WHEN Payment1 IS NOT NULL\n        \
    \            AND Payment2 IS NOT NULL\n                    AND Payment3 IS NULL\n\
    \                    THEN 1000.00 ELSE Payment3 END\nWHERE CustomerId = '0000230003';\n\
    ```\n\n如果支付被实现为它们自己的表，该表可能如下所示：\n\n| CustomerId   | PaymentNumber | Amount | Date\
    \       |\n|--------------|---------------|--------|------------|\n| 0000002323\
    \   | 1             | 120.23 | 2012-10-15 |\n| 0000002323   | 2             |\
    \ 100.03 | 2012-11-12 |\n| 0000230003   | 1             | 200.23 | 2012-08-13\
    \ |\n\n添加一笔新付款将像添加另一行一样简单，而添加有关支付的元数据也像添加单个列一样容易。尽管支付的例子可能有点不切实际，而且几乎所有人都能看到多行的必要性，但在许多情况下，设计者认为仅仅使用列就是最佳答案。我现在参与的一个系统将电子邮件地址存储为\
    \ `emailAddress1`、`emailAddress2` 和 `emailAddress3`。`emailAddress1` 值被直接用作主要电子邮件地址，但\
    \ `emailAddress2` 和 `emailAddress3` 中的值要么用作以前的电子邮件地址，要么用作备用电子邮件地址。如果不添加 10 到 20\
    \ 个新的元数据列（每组电子邮件地址一套），几乎不可能控制使用情况并知道所有值的含义。\n\n请记住，即使所有支付条目都是通过用户界面手动完成的，甚至像计算付款数量这样的事情也往往是一项困难的任务。Fred\
    \ 付了多少次款？\n\n你可以这样做：\n\n```sql\nSELECT CASE WHEN Payment1 IS NOT NULL THEN 1 ELSE\
    \ 0 END +\n       CASE WHEN Payment2 IS NOT NULL THEN 1 ELSE 0 END +\n       CASE\
    \ WHEN Payment3 IS NOT NULL THEN 1 ELSE 0 END AS PaymentCount\nFROM dbo.Customer\n\
    WHERE CustomerId = 0000230003;\n```\n\n当你以这种方式做，并且必须同时为多个账户执行此工作时，它会变得很复杂。在许多情况下，处理这种情况的最简单方法是规范化该集合，可能通过一个视图：\n\
    \n```sql\nCREATE VIEW dbo.CustomerPayment\nAS\nSELECT CustomerId, 1 AS PaymentNumber,\
    \ Payment1 AS PaymentAmount\nFROM dbo.Customer\nWHERE Payment1 IS NOT NULL\nUNION\
    \ ALL\nSELECT CustomerId, 2 AS PaymentNumber, Payment2 AS PaymentAmount\nFROM\
    \ dbo.Customer\nWHERE Payment2 IS NOT NULL\nUNION ALL\nSELECT CustomerId, 3 AS\
    \ PaymentNumber, Payment3 AS PaymentAmount\nFROM dbo.Customer\nWHERE Payment3\
    \ IS NOT NULL\n```\n\n现在你可以像表结构正确那样执行所有查询，尽管它的性能远不如表设计正确时好：\n\n```sql\nSELECT\
    \ CustomerId, COUNT(*)\nFROM dbo.CustomerPayment\nGROUP BY CustomerId\n```\n\n\
    现在，你只需使用客户对象中对于客户是唯一的列，并且这些行对于每个客户付款是唯一的。\n\n## 列仅依赖于整个键\n\n*列要么是键的一部分，要么描述由键标识的行的某些属性。*\n"
- fmt: '# 检测和纠正数据库中的依赖关系


    在上一节中，我专注于基于正确的数据类型获取唯一的行。在本节中，我将重点介绍可能在流程早期被遗漏的键。我所描述的键仅仅是列中不正确的依赖关系。例如，考虑以下表（其中
    `X` 是表的声明键）：


    ```

    X Y Z

    ------------- ------------- ----------------

    1 1 2

    2 2 4

    3 2 4

    ```


    `X` 列中的值是唯一的，所以这没问题。你可以根据 `X` 的值确定对应的 `Y` 和 `Z` 值。现在看看其他非键列。给定一个 `Y` 值，你无法确定一个特定的
    `X` 值，但你似乎可以确定 `Z` 值。对于所有 `Y = 1` 的情况，你知道 `Z = 2`；当 `Y = 2` 时，你知道 `Z = 4`。在做出判断之前，请考虑这可能是一个巧合。这在很大程度上取决于需求来帮助你决定
    `Y` 和 `Z` 是否相关（也可能是 `Z` 值决定了 `Y` 值）。


    ## 设计良好的表：更新规则


    当一个表设计得当时，对任何列的更新都只需要更新一个且仅一个值。


    在这种情况下，如果 `Z` 被定义为 `Y*2`，更新 `Y` 列也将需要更新 `Z` 列。如果 `Y` 可以是表的键，这也是可以接受的，但 `Y` 在表中不是唯一的。通过发现
    `Y` 是 `Z` 的决定因素，你已经发现 `YZ` 应该是一个独立的表。因此，你有了两个表来表达之前的表，且没有无效的依赖关系，如下所示（其中 `X` 是第一个表的键，`Y`
    是第二个表的键）：


    ```

    X Y

    ------------- -------------

    1 1

    2 2

    3 2

    ```


    ```

    Y Z

    ------------- ----------------

    1 2

    2 4

    ```


    ## 实例：图书信息表


    对于一个稍微不那么抽象的例子，考虑以下表示图书信息的数据集（表的键是 `BookISBN`）：


    ```

    BookISBN BookTitle PublisherName PublisherLocation

    ----------- ------------- --------------- -------------------

    111111111 Normalization Apress California

    222222222 T-SQL Apress California

    444444444 DMV Book Simple Talk England

    ```


    `BookISBN` 是定义的键，因此每一列都应该完全依赖于这个值。书名依赖于图书 ISBN 和出版商。这个表中的问题在于 `PublisherLocation`
    值。一本书没有出版商地址，出版商才有。因此，如果你需要更改出版商，你还需要更改出版商地址。


    ## 纠正图书信息表的依赖问题


    为了纠正这种情况，你需要为出版商创建一个单独的表。以下是一种你可以采用的方法（其中第一个表的键是 `BookISBN`，第二个表的键是 `Publisher`）：


    ```

    BookISBN BookTitle PublisherName

    ----------- ------------- ---------------

    111111111 Normalization Apress

    222222222 T-SQL Apress

    444444444 DMV Book Simple Talk

    ```


    ```

    Publisher PublisherLocation

    ------------- ---------------------

    Apress California

    Simple Talk England

    ```


    现在，更改图书的出版商只需要更改 `Book` 表中的出版商值，而更改出版商地址只需要对 `Publisher` 表进行一次更新。然而请注意，如果 `PublisherLocation`
    **实际上**代表图书印刷时出版商的所在地，那么原始设计可能没问题，因为你可能会有一本新书，出版商是 Apress，而他们现在可能在纽约：


    ```

    BookISBN BookTitle PublisherName PublisherLocation

    ----------- --------------- --------------- -------------------

    111111111 Normalization Apress California

    222222222 T-SQL Apress California

    444444444 DMV Book Simple Talk England

    555555555 Expert Practices Apress New York

    ```


    ```

    Publisher PublisherLocation

    ------------- ---------------------

    Apress New York

    Simple Talk England

    ```


    现在你可以获取 Apress 的当前位置，以及图书出版时 Apress 的所在地。这是重要信息吗？如果你认为你知道，那么你就错过了本章第一节的重点。重要的是需求，而不是你设计时看似正确的东西。


    ## 其他依赖关系和总结数据


    当然，你应该考虑同一张表中的各种依赖关系，比如计算（如果必要且不能被覆盖，应该使用计算列来完成）、汇总数据（如发票总额）或部门员工的计数。通常，存储和维护不正确依赖的成本远大于按需计算值的成本。


    在我们的例子中，如果更新出版商表需要更新图书表，你可能会遇到问题（除了在修正当前位置错误的情况下）。


    ## 键始终代表单个表达式


    *确保三个值或表之间的依赖关系是正确的。*


    一旦你达到表中的列只有原子值，并且表具有单一含义、唯一行且看似没有依赖问题时，你就非常接近完成了。事实上，你基本上已经处于 **Boyce–Codd 范式**（BCNF），正如我之前所说，这是对被高度吹捧为终极范式的第三范式的更好版本。然而，你还没有完全完成，最后一个测试仍然很有趣，并且对应于第四和第五范式。


    ## 键的单一性测试


    你需要检查所选的键是否只代表一件事。考虑以下表示驾驶员喜欢驾驶的车辆类型的示例表（表的键是 `Driver` 和 `VehicleStyle`）：


    ```

    Driver VehicleStyle DesiredModelLevel

    -------- ---------------- ------------------

    Louis CUV Premium

    Louis Sedan Standard

    Ted Coupe Performance

    ```


    `Driver` 和 `VehicleStyle` 之间的关系代表了驾驶员和车辆样式实体的多值依赖关系。驾驶员 Louis 将驾驶 CUV 或 Sedan
    车辆，并且 Louis 是唯一驾驶 CUV 样式的驾驶员。随着你添加更多数据，每种车辆样式将有许多驾驶员选择该类型作为偏好。像这样的表经常用于解析两个表之间的多对多关系——在本例中是
    `Driver` 和 `VehicleStyle` 表，它们定义了特定于驾驶员和车辆样式的特征。`DesiredModelLevel` 在这种情况下是仅适用于
    `Driver` 和 `VehicleStyle` 交集的特征。


    ## 三实体依赖关系建模问题


    当你需要对三个实体之间的关系建模时，就会出现建模问题，通常在三个单独的表类型中，建模为（通常）由三列组成的键。例如，考虑以下表，表示分配给使用特定书籍的班级的培训师（目前所有三列构成键）：


    ```

    Trainer Class Book

    ---------- -------------- -----------------------------

    Louis Normalization DB Design & Implementation

    Chuck Normalization DB Design & Implementation

    Fred Implementation DB Design & Implementation

    Fred Golf Topics for the Non-Technical

    ```


    要确定此表是否可接受，你需要查看每一列并确定它们如何与其他列相关。如果任何两列之间没有直接关联，则表设计将存在问题，因为键实际上代表了多个独立的事物。以下是可能的组合及其关系：


    •'
  raw: 'In the previous section, I focused on getting unique rows, based on the correct
    kind of data. In this section, I focus on finding keys that might have been missed
    earlier in the process. The keys I am describing are simply dependencies in the
    columns that aren’t quite right. For example, consider the following table (where
    *X* is the declared key of the table):


    X Y Z


    ------------- ------------- ----------------


    1 1 2


    2 2 4


    3 2 4


    Values in the X column are unique, so that is fine. You can determine the corresponding
    Y and Z values from the value of X. Now look at the other, non-key columns. Given
    a value of Y, you can’t determine a specific value of X, but you seemingly can
    determine the value of Z. For all cases where Y = 1, you know that Z = 2, and
    when Y = 2, you know that Z = 4\. Before you pass judgment, consider that this
    could be a coincidence. It is very much up to the requirements to help you decide
    if Y and Z are related (and it could be that the Z value determines the Y value
    also).


    When a table is designed properly, any update to a column requires updating one
    and only one value.


    In this case, if Z is defined as Y*2, updating the Y column would require updating
    the Z column as well. If Y


    could be a key of your table, this would be acceptable as well, but Y is not unique
    in the table. By discovering that Y is the determinant of Z, you have discovered
    that YZ should be its own independent table. So instead of the single table you
    had before, you have two tables that express the previous table with no invalid
    dependencies, like this (where X is the key of the first table and Y is the key
    of the second): X Y


    ------------- -------------


    1 1


    2 2


    3 2


    Y Z


    ------------- ----------------


    1 2


    2 4


    For a somewhat less abstract example, consider the following set of data, representing
    book information (the key of the table is BookISBN):


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance BookISBN
    BookTitle PublisherName PublisherLocation


    ----------- ------------- --------------- -------------------


    111111111 Normalization Apress California


    222222222 T-SQL Apress California


    444444444 DMV Book Simple Talk England


    BookISBN is the defined key, so every one of the columns should be completely
    dependent on this value. The title of the book is dependent on the book ISBN and
    the publisher, too. The concern in this table is the PublisherLocation value.
    A book doesn’t have a publisher location, a publisher does. So if you needed to
    change the publisher, you would also need to change the publisher location.


    To correct this situation, you need to create a separate table for the publisher.
    Following is one approach you can take (in which the key of the first table is
    BookISBN and the key of the second table is Publisher):


    BookISBN BookTitle PublisherName


    ----------- ------------- ---------------


    111111111 Normalization Apress


    222222222 T-SQL Apress


    444444444 DMV Book Simple Talk


    Publisher PublisherLocation


    ------------- ---------------------


    Apress California


    Simple Talk England


    Now a change of publisher for a book requires only changing the publisher value
    in the Book table, and a change to publisher location requires only a single update
    to the Publisher table. Note, however, that if PublisherLocation *actually* represented
    the location of the publisher at the time the book was printed, the design might
    have been just fine because you might have a new book with Apress and they could
    be in New York now:


    BookISBN BookTitle PublisherName PublisherLocation


    ----------- --------------- --------------- -------------------


    111111111 Normalization Apress California


    222222222 T-SQL Apress California


    444444444 DMV Book Simple Talk England


    555555555 Expert Practices Apress New York


    Publisher PublisherLocation


    ------------- ---------------------


    Apress New York


    Simple Talk England


    Now you can get the current location of Apress, and the location of Apress when
    the book was published. Is this important information? If you think you know,
    you missed the point of the first section of this chapter. What matters is the
    requirements, not what seems to be right when you are designing.


    Of course, you should consider all sorts of dependencies, in the same table, like
    calculations (which ought to be done with a calculated column if it is necessary
    and cannot be overridden), summary data like the total on an invoice, or the count
    of employees who work for a department. Usually, the cost to store and maintain
    incorrect dependencies is far more than the cost of calculating the values as
    you need them.


    In our example, if updating the publisher table required updates to the book table,
    you probably would have issues (except in the case of fixing a mistake in the
    current location, perhaps).


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance Are there
    cases where calculating summary values at the time they are needed is more costly
    than the maintenance? Yes, but the best rule of thumb is to try the correct or
    easy way first. Usually, if your tables follow the normal patterns, optimization
    almost just happens.


    Keys always represent a single expression


    *Make sure dependency relationships between three values or tables are correct.*


    Once you have reached the point that your tables have only atomic values for columns
    and tables have a single meaning, unique rows, and seemingly no dependency issues,
    you are really close to being done. In fact, you’re basically in Boyce–Codd normal
    form, which (as I stated earlier) is a better version of the third normal form
    that is so highly touted as the ultimate normal form. However, you aren’t quite
    done, and the last test is still interesting and corresponds to the fourth and
    fifth normal forms.


    You need to check out whether the keys that have been chosen represent only one
    thing. Consider the following example table that represents the types of vehicles
    a driver likes to drive (where the keys of the table are Driver and VehicleStyle):


    Driver VehicleStyle DesiredModelLevel


    -------- ---------------- ------------------


    Louis CUV Premium


    Louis Sedan Standard


    Ted Coupe Performance


    The relationship between Driver and VehicleStyle represents a multivalued dependency
    for the Driver and the VehicleStyle entities. The driver Louis will drive either
    CUV or Sedan vehicles, and Louis is the only driver who drives the CUV style.
    As you add more data, each vehicle style will have many drivers that choose the
    type as a preference. A table such as this one for Driver and VehicleStyle is
    used frequently to resolve a many-to-many relationship between two tables—in this
    case, the Driver and VehicleStyle tables, which define the characteristics that
    pertain specifically to the driver and the vehicle style. The DesiredModelLevel
    in this case is a characteristic that applies only to the intersection of Driver
    and VehicleStyle.


    The modeling problem comes when you need to model a relationship between three
    entities, modeled as three columns in a key (usually) from three separate table
    types. As an example, consider the following table representing the assignment
    of a trainer to a class that is assigned to use a certain book (where all three
    columns make up the key currently):


    Trainer Class Book


    ---------- -------------- -----------------------------


    Louis Normalization DB Design & Implementation


    Chuck Normalization DB Design & Implementation


    Fred Implementation DB Design & Implementation


    Fred Golf Topics for the Non-Technical


    To decide if this table is acceptable, you need to look at each column and determine
    how they are related to the others. If any two columns are not directly related
    to one another, there will be an issue with the table design because the key actually
    represents more than one independent thing. Here are the possible combinations
    and their relationships:


    •'
