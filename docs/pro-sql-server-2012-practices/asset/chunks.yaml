    # 作者：布拉德利·鲍尔


    关于页面和行压缩，首先需要回答的，也是最重要的问题是：你为什么要使用它？毕竟，硬盘和磁盘都很便宜，对吧？


    你经常听到这种说法——磁盘便宜，或者存储便宜。当然，它不像 10 年前那么昂贵了。你可以在美国的购物假期“黑色星期五”走到最近的零售商那里，花不到 100
    美元就能买到一块 2TB（太字节）的硬盘。在某些情况下，你甚至可以找到同容量的固态硬盘，价格稍高一点。但我敢打赌，你应该不会在黑色星期五或任何其他购物假期，为你的生产服务器购买硬盘。即使你买了，这些磁盘也不是为在存储区域网络（SAN）设备中工作而设计的。当你购买一个
    SAN 时，通常需要花费数千美元。如果你有多个 SAN，你可能还需要配备一到两名 SAN 管理员。不知不觉中，这些磁盘的成本就开始累积了。


    然后是你管理的数据库。你很可能不只管理一个数据库或一个 SQL 实例。你可能在生产环境、预演或测试环境、开发环境中有相同的数据库，或者你可能有一个业务持续性计划/灾难恢复（COOP/DR）服务器。管理员通常致力于消除数据库内的数据重复，但在多个环境中保留数据的重复副本，是妥善内容管理的必要部分。当你开始考虑你管理的所有众多系统的所有这些数据时，你很快就能看到压缩如何为你节省空间——不仅仅是单个数据库中的一张表，而是贯穿整个企业
    SQL Server 环境。


    节省数据库空间只是考虑使用页面和行压缩的一个原因。你还可以减少数据库所需的内存占用、查询产生的逻辑 IO、备份大小以及备份时间。


    **提示** 我无法告诉你，有多少次我在做完关于压缩的演讲后，有人会问类似这样的话：“如果我压缩整个数据库，这样好吗？”


    是的，亲爱的读者，这样并不好。然而，我喜欢反问一句：你会压缩笔记本电脑上整个`C:`盘吗？当然，这会节省空间，但除非你的电脑性能很强劲，否则它会拖慢整个操作系统，因为无论数据是否适合压缩，你都在对所有数据执行压缩操作。


    ![图片 163](img/index-343_1.png)


    ## 第 14 章 ■ 页面和行压缩


    同样地，除非数据适合压缩，否则你也不希望压缩数据库的全部内容。压缩的代价是额外的 CPU 周期，而大多数服务器都有空闲周期，但你不想无谓地浪费它们。你很少会发现一个数据库，压缩其中的每一个表都是个好主意。


    99.99%的数据库都不应该被完全压缩。你可能属于那 0.01%的情况，但我不会押注于此。浪费 CPU 周期可能会在未来给你的数据库带来可扩展性问题。


    正如我们将要讨论的，你可以采取一些特定的措施来找出数据库中哪些应该压缩，哪些不应该压缩。


    ## 开始之前


    在开始启用页面和行压缩之前，有几个基本的考虑因素。首先，你需要使用支持页面和行压缩的 SQL Server 2012 版本，并且你需要确保将来不会需要将该数据库恢复到更低的版本，例如
    Microsoft SQL Server 2012 标准版。一旦基本的兼容性问题解决了，你还需要仔细考虑到底压缩哪些数据以及如何进行压缩。


    最重要的是：了解你的数据！了解表中使用的数据类型以及存储在其中的数据类型，对于决定你应该压缩什么至关重要。


    ### 版本与支持


    压缩是一项企业级功能。这意味着你必须使用 SQL Server 2012 企业版或开发版才能使用页面和行压缩。这也意味着，如果你在企业版 SQL 实例上启用了压缩，然后尝试将该数据库恢复到标准版实例，操作将会失败。


    **图 14-1.** 你可以使用 DMV `sys.dm_persisted_sku_features` 来查看数据库上启用了哪些企业版功能。


    ![图片 164](img/index-344_1.png)


    ## 第 14 章 ■ 页面和行压缩


    如果你需要将企业版数据库迁移到更低的版本，可以运行以下查询来查看当前数据库上是否启用了任何企业版功能。


    ```sql

    SELECT

    feature_name

    ,feature_id

    FROM

    sys.dm_db_persisted_sku_features;

    ```


    运行此查询不仅会告诉你是否启用了压缩，还会告知你已启用的任何其他企业版功能，如图 14-1 所示。


    ### 压缩什么以及如何压缩


    那么，在数据库内部，你可以压缩什么呢？你可以压缩堆（没有聚集索引的基本表）、聚集索引（按聚集索引排序的基本表）、非聚集索引，以及按分区压缩对象。


    你可能想知道我所说的“按分区压缩对象”是什么意思。这意味着，如果你有一个使用了多个表分区的表，你可以使用不同的压缩级别来压缩每个分区：`页面`、`行`或`无`。此外，如果你有一个分区的非聚集索引，你也可以使用不同的压缩级别来压缩每个分区。更多详情请参见图
    14-2。


    **图 14-2.** 你可以按分区对分区表应用不同的压缩。你也可以按分区压缩分区的非聚集索引。


    所以，你可以压缩堆、聚集索引、非聚集索引，以及按分区压缩对象，但*如何*压缩它们呢？有两种不同的方式来应用压缩。首先，你可以在创建对象时指定要使用的压缩级别。其次，你可以重建堆、聚集索引或非聚集索引，并指定要使用的压缩级别。重建堆的功能最早在
    SQL Server 2008 中引入。其概念与重建索引相同。


    ![图片 165](img/index-345_1.png)


    ## 第 14 章 ■ 页面和行压缩


    当堆被重建时，其结构会在新的数据页上完全重新创建。在此过程中，由插入、更新或删除引起的任何碎片或转发指针都会被消除，并且指定的压缩级别会被完全应用。


    ```sql

    ALTER TABLE dbo.heap

    REBUILD WITH(data_compression=Page)

    GO

    ```


    一旦对象使用压缩被重建，其压缩级别选择会在任何未来的重建操作中被继承。压缩级别唯一会改变的情况是，你在重建命令中指定了一个新的压缩级别。从那时起，新的设置将被继承。


    有三种不同的压缩级别：`页面`、`行`和`无`。`无`是你日常使用的常规未压缩格式。但重要的是要知道，如果你能压缩数据，你也能解压缩它。关于页面和行压缩，让我们更深入地探讨一下。


    ## 行压缩


    我们将从行压缩开始深入探讨数据压缩。无论指定的压缩级别如何，行压缩都是将应用于 SQL Server 表的最低级别的压缩。稍后，当我讨论页面压缩时，我会详细说明它是行压缩的超集。

