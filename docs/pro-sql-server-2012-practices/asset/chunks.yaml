  trans: '# 第 11 章：SQL Server 数据移动的流体动力学


    ## 日志传送


    日志传送解决方案涉及对主数据库进行事务日志备份，复制这些备份，然后将它们应用到位于另一台服务器上的辅助数据库。主服务器和辅助服务器上的 `SQL Server
    Agent` 服务负责管理备份、文件复制和还原的操作流程。在主服务器上执行备份和将其应用到辅助服务器之间，存在一个强制性的延迟。至少，这个延迟包括备份操作完成、文件复制发生，然后还原操作开始所需的时间。还原前的延迟可以配置为特定的时间间隔——例如，15
    分钟、2 小时等等。


    ![图片 137](img/index-286_1.png)

    **图 11-3.** 日志传送。


    实施日志传送有几个好处。首先，你可以将日志复制到多个目的地，就像在复制中有多个订阅者一样。其次，当没有活动应用日志时，`辅助数据库`或多个数据库可以用于只读活动。最后，在`辅助数据库`上应用事务日志备份的延迟，可以在发生大规模数据更新或意外删除操作时，用于数据恢复。可以使用一个可选的监视实例来检测日志备份/传送/还原过程中的任何故障，并发出需要进行故障转移的通知。


    `日志传送`最常用于灾难恢复场景，因为其内置的延迟通常不适用于其他数据复制需求。


    `日志传送`的好处包括以下几点：


    - 允许存在多个辅助数据库。

    - 允许对`辅助数据库`进行有限制的只读使用。

    - 整个数据库会被发送到另一个实例。


    其局限性包括：


    - 在日志文件还原期间，数据库无法被使用。

    - 故障转移到`辅助数据库`是一个手动过程。

    - 不支持对数据进行分区或筛选。


    ## 场景分析


    以下是复制技术如何应用于四种场景的示例：


    ### 场景 1：全球化组织


    `日志传送`无助于为日常使用在全球范围内分发数据。因为数据库将需要反复脱机以应用日志备份，即使在每个主要城市都有一个只读副本，也不会带来任何好处。但是，如果你在升级或停机窗口期间需要只读活动，你可能希望设置`日志传送`，并在执行维护时，将应用程序的角色切换到`辅助数据库`。这不是一个完美的解决方案，但它可以为全球用户提供一些可用时间。


    ### 场景 2：高容量报告需求


    `日志传送`在这里可能有用。然而，需要在应用日志备份到`辅助数据库`时有更长的延迟。例如，如果设置一个辅助数据库每天只应用一两次日志（可能在早上 7 点和晚上
    7 点），那么用户访问数据时就不会被打断。根据访问时间的不同，数据可能会有长达 12 小时的延迟。


    ### 场景 3：夜间处理作业


    由于任务量很大，`日志传送`不是分担负载的可行选项。


    ### 场景 4：硬件故障


    在发生硬件故障时，`日志传送`可能有用，但不应被视为永久性解决方案。应根据需要修复或重建主服务器。在此过程中，可以将`辅助数据库`联机并完全恢复。此时，它将不再是辅助数据库。使用该数据库的应用程序需要配置为访问新的数据库源。一旦主数据库准备就绪'
- fmt: '## Database Mirroring


    brought back online, the secondary database can be backed up and restored to the
    primary database. Log shipping needs to be reconfigured and restarted so that
    it can be ready for the next failover occurrence.


    Database mirroring has a tendency to be confused with log shipping (I still can’t
    figure out why), but really it has nothing in common with log shipping. The use
    of mirroring takes you back to applying changes at the transaction level; however,
    unlike replication, the transactions are batched together and applied as quickly
    as possible without the use of a distributor. With mirroring, there is a single
    principal server and there can only be a single mirror server. An optional witness
    server also can be used to verify communication to both the principal and the
    mirror.


    If you are looking to implement some type of data replication in your environment—and
    you have a shiny, new installation of `SQL Server 2012`—I would not recommend
    setting up database mirroring. This feature has been deprecated and eventually
    will not be available in future versions of the product. The upgrade is to convert
    a mirroring configuration to an `AlwaysOn` availability group.


    If you currently need to support mirroring in a `SQL Server 2008` or `2008 R2`
    version that will be upgraded to `2012`, there is no problem with keeping mirroring
    in place. Remember when a technology is deprecated, you have a grace period in
    which to make changes and plan for replacements. But having that grace period
    doesn’t mean you should continue to encourage the use of the deprecated feature
    for new systems!


    The single-most important feature of mirroring is the ability to easily fail over
    when communication to the primary database is lost or interrupted. Additionally,
    with the options for data “safety,” you can control the amount of potential data
    loss on failover. Following are the two options: 280


    chapter 11 ■ the Fluid dynamics oF sQl server data movement


    High-Performance Mode (`Asynchronous`) Transactions are batched up and applied
    on the mirror as they come in. There is the possibility on failover that some
    transactions have not yet been applied on the mirror. This option is available
    only with the `Enterprise` edition.


    High-Safety Mode (`Synchronous`) Transactions are applied to the mirror before
    being committed to the primary. The ensures no data is lost on failover. There
    is a potential for latency when using synchronous mode. With high-safety mode,
    you can also have automatic failover if a witness server is configured.


    The benefits from mirroring include the following:


    - Compression when delivering the transactions.

    - The entire database is mirrored.

    - There is support for automatic failover.

    - On failover, the roles of the principal and mirror are swapped.

    - No data loss occurs with synchronous mirroring.

    - Early detection of corruption in your database is possible.


    The imitations form a rather long list this time:


    - Mirroring requires the `FULL` recovery model.

    - The mirror copy is not online and cannot be used until failover.

    - There is no support for data partitions or filtering.

    - Mirroring requires Transmission Control Protocol (`TCP`) endpoints for communication.

    - Mirroring cannot support cross-database transactions or distributed transactions.

    - You cannot mirror any system databases (for example, `master`, `msdb`, `tempdb`,
    or `model`).

    - Mirroring’s asynchronous option is only available only in the `Enterprise` edition.

    - You might need to manually set applications to use the mirror in the event of
    failover.


    Following is how you might benefit from mirroring in the four scenarios we’ve
    been considering so far in this chapter:


    SCENARIO 1: Global Organization Using mirroring here would not provide a benefit
    in terms of distributing the user load, because mirroring is more useful for `HA/DR`
    scenarios. Because the mirror database cannot be used until failover, only the
    principal is in use at any given time.


    SCENARIO 2: High-Volume Reporting Needs Much like Scenario 1, mirroring'
