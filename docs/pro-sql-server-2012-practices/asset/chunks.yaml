    如前所述，有两种方式可以查看行集提供程序：SQL Profiler 和 SMO 对象模型。我们将从 SQL Profiler 开始，依次查看这两种方式。


    # SQL Server Profiler


    `SQL Profiler` 在 SQL Express 版中不可用，但有一个名为 `SQL Express Profiler` 的免费开源项目填补了这一空白。`SQL
    Profiler` 预装了 9 个模板，有助于处理常见的跟踪场景，如跟踪语句持续时间或所获取的锁。默认的跟踪输出显示在 Profiler 窗口中，你可以实时看到跟踪记录被写入。跟踪事件越多，占用的内存就越多。需要牢记的一点是，尽管
    Profiler 用户界面以毫秒为单位显示 `duration` 列，但其实际值是以微秒为单位的。这一点在你将跟踪保存到表时可以看到。SMO 对象模型中的
    `duration` 值也是以微秒为单位的。根据我与一些人的交流，似乎存在一种误解，认为 `CPU` 列也发生了同样的情况。事实并非如此。`CPU` 列的单位仍然是毫秒。


    在使用 `SQL Profiler` 创建跟踪时，各种可供选择的选项可能会让人有些困惑。图 5-2 展示了新建跟踪对话框。


    ![Image 62](img/index-114_1.png)


    **图 5-2. “新建跟踪属性”对话框**


    顶部是标准的输入选项，如为跟踪命名和选择模板。有趣的部分在对话框的中部。这里有诸如“保存到文件”和“保存到表”之类的选项。如果你还记得之前的内容，就不存在直接到表的提供程序，而
    `SQL Profiler` 使用的行集提供程序是基于内存的。这里的微妙之处在于，虽然这些选项确实会创建文件并保存到表，但数据首先要经过行集提供程序的内存缓冲区。请注意，有一个选项是“服务器处理跟踪数据”。这是你所能选择的最糟糕的选项。这个名字有点误导性，因为它会让你认为你实际上是在创建服务器端跟踪。实际发生的情况是，你创建了两个完全相同的跟踪。


    一个通过行集提供程序，另一个通过文件提供程序。图 5-3 显示了选定的选项，下面的代码展示了我们确实有 2 个跟踪在运行。


    ```sql

    -- This query returns 2 rows.

    -- The rowset provider has the

    -- is_rowset column set to 1 and

    -- NULL in the path column.

    -- The file provider has the path column set

    -- to the path we''ve set in options (E:\MyTrace.trc).

    SELECT *

    FROM sys.traces

    WHERE is_default != 1;

    ```


    ![Image 63](img/index-115_1.png)


    ![Image 64](img/index-115_2.png)


    **图 5-3. 你应该避免的“保存到文件”选项**


    如果你选择了“保存到表”选项，跟踪数据仍然会经过行集提供程序，然后逐行插入到表中。“设置最大行数”选项允许你为表设置最大行数限制。达到该限制后，跟踪数据将不再存储到表中。然而，跟踪本身仍在继续。`SQL
    Profiler` 另一个非常有用但鲜为人知的功能是能够将已保存的跟踪与已保存的 PerfMon 二进制（`.blg`）或文本（`.csv`）数据文件合并。为此，你的跟踪必须包含
    `StartTime` 和 `EndTime` 列，以便与 PerfMon 数据同步。PerfMon 合并不适用于实时跟踪，仅适用于已保存的跟踪。要合并它们，请打开
    SQL Trace 文件，转到 `文件` -> `导入性能数据`，然后选择 PerfMon 数据文件。图 5-4 显示了在 `SQL Profiler` 中关联数据的样子。


    **图 5-4. 在 SQL Profiler 中显示的、与性能监视器数据相关联的已保存跟踪**


