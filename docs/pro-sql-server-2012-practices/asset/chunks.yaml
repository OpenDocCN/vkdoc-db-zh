    `varcharType`,0)=[@1]`。这表明它已转换列值，实际上使得任何对 `varcharType` 列的索引对于任何查找操作都变得无用。还要注意，对于字符值，还有一个控制值排序和比较的**排序规则**，这也可能导致类型不匹配。


    这些都是简单的例子，但这些问题经常出现，因为有很多地方你需要比较值，例如在连接、搜索等场景中。注意正确选择数据类型的细节，可以在性能和数据质量方面给你带来巨大的回报。在下一节中，我将扩展数据质量和限制数据的话题，超越数据类型，但数据类型的选择常常是你将要做的第一个物理模型选择。


    **约束**


    一旦你设计了表，并选择了符合需求的数据类型，你需要将数据约束为仅“合法”的内容。你能保持数据越正确，你纠正错误所花的时间就越少。任何可以实际约束的数据都应该被约束。例如，经常有人设计一个列来在地址中保存国家名称。世界上有不到两百个国家，但如果你给用户一个简单的文本列来输入国家名称，你可能会得到每个国家超过
    200 种不同的拼写。运用一点创造力，你可以通过使用 SQL Server 的声明性约束之一来防止拼写错误。可能无法验证所有数据——例如，在美国，验证州相当容易，但随着粒度增加，验证变得更加困难。验证县和城市成本高昂，确保邮政编码匹配城市和州则更困难一些，因为有太多允许的例外。验证完整地址可能只在你进行批量邮件操作以获得邮寄折扣时才值得付出努力。


    ## 第 2 章 ■ 正确设计：为性能设计数据库


    为了帮助约束和引导数据完整性挑战，SQL Server 有五种声明性约束：


    -   **NULL** 确定列是否将接受 NULL 作为其值。尽管 NULL 约束不像其他约束类型那样是对象，但它们的行为方式非常相似。


    -   **PRIMARY KEY 和 UNIQUE 约束** 用于确保你的行在给定的键列集合上仅包含唯一的值组合。这种约束用于保护你设计的键免受重复数据的影响。


    -   **FOREIGN KEY** 用于确保任何外键引用只有与其引用的键列匹配的有效值。


    -   **DEFAULT** 用于在用户未提供时设置列的可接受默认值。（有些人不将默认值视为约束，因为默认值不限制更新。）


    -   **CHECK** 用于限制可输入到单个列或整行的值。


    约束是表基础实现的一部分，有助于确保数据质量。你应尽可能广泛地使用约束来保护你的数据，因为它们简单，并且大部分情况下开销最小。当然，它们并非免费，它们可能会在一定程度上减慢你的数据创建速度（对于
    CHECK、FOREIGN KEY 和 PRIMARY KEY/UNIQUE 约束来说肯定是这样），但从长远来看，格式不佳的数据对你的性能影响要糟糕得多。


    > **注意** SQL Server 还提供了触发器，可用于复杂的数据完整性实现。然而，它们应仅作为最后手段使用，因为它们可能难以正确实现，并且如果使用不当，可能对数据完整性非常有害。


    所有 SQL Server 约束（除默认值外）最伟大的方面之一是，查询优化器可以使用它们来优化查询，因为约束告诉优化器有关数据的某些额外质量方面。例如，假设你在列上放置了一个约束，要求该列的所有值都介于
    5 到 10 之间。如果执行一个查询，要求该列值大于 100 的所有行，优化器甚至无需查看数据就知道没有行满足条件。


    无论约束是否直接帮助查询性能，它们在维护数据质量方面的作用是整体系统性能的最大因素之一。除了我涵盖的规范化和数据类型主题之外，考虑一个包含活动演讲者日程的数据库。


    假设数据库设计完美，但一些演讲者分配不正确。因此，每个用户现在都必须通过手动检查坏数据的值来限定所有行的所有使用（这是时间的显著浪费）并处理错误的数据值。


    当然，虽然你可以用约束做很多事，但你只能做这么多。用户是人类（大部分情况下），所以有时他们听错东西。有时他们拼错东西。（相信我，看到 Louis 这个名字被拼写总是令人愉悦；至少
    *一些* 拼写是阳性的。）。例如，假设你花费了大量时间设计一个客户数据库，而你的用户与客户进行了以下对话：


    *计算机操作员：“嗨，你的名字是什么？”*


    *电话声音：“Fred。”*


    *[计算机按键点击；镜头转向计算机屏幕。]*


    *输入无效：23720823437 不是有效的人名*


    *计算机操作员：“嗯，我想我拼错了。你能再拼一遍吗？”*


    *电话声音（不太高兴地）：“F-r-e-d。”*


    *[计算机按键点击；镜头转向计算机屏幕。]*


    *名字（屏幕上显示）：Jerkface*


    对于这些类型的“错误”，你真的无能为力。首先，呼叫者的名字可能是 Jerkface（但很可能拼写为 Jearkfase!），所以也许输入是正确的，但软件无法防止用户的错误。其次，它可能是一个女性声音，而“Fred”这个名字可能是错的，因为它是一个非常不常见的女性名字（尽管
