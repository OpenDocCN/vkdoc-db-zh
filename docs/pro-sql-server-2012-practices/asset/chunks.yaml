- fmt: "# Chapter 10 Automating Administration\n\n## DMV Collection Job SQL Code\n\
    \n```sql\nFROM sys.dm_os_sys_memory;\n\nINSERT INTO ProcessorDMVHistory\nSELECT\
    \ ER.session_id,\n    ER.request_id,\n    ES.host_name,\n    ES.login_name,\n\
    \    DB_NAME(ER.database_id) AS dbname,\n    ER.start_time,\n    GETDATE() as\
    \ currenttime,\n    ER.cpu_time,\n    ER.total_elapsed_time,\n    EST.text as\
    \ query_text,\n    GETDATE()\nFROM sys.dm_exec_requests ER\nINNER JOIN sys.dm_exec_sessions\
    \ ES on ER.session_id = ES.session_id\nOUTER APPLY sys.dm_exec_sql_text(ER.sql_handle)\
    \ EST\nOUTER APPLY sys.dm_exec_query_plan(ER.plan_handle) EQP;\n\nINSERT INTO\
    \ DiskDMVHistory\nSELECT ER.session_id,\n    ER.request_id,\n    ES.host_name,\n\
    \    ES.login_name,\n    DB_NAME(ER.database_id) AS dbname,\n    ER.start_time,\n\
    \    GETDATE() as currenttime,\n    ER.total_elapsed_time,\n    ER.reads,\n  \
    \  ER.writes,\n    EST.text as query_text,\n    GETDATE()\nFROM sys.dm_exec_requests\
    \ ER\nINNER JOIN sys.dm_exec_sessions ES on ER.session_id = ES.session_id\nOUTER\
    \ APPLY sys.dm_exec_sql_text(ER.sql_handle) EST\nOUTER APPLY sys.dm_exec_query_plan(ER.plan_handle)\
    \ EQP;\n```\n\nThe step should appear the same as the screen in Figure 10-4.\n\
    \n***Figure 10-4.** A job step*\n\n## Job Step Options\n\nEach step also offers\
    \ advanced options, as seen in Figure 10-5. If successful, you can continue to\
    \ another step, quit reporting success, or quit reporting failure. If a step fails,\
    \ you can choose to retry it. If it fails after the specified number of retries,\
    \ you have the same options: continue to another step, quit reporting success,\
    \ or quit reporting failure.\n\nAdditional error logging options are shown in\
    \ Figure 10-5 as well. You can choose to output the information about an error\
    \ to a file, or to a table in a database.\n\n***Figure 10-5.** Advanced options\
    \ of a job step*\n\n## Schedules\n\nThe real power of automation in SQL Server\
    \ Agent jobs is the ability to set schedules. You no longer need to start the\
    \ execution of jobs as you leave the office, or worry about logging in on a weekend\
    \ to start a one-time job.\n\nThe screen for scheduling is shown in Figure 10-6.\
    \ The first time you establish a schedule, you give it a name. Try to make this\
    \ schedule name as descriptive as possible, so the type and frequency of the schedule\
    \ are clear. For schedule type, you can pick from the following:\n\n- **Recurring**:\
    \ Jobs that need to run multiple times, such as database backups, transaction\
    \ log backups, index reorg or rebuilds, or queries to populate report tables.\n\
    - **One time**: Jobs that only need to run once, such as for a scheduled data\
    \ load.\n- **When SQL Server Agent starts**: Jobs that need to execute only when\
    \ the Agent service is started, perhaps to send a notification or run a specific\
    \ stored procedure.\n- **Whenever the CPUs become idle**: Jobs that can take advantage\
    \ of CPU idle time and don’t need to be run at a specific time, such as batch\
    \ processing.\n\nFrequency can be daily, weekly, or monthly. If daily, pick the\
    \ number of days between recurrences. For example, you can run a job every day,\
    \ every five days, or every ten days. If weekly, pick the number of weeks between\
    \ recurrences, and the day(s) of the week the job will run. If monthly, you can\
    \ choose a specific day of the month. Another option is to pick the X day of each\
    \ Y months (such as the second Thursday of every month, or the last day of every\
    \ third month). Figure 10-6 shows the schedule screen. The DMV gathering job will\
    \ run every day, every 15 minutes.\n\n***Figure 10-6.** Setting up a job schedule*\n\
    \nAnother benefit is that once a schedule is established, it can be reused. When\
    \ you’re looking at the Schedules screen for a job, select Pick instead of New\
    \ to choose an existing schedule.\n\n**Note:** You can also create a job based\
    \ on an alert, which will be covered later in this chapter.\n\n## Notifications\n\
    \nNotifications allow you to perform an action when a job completes. As shown\
    \ in Figure 10-7, you can send an e-mail to any of the operators you have set\
    \ up. The e-mail can be sent when the job fails, when the job succeeds, or when\
    \ the job finishes, regardless of outcome.\n\nYou also have the option to write\
    \ to the Windows Application event log. Deleting a job upon completion is also\
    \ an option, which is useful if the job is a one-time operation and you don’t\
    \ want to worry about coming back to clean it up later. For the DMV execution,\
    \ notification will be via e-mail and the Windows Event log if the job fails.\n\
    \n***Figure 10-7.** Selecting the notifications for job completion*\n\n## Alerts\n\
    \nAs already discussed, there are many levels of logging set up in SQL Server.\
    \ There are error numbers and messages written to the event log. Errors are assigned\
    \ a severity, which determines how critical they are.\n\nMany times, an error\
    \ indicating that something might be going wrong can be buried in the log. Reading\
    \ through, say, the error log on every server every day can be time-consuming,\
    \ and that sort of thing is exactly what we are trying to avoid through the process\
    \ of automation.\n\nSetting up alerts that can notify an operator or kick off\
    \ a job is a very helpful way to proactively let someone know about an error,\
    \ or to take corrective action. When an alert is defined, SQL Server will monitor\
    \ the error logs, looking for a match to a condition you have defined. When a\
    \ match is found, SQL Server will perform the action you have set up in the alert.\n\
    \nAlerts can be defined on a specific error number, a severity level, a performance\
    \ condition, or a WMI event. To view existing alerts or generate a new one, open\
    \ SSMS, connect to an instance, open Object Explorer, expand SQL Server Agent,\
    \ and click on Alerts.\n\n### Errors and Severity Levels\n\nThe first type of\
    \ alert is for a specific error number, or a severity level, as shown in Figure\
    \ 10-8. The general information required for setting up an alert is a name, a\
    \ type, and a definition.\n\n***Figure 10-8.** Setting up a SQL Server event alert*\n\
    \nGive the alert an easily identifiable name. \"Corruption Alert\" isn’t nearly\
    \ as specific as \"Error 823.\"\n\nChoose the database the alert is for carefully.\
    \ For each event alert, you can choose to monitor one database, or all databases\
    \ on the instance. Be aware that some events, such as database restores, cannot\
    \ take place in the database they are executing an action in, and must be set\
    \ against another database.\n\nThere are thousands of error numbers in SQL Server,\
    \ and setting up an alert for each one is not necessary. However, some errors\
    \ are very critical and can warn you of impending disaster, such as disk corruption.\
    \ Errors 823, 824, and 825 are good examples. These three errors indicate that\
    \ SQL Server cannot read pages off your disk. These are errors for which you want\
    \ to set up an alert.\n\nThere are also several severity levels. Levels 017 through\
    \ 025 indicate hardware or software errors, and should be monitored. Levels 017\
    \ through 019 are for software errors, such as running out of resources, which\
    \ a user can’t fix. Levels 020 through 025 indicate fatal errors, and will terminate\
    \ client connections. It is very important a system administrator be notified\
    \ if a fatal error occurs.\n\nThe example in Figure 10-8 shows an alert for all\
    \ databases on the instance, for error 823.\n\n### Performance Conditions\n\n\
    The second type of alert is based on a performance condition. These are SQL Server–specific\
    \ counters from Performance Monitor. You choose an object, its counter, and an\
    \ instance (if applicable). Then, you need to define the specific counter—it must\
    \ fall below, rise above, or become equal to a specific value."
