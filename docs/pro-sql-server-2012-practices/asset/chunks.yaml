    Filter


    Similarly to SSMS, you can zoom in and out of execution plans in SDMP and you
    can view batched execution plans. SDMP also gives you quick search options and
    different views without having to reexecute the T-SQL statement. For example,
    you can search expensive operations by clicking on the CPU


    icon, which automatically finds the most expensive CPU operations in the batch
    and highlights them, as shown in Figure 12-5.


    ![Image 150](index-313_1.png)


    chapter 12 ■ WindoWs azure sQL database for dbas


    ***Figure 12-5.** Execution plan in SDMP sorted by the CPU cost*


    Performance Dashboard


    The SQL Database Management Portal also provides a handy performance dashboard
    showing current activity and detailed performance information in a secondary screen.
    When you first log in to the portal, you will see a summary of the database you
    logged in to. To view a summary of the performance dashboard, click on Query Performance
    on the top of the screen. You will see a screen similar to Figure 12-6\. This
    screen shows you a list of queries with performance metrics, including resource
    consumption per second. For example, the statement SELECT * FROM EnzoUsers consumed
    2 physical reads per second and had a duration of 11 millisecond (ms) per second
    on average. These metrics are obtained by using the sys.dm_exec_query_stats table
    and provide an average burn rate per second, which is displayed on the screen.
    Although this might sound a bit complicated, this screen is designed to list in
    decreasing order the statements that are the most active and consuming the most
    resources at any point in time.


    ![Image 151](index-314_1.png)


    ![Image 152](index-314_2.png)


    chapter 12 ■ WindoWs azure sQL database for dbas


