    ## 关于作者


    - **TJay** 是 PASS 的活跃成员。他参与了 PASS、SQL Saturday 活动和本地 SQL Server 用户组。TJay 为 SQL
    Server Central、Simple Talk 和 SQL-Server-Performance 发表过技术文章。他是犹他州 PASS SQL Server
    用户组的创始人和前负责人。TJay 曾志愿担任 PASS 分会主席、PASS 分会区域导师以及 PASS 分会委员会成员。他还是 PASS 审计与合规特别兴趣小组的创始人。TJay
    目前志愿担任 PASS 分会的区域导师。


    - **Glenn Berry** 在美国科罗拉多州帕克市的 Avalara 公司担任数据库架构师。他自 2007 年起成为 SQL Server MVP，并拥有众多
    Microsoft 认证，包括 `MCITP`、`MCDBA`、`MCSE`、`MCSD`、`MCAD` 和 `MCTS`，这证明他喜欢参加考试。他的专长包括
    `DMVs`、高可用性、硬件选择、全文搜索和 `SQL Azure`。他还是丹佛大学大学学院的兼职教员，自 2000 年起任教。他已完成丹佛大学大学学院的
    Master Teacher 项目。他深度参与 SQL Server 社区，经常在用户组、SQL Saturday 和 PASS Community Summit
    上发言。他是书籍《`SQL Server Hardware`》（Red Gate Books，2011）的作者，并为《`SQL Server MVP Deep
    Dives`》（Manning Publications，2009）和《`SQL Server MVP Deep Dives Volume 2`》（Manning
    Publications，2011）撰写了章节。Glenn 定期在 [`sqlserverperformance.wordpress.com`](http://sqlserverperformance.wordpress.com)
    上写博客。他在 Twitter 上非常活跃，账号是 `@GlennAlanBerry`。


    - **Jes Borland** 是 Brent Ozar PLF 的顾问，也是 Microsoft SQL Server MVP。她持有 AAS - 程序员/分析师学位，热爱
    `SQL Server Reporting Services` 和日常管理。她是 `PASS` 的活跃成员、用户组创始人、Tech on Tap 的 brewmaster
    以及 LessThanDot.com 的博主。她经常在用户组、SQL Saturday 和其他社区活动上演讲。她还是一名狂热的跑步者和新手厨师。


    - **Carlos Bossy**（`MCTS`、`MCP SQL Server 2008 BI`、`CBIP`）是一名顾问，拥有 25 年软件和数据库开发经验。作为公司的负责人，Carlos
    专注于商业智能解决方案的开发，包括数据仓库、预测分析、集成和报告。他使用 `SQL Server` 已有 12 年，对其强大功能充满热情。Carlos 为各行各业和州政府机构开发了数据仓库和
    BI 解决方案，并经常在 SQL Server 活动中发言。


    - **Louis Davidson** 在 IT 行业工作了很长时间，担任企业数据库开发人员和架构师。他成为 Microsoft MVP 已有 9 年，并为
    Apress 撰写了五本关于数据库设计的书籍，包括《`Pro SQL Server 2012 Relational Database Design and
    Implementation`》（2012）。在过去的十年里，Louis 积极在许多会议上就数据库设计和实现主题发言，包括 SQL PASS、SQL Rally、SQL
    Saturday 活动和 CA World，以及 Devlink 开发者大会。Louis 在基督教广播网络担任开发人员、`DBA` 和数据架构师超过 14
    年，支持弗吉尼亚州弗吉尼亚海滩和田纳西州纳什维尔的办公室。尽管他在 `drsql.org` 的网站暗示了其他情况，但 Louis 拥有田纳西大学查塔努加分校的计算机科学学士学位。


    - **Ben DeBow** 是一名顾问，与各种规模的客户合作处理其关键应用程序和 `SQL Server` 部署。他的多才多艺使他能够协助处理从虚拟化、整合到模式设计、性能调优和磁盘架构的所有工作。他调优并部署了世界上一些最大、最复杂的
    `SQL Server` 解决方案。作为 SQL Server 社区的活跃成员，Ben 还是 `MCDBA`、`MCSE` 和 `MCITP`。他还是 `SQLHA`
    的联合创始人，与 Allan Hirt 共同创立，可以通过 [`www.sqlha.com`](http://www.sqlha.com) 联系到他。


    - **Grant Fritchey** 在市场领先的软件工具供应商 Red Gate Software 工作，担任其产品布道师。他使用 `VB`、`C#`
    和 `Java` 等语言进行大规模应用程序开发，并且从 `6.0` 版本就开始使用 `SQL Server`。此外，他还在保险、金融和咨询行业工作过，也曾为三家失败的互联网公司工作过。他是《`SQL
    Server Execution Plans`》（Simple Talk Publishing，2008）和《`SQL Server 2012 Query
    Performance Tuning`》（Apress，2012）的作者。Grant 是《`Beginning SQL Server 2012 Administration`》（Apress，2012）的合著者，并在《`SQL
    Server MVP Deep Dives Volume 2`》（Manning Publications，2011）中撰写了一个章节。


    - **Jonathan Gardner** 是 Geocent, L.L.C. 的高级系统架构师、`PMP` 和 `MCITP`，工作地点位于美国路易斯安那州新奥尔良。他拥有超过
    10 年的广泛 IT 解决方案经验，包括数据库管理、虚拟化、`SAN` 管理和 `Windows Server` 环境。他在自己的网站 [`jonathanagardner.com`](http://jonathanagardner.com)
    上写作。


    - **Jesper Johansen** 担任 `SQL Server DBA` 已超过二十年。他是丹麦 SQL Server 领域的重要人物之一。Jesper
    五年前加入 Miracle，此后开发了高效的技术，通过整合客户的 `SQL Server` 安装来帮助他们节省时间、金钱和精力。除了整合，Jesper 偶尔也喜欢玩备份/恢复游戏，帮助客户意识到他们认为丢失的东西仍然可以从
    `SQL Server` 的深处挖掘出来。好像以上这些还不够让 Jesper 忙碌，他也时不时会接手 `DB2` 任务。他是丹麦 SQL Server 用户组的董事会成员。


    - **Jeremy Lowell** 是 Data Realized 的创始人，十多年来一直帮助 `DBAs` 和客户处理 `SQL Server`。Jeremy
    在业务生命周期的任何阶段，为小型和大型企业解决复杂问题方面有着良好的记录。从初创公司到财富 100 强企业，Jeremy 在实施最佳实践和帮助业务领导实现其数据价值方面一直是一位领导者。


    - **Wendy Pastrick**（`@wendy_dance`）自 2000 年起在美国伊利诺伊州芝加哥担任自学成才的数据库管理员，使用各种 `SQL`
    方法跨环境复制数据。您可以在 SQL PASS（SQL Server 专业协会）活动中找到她，例如 SQL Saturday 或年度峰会，她要么在做志愿者，要么在演讲，或者可能在活动后的聚会上唱歌。拥有心理学学位和之前的技术培训经验，她已在全国各地的活动上发表演讲，谈论
    `SQL Server`、个人网络以及对女性技术工作者的支持。


    - **Kellyn Pot’vin** 拥有超过 15 年的信息技术经验和超过 12 年的 `Oracle` 和 `SQL Server` 经验。她专注于数据库性能调优和简化数据库管理的荣耀。近年来，她一直从事大型
    `SSD` 数据库和 `Exadata` 的工作，利用最新的技术和性能调优功能。Kellyn 以……

