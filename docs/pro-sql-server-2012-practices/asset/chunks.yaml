- fmt: "# 使用域表约束值\n\n现在，`Address.CountryName` 列中允许包含的值必须也存在于 `Country` 表中。在不改变现有模式的情况下，您已经将这些值约束在一个已知且不可违反的值集合中。使用域表有以下几个好处：\n\
    \n- **域对用户是已知的**：因为值存储在表中，用户可以查看它们来了解可能的值，而无需预先了解系统或查看元数据。\n- **便于关联附加信息**：此域可能包含对数据使用者有用的信息。例如，在前面提到的国家示例中，您可以将缩写与国家、人口、地理信息等关联起来。\n\
    \n我几乎总是为所有本质上都是项目列表的域创建表，因为这样管理起来要容易得多，即使这需要更多的表。（当您希望允许用户自行更改时，这一点尤其正确。）这种情况下键的选择与大多数表有点不同。有时我使用人工键作为实际的主键，有时则使用自然键。键选择上的主要区别在于，使用整数或\
    \ GUID 键值是否对客户端的实现有价值，这通常取决于他们的实现工具是否关心表的主键结构。对于专门为实现域而构建的表，使用自然键或人工键作为主键都是可以的。\n\
    \n当然，任何约束的主要好处是用户在使用数据时体验到的性能提升。之所以有这种提升，是因为您无需在每次使用时清理数据。\n\n当数据包含“USA”、“U.S.A”和“United\
    \ States”时，这对于您的代码来说看起来是三个值，尽管您知道它实际上只是一个。虽然已知的变体可以轻松修复，但像“Urnited States”这样的拼写错误就不那么容易了。\n\
    \n# 索引设计\n\n索引可能是设计过度和设计不足最常见的领域。索引的困难之处在于，在实施过程中的多个环节都需要应用索引。\n\n在设计阶段，您以唯一性约束的形式指定索引。有时索引仅用于保护唯一性，但通常要求唯一的列也是人们用来进行常见搜索的列。您还会在一些通常有用的情况下添加索引，比如大多数外键。在实施阶段，您会在明显需要提高性能的地方应用索引，通常是因为这些地方即使在开发期间处理的小数据集上也很明显。最后，在数据库生命周期的测试和生产阶段，您需要添加索引以调整性能不足的查询。\n\
    \n索引是一个相当复杂的话题，但它是每个 DBA 和数据库开发人员都应该深入理解的话题。因为本书后面有一章专门讲索引，所以我只指出在设计阶段应该考虑的一些问题。通常，甚至在开发之前，您就应该指定以下类型的索引：\n\
    \n- **唯一性**：索引应尽可能声明为唯一，因为优化器在确定如何优化查询时可以使用该信息。\n    通常，您尝试用约束来强制唯一性，并用索引来加速查询。索引通常不应改变系统的含义。（一个例外是，有时您可以使用筛选索引在行子集（例如非空值）上实现唯一性。）\n\
    - **外键**：外键列是一种特殊情况，您通常需要某种类型的索引。这是因为您构建外键是为了将一个表中的行与另一个表中的行匹配起来。为此，您必须获取一个表中的值并与另一个表中的值匹配。仔细考虑索引行中将有多少唯一值。与域表一起使用的外键有时不值得索引，因为与基表相比，域中的值数量很少。但即便如此，当您删除域值时，它也可能是有用的。\n\
    \n索引的最大关键在于管理您所应用索引的有用性。如果索引在查询中从未使用，则可以将其删除（除非它们正在实现唯一性约束）。您可以使用 `sys.dm_db_index_usage_stats`\
    \ 动态管理函数来查看 SQL Server 使用索引的频率。\n\n# 设计测试\n\n测试是一个很大的话题，我甚至无法尝试全面阐述。然而，我确实想提到在编程开始之前的各个阶段进行的测试。本章的第一节题为“需求”，对于任何计算机项目以有序方式成功来说，把需求做好是至关重要的。\n\
    \n在整个设计阶段，您可能会认为无法开始进行任何测试，因为还没有创建软件。然而，过程中的每一步都可以测试。设计团队根据需求创建一个设计，该设计将作为实施的蓝图。在许多方法中（有时仅仅因为设计需要太长时间才能实际创建），需求与设计或多或少是同时创建的。（是的，很多时候需求甚至做得不够，或者混入了实施细节。我只能建议您什么是构建良好软件的最简单路径。我也不会对您撒谎，假装我总是把事情做得完美无缺。）无论如何，测试的目标始终是确保您达到的目标是您计划达到的目标。\n\
    \n设计好表之后，就该测试您的设计了。通过演练使用场景，您很可能会发现初始设计中的许多漏洞。例如，大多数时候，当一个设计没有经过深思熟虑时，漏洞通常源于希望保持设计合理的愿望。因此，需求收集团队只考虑最典型的情况，而忽略了异常情况。例如，假设您的公司为新\
    \ DBA 设定了最高薪资，即使那个人经验丰富。那么世界上最好的 DBA（本书的另一位作者可以作为例子！）可能想要这份工作，但需要比最高限额多 10%。系统拒绝了增加薪资金额的请求，因此公司不得不雇佣这位\
    \ DBA 作为第二位首席信息官（CIO）。编写软件只处理我刚才描述的合理情况，并不是我所说的那种“合理”。在设计测试过程中，寻找您设计中（以及需求中）明显的漏洞，并确保最终产品能够实现用户实际期望的功能（并且自然地，确保他们同意）。\n\
    \n在光谱的另一端，您会遇到这样的情况：在规范化阶段，设计者疯狂地将表分解成越来越多的独立表。在某些情况下，这绝对是必要的，但设计的目标是将实际用户的需求与创建的软件相匹配。在前面的例子中，数据库的系统视图过于简单化。然而，相反的情况，即系统对所解决问题持过于复杂的观点，同样是困难的。"
  raw: 'Now the only values that can be contained in the Address.CountryName column
    must also exist in the Country table. Without changing the existing schema, you
    have constrained the values to a set of known values that cannot be violated.
    Using a domain table has several benefits:


    •


    **The domain is known to users** Because the values are in a table, users can
    use them to see what the possible values are without having foreknowledge of the


    system or looking in the metadata.


    •


    **Associating additional information with the value is easy** This domain might
    have information that is useful for users of the data. For example, in the country
    example mentioned earlier, you might associate an abbreviation with the country,


    population, geographic information, and so forth.


    I nearly always include tables for all domains that are essentially lists of items
    because it’s far easier to manage, even if it requires more tables. (This is particularly
    true when you want to allow users to make changes on their own.) The choice of
    key in this case is a bit different than for most tables. Sometimes I use an artificial
    key for the actual primary key, and other times I use a natural key. The general
    difference in key choice is whether or not using the integer or GUID key value
    has value for the client’s implementation, usually based on whether their implementation
    tools care about tables’ primary key structures. Either a natural or an artificial
    key for primary key will suffice for tables that are specifically built to implement
    a domain.


    Of course, the key benefit of constraints of any sort is the improved performance
    users experience when using the data. This improvement occurs because you don’t
    need to clean the data on every usage.


    When the data contains “USA,” “U.S.A,” and “United States,” this looks to your
    code like three values, even though you know it’s actually just one. And while
    known variants can be easily repaired, but a misspelling like “Urnited States,”
    not so much.


    Indexing


    Probably the most common area of overdesign and underdesign is indexes. The difficult
    part of indexing is that there are multiple places along the journey of implementation
    where you have to apply indexes.


    During the design phase, you specify indexes in the form of uniqueness constraints.
    Sometimes the indexes are useful only to protect uniqueness, but often columns
    that are required to be unique are also the same ones people use to do common
    searches. You also add indexes in some typically useful situations, like most
    foreign keys. During implementation, you apply indexes to places where it is obvious
    that there will be the need for performance improvements, often because these
    places are obvious even on small sets you are working with in development. Finally,
    during the testing and production phases of the database’s lifecyle, you need
    to add indexes to tune queries that don’t perform well enough.


    Indexing is a pretty complex topic, but it is one that every DBA and database
    developer should understand deeply. Because there is an indexing chapter later
    in the book, I will simply point out a few concerns you should consider during
    the design phase. Typically, even before development, you specify the following
    types of indexes:


    •


    **Uniqueness** Indexes should be declared as unique whenever possible because
    the optimizer can use that information when determining how to optimize a query.


    Commonly, you try to enforce uniqueness with constraints and speed up queries


    with indexes. Indexes should typically not change the meaning of the system. (An


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance exception
    is that sometimes you can use filtered indexes to implement uniqueness


    on a subset of rows, such as non-null values.)


    •


    **Foreign Keys** Foreign key columns are a special case where you often need an
    index of some type. This is because you build foreign keys so that you can match
    up rows in one table to rows in another. For this, you have to take a value in
    one table and match it to another. Be careful to consider how many unique values
    will be in


    the rows of the index. Foreign keys used with domain tables are sometime not useful
    to index because of the low number of values in the domain compared to the base


    table. But even then, when you are deleting a domain value, it can be useful.


    The biggest key to indexing is to manage how useful the indexes are that you apply.
    If indexes are never used in a query, they can be removed (unless they are implementing
    a uniqueness constraint). You can use the sys.dm_db_index_usage_stats dynamic
    management function to see how often SQL Server is using the index.


    Design Testing


    Testing is a large topic, and one that I will not even attempt to do complete
    justice to. However, I do want to mention testing during the phases that happen
    even before the programming begins. The first section of this chapter was titled
    “Requirements,” and it is essential that the requirements be very well done for
    the rest of any computer project to succeed in any organized fashion.


    Throughout the design phase, you might think that you can’t start doing any testing
    because there is no software created. However, every step in the process can be
    tested. From the requirements, the design team creates a design that will serve
    as the blueprint for the implementation. In many methodologies (and sometimes
    just because the design takes too long to actually create), the requirements are
    somewhat simultaneously created along with the design. (And yes, too often the
    requirement are barely even done, or are mixed in with implementation details.
    All I can do is advise you on what is the easiest path to well-built software.
    I won’t lie to you and pretend I always do things perfectly either.) In any case,
    the goal of testing will always be to make sure the target you hit is the target
    you planned to hit.


    After you have designed your tables, it is time to test your design. By working
    through scenarios of utilization, you will probably discover many holes in your
    initial designs. For example, most of the time, when a design is not that well
    thought out, the holes usually stem from a desire to keep designs reasonable.
    So the requirements-gathering team consider only the most typical cases but ignore
    the abnormal cases. For example, suppose your company has a maximum salary it
    will pay a new DBA, even if that person has lots of experience. Then the best
    DBA in the world (one of the other writers of this book would do as an example!)
    might want the job but needs 10 percent more than the maximum allowed. The system
    denies the request for an increased salary amount, so the company has to hire
    this DBA as a second Chief Information Officer (CIO). Writing software to handle
    only the reasonable case, as I just described, is not the kind of “reasonable”
    I am talking about. During the design testing process, look for obvious holes
    in your design (and in the requirements as well) and make sure that the final
    product does what the users realistically would desire (and make sure that they
    agree, naturally).


    On the other end of the spectrum, you have the case where during the normalization
    phase, the designer went hog wild breaking tables down into more and more separate
    tables. In some cases, this is absolutely necessary, but the goal of design is
    to match the actual user’s needs to the software created. In the previous example,
    the database had too simplistic of a system view. However, the opposite case,
    where the system takes an overly complex view of the problem solved, is equally
    difficult.'
  trans: "# 使用域表约束值\n\n现在，`Address.CountryName` 列中允许包含的值也必须存在于 `Country` 表中。在不改变现有模式的情况下，您已经将这些值约束在一个已知且不可违反的值集合中。使用域表有以下几个好处：\n\
    \n- **域对用户是已知的**：因为值存储在表中，用户可以查看它们来了解可能的值，而无需预先了解系统或查看元数据。\n- **便于关联附加信息**：此域可能包含对数据使用者有用的信息。例如，在前面提到的国家示例中，您可以将缩写与国家、人口、地理信息等关联起来。\n\
    \n我几乎总是为所有本质上都是项目列表的域创建表，因为这样管理起来要容易得多，即使这需要更多的表。（当您希望允许用户自行更改时，这一点尤其正确。）这种情况下键的选择与大多数表有点不同。有时我使用人工键作为实际的主键，有时则使用自然键。键选择上的主要区别在于，使用整数或\
    \ GUID 键值是否对客户端的实现有价值，这通常取决于他们的实现工具是否关心表的主键结构。对于专门为实现域而构建的表，使用自然键或人工键作为主键都是可以的。\n\
    \n当然，任何约束的主要好处是用户在使用数据时体验到的性能提升。之所以有这种提升，是因为您无需在每次使用时清理数据。\n\n当数据包含“USA”、“U.S.A”和“United\
    \ States”时，这对于您的代码来说看起来是三个值，尽管您知道它实际上只是一个。虽然已知的变体可以轻松修复，但像“Urnited States”这样的拼写错误就不那么容易了。\n\
    \n# 索引设计\n\n索引可能是设计过度和设计不足最常见的领域。索引的困难之处在于，在实施过程中的多个环节都需要应用索引。\n\n在设计阶段，您以唯一性约束的形式指定索引。有时索引仅用于保护唯一性，但通常要求唯一的列也是人们用来进行常见搜索的列。您还会在一些通常有用的情况下添加索引，比如大多数外键。在实施阶段，您会在明显需要提高性能的地方应用索引，通常是因为这些地方即使在开发期间处理的小数据集上也很明显。最后，在数据库生命周期的测试和生产阶段，您需要添加索引以调整性能不足的查询。\n\
    \n索引是一个相当复杂的话题，但它是每个 DBA 和数据库开发人员都应该深入理解的话题。因为本书后面有一章专门讲索引，所以我只指出在设计阶段应该考虑的一些问题。通常，甚至在开发之前，您就应该指定以下类型的索引：\n\
    \n- **唯一性**：索引应尽可能声明为唯一，因为优化器在确定如何优化查询时可以使用该信息。\n    通常，您尝试用约束来强制唯一性，并用索引来加速查询。索引通常不应改变系统的含义。（一个例外是，有时您可以使用筛选索引在行子集（例如非空值）上实现唯一性。）\n\
    - **外键**：外键列是一种特殊情况，您通常需要某种类型的索引。这是因为您构建外键是为了将一个表中的行与另一个表中的行匹配起来。为此，您必须获取一个表中的值并与另一个表中的值匹配。仔细考虑索引行中将有多少唯一值。与域表一起使用的外键有时不值得索引，因为与基表相比，域中的值数量很少。但即便如此，当您删除域值时，它也可能是有用的。\n\
    \n索引的最大关键在于管理您所应用索引的有用性。如果索引在查询中从未使用，则可以将其删除（除非它们正在实现唯一性约束）。您可以使用 `sys.dm_db_index_usage_stats`\
    \ 动态管理函数来查看 SQL Server 使用索引的频率。\n\n# 设计测试\n\n测试是一个很大的话题，我甚至无法尝试全面阐述。然而，我确实想提到在编程开始之前的各个阶段进行的测试。本章的第一节题为“需求”，对于任何计算机项目以有序方式成功来说，把需求做好是至关重要的。\n\
    \n在整个设计阶段，您可能会认为无法开始进行任何测试，因为还没有创建软件。然而，过程中的每一步都可以测试。设计团队根据需求创建一个设计，该设计将作为实施的蓝图。在许多方法中（有时仅仅因为设计需要太长时间才能实际创建），需求与设计或多或少是同时创建的。（是的，很多时候需求甚至做得不够，或者混入了实施细节。我只能建议您什么是构建良好软件的最简单路径。我也不会对您撒谎，假装我总是把事情做得完美无缺。）无论如何，测试的目标始终是确保您达到的目标是您计划达到的目标。\n\
    \n设计好表之后，就该测试您的设计了。通过演练使用场景，您很可能会发现初始设计中的许多漏洞。例如，大多数时候，当一个设计没有经过深思熟虑时，漏洞通常源于希望保持设计合理的愿望。因此，需求收集团队只考虑最典型的情况，而忽略了异常情况。例如，假设您的公司为新\
    \ DBA 设定了最高薪资，即使那个人经验丰富。那么世界上最好的 DBA（本书的另一位作者可以作为例子！）可能想要这份工作，但需要比最高限额多 10%。系统拒绝了增加薪资金额的请求，因此公司不得不雇佣这位\
    \ DBA 作为第二位首席信息官（CIO）。编写软件只处理我刚才描述的合理情况，并不是我所说的那种“合理”。在设计测试过程中，寻找您设计中（以及需求中）明显的漏洞，并确保最终产品能够实现用户实际期望的功能（并且自然地，确保他们同意）。\n\
    \n在光谱的另一端，您会遇到这样的情况：在规范化阶段，设计者疯狂地将表分解成越来越多的独立表。在某些情况下，这绝对是必要的，但设计的目标是将实际用户的需求与创建的软件相匹配。在前面的例子中，数据库的系统视图过于简单化。然而，相反的情况，即系统对所解决问题持过于复杂的观点，同样是困难的。"
- fmt: '# 章节 2：确保正确——为性能设计数据库


    假设你正在设计一个数据库来存储营地活动信息并管理活动报名。你可能会很想为射箭课、波尔卡舞、探戈舞、浮潜、编篮子、烤棉花糖、有氧运动、划独木舟、游泳课、钓鱼等等分别创建一个独立的表，因为这些活动彼此之间确实大不相同。于是你开始精心建模，详细描述需求中提到的每一项营地活动。如果营地有
    50 项活动，你可能会设计 50 个表，外加一堆其他表来把这 50 个表关联起来。所有这些表都庞大到足以记录整个营地并追踪所有辅导员和营员的动向……如果用户有时间和意愿输入所有这些数据的话。


    更可能的情况是，客户真正想要的是自动化营地的行政流程，例如分配教练、登记参加者以及为每个课程关联描述信息。


    与其让系统精细地为每个活动建模，你真正需要建模的是一个营地活动的抽象概念，然后可以将人员分配给它。营地活动的描述表可能是一份 Microsoft Word
    文档，在每个新季节打印出来（也可能作为 Word 文档存储在数据库中，以确保文档不会丢失）。


    通过花时间测试你的设计，并确保它符合用户/应用的实际需求和需要，你可以在设计阶段用铅笔的橡皮擦就能做出修改。这就是测试的价值：在错误累积成更大问题之前发现它们。当你进入实施阶段时，利用需求和设计来确保实施正确。如果你已经在脑海中编写并测试了系统，那就是创建优秀软件的坚实第一步。将数据的需求与用户的需求相匹配，将确保用户所需的功能得到覆盖，而不会带来从未被使用的软件的性能开销。


    ## 结论


    性能常常被误解为一个纯粹的技术话题。如果你精通 SQL 并且了解 SQL Server 内部机制的所有知识，你可能会相当自信地认为自己擅长优化性能。这可能是真的，而且即使不了解什么是正确的实现方式，有时也能从最糟糕的数据库中挤出不错的性能。但是，除非你是一位靠修复糟糕软件赚钱的顾问，否则实际的性能考量在第一行代码编写之前，甚至在任何技术人员参与流程之前就开始了。


    实现卓越性能的第一个、也是最重要的步骤，实际上是理解你要解决的问题。无论你使用瀑布方法还是近乎宗教般虔诚地使用敏捷方法，都无关紧要。如果你的方向不正确，执行任务的速度再快也没有意义。


    计划一次迪士尼世界之旅或阿拉斯加邮轮之旅的过程可能很相似，但结果会天差地别。不知道最终目的地是哪里，几乎不可能带着合适的衣服成功抵达目的地。如果你在二月穿着百慕大短裤、汽车装着夏季轮胎到达了阿拉斯加，那么从
    A 点到 B 点的旅行表现将会受到影响。


    一旦你收集了需求，并且知道要构建什么，流程就会转向如何实现解决方案。表结构形成，使用的是 20 世纪 70 年代形成且至今仍然有效的模式。表被规范化，使其具有原子性，每个表有单一的含义，表中的每一列有单一的值。规范化的表信息冗余度低，这不仅带来了高水平的数据完整性，而且形成了非常适合
    SQL Server 所基于的关系引擎工作的结构。规范化一个非常重要的部分是将用户的需求与关系引擎的需求相匹配，而不是作为某种形式上的学术较量，以表明你比用户更了解数据。一个过度设计的数据库，用五十个表来满足只需五个表就能满足的需求，常常会导致性能低下。


    在讨论了以实用方式进行表规范化之后，我讨论了几种构建表的选择。选择数据类型以紧密匹配要存储数据的形状和物理特性，使其符合引擎的存储方法。选择约束以确保创建的数据符合管理数据的规则（需求！）。根据需要应用索引以使数据访问达到最优。特别是，规范化过程通常使这三个选择变得更加容易。标量值（如第一范式所定义）使选择数据类型变得简单直接，因为只需要存储一个值。索引的选择也直接明了，因为大多数常见的数据访问都可以使用完整的数据值来完成。


    最后一个主题是我称之为设计测试的过程。这个过程基本上是在实际实施之前以及在整个过程中进行的测试。在用户接触到软件之前，并不总是能发现每一个问题，但是投入时间，在每一步都将其预期的和典型的使用模式与设计进行映射测试——从你应用了规范化的数据结构，到你计划在数据库中转化为物理表的最终表结构——可以帮助你在问题变得难以改变之前发现它们。


    本章的标题是关于性能的，但理想情况下，最终性能并非偶然获得的东西，就像你不可能不提前计划就抵达一个完美放松的度假地一样。相反，数据库性能归结为三件事：扎实的需求、良好的设计和防御性编码。把设计做对了，性能自然会跟上来。你将处理的真实案例会比本章展示的案例更复杂，围绕需求和最终设计及实施的政治因素常常会吞噬掉你灵魂的一小部分，你会希望自己能将其找回。然而，第一次就把设计做对确实很重要，因为数据库会持续使用很长时间。


    # 章节 3：隐藏的性能陷阱


    作者：Gail Shaw


    性能调优通常被认为是 Microsoft SQL Server 的那些神秘技艺之一，充满了鲜为人知的秘密和奥秘。然而，大部分性能调优在于了解 SQL Server
    的工作原理并与之合作，而不是对抗它。


    为此，我想探讨一些不那么明显的性能下降原因：谓词、残留物和溢出。在本章中，我将向你展示如何识别它们以及如何解决它们。


    ## 谓词


    *谓词*（在数据库意义上的）正式定义是“表示属性或关系的术语”，用英语来说，就是一个返回真或假（或者在数据库世界中，未知）的比较。'
  raw: 'Suppose you were designing a database to store information about camp activities
    and manage signups for the activities. It might be tempting to have an individual
    table for archery classes, polka dances, tango dances, snorkeling, basket weaving,
    s’mores baking, aerobics, canoeing, swimming lessons, 40


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance fishing and
    so on, because each of these activities is really nothing like the other. So you
    go off and model with great details of each camp activity that were described
    in some detail in the requirements. If there were 50 activities at the camp, you
    would design 50 tables, plus a bunch of other tables to tie these 50


    together. All of these tables are massive enough to document the entire camp and
    track the movements of all the counselors and campers…if the users had the time
    and inclination to enter all of that data.


    It’s probably more likely that the client really wanted to automate the administrative
    processes of the camp, such as assigning an instructor, signing up attendees,
    and associating a description with each class.


    Rather than having the system meticulously model each activity, what you truly
    needed was to model was the abstraction of a camp activity that can then have
    people assigned to it. Camp activity description sheets are probably a Microsoft
    Word document that gets printed out for each new season (and could possibly be
    stored as a Word document in the database to make sure the documents don’t get
    lost).


    By taking the time to test your design and make sure that it matches the actual
    requirements and needs of the user/application, you can make changes to the design
    when all that is required is the eraser end of the pencil. That is always the
    value of testing: to catch errors before they compound themselves into bigger
    issues. As you move to implementation, use the requirements and design to get
    the implementation correct. If you have already coded and tested the system in
    your mind, that is a solid first step toward creating a great piece of software.
    Matching the needs of the data with the needs of the user will make sure that
    what the user needs is covered without the performance overhead of software running
    that is never even used.


    Conclusion


    Performance is often mistaken as a purely technical topic. If you are great at
    SQL and know everything there is about the internals of SQL Server, you probably
    feel pretty confident that you are good at optimizing performance. It might be
    true, and without any knowledge of what is the right way to implement, sometimes
    one can squeeze out good performance from even the worst databases. But unless
    you are a consultant who makes money off of fixing poorly created software, actual
    performance considerations start way before the first line of code is written
    and even before anyone technical is involved with the process.


    The first, most important step to great performance is actually understanding
    the problem you are trying to solve. It doesn’t matter if you use the waterfall
    method or an Agile methodology with nearly religious reverence. It doesn’t matter
    how fast you perform a task if you aren’t headed in the right direction.


    The process for planning for a trip to DisneyWorld or an Alaskan cruise will be
    quite similar, but the outcome will be worlds apart. Without knowing where the
    final destination is, successfully arriving at your destination with the right
    clothes in your luggage is nearly impossible. If you end up in Alaska in February
    wearing Bermuda shorts and with summer tires on your car, your performance traveling
    from point A to point B is going to suffer.


    Once you have gathered the requirements, and you know what you want to build,
    the process takes a turn towards how you will implement the solution. The table
    structure is formed, using patterns that were formed in the 1970s and are still
    valid today. Tables are normalized, making tables that are atomic, with each table
    having a single meaning, and each column in the table having a single value. A
    normalized table has little redundancy in information, leading not only to a high
    level of data integrity, but structures that are well suited to work with the
    relational engine that SQL Server is based upon. A very important part of normalization
    is to match the needs of the users to the needs of the relational engine, not
    as some form of academic one-upmanship to show that you understand the data better
    than your user. A database that is over engineered, with fifty tables where five
    meet the requirements frequently leads to poor performance.


    After I discussed getting tables normalized in a practical manner, I discussed
    several choices for building your tables. Datatypes are chosen to closely match
    the shape and physical characteristics of the data to be stored to the engine’s
    method of storage. Constraints are chosen to make sure that the data that 41


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance is created
    matches the set of rules (requirements!) that govern the data. Indexes are applied
    as needed to make access to the data optimal. In particular, these three choices
    are most often made easier by the normalization process. Scalar values (as defined
    by the First Normal Form) make choosing a datatype straightforward because only
    one value needs to be stored. Indexes are straightforward because most common
    access to data can be done using entire data values.


    The final topic was a process I referred to as design testing. This process is
    basically testing before actual implementation occurs, and throughout the process.
    It is not always possible to catch every issue before the user gets to the software,
    but spending time, mapping the expected and typical usage patterns to the design
    at every step, from your data structures that you have applied normalization to,
    as well as the final table structures that you plan to turn into physical tables
    in a database can help you see the issues before they are too late to be changed.


    This chapter is titled as being about performance, but ideally, in the end, performance
    is not a thing that you achieve by accident, no more than you arrive at your perfectly
    restful vacation without planning ahead. Rather, database performance boils down
    to three things: solid requirements, good design, and defensive coding. Get the
    design right, and the performance will follow. The real cases you will deal with
    will be less simplistic than the ones shown in this chapter, and the politics
    that surround the requirements and eventual design and implementation often will
    eat up tiny parts of your soul that you will wish you could get back. Getting
    the design right the first time does matter, however, because databases last for
    a very long time.


    **chapter 3**


    ■ ■ ■


    **Hidden Performance Gotchas**


    **By Gail Shaw**


    Performance tuning is often considered to be one of those dark arts of Microsoft
    SQL Server, full of secrets and mysteries that few comprehend. Most of performance
    tuning, however, is about knowing how SQL


    Server works and working with it, not against it.


    To that end, I want to look at some not-so-obvious causes of performance degradation:
    predicates, residuals, and spills. In this chapter, I’ll show you how to identify
    them and how to resolve them.


    Predicates


    The formal definition of a *predicate* (in the database sense) is “a term designating
    a property or relation,”


    or in English, a comparison that returns true or false (or, in the database world,
    unknown).'
  trans: '# 章节 2：确保正确——为性能设计数据库


    假设你正在设计一个数据库来存储营地活动信息并管理活动报名。你可能会很想为射箭课、波尔卡舞、探戈舞、浮潜、编篮子、烤棉花糖、有氧运动、划独木舟、游泳课、钓鱼等等分别创建一个独立的表，因为这些活动彼此之间确实大不相同。于是你开始精心建模，详细描述需求中提到的每一项营地活动。如果营地有
    50 项活动，你可能会设计 50 个表，外加一堆其他表来把这 50 个表关联起来。所有这些表都庞大到足以记录整个营地并追踪所有辅导员和营员的动向……如果用户有时间和意愿输入所有这些数据的话。


    更可能的情况是，客户真正想要的是自动化营地的行政流程，例如分配教练、登记参加者以及为每个课程关联描述信息。


    与其让系统精细地为每个活动建模，你真正需要建模的是一个营地活动的抽象概念，然后可以将人员分配给它。营地活动的描述表可能是一份 Microsoft Word
    文档，在每个新季节打印出来（也可能作为 Word 文档存储在数据库中，以确保文档不会丢失）。


    通过花时间测试你的设计，并确保它符合用户/应用的实际需求和需要，你可以在设计阶段用铅笔的橡皮擦就能做出修改。这就是测试的价值：在错误累积成更大问题之前发现它们。当你进入实施阶段时，利用需求和设计来确保实施正确。如果你已经在脑海中编写并测试了系统，那就是创建优秀软件的坚实第一步。将数据的需求与用户的需求相匹配，将确保用户所需的功能得到覆盖，而不会带来从未被使用的软件的性能开销。


    ## 结论


    性能常常被误解为一个纯粹的技术话题。如果你精通 SQL 并且了解 SQL Server 内部机制的所有知识，你可能会相当自信地认为自己擅长优化性能。这可能是真的，而且即使不了解什么是正确的实现方式，有时也能从最糟糕的数据库中挤出不错的性能。但是，除非你是一位靠修复糟糕软件赚钱的顾问，否则实际的性能考量在第一行代码编写之前，甚至在任何技术人员参与流程之前就开始了。


    实现卓越性能的第一个、也是最重要的步骤，实际上是理解你要解决的问题。无论你使用瀑布方法还是近乎宗教般虔诚地使用敏捷方法，都无关紧要。如果你的方向不正确，执行任务的速度再快也没有意义。


    计划一次迪士尼世界之旅或阿拉斯加邮轮之旅的过程可能很相似，但结果会天差地别。不知道最终目的地是哪里，几乎不可能带着合适的衣服成功抵达目的地。如果你在二月穿着百慕大短裤、汽车装着夏季轮胎到达了阿拉斯加，那么从
    A 点到 B 点的旅行表现将会受到影响。


    一旦你收集了需求，并且知道要构建什么，流程就会转向如何实现解决方案。表结构形成，使用的是 20 世纪 70 年代形成且至今仍然有效的模式。表被规范化，使其具有原子性，每个表有单一的含义，表中的每一列有单一的值。规范化的表信息冗余度低，这不仅带来了高水平的数据完整性，而且形成了非常适合
    SQL Server 所基于的关系引擎工作的结构。规范化一个非常重要的部分是将用户的需求与关系引擎的需求相匹配，而不是作为某种形式上的学术较量，以表明你比用户更了解数据。一个过度设计的数据库，用五十个表来满足只需五个表就能满足的需求，常常会导致性能低下。


    在讨论了以实用方式进行表规范化之后，我讨论了几种构建表的选择。选择数据类型以紧密匹配要存储数据的形状和物理特性，使其符合引擎的存储方法。选择约束以确保创建的数据符合管理数据的规则（需求！）。根据需要应用索引以使数据访问达到最优。特别是，规范化过程通常使这三个选择变得更加容易。标量值（如第一范式所定义）使选择数据类型变得简单直接，因为只需要存储一个值。索引的选择也直接明了，因为大多数常见的数据访问都可以使用完整的数据值来完成。


    最后一个主题是我称之为设计测试的过程。这个过程基本上是在实际实施之前以及在整个过程中进行的测试。在用户接触到软件之前，并不总是能发现每一个问题，但是投入时间，在每一步都将其预期的和典型的使用模式与设计进行映射测试——从你应用了规范化的数据结构，到你计划在数据库中转化为物理表的最终表结构——可以帮助你在问题变得难以改变之前发现它们。


    本章的标题是关于性能的，但理想情况下，最终性能并非偶然获得的东西，就像你不可能不提前计划就抵达一个完美放松的度假地一样。相反，数据库性能归结为三件事：扎实的需求、良好的设计和防御性编码。把设计做对了，性能自然会跟上来。你将处理的真实案例会比本章展示的案例更复杂，围绕需求和最终设计及实施的政治因素常常会吞噬掉你灵魂的一小部分，你会希望自己能将其找回。然而，第一次就把设计做对确实很重要，因为数据库会持续使用很长时间。


    # 章节 3：隐藏的性能陷阱


    作者：Gail Shaw


    性能调优通常被认为是 Microsoft SQL Server 的那些神秘技艺之一，充满了鲜为人知的秘密和奥秘。然而，大部分性能调优在于了解 SQL Server
    的工作原理并与之合作，而不是对抗它。


    为此，我想探讨一些不那么明显的性能下降原因：谓词、残留物和溢出。在本章中，我将向你展示如何识别它们以及如何解决它们。


    ## 谓词


    *谓词*（在数据库意义上的）正式定义是“表示属性或关系的术语”，用英语来说，就是一个返回真或假（或者在数据库世界中，未知）的比较。'
- fmt: "# Chapter 3 ■ Hidden Performance Gotchas\n\nWhile that’s the formal term,\
    \ and it is valid, it’s not quite what I want to discuss. Rather, I want to discuss\
    \ where, during the query execution process, SQL evaluates the predicates (the\
    \ where clause mostly) and how that can influence a query’s performance.\n\n##\
    \ A Specific Query Example\n\nLet’s start by looking at a specific query:\n\n\
    ```sql\nSELECT FirstName,\n       Surname,\n       OrderNumber,\n       OrderDate\n\
    FROM dbo.Orders AS o\nINNER JOIN dbo.Customers AS c ON o.CustomerID = c.CustomerID\n\
    WHERE OrderStatus = 'O'\n  AND OrderDate < '2010/02/01'\n```\n\nThat’s very simple:\
    \ two tables, two predicates in the where clause, and one in the from (the join\
    \ predicate). Figures 3-1 and 3-2 show two execution plans from that query’s execution.\n\
    \n![Image 9](index-55_1.png)\n\n![Image 10](index-55_2.png)\n\n**Figure 3-1.**\
    \ Execution plan 1.\n\n**Figure 3-2.** Execution plan 2.\n\nAt first glance, those\
    \ two execution plans look pretty much the same, except for some slight differences\
    \ in the relative cost percentages. They also look rather optimal (with two index\
    \ seeks and a loop join). But what if I tell you that the execution statistics\
    \ for the two executions were quite different?\n\n## Comparing Execution Statistics\n\
    \nExecution plan 1:\nTable ‘Worktable’. Scan count 0, logical reads 0.\nTable\
    \ ‘Orders’. Scan count 1, logical reads 5.\nTable ‘Customers’. Scan count 1, logical\
    \ reads 4.\nSQL Server Execution Times:\nCPU time = 0 ms, elapsed time = 1 ms.\n\
    \nExecution plan 2:\nTable ‘Worktable’. Scan count 0, logical reads 0.\nTable\
    \ ‘Orders’. Scan count 1, logical reads 301.\nTable ‘Customers’. Scan count 1,\
    \ logical reads 4.\nSQL Server Execution Times:\nCPU time = 0 ms, elapsed time\
    \ = 4 ms.\n\nYou can see that there are 5 reads against the `Orders` table in\
    \ execution plan 1, compared with 301 reads against the `Orders` table in execution\
    \ plan 2, and both are index seek operations. What causes that difference?\n\n\
    Quite simply, it has to do with when, in the execution of the index seek, SQL\
    \ Server evaluates the predicates. Let’s take a closer look at the execution plans—specifically,\
    \ at the properties of the index seek (as shown in Figure 3-3).\n\n**Figure 3-3.**\
    \ Optimal Index Seek (left) and a less-optimal Index Seek (right).\n\n![Image\
    \ 12](index-57_1.png)\n\nYou might have noticed that the index names are different\
    \ in the two displayed execution plans, and that is indeed the case. The indexes\
    \ that SQL used for the two seeks were different (although the data returned was\
    \ the same). That difference, although it did not result in a difference in execution\
    \ plan operators that were used between the two queries, did result in a difference\
    \ in performance. This difference is related to the properties shown in the Index\
    \ Seek tooltips, the seek predicate (which both queries had), and the predicate\
    \ (which only the not-so-optimal one had).\n\nOne thing to note, the actual row\
    \ count shown in those tooltips is the number of rows that the operator output,\
    \ not the number of rows that it processed. The total number of rows that the\
    \ index seek actually read is not shown in the tooltip. The way to get a rough\
    \ idea of that is to look at the `Statistics IO` and examine the logical reads\
    \ (the number of pages read from memory) for the table that the index seek operates\
    \ on. It’s not a perfect way to do it, but it’s usually adequate.\n\n## Index\
    \ Architecture and Seek Operations\n\nTo understand the difference between the\
    \ performance of those two queries, we need to make a brief diversion into index\
    \ architecture and how index seeks work.\n\nAn index is a b-tree (balanced tree)\
    \ structure with the data at the leaf level logically ordered by the index keys,\
    \ as shown in Figure 3-4.\n\n**Figure 3-4.** Index architecture of an index on\
    \ `OrderStatus`, `OrderDate`.\n\nAn index seek operation works by navigating down\
    \ the b-tree to the start (or sometimes end) of the required range and reading\
    \ along the leaf level until the no more rows could possibly qualify. The seek\
    \ predicate that is listed in the properties of the index seek is the condition\
    \ used to locate the start (or end) of the range.\n\nSo let’s look at the two\
    \ scenarios that are shown in the example.\n\nIn the first case, the optimal index\
    \ seek, the seek predicate consisted of both the where clause expressions for\
    \ the table. Hence, SQL was able to navigate directly to the start—or, in this\
    \ particular case, the end—of the range of rows, and it was then able to read\
    \ along the index leaf level until it encountered a row that no longer matched\
    \ the filter. Because both of the where clause expressions on this table were\
    \ used as seek predicates, every row read could be returned without further calculations\
    \ being done.\n\nIn the second case, only one of the where clause expressions\
    \ was used as a seek predicate. SQL again could navigate to the end of the range\
    \ and read along the index leaf level until it encountered a row that no longer\
    \ matched the seek predicate. However, because there was an additional filter\
    \ (the one listed in the predicate section of the index seek properties), every\
    \ row that was read from the index leaf had to be compared to this secondary predicate\
    \ and would be returned only if it qualified for that predicate as well.\n\nThis\
    \ means that far more work was done in this case than for the first case.\n\n\
    ## The Root Cause: Index Column Order\n\nWhat caused the difference? In the example,\
    \ it was because the index column orders were different for the two examples.\n\
    \nThe where clause for the query was `OrderStatus = 'O' AND OrderDate < '2010/02/01'`.\n\
    \n![Image 13](index-58_1.png)\n\n![Image 14](index-58_2.png)\n\nIn the first example—the\
    \ one with the optimal index seek—the index was defined on the columns `OrderStatus,\
    \ OrderDate`. In the second example—the one with the not-so-optimal index seek—the\
    \ column order was `OrderDate, OrderStatus`.\n\n## Visualizing the Difference\n\
    \nLet’s have another look at index architecture and see how those differ. See\
    \ Figure 3-5.\n\n**Figure 3-5.** Index seek execution with an index on `OrderStatus`,\
    \ `OrderDate`.\n\nWith the first index ordered by `OrderStatus, OrderDate`, SQL\
    \ could execute the seek by navigating down the b-tree looking for the row that\
    \ matched one end of that range, seeking on both columns (1). In this case, it\
    \ searched for the row at the upper end, because that inequality is unbounded\
    \ below. When it found that row, it could read along the leaf level of the index\
    \ (2) until it encountered a row that did not match either (or both) predicates.\
    \ In this case, because the inequality is unbounded below, it would be the first\
    \ row that had an `OrderStatus` not ‘O’ (3). When that’s done, there’s no additional\
    \ work required to get matching rows. That index seek read only the data that\
    \ was actually required for that query.\n\nNow, what about the other index—the\
    \ one that had the columns in the other order? Take a look at Figure 3-6.\n\n\
    **Figure 3-6.** Index seek execution with an index on `OrderDate`, `OrderStatus`.\n\
    \nIn the second case, SQL can still navigate down the b-tree looking for the row\
    \ that matches one end (the upper end) of the range using both columns. This time,\
    \ though, when it reads along the leaf level of the index, it can’t just read\
    \ the rows that match both predicates, because the index is ordered first by the\
    \ date and only within that by the `OrderStatus`. So all rows that match the `OrderDate`\
    \ predicate must be read, and then a secondary filter must be applied to each\
    \ row to see if it matches the `OrderStatus`. This secondary filter is what is\
    \ shown in the tooltip as the predicate.\n\n![Image 15](index-59_1.png)\n\n![Image\
    \ 16](index-59_2.png)"
