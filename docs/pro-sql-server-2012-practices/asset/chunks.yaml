  trans: "\n要想取得进展，必须为此做好准备。如果你未做准备就向开发者提出要求，变革是无法实现的。这场仗会很难打，但值得一拼，因为最终你将与开发者们一起吃蛋糕，谈论那些系统不稳定、混乱无序、备份全无的糟糕旧日时光。\n\
    \n提出一些好的建议。不要在没有任何可以让他们工作更轻松的东西的情况下，就去找开发者。把自己想象成一位稳定性和一致性理念的推销员——甚至连开发者都不会反对这些目标。然而，就像在任何美满的婚姻中一样，双方的需求都必须被提出和承认。\n\
    \n也要设身处地为他们着想。尝试理解他们的工作。你会发现，他们的大部分要求其实并不过分。例如，一个常见的请求是能够在周末将生产环境复制到开发环境中，以测试他们软件的新想法。你愿意在周末替他们做这项工作吗？让他们自己动手完成，而你则可以回家陪伴家人，这难道不是更可取的吗？\n\
    \n倾听你的开发者。问问他们，在他们看来，管理员组设置的最大障碍是什么。你的最终目标，应该是创造一个对业务有利的环境。这意味着让每个人都尽可能满意，简化官僚流程，并确保所有人都能稳定访问。\n\
    \n一个准备充分的环境还能带来服务器整合，从而节省能源、简化打补丁的过程，并最终减少管理工作量。从精心准备的环境中节省下来的资金，可以用于更好的用途，比如购买企业版，或启用“始终开启”可用性组，以提供更能抵御故障的环境。\n\
    \n到现在，你可能开始觉得我只是在空谈了。你如何才能开启这个与开发者紧密合作的过程呢？答案取决于你的业务结构。以下是一系列步骤。不要一开始就试图完成所有事情。保持简单。随着进程的推进，一步步在成功的基础上构建。\n\
    \n请记住，目标是为所有人创造一个稳定的环境：\n\n1.  绘制你现有环境的地图。\n2.  创建一个你新环境应该是什么样子的描述。\n3.  将你的描述以书面形式记录下来，以便清晰、方便地传达给管理层和供应商。\n\
    4.  为大多数变更创建系统管理规程。\n5.  创建系统报告来汇报所有这些变更。\n\n这是一系列值得遵循的良好步骤。不过，不要太死板。有时你需要偏离这个顺序以使你的业务正常运行。适应并做对你的业务正确的事。\n\
    \n## 第一章：成为你开发者最好的朋友\n\n### 第一步：绘制你的环境图\n\n如果你从未遇到过这样的情况：发现一个实例或服务器一直在运行，而你却不知道它的存在，也不知道它的所有者或使用者是谁，那么你是世界上那\
    \ 0.1%轻松的 SQL Server DBA。事实上，不仅遇到未知服务器和实例很常见，有时你发现一个，甚至不知道上面运行着什么应用程序（如果有的话）。因此，第一步是开始绘制你的基础设施图，以便了解你当前拥有的东西。\n\
    \n首先，找出你域中的所有服务器。互联网上有几种免费工具可以帮助你完成这项工作。或者，也许你已经在配置管理数据库（`CMDB`）中拥有了这些信息，但你从未基于该数据创建过报告。\n\
    \n尝试在命令提示符窗口中执行以下命令：\n\n```bash\nSQLCMD -L\n```\n\n此命令将列出网络上所有可见的可用服务器。使用诸如 `SQLPING`、Microsoft\
    \ Map、Quest Discovery Wizard 或其他类似产品，你可以获得更详细的信息。这些产品的一个好处是，它们通常提供诸如版本号或补丁级别之类的信息。\n\
    \n一旦你找到了服务器，就需要确定它们是否仍在使用。很可能，有些服务器仅在升级期间使用，但升级完成后，没有人记得关闭它们。我曾见过一个因此而搞得一团糟的组织：他们忘记了旧服务器仍在运行，因此它不再接收补丁。后来\
    \ `SLAMMER` 病毒来了，内部网络就瘫痪了。我参与的另一个项目涉及整合大约 200 台服务器。我们发现，实际上可以关闭其中 25%的服务器，因为它们根本没有被使用。\n\
    \n以下是一段代码，可帮助你捕获有关登录的信息，以便你开始识别谁或哪些应用程序正在使用某个特定实例。代码很简单，使用了大多数 SQL Server 版本中都有的\
    \ `sysprocesses` 视图。为什么不使用审核跟踪？因为审核跟踪会占用大量空间。你只需要唯一的登录信息，而查看审核跟踪中所有登录尝试的日志并不容易阅读。\n\
    \n首先，在 `msdb` 数据库中创建以下小表。我使用 `msdb` 是因为它在所有版本的 SQL Server 中都可用。该表将记录唯一的登录信息。\n\
    \n```sql\nCREATE TABLE msdb.dbo.user_access_log\n( id int IDENTITY(1,1) NOT NULL,\n\
    \  dbname nvarchar(128) NULL,\n  dbuser nvarchar(128) NULL,\n  hostname nchar(128)\
    \ NOT NULL,\n  program_name nchar(128) NOT NULL,\n  nt_domain nchar(128) NOT NULL,\n\
    \  nt_username nchar(128) NOT NULL,\n  net_address nchar(12) NOT NULL,\n  logdate\
    \ datetime NOT NULL\n    CONSTRAINT DF_user_access_log_logdate DEFAULT (getdate()),\n\
    \  CONSTRAINT PK_user_access_log PRIMARY KEY CLUSTERED (id ASC)\n)\n```\n\n然后运行以下代码，每\
    \ 15 秒对登录信息进行一次采样。如果你需要更小或更大的粒度，可以轻松更改代码中的 `WAITFOR` 部分。你甚至可以将代码设置为一个作业，使其在 SQL\
    \ Server 代理启动时自动启动。\n\n```sql\nWHILE 1=1\nBEGIN\n    WAITFOR DELAY '00:00:15';\n\
    \    INSERT INTO msdb.dbo.user_access_log\n        ( dbname,\n          dbuser,\n\
    \          hostname,\n          program_name,\n          nt_domain,\n        \
    \  nt_username,\n          net_address )\n    SELECT distinct\n        DB_NAME(dbid)\
    \ as dbname,\n        SUSER_SNAME(sid) as dbuser,\n        hostname,\n       \
    \ program_name,\n        nt_domain,\n        nt_username,\n        net_address\n\
    \    FROM master.dbo.sysprocesses a\n    WHERE spid>50\n        AND NOT EXISTS(\
    \ SELECT 1\n                        FROM msdb.dbo.user_access_log b\n        \
    \                WHERE b.dbname = db_name(a.dbid)\n                          \
    \  AND NULLIF(b.dbuser,SUSER_SNAME(a.sid)) IS NULL\n                         \
    \   AND b.hostname = a.hostname\n                            AND b.program_name\
    \ = a.program_name\n                            AND b.nt_domain = a.nt_domain\n\
    \                            AND b.nt_username = a.nt_username\n             \
    \               AND b.net_address = a.net_address )\nEND\n```\n\n当你开始这个捕获和审查登录信息的流程时，你应该组建一个小团队，包括一两位\
    \ DBA 和一两位较受欢迎的开发者及系统所有者。当然，让其他人参与进来的原因是为了创造一些“大使”，他们可以向其他开发者和系统所有者解释新的设置。由同侪告知某事，会让人更难抗拒甚至拒绝这些变革。而且这些人对业务、不同系统如何交互以及大多数开发者有什么需求也有很多了解。他们可以告诉你什么会成为“拦路虎”，在流程初期就发现这些障碍非常重要。\n\
    \n### 第二步：描述新环境\n\n下一步是描述你的新环境或你计划在其中运作的框架。这个描述应该包含什么？请确保至少涵盖以下项目：\n\n•\n"
- fmt: '## Version of SQL Server

    The fewer SQL Server versions you have to support, the easier it is to keep systems
    up and running. You will have fewer requirements to run different versions of
    Windows Server, and the newer the version you keep, the easier it is to get support
    from Microsoft or the community at large. I have seen several shops running versions
    spanning the gamut from 7.0, 2000, 2005, 2008, 2008 R2 through to 2012. Why not
    just choose 2012? Having the latest version as the standard is also a good selling
    point to developers, because most of the exciting new features will then be available
    to them. You might not be able to get down to just one version, but work hard
    to minimize the number you are stuck with supporting.


    ## Feature support

    Get started studying all the different features. Describe how your environment
    is implemented, how it is used, what features are accepted, and which features
    are not. Take into account whether features require privileges such as `sysadmin`,
    access to the command shell, and so forth. The important thing in this process
    is to understand the advantages and disadvantages of every feature, and to try
    to think through how to explain why a certain feature will not be enabled—or for
    instance, the use of globally unique identifiers (`GUIDs`) as primary keys. Developers
    tend to want to be able to create the parent keys on their own, because it is
    then easier to insert into parent and child tables in the same transaction. In
    this case, `SQL Server 2012`’s new support for stored sequences can be an easy
    replacement for `GUIDs` created in an application.


    ## Editions

    Editions can be thought of as an extension of the feature set. How does the company
    look at using, say, the `Express Edition`? Should you use only `Standard Edition`,
    or do you need to use `Enterprise Edition`? Do you use `Developer Edition` in
    development and test environments and then use `Standard Edition` in production,
    which leaves you with the risk that the usage features in development cannot be
    implemented in production? How do you help developers realize what they can do
    and cannot do, and what advanced features they can actually use? Do you use policy-based
    management to raise an alarm whenever `Enterprise Edition` features are used?
    Or do you just periodically query the view `sys.dm_db_persisted_sku_features`,
    which tells you how many `Enterprise Edition` features are in use?


    ## Naming standards

    Naming standards are a must. The lowest level should be on the server level, where
    you choose standard names for servers, ports, instances, and databases. Standardization
    helps to make your environment more manageable. Do you know which ports your instances
    use? Knowing this makes it a lot easier to move systems around and connect to
    different servers. Also, databases tend to move around, so remember that two different
    systems should not use the same database name. Prefix your databases with something
    application specific to make them more recognizable.


    ## Patching

    Version change is important to remember, because it is easily overlooked. Overlook
    it, and you end up with a lot of old versions running in both production and development
    environments. Try and implement reasonable demands here. You could choose, for
    example, to say that development and test environments should be upgraded to the
    latest version every six months after release, and production environments get
    upgraded a maximum of three months after that upgrade. Also, you can require that
    service packs be implemented no later than three months after release.


    ## Privileges

    Privileges are very important to control. Some privileges might be acceptable
    in development and test environments, but not in production, which is OK. Just
    remember to write down those differences so that everybody is aware of them and
    the reasons why they exist. Start out by allowing developers `dbo` access to their
    own databases in development. That way, you do not constrain their work.'
