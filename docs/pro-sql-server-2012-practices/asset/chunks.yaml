    # 第 8 章：发布管理


    ## 索引考量


    为数据库编制索引是维护应用程序性能的重要方面。虽然我们通常手动构建索引，并根据其使用频率来判断其价值，但还有其他需要考虑的因素。对于一张表而言，其索引的**整体规划**及其**设计目的**，其价值往往超过为某个单一目的添加一个索引。不过，有时确实需要为支持某个业务流程而创建单一目的的索引。


    在本章中，我们探讨了如何使用缺失索引数据管理对象（DMOs）和数据库引擎优化顾问（DTA）来处理索引方面的繁重工作，从而减少手动操作，获得一个良好的开端。我们还探讨了统计信息之外可能导致需要创建索引的几个原因。在推进索引策略时，全面考虑这些方面对于为数据库整体编制索引至关重要。


    ## 发布管理


    ### 作者：TJay Belt


    数据库系统的本质是动态的，很少是静态的。使用数据库的应用程序倾向于发生变化，这要求相关的数据库内部也随之改变。构成这种“变化”的所有部分和环节将被组合成一个“发布”，并应用到系统上。


    控制这种变化并非火箭科学，但它也并非没有复杂性。在本章中，我们将讨论各种术语、流程和想法，并推荐一些工具来协助您执行这项必要的功能，同时最小化风险，并以一种平稳的方式影响您的系统。


    虽然有许多因素会影响系统，但我们将特别讨论对数据库的更改。在考虑对数据库进行更改时，有几个问题我们需要牢记。对系统进行更改总是存在风险的。更改通常以新发布的功能或对现有功能的修复形式出现。假设您的系统处于理想状态并按设计运行，那么任何新的更改都应该是向好的方向发展。在我们深入探讨如何创建您自己的发布管理流程时，请记住，**最小化风险**将是本章的目标。


    ### 我的发布管理流程


    以下信息源于我多年执行发布流程的经验，将传授我在数百次独立发布中学习到的细节，其中一些甚至被誉为成功。最初，当我第一次踏上发布管理之旅时，我完全不知道自己在做什么。我只是知道需要进行更改。


    我主动承担起审视整个流程并尝试使其更完善的任务。这是一条艰难的道路，经历了许多深夜、清晨和其他挫折。需要与公司内部和外部部门沟通，这是一项艰巨的任务。让他们承诺执行一个他们不理解或不关心的流程，则更加困难。


    慢慢地，我们取得了进展。我们从实施小的变更开始，例如制定一条规则禁止临时查询。这背后的理由是合理的，尽管它引起了他人的不满，但其执行是成功的。这促使我们需要将我们的更改包装成存储过程，可以将其引入系统、执行，然后删除。这使我们能够在发布时最大限度地减少人为干预。


    很快，我们发现流程中需要许多额外的步骤。最终，我开始记录我们为准备发布所做的一切。这让我意识到，许多任务对很多人来说是未知的，我能够通过文档与他人分享这些信息。一旦人们意识到一次发布有多么复杂，他们就更倾向于开放和乐于助人，尤其是当我向他们展示他们的发布需要数百个步骤时。他们不再羞于提供帮助。他们了解到，他们看似简单的请求，实际上需要多人花费许多小时来准备和执行。当他们看到我们要求审阅的文档的详细程度时，他们突然理解了这一愿景。这种愿景传播开来，具有感染力。


    起初，当我们开始一次发布时，我们会屏住呼吸。通常，我们会屏住呼吸度过整个发布过程。我们早期的许多发布都失败了，不得不回滚，或者出现了其他不良结果。很快，通过仔细实施这个发布流程，我们开始不仅在规划方面，而且在执行发布方面变得熟练起来。很快，我们几乎想不起一次失败的发布。嗯，这有点夸张。我们总是记得失败的发布，但我们开始在它们和我们之间留出时间间隔。这段经历让我们感到高兴，但也让我们始终保持警惕。


    在我们进入成功期后的一次发布中，向我们表明，尽管我们一直做得很好，但我们并非不会犯错。发布后立即出现了一个未预见的功能性问题，于是决定回滚。然而，在自信之下，我们开始在回滚程序上偷工减料。在这个案例中，由发布工程师决定如何回滚，而做出的选择结果证明是个错误。这是谁的错？是那个以不当方式回滚的个人吗？不是。是发布了错误代码的开发者吗？不是。是我，发布计划的创建者。因为我没有花足够的时间创建和文档化回滚流程，责任就落在了我身上。我仍然能感受到这段经历的刺痛，我利用这种感觉让自己保持更加勤勉。


    通过与您分享这些经历，我旨在向您展示发布管理流程并非一个新想法；它在各种组织中已实践了相当长一段时间。我随着时间的推移不断完善和修改这个流程。每次流程迭代，它都会变得更强大。它可能永远不会完美，但只要流程不断演进以满足需求，它就将使我们受益匪浅。


    ### 一个变更请求


    正如您可能猜到的那样，您的应用程序和/或数据库系统中最终会被请求进行一项变更。这个请求是如何产生的并不重要。请求会到来，并且需要被处理。我们希望确定处理、控制这些请求，并将它们平稳地引入各自系统的最佳方式。


    不幸的是，许多发布流程可能类似于图 8-1 中详细描述的那个。这显示了一个包含极少步骤、极少测试、极少验证且失败几率很高的流程。


    诚然，对于某些发布，使用这种简单流程也可能会取得成功。


    *图 8-1. 一个典型（且低效）的发布流程*


    这个极简发布流程涉及以下基本步骤：


    1.  提出一个变更请求。

    2.  创建 `T-SQL` 代码以支持此变更。

    3.  测试 `T-SQL` 代码。

    4.  部署 `T-SQL` 代码。


    注意：当我们提到 `T-SQL` 代码时，这可能是创建或修改函数、表、存储过程、数据等的 `T-SQL`。


    上述步骤中最少的任务可能是步骤 2 和 4：创建和部署代码。实际的请求（步骤 1）可能并非以正式请求的形式到来；它可能以各种非正式的方式被接收。不幸的是，测试（步骤
    3）往往不会进行。这导致我们只有两个核心任务在实际发生。

