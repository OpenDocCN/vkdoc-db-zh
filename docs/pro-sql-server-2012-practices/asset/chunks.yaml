    # 第一章：成为你开发者的最佳朋友


    **作者：Jesper Johansen**


    当被邀请为本书撰写一章时，我对于选择哪个主题感到犹豫。我应该写我通常看到的常见问题吗？关于 Microsoft SQL Server 简易安装既是优势也是弱点？关于如何通过查询几个动态管理视图（`DMVs`）来修复
    SQL Server 安装中最普遍的 10 个问题？或者，谈谈 *另一种性能剖析*（`YAPP`）方法如何？这是 Oracle 社区中一个著名的性能方法，随着
    `Extended Events` 和 `DMVs` 的实现，它在 `SQL Server` 中同样适用，能向你展示你在等待什么？


    不。真正让我心潮澎湃的是通过创建一个良好的 `SQL Server` 环境并培养对彼此差异的理解，从而与开发者成为朋友。试想一下，如果双方能够和平共处，而不是为每一个对立观点争斗，把战壕挖得越来越深、越来越宽，能取得多大的成就。通过培养良好的关系，我见过一些环境从分散的开发系统和独立的生产数据库，转变为集中的解决方案，开发者易于访问，而我则能享受平静、不受打扰的夜晚。然而，这确实意味着你必须通过放弃部分管理权限来让渡对系统的一些控制权。


    主要问题在于关注点不同。当 `DBA` 考虑空间问题、数据建模和日常运营稳定性时，开发者却想着让事物变得更智能、更性感、更亮眼。为了让这种关系运作起来，我们必须横跨整个系统领域——标准化、可访问性、日志记录、信息流、性能信息——同时确保系统稳定，并让开发者知道他们并非孤军奋战，`DBA`
    依然存在并做决策。


    ## 我使用 SQL Server 与开发者共事的经验


    完成工程学业后，我以开发者身份开始职业生涯。我在 DOS 和 OS/2 下的 `DataEase` 中开发 `CRM` 系统，这段经历让我深入了解了开发者与
    `DBA` 职能之间的问题。`DataEase` 是当时的 Microsoft Access，它拥有连接所有主流数据库（`Oracle`、`SQL Server`、`DB2`）的连接器。但大多数时候，`DBA`
    不允许动态访问生产数据。他们的抵制导致了与开发者的摩擦。


    机缘巧合下，我成了一家为丹麦所有市政当局开发并运行系统的公司的 `Microsoft Visual Basic` 程序员。我被安排在 `DB2/MVS DBA`
    中间，并且是迄今为止最年轻（也是唯一）的 `GUI` 人员（使用 `OS/2` 和 `Windows`）。当我编写 `Visual Basic 3` 应用程序时，那些
    `DBA` 正在处理分散式连接，例如 `DB/2 MVS` 上的 `ODBC`。那是在大型机上使用 `TCP/IP` 之前的日子，所以我们谈论的是 `系统网络体系结构`（`SNA`）和
    `IBM Communications Manager`。


    有一天，我的老板让我负责一个名为 `SQL Server` 的新产品。为什么？因为我是唯一一个在 Windows 上工作的人。


    我最大的问题是如何应对公司内现有的环境。我们已经有多少个 `SQL Server` 数据库？哪些开发组在使用它？这些只是我必须面对的一些问题。


    我不得不从零开始。于是我向我的 `DB/2` 同事寻求帮助。毕竟，他们在这种环境中工作了 15 年，处理拥有 15,000 个并发用户、50,000 个不同程序、数千个独立数据库的系统，以及每个丹麦公民的大量数据，例如税收、养老基金和其他个人信息。我希望能受益于他们的经验。


    我学到的是，数据建模是必须的。你需要为服务器、数据库对象、存储过程——实际上为所有东西——建立命名标准。为命名标准和一致性而发起的这场战斗，让我与开发者踏上了一段长达六年的旅程，直到大多数开发者真正开始安全地工作。他们逐渐理解，我的要求为他们提供了更稳定、一致的开发环境，提高了他们的效率，并让所有人都更快地完成了工作。


    ## 调和组织内不同的观点


    `DBA` 和开发者之间的日常冲突大多涉及常规管理任务。对空间分配的限制以及对生产环境更改的限制，被开发者视为阻碍创新和阻止他们有所作为。他们常常将 `DBA`
    视为故意限制他们工作的人。另一方面，管理团队认为开发者很少提前计划到下一个下拉框或下一个屏幕之后，而且从不考虑他们构建的软件必须运行的时间周期——这个周期通常是五到十年甚至更长。


    这些差异带来的后果是，开发者创建自己的秘密系统，将预算资金移出 `DBA` 团队的掌控范围，并且通常尽其所能限制管理员设置他们认为正在建立的想象边界。例如，我经常会听到这样的话：“如果你剥夺我的那个权限，我就不能随意重启机器了。”
    这种想法的问题在于，配置良好的 `SQL Server` 系统并不比其他任何类型的系统需要更多的重启。


    那么，我们如何走出这个恶性循环，这样做又有什么好处呢？对话是出路，好处包括：受控的生产环境、清晰定义的数据库所有权、正确打补丁的一致环境、更低的维护成本、可能的许可节省，以及几乎可以肯定的是，凌晨
    4 点打扰你睡眠的呼叫会减少。


    记住，所有的改变都始于自身，改变自己远比改变他人容易得多。所以，找一张纸，把它分成“优点”和“缺点”两栏，开始列出你环境中的好与坏。例如，有些开发者拥有 `sysadmin`
    权限可能是一个优点，因为他们能自己修复一些问题；但它也可能是一个缺点，因为他们会干预不该干预的事情，并在 `DBA` 不知情的情况下创建对象。


    你将从本章获得的是我的经验，以及我如何设法培养与开发者之间富有成效的良好关系。我会提供几个代码示例，帮助你走向成功，或者仅仅是给你一些启发。我的方法并非建立良好开发者关系的唯一途径，但在我的工作环境中已被证明是有效的。


    ## 准备与开发者合作实施系统更改

