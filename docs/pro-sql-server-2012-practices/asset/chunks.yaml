- fmt: "# Performing Analysis\n\nAt this point, you will have the sample workload\
    \ from your database environment and a cloned database to use with the Database\
    \ Engine Tuning Advisor. The next step is to pull these together into a tuning\
    \ session and review the results. There are two basic methods to execute a workload\
    \ against a database. You can use the GUI that comes with `DTA`, which is probably\
    \ the most familiar method for using `DTA`; or you can use the same tool, but\
    \ through a command-line interface. We will use the command-line interface with\
    \ `dta.exe` in this chapter. The primary reason is that it easily ties into the\
    \ theme of scriptable actions that have been used for the previous activities.\n\
    \n> **Note:** More information on indexing and using `DTA` can be found in `Expert\
    \ Performance Indexing for SQL Server 2012` by Jason Strate and Ted Krueger (Apress,\
    \ 2012).\n\nThrough `dta.exe`, you’ll provide the tool with an XML configuration\
    \ file which will provide all of the information needed to run the workload against\
    \ the database. The XML configuration files provided in Listings 7-15 and 7-16\
    \ can be used to configure `dta.exe` to run against either SQL Profiler `.trc`\
    \ files or the `dbo.indexing_workload` table, respectively. The other options\
    \ in the XML input file configure the following attributes:\n\n- SQL Server instance\
    \ name set to `STR8-SQL-12`\n- Database name set to `AdventureWorks2012`\n- Workload\
    \ set to either files or table\n- Tune clustered and nonclustered indexes\n- Do\
    \ not consider additional partitioning\n- Keep none of the existing clustered\
    \ and nonclustered indexes\n\nThrough these options, the `DTA` will be able to\
    \ do more than what is possible through the missing indexes feature. Where missing\
    \ indexes provide suggestions for where statistics could be made into nonclustered\
    \ indexes that will improve performance, the `DTA` can suggest when to consider\
    \ partitioning or, even, when to move the clustered index.\n\n**Listing 7-15.**\
    \ Sample XML Input File for `DTA` Using `.trc` Files\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"utf-16\" ?>\n<DTAXML xmlns=\"http://schemas.microsoft.com/sqlserver/2004/07/dta\"\
    >\n  <DTAInput>\n    <Server>\n      <Name>STR8-SQL-12</Name>\n      <Database>\n\
    \        <Name>AdventureWorks2012</Name>\n      </Database>\n    </Server>\n \
    \   <Workload>\n      <File>c:\\temp\\index_workload.trc</File>\n    </Workload>\n\
    \    <TuningOptions>\n      <StorageBoundInMB>3000</StorageBoundInMB>\n      <FeatureSet>IDX</FeatureSet>\n\
    \      <Partitioning>NONE</Partitioning>\n      <KeepExisting>NONE</KeepExisting>\n\
    \    </TuningOptions>\n  </DTAInput>\n</DTAXML>\n```\n\n**Listing 7-16.** Sample\
    \ XML Input File for `DTA` Using `dbo.indexing_workload` Table\n\n```xml\n<?xml\
    \ version=\"1.0\" encoding=\"utf-16\" ?>\n<DTAXML xmlns=\"http://schemas.microsoft.com/sqlserver/2004/07/dta\"\
    >\n  <DTAInput>\n    <Server>\n      <Name>STR8-SQL-12</Name>\n      <Database>\n\
    \        <Name>AdventureWorks2012</Name>\n      </Database>\n    </Server>\n \
    \   <Workload>\n      <Database>\n        <Name>tempdb</Name>\n        <Schema>\n\
    \          <Name>dbo</Name>\n          <Table>\n            <Name>indexing_workload</Name>\n\
    \          </Table>\n        </Schema>\n      </Database>\n    </Workload>\n \
    \   <TuningOptions>\n      <StorageBoundInMB>3000</StorageBoundInMB>\n      <FeatureSet>IDX</FeatureSet>\n\
    \      <Partitioning>NONE</Partitioning>\n      <KeepExisting>NONE</KeepExisting>\n\
    \    </TuningOptions>\n  </DTAInput>\n</DTAXML>\n```\n\nAfter building the XML\
    \ input file for the tuning session, save the file as `WorkloadConfig.xml`, or\
    \ any other appropriate name that you can remember. The next step is to execute\
    \ the session against `dta.exe` using command-line arguments, such as those provided\
    \ in Listing 7-17. To pass in the input file, you will use the `-ix` argument.\
    \ For the report outputs, you will need to use the `-ox` argument to determine\
    \ where to place the reports and the `-rl` argument output format. Table 7-3 shows\
    \ a list of available report outputs.\n\nAlong with those arguments, you will\
    \ also need the `-s` argument to specify a name for the session. Session names\
    \ must always be unique.\n\n**Listing 7-17.** `DTA` Command with XML Input File\n\
    \n```\ndta -ix \"c:\\temp\\WorkloadConfig.xml\" -ox \"c:\\temp\\Output.xml\" -rl\
    \ ALL -s Workload\n```\n\n**Table 7-3.** `DTA` Analysis Report List\n\n| Value\
    \ | Report |\n| :--- | :--- |\n| `ALL` | All analysis reports |\n| `STMT_COST`\
    \ | Statement cost report |\n| `EVT_FREQ` | Event frequency report |\n| `STMT_DET`\
    \ | Statement detail report |\n| `CUR_STMT_IDX` | Statement-index relations report\
    \ (current configuration) |\n| `REC_STMT_IDX` | Statement-index relations report\
    \ (recommended configuration) |\n| `STMT_COSTRANGE` | Statement cost range report\
    \ |\n| `CUR_IDX_USAGE` | Index usage report (current configuration) |\n| `REC_IDX_USAGE`\
    \ | Index usage report (recommended configuration) |\n| `CUR_IDX_DET` | Index\
    \ detail report (current configuration) |\n| `REC_IDX_DET` | Index detail report\
    \ (recommended configuration) |\n| `VIW_TAB` | View-table relations report |\n\
    | `WKLD_ANL` | Workload analysis report |\n| `DB_ACCESS` | Database access report\
    \ |\n| `TAB_ACCESS` | Table access report |\n| `COL_ACCESS` | Column access report\
    \ |\n\nWhen the execution completes, you will be presented with an XML report\
    \ that details the indexing recommendations. You can use these to identify potential\
    \ new indexes to add, along with information on indexes that can be removed from\
    \ the database. From a high level, the output report will contain all of the individual\
    \ reports that are requested from tuning sessions. This will look like the XML\
    \ document shown in Figure 7-17. Examining the individual recommendations, the\
    \ results will include items such as the index recommendation that is shown in\
    \ Figure 7-18.\n\n![Image 96](index-200_1.png)\n\n![Image 97](index-200_2.png)\n\
    \nWhile there is still work to be done to validate the results, the key with using\
    \ the `DTA` is that the heavy lifting has already been done. You aren’t going\
    \ to be using your time to consider and test new index configurations; rather,\
    \ you’ll be spending your time validating and applying the indexes. The heavy\
    \ lifting can be done with minimal effort.\n\n> **Caution:** Never run `DTA` on\
    \ a production server. When evaluating a workload, the tool uses algorithms that\
    \ will, in essence, use a brute-force process to investigate as many indexing\
    \ options as possible on the database. While no physical indexes or database changes\
    \ will be made, there are hypothetical objects created that the tool uses to make\
    \ its recommendations.\n\n# The Business Bubble\n\nBesides the overall impact\
    \ on the total performance of an index on a table and the queries that utilize\
    \ the table, there is another area and reason that helps dictate whether an index\
    \ is of value to a database. In the context of this chapter, we refer to this\
    \ other reason as the **business bubble**. The business bubble is all of the nonstatistical\
    \ reasons to index a table that can dictate the need for an index. Sometimes supporting\
    \ the most important queries in a database defines the queries that are run most\
    \ often. At times, they will be supporting the queries that are important because\
    \ of the business value that they provide.\n\n# Index Business Usage\n\nProbably\
    \ the most often overlooked part of indexing is investigating the purpose or use\
    \ of an index. There are not many easy ways to identify why an index is used.\
    \ While that might be the case, there is one method you can use that will tell\
    \ you how an index has been recently used—this is by querying the plan cache."
