  trans: '# 第 14 章：页压缩与行压缩


    当我思考压缩技术时，我发现将 SQL Server 内部数据存储的层次结构想象成一张商场地图会很有帮助。（完整的层次结构请参见**图 14-3**。）当你走进商场，会看到许多写着“您在此处”的小指示牌。压缩直接影响数据的存储方式，要理解它，你需要从最底层开始，逐层向上了解。行压缩影响记录级别的数据存储方式。在层次结构的最底层是记录——具体来说，是数据记录。


    **图 14-3.** 压缩影响数据在磁盘上的存储方式。行压缩专门改变了记录级别的数据存储方式。


    为了帮助你理解对数据记录进行更改时会发生什么，我将从检查一个普通记录开始。首先，我将创建一个数据库和一个表，这样我就可以创建一条数据记录并插入一条记录：


    ```sql

    IF EXISTS(SELECT NAME FROM SYS.DATABASES WHERE NAME=''demoInternals'')

    BEGIN

    DROP DATABASE demoInternals

    END

    GO

    USE master

    GO

    CREATE DATABASE demoInternals

    GO

    USE demoInternals

    GO

    IF EXISTS(SELECT NAME FROM sys.tables WHERE NAME=''dataRecord'')

    BEGIN

    DROP TABLE dataRecord

    END

    GO

    CREATE TABLE dataRecord

    (myID INT

    ,myfixedData CHAR(4)

    ,myVarData1 VARCHAR(6)

    ,myVarData2 VARCHAR(9)

    ,myVarData3 VARCHAR(6)

    )

    GO

    INSERT INTO dataRecord(myID, myfixedData, myVarData1, myVarData2, myVarData3)

    VALUES (7, ''XXXX'', ''SSS'', ''WWWWWWWWW'', ''BB'')

    GO

    ```


    一个普通的數據記錄由标记字节、`NULL` 位图偏移量、记录的固定数据部分、`NULL` 位图、可变偏移数组、可变数组以及特殊信息（用于快照隔离级别或堆中的转发指针）组成。我现在将使用未公开的命令
    `DBCC IND` 和 `DBCC PAGE` 来窥探底层，查看磁盘上的数据记录。（参见**图 14-5**。）


    ```sql

    DBCC IND(demoInternals, ''dataRecord'', 1)

    GO

    --注意，你的页面 ID 可能与我的不同

    --我们想要获取 PageType = 1 的页面编号

    ```


    **图 14-4.** `DBCC IND` 的输出。


    从**图 14-4** 可以看到，返回了两行。我们想查看数据记录。如果你查看 `PageType` 列，会发现一行的值为 10，另一行为 1。值 10 表示分配页。每当创建一个表时，它都会获得一个分配页，这就是我们表的分配页；而值
    1 表示数据页。如果你接着查看 `PageType` 值为 1 的那一行的 `PagePID` 列，可以看到数据记录在第 276 页上。现在将 `Trace
    Flag 3604` 设置为 ON，以将 `DBCC Page` 的输出发送到 SQL Server Management Studio (`SSMS`)
    窗口。如果未启用 `Trace Flag 3604`，你只会收到“命令成功完成”的消息，而没有额外输出。接下来，我将使用 `DBCC Page` 查看该记录。`DBCC
    Page` 的输出将提供大量元数据。我将其精简，只保留与我们检查数据记录相关的数据。有关 `DBCC Page` 的数据记录输出，请参见**图 14-5**。


    ```sql

    DBCC TRACEON(3604)

    GO

    DBCC PAGE(''demoInternals'', 1, 276, 1)

    GO

    ```


    **图 14-5.** 内部数据记录的完整输出。


    在普通的数据记录中，你有标记字节、`NULL` 位图偏移量、定长数据、`NULL` 位图、可变偏移数组和可变长度数据。


    SQL Server 有五种事务隔离级别：已提交读 (`Read Committed`)、未提交读 (`Read Uncommitted`)、可重复读 (`Repeatable
    Read`)、快照 (`Snapshot`) 和可序列化 (`Serializable`)。SQL Server 的默认事务隔离级别是已提交读。


    如果使用未提交读或快照隔离级别，你就在数据记录上启用了版本控制。关于事务隔离级别的完整讨论超出了本章范围；请参阅 Microsoft 联机丛书了解更多关于事务隔离级别的信息：http://msdn.microsoft.com/en-us/library/ms173763.aspx。


    如果启用了快照或未提交读隔离级别，或者使用了任何依赖于快照隔离级别的功能，如联机索引或表重建，你还将有一个额外的部分，其中包含记录最后更改的时间戳。


    ## 行压缩


    行压缩作用于数据记录中的定长数据类型。什么是定长数据类型？包括 `decimal`、`numeric`、`smallint`、`int`、`bigint`、`bit`、`smallmoney`、`money`、`float`、`real`、`datetime`、`datetime2`、`datetimeoffset`、`char`、`binary`、`timestamp/rowversion`、`nchar`、`nvarchar`，以及在
    SQL 2012 中首次引入的空间数据类型 `Geometry` 和 `Geography`。


    那么它是如何工作的？行压缩将包含变长数据的定长数据存储为变长数据。这有点绕口，让我解释一下。如果我取一个 `Char(50)` 字段并输入值 “Bradley
    Ball”，我只使用了 50 字节中的 12 字节。普通的数据记录会浪费那 38 字节。行压缩只存储这 12 字节。如果我有一个 `datetime` 字段——通常是
    8 字节——并插入值 “1/25/1977”，压缩后的记录会将其存储为 4 字节字段，为我们节省了 4 字节。


    我们的可变长度标识符，即可变偏移数组，从每个 4 字节减少到 4 位。对于 `NULL` 值和零值也有特殊处理，将存储空间从字节减少到位。


    现在你已经看过了普通数据记录，也了解了行压缩将做的更改，尝试压缩该记录。重建表后，你需要再次使用 `DBCC IND` 获取数据页（如**图 14-6**
    所示），因为重建操作会创建一个具有新页码的新页面。


    ```sql

    ALTER TABLE dataRecord

    REBUILD WITH (DATA_COMPRESSION=ROW)

    GO

    DBCC IND(demoInternals, ''dataRecord'', 1)

    GO

    ```


    **图 14-6.** `DBCC IND` 的输出。


    现在使用 `DBCC Page` 获取行压缩后的记录。结果如**图 14-7** 所示。我再次剔除了元数据细节，仅列出数据记录，但在检查 `DBCC Page`
    的输出时，你会看到记录类型现在被列为已压缩。


    ```sql

    DBCC PAGE(''demoInternals'', 1, 320, 1)

    GO

    ```


    **图 14-7.** 行压缩的数据记录。


    现在记录已经过行压缩，你可以看到记录的结构发生了很大变化。你有一个头、CD 区域、一个存储所有短于 9 字节数据的短数据区域，以及一个存储所有 9 字节及以上数据的长数据区域。再次说明，如果启用了快照隔离级别或者有来自堆的转发指针，它们将位于记录末尾一个称为“特殊信息”的区域。


    理解行压缩很重要，因为它是启用压缩时默认应用的压缩级别。此外，即使你使用的是页压缩级别，叶级以外的索引页也只会进行行压缩。


    ## 页压缩


    我们 SQL 压缩内部结构之旅的下一步是页压缩，如**图 14-8** 所示。


    **图 14-8.** 页压缩在页面级别重新排列结构。'
- fmt: 'Page compression is a superset of row compression. As I mentioned before,
    at the lowest level once compression is turned on, everything is at least row
    compressed. Page compression contains row compression, column prefix compression,
    and page dictionary compression. Page compression is always applied in the order
    of row, column, and then dictionary. Note that you can specify only row and page
    compression settings on a database object. Column prefix and page dictionary compression
    are internal subsets of page compression. You cannot specify which portions of
    page compression to use—SQL Server makes that determination internally. To help
    you fully understand page compression, I need to cover each step that occurs when
    it is applied, which I will do shortly. First I’ll create a table I can use to
    demonstrate the power of page compression.


    ```

    USE demoInternals;


    GO


    /*


    Let''s create a Clustered Index


    */


    IF EXISTS(SELECT NAME FROM sys.tables WHERE name=N''compressedDataRecord'')


    BEGIN


    DROP TABLE dbo.compressedDataRecord


    END


    CREATE TABLE compressedDataRecord(


    myID INT IDENTITY(1,1)


    ,productName char(500) DEFAULT ''some product''


    ,productDescription CHAR(1000) DEFAULT ''Product Description''


    ,PRIMARY KEY CLUSTERED(myID)


    ) ;


    /*


    Let''s insert some data


    */


    DECLARE @i INT, @myID INT


    SET @i=0


    WHILE (@i<383)


    BEGIN


    SET @myID=(SELECT (MAX(myid)+1) FROM dbo.compressedDataRecord)


    INSERT INTO dbo.compressedDataRecord(productName, productDescription)


    VALUES(


    (REPLICATE(''a'', (500- LEN(@myID))) + CAST(@myID AS VARCHAR(3)))


    ,(REPLICATE(''b'', (1000- LEN(@myID))) + CAST(@myID AS VARCHAR(3)))


    )


    SET @i=@i+1


    END

    ```


    When we looked at row compression, it was important to look at one data row and
    see the changes.


    Page compression requires an understanding of not just the changes to the data
    page, explained shortly, but an understanding of how data storage changes. When
    you used the preceding script to insert data, you’re taking fixed-length data
    fields and stretching them to the point that row compression can save you little
    to no storage space. You’re packing these fields as full as you can. If you use
    `DBCC IND` to get a page count, you’ll see that you’re currently storing data
    on 79 different pages. Subtract the `PageType` 10 allocation page and the `PageType`
    2 index page and you’re at 77 total pages for the table: `DBCC IND(demoInternals,
    ''compressedDataRecord'', 1)`


    So now let’s apply page compression, perform another `DBCC IND`, and see how this
    changes our storage structure:


    ```

    /*


    Rebuild our table applying Page Compression


    */


    ALTER TABLE dbo.compressedDataRecord


    REBUILD WITH (DATA_COMPRESSION=Page)


    GO


    DBCC IND(demoInternals, ''compressedDataRecord'', 1)


    GO

    ```


    After running the commands, you should find that you now have only two data pages
    on disk. The `PageType` 10 allocation page and the `PageType1` data page are all
    that is left. You just reduced 77 pages to 1.


    These results are not typical; you’re working with a data set that is optimized
    to display the power that page compression *can* potentially have on your data.


    When I discussed row compression, I talked about how it worked only on fixed-length
    data types. Page compression occurs at the binary level across the entire data
    page, so it is data-type agnostic. Meaning, Header


    Anchor Tags


    Dictionary Array


    Chad2004


    42.25


    82.34


    Brad2005


    Chadwick2010


    35.95


    24.76


    Bradford2009


    Compressed


    Chadster2010


    35.76


    24.95


    Brad2004


    Records


    Chad2005


    75.84


    67.34


    Bradster2010


    Slot Array


    `Figure 14-9.` Page compression starts with a page being row-compressed.


    simply, that if your data is in an `IN_ROW_DATA` page, it can be page-compressed.
    I’ll say more about that a little later when I discuss allocation units.


    So let’s walk through how data is compressed at the page level. I find that it
    is easier to explain at a text level instead of at a binary level. The important
    thing to take away is an understanding of the difference of the structures between
    a regular data page and a compressed data page. When you look at `Figure 14-9`,
    you’ll see a regular row-compressed data page. At this point, you can assume that
    row compression has been applied and all of the extra space has been removed from
    the records. You’ll see boxes for anchor tags and the dictionary array, and I’ll
    discuss these as we apply column prefix and dictionary compression, respectively.


    Now if you look at `Figure 14-10`, you see a page that has had column prefix compression
    applied. The way that it works is it goes through each row at a record level and
    finds the common prefix values. For column one, you can see the values `Chad2004`,
    `Chadwick2010`, `Chadster2010`, and `Chad2005`. The common prefix in each column
    is (`Chad`). Column prefix compression takes the longest value with the matching
    pattern, (`Chad`), and places it in the anchor tag—in this case, `Chadwick2010`.


    A special 2-bit value, symbolized by a `NULL`, takes the place of `Chadwick2010`,
    on Row 2 Column 1 of `Figure 14-10`. In that portion of the record, the `NULL`
    points to the anchor tag as the home of the data for that column. All the remaining
    rows are also altered, putting a numeric value in place to symbolize the number
    of characters to be read from the anchor tag to be applied to all of the other
    records in that column in order to be properly read, as shown in `Figure 14-10`.


    If you look at the other columns, you can begin to see the matching patterns.
    In Column 2, the only values that match are `35.95` and `35.76`. The common pattern
    is (`35.`), so `35.95` is placed in the anchor tag and the values in that column
    are replaced. There are two records in that column that do not have any values
    matching (`35.`): `42.25` and `75.84`. These columns will still get a value placed
    before them—in this case, a zero—which tells the read process that it does not
    need to go to the anchor tag to retrieve any data for this row.


    The same logic that applied to Column 2 is now applied to Column 3, with the matching
    value being (`24.`). Column 4 receives the same logic that was used on Column
    1 with the matching value being (`Brad`).


    Header


    Chadwick2010


    35.95


    24.95


    Bradford2009


    Anchor Tags


    Dictionary Array


    [4]2004


    [0]42.25


    [0]82.34


    [4]2005


    `NULL`


    `NULL`


    [3]76


    `NULL`


    Compressed


    [4]ster2010


    [3]76


    `NULL`


    [4]2004


    Records


    [4]2005


    [0]75.84


    [0]67.34


    [4]ster2010


    Slot Array


    `Figure 14-10.` A page-compressed record with column prefix compression applied.


    Now that row and column prefix compression have been applied, it is finally time
    for dictionary compression. `Figure 14-11` shows a page that is fully compressed,
    having had dictionary compression applied.


    Dictionary compression populates a dictionary array at the top of the page. The
    dictionary array is a 0-based multidimensional array. It will look across the
