  trans: '

    在查看了缺失索引建议之后，下一个寻找索引建议的地方是使用数据库引擎优化顾问（`DTA`）。`DTA` 是随 SQL Server 附带的一个索引工具，可用于评估工作负载或查询集合，以确定哪些索引对这些查询有用。此活动超越了前面章节讨论的缺失索引进程所给出的建议。缺失索引进程可以识别最适合作为索引进行物化的统计信息，而
    `DTA` 则能做得更多。例如，`DTA` 能够完成以下工作：


    • 建议对聚集索引进行更改


    • 识别何时分区会产生价值


    • 推荐非聚集索引


    通过自动化地使用 `DTA`，你可以更早地开始识别何时需要对超出缺失非聚集索引之外的索引进行更改。相反，你可以开始以最小的工作量深入钻研索引优化。你可以将重点从花费时间构思新索引，转移到验证建议并深入研究
    `DTA` 功能范围之外更复杂的性能问题上。


    **注意** 数据库引擎优化顾问（`DTA`）常常被高级数据库管理员和开发人员所回避。由于各种原因，它被视为索引和性能调优中一个不受欢迎的辅助工具。虽然并非所有建议都会被应用到生产环境中，但它所能完成的工作以及所替代的努力具有很高的价值。忽视
    `DTA` 的价值，就如同美国民间故事中试图与蒸汽动力工具赛跑的铁路工人的故事。最终，这个工具将我们从琐碎的工作中解放出来，以便我们能够拓展视野和技能。


    # 第 7 章 ■ 跳出思维定式看索引


    ## 收集工作负载


    为了测试一系列查询以确定它们是否需要额外的索引，你必须首先收集你希望发现索引机会的那些查询。收集工作负载有几种方法。在许多情况下，你可以询问同事他们认为哪些查询需要性能改进，你可以与开发人员核对他们认为应用程序最常使用的是什么，或者你可以请业务部门指出数据库中最重要的查询。


    所有这些方法的主要问题是，它们通常与 SQL Server 实际正在处理的查询没有直接关系。你的同事会知道他们认为存在的问题，但对于那些运行更频繁、每次只造成微小性能损耗从而持续消耗服务器资源的小型查询呢？虽然应用程序开发人员知道应用程序做什么，但他们不一定知道用户实际在使用什么以及使用频率。此外，对业务用户重要的功能和特性，可能并不是数据库中最需要帮助或应该成为主要关注点的活动。


    除了使用已讨论过的资源之外，另一种方法是让 SQL Server 实例或数据库告诉你最常用的查询。这样，你就可以查看这些查询，并通过 `DTA` 确定数据库上需要哪些索引。理想情况下，你会希望在应用程序生成的活动与应用程序生命周期的常见部分相匹配的时间段收集查询样本。如果业务的峰值活动发生在中午到下午
    5 点，那么你就需要捕获该时间段的工作负载。在夜间或早晨捕获活动将无法提供为数据库充分构建索引所需的信息。


    有几种方法可以收集你的工作负载。在本章中，我们将介绍两种最常用的方法：使用 `SQL Profiler` 和 `Extended Events`。对于每种方法，我们将了解如何设置和配置信息收集过程，以及如何自动化工作负载收集本身。

    '
- fmt: '# SQL Trace


    为 DTA 收集工作负载最常推荐的方法是使用 SQL Profiler 中的 **Tuning** 模板（参见图 7-7），并将其作为 SQL Trace
    会话启动。此模板专为与数据库引擎优化顾问配合使用而设计，以提供工作负载所需的查询。该模板包含以下三个事件，如图 7-8 所示：


    * RPC: Completed

    * SP: Completed

    * SQL: Batch Completed


    对于这些事件，会收集有关 SQL 语句、`SPID`、`DatabaseName`、`DatabaseID` 等信息。此模板提供了 DTA 能够提供推荐所需的所有信息。


    ![Image 86](index-181_1.png)

    *图 7-7. 选择 Tuning SQL Profiler 模板*


    ![Image 87](index-181_2.png)

    *图 7-8. Tuning 模板配置*


    ![Image 88](index-182_1.png)


    Tuning 模板中没有包含的一点是工作负载导出的过滤器。在某些情况下，您可能只想使用 DTA 检查单个数据库。如果是这种情况，您还需要将收集的工作负载限制在该数据库。可以通过向
    Profiler 会话添加过滤器来实现。


    例如，在接下来的场景中，DTA 将用于 `AdventureWorks2012`。要过滤工作负载，请向 `DatabaseName` 列的 `Like` 类别中添加一个过滤器，如图
    7-9 所示。


    *图 7-9. 将工作负载导出筛选至单个数据库*


    如果您熟悉 SQL Profiler，您可能已经知道使用 SQL Profiler 收集工作负载可能很麻烦。使用 SQL Profiler，所有事件都需要从
    SQL Server 传递到运行跟踪的工作站。此外，信息仅存储在 GUI 中，而 DTA 在运行工作负载时无法使用这些信息。


    为了解决这些问题，您需要创建一个与 Tuning 模板相同的 SQL Trace 会话。


    使用清单 7-7 中的代码，您可以创建此会话。或者，您也可以将会话导出到文件并获得类似的脚本。提供的脚本与通过 SQL Profiler 获得的脚本之间的主要区别在于跟踪文件的变量和提供的脚本中增加的跟踪文件大小（50
    MB）。


    *清单 7-7. 用于 Tuning 模板的 SQL Trace 会话*


    ```sql

    -- Create a Queue

    declare @rc int

    declare @TraceID int

    declare @maxfilesize BIGINT

    DECLARE @tracefile NVARCHAR(255) = ''c:\temp\index_workload''

    set @maxfilesize = 50


    exec @rc = sp_trace_create @TraceID output, 0, @tracefile, @maxfilesize, NULL

    if (@rc != 0) goto error


    -- Set the events

    declare @on bit

    set @on = 1


    exec sp_trace_setevent @TraceID, 10, 1, @on

    exec sp_trace_setevent @TraceID, 10, 3, @on

    exec sp_trace_setevent @TraceID, 10, 11, @on

    exec sp_trace_setevent @TraceID, 10, 12, @on

    exec sp_trace_setevent @TraceID, 10, 13, @on

    exec sp_trace_setevent @TraceID, 10, 35, @on

    exec sp_trace_setevent @TraceID, 45, 1, @on

    exec sp_trace_setevent @TraceID, 45, 3, @on

    exec sp_trace_setevent @TraceID, 45, 11, @on

    exec sp_trace_setevent @TraceID, 45, 12, @on

    exec sp_trace_setevent @TraceID, 45, 13, @on

    exec sp_trace_setevent @TraceID, 45, 28, @on

    exec sp_trace_setevent @TraceID, 45, 35, @on

    exec sp_trace_setevent @TraceID, 12, 1, @on

    exec sp_trace_setevent @TraceID, 12, 3, @on

    exec sp_trace_setevent @TraceID, 12, 11, @on

    exec sp_trace_setevent @TraceID, 12, 12, @on

    exec sp_trace_setevent @TraceID, 12, 13, @on

    exec sp_trace_setevent @TraceID, 12, 35, @on


    -- Set the Filters

    declare @intfilter int

    declare @bigintfilter bigint

    exec sp_trace_setfilter @TraceID, 35, 0, 6, N''AdventureWorks2012''


    -- Set the trace status to start

    exec sp_trace_setstatus @TraceID, 1


    -- display trace id for future references

    select TraceID=@TraceID


    goto finish


    error:

    select ErrorCode=@rc


    finish:

    go

    ```


    当您准备好后，运行脚本开始收集工作负载。一段时间后，您将需要停止跟踪会话，以便使用输出的跟踪数据。请确保运行足够长的时间以收集足够的查询，从而代表您环境中有价值的工作负载。要停止会话，您可以使用
    `sp_trace_setstatus` 存储过程。


    # Extended Events


    DTA 的一个可能来源是包含 SQL 语句的表；您也可以使用扩展事件来收集工作负载。通常，这将提供与 SQL Trace 会话相同的信息。


    有几个差异使得扩展事件的使用更具吸引力。


    首先，您可以更精细地控制为事件收集的内容。每个事件都带有许多基础列，但您可以添加更多列以满足您的需求。当然，您可以添加更多事件以将会话用于其他活动。其次，您可以更好地控制目标，例如决定是否要保留所有事件（无论何种情况），或者是否可以丢弃某些事件以仅捕获事件的样本。最后，扩展事件中的许多事件比
    SQL Trace 中的类似事件性能显著更好。通过较低的开销，您能够更频繁地进行调查，而无需过多担心活动的影响。


    如前所述，要将扩展事件与 DTA 一起使用，事件需要存储在表中。清单 7-8 中提供的表定义与基于 Tuning 模板保存 SQL Profiler 会话时创建的表定义相匹配。该表包含一个
    `RowNumber` 列，然后是为收集的跟踪的每个属性设置的一列。


    *清单 7-8. 用于扩展事件工作负载的表*


    ```sql

    CREATE TABLE dbo.indexing_workload(

    RowNumber int IDENTITY(0,1) NOT NULL,

    EventClass int NULL,

    TextData nvarchar(max) NULL,

    Duration bigint NULL,

    SPID int NULL,

    DatabaseID int NULL,

    DatabaseName nvarchar(128) NULL,

    ObjectType int NULL,

    LoginName nvarchar(128) NULL,

    BinaryData varbinary(max) NULL,

    PRIMARY KEY CLUSTERED (RowNumber ASC))

    ```


    有了表之后，下一步是创建扩展事件会话。首先，我们将通过 SQL Server Management Studio (SSMS) 构建会话，然后将会话脚本化，以便根据需要进行自定义。开始时，在
    SSMS 的对象资源管理器中浏览到 `Management` > `Extended Events` 节点。在这里，右键单击 `Sessions` 并选择
    `New Session Wizard` 选项，如图 7-10 所示。


    ![Image 89](index-185_1.png)

    *图 7-10. 在对象资源管理器中浏览扩展事件*


    会话向导将启动一个介绍屏幕。从此屏幕中，选择 `Next` 选项。如果您愿意，可以选择 “Do not show this page again” 选项以避免将来显示此屏幕。


    向导的下一个屏幕是“设置会话属性”屏幕，如图 7-11 所示。在这里，您将命名扩展事件会话。对于此示例，键入 `indexing_workload`；这与您计划执行的活动相匹配。同时，选择
    “Start the event session at server startup” 以确保在服务器因维护或实例故障转移而停止时，数据仍能被收集。


    扩展事件的此功能使其作为工作负载来源优于 SQL Trace，因为 SQL Trace 会话在 SQL Server 实例重新启动后必须重新创建才能使用。


    单击 `Next` 继续。


    ![Image 90](index-186_1.png)

    *图 7-11. 扩展事件向导的“设置会话属性”屏幕*


    向导的下一个屏幕包含用于选择模板的选项，如图 7-12 所示。'
  raw: 'SQL Trace


    The most often recommended approach for collecting a workload for DTA is to use
    the Tuning template from SQL Profiler (see Figure 7-7) and launching it as a SQL
    Trace session. The Tuning template is specifically designed for use with the Database
    Engine Tuning Advisor to provide the queries necessary for a workload. Within
    the template are the following three events, shown in Figure 7-8:


    • RPC: Completed


    • SP: Completed


    •


    SQL: Batch Completed


    For these events, information on the SQL statements, SPID, DatabaseName, DatabaseID,
    and others are collected. This template provides all of the information necessary
    for DTA to be able to provide recommendations.


    ![Image 86](index-181_1.png)


    ![Image 87](index-181_2.png)


    chapter 7 ■ IndexIng OutsIde the BuBBle


    ***Figure 7-7.** Select the Tuning SQL Profiler template*


    ***Figure 7-8.** Tuning template configuration*


    ![Image 88](index-182_1.png)


    chapter 7 ■ IndexIng OutsIde the BuBBle


    One piece not included in the Tuning template is a filter for the workload export.
    In some cases, you might want to only examine a single database at a time with
    the DTA. If that is the case, you’ll also want to limit the workload collected
    down to that database. You can do so by adding a filter to the Profiler session.


    For example, in the upcoming scenario, the DTA will be used against AdventureWorks2012\.
    To filter the workload, add a filter to the DatabaseName column in the Like category,
    as shown in Figure 7-9.


    ***Figure 7-9.** Filtering the workload export to a single database*


    If you are familiar with SQL Profiler, you’ll likely already know that collecting
    a workload using SQL


    Profiler can be burdensome. With SQL Profiler, all of the events need to be passed
    from SQL Server to the workstation running the trace. Also, the information is
    stored only in the GUI, which can’t be used by DTA when running the workload.


    To get around these issues, you will want to create a SQL Trace session identical
    to the Tuning temple.


    Using the code in Listing 7-7, you can create this session. Alternatively, you
    can also export a SQL Profiler session to a file and obtain a script similar to
    the one provided. The primary difference between the script provided and the one
    available through SQL Profiler is the variable for the trace file and increased
    size (50


    MB) for the trace files in the provided script.


    ***Listing 7-7.** SQL Trace Session for Tuning Template*


    -- Create a Queue


    declare @rcint


    declare @TraceIDint


    declare @maxfilesize BIGINT


    DECLARE @tracefile NVARCHAR(255) = ''c:\temp\index_workload''


    set @maxfilesize = 50


    chapter 7 ■ IndexIng OutsIde the BuBBle


    exec @rc = sp_trace_create @TraceID output, 0, @tracefile, @maxfilesize, NULL


    if (@rc != 0) goto error


    -- Set the events


    declare @on bit


    set @on = 1


    exec sp_trace_setevent @TraceID, 10, 1, @on


    exec sp_trace_setevent @TraceID, 10, 3, @on


    exec sp_trace_setevent @TraceID, 10, 11, @on


    exec sp_trace_setevent @TraceID, 10, 12, @on


    exec sp_trace_setevent @TraceID, 10, 13, @on


    exec sp_trace_setevent @TraceID, 10, 35, @on


    exec sp_trace_setevent @TraceID, 45, 1, @on


    exec sp_trace_setevent @TraceID, 45, 3, @on


    exec sp_trace_setevent @TraceID, 45, 11, @on


    exec sp_trace_setevent @TraceID, 45, 12, @on


    exec sp_trace_setevent @TraceID, 45, 13, @on


    exec sp_trace_setevent @TraceID, 45, 28, @on


    exec sp_trace_setevent @TraceID, 45, 35, @on


    exec sp_trace_setevent @TraceID, 12, 1, @on


    exec sp_trace_setevent @TraceID, 12, 3, @on


    exec sp_trace_setevent @TraceID, 12, 11, @on


    exec sp_trace_setevent @TraceID, 12, 12, @on


    exec sp_trace_setevent @TraceID, 12, 13, @on


    exec sp_trace_setevent @TraceID, 12, 35, @on


    -- Set the Filters


    declare @intfilter int


    declare @bigintfilter bigint


    exec sp_trace_setfilter @TraceID, 35, 0, 6, N''AdventureWorks2012''


    -- Set the trace status to start


    exec sp_trace_setstatus @TraceID, 1


    -- display trace id for future references


    select TraceID=@TraceID


    goto finish


    error:


    select ErrorCode=@rc


    finish:


    go


    When you’re ready, run the script to start collecting the workload. After a while,
    you will need to stop the trace session so that you can use the trace data that
    is output. Be certain to run the workload long enough to collect enough queries
    to represent a worthwhile workload from your environment. To stop the session
    you can use the sp_trace_setstatus stored procedure.


    chapter 7 ■ IndexIng OutsIde the BuBBle


    Extended Events


    One of the possible sources for the DTA is a table that contains SQL statements;
    you can also use extended events to collect your workload. Generally, this will
    provide the same information as the SQL Trace session.


    There are a few differences that make the use of extended events a bit more appealing.


    First, you have more control on what is collected for the event. Each event comes
    with a number of base columns, but you can add more to fit your needs. Of course,
    you can add more events to use the session for additional activities. Second,
    you have more control over the targets, such as being able to determine whether
    you want all events, no matter what, or some events can be dropped to just capture
    a sample of the events. Finally, many events within extended events perform substantially
    better than the similar event does in SQL Trace. Through the lower overhead, you
    are able to investigate more often with less concern over the impact of your activities.


    As already mentioned, to use extended events with the DTA, the events will need
    to be stored in a table. The table definition, provided in Listing 7-8, matches
    the definition of a table that would be created when saving the SQL Profiler session
    based on the Tuning template. The table contains a RowNumber column and then a
    column for each of the attributes of the trace being collected.


    ***Listing 7-8.** Table for Extended Events Workload*


    CREATE TABLE dbo.indexing_workload(


    RowNumber int IDENTITY(0,1) NOT NULL,


    EventClassint NULL,


    TextData nvarchar(max) NULL,


    Duration bigint NULL,


    SPID int NULL,


    DatabaseID int NULL,


    DatabaseName nvarchar(128) NULL,


    ObjectType int NULL,


    LoginName nvarchar(128) NULL,


    BinaryData varbinary(max) NULL,


    PRIMARY KEY CLUSTERED (RowNumber ASC))


    With the table in place, the next step is to create the extended event session.
    To start, we’ll build the session through SQL Server Management Studio (SSMS),
    and then script out the session to allow it to be customized as you require. Begin
    by browsing through SSMS to the Management à Extended Events node in the Object
    Explorer. From here right-click on Sessions and select the option for New Session
    Wizard, as shown in Figure 7-10.


    ![Image 89](index-185_1.png)


    chapter 7 ■ IndexIng OutsIde the BuBBle


    ***Figure 7-10.** Browse Object Explorer for extended events*


    The session wizard will launch an introduction screen. From this screen, select
    the Next option. If you would like, you can select the “Do not show this page
    again” option to avoid this screen in the future.


    The next screen in the wizard is the Set Session Properties screen, which is shown
    in Figure 7-11\. Here, you will name the extended events session. For this example,
    type *indexing_workload*; this matches the activities that you are planning to
    perform. Also, select “Start the event session at server startup” to make certain
    that when the server stops for maintenance or a instance failover that the data
    is still collected.


    This functionality of extended events makes using extended events as the workload
    source superior to SQL


    Trace, because a SQL Trace session will have to be re-created to be used after
    a SQL Server instance restart.


    Click Next to continue.


    ![Image 90](index-186_1.png)


    chapter 7 ■ IndexIng OutsIde the BuBBle


    ***Figure 7-11.** Extended events wizard Set Session Properties screen*


    The next screen of the wizard contains the options for choosing a template, as
    shown in Figure 7-12.'
  trans: '# SQL 跟踪


    为 DTA 收集工作负载最常推荐的方法是使用 SQL Profiler 中的 **优化** 模板（参见图 7-7），并将其作为 SQL 跟踪会话启动。此模板专为与数据库引擎优化顾问配合使用而设计，以提供工作负载所需的查询。该模板包含了以下三个事件，如图
    7-8 所示：


    * RPC: Completed

    * SP: Completed

    * SQL: Batch Completed


    对于这些事件，会收集有关 SQL 语句、`SPID`、`DatabaseName`、`DatabaseID` 等信息。此模板提供了 DTA 能够提供推荐所需的所有信息。


    ![Image 86](img/index-181_1.png)

    *图 7-7. 选择优化 SQL Profiler 模板*


    ![Image 87](img/index-181_2.png)

    *图 7-8. 优化模板配置*


    ![Image 88](img/index-182_1.png)


    优化模板中没有包含的一点是工作负载导出的过滤器。在某些情况下，您可能只想使用 DTA 检查单个数据库。如果是这种情况，您还需要将收集的工作负载限制在该数据库。可以通过向
    Profiler 会话添加过滤器来实现。


    例如，在接下来的场景中，DTA 将用于 `AdventureWorks2012`。要过滤工作负载，请向 `DatabaseName` 列的 `Like` 类别中添加一个过滤器，如图
    7-9 所示。


    *图 7-9. 将工作负载导出筛选至单个数据库*


    如果您熟悉 SQL Profiler，您可能已经知道使用 SQL Profiler 收集工作负载可能很麻烦。使用 SQL Profiler，所有事件都需要从
    SQL Server 传递到运行跟踪的工作站。此外，信息仅存储在 GUI 中，而 DTA 在运行工作负载时无法使用这些信息。


    为了解决这些问题，您需要创建一个与优化模板相同的 SQL 跟踪会话。


    使用清单 7-7 中的代码，您可以创建此会话。或者，您也可以将会话导出到文件并获得类似的脚本。提供的脚本与通过 SQL Profiler 获得的脚本之间的主要区别在于跟踪文件的变量和提供的脚本中增加的跟踪文件大小（50
    MB）。


    *清单 7-7. 用于优化模板的 SQL 跟踪会话*


    ```sql

    -- Create a Queue

    declare @rc int

    declare @TraceID int

    declare @maxfilesize BIGINT

    DECLARE @tracefile NVARCHAR(255) = ''c:\temp\index_workload''

    set @maxfilesize = 50


    exec @rc = sp_trace_create @TraceID output, 0, @tracefile, @maxfilesize, NULL

    if (@rc != 0) goto error


    -- Set the events

    declare @on bit

    set @on = 1


    exec sp_trace_setevent @TraceID, 10, 1, @on

    exec sp_trace_setevent @TraceID, 10, 3, @on

    exec sp_trace_setevent @TraceID, 10, 11, @on

    exec sp_trace_setevent @TraceID, 10, 12, @on

    exec sp_trace_setevent @TraceID, 10, 13, @on

    exec sp_trace_setevent @TraceID, 10, 35, @on

    exec sp_trace_setevent @TraceID, 45, 1, @on

    exec sp_trace_setevent @TraceID, 45, 3, @on

    exec sp_trace_setevent @TraceID, 45, 11, @on

    exec sp_trace_setevent @TraceID, 45, 12, @on

    exec sp_trace_setevent @TraceID, 45, 13, @on

    exec sp_trace_setevent @TraceID, 45, 28, @on

    exec sp_trace_setevent @TraceID, 45, 35, @on

    exec sp_trace_setevent @TraceID, 12, 1, @on

    exec sp_trace_setevent @TraceID, 12, 3, @on

    exec sp_trace_setevent @TraceID, 12, 11, @on

    exec sp_trace_setevent @TraceID, 12, 12, @on

    exec sp_trace_setevent @TraceID, 12, 13, @on

    exec sp_trace_setevent @TraceID, 12, 35, @on


    -- Set the Filters

    declare @intfilter int

    declare @bigintfilter bigint

    exec sp_trace_setfilter @TraceID, 35, 0, 6, N''AdventureWorks2012''


    -- Set the trace status to start

    exec sp_trace_setstatus @TraceID, 1


    -- display trace id for future references

    select TraceID=@TraceID


    goto finish


    error:

    select ErrorCode=@rc


    finish:

    go

    ```


    当您准备好后，运行脚本开始收集工作负载。一段时间后，您将需要停止跟踪会话，以便使用输出的跟踪数据。请确保运行足够长的时间以收集足够的查询，从而代表您环境中有价值的工作负载。要停止会话，您可以使用
    `sp_trace_setstatus` 存储过程。


    # 扩展事件


    DTA 的一个可能来源是包含 SQL 语句的表；您也可以使用扩展事件来收集工作负载。通常，这将提供与 SQL 跟踪会话相同的信息。


    有几个差异使得扩展事件的使用更具吸引力。


    首先，您可以更精细地控制为事件收集的内容。每个事件都带有许多基础列，但您可以添加更多列以满足您的需求。当然，您可以添加更多事件以将会话用于其他活动。其次，您可以更好地控制目标，例如决定是否要保留所有事件（无论何种情况），或者是否可以丢弃某些事件以仅捕获事件的样本。最后，扩展事件中的许多事件比
    SQL 跟踪中的类似事件性能显著更好。通过较低的开销，您能够更频繁地进行调查，而无需过多担心活动的影响。


    如前所述，要将扩展事件与 DTA 一起使用，事件需要存储在表中。清单 7-8 中提供的表定义与基于优化模板保存 SQL Profiler 会话时创建的表定义相匹配。该表包含一个
    `RowNumber` 列，然后是为收集的跟踪的每个属性设置的一列。


    *清单 7-8. 用于扩展事件工作负载的表*


    ```sql

    CREATE TABLE dbo.indexing_workload(

    RowNumber int IDENTITY(0,1) NOT NULL,

    EventClass int NULL,

    TextData nvarchar(max) NULL,

    Duration bigint NULL,

    SPID int NULL,

    DatabaseID int NULL,

    DatabaseName nvarchar(128) NULL,

    ObjectType int NULL,

    LoginName nvarchar(128) NULL,

    BinaryData varbinary(max) NULL,

    PRIMARY KEY CLUSTERED (RowNumber ASC))

    ```


    有了表之后，下一步是创建扩展事件会话。首先，我们将通过 SQL Server Management Studio (SSMS) 构建会话，然后将会话脚本化，以便根据需要进行自定义。开始时，在
    SSMS 的对象资源管理器中浏览到 `Management` > `Extended Events` 节点。在这里，右键单击 `Sessions` 并选择
    `New Session Wizard` 选项，如图 7-10 所示。


    ![Image 89](img/index-185_1.png)

    *图 7-10. 在对象资源管理器中浏览扩展事件*


    会话向导将启动一个介绍屏幕。从此屏幕中，选择 `Next` 选项。如果您愿意，可以选择 “Do not show this page again” 选项以避免将来显示此屏幕。


    向导的下一个屏幕是“设置会话属性”屏幕，如图 7-11 所示。在这里，您将命名扩展事件会话。对于此示例，键入 `indexing_workload`；这与您计划执行的活动相匹配。同时，选择
    “Start the event session at server startup” 以确保在服务器因维护或实例故障转移而停止时，数据仍能被收集。


    扩展事件的此功能使其作为工作负载来源优于 SQL 跟踪，因为 SQL 跟踪会话在 SQL Server 实例重新启动后必须重新创建才能使用。


    单击 `Next` 继续。


    ![Image 90](img/index-186_1.png)

    *图 7-11. 扩展事件向导的“设置会话属性”屏幕*


    向导的下一个屏幕包含用于选择模板的选项，如图 7-12 所示。'
- fmt: "# 第7章：气泡之外的索引\n\n## Figure 7-12. Extended events wizard Choose Template screen\n\
    有许多模板可用，但我们正在追踪特定事件，因此不会使用模板。选择“Do not use a template”选项，然后选择Next。\n\n![Image\
    \ 91](index-187_1.png)\n\n下一步是选择通过扩展事件会话捕获的事件。这些在向导的“Select Events To Capture”屏幕中进行配置。要配置一个类似于SQL\
    \ Profiler Tuning会话的会话，你需要在扩展事件中选择与`RPC: Completed`、`SP: Completed`和`SQL: Batch\
    \ Completed`事件匹配的事件。发现这些事件最简单的方法是使用事件筛选器，并检索所有名称中包含单词`completed`的事件，如图7-13所示。要选择的事件是`rpc_completed`、`sp_statement_completed`和`sql_statement_completed`。选择这些事件后，单击Next按钮继续。\n\
    \n## Figure 7-13. Extended events wizard Select Events To Capture screen\n![Image\
    \ 92](index-188_1.png)\n\n## Figure 7-14. Extended events wizard Capture Global\
    \ Fields screen\n每个扩展事件都有自己的一组列，但这些列并不能覆盖将扩展事件会话与SQL跟踪会话匹配所需的所有列。为此，你需要在向导的“Capture\
    \ Global Fields”屏幕中为会话添加一些额外的列。要包含的附加字段如图7-14所示，如下所示：\n* `database_id`\n* `database_name`\n\
    * `session_id`\n* `username`\n\n选择全局字段后，单击Next按钮继续到向导的下一个屏幕。\n\n![Image 93](index-189_1.png)\n\
    \n## Figure 7-15. Extended events wizard Set Session Event Filters screen\n构建会话的下一步是通过“Set\
    \ Session Event Filters”屏幕（如图7-15所示）向会话添加筛选条件。对于大多数负载，有两个筛选器是值得使用的。第一个使用`is_system`字段筛选器移除系统活动，因为我们不会为系统表建立索引。第二个将事件限制为我们希望改进索引的数据库中发生的事件。在本例中，仅限于`AdventureWorks2012`数据库，该库在本章使用的演示服务器上的数据库ID为18。\n\
    \n你可以使用`database_name`或`database_id`列进行筛选。通常更倾向于使用`database_id`列，因为筛选的数据类型更小。另一方面，使用`database_name`进行筛选更易于在服务器之间移植，因为这些服务器的`database_id`值可能并不相同。在构建筛选器时，按选择性从高到低的顺序配置它们非常重要，因为扩展事件筛选支持短路求值。\n\
    \n![Image 94](index-190_1.png)\n\n## Figure 7-16. Extended events wizard Specify\
    \ Session Data Storage screen\n配置扩展事件会话的最后一步是为事件配置目标。在“Specify Session Data Storage”屏幕（如图7-16所示）上，选择“Save\
    \ data to a file for later analysis (event_file target)”选项。你可以使用默认的文件位置，但应确保该位置不会与其他更重要的I/O活动（如`tempdb`和事务文件）冲突。\n\
    \n单击Next继续，或单击Finish以构建并启动会话。向导的下一个屏幕汇总会话并构建会话。\n\n![Image 95](index-191_1.png)\n\
    \n除了通过向导构建扩展事件会话外，你还可以通过T-SQL DDL命令构建会话。为此，你将使用`CREATE EVENT SESSION`语句，如清单7-9所示，该语句在单个语句中包含了事件、操作、谓词和目标信息。\n\
    \n当你想要在许多服务器上构建和创建会话时，使用DDL要容易得多，并且可以避免反复使用向导。向导创建的会话与清单7-9中提供的会话的一个区别是，后者在会话中包含了`EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS`选项。建议使用此选项，因为它允许扩展事件会话在服务器因其他活动而负载过重时丢弃事件。一般来说，这应该是可以接受的，但你可能希望允许这样做。\n\
    \n## Listing 7-9. Create Extended Events Session\n```\nCREATE EVENT SESSION [indexing_workload]\
    \ ON SERVER\nADD EVENT sqlserver.rpc_completed(\n    SET collect_data_stream=(1),collect_statement=(1)\n\
    \    ACTION(sqlserver.database_id,sqlserver.database_name\n          ,sqlserver.session_id,sqlserver.username)\n\
    \    WHERE (([sqlserver].[is_system]=(0))\n           AND ([sqlserver].[database_id]=(18)))),\n\
    ADD EVENT sqlserver.sp_statement_completed(\n    ACTION(sqlserver.database_id,sqlserver.database_name\n\
    \          ,sqlserver.session_id,sqlserver.username)\n    WHERE (([sqlserver].[is_system]=(0))\n\
    \           AND ([sqlserver].[database_id]=(18)))),\nADD EVENT sqlserver.sql_statement_completed(\n\
    \    ACTION(sqlserver.database_id,sqlserver.database_name\n          ,sqlserver.session_id,sqlserver.username)\n\
    \    WHERE (([sqlserver].[is_system]=(0))\n           AND ([sqlserver].[database_id]=(18))))\n\
    ADD TARGET package0.event_file(\n    SET filename=N'C:\\temp\\indexing_workload.xel')\n\
    WITH (STARTUP_STATE=ON,EVENT_RETENTION_MODE=ALLOW_SINGLE_EVENT_LOSS)\nGO\n```\n\
    \n创建会话后，你需要启动会话以开始收集事件。\n\n会话应运行本节开头确定的时间段。清单7-10中提供的代码可用于启动和停止会话。\n\n## Listing\
    \ 7-10. Start and Stop the Session\n```\n--Start Session\nALTER EVENT SESSION\
    \ indexing_workload ON SERVER STATE = START\nGO\n--Stop Session\nALTER EVENT SESSION\
    \ indexing_workload ON SERVER STATE = STOP\nGO\n```\n\n当扩展事件会话停止后，需要将会话中的数据插入到表`dbo.indexing_workload`中，该表在清单7-8中创建。清单7-11展示了我们如何完成此操作。因为扩展事件会话输出到文件目标，所以使用函数`sys.fn_xe_file_target_read_file`将数据读回SQL\
    \ Server。在此场景中使用文件目标的一个好处是，文件可以读入任何服务器；这意味着你可以在任何服务器上执行分析，特别是不必在生产服务器上进行。\n\n\
    ## Listing 7-11. Insert Extended Event Session into dbo.indexing_workload\n```\n\
    WITH indexing_workload AS (\n    SELECT object_name as event\n          ,CONVERT(xml,\
    \ event_data) as XMLData\n    FROM sys.fn_xe_file_target_read_file\n        ('C:\\\
    temp\\indexing_workload*.xel'\n        , 'C:\\temp\\indexing_workload*.xem'\n\
    \        , null, null))\nINSERT INTO dbo.indexing_workload\n(\n    EventClass\n\
    \    , TextData\n    , Duration\n    , SPID\n    , DatabaseID\n    , DatabaseName\n\
    \    , ObjectType\n    , LoginName\n    , BinaryData\n)\nSELECT\n    CASE event\n\
    \        WHEN 'sp_statement_completed' THEN 43\n        WHEN 'sql_statement_completed'\
