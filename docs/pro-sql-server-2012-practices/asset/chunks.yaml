    ## 准备数据库


    在理想情况下，您将拥有无限的空间和与生产环境完全匹配的测试服务器。但我们并非都生活在理想世界中，这意味着在寻找与生产环境相同的数据库进行索引测试时，我们常常只能使用一个空间远小于生产数据库的服务器。因此，需要一种方法来测试一个尽可能与生产环境相似的数据库上的工作负载，以便得到的建议与在生产环境中运行测试所得到的建议相同。


    我们可以通过通常被称为 *克隆* 数据库的过程来找到问题的解决方案。克隆数据库是指在目标服务器上包含源数据库确切架构的数据库，同时还包含来自源的统计信息和直方图信息。在这种情况下，目标数据库中生成的执行计划将与源数据库中生成的执行计划相同。因为两个数据库中会生成相同的执行计划，所以使用的或需要的索引也将相同。


    有多种方法可以克隆数据库。您可以使用 SSMS 中的生成脚本向导。您可以还原一个数据库，禁用统计信息更新，然后删除所有数据。或者您可以利用 PowerShell
    和服务器管理对象 (`SMO`) 来构建脚本。使用 PowerShell 脚本的优势在于可以一次构建该过程并反复运行。因为您会希望随时间运行多个工作负载，所以最佳选择是使用易于重复的解决方案。


    使用 PowerShell 克隆数据库只需几个步骤。这些步骤如下：

