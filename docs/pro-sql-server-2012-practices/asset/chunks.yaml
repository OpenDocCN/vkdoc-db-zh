    \ 所有属性必须是关于主键的事实，且仅关于主键。\n\n- **第四范式** 实体中不能表示多于一个多值依赖。此范式专门处理键内属性的关系，确保表代表单个实体。\n\
    \n- **第五范式** 一个通用规则，用于分解那些未被额外规则特别清除的任何数据冗余。如果一个表有一个包含多于两列的键，并且你可以将其分解为具有两列键的表，并保证通过连接它们能重新得到原表，那么该表就不是第五范式。第五范式涵盖的数据冗余形式在典型设计中很少被违反。\n\
    \n> **注意** 第四和第五范式在下一节的实际应用中对你来说会变得更加明显。它们很少被涵盖的主要原因不是它们不有趣，而是因为它们描述起来并不太容易。然而，两者的示例都很容易找到。\n\
    \n还有其他更理论化的范式，我不会提及，因为你甚至很少会遇到它们。在开发周期的现实中，所述规则并非铁律，而仅仅是你可以用来避免某些陷阱的指导原则。在实践中，你最终可能会得到*反规范化*（意味着为了某个明确、已理解的目的而故意违反规范化原则，而不是为了更快地完成工作而忽略规则，后者应称为*未规范化*）。\n\
    \n反规范化主要是为了满足数据消费者（程序员、查询者和其他用户）的某些编程或性能需求。\n\n一旦你深入“理解”了规范化的概念，你会发现构建数据库就像搭建一个精心构思的乐高作品。你会在拼装零件之前设计好每个部分如何融入整体，因为就像拆解\
    \ 1000 块乐高积木来做个小改动会让乐高搭建更像是工作而不是乐趣一样，数据库设计几乎一开始就是工作，并且通常伴随着一个不断看手表并向你投来指责面孔的经理。基于保持过程敏捷可能需要一些重建，但你提前计划得越多，需要重新整理的数据就越少。\n\
    \n## 实际应用\n\n在实践中，根本不引用规则的正式定义。相反，引用的是它们所包含的指导原则。我牢记以下四个概念来指导我正在构建的数据库的设计，对于真正烦人或复杂的问题，我会回溯到更具体的规则：\n\
    \n- **列** 确保每一列只代表一个值。\n- **表/行唯一性** 一行代表一个独立的事物，并且该事物不会在其他地方表示。\n- **列仅依赖于整个键**\
    \ 列要么是键的一部分，要么描述由键标识的行。\n- **键始终表示单个表达式** 确保三个或更多键值之间的依赖关系是正确的。\n\n在本节中，我将提供一些例子来巩固这些定义，但在这里理解“原子”这个术语是个好时机：*原子*是描述一个值不能再被分解而不改变其本质的常用方式。例如，一个水分子由氢和氧组成。在分子内部，如果你凑得非常近，你可以看到两种类型的原子。你可以把它们分开，你仍然拥有氢和氧。尝试分裂氢，它会变成完全不同的东西（而且你的邻居们会非常不高兴）。在\
    \ SQL 中，你需要将事物分解到易于使用且不超出必要范围改变含义的级别。\n\n分解到原子级别的表和列在它们的编程接口中只有一个，并且只有一个含义。如果你永远不需要使用\
    \ SQL 来使用列的一部分，那么单个列是完美的。（用户在屏幕上使用的备注集是一个很好的例子。）你不会想要一个段落表、句子表和字符表来存储这些信息，因为整个值应该只作为整体才有用。如果你正在构建一个计算该文档字符数的系统，那么每行一个字符可能是个好主意。"
- fmt: '## 表格与列的设计原则


    如果你的表格设计得过于粗糙，那么每一行数据可能会包含多种永远没有共同点的含义。例如，如果一行代表一只狒狒，另一行代表一位经理，尽管其喜剧价值堪比黄金，但几乎不可能有编程上的理由将两者合并到同一行中。太多人试图让对象变得极其通用，结果导致它们丧失了所有意义。也有些人把表格设计得过于具体，花费了大量的编码和编程时间来重新组装项目以供使用。


    以列为例，考虑一个存储车辆品牌、型号和颜色的列。用户将不得不解析数据以找出蓝色车辆。因此，他们需要了解数据的格式才能提取数据，最终数据库管理员会意识到，所有这些数据解析正在拖慢系统，而一开始就使用三个独立的列会让情况好得多。


    同时，我们可能都同意，汽车型号名称应该存储在单独的列中，对吧？但如果你为第一个字符、最后一个字符和中间字符分别创建列呢？那样不是更符合规范化吗？有可能，但前提是如果你确实需要经常独立地对第一个和最后一个字符进行编程。你可以看到这里的例子相当愚蠢，大多数设计师在事情变得奇怪之前就停止了设计。但就像医生在检查你认为很恶心的伤口时会告诉你“这没什么，你应该看看……”一样，几句话之后，你会庆幸自己是个计算机程序员。糟糕设计的真实例子远比本章中能列举的任何例子都要可怕得多。


    ### 列


    **确保每一列只代表一个值。**


    对于列的目标是确保每一列只代表一个值，其主要目的是为了性能。SQL Server 中的索引具有作为完整列值的键值，并且它们根据完整的列值进行排序。这就导致希望大多数（如果不是全部，但肯定是大多数）搜索使用整个值。索引最适合用于等值比较，其次适合用于进行范围比较。部分值通常是不受欢迎的，唯一像样的部分值用法是使用最左侧字符或二进制值的字符串或二进制值，因为那是数据在索引中的排序方式。公平地说，索引可以用于扫描值，以减轻访问表数据（以及可能溢出）页面的需要，但这绝对不是理想的利用方式。


    为了最大化索引的使用，你应该永远不需要解析一个列来获取单一的数据片段。一个常见的场景是一个包含逗号分隔值列表的列。例如，你有一个存储待售书籍的表格。为了使数据显示更自然，构建了以下表（表的键是
    `BookISBN`）：


    | BookISBN   | BookTitle     | BookPublisher | Authors         |

    |------------|---------------|---------------|-----------------|

    | 111111111  | Normalization | Apress        | Louis           |

    | 222222222  | T-SQL         | Apress        | Michael         |

    | 333333333  | Indexing      | Microsoft     | Kim             |

    | 444444444  | DB Design     | Apress        | Louis, Jessica  |


    表面上看，这种设计使得开发人员可以轻松创建编辑界面，用户可以输入数据等等。然而，尽管初始开发并不困难，但在任何需要区分作者的情况下使用数据就变得困难了。哪些书是
    Louis 作为作者的？嗯，可以用下面的查询？很简单，对吧？


    ```sql

    SELECT BookISBN, BookTitle

    FROM Book

    WHERE Authors LIKE ''%Louis%''

    ```


    是的，这确实是大多数设计师一开始会做的事。对于我们的数据，它确实有效。


    但是当作者“Louise”被添加时会发生什么？而且对任何人来说可能都很明显，两个都叫 Louis 的人可能合著一本书，所以你需要的不仅仅是作者的名字。问题在于你是否应该有
    `AuthorFirstName` 和 `AuthorLastName`——即两个列，一个包含“Louis, Jessica”，另一个包含“Davidson,
    Moss”。关于作者的其他信息呢？当用户使用“&”而不是“,”时会发生什么？嗯，这些是你在进行设计时，而不是在代码编写之后，应该思考的问题。


    如果你为名字设置了多个列，使用逗号分隔的解决方案可能看起来不合逻辑，因此用户经常会想出其他巧妙的解决方案。如果你输入一本 ISBN 号为 `444444444`
    的书，表格如下所示（这个集合的键是 `BookISBN` 列）：


    | BookISBN   | BookTitle | BookPublisher | AuthorFirstName | AuthorLastName |

    |------------|-----------|---------------|-----------------|----------------|

    | 444444444  | DB Design | Apress        | Jessica         | Moss           |


    这很好，但现在用户需要添加另一位作者，而`她的`经理要求让它能工作。所以，作为一个聪明的人类，用户必须想办法让它工作。逗号分隔的解决方案感觉很奇怪，而且绝对“不正确”：


    | BookISBN   | BookTitle | BookPublisher | AuthorFirstName | AuthorLastName      |

    |------------|-----------|---------------|-----------------|---------------------|

    | 444444444  | DB Design | Apress        | Jessica, Louis  | Moss, Davidson      |


    于是用户决定添加另一行，并只是重复 ISBN 号。唯一性约束不会让她这样做，所以瞧！用户稍微修改了 ISBN 号来添加行：


    | BookISBN      | BookTitle | BookPublisher | Author  |

    |---------------|-----------|---------------|---------|

    | 444444444     | DB Design | Apress        | Jessica |

    | 444444444-1   | DB Design | Apress        | Louis   |


    你可能会认为这是解雇用户的理由，但事实是，她只是在做她的工作。在系统能够处理这种情况之前，你的代码在谈论书籍时必须将这两行视为一行，而在处理作者时则视为两行。这意味着在处理子字符串的
    `BookISBN` 值或可能包含第一个或第二个值的外键值时需要对行进行分组。而混乱就从那里开始增长。对于表结构来说，数据看起来没问题，所以在这个设计中，你无法阻止这种情况的发生。（也许
    ISBN 的格式本可以强制执行，但用户可能的下一个替代解决方案可能更糟）。


    用以下两个表来设计这个书籍和作者解决方案会更好。在第二个表（命名为 `BookAuthor`）中，`BookISBN` 是第一个表（命名为 `Book`）的外键，`BookAuthor`
    的键是 `BookISBN` 和 `AuthorName`。这个解决方案如下所示：


    **Book 表**

    | BookISBN   | BookTitle     | BookPublisher |

    |------------|---------------|---------------|

    | 111111111  | Normalization | Apress        |

    | 222222222  | T-SQL         | Apress        |

    | 333333333  | Indexing      | Microsoft     |

    | 444444444  | DB Design     | Apress        |


    **BookAuthor 表**

    | BookISBN   | AuthorName | ContributionType |

    |------------|------------|------------------|

    | 111111111  | Louis      | Primary Author   |

    | 222222222  | Michael    | Primary Author   |

    | 333333333  | Kim        | Primary Author   |

    | 444444444  | Louis      | Primary Author   |

    | 444444444  | Jessica    | Contributor      |


    还要注意，添加关于作者对书籍贡献的更多数据是一个非常自然的过程，只需添加一列即可。在单表解决方案中，识别作者的贡献将是一场噩梦。此外，如果你想添加版税百分比或其他关于书籍作者的信息，同样是一个简单的过程。你还应该注意到，很容易添加一个作者表并扩展关于作者的信息。在例子中，即使
    Louis 写了例子中的两本书，你也不希望重复他的数据两次。


    ### 表/行唯一性'
  raw: 'If your tables are too coarsely designed, your rows will have multiple meanings
    that never share commonality. For example, if one row represents a baboon and
    the other represents a manager, even though the comedic value is worth its weight
    in gold, there is very likely never going to be a programming reason to combine
    the two in the same row. Too many people try to make objects extremely generic,
    and the result is that they lose all meaning. Still others make the table so specific
    that they spend extreme amounts of coding and programming time reassembling items
    for use.


    As a column example, consider a column that holds the make, model, and color of
    a vehicle. Users will have to parse the data to pick out blue vehicles. So they
    will need to know the format of the data to get the data out, leading to the eventual
    realization of the database administrator that all this parsing of data is slowing
    down the system and just having three columns in the first place would make life
    much better.


    At the same time, we can probably agree that the car model name should have a
    single column to store the data, right? But what if you made a column for the
    first character, the last character, and middle characters? Wouldn’t that be more
    normalized? Possibly, but only if you actually needed to program with the first
    and last characters independently on a regular basis. You can see that the example
    here is quite silly, and most designers stop designing before things get weird.
    But like the doctor will tell you when looking at a wound you think is disgusting,
    “That is nothing, you should have seen the…” and a few words later you are glad
    to be a computer programmer. The real examples of poor design are horribly worse
    than any example you can put in a chapter.


    Columns


    *Make sure every column represents only one value.*


    Your goal for columns is to make sure every column represents only one value,
    and the primary purpose of this is performance. Indexes in SQL Server have key
    values that are complete column values, and they are sorted on complete column
    values. This leads to the desire that most (if not all, but certainly most) searches
    use the entire value. Indexes are best used for equality comparisons, and their
    next-best use is to 24


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance make range
    comparisons. Partial values are generally unsavory, with the only decent partial-value
    usage is a string or binary value that uses the leftmost character or binary value,
    because that is how the data is sorted in the index. To be fair, indexes can be
    used to scan values to alleviate the need to touch the table’s data (and possibly
    overflow) pages, but this is definitely not the ideal utilization.


    To maximize index usage, you should never need to parse a column to get to a singular
    piece of data. A common scenario is a column that contains a comma-delimited list
    of values. For example, you have a table that holds books for sale. To make displaying
    the data more natural, the following table is built (the key of the table is BookISBN):


    BookISBN BookTitle BookPublisher Authors


    ----------- ------------- --------------- -----------


    111111111 Normalization Apress Louis


    222222222 T-SQL Apress Michael


    333333333 Indexing Microsoft Kim


    444444444 DB Design Apress Louis, Jessica


    On the face of things, this design makes it easy for the developer to create a
    screen for editing, for the user to enter the data, and so forth. However, although
    the initial development is not terribly difficult, using the data for any reason
    that requires differentiating between authors is. What are the books that Louis
    was an author of? Well, how about the following query? It’s easy, right?


    SELECT BookISBN, BookTitle


    FROM Book


    WHERE Authors LIKE ''%Louis%''


    Yes, this is exactly what most designers will do to start with. And with our data,
    it would actually work.


    But what happens when author “Louise” is added? And it is probably obvious to
    anyone that two people named Louis might write a book, so you need more than the
    author’s first name. So the problem is whether you should have AuthorFirstName
    and AuthorLastName—that is, two columns, one with “Louis, Jessica” and another
    with “Davidson, Moss”. And what about other bits of information about authors?
    What happens when a user uses an ampersand (&) instead of a comma (,)? And…well,
    these are the types of questions you should be thinking about when you are doing
    design, not after the code is written.


    If you have multiple columns for the name, it might not seem logical to use the
    comma-delimited solution, so users often come up with other ingenious solutions.
    If you enter a book with the ISBN number of 444444444, the table looks like this
    (the key of this set is the BookISBN column): BookISBN BookTitle BookPublisher
    AuthorFirstName AuthorLastName


    ----------- ------------- --------------- --------------- --------------


    444444444 DB Design Apress Jessica Moss


    That’s fine, but now the user needs to add another author, and *her* manager says
    to make it work. So, being the intelligent human being she is, the user must figure
    out some way to make it work. The comma-delimited solution feels weird and definitely
    not “right”:


    BookISBN BookTitle BookPublisher AuthorFirstName AuthorLastName


    ----------- ------------- --------------- --------------- --------------


    444444444 DB Design Apress Jessica, Louis Moss, Davidson


    So the user decides to add another row and just duplicate the ISBN number. The
    uniqueness constraint won’t let her do this, so voila! The user adds the row with
    the ISBN slightly modified: BookISBN BookTitle BookPublisher Author


    ------------ ------------- --------------- -----------


    444444444 DB Design Apress Jessica


    444444444-1 DB Design Apress Louis


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance You might
    think is grounds to fire the user, but the fact is, she was just doing her job.
    Until the system can be changed to handle this situation, your code has to treat
    these two rows as one row when talking about books, and treat them as two rows
    when dealing with authors. This means grouping rows when dealing with substringed
    BookISBN values or with foreign key values that could include the first or second
    values. And the mess just grows from there. To the table structures, the data
    looks fine, so nothing you can do in this design can prevent this from occurring.
    (Perhaps the format of ISBNs could have been enforced, but it is possible the
    user’s next alternative solution may have been worse).


    Designing this book and author solution with the following two tables would be
    better. In a second table (named BookAuthor), the BookISBN is a foreign key to
    the first table (named Book), and the key to BookAuthor is BookISBN and AuthorName.
    Here’s what this solution looks like:


    BookISBN BookTitle BookPublisher


    ----------- ------------- ---------------


    111111111 Normalization Apress


    222222222 T-SQL Apress


    333333333 Indexing Microsoft


    444444444 DB Design Apress


    BookISBN AuthorName ContributionType


    ----------- ----------- --------------------


    111111111 Louis Primary Author


    222222222 Michael Primary Author


    333333333 Kim Primary Author


    444444444 Louis Primary Author


    444444444 Jessica Contributor


    Note too that adding more data about the author’s contribution to the book was
    a very natural process of simply adding a column. In the single table solution,
    identifying the author’s contribution would have been a nightmare. Furthermore,
    if you wanted to add royalty percentages or other information about book’s author,
    it would be an equally simple process. You should also note that it would be easy
    to add a table for authors and expand the information about the author. In the
    example, you would not want to duplicate the data twice for Louis, even though
    he wrote two of the books in the example.


    Table/row uniqueness'
