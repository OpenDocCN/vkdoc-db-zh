    ## Reporting


    Also, custom assemblies are not supported; indeed, you do not have access to the
    servers running this service, so your reports cannot use custom extensions. Other
    limitations do apply, so make sure to check `MSDN` for a complete list.


    From the Windows Azure Management Portal, you can access the SQL Reporting portal
    directly by selecting Reporting from the left bar as shown in Figure 12-8. A menu
    showing available options appears and provides access to user-management screens,
    reports created in `Visual Studio 2008 Reporting Services`, execution logs, and
    usage statistics. Reports are accessed using `HTTPS`, so the data shown on the
    report is encrypted over the network for stronger security. Note that at this
    time a separate administrator account needs to be created to manage the reports
    in the SQL Reporting portal.


    ***Figure 12-8.** Windows Azure SQL Reporting management portal.*


    ![Image 154](index-316_1.png)


    ## Windows Azure SQL Data Sync


    Because many companies need to synchronize data between on-premises databases
    and SQL Database, or even between SQL Database instances, Windows Azure provides
    a data-synchronization service called Windows Azure SQL Data Sync (SQL Data Sync,
    for short). This service offers schedule-based, data-synchronization capabilities
    between multiple databases and is designed with high resiliency in mind.


    When working with SQL Data Sync, you first create a `Sync Group`, in which multiple
    on-premises and cloud databases are added. On-premises SQL Server databases are
    optional in any given `Sync Group`; however, a `Sync Group` must have at least
    one `SQL Database` instance that serves as the hub. Because the SQL Data Sync
    functions as a hub-and-spoke architecture, the hub serves as the central database
    against which all data changes from individual member databases are copied to,
    and then successful changes are copied back to the relevant member databases.
    Each `Sync Group` defines its own conflict-resolution strategy: either the hub
    wins or the client wins. (The `client` is another term used to refer to a member
    database.) Normally, you choose the hub database based on its location compared
    to the other databases in a manner that minimizes data-transfer cost and optimizes
    performance.


    When configuring a `Sync Group` with on-premises SQL Server databases, you must
    install and configure a client agent that will manage data synchronization on
    the database servers. Once the client agent has been installed and properly configured,
    you will see it added to the `Sync Group` in the Windows Azure Management Portal.


    Synchronization errors are clearly visible; an operation log file can be viewed
    from the portal directly by clicking the Log Viewer button. You can also force
    synchronization to take place at any time. Figure 12-9 shows a failed synchronization.


    ***Figure 12-9.** Windows Azure SQL Data Sync management portal.*


    SQL Data Sync also has a few limitations worth noting. Perhaps the most important
    limitation of this feature is that the data is not copied with transactional consistency.
    Also, keep in mind that to synchronize two databases, a full synchronization must
    first be completed. Depending on the location of the database and the amount of
    data being synchronized, the first sync operation could take some time. Finally,
    certain properties cannot be changed after the `Sync Group` has been created;
    for example, you cannot change the hub once the `Sync Group` has been created.


    ![Image 155](index-317_1.png)


    ## Import/Export Feature


    SQL Database also comes with an interesting feature called Import/Export. It is
    designed to export a database schema and data in a single blob that can be later
    imported into a `SQL Server` instance or another `SQL Database` instance. This
    feature creates a logical backup file called a `data-tier application` (`DAC`)
    file.


    When the file is created on a local disk, it has a `.bacpac` extension, so it
    is also referred to as a `BACPAC` file.


    You can use the `BACPAC` file to copy databases from the cloud to your on-premises
    `SQL Server` databases, and back. Because the `BACPAC` file contains objects specific
    to the release of the database being backed up, you might experience errors when
    importing a `BACPAC` file on a version of `SQL Server` prior to `SQL Server 2012`.


    When you are exporting a `SQL Database` instance to a `BACPAC`, you are essentially
    creating a blob device in a Windows Azure Storage Account you own. Figure 12-10
    shows you the information you need to provide when exporting a database. In addition
    to providing the database credentials, you need to provide the path of the blob
    that will be created and the access key needed to access your storage account.
    The blob path contains the storage account and the blob name (`mystorageaccount`
    and `blobbackup001`, respectively, in my example).


    ***Figure 12-10.** Exporting a database using the Import/Export feature.*


    If you want to create another database in the cloud with this blob, you need to
    create an empty `SQL Database` instance and run the Import Wizard from the Windows
    Azure Management Portal. If you want to create a database on a local `SQL Server`
    instance, you first need to download the blob to a local machine and then use
    `SQL Server Management Studio` to import this file into a newly create database.


    ![Image 156](index-318_1.png)


    > **Note:** You should know that the export process does not create a backup file;
    it creates a copy of a database and does not ensure transactional consistency.
    If you want to create a blob with transactional consistency, you first need to
    use the `CREATE DATABASE … AS COPY OF…` command, and then export the copied database
    after the copy operation has completed.


    ## Cost of SQL Database


    The `SQL Database` service can cost you just a few dollars a month to hundreds
    or even thousands of dollars, depending on your needs. Generally speaking, you
    pay for what you use; the more database space you need and the more network traffic
    you generate, the more you will pay. The total cost for using `SQL Database` is
    made up of a flat rate that varies based on the amount of data stored and the
    outbound network traffic generated in a given month.


    At the time of this writing, a 1-GB `SQL Database` instance costs $9.99 per month,
    plus 12 cents for each GB of outbound bandwidth consumed. The minimum amount you
    can pay for a `SQL Database` is $4.99 per month if you consume only 100 MB of
    storage in a 1-GB database instance. A 150-GB `SQL Database` instance costs $225.78
    per month, excluding the bandwidth cost. As you can probably guess, the price
    per GB goes down with a larger database, as you can see in Figure 12-11.


    ***Figure 12-11.** Monthly cost of a SQL Database instance per GB of storage in
    US dollars.*


    In the case of a federated environment, you might need multiple database instances;
    each federated database instance incurs its own cost. So if you have 25 federated
    members of 1 GB each and a root database of 100 MB, you would pay about $254.75
    (`25 * $9.99 + $4.99`) plus the combined outbound bandwidth generated by all your
    databases.


    > **Note:** Make sure to check the latest pricing on the Microsoft website. Visit
    [http://www.microsoft.com/azure](http://www.microsoft.com/azure), and use the
    price calculator provided on this website.


    ## Conclusion'
