- fmt: '## Fan-out support

    From a development standpoint, it is not possible to issue requests across federation
    members in a single call. Developers are responsible for issuing requests and
    processing the results of the client side.


    ## Database copy

    The database copy operation is currently not supported against a root database
    or a federated member.


    ## Isolated schema changes

    Changes to the schema of a federation member stay within that federation member.


    ## User interface

    For the time being, the only interface that supports managing SQL Database Federations
    is the SQL Database Management Portal.


    ## Other

    Other limitations apply, such as indexed views not being supported, additional
    limitations on the federated columns, and more. Check MSDN for a complete list
    of limitations: [http://msdn.microsoft.com/en-us/library/windowsazure/hh597469](http://msdn.microsoft.com/en-us/library/windowsazure/hh597469).


    ## Troubleshooting Performance Issues

    If you are experiencing performance issues with SQL Database, the first thing
    to do is follow traditional database-tuning techniques, such as evaluating your
    indexes, tuning T-SQL statements, limiting the use of triggers, and minimizing
    database roundtrips and the volume of data being returned to the consumers.


    Unfortunately, as mentioned previously, SQL Database does not support the use
    of SQL Trace. That’s because the system stored procedures used by SQL Trace are
    not accessible on a SQL Database instance.


    The good news is that you do have access to certain Dynamic Management Views (DMVs).
    You also have access to execution plans either through SSMS or through the SQL
    Database Management Portal.


    ### DMVs Available

    DMVs are invaluable system views provided by SQL Server and SQL Database to troubleshoot
    the inner workings of the database engine. SQL Database offers a subset of the
    DMVs available under SQL Server because of security reasons. The following DMVs
    are available in SQL Database:


    *   `sys.dm_exec_connections` Returns the list of connections established in a
    SQL Database instance.

    *   `sys.dm_exec_query_plan` Returns the XML execution plan of a SQL query or
    a batch.

    *   `sys.dm_exec_query_stats` Returns aggregate performance information for cached
    query plans.

    *   `sys.dm_exec_requests` Returns information about the statements being executed
    by a SQL Database instance.

    *   `sys.dm_exec_sessions` Returns the current session opened, along with performance
    information about that session. However, it doesn’t return last-login information,
    such as the `last_successful_logon` column.

    *   `sys.dm_exec_sql_text` Returns the text of a SQL batch.

    *   `sys.dm_exec_text_query_plan` Returns the execution plan in text format for
    a SQL query or batch.


    ![Image 144](index-312_1.png)

    ![Image 145](index-312_2.png)

    ![Image 146](index-312_3.png)

    ![Image 147](index-312_4.png)

    ![Image 148](index-312_5.png)

    ![Image 149](index-312_6.png)


    ### Execution Plans

    Execution plans are another powerful tool you can use to understand and troubleshoot
    performance issues. You can also view execution plans with the SQL Database Management
    Portal (SDMP). However, the portal provides a somewhat different experience than
    SSMS does in a few different areas.


    First of all, the symbols provided in the graphical representation are different
    and not as granular. For example, the symbol for Index Seek operations looks different
    on the portal than it does in SSMS. (See Table 12-7 for a few symbols displayed
    in SDMP.).Also, the same symbol is provided in the portal for Clustered Index
    Seek and Non-Clustered Index Seek operations. Although some symbols might not
    be as granular in the portal as in SSMS, their descriptions are granular enough.


    **Table 12-7.** Partial list of execution plan symbols shown in SQL Database Management
    Portal


    | Operation | SDMP Symbols |

    | :--- | :--- |

    | Seek | ![Image 144](index-312_1.png) |

    | Scan | ![Image 145](index-312_2.png) |

    | Nested Loop | ![Image 146](index-312_3.png) |

    | Sort | ![Image 147](index-312_4.png) |

    | Table Spool | ![Image 148](index-312_5.png) |

    | Filter | ![Image 149](index-312_6.png) |


    Similarly to SSMS, you can zoom in and out of execution plans in SDMP and you
    can view batched execution plans. SDMP also gives you quick search options and
    different views without having to reexecute the T-SQL statement. For example,
    you can search expensive operations by clicking on the CPU icon, which automatically
    finds the most expensive CPU operations in the batch and highlights them, as shown
    in Figure 12-5.


    ![Image 150](index-313_1.png)


    **Figure 12-5.** Execution plan in SDMP sorted by the CPU cost


    ### Performance Dashboard

    The SQL Database Management Portal also provides a handy performance dashboard
    showing current activity and detailed performance information in a secondary screen.
    When you first log in to the portal, you will see a summary of the database you
    logged in to. To view a summary of the performance dashboard, click on Query Performance
    on the top of the screen. You will see a screen similar to Figure 12-6. This screen
    shows you a list of queries with performance metrics, including resource consumption
    per second. For example, the statement `SELECT * FROM EnzoUsers` consumed 2 physical
    reads per second and had a duration of 11 millisecond (ms) per second on average.
    These metrics are obtained by using the `sys.dm_exec_query_stats` table and provide
    an average burn rate per second, which is displayed on the screen. Although this
    might sound a bit complicated, this screen is designed to list in decreasing order
    the statements that are the most active and consuming the most resources at any
    point in time.


    ![Image 151](index-314_1.png)

    ![Image 152](index-314_2.png)


    **Figure 12-6.** Query Performance summary dashboard.


    Clicking on a specific query opens another screen, shown in Figure 12-7, which
    provides execution details, including most of the statistics provided by `sys.dm_exec_query_stats`.
    This screen shows you resource consumption and query plan information, such as
    when the query plan was cached, the plan handle, and more. You can also look at
    the execution plan directly from this screen if you click on Query Plan.


    ![Image 153](index-315_1.png)


    **Figure 12-7.** Query Performance detailed view.


    ## Related Services

    Windows Azure SQL Database comes with a few related services, including Windows
    Azure SQL Reporting, Windows Azure SQL Data Sync, and the Export/Import feature.
    As mentioned previously, Windows Azure SQL Reporting has its own management portal,
    while the other features are accessible through the Windows Azure Management Portal.


    ### Windows Azure SQL Reporting

    Windows Azure includes a cloud service you can use to deploy reports with minimal
    effort and allow these reports to be run from traditional Windows applications,
    from web applications, or directly from a browser by giving users the URL of the
    report.


    Working with Windows Azure SQL Reporting (or SQL Reporting) is much simpler than
    working in an on-premises Reporting Service environment because there are no configuration
    settings to worry about, other than user and application access control. As with
    any other service provided in the cloud, SQL Reporting is designed to scale to
    demand and automatically handle the back-end configuration settings necessary
    to provide a highly scalable service.


    SQL Reporting is currently a fully supported service; however, there are a few
    limitations you should know about. First and foremost, SQL Reporting can connect
    only to SQL Database instances. This means that at the time of this writing you
    cannot use SQL Reporting with internal data sources or other cloud data sources,
    such as Azure Tables. Another important limitation is related to user management;
    you need to create and manage each user individually in the management portal
    created specifically for SQL'
