  trans: "\n# 第 7 章：跳出思维定式看索引\n\n虽然动态管理对象提供了相当多的有用信息，但请记住，当你查看缺失索引建议时，应该超越为建议所提供的统计数据。你还可以利用这些统计数据来确定哪些索引建议对数据库性能的影响最大。\n\
    \n性能影响可以通过查询中包含的两项计算来确定。第一项计算 `total_impact` 提供了平均影响的总和值，该值乘以 `user_seeks` 和 `user_scans`。这使你能够确定哪些索引如果实施，将产生最高的百分比影响。这有助于你判断：一个能使某个查询性能提升\
    \ 90% 的索引，是否与一个能使 50 个查询性能提升 50% 的索引价值相当（前者的 `total_impact` 值为 90，而后者为 2,500）。\n\
    \n第二项计算 `index_score` 在公式中引入了 `avg_total_user_cost`。由于查询的成本与查询将执行的工作量相关，改进一个成本为\
    \ 1,000 的查询与改进一个成本为 1 的查询相比，前者可能带来更显著的性能提升。表 7-2 列出了所有列及其提供的信息。\n\n**注意：** 有时，人们会建议添加那些在\
    \ `total_impact` 或 `index_score` 计算中某项值特别突出的索引。所有这些建议都不应被轻易采信。一组缺失索引建议在列表中留存的时间越长，其得分就越有可能偏高。不应仅仅因为某条建议得分高且累积时间足够长就采纳它；而应在权衡该表上已有的其他索引和其他建议之后，再做出决定。\n\
    \n## 清单 7-1：用于查询缺失索引 DMO 的语句\n\n```sql\nSELECT\n    DB_NAME(database_id) AS database_name\n\
    \    ,OBJECT_SCHEMA_NAME(object_id, database_id) AS schema_name\n    ,OBJECT_NAME(object_id,\
    \ database_id) AS table_name\n    ,mid.equality_columns\n    ,mid.inequality_columns\n\
    \    ,mid.included_columns\n    ,migs.avg_total_user_cost\n    ,migs.avg_user_impact\n\
    \    ,(migs.user_seeks + migs.user_scans) * migs.avg_user_impact AS total_impact\n\
    \    ,migs.avg_total_user_cost * (migs.avg_user_impact / 100.0) * (migs.user_seeks\
    \ + migs.user_scans) AS index_score\n    ,migs.user_seeks\n    ,migs.user_scans\n\
    FROM sys.dm_db_missing_index_details mid\nINNER JOIN sys.dm_db_missing_index_groups\
    \ mig\n    ON mid.index_handle = mig.index_handle\nINNER JOIN sys.dm_db_missing_index_group_stats\
    \ migs\n    ON mig.index_group_handle = migs.group_handle\nORDER BY migs.avg_total_user_cost\
    \ * (migs.avg_user_impact / 100.0) * (migs.user_seeks + migs.user_scans) DESC\n\
    ```\n\n## 表 7-2：缺失索引查询列说明\n\n| 列名 | 描述 |\n| :--- | :--- |\n| `database_name` |\
    \ 缺失索引所在的数据库名称 |\n| `schema_name` | 缺失索引所在表所属的架构名称 |\n| `table_name` | 缺失索引所在的表名\
    \ |\n| `equality_columns` | 逗号分隔的列表，包含用于等值谓词的列 |\n| `inequality_columns` | 逗号分隔的列表，包含用于不等值谓词的列\
    \ |\n| `included_columns` | 逗号分隔的列表，包含作为查询覆盖列所需的列 |\n| `avg_total_user_cost` |\
    \ 组内索引可减少的用户查询的平均成本 |\n| `avg_user_impact` | 如果实施了此缺失索引组，用户查询可能获得的平均百分比收益 |\n\
    | `total_impact` | 通过对 `user_seeks` 和 `user_scans` 的总和进行加权计算得出的总用户影响值，用于确定哪些索引建议在整体使用中效果最显著\
    \ |\n| `index_score` | 通过将 `total_impact` 值乘以 `avg_total_user_cost` 进行加权计算的得分\
    \ |\n| `user_seeks` | 如果缺失索引已构建，用户查询中本应发生的 seeks 次数 |\n| `user_scans` | 如果缺失索引已构建，用户查询中本应发生的\
    \ scans 次数 |\n\n最后一个 DMO 是 `sys.dm_db_missing_index_columns`，它为缺失索引建议中的每一列返回一行。由于此\
    \ DMO 是一个内联表值函数，任何查询（如清单 7-2 中的示例）都需要提供缺失索引建议的索引句柄。虽然它对于将所有建议检索到单行中不是特别有用，但当需要以单独列的形式返回建议的列信息时（如图\
    \ 7-1 所示），它会很有用。\n\n## 清单 7-2：查询 sys.dm_db_missing_index_columns 的语句\n\n```sql\n\
    SELECT column_id\n    ,column_name\n    ,column_usage\nFROM sys.dm_db_missing_index_columns(44)\n\
    ```\n\n![Image 81](img/index-175_1.png)\n\n## 图 7-1：sys.dm_db_missing_index_columns\
    \ 的示例输出\n\n为了帮助你理解可以从缺失索引 DMO 中检索到的建议，我们将回顾以下两种生成缺失索引建议的场景：\n\n*   等值列场景\n*  \
    \ 不等值列场景\n\n在等值场景中，我们希望查看当数据库中有特定值查询时生成的建议。在这个场景中，我们将查看三个查询（包含在清单 7-3 中）的缺失索引建议。第一个查询选择并过滤\
    \ `DueDate` 列上的一个日期。第二个查询选择 `OrderDate` 列并在 `DueDate` 列上过滤一个日期。最后，第三个查询选择 `AccountNumber`\
    \ 列，同时在 `DueDate` 和 `AccountNumber` 列上过滤值。\n\n运行清单 7-1 中的查询以获取缺失索引建议后，我们看到基于这三个查询生成了两条建议，如图\
    \ 7-2 所示。前两个查询导致了第一条建议，这从该建议上记录的两次 `user_seeks` 可以明显看出。\n\n此建议是针对一个以 `DueDate`\
    \ 列作为索引键的索引。第二条建议包含了两个列。这条建议对应于脚本中的第三个查询，该查询有两个列（`DueDate` 和 `AccountNumber`）作为谓词。\n\
    \n## 清单 7-3：等值列场景\n\n```sql\nUSE AdventureWorks2012\nGO\n\nSELECT DueDate FROM\
    \ Sales.SalesOrderHeader\nWHERE DueDate = '2005-07-13 00:00:00.000'\nGO\n\nSELECT\
    \ OrderDate FROM Sales.SalesOrderHeader\nWHERE DueDate = '2010-07-15 00:00:00.000'\n\
    GO\n\nSELECT AccountNumber FROM Sales.SalesOrderHeader\nWHERE DueDate = '2005-07-13\
    \ 00:00:00.000'\n    AND AccountNumber = '10-4020-000676'\nGO\n```\n\n![Image\
    \ 80](img/index-174_1.png)\n\n## 图 7-2：等值列场景的缺失索引建议\n\n在查看第一个场景中的第二条建议时，可以发现缺失索引建议的一个重要方面。在该建议中，用于等值的列是\
    \ `DueDate` 和 `AccountNumber`，并且它们似乎是按此顺序推荐的。但建议中列的顺序，并不影响索引中列的最优排列顺序。你可能已经知道，索引的设计应将最具唯一性的列放在索引的最左侧。在这个案例中，使用清单\
    \ 7-4 中的代码，我们能够确定有 1,124 个唯一的 `DueDate` 值和 19,119 个唯一的 `AccountNumber` 值。因此，如果将\
    \ `AccountNumber` 列作为前导列放在索引的左侧，索引会更高效。尽管索引建议很有价值，但你必须始终验证并确定索引中列的最优顺序。\n\n##\
    \ 清单 7-4：列唯一性检查\n\n```sql\nUSE AdventureWorks2012\nGO\n\nSELECT COUNT(DISTINCT\
    \ DueDate) AS UniquenessDueDate\nFROM Sales.SalesOrderHeader\n\nSELECT COUNT(DISTINCT\
    \ AccountNumber) AS UniquenessAccountNumber\nFROM Sales.SalesOrderHeader\n```\n"
- fmt: "## 不等式列场景分析\n\n在推荐中，带有索引的第二种场景涉及包含不等式列的情况。这种情况发生在查询谓词中使用一系列值或多值时。在此场景中，我们将针对更多查询（如清单\
    \ 7-5 所示）检查对缺失索引的影响。列表中的第一个查询在 `OrderDate` 和 `DueDate` 列的值范围内执行，并返回 `DueDate`\
    \ 列。第二个查询与第一个相同，除了选择部分还包含 `CustomerID` 列。第三个查询对 `DueDate` 列的日期范围进行过滤，并返回 `DueDate`\
    \ 和 `OrderDate` 列。最后一个查询与第三个相同，只是它也返回 `SalesOrderID`，即表的聚集索引键列。\n\n### 清单 7-5.\
    \ 不等式列场景\n\n```sql\nUSE AdventureWorks2012\n\nGO\n\nSELECT DueDate FROM Sales.SalesOrderHeader\n\
    \nWHERE OrderDate Between '20010701' AND '20010731'\n\nAND DueDate Between '20010701'\
    \ AND '20010731'\n\nGO\n\nSELECT CustomerID, OrderDate FROM Sales.SalesOrderHeader\n\
    \nWHERE DueDate Between '20010701' AND '20010731'\n\nAND OrderDate Between '20010701'\
    \ AND '20010731'\n\nGO\n\nSELECT DueDate, OrderDate FROM Sales.SalesOrderHeader\n\
    \nWHERE DueDate Between '20010701' AND '20010731'\n\nGO\n\nSELECT SalesOrderID,\
    \ OrderDate, DueDate FROM Sales.SalesOrderHeader\n\nWHERE DueDate Between '20010701'\
    \ AND '20010731'\n\nGO\n```\n\n要分析这些查询的建议，请执行清单 7-1 中的缺失索引查询。\n\n与相等场景的结果类似，包含在图\
    \ 7-3 中的不等式场景结果提供了一些有价值的建议。即便如此，它们不能被表面接受，需要进一步分析。\n\n首先，建议包括两个建议，其中不等式列是 `OrderDate`\
    \ 和 `DueDate`。两者的区别在于第二个建议中包含了 `CustomerID`。如果要实施这些建议，最好将这两个合并为一个索引，因为它可以覆盖两个查询。\n\
    \n第二个需要注意的项目是第三个和第四个建议之间的相似性。在这两者中，唯一的区别是在第四个索引中添加了 `SalesOrderID` 作为包含列。因为 `SalesOrderID`\
    \ 列是表的聚类键，所以没有理由将其包含在索引中；它已经存在了。\n\n![Image 82](index-177_1.png)\n![Image 83](index-177_2.png)\n\
    ![Image 84](index-177_3.png)\n\n**图 7-3.** 不等式列场景的缺失索引建议\n\n通过这两个场景，应该很明显，缺失索引建议确实有机会提供价值。虽然这些建议不会总是完美的，但它们提供了一个起点，比那些从零开始为数据库建立索引的情况更有优势。\n\
    \n## 计划缓存\n\n第二种识别缺失索引建议的方法是从缓存的执行计划中检索它们。对许多读者来说，在执行计划的顶部看到缺失索引建议可能比较常见（见图 7-4\
    \ 中的示例）。这些恰好与缺失索引 DMOs 中出现的缺失索引建议相同。主要区别在于它们与特定的执行计划和 T-SQL 语句相关联。\n\n**图 7-4.**\
    \ 查询计划中的缺失索引建议\n\n正如预期的那样，收集在 SQL Server 实例上创建和使用的所有执行计划以查找缺失索引建议是不切实际的。幸运的是，不需要执行此活动即可获取信息。相反，信息可以在存储在计划缓存中的执行计划中找到。在这些计划中，将受益于缺失索引建议的\
    \ T-SQL 语句在执行计划的 `SHOWPLAN XML` 中存储了一个 `MissingIndex` 节点，类似于图 7-5。\n\n**图 7-5.**\
    \ `SHOWPLAN XML` 中的 `MissingIndex` 节点\n\n通过 `MissingIndex` 节点，你可以从计划缓存中检索缺失索引建议，并将它们与创建索引将直接影响的\
    \ T-SQL 语句关联起来。检索缺失索引信息需要使用一个 `xquery` SQL 语句，类似于清单 7-6 中提供的语句。在此查询中，会识别出来自计划缓存中具有缺失索引节点的计划。有了这个列表，计划将被解析以检索\
    \ SQL 语句以及数据库、架构和表名称。与此同时，将检索影响、相等列、不等式列和包含列。由于访问的是计划缓存，计划的使用计数和执行计划也可以包含在内，如示例脚本所示。在执行清单\
    \ 7-6 后的查询后，应返回图 7-6 的结果。\n\n### 清单 7-6. 从计划缓存中查询缺失索引\n\n```sql\nWITH XMLNAMESPACES\
    \ (DEFAULT 'http://schemas.microsoft.com/sqlserver/2004/07/showplan')\n,PlanMissingIndexes\n\
    AS (\n    SELECT query_plan, cp.usecounts\n    FROM sys.dm_exec_cached_plans cp\n\
    \    OUTER APPLY sys.dm_exec_query_plan(cp.plan_handle) tp\n    WHERE tp.query_plan.exist('//MissingIndex')=1\n\
    )\nSELECT\n    stmt.value('(//MissingIndex/@Database)[1]', 'sysname') AS database_name\n\
    \    ,stmt.value('(//MissingIndex/@Schema)[1]', 'sysname') AS [schema_name]\n\
    \    ,stmt.value('(//MissingIndex/@Table)[1]', 'sysname') AS [table_name]\n  \
    \  ,stmt.value('(@StatementText)[1]', 'VARCHAR(4000)') AS sql_text\n    ,pmi.usecounts\n\
    \    ,stmt.value('(//MissingIndexGroup/@Impact)[1]', 'FLOAT') AS impact\n    ,stmt.query('for\
    \ $group in //ColumnGroup\n                 for $column in $group/Column\n   \
    \              where $group/@Usage=\"EQUALITY\"\n                 return string($column/@Name)\n\
    \                ').value('.', 'varchar(max)') AS equality_columns\n    ,stmt.query('for\
    \ $group in //ColumnGroup\n                 for $column in $group/Column\n   \
    \              where $group/@Usage=\"INEQUALITY\"\n                 return string($column/@Name)\n\
    \                ').value('.', 'varchar(max)') AS inequality_columns\n    ,stmt.query('for\
    \ $group in //ColumnGroup\n                 for $column in $group/Column\n   \
    \              where $group/@Usage=\"INCLUDE\"\n                 return string($column/@Name)\n\
    \                ').value('.', 'varchar(max)') AS include_columns\n    ,pmi.query_plan\n\
    FROM PlanMissingIndexes pmi\nCROSS APPLY pmi.query_plan.nodes('//StmtSimple')\
    \ AS p(stmt)\n```\n\n**图 7-6.** 从计划缓存获取的缺失索引节点\n\n在许多方面，从计划缓存返回的缺失索引结果与查询缺失索引\
    \ DMOs 是相同的。当然，两者之间也有一些关键而重要的区别。使用缺失索引 DMOs，你可以了解查询是否会使用 `seek` 或 `scan` 来使用缺失索引。另一方面，使用计划缓存则提供了生成缺失索引建议的实际计划和\
    \ T-SQL 语句。DMOs 帮助你了解新索引将如何被使用，而计划缓存则是你确定什么会受到影响的地方。通过知道什么代码会受到影响，你就知道测试人员需要测试什么，性能提升将在哪里，并有机会考虑索引是否真的是缓解由缺失索引建议揭示的性能问题的最佳方式。\n\
    \n> **注意：** 由于计划缓存对 SQL Server 实例中的查询性能至关重要，因此在查询计划缓存时要谨慎。虽然在查询时通常没有影响，但在生产环境中使用任何计划缓存查询时要小心，并警惕意外行为。\n\
    \n## 工作负载的索引调优"
  raw: 'The second scenario with indexes found in the recommendations is for those
    that include inequality columns. These are situations where a range of values
    or multiple values are used in the predicate of a query. In this scenario, we’ll
    examine the effect on missing indexes for four more queries, shown in Listing
    7-5\. The first query in the list executes on a range of values for the OrderDate
    and the DueDate columns, and returns the DueDate column. The second query is the
    same as the first, except the select portion also includes the CustomerID column.
    The third filters on range of dates on the DueDate column, and returns the DueDate
    and OrderDate columns. The last query is identical to the third with the exception
    that it also returns the SalesOrderID, which is the clustered index key column
    for the table.


    ***Listing 7-5.** Inequality Columns Scenario*


    USE AdventureWorks2012


    GO


    SELECT DueDate FROM Sales.SalesOrderHeader


    WHERE OrderDate Between ''20010701'' AND ''20010731''


    AND DueDate Between ''20010701'' AND ''20010731''


    GO


    SELECT CustomerID, OrderDate FROM Sales.SalesOrderHeader


    WHERE DueDate Between ''20010701'' AND ''20010731''


    AND OrderDate Between ''20010701'' AND ''20010731''


    GO


    SELECT DueDate, OrderDate FROM Sales.SalesOrderHeader


    WHERE DueDate Between ''20010701'' AND ''20010731''


    GO


    SELECT SalesOrderID, OrderDate, DueDate FROM Sales.SalesOrderHeader


    WHERE DueDate Between ''20010701'' AND ''20010731''


    GO


    To analyze the recommendations for these queries, execute the missing index query
    from Listing 7-1.


    Similar to the equality scenario results, the results for the inequality scenario,
    included in Figure 7-3, provide some valuable suggestions. Even so, they cannot
    be taken at face value and require further analysis.


    To begin with, the recommendations include two recommendations in which the inequality
    columns are OrderDate and DueDate. The difference between the two is the inclusion
    of the CustomerID in the second recommendation. If you were implementing these
    recommendations, the two would be better consolidated into a single index, since
    it would cover both queries.


    The second item to note is the similarity between the third and fourth suggestions.
    In these, the only difference is the addition of the SalesOrderID in the fourth
    index as an included column. Because the SalesOrderID column is the clustering
    key for the table, there is no reason to include it in the index; it is already
    there.


    ![Image 82](index-177_1.png)


    ![Image 83](index-177_2.png)


    ![Image 84](index-177_3.png)


    chapter 7 ■ IndexIng OutsIde the BuBBle


    ***Figure 7-3.** Missing index recommendations for Inequality Columns scenario*
    Through both of these scenarios, it should be evident that the missing index recommendations
    do have an opportunity to provide value. While the recommendations will not always
    be perfect, they provide a starting point that gives an advantage over those starting
    from scratch to index the database.


    Plan Cache


    The second method for identifying missing index recommendations is to retrieve
    them from cached execution plans. For many readers, it is probably somewhat common
    to see a missing index recommendation at the top of execution plans (see the example
    in Figure 7-4). These happen to be the same missing index recommendations as those
    that appear in the missing index DMOs. The chief difference is that these are
    associated with specific execution plans and T-SQL statements.


    ***Figure 7-4.** Missing index recommendation in a query plan*


    As is to be expected, it isn’t practical to collect all of the execution plans
    as they are created and used on your SQL Server instance to look for missing index
    recommendations. Fortunately, that activity isn’t required to obtain the information.
    Instead, the information can be found in the execution plans that are stored in
    the plan cache. Within these plans, the T-SQL statements that would benefit from
    missing index recommendations have a MissingIndex node stored in the SHOWPLAN
    XML for the execution plan, similar to Figure 7-5.


    ***Figure 7-5.** Missing index node in SHOWPLAN XML*


    With the MissingIndex node, you are able to retrieve missing indexes suggestions
    from the plan cache and associate them with the T-SQL statements that would be
    directly impacted with the creation of the index. Retrieving the missing index
    information requires the use of an xquery SQL statement, similar to the one provided
    in Listing 7-6\. In this query, the plans with missing index nodes from the plan
    cache are 168


    ![Image 85](index-178_1.png)


    chapter 7 ■ IndexIng OutsIde the BuBBle


    identified. With this list, the plans are parsed to retrieve the SQL statements
    and the database, schema, and table names. Along with that, the impact, equality,
    inequality, and included columns are retrieved. Since the plan cache is being
    accessed, the use counts for the plan and the execution plan can also be included,
    such as in the example script. When executed after the queries from Listing 7-6,
    the results from Figure 7-6


    should be returned.


    ***Listing 7-6.** Query for Missing Index from Plan Cache*


    [WITH XMLNAMESPACES (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/showplan'')](http://schemas.microsoft.com/sqlserver/2004/07/showplan)


    ,PlanMissingIndexes


    AS (


    SELECT query_plan, cp.usecounts


    FROM sys.dm_exec_cached_plans cp


    OUTER APPLY sys.dm_exec_query_plan(cp.plan_handle) tp


    WHERE tp.query_plan.exist(''//MissingIndex'')=1


    )


    SELECT


    stmt.value(''(//MissingIndex/@Database)[1]'', ''sysname'') AS database_name


    ,stmt.value(''(//MissingIndex/@Schema)[1]'', ''sysname'') AS [schema_name]


    ,stmt.value(''(//MissingIndex/@Table)[1]'', ''sysname'') AS [table_name]


    ,stmt.value(''(@StatementText)[1]'', ''VARCHAR(4000)'') AS sql_text


    ,pmi.usecounts


    ,stmt.value(''(//MissingIndexGroup/@Impact)[1]'', ''FLOAT'') AS impact


    ,stmt.query(''for $group in //ColumnGroup


    for $column in $group/Column


    where $group/@Usage="EQUALITY"


    return string($column/@Name)


    '').value(''.'', ''varchar(max)'') AS equality_columns


    ,stmt.query(''for $group in //ColumnGroup


    for $column in $group/Column


    where $group/@Usage="INEQUALITY"


    return string($column/@Name)


    '').value(''.'', ''varchar(max)'') AS inequality_columns


    ,stmt.query(''for $group in //ColumnGroup


    for $column in $group/Column


    where $group/@Usage="INCLUDE"


    return string($column/@Name)


    '').value(''.'', ''varchar(max)'') AS include_columns


    ,pmi.query_plan


    FROM PlanMissingIndexes pmi


    CROSS APPLY pmi.query_plan.nodes(''//StmtSimple'') AS p(stmt)


    ***Figure 7-6.** Missing index nodes obtained from plan cache*


    chapter 7 ■ IndexIng OutsIde the BuBBle


    In many respects, the results returned from the plan cache for missing indexes
    is identical to querying the missing index DMOs. There are, of course, a few key
    and important differences between the two. With the missing index DMOs, you have
    information on whether the query would have used a seek or scan with the missing
    index. On the other hand, using the plan cache provides the actual plan and T-SQL
    statement that generate the missing index recommendation. Where the DMOs help
    you know how a new index will be used, the plan cache is where you want to go
    to determine what will be affected. And by knowing what code will be affected,
    you know what the testers need to test, where the performance improvements will
    be, and have the opportunity to consider whether an index is really the best way
    to mitigate the performance issue uncovered by the missing index recommendation.


    n **Note** Since the plan cache is critical to the performance of queries in your
    SQL Server instances, be cautious when querying the plan cache. While there will
    often be no impact when it is queried, be careful when using any plan cache query
    in a production environment and be on alert for unexpected behavior.


    Index Tuning a Workload'
