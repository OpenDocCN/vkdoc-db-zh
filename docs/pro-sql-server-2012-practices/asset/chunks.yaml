  trans: "\n# 第 18 章 ■ 针对峰值负载进行调优\n\n这里的问题是，七天平均值会扭曲数据。实际上，你需要将数据过滤到，比如说，核心业务时段。根据你之前审查的数据，你知道星期三是一周中最繁忙的一天。图\
    \ 18-13 展示了如何过滤来自`BLG`文件的数据，以仅显示星期三早上 7 点到晚上 8 点之间的数据。要修改`时间范围`设置，请将左侧或右侧的时间指示器滑动到适当的时间。\n\
    \n**图 18-13.** 性能监视器中针对逻辑磁盘计数器的一日捕获报告视图。\n\n如图 18-13 所示，当查看核心业务时段的`F`驱动器时，它比之前健康了\
    \ 0.025 毫秒。如果你只审查了七天的捕获数据，你可能会认为`F`驱动器的性能比实际情况差很多。你仍然需要了解是什么原因导致七天内的延迟增加到了 0.043\
    \ 毫秒。为此，你需要审查图 18-12 中的所有值，以确定是否存在任何值得关注的区域。根据显示的数字，你需要持续监控`F`驱动器的性能，因为它正处于事务应用程序可接受性能阈值的临界点。\n\
    \n性能监视器中的另一个视图是折线图视图。在图 18-14 中，你可以观察随时间变化的`平均磁盘秒数/读取`性能。注意每 15 分钟出现的频繁尖峰；这些是由\
    \ 452 个事务日志备份引起的。分析配置或性能数据时最重要的目标之一，是构建环境的心理图景并能够解释你所看到的现象。这里你正在观察磁盘性能，并且可以在数据中看到一个模式。通过解释是什么产生了负载，你就可以在必要时解决其根本原因。\n\
    \n![Image 214](img/index-457_1.png)\n\n**图 18-14.** 性能监视器中针对逻辑磁盘计数器的一日捕获折线图视图。数值已被缩放，以便线条更易于阅读。\n\
    \n图 18-14 中其他重要的数据点是平均值、最小值和最大值。由于图表中线条的刻度通常不同，查看折线图下方的平均值通常更容易。请记住，在审查性能数据时，大多数情况下平均值才是最重要的。你关注一个值的平均值，因为那是在一段时间内需要维持的典型负载。如果服务器的`%\
    \ 处理器时间`偶尔飙升到 80%，这可能并不表示存在问题——但这需要更多信息才能确认其是否属实。\n\n## 使用 PAL 审查 Perfmon 数据文件\n\
    \n**目标：** 快速审查大型 Perfmon 数据文件，并应用预定义的 SQL Server 最佳实践阈值。\n\n1.  选择`SQL Server`配置文件并回答所有必要问题以生成报告。\n\
    2.  审查所有警告和严重事件。\n3.  记录任何意外的发现或严重警报。这些严重警报可能表明存在潜在瓶颈，具体取决于一天中的时间和发生频率。\n\n##\
    \ 使用性能监视器的报告视图审查 Perfmon 数据文件\n\n**目标：** 审查自定义时间窗口，并查看`PAL`分析中未包含的其他对象计数器值。\n\n\
    1.  如果数据捕获是多日捕获，则将时间线过滤到峰值窗口。\n2.  首先审查报告视图，因为它提供了对象计数器的高层次概览。\n3.  添加所有对象计数器。\n\
    \    a.  最简单的方法是打开`BLG`文件，这将添加所有对象计数器以及包含实例的计数器。\n    b.  对于像`逻辑磁盘`和`数据库`这样的项目，请手动添加。\n\
    4.  从报告顶部开始，向下进行，同时记录所有发现。\n5.  在审查对象计数器时，记录你的观察结果，以便日后复查。\n6.  在审查对象计数器时，你可以从报告视图中移除状态正常的计数器。结果是一份高层次报告，其中仅包含你感兴趣的对象计数器，无论是基于使用情况还是不符合最佳实践。\n\
    7.  如果你想保存报告的图像，可以右键单击并将其另存为 GIF。\n\n## 使用性能监视器的折线图视图审查 Perfmon 数据文件\n\n**目标：**\
    \ 在不同时间窗口中发现数据趋势，并关联来自相关对象计数器的数据。\n\n1.  如果数据捕获是多日捕获，则将时间线过滤到峰值窗口。非峰值窗口的审查也很重要，但首先应集中精力于峰值窗口。\n\
    2.  审查折线图视图的方式与审查报告视图不同。在向折线图视图添加对象时，将相关的对象组一起添加。这样做有几个重要原因，最明显的是空间问题。如果你向折线图视图添加\
    \ 75 个对象，由于绘制的线条数量庞大，图表将难以分析。折线图视图的目标是发现趋势和关联数值。通过添加对象计数器的子集，更容易在数据中发现趋势。一旦对象计数器被添加到图表中，请在底部突出显示所有计数器并缩放线条。这可以提高图表的可读性。\n\
    3.  对于底部的每个计数器，审查其随时间变化的折线和值。\n\n> **注意** `CTRL+H` 可以高亮显示折线，使其更易于查看，并且可以同时选择和查看多条折线。\n\
    \n    a.  审查折线随时间的变化，确定计数器何时承受压力以及持续多长时间。\n    b.  审查平均值。计数器是否在可接受的范围内？\n    c.\
    \  达到最大值或最小值的频率如何？峰值是否持续？\n    d.  审查此期间的相关计数器，查看它们的值是否与该事件相关。如果平均值符合预期或该计数器无关紧要，则从折线图视图中删除该对象计数器。\n\
    \    e.  再次强调，移除正常的数值，以便只保留更重要的计数器。\n4.  完成审查一组相关的对象计数器后，你可以保存图像或添加其他计数器。请记住，折线图视图只包含你感兴趣的对象计数器。将有问题的计数器与新增计数器一起审查，为你提供了更多机会去发现数据中的不同趋势。\n\
    \n审查完所有对象计数器后，你应该清楚地了解`SQL Server`承受最大压力时的峰值使用时间，并知道`SQL Server`的哪些区域是潜在瓶颈。需要纳入此审查的其他重要数据是在相应时间窗口内完成的业务交易数量。有了这些数据，你就可以为类似以下的陈述填充信息：“我的系统在处理\
    \ X 笔支付时利用率仅为 30%。”\n\n## 分析配置数据\n\n通常，当构建一个将运行`SQL Server`的新服务器配置时，通常使用的是经 IT\
    \ 组织批准的标准构建，并且不一定针对`SQL Server`进行了优化。大多数公司喜欢尽可能少地维护服务器配置，并希望它们能普遍适用。构建过程很可能在某种程度上是自动化的，有些项目是手动配置的。预期结果是一个在公司内针对特定平台和版本看起来、操作起来和感觉起来都与其他所有服务器一样的服务器。根据我的经验，标准构建通常\
    \ 98%是正确的，只有 2%与常规情况有偏差。正是这些偏差导致了问题，其中一些问题不会立即显现。\n"
- fmt: '## CHAPTER 18 ■ Tuning foR PEAk LoAd


    Incorrect infrastructure and server configurations often contribute to performance
    issues. If they are caught in time, such as right after the server is handed off
    to the DBAs, they are easy to fix. If they are not caught in time, but are caught
    at some point after a server is in production, this can lead to the need to schedule
    downtime for the fix—even if it is easy. Some common examples of poor configurations
    include misconfigured memory settings, local policies, and page-file settings.


    A perfect example that seemingly has nothing to do with `SQL Server` but, in fact,
    has everything to do with it are the power-management settings in `Windows`. A
    base configuration of `Windows Server 2008` (or 455 later) has a default power
    management plan of Balanced. The Balanced power profile turns off cores and reduces
    the clock speed of cores to conserve power. This throttling can impact the server’s
    performance. If `SQL Server` is installed on that server, performance could go
    from blazingly fast to extremely slow because of that one setting. Changing the
    setting is easy and might improve performance immensely. Similarly, the EFI or
    BIOS settings related to power might override the `Windows` settings, so they
    also need to be checked. This is another case where you need to draw all of the
    logical dots to come up with a single, correct conclusion.


    A large part of the assessment is to collect configuration data from application
    servers, servers hosting instances of `SQL Server`, and the infrastructure. While
    the goal is to review the configuration of the servers and determine if they are
    configured correctly, what exactly `is` correct? Before you review the configuration
    data, work with the appropriate team members and get a copy of the standard build
    documents. The standard build should be the baseline because most companies spend
    a large amount of time engineering and testing the base builds. Because the standard
    builds might not be optimized for `SQL Server`, you might identify places for
    improvement for future builds in this process.


    When you are reviewing the configurations for the various servers, keep in mind
    the findings from the review of the performance data. Using the example from earlier,
    if you see a large amount of paging in the OS and review the `Max Server Memory`
    in `SQL Server`, is the memory dynamic or static? Is the memory configured too
    high or too low? How will it need to be readjusted, or do you need more physical
    memory in the server? Reviewing the performance data before looking at, and possibly
    changing, the configuration settings provides you with valuable information you
    can use when you are analyzing the server’s configuration. Now you have some context
    for determining what the potential bottlenecks are and what areas of the system
    are healthy.


    Because we are focusing on `SQL Server`, I’ll review some of the recommended configuration
    settings to capture, as shown in `Table 18-10`.


    ### Table 18-10. A sample list of SQL Server configurations to validate.


    | SQL Server Configuration | Analysis Required |

    |--------------------------|-------------------|

    | `SQL Server` version, SP level, and edition | Is `SQL Server` up to date? What
    is supported by the application? |

    | SQL Service accounts | Are the `SQL Server` service accounts using dedicated
    security credentials? Are the security credentials a member of the local Administrator
    group? |

    | `sp_configure` | What configuration options are enabled? Here are the key ones
    to review: `Backup compression default (TRUE)`, `Cost threshold for parallelism`,
    `Fill factor (%)`. Is the default setting being used? `Max degree of parallelism`.
    If the system is NUMA enabled, set this to the Number of cores within the NUMA
    node `Max server memory (MB)`. This setting depends on several factors, but you
    can find a good reference at the following site: `http://sqlskills.com/blogs/jonathan/post/How-much-memory-does-my-SQL-Server-actually-need.aspx`
    |'
