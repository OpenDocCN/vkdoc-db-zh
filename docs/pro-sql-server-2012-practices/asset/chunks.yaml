    practices, refer to Chapter 4.'
  trans: "\n需要注意几点：每张这样的表都应设置主键，但根据数据访问方式的不同，可能需要额外建立索引以实现最快的数据库访问。本示例中的所有值都不接受空值，但这可能并不总是适用于历史表中的每一项度量值。数据收集的日期对于观察正确趋势可能很重要，尽管在本示例中，可以按主键排序。读取日期可能并不总是度量事件发生的日期。例如，在查询存储过程执行时间时，可能记录的是前一周的平均值。读取日期可以表示信息被收集并插入表中的时间，可能还需要额外的日期。\n\
    \n## 当前健康表\n\n在创建当前健康表时，该表的目的是将信息保留足够长的时间，以便能对数据采取行动。此操作可能包括应完成的任务，例如调用存储过程甚至生成报告。驻留在当前健康表中的数据应被视为临时数据。使用当前健康表存储数据直到收集完成并执行报告的一个例子是每日清单报告。通过这些表，表中的列并不总是特定的，可以代表许多不同的项目。请看以下示例：\n\
    \n```sql\nUSE [dbUtilities]\nGO\n\nCREATE TABLE [dbo].Daily_Report NOT NULL,\n\
    \    [EventStatus] varchar NOT NULL,\n    [EventDate] [datetime] NOT NULL,\n \
    \   [EVENT] varchar NOT NULL,\n    CONSTRAINT [PK_Daily_Report_ReportrowID] PRIMARY\
    \ KEY CLUSTERED\n    (\n        [ReportRowID]\n    )\n)\nGO\n```\n\n`EventStatus`\
    \ 是我经常用于在正确的集合中分组数据的值，而 `Event` 则用于存储数据。此表中的多行可能包含数据库增长的 `EventStatus`，但每一行的 `Event`\
    \ 值都会不同，例如“数据库 1 增长 10%”，下一行包含“数据库 2 增长 2%”。报告可以按 `EventStatus` 进行分组，这样所有数据库增长信息就会被一起报告。\n\
    \n## 归档表\n\n归档表的一个常见用途是查看当前健康表在下一次数据收集执行前的历史状态。在针对某个时间段开始每次数据收集之前，可以将当前健康表的内容移动到对应的归档表中。\n\
    \n```sql\nUSE [dbUtilities]\nGO\n\nCREATE TABLE [dbo].Daily_Report_Archive NOT\
    \ NULL,\n    [EventDate] [datetime] NULL,\n    [EVENT] varchar NOT NULL,\n   \
    \ CONSTRAINT [PK_Daily_Report_Archive_ReportrowID] PRIMARY KEY CLUSTERED\n   \
    \ (\n        [ReportRowID] ASC\n    )\n) ON [PRIMARY]\nGO\n```\n\n一个需要注意的项目：在此示例中，`ReportRowID`\
    \ 的标识属性已被移除。以下是将数据从当前健康表移动到归档表的示例：\n\n```sql\nUSE [dbUtilities]\nGO\n\nCREATE\
    \ PROCEDURE [dbo].[Archive_Daily_Report]\nAS\nINSERT INTO Daily_Report_Archive\n\
    SELECT * FROM Daily_Report\n\nIF @@error = 0\nBEGIN\n    Delete dbutility..Daily_Report\n\
    END\nGO\n```\n\n## 数据收集\n\n如果不了解数据收集的选项，实用程序数据库在收集什么数据方面就受到限制。随着 SQL Server 新版本的发布，其内部工作方式变得更容易访问，提供了比以前版本更多的信息，使用户能够做出更关键的决定。在本节关于数据收集的部分，我们将探讨一些可用的选项。在本节最后一部分，示例将展示如何利用这些选项，最大化实用程序数据库的有用性。\n\
    \n在最早的 SQL Server 版本中，经验丰富的专业人士会花时间深入研究系统表，不仅是系统数据库中的，还包括用户数据库中的。SQL Server 2005\
    \ 向我们介绍了动态管理视图，并且每个新版本都对其进行扩展。在最新版本 SQL Server 2012 中，扩展事件比以往任何时候都更易于使用。创建实用程序数据库时要记住的一个关键组件是，为实用程序数据库将从中收集数据的\
    \ SQL Server 版本选择正确的数据收集方法。\n\n如果你正在实施的实用程序数据库支持多个 SQL Server 版本，一段可能有用的代码是检查当前连接的\
    \ SQL Server 版本，如下所示：\n\n```sql\nSELECT @@Version\n```\n\n或者，你可能会发现使用 `serverproperty`\
    \ 函数检查数据库版本可以提供更多信息。`serverproperty` 表达式提供有关你的 SQL Server 的大量信息，可能非常有用。\n\n```sql\n\
    SELECT SERVERPROPERTY('productversion') AS 'Version Number',\n       SERVERPROPERTY\
    \ ('edition') AS 'Edition'\n```\n\n该脚本的结果将类似于：\n\n```\n11.0.2100.60\nDeveloper\
    \ Edition (64-bit)\n```\n\n## 系统表\n\n旧版本的 SQL Server 使用许多系统表来管理数据库。随着时间的推移，许多这些表已经迁移或重命名。系统信息数据的数量以及访问这些数据的需求都在增长。示例中实现的过程展示了如何查询系统表。在查看系统表时请记住，许多表已经添加了提供更多信息系统视图。\n\
    \n## 扩展存储过程\n\n扩展存储过程是能够调用 SQL Server 外部 DLL 以检索信息的存储过程。例如，在旧版本的 SQL Server 中使用\
    \ `xp_cmdshell` 是完成诸如获取目录列表、运行批处理文件或读取错误日志等任务的最佳方式。使用扩展存储过程时请注意，其中一些已被标记为弃用，因此在\
    \ SQL Server 2012 之后的未来版本中它们可能不会出现。对于即将弃用的扩展存储过程，可以使用 CLR 进行替换。\n\n`注意` 弃用功能列表可在\
    \ Microsoft 的网站上找到：[`msdn.microsoft.com/en-us/library/ms143729.aspx`](http://msdn.microsoft.com/en-us/library/ms143729.aspx)。请记住，每个\
    \ SQL Server 版本都有一个新的弃用功能列表，并且大多数将被移除的功能都有一个改进了旧弃用功能的新功能。\n\n## CLR\n\n公共语言运行时\
    \ (`CLR`) 集成提供了一个环境，使 SQL Server 能够执行传统上 Transact-SQL 并非为其设计的托管代码。这种 `CLR` 集成通过允许\
    \ SQL Server 利用其他编程语言的优势，为 SQL Server 增加了灵活性。\n\n`CLR` 实现起来可能很棘手，并且不在本章讨论范围内；然而，收集处理器利用率的示例使用了此方法。在某些情况下，修改进程以在\
    \ `CLR` 环境中运行可极大地提高该进程的性能。\n\n## DMV\n\n动态管理视图 (`DMV`) 让用户能够查看当前 SQL Server 状态。SQL\
    \ Server 的许多功能，例如复制、文件流、扩展事件、等待时间和 AlwaysOn，都有相关的 `DMV`。在为实用程序数据库收集数据时，`DMV` 是更强大的数据源之一，因为数据的完整性和易于访问性。`DMV`\
    \ 是 SQL Server 标准安装的一部分；正因如此，很容易找到访问信息的方法。要查找有关 `DMV` 最佳实践的更多信息，请参阅第 4 章。\n"
- fmt: "# Storage\n\n**Note** ISQL Server MVP Glenn Berry (the author of Chapter 15)\
    \ has a collection of DMV queries that have proven to be extremely helpful time\
    \ and time again. Many of the examples in this chapter are based on accessing\
    \ data thought the DMVs, either in part or completely on the code he has written.\
    \ Glenn’s blog can be found a[t http://](http://sqlserverperformance.wordpress.com)\
    \ [sqlserverperformance.wordpress.com.](http://sqlserverperformance.wordpress.com)\n\
    \n数据库存储设备上剩余的空闲空间量和数据库占用的空间量是数据库专业人员应该了解的两个信息。这两个不同且独立的数字并不总是相关的。\n\n## Database\
    \ File Sizes\n\nSQL Server 实例上的数据库大小是一个可测量的量，应在每个单独的 SQL Server 实例上进行跟踪。拥有长期的历史增长信息将提高未来存储需求预测的准确性。定义此类数据有助于确定对实用工具数据库而言逻辑合理的表结构。创建表时，应采用旨在长期保留数据的模型。\n\
    \n```sql\nUSE [dbUtilities]\nGO\n\nCREATE TABLE [dbo].[File_growth](\n\t[FileGrowthReadingID]\
    \ [int] IDENTITY(1,1) NOT NULL,\n\t[Physical_Name] [nvarchar](200) NOT NULL,\n\
    \t[Size_in_MB] [int] NULL,\n\t[Reading_date] [datetime] NULL DEFAULT GetDate(),\n\
    \ CONSTRAINT [PK_FileGrowth_ReadingID] PRIMARY KEY CLUSTERED ([FileGrowthReadingID])\n\
    )\nGO\n```\n\n要向表中填充数据，以统计托管服务器上每个数据库关联的每个文件，可以对系统表执行一个简单的查询。这将提供每个文件的页数。\n\n\
    每页存储 8k 的信息。因此，要计算文件的总大小（以兆字节为单位），请将总页数乘以 8k 页。将文件总大小除以 1024（每兆字节的千字节数）以确定以兆字节为单位的文件大小。每个实例上都有多个数据库（系统数据库），因此要测量每个数据库中每个文件的大小，可以使用\
    \ `sp_MSforeachdb` 存储过程。\n\n检索此信息的存储过程可以在 `dbUtilities` 数据库中创建和编译，与其填充的表位于相同的架构中。\n\
    \n```sql\nUSE [dbUtilities]\nGO\n\nCREATE PROCEDURE [dbo].[Get_File_growth]\n\
    AS\nDECLARE @RETURN_VALUE int , @command1 nvarchar(1000)\nSET @command1 = 'Select\n\
    Physical_name,\nSize_in_MB = (size * 8 / 1024)\nfrom ?.sys.database_files'\n\n\
    INSERT INTO File_growth (Physical_Name, Size_in_MB)\nEXEC @command1 = sp_MSforeachdb\
    \ @command1 = @command1\nGO\n```\n\n在表和存储过程创建完成后，执行该存储过程以收集所有当前数据库大小。\n\n```sql\n\
    EXECUTE [dbUtilities].[dbo].[Get_File_growth]\n```\n\n可以通过从表中选择行来查看结果。\n\n```sql\n\
    SELECT * FROM [dbUtilities].[dbo].[File_growth]\n```\n\n本章剩余的示例将不包括收集操作的执行或结果语句的验证，因为它们只是具有不同对象名称的语句。数据库文件增长信息的收集仅在存储过程执行时进行。\n\
    \n本章稍后将回顾数据收集的方法和时机。\n\n## Finding the Amount of Free Space\n\n了解数据库的文件增长率是一个重要事实，但如果没有增长空间，问题可能会迅速出现。了解存储卷上剩余的空间量不仅对规划具有历史参考价值，还可以作为警报或监控点。考虑到这些特征，此类数据类别符合\
    \ Category 1 的定义。此类数据的分组既适用于历史健康状况，也适用于当前健康状况。为了跟踪历史信息，表设计与前一节讨论的数据库文件增长表相呼应。"
  raw: 'n **Note** ISQL Server MVP Glenn Berry (the author of Chapter 15) has a collection
    of DMV queries that have proven to be extremely helpful time and time again. Many
    of the examples in this chapter are based on accessing data thought the DMVs,
    either in part or completely on the code he has written. Glenn’s blog can be found
    a[t http://](http://sqlserverperformance.wordpress.com)


    [sqlserverperformance.wordpress.com.](http://sqlserverperformance.wordpress.com)


    Storage


    The amount of free space remaining on your database storage device and the amount
    of space that a database occupies are two pieces of information a database professional
    should be aware of. These two different and distinct numbers are not always related.


    Database File Sizes


    The size of the databases on a SQL Server instance is a measurable quantity that
    should be tracked on each individual instance of SQL Server. Having the historical
    growth information over a long period of time will increase the odds of accuracy
    for future storage requirements. Defining the data as such helps determine a table
    structure that is logical for the utility database. Create the table with a model
    that is aimed at long-term retention of the data.


    USE [dbUtilities]


    GO


    chapter 6 ■ the Utility Database


    CREATE TABLE [dbo].[File_growth](


    [FileGrowthReadingID] [int] IDENTITY(1,1) NOT NULL,


    [Physical_Name] [nvarchar](200) NOT NULL,


    [Size_in_MB] [int] NULL,


    [Reading_date] [datetime] NULL DEFAULT GetDate(),


    CONSTRAINT [PK_FileGrowth_ReadingID] PRIMARY KEY CLUSTERED ([FileGrowthReadingID]))
    GO


    To populate the table with data that accounts for each file associated with each
    database on the managed server, perform a simple query of the system table. This
    will provide a page count for each file.


    Each page stores 8k worth of information. Therefore, to calculate the total size
    of a file (in megabytes), multiply the total page count by 8k pages. Divide the
    total size of the file by 1024 (the number of kilobytes per megabyte) to determine
    the file size in megabytes. There is more than one database on each instance (system
    databases), so to measure the size of each file in each database, the sp_MSforeachdb
    stored procedure can be used.


    The stored procedure that retrieves this information can be created and compiled
    in the dbUtilities database, in the same schema as the table it is populating.


    USE [dbUtilities]


    GO


    CREATE PROCEDURE [dbo].[Get_File_growth]


    AS


    DECLARE @RETURN_VALUE int , @command1 nvarchar(1000)


    SET @command1 = ''Select


    Physical_name,


    Size_in_MB = (size * 8 / 1024)


    from ?.sys.database_files''


    INSERT INTO File_growth (Physical_Name, Size_in_MB)


    EXEC @command1 = sp_MSforeachdb @command1 = @command1


    GO


    After the table and the stored procedure have been created, execute the stored
    procedure to gather all the current database sizes.


    EXECUTE [dbUtilities].[dbo].[Get_File_growth]


    The results can be seen by selecting the rows from the table.


    SELECT * FROM [dbUtilities].[dbo].[File_growth]


    The remainder of the examples in this chapter will not include the execution of
    the collections or the validation of the result statements because they are simply
    statements with different object names. The collection of the database file growth
    information is collected only when the stored procedure executes.


    Later in the chapter, methods and timing of the data collection will be reviewed.


    Finding the Amount of Free Space


    Understanding the file growth rate of your databases is an important fact, but
    without the space to grow into, trouble can quickly arise. Understanding the amount
    of space that is left on a storage volume can be not only historically relevant
    for planning, but an alerting or monitoring point as well. When considering these
    traits, this data category matches the definition of a Category 1\. The grouping
    of this data fits in both 145


    chapter 6 ■ the Utility Database


    historical and current health. To keep track of the historical information, the
    table design echoes that of the database file growth table, discussed in the previous
    section.'
