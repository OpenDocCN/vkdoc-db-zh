  trans: '# 第 8 章 ■ 发布管理


    不要害怕拒绝你认为可能对系统产生负面影响的代码。为此承担责任的将是你，而不是代码的创建者。立场坚定，但保持尊重。用充分的信息和最佳实践来支持你的担忧。与他人分享你达成的共识。让他们知道，你只是在尽力保护你的系统，并为整个组织最小化影响。


    在代码审查过程中让他人参与进来，将是促进团队和跨团队团结的绝佳机会。


    不要害怕让他人帮助你，也乐于帮助他人。同行评审将让更多人参与进来，让更多人关注代码，也提供更多完善代码、降低系统风险的机会。


    ## 环境


    花时间详细说明所有将发生变更的环境关键部分。这可能从开发层面开始，并向上延伸至影响你发布管理流程的众多不同系统层面。作为降低风险的一种方法，花时间创建各种测试环境，让代码在其中流转，以便进行各种形式的测试，以及测试实际的发布计划（我们稍后会讨论发布计划）。只有通过经过适当测试的迭代，我们才能真正降低风险。


    让你的开发团队参与环境的发现和文档编制。他们可能已经在使用各种环境，以便在代码进入任何其他环境之前测试其变更。他们可能也有有助于单元测试的工具。如果没有，你们需要一起寻找此类工具并将其纳入你们的工具库。你们可以一起讨论，确定在变更开发的早期阶段测试代码的最佳方式。你可以提取每个新变更并单独测试，但务必测试完整代码在类似实际生产环境中的行为。


    至少在你的实际`生产环境`之前，实施一个`开发环境`和一个`测试环境`。除了最低要求外，根据你的舒适度实施尽可能多的层级，而不给流程增加负担。确保每个层级都被理解、管理和控制。我建议你不要实施一个可能成为负担、被跳过、或变得过时并给发布测试带来问题的环境。每个环境都需要为你提供一个进行测试的场所，同时保持有效和可用。


    确保任何变更在进入实际的`生产环境`之前，都先通过了较低级别的环境。确保只有经过适当授权的人员才能访问`生产环境`，并以受控的方式推送变更。实际上，确保每个环境层级都仅限于应访问的人员访问。通过最小化有权访问你的`生产环境`（及之前环境）的人员数量，并通过进行验证的环境，你将更容易实现我们努力追求的目标。


    还要意识到，这将为你组织中的其他人员（除了你自己）创造任务。你需要花时间获得他们对这一流程的承诺，使其得以应用，而不仅仅是停留在设想中。这需要时间，并迫使你证明拥有这些其他环境将大大降低变更带来的风险。


    ![图片 101](img/index-212_1.png)


    ## 图 8-2. 可能的数据库环境


    `开发环境`可以是一个单一环境或多个环境。这个区域是开发人员随心所欲进行变更的场所。你应该确保他们有足够数量的数据来近似于`生产环境`。确保`开发环境`在结构和对象上与`生产环境`匹配。如果你的`开发环境`在对象、缺失索引或仅有少量数据方面存在差异，你就是在为未来的问题埋下隐患。


    `测试环境`可供开发人员甚至执行发布的数据库管理员使用，以开始测试`发布计划`。这个环境与其他环境一样，应尽可能与`生产环境`匹配。执行`发布计划`测试是至关重要的一步，需要执行以确保你创建的计划是准确的。该环境需要足够有效，以便对`发布计划`进行良好测试。


    `质量保证环境`主要将由`QA`小组用于他们自己的测试流程。这个环境也需要与`生产环境`匹配，并为他们提供一个执行有效测试的合适场所。你可能参与也可能不参与保持此环境的完整。


    `面向客户的环境`将被用作一个场所，让公司外部的人员可以预览变更。这个环境将为你提供关于他人如何看待你产品的非常有价值的数据。将有很多机会收集关于一个小变更如何影响你系统整体的信息。你需要确保此环境拥有与`生产环境`非常接近的最新数据。你的外部用户会希望它尽可能接近`生产环境`。


    `预生产环境`与`面向客户的环境`非常相似，只是它是面向内部的。这个环境是变更发布到外部、进入`生产环境`前的最后阶段。到这个阶段，你的`发布计划`应该已经敲定，并通过其他环境进行了测试。成功执行发布的步骤将通过各种环境的发布得到检验。这最后阶段将让你最后一次测试它，并且应包含所有部分和部件，包括复制等。不要在这个环境上偷工减料。确保它在尽可能多的方面与`生产环境`匹配。拥有匹配的硬件和存储只能帮助你在测试流程和实际变更发布时最小化风险。


    `生产环境`不需要介绍或解释。这是目标环境。所有其他环境的存在仅仅是为了让你准备好将变更推送到`生产环境`。


    ## 发布流程


    本章的最终目标是你将创建一个包含必要任务的`发布流程`，以实现我们的发布管理目标。记录这一流程，并知道它将随着时间推移而变化，以涵盖任何未来的可能性。它必须是严格的，并始终按照其设计意图被遵循。这意味着，在任何时间点，你为此流程创建的规则都必须被遵守。为确保所有相关人员了解该流程，必须与适当的人员进行讨论；它必须被所有相关人员接受和同意。请记住，这个流程可能会随着时间而改变。


    允许它具有可塑性将有助于你随着时间的推移和需求的变化来改进你的流程。


    本章提供了许多部分和部件，你将能够在流程中实施。如果你能将此流程的部分环节甚至整个流程自动化，你将大大降低风险。'
- fmt: "# CHAPTER 8: RELEASE MANAGEMENT\n\n## Players Involved\n\nBecause you are\
    \ not an island, and change processes don’t occur within a vacuum, you will need\
    \ to be involved with multiple people throughout the entire release process. As\
    \ you are planning your own release process, ensure that you have involved all\
    \ the appropriate players. In this section, you will find some suggested groups\
    \ that might need to be involved. Keep in mind that you may involve more than\
    \ one person from each group.\n\nMeet with the teams and managers that will ultimately\
    \ be involved with the process. Start with your manager and team, and branch out\
    \ to the other teams and managers. Get them to commit to this process, get them\
    \ involved, spread the ownership, and the goals that you are pursuing.\n\nIdentify\
    \ the potential individuals that should be involved from the following list:\n\
    \n*   Project managers\n*   Product managers\n*   Development\n    *   Developers\n\
    \    *   Development managers\n    *   Development team leads\n    *   Development\
    \ subject matter experts\n*   Quality assurance\n    *   `QA` engineers\n    *\
    \   `QA` managers\n    *   `QA` team leads\n    *   `QA` subject matter experts\n\
    *   Database administrators (`DBAs`)\n    *   Development\n    *   Tech ops\n\
    \    *   Infrastructure engineers\n*   Production\n    *   Network engineers\n\
    \    *   Storage area network (`SAN`) engineers\n*   `IT` staff\n\n## Version\
    \ Control\n\nIf you do not currently have version control to contain a golden\
    \ copy of your code and database objects, it is strongly suggested that you do\
    \ so going forward. You should begin implementing a solution to keep different\
    \ versions of code protected. There are many different ways to implement a comprehensive\
    \ version control process, depending on your needs. At a minimum, you need to\
    \ store versions of objects and other `T-SQL` code externally from your database,\
    \ so that in the event of a change disrupting your systems, you can revert to\
    \ the original version of said objects.\n\nAn easy way to implement version control\
    \ is to capture a snapshot of the database schema before and after changes have\
    \ occurred. If data changes are involved, those changes should be snapshotted\
    \ as well.\n\nKeeping track of these changes before and after a release will also\
    \ allow you to document what changed and reconcile it with the actual release\
    \ plan that was created.\n\nYou could use `PowerShell` or `SMO` to script out\
    \ objects to files or scripts. Third-party tools are also available, such as `Git`,\
    \ `Mercurial`, `SVN`, `Red Gate’s SQL Source Control`, and `Microsoft’s Team Foundation\
    \ Server`, among others. Each of these options affords you the opportunity to\
    \ collect database objects and store them outside your database.\n\nKeep in mind\
    \ that the simplest way to perform version control is to create a backup of your\
    \ database moments before you perform a release. I would suggest that you perform\
    \ a backup each and every time that you release. Regardless of what version control\
    \ system you implement or currently have, creating backups prior to a release\
    \ will give you a failsafe. This process, like all others, should be malleable\
    \ and allow you to change it from time to time, thus improving the process along\
    \ the way."
  raw: 'Humans are fallible. No matter how careful we are, we can make mistakes. As
    you review your process and as you perform a release, keep a wary eye on each
    step and make attempts to perfect it. Performing the steps manually initially
    will help you to understand what is needed to accomplish said task. But as you
    continue performing these steps, you will see ways to automate them. Automation
    is your friend, and will minimize risk if performed properly.


    An example of automating release steps can be shown when a release involves replication.
    There will be a few steps to perform replication changes. These changes can be
    scripted out beforehand and tested in other environments. The actual scripts that
    you create to perform a step, such as adding an article to a publication, can
    be encapsulated into a tool and executed when you reach that step of the release
    plan.


    Soon you will see other parts of your release plan that can also be automated.


    Players Involved


    Because you are not an island, and change processes don’t occur within a vacuum,
    you will need to be involved with multiple people throughout the entire release
    process. As you are planning your own release process, ensure that you have involved
    all the appropriate players. In this section, you will find some suggested groups
    that might need to be involved. Keep in mind that you may involve more than one
    person from each group.


    Meet with the teams and managers that will ultimately be involved with the process.
    Start with your manager and team, and branch out to the other teams and managers.
    Get them to commit to this process, get them involved, spread the ownership, and
    the goals that you are pursuing.


    Identify the potential individuals that should be involved from the following
    list:


    •


    Project managers


    •


    Product managers


    •


    Development


    •


    Developers


    CHAPTER 8 ■ RElEAsE MAnAgEMEnT


    •


    Development managers


    •


    Development team leads


    •


    Development subject matter experts


    •


    Quality assurance


    •


    QA engineers


    •


    QA managers


    •


    QA team leads


    •


