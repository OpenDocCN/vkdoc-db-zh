  raw: 'You could come into work each day, open SSMS, connect to each server, and
    back up each database. But what happens when you get so many databases or servers
    that you don’t have the time to do that every day? How do you manage to regularly
    back up transaction logs? How do you take a day off work and still ensure backups
    are taken? Automation is the key. Creating an Agent job that runs a T-SQL script
    to back up your databases on a schedule is the best choice for backups.


    There are three database recovery model options in SQL Server: Simple, Full, and
    Bulk-Logged. Simple requires you to back up the data files. Full and Bulk-Logged
    require you to back up the data and transaction log files. Simple allows you to
    recover the data to the point of the last full backup. Bulk-Logged allows you
    to back up to the point of the last log backup, but without point-in-time recovery.
    Full allows you to recover to a point in time, as long as it is covered by a complete
    backup. Carefully choose the recovery model for each database, balancing the amount
    of data you can lose with the amount of space required for backups.


    For each database, you’ll need to decide the type of backup to be performed, and
    on what schedule. A full backup will contain all the data in the database. A differential
    backup will capture any changes made since the last full backup. A transaction
    log backup, applicable only to Full or Bulk-logged databases, contains all log
    records not in a previous backup.


    Deciding where to save your backups is another consideration. Saving backups to
    the same storage as the data and log files is not recommended. First, there will
    be heavy I/O operations as SQL Server reads the data and writes it to the backup.
    Second, if there is a drive failure in that storage array, you will lose both
    your database and your backup—the worst scenario! Saving the backups to the same
    server, but perhaps a different storage array, might be quick but doesn’t offer
    much protection if there is an issue with the server.


    Saving to a different location on the network, such as a file server, offers a
    good mix of speed and safety, as the likelihood of two servers going down at the
    same time is less. An offsite backup is best, and it is common to back up the
    file server to tape and then ship the tapes off site.


    Once you have determined the recovery model for your database and selected the
    location to save the files, you can set the schedule, mixing in full, differential,
    and log backups as necessary.


    Restores


    Backing up your databases is the first step in a disaster recovery plan, but realize
    there is no guarantee that the backup worked correctly every time. Disks and networks
    are still fallible. The second and equally important step is restoring the database
    so you know you can access your data if needed.


    Where should you restore the database to test the validity of your backups? It
    might be tempting to restore it to the same instance. If there was an actual disaster,
    that is exactly what you would need to do.


    However, remember that this will increase the I/O load on the server and that
    might not be desirable. It’s best to find a different, but identical or similar,
    server for the restore.


    How often should you perform these restores? This is a question you will need
    to consider carefully. A mission-critical database that holds essential business
    information might need to be tested daily. On another database, it might be acceptable
    to do an actual restore one day a week and a RESTORE


    VERIFYONLY the other days.


    You also want to ensure that you are restoring all the necessary files. If you
    are performing full and differential backups, make sure you are restoring both
    backups. If you have transaction log backups, make sure you can restore those
    also.


    chapter 10 ■ automating administration


    Database Integrity


    Despite anyone’s best intentions, even with the writing of good code, regular
    backups, and periodic restores, data can be corrupted. It will happen to you,
    at some point in your career. You can be proactive by running DBCC CHECKDB.


    This is a process that performs several steps to check the integrity of the data.
    The system catalogs are first checked for integrity. Then, allocation consistency
    checks are performed, followed by a check of tables, indexes, and views. Additional
    data may be checked, such as Service broker, indexed views, XML


    indexes, and spatial indexes. As a whole, this process makes sure the data is
    readable and usable.


    How often you run this, and against which copy of your database, is something
    to be considered carefully. The larger your database becomes, the longer this
    task will take to run. The task is performed on a snapshot of the database, not
    the database itself, and the operation can take extra resources on the server.
    You may want to consider options such as creating a database snapshot on separate
    storage and running DBCC CHECKDB against that, or combining this task with the
    previous by restoring a backup on a secondary server, then running DBCC CHECKDB.
    However you go about it, it’s vital to check the health of the database on a regular
    basis. This can easily be automated with a SQL Server Agent Job.


    Index Maintenance


    SQL Server relies on indexes to efficiently find data and return it in queries.
    Properly applied indexes can greatly increase the performance of applications
    and reports. These are not something you can create and forget about, however.
    Proper maintenance is essential to make sure they continue to be of benefit.


    Clustered indexes order data pages. As records are inserted, updated, or deleted,
    the amount of space taken up by a record can increase or decrease. This leads
    to additional pages inserted, and unused gaps on other pages. The logical ordering
    may not match the physical ordering of the pages. This is called fragmentation.
    Left unattended, fragmentation can cause queries to run slowly, affecting the
    performance of applications, and can result in calls to the DBA. By proactively
    monitoring index fragmentation and fixing it, you can reduce those calls.


    To combat fragmentation, you want to perform index maintenance. You can reorganize
    or rebuild indexes. Reorganizing will physically reorder the leaf-level pages
    to match the logical order in order to fill unused areas and better use the space
    allocated. Rebuilding will drop the index and re-create it. During this operation,
    a lock is taken on the index. If the index is a clustered index, the table is
    unavailable for that time, unless you use the ONLINE option, which is only available
    in Enterprise edition. Rebuilding is much more intensive than reorganization,
    but will reclaim space as pages are compacted, and reordered. If you choose to
    rebuild indexes, you’ll need to determine a maintenance window and schedule rebuilds
    to execute during that time. For example, if that window is Saturday at 2:00 am,
    you don’t want to be responsible for logging into the server and starting a rebuild
    task. Again, automation is the key. (More information about indexes can be found
    in Chapter 7.)


    You probably don’t want to rebuild each index every time fragmentation is detected.
    Doing so can cause unnecessary amounts of work. First, establish what an unacceptable
    amount of fragmentation is for your indexes. Once you determine what an unacceptable
    level is, decide if you will reorganize or rebuild the index. You may even take
    a tiered approach by reorganizing indexes that are between A% and B% of fragmentation,
    and rebuilding those between B% and C% of fragmentation. Identify all the indexes
    that fall within each threshold and then perform maintenance on them as indicated
    by the thresholds you’ve set.


    chapter 10 ■ automating administration


    Statistics Maintenance


    Statistics go hand-in-hand with indexes. Statistics keep track of the distribution
    of data in a column.'
