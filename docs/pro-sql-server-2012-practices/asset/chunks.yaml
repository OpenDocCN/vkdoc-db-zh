  trans: "\n# 第 14 章：页面与行压缩\n\n在确定压缩对象时，接下来要考虑的是你表上的扫描和更新模式。一张表更新得越频繁，你压缩它的可能性就应该越低。写入操作会引发额外的\
    \ CPU 活动。SQL 需要持续地将对数据页的写入在压缩与未压缩格式之间转换。更新操作可能导致**页拆分**，这进而需要在所有被更新的页上重新计算页面压缩。请注意，我说的是“更新”而非“插入”。插入可能会带来问题，但更新更能体现你表中数据的**易变性**。我们的查询将寻找扫描和更新，并会从中过滤出插入操作。\n\
    \n你使用 DMV `sys.dm_db_index_operational_stats` 来确定扫描和更新模式。\n\n此 DMV 返回大量范围扫描和表扫描，以及更新、插入和删除活动的底层\
    \ I/O 细节。你将使用的查询最初是两个独立的查询。我使用了一个**公共表表达式** (`CTE`)——它是一个基于简单查询的临时派生结果集——将它们结合起来，以便你能并排查看索引的扫描和更新情况。\n\
    \n你使用 `range_scan_count` 列来获取针对堆、聚集索引或非聚集索引发生的所有扫描。然后，你将该数字乘以 `100.0`，再将结果除以系统上发生的所有扫描、插入、更新和删除的总数。这会给你一个数据库中所有表的所有索引的扫描活动百分比。\n\
    \n如果你只执行查询，返回的百分比将始终为 100%。如果你执行了一些更新、删除或插入，你会看到扫描百分比开始下降。\n\n你使用 `leaf_update_count`\
    \ 列来获取堆、聚集索引和非聚集索引的所有更新活动。图 14-16 展示了我们一些演示表的扫描和更新查询结果；你的结果可能会根据你运行的 select、update\
    \ 和 insert 语句而有所不同。在通过应用压缩来重建对象时，该对象的所有扫描和更新数据都将被清除。\n\n理想情况下，为了选择一张表进行压缩，你的更新次数应低于\
    \ 40%，而扫描次数应达到 60% 或更高。这两个百分比加起来不会等于 100%——我们只是从这些索引可能执行的所有其他操作中，获取了这两种活动的平均值。\n\
    \n那么现在，让我们运行一个查询，它将查看你数据库中的每张表，并让你了解每张表的分配单元构成。\n\n```sql\nWITH IndexUsage(tableName,\
    \ IndexName, [Partition], IndexID, IndexType, USAGE, Percentage) AS(\n    SELECT\n\
    \        (ss.name + '.' + so.name)\n        ,si.name\n        ,ios.partition_number\n\
    \        ,ios.index_id\n        ,si.type_desc AS indexType\n        ,'SCANS'\n\
    \        , case ios.range_scan_count\n            when 0 then 0\n            else\n\
    \            (ios.range_scan_count *100.0/\n            (ios.range_scan_count\
    \ +\n            ios.leaf_delete_count +\n            ios.leaf_insert_count +\n\
    \            ios.leaf_page_merge_count +\n            ios.leaf_update_count +\n\
    \            ios.singleton_lookup_count)) end AS percentScan\n    FROM\n     \
    \   sys.dm_db_index_operational_stats(DB_ID(),NULL,NULL,NULL) ios\n        JOIN\
    \ sys.objects so\n            ON so.object_id=ios.object_id\n        JOIN sys.indexes\
    \ si\n            ON si.object_id = ios.object_id AND si.index_id = ios.index_id\n\
    \        JOIN sys.schemas ss\n            ON so.schema_id = ss.schema_id\n   \
    \ WHERE\n        OBJECTPROPERTY(ios.object_id, 'IsUserTable')=1\n    UNION ALL\n\
    \    SELECT\n        (ss.name + '.'+ so.name)\n        ,si.NAME\n        ,ios.partition_number\n\
    \        ,ios.index_id\n        ,si.type_desc\n        ,'UPDATES'\n        , case\
    \ ios.leaf_update_count\n            when 0 then 0\n            else\n       \
    \     (ios.leaf_update_count *100/\n            (ios.range_scan_count +\n    \
    \        ios.leaf_insert_count +\n            ios.leaf_delete_count +\n      \
    \      ios.leaf_update_count +\n            ios.leaf_page_merge_count +\n    \
    \        ios.singleton_lookup_count)) end\n    FROM\n        sys.dm_db_index_operational_stats(DB_ID(),\
    \ NULL, NULL, NULL) ios\n        JOIN sys.objects so\n            ON so.object_id\
    \ = ios.object_id\n        JOIN sys.indexes si\n            ON ios.object_id=si.OBJECT_ID\
    \ AND ios.index_id=si.index_id\n        JOIN sys.schemas ss\n            ON so.schema_id=ss.SCHEMA_ID\n\
    \    WHERE\n        OBJECTPROPERTY(ios.object_id, 'IsUserTable') =1\n)\nSELECT\n\
    \    iu.tableName\n```\n"
- fmt: "# Chapter 14: Page and Row Compression\n\n```\nSELECT\n    iu.IndexID,\n \
    \   iu.IndexType,\n    iu.USAGE,\n    cast(iu.Percentage as decimal(12,2)) as\
    \ Percentage\nFROM\n    IndexUsage iu\nORDER BY\n    iu.tableName,\n    iu.IndexName,\n\
    \    iu.Percentage DESC\nGO\n```\n\n`Figure 14-16.` The scan and update patterns\
    \ on the tables in my demo database.\n\nThis query uses the statistics in use\
    \ on your database since the last reboot to determine these patterns. To get solid\
    \ data, you should run this on a server that has been online for as long as possible.\
    \ The higher the number of scans, the more the table is suited for compression.\
    \ The lower the number of scans 354 and higher the number of updates, the more\
    \ you want to consider either row compression or no compression.\n\nLook at `Figure\
    \ 14-16` and examine our usage patterns. You’ll see that `vmaxTest` is a good\
    \ candidate for compression. You’ll also see that `dbo.datarecord` is not. Get\
    \ a baseline of the statements run against the database to validate this decision.\n\
    \nAnother thing to consider regarding indexes is the rebuild time. When you enable\
    \ row compression index, rebuilds on that particular index should take 1.5 times\
    \ what the rebuild rate is for the same index in a noncompressed format. Page\
    \ compression takes that up even further to 2 times the rebuild rate for the same\
    \ index in an uncompressed format.\n\nSo now that you have selected a table based\
    \ on the table size, allocation unit makeup, and a compression setting based on\
    \ the scan or update patterns, you’re ready to run `sp_estimate_data_compression_savings`.\
    \ This is the built-in procedure for estimating compression space savings. You\
    \ can focus this procedure by providing the `Schema Name`, `Object Name`, `Index\
    \ ID`, and `Partition Number` parameters and specifying the type of compression\
    \ you want to estimate. You can specify `Row`, `Page`, or `None`. If you have\
    \ an uncompressed object, you can see the estimated space savings by specifying\
    \ the type of compression you would like to apply. If you would like to uncompress\
    \ a compressed object, you can specify `None` and find out what the estimated\
    \ size of the uncompressed object will be. Before you do that, I want to issue\
    \ a big warning.\n\nThe system stored procedure `sp_estimate_data_compression_savings`\
    \ works by placing 5 percent of the table in your `Tempdb` and performing the\
    \ compression operation. Based on the rate of compression, it then extrapolates\
    \ the data and estimates, based on the size of your table, what your savings might\
    \ be for the type of compression you specified.\n\nFor most people, this will\
    \ not be a problem. Estimating the compression savings of a 100-MB table will\
    \ take 5 MB of `Tempdb` space. However, estimating the compression savings of\
    \ a 100-GB table will take 5 GB of `Tempdb` space. If you have a 500-GB table,\
    \ you need 25 GB of free `Tempdb` space for the operation. If you fill up `Tempdb`,\
    \ activity on your server will grind to a halt. So be careful and only use `sp_estimate_data_compression_savings`\
    \ as your last step.\n\nThere are tools on Codeplex and scripts all over the Internet\
    \ that put `sp_estimate_data_compression_savings` in a cursor and run it for every\
    \ table in your database. I do not recommend this approach because all it does\
    \ is give you a possible `estimate`. It doesn’t tell you what the allocation unit\
    \ makeup of your tables are, nor does it help you determine what level of compression\
    \ to use.\n\nSo before you use `sp_estimate_data_compression_savings`, take a\
    \ look at your `Tempdb` and make sure you have enough free space to estimate the\
    \ compression savings safely.\n\nAfter doing this, make sure you take performance\
    \ baselines before and after compression is applied.\n\nCompression will reduce\
    \ the amount of data cache used by the buffer pool, and reducing the number of\
    \ pages in a table could move some queries from scans to seeks, thus improving\
    \ query performance. The only way to be sure is to have a baselines review.\n\n\
    ## Fragmentation and Logged Operations"
