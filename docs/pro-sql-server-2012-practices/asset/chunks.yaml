    典型瀑布式实现的问题不在于步骤本身，也不在于步骤的顺序，而在于步骤的规模。项目可能花费数月甚至数年来收集需求，然后再花费数月或数年进行设计。经过这段漫长的时间，程序员终于收到设计并开始编码。（通常，设计是从门底下塞进去的，这样设计者就可以避免进入程序员所在的、被束缚在办公桌前的地牢。）这种方法的问题在于，在软件完成前的几年里，用户的需求频繁变化。或者（更糟的是）当开始编程时，才发现需求是错误的，整个过程必须重新开始。


