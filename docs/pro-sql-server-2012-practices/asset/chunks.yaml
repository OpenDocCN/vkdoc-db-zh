    \n可用性组的全部目的就是提供一种机制，使被配置为组一部分的数据库始终保持可用。这主要通过从一个副本到另一个副本的自动故障转移过程来实现。这个概念本身似乎表明你根本不再需要备份了。但请记住，可用性组是维护高可用性的一种手段。它们是对灾难恢复\
    \ (DR) 计划的补充，但不能完全替代所有 DR 工作的根本起点——备份。你仍然需要运行标准的备份集。\n\n将数据库放入可用性组存在一个问题。一旦该数据库成为组的一部分，你就无法再对该数据库执行还原操作。实际上，就可用性组而言，你也不会想去还原。如果一台服务器脱机、数据库损坏或某些其他操作导致与该副本的连接丢失，你的其他副本会接管负载。你可以通过使系统重新联机并重新加入可用性组来简单地恢复系统。你将与可用性组重新同步，然后愉快地继续运行。\n\
    \n然而，如果你确实需要执行完整的灾难恢复计划怎么办？你需要还原该数据库。嗯，你的流程变化不大。让我们逐步演练一下。\n\n我有一个从主副本获取的完整数据库备份。我还有一系列针对其中一个辅助副本进行的备份。在正常的\
    \ DR 场景中，你可以将这些备份从主站点移走，异地存放以保护它们。在这个例子中，我将完整备份（取自一个副本）和日志备份（取自另一个副本）组合在一起，在另一台服务器上作为一个不同的数据库，将数据库还原到某个时间点。\n\
    \n首先，我将还原完整备份：\n\n```sql\nRESTORE DATABASE MMCopy\nFROM DISK = 'c:\\bu\\moviemanagement.bak'\n\
    WITH NORECOVERY, MOVE 'MovieManagement' TO 'c:\\data\\moviemanagement.mdf',\n\
    MOVE 'MovieManagement_Log' TO 'c:\\data\\moviemanagement_log.ldf';\n```\n\n现在，我可以使用一些创建的日志备份，将此数据库恢复到插入第二行数据之前的某个时间点：\n\
    \n```sql\nRESTORE LOG MMCopy\nFROM DISK = 'c:\\bu\\MovieManagement_log_2012_7_6_22_44'\n\
    WITH NORECOVERY, STOPAT = '7/6/2012 18:45';\n\nRESTORE LOG MMCopy\nFROM DISK =\
    \ 'c:\\bu\\MovieManagement_log_2012_7_6_22_46'\nWITH NORECOVERY, STOPAT = '7/6/2012\
    \ 18:45';\n\nRESTORE DATABASE MMCopy\nWITH RECOVERY;\n```\n\n**图 16-15.** 在恢复到第二次插入操作之前的某个时间点后返回的数据。\n\
    \n我可以通过简单地从已还原的数据库中选择数据来验证我已将数据库恢复到第二次插入之前的时间点：\n\n```sql\nUSE MMCopy;\nSELECT\
    \ * FROM dbo.ChangingData;\n```\n\n返回的数据如**图 16-15**所示。\n\n恢复到某个时间点并非难事。但你必须记住，使用的完整备份来自一台服务器——具体来说，是我当前的主副本\
    \ `SQLTHREE`。而使用的日志备份则来自完全不同的服务器 `SQLFIVE`。我能够跨可用性组内的多台机器获取备份，然后在另一个位置将这些备份组合起来还原一个数据库。\n\
    \n## 结论\n"
- fmt: '# Chapter 16: Backups and Restores Using Availability Groups


    The advanced capabilities offered by Availability Groups within SQL Server 2012
    provide a much wider array of high-availability solutions. But they also create
    additional opportunities for your disaster-recovery planning. You will be able
    to move part of your backups off to the secondary replicas without having to worry
    about which replica is currently the primary or even which of the secondary replicas
    is available.


    Just make sure that you always check against the `sys.fn_hadr_backup_is_preferred_replica`
    function to be sure that the correct replica is running the backups. Although
    you can’t restore directly over databases within the Availability Group, you can
    use these log backups in combination with full backups from a primary replica
    to restore a database to another location. The best part is that you’re not limited
    in how you run your backups. You can use `Maintenance plans` or your own custom
    scripts without impacting how your Availability Group functions or negatively
    affecting your ability to later restore the databases that take part in that group.


    # Chapter 17: Big Data for the SQL Server DBA


    By Carlos Bossy


    By now you’ve all heard about “Big Data,” and the way people talk about it, you
    might think it’s as overwhelmingly large as the universe. If you’re like most
    database administrators, you likely already work with data that is big. You probably
    spend your professional time managing multiple databases that are terabytes in
    size or larger, and continue to grow. The size of data has exceeded Moore’s Law,
    more than doubling every 24 months and making the DBAs job a challenge, to say
    the least. There’s never been anything small about what you do. So, why is data
    now “big”?


    This chapter will explain the meaning and significance of Big Data by comparing
    and contrasting it to the SQL Server relational database environment. It will
    also demonstrate the value a Big Data ecosystem can provide to your technology
    infrastructure by using it to complement your existing data architecture and having
    it co-exist in effective ways with your SQL Server databases. If hearing about
    Big Data has mystified you and made you wonder if it is nothing more than irrational
    exuberance, by the end of this chapter you’ll have a better sense of how to make
    the best use of it and why it could benefit you and your organization.


    For SQL Server–centric DBAs, what exactly does Big Data mean? It’s still a nebulous
    area, not yet well-defined and without accepted practices or standards. If there
    wasn’t already enough to know in the demanding job of a DBA, learning, understanding,
    and managing yet another technology can certainly add to an already stressful
    workday. Throughout this chapter, I’ll present some definitions and descriptions
    that gradually introduce Big Data, present several business cases for taking advantage
    of Big Data, and show some practical working examples of actual code you can execute
    in Big Data database environments.


    If you’re not certain what Big Data is, you’re not alone. Putting a wrapper around
    it isn’t easy, and there is no precise industry standard definition. So, let’s
    start by looking at some statements about Big Data that should provide some clarity.


    > **Note:** Big Data is a class of data that requires CPU and disk resources that
    exceed the power of stand-alone computer hardware to be retrieved efficiently.
    Processing it effectively requires multiple distributed computers working in parallel.
    This data is difficult to process in a traditional relational database management
    system (`RDBMS`).


    Therefore, it is beneficial to define the schema for this data at retrieval time,
    after it is stored on disk.


    The ”three Vs” that define Big Data are: **volume** of data measured in at least
    terabytes and into petabytes; **variety** of data that includes media files, images,
    text, streams, logs, sensors, and more; and **velocity** of data, which is the
    speed with which it is collected.


    For the SQL Server DBA, Big Data means managing and processing data that forces
    you to think beyond SQL Server’s ample set of features. This approach includes
    solutions that are difficult to implement with the core database engine, partitioning,
    `Service Broker`, `Analysis Services`, and many other tools you commonly utilize
    to make SQL Server process high volumes of assorted data types.


    A Hadoop implementation of Big Data is a mechanism for handling data that can
    and must be distributed for massive scalability beyond what SQL Server can do
    (and more than it was meant to do).


    Hadoop is also good at handling large data types, data without a well-defined
    schema, and data that is generally difficult for traditional databases, such as
    SQL Server, to handle. Big Data is about massive volumes of data, and a Hadoop
    infrastructure may be in your future if you have to deal with any of the following
    types of data:


    - Unstructured data such as images, video, and free-form text

    - Data you would have thrown away to save space or maintain performance

    - Data you might need later for analysis, audits, or for an unplanned purpose

    - Anything you don’t want in your `OLTP` databases or data marts because it doesn’t
    really belong there

    - Data that doesn’t relate precisely to any other data


    Without immense data volumes or special data types, it’s likely that a traditional
    SQL Server database solution will suit you just fine and will handle your data
    adequately without the complexity of introducing new technology. SQL Server `OLTP`
    relational databases start transactions, get data, lock it, change it, and commit
    the changes to the database. This is a proven, reliable, and well-understood process
    that has been developed and fine-tuned since the 1970s.


    In addition to relational database technology, you also have other options for
    storing data. An `Analysis Services` cube and Tabular models are great for reporting,
    ad-hoc analysis, dashboards, and other metrics-based visualization. You can also
    partition data, use file tables, scale out with `Service Broker`, and more, making
    every data architecture uniquely its own. These techniques provide you with a
    multitude of choices, with the arrival of Big Data being one more weapon in your
    arsenal.


    Big Data is nonrelational, yet the relational data model has proven itself to
    be very useful for more than 30 years. It’s easy for technologists to understand,
    and if you understand the model, it’s a good bet that you understand the application.
    It describes the entities in the database in a very familiar way; as we talk about
    the entities, we also describe the real world. A customer *has an* address. A
    store *contains* products. A supervisor *is an* employee. Developers can easily
    interpret its visual representation, and then use that as a guide for how to handle
    data within an application. For example, you can scan a data model diagram and
    immediately get a great understanding of the data. You could even post this diagram
    on a wall for reference and discussion.'
