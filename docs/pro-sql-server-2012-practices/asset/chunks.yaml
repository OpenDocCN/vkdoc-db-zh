    \            *   [Example Code](#index_split_007.html#p494)\n    *   [Chapter\
    \ 1: Be Your Developer’s Best Friend](#index_split_000.html#p13)\n        *  \
    \ [My Experience Working with SQL Server and Developers](#index_split_000.html#p13)\n\
    \        *   [Reconciling Different Viewpoints Within an Organization](#index_split_000.html#p14)\n\
    \        *   [Preparing to Work with Developers to Implement Changes to a System](#index_split_000.html#p15)\n\
    \        *   [Step 1: Map Your Environment](#index_split_000.html#p15)\n     \
    \   *   [Step 2: Describe the New Environment](#index_split_000.html#p17)\n  \
    \      *   [Step 3: Create a Clear Document](#index_split_000.html#p19)\n    \
    \    *   [Step 4: Create System-Management Procedures](#index_split_000.html#p19)\n\
    \        *   [Step 5: Create Good Reporting](#index_split_000.html#p22)\n    \
    \    *   [Ensuring Version Compatibility](#index_split_000.html#p23)\n       \
    \ *   [Setting Limits](#index_split_000.html#p24)\n            *   [Logon Triggers](#index_split_000.html#p24)\n\
    \            *   [Policy-Based Management](#index_split_000.html#p27)\n      \
    \      *   [Logging and Resource Control](#index_split_000.html#p27)\n       \
    \ *   [Next Steps](#index_split_000.html#p27)\n    *   [Chapter 2: Getting It\
    \ Right: Designing the Database for Performance](#index_split_000.html#p28)\n\
    \        *   [Requirements](#index_split_000.html#p29)\n        *   [Table Structure](#index_split_000.html#p31)\n\
    \            *   [A Really Quick Taste of History](#index_split_000.html#p31)\n\
    \            *   [Why a Normal Database Is Better Than an Extraordinary One](#index_split_000.html#p32)\n\
    \            *   [Physical Model Choices](#index_split_000.html#p44)\n       \
    \ *   [Design Testing](#index_split_000.html#p51)\n        *   [Conclusion](#index_split_000.html#p52)\n\
    \    *   [Chapter 3: Hidden Performance Gotchas](#index_split_000.html#p54)\n\
    \        *   [Predicates](#index_split_000.html#p54)\n        *   [Residuals](#index_split_000.html#p70)\n\
    \        *   [Spills](#index_split_000.html#p76)\n        *   [Conclusion](#index_split_001.html#p81)\n\
    \    *   [Chapter 4: Dynamic Management Views](#index_split_001.html#p82)\n  \
    \      *   [Understanding the Basics](#index_split_001.html#p82)\n           \
    \ *   [Naming Convention](#index_split_001.html#p83)\n            *   [Groups\
    \ of Related Views](#index_split_001.html#p83)\n            *   [Varbinary Hash\
    \ Values](#index_split_001.html#p84)\n        *   [Common Performance-Tuning Queries](#index_split_001.html#p85)\n\
    \            *   [Retrieving Connection Information](#index_split_001.html#p85)\n\
    \            *   [Showing Currently Executing Requests](#index_split_001.html#p86)\n\
    \            *   [Locking Escalation](#index_split_001.html#p88)\n           \
    \ *   [Finding Poor Performing SQL](#index_split_001.html#p89)\n            *\
    \   [Using the Power of DMV Performance Scripts](#index_split_001.html#p91)\n\
    \            *   [Divergence in Terminology](#index_split_001.html#p93)\n    \
    \        *   [Optimizing Performance](#index_split_001.html#p93)\n           \
    \ *   [Inspecting Performance Stats](#index_split_001.html#p96)\n            *\
    \   [Top Quantity Execution Counts](#index_split_001.html#p97)\n            *\
    \   [Physical Reads](#index_split_001.html#p98)\n        *   [Physical Performance\
    \ Queries](#index_split_001.html#p98)\n            *   [Locating Missing Indexes](#index_split_001.html#p98)\n\
    \            *   [Partition Statistics](#index_split_001.html#p103)"
