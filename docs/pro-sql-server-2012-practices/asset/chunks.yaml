    # 第 2 章 ■ 正确行事：为性能而设计数据库


    其目标是缩短从需求收集到软件交付的整个过程耗时，从数年压缩到仅仅数周，从而减少需求收集与实施之间的时间。（如需了解更多关于**敏捷**的信息，请从他们的“宣言”开始：[`agilemanifesto.org/`](http://agilemanifesto.org/)。）对敏捷的批评常常与瀑布方法截然相反：花在真正理解用户问题上的时间极少，在说出“我们需要一个程序来执行……”之后，编码工作便立即展开。其结果几乎总是可以预见的（尽管可能稍微快一点……）很糟糕。


    > **注意** 实际上，**敏捷**和**瀑布**方法在其适用场景下都可能运作良好，尤其是由合适的人以正确的方式执行时。特别是当由真正理解软件开发流程需求的专业人员使用时，敏捷方法非常有效，但它确实需要相当的纪律性，才能防止流程退化为混乱。


    软件设计与实施的理想状态介于完全不花时间做需求分析和花费数年做需求分析之间，但事实是，瀑布方法至少顺序是正确的，因为我之前列出的每个步骤都需要遵循其前置步骤。如果不理解用户的需求（包括当前和未来的），产出物极不可能接近实际所需。


    那么，在本章关于性能的内容中，需求分析有何关联？你可能会说它们与一切息息相关。（或者你可能不这么认为——我怎么知道你会怎么说呢？）优化软件使用的最佳方式是构建正确的数据库。在几乎所有的业务系统中，数据库都是代码的基础，因此一旦构建完成，更改其结构可能极具挑战性。实际情况是，当需求在流程后期才被发现时，数据库就会被修改以适应新需求。这可能导致数据库处于一种难以使用且通常难以优化的状态，因为大多数时候，你遗漏的需求正是那种人们不会立刻想到、但在实际使用中出现时却至关重要的模糊需求。`SQL
    Server` 引擎有其最佳的使用模式，而设计良好的数据库能将用户需求与引擎需求相匹配。


    正如我在本章开篇提到的，你可能不是负责收集需求的人，但你肯定会受到需求的影响。很多时候（即使是不编程的生产数据库管理员），你可能被要求对某个数据库发表意见。问题几乎总是，如果你不知道需求，那么几乎任何数据库看起来都可能是正确的。如果需求过于宽松，你的代码可能不得不为一系列极其广泛、甚至可能物理上不可能出现的情况进行优化。如果需求过于严格，软件可能根本无法工作。


    回到化工厂的例子，假设我的咨询公司已经完成了我们的项目部分，我们已经拿到了报酬，程序员们也收拾行装去迪士尼世界花他们的奖金了，软件无法更改。那么会怎样？用户随后会找到一些对系统来说不合逻辑的数据组合，但却能“欺骗”系统使其工作。例如，他们可能会输入一个质量评级为
    10,000 加上实际评级。这大于 100，因此产品可以发货。但现在，数据的每一次使用都必须考虑到，10,000 及以上的值实际上意味着该值是存储值减去 10,000（客户已接受），而低于
    100 的值则是用户未接受的失败产品。在下一节中，我将讨论**规范化**，但现在请相信我说的：设计一个包含多个值和/或多重含义的列，绝不是你会称之为好的实践，这使得实现足够的性能变得越来越困难。


    关于需求的最后一点说明，需求应该以不特定于实现的方式编写。声明“我们需要一个表来存储产品名称和产品质量评分”可能会降低软件质量，因为很难从写得糟糕的散文中辨别出实际需求。这个陈述可能意味着“产品有名称，该产品的每个批次有一个质量评分”，或者“每个批次将有一个不同的名称和一个质量评分”。在构建表时，你的目标将是让你的设计与正确的版本相匹配。当然，第一个版本更合理，但业务并不总是合乎逻辑。


    > **注意** 在这篇关于设计及其对性能影响的简短章节中，我将假设你已熟悉关系数据库的术语并理解其基础知识。我也不会花太多时间讨论设计的整体流程，但你应该在获取需求和编写代码之间，花时间通过数据建模工具来可视化产出。关于数据库设计整体流程的更多信息，我或许可以厚颜无耻地推荐
    *Pro SQL Server 2012 Relational Database Design and Implementation* (Apress, 2012)
    这本书吗？本章剩余部分的目标是涵盖设计中可能对你处理`SQL Server`数据库时的性能（以及你的愉快体验）产生负面影响的重要部分。


    ## 表结构


    为微软`SQL Server`团队工作的工程师们非常了不起。他们打造了一款产品，在每一个后续版本中都持续改进，并试图处理抛给它的任何结构、任何技能水平的人编写的任何代码，并让这些代码运行良好。然而，尽管他们付出了巨大努力，事实仍然是`SQL
    Server`的核心是一个关系数据库引擎，通过遵循良好的关系实践来使用这个引擎，你可以获得更多价值。在本节中，我将讨论是什么使数据库成为“关系型”的，以及如何通过尽可能接近地遵循关系模式来提高数据质量和数据库性能。


    为此，我将涵盖以下主题：


    ### 历史速览

    了解关系数据库为何是现在这个样子，有助于阐明`SQL Server`为何以其现有方式构建，以及你为何也需要以那种方式构建数据库。


    ### 为何规范化的数据库优于非规范化的数据库

    **规范化**是使数据库与关系引擎良好协作的过程。我将以实际的方式描述规范化以及如何实现它。


    ### 物理模型选择

    数据库物理结构的变化可能对你的性能产生显著影响。

