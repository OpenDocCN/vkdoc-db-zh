    执行 `sp_trace_generateevent 82, @msg`；


    ## 技术概述


    收集数据有两种提供程序：服务器端跟踪使用的文件提供程序，以及客户端跟踪使用的行集提供程序。这意味着并**没有**一个内置的直通表提供程序。


    起初，这对于 SQL Server 跟踪的新手来说可能令人困惑，但仔细一想，这其实很合理。


    要实现一个直通表提供程序，你必须遵循 SQL Server 数据写入、事务日志、锁定、阻塞、资源等方面的规则……而通过现在的方式，你只需有一个简单的文件或内存缓冲区来写入跟踪数据，SQL
    Server 就完成它的任务了。


    ## 实现细节


    需要注意的一个重要问题是：虽然在创建跟踪时可以使用筛选器，但这些筛选器**不会**在数据收集阶段应用。任何事件的所有列都会被完整收集并发送到提供程序，然后在那里根据我们在跟踪定义中指定的列进行筛选。


    同时，使用几个较小的跟踪比一个巨大的跟踪更好。这是因为每个跟踪都有自己的目标位置，你可以将这些目标放在不同的驱动器上，从而分散负载。


    ## 管理监控


    所有跟踪都在 SQL Server 内部一个名为“后台管理线程”的线程中进行管理。一旦有任何跟踪开始运行，此线程就会启动。你可以在 `sys.sysprocesses`
    视图中，或者如果你使用的是 SQL Server 2005 及以上版本，可以在 `sys.dm_exec_requests` 动态管理视图中查看有关此线程的详细信息。


    在 SQL Server 2005 及以上版本中，始终有一个默认跟踪在运行，因此除非你显式关闭默认跟踪，否则此查询总会至少返回一行。我们将在本章后面讨论默认跟踪。代码展示了如何查询该视图和
    DMV。结果会因机器而异，你可以在 Books Online 中查看各列的含义。


    ```sql

    -- SQL Server 2000

    SELECT *

    FROM sys.sysprocesses

    WHERE cmd = ''TRACE QUEUE TASK'';


    -- SQL Server 2005 及以上版本

    SELECT *

    FROM sys.dm_exec_requests

    WHERE command = ''TRACE QUEUE TASK'';

    ```


    ## 缓冲机制


    SQL 跟踪引擎有一个所谓的“事件发送缓冲区”。跟踪事件数据首先被收集到这个缓冲区中，然后才被发送到提供程序。后台管理线程会监视跟踪提供程序，对于文件提供程序，它会每
    4 秒刷新一次。这样做对性能更好，因为它可以使用大块写入（一次大的连续磁盘写入，而不是许多小写入）来获得更快的 IO 写入速度。


    对于行集提供程序，它会关闭任何一个事件丢弃时间超过 10 分钟的提供程序。我们很快就会讨论到事件丢弃。


    ## 行集提供程序


    SQL Server 行集提供程序将跟踪数据发送到 SQL Server Profiler 和 .NET SMO（服务器管理对象）对象模型。你可能听说过在生产服务器上运行
    SQL Profiler 导致整个服务器陷入停滞的故事。没听说过？嗯，这些故事是真的。这种情况之所以发生，是因为行集提供程序是基于内存的。它会占用它所需的所有内存，如果你在生产服务器上运行它，它会占用那些宝贵的内存，使其对
    SQL Server 变得无法使用。这就是为什么你必须在非生产机器上运行 SQL Profiler 或 .NET SMO 收集器服务（这是由程序员编写的代码以满足特定的跟踪需求，不是
    SQL Server 产品的一部分）至关重要。


    行集提供程序使用内部缓冲区来处理传入的跟踪数据，如果这些缓冲区变满，事件可能会从跟踪输出中被丢弃。在内部缓冲区已满 20 秒后，跟踪开始被丢弃。此后，行集提供程序将丢弃它们以使事情重新向前推进。


    当这种情况发生时，SQL Server Profiler 将显示一条特殊消息，说明事件已被丢弃。等待刷新的内部缓冲区也会增加 `TRACEWRITE` 等待类型。通过这种方式，你可以使用
    `sys.dm_os_wait_stats` 动态管理视图来查看基于行集提供程序的跟踪是否对你的系统造成问题。

