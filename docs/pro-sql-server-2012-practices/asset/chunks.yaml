    SELECT Drive, MBFree, GETDATE()\nFROM @driveSpace\n\nGO\n```\n\n`Get_Drive_Space_Free`\
    \ 存储过程是一个如何使用扩展存储过程来收集 SQL Server 外部信息，以及如何存储该信息的示例。\n\n## 处理器\n\n了解处理器的工作强度也是一个重要的关键数据点，但获取这些信息并不容易。检索此信息的一种方法是查看动态管理视图（DVM）。然而，这些信息包含的是\
    \ SQL Server 如何使用处理器的统计数据，而不是您可能需要的实际处理器利用率数值。\n\n一种可以从操作系统层面检索处理器信息的方法是 Windows\
    \ 管理规范（WMI）。一个关于 WMI 的优秀资源可以在微软的脚本中心找到（[`technet.microsoft.com/en-US/scriptcenter/default.aspx`](http://technet.microsoft.com/en-US/scriptcenter/default.aspx)）。本示例中使用的已编译代码是由一位愿意提供帮助的开发人员提供的。在提供给我的\
    \ `.dll` 文件内部，包含了一个 WMI 调用，它开始监控处理器利用率，等待 10 秒，然后计算该时间段内的平均值。实用程序数据库可以通过启用 CLR\
    \ 来调用此 `.dll`，然后通过一个用户自定义的函数来访问这些信息。尽管听起来复杂，但实现起来并不太困难。\n\n第一步是创建将存储此信息的表。表格式将与作为实用程序数据库核心部分的其他类别\
    \ 1 表格相匹配，并且数据的保留策略应与其他应保留历史记录的数据一致。\n\n```sql\nUSE [dbUtilities]\n\nGO\n\nCREATE\
    \ TABLE [dbo].Processor_UTI NOT NULL,\n    [ReadingDate] [datetime] NOT NULL,\n\
    \    [ProcessorUTI] [int] NOT NULL,\n    CONSTRAINT [PK_Processor_UTI_ID] PRIMARY\
    \ KEY CLUSTERED \n        ([ProcessorReadingID])\n) ON [PRIMARY]\n\nGO\n```\n\n\
    ## 启用处理器利用率收集\n\n检索信息包含多个步骤，这些步骤将调整服务器的一些配置设置。启用处理器利用率收集的第一步是在您的服务器上启用 CLR。\n\n\
    ```sql\nsp_configure 'show advanced options', 1;\nRECONFIGURE\nGO\n\nsp_configure\
    \ 'clr enabled', 1;\nRECONFIGURE\nGO\n```\n\n需要告知 SQL Server 数据库内的内容是可信的。更改可信状态需要在\
    \ SQL Server 实例上使用提升的权限来完成。此步骤旨在验证从数据库内部调用的代码是受管理员信任的。\n\n```sql\nALTER DATABASE\
    \ dbUtilities SET TRUSTWORTHY ON;\n```\n\n一旦服务器配置为允许对外部 `.dll` 的调用，确保该 `.dll`\
    \ 文件存在于 SQL Server 可访问的目录中就至关重要。将 `.dll` 文件复制到该目录。"
- fmt: '## Chapter 6 ■ The Utility Database


    n `Note` I tend to put the `.dll` in directories where I store the data. This
    way, if the SQL Server is on a cluster, the `.dll` will be accessible on any node
    of the cluster.


    SQL Server needs to register the location of the `.dll`. The `create assembly`
    statement addresses this need.


    ```sql

    USE [dbUtilities]

    GO

    CREATE ASSEMBLY [dbUtilities.Database.CLRFunctions]

    FROM ''C:\Data\dbstats.Database.CLRFunctions .dll''

    WITH PERMISSION_SET = UNSAFE

    GO

    ```


    SQL Server can execute the `.dll` through a function.


    ```sql

    USE [dbUtilities]

    GO

    CREATE FUNCTION [dbo].[GetCPUUTI]()

    RETURNS [nchar](300) WITH EXECUTE AS CALLER

    AS

    EXTERNAL NAME [dbUtilities.Database.CLRFunctions].[UserDefinedFunctions].[GetCPUUTI]

    GO

    ```


    The final step is to create the stored procedure that the processes can use to
    retrieve the processor information to eventually store it.


    ```sql

    USE [dbUtilities]

    GO

    CREATE PROCEDURE GetProcUTI

    AS

    Insert Into Processor_UTI (ReadingDate,ProcessorUTI)

    Select Getdate(),Isnull(Round(dbo.getCPUUTI(), 0),0)

    GO

    ```


    ### Error Logs


    There are a number of messages, warnings, and errors that show up in the error
    log. Regular reviews of these errors are required to ensure that no critical health
    messages get missed. Automating and filtering the error log can help with avoiding
    critical messages. The nature of the data is at the core of SQL Server and is
    relevant to the current health. There is no need to store the data outside of
    the messages that have been reported on. Filtering the error log works on the
    `Daily_Report` table that has already been created.


    ```sql

    USE [dbUtilities]

    GO

    CREATE PROCEDURE [dbo].[Get_Filtered_Error_Log]

    AS

    DECLARE @Errorlog TABLE (LogDate datetime, ProcessorInfo VARCHAR(100),ErrorMSG
    VARCHAR(2000))

    INSERT INTO @Errorlog

    EXEC sp_executesql N''xp_readerrorlog''

    DELETE

    FROM @Errorlog

    WHERE ErrorMSG LIKE ''%Log was backed up%''

    DELETE

    FROM @Errorlog

    WHERE ErrorMSG LIKE ''%Setting database option COMPATIBILITY_LEVEL%''

    DELETE

    FROM @Errorlog

    WHERE ErrorMSG LIKE ''%were backed up%''

    DELETE

    FROM @Errorlog

    WHERE ErrorMSG LIKE ''%without errors%''

    INSERT INTO dbUtilities.dbo.Daily_Report

    SELECT ''Error Log'',Logdate,SUBSTRING(ErrorMSG, 1, 2000)

    FROM @Errorlog

    WHERE LogDate > DATEADD(dd, -1, GETDATE())

    GO

    ```


    The core of this stored procedure uses an extended stored procedure to load a
    temporary table with the data in the error log. Because we don’t want to review
    all the messages in the error log, and it is being used as a source review, messages
    of success and messages that have been identified as not needing review are then
    deleted from the temporary table. The data is then filtered for the last days’
    worth of data, and then inserted into the `Daily_Report` table.


    n `Note` It is important to keep the error log for an extended time frame. By
    default, a new error log is created only when the SQL Server service is started.
    Log files can be a little more difficult to navigate with SQL Servers that are
    not restarted very often. Consider using `sp_Cycle_Errorlog` to keep your error
    logs manageable.


    ### Indexes


    When tables have records inserted or updated, the indexes become fragmented. As
    a database administrator, part of your responsibilities will likely be ensuring
    that the database performs well. SQL Server 2012 offers maintenance plans where
    you can add reindexing; however, needs might exist that require you to create
    an indexing strategy outside of the maintenance plans.


    n `Note` Different tables fragment at different rates; tables with many data changes
    fragment much quicker than tables with static data. This becomes important when
    the amount of data that is changing is critical, such as when you are using database
    mirroring over smaller bandwidth. As the index is rebuilt, the movement of the
    records becomes logged, and those transactions are pushed to the mirror. Why create
    unnecessary transactions and traffic when it might not be needed (such as when
    reindexing an index that doesn’t require it)?'
