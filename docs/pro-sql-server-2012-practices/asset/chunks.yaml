    \n### What You Need to Know About System Performance DMVs\n\nAny database professional\
    \ will have an appreciation for the replacement DMV queries for `sp_blocker` and\
    \ `sp_who2`. You can now request the blocking `session_ids` and locate issues\
    \ more quickly, along with extended data with DMVs.\n\nDuring joins to `dm_exec_requests`,\
    \ always verify the `blocking_session_id`. As with any time-sensitive views, you\
