    ### Conclusion


    Anyone database administrators who were troubleshooting performance-level or system-level
    issues before the existence of Dynamic Management Views faced unique challenges.
    The introduction of this feature has created a relational database management
    system environment with robust performance-tuning and system-metric-collection
    views that DBAs can use to figure out answers to the performance challenges that
    exist in their SQL Server environments.


    ## Chapter 5 ■ From SQL Trace to Extended Events


    **By Mladen Prajdić**


    In this chapter we’ll look at the currently existing tracing and diagnostic infrastructure
    in SQL Server 2012.


    There are three areas we’ll cover: `SQL Trace`, `Event Notifications`, and `Extended
    Events`. `SQL Trace` is the oldest of the three and has been put on the deprecated
    features list in SQL Server 2012. This means that it will be removed from the
    `SQL Server` in a future version. Future version usually means current version
    + 2.


    Because of that I assume for this chapter that you’re familiar with the terminology
    and basic use of `SQL Profiler`. `Event Notifications` were introduced in SQL
    Server 2005 and are an asynchronous eventing system based on `SQL Server Service
    Broker`. The events that are sent can be database or server scoped. `Extended
    Events` were introduced in SQL Server 2008 and are a completely new diagnostic
    and tracing infrastructure built directly inside `SQLOS`.


    ### SQL Trace


    The `SQL Trace` infrastructure consists of 2 parts: the server side and the client
    side. The server side is the whole tracing infrastructure built into the `SQL
    Server`: the extended stored procedures that actually control the tracing capabilities
    and the trace points in `SQL Server` code from where the trace event data is collected
    from. In SQL Server 2005 we got introduced to `SQLOS` (SQL Operating System),
    the part of `SQL Server` that handles memory management, IO access, CPU scheduling,
    locking, exception handling, etc… Because `SQLOS` has an `API` that the other
    components of `SQL Server` use, `SQL Trace` is built on top of `SQLOS` and uses
    this `API`. The client side includes the `SQL Server Profiler` tool for creating
    and analyzing traces and the `.NET` object model that offers the same functionality
    as `SQL Server Profiler` but lets you automate the whole collect/analyze/store
    process that is usually present with continuous monitoring. Figure 5-1 shows the
    overview of the `SQL Trace` architecture.


    **Figure 5-1.** SQL Trace infrastructure: events fire, are sent to traces, filtered
    there and sent to the target provider (file or rowset)


    There are about 180 trace events (the exact number depends on the `SQL Server`
    version you’re using) and 66 columns that contain various trace data. There are
    also 10 user configurable events that you can specify in your T-SQL code that
    are collected just as any other trace event. They are named `UserConfigurable:0`
    to `UserConfigurable:9` and are fired with the `sp_trace_generateevent` stored
    procedure.


    Because it requires `ALTER TRACE` permissions we must grant this permission to
    any account executing the stored procedure. The `sp_trace_generateevent` stored
    procedure is called like this:


    ```

    DECLARE @msg NVARCHAR(128);

    SELECT @msg = N''Message that will be displayed in the SQL Trace or SQL Profiler'';

    -- user configurable events have ID''s from 82 (UserConfigurable:0) to 91

    (UserConfigurable:9)

    ```'
