    What if you took the simplest route with this query and simply added a covering
    index? A covering index is an index that satisfies the WHERE criteria and the
    join criteria, as well as the select columns in the query.


    n **Note** Covering indexes can be a terrific solution for some queries, but they
    are typically much larger than indexes with singleton columns and require more
    overhead to maintain.


    The index creation statement looks like this:


