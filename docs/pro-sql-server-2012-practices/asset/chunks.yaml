  trans: '

    当启用页面压缩时，新数据仅以行压缩格式插入。当一个页面填满到导致聚集索引发生页拆分的程度时，页面压缩计算就会触发。


    在堆表中，即使可以节省 20% 的空间，新数据也始终以行压缩格式插入。将页面压缩完全应用于堆表的唯一方法是重建该堆表。


    ## 压缩什么？


    既然你对压缩及其如何与你的数据协作有了更好的理解，就可以开始审视你的数据，以确定哪些应该压缩、哪些不应该压缩。在你的压缩决策中起最大作用的因素将是表的大小、分配单元以及表上的扫描和更新模式。


    你想获得最大的收益，我理解这一点。当你去找你的老板说，“我们可以使用 SQL Server 压缩来节省 X 量的空间”时，你希望能够自豪地说出这句话。所以你首先想知道的是：我们数据库中最大的表是哪些？在
    SSMS 中有多种方法可以获取表的空间使用情况：你可以右键单击数据库，选择“报表”，然后选择“按表的磁盘使用情况”。你也可以使用 DMV `sys.dm_db_partition_stats`。要获得相同的输出需要一些技巧，但数据就在那里。通常，为了获取这些信息，我喜欢运行一个脚本，该脚本使用未公开的存储过程
    `sp_MSforeachtable`，将 `sp_spaceused` 的数据插入到一个表变量中，并返回表名及其大小的列表。


    命令 `sp_MSforeachtable` 是一个功能，它对用户数据库中的所有用户表和系统数据库中的所有表进行游标循环。命令 `sp_spaceused`
    是一个已记录在案的功能，它为你提供每个表的表名、行数、保留空间、数据空间、索引大小和未用空间。


    ```sql

    DECLARE @myTable AS TABLE(

    [Name] varchar(1000)

    ,[Rows] int

    ,[Reserved] varchar(500)

    ,[Data] varchar(500)

    ,[Index_Size] varchar(500)

    ,[Unused] varchar(500)

    );


    INSERT INTO @myTable

    EXEC (''sp_msforeachtable @command1="sp_spaceused [?]"'');


    SELECT

    NAME

    ,ROWS

    ,RESERVED

    ,(cast(LEFT([reserved],(LEN([reserved])-3)) as int)/1024) as ReservedMB

    ,((cast(LEFT([reserved],(LEN([reserved])-3)) as int)/1024)/1024) as ReservedGB

    ,DATA

    ,INDEX_SIZE

    ,UNUSED

    FROM

    @myTable

    ORDER BY

    (cast(LEFT([reserved],(LEN([reserved])-3)) as int)/1024) DESC;

    GO

    ```


    现在你知道了最大的表是哪些，你需要知道它们由哪种类型的分配单元组成。SQL Server 有三种类型的分配单元：`IN_ROW_DATA`、`ROW_OVERFLOW_DATA`
    和 `LOB_DATA`。


    分配单元负责跟踪为特定表分配了多少页以及分配了什么类型的页。你在表中选择使用的数据类型决定了 SQL Server 使用的分配单元类型。有关哪些数据类型与哪些类型的分配单元相关联的列表，请参见
    `表 14-1`。


    唯一可以被压缩的分配单元是那些仅使用 `IN_ROW_DATA` 页的数据类型。


    幸运的是，只要你不使用大型对象（`LOB`）类型，如 `Text`、`Image`、`XML` 或任何 `MAX` 类型——`VARCHAR(MAX)`、`BINARY(MAX)`、`NVARCHAR(MAX)`——数据就会存储在
    `IN_ROW_PAGES` 上。如果你的数据记录包含少于 8,000 字节的数据，你可以在 `IN_ROW_DATA` 页上存储 `LOB` 数据类型。在这些情况下，行压缩不会为你节省空间，因为你拥有可变长度列，并且不会浪费额外的未使用空间。页面压缩可能会为你节省空间，前提是二进制数据符合我之前提到的、关于满足应用于页面的页面压缩要求的标准。只要数据可以存在于
    `IN_ROW_DATA` 页上，它就可以被压缩。稍后，我将用一个例子来验证这个说法，但首先让我们继续讨论分配单元。


    `表 14-1`. 分配单元类型及其数据类型。请记住，只有 `IN_ROW_DATA` 可以被压缩。

    '
- fmt: "# Allocation Unit Type Data Types\n\n## Description\n\n**IN_ROW_DATA**\n`SMALLINT`,\
    \ `INT`, `TINYINT`, `BIT`, `BIGINT`, `CHAR`, `NCHAR`, `NVARCHAR`, `NVARCHAR(MAX)`,\
    \ `VARCHAR`, `VARCHAR(MAX)`, `DECIMAL`, `NUMERIC`, `SMALLMONEY`, `MONEY`, `FLOAT`,\
    \ `REAL`, `DATE`, `DATETIME`, `DATETIME2`, `DATETIMEOFFSET`, `SMALLDATETIME`,\
    \ `TIME`, `BINARY`, `VARBINARY`, `VARBINARY(MAX)`, `XML`, `GEOGRAPHY`, `GEOMETRY`,\
    \ `TIMESTAMP/ROWVERSION`, `UNIQUEIDENTIFIER`, `CLR User Defined Types`, or `SQL_VARIANT`\n\
    \nRegular data pages, with a combined record size of 8,000 bytes. Most data types\
    \ that can exist on other allocation-unit pages can also be on `IN_ROW_DATA` pages\
    \ as well, as long as the total record size is under 8,000 bytes.\n\n**ROW_OVERFLOW_DATA**\n\
    `VARCHAR`, `NVARCHAR`, `VARBINARY`, `CLR User Defined Types`, or `SQL_VARIANT`\n\
    \nVariable-length data that can start out on an `IN_ROW_DATA` page. Once the record\
    \ exceeds 8,000 bytes, the largest variable-length field is moved into a `ROW_OVERFLOW_DATA`\
    \ page.\n\n**LOB_DATA**\n`XML`, `TEXT`, `IMAGE`, `NTEXT`, `VARCHAR(MAX)`, `VARBINARY(MAX)`,\
    \ `NVARCHAR(MAX)`\n\nStands for “Large Object Data.”\n\n## Querying Allocation\
    \ Unit Page Counts\n\nThe first thing I would do is run a query against the database\
    \ to get back all the page counts for allocation unit types. To do this, I run\
    \ the following query to get a list of tables and indexes by page count, focusing\
    \ on the tables with `IN_ROW_DATA`.\n\n```sql\nSELECT\n    OBJECT_NAME(sp.object_id)\
    \ AS [ObjectName]\n    ,si.name AS IndexName\n    ,sps.in_row_data_page_count\
    \ as In_Row_Data\n    ,sps.row_overflow_used_page_count AS Row_Over_Flow_Data\n\
    \    ,sps.lob_reserved_page_count AS LOB_Data\nFROM\n    sys.dm_db_partition_stats\
    \ sps\n    JOIN sys.partitions sp\n        ON sps.partition_id=sp.partition_id\n\
    \    JOIN sys.indexes si\n        ON sp.index_id=si.index_id AND sp.object_id\
    \ = si.object_id\nWHERE\n    OBJECTPROPERTY(sp.object_id,'IsUserTable') =1\norder\
    \ by sps.in_row_data_page_count desc\n```\n\n## Compressing Data on IN_ROW_DATA\
    \ Pages\n\nNow let’s validate that the data type doesn’t matter as long as the\
    \ data is located on `IN_ROW_DATA` pages.\n\nWe’ll use the following script to\
    \ create a table in our database that has the `VARCHAR(MAX)` data type, but we\
    \ will use only 4,037 characters of data and apply page compression:\n\n```sql\n\
    /*\nSelect our demo database\nto use\n*/\nUSE demoInternals\nGO\n\n/*\nCreate\
    \ our table\n*/\nIF EXISTS(SELECT name FROM sys.tables WHERE name='vmaxTest')\n\
    BEGIN\n    DROP TABLE dbo.vmaxTest\nEND\nGO\n\nCREATE TABLE vmaxTest(myid int\
    \ identity(1,1)\n    , mydata varchar(max) default 'a'\n    ,CONSTRAINT pk_vmaxtest1\
    \ PRIMARY KEY CLUSTERED (myid))\nGO\n\n/*\nInsert 5000 rows\n*/\nDECLARE @i INT\n\
    SET @i=0\nWHILE (@i<5000)\nBEGIN\n    INSERT INTO vmaxTest(mydata)\n    VALUES(replicate('a',4032)+cast(@i\
    \ AS VARCHAR(5)))\n    SET @i=@i+1\nEND\nGO\n\n/*\nCheck our space before we compress\n\
    */\nsp_spaceused 'vmaxTest'\nGO\n\n/*\nRebuild our table with\nPage Compression\n\
    */\nALTER TABLE dbo.vmaxtest\nREBUILD WITH(DATA_COMPRESSION=PAGE);\nGO\n\n/*\n\
    Check our space after we compress\n*/\nsp_spaceused 'vmaxTest'\nGO\n```\n\nAs\
    \ you can see from Figure 14-13, the space used before we compressed our table\
    \ was 40,200 KB, or roughly 40 MB. Not a large data set, but enough to show what\
    \ we want to test. The storage size was reduced to 320 KB after applying page\
    \ compression.\n\n**Figure 14-13.** Looking at the results of page compression\
    \ against a `VARCHAR(MAX)` data type that was in an `IN_ROW_DATA` page.\n\nThis\
    \ validates that we can compress `VARCHAR(MAX)` on an `IN_ROW_DATA` page, but\
    \ it validates only half of our premise. To test this, we need to create data\
    \ allocated by something other than `IN_ROW_DATA` and see that it doesn’t compress.\n\
    \n## Compressing Data Across Multiple Allocation Units\n\nWe’ll use the same script\
    \ as last time, but we’ll add another `VARCHAR(MAX)` field and force some of the\
    \ data to `LOB_DATA` pages. See Figure 14-14 for the page counts prior to compression.\
    \ After that, we’ll take a look at the allocation units, validate that the pages\
    \ have been created, and then compress the data still in the `IN_ROW_DATA` pages.\
    \ See Figure 14-15 for the page counts after compression has been applied.\n\n\
    ```sql\n/*\nSelect our demo database\nto use\n*/\nUSE demoInternals\nGO\n\n/*\n\
    Create our table\n*/\nIF EXISTS(SELECT name FROM sys.tables WHERE name='vmaxTest')\n\
    BEGIN\n    DROP TABLE dbo.vmaxTest\nEND\nGO\n\nCREATE TABLE vmaxTest(myid int\
    \ identity(1,1)\n    , mydata varchar(8000) default 'a'\n    ,mydata2 varchar(max)\
    \ default 'b'\n    ,CONSTRAINT pk_vmaxtest1 PRIMARY KEY CLUSTERED (myid))\nGO\n\
    \n/*\nInsert 5000 rows\n*/\nDECLARE @i INT\nSET @i=0\nWHILE (@i<5000)\nBEGIN\n\
    \    INSERT INTO vmaxTest(mydata, mydata2)\n    VALUES(replicate('a',2016)+cast(@i\
    \ AS VARCHAR(5)), replicate('b',2016)+cast(@i AS VARCHAR(5)))\n    SET @i=@i+1\n\
    END\nGO\n\n/*\ncreate some row overflow data by\ninflating the size of our mydata2\n\
    varchar(max) field to 7000 characters\n*/\nUPDATE dbo.vmaxTest\nSET mydata=replicate('a',3900),\n\
    \    mydata2=replicate('b', 5000)\nGO\n\n/*\nValidate our Allocation Unit Makeup\n\
    and get page counts\n*/\nSELECT\n    OBJECT_NAME(sp.object_id) AS [ObjectName]\n\
    \    ,si.name AS IndexName\n    ,sps.in_row_data_page_count as In_Row_Data\n \
    \   ,sps.row_overflow_used_page_count AS Row_Over_Flow_Data\n    ,sps.lob_reserved_page_count\
    \ AS LOB_Data\nFROM\n    sys.dm_db_partition_stats sps\n    JOIN sys.partitions\
    \ sp\n        ON sps.partition_id=sp.partition_id\n    JOIN sys.indexes si\n \
    \       ON sp.index_id=si.index_id AND sp.object_id = si.object_id\nWHERE\n  \
    \  OBJECTPROPERTY(sp.object_id,'IsUserTable') =1\norder by sps.in_row_data_page_count\
    \ desc\n```\n\n**Figure 14-14.** Page count by allocation unit before applying\
    \ page compression.\n\n```sql\n/*\nRebuild our table with\nPage Compression\n\
    */\nALTER TABLE dbo.vmaxtest\nREBUILD WITH(DATA_COMPRESSION=PAGE);\nGO\n\n/*\n\
    Validate our Allocation Unit Makeup\nand get page counts\n*/\nSELECT\n    OBJECT_NAME(sp.object_id)\
    \ AS [ObjectName]\n    ,si.name AS IndexName\n    ,sps.in_row_data_page_count\
    \ as In_Row_Data\n    ,sps.row_overflow_used_page_count AS Row_Over_Flow_Data\n\
    \    ,sps.lob_reserved_page_count AS LOB_Data\nFROM\n    sys.dm_db_partition_stats\
    \ sps\n    JOIN sys.partitions sp\n        ON sps.partition_id=sp.partition_id\n\
    \    JOIN sys.indexes si\n        ON sp.index_id=si.index_id AND sp.object_id\
    \ = si.object_id\nWHERE\n    OBJECTPROPERTY(sp.object_id,'IsUserTable') =1\norder\
    \ by sps.in_row_data_page_count desc\n```\n\n**Figure 14-15.** Page count by allocation\
    \ unit after applying page compression.\n\n## Conclusion: Knowing Your Data\n\n\
    I once had a client who had just upgraded from SQL Server 2000 to SQL Server 2008\
    \ R2. They wanted to look at using compression on their main production database.\
    \ They had a particular table in mind, one that had 132 GB of data in it. The\
    \ first thing I did was look at the allocation units, and they were 1 percent\
    \ `IN_ROW_DATA` 99 percent `LOB_DATA`. Upon asking what was stored in the table,\
    \ I learned that it had an `Image` column and was used to hold PDF documents.\
    \ I immediately told the client that SQL Server data compression was not something\
    \ they should use on this table, because the majority of the data, the vast majority,\
    \ was not compressible. The best thing about knowing what type of allocation units\
    \ make up your table is that not only will it help you choose what *to* compress,\
    \ but it will help you choose what *not to* compress. We could have used `FILESTREAM`\
    \ to store the PDF documents or, in SQL Server 2012, `FileTable` also was an option\
    \ to consider, to give them greater flexibility on how they store and searched\
    \ their data.\n\nAs long as your data is in `IN_ROW_DATA` pages, you can compress\
    \ it. Know what your allocation unit for your data is before deciding what to\
    \ compress. I wouldn’t normally compress a table with just a 50-50 ratio, like\
    \ I did in our second example, without taking a couple steps. First find the queries\
    \ or stored procedures that access this table. Extract the query plans in XML\
    \ format and examine them. Compress the data, and extract the query plans again.\
    \ Now did the plans change? How was performance impacted? Answering these questions\
    \ can go a long way in determining what you will want to compress."
  raw: '**Allocation Unit Type Data Types**


    **Description**


    IN_ROW_DATA


    SMALLINT, INT, TINYINT, BIT, BIGINT,


    Regular data pages, with a combined record


    CHAR, NCHAR, NVARCHAR, NVARCHAR(MAX), size of 8,000 bytes. Most data types that
    can VARCHAR, VARCHAR(MAX), DECIMAL,


    exist on other allocation-unit pages can also


    NUMERIC, SMALLMONEY, MONEY, FLOAT,


    be on IN_ROW_DATA pages as well, as long as the


    REAL, DATE, DATETIME, DATETIME2,


    total record size is under 8,000 bytes.


    DATETIMEOFFSET, SMALLDATETIME, TIME,


    BINARY, VARBINARY, VARBINARY(MAX),


    XML, GEOGRAPHY, GEOMETRY TIMESTAMP/


    ROWVERSION, UNIQUEIDENTIFIER, CLR


    User Defined Types, or SQL_VARIANT


    ROW_OVERFLOW_DATA


    VARCHAR, NVARCHAR, VARBINARY, CLR


    Variable-length data that can start out on an


    User Defined Types, or SQL_VARIANT


    IN_ROW_DATA page. Once the record exceeds


    8,000 bytes, the largest variable-length field is


    moved into a ROW_OVERFLOW_DATA page.


    LOB_DATA


    XML, TEXT,IMAGE, NTEXT, VARCHAR(MAX), Stands for “Large Object Data.”


    VARBINARY(MAX), NVARCHAR(MAX)


    The first thing I would do is run a query against the database to get back all
    the page counts for allocation unit types. To do this, I run the following query
    to get a list of tables and indexes by page count, focusing on the tables with
    IN_ROW_DATA.


    SELECT


    OBJECT_NAME(sp.object_id) AS [ObjectName]


    ,si.name AS IndexName


    ,sps.in_row_data_page_count as In_Row_Data


    ,sps.row_overflow_used_page_count AS Row_Over_Flow_Data


    ,sps.lob_reserved_page_count AS LOB_Data


    FROM


    sys.dm_db_partition_stats sps


    JOIN sys.partitions sp


    ON sps.partition_id=sp.partition_id


    JOIN sys.indexes si


    ON sp.index_id=si.index_id AND sp.object_id = si.object_id


    WHERE


    OBJECTPROPERTY(sp.object_id,''IsUserTable'') =1


    order by sps.in_row_data_page_count desc


    Now let’s validate that the data type doesn’t matter as long as the data is located
    on IN_ROW_DATA pages.


    We’ll use the following script to create a table in our database that has the
    VARCHAR(MAX) data type, but we will use only 4,037 characters of data and apply
    page compression:


    chapter 14 ■ page and row compression


    /*


    Select our demo database


    to use


    */


    USE demoInternals


    GO


    /*


    Create our table


    */


    IF EXISTS(SELECT name FROM sys.tables WHERE name=''vmaxTest'')


    BEGIN


    DROP TABLE dbo.vmaxTest


    END


    GO


    CREATE TABLE vmaxTest(myid int identity(1,1)


    , mydata varchar(max) default ''a''


    ,CONSTRAINT pk_vmaxtest1 PRIMARY KEY CLUSTERED (myid))


    GO


    /*


    Insert 5000 rows


    */


    DECLARE @i INT


    SET @i=0


    WHILE (@i<5000)


    BEGIN


    INSERT INTO vmaxTest(mydata)


    VALUES(replicate(''a'',4032)+cast(@i AS VARCHAR(5)))


    SET @i=@i+1


    END


    GO


    /*


    Check our space before we compress


    */


    sp_spaceused ''vmaxTest''


    GO


    /*


    Rebuild our table with


    Page Compression


    */


    ALTER TABLE dbo.vmaxtest


    REBUILD WITH(DATA_COMPRESSION=PAGE);


    GO


    /*


    Check our space after we compress


    */


    sp_spaceused ''vmaxTest''


    GO


    As you can see from Figure 14-13, the space used before we compressed our table
    was 40,200 KB, or roughly 40 MB. Not a large data set, but enough to show what
    we want to test. The storage size was reduced to 320 KB after applying page compression.


    ![Image 172](index-357_1.png)


    chapter 14 ■ page and row compression


    ***Figure 14-13.** Looking at the results of page compression against a VARCHAR(MAX)
    data type that was in an* *IN_ROW_DATA page.*


    This validates that we can compress VARCHAR(MAX) on an IN_ROW_DATA page, but it
    validates only half of our premise. To test this, we need to create data allocated
    by something other than IN_ROW_DATA and see that it doesn’t compress. We’ll use
    the same script as last time, but we’ll add another VARCHAR(MAX) field and force
    some of the data to LOB_DATA pages. See Figure 14-14 for the page counts prior
    to compression. After that, we’ll take a look at the allocation units, validate
    that the pages have been created, and then compress the data still in the IN_ROW_DATA
    pages. See Figure 14-15 for the page counts after compression has been applied.


    /*


    Select our demo database


    to use


    */


    USE demoInternals


    GO


    /*


    Create our table


    */


    IF EXISTS(SELECT name FROM sys.tables WHERE name=''vmaxTest'')


    BEGIN


    DROP TABLE dbo.vmaxTest


    END


    GO


    CREATE TABLE vmaxTest(myid int identity(1,1)


    , mydata varchar(8000) default ''a''


    ,mydata2 varchar(max) default ''b''


    ,CONSTRAINT pk_vmaxtest1 PRIMARY KEY CLUSTERED (myid))


    GO


    /*


    Insert 5000 rows


    */


    DECLARE @i INT


    SET @i=0


    WHILE (@i<5000)


    BEGIN


    INSERT INTO vmaxTest(mydata, mydata2)


    VALUES(replicate(''a'',2016)+cast(@i AS VARCHAR(5)), replicate(''b'',2016)+cast(@i
    AS


    VARCHAR(5)))


    SET @i=@i+1


    END


    GO


    ![Image 173](index-358_1.png)


    chapter 14 ■ page and row compression


    /*


    create some row overflow data by


    inflating the size of our mydata2


    varchar(max) field to 7000 characters


    */


    UPDATE dbo.vmaxTest


    SET mydata=replicate(''a'',3900),


    mydata2=replicate(''b'', 5000)


    GO


    /*


    Validate our Allocation Unit Makeup


    and get page counts


    */


    SELECT


    OBJECT_NAME(sp.object_id) AS [ObjectName]


    ,si.name AS IndexName


    ,sps.in_row_data_page_count as In_Row_Data


    ,sps.row_overflow_used_page_count AS Row_Over_Flow_Data


    ,sps.lob_reserved_page_count AS LOB_Data


    FROM


    sys.dm_db_partition_stats sps


    JOIN sys.partitions sp


    ON sps.partition_id=sp.partition_id


    JOIN sys.indexes si


    ON sp.index_id=si.index_id AND sp.object_id = si.object_id


    WHERE


    OBJECTPROPERTY(sp.object_id,''IsUserTable'') =1


    order by sps.in_row_data_page_count desc


    ***Figure 14-14.** Page count by allocation unit before applying page compression.*


    /*


    Rebuild our table with


    Page Compression


    */


    ALTER TABLE dbo.vmaxtest


    REBUILD WITH(DATA_COMPRESSION=PAGE);


    GO


    /*


    Validate our Allocation Unit Makeup


    and get page counts


    */


    SELECT


    OBJECT_NAME(sp.object_id) AS [ObjectName]


    ![Image 174](index-359_1.png)


    chapter 14 ■ page and row compression


    ,si.name AS IndexName


    ,sps.in_row_data_page_count as In_Row_Data


    ,sps.row_overflow_used_page_count AS Row_Over_Flow_Data


    ,sps.lob_reserved_page_count AS LOB_Data


    FROM


    sys.dm_db_partition_stats sps


    JOIN sys.partitions sp


    ON sps.partition_id=sp.partition_id


    JOIN sys.indexes si


    ON sp.index_id=si.index_id AND sp.object_id = si.object_id


    WHERE


    OBJECTPROPERTY(sp.object_id,''IsUserTable'') =1


    order by sps.in_row_data_page_count desc


    ***Figure 14-15.** Page count by allocation unit before after applying page compression.*


    I once had a client who had just upgraded from SQL Server 2000 to SQL Server 2008
    R2\. They wanted to look at using compression on their main production database.
    They had a particular table in mind, one that had 132 GB of data in it. The first
