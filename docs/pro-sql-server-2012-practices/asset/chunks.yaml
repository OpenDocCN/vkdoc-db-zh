    `图 14-9` 时，你会看到一个常规的行压缩数据页。此时，你可以假设行压缩已应用，并且记录中的所有额外空间都已被移除。你会看到锚点标签和字典数组的框，我将在分别应用列前缀压缩和字典压缩时讨论它们。


