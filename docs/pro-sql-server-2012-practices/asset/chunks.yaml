    immediately after the release, and the decision to rollback was made. However,
    in our confidence, we had started skimping on the rollback procedures. In this
    case, it was left to the release engineer to decide how to rollback, and the choice
    that was made turned out to be a bad one. Who was at fault? Was it the individual
    that rolled back in an improper way? No. Was it the developer that released the
    bad code? No. It was me, the creator of the release plan. Because I had not spent
    time creating and documenting the rollback process sufficiently, the onus rested
    upon me. I still feel the sting of this experience, and I use that feeling to
    remain more diligent.


    By sharing such experiences with you, I intend to show you that the release management
    process isn’t a new idea; it has been in practice in various organizations for
    quite a while. I have continued to perfect and alter this process over time. Each
    time the process iterates, it gets stronger. It might never be perfect, but as
    long as the process evolves to meet needs, it will greatly benefit us.


    A Change Is Requested


    As you can probably guess, a change will eventually be requested in your application
    and/or database system. How this request comes into existence is not important.
    The request will come, and it will need to be dealt with. We want to determine
    the best ways we can deal with them, control them, and gracefully introduce them
    into our respective systems.


    Unfortunately, many release processes might be similar to the one detailed in
    Figure 8-1\. This shows a process that contains very few steps, very few tests,
    very little verification, and a large chance of failure.


    Granted, for certain releases, success could be achieved with this simplistic
    process.


    ***Figure 8-1.** A typical (and ineffective) release process*


    The following basic steps are involved in this minimalistic release process:


    1\. A change is requested.


    2\. T-SQL code is created to support this change.


    3\. T-SQL code is tested.


    CHAPTER 8 ■ RElEAsE MAnAgEMEnT


    4\. T-SQL code is deployed.


    n Note When we refer to T-SQL code, this could be T-SQL that creates or alters
    functions, tables, stored procedures, data, and so on.


    The minimum tasks from the preceding steps could be steps 2 and 4: create and
    deploy the code. The actual request (step 1) might not come as an official request;
    it might be received in a variety of unofficial ways. Unfortunately, testing (step
    3) does not often occur. This leaves us with only two core tasks transpiring.'
