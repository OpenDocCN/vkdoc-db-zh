    querying a couple of dynamic management views (DMVs)? Or how about the *Yet Another*
    *Performance Profiling* (YAPP) method—a well-known performance method in the Oracle
    community that is just as usable in SQL Server with the implementation of Extended
    Events and DMVs that will show you what you are waiting for?


    No. What really makes me tick is becoming friends with the developers by creating
    a good SQL Server environment and fostering an understanding of one another’s
    differences. Just think what can be accomplished if both sides can live peacefully
    together instead of fighting every opposite opinion, digging the trenches even
    deeper and wider. Through fostering good relationships, I have seen environments
    move from decentralized development systems and standalone production databases
    to central solutions with easy access for developers, and calm uninterrupted nights
    for me. However, this does mean that you have to give up some sovereignty over
    your systems by relinquishing some of your admin power.


    The main problem is focus. While the DBA thinks of space issues, data modeling,
    and the stability of everyday operations, the developers thinks of making things
    smarter, sexier, and shiny. To make the relationship work, we have to move through
    the entire palette of the system—standardization, accessibility, logging, information
    flow, performance information—all while ensuring that systems are stable and that
    developers know that they are not alone, and that DBAs still exist and decide
    things.


    My Experience Working with SQL Server and Developers


    After finishing my engineering studies, I started as a developer. I worked on
    CRM systems in DataEase under DOS and OS/2, and that combination gave me plenty
    of insight into the issues developers have with the DBA function. DataEase was
    the Microsoft Access of that time, and it had connectors to all the major databases
    (Oracle, SQL Server, and DB2). But most of the time, DBAs would not allow dynamic
    access to production data. Their resistance led to friction with the developers.


    By coincidence, I ended up as a Microsoft Visual Basic programmer in a company
    developing and running systems for all the Danish municipalities. I was placed
    among the DB2/MVS DBAs, and I was by far the youngest (and only) GUI person (OS/2
    and Windows). While I coded Visual Basic 3 applications, those DBAs were taking
    care of decentralized connections, such as ODBC on DB/2 MVS. These were the 1


    chapter 1 ■ Be Your Developer’s Best FrienD


    days before having TCP/IP on the mainframe, so we’re talking Systems Network Architecture
    (SNA) and IBM Communications Manager.


    One day, my boss gave me responsibility for a new product called SQL Server. Why?
    Because I was the only one working with Windows.


    My biggest problem was how to approach the current environment within the company.
    How many SQL Server databases did we already have? Which development groups were
    using it? Those were just some of the questions I had to grapple with.


    I had to start from scratch. So I asked my DB/2 colleagues for help. After all,
    they had been working in these kind of environments for the last 15 years, handling
    systems with 15,000 concurrent users, 50,000


    different programs, thousands of individual databases, and lots of data on every
    Danish citizen, such as taxes, pension funds, and other personal information.
    I wanted the benefit of their experience.


    What I learned was that data modeling is a must. You need to have a naming standard
    for servers, for database objects, for procedures—for everything, actually. Starting
    the battle for naming standards and consistency took me on a six-year-long journey
    with developers, until most developers actually started to live safely. They came
    to understand that my requirements gave them more stable and consistent environments
    to develop on, made them more efficient, and got the job done faster for all.


    Reconciling Different Viewpoints Within an Organization


    The everyday battles between DBAs and developers mostly concern routine administrative
    tasks.


    Limitations on space allocations and limits to changes in production are perceived
    by developers as inhibiting innovation and stopping them from making a difference.
    They often see the DBA as someone who purposely limits them from doing their job.
    On the other hand, the admin group thinks that developers rarely plan ahead longer
    than the next drop-down box or the next screen, and that they never think in terms
    of the time period over which the software they build must run, which is often
    five to ten years or even longer.


    The consequences of these differences are that developers create their own secret
    systems, move budget money out of reach of the DBA team, and generally do everything
    in their power to limit the admins in setting up the imaginary borders they believe
    are being set up. For example, often I would hear the sentence, “If you take away
    that privilege from me, I can no longer boot the machine at will.” The problem
    with that thinking is that well-configured SQL Server systems need no more restarts
    than any other type of systems.


    So how do we get out of this evil spiral, and what are the benefits of doing so?
    Dialog is the way out, and the benefits are a controlled production environment,
    clearly defined ownership of databases, consistent environments patched correctly,
    lower cost of maintenance, possible license savings, and almost certainly fewer
    calls at 4:00 in the morning interrupting your sleep.


    Remember, all change starts with one’s self, and it is far easier to change yourself
    than to change others. So get a hold of a piece of paper, divide it into a plus
    and a minus side, and start listing the good and bad things in your environment.
    For instance, it could be a plus that some developers have sysadmin privileges
    because they fix some things for themselves, but it could also be a minus because
    they meddle with things they are not supposed to meddle with and create objects
    without the knowledge of the DBA.


    What you’ll get from this chapter is my experience and how I managed to foster
    a productive and good relationship with developers. I’ll provide a couple of code
    examples to help you on the way to success, or to just inspire you. My approach
    is not the only way to achieve good developer relations, but it has proven effective
    in the environments in which I’ve worked.


    chapter 1 ■ Be Your Developer’s Best FrienD


    Preparing to Work with Developers to Implement Changes to a


