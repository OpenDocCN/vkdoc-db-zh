- fmt: '# Chapter 5: From SQL Trace to Extended Events


    The *Pair Matching* target is an interesting target because with it you can track
    events that are still happening. It takes an event pair, for example SQL statement
    starting and SQL statement completed, matches them on one or many columns in the
    event data and discards them from further processing if they match up. For each
    event it captures the whole event data and all the actions that have been specified
    for that event. It stores all this data in a memory buffer until the paired event
    has fired. This memory buffer can’t be set, is internally handled by the extended
    events engine, and is based on available system resources. If there is memory
    pressure and the stored unpaired events have to be flushed, the incoming events
    that would be matched with the flushed ones will appear as unmatched in the target.
    There’s one thing you have to be careful about here. Not all events can be paired
    up nicely. `Lock Acquired` is one of them. There is the `Lock Released` event
    that you might think fires for every `Lock Acquired` event but that is not the
    case. One such occurrence is when lock escalation happens from row to page to
    table. The `Lock Acquired` event fires for each of those but `Lock Released` fires
    only once when the page or table lock is released.


    ## Ring Buffer


    `Ring Buffer` is a memory based and asynchronous target. It stores events in a
    cyclical memory space that gets used over and over again. It can work in two modes.
    The first is strict FIFO (the default) in which the oldest event gets removed
    from the buffer when the buffer fills up. The second is per-event FIFO, in which,
    as the name suggest a number of the events of the same types are kept in memory.
    In this mode the last event of each type is removed from the buffer. The ring
    buffer memory size, the number of events to keep (all and for each type) are all
    configurable options.


    ## Event File


    `Event File` is a file based and asynchronous target. When the session buffer
    is full it writes its contents into a file. Like in SQL Trace you can specify
    a filename, the file size, whether the files can be rolled over, and by how much
    the file will grow once it’s full. To read the contents of the event file we have
    to use the `sys.fn_xe_file_target_read_file` function. When specifying the file
    name you can use the `*` character anywhere in the name to read all the files
    that match the partial name. It works in the same way as the `%` character in
    a SQL `LIKE` comparison. To read the event file in SQL Server 2008 we also needed
    to provide a metadata file (created at session start) to the `sys.fn_xe_file_target_read_file`
    function. In SQL Server 2012 this isn’t needed anymore.


    ## Event Tracing for Windows (ETW) Target


    The last target is called *Event Tracing for Windows – ETW* target. It’s a file
    based synchronous target. To use this target successfully you have to have knowledge
    how the ETW works in Windows, which is out of the scope of this chapter. If you
    want to get more information about it search MSDN for “Event Tracing for Windows
    Target” article (http://msdn.microsoft.com/en-us/library/ff878411.aspx). The target
    is a singleton in the SQL Server process. This means that the events arriving
    to it will be processed one at a time no matter how many Extended Events sessions
    are sending the vents data. Once you enable the ETW target, an ETW session is
    created on the machine that SQL Server runs on. This session is shared across
    all instances installed on that machine. To use ETW target, the account SQL Server
    Service runs under must be a member of the `Performance Log Users` group.


    ![Image 68](index-128_1.png)


    After reading about ETW target, if you think it’s confusing I would say you are
    completely right. In my opinion this target is too complex to use effectively
    in its current state.


    Existing targets can be viewed with this SQL statement:


    ```sql

    SELECT *

    FROM sys.dm_xe_objects

    WHERE object_type = ''target''

    -- show only targets that we can use

    ```'
