    ## 第 14 章 ■ 页面和行压缩


    ### 结论


    页面和行压缩是强大的工具。如果你购买了企业版许可，就应该利用它们。与索引一样，压缩没有放之四海皆准的解决方案。相反，你对它了解得越多，就越能在你的环境中更好地应用它。开启后就置之不理从来不是个好主意。监控你的系统，确保
    CPU 使用率没有意外的变化或峰值。"了解你的数据"不仅仅是一句朗朗上口的话。你对环境了解得越多，就越能应用 SQL Server 内部知识来有效地管理它。


    记住要考虑的标准：表越大，越有可能看到收益。获取准确的基线，以便了解压缩如何影响查询性能。查看你的分配单元结构：具有 100% `IN_ROW_DATA`
    页面的表是压缩的绝佳候选对象。对于低于 50%的任何情况，你需要谨慎处理。扫描使用模式超过 45%的表和索引是压缩的候选对象；对于低于 45%（低至 20%）的更新模式，使用行压缩。对于
    20%及以下的情况，使用页面压缩，获取基线，然后再次测试。


    ## `第 15 章`


    ■ ■ ■


    ### `选择和确定服务器规模`


    **作者：Glenn Berry**


    随着 SQL Server 2012 的发布，微软采用了与之前版本截然不同的新许可模式。因此，重新审视如何选择数据库服务器硬件以获得良好性能和可扩展性，同时将
    SQL Server 2012 许可成本控制在预算内，变得相当重要。SQL Server 2012 企业版使用基于核心的许可模式，你根据物理处理器核心数支付许可费，每个物理处理器至少需要购买四个物理核心许可。这与
    SQL Server 2008 R2 及所有之前版本使用的基于插槽的许可模式相比，是一个相当大的变化。


    当这个新模式在 2011 年 11 月首次公布时，让许多人感到不快，一些数据库专业人员立即假设了最坏的情况，认为 SQL Server 2012 许可价格将上涨四倍。本章将展示如何正确选择数据库服务器硬件，以最大化性能和可扩展性，同时将
    SQL Server 许可成本控制在预算内。


    根据你的工作负载类型，你需要做出不同的硬件选择，以获得最佳性能和可扩展性。


    > **提示** 在你实际进行任何硬件规格说明之前，请阅读完整章节。工作负载、硬件和 SQL Server 许可之间的相互作用是一个复杂的主题。如果不理解所涉及的概念，很容易犯下代价高昂的错误。


    本章我关注的硬件主要是服务器本身，包括外形规格，以及 CPU 和内存。你的 CPU 选择对许可成本影响最大，我花了大量时间根据 SQL Server 的新许可模式来审视
    CPU 选择。微软的新定价方案改变了游戏规则，重新审视你可能持有的、但不再有效的假设非常重要。


    ### 理解你的工作负载


    SQL Server 对其底层硬件提出不同的要求，这取决于运行在 SQL Server 实例上的数据库工作负载类型。数据库引擎工作负载与文件服务器、Web
    服务器或应用服务器工作负载大不相同。


    ## 第 15 章 ■ 选择和确定服务器规模


    运行数据库引擎的 SQL Server 实例通常看到两种主要类型的工作负载。一种是在线事务处理（`OLTP`）工作负载，另一种是关系数据仓库（`DW`）工作负载。

    '
- fmt: 'OLTP workloads are characterized by a high number of short-duration transactions
    and queries that are usually executed on a single thread of execution. They can
    have a higher percentage of write activity, and the data in some tables can be
    extremely volatile. These characteristics have important implications for the
    hardware selection and configuration process. For example, you would want a processor
    with excellent single-threaded performance, as most queries use only a single
    thread of execution. You would also want an I/O subsystem that can supply a high
    number of input/output operations per second (IOPS), and one that has excellent
    write performance because of the volatility of the data and the high transaction
    log write activity.


    DW workloads are characterized by longer running queries against more static data.
    These queries are often parallelized by the query optimizer, so having a higher
    number of physical cores in your processors can be very beneficial. Having a large
    amount of physical RAM is very useful for DW workloads, because you will be able
    to have more data in the SQL Server buffer cache, which will reduce the read pressure
    on the I/O subsystem. Outside of data loads, there tends to be very little write
    activity with a DW workload, which means the I/O subsystem would be provisioned
    and configured differently than for a typical OLTP workload. Many DW-type queries
    read large amounts of data as they calculate aggregates, so good sequential read
    I/O performance is very important. There is much less write activity (outside
    of data loads), which will also affect how you configure your I/O subsystem in
    terms of storage type and RAID level.


    You should try to determine what type of workload your server will be supporting
    before you decide what type of hardware and storage subsystem to purchase. You
    also have to keep in mind that very few database workloads are pure OLTP- or pure
    DW-type workloads, so you will often have to deal with mixed workload types. You
    also might have to host multiple databases on a single SQL Server instance, where
    each database has a different type of workload. Another possibility is multiple
    databases on a single SQL Server instance where each database has the same type
    of workload, but the aggregate workload on the server ends up looking quite different
    from what you might expect. Given all of this, how can you determine your expected
    workload type?


    If you have an existing server, running a production workload, you can run a number
    of Dynamic Management View (DMV) and Dynamic Management Function (DMF) queries,
    and monitor some key PerfMon counters to get a better idea about your existing
    workload type. For example, you can query the `sys.dm_os_wait_stats` DMV to see
    your top cumulative wait types since the last time that SQL Server was restarted
    (or the wait statistics were cleared) to get a better idea of your current bottlenecks.


    For a new application that is under development, you can run these same queries
    and counters on your development and test servers, along with reviewing documentation
    and talking to the developers, business analysts, and end users to get a better
    idea about the expected workload type. The point of all this detective work is
    to have a better idea of the type of workload your hardware and storage subsystem
    is going to be dealing with, so you can make the best hardware selection and configuration
    decisions.


    ## SQL Server 2012 Enterprise Edition Consideration Factors


    One critical question that you must answer early on in the design process is whether
    you are going to be able to use SQL Server 2012 Enterprise Edition, or whether
    you will be forced to use a lower-end edition, such as SQL Server 2012 Standard
    Edition or SQL Server 2012 Business Intelligence Edition. Speaking as a database
    professional, I strongly believe that Enterprise Edition is very much worth the
    extra license costs, but I know that it can be a tough sell when you have a limited
    budget. Following is a listing of some of the more valuable features that you
    get in SQL Server 2012 Enterprise Edition:


    - Data compression

    - Enhanced read ahead

    - Advanced scanning for reads

    - Automatic use of indexed views

    - Table partitioning

    - Distributed partitioned views

    - Scalable shared databases

    - Asynchronous database mirroring

    - AlwaysOn Availability Groups

    - Online index operations

    - Fast recovery

    - Parallel index operations

    - Database snapshots

    - Hot-add CPU and RAM

    - Online restore

    - Resource governor

    - SQL Server Audit

    - Change data capture

    - Mirrored backups

    - Oracle replication publishing

    - Peer-to-peer replication

    - Transparent database encryption


    Many of these features are extremely useful for improving the performance and
    availability of your SQL Server instance, so you should make a determined effort
    to convince your organization to purchase Enterprise Edition.


    If you must use SQL Server 2012 Standard Edition, then you will be restricted
    to using no more than 64 GB of RAM for the database engine. You will also be restricted
    to using the `lesser` of four processor sockets or 16 physical processor cores
    in your database server. If that is the case, you do not want to make the mistake
    of specifying a big database server that is a four-socket server with 40 physical
    cores and 256 GB of RAM, because the SQL Server 2012 database engine will only
    be able to use a fraction of those hardware resources.


    Don’t forget about the operating system version and edition as part of this decision
    process. There are licensing limits for maximum RAM, number of processor sockets,
    and total number of logical processors that are enforced by the operating system.


    Windows Server 2008 R2 Standard Edition has a RAM limit of 32 GB and cannot use
    more than four processor sockets, while Windows Server 2008 R2 Enterprise Edition
    has a RAM limit of 2 TB and can use up to 256 logical processors. Windows Server
    2012 Standard Edition has a RAM limit of 4 TB, and can use 640 logical processors.
    Windows Server 2012 Datacenter Edition has the same limits, but has higher virtualization
    limits.


    ## chapter 15 ■ Selecting and Sizing the Server


    ## Server Vendor Selection


    Before you can start looking at specific server models and components, you need
    to determine what server vendor you will be dealing with. There are a number of
    what I consider “first-tier” server vendors out there, including the following
    (in alphabetical order):


    - Dell

    - Fujitsu

    - HP

    - IBM

    - NEC

    - Unisys


    Each of these server vendors has advantages and disadvantages, depending on what
    your priorities are. Some vendors have less expensive hardware, while others have
    proprietary technologies that extend their capabilities beyond what is seen in
    a reference design from Intel or AMD (for a higher price). Some vendors (such
    as Dell) target the low- and mid-range market, so if you really need an eight-
    or sixteen-socket server, you will not be able to buy a Dell server because they
    sell only four-socket and smaller servers.


    I am not going to recommend any specific server vendor in this chapter. Most companies
    and organizations have a single preferred hardware vendor that they deal with,
    for a number of valid reasons.'
