    他们若搞崩了什么，毁掉的也只是他们自己。在生产环境中，用户只应获得读取、写入和执行权限。对于确实需要其他类型访问权限的人，你可以实现封装的存储过程。例如，许多开发人员认为自己应该拥有
    `dbo` 权限，但他们很少需要 `dbo` 所赋予的全部权利。此时，可以提供明确的权限授予作为替代方案。如果用户需要在生产环境中进行跟踪的能力，你可以将跟踪模板封装在存储过程中，并提供对这些过程的访问权限。


    除了我列出的这些，你可能还有其他需要处理的事项。这没关系，也在意料之中。


    将我的清单作为基础，并根据需要增加其他事项，以支持你的业务。不要过度，但要确保涵盖对你的业务真正重要的内容。


    # 第 1 章 ■ 成为开发人员的最佳好友


    ## 步骤 3：创建清晰的文档


    将所有内容清晰地记录下来。创建一份可以交给供应商、管理层和新员工的单一文档，以帮助他们快速上手。


    我经常遇到系统投入生产时未能遵守我们标准的情况。这些主要是购买的应用程序，在购买时没有就基础设施相关需求询问 IT 部门。大多数情况下，这是因为业务其他部门不知道
    IT 制定的标准，有时则是因为错误地认为我们的业务部门不能对供应商提出要求。这时，一份书面文件就派上用场了。创建一个快速检查清单，让购买应用程序的人员可以询问供应商，需要什么才能将应用程序集成到你的环境中。你可能想向供应商提出的一些问题包括：


    - 你们支持最新的版本吗？

    - 你们需要 `sysadmin` 权限吗？

    - 你们使用什么 `排序规则`？


    当所有问题都得到询问和解答后，你才有实际可能判断供应商的应用程序是否与你的环境真正匹配，或者是否应该取消购买并寻找其他选择。在大多数情况下，当被追问某个问题时，第三方供应商的要求往往会远少于最初所述，并且大多数供应商会努力适应你的需求。


    ## 步骤 4：创建系统管理流程


    你将与开发人员就权限问题发生许多争论。你会听到这样的论点：没有完全的控制权，他们就无法独立工作。你不能总是给予他们那种自由。但你能做的是，为他们提供对辅助应用程序的访问权限。


    我经常发现，作为数据库管理员，我可能成为一个瓶颈。开发人员会创建变更请求。我需要执行变更、更新请求状态、关闭请求，然后通知相关人员。通常，由于我有其他许多事情要做，创建一个数据库需要好几天时间。


    然而，尽管创建数据库需要广泛的系统权限，但这是一项容易执行的任务。为什么不让开发人员做这类任务呢？我们只需要一种方式来确保我们的标准得到遵守——比如文件的命名和放置——并知道完成了什么操作。


    日志记录是这里的关键。谁在何时、何地做了什么？对于一个客户，我们创建了一个应用程序来处理所有这些基础但需要特权的任务。该应用程序是基于 Web 的，Web
    服务器可以访问所有服务器，并且应用程序以 `sysadmin` 权限运行。开发人员有权运行该应用程序，但不能直接访问服务器。这意味着我们可以记录他们所做的一切，而这些开发人员被允许创建数据库、运行脚本、执行跟踪等等。更重要的是，他们可以在生产环境中做这些事情。给予他们这种自由需要信任，但我们确信
    99.99%的开发人员实际上都想把事情做好，而剩下的 0.01%是一个经过计算的风险。

