    \ 在何时评估谓词（主要是 where 子句），以及这如何影响查询的性能。\n\n## 一个具体的查询示例\n\n让我们从查看一个具体的查询开始：\n\n\
    ```sql\nSELECT FirstName,\n       Surname,\n       OrderNumber,\n       OrderDate\n\
    FROM dbo.Orders AS o\nINNER JOIN dbo.Customers AS c ON o.CustomerID = c.CustomerID\n\
    WHERE OrderStatus = 'O'\n  AND OrderDate < '2010/02/01'\n```\n\n这非常简单：两个表，where\
    \ 子句中有两个谓词，from 子句中有一个（连接谓词）。图 3-1 和图 3-2 显示了该查询执行的两个执行计划。\n\n![Image 9](img/index-55_1.png)\n\
    \n![Image 10](img/index-55_2.png)\n\n**图 3-1.** 执行计划 1。\n\n**图 3-2.** 执行计划 2。\n\
    \n乍一看，这两个执行计划看起来几乎一模一样，除了相对成本百分比上有一些细微差别。它们看起来也相当优化（有两个索引 Seek 和一个循环连接）。但如果我告诉你，两次执行的统计信息却大不相同呢？\n\
    \n## 比较执行统计信息\n\n执行计划 1：\n表‘Worktable’。扫描计数 0，逻辑读取 0。\n表‘Orders’。扫描计数 1，逻辑读取 5。\n\
    表‘Customers’。扫描计数 1，逻辑读取 4。\nSQL Server 执行时间：\nCPU 时间 = 0 毫秒，经过时间 = 1 毫秒。\n\n\
    执行计划 2：\n表‘Worktable’。扫描计数 0，逻辑读取 0。\n表‘Orders’。扫描计数 1，逻辑读取 301。\n表‘Customers’。扫描计数\
    \ 1，逻辑读取 4。\nSQL Server 执行时间：\nCPU 时间 = 0 毫秒，经过时间 = 4 毫秒。\n\n你可以看到，在执行计划 1 中，对\
    \ `Orders` 表有 5 次读取，而在执行计划 2 中，对 `Orders` 表有 301 次读取，并且两者都是索引 Seek 操作。是什么导致了这种差异？\n\
    \n非常简单，这与在索引 Seek 执行过程中，SQL Server 在何时评估谓词有关。让我们更仔细地看看执行计划——特别是索引 Seek 的属性（如图\
    \ 3-3 所示）。\n\n**图 3-3.** 最优的索引 Seek（左）和较不优的索引 Seek（右）。\n\n![Image 12](img/index-57_1.png)\n\
    \n你可能已经注意到，两个显示的执行计划中索引名称是不同的，情况也确实如此。SQL 用于两次 Seek 的索引是不同的（尽管返回的数据相同）。这种差异虽然没有导致两个查询之间使用的执行计划运算符不同，却导致了性能上的差异。这种差异与索引\
    \ Seek 工具提示中显示的属性、Seek 谓词（两个查询都有）和谓词（只有较不优的那个才有）有关。\n\n需要注意的一点是，这些工具提示中显示的实际行数是该运算符输出的行数，而不是它处理的行数。索引\
    \ Seek 实际读取的总行数并未显示在工具提示中。获取大致概念的方法是查看 `Statistics IO` 并检查索引 Seek 所操作的表的逻辑读取次数（从内存中读取的页数）。这不是完美的方法，但通常足够用。\n\
    \n## 索引架构与 Seek 操作\n\n要理解这两个查询性能之间的差异，我们需要简要地探讨一下索引架构以及索引 Seek 如何工作。\n\n索引是一种\
    \ b-tree（平衡树）结构，数据在叶级别按索引键逻辑排序，如图 3-4 所示。\n\n**图 3-4.** `OrderStatus`，`OrderDate`\
    \ 上索引的架构。\n\n索引 Seek 操作通过向下遍历 b-tree 到达所需范围的开始（或有时是结束），然后沿叶级别读取，直到不再可能有符合条件的行。在索引\
    \ Seek 属性中列出的 Seek 谓词是用于定位范围开始（或结束）的条件。\n\n那么，让我们看看示例中展示的两种情况。\n\n在第一种情况，即最优的索引\
    \ Seek 中，Seek 谓词包含了该表的两个 where 子句表达式。因此，SQL 能够直接导航到该范围行的开始——或者在本例中是结束——然后能够沿索引叶级别读取，直到遇到不再匹配筛选器的行。因为该表上的两个\
    \ where 子句表达式都被用作 Seek 谓词，所以读取的每一行都可以在无需进一步计算的情况下被返回。\n\n在第二种情况下，只有一个 where 子句表达式被用作\
    \ Seek 谓词。SQL 再次可以导航到范围的末尾并沿索引叶级别读取，直到遇到不再匹配 Seek 谓词的行。然而，由于存在一个额外的筛选器（索引 Seek\
    \ 属性的谓词部分列出的那个），从索引叶级别读取的每一行都必须与这个次要谓词进行比较，并且只有当它也满足该谓词时才会被返回。\n\n这意味着在这种情况下，所做的工作远比第一种情况多得多。\n\
    \n## 根本原因：索引列顺序\n\n是什么导致了差异？在本例中，是因为两个示例的索引列顺序不同。\n\n查询的 where 子句是 `OrderStatus\
    \ = 'O' AND OrderDate < '2010/02/01'`。\n\n![Image 13](img/index-58_1.png)\n\n\
    ![Image 14](img/index-58_2.png)\n\n在第一个示例——即具有最优索引 Seek 的那个——索引定义在列 `OrderStatus,\
    \ OrderDate` 上。在第二个示例——即较不优的索引 Seek 的那个——列顺序是 `OrderDate, OrderStatus`。\n\n##\
    \ 可视化差异\n\n让我们再看一下索引架构，看看它们有何不同。参见图 3-5。\n\n**图 3-5.** 使用 `OrderStatus`，`OrderDate`\
    \ 上索引的索引 Seek 执行。\n\n使用第一个按 `OrderStatus, OrderDate` 排序的索引，SQL 可以通过向下遍历 b-tree\
    \ 寻找匹配该范围一端（1）的行来执行 Seek，同时对两个列进行 Seek。在本例中，它搜索的是上端，因为该不等式下方无界。当它找到该行时，它可以沿索引叶级别读取（2），直到遇到一行不匹配任何一个（或两个）谓词。在本例中，由于不等式下方无界，那将是第一个\
    \ `OrderStatus` 不是‘O’的行（3）。完成后，不需要额外工作来获取匹配行。该索引 Seek 只读取了该查询实际需要的数据。\n\n现在，另一个索引——列顺序相反的那个呢？请看图\
    \ 3-6。\n\n**图 3-6.** 使用 `OrderDate`，`OrderStatus` 上索引的索引 Seek 执行。\n\n在第二种情况下，SQL\
    \ 仍然可以向下遍历 b-tree，使用两个列寻找匹配范围一端（上端）的行。然而，这次当它沿索引叶级别读取时，它不能只读取匹配两个谓词的行，因为索引首先按日期排序，其次才按\
    \ `OrderStatus` 排序。因此，必须读取所有匹配 `OrderDate` 谓词的行，然后对每一行应用一个次要筛选器，以查看它是否匹配 `OrderStatus`。这个次要筛选器就是工具提示中显示为谓词的东西。\n\
    \n![Image 15](img/index-59_1.png)\n\n![Image 16](img/index-59_2.png)\n"
- fmt: 'The reduced efficiency comes from two things. First, more rows are read than
    is necessary. Second, the evaluation of the filter requires computational resources.
    It doesn’t require a lot, but if the secondary filter has to be applied to millions
    of rows, that’s going to add up.


    A more dramatic form of the secondary filter is when there is no `where` clause
    predicate that can be used as a seek predicate and, hence, SQL performs an index
    scan and applies the predicate to all rows returned from the index scan. Say,
    for example, I amend the earlier example and remove the `where` clause predicate
    on `OrderStatus`, but the only index is one with `OrderStatus` as the leading
    column. The plan for this new query is shown in Figure 3-7, along with the results.


    ### Figure 3-7. Index scan with a predicate on the OrderDate column


    ## chapter 3 ■ hidden performance Gotchas


    This results in an index scan with a predicate. (There’s no seek predicate. If
    it had one, it would be a seek, not a scan.) This means that every row gets read
    from the table and then tested against the `OrderDate` predicate.


    So what causes this? There are a number of things. The most common are the following:


    - The order of the columns in the index are not perfect for this query or necessary
    columns are not in the index at all.

    - Any functions applied to the columns.

    - Any implicit conversations.


    I showed the order of the columns in the previous example. I can’t go into a full
    discussion of indexes here; that’s a topic large enough to need a chapter of its
    own. In short, SQL can use a column or set of columns for an index seek operation
    only if those columns are a left-based subset of the index key, as explained in
    a moment.


    Let’s say you have a query that has a `where` clause of the following form:


    ```

    WHERE Col1 = @Var1 and Col3 = @Var3

    ```


    If there is an index (for example, `Col1, Col2, Col3`), SQL can use that index
    to seek on the `Col1` predicate as it is the left-most (or first) column in the
    index key definition. However, `Col3` is not the second column, it’s the third.
    Hence, SQL cannot perform a seek on both `Col1` and `Col3`. Instead, it has to
    seek on `Col1` and execute a secondary filter on `Col3`. The properties of the
    index seek for that query would show a seek predicate on `Col1` and a predicate
    on `Col3`.


    Now consider if you have the same index (`Col1, Col2, Col3`) and a query with
    a `where` clause of the form:


    ```

    WHERE Col1 = @Var1 and Col2 = @Var2

    ```


    Now the two columns referenced in the `where` clause are the two left-most columns
    in the index key (first and second in the index key definition) and hence SQL
    can seek on both columns.


    For further details on index column ordering, see these two blog posts:


    - [http://sqlinthewild.co.za/index.php/2009/01/19/index-columns-selectivity-and-equality-predicates/](http://sqlinthewild.co.za/index.php/2009/01/19/index-columns-selectivity-and-equality-predicates/)

    - [http://sqlinthewild.co.za/index.php/2009/02/06/index-columns-selectivity-and-inequality-predicates/](http://sqlinthewild.co.za/index.php/2009/02/06/index-columns-selectivity-and-inequality-predicates/)


    There’s another form of the secondary, where one of the columns required is not
    even part of the index used. Let’s take this example:


    ```

    SELECT OrderID

    FROM Orders

    WHERE SubTotal < 0 AND OrderDate > ''2012/01/01''

    ```


    Assume you have an index on `SubTotal` only and that the column `OrderDate` is
    not part of that index at all. SQL knows from the statistics it has that very
    few rows satisfy the `SubTotal < 0` predicate. (Actually, none do, but there’s
    no constraint on the column preventing negative values. Hence, SQL cannot assume
    that there are no rows.) Figure 3-8 shows the execution plan for this query.


    ![Image 17](index-61_1.png)


    ![Image 18](index-61_2.png)


    ## chapter 3 ■ hidden performance Gotchas


    ### Figure 3-8. Execution plan with a seek and key lookup.


    You get an index seek on the `Subtotal` index and a key lookup back to the clustered
    index, as shown in Figure 3-9.


    ### Figure 3-9. Index seek on the Subtotal index with no mention of the OrderDate
    predicate


    The index seek has only a seek predicate. The key lookup, however, has something
    interesting in it. It has a predicate, as shown in Figure 3-10.


    ![Image 19](index-62_1.png)


    ## chapter 3 ■ hidden performance Gotchas


    ### Figure 3-10. Key lookup with a predicate.


    What’s happening here is that the index seek could evaluate only the `SubTotal
    < 0` predicate because the `OrderDate` column was nowhere within the index. To
    get that column, SQL had to do key lookups back to the clustered index to fetch
    it. However, that column isn’t needed for output—because it’s not in the `select`
    clause—it’s needed only for the `where` clause predicate. Hence, each row fetched
    by the key lookup is filtered, within the key lookup operator, to discard any
    rows that don’t match the `OrderDate` predicate, and only rows that do match get
    returned from the key lookup.


    Another common cause of inefficient index usage and secondary filters is the use
    of functions on the column in the `where` clause of the query. Consider the case
    of the table used in the example earlier, with the index on `OrderStatus, OrderDate`.
    Suppose you have an index on `OrderStatus, OrderDate` and the following `where`
    clause:


    ```

    WHERE OrderStatus = ''S'' AND DATEADD(mm,1, OrderDate) > GETDATE()

    ```


    In other words, get all orders with a status of `S` that have order dates in the
    last month. Figure 3-11 shows part of the execution plan for that.


    ![Image 20](index-63_1.png)


    ## chapter 3 ■ hidden performance Gotchas


    ### Figure 3-11. Index seek with a function resulting in a predicate.


    The reason you have a predicate here and not just two seek predicates is that
    as soon as there is a function on the column, the `where` clause predicate that
    contains that function can no longer be used for an index seek. This is because
    the index is built on the column, not on `function(column)`.


    These kinds of predicates are often referred to as not being SARGable, (SARG standing
    for Search ARGument), a phrase that just means that the predicate cannot be used
    for index seek operations.


    The third thing that can result in SQL having to apply secondary filters is the
    implicit conversion.


    Consider this common scenario:


    ```

    WHERE VarcharColumn = @NVarcharParameter

    ```


    The data types of the column and the parameter are different. SQL cannot compare
    two different data types, so one has to be converted to match the other. Which
    one is converted depends on the precedence rules of [data types](http://msdn.microsoft.com/en-us/library/ms190309.aspx).
    In this case, the `nvarchar` data type has higher precedence than `varchar`, so
    the column must be converted to match the data type of the parameter. That query
    is essentially `WHERE CAST(VarcharColumn AS NVARCHAR(<Column Length>) = @NVarcharParameter`.
    That’s a function on the column. As in the previous discussion, this means that
    the predicate cannot be used for an index seek operation (it’s not SARGable) and
    can be applied only as a secondary predicate.


    So, you’ve seen several causes. Now let’s look at what you can do about these.


    The first thing to note is that the predicates are not always a problem. It is
    not always important to remove them. What is important to investigate before spending
    time trying to change indexes or rewrite queries is the number of rows involved.
    Specifically, you should determine the number of rows returned by the seek predicate
    and what proportion of them are then removed by the predicate.'
