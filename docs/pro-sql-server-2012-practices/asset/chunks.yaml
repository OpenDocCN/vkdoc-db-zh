    # 第四章：动态管理视图


    ## 相关视图组


    在后续每个 SQL Server 版本中，都添加了更多视图和函数以支持动态管理功能。这些视图按用途进行分组。在 SQL Server 2005 中，有 12
    个初始组；2008 年有 15 个；而到 2012 年，现在共有 20 个视图组。这些新增的组包括支持新的灾难恢复和高可用性功能的组：**AlwaysOn
    可用性组动态管理视图和函数**组。


    截至 2012 年，动态管理视图（DMV）分为以下组：


    -   AlwaysOn 可用性组动态管理视图和函数

    -   索引相关动态管理视图和函数

    -   变更数据捕获相关动态管理视图

    -   I/O 相关动态管理视图和函数

    -   更改跟踪相关动态管理视图

    -   对象相关动态管理视图和函数

    -   公共语言运行时相关动态管理视图

    -   查询通知相关动态管理视图

    -   数据库镜像相关动态管理视图

    -   复制相关动态管理视图

    -   数据库相关动态管理视图

    -   资源调控器动态管理视图

    -   执行相关动态管理视图和函数

    -   安全相关动态管理视图

    -   扩展事件动态管理视图

    -   Service Broker 相关动态管理视图

    -   文件流与文件表动态管理视图 (Transact-SQL)

    -   SQL Server 操作系统相关动态管理视图

    -   全文搜索与语义搜索动态管理视图

    -   事务相关动态管理视图和函数


    要查询动态管理视图（DMV）和动态管理函数（DMF），用户必须被授予 `VIEW SERVER STATE` 或 `VIEW DATABASE STATE`
    权限。如果没有此权限，用户将收到对象不存在的错误。


    ## Varbinary 哈希值


    要查询动态管理视图（DMV）中的数据，你需要使用 SQL Server 版本的系统生成哈希值，称为 *句柄*。该句柄替代了其他可能使用但更复杂的选项，包括以
    XML 格式存储的数据。句柄存储在 `varbinary(64)` 数据类型中，这样做的性能优势是显而易见的。


    `varbinary` 是可变长度二进制数据。一个 `varbinary` 值可以是 1 到 8,000 的值。创建后，在测量分配时，存储大小是输入数据的实际长度加上额外的
    2 个字节。


    `varbinary` 数据具有以下一些特点：


    -   `varbinary` 是条目不一致或可变的数据。

    -   如果需要任何排序，`varbinary` 效率更高，因为它不需要排序规则。

    -   平均而言，`varbinary` 通常比 `varchar` 或其他常见数据类型选择消耗更少的字节。

    -   请注意，当不同的数据类型转换为 `varbinary` 时，它们可能会根据转换来源的数据类型在左侧或右侧进行填充或截断。


    动态管理视图中使用最广泛的两个 `varbinary` 数据类型如下：


    -   `plan_handle`：相关 `sql_handle` 的执行计划的哈希值。

    -   `sql_handle`：给定 SQL 语句的哈希值。这是由算法生成的唯一值，该算法保证对于唯一语句，相同的 `sql_handle` 将出现在任何
    SQL Server 服务器上。这在群集环境中或比较开发、测试和生产 SQL Server 服务器时非常有用。


    ![Image 37](img/index-85_1.png)

