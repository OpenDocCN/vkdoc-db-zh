    diving into the system tables, not only in the system databases, but the user
    databases as well. SQL Server 2005


    introduced us to dynamic managed views, which have been expanded with each new
    release. In the most recent version, SQL Server 2012 extended events are easier
    to use than ever before. A key component to keep in mind when creating the utility
    database is the right method to collect data for the version of SQL


    Server that the utility database will be collecting data for.


    If the utility database you are implementing supports multiple versions of SQL
    Server, a piece of code that could be helpful checks the version of SQL Server
    that is actively connected, like so: SELECT @@Version


    Or, you might find that checking the version of the database by using the serverproperty
    function provides a little more information. The serverproperty expression provides
    much information about your SQL Server and can be extremely helpful.


    SELECT SERVERPROPERTY(''productversion'') AS ''Version Number'',


    SERVERPROPERTY (''edition'') AS ''Edition''


    The results of the script will be similar to this:


    11.0.2100.60


    Developer Edition (64-bit)


    System Tables


    Older versions of SQL Server used a number of system tables to manage the databases.
    Over the course of time, many of these tables have moved, or have been renamed.
    The amount of system information data has grown, as well as the need to access
    that data. The process that is implemented in the examples shows how the system
    tables can be queried. Keep in mind when looking at system tables that many of
    them have had system views added that provide more information.


    Extended Stored Procedures


    Extended stored procedures are stored procedures that can make DLL calls outside
    of SQL Server to retrieve information. For example, using xp_cmdshell in older
    versions of SQL Server was the best way to complete tasks such as getting a directory
    listing, running batch files, or reading the error log. Be aware when using extended
    stored procedures that some of them are listed as deprecated, so they might not
    appear in future releases of SQL Server beyond 2012\. For the extended stored
    procedures that are being deprecated, a replacement may be made with CLR.


    n **Note** IA list of deprecated features can be found on Microsoft’s web site
    at [http://msdn.microsoft.com/](http://msdn.microsoft.com/)


    en-us/library/ms143729.aspx. Keep in mind that each version of SQL Server has
    a new list of deprecated 143


    chapter 6 ■ the Utility Database


    features, and that most features that are being removed have a new feature that
    improves upon the older deprecated feature.


    CLR


    Common Language Runtime (CLR) integration provides an environment that enables
    SQL Server to execute managed code that, traditionally, Transact-SQL was not designed
    for. This CLR integration adds flexibility to SQL Server by allowing SQL Server
    to utilize the strengths of other programming languages.


    CLR can often be tricky to implement, and is not in the scope of this chapter;
    however, the example on collecting processor utilization uses this method. In
    some cases, altering processes to run in the CLR


    environment greatly improves the performance of that process.


    DMVs


    Dynamic Management Views (DMVs) give the user a view into the current SQL Server
    state. Many features of SQL Server, such as replication, file stream, extended
    events, wait times, and AlwaysOn, have DMVs associated with them. When gathering
