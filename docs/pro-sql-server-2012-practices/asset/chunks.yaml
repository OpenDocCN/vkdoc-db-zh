- fmt: '# Release Management


    ## Release Process Overview


    As we discuss this large topic of release management, there will be many considerations,
    documents, and tasks that will come to light. In fact, these are the three areas
    of concentration for the rest of this chapter.


    We will dig into considerations that you should put at the forefront of your thought.
    This will help you develop documents that detail tasks. As you read the ideas
    that follow, please contemplate how you can apply them to your topology and system.
    Remember that no process is absolutely perfect for everyone, or for every situation.
    Take those ideas that fit and add them to your release management process. If
    you do not have a process currently, this chapter will help you create one.


    ## Considerations


    While there are many considerations in planning a release management strategy,
    we will delve into some specific ones and, hopefully, bring to light some of the
    reasons why you should consider them. Our goal is to create a balanced process
    that will allow you create your release in a controlled fashion, without negative
    incidents. As this discussion occurs, please take into account the particulars
    of your system. The following is an overview of the considerations we will discuss:


    - **Goals:** Define the goals for your release process.

    - **Environments:** Detail your environments, from top to bottom, from development
    to production.

    - **Release Process:** Define a release process to share with all involved and
    get their commitment.

    - **Players Involved:** Indicate who will be involved in the process.

    - **Version Control:** Determine a safe place to keep track of your code.

    - **Rollback Process:** Always have a way to revert back to a known state.


    ## Goals


    First and foremost, you should detail what your goals are for release management.
    My goals may differ from yours. Your goals might change as time passes and you
    might need to alter them with the introduction of new ideas, new managers, and
    so on. Regardless of what your current goals are, continue to review them, and
    discuss them with others as you perform your release process. If speed is of vital
    importance, this will help you streamline your tasks and procedures for your release
    process. If safety is your goal, other tasks may grow and entwine themselves in
    your process. Let’s minimize the goals down to a few simple ones and further define
    those terms. I consider the following items to be a core set of goals for my release
    management process:


    - Reduce risk

    - Control change

    - Perform successful change

    - Follow best practices

    - Architect/design changes

    - Review changes


    ### Reduce Risk


    Your system exists and functions for a purpose, so reducing risk to it should
    be an obvious goal. Not allowing a change to occur that would impact your system
    is more easily said than done. Keeping it stagnant is not an option, so let’s
    face the inevitable, and attempt to reduce the risk that change will introduce.


    We need to take measures to create a process that is molded to each system, with
    elements borrowed from other iterations of release management processes to find
    that perfect one that will suit you, protect you, and reduce your risk. As you
    review code, test your release process, and perform other tasks, always keep in
    mind that you need to do all tasks with an eye on reducing risk. This doesn’t
    mean that you shouldn’t implement change; rather, it attempts to wrap that change
    into a process that will be graceful, controlled, and successful.


    ### Control Change


    Controlling change simply means that whatever change occurs in your system follows
    a process that has been vetted, agreed upon, detailed, and documented. In other
    words, the right people performing the right tasks, in the right order, at the
    right time. You need to define all this. Others can give you suggestions, even
    plan out the process for you and with you; however, you will be the ultimate authority
    on what is actually decided upon. Remember that you are the data professional
    and it falls to you to ensure your system is secure, available, and properly used.


    In order to control this change, you should take the time to understand your entire
    topology. Understand how data flows in and out. Learn as much as you can about
    your system. Knowing how your system functions, how it is secured, and how data
    moves within it will better enable you to control how changes will impact it.


    ### Perform Successful Change


    A successful change can be defined as one that was executed as expected, with
    no negative impact. No exceptions were raised once the change was introduced to
    your system and there was no unforeseen degradation of system functionality. This
    does not mean that the change contains flawless code or perfect functionality.
    We have seen before that functionality can be introduced that is not expected
    or simply performs differently than expected. A successful change is one that
    simply introduces a change in a successful manner, requiring no rollback of code
    to a previous state. Even though the goal is to perform successful change, it
    behooves you to take the steps necessary to ensure that you include proper testing
    and a foolproof rollback process. We will discuss this later in this chapter.


    ### Follow Best Practices


    Determine and document what your best practices will be for releases. You should
    refer to Microsoft for published best practices (for example, some can be found
    at `http://msdn.microsoft.com/en-us/practices/ff921345`). You should also look
    for best practices in books, blogs, training, and so on. Search out sources that
    can impart what others believe to be best practices. There are many examples available
    from which you can pick and tailor those that make sense for your system. You
    will probably already have some best practices that are alive and well within
    your organization. Use these practices as well.


    Whatever the source, include these rules into your release management process
    and documentation. Do not be afraid to add to them, or remove from them, as you
    repeat iterations of your release management process. Always review your process
    and continually tweak it. When you find something that will help you perform better
    releases, integrate it into your process.


    When you implement best practices, ensuring that these rules are followed is the
    next logical step. If you choose to go this extra mile, you can include a means
    to monitor your system to prevent changes that would violate your chosen best
    practices. Policy Based Management (`PBM`) is a solution that is available with
    SQL Server that does just that. `PBM` allows you to define and enforce policies
    on your SQL Server systems, thus preventing unwanted changes. This chapter will
    not delve into how to implement `PBM`.


    Homegrown solutions can prevent and track changes as well. Using tools to control
    change will also help.'
