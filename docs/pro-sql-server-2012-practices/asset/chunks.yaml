    *   `IT`人员\n\n## 版本控制\n\n如果你目前没有版本控制系统来保存代码和数据库对象的“黄金副本”，强烈建议你从此刻开始着手。你应该开始实施一个方案，以保护不同版本的代码。根据你的需求，有多种方式可以实现全面的版本控制流程。至少，你需要将对象和其他`T-SQL`代码的版本存储在数据库外部，这样在变更破坏系统时，你可以回退到这些对象的原始版本。\n\
