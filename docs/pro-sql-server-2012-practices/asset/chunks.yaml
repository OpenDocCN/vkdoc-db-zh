  trans: '

    ```sql

    (total_physical_reads + total_logical_reads) / execution_count as avg_reads,

    max_elapsed_time as max_duration,

    total_elapsed_time as total_duration,

    ((total_elapsed_time / execution_count)) / 1000000 as avg_duration_sec

    FROM sys.dm_exec_query_stats deqs

    CROSS APPLY sys.dm_exec_sql_text(sql_handle) dest

    CROSS APPLY sys.dm_exec_query_plan (plan_handle) deqp

    ORDER BY deqs.total_worker_time DESC

    ```


    ![Image 42](img/index-92_1.png)

    ![Image 43](img/index-92_2.png)


    ## 第 4 章■动态管理视图


    在本节的这个查询及其后续查询中，有两个领域我希望你能完全理解。首先是开头的 SQL 列，随后是执行计划(showplan)的 XML 输出，你可以在图 4-6
    中看到。


    **图 4-6.** 按数据库中总工作时间排序的，性能面临挑战的前 10 个查询。


    图 4-6 中的示例展示了一个 CPU 密集型环境的结果。尽管这些数据很有帮助，但收集此数据的过程可能会给生产环境和数据库专业人员带来 CPU 资源压力，因此需要注意此类查询的执行时机和频率。此查询结果的好处在于显示了执行计划数据的链接，点击后可以显示所选行中语句的完整
    SQL。


    在进一步调查时，下一个关注领域是执行次数的数量如何与 CPU 影响、读取次数、持续时间及其他相关数据相对应，如图 4-7 所示。


    **图 4-7.** 此查询的响应结果包含大量列，可用于识别具有高执行次数、大量物理读取和/或消耗时间长的 SQL 代码。


    任何性能 DBA 在评估性能调优的简单选项时，识别“容易处理的低效查询”（即比较其执行次数与所耗时间及其对 CPU 的影响）至关重要。识别并调优这些查询，只需对一到五个有问题的主要进程进行小而高效的修正，就能快速提升性能，而不必创建一个大型、资源密集型的项目来修正整个环境。


    另请注意，前述查询及其后续查询中都包含一个通用的动态管理函数(DMF)调用。你可以使用此 DMF 来检索给定 SQL 语句的`sql_handle`，例如
    `CROSS APPLY sys.dm_exec_sql_text(sql_handle) sql`。如前所述，出于性能原因，动态管理视图(DMV)仅通过`sql_handle`引用
    SQL 语句。如果你需要根据给定的句柄检索 SQL 文本，请使用此函数。此 DMF 接受`sql_handle`或`plan_handle`作为输入条件。


    在 SQL Server 环境中，如果启用了版本 8.0（SQL 2000）兼容性，许多性能 DMF 将无法完成。常见的解决方法是使用通用完全限定名从系统数据库执行
    DMF——例如，`CROSS APPLY <dbserver>.<dbname>.sys.dm_exec_sql_text(plan_handle)`。


    ## 术语差异


    随着新版本和功能的演变，术语差异是许多人面临的普遍问题。请注意，在执行计划中使用`plan_handle`执行结果的 DMV 也将被称为*showplan*（执行计划）。现在它通常以用户友好的
    XML 格式显示为链接。这些链接只会显示已执行或仍在缓存中的计划。如果你尝试显示这些计划之外的计划，点击链接时将出现空结果。


    XML 格式的执行计划通常难以阅读。要在 Management Studio 中以图形方式查看执行计划，请执行以下操作：

    - 该函数将自动为 showplan XML 返回一个超链接。

    - 点击该超链接，在 Internet 浏览器中打开 XML 页面。

    - 点击 文件 -> 另存为，并使用 `.SQLPLAN` 文件扩展名将文件保存到本地驱动器。

    - 返回到 SQL Server Management Studio。你现在可以毫无问题地打开刚刚保存的文件。

