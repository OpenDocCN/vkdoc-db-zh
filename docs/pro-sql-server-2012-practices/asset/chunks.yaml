- fmt: "# Chapter 6: The Utility Database\n\nWhen creating the objects that will reside\
    \ in the utility database, consider using schemas to keep the tables organized\
    \ by categories. In the past, I have found this helpful when I use the same Category\
    \ 1 collection on multiple servers, but only use the relevant Category 2 collections\
    \ on SQL Servers where the feature is installed. For example, if I am logging\
    \ data about mirroring, I create a schema named `Mirror`. In addition, when working\
    \ with KBI data, I use the company name as the schema name. You will see this\
    \ practice being used throughout this chapter.\n\n## Using Data Referential Integrity\n\
    \nGood database designs incorporate the proper use of data referential integrity\
    \ (DRI) (i.e., the proper use of foreign keys and primary keys). This can also\
    \ include default values or other constraints in the database to ensure that your\
    \ data follows all the rules that are required.\n\nProper DRI is not difficult\
    \ to implement, but with each deployment of a utility database, being flexible\
    \ and custom to the environment that it is being deployed alters the requirements\
    \ slightly. Don’t let this be a reason to not use the proper DRI in your implementation.\n\
    \nFor the purpose of the examples in this chapter, there might be places where\
    \ you will see that some of the DRI is not being used when it should be. I might\
    \ have excluded it in the examples to save on space, or to simplify some of the\
    \ examples. In the examples where the data referential integrity is critical for\
    \ the operations, it has been added in the example.\n\n## Creating the Utility\
    \ Database\n\nThe initial step in creating a utility database is creating the\
    \ actual database itself. The configuration options of your individual database\
    \ will depend on your environment. The options that I tend to use when creating\
    \ my utility database include leaving the database on Full Recovery mode. Many\
    \ times, KBI stored in the utility database can be extremely helpful for troubleshooting,\
    \ so I tend to backup the database aggressively to allow for the least amount\
    \ of data loss, in case of a restore.\n\nIf you are following along with the examples\
    \ listed here in the rest of this chapter, they will be using the database named\
    \ `dbUtilities`. The following create script will create the database in the default\
    \ data and log directory that has been configured on the server. Make sure to\
    \ test this and all other code in a test environment before pushing it to production\
    \ servers.\n\n```sql\nUSE [master]\nGO\nCREATE DATABASE [dbUtilities]\nGO\nALTER\
    \ DATABASE [dbUtilities] SET COMPATIBILITY_LEVEL = 110\nGO\nALTER DATABASE [dbUtilities]\
    \ SET RECOVERY FULL\nGO\n```\n\nAfter the database has been created, and the options\
    \ have been set, the next step is to start gathering data. The next section will\
    \ discuss some of the strategies that can be used to gather data, store data,\
    \ and manage data.\n\n## Table Structure\n\nCategorizing and grouping the data\
    \ that the utility database is going to be collecting will drive the design of\
    \ the table that you will use to store the data. Predefining how the tables should\
    \ be organized will ease the implementation of adding watched items to the utility\
    \ database.\n\n### Historical Data Tables\n\nHistorical data tables store the\
    \ data that provide trends. A good example of this type of data collected is the\
    \ standard baseline information you might want to review before the purchase of\
    \ new hardware. Processor performance, disk space, database growth, and memory\
    \ usage are just a few items where historical information can greatly impact decisions\
    \ in the future. A standard table format that can be used for historical information\
    \ can look like this:\n\n```sql\nUSE [dbUtilities]\nGO\nCREATE TABLE [dbo].[Sample_Historical_Data](\n\
    \    [PrimaryKeyID] [int] IDENTITY(1,1) NOT NULL,\n    [Measureable] [varchar](100)\
    \ NOT NULL,\n    [MesuredItem1] [int] NOT NULL,\n    [MesuredItem2] [int] NOT\
    \ NULL,\n    [MesuredItem3] [int] NOT NULL,\n    [MesuredItem4] [int] NOT NULL,\n\
    \    [ReadingDate] [datetime] NOT NULL,\n    CONSTRAINT [PK_PrimaryKeyID] PRIMARY\
    \ KEY CLUSTERED \n        ([PrimaryKeyID])\n)\n```"
  raw: 'When creating the objects that will reside in the utility database, consider
    using schemas to keep the tables organized by categories. In the past, I have
    found this helpful when I use the same Category 1 collection on multiple servers,
    but only use the relevant Category 2 collections on SQL Servers where the feature
    is installed. For example, if I am logging data about mirroring, I create a schema
    named Mirror. In addition, when working with KBI data, I use the company name
    as the schema name. You will see this practice being used throughout this chapter.


    Using Data Referential Integrity


    Good database designs incorporate the proper use of data referential integrity
    (DRI) (i.e., the proper use of foreign keys and primary keys). This can also include
    default values or other constraints in the database to ensure that your data follows
    all the rules that are required.


    Proper DRI is not difficult to implement, but with each deployment of a utility
    database, being flexible and custom to the environment that it is being deployed
    alters the requirements slightly. Don’t let this be a reason to not use the proper
    DRI in your implementation.


    For the purpose of the examples in this chapter, there might be places where you
    will see that some of the DRI is not being used when it should be. I might have
    excluded it in the examples to save on space, or to simplify some of the examples.
    In the examples where the data referential integrity is critical for the operations,
    it has been added in the example.


    Creating the Utility Database


    The initial step in creating a utility database is creating the actual database
    itself. The configuration options of your individual database will depend on your
    environment. The options that I tend to use when creating my utility database
    include leaving the database on Full Recovery mode. Many times, KBI stored in
    the utility database can be extremely helpful for troubleshooting, so I tend to
    backup the database aggressively to allow for the least amount of data loss, in
    case of a restore.


    If you are following along with the examples listed here in the rest of this chapter,
    they will be using the database named dbUtilities. The following create script
    will create the database in the default data and log directory that has been configured
    on the server. Make sure to test this and all other code in a test environment
    before pushing it to production servers.


    USE [master]


    GO


    CREATE DATABASE [dbUtilities]


    GO


    ALTER DATABASE [dbUtilities] SET COMPATIBILITY_LEVEL = 110


    GO


    ALTER DATABASE [dbUtilities] SET RECOVERY FULL


    GO


    After the database has been created, and the options have been set, the next step
    is to start gathering data. The next section will discuss some of the strategies
    that can be used to gather data, store data, and manage data.


    chapter 6 ■ the Utility Database


    Table Structure


    Categorizing and grouping the data that the utility database is going to be collecting
    will drive the design of the table that you will use to store the data. Predefining
    how the tables should be organized will ease the implementation of adding watched
    items to the utility database.


    Historical Data Tables


    Historical data tables store the data that provide trends. A good example of this
    type of data collected is the standard baseline information you might want to
    review before the purchase of new hardware. Processor performance, disk space,
    database growth, and memory usage are just a few items where historical information
    can greatly impact decisions in the future. A standard table format that can be
    used for historical information can look like this:


    USE [dbUtilities]


    GO


    CREATE TABLE [dbo].[Sample_Historical_Data](


    [PrimaryKeyID] [int] IDENTITY(1,1) NOT NULL,


    [Measureable] [varchar](100) NOT NULL,


    [MesuredItem1] [int] NOT NULL,


    [MesuredItem2] [int] NOT NULL,


    [MesuredItem3] [int] NOT NULL,


    [MesuredItem4] [int] NOT NULL,


    [ReadingDate] [datetime] NOT NULL,


    CONSTRAINT [PK_PrimaryKeyID] PRIMARY KEY CLUSTERED


    ([PrimaryKeyID]))'
  trans: "\n# 第六章：实用数据库\n\n在创建将驻留在实用数据库中的对象时，考虑使用模式（schemas）来按类别组织表。过去我发现这样做很有帮助，比如当我在多个服务器上使用相同的\
    \ Category 1 集合，但只在安装了该功能的 SQL 服务器上使用相关的 Category 2 集合时。例如，如果我记录有关镜像的数据，我会创建一个名为\
    \ `Mirror` 的模式。此外，在处理 KBI 数据时，我使用公司名称作为模式名。你将在本章中看到这种实践被广泛应用。\n\n## 使用数据引用完整性\n\
    \n良好的数据库设计需要恰当运用数据引用完整性（DRI）（即正确使用外键和主键）。这也可以包括数据库中的默认值或其他约束，以确保你的数据遵循所有必需的规则。\n\
    \n恰当的 DRI 实现起来并不困难，但每次部署实用数据库时，由于需要灵活适应其部署环境，具体要求可能会略有不同。不要因此而不去在你的实现中使用恰当的 DRI。\n\
    \n出于本章示例的目的，有些地方你可能会看到本该使用 DRI 时却没有使用。我可能为了节省篇幅或简化示例而省略了它。在那些数据引用完整性对操作至关重要的示例中，它已经添加在示例里了。\n\
    \n## 创建实用数据库\n\n创建实用数据库的第一步是创建数据库本身。你个人数据库的配置选项将取决于你的环境。我在创建实用数据库时倾向于使用的选项包括将数据库保持在完整恢复模式。很多时候，存储在实用数据库中的\
    \ KBI 对故障排除非常有帮助，所以我倾向于积极备份数据库，以便在需要还原时尽可能减少数据丢失。\n\n如果你打算跟随本章剩余部分列出的示例进行操作，它们将使用名为\
    \ `dbUtilities` 的数据库。以下创建脚本将在服务器上配置的默认数据和日志目录中创建数据库。请确保在将这段代码及所有其他代码推送到生产服务器之前，先在测试环境中进行测试。\n\
    \n```sql\nUSE [master]\nGO\nCREATE DATABASE [dbUtilities]\nGO\nALTER DATABASE\
    \ [dbUtilities] SET COMPATIBILITY_LEVEL = 110\nGO\nALTER DATABASE [dbUtilities]\
    \ SET RECOVERY FULL\nGO\n```\n\n数据库创建并设置好选项后，下一步就是开始收集数据。下一节将讨论可用于收集数据、存储数据和管理数据的一些策略。\n\
    \n## 表结构\n\n对实用数据库将要收集的数据进行分类和分组，将决定你用来存储这些数据的表的设计。预先定义好表的组织方式，将简化向实用数据库添加监控项的过程。\n\
    \n### 历史数据表\n\n历史数据表存储提供趋势的数据。此类数据的一个很好例子是你在购买新硬件前可能想查看的标准基线信息。处理器性能、磁盘空间、数据库增长和内存使用情况，这些只是历史信息能够对未来决策产生重大影响的几个方面。可用于历史信息的标准表格式可能如下所示：\n\
    \n```sql\nUSE [dbUtilities]\nGO\nCREATE TABLE [dbo].Sample_Historical_Data NOT\
    \ NULL,\n    [Measureable] varchar NOT NULL,\n    [MesuredItem1] [int] NOT NULL,\n\
    \    [MesuredItem2] [int] NOT NULL,\n    [MesuredItem3] [int] NOT NULL,\n    [MesuredItem4]\
    \ [int] NOT NULL,\n    [ReadingDate] [datetime] NOT NULL,\n    CONSTRAINT [PK_PrimaryKeyID]\
    \ PRIMARY KEY CLUSTERED \n        ([PrimaryKeyID])\n)\n```\n"
- fmt: "A few items to note: each one of these tables should have a primary key, but\
    \ depending on how you access the data, additional indexes may be required for\
    \ the quickest database access. All the values in this example will not accept\
    \ null values, and this might not always be appropriate for each of the historical\
    \ table measures. The date that the data is gathered can be important for viewing\
    \ proper trends, even though in this example, a sort could be done on the primary\
    \ key. The reading date might not always be the date that a measure occurred.\
    \ For example, when querying the stored procedure execution times, an average\
    \ might be recorded for the prior week. The reading date could present the data\
    \ of when the information was gathered and inserted into the table, and additional\
    \ dates might be required.\n\n## Current Health Tables\n\nWhen creating the current\
    \ health table, the purpose of the table is to keep information long enough so\
    \ that an action can be taken on that data. This action could include tasks that\
    \ should be completed, such as calling a stored procedure or even a report. Data\
    \ that resides in the current health tables should be treated as temporary. An\
    \ example of using a current health table to store data, until which time the\
    \ collection is complete and a report is executed, is a daily checklist report.\
    \ With these tables, the columns in the tables are not always specific and can\
    \ represent many different items. Take a look at the following example:\n\n```sql\n\
    USE [dbUtilities]\nGO\n\nCREATE TABLE [dbo].[Daily_Report](\n    [ReportRowID]\
    \ [int] IDENTITY(1,1) NOT NULL,\n    [EventStatus] [varchar](50) NOT NULL,\n \
    \   [EventDate] [datetime] NOT NULL,\n    [EVENT] [varchar](2000) NOT NULL,\n\
    \    CONSTRAINT [PK_Daily_Report_ReportrowID] PRIMARY KEY CLUSTERED\n    (\n \
    \       [ReportRowID]\n    )\n)\nGO\n```\n\nThe `EventStatus` is a value that\
    \ I often use for grouping data in the right collection with the `Event` storing\
    \ the data. Multiple rows in this table could contain the `EventStatus` of database\
    \ growth, but the `Event` value would be different for each row of data, such\
    \ as “Database 1 growth is 10%,” and the next row containing “Database 2 growth\
    \ is 2%.” A report could group on the `EventStatus` so all of the database growth\
    \ information is reported together.\n\n## Archive Tables\n\nA common use for the\
    \ archive tables is to view a historical representation of a current health table\
    \ as it was before the next collection of data was executed. Before each collection\
    \ of data begins for a time frame, the current heath tables can have the content\
    \ moved to the corresponding archive table.\n\n```sql\nUSE [dbUtilities]\nGO\n\
    \nCREATE TABLE [dbo].[Daily_Report_Archive](\n    [ReportRowID] [int] NOT NULL,\n\
    \    [EventStatus] [varchar](50) NOT NULL,\n    [EventDate] [datetime] NULL,\n\
    \    [EVENT] [varchar](2000) NOT NULL,\n    CONSTRAINT [PK_Daily_Report_Archive_ReportrowID]\
    \ PRIMARY KEY CLUSTERED\n    (\n        [ReportRowID] ASC\n    )\n) ON [PRIMARY]\n\
    GO\n```\n\nAn item of note: in this example, the identity attribute to the `ReportRowID`\
    \ was removed. The following is an example of how to move data from the current\
    \ health tables over to an archive table:\n\n```sql\nUSE [dbUtilities]\nGO\n\n\
    CREATE PROCEDURE [dbo].[Archive_Daily_Report]\nAS\nINSERT INTO Daily_Report_Archive\n\
    SELECT * FROM Daily_Report\n\nIF @@error = 0\nBEGIN\n    Delete dbutility..Daily_Report\n\
    END\nGO\n```\n\n## Gathering Data\n\nWithout understanding the options for data\
    \ collection, the utility database is limited in what data is collected. As new\
    \ versions of SQL Server are released, the inner workings of SQL Server become\
    \ more accessible, providing further information that allows users to make more\
    \ critical decisions than with the previous versions. In this gathering data section,\
    \ we will look at some of the options available. In the last part of this section,\
    \ examples will show how to take advantage of these options, maximizing the usefulness\
    \ of the utility database.\n\nIn the earliest versions of SQL Server, a seasoned\
    \ professional would spend time diving into the system tables, not only in the\
    \ system databases, but the user databases as well. SQL Server 2005 introduced\
    \ us to dynamic managed views, which have been expanded with each new release.\
    \ In the most recent version, SQL Server 2012 extended events are easier to use\
    \ than ever before. A key component to keep in mind when creating the utility\
    \ database is the right method to collect data for the version of SQL Server that\
    \ the utility database will be collecting data for.\n\nIf the utility database\
    \ you are implementing supports multiple versions of SQL Server, a piece of code\
    \ that could be helpful checks the version of SQL Server that is actively connected,\
    \ like so:\n\n```sql\nSELECT @@Version\n```\n\nOr, you might find that checking\
    \ the version of the database by using the `serverproperty` function provides\
    \ a little more information. The `serverproperty` expression provides much information\
    \ about your SQL Server and can be extremely helpful.\n\n```sql\nSELECT SERVERPROPERTY('productversion')\
    \ AS 'Version Number',\n       SERVERPROPERTY ('edition') AS 'Edition'\n```\n\n\
    The results of the script will be similar to this:\n\n```\n11.0.2100.60\nDeveloper\
    \ Edition (64-bit)\n```\n\n## System Tables\n\nOlder versions of SQL Server used\
    \ a number of system tables to manage the databases. Over the course of time,\
    \ many of these tables have moved, or have been renamed. The amount of system\
    \ information data has grown, as well as the need to access that data. The process\
    \ that is implemented in the examples shows how the system tables can be queried.\
    \ Keep in mind when looking at system tables that many of them have had system\
    \ views added that provide more information.\n\n## Extended Stored Procedures\n\
    \nExtended stored procedures are stored procedures that can make DLL calls outside\
    \ of SQL Server to retrieve information. For example, using `xp_cmdshell` in older\
    \ versions of SQL Server was the best way to complete tasks such as getting a\
    \ directory listing, running batch files, or reading the error log. Be aware when\
    \ using extended stored procedures that some of them are listed as deprecated,\
    \ so they might not appear in future releases of SQL Server beyond 2012. For the\
    \ extended stored procedures that are being deprecated, a replacement may be made\
    \ with CLR.\n\n`Note` A list of deprecated features can be found on Microsoft’s\
    \ web site at [http://msdn.microsoft.com/en-us/library/ms143729.aspx](http://msdn.microsoft.com/en-us/library/ms143729.aspx).\
    \ Keep in mind that each version of SQL Server has a new list of deprecated features,\
    \ and that most features that are being removed have a new feature that improves\
    \ upon the older deprecated feature.\n\n## CLR\n\nCommon Language Runtime (`CLR`)\
    \ integration provides an environment that enables SQL Server to execute managed\
    \ code that, traditionally, Transact-SQL was not designed for. This `CLR` integration\
    \ adds flexibility to SQL Server by allowing SQL Server to utilize the strengths\
    \ of other programming languages.\n\n`CLR` can often be tricky to implement, and\
    \ is not in the scope of this chapter; however, the example on collecting processor\
    \ utilization uses this method. In some cases, altering processes to run in the\
    \ `CLR` environment greatly improves the performance of that process.\n\n## DMVs\n\
    \nDynamic Management Views (`DMVs`) give the user a view into the current SQL\
    \ Server state. Many features of SQL Server, such as replication, file stream,\
    \ extended events, wait times, and AlwaysOn, have `DMVs` associated with them.\
    \ When gathering data for the utility database, the `DMVs` are one of the more\
    \ powerful sources of data because of the completeness of the data and the ease\
    \ of access. `DMVs` are installed with the standard installation of SQL Server;\
    \ because of this, it is easy to find ways to access the information. To find\
    \ more information on `DMV` best practices, refer to Chapter 4."
