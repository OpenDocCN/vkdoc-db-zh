    `FactInternetSales_SalesOrderNumber_SalesOrderLineNumber`。目前，它具体使用哪一个并不重要，因为我确信，基于索引中的列，聚簇键是绝大多数读取操作的来源。


    如果你采用最简单的方式处理这个查询，仅仅添加一个覆盖索引会怎样？覆盖索引是指满足查询的`WHERE`条件、连接条件以及`SELECT`列的索引。


    > **注意**：覆盖索引对于某些查询来说是一个极好的解决方案，但它们通常比包含单列的索引要大得多，并且维护开销也更高。


    索引创建语句如下所示：


    ```sql

    CREATE NONCLUSTERED INDEX [IX_Query1_Covering]

    ON [dbo].[FactInternetSales] ([ProductKey])

    INCLUDE ([OrderDateKey],[OrderQuantity],[UnitPrice],[SalesAmount])

    GO

    ```


    有了这个索引，查询的`STATISTICS IO`输出如下：


    ```

    Table ''FactInternetSales''. Scan count 1, logical reads 2, physical reads 2,
    read-ahead reads 0,

    lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.

    (13 row(s) affected)


    Table ''Worktable''. Scan count 0, logical reads 0, physical reads 0, read-ahead
    reads 0, lob logical reads 0, lob physical reads 0, lob read-ahead reads 0.


