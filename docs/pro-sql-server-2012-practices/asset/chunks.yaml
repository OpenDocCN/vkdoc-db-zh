  raw: 'One of the great things about compression is that it efficiently uses all
    available space on a data page. One of the bad things about compression is it
    is very easy to create fragmentation from insert, update, and delete operations
    because compression uses all available space on a data page. Whenever you pack
    records tightly on a page, this is bound to occur. It is also one of the reasons
    why you should look at scan and update patterns before determining what to compress.


    When you rebuild a heap, clustered index, nonclustered index, or object by partition
    and apply compression, you can still use all of the wonderful index options the
    way you have with noncompressed objects. Fill Factor, Pad Index, Sort_in_Tempdb,
    Online, and all other index options can still be used.


    Remember though, all rebuilt data records will receive the full amount of compression
    possible. If you set 355


    chapter 14 ■ page and row compression


    a Fill Factor of 60, 40 percent of every data page will be left empty and ready
    for new records. Those new records will receive only row compression even if you
    have specified page compression until they fill to the point that a page split
    would occur. This excludes heaps, which get forwarding pointers and not page splits.
    Heaps need to be completely rebuilt before they can compress new records to a
    compression level lower than Row.


    This means you can use the power of compression with additional index hints to
    prevent fragmentation, while still getting space savings.


    Another thing you might wonder is what this does this to database logging. If
    your database is in the Full recovery model, all transactions are logged operations
    that can be cleared only by transaction log backups. In this situation, you might
    wonder how much overhead compression adds. The answer to that is that compression
    applies very minimal changes in logging regardless of the recovery model.


    But don’t just take my word for it, let’s prove it. First create a database you
    can test against: USE master;


