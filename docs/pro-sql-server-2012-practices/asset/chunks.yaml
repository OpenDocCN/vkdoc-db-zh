    As an example, we’ll investigate the demonstration server from this chapter to
    see what queries are using the PK_SalesOrderHeader_SalesOrderID index. Using the
    code in Listing 7-18, we can see that by investigating the Object node of the
    SHOWPLAN XML, the index is stored in the attribute @IndexName. We can query for
    this directly or through a variable, which is used in the query. The results of
    this query, shown in Figure 7-19, show you that there are eight plans in the cache
    that are using the index, along with the counts of use and the execution plan
    that you’d use to further investigate how it is being used.


    ***Listing 7-18.** Query Plan Cache for Index Usage*


    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED


    GO


    DECLARE @IndexName sysname = ''PK_SalesOrderHeader_SalesOrderID'';


    SET @IndexName = QUOTENAME(@IndexName,''['');


    [WITH XMLNAMESPACES (DEFAULT ''http://schemas.microsoft.com/sqlserver/2004/07/showplan'')](http://schemas.microsoft.com/sqlserver/2004/07/showplan)


    ,IndexSearch


    AS (


    SELECT qp.query_plan


    ,cp.usecounts


    ,ix.query(''.'') AS StmtSimple


    FROM sys.dm_exec_cached_plans cp


    OUTER APPLY sys.dm_exec_query_plan(cp.plan_handle) qp


    CROSS APPLY qp.query_plan.nodes(''//StmtSimple'') AS p(ix)


    WHERE query_plan.exist(''//Object[@Index = sql:variable("@IndexName")]'') = 1


    )


    SELECT StmtSimple.value(''StmtSimple[1]/@StatementText'', ''VARCHAR(4000)'') AS
    sql_text


    ,obj.value(''@Database'',''sysname'') AS database_name


    ,obj.value(''@Schema'',''sysname'') AS schema_name


    ,obj.value(''@Table'',''sysname'') AS table_name


    ,obj.value(''@Index'',''sysname'') AS index_name


    ,ixs.query_plan


    FROM IndexSearch ixs


    CROSS APPLY StmtSimple.nodes(''//Object'') AS o(obj)


    WHERE obj.exist(''.[@Index = sql:variable("@IndexName")]'') = 1


    ***Figure 7-19.** Results from plan cache query*


    chapter 7 ■ IndexIng OutsIde the BuBBle


    n **Note** In one situation, I worked with a database that had indexes on a number
    of tables. These indexes were used on average once or twice a week. During an
    indexing assessment, it was determined that these weren’t used often enough to
    justify keeping the indexes. Once removed, the import process that they supported
    degraded substantially and the import time went from under an hour to many hours.
    This is a near perfect example of why it is critical to know how your indexes
    are used, and what they are used for. Had the research into the purpose of the
    indexes been done, then the process using the indexes would not have regressed
    in performance.


    Data Integrity


    The other piece of the business value for an index relates to the data integrity,
    or rather the rules that are placed on the database to validate and ensure data
    integrity. The chief method for this is the use of foreign keys. With foreign
    keys, we are able to ensure that a value placed on one table is a value that is
    in another table, which contains reference information. While it might not seem
    important to index this information, it is often critical to do so. The reason
    for this need is that if the column being validated is not indexed, then any validation
    check will require a scan of the column. If the column has thousands or millions
    of rows, this scan can cause performance issues, and could lead to deadlocks.


    The best way to determine whether there are missing indexes on foreign keys is
    to check the metadata for the foreign keys against and indexes. All of the information
    needed is included and can be easily queried. The key thing to remember is to
    be certain the that indexes and foreign keys are compared from the left edge of
    the index. If the foreign key does not match to that edge, then it cannot be used
    to validate values in the index. Using the query shown in Listing 7-19 provides
    the list of foreign keys that are not indexed in a database. The results from
    this query, shown in Figure 7-20, show that there are 33 foreign keys in the AdventureWorks2012
    database that are not indexed.


    After the unindexed foreign keys are identified, the next step is to create indexes
    that cover those foreign keys. The table that the index needs to be built on is
    in the fk_table_name column in Figure 7-20; the key columns for the index will
    be from the fk_columns column. As an example, the index to cover the missing foreign
    key index for FK_BillOfMaterials_Product_ComponentID would use the code in Listing
    7-20.


    ***Listing 7-19.** Query for Unindexed Foreign Keys*


    SET TRANSACTION ISOLATION LEVEL READ UNCOMMITTED


    ;WITHcIndexes


    AS (


    SELECT i.object_id


    ,i.name


    ,(SELECT QUOTENAME(ic.column_id,''('')


    FROM sys.index_columnsic


    WHERE i.object_id = ic.object_id


    AND i.index_id = ic.index_id


    AND is_included_column = 0


    ORDER BY key_ordinal ASC


    FOR XML PATH('''')) AS indexed_compare


    FROM sys.indexesi


    ), cForeignKeys


    AS (


    ![Image 99](index-203_1.png)


    chapter 7 ■ IndexIng OutsIde the BuBBle


    SELECT fk.name AS foreign_key_name


    ,fkc.parent_object_id AS object_id


    ,STUFF((SELECT '', '' + QUOTENAME(c.name)


    FROM sys.foreign_key_columnsifkc


    INNER JOIN sys.columns c ON ifkc.parent_object_id = c.object_id


    AND ifkc.parent_column_id = c.column_id


    WHERE fk.object_id = ifkc.constraint_object_id


    ORDER BY ifkc.constraint_column_id


    FOR XML PATH('''')), 1, 2, '''') AS fk_columns


    ,(SELECT QUOTENAME(ifkc.parent_column_id,''('')


    FROM sys.foreign_key_columnsifkc


    WHERE fk.object_id = ifkc.constraint_object_id


    ORDER BY ifkc.constraint_column_id


    FOR XML PATH('''')) AS fk_columns_compare


    FROM sys.foreign_keysfk


    INNER JOIN sys.foreign_key_columnsfkc ON fk.object_id = fkc.constraint_object_id


    WHERE fkc.constraint_column_id = 1


    ), cRowCount


    AS (


    SELECT object_id, SUM(row_count) AS row_count


    FROM sys.dm_db_partition_statsps


    WHERE index_id IN (1,0)


    GROUP BY object_id


    )


    SELECT fk.foreign_key_name


    ,OBJECT_SCHEMA_NAME(fk.object_id) AS fk_schema_name


    ,OBJECT_NAME(fk.object_id) AS fk_table_name


    ,fk.fk_columns


    ,rc.row_count AS row_count


    FROM cForeignKeys fk


    INNER JOIN cRowCount rc ON fk.object_id = rc.object_id


    LEFT OUTER JOIN cIndexes i ON fk.object_id = i.object_id AND


    i.indexed_compare


    LIKE fk.fk_columns_compare + ''%''


    WHERE i.name IS NULL


    ORDER BY OBJECT_NAME(fk.object_id), fk.fk_columns


    ***Figure 7-20.** Results from foreign key query*


    chapter 7 ■ IndexIng OutsIde the BuBBle


    ***Listing 7-20.** Example Foreign Key Index*


    CREATE INDEX FIX_BillOfMaterials_ComponentID ON Production.BillOfMaterials (ComponentID)
