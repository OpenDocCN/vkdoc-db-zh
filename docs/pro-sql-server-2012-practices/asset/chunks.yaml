  raw: 'You need to care because if your storage guru asks what you want, you can
    confidently say “I’d like a quarter pounder with cheese and a….”. Back up—you
    aren’t that cozy with your storage guru, yet. Arming yourself with knowledge about
    RAID and your specific SAN is invaluable when it’s time for your storage guru
    to assign you LUNs for your database. It provides you with the opportunity to
    have an educated conversation with him and request what your database longs for:
    fast I/O. It was mentioned earlier that Transaction Log files and TempDB are both
    susceptible to slow I/O, and I/O waits are the bane of a well-performing database
    system.


    In the majority of environments today, SQL Server database storage is often found
    on shared disk (SAN or NAS). Many of these appliances will have hundreds of spindles.
    If you consider the example we’ve been discussing with three disks, you can see
    how much this changes the landscape for your environment.


    One would immediately think “Yahoo! I have more spindles.” Yes, you do—but with
    that, you typically have other applications on those same spindles.


    For instance, what if the storage appliance your database is on also houses your
    Microsoft Exchange environment, SharePoint, middle-tier servers, web servers,
    and file shares? Suddenly, you find yourself competing for I/O with the shared-storage
    appliance and controller or controllers on that appliance. This not only changes
    the landscape, it also introduces some complexity in monitoring and measuring
    the performance of your database. This means you need to dive a bit deeper than
    just Performance Monitor numbers. If you have data points in hand and knowledge
    about your storage guru’s world, you can better communicate what your database
    needs in order to support your SLA or the businesses expectations with regard
    to performance.


    Getting to the Data


    With the Performance Monitor data you have in hand, you can see the impact that
    slow disk-access time has on your database by querying the Dynamic Management
    Views (DMV) in SQL Server. SQL Server offers a number of DMVs that can be used
    to dig deeper into the causes of your I/O, in conjunction with external data such
    as that provided by Performance Monitor.


    The data set from the DMVs, in the query referenced next, can be queried, and
    it will return what’s known as *disk stalls*. This result set is significant because
    it begins to narrow down which of your data files (databases) is driving your
    I/O.


    In traditional Online Transactional Processing (OLTP) databases, the majority
    of I/O is consumed via reads. The percentage of reads compared to writes in most
    OLTP workloads follows the 90/10 rule. This is to say that 90 percent of the data
    your database server will present is for read operations and only 10


    percent will be written. This number, however, is significantly skewed (in a good
    way) due to RAM. The 324


    chapter 13 ■ I/O: the UntOld StOry


    more RAM you have, the more data you have in cache and, as such, the less data
    you have that needs to be retrieved from disk. The ratio of how much data is read
    from disk or written from disk varies significantly based on the usage patterns,
    access paths, indexing, available memory, workload, and so forth. As a result,
    it’s important for you to know what your database server’s ratio is. Again, keep
    in mind that backup operations, DBCC CheckDB, reindexing tasks, updating of statistics,
    and any number of additional database maintenance tasks can significantly alter
    the result set because this data is cumulative since SQL


