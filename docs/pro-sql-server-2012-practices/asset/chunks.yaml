    所示。


    如果你查看其他列，你可以开始看到匹配的模式。在第二列中，唯一匹配的值是 `35.95` 和 `35.76`。公共模式是 (`35.`)，因此 `35.95`
    被放入锚点标签，该列中的值被替换。该列中有两条记录的值与 (`35.`) 不匹配：`42.25` 和 `75.84`。这些列前面仍然会放置一个值——在本例中是零——它告诉读取进程不需要去锚点标签检索此行的任何数据。


    应用于第二列的相同逻辑现在应用于第三列，匹配值为 (`24.`)。第四列采用与第一列相同的逻辑，匹配值为 (`Brad`)。


