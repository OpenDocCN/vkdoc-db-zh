    Version Control


    If you do not currently have version control to contain a golden copy of your
    code and database objects, it is strongly suggested that you do so going forward.
    You should begin implementing a solution to keep different versions of code protected.
    There are many different ways to implement a comprehensive version control process,
    depending on your needs. At a minimum, you need to store versions of objects and
    other T-SQL code externally from your database, so that in the event of a change
    disrupting your systems, you can revert to the original version of said objects.


    An easy way to implement version control is to capture a snapshot of the database
    schema before and after changes have occurred. If data changes are involved, those
    changes should be snapshotted as well.


    Keeping track of these changes before and after a release will also allow you
    to document what changed and reconcile it with the actual release plan that was
    created.


    You could use PowerShell or SMO to script out objects to files or scripts. Third-party
    tools are also available, such as Git, Mercurial, SVN, Red Gate’s SQL Source Control,
    and Microsoft’s Team Foundation Server, among others. Each of these options affords
    you the opportunity to collect database objects and store them outside your database.


    Keep in mind that the simplest way to perform version control is to create a backup
    of your database moments before you perform a release. I would suggest that you
    perform a backup each and every time that you release. Regardless of what version
    control system you implement or currently have, creating backups prior to a release
    will give you a failsafe. This process, like all others, should be malleable and
    allow you to change it from time to time, thus improving the process along the
    way.'
