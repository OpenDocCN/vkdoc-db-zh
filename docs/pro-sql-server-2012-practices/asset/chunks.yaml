- fmt: '# SQL Server 自动化管理


    ## 备份策略


    你可能每天来到工作场所，打开 SSMS，连接到每个服务器，然后备份每个数据库。但是，当你拥有如此多的数据库或服务器，以至于每天没有时间完成这项工作时，会发生什么？你如何管理定期备份事务日志？你如何休假而仍能确保备份被完成？自动化是关键。创建一个
    Agent 作业，按计划运行 T-SQL 脚本来备份你的数据库，是备份的最佳选择。


    ### 恢复模型


    SQL Server 中有三种数据库恢复模型选项：`Simple`、`Full` 和 `Bulk-Logged`。`Simple` 要求你备份数据文件。`Full`
    和 `Bulk-Logged` 要求你备份数据和事务日志文件。`Simple` 允许你将数据恢复到上次完整备份的点。`Bulk-Logged` 允许你备份到最后一次日志备份的点，但不支持时间点恢复。`Full`
    允许你恢复到某个时间点，只要该时间点被一次完整的备份所覆盖。你需要仔细为每个数据库选择恢复模型，权衡你可以容忍的数据丢失量与备份所需的空间量。


    ### 备份类型与计划


    对于每个数据库，你需要决定执行哪种类型的备份，以及在什么计划上执行。完整备份将包含数据库中的所有数据。差异备份将捕获自上次完整备份以来所做的任何更改。事务日志备份（仅适用于
    `Full` 或 `Bulk-logged` 数据库）包含所有未在上一次备份中的日志记录。


    ### 备份位置


    决定将备份保存在哪里是另一个考虑因素。将备份保存到与数据和日志文件相同的存储位置是不推荐的。首先，当 SQL Server 读取数据并将其写入备份时，会有大量的
    I/O 操作。其次，如果该存储阵列中的驱动器出现故障，你将同时丢失你的数据库和你的备份——这是最糟糕的情况！将备份保存到同一服务器但不同的存储阵列可能很快，但如果服务器出现问题，则提供不了太多保护。


    保存到网络上的不同位置，例如文件服务器，提供了速度与安全性的良好组合，因为两台服务器同时宕机的可能性较小。异地备份是最好的，并且通常的做法是将文件服务器备份到磁带，然后将磁带运送到异地。


    一旦你确定了数据库的恢复模型并选择了保存文件的位置，你就可以设置计划，根据需要混合安排完整、差异和日志备份。


    ## 还原测试


    备份数据库是灾难恢复计划的第一步，但要认识到，不能保证备份每次都正确工作。磁盘和网络仍然可能出错。第二步同样重要，即还原数据库，以便你知道在需要时可以访问你的数据。


    你应该在哪里还原数据库以测试备份的有效性？你可能很想将其还原到同一个实例。如果发生真正的灾难，这正是你需要做的。


    然而，请记住，这会增加服务器的 I/O 负载，这可能并不理想。最好找到一个不同的、但相同或类似的服务器来进行还原。


    你应该多久执行一次这些还原？这是一个你需要仔细考虑的问题。一个存储关键业务信息的、任务关键型的数据库可能需要每天测试。对于另一个数据库，每周进行一次实际的还原，其他几天进行
    `RESTORE VERIFYONLY` 检查可能是可以接受的。


    你还想确保你正在还原所有必要的文件。如果你正在执行完整和差异备份，请确保你还原了这两种备份。如果你有事务日志备份，请确保你也能还原它们。


    ## 数据库完整性


    尽管每个人都尽了最大努力，即使编写了良好的代码、进行了定期备份和还原，数据仍然可能被损坏。在你职业生涯的某个时刻，它会发生在你身上。你可以通过运行 `DBCC
    CHECKDB` 来采取积极主动的措施。


    这是一个执行多个步骤来检查数据完整性的过程。首先检查系统目录的完整性。然后，执行分配一致性检查，接着检查表、索引和视图。还可以检查其他数据，例如 Service
    Broker、索引视图、XML 索引和空间索引。总的来说，这个过程确保数据是可读和可用的。


    你多久运行一次这个命令，以及针对数据库的哪个副本运行，是需要仔细考虑的事情。数据库越大，这个任务运行所需的时间就越长。该任务是在数据库的快照上执行的，而不是在数据库本身上执行的，该操作可能会占用服务器上的额外资源。你可能需要考虑一些选项，例如在单独的存储上创建数据库快照并在其上运行
    `DBCC CHECKDB`，或者通过将备份还原到辅助服务器上，然后运行 `DBCC CHECKDB` 来将此任务与前面的任务结合起来。无论你如何进行，定期检查数据库的健康状况至关重要。这可以很容易地通过一个
    SQL Server Agent 作业来自动化。


    ## 索引维护


    SQL Server 依靠索引来高效地查找数据并在查询中返回数据。正确应用的索引可以极大地提高应用程序和报告的性能。然而，这些并不是你创建之后就可以忘记的东西。正确的维护对于确保它们持续带来益处至关重要。


    聚集索引对数据页进行排序。当记录被插入、更新或删除时，一条记录所占用的空间量可能会增加或减少。这导致额外的页面被插入，以及其他页面上出现未使用的间隙。逻辑顺序可能与页面的物理顺序不匹配。这称为碎片。如果不加处理，碎片会导致查询运行缓慢，影响应用程序的性能，并可能导致
    DBA 接到求助电话。通过主动监控索引碎片并修复它，你可以减少这些求助电话。


    为了对抗碎片，你需要执行索引维护。你可以重组或重建索引。重组将物理上重新排序叶级页面以匹配逻辑顺序，从而填充未使用的区域并更好地利用分配的空间。重建会删除索引并重新创建它。在此操作期间，会对索引加锁。如果索引是聚集索引，则该表在此期间不可用，除非你使用
    `ONLINE` 选项（仅在企业版中可用）。比重构密集得多，但会随着页面的压缩和重新排序而回收空间。如果你选择重建索引，你需要确定一个维护窗口并安排在该窗口内执行重建。例如，如果那个窗口是星期六凌晨
