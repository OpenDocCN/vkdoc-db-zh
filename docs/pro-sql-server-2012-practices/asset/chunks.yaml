  trans: '

    效率降低的原因主要有两点。首先，系统读取了超出必要的行数。其次，筛选器的评估需要消耗计算资源。虽然单次消耗不大，但如果需要对数百万行数据应用二次筛选，累积开销就会变得显著。


    二次筛选更极端的一种形式是：当不存在可用作查找谓词的`where`子句谓词时，SQL 会执行索引扫描，并对索引扫描返回的所有行应用谓词。举例来说，假设我修改前面的示例，移除了`OrderStatus`上的`where`子句谓词，但当前索引仍是以`OrderStatus`为首列的索引。这个新查询的执行计划如图
    3-7 所示，同时附上了查询结果。


    ### 图 3-7. 带有 OrderDate 列谓词的索引扫描


    ## 第三章 ■ 隐藏的性能陷阱


    这会产生一个带有谓词的索引扫描。（这里没有查找谓词；如果有，就会是查找而非扫描。）这意味着系统会读取表中的每一行，然后根据`OrderDate`谓词进行测试。


    那么，是什么导致了这种情况？原因有多种。最常见的包括：


    -   索引中的列顺序不适合此查询，或者必要的列根本不在索引中。

    -   在列上应用了任何函数。

    -   发生了任何隐式转换。


    我在前一个示例中展示了列的顺序。这里无法深入探讨索引的完整机制；这个话题足以单独写一章。简而言之，只有当这些列是索引键的左前缀子集时，SQL 才能使用这些列或列集进行索引查找操作，这一点稍后会解释。


    假设你有一个查询，其`where`子句形式如下：


    ```

    WHERE Col1 = @Var1 and Col3 = @Var3

    ```


    如果存在一个索引（例如，`(Col1, Col2, Col3)`），SQL 可以使用该索引在`Col1`谓词上进行查找，因为它是索引键定义中最左侧（或第一个）的列。然而，`Col3`不是第二列，而是第三列。因此，SQL
    无法同时在`Col1`和`Col3`上执行查找。相反，它必须在`Col1`上查找，并对`Col3`执行二次筛选。该查询的索引查找属性将显示在`Col1`上的查找谓词和在`Col3`上的谓词。


    现在考虑，如果你有相同的索引`(Col1, Col2, Col3)`，而查询的`where`子句形式如下：


    ```

    WHERE Col1 = @Var1 and Col2 = @Var2

    ```


    现在，`where`子句中引用的两个列是索引键中最左侧的两个列（在索引键定义中排第一和第二），因此 SQL 可以在两个列上同时进行查找。


    有关索引列顺序的更多详细信息，请参阅以下两篇博客文章：


    -   [`sqlinthewild.co.za/index.php/2009/01/19/index-columns-selectivity-and-equality-predicates/`](http://sqlinthewild.co.za/index.php/2009/01/19/index-columns-selectivity-and-equality-predicates/)

    -   [`sqlinthewild.co.za/index.php/2009/02/06/index-columns-selectivity-and-inequality-predicates/`](http://sqlinthewild.co.za/index.php/2009/02/06/index-columns-selectivity-and-inequality-predicates/)


    二次筛选还有另一种形式：所需列之一甚至不在所用索引中。让我们看这个例子：


    ```

    SELECT OrderID

    FROM Orders

    WHERE SubTotal < 0 AND OrderDate > ''2012/01/01''

    ```


    假设你只有一个建立在`SubTotal`上的索引，而`OrderDate`列完全不在该索引中。SQL 根据其统计信息知道，满足`SubTotal < 0`谓词的行非常少。（实际上，没有这样的行，但该列上没有约束阻止负值。因此，SQL
    不能假设不存在任何行。）图 3-8 显示了此查询的执行计划。


    ![Image 17](img/index-61_1.png)


    ![Image 18](img/index-61_2.png)


    ## 第三章 ■ 隐藏的性能陷阱


    ### 图 3-8. 带有查找和键查找的执行计划。


    你会得到一个在`Subtotal`索引上的索引查找，以及一个返回聚集索引的键查找，如图 3-9 所示。


    ### 图 3-9. Subtotal 索引上的索引查找，未提及 OrderDate 谓词


    索引查找只有一个查找谓词。然而，键查找的内容却很有意思。它包含一个谓词，如图 3-10 所示。


    ![Image 19](img/index-62_1.png)


    ## 第三章 ■ 隐藏的性能陷阱


    ### 图 3-10. 带有谓词的键查找。


    这里发生的情况是：索引查找只能评估`SubTotal < 0`谓词，因为`OrderDate`列根本不在索引中。为了获取该列的值，SQL 必须执行键查找以返回聚集索引获取它。然而，该列并非输出所需——因为它不在`select`子句中——它仅用于`where`子句谓词。因此，在键查找操作符内部，会对键查找获取的每一行进行过滤，丢弃任何不符合`OrderDate`谓词的行，只有符合条件的行才会从键查找中返回。


    导致索引使用效率低下和产生二次筛选的另一个常见原因是在查询的`where`子句中对列使用了函数。考虑前面示例中的表，其索引建立在`OrderStatus,
    OrderDate`上。假设你有一个索引`(OrderStatus, OrderDate)`和以下`where`子句：


    ```

    WHERE OrderStatus = ''S'' AND DATEADD(mm,1, OrderDate) > GETDATE()

    ```


    换句话说，获取所有状态为`S`且订单日期在上个月内的订单。图 3-11 显示了该查询执行计划的一部分。


    ![Image 20](img/index-63_1.png)


    ## 第三章 ■ 隐藏的性能陷阱


    ### 图 3-11. 带有函数导致谓词的索引查找。


    这里出现谓词而不是两个查找谓词的原因是：一旦对列应用了函数，包含该函数的`where`子句谓词就不能再用于索引查找。这是因为索引是建立在列上的，而不是建立在`函数(列)`上的。


    这类谓词通常被称为**非 SARGable**（SARG 代表 Search ARGument），这个短语仅意味着该谓词不能用于索引查找操作。


    导致 SQL 必须应用二次筛选的第三种情况是隐式转换。


    考虑这个常见场景：


    ```

    WHERE VarcharColumn = @NVarcharParameter

    ```


    列和参数的数据类型不同。SQL 无法比较两种不同的数据类型，因此必须将其中一个转换为匹配另一个。转换哪一个取决于[数据类型优先级规则](http://msdn.microsoft.com/en-us/library/ms190309.aspx)。在这种情况下，`nvarchar`数据类型的优先级高于`varchar`，因此必须将列转换为匹配参数的数据类型。该查询本质上是`WHERE
    CAST(VarcharColumn AS NVARCHAR(<Column Length>) = @NVarcharParameter`。这是对列应用了函数。如前所述，这意味着该谓词不能用于索引查找操作（它不是
    SARGable），只能作为二次谓词应用。


    所以，你已经看到了几个原因。现在让我们看看你可以如何应对这些问题。


    首先需要注意的是，谓词并非总是问题。移除它们并非总是必要的。在花费时间尝试更改索引或重写查询之前，重要的是要调查涉及的数据行数量。具体来说，你应该确定查找谓词返回的行数，以及其中有多大比例随后被谓词过滤掉。

    '
- fmt: '考虑以下两种场景：一种是查找谓词返回 100,000 行，然后谓词消除了 5 行，最终返回 99,995 行；另一种是查找谓词返回 100,000
    行，然后谓词删除了 99,500 行，最终返回 500 行。第二种场景比第一种问题更大，更值得关注。


    ## 为什么索引查找的效率存在差异？


    为什么？因为索引的主要目标之一是在查询执行的早期尽可能消除不必要的行。如果不需要某一行，更好的做法是根本不读取它，而不是读取它之后再用过滤器将其消除。第一种方法是高效的；第二种方法则是浪费时间和资源。


    在本章的初始示例中，高效选项从表中读取了 5 个页，而低效选项读取了超过 300 个页。这个差异足以引起调查。然而，如果高效选项读取了 100 个页，而低效选项读取了
    108 个页，那么花费时间去解决这个问题就不是特别值得。你可以在其他地方找到更大的改进点。


    ## 如何发现和解决索引查找效率问题？


    第一步当然是找出存在这些问题的查询。最简单的方法可能是作为常规性能调优的一部分。使用 SQL Profiler 或扩展事件会话捕获工作负载，分析其中执行过多读取的查询，并在分析过程中查看它们是否具有低效的索引查找。


    解决方案取决于具体是什么导致了低效的查找。


    如果问题是索引内的列顺序，解决方案是更改索引中列的顺序，或创建另一个索引来完全支持该查询。哪种选项最佳（实际上，是否任何一种可取）取决于针对该表运行的其他查询、发生的数据修改量、查询的重要性以及它实际低效到什么程度。不幸的是，关于索引更改的完整讨论超出了本章的范围。


    如果低效查找的原因是对列应用了函数，则解决起来容易得多。只需移除该函数。


    好吧，也许没那么简单。这取决于该函数的功能，看它是否可以移除或更改。


    在某些情况下，你可以对变量、参数或字面量而不是列应用函数，以获得相同的结果。下面是一个例子：


    `WHERE Subtotal * 1.14 >= @MinimumDiscount`


    执行计划如图 3-12 所示。


    ![Image 21](index-65_1.png)


    chapter 3 ■ hidden performance Gotchas


    Figure 3-12. 由 WHERE 子句中列上的函数导致的扫描。


    应用于列的乘法意味着无法对 `Subtotal` 上的任何索引使用索引查找。如果 WHERE 子句中还有另一个谓词，SQL 可能能够基于该谓词进行查找，并对
    `Subtotal` 应用二级过滤器。否则，查询就必须作为带二级过滤器的索引扫描来执行。


    基础代数告诉你，表达式 `x*y >= z` 与 `x >= z/y` 完全等价（除非 `y` 为零），因此你可以将该 WHERE 子句改写如下：


    `WHERE Subtotal >= (@MinimumDiscount/1.14)`


    这个例子不像第一个那么直观，但它更高效，如图 3-13 所示。


    ![Image 22](index-66_1.png)


    chapter 3 ■ hidden performance Gotchas


    Figure 3-13. 更改函数计算位置导致索引查找。


    另一个常见情况是日期函数，特别是当日期在数据库中与其时间一起存储，而查询需要获取特定日期的所有行时。经常会看到像这样的查询：`WHERE CAST(OrderDate
    AS DATE) = @SpecificDate`


    转换为 DATE 消除了日期时间值的时间部分，因此与日期的比较返回该日的所有行。然而，这不是一种特别高效的方法，如图 3-14 所示。


    ![Image 23](index-67_1.png)


    chapter 3 ■ hidden performance Gotchas


    Figure 3-14. 将列转换为 DATE 导致扫描。


    相反，可以重写查询以使用不等式谓词并搜索特定日期的时间范围，如下所示：


    `WHERE OrderDate >= @SpecificDate and OrderDate < DATEADD(dd,1,@SpecificDate)`


    我不使用 BETWEEN，因为 BETWEEN 在两侧都是包含性的，并且如果不需要 `OrderDate` 为次日午夜的行，则需要稍微复杂的日期操作。


    这种形式的 WHERE 子句更复杂，但也更高效，如图 3-15 所示。


    ![Image 24](index-68_1.png)


    chapter 3 ■ hidden performance Gotchas


    Figure 3-15. 列上无函数；因此使用了查找。


    第三种情况是不必要的字符串函数。我经常看到这样的代码：


    `WHERE UPPER(LTRIM(RTRIM(LastName))) = ''SMITH''`


    除非数据库运行的是区分大小写的排序规则，否则 `UPPER` 是不必要的（我经常在大小写不敏感的数据库中看到这个）。`RTRIM` 是不必要的，因为 SQL
    在比较字符串时会忽略尾随空格。因此，在 SQL 进行字符串比较时，''abc'' 等于 ''abc''。否则，它如何比较 `CHAR(4)` 和 `CHAR(10)`？如果已知数据库中有混乱数据，`LTRIM`
    可能有用。我在这里的偏好是确保插入和加载始终删除可能潜入的任何前导空格。


    那么检索数据的查询就不需要担心前导空格，因此也不需要使用 `LTRIM`。


    隐式转换可能是最容易解决的问题（尽管通常是较难发现的问题之一）。这主要是确保参数和变量与列类型匹配；必要时显式转换字面量、变量或参数；并确保前端应用程序在使用动态或参数化
    SQL 语句时传递正确的类型。


    这里一个常见的罪魁祸首是 JDBC（Java 数据访问库），它默认将字符串作为 `nvarchar` 发送，无论它们实际是什么。在处理这种情况时，有时你可能需要将列的数据类型更改为
    `nvarchar`，以避免隐式转换，前提是应用程序无法更改。一些 ORM 工具也表现出相同的默认行为。


    ![Image 25](index-69_1.png)


    chapter 3 ■ hidden performance Gotchas


    ## 索引查找不总是高效的


    我在此讨论的一个含义需要特别注意：并非所有的索引查找都是相等的，仅仅在查询的执行计划中存在索引查找并不能保证该查询是高效的。


    我记得之前在某个 SQL 论坛上的一次讨论，有人问如何消除他查询执行计划中的聚集索引扫描。该查询的相关部分类似于：


    `WHERE CAST(OrderDate AS DATE) = @SpecificDate`


    如前所述，优化该查询的方法是从列上移除函数，将 WHERE 子句改为使用 `BETWEEN` 或 `>=` 和 `<` 运算符，并确保存在合适的索引在 `OrderDate`
    列上以支持查询。有人发布的解决方案是在 WHERE 子句中添加第二个谓词，具体来说是在主键列（是一个整数，具有标识属性，默认种子和增量，因此始终大于 0）上使用不等式谓词，如下所示：


    `WHERE CAST(OrderDate AS DATE) = @SpecificDate AND OrderID > 0`


    这达到了期望的目标吗？图 3-16 有部分答案。


    Figure 3-16. 聚集索引查找。


    它似乎达到了期望的目标，因为现在有一个聚集索引查找。但那个查找实际在做什么？见图 3-17。


    ![Image 26](index-70_1.png)


    chapter 3 ■ hidden performance Gotchas


    Figure 3-17. 效率非常低的聚集索引查找。


    查找谓词 `OrderID > 0` 匹配了表中的每一行。它没有消除任何内容。'
  raw: 'Consider the following two scenarios: one where the seek predicate returns
    100,000 rows and the predicate then eliminates 5 rows, for a total of 99,995 rows
    returned; and one where the seek predicate returns 100,000 rows and the predicate
    then removes 99,500 rows, for a total of 500 rows returned. The second scenario
    is a bigger problem and a bigger concern than the first.


    Why? Because one of the primary goals for an index is to eliminate unnecessary
    rows as early as possible in the query’s execution. If a row is not needed, it
    is better not to read it at all rather than read it and then eliminate it with
    a filter. The first approach is efficient; the second approach is a waste of time
    and resources.


    In the initial example in this chapter, the efficient option read 5 pages from
    the table and the inefficient option read over 300\. That difference is sufficient
    to warrant investigation. However, if the efficient option had read 100 pages
    and the inefficient one had read 108, it wouldn’t be particularly worthwhile spending
    the time resolving the problem. You could find bigger wins elsewhere.


    The first step, of course, is finding queries that have these problems. Probably
    the easiest way to do this is as part of regular performance tuning. Capture a
    workload with SQL Profiler or an extended events session, analyze it for queries
    doing excessive reads, and as part of the analysis see if they have inefficient
    index seeks.


    The resolution depends on what specifically is causing the inefficient seek.


    If the problem is the column order within the index, the solution is to change
    the order of columns in the index or create another index to fully support the
    query. Which option is best (and, in fact, whether either is desirable) depends
    on other queries that run against the particular table, the amount of data modifications
    that take place, the importance of the query, and how inefficient it really is.
    Unfortunately, a complete discussion on indexing changes is beyond the scope of
    this chapter.


    If the cause of the inefficient seek is a function applied to a column, it’s a
    lot easier to resolve. Just remove the function.


    Well, maybe it’s not that simple. It depends on what the function is doing as
    to whether it can be removed or altered.


    In some cases, you can apply a function to the variable, parameter, or literal
    instead of the column to get the same results. An example of this is the following:


    WHERE Subtotal * 1.14 >= @MinimumDiscount


    The execution plan is shown in Figure 3-12.


    ![Image 21](index-65_1.png)


    chapter 3 ■ hidden performance Gotchas


    ***Figure 3-12.** Scan caused by a function on the column in the where clause.*


    The multiplication that is applied to the column means that any index on Subtotal
    cannot be used for an index seek. If there is another predicate in the where clause,
    SQL might be able to seek on that and apply a secondary filter on Subtotal. Otherwise,
    the query has to be executed as an index scan with a secondary filter.


    Basic algebra tells you that the expression *x*y >= z* is completely equivalent
    to *x >= z/y* (unless *y* is zero), so you can change that where clause to read
    as follows:


    WHERE Subtotal >= (@MinimumDiscount/1.14)


    This example is not quite as intuitive as the first one, but it is more efficient,
    as Figure 3-13 shows.


    ![Image 22](index-66_1.png)


    chapter 3 ■ hidden performance Gotchas


    ***Figure 3-13.** Changing where the function is evaluated results in an index
    seek.*


    Another common case is date functions, especially if a date is stored with its
    time in the database and the query needs to fetch all rows for a particular day.
    It’s common to see queries like this: WHERE CAST(OrderDate AS DATE) = @SpecificDate


    The cast to date eliminates the time portion of the datetime, so the comparison
    to a date returns all rows for that day. However, this is not a particularly efficient
    way of doing things, as you can see in Figure 3-14.


    ![Image 23](index-67_1.png)


    chapter 3 ■ hidden performance Gotchas


    ***Figure 3-14.** Conversion of the column to DATE results in a scan.*


    Instead, the query can be rewritten to use an inequality predicate and search
    for a range of times for the particular day, like this:


    WHERE OrderDate >= @SpecificDate and OrderDate < DATEADD(dd,1,@SpecificDate) I
    don’t use BETWEEN because BETWEEN is inclusive on both sides and requires slightly
    more complex date manipulation if the rows with an OrderDate of midnight the next
    day are not required.


    This form of the where clause is more complex, but it is also more efficient,
    as Figure 3-15 shows.


    ![Image 24](index-68_1.png)


    chapter 3 ■ hidden performance Gotchas


    ***Figure 3-15.** No function on the column; hence, a seek is used.*


    A third case is unnecessary string functions. I keep seeing code like this:


    WHERE UPPER(LTRIM(RTRIM(LastName))) = ''SMITH''


    Unless the database is running a case-sensitive collation, UPPER is unnecessary
    (and I often see this in case-insensitive databases). RTRIM is unnecessary because
    SQL ignores trailing spaces when comparing strings. So ''abc'' equals ''abc''
    when SQL does string comparisons. Otherwise, how would it compare a CHAR(4) and
    a CHAR(10)? LTRIM potentially has a use if the database is known to have messy
    data in it. My preference here is to ensure that inserts and loads always remove
    any leading spaces that might creep in.


    Then the queries that retrieve the data don’t need to worry about leading spaces
    and, hence, don’t need to use LTRIM.


    The implicit conversion is probably the easiest problem to fix (though it’s often
    one of the harder ones to find). It’s mostly a case of ensuring that parameters
    and variables match the column types; of explicitly casting literals, variables,
    or parameters if necessary; and ensuring that front-end apps are passing the correct
    types if they are using dynamic or parameterized SQL statements.


    A common culprit here is JDBC (the Java data access library), which by default
    sends strings through as nvarchar no matter what they really are. In some cases
    when dealing with this, you might need to alter the column’s data type to nvarchar
    just to avoid the implicit conversions if the application cannot be changed. Some
    ORM tools show the same default behavior.


    ![Image 25](index-69_1.png)


    chapter 3 ■ hidden performance Gotchas


    One implication of this discussion that I need to draw particular attention to
    is that not all index seeks are equal, and just having an index seek in a query’s
    execution plan is no guarantee that the query is efficient.


    I recall a discussion on a SQL forum a while back where someone was asking how
    to get rid of the clustered index scan that he had in his query execution plan.
    The pertinent portion of the query was something like this:


    WHERE CAST(OrderDate AS DATE) = @SpecificDate


    As mentioned earlier, the way to optimize that query is to remove the function
    from the column, change the where clause to use either BETWEEN or >= and < operators,
    and ensure that there’s a suitable index on the OrderDate column to support the
    query. The solution that someone posted was to add a second predicate to the where
    clause, specifically an inequality predicate on the primary key column (which
    was an integer and had the identity property with default seed and increment,
    and hence was always greater than 0) as such:


    WHERE CAST(OrderDate AS DATE) = @SpecificDate AND OrderID > 0


    Does that achieve the desired goal? Figure 3-16 has part of the answer.


    ***Figure 3-16.** Clustered index seek.*


    It seems to achieve the desired goal because there’s a clustered index seek now.
    But what’s that seek actually doing? See Figure 3-17.


    ![Image 26](index-70_1.png)


    chapter 3 ■ hidden performance Gotchas


    ***Figure 3-17.** Very inefficient clustered index seek.*


    The seek predicate OrderID > 0 matches every single row of the table. It’s not
    eliminating anything.'
