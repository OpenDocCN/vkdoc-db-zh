    ## 技术概述


    There are two providers for collecting data: the file provider used by the server
    side tracing, and the rowset provider used by client side tracing. That means
    that there is **not** a built in direct-to-table provider.


    At first this can be confusing to people new to SQL Server tracing but if you
    think about it is quite logical.


    To have a direct-to-table provider you’d have to follow the rules of SQL Server
    data writing, transaction logs, locking, blocking, resources, etc… this way you
    just have a simple file or a memory buffer that the trace data gets written to
    and SQL Server is done with it.


    ## 实现细节


    One important thing to note is that although you can use filters when creating
    traces, those filters are not applied in the data collection phase. Every single
    column for any event is fully collected and sent to the provider where it gets
    filtered down to the columns we specified in the trace definition.


    It is also better to have a few smaller traces than one huge trace. This is because
    each trace has its own target destination and you can put these targets on different
    drives spreading out the load.


    ## 管理监控


    All traces are managed inside the SQL Server in a thread called background management
    thread. This thread is started as soon as any trace starts running. You can view
    details about this thread in the `sys.sysprocesses` view or in `sys.dm_exec_requests`
    dynamic management view if you’re on SQL Server 2005 and up.


    There is a default trace always running in SQL Server 2005 and up so this will
    always return at least one row, unless you explicitly turn off the default trace.
    We’ll talk about the default trace later in the chapter. Code shows how to query
    the view and the DMV. The results will vary across machines and you can see what
    the columns contain in Books Online.


    ```sql

    -- SQL Server 2000

    SELECT *

    FROM sys.sysprocesses

    WHERE cmd = ''TRACE QUEUE TASK'';


    -- SQL Server 2005 and up

    SELECT *

    FROM sys.dm_exec_requests

    WHERE command = ''TRACE QUEUE TASK'';

    ```


    ## 缓冲机制


    The SQL Trace engine has what is known as an `event send buffer`. The trace event
    data is first collected into this buffer and then sent to the providers. The background
    management thread monitors the trace providers and for file providers it flushes
    them every 4 seconds. This is better for performance because it can then use large
    block writes (1 large continuous write to disk instead of many small ones) for
    faster IO write speed.


    For rowset providers it closes every provider that has been dropping events for
    more than 10 minutes. We’ll talk more about event dropping shortly.


    ## 行集提供程序


    The SQL Server rowset provider sends trace data to SQL Server Profiler and .NET
    SMO (Server Management Objects) object model. You’ve probably heard of stories
    about the running SQL Profiler on the production box bringing the whole server
    to a standstill. You haven’t? Well, they are true. This happens because the rowset
    provider is memory-based. It takes all the memory it needs and if you run it on
    a production server, it takes that valuable memory and makes in unusable to SQL
    Server. This is the reason why it’s crucial that you run the SQL Profiler or a
    .NET SMO collector service (this is coded by a programmer to suit specific tracing
    needs, and not part of the SQL Server product) on a non-production machine.


    The rowset provider uses internal buffers to process incoming trace data, and
    if those buffers get full, the events can be dropped from the trace output. The
    traces begin to be dropped after the internal buffers have been full for 20 seconds.
    After that, the rowset provider will drop them to get things moving again.


    When this happens, the SQL Server Profiler will show a special message that the
    events have been dropped. Internal buffers waiting to be flushed also increment
    the `TRACEWRITE` wait type. This way you can see if your rowset provider based
    traces are problematic for your system by using the `sys.dm_os_wait_stats` dynamic
    management view.'
