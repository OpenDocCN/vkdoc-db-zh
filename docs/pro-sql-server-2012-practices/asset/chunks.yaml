    ***Figure 10-5.** Advanced options of a job step*


    Schedules


    The real power of automation in SQL Server Agent jobs is the ability to set schedules.
    You no longer need to start the execution of jobs as you leave the office, or
    worry about logging in on a weekend to start a one-time job.


    The screen for scheduling is shown in Figure 10-6\. The first time you establish
    a schedule, you give it a name. Try to make this schedule name as descriptive
    as possible, so the type and frequency of the schedule are clear. For schedule
    type, you can pick from the following:


    ![Image 117](index-252_1.png)


    chapter 10 ■ automating administration


    • Recurring: Jobs that need to run multiple times, such as database backups,


    transaction log backups, index reorg or rebuilds, or queries to populate report


    tables.


    • One time: Jobs that only need to run once, such as for a scheduled data load.


    • When SQL Server Agent starts: Jobs that need to execute only when the Agent


    service is started, perhaps to send a notification or run a specific stored procedure.


    •


    Whenever the CPUs become idle: Jobs that can take advantage of CPU idle time and


    don’t need to be run at a specific time, such as batch processing.


    Frequency can be daily, weekly, or monthly. If daily, pick the number of days
    between recurrences. For example, you can run a job every day, every five days,
    or every ten days. If weekly, pick the number of weeks between recurrences, and
    the day(s) of the week the job will run. If monthly, you can choose a specific
    day of the month. Another option is to pick the X day of each Y months (such as
    the second Thursday of every month, or the last day of every third month). Figure
    10-6 shows the schedule screen. The DMV gathering job will run every day, every
    15 minutes.


    ***Figure 10-6.** Setting up a job schedule*


    ![Image 118](index-253_1.png)


    chapter 10 ■ automating administration


    Another benefit is that once a schedule is established, it can be reused. When
    you’re looking at the Schedules screen for a job, select Pick instead of New to
    choose an existing schedule.


    n **Note** You can also create a job based on an alert, which will be covered
    later in this chapter.


    Notifications


    Notifications allow you to perform an action when a job completes. As shown in
    Figure 10-7, you can send an e-mail to any of the operators you have set up. The
    e-mail can be sent when the job fails, when the job succeeds, or when the job
    finishes, regardless of outcome.


    You also have the option to write to the Windows Application event log. Deleting
    a job upon completion is also an option, which is useful if the job is a one-time
    operation and you don’t want to worry about coming back to clean it up later.
    For the DMV execution, notification will be via e-mail and the Windows Event log
    if the job fails.


    ***Figure 10-7.** Selecting the notifications for job completion*


    ![Image 119](index-254_1.png)


    chapter 10 ■ automating administration


    Alerts


    As already discussed, there are many levels of logging set up in SQL Server. There
    are error numbers and messages written to the event log. Errors are assigned a
    severity, which determines how critical they are.


    Many times, an error indicating that something might be going wrong can be buried
    in the log. Reading through, say, the error log on every server every day can
    be time-consuming, and that sort of thing is exactly what we are trying to avoid
    through the process of automation.


    Setting up alerts that can notify an operator or kick off a job is a very helpful
    way to proactively let someone know about an error, or to take corrective action.
    When an alert is defined, SQL Server will monitor the error logs, looking for
    a match to a condition you have defined. When a match is found, SQL


    Server will perform the action you have set up in the alert.


    Alerts can be defined on a specific error number, a severity level, a performance
    condition, or a WMI event. To view existing alerts or generate a new one, open
    SSMS, connect to an instance, open Object Explorer, expand SQL Server Agent, and
    click on Alerts.


    Errors and Severity Levels


    The first type of alert is for a specific error number, or a severity level, as
    shown in Figure 10-8\. The general information required for setting up an alert
    is a name, a type, and a definition.


    ***Figure 10-8.** Setting up a SQL Server event alert*


    ![Image 120](index-255_1.png)


