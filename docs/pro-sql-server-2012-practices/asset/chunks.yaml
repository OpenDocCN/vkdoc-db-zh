    ''current database'';


    -- CASE sensitive string that specifies USE OF server broker IN CURRENT db


    GO


    -- Test if it works


    CREATE TABLE testEN (id INT);


    GO


    INSERT INTO testEN VALUES (1), (2);


    GO


    ALTER TABLE testEN ADD VALUE VARCHAR(20);


    GO


    DROP TABLE testEN;


    GO


