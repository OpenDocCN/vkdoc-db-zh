    2002 年以来，他一直积极使用 `.Net (C#)` 和 `SQL Server` 开发不同类型的应用程序，范围涵盖从业务线标准应用到图像处理应用。


    他毕业于卢布尔雅那大学电气工程学院，主修医学控制论。他是各种会议和用户组会议的常邀演讲者。他的博客地址是 [`http://weblogs.sqlteam.com/mladenp`](http://weblogs.sqlteam.com/mladenp)，并撰写过许多关于
    `SQL Server` 的文章。他非常热衷于优化缓慢的 `SQL` 语句、分析性能以及寻找解决棘手 `SQL Server` 问题的非常规方案。


    在业余时间，除其他事项外，他还在开发一款非常流行的 `SQL Server Management Studio` 插件，名为 `SSMS Tools Pack`。


    - **Herve Roggero**，`Windows Azure MVP`，是专注于云计算产品和服务的公司 `Blue Syntax Consulting`
    的创始人。Herve 的经验涵盖软件开发、架构、数据库管理和高级管理，曾服务于全球性公司和初创企业。Herve 持有多个认证，包括 `MCDBA`、`MCSE`
    和 `MCSD`。他还拥有印第安纳大学的工商管理硕士学位。


    Herve 是 *`PRO SQL Azure`*（Apress，2010）的合著者。更多信息，请访问 [`http://www.bluesyntax.net`](http://www.bluesyntax.net)。


    - **Chris Shaw** 于 1993 年开始了他的数据库职业生涯。最初在 `海军陆战队` 服役期间，他从事与 `Lotus` 相关的工作。离开海军陆战队后，Chris
    继续在数据库领域工作，服务于 `Wells Fargo`、`Pulte Mortgage` 和 `Yellow Pages Inc.` 等公司。后来，他为包括
    `Anthem Blue Shield` 和 `Admini Quest` 在内的保险公司提供咨询服务。15 多年来，Chris 一直在诸如 `SQL Connections`、`PASS`
    和 `SSWUG Ultimate` 等会议上撰写文章和进行关于 `SQL Server` 的演讲。Chris 在 2008 年担任 `SSWUG` 的会议总监。他在
    2009 年、2010 年和 2011 年获得了 `Microsoft MVP` 奖项，并于 2012 年 4 月刚刚获得了他的第四个 `MVP` 奖项。他是
    `科罗拉多斯普林斯 SQL Server 用户组` 的创始成员，目前是联合主席。Chris 在 `SSWUG` 网站上发表了许多特色文章，并且是 *`SQL
    Server 2005 Bible`*（Wiley，2006）和 *`SQL Server MVP Deep Dives, Volume 2`*（Manning
    Publications，2011）的供稿作者。博客、信息、问题、测验和访谈可以在 Chris 的博客站点 [`http://chrisshaw.wordpress.com`](http://chrisshaw.wordpress.com)
    找到。也可以通过 Twitter `@SQLShaw` 或电子邮件 `Chris@sqlshaw.com` 联系他。


    xvii


    ![Image 228](img/index-488_1.png)


    ![Image 229](img/index-488_2.png)


    ## 关于作者


    - **Gail Shaw** 是南非约翰内斯堡 `Xpertease` 公司的高级顾问。她专注于数据库性能调优和数据库恢复，特别关注索引策略、执行计划以及编写性能良好且能优雅扩展的
    `T-SQL` 代码等主题。


    Gail 是 `Microsoft Certified Master for SQL Server 2008` 和 `SQL Server MVP`。她是
    `SQL Server Central` 论坛的活跃发帖者，为 `SQLServerCentral` 和 `Simple-Talk` 撰写文章，并在 [`http://sqlinthewild.co.za`](http://sqlinthewild.co.za)
    上就所有与数据库性能相关的主题发表博客。她曾在 `TechEd Africa`、多次 `24 Hours of PASS` 网络活动以及多次 `PASS Community
    Summit` 上发表演讲。


    Gail 是一名 `合气道初段`（黑带一段）和热心的射箭爱好者。在繁忙的工作之余，她正在南非大学攻读计算机科学硕士学位。


    - **Jason Strate** 是 `Pragmatic Works` 的数据库架构师，拥有超过 15 年的经验。自 2009 年 7 月以来，他一直获得
    `Microsoft` 针对 `SQL Server` 的“最有价值专家”称号。他的经验包括设计和实现 `OLTP` 和 `OLAP` 解决方案，以及根据最佳实践、性能和高可用性解决方案评估和实施
    `SQL Server` 环境。


    Jason 是 `SQL Server` 社区的活跃成员。他目前担任 `North Central PASS` 地区的区域导师，帮助社区成员和分会相互联系。在社区中，他在本地、区域和国家级活动（包括
    `SQL Saturdays` 和 `PASS Summit`）上介绍 `SQL Server` 及相关主题。他还在 [`http://www.jasonstrate.com`](http://www.jasonstrate.com)
    和 [`http://www.sqlkaraoke.com`](http://www.sqlkaraoke.com) 上发表博客，可以通过 Twitter
    `@stratesql` 联系他。


    xviii


    ![Image 230](img/index-489_1.png)


    ## 关于技术审阅者


    - **Rudi Bruchez** 是一名常驻法国巴黎的独立顾问和培训师。他拥有 15 年 `SQL Server` 经验。他曾担任 `CNET Channel`（`CNET.com`
    的子公司）的 DBA，工作地点在日内瓦的 `MSC`（地中海航运公司）总部，以及巴黎的在线旅游公司 `Promovacances`。自 2006 年以来，他提供咨询、审计以及
    `SQL Server` 培训课程。随着 `SQL Server` 演变为更复杂的解决方案，他努力确保开发人员和管理员始终掌握关系数据库和 `SQL` 语言的基础知识。他是一本关于
    `SQL` 语言的畅销法语书籍的合著者，并于 2008 年出版了唯一一本关于 `SQL Server` 优化的法语书籍。可以通过 [`http://www.babaluga.com/`](http://www.babaluga.com/)
    联系他。


    - **Robin Dewson** 自从 1980 年购买了他的第一台电脑 `Sinclair ZX80` 以来，就一直对编程着迷。他自己的第一个主要应用程序是一个
    `Visual FoxPro` 程序，用于运行幻想体育联赛系统。此时，他在 `Step One Technologies` 遇到了对他 PC 开发生涯有巨大帮助的
    Jon Silver。作为培训的回报，他帮助 Jon 完成了一些其他的 `Visual FoxPro` 应用程序。意识到 `Visual FoxPro` 的市场有限后，他决定学习
    `Visual Basic` 和 `SQL Server`。


    从 `SQL Server 6.5` 开始，Robin 很快转向了 `SQL Server 7` 和 `Visual Basic 5`，并参与为英国和美国的客户开发了多个应用程序。从那时起，他经历了每个版本，直到
    `SQL Server 2012`。Robin 现在专注于 `C#` 和 `VB .NET`。可以通过 `robin@fat-belly.com` 或 [`http://www.fat-belly.com`](http://www.fat-belly.com)
    联系 Robin。


    '
- fmt: '## 关于作者


    - `David Dye` 是一名 Microsoft SQL Server MVP、讲师和作者，专注于关系数据库管理系统、商业智能系统、报告解决方案以及
    Microsoft SharePoint。在过去的九年里，David 的专长一直集中在 Microsoft SQL Server 的开发与管理上。他的工作使他于2009年和2010年荣获
    Microsoft MVP 称号。他曾是 Microsoft Developer Network (MSDN) for SQL Server 论坛的版主，并在2009年被《`SQL
    Server Magazine`》评为年度创新者亚军。他还曾于2011年4月入选 Training Associates 技术讲师聚焦人物。David 目前担任
    Apress 出版社 SQL Server 2012 系列的技术评审和合著者，并担任 Packt Publishing 的作者。


    ## 关于技术评审


    - `Edgar Lanting` 是一名来自荷兰的认证数据库专家，拥有超过18年的IT行业经验。他目前担任 Ciber 公司的数据库顾问，为多家公司在 Microsoft
    SQL Server 和 Oracle 软件上运行的数据库环境提供支持和管理服务。


    业余时间，他喜欢与妻子和狗一起远足和散步，是动物和自然摄影的狂热爱好者，并且在冬季来临时偶尔享受单板滑雪之旅。


    - `Ken Simmons` 是一名专注于 Microsoft SQL Server 的数据库管理员和开发人员。他是多个 SQL Server 网站和书籍的作者，包括《`Pro
    SQL Server 2008 Administration`》(Apress, 2009)、《`Pro SQL Server 2008 Mirroring`》(Apress,
    2009)、《`Pro SQL Server 2008 Policy-Based Management`》(Apress, 2010) 和《`Pro SQL
    Server 2012 Administration`》(Apress, 2012)。他目前持有 MCP、MCAD、MCDBA、SQL Server 2005
    的 MCTS 以及 SQL Server 2008 的 MCITP 认证。


    ## 致谢


    在2012年初的某个时候，我的朋友 Chris Shaw 无意中问我是否有兴趣写作。Chris 和我当时正在准备一个 SQL 活动的演讲。我原以为这个问题很简单。我已经在一些
    SQL Server 网站上发表过几篇文章，甚至刚刚完成了一个系列的三篇文章。然而，后来事情的发展远远超出了我的预期。


    当我还在为我的章节初稿而挣扎时，Allen Hirt 不遗余力地提供了帮助，他主动在早期阶段编辑了我的文档。作为一名资深作者，他的帮助非常大。我从他那里学到了很多。


    当其他作者也在撰写他们的章节时，他们中的一些人通过 Twitter 发布他们任务的推文，激励着我，提醒我完成自己的任务。特别感谢我的合著者 Gail、Mladen、Chris、Grant、Jes
    和 Jonathan，感谢他们的榜样作用和推动。


    多年来，我一直在努力向我的 #SQLFamily 英雄们学习，他们此前在书籍、文章、博客等方面做出了榜样。感谢 Steve、Tom、Grant、Tim 和
    Brad。感谢各个网站和其他资源的编辑们，他们一直鼓励我写作。感谢每一个发表了我文章并让我有机会实践这门技艺的网站。


    感谢每一位帮助我完善发布管理流程的同事、DBA、开发人员、项目经理等等，使我能够将所有的行动和经验教训付诸文字，描述一个我逐渐喜爱又感到有挑战的流程。


    感谢 Apress 的所有优秀工作人员，他们在创作本章节的过程中给予了我帮助。这是一次宝贵的经历，我感激他们的专业知识和协助。


    特别感谢一个人，他无意中通过推动我开始所有的课外活动而给予了我巨大的帮助。他恰在恰当的时候说了恰当的话，让我开始了这段旅程。我将永远感谢 Pat Wright
    将我推出了舒适区。


    –TJay Belt


    感谢 Jonathan Gennick 给了我另一个项目机会，就在我刚完成我的书《`Pro SQL`》之后。'
  raw: ' **David Dye** is a Microsoft SQL Server MVP, instructor, and author specializing
    in relational database management systems, business intelligence systems, reporting
    solutions, and Microsoft SharePoint. For the past nine years, David’s expertise
    has been focused on Microsoft SQL Server development and administration. His work
    earned him recognition as a Microsoft MVP in 2009 and 2010\. He has been a moderator
    for the Microsoft Developer Network for SQL Server forums and was the Innovator
    of the Year runner-up in 2009 by *SQL Server Magazine*. He was also featured in
    the Training Associates Technical Trainer Spotlight in April 2011\. David currently
    serves as a technical reviewer and co-author with Apress Publishing in the SQL
    Server 2012 series, and as an author with Packt Publishing.


    xix


    n ABOUT THE TECHNICAL REVIEWERS


     **Edgar Lanting** is a certified database specialist from the Netherlands with
    over 18 years of experience in IT. He is currently working as a database consultant
    for Ciber, where he assists various companies with the support and management
    of their database environments running on Microsoft SQL Server and Oracle software.


    In his spare time, he enjoys hikes and walks with his wife and dog, is a big animal
    and nature photography enthusiast, and enjoys an occasional snowboarding trip
    when wintertime has arrived.


     **Ken Simmons** is a database administrator and developer specializing in Microsoft
    SQL Server. He is an author for multiple SQL Server websites and books, including
    *Pro SQL Server 2008 Administration* (Apress, 2009), *Pro SQL Server 2008 Mirroring*
    (Apress, 2009), *Pro SQL Server 2008 Policy-Based Management* (Apress, 2010),
    and *Pro SQL Server 2012 Administration* (Apress, 2012). He currently holds certifications
    for MCP, MCAD, MCDBA, MCTS for SQL Server 2005, and MCITP for SQL Server 2008.


    xx


    **Acknowledgments**


    At some point early in 2012, my friend Chris Shaw innocuously asked me if I would
    be interested in writing. Chris and I were preparing for a presentation for a
    SQL event. I really thought that the question was simple. I had some articles
    at various SQL Server websites under my belt and had even just finished a series
    of three articles. It turned into much, much more.


    As I was struggling with my early versions of my chapter, Allen Hirt went above
    and beyond the call of duty, as he volunteered to edit my document in its early
    stages. As an established author, he was profoundly helpful. I learned so much
    from him.


    As other authors were working on their chapters, several of them spurred me on
    as they tweeted about their tasks via Twitter, reminding me of my own tasks. Special
    thanks go to my fellow authors Gail, Mladen, Chris, Grant, Jes, and Jonathan for
    their examples and pushes.


    For years, I have tried to be like my heroes in the #SQLFamily who have gone before
    me with writing books, articles, blogs, and more. Thanks to Steve, Tom, Grant,
    Tim, and Brad. Thanks to the editors of the various websites and other resources
    who kept telling me to write. Thanks to each website that has published an article
    of mine and allowed me to practice this craft.


    Thanks to each coworker, DBA, developer, project manager, and so on who helped
    me perfect this process of Release Management to the point that I could put all
    these actions and lessons to paper to describe a process I have grown to love
    and hate.


    Thanks to all the fine folks at Apress who helped me along the way of creating
    this chapter. It was an experience I appreciate, and I am grateful for their expertise
    and assistance.


    Super special thanks go out to the one person who had no idea how much he was
    helping me by kick-starting all my extracurricular activities. He happened to
    say the right thing at the right time that got me going. I will forever be grateful
    to Pat Wright for pushing me out of my comfort zone.


    –TJay Belt


    Thanks to Jonathan Gennick for giving me yet another project to do right after
    I finished my book *Pro SQL*'
