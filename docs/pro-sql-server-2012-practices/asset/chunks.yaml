    that has been developed and fine-tuned since the 1970s.


    In addition to relational database technology, you also have other options for
    storing data. An Analysis Services cube and Tabular models are great for reporting,
    ad-hoc analysis, dashboards, and other metrics-based visualization. You can also
    partition data, use file tables, scale out with Service Broker, and more, making
    every data architecture uniquely its own. These techniques provide you with a
    multitude of choices, with the arrival of Big Data being one more weapon in your
    arsenal.


    Big Data is nonrelational, yet the relational data model has proven itself to
    be very useful for more than 30 years. It’s easy for technologists to understand,
    and if you understand the model, it’s a good bet that you understand the application.
    It describes the entities in the database in a very familiar way; as we talk about
    the entities, we also describe the real world. A customer *has an* address. A
    store *contains* products. A supervisor *is an* employee. Developers can easily
    interpret its visual representation, and then use that as a guide for how to handle
    data within an application. For example, you can scan a data model diagram and
    immediately get a great understanding of the data. You could even post this diagram
    on a wall for reference and discussion.'
