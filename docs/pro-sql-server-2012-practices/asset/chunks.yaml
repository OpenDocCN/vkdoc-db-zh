    SCHEMA_OBJECT_PERMISSION_CHANGE_GROUP


    DATABASE_PRINCIPAL_IMPERSIONATION_GROUP


    n **Note** A full list of SQL Server audit action groups and actions can be found
    here: http://technet.


    microsoft.com/en-us/library/cc280663.aspx.


    The main focus of SOX is accuracy of reporting and the ability to audit how and
    when data is entered or changed. Auditing these events is done through the database
    audit actions and is covered later in this chapter. The actions that need to be
    audited are UPDATE, INSERT, and DELETE. These audits are specific to database
    schema or objects, and they need to be planned out for any SOX-regulated database.


    Health Insurance Portability and Accountability Act


    The Health Insurance Portability and Accountability Act of 1996 (HIPAA) is a United
    States law designed to streamline and standardize the way electronic healthcare
    transactions are conducted. With this standardization taking place around the
    use of electronic health records, the security and privacy of the data was a concern.
    The law attempted to address this issue through the Privacy Rule.


    The Privacy Rule is used to regulate how Protected Health Information (PHI) is
    used or disclosed. Not all health information is classified as PHI, but the definition
    is held to be any part of a medical record or payment history. A database professional
    might be in charge of hundreds of databases, but it’s possible that only one database
    or server in that group is subject to HIPAA.


    The Department of Health and Human Services (HHS) is responsible for enforcement
    of HIPAA. Just like the agencies overseeing SOX, HHS has outlined that an entity
    must mitigate the accidental or illegal exposure of health information but has
    not given guidelines on how to do it.


    The differences between HIPAA and SOX can be seen in the intent of the laws. SOX
    is intended to ensure the accuracy of financial data. This means that database
    professionals need to audit who the data has been accessed by. HIPAA is concerned
    with keeping health information private. This means that database professionals
    need to audit who the data has been accessed by.


    Table 9-2 shows the areas that should be audited on SQL Server instances containing
    HIPAA data.


    chapter 9 ■ compliance and auditing


    ***Table 9-2.** Areas of attention for servers containing data regulated by HIPPA*
    **Area**


    **Audit Group**


    Logons and Security


    SUCCESSFUL_LOGIN_GROUP


    Changes


    FAILED_LOGIN_GROUP


    LOGOUT_GROUP


    LOGIN_CHANGE_PASSWORD_GROUP


    Role Changes


    SERVER_ROLE_MEMBER_CHANGE_GROUP


    Access to Databases


    APPLICATION_ROLE_CHANGE_PASSWORD_GROUP


    DATABASE_CHANGE_GROUP


    DATABASE_OBJECT_ACCESS_GROUP


    DATABASE_OBJECT_CHANGE_GROUP


    DATABASE_OBJECT_OWNERSHIP_CHANGE_GROUP


    DATABASE_OWNERSHIP_CHANGE_GROUP


    DATABASE_PERMISSION_CHANGE_GROUP


    DATABASE_PRINCIPAL_CHANGE_GROUP


    DATABASE_PRINCIPAL_IMPERSONATION_GROUP


    DATABASE_ROLE_MEMBER_CHANGE_GROUP


    Ensure Auditing


    AUDIT_CHANGE_GROUP


    Changes to the Server or


    SERVER_OBJECT_CHANGE_GROUP


    Access to the Server


    SERVER_OBJECT_PERMISSION_CHANGE_GROUP


    SERVER_OBJECT_OWNERSHIP_CHANGE_GROUP


    SERVER_PERMISSION_CHANGE_GROUP


    SERVER_PRINCIPAL_CHANGE_GROUP


    SERVER_PRINCIPAL_IMPERSONATION_GROUP


    SERVER_STATE_CHANGE_GROUP


    DBCC_GROUP


    Server Operations


    SERVER_OPERATION_GROUP


    SERVER_STATE_CHANGE_GROUP


    BACKUP_RESTORE_GROUP


    With the focus of HIPAA on controlling access to data, database-level audit actions
    need to be created.


    The SELECT action should be audited on database schema or objects that have access
    to PHI. Because these database-level audit actions are specific for each database,
    they need to be planned out for each database containing PHI.


    While both SOX and HIPAA are laws governing companies in the United States, other
    countries have similar standards, such as Canada’s Bill 198, Japan’s J-SOX, or
    Germany’s Corporate Governance Code.


    Global industry-specific standards like the Payment Card Industries Data Security
    Standard exist as well.


    These standards will dictate what needs to be audited to meet the law’s compliance
    requirements.


    New Auditing Features in SQL Server 2012


    With the release of SQL Server 2012, Microsoft has made improvements and additions
    to its Auditing feature, including adding or improving audit filtering and user-defined
    auditing, and bringing some auditing features to the Standard edition. These features
    will be coved in detail in the following sections.


    chapter 9 ■ compliance and auditing


    Server-Level Auditing for the Standard Edition


    When SQL Server Auditing was introduced in SQL Server 2008, it was an Enterprise-only
    feature. While fully granular auditing remains an Enterprise-only feature in SQL
    Server 2012, server-level auditing is available in the Standard edition. This
    allows companies running SQL Server Standard to audit server access, database
    backups, and restored, security-related events.


    Audit Log Failure Options


    To ensure compliance requirements are met, some companies might mandate that information
    be audited. A new feature of auditing in SQL Server 2012 allows database professionals
    to define what the server should do if it cannot log events. This is defined in
    the server option ON_FAILURE in the Server Audit. Three options are available.
    The server can be shut down, the single operation can be failed, or the server
    can be allowed to continue operating.


    The ON_FAILURE and QUEUE_DELAY options can be set both in SQL Server Management
    Studio and through T-SQL. These options syntax will be covered later in this chapter.


    Maximum Rollover Files


    Auditing can generate a large volume of data, so the ability to set the maximum
    file size and the maximum number of rollover files allows an organization to control
    the amount of space auditing will consume.


    These controls are specified through the MAXSIZE and MAX_ROLLOVER_FILES options.
    The MAXSIZE option defines the maximum file size for each audit log file. The
    MAXSIZE option can be set in megabytes (MB), gigabytes (GB), or terabytes (TB).
    The MAX_ROLLOVER_FILES option defines the size for the audit file. Once the MAX_ROLLOVER_FILES
    limit is reached, the oldest additional file over that size will be deleted and
    the server will continue to run.


    In SQL Server 2008, there were options to roll over the log files after they reached
    a defined size or have an infinite number of log files. SQL Server 2012 allows
    for the log files to be rolled over and for a limit to be placed on the number
    of log files. The MAXSIZE and MAX_ROLLOVER_FILES options can be set both in SQL
    Server Management Studio and through T-SQL. Examples of both options will be shown
    later in this chapter.


    User-Defined Auditing


    SQL Server 2012 now allows database professionals to write applications that send
    information to the Audit Log. This gives database administrators the flexibility
    to log custom application information for auditing along with standard SQL Server
    audit information. Examples of using the User-Defined Auditing feature will be
    covered later in this chapter.


