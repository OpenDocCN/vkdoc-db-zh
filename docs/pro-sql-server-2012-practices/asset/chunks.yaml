- fmt: '# Chapter 11: The Fluid Dynamics of SQL Server Data Movement


    ## Log Shipping


    A log-shipping solution involves taking transaction log backups of a primary database,
    copying them, and applying them to a secondary database located on another server.
    The `SQL Server Agent` services on the primary and secondary servers manage the
    process flow of backups, file copy, and restore. There is a mandatory delay between
    when the backup is taken on the primary and when it is then applied to the secondary.
    At a minimum, this delay is the time it takes for the backup operation to complete
    and the file copy to occur before the restore operation begins. The delay prior
    to a restore can be configured for specific time intervals—for example, 15 minutes,
    2 hours, and so forth.


    ![Image 137](index-286_1.png)

    **Figure 11-3.** Log shipping.


    There are several benefits to implementing log shipping. First, you can copy the
    logs to multiple destinations, much like having multiple subscribers in replication.
    Second, the `secondary database` or databases can be used for read-only activity
    when the logs are not being actively applied. Finally, the delay in applying the
    transaction log backups on the `secondary database` can allow for data recovery
    in the event of a mass data update or a delete applied accidentally. An optional
    monitor instance can be used to detect any failures in the log backup/delivery/restore
    process and send out a notification of the need for a failover.


    `Log shipping` is most often used for disaster-recovery scenarios, because the
    built-in latency is often not desired for other data-replication needs.


    Benefits from `log shipping` include the following:


    - Multiple secondaries are allowed.

    - Limited, read-only use of `secondary databases` is allowed.

    - The entire database is sent to the other instance.


    The limitations include the following:


    - A database cannot be used while log files are being restored.

    - Failover to a `secondary database` is a manual process.

    - There is no support for partitioning or filtering data.


    ## Scenario Analysis


    Following are examples of how replication can be applied to the four scenarios:


    ### Scenario 1: Global Organization


    `Log shipping` will not help distribute the data across the globe for daily use.
    Because the database will be repeatedly taken offline to apply log backups, even
    having a read-only copy in each of the major cities would not be of any benefit.
    However, if you need read-only activity during an upgrade or outage window, you
    might want to set up `log shipping` and perform a role change for your applications
    to the `secondary database` while performing maintenance. This is not a perfect
    solution, but it could provide some uptime for users globally.


    ### Scenario 2: High-Volume Reporting Needs


    `Log shipping` might be useful here. There would need to be a more sizable delay
    in applying the log backups to the `secondary database`, however. For example,
    if a secondary is set up to apply logs only once or twice per day (perhaps at
    7 a.m. and 7 p.m.), the times when users are accessing the data will not be interrupted.
    Data will be up to 12 hours old, depending on when it is accessed.


    ### Scenario 3: Overnight Processing Jobs


    `Log shipping` is not a viable option for distributing the load because of the
    high-volume tasks.


    ### Scenario 4: Hardware Failure


    In the event of a hardware failure, `log shipping` can be useful but should not
    be seen as a permanent solution. The primary should be repaired or rebuilt as
    needed. While this is in process, the `secondary database` can be brought online
    and fully recovered. At this point, it will no longer be secondary. The application
    using the database needs to be configured to access the new database source. Once
    the primary database is ready to be'
