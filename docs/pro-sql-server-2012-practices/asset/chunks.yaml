  trans: "\n## XML 数据规范化与非规范化查询示例\n\n-- 事件 1 只有一个数据节点，因此当查找索引 2 处的值时，`query().value()`\
    \ 返回 null。\n-- 这可视为 XML 的非规范化。\n\n```sql\nSELECT Tbl.cols.query('./data') as DataXML\n\
    , Tbl.cols.query('./data').value('(data/@name)[1]', 'nvarchar(100)') as Data1Name\n\
    , Tbl.cols.query('./data').value('(data/@name)[2]', 'nvarchar(100)') as Data2Name\n\
    , Tbl.cols.query('./data/type').value('(type/@name)[1]', 'nvarchar(100)') as Type1Name\n\
    , Tbl.cols.query('./data/type').value('(type/@name)[2]', 'nvarchar(100)') as Type2Name\n\
    , Tbl.cols.query('./data/value').value('(value)[1]', 'int') as Value1\n, Tbl.cols.query('./data/value').value('(value)[2]',\
    \ 'int') as Value2\n, Tbl.cols.query('./data/text').value('(text)[1]', 'nvarchar(100)')\
    \ as Text1\n, Tbl.cols.query('./data/text').value('(text)[2]', 'nvarchar(100)')\
    \ as Text2\nFROM TextXML X\n-- 这表示获取所有事件节点\nCROSS APPLY X.XmlColumn.nodes('/root/event')\
    \ Tbl(cols);\nGO\n```\n\n-- 从 XML 中获取 3 行，每个数据节点一行。\n-- 第一个事件有一个数据节点，第二个事件有两个数据节点。\n\
    -- 我们获取数据节点的属性及其子节点的值。\n-- 这里没有 null 值，因为我们选择了所有存在的值。\n-- 如果上面是 XML 的非规范化，那么这就是\
    \ XML 值的规范化。\n\n```sql\nSELECT Tbl.cols.query('.') as DataXML\n, Tbl.cols.query('.').value('(data/@name)[1]',\
    \ 'nvarchar(100)') as DataName\n, Tbl.cols.query('./type').value('(type/@name)[1]',\
    \ 'nvarchar(100)') as TypeName\n, Tbl.cols.query('./value').value('(value)[1]',\
    \ 'int') as Value\n, Tbl.cols.query('./text').value('(text)[1]', 'nvarchar(100)')\
    \ as [Text]\nFROM TextXML X\n-- 这表示获取所有事件节点下的所有数据节点\nCROSS APPLY X.XmlColumn.nodes('/root/event/data')\
    \ Tbl(cols);\n```\n\n## 使用扩展事件 (Extended Events) 进行跟踪\n\n既然我们已经知道如何使用 XML 来解析事件数据，现在来看一个具体的例子。\n\
    我们将使用环形缓冲区目标来跟踪所有执行时间超过 500 毫秒的语句。\n\n```sql\nUSE master;\nGO\n\n-- 第 5 章 ■ 从\
    \ SQL 跟踪到扩展事件\n\nIF EXISTS(SELECT * FROM sys.server_event_sessions WHERE name\
    \ = 'RingBufferExampleSession')\nDROP EVENT SESSION RingBufferExampleSession ON\
    \ SERVER;\n\nCREATE EVENT SESSION RingBufferExampleSession\nON SERVER\nADD EVENT\
    \ sqlserver.sql_statement_completed\n(\n    ACTION (sqlserver.session_id, sqlserver.username)\n\
    \    WHERE sqlserver.sql_statement_completed.duration > 500000\n    -- duration\
    \ 的单位是微秒\n)\nADD TARGET package0.ring_buffer\n(SET max_memory = 4096)\nWITH (max_dispatch_latency\
    \ = 1 seconds);\n\nALTER EVENT SESSION RingBufferExampleSession ON SERVER STATE=START;\n\
    GO\n```\n\n-- 这个查询执行时间超过半秒\n\n```sql\nSELECT TOP 100000 *\nFROM master..spt_values\
    \ t1\nCROSS JOIN master..spt_values t2;\nGO\n```\n\n```sql\nSELECT -- 这些是部分事件列\n\
    \    Cols.value('(data[@name=\"duration\"]/value)[1]','BIGINT')/1000.0 as duration_in_ms,\n\
    \    Cols.value('(data[@name=\"cpu_time\"]/value)[1]','BIGINT')/1000.0 as cpu_time_in_ms,\n\
    \    Cols.value('(data[@name=\"logical_reads\"]/value)[1]','BIGINT') as logical_reads,\n\
    \    Cols.value('(data[@name=\"row_count\"]/value)[1]','BIGINT') as row_count,\n\
    \    Cols.value('(data[@name=\"statement\"]/value)[1]','NVARCHAR(MAX)') as sql_statement,\n\
    \    -- 这些是我们为事件指定的操作 (actions)\n    Cols.value('(action[@name=\"username\"]/value)[1]','NVARCHAR(MAX)')\
    \ as username,\n    Cols.value('(action[@name=\"session_id\"]/value)[1]','SMALLINT')\
    \ as session_id\nFROM (\n    SELECT CAST(t.target_data AS XML) AS RingBufferInfo\n\
    \    FROM sys.dm_xe_session_targets t\n    JOIN sys.dm_xe_sessions s ON s.address\
    \ = t.event_session_address\n    WHERE t.target_name = 'ring_buffer' AND s.name\
    \ = 'RingBufferExampleSession'\n) RB\nCROSS APPLY RingBufferInfo.nodes('/RingBufferTarget/event')\
    \ AS Tbl(Cols);\nGO\n\nALTER EVENT SESSION RingBufferExampleSession ON SERVER\
    \ STATE=STOP;\n```\n\n## 内置健康会话 (Built-in Health Session)\n\n类似于 SQL Server 2005\
    \ 中的默认跟踪，扩展事件提供了一个始终运行的会话，名为 `health_session`。该会话包含一系列事件和操作的组合，可帮助我们对各种问题进行故障排除。\n\
    \n-- 第 5 章 ■ 从 SQL 跟踪到扩展事件\n"
- fmt: "# 问题与扩展事件健康监视\n\n在SQL Server 2008之前，像死锁这类问题没有内置的自动检测系统。`health_session`追踪以下信息：\n\
    \n- 任何严重级别 `>=20` 的错误对应的`sql_text`、`session_id`。\n- 任何遇到内存错误的会话对应的`sql_text`、`session_id`（并非所有内存错误的严重级别都\
    \ `>=20`）。\n- 任何“非产出调度器”问题的记录。\n- 所有死锁。\n- 在闩锁（或其他有趣资源）上等待超过15秒的会话的`Callstack`、`sql_text`、`session_id`。\n\
    - 在锁上等待超过30秒的会话的`Callstack`、`sql_text`、`session_id`。\n- 在“外部等待”或“抢占式等待”上等待5秒的会话的`Callstack`、`sql_text`、`session_id`。\n\
    \n在 SQL Server 2008 中，`health_session`的唯一目标是环形缓冲区（Ring Buffer），但在 SQL Server 2012\
    \ 中，目标同时包括环形缓冲区和事件文件。由于我们之前已经展示了如何从环形缓冲区目标读取，以下代码示例将演示如何从事件文件读取。\n\n```sql\n--\
    \ 只获取XML报告中的几个列以展示XML数据检索的原理\n-- 通过查看XmlDeadlockReport列可以看到完整的XML死锁报告\nSELECT\
    \ Col.query('.') as XmlDeadlockReport,\n       Col.query('.').value('(/event/@timestamp)[1]',\
    \ 'datetime') as EventTime,\n       Col.query('.').value('(/event/data/value/deadlock/victim-list/victimProcess/@id)[1]',\
    \ 'NVARCHAR(100)') as VictimProcess,\n       Col.query('.').value('(/event/data/value/deadlock/process-list/process/@id)[1]',\
    \ 'NVARCHAR(100)') as Process1_id,\n       Col.query('.').value('(/event/data/value/deadlock/process-list/process/@id)[2]',\
    \ 'NVARCHAR(100)') as Process2_id,\n       Col.query('.').value('(/event/data/value/deadlock/process-list/process/@spid)[1]',\
    \ 'NVARCHAR(100)') as Process1_spid,\n       Col.query('.').value('(/event/data/value/deadlock/process-list/process/@spid)[2]',\
    \ 'NVARCHAR(100)') as Process2_spid,\n       Col.query('.').value('(/event/data/value/deadlock/process-list/process/@isolationlevel)[1]',\
    \ 'NVARCHAR(100)') as Process1_isolationlevel,\n       Col.query('.').value('(/event/data/value/deadlock/process-list/process/@isolationlevel)[2]',\
    \ 'NVARCHAR(100)') as Process2_isolationlevel,\n       Col.query('.').value('(/event/data/value/deadlock/resource-list/ridlock/@objectname)[1]',\
    \ 'NVARCHAR(100)') as Resource1_objectName,\n       Col.query('.').value('(/event/data/value/deadlock/resource-list/ridlock/@objectname)[2]',\
