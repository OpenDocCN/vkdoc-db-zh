    ...

    CountryName varchar(30)

    ...

    );

    ```


    这个表将允许用户为国家输入任何内容。与其让用户输入十五种不同拼写的“United States”，不如添加一个表来实现国家域，如下所示，强制用户始终输入（或选择）一个实际正确拼写的值。


    ```

    CREATE TABLE Country

    (

    CountryName varchar(30) NOT NULL PRIMARY KEY

    );

    ```


