    # 第 17 章 ■ SQL Server DBA 的大数据


    产生了四个新文件，每个对应一个 MapReduce 任务。每个文件的行数不同，因为 Sqoop 并不在这四个 MapReduce 任务间均衡负载，而是通过获取主键的最小值和最大值，算术地将其划分为四组来分配工作。这样，在
    2012-07-19 发生变更的每一行最终都会落入这四个文件中的一个，并且只落入一个。同时请注意，每个文件只包含你在 Sqoop 作业中请求的四列。


    为了表明完成任务的方法不止一种，以下脚本可以获得相同的结果。这项技术的有趣之处在于，你可以使用 Sqoop 编写 SQL 查询。请注意 `where` 子句中
    `$CONDITIONS` 标记的使用。Sqoop 会用一个唯一的条件表达式替换这个标记，以便作业可以并行运行，每个任务获取不同的数据范围。


    ```sql

    sqoop import --connect "jdbc:sqlserver://myserver.domain.com; username=mysqluser;
    password=mypwd; database=AdventureWorks" --query "SELECT ProductID,ProductNumber,ListPrice,ModifiedDate
    FROM Production.Product where $CONDITIONS and ModifiedDate between ''2012-07-19''
    and ''2012-07-20''" --target-dir /data/ProductTable -m 4 --split-by ProductID
    -append

    ```


    这个 Sqoop 作业在 SQL Server 中执行了多个查询。其中一个查询获取 `ProductID` 的最小值和最大值。Sqoop 使用此查询的结果将
    `ProductID` 划分为四个相等的部分，从而可以并行执行四个独立的查询，每个查询访问表中不同的行集合（但行数不一定相等）。


    ```sql

    SELECT MIN(ProductID), MAX(ProductID) FROM

    (SELECT ProductID,ProductNumber,ListPrice,ModifiedDate FROM Production.Product
    where (1 = 1) and ModifiedDate between ''2012-07-19'' and ''2012-07-20'') AS t1

    ```


    然后，Sqoop 在 SQL Server 中执行以下四个查询。`$CONDITIONS` 表达式在每个查询中被 `ProductID between MIN
    and MAX` 的子句替换。请注意，每个查询的 `MIN` 和 `MAX` 值是由前一个查询的计算结果确定的，该计算将正在读取的数据分成四部分。


    ```sql

    SELECT ProductID,ProductNumber,ListPrice,ModifiedDate FROM Production.Product
    where ( ProductID >= 1 ) AND ( ProductID < 251 ) and ModifiedDate between ''2012-07-19''
    and ''2012-07-20''

    ```


    ```sql

    SELECT ProductID,ProductNumber,ListPrice,ModifiedDate FROM Production.Product
    where ( ProductID >= 251 ) AND ( ProductID < 501 ) and ModifiedDate between ''2012-07-19''
    and ''2012-07-20''

    ```


    ```sql

    SELECT ProductID,ProductNumber,ListPrice,ModifiedDate FROM Production.Product
    where ( ProductID >= 501 ) AND ( ProductID < 750 ) and ModifiedDate between ''2012-07-19''
    and ''2012-07-20''

    ```


    ```sql

    SELECT ProductID,ProductNumber,ListPrice,ModifiedDate FROM Production.Product
    where ( ProductID >= 750 ) AND ( ProductID <= 999 ) and ModifiedDate between ''2012-07-19''
    and ''2012-07-20''

    ```


    结果与你之前执行的 Sqoop 作业没有不同，数据再次被分割成四个文件。


    如前所述，表 17-4 显示了我们使用过的 Sqoop 参数及其说明列表。要查看 Sqoop 参数的完整列表，请访问 http://sqoop.apache.org/。你完成了一些出色的工作，但当你向市场人员展示时，发现需求已经改变。他们实际上想要产品每次变更的完整审计跟踪。你使用
    Sqoop 开发的数据加载脚本获取的是查询中使用日期范围内产品的最新版本。如果你每天运行一次脚本，并在每次运行时更改日期范围，你将获得当天发生变更的每个产品的最新行。你会丢失中间的所有信息，因此，如果一个产品在你作业运行之间变更了五次，你将丢失变更细节。你想要捕获产品的所有变更，这样，当价格在五分钟内降低了
    50% 时，你也会知道，因为你将捕获到这次变更。


    此外，你的动态定价系统已经变得疯狂。它现在每天对产品价格进行 20 次更改，并且由于你有 50 万种活跃产品，这意味着你每天将在 HDFS 中捕获 1000
    万行数据。


    幸好你已准备好 Hadoop，因为现在你真的在处理一些大数据了！对于未来，市场部门已经表示，他们希望看到的不仅仅是价格变化。他们还希望知道每次产品变更时的库存水平、成本和其他重要数据。


    让我们看看如何更好地利用 SQL Server 来完成这项工作。SQL Server 可以通过变更数据捕获识别对 `Product` 表的每次更改。CDC
    将存储每次插入的镜像、每次更新的变更前后镜像，以及每次删除的变更前镜像。要为 `AdventureWorks` 数据库和 `Product` 表启用 CDC，请执行以下操作：


    ```sql

    Use AdventureWorks

    Go

    exec sp_cdc_enable_db

    Go

    exec sp_cdc_enable_table @source_schema=''Production'', @source_name=''Product'',
    @capture_instance

    Go

    ```


    接下来，更改一些数据，以便在 CDC 表中拥有数据。为此，对 `AdventureWorks` 数据库执行以下 T-SQL 命令。这些插入、更新和删除操作将生成变更行，存储在
    `cdc.dbo_Product_CT` 表中。


    ```sql

    INSERT INTO Production.Product(Name, ProductNumber, MakeFlag, FinishedGoodsFlag,
    SafetyStockLevel, ReorderPoint, StandardCost, ListPrice, DaysToManufacture, SellStartDate)
    VALUES (''29 Inch Wheel'',''WH-8232'',0,0,125,80,85.9500,126.9500,1,''2012-08-01
    00:00:00'')

    ```


    ```sql

    INSERT INTO Production.Product(Name, ProductNumber, MakeFlag, FinishedGoodsFlag,
    SafetyStockLevel, ReorderPoint, StandardCost, ListPrice, DaysToManufacture, SellStartDate)
    VALUES (''MH Hybrid'',''HY-2452'',0,0,210,100,865.0000,1295.0000,1,''2012-08-15
    00:00:00'')

    ```


    ```sql

    UPDATE Production.Product SET StandardCost = 1799.00 where ProductID = 776

    ```


    ```sql

    UPDATE Production.Product SET ListPrice = 2195.99 where ProductID = 771

    ```


    ```sql

    UPDATE Production.Product SET ReorderPoint = 400 where ProductID = 936

    ```


    ```sql

    UPDATE Production.Product SET SafetyStockLevel = 120 where ProductID = 961

    ```


    ```sql

    DELETE FROM Production.Product where ProductID = 712

    ```


    回到 Sqoop 并运行以下脚本。它将从 CDC 表中读取数据并放入 HDFS，这次在 CDC 的帮助下捕获了对 `Product` 表所做的每一次更改。确保你输入了执行更改的正确开始和结束日期，以便导入实际检索到数据。


    ```sql

    sqoop import --connect "jdbc:sqlserver://myserver.domain.com;username=mysqluser;
    password=mypwd;database=AdventureWorks" --query "SELECT * FROM cdc.Production_Product_CT
    where $CONDITIONS and ModifiedDate between ''2004-03-11 08:00:00'' and ''2004-03-11
    09:00:00''" --target-dir /data/ProductAudit -m 1

    ```


    ## 从 HDFS 导出


    你已成功将 `Product` 表的每次更改都放入 HDFS，但接下来你该怎么做？


    很高兴你问这个问题，接下来我们将开发两种不同的处理方法。一种方法是导出数据的子集并将其放回 SQL Server。这样做的好处是，你的应用程序、开发人员和分析师可以使用他们习惯的方式，特别是利用他们熟悉的工具（如
    T-SQL）来使用它。另一种使用数据的方法是直接在 HDFS 中查询和分析它。我将展示前一种技术，并再次使用 Sqoop 将其从 HDFS 导出到 SQL
    Server。要将其放入 SQL Server，我需要一个目标数据库和表。后一种技术将使用 Hive 直接在 HDFS 中处理数据。

    '
- fmt: 'Now that you''ve collected billion and trillions of rows, and are able to
    track changes to your products, the time has come for you to use the audit trail.
    Your financial team wants to know how a certain product was priced throughout
    the year and the exact amount of time any price was in effect. You can extract
    that data from `HDFS` and put it in a familiar `SQL Server` table by using `Sqoop`.


    The financial people aren''t asking you to retrieve every single piece of data
    about the product for this report and they say that all that will be needed is
    `ProductName`, `ProductNumber`, `ListPrice`, and `ModifiedDate`.


    However, since you also imported `ProductID` and `ProductNumber` into `HDFS`,
    then you also have to export it, because `Sqoop` doesn''t allow you to export
    select columns, and it doesn''t give you a chance to filter the data you export.
    As you can see, it''s all or nothing, so you need to create a table in `SQL Server`
    to hold all of the data in `HDFS`.


    ```

    CREATE TABLE dbo.Product_Changes(


    ProductID int NULL,


    Name nvarchar(50) NULL,


    ProductNumber nvarchar(25) NULL,


    ListPrice money NULL,


    ModifiedDate datetime NULL


    )

    ```


    After you create this table, you are ready to go back to the command line and
    execute the following job from the `c:\Apps\dist\sqoop\bin` directory:


    ```

    sqoop export --connect


    "jdbc:sqlserver://myserver.domain.com;username=mysqluser;password=mypwd;database=AdventureWorks"


    --table [Product_Changes] --export-dir /data/ProductAudit –m 4

    ```


    After this job successfully executes, you now have the product data in a familiar
    place, `SQL Server`, and can do whatever you want with it. This puts you (and
    your users) in a comfortable situation, and you can use familiar and powerful
    tools like `Excel`, `SSRS`, and `PowerView` to analyze the data and create reports.


    There are good reasons for moving data from `Hadoop` into `SQL Server`, including
    joining `Hadoop` data to existing `SQL Server` entities in star schemas, cubes,
    and other reporting structures. The location of data storage is a decision `DBAs`
    will have to make, but in organizations where analysis is already happening in
    a `SQL Server` environment, it will be a normal practice to move some data from
    `Hadoop` to `SQL Server`. This doesn''t mean that you will move every petabyte
    of data from `Hadoop` to `SQL Server`, but if were to happen, it would be in a
    filtered and/or aggregated manner.


    Take note, however, that this is just one use-case of many, and that bringing
    data back into `SQL Server` is not necessary to use visualization tools such as
    `Excel`. You''ll see in the next section how you can directly access data stored
    in `HDFS` using `Excel`, and how `Hadoop` provides you with a tool like `Hive`
    that lets you do this.


    ## Hive


    What if you don''t want to put the data in `SQL Server`? Can you use it where
    it resides? Yes you can, and `Hive` is a tool you can use to work with it in `HDFS`.
    `Hive` provides you with `HiveQL`, a SQL-like language that you can use to query
    data in `HDFS`. Apache states that `Hive` is a data warehouse system for `Hadoop`
    that facilitates easy data summarization, ad-hoc queries, and the analysis of
    large datasets stored in `Hadoop`-compatible file systems. `Hive` provides a mechanism
    to project structure onto this data and query the data using a SQL-like language
    called `HiveQL`.


    ## chapter 17 ■ Big Data for the SQL Server DBa


    `Caution` For people experienced with `SQL Server` and data warehousing, take
    the statement that `Hive` is a data warehouse system loosely. It doesn''t use
    a recognized data warehouse model or any data structures that you might be familiar
    with in data warehousing, but it is useful as a SQL-like query language on top
    of `HDFS`.


    You''ll need to have some data in `HDFS`, so if you haven''t done this yet or
    have wiped out previous data load we''ve worked with, use `Sqoop` to populate
    `HDFS` so you have something to work with.


    ```

    sqoop import --connect "jdbc:sqlserver://myserver.database.windows.net;


    username=mysqluser@myserver; password=mypwd; database=AdventureWorks2012"


    -table Production.Product --where "ModifiedDate between ''2012-07-19'' and ''2012-07-20''"

    ```'
