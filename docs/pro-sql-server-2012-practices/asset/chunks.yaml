- fmt: '# CHAPTER 18 ■ Tuning for Peak Load


    ## Overview


    [memory-does-my-SQL-Server-actually-need.aspx.](http://sqlskills.com/blogs/jonathan/post/How-much-memory-does-my-SQL-Server-actually-need.aspx)


    ## Server Configuration


    *   **Min server memory (MB)**: What is the value set to? If there are multiple
    instances, set this value to a minimum amount of memory that a particular instance
    requires.

    *   **Optimize for ad hoc workloads**

    *   **Authentication**: Is SQL Server setup to use mixed or Windows Authentication?

    *   **Features installed**: Database Engine, Analysis Services, Reporting Services,
    Integration Services, Filestream.


    ## Cluster Configuration


    *   **Cluster or standalone**: Review the cluster configuration, and ensure the
    failover process has been tested.

    *   **Port number**: Is the default value being used?


    ## Database Properties


    Here are the key properties to review:


    *   **Auto Close and Auto Shrink** (`FALSE`)

    *   **Auto Create and Auto Update Statistics** (`TRUE`)

    *   **Compatibility Level**: Validate that this property is set to the highest
    level.

    *   **Page Verify**: Set this property to `CHECKSUM`.

    *   **Parameterization** (`FALSE`)

    *   **Transparent Data Encryption (TDE)**: Is this property enabled?

    *   **Recovery model**: Ensure this property is set to allow the recovery point
    objective (RPO) to be met.


    ## Database File Properties


    Here are the key properties to review:


    *   **File location**: For the highly transactional databases, do the files reside
    on the fastest disk?

    *   **File size**: How large is the file, and how much free space exists?

    *   **Number of files per database**: How many files exist? How much free space
    is there in each?

    *   Are there multiple transaction log files? You need only one.

    *   What is the growth method and size for each file? Set these properties to
    a specific size, such as 512 MB. If the transaction log had an autogrow event,
    the average time on a typical disk subsystem would take about two to five seconds
    to grow the file.


    ## Number of Virtual Log Files (VLF) per Database


    How many VLFs exist for each database? Are there more than 100? If so, you will
    want reduce the number of VLFs and better manage the transaction-log growth events.


    ## Nontrusted Constraints per Database


    Foreign keys in a nontrusted state can trigger extra scans. Switch the constraints
    to a trusted state.


    ## Job List – Inventory and Schedule


    What is scheduled on the server? When do the processes run and for how long? Most
    people, including me, schedule processes to occur on the hour, half hour, or quarter
    hour, such as at:15 and :30 after the hour. Stagger the jobs, and minimize the
    overlapping schedules.


    ## Database Maintenance Processes


    What maintenance is being performed on the server? Is it being done the most efficient
    way? Are only the fragmented indexes being rebuilt? When was the last `CHECKDB`
    run?


    ## Most Recent Error Logs


    What errors are occurring in SQL Server? Are there deadlocks or severe errors?


    ## The Assessment and Change Process


    Depending on the SQL Server configuration and when the last time an assessment
    was performed on the server, there might be a lot of changes and tasks that result
    as part of the configuration assessment. For all changes, always test in a similar
    environment to ensure the application does not have an unexpected behavior. Production
    should never be the first place changes are applied. If you do not test in a similar
    environment first and problems are encountered, you might make things worse rather
    than better. Some configurations might appear to be only cosmetic, but the majority
    of the changes you make will change either the behavior of SQL Server or how the
    application will perform.


    ## Establishing a Performance Baseline


    The initial `Perfmon` data is your performance baseline, or what the system performance
    was before any changes were made to the system. After changes are implemented,
    a new baseline will need to be created so that you can measure the percent change
    in the system. You can use the existing data collector to create the new baseline—just
    change the destination to a new file. Over time, you can start to see the impact
    of all the changes in the application and the system—good or bad—and adjust the
    configuration accordingly.


    ## Analyzing SQL Performance Data


    Tuning indexes or queries is what most people probably think about when you mention
    tuning a SQL Server instance for peak load. However, as you have seen in this
    chapter, there is a lot more to tuning for that time frame than just adding some
    indexes and rewriting statements. If the disk subsystem is misconfigured and you
    are able to perform only 10 I/O per second, all statements will suffer—even with
    optimized code. You might think, “How could this happen? My SAN guys told me that
    you had the optimal configuration.”


    Here is an example from one of my past customers. This particular client was able
    to achieve only 10 `I/Ops` on its disk subsystem with reasonable performance.
    The server with SQL Server was configured using `iSCSI` to connect to the SAN.
    Because the disk I/O was slow, this was showing up as a performance issue to end
    users. It took some time, but we were able to track down the issue by working
    with the SAN as well as the network teams. As it turns out, the network switch
    that the `iSCSI` interfaces were plugged into was misconfigured. Because `iSCSI`
    is based on `TCP/IP`, the lack of performance makes sense if a key component is
    not configured properly. That is why it is so important to validate the underlying
    configuration before reviewing any part of the application. Tuning is much like
    peeling back the layers of an onion—you find one thing, and another gets uncovered.


    So where do you start when looking at all of the SQL Server performance data if
    you have captured a lot of it? It can be daunting. You have data from the Dynamic
    Memory Views (`DMV`) that shows the most frequently running code, which will correlate
    to the largest I/O consumers. You have different data sets from `Profiler` or
    `Extended Events` for long-running statements or all traffic over a specific time.
    And what about the data set with all of the transactions that are involved in
    the core business transactions? As you can see, there is a lot of data—and this
    does not even include any of the metadata from SQL Server about object use or
    execution plans.


    Prior to reviewing the configuration data, you reviewed the `Perfmon` data to
    provide more information about what the performance on the SQL Server instance
    is like. Before you review any of the information from the traces or `DMVs`, you
    need to review the current activity. The current activity of the instance that
    was captured earlier provides you with insight into what type of statements are
    executed, the common wait stats, the resource usage, and many other factors. After
    you do this on several of your systems, you will start to recognize patterns in
    the data and see when the system has an issue. Figure 18-15 is an example of the
    output from a script that shows details for all active process on a SQL Server
    instance.


    ![Image 215](index-463_1.png)


    `Figure 18-15`. Current activity of a SQL Server instance gathered from a SQL
    script.


    If you ran a script that generated this data several times over the course of
    the day, you could see patterns in the data. Following are observations from analyzing
    the data shown in Figure 18-15:


    *   There are several blocked processes, with the longest process being blocked
    for almost four minutes.

    *   `Session ID` is a long-running process that has consumed over 4 billion logical
    reads and a large number of other resources.

    *   `Session ID` 1864 is trying to acquire an application lock.

    *   Even though the code is not in the view shown in Figure 18-5, the sessions
    on the bottom of Figure 18-15 are all running the same code with a nonoptimal
    execution plan.

    *   A client-side trace is running a deadlock capture.

    *   There is a `WAITFOR` process that captures performance metrics for the custom
    application.'
