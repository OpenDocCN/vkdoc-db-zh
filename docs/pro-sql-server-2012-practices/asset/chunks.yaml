    should get nothing beyond read, write, and execute privileges. You can implement
    wrapped stored procedures for people truly in need of other types of access. For
    example, many developers believe they should have `dbo` privileges, but they rarely
    need all the rights that `dbo` confers. Here, explicit grants of privilege can
    be offered as a replacement. If people want the ability to trace in production,
    you can wrap trace templates in stored procedures and offer access to the procedures.


    You might have other items to address than just the ones I’ve listed. That is
    OK and to be expected.


    Take my list as the base, and add other concerns as needed to support your business.
    Don’t go overboard, but take care to cover what’s truly important to your business.


    # chapter 1 ■ Be Your Developer’s Best FrienD


    ## Step 3: Create a Clear Document


    Write everything down clearly. Create a single document you can hand to vendors,
    management, and new personnel to help them get up to speed.


    I’ve often experienced systems going into production that did not adhere to our
    standards. These were primarily purchased applications that were bought without
    asking the IT department about demands related to infrastructure. Most of the
    time this happened because the rest of the business did not know about the standards
    IT had in place, and sometimes it happened because of the erroneous belief that
    our business could not make demands of the vendors. Here is where a piece of paper
    comes into play. Create a quick checklist so that people who buy applications
    can ask the vendor about what is needed to fit applications into your environment.
    Some possible questions that you might want to put to a vendor include the following:


    - Do you support the latest release?

    - Do you require `sysadmin` rights?

    - What `collation` do you use?


    When all the questions have been asked and answered, you have an actual possibility
    to see whether the vendor’s application is a realistic fit with your environment,
    or whether you should cancel the purchase and look for other possibilities. In
    most cases, when pressed on an issue, third-party vendors tend to have far fewer
    requirements than first stated, and most will make an effort to bend to your needs.


    ## Step 4: Create System-Management Procedures


    You will get into a lot of battles with your developers about rights. You’ll hear
    the argument that they cannot work independently without complete control. You
    can’t always give them that freedom. But what you can do is give them access to
    a helper application.


    What I often found is that, as the DBA, I can be a bottleneck. Developers would
    create change requests. I would carry out the changes, update the request status,
    close the request, and then inform the required people. Often, it would take days
    to create a database because of all the other things I had to do.


    Yet, even though creating a database requires extensive system privileges, it
    is an easy task to perform. Why not let developers do these kind of tasks? We
    just need a way to know that our standards are followed—such as with the naming
    and placement of files—and to know what has been done.


    Logging is the key here. Who does what and when and where? For one customer, we
    created an application that took care of all these basic, but privileged, tasks.
    The application was web-based, the web server had access to all servers, and the
    application ran with `sysadmin` rights. Developers had access to run the application,
    not access to the servers directly. This meant we could log everything they did,
    and those developers were allowed to create databases, run scripts, run traces,
