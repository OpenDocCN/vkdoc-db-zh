    a directive to database professionals, what they do define is the intent of the
    law. SOX is focused on the accuracy of reporting, meaning that it is not concerned
    with who has seen the data, but with what has been added, modified, or 222


    chapter 9 ■ compliance and auditing


    deleted. Thus, database professionals need to be concerned mainly with write events
    and who has access to do perform them.


    Table 9-1 shows the areas that should be audited on SQL Server instances containing
    SOX-regulated data.


    ***Table 9-1.** Areas of attention for servers containing data regulated by SOX.*


    **Area**


    **Audit Group**


    Role Changes


