    your disk. These are errors for which you want to set up an alert.


    There are also several severity levels. Levels 017 through 025 indicate hardware
    or software errors, and should be monitored. Levels 017 through 019 are for software
    errors, such as running out of resources, which a user can’t fix. Levels 020 through
    025 indicate fatal errors, and will terminate client connections. It is very important
    a system administrator be notified if a fatal error occurs.


    The example in Figure 10-8 shows an alert for all databases on the instance, for
    error 823.


    Performance Conditions


    The second type of alert is based on a performance condition. These are SQL Server–specific
    counters from Performance Monitor. You choose an object, its counter, and an instance
    (if applicable). Then, you need to define the specific counter—it must fall below,
