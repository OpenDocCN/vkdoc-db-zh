    2012 标准版的单一 `SQL Server` 集群，该集群承载着三个数据库，占用 900 **GB**。该应用程序是一个 **.NET** 应用程序，并利用中间层进行所有数据访问、连接管理、事务管理和会话状态管理。数据库具备基本的维护流程，并由一名兼职
    **DBA** 支持。


    ![Image 201](img/index-437_1.png)


    **图 18-1.** 税务应用程序的高层拓扑图。


    ### 执行评估


    从哪里开始弄清楚情况——尤其是在大型环境中？你需要一个路线图，而通过识别环境中现有的数据源可以方便地创建路线图。检查是否存在拓扑图或配置管理数据库（`CMDB`）存储库。拓扑图将提供应用程序的概览视图。根据
    `CMDB` 中维护的信息级别，你或许能够看到服务器详细信息、应用程序所有者以及应用程序关系——这些在你处理一个可能不熟悉的系统时都很重要。目标是识别主应用程序可能与之交互的任何其他应用程序，因为它可能影响可扩展性。'
