    OLTP（联机事务处理）工作负载的特点是执行大量短时事务和查询，这些操作通常在单个执行线程上运行。它们可能包含更高比例的写入活动，并且某些表中的数据可能*极度易变*。这些特性对硬件选择和配置过程有重要影响。例如，您会希望处理器具有**出色的单线程性能**，因为大多数查询仅使用单个执行线程。您还需要一个能够提供高**每秒输入输出操作数（IOPS）**
    的 I/O 子系统，并且由于数据易变和事务日志写入活动频繁，该子系统还需具备**卓越的写入性能**。


    DW（数据仓库）工作负载的特点是在更静态的数据上运行较长时间的查询。查询优化器通常会将这些查询并行化，因此处理器拥有更多物理核心会非常有益。对于 DW 工作负载，配备大量物理
    RAM 非常有用，因为这能让更多数据保留在 SQL Server 缓冲缓存中，从而减轻 I/O 子系统的读取压力。除了数据加载操作，DW 工作负载通常很少有写入活动，这意味着
    I/O 子系统的配置方式将与典型的 OLTP 工作负载不同。许多 DW 类查询在计算聚合时会读取大量数据，因此**良好的顺序读取 I/O 性能**至关重要。写入活动（数据加载除外）要少得多，这也会影响您在存储类型和
    RAID 级别方面如何配置 I/O 子系统。


    在决定购买何种硬件和存储子系统之前，您应尽量确定服务器将要支持的工作负载类型。同时需要记住，很少有数据库工作负载是纯粹的 OLTP 或纯粹的 DW 型，因此您通常需要处理混合工作负载类型。您可能还需要在单个
    SQL Server 实例上托管多个数据库，而每个数据库的工作负载类型不同。另一种可能是，单个 SQL Server 实例上的多个数据库具有相同类型的工作负载，但服务器上的聚合负载最终可能与预期大相径庭。考虑到所有这些情况，您如何确定预期的工作负载类型呢？


    如果您有正在运行生产负载的现有服务器，可以运行多个动态管理视图（DMV）和动态管理函数（DMF）查询，并监控一些关键的性能监视器（PerfMon）计数器，以便更好地了解现有的工作负载类型。例如，您可以查询
    `sys.dm_os_wait_stats` DMV，查看自上次重启 SQL Server（或上次清除等待统计信息）以来累计排名靠前的等待类型，从而更好地了解当前的瓶颈。


    对于正在开发的新应用程序，您可以在开发和测试服务器上运行相同的查询和计数器，同时结合查阅文档以及与开发人员、业务分析师和最终用户沟通，以更好地了解预期的工作负载类型。所有这些调查工作的目的，是为了更清晰地了解硬件和存储子系统将要处理的工作负载类型，从而做出最佳的硬件选择和配置决策。


    ## SQL Server 2012 企业版考虑因素


    在设计流程早期，您必须回答的一个关键问题是：您是否能够使用 SQL Server 2012 企业版，还是将被迫使用较低端的版本，例如 SQL Server
    2012 标准版或 SQL Server 2012 商业智能版。作为一名数据库专业人士，我坚信企业版非常值得额外的许可成本，但我也知道，在预算有限的情况下，这可能很难说服决策层。以下列举了
    SQL Server 2012 企业版中一些更有价值的功能：


    -   数据压缩

    -   增强的预读

    -   高级扫描读取

    -   自动使用索引视图

    -   表分区

    -   分布式分区视图

    -   可扩展的共享数据库

    -   异步数据库镜像

    -   AlwaysOn 可用性组

    -   在线索引操作

    -   快速恢复

    -   并行索引操作

    -   数据库快照

    -   热添加 CPU 和 RAM

    -   在线还原

    -   资源调控器

    -   SQL Server 审核

    -   变更数据捕获

    -   镜像备份

    -   Oracle 复制发布

    -   点对点复制

    -   透明数据库加密


    其中许多功能对于提升 SQL Server 实例的性能和可用性极为有用，因此您应该坚定地说服您的组织购买企业版。


    如果您必须使用 SQL Server 2012 标准版，那么您将被限制为数据库引擎最多使用 64 GB RAM。同时，您在数据库服务器中使用的物理处理器插槽数或物理处理器核心数，将被限制为**两者中较少者**，即不超过四个处理器插槽或
    16 个物理处理器核心。如果是这种情况，您就不要犯这样的错误：指定一台大型数据库服务器，比如具有 40 个物理核心和 256 GB RAM 的四路服务器，因为
    SQL Server 2012 数据库引擎将只能利用这些硬件资源的一小部分。


    别忘了将操作系统版本和版本选择作为此决策过程的一部分。操作系统本身对最大 RAM、处理器插槽数和逻辑处理器总数也存在许可限制。


    Windows Server 2008 R2 标准版的 RAM 上限为 32 GB，且不能使用超过四个处理器插槽；而 Windows Server 2008
    R2 企业版的 RAM 上限为 2 TB，并且最多可使用 256 个逻辑处理器。Windows Server 2012 标准版的 RAM 上限为 4 TB，可使用
    640 个逻辑处理器。Windows Server 2012 数据中心版具有相同的限制，但其虚拟化上限更高。


    ## 第 15 章 ■ 服务器选型与规模确定


    ## 服务器供应商选择


    在开始考察具体服务器型号和组件之前，您需要确定将与哪家服务器供应商合作。我认为有几家属于“第一梯队”的服务器供应商，包括以下（按字母顺序排列）：


    -   Dell

    -   Fujitsu

    -   HP

    -   IBM

    -   NEC

    -   Unisys


    根据您的优先考虑事项，这些服务器供应商各有优缺点。有些供应商的硬件价格较低，而另一些则拥有专有技术，使其能力超越了 Intel 或 AMD 参考设计所见（当然价格也更高）。有些供应商（如
    Dell）专注于低端和中端市场，因此如果您真的需要八路或十六路服务器，您将无法购买 Dell 服务器，因为他们只销售四路及更小的服务器。


    在本章中，我不会推荐任何特定的服务器供应商。大多数公司和组织出于多种合理原因，都有一个偏好的硬件供应商并长期合作。

    '
- fmt: '# 服务器选择概述


    例如，对于您的IT人员来说，支持单一供应商的服务器更为容易，因为他们熟悉这些型号及其维护方式。在紧急情况下，他们还可以利用备用机或通用组件。如果您是足够大的客户，您通常还能从首选的服务器供应商那里获得折扣定价以及加急的销售和服务。


    如果您在“HP商店”或“IBM商店”（或任何其他供应商商店）工作，通常很难说服您的管理层和技术团队的其他成员，让您从不同的服务器供应商处购买新服务器。您或许可以通过向多个供应商索取大致等效设备的报价，让供应商之间相互竞争，然后利用这些报价从您常规的首选供应商那里获得更好的价格。


    尽管如此，您应该对服务器供应商保持开放的态度，并尝试了解您常购买的服务器类型中，他们提供了什么新品。很可能您会发现另一家供应商特定型号中有一些真正吸引人的功能，值得尝试说服您的组织购买该型号服务器，而不是从您常规的服务器供应商那里购买。在大多数情况下，无论您是否喜欢，您可能都必须从首选供应商那里挑选一款服务器型号。


    ## 服务器形态选择


    确定了服务器供应商后，您必须决定是购买机架式服务器、塔式服务器还是刀片服务器。每种形态都有其优缺点，需要您考虑。


    ### 机架式服务器


    机架式服务器可能是数据中心最常见的形态。它们具有标准的宽度和长度，并提供多种标准的垂直高度，称为`rack units`（如1U、2U、4U等）。它们通常安装在导轨上，后面配有线缆管理臂，允许您在服务器运行时将其从机架前端轻轻拉出，而无需拔掉任何线缆。这使您可以在服务器通电时维修许多组件，或在服务器断电时进行更重大的维修工作。


    机架式服务器的一个小缺点是，它们内部密布各种组件，这可能使它们更难维修，也更难散热。因此，机架式服务器通常配备多个嘈杂的小直径、高速风扇，这些风扇将冷空气从机箱前端吸入，并将产生的热空气从后部排出。这就是为什么数据中心在服务器机架之间交替布置冷通道和热通道。冷通道有空调冷空气通过机房架空地板的孔向上流动，流入服务器前端，然后从服务器后部排出。热通道的天花板上设有回风口，热空气上升后由此离开服务器机房。


    ### 塔式服务器


    塔式服务器通常采用高大宽厚的机箱，放置在架子上而非机架中。它们机箱内部空间更大，一旦打开机箱，维修工作也更容易进行。它们通常没有导轨，因此常常直接放在地板上或机架内的架子上。一些塔式服务器可以加装导轨并侧向安装在机架中，但这并不常见，因为它与真正的机架式服务器相比会浪费机架内的垂直空间。塔式服务器通常被认为是入门级服务器，更常用于较小的组织，因为它们可能比机架式服务器更便宜。


    ### 刀片服务器


    刀片服务器比机架式服务器更小、更密集。它们有一个机架安装的刀片机箱底座，容纳电源、散热、网络连接、I/O连接和管理功能的通用组件。多个独立的刀片服务器安装在一个刀片机箱中，使您能够在更少的物理机架空间内拥有更多独立的服务器和更高的整体计算能力。虽然这听起来很有吸引力，但如果您正在考虑将刀片服务器用于数据库服务器，有几个问题需要注意。一个问题在于，刀片机箱是所有安装在其内部的刀片服务器的单一故障点。如果刀片机箱发生任何硬件故障，可能会影响机箱内的所有刀片服务器。这意味着您不会希望将Windows
    Server故障转移集群实例的多个节点放在同一个刀片机箱底座中。同样的注意事项也适用于SQL Server 2012 `AlwaysOn Availability
    Group`中的多个节点，或数据库镜像伙伴关系的两端。


    刀片机箱中的通用基础设施，特别是刀片服务器与实际存储子系统之间的I/O接口，可能成为性能瓶颈，尤其是在刀片数量增加时。这是另一个不应将刀片服务器用作关键任务数据库服务器的原因。


    大多数数据库服务器的标准做法是使用传统的机架式服务器。您必须做的主要决定是，您的机架式服务器需要哪种垂直单元尺寸（1U、2U、4U或更大）。这个选择在某种程度上取决于您的服务器中将有多少处理器插槽。单处理器插槽和双处理器插槽的服务器有1U的垂直尺寸可供选择。


    您也可以在更高的2U垂直尺寸中获得双处理器插槽服务器，这使您可以在机箱内拥有更多的内部存储驱动器托架。您可以在2U和4U垂直尺寸中获得四处理器插槽服务器，更大的尺寸为内部存储驱动器托架提供了更多空间。最后，您可以在4U或更大的垂直尺寸中获得更高的处理器插槽数量。


    需要记住的一点是，单个服务器机架中多个1U和2U机架式服务器的整体电源和散热需求。完全配备了内部驱动器、大量物理RAM和许多PCI-E扩展卡的双处理器插槽服务器，会消耗大量电力并产生大量热量。这意味着，如果您在整个机架中装满42台1U机架式双处理器插槽服务器，有时可能会超过单个42U服务器机架的整体电源容量。随着使用更少电力的现代处理器和其他更节能组件的出现，这个问题已不如几年前常见。您仍然应该与您的数据中心联系，了解每个服务器机架可用的电源和散热容量。


    ## 服务器处理器数量选择


    您必须做的一个重大决定是，您的数据库服务器中将有多少物理处理器。


    服务器中的物理处理器数量与服务器的性能、可扩展性和整体负载能力有某种间接关系。对于SQL Server 2012基于核心的授权，物理处理器核心的数量（与处理器插槽数量相关）对服务器的总体成本（包括软件授权）有很大影响。很容易在SQL
    Server 2012核心许可证上的花费远超过在实际服务器硬件和存储子系统上的花费。


    许多数据库专业人员常犯的一个错误是，认为“更大”（就物理处理器数量而言）的服务器比小服务器更快。在大多数情况下，这并不正确。正如本章后面详细解释的，双插槽服务器中使用的特定处理器在单线程性能上通常比同期的四插槽处理器对应产品快得多。'
  raw: 'For example, it is easier for your IT staff to support servers from a single
    vendor, as they are familiar with the models and how they are serviced. They can
    also take advantage of any cold spares or common components in the event of an
    emergency. If you are a large enough customer, you will also probably be able
    to get discounted pricing and expedited sales and service from your preferred
    server vendor.


    If you are working at an “HP shop” or “IBM shop” (or any other vendor shop), it
    is usually fairly difficult to convince your management and the rest of the technical
    organization that you should buy a new server from a different server vendor.
    You might be able to play server vendors against each other by requesting quotes
    from multiple vendors for roughly equivalent equipment, and then use these quotes
    to get better pricing from your regular preferred vendor.


    Despite all this, you should keep an open mind about server vendors, and try to
    stay current with what they offer for the types of servers that you commonly buy.
    It could be that you will discover some truly compelling features in a particular
    model from a different vendor that would make it worth it to try to convince your
    organization to buy that particular model server instead of something from your
    regular server vendor. In most cases, you will probably have to pick a server
    model from your preferred vendor, whether you like it or not.


    Server Form Factor Selection


    After you know the server vendor, you must decide whether you will be purchasing
    a rack-mounted server, a tower server, or a blade server. There are some pros
    and cons for each form factor that you should consider.


    Rack-mounted servers are probably the most common form factor in data centers.
    They are a standard width and length, and are available in a number of standard
    vertical heights, which are known as *rack units* (as in 1U, 2U, 4U, etc.). They
    are usually mounted on rails and have cable management arms in the back that allow
    you to gently pull the server out of the front of the rack while it is running,
    without 364


    chapter 15 ■ Selecting and Sizing the Server


    unplugging any of its cables. This lets you service many components while the
    server is powered on or do more major work while the server is powered off.


    One small disadvantage of rack-mounted servers is that they are densely packed
    with various components, which can make them a little more difficult to service
    and somewhat harder to cool. Because of this, rack-mounted servers typically have
    a number of loud, small-diameter, high-velocity fans that pull cool air in through
    the front of the chassis and push the resultant hot air out of the back of the
    chassis. This is why data centers are arranged with alternating cold aisles and
    hot aisles between the server racks. The cold aisles have air conditioned cold
    air flowing up though holes in the raised floor of the server room that flows
    into the front of the server and then exits out through the back of the server.
    The hot aisles have air returns in the ceiling where the warm air rises and then
    exits the server room.


    Tower servers are usually in tall and wide enclosures that sit on shelves instead
    of racks. They have more room inside the case and they are easier to work on once
    you have opened the enclosure. They do not usually have rails, so they often sit
    on the floor or on shelves in a rack. Some tower servers can be fitted with rails
    and mounted sideways in a rack, but this is not that common because it wastes
    vertical space in the rack compared to an actual rack-mounted server. Tower servers
    are usually considered to be entry-level servers that are more commonly used by
    smaller organizations because they can be less expensive than rack-mounted servers.


    Blade servers are even smaller and denser than rack-mounted servers. They have
    a rack-mounted, blade enclosure chassis that holds common components for power,
    cooling, network connectivity, I/O


    connectivity, and management functionality. Multiple, individual blade servers
    are installed in a single blade enclosure, allowing you to have more individual
    servers and overall computing capacity in a smaller amount of physical rack space.
    While this sounds attractive, there are several issues you should be aware of
    if you are considering using blade servers for database servers. One problem is
    that the blade enclosure is a single point of failure for all of the blade servers
    that are installed inside the enclosure. If the blade enclosure has any hardware
    failures, it can affect all of the blade servers in the enclosure. This means
    that you would not want to have multiple nodes in a Windows Server failover cluster
    instance in the same blade enclosure chassis. The same caution holds true for
    multiple nodes in a SQL Server 2012 AlwaysOn Availability Group or for both sides
    of a database mirroring partnership.


    The common infrastructure in the blade enclosure, especially the I/O interface
    between the blade servers and the actual storage subsystem, can become a performance
    bottleneck, especially as the number of blades increase. This is another reason
    not to use blade servers as mission-critical database servers.


    It is standard practice for most database servers to use conventional rack-mounted
    servers. The main decision you will have to make is which vertical unit size (1U,
    2U, 4U, or larger) that you want for your rack-mounted server. This choice is
    somewhat dictated by how many processor sockets are going to be in your server.
    Single-processor socket and dual-processor socket servers are available in a 1U
    vertical size.


    You can also get dual-processor socket servers in a taller, 2U vertical size that
    lets you have more internal storage drive bays in the chassis. You can get quad-processor
    socket servers in both 2U and 4U vertical sizes, with the larger size giving more
    space for internal storage drive bays. Finally, you can get higher processor socket
    counts in 4U or larger vertical sizes.


    One thing to keep in mind is the overall power and cooling demands of multiple
    1U and 2U rack-mounted servers in a single server rack. Dual-processor socket
    servers that are fully populated with internal drives, large amounts of physical
    RAM, and many PCI-E expansion cards can use a large amount of electrical power
    and generate a great deal of heat. This means that you can sometimes exceed the
    overall power capacity of a single 42U server rack if you populate the entire
    rack with 42 1U rack-mounted dual-processor socket servers. This problem is not
    as common as it was a few years ago as more modern processors that use less power
    and other more energy-efficient components become available. You should still
    check with your data center to see how much power and cooling capacity is available
    for each server rack.


    chapter 15 ■ Selecting and Sizing the Server


    Server Processor Count Selection


    One huge decision that you have to make is how many physical processors will be
    in your database server.


    The number of physical processors in the server has a somewhat indirect relationship
    to the performance, scalability, and overall load capacity of the server. With
    SQL Server 2012 core-based licensing, the number of physical processor cores (which
    is related to the number of processor sockets) has a huge effect on the overall
    cost (including software licensing) of the server. It is very easy to spend far
    more on the SQL Server 2012 core licenses than you will spend on the actual server
    hardware and storage subsystem.


    One common mistake that many database professionals make is to assume that a “bigger”
    server (in terms of physical processor count) is a faster server compared to a
    smaller server. In most cases, this is simply not true. As explained in detail
    later in the chapter, the specific processors used in dual-socket servers often
    perform much faster for single-threaded performance than their contemporary four-socket
    processor counterparts.'
