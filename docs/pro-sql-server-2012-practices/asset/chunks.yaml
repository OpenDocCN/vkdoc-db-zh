    ## ALTER FEDERATION


    Future capability of SQL Database that provides a point-in-time restore option.
    Certain limitations apply.


    ## USE FEDERATION


    Allows a session to change its database context from one federation member to
    another, or back to the root database.


    ## CREATE TABLE FEDERATED ON


    The `CREATE TABLE` statement was modified to accept the `FEDERATED ON` option.
    This option tells SQL Database which field in that a table will serve as the federated
    column and will be used to distribute the data across federation members.


    ## sys.federations


    Provides access to the list of federations created in a root database.


    ## sys.federation_members


    Provides a list of federation members that make up all the federations in a root
    database.


    ## Federation Example


    Let’s review a simple scenario in which I am creating a federation called `FederationCust`
    that will hold two tables: `Customers` and `Countries`. My `Customers` table is
    being federated because it will contain many records and will be the cause of
    performance and scalabilities issues in my SQL Database instance as my database
    grows. My `Customers` table will contain a `CustomerID` field as a unique identifier,
    which is being used as the key to federate the table. The `Countries` table doesn’t
    need to be federated; however, I want to include that table as a reference table
    in my federation for data integrity. The following steps show how I create the
    federation, as depicted in Figure 12-4:


    1. I create a federation called `FederationCust` using the `CREATE FEDERATION`
    statement, specifying a distribution name called `CustomerID`. This creates an
    empty database. I switch context to that database by using the `USE FEDERATION`
    statement and create my two tables: `Countries` and `Customers`. However, when
    I create my `Customers` table, I specify this table will be federated on its ID
    field (the federated column) using the `CREATE TABLE … FEDERATED ON` statement.
    Because my federation has only one member database at the moment, all the records
    will be stored in this database.

    2. At some point in the future, I realize that my federation is growing and I
    want to store my `Customers` table on two member databases (also referred to as
    `federation members`, or simply `members`) for increased application performance.
    So I decide to split the federation with the `ALTER FEDERATION … SPLIT` command,
    specifying that the `CustomerID` distribution name will be split at 1000. In the
    background, SQL Database creates two new member databases and copies the customer
    records from the original member database so that the first new member will contain
    all the records with an ID less than 1000, and the second new member with an ID
    of 1000 or greater. Because the `Countries` table is not federated, it will be
    copied in its entirety. If other objects were created in the original member,
    such as stored procedures, they would be copied too.


    ![Image 143](index-310_1.png)


    chapter 12 ■ WindoWs azure sQL database for dbas


    3. Once the copy operation is completed, the original member will be dropped and
    only two members will remain. The `SPLIT` operation can be performed online with
    limited performance impact, and the databases will be transactionally consistent
    at the end of the operation. I can further split my federation over time as needed
    to scale my database.


    **Figure 12-4.** Steps to create a SQL Database federation.


    ## Limitations


    SQL Database Federations are becoming more popular because they answer an important
    scalability need in cloud computing. However, certain limitations apply that developers
    and database administrators should know about. Some of these limitations might
    be lifted over time, so I encourage you to verify whether the following limitations
    still apply:


    - `Data types`: The `timestamp` and `rowversion` data types are not supported
    in federation members.

    - `Identity`: The identity column is not supported in federation members.

    - `Merge`: It is not currently possible to merge federation members at this time.
    This feature is planned but not yet available.'
