- fmt: '# Chapter 10: Automating Administration


    • **Fail Task**: The task will not complete.

    • **Overwrite**: The login information at the destination will be overwritten
    with the information from the source.

    • **Skip**: If the object exists on the destination server, it will remain intact
    and the task will move on to the next login.


    The option to **Copy Sids** determines whether the security identifiers (SIDs)
    that are assigned to the logins are moved with the logins. If you do not move
    the SID, the databases on the destination server that use the login won’t recognize
    it.


    There are some additional constraints to consider. The one login that can’t be
    transferred is `sa`. Also, when a login is transferred, it is disabled on the
    destination server, and the password is set to a random 260-character password.
    You will need to have a process for re-enabling the logins, and if they are Windows
    logins, resetting the passwords.


    *Figure 10-20. Configuring the options of the Transfer Logins task*


    When done configuring, you can test the package by running it from your computer.
    Be aware that this will transfer the logins! To test it, click the green play
    button to debug. If successful, a green circle with a checkmark and the message,
    “Package execution completed with success” will appear, as seen in Figure 10-21.


    *Figure 10-21. A successfully executed package in BIDs*


    When the package has been tested and meets your requirements, it can be deployed
    to a SQL Server instance and executed on-demand, or it can be scheduled with a
    SQL Server Agent job. This package is one example of the capabilities SSIS has
    to make SQL Server administration simpler.


    ## PowerShell


    PowerShell is a powerful, .NET-based scripting language created by Microsoft.
    It makes management of Windows Server and programs that run on it, like SQL Server,
    much easier.


    What are some of the benefits of using PowerShell? The environment it is built
    on can access parts of the OS and file system that T-SQL can’t. It is an object-oriented
    programming language, unlike VBscript or Perl. It has many advanced programming
    constructs, such as looping and error handling. There are many tasks that are
    difficult or not possible with T-SQL but are simple with PowerShell.


    To understand PowerShell, you must first understand cmdlets. These are lightweight
    .NET classes that perform the work you tell them to. All cmdlets are in a verb-noun
    format, such as `Get-Help`. While many of these are powerful on their own, the
    ability to take the results of one cmdlet as an object, pass it to another cmdlet,
    and continue to work is invaluable.


    Specific to the database engine are `Invoke-Sqlcmd`, which runs T-SQL and XQuery
    queries; `Invoke-PolicyEvaluation` to evaluate Policy Based Management policies;
    `Encode-Sqlname` and `Decode-Sqlname` to allow special characters allowed in SQL
    Server but not PowerShell; and `Convert-UrnToPath` to translate SQL SMO resource
    names to the provider paths.


    ### Launching PowerShell


    From your workstation or a server, you can run `powershell.exe` to launch the
    environment. In SQL Server, you can right-click an object in Object Explorer and
    select **Start PowerShell**. The difference is that if you open it from SSMS,
    it automatically opens with the `sqlps` utility, meaning the SQL Server provider
    and cmdlets are already loaded and ready for use.


    ### Using PowerShell


    Using PowerShell can be as simple as opening it and executing one cmdlet. You
    can also create a more detailed script that passes in variables, reads files from
    disk, and writes to tables. Any commands or scripts can be saved as a PowerShell
    script file (`.ps1`) for future use.


    An example of this is using PowerShell to check the space available on your disks.
    PowerShell can use WMI to access this information. The `Get-WmiObject` cmdlet
    will call WMI objects, and can be used on a local or remote computer. If you are
    using it on a remote computer, your credentials must have access to it.


    The script in Listing 10-7 will allow you to enter a computer name variable, and
    check the available disk space on that computer. The size and freespace are in
    bytes.


    *Listing 10-7. PowerShell Script to View Total and Available Drive Space*

    ```

    #Checking available disk space


    $Server = ''dev01''


    get-wmiobject -query ''

    "Select DeviceID, Size, Freespace From Win32_logicaldisk Where drivetype=3" ''

    -computer $Server | select-object DeviceID, Size, FreeSpace

    ```


    ### Automating PowerShell


    With the ability to create a script and save it for future use comes the ability
    to automate the running of the scripts. Windows Task Scheduler, if in use in your
    environment, can be set to run a script on a schedule.


    You can also schedule a PowerShell job through SQL Server Agent. There are two
    things to note here.


    First, each time the Agent service runs the step, a PowerShell instance will be
    launched, which will use memory. Second, running PowerShell from SQL Server requires
    that you create a credential that has access to any resources in your environment,
    and then create a SQL Server Agent proxy for PowerShell using that credential.
    In the job, you must specify the proxy in the `RunAs` field.


    ## What to Automate


    With an understanding of the tools you have available to help you automate tasks,
    the next decision to make is which tasks you should automate. Start by making
    a list of the tasks you perform on a daily, weekly, monthly, and annual basis.
    Any task you perform more than once is a candidate for automation. Choose one
    task with which to start.


    As with any change in IT, don’t change more than one process at a time. Implement
    one new process or schedule, test it, work out the bugs, and refine it. This helps
    ensure that if something goes wrong, you can pinpoint the cause and work to correct
    it as quickly as possible. When you are certain the process is working the way
    you want it to, then you can pick another task on your list.


    The second step is to create a baseline of the amount of time you spend on tasks
    today. How much time do you spend reading through error logs, manually restoring
    databases, and fixing index fragmentation? After you change a process, measure
    the time again. Doing so can give you, and the business, an accurate picture of
    the time saved.


    ## Monitoring


    Monitoring your servers for existing problems or the signs of future problems
    is one of the most critical aspects of being a successful DBA. There are many
    sources that contain information you can mine to understand the health of a server—Windows
    event logs, SQL Server error logs, and SQL Server Agent logs are a few of the
    valuable resources at your disposal. Being able to automate the searching of these
    for everything from impending potential disk corruption to failed login attempts
    is incredibly valuable.


    ### Windows Event Viewer


    The Windows Event Viewer contains the application and system logs. The application
    log will list events, logged by programs installed on the computer. The various
    internal and external features and processes of SQL Server (such as the Engine,
    Agent, and Reporting Services) will write entries to this log. Information such
    as the date and time, the source of the error, the event ID, and an explanation
    of the item or an error message is included in the log entry. Each item is also
    assigned a level of importance. You should focus on the items of highest importance,
    which are marked **Critical**, **Error**, or **Warning**.


    The system log will list events logged by the operating system and its components.
    If a service fails to start when the server starts up, you will see an error and
    error message.'
