  trans: '

    # 第 18 章 - 针对峰值负载的调优


    ## 定义要捕获的数据


    如果您的环境中不存在 CMDB，请与服务器、操作系统 (OS) 和存储团队协作，收集有关应用环境的基本配置信息。


    ### 表 18-2. 需从网络、服务器、应用程序和 SQL Server 收集的配置数据


    | 团队 | 需要收集的属性 |

    | :--- | :--- |

    | **基础架构** | 网络速度（局域网）<br>核心应用服务器与数据库服务器之间的跳数<br>应用和数据库服务器所用交换机的上行链路速度及利用率 |

    | **服务器** | 服务器制造商<br>服务器型号<br>Windows 版本、Service Pack 级别和版本（32 位或 64 位）<br>域<br>网络接口卡
    (NIC)、主机总线适配器 (HBA) 的驱动程序版本以及 BIOS 的固件版本<br>已安装的第三方应用程序<br>病毒防护：文件或目录排除项是什么？<br>SQL
    Server 产品，如报表服务 (RS)、分析服务 (AS) 和集成服务 (IS)<br>插槽数和核心数，以及速度<br>指示服务器是群集还是独立服务器<br>是否启用了超线程？<br>是否启用了非统一内存访问
    (NUMA)？有多少个 NUMA 节点？<br>内存总量和速度<br>页面文件的大小和位置<br>NIC 卡数量<br>NIC 卡是否成组？是活动/活动还是活动/被动？<br>如果使用
    iSCSI，NIC 卡的配置是什么？<br>HBA 卡数量和大小<br>HBA 卡是否成组？是活动/活动还是活动/被动？<br>队列深度是多少？<br>为
    SQL Server 服务帐户设置了哪些本地策略？<br>锁定内存页。<br>执行卷维护任务。<br>捕获系统和应用程序日志。<br>MSTDC – 状态和安全性<br>驱动程序版本
    |

    | **存储** | 磁盘子系统的品牌和型号<br>这是存储区域网络 (SAN) 还是直连存储 (DAS)？<br>缓存总量是多少？是按存储处理器计量，还是单个缓存池？<br>每个存储池中驱动器的速度？<br>SQL
    Server 文件位于哪个存储层级？（例如：*层级 1 (SSD)，层级 2 (15K)*）<br>哪些 LUN 分配给了 SQL Server 主机？<br>如果存储是
    SAN，从主机到存储的物理路径是否多路径？<br>磁盘子系统的最大估计 I/O 操作数 (I/Ops)<br>如果执行了 I/O 压力测试，请收集测试输出。
    |

    | **SQL Server** | SQL Server 版本、SP 级别和版本<br>SQL 服务帐户<br>`sp_configure`<br>身份验证<br>已安装的功能<br>群集或独立<br>虚拟名称<br>端口号<br>是否启用了文件流<br>数据库属性<br>数据库文件属性<br>索引利用率统计信息<br>索引使用统计信息<br>潜在索引数据<br>数据缓冲区统计信息<br>过程缓存统计信息<br>系统活动审查。目视检查活动情况<br>前
    100 个查询统计信息（按计数、I/O 排序）<br>隐式转换<br>每个数据库的虚拟日志文件 (VLF) 数量<br>每个数据库的非可信约束<br>作业列表<br>作业及其用途的清单<br>计划频率、持续时间。<br>数据库维护过程<br>捕获执行维护的代码。<br>最新的错误日志<br>如果错误日志很大，请捕获最近
    30 天的活动记录。<br>关键数据库的架构<br>虚拟 I/O 文件统计信息 (`sys.dm_io_virtual_file_stats`) 的文件统计数据<br>等待统计信息摘要（累积和峰值窗口）
    |

    | **应用程序** | 应用程序名称和服务器名称<br>每天或每小时的平均用户数<br>即席查询或存储过程调用<br>用于 SQL 的应用程序用户及其权限<br>每个页面的平均往返次数<br>连接池<br>错误处理方法<br>事务管理<br>会话状态<br>审核<br>当前状态事务级别<br>过去
    30 天按类型和按天统计的平均业务交易数量<br>过去 30 天按类型和按天统计的业务交易平均响应时间 |


    如果您不知道表 18-2 中很多信息的含义怎么办？这就是为什么您要组建一个跨学科的项目团队，成员来自技术各个领域的专家，他们不仅负责收集这些数据，还将与您一起分析数据。项目团队的目标是汇集所有数据，进行分析，并根据业务定义的目标确定需要解决的问题。


    配置数据本身是有用的，但通常需要与基于性能的运行时信息配对才能形成完整的图景。表 18-2 中的配置数据将在后续使用，在您收集了额外的应用程序数据、额外的运行时数据和历史性能数据之后。收集的数据常常会引发其他问题、需要捕获的其他数据，并最终得出其他结论。


    ## 收集系统性能数据


    获得环境的基本信息后，您就可以收集性能数据了。根据您的环境，部分或全部性能数据可能已经以某种格式存在，您和您的团队成员无需付出太多额外努力即可访问。大多数环境已经部署了某种程度的监控，它会根据某些条件生成警报，并将性能指标存储一段时间。历史性能信息如果可用，是一座信息宝库，因为可以对数据进行分析以建立随时间变化的趋势。回溯的时间越远，您能看到的趋势就越多。如果幸运的话，您可能捕获到了上次峰值时间段的数据。如果存在任何此类数据，请务必使用它、备份它并保存它以供将来分析。这类信息很有价值，因为大多数产品会归档或聚合较旧的数据，这会导致数据保真度的丢失。


    无论您是否已经拥有应用程序和数据库服务器、SAN 以及网络的性能数据，您仍然需要当前的信息。更重要的是，您需要捕获正确的项目。为了捕获信息而捕获信息是毫无意义的。这项工作不需要花费很多钱或大量工作来实施。有几种工具可用于捕获性能数据。如果预算中没有资金购买它们，您可以利用
    Microsoft 免费提供的本机工具。您可以使用内置于 Windows 中的性能监视器（通常简称为 `Perfmon`）来收集数百个性能指标，且开销非常小。`Perfmon`
    允许用户创建数据收集器集，这是一个保存的配置文件，包含要捕获的对象列表、数据的文件位置、文件格式、开始和结束时间以及间隔（可以精确到秒）。但是请记住，仅仅因为它可以每秒捕获数据，并不意味着您应该——或者能够——这样做。（例如，根据您捕获的数据量，如此频繁地收集数据可能会增加不必要的开销。）您需要考虑数据收集器的目标，以及需要以多高的频率收集数据才能满足该目标。


    要捕获的内容将取决于应用程序以及您的应用程序所使用的技术。


    对于 SQL Server 和相关的服务器级数据，收集过程的目标是捕获与处理器、网络、磁盘、内存和 SQL Server 本身相关的信息。数据捕获的目标是识别是否存在任何层内的压力。如果存在，您应该捕获额外的信息以了解其发生原因。数据捕获的次要目标是能够将此数据用作性能基线。

    '
- fmt: '## CHAPTER 18 ■ Tuning for Peak Load


    Now that you understand the goals, I’ll apply the data-capture principles just
    described to an example scenario. Before you can start a process like this, you
    need to answer some questions that will drive the data-collector configuration.
    An example of what types of questions you need to answer is shown in Table 18-3.
    Without having answers to these questions, the data collector might not collect
    data for the core business hours or the right features. If the peak window times
    are not captured, you will end up with misleading data to analyze.


    ### Table 18-3. Key questions to ask before a data collector is created.


    | Question | Answer |

    | :--- | :--- |

    | What is the goal of the data collector? | Baseline the SQL Server |

    | When are the peak times for the application? | 8 AM to 8 AM from January through
    March, and 7 AM to 12 AM from April 1 through April 15 |

    | How many days is one full business cycle? | ![Image 202](index-441_1.png) |

    | In what location can the `Perfmon` file be placed? | `D:\perflogs` |

