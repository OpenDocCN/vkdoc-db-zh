- fmt: "# Chapter 5: From SQL Trace to Extended Events\n\n![Image 65](index-116_1.png)\n\
    \n## SMO Object Model\n\nThe SMO Object Model allows you to filter trace events\
    \ programmatically. For example, you can separate events that last longer than\
    \ 1 second into one separate file and all the others into another one. Figure\
    \ 5-5 shows what the object model looks like.\n\n**Figure 5-5.** The `SMO` Object\
    \ Model\n\nThe following code example shows how to read an existing trace file\
    \ called `DurationTrace.trc` with `SMO`, and filter it so that only statements\
    \ with duration longer than 500 ms are saved into a new file. The `DurationTrace.trc`\
    \ file can be created by running `SQL Profiler` with the `Duration` template for\
    \ a few minutes.\n\nOne thing to note is where the filtering takes place. The\
    \ first time I used `SMO` for tracing I thought that since we have a reader and\
    \ a writer class, we have to read a trace line, perform the filtering there, and\
    \ then either send it to the writer or not. However this is not the case. You\
    \ can stream the reader directly into the writer without any filtering. The writer\
    \ class has a `WriteNotify` event. This event gets called every time a row from\
    \ the reader is read. In this event you have to perform any filtering and determine\
    \ whether to skip the record or let it be written. This way of doing things still\
    \ seems a bit backwards to me, but since this is the case we have to live with\
    \ it. The example is well documented and is not that hard to follow. By understanding\
    \ how the classes fit together you can build powerful tracing solutions directly\
    \ in `.NET`.\n\nHowever be aware that this still uses the rowset provider and\
    \ can still drop events.\n\n```csharp\nstatic void Main(string[] args)\n{\n  \
    \  // create the reader that reads from the existing trace file\n    TraceFile\
    \ traceFileReader = new TraceFile();\n    string traceFileReaderPath =\n     \
    \   Path.Combine(Path.GetDirectoryName(Assembly.GetExecutingAssembly().Location),\n\
    \        \"DurationTrace.trc\");\n    traceFileReader.InitializeAsReader(traceFileReaderPath);\n\
    \n    // create the trace writer class with the file destination\n    string traceFileWriterPath\
    \ =\n        Path.Combine(Path.GetDirectoryName(Assembly.GetExecutingAssembly().Location),\n\
    \        \"DurationTraceFiltered.trc\");\n    TraceFile traceFileWriter = new\
