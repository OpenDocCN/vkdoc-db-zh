- fmt: "# Sessions\n\nSessions are just a grouping of events, actions and targets.\
    \ There are no limits about which of those you can and cannot mix, except the\
    \ ones that are private to the database engine by default like objects from `SecAudit`\
    \ package. Sessions are not auto-started when created and can be changed while\
    \ running.\n\n## Session Configuration Options\n\nThere are quite a few configuration\
    \ options that each session has. You can look all them up in Books Online but\
    \ we’ll name 3 most interesting ones.\n\nThe first is `EVENT_RETENTION_MODE` which\
    \ lets us control what’s the event loss our session can handle. It has 3 options:\
    \ `ALLOW_SINGLE_EVENT_LOSS` (the default setting), `ALLOW_MULTIPLE_EVENT_LOSS`,\
    \ and `NO_EVENT_LOSS`. The names are pretty self-explanatory. But be careful if\
    \ you set it to `NO_EVENT_LOSS`. For events that fire a lot, this can slow down\
    \ the server considerably.\n\nThe second session option is `TRACK_CAUSALITY`.\
    \ When turned `ON` it adds action `package0.attach_activity_id` to every event.\
    \ This action is a combination of GUID and sequence number. With it we can track\
    \ events that happen in a batch or across multiple threads in the parallel query\
    \ execution. This option is `OFF` by default.\n\nThe third option is the `MAX_DISPATCH_LATENCY`\
    \ which sets the number of seconds before the non-full session buffers are sent\
    \ to the asynchronous target. The default is 30 seconds.\n\n## Object Metadata\n\
    \nAll information about Extended events objects and running sessions can be found\
    \ in dynamic management views that start with `sys.dm_xe_*` and catalog views\
    \ starting with `sys.server_event_session*`. `Figure 5-8` from Books Online shows\
    \ the lifecycle of a single event.\n\n`Figure 5-8. Event life cycle`\n\n# From\
    \ SQL Trace to Extended Events\n\n## Data Format in Targets\n\nNow that we’ve\
    \ familiarized ourselves with the Extended Events objects let’s talk about the\
    \ format of the data in the targets. All events are stored in schemaless XML that\
    \ is read with XQuery. We have to get familiar with the following XML functions:\n\
    \n- `nodes()` transforms XML to a relational form (rowset view of the XML)\n-\
    \ `query()` makes an XQuery lookup and returns XML\n- `value()` makes an XQuery\
    \ lookup for a scalar value of SQL data type and returns it\n\nThe following code\
    \ example shows the quick school of XML. Make sure to read the comments.\n\n```sql\n\
    use tempdb;\nGO\n\nIF (OBJECT_ID('TextXML', 'U') IS NOT NULL)\nDROP TABLE TextXML;\n\
    GO\n\nCREATE TABLE TextXML\n(\n    ID INT IDENTITY(1,1),\n    XmlColumn XML\n\
    ) ;\nGO\n\nINSERT INTO TextXML(XmlColumn)\nSELECT\n'<root>\n    <event name=\"\
    Fast Event Name 1\" timestamp=\"2012-05-19T11:53:06.395Z\">\n        <data name=\"\
    TestComponent 1\">\n            <type name=\"TestType 1\" />\n            <value>100</value>\n\
    \            <text>This is some Test Text 1</text>\n        </data>\n    </event>\n\
    \    <event name=\"Fast Event Name 2\" timestamp=\"2012-05-20T12:53:06.395Z\"\
    >\n        <data name=\"TestComponent 2\">\n            <type name=\"TestType\"\
    \ />\n            <value>200</value>\n            <text>This is some Test Text\
    \ 2</text>\n        </data>\n        <data name=\"TestComponent 2 a\">\n     \
    \       <type name=\"TestType a\" />\n            <value>2001</value>\n      \
    \      <text>This is some Test Text 2 a</text>\n        </data>\n    </event>\n\
    </root>';\n\n-- node depth setting in cross apply\n-- Get 2 rows from the XML,\
    \ one for each event, in XML form\nSELECT Tbl.cols.query('.') as ShreddedXML\n\
    FROM TextXML X\n-- we're saying to get all the event nodes\nCROSS APPLY X.XmlColumn.nodes('/root/event')\
    \ Tbl(cols);\n\n-- Get 2 rows from the XML, one for each event node.\n-- Here\
    \ we get the attributes for each event via .query().value() construct\n-- notice\
    \ the [1] indexer inside the .value(). It is one based, not zero based.\nSELECT\
    \ Tbl.cols.query('.') as EventXML\n, Tbl.cols.query('.').value('(event/@name)[1]',\
    \ 'nvarchar(100)') as EventName\n, Tbl.cols.query('.').value('(event/@timestamp)[1]',\
    \ 'datetime') as EventTimestamp\nFROM TextXML X\n-- we're saying to get all the\
    \ event nodes\nCROSS APPLY X.XmlColumn.nodes('/root/event') Tbl(cols);\nGO\n\n\
    -- Get 2 rows from the XML, one for each event node.\n-- We get the attributes\
    \ from the data nodes and\n-- the values of data nodes children via .query().value()\
    \ construct\n```"
