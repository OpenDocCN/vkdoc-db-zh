    由于 SQL 数据库实例可以通过编程方式创建，无需任何硬件配置或环境设置，因此将新的 SQL 数据库实例添加到联邦中非常简单，且几乎不需要管理。SQL 数据库的这种简洁性在可扩展性方面成为了它的优势。


    **注意：** *向上扩展*通常指的是通过为单个服务器增加更多处理能力、内存或磁盘来实现扩展的数据库系统。*向外扩展*则指的是通过增加更多服务器来实现扩展，以提高响应速度的数据库系统。


    ## 关键术语


    在我们进一步探讨之前，先回顾一下与 SQL 数据库联邦功能相关的术语。当一个 SQL 数据库实例中创建了一个或多个联邦时，它被称为一个`根数据库`。因为可以在一个`根数据库`中创建多个联邦，所以添加了一些系统视图，以便您轻松查明创建了多少个联邦。


    创建联邦需要指定一个`分配名称`，并且包含一个或多个`联邦成员`。`分配名称`是一个带类型的标识符，SQL 数据库用它来确定一张表可以基于哪种类型的字段进行联邦。您通过将表链接到联邦的`分配名称`来指定该表将基于哪个字段进行联邦。（有关更多详细信息，请参阅本章后面的“联邦的
    T-SQL 变更”。）联邦表中用于分区数据的字段称为`联邦列`。`分配名称`和`联邦列`必须是相同的数据类型。


    `联邦成员`是一个 SQL 数据库实例，它根据其分配的范围，包含其所含联邦表中的一部分数据切片。如果一个`联邦成员`负责保存在名为`CustomerID`的`分配名称`下从
    1 到 100 的记录，那么该`联邦成员`中所有基于`CustomerID`进行联邦的表都只能存储该范围内的值。超出此范围的记录则存储在其他`联邦成员`中。但是请注意，一个`联邦成员`可以包含联邦表以外的内容；它还可以包含存储过程、视图以及
    SQL 数据库支持的大多数数据库对象。


    联邦成员还可以包含`引用表`。`引用表`是未被联邦的表，用于在所有联邦成员上存储相同的数据，以实现引用完整性和性能。然而，`引用表`并不同步，这意味着一旦在联邦成员中创建了它们，在一个`联邦成员`中修改`引用表`中的记录不会自动更改其他`联邦成员`中的`引用表`。


    ### 图 12-3. SQL 数据库中的示例联邦


    图 12-3 展示了一个名为`FederationCust`的示例联邦，它有两个`联邦成员`，在`CustomerID = 1000`处进行分割。在此示例中，`Customers`表在第一个`联邦成员`中包含前
    999 个客户，在第二个`联邦成员`中包含剩余的记录。`Countries`表用作`引用表`，包含相同的记录。


    ## 联邦的 T-SQL 变更


    由于联邦是 SQL 数据库完全支持的功能，因此创建并修改了某些 T-SQL 命令来管理它们。表 12-6 总结了用于联邦的最重要的语句和视图。


    ### 表 12-6. 重要联邦命令和系统视图摘要


    **T-SQL 语句** | **说明**

    --- | ---

    `CREATE FEDERATION` | 这个新语句在 SQL 数据库实例上执行以创建新联邦。此语句还指定了`分配名称`，该名称将在`CREATE TABLE`语句期间用于确定表将基于哪个字段进行联邦。执行此命令的
    SQL 数据库实例成为`根数据库`。

    `DROP FEDERATION` | 要删除的联邦。该联邦的所有`联邦成员`（数据库）...

