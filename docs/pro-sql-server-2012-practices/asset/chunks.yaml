- fmt: "# 查询 sql_handle 的多种方法\n\n你将会发现有多种方法可以查询 `sql_handle`。以下代码演示了如何提取一个过程调用的 `sql_handle`：\n\
    \n```sql\nDECLARE @HANDLE BINARY(20)\n\nSELECT @HANDLE = SQL_HANDLE FROM SYSPROCESSES\
    \ WHERE SPID = <SESSION ID>\n```\n\n以下代码展示了如何使用 `SELECT` 命令查询该句柄，结果如图 4-1 所示：\n\
    \n```sql\nSELECT * from sys.sysprocesses\n\ncross apply sys.dm_exec_sql_text (sql_handle)\n\
    ```\n\n**Figure 4-1.** 连接 `sys.processes` 和 `sys.dm_exec_sql_text` 的结果。\n\n每位进行性能调优的\
    \ SQL Server DBA 都拥有自己的一套脚本，用于在遇到性能挑战时查询 DMV。本章包含了我多年来收集整理的脚本集。其中大部分来源于 MSDN、各类网站和书籍。我根据当时所处环境的需要对其中一些脚本做了修改，但我也经常注意到，许多\
