  trans: '

    # 戴尔第 12 代服务器对比


    传统上，采用四路服务器作为数据库服务器相当普遍，因为它们在当时比同期的双路服务器拥有更多的处理器核心总数、更多的内存插槽和更多的扩展插槽。在大约 2008-2009
    年之前可用的双路服务器，通常局限于总计约八个处理器核心、32 GB 内存和两个或三个 PCI-E 扩展插槽（用于 RAID 控制器、主机总线适配器和网络接口卡等设备），这意味着它们根本无法处理强度更高的数据库服务器工作负载。


    自那时起，处理器核心密度已经提高，因此你可以在一台双路服务器中拥有 16 到 32 个物理处理器核心。内存密度也有所提升，双路服务器最多可配备 24 个内存插槽，每个插槽可容纳一根
    32-GB 的 DIMM，使得双路服务器的总 RAM 容量达到 768 GB。一台新型双路服务器还可以拥有多达七个 PCI-E 3.0 插槽，这相比几年前可用的配置，在总
    I/O 容量上是显著的增加。


    这里的主要观点是，现代双路服务器拥有足够的 CPU 容量、内存容量和 I/O 容量来处理极高比例的 SQL Server 工作负载，因此你应该**强烈考虑**选择双路服务器，而不是传统的四路服务器。例外情况是，如果你在**单台服务器**中绝对需要超过
    16 到 32 个物理处理器核心，或超过 768 GB 的 RAM，或超过七个 PCI-E 扩展插槽，并且**无法**将工作负载拆分到多台服务器上。如果上述任何一个条件成立，你可能就不得不升级到更慢且更昂贵的四路数据库服务器。大多数人应该能够将其大部分工作负载运行在现代双路数据库服务器上。


    为了使这个讨论更具体一些，我们可以从 SQL Server 的角度出发，看看戴尔提供的各种第 12 代机架式服务器型号并进行对比。该系列目前有七种型号，从入门级的单路服务器到四路服务器不等。所有这些服务器都使用
    `Intel Xeon E5` 处理器，但不同型号使用该处理器家族的不同系列，这对于 `SQL Server 2012` 的使用来说是一个需要关注的**非常重要的细节**。你也可以用同样的方式轻松比较其他供应商的可用服务器型号。


    ## 戴尔 PowerEdge R320


    该型号服务器采用 `1U` 外形规格，一个处理器插槽，使用 `Intel Xeon E5-2400` 系列处理器，拥有六个内存插槽（使用 `16-GB` DIMM
    时总 RAM 为 `96 GB`），八个 `2.5 英寸` 驱动器托架，以及一个 `PCI-E 3.0 x8` 和一个 `PCI-E 3.0 x16` 扩展插槽。就
    `SQL Server 2012` 核心许可而言，它总计有四个、六个或八个物理核心。在启用 `Intel` 超线程的情况下，总计有八个、十二个或十六个逻辑核心。


    `R320` 对于某些较小的工作负载来说是一个有趣的选择，因为它使用的是 `Xeon E5-2400` 系列的 `Sandy Bridge-EN` 处理器（通常用于双路系统），而不是大多数新型单路服务器中使用的
    `Xeon E3-1200 Sandy Bridge` 或 `Xeon E3-1200 v2` 系列 `Ivy Bridge` 处理器。这使得你可以使用高达
    `96 GB` 的 `RAM`，而不是局限于 `32 GB`，并且最多可拥有八个物理处理器核心，而不是局限于四个物理处理器核心。这样做的缺点是，与 `E3-1200`
    系列处理器相比，`E5-2400` 系列的处理器时钟速度较慢，这意味着你会看到较慢的单线程性能。`R320` 可能是 `DW`（数据仓库）类型工作负载的一个好选择，因为额外的处理器核心和更高的内存容量在这里会更有用。对于小型
    `OLTP`（联机事务处理）工作负载，采用 `Intel E3-1200 v2` 系列处理器的单路服务器会更好。请记住，`SQL Server 2012`
    标准版限制为 `64 GB` 的 `RAM`。


    ## 戴尔 PowerEdge R420


    该型号服务器采用 `1U` 外形规格，两个处理器插槽，使用 `Intel Xeon E5-2400` 系列处理器。它还拥有十二个内存插槽（使用 `16-GB`
    DIMM 时总 RAM 为 `192 GB`），八个 `2.5 英寸` 驱动器托架，以及两个 `PCI-E 3.0 x16` 扩展插槽。就 `SQL Server
    2012` 核心许可而言，它总计有八个、十二个或十六个物理核心。在启用 `Intel` 超线程的情况下，总计有十六个、二十四个或三十二个逻辑核心。


    该型号对于 `SQL Server 2012` 来说是一个**糟糕的选择**。与 `Xeon E5-2600` 系列的 `Sandy Bridge-EP`
    处理器相比，`Xeon E5-2400` 系列的 `Sandy Bridge-EN` 处理器非常有限。它的时钟速度较慢，内存带宽较低，内存容量也较小。因为无论处理器中的物理核心类型如何，每个
    `SQL Server 2012` 核心许可的费用是相同的，所以 `E5-2400` 系列与 `E5-2600` 系列相比是一个糟糕的选择。该型号服务器的另一个问题是它只有两个
    `PCI-E` 扩展插槽和八个内置驱动器托架，这限制了你的整体 `I/O` 容量和性能。


    ## 戴尔 PowerEdge R520


    该型号服务器采用 `2U` 外形规格，两个处理器插槽，使用 `Intel Xeon E5-2400` 系列处理器。它还拥有十二个内存插槽（使用 `16-GB`
    DIMM 时总 RAM 为 `192 GB`），八个 `3.5 英寸` 驱动器托架，以及三个 `PCI-E 3.0 x8` 和一个 `PCI-E 3.0 x16`
    扩展插槽。就 `SQL Server 2012` 核心许可而言，它总计有八个、十二个或十六个物理核心。在启用 `Intel` 超线程的情况下，总计有十六个、二十四个或三十二个逻辑核心。


    该型号对于 `SQL Server 2012` 同样是一个**糟糕的选择**，因为它使用了与 `R420` 相同的 `Intel Xeon E5-2400`
    系列处理器。它确实有四个 `PCI-E` 扩展插槽，这对于 `I/O` 容量和性能来说稍好一些。尽管如此，我仍然建议避免将 `R420` 和 `R520`
    型号用于 `SQL Server`。


    ## 戴尔 PowerEdge R620


    该型号服务器采用 `1U` 外形规格，两个处理器插槽，使用 `Intel Xeon E5-2600` 系列处理器。它拥有二十四个内存插槽（使用 `16-GB`
    DIMM 时总 RAM 为 `384 GB`），十个 `2.5 英寸` 驱动器托架，以及一个 `PCI-E 3.0 x8` 和两个 `PCI-E 3.0 x16`
    扩展插槽。就 `SQL Server 2012` 核心许可而言，它同样总计有八个、十二个或十六个物理核心。在启用 `Intel` 超线程的情况下，总计有十六个、二十四个或三十二个逻辑核心。


    与 `R420` 或 `R520` 相比，`R620` 对于 `SQL Server 2012` 来说是一个**好得多的选择**，因为它使用了 `Intel
    Xeon E5-2600` 系列的 `Sandy Bridge-EP` 处理器。与 `Xeon E5-2400` 系列的 `Sandy Bridge-EN`
    处理器相比，这个处理器系列提供了更高的时钟速度、更高的内存带宽和更高的内存容量。`R620` 仅限于三个 `PCI-E` 扩展插槽，但它确实有十个内部驱动器托架。总体而言，它是一个适合用作入门级双路数据库服务器的好型号。

