    function, the index handle for the missing index recommendation is required in
    any queries, such as the example in Listing 7-2\. While not especially useful
    for retrieving the recommendations in a single row, it can be useful when needing
    the columns for the recommendations returned in separate columns, such as those
    in Figure 7-1.


