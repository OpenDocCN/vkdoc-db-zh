  trans: "\n在每个环境中，保留最常执行的 `SQL` 语句之执行计划的 `XML` 归档是一项最佳实践。\n\n-   为任何执行计划创建 `XML`\
    \ 都会消耗大量的 `CPU` 资源。如果你在生产系统上执行此操作，我建议在非高峰时段进行。\n-   当性能发生变化时，你可以利用执行计划中的数据进行比较，从而对比性能变化并精确定位问题。\n\
    -   查询计划是基于首次查询执行时输入的参数生成的。`SQL Server` 将此称为 `参数探测`。所有后续执行都将使用此计划，无论其参数值是否与原始值匹配。\n\
    -   如果一组不佳的参数被保存到基础执行计划中，这不仅可能导致原始执行出现问题，还可能影响所有后续执行。由于你可以在执行计划的 `XML` 中查看到此信息，因此当你对某个查询有疑虑时，知道如何查看这些数据会非常有帮助。\n\
    -   如果你确实怀疑存在问题，可以找到正确的计划并使用 `OPTIMIZE FOR` 提示来强制使用它。\n\n## 优化性能\n\n有许多查询通过连接\
    \ `DMVs` `dm_exec_query_stats` 和 `dm_exec_sql_text`，为 `DBA` 提供有关性能不佳的信息。以下是我个人收藏的一组查询集，用于定位和排查性能问题。\n\
    \n`Top 1000 Poor Performing` 是一个会生成大型报告的脚本，展示了环境中执行情况最差的代码；在许多环境中，它也会显示一些问题较少的执行代码。这让你能够深入了解环境中执行了哪些代码，其中多少是高影响的，多少是标准处理和日常查询。\n\
    \n```sql\nSELECT TOP 1000\n    [Object_Name] = object_name(dest.objectid),\n \
    \   ![Image 44](img/index-94_1.png)\n    chapter 4 ■ Dynamic management Views\n\
    \    creation_time,\n    last_execution_time,\n    total_cpu_time = total_worker_time\
    \ / 1000,\n    avg_cpu_time = (total_worker_time / execution_count) / 1000,\n\
    \    min_cpu_time = min_worker_time / 1000,\n    max_cpu_time = max_worker_time\
    \ / 1000,\n    last_cpu_time = last_worker_time / 1000,\n    total_time_elapsed\
    \ = total_elapsed_time / 1000 ,\n    avg_time_elapsed = (total_elapsed_time /\
    \ execution_count) / 1000,\n    min_time_elapsed = min_elapsed_time / 1000,\n\
    \    max_time_elapsed = max_elapsed_time / 1000,\n    avg_physical_reads = total_physical_reads\
    \ / execution_count,\n    avg_logical_reads = total_logical_reads / execution_count,\n\
    \    execution_count,\n    SUBSTRING(dest.text, (deqs.statement_start_offset/2)\
    \ + 1,\n        (\n            (\n                CASE statement_end_offset\n\
    \                    WHEN -1 THEN DATALENGTH(dest.text)\n                    ELSE\
    \ qs.statement_end_offset\n                END\n                - deqs.statement_start_offset\n\
    \            ) /2\n        ) + 1\n    ) as statement_text\nFROM sys.dm_exec_query_stats\
    \ deqs\nCROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) dest\nWHERE Object_Name(st.objectid)\
    \ IS NOT NULL\n--AND DB_NAME(dest.dbid) = 5\nORDER BY db_name(dest.dbid),\n  \
    \  total_worker_time / execution_count DESC;\n```\n\n当你执行此查询时，它会返回前 `1000` 个存储过程或进程，并按照实际的过程调用分解性能影响，列出来自该过程或复杂问题过程的违规代码，如\
    \ `图 4-8` 所示。\n\n**`图 4-8.`** 查询返回的前 1000 条 SQL 语句文本结果。\n![Image 45](img/index-95_1.png)\n\
    chapter 4 ■ Dynamic management Views\n\n你还可以利用 `dm_exec_query_stats` 和 `dm_exec_sql_text`\
    \ 之间的各种联接，通过平均 `CPU` 时间和 `SQL` 文本清晰地识别语句，这是在研究性能不佳的 `SQL` 时需要注意的两个最重要方面。以下是一个示例：\n\
    \n```sql\nSELECT TOP 5\n    total_worker_time/execution_count 'Avg CPU Time',\n\
    \    SUBSTRING(dest.text, (deqs.statement_start_offset/2)+1,\n        ((CASE deqs.statement_end_offset\n\
    \            WHEN -1 THEN DATALENGTH(dest.text)\n            ELSE deqs.statement_end_offset\n\
    \        END - deqs.statement_start_offset)/2) + 1)statement_text\nFROM sys.dm_exec_query_stats\
    \ deqs\nCROSS APPLY sys.dm_exec_sql_text(qs.sql_handle) dest\nORDER BY total_worker_time/execution_count\
    \ DESC;\n```\n"
- fmt: "# Chapter 4: Dynamic Management Views\n\nThe results are shown in Figure 4-9.\n\
    \n**Figure 4-9.** The top five offending statements, ordered by average CPU time.\
    \ This query is based on the \"top 20,\" which results in a more defined report\
    \ for the DBA to inspect and clear CPU-intensive resource data that is important\
    \ in terms of performance.\n\nAlways remember, CPU is everything in a SQL Server\
    \ environment. The output from many of the performance queries in this section\
    \ of the chapter gives the DBA a clear view of what statements are the largest\
    \ impact on this important resource usage.\n\n```sql\nSELECT TOP 20 deqt.text\
    \ AS 'Name',\n    deqs.total_worker_time AS 'TotalWorkerTime',\n    deqs.total_worker_time/deqs.execution_count\
    \ AS 'AvgWorkerTime',\n    deqs.execution_count AS 'Execution Count',\n    ISNULL(deqs.execution_count/DATEDIFF(Second,\
    \ deqs.creation_time, GetDate()), 0) AS 'Calls/Second',\n    ISNULL(deqs.total_elapsed_time/deqs.execution_count,\
    \ 0) AS 'AvgElapsedTime',\n    deqs.max_logical_reads, deqs.max_logical_writes,\n\
    \    DATEDIFF(Minute, deqs.creation_time, GetDate()) AS 'Age in Cache'\nFROM sys.dm_exec_query_stats\
    \ AS deqs\nCROSS APPLY sys.dm_exec_sql_text(deqs.sql_handle) AS deqt\nWHERE deqt.dbid\
    \ = db_id()\nORDER BY deqs.total_worker_time DESC;\n```\n\nThe results of this\
    \ query are shown in Figure 4-10.\n\n![Image 46](index-96_1.png)\n\n**Figure 4-10.**\
    \ CPU usage, time, and reads, broken down by averages, minimums, and maximums.\n\
    \n## Inspecting Performance Stats\n\nGenerating useful performance stats have\
    \ been a common challenge for SQL Server DBAs. DMVs offer another option for extracting\
    \ information that provides clear answers that can then be viewed in a user-friendly\
    \ XML format.\n\nPerformance statistics can come in many forms- physical reads,\
    \ logical reads, elapsed time and others. The following query is an excellent\
    \ demonstration of high-level performance statistics in a MSSQL environment.\n\
    \n```sql\nSELECT dest.dbid\n    ,dest.[text] AS Batch_Object,\n    SUBSTRING(dest.[text],\
    \ (deqs.statement_start_offset/2) + 1,\n        ((CASE deqs.statement_end_offset\n\
    \            WHEN -1 THEN DATALENGTH(dest.[text]) ELSE deqs.statement_end_offset\
    \ END\n            - deqs.statement_start_offset)/2) + 1) AS SQL_Statement\n \
    \   , deqp.query_plan\n    , deqs.execution_count\n    , deqs.total_physical_reads\n\
    \    ,(deqs.total_physical_reads/deqs.execution_count) AS average_physical_reads\n\
    \    , deqs.total_logical_writes\n    , (deqs.total_logical_writes/deqs.execution_count)\
    \ AS average_logical_writes\n    , deqs.total_logical_reads\n    , (deqs.total_logical_reads/deqs.execution_count)\
    \ AS average_logical_lReads\n    , deqs.total_clr_time\n    , (deqs.total_clr_time/deqs.execution_count)\
    \ AS average_CLRTime\n    , deqs.total_elapsed_time\n    , (deqs.total_elapsed_time/deqs.execution_count)\
    \ AS average_elapsed_time\n    , deqs.last_execution_time\n    , deqs.creation_time\n\
    FROM sys.dm_exec_query_stats AS deqs\nCROSS apply sys.dm_exec_sql_text(deqs.sql_handle)\
    \ AS dest\nCROSS apply sys.dm_exec_query_plan(deqs.plan_handle) AS deqp\nWHERE\
    \ deqs.last_execution_time > DATEADD(HH,-2,GETDATE())\nAND dest.dbid = (SELECT\
    \ DB_ID('AdventureWorks2012'))\nORDER BY execution_count\n```\n\n![Image 47](index-97_1.png)\n\
    \n![Image 48](index-97_2.png)\n\nFigure 4-11 shows the results of this query.\n\
    \n**Figure 4-11.** XML query plan links offered through DMVs that open a browser\
    \ to the showplan for each statement and provide more defined performance data.\n\
    \n## Top Quantity Execution Counts\n\nAs any performance-oriented DBA knows, it’s\
    \ not just how long a query executes, but the concurrency or quantity of executions\
    \ that matters when investigating performance issues. DMVs provide this information\
    \ and, in more recent releases, inform you of how complete the data is with regard\
    \ to concurrency issues, which can be essential to performing accurate data collection.\n\
    \n```sql\nSELECT TOP 100 deqt.text AS 'Name',\n    deqs.execution_count AS 'Execution\
    \ Count',\n    deqs.execution_count/DATEDIFF(Second, deqs.creation_time, GetDate())\
    \ AS 'Calls/Second',\n    deqs.total_worker_time/deqs.execution_count AS 'AvgWorkerTime',\n\
    \    deqs.total_worker_time AS 'TotalWorkerTime',\n    deqs.total_elapsed_time/deqs.execution_count\
    \ AS 'AvgElapsedTime',\n    deqs.max_logical_reads, deqs.max_logical_writes, deqs.total_physical_reads,\n\
    \    DATEDIFF(Minute, deqs.creation_time, GetDate()) AS 'Age in Cache'\nFROM sys.dm_exec_query_stats\
    \ AS deqs\nCROSS APPLY sys.dm_exec_sql_text(deqs.sql_handle) AS deqt\nWHERE deqt.dbid\
    \ = db_id()\nORDER BY deqs.execution_count DESC\n```\n\nThe results of this query\
    \ are shown in Figure 4-12. They show that a process has performed a full scan\
    \ on the `HumanResources.employee` table 10,631 times, and they show the average\
    \ worker time, average elapsed time, and so forth.\n\n**Figure 4-12.** Highly\
    \ concurrent SQL; note the average elapsed time versus. the number of executions\
    \ shown in the Execution Count column.\n\n![Image 49](index-98_1.png)\n\n## Physical\
    \ Reads\n\nAnother area of high cost to performance is I/O. Having a fast disk\
    \ is important, and as SQL Server moves deeper into data warehousing, having a\
    \ faster disk and fewer I/O waits are both important to performance.\n\nThere\
    \ is a cost to all reads, regardless of whether they are physical or logical,\
    \ so it is crucial that the DBA be aware of both.\n\n```sql\nSELECT TOP 20 deqt.text\
    \ AS 'SP Name',\n    deqs.total_physical_reads,\n    deqs.total_physical_reads/deqs.execution_count\
    \ AS 'Avg Physical Reads',\n    deqs.execution_count AS 'Execution Count',\n \
    \   deqs.execution_count/DATEDIFF(Second, deqs.creation_time, GetDate()) AS 'Calls/Second',\n\
    \    deqs.total_worker_time/deqs.execution_count AS 'AvgWorkerTime',\n    deqs.total_worker_time\
    \ AS 'TotalWorkerTime',\n    deqs.total_elapsed_time/deqs.execution_count AS 'AvgElapsedTime',\n\
    \    deqs.max_logical_reads, deqs.max_logical_writes,\n    DATEDIFF(Minute, deqs.creation_time,\
    \ GetDate()) AS 'Age in Cache', deqt.dbid\nFROM sys.dm_exec_query_stats AS deqs\n\
    CROSS APPLY sys.dm_exec_sql_text(deqs.sql_handle) AS deqt\nWHERE deqt.dbid = db_id()\n\
    ORDER BY deqs.total_physical_reads\n```\n\nThe results of this query are shown\
    \ in Figure 4-13.\n\n**Figure 4-13.** Physical and logical read data generated\
    \ by the preceding query.\n\n## Physical Performance Queries\n\nPhysical performance\
    \ tuning involves indexing, partitioning and fragmentation unlike the queries\
    \ in the previous section, which are often used to discover opportunities for\
    \ logical tuning.\n\n### Locating Missing Indexes\n\nWhen SQL Server generates\
    \ a query plan, it determines what the best indexes are for a particular filter\
    \ condition. If these indexes do not exist, the query optimizer generates a suboptimal\
    \ query plan, and then stores information about the optimal indexes for later\
    \ retrieval. The missing indexes feature enables you to access this data so that\
    \ you can decide whether these optimal indexes should be implemented at a later\
    \ date.\n\nHere’s a quick overview of the different missing index DMVs and DMFs:\n\
    \n*   `sys.dm_db_missing_index_details` (DMV) Returns indexes the optimizer considers\
    \ to be missing\n*   `sys.dm_db_missing_index_columns` (DMF) Returns the columns\
    \ for a missing index\n*   `sys.dm_db_missing_index_group_stats` (DMV) Returns\
    \ usage and access details for the missing indexes similar to `sys.dm_db_index_usage_stats`.\n\
    \nThe pertinent columns for these three DMVs and DMFs are covered in Tables 4-6\
    \ through 4-8.\n\nFor these DMVs to be useful, the SQL Server instance must have\
    \ been in service for a solid amount of time. No set amount of time can be given,\
    \ because the level of knowledge of the database professional’s is what determines\
    \ whether sufficient processing has occurred to provide the DMVs with accurate\
    \ data. If the server has just been cycled, you will be disappointed with the\
    \ results. The only way SQL Server can tell you if indexes are used or missing\
    \ is if the server has had time to collect that information."
