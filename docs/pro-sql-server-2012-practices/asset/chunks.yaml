    \ status = N'suspended';\n```\n图 4-4 显示了一个被阻塞会话的结果示例。\n\n**图 4-4.** 显示阻塞会话的输出示例。\n\
    \n在图 4-4 所示的场景中，你可以看到被阻塞的会话（56）被会话 ID 54 阻塞，原因是对同一行进行更新（`LCK_M_U`），并且它在锁被提交或回滚之前一直处于挂起状态。你现在可以确定\
    \ `transaction_id`，该 ID 也可用于与辅助动态管理视图联接以获取更多信息。\n\n## 锁升级\n\n锁升级是 SQL Server 中增强的功能之一，微软为此投入了大量时间。当问题确实出现时，数据库管理员理解正在发生的事情以及如何处理锁升级问题至关重要。如果你的某个数据库确实遇到了锁问题，以下查询使用\
    \ `dm_trans_lock` 动态管理视图，从相关数据库返回有关锁状态的信息。\n```sql\nSELECT resource_type,\n  \
    \     resource_associated_entity_id,\n       request_status,\n       request_mode,\n\
    \       request_session_id,\n       resource_description\nFROM sys.dm_tran_locks\n\
    WHERE resource_database_id = <DBID>\n```\n图 4-5 显示了此查询的结果。\n\n![Image 41](img/index-89_1.png)\n\
    \n**图 4-5.** SQL Server 中显示的锁升级信息演示。\n\n在图 4-5 中，你可以看到会话 ID 54 和 56 之间正在进行一个锁升级。`resource_associated_entity_id`（Employee\
    \ 表）上的“页”升级也涉及到了索引（`IX`, `KEY`）。务必注意对象和键的升级。锁升级在 SQL Server 中应该无缝工作，当问题出现时，应首先检查代码和统计信息以寻找改进机会。\n\
    \n识别锁状态类型，包括锁模式和锁所在的事务状态，处理已经升级并产生问题的锁，是数据库管理员工作的相关部分。现在收集锁信息很简单——你可以通过将 `dm_tran_locks`\
    \ 动态管理视图与 `dm_os_waiting_tasks` 动态管理视图联接来实现，如下所示：\n```sql\nSELECT dtl.resource_type,\n\
    \       dtl.resource_database_id,\n       dtl.resource_associated_entity_id,\n\
    \       dtl.request_mode,\n       dtl.request_session_id,\n       dowt.blocking_session_id\n\
    FROM sys.dm_tran_locks as dtl\nINNER JOIN sys.dm_os_waiting_tasks as dowt\nON\
    \ dtl.lock_owner_address = dowt.resource_address\n```\n\n## 查找性能不佳的 SQL\n\n作为一名性能调优数据库管理员，我发现下一节中的动态管理视图是我最常用的几个。这些动态管理视图是任何寻找\
    \ SQL Server 计划缓存性能问题的数据库管理员最常查询的。通过这些查询，你可以查看关于执行时间、CPU 资源使用情况和执行次数等聚合数据。\n"
- fmt: "# Chapter 4: Dynamic Management Views\n\n## DMV视图相对于传统方法的改进\n\n这种视图相较于DBA在2005年之前版本的SQL\
    \ Server中用来定位问题的“巫术”有什么改进？\n\n*   它将每个存储过程及其调用隔离出来，以识别每个过程对环境的影响。这可能导致结果集中为同一个过程显示多行数据。\n\
    *   与`SQL Profiler`不同，它能立即隔离出问题。\n*   在对其执行查询之前，配合使用`DBCC_FREEPROCCACHE`，它能产生令人印象深刻的结果。\n\
    *   它可用于创建环境性能快照，以便在出现性能问题时留存供审查。\n*   它能轻松隔离性能调优的首要机会，使DBA能够精确定位性能问题——不再需要猜测。\n\
    *   并非所有查询都会出现在此视图中。在执行时重新编译的SQL可能会绕过此视图的结果。（你需要启用`StmtRecompile`来验证。）\n*   它可与多种SQL\
    \ Server性能工具套件（如`DB Artisan`、`Performance Dashboard`、`Toad`等）结合使用。然而，这些工具可能无法像查询该视图那样，为DBA提供完全的访问权限。\n\
    \n## DMV性能数据不完全准确时的情况\n\n以下是当DMV中的性能数据并非100%准确时会发生的情况：\n\n*   从缓存中移除编译计划将导致查询计划对应的行也从DMV中移除。\n\
    *   结果只会*在*查询执行成功完成后才显示在此DMV中，因此任何仍在执行或运行时间较长的SQL都可能因此而被遗漏。\n*   循环重启SQL Server或硬件服务中断也会导致DMV中对应的行被移除。\n\
    \n## 定位性能问题的常用DMV\n\n定位SQL性能问题最常用的方法是使用`dm_exec_sql_text`、`dm_exec_query_plan`和`dm_exec_query_stats`这几个DMV。将它们连接起来，可以为DBA提供关于数据库最准确的信息。表4-3至4-5列出了这些DMV中最常用的列。\n\
    \n**表 4-3.** `dm_exec_sql_text`的常用列\n\n| **列名** | **检索的数据** |\n| :--- | :--- |\n\
    | `dbid` | 数据库的ID |\n| `objectid` | 对象的标识ID |\n| `number` | 对于编号存储过程；检查系统对象`sys.numbered_procedures`\
    \ |\n| `text` | 查询的实际文本 |\n\n**表 4-4.** `dm_exec_query_plan`的常用列\n\n| **列名** |\
    \ **检索的数据** |\n| :--- | :--- |\n| `dbid` | 数据库的ID |\n| `objectid` | 对象的标识ID |\n\
    | `number` | 对于编号存储过程；检查系统对象`sys.numbered_procedures` |\n| `query_plan` | 包含查询执行计划编译时的执行计划，以XML格式存储，对应`plan_handle`。\
    \ |\n\n**表 4-5.** `dm_exec_query_stats`的常用列\n\n| **列名** | **检索的数据** |\n| :---\
    \ | :--- |\n| `sql_handle` | 查询或过程的标识句柄 |\n| `plan_handle` | 计划的标识句柄，常与`dm_exec_query_plan`\
    \ DMV连接以显示查询计划 |\n| `total_worker_time` | 总的CPU时间（微秒） |\n| `min_worker_time` |\
    \ 单次执行的最小CPU时间（微秒） |\n| `max_worker_time` | 单次执行的最大CPU时间（微秒） |\n| `total_physical_reads`\
    \ | 物理读取的总次数 |\n| `total_elapsed_time` | 完成的总耗时（微秒） |\n\n## 利用DMV性能脚本的强大功能\n\n\
    在任何给定的数据库中定位前10个性能挑战，是在问题出现时可用的强大武器。拥有这些触手可及的数据，可以为DBA、开发人员或应用支持分析师提供关于首先调何处以获得最佳结果的宝贵信息。\n\
    \n```sql\nSELECT TOP 10\n    dest.text AS sql,\n    deqp.query_plan,\n    creation_time,\n\
    \    last_execution_time,\n    execution_count,\n    (total_worker_time / execution_count)\
    \ AS avg_cpu,\n    total_worker_time AS total_cpu,\n    last_worker_time AS last_cpu,\n\
    \    min_worker_time AS min_cpu,\n    max_worker_time AS max_cpu,\n    (total_physical_reads\
    \ + total_logical_reads) AS total_reads,\n    (max_physical_reads + max_logical_reads)\
    \ AS max_reads\n```"
  raw: 'How is this view an improvement over the voodoo that DBAs used to perform
    to locate issues in versions of SQL Server prior to 2005?


    •


    It isolates each procedure and procedure call to identify how each one impacts
    the environment. This can result in multiple rows for the same procedure in the
    result set.


    •


    It immediately isolates an issue, unlike the SQL Profiler.


    •


    It produces impressive results when you use it with the DBCC_FREEPROCCACHE before


    executing queries against it.


    •


    It can be used to create performance snapshots of an environment to retain for


    review when performance issues arise.


    •


    It makes it easy to isolate top opportunities for performance tuning, allowing
    the DBA to pinpoint performance issues—no more guessing.


    •


    Not all queries show up in this view. SQL that is recompiled at the time of execution
    can circumvent the view results. (You need to enable StmtRecompile to verify.)


    •


    It can be used with a multitude of SQL Server performance tool suites (such as
    DB


    Artisan, Performance Dashboard, Toad, and so forth). However, these tools might


    not give you the full access that querying the view might grant to a DBA.


    Here is what happens when performance data with DMVs isn’t 100 percent accurate:


    •


    Removing the compiled plan from cache will result in the corresponding rows for


    the query plan being removed from the DMV as well.


    •


    Results will show in this DMV only *after* the query execution has successfully
    completed, so any SQL that is still executing or long-running queries can be missed
    because of this fact.


    •


    Cycling the SQL Server or any interruption in service to the hardware will remove


    the corresponding rows from the DMV as well.


    The most common method of locating performance issues with SQL is by using the
    dm_exec_sql_text, dm_exec_query_plan, and dm_exec_query_stats DMVs, which are
    joined together to give DBAs the most accurate information about the database.
    Tables 4-3 through 4-5 list the columns most commonly used of these DMVs.


    ***Table 4-3.** Common columns used for dm_exec_sql_text.*


    **Column**


    **Data Retrieved**


    dbid


    The ID for the database


    objectid


    The identifying ID of the object


    number


    For a numbered stored procedure; check the system object sys.numbered_procedures


    text


    The actual text from the query


    ***Table 4-4.** Common columns used for dm_exec_query_plan.*


    **Column**


    **Data Retrieved**


    dbid


    The ID for the database


    chapter 4 ■ Dynamic management Views


    **Column**


    **Data Retrieved**


    objectid


    The identifying ID of the object


    number


    For a numbered stored procedure; check the system object sys.numbered_procedures


    query_plan


    Contains the show plan at the compile time of the query execution plan with the


    plan_handle in XML format.


    ***Table 4-5.** Common columns used by dm_exec_query_stats.*


    **Column**


    **Data Retrieved**


    sql_hande


    The identifying handle for the query or procedure


    plan_handle


    The identifying handle for the plan, which is often joined to the dm_exec_


    query_plan DMF to show the query plan


    total_worker_time


    The total amount of CPU time in microseconds


    min_worker_time


    The minimum CPU time in microseconds for an execution


    max_worker_time


    The maximum CPU time in microseconds for an execution


    total_physical_reads


    The total number of physical reads


    total_elapsed_time


    The total time elapsed in microseconds for completion


    Using the Power of DMV Performance Scripts


    Locating the top 10 performance challenges in any given database can be a powerful
    weapon to use when issues arise. Having this data at your fingertips can provide
    the DBA, developer, or application-support analyst with valuable data about where
    to tune first to get the best results.


    SELECT TOP 10 dest.text as sql,


    deqp.query_plan,


    creation_time,


    last_execution_time,


    execution_count,


    (total_worker_time / execution_count) as avg_cpu,


    total_worker_time as total_cpu,


    last_worker_time as last_cpu,


    min_worker_time as min_cpu,


    max_worker_time as max_cpu,


    (total_physical_reads + total_logical_reads) as total_reads,


    (max_physical_reads + max_logical_reads) as max_reads,'
