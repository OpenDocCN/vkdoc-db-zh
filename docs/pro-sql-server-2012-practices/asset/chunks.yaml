  trans: "\n# 第四章：动态管理视图\n\n## 分区统计信息\n\n图 4-17 中所示的索引是我专门为这个查询创建的。它从未被使用过，并且是建立在\
    \ `Persons` 表的 `MiddleName` 列上。这看起来可能是一个荒谬的索引，但它并不是我发现的需要移除的最糟糕的索引。需要注意的重要一点是，你应该至少监控未使用索引一个月的时间。随着新的对象和索引被部署到一个环境中，它们可能暂时不会被调用（也就是说，对象已经发布，但会调用该索引的应用程序代码要稍后才发布，等等）。在选择要移除的索引时，必须牢记这些场景，因为移除一个需要的索引可能对用户或应用程序产生严重的性能影响。\n\
    \n报告分区统计信息可以为数据库管理员（DBA）提供相关的日常数据存储信息、性能信息等。了解如何与系统表（如 `sys.partitions`）进行连接非常重要，因为它可以为数据库专业人员提供更有价值的数据，同时也能审查空间使用情况和大型对象（LOB）信息。\n\
    \n动态管理视图（DMV）将只为每个分区显示一行。这使得 DMV 可以简化对任何给定对象的分区计数查询。对于维护工作极为重要的行溢出数据，也可以轻松地从 DMV\
    \ 中提取。\n\n查询分区统计信息 DMV 可以提供包含向下钻取列表、页和行计数信息的高命中率分区。然后可以使用 `OBJECT_ID` 函数通过名称从视图中识别对象。\n\
    \n获取有关堆或聚集索引上已使用页数和行数的信息可能具有挑战性，但如果你使用以下查询则不会：\n\n```sql\nSELECT SUM(used_page_count)\
    \ AS total_number_of_used_pages,\n       SUM (row_count) AS total_number_of_rows\n\
    FROM sys.dm_db_partition_stats\nWHERE object_id=OBJECT_ID('Person.Person')\n \
    \ AND (index_id=0\n       or index_id=1)\n```\n\n图 4-18 显示了结果。\n\n图 4-18. 分区索引上的统计信息。\n\
    \n定位具有最大行数的分区可以为你提供有关未来分区需求的相关数据。在决定是否创建子分区时，这些数据可能非常有帮助。\n\n```sql\nSELECT OBJECT_NAME(object_id)\
    \ AS tableName,\n       sys.dm_db_partition_stats.row_count\nFROM sys.dm_db_partition_stats\n\
    WHERE index_id < 2\nORDER BY sys.dm_db_partition_stats.row_count DESC\n```\n\n\
    结果如图 4-19 所示。\n\n![Image 55](img/index-104_1.png)\n\n图 4-19. 分区上的行计数。\n\n## 系统性能调优查询\n\
    \n系统请求通常与操作系统等待 DMV（称为*操作系统等待*）连接，以便为 DBA 提供 SQL Server 环境中正在发生情况的清晰视图。过去 DBA\
    \ 依赖 `sp_who` 和 `sp_who2` 中的信息，现在他们可以使用 DMV 中的信息，并对 SQL Server 环境中的系统信息数据进行明确的控制。\n\
    \n### 关于系统性能 DMV 你需要知道的\n\n任何数据库专业人员都会欣赏用于替换 `sp_blocker` 和 `sp_who2` 的 DMV 查询。你现在可以请求阻塞的\
    \ `session_ids` 并更快地定位问题，同时利用 DMV 获取扩展数据。\n\n在连接到 `dm_exec_requests` 时，务必验证 `blocking_session_id`。与任何时间敏感的视图一样，你需要确保在阻塞会话结果中拥有最新的信息。\n\
    \n现在可以为重组索引、备份数据库、执行某些 `DBCC` 过程以及回滚等任务检索 `Percent_complete` 和 `estimated_completion_time`。在过去，这些数据是不可用的。\n\
    \n请记住，以下查询使用的数据不必等待数据库服务器或服务循环才能清除。数据也可以通过运行 `DBCC FREEPROCCACHE` 来清除。\n\n###\
    \ 会话和完成百分比\n\n能够跟踪会话并获取有关已登录会话的信息（例如它是否处于活动状态，如果是，进程完成度如何）是大多数 DBA 每天面对的任务。DMV\
    \ 以一种简单、易于阅读的格式提供这些信息，该格式侧重于会话 ID 以及包含 SQL 语句文本和完成百分比的结果：\n\n```sql\nSELECT der.session_id,\n\
    \       sql.text,\n       der.start_time,\n       des.login_name,\n       des.nt_user_name,\n\
    \       der.percent_complete,\n       der.estimated_completion_time\nfrom sys.dm_exec_requests\
    \ der\njoin sys.dm_exec_sessions des on der.session_id = des.session_id\ncross\
    \ apply sys.dm_exec_sql_text(plan_handle) sql\nwhere der.status = 'running'\n\
    ```\n\n图 4-20 显示了此查询的结果。\n\n图 4-20. 定位所有可用请求及其完成百分比。\n\n以下查询定位所有活动查询，包括被阻塞的会话信息：\n\
    \n```sql\nSELECT der.session_id as spid,\n       sql.text as sql,\n       der.blocking_session_id\
    \ as block_spid,\n       case when derb.session_id is null then 'unknown' else\
    \ sqlb.text end as block_sql,\n       der.wait_type,\n       (der.wait_time /\
    \ 1000) as wait_time_sec\nFROM sys.dm_exec_requests der\nLEFT OUTER JOIN sys.dm_exec_requests\
    \ derb on der.blocking_session_id = derb.session_id\nCROSS APPLY sys.dm_exec_sql_text(der.sql_handle)\
    \ sql\nCROSS APPLY sys.dm_exec_sql_text(isnull(derb.sql_handle,der.sql_handle))\
    \ sqlb\nwhere der.blocking_session_id > 0\n```\n\n图 4-21 显示了此查询的结果。\n\n图 4-21.\
    \ 定位所有活动查询，包括被阻塞的会话信息。\n\n可以连接两个 DMV——`dm_os_tasks` 和 `dm_os_threads`——来识别 SQL\
    \ Server 会话 ID 与 Microsoft Windows 线程 ID 的对应关系。这样做还有一个额外的好处，即监控性能，并且只返回活动会话。\n\
    \n```sql\nSELECT dot.session_id,\n       dots.os_thread_id\nFROM sys.dm_os_tasks\
    \ AS dot\nINNER JOIN sys.dm_os_threads AS dots\nON dot.worker_address = dots.worker_address\n\
    WHERE dot.session_id IS NOT NULL\nORDER BY dot.session_id;\n```\n\n图 4-22 显示了此查询的结果。\n\
    \n![Image 58](img/index-106_1.png)\n![Image 59](img/index-106_2.png)\n\n图 4-22.\
    \ 查询结果显示 session_id 以及 Windows 中对应的操作系统线程 ID。\n\n当然，大多数调查所需的最重要会话 ID 信息是任何小于 51\
    \ 的会话 ID 的信息。\n\n等待统计信息在任何数据库中都很重要，SQL Server 也不例外。以下 DMV `dm_os_wait_stats` 列出了等待类型，并显示了以秒为单位的等待时间。在任何给定环境中查找前五个等待统计信息时，你会发现这非常有用。\n\
    \n```sql\nSELECT wait_type, (wait_time_ms * .001) wait_time_seconds\nFROM sys.dm_os_wait_stats\n\
    GROUP BY wait_type, wait_time_ms\nORDER BY wait_time_ms DESC\n```\n\n图 4-23 显示了此查询的结果。\n\
    \n图 4-23. SQL Server 中不同等待类型的结果。\n\n在图 4-23 中，没有任何用户进程，只有后台进程，因此以秒为单位的等待时间不是你通常看到的标准事件时间。\n\
    \n深入了解哪些操作系统进程存在问题有时取决于 DBA 的感知和假设。DMV `dm_os_workers` 通过列出每个操作系统会话来消除此任务的猜测成分，指出其中任何一个是否存在实际问题。\n\
    \n```sql\nSELECT dot.session_id,\n       dow.is_sick,\n       dow.is_in_cc_exception,\n\
    \       dow.is_fatal_exception,\n       dow.state,\n       dow.return_code\nFROM\
    \ sys.dm_os_workers dow,\n     sys.dm_os_tasks dot\nwhere dow.worker_address=\
    \ dot.worker_address\n  and dot.session_id is not NULL\n```\n\n结果如图 4-24 所示。\n\
    \n![Image 60](img/index-107_1.png)\n\n图 4-24. 数据库服务器上操作系统进程的运行状况结果。\n\n如果发现前面的任何进程出现故障（即它们显示为\
    \ `is_sick`，`is_`\n"
