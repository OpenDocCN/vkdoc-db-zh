    # 第十八章：峰值负载调优


    ## SQL Server：SQL 统计信息\批处理请求数/秒

    指示 SQL Server 的繁忙程度。同时，请查看 `数据库：事务数/秒`。


    ## SQL Server：SQL 统计信息\SQL 编译数/秒

    编译会消耗资源。需要监控每秒发生的编译次数。


    ## SQL Server：SQL 统计信息\SQL 重编译数/秒

    如果重编译次数超过编译次数的 10%，请研究是否可以通过更改应用程序的调用类型来减少重编译。


    ## SQL Server：等待统计信息（平均等待时间（毫秒））

    SQL Server 中的等待类型告诉您进程正在等待什么资源（CPU 资源除外）。如果一个 SQL Server 进程被调度运行，总时间等于等待时间加上执行时间。


    ## 存储：逻辑磁盘(*)\% 空闲时间

    通过查看 `% 空闲时间`，您可以判断磁盘的繁忙程度。磁盘繁忙并不意味着它速度慢。您还需要同时考虑 `平均磁盘秒数/读取` 和 `平均磁盘秒数/写入` 性能指标。


    ## 存储：逻辑磁盘(*) 性能计数器

    一个繁忙的 SQL Server 实例要求平均读写时间低于 20 毫秒。事务日志应放置在快速磁盘上，平均写入时间应低于 10 毫秒。相关计数器包括：

    - `逻辑磁盘(*)\平均磁盘秒数/读取`

    - `逻辑磁盘(*)\平均磁盘秒数/写入`

    - `逻辑磁盘(*)\磁盘字节数/秒`

    - `逻辑磁盘(*)\磁盘读取数/秒`

    - `逻辑磁盘(*)\磁盘写入数/秒`


    ## 6. 计划数据收集器

    最后一步是计划数据收集器。单击“计划”选项卡，如图 18-5 所示。此选项卡提供了多种计划选项，例如开始日期和过期日期，以及指定时间和日期的选项。您可以使用此选项卡上的选项，在周末或非高峰时段安排数据收集器运行。要添加计划，请单击“添加”按钮并选择开始日期和过期日期。


    ![Image 205](img/index-447_1.png)

    ![Image 206](img/index-447_2.png)


    **图 18-5.** 从“计划”选项卡访问的、用于数据收集器的“文件夹操作”对话框。


    ## 7. 设置停止条件

    另一个常用的选项卡是“停止条件”，如图 18-6 所示。您可以使用此选项卡定义数据收集器的停止条件。这一点很重要，因为它可以确保数据收集器不会长时间运行，最终导致系统上出现其他问题。遵循的一个常见规则是始终基于时间或文件大小定义停止条件。这可以最大限度地降低数据收集器填满系统分区并导致中断的风险。


    **图 18-6.** 数据收集器的“停止条件”选项卡。


    ## 收集应用程序性能数据

    迄今为止收集的 Perfmon 数据提供了服务器自身性能的视图，但这只是实际情况的一个侧面。这些信息并不能告诉您 SQL Server 正在运行什么类型的代码、来自各个应用程序服务器正在执行什么类型的调用，以及性能是否最优。捕获此类数据的过程称为*应用程序分析*。应用程序分析涉及捕获由执行单个进程操作或最终用户请求所生成的所有应用程序调用。分析应用程序可以为您提供与应用程序性能调优相关的重要数据。这些信息有助于您理解应用程序针对特定请求执行了哪些操作。以下是您在查看应用程序分析数据时需要寻求答案的几个问题。


    > **注意：** 这些应用程序分析问题专注于数据库层。


    - 每个请求执行了多少条数据库语句？

    - 这些数据库语句是单个批处理的一部分，还是每条都是独立的数据库调用？

    - 应用程序是否使用了连接池？如果没有，每个应用程序请求发生了多少次登录/注销事件？

    - 数据库调用是临时的还是存储过程？

    - 是否存在消耗大量物理资源（如 CPU 或 I/O）的语句，或者是否存在长时间运行的语句？


    要分析应用程序，您可以使用 `SQL Server 扩展事件` 来定义自定义跟踪，以捕获应用程序请求和其他相关数据。就像 Perfmon 数据一样，这些数据可以用作应用程序或数据库服务器的基准。


    > **注意：** `SQL Server Profiler` 自 SQL Server 2012 起已弃用，因此建议您开始学习如何使用扩展事件功能。


    在开始之前，您需要定义要捕获的不同类型的数据。通常，为了捕获不同类型的数据，会运行四种跟踪类型，如表 18-5 所示，并附有一些示例指南。


    **表 18-5.** 从 SQL Server 捕获的四种事务活动类型。


    | 名称 | 目标 |

    | :--- | :--- |

    | 错误消息和连接问题 | 通过捕获 `用户错误消息` 和 `注意力` 事件，您可以看到服务器上发生的许多通常不为应用程序开发人员或 DBA 所知的错误。此跟踪的发现通常会添加到您的发现列表中，以便您确定优先级并加以解决。
    |

    | 所有应用程序活动 | 如标题所示，此跟踪在不同时间窗口内捕获几个短时间段内 100% 的调用。此跟踪数据提供了对来自各种应用程序的调用和您指定参数的洞察。
    |

    | 持续时间大于 X 秒 | 根据核心事务的服务级别协议，此跟踪捕获所有运行时间达到或超过 1 秒的语句。此跟踪运行 48 小时或更长时间，具体取决于环境。应用程序调优后，请再次运行此跟踪，并比较性能调优事件前后捕获的语句数量。最终结果应该是长时间运行的语句数量减少。
    |

    | 应用程序分析 | 使用此跟踪来监控核心业务流程，并捕获每个流程的所有数据库调用。您可以使用此数据查看完成一个业务事务生成了多少调用。有些应用程序比其他应用程序更“健谈”，但了解这些信息很有用，因为如果公司拥有代码库并有时间投入这项工作，有时可以减少调用次数。您还可以使用此数据来分析语句，如果它们支持应用程序中的核心业务流程之一，则可以开始调优它们。在此处节省
    100 毫秒或 2000 个 CPU 周期可能对核心业务事务产生巨大影响。请记住，调优事务的一个积极副作用是事务处理更快，最终用户更满意。 |


    使用 `Profiler` 捕获系统活动时，请确保创建服务器端跟踪，并将信息记录到本地文件中。如果可能，请将文件保存到更快的驱动器（特别是不包含被分析数据库的数据和日志文件的驱动器），以提高性能。表
    18-6 是使用 `Profiler` 或 `扩展事件` 时建议捕获的列列表。


    **表 18-6.** 捕获表 18-5 中定义的活动时，要收集的 SQL Server Profiler 和扩展事件属性。


    | SQL Server Profiler 属性 | 扩展事件属性 |

    | :--- | :--- |

    | `应用程序名称` | `client_app_name` |

    | `SPID` | `session_id` |

    | `数据库名称` | `database_name` |

    | `开始时间` | 不适用 |

    | `文本数据` | `statement` |

    | `登录名称` | `server_principal_name` |

    | `CPU` | `cpu_time` |

    | `持续时间` | `Duration` |

    | `读取` | `logical_reads`, `physical_reads` |

    | `写入` | `writes` |


    ![Image 207](img/index-450_1.png)


