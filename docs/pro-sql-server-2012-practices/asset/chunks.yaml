    IF (@@TRANCOUNT > 0) ROLLBACK TRANSACTION\nEndSave:\nGO\n```\n\n在每台服务器上运行此脚本后，剩下的就是测试流程。为了查看我一直在使用的数据库中的变化，我将在该数据库中创建一个表：\n\
    \n```sql\nCREATE TABLE dbo.ChangingData\n(ID INT IDENTITY(1, 1),\n Val VARCHAR(50)\n\
