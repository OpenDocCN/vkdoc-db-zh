    and functions.'
  trans: "\n# 第 5 章：从 SQL 跟踪到扩展事件\n\n![图片 65](img/index-116_1.png)\n\n## SMO 对象模型\n\
    \nSMO 对象模型允许你以编程方式过滤跟踪事件。例如，你可以将持续时间超过 1 秒的事件分离到一个单独的文件中，而将所有其他事件放入另一个文件中。图 5-5\
    \ 展示了该对象模型的样貌。\n\n**图 5-5.** `SMO`对象模型\n\n下面的代码示例展示了如何使用`SMO`读取一个名为`DurationTrace.trc`的现有跟踪文件，并对其进行过滤，只将持续时间超过\
    \ 500 毫秒的语句保存到一个新文件中。`DurationTrace.trc`文件可以通过运行`SQL Profiler`并使用`Duration`模板几分钟来创建。\n\
    \n需要注意的一点是过滤发生的位置。我第一次使用`SMO`进行跟踪时，以为既然我们有一个读取器类和一个写入器类，就必须读取一行跟踪，在那里执行过滤，然后决定是否将其发送给写入器。然而，事实并非如此。你可以将读取器直接流式传输到写入器，而不进行任何过滤。写入器类有一个`WriteNotify`事件。每当从读取器读取一行时，都会调用此事件。在此事件中，你必须执行任何过滤，并决定是跳过该记录还是允许它被写入。这种处理方式对我来说仍然有点反向，但既然事实如此，我们只能接受。这个示例有很好的文档，并不难理解。通过理解类如何组合在一起，你可以直接在`.NET`中构建强大的跟踪解决方案。\n\
    \n但是请注意，这仍然使用了行集提供程序，并且仍然可能丢失事件。\n\n```csharp\nstatic void Main(string[] args)\n\
    {\n    // 创建从现有跟踪文件读取的读取器\n    TraceFile traceFileReader = new TraceFile();\n\
    \    string traceFileReaderPath =\n        Path.Combine(Path.GetDirectoryName(Assembly.GetExecutingAssembly().Location),\n\
    \        \"DurationTrace.trc\");\n    traceFileReader.InitializeAsReader(traceFileReaderPath);\n\
    \n    // 创建带有文件目标的跟踪写入器类\n    string traceFileWriterPath =\n        Path.Combine(Path.GetDirectoryName(Assembly.GetExecutingAssembly().Location),\n\
    \        \"DurationTraceFiltered.trc\");\n    TraceFile traceFileWriter = new\
    \ TraceFile();\n    traceFileWriter.InitializeAsWriter(traceFileReader, traceFileWriterPath);\n\
    \n    // 添加执行过滤的事件\n    traceFileWriter.WriteNotify += new\n        WriteNotifyEventHandler(traceFileWriter_WriteNotify);\n\
    \n    // 只需循环写入器直到结束即可。\n    // 内部会从读取器读取并通过 WriteNotify 事件过滤\n    while (traceFileWriter.Write())\
    \ ;\n\n    // 关闭两者以释放资源\n    traceFileReader.Close();\n    traceFileWriter.Close();\n\
    }\n\nstatic void traceFileWriter_WriteNotify(object sender, TraceEventArgs args)\n\
    {\n    try\n    {\n        object durationInMicroSeconds = args.CurrentRecord[\"\
    Duration\"];\n        if (durationInMicroSeconds == null || (long)durationInMicroSeconds\
    \ < (500\n            /*ms*/ * 1000 /* 转换为微秒*/))\n        {\n            args.SkipRecord\
    \ = true;\n            return;\n        }\n    }\n    catch (Exception ex)\n \
    \   {\n        Console.WriteLine(ex.Message);\n    }\n}\n```\n\n## 跟踪文件提供程序\n\n\
    与之前讨论的行集提供程序不同，文件提供程序直接写入文件，并保证跟踪数据的无损传递。与行集提供程序一样，它使用内部缓冲区来调度跟踪数据。\n\n缓冲区每 4\
    \ 秒刷新一次，通过使用大的块写入来最大化`IO`性能。写入一个大的连续数据块比写入许多小块数据开销更低。由于文件提供程序保证无损传递，它不能丢弃事件，如果事件过多，整个系统可能会停止。这可以通过`sys.dm_os_wait_stats`动态管理视图中不断增加的`SQLTRACE_LOCK`和`IO_COMPLETION`等待来观察。为避免这种情况，切勿将跟踪文件写入与数据库相同的磁盘子系统。使用单独的本地物理磁盘或`UNC`共享。请记住，无论你选择哪种方式，运行`SQL\
