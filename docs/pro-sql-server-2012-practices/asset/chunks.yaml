  trans: '# 第 12 章：面向 DBA 的 Windows Azure SQL Database


    ## 简化的 SQL Database 基础设施


    从安全角度来看，网关会判断连接请求是否来自已批准的互联网协议（IP）地址。实际上，SQL Database 自带内置的 IP 防火墙。如果连接来自未获明确授权的客户端
    IP 地址，该连接将被拒绝。此外，如果同时有过多请求涌入，网关可能会拒绝访问数据库，以试图阻止拒绝服务（DoS）攻击。


    如果连接被授权，网关还会解析传入的语句，以确定是否有特殊命令通过，例如 `CREATE DATABASE`。创建新数据库由 SQL Database 基础设施内的另一个组件处理，因为它会影响计费。


    一旦连接被授权且 `T-SQL` 语句可以被转发到实际的数据库，代理层就会将 `Tabular Data Stream (TDS)` 数据包转发到正确的底层
    `SQL Server` 实例进行处理。


    您还应该注意，通过 SQL Database 无法使用物理上的 master 数据库。


    虽然您可以连接到 master 数据库并执行 `T-SQL` 语句，但您实际上是在与代理层通信。因此，master 数据库是只读的，并且不参与计费。实际上，要创建新数据库，您必须连接到
    master 数据库；要更改防火墙设置，您也需要连接到 master 数据库。


    ![图 140](img/index-302_1.png)


    `图 12-1. 简化的 SQL Database 基础设施和复制拓扑。`


    ## 可用性与故障转移


    您可能在 `图 12-1` 中注意到，图中描绘了三个数据库。您正在连接的 SQL Database 实例被称为*主实例*。为确保高可用性，每个 SQL Database
    实例都会被复制到另外两个实例（称为*辅助实例*）。在 SQL Database 实例上执行的每个操作都涉及两阶段提交；操作完成前，至少有一个辅助实例必须成功提交，这本质上会降低写入速度。这是高可用性优先于纯粹性能的一个例子。


    这种架构的另一个含义是故障转移非常快速且几乎透明。


    因为每个 SQL Database 持续更新主实例的两个副本，所以当主服务器发生严重故障时，可以非常快速地执行故障转移；其中一个辅助实例成为新的主实例。代理层可以检测到故障转移，并将所有新的连接请求重定向到新升级的主数据库。可以想象，应用程序需要考虑连接丢失的情况，并在必要时执行连接重试；出于这个以及许多其他原因，数据库连接重试逻辑现在已成为云端正常编码实践的一部分。


    **注意** 底层的 SQL Database 架构使微软能够几乎悄无声息地推出关键更新和增强功能。


    ## 硬件


    您可能想知道物理服务器的构成、可用内存大小等。在撰写本文时，每台服务器配置为 32 GB 内存、8 个核心和 12 个磁盘。所有运行 SQL Database
    甚至 Windows Azure 的服务器配置都相同，这使得微软在需要时可以轻松地交换资源。


    如前所述，该基础设施是一个共享环境，因此您实际上是在与许多其他客户共享每台机器上的可用资源。由于您的 SQL Database 实例运行在共享基础设施中的商用硬件上，因此通过向服务器添加资源来纵向扩展应用程序已不再可能。然而，SQL
    Database 设计用于横向扩展，其功能称为联合（Federations）。联合是一组协同工作的 SQL Database 实例，用于在多个服务器上水平分布数据，类似于无共享配置，其中每个资源都有自己的
    CPU、内存和磁盘子系统。本章稍后将更详细地介绍联合。


    ## 与 SQL Server 的区别


    您现在知道 SQL Server 是 SQL Database 的基础技术。然而，这并不意味着 SQL Server 的所有功能 SQL Database
    都提供。让我们回顾一下这两个平台之间的主要区别。


    ### 数据库组件


    SQL Database 提供了构成典型 `SQL Server` 安装的组件的一个有限子集。例如，`SQL Server Integration Services`
    不包含在 SQL Database 中。但是，您可以使用本地安装的 `SQL Server Integration Services` 副本连接到 SQL
    Database。因此，在大多数情况下，尽管 `SQL Server` 提供的许多组件在 SQL Database 的云端不可用，但您可以使用安装在本地 `SQL
    Server` 上的组件连接到云端的 SQL Database 实例。


    `表 12-1` 显示了 SQL Database 中支持的组件的摘要。*部分支持* 意味着该组件的部分或大部分功能可以与 SQL Database 一起使用。*不包含*
    意味着没有等效的 Windows Azure 组件。*已包含* 意味着有等效的 Windows Azure 组件，但该组件本身在需要时可以使用 SQL Database。*已替换*
    意味着该组件本身完全不受支持，但 Windows Azure 提供了等效服务。


    `表 12-1. SQL Database 中对 SQL Server 组件的支持情况`


    | **SQL Server 组件** | **SQL Database** |

    | :--- | :--- |

    | 关系引擎 | 部分支持 |

    | SQL Server Reporting Services | 已包含 |

    | SQL Agent | 不包含 |

    | SQL Server Integration Services | 不包含 |

    | SQL Server Analysis Services | 不包含 |

    | SQL Profiler | 不支持 |

    | 复制 | 已替换 |


    Windows Azure 有其自己版本的 Reporting Services。`Windows Azure SQL Reporting` 服务允许公司在云端部署和管理报告，其高可用性和可扩展性是自动配置的。因此，您可以使用本地的
    `SQL Server Reporting Service` 远程连接到 SQL Database，也可以使用作为 Windows Azure 一部分提供的服务。但是，如果使用
    Windows Azure 中的 Reporting 服务，则存在某些限制。例如，`Windows Azure SQL Reporting` 唯一支持的数据源是
    SQL Database。


    ![图 141](img/index-304_1.png)


    SQL Database 不支持复制。但是，另一项名为 `Windows Azure SQL Data Sync` 的功能提供了一种在两个或多个 SQL Database
    实例之间，甚至在 `SQL Server` 数据库和 SQL Database 实例之间传输数据的方式。数据更改可以双向传播。


    ### 管理平台


    使用 `SQL Server` 时，您依赖 `SQL Server Management Studio (SSMS)` 来管理数据库。然而，SQL Database
    附带在线工具来管理云数据库。在撰写本文时，`Windows Azure Management Portal` 用于配置数据库并管理 `Windows Azure
    SQL Reporting` 和 `Windows Azure SQL Data Sync`。由于它们都是 `Windows Azure Management
    Portal` 的一部分，因此您无需再次登录。'
- fmt: '# Chapter 12: Windows Azure SQL Database for DBAs


    The SQL Database Management Portal (SDMP) is a bit different. Because it was built
    as a separate portal entirely, you do need to log in again even if you are already
    logged in to the Windows Azure Management Portal. There are links available from
    the Windows Azure Management Portal to access the database portal. The various
    portals and high-level security requirements are shown in Figure 12-2.


    `Note` Because Windows Azure is a fast-evolving platform, managing resources in
    Windows Azure continues to improve. At the time of this writing, a new Windows
    Azure Management Portal is available as a Preview and is also shown in Figure
    12-2.


    *Figure 12-2. Windows Azure portals.*


    Table 12-2 presents a quick summary of the functions provided by each portal.
    Certain functions do not have a user interface yet, such as managing users and
    object-level security. For the time being, the functions that cannot be performed
    in the SQL Database Management Portal need to be performed in SSMS.


    *Table 12-2. High-level functions performed by each portal*


    | Portal | Functions Provided |

    | :--- | :--- |

    | Windows Azure Management | Create or drop a database. Manage firewall rules.
    View a database connection string. Export or import data. |

    | Windows Azure SQL Reporting | Upload and manage reports. Manage user security.
    View log files. |

    | Windows Azure SQL Data Sync | Create and manage data synchronization between
    databases. View log files. |

    | SQL Database Management | Manage database objects (such as views, tables, and
    stored procedures). View database usage and poorly performing queries. Run T-SQL
    statements. View execution plans. Manage federations. |


    You can also use SSMS to manage your SQL Database instances. As long as you adhere
    to the supported T-SQL syntax and use version 2008 R2 SP1 or higher, you can perform
    all the functions offered by the SQL Database Management Portal. You can check
    the SQL Database T-SQL reference on MSDN at [http://msdn.microsoft.com/en-us/library/windowsazure/ee336281.aspx](http://msdn.microsoft.com/en-us/library/windowsazure/ee336281.aspx).


    For example, to create a 5-GB SQL Database instance in SSMS, you would execute
    the following statement while connected to the master database:

    ```

    CREATE DATABASE mydb1 (MAXSIZE=5GB)

    ```


    ## Security


    When it comes to security, SQL Database provides only a few features, but they’re
    important ones.


    However, at this time, SQL Database does not support certificates for encryption
    at rest. Although the lack of encryption of data at rest has been identified as
    a notable gap in the platform, this gap is currently unavoidable because you would
    need to give Microsoft all the keys necessary to decrypt the data.


    Even when considering the limitation about encryption, SQL Database remains a
    very secure database and offers advanced security mechanisms, as listed in Table
    12-3.


    *Table 12-3. Summary of security features in SQL Database*


    | Security Feature | Description |

    | :--- | :--- |

    | Database Login | The only authentication available against SQL Database is a
    database login. Network-level authentication is not currently available. |

    | Hashing | The same level of hashing that SQL Server has is supported. |

    | SSL Traffic | All traffic to a SQL Database is encrypted using Secure Sockets
    Layer (SSL) certificates. This security feature cannot be turned off. |

    | Object-Level Security | All the traditional object-level security mechanisms
    are available on the objects supported by SQL Database, such as schema-level security.
    |

    | Firewall | SQL Database comes with its own firewall that is configured in the
    master database. The firewall works before database authentication and prevents
    unwanted connections from IP addresses that are not authorized. |


    ## Other Important Information


    So far, I outlined some key differences between SQL Server and SQL Database. There
    are a few additional things you need to know while we are on this topic.


    ### Database Sizes


    SQL Database instances come in specific sizes that map to either the Web Edition
    or the Business Edition.


    For the time being, there is no functional difference between the editions; only
    the database sizes available under each edition vary, as enumerated in Table 12-4.


    *Table 12-4. SQL Database maximum sizes by edition*


    | SQL Database Edition | Database Max Sizes Available |

    | :--- | :--- |

    | Web Edition | 1 and 5 GB |

    | Business Edition | 10, 20, 30, 40, 50, 100, and 150 GB |


    ### Database Version


    If you check the version of a database, you will see that SQL Database is running
    as SQL Server 2012; however, if you check the compatibility mode of a database,
    you will soon realize that the database instance itself is running in SQL 2008
    backward-compatibility mode. This means that while SQL Database is running on
    the SQL Server 2012 platform, it cannot use the new features of SQL Server 2012
    at the moment. Nevertheless, a few programmability features specific to SQL Server
    2012 are available in SQL Database, such as new date and time related functions
    (like `DATEFROMPARTS`, `EOMONTH`), new logical functions (`IIF` and `CHOOSE`),
    and a few more.


    ### Support for T-SQL


    Although the vast majority of T-SQL operations are supported by SQL Database,
    there are a few notable exceptions and many limitations. Generally speaking, system
    views that can provide information from other customers located on the same server
    are not available, and neither are the statements that depend on hardware knowledge
    (such as the location of files) or features that are not available (such as the
    use of certificates and encryption). Because the list of these limitations is
    likely to change rapidly and is somewhat large, you should look on MSDN for the
    latest information about which statements are supported, partially supported,
    or not supported. Check out [http://msdn.microsoft.com/en-us/library/windowsazure/ee336253](http://msdn.microsoft.com/en-us/library/windowsazure/ee336253)
    for the list of unsupported T-SQL statements.


    ### Backup and Restore


    There are no backup and restore commands in the traditional sense in SQL Database.
    However, there are multiple ways to recover from the accidental loss of data that
    usually follows erroneous operations on a database, such as an accidental truncate
    operation. These options are shown in Table 12-5. Note that the Export/Import
    functionality does not offer transactional consistency unless the operation is
    performed on a copy of the original primary SQL Database instance.


    *Table 12-5. Summary of data copy and restore operations that can be performed
    against a SQL Database instance*


    | Operation | Transactional Consistency | Comment |

    | :--- | :--- | :--- |

    | COPY operation | Yes | Use the `CREATE DATABASE AS COPY OF` command to create
    a clone of a SQL Database instance. |

    | Import/Export | No | Copies both the data and schema of a database to a blob
    so that they can be restored through the Import process. Certain limitations apply.
    |

    | Point in Time Restore | Yes | Future capability of SQL Database that provides
    a point-in-time restore option. Certain limitations apply. |


    `Note` The Point in Time Restore functionality is not yet available publicly at
    the time of this writing.


    ### Federations


    As mentioned previously, SQL Database instances run on commodity hardware with
    virtually no hardware or environment configuration options. This makes a SQL Database
    instance a poor choice for applications and systems that have very demanding workloads
    and need a scale-up environment. However, you can scale with SQL Database, using
    a feature unavailable on SQL Server called *Federations*.


    You can use federations with SQL Database to partition one or more tables across
    multiple databases, and developers can use federations to access the data in a
    somewhat transparent manner through code.'
