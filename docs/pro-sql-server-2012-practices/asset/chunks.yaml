    This small example can easily be expanded to include the creation of standard
    users, default privilege assignments, and so on. As a small bonus, I returned
    the connection string to the database just created.


    That helps developers use the real drivers, and it helps ensure they include the
    application name, because there is nothing worse than to do diagnostics on a SQL
    Server instance in which all users are named “Joe” and the application is “Microsoft
    .Net Provider”.


    As you can see, `EXECUTE AS` opens up a lot of options to create stored procedures
    that allow your developers to execute privileged code without having to grant
    the privileges to the developers directly.


    ## Step 5: Create Good Reporting


    So what do I mean by “good reporting”? It is the option to draw information from
    a running system that can tell you how SQL Server is running at the moment. As
    with the system-management part, only your imagination sets the limit. You can
    start out using the tools already at hand from SQL Server, such as `Data Collector`,
    `dynamic management views`, and `Reporting Services`. With `Data Collector`, you
    have the opportunity to gather information about what happens in SQL Server over
    time, and then use `Reporting Services` to present that data in an easy-to-understand
    and read format.


    Think both globally and locally.


    ### chapter 1 ■ Be Your Developer’s Best FrienD


    Think globally by creating a general overview showing how a server is performing.
    What, for example, are the 35 most resource-consuming queries? List those in three
    different categories: most executions, most I/O, and most CPU usage. Combine that
    information with a list of significant events and the trends in disk usage.


    But also think locally by creating the same type of overview for individual databases
    instead of for the server as a whole. Then developers and application owners can
    easily spot resource bottlenecks in their code directly and react to that. Such
    reports also give developers an easy way to continuously improve their queries
    without involving the DBA, which means less work for you.


    In addition to including performance information, you can easily include information
    from log tables, so the different database creations and updates can be reported
    as well.


    Finally, take care to clearly define who handles exceptions and how they are handled.
    Make sure nobody is in doubt about what to do when something goes wrong, and that
    everyone knows who decides what to do if you have code or applications that cannot
    support your framework.


    ## Ensuring Version Compatibility


    If you choose to consolidate on SQL Server 2012, you will no doubt discover that
    one of your key applications requires SQL Server 2008 to be supported from the
    vendor. Or you might discover that the application user requires `sysadmin` rights,
    which makes it impossible to have that database running on any of your existing
    instances.


    You might need to make exceptions for critical applications. Try to identify and
    list those possible exceptions as early in the process as possible, and handle
    them as soon as you possible also. Most applications will be able to run on SQL
    Server 2012, but there will inevitably be applications where the vendor no longer
    exists, code is written in Visual Basic 3 and cannot directly be moved to Visual
    Basic 2010, or where the source has disappeared and the people who wrote the applications
    are no longer with the company. Those are all potential exceptions that you must
    handle with care.


    One way to handle those exceptions is to create an environment in which the needed
    older SQL Server versions are installed, and they’re installed on the correct
    operating system version. Create such an environment, but do not document it to
    the outside world. Why not? Because then everyone will suddenly have exceptions
    and expect the same sort of preferential treatment. Support exceptions, but only
    as a last resort. Always try to fix those apparent incompatibilities.


    Exceptions should be allowed only when all other options are tried and rejected.
    Vendors should not be allowed to just say, “We do not support that,” without justifying
    the actual technical arguments as to why. Remember you are the customer. You pay
    for their software, not the other way around.


    Back when 64-bit Windows was new, many application vendors didn’t create their
    installation program well enough to be able to install it into a 64-bit environment.
    Sometimes they simply put a precheck on the version that did not account for the
    possibility of a 64-bit install. When 64-bit-compatible versions of applications
    finally arrived, it turned out that only the installation program was changed,
    not the actual application itself. I specifically remember one storage vendor
    that took more than a year to fix the issue, so that vendor was an exception in
    our environment. As soon as you create an exception, though, get the vendor to
    sign an end date for that exception. It is always good practice to revisit old
    requirements, because most of them change over time. If you do not have an end
    date, systems tend to be forgotten or other stuff becomes more important, and
    the exception lives on forever.


    Remember finally, that you can use compatibility mode to enable applications to
    run on SQL Server 2012 when those applications would otherwise require some earlier
    version. Compatibility with SQL Server 2000 is no longer supported, but compatibility
    with the 2005 and 2008 versions is.


    ### chapter 1 ■ Be Your Developer’s Best FrienD


    > **`Tip`** A very good reason to use compatibility mode instead of actually installing
    an instance on an older version is that compatibility mode still provides access
    to newer administrative features, such as backup compression. For example, SQL
    Server 2000 compatibility mode in SQL Server 2008 gave me the option to partition
    some really big tables, even though partitioning was not supported in 2000. In
    checking with Microsoft, I was told that if the feature works, it is supported.


    ## Setting Limits


    All is not well yet, though. You still have to set limits and protect data.


    I’m sure you have experienced that a login has been misused. Sometimes a developer
    just happens to know a user name and password and plugs it into an application.
    That practice gives rise to situations in which you do not know who has access
    to data, and you might find that you don’t reliably know which applications access
    which databases. The latter problem can lead to production halts when passwords
    are changed or databases are moved, and applications suddenly stop working.


    I have a background in hotel environments supporting multiple databases in the
    same instance, with each database owned by a different department or customer.
    (You can get the same effect in a consolidation environment.) SQL Server lacks
    the functionality to say that Customer A is not allowed to access Customer B’s
    data. You can say that creating different database users solves the problem, but
    we all know that user names and passwords have a tendency to be known outside
    of the realm they belong in. So, at some point, Customer A will get access to
    Customer B’s user name and password and be able to see that data from Customer
    A’s location. Or if it’s not outside customers, perhaps internal customers or
    departments will end up with undesired access to one another’s data.

