    \n### 第三章 ■ 隐藏的性能陷阱\n\n图 3-19. 在连接操作符属性中看到的连接残差。\n\n很难看清那里发生了什么，所以我重复了一遍并在这里整理了一下：\n\
    \n```sql\nShifts.EmployeeID = ShiftDetails.EmployeeID\nAND Shifts.ShiftStartDate\
    \ >= CONVERT_IMPLICIT(datetime, ShiftDetails.ShiftStartDate, 0)\nAND Shifts.ShiftStartDate\
    \ <= dateadd(millisecond, (-3), dateadd(day, (1), CONVERT_IMPLICIT(datetime, ShiftDetails.ShiftStartDate,\
    \ 0)))\n```\n\n连接列只包含 `EmployeeID`；是残差包含了两者。这里发生的情况是，SQL 在连接列（本例中是 `EmployeeID`）上评估连接，然后对符合连接条件的每一行应用残差中列出的过滤器。如果仅基于连接列的匹配限制性不强，最终可能会产生一个巨大的中间结果集（技术上是部分交叉连接），SQL\
    \ 必须为其分配内存，并且必须处理该结果集并应用残差。这可以在连接属性中看到，如图 3-20 所示。\n\n图 3-20. 行数巨大的多对多连接。\n\n\
    ![图片 30](img/index-73_1.png)\n\n### 第三章 ■ 隐藏的性能陷阱\n\n预估行数为 7000 万，这是基于 SQL 所知的连接两侧连接列的唯一性来预估的（在本例中，`EmployeeID`\
    \ 在两个表中都不是非常唯一）。实际行数（如前所述）是操作符输出的总行数，而不是连接必须处理的总行数。在本例中，连接操作符必须处理的行数远高于输出的行数（可能接近预估行数）。\n\
    \n根据仅匹配连接列的行数（与同时匹配连接列和残差的行数相比），这可能导致轻微或严重的开销。\n\n为了更好地理解，前面的例子运行了 14 分钟。一个经过修正的版本，它直接在\
    \ `EmployeeID` 和 `ShiftStartDate` 上进行等值连接，并将两个谓词都列在连接列中（并返回相同的行），运行时间为 20 秒。\n\
    \n哈希连接也可能有残差。哈希连接的属性（如图 3-21 所示）显示连接和残差的方式与合并连接略有不同。\n\n图 3-21. 哈希连接属性。\n\n![图片\
    \ 31](img/index-74_1.png)\n\n![图片 32](img/index-74_2.png)\n\n### 第三章 ■ 隐藏的性能陷阱\n\
    \n用于连接的列在工具提示中显示为 `Hash Keys Probe`，并在连接操作符的属性中显示为 `Hash Keys Build` 和 `Hash Keys\
    \ Probe`（如图 3-22 所示）。残差的列在工具提示和属性中都出现在 `probe residual` 中。\n\n图 3-22. 哈希连接的构建列和探测列。\n\
    \n与合并连接一样，残差必须处理的行数决定了它在性能方面会有多糟糕。\n\n这些都很好，但你如何修复它们呢？\n\n与索引查找和扫描上的谓词一样，多种原因可能导致残差。\n\
    \n与谓词不同，索引列顺序不是主要原因。哈希连接不太在意索引列顺序。合并连接则在意，因为它们需要连接的两侧都按连接列排序，而索引确实提供了顺序。然而，如果顺序不符合合并连接的要求，优化器可以在计划中放入一个排序操作，或者使用不同的连接方式，例如哈希连接。\n\
    \n不匹配的数据类型可能导致连接产生残差，如图 3-23 所示。所谓“不匹配的数据类型”，我指的是连接中涉及的两个列具有不同的数据类型。我在系统中见过最常见的是\
    \ `varchar` 和 `nvarchar`、`varchar` 和 `date`、以及 `varchar` 和 `int`。\n\n图 3-23. 由数据类型不匹配引起的带残差的哈希连接。\n\
    \n![图片 33](img/index-75_1.png)\n\n### 第三章 ■ 隐藏的性能陷阱\n\n从图 3-23 所示的工具提示中看不清楚是否发生了任何转换；甚至属性中也没有显示任何问题。事实上，残差的存在是唯一暗示事情不对劲的线索。如果将其与数据类型匹配的查询（如图\
    \ 3-24 所示）进行比较，你会注意到在那种情况下没有残差。\n\n图 3-24. 无残差的哈希连接。\n\n我要探讨的最后一个原因是奇怪的连接谓词。所谓“奇怪”，我指的是类似连接谓词中存在不等式的情况。\n\
    \n合并连接和哈希连接都仅限于在实际连接中使用等式谓词。任何非等式都必须作为残差处理。（嵌套循环连接则没有这种限制。）这是我最初使用的例子：一个使用 `between`\
    \ 的连接，因为一个表中的日期是时间设置为午夜的日期，而另一个表中的日期的时间不是午夜。因此，连接它们的唯一方式就是使用 `between`，这导致了低效的连接。\n\
    \n不匹配的数据类型和非等式连接谓词通常表明了潜在的数据库设计问题——不总是，但经常如此。修复它们可能既困难又耗时。对于不匹配的数据类型，修复问题可能需要更改数据库中一个或多个列的数据类型，或者甚至可能需要添加额外的列（通常是计算列），将连接列转换为匹配的数据类型以实现高效连接。\n\
    \n使用不等式进行连接的查询更难修复。尽管这样的连接确实有合理的理由，但它们不应该很常见。修复使用不等式连接的查询在很大程度上取决于底层数据库以及可以修改的程度（如果可以的话）。\n\
    \n### 第三章 ■ 隐藏的性能陷阱\n"
- fmt: "The example I started the section with has a `Shifts` table with a `ShiftStartDate`\
    \ that always contains a datetime where the date portion is midnight and a `ShiftDetails`\
    \ table with a `ShiftStartDate` that has dates with time portions that are not\
    \ midnight, and the join needs to be on the date. To optimize that query and to\
    \ avoid the inequality join predicate you could add another column to the `ShiftDetails`\
    \ table that stores the date only. This would likely be a persisted computed column.\
    \ Of course, that assumes the application using those tables won’t break if another\
    \ column is added.\n\nFixing these kinds of problems in an existing system is\
    \ very difficult and, in many cases, is not possible. It is far better to get\
    \ a correct design up front with appropriate data type usage and properly normalized\
    \ tables.\n\n## Spills\n\nThe third form of hidden performance problem that I\
    \ want to discuss is the spill. Before I can explain what a spill is, I need to\
    \ briefly explain what memory grants are.\n\nA ``memory grant`` is an amount of\
    \ memory that the query processor will request before it starts executing the\
    \ query. It’s additional memory that the query needs for things like hashes and\
    \ sorts. The memory grant amount is based on the number of memory-requiring operations,\
    \ on whether or not the query will be executed in parallel, and on the cardinality\
    \ estimates in the execution plan.\n\nI don’t want to go too deep into the process\
    \ of requesting and granting that memory; it’s not essential for the rest of this\
    \ section. If you are interested in the topic, you can refer to the following\
    \ blog entries for further detail: http://blogs.msdn.com/b/sqlqueryprocessing/archive/2010/02/16/understanding-sql-server-memory-grant.aspx\
    \ and http://www.sqlskills.com/blogs/joe/post/e2809cMemoryGrantInfoe2809d-Execution-Plan-Statistics.aspx.\
    \ Also, you can view the presentation that Adam Machanic did at the Pass Summit\
    \ in 2011: http://www.youtube.com/watch?v=j5YGdIk3DXw\n\nThe use of memory grants\
    \ is all well and good, but those memory grants are based on cardinality estimates\
    \ and estimates can be wrong. So what happens when they are wrong?\n\nLet’s compare\
    \ two examples, one with an accurate estimate and one with a badly inaccurate\
    \ one. (I’ll use some hints to force a bad estimate because it’s both easier and\
    \ more repeatable than creating actual stale statistics or simulating other conditions\
    \ that result in poor estimates.)\n\nThe two plans look identical, so I’m not\
    \ going to show them (two index seeks, a hash join, and a select). I’ll just show\
    \ the properties of the hash joins and of the selects for the two.\n\nThe first\
    \ query, with accurate estimations, is shown in Figure 3-25.\n\nThe second query,\
    \ with poor estimations, is shown in Figure 3-26.\n\nIgnore `“Estimated Number\
    \ of Rows 1”` on the tooltip of the select. That shows up because the outer select\
    \ was a `COUNT(*)`.\n\n![Image 34](index-77_1.png)\n\n![Image 35](index-77_2.png)\n\
    \n**Figure 3-25.** Accurate estimations.\n\nIf you take a look at those, the first\
    \ hash join has an estimated row count of 35 million and an actual row count of\
    \ 35 million. To do the hash join (which was a many-to-many join), the query was\
    \ granted 450 MB of workspace memory.\n\n**Figure 3-26.** Inaccurate estimates.\n\
    \nThe second query has an estimated row count of 6,000 rows and an actual row\
    \ count of 35 million. The memory grant that the query execution engine requested\
    \ was based on that estimate, and was 1.5 MB. If the first query required 450\
    \ MB to do the hash join, the second is not going to be able to do it in 1.5 MB.\
    \ So what happens? Figure 3-27 shows the result.\n\nA hash spill happens. I won’t\
    \ go into the complexities of hash spills here because that’s beyond the scope\
    \ of this chapter, but in short, portions of the hash table are written to `TempDB`\
    \ and then read back when necessary. This can happen once or it can happen repeatedly\
    \ during the execution of the query.\n\n![Image 36](index-78_1.png)\n\n**Figure\
    \ 3-27.** Hash warnings viewed via SQL Profiler.\n\nAs I’m sure you can imagine,\
    \ that’s not going to be good for performance. Memory is many times faster than\
    \ disk and having to write and re-read portions of what should be an in-memory\
    \ structure is going to make the query run slower than it otherwise would. In\
    \ this example, the query that didn’t spill took on average 8 seconds to run and\
    \ the query that did spill took on average 10 seconds. That’s not a huge difference,\
    \ but that was on a machine with a single user and no other appreciable I/O load.\n\
    \nIn addition to the hash spill, there are other operations that can spill—sorts\
    \ and exchanges being the most common. Spools also use `TempDB`, but that’s not\
    \ so much a spill as the fact that a spool is, by definition, a temporary structure\
    \ in `TempDB`.\n\nThe obvious outstanding questions are how do you detect these\
    \ spills, what do you do about them, and how do you prevent them?\n\nDetecting\
    \ hash spills is the easy part. There are three `SQL Trace` events that fire in\
    \ response to hash spills, sort spills, and exchange spills. They are `hash warnings`,\
    \ `sort warnings`, and `exchange warnings`, respectively.\n\nThose trace events\
    \ show only that a spill has happened; they don’t say anything about how much\
    \ data was spilled to `TempDB`. To detect that information, you need to turn to\
    \ the Dynamic Management Views—specifically, to `sys.dm_db_task_space_usage` and\
    \ `sys.dm_db_session_space_usage`. I’ll use the second one because it is a little\
    \ easier. The first one shows data only for currently executing queries. The second\
    \ one shows data for currently connected sessions.\n\n```sql\nSELECT es.session_id\
    \ ,\n       user_objects_alloc_page_count ,\n       internal_objects_alloc_page_count\
    \ ,\n       login_name ,\n       program_name ,\n       host_name ,\n       last_request_start_time\
    \ ,\n       last_request_end_time ,\n       DB_NAME(dbid) AS DatabaseName ,\n\
    \       text\nFROM sys.dm_db_session_space_usage AS ssu\nINNER JOIN sys.dm_exec_sessions\
    \ AS es ON ssu.session_id = es.session_id\nINNER JOIN sys.dm_exec_connections\
    \ AS ec ON es.session_id = ec.session_id\nLEFT OUTER JOIN sys.dm_exec_requests\
    \ AS er ON ec.session_id = er.session_id\nCROSS APPLY sys.dm_exec_sql_text(COALESCE(er.sql_handle,\
    \ ec.most_recent_sql_handle)) AS dest\nWHERE is_user_process = 1\n```\n\nThis\
    \ query tells you how much space in `TempDB` any current connection has used,\
    \ along with either the currently running command or the last command that was\
    \ run.\n\nUsing that on the earlier example, I can see that the query that didn’t\
    \ spill had 0 pages allocated in `TempDB`. The query that did spill had 0 pages\
    \ of user objects and 10,500 pages of internal objects—that’s 82 MB. (A page is\
    \ 8 KB.)\n\nThat query can be scheduled to check for any processes that are using\
    \ large amounts of `TempDB` space and to log any excessive usage for further investigation.\
    \ Large amounts of internal allocations don’t necessarily indicate spills, but\
    \ it’s probably worth investigating such readings. (Large amounts of user allocations\
    \ suggests temp table overuse.)\n\nOn the subject of fixing spills, the first\
    \ and most important point is that spills cannot always be prevented. Some operations\
    \ will spill no matter what. A sort operation is the poster child here. If you\
    \ imagine a sort of a 50-GB result set on a server with only 32 GB of memory,\
    \ it’s obvious that the sort cannot be done entirely in memory and will have to\
    \ spill to `TempDB`.\n\nTuning spills has three major aspects:\n\n*   Prevent\
    \ unnecessary spills caused by memory grant misestimates.\n*   Minimize the number\
    \ of operations that have to spill.\n*   Tune `TempDB` to be able to handle the\
    \ spills that do happen."
