    ***Figure 4-10.** CPU usage, time, and reads, broken down by averages, minimums,
    and maximums.*


    Inspecting Performance Stats


    Generating useful performance stats have been a common challenge for SQL Server
    DBAs. DMVs offer another option for extracting information that provides clear
    answers that can then be viewed in a user-friendly XML format.


    Performance statistics can come in many forms- physical reads, logical reads,
    elapsed time and others. The following query is an excellent demonstration of
    high-level performance statistics in a MSSQL


    environment.


    SELECT dest.dbid


    ,dest.[text] AS Batch_Object,


    SUBSTRING(dest.[text], (deqs.statement_start_offset/2) + 1,


    ((CASE deqs.statement_end_offset


    WHEN -1 THEN DATALENGTH(sdest.[text]) ELSE deqs.statement_end_offset END


    - deqs.statement_start_offset)/2) + 1) AS SQL_Statement


    , deqp.query_plan


    , deqs.execution_count


    , deqs.total_physical_reads


    ,(deqs.total_physical_reads/deqs.execution_count) AS average_physical_reads


    , deqs.total_logical_writes


    , (deqs.total_logical_writes/deqs.execution_count) AS average_logical_writes


    , deqs.total_logical_reads


    , (deqs.total_logical_reads/deqs.execution_count) AS average_logical_lReads


    , deqs.total_clr_time


    , (deqs.total_clr_time/deqs.execution_count) AS average_CLRTime


    , deqs.total_elapsed_time


    , (deqs.total_elapsed_time/deqs.execution_count) AS average_elapsed_time


    , deqs.last_execution_time


    , deqs.creation_time


    FROM sys.dm_exec_query_stats AS deqs


    CROSS apply sys.dm_exec_sql_text(deqs.sql_handle) AS dest


    CROSS apply sys.dm_exec_query_plan(deqs.plan_handle) AS deqp


    WHERE deqs.last_execution_time > DATEADD(HH,-2,GETDATE())


    AND dest.dbid = (SELECT DB_ID(''AdventureWorks2012''))


    ORDER BY execution_count


    ![Image 47](index-97_1.png)


    ![Image 48](index-97_2.png)


    chapter 4 ■ Dynamic management Views


    Figure 4-11 shows the results of this query.


    ***Figure 4-11.** XML query plan links offered through DMVs that open a browser
    to the showplan for each* *statement and provide more defined performance data.*


    Top Quantity Execution Counts


    As any performance-oriented DBA knows, it’s not just how long a query executes,
    but the concurrency or quantity of executions that matters when investigating
    performance issues. DMVs provide this information and, in more recent releases,
    inform you of how complete the data is with regard to concurrency issues, which
    can be essential to performing accurate data collection.


    SELECT TOP 100 deqt.text AS ''Name'',


    deqs.execution_count AS ''Execution Count'',


    deqs.execution_count/DATEDIFF(Second, deqs.creation_time, GetDate()) AS


    ''Calls/Second'',


    deqs.total_worker_time/deqs.execution_count AS ''AvgWorkerTime'',


    deqs.total_worker_time AS ''TotalWorkerTime'',


    deqs.total_elapsed_time/deqs.execution_count AS ''AvgElapsedTime'',


    deqs.max_logical_reads, deqs.max_logical_writes, deqs.total_physical_reads,


    DATEDIFF(Minute, deqs.creation_time, GetDate()) AS ''Age in Cache''


    FROM sys.dm_exec_query_stats AS deqs


    CROSS APPLY sys.dm_exec_sql_text(deqs.sql_handle) AS deqt


    WHERE deqt.dbid = db_id()


    ORDER BY deqs.execution_count DESC


    The results of this query are shown in Figure 4-12\. They show that a process
    has performed a full scan on the HumanResources.employee table 10,631 times, and
    they show the average worker time, average elapsed time, and so forth.


    ***Figure 4-12.** Highly concurrent SQL; note the average elapsed time versus.
    the number of executions shown* *in the Execution Count column.*


    ![Image 49](index-98_1.png)


    chapter 4 ■ Dynamic management Views


    Physical Reads


    Another area of high cost to performance is I/O. Having a fast disk is important,
    and as SQL Server moves deeper into data warehousing, having a faster disk and
    fewer I/O waits are both important to performance.


    There is a cost to all reads, regardless of whether they are physical or logical,
    so it is crucial that the DBA be aware of both.


    SELECT TOP 20 deqt.text AS ''SP Name'',


    deqs.total_physical_reads,


    deqs.total_physical_reads/deqs.execution_count AS ''Avg Physical Reads'',


    deqs.execution_count AS ''Execution Count'',


    deqs.execution_count/DATEDIFF(Second, deqs.creation_time, GetDate()) AS


    ''Calls/Second'',


    deqs.total_worker_time/deqs.execution_count AS ''AvgWorkerTime'',


    deqs.total_worker_time AS ''TotalWorkerTime'',


    deqs.total_elapsed_time/deqs.execution_count AS ''AvgElapsedTime'',


    deqs.max_logical_reads, deqs.max_logical_writes,


    DATEDIFF(Minute, deqs.creation_time, GetDate()) AS ''Age in Cache'', deqt.dbid


    FROM sys.dm_exec_query_stats AS deqs


    CROSS APPLY sys.dm_exec_sql_text(deqs.sql_handle) AS deqt


    WHERE deqt.dbid = db_id()


    ORDER BY deqs.total_physical_reads


    The results of this query are shown in Figure 4-13.


    ***Figure 4-13.** Physical and logical read data generated by the preceding query.*


    Physical Performance Queries


    Physical performance tuning involves indexing, partitioning and fragmentation
    unlike the queries in the previous section, which are often used to discover opportunities
    for logical tuning.


    Locating Missing Indexes


    When SQL Server generates a query plan, it determines what the best indexes are
    for a particular filter condition. If these indexes do not exist, the query optimizer
    generates a suboptimal query plan, and then stores information about the optimal
    indexes for later retrieval. The missing indexes feature enables you to access
    this data so that you can decide whether these optimal indexes should be implemented
    at a later date.


    Here’s a quick overview of the different missing index DMVs and DMFs:


    •


    **sys.dm_db_missing_index_details (DMV)** Returns indexes the optimizer considers
    to be missing


    •


    **sys.dm_db_missing_index_columns (DMF)** Returns the columns for a missing index
    87


    chapter 4 ■ Dynamic management Views


    •


    **sys.dm_db_missing_index_group_stats (DMV)** Returns usage and access details
    for the missing indexes similar to sys.dm_db_index_usage_stats.


    The pertinent columns for these three DMVs and DMFs are covered in Tables 4-6
    through 4-8.


    For these DMVs to be useful, the SQL Server instance must have been in service
    for a solid amount of time. No set amount of time can be given, because the level
    of knowledge of the database professional’s is what determines whether sufficient
    processing has occurred to provide the DMVs with accurate data. If the server
    has just been cycled, you will be disappointed with the results. The only way
    SQL Server can tell you if indexes are used or missing is if the server has had
    time to collect that information.'
  trans: "\n# 第四章：动态管理视图\n\n结果如图 4-9 所示。\n\n**图 4-9.** 按平均 CPU 时间排序的前五名违规语句。此查询基于“前\
    \ 20 名”，这为 DBA 生成了一份更明确的报告，以便检查和清除对性能至关重要的 CPU 密集型资源数据。\n\n请始终记住，在 SQL Server\
    \ 环境中，CPU 就是一切。本章节中许多性能查询的输出，能让 DBA 清晰地了解哪些语句对这一重要的资源使用影响最大。\n\n```sql\nSELECT\
    \ TOP 20 deqt.text AS 'Name',\n    deqs.total_worker_time AS 'TotalWorkerTime',\n\
    \    deqs.total_worker_time/deqs.execution_count AS 'AvgWorkerTime',\n    deqs.execution_count\
    \ AS 'Execution Count',\n    ISNULL(deqs.execution_count/DATEDIFF(Second, deqs.creation_time,\
    \ GetDate()), 0) AS 'Calls/Second',\n    ISNULL(deqs.total_elapsed_time/deqs.execution_count,\
    \ 0) AS 'AvgElapsedTime',\n    deqs.max_logical_reads, deqs.max_logical_writes,\n\
    \    DATEDIFF(Minute, deqs.creation_time, GetDate()) AS 'Age in Cache'\nFROM sys.dm_exec_query_stats\
    \ AS deqs\nCROSS APPLY sys.dm_exec_sql_text(deqs.sql_handle) AS deqt\nWHERE deqt.dbid\
    \ = db_id()\nORDER BY deqs.total_worker_time DESC;\n```\n\n此查询的结果如图 4-10 所示。\n\
    \n![Image 46](img/index-96_1.png)\n\n**图 4-10.** CPU 使用率、时间和读取次数，按平均值、最小值和最大值细分。\n\
    \n## 检查性能统计信息\n\n生成有用的性能统计信息一直是 SQL Server DBA 面临的普遍挑战。动态管理视图提供了另一种提取信息的方式，这些信息能提供明确的答案，并可以以用户友好的\
    \ XML 格式查看。\n\n性能统计信息可以有多种形式——物理读取、逻辑读取、耗时等。以下查询是 MSSQL 环境中高级性能统计信息的绝佳演示。\n\n\
    ```sql\nSELECT dest.dbid\n    ,dest.[text] AS Batch_Object,\n    SUBSTRING(dest.[text],\
    \ (deqs.statement_start_offset/2) + 1,\n        ((CASE deqs.statement_end_offset\n\
    \            WHEN -1 THEN DATALENGTH(dest.[text]) ELSE deqs.statement_end_offset\
    \ END\n            - deqs.statement_start_offset)/2) + 1) AS SQL_Statement\n \
    \   , deqp.query_plan\n    , deqs.execution_count\n    , deqs.total_physical_reads\n\
    \    ,(deqs.total_physical_reads/deqs.execution_count) AS average_physical_reads\n\
    \    , deqs.total_logical_writes\n    , (deqs.total_logical_writes/deqs.execution_count)\
    \ AS average_logical_writes\n    , deqs.total_logical_reads\n    , (deqs.total_logical_reads/deqs.execution_count)\
    \ AS average_logical_lReads\n    , deqs.total_clr_time\n    , (deqs.total_clr_time/deqs.execution_count)\
    \ AS average_CLRTime\n    , deqs.total_elapsed_time\n    , (deqs.total_elapsed_time/deqs.execution_count)\
    \ AS average_elapsed_time\n    , deqs.last_execution_time\n    , deqs.creation_time\n\
    FROM sys.dm_exec_query_stats AS deqs\nCROSS apply sys.dm_exec_sql_text(deqs.sql_handle)\
    \ AS dest\nCROSS apply sys.dm_exec_query_plan(deqs.plan_handle) AS deqp\nWHERE\
    \ deqs.last_execution_time > DATEADD(HH,-2,GETDATE())\nAND dest.dbid = (SELECT\
    \ DB_ID('AdventureWorks2012'))\nORDER BY execution_count\n```\n\n![Image 47](img/index-97_1.png)\n\
    \n![Image 48](img/index-97_2.png)\n\n图 4-11 显示了此查询的结果。\n\n**图 4-11.** 通过动态管理视图提供的\
    \ XML 查询计划链接，该链接为每个语句打开浏览器以显示执行计划，并提供更明确的性能数据。\n\n## 最高执行次数\n\n正如任何关注性能的 DBA 所知，在调查性能问题时，不仅要看查询执行了多久，并发性或执行次数同样重要。动态管理视图提供了此信息，并且在较新的版本中，还会告知您关于并发性问题的数据完整程度，这对于执行准确的数据收集至关重要。\n\
    \n```sql\nSELECT TOP 100 deqt.text AS 'Name',\n    deqs.execution_count AS 'Execution\
    \ Count',\n    deqs.execution_count/DATEDIFF(Second, deqs.creation_time, GetDate())\
    \ AS 'Calls/Second',\n    deqs.total_worker_time/deqs.execution_count AS 'AvgWorkerTime',\n\
    \    deqs.total_worker_time AS 'TotalWorkerTime',\n    deqs.total_elapsed_time/deqs.execution_count\
    \ AS 'AvgElapsedTime',\n    deqs.max_logical_reads, deqs.max_logical_writes, deqs.total_physical_reads,\n\
    \    DATEDIFF(Minute, deqs.creation_time, GetDate()) AS 'Age in Cache'\nFROM sys.dm_exec_query_stats\
    \ AS deqs\nCROSS APPLY sys.dm_exec_sql_text(deqs.sql_handle) AS deqt\nWHERE deqt.dbid\
    \ = db_id()\nORDER BY deqs.execution_count DESC\n```\n\n此查询的结果如图 4-12 所示。它们显示一个进程已经对\
    \ `HumanResources.employee` 表执行了 10,631 次完整扫描，并显示了平均工作时间、平均耗时等信息。\n\n**图 4-12.**\
    \ 高并发 SQL；请注意“执行次数”列中显示的平均耗时与执行次数的关系。\n\n![Image 49](img/index-98_1.png)\n\n##\
    \ 物理读取\n\n另一个对性能高成本的领域是 I/O。拥有快速磁盘很重要，随着 SQL Server 更深入地应用于数据仓库，拥有更快的磁盘和更少的 I/O\
    \ 等待对性能都至关重要。\n\n所有读取都有成本，无论是物理的还是逻辑的，因此 DBA 了解这两者都至关重要。\n\n```sql\nSELECT TOP\
    \ 20 deqt.text AS 'SP Name',\n    deqs.total_physical_reads,\n    deqs.total_physical_reads/deqs.execution_count\
    \ AS 'Avg Physical Reads',\n    deqs.execution_count AS 'Execution Count',\n \
    \   deqs.execution_count/DATEDIFF(Second, deqs.creation_time, GetDate()) AS 'Calls/Second',\n\
    \    deqs.total_worker_time/deqs.execution_count AS 'AvgWorkerTime',\n    deqs.total_worker_time\
    \ AS 'TotalWorkerTime',\n    deqs.total_elapsed_time/deqs.execution_count AS 'AvgElapsedTime',\n\
    \    deqs.max_logical_reads, deqs.max_logical_writes,\n    DATEDIFF(Minute, deqs.creation_time,\
    \ GetDate()) AS 'Age in Cache', deqt.dbid\nFROM sys.dm_exec_query_stats AS deqs\n\
    CROSS APPLY sys.dm_exec_sql_text(deqs.sql_handle) AS deqt\nWHERE deqt.dbid = db_id()\n\
    ORDER BY deqs.total_physical_reads\n```\n\n此查询的结果如图 4-13 所示。\n\n**图 4-13.** 由前述查询生成的物理和逻辑读取数据。\n\
    \n## 物理性能查询\n\n物理性能调优涉及索引、分区和碎片整理，这与上一节中的查询不同，后者通常用于发现逻辑调优的机会。\n\n### 定位缺失的索引\n\
    \n当 SQL Server 生成查询计划时，它会为特定的筛选条件确定最佳索引。如果这些索引不存在，查询优化器会生成次优的查询计划，并将有关最佳索引的信息存储起来以供稍后检索。缺失索引功能使您可以访问这些数据，从而决定是否应在稍后实现这些最佳索引。\n\
    \n以下是不同缺失索引动态管理视图和动态管理函数的快速概览：\n\n*   `sys.dm_db_missing_index_details` (DMV)\
    \ 返回优化器认为缺失的索引。\n*   `sys.dm_db_missing_index_columns` (DMF) 返回缺失索引的列。\n*   `sys.dm_db_missing_index_group_stats`\
    \ (DMV) 返回缺失索引的使用和访问详细信息，类似于 `sys.dm_db_index_usage_stats`。\n\n表 4-6 至 4-8 涵盖了这三个\
    \ DMV 和 DMF 的相关列。\n\n要使这些 DMV 有用，SQL Server 实例必须已经运行了足够长的时间。无法给出一个固定的时长，因为数据库专业人员的知识水平决定了是否已发生足够的处理以向\
    \ DMV 提供准确的数据。如果服务器刚刚重启，您会对结果感到失望。SQL Server 只有在有时间收集这些信息后，才能告诉您索引是否被使用或缺失。\n"
- fmt: '# 索引管理与性能调优


    ## 重要建议


    对任何添加索引的建议都应持保留态度。作为数据库管理员（DBA），您拥有验证索引建议所报告数据的知识和研究技能。最佳实践始终是在测试环境中创建建议的索引，并验证新索引是否确实带来了性能提升。索引的存在应始终有其理由。如果您创建了未被使用的索引，它们可能会对您的环境产生负面影响，因为每个索引都必须在对它们所基于的列进行插入和更新操作时得到维护。


    ## 缺失索引相关的DMV视图


    ### `dm_db_missing_index_groups`


    | 列名 | 检索的数据 |

    | :--- | :--- |

    | `index_group_handle` | 标识缺失索引组 |

    | `index_handle` | 标识缺失索引组内的一个缺失索引 |


    ### `dm_db_missing_index_group_stats`


    | 列名 | 检索的数据 |

    | :--- | :--- |

    | `group_handle` | 与 `index_group_handle` 进行联接 |

    | `user_seeks` | 可从该索引组受益的查找次数 |

    | `user_scans` | 可从该索引组受益的扫描次数 |

    | `avg_user_impact` | 如果实现了该索引组，用户查询可能体验到的平均收益百分比 |

    | `avg_total_user_cost` | 可通过添加该索引组来降低的用户查询的平均成本 |


    ### `dm_db_missing_index_details`


    | 列名 | 检索的数据 |

    | :--- | :--- |

    | `index_handle` | 缺失索引的标识符 |

    | `database_id` | 存在缺失索引的数据库的标识 |

    | `object_id` | 缺失索引所属的表 |

    | `equality_columns` | 有助于等值比较的列（以逗号分隔） |

    | `inequality_columns` | 有助于不等值比较的列（以逗号分隔） |

    | `included_columns` | 覆盖查询所需列的列（以逗号分隔） |


    ## 识别缺失索引以提升性能


    识别缺失索引以提升性能是动态管理视图（DMV）提供的一个设计良好且实用的功能。请注意，所需的索引建议是在数据库环境运行期间收集的，并随着数据库服务器的周期而被清除。


    这里存在一个需要解决的次要问题：如果这是一个测试环境或新环境，其处理量可能尚未累积到足以提供有效建议所需的时间。信息必须在DMV中累积才能提供准确的数据，因此非生产或新环境可能会产生不准确的结果。


    ```sql

    SELECT so.name

    , (avg_total_user_cost * avg_user_impact) * (user_seeks + user_scans) as Impact

    , ddmid.equality_columns

    , ddmid.inequality_columns

    , ddmid.included_columns

    FROM sys.dm_db_missing_index_group_stats AS ddmigs

    INNER JOIN sys.dm_db_missing_index_groups AS ddmig

    ON ddmigs.group_handle = ddmig.index_group_handle

    INNER JOIN sys.dm_db_missing_index_details AS ddmid

    ON ddmig.index_handle = ddmid.index_handle

    INNER JOIN sys.objects so WITH (nolock)

    ON ddmid.object_id = so.object_id

    WHERE ddmigs.group_handle IN (

    SELECT TOP (5000) group_handle

    FROM sys.dm_db_missing_index_group_stats WITH (nolock)

    ORDER BY (avg_total_user_cost * avg_user_impact)*(user_seeks+user_scans)DESC);

    ```


    上述查询仅在您首先从Management Studio运行数据库引擎优化顾问以确定初始索引需求时才会产生准确结果。该简单向导将引导您完成轻松执行分析所需的步骤，并且它会轻松地定位到新对象，如图4-14所示。


    ![Image 50](index-100_1.png)


    **图 4-14. 数据库引擎优化顾问的结果**


    ## 索引使用情况分析


    索引性能挑战涉及确定索引的使用方式，以及特定查询是否有可用的索引。报告当前数据库中所有索引使用的聚合总量——按扫描、查找和书签查找细分——可以告诉您索引是高效的还是需要更改。


    通过使用 `dm_db_index_usage_stats` DMV，您可以确切了解索引是如何被使用的。在该视图中，您将看到每个索引的扫描、查找和书签查找次数。


    **删除未使用的索引在大多数SQL环境中带来了我最大的性能提升之一。** 很多人错误地认为“如果一个索引是好的，那么更多索引意味着更好的性能！”这完全不正确，并且如前所述，所有索引都应有其存在的理由。如果它们未被使用，删除它们只会提高性能。


    索引使用情况应经过一段时间——至少一个月——来确定。原因是许多环境有每月一次或月末处理，它们可能为此目的专门创建了特定的索引。在删除任何索引之前，请务必验证索引统计信息并进行彻底测试。


    当所有三个状态——`user_seeks`、`user_scans` 和 `user_lookups`——均为0时，您就知道该索引未被使用。


    根据 `dm_db_index_usage_stats` 中的值重建索引。较高的值表示重建或重新组织的需求更高。


    返回给定数据库中所有已使用的索引，或深入钻取到特定对象。请记住，以下查询仅返回自SQL Server实例上次循环以来已被使用的内容。


    此外，通过对 `dm_db_missing_index_group_stats` 视图使用非常相似的列进行微小更改，您现在可以获得基于索引使用情况的结果，而不是先前查询得到的侧重于缺失索引的结果：


    ```sql

    SELECT sso.name objectname,

    ssi.name indexname,

    user_seeks,

    user_scans,

    user_lookups,

    user_updates

    from sys.dm_db_index_usage_stats ddius

    join sys.sysdatabases ssd on ddius.database_id = ssd.dbid

    join sys.sysindexes ssi on ddius.object_id = ssi.id and ddius.index_id = ssi.indid

    join sys.sysobjects sso on ddius.object_id = sso.id

    where sso.type = ''u''

    order by user_seeks+user_scans+user_lookups+user_updates desc

    ```


    ![Image 51](index-101_1.png)


    **图 4-15. 表扫描与不同类型的索引扫描**


    图4-15显示了上述查询的结果，其中`Person_2`、`Employee`和`Department`表正在经历全表扫描。DBA理解为何执行扫描是很重要的。这是由于查询、更新还是哈希联接造成的？


    您也可以使用关于索引的缺失视图来查看您未使用索引的情况。这是DBA最常见的调优收益之一：添加缺失索引以避免表扫描。


    ```sql

    SELECT sso.name objectname,

    ssi.name indexname,

    user_seeks,

    user_scans,

    user_lookups,

    user_updates

    from sys.dm_db_index_usage_stats ddius

    join sys.sysdatabases ssd on ddius.database_id = ssd.dbid

    join sys.sysindexes ssi on ddius.object_id = ssi.id and ddius.index_id = ssi.indid

    join sys.sysobjects sso on ddius.object_id = sso.id

    where ssi.name is null

    order by user_seeks+user_scans+user_lookups+user_updates desc

    ```


    ![Image 52](index-102_1.png)


    ![Image 53](index-102_2.png)


    **图 4-16. 没有索引的表**


    ## 识别并删除未使用的索引


    如前所述，定位未使用的索引并删除它们可能是DBA能够快速提升性能以及实现空间分配收益的最快方法之一。执行以下查询将把 `dm_db_index_usage_stats`
    DMV 与 `sys.tables` 和 `sys.indexes` 进行联接，以识别任何未使用的索引：


    ```sql

    SELECT st.name as TableName

    , si.name as IndexName

    from sys.indexes si

    inner join sys.dm_db_index_usage_stats ddius

    on ddius.object_id = si.object_id

    and ddius.index_id = si.index_id

    inner join sys.tables st

    on si.object_id = st.object_id

    where ((user_seeks = 0

    and user_scans = 0

    and user_lookups = 0)

    or ddius.object_id is null)

    ```


    ![Image 54](index-103_1.png)


    **图 4-17. 表`Person`上的未使用索引**'
  raw: 'Take any recommendations on index additions with a grain of salt. As the DBA,
    you have the knowledge and research skills to verify the data reported regarding
    index recommendations. It is always best practice to create the recommended index
    in a test environment and verify that the performance gain is achieved by the
    new index. Indexes should always be justified. If you create indexes that are
    left unused, they can negatively impact your environment, because each index must
    be supported for inserts and updates on the columns that they are built on.


    ***Table 4-6.** Common columns used in dm_db_missing_index_groups.*


    **Column**


    **Data Retrieved**


    index_group_handle


    Identifies the missing index group


    index_handle


    Identifies a missing index within the missing index group


    ***Table 4-7.** Common columns used in dm_db_missing_index_group_stats.*


    **Column**


    **Data Retrieved**


    group_handle


    Joined to the index_group_handle


    user_seeks


    Number of seeks that would benefit from the group


    user_scans


    Number of scans that would benefit from the group


    avg_user_impact


    Average percentage benefit that user queries could experience if the index group


    is implemented


    avg_total_user_cost


    Average cost of the user queries that could be reduced by the addition of the


    index group


    ***Table 4-8.** Common columns used in dm_db_missing_index_details.*


    **Column**


    **Data Retrieved**


    index_handle


    Identifier for the missing index


    database_id


    Identification of the database with the missing index


    object_id


    Table that the missing index is from


    equality_columns


    Comma-separated list of columns that contribute to equality


    inequality_columns


    Comma-separated list of columns that contribute to inequality


    included_columns


    Comma-separated list of columns needed to cover the columns of the query


    Identifying missing indexes to improve performance is a well-designed and functional
    feature that DMVs offer. Note that the index recommendations that are needed are
    collected during the uptime of the 88


    ![Image 50](index-100_1.png)


    chapter 4 ■ Dynamic management Views


    database environment and are removed on the cycle of the database server. There
    is a secondary concern that needs to be addressed. Is this is a test environment
    or a new environment, where processing would not have accumulated the substantial
    time required to offer valid recommendations? Information must be accumulated
    in the DMV to provide accurate data, so a nonproduction or new environment might
    yield inaccurate results.


    SELECT so.name


    , (avg_total_user_cost * avg_user_impact) * (user_seeks + user_scans) as Impact


    , ddmid.equality_columns


    , ddmid.inequality_columns


    , ddmid.included_columns


    FROM sys.dm_db_missing_index_group_stats AS ddmigs


    INNER JOIN sys.dm_db_missing_index_groups AS ddmig


    ON ddmigs.group_handle = ddmig.index_group_handle


    INNER JOIN sys.dm_db_missing_index_details AS ddmid


    ON ddmig.index_handle = ddmid.index_handle


    INNER JOIN sys.objects so WITH (nolock)


    ON ddmid.object_id = so.object_id


    WHERE ddmigs.group_handle IN (


    SELECT TOP (5000) group_handle


    FROM sys.dm_db_missing_index_group_stats WITH (nolock)


    ORDER BY (avg_total_user_cost * avg_user_impact)*(user_seeks+user_scans)DESC);


    The above query will only result in accurate results if you first run the Database
    Engine Tuning Advisor fromtheManagement Studio to determine your initial indexing
    needs. The simple wizard will take you through the steps needed to easily execute
    the analysis, and it will locate the new object readily, as shown in Figure 4-14.


    ***Figure 4-14.** Results of the Database Engine Tuning Advisor.*


    Index performance challenges involve determining how the index is used and whether
    there is an index for a specific query to use. Reporting aggregated totals for
    all index usage in the current database—


    broken down by scans, seeks, and bookmarks—can tell you if your indexing is efficient
    or if changes are 89


    ![Image 51](index-101_1.png)


    chapter 4 ■ Dynamic management Views


    required. By using the dm_db_index_usage_stats DMV, you can find out exactly how
    an index is used. In the view, you will see the scans, seeks, and bookmark lookups
    for each index.


    Removing unused indexes produced some of my largest performance gains in most
    SQL


    environments. It is common for many to mistakenly believe “If one index is good,
    more means even better performance!” This is simply untrue, and as I previously
    stated, all indexes should be justified. If they are unused, removing them can
    only improve performance.


    Index usage should be established over a period of time—at least one month. The
    reason for this is that many environments have once-per-month or month-end processing,
    and they could have specific indexes created for this purpose only. Always verify
    the index statistics and test thoroughly before dropping any index.


    You will know the index is unused when all three states—user_seeks, user_scans,
    and user_lookups—


    are 0 (zero).


    Rebuild indexes based on the value in dm_db_index_usage_stats. Higher values indicate
    a higher need for rebuilding or reorganizing.


    Return all used indexes in a given database, or drill down to a specific object.
    Remember that the following query returns only what has been used since the last
    cycle of the SQL Server instance.


    Additionally, with a small change, using very similar columns to the dm_db_ missing_index_group_


    stats view, you now have view results based on index usage rather than the results
    you got from previous queries, which focused on indexes that were missing:


    SELECT sso.name objectname,


    ssi.name indexname,


    user_seeks,


    user_scans,


    user_lookups,


    user_updates


    from sys.dm_db_index_usage_stats ddius


    join sys.sysdatabases ssd on ddius.database_id = ssd.dbid


    join sys.sysindexes ssi on ddius.object_id = ssi.id and ddius.index_id = ssi.indid
    join sys.sysobjects sso on ddius.object_id = sso.id


    where sso.type = ''u''


    order by user_seeks+user_scans+user_lookups+user_updates desc


    Figure 4-15 shows the results from the preceding query and that the Person_2,
    Employee, and Department tables are experiencing full scans. It is important for
    the DBA to understand why the scan is being performed. Is it due to a query, an
    update, or a hash join?


    ***Figure 4-15.** Table scans versus different types of index scans.*


    You can also use the missing views on indexing to view when you are not using
    an index. This is one of the most common tuning gains for a DBA: adding missing
    indexes to avoid table scans.


    SELECT sso.name objectname,


    ssi.name indexname,


    ![Image 52](index-102_1.png)


    ![Image 53](index-102_2.png)


    chapter 4 ■ Dynamic management Views


    user_seeks,


    user_scans,


    user_lookups,


    user_updates


    from sys.dm_db_index_usage_stats ddius


    join sys.sysdatabases ssd on ddius.database_id = ssd.dbid


    join sys.sysindexes ssi on ddius.object_id = ssi.id and ddius.index_id = ssi.indid
    join sys.sysobjects sso on ddius.object_id = sso.id


    where ssi.name is null


    order by user_seeks+user_scans+user_lookups+user_updates desc


    Figure 4-16 shows the results of this query.


    ***Figure 4-16.** Tables without indexes.*


    As I stated before, locating unused indexes and removing them can be one of the
    quickest ways a DBA can produce performance gains, as well as achieve space-allocation
    gains. Executing the following query will join the dm_db_index_usage_stats DMV
    to sys.tables and sys.indexes, identifying any unused indexes:


    SELECT st.name as TableName


    , si.name as IndexName


    from sys.indexes si


    inner join sys.dm_db_index_usage_stats ddius


    on ddius.object_id = si.object_id


    and ddius.index_id = si.index_id


    inner join sys.tables st


    on si.object_id = st.object_id


    where ((user_seeks = 0


    and user_scans = 0


    and user_lookups = 0)


    or ddius.object_id is null)


    Figure 4-17 shows the results.


    ***Figure 4-17.** Unused index on table Person.*


