    的总量。如果锁等待发生在相同对象上，随着 `Lock Wait Time(ms)` 的增加，数据库并发性可能会受到影响。


    `SQL Server SQLServer:Locks(*)\Number of Deadlocks/sec`

    如果死锁数量大于 1，请启用跟踪标志 1222 或利用扩展事件来捕获额外的死锁数据。


