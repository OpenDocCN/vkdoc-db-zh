  raw: 'When all the details are in place, your target framework is taking shape,
    and your environment is slowly being created, you have to think about how to make
    your effort a success. Part of the solution is to choose the right developers
    to start with. Most would take the developers from the biggest or most important
    applications, but I think that would be a mistake. Start with the easy and simple
    and small systems, where you almost can guarantee yourself success before you
    begin. Then you will quietly build a good foundation. If problems arise, they
    will most likely be easier to fix than if you had chosen a big complex system
    to start from. Another reason for starting small is that you slowly build up positive
    stories and happy ambassadors in your organization. In the long run, those happy
    ambassadors will translate into more systems being moved to your environment.


    **chapter 2**


    ■ ■ ■


    **Getting It Right: Designing the**


    **Database for Performance**


    **By Louis Davidson**


    Most of the topics in the book are related to admin tasks: indexing, performance
    tuning, hardware, backup, compression, and so forth. Many times, database administrators
    (DBAs) don’t have input into the design of the database they are responsible for.
    But even if you don’t have control over the design, it’s nice to know what a good
    design ought to look like—if for no other reason than you can be specific in your
    complaints when you are struggling with a piece of software.


    In this chapter, I’ll present an overview of the entire process of designing a
    database system, discussing the factors that make a database perform well. Good
    performance starts early in the process, well before code is written during the
    definition of the project. (Unfortunately, it really starts well above of the
    pay grade of anyone who is likely to read a book like this.) When projects are
    hatched in the board room, there’s little understanding of how to create software
    and even less understanding of the unforgiving laws of time. Often the plan boils
    down to “We need software X, and we need it by a date that is completely pulled
    out of…well, somewhere unsavory.” So the planning process is cut short of what
    it needs to be, and you get stuck with the seed of a mess. No matter what part
    you play in this process, there are steps required to end up with an acceptable
    design that works, and that is what you as a database professional need to do
    to make sure this occurs.


    In this chapter, I’ll give you a look at the process of database design and highlight
    many of the factors that make the goals of many of the other chapters of this
    book a whole lot easier to attain. Here are the main topics I’ll talk about:


    • **Requirements** Before your new database comes to life, there are preparations
    to be made. Many database systems perform horribly because the system that was


    initially designed bore no resemblance to the system that was needed.


    •


    **Table Structure** The structure of the database is very important. Microsoft
    SQL


    Server works a certain way, and it is important that you build your tables in
    a way that maximizes the SQL Server engine.


    •


    **Design Testing** The process of testing should go beyond code and extend into
    the design process, with the primary goal of the process being to make sure the
    software that is created matches to needs of the user.


    chapter 2 ■ GettinG it riGht: DesiGninG the Database for performance The process
    of database design is not an overly difficult one, yet it is so often done poorly.
    Throughout my years of writing, working, speaking, and answering questions in
    forums, easily 90 percent of the problems came from databases that were poorly
    planned, poorly built, and (perhaps most importantly) unchangeable because of
    the mounds of code accessing those structures. With just a little bit of planning
    and some knowledge of the SQL Server engine’s base patterns, you’ll be amazed
    at what you can achieve and that you can do it in a lot less time than initially
    expected.


    Requirements


    The foundation of any implementation is an understanding of what the heck is supposed
    to be created.


    Your goal in writing software is to solve some problem. Often, this is a simple
    business problem like creating an accounting system, but sometimes it’s a fun
    problem like shuffling riders on and off of a theme-park ride, creating a television
    schedule, creating a music library, or solving some other problem.


    As software creators, our goal ought to be to automate the brainless work that
    people have to do and let them use their brains to make decisions.


    Requirements take a big slap in the face because they are the first step in the
    classic “waterfall”


    software-creation methodology. The biggest lie that is common in the programming
    community is that the waterfall method is completely wrong. The waterfall method
    states that a project should be run in the following steps:


    •


    **Requirements Gathering** Document what a system is to be, and identify the


    criteria that will make the project a success.


    •


    **Design** Translate the requirements into a plan for implementation.


    •


    **Implementation** Code the software.


    •


    **Testing** Verify that the software does what it is supposed to do.


    •


    **Maintenance** Make changes to address problems not caught in testing.


    •


    **Repeat the process.**


    The problem with the typical implementation of the waterfall method isn’t the
    steps, nor is it the order of the steps, but rather it’s the magnitude of the
    steps. Projects can spend months or even years gathering requirements, followed
    by still more months or years doing design. After this long span of time, the
    programmers finally receive the design to start coding from. (Generally, it is
    slid under their door so that the people who devised it can avoid going into the
    dungeons where the programmers are located, shackled to their desks.) The problem
    with this approach is that, the needs of the users changed frequently in the years
    that passed before software was completed. Or (even worse) as programming begins,
    it is realized that the requirements are wrong, and the process has to start again.


    As an example, on one of my first projects as a consultant, we were designing
    a system for a chemical company. A key requirement we were given stated something
    along the lines of: “Product is only sold when the quality rating is not below
    100.” So, being the hotshot consultant programmer who wanted to please his bosses
    and customers, I implemented the database to prevent shipping the product when
    the rating was 99.9999 or less, as did the UI programmer. About a week after the
    system is shipped, the true requirement was learned. “Product is only sold when
    the quality rating is not below 100…or the customer overrides the rating because
    they want to.” D’oh! So after a crazy few days where sleep was something we only
    dreamt about, we corrected the issues. It was an excellent life lesson, however.
    Make sure requirements make sense before programming them (or at least get it
    down in writing that you made sure)!


    As the years have passed and many projects have failed, the pendulum has swung
    away from the pure waterfall method of spending years planning to build software,
    but too often the opposite now occurs. As a reaction to the waterfall method,
    a movement known as Agile has arisen. The goal of Agile is to attempt to 18'
  trans: '当所有细节都到位时，你的目标框架正在成形，环境也正在慢慢创建，你必须思考如何使你的努力取得成功。解决方案的一部分是选择正确的开发人员作为起点。大多数人可能会从最大或最重要的应用程序中抽调开发人员，但我认为那将是一个错误。从简单、小型、容易的系统开始，在开始之前几乎就能保证自己成功。这样你将悄然奠定良好的基础。如果出现问题，它们很可能比你选择一个庞大复杂的系统作为起点时更容易解决。从小处开始的另一个原因是，你能在组织内逐步积累积极的故事和满意的“大使”。长远来看，这些满意的“大使”将转化为更多系统迁移到你的环境中。


    ## 第二章：正确着手：为性能而设计数据库


    *作者：Louis Davidson*


    本书中的大多数主题都与管理任务相关：索引、性能调优、硬件、备份、压缩等等。很多时候，数据库管理员（DBA）对他们负责的数据库设计没有发言权。但即使你无法控制设计，了解一个好的设计应该是什么样子也是有益的——至少，当你与某个软件较劲时，你可以更具体地提出抱怨。


    在本章中，我将概述数据库系统设计的整个过程，讨论使数据库性能良好的因素。良好的性能始于过程的早期，远在代码编写之前，即在项目定义阶段。（不幸的是，它实际上始于远高于本书任何读者薪资等级的层面。）当项目在董事会会议室里被构想时，人们对于如何创建软件知之甚少，对时间的严苛规律更是理解甚少。计划常常归结为“我们需要软件
    X，并且我们需要它在一个完全出于…嗯，某个不那么令人愉快的地方想出的日期前完成。”因此，计划过程被缩短，你接手了混乱的种子。无论你在这个过程中扮演什么角色，都需要采取一些步骤来最终获得一个可行的、可接受的设计，而这正是你作为数据库专业人员需要确保发生的事情。


    在本章中，我将带你了解数据库设计的过程，并强调许多使本书其他章节的目标更容易实现的因素。以下是我将要讨论的主要话题：


    *   **需求** 在新数据库诞生之前，需要做一些准备工作。许多数据库系统性能极差，因为最初设计的系统与实际需要的系统毫无相似之处。

    *   **表结构** 数据库的结构非常重要。Microsoft SQL Server 以某种方式工作，因此以最大化 SQL Server 引擎性能的方式来构建你的表至关重要。

    *   **设计测试** 测试过程应超越代码，延伸到设计过程中，该过程的主要目标是确保创建的软件符合用户的需求。


    数据库设计过程并非特别困难，却常常做得很糟糕。在我多年的写作、工作、演讲和在论坛回答问题的过程中，大约 90%的问题都源于那些规划不善、构建不当、并且（也许最重要的是）因为访问这些结构的大量代码而无法更改的数据库。只需一点规划和一些关于
    SQL Server 引擎基础模式的知识，你就会惊讶于自己所能取得的成果，以及你能比最初预期更快地完成它。


    ### 需求


    任何实现的基础是理解到底要创建什么。


    编写软件的目标是解决某个问题。通常，这是一个简单的业务问题，比如创建一个会计系统，但有时它也是一个有趣的问题，比如在主题公园游乐设施上调度乘客，创建电视节目表，建立音乐库，或解决其他问题。


    作为软件创造者，我们的目标应该是自动化人们必须做的无脑工作，让他们用大脑来做决策。


    需求受到了沉重的打击，因为它们是经典“瀑布式”软件创建方法论中的第一步。编程界普遍存在的一个最大谎言是瀑布式方法完全错误。瀑布式方法指出，一个项目应按照以下步骤运行：


