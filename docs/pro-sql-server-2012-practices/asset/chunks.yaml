    Later in this chapter, I will show you how to create a SQL Server Agent job that
    will gather this information on a schedule and insert it into a database for review.


    SQL Server Agent


    SQL Server Agent is a service that executes jobs as an external process to the
    SQL Server Engine. This is a very simplistic explanation for a tool that has many
    features and uses. You begin by creating a task, or series of tasks. Your task
    or tasks constitutes a *job*, which can be called on demand, on a schedule, or
    from an alert. You can perform actions such as notifying operators or running
    another job on success or failure.


    SQL Agent is a multilayered, flexible tool that easily enables automation.


    To get the most from SQL Agent, it is helpful to have Database Mail set up and
    enabled, which allows SQL Server to send e-mail through an SMTP server.


    n **Note** Database Mail can be found in Books Online at [http://msdn.microsoft.com/en-us/library/](http://msdn.microsoft.com/en-us/library/)


    ms190658.aspx.


    After Database Mail has been enabled, you can configure operators to notify users
    via e-mail.


    ![Image 113](index-246_1.png)


    chapter 10 ■ automating administration


    Operators


    Operators hold contact information for people that notifications and alerts can
    be sent to. You can set them up for any e-mail address. For many functions, it
    is recommended to have a general mailbox for a team that the alerts can be sent
    to, rather than one individual.


    To access operator information, go to SSMS Object Explorer. Connect to an instance
    and expand SQL


    Server Agent. To create an operator, right-click and select New Operator. The
    operator general setup screen is shown in Figure 10-2\. The necessary fields here
    are Name and E-mail name. (Microsoft states the net send and pager options will
    be removed in a future version of SQL Server, and advises not to use them.)


    ***Figure 10-2.** Configuring an operator*


    chapter 10 ■ automating administration


    Jobs'
  trans: "\n# SQL Server 监控与自动化管理\n\n每个会话使用的 CPU 时间。该视图向你展示每个会话在处理器上消耗的时间，以毫秒为单位。清单\
    \ 10-2 展示了一个查询此信息的示例。你需要按 CPU 时间降序排序，并查看那些消耗最高的查询所返回的查询文本。没有一个特定的毫秒阈值能表明查询是好是坏；你需要在实例中为此设置一个基准，并据此权衡各个查询。\n\
    \n## 清单 10-2. 查看会话所用 CPU 时间的查询\n\n```sql\nSELECT ER.session_id,\n    ER.request_id,\n\
    \    ES.host_name,\n    ES.login_name,\n    DB_NAME(ER.database_id) AS dbname,\n\
    \    ER.start_time,\n    GETDATE() as currenttime,\n    ER.cpu_time,\n    ER.total_elapsed_time,\n\
    \    EST.text as query_text\nFROM sys.dm_exec_requests ER\nINNER JOIN sys.dm_exec_sessions\
    \ ES on ER.session_id = ES.session_id\nOUTER APPLY sys.dm_exec_sql_text(ER.sql_handle)\
    \ EST\nOUTER APPLY sys.dm_exec_query_plan(ER.plan_handle) EQP\nORDER BY ER.cpu_time\
    \ DESC;\n```\n\n可以通过 `sys.dm_exec_requests` DMV 来监控磁盘的读写操作。`reads` 和 `writes`\
    \ 列会告诉你每个会话执行的读写次数。清单 10-3 给出了一个按读取次数排序查看会话的查询。与处理器时间一样，对于多少读写次数算是“坏”或“过多”并没有固定答案。一个已建立的基准会告诉你什么是你的数据库的正常状态。\n\
    \n## 清单 10-3. 查看按读取次数排序的会话的查询\n\n```sql\nSELECT ER.session_id,\n    ER.request_id,\n\
    \    ES.host_name,\n    ES.login_name,\n    DB_NAME(ER.database_id) AS dbname,\n\
    \    ER.start_time,\n    GETDATE() as currenttime,\n    ER.total_elapsed_time,\n\
    \    ER.reads,\n    ER.writes,\n    EST.text as query_text\nFROM sys.dm_exec_requests\
    \ ER\nINNER JOIN sys.dm_exec_sessions ES on ER.session_id = ES.session_id\nOUTER\
    \ APPLY sys.dm_exec_sql_text(ER.sql_handle) EST\nOUTER APPLY sys.dm_exec_query_plan(ER.plan_handle)\
    \ EQP\nORDER BY ER.reads DESC;\n```\n\n请注意，DMV 中的信息在每次 SQL Server 重启时都会被清除。本章后续部分，我将向你展示如何创建一个\
    \ SQL Server Agent 作业，该作业会按计划收集这些信息并将其插入数据库以供审阅。\n\n# SQL Server Agent\n\nSQL\
    \ Server Agent 是一项作为 SQL Server 引擎外部进程来执行作业的服务。对于一个拥有众多功能和用途的工具来说，这是一个非常简化的解释。你首先要创建一个任务，或一系列任务。你的单个或多个任务构成一个\
    \ *作业*，该作业可以按需调用、按计划调用或通过警报调用。你可以在成功或失败时执行诸如通知操作员或运行另一个作业等操作。\n\nSQL Agent 是一个多层次、灵活的工具，能够轻松实现自动化。\n\
    \n要充分利用 SQL Agent，设置并启用 Database Mail 是很有帮助的，它允许 SQL Server 通过 SMTP 服务器发送电子邮件。\n\
    \n### 注意\n你可以在在线手册中找到关于 Database Mail 的信息：[`msdn.microsoft.com/en-us/library/ms190658.aspx`](http://msdn.microsoft.com/en-us/library/ms190658.aspx)。\n\
    \n启用 Database Mail 后，你可以配置操作员，以便通过电子邮件通知用户。\n\n![Image 113](img/index-246_1.png)\n\
    \n# 操作员\n\n操作员包含可以接收通知和警报的人员的联系信息。你可以为任何电子邮件地址设置操作员。对于许多功能，建议为团队设置一个通用邮箱来接收警报，而不是发给个人。\n\
    \n要访问操作员信息，请转到 SSMS 对象资源管理器。连接到一个实例并展开 `SQL Server Agent`。要创建操作员，请右键单击并选择 `新建操作员`。操作员常规设置屏幕如图\
    \ 10-2 所示。这里必要的字段是 `名称` 和 `电子邮件名称`。（Microsoft 声称在未来的 SQL Server 版本中将移除网络发送和寻呼机选项，并建议不要使用它们。）\n\
    \n## 图 10-2. 配置操作员\n\n# 作业\n"
- fmt: '## SQL Server Agent


    SQL Server Agent allows you to create jobs, which are an action or series of actions
    performed against the instance. The job can be run once, or multiple times. A
    job will have several components. These components are the job steps, the schedule,
    and the notifications.


    An example of a job is monitoring the memory, processor, and disk information
    discussed in the DMV section. To begin, you will create a database to hold tables
    to log the information. This query is shown in Listing 10-4.


    ### Listing 10-4. Creating the DBAInfo Database


    ```sql

    CREATE DATABASE DBAInfo;

    ```


    Next, you will create a table to hold the information for each DMV query, as shown
    in Listing 10-5.


    ### Listing 10-5. Creating Tables to Hold Monitoring Information


    ```sql

    CREATE TABLE MemoryDMVHistory

    (total_physical_memory_kb BIGINT,

    available_physical_memory_kb BIGINT,

    system_memory_state_desc NVARCHAR(256),

    collection_date_time DATETIME);


    CREATE TABLE ProcessorDMVHistory

    (session_id SMALLINT,

    request_id INT,

    host_name NVARCHAR(128),

    login_name NVARCHAR(128),

    db_name NVARCHAR(128),

    start_time DATETIME,

    currenttime DATETIME,

    cpu_time INT,

    total_elapsed_time INT,

    query_text NVARCHAR(MAX),

    collection_date_time DATETIME);


    CREATE TABLE DiskDMVHistory

    (session_id SMALLINT,

    request_id INT,

    host_name NVARCHAR(128),

    login_name NVARCHAR(128),

    db_name NVARCHAR(128),

    start_time DATETIME,

    currenttime DATETIME,

    total_elapsed_time INT,

    reads BIGINT,

    writes BIGINT,

    query_text NVARCHAR(MAX),

    collection_date_time DATETIME);

    ```


    To view existing jobs open `SSMS`, connect to an instance, expand `SQL Server
    Agent`, and expand `Jobs`.


    To create a new job, right-click `Jobs`. The General screen, shown in Figure 10-3,
    allows you to configure basic information such as the job name, category, and
    description. Name the job “Gather DMV performance metrics,” select `Data Collector`
    as the category, and add a description.


    ![Image 114](index-248_1.png)


    chapter 10 ■ automating administration


    ### Figure 10-3. The General properties of a SQL Server Agent job


    ### Job Steps


    Each job is comprised of one or more steps. To create a step, click `Steps` on
    the left of the job screen, as shown in Figure 10-4. When creating a job step,
    at minimum you will supply a step name, type, and command. The step name is how
    you will see the steps referenced in the `Job Activity Monitor` and error logs.
    Pick a clear name that makes it obvious what the step does.


    The most common type of command used is `T-SQL`, but you are also able to specify
    `ActiveX Script`, `CmdExe`, `PowerShell`, `Replication agents`, `Analysis Services`
    commands or queries, or `Integration Services` packages. These options greatly
    extend the functionality of the jobs. `T-SQL` can do many tasks, but some tasks
    are better done by other tools.


    chapter 10 ■ automating administration


    If your `SQL Agent` service account doesn’t have enough permission to execute
    a `T-SQL` script, you can include the `EXECUTE AS` command in the code. For steps
    other than `T-SQL`, the `Run As` option allows you to designate another account
    to execute the step. Being able to pass in a different set of credentials can
    help you circumvent a lack of permissions, without your having to grant the `Agent`
    account additional permissions.


    The following are a few steps required to set up the `Run As` option correctly:


    • You must first add a credential to the server with the username and password
    information. The setup for doing so can be accessed under `Security > Credentials`.


    • Then, create a proxy linked to those credentials. Proxy setup is under `SQL
    Server Agent > Proxies`.


    • After you have created a credential, create a proxy. Assign the proxy to the
    type of steps it can be associated with.


    You will now be able to choose an account to run any associated steps.


    To continue creating the job that executes the DMVs, add a step that executes
    the query shown in Listing 10-6.


    ### Listing 10-6. Query to Insert the Results of the DMV Queries into Tables


    ```sql

    INSERT INTO MemoryDMVHistory

    SELECT total_physical_memory_kb,

    available_physical_memory_kb,

    system_memory_state_desc,

    GETDATE()

    ```'
