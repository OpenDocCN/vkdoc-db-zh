  trans: '

    # 戴尔服务器对比回顾


    我非常喜欢 `R720xd`，它拥有 26 个内部硬盘位。我怀疑很高比例的 SQL Server 工作负载都能在 `R720xd` 上运行得极为出色。如果
    26 个内部硬盘不能提供足够的 I/O 性能和容量，你还可以添加一些内置固态存储卡，或者使用某种形式的外部存储。


    作为一名数据库专业人士，我会积极游说反对使用 `R420` 或 `R520` 型号，因为它们搭载的是入门级的 `英特尔至强 E5-2400 系列处理器`，与
    `R620`、`R720` 和 `R720xd` 所使用的 `英特尔至强 E5-2600 系列处理器` 相比，其主频更低，内存带宽也更小。与更高端的型号相比，它们的总内存容量只有一半，`PCI-E`
    插槽也少得多。它们的价格稍低，但与 `SQL Server 2012` 的许可成本相比，硬件成本的差异其实相当小。请记住，你是基于物理核心数来支付 `SQL
    Server 2012` 核心许可费用的，因此你希望服务器的其他部分尽可能获得最佳配置。一个有利的事实是，`英特尔至强 E5` 处理器家族提供四核、六核和八核型号，其中特定的四核型号比“旗舰级”八核型号处理器拥有更高的基础主频。如果你想最小化
    `SQL Server 2012` 基于核心的许可成本，并且愿意牺牲一些可扩展性和容量，你可以为服务器选择这些基础主频更快的四核型号处理器，实际上可以获得非常好的单线程性能。


    # 处理器供应商选择


    在 `Microsoft Windows` 和 `SQL Server` 的世界里，你必须在基于 `英特尔至强` 处理器的服务器和基于 `AMD 皓龙` 处理器的服务器之间做出选择。你在这里的选择直接决定了你可以从首选服务器供应商那里获得哪些型号的服务器，因为只有特定的服务器型号可以搭配英特尔或
    AMD 处理器。特别是随着转向 `SQL Server 2012` 基于核心的许可模式，几乎无法推荐基于 `AMD 皓龙` 处理器的服务器用于 `SQL Server
    2012`，特别是对于 `OLTP` 工作负载。


    做出如此强烈的断言有几个原因。首先是现代高端 `AMD 皓龙` 处理器相对较高的物理核心数，有些型号提供 12 或 16 个物理核心。每一个物理处理器核心都需要一个相对昂贵的
    `SQL Server 2012` 处理器核心许可。如果每个物理核心都能提供出色的单线程性能，这或许还可以接受，但遗憾的是，情况并非如此。你可以通过执行一些简单的算术运算来比较官方
    `TPC-E` `OLTP` 基准测试分数，从而轻松检查每个物理处理器核心在 `OLTP` 工作负载下的相对性能。你可以简单地将系统的实际 `TPC-E`
    分数除以被测系统 (`SUT`) 数据库服务器中的物理处理器核心数，即可得到特定型号处理器每个物理核心的分数。这是一种有效的方法，因为只要你有足够的 I/O
    性能来驱动工作负载（考虑到硬件供应商开发和提交官方 `TPC-E` 基准测试的成本和时间，这是一个相当安全的假设），`TPC-E` 基准测试就是处理器受限的。


    例如，2012 年 7 月 5 日，富士通为一个 `PRIMERGY RX300 S7` 系统提交了 1871.81 `TpsE` 的 `TPC-E` 分数，该系统配备了两颗
    `英特尔至强 E5-2690` 处理器，系统总共有 16 个物理核心。用 1871.81 除以 16 个物理核心，得到每个物理处理器核心的分数为 116.98。


    2011 年 11 月 14 日，惠普为一个 `Proliant DL385 G7` 系统提交了 1232.84 `TpsE` 的 `TPC-E` 分数，该系统配备了两颗
    `AMD 皓龙 6282 SE` 处理器，系统总共有 32 个物理核心。用 1232.82 除以 32 个物理核心，得到每个物理处理器核心的分数为 38.52。`英特尔`
    系统每个物理处理器核心的分数是 `AMD` 系统的 3.03 倍。


    更糟糕的是，对于 `AMD` 系统来说，其 `SQL Server 2012` 的许可成本是基于 `英特尔` 系统的两倍，因为你必须购买 32 个核心许可，而不是
    16 个。


    ## 戴尔 PowerEdge R720


    该型号服务器采用 `2U` 外形规格，双处理器插槽，使用 `英特尔至强 E5-2600 系列处理器`。它有二十四个内存插槽（使用 16-GB `DIMMs`
    时总内存为 384 GB），十六个 2.5 英寸硬盘位，以及六个 `PCI-E 3.0 x8` 和一个 `PCI-E 3.0 x16` 扩展插槽。出于 `SQL
    Server 2012` 核心许可的目的，它总共有八、十二或十六个物理核心。启用 `英特尔` 超线程技术后，它总共有十六、二十四或三十二个逻辑核心。


    `R720` 是我最喜欢的 `戴尔第 12 代` 产品线型号之一。它与 `R620` 使用相同的 `英特尔至强 E5-2600 系列处理器`，但它有七个 `PCI-E`
    扩展插槽和十六个内部硬盘位，两者结合为您提供了很大的潜在 I/O 容量和性能。它确实比 `R620` 贵一点，并且是 `2U` 的垂直尺寸，因此在某些场景下我会更倾向于
    `R620`。一个例子场景是 `OLTP` 工作负载，我知道我会使用具有非常好的随机 I/O 性能的外部存储区域网络 (`SAN`) 存储，并且我希望能够使用
    `1U` 数据库服务器而不是 `2U` 数据库服务器。


    ## 戴尔 PowerEdge R720xd


    该型号服务器采用 `2U` 外形规格，双处理器插槽，使用 `英特尔至强 E5-2600 系列处理器`，有二十四个内存插槽（使用 16-GB `DIMMs`
    时总内存为 384 GB），二十六个 2.5 英寸硬盘位，以及四个 `PCI-E 3.0 x8` 和两个 `PCI-E 3.0 x16` 扩展插槽。出于 `SQL
    Server 2012` 核心许可的目的，它总共有八、十二或十六个物理核心。启用 `英特尔` 超线程技术后，它总共有十六、二十四或三十二个逻辑核心。


    `R720xd` 与 `R720` 类似，区别在于它有二十六个内部硬盘位，但只有六个 `PCI-E` 扩展插槽。如果你的 I/O 工作负载可以在二十六个内部硬盘位上运行（其中部分或全部可以是固态硬盘
    (`SSD`)），这个型号可能是一个不错的选择。这可以让你避免购买昂贵的外部直连存储 (`DAS`) 机柜或 `SAN` 的费用。


    ## 戴尔 PowerEdge R820


    该型号服务器采用 `2U` 外形规格，四处理器插槽，使用 `英特尔至强 E5-4600 系列处理器`。它有四十八个内存插槽（使用 16-GB `DIMMs`
    时总内存为 768 GB），十六个 2.5 英寸硬盘位，以及五个 `PCI-E 3.0 x8` 和两个 `PCI-E 3.0 x16` 扩展插槽。出于 `SQL
    Server 2012` 核心许可的目的，它总共有十六、二十四或三十二个物理核心。启用 `英特尔` 超线程技术后，它总共有三十二、四十八或六十四个逻辑核心。


    `R820` 在 `2U` 垂直尺寸内拥有四个处理器插槽。它使用 `英特尔至强 E5-4600 系列处理器`，其主频低于 `至强 E5-2600 系列`。从双路服务器升级到四路服务器时，还存在一些非统一内存访问
    (`NUMA`) 扩展损失（即，使用完全相同的处理器，四路服务器的可扩展性不如双路服务器的两倍）。`R820` 确实有十六个内部硬盘位和七个 `PCI-E`
    扩展插槽，因此具有良好的 I/O 容量和性能潜力。与 `R620`、`R720` 或 `R720xd` 相比，它的总 RAM 容量也是两倍。


    尽管有所有这些因素，我仍然倾向于选择两台 `R720xd` 服务器而不是一台 `R820` 服务器，假设你可以将工作负载拆分到两台服务器上。你将拥有更快、更便宜的处理器，超过三倍的内部硬盘位，以及接近两倍的
    `PCI-E` 扩展插槽，同时支付相同的 `SQL Server 2012` 许可费用。

    '
- fmt: '# 第15章：服务器选型与规模确定


    ## 15.1 处理器许可成本分析


    SQL Server 2012 企业版核心许可的零售价为 **$6,874**。这意味着，为搭载两颗 AMD Opteron 6282 SE 处理器的数据库服务器购买
    32 个 SQL Server 2012 企业版核心许可将花费 **$219,968**，而为搭载 Intel Xeon E5-2690 处理器的服务器购买
    16 个核心许可则花费 **$109,984**。这意味着，在相对单线程性能大约只有后者三分之一的情况下，你却要支付两倍的 SQL Server 2012
    核心许可费用。


    或许微软也认识到这种情况对 AMD 不利，于是在 2012 年 4 月 1 日发布了一份名为 **“SQL Server Core Factor Table”**
    的文档。该表允许你针对某些 AMD 处理器（包括六核及以上的 AMD 31XX、32XX、41XX、42XX、61XX、62XX 系列处理器），在许可计算时将其实际物理核心数乘以
    0.75，这本质上是为符合条件的 AMD 处理器用户提供了 25% 的许可折扣。在我们之前的例子中，SQL Server 2012 核心许可成本将从 **$219,968**
    降至 **$164,976**，这是一个显著的减少。尽管如此，与更快的 Intel 系统 **$109,984** 的许可成本相比，它仍然不占优势。在您所在组织中，向一位明智的首席技术官证明为
    SQL Server 2012 OLTP 工作负载选择基于 AMD 的系统是合理的，将会相当困难。


    支持这一论点的另一个事实是，在过去五年总共 54 次 TPC-E 基准测试提交中，只有 4 次是基于 AMD 的。我真心希望 AMD 的处境并非如此严峻，因为
    AMD 和 Intel 之间的良性竞争对每个人都有益。如果 AMD 不能缩小这一性能差距，Intel 很可能会放缓创新步伐，推迟发布周期，以便从其现有处理器型号中获取更长时间的更多利润。


    ## 15.2 处理器型号选择


    假设您已确信应为 SQL Server 2012 数据库服务器选择 Intel 处理器。下一步将是选择您的服务器应使用的具体处理器型号。这是一个非常重要的决定，因为它将对您的
    SQL Server 2012 核心许可成本产生巨大影响，并直接影响数据库服务器的性能、可扩展性和容量。您很可能在未来几年内都只能使用选定的处理器。通过向服务器供应商购买
    “处理器套件” 来升级现有数据库服务器中的处理器是可能的。但问题在于，服务器供应商通常对处理器套件收取裸处理器零售价数倍的价格，因此购买一台全新的数据库服务器通常比升级现有服务器的处理器更划算。


    事实上，在我的整个职业生涯中，我从未见过有人实际升级现有数据库服务器中的处理器。我见过人们购买额外的处理器来填充空的处理器插槽。关键在于，您实际上将在服务器的整个生命周期内使用那些原始处理器，这也是明智选择的又一个理由。


    在 SQL Server 2012 之前，我的建议是简单地为您考虑购买的特定型号服务器选择 “顶级”、最昂贵的处理器。这是因为旧版本的 SQL Server
    使用基于插槽的许可，无论特定处理器中有多少物理核心，您都无需支付额外费用。那时不选择 “顶级” 处理器是愚蠢的，因为无论您选择何种处理器，基于插槽的许可成本都是相同的。尽管如此，我看到许多人选择低端到中端处理器来搭配他们非常昂贵（每个大约
    **$27,000**）的 SQL Server 2008 R2 企业版处理器许可，目的是为每个处理器节省几百美元，但却因此承受了非常明显性能和可扩展性损失。


    随着 SQL Server 2012 许可的变化，您将不得不重新思考这种旧的处理器选择策略。根据您的预算和目标，您有两个方向可以选择。首先，如果您的组织运行着关键业务应用程序，并且您有足够的预算，那么尽管
    SQL Server 2012 核心许可成本增加了，您仍然应该选择那个 “顶级” 处理器。这些额外的许可成本对您个人来说可能是一大笔钱，但对许多大型组织来说，这些成本可能微不足道。


    作为一种谈判策略，我尽量不与自己讨价还价。我总是要求我真正想要的东西，只在必要时才做出让步。如果您从一个中端处理器开始，最终为了节省硬件和许可成本而选择了一个低端处理器，那么如果将来出现性能或可扩展性问题，您将受到指责。您还必须在整个服务器生命周期内忍受性能的降低和容量的限制，您应用程序的用户也将不得不承受这种降低的性能。毕竟，我从未听说过有人抱怨他们的数据库服务器太快，但我经常听到抱怨说它太慢。


    其次，如果您的应用程序不是关键业务，或者您的组织 *确实* 无法负担购买大量 SQL Server 2012 核心许可，那么您可以特意选择一个核心数较少但基础时钟频率可能更高的处理器。这种方法可以在牺牲可扩展性和容量余量的前提下，节省大量
    SQL Server 2012 核心许可费用。如果您选择这条路，您应该确保所有人都知道您在做什么、为什么这么做，并且同意您的做法。这有助于避免在将来遇到可扩展性或容量问题时受到指责。


    通过一个例子来说明这如何运作：您可以购买一台双路数据库服务器，配备两颗 Intel Xeon E5-2690 处理器，每颗有八个物理核心，服务器总共十六个物理核心。这一台数据库服务器的
    SQL Server 2012 企业版核心许可成本为十六乘以 **$6,874**，总计 **$109,984**。如果您想专注于降低这台服务器的许可成本，您有两个可行的替代方案。一个选择是选择两颗
    Intel Xeon E5-2643 处理器，每颗有四个物理核心，服务器总共八个物理核心。这一台数据库服务器的 SQL Server 2012 企业版核心许可成本为八乘以
    **$6,874**，总计 **$54,992**。


    第二个选择是只选择一颗 Intel Xeon E5-2690 处理器，它有八个物理核心，服务器总共八个物理核心。这一台数据库服务器的 SQL Server
    2012 企业版核心许可成本为八乘以 **$6,874**，总计 **$54,992**。'
  raw: 'The retail cost for SQL Server 2012 Enterprise Edition core licenses is $6,874\.
    That means that you would pay $219,968 for 32 SQL Server 2012 Enterprise Edition
    core licenses for the two-socket AMD


    Opteron 6282 SE database server versus $109,984 for 16 SQL Server 2012 Enterprise
    Edition core licenses 369


    chapter 15 ■ Selecting and Sizing the Server


    for the Intel Xeon E5-2690 database server. This means that you are paying twice
    the SQL Server 2012 core license costs for about one-third of the relative single-threaded
    performance.


    Perhaps recognizing how bad this situation was for AMD, Microsoft released a document
    called the


    “SQL Server Core Factor Table” on April 1, 2012\. This table allows you to adjust
    your physical core counts for licensing purposes for certain AMD processors, including
    AMD 31XX, 32XX, 41XX, 42XX, 61XX, 62XX


    Series Processors with six or more cores by multiplying your actual physical core
    count by 0.75, which essentially gives you a 25 percent licensing discount if
    you use an eligible AMD processor. In our earlier example, the SQL Server 2012
    core licensing cost would be reduced from $219,968 to $164,976, which is a significant
    reduction. Still, it does not compare very favorably to the $109,984 license cost
    for the faster Intel-based system. Choosing the AMD-based system for SQL Server
    2012 OLTP workloads would be fairly hard to defend to an intelligent CTO in your
    organization.


    Another piece of evidence for this argument is the fact that there have been only
    four AMD-based TPC-E submissions out of a total of 54 total TPC-E benchmark submissions
    over the past five years. I honestly wish the evidence was not so grim for AMD,
    since healthy competition between AMD and Intel is good for everyone. If AMD cannot
    close this performance gap, Intel is very likely to slow down its pace of innovation
    and delay its release cycles to earn more profits out of its existing processor
    models for a longer period of time.


    Processor Model Selection


    Let us assume that you are convinced that you should choose an Intel processor
    for your SQL Server 2012


    database server. The next step would be choosing which exact processor your new
    server should use. This is a very important decision, as it will have a huge effect
    on your SQL Server 2012 core license costs, and it will have a direct effect on
    the performance, scalability, and capacity of your database server. You are also
    likely to be stuck with your processor choice for the next several years. It is
    possible to upgrade the processor(s) in an existing database server, by buying
    a “processor kit” from your server vendor. The problem with this is that the server
    vendors typically charge several times the retail cost of a bare processor for
    a processor kit, so that it is often more affordable to buy a brand new database
    server rather than to upgrade the processors in an existing database server.


    In fact, I have never seen anyone actually upgrade the processors in an existing
    database server in my entire career. I have seen people buy additional processors
    to fill empty processor sockets. The point of this is that you will, in fact,
    be using those original processors for the entire life of the server, which is
    another reason to choose wisely.


    Prior to SQL Server 2012, my advice was to simply select the “top-of-the-line,”
    most expensive processor available for the particular model server that you were
    considering for purchase. This was because older versions of SQL Server used socket-based
    licensing, where you did not pay anything extra, regardless of how many physical
    cores were in a particular processor. It was foolish not to get that “top-of-the-line”
    processor back then, since your socket-based licensing cost was the same regardless
    of your processor choice. Despite this, I saw many people select low-end to mid-range
    processors to use with their very expensive (roughly $27,000 each) SQL Server
    2008 R2 Enterprise Edition processor licenses, in order to save a few hundred
    dollars per processor but take a very noticeable performance and scalability penalty.


    With the licensing changes in SQL Server 2012, you will have to rethink this old
    processor selection strategy. Depending on your budget and objectives, you can
    go in one of two directions. First, if your organization is running mission-critical
    applications that will be using your database server, and you have sufficient
    budget to work with, you are still going to want to pick that “top-of-the line”
    processor anyway, despite the added SQL Server 2012 core licensing costs. Those
    extra licensing costs might seem like a lot of money to you, personally, but to
    many large organizations, these costs can be quite trivial.


    As a negotiating strategy, I try not to negotiate with myself. I will always ask
    for what I really want, and then come down only if it is really necessary. If
    you start out with a mid-range processor, and then end up 370


    chapter 15 ■ Selecting and Sizing the Server


    getting a lower-end processor to save on hardware and licensing costs, you are
    the one that will get the blame if you have performance or scalability problems
    in the future. You will also have to live with the reduced performance and capacity
    over the life of the server, and the users of your application will also have
    to suffer with that reduced performance. After all, I have never heard anyone
    complain that their database server was too fast, but I have often heard complaints
    that it was too slow.


    Second, if your application is not mission critical, or your organization *honestly*
    cannot afford to buy a larger number of SQL Server 2012 core licenses, then you
    can purposely select a lower core count processor that might have a higher base
    clock speed. This method can save a lot of money on SQL Server 2012 core licenses,
    at the cost of scalability and capacity headroom. If you go down this route, you
    should make sure everyone knows what you are doing and why you are doing it, and
    is in agreement with what you are doing. This can help you avoid being blamed
    if you have scalability or capacity issues in the future.


    Walking through an example of how this might work, you could buy a two-socket
    database server that had two Intel Xeon E5-2690 processors that have eight physical
    cores each, for a total of sixteen physical cores in the server. The SQL Server
    2012 Enterprise Edition core licensing cost for this one database server would
    be sixteen times $6,874 for a total of $109,984\. If you wanted to focus on reducing
    your license costs for this server, you have two viable alternatives. One option
    would be to select two Intel Xeon E5-2643


    processors that have four physical cores each, for a total of eight physical cores
    in the server. The SQL


    Server 2012 Enterprise Edition core licensing cost for this one database server
    would be eight times $6,874


    for a total of $109,984.


    A second option would be to select only one Intel Xeon E5-2690 processor that
    has eight physical cores, for a total of eight physical cores in the server. The
    SQL Server 2012 Enterprise Edition core licensing cost for this one database server
    would be eight times $6,874 for a total of $109,984.'
