  raw: 'The T-SQL command can enable the database audit specification in a single
    command, but this cannot be done through Management Studio. To enable it, right-click
    and select Enable Database Audit Specification.


    Query the Audit File


    If the server information is logged to a binary audit file, you can review this
    information in two ways: querying the file through SQL Server or viewing the Audit
    Log via SQL Server Management Studio. The binary audit file cannot be viewed as
    a plain text file. The fn_get_audit_file function is used to query the audit file.
    The following T-SQL code will return all the information that has been audited:


    --Query the audit file


    SELECT *


    FROM sys.fn_get_audit_file(''C:\AuditLogs\Corp_Audit_*.sqlaudit'',DEFAULT,DEFAULT
    )


    GO


    Individual audit files can be queried, but if multiple files have been created,
    a wildcard in the file path is supported to return results across multiple audit
    files.


    To view the audit log from SQL Server Management Studio, right-click on the audit
    and select View Audit Logs from the menu. This will open the SQL Server Log File
    Viewer. From this window, the audit log can be filtered or exported.


    If audit events are logged to the Security log or the Windows Event log, they
    can be viewed through the respective logs or through the SQL Log File Viewer.
    Each event that is logged will be an information-level event and have a source
    of MSSQLSERVER. The SQL Log File Viewer can be found under the Management, SQL
    Server Logs folder. The SQL Log File Viewer will display SQL Server logs by default,
    but selecting the Application log will show the Windows Application log as well.


    The SQL Log File Viewer, shown in Figure 9-4, can be filtered for the date, the
    source, event information, and more. The filter can be configured by clicking
    the Filter button on the SQL Log File Viewer screen. The SQL Log File Viewer can
    also export the log file for an auditor to review.


    ![Image 109](index-239_1.png)


    chapter 9 ■ compliance and auditing


    ***Figure 9-4.** The Log Viewer can be filtered to show just audit events in the
    Windows Application log* The Windows Event logs can also be accessed through Start,
    All Programs, Administrative Tools, Event Viewer.


    Pro Tip: Alert on Audit Events


    Auditing is not designed to send an alert or notify anyone if an audit event occurs.
    Although SQL Server is not designed to send these alerts, there is a solution
    that will allow this to happen. The caveats to this solution are that audits must
    be sent to the Windows logs and it leverages SQL Server alerts.


    During normal operation, SQL Server generates events and writes them to the Windows
    Application log. The SQL Server Agent is continuously reading the Application
    log and can trigger an alert based on an event. If an audit is configured to write
    audit events to the Windows Application log, an alert can be configured to notify
    an administrator or auditor of the event.


    n **Note** Setting up alerts requires the audit events to be written to the Windows
    Application log, Database Mail to be configured, and an operator to be created.


    ![Image 110](index-240_1.png)


    chapter 9 ■ compliance and auditing


    Alerts can be created with both T-SQL code and through SQL Server Management Studio.
    The following code will create an alert to notify Jonathan Gardner when a database
    is backed up: USE [msdb]


    GO


    EXEC msdb.dbo.sp_add_alert @name=N''BackupAlert'',


    @message_id=18264,


    @severity=0,


    @enabled=1,


    @delay_between_responses=60,


    @include_event_description_in=1,


    @job_id=N''00000000-0000-0000-0000-000000000000''


    GO


    EXEC msdb.dbo.sp_add_notification @alert_name=N''BackupAlert'', @operator_name=N''Jonathan
    Gardner'',


    @notification_method = 1


    GO


    In SQL Server Management Studio, alerts are located in the Alerts folder under
    the SQL Server Agent.


    To create a new alert, right-click on the Alerts folder. The New Alert dialog
    box will open, as shown in Figure 9-5\. The name of the alert, the error number
    to be monitored, and the specific database can all be set in this dialog box.'
  trans: "\n# SQL Server 审计配置与日志查询\n\n使用 T-SQL 命令可以在单条命令中启用数据库审计规范，但这无法通过 Management\
    \ Studio 完成。要启用它，请右键单击并选择**启用数据库审计规范**。\n\n## 查询审计文件\n\n如果服务器信息被记录到二进制审计文件中，您可以通过两种方式查看此信息：通过\
    \ SQL Server 查询文件，或通过 SQL Server Management Studio 查看审计日志。二进制审计文件无法以纯文本文件查看。`fn_get_audit_file`\
    \ 函数用于查询审计文件。以下 T-SQL 代码将返回所有已审计的信息：\n\n```sql\n--Query the audit file\nSELECT\
    \ *\nFROM sys.fn_get_audit_file('C:\\AuditLogs\\Corp_Audit_*.sqlaudit',DEFAULT,DEFAULT\
    \ )\nGO\n```\n\n可以查询单个审计文件，但如果创建了多个文件，支持在文件路径中使用通配符以跨多个审计文件返回结果。\n\n要从 SQL Server\
    \ Management Studio 查看审计日志，请在审核项上右键单击，然后从菜单中选择**查看审计日志**。这将打开 SQL Server 日志文件查看器。在此窗口中，可以对审计日志进行筛选或导出。\n\
    \n如果审计事件被记录到安全日志或 Windows 事件日志中，则可以通过相应的日志或通过 SQL 日志文件查看器查看它们。每个记录的事件都将是一个信息级别事件，其来源为\
    \ `MSSQLSERVER`。SQL 日志文件查看器可以在“管理”下的“SQL Server 日志”文件夹中找到。SQL 日志文件查看器默认显示 SQL\
    \ Server 日志，但选择应用程序日志也将显示 Windows 应用程序日志。\n\n如 `图 9-4` 所示的 SQL 日志文件查看器，可以按日期、来源、事件信息等进行筛选。可以通过单击\
    \ SQL 日志文件查看器屏幕上的**筛选**按钮来配置筛选器。SQL 日志文件查看器还可以导出日志文件供审计员审查。\n\n![Image 109](img/index-239_1.png)\n\
    \n`图 9-4.` 可以筛选日志查看器以仅显示 Windows 应用程序日志中的审计事件\n\n也可以通过**开始、所有程序、管理工具、事件查看器**访问\
    \ Windows 事件日志。\n\n## 专业提示：针对审计事件设置警报\n\n审计并非设计用于在发生审计事件时发送警报或通知任何人。尽管 SQL Server\
    \ 未设计用于发送这些警报，但有一个解决方案可以实现此目的。该解决方案的注意事项是：审计必须发送到 Windows 日志，并且它利用了 SQL Server\
    \ 警报。\n\n在正常操作期间，SQL Server 生成事件并将其写入 Windows 应用程序日志。SQL Server Agent 持续读取应用程序日志，并可以基于事件触发警报。如果配置审计将审计事件写入\
    \ Windows 应用程序日志，则可以配置警报以通知管理员或审计员该事件。\n\n> **注意**\n> 设置警报需要将审计事件写入 Windows 应用程序日志、配置数据库邮件并创建操作员。\n\
    \n![Image 110](img/index-240_1.png)\n\n可以通过 T-SQL 代码和 SQL Server Management Studio\
    \ 创建警报。以下代码将创建一个警报，在数据库备份时通知 Jonathan Gardner：\n\n```sql\nUSE [msdb]\nGO\nEXEC\
    \ msdb.dbo.sp_add_alert @name=N'BackupAlert',\n    @message_id=18264,\n    @severity=0,\n\
    \    @enabled=1,\n    @delay_between_responses=60,\n    @include_event_description_in=1,\n\
    \    @job_id=N'00000000-0000-0000-0000-000000000000'\nGO\nEXEC msdb.dbo.sp_add_notification\
    \ @alert_name=N'BackupAlert', @operator_name=N'Jonathan Gardner',\n    @notification_method\
    \ = 1\nGO\n```\n\n在 SQL Server Management Studio 中，警报位于 **SQL Server 代理**下的 **警报**文件夹中。\n\
    \n要创建新警报，请右键单击**警报**文件夹。将打开**新建警报**对话框，如 `图 9-5` 所示。警报的名称、要监视的错误号以及特定的数据库都可以在此对话框中设置。\n"
- fmt: "# Chapter 9: Compliance and Auditing\n\n![Image 111](index-241_1.png)\n\n\
    ***Figure 9-5.** The New Alert dialog box creates an alert based on a specific\
    \ error number.*\n\nYou can select the operator and the method of notification\
    \ by clicking on the `Response` tab and choosing from the options that appear\
    \ on it.\n\nThe `Options` tab, shown in Figure 9-6, is where the alert can be\
    \ configured to include the error text and the delay between the responses. The\
    \ `Delay Between Responses` option provides a waiting period, which you can use\
    \ to control how often the alerts are generated. In the example, only one alert\
    \ will be sent out every minute, even if more audit events have been created for\
    \ `Application` log activity.\n\n***Figure 9-6.** The Options tab on the New Alert\
    \ page is where you configure alerts.*\n\n## Conclusion\n\nToday’s regulatory\
    \ environment requires organizations to track and monitor who is accessing and\
    \ changing data in the environment. Database professionals need to work with management\
    \ to understand what laws the business is subject to so that they understand what\
    \ information needs to be audited.\n\nSQL Server 2012 provides database professionals\
    \ with the tools to fully comply with laws and regulations. Database professionals\
    \ can quickly and easily set up auditing for the environments that they manage.\
    \ With the new SQL Server auditing capabilities, even SQL Server Standard instances\
    \ can be monitored.\n\n# Chapter 10: Automating Administration\n\n*by Jes Borland*\n\
    \nFor the past few decades, computers have been replacing humans for tasks in\
    \ manufacturing and other industries. Robotics and computers have advanced to\
    \ the point that they can perform many tasks people used to do. Automation can\
    \ help you prevent problems, do your job faster, be proactive, be more productive,\
    \ scale your environment, and result in cost savings.\n\nIt is unlikely that computers\
    \ will replace database administrators, but we can learn how to be more efficient\
    \ and productive by automating our techniques. You might ask, “Why?” Your current\
    \ manual processes and third-party tools are getting the job done.\n\nAs a database\
    \ administrator, your job is not merely to react to problems, but also to help\
    \ prevent them. Automating common tasks such as backups and restores ensures these\
    \ critical steps are done, regularly and consistently. You can make many of these\
    \ tasks faster by automating as well, because you won’t need to start them every\
    \ day or week—you can schedule them. Once you have automated monitoring to watch\
    \ your environment, you can catch problems before they get out of control.\n\n\
    Automation can help you scale your environment, without the company needing to\
    \ hire additional staff. In the business world, time is money. Every minute or\
    \ hour you create by automating a task means that time can be spent working on\
    \ a project, maintaining other systems, catching up on a backlog of report requests,\
    \ or furthering your professional development.\n\nThe main points to consider\
    \ about automation are the tools to enable it, and what tasks in your environment\
    \ can and should be automated.\n\n## Tools for Automation\n\nSQL Server provides\
    \ several tools useful for automation. These are described in the following subsections.\
    \ They include utilities such as `Perfmon` and scripting languages like `PowerShell`.\n\
    \n### Performance Monitor\n\nA tool available in Windows is Performance Monitor,\
    \ or `Perfmon`. This is an operating system tool, not a SQL Server tool. There\
    \ are general counters, and those specific to SQL Server.\n\nWith SQL Server,\
    \ the resources you’ll want to watch most closely are server memory, disk, and\
    \ processor. The following are a few frequently used counters:\n\n![Image 112](index-243_1.png)\n\
    \n-   `Memory - Available Mbytes`: Shows the physical memory available for allocation\
    \ to a process or the system.\n-   `Physical disk - Disk reads/sec`: Shows the\
    \ number of read operations on the disk.\n-   `Physical disk - Disk writes/sec`:\
    \ Shows the number of write operations on the disk.\n-   `Physical disk - Avg.\
    \ disk sec/Read`: Shows the average number of seconds a read takes to complete.\n\
    -   `Physical disk - Avg. disk sec/Write`: Shows the average number of seconds\
    \ a write takes to complete.\n-   `Processor - % Processor Time`: Shows the percentage\
    \ of time the processor spends executing a thread.\n-   `SQL Server: Buffer Manager\
    \ - Page Life Expectancy`: Shows the number of seconds a page will live in the\
    \ buffer pool.\n\nThe counters for disks and processors should be used to monitor\
    \ each disk and processor separately, not the total. The total will provide an\
    \ overall value for the server, but won’t show you which disks or processors are\
    \ consuming the most resources.\n\nTo access Performance Monitor and its data,\
    \ open it in Windows Server 2008R2 by going to `Start`, then `Run`, and entering\
    \ `perfmon.exe`. When this graphical tool opens, you can create a data collector\
    \ set, define the data counters you want to collect, and start executing it. Counters\
    \ are logged to a binary or comma-separated value file for you to parse later.\n\
    \nTo create a data collector set, expand `Data Collector Sets` and right-click\
    \ on `User Defined`, then `New`, then `Data Collector Set`. Assign a name, select\
    \ `Create manually`, and click `Next`. With `Create data logs` selected, choose\
    \ `Performance counter` and click `Next`. On the `Performance counters` screen,\
    \ choose `Add` to select counters.\n\n***Figure 10-1.** Adding counters to a performance\
    \ monitor data collector set*\n\nFigure 10-1 shows the screen you will see to\
    \ select the counters. Select the appropriate server name, and add your counters.\
    \ When you have chosen the counters, click `OK` to save, choose your sample interval,\
    \ and click `Next`. Select a location to save your log files and select `Next`.\
    \ Choose `Start this data collector set now` and click `Finish`. The data will\
    \ be captured starting from that point forward.\n\nAfter you have created the\
    \ data collector set, you can start and stop the collection by clicking on the\
    \ name of it under `User Defined`, and using the `Play` and `Stop` buttons. It\
    \ is best practice to set up the data collector set and save the logs to a computer\
    \ other than the database server, such as your workstation or another designated\
    \ computer. Doing so prevents additional workload on the server.\n\n### Dynamic\
    \ Management Views\n\nSQL Server Dynamic Management Views (`DMVs`) provide a wealth\
    \ of information about the server, the instance, the individual databases, and\
    \ the activity occurring at any given moment. Capturing this information on a\
    \ regular basis and reporting on it can help you establish a performance baseline,\
    \ and troubleshoot errors when they occur.\n\nMemory, processor, and disk can\
    \ be monitored through `DMVs`. There is also much more that can be captured, such\
    \ as what an instance is waiting on, what execution plans are in the plan cache,\
    \ and index usage. There are `DMVs` for `AlwaysOn Availability Groups`, mirroring,\
    \ replication, and more.\n\nMemory can be monitored through a combination of `DMVs`.\
    \ To start, use `sys.dm_os_sys_memory` to check the configuration of the memory\
    \ on the server. Listing 10-1 shows a query to view the total and available memory\
    \ on the server, and the state of that memory. You do not want the `system_memory_state_desc`\
    \ column to show “Available physical memory is low,” as this indicates memory\
    \ pressure.\n\n***Listing 10-1.** Query to View System Memory Configuration*\n\
    \n```sql\nSELECT total_physical_memory_kb,\n       available_physical_memory_kb,\n\
    \       system_memory_state_desc\nFROM sys.dm_os_sys_memory;\n```\n\nProcessor\
    \ usage can be monitored by querying the `sys.dm_exec_requests` `DMV` to see the\
    \ current `CPU`."
  raw: '***Figure 9-5.** The New Alert dialog box creates an alert based on a specific
    error number.*


    ![Image 111](index-241_1.png)


    chapter 9 ■ compliance and auditing


    You can select the operator and the method of notification by clicking on the
    Response tab and choosing from the options that appear on it.


    The Options tab, shown in Figure 9-6, is where the alert can be configured to
    include the error text and the delay between the responses. The Delay Between
    Responses option provides a waiting period, which you can use to control how often
    the alerts are generated. In the example, only one alert will be sent out every
    minute, even if more audit events have been created for Application log activity.


    ***Figure 9-6.** The Options tab on the New Alert page is where you configure
    alerts.*


    Conclusion


    Today’s regulatory environment requires organizations to track and monitor who
    is accessing and changing data in the environment. Database professionals need
    to work with management to understand what laws the business is subject to so
    that they understand what information needs to be audited.


    SQL Server 2012 provides database professionals with the tools to fully comply
    with laws and regulations. Database professionals can quickly and easily set up
    auditing for the environments that they manage. With the new SQL Server auditing
    capabilities, even SQL Server Standard instances can be monitored.


    **chapter 10**


    ■ ■ ■


    **Automating Administration**


    **by Jes Borland**


    For the past few decades, computers have been replacing humans for tasks in manufacturing
    and other industries. Robotics and computers have advanced to the point that they
    can perform many tasks people used to do. Automation can help you prevent problems,
    do your job faster, be proactive, be more productive, scale your environment,
    and result in cost savings.


    It is unlikely that computers will replace database administrators, but we can
    learn how to be more efficient and productive by automating our techniques. You
    might ask, “Why?” Your current manual processes and third-party tools are getting
    the job done.


    As a database administrator, your job is not merely to react to problems, but
    also to help prevent them. Automating common tasks such as backups and restores
    ensures these critical steps are done, regularly and consistently. You can make
    many of these tasks faster by automating as well, because you won’t need to start
    them every day or week—you can schedule them. Once you have automated monitoring
    to watch your environment, you can catch problems before they get out of control.


    Automation can help you scale your environment, without the company needing to
    hire additional staff. In the business world, time is money. Every minute or hour
    you create by automating a task means that time can be spent working on a project,
    maintaining other systems, catching up on a backlog of report requests, or furthering
    your professional development.


    The main points to consider about automation are the tools to enable it, and what
    tasks in your environment can and should be automated.


    Tools for Automation


    SQL Server provides several tools useful for automation. These are described in
    the following subsections.


    They include utilities such as Perfmon and scripting languages like PowerShell
    .


    Performance Monitor


    A tool available in Windows is Performance Monitor, or Perfmon. This is an operating
    system tool, not a SQL Server tool. There are general counters, and those specific
    to SQL Server.


    With SQL Server, the resources you’ll want to watch most closely are server memory,
    disk, and processor. The following are a few frequently used counters:


    ![Image 112](index-243_1.png)


    chapter 10 ■ automating administration


    • Memory - Available Mbytes: Shows the physical memory available for allocation
    to a process or the system.


    • Physical disk - Disk reads/sec: Shows the number of read operations on the disk.


    • Physical disk - Disk writes/sec: Shows the number of write operations on the


    disk.


    • Physical disk - Avg. disk sec/Read: Shows the average number of seconds a read


    takes to complete.


    • Physical disk - Avg. disk sec/Write: Shows the average number of seconds a


    write takes to complete.


    • Processor - % Processor Time: Shows the percentage of time the processor spends
    executing a thread.


    •


    SQL Server: Buffer Manager - Page Life Expectancy: Shows the number of a


    seconds a page will live in the buffer pool.


    The counters for disks and processors should be used to monitor each disk and
    processor separately, not the total. The total will provide an overall value for
    the server, but won’t show you which disks or processors are consuming the most
    resources.


    To access Performance Monitor and its data, open it in Windows Server 2008R2 by
    going to Start, then Run, and entering perfmon.exe. When this graphical tool opens,
    you can create a data collector set, define the data counters you want to collect,
    and start executing it. Counters are logged to a binary or comma-separated value
    file for you to parse later.


    To create a data collector set, expand Data Collector Sets and right-click on
    User Defined, then New, then Data Collector Set. Assign a name, select Create
    manually, and click Next. With Create data logs selected, choose Performance counter
    and click Next. On the Performance counters screen, choose Add to select counters.


    ***Figure 10-1.** Adding counters to a performance monitor data collector set*
    236


    chapter 10 ■ automating administration


    Figure 10-1 shows the screen you will see to select the counters. Select the appropriate
    server name, and add your counters. When you have chosen the counters, click OK
    to save, choose your sample interval, and click Next. Select a location to save
    your log files and select Next. Choose Start this data collector set now and click
    Finish. The data will be captured starting from that point forward.


    After you have created the data collector set, you can start and stop the collection
    by clicking on the name of it under User Defined, and using the Play and Stop
    buttons. It is best practice to set up the data collector set and save the logs
    to a computer other than the database server, such as your workstation or another
    designated computer. Doing so prevents additional workload on the server.


    Dynamic Management Views


    SQL Server Dynamic Management Views (DMVs) provide a wealth of information about
    the server, the instance, the individual databases, and the activity occurring
    at any given moment. Capturing this information on a regular basis and reporting
    on it can help you establish a performance baseline, and troubleshoot errors when
    they occur.


    Memory, processor, and disk can be monitored through DMVs. There is also much
    more that can be captured, such as what an instance is waiting on, what execution
    plans are in the plan cache, and index usage. There are DMVs for AlwaysOn Availability
    Groups, mirroring, replication, and more.


    Memory can be monitored through a combination of DMVs. To start, use sys.dm_os_sys_memory
    to check the configuration of the memory on the server. Listing 10-1 shows a query
    to view the total and available memory on the server, and the state of that memory.
    You do not want the system_memory_state_


    desc column to show “Available physical memory is low,” as this indicates memory
    pressure.


    ***Listing 10-1.** Query to View System Memory Configuration*


    SELECT total_physical_memory_kb,


    available_physical_memory_kb,


    system_memory_state_desc


    FROM sys.dm_os_sys_memory;


    Processor usage can be monitored by querying the sys.dm_exec_requests DMV to see
    the current CPU'
  trans: "\n# 第 9 章：合规性与审计\n\n![Image 111](img/index-241_1.png)\n\n***图 9-5.** “新建警报”对话框根据特定的错误号创建警报。*\n\
    \n你可以通过点击`响应`选项卡并从其显示的选项中进行选择，来选取操作员和通知方法。\n\n`选项`选项卡（如图 9-6 所示）用于配置警报，使其包含错误文本以及响应之间的延迟。`响应之间延迟`选项提供了一个等待期，你可以用它来控制警报生成的频率。在示例中，即使为`应用程序`日志活动创建了更多的审计事件，每分钟也只会发送一个警报。\n\
    \n***图 9-6.** “新建警报”页面上的“选项”选项卡用于配置警报。*\n\n## 总结\n\n当今的监管环境要求组织追踪和监控谁在访问和更改环境中的数据。数据库专业人员需要与管理层协作，了解企业需遵守哪些法律，从而明确需要审计哪些信息。\n\
    \nSQL Server 2012 为数据库专业人员提供了工具，使其能够完全遵守法律法规。数据库专业人员可以快速、轻松地为其管理的环境设置审计。借助新的 SQL\
    \ Server 审计功能，即使是 SQL Server 标准版实例也能被监控。\n\n# 第 10 章：自动化管理\n\n*作者：Jes Borland*\n\
    \n在过去的几十年里，计算机在制造业和其他行业中不断替代人工任务。机器人和计算机已经发展到可以执行许多人们过去所做的工作的程度。自动化可以帮助你预防问题、更快地完成工作、积极主动、提高生产力、扩展环境，并最终节省成本。\n\
    \n计算机不太可能取代数据库管理员，但我们可以通过自动化技术来学习如何更高效、更有生产力。你可能会问，“为什么？”你当前的手动流程和第三方工具也能完成工作。\n\
    \n作为一名数据库管理员，你的工作不仅仅是对问题做出反应，还要帮助预防问题。自动化常见任务（如备份和还原）可确保这些关键步骤得以定期且一致地完成。通过自动化，你还可以使许多此类任务变得更快，因为你无需每天或每周启动它们——你可以安排它们。一旦你设置了自动化监控来监视你的环境，就能在问题失控之前发现它们。\n\
    \n自动化可以帮助你扩展环境，而公司无需雇佣额外人员。在商业世界中，时间就是金钱。通过自动化一项任务所节省的每一分钟或每一小时，都可以用于处理项目、维护其他系统、处理积压的报告请求，或促进你的专业发展。\n\
    \n关于自动化，主要考虑的因素是实现自动化的工具，以及你的环境中哪些任务可以并且应该被自动化。\n\n## 自动化工具\n\nSQL Server 提供了几种对自动化有用的工具。以下小节将对它们进行描述。这些工具包括像\
    \ `Perfmon` 这样的实用程序和像 `PowerShell` 这样的脚本语言。\n\n### 性能监视器\n\nWindows 中提供了一个名为性能监视器（`Perfmon`）的工具。这是一个操作系统工具，而非\
    \ SQL Server 工具。它包含通用计数器和 SQL Server 特有的计数器。\n\n对于 SQL Server，你最需要密切关注的资源是服务器内存、磁盘和处理器。以下是一些常用的计数器：\n\
    \n![Image 112](img/index-243_1.png)\n\n-   `Memory - Available Mbytes`：显示可分配给进程或系统的可用物理内存量。\n\
    -   `Physical disk - Disk reads/sec`：显示磁盘上的读操作次数。\n-   `Physical disk - Disk writes/sec`：显示磁盘上的写操作次数。\n\
    -   `Physical disk - Avg. disk sec/Read`：显示读操作完成所需的平均秒数。\n-   `Physical disk -\
    \ Avg. disk sec/Write`：显示写操作完成所需的平均秒数。\n-   `Processor - % Processor Time`：显示处理器执行线程所花费的时间百分比。\n\
    -   `SQL Server: Buffer Manager - Page Life Expectancy`：显示页面在缓冲池中停留的秒数。\n\n磁盘和处理器的计数器应用于分别监控每个磁盘和处理器，而非总数。总数会提供服务器的整体值，但不会显示哪些磁盘或处理器消耗的资源最多。\n\
    \n要访问性能监视器及其数据，请在 Windows Server 2008R2 中打开它：进入`开始`，然后`运行`，并输入`perfmon.exe`。当这个图形工具打开后，你可以创建一个数据收集器集，定义要收集的数据计数器，并开始执行。计数器会被记录到二进制或逗号分隔值文件中，供你后续解析。\n\
    \n要创建数据收集器集，请展开`数据收集器集`，右键单击`用户定义`，然后选择`新建`，再选择`数据收集器集`。指定一个名称，选择`手动创建`，然后单击`下一步`。在选中`创建数据日志`的情况下，选择`性能计数器`并单击`下一步`。在`性能计数器`屏幕上，选择`添加`以选择计数器。\n\
    \n***图 10-1.** 向性能监视器数据收集器集添加计数器*\n\n图 10-1 显示了你将看到的用于选择计数器的屏幕。选择适当的服务器名称，并添加你的计数器。选择好计数器后，单击`确定`保存，选择你的采样间隔，然后单击`下一步`。选择一个保存日志文件的位置，然后选择`下一步`。选择`立即启动该数据收集器集`，然后单击`完成`。从那时起，数据将被捕获。\n\
    \n创建数据收集器集后，你可以通过单击其名称（位于`用户定义`下）并使用`播放`和`停止`按钮来启动和停止收集。最佳实践是将数据收集器集设置并保存到数据库服务器以外的计算机上，例如你的工作站或其他指定的计算机。这样做可以避免给服务器带来额外的工作负载。\n\
    \n### 动态管理视图\n\nSQL Server 动态管理视图 (`DMV`) 提供了关于服务器、实例、单个数据库以及在任何给定时刻发生的活动的丰富信息。定期捕获这些信息并生成报告，可以帮助你建立性能基线，并在错误发生时进行故障排除。\n\
    \n内存、处理器和磁盘可以通过 `DMV` 进行监控。还可以捕获更多信息，例如实例正在等待什么、计划缓存中有哪些执行计划以及索引使用情况。还有针对 `AlwaysOn\
    \ 可用性组`、镜像、复制等的 `DMV`。\n\n可以通过组合使用 `DMV` 来监控内存。首先，使用 `sys.dm_os_sys_memory` 来检查服务器上的内存配置。代码清单\
    \ 10-1 显示了一个查询，用于查看服务器上的总内存和可用内存，以及该内存的状态。你不希望 `system_memory_state_desc` 列显示“可用物理内存不足”，因为这表示存在内存压力。\n\
    \n***代码清单 10-1.** 查询以查看系统内存配置*\n\n```sql\nSELECT total_physical_memory_kb,\n \
    \      available_physical_memory_kb,\n       system_memory_state_desc\nFROM sys.dm_os_sys_memory;\n\
    ```\n\n处理器使用情况可以通过查询 `sys.dm_exec_requests` `DMV` 来监控，以查看当前的 `CPU` 使用情况。\n"
- fmt: "# SQL Server 监控与自动化管理\n\ntime used by each session. The view shows you how\
    \ much time is being used by the processor, in milliseconds, on each session.\
    \ Listing 10-2 shows a query to view this information. You want to sort it by\
    \ the amount of CPU time in descending order, and look at the query text that\
    \ is returned for the queries with the highest amount. There is no specific threshold\
    \ in milliseconds that indicates a good or bad query; that is something you need\
    \ to set a baseline for in the instance and weigh the queries against.\n\n## Listing\
    \ 10-2. Query to See CPU Time Used by Session\n\n```sql\nSELECT ER.session_id,\n\
    \    ER.request_id,\n    ES.host_name,\n    ES.login_name,\n    DB_NAME(ER.database_id)\
    \ AS dbname,\n    ER.start_time,\n    GETDATE() as currenttime,\n    ER.cpu_time,\n\
    \    ER.total_elapsed_time,\n    EST.text as query_text\nFROM sys.dm_exec_requests\
    \ ER\nINNER JOIN sys.dm_exec_sessions ES on ER.session_id = ES.session_id\nOUTER\
    \ APPLY sys.dm_exec_sql_text(ER.sql_handle) EST\nOUTER APPLY sys.dm_exec_query_plan(ER.plan_handle)\
    \ EQP\nORDER BY ER.cpu_time DESC;\n```\n\nDisk reads and writes can be monitored\
    \ through the `sys.dm_exec_requests` DMV. The `reads` and `writes` columns will\
    \ tell you how many of each have been performed by each session. Listing 10-3\
    \ gives you a query to view the sessions, sorted by reads. Like processor times,\
    \ there is no set answer for how many reads or writes are bad, or too much. An\
    \ established baseline will tell you what is normal for your database.\n\n## Listing\
    \ 10-3. Query to view sessions sorted by reads.\n\n```sql\nSELECT ER.session_id,\n\
    \    ER.request_id,\n    ES.host_name,\n    ES.login_name,\n    DB_NAME(ER.database_id)\
    \ AS dbname,\n    ER.start_time,\n    GETDATE() as currenttime,\n    ER.total_elapsed_time,\n\
    \    ER.reads,\n    ER.writes,\n    EST.text as query_text\nFROM sys.dm_exec_requests\
    \ ER\nINNER JOIN sys.dm_exec_sessions ES on ER.session_id = ES.session_id\nOUTER\
    \ APPLY sys.dm_exec_sql_text(ER.sql_handle) EST\nOUTER APPLY sys.dm_exec_query_plan(ER.plan_handle)\
    \ EQP\nORDER BY ER.reads DESC;\n```\n\nBe aware that the information in the DMVs\
    \ is cleared each time SQL Server restarts. Later in this chapter, I will show\
    \ you how to create a SQL Server Agent job that will gather this information on\
    \ a schedule and insert it into a database for review.\n\n# SQL Server Agent\n\
    \nSQL Server Agent is a service that executes jobs as an external process to the\
    \ SQL Server Engine. This is a very simplistic explanation for a tool that has\
    \ many features and uses. You begin by creating a task, or series of tasks. Your\
    \ task or tasks constitutes a *job*, which can be called on demand, on a schedule,\
    \ or from an alert. You can perform actions such as notifying operators or running\
    \ another job on success or failure.\n\nSQL Agent is a multilayered, flexible\
    \ tool that easily enables automation.\n\nTo get the most from SQL Agent, it is\
    \ helpful to have Database Mail set up and enabled, which allows SQL Server to\
    \ send e-mail through an SMTP server.\n\n### Note\nDatabase Mail can be found\
    \ in Books Online at [http://msdn.microsoft.com/en-us/library/ms190658.aspx](http://msdn.microsoft.com/en-us/library/ms190658.aspx).\n\
    \nAfter Database Mail has been enabled, you can configure operators to notify\
    \ users via e-mail.\n\n![Image 113](index-246_1.png)\n\n# Operators\n\nOperators\
    \ hold contact information for people that notifications and alerts can be sent\
    \ to. You can set them up for any e-mail address. For many functions, it is recommended\
    \ to have a general mailbox for a team that the alerts can be sent to, rather\
    \ than one individual.\n\nTo access operator information, go to SSMS Object Explorer.\
    \ Connect to an instance and expand `SQL Server Agent`. To create an operator,\
    \ right-click and select `New Operator`. The operator general setup screen is\
    \ shown in Figure 10-2. The necessary fields here are `Name` and `E-mail name`.\
    \ (Microsoft states the net send and pager options will be removed in a future\
    \ version of SQL Server, and advises not to use them.)\n\n## Figure 10-2. Configuring\
    \ an operator\n\n# Jobs"
