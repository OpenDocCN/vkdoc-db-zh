- fmt: "# CHAPTER 18 ■ Tuning for Peak Load\n\nThe problem here is that the average\
    \ over seven days skews the data. Realistically, you need to filter this down\
    \ to, say, the core business hours. You know Wednesdays are the busiest day of\
    \ the week based on data you reviewed earlier. Figure 18-13 shows how the data\
    \ from the `BLG` can be filtered to show only data from Wednesday between 7 AM\
    \ and 8 PM. To modify the `Time Range` setting, slide the left or right time indicator\
    \ to the appropriate time.\n\n**Figure 18-13.** Report view in Performance Monitor\
    \ for a one-day capture of the logical disk counters.\n\nAs you can see in Figure\
    \ 18-13, when the `F` drive is viewed for the core business hours, it is .025\
    \ ms healthier than before. If you reviewed only the seven-day capture, you might\
    \ believe the performance for the `F` drive is a lot worse than it is. You still\
    \ want to understand what is causing the latency to increase to .043 ms over the\
    \ seven days. To do this, you review all of the values in Figure 18-12 to determine\
    \ if there are any areas of concern. Based on the numbers shown, you need to monitor\
    \ the `F` drive’s performance over time because it is on the borderline of the\
    \ threshold for acceptable performance for a transaction application.\n\nThe other\
    \ view in Performance Monitor is the line view. In Figure 18-14, you can observe\
    \ the `Avg. Disk sec/Read` performance over time. Notice the frequent spikes every\
    \ 15 minutes; these are caused by 452 transaction-log backups. One of the most\
    \ important goals when analyzing the configuration or performance data is to create\
    \ a mental image of the environment and be able to explain what you are seeing.\
    \ Here you are looking at the disk performance, and you can see a pattern in the\
    \ data. By explaining what is creating the load, you can then address the cause\
    \ if necessary.\n\n![Image 214](index-457_1.png)\n\n**Figure 18-14.** Line view\
    \ in Performance Monitor for a one-day capture of the logical disk counters. The\
    \ values have been scaled so that the lines are easier to read.\n\nThe other important\
    \ data points in Figure 18-14 are the average, minimum, and maximum values. Because\
    \ scales for the lines in the graphs are frequently different, it is often easier\
    \ to review the average below the line graph. Remember, when reviewing performance\
    \ data, the averages are what matter most of the time. You focus on the average\
    \ of a value because that is the typical load that needs to be sustained for a\
    \ period of time. If the server’s `% Processor Time` spikes to 80 percent once\
    \ in a while, it might not indicate a problem—but it takes more information to\
    \ know if that is true or not.\n\n## Review the Perfmon Data File with PAL\n\n\
    **Objective:** Quickly review a large Perfmon data file, and apply the predefined\
    \ SQL Server best-practice thresholds.\n\n1.  Generate the report by selecting\
    \ the `SQL Server` profile and answering all of the required questions.\n2.  Review\
    \ all warnings and critical events.\n3.  Document any unexpected findings or critical\
    \ alerts. The critical alerts might indicate potential bottlenecks, depending\
    \ on the time of the day and frequency.\n\n## Review the Perfmon Data File with\
    \ Performance Monitor – Report View\n\n**Objective:** Review custom time windows,\
    \ and see additional object counter values that are not included in `PAL`’s analysis.\n\
    \n1.  If the data capture is a multiday capture, filter the timeline down to the\
    \ peak window.\n2.  Review the report view first because this provides a high-level\
    \ overview of the object counters.\n3.  Add all object counters.\n    a.  The\
    \ easiest way is to open the `BLG` file, which will add all the object counters\
    \ in addition to the ones with instances.\n    b.  For items like `Logical Disk`\
    \ and `Databases`, add these manually.\n4.  Start from the top of the report,\
    \ and go down while documenting all the findings.\n5.  While you are reviewing\
    \ the object counters, document your observations so that you can review them\
    \ later.\n6.  As you review the object counters, you can remove the objects that\
    \ are healthy from the report view. The result is a high-level report with only\
    \ the object counters you are interested in, whether they are usage based or out\
    \ of compliance with best practices.\n7.  If you want to save the images of the\
    \ report, you can right-click and save the image as a GIF.\n\n## Review the Perfmon\
    \ Data File with Performance Monitor – Line View\n\n**Objective:** Find trends\
    \ in the data over different time windows, and correlate the data from the related\
    \ object counters.\n\n1.  If the data capture is a multiday capture, filter the\
    \ timeline down to the peak window. The non-peak window is also important to review,\
    \ but concentrate on the peak window first.\n2.  Reviewing the line view is done\
    \ differently than reviewing the report view. When adding the objects to the line\
    \ view, add groups of related objects together. There are a couple of important\
    \ reasons for this, and the most obvious one is space. If you add 75 objects to\
    \ the line view, the graph will be hard to analyze because of the large number\
    \ of lines graphed. The goal of the line view is to find trends and correlate\
    \ values. By adding subsets of object counters, it is easier to find trends in\
    \ the data. Once the object counters are added to the graph, highlight all of\
    \ the counters on the bottom and scale the lines. This increases the readability\
    \ of the graph.\n3.  For each counter on the bottom, review the line and values\
    \ over time.\n\n> **Note** `CTRL+H` highlights the line so that it is easier to\
    \ see, and multiple lines can be selected and viewed at the same time.\n\n   \
    \ a.  Review the line over time, and identify when the counter is under pressure\
    \ and for what duration.\n    b.  Review the average value. Is the counter within\
    \ an acceptable range?\n    c.  How frequently is the maximum or minimum value\
    \ hit and is the peak value sustained?\n    d.  Review related counters during\
    \ this time to see if their values can be correlated to the event. If the value\
    \ average is as expected or the counter is immaterial, delete the object counter\
    \ from the line view.\n    e.  Again, remove the normal values so that the more\
    \ important counters are the ones that remain.\n4.  Once you are done reviewing\
    \ a group of related object counters, you can save the image or add additional\
    \ ones. Remember, the line view only has the object counters of interest. Reviewing\
    \ the counters with issues along with the new counters provides you more opportunity\
    \ to discover different trends in the data.\n\nAfter reviewing all of the object\
    \ counters, you should have a clear understanding of the peak usage times when\
    \ `SQL Server` is under the most pressure and know what areas of `SQL Server`\
    \ are potential bottlenecks. The other important data to incorporate into this\
    \ review is the number of business transactions that were completed during the\
    \ corresponding time window. With that data, you can fill in the information for\
    \ statements such as the following: “My system is only 30 percent utilized when\
    \ processing X number of payments.”\n\n## Analyzing Configuration Data\n\nTypically,\
    \ when a new server configuration that will run `SQL Server` is built, it is often\
    \ done with a standard build approved by the IT organization and it’s not necessarily\
    \ optimized for `SQL Server`. Most companies like to maintain as few server configurations\
    \ as possible and make them work everywhere if possible. The build process most\
    \ likely will be automated to a certain extent, with some items manually configured.\
    \ The result is expected to be a server that looks, acts, and feels like all other\
    \ servers within the company for a specific platform and version. Based on my\
    \ experience, the standard build will usually be 98 percent correct with a 2 percent\
    \ variation from the norm. The deviations are what cause problems, some of which\
    \ will not be evident immediately."
