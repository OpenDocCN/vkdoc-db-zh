  trans: "\n# 第 17 章：面向 SQL Server 数据库管理员的大数据\n\n## 数据库管理员角色的演变\n\n在较新的软件和数据库环境中（例如科技初创公司或未进行有意识数据架构设计的企业），数据库管理员作为数据架构师的角色往往不存在。开发人员决定如何以及在何处存储数据，而数据库管理员的参与，如果有的话，也仅仅是接单员的角色。在某些数据架构师为王的企业环境中，每一个数据建模决策都由架构师陛下亲自做出或批准。如果架构师仅仅是另一个主题，那么存储数据的选择则由数据库管理员与开发团队共同决定。然而，通常情况下，并没有数据架构师来担任数据模型的守门人角色，数据模型是以临时方式开发的。无论如何，数据库管理员在存储和维护数据以确保其完整性和可用性方面扮演着重要角色，并应准备好承担大数据框架的管理、安全和可靠性工作。\n\
    \n## 大数据给数据库管理员带来的挑战\n\n缺乏控制和管理将是数据库管理员将大数据纳入其职责范围所面临的一项挑战。请考虑引入大数据环境的以下特征会对您当前的环境产生什么影响：\n\
    \n*   您拥有大量无关的、没有外键的数据，这些数据形态各异，大小不一。\n*   大多数数据都是通过批处理过程进行处理的。\n*   数据模型是由程序员驱动的。\n\
    *   服务器硬件的扩展能力几乎是无限的。\n*   数据的生命周期未定义且无边界。\n*   数据清洗是个未知数。\n*   管理大数据的工具尚处于起步阶段。\n\
    *   整合不同的数据集需要专业知识、努力和资金。\n\n## 大数据实战\n\n让我们探讨几种展示如何利用`Hadoop`的模式，并看一些示例，这些示例说明了您可能实现大数据的一些方式。在决定使用`Hadoop`存储哪些数据之后，您必须做出的首要决策之一是您将如何使用它，以及它将如何与您的`SQL\
    \ Server`数据库进行交互。架构选择众多，来回移动数据的技术也多种多样。我们将从使用`Sqoop`开始，这是一个允许您将数据批量传入和传出`SQL Server`的工具。\n\
    \n### 导入与导出\n\n您将处理的第一个示例只是简单地将数据移入和移出`HDFS`。假设您需要为市场部门解决一个问题。`AdventureWorks`公司正在实施一个新的复杂的动态定价系统，市场部想知道产品在其历史中任意一天的价格。目前，`AdventureWorks`数据库中有一个`ProductListPriceHistory`表，但由于过去产品价格变化不频繁，它通过较宽的日期范围来跟踪价格变化，因此您需要用一个能存储更大数据量的表来替换它。您还知道，将来您会希望跟踪产品的所有信息，包括库存水平、成本、营销描述等。为确保不遗漏任何信息，您使用新的`Hadoop`基础设施在每晚午夜将每个产品存储到`HDFS`中。使用`AdventureWorks\
    \ for SQL Azure`数据库，`Product`表具有以下定义，其中使用了两个用户定义的数据类型：\n\n```sql\nCREATE TYPE\
    \ dbo.Name FROM nvarchar(50) NULL\nCREATE TYPE dbo.Flag FROM bit NOT NULL\n\n\
    CREATE TABLE Production.Product(\n    ProductID int IDENTITY(1,1) NOT NULL,\n\
    \    Name dbo.Name NOT NULL,\n    ProductNumber nvarchar(25) NOT NULL,\n    MakeFlag\
    \ dbo.Flag NOT NULL,\n    FinishedGoodsFlag dbo.Flag NOT NULL,\n    Color nvarchar(15)\
    \ NULL,\n    SafetyStockLevel smallint NOT NULL,\n    ReorderPoint smallint NOT\
    \ NULL,\n    StandardCost money NOT NULL,\n    ListPrice money NOT NULL,\n   \
    \ Size nvarchar(5) NULL,\n    SizeUnitMeasureCode nchar(3) NULL,\n    WeightUnitMeasureCode\
    \ nchar(3) NULL,\n    Weight decimal(8, 2) NULL,\n    DaysToManufacture int NOT\
    \ NULL,\n    ProductLine nchar(2) NULL,\n    Class nchar(2) NULL,\n    Style nchar(2)\
    \ NULL,\n    ProductSubcategoryID int NULL,\n    ProductModelID int NULL,\n  \
    \  SellStartDate datetime NOT NULL,\n    SellEndDate datetime NULL,\n    DiscontinuedDate\
    \ datetime NULL,\n    rowguid uniqueidentifier NOT NULL,\n    ModifiedDate datetime\
    \ NOT NULL,\n    CONSTRAINT PK_Product_ProductID PRIMARY KEY CLUSTERED\n    (\n\
    \        ProductID ASC\n    )WITH (PAD_INDEX = OFF, STATISTICS_NORECOMPUTE = OFF,\
    \ IGNORE_DUP_KEY = OFF,\n          ALLOW_ROW_LOCKS = ON, ALLOW_PAGE_LOCKS = ON)\n\
    )\n```\n\n您将用来完成此批量数据加载工作的工具是`Sqoop`，它是`Hadoop`生态系统的一个组件（`Hadoop on Azure`在其产品中包含了`Sqoop`，因此您无需单独安装）。`Sqoop`对数据库管理员很重要，因为它是在`Hadoop`和`SQL\
    \ Server`之间执行批量数据传输的最佳方式。关于`Sqoop`首先要了解的是，**导入**将数据移入`HDFS`，而**导出**则将数据移出`HDFS`（在本例中，是移入`SQL\
    \ Server`）。此示例将展示在`SQL Server`的`AdventureWorks`数据库和`HDFS`数据存储都位于云端的情况下的数据移动。稍后，您将处理一个两个数据存储都位于您组织内部网络中的示例，尽管任何代码都可以适用于您内部网络或云中的`SQL\
    \ Server`或`HDFS`。\n\n> **注意：** Apache `Sqoop` 是一个设计用于在 Apache `Hadoop` 与结构化数据存储（如关系数据库）之间高效传输批量数据的工具。\n\
    \n首先，您需要一个 `SQL Azure` 账户。第一步是将 `AdventureWorks` 数据库添加到 `SQL Azure`，您可以从 [`msftdbprodsamples.codeplex.com/releases/view/37304.`](http://msftdbprodsamples.codeplex.com/releases/view/37304)\
    \ 下载它。请按照说明上传数据库。\n\n然后，您需要访问一个 `Hadoop` 集群。对于这些示例，我使用在 [`www.hadooponazure.com.`](https://www.hadooponazure.com)\
    \ 上的 `社区技术预览版 (CTP)` 在 `Windows Azure` 中分配了一个 `Hadoop` 集群。分配完成后，您就准备好在云端使用 `Hadoop`\
    \ 集群了，如图 17-6 所示。请注意，因为在撰写本文时，`Microsoft` 仅发布了 `Hadoop` 的 `CTP` 版本，所以图中显示该集群即将过期，但它也显示了一组磁贴，可以让我使用该集群。您的大部分时间将花在运行导入和导出数据的命令行作业上，因此请单击\
    \ `远程桌面` 直接登录到集群。\n\n![图 17-6. Azure 上的 Hadoop CTP 主菜单](img/index-414_1.png)\n\
    \n现在，您可以通过向其中放入一些数据来使用此集群。`远程桌面连接 (RDP)` 并登录到集群后，转到桌面并启动 `Hadoop 命令 Shell`。到达命令行后，您将位于\
    \ `Hadoop` 的根路径，并看到 `c:\\apps\\dist>` 提示符。在执行任何其他操作之前，请通过执行以下行设置 `Hadoop` 主环境变量：\n\
    \n```\nSET HADOOP_HOME=c:\\Apps\\dist\n```\n\n下一步是将命令行路径更改为 `c:\\Apps\\dist\\\
    sqoop\\bin`，您将在那里运行 `Sqoop` 作业，以将数据从 `SQL Azure` 中的 `AdventureWorks` 移入 `Hadoop`\
    \ 并移回。\n\n```\ncd sqoop\\bin\n```\n\n然后，您需要登录到您的 `AdventureWorks` 数据库并添加一个同义词。这是必需的，因为\
    \ `Sqoop` 会给表名加上方括号，所以它在访问 `SQL Server` 时需要它们。转到 `SQL Azure` 并执行此 `SQL` 命令：\n\n\
    ```sql\nCREATE SYNONYM [Production.Product] FOR Production.Product\n```\n\n设置完成，您可以开始工作了！第一个\
    \ `Sqoop` 作业将把 `Product` 表从 `SQL Server` 复制到 `HDFS`。这类似于您可能更熟悉的用于 `SQL Server`\
    \ 的 `BCP` 实用程序工具。您没有指定任何过滤器、列或显式查询，因此整个表将被复制。\n"
- fmt: '# Chapter 17: Big Data for the SQL Server DBA


    Go back to the Hadoop Command Shell and enter the following script, replacing
    `myserver` in the `connect` argument with the name of your database server, and
    use an actual username and password that can log in to SQL Server. The `--connect`
    argument looks like a familiar connection string, and the `import` command tells
    `sqoop` to copy data from the database to HDFS. The `--target-dir` argument is
    the folder path where the data will be stored in HDFS, and `-m` tells `sqoop`
    the number of map tasks to run in parallel for the import. A partial list of Sqoop
    arguments and descriptions is shown in Table 17-4. Execute the script to get `sqoop`
    running.


    ```bash

    sqoop import --connect "jdbc:sqlserver://myserver.database.windows.net;username=mysqluser@myserver;password=mypwd;database=AdventureWorks2012"
    --table Production.Product --target-dir /data/ProductTable -m 1

    ```


    ## Table 17-4: Partial Descriptive List of Sqoop Arguments


    | Argument | Description |

    | :--- | :--- |

    | `--connect <jdbc-uri>` | Specify JDBC connect string |

    | `--username <username>` | Set authentication username |

    | `--password <password>` | Set authentication password |

    | `--append` | Append data to an existing dataset in HDFS |

    | `--columns <col, col, col…>` | Columns to import from table |

    | `-m`, `--num-mappers <n>` | Use `n` map tasks to import in parallel |

    | `-e`, `--query <statement>` | Import the results of statement |

    | `--split-by <column-name>` | Column of the table used to split work units |

    | `--table <table-name>` | Table to read |

    | `--target-dir` | This is the folder where the output data is stored |

    | `--where <where clause>` | where clause to use during import |


    You’ll see a lot of logging messages and then, hopefully, success. At the end
    of the logging, you should see a couple of messages that tell you the time it
    took to run this job, the number of bytes transferred, and that all 504 rows from
    the Product table were imported into HDFS. It should look something like the following:


    ```text

    12/07/18 02:14:58 INFO mapreduce.ImportJobBase: Transferred 102.9434 KB in 43.5506
    seconds (2.3638 KB/sec)

    12/07/18 02:14:58 INFO mapreduce.ImportJobBase: Retrieved 504 records.

    ```


    If you’re like me, the first thing you asked is “Where did the data go and how
    can I look at it?” Go back to the desktop and launch the `HadoopNameNode`. The
    screen will show you a link labeled “Browse the filesystem” (see Figure 17-7).
    Click it and a web browser will open with a list of directories, one of them being
    the data folder. Click this folder and you should see another folder called `ProductTable`,
    which is what you specified would be the HDFS location of the data in your Sqoop
    script. Click this folder and you’ll see a file with the name `part-m-00000`.
    `sqoop` creates files with a file name format of `part-m-xxxxx`, where `xxxxx`
    is a sequential number starting at 0. This is where your data should be.


    Now open the file by clicking it and you’ll see what looks like a comma-delimited
    file of the Product table. I know, not too exciting, but that’s it. This is the
    way `sqoop` loaded the table into HDFS and the way it lives there. Don’t worry
    too much, though, it’s very functional this way.


    ![Image 197](index-416_1.png)


    ![Image 198](index-416_2.png)


    **Figure 17-7.** Click the “Browse the filesystem” link to browse the datasets
    you’re storing in HDFS.


    There are a few things to note about this initial data load. First, it didn’t
    make the best use of Hadoop. It was a small amount of data, and you’ll get more
    bang for the buck from your cluster with a larger dataset. Also, we asked `sqoop`
    to do a vanilla load of the table into HDFS, so it loaded the whole table without
    using parallelism. To force parallelism, you could change the `-m` operator to
    a number greater than 1, and you would have to tell it the primary key of the
    table so it could split the data into multiple import jobs. If you don’t tell
    `sqoop` what the primary key of the table is, then the operator `-m` must have
    a value of 1 or else it will fail. Take a look at Figure 17-8 to see a diagram
    of `sqoop` importing data in parallel by breaking the work up into multiple map
    tasks.


    **Figure 17-8.** The `sqoop` import data flow using MapReduce.


    What if you executed the same job again? It would fail because the file `part-m-00000`
    already exists in the `ProductTable` folder. To succeed, you would have to add
    the `--append` operator, which would import the complete Product table again into
    the same folder, except this time put it in a file called `part-m-00001`. If you
    did this on a daily basis, you would store a complete snapshot of the Product
    table in HDFS with one file per day.


    There are many more options for importing data with `sqoop`. This example showed
    a general use of Hadoop, but often you’ll want to run a more targeted import,
    so next you’ll do one that gets data based on using a filter.


    ## Extract Using a Date Filter


    Imagine that your AdventureWorks SQL Server database contains 500,000 unique products,
    as you’re a huge online retailer. You’re still trying to build a data store that
    captures the history for product changes, especially pricing. As you saw in the
    previous section on import and exporting, you can take a complete snapshot of
    the Product table and capture it in HDFS every day. Instead, you choose to capture
    all changes to products, so you decide to run a job at the end of the day that
    grabs only product rows that have changed during the day. You can use `sqoop`
    to do this by adding a few parameters.


    First, you’ll issue a SQL `UPDATE` statement to increase the price of every product
    in your database by $1 if the price is between $45 and $100, which should be 42
    rows in AdventureWorks. This will also update the `ModifiedDate` column to the
    time of the update using `getdate()`.


    ```sql

    UPDATE Production.Product

    SET ListPrice = ListPrice + 1,

    ModifiedDate = getdate()

    WHERE ListPrice between 45 and 100

    ```


    ## Sqoop Import from Azure


    Because we’re still using SQL Azure, you’ll next get the changes from there and
    put them in the same HDFS folder you’ve been using, but you’ll embellish the `sqoop`
    import first. You’ll notice we added a `where` clause to the import, so this pulls
    only the five rows that changed on the date 2012-07-19 (note that the date depends
    on when you execute the sample `Update` statement). We changed the `-m` parameter
    to 4, so four MapReduce tasks can run in parallel (I know, overkill for 42 rows,
    but it’s an example).


    Next, because you are using an `-m` setting of greater than 1, you need to identify
    the key that the MapReduce jobs can use to split the data up among themselves,
    so they aren’t overlapping each other when grabbing data. This way every row belongs
    to one and only one job. To indicate the split key, you use `--split-by` and tell
    it that the key column is `ProductID`. Finally, you decide not to get every column
    from the Product table, so you use the `--columns` operator and list only the
    columns that you’re interested in.


    ```bash

    sqoop import --connect "jdbc:sqlserver://myserver.database.windows.net;username=mysqluser@myserver;password=mypwd;database=AdventureWorks2012"
    --table Production.Product --where "ModifiedDate between ''2012-07-19'' and ''2012-07-20''"
    --target-dir /data/ProductTable -m 4 --append --columns "ProductID,ProductNumber,ListPrice,ModifiedDate"
    --split-by ProductID

    ```


    After executing the job, go back to the `ProductTable` folder in HDFS. What you
    see might surprise you.'
