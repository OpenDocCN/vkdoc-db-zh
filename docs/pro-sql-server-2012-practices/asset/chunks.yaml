- fmt: 'As mentioned there are 2 ways you can view the rowset provider, the SQL Profiler
    and SMO object model. We’ll take a look at both starting with SQL Profiler.


    # SQL Server Profiler


    `SQL Profiler` is not available in SQL Express edition but there is a free open
    source project called `SQL Express Profiler` that fills that gap. `SQL Profiler`
    comes with 9 preinstalled templates that help with common tracing scenarios like
    tracing statement duration or taken locks. The default trace output is in the
    profiler window where you can see the traces being written. The more trace events
    you have, the more memory it will take. One thing to keep in mind is that even
    though the profiler UI shows the `duration` column in milliseconds, its value
    is actually in microseconds. This can be seen if you save the trace to a table.
    The `duration` value in the SMO object model is also in microseconds. In my conversations
    with people there seems to be a misconception that the same thing happened with
    the `CPU` column. This is not so. The `CPU` column is still in milliseconds.


    When creating traces with `SQL Profiler` there might be some confusion about various
    options you can choose. Figure 5-2 shows the new trace dialog.


    ![Image 62](index-114_1.png)


    **Figure 5-2. The New Trace Properties dialog box**


    At the top there are the standard input options like naming your trace and choosing
    a template. The interesting part is in the middle of the dialog. There are options
    like "Save to file" and "Save to table". If you remember from earlier there is
    no direct to-table provider and the rowset provider `SQL Profiler` uses is memory
    based. The catch here is that although those options do create a file and save
    to a table, the data first goes through the rowset provider memory buffer. Notice
    that there’s an option "Server processes trace data". This is the worst thing
    you can choose. The name is a bit misleading as it makes you think that you’re
    actually creating a server-side trace. What actually happens is you’re creating
    two exactly identical traces.


    One goes through the rowset provider and the other through the file provider.
    Figure 5-3 shows the chosen options and the following code shows we really do
    have 2 traces running.


    ```sql

    -- This query returns 2 rows.

    -- The rowset provider has the

    -- is_rowset column set to 1 and

    -- NULL in the path column.

    -- The file provider has the path column set

    -- to the path we''ve set in options (E:\MyTrace.trc).

    SELECT *

    FROM sys.traces

    WHERE is_default != 1;

    ```


    ![Image 63](index-115_1.png)


    ![Image 64](index-115_2.png)


    **Figure 5-3. Save to file options that you should avoid**


    If you choose the "Save to table" option, trace data still goes through the rowset
    provider and is then inserted into a table row by row. The "Set maximum rows"
    option lets you set the maximum row size for the table. After that size is reached
    the trace data is no longer stored into a table. Tracing however still continues.
    Another very useful and not well known feature of `SQL Profiler` is the ability
    to merge already saved traces with saved PerfMon binary (`.blg`) or text (`.csv`)
    data files. To do this, your trace must have `StartTime` and `EndTime` columns
    included so that it can be synchronized with the PerfMon data. PerfMon merging
    doesn’t work on live traces, only on already saved ones. To merge them open the
    SQL Trace file, go to `File` -> `Import Performance Data` and choose the PerfMon
    data file. Figure 5-4 shows what the correlated data looks like in `SQL Profiler`.


    **Figure 5-4. A saved trace correlated with Performance Monitor data, displayed
    in SQL Profiler**


    # .NET SMO objects


    Now that we’ve looked at the `SQL Profiler` let’s take a quick look at the .NET
    SMO object model. Its capabilities exactly match those of the `SQL Profiler`.
    Because of this it can be used for automated tracing, filtering and storing of
    the filtered traces into various tables or files. One example is to have all statements'
