  trans: "\n# 引言\n\n`Pro SQL Server 2012 Practices` 是一本关于实践与技术的文集，这些内容是你在成为顶尖数据库管理员（DBA）或数据库程序员的道路上应该熟悉的。\n\
    \n作者们见解深刻，且乐于分享。本书涵盖的主题非常广泛，例如：什么样的设计能带来良好的性能、如何选择数据库服务器硬件、索引、调优、帮助构建数据库的工具、管理复制的技术、合规性、备份、高可用性等等。\n\
    \n从事 SQL Server 专业工作既令人望而生畏，又令人兴奋不已。之所以让人畏惧，是因为仅仅为了能够运行 SQL Server 数据库并对其进行编程，就必须学习海量的“机制”。兴奋感最初来自于掌握了创建数据库、创建表、添加用户、存储数据、检索数据等机械性方面的知识。然后，从长远来看，你会超越基础的任务和活动，开始深入了解\
    \ SQL Server 及其运作方式。终有一天，你会意识到自己确实懂得了一些东西。你想要分享。这本书便是由此而来。\n\n你能自己想出这些实践方法吗？是的，如果有足够的时间和经验，你很可能能够从第一性原理出发，自己学会所有内容。然而，作者们撰写此书的目标是加速你的进程——不是为了让你能投机取巧绕过自然规律，而是为了让你能从他们停下的地方继续前进，进而形成更深刻的见解，然后将你所学到的东西分享给后来者。\n\
    \n## 目标读者\n\n`Pro SQL Server 2012 Practices` 是为在职的 SQL Server 专业人员编写的。本书主要面向 DBA，但对于那些认真致力于在\
    \ Microsoft SQL Server 领域建立声誉和专长的开发人员也同样具有吸引力。本书面向中级用户，假定读者对基础产品有一定的经验基础。其目标是提供那种深厚的专业知识和指导，让你在建立自己职业生涯和声誉的过程中，可以说能够**站在巨人的肩膀上**。\n\
    \nxxiii\n\n## 作者\n\n本书的作者团队是一群敬业的专业人士，他们热衷于使用 SQL Server、善用 SQL Server，并乐于与周围的人分享他们的专业知识。每位作者都选择了一个章节，坚信你所学到的知识将对你的\
    \ SQL Server 专业人士成长产生重大而积极的贡献。\n\n本书涵盖的主题，按章节列出，包括以下内容：\n\n1.  成为你开发人员最好的朋友，作者：Jesper\
    \ Johansen\n2.  做对事：为数据库性能而设计，作者：Louis Davidson\n3.  隐藏的性能陷阱，作者：Gail Shaw\n4.\
    \  动态管理视图，作者：Kellyn Pot’vin\n5.  从 SQL 跟踪到扩展事件，作者：Mladen Prajdić\n6.  实用工具数据库，作者：Chris\
    \ Shaw\n7.  跳出思维定式看索引，作者：Jason Strate\n8.  发布管理，作者：TJay Belt\n9.  合规性与审计，作者：Jonathan\
    \ Gardner\n10. 自动化管理，作者：Jes Borland\n11. SQL Server 数据移动的流体动力学，作者：Wendy Pastrick\n\
    12. 面向 DBA 的 Windows Azure SQL Database，作者：Herve Roggero\n13. I/O：不为人知的故事，作者：Jeremy\
    \ Lowell\n14. 页压缩与行压缩，作者：Bradley Ball\n15. 服务器的选型与规模确定，作者：Glenn Berry\n16. 使用可用性组进行备份与还原，作者：Grant\
    \ Fritchey\n17. SQL Server DBA 的大数据，作者：Carlos Bossy\n18. 峰值负载调优，作者：Ben DeBow\n\
    \n## 示例代码\n\n本书中部分章节提供了可下载的示例代码。你可以在 Apress.com 网站的本书目录页面找到代码：\n\n`http://www.apress.com/9781430247708`\n\
    \n点击“源代码/下载”选项卡。你将看到一个链接，用于下载示例代码压缩包。\n\nxxiv\n\n# 文档大纲\n\n*   `Apress.Pro.SQL.Server.2012.Practices.Nov.2012.pdf`\n\
    \    *   封面\n        *   内容概览\n        *   目录\n        *   关于作者\n        *   关于技术审校者\n\
    \        *   致谢\n        *   引言\n            *   目标读者\n            *   作者\n  \
    \          *   示例代码\n    *   第 1 章：成为你开发人员最好的朋友\n        *   我与 SQL Server 和开发人员合作的经验\n\
    \        *   协调组织内不同的观点\n        *   准备与开发人员合作实施系统变更\n        *   步骤 1：映射你的环境\n\
    \        *   步骤 2：描述新环境\n        *   步骤 3：创建清晰的文档\n        *   步骤 4：创建系统管理流程\n\
    \        *   步骤 5：创建良好的报告\n        *   确保版本兼容性\n        *   设定限制\n           \
    \ *   登录触发器\n            *   基于策略的管理\n            *   日志记录与资源控制\n        *   后续步骤\n\
    \    *   第 2 章：做对事：为性能而设计数据库\n        *   需求\n        *   表结构\n            * \
    \  历史快览\n            *   为什么一个正常的数据库优于一个特殊的数据库\n            *   物理模型选择\n     \
    \   *   设计测试\n        *   结论\n    *   第 3 章：隐藏的性能陷阱\n        *   谓词\n        *\
    \   残留物\n        *   溢出\n        *   结论\n    *   第 4 章：动态管理视图\n        *   理解基础\n\
    \            *   命名约定\n            *   相关视图组\n            *   Varbinary 哈希值\n\
    \        *   常见的性能调优查询\n            *   检索连接信息\n            *   显示当前正在执行的请求\n\
    \            *   锁升级\n            *   查找性能不佳的 SQL\n            *   利用 DMV 性能脚本的威力\n\
    \            *   术语差异\n            *   优化性能\n            *   检查性能统计信息\n      \
    \      *   执行次数最多的查询\n            *   物理读取\n        *   物理性能查询\n            *\
    \   定位缺失索引\n            *   分区统计信息\n"
