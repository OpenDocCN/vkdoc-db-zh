  ## 通过命令行部署


  正如我们在第 2 章中所介绍的，大多数围绕启用 Azure Arc 的数据服务的部署都是通过一个名为 `az`（即 `azure-cli`）的工具来控制的。即使是
  Azure Data Studio 的图形化安装，也只是在后台调用此 CLI，这就是为什么我们将从命令行驱动的方法开始。


  一个部署命令可能如代码清单 5-3 所示。


  ```

  az arcdata dc create     --connectivity-mode Indirect `

  --name arc-dc-local `

  --k8s-namespace arc `

  --subscription  `

  -g arcBook `

  -l eastus `

  --storage-class local-storage `

  --profile-name azure-arc-kubeadm `

  --infrastructure onpremises

  --use-k8s

  清单 5-3

  用于创建数据控制器的 azure-cli 命令

  ```


  这将触发数据控制器在间接模式下的当前 Kubernetes 上下文中部署，Arc 集群的名称将为 `arc-dc-local`，Kubernetes 中的命名空间将为
  `arc`。订阅 ID 需要替换为你的 Azure 订阅 ID。部署将链接到位于“美国东部”区域的资源组 `arcBook`（尽管在首次上传指标和/或日志之前，部署不会显示在门户中
  - 更多详情请参见第 9 章），并且它将使用 `local-storage` 存储类。


  我们提供了一个部署配置文件名，在我们的例子中是 `azure-arc-kubeadm`。`azure-cli` 附带了一些预配置的配置文件，以便于部署到不同版本的
  Kubernetes。可以使用代码清单 5-4 中的命令检索当前提供的配置文件列表。


  最后两个参数将定义基础结构（允许的值：[''aws'', ''gcp'', ''azure'', ''alibaba'', ''onpremises'', ''other'',
  ''auto'']）并使客户端使用本地 Kubernetes 工具（由 `--use-k8s` 开关触发）。替代方法是使用 Azure 资源管理器，这将在下一章中用于我们的直接连接数据控制器。


  还有几个参数，并且此示例中提到的所有参数并非都是必需的。你可以在 [*https://docs.microsoft.com/en-us/cli/azure/arcdata*](https://docs.microsoft.com/en-us/cli/azure/arcdata)
  找到完整的参考。


  ```

  az arcdata dc config list

  清单 5-4

  检索 Arc 数据控制器的配置配置文件列表

  ```


  此命令将返回支持的选项列表，如图 5-3 所示。每个选项都将具有针对特定环境（如存储、安全性和网络集成）的预设但可调整的配置。


  ![](img/505695_2_En_5_Fig3_HTML.jpg)


  图 5-3


  Arc 数据控制器的配置配置文件列表


  如果你的所需平台不在列表中，或者你需要更改配置文件的默认设置，也可以从使用代码清单 5-5 中的代码创建自定义配置开始。


  ```

  az arcdata dc config init -p customconfig --source azure-arc-kubeadm

  清单 5-5

  用于初始化自定义配置的 azure-cli 命令

  ```


  这将在名为 `customconfig` 的目录中创建一个名为 `control.json` 的文件。该文件类似于我们在代码清单 5-6 中看到的内容，可用于控制数据控制器部署的每个可配置参数。


  ```

  {

  "apiVersion": "arcdata.microsoft.com/v2",

  "kind": "DataController",

  "metadata": {

  "name": "datacontroller"

  },

  "spec": {

  "infrastructure": "",

  "credentials": {

  "serviceAccount": "sa-arc-controller",

  "dockerRegistry": "arc-private-registry",

  "domainServiceAccount": "domain-service-account-secret"

  },

  "docker": {

  "registry": "mcr.microsoft.com",

  "repository": "arcdata",

  "imageTag": "v1.1.0_2021-11-02",

  "imagePullPolicy": "Always"

  },

  "storage": {

  "data": {

  "className": "",

  "size": "15Gi",

  "accessMode": "ReadWriteOnce"

  },

  "logs": {

  "className": "",

  "size": "10Gi",

  "accessMode": "ReadWriteOnce"

  }

  },

  "security": {

  "allowDumps": true,

  "allowNodeMetricsCollection": true,

  "allowPodMetricsCollection": true

  },

  "services": [

  {

  "name": "controller",

  "serviceType": "NodePort",

  "port": 30080

  }

  ],

  "settings": {

  "azure": {

  "autoUploadMetrics": "false",

  "autoUploadLogs": "false"

  },

  "controller": {

  "logs.rotation.size": "5000",

  "logs.rotation.days": "7"

  },

  "ElasticSearch": {

  "vm.max_map_count": "-1"

  }

  }

  }

  }

  清单 5-6

  示例 `control.json` 文件

  ```


  如果想使用自定义配置而不是预配置的配置文件进行部署，可以将 `--profile-name` 参数（而不是 *profile name*）传递给 `azure-cli`，如代码清单
  5-7 所示。


  ```

  az arcdata dc create     --connectivity-mode Indirect `

  --name arc-dc-local `

  --k8s-namespace arc `

  --subscription  `

  --resource-group arcBook `

  --location eastus `

  --profile-name PATH `

  --use-k8s

  清单 5-7

  使用自定义配置创建数据控制器的 azure-cli 命令

  ```


  无论你选择哪种方式，CLI 都会首先要求你提供要使用的用户名和密码（可能还需要接受许可协议），然后开始部署过程。过程的持续时间将取决于目标机器的性能和互联网连接，完成后，输出应类似于我们在图
  5-4 中看到的内容。


  ![](img/505695_2_En_5_Fig4_HTML.png)


  图 5-4


  数据控制器部署的输出


  如果希望避免被提示输入 EULA、用户名和密码，也可以在环境变量中提供它们：


  *   `ACCEPT_EULA`：将其设置为 `Y`

  *   `AZDATA_USERNAME`：要使用的用户名，例如 `arcadmin`

  *   `AZDATA_PASSWORD`：你选择的强密码

  *   `AZDATA_LOGSUI_USERNAME` 和 `AZDATA_LOGSUI_PASSWORD`：日志仪表板的用户名和密码

  *   `AZDATA_METRICSUI_USERNAME` 和 `AZDATA_METRICSUI_PASSWORD`：指标仪表板的用户名和密码


  **注意** 如果未提供 `METRICSUI` 和 `LOGSUI`，则它们将回退到 `AZDATA` 用户名/密码。


  这将使 `azure-cli` 使用这些值，而不是以交互方式提示你。使用环境变量时，可以为日志 UI、指标 UI 和控制器本身提供专用用户。以交互方式输入时，它们都将使用相同的凭据。


  如果想在 Kubernetes 端监控部署，可以运行代码清单 5-8 中的 `kubectl` 命令来跟踪进度。


