  \ 所示。\n\n![](img/505695_2_En_7_Fig23_HTML.jpg)\n图 7-23\nKubernetes 命名空间中的 Arc Pod\n\
  \n## Active Directory 身份验证\n\n在撰写本文时，Active Directory 身份验证仍处于预览阶段。您可以在官方文档中找到最新的分步指南：[*https://docs.microsoft.com/en-us/azure/azure-arc/data/active-directory-introduction*](https://docs.microsoft.com/en-us/azure/azure-arc/data/active-directory-introduction)。\n\
  \n## 将数据导入实例\n\n如果您想在实例中还原现有数据库，在大多数情况下，第一步是将此数据库的备份复制到您的容器中——或者更准确地说，复制到容器背后的存储中。由于\
  \ Arc SQL 托管实例是 SQL Server 的直接迁移版本，要将数据导入 Arc SQL 托管实例，您可以简单地使用标准的 SQL Server 备份。\n\
  \n### 将备份文件复制到实例中\n\n与常见情况一样，将备份文件导入 Arc SQL 托管实例有多种方法，我们将再次为您提供一些选项。如果您有一个可以通过\
  \ HTTP 下载的备份文件，您可以使用 `kubectl` 在容器中触发 `wget` 下载（参见代码清单 7-10）。\n\n```\nkubectl exec\
  \ mi-1-0 -n arc -c arc-sqlmi -- wget https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks2019.bak\
  \ -O /var/opt/mssql/data/AdventureWorks2019.bak\n```\n代码清单 7-10\n在容器内使用 `wget` 下载文件的代码\n\
  \n另一方面，如果您有一个本地备份文件，也可以使用 `kubectl` 将其复制到容器，如代码清单 7-11 所示。\n\n```\nkubectl cp c:\\\
  files\\AdventureWorks2017.bak arc/arc-mi-01-0:var/opt/mssql/data/AdventureWorks2017.bak\
  \ -c arc-sqlmi\n```\n代码清单 7-11\n将本地文件复制到容器的代码\n\n这两种技术都能使备份文件位于您的容器中。请确保容器中有足够的磁盘空间，并在完成后删除备份文件。通常取决于您的备份最初来自何处，以决定哪种方式对您更有意义。\n\
  \n\n\n### 在实例中还原备份文件\n\n如果你希望从命令行进行还原，可以直接在客户端使用类似 `sqlcmd` 的工具，或者再次使用 `kubectl`\
  \ 在 SQL 实例上直接运行 `sqlcmd`，如清单 7-12 所示。\n\n```\nkubectl exec mi-1-0 -n arc -c arc-sqlmi\
  \ -- /opt/mssql-tools/bin/sqlcmd -S localhost -U arcadmin -P \"P@ssw0rd\" -Q \"\
  RESTORE DATABASE [AdventureWorks2019] FROM  DISK = N'/var/opt/mssql/data/AdventureWorks2019.bak'\
  \ WITH  FILE = 1,  MOVE N'AdventureWorks2017' TO N'/var/opt/mssql/data/AdventureWorks2019.mdf',\
  \  MOVE N'AdventureWorks2017_log' TO N'/var/opt/mssql/data-log/AdventureWorks2019_log.ldf',\
  \  NOUNLOAD,  STATS = 5\"\n```\n清单 7-12\n在容器内运行 sqlcmd 以从备份还原数据库的代码\n\n你也可以连接到 Azure\
  \ Data Studio 中的实例，并使用还原向导或任何其他可以连接到 SQL 端点的工具。\n\n**注意**\n当连接到使用非默认端口的 SQL Server\
  \ 时，在复制端点信息，请确保使用**逗号**而不是冒号来分隔 IP 地址和端口。\n\n当然，另一个选择是使用 `RESTORE FROM URL` 命令从\
  \ Azure Blob 存储还原数据库。除此之外，你还可以添加一个持久卷，它可以是一个外部共享或专用的备份磁盘，这对于较大的备份和还原操作尤其有意义，可以避免使容器存储膨胀或需要四处复制备份文件。\n\
  \n### 托管备份与还原\n\n每个启用 Azure Arc 的 SQL 托管实例都附带一个内置的自动备份功能，默认启用。这意味着每个创建或还原的数据库都将自动接收一个初始完整备份，然后是按计划进行的差异备份和事务日志备份。这个概念与\
  \ Azure SQL 托管实例中的托管备份非常相似，允许你在保留期内的任何特定时间点执行时间点还原。\n\n还原操作将始终执行到一个新的数据库中。\n\n在撰写本文时，完整备份每周进行一次，差异备份每\
  \ 12 小时进行一次，事务日志备份每 5 分钟进行一次，这些设置不可配置。\n\n虽然所有备份设置都可以通过 `azure-cli` 和原生 Kubernetes\
  \ 工具找到并控制，但最简单的入门方法是使用 Azure Data Studio 中实例设置的备份部分，如图 7-24 所示。\n\n![](img/505695_2_En_7_Fig24_HTML.png)\n\
  图 7-24\n备份设置\n\n从那里，你可以更改时间点恢复备份的保留时间（图 7-25），从其默认值（7 天）更改为 1 到 35 天之间的任何值。超过配置保留期的备份文件将被自动删除。\n\
  \n![](img/505695_2_En_7_Fig25_HTML.jpg)\n图 7-25\n配置保留策略\n\n将保留时间更改为零将禁用此实例上的托管备份。\n\
  \n你也可以通过编辑实例的 YAML 清单或在 `azure-cli` 中指定 `--retention-days` 属性来调整该设置。\n\n你还可以使用 Azure\
  \ Data Studio 或其他任何工具来触发还原（参见图 7-26）。\n\n![](img/505695_2_En_7_Fig26_HTML.png)\n\
  图 7-26\n在 Azure Data Studio 中还原数据库\n\n还原操作需要指定源数据库、目标数据库和还原点（时间戳）。\n\n或者，你也可以使用\
  \ `azure-cli` 和类似于清单 7-13 中的命令来还原备份。\n\n```\naz sql midb-arc restore --managed-instance\
  \  --name  --dest-name  --k8s-namespace  --time \"YYYY-MM-DDTHH:MM:SSZ\" --use-k8s\n\
  ```\n清单 7-13\n用于从时间点备份还原数据库的 azure-cli 命令\n\n目标 MI 在运行还原之前必须存在。当你删除一个 Azure Arc\
  \ SQL 托管实例时，备份历史记录将被保留，直到其保留期届满。清单 7-13 的输出应类似于图 7-27 中的内容。重要的部分是状态。如果此处未显示 `Completed`，则表示还原操作出现问题。\n\
  \n![](img/505695_2_En_7_Fig27_HTML.jpg)\n图 7-27\n用于还原数据库的 azure-cli 命令的输出\n\n你可以通过运行清单\
  \ 7-14 所示的命令，获取命名空间中所有还原任务的概览。\n\n```\nkubectl get sqlmirestoretask -n arc\n```\n\
  清单 7-14\n用于列出命名空间中所有 SQL MI 还原任务的 kubectl 命令\n\n如果一切顺利，任务应以“已完成”状态显示，如图 7-28 中的示例所示。\n\
