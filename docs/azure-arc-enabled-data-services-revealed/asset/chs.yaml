- '# 关于作者


  '
- "# 1. Kubernetes 入门\n\n欢迎阅读《Azure Arc-enabled Data Services 揭秘》！本章介绍 Kubernetes，描述其在现代应用程序部署中的角色、提供的优势及其架构。从其优势开始，你将学习\
  \ Kubernetes 在现代基于容器的应用程序部署中所提供的价值。接下来，你将学习 Kubernetes API 如何让你以代码的形式构建和部署下一代应用程序和系统。在该部分，你将学习\
  \ Kubernetes 提供的用于定义和部署应用程序和系统的核心 API 原语。然后你将学习 Kubernetes 集群及其组件的关键概念。在本章结束时，你将了解\
  \ Kubernetes 在 Azure Arc-enabled Data Services 中的角色。\n\n## 介绍 Kubernetes\n\nKubernetes\
  \ 是一个容器编排器。它负责在数据中心内的服务器上启动基于容器的应用程序。为此，Kubernetes 使用代表数据中心资源的 `API 对象`，使开发人员和系统管理员能够以代码形式定义系统并使用该代码进行部署。基于容器的应用程序作为\
  \ `Pod` 部署到 `Kubernetes 集群`中。集群是计算资源（物理服务器或虚拟服务器）的集合，称为 `节点`。让我们更深入地探讨这些元素中的每一个，从\
  \ Kubernetes 的优势开始，了解其在现代应用程序部署中提供的价值。\n\n\n### Kubernetes 的优势\n\n以下是 Kubernetes\
  \ 带来的主要优势：\n\n*   **工作负载调度**：Kubernetes 是一个容器编排器，其主要目标是在一个 `集群` 的 `节点` 上启动基于容器的应用程序，称为\
  \ `Pod`。在 `集群` 中为 `Pod` 寻找最合适的运行位置是 Kubernetes 的职责所在。在将 `Pod` 调度到 `节点` 时，首要考虑是确定该\
  \ `节点` 是否有足够的 CPU 和内存资源来运行分配的工作负载。\n*   **管理状态**：当代码部署到 Kubernetes 中，定义了一个需要运行的工作负载时，Kubernetes\
  \ 有责任在 `集群` 中启动 `Pod` 和其他资源，并保持 `集群` 处于期望状态。如果 `集群` 的运行状态偏离了期望状态，Kubernetes 会尝试改变\
  \ `集群` 的运行状态，使其回到已定义的期望状态。例如，如果一个 `Deployment` 定义了需要运行一定数量的 `Pod`。如果某个 `Pod` 失败，Kubernetes\
  \ 会在 `集群` 中部署一个新的 `Pod`，替换失败的 `Pod`，确保 `Deployment` 所定义数量的 `Pod` 都正常运行。此外，假设你想要扩展支持某个应用程序的\
  \ `Pod` 数量以增加容量。在这种情况下，你只需增加 `Deployment` 中的副本数量，Kubernetes 就会在 `集群` 中创建额外的 `Pod`，确保期望状态得以实现。更多内容将在后续关于控制器的章节中介绍。\n\
  *   **一致性部署**：通过代码部署应用程序可以实现可重复的流程。定义 `Deployment` 的代码是配置构件，可以存放在源代码控制中。你也可以使用这些代码，在开发环境等低版本环境，甚至在本地系统和云之间部署完全相同的系统。更多内容将在后续关于\
  \ Kubernetes API 的章节中介绍。\n*   **速度**：Kubernetes 支持快速、受控的部署，能在 `集群` 中快速启动 `Pod`。此外，在\
  \ Kubernetes 中，你可以快速扩展应用程序。扩展支持应用程序的 `Pod` 数量可以简单到更改一行代码，而且这个过程可能只需几秒钟。在第[6]章中，通过向一个\
  \ `PostgreSQL` Hyperscale 部署添加额外副本，展示了这种速度。\n*   **基础设施抽象**：Kubernetes API 为 `集群`\
  \ 中可用的资源提供了一个抽象层或封装。在部署应用程序时，重点较少放在基础设施上，而更多放在如何定义、部署应用程序以及如何消耗 `集群` 的资源上。用于部署的代码将描述部署应该呈现的样子，而\
  \ `集群` 会实现它。如果应用程序需要公共 IP 地址或存储等资源，这些需求会成为部署的一部分，`集群` 将与底层基础设施交互，为应用程序配置这些资源。这种基础设施抽象是\
  \ Azure Arc-enabled Data Services 设计和实现的关键。我们将在本章末尾进一步探讨这个概念。\n*   **持久服务端点**：Kubernetes\
  \ 为部署在 `集群` 中的应用程序提供持久的 IP 和 DNS 命名。由于 `Pod` 可能会因扩缩操作、生命周期操作或响应故障事件而出现和消失，Kubernetes\
  \ 为访问这些应用程序提供了这种持久的网络抽象。根据所使用的 `Service` 类型，`Service` 可以将应用程序流量负载均衡到支持该应用程序的 `Pod`。随着\
  \ `Pod` 被创建和销毁（基于扩缩操作、响应生命周期操作或 `集群` 中的故障），Kubernetes 会自动更新关于哪些 `Pod` 提供应用程序服务的信息。\n\
  \n## Kubernetes API\n\nKubernetes API 提供了一个代表数据中心可用资源的可编程层。该 API 使你能够编写代码，在你的应用程序部署中使用这些资源。在编写代码使用\
  \ API 时，你会用到 `API 对象`，你用它们来定义和部署 Kubernetes 中的应用程序工作负载。\n\n你编写的代码被提交给 `API 服务器`。`API\
  \ 服务器` 是 Kubernetes `集群` 中的核心通信枢纽。它既是与 Kubernetes `集群` 交互的主要方式，也是 `集群` 内 Kubernetes\
  \ 组件交换信息的唯一途径。新的 `集群` 状态定义后（无论是初始部署还是通过修改现有部署），Kubernetes 开始实施代码中描述的状态。你代码的期望状态成为\
  \ `集群` 中的运行状态。\n\n### API 对象\n\nKubernetes `API 对象` 代表了 `集群` 中可用的资源。`集群` 中有用于计算、存储和网络等元素的\
  \ `API 对象`，可供你的应用程序工作负载使用。你将使用这些 `API 对象` 编写代码，以定义你部署到 Kubernetes `集群` 中的应用程序和系统的期望状态。\n\
  \n定义的 `API 对象` 传达了部署到 `集群` 的工作负载的期望状态，而 `集群` 有责任确保该期望状态成为 `集群` 的运行状态。\n\n现在，我们将介绍用于在\
  \ Kubernetes `集群` 中定义工作负载的核心 `API 对象`。它们是在 Kubernetes 中部署的应用程序的核心构建块。在接下来的章节中，我们将更深入地分别探讨每一个对象。\n\
  \n*   `Pod`：这些是基于容器的应用程序。`Pod` 是 `集群` 中的工作单元。`Pod` 是一个抽象，它包含一个或多个容器，以及执行所需的资源和配置，包括网络、存储、环境变量、配置文件和机密信息。\n\
  *   `控制器`：它们定义应用程序工作负载并使其在 `集群` 中保持期望状态。一些 `控制器` 负责启动 `Pod` 并使这些 `Pod` 保持期望状态。有几种不同类型的\
  \ `控制器` 用于确保已部署的应用程序和系统的状态，以及 `集群` 的运行状态。我们在本节介绍几种 `控制器`，并在本书其余部分介绍更多，包括 `Deployment`\
  \ 和 `StatefulSet` `API 对象`。\n*   `服务`：它们为访问基于 `Pod` 的应用程序提供网络抽象。`服务` 是应用程序消费者（如用户和其他应用程序）通过网络访问部署在\
  \ `集群` 中的基于容器的应用程序服务的方式。\n*   `存储`：这为 `Pod` 访问 `集群` 中可用的存储提供了抽象。`存储` 被应用程序用来持久化数据，其生命周期独立于\
  \ `Pod` 的生命周期。\n*   `自定义资源定义`：`CRD` 是 Kubernetes API 的扩展，使开发者能够将特定于应用程序的配置和功能封装在自定义\
  \ `API 对象` 中。然后使用该自定义 `API 对象` 来部署该应用程序。使用 `CRD` 为应用程序开发者在定义和部署时如何操作 `API 对象` 提供了额外的控制权。在\
  \ Azure Arc-enabled Data Services 中，你会发现用于 SQL Server 托管实例、PostgreSQL 11 和 12 版本以及数据控制器的\
  \ `CRD`。\n\n除了前面描述的 `API 对象` 外，还有许多其他对象用于构建工作负载，但本书重点介绍的是这些核心 `API 对象` 类型，它们用于部署\
  \ SQL Server 和 Azure Arc-enabled Data Services。\n\n\n### API 服务器\n\nAPI 服务器是 `Kubernetes`\
  \ `集群`中的中央通信枢纽。它是 `Kubernetes` 用户与`集群`交互以部署工作负载的主要方式。它也是 `Kubernetes` 在`集群`内部各组件之间交换信息的主要方式。API\
  \ 服务器是一个可通过 `HTTPS` 访问的 `REST` `API`，它将 `API` 对象以 `JSON` 格式暴露出来。当`集群`用户定义工作负载并将信息传入\
  \ API 服务器时，该信息会被序列化并持久化存储到`集群`数据存储中。`Kubernetes` 随后会将`集群`的运行状态转变为存储在`集群`存储中那些 `API`\
  \ 对象所定义的期望状态。`Kubernetes` 中的`集群`数据存储是 `etcd`，这是一个分布式键值数据存储；更多信息，请参见 [*https://etcd.io/*](https://etcd.io/)。\n\
  \n### 核心 Kubernetes `API` 原语\n\n现在，让我们更仔细地审视上一节介绍的每个高级 `API` 对象。本节将介绍 `Pod`、`控制器`、`服务`和`存储`。你将了解更多关于每个对象的细节，以及它们如何使你能够在\
  \ `Kubernetes` 中部署应用程序，以及每个 `API` 对象允许你部署的工作负载类型。\n\n#### `Pod`\n\n`Pod` 是 `Kubernetes`\
  \ `集群`中最基本的工作单元。从核心上讲，`Pod` 是一个 `API` 对象，它代表一个或多个容器，及其资源（例如网络、存储）和控制 `Pod` 执行的配置。最常见的\
  \ `Pod` `API` 对象定义包含容器镜像、用于与基于容器的应用程序通信的网络端口，以及（如果需要的话）存储。\n\n`Pod` 是 `Kubernetes`\
  \ `集群`中的调度单元。在 `Kubernetes` 中，调度决定了在`集群`的哪个`节点`上启动一个 `Pod`。一旦 `Pod` 被调度到`节点`上，容器运行时（通常是\
  \ `containerd` 容器运行时）会在该`节点`上使用指定的容器镜像启动一个容器。在将 `Pod` 调度到`节点`时，`Kubernetes` 会确保所选`节点`上具备运行该\
  \ `Pod` 所需的资源，如 `CPU` 和内存，并且（如果在 `Pod` 中配置了的话）能够访问存储。\n\n注意\n\n`Kubernetes` 实现了`容器运行时接口\
  \ (CRI)`，这意味着容器运行时是可插拔的资源，可以使用其他符合 `CRI` 标准的容器运行时。\n\n`Pod` 是伸缩的单元。在 `Kubernetes`\
  \ 中部署应用程序时，你可以通过在一个`集群`中创建 `Pod` 的多个副本（称为副本集）来水平伸缩应用程序。通过在`集群`的`节点`上启动更多 `Pod` 并利用额外的`集群`容量，伸缩\
  \ `Pod` 副本使应用程序能够支持更大的工作负载。此外，在`集群`中跨多个`节点`运行 `Pod` 的多个副本，可以在 `Pod` 或`节点`发生故障时提供高可用性。\n\
  \n`Pod` 是短暂的。如果一个 `Pod` 被删除，其所在`节点`上的容器会被停止然后删除。它连同其可写层会被永久销毁。`Pod` 永远不会被重新部署。相反，`Kubernetes`\
  \ 会根据当前的 `Pod` `API` 对象定义创建一个新的 `Pod`。这两个 `Pod` 部署之间不维护任何状态。对于像 Web 应用程序这样的无状态工作负载，这没问题。当新的\
  \ `Pod` 被创建并准备好时，它们就可以开始接收工作负载。但是对于像关系型数据库系统这样的有状态工作负载，`Pod` 需要能够独立于其生命周期，持久化存储在其数据库中的数据状态。`Kubernetes`\
  \ 为我们提供了用于持久化存储的 `API` 对象和结构，这将在本章后面描述。\n\n#### `控制器`\n\n`控制器`定义、监控工作负载，并使工作负载和`集群`的运行状态保持在期望状态。本节重点介绍用于创建和管理\
  \ `Pod` 的`控制器`。在 `Kubernetes` 中，很少通过手动定义和部署 `Pod` 对象来创建 `Pod`。两种常见的工作负载 `API` 对象用于在\
  \ `Kubernetes` 中部署应用程序。它们是 `Deployment` 和 `StatefulSet`。\n\n`Deployment` 是一个 `API`\
  \ 对象，它使你能够在 `Pod` 的配置中定义应用程序的期望状态，并包括要创建的 `Pod` 数量（称为副本）。`Deployment` 控制器会创建一个 `ReplicaSet`。`ReplicaSet`\
  \ 负责在`集群`中启动 `Pod`，它使用来自 `Deployment` 对象的 `Pod` 规范。图 1-1 的第一帧显示了一个 `Deployment`，它创建了一个\
  \ `ReplicaSet`，而该 `ReplicaSet` 在`集群`中启动了三个 `Pod`。\n\n![](img/505695_2_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1\n\n`ReplicaSet` 操作\n\n`控制器`负责使`集群`的运行状态保持在期望状态，那么让我们看看这是如何运作的。在图 1-1 的第二帧中，假设其中一个\
  \ `Pod` 因任何原因发生故障。也许是应用程序崩溃了，或者甚至是运行该 `Pod` 的`节点`变得不可用。在第三帧中，`ReplicaSet` 控制器感知到运行状态已偏离期望状态，并启动创建一个新的\
  \ `Pod`，确保 `ReplicaSet`（或应用程序）始终保持在有三个 `Pod` 在运行的期望状态。\n\n你可能会问，为什么 `Deployment`\
  \ 控制器要创建一个 `ReplicaSet`，而不是让 `Deployment` 直接创建 `Pod` 呢？`Deployment` 控制器既定义了要创建的\
  \ `Pod` 数量，也定义了 `Pod` 的配置。当 `Deployment` 配置更新时，旧 `ReplicaSet` 中的 `Pod` 会被关闭，同时在新\
  \ `ReplicaSet` 中创建 `Pod`。这使得新的容器镜像或 `Pod` 配置能够滚动更新。单个 `Deployment` 对象仍然存在，并且它管理着声明式更新以及\
  \ `ReplicaSet` 之间的过渡。如果你想深入了解这个主题，可以查看 `Pluralsight` 的课程“管理 `Kubernetes` `控制器`和`部署`”。\n\
  \n`Deployment` 控制器不保证 `Pod` 的顺序或持久命名。一个 `Deployment` 由一组 `Pod` 组成，每个 `Pod` 都是应用程序的精确副本。然而，如果一个\
  \ `Pod` 被销毁并在其位置创建了一个新 `Pod`，则 `Pod` 的名称不是持久的。像数据库系统这样的应用程序通常将数据分布在多个计算元素上，然后必须跟踪数据在系统中的位置以供后续检索。对于需要知道命名计算资源集合中数据确切位置的有状态应用程序，使用\
  \ `Deployment` 控制器可能会有问题。\n\n为了允许 `Kubernetes` 支持这类有状态应用程序，`StatefulSet` 控制器创建的每个\
  \ `Pod` 都具有唯一、持久且有序的名称。因此，需要跨多个 `Pod` 控制数据放置的应用程序可以做到这一点，因为 `Pod` 名称是有序的，并且独立于该\
  \ `Pod` 的生命周期而持久存在。此外，`StatefulSet` 为应用程序提供稳定的存储，确保如果因任何原因必须重新创建同名 `Pod`，正确的存储对象仍能映射到它。\n\
  \n\n\n#### StatefulSet 概述\n图 1-2 展示了一个运行中的 StatefulSet 示例。此示例 StatefulSet 被定义为拥有三个副本，并创建了三个\
  \ Pod。它创建的每个 Pod 都有一个唯一的有序名称：`sql-0`、`sql-1` 和 `sql-2`。StatefulSet 中创建的第一个 Pod 始终以索引\
  \ 0 开头。在此示例中，即为 `sql-0`。对于添加到 StatefulSet 的每个 Pod，索引会递增一。因此，下一个 Pod 是 `sql-1`，接着是\
  \ `sql-2`。如果 StatefulSet 扩容以添加一个 Pod，则下一个 Pod 被命名为 `sql-3`。如果 StatefulSet 缩容，则首先移除编号最大的\
  \ Pod。在此示例中，`sql-3` 会被移除。这些有序的创建和扩缩容操作对于有状态应用至关重要，这些应用将数据放置在命名的计算资源上，从而使有状态应用能够随时知晓数据的位置。\n\
  \n![](img/505695_2_En_1_Fig2_HTML.jpg)\n图 1-2\n\n一个 StatefulSet 示例 – 每个 Pod 都具有唯一、有序且持久的名称。每个\
  \ Pod 还有关联的持久存储。\n\n在 Azure Arc-enabled Data Services 中，你会发现 SQL Server 托管实例和 PostgreSQL\
  \ HyperScale 都使用 `StatefulSet` API 对象来提供一致且有序的 Pod 命名及关联的持久存储。\n\nKubernetes 中还有更多可用的控制器。本书重点介绍\
  \ `Deployments`、`ReplicaSets` 和 `StatefulSets`，以及如何使用它们来部署 Azure Arc-enabled Data\
  \ Services。Kubernetes 中有许多控制器可以帮助构建不同类型的应用工作负载。有关不同控制器类型及其功能的更多信息，请查看 Kubernetes\
  \ 文档：[`kubernetes.io/docs/concepts/workloads/`](https://kubernetes.io/docs/concepts/workloads/)。\n\
  \n#### Services\n正如我们之前介绍的，没有任何 Pod 会被重新创建。每次创建 Pod 时，无论是在初始创建期间还是替换现有 Pod 时，该新\
  \ Pod 在启动时都会被分配一个新的 IP。由于控制器根据配置创建和删除 Pod，或响应故障并影响期望状态，这就给我们带来了一个挑战：应该使用哪个 IP 地址来访问集群中运行的\
  \ Pod 所提供的应用服务？因为 Pod 在启动时被分配了 IP 地址。\n\nKubernetes 为访问集群中部署的基于 Pod 的应用提供了一种网络抽象，称为\
  \ `Service`。`Service` 是一个持久的 IP 地址，可选择性地包含一个 DNS 名称，用于访问集群中 Pod 上运行的应用。一般来说，集群中部署的每个应用都会有一个\
  \ `Service`。在 `Service` 的 IP 地址上接收的应用流量会被负载均衡到下层的 Pod IP 地址。当控制器（例如 `ReplicaSet`\
  \ 控制器）创建和销毁 Pod 时，网络信息会自动更新以反映应用程序的当前状态。让我们来看一个示例。\n\n在图 1-3 中，假设一个 `Deployment`\
  \ 创建了一个 `ReplicaSet`，而该 `ReplicaSet` 创建了三个 Pod。这些 Pod 中的每一个在网络中都有一个唯一的 IP 地址。为了让用户或应用程序访问这些\
  \ Pod 中的应用，需要定义一个 `Service`。`Service` 通过一个持久的 IP 地址和端口（对于 HTTP 是端口 80）来暴露一组 Pod\
  \ 中运行的应用程序。用户或其他应用程序可以通过连接到 `Service` 的 IP 地址或 DNS 名称来访问该 `Service` 提供的应用。然后，`Service`\
  \ 会在属于该 `Service` 的 Pod 之间对该流量进行负载均衡。\n\n![](img/505695_2_En_1_Fig3_HTML.jpg)\n\
  图 1-3\n\nReplicaSet 和 Services\n\n在图 1-3 的第二帧中，假设 `ReplicaSet` 中的一个 Pod 发生故障。`ReplicaSet`\
  \ 控制器感知到这一点，并部署一个新的 Pod，在 `Service` 中注册该新 Pod 的 IP 地址，并开始将流量负载均衡到新 Pod。发生故障的 Pod\
  \ 被删除，其 IP 地址从 `Service` 中移除，流量不再发送到该 IP。这一切都是自动发生的，无需任何用户交互。\n\n此外，当通过添加更多 Pod\
  \ 扩容应用程序或通过移除某些 Pod 缩容应用程序时，Pod IP 会相应地添加到 `Service` 或从 `Service` 中移除。这确实是一项了不起的技术，我们在实际操作中看到这一点时都非常兴奋。\n\
  \nKubernetes 中有三种类型的 `Service`，Azure Arc-enabled Data Services 都可以使用它们来访问 Kubernetes\
  \ 中运行的应用程序。服务类型分别是 `ClusterIP`、`NodePort` 和 `LoadBalancer`。让我们更详细地了解每一种：\n\n*  \
  \ **`ClusterIP`**：`ClusterIP` `Service` *仅*在集群内部可用。当应用不需要暴露在集群外部时，会使用这种类型的 `Service`。\n\
  \n*   **`NodePort`**：`NodePort` `Service` 在集群中每个节点的真实 IP 地址上的固定端口暴露你的应用。通过集群节点的真实网络\
  \ IP 地址结合服务端口来访问 `NodePort` `Service`。接收到的流量会被路由到支持该 `Service` 的相应 Pod。当基于集群的应用需要从集群外部访问或与外部负载均衡器集成时，会使用\
  \ `NodePort` `Service`。\n\n*   **`LoadBalancer`**：此服务类型集成了云提供商的负载均衡器服务，或在本地部署的集群外部负载均衡器（例如\
  \ F5）。在基于云的场景中，当基于集群的应用需要从集群外部访问时，会使用 `LoadBalancer` 类型的 `Service`。\n\n#### Storage\n\
  作为数据专业人员，我们的首要工作是保存数据。而 Kubernetes 具有 API 对象，可以支持有状态应用程序（如关系数据库系统）的部署。有两个主要的 API\
  \ 对象可用于协助此过程：`持久卷` 和 `持久卷声明`。\n\n`持久卷` 是集群管理员定义的、可供 Pod 消耗的集群中可用的存储设备。有多种不同类型的存储可作为\
  \ `持久卷` 使用，例如来自云提供商的虚拟磁盘、iSCSI、NFS 等等。实现细节包含在 `持久卷` 对象中。具体的实现细节取决于你想要访问的存储类型。例如，如果你想配置访问\
  \ NFS 共享，你将在 `持久卷` 对象中指定 NFS 共享的 IP 地址和导出名称。\n\nPod 不直接访问 `持久卷` 对象。Pod 在 Pod 对象定义中使用一个\
  \ `持久卷声明` 来请求 `持久卷` 的访问权限和容量。`持久卷声明` 将向集群请求存储，然后在 `持久卷` 上进行声明，并将 `持久卷` 挂载到 Pod 文件系统中。这个额外的抽象层将\
  \ Pod 与 `持久卷` 的存储实现细节解耦。这样做的主要好处是，存储实现细节（例如特定于基础架构的存储参数）不会成为 Pod 定义的一部分。\n\n\n\n\
  ## 存储供应\n\n在集群中供应存储有两种不同的技术：`静态供应`和`动态供应`。\n\n在静态供应中，集群管理员会在集群中定义一组持久卷对象。每个对象都将是一个唯一的存储对象，定义了存储设备的物理实现细节，例如存储设备在网络上的位置以及所需的确切存储卷。然后，持久卷可以映射到持久卷声明，再分配给\
  \ Pod 使用。这里的关键概念是集群管理员定义每个持久卷对象及其具体实现。这在大型部署中可能很繁琐。有一种更好的方法。\n\n在我们深入了解动态供应之前，让我们先介绍`存储类`的概念。`存储类`使集群管理员能够根据存储的属性定义存储组。一些常见的分组包括存储子系统的性能概况，例如，高速存储与较慢、可能成本较低的存储，甚至是来自几种不同类型的存储子系统。集群管理员可以将存储类型分组为`存储类`，然后\
  \ Pod 所需的持久卷将从一个`存储类`中动态供应。\n\n在动态供应中，你的集群中安装了一个名为存储供应器的软件。该供应器与你的存储基础设施协同工作，以响应集群中创建的持久卷声明，动态地创建持久卷对象。在持久卷声明中，你指定希望从哪个`存储类`动态供应持久卷，以及存储供应器所需的任何配置参数。\n\
  \n动态供应的关键理念是，持久卷是根据需求动态创建的，以响应持久卷声明的创建，而不是像静态供应那样由管理员预先创建。\n\n从设计角度来看，你可以在集群中创建多个`存储类`，每个类都可以从集群可用的不同类型和层级的存储中分配持久卷。在本书后面，你将看到\
  \ Azure Arc-enabled Data Services 允许你根据数据类型从`存储类`中供应存储。你将看到为数据库、事务日志、备份以及应用程序日志指定不同`存储类`的选项。\n\
  \n## Kubernetes 集群组件\n\n本章第一部分介绍了 Kubernetes 的概念以及用于在 Kubernetes 集群中构建和部署工作负载的核心\
  \ API 对象。现在，是时候深入了解 Kubernetes 集群是什么了，仔细审视其每个主要组件。\n\n### 探索 Kubernetes 集群架构\n\n\
  Kubernetes 集群是一组称为`节点`的服务器（物理或虚拟），为在 Pod 中运行基于容器的应用程序提供了一个平台。集群中有两种类型的节点。`控制平面节点`是集群本身的控制器，是操作的大脑。`工作节点`是用于运行\
  \ Pod 的计算设备。让我们更仔细地看看每一种，首先是控制平面节点。图 1-4 为我们提供了集群组件的概览。\n\n![](img/505695_2_En_1_Fig4_HTML.jpg)\n\
  \n图 1-4\nKubernetes 集群组件\n\n#### 控制平面节点\n\n`控制平面节点`运行控制平面服务。控制平面服务实现了 Kubernetes\
  \ 集群的核心功能，例如管理集群本身、其资源以及控制工作负载。控制平面由四个组件组成，每个组件在集群中都有特定的职责。它们是`API 服务器`、`etcd`、`调度器`和`控制器管理器`。控制平面服务及其组件最常部署为\
  \ Pod，可以在单个控制平面节点上运行，也可以在多个控制平面节点上运行以实现高可用性。有关构建高可用集群及其配置的更多信息，请参阅 [*https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/high-availability/*](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/high-availability/)\
  \ 和 [*https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/*](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/)。\n\
  \n让我们更详细地看看每个控制平面服务及其在集群中的功能和职责：\n\n*   **API 服务器**：`API 服务器`是集群中的主要通信枢纽。所有集群组件都通过`API\
  \ 服务器`进行通信以交换信息和状态。它是一个简单、无状态的 REST API，实现了 Kubernetes API 并暴露给用户和其他集群组件访问。当 API\
  \ 对象被创建、修改或删除时，这些对象的状态会被提交到集群。可以跨多个控制平面节点部署多个`API 服务器`副本，并且可以对 API 流量进行负载均衡以实现高可用性。\n\
  \n*   **etcd**：`etcd`是一个键值数据存储，用于持久化集群的状态。`API 服务器`本身是无状态的，但会将对象数据序列化并存储在`etcd`中。由于它确实持久化数据，因此需要保护这些数据以用于恢复和高可用性。应经常对`etcd`进行备份，如果需要高可用性，则应配置多个副本以实现高可用性部署。\n\
  \n*   **控制器管理器**：`控制器管理器`实现并确保集群及其工作负载的期望状态。它使用控制循环持续监控运行状况，将其与期望状态进行比较，并进行必要的更改以使集群恢复到期望状态。为此，`控制器管理器`会观察并更新`API\
  \ 服务器`。在本章前面，我们介绍了控制器的概念，以及它们如何让你告诉 Kubernetes API 期望的状态是什么。`控制器管理器`实现该状态。当涉及到 Pod\
  \ 和应用程序工作负载时，如果某个部署定义了需要三个应用程序的 Pod 副本在线，那么`控制器管理器`就有责任确保这些 Pod 始终在线并准备就绪，通过在必要时创建新的\
  \ Pod 来协调定义的状态与集群的运行状态。\n\n*   **调度器**：`调度器`决定在集群中的哪个节点上启动 Pod。它监视`API 服务器`，寻找任何未调度的\
  \ Pod。如果`调度器`发现任何未调度的 Pod，它会确定在集群中运行这些 Pod 的最佳位置。调度决策基于集群中可用的资源、为每个 Pod 定义的要求以及可能的任何管理策略约束。我们将在本章后面更详细地探讨调度过程。\n\
  \n\n\n#### 工作节点\n\n工作节点运行用户的应用程序负载。一个集群由一个控制平面节点和一组工作节点组成。每个工作节点都为集群中的整体可用资源贡献一定量的\
  \ CPU 和内存资源。你需要有足够的 CPU 和内存资源来在集群中运行你的应用程序工作负载，并确保为应用程序以及节点故障甚至增长事件留有足够的容量。\n\n\
  **注意**\n\n控制平面节点的一个主要关注点是确保可用性。有关高可用控制平面拓扑的更多信息，请查看此链接：[`kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/`](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/)。\n\
  \n集群中的所有节点，无论是控制平面还是工作节点，都包含三个组件：`kubelet`（与 API Server 通信以进行集群操作）、`kube-proxy`（将该节点上运行的容器暴露给本地网络）以及容器运行时（在节点上启动和运行容器）。\n\
  \n*   **kubelet**：`kubelet`是运行在节点上的一个服务，负责与 API Server 通信、在节点上启动 Pod 并确保节点上的 Pod\
  \ 处于健康状态。`kubelet`监控 API Server 的 Pod 工作负载状态，告诉容器运行时启动和停止容器。它还向 API Server 报告节点上运行的\
  \ Pod 的当前状态，并以存活探针和就绪探针的形式对 Pod 执行健康检查。`kubelet`向 API Server 报告节点的当前状态和该节点上可用的资源。\n\
  \n*   **kube-proxy**：`kube-proxy`是在集群所有节点上运行的一个容器，充当网络代理，负责将来自节点所在网络的流量路由到该节点上运行的\
  \ Pod。\n\n*   **容器运行时**：容器运行时负责拉取容器镜像并在节点上运行容器。目前，`containerd`是 Kubernetes 集群中最常用的容器运行时。但\
  \ Kubernetes 容器运行时领域已转向使用容器运行时接口标准；这使得不同的容器运行时可以作为 Kubernetes 节点上的容器运行时使用。本书中使用的容器运行时是`containerd`。有关\
  \ Kubernetes 支持的容器运行时的更多信息，请参阅[`kubernetes.io/docs/setup/production-environment/container-runtimes/`](https://kubernetes.io/docs/setup/production-environment/container-runtimes/)。\n\
  \n### 理解调度与资源分配\n\n成功在 Kubernetes 中部署工作负载的关键在于理解 Pod 如何被调度到集群中的节点，以及资源如何分配给集群节点上运行的\
  \ Pod。在本节中，我们将更深入地探讨这两个主题；让我们从*调度*开始。\n\n#### Kubernetes 中的调度\n\n在 Kubernetes 中，调度是为运行\
  \ Pod 选择集群中一个节点的过程。`Scheduler`是在 Kubernetes 集群的控制平面节点上运行的一个进程。当创建一个 Pod 时，`Scheduler`会将这个创建的\
  \ Pod 分配到集群中的特定节点上启动。在寻找运行 Pod 的节点时，`Scheduler`会考虑可用资源、Pod 上定义的资源需求以及任何已定义的管理策略。如果`Scheduler`找不到合适的节点来启动\
  \ Pod，Pod 的状态会变为`Pending`，并且 Pod 无法启动。\n\n就资源而言，`Scheduler`会尝试在集群中找到运行待调度 Pod 的最佳节点。它会寻找集群中是否有足够的资源来运行该\
  \ Pod。进一步说，如果一个节点已经在其工作负载中运行了其他一些 Pod，那么该节点可能没有足够的资源来运行新的 Pod。此外，如果集群中没有剩余任何具有可用容量的节点，那么需要启动的\
  \ Pod 将无法调度到任何节点上，因为没有具有足够可用资源的节点可用。在这种情况下，Pod 的状态变为`Pending`，并且 Pod 不会启动。\n\n另一个可能影响调度的因素是管理策略。Kubernetes\
  \ 为集群管理员和应用程序开发人员提供了多种工具来影响 Pod 到集群节点的调度。如果`Scheduler`无法根据定义的管理策略找到合适的节点来启动 Pod，Pod\
  \ 的状态会变为`Pending`，并且 Pod 不会启动。让我们仔细看看集群管理员和开发人员可以用来影响 Pod 调度的几种工具；首先是*请求*。\n\n*\
  \   **请求**：`请求`是资源保证。使用`请求`，在定义工作负载时，你指定 Pod 运行所需的确切 CPU 或内存量，并且必须满足该 CPU 或内存量才能将\
  \ Pod 部署到集群中的某个节点。`Scheduler`使用此信息来找到运行 Pod 的合适节点。如果不可用，Pod 将不会被调度，因此也不会启动。我们将在下一节资源管理的背景下进一步讨论`请求`。\n\
  \n*   **节点选择器**：在 Kubernetes 中定义工作负载时，`节点选择器`用于帮助`Scheduler`在选择运行 Pod 的节点时更好地理解你的物理环境。例如，如果集群中的一部分节点可以访问专门的硬件资源，例如高速\
  \ SSD 或 GPU，你可以使用`节点选择器`来帮助`Scheduler`理解此配置，然后它可以仅将 Pod 调度到这些节点上。要使用`节点选择器`，你首先为这些节点分配`标签`以标识它们可以访问该硬件。然后在定义\
  \ Pod 时，你定义一个`节点选择器`来查找具有已分配`标签`的节点。当`Scheduler`尝试调度此工作负载时，它会将`节点选择器`与具有所需`标签`的节点匹配，并将新创建的\
  \ Pod 调度到满足已定义`节点选择器`的节点。在我们这里的场景中，Pod 被调度到具有专门硬件的节点上，运行的应用程序随后可以使用该硬件。`节点选择器`也可用于物理位置定位，这对于确保\
  \ Pod 可以跨云或数据中心中的故障域进行调度很有价值。有关`节点选择器`的更多信息，请参阅[`kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/`](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/)。\n\
  \n\n\n## Pod 调度技术\n\n*   `亲和性与反亲和性`：影响`Pod`被调度到哪些`节点`的另一种方式是`亲和性`和`反亲和性`。在定义工作负载时，这种技术能让你更精细地控制`Pod`的调度方式。最基本地，`亲和性`告诉`调度器`，某些`Pod`应被调度到共享某种资源（例如一个`节点`，或者云或数据中心内的一个故障域）的地方。`亲和性`常用于确保需要高性能通信的`Pod`应用被共同安置。`反亲和性`则相反，它确保`Pod`**不**被共同安置在同一资源（如一个`节点`或故障域）上。`反亲和性`常出于性能或可用性原因，用于确保`Pod`运行在不同的资源上。更多关于`亲和性`和`反亲和性`的信息，请参见\
  \ `https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity`。\n\
  \n*   `污点与容忍`：这是另一种帮助`调度器`决定将`Pod`调度到哪些`节点`的技术。`亲和性`与`反亲和性`以及`节点`选择器用于将`Pod`**吸引**到某个`节点`。`污点`和`容忍`则用于将`Pod`从`节点`**排斥**开。当对一个`节点`施加`污点`时，就没有`Pod`能被调度到该`节点`。一个`Pod`可以定义对某个`污点`的`容忍`。当`Pod`的`容忍`与某个`节点`的`污点`匹配时，它就可以被调度到定义了该`污点`的`节点`上。前面介绍的影响调度的技术，都要求部署`Pod`的用户在他们的`Deployment`中定义相应的结构来影响`调度器`。`污点`与`容忍`在集群管理员需要影响调度，但不依赖部署工作负载的用户的场景下非常有用。更多信息和额外的示例场景，请查阅\
  \ `https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/`。\n\
  \n要更深入地了解`Kubernetes`中的存储和调度，请查看 Pluralsight 课程“Configuring and Managing `Kubernetes`\
  \ Storage and Scheduling”，我们在其中详细介绍了所有这些场景，并提供了实际案例，网址是 `www.pluralsight.com`。\n\
  \n### 资源消耗\n\n默认情况下，`Pod`将能够使用其被调度到的`节点`上所有可用的资源。例如，如果你有一个具备 4 个核心和 32GB 内存的`节点`，并且一个`SQL\
  \ Server` `Pod`在该`节点`上启动，那么运行在该`Pod`内的`SQL Server`进程将能访问全部 4 个核心和全部 32GB 内存。由于`SQL\
  \ Server`分配和消耗内存的方式，单个`SQL Server` `Pod`有可能消耗掉`节点`上所有可用的内存，尤其是在未设置`最大服务器内存`的情况下。`SQL\
  \ Server`也能在所有 4 个核心上调度工作负载。当在同一个`节点`上运行多个`Pod`时，这可能导致资源争用。`Kubernetes`提供了一些配置参数来帮助管理`Pod`中的资源消耗。在`Kubernetes`中定义工作负载时，`Pod`规范中有两个配置属性可以帮助你控制部署在`Kubernetes`中的`Pod`的资源分配：`限制`和`请求`。让我们更详细地看看每一个：\n\
  \n*   `限制`：对于单个`Pod`，`限制`是内存或 CPU 的上限。`限制`用于确保`Pod`消耗的资源不会超过其工作负载所需的适当范围。当为`Pod`设置了`限制`时，它只能看到指定数量的内存或\
  \ CPU。如果你创建一个内存限制为 16GB 的`SQL Server` `Pod`，该`SQL Server` `Pod`将只看到 16GB 内存。如果你定义\
  \ CPU 限制为 2，`SQL Server`进程将只看到 2 个 CPU。`限制`对于容量规划至关重要。它们确保你恰当地分配集群的资源，并防止`Pod`消耗掉`节点`上的所有资源。在我们的例子中，如果`节点`只有\
  \ 32GB 内存，对`Pod`设置内存和 CPU`限制`将确保该`Pod`不会消耗掉该`节点`上所有可用的内存和 CPU。\n\n*   `请求`：在上一节中，我们在调度的上下文中介绍了`请求`。现在让我们在资源管理的上下文中更仔细地看看它们。`请求`是资源保证。通过`请求`，我们可以定义一个`Pod`正常运行所需的确切\
  \ CPU 或内存量，并且该数量的 CPU 或内存必须在集群的某个`节点`上可用，该`Pod`才能启动。`调度器`利用这些信息来找到合适的`节点`来运行`Pod`。如果资源不可用，`Pod`将既不会被调度，也不会被启动。`请求`用于确保`Pod`拥有运行其工作负载所需的适当资源量，绝不会更少。\n\
  \n使用`限制`和`请求`使你能够确保运行的工作负载以适当的资源共享集群资源，并确保你的工作负载能获得所需的资源。当使用`启用 Azure Arc 的数据服务`定义工作负载时，`SQL\
  \ 托管实例`和`PostgreSQL 超大规模`部署都允许你对创建的`Pod`设置`限制`和`请求`。建议你在定义工作负载时`始终`同时设置`限制`和`请求`，以帮助确保集群中的工作负载性能良好且负载均衡。\n\
  \n提示\n\n要更详细地了解`SQL Server`和`Kubernetes`内存管理的工作原理，请访问 `www.centinosystems.com/blog/sql/memory-settings-for-running-sql-server-in-kubernetes/`。\n\
  \n### 网络基础\n\n我们`Kubernetes`入门章节最后一个主要主题是网络。`Kubernetes`网络模型使得工作负载能够在`Kubernetes`中部署，同时抽象了网络的复杂性。这通过移除基础设施相关的代码，简化了集群中的应用配置和服务发现，并提高了部署代码的可移植性。本节介绍`Kubernetes`网络模型和示例集群通信模式。\n\
  \n`Kubernetes`的网络遵循三条规则。这些规则实现了前述的简洁性。这些规则源自 `https://kubernetes.io/docs/concepts/cluster-administration/networking/`。\n\
  \n\n\n## Kubernetes 网络模型规则\n\n1.  所有`Pod`可以在所有`Node`上相互通信，无需网络地址转换（NAT）。\n2.  `Node`上的所有代理（例如系统守护进程和`kubelet`）可以与该`Node`上的所有`Pod`通信。\n\
  3.  处于`Node`主机网络中的`Pod`可以与所有`Node`上的所有`Pod`通信，无需 NAT。\n\n前面的规则通过确保`Pod`使用其实际的`Pod\
  \ IP`和容器端口相互通信（而非将其转换为依赖于部署网络基础设施的`IP`方案），简化了网络配置和应用程序配置。\n\n在 Kubernetes 中，`Pod\
  \ Network`是当容器运行时在`Node`上启动`Pod`时，`Pod`所连接到的网络。部署的每个`Pod`在`Pod Network`上都会获得一个唯一的`IP`地址。`Pod\
  \ Network`必须遵循前面定义的规则，这导致`Pod`使用其真实的`IP`地址。在实现`Pod Network`时，有许多解决方案可以确保遵守 Kubernetes\
  \ 网络模型规则。一个常见的解决方案是覆盖网络（overlay networking），它使用隧道协议在`Node`之间交换数据包，独立于底层物理基础设施的网络。这使得覆盖网络可以使用独立于数据中心物理基础设施的第\
  \ 3 层`IP`方案，从而更简单地遵守 Kubernetes 网络模型。\n\n另一个选项是作为裸机方法的一部分，在数据中心基础设施中构建`Pod Network`。这将需要\
  \ Kubernetes 集群管理员和负责网络的网络工程团队之间的协调。\n\n以下是在 Kubernetes 集群中使用的常见通信模式，展示了`Pod`如何相互访问以及如何访问`Pod`提供的`Service`。第\
  \ 4 章在集群安装过程中介绍了`Pod Network`，第 6 章将深入探讨`Service`以及流量如何路由到`Pod Network`中的`Pod`。\n\
  \n## 通信模式\n\n图 1-5 展示了一些 Kubernetes 集群中的示例通信模式。让我们一起逐步了解它们：\n\n![](img/505695_2_En_1_Fig5_HTML.jpg)\n\
  \n图 1-5\n\nKubernetes 网络\n\n1.  **在`Pod`内部。**\n    `Pod`内的多个容器共享相同的容器`Namespace`。这些容器可以通过`localhost`上的唯一端口进行相互通信。\n\
  \n2.  **同一`Node`内的`Pod`到`Pod`。**\n    当同一`Node`上的`Pod`需要通过网络通信时，它们通过`Node`上定义的本地软件桥（software\
  \ bridge）并使用`Pod IP`进行通信。\n\n3.  **不同`Node`上的`Pod`到`Pod`。**\n    当不同`Node`上的`Pod`需要通过网络通信时，它们通过本地第\
  \ 2 层或第 3 层网络并使用`Pod IP`进行通信。\n\n4.  **`Service`。**\n    当访问集群中的`Service`时，流量首先路由到实现该`Service`的`kube-proxy`，然后再路由到提供该应用程序服务的`Pod`。正如本章前面介绍的，`Service`将是您与集群中部署的应用程序进行交互的最常见方式。\n\
  \n## Kubernetes 在 Azure Arc 启用的数据服务中的作用\n\n在过去的几年里，SQL Server 工程团队发布了一些令人兴奋的技术和创新——Linux\
  \ 上的 SQL Server、容器中的 SQL Server、Kubernetes 上的 SQL Server 以及 Azure Data Studio——我们不禁要问，为什么？所有这些看似不同的技术背后的大图景是什么？我们第一次看到\
  \ SQL Server 产品团队演示 Azure Arc-enabled Data Services 时，就是那个“顿悟”时刻。关键不在于这些单项技术有多酷，而在于将这些技术结合在一起所能实现的能力。在任何拥有\
  \ Kubernetes 的地方运行任何数据服务。\n\n在 Kubernetes 内部运行数据服务使得 Microsoft 能够以代码定义系统。然后，由于 Kubernetes\
  \ 提供的基础设施抽象，您可以在任何拥有 Kubernetes 的地方运行该代码。Kubernetes API 本质上是您数据中心或云中资源的包装器。编写用于部署系统的代码可以在任何实现了该\
  \ API 的地方运行，无论是在任何云中、边缘站点，还是本地数据中心。在本书的剩余部分，我们将向您展示 Azure Arc-enabled Data Services\
  \ 的价值主张，以及如何在任何拥有 Kubernetes 的地方部署和管理这些 Azure Arc-enabled Data Services。\n\n## 总结与关键要点\n\
  \n本章介绍了 Kubernetes 及其如何支持基于容器的现代应用程序的部署。您了解了 Kubernetes API 如何允许您构建和建模部署到 Kubernetes\
  \ 集群中的应用程序。您还学习了部署工作负载的核心 API 原语：作为基于容器应用程序的`Pod`；保持集群及其工作负载处于期望状态的`Controller`；用于访问应用程序的`Service`；以及用于有状态应用程序的存储。然后，您了解了集群的组件以及它们如何协同工作以确保实现您的期望状态，并快速浏览了调度、资源管理和\
  \ Kubernetes 网络模型。在掌握了所有这些理论之后，现在该进入下一章了，我们将在那里介绍 Azure Arc-enabled Data Services，讨论它解决的挑战，并深入探讨其架构、核心特性、工作负载的部署和管理方式以及关键的部署注意事项。\n\
  \n"
- '# 2. Azure Arc 启用的数据服务


  本章向您介绍 Azure Arc-enabled Data Services！首先，您将了解现代混合云面临的一些挑战，然后我们将向您展示 Azure Arc 如何应对这些挑战，以在本地或任何云中提供可大规模管理的解决方案。接下来，我们将介绍核心的
  Azure Arc 启用资源，包括服务器、Kubernetes、SQL Server 和数据服务。然后，我们将更深入地探讨什么是 Azure Arc-enabled
  Data Services、其架构、工作负载如何部署和管理，并讨论关键的部署注意事项，如计算和存储容量规划。


  ## 挑战


  *   混合云正在成为企业系统架构的新常态。根据《Flexera 2020 State of the Cloud》（参见 [*www.flexera.com/about-us/press-center/flexera-releases-2020-state-of-the-cloud-report.html*](http://www.flexera.com/about-us/press-center/flexera-releases-2020-state-of-the-cloud-report.html)）报告，近
  87%的企业拥有混合云战略。混合云有几种变体。首先，组织可以采用资产分布在多个公有云（如 Amazon Web Service (AWS)、Google Cloud
  和 Microsoft Azure）的混合云战略。这种模式通常被称为“多云”。第二种混合云战略是组织拥有一些云资产和一些本地资产。在这些场景中，组织通常会将最能从云中受益的基础设施部分放在云中。公司转向云的主要原因包括弹性、自动化、内置监控和安全以及按需付费的支付模型。


  在管理和运营混合云环境时，无论是多云还是本地与云混合，每个环境的管理、安全模型和工具可能各不相同。这就引出了一个问题：您如何大规模管理这些环境？当您拥有不同的管理、监控、安全和部署工具时，实现一致性和控制是具有挑战性的。Azure
  Arc 的目标是实现所有这些领域的一致性，统一管理、监控和安全服务以及部署工具，以便您可以在部署资源的任何地方（本地或任何云中）利用云的优势。




  ## Azure Arc 简介


  从核心上讲，Microsoft Azure Arc 无论您是在本地还是在任何云中部署了资源，都能提供 Azure 管理服务。它使您能够为组织的核心运营提供一致的管理服务和工具，无论技术架构部署在何处。让我们来看看
  Azure Arc 的核心功能：


  **本地和混合云的统一体验**：您可以使用熟悉的工具，如 `Azure 门户`、`azure-cli`、`PowerShell` 和 `REST API` 来管理和部署系统。


  **部署和运维**：借助一套统一的工具，无论您在何处部署（本地或任何云中），部署和运维都是一致的。统一的工具使您的组织能够在任何部署场景中使用相同的代码和工具。运维的一个关键要素是性能和可用性监控，而
  `Azure Monitor` 可帮助您为启用了 `Azure Arc` 的资源实现这一点。


  **整合的访问控制、安全性、策略管理和日志记录**：根据资源部署位置实施多个安全模型具有挑战性和风险，因为您可能需要管理多套安全规则及其实施。`Azure Arc`
  使您能够拥有一个整合的安全模型和实施，并使用 `Azure Log Analytics` 等工具进行集中式安全和应用程序日志记录。此外，您还可以使用 `Azure
  Policy` 等服务来管理治理和控制解决方案。


  **清单和组织**：借助一套可用的工具以及关键的 `Azure` 构造（如 `资源组`、`订阅` 和 `标记`），管理员、运维人员和技术经理可以完整地查看其技术资产，而无论系统部署在何处。因为作为服务的资源和资源会被注册为
  `Azure` 中的托管资源，无论它们部署在本地还是任何云中。


  既然我们已经向您介绍了 `Azure Arc` 的核心功能，是时候继续前进，更详细地了解您可以使用 `Azure Arc` 管理和部署的资源了。


  ### Azure Arc 支持的资源


  本书的重点是 `Azure Arc` 支持的数据服务。`Azure Arc` 支持的数据服务是一项更广泛战略的一部分，该战略提供了一个控制平面，用于管理部署在任何地方（本地或任何云中）的资源。`Azure
  Arc` 通过将 `Azure 资源管理器 (ARM)` 扩展到这些资源来实现这一目标。`ARM` 是在 `Azure` 公有云中使用的管理控制平面。`ARM`
  为部署在 `Azure` 云中的资源提供部署、组织和访问控制。`Azure Arc` 将 `ARM` 扩展到您部署资源的任何地方，无论是本地还是任何云中。在撰写本书时，有四种关键资源可以由
  `Azure Arc` 管理：`Azure Arc 支持的服务器`、`Azure Arc 支持的 Kubernetes`、`Azure Arc 支持的 SQL
  Server` 和 `Azure Arc 支持的数据服务`。图 2-1 介绍了 `Azure Arc` 的元素；让我们更详细地了解这些核心服务中的每一项。


  ![](img/505695_2_En_2_Fig1_HTML.jpg)


  图 2-1 `Azure Arc` 架构


  #### Azure Arc 支持的服务器


  `Azure Arc 支持的服务器` 为部署在 `Azure` 外部的物理机和虚拟机 (VM) 上的 `Windows` 和 `Linux` 操作系统提供管理功能。服务器使用本地安装的代理连接到
  `Azure`，并成为使用标准 `Azure` 工具和管理服务进行管理的资源。`Azure Arc 支持的服务器` 的核心管理功能包括清单管理、策略管理、部署自动化、配置管理、性能监控、安全和访问控制、集中式日志记录以及更新管理。有关
  `Azure Arc 支持的服务器` 的更多信息，请访问 `https://docs.microsoft.com/zh-cn/azure/azure-arc/servers/overview`。


  #### Azure Arc 支持的 Kubernetes


  `Kubernetes` 是部署企业级容器化应用程序的标准。`Azure Arc 支持的 Kubernetes` 使您可以管理云原生计算基金会 (`CNCF`)
  认证的 `Kubernetes` 集群，无论它们部署在何处，包括上游 `Kubernetes`、`RedHat OpenShift`、`AWS EKS`、`Google
  GKE` 等。`Azure Arc 支持的 Kubernetes` 的关键管理功能包括清单管理、策略管理、集中式日志记录、性能监控、应用程序部署和集群配置。


  `Azure Arc 支持的 Kubernetes` 支持的一个关键场景是基于 `GitOps` 的配置管理。`GitOps` 通过使用基于 `GitOps`
  的配置管理来实现应用程序部署和集群配置。配置构件被签入到 `Git` 存储库中，`Arc` 集群代理监控该 `Git` 存储库以查找配置变更。当配置被签入存储库时，集群代理将在本地的
  `Kubernetes` 集群中部署该变更。这实现了强大的配置管理，因为所有配置构件（包括集群配置和应用程序部署）都被签入存储库并进行源代码控制。可以围绕源代码控制系统构建测试、审查和审批工作流程。如果集群偏离了签入存储库的内容，签入的配置将被强制应用到集群，使其恢复到期望状态。


  请访问 `https://docs.microsoft.com/zh-cn/azure/azure-arc/kubernetes/overview` 了解更多信息和支持的
  `Kubernetes` 发行版。


  #### Azure Arc 支持的 SQL Server


  我们要介绍的下一项 `Azure Arc` 支持的服务是 `Azure Arc 支持的 SQL Server`。`Azure Arc 支持的 SQL Server`
  使您可以将 `Azure` 管理服务扩展到部署在任何地方（本地或任何云中）的 `SQL Server` 实例。在 `SQL Server` 实例上安装一个代理，然后该
  `SQL Server` 会在 `Azure` 中注册。随后，使用标准的 `Azure` 工具和管理服务来管理该 `SQL Server` 实例。核心管理功能包括清单管理、策略管理、集中式日志记录、安全性，以及通过
  `Azure 安全中心` 和 `Azure Sentinel` 等服务实现威胁防护。


  此外，在 `Azure Arc 支持的 SQL Server` 中，使用 `SQL 评估` 实施环境检查。`SQL 评估` 是一套行业标准的最佳实践集合，可用于评估和报告
  `SQL Server` 实例或一组 `SQL Server` 实例的整体环境运行状况。`Azure Arc 支持的 SQL Server` 与 `Azure
  Arc 支持的服务器` 相结合，可以为您提供丰富的 `SQL Server` 及底层操作系统的管理体验。有关 `Azure Arc 支持的 SQL Server`
  的更多信息，请访问 `https://docs.microsoft.com/zh-cn/sql/sql-server/azure-arc/overview`。


  我们想特别指出，`Azure Arc 支持的 SQL Server` 和 `Azure Arc 支持的数据服务` 是 `Azure Arc` 旗下的独特产品。`Azure
  Arc 支持的 SQL Server` 将 `Azure` 管理服务扩展到已安装的 `SQL Server` 实例的传统部署。`Azure Arc 支持的数据服务`
  使您能够在本地或任何云中部署基于 `Azure 平台即服务 (PaaS)` 的服务。




  #### Azure Arc 启用的数据服务


  最后但同样重要，并且很可能是您阅读本书的原因，便是 Azure Arc 启用的数据服务。Azure Arc 启用的数据服务为您提供了在本地或任何云中部署传统基于
  Azure 平台即服务（PaaS）的服务的能力。数据服务提供的价值在于其始终保持最新的部署模型，无论您需要在哪里部署，都能为您交付最新、安全且受支持的 Azure
  PaaS 数据服务版本。在本书撰写时可用的数据服务包括`Azure Arc-enabled SQL Managed Instance`和`Azure Arc-enabled
  PostgreSQL Hyperscale`。Azure Arc 启用的数据服务的其他功能包括弹性扩展、自助式供应、清单管理、部署自动化、更新管理、托管备份、安全性、性能监控和集中式日志记录。Azure
  Arc 启用的数据服务是本书的核心重点，我们将在本书的剩余部分深入探讨其核心功能。


  ### 工具


  到目前为止，我们一直关注 Azure Arc 如何管理资源，无论它们位于何处。现在，是时候关注您可以用来管理资源的工具了。首先，我们将介绍 Azure 工具，例如
  Azure 门户、`azure-cli`、PowerShell 和 Azure Data Studio。然而，Microsoft 的方法确保您在用于管理云和开发者体验的工具上有选择权。因此，您可以使用项目中可能已经在用的行业标准、开源工具。然后，我们将介绍如何使用应用程序原生工具来管理部署在
  Azure Arc 中的应用程序和服务。


  #### Azure 工具


  Azure Arc 试图解决的一个关键挑战是一致的工具集。Azure Arc 将 Azure 资源管理器扩展到您部署资源的任何地方，无论是本地还是任何云。由于
  ARM 可用，这使您能够使用在 Azure 公有云中习惯使用的标准 Azure 工具。让我们列举一下您将在 Azure Arc 和 Azure Arc 启用的数据服务中最常用的一些
  Azure 工具：


  *   **Azure 门户**：Azure 管理体验的核心是 Azure 门户。由 Azure 和 Azure Arc 注册和管理的资源将出现在 Azure
  门户中。Azure 门户将是管理 Arc 启用的资源的主要方式。您可以在各种 Azure 管理服务（如 Log Analytics、Monitor、Sentinel、Security
  Center 等）中查看在 Azure 门户中收集和公开的信息。更多信息，请访问[`https://portal.azure.com`](https://portal.azure.com)。


  *   **`azure-cli`**：`azure-cli`是用于部署和管理启用 Azure 资源管理器（ARM）的资源（包括 Azure Arc 启用的数据服务）的命令行界面。更多信息，请访问[`https://docs.microsoft.com/en-us/cli/azure/install-azure-cli`](https://docs.microsoft.com/en-us/cli/azure/install-azure-cli)。


  *   **Azure PowerShell**：Azure PowerShell 模块（Az 模块）是用于管理启用 Azure 资源管理器（ARM）的资源的
  PowerShell 模块。更多信息，请访问[`https://docs.microsoft.com/en-us/powershell/azure/new-azureps-module-az`](https://docs.microsoft.com/en-us/powershell/azure/new-azureps-module-az)。


  *   **Azure Data Studio (ADS)**：这是一个跨平台工具，为一系列 Azure 数据服务提供现代化体验。在 ADS 中，您可以找到用于
  Azure Arc 启用的数据服务和 SQL Server 大数据群集的部署和管理体验。此外，您还会找到一个带有内置 Git 源代码控制集成的 SQL Server
  代码编辑器。更多信息，请访问[`https://docs.microsoft.com/en-us/sql/azure-data-studio/`](https://docs.microsoft.com/en-us/sql/azure-data-studio/)。


  #### 原生工具


  Azure Arc 的一个主要目标是统一管理和工具，使您的组织能够获得更好的云体验。需要注意的是，您仍然可以使用当前的开发者体验以及今天用于管理云的工具。因此，如果您已有现有的部署管道，这也没问题；您仍然可以在
  Azure Arc 启用的数据服务中使用它们。将如何管理工作负载的选择权留给您。我们想花点时间列举一些您可能已经用于管理环境的工具。这些工具（以及其他一些）构成了现代部署管道的基础：


  *   **`kubectl/oc`**：这些是用于控制 Kubernetes 和 RedHat OpenShift 集群的主要命令行工具。


  *   **`helm`**：这是一个使用称为`helm`图表的预配置模板来定义如何在 Kubernetes 中部署复杂应用程序的工具。


  *   **Git/GitHub**：Git 已成为管理源代码的标准方式。Azure Arc 设计的关键是使您能够将现有工具用于部署管道，这意味着您仍然能够使用现有的代码管理和部署体验。


  *   **GitOps**：如前面介绍的，GitOps 使您能够将集群和应用程序部署状态作为配置工件存储在 Git 存储库中。Kubernetes 集群监控存储库的更改，并在集群中应用这些更改以维护系统的期望状态。


  *   在 Azure Arc 启用的数据服务中可用的数据服务是 SQL Managed Instance 和 PostgreSQL Hyperscale。使用
  Azure 原生工具部署时，您将使用适当的门户体验或命令行语法来创建和管理数据服务部署。这些体验将在本书的剩余部分详细介绍。


  *   对于使用 Kubernetes 原生工具部署和管理工作负载的数据服务，SQL Server 工程团队采用云原生方法，并为每个 Azure Arc 启用的数据服务、数据控制器本身以及诸如数据库恢复操作等管理任务创建了自定义资源定义。自定义资源定义是
  Kubernetes 的一个结构，允许开发人员扩展 Kubernetes API 并创建自定义 API 对象。自定义资源定义可以具有额外的配置、数据，甚至控制集群中对象的行为。因此，当使用
  Kubernetes 原生工具定义工作负载时，会使用这些自定义资源定义 API 对象。既然我们已经介绍了用于部署的工具，让我们继续更仔细地看看可以部署的 Azure
  Arc 启用的数据服务。


  ## 介绍 Azure Arc 启用的数据服务


  在本节中，我们将首先介绍 Azure Arc 启用的数据服务架构。接下来，我们将介绍可用的基于 PaaS 的数据服务，特别是 SQL Managed Instance
  和 PostgreSQL Hyperscale。然后，作为本节的结尾，我们将介绍在设计专注于计算和存储资源的解决方案时的部署技术和部署注意事项。




  ### Azure Arc 启用的数据服务架构


  Azure Arc 启用的数据服务架构是一个分层架构，由硬件、Kubernetes、管理/控制平面和数据服务组成。图 2-2 突出了该架构。


  ![](img/505695_2_En_2_Fig2_HTML.jpg)

  *图 2-2*


  Azure Arc 启用的数据服务架构是一个分层架构，由硬件、Kubernetes、管理平面和部署的数据服务组成。


  基础层是硬件，它可以在本地或任何云中，并构建在物理机或虚拟机上。接着，在该硬件上部署 Kubernetes。正如我们在前一章中学到的，Kubernetes 使您能够快速、一致地将代码应用程序部署到集群中。然后，在
  Kubernetes 集群内部署的是 Arc 管理控制平面。Arc 管理控制平面是 Azure Arc 的大脑，并将 Azure 资源管理器 (ARM) 扩展到您的本地或混合云部署中。而在这一切之上的是
  Azure Arc 启用的数据服务。这些是传统上基于 PaaS 的服务，您可以将其部署在任何拥有 Azure Arc 的地方，无论是在本地还是在任何云中。现在，让我们更详细地了解此架构的每一层。


  #### 硬件层


  Azure Arc 数据服务架构构建在 `基于物理机或虚拟机的服务器` 上。每台服务器都贡献一定量的 CPU 和内存容量供应用程序运行。正如前一章关于 Kubernetes
  的介绍，Kubernetes 集群服务器称为节点。每个节点的数量和大小取决于所部署工作负载的大小要求，以及为 Kubernetes 集群中节点故障准备的一些额外容量。此外，您可以通过添加或移除服务器来扩展或收缩
  Kubernetes 集群中的资源量。我们将在本章后面更详细地探讨这个主题。


  每个节点必须运行 `Linux 操作系统`，因为在 Azure Arc 启用的数据服务中运行的所有容器都是基于 Linux 的容器。


  除了计算资源之外，还需要 `持久存储`。持久存储使用前一章介绍的存储概念分配给在 Azure Arc 启用的数据服务中部署的工作负载。存储类为在 Kubernetes
  集群中部署的工作负载动态分配持久卷。配置的存储类型可以是您的 Kubernetes 版本支持并作为存储类公开的任何存储类型。此外，您可以通过定义额外的存储类来增加集群中的可分配存储容量，甚至添加额外的存储类型。


  #### Kubernetes 层


  底层硬件就位后，架构的下一层是 Kubernetes。无论何种发行版，Kubernetes 都为构建工作负载提供了一致的 API，因此，Azure Arc 启用的数据服务支持多种
  Kubernetes 发行版。支持的发行版包括使用 kubeadm 构建的开源/上游 Kubernetes 集群，以及像 RedHat OpenShift 这样的商业发行版。


  在撰写本文时，根据部署机制，有几种 `受支持的 Kubernetes 发行版`：

  *   使用 kubeadm 部署的开源上游 Kubernetes

  *   OpenShift 容器平台 (OCP)


  支持多种 `托管服务产品`：

  *   Azure Kubernetes 服务 (AKS)

  *   Azure Stack 上的 Azure Kubernetes 服务 (AKS)

  *   Azure Stack HCI 上的 Azure Kubernetes 服务 (AKS)

  *   Azure RedHat OpenShift (ARO)

  *   AWS 弹性 Kubernetes 服务 (EKS)

  *   Google Cloud Kubernetes 引擎 (GKE)


  > 注意

  >

  > 有关支持的特定 Kubernetes 发行版版本的更多信息，请查看此链接：[*https://docs.microsoft.com/en-us/azure/azure-arc/kubernetes/validation-program*](https://docs.microsoft.com/en-us/azure/azure-arc/kubernetes/validation-program)*.*


  这里的关键概念是，您可以在任何需要部署的地方（本地或混合云场景）在任何 Kubernetes 发行版上部署 Azure Arc 启用的数据服务。您可以选择使用上游/开源
  Kubernetes 以及许多托管服务产品。一旦 Kubernetes 启动并运行，接下来要做的就是通过部署 Azure Arc 数据服务数据控制器，将 Azure
  扩展到您的集群中。


  #### Azure Arc 管理控制平面层


  Kubernetes 部署后，架构的下一层是 Arc 管理控制平面层，它将 Azure 的管理功能扩展到您的本地或混合云环境。在这一层，在 Azure Arc
  启用的数据服务中，会部署一个 `数据控制器`。数据控制器作为 Kubernetes 中的自定义资源部署。数据控制器实现了核心功能，如 Azure Arc 集成和管理服务。让我们更仔细地看看这些功能。


  Azure Arc 集成负责根据部署的数据服务工作负载，将日志记录、性能和用量信息发送回 Azure。数据控制器将 Azure 资源管理器扩展到您的本地或混合云部署，并激活
  Azure Arc 启用的服务来管理已部署的应用程序和资源。数据控制器实现的管理服务包括控制器服务和 API 端点、配置管理、管理和性能仪表板、指标、日志记录、托管备份/恢复以及高可用性服务协调。我们将在接下来的章节中更深入地探讨数据控制器及其核心功能。控制器在线后，架构的下一层是部署数据服务工作负载。


  > 注意

  >

  > 我们需要说明，数据控制器用于管理 Azure Arc 启用的数据服务。Azure Arc 启用的服务器、Kubernetes 和 SQL Server 各自依赖于安装在
  Azure Arc 管理的资源上的代理。


  #### 数据服务层


  Azure Arc 启用的数据服务架构的最后一层是数据服务本身。Azure Arc 启用的数据服务使您能够在本地或混合云环境中的 Kubernetes 上，自配置传统上基于
  Azure 公有云 PaaS 的服务，如 SQL 托管实例和 PostgreSQL 超大规模。`Azure Arc 启用的 SQL 托管实例` 是您的 SQL
  Server 提升和转移版本，使您能够将工作负载无缝迁移到 Azure Arc 启用的数据服务中，因为它与本地 SQL Server 安装具有高度兼容性。接下来，`Azure
  Arc 启用的 PostgreSQL 超大规模` 是用于关键任务应用程序数据存储的领先开源数据库。PostgreSQL 超大规模是 Azure 中的一种实现，它使您能够通过跨多个实例分片来水平扩展数据，并允许分布式并行查询执行。这些数据服务作为资源部署在
  Kubernetes 中，并由数据控制器管理。


  总而言之，本质上，只要您拥有硬件并部署了 Kubernetes 和数据控制器，就可以部署 Azure Arc 启用的数据服务。




  ## Azure Arc 管理控制平面层：深入解析


  现在，是时候深入了解一下 Azure Arc 管理控制平面了。为了将 Azure 服务从云端扩展到本地或混合云环境，一个`数据控制器`会被部署在您的`Kubernetes`集群中。这个`数据控制器`实现了
  Azure Arc 的集成以及若干关键的本地管理功能。本节将介绍`数据控制器`的连接模式、其核心功能，以及其运维和管理能力如何根据所使用的连接模式而有所不同。


  `数据控制器`的连接模式定义了它如何与 Azure 公有云交换数据，也定义了哪些管理服务在`Kubernetes`集群内部部署，以及哪些 Azure 服务用于管理集群中的数据服务。`数据控制器`有两种连接模式：间接连接模式和直接连接模式。您应选择哪种连接模式，取决于您部署的技术和安全要求，也可能涉及业务规则或政府法规。让我们更详细地看看每种连接模式。


  ### 间接连接模式


  在间接连接模式下，您的集群中的`数据控制器`与 Azure 公有云之间没有直接连接。本地的`数据控制器`本身充当您`Kubernetes`集群中数据服务的主要管理点和部署点。对于工作负载的部署和管理，所有操作都由您集群中的本地`数据控制器`管理。此外，所有管理功能都在本地集群内部实现。例如，性能指标、日志记录
  Web 门户和数据存储都实现为在您本地`Kubernetes`集群中运行的`Pod`。进一步地，关键数据服务的管理操作，如更新管理、自动备份/恢复和高可用性协调，都在此层实现。图
  2-3 突出了间接连接模式的架构，其中`数据控制器`与 Azure 云没有持久连接。


  ![图 2-3：间接连接模式 – 数据控制器与 Azure 云之间没有直接连接。数据通过使用 azure-cli 的导入/导出过程进行交换](img/505695_2_En_2_Fig3_HTML.jpg)


  在间接连接模式下，清单、性能、日志记录和使用情况数据可以导出到文件，然后上传到 Azure。一旦上传到 Azure，已部署的 Azure Arc 启用的数据服务将作为资源在
  Azure 门户中可见。此外，Azure 服务，如`Metrics`、`Log Analytics`等，可用于分析从本地或混合云环境导出的数据。可以定期安排此导出/上传过程，以便数据被上传并在
  Azure 内部可用，给人一种数据持续上传的表象。需要直接连接的 Azure 服务不可用。


  在间接连接模式下，数据服务的部署和配置更改是通过诸如 Azure Data Studio、`azure-cli (az)`、`Kubernetes`原生工具（如`kubectl`、`helm`或`oc`）以及
  Azure Arc 启用的`Kubernetes GitOps`等工具，发送到在`数据控制器`上运行的`Kubernetes API`。如果使用`Kubernetes`原生工具，这些部署会直接发送到`Kubernetes
  API`。在间接连接模式下，无法使用 Azure 门户、`ARM API`和`ARM`模板进行部署和配置更改。然而，由于前面描述的导出过程，清单管理、指标和日志记录等
  Azure 服务是可用的。


  此连接模式的典型场景是，拥有业务或安全策略的数据中心不允许出站连接或向外部服务上传数据。其他可以使用间接连接模式的部署包括互联网连接不稳定的边缘站点位置。


  ### 直接连接模式


  在直接连接模式下，Azure 本身成为协调您 Azure Arc 启用的数据服务环境中的管理和部署功能的控制平面。在此连接模式下，您部署 Azure Arc 启用的数据服务的`Kubernetes`集群需要是一个
  Azure Arc 启用的`Kubernetes`集群。通过将您的`Kubernetes`集群连接到 Azure，Azure Arc 代理被部署到您的集群中。这些代理负责维护与
  Azure 的出站持久连接，并与 Azure 交换信息，如指标、日志和使用情况数据，与间接连接模式相比，还能通过额外的 Azure 服务实现更丰富的 Azure
  管理体验。使用直接连接模式时，会从客户环境通过安全的加密通道向 Azure 云发起一个持久的网络连接。如果连接中断，操作将在本地排队，并在连接恢复时推送到 Azure。


  在直接连接模式下，除了间接连接模式使用的工具外，还可以使用 Azure 门户、`ARM API`、`azure-cli`、Azure PowerShell 和`ARM`模板来创建部署和配置更改。图
  2-4 突出了直接连接模式的架构，其中 Azure Arc 启用的`Kubernetes`代理与 Azure 云保持着直接、持续的连接，并不断上传指标、日志和使用情况数据，同时通过额外的
  Azure 服务实现更丰富的 Azure 管理体验。此连接模式的常见场景包括管理其他公有云中的部署、边缘站点位置以及允许此类连接的企业数据中心。


  ![图 2-4：直接连接模式 – Azure Arc 启用的 Kubernetes 代理维护一个到 Azure 云的持久、安全的连接，用于交换配置状态以及监控和日志记录数据](img/505695_2_En_2_Fig4_HTML.jpg)


  使用直接连接模式时，除了启用 Azure Arc 的`Kubernetes`集群外，您还需要将 Azure Arc 启用的数据服务`集群扩展`部署到您的集群中。`集群扩展`控制着您的`Kubernetes`集群的
  Azure 功能，例如它提供的 Azure 服务以及这些服务的版本和生命周期。Azure Arc 启用的数据服务`集群扩展`用于为 Azure Arc 启用的数据服务及其功能创建`自定义资源定义`，并引导集群部署。


  在处理 Azure 资源时，传统上您在一个区域中部署资源。为了将这个概念扩展到混合场景中，以访问 Azure 之外的计算资源，您需要定义一个`自定义位置`。`自定义位置`是一个从
  Azure 指向 Azure Arc 启用的`Kubernetes`集群中定义的`Kubernetes 命名空间`的指针（参见图 2-5）。


  ![图 2-5：自定义位置的概念](img/505695_2_En_2_Fig5_HTML.jpg)


  这个`自定义位置`被管理员用作在您的本地计算资源上部署 Azure Arc 启用的数据服务的目标位置。启用 Azure Arc 的`Kubernetes`集群的过程在第
  6 章中有详细描述，作为创建直接连接的 Azure Arc 启用的数据服务`数据控制器`过程的一部分。


  > **注意**

  >

  > 有关管理服务和网络连接（例如 Internet 地址、端口和代理服务器支持）的更多详细信息，请查看以下链接：

  > ```

  > https://docs.microsoft.com/en-us/azure/azure-arc/data/connectivity

  > ```




  ## Azure Arc 支持的数据服务管理功能


  在 Arc 管理控制平面内部，部署了一个 `Data Controller` 和本地可用的管理功能。在本节中，我们将逐一介绍这些核心要素。图 2-6 突出显示了作为部署在本地
  `Kubernetes Cluster` 内的这些管理功能。


  ![](img/505695_2_En_2_Fig6_HTML.jpg)


  图 2-6


  Azure Arc 管理控制平面在你的本地 `Kubernetes Cluster` 中实现了许多核心管理和运维功能。


  *   `Controller Service`：这是你的 `Kubernetes Cluster` 中可用的管理端点，负责处理管理操作。

  *   `API`：`Data Controller` 暴露一个 `API`，可与你的 `Kubernetes Cluster` 交互以执行管理操作，例如导出性能、日志或使用数据以上传到
  Azure。部署操作通过 `Kubernetes API` 直接完成，或使用前述部署工具完成，这些工具随后与 `Kubernetes API` 交互。

  *   `Provisioning`：`Data Controller` 与 `Kubernetes API` 协调预配操作。当使用 `Kubernetes`
  原生工具或 Azure 数据服务工具（如 `Azure Data Studio` 和 `azure-cli`）时，预配操作直接提交给 `Kubernetes API`，然后发送到底层
  `Kubernetes Cluster` 以部署新工作负载和配置状态变更。`Data Controller` 监控针对 `Custom Resources`（如
  `SQL Managed Instance` 和 `Postgres`）的预配请求，并与 `Kubernetes API` 协调以预配构成所部署 `Custom
  Resource` 的支持性 `Kubernetes` 原生对象，例如 `StatefulSets`、`Services` 等。

  *   `Dashboards`：管理仪表板在 `Azure Data Studio` 中可用。这些仪表板提供有关已部署数据服务和 `Data Controller`
  本身当前状态的信息。

  *   `Metrics`：`Grafana` 用于暴露你的 `Cluster` 中多个层级的关键性能指标，包括 `PostgreSQL Hyperscale`
  和 `SQL Server Managed Instance` 特定的仪表板。`Grafana` 作为部署在你的 `Cluster` 中的 Web 门户提供。

  *   `Logging`：`Kibana` 用于聚合 `Cluster` 中产生的日志并提供搜索功能。多个资源正在将日志数据流式传输到 `Kibana`，包括已部署的
  `SQL Managed` 和 `PostgreSQL Hyperscale` 实例。`Kibana` 作为部署在你的 `Cluster` 中的 Web 门户提供。

  *   `Managed Backup and Restore`：备份和还原自动化由 `Data Controller` 控制。每个 Azure Arc 支持的
  `SQL Managed Instance` 都带有一个内置的自动备份功能，默认启用。这意味着每个创建或还原的数据库将自动接收一个初始完整备份，然后是按计划进行的差异备份和事务日志备份。此概念与
  Azure `SQL Managed Instance` 中的托管备份非常相似，并允许你在保留期内的任何特定时间点执行还原。

  *   `High Availability`：`Kubernetes` 为控制器（如 `ReplicaSets` 和 `StatefulSets`）管理的工作负载提供了基本的高可用性。如果由这些控制器之一控制的
  `Pod` 发生故障，将在 `Cluster` 中创建一个新的 `Pod` 来替换失败的 `Pod`。对于可能需要 `Cluster` 内 `Pod` 协调故障转移事件的高级场景，`Data
  Controller` 可以促进此应用程序感知的故障转移事件。


  ### 数据服务层：深入探讨


  随着所有必需的基础设施（硬件、`Kubernetes` 和 `Data Controller`）就位，现在是时候关注数据服务层了。这一层是在你的环境中（无论是在本地还是在任何云中）部署传统上基于
  PaaS 的数据服务的地方，例如你在 Azure 云中看到的那些服务。本节将深入探讨当前每个可用的数据服务，即 Azure Arc 支持的 `SQL Managed
  Instance` 和 Azure Arc 支持的 `PostgreSQL Hyperscale`，审视它们的能力和价值。




  #### Azure Arc-enabled SQL Managed Instance


  Azure Arc-enabled SQL Managed Instance 是 SQL Server 的**直接迁移**版本。它使你能够将工作负载无缝迁移到
  Azure Arc，因为它与本地安装的 SQL Server 具有高度的兼容性，据文档记载，兼容性接近 100%。这意味着，将数据库从当前的本地实现迁移到 Azure
  Arc-enabled SQL Managed Instance，几乎不需要或完全不需要对数据库进行更改。部署 Azure Arc-enabled SQL Managed
  Instance 时，你可以从本地 SQL Server 版本进行备份，并将该备份直接还原到 Azure Arc-enabled SQL Managed Instance。


  提示

  请访问 [`docs.microsoft.com/en-us/azure/azure-arc/data/managed-instance-features#Unsupported`](https://docs.microsoft.com/en-us/azure/azure-arc/data/managed-instance-features#Unsupported)，查看
  `Azure Arc-enabled SQL Managed Instance` 不支持的功能和服务列表。


  `Azure Arc-enabled SQL Managed Instance` 的一个特性是它 `始终最新`。（你可能也会看到“常青 SQL”这个术语。）类似于在
  Azure PaaS 服务（例如 Azure 云托管部署中的 `Azure SQL Managed Instance`）中提供的始终最新或常青 SQL 产品，Microsoft
  将持续为 `Azure Arc-enabled SQL Managed Instance` 更新 SQL Managed Instance 容器映像，并推送到
  Microsoft 容器注册表。然后，根据你在部署中定义的更新策略，你可以指定更新应用于你的环境的频率和时间。在传统的 SQL Server 实现中，管理更新是一个具有挑战性且耗时的过程。Kubernetes
  提供了快速吸收更新和变更，并将其推出到集群的能力。这就是在 `Azure Arc-enabled Data Services` 中使用的更新模型。


  `Azure Arc-enabled SQL Managed Instance` 提供两种服务层级：`常规用途` 和 `业务关键`。根据 Microsoft 文档中的定义，`常规用途`
  是一个经济实惠的层级，专为大多数具有基本性能和可用性需求的工作负载而设计。`业务关键` 层级专为对性能敏感、要求更高可用性的工作负载而设计。


  `常规用途` 服务层级现已正式发布。其 SQL Server 功能集与标准版相同，但对 `Azure Arc-enabled SQL Managed Instance`
  可以使用的内核数量和可寻址内存量有所限制——最多 24 个 CPU 内核和 128GB 内存。这也引出了关于 `Azure Arc-enabled SQL Managed
  Instance` 的下一个关键点，即`高可用性`。在 `常规用途` 服务层级中，`Azure Arc-enabled SQL Managed Instance`
  作为单个 SQL Server 实例部署，运行在由 `StatefulSet` 管理的 `Pod` 中。如前所述，`StatefulSet` 在应用程序或 `Node`
  发生故障事件时提供基本的故障转移能力。如果发生故障，先前的 `Pod` 会被删除，并在其位置创建一个新的 `Pod`。这些故障场景的恢复时间可能非常短。


  提示

  当创建运行 SQL Server Managed Instance 的 `Pod` 时，它必须在启动时运行崩溃恢复。考虑使用加速数据恢复来缩短 SQL Server
  Managed Instance 的启动时间。更多详情，请访问 [`docs.microsoft.com/en-us/sql/relational-databases/accelerated-database-recovery-concepts`](https://docs.microsoft.com/en-us/sql/relational-databases/accelerated-database-recovery-concepts)。


  为确保此单实例实现的高可用性，应使用外部共享存储，并使其对集群中的所有 `Node` 可用。如果某个 `Node` 发生故障，实例可以在集群中的其他地方启动，然后挂载
  `Persistent Volume` 并使其对新的 `Pod` 可用。


  `Azure Arc-enabled SQL Managed Instance` 使用 `Kubernetes Services` 作为持久访问端点。如图 2-7
  所示，需要访问部署在 Kubernetes 中的 SQL Managed Instance 的应用程序和用户将指向 IP 或 DNS 名称以及为访问数据库实例定义的端口。此
  `Service` 独立于 `Pod` 的生命周期，如果 `Pod` 停止并在集群中其他地方重新创建，则 `Service` 会更新并将流量自动发送到新的 `Pod`。


  ![](img/505695_2_En_2_Fig7_HTML.jpg)


  ### 图 2-7

  在 Kubernetes 集群中运行的 `Azure Arc-enabled SQL Managed Instance` 的典型部署


  在 Kubernetes 中，当你更新容器映像或进行 `Pod` 配置更改时，当前的 `Pod` 会被删除，并使用更新后的容器映像或更新后的配置创建新的 `Pod`。这是一个非常快速的操作，但这可能会导致短暂的停机时间，在某些场景下这可能是不可接受的。在
  `Azure Arc-enabled Data Services` 中，部署的数据服务使用相同的模型进行更新，因此在为已部署的数据服务推出更新时会有短暂的停机期。


  如图 2-8 所示的 `业务关键` 服务层级提供了企业版的 SQL Server 功能集，并受操作系统限制的内核数和可寻址内存量。在此服务层级中，高可用性由 `可用性组`
  提供，其中数据库的多个副本跨 Kubernetes 集群中的多个 `Node` 复制。停机时间仅限于故障转移的持续时间。此外，此 `可用性组` 可用于读取扩展操作。


  ![](img/505695_2_En_2_Fig8_HTML.jpg)


  ### 图 2-8

  业务关键服务层级：计算与存储共置


  有关服务层级的更多信息，请参见此链接：[`docs.microsoft.com/en-us/azure/azure-arc/data/service-tiers`](https://docs.microsoft.com/en-us/azure/azure-arc/data/service-tiers)。


  云的一项优势是`弹性扩展`，使你能够按需向环境添加容量，并尽可能快地利用该额外容量。`Azure Arc-enabled SQL Managed Instance`
  的部署也不例外。如果需要，你可以通过调整分配给该部署的 CPU 和内存资源，为 SQL Managed Instance 的部署添加额外的计算和内存容量。此外，利用
  Kubernetes 的基本高可用性结构，这一更改几乎可以立即推出。部署会更新，并使用此新配置创建一个新的 `Pod`，SQL Managed Instance
  便可以使用此额外的纵向扩展容量。




  ## Azure Arc 支持的 PostgreSQL 超大规模版


  我们要向您介绍的第二项 Azure Arc 启用的数据服务是 `Azure Arc-enabled PostgreSQL Hyperscale`。`Azure
  Arc-enabled PostgreSQL Hyperscale` 是一种领先的开源数据库，用作关键任务应用程序的数据存储。PostgreSQL Hyperscale
  是在 Azure 云中的一种实现，它使您能够通过跨多个实例分片来水平扩展数据，并支持分布式并行查询执行。Hyperscale 成功的一个关键因素是它能够与现有版本的
  Postgres 数据库配合工作，因此数据库及其应用程序几乎无需更改即可利用这些优势。


  `Azure Arc-enabled PostgreSQL Hyperscale` 也使用了前一节描述的 *始终最新* 或常青 SQL 模型。Microsoft
  将持续更新 PostgreSQL Hyperscale 的容器镜像，您可以决定该镜像在您的环境中 rollout 的频率和时机。


  如前所述，云的一个重要优势是 *弹性扩展*，即能够按需为您的环境增加容量，并尽可能快地利用该额外容量。`Azure Arc-enabled PostgreSQL
  Hyperscale` 突出体现了这种弹性扩展，因为它可以在支持数据库的 `Postgres Worker Nodes` 数量上进行扩展（横向扩展），并能将数据分片到这些工作节点及其底层存储上。这实现了并行查询执行和分布式
  I/O，从而可以提高数据库容量和性能。


  > **注意**

  >

  > 我们想指出术语使用上存在重叠。`Postgres Worker Node` 是 Hyperscale 服务器组中的单个计算单元。这与 `Kubernetes
  Node`（Kubernetes 集群中的计算资源）不同。


  在 `Azure Arc-enabled PostgreSQL` 中执行扩展操作时，额外的 `Postgres Worker Nodes` 会被添加到支持 `PostgreSQL
  Hyperscale` 服务器组的 `Postgres Worker Nodes` 资源池中。在图 2-9 中，您将看到一个 `PostgreSQL Hyperscale`
  服务器组从两个工作节点扩展到三个工作节点。然后，数据会在服务器组内的三个工作节点之间重新平衡。横向扩展是一项在线操作，分片数据会自动在当前服务器组的工作节点间重新平衡。


  ![](img/505695_2_En_2_Fig9_HTML.jpg)


  图 2-9


  一个 `PostgreSQL Hyperscale` 服务器组从两个工作节点扩展到三个工作节点，数据正在工作节点间重新平衡


  除了横向扩展，您还可以通过向部署添加 CPU 和内存容量来纵向扩展单个 `Postgres Worker Nodes`。这样做会导致支持 `Postgres Workers`
  的 Pod 因为新的 Pod 配置而被重启。截至本文发布时，不支持缩减操作。如果您需要缩减容量，可以创建一个新实例，将旧实例中的数据备份，然后将其还原到新实例中。有关数据放置和分片数据的更多信息，请查阅
  [*https://docs.microsoft.com/en-us/azure/azure-arc/data/concepts-distributed-postgres-hyperscale*](https://docs.microsoft.com/en-us/azure/azure-arc/data/concepts-distributed-postgres-hyperscale)。


  ### 部署规模考虑


  Azure Arc 启用的数据服务部署在 Kubernetes 上。Kubernetes 提供了对您本地数据中心或云中可用硬件的抽象。在本节中，我们想向您介绍在设计
  Azure Arc 启用的数据服务和支持性 Kubernetes 集群时的规模考虑因素。我们将具体讨论的主题是 *计算* 和 *存储*。首先，让我们看看计算。


  #### 计算


  Kubernetes 集群中的每个节点（`Node`）都会贡献 CPU 和内存容量，共同构成可分配给集群中部署的工作负载的总体可用资源。部署的节点数量和规模取决于运行集群中部署的工作负载以及任何集群系统功能所需的容量。如果集群需要额外容量，可以添加更多的节点，从而为工作负载贡献更多的
  CPU 和内存容量。如果需要，可以添加更大的节点或用更大的节点替换较小的节点，以增加集群的整体容量。这种按需增加容量的概念是云架构弹性的关键。


  部署 Azure Arc 启用的数据服务时，有几个组件会影响运行集群和支持部署的工作负载所需的总体资源占用。这包括 Arc 管理控制平面（`Arc Management
  Control Plane`）所需的资源，以及实际部署的数据服务工作负载所需的资源，可能还包括集群中部署的任何其他工作负载。让我们更详细地看看每一项：


  *   **`Arc Management Control Plane`**：由数据控制器（`Data Controller`）、指标（`Metrics`）和日志记录（`Logging`）Pod
  组成。这些服务中的每一个都会消耗集群中的 CPU 和内存。有关每个服务所需资源的更多信息，请查阅 [*https://docs.microsoft.com/en-us/azure/azure-arc/data/sizing-guidance#data-controller-sizing-details*](https://docs.microsoft.com/en-us/azure/azure-arc/data/sizing-guidance%2523data-controller-sizing-details)。

  *   **数据服务工作负载**：部署在集群中的每个数据服务实例都会消耗一定量的 CPU、内存和磁盘。每种资源消耗多少取决于在每个数据服务中运行的工作负载。有关每个可用数据服务的工作负载规模和最低要求的更多信息，请查阅
  [*https://docs.microsoft.com/en-us/azure/azure-arc/data/sizing-guidance*](https://docs.microsoft.com/en-us/azure/azure-arc/data/sizing-guidance)。

  *   **Kubernetes 系统 Pod**：在 Kubernetes 集群的每个节点上，都有一组执行关键集群功能的系统 Pod 和服务，每个都会消耗一定量的系统资源。资源被预留给关键操作，在资源稀缺的场景下，用户
  Pod 可能会被从节点中驱逐。有关预留计算资源（`Reserved Compute Resources`）的更多信息，请查阅 [*https://kubernetes.io/docs/tasks/administer-cluster/reserve-compute-resources/*](https://kubernetes.io/docs/tasks/administer-cluster/reserve-compute-resources/)。

  *   **其他工作负载**：如果您的集群并非专用于数据服务，请不要忘记将该工作负载纳入您的规模计算。


  了解了需要部署在集群中的工作负载量之后，接下来您需要做的是确定集群节点的规模以及运行您的工作负载所需且具备节点级冗余的集群节点数量。


  *   **单个节点规模**：在确定节点规模时，CPU 和内存不能超分配。例如，如果您的节点有两个核心和 16GB RAM，您无法创建一个需要四个核心和 32GB
  RAM 的数据库实例。Kubernetes 将无法启动该 Pod。因此，您必须添加一个更大的节点，或减少对该 Pod 的分配。Microsoft 文档建议在每个节点上至少保留
  25% 的可用资源，以便为增长和冗余留出空间。




  ### 高可用性


  在为集群规划所需资源量时，需确保 provision 足够数量的节点，其总资源应能支持至少一个节点故障或计划内维护。对于关键系统，建议客户采用 N+2 模型，即允许两个节点离线，集群仍能正常运行，性能不降级且工作负载不中断。当节点故障时，运行在该故障节点上的
  Pods 会被迁移到集群中剩余的节点上。因此，必须为这些 Pods 的运行准备足够的容量。


  这里的关键要点是：确保有足够的节点来支持在集群中运行所需工作负载所需的 CPU 和内存量，即使发生节点故障也应如此。此外，请确保单个数据服务的部署所需的资源不超过集群中单个节点的可用资源。否则，支持该部署的
  Pods 将无法在集群的任何节点上启动，因为没有节点具备足够的资源来支持该配置。另外，您需要确保在每个节点上至少保留 25% 的容量，以供增长和冗余使用。


  #### 存储


  现在让我们继续讨论如何为 Azure Arc-enabled Data Services 集群规划存储。所需的存储容量和类型取决于所部署的工作负载。从根本上说，在
  Arc-enabled Data Services 中作为 SQL 托管实例运行的 SQL Server 实例的性能配置文件，与在 Azure 或甚至本地等任何其他平台上部署
  SQL Server 实例时看到的并无不同。其独特之处在于如何为您的数据服务工作负载配置和分配存储访问。现在让我们深入探讨这些主题。


  如前所述，在 Kubernetes 中，存储是从 Storage Classes 动态分配的。当部署数据服务实例（如 SQL 托管实例或 PostgreSQL
  Hyperscale）时，您需要为部署中不同类型的数据定义要使用的 Storage Class。当前可用的选项包括*数据库数据文件*、*数据库备份文件*和*应用程序日志文件*，如果使用
  SQL 托管实例，还包括*数据库事务日志文件*的存储位置。如果在定义数据服务实例时未指定 Storage Class，则将使用默认的 Storage Class。定义哪种数据使用哪个
  Storage Class 是在定义实例时通过配置参数设置的。本书后续章节将更详细地介绍这一点。


  在设计 Azure Arc-enabled Data Services 集群时，您需要根据所需的工作负载配置，创建映射回集群所需存储类型的 Storage Classes。例如，您可能需要为数据服务实例中的每种数据类型（如数据库文件、事务日志文件、应用程序日志文件和备份）分别创建单独的
  Storage Class。这些 Storage Classes 中的每一个都可能映射到不同的存储子系统，每个子系统都具备为存储在该 Storage Class
  中的数据所需的性能配置文件。


  Storage Classes 可以配置为从本地节点存储和远程共享存储分配存储。如果节点内部部署了高速磁盘，本地存储可能非常快。但是，本地节点存储在节点故障时不提供持久性。如果节点发生故障，则该节点上的数据将面临丢失风险。使用本地节点存储的一种常见模式是，确保使用该类型存储的应用程序中的数据在多个节点之间复制，以实现冗余和可用性。复制与本地高速磁盘相结合是某些场景下可行的部署选项。本地存储是使用可用性组在副本之间复制数据的业务关键服务层的可行选项。


  使用远程共享存储时，集群中的节点从远程存储系统映射存储。这可以是 SAN、NAS 或基于云文件的系统。使用这种架构 provision 存储解耦了对本地节点的依赖。如果某个节点发生故障，原本运行在该节点上的
  Pod 可以被调度到集群中的另一个节点上。存储被挂载并暴露到 Pod 中，数据库实例可以快速恢复运行。从节点到共享存储环境的 I/O 互连应 provision
  多路径以实现冗余，并且应具备足够的容量来支持所需的工作负载。此外，需要高 I/O 的实例应使用高级 Kubernetes 调度技术分散在集群中的各个节点上。有关
  Kubernetes 中存储和调度的深入探讨，请参阅 Pluralsight 课程 “Configuring and Managing Kubernetes Storage
  and Scheduling”，链接为`www.pluralsight.com`。


  ## 总结与要点


  本章向您介绍了 Azure Arc-enabled Data Services。它从现代混合云策略面临的挑战开始。然后展示了 Azure Arc 如何通过将 Azure
  资源管理器扩展到您的本地或混合云环境来应对这些挑战，以实现大规模可管理性。接下来，我们介绍了核心的 Azure Arc-enabled 资源，包括服务器、Kubernetes、SQL
  Server 和数据服务。然后我们更深入地探讨了什么是 Azure Arc-enabled Data Services、其架构、工作负载如何部署和管理，并讨论了重要的部署注意事项，例如计算和存储容量规划。在下一章中，我们将从理论转向实践，学习如何在
  Kubernetes 集群中部署 Arc 数据控制器。


  '
- '# 3. 部署准备


  在上一章中，我们讨论了 Azure Arc-enabled Data Services 的理论概念和组件。


  现在是为第一次部署做准备的时候了。在我们实际部署数据控制器以及随后由该数据控制器管理的数据库实例之前，我们确实需要一些先决条件以及一个就绪的 Kubernetes
  集群。所有这些步骤将引导您完成开始使用 Azure Arc-enabled Data Services 所需的操作，并确保您完全准备就绪。


