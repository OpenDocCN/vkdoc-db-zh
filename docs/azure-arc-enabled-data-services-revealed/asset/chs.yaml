  ## 部署直接模式数据控制器


  由于直接连接的 Azure Arc 数据控制器本质上与其他 Azure 资源无异（尽管仅其元数据驻留在 Azure 中），我们也可以通过 CLI 或 ARM 模板等方式来部署它。


  不过，我们将重点介绍通过 Azure 门户的方法。欢迎您复用此过程中生成的 ARM 模板——我们只是觉得，能在门户中在线部署一个资源，然后它就会显示在我们本地的
  Kubernetes 集群中，这种方式非常酷。


  要开始部署，请导航至 Azure 门户中的“创建 Azure Arc 数据控制器”页面，网址为 `https://portal.azure.com/#create/Microsoft.DataController`，并选择您计划使用启用
