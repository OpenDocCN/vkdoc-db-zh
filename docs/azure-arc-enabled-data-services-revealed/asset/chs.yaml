  \ 7-2 中用于创建常规托管实例的命令，你就能看出 Arc 命令是多么的 Azure 原生。\n\n```\naz sql mi create -n mi-1\
  \ …\n代码清单 7-2\n用于创建新的 Azure SQL MI 的 azure-cli 命令\n```\n\n除非你通过 `AZDATA_PASSWORD`\
  \ 环境变量提供了密码，否则 `azure-cli` 会再次提示你输入密码，然后按照图 7-1 所示继续部署。\n\n![](img/505695_2_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1: SQL MI 部署命令的输出\n\n部署完成后（应该只需要几分钟），我们可以运行一个快速的 `az` 命令来列出我们所有的实例，目前就这一个，如代码清单\
