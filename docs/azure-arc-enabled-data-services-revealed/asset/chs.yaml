  您需要一个 Azure 帐户和订阅来完成这些步骤并开始部署。如果 Azure 不适合您，还有其他部署选项可用。Microsoft 提供了一个 Jumpstart
  站点，可以轻松地在本地、AWS 或 Google 云中开始使用。有关更多信息，请访问`https://azurearcjumpstart.io/`。


