  图 6-21：ADS 中的数据控制器详细信息


  我们直接连接的数据控制器现在可以通过 Azure 门户、命令行和 Azure Data Studio 进行管理和访问。


  ## 总结与要点


  本章和上一章通过部署直接或间接模式的数据控制器，让我们朝着使用首个 Arc 启用数据服务实例又迈进了一大步。


  现在，让我们跨越最后的鸿沟，为在下一章中使用我们的 Arc 启用数据服务部署做一些有用的事情做好准备：向我们的控制器中部署一个 SQL 托管实例。


  '
- "# 7. 部署 Azure Arc 启用的 SQL 托管实例\n\n我们的数据控制器已准备就绪并正在等待，我们现在可以继续开始部署第一个数据库实例，以便开始使用我们的\
  \ Arc 启用数据服务安装。\n\n与数据控制器的部署类似，我们可以使用命令行、Azure Data Studio 中的向导或 Azure 门户来完成此操作。\n\
  \n**注意**\n除非另有说明，我们所有的实例部署都将针对间接连接的数据控制器。\n\n\n\n## 通过 azure-cli 进行部署\n\n可以通过一个简单的\
