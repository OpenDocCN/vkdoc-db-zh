- '# 8. 部署 Azure Arc 启用的 PostgreSQL 超大规模实例


  第 7 章处理的是 Azure Arc 启用的 SQL 托管实例，本章将指导我们完成在处理 PostgreSQL 超大规模实例时所需的步骤。


  ## 通过命令行部署


  与 Azure Arc 启用的 SQL 托管实例一样，一个新的 PostgreSQL 超大规模服务器组可以通过一个简单的 `az` 命令进行部署，如清单 8-1
  所示。唯一必需的参数是服务器组的名称。


  ```

  az postgres arc-server create --name pg-1 --k8s-namespace arc --use-k8s

  清单 8-1

  用于创建新的 PostgreSQL 超大规模服务器组的 azure-cli 命令

  ```


  注意


  关于使用直接模式与间接模式以及 `--use-k8s` 开关的逻辑，与 SQL 托管实例的情况相同。


  尽管如此，如果您愿意，您仍然可以通过命令行开关完全控制部署的设置，如清单 8-2 所示。


  ```

  az postgres arc-server create --name pg-2 `

  --k8s-namespace arc --use-k8s `

  --storage-class-data local-storage `

  --storage-class-logs local-storage `

  --storage-class-backups local-storage `

  --workers 4 --port 5432 --engine-version 12 `

  --volume-size-data 5Gi --volume-size-logs 5Gi `

  --volume-size-backups 5Gi

  清单 8-2

  带参数的用于创建新的 PostgreSQL 超大规模服务器组的 azure-cli 命令

  ```


  无论哪种方式，`azure-cli` 都会提示您输入密码，除非您已经通过 `AZDATA_PASSWORD` 环境变量提供了密码，然后将继续进行部署，如图 8-1
  所示。每个 PostgreSQL 超大规模服务器组都有一个名为 `postgres` 的默认管理账户用户名，该名称不可配置。


  ![](img/505695_2_En_8_Fig1_HTML.jpg)


  图 8-1


  PostgreSQL 超大规模服务器组部署命令的输出


  除此之外，与 SQL 托管实例的部署没有区别。


  控制节点和工作节点显示为使用 `kubectl` 的独立 Pod（参见图 8-2）。这些节点独立于 Kubernetes 节点！


  ![](img/505695_2_En_8_Fig2_HTML.jpg)


  图 8-2


  Postgres Pod


  ## 通过 Azure Data Studio 部署


  当然，通过 Azure Data Studio 部署也是一个选项。在如图 8-3 所示的向导中，只需选择 PostgreSQL 选项即可。


  ![](img/505695_2_En_8_Fig3_HTML.png)


  图 8-3


  ADS 中的实例部署向导


  下一个屏幕将再次检查先决条件，然后（参见图 8-4）收集特定于 PostgreSQL 超大规模服务器组的设置。就像之前部署 SQL 托管实例一样，我们需要为这个
  PostgreSQL 超大规模服务器组提供一个名称和一个密码。用户名默认为 `postgres`，因此此设置不是必需的。PostgreSQL 超大规模服务器组要求您提供工作节点的数量。默认值为
  0，这将部署一个单节点的 PostgreSQL 超大规模服务器组、TCP 端口，以及您的存储类、存储大小和 CPU 与内存请求及限制。正如我们在第 1 章中提到的，这些设置将定义此特定部署将在您的
  Kubernetes 集群上分配多少资源。


  ![](img/505695_2_En_8_Fig4_HTML.png)


  图 8-4


  特定于 Postgres 的设置


  这将导致可以选择立即部署此服务器组，或者创建一个笔记本，该笔记本在运行时将创建新的服务器组。



  ## 服务器组的横向扩展


  如果您想通过添加更多工作节点来横向扩展一个现有的服务器组，这可以——您猜对了——通过另一个简单的 `azure-cli` 命令来实现，类似于列表 8-3 中的命令。


  ```

  az postgres arc-server edit --k8s-namespace arc --use-k8s -n pg-1 -w 8

  列表 8-3

  用于修改服务器组工作节点数量的 azure-cli 命令

  ```


  这将更新现有的服务器组，同时保持其在线，因此服务对于查询仍然可用。一旦 Postgres 工作节点准备就绪，数据将由 Hyperscale 分片再平衡器自动重新分配到这些新节点上。


  在更新运行期间，受影响的服务器组在服务器列表中将显示为“正在更新”（参见列表 8-4 和图 8-5）。


  ![](img/505695_2_En_8_Fig5_HTML.jpg)


  图 8-5


  当前控制器中的 PostgreSQL Hyperscale 服务器组列表


  ```

  az postgres arc-server list --k8s-namespace arc --use-k8s -o table

  列表 8-4

  用于列出当前控制器中所有 PostgreSQL Hyperscale 服务器组的 azure-cli 命令

  ```


  用于重新调整组规模的编辑命令将在更新完成且新工作节点准备就绪后报告结果，如图 8-6 所示。


  ![](img/505695_2_En_8_Fig6_HTML.jpg)


  图 8-6


  服务器组成功重新扩展后的输出


  新的工作节点会显示为独立的 Pod（使用 `kubectl`，见图 8-7），与现有的控制节点和工作节点并存。


  ![](img/505695_2_En_8_Fig7_HTML.jpg)


  图 8-7


  Postgres 工作 Pod


  这一变化也反映在 Azure Data Studio 中服务器组的管理页面上，如图 8-8 所示。如您所见，这也显示了五个节点的配置——同样是我们 PostgreSQL
  Hyperscale 服务器组中的控制器和四个工作节点。


  ![](img/505695_2_En_8_Fig8_HTML.png)


  图 8-8


  PostgreSQL Hyperscale 服务器组管理页面


  注意

  工作节点的数量只能向上扩展；您无法缩减现有的组！为此，您需要部署一个新的服务器组并备份/恢复您的数据。


  ## 移除已部署的服务器组


  要移除已部署的 Postgres 服务器组，您可以使用列表 8-5 中所示的 `az` 命令。


  ```

  az postgres arc-server delete --k8s-namespace arc -n pg-1 --use-k8s

  列表 8-5

  用于删除现有 PostgreSQL Hyperscale 服务器组的 azure-cli 命令

  ```


  或者，您也可以从 Azure Data Studio 中组的仪表板删除该组，如图 8-9 所示。


  ![](img/505695_2_En_8_Fig9_HTML.jpg)


  图 8-9


  在 ADS 中删除现有 PostgreSQL Hyperscale 服务器组的按钮


  两种方式都可以用来删除现有的实例。


  注意

  就像我们的 SQL 托管实例一样，删除服务器组不会删除其持久卷声明。一旦您确定不再需要数据，您将需要再次通过 `kubectl` 手动删除这些声明。


  ## 总结与关键要点


  到目前为止，我们已经了解了 Azure Arc 启用的数据服务的概念和产品，并向其部署了不同的数据实例。在接下来的最后一章中，我们将探讨如何管理和监控我们服务的性能，如何分析其日志文件，以及如何将其升级到新版本。


  '
- '# 9. 监控与管理


  到目前为止，我们已经介绍了 Azure Arc 启用的数据服务的架构以及部署它们所需的步骤。


  在这最后一章中，我们将重点介绍如何通过利用本地管理服务以及 Azure 的管理功能来监控您的 Azure Arc 启用的数据服务，以及如何升级现有安装。


  ## 通过数据控制器进行监控


  监控 Azure Arc 启用的数据服务的一种方式是通过两个内置仪表板：Grafana 仪表板和 Kibana 仪表板。当您没有常规或稳定的连接允许您定期将遥测数据同步到
  Azure 门户时，使用内置仪表板特别方便。正如我们在第 2 章中提到的，这些将在部署数据控制器时本地部署到您的 Kubernetes 集群。


  ### 获取端点


  要获取仪表板的 URL，您需要获取它们的端点。您可以通过 `az` 使用列表 9-1 中的命令来获取。


  ```

  az arcdata dc endpoint list -o table -k arc

  列表 9-1

  用于检索控制器端点列表的 azure-cli 命令

  ```


  或者，Azure Data Studio 中每个数据实例的管理页面都将有一个深度链接，指向该实例预过滤的仪表板，如图 9-1 所示。


  ![](img/505695_2_En_9_Fig1_HTML.png)


  图 9-1


  ADS 中其管理页面上 Arc SQL 托管实例的门户端点


  ### 指标（Grafana 仪表板）


  Grafana 门户提供有关其实例状态的指标和洞察。登录门户的凭据与您在 Azure Data Studio 中连接到集群时使用的凭据相同。


  如图 9-2 所示的 SQL 托管实例指标提供了 SQL Server 特定的性能指标，其中许多是 DBA 已经熟悉的。


  ![](img/505695_2_En_9_Fig2_HTML.png)


  图 9-2


  Grafana 门户 – SQL MI 指标


  统计数据展示了等待时间、按等待类型排序的等待任务数量、每秒事务和请求数以及其他有价值的指标。它们有助于了解集群内特定 SQL MI 的状态，该状态可以在屏幕左上方选择。


  当前在预配置的 Grafana 门户中可用的其他仪表板如图 9-3 所示。


  ![](img/505695_2_En_9_Fig3_HTML.jpg)


  图 9-3


  Grafana 门户中的内置仪表板


  ### 日志搜索分析（Kibana）


  另一方面，如图 9-4 所示的 Kibana 仪表板，让您能够深入了解所选实例的 Kubernetes 日志文件。


  ![](img/505695_2_En_9_Fig4_HTML.png)


  图 9-4


  Kibana 门户 – 概述


  Kibana 是 Elastic Stack 的一部分。它还提供选项，可在您的日志文件之上创建可视化效果和仪表板。如果您想了解更多关于它的信息，其网站 [www.elastic.co/products/kibana](http://www.elastic.co/products/kibana)
  是一个很好的起点！


  ## 通过 Azure 门户进行监控


  Arc 的优势之一是能够通过单一管理界面管理您的整个资产，如果您的连接允许，我们强烈建议将您的部署链接到 Azure 门户。这不会剥夺您使用 Grafana 和
  Kibana 的选项，因此请将其视为一个非常有价值的附加功能。


  ### 直接连接模式


  在直接连接模式下，您的日志文件和指标默认会自动上传并同步到 Azure 门户。


  ### 间接连接模式


  在间接连接模式下，您需要先将集群日志和指标导出到一个文件，然后定期上传此文件。如果需要，这个过程也可以计划和自动化，以确保您的遥测数据定期与 Azure 门户同步。




  ### 准备上传


  运行上传的第一个要求是拥有一个服务主体，你可以使用清单 9-2 中的命令来创建它。


  ```

  az ad sp create-for-rbac --name http://arc-log-analytics

  清单 9-2

  用于创建新服务主体的 azure-cli 代码

  ```


  注意


  服务主体的名称无关紧要。我们选择 "arc-log-analytics" 只是为了让名称反映其用途。


  创建服务主体后，你会收到一些 JSON 格式的返回值。后续步骤中你需要用到其中的一些值。输出结果应与图 9-5 中的类似。


  ![](img/505695_2_En_9_Fig5_HTML.jpg)


  图 9-5


  服务主体创建的输出结果


  接下来，我们需要将这个新主体分配到 `Monitoring Metrics Publisher` 角色，这可以使用清单 9-3 中的代码完成。请确保将 `appId`
  替换为上一个 JSON 中的 `appId value`，并将 subscription 替换为你的 `subscription ID`。


  ```

  az role assignment create --assignee  --role "Monitoring Metrics Publisher" --scope
  subscriptions/

  清单 9-3

  用于将服务主体分配到角色的 azure-cli 代码

  ```


  这将产生一个 JSON 输出，类似于图 9-6，不过这个输出在后面同样不需要用到。


  ![](img/505695_2_En_9_Fig6_HTML.png)


  图 9-6


  清单 9-3 的输出


  在下一步中，我们使用清单 9-4 创建一个 Log Analytics 工作区。


  ```

  az monitor log-analytics workspace create -g  -n UniqueLogAnalytics

  清单 9-4

  用于创建 Log Analytics 工作区的 azure-cli 代码

  ```


  注意


  与服务主体一样，名称无关紧要，但它必须是全局唯一的。如果你在部署直接连接的数据控制器时已经部署了一个 Log Analytics 工作区，你也可以复用它。虽然一个数据控制器要么是直接连接要么是间接连接，但任意多个数据控制器都可以共享同一个
  Log Analytics 工作区。


  这将再次产生一个 JSON 输出（参见图 9-7），我们需要其中的 `customerId` 值。


  ![](img/505695_2_En_9_Fig7_HTML.png)


  图 9-7


  清单 9-4 的输出


  除了 `customerId`，我们还需要工作区的共享密钥，这些密钥不包含在默认输出中，但可以通过清单 9-5 中的命令检索。


  ```

  az monitor log-analytics workspace get-shared-keys

  -g  -n UniqueLogAnalytics

  清单 9-5

  用于检索 Log Analytics 工作区共享密钥的 azure-cli 代码

  ```


  这将返回最后一个 JSON 输出，如图 9-8 所示，我们需要其中的 `primarySharedKey`。


  ![](img/505695_2_En_9_Fig8_HTML.jpg)


  图 9-8


  清单 9-5 的输出


  现在，你最好将这些值中的一些结果放入环境变量。你可以跳过这一步，但那样的话每次都需要手动输入，这将使自动化基本无法实现。这些变量是


  *   `SPN_CLIENT_ID`：清单 9-2 输出中的 `appId`

  *   `SPN_CLIENT_SECRET`：清单 9-2 输出中的 `password`

  *   `SPN_TENANT_ID`：清单 9-2 输出中的 `tenant`

  *   `WORKSPACE_ID`：清单 9-4 输出中的 `customerId`

  *   `WORKSPACE_SHARED_KEY`：清单 9-5 输出中的 `primarySharedKey`

  *   `SPN_AUTHORITY`：`https://login.microsoftonline.com`


  ### 上传日志、使用情况和指标


  如前所述，该过程包括两个步骤：首先，我们将收集每个部署的使用情况、日志和指标，并使用清单 9-6 中的命令将结果写入 JSON 文件。`--path` 参数将定义输出文件的名称，而
  `--force` 参数将在目标文件已存在时覆盖它。


  ```

  az arcdata dc export -t metrics --path metrics.json -k arc --force --use-k8s

  az arcdata dc export -t logs --path logs.json -k arc --force --use-k8s

  az arcdata dc export -t usage --path usage.json -k arc --force --use-k8s

  清单 9-6

  用于将指标、使用情况和日志导出到 json 文件的 azure-cli 命令

  ```


  `az` 将为每个组件确认导出，如图 9-9 所示。


  ![](img/505695_2_En_9_Fig9_HTML.png)


  图 9-9


  清单 9-6 的输出


  在第二步中，我们将使用清单 9-7 中的命令上传这些 JSON 文件。


  ```

  az arcdata dc upload --path metrics.json

  az arcdata dc upload --path logs.json

  az arcdata dc upload --path usage.json

  清单 9-7

  用于从 json 文件上传指标和日志的 azure-cli 命令

  ```


  在这种情况下，`az` 将为每个组件确认上传，如图 9-10 所示。


  ![](img/505695_2_En_9_Fig10_HTML.png)


  图 9-10


  清单 9-7 的输出


  上传现已完成。你现在可以继续创建一个结合了导出和上传的脚本文件，并安排它定期运行，例如通过 `cron`、Windows 计划任务或你选择的任何其他方法，以便持续将你的见解推送并在门户中显示。


  ### 在 Azure 门户中监控你的资源


  首次为某个资源上传日志和指标后，可以通过在 Azure 门户中搜索找到它们（参见图 9-11），它们与直接模式创建并因此已提前显示的资源并列。


  ![](img/505695_2_En_9_Fig11_HTML.jpg)


  图 9-11


  在 Azure 门户中显示的 Arc 托管实例


  或者，Azure Data Studio 中每个数据实例的仪表板都有一个深度链接——就像访问内置仪表板时一样——指向 Azure 门户中的该实例，如图 9-12
  所示。


  ![](img/505695_2_En_9_Fig12_HTML.jpg)


  图 9-12


  从 ADS 到门户中 Arc MI 的链接


  在门户中，你将再次看到实例的详细信息，例如哪个数据控制器在管理它，以及指标和日志的子页面（参见图 9-13）。


  ![](img/505695_2_En_9_Fig13_HTML.jpg)


