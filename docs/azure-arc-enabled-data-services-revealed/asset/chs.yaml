  \n代码清单 7-6 为我们描述了一个 SQL 托管实例的 YAML 清单。\n\n```\napiVersion: sql.arcdata.microsoft.com/v2\n\
  kind: SqlManagedInstance\nmetadata:\n  name: mi-4\nspec:\n  security:\n    adminLoginSecret:\
  \ mi-4-login-secret\n  scheduling:\n    default:\n      resources:\n        limits:\n\
  \          cpu: \"2\"\n          memory: 4Gi\n        requests:\n          cpu:\
  \ \"1\"\n          memory: 2Gi\n  services:\n    primary:\n      type: NodePort\n\
  \  storage:\n    backups:\n      volumes:\n      - className: local-storage\n  \
  \      size: 5Gi\n    data:\n      volumes:\n      - className: local-storage\n\
  \        size: 5Gi\n    datalogs:\n      volumes:\n      - className: local-storage\n\
  \        size: 5Gi\n    logs:\n      volumes:\n      - className: local-storage\n\
  \        size: 5Gi\n```\n代码清单 7-6\nArc SQL 托管实例的 YAML 清单\n\n由于我们还需要对托管实例进行身份验证，因此需要将用户名和密码存储在\
