    ''other'', ''auto'']）并使客户端使用本地 Kubernetes 工具（由 `--use-k8s` 开关触发）。替代方法是使用 Azure
    资源管理器，这将在下一章中用于我们的直接连接数据控制器。


    还有几个参数，并且此示例中提到的所有参数并非都是必需的。你可以在 [*https://docs.microsoft.com/en-us/cli/azure/arcdata*](https://docs.microsoft.com/en-us/cli/azure/arcdata)
    找到完整的参考。


    ```

    az arcdata dc config list

    清单 5-4

    检索 Arc 数据控制器的配置配置文件列表

    ```


    此命令将返回支持的选项列表，如图 5-3 所示。每个选项都将具有针对特定环境（如存储、安全性和网络集成）的预设但可调整的配置。


    ![](img/505695_2_En_5_Fig3_HTML.jpg)


    图 5-3


    Arc 数据控制器的配置配置文件列表


    如果你的所需平台不在列表中，或者你需要更改配置文件的默认设置，也可以从使用代码清单 5-5 中的代码创建自定义配置开始。


    ```

    az arcdata dc config init -p customconfig --source azure-arc-kubeadm

    清单 5-5

    用于初始化自定义配置的 azure-cli 命令

    ```


    这将在名为 `customconfig` 的目录中创建一个名为 `control.json` 的文件。该文件类似于我们在代码清单 5-6 中看到的内容，可用于控制数据控制器部署的每个可配置参数。


    ```

    {

    "apiVersion": "arcdata.microsoft.com/v2",

    "kind": "DataController",

    "metadata": {

    "name": "datacontroller"

    },

    "spec": {

    "infrastructure": "",

    "credentials": {

    "serviceAccount": "sa-arc-controller",

    "dockerRegistry": "arc-private-registry",

    "domainServiceAccount": "domain-service-account-secret"

    },

    "docker": {

    "registry": "mcr.microsoft.com",

    "repository": "arcdata",

    "imageTag": "v1.1.0_2021-11-02",

    "imagePullPolicy": "Always"

    },

    "storage": {

    "data": {

    "className": "",

    "size": "15Gi",

    "accessMode": "ReadWriteOnce"

    },

    "logs": {

    "className": "",

    "size": "10Gi",

    "accessMode": "ReadWriteOnce"

    }

    },

    "security": {

    "allowDumps": true,

    "allowNodeMetricsCollection": true,

    "allowPodMetricsCollection": true

    },

    "services": [

    {

    "name": "controller",

    "serviceType": "NodePort",

    "port": 30080

    }

    ],

    "settings": {

    "azure": {

    "autoUploadMetrics": "false",

    "autoUploadLogs": "false"

    },

    "controller": {

    "logs.rotation.size": "5000",

    "logs.rotation.days": "7"

    },

    "ElasticSearch": {

    "vm.max_map_count": "-1"

    }

    }

    }

    }

    清单 5-6

    示例 `control.json` 文件

    ```


    如果想使用自定义配置而不是预配置的配置文件进行部署，可以将 `--profile-name` 参数（而不是 *profile name*）传递给 `azure-cli`，如代码清单
    5-7 所示。


    ```

    az arcdata dc create     --connectivity-mode Indirect `

    --name arc-dc-local `

    --k8s-namespace arc `

    --subscription  `

    --resource-group arcBook `

    --location eastus `

    --profile-name PATH `

    --use-k8s

    清单 5-7

    使用自定义配置创建数据控制器的 azure-cli 命令

    ```


    无论你选择哪种方式，CLI 都会首先要求你提供要使用的用户名和密码（可能还需要接受许可协议），然后开始部署过程。过程的持续时间将取决于目标机器的性能和互联网连接，完成后，输出应类似于我们在图
    5-4 中看到的内容。


    ![](img/505695_2_En_5_Fig4_HTML.png)


    图 5-4


    数据控制器部署的输出


    如果希望避免被提示输入 EULA、用户名和密码，也可以在环境变量中提供它们：


    *   `ACCEPT_EULA`：将其设置为 `Y`

    *   `AZDATA_USERNAME`：要使用的用户名，例如 `arcadmin`

    *   `AZDATA_PASSWORD`：你选择的强密码

    *   `AZDATA_LOGSUI_USERNAME` 和 `AZDATA_LOGSUI_PASSWORD`：日志仪表板的用户名和密码

    *   `AZDATA_METRICSUI_USERNAME` 和 `AZDATA_METRICSUI_PASSWORD`：指标仪表板的用户名和密码


    **注意** 如果未提供 `METRICSUI` 和 `LOGSUI`，则它们将回退到 `AZDATA` 用户名/密码。


    这将使 `azure-cli` 使用这些值，而不是以交互方式提示你。使用环境变量时，可以为日志 UI、指标 UI 和控制器本身提供专用用户。以交互方式输入时，它们都将使用相同的凭据。


    如果想在 Kubernetes 端监控部署，可以运行代码清单 5-8 中的 `kubectl` 命令来跟踪进度。


    ```

    kubectl get pods -n arc --watch

    清单 5-8

    使用 kubectl 监控部署状态

    ```


    使用 `--watch` 开关，每当 Pod 中就绪容器的状态或数量发生变化时，输出都会持续更新。输出将如图 5-5 所示，并在 Pod 状态变化时持续更新。


    ![](img/505695_2_En_5_Fig5_HTML.jpg)


    图 5-5


    代码清单 5-8 的输出


    部署完成后，你可以使用 `az` 来，例如，使用代码清单 5-9 检索控制器的端点。


    ```

    az arcdata dc endpoint list -o table -k arc

    清单 5-9

    用于检索端点列表的 azure-cli 命令

    ```


    这将显示我们稍后可用于监控集群的端点，类似于图 5-6 中的输出。


    ![](img/505695_2_En_5_Fig6_HTML.jpg)


    图 5-6


    数据控制器端点列表


    你的第一个数据控制器现已准备就绪，我们将在接下来的章节中向你展示如何通过向其部署数据实例来开始使用它！

    '
- fmt: '## Deployment Through Azure Data Studio


    If you prefer a GUI-driven approach, you can use Azure Data Studio for that.


    Note


    If you are using the `NodePort` service type, you need to ensure that each Data
    Controller has different port numbers in the `control.json` file before deployment.
    You can’t have more than one Data Controller on the same Kubernetes Cluster using
    the same `NodePort` port numbers as they would have a conflict about the endpoint’s
    Ports!


    Let’s begin the process of deploying a Data Controller in Azure Data Studio. You
    can do that by navigating to the `AZURE ARC CONTROLLERS` section on the connections
    tab and click “+” as shown in Figure [5-7](#505695_2_En_5_Chapter.xhtml#Fig7).


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig7_HTML.jpg)

    Figure 5-7

    Start Arc Controller Deployment Wizard


    The wizard will first confirm that you want to deploy data as shown in Figure
    [5-8](#505695_2_En_5_Chapter.xhtml#Fig8).


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig8_HTML.jpg)

    Figure 5-8

    Arc Controller Deployment Wizard – select deployment options


    It will then verify that all required tools have been installed in the correct
    version as shown in Figure [5-9](#505695_2_En_5_Chapter.xhtml#Fig9).


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig9_HTML.png)

    Figure 5-9

    Arc Controller Deployment Wizard – prerequisites


    In the next step (Figure [5-10](#505695_2_En_5_Chapter.xhtml#Fig10)), you will
    set the Kubernetes context to be used for this deployment.


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig10_HTML.jpg)

    Figure 5-10

    Arc Controller Deployment Wizard – step 2


    This will be followed by the configuration profile to be used as shown in Figure
    [5-11](#505695_2_En_5_Chapter.xhtml#Fig11).


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig11_HTML.jpg)

    Figure 5-11

    Arc Controller Deployment Wizard – step 3


    The fourth step, which is shown in Figure [5-12](#505695_2_En_5_Chapter.xhtml#Fig12),
    will ask for the Azure configuration to be used for deployment. This consists
    of your Azure account, subscription, and resource group as well as the location
    to be used.


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig12_HTML.png)

    Figure 5-12

    Arc Controller Deployment Wizard – step 4


    Step 5 (see Figure [5-13](#505695_2_En_5_Chapter.xhtml#Fig13)) will define the
    controller configuration, so the Namespace to be used within Kubernetes, the name
    of the Data Controller to make it recognizable in the Azure Portal, the Storage
    Class and infrastructure type, a username, as well as the password for this Controller.


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig13_HTML.png)

    Figure 5-13

    Arc Controller Deployment Wizard – step 5


    The final step 6 will simply provide you a summary of your chosen settings as
    shown in Figure [5-14](#505695_2_En_5_Chapter.xhtml#Fig14).


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig14_HTML.png)

    Figure 5-14

    Arc Controller Deployment Wizard – step 6


    You can confirm these settings using the `Script to notebook` button at the bottom
    which will create a python-based Jupyter Notebook which can be executed using
    the `Run all` button (see Figure [5-15](#505695_2_En_5_Chapter.xhtml#Fig15)) or
    deploy right away using the `Deploy` button.


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig15_HTML.png)

    Figure 5-15

    Run all button for a Jupyter Notebook in Azure Data Studio


    Since we already deployed a Data Controller, we can skip this part.


    In Azure Data Studio, we can also add our existing Controller so it can be managed
    from here. To do so, click the `Connect Controller` button as shown in Figure
    [5-16](#505695_2_En_5_Chapter.xhtml#Fig16).


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig16_HTML.jpg)

    Figure 5-16

    Add Arc Controller to Azure Data Studio


    This will trigger a dialog that requires your Controller’s Namespace and Cluster
    (see Figure [5-17](#505695_2_En_5_Chapter.xhtml#Fig17)).


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig17_HTML.jpg)

    Figure 5-17

    Add Arc Controller to Azure Data Studio – connection details


    Once you’ve provided these settings and added the Controller, it will show up
    in ADS (see Figure [5-18](#505695_2_En_5_Chapter.xhtml#Fig18)).


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig18_HTML.jpg)

    Figure 5-18

    Arc Data Controller showing in Azure Data Studio


    If you right-mouse-click the Controller and select `manage`, the Controller’s
    settings will be shown.


    On the settings page, you will once again see its endpoint, Namespace, etc. An
    example can be seen in Figure [5-19](#505695_2_En_5_Chapter.xhtml#Fig19).


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig19_HTML.png)

    Figure 5-19

    Arc Data Controller Management page in Azure Data Studio


    You have now deployed an Arc Data Controller and added it to the inventory that
    can be managed from Azure Data Studio.


    ## Summary and Key Takeaways


    In this chapter, we’ve deployed our first Azure Arc Data Controller – in indirect
    mode.


    The next chapter, on the other hand, will walk you through the setup of a directly
    connected Cluster.


    # 6. Deploying a Data Controller in Direct Mode


    While we’ve started deploying our first Data Controller in the previous chapter,
    where we’ve used the indirectly connected mode, let’s also take a look at direct
    mode Data Controllers. Unlike an indirectly connected Controller, a direct mode
    Controller will constantly be connected to the Azure Portal, meaning that you
    don’t have to manually upload any usage or log data and also can use this Controller’s
    data for real-time analysis and alerting.


    Note


    Depending on the type of Kubernetes Cluster you are using, you may not be able
    to deploy this direct mode Data Controller to the same Cluster due to conflicting
    ports and resources.


    If you are using a `kubeadm`-based Cluster as described in this book, delete the
    indirectly connected Data Controller first, or deploy a second Kubernetes Cluster.
    While it is possible to run a direct and indirect Data Controller on the same
    Cluster in parallel, this requires a few extra steps, and the use cases for this
    are so slim that it’s out of scope for this book.'
