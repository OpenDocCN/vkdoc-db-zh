    *   对于使用 Kubernetes 原生工具部署和管理工作负载的数据服务，SQL Server 工程团队采用云原生方法，并为每个 Azure Arc 启用的数据服务、数据控制器本身以及诸如数据库恢复操作等管理任务创建了自定义资源定义。自定义资源定义是
    Kubernetes 的一个结构，允许开发人员扩展 Kubernetes API 并创建自定义 API 对象。自定义资源定义可以具有额外的配置、数据，甚至控制集群中对象的行为。因此，当使用
    Kubernetes 原生工具定义工作负载时，会使用这些自定义资源定义 API 对象。既然我们已经介绍了用于部署的工具，让我们继续更仔细地看看可以部署的 Azure
    Arc 启用的数据服务。


    ## 介绍 Azure Arc 启用的数据服务


    在本节中，我们将首先介绍 Azure Arc 启用的数据服务架构。接下来，我们将介绍可用的基于 PaaS 的数据服务，特别是 SQL Managed Instance
    和 PostgreSQL Hyperscale。然后，作为本节的结尾，我们将介绍在设计专注于计算和存储资源的解决方案时的部署技术和部署注意事项。

    '
- fmt: '### Azure Arc-enabled Data Services Architecture


    Azure Arc-enabled Data Services Architecture is a layered architecture of hardware,
    Kubernetes, Management/Control Plane, and Data Services. Figure [2-2](#505695_2_En_2_Chapter.xhtml#Fig2)
    highlights the architecture.


    ![](images/505695_2_En_2_Chapter/505695_2_En_2_Fig2_HTML.jpg)

    *Figure 2-2*


    Azure Arc-enabled Data Services Architecture is a layered architecture of hardware,
    Kubernetes, Management, and deployed Data Services.


    The foundational layer is hardware which can be either on-premises or in any cloud
    and built on either physical or virtual machines. Then next, Kubernetes is deployed
    on that hardware. And as we learned in the previous chapter, Kubernetes enables
    you to quickly and consistently deploy applications in code in the Cluster. Then,
    deployed inside the Kubernetes Cluster is the Arc Management Control Plane. The
    Arc Management Control Plane is Azure Arc''s brains and extends Azure Resource
    Manager (ARM) to your on-premises or hybrid cloud deployments. And on top of all
    of that is Azure Arc-enabled Data Services. These are the traditionally PaaS-based
    offerings that you can deploy anywhere you have Azure Arc, on-premises or in any
    cloud. Now, let''s look at each layer of this architecture in more detail.


    #### Hardware Layer


    The Azure Arc Data Services Architecture is built on `physical or virtual machine-based
    servers`. Each server contributes some amount of CPU and memory capacity for applications
    to run on. As introduced in the previous chapter on Kubernetes, a Kubernetes Cluster
    server is called a Node. Each Node''s number and size depend on the size requirements
    of the workload deployed and some additional capacity for a Node''s failure in
    the Kubernetes Cluster. Further, you can expand and contract the amount of resources
    in a Kubernetes Cluster by adding or removing servers. We will explore this topic
    in more detail later in this chapter.


    Each Node must run the `Linux operating system` since all of the containers running
    in Azure Arc-enabled Data Services are Linux-based containers.


    In addition to the compute resources, `persistent storage` is required. Persistent
    storage is allocated to workloads deployed in Azure Arc-enabled Data Services
    using the storage constructs introduced in the previous chapter. Storage Classes
    dynamically allocate Persistent Volumes for workloads deployed in the Kubernetes
    Cluster. The type of storage provisioned can be any of the storage types supported
    by your version of Kubernetes exposed as Storage Classes. Further, you can increase
    the allocatable storage capacity in a Cluster or even add additional storage types
    by defining additional Storage Classes.


    #### Kubernetes Layer


    With the underlying hardware in place, the next layer in the architecture is Kubernetes.
    Kubernetes, regardless of distribution, provides a consistent API for building
    workloads, and because of this, Azure Arc-enabled Data Services support several
    Kubernetes distributions. Supported distributions include open source/upstream
    Kubernetes Clusters built with kubeadm and commercial distributions like RedHat’s
    OpenShift.


    At the time of writing, there are several `supported Kubernetes distributions`
    based on the deployment mechanism:

    *   Open source, upstream Kubernetes, deployed with kubeadm

    *   OpenShift Container Platform (OCP)


    Several `managed service offerings` are supported:

    *   Azure Kubernetes Service (AKS)

    *   Azure Kubernetes Service (AKS) on Azure Stack

    *   Azure Kubernetes Service (AKS) on Azure Stack HCI

    *   Azure RedHat OpenShift (ARO)

    *   AWS Elastic Kubernetes Service (EKS)

    *   Google Cloud Kubernetes Engine (GKE)


    > Note

    >

    > For more information on specific versions of the various Kubernetes distributions
    supported, please check out this link: [*https://docs.microsoft.com/en-us/azure/azure-arc/kubernetes/validation-program*](https://docs.microsoft.com/en-us/azure/azure-arc/kubernetes/validation-program)*.*


    The key concept here is that you can deploy Azure Arc-enabled Data Services on
    any distribution of Kubernetes anywhere you need to deploy, on-premises or in
    a hybrid cloud scenario. You have the choice of using upstream/open source Kubernetes
    and also many of the managed service offerings. Once you have Kubernetes up and
    running, the next thing to do is extend Azure into your Cluster by deploying an
    Azure Arc Data Services Data Controller.


    #### Azure Arc Management Control Plane Layer


    With Kubernetes deployed, the next layer in the architecture is the Arc Management
    Control Plane Layer which extends Azure’s management capabilities to your on-premises
    or hybrid cloud environment. At this layer, in Azure Arc-enabled Data Services,
    a `Data Controller` is deployed. The Data Controller is deployed as a Custom Resource
    in Kubernetes. The Data Controller implements core functionality such as Azure
    Arc Integration and management services. Let’s look closer at each of these.


    The Azure Arc Integration is what sends logging, performance, and usage information
    back into Azure based on the data services workloads deployed. The Data Controller
    extends Azure Resource Manager to your on-premises or hybrid cloud deployment
    and lights up the Azure Arc-enabled services to manage the deployed applications
    and resources. The management services implemented by the Data Controller include
    a Controller Service and API Endpoint, provisioning management, management and
    performance dashboards, metrics, logging, managed backup/restore, and high-availability
    service coordination. We will dive deeper into the Data Controller and its core
    functions in an upcoming section. With the Controller online, the next layer in
    the architecture is to deploy data services workloads.


    > Note

    >

    > We want to call out that the Data Controller is for managing Azure Arc-enabled
    Data Services. Azure Arc-enabled Servers, Kubernetes, and SQL Servers each rely
    on agents installed on the Azure Arc-managed resources.


    #### Data Services Layer


    The final layer in an Azure Arc-enabled Data Services Architecture is the data
    services themselves. Azure Arc-enabled Data Services enable you to self-provision
    traditionally Azure Public Cloud PaaS-based services like SQL Managed Instance
    and PostgreSQL Hyperscale in our on-premises or hybrid cloud environments on Kubernetes.
    `Azure Arc-enabled SQL Managed Instance` is your lift-and-shift version of SQL
    Server, enabling you to move workloads seamlessly into Azure Arc-enabled Data
    Services as it provides a high level of compatibility with on-premises installations
    of SQL Server. Next, `Azure Arc-enabled PostgreSQL Hyperscale` is the leading
    open source database used as a data store for mission-critical applications. PostgreSQL
    Hyperscale is an implementation in Azure that enables you to horizontally scale
    data by sharding it across multiple instances and allows for distributed parallel
    query execution. These data services are deployed as resources in Kubernetes and
    are managed by the Data Controller.


    To recap, essentially, wherever you have hardware and deploy Kubernetes and a
    Data Controller, Azure Arc-enabled Data Services can be deployed.'
