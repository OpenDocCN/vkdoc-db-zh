- fmt: '# Deploy a Direct Mode Data Controller


    Since a directly connected Azure Arc Data Controller is basically an Azure resource
    like any other (despite only its metadata residing in Azure), we could also deploy
    it through the CLI or an ARM template, for example.


    We’ll however focus on the approach through the Azure Portal. Feel free to reuse
    the resulting ARM template from this process – we just think that it is super
    cool how you can deploy a resource online in the Portal which will then show up
    in our on-premises Kubernetes Cluster.


    To start the deployment, navigate to the Create Azure Arc Data Controller blade
    in the Portal at `https://portal.azure.com/#create/Microsoft.DataController`,
    and select that you’re planning to use an Azure Arc-enabled Kubernetes Cluster,
    so direct connectivity mode, as shown in Figure [6-9](#505695_2_En_6_Chapter.xhtml#Fig9).


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig9_HTML.png)


    Figure 6-9: Create Azure Arc Data Controller in Azure Portal


    On the next screen, as visible in Figure [6-10](#505695_2_En_6_Chapter.xhtml#Fig10),
    you’ll start by providing a subscription and resource group to be used for your
    Data Controller’s metadata as well as a name for the Controller.


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig10_HTML.jpg)


    Figure 6-10: Data Controller details


    On the same screen, you will need to either select the custom location to be used
    or create one as shown in Figure [6-11](#505695_2_En_6_Chapter.xhtml#Fig11).


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig11_HTML.jpg)


    Figure 6-11: Create new custom location


    Still on the same, first screen, we will also provide the Kubernetes configuration
    – information like Storage Classes, etc., which we’ve provided through the command
    line in the previous chapter as well as the service type and the credentials to
    be used for the built-in dashboards for metrics and logs (Figure [6-12](#505695_2_En_6_Chapter.xhtml#Fig12)).


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig12_HTML.jpg)


    Figure 6-12: Kubernetes configuration and dashboard credentials


    Moving on to the next screen “Additional Settings” (see Figure [6-13](#505695_2_En_6_Chapter.xhtml#Fig13)),
    we can enable or disable the automatic uploads of metrics and logs. It is highly
    recommended to keep them both enabled to make sure you benefit from features like
    real-time alerts. When activating them, you will also need to select the Log Analytics
    Workspace to be used and provide its primary key which we’ve retrieved earlier
    through Listing [6-9](#505695_2_En_6_Chapter.xhtml#PC9).


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig13_HTML.jpg)


    Figure 6-13: Metrics and logs upload


    In the last configuration step, visible in Figure [6-14](#505695_2_En_6_Chapter.xhtml#Fig14),
    you can provide tags for the Data Controller which is especially helpful when
    using multiple Controllers in different locations.


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig14_HTML.jpg)


    Figure 6-14: Azure tags


    From there, you can finalize the deployment and create the Data Controller which
    will confirm back similarly as shown in Figure [6-15](#505695_2_En_6_Chapter.xhtml#Fig15).


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig15_HTML.jpg)


    Figure 6-15: Deployment complete


    Our new Azure Arc Data Controller will also show up in our resource group immediately
    as you can see in Figure [6-16](#505695_2_En_6_Chapter.xhtml#Fig16).


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig16_HTML.jpg)


    Figure 6-16: Data Controller showing in Azure Resource Group


    This only means, however, that the deployment command has been sent to the Kubernetes
    Cluster. We can monitor the actual deployment through `kubectl` using the command
    in Listing [6-10](#505695_2_En_6_Chapter.xhtml#PC10).


    ```

    kubectl get pods -n arc-direct

    ```


    Listing 6-10: `kubectl` command to list Pods in Namespace `arc-direct`


    As you can see in Figure [6-17](#505695_2_En_6_Chapter.xhtml#Fig17), the first
    few Pods have been started to create alongside our pre-existing bootstrapper.


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig17_HTML.jpg)


    Figure 6-17: Pods in `arc-direct` Namespace during deployment


    If you rerun the command from Listing [6-10](#505695_2_En_6_Chapter.xhtml#PC10)
    after a while, you should see all the Pods of a Data Controller, similar to the
    ones from our indirect mode deployment in the previous chapter, shown in Figure
    [6-18](#505695_2_En_6_Chapter.xhtml#Fig18).


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig18_HTML.jpg)


    Figure 6-18: Pods in `arc-direct` Namespace after deployment


    You can also verify the status of this Data Controller using the command from
    Listing [6-11](#505695_2_En_6_Chapter.xhtml#PC11).


    ```

    az arcdata dc status show --k8s-namespace arc-direct --use-k8s

    ```


    Listing 6-11: `azure-cli` command to retrieve a Data Controller’s status


    As shown in Figure [6-19](#505695_2_En_6_Chapter.xhtml#Fig19), the Controller
    is showing as ready.


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig19_HTML.jpg)


    Figure 6-19: Data Controller status


    To add this Cluster in Azure Data Studio, simply use the same process as when
    adding the indirect mode Controller and provide the Controller’s Kubernetes Namespace
    as shown in Figure [6-20](#505695_2_En_6_Chapter.xhtml#Fig20).


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig20_HTML.jpg)


    Figure 6-20: Connect existing Data Controller in ADS


    In Azure Data Studio, after adding the Controller, we can also verify again that
    this Controller is in direct connection mode (Figure [6-21](#505695_2_En_6_Chapter.xhtml#Fig21)).


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig21_HTML.jpg)


    Figure 6-21: Data Controller details in ADS


    Our direct connected Data Controller is now manageable and accessible through
    the Azure Portal, the command line, and Azure Data Studio.


    ## Summary and Key Takeaways


    This and the previous chapter got us another big step closer to working with our
    first instance of Arc-enabled Data Services by deploying Data Controllers in either
    direct or indirect mode.


    Now, let’s bridge the last gap to get ready doing something useful with our Arc-enabled
    Data Services deployment in the next chapter by deploying a SQL Managed Instance
    into our Controller.


    # 7. Deploying an Azure Arc-enabled SQL Managed Instance


    With our Data Controllers ready and waiting, we can now go ahead and start deploying
    a first database instance so we can start working with our Arc-enabled Data Services
    installation.


    Similar to the deployment of the Data Controller, we can either use the command
    line or a wizard in Azure Data Studio or the Azure Portal for this.


    **Note**

    All our instance deployments will target an indirectly connected Data Controller
    unless it’s stated otherwise.'
  raw: '## Deploy a Direct Mode Data Controller


    Since a directly connected Azure Arc Data Controller is basically an Azure resource
    like any other (despite only its metadata residing in Azure), we could also deploy
    it through the CLI or an ARM template, for example.


    We’ll however focus on the approach through the Azure Portal. Feel free to reuse
    the resulting ARM template from this process – we just think that it is super
    cool how you can deploy a resource online in the Portal which will then show up
    in our on-premises Kubernetes Cluster.


    To start the deployment, navigate to the Create Azure Arc Data Controller blade
    in the Portal at [*https://portal.azure.com/#create/Microsoft.DataController*](https://portal.azure.com/%2523create/Microsoft.DataController)*,*
    and select that you’re planning to use an Azure Arc-enabled Kubernetes Cluster,
    so direct connectivity mode, as shown in Figure [6-9](#505695_2_En_6_Chapter.xhtml#Fig9).


