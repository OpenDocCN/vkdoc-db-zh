    to influence the Scheduler. Taints and Tolerations are useful in scenarios where
    the Cluster administrator needs to influence scheduling without depending on the
    user deploying the workload. For more information and additional example scenarios,
    check out [*https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/*](https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/).


    For a deeper dive into storage and scheduling in Kubernetes, check out the Pluralsight
    course “Configuring and Managing Kubernetes Storage and Scheduling” where we cover
    all of these scenarios in great detail and also with worked examples at [*www.pluralsight.com*](http://www.pluralsight.com).


    #### Resource Consumption


    By default, Pods will have access to all of the resources available on the Node
    they are scheduled on. For example, if you have a Node with four cores and 32GB
    of RAM and SQL Server Pod starts on that Node, the SQL Server process running
    in that Pod will have access to all four cores and all 32GB of RAM. Due to the
    nature of how SQL Server allocates and consumes memory, it is possible that a
    single SQL Server Pod could consume all of the memory available on the Node, especially
    if Max Server Memory is not set. SQL Server will also be able to schedule workload
    across all four cores This can lead to resource contention when running multiple
    Pods on a Node. Kubernetes gives us some configuration parameters to help manage
    resource consumption in Pods. When defining workloads in Kubernetes, two configuration
    properties in the Pod spec can help you control resource allocation in Pods deployed
    in Kubernetes: *Limits* and *Requests*. Let’s look at each in more detail:


    *   **Limits**: For an individual Pod, a Limit is an upper boundary for memory
    or CPU. Limits are used to ensure that a Pod cannot consume more resources than
    is appropriate for its workload. When a Limit is set for a Pod, it can only see
    that amount of memory or CPU. If you create a SQL Server Pod with a memory limit
    of 16GB of RAM, the SQL Server Pod will see only 16GB of RAM. If you define a
    CPU limit of two, the SQL Server process will see only two CPUs. Limits are critical
    for capacity planning. They ensure that you are allocating your Cluster’s resources
    appropriately and not allowing Pods to consume all of the resources on a Node.
    In our example, if our Nodes have only 32GB of RAM, setting memory and CPU Limits
    on the Pod will ensure that this Pod will not consume all of the available memory
    and CPUs on that Node.


    *   **Requests**: In the previous section, we introduced Requests in the context
    of scheduling. Let’s look more closely at them in the context of resource management.
    Requests are resource guarantees. With Requests, we can define the exact amount
    of CPU or memory a Pod needs to run properly, and that amount of CPU or memory
    must be available on a Node in the Cluster for that Pod to start. The Scheduler
    uses this information to find an appropriate Node to run the Pod. If it is not
    available, the Pod will neither be scheduled nor started. Requests are used to
    ensure that a Pod has the appropriate amount of resources to run its workload
    and never any less.


    Using Limits and Requests gives you the ability to ensure workloads running share
    the resources of the Cluster using appropriate resources and also ensure your
    workloads have access to the resource needed. When defining workloads with Azure
    Arc-enabled Data Services, both SQL Managed Instance and PostgreSQL Hyperscale
    deployments give you the ability to set both Limits and Requests on the Pods created.
    It is recommended that you *always* set both a Limit and a Request when defining
    workloads to help ensure a well-performing and well-balanced workload in your
    Cluster.


    Tip


    For a closer look at how SQL Server and Kubernetes memory management works, check
    out [*www.centinosystems.com/blog/sql/memory-settings-for-running-sql-server-in-kubernetes/*](https://www.centinosystems.com/blog/sql/memory-settings-for-running-sql-server-in-kubernetes/).


    ### Networking Fundamentals


    The final major topic in our Kubernetes primer chapter is networking. The Kubernetes
    networking model enables workloads to be deployed in Kubernetes while abstracting
    away network complexities. This simplifies application configuration and service
    discovery in a Cluster and increases the portability of deployment code by removing
    infrastructure-specific code. This section introduces the Kubernetes networking
    model and example Cluster communication patterns.


    Three rules govern Kubernetes’ networking. These rules enable the simplicity described
    earlier. These rules are from [*https://kubernetes.io/docs/concepts/cluster-administration/networking/*](https://kubernetes.io/docs/concepts/cluster-administration/networking/).'
  trans: '

    ## Pod 调度技术


    *   `亲和性与反亲和性`：影响`Pod`被调度到哪些`节点`的另一种方式是`亲和性`和`反亲和性`。在定义工作负载时，这种技术能让你更精细地控制`Pod`的调度方式。最基本地，`亲和性`告诉`调度器`，某些`Pod`应被调度到共享某种资源（例如一个`节点`，或者云或数据中心内的一个故障域）的地方。`亲和性`常用于确保需要高性能通信的`Pod`应用被共同安置。`反亲和性`则相反，它确保`Pod`**不**被共同安置在同一资源（如一个`节点`或故障域）上。`反亲和性`常出于性能或可用性原因，用于确保`Pod`运行在不同的资源上。更多关于`亲和性`和`反亲和性`的信息，请参见
    `https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity`。


    *   `污点与容忍`：这是另一种帮助`调度器`决定将`Pod`调度到哪些`节点`的技术。`亲和性`与`反亲和性`以及`节点`选择器用于将`Pod`**吸引**到某个`节点`。`污点`和`容忍`则用于将`Pod`从`节点`**排斥**开。当对一个`节点`施加`污点`时，就没有`Pod`能被调度到该`节点`。一个`Pod`可以定义对某个`污点`的`容忍`。当`Pod`的`容忍`与某个`节点`的`污点`匹配时，它就可以被调度到定义了该`污点`的`节点`上。前面介绍的影响调度的技术，都要求部署`Pod`的用户在他们的`Deployment`中定义相应的结构来影响`调度器`。`污点`与`容忍`在集群管理员需要影响调度，但不依赖部署工作负载的用户的场景下非常有用。更多信息和额外的示例场景，请查阅
    `https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/`。


    要更深入地了解`Kubernetes`中的存储和调度，请查看 Pluralsight 课程“Configuring and Managing `Kubernetes`
    Storage and Scheduling”，我们在其中详细介绍了所有这些场景，并提供了实际案例，网址是 `www.pluralsight.com`。


    ### 资源消耗


    默认情况下，`Pod`将能够使用其被调度到的`节点`上所有可用的资源。例如，如果你有一个具备 4 个核心和 32GB 内存的`节点`，并且一个`SQL Server`
    `Pod`在该`节点`上启动，那么运行在该`Pod`内的`SQL Server`进程将能访问全部 4 个核心和全部 32GB 内存。由于`SQL Server`分配和消耗内存的方式，单个`SQL
    Server` `Pod`有可能消耗掉`节点`上所有可用的内存，尤其是在未设置`最大服务器内存`的情况下。`SQL Server`也能在所有 4 个核心上调度工作负载。当在同一个`节点`上运行多个`Pod`时，这可能导致资源争用。`Kubernetes`提供了一些配置参数来帮助管理`Pod`中的资源消耗。在`Kubernetes`中定义工作负载时，`Pod`规范中有两个配置属性可以帮助你控制部署在`Kubernetes`中的`Pod`的资源分配：`限制`和`请求`。让我们更详细地看看每一个：


    *   `限制`：对于单个`Pod`，`限制`是内存或 CPU 的上限。`限制`用于确保`Pod`消耗的资源不会超过其工作负载所需的适当范围。当为`Pod`设置了`限制`时，它只能看到指定数量的内存或
    CPU。如果你创建一个内存限制为 16GB 的`SQL Server` `Pod`，该`SQL Server` `Pod`将只看到 16GB 内存。如果你定义
    CPU 限制为 2，`SQL Server`进程将只看到 2 个 CPU。`限制`对于容量规划至关重要。它们确保你恰当地分配集群的资源，并防止`Pod`消耗掉`节点`上的所有资源。在我们的例子中，如果`节点`只有
    32GB 内存，对`Pod`设置内存和 CPU`限制`将确保该`Pod`不会消耗掉该`节点`上所有可用的内存和 CPU。


    *   `请求`：在上一节中，我们在调度的上下文中介绍了`请求`。现在让我们在资源管理的上下文中更仔细地看看它们。`请求`是资源保证。通过`请求`，我们可以定义一个`Pod`正常运行所需的确切
    CPU 或内存量，并且该数量的 CPU 或内存必须在集群的某个`节点`上可用，该`Pod`才能启动。`调度器`利用这些信息来找到合适的`节点`来运行`Pod`。如果资源不可用，`Pod`将既不会被调度，也不会被启动。`请求`用于确保`Pod`拥有运行其工作负载所需的适当资源量，绝不会更少。


    使用`限制`和`请求`使你能够确保运行的工作负载以适当的资源共享集群资源，并确保你的工作负载能获得所需的资源。当使用`启用 Azure Arc 的数据服务`定义工作负载时，`SQL
    托管实例`和`PostgreSQL 超大规模`部署都允许你对创建的`Pod`设置`限制`和`请求`。建议你在定义工作负载时`始终`同时设置`限制`和`请求`，以帮助确保集群中的工作负载性能良好且负载均衡。


    提示


    要更详细地了解`SQL Server`和`Kubernetes`内存管理的工作原理，请访问 `www.centinosystems.com/blog/sql/memory-settings-for-running-sql-server-in-kubernetes/`。


    ### 网络基础


    我们`Kubernetes`入门章节最后一个主要主题是网络。`Kubernetes`网络模型使得工作负载能够在`Kubernetes`中部署，同时抽象了网络的复杂性。这通过移除基础设施相关的代码，简化了集群中的应用配置和服务发现，并提高了部署代码的可移植性。本节介绍`Kubernetes`网络模型和示例集群通信模式。


    `Kubernetes`的网络遵循三条规则。这些规则实现了前述的简洁性。这些规则源自 `https://kubernetes.io/docs/concepts/cluster-administration/networking/`。

    '
- fmt: "# Kubernetes Network Model Rules\n\n1.  所有`Pod`可以在所有`Node`上相互通信，无需网络地址转换（NAT）。\n\
    2.  `Node`上的所有代理（例如系统守护进程和`kubelet`）可以与该`Node`上的所有`Pod`通信。\n3.  处于`Node`主机网络中的`Pod`可以与所有`Node`上的所有`Pod`通信，无需NAT。\n\
    \n前面的规则通过确保`Pod`使用其实际的`Pod IP`和容器端口相互通信（而非将其转换为依赖于部署网络基础设施的`IP`方案），简化了网络配置和应用程序配置。\n\
    \n在Kubernetes中，`Pod Network`是当容器运行时在`Node`上启动`Pod`时，`Pod`所连接到的网络。部署的每个`Pod`在`Pod\
    \ Network`上都会获得一个唯一的`IP`地址。`Pod Network`必须遵循前面定义的规则，这导致`Pod`使用其真实的`IP`地址。在实现`Pod\
    \ Network`时，有许多解决方案可以确保遵守Kubernetes网络模型规则。一个常见的解决方案是覆盖网络（overlay networking），它使用隧道协议在`Node`之间交换数据包，独立于底层物理基础设施的网络。这使得覆盖网络可以使用独立于数据中心物理基础设施的第3层`IP`方案，从而更简单地遵守Kubernetes网络模型。\n\
    \n另一个选项是作为裸机方法的一部分，在数据中心基础设施中构建`Pod Network`。这将需要Kubernetes集群管理员和负责网络的网络工程团队之间的协调。\n\
    \n以下是在Kubernetes集群中使用的常见通信模式，展示了`Pod`如何相互访问以及如何访问`Pod`提供的`Service`。第4章在集群安装过程中介绍了`Pod\
    \ Network`，第6章将深入探讨`Service`以及流量如何路由到`Pod Network`中的`Pod`。\n\n# Communication\
    \ Patterns\n\n图1-5展示了一些Kubernetes集群中的示例通信模式。让我们一起逐步了解它们：\n\n![](images/505695_2_En_1_Chapter/505695_2_En_1_Fig5_HTML.jpg)\n\
    \n图 1-5\n\nKubernetes网络\n\n1.  **在`Pod`内部。**\n    `Pod`内的多个容器共享相同的容器`Namespace`。这些容器可以通过`localhost`上的唯一端口进行相互通信。\n\
    \n2.  **同一`Node`内的`Pod`到`Pod`。**\n    当同一`Node`上的`Pod`需要通过网络通信时，它们通过`Node`上定义的本地软件桥（software\
    \ bridge）并使用`Pod IP`进行通信。\n\n3.  **不同`Node`上的`Pod`到`Pod`。**\n    当不同`Node`上的`Pod`需要通过网络通信时，它们通过本地第2层或第3层网络并使用`Pod\
    \ IP`进行通信。\n\n4.  **`Service`。**\n    当访问集群中的`Service`时，流量首先路由到实现该`Service`的`kube-proxy`，然后再路由到提供该应用程序服务的`Pod`。正如本章前面介绍的，`Service`将是您与集群中部署的应用程序进行交互的最常见方式。\n\
    \n# Kubernetes Role in Azure Arc-enabled Data Services\n\n在过去的几年里，SQL Server工程团队发布了一些令人兴奋的技术和创新——Linux上的SQL\
    \ Server、容器中的SQL Server、Kubernetes上的SQL Server以及Azure Data Studio——我们不禁要问，为什么？所有这些看似不同的技术背后的大图景是什么？我们第一次看到SQL\
    \ Server产品团队演示Azure Arc-enabled Data Services时，就是那个“顿悟”时刻。关键不在于这些单项技术有多酷，而在于将这些技术结合在一起所能实现的能力。在任何拥有Kubernetes的地方运行任何数据服务。\n\
    \n在Kubernetes内部运行数据服务使得Microsoft能够以代码定义系统。然后，由于Kubernetes提供的基础设施抽象，您可以在任何拥有Kubernetes的地方运行该代码。Kubernetes\
    \ API本质上是您数据中心或云中资源的包装器。编写用于部署系统的代码可以在任何实现了该API的地方运行，无论是在任何云中、边缘站点，还是本地数据中心。在本书的剩余部分，我们将向您展示Azure\
    \ Arc-enabled Data Services的价值主张，以及如何在任何拥有Kubernetes的地方部署和管理这些Azure Arc-enabled\
    \ Data Services。\n\n# Summary and Key Takeaways\n\n本章介绍了Kubernetes及其如何支持基于容器的现代应用程序的部署。您了解了Kubernetes\
    \ API如何允许您构建和建模部署到Kubernetes集群中的应用程序。您还学习了部署工作负载的核心API原语：作为基于容器应用程序的`Pod`；保持集群及其工作负载处于期望状态的`Controller`；用于访问应用程序的`Service`；以及用于有状态应用程序的存储。然后，您了解了集群的组件以及它们如何协同工作以确保实现您的期望状态，并快速浏览了调度、资源管理和Kubernetes网络模型。在掌握了所有这些理论之后，现在该进入下一章了，我们将在那里介绍Azure\
    \ Arc-enabled Data Services，讨论它解决的挑战，并深入探讨其架构、核心特性、工作负载的部署和管理方式以及关键的部署注意事项。\n\n\
    # 2. Azure Arc-enabled Data Services\n\n本章向您介绍Azure Arc-enabled Data Services！首先，您将了解现代混合云面临的一些挑战，然后我们将向您展示Azure\
    \ Arc如何应对这些挑战，以在本地或任何云中提供可大规模管理的解决方案。接下来，我们将介绍核心的Azure Arc启用资源，包括服务器、Kubernetes、SQL\
    \ Server和数据服务。然后，我们将更深入地探讨什么是Azure Arc-enabled Data Services、其架构、工作负载如何部署和管理，并讨论关键的部署注意事项，如计算和存储容量规划。\n\
    \n## The Challenge\n\n*   混合云正在成为企业系统架构的新常态。根据《Flexera 2020 State of the Cloud》（参见\
    \ [*www.flexera.com/about-us/press-center/flexera-releases-2020-state-of-the-cloud-report.html*](http://www.flexera.com/about-us/press-center/flexera-releases-2020-state-of-the-cloud-report.html)）报告，近87%的企业拥有混合云战略。混合云有几种变体。首先，组织可以采用资产分布在多个公有云（如Amazon\
    \ Web Service (AWS)、Google Cloud和Microsoft Azure）的混合云战略。这种模式通常被称为“多云”。第二种混合云战略是组织拥有一些云资产和一些本地资产。在这些场景中，组织通常会将最能从云中受益的基础设施部分放在云中。公司转向云的主要原因包括弹性、自动化、内置监控和安全以及按需付费的支付模型。\n\
    \n在管理和运营混合云环境（无论是多云还是本地与云混合）时，每个环境的管理、安全模型和工具可能各不相同。这就引出了一个问题：您如何大规模管理这些环境？当您拥有不同的管理、监控、安全和部署工具时，实现一致性和控制是具有挑战性的。Azure\
    \ Arc的目标是实现所有这些领域的一致性，统一管理、监控和安全服务以及部署工具，以便您可以在部署资源的任何地方（本地或任何云中）利用云的优势。"
  raw: "#### Kubernetes Network Model Rules\n\n1.  All Pods can communicate with each\
    \ other on all Nodes without Network Address Translation (NAT) .\n\n2.  All agents,\
    \ such as system daemons and the kubelet, on a Node, can communicate with all\
    \ Pods on that Node.\n\n3.  Pods in the host network of a Node can communicate\
    \ with all Pods on all Nodes without NAT.\n\nThe preceding rules simplify networking\
    \ and application configuration by ensuring Pods are talking to each other on\
    \ the actual Pod IPs and container ports rather than having them translated to\
    \ an IP scheme dependent upon the network infrastructure where they are deployed.\n\
    \nIn Kubernetes, a Pod Network is the network Pods are attached to when the container\
    \ runtime starts them on a Node. Each Pod deployed is given a unique IP address\
    \ on the Pod Network. Pod Networks must follow the rules defined earlier, which\
    \ result in Pods using their real IP addresses. When implementing Pod Networks,\
    \ there are many solutions to ensure adherence to the Kubernetes networking model\
    \ rule. A common solution is overlay networking, which uses a tunneling protocol\
    \ to exchange packets between Nodes independent of the underlying physical infrastructure’s\
    \ network. This enables the overlay network to use a layer 3 IP scheme independent\
    \ of the data center’s physical infrastructure, enabling simpler adherence to\
    \ the Kubernetes networking model.\n\nAnother option is to build a Pod Network\
    \ as part of a data center infrastructure as part of a bare-metal approach. This\
    \ will require the coordination of the Kubernetes Cluster administrator and the\
    \ network engineering team responsible for the network.\n\nThe following are common\
    \ communication patterns used in a Kubernetes Cluster showing Pods accessing each\
    \ other and also accessing the Services provided by Pods. Chapter [4](#505695_2_En_4_Chapter.xhtml)\
    \ introduces Pod Networks during the Cluster installation process, and Chapter\
    \ [6](#505695_2_En_6_Chapter.xhtml) will dive into Services and how traffic is\
    \ routed to Pods in the Pod Network.\n\n#### Communication Patterns\n\nFigure\
    \ [1-5](#505695_2_En_1_Chapter.xhtml#Fig5) shows some example communication patterns\
    \ in a Kubernetes Cluster. Let’s walk through each of those together:\n\n![](images/505695_2_En_1_Chapter/505695_2_En_1_Fig5_HTML.jpg)\n\
    \nFigure 1-5\n\nKubernetes networking\n\n1.  **Inside a Pod.**\n\n    Multiple\
    \ containers within a Pod share the same container Namespace. These containers\
    \ can communicate with each other over localhost on unique ports.\n\n2.  **Pod\
    \ to Pod within a Node.**\n\n    When Pods on the same Node need to communicate\
    \ over the network, they do so over a local software bridge defined on the Node\
    \ and use the Pod IP.\n\n3.  **Pod to Pod on another Node.**\n\n    When Pods\
    \ on different Nodes need to communicate over the network, they do so over the\
    \ local layer 2 or layer 3 network using the Pod IP.\n\n4.  **Services.**\n\n\
    \    When accessing Services in a Cluster, traffic is routed to the kube-proxy\
    \ implementing that Service and then routed to the Pod providing that application\
    \ service. As introduced earlier in this chapter, Services will be your most common\
    \ interaction with applications deployed in a Cluster.\n\n## Kubernetes Role in\
    \ Azure Arc-enabled Data Services\n\nOver the last few years, the SQL Server Engineering\
    \ Team has released some exciting technologies and innovations – SQL Server on\
    \ Linux, SQL Server on containers, SQL Server on Kubernetes, and Azure Data Studio\
    \ – and we couldn’t help but wonder, why? What’s the big picture on all of these\
    \ seemingly disparate technologies? The first time we saw the SQL Server Product\
    \ Team demonstrate Azure Arc-enabled Data Services is when we had that a-ha! moment.\
    \ It’s not the cool factor of each of these individual technologies, but what\
    \ bringing all of these technologies together enables. Running any Data Service,\
    \ anywhere you have Kubernetes.\n\nRunning Data Services inside Kubernetes enables\
    \ Microsoft to define systems in code. You can then run that code anywhere you\
    \ have Kubernetes because of the infrastructure abstraction that it provides.\
    \ The Kubernetes API is essentially a wrapper around the resources in your data\
    \ center or cloud. The code written to deploy systems can work anywhere that API\
    \ is implemented on, in any cloud, in edge sites, or even on-premises data centers.\
    \ Throughout the remainder of this book, we will show you the value proposition\
    \ of Azure Arc-enabled Data Services and how to deploy and manage those Azure\
    \ Arc-enabled Data Services anywhere you have Kubernetes.\n\n## Summary and Key\
    \ Takeaways\n\nThis chapter introduced Kubernetes and how it enables the deployment\
    \ of modern container-based applications. You learned how the Kubernetes API allows\
    \ you to build and model applications deployed into a Kubernetes Cluster. You\
    \ also learned the core API primitives for deploying workloads; Pods, your container-based\
    \ application; Controllers, keeping the Cluster and its workload in the desired\
    \ state; Services, for access to the applications; and storage, for stateful applications.\
    \ Then you learned the components of a Cluster and how they work together to ensure\
    \ that your desired state is implemented and a quick tour of scheduling, resource\
    \ management, and the Kubernetes network model. With all that theory behind us,\
    \ now it’s time to move into the next chapter where we will introduce Azure Arc-enabled\
    \ Data Services discussing the challenges it solves and dive into its architecture,\
    \ core features, how workloads are deployed and managed, and also key deployment\
    \ considerations.\n\n# 2. Azure Arc-enabled Data Services\n\nThis chapter introduces\
    \ you to Azure Arc-enabled Data Services! Starting off, you will learn some of\
    \ the challenges of a modern hybrid cloud, and we will then show you how Azure\
    \ Arc addresses those challenges to provide manageability at scale in on-premises\
    \ or in any cloud. Next, we will introduce the core Azure Arc-enabled resources,\
    \ including Servers, Kubernetes, SQL Server, and Data Services. We will then dive\
    \ deeper into what Azure Arc-enabled Data Services are, its architecture, how\
    \ workloads are deployed and managed, and discuss key deployment considerations\
    \ such as compute and storage capacity planning.\n\n## The Challenge\n\n*   Hybrid\
    \ cloud is becoming the new normal in enterprise system architectures. According\
    \ to the *Flexera 2020 State of the Cloud* (see [*www.flexera.com/about-us/press-center/flexera-releases-2020-state-of-the-cloud-report.html*](http://www.flexera.com/about-us/press-center/flexera-releases-2020-state-of-the-cloud-report.html))\
    \ report, nearly 87% of enterprises have a hybrid cloud strategy. There are several\
    \ variations of hybrid cloud. First, organizations can adopt a hybrid cloud strategy\
    \ with assets in more than one public cloud, such as Amazon Web Service (AWS),\
    \ Google Cloud, and Microsoft Azure. This pattern is oftentimes called “multi-cloud.”\
    \ The second type of hybrid cloud strategy is organizations having some cloud\
    \ assets and some on-premises. In these scenarios, organizations generally will\
    \ put the parts of their infrastructure that can benefit from the cloud the most\
    \ in the cloud. Primary reasons for companies to go to the cloud include elasticity,\
    \ automation, built-in monitoring and security, and pay-as-you-go payment models.\n\
    \nWhen managing and operating a hybrid cloud environment, either multi-cloud or\
    \ on-premises and cloud, the management, security models, and tools are likely\
    \ different across each of the environments. And this begs the question, how do\
    \ you manage these environments at scale? Enabling consistency and control is\
    \ challenging when you have different management, monitoring, security, and deployment\
    \ tools. The goal of Azure Arc is to enable consistency across all of these areas,\
    \ homogenizing the management, monitoring, and security services and also the\
    \ deployment tooling so that you can leverage the benefits of cloud wherever you\
    \ have resources deployed, on-premises or in any cloud."
  trans: "\n# Kubernetes 网络模型规则\n\n1.  所有`Pod`可以在所有`Node`上相互通信，无需网络地址转换（NAT）。\n2.\
    \  `Node`上的所有代理（例如系统守护进程和`kubelet`）可以与该`Node`上的所有`Pod`通信。\n3.  处于`Node`主机网络中的`Pod`可以与所有`Node`上的所有`Pod`通信，无需\
    \ NAT。\n\n前面的规则通过确保`Pod`使用其实际的`Pod IP`和容器端口相互通信（而非将其转换为依赖于部署网络基础设施的`IP`方案），简化了网络配置和应用程序配置。\n\
    \n在 Kubernetes 中，`Pod Network`是当容器运行时在`Node`上启动`Pod`时，`Pod`所连接到的网络。部署的每个`Pod`在`Pod\
    \ Network`上都会获得一个唯一的`IP`地址。`Pod Network`必须遵循前面定义的规则，这导致`Pod`使用其真实的`IP`地址。在实现`Pod\
    \ Network`时，有许多解决方案可以确保遵守 Kubernetes 网络模型规则。一个常见的解决方案是覆盖网络（overlay networking），它使用隧道协议在`Node`之间交换数据包，独立于底层物理基础设施的网络。这使得覆盖网络可以使用独立于数据中心物理基础设施的第\
    \ 3 层`IP`方案，从而更简单地遵守 Kubernetes 网络模型。\n\n另一个选项是作为裸机方法的一部分，在数据中心基础设施中构建`Pod Network`。这将需要\
    \ Kubernetes 集群管理员和负责网络的网络工程团队之间的协调。\n\n以下是在 Kubernetes 集群中使用的常见通信模式，展示了`Pod`如何相互访问以及如何访问`Pod`提供的`Service`。第\
    \ 4 章在集群安装过程中介绍了`Pod Network`，第 6 章将深入探讨`Service`以及流量如何路由到`Pod Network`中的`Pod`。\n\
    \n# 通信模式\n\n图 1-5 展示了一些 Kubernetes 集群中的示例通信模式。让我们一起逐步了解它们：\n\n![](img/505695_2_En_1_Fig5_HTML.jpg)\n\
    \n图 1-5\n\nKubernetes 网络\n\n1.  **在`Pod`内部。**\n    `Pod`内的多个容器共享相同的容器`Namespace`。这些容器可以通过`localhost`上的唯一端口进行相互通信。\n\
    \n2.  **同一`Node`内的`Pod`到`Pod`。**\n    当同一`Node`上的`Pod`需要通过网络通信时，它们通过`Node`上定义的本地软件桥（software\
    \ bridge）并使用`Pod IP`进行通信。\n\n3.  **不同`Node`上的`Pod`到`Pod`。**\n    当不同`Node`上的`Pod`需要通过网络通信时，它们通过本地第\
    \ 2 层或第 3 层网络并使用`Pod IP`进行通信。\n\n4.  **`Service`。**\n    当访问集群中的`Service`时，流量首先路由到实现该`Service`的`kube-proxy`，然后再路由到提供该应用程序服务的`Pod`。正如本章前面介绍的，`Service`将是您与集群中部署的应用程序进行交互的最常见方式。\n\
    \n# Kubernetes 在 Azure Arc 启用的数据服务中的作用\n\n在过去的几年里，SQL Server 工程团队发布了一些令人兴奋的技术和创新——Linux\
    \ 上的 SQL Server、容器中的 SQL Server、Kubernetes 上的 SQL Server 以及 Azure Data Studio——我们不禁要问，为什么？所有这些看似不同的技术背后的大图景是什么？我们第一次看到\
    \ SQL Server 产品团队演示 Azure Arc-enabled Data Services 时，就是那个“顿悟”时刻。关键不在于这些单项技术有多酷，而在于将这些技术结合在一起所能实现的能力。在任何拥有\
    \ Kubernetes 的地方运行任何数据服务。\n\n在 Kubernetes 内部运行数据服务使得 Microsoft 能够以代码定义系统。然后，由于\
    \ Kubernetes 提供的基础设施抽象，您可以在任何拥有 Kubernetes 的地方运行该代码。Kubernetes API 本质上是您数据中心或云中资源的包装器。编写用于部署系统的代码可以在任何实现了该\
    \ API 的地方运行，无论是在任何云中、边缘站点，还是本地数据中心。在本书的剩余部分，我们将向您展示 Azure Arc-enabled Data Services\
    \ 的价值主张，以及如何在任何拥有 Kubernetes 的地方部署和管理这些 Azure Arc-enabled Data Services。\n\n#\
    \ 总结与关键要点\n\n本章介绍了 Kubernetes 及其如何支持基于容器的现代应用程序的部署。您了解了 Kubernetes API 如何允许您构建和建模部署到\
    \ Kubernetes 集群中的应用程序。您还学习了部署工作负载的核心 API 原语：作为基于容器应用程序的`Pod`；保持集群及其工作负载处于期望状态的`Controller`；用于访问应用程序的`Service`；以及用于有状态应用程序的存储。然后，您了解了集群的组件以及它们如何协同工作以确保实现您的期望状态，并快速浏览了调度、资源管理和\
    \ Kubernetes 网络模型。在掌握了所有这些理论之后，现在该进入下一章了，我们将在那里介绍 Azure Arc-enabled Data Services，讨论它解决的挑战，并深入探讨其架构、核心特性、工作负载的部署和管理方式以及关键的部署注意事项。\n\
    \n# 2. Azure Arc 启用的数据服务\n\n本章向您介绍 Azure Arc-enabled Data Services！首先，您将了解现代混合云面临的一些挑战，然后我们将向您展示\
    \ Azure Arc 如何应对这些挑战，以在本地或任何云中提供可大规模管理的解决方案。接下来，我们将介绍核心的 Azure Arc 启用资源，包括服务器、Kubernetes、SQL\
    \ Server 和数据服务。然后，我们将更深入地探讨什么是 Azure Arc-enabled Data Services、其架构、工作负载如何部署和管理，并讨论关键的部署注意事项，如计算和存储容量规划。\n\
    \n## 挑战\n\n*   混合云正在成为企业系统架构的新常态。根据《Flexera 2020 State of the Cloud》（参见 [*www.flexera.com/about-us/press-center/flexera-releases-2020-state-of-the-cloud-report.html*](http://www.flexera.com/about-us/press-center/flexera-releases-2020-state-of-the-cloud-report.html)）报告，近\
    \ 87%的企业拥有混合云战略。混合云有几种变体。首先，组织可以采用资产分布在多个公有云（如 Amazon Web Service (AWS)、Google\
    \ Cloud 和 Microsoft Azure）的混合云战略。这种模式通常被称为“多云”。第二种混合云战略是组织拥有一些云资产和一些本地资产。在这些场景中，组织通常会将最能从云中受益的基础设施部分放在云中。公司转向云的主要原因包括弹性、自动化、内置监控和安全以及按需付费的支付模型。\n\
    \n在管理和运营混合云环境时，无论是多云还是本地与云混合，每个环境的管理、安全模型和工具可能各不相同。这就引出了一个问题：您如何大规模管理这些环境？当您拥有不同的管理、监控、安全和部署工具时，实现一致性和控制是具有挑战性的。Azure\
    \ Arc 的目标是实现所有这些领域的一致性，统一管理、监控和安全服务以及部署工具，以便您可以在部署资源的任何地方（本地或任何云中）利用云的优势。\n"
- fmt: '## Introducing Azure Arc


    At its core, Microsoft Azure Arc provides Azure management services wherever you
    have deployed resources on-premises or any cloud. It enables you to have consistent
    management services and tooling for your organizations'' core operations across
    technology architectures wherever deployed. Let''s look at the core features of
    Azure Arc:


    **Unified Experience Across On-Premises and Hybrid Cloud**: Familiar tools like
    the `Azure Portal`, `azure-cli`, `PowerShell`, and `REST API` are available to
    you to manage and deploy systems.


    **Deployment and Operations**: With a unified set of tools, deployments and operations
    are consistent wherever you deploy, on-premises or in any cloud. Unified tooling
    enables your organization to use the same code and tools in any deployment scenario
    wherever deployed. A pivotal element to operations is performance and availability
    monitoring, and `Azure Monitor` is available to help you do that for your `Azure
    Arc`-enabled resources.


    **Consolidated Access Controls, Security, Policy Management, and Logging**: Implementing
    more than one security model based on where your resources are deployed is challenging
    and risky since you potentially have to manage multiple sets of security rules
    and their implementations. `Azure Arc` enables you to have a consolidated security
    model and implementation and use tools like `Azure Log Analytics` for centralized
    security and application logs. Additionally, you can manage governance and control
    solutions with services like `Azure Policy`.


    **Inventory and Organization**: With one set of tooling available and key `Azure`
    constructs such as `resource groups`, `subscription`, and `tags`, administrators,
    operators, and managers can get a complete view of their technology estate regardless
    of where systems are deployed as services and resources are registered as managed
    resources in `Azure` irrespective of where they are deployed, on-premises or in
    any cloud.


    Now that we''ve introduced you to the core features of `Azure Arc`, it is time
    to move forward and take a closer look at the resources that you can manage and
    deploy using `Azure Arc`.


    ### Azure Arc-enabled Resources


    The focus of this book is `Azure Arc`-enabled Data Services. `Azure Arc`-enabled
    Data Services are part of a broader strategy that provides a Control Plane over
    resources wherever deployed, on-premises or in any cloud. `Azure Arc` achieves
    this goal by extending `Azure Resource Manager (ARM)` to these resources. `ARM`
    is the Management Control Plane used in the `Azure` Public Cloud. `ARM` provides
    deployment, organization, and access control to resources deployed in the `Azure`
    Cloud. `Azure Arc` extends `ARM` to wherever you have resources deployed, on-premises
    or in any cloud. At the time of writing this book, there are four key resources
    that can be managed by `Azure Arc`: `Azure Arc-enabled Servers`, `Azure Arc-enabled
    Kubernetes`, `Azure Arc-enabled SQL Servers`, and `Azure Arc-enabled Data Services`.
    Figure 2-1 introduces the elements of `Azure Arc`; let''s walk through each of
    these core services in more detail.


    ![](images/505695_2_En_2_Chapter/505695_2_En_2_Fig1_HTML.jpg)


    Figure 2-1 `Azure Arc` Architecture


    #### Azure Arc-enabled Servers


    `Azure Arc-enabled Servers` provides management capabilities for both `Windows`
    and `Linux` operating systems deployed on physical and virtual machines (VMs)
    hosted outside of `Azure`. Servers connect to `Azure` using a locally installed
    agent and become resources that are managed using standard `Azure` tools and management
    services. The core management capabilities for `Azure Arc-enabled Servers` include
    inventory, policy, deployment automation, configuration management, performance
    monitoring, security and access controls, centralized logging, and update management.
    For more information on `Azure Arc-enabled Servers`, visit `https://docs.microsoft.com/en-us/azure/azure-arc/servers/overview`.


    #### Azure Arc-enabled Kubernetes


    `Kubernetes` is the standard for deploying enterprise grade container-based applications.
    `Azure Arc-enabled Kubernetes` enables management of Cloud Native Computing Foundation
    (`CNCF`) certified `Kubernetes` Clusters wherever they are deployed including
    upstream `Kubernetes`, `RedHat OpenShift`, `AWS EKS`, `Google GKE`, among others.
    The key management features of `Azure Arc-enabled Kubernetes` are inventory management,
    policy management, centralized logging, performance monitoring, application deployment,
    and Cluster configuration.


    A key scenario enabled by `Azure Arc-enabled Kubernetes` is `GitOps`-based configuration
    management. `GitOps` enables application deployment and Cluster configuration
    by using `GitOps`-based configuration management. Configuration artifacts are
    checked into a `Git` repository, and the `Arc` Cluster agent monitors that `Git`
    repository for configuration changes. As configurations are checked into the repo,
    the Cluster agent will deploy that change locally in the `Kubernetes` Cluster.
    This enables strong configuration management since all configuration artifacts,
    for both Cluster configuration and application deployment, are checked into the
    repository and source controlled. Test, review, and approval workflows can be
    built around the source control system. If the Cluster skews away from what is
    checked into the repository, the checked in configuration will be asserted on
    the Cluster to bring it back into the desired state.


    Check out `https://docs.microsoft.com/en-us/azure/azure-arc/kubernetes/overview`
    for more information and supported `Kubernetes` distributions.


    #### Azure Arc-enabled SQL Server


    The next `Azure Arc`-enabled service we want to introduce is `Azure Arc-enabled
    SQL Server`. `Azure Arc-enabled SQL Server` enables you to extend `Azure` management
    services to `SQL Server` instances wherever deployed, on-premises or in any cloud.
    An agent is installed on the `SQL Server` instance, and the `SQL Server` is then
    registered with `Azure`. The `SQL Server` instance is then managed using standard
    `Azure` tools and management services. The core management features are inventory
    management, policy management, centralized logging, security, and threat protection
    via services like `Azure Security Center` and `Azure Sentinel`.


    Further, in `Azure Arc-enabled SQL Server`, environment checks are implemented
    using `SQL Assessments`. `SQL Assessments` are a collection of industry-standard
    best practices that can be used to assess and report the overall environment health
    of a `SQL Server` instance or a group of `SQL Server` instances. `Azure Arc-enabled
    SQL Server` combined with `Azure Arc-enabled Servers` can give you a rich management
    experience for both `SQL Server` and the underlying operating system. For more
    information on `Azure Arc-enabled SQL Server`, check out `https://docs.microsoft.com/en-us/sql/sql-server/azure-arc/overview`.


    We want to take a moment to call out the `Azure Arc-enabled SQL Server` and `Azure
    Arc-enabled Data Services` are unique offerings under the `Azure Arc` umbrella.
    `Azure Arc-enabled SQL Server` extends `Azure` management services to traditional
    deployments of installed instances of `SQL Server`. `Azure Arc-enabled Data Services`
    give you the ability to deploy `Azure Platform as a Service (PaaS)`-based services
    on-premises or in any cloud.'
