    #### 工作节点


    工作节点运行用户的应用程序负载。一个集群由一个控制平面节点和一组工作节点组成。每个工作节点都为集群中的整体可用资源贡献一定量的 CPU 和内存资源。你需要有足够的
    CPU 和内存资源来在集群中运行你的应用程序工作负载，并确保为应用程序以及节点故障甚至增长事件留有足够的容量。


    **注意**


    控制平面节点的一个主要关注点是确保可用性。有关高可用控制平面拓扑的更多信息，请查看此链接：[`kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/`](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/)。


    集群中的所有节点，无论是控制平面还是工作节点，都包含三个组件：`kubelet`（与 API Server 通信以进行集群操作）、`kube-proxy`（将该节点上运行的容器暴露给本地网络）以及容器运行时（在节点上启动和运行容器）。


    *   **kubelet**：`kubelet`是运行在节点上的一个服务，负责与 API Server 通信、在节点上启动 Pod 并确保节点上的 Pod
    处于健康状态。`kubelet`监控 API Server 的 Pod 工作负载状态，告诉容器运行时启动和停止容器。它还向 API Server 报告节点上运行的
    Pod 的当前状态，并以存活探针和就绪探针的形式对 Pod 执行健康检查。`kubelet`向 API Server 报告节点的当前状态和该节点上可用的资源。


    *   **kube-proxy**：`kube-proxy`是在集群所有节点上运行的一个容器，充当网络代理，负责将来自节点所在网络的流量路由到该节点上运行的
    Pod。


    *   **容器运行时**：容器运行时负责拉取容器镜像并在节点上运行容器。目前，`containerd`是 Kubernetes 集群中最常用的容器运行时。但
    Kubernetes 容器运行时领域已转向使用容器运行时接口标准；这使得不同的容器运行时可以作为 Kubernetes 节点上的容器运行时使用。本书中使用的容器运行时是`containerd`。有关
