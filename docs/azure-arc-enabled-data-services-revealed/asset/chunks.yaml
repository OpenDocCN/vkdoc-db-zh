  trans: '

    ### Azure Arc 启用的数据服务架构


    Azure Arc 启用的数据服务架构是一个分层架构，由硬件、Kubernetes、管理/控制平面和数据服务组成。图 2-2 突出了该架构。


    ![](img/505695_2_En_2_Fig2_HTML.jpg)

    *图 2-2*


    Azure Arc 启用的数据服务架构是一个分层架构，由硬件、Kubernetes、管理平面和部署的数据服务组成。


    基础层是硬件，它可以在本地或任何云中，并构建在物理机或虚拟机上。接着，在该硬件上部署 Kubernetes。正如我们在前一章中学到的，Kubernetes
    使您能够快速、一致地将代码应用程序部署到集群中。然后，在 Kubernetes 集群内部署的是 Arc 管理控制平面。Arc 管理控制平面是 Azure Arc
    的大脑，并将 Azure 资源管理器 (ARM) 扩展到您的本地或混合云部署中。而在这一切之上的是 Azure Arc 启用的数据服务。这些是传统上基于 PaaS
    的服务，您可以将其部署在任何拥有 Azure Arc 的地方，无论是在本地还是在任何云中。现在，让我们更详细地了解此架构的每一层。


    #### 硬件层


    Azure Arc 数据服务架构构建在 `基于物理机或虚拟机的服务器` 上。每台服务器都贡献一定量的 CPU 和内存容量供应用程序运行。正如前一章关于 Kubernetes
    的介绍，Kubernetes 集群服务器称为节点。每个节点的数量和大小取决于所部署工作负载的大小要求，以及为 Kubernetes 集群中节点故障准备的一些额外容量。此外，您可以通过添加或移除服务器来扩展或收缩
    Kubernetes 集群中的资源量。我们将在本章后面更详细地探讨这个主题。


    每个节点必须运行 `Linux 操作系统`，因为在 Azure Arc 启用的数据服务中运行的所有容器都是基于 Linux 的容器。


    除了计算资源之外，还需要 `持久存储`。持久存储使用前一章介绍的存储概念分配给在 Azure Arc 启用的数据服务中部署的工作负载。存储类为在 Kubernetes
    集群中部署的工作负载动态分配持久卷。配置的存储类型可以是您的 Kubernetes 版本支持并作为存储类公开的任何存储类型。此外，您可以通过定义额外的存储类来增加集群中的可分配存储容量，甚至添加额外的存储类型。


    #### Kubernetes 层


    底层硬件就位后，架构的下一层是 Kubernetes。无论何种发行版，Kubernetes 都为构建工作负载提供了一致的 API，因此，Azure Arc
    启用的数据服务支持多种 Kubernetes 发行版。支持的发行版包括使用 kubeadm 构建的开源/上游 Kubernetes 集群，以及像 RedHat
    OpenShift 这样的商业发行版。


    在撰写本文时，根据部署机制，有几种 `受支持的 Kubernetes 发行版`：

    *   使用 kubeadm 部署的开源上游 Kubernetes

    *   OpenShift 容器平台 (OCP)


    支持多种 `托管服务产品`：

    *   Azure Kubernetes 服务 (AKS)

    *   Azure Stack 上的 Azure Kubernetes 服务 (AKS)

    *   Azure Stack HCI 上的 Azure Kubernetes 服务 (AKS)

    *   Azure RedHat OpenShift (ARO)

    *   AWS 弹性 Kubernetes 服务 (EKS)

    *   Google Cloud Kubernetes 引擎 (GKE)


    > 注意

    >

    > 有关支持的特定 Kubernetes 发行版版本的更多信息，请查看此链接：[*https://docs.microsoft.com/en-us/azure/azure-arc/kubernetes/validation-program*](https://docs.microsoft.com/en-us/azure/azure-arc/kubernetes/validation-program)*.*


    这里的关键概念是，您可以在任何需要部署的地方（本地或混合云场景）在任何 Kubernetes 发行版上部署 Azure Arc 启用的数据服务。您可以选择使用上游/开源
    Kubernetes 以及许多托管服务产品。一旦 Kubernetes 启动并运行，接下来要做的就是通过部署 Azure Arc 数据服务数据控制器，将 Azure
    扩展到您的集群中。


    #### Azure Arc 管理控制平面层


    Kubernetes 部署后，架构的下一层是 Arc 管理控制平面层，它将 Azure 的管理功能扩展到您的本地或混合云环境。在这一层，在 Azure Arc
    启用的数据服务中，会部署一个 `数据控制器`。数据控制器作为 Kubernetes 中的自定义资源部署。数据控制器实现了核心功能，如 Azure Arc 集成和管理服务。让我们更仔细地看看这些功能。


    Azure Arc 集成负责根据部署的数据服务工作负载，将日志记录、性能和用量信息发送回 Azure。数据控制器将 Azure 资源管理器扩展到您的本地或混合云部署，并激活
    Azure Arc 启用的服务来管理已部署的应用程序和资源。数据控制器实现的管理服务包括控制器服务和 API 端点、配置管理、管理和性能仪表板、指标、日志记录、托管备份/恢复以及高可用性服务协调。我们将在接下来的章节中更深入地探讨数据控制器及其核心功能。控制器在线后，架构的下一层是部署数据服务工作负载。


    > 注意

    >

    > 我们需要说明，数据控制器用于管理 Azure Arc 启用的数据服务。Azure Arc 启用的服务器、Kubernetes 和 SQL Server
    各自依赖于安装在 Azure Arc 管理的资源上的代理。


    #### 数据服务层


    Azure Arc 启用的数据服务架构的最后一层是数据服务本身。Azure Arc 启用的数据服务使您能够在本地或混合云环境中的 Kubernetes 上，自配置传统上基于
    Azure 公有云 PaaS 的服务，如 SQL 托管实例和 PostgreSQL 超大规模。`Azure Arc 启用的 SQL 托管实例` 是您的 SQL
    Server 提升和转移版本，使您能够将工作负载无缝迁移到 Azure Arc 启用的数据服务中，因为它与本地 SQL Server 安装具有高度兼容性。接下来，`Azure
    Arc 启用的 PostgreSQL 超大规模` 是用于关键任务应用程序数据存储的领先开源数据库。PostgreSQL 超大规模是 Azure 中的一种实现，它使您能够通过跨多个实例分片来水平扩展数据，并允许分布式并行查询执行。这些数据服务作为资源部署在
    Kubernetes 中，并由数据控制器管理。


    总而言之，本质上，只要您拥有硬件并部署了 Kubernetes 和数据控制器，就可以部署 Azure Arc 启用的数据服务。

    '
- fmt: '# Azure Arc Management Control Plane Layer: A Closer Look


    Now it is time to take a closer look at the Azure Arc Management Control Plane.
    To extend Azure Services from the cloud to on-premises or hybrid cloud environments,
    a `Data Controller` is deployed in your `Kubernetes` Cluster. The `Data Controller`
    implements Azure Arc integrations and several key on-premises management functions.
    This section will introduce the `Data Controller`''s connectivity modes, its core
    functions, and how its operations and management capabilities differ based on
    the connectivity mode in use.


    A `Data Controller`''s connectivity mode defines how a `Data Controller` exchanges
    data with the Azure Public Cloud and also defines which management services are
    deployed within the `Kubernetes` Cluster and which Azure Services are used to
    manage data services in the Cluster. There are two connectivity modes for the
    `Data Controller`: indirectly connected and directly connected mode. Which connectivity
    mode you should choose is based on your deployment''s technical and security requirements
    and possibly business rules or government regulations. Let''s look more closely
    at each connectivity mode.


    ## Indirectly Connected Mode


    In indirectly connected mode, there is no direct connection from the `Data Controller`
    in your Cluster to the Azure Public Cloud. The local `Data Controller` itself
    functions as the primary point of management and deployment for data services
    in your `Kubernetes` Cluster. For deploying and managing workloads, all operations
    are governed by the local `Data Controller` in your Cluster. Additionally, all
    management functions are implemented inside the local Cluster. For example, performance
    metrics and logging web portals and data stores are implemented as `Pods` running
    in your local `Kubernetes` Cluster. Further, critical data services managed operations
    such as update management, automated backup/restore, and high-availability coordination
    are implemented at this layer. Figure [2-3](#505695_2_En_2_Chapter.xhtml#Fig3)
    highlights the architecture of indirectly connected mode where the `Data Controller`
    does not have a persistent connection into the Azure Cloud.


    ![Figure 2-3: Indirectly connected mode – there is no direct connection from the
    Data Controller into the Azure Cloud. Data is exchanged via an import/export process
    using azure-cli](images/505695_2_En_2_Chapter/505695_2_En_2_Fig3_HTML.jpg)


    In indirectly connected mode, inventory, performance, logging, and usage data
    can be exported to files and then uploaded to Azure. Once uploaded into Azure,
    the deployed Azure Arc-enabled Data Services will be visible as resources in the
    Azure Portal. Further, Azure Services, such as `Metrics`, `Log Analytics`, and
    more, can be used to analyze the data exported from the on-premises or hybrid
    cloud environment. It is possible to schedule this export/upload process at a
    periodic interval so that the data is uploaded and available inside Azure, giving
    the appearance of continuous uploading of data. Azure Services that require direct
    connectivity are not available.


    In indirectly connected mode, data services deployment and configuration changes
    are sent to the `Kubernetes API` running on the `Data Controller` using tools
    such as Azure Data Studio; `azure-cli (az)`; `Kubernetes` native tools like `kubectl`,
    `helm`, or `oc`; and also Azure Arc-enabled `Kubernetes GitOps`. If `Kubernetes`
    native tools are used, these deployments are sent directly to the `Kubernetes
    API`. In indirectly connected mode, deployments and configuration changes cannot
    be made using the Azure Portal, `ARM APIs`, and `ARM` templates. However, Azure
    Services such as inventory management, metrics, and logging are available due
    to the export process described earlier.


    Typical scenarios for this connectivity mode are that data centers with business
    or security policies do not allow for outbound connectivity or data uploads to
    external services. Other deployments that can use indirectly connected mode include
    edge site locations with intermittent Internet connectivity.


    ## Directly Connected Mode


    In directly connected mode, Azure itself becomes the Control Plane for coordinating
    management and deployment functions in your Azure Arc-enabled Data Services environment.
    In this connectivity mode, the `Kubernetes` Cluster you are deploying Azure Arc-enabled
    Data Services into needs to be an Azure Arc-enabled `Kubernetes` Cluster. By connecting
    your `Kubernetes` Cluster to Azure, Azure Arc agents are deployed into your Cluster.
    These agents have the responsibility of persisting an outbound connection to Azure
    and exchanging information with Azure such as metrics, logs, and usage data as
    well as enabling a richer Azure management experience with additional Azure Services
    when compared with indirectly connected mode. When using directly connected mode,
    a persistent network connection is initiated from the customer environment out
    to the Azure Cloud over secure, encrypted channels. If there is an interruption
    in connectivity, the operations are queued locally and pushed into Azure when
    connectivity is restored.


    In directly connected mode, deployment and configuration changes can be created
    using the Azure Portal, `ARM APIs`, `azure-cli`, Azure PowerShell, and `ARM` templates
    as addition to the tools used in indirectly connected mode. Figure [2-4](#505695_2_En_2_Chapter.xhtml#Fig4)
    highlights the architecture of directly connected mode where the Azure Arc-enabled
    `Kubernetes` agent has a direct, sustained connection into the Azure Cloud and
    is constantly uploading metrics, logs, and usage data as well as enabling a richer
    Azure management experience with additional Azure Services. Common scenarios for
    this connectivity mode are for managing deployments in other public clouds, edge
    site locations, and corporate data centers that have policies that allow such
    connectivity.


    ![Figure 2-4: Directly connected mode – the Azure Arc-enabled Kubernetes agent
    maintains a persistent, secure connection into the Azure Cloud for exchanging
    configuration state and monitoring and logging data](images/505695_2_En_2_Chapter/505695_2_En_2_Fig4_HTML.jpg)


    When using directly connected mode, in addition to Azure Arc-enabling your `Kubernetes`
    Cluster, you will need the Azure Arc-enabled Data Services `Cluster Extension`
    deployed into your Cluster. A `Cluster Extension` controls the Azure capabilities
    of your `Kubernetes` Cluster such as the Azure Services it offers as well as the
    version and life cycle of those services. The Azure Arc-enabled Data Services
    `Cluster Extension` is used to create the `Custom Resource Definitions` for the
    Azure Arc-enabled Data Services and their capabilities and bootstrapping Cluster
    deployment.


    When working with Azure Resources, traditionally you deploy resources in a region.
    To extend that concept into a hybrid scenario, reaching compute resources outside
    of Azure, you need to define a `custom location`. A `custom location` is a pointer
    from Azure to a `Kubernetes Namespace` defined in an Azure Arc-enabled `Kubernetes`
    Cluster (see Figure [2-5](#505695_2_En_2_Chapter.xhtml#Fig5)).


    ![Figure 2-5: Concept of custom locations](images/505695_2_En_2_Chapter/505695_2_En_2_Fig5_HTML.jpg)


    This `custom location` is used by administrators as target locations for the deployment
    of Azure Arc-enabled Data Services on your local compute resources. The process
    of Azure Arc enabling your `Kubernetes` Cluster is covered in detail in Chapter
    [6](#505695_2_En_6_Chapter.xhtml) as part of the process of creating a directly
    connected Azure Arc-enabled Data Services `Data Controller`.


    > **Note**

    >

    > For more details on the management services and the network connectivity, such
    as Internet addresses, ports, and proxy server support, check out the following
    link:

    > ```

    > https://docs.microsoft.com/en-us/azure/azure-arc/data/connectivity

    > ```'
  raw: '### Azure Arc Management Control Plane Layer: A Closer Look


    Now it is time to take a closer look at the Azure Arc Management Control Plane.
    To extend Azure Services from the cloud to on-premises or hybrid cloud environments,
    a Data Controller is deployed in your Kubernetes Cluster. The Data Controller
    implements Azure Arc integrations and several key on-premises management functions.
    This section will introduce the Data Controller''s connectivity modes, its core
    functions, and how its operations and management capabilities differ based on
    the connectivity mode in use.


    A Data Controller’s *connectivity mode* defines how a Data Controller exchanges
    data with the Azure Public Cloud and also defines which management services are
    deployed within the Kubernetes Cluster and which Azure Services are used to manage
    data services in the Cluster. There are two connectivity modes for the Data Controller,
    *indirectly connected* and *directly connected* mode. Which connectivity mode
    you should choose is based on your deployment’s technical and security requirements
    and possibly business rules or government regulations. Let’s look more closely
    at each connectivity mode.


    #### Indirectly Connected Mode


    In indirectly connected mode, there is no direct connection from the Data Controller
    in your Cluster to the Azure Public Cloud. The local Data Controller itself functions
    as the primary point of management and deployment for data services in your Kubernetes
    Cluster. For deploying and managing workloads, all operations are governed by
    the local Data Controller in your Cluster. Additionally, all management functions
    are implemented inside the local Cluster. For example, performance metrics and
    logging web portals and data stores are implemented as Pods running in your local
    Kubernetes Cluster. Further, critical data services managed operations such as
    update management, automated backup/restore, and high-availability coordination
    are implemented at this layer. Figure [2-3](#505695_2_En_2_Chapter.xhtml#Fig3)
    highlights the architecture of indirectly connected mode where the Data Controller
    does not have a persistent connection into the Azure Cloud.


    ![](images/505695_2_En_2_Chapter/505695_2_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Indirectly connected mode – there is no direct connection from the Data Controller
    into the Azure Cloud. Data is exchanged via an import/export process using azure-cli


    In indirectly connected mode, inventory, performance, logging, and usage data
    can be exported to files and then uploaded to Azure. Once uploaded into Azure,
    the deployed Azure Arc-enabled Data Services will be visible as resources in the
    Azure Portal. Further, Azure Services, such as Metrics, Log Analytics, and more,
    can be used to analyze the data exported from the on-premises or hybrid cloud
    environment. It is possible to schedule this export/upload process at a periodic
    interval so that the data is uploaded and available inside Azure, giving the appearance
    of continuous uploading of data. Azure Services that require direct connectivity
    are not available.


    In indirectly connected mode, data services deployment and configuration changes
    are sent to the Kubernetes API running on the Data Controller using tools such
    as Azure Data Studio; azure-cli (az); Kubernetes native tools like kubectl, helm,
    or oc; and also Azure Arc-enabled Kubernetes GitOps. If Kubernetes native tools
    are used, these deployments are sent directly to the Kubernetes API. In indirectly
    connected mode, deployments and configuration changes cannot be made using the
    Azure Portal, ARM APIs, and ARM templates. However, Azure Services such as inventory
    management, metrics, and logging are available due to the export process described
    earlier.


    Typical scenarios for this connectivity mode are that data centers with business
    or security policies do not allow for outbound connectivity or data uploads to
    external services. Other deployments that can use indirectly connected mode include
    edge site locations with intermittent Internet connectivity.


    #### Directly Connected Mode


    In directly connected mode, Azure itself becomes the Control Plane for coordinating
    management and deployment functions in your Azure Arc-enabled Data Services environment.
    In this connectivity mode, the Kubernetes Cluster you are deploying Azure Arc-enabled
    Data Services into needs to be an Azure Arc-enabled Kubernetes Cluster. By connecting
    your Kubernetes Cluster to Azure, Azure Arc agents are deployed into your Cluster.
    These agents have the responsibility of persisting an outbound connection to Azure
    and exchanging information with Azure such as metrics, logs, and usage data as
    well as enabling a richer Azure management experience with additional Azure Services
    when compared with indirectly connected mode. When using directly connected mode,
    a persistent network connection is initiated from the customer environment out
    to the Azure Cloud over secure, encrypted channels. If there is an interruption
    in connectivity, the operations are queued locally and pushed into Azure when
    connectivity is restored.


    In directly connected mode, deployment and configuration changes can be created
    using the Azure Portal, ARM APIs, azure-cli, Azure PowerShell, and ARM templates
    as addition to the tools used in indirectly connected mode. Figure [2-4](#505695_2_En_2_Chapter.xhtml#Fig4)
    highlights the architecture of directly connected mode where the Azure Arc-enabled
    Kubernetes agent has a direct, sustained connection into the Azure Cloud and is
    constantly uploading metrics, logs, and usage data as well as enabling a richer
    Azure management experience with additional Azure Services. Common scenarios for
    this connectivity mode are for managing deployments in other public clouds, edge
    site locations, and corporate data centers that have policies that allow such
    connectivity.


    ![](images/505695_2_En_2_Chapter/505695_2_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Directly connected mode – the Azure Arc-enabled Kubernetes agent maintains a persistent,
    secure connection into the Azure Cloud for exchanging configuration state and
    monitoring and logging data


    When using directly connected mode, in addition to Azure Arc-enabling your Kubernetes
    Cluster, you will need the Azure Arc-enabled Data Services Cluster Extension deployed
    into your Cluster. A Cluster Extension controls the Azure capabilities of your
    Kubernetes Cluster such as the Azure Services it offers as well as the version
    and life cycle of those services. The Azure Arc-enabled Data Services Cluster
    Extension is used to create the Custom Resource Definitions for the Azure Arc-enabled
    Data Services and their capabilities and bootstrapping Cluster deployment.


    When working with Azure Resources, traditionally you deploy resources in a region.
    To extend that concept into a hybrid scenario, reaching compute resources outside
    of Azure, you need to define a custom location. A custom location is a pointer
    from Azure to a Kubernetes Namespace defined in an Azure Arc-enabled Kubernetes
    Cluster (see Figure [2-5](#505695_2_En_2_Chapter.xhtml#Fig5)).


    ![](images/505695_2_En_2_Chapter/505695_2_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Concept of custom locations


    This custom location is used by administrators as target locations for the deployment
    of Azure Arc-enabled Data Services on your local compute resources. The process
    of Azure Arc enabling your Kubernetes Cluster is covered in detail in Chapter
    [6](#505695_2_En_6_Chapter.xhtml) as part of the process of creating a directly
    connected Azure Arc-enabled Data Services Data Controller.


    Note


    For more details on the management services and the network connectivity, such
    as Internet addresses, ports, and proxy server support, check out [*https://docs.microsoft.com/en-us/azure/azure-arc/data/connectivity*](https://docs.microsoft.com/en-us/azure/azure-arc/data/connectivity).'
  trans: '

    # Azure Arc 管理控制平面层：深入解析


    现在，是时候深入了解一下 Azure Arc 管理控制平面了。为了将 Azure 服务从云端扩展到本地或混合云环境，一个`数据控制器`会被部署在您的`Kubernetes`集群中。这个`数据控制器`实现了
    Azure Arc 的集成以及若干关键的本地管理功能。本节将介绍`数据控制器`的连接模式、其核心功能，以及其运维和管理能力如何根据所使用的连接模式而有所不同。


    `数据控制器`的连接模式定义了它如何与 Azure 公有云交换数据，也定义了哪些管理服务在`Kubernetes`集群内部部署，以及哪些 Azure 服务用于管理集群中的数据服务。`数据控制器`有两种连接模式：间接连接模式和直接连接模式。您应选择哪种连接模式，取决于您部署的技术和安全要求，也可能涉及业务规则或政府法规。让我们更详细地看看每种连接模式。


    ## 间接连接模式


    在间接连接模式下，您的集群中的`数据控制器`与 Azure 公有云之间没有直接连接。本地的`数据控制器`本身充当您`Kubernetes`集群中数据服务的主要管理点和部署点。对于工作负载的部署和管理，所有操作都由您集群中的本地`数据控制器`管理。此外，所有管理功能都在本地集群内部实现。例如，性能指标、日志记录
    Web 门户和数据存储都实现为在您本地`Kubernetes`集群中运行的`Pod`。进一步地，关键数据服务的管理操作，如更新管理、自动备份/恢复和高可用性协调，都在此层实现。图
    2-3 突出了间接连接模式的架构，其中`数据控制器`与 Azure 云没有持久连接。


    ![图 2-3：间接连接模式 – 数据控制器与 Azure 云之间没有直接连接。数据通过使用 azure-cli 的导入/导出过程进行交换](img/505695_2_En_2_Fig3_HTML.jpg)


    在间接连接模式下，清单、性能、日志记录和使用情况数据可以导出到文件，然后上传到 Azure。一旦上传到 Azure，已部署的 Azure Arc 启用的数据服务将作为资源在
    Azure 门户中可见。此外，Azure 服务，如`Metrics`、`Log Analytics`等，可用于分析从本地或混合云环境导出的数据。可以定期安排此导出/上传过程，以便数据被上传并在
    Azure 内部可用，给人一种数据持续上传的表象。需要直接连接的 Azure 服务不可用。


    在间接连接模式下，数据服务的部署和配置更改是通过诸如 Azure Data Studio、`azure-cli (az)`、`Kubernetes`原生工具（如`kubectl`、`helm`或`oc`）以及
    Azure Arc 启用的`Kubernetes GitOps`等工具，发送到在`数据控制器`上运行的`Kubernetes API`。如果使用`Kubernetes`原生工具，这些部署会直接发送到`Kubernetes
    API`。在间接连接模式下，无法使用 Azure 门户、`ARM API`和`ARM`模板进行部署和配置更改。然而，由于前面描述的导出过程，清单管理、指标和日志记录等
    Azure 服务是可用的。


    此连接模式的典型场景是，拥有业务或安全策略的数据中心不允许出站连接或向外部服务上传数据。其他可以使用间接连接模式的部署包括互联网连接不稳定的边缘站点位置。


    ## 直接连接模式


    在直接连接模式下，Azure 本身成为协调您 Azure Arc 启用的数据服务环境中的管理和部署功能的控制平面。在此连接模式下，您部署 Azure Arc
    启用的数据服务的`Kubernetes`集群需要是一个 Azure Arc 启用的`Kubernetes`集群。通过将您的`Kubernetes`集群连接到
    Azure，Azure Arc 代理被部署到您的集群中。这些代理负责维护与 Azure 的出站持久连接，并与 Azure 交换信息，如指标、日志和使用情况数据，与间接连接模式相比，还能通过额外的
    Azure 服务实现更丰富的 Azure 管理体验。使用直接连接模式时，会从客户环境通过安全的加密通道向 Azure 云发起一个持久的网络连接。如果连接中断，操作将在本地排队，并在连接恢复时推送到
    Azure。


    在直接连接模式下，除了间接连接模式使用的工具外，还可以使用 Azure 门户、`ARM API`、`azure-cli`、Azure PowerShell
    和`ARM`模板来创建部署和配置更改。图 2-4 突出了直接连接模式的架构，其中 Azure Arc 启用的`Kubernetes`代理与 Azure 云保持着直接、持续的连接，并不断上传指标、日志和使用情况数据，同时通过额外的
    Azure 服务实现更丰富的 Azure 管理体验。此连接模式的常见场景包括管理其他公有云中的部署、边缘站点位置以及允许此类连接的企业数据中心。


    ![图 2-4：直接连接模式 – Azure Arc 启用的 Kubernetes 代理维护一个到 Azure 云的持久、安全的连接，用于交换配置状态以及监控和日志记录数据](img/505695_2_En_2_Fig4_HTML.jpg)


    使用直接连接模式时，除了启用 Azure Arc 的`Kubernetes`集群外，您还需要将 Azure Arc 启用的数据服务`集群扩展`部署到您的集群中。`集群扩展`控制着您的`Kubernetes`集群的
    Azure 功能，例如它提供的 Azure 服务以及这些服务的版本和生命周期。Azure Arc 启用的数据服务`集群扩展`用于为 Azure Arc 启用的数据服务及其功能创建`自定义资源定义`，并引导集群部署。


    在处理 Azure 资源时，传统上您在一个区域中部署资源。为了将这个概念扩展到混合场景中，以访问 Azure 之外的计算资源，您需要定义一个`自定义位置`。`自定义位置`是一个从
    Azure 指向 Azure Arc 启用的`Kubernetes`集群中定义的`Kubernetes 命名空间`的指针（参见图 2-5）。


    ![图 2-5：自定义位置的概念](img/505695_2_En_2_Fig5_HTML.jpg)


    这个`自定义位置`被管理员用作在您的本地计算资源上部署 Azure Arc 启用的数据服务的目标位置。启用 Azure Arc 的`Kubernetes`集群的过程在第
    6 章中有详细描述，作为创建直接连接的 Azure Arc 启用的数据服务`数据控制器`过程的一部分。


    > **注意**

    >

    > 有关管理服务和网络连接（例如 Internet 地址、端口和代理服务器支持）的更多详细信息，请查看以下链接：

    > ```

    > https://docs.microsoft.com/en-us/azure/azure-arc/data/connectivity

    > ```

    '
- fmt: '## Azure Arc-enabled Data Services Management Functions


    Inside the Arc Management Control Plane, a `Data Controller` and locally available
    management functions are deployed. In this section, we will walk you through each
    of those core elements. Figure [2-6](#505695_2_En_2_Chapter.xhtml#Fig6) highlights
    these management functions as deployed inside a local `Kubernetes Cluster`.


    ![](images/505695_2_En_2_Chapter/505695_2_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Azure Arc Management Control Plane implements many of core management and operations
    functions in your local `Kubernetes Cluster`


    *   `Controller Service`: This is the management endpoint available in your `Kubernetes
    Cluster` responsible for handling management operations.


    *   `API`: The `Data Controller` exposes an `API` that can interact with your
    `Kubernetes Cluster` for management operations such as exporting performance,
    logging, or usage data to upload to Azure. Deployment operations are done via
    the `Kubernetes API` directly or using the deployment tools described earlier
    which in turn interact with the `Kubernetes API`.


    *   `Provisioning`: The `Data Controller` coordinates provisioning operations
    with the `Kubernetes API`. When working with `Kubernetes` native tools or Azure
    Data Services tools such as `Azure Data Studio` and `azure-cli`, provisioning
    operations are submitted directly to the `Kubernetes API` and then sent into the
    underlying `Kubernetes Cluster` to deploy new workloads and configuration state
    changes. The `Data Controller` monitors provisioning requests for `Custom Resources`,
    such as `SQL Managed Instance` and `Postgres`, and coordinates with the `Kubernetes
    API` to provision the supporting `Kubernetes` native objects such as `StatefulSets`,
    `Services`, and others that make up the `Custom Resource` being deployed.


    *   `Dashboards`: Management dashboards are available in `Azure Data Studio`.
    These dashboards provide information on the current state of the data services
    deployed and the `Data Controller` itself.


    *   `Metrics`: `Grafana` is used to expose key performance metrics at several
    layers in your `Cluster`, including `PostgreSQL Hyperscale` and `SQL Server Managed
    Instance`-specific dashboards. `Grafana` is available as a web portal deployed
    in your `Cluster`.


    *   `Logging`: `Kibana` is used to aggregate and provide search capabilities for
    logs emitted in the `Cluster`. Several resources are streaming log data into `Kibana`
    including `SQL Managed` and `PostgreSQL Hyperscale` instances deployed. `Kibana`
    is available as a web portal deployed in your `Cluster`.


    *   `Managed Backup and Restore`: Backup and restore automation are controlled
    by the `Data Controller`. Every Azure Arc-enabled `SQL Managed Instance` comes
    with a built-in automatic backup feature which is enabled by default. This means
    that every single database that gets created or restored will automatically receive
    an initial full backup followed by scheduled differential and transaction log
    backups. This concept is very similar to the managed backup in an Azure `SQL Managed
    Instance` and allows you to perform a point-in-time restore to any specific timestamp
    within your retention period.


    *   `High Availability`: `Kubernetes` provides basic high availability for workloads
    managed by Controllers such as `ReplicaSets` and `StatefulSets`. If a `Pod` controlled
    by one of these controllers fails, the new `Pod` will be created in the `Cluster`
    replacing the failed `Pod`. For more advanced scenarios that might require coordinated
    failover events for `Pods` inside the `Cluster`, the `Data Controller` can facilitate
    this application-aware failover event.


    ### Data Services Layer: A Closer Look


    With all of the required infrastructure in place, hardware, `Kubernetes`, and
    a `Data Controller`, it is now time to focus on the data services layer. This
    layer is where you deploy traditionally PaaS-based Data Services, such as those
    that you see in the Azure Cloud, in your environment wherever it is on-premises
    or in any cloud. This section digs deeper into each of the currently available
    data services, Azure Arc-enabled `SQL Managed Instance` and Azure Arc-enabled
    `PostgreSQL Hyperscale`, looking at their capabilities and value.'
