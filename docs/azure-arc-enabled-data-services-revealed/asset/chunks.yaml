    Pod 可以跨云或数据中心中的故障域进行调度很有价值。有关`节点选择器`的更多信息，请参阅[`kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/`](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/)。

