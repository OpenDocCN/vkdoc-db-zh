  raw: '## Book Layout


    We split this book into nine separate chapters that will each build on each other
    to give you a full picture of what Azure Arc-enabled Data Services are:


    *   Chapter [1](#505695_2_En_1_Chapter.xhtml), “A Kubernetes Primer”: Kubernetes
    is the architectural backbone of every Azure Arc-enabled Data Services installation.
    This chapter introduces Kubernetes, describing its role in modern application
    deployment, the benefits it provides, and its architecture.


    *   Chapter [2](#505695_2_En_2_Chapter.xhtml), “Azure Arc-enabled Data Services”:
    This chapter introduces you to Azure Arc-enabled Data Services! We will introduce
    the core Azure Arc-enabled resources, including servers, Kubernetes, SQL Server,
    and Data Services. We will then dive deeper into what Azure Arc-enabled Data Services
    are, its architecture, how workloads are deployed and managed, and discuss key
    deployment considerations such as compute and storage capacity planning.


    *   Chapter [3](#505695_2_En_3_Chapter.xhtml), “Getting Ready for Deployment”:
    In this chapter, we will walk you through the required steps that need to be taken
    care of before you can start deploying your own Azure Arc-enabled Data Services.


    *   Chapter [4](#505695_2_En_4_Chapter.xhtml), “Installing Kubernetes”: In this
    chapter, we will guide you through the setup process of a Kubernetes Cluster,
    which is required to deploy Azure Arc-enabled Data Services.


    *   Chapter [5](#505695_2_En_5_Chapter.xhtml), “Deploying a Data Controller in
    Indirect Mode”: Next, we will guide you on what needs to be done – either using
    a graphical user interface or the command line – to deploy an Azure Arc-enabled
    Data Controller within your Kubernetes Cluster that will not be constantly connected
    to the Azure Cloud.


    *   Chapter [6](#505695_2_En_6_Chapter.xhtml), “Deploying a Data Controller in
    Direct Mode”: In this chapter, we will guide you on how to deploy a Data Controller
    to a Kubernetes Cluster that is connected to the Azure Cloud – and we’ll even
    show you how to deploy this from the Azure Portal.


    *   Chapter [7](#505695_2_En_7_Chapter.xhtml), “Deploying an Azure Arc-enabled
    SQL Managed Instance”: With our Data Controller ready and waiting, we can now
    go ahead and start deploying a first database instance so we can start working
    with our Arc instance. Similar to the deployment of a Data Controller, we can
    either use the command line and the azure-cli directly or use a wizard in Azure
    Data Studio for this.


    *   Chapter [8](#505695_2_En_8_Chapter.xhtml), “Deploying Azure Arc-enabled PostgreSQL
    Hyperscale”: While Chapter [7](#505695_2_En_7_Chapter.xhtml) was handling SQL
    Managed Instances, this chapter will guide you through the necessary steps when
    it comes to working with PostgreSQL Hyperscale instead.


    *   Chapter [9](#505695_2_En_9_Chapter.xhtml), “Monitoring and Management”: In
    this last chapter, we will focus on how to monitor and manage your Azure Arc-enabled
    Data Services by leveraging both local management services and Azure’s management
    capabilities.


