    scaling operations, life cycle operations, or reacting to failure events, Kubernetes
    provides this persistent networking abstraction for accessing these applications.
    Depending upon the type of Service used, the Service can load balance application
    traffic to the Pods supporting the application. As Pods are created and destroyed,
    based on either scaling operations or in response to life cycle operations or
    failures in the Cluster, Kubernetes automatically updates the information on which
    Pods provide the application services.


    ## The Kubernetes API


    The Kubernetes API provides a programmatic layer representing the resources available
    in a data center. The API enables you to write code to consume those resources
    in your application deployments. When writing code to consume the API, you use
    *API Objects*, which you use to define and deploy application workloads in Kubernetes.


    The code you write is submitted to the *API Server*. The API Server is the core
    communication hub in a Kubernetes Cluster. It is the primary way you interact
    with a Kubernetes Cluster and the only way Kubernetes components inside a Cluster
    exchange information. With the new Cluster state defined, either on initial deployment
    or by modifying an existing deployment, Kubernetes begins to implement the state
    described in your code. The desired state of your code becomes the running state
    in the Cluster.


    ### API Objects


    Kubernetes API Objects represent resources available in a Cluster. There are API
    Objects for compute, storage, and networking elements, among others, available
    in a Cluster for consumption by your application workloads. You will write code
    using these API Objects to define the desired state of your applications and systems
    deployed into a Kubernetes Cluster.


    The defined API Objects communicate the desired state of the workload deployed
    to the Cluster, and the Cluster has the responsibility of ensuring that desired
    state becomes the running state of the Cluster.


    We will now introduce the core API Objects to define workloads in a Kubernetes
    Cluster. These are the core building blocks of applications deployed in Kubernetes.
    In the upcoming sections, we will dive deeper into each of these individually.


    *   **Pods**: These are container-based applications. A Pod is the unit of work
    in a Cluster. A Pod is an abstraction that encompasses one or more containers
    and the resources and configuration it needs to execute, including networking,
    storage, environment variables, configuration files, and secrets.


    *   **Controllers**: These define and keep application workloads in the Cluster
    in the desired state. Some Controllers have the responsibility of starting Pods
    and keeping those Pods in the desired state. There are several different types
    of Controllers for ensuring the state of applications and systems deployed and
    also for the running state of the Cluster. We introduce several Controllers in
    this section and more throughout the book’s remainder, including the Deployment
    and StatefulSet API Objects.


    *   **Services**: These provide a networking abstraction for access to Pod-based
    applications. Services are how applications consumers, such as users and other
    applications, access the container-based application services deployed in a Cluster
    via a network.


    *   **Storage**: This provides an abstraction for Pods to access storage available
    in a Cluster. Storage is used by applications to persist data independent of the
    life cycle of Pods.


    *   **Custom Resource Definition (CRD)** : A CRD is an extension of the Kubernetes
    API, enabling developers to encapsulate application-specific configuration and
    functionality in custom API Objects. Then that custom API Object is used to deploy
    that application. Using CRD allows application developers additional control in
    how the API Object is defined and functions when deployed. In Azure Arc-enabled
    Data Services, you will find CRD for SQL Server Managed Instance, PostgreSQL versions
    11 and 12, and also for the Data Controller.


    In addition to the API Objects described earlier, there are many more used to
    craft workloads, but these are the core API Object types focused on in this book
    and for deploying SQL Server and Azure Arc-enabled Data Services.'
  trans: '### Kubernetes 的优势


    以下是 Kubernetes 带来的主要优势：


    *   **工作负载调度**：Kubernetes 是一个容器编排器，其主要目标是在一个 `集群` 的 `节点` 上启动基于容器的应用程序，称为 `Pod`。在
    `集群` 中为 `Pod` 寻找最合适的运行位置是 Kubernetes 的职责所在。在将 `Pod` 调度到 `节点` 时，首要考虑是确定该 `节点` 是否有足够的
    CPU 和内存资源来运行分配的工作负载。

    *   **管理状态**：当代码部署到 Kubernetes 中，定义了一个需要运行的工作负载时，Kubernetes 有责任在 `集群` 中启动 `Pod`
    和其他资源，并保持 `集群` 处于期望状态。如果 `集群` 的运行状态偏离了期望状态，Kubernetes 会尝试改变 `集群` 的运行状态，使其回到已定义的期望状态。例如，如果一个
    `Deployment` 定义了需要运行一定数量的 `Pod`。如果某个 `Pod` 失败，Kubernetes 会在 `集群` 中部署一个新的 `Pod`，替换失败的
    `Pod`，确保 `Deployment` 所定义数量的 `Pod` 都正常运行。此外，假设你想要扩展支持某个应用程序的 `Pod` 数量以增加容量。在这种情况下，你只需增加
    `Deployment` 中的副本数量，Kubernetes 就会在 `集群` 中创建额外的 `Pod`，确保期望状态得以实现。更多内容将在后续关于控制器的章节中介绍。

    *   **一致性部署**：通过代码部署应用程序可以实现可重复的流程。定义 `Deployment` 的代码是配置构件，可以存放在源代码控制中。你也可以使用这些代码，在开发环境等低版本环境，甚至在本地系统和云之间部署完全相同的系统。更多内容将在后续关于
    Kubernetes API 的章节中介绍。

    *   **速度**：Kubernetes 支持快速、受控的部署，能在 `集群` 中快速启动 `Pod`。此外，在 Kubernetes 中，你可以快速扩展应用程序。扩展支持应用程序的
    `Pod` 数量可以简单到更改一行代码，而且这个过程可能只需几秒钟。在第[6]章中，通过向一个 `PostgreSQL` Hyperscale 部署添加额外副本，展示了这种速度。

    *   **基础设施抽象**：Kubernetes API 为 `集群` 中可用的资源提供了一个抽象层或封装。在部署应用程序时，重点较少放在基础设施上，而更多放在如何定义、部署应用程序以及如何消耗
    `集群` 的资源上。用于部署的代码将描述部署应该呈现的样子，而 `集群` 会实现它。如果应用程序需要公共 IP 地址或存储等资源，这些需求会成为部署的一部分，`集群`
    将与底层基础设施交互，为应用程序配置这些资源。这种基础设施抽象是 Azure Arc-enabled Data Services 设计和实现的关键。我们将在本章末尾进一步探讨这个概念。

    *   **持久服务端点**：Kubernetes 为部署在 `集群` 中的应用程序提供持久的 IP 和 DNS 命名。由于 `Pod` 可能会因扩缩操作、生命周期操作或响应故障事件而出现和消失，Kubernetes
    为访问这些应用程序提供了这种持久的网络抽象。根据所使用的 `Service` 类型，`Service` 可以将应用程序流量负载均衡到支持该应用程序的 `Pod`。随着
    `Pod` 被创建和销毁（基于扩缩操作、响应生命周期操作或 `集群` 中的故障），Kubernetes 会自动更新关于哪些 `Pod` 提供应用程序服务的信息。


    ## Kubernetes API


    Kubernetes API 提供了一个代表数据中心可用资源的可编程层。该 API 使你能够编写代码，在你的应用程序部署中使用这些资源。在编写代码使用 API
    时，你会用到 `API 对象`，你用它们来定义和部署 Kubernetes 中的应用程序工作负载。


    你编写的代码被提交给 `API 服务器`。`API 服务器` 是 Kubernetes `集群` 中的核心通信枢纽。它既是与 Kubernetes `集群`
    交互的主要方式，也是 `集群` 内 Kubernetes 组件交换信息的唯一途径。新的 `集群` 状态定义后（无论是初始部署还是通过修改现有部署），Kubernetes
    开始实施代码中描述的状态。你代码的期望状态成为 `集群` 中的运行状态。


    ### API 对象


    Kubernetes `API 对象` 代表了 `集群` 中可用的资源。`集群` 中有用于计算、存储和网络等元素的 `API 对象`，可供你的应用程序工作负载使用。你将使用这些
    `API 对象` 编写代码，以定义你部署到 Kubernetes `集群` 中的应用程序和系统的期望状态。


    定义的 `API 对象` 传达了部署到 `集群` 的工作负载的期望状态，而 `集群` 有责任确保该期望状态成为 `集群` 的运行状态。


    现在，我们将介绍用于在 Kubernetes `集群` 中定义工作负载的核心 `API 对象`。它们是在 Kubernetes 中部署的应用程序的核心构建块。在接下来的章节中，我们将更深入地分别探讨每一个对象。


    *   `Pod`：这些是基于容器的应用程序。`Pod` 是 `集群` 中的工作单元。`Pod` 是一个抽象，它包含一个或多个容器，以及执行所需的资源和配置，包括网络、存储、环境变量、配置文件和机密信息。

    *   `控制器`：它们定义应用程序工作负载并使其在 `集群` 中保持期望状态。一些 `控制器` 负责启动 `Pod` 并使这些 `Pod` 保持期望状态。有几种不同类型的
    `控制器` 用于确保已部署的应用程序和系统的状态，以及 `集群` 的运行状态。我们在本节介绍几种 `控制器`，并在本书其余部分介绍更多，包括 `Deployment`
    和 `StatefulSet` `API 对象`。

    *   `服务`：它们为访问基于 `Pod` 的应用程序提供网络抽象。`服务` 是应用程序消费者（如用户和其他应用程序）通过网络访问部署在 `集群` 中的基于容器的应用程序服务的方式。

    *   `存储`：这为 `Pod` 访问 `集群` 中可用的存储提供了抽象。`存储` 被应用程序用来持久化数据，其生命周期独立于 `Pod` 的生命周期。

    *   `自定义资源定义`：`CRD` 是 Kubernetes API 的扩展，使开发者能够将特定于应用程序的配置和功能封装在自定义 `API 对象` 中。然后使用该自定义
    `API 对象` 来部署该应用程序。使用 `CRD` 为应用程序开发者在定义和部署时如何操作 `API 对象` 提供了额外的控制权。在 Azure Arc-enabled
    Data Services 中，你会发现用于 SQL Server 托管实例、PostgreSQL 11 和 12 版本以及数据控制器的 `CRD`。


    除了前面描述的 `API 对象` 外，还有许多其他对象用于构建工作负载，但本书重点介绍的是这些核心 `API 对象` 类型，它们用于部署 SQL Server
    和 Azure Arc-enabled Data Services。'
- fmt: '### API Server


    The API Server is the central communication hub in a `Kubernetes` `Cluster`. It
    is the primary way users of `Kubernetes` interact with a `Cluster` to deploy workloads.
    It is also the primary way `Kubernetes` exchanges information between the components
    inside a `Cluster`. The API Server is a `REST` `API` available over `HTTPS` exposing
    `API` `Objects` as `JSON`. As `Cluster` users define workloads and communicate
    the information into the API Server, this information is serialized and persisted
    into the `Cluster` data store. `Kubernetes` then will move the running state of
    the `Cluster` into the desired state defined in those `API` `Objects` stored in
    the `Cluster` store. The `Cluster` data store in `Kubernetes` is `etcd` which
    is a distributed key-value data store; for more information, see [*https://etcd.io/*](https://etcd.io/).


    ### Core Kubernetes `API` Primitives


    Now it is time to look more closely at each of the high-level `API` `Objects`
    introduced in the last section. This section introduces `Pods`, `Controllers`,
    `Services`, and `Storage`. You will learn more details about each and how they
    enable you to deploy applications in `Kubernetes` and the workloads that each
    `API` `Object` allows you to deploy.


    #### `Pods`


    A `Pod` is the most basic unit of work in a `Kubernetes` `Cluster`. At its core,
    a `Pod` is an `API` `Object` that represents one or more containers, its resources
    such as networking, storage, and configuration controlling a `Pod`’s execution.
    Most commonly, a `Pod` `API` `Object` definition consists of the container image(s),
    networking ports used to talk to the container-based application, and, if needed,
    storage.


    A `Pod` is the unit of scheduling in a `Kubernetes` `Cluster`. In `Kubernetes`,
    scheduling determines on which `Node` in a `Cluster` to start a `Pod`. Once the
    `Pod` is scheduled on the `Node`, a container using the specified container image
    is started on that `Node` by the container runtime, which conventionally is the
    `containerd` container runtime. When scheduling `Pods` to `Nodes`, `Kubernetes`
    ensures the resources like `CPU` and memory required to run the `Pod` are available
    on the selected `Node` and, if configured in the `Pod`, access to the storage.


    Note


    `Kubernetes` implements the `Container Runtime Interface (CRI)`, meaning the container
    runtime is a pluggable resource and can use other `CRI` compliant container runtimes.


    A `Pod` is the unit of scaling. When deploying applications in `Kubernetes`, you
    can scale an application horizontally by creating multiple copies of a `Pod` in
    a `Cluster`, called replicas. Scaling `Pod` replicas enables applications to support
    larger workloads by starting more `Pods` on the `Nodes` in a `Cluster` and leveraging
    additional `Cluster` capacity. Further, running multiple replicas of a `Pod` in
    a `Cluster` across multiple `Nodes` provides high availability in the event of
    `Pod` or `Node` failures.


    A `Pod` is ephemeral. If a `Pod` is deleted, its container(s) on the `Node` are
    stopped and then deleted. It is destroyed forever, including its writeable layer.
    A `Pod` is never redeployed. Instead, `Kubernetes` creates a new `Pod` from the
    current `Pod` `API` `Object` definition. There is no state maintained between
    these two deployments of a `Pod`. For stateless workloads, like web applications,
    this is `OK`. As new `Pods` are created, when ready, they can begin accepting
    workload when ready. But for stateful workloads like relational database systems,
    a `Pod` needs the ability to persist the state of the data stored in its databases
    independent of the `Pod` life cycle. `Kubernetes` gives us `API` `Objects` and
    constructs for persistent storage which are described later in this chapter.


    #### `Controllers`


    `Controllers` define, monitor, and keep workloads and the running state of the
    `Cluster` in the desired state. This section focuses on `Controllers` for creating
    and managing `Pods`. In `Kubernetes`, it is rare to create `Pods` by defining
    and deploying a `Pod` `Object` manually. Two common Workload `API` `Objects` are
    used for deploying applications in `Kubernetes`. They are `Deployment` and `StatefulSet`.


    A `Deployment` is an `API` `Object` that enables you to define an application’s
    desired state in the `Pod`’s configuration and includes the number of `Pods` to
    create, called replicas. The `Deployment` `Controller` creates a `ReplicaSet`.
    The `ReplicaSet` is responsible for starting `Pods` in the `Cluster`, using the
    `Pod` specification from the `Deployment` `Object`. The first frame of Figure
    [1-1](#505695_2_En_1_Chapter.xhtml#Fig1) shows a `Deployment` that creates a `ReplicaSet`
    and that `ReplicaSet` starts three `Pods` in the `Cluster`.


    ![](images/505695_2_En_1_Chapter/505695_2_En_1_Fig1_HTML.jpg)


    Figure 1-1


    `ReplicaSet` Operations


    `Controllers` are responsible for keeping the running state of the `Cluster` in
    the desired state, so let’s see that in action. In the second frame of Figure
    [1-1](#505695_2_En_1_Chapter.xhtml#Fig1), let’s say one of those `Pods` fails
    for any reason. Perhaps the application crashed, or maybe even the `Node` that
    `Pod` is running on is no longer available. In the third frame, the `ReplicaSet`
    `Controller` senses that the running state has deviated from desired state and
    initiates the creation of a new `Pod`, ensuring the `ReplicaSet`, or the application,
    stays in the desired state of three `Pods` running at all times.


    You might be asking, why does the `Deployment` `Controller` create a `ReplicaSet`
    rather than the `Deployment` creating the `Pods` directly? The `Deployment` `Controller`
    defines both the number of `Pods` to create and also the `Pod`’s configuration.
    When a `Deployment` configuration is updated, `Pods` in the old `ReplicaSet` shut
    down, and `Pods` in a new `ReplicaSet` are created. This enables the rollout of
    new container images or `Pod` configuration. A single `Deployment` `Object` still
    exists, and it manages the declarative updating and transitioning between `ReplicaSets`.
    If you want to dig deeper into this topic, check out the `Pluralsight` course
    “Managing `Kubernetes` `Controllers` and `Deployments`.”


    `Deployment` `Controllers` do not guarantee order or persistent naming of `Pods`.
    A `Deployment` consists of a collection of `Pods`, each of which is an exact copy
    of an application. However, the `Pods`’ names are not persistent if a `Pod` is
    destroyed, and a new `Pod` is created in its place. Applications such as database
    systems often distribute data across multiple compute elements and then have to
    keep track of the data’s location in the system for subsequent retrieval. Using
    a `Deployment` `Controller` can be problematic for stateful applications that
    require knowing the precise location of data in a collection of named compute
    resources.


    To allow `Kubernetes` to support these types of stateful applications, the `StatefulSet`
    `Controller` creates `Pods`, each with unique, persistent, and ordered names.
    So, applications that need to control the placement of data across multiple `Pods`
    can do that as `Pod` names are ordered and persist independent of that `Pod`’s
    life cycle. Further, `StatefulSets` provide stable storage for applications, ensuring
    the mapping of the correct storage object to the same named `Pod` if it has to
    be created again for any reason.'
