  trans: '

    # 部署直接模式数据控制器


    由于直接连接的 Azure Arc 数据控制器本质上与其他 Azure 资源无异（尽管仅其元数据驻留在 Azure 中），我们也可以通过 CLI 或 ARM
    模板等方式来部署它。


    不过，我们将重点介绍通过 Azure 门户的方法。欢迎您复用此过程中生成的 ARM 模板——我们只是觉得，能在门户中在线部署一个资源，然后它就会显示在我们本地的
    Kubernetes 集群中，这种方式非常酷。


    要开始部署，请导航至 Azure 门户中的“创建 Azure Arc 数据控制器”页面，网址为 `https://portal.azure.com/#create/Microsoft.DataController`，并选择您计划使用启用
    Azure Arc 的 Kubernetes 集群，即直接连接模式，如图 6-9 所示。


    ![](img/505695_2_En_6_Fig9_HTML.png)


    图 6-9：在 Azure 门户中创建 Azure Arc 数据控制器


    在下一个屏幕中，如图 6-10 所示，您将首先提供用于数据控制器元数据的订阅和资源组，以及控制器的名称。


    ![](img/505695_2_En_6_Fig10_HTML.jpg)


    图 6-10：数据控制器详细信息


    在同一屏幕上，您需要选择要使用的自定义位置，或者创建一个新的，如图 6-11 所示。


    ![](img/505695_2_En_6_Fig11_HTML.jpg)


    图 6-11：创建新的自定义位置


    仍然在这个第一个屏幕上，我们还将提供 Kubernetes 配置——例如存储类等信息，这些信息我们在上一章中已经通过命令行提供过，还包括服务类型以及用于指标和日志内置仪表板的凭据（如图
    6-12 所示）。


    ![](img/505695_2_En_6_Fig12_HTML.jpg)


    图 6-12：Kubernetes 配置和仪表板凭据


    进入下一个屏幕“附加设置”（参见图 6-13），我们可以启用或禁用指标和日志的自动上传。强烈建议将两者都启用，以确保您能享受到实时警报等功能。启用时，您还需要选择要使用的
    Log Analytics 工作区，并提供我们之前通过列表 6-9 获取的其主密钥。


    ![](img/505695_2_En_6_Fig13_HTML.jpg)


    图 6-13：指标和日志上传


    在最后一个配置步骤中，如图 6-14 所示，您可以为数据控制器提供标签，这在使用位于不同位置的多个控制器时尤其有用。


    ![](img/505695_2_En_6_Fig14_HTML.jpg)


    图 6-14：Azure 标签


    至此，您可以完成部署并创建数据控制器，控制器会像图 6-15 所示那样返回确认信息。


    ![](img/505695_2_En_6_Fig15_HTML.jpg)


    图 6-15：部署完成


    我们新的 Azure Arc 数据控制器也会立即显示在我们的资源组中，如图 6-16 所示。


    ![](img/505695_2_En_6_Fig16_HTML.jpg)


    图 6-16：Azure 资源组中显示的数据控制器


    然而，这仅意味着部署命令已发送到 Kubernetes 集群。我们可以使用列表 6-10 中的命令，通过 `kubectl` 监控实际的部署过程。


    ```

    kubectl get pods -n arc-direct

    ```


    列表 6-10：用于列出命名空间 `arc-direct` 中 Pod 的 `kubectl` 命令


    如图 6-17 所示，最初的几个 Pod 已经开始与我们预先存在的引导程序一起创建。


    ![](img/505695_2_En_6_Fig17_HTML.jpg)


    图 6-17：部署期间 `arc-direct` 命名空间中的 Pod


    如果您在一段时间后重新运行列表 6-10 中的命令，您应该会看到数据控制器的所有 Pod，类似于我们上一章中间接模式部署的 Pod，如图 6-18 所示。


    ![](img/505695_2_En_6_Fig18_HTML.jpg)


    图 6-18：部署后 `arc-direct` 命名空间中的 Pod


    您还可以使用列表 6-11 中的命令来验证此数据控制器的状态。


    ```

    az arcdata dc status show --k8s-namespace arc-direct --use-k8s

    ```


    列表 6-11：用于获取数据控制器状态的 `azure-cli` 命令


    如图 6-19 所示，控制器显示为就绪状态。


    ![](img/505695_2_En_6_Fig19_HTML.jpg)


    图 6-19：数据控制器状态


    要将此群集添加到 Azure Data Studio 中，只需使用与添加间接模式控制器相同的过程，并提供控制器的 Kubernetes 命名空间，如图 6-20
    所示。


    ![](img/505695_2_En_6_Fig20_HTML.jpg)


    图 6-20：在 ADS 中连接现有的数据控制器


    在 Azure Data Studio 中，添加控制器后，我们还可以再次验证该控制器是否处于直接连接模式（图 6-21）。


    ![](img/505695_2_En_6_Fig21_HTML.jpg)


    图 6-21：ADS 中的数据控制器详细信息


    我们直接连接的数据控制器现在可以通过 Azure 门户、命令行和 Azure Data Studio 进行管理和访问。


    ## 总结与要点


    本章和上一章通过部署直接或间接模式的数据控制器，让我们朝着使用首个 Arc 启用数据服务实例又迈进了一大步。


    现在，让我们跨越最后的鸿沟，为在下一章中使用我们的 Arc 启用数据服务部署做一些有用的事情做好准备：向我们的控制器中部署一个 SQL 托管实例。


    # 7. 部署 Azure Arc 启用的 SQL 托管实例


    我们的数据控制器已准备就绪并正在等待，我们现在可以继续开始部署第一个数据库实例，以便开始使用我们的 Arc 启用数据服务安装。


    与数据控制器的部署类似，我们可以使用命令行、Azure Data Studio 中的向导或 Azure 门户来完成此操作。


    **注意**

    除非另有说明，我们所有的实例部署都将针对间接连接的数据控制器。

    '
- fmt: "# Deployment Through the azure-cli\n\nA new Azure Arc-enabled SQL Managed\
    \ Instance can be deployed through a simple `azure-cli` command like the one in\
    \ Listing [7-1](#505695_2_En_7_Chapter.xhtml#PC1). The only required parameters\
    \ are the name of the instance and the Kubernetes Namespace. The Namespace will\
    \ be created for you; if it already exists, it must be empty.\n\n```\naz sql mi-arc\
    \ create -n mi-1 --k8s-namespace arc --use-k8s\nListing 7-1\nazure-cli command\
    \ to create a new Azure Arc SQL MI\n```\n\nIf you look at the command in Listing\
    \ [7-2](#505695_2_En_7_Chapter.xhtml#PC2) which would create a regular Managed\
    \ Instance, you can tell how Azure-native the Arc commands really are.\n\n```\n\
    az sql mi create -n mi-1 …\nListing 7-2\nazure-cli command to create a new Azure\
    \ SQL MI\n```\n\nThe `azure-cli` will again prompt you for a password unless you\
    \ provided it through the `AZDATA_PASSWORD` environment variable and then proceed\
    \ with the deployment as shown in Figure [7-1](#505695_2_En_7_Chapter.xhtml#Fig1).\n\
    \n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig1_HTML.jpg)\n\nFigure 7-1:\
    \ Output of SQL MI deployment command\n\nOnce the deployment – which should only\
    \ take a few minutes – has completed, we can run a quick `az` command to list\
    \ all our instances, which is just this one for now, as shown in Listing [7-3](#505695_2_En_7_Chapter.xhtml#PC3).\n\
    \n```\naz sql mi-arc list --k8s-namespace arc --use-k8s -o table\nListing 7-3\n\
    azure-cli command to list all SQL MIs in the current Controller\n```\n\nThe output\
    \ (similar to Figure [7-2](#505695_2_En_7_Chapter.xhtml#Fig2)) will include the\
    \ instance’s endpoint, name, state, and its number of replicas.\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2: List of SQL Managed Instances in the current Controller\n\nIf we\
    \ refresh our Data Controller’s management page in Azure Data Studio as shown\
    \ in Figure [7-3](#505695_2_En_7_Chapter.xhtml#Fig3), the instance will also show\
    \ up.\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig3_HTML.jpg)\n\nFigure\
    \ 7-3: Arc Data Controller management page in ADS\n\nWhen clicking on the instance,\
    \ we will be led to the instance’s dashboard which will once again show its endpoint,\
    \ status, etc., as displayed in Figure [7-4](#505695_2_En_7_Chapter.xhtml#Fig4).\
    \ The external endpoint shown would also be the endpoint you’d use to connect\
    \ to this instance using any application including Azure Data Studio or SQL Server\
    \ Management Studio. Since this is a `kubeadm`-based Kubernetes Cluster, it will\
    \ be a `NodePort` Service. This may differ on other Kubernetes types. On Azure\
    \ Kubernetes Services, for example, the default would be a `LoadBalancer` Service.\n\
    \n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig4_HTML.jpg)\n\nFigure 7-4:\
    \ SQL MI management page in ADS\n\nInstead of using `az` or Azure Data Studio,\
    \ you could also look at the Pods that have been deployed using `kubectl` as shown\
    \ in Listing [7-4](#505695_2_En_7_Chapter.xhtml#PC4).\n\n```\nkubectl get pods\
    \ -n \nListing 7-4\nkubectl command to list Pods in Namespace\n```\n\nThe result\
    \ would look similar to the one in Figure [7-5](#505695_2_En_7_Chapter.xhtml#Fig5).\n\
    \n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig5_HTML.png)\n\nFigure 7-5:\
    \ Pods in arc Namespace\n\nOf course, the `azure-cli` also accepts additional\
    \ parameters when creating a new Azure Arc-enabled SQL Managed Instance, for example,\
    \ the Storage Classes.\n\nOne of the most interesting parameters though is `replicas`.\
    \ By default, an Arc SQL Managed Instance will deploy using the General-Purpose\
    \ tier, so with a single replica. By providing the `--replicas` switch, you can\
    \ increase the number of replicas to two or three which will make your instance\
    \ use the Business-Critical tier and automatically deploy an Availability Group\
    \ with the given number of replicas as shown in Listing [7-5](#505695_2_En_7_Chapter.xhtml#PC5).\n\
    \n```\naz sql mi-arc create -n mi-2 --k8s-namespace arc --use-k8s\n--storage-class-logs\
    \ local-storage --storage-class-data local-storage --storage-class-datalogs local-storage\
    \ --replicas 3\nListing 7-5\nazure-cli command to create a new SQL Managed Instance\
    \ with parameters\n```\n\nWith regard to picking appropriate Storage Classes,\
    \ traditional DBA storage/file layout applies here, and we’re using `local-storage`\
    \ for the example only. As you can see in Figure [7-6](#505695_2_En_7_Chapter.xhtml#Fig6),\
    \ where we ran `kubectl get pods`, this will create three rather than just one\
    \ Pod for your instance, each of them representing a replica. In addition, every\
    \ Azure Arc-enabled SQL Managed Instance also comes with an `<name>-ha-0` Pod\
    \ which controls high availability.\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6: Pods in Arc Namespace\n\n# Deployment Through Azure Data Studio\n\
    \nAzure Data Studio can also be used to run a full deployment. On a Data Controller’s\
    \ dashboard, we can find a button “New Instance” (see Figure [7-7](#505695_2_En_7_Chapter.xhtml#Fig7)).\n\
    \n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig7_HTML.jpg)\n\nFigure 7-7:\
    \ New Instance deployment button in Azure Data Studio\n\nThis triggers another\
    \ wizard which will first ask us what kind of an instance we want to create. Pick\
    \ an Azure SQL Managed Instance as illustrated in Figure [7-8](#505695_2_En_7_Chapter.xhtml#Fig8)\
    \ and accept the terms.\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig8_HTML.png)\n\
    \nFigure 7-8: Instance deployment wizard in ADS\n\nThe following screen will ask\
    \ us to accept the license agreement and check for the prerequisites as shown\
    \ in Figure [7-9](#505695_2_En_7_Chapter.xhtml#Fig9).\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig9_HTML.png)\n\
    \nFigure 7-9: Instance deployment wizard in ADS\n\nThis is followed by the configuration\
    \ options like Storage Classes for each data type, CPU, and memory requests and\
    \ limits for this instance (see Figure [7-10](#505695_2_En_7_Chapter.xhtml#Fig10)).\
    \ If needed, as introduced in Chapter [2](#505695_2_En_2_Chapter.xhtml), you could\
    \ assign different Storage Classes for logs, data, and data logs (transaction\
    \ logs).\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig10_HTML.png)\n\n\
    Figure 7-10: Parameters for SQL MI deployment in Azure Data Studio\n\nCompleting\
    \ this page will give you the option to deploy this instance immediately or generate\
    \ another notebook (just like when we created the Data Controller) which can be\
    \ run using the “Run all” button as shown in Figure [7-11](#505695_2_En_7_Chapter.xhtml#Fig11).\n\
    \n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig11_HTML.jpg)\n\nFigure 7-11:\
    \ “Run all” button to trigger SQL MI deployment\n\nWhile the deployment is running,\
    \ we can see the instance being created when refreshing the Data Controller’s\
    \ status page (see Figure [7-12](#505695_2_En_7_Chapter.xhtml#Fig12)).\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig12_HTML.jpg)\n\
    \nFigure 7-12: New SQL MI showing as “Creating” in Azure Data Studio\n\nAlternatively,\
    \ we can also monitor the progress using `kubectl get pods --watch` again (see\
    \ Figure [7-13](#505695_2_En_7_Chapter.xhtml#Fig13)).\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig13_HTML.jpg)\n\
    \nFigure 7-13: Output of Kubernetes Pod list\n\nOnce the deployment completes,\
    \ the instance is ready for use."
  raw: "## Deployment Through the azure-cli\n\nA new Azure Arc-enabled SQL Managed\
    \ Instance can be deployed through a simple azure-cli command like the one in\
    \ Listing [7-1](#505695_2_En_7_Chapter.xhtml#PC1). The only required parameters\
    \ are the name of the instance and the Kubernetes Namespace. The Namespace will\
    \ be created for you; if it already exists, it must be empty.\n\n```\naz sql mi-arc\
    \ create -n mi-1 --k8s-namespace arc --use-k8s\nListing 7-1\nazure-cli command\
    \ to create a new Azure Arc SQL MI\n```\n\nIf you look at the command in Listing\
    \ [7-2](#505695_2_En_7_Chapter.xhtml#PC2) which would create a regular Managed\
    \ Instance, you can tell how Azure-native the Arc commands really are.\n\n```\n\
    az sql mi create -n mi-1 …\nListing 7-2\nazure-cli command to create a new Azure\
    \ SQL MI\n```\n\nThe azure-cli will again prompt you for a password unless you\
    \ provided it through the AZDATA_PASSWORD environment variable and then proceed\
    \ with the deployment as shown in Figure [7-1](#505695_2_En_7_Chapter.xhtml#Fig1).\n\
    \n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig1_HTML.jpg)\n\nFigure 7-1\n\
    \nOutput of SQL MI deployment command\n\nOnce the deployment – which should only\
    \ take a few minutes – has completed, we can run a quick `az` command to list\
    \ all our instances, which is just this one for now, as shown in Listing [7-3](#505695_2_En_7_Chapter.xhtml#PC3).\n\
    \n```\naz sql mi-arc list --k8s-namespace arc --use-k8s -o table\nListing 7-3\n\
    azure-cli command to list all SQL MIs in the current Controller\n```\n\nThe output\
    \ (similar to Figure [7-2](#505695_2_En_7_Chapter.xhtml#Fig2)) will include the\
    \ instance’s endpoint, name, state, and its number of replicas.\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2\n\nList of SQL Managed Instances in the current Controller\n\nIf\
    \ we refresh our Data Controller’s management page in Azure Data Studio as shown\
    \ in Figure [7-3](#505695_2_En_7_Chapter.xhtml#Fig3), the instance will also show\
    \ up.\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig3_HTML.jpg)\n\nFigure\
    \ 7-3\n\nArc Data Controller management page in ADS\n\nWhen clicking on the instance,\
    \ we will be led to the instance’s dashboard which will once again show its endpoint,\
    \ status, etc., as displayed in Figure [7-4](#505695_2_En_7_Chapter.xhtml#Fig4).\
    \ The external endpoint shown would also be the endpoint you’d use to connect\
    \ to this instance using any application including Azure Data Studio or SQL Server\
    \ Management Studio. Since this is a kubeadm-based Kubernetes Cluster, it will\
    \ be a NodePort Service. This may differ on other Kubernetes types. On Azure Kubernetes\
    \ Services, for example, the default would be a LoadBalancer Service.\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4\n\nSQL MI management page in ADS\n\nInstead of using `az` or Azure\
    \ Data Studio, you could also look at the Pods that have been deployed using kubectl\
    \ as shown in Listing [7-4](#505695_2_En_7_Chapter.xhtml#PC4).\n\n```\nkubectl\
    \ get pods -n \nListing 7-4\nkubectl command to list Pods in Namespace\n```\n\n\
    The result would look similar to the one in Figure [7-5](#505695_2_En_7_Chapter.xhtml#Fig5).\n\
    \n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig5_HTML.png)\n\nFigure 7-5\n\
    \nPods in arc Namespace\n\nOf course, the azure-cli also accepts additional parameters\
    \ when creating a new Azure Arc-enabled SQL Managed Instance, for example, the\
    \ Storage Classes.\n\nOne of the most interesting parameters though is *replicas*.\
    \ By default, an Arc SQL Managed Instance will deploy using the General-Purpose\
    \ tier, so with a single replica. By providing the replicas switch, you can increase\
    \ the number of replicas to two or three which will make your instance use the\
    \ Business-Critical tier and automatically deploy an Availability Group with the\
    \ given number of replicas as shown in Listing [7-5](#505695_2_En_7_Chapter.xhtml#PC5).\n\
    \n```\naz sql mi-arc create -n mi-2 --k8s-namespace arc --use-k8s\n--storage-class-logs\
    \ local-storage --storage-class-data local-storage --storage-class-datalogs local-storage\
    \ --replicas 3\nListing 7-5\nazure-cli command to create a new SQL Managed Instance\
    \ with parameters\n```\n\nWith regard to picking appropriate Storage Classes,\
    \ traditional DBA storage/file layout applies here, and we’re using local-storage\
    \ for the example only. As you can see in Figure [7-6](#505695_2_En_7_Chapter.xhtml#Fig6),\
    \ where we ran `kubectl get pods`, this will create three rather than just one\
    \ Pod for your instance, each of them representing a replica. In addition, every\
    \ Azure Arc-enabled SQL Managed Instance also comes with an *<name>-ha-0* Pod\
    \ which controls high availability.\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6\n\nPods in Arc Namespace\n\n## Deployment Through Azure Data Studio\n\
    \nAzure Data Studio can also be used to run a full deployment. On a Data Controller’s\
    \ dashboard, we can find a button “New Instance” (see Figure [7-7](#505695_2_En_7_Chapter.xhtml#Fig7)).\n\
    \n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig7_HTML.jpg)\n\nFigure 7-7\n\
    \nNew Instance deployment button in Azure Data Studio\n\nThis triggers another\
    \ wizard which will first ask us what kind of an instance we want to create. Pick\
    \ an Azure SQL Managed Instance as illustrated in Figure [7-8](#505695_2_En_7_Chapter.xhtml#Fig8)\
    \ and accept the terms.\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig8_HTML.png)\n\
    \nFigure 7-8\n\nInstance deployment wizard in ADS\n\nThe following screen will\
    \ ask us to accept the license agreement and check for the prerequisites as shown\
    \ in Figure [7-9](#505695_2_En_7_Chapter.xhtml#Fig9).\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig9_HTML.png)\n\
    \nFigure 7-9\n\nInstance deployment wizard in ADS\n\nThis is followed by the configuration\
    \ options like Storage Classes for each data type, CPU, and memory requests and\
    \ limits for this instance (see Figure [7-10](#505695_2_En_7_Chapter.xhtml#Fig10)).\
    \ If needed, as introduced in Chapter [2](#505695_2_En_2_Chapter.xhtml), you could\
    \ assign different Storage Classes for logs, data, and data logs (transaction\
    \ logs).\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig10_HTML.png)\n\n\
    Figure 7-10\n\nParameters for SQL MI deployment in Azure Data Studio\n\nCompleting\
    \ this page will give you the option to deploy this instance immediately or generate\
    \ another notebook (just like when we created the Data Controller) which can be\
    \ run using the “Run all” button as shown in Figure [7-11](#505695_2_En_7_Chapter.xhtml#Fig11).\n\
    \n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig11_HTML.jpg)\n\nFigure 7-11\n\
    \n“Run all” button to trigger SQL MI deployment\n\nWhile the deployment is running,\
    \ we can see the instance being created when refreshing the Data Controller’s\
    \ status page (see Figure [7-12](#505695_2_En_7_Chapter.xhtml#Fig12)).\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig12_HTML.jpg)\n\
    \nFigure 7-12\n\nNew SQL MI showing as “Creating” in Azure Data Studio\n\nAlternatively,\
    \ we can also monitor the progress using `kubectl get pods --watch` again (see\
    \ Figure [7-13](#505695_2_En_7_Chapter.xhtml#Fig13)).\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig13_HTML.jpg)\n\
    \nFigure 7-13\n\nOutput of Kubernetes Pod list\n\nOnce the deployment completes,\
    \ the instance is ready for use."
  trans: "\n# 通过 azure-cli 进行部署\n\n可以通过一个简单的 `azure-cli` 命令来部署一个新的 Azure Arc 启用的 SQL\
    \ 托管实例，如代码清单 7-1 所示。唯一必需的参数是实例名称和 Kubernetes 命名空间。命名空间将为你创建；如果它已存在，则必须为空。\n\n\
    ```\naz sql mi-arc create -n mi-1 --k8s-namespace arc --use-k8s\n代码清单 7-1\n用于创建新的\
    \ Azure Arc SQL MI 的 azure-cli 命令\n```\n\n如果你查看代码清单 7-2 中用于创建常规托管实例的命令，你就能看出 Arc\
    \ 命令是多么的 Azure 原生。\n\n```\naz sql mi create -n mi-1 …\n代码清单 7-2\n用于创建新的 Azure\
    \ SQL MI 的 azure-cli 命令\n```\n\n除非你通过 `AZDATA_PASSWORD` 环境变量提供了密码，否则 `azure-cli`\
    \ 会再次提示你输入密码，然后按照图 7-1 所示继续部署。\n\n![](img/505695_2_En_7_Fig1_HTML.jpg)\n\n图 7-1:\
    \ SQL MI 部署命令的输出\n\n部署完成后（应该只需要几分钟），我们可以运行一个快速的 `az` 命令来列出我们所有的实例，目前就这一个，如代码清单\
    \ 7-3 所示。\n\n```\naz sql mi-arc list --k8s-namespace arc --use-k8s -o table\n\
    代码清单 7-3\n用于列出当前控制器中所有 SQL MI 的 azure-cli 命令\n```\n\n输出（类似于图 7-2）将包括实例的终结点、名称、状态及其副本数量。\n\
    \n![](img/505695_2_En_7_Fig2_HTML.jpg)\n\n图 7-2: 当前控制器中的 SQL 托管实例列表\n\n如果我们在 Azure\
    \ Data Studio 中刷新数据控制器的管理页面，如实图 7-3 所示，该实例也会显示出来。\n\n![](img/505695_2_En_7_Fig3_HTML.jpg)\n\
    \n图 7-3: ADS 中的 Arc 数据控制器管理页面\n\n点击该实例后，我们将进入实例的仪表板，它将再次显示其终结点、状态等，如图 7-4 所示。显示的外部终结点也将是你使用任何应用程序（包括\
    \ Azure Data Studio 或 SQL Server Management Studio）连接到此实例时要使用的终结点。由于这是一个基于 `kubeadm`\
    \ 的 Kubernetes 集群，它将是一个 `NodePort` 类型的服务。在其他 Kubernetes 类型上可能会有所不同。例如，在 Azure\
    \ Kubernetes 服务上，默认将是 `LoadBalancer` 类型的服务。\n\n![](img/505695_2_En_7_Fig4_HTML.jpg)\n\
    \n图 7-4: ADS 中的 SQL MI 管理页面\n\n除了使用 `az` 或 Azure Data Studio，你也可以使用 `kubectl`\
    \ 查看已部署的 Pod，如代码清单 7-4 所示。\n\n```\nkubectl get pods -n \n代码清单 7-4\n用于列出命名空间中 Pod\
    \ 的 kubectl 命令\n```\n\n结果将类似于图 7-5 中的内容。\n\n![](img/505695_2_En_7_Fig5_HTML.png)\n\
    \n图 7-5: arc 命名空间中的 Pod\n\n当然，在创建新的 Azure Arc 启用的 SQL 托管实例时，`azure-cli` 也接受其他参数，例如存储类。\n\
    \n不过，最有趣的参数之一是 `replicas`（副本数）。默认情况下，Arc SQL 托管实例将使用通用层部署，因此只有一个副本。通过提供 `--replicas`\
    \ 开关，你可以将副本数增加到两个或三个，这将使你的实例使用业务关键层，并自动部署具有给定副本数的可用性组，如代码清单 7-5 所示。\n\n```\naz\
    \ sql mi-arc create -n mi-2 --k8s-namespace arc --use-k8s\n--storage-class-logs\
    \ local-storage --storage-class-data local-storage --storage-class-datalogs local-storage\
    \ --replicas 3\n代码清单 7-5\n带参数创建新 SQL 托管实例的 azure-cli 命令\n```\n\n关于选择合适的存储类，传统的数据库管理员存储/文件布局在这里同样适用，示例中我们仅使用了\
    \ `local-storage`。正如你在图 7-6 中看到的，我们运行了 `kubectl get pods`，这将为你的实例创建三个 Pod，而不是只有一个，每个\
    \ Pod 代表一个副本。此外，每个 Azure Arc 启用的 SQL 托管实例还附带一个 `<name>-ha-0` Pod，用于控制高可用性。\n\n\
    ![](img/505695_2_En_7_Fig6_HTML.jpg)\n\n图 7-6: Arc 命名空间中的 Pod\n\n# 通过 Azure Data\
    \ Studio 进行部署\n\nAzure Data Studio 也可用于执行完整部署。在数据控制器的仪表板上，我们可以找到一个“新建实例”按钮（见图\
    \ 7-7）。\n\n![](img/505695_2_En_7_Fig7_HTML.jpg)\n\n图 7-7: Azure Data Studio 中的新建实例部署按钮\n\
    \n这将启动另一个向导，首先会询问我们想要创建哪种类型的实例。选择 Azure SQL 托管实例，如图 7-8 所示，并接受条款。\n\n![](img/505695_2_En_7_Fig8_HTML.png)\n\
    \n图 7-8: ADS 中的实例部署向导\n\n接下来的屏幕将要求我们接受许可协议并检查先决条件，如图 7-9 所示。\n\n![](img/505695_2_En_7_Fig9_HTML.png)\n\
    \n图 7-9: ADS 中的实例部署向导\n\n随后是配置选项，例如每种数据类型的存储类，以及此实例的 CPU 和内存请求与限制（见图 7-10）。如果需要，如第\
    \ 2 章所述，你可以为日志、数据和事务日志（数据日志）分配不同的存储类。\n\n![](img/505695_2_En_7_Fig10_HTML.png)\n\
    \n图 7-10: Azure Data Studio 中 SQL MI 部署的参数\n\n完成此页面后，你将可以选择立即部署此实例或生成另一个笔记本（就像创建数据控制器时一样），该笔记本可以使用“全部运行”按钮来运行，如图\
    \ 7-11 所示。\n\n![](img/505695_2_En_7_Fig11_HTML.jpg)\n\n图 7-11: 触发 SQL MI 部署的“全部运行”按钮\n\
    \n在部署运行期间，我们可以通过刷新数据控制器的状态页（见图 7-12）看到实例正在创建中。\n\n![](img/505695_2_En_7_Fig12_HTML.jpg)\n\
    \n图 7-12: 新 SQL MI 在 Azure Data Studio 中显示为“正在创建”\n\n或者，我们也可以再次使用 `kubectl get\
    \ pods --watch` 来监控进度（见图 7-13）。\n\n![](img/505695_2_En_7_Fig13_HTML.jpg)\n\n图\
    \ 7-13: Kubernetes Pod 列表的输出\n\n部署完成后，实例即可使用。\n"
- fmt: "## Deployment Through Kubernetes Tools\n\nAs Azure Arc-enabled Data Services\
    \ aren’t only Azure but also Kubernetes native, they can also be deployed through\
    \ Kubernetes tools, for example, `kubectl` and a YAML manifest.\n\nListing [7-6](#505695_2_En_7_Chapter.xhtml#PC6)\
    \ describes a SQL Managed Instance for us in a YAML manifest.\n\n```\napiVersion:\
    \ sql.arcdata.microsoft.com/v2\nkind: SqlManagedInstance\nmetadata:\n  name: mi-4\n\
    spec:\n  security:\n    adminLoginSecret: mi-4-login-secret\n  scheduling:\n \
    \   default:\n      resources:\n        limits:\n          cpu: \"2\"\n      \
    \    memory: 4Gi\n        requests:\n          cpu: \"1\"\n          memory: 2Gi\n\
    \  services:\n    primary:\n      type: NodePort\n  storage:\n    backups:\n \
    \     volumes:\n      - className: local-storage\n        size: 5Gi\n    data:\n\
    \      volumes:\n      - className: local-storage\n        size: 5Gi\n    datalogs:\n\
    \      volumes:\n      - className: local-storage\n        size: 5Gi\n    logs:\n\
    \      volumes:\n      - className: local-storage\n        size: 5Gi\n```\nListing\
    \ 7-6\nYAML manifest for Arc SQL Managed Instance\n\nAs we also need to authenticate\
    \ against that Managed Instance, we’ll need the username and password for it to\
    \ be stored in a Kubernetes secret. We can create this Kubernetes secret using\
    \ the `kubectl` command in Listing [7-7](#505695_2_En_7_Chapter.xhtml#PC7).\n\n\
    ```\nkubectl create secret generic mi-4-login-secret `\n--from-literal=password=\
    \ `\n--from-literal=username= `\n-n arc\n```\nListing 7-7\n`kubectl` command to\
    \ create Kubernetes secret\n\nOnce that has completed, we can use `kubectl` and\
    \ our manifest to create our instance (Listing [7-8](#505695_2_En_7_Chapter.xhtml#PC8)).\n\
    \n```\nkubectl apply -f mi-4.yaml -n arc\n```\nListing 7-8\n`kubectl` command\
    \ to create a SQL Managed Instance from YAML\n\nAs you can see in Figure [7-14](#505695_2_En_7_Chapter.xhtml#Fig14),\
    \ this will equally create a Managed Instance for us in our Arc Namespace.\n\n\
    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig14_HTML.jpg)\nFigure 7-14\n\
    Arc Pods in Kubernetes Namespace\n\n## Deployment Through the Azure Portal\n\n\
    Another way of deploying Arc Instances is through the Azure Portal.\n\nNote\n\
    Deployment through the Azure Portal requires a directly connected Cluster as showcased\
    \ in the previous chapter.\n\nNavigate to the “Create a Resource” section in the\
    \ Portal at [*https://portal.azure.com/#create/hub*](https://portal.azure.com/%2523create/hub).\n\
    \nFrom there, search for “arc sql managed instance” as shown in Figure [7-15](#505695_2_En_7_Chapter.xhtml#Fig15).\n\
    \n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig15_HTML.jpg)\nFigure 7-15\n\
    Azure Portal – Create a resource\n\nSelect the only result showing up (Figure\
    \ [7-16](#505695_2_En_7_Chapter.xhtml#Fig16)).\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig16_HTML.jpg)\n\
    Figure 7-16\nAzure Portal – Create Azure SQL Managed Instance - Azure Arc\n\n\
    And click “Create” on the subsequent screen (Figure [7-17](#505695_2_En_7_Chapter.xhtml#Fig17)).\n\
    \n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig17_HTML.jpg)\nFigure 7-17\n\
    Azure Portal – Create Azure SQL Managed Instance - Azure Arc\n\nOn the first screen,\
    \ you will provide basic information like the subscription and resource group\
    \ to be used but also the name of the instance and the custom location (Figure\
    \ [7-18](#505695_2_En_7_Chapter.xhtml#Fig18)).\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig18_HTML.jpg)\n\
    Figure 7-18\nAzure Portal – Create Azure SQL Managed Instance - Azure Arc – Basics\n\
    \nOn the Configure compute + storage page (Figure [7-19](#505695_2_En_7_Chapter.xhtml#Fig19)),\
    \ you can not only define your Storage Classes, requests, and limits, but this\
    \ is also where you’d pick the tier and therefore decide on the number of replicas.\
    \ Based on these settings, you’ll also be provided an estimated cost.\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig19_HTML.png)\n\
    Figure 7-19\nAzure Portal – Create Azure SQL Managed Instance - Azure Arc – Configure\
    \ compute + storage\n\nThe last information that you need to key in (see Figure\
    \ [7-20](#505695_2_En_7_Chapter.xhtml#Fig20)) are the username and password for\
    \ the admin account.\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig20_HTML.jpg)\n\
    Figure 7-20\nAzure Portal – Create Azure SQL Managed Instance - Azure Arc – Administrator\
    \ account\n\nUnless you want to provide any Azure tags for this instance, you\
    \ can go straight to the Review + create screen and deploy your instance as shown\
    \ in Figure [7-21](#505695_2_En_7_Chapter.xhtml#Fig21).\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig21_HTML.jpg)\n\
    Figure 7-21\nAzure Portal – Create Azure SQL Managed Instance - Azure Arc – Review\
    \ + create\n\nAfter deployment, the instance will show up in your resource group\
    \ immediately (Figure [7-22](#505695_2_En_7_Chapter.xhtml#Fig22)).\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig22_HTML.jpg)\n\
    Figure 7-22\nSQL Managed Instance in Azure Resource Group\n\nThe actual deployment\
    \ however happened on our local Kubernetes Cluster of course, so check out the\
    \ Pods in your Arc Namespace using the command in Listing [7-9](#505695_2_En_7_Chapter.xhtml#PC9).\n\
    \n```\nkubectl get pods -n arc-direct\n```\nListing 7-9\nList Pods in Namespace\n\
    \nYou will see that the new Managed Instance has indeed been created on this Cluster\
    \ and in this Namespace as illustrated in Figure [7-23](#505695_2_En_7_Chapter.xhtml#Fig23).\n\
    \n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig23_HTML.jpg)\nFigure 7-23\n\
    Arc Pods in Kubernetes Namespace\n\n## Active Directory Authentication\n\nAt the\
    \ time of writing, Active Directory authentication was still in preview. You can\
    \ find the most recent step-by-step guide in the official docs at [*https://docs.microsoft.com/en-us/azure/azure-arc/data/active-directory-introduction*](https://docs.microsoft.com/en-us/azure/azure-arc/data/active-directory-introduction).\n\
    \n## Getting Data into Your Instance\n\nIf you want to restore an existing database\
    \ in your instance, the first step in most cases is to copy this database’s backup\
    \ into your container – or rather onto the storage behind your container. Since\
    \ Arc SQL Managed Instance is the lift-and-shift version of SQL Server, to get\
    \ data into an Arc SQL Managed Instance, you can simply use a standard SQL Server\
    \ backup.\n\n### Copying Backup Files into Your Instance\n\nAs so often, there\
    \ are multiple ways of getting your backup files into your Arc SQL Managed Instance,\
    \ and we’ll again give you some options. If you have a backup file that can be\
    \ downloaded using HTTP, you can use `kubectl` to trigger a download with `wget`\
    \ in your container (see Listing [7-10](#505695_2_En_7_Chapter.xhtml#PC10)).\n\
    \n```\nkubectl exec mi-1-0 -n arc -c arc-sqlmi -- wget https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks2019.bak\
    \ -O /var/opt/mssql/data/AdventureWorks2019.bak\n```\nListing 7-10\nCode to download\
    \ a file using `wget` within a container\n\nIf you have a local backup file, on\
    \ the other hand, you can also use `kubectl` to copy this file to the container\
    \ as shown in Listing [7-11](#505695_2_En_7_Chapter.xhtml#PC11).\n\n```\nkubectl\
    \ cp c:\\files\\AdventureWorks2017.bak arc/arc-mi-01-0:var/opt/mssql/data/AdventureWorks2017.bak\
    \ -c arc-sqlmi\n```\nListing 7-11\nCode to copy a local file to a container\n\n\
    Both techniques lead to the backup file sitting in your container. Make sure that\
    \ there is enough disk space in the container and delete the backup file when\
    \ you’re finished. It usually depends on where your backup is originally coming\
    \ from to make a decision which way makes more sense for you."
  raw: '## Deployment Through Kubernetes Tools


    As Azure Arc-enabled Data Services aren’t only Azure but also Kubernetes native,
    they can also be deployed through Kubernetes tools, for example, kubectl and a
    YAML manifest.


    Listing [7-6](#505695_2_En_7_Chapter.xhtml#PC6) describes a SQL Managed Instance
    for us in a YAML manifest.


    ```

    apiVersion: sql.arcdata.microsoft.com/v2

    kind: SqlManagedInstance

    metadata:

    name: mi-4

    spec:

    security:

    adminLoginSecret: mi-4-login-secret

    scheduling:

    default:

    resources:

    limits:

    cpu: "2"

    memory: 4Gi

    requests:

    cpu: "1"

    memory: 2Gi

    services:

    primary:

    type: NodePort

    storage:

    backups:

    volumes:

    - className: local-storage

    size: 5Gi

    data:

    volumes:

    - className: local-storage

    size: 5Gi

    datalogs:

    volumes:

    - className: local-storage

    size: 5Gi

    logs:

    volumes:

    - className: local-storage

    size: 5Gi

    Listing 7-6

    YAML manifest for Arc SQL Managed Instance

    ```


    As we also need to authenticate against that Managed Instance, we’ll need the
    username and password for it to be stored in a Kubernetes secret. We can create
    this Kubernetes secret using the kubectl command in Listing [7-7](#505695_2_En_7_Chapter.xhtml#PC7).


    ```

    kubectl create secret generic mi-4-login-secret `

    --from-literal=password= `

    --from-literal=username= `

    -n arc

    Listing 7-7

    kubectl command to create Kubernetes secret

    ```


    Once that has completed, we can use kubectl and our manifest to create our instance
    (Listing [7-8](#505695_2_En_7_Chapter.xhtml#PC8)).


    ```

    kubectl apply -f mi-4.yaml -n arc

    Listing 7-8

    kubectl command to create a SQL Managed Instance from YAML

    ```


    As you can see in Figure [7-14](#505695_2_En_7_Chapter.xhtml#Fig14), this will
    equally create a Managed Instance for us in our Arc Namespace.


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig14_HTML.jpg)


    Figure 7-14


    Arc Pods in Kubernetes Namespace


    ## Deployment Through the Azure Portal


    Another way of deploying Arc Instances is through the Azure Portal.


    Note


    Deployment through the Azure Portal requires a directly connected Cluster as showcased
    in the previous chapter.


    Navigate to the “Create a Resource” section in the Portal at [*https://portal.azure.com/#create/hub*](https://portal.azure.com/%2523create/hub).


    From there, search for “arc sql managed instance” as shown in Figure [7-15](#505695_2_En_7_Chapter.xhtml#Fig15).


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig15_HTML.jpg)


    Figure 7-15


    Azure Portal – Create a resource


    Select the only result showing up (Figure [7-16](#505695_2_En_7_Chapter.xhtml#Fig16)).


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig16_HTML.jpg)


    Figure 7-16


    Azure Portal – Create Azure SQL Managed Instance - Azure Arc


    And click “Create” on the subsequent screen (Figure [7-17](#505695_2_En_7_Chapter.xhtml#Fig17)).


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig17_HTML.jpg)


    Figure 7-17


    Azure Portal – Create Azure SQL Managed Instance - Azure Arc


    On the first screen, you will provide basic information like the subscription
    and resource group to be used but also the name of the instance and the custom
    location (Figure [7-18](#505695_2_En_7_Chapter.xhtml#Fig18)).


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig18_HTML.jpg)


    Figure 7-18


    Azure Portal – Create Azure SQL Managed Instance - Azure Arc – Basics


    On the Configure compute + storage page (Figure [7-19](#505695_2_En_7_Chapter.xhtml#Fig19)),
    you can not only define your Storage Classes, requests, and limits, but this is
    also where you’d pick the tier and therefore decide on the number of replicas.
    Based on these settings, you’ll also be provided an estimated cost.


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig19_HTML.png)


    Figure 7-19


    Azure Portal – Create Azure SQL Managed Instance - Azure Arc – Configure compute
    + storage


    The last information that you need to key in (see Figure [7-20](#505695_2_En_7_Chapter.xhtml#Fig20))
    are the username and password for the admin account.


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig20_HTML.jpg)


    Figure 7-20


    Azure Portal – Create Azure SQL Managed Instance - Azure Arc – Administrator account


    Unless you want to provide any Azure tags for this instance, you can go straight
    to the Review + create screen and deploy your instance as shown in Figure [7-21](#505695_2_En_7_Chapter.xhtml#Fig21).


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig21_HTML.jpg)


    Figure 7-21


    Azure Portal – Create Azure SQL Managed Instance - Azure Arc – Review + create


    After deployment, the instance will show up in your resource group immediately
    (Figure [7-22](#505695_2_En_7_Chapter.xhtml#Fig22)).


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig22_HTML.jpg)


    Figure 7-22


    SQL Managed Instance in Azure Resource Group


    The actual deployment however happened on our local Kubernetes Cluster of course,
    so check out the Pods in your Arc Namespace using the command in Listing [7-9](#505695_2_En_7_Chapter.xhtml#PC9).


    ```

    kubectl get pods -n arc-direct

    Listing 7-9

    List Pods in Namespace

    ```


    You will see that the new Managed Instance has indeed been created on this Cluster
    and in this Namespace as illustrated in Figure [7-23](#505695_2_En_7_Chapter.xhtml#Fig23).


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig23_HTML.jpg)


    Figure 7-23


    Arc Pods in Kubernetes Namespace


    ## Active Directory Authentication


    At the time of writing, Active Directory authentication was still in preview.
    You can find the most recent step-by-step guide in the official docs at [*https://docs.microsoft.com/en-us/azure/azure-arc/data/active-directory-introduction*](https://docs.microsoft.com/en-us/azure/azure-arc/data/active-directory-introduction).


    ## Getting Data into Your Instance


    If you want to restore an existing database in your instance, the first step in
    most cases is to copy this database’s backup into your container – or rather onto
    the storage behind your container. Since Arc SQL Managed Instance is the lift-and-shift
    version of SQL Server, to get data into an Arc SQL Managed Instance, you can simply
    use a standard SQL Server backup.


    ### Copying Backup Files into Your Instance


    As so often, there are multiple ways of getting your backup files into your Arc
    SQL Managed Instance, and we’ll again give you some options. If you have a backup
    file that can be downloaded using HTTP, you can use kubectl to trigger a download
    with *wget* in your container (see Listing [7-10](#505695_2_En_7_Chapter.xhtml#PC10)).


    ```

    kubectl exec mi-1-0 -n arc -c arc-sqlmi -- wget https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks2019.bak
    -O /var/opt/mssql/data/AdventureWorks2019.bak

    Listing 7-10

    Code to download a file using wget within a container

    ```


    If you have a local backup file, on the other hand, you can also use kubectl to
    copy this file to the container as shown in Listing [7-11](#505695_2_En_7_Chapter.xhtml#PC11).


    ```

    kubectl cp c:\files\AdventureWorks2017.bak arc/arc-mi-01-0:var/opt/mssql/data/AdventureWorks2017.bak
    -c arc-sqlmi

    Listing 7-11

    Code to copy a local file to a container

    ```


    Both techniques lead to the backup file sitting in your container. Make sure that
    there is enough disk space in the container and delete the backup file when you’re
    finished. It usually depends on where your backup is originally coming from to
    make a decision which way makes more sense for you.'
  trans: "\n## 通过 Kubernetes 工具部署\n\n由于 Azure Arc 支持的数据服务不仅是 Azure 原生，同时也是 Kubernetes\
    \ 原生的，因此它们也可以通过 Kubernetes 工具进行部署，例如 `kubectl` 和 YAML 清单文件。\n\n代码清单 7-6 为我们描述了一个\
    \ SQL 托管实例的 YAML 清单。\n\n```\napiVersion: sql.arcdata.microsoft.com/v2\nkind: SqlManagedInstance\n\
    metadata:\n  name: mi-4\nspec:\n  security:\n    adminLoginSecret: mi-4-login-secret\n\
    \  scheduling:\n    default:\n      resources:\n        limits:\n          cpu:\
    \ \"2\"\n          memory: 4Gi\n        requests:\n          cpu: \"1\"\n    \
    \      memory: 2Gi\n  services:\n    primary:\n      type: NodePort\n  storage:\n\
    \    backups:\n      volumes:\n      - className: local-storage\n        size:\
    \ 5Gi\n    data:\n      volumes:\n      - className: local-storage\n        size:\
    \ 5Gi\n    datalogs:\n      volumes:\n      - className: local-storage\n     \
    \   size: 5Gi\n    logs:\n      volumes:\n      - className: local-storage\n \
    \       size: 5Gi\n```\n代码清单 7-6\nArc SQL 托管实例的 YAML 清单\n\n由于我们还需要对托管实例进行身份验证，因此需要将用户名和密码存储在\
    \ Kubernetes 密钥中。我们可以使用代码清单 7-7 中的 `kubectl` 命令来创建这个 Kubernetes 密钥。\n\n```\nkubectl\
    \ create secret generic mi-4-login-secret `\n--from-literal=password= `\n--from-literal=username=\
    \ `\n-n arc\n```\n代码清单 7-7\n用于创建 Kubernetes 密钥的 `kubectl` 命令\n\n完成后，我们可以使用 `kubectl`\
    \ 和我们的清单文件来创建实例（代码清单 7-8）。\n\n```\nkubectl apply -f mi-4.yaml -n arc\n```\n代码清单\
    \ 7-8\n使用 `kubectl` 命令从 YAML 创建 SQL 托管实例\n\n如图 7-14 所示，这同样会在我们的 Arc 命名空间中为我们创建一个托管实例。\n\
    \n![](img/505695_2_En_7_Fig14_HTML.jpg)\n图 7-14\nKubernetes 命名空间中的 Arc Pod\n\n\
    ## 通过 Azure 门户部署\n\n另一种部署 Arc 实例的方式是通过 Azure 门户。\n\n注意\n通过 Azure 门户部署需要如前一章所示的直接连接集群。\n\
    \n导航到 Azure 门户中的“创建资源”部分：[*https://portal.azure.com/#create/hub*](https://portal.azure.com/%2523create/hub)。\n\
    \n从那里，搜索“arc sql managed instance”，如图 7-15 所示。\n\n![](img/505695_2_En_7_Fig15_HTML.jpg)\n\
    图 7-15\nAzure 门户 – 创建资源\n\n选择显示的唯一结果（图 7-16）。\n\n![](img/505695_2_En_7_Fig16_HTML.jpg)\n\
    图 7-16\nAzure 门户 – 创建 Azure SQL 托管实例 - Azure Arc\n\n并在后续屏幕（图 7-17）上单击“创建”。\n\n\
    ![](img/505695_2_En_7_Fig17_HTML.jpg)\n图 7-17\nAzure 门户 – 创建 Azure SQL 托管实例 -\
    \ Azure Arc\n\n在第一个屏幕上，您需要提供基本信息，如要使用的订阅和资源组，以及实例名称和自定义位置（图 7-18）。\n\n![](img/505695_2_En_7_Fig18_HTML.jpg)\n\
    图 7-18\nAzure 门户 – 创建 Azure SQL 托管实例 - Azure Arc – 基本信息\n\n在“配置计算 + 存储”页面（图 7-19）上，您不仅可以定义存储类、请求和限制，还可以在此处选择服务层级，从而决定副本数量。根据这些设置，系统还会提供预估成本。\n\
    \n![](img/505695_2_En_7_Fig19_HTML.png)\n图 7-19\nAzure 门户 – 创建 Azure SQL 托管实例\
    \ - Azure Arc – 配置计算 + 存储\n\n您需要输入的最后信息（参见图 7-20）是管理员账户的用户名和密码。\n\n![](img/505695_2_En_7_Fig20_HTML.jpg)\n\
    图 7-20\nAzure 门户 – 创建 Azure SQL 托管实例 - Azure Arc – 管理员账户\n\n除非您想为此实例提供任何 Azure\
    \ 标签，否则您可以直接转到“查看 + 创建”屏幕并部署您的实例，如图 7-21 所示。\n\n![](img/505695_2_En_7_Fig21_HTML.jpg)\n\
    图 7-21\nAzure 门户 – 创建 Azure SQL 托管实例 - Azure Arc – 查看 + 创建\n\n部署后，实例将立即显示在您的资源组中（图\
    \ 7-22）。\n\n![](img/505695_2_En_7_Fig22_HTML.jpg)\n图 7-22\nAzure 资源组中的 SQL 托管实例\n\
    \n然而，实际部署当然发生在我们本地的 Kubernetes 集群上，因此请使用代码清单 7-9 中的命令检查 Arc 命名空间中的 Pod。\n\n```\n\
    kubectl get pods -n arc-direct\n```\n代码清单 7-9\n列出命名空间中的 Pod\n\n您将看到新的托管实例确实已在此集群和此命名空间中创建，如图\
    \ 7-23 所示。\n\n![](img/505695_2_En_7_Fig23_HTML.jpg)\n图 7-23\nKubernetes 命名空间中的\
    \ Arc Pod\n\n## Active Directory 身份验证\n\n在撰写本文时，Active Directory 身份验证仍处于预览阶段。您可以在官方文档中找到最新的分步指南：[*https://docs.microsoft.com/en-us/azure/azure-arc/data/active-directory-introduction*](https://docs.microsoft.com/en-us/azure/azure-arc/data/active-directory-introduction)。\n\
    \n## 将数据导入实例\n\n如果您想在实例中还原现有数据库，在大多数情况下，第一步是将此数据库的备份复制到您的容器中——或者更准确地说，复制到容器背后的存储中。由于\
    \ Arc SQL 托管实例是 SQL Server 的直接迁移版本，要将数据导入 Arc SQL 托管实例，您可以简单地使用标准的 SQL Server\
    \ 备份。\n\n### 将备份文件复制到实例中\n\n与常见情况一样，将备份文件导入 Arc SQL 托管实例有多种方法，我们将再次为您提供一些选项。如果您有一个可以通过\
    \ HTTP 下载的备份文件，您可以使用 `kubectl` 在容器中触发 `wget` 下载（参见代码清单 7-10）。\n\n```\nkubectl\
    \ exec mi-1-0 -n arc -c arc-sqlmi -- wget https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks2019.bak\
    \ -O /var/opt/mssql/data/AdventureWorks2019.bak\n```\n代码清单 7-10\n在容器内使用 `wget`\
    \ 下载文件的代码\n\n另一方面，如果您有一个本地备份文件，也可以使用 `kubectl` 将其复制到容器，如代码清单 7-11 所示。\n\n```\n\
    kubectl cp c:\\files\\AdventureWorks2017.bak arc/arc-mi-01-0:var/opt/mssql/data/AdventureWorks2017.bak\
    \ -c arc-sqlmi\n```\n代码清单 7-11\n将本地文件复制到容器的代码\n\n这两种技术都能使备份文件位于您的容器中。请确保容器中有足够的磁盘空间，并在完成后删除备份文件。通常取决于您的备份最初来自何处，以决定哪种方式对您更有意义。\n"
- fmt: '### Restoring Backup Files in Your Instance


    If you want to restore from the command line, you could either use a tool like
    `sqlcmd` directly from your client or use `kubectl` once again to run `sqlcmd`
    directly on the SQL Instance as shown in Listing 7-12.


    ```

    kubectl exec mi-1-0 -n arc -c arc-sqlmi -- /opt/mssql-tools/bin/sqlcmd -S localhost
    -U arcadmin -P "P@ssw0rd" -Q "RESTORE DATABASE [AdventureWorks2019] FROM  DISK
    = N''/var/opt/mssql/data/AdventureWorks2019.bak'' WITH  FILE = 1,  MOVE N''AdventureWorks2017''
    TO N''/var/opt/mssql/data/AdventureWorks2019.mdf'',  MOVE N''AdventureWorks2017_log''
    TO N''/var/opt/mssql/data-log/AdventureWorks2019_log.ldf'',  NOUNLOAD,  STATS
    = 5"

    ```

    Listing 7-12

    Code to run sqlcmd within a container to restore a database from backup


    You could also connect to the instance in Azure Data Studio and use the restore
    wizard or any other tool that can connect to a SQL endpoint.


    **Note**

    When connecting to a SQL Server with a different port than the default, when copying
    the endpoint, make sure to use a comma rather than a colon to separate the IP
    address and the port.


    One other option would of course also be to restore the database from an Azure
    Blob Storage using the `RESTORE FROM URL` command. What you could do in addition
    to that would be to add another Persistent Volume that can be an external share
    or a dedicated backup disk which especially makes sense for larger backup and
    restore operations without bloating the containers storage or having to copy backups
    around.


    ### Managed Backup and Restore


    Every Azure Arc-enabled SQL Managed Instance comes with a built-in automatic backup
    feature which is enabled by default. This means that every single database that
    gets created or restored will automatically receive an initial full backup followed
    by scheduled differential and transaction log backups. This concept is very similar
    to the managed backup in an Azure SQL Managed Instance and allows you to perform
    a point-in-time restore to any specific timestamp within your retention period.


    A restore will always be performed into a new database.


    At the time of writing, full backups are taken once a week, differential backups
    are taken every 12 hours, and transaction log backups every 5 minutes with these
    settings not being configurable.


    While all backup settings can be found and controlled through both the `azure-cli`
    as well as native Kubernetes tools, the easiest way to get started is the backup
    section of the instance’s settings in Azure Data Studio as shown in Figure 7-24.


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig24_HTML.png)

    Figure 7-24

    Backup settings


    From there, you can change the retention time (Figure 7-25) for point-in-time
    recovery backups from its default (7 days) to anything from 1 to 35 days. Backup
    files older than the configured retention period are automatically deleted.


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig25_HTML.jpg)

    Figure 7-25

    Configure retention policy


    Changing the retention time to zero disables managed backups on this instance.


    You could also adjust that setting by editing the instance’s YAML manifest or
    by specifying the `--retention-days` property in the `azure-cli`.


    You can also use Azure Data Studio or any of the other tools to trigger a restore
    (see Figure 7-26).


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig26_HTML.png)

    Figure 7-26

    Restore Database in Azure Data Studio


    A restore requires a source database, destination database, and the restore point
    (timestamp).


    Alternatively, you could, for example, also use the `azure-cli` and a command
    similar to the one in Listing 7-13 to restore your backup.


    ```

    az sql midb-arc restore --managed-instance  --name  --dest-name  --k8s-namespace  --time
    "YYYY-MM-DDTHH:MM:SSZ" --use-k8s

    ```

    Listing 7-13

    azure-cli command to restore a database from a point-in-time backup


    The target MI must exist before running a restore. When you delete an Azure Arc
    SQL Managed Instance, the backup history will be kept until its retention period
    has elapsed. The output of the previous listing should look similar to the one
    in Figure 7-27. The important part is the state. If this doesn’t show `Completed`,
    something went wrong with your restore.


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig27_HTML.jpg)

    Figure 7-27

    Output of azure-cli command to restore a database


    You can get an overview of all the restore tasks in your Namespace by running
    the command shown in Listing 7-14.


    ```

    kubectl get sqlmirestoretask -n arc

    ```

    Listing 7-14

    kubectl command to list all SQL MI Restore Tasks in a Namespace


    If everything worked fine, the task should appear with a status of completed as
    illustrated in the example in Figure 7-28.


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig28_HTML.jpg)

    Figure 7-28

    Status of a SQL MI Restore Task


    To retrieve more details, especially in the case of a failed restore task, you
    can use the command in Listing 7-15 to describe the task and analyze what made
    it fail.


    ```

    kubectl describe sqlmirestoretask  -n

    ```

    Listing 7-15

    kubectl command to describe a SQL MI Restore Task


    Of course, the restored database also becomes visible in Azure Data Studio as
    visible in Figure 7-29.


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig29_HTML.jpg)

    Figure 7-29

    Restored Database showing up in Azure Data Studio


    A restore task could of course also be created through native Kubernetes tools
    just like you could also adjust settings like the retention policy from there.'
