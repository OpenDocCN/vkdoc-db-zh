    ## Dedication


    ### To Franzie and Gwendolyn

    —Ben


    ### To my family

    —Anthony


    ## Foreword


    When I started my IT career, we ran applications and databases on physical servers.
    In the first few years, there was a shift to virtualization, and it was a radical
    transformation with much change. What was a monumental shift then has become commonplace
    – even the norm – now.


    Today, there is another paradigm shift taking place – the move to containerization.
    I see it in new applications being built by developers eager to have lightweight,
    repeatable deployments across infrastructures. This is also affecting the world
    of data, as those developers look to have their containerized applications connect
    to data sources that are also lightweight and easily deployable.


    This shift brings new challenges for the data professional – in a containerized
    world, with companies rapidly adopting one or more clouds, how do you secure,
    manage, and monitor data services across these landscapes? Microsoft has been
    on two parallel journeys for many years – first to bring SQL Server to Linux and
    containers, and to make Azure SQL Database the best cloud-based operational database
    in the world. Now, these two roads have been merged with Azure Arc-enabled Data
    Services, which allow you to run Azure Platform-as-a-Service data services on
    the Kubernetes distribution of your choice, in the infrastructure of your choice.


    I’m excited that two experts have collaborated to bring you this book, designed
    to get you using Azure Arc-enabled Data Services as quickly as possible. They
    understand the challenges that come with this new paradigm and break them down
    into easily understandable chunks of knowledge.


    The first time I saw Anthony Nocentino present was at a SQLSaturday in Cleveland,
    Ohio, in 2020 – the last in-person event I attended before the pandemic. I had
    been delving into the world of SQL Server on Linux and containers and was interested
    to hear what he had to say about containers. I was delighted by his deep knowledge
    and presentation style.


    The first time I saw Ben Weissman present was unfortunately online, as an ocean
    separates us. He was talking about a technology that I have found fascinating
    since the first time I heard of it – SQL Server Big Data Clusters. Ben had a passion
    for the technology, making it easy to understand, and was gracious and funny.


    With this, I hope you enjoy learning about and working with this technology as
    much as I do! I can’t wait to hear your stories of how you’re using Azure Arc-enabled
    Data Services and how they enable you to do more as an IT professional!


    —Jes Schultz

    Program Manager, Azure Arc-enabled Data Services


    ## Introduction


    When we first started talking about writing a book about Azure Arc-enabled Data
    Services, the product was in its early private preview stages. We both were very
    excited about what Azure Arc-enabled Data Services are about to become as a product:
    This was where all the technology that was recently introduced – like SQL on Linux
    and SQL on Kubernetes – was coming together. This was the answer to the question
    why Microsoft did all this.


    But, even without that background, we both saw the tremendous value that Azure
    Arc-enabled Data Services were going to provide. One of the huge challenges that
    companies have in cloud adoption is being locked in to a vendor’s infrastructure.
    Being locked in to a software is fine – honestly, this has pretty much always
    been the case from the second you chose a database platform, for example – but
    infrastructure is a different challenge. You may just not be able or willing to
    move to the public cloud or may already be invested in some other cloud provider’s
    infrastructure. With Azure Arc, including Azure Arc-enabled Data Services, we
    were now able to deploy those solutions that previously were exclusively available
    to Microsoft’s Azure Cloud to any cloud on any infrastructure!


    It was clear to us that with Azure Arc-enabled Data Services becoming generally
    available, we just had to keep this book up to date and add all the new features
    that went into the product since our first edition of this book.


    This book introduces you to Azure Arc-enabled Data Services and the powerful capabilities
    they provide. You’ll learn how to benefit from the centralized management that
    Azure provides, the automated rolling out of patches and updates, and more.


    This book is the perfect choice for anyone looking for a hybrid or multi-vendor
    cloud strategy for their data estate. We will walk you step by step through the
    possibilities and requirements to get services like Azure SQL Managed Instance
    or PostgreSQL Hyperscale deployed outside of Azure so they become accessible to
    companies that either can’t move to the cloud or don’t want to use the Microsoft
    cloud exclusively. The technology described in this book will be especially useful
    to those who are required to keep sensitive services such as medical databases
    away from the public cloud, but who still want to benefit from the Azure Cloud
    and the centralized management that it supports.'
