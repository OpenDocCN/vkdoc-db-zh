- fmt: '### Benefits of Kubernetes


    The following are the important benefits that Kubernetes brings to the table:


    *   **Workload Scheduling**: Kubernetes is a container orchestrator having the
    primary goal of starting up container-based applications, called `Pods`, on `Nodes`
    in a `Cluster`. It is Kubernetes’ job to find the most appropriate place to run
    a `Pod` in the `Cluster`. When scheduling `Pods` on `Nodes`, a primary concern
    is determining if a `Node` has enough CPU and memory resources to run the assigned
    workload.

    *   **Managing State**: When code is deployed into Kubernetes, defining a workload
    that needs to be running, Kubernetes has the responsibility to start up `Pods`
    and other resources in the `Cluster` and keep the `Cluster` in the desired state.
    If the `Cluster`’s running state skews from the desired state, Kubernetes will
    try to change the `Cluster`’s running state to get the running state of the `Cluster`
    back into the defined desired state. For example, if a `Deployment` defines having
    a number of `Pods` running. If a `Pod` fails, Kubernetes will deploy a new `Pod`
    into the `Cluster`, replacing the failed `Pods`, ensuring the number of `Pods`
    defined by the `Deployment` are up and running. Further, suppose you want to scale
    the number of `Pods` supporting an application to add more capacity. In that case,
    you increase the number of replicas in the `Deployment`, and Kubernetes will create
    additional `Pods` in the `Cluster` ensuring the desired state is realized. More
    on this in the upcoming section on Controllers.

    *   **Consistent Deployment**: Deploying applications with code enables repeatable
    processes. The code defining a `Deployment` is the configuration artifact and
    can be placed in source control. You can also use this code to deploy identical
    systems in down-level environments such as development environments or even between
    on-premises systems and the cloud. More on this in the upcoming section on the
    Kubernetes API.

    *   **Speed**: Kubernetes enables fast, controlled deployments, starting `Pods`
    in a `Cluster` quickly. Furthermore, in Kubernetes, you can scale applications
    rapidly. Expanding the number of `Pods` supporting an application can be as simple
    as changing a line of code, and this can take as little as seconds. This speed
    is demonstrated in Chapter [6](#505695_2_En_6_Chapter.xhtml) by adding additional
    replicas to a `PostgreSQL` Hyperscale deployment.

    *   **Infrastructure Abstraction**: The Kubernetes API provides an abstraction
    or wrapper around the resources available in a `Cluster`. When deploying applications,
    there is less focus on infrastructure and more on how applications are defined,
    deployed, and consume the `Cluster`’s resources. The code used for deployments
    will describe how the deployment should look, and the `Cluster` will make that
    happen. If applications need resources such as public IP addresses or storage,
    that becomes part of the deployment, and the `Cluster` will interact with underlying
    infrastructure to provision these resources for the application’s use. This infrastructure
    abstraction is key to the design and implementation of Azure Arc-enabled Data
    Services. We will explore this concept more at the end of this chapter.

    *   **Persistent Service Endpoints**: Kubernetes provides persistent IP and DNS
    naming for applications deployed in the `Cluster`. As `Pods` can come and go due
    to scaling operations, life cycle operations, or reacting to failure events, Kubernetes
    provides this persistent networking abstraction for accessing these applications.
    Depending upon the type of `Service` used, the `Service` can load balance application
    traffic to the `Pods` supporting the application. As `Pods` are created and destroyed,
    based on either scaling operations or in response to life cycle operations or
    failures in the `Cluster`, Kubernetes automatically updates the information on
    which `Pods` provide the application services.


    ## The Kubernetes API


    The Kubernetes API provides a programmatic layer representing the resources available
    in a data center. The API enables you to write code to consume those resources
    in your application deployments. When writing code to consume the API, you use
    `API Objects`, which you use to define and deploy application workloads in Kubernetes.


    The code you write is submitted to the `API Server`. The `API Server` is the core
    communication hub in a Kubernetes `Cluster`. It is the primary way you interact
    with a Kubernetes `Cluster` and the only way Kubernetes components inside a `Cluster`
    exchange information. With the new `Cluster` state defined, either on initial
    deployment or by modifying an existing deployment, Kubernetes begins to implement
    the state described in your code. The desired state of your code becomes the running
    state in the `Cluster`.


    ### API Objects


    Kubernetes `API Objects` represent resources available in a `Cluster`. There are
    `API Objects` for compute, storage, and networking elements, among others, available
    in a `Cluster` for consumption by your application workloads. You will write code
    using these `API Objects` to define the desired state of your applications and
    systems deployed into a Kubernetes `Cluster`.


    The defined `API Objects` communicate the desired state of the workload deployed
    to the `Cluster`, and the `Cluster` has the responsibility of ensuring that desired
    state becomes the running state of the `Cluster`.


    We will now introduce the core `API Objects` to define workloads in a Kubernetes
    `Cluster`. These are the core building blocks of applications deployed in Kubernetes.
    In the upcoming sections, we will dive deeper into each of these individually.


    *   `Pods`: These are container-based applications. A `Pod` is the unit of work
    in a `Cluster`. A `Pod` is an abstraction that encompasses one or more containers
    and the resources and configuration it needs to execute, including networking,
    storage, environment variables, configuration files, and secrets.

    *   `Controllers`: These define and keep application workloads in the `Cluster`
    in the desired state. Some `Controllers` have the responsibility of starting `Pods`
    and keeping those `Pods` in the desired state. There are several different types
    of `Controllers` for ensuring the state of applications and systems deployed and
    also for the running state of the `Cluster`. We introduce several `Controllers`
    in this section and more throughout the book’s remainder, including the `Deployment`
    and `StatefulSet` `API Objects`.

    *   `Services`: These provide a networking abstraction for access to `Pod`-based
    applications. `Services` are how applications consumers, such as users and other
    applications, access the container-based application services deployed in a `Cluster`
    via a network.

    *   `Storage`: This provides an abstraction for `Pods` to access storage available
    in a `Cluster`. `Storage` is used by applications to persist data independent
    of the life cycle of `Pods`.

    *   `Custom Resource Definition (CRD)`: A `CRD` is an extension of the Kubernetes
    API, enabling developers to encapsulate application-specific configuration and
    functionality in custom `API Objects`. Then that custom `API Object` is used to
    deploy that application. Using `CRD` allows application developers additional
    control in how the `API Object` is defined and functions when deployed. In Azure
    Arc-enabled Data Services, you will find `CRD` for SQL Server Managed Instance,
    PostgreSQL versions 11 and 12, and also for the Data Controller.


    In addition to the `API Objects` described earlier, there are many more used to
    craft workloads, but these are the core `API Object` types focused on in this
    book and for deploying SQL Server and Azure Arc-enabled Data Services.'
