- fmt: '### 从 Windows 工作站操作


    你可以使用 `pscp` 命令将 `kubeconfig` 文件从控制平面节点复制到本地 Windows 工作站。我们在第 3 章安装 putty 软件包时安装了
    `pscp`。在清单 4-36 中，代码首先在当前用户的配置文件中创建一个 `.kube` 目录。然后，它使用 `pscp` 将名为 `config` 的
    kubeconfig 文件从控制平面节点上你用于引导集群的用户的家目录，复制到 Windows 工作站当前用户配置文件下的子目录 `.kube` 中。复制到那里后，`kubectl`
    就可以为该集群上下文读取该文件。


    ```

    mkdir %USERPROFILE%\.kube

    pscp -P 22 @control:/home//.kube/config %USERPROFILE%\.kube\

    ```

    清单 4-36

    将你的 kubeconfig 文件从控制节点复制到 Windows 工作站


    > 注意

    >

    > 在本章前面，作为集群引导过程的一部分，你已经将 `/etc/kubernetes/admin.conf` 复制到控制平面节点上的 `$HOME/.kube/config`。你现在就是从该
    `$HOME` 目录将配置文件复制到你的 Windows 工作站。


    将集群上下文复制到 Windows 工作站后，你需要从该工作站确认 `kubectl` 能够使用该文件。你可以通过运行清单 4-37 中的代码来获取当前集群上下文，输出应与图
    4-11 所示的输出匹配。


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig11_HTML.jpg)

    图 4-11

    Windows 工作站上 kubeconfig 文件中的集群配置上下文列表


    ```

    kubectl config current-context

    ```

    清单 4-37

    检索活动的 Kubernetes 上下文


    确认 `kubectl` 正在读取正确的 kubeconfig 文件后，你需要使用清单 4-38 中的代码测试与集群的连接性。


    ```

    kubectl cluster-info

    ```

    清单 4-38

    测试到集群的连接性


    执行后，你应看到类似图 4-12 的输出。你可以通过查看控制平面节点的 URL 来确认你指向的是正确的 Kubernetes 集群，在我们的实验环境中，URL
    是 `https://172.16.94.10:6443`，这就是 API 服务器的位置。


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig12_HTML.jpg)

    图 4-12

    集群信息列表。确认从我们的 Windows 客户端到远程集群的连接性


    现在让我们继续，将 kubeconfig 文件从控制平面节点复制到 Linux 工作站。


    ### 从 Linux 工作站操作


    要将 kubeconfig 文件从你的控制平面节点复制到 Linux 工作站，你可以使用许多 Linux 发行版原生安装的 `scp` 命令。在清单 4-39
    中，你可以找到将 kubeconfig 文件从控制平面节点复制到远程 Linux 工作站的命令。登录到你想要复制文件到的 Linux 机器，并在该系统上运行此代码。


    > 注意

    >

    > 此代码将覆盖你当前名为 `config` 的 kubeconfig 文件。你可能需要备份现有的 kubeconfig 文件。


    ```

    mkdir $HOME/.kube

    scp aen@control:~/.kube/config $HOME/.kube/config

    ```

    清单 4-39

    将你的 kubeconfig 文件从控制节点复制到你的 Linux 工作站


    与前面的 Windows 示例类似，请使用 `kubectl config current-context` 确保你的集群上下文配置正确，并使用 `kubectl
    cluster-info` 确认与远程集群的连接性。输出将与上一节相同。


    ## 本章总结


    在本章中，我们指导你创建了一个 Kubernetes 集群。既然你已准备就绪，下一章将终于迎来第一次 Arc 实践体验：部署你的第一个数据控制器。


    # 5. 以间接模式部署数据控制器


    在上一章中，我们部署了一个 Kubernetes 集群。现在是时候使用这个集群，并向其部署我们的第一个启用 Azure Arc 的数据控制器了，我们将使用间接连接模式（简称间接模式）进行部署。


    > 注意

    >

    > 如果你使用多个 Kubernetes 集群，请确保你的当前上下文（即活动的 Kubernetes 集群配置）指向的是正确的那一个。


    ## 决定 Kubernetes 存储类


    首先，使用清单 5-1 再次确认你的当前上下文是你部署的目标。


    ```

    kubectl config current-context

    ```

    清单 5-1

    检索活动的 Kubernetes 上下文


    我们在图 5-1 中的示例输出显示，我们当前的活动上下文是之前部署的 kubeadm 集群。


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig1_HTML.jpg)

    图 5-1

    输出示例


    由于我们已经连接到正确的集群，我们需要弄清楚集群内有哪些存储类可用，因为即使只有一个存储类，此信息在部署期间也是必需的。可以使用清单 5-2 中的命令列出存储类。


    ```

    kubectl get storageclass

    ```

    清单 5-2

    检索当前 Kubernetes 上下文中存储类的列表


    在我们的示例中，只有一个类——`local-storage`，如图 5-2 所示。


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig2_HTML.png)

    图 5-2

    存储类列表


    记下此信息或记住它。如果你正在一个具有多个可用存储类的集群上工作，开始思考你想为集群使用哪个存储类。你可以为 Kubernetes 日志、数据和数据库日志使用不同的存储类。'
  raw: '### From a Windows Workstation


    You can copy the `kubeconfig` file from the Control Plane Node to the local Windows
    workstation using the `pscp` command. We installed `pscp` in Chapter [3](#505695_2_En_3_Chapter.xhtml)
    when we installed the putty package. In Listing [4-36](#505695_2_En_4_Chapter.xhtml#PC36),
    the code first creates a `.kube` directory in the current user’s profile. Then
    it uses `pscp` to copy the kubeconfig file named `config` file from the home directory
    of the user you bootstrapped your Cluster with on the Control Plane Node to the
    user profile of the current user on the Windows workstation in a subdirectory
    `.kube`. Once copied there, kubectl can read that file for its Cluster context.


    ```

    mkdir %USERPROFILE%\.kube

    pscp -P 22 @control:/home//.kube/config %USERPROFILE%\.kube\

    Listing 4-36

    Copying your kubeconfig file from the Control Node to your Windows workstation

    ```


    Note


    Earlier in this chapter, as part of the Cluster bootstrapping process, you copied
    `/etc/kubernetes/admin.conf` to `$HOME/.kube/config` on the Control Plane Node.
    You are copying the config from this $HOME directory onto your Windows workstation.


    Once you have copied your Cluster context to your Windows workstation, from that
    workstation, you will want to confirm that kubectl can use that file, and you
    can do that by getting the current Cluster context with the code from Listing
    [4-37](#505695_2_En_4_Chapter.xhtml#PC37), and the output should match the output
    shown in Figure [4-11](#505695_2_En_4_Chapter.xhtml#Fig11) .


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig11_HTML.jpg)


    Figure 4-11


    A listing of the Cluster configuration contexts in our kubeconfig file on a Windows
    workstation


    ```

    kubectl config current-context

    Listing 4-37

    Retrieve active Kubernetes context

    ```


    Once you’ve confirmed kubectl is reading the correct kubeconfig file, you will
    want to test connectivity to your Cluster using the code in Listing [4-38](#505695_2_En_4_Chapter.xhtml#PC38).


    ```

    kubectl cluster-info

    Listing 4-38

    Testing connectivity to your Cluster

    ```


    Once executed, you should see output like in Figure [4-12](#505695_2_En_4_Chapter.xhtml#Fig12).
    You can confirm that you are pointing at the right Kubernetes Cluster by looking
    at the Control Plane Node’s URL, which in our lab environment is `https://172.16.94.10:6443`;
    that’s the location of the API Server.


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig12_HTML.jpg)


    Figure 4-12


    A listing of Cluster information. Confirming connectivity from our Windows client
    to the remote Cluster


    Now let’s move forward and copy our kubeconfig file from the Control Plane Node
    to a Linux workstation.


    ### From a Linux Workstation


    To copy a kubeconfig file from your Control Plane Node to a Linux workstation,
    you can use the `scp` command natively installed on many Linux distributions.
    In Listing [4-39](#505695_2_En_4_Chapter.xhtml#PC39), you will find the copy to
    copy a kubeconfig file from the Control Plane Node to a remote Linux workstation.
    Log in to the Linux machine you want to copy the file to and run this code on
    that system.


    Note


    This code will overwrite your current kubeconfig file named *config*. You may
    want to save a backup of your existing kubeconfig file.


    ```

    mkdir $HOME/.kube

    scp aen@control:~/.kube/config $HOME/.kube/config

    Listing 4-39

    Copying your kubeconfig file from the Control Node to your Linux workstation

    ```


    Like in the preceding Windows example, please use `kubectl config current-context`
    to ensure you have the Cluster context configured properly and use `kubectl cluster-info`
    to confirm connectivity to the remote Cluster. The output will be the same as
    in the previous section.


    ## Summary


    In this chapter, we’ve guided you on creating a Kubernetes Cluster. Now that you’re
    ready, the next chapter will finally be a first hands-on Arc experience: deploying
    your first Data Controller.


    # 5. Deploying a Data Controller in Indirect Mode


    In the previous chapter, we’ve deployed a Kubernetes Cluster. Now it’s time to
    use this Cluster and deploy our first Azure Arc-enabled Data Controller to it,
    which we will deploy using indirectly connected – or in short, indirect – mode.


    Note


    If you are using multiple Kubernetes Clusters, make sure your current context
    – which is basically the active Kubernetes Cluster configuration – is looking
    at the right one.


    ## Deciding on a Kubernetes Storage Class


    First, double-check that your current context is the one you’re targeting with
    your deployment using Listing [5-1](#505695_2_En_5_Chapter.xhtml#PC1).


    ```

    kubectl config current-context

    Listing 5-1

    Retrieve active Kubernetes context

    ```


    Our example output in Figure [5-1](#505695_2_En_5_Chapter.xhtml#Fig1) shows that
    we currently have our kubeadm Cluster, which we’ve previously deployed, as the
    active context.


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Output example


    As we are already connected to the correct Cluster, we will need to figure out
    which Storage Classes are available within the Cluster, as this information is
    required later during the deployment, even if there is just one Storage Class.
    The Storage Classes can be listed using the command in Listing [5-2](#505695_2_En_5_Chapter.xhtml#PC2).


    ```

    kubectl get storageclass

    Listing 5-2

    Retrieve list of Storage Classes in current Kubernetes context

    ```


    In our example, there is only one class – local-storage – as shown in Figure [5-2](#505695_2_En_5_Chapter.xhtml#Fig2).


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig2_HTML.png)


    Figure 5-2


    List of Storage Classes


    Write this information down or memorize it. In case you are working on a Cluster
    with multiple Storage Classes available, start thinking which Storage Class you
    want to use for your Cluster. You can use different Storage Classes for Kubernetes
    logs, data, and database logs.'
