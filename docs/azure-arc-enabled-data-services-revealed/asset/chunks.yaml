  trans: '

    #### Azure Arc-enabled SQL Managed Instance


    Azure Arc-enabled SQL Managed Instance 是 SQL Server 的**直接迁移**版本。它使你能够将工作负载无缝迁移到
    Azure Arc，因为它与本地安装的 SQL Server 具有高度的兼容性，据文档记载，兼容性接近 100%。这意味着，将数据库从当前的本地实现迁移到
    Azure Arc-enabled SQL Managed Instance，几乎不需要或完全不需要对数据库进行更改。部署 Azure Arc-enabled
    SQL Managed Instance 时，你可以从本地 SQL Server 版本进行备份，并将该备份直接还原到 Azure Arc-enabled SQL
    Managed Instance。


    提示

    请访问 [`docs.microsoft.com/en-us/azure/azure-arc/data/managed-instance-features#Unsupported`](https://docs.microsoft.com/en-us/azure/azure-arc/data/managed-instance-features#Unsupported)，查看
    `Azure Arc-enabled SQL Managed Instance` 不支持的功能和服务列表。


    `Azure Arc-enabled SQL Managed Instance` 的一个特性是它 `始终最新`。（你可能也会看到“常青 SQL”这个术语。）类似于在
    Azure PaaS 服务（例如 Azure 云托管部署中的 `Azure SQL Managed Instance`）中提供的始终最新或常青 SQL 产品，Microsoft
    将持续为 `Azure Arc-enabled SQL Managed Instance` 更新 SQL Managed Instance 容器映像，并推送到
    Microsoft 容器注册表。然后，根据你在部署中定义的更新策略，你可以指定更新应用于你的环境的频率和时间。在传统的 SQL Server 实现中，管理更新是一个具有挑战性且耗时的过程。Kubernetes
    提供了快速吸收更新和变更，并将其推出到集群的能力。这就是在 `Azure Arc-enabled Data Services` 中使用的更新模型。


    `Azure Arc-enabled SQL Managed Instance` 提供两种服务层级：`常规用途` 和 `业务关键`。根据 Microsoft
    文档中的定义，`常规用途` 是一个经济实惠的层级，专为大多数具有基本性能和可用性需求的工作负载而设计。`业务关键` 层级专为对性能敏感、要求更高可用性的工作负载而设计。


    `常规用途` 服务层级现已正式发布。其 SQL Server 功能集与标准版相同，但对 `Azure Arc-enabled SQL Managed Instance`
    可以使用的内核数量和可寻址内存量有所限制——最多 24 个 CPU 内核和 128GB 内存。这也引出了关于 `Azure Arc-enabled SQL
    Managed Instance` 的下一个关键点，即`高可用性`。在 `常规用途` 服务层级中，`Azure Arc-enabled SQL Managed
    Instance` 作为单个 SQL Server 实例部署，运行在由 `StatefulSet` 管理的 `Pod` 中。如前所述，`StatefulSet`
    在应用程序或 `Node` 发生故障事件时提供基本的故障转移能力。如果发生故障，先前的 `Pod` 会被删除，并在其位置创建一个新的 `Pod`。这些故障场景的恢复时间可能非常短。


    提示

    当创建运行 SQL Server Managed Instance 的 `Pod` 时，它必须在启动时运行崩溃恢复。考虑使用加速数据恢复来缩短 SQL Server
    Managed Instance 的启动时间。更多详情，请访问 [`docs.microsoft.com/en-us/sql/relational-databases/accelerated-database-recovery-concepts`](https://docs.microsoft.com/en-us/sql/relational-databases/accelerated-database-recovery-concepts)。


    为确保此单实例实现的高可用性，应使用外部共享存储，并使其对集群中的所有 `Node` 可用。如果某个 `Node` 发生故障，实例可以在集群中的其他地方启动，然后挂载
    `Persistent Volume` 并使其对新的 `Pod` 可用。


    `Azure Arc-enabled SQL Managed Instance` 使用 `Kubernetes Services` 作为持久访问端点。如图
    2-7 所示，需要访问部署在 Kubernetes 中的 SQL Managed Instance 的应用程序和用户将指向 IP 或 DNS 名称以及为访问数据库实例定义的端口。此
    `Service` 独立于 `Pod` 的生命周期，如果 `Pod` 停止并在集群中其他地方重新创建，则 `Service` 会更新并将流量自动发送到新的
    `Pod`。


    ![](img/505695_2_En_2_Fig7_HTML.jpg)


    ### 图 2-7

    在 Kubernetes 集群中运行的 `Azure Arc-enabled SQL Managed Instance` 的典型部署


    在 Kubernetes 中，当你更新容器映像或进行 `Pod` 配置更改时，当前的 `Pod` 会被删除，并使用更新后的容器映像或更新后的配置创建新的 `Pod`。这是一个非常快速的操作，但这可能会导致短暂的停机时间，在某些场景下这可能是不可接受的。在
    `Azure Arc-enabled Data Services` 中，部署的数据服务使用相同的模型进行更新，因此在为已部署的数据服务推出更新时会有短暂的停机期。


    如图 2-8 所示的 `业务关键` 服务层级提供了企业版的 SQL Server 功能集，并受操作系统限制的内核数和可寻址内存量。在此服务层级中，高可用性由
    `可用性组` 提供，其中数据库的多个副本跨 Kubernetes 集群中的多个 `Node` 复制。停机时间仅限于故障转移的持续时间。此外，此 `可用性组`
    可用于读取扩展操作。


    ![](img/505695_2_En_2_Fig8_HTML.jpg)


    ### 图 2-8

    业务关键服务层级：计算与存储共置


    有关服务层级的更多信息，请参见此链接：[`docs.microsoft.com/en-us/azure/azure-arc/data/service-tiers`](https://docs.microsoft.com/en-us/azure/azure-arc/data/service-tiers)。


    云的一项优势是`弹性扩展`，使你能够按需向环境添加容量，并尽可能快地利用该额外容量。`Azure Arc-enabled SQL Managed Instance`
    的部署也不例外。如果需要，你可以通过调整分配给该部署的 CPU 和内存资源，为 SQL Managed Instance 的部署添加额外的计算和内存容量。此外，利用
    Kubernetes 的基本高可用性结构，这一更改几乎可以立即推出。部署会更新，并使用此新配置创建一个新的 `Pod`，SQL Managed Instance
    便可以使用此额外的纵向扩展容量。

    '
- fmt: '# Azure Arc-enabled PostgreSQL Hyperscale


    我们要向您介绍的第二项 Azure Arc 启用的数据服务是 `Azure Arc-enabled PostgreSQL Hyperscale`。`Azure
    Arc-enabled PostgreSQL Hyperscale` 是一种领先的开源数据库，用作关键任务应用程序的数据存储。PostgreSQL Hyperscale
    是在 Azure 云中的一种实现，它使您能够通过跨多个实例分片来水平扩展数据，并支持分布式并行查询执行。Hyperscale 成功的一个关键因素是它能够与现有版本的
    Postgres 数据库配合工作，因此数据库及其应用程序几乎无需更改即可利用这些优势。


    `Azure Arc-enabled PostgreSQL Hyperscale` 也使用了前一节描述的 *始终最新* 或常青 SQL 模型。Microsoft
    将持续更新 PostgreSQL Hyperscale 的容器镜像，您可以决定该镜像在您的环境中 rollout 的频率和时机。


    如前所述，云的一个重要优势是 *弹性扩展*，即能够按需为您的环境增加容量，并尽可能快地利用该额外容量。`Azure Arc-enabled PostgreSQL
    Hyperscale` 突出体现了这种弹性扩展，因为它可以在支持数据库的 `Postgres Worker Nodes` 数量上进行扩展（横向扩展），并能将数据分片到这些工作节点及其底层存储上。这实现了并行查询执行和分布式
    I/O，从而可以提高数据库容量和性能。


    > **注意**

    >

    > 我们想指出术语使用上存在重叠。`Postgres Worker Node` 是 Hyperscale 服务器组中的单个计算单元。这与 `Kubernetes
    Node`（Kubernetes 集群中的计算资源）不同。


    在 `Azure Arc-enabled PostgreSQL` 中执行扩展操作时，额外的 `Postgres Worker Nodes` 会被添加到支持
    `PostgreSQL Hyperscale` 服务器组的 `Postgres Worker Nodes` 资源池中。在图 [2-9](#505695_2_En_2_Chapter.xhtml#Fig9)
    中，您将看到一个 `PostgreSQL Hyperscale` 服务器组从两个工作节点扩展到三个工作节点。然后，数据会在服务器组内的三个工作节点之间重新平衡。横向扩展是一项在线操作，分片数据会自动在当前服务器组的工作节点间重新平衡。


    ![](images/505695_2_En_2_Chapter/505695_2_En_2_Fig9_HTML.jpg)


    图 2-9


    一个 `PostgreSQL Hyperscale` 服务器组从两个工作节点扩展到三个工作节点，数据正在工作节点间重新平衡


    除了横向扩展，您还可以通过向部署添加 CPU 和内存容量来纵向扩展单个 `Postgres Worker Nodes`。这样做会导致支持 `Postgres
    Workers` 的 Pod 因为新的 Pod 配置而被重启。截至本文发布时，不支持缩减操作。如果您需要缩减容量，可以创建一个新实例，将旧实例中的数据备份，然后将其还原到新实例中。有关数据放置和分片数据的更多信息，请查阅
    [*https://docs.microsoft.com/en-us/azure/azure-arc/data/concepts-distributed-postgres-hyperscale*](https://docs.microsoft.com/en-us/azure/azure-arc/data/concepts-distributed-postgres-hyperscale)。


    ## 部署规模考虑


    Azure Arc 启用的数据服务部署在 Kubernetes 上。Kubernetes 提供了对您本地数据中心或云中可用硬件的抽象。在本节中，我们想向您介绍在设计
    Azure Arc 启用的数据服务和支持性 Kubernetes 集群时的规模考虑因素。我们将具体讨论的主题是 *计算* 和 *存储*。首先，让我们看看计算。


    ### 计算


    Kubernetes 集群中的每个节点（`Node`）都会贡献 CPU 和内存容量，共同构成可分配给集群中部署的工作负载的总体可用资源。部署的节点数量和规模取决于运行集群中部署的工作负载以及任何集群系统功能所需的容量。如果集群需要额外容量，可以添加更多的节点，从而为工作负载贡献更多的
    CPU 和内存容量。如果需要，可以添加更大的节点或用更大的节点替换较小的节点，以增加集群的整体容量。这种按需增加容量的概念是云架构弹性的关键。


    部署 Azure Arc 启用的数据服务时，有几个组件会影响运行集群和支持部署的工作负载所需的总体资源占用。这包括 Arc 管理控制平面（`Arc Management
    Control Plane`）所需的资源，以及实际部署的数据服务工作负载所需的资源，可能还包括集群中部署的任何其他工作负载。让我们更详细地看看每一项：


    *   **`Arc Management Control Plane`**：由数据控制器（`Data Controller`）、指标（`Metrics`）和日志记录（`Logging`）Pod
    组成。这些服务中的每一个都会消耗集群中的 CPU 和内存。有关每个服务所需资源的更多信息，请查阅 [*https://docs.microsoft.com/en-us/azure/azure-arc/data/sizing-guidance#data-controller-sizing-details*](https://docs.microsoft.com/en-us/azure/azure-arc/data/sizing-guidance%2523data-controller-sizing-details)。

    *   **数据服务工作负载**：部署在集群中的每个数据服务实例都会消耗一定量的 CPU、内存和磁盘。每种资源消耗多少取决于在每个数据服务中运行的工作负载。有关每个可用数据服务的工作负载规模和最低要求的更多信息，请查阅
    [*https://docs.microsoft.com/en-us/azure/azure-arc/data/sizing-guidance*](https://docs.microsoft.com/en-us/azure/azure-arc/data/sizing-guidance)。

    *   **Kubernetes 系统 Pod**：在 Kubernetes 集群的每个节点上，都有一组执行关键集群功能的系统 Pod 和服务，每个都会消耗一定量的系统资源。资源被预留给关键操作，在资源稀缺的场景下，用户
    Pod 可能会被从节点中驱逐。有关预留计算资源（`Reserved Compute Resources`）的更多信息，请查阅 [*https://kubernetes.io/docs/tasks/administer-cluster/reserve-compute-resources/*](https://kubernetes.io/docs/tasks/administer-cluster/reserve-compute-resources/)。

    *   **其他工作负载**：如果您的集群并非专用于数据服务，请不要忘记将该工作负载纳入您的规模计算。


    了解了需要部署在集群中的工作负载量之后，接下来您需要做的是确定集群节点的规模以及运行您的工作负载所需且具备节点级冗余的集群节点数量。


    *   **单个节点规模**：在确定节点规模时，CPU 和内存不能超分配。例如，如果您的节点有两个核心和 16GB RAM，您无法创建一个需要四个核心和 32GB
    RAM 的数据库实例。Kubernetes 将无法启动该 Pod。因此，您必须添加一个更大的节点，或减少对该 Pod 的分配。Microsoft 文档建议在每个节点上至少保留
    25% 的可用资源，以便为增长和冗余留出空间。'
  raw: '#### Azure Arc-enabled PostgreSQL Hyperscale


    The second Azure Arc-enabled Data Service we want to introduce to you is *Azure
    Arc-enabled PostgreSQL Hyperscale*. Azure Arc-enabled PostgreSQL Hyperscale is
    a leading open source database used as a data store for mission-critical applications.
    PostgreSQL Hyperscale is an implementation in the Azure Cloud that enables you
    to horizontally scale data by sharding it across multiple instances and allows
    for distributed parallel query execution. A key element of Hyperscale''s success
    is that it works with existing versions of Postgres database, so databases and
    their applications can use these benefits with little to no changes.


    Azure Arc-enabled PostgreSQL Hyperscale also uses the *always current* or evergreen
    SQL model described in the previous section. Microsoft will continuously update
    the container image for PostgreSQL Hyperscale, and you can decide how often and
    when that image is rolled out into your environment.


    As mentioned previously, a vital benefit of the cloud is *elastic scale*, being
    able to add capacity to your environment on demand and being able to take advantage
    of that additional capacity as quickly as possible. Azure Arc-enabled PostgreSQL
    Hyperscale highlights this elastic scale since it can scale out in terms of the
    number of Postgres Worker Nodes supporting the database and also shard the data
    across those Worker Nodes and their underlying storage. This enables both parallel
    query execution and also distributed I/O which can increase database capacity
    and performance.


    Note


    We want to call out that there is an overlap in terms used. A Postgres Worker
    Node is an individual compute unit in a Hyperscale Server Group. This is not the
    same as a Kubernetes Node, a compute resource in a Kubernetes Cluster.


    When executing a scaling operation in Azure Arc-enabled PostgreSQL, additional
    Postgres Worker Nodes are added to the pool of Postgres Worker Nodes supporting
    the PostgreSQL Hyperscale Server Group. In Figure [2-9](#505695_2_En_2_Chapter.xhtml#Fig9),
    you will see a PostgreSQL Hyperscale Server Group scaled from two Worker Nodes
    to three Worker Nodes. The data is then rebalanced across the three Worker Nodes
    in the Server Group. Scaling out is an online operation, and the sharded data
    is automatically rebalanced across the Worker Nodes in the current Server Group.


    ![](images/505695_2_En_2_Chapter/505695_2_En_2_Fig9_HTML.jpg)


    Figure 2-9


    A PostgreSQL Hyperscale Server Group scaled from two Worker Nodes to three Worker
    Nodes and data being rebalanced across the Worker Nodes


    In addition to scale-out, you can also scale up individual Postgres Worker Nodes
    by adding CPU and memory capacity to the deployments. Doing this will cause the
    Pods supporting the Postgres Workers to be restarted due to the new Pod configuration.
    At the time of this publication, scale-back operations are not supported. If you
    need to scale down, you can create a new instance, back up the data in the old
    instance, and restore it into the new instance. For more information on data placement
    and sharding data, check out [*https://docs.microsoft.com/en-us/azure/azure-arc/data/concepts-distributed-postgres-hyperscale*](https://docs.microsoft.com/en-us/azure/azure-arc/data/concepts-distributed-postgres-hyperscale).


    ### Deployment Sizing Considerations


    Azure Arc-enabled Data Services are deployed on Kubernetes. Kubernetes provides
    an abstraction over the hardware available in your on-premises data center or
    cloud. In this section, we want to introduce you to sizing considerations when
    designing your Azure Arc-enabled Data Services and the supporting Kubernetes Cluster.
    The specific topics we are going to cover are *compute* and *storage*. First up,
    let''s look at compute.


    #### Compute


    Each Node in a Kubernetes Cluster contributes both CPU and memory capacity to
    the collection of overall available resources that can be allocated workloads
    deployed in the Cluster. The number and size of the Nodes deployed is a function
    of the required capacity needed to run the workload deployed in the Cluster and
    also any Cluster system functions. If additional capacity is required in a Cluster,
    the additional Nodes can be added, contributing to more CPU and memory capacity
    allocated to workload. If needed, larger Nodes can be added or used to replace
    smaller Nodes increasing the overall capacity of the Cluster. This concept of
    adding additional capacity as needed is key to the elasticity of cloud-based architectures.


    When deploying Azure Arc-enabled Data Services, several components contribute
    to the overall footprint of the resources required to run a Cluster and support
    deployed workloads. This includes the resources needed by the Arc Management Control
    Plane and the resources required by the actual data services workload deployed
    and potentially any other workload that is deployed in the Cluster. Let’s look
    at each of these in more detail:


    *   **Arc Management Control Plane**: Consisting of the Data Controller, Metrics,
    and Logging Pods. Each one of these services consumes both CPU and memory in the
    Cluster. For more information on the required resources for each, check out [*https://docs.microsoft.com/en-us/azure/azure-arc/data/sizing-guidance#data-controller-sizing-details*](https://docs.microsoft.com/en-us/azure/azure-arc/data/sizing-guidance%2523data-controller-sizing-details).


    *   **Data Services Workload**: Each instance of a data service deployed in the
    Cluster will consume some amount of CPU, memory, and disk. How much of each of
    those resources depends on the workload that is running in each of those data
    services. For more information on workload sizing and minimum requirements for
    each of the data services available, check out [*https://docs.microsoft.com/en-us/azure/azure-arc/data/sizing-guidance*](https://docs.microsoft.com/en-us/azure/azure-arc/data/sizing-guidance).


    *   **Kubernetes System Pods**: On each Node in a Kubernetes Cluster, there is
    a collection of system Pods and services which perform critical Cluster functions,
    each of which consumes some amount of system resources. Resources are reserved
    for critical operations, and in scenarios when resources are scarce, user Pods
    can be evicted from a Node. More information about Reserved Compute Resources
    is available on [*https://kubernetes.io/docs/tasks/administer-cluster/reserve-compute-resources/*](https://kubernetes.io/docs/tasks/administer-cluster/reserve-compute-resources/).


    *   **Other Workloads**: If your Cluster is not dedicated to data services, don''t
    forget to take that workload into your sizing calculations.


    After getting a feel for how much workload needs to be deployed in the Cluster,
    the next thing you will need to do is determine the size of your Cluster Nodes
    and the number of Cluster Nodes required to run your workload efficiently and
    with Node-level redundancy.


    *   **Individual Node Size**: When sizing Nodes, CPU and memory cannot be overallocated.
    For example, if your Nodes have two cores and 16GB of RAM, you cannot create a
    database instance that is four cores and 32GB of RAM. Kubernetes will not be able
    to start that Pod up. So, you have to add a larger Node or reduce the allocation
    to that Pod. Microsoft documentation recommends leaving at least 25% of available
    resources on each Node in the Cluster to allow for growth and redundancy.'
  trans: '

    # Azure Arc 支持的 PostgreSQL 超大规模版


    我们要向您介绍的第二项 Azure Arc 启用的数据服务是 `Azure Arc-enabled PostgreSQL Hyperscale`。`Azure
    Arc-enabled PostgreSQL Hyperscale` 是一种领先的开源数据库，用作关键任务应用程序的数据存储。PostgreSQL Hyperscale
    是在 Azure 云中的一种实现，它使您能够通过跨多个实例分片来水平扩展数据，并支持分布式并行查询执行。Hyperscale 成功的一个关键因素是它能够与现有版本的
    Postgres 数据库配合工作，因此数据库及其应用程序几乎无需更改即可利用这些优势。


    `Azure Arc-enabled PostgreSQL Hyperscale` 也使用了前一节描述的 *始终最新* 或常青 SQL 模型。Microsoft
    将持续更新 PostgreSQL Hyperscale 的容器镜像，您可以决定该镜像在您的环境中 rollout 的频率和时机。


    如前所述，云的一个重要优势是 *弹性扩展*，即能够按需为您的环境增加容量，并尽可能快地利用该额外容量。`Azure Arc-enabled PostgreSQL
    Hyperscale` 突出体现了这种弹性扩展，因为它可以在支持数据库的 `Postgres Worker Nodes` 数量上进行扩展（横向扩展），并能将数据分片到这些工作节点及其底层存储上。这实现了并行查询执行和分布式
    I/O，从而可以提高数据库容量和性能。


    > **注意**

    >

    > 我们想指出术语使用上存在重叠。`Postgres Worker Node` 是 Hyperscale 服务器组中的单个计算单元。这与 `Kubernetes
    Node`（Kubernetes 集群中的计算资源）不同。


    在 `Azure Arc-enabled PostgreSQL` 中执行扩展操作时，额外的 `Postgres Worker Nodes` 会被添加到支持
    `PostgreSQL Hyperscale` 服务器组的 `Postgres Worker Nodes` 资源池中。在图 2-9 中，您将看到一个 `PostgreSQL
    Hyperscale` 服务器组从两个工作节点扩展到三个工作节点。然后，数据会在服务器组内的三个工作节点之间重新平衡。横向扩展是一项在线操作，分片数据会自动在当前服务器组的工作节点间重新平衡。


    ![](img/505695_2_En_2_Fig9_HTML.jpg)


    图 2-9


    一个 `PostgreSQL Hyperscale` 服务器组从两个工作节点扩展到三个工作节点，数据正在工作节点间重新平衡


    除了横向扩展，您还可以通过向部署添加 CPU 和内存容量来纵向扩展单个 `Postgres Worker Nodes`。这样做会导致支持 `Postgres
    Workers` 的 Pod 因为新的 Pod 配置而被重启。截至本文发布时，不支持缩减操作。如果您需要缩减容量，可以创建一个新实例，将旧实例中的数据备份，然后将其还原到新实例中。有关数据放置和分片数据的更多信息，请查阅
    [*https://docs.microsoft.com/en-us/azure/azure-arc/data/concepts-distributed-postgres-hyperscale*](https://docs.microsoft.com/en-us/azure/azure-arc/data/concepts-distributed-postgres-hyperscale)。


    ## 部署规模考虑


    Azure Arc 启用的数据服务部署在 Kubernetes 上。Kubernetes 提供了对您本地数据中心或云中可用硬件的抽象。在本节中，我们想向您介绍在设计
    Azure Arc 启用的数据服务和支持性 Kubernetes 集群时的规模考虑因素。我们将具体讨论的主题是 *计算* 和 *存储*。首先，让我们看看计算。


    ### 计算


    Kubernetes 集群中的每个节点（`Node`）都会贡献 CPU 和内存容量，共同构成可分配给集群中部署的工作负载的总体可用资源。部署的节点数量和规模取决于运行集群中部署的工作负载以及任何集群系统功能所需的容量。如果集群需要额外容量，可以添加更多的节点，从而为工作负载贡献更多的
    CPU 和内存容量。如果需要，可以添加更大的节点或用更大的节点替换较小的节点，以增加集群的整体容量。这种按需增加容量的概念是云架构弹性的关键。


    部署 Azure Arc 启用的数据服务时，有几个组件会影响运行集群和支持部署的工作负载所需的总体资源占用。这包括 Arc 管理控制平面（`Arc Management
    Control Plane`）所需的资源，以及实际部署的数据服务工作负载所需的资源，可能还包括集群中部署的任何其他工作负载。让我们更详细地看看每一项：


    *   **`Arc Management Control Plane`**：由数据控制器（`Data Controller`）、指标（`Metrics`）和日志记录（`Logging`）Pod
    组成。这些服务中的每一个都会消耗集群中的 CPU 和内存。有关每个服务所需资源的更多信息，请查阅 [*https://docs.microsoft.com/en-us/azure/azure-arc/data/sizing-guidance#data-controller-sizing-details*](https://docs.microsoft.com/en-us/azure/azure-arc/data/sizing-guidance%2523data-controller-sizing-details)。

    *   **数据服务工作负载**：部署在集群中的每个数据服务实例都会消耗一定量的 CPU、内存和磁盘。每种资源消耗多少取决于在每个数据服务中运行的工作负载。有关每个可用数据服务的工作负载规模和最低要求的更多信息，请查阅
    [*https://docs.microsoft.com/en-us/azure/azure-arc/data/sizing-guidance*](https://docs.microsoft.com/en-us/azure/azure-arc/data/sizing-guidance)。

    *   **Kubernetes 系统 Pod**：在 Kubernetes 集群的每个节点上，都有一组执行关键集群功能的系统 Pod 和服务，每个都会消耗一定量的系统资源。资源被预留给关键操作，在资源稀缺的场景下，用户
    Pod 可能会被从节点中驱逐。有关预留计算资源（`Reserved Compute Resources`）的更多信息，请查阅 [*https://kubernetes.io/docs/tasks/administer-cluster/reserve-compute-resources/*](https://kubernetes.io/docs/tasks/administer-cluster/reserve-compute-resources/)。

    *   **其他工作负载**：如果您的集群并非专用于数据服务，请不要忘记将该工作负载纳入您的规模计算。


    了解了需要部署在集群中的工作负载量之后，接下来您需要做的是确定集群节点的规模以及运行您的工作负载所需且具备节点级冗余的集群节点数量。


    *   **单个节点规模**：在确定节点规模时，CPU 和内存不能超分配。例如，如果您的节点有两个核心和 16GB RAM，您无法创建一个需要四个核心和 32GB
    RAM 的数据库实例。Kubernetes 将无法启动该 Pod。因此，您必须添加一个更大的节点，或减少对该 Pod 的分配。Microsoft 文档建议在每个节点上至少保留
    25% 的可用资源，以便为增长和冗余留出空间。

    '
- fmt: '## 高可用性


    在为集群规划所需资源量时，需确保 provision 足够数量的节点，其总资源应能支持至少一个节点故障或计划内维护。对于关键系统，建议客户采用 N+2 模型，即允许两个节点离线，集群仍能正常运行，性能不降级且工作负载不中断。当节点故障时，运行在该故障节点上的
    Pods 会被迁移到集群中剩余的节点上。因此，必须为这些 Pods 的运行准备足够的容量。


    这里的关键要点是：确保有足够的节点来支持在集群中运行所需工作负载所需的 CPU 和内存量，即使发生节点故障也应如此。此外，请确保单个数据服务的部署所需的资源不超过集群中单个节点的可用资源。否则，支持该部署的
    Pods 将无法在集群的任何节点上启动，因为没有节点具备足够的资源来支持该配置。另外，您需要确保在每个节点上至少保留 25% 的容量，以供增长和冗余使用。


    ### 存储


    现在让我们继续讨论如何为 Azure Arc-enabled Data Services 集群规划存储。所需的存储容量和类型取决于所部署的工作负载。从根本上说，在
    Arc-enabled Data Services 中作为 SQL 托管实例运行的 SQL Server 实例的性能配置文件，与在 Azure 或甚至本地等任何其他平台上部署
    SQL Server 实例时看到的并无不同。其独特之处在于如何为您的数据服务工作负载配置和分配存储访问。现在让我们深入探讨这些主题。


    如前所述，在 Kubernetes 中，存储是从 Storage Classes 动态分配的。当部署数据服务实例（如 SQL 托管实例或 PostgreSQL
    Hyperscale）时，您需要为部署中不同类型的数据定义要使用的 Storage Class。当前可用的选项包括*数据库数据文件*、*数据库备份文件*和*应用程序日志文件*，如果使用
    SQL 托管实例，还包括*数据库事务日志文件*的存储位置。如果在定义数据服务实例时未指定 Storage Class，则将使用默认的 Storage Class。定义哪种数据使用哪个
    Storage Class 是在定义实例时通过配置参数设置的。本书后续章节将更详细地介绍这一点。


    在设计 Azure Arc-enabled Data Services 集群时，您需要根据所需的工作负载配置，创建映射回集群所需存储类型的 Storage
    Classes。例如，您可能需要为数据服务实例中的每种数据类型（如数据库文件、事务日志文件、应用程序日志文件和备份）分别创建单独的 Storage Class。这些
    Storage Classes 中的每一个都可能映射到不同的存储子系统，每个子系统都具备为存储在该 Storage Class 中的数据所需的性能配置文件。


    Storage Classes 可以配置为从本地节点存储和远程共享存储分配存储。如果节点内部部署了高速磁盘，本地存储可能非常快。但是，本地节点存储在节点故障时不提供持久性。如果节点发生故障，则该节点上的数据将面临丢失风险。使用本地节点存储的一种常见模式是，确保使用该类型存储的应用程序中的数据在多个节点之间复制，以实现冗余和可用性。复制与本地高速磁盘相结合是某些场景下可行的部署选项。本地存储是使用可用性组在副本之间复制数据的业务关键服务层的可行选项。


    使用远程共享存储时，集群中的节点从远程存储系统映射存储。这可以是 SAN、NAS 或基于云文件的系统。使用这种架构 provision 存储解耦了对本地节点的依赖。如果某个节点发生故障，原本运行在该节点上的
    Pod 可以被调度到集群中的另一个节点上。存储被挂载并暴露到 Pod 中，数据库实例可以快速恢复运行。从节点到共享存储环境的 I/O 互连应 provision
    多路径以实现冗余，并且应具备足够的容量来支持所需的工作负载。此外，需要高 I/O 的实例应使用高级 Kubernetes 调度技术分散在集群中的各个节点上。有关
    Kubernetes 中存储和调度的深入探讨，请参阅 Pluralsight 课程 “Configuring and Managing Kubernetes
    Storage and Scheduling”，链接为`www.pluralsight.com`。


    ## 总结与要点


    本章向您介绍了 Azure Arc-enabled Data Services。它从现代混合云策略面临的挑战开始。然后展示了 Azure Arc 如何通过将
    Azure 资源管理器扩展到您的本地或混合云环境来应对这些挑战，以实现大规模可管理性。接下来，我们介绍了核心的 Azure Arc-enabled 资源，包括服务器、Kubernetes、SQL
    Server 和数据服务。然后我们更深入地探讨了什么是 Azure Arc-enabled Data Services、其架构、工作负载如何部署和管理，并讨论了重要的部署注意事项，例如计算和存储容量规划。在下一章中，我们将从理论转向实践，学习如何在
    Kubernetes 集群中部署 Arc 数据控制器。


    ## 3. 部署准备


    在上一章中，我们讨论了 Azure Arc-enabled Data Services 的理论概念和组件。


    现在是为第一次部署做准备的时候了。在我们实际部署数据控制器以及随后由该数据控制器管理的数据库实例之前，我们确实需要一些先决条件以及一个就绪的 Kubernetes
    集群。所有这些步骤将引导您完成开始使用 Azure Arc-enabled Data Services 所需的操作，并确保您完全准备就绪。


    注意


    您需要一个 Azure 帐户和订阅来完成这些步骤并开始部署。如果 Azure 不适合您，还有其他部署选项可用。Microsoft 提供了一个 Jumpstart
    站点，可以轻松地在本地、AWS 或 Google 云中开始使用。有关更多信息，请访问`https://azurearcjumpstart.io/`。


    ### 先决条件


    让我们从查看先决条件开始。在此过程中，我们将指出一些非常有用的助手——虽然在技术上并非必需——但会让我们的工作轻松很多。我们将在此使用的所有代码都可在本书的
    GitHub 存储库中找到，并且我们根据您的偏好提供了从 Linux 和 Windows 客户端部署的选择。我们不会详细介绍 MacOS 的安装，但所需的工具（包括
    Azure Data Studio）也可在本书的 GitHub 存储库中找到。'
  raw: '*   **High Availability**: When sizing a Cluster for the amount of resources
    needed, ensure that you are provisioning enough Nodes with enough resources collectively
    to allow for at least one Node to fail or for planned maintenance. For critical
    systems, it is recommended that customers have an N+2 model, where two Nodes can
    be offline, and the Cluster will still function with no performance degradation
    or interruption in workload. On a Node failure, Pods running on the failed Node
    are moved onto the Cluster''s remaining Nodes. There needs to be sufficient capacity
    for these Pods to run.


    The key takeaway here is: ensure that you have enough Nodes to support the required
    amount of CPU and memory needed to run the desired workload in a Cluster even
    in the event of a Node failure. Further, make sure that an individual deployment
    of a data service does not require more resources than are available on a single
    Node in the Cluster. Otherwise, the Pods supporting that deployment will not be
    able to be started on a Node in the Cluster since no Nodes have enough resources
    to support that configuration. Further, you want to ensure that you leave at least
    25% capacity available on each Node in the Cluster for growth and redundancy.


    #### Storage


    Now let''s move on to planning for storage in Azure Arc-enabled Data Services
    Clusters. The amount of storage capacity and what type is needed depends on the
    workload being deployed. Fundamentally, the performance profile of a SQL Server
    instance running as a SQL Managed Instance in Arc-enabled Data Services is no
    different than you would see when SQL Server instance is deployed in any other
    platform, such as Azure or even on-premises. What is unique is how access to storage
    is configured and allocated to your data services workloads. Let''s dig into each
    of those topics now.


    As introduced earlier, in Kubernetes, storage is allocated dynamically from Storage
    Classes. When a data service instance, such as SQL Managed Instance or PostgreSQL
    Hyperscale, is deployed, you define which Storage Class you want to use for the
    different types of data in the deployment. Currently, the options available are
    *database data files*, *database backup files*, and *application log files* and,
    if using SQL Managed Instance, a location for the *database transaction log files.*
    If no Storage Class is specified when a data service instance is defined, the
    default Storage Class is used. Defining which Storage Class is used by which type
    of data is surfaced as a configuration parameter when defining an instance. This
    will be covered in much more detail later in the book.


    When designing an Azure Arc-enabled Data Services Cluster, you will want to create
    Storage Classes that map back to the storage types needed in your Cluster based
    on the workload profile required. For example, you may need an individual Storage
    Class for each type of data in a data service instance such as database files,
    transaction log files, application log files, and backups. Each one of these Storage
    Classes potentially can map to a different storage subsystem, each having the
    required performance profile for that data being stored in that Storage Class.


    Storage Classes can be configured to allocate storage from both local Node storage
    and remote shared storage. Local storage has the potential to be very fast if
    the high-speed disks are deployed inside the Node. But local Node storage provides
    no durability in the event of a Node failure. If a Node fails, then the data on
    that Node is at risk of data loss. A common pattern for using local Node storage
    is ensuring that the data in the applications using that type of storage is replicated
    between multiple Nodes for redundancy and availability. Replication combined with
    local high-speed disks is viable deployment option in some scenarios. Local storage
    is a viable option for the Business-Critical service tier which uses Availability
    Groups to replicate data between replicas.


    When using remote shared storage, Nodes in the Cluster map storage from the remote
    storage system. This could be a SAN, NAS, or Cloud Files-based system. Provisioning
    storage using this architecture decouples the dependency of the local Node. If
    there is a Node failure, the Pod that was running on that Node can be scheduled
    onto another Node in the Cluster. The storage is mounted and exposed into the
    Pod, and the database instance can be back up and running quickly. The I/O interconnect
    from the Node to the shared storage environment should be provisioned with multiple
    paths for redundancy and also be of sufficient capacity to support the desired
    workload. Also, instances that require high I/O should be spread out across the
    Nodes in the Cluster using advanced Kubernetes scheduling techniques. For a deeper
    dive into storage and scheduling in Kubernetes, check out the Pluralsight course
    “Configuring and Managing Kubernetes Storage and Scheduling” at [*www.pluralsight.com*](http://www.pluralsight.com).


    ## Summary and Key Takeaways


    This chapter introduced you to Azure Arc-enabled Data Services. It started with
    the challenges of modern hybrid cloud strategies. It then showed you how Azure
    Arc addresses those challenges to provide manageability at scale by extending
    the Azure Resource Manager to your on-premises or hybrid cloud environments. Next,
    we introduced the core Azure Arc-enabled resources, including Servers, Kubernetes,
    SQL Server, and Data Services. Then we dove deeper into what Azure Arc-enabled
    Data Services are, its architecture, how workloads are deployed and managed, and
    also discussed vital deployment considerations such as compute and storage capacity
    planning. In the next chapter, we will shift from theory into action and learn
    how to deploy an Arc Data Controller in a Kubernetes Cluster.


    # 3. Getting Ready for Deployment


    In the previous chapter, we’ve talked about the theoretical concepts and components
    of Azure Arc-enabled Data Services.


    Now it’s time to get ready for a first deployment. Before we can get to the actual
    deployment of a Data Controller and subsequently database instances managed by
    that Data Controller, we do need some prerequisites as well as a Kubernetes Cluster
    in place. All these steps will guide you through what is necessary to start working
    with Azure Arc-enabled Data Services and make sure you’re fully ready to go.


    Note


    You will need an Azure account and subscription to complete these steps and to
    start a deployment. There are other deployment options available if Azure is not
    an option for you. Microsoft provides a Jumpstart site to make it easy to get
    going on-premises, in AWS, or Google’s cloud. For more information, visit [`https://azurearcjumpstart.io/`](https://azurearcjumpstart.io/).


    ## Prerequisites


    Let us begin by looking at the prerequisites. While doing so, we’ll point out
    some very useful helpers which – even though technically not necessary – will
    make our lives much easier. All the code that we’ll be using here is available
    on this book’s GitHub repository, and we’re giving you the choice between deploying
    from a Linux and a Windows client depending on your preferences. We will not be
    going into details of an installation on MacOS, but the required tools including
    Azure Data Studio are available on this book’s GitHub repository, too.'
  trans: '

    ## 高可用性


    在为集群规划所需资源量时，需确保 provision 足够数量的节点，其总资源应能支持至少一个节点故障或计划内维护。对于关键系统，建议客户采用 N+2 模型，即允许两个节点离线，集群仍能正常运行，性能不降级且工作负载不中断。当节点故障时，运行在该故障节点上的
    Pods 会被迁移到集群中剩余的节点上。因此，必须为这些 Pods 的运行准备足够的容量。


    这里的关键要点是：确保有足够的节点来支持在集群中运行所需工作负载所需的 CPU 和内存量，即使发生节点故障也应如此。此外，请确保单个数据服务的部署所需的资源不超过集群中单个节点的可用资源。否则，支持该部署的
    Pods 将无法在集群的任何节点上启动，因为没有节点具备足够的资源来支持该配置。另外，您需要确保在每个节点上至少保留 25% 的容量，以供增长和冗余使用。


    ### 存储


    现在让我们继续讨论如何为 Azure Arc-enabled Data Services 集群规划存储。所需的存储容量和类型取决于所部署的工作负载。从根本上说，在
    Arc-enabled Data Services 中作为 SQL 托管实例运行的 SQL Server 实例的性能配置文件，与在 Azure 或甚至本地等任何其他平台上部署
    SQL Server 实例时看到的并无不同。其独特之处在于如何为您的数据服务工作负载配置和分配存储访问。现在让我们深入探讨这些主题。


    如前所述，在 Kubernetes 中，存储是从 Storage Classes 动态分配的。当部署数据服务实例（如 SQL 托管实例或 PostgreSQL
    Hyperscale）时，您需要为部署中不同类型的数据定义要使用的 Storage Class。当前可用的选项包括*数据库数据文件*、*数据库备份文件*和*应用程序日志文件*，如果使用
    SQL 托管实例，还包括*数据库事务日志文件*的存储位置。如果在定义数据服务实例时未指定 Storage Class，则将使用默认的 Storage Class。定义哪种数据使用哪个
    Storage Class 是在定义实例时通过配置参数设置的。本书后续章节将更详细地介绍这一点。


    在设计 Azure Arc-enabled Data Services 集群时，您需要根据所需的工作负载配置，创建映射回集群所需存储类型的 Storage
    Classes。例如，您可能需要为数据服务实例中的每种数据类型（如数据库文件、事务日志文件、应用程序日志文件和备份）分别创建单独的 Storage Class。这些
    Storage Classes 中的每一个都可能映射到不同的存储子系统，每个子系统都具备为存储在该 Storage Class 中的数据所需的性能配置文件。


    Storage Classes 可以配置为从本地节点存储和远程共享存储分配存储。如果节点内部部署了高速磁盘，本地存储可能非常快。但是，本地节点存储在节点故障时不提供持久性。如果节点发生故障，则该节点上的数据将面临丢失风险。使用本地节点存储的一种常见模式是，确保使用该类型存储的应用程序中的数据在多个节点之间复制，以实现冗余和可用性。复制与本地高速磁盘相结合是某些场景下可行的部署选项。本地存储是使用可用性组在副本之间复制数据的业务关键服务层的可行选项。


    使用远程共享存储时，集群中的节点从远程存储系统映射存储。这可以是 SAN、NAS 或基于云文件的系统。使用这种架构 provision 存储解耦了对本地节点的依赖。如果某个节点发生故障，原本运行在该节点上的
    Pod 可以被调度到集群中的另一个节点上。存储被挂载并暴露到 Pod 中，数据库实例可以快速恢复运行。从节点到共享存储环境的 I/O 互连应 provision
    多路径以实现冗余，并且应具备足够的容量来支持所需的工作负载。此外，需要高 I/O 的实例应使用高级 Kubernetes 调度技术分散在集群中的各个节点上。有关
    Kubernetes 中存储和调度的深入探讨，请参阅 Pluralsight 课程 “Configuring and Managing Kubernetes
    Storage and Scheduling”，链接为`www.pluralsight.com`。


    ## 总结与要点


    本章向您介绍了 Azure Arc-enabled Data Services。它从现代混合云策略面临的挑战开始。然后展示了 Azure Arc 如何通过将
    Azure 资源管理器扩展到您的本地或混合云环境来应对这些挑战，以实现大规模可管理性。接下来，我们介绍了核心的 Azure Arc-enabled 资源，包括服务器、Kubernetes、SQL
    Server 和数据服务。然后我们更深入地探讨了什么是 Azure Arc-enabled Data Services、其架构、工作负载如何部署和管理，并讨论了重要的部署注意事项，例如计算和存储容量规划。在下一章中，我们将从理论转向实践，学习如何在
    Kubernetes 集群中部署 Arc 数据控制器。


    ## 3. 部署准备


    在上一章中，我们讨论了 Azure Arc-enabled Data Services 的理论概念和组件。


    现在是为第一次部署做准备的时候了。在我们实际部署数据控制器以及随后由该数据控制器管理的数据库实例之前，我们确实需要一些先决条件以及一个就绪的 Kubernetes
    集群。所有这些步骤将引导您完成开始使用 Azure Arc-enabled Data Services 所需的操作，并确保您完全准备就绪。


    注意


    您需要一个 Azure 帐户和订阅来完成这些步骤并开始部署。如果 Azure 不适合您，还有其他部署选项可用。Microsoft 提供了一个 Jumpstart
    站点，可以轻松地在本地、AWS 或 Google 云中开始使用。有关更多信息，请访问`https://azurearcjumpstart.io/`。


    ### 先决条件


    让我们从查看先决条件开始。在此过程中，我们将指出一些非常有用的助手——虽然在技术上并非必需——但会让我们的工作轻松很多。我们将在此使用的所有代码都可在本书的
    GitHub 存储库中找到，并且我们根据您的偏好提供了从 Linux 和 Windows 客户端部署的选择。我们不会详细介绍 MacOS 的安装，但所需的工具（包括
    Azure Data Studio）也可在本书的 GitHub 存储库中找到。

    '
- fmt: '## Chocolatey


    在开始之前，如果您计划从 Windows 客户端进行部署，我们希望您关注 `Chocolatey` 或简称为 `choco`。如果您还不了解它，`choco`
    是一个免费的 Windows 包管理器，它允许我们通过在 `PowerShell` 或命令提示符中运行单行命令来安装许多先决条件。鉴于 Windows 服务器没有自带易于使用的内置包管理器，这无疑让事情变得简单得多。您可以在
    [*http://chocolatey.org*](http://chocolatey.org) 上找到更多信息（参见图 [3-1](#505695_2_En_3_Chapter.xhtml#Fig1)），您甚至可以创建自己的账户并提供您自己的软件包。


    ![](images/505695_2_En_3_Chapter/505695_2_En_3_Fig1_HTML.png)


    图 3-1


    Chocolatey 主页


    然而，从一个简单用户的角度来看，没有必要创建账户或下载任何安装程序。


    要让 `choco` 在您的系统上可用，请以管理员模式打开一个 `PowerShell` 窗口，并运行清单 [3-1](#505695_2_En_3_Chapter.xhtml#PC1)
    中显示的脚本。


    ```

    [Net.ServicePointManager]::SecurityProtocol = [Net.ServicePointManager]::SecurityProtocol
    -bor [Net.SecurityProtocolType]::Tls12

    Set-ExecutionPolicy Bypass -Scope Process -Force; iex ((New-Object System.Net.WebClient).DownloadString(''https://chocolatey.org/install.ps1''))

    ```


    清单 3-1

    在 `PowerShell` 中安装 Chocolatey 的脚本


    一旦相应的命令完成，`choco` 就安装完毕并可以使用了。


    ## Windows 上的工具


    让我们从一些在 Linux 中默认自带的小工具开始，这些工具在 Windows 中要么默认缺失，要么功能受限。通过运行清单 [3-2](#505695_2_En_3_Chapter.xhtml#PC2)
    中的代码，我们将安装 *curl*（用于与网站交互）、*grep*（用于在命令行上过滤输出）和 *putty*（它还附带了 *pscp*，这是一个允许我们从
    Linux 机器复制数据的工具）。


    ```

    choco install curl -y

    choco install grep -y

    choco install putty -y

    ```


    清单 3-2

    推荐工具的安装脚本


    第一个官方先决条件是 `kubernetes-cli`，可以通过清单 [3-3](#505695_2_En_3_Chapter.xhtml#PC3) 中的命令安装。


    ```

    choco install kubernetes-cli -y

    ```


    清单 3-3

    安装 `kubectl` 的脚本


    最后一个官方要求是 `Azure` 命令行界面，也可以通过 `choco` 安装，如清单 [3-4](#505695_2_En_3_Chapter.xhtml#PC4)
    所示。


    ```

    choco install azure-cli -y

    ```


    清单 3-4

    安装 `azure-cli` 的脚本


    官方先决条件到此就介绍完了。尽管如此，我们还将通过清单 [3-5](#505695_2_En_3_Chapter.xhtml#PC5) 中的代码安装 `Azure
    Data Studio`，这将允许我们尝试图形化的部署体验。


    ```

    choco install azure-data-studio -y

    ```


    清单 3-5

    安装 Azure Data Studio 的脚本


    最后，让我们创建一个目录并下载 `AdventureWorks2017` 数据库的备份文件，以便稍后使用清单 [3-6](#505695_2_En_3_Chapter.xhtml#PC6)
    中的命令进行恢复。


    ```

    mkdir C:\Files

    curl -L -o C:\Files\AdventureWorks2017.bak https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks2017.bak

    ```


    清单 3-6

    下载 `AdventureWorks2017` 的脚本


    根据您要部署到的平台，其中一些工具可能不是必需的。鉴于它们都非常轻量级，我们建议无论如何都全部安装。


    ## Ubuntu 上的工具


    如果您更喜欢从 `Ubuntu` 机器部署，可以使用 `Ubuntu 18.04` 或 `Ubuntu 20.04`。`Ubuntu` 自带其包管理器（*apt*），因此不需要
    `Chocolatey` 或类似工具。不过在安装先决条件之前，我们需要使用清单 [3-7](#505695_2_En_3_Chapter.xhtml#PC7)
    中的代码将 `Microsoft` 仓库设为受信任源。


    ```

    sudo apt-get update

    sudo apt-get install gnupg ca-certificates curl wget software-properties-common
    apt-transport-https lsb-release -y

    curl -sL https://packages.microsoft.com/keys/microsoft.asc |

    gpg --dearmor |

    sudo tee /etc/apt/trusted.gpg.d/microsoft.asc.gpg > /dev/null

    ```


    清单 3-7

    基本先决条件的 `apt` 脚本


    如果您使用的是 `Ubuntu 18.04`，请运行清单 [3-8](#505695_2_En_3_Chapter.xhtml#PC8) 中的代码将 `Microsoft`
    仓库添加到已知的包安装源列表中。


    ```

    AZ_REPO=$(lsb_release -cs)

    echo "deb [arch=amd64] https://packages.microsoft.com/repos/azure-cli/ $AZ_REPO
    main" |

    sudo tee /etc/apt/sources.list.d/azure-cli.list

    sudo apt-get update

    ```


    清单 3-8

    添加 `Microsoft` 仓库的 `apt` 脚本（Ubuntu 18.04）


    现在我们可以继续使用清单 [3-9](#505695_2_En_3_Chapter.xhtml#PC9) 中的代码安装 `Azure` 命令行界面和 *kubectl*。


    ```

    sudo apt-get install -y azure-cli

    sudo apt-get install -y kubectl

    ```


    清单 3-9

    安装 `azure-cli` 和 `kubectl` 的 `apt` 脚本


    完成了——您的 `Ubuntu` 机器已经准备好开始部署了。


    如果您也想在 `Ubuntu` 上使用 `Azure Data Studio`，请按照 [*https://docs.microsoft.com/en-us/sql/azure-data-studio/download-azure-data-studio*](https://docs.microsoft.com/en-us/sql/azure-data-studio/download-azure-data-studio)
    上的说明操作。'
  raw: '## Chocolatey


    Before we get started, if you plan to deploy from a Windows client, we’d like
    to point your attention to Chocolatey or “choco.” In case you haven’t heard about
    it, choco is a free package manager for Windows which will allow us to install
    many of our prerequisites with a single line in PowerShell or a command prompt.
    Given that Windows Servers do not come with an easy-to-use built-in package manager,
    it just makes life much easier. You can find more information on [*http://chocolatey.org*](http://chocolatey.org)
    (see Figure [3-1](#505695_2_En_3_Chapter.xhtml#Fig1)), and you can even create
    an account and provide your own packages there.


    ![](images/505695_2_En_3_Chapter/505695_2_En_3_Fig1_HTML.png)


    Figure 3-1


    Home page of Chocolatey


    From a simple user perspective though, there is no need to create an account or
    to download any installer.


    To make choco available on your system, open a PowerShell window in administrative
    mode, and run the script shown in Listing [3-1](#505695_2_En_3_Chapter.xhtml#PC1).


    ```

    [Net.ServicePointManager]::SecurityProtocol = [Net.ServicePointManager]::SecurityProtocol
    -bor [Net.SecurityProtocolType]::Tls12

    Set-ExecutionPolicy Bypass -Scope Process -Force; iex ((New-Object System.Net.WebClient).DownloadString(''https://chocolatey.org/install.ps1''))

    Listing 3-1

    Install Script for Chocolatey in PowerShell

    ```


    Once the respective command has completed, choco is installed and ready to be
    used.


    ## Tools on Windows


    Let us start with a few little helpers that come with Linux by default, but are
    either missing or limited on Windows by default. By running the code in Listing
    [3-2](#505695_2_En_3_Chapter.xhtml#PC2), we’ll install *curl* (to interact with
    websites), *grep* (to filter output on the command line), and *putty* (which also
    comes with *pscp*, a tool that will allow us to copy data from a Linux machine).


    ```

    choco install curl -y

    choco install grep -y

    choco install putty -y

    Listing 3-2

    Install script for recommended tools

    ```


    The first official prerequisite is the *kubernetes-cli*, which can be installed
    through the command in Listing [3-3](#505695_2_En_3_Chapter.xhtml#PC3).


    ```

    choco install kubernetes-cli -y

    Listing 3-3

    Install script for kubectl

    ```


    The last official requirement is the Azure command-line interface, which can also
    be installed through choco as shown in Listing [3-4](#505695_2_En_3_Chapter.xhtml#PC4).


    ```

    choco install azure-cli -y

    Listing 3-4

    Install script for the azure-cli

    ```


    That’s it already for the official prerequisites. Despite that, we’ll also install
    Azure Data Studio through the code in Listing [3-5](#505695_2_En_3_Chapter.xhtml#PC5),
    which will allow us to try out the graphical deployment experience.


    ```

    choco install azure-data-studio -y

    Listing 3-5

    Install script for Azure Data Studio

    ```


    Finally, let’s create a directory and download a backup file of the AdventureWorks2017
    database so we have something to restore later using the commands in Listing [3-6](#505695_2_En_3_Chapter.xhtml#PC6)
    .


    ```

    mkdir C:\Files

    curl -L -o C:\Files\AdventureWorks2017.bak https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks2017.bak

    Listing 3-6

    Download script for AdventureWorks2017

    ```


    Depending on the platform that you’ll be deploying to, some of these tools may
    not be required. Given that they’re all rather lightweight, we’d recommend installing
    them all anyway.


    ## Tools on Ubuntu


    If you prefer to deploy from an Ubuntu machine, you can do this using Ubuntu 18.04
    or Ubuntu 20.04\. Ubuntu comes with its own package manager (*apt*), so there
    is no need for Chocolatey or something similar. Before we can install the prerequisites
    though, we need to make the Microsoft repository a trusted source using the code
    in Listing [3-7](#505695_2_En_3_Chapter.xhtml#PC7).


    ```

    sudo apt-get update

    sudo apt-get install gnupg ca-certificates curl wget software-properties-common
    apt-transport-https lsb-release -y

    curl -sL https://packages.microsoft.com/keys/microsoft.asc |

    gpg --dearmor |

    sudo tee /etc/apt/trusted.gpg.d/microsoft.asc.gpg > /dev/null

    Listing 3-7

    apt script for basic prerequisites

    ```


    Should you be using Ubuntu 18.04, run the code in Listing [3-8](#505695_2_En_3_Chapter.xhtml#PC8)
    to add the Microsoft repository to the list of known sources for package installations.


    ```

    AZ_REPO=$(lsb_release -cs)

    echo "deb [arch=amd64] https://packages.microsoft.com/repos/azure-cli/ $AZ_REPO
    main" |

    sudo tee /etc/apt/sources.list.d/azure-cli.list

    sudo apt-get update

    Listing 3-8

    apt script to add Microsoft repository (Ubuntu 18.04)

    ```


    Now we’re ready to go ahead and install the Azure command-line interface and *kubectl*
    using the code from Listing [3-9](#505695_2_En_3_Chapter.xhtml#PC9).


    ```

    sudo apt-get install -y azure-cli

    sudo apt-get install -y kubectl

    Listing 3-9

    apt script for azure-cli and kubectl

    ```


    That’s it – your Ubuntu machine is ready to go to start a deployment.


    If you want to use Azure Data Studio on Ubuntu as well, please follow the instructions
    at [*https://docs.microsoft.com/en-us/sql/azure-data-studio/download-azure-data-studio*](https://docs.microsoft.com/en-us/sql/azure-data-studio/download-azure-data-studio).'
  trans: '## Chocolatey


    在开始之前，如果您计划从 Windows 客户端进行部署，我们希望您关注 `Chocolatey` 或简称为 `choco`。如果您还不了解它，`choco`
    是一个免费的 Windows 包管理器，它允许我们通过在 `PowerShell` 或命令提示符中运行单行命令来安装许多先决条件。鉴于 Windows 服务器没有自带易于使用的内置包管理器，这无疑让事情变得简单得多。您可以在
    [*Chocolatey 官网*](http://chocolatey.org) 上找到更多信息（参见图 3-1），您甚至可以创建自己的账户并提供您自己的软件包。


    ![](img/505695_2_En_3_Fig1_HTML.png)


    图 3-1


    Chocolatey 主页


    然而，从一个简单用户的角度来看，没有必要创建账户或下载任何安装程序。


    要让 `choco` 在您的系统上可用，请以管理员模式打开一个 `PowerShell` 窗口，并运行清单 3-1 中显示的脚本。


    ```

    [Net.ServicePointManager]::SecurityProtocol = [Net.ServicePointManager]::SecurityProtocol
    -bor [Net.SecurityProtocolType]::Tls12

    Set-ExecutionPolicy Bypass -Scope Process -Force; iex ((New-Object System.Net.WebClient).DownloadString(''https://chocolatey.org/install.ps1''))

    ```


    清单 3-1

    在 `PowerShell` 中安装 Chocolatey 的脚本


    一旦相应的命令完成，`choco` 就安装完毕并可以使用了。


    ## Windows 上的工具


    让我们从一些在 Linux 中默认自带的小工具开始，这些工具在 Windows 中要么默认缺失，要么功能受限。通过运行清单 3-2 中的代码，我们将安装 *curl*（用于与网站交互）、*grep*（用于在命令行上过滤输出）和
    *putty*（它还附带了 *pscp*，这是一个允许我们从 Linux 机器复制数据的工具）。


    ```

    choco install curl -y

    choco install grep -y

    choco install putty -y

    ```


    清单 3-2

    推荐工具的安装脚本


    第一个官方先决条件是 `kubernetes-cli`，可以通过清单 3-3 中的命令安装。


    ```

    choco install kubernetes-cli -y

    ```


    清单 3-3

    安装 `kubectl` 的脚本


    最后一个官方要求是 `Azure` 命令行界面，也可以通过 `choco` 安装，如清单 3-4 所示。


    ```

    choco install azure-cli -y

    ```


    清单 3-4

    安装 `azure-cli` 的脚本


    官方先决条件到此就介绍完了。尽管如此，我们还将通过清单 3-5 中的代码安装 `Azure Data Studio`，这将允许我们尝试图形化的部署体验。


    ```

    choco install azure-data-studio -y

    ```


    清单 3-5

    安装 Azure Data Studio 的脚本


    最后，让我们创建一个目录并下载 `AdventureWorks2017` 数据库的备份文件，以便稍后使用清单 3-6 中的命令进行恢复。


    ```

    mkdir C:\Files

    curl -L -o C:\Files\AdventureWorks2017.bak https://github.com/Microsoft/sql-server-samples/releases/download/adventureworks/AdventureWorks2017.bak

    ```


    清单 3-6

    下载 `AdventureWorks2017` 的脚本


    根据您要部署到的平台，其中一些工具可能不是必需的。鉴于它们都非常轻量级，我们建议无论如何都全部安装。


    ## Ubuntu 上的工具


    如果您更喜欢从 `Ubuntu` 机器部署，可以使用 `Ubuntu 18.04` 或 `Ubuntu 20.04`。`Ubuntu` 自带其包管理器（*apt*），因此不需要
    `Chocolatey` 或类似工具。不过在安装先决条件之前，我们需要使用清单 3-7 中的代码将 `Microsoft` 仓库设为受信任源。


    ```

    sudo apt-get update

    sudo apt-get install gnupg ca-certificates curl wget software-properties-common
    apt-transport-https lsb-release -y

    curl -sL https://packages.microsoft.com/keys/microsoft.asc |

    gpg --dearmor |

    sudo tee /etc/apt/trusted.gpg.d/microsoft.asc.gpg > /dev/null

    ```


    清单 3-7

    基本先决条件的 `apt` 脚本


    如果您使用的是 `Ubuntu 18.04`，请运行清单 3-8 中的代码将 `Microsoft` 仓库添加到已知的包安装源列表中。


    ```

    AZ_REPO=$(lsb_release -cs)

    echo "deb [arch=amd64] https://packages.microsoft.com/repos/azure-cli/ $AZ_REPO
    main" |

    sudo tee /etc/apt/sources.list.d/azure-cli.list

    sudo apt-get update

    ```


    清单 3-8

    添加 `Microsoft` 仓库的 `apt` 脚本（Ubuntu 18.04）


    现在我们可以继续使用清单 3-9 中的代码安装 `Azure` 命令行界面和 *kubectl*。


    ```

    sudo apt-get install -y azure-cli

    sudo apt-get install -y kubectl

    ```


    清单 3-9

    安装 `azure-cli` 和 `kubectl` 的 `apt` 脚本


    完成了——您的 `Ubuntu` 机器已经准备好开始部署了。


    如果您也想在 `Ubuntu` 上使用 `Azure Data Studio`，请按照 [*Azure Data Studio 下载页面*](https://docs.microsoft.com/en-us/sql/azure-data-studio/download-azure-data-studio)
    上的说明操作。'
- fmt: '# Getting Azure Data Studio Ready


    One of the big strengths of `Azure Data Studio` is its extensibility, which makes
    it super flexible and lightweight at the same time. This, on the other hand, means
    that we’ll need to add and enable some extensions and configurations before we
    can use it for `Azure Arc`-enabled `Data Services`. While this could mostly be
    done “on the fly,” we’d suggest getting everything in place so we can purely focus
    on the deployment afterward.


    The first step is to install the `Azure Arc` extension. To do so, navigate to
    the extensions tab as shown in Figure 3-2.


    ![](images/505695_2_En_3_Chapter/505695_2_En_3_Fig2_HTML.png)


    Figure 3-2


    `Azure Data Studio` – add extension


    In the extensions tab, search for “`arc`” and click install as shown in Figure
    3-3.


    ![](images/505695_2_En_3_Chapter/505695_2_En_3_Fig3_HTML.jpg)


    Figure 3-3


    `Azure Arc` Extension Installation


    Note


    If you plan to use `Azure Data Studio` with `Postgres`, now might be a good time
    to also install the `Postgres` extension. Just search for “`postgres`” in the
    extensions tab like you’ve searched for “`arc`,” and it will show up.


    Next, we need to add an `Azure` account to `Azure Data Studio`. To do so, navigate
    to the connections tab, expand the `AZURE` section, and select “`Sign in to Azure…`”
    as shown in Figure 3-4.


    ![](images/505695_2_En_3_Chapter/505695_2_En_3_Fig4_HTML.png)


    Figure 3-4


    `Azure Data Studio` – add connection


    This will trigger a login dialog which will, after successfully signing in, confirm
    that your account was added. Your `Azure` account should also show up in the linked
    accounts section in `Azure Data Studio` as shown in Figure 3-5.


    ![](images/505695_2_En_3_Chapter/505695_2_En_3_Fig5_HTML.jpg)


    Figure 3-5


    `Azure` Account showing in `Azure Data Studio`


    Next, we need to enable `Python` in `Azure Data Studio`, and the easiest way to
    do so is to open a new notebook as shown in Figure 3-6.


    ![](images/505695_2_En_3_Chapter/505695_2_En_3_Fig6_HTML.jpg)


    Figure 3-6


    `Azure Data Studio` – adding notebook


    In this notebook, change the Kernel to “`Python 3`” as shown in Figure 3-7.


    ![](images/505695_2_En_3_Chapter/505695_2_En_3_Fig7_HTML.jpg)


    Figure 3-7


    `Azure Data Studio` - changing the kernel


    This will trigger the `Python` runtime configuration. We suggest a new `python`
    installation as also suggested by the wizard shown in Figure 3-8.


    ![](images/505695_2_En_3_Chapter/505695_2_En_3_Fig8_HTML.png)


    Figure 3-8


    Configure `Python` in `ADS`


    The installation can take a few minutes; once it has finished, you can see the
    kernel of the notebook showing as “`Python 3`” (see Figure 3-9).


    ![](images/505695_2_En_3_Chapter/505695_2_En_3_Fig9_HTML.jpg)


    Figure 3-9


    `Azure Data Studio` – kernel


    The last step is to install the “`pandas`” package. Navigate to the `python` packages
    by clicking the icon highlighted in Figure 3-10.


    ![](images/505695_2_En_3_Chapter/505695_2_En_3_Fig10_HTML.jpg)


    Figure 3-10


    `Azure Data Studio` – installing `pandas` package


    In the “`Manage Packages`” tab, switch to “`Add new`,” search for `pandas`, and
    click “`Install`” as illustrated in Figure 3-11.


    ![](images/505695_2_En_3_Chapter/505695_2_En_3_Fig11_HTML.jpg)


    Figure 3-11


    `Azure Data Studio` – managing packages


    You may close this wizard. The installation status will show and confirm when
    it’s done (see Figure 3-12).


    ![](images/505695_2_En_3_Chapter/505695_2_En_3_Fig12_HTML.jpg)


    Figure 3-12


    Status message in `ADS` for successful `pandas` installation


    That’s it for `Azure Data Studio` – we have installed and configured everything
    we’ll need.


    ## azure-cli Extensions and Providers


    The `azure-cli`, which is the central tool for most deployments as we’ll see in
    the upcoming chapters, requires a few extensions and registered providers to fully
    support the deployment of `Azure Arc`-enabled `Data Services`.


    Those can be added/installed through the `CLI` itself using the code from Listing
    3-10.


    ```

    az extension add --name connectedk8s

    az extension add --name k8s-extension

    az extension add --name customlocation

    az extension add --name arcdata

    az provider register -n Microsoft.Kubernetes

    az provider register -n Microsoft.KubernetesConfiguration

    az provider register -n Microsoft.ExtendedLocation

    Listing 3-10

    Command to install the required extensions and providers for the azure-cli

    ```


    Note


    If you had installed any of these tools or extensions before, please make sure
    to upgrade them to the latest versions before proceeding.


    ## Have a Resource Group in Azure


    In `Azure`, we’ll need a resource group to start with. This resource group will
    later be used to store your `Logs` and `Metrics` when uploading them to the `Azure
    Portal` (see Chapter 7). You can either create this through the Portal or by simply
    running the command in Listing 3-11.


    ```

    az login

    Listing 3-11

    azure-cli code to log in

    ```


    This command will open a web browser asking you to sign into your `Azure` account.
    Once you’ve signed in, the website will confirm this, the browser can be closed,
    and your `azure-cli` session is now authenticated. In case you have multiple subscriptions,
    make sure to set the context to the correct subscription ID using the command
    from Listing 3-12.


    ```

    az account set -s <subscriptionId>

    Listing 3-12

    azure-cli code to set the current subscription context

    ```


    To create the resource group, run the code from Listing 3-13, replacing the group
    name and location with suitable values for you. We will be using `arcBook` as
    our group’s name and `EastUS` as our location throughout this book.


    ```

    az group create --name <resourceGroupName> --location <location>

    Listing 3-13

    azure-cli code to create a resource group

    ```


    Figure 3-13 is showing how the `azure-cli` will confirm the creation of this resource
    group.


    ![](images/505695_2_En_3_Chapter/505695_2_En_3_Fig13_HTML.jpg)


    Figure 3-13


    Resource group creation confirmation


    As we’ve just created an empty resource group so far, this is not resulting in
    any charges in `Azure` yet.


    ## Summary and Key Takeaways


    In this chapter, we’ve guided you through the requirements to be fulfilled before
    starting a deployment of `Arc`-enabled `Data Services`. Now that you’re ready,
    the only thing that’s missing before we can really get started is a `Kubernetes`
    Cluster.


    # 4. Installing Kubernetes


    Given that – apart from the hardware – `Kubernetes` is the base layer of every
    `Azure Arc`-enabled `Data Services` deployment, you will need at least one `Kubernetes`
    Cluster to deploy to. Without going into too much detail, we will be showing you
    how to deploy a Cluster using a `kubeadm` (a self-installed `Kubernetes` flavor
    running on `Linux`). This is not the only option (see Chapter 2 for a list of
    supported options). The whole idea of `Azure Arc`-enabled `Data Services` is to
    be able to deploy services to any infrastructure in any cloud – but we want to
    provide you an easy option to get started. The deployment process explained in
    the following chapters is the same regardless of which target platform you choose.


    This chapter will introduce how to build a `Kubernetes` Cluster on-premises using
    virtual machines. We will begin with a discussion of the decision process of where
    to install, on-premises or in the cloud, and what to consider in that process.
    We will then go through building an on-premises, virtual machine-based `Kubernetes`
    Cluster using the `kubeadm` installation method. This Cluster will be the foundation
    for all examples in the remainder of the book.'
