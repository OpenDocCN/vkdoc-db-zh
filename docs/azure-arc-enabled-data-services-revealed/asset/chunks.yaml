- fmt: '## Removing a Deployed Managed Instance


    If you want to remove an existing deployed Managed Instance, you can do so through
    its management page in Azure Data Studio as shown in Figure [7-30](#505695_2_En_7_Chapter.xhtml#Fig30).


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig30_HTML.jpg)


    Figure 7-30


    Delete button for an existing SQL MI in ADS


    Before the instance gets deleted, you will be prompted and asked to confirm by
    typing the name of the instance (see Figure [7-31](#505695_2_En_7_Chapter.xhtml#Fig31)).


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig31_HTML.png)


    Figure 7-31


    Confirmation dialog to delete an existing SQL MI in ADS


    Alternatively, you can use another `az` command as shown in Listing [7-16](#505695_2_En_7_Chapter.xhtml#PC16).


    ```

    az sql mi-arc delete -n  -k arc --use-k8s

    Listing 7-16

    azure-cli command to delete an existing SQL MI

    ```


    This will be confirmed shortly after with a message similar to the one in Figure
    [7-32](#505695_2_En_7_Chapter.xhtml#Fig32).


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig32_HTML.jpg)


    Figure 7-32


    Output of delete command for an existing SQL MI


    Note


    When deleting an instance through the CLI, there is no additional prompt or warning.


    When deleting an instance, this will only remove its pods but not the storage
    (Persisted Volume Claims) that was used by the instance. To delete those as well,
    we must first identify the affected PVCs using `kubectl` as shown in Listing [7-17](#505695_2_En_7_Chapter.xhtml#PC17).


    ```

    kubectl get pvc -n  -l  -o name

    Listing 7-17

    kubectl command to list the PVCs of an instance based on labels

    ```


    This will return a list of the PVCs used by this instance (see Figure [7-33](#505695_2_En_7_Chapter.xhtml#Fig33)).
    This naming scheme depends on the storage provisioner in use. The ones in our
    example came from the local storage provisioner, so yours may look different if
    you’re using a different storage subsystem.


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig33_HTML.jpg)


    Figure 7-33


    List of PVCs of an instance


    Using the names of those PVCs, we can then use another `kubectl` command (see
    Listing [7-18](#505695_2_En_7_Chapter.xhtml#PC18)) to delete them.


    ```

    kubectl delete pvc -n  -l  -o name

    Listing 7-18

    kubectl command to delete a PVC based on labels

    ```


    This deletion will also be confirmed by `kubectl`, and when checking back for
    any remaining claims by this instance, we can tell from Figure [7-34](#505695_2_En_7_Chapter.xhtml#Fig34)
    that none should be left.


    ![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig34_HTML.jpg)


    Figure 7-34


    Output of check if all PVCs have been deleted


    ## Summary and Key Takeaways


    Over the course of this chapter, our ramp up building a Kubernetes Cluster and
    a Data Controller paid off as we were able to deploy and use our first actual
    Data Service in Arc using Azure Arc-enabled SQL Managed Instance.


    In the next chapter, we’ll take a look at how this process looks like when deploying
    an Azure Arc-enabled PostgreSQL Hyperscale instead.


    # 8. Deploying Azure Arc-enabled PostgreSQL Hyperscale


    While Chapter [7](#505695_2_En_7_Chapter.xhtml) was handling Azure Arc-enabled
    SQL Managed Instance, this chapter will guide us through the necessary steps when
    it comes to working with PostgreSQL Hyperscale instead.


    ## Deployment Through the Command Line


    Just like an Azure Arc-enabled SQL Managed Instance, a new PostgreSQL Hyperscale
    Server Group can be deployed through a simple `az` command like the one in Listing
    [8-1](#505695_2_En_8_Chapter.xhtml#PC1). The only required parameter is the name
    of the Server Group.


    ```

    az postgres arc-server create --name pg-1 --k8s-namespace arc --use-k8s

    Listing 8-1

    azure-cli command to create a new PostgreSQL Hyperscale Server Group

    ```


    Note


    The same logic as with SQL Managed Instance with regard to the use of direct vs.
    indirect mode and the `--use-k8s` switch applies here, too.


    Still, you have full control of the deployment’s settings through command-line
    switches if you prefer to do so, as in Listing [8-2](#505695_2_En_8_Chapter.xhtml#PC2).


    ```

    az postgres arc-server create --name pg-2 `

    --k8s-namespace arc --use-k8s `

    --storage-class-data local-storage `

    --storage-class-logs local-storage `

    --storage-class-backups local-storage `

    --workers 4 --port 5432 --engine-version 12 `

    --volume-size-data 5Gi --volume-size-logs 5Gi `

    --volume-size-backups 5Gi

    Listing 8-2

    azure-cli command to create a new PostgreSQL Hyperscale Server Group with parameters

    ```


    In either way, the `azure-cli` will prompt you for a password unless you provided
    it through the `AZDATA_PASSWORD` environment variable and then proceed with the
    deployment as shown in Figure [8-1](#505695_2_En_8_Chapter.xhtml#Fig1). Every
    PostgreSQL Hyperscale Server Group has a default administrative account username
    called `postgres`, which is not configurable.


    ![](images/505695_2_En_8_Chapter/505695_2_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Output of PostgreSQL Hyperscale Server Group deployment command


    Other than that, there is no difference compared to the deployment of a SQL Managed
    Instance.


    The Control Node and the Worker Nodes show up as individual Pods using `kubectl`
    (see Figure [8-2](#505695_2_En_8_Chapter.xhtml#Fig2)). These Nodes are independent
    from the Kubernetes Nodes!


    ![](images/505695_2_En_8_Chapter/505695_2_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Postgres Pods


    ## Deployment Through Azure Data Studio


    Of course, deployment through Azure Data Studio is also an option again. In the
    wizard as shown in Figure [8-3](#505695_2_En_8_Chapter.xhtml#Fig3), simply pick
    the PostgreSQL option instead.


    ![](images/505695_2_En_8_Chapter/505695_2_En_8_Fig3_HTML.png)


    Figure 8-3


    Instance deployment wizard in ADS


    The following screen will check for the prerequisites again, followed by (see
    Figure [8-4](#505695_2_En_8_Chapter.xhtml#Fig4)) collecting the PostgreSQL Hyperscale
    Server Group-specific settings. Just like when deploying our SQL Managed Instance
    before, we will need to provide a name for this PostgreSQL Hyperscale Server Group
    and a password. The username is defaulted to `postgres`, so this setting won’t
    be required. A PostgreSQL Hyperscale Server Group requires you to provide the
    number of workers. It is defaulted to 0 which would deploy a one-Node PostgreSQL
    Hyperscale Server Group, the TCP Port, as well as your Storage Classes, storage
    sizes, and CPU and memory requests and limits. As we’ve mentioned in Chapter [1](#505695_2_En_1_Chapter.xhtml),
    these settings will define on how many resources this specific deployment will
    allocate on your Kubernetes Cluster.


    ![](images/505695_2_En_8_Chapter/505695_2_En_8_Fig4_HTML.png)


    Figure 8-4


    Postgres-specific settings


    This will result in the option of deploying this right away or to create a notebook
    which, when run, will create the new server group.'
