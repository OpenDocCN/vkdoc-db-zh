    \ N'AdventureWorks2017' TO N'/var/opt/mssql/data/AdventureWorks2019.mdf',  MOVE\
    \ N'AdventureWorks2017_log' TO N'/var/opt/mssql/data-log/AdventureWorks2019_log.ldf',\
    \  NOUNLOAD,  STATS = 5\"\nListing 7-12\nCode to run sqlcmd within a container\
    \ to restore a database from backup\n```\n\nYou could also connect to the instance\
    \ in Azure Data Studio and use the restore wizard or any other tool that can connect\
    \ to a SQL endpoint.\n\nNote\n\nWhen connecting to a SQL Server with a different\
    \ port than the default, when copying the endpoint, make sure to use a comma rather\
    \ than a colon to separate the IP address and the port.\n\nOne other option would\
    \ of course also be to restore the database from an Azure Blob Storage using the\
    \ RESTORE FROM URL command. What you could do in addition to that would be to\
    \ add another Persistent Volume that can be an external share or a dedicated backup\
    \ disk which especially makes sense for larger backup and restore operations without\
    \ bloating the containers storage or having to copy backups around.\n\n### Managed\
    \ Backup and Restore\n\nEvery Azure Arc-enabled SQL Managed Instance comes with\
    \ a built-in automatic backup feature which is enabled by default. This means\
    \ that every single database that gets created or restored will automatically\
    \ receive an initial full backup followed by scheduled differential and transaction\
    \ log backups. This concept is very similar to the managed backup in an Azure\
    \ SQL Managed Instance and allows you to perform a point-in-time restore to any\
    \ specific timestamp within your retention period.\n\nA restore will always be\
    \ performed into a new database.\n\nAt the time of writing, full backups are taken\
    \ once a week, differential backups are taken every 12 hours, and transaction\
    \ log backups every 5 minutes with these settings not being configurable.\n\n\
    While all backup settings can be found and controlled through both the azure-cli\
    \ as well as native Kubernetes tools, the easiest way to get started is the backup\
    \ section of the instance’s settings in Azure Data Studio as shown in Figure [7-24](#505695_2_En_7_Chapter.xhtml#Fig24).\n\
    \n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig24_HTML.png)\n\nFigure 7-24\n\
    \nBackup settings\n\nFrom there, you can change the retention time (Figure [7-25](#505695_2_En_7_Chapter.xhtml#Fig25))\
    \ for point-in-time recovery backups from its default (7 days) to anything from\
    \ 1 to 35 days. Backup files older than the configured retention period are automatically\
    \ deleted.\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig25_HTML.jpg)\n\
    \nFigure 7-25\n\nConfigure retention policy\n\nChanging the retention time to\
    \ zero disables managed backups on this instance.\n\nYou could also adjust that\
    \ setting by editing the instance’s YAML manifest or by specifying the *--retention-days*\
    \ property in the azure-cli.\n\nYou can also use Azure Data Studio or any of the\
    \ other tools to trigger a restore (see Figure [7-26](#505695_2_En_7_Chapter.xhtml#Fig26)).\n\
    \n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig26_HTML.png)\n\nFigure 7-26\n\
    \nRestore Database in Azure Data Studio\n\nA restore requires a source database,\
    \ destination database, and the restore point (timestamp).\n\nAlternatively, you\
    \ could, for example, also use the azure-cli and a command similar to the one\
    \ in Listing [7-13](#505695_2_En_7_Chapter.xhtml#PC13) to restore your backup.\n\
    \n```\naz sql midb-arc restore --managed-instance  --name  --dest-name  --k8s-namespace\
    \  --time \"YYYY-MM-DDTHH:MM:SSZ\" --use-k8s\nListing 7-13\nazure-cli command\
    \ to restore a database from a point-in-time backup\n```\n\nThe target MI must\
    \ exist before running a restore. When you delete an Azure Arc SQL Managed Instance,\
    \ the backup history will be kept until its retention period has elapsed. The\
    \ output of the previous listing should look similar to the one in Figure [7-27](#505695_2_En_7_Chapter.xhtml#Fig27).\
    \ The important part is the state. If this doesn’t show *Completed*, something\
    \ went wrong with your restore.\n\n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig27_HTML.jpg)\n\
    \nFigure 7-27\n\nOutput of azure-cli command to restore a database\n\nYou can\
    \ get an overview of all the restore tasks in your Namespace by running the command\
    \ shown in Listing [7-14](#505695_2_En_7_Chapter.xhtml#PC14).\n\n```\nkubectl\
    \ get sqlmirestoretask -n arc\nListing 7-14\nkubectl command to list all SQL MI\
    \ Restore Tasks in a Namespace\n```\n\nIf everything worked fine, the task should\
    \ appear with a status of completed as illustrated in the example in Figure [7-28](#505695_2_En_7_Chapter.xhtml#Fig28).\n\
    \n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig28_HTML.jpg)\n\nFigure 7-28\n\
    \nStatus of a SQL MI Restore Task\n\nTo retrieve more details, especially in the\
    \ case of a failed restore task, you can use the command in Listing [7-15](#505695_2_En_7_Chapter.xhtml#PC15)\
    \ to describe the task and analyze what made it fail.\n\n```\nkubectl describe\
    \ sqlmirestoretask  -n \nListing 7-15\nkubectl command to describe a SQL MI Restore\
    \ Task\n```\n\nOf course, the restored database also becomes visible in Azure\
    \ Data Studio as visible in Figure [7-29](#505695_2_En_7_Chapter.xhtml#Fig29).\n\
    \n![](images/505695_2_En_7_Chapter/505695_2_En_7_Fig29_HTML.jpg)\n\nFigure 7-29\n\
    \nRestored Database showing up in Azure Data Studio\n\nA restore task could of\
    \ course also be created through native Kubernetes tools just like you could also\
    \ adjust settings like the retention policy from there."
  trans: '

    ### 在实例中还原备份文件


    如果你希望从命令行进行还原，可以直接在客户端使用类似 `sqlcmd` 的工具，或者再次使用 `kubectl` 在 SQL 实例上直接运行 `sqlcmd`，如清单
    7-12 所示。


    ```

    kubectl exec mi-1-0 -n arc -c arc-sqlmi -- /opt/mssql-tools/bin/sqlcmd -S localhost
    -U arcadmin -P "P@ssw0rd" -Q "RESTORE DATABASE [AdventureWorks2019] FROM  DISK
    = N''/var/opt/mssql/data/AdventureWorks2019.bak'' WITH  FILE = 1,  MOVE N''AdventureWorks2017''
    TO N''/var/opt/mssql/data/AdventureWorks2019.mdf'',  MOVE N''AdventureWorks2017_log''
    TO N''/var/opt/mssql/data-log/AdventureWorks2019_log.ldf'',  NOUNLOAD,  STATS
    = 5"

    ```

    清单 7-12

    在容器内运行 sqlcmd 以从备份还原数据库的代码


    你也可以连接到 Azure Data Studio 中的实例，并使用还原向导或任何其他可以连接到 SQL 端点的工具。


    **注意**

    当连接到使用非默认端口的 SQL Server 时，在复制端点信息，请确保使用**逗号**而不是冒号来分隔 IP 地址和端口。


    当然，另一个选择是使用 `RESTORE FROM URL` 命令从 Azure Blob 存储还原数据库。除此之外，你还可以添加一个持久卷，它可以是一个外部共享或专用的备份磁盘，这对于较大的备份和还原操作尤其有意义，可以避免使容器存储膨胀或需要四处复制备份文件。


    ### 托管备份与还原


    每个启用 Azure Arc 的 SQL 托管实例都附带一个内置的自动备份功能，默认启用。这意味着每个创建或还原的数据库都将自动接收一个初始完整备份，然后是按计划进行的差异备份和事务日志备份。这个概念与
    Azure SQL 托管实例中的托管备份非常相似，允许你在保留期内的任何特定时间点执行时间点还原。


    还原操作将始终执行到一个新的数据库中。


    在撰写本文时，完整备份每周进行一次，差异备份每 12 小时进行一次，事务日志备份每 5 分钟进行一次，这些设置不可配置。


    虽然所有备份设置都可以通过 `azure-cli` 和原生 Kubernetes 工具找到并控制，但最简单的入门方法是使用 Azure Data Studio
    中实例设置的备份部分，如图 7-24 所示。


    ![](img/505695_2_En_7_Fig24_HTML.png)

    图 7-24

    备份设置


    从那里，你可以更改时间点恢复备份的保留时间（图 7-25），从其默认值（7 天）更改为 1 到 35 天之间的任何值。超过配置保留期的备份文件将被自动删除。


    ![](img/505695_2_En_7_Fig25_HTML.jpg)

    图 7-25

    配置保留策略


    将保留时间更改为零将禁用此实例上的托管备份。


    你也可以通过编辑实例的 YAML 清单或在 `azure-cli` 中指定 `--retention-days` 属性来调整该设置。


    你还可以使用 Azure Data Studio 或其他任何工具来触发还原（参见图 7-26）。


    ![](img/505695_2_En_7_Fig26_HTML.png)

    图 7-26

    在 Azure Data Studio 中还原数据库


    还原操作需要指定源数据库、目标数据库和还原点（时间戳）。


    或者，你也可以使用 `azure-cli` 和类似于清单 7-13 中的命令来还原备份。


    ```

    az sql midb-arc restore --managed-instance  --name  --dest-name  --k8s-namespace  --time
    "YYYY-MM-DDTHH:MM:SSZ" --use-k8s

    ```

    清单 7-13

    用于从时间点备份还原数据库的 azure-cli 命令


    目标 MI 在运行还原之前必须存在。当你删除一个 Azure Arc SQL 托管实例时，备份历史记录将被保留，直到其保留期届满。清单 7-13 的输出应类似于图
    7-27 中的内容。重要的部分是状态。如果此处未显示 `Completed`，则表示还原操作出现问题。


    ![](img/505695_2_En_7_Fig27_HTML.jpg)

    图 7-27

    用于还原数据库的 azure-cli 命令的输出


    你可以通过运行清单 7-14 所示的命令，获取命名空间中所有还原任务的概览。


    ```

    kubectl get sqlmirestoretask -n arc

    ```

    清单 7-14

    用于列出命名空间中所有 SQL MI 还原任务的 kubectl 命令


    如果一切顺利，任务应以“已完成”状态显示，如图 7-28 中的示例所示。


    ![](img/505695_2_En_7_Fig28_HTML.jpg)

    图 7-28

    SQL MI 还原任务的状态


    要获取更多详细信息，尤其是在还原任务失败的情况下，你可以使用清单 7-15 中的命令来描述任务并分析失败原因。


    ```

    kubectl describe sqlmirestoretask  -n

    ```

    清单 7-15

    用于描述 SQL MI 还原任务的 kubectl 命令


    当然，还原后的数据库也会在 Azure Data Studio 中可见，如图 7-29 所示。


    ![](img/505695_2_En_7_Fig29_HTML.jpg)

    图 7-29

    在 Azure Data Studio 中显示的已还原数据库


    当然，也可以通过原生 Kubernetes 工具创建还原任务，就像你也可以从那里调整保留策略等设置一样。

