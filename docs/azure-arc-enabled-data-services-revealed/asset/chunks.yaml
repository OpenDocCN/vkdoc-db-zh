    的状态变为`Pending`，并且 Pod 不会启动。


    另一个可能影响调度的因素是管理策略。Kubernetes 为集群管理员和应用程序开发人员提供了多种工具来影响 Pod 到集群节点的调度。如果`Scheduler`无法根据定义的管理策略找到合适的节点来启动
    Pod，Pod 的状态会变为`Pending`，并且 Pod 不会启动。让我们仔细看看集群管理员和开发人员可以用来影响 Pod 调度的几种工具；首先是*请求*。


