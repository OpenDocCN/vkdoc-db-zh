  trans: '

    ## Azure Arc 简介


    从核心上讲，Microsoft Azure Arc 无论您是在本地还是在任何云中部署了资源，都能提供 Azure 管理服务。它使您能够为组织的核心运营提供一致的管理服务和工具，无论技术架构部署在何处。让我们来看看
    Azure Arc 的核心功能：


    **本地和混合云的统一体验**：您可以使用熟悉的工具，如 `Azure 门户`、`azure-cli`、`PowerShell` 和 `REST API`
    来管理和部署系统。


    **部署和运维**：借助一套统一的工具，无论您在何处部署（本地或任何云中），部署和运维都是一致的。统一的工具使您的组织能够在任何部署场景中使用相同的代码和工具。运维的一个关键要素是性能和可用性监控，而
    `Azure Monitor` 可帮助您为启用了 `Azure Arc` 的资源实现这一点。


    **整合的访问控制、安全性、策略管理和日志记录**：根据资源部署位置实施多个安全模型具有挑战性和风险，因为您可能需要管理多套安全规则及其实施。`Azure
    Arc` 使您能够拥有一个整合的安全模型和实施，并使用 `Azure Log Analytics` 等工具进行集中式安全和应用程序日志记录。此外，您还可以使用
    `Azure Policy` 等服务来管理治理和控制解决方案。


    **清单和组织**：借助一套可用的工具以及关键的 `Azure` 构造（如 `资源组`、`订阅` 和 `标记`），管理员、运维人员和技术经理可以完整地查看其技术资产，而无论系统部署在何处。因为作为服务的资源和资源会被注册为
    `Azure` 中的托管资源，无论它们部署在本地还是任何云中。


    既然我们已经向您介绍了 `Azure Arc` 的核心功能，是时候继续前进，更详细地了解您可以使用 `Azure Arc` 管理和部署的资源了。


    ### Azure Arc 支持的资源


    本书的重点是 `Azure Arc` 支持的数据服务。`Azure Arc` 支持的数据服务是一项更广泛战略的一部分，该战略提供了一个控制平面，用于管理部署在任何地方（本地或任何云中）的资源。`Azure
    Arc` 通过将 `Azure 资源管理器 (ARM)` 扩展到这些资源来实现这一目标。`ARM` 是在 `Azure` 公有云中使用的管理控制平面。`ARM`
    为部署在 `Azure` 云中的资源提供部署、组织和访问控制。`Azure Arc` 将 `ARM` 扩展到您部署资源的任何地方，无论是本地还是任何云中。在撰写本书时，有四种关键资源可以由
    `Azure Arc` 管理：`Azure Arc 支持的服务器`、`Azure Arc 支持的 Kubernetes`、`Azure Arc 支持的 SQL
    Server` 和 `Azure Arc 支持的数据服务`。图 2-1 介绍了 `Azure Arc` 的元素；让我们更详细地了解这些核心服务中的每一项。


    ![](img/505695_2_En_2_Fig1_HTML.jpg)


    图 2-1 `Azure Arc` 架构


    #### Azure Arc 支持的服务器


    `Azure Arc 支持的服务器` 为部署在 `Azure` 外部的物理机和虚拟机 (VM) 上的 `Windows` 和 `Linux` 操作系统提供管理功能。服务器使用本地安装的代理连接到
    `Azure`，并成为使用标准 `Azure` 工具和管理服务进行管理的资源。`Azure Arc 支持的服务器` 的核心管理功能包括清单管理、策略管理、部署自动化、配置管理、性能监控、安全和访问控制、集中式日志记录以及更新管理。有关
    `Azure Arc 支持的服务器` 的更多信息，请访问 `https://docs.microsoft.com/zh-cn/azure/azure-arc/servers/overview`。


    #### Azure Arc 支持的 Kubernetes


    `Kubernetes` 是部署企业级容器化应用程序的标准。`Azure Arc 支持的 Kubernetes` 使您可以管理云原生计算基金会 (`CNCF`)
    认证的 `Kubernetes` 集群，无论它们部署在何处，包括上游 `Kubernetes`、`RedHat OpenShift`、`AWS EKS`、`Google
    GKE` 等。`Azure Arc 支持的 Kubernetes` 的关键管理功能包括清单管理、策略管理、集中式日志记录、性能监控、应用程序部署和集群配置。


    `Azure Arc 支持的 Kubernetes` 支持的一个关键场景是基于 `GitOps` 的配置管理。`GitOps` 通过使用基于 `GitOps`
    的配置管理来实现应用程序部署和集群配置。配置构件被签入到 `Git` 存储库中，`Arc` 集群代理监控该 `Git` 存储库以查找配置变更。当配置被签入存储库时，集群代理将在本地的
    `Kubernetes` 集群中部署该变更。这实现了强大的配置管理，因为所有配置构件（包括集群配置和应用程序部署）都被签入存储库并进行源代码控制。可以围绕源代码控制系统构建测试、审查和审批工作流程。如果集群偏离了签入存储库的内容，签入的配置将被强制应用到集群，使其恢复到期望状态。


    请访问 `https://docs.microsoft.com/zh-cn/azure/azure-arc/kubernetes/overview` 了解更多信息和支持的
    `Kubernetes` 发行版。


    #### Azure Arc 支持的 SQL Server


    我们要介绍的下一项 `Azure Arc` 支持的服务是 `Azure Arc 支持的 SQL Server`。`Azure Arc 支持的 SQL Server`
    使您可以将 `Azure` 管理服务扩展到部署在任何地方（本地或任何云中）的 `SQL Server` 实例。在 `SQL Server` 实例上安装一个代理，然后该
    `SQL Server` 会在 `Azure` 中注册。随后，使用标准的 `Azure` 工具和管理服务来管理该 `SQL Server` 实例。核心管理功能包括清单管理、策略管理、集中式日志记录、安全性，以及通过
    `Azure 安全中心` 和 `Azure Sentinel` 等服务实现威胁防护。


    此外，在 `Azure Arc 支持的 SQL Server` 中，使用 `SQL 评估` 实施环境检查。`SQL 评估` 是一套行业标准的最佳实践集合，可用于评估和报告
    `SQL Server` 实例或一组 `SQL Server` 实例的整体环境运行状况。`Azure Arc 支持的 SQL Server` 与 `Azure
    Arc 支持的服务器` 相结合，可以为您提供丰富的 `SQL Server` 及底层操作系统的管理体验。有关 `Azure Arc 支持的 SQL Server`
    的更多信息，请访问 `https://docs.microsoft.com/zh-cn/sql/sql-server/azure-arc/overview`。


    我们想特别指出，`Azure Arc 支持的 SQL Server` 和 `Azure Arc 支持的数据服务` 是 `Azure Arc` 旗下的独特产品。`Azure
    Arc 支持的 SQL Server` 将 `Azure` 管理服务扩展到已安装的 `SQL Server` 实例的传统部署。`Azure Arc 支持的数据服务`
    使您能够在本地或任何云中部署基于 `Azure 平台即服务 (PaaS)` 的服务。

    '
- fmt: '#### Azure Arc-enabled Data Services


    最后但同样重要，并且很可能是您阅读本书的原因，便是Azure Arc-enabled Data Services。Azure Arc-enabled Data
    Services为您提供了在本地或任何云中部署传统基于Azure平台即服务（PaaS）的服务的能力。数据服务提供的价值在于其始终保持最新的部署模型，无论您需要在哪里部署，都能为您交付最新、安全且受支持的Azure
    PaaS数据服务版本。在本书撰写时可用的数据服务包括`Azure Arc-enabled SQL Managed Instance`和`Azure Arc-enabled
    PostgreSQL Hyperscale`。Azure Arc-enabled Data Services的其他功能包括弹性扩展、自助式供应、清单管理、部署自动化、更新管理、托管备份、安全性、性能监控和集中式日志记录。Azure
    Arc-enabled Data Services是本书的核心重点，我们将在本书的剩余部分深入探讨其核心功能。


    ### 工具


    到目前为止，我们一直关注Azure Arc如何管理资源，无论它们位于何处。现在，是时候关注您可以用来管理资源的工具了。首先，我们将介绍Azure工具，例如Azure门户、`azure-cli`、PowerShell和Azure
    Data Studio。然而，Microsoft的方法确保您在用于管理云和开发者体验的工具上有选择权。因此，您可以使用项目中可能已经在用的行业标准、开源工具。然后，我们将介绍如何使用应用程序原生工具来管理部署在Azure
    Arc中的应用程序和服务。


    #### Azure工具


    Azure Arc试图解决的一个关键挑战是一致的工具集。Azure Arc将Azure资源管理器扩展到您部署资源的任何地方，无论是本地还是任何云。由于ARM可用，这使您能够使用在Azure公有云中习惯使用的标准Azure工具。让我们列举一下您将在Azure
    Arc和Azure Arc-enabled Data Services中最常用的一些Azure工具：


    *   **Azure门户**：Azure管理体验的核心是Azure门户。由Azure和Azure Arc注册和管理的资源将出现在Azure门户中。Azure门户将是管理Arc启用的资源的主要方式。您可以在各种Azure管理服务（如Log
    Analytics、Monitor、Sentinel、Security Center等）中查看在Azure门户中收集和公开的信息。更多信息，请访问[`https://portal.azure.com`](https://portal.azure.com)。


    *   **`azure-cli`**：`azure-cli`是用于部署和管理启用Azure资源管理器（ARM）的资源（包括Azure Arc-enabled
    Data Service）的命令行界面。更多信息，请访问[`https://docs.microsoft.com/en-us/cli/azure/install-azure-cli`](https://docs.microsoft.com/en-us/cli/azure/install-azure-cli)。


    *   **Azure PowerShell**：Azure PowerShell模块（Az模块）是用于管理启用Azure资源管理器（ARM）的资源的PowerShell模块。更多信息，请访问[`https://docs.microsoft.com/en-us/powershell/azure/new-azureps-module-az`](https://docs.microsoft.com/en-us/powershell/azure/new-azureps-module-az)。


    *   **Azure Data Studio (ADS)**：这是一个跨平台工具，为一系列Azure数据服务提供现代化体验。在ADS中，您可以找到用于Azure
    Arc-enabled Data Services和SQL Server大数据群集的部署和管理体验。此外，您还会找到一个带有内置Git源代码控制集成的SQL
    Server代码编辑器。更多信息，请访问[`https://docs.microsoft.com/en-us/sql/azure-data-studio/`](https://docs.microsoft.com/en-us/sql/azure-data-studio/)。


    #### 原生工具


    Azure Arc的一个主要目标是统一管理和工具，使您的组织能够获得更好的云体验。需要注意的是，您仍然可以使用当前的开发者体验以及今天用于管理云的工具。因此，如果您已有现有的部署管道，这也没问题；您仍然可以在Azure
    Arc-enabled Data Services中使用它们。将如何管理工作负载的选择权留给您。我们想花点时间列举一些您可能已经用于管理环境的工具。这些工具（以及其他一些）构成了现代部署管道的基础：


    *   **`kubectl/oc`**：这些是用于控制Kubernetes和RedHat OpenShift集群的主要命令行工具。


    *   **`helm`**：这是一个使用称为`helm`图表的预配置模板来定义如何在Kubernetes中部署复杂应用程序的工具。


    *   **Git/GitHub**：Git已成为管理源代码的标准方式。Azure Arc设计的关键是使您能够将现有工具用于部署管道，这意味着您仍然能够使用现有的代码管理和部署体验。


    *   **GitOps**：如前面介绍的，GitOps使您能够将集群和应用程序部署状态作为配置工件存储在Git存储库中。Kubernetes集群监控存储库的更改，并在集群中应用这些更改以维护系统的期望状态。


    *   在Azure Arc-enabled Data Services中可用的数据服务是SQL Managed Instance和PostgreSQL Hyperscale。使用Azure原生工具部署时，您将使用适当的门户体验或命令行语法来创建和管理数据服务部署。这些体验将在本书的剩余部分详细介绍。


    *   对于使用Kubernetes原生工具部署和管理工作负载的数据服务，SQL Server工程团队采用云原生方法，并为每个Azure Arc-enabled
    Data Services、数据控制器本身以及诸如数据库恢复操作等管理任务创建了自定义资源定义。自定义资源定义是Kubernetes的一个结构，允许开发人员扩展Kubernetes
    API并创建自定义API对象。自定义资源定义可以具有额外的配置、数据，甚至控制集群中对象的行为。因此，当使用Kubernetes原生工具定义工作负载时，会使用这些自定义资源定义API对象。既然我们已经介绍了用于部署的工具，让我们继续更仔细地看看可以部署的Azure
    Arc-enabled Data Services。


    ## 介绍Azure Arc-enabled Data Services


    在本节中，我们将首先介绍Azure Arc-enabled Data Services架构。接下来，我们将介绍可用的基于PaaS的数据服务，特别是SQL Managed
    Instance和PostgreSQL Hyperscale。然后，作为本节的结尾，我们将介绍在设计专注于计算和存储资源的解决方案时的部署技术和部署注意事项。'
  raw: '#### Azure Arc-enabled Data Services


    Last but not least and the likely reason you’re reading this book is Azure Arc-enabled
    Data Services. Azure Arc-enabled Data Services provide you the ability to deploy
    traditionally Azure Platform as a Service (PaaS)-based services on-premises or
    in any cloud. The value that data services provide is an always current deployment
    model delivering to you the most up-to-date, secure, and supported versions of
    Azure PaaS Data Services wherever you need to deploy. The data services available
    at the time of this book writing include *Azure Arc-enabled SQL Managed Instance*
    and *Azure Arc-enabled PostgreSQL Hyperscale*. Additional capabilities of Azure
    Arc-enabled Data Services include elastic scale, self-service provisioning, inventory
    management, deployment automation, update management, managed backups, security,
    performance monitoring, and centralized logging. Azure Arc-enabled Data Services
    are the core focus of this book, and we will dig into the core functions throughout
    the remainder of this book.


    ### Tooling


    So far, we have focused on how Azure Arc can manage resources wherever they are.
    Now it’s time to focus on the tools that you can use to manage resources. First,
    we will introduce Azure tools, such as the Azure Portal, azure-cli, PowerShell,
    and Azure Data Studio. However, Microsoft''s approach ensures that you have a
    choice in the tools you can use to manage your cloud and developer experience.
    So, industry-standard, open source tools that you maybe are already using in your
    projects. We will then introduce how application native tools can be used to manage
    applications and services deployed in Azure Arc.


    #### Azure Tools


    One of the key challenges Azure Arc attempts to solve is consistent tooling. Azure
    Arc extends Azure Resource Manager to wherever your resources are deployed, on-premises
    or in any cloud. Since ARM is available, this enables you to use the standard
    Azure tools you are used to using in the Azure Public Cloud. Let’s walk through
    a listing of the most common Azure tools you will use in Azure Arc and Azure Arc-enabled
    Data Services:


    *   **Azure Portal**: Key to the Azure management experience is the Azure Portal.
    Resources that are registered and managed by Azure and Azure Arc will appear in
    the Azure Portal. The Azure Portal will be a primary way to manage your Arc-enabled
    resources. You can view information collected and exposed in the Azure Portal
    in the various Azure management services such as Log Analytics, Monitor, Sentinel,
    Security Center, and more. For more information, visit [*https://portal.azure.com*](https://portal.azure.com).


    *   **azure-cli**: azure-cli is the command-line interface to deploy and manage
    Azure Resource Manager (ARM)-enabled resources including Azure Arc-enabled Data
    Service. For more information, visit [*https://docs.microsoft.com/en-us/cli/azure/install-azure-cli*](https://docs.microsoft.com/en-us/cli/azure/install-azure-cli).


    *   **Azure PowerShell**: The Azure PowerShell Module (Az Module) is a PowerShell
    module used to manage Azure Resource Manager (ARM)-enabled resources. For more
    information, visit [*https://docs.microsoft.com/en-us/powershell/azure/new-azureps-module-az*](https://docs.microsoft.com/en-us/powershell/azure/new-azureps-module-az).


    *   **Azure Data Studio (ADS)**: This is the cross-platform tool providing modernized
    experiences across an array of Azure Data Services. In ADS, you will find deployment
    and management experiences for both Azure Arc-enabled Data Services and SQL Server
    Big Data Clusters. Additionally, you will find a SQL Server code editor with built-in
    source control integration using Git. For more information, visit [*https://docs.microsoft.com/en-us/sql/azure-data-studio/*](https://docs.microsoft.com/en-us/sql/azure-data-studio/).


    #### Native Tools


    A primary goal of Azure Arc is to homogenize the management and tools enabling
    your organization to have a better cloud experience. Important to note is that
    you can still use your current developer experiences as well as the tools you
    are using today to manage your cloud. So, if you have existing deployment pipelines
    in place, this is OK; you can still use those in Azure Arc-enabled Data Services.
    Leaving the choice in how you want to manage your workloads up to you. We want
    to take a second to call out tools you may already use to manage your environments.
    These tools, among others, form the foundation of modern deployment pipelines:


    *   **kubectl/oc**: These are the primary command-line tools for controlling Kubernetes
    and RedHat OpenShift Clusters.


    *   **helm**: This is a tool for defining how to deploy complex applications in
    Kubernetes using pre-configured templates called helm charts.


    *   **Git/GitHub**: Git has become a standard way to manage source code. Key to
    the design of Azure Arc is enabling you to use your existing tools for your deployment
    pipelines which means you are still able to use your existing code management
    and deployment experiences.


    *   **GitOps**: As introduced earlier, GitOps enables you to store your Cluster
    and application deployment state as configuration artifacts in a Git repository.
    Kubernetes Clusters monitor the repository for changes and affect those changes
    in the Cluster to maintain the system''s desired state.


    *   The data services available in Azure Arc-enabled Data Services are SQL Managed
    Instance and PostgreSQL Hyperscale. When deploying with Azure Native Tools, you
    will use the appropriate portal experiences or command-line syntax to create and
    manage data services deployments. These experiences are covered in great detail
    throughout the remainder of the book.


    *   For deploying and managing data services workloads with Kubernetes native
    tools, the SQL Server Engineering Team has taken a cloud-native approach and created
    Custom Resource Definitions for each of the Azure Arc-enabled Data Services, the
    Data Controller itself, and management tasks such as database restore operations.
    A Custom Resource Definition is a Kubernetes construct that allows developers
    to extend the Kubernetes API and create custom API Objects. Custom Resource Definitions
    can have additional configuration, data, or even controlling the behavior of the
    object in the Cluster. So, when defining workloads using Kubernetes native tooling,
    these Custom Resource Definition API Objects are used. Now that we have covered
    the tools used for deployment, let’s move on and look more closely at the Azure
    Arc-enabled Data Services that can be deployed.


    ## Introducing Azure Arc-enabled Data Services


    In this section, we will begin by introducing the Azure Arc-enabled Data Services
    Architecture. Then next, we’ll introduce the PaaS-based Data Services available,
    specifically SQL Managed Instance and PostgreSQL Hyperscale. Then to close out
    this section, we will introduce the deployment techniques and deployment considerations
    when designing a solution focusing on compute and storage resources.'
