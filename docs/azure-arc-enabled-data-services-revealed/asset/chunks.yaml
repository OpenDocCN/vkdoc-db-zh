    ## 献词


    ### 献给 Franzie 和 Gwendolyn

    — Ben


    ### 献给我的家人

    — Anthony


    ## 前言


    当我开始 IT 职业生涯时，我们在物理服务器上运行应用程序和数据库。头几年，我们转向了虚拟化，这是一次伴随着诸多变革的根本性转变。当时的巨大转变如今已变得司空见惯——甚至成了常态。


    如今，正在发生另一次范式转变——向容器化的迁移。我在开发者构建的新应用程序中看到了这一点，他们渴望获得跨基础设施的轻量级、可重复部署。这也正在影响数据领域，因为这些开发者希望他们容器化的应用程序能连接到同样轻量级且易于部署的数据源。


    这种转变给数据专业人士带来了新的挑战——在容器化的世界中，随着公司快速采用一个或多个云，你如何确保跨这些环境的数据服务的安全、管理和监控？多年来，微软一直在并行推进两条路线：首先是将
    SQL Server 引入 Linux 和容器，其次是使 Azure SQL Database 成为世界上最好的基于云的操作数据库。现在，这两条道路已通过
    Azure Arc-enabled Data Services 合并，它允许你在你选择的 Kubernetes 发行版上、在你选择的基础设施中，运行 Azure
    平台即服务的数据服务。


    我很高兴两位专家通力合作，为您带来这本书，旨在让您尽快开始使用 Azure Arc-enabled Data Services。他们理解这一新范式带来的挑战，并将其分解为易于理解的知识块。


    我第一次看到 Anthony Nocentino 演讲是在 2020 年俄亥俄州克利夫兰的 SQLSaturday 活动上——那是我在疫情前参加的最后一次线下活动。那时我正深入研究
    SQL Server on Linux 和容器的世界，很想听听他对容器的看法。他的深厚知识和演讲风格让我欣喜。


    我第一次看到 Ben Weissman 演讲时很遗憾是在线的，因为我们相隔一片大洋。他当时在谈论一种我从第一次听说就为之着迷的技术——SQL Server
    Big Data Clusters。Ben 对这项技术充满热情，讲解通俗易懂，而且风趣随和。


    借此，我希望您能像我一样，享受学习和使用这项技术的乐趣！我迫不及待想听到您的故事，讲述您如何使用 Azure Arc-enabled Data Services，以及它们如何使您作为一名
    IT 专业人士能做更多事情！


    — Jes Schultz

    Azure Arc-enabled Data Services 项目经理


    ## 引言


    当我们最初讨论撰写一本关于 Azure Arc-enabled Data Services 的书时，该产品尚处于早期私有预览阶段。我们都非常兴奋地看到 Azure
    Arc-enabled Data Services 作为一个产品即将成为的样子：这正是所有近期引入的技术——如 SQL on Linux 和 SQL on
    Kubernetes——汇聚的地方。这就是微软做这一切的缘由的答案。


    但即使没有那个背景，我们都看到了 Azure Arc-enabled Data Services 将要提供的巨大价值。企业在云采用方面面临的一个巨大挑战是被锁定在供应商的基础设施中。锁定在某个软件中是可以接受的——老实说，例如从你选择一个数据库平台的那一刻起，这基本上就一直是情况——但基础设施则是另一回事。你可能只是无法或不愿意迁移到公有云，或者可能已经投资于其他云提供商的基础设施。通过
    Azure Arc（包括 Azure Arc-enabled Data Services），我们现在能够将这些以前仅对微软 Azure 云可用的解决方案，部署到任何云、任何基础设施上！


    对我们来说，显而易见的是，随着 Azure Arc-enabled Data Services 正式发布，我们必须更新这本书，并添加自本书第一版以来加入该产品的所有新功能。


    本书将向您介绍 Azure Arc-enabled Data Services 及其提供的强大功能。您将学习如何从 Azure 提供的集中式管理、补丁和更新的自动滚动推出等功能中受益。


    本书是任何为其数据资产寻找混合或多供应商云策略的人的完美选择。我们将逐步引导您了解将诸如 Azure SQL Managed Instance 或 PostgreSQL
    Hyperscale 等服务部署到 Azure 之外的可能性和要求，使它们能够为那些无法迁移到云或不想完全使用微软云的公司所用。本书所描述的技术对于那些被要求将敏感服务（如医疗数据库）远离公有云，但仍希望受益于
    Azure 云及其所支持的集中式管理的人员尤其有用。'
- fmt: '# Book Layout


    我们将本书分为九个独立的章节，它们将循序渐进地为你描绘出 Azure Arc-enabled Data Services 的全貌：


    *   第 1 章，“Kubernetes 入门”：Kubernetes 是每个 Azure Arc-enabled Data Services 安装的架构支柱。本章介绍
    Kubernetes，描述其在现代应用程序部署中的角色、提供的优势及其架构。

    *   第 2 章，“Azure Arc-enabled Data Services”：本章将向你介绍 Azure Arc-enabled Data Services！我们将介绍核心的
    Azure Arc-enabled 资源，包括服务器、Kubernetes、SQL Server 和 Data Services。然后我们将深入探讨 Azure
    Arc-enabled Data Services 是什么、其架构、工作负载如何部署和管理，并讨论关键的部署注意事项，如计算和存储容量规划。

    *   第 3 章，“为部署做准备”：在本章中，我们将引导你完成在开始部署你自己的 Azure Arc-enabled Data Services 之前需要处理的必要步骤。

    *   第 4 章，“安装 Kubernetes”：在本章中，我们将指导你完成 Kubernetes 集群的设置过程，这是部署 Azure Arc-enabled
    Data Services 所必需的。

    *   第 5 章，“在间接模式下部署数据控制器”：接下来，我们将指导你完成所需的操作——无论是使用图形用户界面还是命令行——以在你的 Kubernetes
    集群中部署一个不持续连接到 Azure 云的 Azure Arc-enabled 数据控制器。

    *   第 6 章，“在直接模式下部署数据控制器”：在本章中，我们将指导你如何将数据控制器部署到连接到 Azure 云的 Kubernetes 集群中——我们甚至会向你展示如何从
    Azure 门户进行部署。

    *   第 7 章，“部署 Azure Arc-enabled SQL 托管实例”：随着我们的数据控制器准备就绪，我们现在可以继续开始部署第一个数据库实例，以便我们可以开始使用我们的
    Arc 实例。与数据控制器的部署类似，我们可以直接使用命令行和 `azure-cli`，或者在 Azure Data Studio 中使用向导来完成此操作。

    *   第 8 章，“部署 Azure Arc-enabled PostgreSQL Hyperscale”：虽然第 7 章处理的是 SQL 托管实例，但本章将指导你在使用
    PostgreSQL Hyperscale 时完成必要的步骤。

    *   第 9 章，“监控与管理”：在这最后一章中，我们将重点介绍如何通过利用本地管理服务和 Azure 的管理功能来监控和管理你的 Azure Arc-enabled
    Data Services。


    # 致谢


    首先，让我感谢 Franzie——感谢你成为最好的伴侣，也是我和 Gwenny 最了不起的母亲。


    同时，感谢我在 Solisyon 的同事们，感谢你们所有的辛勤工作，让我能抽出时间进行像这本书这样的有趣项目。


    谢谢你，Anthony！不仅仅是又一个合作项目，更是感谢你成为一位很棒的朋友！


    亲爱的 `#sqlfamily`：感谢你们的本色。我从未见过像我们这样的社区，能成为其中的一员是我的荣幸。人数太多，无法一一列举——但你们知道你们是谁。


    感谢整个 Azure Arc-enabled Data Services 团队构建了一个出色的产品，但特别要感谢 Travis，是他最初让我入迷，还有 Jes，感谢你花时间撰写我们的前言，更重要的是感谢你总是在我们有疑问时在这里支持我们！


    —Ben Weissman


    首先，我必须感谢我的妻子 Heather。她是我最好的朋友和伴侣。今年，我们将一起庆祝结婚 22 周年。与你在一起的每一天都比前一天更好。我爱你，感谢你多年来坚定不移的支持、启发，并倾听我喋喋不休地谈论技术话题。我要感谢我两个可爱的女儿
    Gabby 和 Charlotte，感谢你们的“*SQL Server, SQL Server, SQL Server*”、“*Kubernetes 是一种花哨的饮料*”和“*Sassy
    Sausage*”。我爱你们。你们是我无尽的快乐和骄傲之源。


    接下来，感谢 SQL 和数据平台 MVP 社区。你们中的许多人对今天作为一个人和技术专家的我做出了贡献。我想特别提到我的合著者 Ben Weissman，感谢你对本书的远见和友谊；谢谢你。能拥有你作为同事和朋友，我真的感到非常幸运。我还想感谢我的“容器伙伴”
    Andrew Pruski，他来自威尔士，但现在常驻爱尔兰。Andrew 和我一直在谈论关于 SQL Server、容器和 Kubernetes 的所有事情；谢谢你帮助审阅本书。我还要再次提到
    Mark Wilkinson 和 Andrew；我们今年共同组织了 EightKB 活动，取得了巨大成功。那个项目、你们的友谊以及我们在 Slack 上无休止的闲聊帮助我度过了隔离期。谢谢你们！


    感谢我在 SQL Server 工程团队的许多朋友，谢谢你们！Jes Schultz，感谢你出色的前言，感谢你成为 SQL Server 社区的杰出成员，并现在作为
    PM 推动 Azure Arc-enabled Data Services 向前发展。感谢 Bob Ward，作为 SQL Server 社区的重要组成部分，带来了卓越的工程和教育，并教导世界
    SQL Server 底层如何运作。你确实是我和我们社区的灵感来源。感谢 Slava Oks，感谢你在工程方面的卓越贡献，并将 SQL Server 引入
    Linux。认识你并观察你的职业生涯一直是一种荣幸，自从多年前我们在里斯本相遇以来。感谢整个 SQL Server 工程团队，感谢你们无止境的技术创新、参与
    SQL Server 社区以及回复我的邮件。


    致 Apress 团队，Jonathan, Jill, 和 Laura，你们真的让这个过程变得轻松。没有你们的支持，我们无法完成这项工作。


    —Anthony E. Nocentino


    # 关于作者


    # 1. Kubernetes 入门


    欢迎阅读《Azure Arc-enabled Data Services 揭秘》！本章介绍 Kubernetes，描述其在现代应用程序部署中的角色、提供的优势及其架构。从其优势开始，你将学习
    Kubernetes 在现代基于容器的应用程序部署中所提供的价值。接下来，你将学习 Kubernetes API 如何让你以代码的形式构建和部署下一代应用程序和系统。在该部分，你将学习
