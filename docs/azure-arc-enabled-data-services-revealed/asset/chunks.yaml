- fmt: '## Provisioning Storage in Your Cluster


    The focus of this book is Azure Arc-enabled Data Services and the Data Controller,
    and the data service instances deployed need access to persistent storage in the
    Cluster. For our lab environment in this book, we use the local storage available
    on each Node in the Cluster. While this is good for our lab scenario, this isn’t
    the best choice for production workloads. You will want to use enterprise-class
    storage for your Clusters and application data. Let’s dive into how to configure
    the dynamic provisioning of local storage for our lab Cluster.


    First, on each Node in the Cluster, you will create a set of directories used
    as Persistent Volumes in your Cluster. In Listing 4-31, we define a loop that
    will create 80 directories used as Persistent Volumes. Pods scheduled to the Node
    with Persistent Volume Claims will have Persistent Volumes provisioned for these
    directories on that Node.


    ```bash

    for i in $(seq 1 80); do

    vol="vol$i"

    sudo mkdir -p /azurearc/local-storage/$vol

    sudo mount --bind /azurearc/local-storage/$vol /azurearc/local-storage/$vol

    done

    ```

    Listing 4-31

    Creating directories for Persistent Volumes


    Next, we will deploy the local storage provisioner. This provisioner is responsible
    for binding a Persistent Volume Claim to a Persistent Volume. The code to deploy
    the local storage provisioning is in Listing 4-32. This code creates a `Storage
    Class` named `local-storage`.


    ```bash

    kubectl apply -f https://raw.githubusercontent.com/microsoft/sql-server-samples/master/samples/features/azure-arc/deployment/kubeadm/ubuntu/local-storage-provisioner.yaml

    ```

    Listing 4-32

    Creating the local storage provisioner


    With the local provisioner created, the next step is to set that local storage
    provisioner as the default `Storage Class` in the Cluster. The code to set this
    as default is in Listing 4-33.


    ```bash

    kubectl patch storageclass local-storage -p ''{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}''

    ```

    Listing 4-33

    Setting the `local-storage` Storage Class as default


    With the local storage provisioner deployed in the Cluster, when we provision
    data service instances, you can specify a `Storage Class`. In all our examples
    in this book, we will use this `local-storage` `Storage Class` to provision storage.
    If you do not specify a `Storage Class`, the default `Storage Class` is used,
    and in our Cluster, that is the `local-storage` `Storage Class`.


    Before proceeding, confirm that your `Storage Class` is configured and set as
    default. You can do that with the code in Listing 4-34, and you should have the
    same output as in Figure 4-9. Take note of the `Storage Class` name, which is
    `local-storage`, and that it is marked as default since the name is suffixed with
    `(default)`.


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig9_HTML.png)

    Figure 4-9

    A listing of the Storage Classes in our Cluster


    ```bash

    kubectl get storageclass

    ```

    Listing 4-34

    Get a listing of Storage Classes in your Cluster


    ## Accessing Your Cluster with kubectl


    `kubectl` is the primary command-line tool for interacting with your Kubernetes
    Cluster. We’ve used `kubectl` several times in this chapter during the Cluster
    bootstrapping process and deploying our Pod Network, and we ran those commands
    while logged in locally on the Control Plane Node.


    `kubectl` interacts with the API Server over HTTPS. This means you can access
    the API Server from over a network if the API Server is reachable from the client
    you’re using, allowing you to interact with your Cluster over the network. In
    this section, we will rename our context to a more user-friendly name and then
    copy the `kubeconfig` file to both Windows and Linux machines for remote access
    to our Cluster. You will need to do these steps to perform some of the exercises
    in the book.


    ### Renaming a kubeconfig Context


    A `kubeconfig` Cluster context is a configuration entry in a `kubeconfig` file
    that defines a Cluster’s network location, a username for authentication, and
    an authentication credential for your Cluster. You can have several Cluster contexts
    in a `kubeconfig` file. It is often helpful to name a Cluster context a meaningful
    name rather than keeping the default. So, let’s do that together.


    On your Control Plane Node, let’s rename our existing `kubeconfig` context from
    the default of `kubernetes-admin@kubernetes` to something more meaningful. We
    will name this `kubeconfig` context to `kubeadm` to describe the Cluster we’ve
    created together in this chapter. `kubeadm` is the common term used to describe
    a `kubeadm`-based Cluster in Microsoft documentation and Azure Data Studio’s Azure
    Arc-enabled Data Services and `azure-cli` deployment workflows. To rename a `kubeconfig`
    context, use the code in Listing 4-35.


    ```bash

    kubectl config rename-context kubernetes-admin@kubernetes kubeadm

    ```

    Listing 4-35

    Renaming a `kubeconfig` context


    In Figure 4-10, you will find the output of a successful context renaming.


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig10_HTML.jpg)

    Figure 4-10

    A listing of the Cluster configuration contexts in our `kubeconfig` file


    With the Cluster context renamed, now let’s copy that Cluster context to a Windows
    and Linux workstation for remote access to the Cluster.'
  raw: '## Provisioning Storage in Your Cluster


    The focus of this book is Azure Arc-enabled Data Services and the Data Controller,
    and the data service instances deployed need access to persistent storage in the
    Cluster. For our lab environment in this book, we use the local storage available
    on each Node in the Cluster. While this is good for our lab scenario, this isn’t
    the best choice for production workloads. You will want to use enterprise-class
    storage for your Clusters and application data. Let’s dive into how to configure
    the dynamic provisioning of local storage for our lab Cluster.


    First, on each Node in the Cluster, you will create a set of directories used
    as Persistent Volumes in your Cluster. In Listing [4-31](#505695_2_En_4_Chapter.xhtml#PC31),
    we define a loop that will create 80 directories used as Persistent Volumes. Pods
    scheduled to the Node with Persistent Volume Claims will have Persistent Volumes
    provisioned for these directories on that Node.


    ```

    for i in $(seq 1 80); do

    vol="vol$i"

    sudo mkdir -p /azurearc/local-storage/$vol

    sudo mount --bind /azurearc/local-storage/$vol /azurearc/local-storage/$vol

    done

    Listing 4-31

    Creating directories for Persistent Volumes

    ```


    Next, we will deploy the local storage provisioner. This provisioner is responsible
    for binding a Persistent Volume Claim to a Persistent Volume. The code to deploy
    the local storage provisioning is in Listing [4-32](#505695_2_En_4_Chapter.xhtml#PC32).
    This code creates a Storage Class named `local-storage`.


    ```

    kubectl apply -f https://raw.githubusercontent.com/microsoft/sql-server-samples/master/samples/features/azure-arc/deployment/kubeadm/ubuntu/local-storage-provisioner.yaml

    Listing 4-32

    Creating the local storage provisioner

    ```


    With the local provisioner created, the next step is to set that local storage
    provisioner as the default Storage Class in the Cluster. The code to set this
    as default is in Listing [4-33](#505695_2_En_4_Chapter.xhtml#PC33).


    ```

    kubectl patch storageclass local-storage -p ''{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}''

    Listing 4-33

    Setting the local-storage Storage Class as default

    ```


    With the local storage provisioner deployed in the Cluster, when we provision
    data service instances, you can specify a Storage Class. In all our examples in
    this book, we will use this local-storage Storage Class to provision storage.
    If you do not specify a Storage Class, the default Storage Class is used, and
    in our Cluster, that is the local-storage Storage Class.


    Before proceeding, confirm that your Storage Class is configured and set as default.
    You can do that with the code in Listing [4-34](#505695_2_En_4_Chapter.xhtml#PC34),
    and you should have the same output as in Figure [4-9](#505695_2_En_4_Chapter.xhtml#Fig9).
    Take note of the Storage Class name, which is `local-storage`, and that it is
    marked as default since the name is suffixed with `(default)`.


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig9_HTML.png)


    Figure 4-9


    A listing of the Storage Classes in our Cluster


    ```

    kubectl get storageclass

    Listing 4-34

    Get a listing of Storage Classes in your Cluster

    ```


    ## Accessing Your Cluster with kubectl


    `kubectl` is the primary command-line tool for interacting with your Kubernetes
    Cluster. We’ve used kubectl several times in this chapter during the Cluster bootstrapping
    process and deploying our Pod Network, and we ran those commands while logged
    in locally on the Control Plane Node.


    `kubectl` interacts with the API Server over HTTPS. This means you can access
    the API Server from over a network if the API Server is reachable from the client
    you’re using, allowing you to interact with your Cluster over the network. In
    this section, we will rename our context to a more user-friendly name and then
    copy the kubeconfig file to both Windows and Linux machines for remote access
    to our Cluster. You will need to do these steps to perform some of the exercises
    in the book.


    ### Renaming a kubeconfig Context


    A kubeconfig Cluster context is a configuration entry in a kubeconfig file that
    defines a Cluster’s network location, a username for authentication, and an authentication
    credential for your Cluster. You can have several Cluster contexts in a kubeconfig
    file. It is often helpful to name a Cluster context a meaningful name rather than
    keeping the default. So, let’s do that together.


    On your Control Plane Node, let’s rename our existing kubeconfig context from
    the default of `kubernetes-admin@kubernetes` to something more meaningful. We
    will name this kubeconfig context to `kubeadm` to describe the Cluster we’ve created
    together in this chapter. `kubeadm` is the common term used to describe a kubeadm-based
    Cluster in Microsoft documentation and Azure Data Studio’s Azure Arc-enabled Data
    Services and azure-cli deployment workflows. To rename a kubeconfig context, use
    the code in Listing [4-35](#505695_2_En_4_Chapter.xhtml#PC35).


    ```

    kubectl config rename-context kubernetes-admin@kubernetes kubeadm

    Listing 4-35

    Renaming a kubeconfig context

    ```


    In Figure [4-10](#505695_2_En_4_Chapter.xhtml#Fig10), you will find the output
    of a successful context renaming.


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig10_HTML.jpg)


    Figure 4-10


    A listing of the Cluster configuration contexts in our kubeconfig file


    With the Cluster context renamed, now let’s copy that Cluster context to a Windows
    and Linux workstation for remote access to the Cluster.'
  trans: '

    ## 在集群中配置存储


    本书的重点是 Azure Arc-enabled Data Services 和数据控制器，所部署的数据服务实例需要访问集群中的持久存储。对于本书中的实验环境，我们使用集群中每个节点上可用的本地存储。虽然这对我们的实验场景来说是合适的，但对于生产工作负载而言，这并非最佳选择。您需要为集群和应用程序数据使用企业级存储。让我们深入了解如何为实验集群配置本地存储的动态供应。


    首先，在集群的每个节点上，您将创建一组目录，用作集群中的持久卷。在清单 4-31 中，我们定义了一个循环，将创建 80 个用作持久卷的目录。调度到某个节点上且带有持久卷声明的
    Pod，将被供应位于该节点上这些目录中的持久卷。


    ```bash

    for i in $(seq 1 80); do

    vol="vol$i"

    sudo mkdir -p /azurearc/local-storage/$vol

    sudo mount --bind /azurearc/local-storage/$vol /azurearc/local-storage/$vol

    done

    ```

    清单 4-31

    为持久卷创建目录


    接下来，我们将部署本地存储供应程序。该供应程序负责将持久卷声明绑定到持久卷。部署本地存储供应的代码位于清单 4-32。此代码创建了一个名为 `local-storage`
    的 `Storage Class`。


    ```bash

    kubectl apply -f https://raw.githubusercontent.com/microsoft/sql-server-samples/master/samples/features/azure-arc/deployment/kubeadm/ubuntu/local-storage-provisioner.yaml

    ```

    清单 4-32

    创建本地存储供应程序


    创建本地供应程序后，下一步是将该本地存储供应程序设置为集群中的默认 `Storage Class`。将其设置为默认值的代码位于清单 4-33。


    ```bash

    kubectl patch storageclass local-storage -p ''{"metadata": {"annotations":{"storageclass.kubernetes.io/is-default-class":"true"}}}''

    ```

    清单 4-33

    将 `local-storage` 存储类设置为默认值


    在集群中部署了本地存储供应程序后，当我们供应数据服务实例时，您可以指定一个 `Storage Class`。在本书的所有示例中，我们将使用此 `local-storage`
    `Storage Class` 来供应存储。如果您未指定 `Storage Class`，则会使用默认的 `Storage Class`，在我们的集群中，那就是
    `local-storage` `Storage Class`。


    在继续之前，请确认您的 `Storage Class` 已配置并设置为默认值。您可以使用清单 4-34 中的代码进行此操作，您应该会得到与图 4-9 相同的输出。请注意
    `Storage Class` 名称是 `local-storage`，并且因为它后缀有 `(default)`，所以被标记为默认值。


    ![](img/505695_2_En_4_Fig9_HTML.png)

    图 4-9

    集群中的存储类列表


    ```bash

    kubectl get storageclass

    ```

    清单 4-34

    获取集群中的存储类列表


    ## 使用 kubectl 访问集群


    `kubectl` 是与 Kubernetes 集群交互的主要命令行工具。在本章的集群引导过程和部署 Pod 网络期间，我们已经多次使用了 `kubectl`，并且我们是在控制平面节点上本地登录时运行这些命令的。


    `kubectl` 通过 HTTPS 与 API 服务器交互。这意味着，如果 API 服务器可以从您使用的客户端访问，您就可以通过网络访问 API 服务器，从而允许您通过网络与集群交互。在本节中，我们将把上下文重命名为更用户友好的名称，然后将
    `kubeconfig` 文件复制到 Windows 和 Linux 机器上，以便远程访问集群。您需要执行这些步骤来完成本书中的一些练习。


    ### 重命名 kubeconfig 上下文


    `kubeconfig` 集群上下文是 `kubeconfig` 文件中的一个配置项，它定义了集群的网络位置、用于身份验证的用户名以及集群的身份验证凭据。一个
    `kubeconfig` 文件中可以包含多个集群上下文。将集群上下文命名为有意义的名称通常很有帮助，而不是保留默认名称。所以，让我们一起来做这件事。


    在您的控制平面节点上，让我们将现有的 `kubeconfig` 上下文从默认的 `kubernetes-admin@kubernetes` 重命名为更有意义的名称。我们将此
    `kubeconfig` 上下文命名为 `kubeadm`，以描述我们在本章中共同创建的集群。在 Microsoft 文档和 Azure Data Studio
    的 Azure Arc-enabled Data Services 以及 `azure-cli` 部署工作流中，`kubeadm` 是用于描述基于 `kubeadm`
    的集群的通用术语。要重命名 `kubeconfig` 上下文，请使用清单 4-35 中的代码。


    ```bash

    kubectl config rename-context kubernetes-admin@kubernetes kubeadm

    ```

    清单 4-35

    重命名 `kubeconfig` 上下文


    在图 4-10 中，您可以看到成功重命名上下文后的输出。


    ![](img/505695_2_En_4_Fig10_HTML.jpg)

    图 4-10

    `kubeconfig` 文件中的集群配置上下文列表


    集群上下文重命名后，现在让我们将该集群上下文复制到 Windows 和 Linux 工作站，以便远程访问集群。

