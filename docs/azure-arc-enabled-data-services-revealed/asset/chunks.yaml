  trans: '

    #### StatefulSet 概述

    图 1-2 展示了一个运行中的 StatefulSet 示例。此示例 StatefulSet 被定义为拥有三个副本，并创建了三个 Pod。它创建的每个 Pod
    都有一个唯一的有序名称：`sql-0`、`sql-1` 和 `sql-2`。StatefulSet 中创建的第一个 Pod 始终以索引 0 开头。在此示例中，即为
    `sql-0`。对于添加到 StatefulSet 的每个 Pod，索引会递增一。因此，下一个 Pod 是 `sql-1`，接着是 `sql-2`。如果 StatefulSet
    扩容以添加一个 Pod，则下一个 Pod 被命名为 `sql-3`。如果 StatefulSet 缩容，则首先移除编号最大的 Pod。在此示例中，`sql-3`
    会被移除。这些有序的创建和扩缩容操作对于有状态应用至关重要，这些应用将数据放置在命名的计算资源上，从而使有状态应用能够随时知晓数据的位置。


    ![](img/505695_2_En_1_Fig2_HTML.jpg)

    图 1-2


    一个 StatefulSet 示例 – 每个 Pod 都具有唯一、有序且持久的名称。每个 Pod 还有关联的持久存储。


    在 Azure Arc-enabled Data Services 中，你会发现 SQL Server 托管实例和 PostgreSQL HyperScale
    都使用 `StatefulSet` API 对象来提供一致且有序的 Pod 命名及关联的持久存储。


    Kubernetes 中还有更多可用的控制器。本书重点介绍 `Deployments`、`ReplicaSets` 和 `StatefulSets`，以及如何使用它们来部署
    Azure Arc-enabled Data Services。Kubernetes 中有许多控制器可以帮助构建不同类型的应用工作负载。有关不同控制器类型及其功能的更多信息，请查看
    Kubernetes 文档：[`kubernetes.io/docs/concepts/workloads/`](https://kubernetes.io/docs/concepts/workloads/)。


    #### Services

    正如我们之前介绍的，没有任何 Pod 会被重新创建。每次创建 Pod 时，无论是在初始创建期间还是替换现有 Pod 时，该新 Pod 在启动时都会被分配一个新的
    IP。由于控制器根据配置创建和删除 Pod，或响应故障并影响期望状态，这就给我们带来了一个挑战：应该使用哪个 IP 地址来访问集群中运行的 Pod 所提供的应用服务？因为
    Pod 在启动时被分配了 IP 地址。


    Kubernetes 为访问集群中部署的基于 Pod 的应用提供了一种网络抽象，称为 `Service`。`Service` 是一个持久的 IP 地址，可选择性地包含一个
    DNS 名称，用于访问集群中 Pod 上运行的应用。一般来说，集群中部署的每个应用都会有一个 `Service`。在 `Service` 的 IP 地址上接收的应用流量会被负载均衡到下层的
    Pod IP 地址。当控制器（例如 `ReplicaSet` 控制器）创建和销毁 Pod 时，网络信息会自动更新以反映应用程序的当前状态。让我们来看一个示例。


    在图 1-3 中，假设一个 `Deployment` 创建了一个 `ReplicaSet`，而该 `ReplicaSet` 创建了三个 Pod。这些 Pod
    中的每一个在网络中都有一个唯一的 IP 地址。为了让用户或应用程序访问这些 Pod 中的应用，需要定义一个 `Service`。`Service` 通过一个持久的
    IP 地址和端口（对于 HTTP 是端口 80）来暴露一组 Pod 中运行的应用程序。用户或其他应用程序可以通过连接到 `Service` 的 IP 地址或
    DNS 名称来访问该 `Service` 提供的应用。然后，`Service` 会在属于该 `Service` 的 Pod 之间对该流量进行负载均衡。


    ![](img/505695_2_En_1_Fig3_HTML.jpg)

    图 1-3


    ReplicaSet 和 Services


    在图 1-3 的第二帧中，假设 `ReplicaSet` 中的一个 Pod 发生故障。`ReplicaSet` 控制器感知到这一点，并部署一个新的 Pod，在
    `Service` 中注册该新 Pod 的 IP 地址，并开始将流量负载均衡到新 Pod。发生故障的 Pod 被删除，其 IP 地址从 `Service`
    中移除，流量不再发送到该 IP。这一切都是自动发生的，无需任何用户交互。


    此外，当通过添加更多 Pod 扩容应用程序或通过移除某些 Pod 缩容应用程序时，Pod IP 会相应地添加到 `Service` 或从 `Service`
    中移除。这确实是一项了不起的技术，我们在实际操作中看到这一点时都非常兴奋。


    Kubernetes 中有三种类型的 `Service`，Azure Arc-enabled Data Services 都可以使用它们来访问 Kubernetes
    中运行的应用程序。服务类型分别是 `ClusterIP`、`NodePort` 和 `LoadBalancer`。让我们更详细地了解每一种：


    *   **`ClusterIP`**：`ClusterIP` `Service` *仅*在集群内部可用。当应用不需要暴露在集群外部时，会使用这种类型的 `Service`。


    *   **`NodePort`**：`NodePort` `Service` 在集群中每个节点的真实 IP 地址上的固定端口暴露你的应用。通过集群节点的真实网络
    IP 地址结合服务端口来访问 `NodePort` `Service`。接收到的流量会被路由到支持该 `Service` 的相应 Pod。当基于集群的应用需要从集群外部访问或与外部负载均衡器集成时，会使用
    `NodePort` `Service`。


    *   **`LoadBalancer`**：此服务类型集成了云提供商的负载均衡器服务，或在本地部署的集群外部负载均衡器（例如 F5）。在基于云的场景中，当基于集群的应用需要从集群外部访问时，会使用
    `LoadBalancer` 类型的 `Service`。


    #### Storage

    作为数据专业人员，我们的首要工作是保存数据。而 Kubernetes 具有 API 对象，可以支持有状态应用程序（如关系数据库系统）的部署。有两个主要的 API
    对象可用于协助此过程：`持久卷` 和 `持久卷声明`。


    `持久卷` 是集群管理员定义的、可供 Pod 消耗的集群中可用的存储设备。有多种不同类型的存储可作为 `持久卷` 使用，例如来自云提供商的虚拟磁盘、iSCSI、NFS
    等等。实现细节包含在 `持久卷` 对象中。具体的实现细节取决于你想要访问的存储类型。例如，如果你想配置访问 NFS 共享，你将在 `持久卷` 对象中指定 NFS
    共享的 IP 地址和导出名称。


    Pod 不直接访问 `持久卷` 对象。Pod 在 Pod 对象定义中使用一个 `持久卷声明` 来请求 `持久卷` 的访问权限和容量。`持久卷声明` 将向集群请求存储，然后在
    `持久卷` 上进行声明，并将 `持久卷` 挂载到 Pod 文件系统中。这个额外的抽象层将 Pod 与 `持久卷` 的存储实现细节解耦。这样做的主要好处是，存储实现细节（例如特定于基础架构的存储参数）不会成为
    Pod 定义的一部分。

    '
- fmt: '## Storage Provisioning


    There are two different techniques for provisioning storage in a Cluster, `static
    provisioning` and `dynamic provisioning`.


    In static provisioning, a Cluster administrator will define a collection of Persistent
    Volume Objects in the Cluster. Each object will be a unique storage object that
    defines the storage device’s physical implementation details, such as the location
    of the storage device on the network and the exact storage volume needed. The
    Persistent Volume can then be mapped to a Persistent Volume Claim and then allocated
    to a Pod for use. The key concept here is the Cluster administrator defines each
    Persistent Volume object and its implementation. This can be cumbersome in large-scale
    deployments. There’s a better way.


    Before we get into dynamic provisioning, let us introduce the concept of a `Storage
    Class` first. A `Storage Class` gives Cluster administrators the ability to define
    storage groups based on the attributes of that storage. Some common groupings
    include the storage subsystem’s performance profile, for example, high-speed storage
    vs. slower, perhaps less-expensive storage or even from several different types
    of storage subsystems. Cluster administrators can group types of storage into
    `Storage Classes`, and then Persistent Volumes for Pods are dynamically provisioned
    from a `Storage Class`.


    In dynamic provisioning, there is software installed in your Cluster called a
    storage provisioner. The provisioner works with your storage infrastructure to
    dynamically create the Persistent Volume Objects in response to a Persistent Volume
    Claim created in the Cluster. In the Persistent Volume Claim, you specify the
    `Storage Class` you would like to have a Persistent Volume dynamically provisioned
    from and any configuration parameters required by the storage provisioner.


    The key idea in dynamic provisioning is that a Persistent Volume is created dynamically,
    on demand, in response to the creation of a Persistent Volume Claim rather than
    being pre-created by an administrator as it is in static provisioning.


    From a design standpoint, you can create several `Storage Classes` in your Cluster,
    each of which can allocate Persistent Volumes from different types and tiers of
    storage that is available to your Cluster. You will see later in the book that
    Azure Arc-enabled Data Services allow you to provision storage from `Storage Classes`
    based on the type of data. You will see options to specify a different `Storage
    Class` for databases, transaction logs, backups, and also application logs.


    ## Kubernetes Cluster Components


    The first part of this chapter introduced Kubernetes concepts and the core API
    Objects used to build and deploy workloads in a Kubernetes Cluster. Now it is
    time to dive into what a Kubernetes Cluster is, looking closely at each of the
    major components.


    ### Exploring Kubernetes Cluster Architecture


    A Kubernetes Cluster is a collection of servers (physical or virtual) called `Nodes`
    that provide a platform for running container-based applications in Pods. There
    are two types of Nodes in a Cluster. `Control Plane Nodes` are the controller
    of the Cluster itself, the brains behind the operations. `Worker Nodes` are the
    compute devices used to run Pods. Let’s look at each more closely, starting with
    the Control Plane Nodes. Figure [1-4](#505695_2_En_1_Chapter.xhtml#Fig4) provides
    us an overview of the Cluster components.


    ![](images/505695_2_En_1_Chapter/505695_2_En_1_Fig4_HTML.jpg)


    Figure 1-4

    Kubernetes Cluster components


    #### Control Plane Nodes


    `Control Plane Nodes` operate the Control Plane Services. The Control Plane Services
    implement the core functions of a Kubernetes Cluster, such as managing the Cluster
    itself, its resources, and controlling workload. The Control Plane consists of
    four components, each with a specific responsibility in the Cluster. They are
    the `API Server`, `etcd`, the `Scheduler`, and the `Controller Manager`. The Control
    Plane Services and its components are most commonly deployed as Pods that can
    run on a single Control Plane Node or run on several Control Plane Nodes for high
    availability. For more information on building highly available Clusters and their
    configuration, check out [*https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/high-availability/*](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/high-availability/)
    and [*https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/*](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/).


    Let’s look at each of the Control Plane Services and their functions and responsibility
    in the Cluster in more detail:


    *   **API Server**: The `API Server` is the main communication hub in a Cluster.
    All Cluster components communicate through the `API Server` to exchange information
    and state. It is a simple, stateless, REST API that implements and exposes the
    Kubernetes API for access to users and other Cluster components. As API Objects
    are created, modified, or deleted, those objects’ state is committed to the Cluster.
    Multiple replicas of the `API Server` can be deployed across several Control Plane
    Nodes, and API traffic can be load balanced for high availability.


    *   **etcd**: `etcd` is a key-value data store used to persist the state of the
    Cluster. The `API Server` itself is stateless but serializes and stores object
    data in `etcd`. Since it does persist data, this needs to be protected for both
    recovery and availability. Backups of `etcd` should occur frequently, and if high
    availability is required, multiple replicas are configured in a highly available
    configuration.


    *   **Controller Manager**: The `Controller Manager` implements and ensures the
    desired state of the Cluster and its workloads. It uses control loops to monitor
    the running condition continually, compare it with the desired state, and make
    the changes needed to get the Cluster back into the desired state. To do this,
    the `Controller Manager` watches and updates the `API Server`. Earlier in this
    chapter, we introduced the Controllers’ concept and how they enable you to tell
    the Kubernetes API what the desired state is. The `Controller Manager` implements
    that state. When it comes to Pods and application workloads, if a Deployment defines
    that three Pod replicas of an application need to be online, the `Controller Manager`
    has the responsibility to ensure that those Pods are always online and ready reconciling
    the defined state with the Cluster’s running state by creating new Pods if needed.


    *   **Scheduler**: The `Scheduler` decides which Node in a Cluster to start a
    Pod on. It monitors the `API Server` looking for any unscheduled Pods. If the
    `Scheduler` finds any unscheduled Pods, it determines the best place to run those
    Pods in the Cluster. The scheduling decision is based on the resources available
    in the Cluster, the requirements defined for each Pod, and potentially any administrative
    policy constraints. We will explore the scheduling process in more detail later
    in this chapter.'
