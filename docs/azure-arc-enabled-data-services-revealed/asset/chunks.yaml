    # 准备 Azure Data Studio


    `Azure Data Studio` 的一大优势是其可扩展性，这使其在保持超灵活性的同时也非常轻量。另一方面，这也意味着我们需要先添加并启用一些扩展和配置，才能将其用于启用了
    `Azure Arc` 的 `Data Services`。虽然大部分操作可以“即用即做”，但我们建议先将一切准备就绪，以便后续能纯粹专注于部署工作。


    第一步是安装 `Azure Arc` 扩展。为此，请导航到如图 3-2 所示的扩展选项卡。


    ![](img/505695_2_En_3_Fig2_HTML.png)


    图 3-2


    `Azure Data Studio` – 添加扩展


    在扩展选项卡中，搜索 “`arc`” 并点击安装，如图 3-3 所示。


    ![](img/505695_2_En_3_Fig3_HTML.jpg)


    图 3-3


    `Azure Arc` 扩展安装


    注意


    如果你计划将 `Azure Data Studio` 与 `Postgres` 一起使用，现在也是安装 `Postgres` 扩展的好时机。只需像搜索 “`arc`”
    一样，在扩展选项卡中搜索 “`postgres`”，它就会显示出来。


    接下来，我们需要向 `Azure Data Studio` 添加一个 `Azure` 帐户。为此，导航到连接选项卡，展开 `AZURE` 部分，然后选择 “`登录到
    Azure…`”，如图 3-4 所示。


    ![](img/505695_2_En_3_Fig4_HTML.png)


    图 3-4


    `Azure Data Studio` – 添加连接


    这将触发一个登录对话框，成功登录后，系统会确认你的帐户已添加。你的 `Azure` 帐户也应显示在 `Azure Data Studio` 的链接帐户部分，如图
    3-5 所示。


    ![](img/505695_2_En_3_Fig5_HTML.jpg)


    图 3-5


    `Azure` 帐户显示在 `Azure Data Studio` 中


    接下来，我们需要在 `Azure Data Studio` 中启用 `Python`，最简单的方法是打开一个新的 Notebook，如图 3-6 所示。


    ![](img/505695_2_En_3_Fig6_HTML.jpg)


    图 3-6


    `Azure Data Studio` – 添加 Notebook


    在此 Notebook 中，将内核更改为 “`Python 3`”，如图 3-7 所示。


    ![](img/505695_2_En_3_Fig7_HTML.jpg)


    图 3-7


    `Azure Data Studio` - 更改内核


    这将触发 `Python` 运行时配置。我们建议进行新的 `python` 安装，向导（如图 3-8 所示）也建议这样做。


    ![](img/505695_2_En_3_Fig8_HTML.png)


    图 3-8


    在 `ADS` 中配置 `Python`


    安装可能需要几分钟；完成后，你会看到 Notebook 的内核显示为 “`Python 3`”（见图 3-9）。


    ![](img/505695_2_En_3_Fig9_HTML.jpg)


    图 3-9


    `Azure Data Studio` – 内核


    最后一步是安装 “`pandas`” 包。点击图 3-10 中突出显示的图标，导航到 `python` 包管理。


    ![](img/505695_2_En_3_Fig10_HTML.jpg)


    图 3-10


    `Azure Data Studio` – 安装 `pandas` 包


    在 “`管理包`” 选项卡中，切换到 “`添加新包`”，搜索 `pandas`，然后点击 “`安装`”，如图 3-11 所示。


    ![](img/505695_2_En_3_Fig11_HTML.jpg)


    图 3-11


    `Azure Data Studio` – 管理包


    你可以关闭此向导。安装状态完成后会显示并确认（见图 3-12）。


    ![](img/505695_2_En_3_Fig12_HTML.jpg)


    图 3-12


    `ADS` 中 `pandas` 安装成功的状态消息


    至此，`Azure Data Studio` 的准备工作就完成了——我们已经安装并配置了所需的一切。


    ## azure-cli 扩展和提供程序


    `azure-cli` 是大多数部署的核心工具（我们将在后续章节中看到），它需要一些扩展和注册的提供程序才能完全支持启用了 `Azure Arc` 的 `Data
    Services` 的部署。


    这些可以通过 `CLI` 本身使用清单 3-10 中的代码添加/安装。


    ```

    az extension add --name connectedk8s

    az extension add --name k8s-extension

    az extension add --name customlocation

    az extension add --name arcdata

    az provider register -n Microsoft.Kubernetes

    az provider register -n Microsoft.KubernetesConfiguration

    az provider register -n Microsoft.ExtendedLocation

    清单 3-10

    安装 azure-cli 所需扩展和提供程序的命令

    ```


    注意


    如果你之前安装过这些工具或扩展中的任何一个，请确保在继续之前将它们升级到最新版本。


    ## 在 Azure 中拥有一个资源组


    在 `Azure` 中，我们需要一个资源组作为起点。这个资源组稍后将用于在将 `日志` 和 `指标` 上传到 `Azure 门户`（参见第 7 章）时存储它们。你可以通过门户创建它，或者只需运行清单
    3-11 中的命令。


    ```

    az login

    清单 3-11

    用于登录的 azure-cli 代码

    ```


    此命令将打开一个 Web 浏览器，要求你登录到你的 `Azure` 帐户。登录后，网站会确认登录成功，此时可以关闭浏览器，你的 `azure-cli` 会话即已通过身份验证。如果你有多个订阅，请确保使用清单
    3-12 中的命令将上下文设置为正确的订阅 ID。


    ```

    az account set -s <subscriptionId>

    清单 3-12

    用于设置当前订阅上下文的 azure-cli 代码

    ```


    要创建资源组，请运行清单 3-13 中的代码，并将组名和位置替换为适合你的值。在本书中，我们将使用 `arcBook` 作为我们的组名，使用 `EastUS`
    作为我们的位置。


    ```

    az group create --name <resourceGroupName> --location <location>

    清单 3-13

    用于创建资源组的 azure-cli 代码

    ```


    图 3-13 显示了 `azure-cli` 将如何确认此资源组的创建。


    ![](img/505695_2_En_3_Fig13_HTML.jpg)


    图 3-13


    资源组创建确认


    由于我们目前只是创建了一个空的资源组，这在 `Azure` 中尚未产生任何费用。


    ## 总结与要点回顾


    在本章中，我们引导你了解了在开始部署 `Arc` 启用的 `Data Services` 之前需要满足的要求。现在你已经准备就绪，在真正开始之前唯一缺少的是一个
    `Kubernetes` 集群。


    # 4. 安装 Kubernetes


    鉴于——除了硬件之外——`Kubernetes` 是每个启用了 `Azure Arc` 的 `Data Services` 部署的基础层，你将至少需要一个
    `Kubernetes` 集群来部署服务。在不深入细节的情况下，我们将向你展示如何使用 `kubeadm`（一种在 `Linux` 上运行的自安装 `Kubernetes`
    版本）部署一个集群。这不是唯一的选择（支持的选项列表请参见第 2 章）。启用了 `Azure Arc` 的 `Data Services` 的核心思想是能够将服务部署到任何云中的任何基础设施——但我们想为你提供一个简单的入门选项。无论你选择哪个目标平台，后续章节中解释的部署过程都是相同的。


    本章将介绍如何使用虚拟机在本地构建 `Kubernetes` 集群。我们将首先讨论在哪里安装的决策过程——本地还是云端——以及在此过程中需要考虑的事项。然后，我们将逐步讲解使用
    `kubeadm` 安装方法构建一个基于虚拟机的本地 `Kubernetes` 集群。该集群将成为本书剩余部分所有示例的基础。

