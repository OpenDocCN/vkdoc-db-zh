- fmt: '# 通过命令行部署


    正如我们在第 [2](#505695_2_En_2_Chapter.xhtml) 章中所介绍的，大多数围绕启用了 Azure Arc 的数据服务的部署都是通过一个名为
    `az`（即 `azure-cli`）的工具来控制的。即使是 Azure Data Studio 的图形化安装，也只是在后台调用此 CLI，这就是为什么我们将从命令行驱动的方法开始。


    一个部署命令可能如代码清单 [5-3](#505695_2_En_5_Chapter.xhtml#PC3) 所示。


    ```

    az arcdata dc create     --connectivity-mode Indirect `

    --name arc-dc-local `

    --k8s-namespace arc `

    --subscription  `

    -g arcBook `

    -l eastus `

    --storage-class local-storage `

    --profile-name azure-arc-kubeadm `

    --infrastructure onpremises

    --use-k8s

    Listing 5-3

    用于创建数据控制器的 azure-cli 命令

    ```


    这将触发数据控制器在间接模式下的当前 Kubernetes 上下文中部署，Arc 集群的名称将为 `arc-dc-local`，Kubernetes 中的命名空间将为
    `arc`。订阅 ID 需要替换为你的 Azure 订阅 ID。部署将链接到位于“美国东部”区域的资源组 `arcBook`（尽管在首次上传指标和/或日志之前，部署不会显示在门户中
    - 更多详情请参见第 [9](#505695_2_En_9_Chapter.xhtml) 章），并且它将使用 `local-storage` 存储类。


    我们提供了一个部署配置文件名，在我们的例子中是 `azure-arc-kubeadm`。`azure-cli` 附带了一些预配置的配置文件，以便于部署到不同版本的
    Kubernetes。可以使用代码清单 [5-4](#505695_2_En_5_Chapter.xhtml#PC4) 中的命令检索当前提供的配置文件列表。


    最后两个参数将定义基础结构（允许的值：[''aws'', ''gcp'', ''azure'', ''alibaba'', ''onpremises'',
    ''other'', ''auto'']）并使客户端使用本地 Kubernetes 工具（由 `--use-k8s` 开关触发）。替代方法是使用 Azure
    资源管理器，这将在下一章中用于我们的直接连接数据控制器。


    还有几个参数，并且此示例中提到的所有参数并非都是必需的。你可以在 [*https://docs.microsoft.com/en-us/cli/azure/arcdata*](https://docs.microsoft.com/en-us/cli/azure/arcdata)
    找到完整的参考。


    ```

    az arcdata dc config list

    Listing 5-4

    检索 Arc 数据控制器的配置配置文件列表

    ```


    此命令将返回支持的选项列表，如图 [5-3](#505695_2_En_5_Chapter.xhtml#Fig3) 所示。每个选项都将具有针对特定环境（如存储、安全性和网络集成）的预设但可调整的配置。


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig3_HTML.jpg)


    图 5-3


    Arc 数据控制器的配置配置文件列表


    如果你的所需平台不在列表中，或者你需要更改配置文件的默认设置，也可以从使用代码清单 [5-5](#505695_2_En_5_Chapter.xhtml#PC5)
    中的代码创建自定义配置开始。


    ```

    az arcdata dc config init -p customconfig --source azure-arc-kubeadm

    Listing 5-5

    用于初始化自定义配置的 azure-cli 命令

    ```


    这将在名为 `customconfig` 的目录中创建一个名为 `control.json` 的文件。该文件类似于我们在代码清单 [5-6](#505695_2_En_5_Chapter.xhtml#PC6)
    中看到的内容，可用于控制数据控制器部署的每个可配置参数。


    ```

    {

    "apiVersion": "arcdata.microsoft.com/v2",

    "kind": "DataController",

    "metadata": {

    "name": "datacontroller"

    },

    "spec": {

    "infrastructure": "",

    "credentials": {

    "serviceAccount": "sa-arc-controller",

    "dockerRegistry": "arc-private-registry",

    "domainServiceAccount": "domain-service-account-secret"

    },

    "docker": {

    "registry": "mcr.microsoft.com",

    "repository": "arcdata",

    "imageTag": "v1.1.0_2021-11-02",

    "imagePullPolicy": "Always"

    },

    "storage": {

    "data": {

    "className": "",

    "size": "15Gi",

    "accessMode": "ReadWriteOnce"

    },

    "logs": {

    "className": "",

    "size": "10Gi",

    "accessMode": "ReadWriteOnce"

    }

    },

    "security": {

    "allowDumps": true,

    "allowNodeMetricsCollection": true,

    "allowPodMetricsCollection": true

    },

    "services": [

    {

    "name": "controller",

    "serviceType": "NodePort",

    "port": 30080

    }

    ],

    "settings": {

    "azure": {

    "autoUploadMetrics": "false",

    "autoUploadLogs": "false"

    },

    "controller": {

    "logs.rotation.size": "5000",

    "logs.rotation.days": "7"

    },

    "ElasticSearch": {

    "vm.max_map_count": "-1"

    }

    }

    }

    }

    Listing 5-6

    示例 `control.json` 文件

    ```


    如果想使用自定义配置而不是预配置的配置文件进行部署，可以将 `--profile-name` 参数（而不是 *profile name*）传递给 `azure-cli`，如代码清单
    [5-7](#505695_2_En_5_Chapter.xhtml#PC7) 所示。


    ```

    az arcdata dc create     --connectivity-mode Indirect `

    --name arc-dc-local `

    --k8s-namespace arc `

    --subscription  `

    --resource-group arcBook `

    --location eastus `

    --profile-name PATH `

    --use-k8s

    Listing 5-7

    使用自定义配置创建数据控制器的 azure-cli 命令

    ```


    无论你选择哪种方式，CLI 都会首先要求你提供要使用的用户名和密码（可能还需要接受许可协议），然后开始部署过程。过程的持续时间将取决于目标机器的性能和互联网连接，完成后，输出应类似于我们在图
    [5-4](#505695_2_En_5_Chapter.xhtml#Fig4) 中看到的内容。


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig4_HTML.png)


    图 5-4


    数据控制器部署的输出


    如果希望避免被提示输入 EULA、用户名和密码，也可以在环境变量中提供它们：


    *   `ACCEPT_EULA`：将其设置为 `Y`

    *   `AZDATA_USERNAME`：要使用的用户名，例如 `arcadmin`

    *   `AZDATA_PASSWORD`：你选择的强密码

    *   `AZDATA_LOGSUI_USERNAME` 和 `AZDATA_LOGSUI_PASSWORD`：日志仪表板的用户名和密码

    *   `AZDATA_METRICSUI_USERNAME` 和 `AZDATA_METRICSUI_PASSWORD`：指标仪表板的用户名和密码


    **注意** 如果未提供 `METRICSUI` 和 `LOGSUI`，则它们将回退到 `AZDATA` 用户名/密码。


    这将使 `azure-cli` 使用这些值，而不是以交互方式提示你。使用环境变量时，可以为日志 UI、指标 UI 和控制器本身提供专用用户。以交互方式输入时，它们都将使用相同的凭据。


    如果想在 Kubernetes 端监控部署，可以运行代码清单 [5-8](#505695_2_En_5_Chapter.xhtml#PC8) 中的 `kubectl`
    命令来跟踪进度。


    ```

    kubectl get pods -n arc --watch

    Listing 5-8

    使用 kubectl 监控部署状态

    ```


    使用 `--watch` 开关，每当 Pod 中就绪容器的状态或数量发生变化时，输出都会持续更新。输出将如图 [5-5](#505695_2_En_5_Chapter.xhtml#Fig5)
    所示，并在 Pod 状态变化时持续更新。


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig5_HTML.jpg)


    图 5-5


    代码清单 [5-8](#505695_2_En_5_Chapter.xhtml#PC8) 的输出


    部署完成后，你可以使用 `az` 来，例如，使用代码清单 [5-9](#505695_2_En_5_Chapter.xhtml#PC9) 检索控制器的端点。


    ```

    az arcdata dc endpoint list -o table -k arc

    Listing 5-9

    用于检索端点列表的 azure-cli 命令

    ```


    这将显示我们稍后可用于监控集群的端点，类似于图 [5-6](#505695_2_En_5_Chapter.xhtml#Fig6) 中的输出。


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig6_HTML.jpg)


    图 5-6


    数据控制器端点列表


    你的第一个数据控制器现已准备就绪，我们将在接下来的章节中向你展示如何通过向其部署数据实例来开始使用它！'
  raw: '## Deployment Through the Command Line


    As we’ve introduced in Chapter [2](#505695_2_En_2_Chapter.xhtml), most deployments
    around Azure Arc-enabled Data Services are controlled through a tool called *az*
    – *the azure-cli*. Even graphical installations from Azure Data Studio simply
    call this CLI in the background, which is why we’ll start with the command-line-driven
    approach.


    A deployment command could, for example, look like Listing [5-3](#505695_2_En_5_Chapter.xhtml#PC3).


    ```

    az arcdata dc create     --connectivity-mode Indirect `

    --name arc-dc-local `

    --k8s-namespace arc `

    --subscription  `

    -g arcBook `

    -l eastus `

    --storage-class local-storage `

    --profile-name azure-arc-kubeadm `

    --infrastructure onpremises

    --use-k8s

    Listing 5-3

    azure-cli command to create a Data Controller

    ```


    This would trigger a Data Controller to be deployed in the current Kubernetes
    context in indirect mode, the name of the Arc Cluster would be “arc-dc-local,”
    and the Namespace in Kubernetes would be “arc.” The subscription ID would need
    to be replaced with your Azure subscription ID. The deployment would be linked
    to our resource group “arcBook” in the “East US” region (although the deployment
    won’t show up in the portal until you first upload metrics and/or logs – see Chapter
    [9](#505695_2_En_9_Chapter.xhtml) for more details), and it would use the “local-storage”
    Storage Class.


    We are providing a deployment profile name, in our case “azure-arc-kubeadm.” The
    azure-cli comes with a hand full of pre-configured profiles to make it easy to
    deploy to different versions of Kubernetes. The list of currently provided profiles
    can be retrieved using the command in Listing [5-4](#505695_2_En_5_Chapter.xhtml#PC4).


    The last two parameters will define the infrastructure (allowed values: [''aws'',
    ''gcp'', ''azure'', ''alibaba'', ''onpremises'', ''other'', ''auto'']) and make
    the client use the local Kubernetes tooling (triggered by the --use-k8s switch).
    The alternative to that would be to use the Azure Resource Manager, which is what
    we’ll do for our direct connected Data Controller in the next chapter.


    There are a few more parameters, and not all of the mentioned parameters in this
    example are mandatory. You will find the full reference at [*https://docs.microsoft.com/en-us/cli/azure/arcdata*](https://docs.microsoft.com/en-us/cli/azure/arcdata).


    ```

    az arcdata dc config list

    Listing 5-4

    Retrieve list of configuration profiles for Arc Data Controllers

    ```


    This command will return the list of supported options as shown in Figure [5-3](#505695_2_En_5_Chapter.xhtml#Fig3).
    Every option will have a preset but adjustable configuration for the specific
    environment such as storage, security, and network integrations.


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig3_HTML.jpg)


    Figure 5-3


    List of configuration profiles for Arc Data Controllers


    Should your desired platform not be on the list or you need changes to the profile’s
    default, you can also start by creating a custom configuration using the code
    from Listing [5-5](#505695_2_En_5_Chapter.xhtml#PC5).


    ```

    az arcdata dc config init -p customconfig --source azure-arc-kubeadm

    Listing 5-5

    azure-cli command to initialize a custom configuration

    ```


    This will create a file called *control.json* in a directory called “customconfig”.
    The file looks similar to what we find in Listing [5-6](#505695_2_En_5_Chapter.xhtml#PC6)
    and can be used to control every configurable parameter of your Data Controller
    deployment.


    ```

    {

    "apiVersion": "arcdata.microsoft.com/v2",

    "kind": "DataController",

    "metadata": {

    "name": "datacontroller"

    },

    "spec": {

    "infrastructure": "",

    "credentials": {

    "serviceAccount": "sa-arc-controller",

    "dockerRegistry": "arc-private-registry",

    "domainServiceAccount": "domain-service-account-secret"

    },

    "docker": {

    "registry": "mcr.microsoft.com",

    "repository": "arcdata",

    "imageTag": "v1.1.0_2021-11-02",

    "imagePullPolicy": "Always"

    },

    "storage": {

    "data": {

    "className": "",

    "size": "15Gi",

    "accessMode": "ReadWriteOnce"

    },

    "logs": {

    "className": "",

    "size": "10Gi",

    "accessMode": "ReadWriteOnce"

    }

    },

    "security": {

    "allowDumps": true,

    "allowNodeMetricsCollection": true,

    "allowPodMetricsCollection": true

    },

    "services": [

    {

    "name": "controller",

    "serviceType": "NodePort",

    "port": 30080

    }

    ],

    "settings": {

    "azure": {

    "autoUploadMetrics": "false",

    "autoUploadLogs": "false"

    },

    "controller": {

    "logs.rotation.size": "5000",

    "logs.rotation.days": "7"

    },

    "ElasticSearch": {

    "vm.max_map_count": "-1"

    }

    }

    }

    }

    Listing 5-6

    Sample “control.json” file

    ```


    If you want to deploy using a custom configuration rather than using pre-configured
    profile, you can pass the *--profile-name* parameter instead of a *profile name*
    to the azure-cli as shown in Listing [5-7](#505695_2_En_5_Chapter.xhtml#PC7) .


    ```

    az arcdata dc create     --connectivity-mode Indirect `

    --name arc-dc-local `

    --k8s-namespace arc `

    --subscription  `

    --resource-group arcBook `

    --location eastus `

    --profile-name PATH `

    --use-k8s

    Listing 5-7

    azure-cli command to create a Data Controller using a custom config

    ```


    Whichever way you choose, the CLI will first ask you for the username and password
    to be used (potentially also to accept the license agreement) and then start with
    the deployment process. The duration of the process will depend on your target
    machine’s performance and Internet connection, and when done, the output should
    look similar to what we see in Figure [5-4](#505695_2_En_5_Chapter.xhtml#Fig4).


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig4_HTML.png)


    Figure 5-4


    Output of a Data Controller deployment


    If you want to avoid being prompted for EULA, usernames, and passwords, you can
    also provide them in environment variables:


    *   ACCEPT_EULA: Set this to “Y”


    *   AZDATA_USERNAME: The username to be used, for example, arcadmin


    *   AZDATA_PASSWORD: A strong password of your choice


    *   AZDATA_LOGSUI_USERNAME and AZDATA_LOGSUI_PASSWORD: Username and password for
    Logs Dashboard


    *   AZDATA_METRICSUI_USERNAME and AZDATA_METRICSUI_PASSWORD: Username and password
    for Metrics Dashboard


    **Note** METRICSUI and LOGSUI will fall back to the AZDATA username/password if
    they aren’t provided.


    This would make the azure-cli use those values instead of interactively prompting
    you. When using environment variables, you can provide dedicated users for the
    Logs UI, the Metrics UI, and the Controller itself. When entering them interactively,
    they will all use the same credentials.


    If you want to monitor the deployment on the Kubernetes end, you can run the *kubectl*
    command in Listing [5-8](#505695_2_En_5_Chapter.xhtml#PC8) to follow the progress.


    ```

    kubectl get pods -n arc --watch

    Listing 5-8

    Monitor deployment status using kubectl

    ```


    Using the *--watch* switch, the output will keep updating whenever the status
    or number of ready containers in a Pod changes. The output will look like Figure
    [5-5](#505695_2_En_5_Chapter.xhtml#Fig5) and will constantly update when a Pod’s
    status changes.


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Output of Listing [5-8](#505695_2_En_5_Chapter.xhtml#PC8)


    Once the deployment has finished, you can use `az` to, for example, retrieve the
    Controller’s endpoints using Listing [5-9](#505695_2_En_5_Chapter.xhtml#PC9).


    ```

    az arcdata dc endpoint list -o table -k arc

    Listing 5-9

    azure-cli command to retrieve a list of endpoints

    ```


    This will show you the endpoints that we can later on use to monitor our Cluster,
    similar to the output in Figure [5-6](#505695_2_En_5_Chapter.xhtml#Fig6).


    ![](images/505695_2_En_5_Chapter/505695_2_En_5_Fig6_HTML.jpg)


    Figure 5-6


    List of Data Controller endpoints


    Your first Data Controller is now ready, and we’ll show you in the upcoming chapters
    how you can start using it by deploying data instances to it!'
  trans: '

