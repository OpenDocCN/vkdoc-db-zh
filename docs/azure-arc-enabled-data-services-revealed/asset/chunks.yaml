  trans: '## 通过 Azure Data Studio 部署


    如果你更喜欢图形化界面驱动的方式，可以使用 Azure Data Studio 来完成部署。


    **注意**


    如果你使用的是 `NodePort` 服务类型，则需要在部署前确保每个数据控制器在 `control.json` 文件中使用不同的端口号。在同一个 Kubernetes
    集群上，不能有多个数据控制器使用相同的 `NodePort` 端口号，因为它们会在终端端口上发生冲突！


    让我们开始在 Azure Data Studio 中部署数据控制器的过程。你可以通过导航到连接选项卡上的 `AZURE ARC CONTROLLERS` 部分并点击“+”来开始，如图
    5-7 所示。


    ![](img/505695_2_En_5_Fig7_HTML.jpg)

    图 5-7

    启动 Arc 控制器部署向导


    向导将首先确认你是否要部署数据，如图 5-8 所示。


    ![](img/505695_2_En_5_Fig8_HTML.jpg)

    图 5-8

    Arc 控制器部署向导 – 选择部署选项


    然后，它将验证所有必需工具是否已安装正确版本，如图 5-9 所示。


    ![](img/505695_2_En_5_Fig9_HTML.png)

    图 5-9

    Arc 控制器部署向导 – 先决条件


    在下一步（图 5-10），你将设置用于此次部署的 Kubernetes 上下文。


    ![](img/505695_2_En_5_Fig10_HTML.jpg)

    图 5-10

    Arc 控制器部署向导 – 第 2 步


    接下来是使用的配置配置文件，如图 5-11 所示。


    ![](img/505695_2_En_5_Fig11_HTML.jpg)

    图 5-11

    Arc 控制器部署向导 – 第 3 步


    第四步（如图 5-12 所示）将要求提供用于部署的 Azure 配置。这包括你的 Azure 账户、订阅、资源组以及要使用的区域。


    ![](img/505695_2_En_5_Fig12_HTML.png)

    图 5-12

    Arc 控制器部署向导 – 第 4 步


    第 5 步（见图 5-13）将定义控制器配置，即 Kubernetes 内使用的命名空间、用于在 Azure 门户中识别的数据控制器名称、存储类和基础结构类型、用户名以及此控制器的密码。


    ![](img/505695_2_En_5_Fig13_HTML.png)

    图 5-13

    Arc 控制器部署向导 – 第 5 步


    最后的第 6 步将为你提供所选设置的摘要，如图 5-14 所示。


    ![](img/505695_2_En_5_Fig14_HTML.png)

    图 5-14

    Arc 控制器部署向导 – 第 6 步


    你可以使用底部的 `Script to notebook` 按钮来确认这些设置，这将创建一个基于 Python 的 Jupyter Notebook，可以通过
    `Run all` 按钮执行（见图 5-15），或者直接使用 `Deploy` 按钮立即部署。


    ![](img/505695_2_En_5_Fig15_HTML.png)

    图 5-15

    Azure Data Studio 中 Jupyter Notebook 的“全部运行”按钮


    由于我们已经部署了一个数据控制器，可以跳过这一部分。


    在 Azure Data Studio 中，我们也可以添加现有的控制器以便从这里进行管理。要执行此操作，请点击 `Connect Controller` 按钮，如图
    5-16 所示。


    ![](img/505695_2_En_5_Fig16_HTML.jpg)

    图 5-16

    将 Arc 控制器添加到 Azure Data Studio


    这将触发一个对话框，要求提供控制器的命名空间和集群（见图 5-17）。


    ![](img/505695_2_En_5_Fig17_HTML.jpg)

    图 5-17

    将 Arc 控制器添加到 Azure Data Studio – 连接详细信息


    一旦你提供了这些设置并添加了控制器，它就会显示在 ADS 中（见图 5-18）。


    ![](img/505695_2_En_5_Fig18_HTML.jpg)

    图 5-18

    在 Azure Data Studio 中显示的 Arc 数据控制器


    如果你右键单击控制器并选择 `manage`，将会显示控制器的设置。


    在设置页面上，你将再次看到其终端、命名空间等。示例见图 5-19。


    ![](img/505695_2_En_5_Fig19_HTML.png)

    图 5-19

    Azure Data Studio 中的 Arc 数据控制器管理页面


    至此，你已部署了一个 Arc 数据控制器，并将其添加到了可从 Azure Data Studio 管理的清单中。


    ## 总结与要点


    在本章中，我们部署了我们的第一个 Azure Arc 数据控制器——以间接模式部署。


    另一方面，下一章将引导你设置直接连接的集群。


    # 6. 以直接模式部署数据控制器


    虽然我们在上一章已经开始部署第一个数据控制器，并使用了间接连接模式，但我们也来看看直接模式的数据控制器。与间接连接的控制器不同，直接模式控制器将**持续连接到**
    Azure 门户，这意味着你无需手动上传任何使用情况或日志数据，并且还可以使用此控制器的数据进行实时分析和警报。


    **注意**


    根据你所使用的 Kubernetes 集群类型，由于端口和资源冲突，你可能无法将此直接模式数据控制器部署到同一个集群。


    如果你使用的是本书中描述的基于 `kubeadm` 的集群，请先删除间接连接的数据控制器，或者部署第二个 Kubernetes 集群。虽然在同一集群上并行运行直接和间接数据控制器是可能的，但这需要一些额外的步骤，并且其用例非常有限，因此超出了本书的范围。'
- fmt: '# Azure Arc-enabled Data Services 准备工作


    ## 让你的 Kubernetes 集群启用 Azure Arc


    让数据控制器能够以直接模式部署的首要要求是，你的 Kubernetes 集群需要启用 Azure Arc。如第 [2](#505695_2_En_2_Chapter.xhtml)
    章所述，Azure Arc 提供多种功能，其中之一便是 Azure Arc-enabled Kubernetes。


    要让你当前 `kubectl` 集群上下文中的集群启用 Arc，你可以使用清单 [6-1](#505695_2_En_6_Chapter.xhtml#PC1)
    中显示的命令，提供在 Azure 中的集群名称以及应存储其元数据的资源组和位置。


    ```

    az connectedk8s connect --name kubeadm --resource-group arcBook --location eastus

    ```

    清单 6-1

    使 Kubernetes 集群启用 Azure Arc 的 Azure CLI 命令


    这将产生类似于图 [6-1](#505695_2_En_6_Chapter.xhtml#Fig1) 中的输出。


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig1_HTML.jpg)


    图 6-1


    清单 [6-1](#505695_2_En_6_Chapter.xhtml#PC1) 的输出


    你还可以使用清单 [6-2](#505695_2_En_6_Chapter.xhtml#PC2) 中的命令列出资源组中的所有已启用 Arc 的 Kubernetes
    集群。


    ```

    az connectedk8s list --resource-group arcBook --output table

    ```

    清单 6-2

    列出资源组中已启用 Arc 的 Kubernetes 集群的 Azure CLI 命令


    如图 [6-2](#505695_2_En_6_Chapter.xhtml#Fig2) 所示，我们的 `kubeadm` 集群已加入并显示在命令输出中。


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig2_HTML.jpg)


    图 6-2


    清单 [6-2](#505695_2_En_6_Chapter.xhtml#PC2) 的输出


    此加入过程或 Arc 启用在我们的集群中创建了一个名为 `Azure Arc` 的命名空间，其中包含各种部署和 Pod，我们可以使用清单 [6-3](#505695_2_En_6_Chapter.xhtml#PC3)
    中的命令列出并验证它们。


    ```

    kubectl get deployments,pods -n azure-arc

    ```

    清单 6-3

    列出已启用 Arc 命名空间中部署和 Pod 的 kubectl 命令


    图 [6-3](#505695_2_En_6_Chapter.xhtml#Fig3) 显示了该命令的结果。


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig3_HTML.jpg)


    图 6-3


    清单 [6-3](#505695_2_En_6_Chapter.xhtml#PC3) 的输出


    成功连接集群后，我们还需要使用清单 [6-4](#505695_2_En_6_Chapter.xhtml#PC4) 中的命令启用 `custom-locations`
    功能。此命令尚不会创建自定义位置——它只是让集群允许创建自定义位置。自定义位置本质上是从 Azure 指向我们 Kubernetes 集群的指针，以便在部署数据控制器时可以引用此集群。虽然我们也可以从命令行创建此位置，但稍后我们将在从
    Azure 门户部署数据控制器的过程中完成此操作。


    ```

    az connectedk8s enable-features -n kubeadm -g arcBook --features cluster-connect
    custom-locations

    ```

    清单 6-4

    启用自定义位置功能的 Azure CLI 命令


    功能成功启用后，CLI 将如图 [6-4](#505695_2_En_6_Chapter.xhtml#Fig4) 所示进行报告。


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig4_HTML.jpg)


    图 6-4


    清单 [6-4](#505695_2_En_6_Chapter.xhtml#PC4) 的输出


    对我们集群本身的最后一个要求是 Arc-enabled Data Services 扩展，它将把自定义资源定义和引导程序引入你的 Kubernetes 集群。可以使用清单
    [6-5](#505695_2_En_6_Chapter.xhtml#PC5) 中的命令创建此扩展。此步骤必须在你希望直接连接使用 Arc-enabled
    Data Services 的每个 Kubernetes 集群上执行一次。


    ```

    az k8s-extension create --name arc-data-location `

    --extension-type microsoft.arcdataservices `

    --cluster-type connectedClusters `

    --cluster-name kubeadm `

    --resource-group arcBook `

    --scope cluster `

    --release-namespace arc-direct `

    --config Microsoft.CustomLocation.ServiceAccount=sa-bootstrapper `

    --auto-upgrade false

    ```

    清单 6-5

    安装 Arc-enabled Data Services Kubernetes 扩展的 Azure CLI 命令


    此步骤的成功至关重要，因此请使用清单 [6-6](#505695_2_En_6_Chapter.xhtml#PC6) 中的命令仔细检查其状态。


    ```

    az k8s-extension show --name arc-data-location --cluster-type connectedClusters
    -c kubeadm -g arcBook -o table

    ```

    清单 6-6

    显示 Arc-enabled Data Services Kubernetes 扩展状态的 Azure CLI 命令


    如图 [6-5](#505695_2_En_6_Chapter.xhtml#Fig5) 所示，`ProvisioningState` 显示为 `Succeeded`——在此状态出现之前请勿继续操作，这可能需要几分钟时间。


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig5_HTML.jpg)


    图 6-5


    清单 [6-6](#505695_2_En_6_Chapter.xhtml#PC6) 的输出


    如前所述，这也在我们的集群中创建了一个引导程序，我们可以使用清单 [6-7](#505695_2_En_6_Chapter.xhtml#PC7) 中的 `kubectl`
    命令列出它。


    ```

    kubectl get pods -n arc-direct

    ```

    清单 6-7

    列出命名空间中所有 Pod 的 kubectl 命令


    输出应类似于图 [6-6](#505695_2_En_6_Chapter.xhtml#Fig6)，这确认了我们的引导程序 Pod 已创建并正在运行。


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig6_HTML.jpg)


    图 6-6


    清单 [6-7](#505695_2_En_6_Chapter.xhtml#PC7) 的输出


    我们的 Kubernetes 集群现在已准备好部署直接连接的 Azure Arc 数据控制器。


    ## 准备你的 Azure 订阅


    除了对 Kubernetes 集群的要求外，你的 Azure 订阅也有一个要求：我们需要一个 Log Analytics 工作区。如果你已经有一个，可以随意使用。否则，你可以使用清单
    [6-8](#505695_2_En_6_Chapter.xhtml#PC8) 中的命令创建一个。重要的是工作区需要一个唯一的名称。


    ```

    az monitor log-analytics workspace create -g arcBook -n arcBookLAWS

    ```

    清单 6-8

    创建 Log Analytics 工作区的 Azure CLI 命令


    结果应类似于图 [6-7](#505695_2_En_6_Chapter.xhtml#Fig7)，格式为 JSON。


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig7_HTML.jpg)


    图 6-7


    清单 [6-8](#505695_2_En_6_Chapter.xhtml#PC8) 的输出


    要访问此工作区，我们需要其主访问密钥，这可以通过清单 [6-9](#505695_2_En_6_Chapter.xhtml#PC9) 中的命令检索。


    ```

    az monitor log-analytics workspace get-shared-keys -g arcBook -n arcBookLAWS

    ```

    清单 6-9

    检索工作区共享密钥的 Azure CLI 命令


    输出将再次是 JSON 格式，如图 [6-8](#505695_2_En_6_Chapter.xhtml#Fig8) 所示。复制 `primarySharedKey`
    的值，因为我们设置数据控制器时需要用到它。


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig8_HTML.jpg)


    图 6-8


    Azure Log Analytics 工作区的访问密钥


    我们的 Log Analytics 工作区现在也已准备好与我们的数据控制器一起使用。'
  raw: '## Get Your Kubernetes Cluster Azure Arc-enabled


    The first requirement for a Data Controller to be deployable in direct mode is
    for your Kubernetes Cluster to be Azure Arc-enabled. As explained in Chapter [2](#505695_2_En_2_Chapter.xhtml),
    Azure Arc has a multitude of offerings, one of them being Azure Arc-enabled Kubernetes.


    To make the Cluster from your current kubectl Cluster context Arc-enabled, you
    can use the command shown in Listing [6-1](#505695_2_En_6_Chapter.xhtml#PC1),
    providing the name for the Cluster in Azure as well as the resource group and
    location where its metadata should be stored.


    ```

    az connectedk8s connect --name kubeadm --resource-group arcBook --location eastus

    Listing 6-1

    azure-cli command to make a Kubernetes Cluster Arc-enabled

    ```


    This results in an output similar to the one in Figure [6-1](#505695_2_En_6_Chapter.xhtml#Fig1).


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Output of Listing [6-1](#505695_2_En_6_Chapter.xhtml#PC1)


    You can also list all Arc-enabled Kubernetes Clusters in a resource group using
    the command in Listing [6-2](#505695_2_En_6_Chapter.xhtml#PC2) .


    ```

    az connectedk8s list --resource-group arcBook --output table

    Listing 6-2

    azure-cli command to list the Arc-enabled Kubernetes Clusters in a resource group

    ```


    As you can see in Figure [6-2](#505695_2_En_6_Chapter.xhtml#Fig2), our kubeadm
    Cluster has been onboarded and is showing in the output of our command.


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Output of Listing [6-2](#505695_2_En_6_Chapter.xhtml#PC2)


    The onboarding or Arc enablement created a Namespace called Azure Arc in our Cluster
    including a variety of Deployments and Pods which we can list and verify using
    the command in Listing [6-3](#505695_2_En_6_Chapter.xhtml#PC3) .


    ```

    kubectl get deployments,pods -n azure-arc

    Listing 6-3

    kubectl command to list the Deployments and Pods in the Arc-enabled Namespace

    ```


    Figure [6-3](#505695_2_En_6_Chapter.xhtml#Fig3) is showing the result of that
    command.


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig3_HTML.jpg)


    Figure 6-3


    Output of Listing [6-3](#505695_2_En_6_Chapter.xhtml#PC3)


    Once we have successfully connected the Cluster, we also need to enable the `custom-locations`
    feature using the command from Listing [6-4](#505695_2_En_6_Chapter.xhtml#PC4).
    This command doesn’t create a custom location yet – it only enables the Cluster
    to allow the creation of them. A custom location is basically a pointer to our
    Kubernetes Cluster from Azure so we can address this Cluster when deploying our
    Data Controller, and while we could create this location from the command line
    as well, we’ll simply do that as part of the Data Controller’s deployment process
    from the Azure Portal later.


    ```

    az connectedk8s enable-features -n kubeadm -g arcBook --features cluster-connect
    custom-locations

    Listing 6-4

    azure-cli command to enable the custom-locations feature

    ```


    Once the feature has been successfully enabled, the CLI will report back as shown
    in Figure [6-4](#505695_2_En_6_Chapter.xhtml#Fig4).


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig4_HTML.jpg)


    Figure 6-4


    Output of Listing [6-4](#505695_2_En_6_Chapter.xhtml#PC4)


    The last requirement on our Cluster itself is the Arc-enabled Data Services extension
    which will bring in the Custom Resource Definitions into your Kubernetes Cluster
    and the bootstrapper, which can be created using the command in Listing [6-5](#505695_2_En_6_Chapter.xhtml#PC5).
    This step has to happen once on every Kubernetes Cluster that you want to use
    directly connected Arc-enabled Data Services on.


    ```

    az k8s-extension create --name arc-data-location `

    --extension-type microsoft.arcdataservices `

    --cluster-type connectedClusters `

    --cluster-name kubeadm `

    --resource-group arcBook `

    --scope cluster `

    --release-namespace arc-direct `

    --config Microsoft.CustomLocation.ServiceAccount=sa-bootstrapper `

    --auto-upgrade false

    Listing 6-5

    azure-cli command to install the Arc-enabled Data Services Kubernetes extension

    ```


    It is important that this step succeeds, so double-check its status using the
    command in Listing [6-6](#505695_2_En_6_Chapter.xhtml#PC6).


    ```

    az k8s-extension show --name arc-data-location --cluster-type connectedClusters
    -c kubeadm -g arcBook -o table

    Listing 6-6

    azure-cli command to show the status of an Arc-enabled Data Services Kubernetes
    extension

    ```


    As you can see in Figure [6-5](#505695_2_En_6_Chapter.xhtml#Fig5), the ProvisioningState
    is showing as Succeeded – do not proceed until this is the case, which can take
    a few minutes.


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Output of Listing [6-6](#505695_2_En_6_Chapter.xhtml#PC6)


    As mentioned, this also created a bootstrapper in our Cluster which we can list
    using the kubectl command in Listing [6-7](#505695_2_En_6_Chapter.xhtml#PC7).


    ```

    kubectl get pods -n arc-direct

    Listing 6-7

    kubectl command to list all Pods in a Namespace

    ```


    The output, which should look similar to the one in Figure [6-6](#505695_2_En_6_Chapter.xhtml#Fig6),
    confirms that our bootstrapper Pod has been created and is running.


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Output of Listing [6-7](#505695_2_En_6_Chapter.xhtml#PC7)


    Our Kubernetes Cluster is now ready for the deployment of a directly connected
    Azure Arc Data Controller.


    ## Get Your Azure Subscription Ready


    In addition to the requirements to your Kubernetes Cluster, there is also a requirement
    in your Azure subscription: we need a Log Analytics Workspace. Should you already
    have one, feel free to use that. Otherwise, you can create one using the command
    in Listing [6-8](#505695_2_En_6_Chapter.xhtml#PC8). The important part is that
    the Workspace needs a unique name.


    ```

    az monitor log-analytics workspace create -g arcBook -n arcBookLAWS

    Listing 6-8

    azure-cli command to create a Log Analytics Workspace

    ```


    The result, which should look similar to the one in Figure [6-7](#505695_2_En_6_Chapter.xhtml#Fig7),
    is in JSON format.


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Output of Listing [6-8](#505695_2_En_6_Chapter.xhtml#PC8)


    To access this workspace, we need its primary access key, which can be retrieved
    through the command in Listing [6-9](#505695_2_En_6_Chapter.xhtml#PC9).


    ```

    az monitor log-analytics workspace get-shared-keys -g arcBook -n arcBookLAWS

    Listing 6-9

    azure-cli command to retrieve a workspace’s shared keys

    ```


    The output will again be in JSON format as the one in Figure [6-8](#505695_2_En_6_Chapter.xhtml#Fig8).
    Copy the value of the *primarySharedKey*, as we’ll need it when setting up our
    Data Controller.


    ![](images/505695_2_En_6_Chapter/505695_2_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Access key for Azure Log Analytics Workspace


    Our Log Analytics Workspace is now also ready to be used with our Data Controller.'
