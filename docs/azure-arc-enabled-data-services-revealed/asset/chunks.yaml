  trans: '

    ### API 服务器


    API 服务器是 `Kubernetes` `集群`中的中央通信枢纽。它是 `Kubernetes` 用户与`集群`交互以部署工作负载的主要方式。它也是 `Kubernetes`
    在`集群`内部各组件之间交换信息的主要方式。API 服务器是一个可通过 `HTTPS` 访问的 `REST` `API`，它将 `API` 对象以 `JSON`
    格式暴露出来。当`集群`用户定义工作负载并将信息传入 API 服务器时，该信息会被序列化并持久化存储到`集群`数据存储中。`Kubernetes` 随后会将`集群`的运行状态转变为存储在`集群`存储中那些
    `API` 对象所定义的期望状态。`Kubernetes` 中的`集群`数据存储是 `etcd`，这是一个分布式键值数据存储；更多信息，请参见 [*https://etcd.io/*](https://etcd.io/)。


    ### 核心 Kubernetes `API` 原语


    现在，让我们更仔细地审视上一节介绍的每个高级 `API` 对象。本节将介绍 `Pod`、`控制器`、`服务`和`存储`。你将了解更多关于每个对象的细节，以及它们如何使你能够在
    `Kubernetes` 中部署应用程序，以及每个 `API` 对象允许你部署的工作负载类型。


    #### `Pod`


    `Pod` 是 `Kubernetes` `集群`中最基本的工作单元。从核心上讲，`Pod` 是一个 `API` 对象，它代表一个或多个容器，及其资源（例如网络、存储）和控制
    `Pod` 执行的配置。最常见的 `Pod` `API` 对象定义包含容器镜像、用于与基于容器的应用程序通信的网络端口，以及（如果需要的话）存储。


    `Pod` 是 `Kubernetes` `集群`中的调度单元。在 `Kubernetes` 中，调度决定了在`集群`的哪个`节点`上启动一个 `Pod`。一旦
    `Pod` 被调度到`节点`上，容器运行时（通常是 `containerd` 容器运行时）会在该`节点`上使用指定的容器镜像启动一个容器。在将 `Pod`
    调度到`节点`时，`Kubernetes` 会确保所选`节点`上具备运行该 `Pod` 所需的资源，如 `CPU` 和内存，并且（如果在 `Pod` 中配置了的话）能够访问存储。


    注意


    `Kubernetes` 实现了`容器运行时接口 (CRI)`，这意味着容器运行时是可插拔的资源，可以使用其他符合 `CRI` 标准的容器运行时。


    `Pod` 是伸缩的单元。在 `Kubernetes` 中部署应用程序时，你可以通过在一个`集群`中创建 `Pod` 的多个副本（称为副本集）来水平伸缩应用程序。通过在`集群`的`节点`上启动更多
    `Pod` 并利用额外的`集群`容量，伸缩 `Pod` 副本使应用程序能够支持更大的工作负载。此外，在`集群`中跨多个`节点`运行 `Pod` 的多个副本，可以在
    `Pod` 或`节点`发生故障时提供高可用性。


    `Pod` 是短暂的。如果一个 `Pod` 被删除，其所在`节点`上的容器会被停止然后删除。它连同其可写层会被永久销毁。`Pod` 永远不会被重新部署。相反，`Kubernetes`
    会根据当前的 `Pod` `API` 对象定义创建一个新的 `Pod`。这两个 `Pod` 部署之间不维护任何状态。对于像 Web 应用程序这样的无状态工作负载，这没问题。当新的
    `Pod` 被创建并准备好时，它们就可以开始接收工作负载。但是对于像关系型数据库系统这样的有状态工作负载，`Pod` 需要能够独立于其生命周期，持久化存储在其数据库中的数据状态。`Kubernetes`
    为我们提供了用于持久化存储的 `API` 对象和结构，这将在本章后面描述。


    #### `控制器`


    `控制器`定义、监控工作负载，并使工作负载和`集群`的运行状态保持在期望状态。本节重点介绍用于创建和管理 `Pod` 的`控制器`。在 `Kubernetes`
    中，很少通过手动定义和部署 `Pod` 对象来创建 `Pod`。两种常见的工作负载 `API` 对象用于在 `Kubernetes` 中部署应用程序。它们是
    `Deployment` 和 `StatefulSet`。


    `Deployment` 是一个 `API` 对象，它使你能够在 `Pod` 的配置中定义应用程序的期望状态，并包括要创建的 `Pod` 数量（称为副本）。`Deployment`
    控制器会创建一个 `ReplicaSet`。`ReplicaSet` 负责在`集群`中启动 `Pod`，它使用来自 `Deployment` 对象的 `Pod`
    规范。图 1-1 的第一帧显示了一个 `Deployment`，它创建了一个 `ReplicaSet`，而该 `ReplicaSet` 在`集群`中启动了三个
    `Pod`。


    ![](img/505695_2_En_1_Fig1_HTML.jpg)


    图 1-1


    `ReplicaSet` 操作


    `控制器`负责使`集群`的运行状态保持在期望状态，那么让我们看看这是如何运作的。在图 1-1 的第二帧中，假设其中一个 `Pod` 因任何原因发生故障。也许是应用程序崩溃了，或者甚至是运行该
    `Pod` 的`节点`变得不可用。在第三帧中，`ReplicaSet` 控制器感知到运行状态已偏离期望状态，并启动创建一个新的 `Pod`，确保 `ReplicaSet`（或应用程序）始终保持在有三个
    `Pod` 在运行的期望状态。


    你可能会问，为什么 `Deployment` 控制器要创建一个 `ReplicaSet`，而不是让 `Deployment` 直接创建 `Pod` 呢？`Deployment`
    控制器既定义了要创建的 `Pod` 数量，也定义了 `Pod` 的配置。当 `Deployment` 配置更新时，旧 `ReplicaSet` 中的 `Pod`
    会被关闭，同时在新 `ReplicaSet` 中创建 `Pod`。这使得新的容器镜像或 `Pod` 配置能够滚动更新。单个 `Deployment` 对象仍然存在，并且它管理着声明式更新以及
    `ReplicaSet` 之间的过渡。如果你想深入了解这个主题，可以查看 `Pluralsight` 的课程“管理 `Kubernetes` `控制器`和`部署`”。


    `Deployment` 控制器不保证 `Pod` 的顺序或持久命名。一个 `Deployment` 由一组 `Pod` 组成，每个 `Pod` 都是应用程序的精确副本。然而，如果一个
    `Pod` 被销毁并在其位置创建了一个新 `Pod`，则 `Pod` 的名称不是持久的。像数据库系统这样的应用程序通常将数据分布在多个计算元素上，然后必须跟踪数据在系统中的位置以供后续检索。对于需要知道命名计算资源集合中数据确切位置的有状态应用程序，使用
    `Deployment` 控制器可能会有问题。


    为了允许 `Kubernetes` 支持这类有状态应用程序，`StatefulSet` 控制器创建的每个 `Pod` 都具有唯一、持久且有序的名称。因此，需要跨多个
    `Pod` 控制数据放置的应用程序可以做到这一点，因为 `Pod` 名称是有序的，并且独立于该 `Pod` 的生命周期而持久存在。此外，`StatefulSet`
    为应用程序提供稳定的存储，确保如果因任何原因必须重新创建同名 `Pod`，正确的存储对象仍能映射到它。

