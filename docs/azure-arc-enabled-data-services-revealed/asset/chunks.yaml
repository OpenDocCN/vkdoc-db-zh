  trans: '

    ## Azure Arc 支持的数据服务管理功能


    在 Arc 管理控制平面内部，部署了一个 `Data Controller` 和本地可用的管理功能。在本节中，我们将逐一介绍这些核心要素。图 2-6 突出显示了作为部署在本地
    `Kubernetes Cluster` 内的这些管理功能。


    ![](img/505695_2_En_2_Fig6_HTML.jpg)


    图 2-6


    Azure Arc 管理控制平面在你的本地 `Kubernetes Cluster` 中实现了许多核心管理和运维功能。


    *   `Controller Service`：这是你的 `Kubernetes Cluster` 中可用的管理端点，负责处理管理操作。

    *   `API`：`Data Controller` 暴露一个 `API`，可与你的 `Kubernetes Cluster` 交互以执行管理操作，例如导出性能、日志或使用数据以上传到
    Azure。部署操作通过 `Kubernetes API` 直接完成，或使用前述部署工具完成，这些工具随后与 `Kubernetes API` 交互。

    *   `Provisioning`：`Data Controller` 与 `Kubernetes API` 协调预配操作。当使用 `Kubernetes`
    原生工具或 Azure 数据服务工具（如 `Azure Data Studio` 和 `azure-cli`）时，预配操作直接提交给 `Kubernetes
    API`，然后发送到底层 `Kubernetes Cluster` 以部署新工作负载和配置状态变更。`Data Controller` 监控针对 `Custom
    Resources`（如 `SQL Managed Instance` 和 `Postgres`）的预配请求，并与 `Kubernetes API` 协调以预配构成所部署
    `Custom Resource` 的支持性 `Kubernetes` 原生对象，例如 `StatefulSets`、`Services` 等。

    *   `Dashboards`：管理仪表板在 `Azure Data Studio` 中可用。这些仪表板提供有关已部署数据服务和 `Data Controller`
    本身当前状态的信息。

    *   `Metrics`：`Grafana` 用于暴露你的 `Cluster` 中多个层级的关键性能指标，包括 `PostgreSQL Hyperscale`
    和 `SQL Server Managed Instance` 特定的仪表板。`Grafana` 作为部署在你的 `Cluster` 中的 Web 门户提供。

    *   `Logging`：`Kibana` 用于聚合 `Cluster` 中产生的日志并提供搜索功能。多个资源正在将日志数据流式传输到 `Kibana`，包括已部署的
    `SQL Managed` 和 `PostgreSQL Hyperscale` 实例。`Kibana` 作为部署在你的 `Cluster` 中的 Web 门户提供。

    *   `Managed Backup and Restore`：备份和还原自动化由 `Data Controller` 控制。每个 Azure Arc 支持的
    `SQL Managed Instance` 都带有一个内置的自动备份功能，默认启用。这意味着每个创建或还原的数据库将自动接收一个初始完整备份，然后是按计划进行的差异备份和事务日志备份。此概念与
    Azure `SQL Managed Instance` 中的托管备份非常相似，并允许你在保留期内的任何特定时间点执行还原。

    *   `High Availability`：`Kubernetes` 为控制器（如 `ReplicaSets` 和 `StatefulSets`）管理的工作负载提供了基本的高可用性。如果由这些控制器之一控制的
    `Pod` 发生故障，将在 `Cluster` 中创建一个新的 `Pod` 来替换失败的 `Pod`。对于可能需要 `Cluster` 内 `Pod` 协调故障转移事件的高级场景，`Data
    Controller` 可以促进此应用程序感知的故障转移事件。


    ### 数据服务层：深入探讨


    随着所有必需的基础设施（硬件、`Kubernetes` 和 `Data Controller`）就位，现在是时候关注数据服务层了。这一层是在你的环境中（无论是在本地还是在任何云中）部署传统上基于
    PaaS 的数据服务的地方，例如你在 Azure 云中看到的那些服务。本节将深入探讨当前每个可用的数据服务，即 Azure Arc 支持的 `SQL Managed
    Instance` 和 Azure Arc 支持的 `PostgreSQL Hyperscale`，审视它们的能力和价值。

    '
- fmt: '#### Azure Arc-enabled SQL Managed Instance


    Azure Arc-enabled SQL Managed Instance is your lift-and-shift version of SQL Server.
    It enables you to move workloads seamlessly into Azure Arc as it provides a high
    level of compatibility with on-premises installations of SQL Server, which is
    documented as nearly 100% compatible. This means that to move your databases from
    their current on-premises implementations into Azure Arc-enabled SQL Managed Instance
    will require little to no database changes. When deploying an Azure Arc-enabled
    SQL Managed Instance, you can take a backup from an on-premises version of SQL
    Server and restore that backup directly to an Azure Arc-enabled SQL Managed Instance.


    Tip

    Following [https://docs.microsoft.com/en-us/azure/azure-arc/data/managed-instance-features#Unsupported](https://docs.microsoft.com/en-us/azure/azure-arc/data/managed-instance-features%2523Unsupported),
    you will find the list of unsupported features and services for `Azure Arc-enabled
    SQL Managed Instance`.


    A feature of `Azure Arc-enabled SQL Managed Instance` is that it is `always current`.
    (You may also see the term “evergreen SQL” used.) Similar to the always current
    or evergreen SQL offerings available in Azure PaaS Services such as `Azure SQL
    Managed Instance` in Azure Cloud-hosted deployments, Microsoft will continuously
    updated SQL Managed Instance container images to the Microsoft Container Registry
    for `Azure Arc-enabled SQL Managed Instance`. Then, based on update policies defined
    in your deployment, you can specify how often and when the updates are applied
    to your environment. In traditional implementations of SQL Server, managing updates
    is a challenging and time-consuming process. Kubernetes provides the ability to
    absorb updates and change quickly and roll it out into the Cluster. This is the
    updated model used in `Azure Arc-enabled Data Services`.


    `Azure Arc-enabled SQL Managed Instance` comes in two service tiers, `General
    Purpose` and `Business Critical`. As defined in Microsoft’s documentation, `General
    Purpose` is a budget-friendly tier designed for most workloads with basic performance
    and availability. The `Business-Critical` tier is designed for performance-sensitive
    workloads with higher-availability requirements.


    The `General-Purpose` service tier is now generally available. Its SQL Server
    feature set is the same as the standard edition with limitations on the number
    of cores and the amount of addressable memory an `Azure Arc-enabled SQL Managed
    Instance` can use – a maximum of up 24 CPU cores and 128GB of memory. This also
    this leads us to the next key point about `Azure Arc-enabled SQL Managed Instance`,
    `high availability`. In the `General-Purpose` service tier, `Azure Arc-enabled
    SQL Managed Instance` is deployed as a single SQL Server instance running in a
    `Pod` controlled by a `StatefulSet`. As discussed previously, a `StatefulSet`
    provides basic failover capabilities in an application or `Node` failure event.
    If there is a failure, the previous `Pod` is deleted, and a new `Pod` is created
    in its place. The recovery time for these failure scenarios can be very short.


    Tip

    When a `Pod` running SQL Server Managed Instance is created, it must run crash
    recovery on startup. Consider using Accelerated Data Recovery to reduce SQL Server
    Managed Instance startup time. For more details, go to [https://docs.microsoft.com/en-us/sql/relational-databases/accelerated-database-recovery-concepts](https://docs.microsoft.com/en-us/sql/relational-databases/accelerated-database-recovery-concepts).


    To ensure high availability in this single-instance implementation, external,
    shared storage should be used and made available to all `Nodes` in the Cluster.
    In the event of a `Node` failure, they can be started elsewhere in the Cluster,
    and the `Persistent Volume` can then be mounted and made available to the new
    `Pod`.


    `Azure Arc-enabled SQL Managed Instance` uses `Kubernetes Services` for a persistent
    access endpoint. As highlighted in Figure 2-7, applications and users that need
    access to the SQL Managed Instance deployed in Kubernetes will point to the IP
    or DNS Name and the defined Port for access into the database instance. This `Service`
    is independent of the life cycle of the `Pod`, and if the `Pod` dies and is created
    again elsewhere in the Cluster, the `Service` is updated and will send the traffic
    to the new `Pod` automatically.


    ![](images/505695_2_En_2_Chapter/505695_2_En_2_Fig7_HTML.jpg)


    ### Figure 2-7

    A typical deployment of an `Azure Arc-enabled SQL Managed Instance` running in
    a Kubernetes Cluster


    In Kubernetes, when you update a container image or make a `Pod` configuration
    change, the current `Pods` are deleted and new `Pods` are created using the updated
    container image or updated configuration. This is a very quick operation, but
    this can result in a small downtime, which may be unacceptable in some scenarios.
    In `Azure Arc-enabled Data Services`, the data services deployed are updated using
    this same model, so there is a small period of downtime when an update is rolled
    out for a deployed data service.


    The `Business-Critical` service tier as shown in Figure 2-8 provides the SQL Server
    feature set of the enterprise edition with OS limits for the number of cores and
    the amount of addressable memory. In this service tier, high availability is provided
    by an `Availability Group`, where there are replicated copies of databases across
    multiple `Nodes` in the Kubernetes Cluster. The downtime is limited to the duration
    of the failover. Further, this `Availability Group` can be used for read scale-out
    operations.


    ![](images/505695_2_En_2_Chapter/505695_2_En_2_Fig8_HTML.jpg)


    ### Figure 2-8

    Business-Critical service tier: collocated compute and storage


    For more information on the service tiers, please see this link: [https://docs.microsoft.com/en-us/azure/azure-arc/data/service-tiers](https://docs.microsoft.com/en-us/azure/azure-arc/data/service-tiers).


    A benefit of the cloud is `elastic scale` enabling you to add capacity to an environment
    on demand and take advantage of that additional capacity as quickly as possible.
    `Azure Arc-enabled SQL Managed Instance` deployments are no different. If needed,
    you can add additional compute and memory capacity to a deployment of SQL Managed
    Instance by adjusting the assigned CPU and memory resources assigned to that deployment.
    Further, using the basic high-availability constructs of Kubernetes, this change
    is rolled out nearly immediately. The deployment is updated, and it creates a
    new `Pod` with this new configuration, and the SQL Managed Instance can use this
    additional scale-up capacity.'
