- fmt: '#### StatefulSet概述

    Figure 1-2 shows an example of a running StatefulSet. This example StatefulSet
    is defined as having three replicas and creates three Pods. Each Pod it creates
    has a unique ordered name, `sql-0`, `sql-1`, and `sql-2`. The first Pod created
    in a StatefulSet always starts with an index of 0. In this example, that’s `sql-0`.
    For each Pod added to the StatefulSet, the index is increased by one. So, the
    next Pod is `sql-1`, followed by `sql-2`. If the StatefulSet is scaled up to add
    one more Pod, the next Pod is named `sql-3`. If the StatefulSet is scaled down,
    then the highest numbered Pod is removed first. In this example, `sql-3` is removed.
    These ordered creation and scaling operations are essential to stateful applications
    that place data on named compute resources enabling the stateful applications
    to know the location of data at any point in time.


    ![](images/505695_2_En_1_Chapter/505695_2_En_1_Fig2_HTML.jpg)

    Figure 1-2


    An example StatefulSet – each Pod has a unique, ordered, and persistent name.
    Each Pod also has persistent storage associated


    In Azure Arc-enabled Data Services, you will find that both SQL Server Managed
    Instance and PostgreSQL HyperScale use the `StatefulSet` API Object to provide
    consistent, ordered naming of Pods and the associated persistent storage.


    There are many more Controllers available in Kubernetes. This book focuses on
    `Deployments`, `ReplicaSets`, and `StatefulSets` and how they are used to deploy
    Azure Arc-enabled Data Services. There are Controllers to help craft many different
    types of application workloads in Kubernetes. For more information on different
    controller types and their functions, check out the Kubernetes documentation at
    [https://kubernetes.io/docs/concepts/workloads/](https://kubernetes.io/docs/concepts/workloads/).


    #### Services

    As we introduced earlier, no Pod is ever recreated. Every time a Pod is created,
    either during its initial creation or when replacing an existing Pod, that new
    Pod is assigned a new IP at startup. With Controllers creating and deleting Pods
    based on configuration, or responding to failures, and affecting the desired state,
    this leaves us with the challenge of which IP address should be used to access
    application services provided by Pods running in a Cluster since Pods are assigned
    an IP address during startup.


    Kubernetes provides a networking abstraction for access to Pod-based applications
    deployed in a Cluster called a `Service`. A `Service` is a persistent IP address
    and optionally a DNS name for access into an application running on Pods in a
    Cluster. Generally speaking, you will have one `Service` per application deployed
    in a Cluster. Application traffic received on the `Service`’s IP is load balanced
    to the underlying Pod IP addresses. As Pods are created and destroyed by Controllers,
    such as a `ReplicaSet` Controller, the network information is automatically updated
    to represent the application’s current state. Let’s look at an example of this.


    In Figure 1-3, let’s say a `Deployment` creates a `ReplicaSet`, and the `ReplicaSet`
    creates three Pods. Each of those Pods has a unique IP address on the network.
    For users or applications to access the applications in those Pods, a `Service`
    is defined. A `Service` exposes the applications running in a collection of Pods
    on a persistent IP address and Port, port 80 for HTTP. Users or other applications
    can access the application provided by that `Service` by connecting to the `Service`
    IP address or DNS name. The `Service` then load balances that traffic among the
    Pods that are part of the `Service`.


    ![](images/505695_2_En_1_Chapter/505695_2_En_1_Fig3_HTML.jpg)

    Figure 1-3


    ReplicaSet and Services


    In the second frame of Figure 1-3, let’s say one of the Pods in the `ReplicaSet`
    fails. The `ReplicaSet` Controller senses this and deploys a new Pod and registers
    that new Pod’s IP address in the `Service` and starts load balancing to the new
    Pod. The Pod that fails is deleted, and its IP address is removed from the `Service`,
    and traffic is no longer sent to that IP. This all happens automatically without
    any user interaction.


    Further, when scaling an application up and adding more Pods or scaling an application
    down by removing some Pods, the Pod IPs are added or removed from the `Service`
    accordingly. It truly is a fantastic piece of technology, and we get very excited
    when we see this in action.


    There are three types of `Services` available in Kubernetes, all of which can
    be used by Azure Arc-enabled Data Services to access applications running in Kubernetes.
    The service types are `ClusterIP`, `NodePort`, and `LoadBalancer`. Let’s look
    at each in more detail:


    *   **`ClusterIP`**: `ClusterIP` `Services` are available *only* inside the Cluster.
    This type of `Service` is used when an application does not need to be exposed
    outside the Cluster.


    *   **`NodePort`**: A `NodePort` `Service` exposes your application on each Node’s
    real IP address in your Cluster on a fixed port. `NodePort` `Services` are accessed
    using the real network IP addresses of Cluster Nodes combined with the service
    port. Received traffic is routed to the appropriate Pods supporting the `Service`.
    `NodePort` `Services` are used when Cluster-based applications need to be accessed
    outside the Cluster or integrated with external load balancers.


    *   **`LoadBalancer`**: This service type integrates cloud provider’s load balancer
    service, or a Cluster external load balancer deployed on-premises such as an F5.
    A `Service` of type `LoadBalancer` is used in cloud-based scenarios when Cluster-based
    applications need to be accessed outside the Cluster.


    #### Storage

    As data professionals, our number one job is keeping data around. And Kubernetes
    has API Objects to enable the Deployment of stateful applications, like relational
    database systems. There are two primary API Objects available to help with this,
    `Persistent Volumes` and `Persistent Volume Claims`.


    A `Persistent Volume` is a storage device available in a Cluster defined by a
    Cluster administrator available for Pods’ consumption. There are many different
    types of storage available as `Persistent Volumes` such as virtual disks from
    cloud providers, iSCSI, NFS, and many more. The implementation details are in
    the `Persistent Volume` object. The specific implementation details depend upon
    the type of storage you want to access. For example, if you want to configure
    access to an NFS share, you will specify the IP address and export name of the
    NFS share in the `Persistent Volume` object.


    Pods do not access the `Persistent Volume` object directly. A Pod uses a `Persistent
    Volume Claim` in the Pod Object definition to request `Persistent Volume` access
    and capacity. The `Persistent Volume Claim` will request storage from the Cluster,
    and then the `Persistent Volume Claim` will make a claim on the `Persistent Volume`
    and mount the `Persistent Volume` into the Pod file system. This extra layer of
    abstraction decouples the Pod from the storage implementation details of the `Persistent
    Volume`. This has the primary benefit of not having storage implementation details,
    such as infrastructure-specific storage parameters, as part of the Pod’s definition.'
