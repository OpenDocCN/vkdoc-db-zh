- fmt: '## Installation Considerations and Methods


    As with pretty much any modern software installation, the first thing you need
    to decide is: Will you be installing on-premises or to a cloud?


    ### Where to Deploy?


    When deploying to a cloud, you need to choose between two major deployment options:


    *   **Infrastructure as a Service (IaaS)**: In an `IaaS` scenario, you''re deploying
    `virtual machines` within your cloud and then installing Kubernetes on top of
    that.

    *   **Platform as a Service (PaaS)**: Kubernetes is also available as a managed
    service from all the big cloud providers. In a managed service offering, you don''t
    have to worry about any of the underlying infrastructure or redundancy. The cloud
    provider handles that for you. One thing to consider with `PaaS` is that you will
    lose some flexibility in versioning and other features available inside Kubernetes
    and the access to the Control Plane Nodes. When deploying on-premises, the decision
    comes down to installing on virtual machines or directly on `bare metal`. While
    there are managed offerings available on-premises, those are out of the scope
    of this book.


    The decision between `bare metal` and `virtual machines` as your Nodes mainly
    depends on your anticipated workload. If you''re talking about many scalable microservices,
    Kubernetes Nodes running on VMs will probably give you a lot of extra flexibility.
    If you''re deploying one single large application, the hypervisor in between will
    require unnecessary overhead. You may be wondering: If you''re only running a
    single application, is Kubernetes even the best platform for this? As so often,
    the answer is: it depends! While they often warrant dedicated infrastructure,
    they only deploy on Kubernetes.


    In this book, we will be focusing on an environment using self-managed (on-premises
    or cloud-based Infrastructure-as-a-Service) virtual machines. It doesn''t matter
    if you installed those machines as VMs in the cloud, on-premises, or on bare metal,
    as Kubernetes abstracts the infrastructure away.


    Going forward, looking at where to install a potential production Cluster, that
    question should follow your organization''s general strategy. If all you do so
    far is still on-premises, it might make perfect sense for your Kubernetes Cluster
    to live there. If, on the other hand, you''re in the process of or already have
    migrated significant workloads to the cloud, your Kubernetes Cluster probably
    should follow. In the end, this comes down to your team''s skill set and the requirements
    of your use cases to run on Kubernetes.


    ### Further Considerations


    Besides the *where* question, there are, of course, other considerations of which
    we''ll be talking about in more depth throughout this chapter and the remainder
    of the book:


    *   How many Worker Nodes do you need to support your workload?

    *   What''s the CPU and RAM configuration of those Nodes?

    *   Do you need a highly available solution in case the Control Plane fails?

    *   What is your backup and restore strategy?

    *   What kind of storage(s) are you going to use?

    *   How are you going to manage networking between Pods and Nodes?


    While we''re at the beginning of your Kubernetes journey, those are all questions
    that you should have an answer to before considering a rollout of a production
    system.


    ### Installation Methods


    Depending on where you''re installing, this will also, for the most part, determine
    your installation method. When installing a self-managed Cluster, you can choose
    mainly between `kubeadm`, which is a free and open source way of deploying Kubernetes
    on `Linux`, and enterprise offerings like RedHat OpenShift. The installation itself
    is usually triggered through command-line tools.


    When installing a cloud-based Cluster, your cloud provider will take care of the
    installation part with the exact details behind the scenes being determined by
    your cloud provider. They usually offer their own command-line-based approaches
    and web portals for a guided deployment.


    ### Additional Options


    There are many additional options like using `Docker` Desktop to spin up a Kubernetes
    Cluster on your laptop or using lightweight hardware like a Raspberry Pi as your
    deployment target. While they may have valid use cases, especially in non-production
    environments, we will not go into depth on these in this book.


    Also, while there are options to use Windows-based Worker Nodes, we will be focusing
    on using `Linux` as our operating system.


    We also will not be going through the details of deploying a Single Node Cluster.
    If you only have a single `Ubuntu` machine available, you can use the code in
    Listing 4-1. This code will spin up a Single Node Cluster, including `local-storage`,
    but this will not be sufficient for most of the exercises in this book, except
    for the most basic ones.


    ```

    wget -q -O deploy_kubeadm.sh https://bookmark.ws/ArcDemo_Linux

    chmod +x deploy_kubeadm.sh

    ./deploy_kubeadm.sh

    Listing 4-1

    Install Single Node Cluster

    ```


    ## Installation Requirements


    For a self-managed Kubernetes installation, we will be focusing on `kubeadm` on
    `Linux`, more specifically `Ubuntu`. While CentOS, RHEL, and other Linux distributions
    are also supported, we just had to decide on one environment, and Ubuntu seems
    to be the most common choice these days.


    The bare minimum system requirements are a system with two CPUs, 2GB of RAM, and
    swap disabled. These are the minimum requirements for a Kubernetes cluster to
    run, not accounting for the workloads running on the Cluster. In a production
    environment, you must ensure that you have accounted for your workload deployed
    and the scalability and redundancy.


    In addition to those base system requirements, you''ll also need a CRI (Container
    Runtime Interface) container runtime. The de facto standard is `containerd`. As
    Docker has been deprecated in Kubernetes 1.20 and its support has been removed
    in Kubernetes version 1.23, we will mainly focus on `containerd` in this book.'
