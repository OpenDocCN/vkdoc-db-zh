  trans: '

    ## 服务器组的横向扩展


    如果您想通过添加更多工作节点来横向扩展一个现有的服务器组，这可以——您猜对了——通过另一个简单的 `azure-cli` 命令来实现，类似于列表 8-3 中的命令。


    ```

    az postgres arc-server edit --k8s-namespace arc --use-k8s -n pg-1 -w 8

    列表 8-3

    用于修改服务器组工作节点数量的 azure-cli 命令

    ```


    这将更新现有的服务器组，同时保持其在线，因此服务对于查询仍然可用。一旦 Postgres 工作节点准备就绪，数据将由 Hyperscale 分片再平衡器自动重新分配到这些新节点上。


    在更新运行期间，受影响的服务器组在服务器列表中将显示为“正在更新”（参见列表 8-4 和图 8-5）。


    ![](img/505695_2_En_8_Fig5_HTML.jpg)


    图 8-5


    当前控制器中的 PostgreSQL Hyperscale 服务器组列表


    ```

    az postgres arc-server list --k8s-namespace arc --use-k8s -o table

    列表 8-4

    用于列出当前控制器中所有 PostgreSQL Hyperscale 服务器组的 azure-cli 命令

    ```


    用于重新调整组规模的编辑命令将在更新完成且新工作节点准备就绪后报告结果，如图 8-6 所示。


    ![](img/505695_2_En_8_Fig6_HTML.jpg)


    图 8-6


    服务器组成功重新扩展后的输出


    新的工作节点会显示为独立的 Pod（使用 `kubectl`，见图 8-7），与现有的控制节点和工作节点并存。


    ![](img/505695_2_En_8_Fig7_HTML.jpg)


    图 8-7


    Postgres 工作 Pod


    这一变化也反映在 Azure Data Studio 中服务器组的管理页面上，如图 8-8 所示。如您所见，这也显示了五个节点的配置——同样是我们 PostgreSQL
    Hyperscale 服务器组中的控制器和四个工作节点。


    ![](img/505695_2_En_8_Fig8_HTML.png)


    图 8-8


    PostgreSQL Hyperscale 服务器组管理页面


    注意

    工作节点的数量只能向上扩展；您无法缩减现有的组！为此，您需要部署一个新的服务器组并备份/恢复您的数据。


    ## 移除已部署的服务器组


    要移除已部署的 Postgres 服务器组，您可以使用列表 8-5 中所示的 `az` 命令。


    ```

    az postgres arc-server delete --k8s-namespace arc -n pg-1 --use-k8s

    列表 8-5

    用于删除现有 PostgreSQL Hyperscale 服务器组的 azure-cli 命令

    ```


    或者，您也可以从 Azure Data Studio 中组的仪表板删除该组，如图 8-9 所示。


    ![](img/505695_2_En_8_Fig9_HTML.jpg)


    图 8-9


    在 ADS 中删除现有 PostgreSQL Hyperscale 服务器组的按钮


    两种方式都可以用来删除现有的实例。


    注意

    就像我们的 SQL 托管实例一样，删除服务器组不会删除其持久卷声明。一旦您确定不再需要数据，您将需要再次通过 `kubectl` 手动删除这些声明。


    ## 总结与关键要点


    到目前为止，我们已经了解了 Azure Arc 启用的数据服务的概念和产品，并向其部署了不同的数据实例。在接下来的最后一章中，我们将探讨如何管理和监控我们服务的性能，如何分析其日志文件，以及如何将其升级到新版本。


    ## 9. 监控与管理


    到目前为止，我们已经介绍了 Azure Arc 启用的数据服务的架构以及部署它们所需的步骤。


    在这最后一章中，我们将重点介绍如何通过利用本地管理服务以及 Azure 的管理功能来监控您的 Azure Arc 启用的数据服务，以及如何升级现有安装。


    ### 通过数据控制器进行监控


    监控 Azure Arc 启用的数据服务的一种方式是通过两个内置仪表板：Grafana 仪表板和 Kibana 仪表板。当您没有常规或稳定的连接允许您定期将遥测数据同步到
    Azure 门户时，使用内置仪表板特别方便。正如我们在第 2 章中提到的，这些将在部署数据控制器时本地部署到您的 Kubernetes 集群。


    #### 获取端点


    要获取仪表板的 URL，您需要获取它们的端点。您可以通过 `az` 使用列表 9-1 中的命令来获取。


    ```

    az arcdata dc endpoint list -o table -k arc

    列表 9-1

    用于检索控制器端点列表的 azure-cli 命令

    ```


    或者，Azure Data Studio 中每个数据实例的管理页面都将有一个深度链接，指向该实例预过滤的仪表板，如图 9-1 所示。


    ![](img/505695_2_En_9_Fig1_HTML.png)


    图 9-1


    ADS 中其管理页面上 Arc SQL 托管实例的门户端点


    #### 指标（Grafana 仪表板）


    Grafana 门户提供有关其实例状态的指标和洞察。登录门户的凭据与您在 Azure Data Studio 中连接到集群时使用的凭据相同。


    如图 9-2 所示的 SQL 托管实例指标提供了 SQL Server 特定的性能指标，其中许多是 DBA 已经熟悉的。


    ![](img/505695_2_En_9_Fig2_HTML.png)


    图 9-2


    Grafana 门户 – SQL MI 指标


    统计数据展示了等待时间、按等待类型排序的等待任务数量、每秒事务和请求数以及其他有价值的指标。它们有助于了解集群内特定 SQL MI 的状态，该状态可以在屏幕左上方选择。


    当前在预配置的 Grafana 门户中可用的其他仪表板如图 9-3 所示。


    ![](img/505695_2_En_9_Fig3_HTML.jpg)


    图 9-3


    Grafana 门户中的内置仪表板


    #### 日志搜索分析（Kibana）


    另一方面，如图 9-4 所示的 Kibana 仪表板，让您能够深入了解所选实例的 Kubernetes 日志文件。


    ![](img/505695_2_En_9_Fig4_HTML.png)


    图 9-4


    Kibana 门户 – 概述


    Kibana 是 Elastic Stack 的一部分。它还提供选项，可在您的日志文件之上创建可视化效果和仪表板。如果您想了解更多关于它的信息，其网站 [www.elastic.co/products/kibana](http://www.elastic.co/products/kibana)
    是一个很好的起点！


    ### 通过 Azure 门户进行监控


    Arc 的优势之一是能够通过单一管理界面管理您的整个资产，如果您的连接允许，我们强烈建议将您的部署链接到 Azure 门户。这不会剥夺您使用 Grafana
    和 Kibana 的选项，因此请将其视为一个非常有价值的附加功能。


    #### 直接连接模式


    在直接连接模式下，您的日志文件和指标默认会自动上传并同步到 Azure 门户。


    #### 间接连接模式


    在间接连接模式下，您需要先将集群日志和指标导出到一个文件，然后定期上传此文件。如果需要，这个过程也可以计划和自动化，以确保您的遥测数据定期与 Azure 门户同步。

