    (see Figure [8-2](#505695_2_En_8_Chapter.xhtml#Fig2)). These Nodes are independent
    from the Kubernetes Nodes!


    ![](images/505695_2_En_8_Chapter/505695_2_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Postgres Pods


    ## Deployment Through Azure Data Studio


    Of course, deployment through Azure Data Studio is also an option again. In the
    wizard as shown in Figure [8-3](#505695_2_En_8_Chapter.xhtml#Fig3), simply pick
    the PostgreSQL option instead.


    ![](images/505695_2_En_8_Chapter/505695_2_En_8_Fig3_HTML.png)


    Figure 8-3


    Instance deployment wizard in ADS


    The following screen will check for the prerequisites again, followed by (see
    Figure [8-4](#505695_2_En_8_Chapter.xhtml#Fig4)) collecting the PostgreSQL Hyperscale
    Server Group-specific settings. Just like when deploying our SQL Managed Instance
    before, we will need to provide a name for this PostgreSQL Hyperscale Server Group
    and a password. The username is defaulted to *postgres,* so this setting won’t
    be required. A PostgreSQL Hyperscale Server Group requires you to provide the
    number of workers. It is defaulted to 0 which would deploy a one-Node PostgreSQL
    Hyperscale Server Group, the TCP Port, as well as your Storage Classes, storage
    sizes, and CPU and memory requests and limits. As we’ve mentioned in Chapter [1](#505695_2_En_1_Chapter.xhtml),
    these settings will define on how many resources this specific deployment will
    allocate on your Kubernetes Cluster.


    ![](images/505695_2_En_8_Chapter/505695_2_En_8_Fig4_HTML.png)


    Figure 8-4


    Postgres-specific settings


    This will result in the option of deploying this right away or to create a notebook
    which, when run, will create the new server group.'
  trans: '## 删除已部署的托管实例


    如果要删除已部署的现有托管实例，可以通过其在 Azure Data Studio 中的管理页面进行操作，如图 7-30 所示。


    ![](img/505695_2_En_7_Fig30_HTML.jpg)


    图 7-30


    ADS 中现有 SQL MI 的删除按钮


    在实例被删除之前，系统会提示您确认，需要键入实例的名称（参见图 7-31）。


    ![](img/505695_2_En_7_Fig31_HTML.png)


    图 7-31


    在 ADS 中删除现有 SQL MI 的确认对话框


    或者，您可以使用另一个 `az` 命令，如清单 7-16 所示。


    ```

    az sql mi-arc delete -n  -k arc --use-k8s

    清单 7-16

    用于删除现有 SQL MI 的 azure-cli 命令

    ```


    此后，很快会收到一条确认消息，类似于图 7-32 中的内容。


    ![](img/505695_2_En_7_Fig32_HTML.jpg)


    图 7-32


    删除现有 SQL MI 命令的输出


    注意


    通过 CLI 删除实例时，不会出现额外的提示或警告。


    删除实例时，只会移除其 Pod，而不会删除实例所使用的存储（持久卷声明，Persisted Volume Claims）。要同时删除这些存储，我们必须先使用
    `kubectl` 识别受影响的 PVC，如清单 7-17 所示。


    ```

    kubectl get pvc -n  -l  -o name

    清单 7-17

    基于标签列出实例 PVC 的 kubectl 命令

    ```


    这将返回此实例使用的 PVC 列表（参见图 7-33）。此命名方案取决于所使用的存储供给器。我们示例中的名称来自本地存储供给器，因此如果您使用不同的存储子系统，您的名称可能看起来不同。


    ![](img/505695_2_En_7_Fig33_HTML.jpg)


    图 7-33


    实例的 PVC 列表


    使用这些 PVC 的名称，然后我们可以使用另一个 `kubectl` 命令（参见清单 7-18）来删除它们。


    ```

    kubectl delete pvc -n  -l  -o name

    清单 7-18

    基于标签删除 PVC 的 kubectl 命令

    ```


    删除操作也会得到 `kubectl` 的确认，当回头检查此实例是否还有任何剩余声明时，我们可以从图 7-34 中看出，不应再有任何遗留。


    ![](img/505695_2_En_7_Fig34_HTML.jpg)


    图 7-34


    检查所有 PVC 是否已删除的输出


    ## 总结与要点回顾


    在本章中，我们构建 Kubernetes 集群和数据控制器的努力得到了回报，因为我们能够使用 Azure Arc 启用的 SQL 托管实例在 Arc 中部署和使用第一个实际的数据服务。


    在下一章中，我们将了解在部署 Azure Arc 启用的 PostgreSQL 超大规模实例时，此过程是什么样子。


    # 8. 部署 Azure Arc 启用的 PostgreSQL 超大规模实例


    第 7 章处理的是 Azure Arc 启用的 SQL 托管实例，本章将指导我们完成在处理 PostgreSQL 超大规模实例时所需的步骤。


    ## 通过命令行部署


    与 Azure Arc 启用的 SQL 托管实例一样，一个新的 PostgreSQL 超大规模服务器组可以通过一个简单的 `az` 命令进行部署，如清单 8-1
    所示。唯一必需的参数是服务器组的名称。


    ```

    az postgres arc-server create --name pg-1 --k8s-namespace arc --use-k8s

    清单 8-1

    用于创建新的 PostgreSQL 超大规模服务器组的 azure-cli 命令

    ```


    注意


    关于使用直接模式与间接模式以及 `--use-k8s` 开关的逻辑，与 SQL 托管实例的情况相同。


    尽管如此，如果您愿意，您仍然可以通过命令行开关完全控制部署的设置，如清单 8-2 所示。


    ```

    az postgres arc-server create --name pg-2 `

    --k8s-namespace arc --use-k8s `

    --storage-class-data local-storage `

    --storage-class-logs local-storage `

    --storage-class-backups local-storage `

    --workers 4 --port 5432 --engine-version 12 `

    --volume-size-data 5Gi --volume-size-logs 5Gi `

    --volume-size-backups 5Gi

    清单 8-2

    带参数的用于创建新的 PostgreSQL 超大规模服务器组的 azure-cli 命令

    ```


    无论哪种方式，`azure-cli` 都会提示您输入密码，除非您已经通过 `AZDATA_PASSWORD` 环境变量提供了密码，然后将继续进行部署，如图
    8-1 所示。每个 PostgreSQL 超大规模服务器组都有一个名为 `postgres` 的默认管理账户用户名，该名称不可配置。


    ![](img/505695_2_En_8_Fig1_HTML.jpg)


    图 8-1


    PostgreSQL 超大规模服务器组部署命令的输出


    除此之外，与 SQL 托管实例的部署没有区别。


    控制节点和工作节点显示为使用 `kubectl` 的独立 Pod（参见图 8-2）。这些节点独立于 Kubernetes 节点！


    ![](img/505695_2_En_8_Fig2_HTML.jpg)


    图 8-2


    Postgres Pod


    ## 通过 Azure Data Studio 部署


    当然，通过 Azure Data Studio 部署也是一个选项。在如图 8-3 所示的向导中，只需选择 PostgreSQL 选项即可。


    ![](img/505695_2_En_8_Fig3_HTML.png)


    图 8-3


    ADS 中的实例部署向导


    下一个屏幕将再次检查先决条件，然后（参见图 8-4）收集特定于 PostgreSQL 超大规模服务器组的设置。就像之前部署 SQL 托管实例一样，我们需要为这个
    PostgreSQL 超大规模服务器组提供一个名称和一个密码。用户名默认为 `postgres`，因此此设置不是必需的。PostgreSQL 超大规模服务器组要求您提供工作节点的数量。默认值为
    0，这将部署一个单节点的 PostgreSQL 超大规模服务器组、TCP 端口，以及您的存储类、存储大小和 CPU 与内存请求及限制。正如我们在第 1 章中提到的，这些设置将定义此特定部署将在您的
    Kubernetes 集群上分配多少资源。


    ![](img/505695_2_En_8_Fig4_HTML.png)


    图 8-4


    特定于 Postgres 的设置


    这将导致可以选择立即部署此服务器组，或者创建一个笔记本，该笔记本在运行时将创建新的服务器组。'
- fmt: '## Scale Up of a Server Group


    If you want to scale up an existing server group by adding more workers, this
    can be – you guessed it – achieved just by another small `azure-cli` command like
    the one in Listing [8-3](#505695_2_En_8_Chapter.xhtml#PC3).


    ```

    az postgres arc-server edit --k8s-namespace arc --use-k8s -n pg-1 -w 8

    Listing 8-3

    azure-cli command to modify a server group’s number of workers

    ```


    This will update the existing server group while keeping it online, so the service
    remains available for queries. Once the Postgres Worker Nodes are available, the
    data will automatically be redistributed to these new Nodes by the Hyperscale
    Shard Rebalancer.


    While an update is running, the affected server group will show as “Updating”
    in the server list (see Listing [8-4](#505695_2_En_8_Chapter.xhtml#PC4) and Figure
    [8-5](#505695_2_En_8_Chapter.xhtml#Fig5)).


    ![](images/505695_2_En_8_Chapter/505695_2_En_8_Fig5_HTML.jpg)


    Figure 8-5


    List of PostgreSQL Hyperscale Server Group in the current Controller


    ```

    az postgres arc-server list --k8s-namespace arc --use-k8s -o table

    Listing 8-4

    azure-cli command to list all PostgreSQL Hyperscale Server Group in the current
    controller

    ```


    The edit command used to rescale the group will report back once the update has
    finished and the new workers are ready as shown in Figure [8-6](#505695_2_En_8_Chapter.xhtml#Fig6).


    ![](images/505695_2_En_8_Chapter/505695_2_En_8_Fig6_HTML.jpg)


    Figure 8-6


    Output of successful rescaling of a server group


    The new workers show up as individual Pods using `kubectl` (see Figure [8-7](#505695_2_En_8_Chapter.xhtml#Fig7)),
    besides the existing Control Node and Worker Nodes.


    ![](images/505695_2_En_8_Chapter/505695_2_En_8_Fig7_HTML.jpg)


    Figure 8-7


    Postgres Worker Pods


    The change is also reflected on the server group’s management page in Azure Data
    Studio as shown in Figure [8-8](#505695_2_En_8_Chapter.xhtml#Fig8). As you can
    see, this is also showing a Node configuration of five Nodes – which are again
    the Controller and the four Worker Nodes within our PostgreSQL Hyperscale Server
    Group.


    ![](images/505695_2_En_8_Chapter/505695_2_En_8_Fig8_HTML.png)


    Figure 8-8


    PostgreSQL Hyperscale Server Group Management page


    Note


    The number of Worker Nodes can only be scaled up; you cannot scale down an existing
    group! For this, you’d need to deploy a new server group and back up/restore your
    data.


    ## Removing a Deployed Server Group


    To remove a deployed Postgres Server Group, you can use the `az` command shown
    in Listing [8-5](#505695_2_En_8_Chapter.xhtml#PC5).


    ```

    az postgres arc-server delete --k8s-namespace arc -n pg-1 --use-k8s

    Listing 8-5

    azure-cli command to delete an existing PostgreSQL Hyperscale Server Group

    ```


    Alternatively, you can also delete the group from the group’s dashboard in Azure
    Data Studio as shown in Figure [8-9](#505695_2_En_8_Chapter.xhtml#Fig9).


    ![](images/505695_2_En_8_Chapter/505695_2_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Button to delete an existing PostgreSQL Hyperscale Server Group in ADS


    Both ways can be used to delete an existing instance.


    Note


    Just like with our SQL Managed Instance, deleting the server group will not delete
    its Persistent Volume Claims. You will need to delete these manually through `kubectl`
    again once you’re sure you won’t need the data anymore.


    ## Summary and Key Takeaways


    So far, we went through the concepts and offerings of Azure Arc-enabled Data Services
    and deployed different data instances to it. In our upcoming last chapter, we
    will look at how to manage and monitor our services’ performance, how to analyze
    its log files, and how to upgrade them to a new version.


    ## 9. Monitoring and Management


    So far, we have covered the architecture of Azure Arc-enabled Data Services as
    well as the necessary steps to deploy them.


    In this last chapter, we will focus how to monitor your Azure Arc-enabled Data
    Services by leveraging both local management services as well as Azure’s management
    capabilities and also how to upgrade an existing installation.


    ### Monitoring Through the Data Controller


    One way of monitoring your Azure Arc-enabled Data Services is through two built-in
    dashboards: the Grafana and the Kibana Dashboard. Using the built-in dashboards
    is especially handy when you don’t have a regular or stable connection allowing
    you to sync your telemetry data to the Azure Portal on a regular basis. As we’ve
    mentioned in Chapter [2](#505695_2_En_2_Chapter.xhtml), those will be deployed
    locally to your Kubernetes Cluster while deploying your Data Controller.


    #### Retrieving Endpoints


    To get the URLs for the dashboards, you need to get their endpoints. You can either
    get them through `az` using the command in Listing [9-1](#505695_2_En_9_Chapter.xhtml#PC1).


    ```

    az arcdata dc endpoint list -o table -k arc

    Listing 9-1

    azure-cli command to retrieve a list of controller endpoints

    ```


    Alternatively, every single data instance’s management page in Azure Data Studio
    will have a deep link to the instance’s prefiltered dashboards as shown in Figure
    [9-1](#505695_2_En_9_Chapter.xhtml#Fig1).


    ![](images/505695_2_En_9_Chapter/505695_2_En_9_Fig1_HTML.png)


    Figure 9-1


    Portal endpoints for an Arc SQL Managed Instance on its management page in ADS


    #### Metrics (Grafana Dashboard)


    The Grafana Portal provides metrics and insights on the status of its instances.
    The credentials to log in to the Portal will be the same ones you also used to
    connect to your Cluster in Azure Data Studio.


    The SQL Managed Instance metrics as shown in Figure [9-2](#505695_2_En_9_Chapter.xhtml#Fig2)
    provide SQL Server-specific performance metrics, many of which DBA are already
    familiar with.


    ![](images/505695_2_En_9_Chapter/505695_2_En_9_Fig2_HTML.png)


    Figure 9-2


    Grafana Portal – SQL MI metrics


    Statistics show wait time, number of waiting tasks sorted by wait type, transactions
    and requests per second, and other valuable metrics. They help to understand more
    about the status of a specific SQL MI within the Cluster, which can be selected
    on the upper left of the screen.


    The other dashboards currently available in the pre-configured Grafana Portal
    are shown in Figure [9-3](#505695_2_En_9_Chapter.xhtml#Fig3).


    ![](images/505695_2_En_9_Chapter/505695_2_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Built-in dashboards in Grafana Portal


    #### Log Search Analytics (Kibana)


    The Kibana Dashboard as shown in Figure [9-4](#505695_2_En_9_Chapter.xhtml#Fig4),
    on the other hand, provides you an insight into your Kubernetes log files of the
    selected instance.


    ![](images/505695_2_En_9_Chapter/505695_2_En_9_Fig4_HTML.png)


    Figure 9-4


    Kibana Portal – overview


    Kibana is part of the elastic stack. It also provides options to create visualizations
    and dashboard on top of your log files. If you want to learn more about it, its
    website [www.elastic.co/products/kibana](http://www.elastic.co/products/kibana)
    is a great starting point!


    ### Monitoring Through the Azure Portal


    With one of the advantages of Arc being the opportunity to manage your whole estate
    through a single management interface, if your connectivity allows for it, we
    highly recommend linking your deployment to the Azure Portal. This is not going
    to take away the option to use Grafana and Kibana, so consider it a very valuable
    bonus.


    #### Directly Connected Mode


    When in directly connected mode, your log files and metrics will by default be
    automatically uploaded and synced to the Azure Portal.


    #### Indirectly Connected Mode


    In indirectly connected mode, you will first export your Cluster logs and metrics
    to a file and then upload this file on a regular basis. This process can also
    be scheduled and automated if needed to make sure your telemetry is regularly
    synchronized with the Azure Portal.'
