  trans: '

    ## 安装与配置 containerd


    要安装 `containerd`，我们需要使用清单 4-4 中的代码加载两个模块（`overlay` 和 `br_netfilter`）。它们分别是容器运行时所使用的
    `OverlayFS` 和集群内部网络所必需的。


    ```

    sudo modprobe overlay

    sudo modprobe br_netfilter

    清单 4-4

    安装 modprobe 和 br_netfilter

    ```


    使用清单 4-5 中的代码，我们需要确保这些模块在重启后也能被加载。


    ```

    cat <<EOF | sudo tee /etc/modules-load.d/containerd.conf

    overlay

    br_netfilter

    EOF

    清单 4-5

    持久化 modprobe 和 br_netfilter

    ```


    `containerd` 还需要一些系统参数，我们可以使用清单 4-6 中的命令来设置并持久化这些参数。


    ```

    cat <<EOF | sudo tee /etc/sysctl.d/99-kubernetes-cri.conf

    net.bridge.bridge-nf-call-iptables  = 1

    net.ipv4.ip_forward                 = 1

    net.bridge.bridge-nf-call-ip6tables = 1

    EOF

    清单 4-6

    为 containerd 持久化系统参数

    ```


    接下来，让我们使用清单 4-7 中的命令应用这些设置而无需重启。


    ```

    sudo sysctl --system

    清单 4-7

    应用 sysctl 更改

    ```


    现在，我们为 `containerd` 准备的先决条件已经就绪，因此我们可以通过 `apt-get` 来安装它，如清单 4-8 所示。


    ```

    sudo apt-get update

    sudo apt-get install -y containerd

    清单 4-8

    安装 containerd

    ```


    `containerd` 需要一个配置文件，我们可以使用 `containerd` 自身来生成一个带有默认设置的文件（清单 4-9）。


    ```

    sudo mkdir -p /etc/containerd

    sudo containerd config default | sudo tee /etc/containerd/config.toml

    清单 4-9

    创建 containerd 配置

    ```


    在此文件中，我们必须将 `containerd` 的 `cgroup` 驱动设置为 `systemd`，因为 `kubelet` 需要这样做。


    以 root 权限在文本编辑器中打开文件 `/etc/containerd/config.toml`（例如，通过 `vi`，如清单 4-10 所示）。


    ```

    sudo vi /etc/containerd/config.toml

    清单 4-10

    编辑 containerd 配置

    ```


    在此文件中，找到清单 4-11 所示的部分。


    ```

    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]

    清单 4-11

    containerd 配置文件中的配置部分

    ```


    在其下方，查找 `SystemdCgroup = false` 这一行，并将其值从默认的 `false` 更改为 `true`（如清单 4-12 所示）。


    ```

    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]

    ...

    SystemdCgroup = true

    清单 4-12

    containerd 配置文件中需要编辑的行，将 false 改为 true

    ```


    **注意**

    此处缩进很重要——可以是制表符或空格！请确保你的文件看起来像图 4-1 中那样！


    ![](img/505695_2_En_4_Fig1_HTML.jpg)

    图 4-1

    containerd 配置文件中的缩进


    要退出 `vi` 并保存文件，按 `ESC`，然后输入 `:x!`。


    基于我们的新设置，我们可以使用 `systemctl` 来重启 `containerd`，如清单 4-13 所示。


    ```

    sudo systemctl restart containerd

    清单 4-13

    重启 containerd

    ```


    `containerd` 现已准备好可以使用，我们可以继续安装 Kubernetes 软件包。你可以使用清单 4-14 中的命令确认服务状态。


    ```

    sudo systemctl status containerd

    清单 4-14

    containerd 的状态

    ```


    ## 安装与配置 Kubernetes 软件包


    由于我们将从 Google Apt 仓库安装软件包，因此首先需要添加 Google 的 apt 仓库 `gpg` 密钥（清单 4-15）。


    ```

    curl -s https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key add
    -

    清单 4-15

    添加 Google gpg 密钥

    ```


    有了该密钥后，我们接下来添加 Kubernetes apt 仓库（清单 4-16）。


    ```

    sudo bash -c ''cat <<EOF > /etc/apt/sources.list.d/kubernetes.list

    deb https://apt.kubernetes.io/ kubernetes-xenial main

    EOF''

    清单 4-16

    添加 Kubernetes apt 仓库

    ```


    让我们更新 apt 软件包列表，并使用清单 4-17 中的代码查看 `kubelet` 的可用版本。


    ```

    sudo apt-get update

    apt-cache policy kubelet | head -n 20

    清单 4-17

    更新 apt 软件包列表

    ```


    这会显示可用的版本，如图 4-2 所示，在撰写本文时，最新的可用版本是 `1.20.4`。


    ![](img/505695_2_En_4_Fig2_HTML.jpg)

    图 4-2

    kubelet 的版本列表


    我们现在可以安装 `kubelet`、`kubeadm` 和 `kubectl`，如清单 4-18 所示。如果你的当前机器也是你在第 1 章中用来安装 `kubectl`
    的那台，你可能会收到它已安装的消息。


    ```

    sudo apt-get install -y kubelet kubeadm kubectl

    清单 4-18

    安装 Kubernetes 软件包

    ```


    这将安装这些工具的最新版本。如果你希望安装之前的版本，可以如清单 4-19 所示进行指定。


    ```

    VERSION=1.22.4-00

    sudo apt-get install -y kubelet=$VERSION kubeadm=$VERSION kubectl=$VERSION

    清单 4-19

    安装特定版本的 Kubernetes 软件包

    ```


    为避免自动更新，我们将这些工具（以及 `containerd`）标记为保持（hold）（清单 4-20）。这使我们能够完全控制修补过程，使其独立于基础操作系统的修补。


    **注意**

    本书中的代码是针对 Kubernetes 版本 `1.22.4` 测试的。请通过访问 [*https://docs.microsoft.com/en-us/azure/azure-arc/data/release-notes*](https://docs.microsoft.com/en-us/azure/azure-arc/data/release-notes)
    查看 Azure Arc-enabled Data Services 发行说明，了解支持的 Kubernetes 版本。


    ```

    sudo apt-mark hold kubelet kubeadm kubectl containerd

    清单 4-20

    将 Kubernetes 软件包和 containerd 标记为保持

    ```


    让我们检查一下 `kubelet` 和容器运行时的状态（清单 4-21）。


    ```

    sudo systemctl status kubelet.service

    sudo systemctl status containerd.service

    清单 4-21

    检查 kubelet 和 containerd 的状态

    ```


    如图 4-3 所示，`kubelet` 将进入崩溃循环（crashloop）。在创建集群或将节点加入现有集群之前，这是正常行为（你可以按 `q` 退出该过程）。


    ![](img/505695_2_En_4_Fig3_HTML.png)

    图 4-3

    kubelet 和 containerd 的状态


    此外，请确保这两个服务都设置为在系统启动时启动。这可以通过清单 4-22 中的命令进行设置。


    ```

    sudo systemctl enable kubelet.service

    sudo systemctl enable containerd.service

    清单 4-22

    为 kubelet 和 containerd 启用开机自启

    ```


    **注意**

    请记住在每个节点（`control`、`node-1`、`node-2` 和 `node-3`）上分别重复此过程，并安装和配置这些软件包！


    ### 创建控制平面


    随着容器运行时和 Kubernetes 软件包现已就位，我们可以继续创建我们的控制平面。


    **注意**

    本节中的所有命令都需要在你的 `control` 虚拟机上执行。

    '
- fmt: '### Pod Networking


    在初始化控制平面之前，我们需要获取将用于 Pod 网络的 IP 地址。对于 Pod 网络，存在许多不同的解决方案，我们决定保持简单并使用 `Flannel`。虽然它不像另一个流行的
    Pod 网络 `Calico` 那样拥有所有高级配置设置，但它在本地和云网络上无需任何额外配置即可工作，而这些网络往往会限制 `IPIP` 数据包等。


    使用 `wget` 命令下载默认清单，如清单 4-23 所示。


    ```

    wget https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml

    Listing 4-23

    Download flannel

    ```


    该文件不需要进行任何更改，但在该文件中定义了 Pod CIDR IP 范围。在第 128 行左右，你将找到定义的网络范围。清单 4-24 显示了文件中的代码。在
    `network` 字段中，你将找到值 `10.244.0.0/16`。这是用于为集群中的 Pod 分配 IP 地址的网络范围。在我们的实验中不会更改此值。如果你的网络环境中的网络与其他
    IP 范围重叠，你可能需要在你的实验环境中更改此值。


    ```

    net-conf-json: |

    {

    "Network": "10.244.0.0/16",

    "Backend": {

    "Type": "vxlan"

    }

    }

    Listing 4-24

    Pod CIDR Network range in kube-flannel.yaml

    ```


    ### Bootstrapping Your Control Plane


    我们已准备好使用 `kubeadm` 初始化集群，如清单 4-25 所示。请注意，我们定义了参数 `--pod-network-cidr` 并将其值设置为
    `kube-flannel.yaml` 清单中的相同值。如果你更新了你的 Pod 网络的值，请在此处编辑该值。我们使用的是清单中的默认值。


    ```

    sudo kubeadm init --pod-network-cidr=10.244.0.0/16

    Listing 4-25

    Initialize Cluster

    ```


    在你的控制节点上运行此代码。这将需要几分钟时间，并会持续输出其进度。完成后，结果应如你所见于图 4-4。


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig4_HTML.jpg)


    **Figure 4-4**


    `kubeadm init` 的输出


    为了确保我们可以使用非提升权限的 shell 与集群进行交互，我们需要创建一个 `kubeconfig` 文件并将其存储在我们的主目录中，如清单 4-26
    所示。


    ```

    mkdir -p $HOME/.kube

    sudo cp -i /etc/kubernetes/admin.conf $HOME/.kube/config

    sudo chown $(id -u):$(id -g) $HOME/.kube/config

    Listing 4-26

    Create kubectl configuration

    ```


    **Note**


    如果你使用的是管理工作站，你可以获取此文件并将其复制或其内容复制到此工作站主目录中的 `.kube/config`。这将允许你从该工作站与你的集群进行通信。


    ### Deploying a Pod Network


    在加入工作节点之前，我们需要确保 Pod 网络已设置好。由于没有必需的更改，我们将直接使用 `kubectl` 进行安装，如清单 4-27 所示。我们将在本章后面更多地讨论
    `kubectl`，因此如果此时感觉有些解释不清，请不要担心。


    ```

    kubectl apply -f kube-flannel.yml

    Listing 4-27

    Install flannel

    ```


    使用 `Flannel` 的 Pod 网络现已设置完成。


    ### Adding Nodes to a Cluster


    我们的控制平面已准备就绪，Pod 网络也已部署，但我们还不完全准备好加入节点。为了让一个节点能够加入集群，我们需要一个令牌。最简单的方法是直接使用 `kubeadm`
    生成一个 `join command`，如清单 4-28 所示。


    ```

    kubeadm token create --print-join-command

    Listing 4-28

    Generate token and join command

    ```


    输出看起来类似于你所见于图 4-5。


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig5_HTML.png)


    **Figure 4-5**


    加入命令


    现在，我们可以获取此命令并在每个所需的工作节点上运行它（以 root 身份，参见清单 4-29），以启动加入过程。你的加入命令将不同，因为 CA 证书是唯一的。加入令牌是一个有效期为
    24 小时的票据，因此如果你想稍后添加更多节点，你将需要创建一个新的令牌。


    ```

    sudo kubeadm join 172.16.94.10:6443 \

    --token m87vj8.i1q0t7107jhg0upp \

    --discovery-token-ca-cert-hash sha256:9df160ef427a69e12ca5d74bd6c22249975f26e72c6d048ba8d252d577786101

    Listing 4-29

    `kubeadm join` command

    ```


    **Note**


    确保添加 `sudo` —— 该命令需要以 root 身份运行，而 `--print-join-command` 不会为你添加它！


    节点将报告它们已开始加入过程，如图 4-6 所示。


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig6_HTML.jpg)


    **Figure 4-6**


    加入命令


    让我们通过在控制平面上运行 `kubectl` 来列出节点，如清单 4-30 所示。


    ```

    kubectl get nodes

    Listing 4-30

    List Nodes in Cluster

    ```


    如果你在将工作节点加入集群后不久运行此命令，你可能会发现节点显示出来了但仍然是 `NotReady`（见图 4-7）。


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig7_HTML.jpg)


    **Figure 4-7**


    集群中的节点


    节点将显示为 `NotReady`，因为运行 Pod 网络和 `kube-proxy` 的 Pod 当前正在部署。如果几分钟后再次运行该命令，节点将显示为
    `Ready`。在所有节点都已加入集群并且每个节点都显示为 `Ready` 之前，你不应继续操作，如图 4-8 所示。


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig8_HTML.jpg)


    **Figure 4-8**


    集群中所有节点显示为 Ready'
  raw: '#### Pod Networking


    Before we initialize our Control Plane, we need to get the IP address that we
    will use for our Pod Network. For Pod Networking, there are many different solutions
    out there, and we have decided to keep it simple and use *Flannel*. While it doesn’t
    have all the advanced configuration settings like *Calico*, another popular Pod
    Network, it works without any additional configuration on local and cloud networks,
    which tend to restrict *IPIP* packages, for example.


    Download the default manifest using the *wget* command in Listing [4-23](#505695_2_En_4_Chapter.xhtml#PC23).


    ```

    wget https://raw.githubusercontent.com/flannel-io/flannel/master/Documentation/kube-flannel.yml

    Listing 4-23

    Download flannel

    ```


    There are no required changes to the file, but inside that file defines the Pod
    CIDR IP range. Around line 128, you will find the network range defined. Listing
    [4-24](#505695_2_En_4_Chapter.xhtml#PC24) shows the code from the file. In the
    network field, you will find the value 10.244.0.0/16\. This is the network range
    used to allocate IP addresses to Pods in the Cluster. We will not change this
    value in our lab. You may need to change this value in yours if the network overlaps
    with other IP ranges in your network environment.


    ```

    net-conf.json: |

    {

    "Network": "10.244.0.0/16",

    "Backend": {

    "Type": "vxlan"

    }

    }

    Listing 4-24

    Pod CIDR Network range in kube-flannel.yaml

    ```


    #### Bootstrapping Your Control Plane


    We’re ready to initialize our Cluster using kubeadm, as shown in Listing [4-25](#505695_2_En_4_Chapter.xhtml#PC25).
    Take note that we define the parameter `--pod-network-cidr` and set the value
    to the same value from the `kube-flannel.yaml` manifest. If you updated the value
    for your Pod Network, please edit that value here. We are using the default from
    the manifest.


    ```

    sudo kubeadm init --pod-network-cidr=10.244.0.0/16

    Listing 4-25

    Initialize Cluster

    ```


    Run this code on your control Node. This will take a few minutes and will output
    its progress constantly. When complete, the result should look like what you see
    in Figure [4-4](#505695_2_En_4_Chapter.xhtml#Fig4).


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig4_HTML.jpg)


    Figure 4-4


    The output of kubeadm init


    To ensure that we can interact with our Cluster using a non-elevated shell, we
    need to create a kubeconfig file and store it in our home directory, as shown
    in Listing [4-26](#505695_2_En_4_Chapter.xhtml#PC26).


    ```

    mkdir -p $HOME/.kube

    sudo cp -i /etc/kubernetes/admin.conf $HOME/.kube/config

    sudo chown $(id -u):$(id -g) $HOME/.kube/config

    Listing 4-26

    Create kubectl configuration

    ```


    Note


    If you are using an administrative workstation, you can take this file and copy
    it or its contents to *.kube/config* in your home directory on this workstation.
    This will allow you to communicate with your Cluster from that workstation.


    #### Deploying a Pod Network


    Before joining our Worker Nodes, we need to ensure that our Pod Network is set
    up. As there are no required changes, we’ll go straight ahead and install it using
    kubectl (Listing [4-27](#505695_2_En_4_Chapter.xhtml#PC27)). We will be talking
    more about kubectl later in this chapter, so don’t worry if this feels a bit unexplained
    at this point.


    ```

    kubectl apply -f kube-flannel.yml

    Listing 4-27

    Install flannel

    ```


    Your Pod Networking with Flannel is now set up.


    ### Adding Nodes to a Cluster


    Our Control Plane is ready, and our Pod Network is deployed, but we’re not quite
    ready to join our Nodes yet. For a Node to be able to join a Cluster, we need
    a token. The easiest way is to generate a *join command* directly using kubeadm,
    as shown in Listing [4-28](#505695_2_En_4_Chapter.xhtml#PC28).


    ```

    kubeadm token create --print-join-command

    Listing 4-28

    Generate token and join command

    ```


    The output looks similar to what you see in Figure [4-5](#505695_2_En_4_Chapter.xhtml#Fig5).


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig5_HTML.png)


    Figure 4-5


    Join command


    Now, we can take this command and run it (as root, see Listing [4-29](#505695_2_En_4_Chapter.xhtml#PC29))
    on each of our desired Worker Nodes, initiating the join process. Your join command
    will be different because the CA certificate is unique. The join token is a ticket
    valid for 24 hours, so if you want to add more Nodes later, you will need to create
    a new token.


    ```

    sudo kubeadm join 172.16.94.10:6443 \

    --token m87vj8.i1q0t7107jhg0upp \

    --discovery-token-ca-cert-hash sha256:9df160ef427a69e12ca5d74bd6c22249975f26e72c6d048ba8d252d577786101

    Listing 4-29

    kubeadm join command

    ```


    Note


    Make sure to add *sudo* – the command needs to be run as root, and the *--print-join-command*
    does not add it for you!


    The Nodes will report that they have started the join process, as shown in Figure
    [4-6](#505695_2_En_4_Chapter.xhtml#Fig6).


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Join command


    Let us list the Nodes by running kubectl on the Control Plane (see Listing [4-30](#505695_2_En_4_Chapter.xhtml#PC30)).


    ```

    kubectl get nodes

    Listing 4-30

    List Nodes in Cluster

    ```


    If you run this command shortly after joining a Worker Node to the Cluster, you
    may find that Nodes are showing up but are *NotReady* yet (see Figure [4-7](#505695_2_En_4_Chapter.xhtml#Fig7)).


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig7_HTML.jpg)


    Figure 4-7


    Nodes in Cluster


    Nodes will show as *NotReady* because the Pods that run Pod Networking and kube-proxy
    are currently deploying. If you run the command again after a few minutes, the
    Nodes will show as *Ready*. You should not proceed forward until all your Nodes
    are joined to the Cluster and they each show as *Ready*, as in Figure [4-8](#505695_2_En_4_Chapter.xhtml#Fig8).


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig8_HTML.jpg)


    Figure 4-8


    All Nodes in Cluster showing Ready'
