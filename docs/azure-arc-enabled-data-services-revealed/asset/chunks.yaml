  trans: '

    ## 安装考虑因素与方法


    与几乎任何现代软件安装一样，您需要决定的第一件事是：是在本地还是云端安装？


    ### 部署位置？


    在云端部署时，您需要在两种主要的部署选项中做出选择：


    *   **基础设施即服务 (IaaS)**：在 `IaaS` 场景中，您在云中部署 `虚拟机`，然后在其上安装 Kubernetes。

    *   **平台即服务 (PaaS)**：Kubernetes 也可以作为托管服务由所有大型云提供商提供。在托管服务产品中，您无需担心任何底层基础设施或冗余问题。云提供商为您处理这些。使用
    `PaaS` 需要考虑的一点是，您将失去 Kubernetes 内部版本控制和其他功能的灵活性，以及对控制平面节点的访问权限。在本地部署时，决策归根结底是在虚拟机上安装还是直接安装在
    `裸机` 上。虽然本地也有托管服务，但这些不在本书讨论范围内。


    选择 `裸机` 还是 `虚拟机` 作为您的节点，主要取决于您预期的工作负载。如果您谈论的是许多可扩展的微服务，在虚拟机上运行的 Kubernetes 节点可能会为您提供更多的额外灵活性。如果您部署的是一个单一的大型应用程序，中间的虚拟机监控程序将带来不必要的开销。您可能想知道：如果只运行一个应用程序，Kubernetes
    真的是最佳平台吗？答案往往是：视情况而定！虽然它们通常需要专用基础设施，但有些只部署在 Kubernetes 上。


    在本书中，我们将重点介绍使用自管理（本地或基于云的 IaaS）虚拟机的环境。无论您是在云端、本地还是裸机上将这些机器安装为虚拟机，都没有关系，因为 Kubernetes
    会抽象掉基础设施。


    展望未来，考虑在哪里安装潜在的生产集群，这个问题应遵循您组织的总体策略。如果您到目前为止的所有工作仍然在本地，那么您的 Kubernetes 集群部署在那里可能完全合理。另一方面，如果您正在或已经将重要工作负载迁移到云端，您的
    Kubernetes 集群很可能也应跟随迁移。归根结底，这取决于您团队的技能组合以及在 Kubernetes 上运行用例的需求。


    ### 进一步考虑事项


    除了“在哪里”的问题，当然还有其他考虑因素，我们将在本章及本书的后续部分更深入地讨论：


    *   您需要多少个工作节点来支持您的工作负载？

    *   这些节点的 CPU 和 RAM 配置是什么？

    *   您是否需要一个高可用的解决方案，以防控制平面出现故障？

    *   您的备份和恢复策略是什么？

    *   您将使用哪种类型的存储？

    *   您将如何管理 Pod 和节点之间的网络？


    虽然我们正处于 Kubernetes 之旅的起点，但在考虑部署生产系统之前，所有这些问题您都应该有答案。


    ### 安装方法


    根据您的安装位置，这在很大程度上也将决定您的安装方法。安装自管理集群时，您主要可以选择 `kubeadm`（一种在 `Linux` 上免费且开源的部署 Kubernetes
    的方式）和 RedHat OpenShift 等企业产品。安装本身通常通过命令行工具触发。


    安装基于云的集群时，您的云提供商将负责安装部分，具体细节由您的云提供商决定。他们通常提供自己的基于命令行的方法和用于引导部署的 Web 门户。


    ### 附加选项


    还有许多附加选项，例如使用 `Docker` Desktop 在笔记本电脑上启动 Kubernetes 集群，或使用像 Raspberry Pi 这样的轻量级硬件作为部署目标。虽然它们可能有有效的用例，尤其是在非生产环境中，但本书不会深入探讨这些内容。


    此外，虽然可以使用基于 Windows 的工作节点，但我们将重点使用 `Linux` 作为操作系统。


    我们也不会详细介绍部署单节点集群的细节。如果您只有一台 `Ubuntu` 机器可用，可以使用清单 4-1 中的代码。这段代码将启动一个包含 `本地存储` 的单节点集群，但这对于本书中的大多数练习（除了最基本的练习）来说是不够的。


    ```

    wget -q -O deploy_kubeadm.sh https://bookmark.ws/ArcDemo_Linux

    chmod +x deploy_kubeadm.sh

    ./deploy_kubeadm.sh

    清单 4-1

    安装单节点集群

    ```


    ## 安装要求


    对于自管理的 Kubernetes 安装，我们将重点介绍在 `Linux`（更具体地说是 `Ubuntu`）上使用 `kubeadm`。虽然 CentOS、RHEL
    和其他 Linux 发行版也得到支持，但我们必须选择一个环境，而 Ubuntu 似乎是当今最常见的选择。


    最低系统要求是具有两个 CPU、2GB RAM 并禁用交换空间的系统。这些是 Kubernetes 集群运行的最低要求，不包括集群上运行的工作负载。在生产环境中，您必须确保已考虑部署的工作负载及其可扩展性和冗余性。


    除了这些基本系统要求外，您还需要一个 CRI（容器运行时接口）容器运行时。事实上的标准是 `containerd`。由于 Docker 在 Kubernetes
    1.20 中已被弃用，并且在 Kubernetes 1.23 版本中移除了对其的支持，本书将主要关注 `containerd`。

    '
- fmt: '### Network Requirements


    从网络角度来看，请确保所有机器都具有唯一的主机名、MAC 地址和 IP 地址。这些 IP 地址理想情况下应位于同一子网，但至少必须设置为可以相互访问。


    如果您在网络内运行防火墙（对于本书中的实验，我们建议不要运行防火墙，以避免遇到不必要的网络复杂性），表 4-1 列出了控制平面上需要开放的所有 TCP 端口。


    **表 4-1**


    控制平面节点所需 TCP 端口


    | 组件 | TCP 端口 |

    | --- | --- |

    | API | 6443 |

    | etcd | 2379-2380 |

    | Scheduler | 10251 |

    | Controller Manager | 10252 |

    | Kubelet | 10250 |


    表 4-2 所列的端口需要在您集群中的工作节点上开放。


    **表 4-2**


    工作节点所需 TCP 端口


    | 组件 | TCP 端口 |

    | --- | --- |

    | Kubelet | 10250 |

    | NodePort | 30000-32767 |


    > **注意**

    >

    > 此处列出的 TCP 端口是默认端口。如果您更改了这些端口，请相应地调整您的防火墙规则。


    ### Getting Kubernetes


    当然，要安装 Kubernetes，我们首先需要获取 Kubernetes。Kubernetes 软件维护在 GitHub 上，因此如果您访问 [`https://GitHub.com/Kubernetes/Kubernetes/`](https://GitHub.com/Kubernetes/Kubernetes/)，您将找到
    Kubernetes 项目。您也可以向项目贡献您的想法和更改。这也是一个宝贵的资源，可以详细了解其工作原理，因为您可以查看代码并从 GitHub issues
    中他人的经验中学习。


    除了软件本身，您还可以在这里找到额外的文档。


    理论上，您可以获取代码并自行编译所有内容，但为了让我们自己的工作更轻松，我们将通过包管理器来安装 Kubernetes。


    ## Building a Self-Managed Cluster


    有了上述理论基础，让我们开始构建我们的第一个 Kubernetes 集群，该集群将使用 `kubeadm` 在 Ubuntu 机器上运行。我们将使用第 1
    章中描述的环境，包括其中提到的先决条件。


    ### Virtual Machine-Based Kubernetes Cluster Requirements


    我们将需要一些计算和存储资源来构建本章中的 Kubernetes 集群。对于我们的实验，我们将使用一组四个 Linux 虚拟机。部署数据控制器的最低要求是四个核心，再加上任何部署工作负载所需的额外核心。对于本书中的实验，每台虚拟机将需要
    8 个 vCPU、16GB 内存和 150GB 磁盘空间，运行 Ubuntu Server 18.04 作为操作系统。我们已经在 Ubuntu 18.04
    上测试了本书中的代码。Kubernetes 支持多种操作系统。更多详情请查看 [`https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/`](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/)。


    > **注意**

    >

    > 此处配置的系统资源，8 个 vCPU 和 16GB 内存，是引导 Azure Arc 启用的数据服务控制器以及 SQL 托管实例和 Postgres 等数据服务所需的最低要求。您需要根据希望在数据服务实例中运行的工作负载来分配额外的资源。如果在本书的示例中配置数据服务实例时内存受限，您可以考虑在完成练习后删除这些数据服务实例。


    ### Getting the VMs Ready


    在您创建了本书实验所需的虚拟机后，是时候讨论这些虚拟机的网络配置了。


    ### Virtual Machine Network Configuration


    按照表 4-3 中的指定配置实验虚拟机的 IP 地址。您可以在您的实验中使用不同的 IP 地址，但在构建集群时的多个实验中，您需要对此进行考虑。


    **表 4-3**


    虚拟机配置


    | 名称 | IP 地址 | 功能 |

    | --- | --- | --- |

    | control | 172.16.94.10 | 控制平面节点 |

    | node-1 | 172.16.94.11 | 工作节点 |

    | node-2 | 172.16.94.12 | 工作节点 |

    | node-3 | 172.16.94.13 | 工作节点 |

    | workstation (可选) | 172.16.94.100 | 管理工作站 (Windows) |


    接下来，在 IT 领域，有句俗话：“永远是 DNS 的问题”。在企业环境中，您可以与网络团队合作来配置前面定义的 DNS 条目。对于我们的实验，我们将在每台系统的
    `/etc/hosts` 文件中添加主机条目，以确保我们可以在实验中通过名称访问所有系统。在代码清单 4-2 中，您将找到我们的 `/etc/hosts`
    文件的内容。您的 `hosts` 文件可能已经包含 localhost 的条目以及其他配置。


    ```

    172.16.94.10   control

    172.16.94.11   node-1

    172.16.94.12   node-2

    172.16.94.13   node-3

    ```


    > 代码清单 4-2

    > Linux 主机文件所需附加内容


    在 Windows 机器上，您将在 `C:\Windows\System32\drivers\etc\hosts` 下找到该文件。


    > **注意**

    >

    > 要编辑 Windows 上的 hosts 文件，请确保以管理员身份运行您的编辑器。


    在继续之前，请确保您可以通过主机名访问所有这些虚拟机的控制台或 SSH，并且它们可以通过您的网络相互连接。


    > **注意**

    >

    > 我们的所有脚本都使用前面描述的主机名/IP 地址。如果您使用不同的设置构建实验，您将需要相应地调整本书中使用的脚本。出于可读性考虑，我们不会在每个可能需要调整的地方单独指出。


    ### System Swap Settings


    作为最后一步，让我们确保在我们的控制平面节点和三个工作节点上禁用 swap，因为这是 `kubelet` 的要求。


    打开到每台虚拟机的单独 SSH 连接，并使用您喜欢的文本编辑器从 `/etc/fstab` 中移除任何 swap 分区。接下来，运行代码清单 4-3 中的命令，该命令还将使用
    `sed` 来注释掉系统 `/etc/fstab` 中的 swap 条目。


    如果没有返回输出，那么您的 swap 已被禁用。您应该重新启动您的虚拟机，以确保设置在重启后依然生效。


    ```bash

    swapoff -a

    sudo sed -i ''/swap/s/^\(.*\)$/#\1/g'' /etc/fstab

    ```


    > 代码清单 4-3

    > 禁用 swap


    ### Software Package Installation


    接下来，我们需要在所有虚拟机上安装 `containerd` 和 Kubernetes 软件包，如以下两段所述。除非另有说明，否则只需在每台虚拟机上使用 shell
    运行所述命令即可。'
  raw: '### Network Requirements


    From a networking perspective, make sure that all machines have unique hostnames,
    MAC addresses, and IP addresses. Those IP addresses should ideally be on the same
    subnet, but at the very least, must be set up to reach each other.


    If you are running a firewall within your network (for the labs in this book,
    we recommend not to run a firewall, simply to avoid running into unnecessary complications
    with the network), Table [4-1](#505695_2_En_4_Chapter.xhtml#Tab1) lists all the
    TCP Ports that need to be reachable on the Control Plane.


    Table 4-1


    Required TCP Ports on Control Plane Node


    | Component | TCP Port(s) |

    | --- | --- |

    | API | 6443 |

    | etcd | 2379-2380 |

    | Scheduler | 10251 |

    | Controller Manager | 10252 |

    | Kubelet | 10250 |


    The ports listed in Table [4-2](#505695_2_En_4_Chapter.xhtml#Tab2) need to be
    open on the Nodes in your Cluster.


    Table 4-2


    Required TCP Ports on Worker Nodes


    | Component | TCP Port(s) |

    | --- | --- |

    | Kubelet | 10250 |

    | NodePort | 30000-32767 |


    Note


    The TCP Ports listed here are the default ports. In case you changed those, adjust
    your firewall rules accordingly.


    ### [Getting Kubernetes](https://app.pluralsight.com/course-player%253FclipId%253Db0f4845d-f2a5-4a1a-a790-a39ccf314435)


    Of course, to install Kubernetes, we need to get Kubernetes. The Kubernetes software
    is maintained on GitHub, so if you go to [*https://GitHub.com/Kubernetes/Kubernetes/*](https://GitHub.com/Kubernetes/Kubernetes/),
    you will find the Kubernetes project. You can also contribute your ideas and changes
    to the project. This is also a precious resource to understand, in detail, how
    things work since you can view the code and learn from other people’s experiences
    with GitHub issues.


    In addition to the software itself, this is also where you will find additional
    documentation.


    While, in theory, you could get the code and compile everything on your own, we’ll
    make our lives a bit easier and install Kubernetes through a package manager.


    ## Building a Self-Managed Cluster


    With that theory in place, let’s start working on building our first Kubernetes
    Cluster running on Ubuntu machines using kubeadm. We will be using the environment
    as described in Chapter [1](#505695_2_En_1_Chapter.xhtml), including the prerequisites
    mentioned there.


    ### Virtual Machine-Based Kubernetes Cluster Requirements


    We will need some compute and storage resources for the Kubernetes Clusters we
    will build in this chapter. For our lab, we will use a set of four Linux virtual
    machines. The minimum requirement to deploy a Data Controller is four cores, plus
    additional cores for any workload deployed. For the labs in this book, each virtual
    machine will need 8 vCPUs, 16GB of RAM, and 150GB of disk space, running Ubuntu
    Server 18.04 as an operating system. We have tested the code in this book on Ubuntu
    18.04\. Kubernetes is supported on several operating systems. Check out [*https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/*](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/install-kubeadm/)
    for more details.


    Note


    The system resources provisioned here, 8 vCPUs and 16GB of RAM, are the bare minimum
    needed to bootstrap an Azure Arc-enabled Data Services Controller and Data Services
    such as SQL Managed Instance and Postgres. You will need additional resources
    based on the workload you want to run in your data service instances. If you are
    memory constrained when provisioning data service instances in the examples throughout
    the book, you may consider deleting the data service instances once you complete
    an exercise.


    ### Getting the VMs Ready


    After you’ve created the virtual machines needed for the lab in this book, it’s
    time to discuss the networking configuration for those virtual machines.


    ### Virtual Machine Network Configuration


    Configure the lab VMs’ IP addresses as specified in Table [4-3](#505695_2_En_4_Chapter.xhtml#Tab3).
    You can use different IP addresses in your lab, but you will need to account for
    that in several of the labs when building your Cluster.


    Table 4-3


    Virtual Machine Configuration


    | Name | IP Address | Function |

    | --- | --- | --- |

    | control | 172.16.94.10 | Control Plane Node |

    | node-1 | 172.16.94.11 | Worker Node |

    | node-2 | 172.16.94.12 | Worker Node |

    | node-3 | 172.16.94.13 | Worker Node |

    | workstation (optional) | 172.16.94.100 | Administrative workstation (Windows)
    |


    Next, in IT, there’s a saying, it’s always DNS. In an enterprise environment,
    you can work with your networking team to provision the DNS entries defined earlier.
    For our lab, we will add host entries to the `/etc/hosts` file on each of these
    systems to ensure we can address all of the systems by name in our lab. In Listing
    [4-2](#505695_2_En_4_Chapter.xhtml#PC2), you will find the contents of our `/etc/hosts`
    file. Your `hosts` file may have entries for localhost and possibly other configurations.


    ```

    172.16.94.10   control

    172.16.94.11   node-1

    172.16.94.12   node-2

    172.16.94.13   node-3

    Listing 4-2

    Required additional Linux hosts file contents

    ```


    On a Windows machine, you will find the file under *C:\Windows\System32\ drivers\etc\hosts.*


    Note


    To edit the hosts file on Windows, make sure to run your editor as administrator.


    Before moving on, please be sure that you have console or SSH access (by using
    the hostname) to all these virtual machines and that they can connect to each
    other over your network.


    Note


    All our scripts use the hostnames/IP addresses described earlier. If you build
    your lab using different settings, you will need to adjust the scripts used in
    the book accordingly. We’ll not be pointing out every instance where this may
    be required individually for readability purposes.


    ### System Swap Settings


    As our last step, let’s ensure that swap is disabled on our Control Plane Node
    and the three Worker Nodes, as this is a requirement of the kubelet.


    Open an individual SSH connection into each virtual machine, and remove any swap
    partitions from */etc/fstab* using your favorite text editor. Next, run the command
    in Listing [4-3](#505695_2_En_4_Chapter.xhtml#PC3), which will also use `sed`
    to comment out the swap entry in your system’s `/etc/fstab`.


    If no output is returned, then your swap is disabled. You should reboot your virtual
    machine to ensure the setting persists on reboot.


    ```

    swapoff -a

    sudo sed -i ''/swap/s/^\(.*\)$/#\1/g'' /etc/fstab

    Listing 4-3

    Disable swap

    ```


    ### Software Package Installation


    Next, we need to install both containerd and the Kubernetes packages on all virtual
    machines as described in the following two paragraphs. Unless mentioned otherwise,
    just run the commands as stated using a shell on each virtual machine.'
