    # 关于作者


    # 1. Kubernetes 入门


    欢迎阅读《Azure Arc-enabled Data Services 揭秘》！本章介绍 Kubernetes，描述其在现代应用程序部署中的角色、提供的优势及其架构。从其优势开始，你将学习
    Kubernetes 在现代基于容器的应用程序部署中所提供的价值。接下来，你将学习 Kubernetes API 如何让你以代码的形式构建和部署下一代应用程序和系统。在该部分，你将学习
    Kubernetes 提供的用于定义和部署应用程序和系统的核心 API 原语。然后你将学习 Kubernetes 集群及其组件的关键概念。在本章结束时，你将了解
    Kubernetes 在 Azure Arc-enabled Data Services 中的角色。


    ## 介绍 Kubernetes


    Kubernetes 是一个容器编排器。它负责在数据中心内的服务器上启动基于容器的应用程序。为此，Kubernetes 使用代表数据中心资源的 `API 对象`，使开发人员和系统管理员能够以代码形式定义系统并使用该代码进行部署。基于容器的应用程序作为
    `Pod` 部署到 `Kubernetes 集群`中。集群是计算资源（物理服务器或虚拟服务器）的集合，称为 `节点`。让我们更深入地探讨这些元素中的每一个，从
    Kubernetes 的优势开始，了解其在现代应用程序部署中提供的价值。

