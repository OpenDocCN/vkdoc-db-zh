- fmt: '## Pod Scheduling Techniques


    *   `Affinity and Anti-affinity`: Another way to influence which `Nodes` `Pods`
    are scheduled to is `Affinity` and `Anti-affinity`. When defining workloads, this
    technique can give you a greater level of control in how `Pods` are scheduled.
    In its most basic implementation, `Affinity` tells the `Scheduler` that `Pods`
    are to be scheduled on some mutual resource such as a `Node` or perhaps a fault
    domain within a cloud or data center. `Affinity` is often used to ensure the co-location
    of `Pods` for applications that require high-performance communications between
    the `Pods`. `Anti-affinity` is the opposite. `Anti-affinity` ensures that `Pods`
    are not co-located on the same resource such as a `Node` or a fault domain. `Anti-affinity`
    is often used to ensure `Pods` are running on separate resources for either performance
    or availability reasons. For more information on `Affinity` and `Anti-affinity`,
    see `https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity`.


    *   `Taints and Tolerations`: This is yet another technique for helping the `Scheduler`
    decide which `Nodes` to schedule `Pods`. `Affinity` and `Anti-affinity` and `Node`
    Selectors are used to attract `Pods` to a `Node`. `Taints` and `Tolerations` are
    used to repel `Pods` from `Nodes`. When a `Taint` is applied to a `Node`, no `Pods`
    can be scheduled to that `Node`. A `Pod` can define a `Toleration` to a `Taint`.
    When a `Pod` has a `Toleration` matching a `Node`’s `Taint`, it can be scheduled
    to a `Node` that has a `Taint` defined. The previously introduced techniques to
    influence scheduling all require the user deploying the `Pod` to define constructs
    in their `Deployment` to influence the `Scheduler`. `Taints` and `Tolerations`
    are useful in scenarios where the Cluster administrator needs to influence scheduling
    without depending on the user deploying the workload. For more information and
    additional example scenarios, check out `https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/`.


    For a deeper dive into storage and scheduling in `Kubernetes`, check out the Pluralsight
    course “Configuring and Managing `Kubernetes` Storage and Scheduling” where we
    cover all of these scenarios in great detail and also with worked examples at
    `www.pluralsight.com`.


    ### Resource Consumption


    By default, `Pods` will have access to all of the resources available on the `Node`
    they are scheduled on. For example, if you have a `Node` with four cores and 32GB
    of RAM and `SQL Server` `Pod` starts on that `Node`, the `SQL Server` process
    running in that `Pod` will have access to all four cores and all 32GB of RAM.
    Due to the nature of how `SQL Server` allocates and consumes memory, it is possible
    that a single `SQL Server` `Pod` could consume all of the memory available on
    the `Node`, especially if `Max Server Memory` is not set. `SQL Server` will also
    be able to schedule workload across all four cores. This can lead to resource
    contention when running multiple `Pods` on a `Node`. `Kubernetes` gives us some
    configuration parameters to help manage resource consumption in `Pods`. When defining
    workloads in `Kubernetes`, two configuration properties in the `Pod` spec can
    help you control resource allocation in `Pods` deployed in `Kubernetes`: `Limits`
    and `Requests`. Let’s look at each in more detail:


    *   `Limits`: For an individual `Pod`, a `Limit` is an upper boundary for memory
    or CPU. `Limits` are used to ensure that a `Pod` cannot consume more resources
    than is appropriate for its workload. When a `Limit` is set for a `Pod`, it can
    only see that amount of memory or CPU. If you create a `SQL Server` `Pod` with
    a memory limit of 16GB of RAM, the `SQL Server` `Pod` will see only 16GB of RAM.
    If you define a CPU limit of two, the `SQL Server` process will see only two CPUs.
    `Limits` are critical for capacity planning. They ensure that you are allocating
    your Cluster’s resources appropriately and not allowing `Pods` to consume all
    of the resources on a `Node`. In our example, if our `Nodes` have only 32GB of
    RAM, setting memory and CPU `Limits` on the `Pod` will ensure that this `Pod`
    will not consume all of the available memory and CPUs on that `Node`.


    *   `Requests`: In the previous section, we introduced `Requests` in the context
    of scheduling. Let’s look more closely at them in the context of resource management.
    `Requests` are resource guarantees. With `Requests`, we can define the exact amount
    of CPU or memory a `Pod` needs to run properly, and that amount of CPU or memory
    must be available on a `Node` in the Cluster for that `Pod` to start. The `Scheduler`
    uses this information to find an appropriate `Node` to run the `Pod`. If it is
    not available, the `Pod` will neither be scheduled nor started. `Requests` are
    used to ensure that a `Pod` has the appropriate amount of resources to run its
    workload and never any less.


    Using `Limits` and `Requests` gives you the ability to ensure workloads running
    share the resources of the Cluster using appropriate resources and also ensure
    your workloads have access to the resource needed. When defining workloads with
    `Azure Arc-enabled Data Services`, both `SQL Managed Instance` and `PostgreSQL
    Hyperscale` deployments give you the ability to set both `Limits` and `Requests`
    on the `Pods` created. It is recommended that you `always` set both a `Limit`
    and a `Request` when defining workloads to help ensure a well-performing and well-balanced
    workload in your Cluster.


    Tip


    For a closer look at how `SQL Server` and `Kubernetes` memory management works,
    check out `www.centinosystems.com/blog/sql/memory-settings-for-running-sql-server-in-kubernetes/`.


    ### Networking Fundamentals


    The final major topic in our `Kubernetes` primer chapter is networking. The `Kubernetes`
    networking model enables workloads to be deployed in `Kubernetes` while abstracting
    away network complexities. This simplifies application configuration and service
    discovery in a Cluster and increases the portability of deployment code by removing
    infrastructure-specific code. This section introduces the `Kubernetes` networking
    model and example Cluster communication patterns.


    Three rules govern `Kubernetes`’ networking. These rules enable the simplicity
    described earlier. These rules are from `https://kubernetes.io/docs/concepts/cluster-administration/networking/`.'
