- fmt: '#### Preparing for Upload


    The first requirement to run the upload is a service principal which you can create
    using the command in Listing [9-2](#505695_2_En_9_Chapter.xhtml#PC2).


    ```

    az ad sp create-for-rbac --name http://arc-log-analytics

    Listing 9-2

    azure-cli code to create a new service principal

    ```


    Note


    The name of the service principal doesn''t matter. We picked "arc-log-analytics"
    simply to make the name reflect its purpose.


    Once your service principal has been created, you will get some JSON in return.
    You will need some of these values in the subsequent steps. The output should
    look similar to the one in Figure [9-5](#505695_2_En_9_Chapter.xhtml#Fig5).


    ![](images/505695_2_En_9_Chapter/505695_2_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Output of service principal creation


    Next, we need to assign this new principal to the `Monitoring Metrics Publisher`
    role which can be done using the code in Listing [9-3](#505695_2_En_9_Chapter.xhtml#PC3).
    Make sure to replace the `appId` with the `appId value` from the previous JSON
    and the subscription with your `subscription ID`.


    ```

    az role assignment create --assignee  --role "Monitoring Metrics Publisher" --scope
    subscriptions/

    Listing 9-3

    azure-cli code to assign a service principal to a role

    ```


    This will result in a JSON output, similar to the one in Figure [9-6](#505695_2_En_9_Chapter.xhtml#Fig6),
    again although none of this output is required later on.


    ![](images/505695_2_En_9_Chapter/505695_2_En_9_Fig6_HTML.png)


    Figure 9-6


    Output of Listing [9-3](#505695_2_En_9_Chapter.xhtml#PC3)


    In the next step, we create a Log Analytics Workspace using Listing [9-4](#505695_2_En_9_Chapter.xhtml#PC4).


    ```

    az monitor log-analytics workspace create -g  -n UniqueLogAnalytics

    Listing 9-4

    azure-cli code to create a Log Analytics Workspace

    ```


    Note


    Just like with the service principal, the name doesn''t matter, but it must be
    globally unique. If you have deployed a Log Analytics Workspace during the deployment
    of the directly connected Data Controller, you can also reuse this one. While
    a Data Controller is either directly or indirectly connected, as many of them
    as you want can share the same Log Analytics Workspace.


    This will again result in a JSON output (see Figure [9-7](#505695_2_En_9_Chapter.xhtml#Fig7)),
    and we will need the `customerId` value from this.


    ![](images/505695_2_En_9_Chapter/505695_2_En_9_Fig7_HTML.png)


    Figure 9-7


    Output of Listing [9-4](#505695_2_En_9_Chapter.xhtml#PC4)


    In addition to the `customerId`, we will need the workspace''s shared keys which
    are not included in the default output but can be retrieved through the command
    in Listing [9-5](#505695_2_En_9_Chapter.xhtml#PC5).


    ```

    az monitor log-analytics workspace get-shared-keys

    -g  -n UniqueLogAnalytics

    Listing 9-5

    azure-cli code to retrieve a Log Analytics Workspace’s shared keys

    ```


    This will return in a last JSON output as shown in Figure [9-8](#505695_2_En_9_Chapter.xhtml#Fig8)
    from which we''ll need the `primarySharedKey`.


    ![](images/505695_2_En_9_Chapter/505695_2_En_9_Fig8_HTML.jpg)


    Figure 9-8


    Output of Listing [9-5](#505695_2_En_9_Chapter.xhtml#PC5)


    Now, you should ideally put the results of some of these values into environment
    variables. You can skip this step but would then need to input them manually every
    single time which would make automation basically impossible. Those variables
    are


    *   `SPN_CLIENT_ID`: `appId` from the output of Listing [9-2](#505695_2_En_9_Chapter.xhtml#PC2)


    *   `SPN_CLIENT_SECRET`: `password` from the output of Listing [9-2](#505695_2_En_9_Chapter.xhtml#PC2)


    *   `SPN_TENANT_ID`: `tenant` from the output of Listing [9-2](#505695_2_En_9_Chapter.xhtml#PC2)


    *   `WORKSPACE_ID`: `customerId` from the output of Listing [9-4](#505695_2_En_9_Chapter.xhtml#PC4)


    *   `WORKSPACE_SHARED_KEY`: `primarySharedKey` from the output of Listing [9-5](#505695_2_En_9_Chapter.xhtml#PC5)


    *   `SPN_AUTHORITY`: `https://login.microsoftonline.com`


    #### Uploading Logs, Usage, and Metrics


    As mentioned before, the process consists of two steps: first, we''re going to
    collect the usage, logs, and metrics for every single deployment and write the
    result to a JSON file using the commands in Listing [9-6](#505695_2_En_9_Chapter.xhtml#PC6).
    The `--path` parameter will define the name of the output file, while the `--force`
    parameter will overwrite the target file in case it already exists.


    ```

    az arcdata dc export -t metrics --path metrics.json -k arc --force --use-k8s

    az arcdata dc export -t logs --path logs.json -k arc --force --use-k8s

    az arcdata dc export -t usage --path usage.json -k arc --force --use-k8s

    Listing 9-6

    azure-cli command to export metrics, usage, and logs to a json file

    ```


    `az` will confirm the export for each component as you can see in Figure [9-9](#505695_2_En_9_Chapter.xhtml#Fig9).


    ![](images/505695_2_En_9_Chapter/505695_2_En_9_Fig9_HTML.png)


    Figure 9-9


    Output of Listing [9-6](#505695_2_En_9_Chapter.xhtml#PC6)


    In the second step, we will upload these JSON files using the commands in Listing
    [9-7](#505695_2_En_9_Chapter.xhtml#PC7).


    ```

    az arcdata dc upload --path metrics.json

    az arcdata dc upload --path logs.json

    az arcdata dc upload --path usage.json

    Listing 9-7

    azure-cli command to upload metrics and logs from a json file

    ```


    In this case, `az` will confirm the upload for each component as you can see in
    Figure [9-10](#505695_2_En_9_Chapter.xhtml#Fig10).


    ![](images/505695_2_En_9_Chapter/505695_2_En_9_Fig10_HTML.png)


    Figure 9-10


    Output of Listing [9-7](#505695_2_En_9_Chapter.xhtml#PC7)


    The upload is now completed. You could now go ahead, create a script file that
    combines the export and the upload, and schedule it to run on a regular basis,
    through `cron`, a windows scheduled task, or any other method of your choice to
    constantly get your insights pushed and made visible in the portal.


    ### Monitor Your Resources in the Azure Portal


    After uploading your logs and metrics for a resource for the first time, they
    can be found by searching in the Azure Portal (see Figure [9-11](#505695_2_En_9_Chapter.xhtml#Fig11)),
    side by side with the resources that were created in direct mode and therefore
    already showed up before.


    ![](images/505695_2_En_9_Chapter/505695_2_En_9_Fig11_HTML.jpg)


    Figure 9-11


    Arc Managed Instances showing in the Azure Portal


    Alternatively, every single data instance''s dashboard in Azure Data Studio will
    have a deep link – just like when accessing the built-in dashboards – to the instance
    in the Azure Portal as shown in Figure [9-12](#505695_2_En_9_Chapter.xhtml#Fig12).


    ![](images/505695_2_En_9_Chapter/505695_2_En_9_Fig12_HTML.jpg)


    Figure 9-12


    Link to an Arc MI in the portal from ADS


    In the portal, you will again see the instance''s details like which Data Controller
    is managing it as well as subpages for metrics and logs (see Figure [9-13](#505695_2_En_9_Chapter.xhtml#Fig13)).


    ![](images/505695_2_En_9_Chapter/505695_2_En_9_Fig13_HTML.jpg)


    Figure 9-13


    Single Arc Managed Instance showing in the Azure Portal


    Note


    Alerts only work for directly connected Clusters.


    On the Metrics page, you can analyze the uploaded metrics, just like you could
    for an instance residing in Azure, as you can see in Figure [9-14](#505695_2_En_9_Chapter.xhtml#Fig14).


    ![](images/505695_2_En_9_Chapter/505695_2_En_9_Fig14_HTML.png)


    Figure 9-14


    Arc SQL Managed Instance showing in the Azure Portal – Metrics


    The same logic applies to logs which can be analyzed using Log Analytics as shown
    in Figure [9-15](#505695_2_En_9_Chapter.xhtml#Fig15).


    ![](images/505695_2_En_9_Chapter/505695_2_En_9_Fig15_HTML.png)


    Figure 9-15


    Arc Managed Instance showing in the Azure Portal – Logs'
