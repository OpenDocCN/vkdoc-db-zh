- fmt: '## Upgrading Azure Arc-enabled Data Services


    The first thing to check when you want to upgrade to a newer version of Arc-enabled
    Data Services is which version you are currently running and which versions would
    be available, which can be done using the code from Listing [9-8](#505695_2_En_9_Chapter.xhtml#PC8).


    ```

    az arcdata dc list-upgrades -k arc --use-k8s

    Listing 9-8

    azure-cli command to list available upgrades for a Data Controller

    ```


    The result will look similar to what we see in Figure [9-16](#505695_2_En_9_Chapter.xhtml#Fig16).


    ![](images/505695_2_En_9_Chapter/505695_2_En_9_Fig16_HTML.jpg)


    Figure 9-16


    Available upgrades for an Arc Data Controller


    In this case, our current version is already the latest version, so there is no
    need or even possibility to upgrade this instance.


    However, if there would be, the process would be to first upgrade the Data Controller
    to the desired version using the command from Listing [9-9](#505695_2_En_9_Chapter.xhtml#PC9).


    ```

    az arcdata dc upgrade [--desired-version] [--dry-run] [--k8s-namespace] [--no-wait]
    [--use-k8s]

    Listing 9-9

    azure-cli command to upgrade a Data Controller

    ```


    Once your Data Controller has been upgraded, you could then upgrade your individual
    instances using the command in Listing [9-10](#505695_2_En_9_Chapter.xhtml#PC10).


    ```

    az sql mi-arc upgrade --k8s-namespace [--desired-version] [--dry-run] [--field-filter]
    [--force] [--label-filter] [--name] [--use-k8s]

    Listing 9-10

    azure-cli command to upgrade a SQL MI

    ```


    ## Summary and Key Takeaways


    In this last chapter, we’ve explored the options of getting an overview of your
    Azure Arc-enabled Data Services’ status as well as how to link your deployment
    to the Azure Portal to make metrics and log files available for analysis. In our
    final step, we also checked out how Azure Arc-enabled Data Services can be upgraded.


