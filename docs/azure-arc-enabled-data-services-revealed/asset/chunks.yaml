    About the Authors


    # 1. A Kubernetes Primer


    Welcome to *Azure Arc-enabled Data Services Revealed*! This chapter introduces
    Kubernetes, describing its role in modern application deployment, the benefits
    it provides, and its architecture. Starting with its benefits, you will learn
    the value Kubernetes provides in modern container-based application deployment.
    Next, you will learn how the Kubernetes API enables you to build and deploy next-generation
    applications and systems in code. In that segment, you will learn the core API
    primitives Kubernetes provides to define and deploy applications and systems.
    Then you will learn the key concepts of a Kubernetes Cluster and its components.
    To finish the chapter off, you will learn the role of Kubernetes in Azure Arc-enabled
    Data Services.


    ## Introducing Kubernetes


    Kubernetes is a container orchestrator. It has the responsibility of starting
    up container-based applications on servers in a data center. To do this, Kubernetes
    uses *API Objects* representing resources in a data center, enabling developers
    and system administrators to define systems in code and use that code to deploy.
    Container-based applications are deployed as *Pods* into a *Kubernetes Cluster*.
    A Cluster is a collection of compute resources, either physical or virtual servers,
    called *Nodes*. Let’s dive into each of these elements in more detail, starting
    with the benefits of Kubernetes and understanding the value it provides in modern
    application deployment.'
