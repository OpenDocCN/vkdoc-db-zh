  trans: '

    ## 存储供应


    在集群中供应存储有两种不同的技术：`静态供应`和`动态供应`。


    在静态供应中，集群管理员会在集群中定义一组持久卷对象。每个对象都将是一个唯一的存储对象，定义了存储设备的物理实现细节，例如存储设备在网络上的位置以及所需的确切存储卷。然后，持久卷可以映射到持久卷声明，再分配给
    Pod 使用。这里的关键概念是集群管理员定义每个持久卷对象及其具体实现。这在大型部署中可能很繁琐。有一种更好的方法。


    在我们深入了解动态供应之前，让我们先介绍`存储类`的概念。`存储类`使集群管理员能够根据存储的属性定义存储组。一些常见的分组包括存储子系统的性能概况，例如，高速存储与较慢、可能成本较低的存储，甚至是来自几种不同类型的存储子系统。集群管理员可以将存储类型分组为`存储类`，然后
    Pod 所需的持久卷将从一个`存储类`中动态供应。


    在动态供应中，你的集群中安装了一个名为存储供应器的软件。该供应器与你的存储基础设施协同工作，以响应集群中创建的持久卷声明，动态地创建持久卷对象。在持久卷声明中，你指定希望从哪个`存储类`动态供应持久卷，以及存储供应器所需的任何配置参数。


    动态供应的关键理念是，持久卷是根据需求动态创建的，以响应持久卷声明的创建，而不是像静态供应那样由管理员预先创建。


    从设计角度来看，你可以在集群中创建多个`存储类`，每个类都可以从集群可用的不同类型和层级的存储中分配持久卷。在本书后面，你将看到 Azure Arc-enabled
    Data Services 允许你根据数据类型从`存储类`中供应存储。你将看到为数据库、事务日志、备份以及应用程序日志指定不同`存储类`的选项。


    ## Kubernetes 集群组件


    本章第一部分介绍了 Kubernetes 的概念以及用于在 Kubernetes 集群中构建和部署工作负载的核心 API 对象。现在，是时候深入了解 Kubernetes
    集群是什么了，仔细审视其每个主要组件。


    ### 探索 Kubernetes 集群架构


    Kubernetes 集群是一组称为`节点`的服务器（物理或虚拟），为在 Pod 中运行基于容器的应用程序提供了一个平台。集群中有两种类型的节点。`控制平面节点`是集群本身的控制器，是操作的大脑。`工作节点`是用于运行
    Pod 的计算设备。让我们更仔细地看看每一种，首先是控制平面节点。图 1-4 为我们提供了集群组件的概览。


    ![](img/505695_2_En_1_Fig4_HTML.jpg)


    图 1-4

    Kubernetes 集群组件


    #### 控制平面节点


    `控制平面节点`运行控制平面服务。控制平面服务实现了 Kubernetes 集群的核心功能，例如管理集群本身、其资源以及控制工作负载。控制平面由四个组件组成，每个组件在集群中都有特定的职责。它们是`API
    服务器`、`etcd`、`调度器`和`控制器管理器`。控制平面服务及其组件最常部署为 Pod，可以在单个控制平面节点上运行，也可以在多个控制平面节点上运行以实现高可用性。有关构建高可用集群及其配置的更多信息，请参阅
    [*https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/high-availability/*](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/high-availability/)
    和 [*https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/*](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/)。


    让我们更详细地看看每个控制平面服务及其在集群中的功能和职责：


    *   **API 服务器**：`API 服务器`是集群中的主要通信枢纽。所有集群组件都通过`API 服务器`进行通信以交换信息和状态。它是一个简单、无状态的
    REST API，实现了 Kubernetes API 并暴露给用户和其他集群组件访问。当 API 对象被创建、修改或删除时，这些对象的状态会被提交到集群。可以跨多个控制平面节点部署多个`API
    服务器`副本，并且可以对 API 流量进行负载均衡以实现高可用性。


    *   **etcd**：`etcd`是一个键值数据存储，用于持久化集群的状态。`API 服务器`本身是无状态的，但会将对象数据序列化并存储在`etcd`中。由于它确实持久化数据，因此需要保护这些数据以用于恢复和高可用性。应经常对`etcd`进行备份，如果需要高可用性，则应配置多个副本以实现高可用性部署。


    *   **控制器管理器**：`控制器管理器`实现并确保集群及其工作负载的期望状态。它使用控制循环持续监控运行状况，将其与期望状态进行比较，并进行必要的更改以使集群恢复到期望状态。为此，`控制器管理器`会观察并更新`API
    服务器`。在本章前面，我们介绍了控制器的概念，以及它们如何让你告诉 Kubernetes API 期望的状态是什么。`控制器管理器`实现该状态。当涉及到 Pod
    和应用程序工作负载时，如果某个部署定义了需要三个应用程序的 Pod 副本在线，那么`控制器管理器`就有责任确保这些 Pod 始终在线并准备就绪，通过在必要时创建新的
    Pod 来协调定义的状态与集群的运行状态。


    *   **调度器**：`调度器`决定在集群中的哪个节点上启动 Pod。它监视`API 服务器`，寻找任何未调度的 Pod。如果`调度器`发现任何未调度的
    Pod，它会确定在集群中运行这些 Pod 的最佳位置。调度决策基于集群中可用的资源、为每个 Pod 定义的要求以及可能的任何管理策略约束。我们将在本章后面更详细地探讨调度过程。

    '
- fmt: '#### Worker Node


    Worker Nodes 运行用户应用程序工作负载。一个集群由一个控制平面节点和一组 Worker Nodes 组成。每个 Worker Node 都为集群中的整体可用资源贡献一定量的
    CPU 和内存资源。你需要足够的 CPU 和内存资源来在集群中运行你的应用程序工作负载，确保为应用程序以及节点故障甚至增长事件留有足够的容量。


    **Note**


    控制平面节点的一个主要关注点是确保可用性。有关高可用控制平面拓扑的更多信息，请查看此链接：[https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/)。


    集群中的所有节点，无论是控制平面还是工作节点，都包含三个组件：`kubelet`（与 API Server 通信以进行集群操作）、`kube-proxy`（将该节点上运行的容器暴露给本地网络）以及容器运行时（在节点上启动和运行容器）。


    *   **kubelet**: `kubelet` 是运行在节点上的一个服务，负责与 API Server 通信、在节点上启动 Pod 并确保节点上的 Pod
    处于健康状态。`kubelet` 监控 API Server 的 Pod 工作负载状态，告诉容器运行时启动和停止容器。它还向 API Server 报告节点上运行的
    Pod 的当前状态，并以存活探针和就绪探针的形式对 Pod 执行健康检查。`kubelet` 向 API Server 报告节点的当前状态和该节点上可用的资源。


    *   **kube-proxy**: `kube-proxy` 是在集群所有节点上运行的一个容器，充当网络代理，负责将来自节点所在网络的流量路由到该节点上运行的
    Pod。


    *   **Container Runtime**: 容器运行时负责拉取容器镜像并在节点上运行容器。目前，`containerd` 是 Kubernetes
    集群中最常用的容器运行时。但 Kubernetes 容器运行时领域已转向使用容器运行时接口标准；这使得不同的容器运行时可以作为 Kubernetes 节点上的容器运行时使用。本书中使用的容器运行时是
    `containerd`。有关 Kubernetes 支持的容器运行时的更多信息，请参阅 [https://kubernetes.io/docs/setup/production-environment/container-runtimes/](https://kubernetes.io/docs/setup/production-environment/container-runtimes/)。


    ### Understanding Scheduling and Resource Allocation


    成功在 Kubernetes 中部署工作负载的关键在于理解 Pod 如何被调度到集群中的节点，以及资源如何分配给集群节点上运行的 Pod。在本节中，我们将更深入地探讨这两个主题；让我们从*调度*开始。


    #### Scheduling in Kubernetes


    在 Kubernetes 中，调度是为运行 Pod 选择集群中一个节点的过程。`Scheduler` 是在 Kubernetes 集群的控制平面节点上运行的一个进程。当创建一个
    Pod 时，`Scheduler` 会将这个创建的 Pod 分配到集群中的特定节点上启动。在寻找运行 Pod 的节点时，`Scheduler` 会考虑可用资源、Pod
    上定义的资源需求以及任何已定义的管理策略。如果 `Scheduler` 找不到合适的节点来启动 Pod，Pod 的状态会变为 `Pending`，并且 Pod
    无法启动。


    就资源而言，`Scheduler` 会尝试在集群中找到运行待调度 Pod 的最佳节点。它会寻找集群中是否有足够的资源来运行该 Pod。进一步说，如果一个节点已经在其工作负载中运行了其他一些
    Pod，那么该节点可能没有足够的资源来运行新的 Pod。此外，如果集群中没有剩余任何具有可用容量的节点，那么需要启动的 Pod 将无法调度到任何节点上，因为没有具有足够可用资源的节点可用。在这种情况下，Pod
    的状态变为 `Pending`，并且 Pod 不会启动。


    另一个可能影响调度的因素是管理策略。Kubernetes 为集群管理员和应用程序开发人员提供了多种工具来影响 Pod 到集群节点的调度。如果 `Scheduler`
    无法根据定义的管理策略找到合适的节点来启动 Pod，Pod 的状态会变为 `Pending`，并且 Pod 不会启动。让我们仔细看看集群管理员和开发人员可以用来影响
    Pod 调度的几种工具；首先是 *Requests*。


    *   **Requests**: `Requests` 是资源保证。使用 `Requests`，在定义工作负载时，你指定 Pod 运行所需的确切 CPU
    或内存量，并且必须满足该 CPU 或内存量才能将 Pod 部署到集群中的某个节点。`Scheduler` 使用此信息来找到运行 Pod 的合适节点。如果不可用，Pod
    将不会被调度，因此也不会启动。我们将在下一节资源管理的背景下进一步讨论 `Requests`。


    *   **Node Selectors**: 在 Kubernetes 中定义工作负载时，`Node Selectors` 用于帮助 `Scheduler`
    在选择运行 Pod 的节点时更好地理解你的物理环境。例如，如果集群中的一部分节点可以访问专门的硬件资源，例如高速 SSD 或 GPU，你可以使用 `Node
    Selectors` 来帮助 `Scheduler` 理解此配置，然后它可以仅将 Pod 调度到这些节点上。要使用 `Node Selectors`，你首先为这些节点分配
    `Labels` 以标识它们可以访问该硬件。然后在定义 Pod 时，你定义一个 `Node Selector` 来查找具有已分配 `Labels` 的节点。当
    `Scheduler` 尝试调度此工作负载时，它会将 `Node Selector` 与具有所需 `Label` 的节点匹配，并将新创建的 Pod 调度到满足已定义
    `Node Selector` 的节点。在我们这里的场景中，Pod 被调度到具有专门硬件的节点上，运行的应用程序随后可以使用该硬件。`Node Selectors`
    也可用于物理位置定位，这对于确保 Pod 可以跨云或数据中心中的故障域进行调度很有价值。有关 `Node Selectors` 的更多信息，请参阅 [https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/)。'
  raw: '#### Worker Node


    Worker Nodes run user application workloads. A Cluster consists of a Control Plane
    Node and a collection of Worker Nodes. Each Worker Node contributes some amount
    of CPU and memory resources to the overall available resources in a Cluster. You
    will need enough CPU and memory resources to run your application workload in
    a Cluster, ensuring enough capacity for applications and also in the event of
    Node failures and even growth.


    Note


    A primary concern for the Control Plane Node is ensuring availability. Check out
    this link for more information on high-availability Control Plane topologies:
    [*https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/*](https://kubernetes.io/docs/setup/production-environment/tools/kubeadm/ha-topology/).


    All Nodes in a Cluster, either Control Plane or Worker, consist of three components,
    the *kubelet* which communicates with the API Server for Cluster operations, the
    *kube-proxy* which exposes containers running on that Node to the local network,
    and the *container runtime* which starts and runs the containers on the Node:


    *   **kubelet**: The kubelet is a service running on a Node and is responsible
    for communicating with the API Server, starting Pods on a Node, and ensuring that
    the Pods on that Node are in a healthy state. The kubelet monitors the API Server
    for Pod workload state, telling the container runtime to start and stop containers.
    It also reports back to the API Server the current state of Pods running on a
    Node and implements health checks on Pods in the form of liveness probes and readiness
    probes. The kubelet reports back to the API Server the Node’s current state and
    the resources available on that Node.


    *   **kube-proxy**: kube-proxy is a container running on all Nodes in a Cluster
    and functions as a network proxy responsible for routing traffic from the network
    the Node is on to the Pods running on that Node.


    *   **Container Runtime**: The container runtime is responsible for pulling container
    images and running containers on the Node. Today, containerd is the most commonly
    used container runtime used in Kubernetes Clusters. But the Kubernetes container
    runtime space has moved to using the Container Runtime Interface standard; this
    enables different container runtimes to be used as the container runtime on Kubernetes
    Nodes. In this book, the container runtime used is containerd. See [*https://kubernetes.io/docs/setup/production-environment/container-runtimes/*](https://kubernetes.io/docs/setup/production-environment/container-runtimes/)
    for more information on the container runtimes supported in Kubernetes.


    ### Understanding Scheduling and Resource Allocation


    Crucial to successfully deploying workloads in Kubernetes is understanding how
    Pods are scheduled to Nodes in the Cluster and also how resources are allocated
    to Pods running on Nodes in a Cluster. In this section, we will dive deeper into
    each of these topics; let’s start off with *scheduling* .


    #### Scheduling in Kubernetes


    In Kubernetes, scheduling is the process of selecting a Node in a Cluster to run
    a Pod. The *Scheduler* is a process that runs on the Control Plane Node in a Kubernetes
    Cluster. When a Pod is created, the Scheduler assigns the created Pod to start
    on a specific Node in the Cluster. When finding a Node to run a Pod, the Scheduler
    considers the resources available, the resource requirements defined on the Pod,
    and any defined administrative policies. If the Scheduler cannot find an appropriate
    Node to start a Pod on, the Pod’s status is changed to Pending and the Pod is
    not able to start.


    In terms of resources, the Scheduler tries to find the best Node in a Cluster
    to run a Pod needing to be scheduled. It will look to find a Node in the Cluster
    that has enough resources to run the Pod. Extending that, if a Node is already
    running some other number of Pods in its workload, that Node may not have enough
    resources to run a Pod. Further, if there are no Nodes remaining in the Cluster
    with any available capacity, then Pods that need to be started will not be able
    to be scheduled to a Node since no Node with enough available resources is available.
    In this condition, the status of the Pod changes to Pending and the Pod is not
    started.


    The other element that can influence scheduling is administrative policy. Kubernetes
    gives Cluster administrators and application developers several tools to influence
    the scheduling of Pods to Nodes in a Cluster. If the Scheduler cannot find an
    appropriate Node to start a Pod on based on the defined administrative policies,
    the Pod’s status changes to Pending and the Pod is not started. Let’s look closely
    at several of the tools Cluster administrators and developers can use to influence
    Pod scheduling; first up is *Requests*:


    *   **Requests**: Requests are resource guarantees. Using Requests, when defining
    a workload, you specify an exact amount of CPU or memory a Pod needs to run, and
    that amount of CPU or memory must be met in order to deploy the Pod on a Node
    in the Cluster. The Scheduler uses this information to find an appropriate Node
    to run the Pod. If it is not available, the Pod will not be scheduled and thus
    not started. We will discuss Requests further in the context of resource management
    in the next section.


    *   **Node Selectors**: When defining workloads in Kubernetes, Node Selectors
    are used to help the Scheduler better understand your physical environment when
    selecting a Node to run a Pod. For example, if a subset of Nodes in a Cluster
    has access to specialized hardware resources, perhaps as a high-speed SSD or a
    GPU, you can use Node Selectors to help the Scheduler understand this configuration,
    and it can then schedule Pods on only those Nodes. To use Node Selectors, you
    first assign Labels to those Nodes to identify the fact that they have access
    to that hardware. Then when defining your Pod, you define a Node Selector looking
    for Nodes with the assigned Labels. When the Scheduler tries to schedule this
    workload, it will match the Node Selector to the Node with the desired Label and
    schedule the newly created Pod to a Node that satisfies the defined Node Selector.
    In our scenario here, the Pod is scheduled to a Node with the specialized hardware
    and the application running can then use that hardware. Node Selectors can also
    be used for physical location targeting which is valuable to ensure Pods can be
    scheduled across fault domains in a cloud or data center. For more information
    on Node Selectors, see [*https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/*](https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/).'
