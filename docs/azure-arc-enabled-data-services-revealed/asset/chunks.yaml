- fmt: '## Installing and Configuring containerd


    To install `containerd`, we need to load two modules (`overlay` and `br_netfilter`)
    using the code in Listing [4-4](#505695_2_En_4_Chapter.xhtml#PC4). They are required
    by the `OverlayFS` used by the container runtime and for networking inside the
    Cluster.


    ```

    sudo modprobe overlay

    sudo modprobe br_netfilter

    Listing 4-4

    Install modprobe and br_netfilter

    ```


    Using the code in Listing [4-5](#505695_2_En_4_Chapter.xhtml#PC5), we need to
    make sure those are also loaded on reboot.


    ```

    cat <<EOF | sudo tee /etc/modules-load.d/containerd.conf

    overlay

    br_netfilter

    EOF

    Listing 4-5

    Persist modprobe and br_netfilter

    ```


    `containerd` also requires a few system parameters which we can set and persist
    using the command in Listing [4-6](#505695_2_En_4_Chapter.xhtml#PC6).


    ```

    cat <<EOF | sudo tee /etc/sysctl.d/99-kubernetes-cri.conf

    net.bridge.bridge-nf-call-iptables  = 1

    net.ipv4.ip_forward                 = 1

    net.bridge.bridge-nf-call-ip6tables = 1

    EOF

    Listing 4-6

    Persist system parameters for containerd

    ```


    Next, let’s apply those settings without rebooting using the command in Listing
    [4-7](#505695_2_En_4_Chapter.xhtml#PC7).


    ```

    sudo sysctl --system

    Listing 4-7

    Apply sysctl changes

    ```


    Now our prerequisites for `containerd` are in place, so we can install it through
    `apt-get` as shown in Listing [4-8](#505695_2_En_4_Chapter.xhtml#PC8).


    ```

    sudo apt-get update

    sudo apt-get install -y containerd

    Listing 4-8

    Install containerd

    ```


    `containerd` requires a configuration file, and we can use `containerd` itself
    to generate one with default settings (Listing [4-9](#505695_2_En_4_Chapter.xhtml#PC9)).


    ```

    sudo mkdir -p /etc/containerd

    sudo containerd config default | sudo tee /etc/containerd/config.toml

    Listing 4-9

    Create containerd config

    ```


    In this file, we must set the `cgroup` driver for `containerd` to `systemd` as
    this is required for the `kubelet`.


    Open the file `/etc/containerd/config.toml` in a text editor as root (e.g., through
    `vi` as shown in Listing [4-10](#505695_2_En_4_Chapter.xhtml#PC10)).


    ```

    sudo vi /etc/containerd/config.toml

    Listing 4-10

    Edit containerd config

    ```


    In this file, find the section shown in Listing [4-11](#505695_2_En_4_Chapter.xhtml#PC11).


    ```

    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc]

    Listing 4-11

    The configuration section in the containerd config file

    ```


    Below that, look for the line `SystemdCgroup = false` and change the value from
    the default of `false` to `true` (as in Listing [4-12](#505695_2_En_4_Chapter.xhtml#PC12)).


    ```

    [plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runc.options]

    ...

    SystemdCgroup = true

    Listing 4-12

    Lines to be edited in the containerd config file, change false to true

    ```


    **Note**

    Indentation matters here – this can be tabs or spaces! Make sure your file looks
    like the one in Figure [4-1](#505695_2_En_4_Chapter.xhtml#Fig1)!


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig1_HTML.jpg)

    Figure 4-1

    Indentation in containerd config file


    To exit `vi` and save the file, hit `ESC` and then type `:x!`.


    Based on our new settings, we can use `systemctl` to restart `containerd` as shown
    in Listing [4-13](#505695_2_En_4_Chapter.xhtml#PC13).


    ```

    sudo systemctl restart containerd

    Listing 4-13

    Restart containerd

    ```


    `containerd` is now ready for use, and we can move on to installing the Kubernetes
    packages. You can confirm the status of the service using the command in Listing
    [4-14](#505695_2_En_4_Chapter.xhtml#PC14).


    ```

    sudo systemctl status containerd

    Listing 4-14

    Status of containerd

    ```


    ## Installing and Configuring Kubernetes Packages


    As we will be installing packages from the Google Apt Repository, we will need
    to add Google’s apt repository `gpg` key first (Listing [4-15](#505695_2_En_4_Chapter.xhtml#PC15)).


    ```

    curl -s https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo apt-key add
    -

    Listing 4-15

    Add Google gpg key

    ```


    With that key in place, we next add the Kubernetes apt repository (Listing [4-16](#505695_2_En_4_Chapter.xhtml#PC16)).


    ```

    sudo bash -c ''cat <<EOF > /etc/apt/sources.list.d/kubernetes.list

    deb https://apt.kubernetes.io/ kubernetes-xenial main

    EOF''

    Listing 4-16

    Add Kubernetes apt repository

    ```


    Let’s update the apt package list and look at the available versions for the `kubelet`
    using the code in Listing [4-17](#505695_2_En_4_Chapter.xhtml#PC17).


    ```

    sudo apt-get update

    apt-cache policy kubelet | head -n 20

    Listing 4-17

    Update apt package list

    ```


    This shows the available versions, and as you can see in Figure [4-2](#505695_2_En_4_Chapter.xhtml#Fig2),
    at the time of writing, the latest available version is `1.20.4`.


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig2_HTML.jpg)

    Figure 4-2

    Version list for kubelet


    We can now install `kubelet`, `kubeadm`, and `kubectl` as shown in Listing [4-18](#505695_2_En_4_Chapter.xhtml#PC18).
    If your current machine is also the one you’ve used to install `kubectl` in Chapter
    [1](#505695_2_En_1_Chapter.xhtml), you may get a message that it’s already installed.


    ```

    sudo apt-get install -y kubelet kubeadm kubectl

    Listing 4-18

    Install Kubernetes packages

    ```


    This will install the latest version of each of these tools. Should you wish to
    install a previous version, you can specify that as shown in Listing [4-19](#505695_2_En_4_Chapter.xhtml#PC19).


    ```

    VERSION=1.22.4-00

    sudo apt-get install -y kubelet=$VERSION kubeadm=$VERSION kubectl=$VERSION

    Listing 4-19

    Installing a specific version of Kubernetes packages

    ```


    To avoid automatic updates, we mark those tools (and `containerd`) as hold (Listing
    [4-20](#505695_2_En_4_Chapter.xhtml#PC20)). This gives us full control over the
    patching process, running it independent from patching the base operating system.


    **Note**

    The code in this book is tested against Kubernetes version `1.22.4`. Please monitor
    the Azure Arc-enabled Data Services release notes for supported Kubernetes versions
    by visiting [*https://docs.microsoft.com/en-us/azure/azure-arc/data/release-notes*](https://docs.microsoft.com/en-us/azure/azure-arc/data/release-notes).


    ```

    sudo apt-mark hold kubelet kubeadm kubectl containerd

    Listing 4-20

    Mark Kubernetes packages and containerd as hold

    ```


    Let’s check the status of our `kubelet` and our container runtime (Listing [4-21](#505695_2_En_4_Chapter.xhtml#PC21)).


    ```

    sudo systemctl status kubelet.service

    sudo systemctl status containerd.service

    Listing 4-21

    Check the status of kubelet and containerd

    ```


    As you can see in Figure [4-3](#505695_2_En_4_Chapter.xhtml#Fig3), the `kubelet`
    will enter a crashloop. This is normal behavior until a Cluster is created or
    the Node is joined to an existing Cluster (you can leave that process by hitting
    `q`).


    ![](images/505695_2_En_4_Chapter/505695_2_En_4_Fig3_HTML.png)

    Figure 4-3

    Status of kubelet and containerd


    Also, make sure that both services are set to start when the system starts up.
    This can be set through the commands in Listing [4-22](#505695_2_En_4_Chapter.xhtml#PC22).


    ```

    sudo systemctl enable kubelet.service

    sudo systemctl enable containerd.service

    Listing 4-22

    Enable startup on reboot for kubelet and containerd

    ```


    **Note**

    Remember to repeat this process and install and configure these packages on each
    node, `control`, `node-1`, `node-2`, and `node-3`, individually!


    ### Creating a Control Plane


    With our container runtime and Kubernetes packages now in place, we can move on
    to create our Control Plane.


    **Note**

    All commands in this section need to be executed on your `control` VM.'
