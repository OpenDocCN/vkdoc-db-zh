  trans: '## 订阅问题


    在当今世界，我们许多人不再订阅杂志或报纸，但就在不久之前，它们还非常流行。客户会订阅出版物，有时会在某个时间点取消订阅。在这个问题中，你必须计算每个月底的有效订阅数量。数据中可能会有晚于最晚订阅日期的取消日期，对于这些行你可以忽略。


    解决这个问题最直观的方法是使用一个临时表，为每个月创建一行。然后遍历数据的每一行，根据开始和停止日期进行加减。遗憾的是，这种方法运行速度极慢。利用累积聚合功能可以轻松解决这个问题，而且运行速度快！


    首先，创建一个包含一些随机注册数据的临时表。由于是随机的，你的最终结果将与我的不同。此脚本创建一个包含 100,000 行的表，但你可以根据需要调整这个数字。清单
    4-7 创建并填充了该表。


    ```sql

    --4-7.1 创建临时表

    CREATE TABLE #Registrations(ID INT NOT NULL IDENTITY PRIMARY KEY,

    DateJoined DATE NOT NULL, DateLeft DATE NULL);

    --4-7.2 变量

    DECLARE @Rows INT = 10000, @Years INT = 5, @StartDate DATE = ''2019-01-01''

    --4-7.3 插入 10,000 行，包含五年的可能日期

    INSERT INTO #Registrations (DateJoined)

    SELECT TOP(@Rows) DATEADD(DAY,CAST(RAND(CHECKSUM(NEWID())) * @Years * 365  as
    INT) ,@StartDate)

    FROM sys.objects a

    CROSS JOIN sys.objects b

    CROSS JOIN sys.objects c;

    --4-7.4 为 75%的订阅者添加取消日期

    UPDATE TOP(75) PERCENT #Registrations

    SET DateLeft = DATEADD(DAY,CAST(RAND(CHECKSUM(NEWID())) * @Years * 365  as INT),DateJoined)

    --4-7.5 订阅数据

    SELECT *

    FROM #Registrations

    ORDER BY DateJoined;

    ```

    清单 4-7

    创建订阅表


    部分结果将如图 4-9 所示。


    ![`../images/335106_2_En_4_Chapter/335106_2_En_4_Fig9_HTML.jpg`](img/335106_2_En_4_Fig9_HTML.jpg)

    图 4-9

    部分订阅数据


    如果你阅读我在 2009 年写的一篇用于解决类似问题的文章（[`www.red-gate.com/simple-talk/sql/performance/writing-efficient-sql-set-based-speed-phreakery/`](http://www.red-gate.com/simple-talk/sql/performance/writing-efficient-sql-set-based-speed-phreakery/)），你会发现高效的代码也曾很复杂且难以理解。在那篇文章中，我解释了
    SQL 专家 Peter Larsson 提出的一种解决方案，它使用了临时表、`UNPIVOT`和一个不受支持的“古怪”更新。有了 SQL Server 2012，这个问题的解决方案写起来就非常容易，而且性能很好。清单
    4-8 展示了该解决方案。


    ```sql

    --4-8.1 解决订阅问题

    WITH NewSubs AS (

    SELECT EOMONTH(DateJoined) AS TheMonth,

    COUNT(DateJoined) AS PeopleJoined

    FROM #Registrations

    GROUP BY EOMONTH(DateJoined)),

    Cancelled AS (

    SELECT EOMONTH(DateLeft) AS TheMonth,

    COUNT(DateLeft) AS PeopleLeft

    FROM #Registrations

    GROUP BY EOMONTH(DateLeft))

    SELECT NewSubs.TheMonth AS TheMonth, NewSubs.PeopleJoined,

    Cancelled.PeopleLeft,

    SUM(NewSubs.PeopleJoined - ISNULL(Cancelled.PeopleLeft,0))

    OVER(ORDER BY NewSubs.TheMonth) AS Subscriptions

    FROM NewSubs

    LEFT JOIN Cancelled ON NewSubs.TheMonth = Cancelled.TheMonth;

    ```

    清单 4-8

    使用 SQL Server 2012 功能解决订阅问题


    部分结果如图 4-10 所示。第一步是按月获取新订阅和取消订阅的计数。为此，必须按月对数据进行分组。在这个案例中，使用了 `EOMONTH` 函数，它将每个日期更改为当月的最后一天。


    ![`../images/335106_2_En_4_Chapter/335106_2_En_4_Fig10_HTML.jpg`](img/335106_2_En_4_Fig10_HTML.jpg)

    图 4-10

    订阅问题的部分结果


    新订阅数和取消订阅数被分别放入 CTE 中，以分别获取每个月的 `PeopleJoined` 和 `PeopleLeft` 值。外部查询将 `NewSubs`
    CTE 与 `Cancelled` CTE 通过 `LEFT JOIN` 连接，因为有许多月份没有取消订阅。`PeopleJoined` 减去已处理了 `NULL`
    值的 `PeopleLeft` 之后的总和被计算为一个累计总计。


    该查询编写起来非常容易，而且运行相当快。在我的 Azure 虚拟机上，针对 100,000 行数据运行，耗时少于 100 毫秒。


    ## 总结


    从 SQL Server 2012 开始，在 `OVER` 子句中添加 `ORDER BY` 会将窗口聚合变为累积窗口聚合。这让你可以轻松创建累计总计，以及移动总计和平均值。然而，此功能并不仅限于用于求和与平均值。`MAX`
    函数也曾被用于解决一个难题。


    在本章中，通过观察移动总和与平均值，你初步了解了帧。第 5 章将深入探讨帧。


    ---


    ## 5. 向窗口添加帧


    你已经审视过窗口，并利用它编写了强大的查询来解决一些常见问题。你已将窗口分区，就像大窗户上较小的窗格。现在，你将学习如何通过使用帧来创建非常精细的窗口，就像彩色玻璃一样。


    在本章中，你将了解在支持帧的情况下，帧对于结果的准确性为何如此重要。帧对于性能也很重要，但你将在第 8 章学习相关内容。'
- fmt: "## Understanding Framing\n\n当 2012 年的 T-SQL 功能在 2011 年首次公布时，我必须承认 framing\
    \ 让我有些畏惧。我尽可能避免学习它，因为我实在不太喜欢那个语法，也不太理解它到底是怎么回事。幸运的是，frames 只在特定的窗口函数中支持，所以它们并不常用。生活中最可怕的事情，比如公开演讲，往往带来最大的回报，窗口函数表达式中的\
    \ framing 也是如此。花时间理解 framing 将真正帮助你从窗口函数中获得最大收益。\n\n使用 framing，你可以指定一个比分区更小的窗口。例如，你可能想要一个从集合的第一行开始但在当前行停止的窗口。你可能想要一个从当前行之前仅\
    \ 12 行开始，而不管分区中有多少行的窗口。使用 frames，你可以定义满足这些特殊要求的窗口。\n\n在开始向你的 `OVER` 子句添加 frames\
    \ 之前，你应该理解几个关键术语。表 [5-1](#335106_2_En_5_Chapter.xhtml#Tab1) 列出了这些术语及其定义。\n\n**Table\
    \ 5-1**\n\n**Key Framing Terms**\n\n| Key Term | Definition |\n| --- | --- |\n\
    | `ROWS` | 一个物理操作符。查看行的位置。 |\n| `RANGE` | 一个逻辑操作符，但在当前版本的 SQL Server 中未完全实现。查看表达式的值而非位置。\
    \ |\n| `UNBOUNDED PRECEDING` | 帧从集合中的第一行开始。 |\n| `UNBOUNDED FOLLOWING` | 帧在集合中的最后一行结束。\
    \ |\n| `N PRECEDING` | 当前行之前的物理行数。仅与 `ROWS` 一起支持。 |\n| `N FOLLOWING` | 当前行之后的物理行数。仅与\
    \ `ROWS` 一起支持。 |\n| `CURRENT ROW` | 当前计算所在的行。 |\n\n你在第 [4](#335106_2_En_4_Chapter.xhtml)\
    \ 章看到，用于累计聚合的窗口对于每一行都是不同的。如果你在计算累计总和，第 1 行的窗口就是第 1 行。第 2 行的窗口是第 1 行和第 2 行。第 3\
    \ 行的窗口是第 1 行到第 3 行，依此类推。在每种情况下，窗口都从分区的第一行开始，在当前行结束。图 [5-1](#335106_2_En_5_Chapter.xhtml#Fig1)\
    \ 展示了按 `CustomerID` 分区时帧的样子。注意，第 4 行的窗口在一个新的分区 `CustomerID` 11001 中，并且第 4 行是该分区的第一行。\n\
    \n![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig1_HTML.jpg](images/335106_2_En_5_Chapter/335106_2_En_5_Fig1_HTML.jpg)\n\
    \n**Figure 5-1**\n\n**每一行都有一个不同的窗口**\n\n帧定义由关键字 `ROWS` 或 `RANGE` 后跟单词 `BETWEEN`\
    \ 组成。然后你必须指定一个起点和终点。语法如下：\n\n```\nROWS BETWEEN  AND \nRANGE BETWEEN  AND \n```\n\
    \n有两种可能的帧表达式可以给你一个累计聚合，比如累计总和，从分区的第一行开始，到当前行结束：`ROWS BETWEEN UNBOUNDED PRECEDING\
    \ AND CURRENT ROW` 和 `RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW`。你将在本章后面了解更多关于\
    \ `ROWS` 和 `RANGE` 之间的区别，但现在你应该理解，`RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT\
    \ ROW` 是默认的帧，即当支持帧但未指定时使用的帧。这就是为什么你可以只为 `SUM` 的 `OVER` 子句添加一个 `ORDER BY` 表达式就能产生累计总和。表达式\
    \ `SUM(TotalDue) OVER(ORDER BY OrderID)` 和 `SUM(TotalDue) OVER(ORDER BY OrderID\
    \ RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW)` 是等效的。\n\n出于你将在本章后面了解的原因，首选的帧表达式使用\
    \ `ROWS` 而不是 `RANGE`。你也可以使用累计总和帧的缩写语法：`ROWS UNBOUNDED PRECEDING`。\n\n要创建一个从当前行开始并包含到集合末尾的所有行的帧，请使用\
    \ `ROWS BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING`。这将允许你创建一个反向的累计总和。使用帧的另一种方式是指定帧中包含的行数。此语法只能与\
    \ `ROWS` 一起使用。你可以指定当前行之前、之后或前后的行数。如果你打算指定当前行之前的行数，这个表达式还有一个快捷方式：`ROWS <N> PRECEDING`。想象一下，你有一个由\
    \ 10 行组成的分区，当前行是第 5 行。表 [5-2](#335106_2_En_5_Chapter.xhtml#Tab2) 列出了几个帧示例以及这些示例所引用的行。\n\
    \n**Table 5-2**\n\n**Framing Examples**\n\n| Frame | Rows |\n| --- | --- |\n|\
    \ `ROWS BETWEEN 3 PRECEDING AND CURRENT ROW` | 2–5 |\n| `ROWS BETWEEN CURRENT\
    \ ROW AND 4 FOLLOWING` | 5–9 |\n| `ROWS BETWEEN 3 PRECEDING AND 4 FOLLOWING` |\
    \ 2–9 |\n| `ROWS | RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW` | 1–5 |\n\
    | `ROWS | RANGE BETWEEN CURRENT ROW AND UNBOUNDED FOLLOWING` | 5–10 |\n\n图 [5-2](#335106_2_En_5_Chapter.xhtml#Fig2)\
    \ 说明了这些示例。\n\n![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig2_HTML.png](images/335106_2_En_5_Chapter/335106_2_En_5_Fig2_HTML.png)\n\
    \n**Figure 5-2**\n\n**一些 framing 示例**\n\n`RANGE` 操作符不能在指定之前或之后的行数时使用，但它可以与 `UNBOUNDED\
    \ PRECEDING` 和 `UNBOUNDED FOLLOWING` 短语一起使用。不太可能有人会故意指定 RANGE；他们很可能是漏掉了帧而默认得到了\
    \ `RANGE`。\n\nSQL 标准中有一些功能在 T-SQL 的实现中被遗漏了。该功能允许你指定一个时间段而不是行数。清单 [5-1](#335106_2_En_5_Chapter.xhtml#PC2)\
    \ 是一个理论上的查询，可能在将来可用。\n\n```sql\n--5-1.1 A theoretical query\nSELECT SUM(TotalDue)\
    \ OVER(ORDER BY OrderDate\nRANGE BETWEEN INTERVAL 5 MONTH PRECEDING and 1 MONTH\
    \ FOLLOWING\n) SixMonthTotal\nFROM Sales.SalesOrderHeader;\n```\n**Listing 5-1**\n\
    **A Theoretical Query Using Range As It’s Intended**\n\n在了解当前实现功能中 `ROWS` 和 `RANGE`\
    \ 的区别之前，先回顾几个使用帧的示例。"
  raw: "## Understanding Framing\n\nWhen the 2012 T-SQL features were first announced\
    \ back in 2011, I must confess that framing intimidated me a bit. I avoided learning\
    \ about it as long as I could because I didn’t really like the syntax and didn’t\
    \ quite understand what was going on. Luckily, frames are only supported with\
    \ specific window functions, so they are not used too often. The scariest things\
    \ in life, like public speaking, often turn out to have the biggest payoffs, and\
    \ framing in window function expressions is no different. Taking the time to understand\
    \ framing will really help you get the most from window functions.\n\nWith framing,\
    \ you can specify a window that is smaller than the partition. For example, you\
    \ may want a window that starts at the first row of the set but stops at the current\
    \ row. You may want a window that starts just 12 rows before the current row regardless\
    \ of how many rows are in the partition. With frames, you can define windows that\
    \ meet these special requirements.\n\nBefore you start adding frames to your `OVER`\
    \ clauses , you should understand several key terms. Table [5-1](#335106_2_En_5_Chapter.xhtml#Tab1)\
    \ lists the terms and the definitions.\n\nTable 5-1\n\nKey Framing Terms\n\n|\
    \ Key Term | Definition |\n| --- | --- |\n| `ROWS` | A physical operator. Looks\
    \ at the position of the rows. |\n| `RANGE` | A logical operator, but not fully\
    \ implemented in the current versions of SQL Server. Looks at the value of an\
    \ expression instead of the position. |\n| `UNBOUNDED PRECEDING` | The frame starts\
    \ at the first row in the set. |\n| `UNBOUNDED FOLLOWING` | The frame ends at\
    \ the final row in the set. |\n| `N PRECEDING` | A physical number of rows before\
    \ the current row. Supported only with `ROWS`. |\n| `N FOLLOWING` | A physical\
    \ number of rows after the current row. Supported only with `ROWS`. |\n| `CURRENT\
    \ ROW` | The row of the current calculation. |\n\nYou saw in Chapter [4](#335106_2_En_4_Chapter.xhtml)\
    \ that the window for accumulating aggregates is different for every row. If you\
    \ are calculating a running total, the window for row 1 is row 1\\. The window\
    \ for row 2 is rows 1 and 2\\. The window for row 3 is rows 1 to 3, and so on.\
    \ In each case, the window begins at the first row of the partition and ends at\
    \ the current row. Figure [5-1](#335106_2_En_5_Chapter.xhtml#Fig1) shows what\
    \ the frames look like when partitioned by `CustomerID`. Notice that the window\
    \ for row 4 is in a new partition, `CustomerID` 11001, and row 4 is the first\
    \ row in that partition.\n\n![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig1_HTML.jpg](images/335106_2_En_5_Chapter/335106_2_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\n\nEach row has a different window\n\nThe frame definition consists\
    \ of the keyword `ROWS` or `RANGE` followed by the word `BETWEEN`. Then you must\
    \ specify a starting point and ending point. Here is the syntax:\n\n```\nROWS\
    \ BETWEEN  AND \nRANGE BETWEEN  AND \n```\n\nThere are two possible frame expressions\
    \ that will give you an accumulating aggregate, like a running total, starting\
    \ with the first row of the partition and ending with the current row: `ROWS BETWEEN\
    \ UNBOUNDED PRECEDING AND CURRENT ROW` and `RANGE BETWEEN UNBOUNDED PRECEDING\
    \ AND CURRENT ROW`. You will learn more about the differences between `ROWS` and\
    \ `RANGE` later in the chapter, but for now, you should understand that `RANGE\
    \ BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW` is the default frame where a frame\
    \ is supported but not specified. That is why you can just add an `ORDER BY` expression\
    \ to an `OVER` clause for `SUM` and produce a running total. The expressions `SUM(TotalDue)\
    \ OVER(ORDER BY OrderID)` and `SUM(TotalDue) OVER(ORDER BY OrderID RANGE BETWEEN\
    \ UNBOUNDED PRECEDING AND CURRENT ROW)` are equivalent.\n\nFor reasons that you\
    \ will learn later in the chapter, the preferred frame expression uses `ROWS`\
    \ instead of `RANGE`. You can also use an abbreviated syntax for the running total\
    \ frame: `ROWS UNBOUNDED PRECEDING`.\n\nTo create a frame that starts at the current\
    \ row and includes all of the rows to the end of the set, use `ROWS BETWEEN CURRENT\
    \ ROW AND UNBOUNDED FOLLOWING`. This will allow you to create a reverse running\
    \ total. Another way to use a frame is by specifying a number of rows to include\
    \ in the frame. This syntax can only be used with `ROWS`. You can specify a number\
    \ of rows before, after, or before and after the current row. There is also a\
    \ shortcut for this expression if you intend a number of rows before the current\
    \ row: `ROWS <N> PRECEDING`. Imagine that you have a partition consisting of 10\
    \ rows, and that the current row is row 5\\. Table [5-2](#335106_2_En_5_Chapter.xhtml#Tab2)\
    \ lists several frame examples and the rows that the examples refer to.\n\nTable\
    \ 5-2\n\nFraming Examples\n\n| Frame | Rows |\n| --- | --- |\n| ROWS BETWEEN 3\
    \ PRECEDING AND CURRENT ROW | 2–5 |\n| ROWS BETWEEN CURRENT ROW AND 4 FOLLOWING\
    \ | 5–9 |\n| ROWS BETWEEN 3 PRECEDING AND 4 FOLLOWING | 2–9 |\n| ROWS &#124; RANGE\
    \ BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW | 1–5 |\n| ROWS &#124; RANGE BETWEEN\
    \ CURRENT ROW AND UNBOUNDED FOLLOWING | 5–10 |\n\nFigure [5-2](#335106_2_En_5_Chapter.xhtml#Fig2)\
    \ illustrates these examples.\n\n![../images/335106_2_En_5_Chapter/335106_2_En_5_Fig2_HTML.png](images/335106_2_En_5_Chapter/335106_2_En_5_Fig2_HTML.png)\n\
    \nFigure 5-2\n\nSome framing examples\n\nThe `RANGE` operator can’t be used when\
    \ specifying a number of rows preceding or following, but it can be used with\
    \ `UNBOUNDED PRECEDING` and `UNBOUNDED FOLLOWING` phrases. It’s unlikely anyone\
    \ will specify RANGE on purpose; they are most likely to leave the frame out and\
    \ get `RANGE` by default.\n\nThere is functionality in the SQL standards that\
    \ has been left out of the implementation in T-SQL. This functionality allows\
    \ you to specify a time period instead of a number of rows. Listing [5-1](#335106_2_En_5_Chapter.xhtml#PC2)\
    \ is a theoretical query that may be available someday.\n\n```\n--5-1.1 A theoretical\
    \ query\nSELECT SUM(TotalDue) OVER(ORDER BY OrderDate\nRANGE BETWEEN INTERVAL\
    \ 5 MONTH PRECEDING and 1 MONTH FOLLOWING\n) SixMonthTotal\nFROM Sales.SalesOrderHeader;\n\
    Listing 5-1\nA Theoretical Query Using Range As It’s Intended\n```\n\nBefore learning\
    \ about the differences between `ROWS` and `RANGE` for the currently implemented\
    \ functionality, review a few examples using frames."
