  raw: '### Rate of Change


    Rates of change are the percentage of change in a moving total or moving average
    and indicate if a measure is improving over the prior year or getting worse. They
    are useful for determining leading and lagging indicators between divergent information
    sources. Leading indicators are things that can be used to predict forces of change
    for a business. For example, if your business relies on petrochemical feedstocks
    to produce its products, changes to oil prices are likely to presage a change
    in demand for your products and could be considered a leading indicator. Charting
    the rate of change for corporate sales alongside the rate of change for stock
    market and commodity indices allows you to determine if your company''s performance
    leads, lags, or is coincident with the performance of the stock market.


    Add the following block of column calculations in Listing [11-3](#335106_2_En_11_Chapter.xhtml#PC5)
    to the query from Listing [11-2](#335106_2_En_11_Chapter.xhtml#PC4) and explore
    the results.


    ```

    /* Rate of Change [3 MMT]/([3 MMT].LAG( 12 months)) */

    [Sales 3 MMT]

    / LAG(NULLIF([Sales 3 MMT], 0), 11, null)

    OVER(ORDER BY [OrderYear], [OrderMonth])

    as [3/12 RoC],

    /* [12 MMT] /([12 MMT].LAG( 12 months)) */

    [Sales 12 MMT]

    / LAG(NULLIF([Sales 12 MMT],0), 11, null)

    OVER(ORDER BY [OrderYear], [OrderMonth])

    as [12/12 RoC]

    Listing 11-3

    Rate of Change Calculations

    ```


    Rate of change less than 1.0 (100%) are downward trends and rates of change 1.0
    or greater are positive change. The calculation can also be amended to turn the
    ratio into a positive or negative number as follows:


    ```

    /* Rate of Change +/- ([3 MMT]/([3 MMT].LAG( 12 months))* 100) -100 */

    ([Sales 3 MMT] / LAG(NULLIF([Sales 3 MMT], 0), 11, null)

    OVER(ORDER BY [OrderYear], [OrderMonth]) *100) - 100

    as [3/12 RoC2],

    /* ([12 MMT] /([12 MMT].LAG( 12 months))* 100) -100 */

    ([Sales 12 MMT] / LAG(NULLIF([Sales 12 MMT],0), 11, null)

    OVER(ORDER BY [OrderYear], [OrderMonth]) *100) - 100

    as [12/12 RoC2]

    ```


    The results of the rate-of-change calculations are best visualized in a chart.
    In comparison to the chart for the difference percentages, you should notice a
    closer correlation of the [RoC] measures to the natural curve of the total. The
    [RoC] measure in this example is a lagging indicator of sales, because it is based
    on sales. Comparing multiple [ROC] series from different source measures can lead
    to discovering Leading indicators for key metrics in your business. The second
    form of the [ROC] calculation is used in Figure [11-2](#335106_2_En_11_Chapter.xhtml#Fig2).
    Note that for most of the 2012 year, the rate of change was negative, despite
    sales appearing to be relatively flat from month to month for the year.


    ![../images/335106_2_En_11_Chapter/335106_2_En_11_Fig2_HTML.jpg](images/335106_2_En_11_Chapter/335106_2_En_11_Fig2_HTML.jpg)


