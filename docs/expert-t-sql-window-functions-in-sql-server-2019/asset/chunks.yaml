  trans: '

    ### 处理日期范围中的间隙


    在进入更复杂的示例之前，你需要停下来思考一下处理日期时所面临的挑战。日期作为一种数据类型是连续且顺序的。处理日期的 T-SQL 函数在设计时考虑到了这一点，并能正确处理任何相关的日期运算。然而，实际上，基于日期的数据并不会是连续的。交易数据会出现间隙，可能某天、某周，甚至某个月或更长时间内没有数据。


    窗口函数并不具备日期感知能力，因此你需要确保任何聚合计算都能正确处理数据中的间隙。如果你在日期范围或日期周期范围上使用 `LEAD()` 和 `LAG()`
    窗口函数，你必须在结果集中提供根据计算需要而包含连续完整日期、月份、季度或年份的分区。未能做到这一点将导致结果不正确。原因在于 `LEAD()` 和 `LAG()`
    函数是在查询的结果集上操作的，它会在结果集中向前或向后移动指定的行数，而不管这些行所代表的天数或月数。


    例如，一个使用窗口函数错误实现的三个月移动平均值，就不会考虑到某个产品在特定月份没有数据的情况。它会在提供的数据上执行框架子集操作，并对前三个月的数据进行平均，而不考虑它们是否为连续的月份。清单
    10-6 演示了不考虑日期范围中的间隙将如何导致错误或误导性的结果。在此示例中，通过移除任何对 `[OrderDate]` 的分组引用，将数据聚合到月份级别：


    ```sql

    --10.6 处理日期间隙，月份级别：未处理间隙

    SELECT ROW_NUMBER()

    OVER(ORDER BY f.ProductKey, YEAR(f.OrderDate), MONTH(f.OrderDate))

    AS [RowID],

    f.ProductKey,

    YEAR(f.OrderDate) AS OrderYear,

    MONTH(f.OrderDate) AS OrderMonth,

    ROUND(SUM(f.SalesAmount), 2) AS [Sales], -- 月份级别

    ROUND(SUM(SUM(f.SalesAmount))

    OVER(PARTITION BY f.ProductKey, YEAR(f.OrderDate)

    ORDER BY f.ProductKey, YEAR(f.OrderDate), MONTH(f.OrderDate)

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ), 2) AS [Sales YTD],

    ROUND(AVG(SUM(f.SalesAmount))

    OVER(PARTITION BY f.ProductKey

    ORDER BY f.ProductKey, YEAR(f.OrderDate), MONTH(f.OrderDate)

    ROWS BETWEEN 3 PRECEDING AND CURRENT ROW

    ),2) AS [3 Month Moving Avg]

    FROM [dbo].[FactInternetSales] AS f

    WHERE ProductKey = 332

    AND f.OrderDate BETWEEN ''2010-12-01'' AND ''2011-12-31''

    GROUP BY f.ProductKey, YEAR(f.OrderDate), MONTH(f.OrderDate)

    ORDER BY f.ProductKey ,YEAR(f.OrderDate), MONTH(f.OrderDate)

    清单 10-6

    错误地处理日期间隙

    ```


    请注意图 10-5 中的结果，对于所选的时间范围，只显示了 9 个月。在包含无数据的月份范围上计算移动平均值会产生错误的结果。接下来，你将学习如何通过填补间隙来解决这个问题。


    ![`` `../images/335106_2_En_10_Chapter/335106_2_En_10_Fig5_HTML.jpg` ``](img/335106_2_En_10_Fig5_HTML.jpg)


    *图 10-5*

    *移动平均值的错误计算*


    为了解决这个问题，需要使用一个补充的“日期”表来填补交易数据中的间隙。这不是一个新问题，在数据仓库设计中通过包含一个“日期”维度表已经得到了解决，该表包含指定年份范围内每一天的一行。AdventureWorksDW
    数据库包含一个 `DimDate` 表，将在以下示例中使用。如果你没有可用的日期维度，也可以使用公用表表达式 (CTE) 来创建一个日期维度表。使用日期值表比使用
    CTE 性能要好得多。代码下载中包含一个 CTE 派生的日历维度视图示例。


    在清单 10-7 中，`DimDate` 表与 `DimProduct` 表进行交叉连接，生成一个包含指定范围内所有日期所有产品的集合。生成的 CTE “表”被用作查询
    SELECT 部分的主表，这样，即使某个产品在给定时间段内没有交易，范围内的每个日期也会在每个产品的聚合结果中得到体现。你还可以从产品表中获取其他属性，如产品类别、颜色等，以及从事实表中获取行计数和不同计数。这些可以用来创建额外的统计数据。在图
    10-6 中，你可以看到添加了 `[ProductAlternateKey]`，并在所有分组操作中取代了 `[ProductKey]`，以使结果更易于用户理解。


    ![`` `../images/335106_2_En_10_Chapter/335106_2_En_10_Fig6_HTML.jpg` ``](img/335106_2_En_10_Fig6_HTML.jpg)


    *图 10-6*

    *考虑销售数据间隙后的移动平均值*


    ```sql

    --10.7 月份级别。现在处理交易日期间隙

    WITH CTE_ProductPeriod

    AS (

    SELECT p.ProductKey, p.ProductAlternateKey as [ProductID],

    Datekey, CalendarYear,

    CalendarQuarter, MonthNumberOfYear AS CalendarMonth

    FROM DimDate AS d

    CROSS JOIN DimProduct p

    WHERE d.FullDateAlternateKey BETWEEN ''2011-01-01'' AND ''2013-12-31''

    AND EXISTS(SELECT * FROM FactInternetSales f

    WHERE f.ProductKey = p.ProductKey

    AND f.OrderDate BETWEEN ''2011-01-01'' AND ''2013-12-31'')

    )

    SELECT      ROW_NUMBER()

    OVER(ORDER BY p.[ProductID],

    p.CalendarYear,

    p.CalendarMonth

    ) as [RowID],

    p.[ProductID],

    p.CalendarYear  AS OrderYear,

    p.CalendarMonth AS OrderMonth,

    ROUND(SUM(COALESCE(f.SalesAmount,0)), 2) AS [Sales],

    ROUND(SUM(SUM(f.SalesAmount))

    OVER(PARTITION BY p.[ProductID], p.CalendarYear

    ORDER BY P.[ProductID], p.CalendarYear, p.CalendarMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ), 2) AS [Sales YTD],

    ROUND(SUM(SUM(COALESCE(f.SalesAmount, 0)))

    OVER(PARTITION BY p.[ProductID]

    ORDER BY p.[ProductID], p.CalendarYear, p.CalendarMonth

    ROWS BETWEEN 3 PRECEDING AND CURRENT ROW

    ) / 3, 2) AS [3 Month Moving Avg]

    FROM CTE_ProductPeriod AS p

    LEFT OUTER JOIN [dbo].[FactInternetSales]  AS f

    ON p.ProductKey = f.ProductKey

    AND p.DateKey = f.OrderDateKey

    WHERE p.ProductKey = 332

    AND p.CalendarYear =  2011

    GROUP BY p.[ProductID], p.CalendarYear, p.CalendarMonth

    ORDER BY p.[ProductID], p.CalendarYear, p.CalendarMonth

    清单 10-7

    正确处理日期间隙

    ```


    比较前两个查询的结果。`[3 Month Moving Avg]` 列现在对于产品没有销售的月份（二月、三月、十一月）以及紧接空时间段之后的月份（五月、六月、十二月）都是正确的。第二个查询中的计算没有使用
    `AVG()` 函数，而是将 `SUM()` 除以三来得出平均值。这确保了前三期的平均值更加准确。在接下来的部分中，你将学习在计算移动平均值时，如何将计算仅限制在完整的范围上。

    '
- fmt: '### Same Period Prior Year


    Part and parcel with providing period-to-date calculations, you will need to provide
    comparisons to the same period in the prior year, the prior period in the same
    year, and quite possibly difference amounts and difference percentages. These
    aggregates can be calculated the same way as the items you have worked with so
    far: by defining the formula in simple terms, determining the input calculations
    at a column level, and then building the output column using the input calculations.


    For this example, `[ProductKey]` is dropped from the query so that the granularity
    of the results is at a month level. This makes it easier for you to see the effect
    of the new calculations in the smaller number of result rows. In order to calculate
    a value from a prior year, the query cannot be limited to a single year in the
    `WHERE` clause. `Figure 10-7` shows that for a window function to be able to look
    back into a prior year, there must be more than one year available in the result
    set.


    ![../images/335106_2_En_10_Chapter/335106_2_En_10_Fig7_HTML.jpg](images/335106_2_En_10_Chapter/335106_2_En_10_Fig7_HTML.jpg)


    `Figure 10-7` WHERE clause has to cover dates for prior ranges


    The `LAG()` function can retrieve and aggregate data by looking back in the record
    set by the number of rows specified. It also has an optional default parameter
    that can be used to return a zero value for cases where there is no row available
    when navigating back through the records. `Listing 10-8` and `Figure 10-8` demonstrate
    this:


    ![../images/335106_2_En_10_Chapter/335106_2_En_10_Fig8_HTML.jpg](images/335106_2_En_10_Chapter/335106_2_En_10_Fig8_HTML.jpg)


    `Figure 10-8` Same month prior year


    ```

    --10.8 Same Month, Prior Year

    WITH CTE_ProductPeriod

    AS (

    SELECT p.ProductKey, --p.ProductAlternateKey as [ProductID],

    Datekey, CalendarYear, CalendarQuarter,

    MonthNumberOfYear AS CalendarMonth

    FROM DimDate AS d

    CROSS JOIN DimProduct p

    WHERE d.FullDateAlternateKey BETWEEN ''2011-01-01'' AND ''2013-12-31''

    AND EXISTS(SELECT * FROM FactInternetSales f

    WHERE f.ProductKey = p.ProductKey

    AND f.OrderDate BETWEEN ''2011-01-01'' AND ''2013-12-31'')

    )

    SELECT

    ROW_NUMBER()

    OVER(ORDER BY p.CalendarYear, p.CalendarMonth) as [RowID],

    p.CalendarYear AS OrderYear,

    p.CalendarMonth AS OrderMonth,

    ROUND(SUM(COALESCE(f.SalesAmount,0)), 2) AS [Sales],

    ROUND(SUM(SUM(COALESCE(f.SalesAmount, 0)))

    OVER(PARTITION BY p.CalendarYear

    ORDER BY p.CalendarYear, p.CalendarMonth

    ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW

    ), 2) AS [Sales YTD],

    ROUND(LAG(SUM(f.SalesAmount), 12 , 0)

    OVER(ORDER BY p.CalendarYear, p.CalendarMonth),2)

    as [Sales Same Month PY]

    FROM CTE_ProductPeriod AS p

    LEFT OUTER JOIN [dbo].[FactInternetSales] AS f

    ON p.ProductKey = f.ProductKey

    AND p.DateKey = f.OrderDateKey

    GROUP BY p.CalendarYear, p.CalendarMonth

    ORDER BY p.CalendarYear, p.CalendarMonth

    ```


    `Listing 10-8` Retrieving Results for the Same Month of the Prior Year


    ### Growth and Percent Growth


    Once you can look back and pluck a value from the past, you can calculate differences
    between those values very easily. The commonly accepted method for calculating
    Percent Growth is `([current] - [previous]) / [previous]`. You can also multiply
    the result by 100 if you want the percentage values to be in the format of "##.###".
    Add the following section from `Listing 10-9` to the query from `Listing 10-8`
    to incorporate the new calculations and run the query. Your results should match
    `Figure 10-9`.


    ![../images/335106_2_En_10_Chapter/335106_2_En_10_Fig9_HTML.jpg](images/335106_2_En_10_Chapter/335106_2_En_10_Fig9_HTML.jpg)


    `Figure 10-9` Growth: Current month over the same month of the prior year


    ```

    -- [Growth] = [CY] - [PY]

    ROUND(SUM(COALESCE(f.SalesAmount,0))

    - LAG(SUM(f.SalesAmount), 12, 0)

    OVER(ORDER BY p.CalendarYear, p.CalendarMonth), 2)

    as [PY MOM Growth],

    -- [Pct Growth] = ([CY] - [PY]) / [PY]

    (SUM(COALESCE(f.SalesAmount,0))

    - LAG(SUM(f.SalesAmount), 12, 0)

    OVER(ORDER BY p.CalendarYear, p.CalendarMonth)

    ) / nullif(LAG(SUM(f.SalesAmount), 12, 0 )

    OVER(ORDER BY p.CalendarYear, p.CalendarMonth), 0)

    as [PY MOM Growth %]

    ```


    `Listing 10-9` Growth: Current Month Over the Same Month of the Prior Year


    The same approach can be used to determine the value for the prior month and the
    difference between it and the current month. Add the code from `Listing 10-10`
    and run the query to calculate the prior month value, month-over-month growth
    and month-over-month growth percentage. The table in `Figure 10-10` shows the
    results.


    ![../images/335106_2_En_10_Chapter/335106_2_En_10_Fig10_HTML.jpg](images/335106_2_En_10_Chapter/335106_2_En_10_Fig10_HTML.jpg)


    `Figure 10-10` Difference: Comparing the current month to the prior month


    ```

    LAG(SUM(f.SalesAmount), 1, 0)

    OVER(ORDER BY p.CalendarYear, p.CalendarMonth) as [Sales PM],

    -- [Growth] = [CM] - [PM]

    SUM(COALESCE(f.SalesAmount,0))

    - LAG(SUM(f.SalesAmount), 1, 0)

    OVER(ORDER BY p.CalendarYear, p.CalendarMonth)

    AS [MOM Growth],

    -- [Pct Growth] = ([CM] - [PM]) / [PM]

    (SUM(COALESCE(f.SalesAmount,0))

    - LAG(SUM(f.SalesAmount), 1, 0)

    OVER(ORDER BY p.CalendarYear, p.CalendarMonth))

    / NULLIF(LAG(SUM(f.SalesAmount), 1, 0 )

    OVER(ORDER BY p.CalendarYear, p.CalendarMonth),0)

    AS [MOM Growth %]

    ```


    `Listing 10-10` Growth: Comparing the current month to the prior month


    ### Summary


    This chapter covered a lot of ground, building on previously learned concepts
    to create complex calculations for time-based financial analysis. Some of the
    calculations were not previously easily accomplished in T-SQL, let alone in a
    single query. You learned about the need to have a consistent timeline as the
    backbone of your queries and how to handle gaps in the data. You learned how to
    create period-to-date, same period prior year, prior year-to-date, ratio to parent,
    moving averages, and growth and growth percentage calculations.


    Next, `Chapter 11` will teach you how to leverage these techniques to create even
    more useful trend calculations.


