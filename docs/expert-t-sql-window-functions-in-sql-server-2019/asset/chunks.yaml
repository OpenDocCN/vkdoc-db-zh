    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig2_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Looking through the window to perform an operation on a set of rows


    The window is not limited to the columns found in the `SELECT` list of the query.
    For example, if you take a look at the `StockHistory` table, you will see that
    there is also an `OpenPrice` column. The `OpenPrice` from one day is not the same
    as the `ClosePrice` from the previous day. If you wanted to, you could use `LAG`
    to include the previous `OpenPrice` in the results even though it is not included
    in the `SELECT` list originally.


    In the stock history example using `LAG`, each row has its own window where it
    finds the previous close price. When the calculation is performed on the third
    row of the data, the window consists of the second and third rows. When the calculation
    is performed on the fourth row, the window consists of the third and fourth rows.


    What would happen if the rows for 2017-12-02 were removed from the query by a
    `WHERE` clause? Does the window contain filtered-out rows? The answer is “No,”
    which brings up two very important concepts to understand when using window functions:
    where window functions may be used in the query and the logical order of operations.


    Window functions may only be used in the `SELECT` list and `ORDER BY` clause.
    You cannot filter or group on window functions. In situations where you must filter
    or group on the results of a window function, the solution is to separate the
    logic. You could use a temp table, derived table subquery, or a CTE and then filter
    or group in the outer query.


    Window functions operate after the `FROM` , `WHERE` , `GROUP BY`, and `HAVING`
    clause s. They operate before the `TOP` and `DISTINCT` clauses are evaluated.
    You will learn more about how `DISTINCT` and `TOP` affect queries with window
    functions in the “Uncovering Special Case Windows” section later in this chapter.


    The window is defined by the `OVER` clause. Notice in Query 2 of Listing [1-1](#335106_2_En_1_Chapter.xhtml#PC1)
    that the `LAG` function is followed by an `OVER` clause. Each type of window function
    has specific requirements for the `OVER` clause. The `LAG` function must have
    an `ORDER BY` expression and may have a `PARTITION BY` expression.


    ## Understanding the OVER Clause


    One thing that sets window functions apart is the `OVER` clause , which defines
    the window or set. With one exception I’ll explain in Chapter [7](#335106_2_En_7_Chapter.xhtml),
    window functions will have an `OVER` clause, and learning how to use the `OVER`
    clause is required to understand window functions. In some cases, the `OVER` clause
    will be empty. You will see empty `OVER` clauses in Chapter [3](#335106_2_En_3_Chapter.xhtml)
    when working with window aggregate functions.'
  trans: '### 注意


    如果您想跟随本示例操作，可以创建 `StockAnalysisDemo` 数据库并生成股票市场数据的示例脚本，该脚本与本章代码一同可在 Apress 网站上找到。


    若想快速了解如何先使用一种传统方法，再使用 `LAG` 函数来解决此问题，请审阅并运行代码清单 1-1。


    ```sql

    USE StockAnalysisDemo;

    GO

    --1-1.1 使用子查询

    SELECT TickerSymbol, TradeDate, ClosePrice,

    (SELECT TOP(1) ClosePrice

    FROM StockHistory AS SQ

    WHERE SQ.TickerSymbol  = OQ.TickerSymbol

    AND SQ.TradeDate < OQ.TradeDate

    ORDER BY TradeDate DESC) AS PrevClosePrice

    FROM StockHistory AS OQ

    ORDER BY TickerSymbol, TradeDate;

    --1-1.2 使用 LAG

    SELECT TickerSymbol, TradeDate, ClosePrice,

    LAG(ClosePrice) OVER(PARTITION BY TickerSymbol

    ORDER BY TradeDate) AS PrevClosePrice

    FROM StockHistory

    ORDER BY TickerSymbol, TradeDate;

    ```

    **代码清单 1-1**

    两种解决股票市场问题的方法


    部分结果显示在图 1-1 中。由于数据是随机生成的，图中的 `ClosePrice` 和 `PrevClosePrice` 值与您的值不会匹配。查询 1 使用关联子查询（旧方法）为每一外部行选择一个
    `ClosePrice`。通过将内部查询的 `TickerSymbol` 与外部查询连接，您可以确保不会比较两只不同的股票。内部查询和外部查询也通过 `TradeDate`
    进行连接，但内部查询的 `TradeDate` 必须小于外部查询的 `TradeDate`，以确保您获取的是前一天的数据。内部查询还必须排序，以获取日期小于当前日期但最新的数据行。在我的笔记本电脑（16GB
    RAM，使用 SSD 存储）上运行此查询耗时超过一分钟。返回了近 700,000 行数据。


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig1_HTML.jpg](img/335106_2_En_1_Fig1_HTML.jpg)

    **图 1-1**

    股票市场问题的部分结果


    查询 2 使用窗口函数 `LAG` 解决相同的问题，并产生相同的结果。暂时不必担心语法；读完本书时您将成为专家。在我的笔记本电脑上，使用 `LAG` 的查询仅用了
    13 秒运行。


    仅通过查看代码清单 1-1 中的代码，您就可以看到使用 `LAG` 的查询 2 编写起来要简单得多，即使您可能还不理解其语法。它的运行速度也快得多，因为它只读取表一次，而不像查询
    1 那样每行读取一次。当您继续阅读本书并运行示例时，您将了解到像 `LAG` 这样的窗口函数如何让您的工作更轻松，让您的客户更满意！


    ## 理解窗口


    窗口函数不同于常规函数，因为它们在一组行（也称为 *窗口*）上操作。这可能听起来类似于聚合函数的工作方式。聚合函数（例如 `SUM` 和 `AVG`）在行组上操作并提供汇总值。当您编写聚合查询时，除了
    `GROUP BY` 子句中的列之外，您会丢失详细信息列。


    当添加 `GROUP BY` 子句时，您将看到的不是返回所有行的摘要，而是每个 `GROUP BY` 列唯一集合的一行摘要行。例如，要使用聚合查询获取所有行的计数，您必须省略其他列。一旦将列添加到
    `SELECT` 和 `GROUP BY` 中，您将获得每个唯一分组的计数，而不是整个结果集的计数。


    带有窗口函数的查询与传统聚合查询大不相同。`SELECT` 列表中出现的列没有限制，也不需要 `GROUP BY` 子句。您还可以将窗口函数添加到聚合查询中，这将在第
    3 章讨论。返回的不是摘要行，而是所有详细信息，并且包含窗口函数的表达式的结果仅作为另一列包含在内。实际上，通过使用窗口函数获取行的总计数，您仍然可以包含表中的所有列。


    想象一下，在查询运行时，透过一扇窗户查看一组特定的行。您还有最后一次机会执行操作，例如从另一行中获取其中一个列。操作的结果将作为附加列添加。随着您阅读本书，您将了解窗口函数的实际工作原理，但“透过窗户查看”的概念帮助我理解并在许多
    SQL Server 活动中向听众解释了窗口函数。图 1-2 说明了这一概念。


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig2_HTML.jpg](img/335106_2_En_1_Fig2_HTML.jpg)

    **图 1-2**

    透过窗户对一组行执行操作


    窗口并不局限于查询的 `SELECT` 列表中的列。例如，如果您查看 `StockHistory` 表，您会看到还有一个 `OpenPrice` 列。某一天的
    `OpenPrice` 与前一天的 `ClosePrice` 是不同的。如果您愿意，您可以使用 `LAG` 将之前的 `OpenPrice` 包含在结果中，即使它最初不在
    `SELECT` 列表中。


    在使用 `LAG` 的股票历史示例中，每一行都有自己的窗口，在其中查找前一个收盘价。当对数据的第三行执行计算时，窗口由第二行和第三行组成。当对第四行执行计算时，窗口由第三行和第四行组成。


    如果通过 `WHERE` 子句从查询中移除了 `2017-12-02` 的行，会发生什么？窗口是否包含被过滤掉的行？答案是“否”，这引出了使用窗口函数时需要理解的两个非常重要的概念：窗口函数可以在查询中使用的位置，以及操作的逻辑顺序。


    窗口函数只能用于 `SELECT` 列表和 `ORDER BY` 子句中。您不能基于窗口函数进行筛选或分组。在必须基于窗口函数的结果进行筛选或分组的情况下，解决方案是分离逻辑。您可以使用临时表、派生表子查询或
    CTE，然后在外部查询中进行筛选或分组。


    窗口函数在 `FROM`、`WHERE`、`GROUP BY` 和 `HAVING` 子句之后操作。它们在计算 `TOP` 和 `DISTINCT` 子句之前操作。您将在本章后面的“揭开特殊情况窗口”一节中了解更多关于
    `DISTINCT` 和 `TOP` 如何影响带有窗口函数的查询。


    窗口由 `OVER` 子句定义。请注意，在代码清单 1-1 的查询 2 中，`LAG` 函数后跟一个 `OVER` 子句。每种类型的窗口函数对 `OVER`
    子句都有特定的要求。`LAG` 函数必须有一个 `ORDER BY` 表达式，并且可以有一个 `PARTITION BY` 表达式。


    ## 理解 OVER 子句


    窗口函数的一个独特之处是 `OVER` 子句，它定义了窗口或集合。除了我将在第 7 章解释的一个特例外，窗口函数都将有一个 `OVER` 子句，学习如何使用
    `OVER` 子句是理解窗口函数的必要条件。在某些情况下，`OVER` 子句可能是空的。在第 3 章处理窗口聚合函数时，您将看到空的 `OVER` 子句。'
- fmt: '## Note


    There is one situation in which you will see the `OVER` keyword in a query not
    following a window function, and that is with the sequence object. The sequence
    object, introduced with SQL Server 2008, is a bucket containing incrementing numbers
    often used in place of an identity column.


    For any type of expression in the `SELECT` list of a query, a calculation is performed
    for each row in the results. For example, if you had a query with the expression
    `Col1 + Col2`, those two columns would be added together once for every row returned.
    A calculation is performed for row 1, row 2, row 3, and so on. Expressions with
    window functions must also be calculated once per row. In this case, however,
    the expressions operate over a set of rows that can be different for each row
    where the calculation is performed.


    The `OVER` clause determines which rows make up the window. The `OVER` clause
    has three possible components: `PARTITION BY`, `ORDER BY`, and the frame. The
    `PARTITION BY` expression divides up the rows, and it’s optional depending on
    what you are trying to accomplish. The `ORDER BY` expression is required for some
    types of window functions. Where it is used, it determines the order in which
    the window function is applied. Finally, the frame is used for some specific types
    of window functions to provide even more granularity. You’ll learn about framing
    in Chapter [5](#335106_2_En_5_Chapter.xhtml).


    Many T-SQL developers and database professionals have used the `ROW_NUMBER` function.
    They may not have even realized that this is one of the window functions. There
    are many situations where adding a row number to the query is a step along the
    way to solving a complex query problem.


    `ROW_NUMBER` supplies an incrementing number, starting with one, for each row.
    The order in which the numbers are applied is determined by the columns specified
    in the `ORDER BY` expression, which is independent of an `ORDER BY` clause found
    in the query itself. Run the queries in Listing [1-2](#335106_2_En_1_Chapter.xhtml#PC2)
    to see how this works.


    ```

    USE AdventureWorks;

    GO

    --1-2.1 Row numbers applied by CustomerID

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber

    FROM Sales.SalesOrderHeader;

    --1-2.2 Row numbers applied by SalesOrderID

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY SalesOrderID) AS RowNumber

    FROM Sales.SalesOrderHeader;

    Listing 1-2

    Applying the Row Numbers to Different Columns

    ```


    ### Note


    The `AdventureWorks` and `AdventureWorksDW` databases are used in many of the
    examples throughout this book. You can use any version starting with 2014 or later
    to follow along, and the 2017 version was the latest available at the time of
    this writing. Just be sure to adjust the `USE` statement when it’s included to
    fit your version of the databases.


    The `OVER` clause follows the `ROW_NUMBER` function. Inside the `OVER` clause,
    you will see `ORDER BY` followed by one or more columns. The difference between
    Queries 1 and 2 is just the `ORDER BY` expression within the `OVER` clause. Notice
    in the partial results shown in Figure [1-3](#335106_2_En_1_Chapter.xhtml#Fig3)
    that the row numbers end up applied in the order of the column found in the `ORDER
    BY` expression of the `OVER` clause, which is also the order that the data is
    returned. Since the data must be sorted to apply the row numbers, it is easy for
    the data to stay in that order, but it is not guaranteed. The only way to ever
    actually guarantee the order of the results is to add an `ORDER BY` to the query.


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig3_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Partial results of using `ROW_NUMBER` with different `OVER` clauses


    If the query itself has an `ORDER BY` clause, it can be different than the `ORDER
    BY` within `OVER`. Listing [1-3](#335106_2_En_1_Chapter.xhtml#PC3) demonstrates
    this.


    ```

    --1-3.1 Row number with a different ORDER BY

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID) AS RowNumber

    FROM Sales.SalesOrderHeader

    ORDER BY SalesOrderID;

    Listing 1-3

    Using ROW_NUMBER with a Different ORDER BY in the OVER Clause

    ```


    In this case, the row numbers are applied in order of the `CustomerID`, but the
    results are returned in order of `SalesOrderID`. The partial results are shown
    in Figure [1-4](#335106_2_En_1_Chapter.xhtml#Fig4). In order to show that the
    row numbers are applied correctly, the figure shows the grid scrolled down to
    the first customer, `CustomerID 11000`.


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig4_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Partial results of showing a query with a different `ORDER BY` than the `OVER`
    clause


    Just like the `ORDER BY` clause of a query, you can specify a descending order
    with the `DESCENDING` or `DESC` keyword within the `OVER` clause, as shown in
    Listing [1-4](#335106_2_En_1_Chapter.xhtml#PC4).


    ```

    --1-4.1 Row number with a descending ORDER BY

    SELECT CustomerID, SalesOrderID,

    ROW_NUMBER() OVER(ORDER BY CustomerID DESC) AS RowNumber

    FROM Sales.SalesOrderHeader;

    Listing 1-4

    Using ROW_NUMBER with a Descending ORDER BY

    ```


    Figure [1-5](#335106_2_En_1_Chapter.xhtml#Fig5) shows partial results. Since it
    was easy for the database engine to return the results in descending order by
    `CustomerID`, you can easily see that row number 1 was applied to the largest
    `CustomerID`.


    ![../images/335106_2_En_1_Chapter/335106_2_En_1_Fig5_HTML.jpg](images/335106_2_En_1_Chapter/335106_2_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Partial results of `ROW_NUMBER` with a descending `ORDER BY`


    In the `SalesOrderHeader` table, the `CustomerID` is not unique. Notice in the
    last example that 30118 is the largest `CustomerID`. The row number with `SalesOrderID`
    71803 is 1 and with 65221 is 2. There is no guarantee that the row numbers will
    be assigned exactly this way as long as the lowest `RowNumber`s are lined up with
    `CustomerID` 30118. To ensure that the row numbers line up as expected, use a
    unique column or combination of columns in the `ORDER BY` expression of the `OVER`
    clause. If you use more than one column, separate the columns with commas. You
    could even apply the row numbers in a random order. Listing [1-5](#335106_2_En_1_Chapter.xhtml#PC5)
    demonstrates this.'
