    ## Summary


    This chapter covered a lot of ground, building on previously learned concepts
    to create complex trending calculations for time-based financial analysis. The
    approach of creating and validating input calculations before tackling more complex
    calculations will serve you well when developing your own complex window calculations
    as will the stepwise method of using CTEs to get around the nesting limitation
    of window functions.


    I hope you have realized just how versatile and powerful window functions are
    by reading the pages of this book. As you use these functions, you will begin
    to see even more ways to use them. They will change the way you approach queries,
    and you will become a better T-SQL developer. Happy querying!


