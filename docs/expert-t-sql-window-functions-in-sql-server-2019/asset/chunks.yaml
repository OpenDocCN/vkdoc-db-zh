    GROUP BY CustomerID;

    Listing 3-5

    How to Add a Window Aggregate to an Aggregate Query

    ```


    The syntax may look unusual because you cannot nest aggregate functions, but the
    window function must be applied to the sum of `TotalDue`, not just `TotalDue`
    . Figure [3-5](#335106_2_En_3_Chapter.xhtml#Fig5) shows the partial results and
    proves that this works.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig5_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Partial results of adding a window aggregate to an aggregate query


    Another way to do this that is much more intuitive is by separating the window
    aggregate into a CTE or use another method to separate the logic. Listing [3-6](#335106_2_En_3_Chapter.xhtml#PC7)
    shows how to do this.


    ```

    --3.6.1 Using a CTE

    WITH SALES AS (

    SELECT CustomerID, SUM(TotalDue) AS CustomerTotal

    FROM Sales.SalesOrderHeader

    GROUP BY CustomerID)

    SELECT CustomerID, CustomerTotal,

    SUM(CustomerTotal) OVER() AS GrandTotal

    FROM Sales;

    Listing 3-6

    Using a CTE instead of nesting

    ```


    The results are the same as Figure [3-5](#335106_2_En_3_Chapter.xhtml#Fig5). Inside
    the CTE, the query is grouped by `CustomerID`. A `SUM` for each customer is calculated,
    `CustomerTotal`. In the outer query, the window aggregate is applied to `CustomerTotal`.
    The window aggregate is still being applied to the aggregate expression, but the
    logic is just separated so it’s easier to understand. There is no advantage in
    writing the query this way except to add clarity.


    Listing [3-7](#335106_2_En_3_Chapter.xhtml#PC8) has another interesting example
    involving multiple expressions in the `GROUP BY` clause .


    ```

    --3-7.1 Window aggregate to multiple group by

    SELECT YEAR(OrderDate) AS OrderYear,

    CustomerID, SUM(TotalDue) AS CustTotalForYear,

    SUM(SUM(TotalDue)) OVER(PARTITION BY CustomerID) AS CustomerTotal

    FROM Sales.SalesOrderHeader

    GROUP BY CustomerID, YEAR(OrderDate)

    ORDER BY CustomerID, OrderYear;

    Listing 3-7

    Adding a Window Aggregate to a Query with Multiple Expressions in the GROUP BY
    Clause

    ```


    The partial results are shown in Figure [3-6](#335106_2_En_3_Chapter.xhtml#Fig6).
    The `GROUP BY` clause lists the column `CustomerID` and the expression `YEAR(OrderDate)`.
    Before the window aggregate is applied, the results contain one row for each customer
    per year. The `CustTotalForYear` is a normal aggregate expression. The final expression
    is a window aggregate with a `PARTITION BY` expression on `CustomerID`, so `CustomerTotal`
    is the overall subtotal for the customer. The point of this example is that you
    can use window aggregate functions to return values at different levels of aggregation.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig6_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Using a window aggregate with multiple expressions in the GROUP BY


    Inside the window for a window function within an aggregate query, the rows have
    been filtered and grouped. The list of columns available for use with the window
    function is restricted by the `GROUP BY`. This is the default window; you can
    partition it, but you cannot include anything outside it. You can go smaller but
    not bigger. You could base the `PARTITION BY` expression on the entire set of
    results (empty `OVER` clause), by `CustomerID`, or by `YEAR(OrderYear)` without
    error. You wouldn’t use a combination of `CustomerID` and `YEAR(OrderYear)` because
    that matches the `GROUP BY`.


    The rules for adding a window aggregate to an aggregate query apply to all of
    the window functions. Always keep in mind that the `GROUP BY` and `HAVING` clauses
    operate first. The results of the `FROM`, `WHERE`, `GROUP BY`, and `HAVING` clauses
    determine the rows and columns in the base window and the granularity. Any column
    used anywhere in the window function must be one of the `GROUP BY` columns or
    aggregated inside the window function.


    To avoid confusion, do the first aggregation in a CTE. Then, in the outer query,
    apply the window function.


    ## Using Window Aggregates to Solve Common Queries


    It is very easy to add a window aggregate to a complex non-aggregated query. To
    do the same thing with other methods could double the size of the query.


    ### The Percent of Sales Problem


    This particular example can be applied to many situations. You can perform a calculation,
    such as a percentage, using a window aggregate. Listing [3-8](#335106_2_En_3_Chapter.xhtml#PC9)
    demonstrates how to display the details along with a percent of sales.


    ```

    --3-8.1 Calculate the percent of sales

    SELECT P.ProductID,

    FORMAT(SUM(OrderQty * UnitPrice),''C'') AS ProductSales,

    FORMAT(SUM(SUM(OrderQty * UnitPrice)) OVER(),''C'') AS TotalSales,

    FORMAT(SUM(OrderQty * UnitPrice)/

    SUM(SUM(OrderQty * UnitPrice)) OVER(), ''P'') AS PercentOfSales

    FROM Sales.SalesOrderDetail AS SOD

    JOIN Production.Product AS P ON SOD.ProductID = P.ProductID

    JOIN Production.ProductSubcategory AS SUB ON P.ProductSubcategoryID

    = SUB.ProductSubcategoryID

    JOIN Production.ProductCategory AS CAT ON SUB.ProductCategoryID

    = CAT.ProductCategoryID

    WHERE CAT.Name = ''Bikes''

    GROUP BY P.ProductID

    ORDER BY PercentOfSales DESC;

    Listing 3-8

    Using a Window Function to Display Percent of Sales

    ```


    Figure [3-7](#335106_2_En_3_Chapter.xhtml#Fig7) shows the partial results. This
    is an aggregate query, so the columns used in any role inside the window aggregate
    must be a `GROUP BY` column or aggregated. The empty `OVER` clause is used to
    calculate `TotalSales`. The sum by `ProductID` is divided by the sales over the
    entire result set and formatted to give the percentage of sales for each bike
    model.


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig7_HTML.jpg](images/335106_2_En_3_Chapter/335106_2_En_3_Fig7_HTML.jpg)


    Figure 3-7


    The percent of sales by ProductID'
  trans: '

    ## 将窗口聚合添加到聚合查询中


    当我第一次尝试将窗口聚合添加到聚合查询中时，它没有正常工作，这让我很惊讶，而错误信息则让我更加意外。清单 3-4 展示了一个例子。


    ```sql

    --3-4.1 将窗口聚合添加到聚合查询

    SELECT CustomerID, SUM(TotalDue) AS CustomerTotal,

    SUM(TotalDue) OVER() AS GrandTotal

    FROM Sales.SalesOrderHeader

    GROUP BY CustomerID;

    ```

    **清单 3-4**

    将窗口聚合添加到聚合查询


    图 3-4 显示了错误信息。


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig4_HTML.jpg](img/335106_2_En_3_Fig4_HTML.jpg)


    **图 3-4**

    将窗口聚合添加到聚合查询后产生的错误信息


    显然，`TotalDue` 列*被包含*在一个聚合表达式中，将其添加到 `GROUP BY` 子句中显然不是解决办法。要理解这里发生了什么，你必须思考窗口聚合所操作的窗口。窗口中的行集是在
    `GROUP BY` 操作之后创建的。该窗口包含 `GROUP BY` 子句中列出的任何表达式加上任何聚合表达式。窗口函数任何部分中包含的任何表达式都必须遵循与
    `SELECT` 列表相同的规则。这意味着将 `CustomerID` 作为窗口函数的参数或作为 `PARTITION BY` 列是没问题的，因为 `CustomerID`
    是 `GROUP BY` 的一部分。但要在窗口聚合表达式的任何角色中使用 `TotalDue`，必须先将其聚合。清单 3-5 展示了正确的解决方案。


    ```sql

    --3-5.1 如何将窗口聚合添加到聚合查询

    SELECT CustomerID, SUM(TotalDue) AS CustomerTotal,

    SUM(SUM(TotalDue)) OVER() AS GrandTotal

    FROM Sales.SalesOrderHeader

    GROUP BY CustomerID;

    ```

    **清单 3-5**

    如何将窗口聚合添加到聚合查询


    语法看起来可能有些奇怪，因为你不能嵌套聚合函数，但窗口函数必须应用于 `TotalDue` 的总和，而不仅仅是 `TotalDue` 本身。图 3-5 显示了部分结果，并证明了这是有效的。


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig5_HTML.jpg](img/335106_2_En_3_Fig5_HTML.jpg)


    **图 3-5**

    将窗口聚合添加到聚合查询后的部分结果


    另一种更直观的方法是将窗口聚合分离到一个 CTE（公用表表达式）中，或者使用其他方法来分离逻辑。清单 3-6 展示了如何做到这一点。


    ```sql

    --3.6.1 使用 CTE

    WITH SALES AS (

    SELECT CustomerID, SUM(TotalDue) AS CustomerTotal

    FROM Sales.SalesOrderHeader

    GROUP BY CustomerID)

    SELECT CustomerID, CustomerTotal,

    SUM(CustomerTotal) OVER() AS GrandTotal

    FROM Sales;

    ```

    **清单 3-6**

    使用 CTE 替代嵌套


    结果与图 3-5 相同。在 CTE 内部，查询按 `CustomerID` 分组。为每个客户计算总和 `CustomerTotal`。在外层查询中，窗口聚合被应用于
    `CustomerTotal`。窗口聚合仍然是应用于聚合表达式，但逻辑被分离开了，因此更容易理解。以这种方式编写查询除了增加清晰度之外，并没有其他优势。


    清单 3-7 有另一个有趣的例子，涉及 `GROUP BY` 子句中的多个表达式。


    ```sql

    --3-7.1 对多个分组依据应用窗口聚合

    SELECT YEAR(OrderDate) AS OrderYear,

    CustomerID, SUM(TotalDue) AS CustTotalForYear,

    SUM(SUM(TotalDue)) OVER(PARTITION BY CustomerID) AS CustomerTotal

    FROM Sales.SalesOrderHeader

    GROUP BY CustomerID, YEAR(OrderDate)

    ORDER BY CustomerID, OrderYear;

    ```

    **清单 3-7**

    向包含多个表达式的 GROUP BY 子句的查询添加窗口聚合


    部分结果显示在图 3-6 中。`GROUP BY` 子句列出了 `CustomerID` 列和 `YEAR(OrderDate)` 表达式。在应用窗口聚合之前，结果集包含每个客户每年的数据行。`CustTotalForYear`
    是一个常规的聚合表达式。最后一个表达式是一个窗口聚合，其 `PARTITION BY` 表达式基于 `CustomerID`，因此 `CustomerTotal`
    是该客户的总体小计。这个例子的重点是，你可以使用窗口聚合函数来返回不同聚合级别的值。


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig6_HTML.jpg](img/335106_2_En_3_Fig6_HTML.jpg)


    **图 3-6**

    在包含多个表达式的 GROUP BY 查询中使用窗口聚合


    在聚合查询内的窗口函数所操作的窗口中，行已经被过滤和分组。可供窗口函数使用的列列表受到 `GROUP BY` 子句的限制。这是默认的窗口；你可以对其进行分区，但不能包含窗口之外的任何内容。你可以缩小窗口范围，但不能扩大。你可以将
    `PARTITION BY` 表达式基于整个结果集（空的 `OVER` 子句）、按 `CustomerID` 或按 `YEAR(OrderYear)` 进行分区，而不会出错。你不会使用
    `CustomerID` 和 `YEAR(OrderYear)` 的组合，因为那与 `GROUP BY` 完全匹配。


    向聚合查询添加窗口聚合的规则适用于所有窗口函数。请始终牢记，`GROUP BY` 和 `HAVING` 子句首先执行。`FROM`、`WHERE`、`GROUP
    BY` 和 `HAVING` 子句的结果决定了基础窗口中的行、列及其粒度。在窗口函数任何位置使用的任何列都必须是 `GROUP BY` 列之一，或者在窗口函数内部进行了聚合。


    为避免混淆，首先在 CTE 中执行第一次聚合。然后，在外层查询中应用窗口函数。


    ## 使用窗口聚合解决常见查询


    将窗口聚合添加到复杂的非聚合查询中非常容易。而用其他方法实现同样的功能可能会使查询的规模加倍。


    ### 销售额占比问题


    这个特定的例子可以应用于许多情况。你可以使用窗口聚合来执行计算，例如百分比。清单 3-8 演示了如何在显示详细信息的同时显示销售额占比。


    ```sql

    --3-8.1 计算销售额占比

    SELECT P.ProductID,

    FORMAT(SUM(OrderQty * UnitPrice),''C'') AS ProductSales,

    FORMAT(SUM(SUM(OrderQty * UnitPrice)) OVER(),''C'') AS TotalSales,

    FORMAT(SUM(OrderQty * UnitPrice)/

    SUM(SUM(OrderQty * UnitPrice)) OVER(), ''P'') AS PercentOfSales

    FROM Sales.SalesOrderDetail AS SOD

    JOIN Production.Product AS P ON SOD.ProductID = P.ProductID

    JOIN Production.ProductSubcategory AS SUB ON P.ProductSubcategoryID

    = SUB.ProductSubcategoryID

    JOIN Production.ProductCategory AS CAT ON SUB.ProductCategoryID

    = CAT.ProductCategoryID

    WHERE CAT.Name = ''Bikes''

    GROUP BY P.ProductID

    ORDER BY PercentOfSales DESC;

    ```

    **清单 3-8**

    使用窗口函数显示销售额占比


    图 3-7 显示了部分结果。这是一个聚合查询，因此在窗口聚合内部任何角色中使用的列都必须是 `GROUP BY` 列或进行了聚合。空的 `OVER` 子句用于计算
    `TotalSales`。按 `ProductID` 计算的总和除以整个结果集的总销售额，并进行格式化，从而得出每种自行车型号的销售额占比。


    ![../images/335106_2_En_3_Chapter/335106_2_En_3_Fig7_HTML.jpg](img/335106_2_En_3_Fig7_HTML.jpg)


    **图 3-7**

    按 ProductID 显示的销售额占比

